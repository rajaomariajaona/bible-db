document_id: 1KI.11
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Les femmes de Salomon et son idolâtrie
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Le roi Salomon aima beaucoup de femmes étrangères, outre la fille du pharaon : des Moabites, des Ammonites, des Edomites, des Sidoniennes, des Hittites. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Elles venaient de ces peuples étrangers au sujet desquels l’Eternel avait dit aux Israélites : « Vous ne vous unirez pas à eux, et ils ne s’uniront pas à vous ; sinon ils détourneront votre cœur et vous entraîneront à adorer leurs dieux'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '11.2 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Voir Ex 34.15-16 ; Dt 7.3-4.
    marker-yv: yv-n
  - type: text
    text: '. » Or, c’est précisément à des femmes de ces peuples-là que Salomon s’attacha, entraîné par l’amour. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Il eut sept cents épouses de rang princier et trois cents épouses de second rang, et toutes ces femmes détournèrent son cœur. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'En effet, lorsque Salomon fut devenu vieux, ses femmes détournèrent son cœur vers des dieux étrangers, de sorte que son cœur n’appartint plus sans réserve à l’Eternel son Dieu, à la différence de son père David. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Il pratiqua le culte d’Astarté, la déesse des Sidoniens, et celui de Milkom, l’idole abominable des Ammonites. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Il fit ce que l’Eternel considère comme mal, car il n’obéit pas pleinement à l’Eternel comme l’avait fait son père David. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: A cette époque, Salomon bâtit sur la colline à l’est de Jérusalem
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '11.7 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'C’est-à-dire le mont des Oliviers, appelé mont de la Destruction dans '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 2 R 23.13
        metadata:
          usfm: 2KI.23.13
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: ' un haut lieu pour Kemosh'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '11.7 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Voir Nb 21.29 ; Jr 48.7, 13, 16.
    marker-yv: yv-n
  - type: text
    text: ', l’idole abominable de Moab, et pour Milkom'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '11.7 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'D’après l’ancienne version grecque (voir v. 5 et 33). Le texte hébreu traditionnel a : '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: Molok.
    marker-yv: yv-n
  - type: text
    text: ', l’idole abominable des Ammonites. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Il fit de même pour toutes ses femmes étrangères pour qu’elles puissent offrir des parfums et des sacrifices à leurs dieux.
- type: usfm
  marker: s1
  children:
  - type: text
    text: L’annonce des sanctions
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: L’Eternel, qui était apparu deux fois
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '11.9 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Voir 1 R 3.4-15 ; 9.1-9.
    marker-yv: yv-n
  - type: text
    text: ' à Salomon, s’irrita contre lui, parce que son cœur s’était détaché de l’Eternel, le Dieu d’Israël. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Il lui avait pourtant donné des ordres sur ce point, lui défendant de s’attacher à des dieux étrangers, mais Salomon désobéit aux ordres de l’Eternel. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Alors l’Eternel lui dit : Puisque tu te conduis ainsi et que tu n’as pas respecté mon alliance et les ordres que je t’avais donnés, je t’arracherai la royauté et je la donnerai à l’un de tes sujets. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Toutefois, à cause de ton père David, je n’accomplirai pas cette menace de ton vivant, mais j’arracherai le royaume à ton fils. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Encore, je ne lui enlèverai pas tout le royaume, je lui laisserai une tribu à cause de mon serviteur David et à cause de Jérusalem, la ville que j’ai choisie.
- type: usfm
  marker: s1
  children:
  - type: text
    text: La rançon de l’infidélité
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'L’Eternel suscita un adversaire à Salomon : Hadad l’Edomite, un descendant de la famille royale d’Edom. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Jadis, au temps où David avait combattu les Edomites, Joab, son chef d’armée, avait enterré les morts et tué tous les Edomites de sexe masculin. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Il était resté pendant six mois avec toute l’armée d’Israël en Edom, jusqu’à ce qu’il eût exterminé tous les Edomites de sexe masculin. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Hadad qui, à l’époque, était un jeune garçon, avait cependant réussi à s’enfuir en Egypte avec quelques Edomites, serviteurs de son père. '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Ils quittèrent la région de Madian et traversèrent le désert de Parân. Ils entraînèrent avec eux quelques hommes de Parân, puis se rendirent en Egypte chez le pharaon, roi d’Egypte. Celui-ci fournit à Hadad une maison, lui donna de quoi vivre et lui fit présent d’une terre. '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Hadad gagna la faveur du pharaon au point que celui-ci lui accorda pour femme sa belle-sœur, c’est-à-dire la sœur de la reine Tahpenès. '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Elle lui donna un fils qu’il appela Guenoubath. La reine Tahpenès l’éleva dans le palais du pharaon avec les fils du roi. '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'En Egypte, Hadad apprit que David était mort et que Joab son général était également mort. Il demanda au pharaon l’autorisation de retourner dans son pays. '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Le pharaon lui dit : Pourquoi veux-tu rentrer chez toi ? Que te manque-t-il auprès de moi ?'
- type: usfm
  marker: p
  children:
  - type: text
    text: – Rien, lui répondit Hadad, mais laisse-moi quand même partir
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '11.22 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'L’ancienne version grecque ajoute : '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: Hadad s’en retourna donc dans son pays. Devenu roi d’Edom, il traita Israël en ennemi.
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Dieu suscita un autre adversaire à Salomon : Rezôn, fils d’Elyada, qui s’était enfui de chez son maître Hadadézer, roi de Tsoba'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '11.23 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Petit royaume araméen au sud-est du Liban. David a vaincu son roi (
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 2 S 8.3-8
        metadata:
          usfm: 2SA.8.3+2SA.8.4+2SA.8.5+2SA.8.6+2SA.8.7+2SA.8.8
      - type: text
        text: ', voir note).'
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Rezôn avait rassemblé des partisans autour de lui et était devenu leur chef de bande au temps où David avait massacré les troupes de son maître. Rezôn et ses hommes marchèrent sur Damas, s’y installèrent et y prirent le pouvoir. '
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: Rezôn fut l’adversaire d’Israël durant tout le règne de Salomon. Pendant que Hadad s’acharnait contre Israël, Rezôn, devenu roi de Syrie, eut aussi de la haine à l’égard d’Israël.
- type: usfm
  marker: s1
  children:
  - type: text
    text: L’exécution des sanctions se prépare
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: Jéroboam, fils de Nebath, un Ephratien de Tseréda
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '11.26 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: Ephratien
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: ': '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'c’est-à-dire d’Ephraïm. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'Tseréda '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: se trouvait au milieu du territoire du futur royaume du Nord.
    marker-yv: yv-n
  - type: text
    text: ', fils d’une veuve nommée Tseroua, qui avait été au service de Salomon, se révolta contre le roi '
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'dans les circonstances suivantes : à l’époque où Salomon faisait aménager les abords du palais pour des cultures en terrasse, et réparer une brèche dans le rempart de la Cité de David, son père, '
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'ce Jéroboam était un jeune homme énergique et capable. Salomon avait remarqué comment il exécutait son travail et lui avait confié la surveillance de toutes les corvées exécutées par les hommes des tribus issues de Joseph. '
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: A cette époque-là, Jéroboam sortit un jour de Jérusalem et fut abordé en chemin par le prophète Ahiya de Silo
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '11.29 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: L’un des sanctuaires israélites datant de l’époque de la conquête de Canaan (
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Jos 18.1
        metadata:
          usfm: JOS.18.1
      - type: text
        text: ) où le coffre de l’alliance était demeuré un certain temps (1 S 1.3 ; 4.3).
    marker-yv: yv-n
  - type: text
    text: ', vêtu d’un manteau neuf. Ils étaient tous deux seuls dans la campagne. '
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'Ahiya prit le manteau neuf qu’il portait, le déchira en douze morceaux '
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'et dit à Jéroboam : Prends pour toi dix de ces morceaux ! Car voici ce que déclare l’Eternel, le Dieu d’Israël : « J’ai décidé d’arracher le royaume à Salomon et de te confier dix tribus. '
  - type: usfm
    marker: v
    metadata:
      v: '32'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'Une seule tribu lui restera à cause de mon serviteur David et de Jérusalem, la ville que j’ai choisie parmi toutes les tribus d’Israël. '
  - type: usfm
    marker: v
    metadata:
      v: '33'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: Je ferai cela, parce que les Israélites m’ont abandonné et se sont prosternés devant Astarté la déesse des Sidoniens, devant Kemosh le dieu de Moab, et devant Milkom, le dieu des Ammonites, et parce qu’ils n’ont pas suivi les chemins que je leur ai prescrits pour faire ce que je considère comme juste et pour obéir à mes ordonnances et à mes lois comme l’a fait David, le père de Salomon
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '11.33 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Dans l’ancienne version grecque, la version syriaque et la Vulgate, les verbes de ce verset sont au singulier et Salomon en est le sujet.
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '34'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: 'Toutefois, ce n’est pas ce dernier que je dépouillerai de la royauté ; je le laisserai régner jusqu’à la fin de sa vie à cause de mon serviteur David que j’ai choisi et qui a obéi à mes commandements et mes ordonnances. '
  - type: usfm
    marker: v
    metadata:
      v: '35'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: 'Mais je reprendrai la royauté à son fils et je te donnerai dix tribus, '
  - type: usfm
    marker: v
    metadata:
      v: '36'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: 'laissant une tribu à son fils, afin que mon serviteur David ait toujours un de ses descendants qui règne devant moi à Jérusalem, la ville que j’ai choisie pour y établir ma présence. '
  - type: usfm
    marker: v
    metadata:
      v: '37'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: 'Quant à toi, je te ferai roi et tu régneras comme tu le désires sur Israël. '
  - type: usfm
    marker: v
    metadata:
      v: '38'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: text
    text: 'Si tu obéis à tout ce que je t’ordonnerai, si tu suis les chemins que j’ai prescrits et si tu fais ce que je considère comme juste en observant mes ordonnances et mes commandements, comme l’a fait mon serviteur David, je serai avec toi, je ferai de toi le chef d’une dynastie durable comme je l’ai fait pour David, et je te confierai Israël. '
  - type: usfm
    marker: v
    metadata:
      v: '39'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '39'
  - type: text
    text: J’humilierai ainsi les descendants de David. Mais ce ne sera pas pour toujours. »
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '40'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '40'
  - type: text
    text: Par la suite, Salomon chercha à faire périr Jéroboam. Alors Jéroboam s’en alla et s’enfuit en Egypte pour se réfugier auprès de Shishaq, roi d’Egypte. Il y resta jusqu’à la mort de Salomon
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '11.40 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Voir '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 14.25-26
        metadata:
          usfm: 1KI.14.25+1KI.14.26
      - type: text
        text: '. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'Shishaq '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: est le premier pharaon de la XXII
      - type: usfm
        marker: ord
        children:
        - type: text
          text: e
      - type: text
        text: ' dynastie égyptienne (945-924 av. J.-C.).'
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: s1
  children:
  - type: text
    text: La fin du règne de Salomon
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: (2 Ch 9.29-31)
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '41'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '41'
  - type: text
    text: Les autres faits et gestes de Salomon, toutes ses réalisations et sa sagesse sont cités dans le livre des Annales de Salomon
  - type: usfm
    marker: f
