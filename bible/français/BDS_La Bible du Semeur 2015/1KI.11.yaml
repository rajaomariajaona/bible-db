      text: '42'
  - type: text
    text: 'La durée du règne de Salomon à Jérusalem sur tout Israël fut de quarante ans. '
  - type: usfm
    marker: v
    metadata:
      v: '43'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '43'
  - type: text
    text: Après cela, Salomon rejoignit ses ancêtres décédés et fut enterré dans la Cité de David, son père. Son fils Roboam lui succéda sur le trône.
