document_id: ISA.3,21
type_code: fra
verses:
  '1':
  - type: heading
    content: Jugement sur Jérusalem et Juda
  - type: text
    content: Voici que l’Eternel,
  - type: text
    content: le Seigneur des armées célestes,
  - type: text
    content: va vous priver, Jérusalem, ╵et toi, royaume de Juda,
  - type: text
    content: 'de tout ce qui vous sert d’appui :'
  - type: text
    content: il vous enlèvera ╵toutes vos réserves de pain
  - type: text
    content: et toutes vos réserves d’eau,
  '10':
  - type: text
    content: Proclamez donc au juste ╵qu’il aura du bonheur,
  - type: text
    content: car il profitera ╵du fruit de ses actions.
  '11':
  - type: text
    content: Mais, malheur au méchant,
  - type: text
    content: 'cela tournera mal pour lui :'
  - type: text
    content: il lui sera rendu ╵selon ce qu’il a fait.
  '12':
  - type: text
    content: Mon peuple est opprimé ╵par de jeunes enfants,
  - type: text
    content: des femmes le dominent.
  - type: text
    content: Tous ceux qui te dirigent, ╵ô toi, mon peuple, ╵ne font que t’égarer.
  - type: text
    content: Ils embrouillent la route ╵que tu dois emprunter.
  '13':
  - type: text
    content: L’Eternel s’est levé, ╵il intente un procès,
  - type: text
    content: il se tient là, ╵prêt à juger son peuple
  - type: note
    content: 'D’après l’ancienne version grecque, la version syriaque et le targoum. Le texte hébreu traditionnel a : les peuples.'
  - type: text
    content: .
  '14':
  - type: text
    content: Il traduit en justice
  - type: text
    content: 'les responsables de son peuple ╵avec ses dirigeants :'
  - type: text
    content: Vous avez dévasté la vigne.
  - type: text
    content: Vous avez entassé ╵dans vos maisons ╵ce que vous avez pris aux pauvres.
  '15':
  - type: text
    content: Pourquoi donc ╵écrasez-vous mon peuple
  - type: text
    content: et foulez-vous aux pieds ╵la dignité du pauvre ?
  - type: text
    content: c’est l’Eternel qui le demande, ╵le Seigneur des armées célestes.
  - type: heading
    content: Sur les femmes de Jérusalem
  '16':
  - type: text
    content: 'L’Eternel dit encore : ╵Les filles de Sion ╵se sont enorgueillies,'
  - type: text
    content: regardez-les qui marchent ╵en redressant la tête,
  - type: text
    content: le regard provocant ;
  - type: text
    content: elles s’avancent ╵à petits pas,
  - type: text
    content: en faisant résonner ╵les anneaux de leurs pieds.
  '17':
  - type: text
    content: L’Eternel rendra chauve ╵le sommet de la tête ╵des filles de Sion
  - type: text
    content: et le mettra à nu.
  '18':
  - type: text
    content: 'En ce jour-là, le Seigneur les dépouillera de leurs parures : les anneaux des chevilles, les bijoux luxueux, en formes de soleil et de croissant'
  - type: note
    content: La traduction des objets énumérés dans les v. 18-23 n’est pas toujours certaine.
  - type: text
    content: ', '
  '19':
  - type: text
    content: 'les pendentifs, les bracelets, les voiles, '
  '2':
  - type: text
    content: les hommes forts et les guerriers,
  - type: text
    content: les juges, les prophètes,
  - type: text
    content: les devins et les dirigeants,
  '20':
  - type: text
    content: 'les turbans, les chaînettes, les ceintures tressées, les flacons de parfum, les amulettes, '
  '21':
  - type: text
    content: 'les bagues, les anneaux du nez, '
  '22':
  - type: text
    content: 'les toilettes de fête et les amples tuniques, les manteaux, les sacoches, '
  '23':
  - type: text
    content: les miroirs, les fines mousselines, les bandeaux et les châles.
  '24':
  - type: text
    content: Il adviendra, ╵qu’au lieu de leurs parfums, ╵ce sera la mauvaise odeur ╵émanant de la pourriture ;
  - type: text
    content: au lieu de leurs ceintures, ╵ce sera une corde ;
  - type: text
    content: au lieu de leurs cheveux ╵artistement tressés, ╵ce sera une tête chauve ;
  - type: text
    content: au lieu de linge fin, ╵un habit de toile de sac ;
  - type: text
    content: au lieu de la beauté, ╵une marque infamante
  - type: note
    content: 'Le texte hébreu de Qumrân a : l’humiliation.'
  - type: text
    content: .
  '25':
  - type: text
    content: Tes soldats tomberont ╵sous les coups de l’épée
  - type: text
    content: et tes vaillants guerriers ╵mourront dans la bataille.
  '26':
  - type: text
    content: Les portes de Sion, ╵ce jour-là, gémiront ╵et seront dans le deuil.
  - type: text
    content: La ville dévastée ╵restera assise par terre.
  '3':
  - type: text
    content: les capitaines, et les dignitaires,
  - type: text
    content: les conseillers, les artisans habiles,
  - type: text
    content: les spécialistes de magie,
  '4':
  - type: text
    content: et je vous donnerai ╵des enfants comme chefs
  - type: text
    content: et des gamins ╵qui régneront sur vous.
  '5':
  - type: text
    content: On se maltraitera l’un l’autre,
  - type: text
    content: compagnon contre compagnon, ╵au sein du peuple,
  - type: text
    content: les jeunes gens se dresseront ╵contre les gens âgés,
  - type: text
    content: les gens de rien ╵contre les dignitaires.
  '6':
  - type: text
    content: Un homme empoignera son frère
  - type: text
    content: 'dans sa famille et lui dira :'
  - type: text
    content: « Toi qui as un habit, ╵tu seras notre chef,
  - type: text
    content: prends cette maison chancelante ╵sous ton autorité ! »
  '7':
  - type: text
    content: 'Mais alors l’autre s’écriera :'
  - type: text
    content: « Je ne suis pas un médecin,
  - type: text
    content: je n’ai dans ma maison ╵ni pain ni vêtement.
  - type: text
    content: Ne faites pas de moi ╵un chef du peuple ! »
  '8':
  - type: text
    content: Jérusalem chancelle,
  - type: text
    content: et Juda est tombé,
  - type: text
    content: parce qu’ils se révoltent ╵contre la gloire ╵de l’Eternel
  - type: text
    content: par leurs paroles ╵et leurs actions ╵à son égard.
  '9':
  - type: text
    content: L’aspect de leur visage ╵a témoigné contre eux.
  - type: text
    content: Ils publient leurs péchés ╵comme le fit Sodome,
  - type: text
    content: ils ne s’en cachent pas.
  - type: text
    content: Malheur à eux !
  - type: text
    content: Car ils préparent ╵le malheur pour eux-mêmes.
