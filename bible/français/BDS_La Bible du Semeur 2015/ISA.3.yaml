document_id: ISA.3
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Jugement sur Jérusalem et Juda
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Voici que l’Eternel,
- type: usfm
  marker: q1
  children:
  - type: text
    text: le Seigneur des armées célestes,
- type: usfm
  marker: q1
  children:
  - type: text
    text: va vous priver, Jérusalem, ╵et toi, royaume de Juda,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'de tout ce qui vous sert d’appui :'
- type: usfm
  marker: q1
  children:
  - type: text
    text: il vous enlèvera ╵toutes vos réserves de pain
- type: usfm
  marker: q1
  children:
  - type: text
    text: et toutes vos réserves d’eau,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: les hommes forts et les guerriers,
- type: usfm
  marker: q1
  children:
  - type: text
    text: les juges, les prophètes,
- type: usfm
  marker: q1
  children:
  - type: text
    text: les devins et les dirigeants,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: les capitaines, et les dignitaires,
- type: usfm
  marker: q1
  children:
  - type: text
    text: les conseillers, les artisans habiles,
- type: usfm
  marker: q1
  children:
  - type: text
    text: les spécialistes de magie,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: et je vous donnerai ╵des enfants comme chefs
- type: usfm
  marker: q1
  children:
  - type: text
    text: et des gamins ╵qui régneront sur vous.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: On se maltraitera l’un l’autre,
- type: usfm
  marker: q1
  children:
  - type: text
    text: compagnon contre compagnon, ╵au sein du peuple,
- type: usfm
  marker: q1
  children:
  - type: text
    text: les jeunes gens se dresseront ╵contre les gens âgés,
- type: usfm
  marker: q1
  children:
  - type: text
    text: les gens de rien ╵contre les dignitaires.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Un homme empoignera son frère
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'dans sa famille et lui dira :'
- type: usfm
  marker: q1
  children:
  - type: text
    text: « Toi qui as un habit, ╵tu seras notre chef,
- type: usfm
  marker: q1
  children:
  - type: text
    text: prends cette maison chancelante ╵sous ton autorité ! »
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Mais alors l’autre s’écriera :'
- type: usfm
  marker: q1
  children:
  - type: text
    text: « Je ne suis pas un médecin,
- type: usfm
  marker: q1
  children:
  - type: text
    text: je n’ai dans ma maison ╵ni pain ni vêtement.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ne faites pas de moi ╵un chef du peuple ! »
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Jérusalem chancelle,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et Juda est tombé,
- type: usfm
  marker: q1
  children:
  - type: text
    text: parce qu’ils se révoltent ╵contre la gloire ╵de l’Eternel
- type: usfm
  marker: q1
  children:
  - type: text
    text: par leurs paroles ╵et leurs actions ╵à son égard.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: L’aspect de leur visage ╵a témoigné contre eux.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ils publient leurs péchés ╵comme le fit Sodome,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ils ne s’en cachent pas.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Malheur à eux !
- type: usfm
  marker: q1
  children:
  - type: text
    text: Car ils préparent ╵le malheur pour eux-mêmes.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Proclamez donc au juste ╵qu’il aura du bonheur,
- type: usfm
  marker: q1
  children:
  - type: text
    text: car il profitera ╵du fruit de ses actions.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Mais, malheur au méchant,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'cela tournera mal pour lui :'
- type: usfm
  marker: q1
  children:
  - type: text
    text: il lui sera rendu ╵selon ce qu’il a fait.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Mon peuple est opprimé ╵par de jeunes enfants,
- type: usfm
  marker: q1
  children:
  - type: text
    text: des femmes le dominent.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Tous ceux qui te dirigent, ╵ô toi, mon peuple, ╵ne font que t’égarer.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ils embrouillent la route ╵que tu dois emprunter.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: L’Eternel s’est levé, ╵il intente un procès,
- type: usfm
  marker: q1
  children:
  - type: text
    text: il se tient là, ╵prêt à juger son peuple
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '3.13 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'D’après l’ancienne version grecque, la version syriaque et le targoum. Le texte hébreu traditionnel a : '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: les peuples.
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Il traduit en justice
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'les responsables de son peuple ╵avec ses dirigeants :'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Vous avez dévasté la vigne.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Vous avez entassé ╵dans vos maisons ╵ce que vous avez pris aux pauvres.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Pourquoi donc ╵écrasez-vous mon peuple
- type: usfm
  marker: q1
  children:
  - type: text
    text: et foulez-vous aux pieds ╵la dignité du pauvre ?
- type: usfm
  marker: q1
  children:
  - type: text
    text: c’est l’Eternel qui le demande, ╵le Seigneur des armées célestes.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Sur les femmes de Jérusalem
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'L’Eternel dit encore : ╵Les filles de Sion ╵se sont enorgueillies,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: regardez-les qui marchent ╵en redressant la tête,
- type: usfm
  marker: q1
  children:
  - type: text
    text: le regard provocant ;
- type: usfm
  marker: q1
  children:
  - type: text
    text: elles s’avancent ╵à petits pas,
- type: usfm
  marker: q1
  children:
  - type: text
    text: en faisant résonner ╵les anneaux de leurs pieds.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: L’Eternel rendra chauve ╵le sommet de la tête ╵des filles de Sion
- type: usfm
  marker: q1
  children:
  - type: text
    text: et le mettra à nu.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'En ce jour-là, le Seigneur les dépouillera de leurs parures : les anneaux des chevilles, les bijoux luxueux, en formes de soleil et de croissant'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '3.18 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: La traduction des objets énumérés dans les v. 18-23 n’est pas toujours certaine.
    marker-yv: yv-n
  - type: text
    text: ', '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'les pendentifs, les bracelets, les voiles, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'les turbans, les chaînettes, les ceintures tressées, les flacons de parfum, les amulettes, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'les bagues, les anneaux du nez, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'les toilettes de fête et les amples tuniques, les manteaux, les sacoches, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: les miroirs, les fines mousselines, les bandeaux et les châles.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: Il adviendra, ╵qu’au lieu de leurs parfums, ╵ce sera la mauvaise odeur ╵émanant de la pourriture ;
- type: usfm
  marker: q1
  children:
  - type: text
    text: au lieu de leurs ceintures, ╵ce sera une corde ;
- type: usfm
  marker: q1
  children:
  - type: text
    text: au lieu de leurs cheveux ╵artistement tressés, ╵ce sera une tête chauve ;
- type: usfm
  marker: q1
  children:
  - type: text
    text: au lieu de linge fin, ╵un habit de toile de sac ;
- type: usfm
  marker: q1
  children:
  - type: text
    text: au lieu de la beauté, ╵une marque infamante
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '3.24 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Le texte hébreu de Qumrân a : '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: l’humiliation.
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: Tes soldats tomberont ╵sous les coups de l’épée
- type: usfm
  marker: q1
  children:
  - type: text
    text: et tes vaillants guerriers ╵mourront dans la bataille.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: Les portes de Sion, ╵ce jour-là, gémiront ╵et seront dans le deuil.
- type: usfm
  marker: q1
  children:
  - type: text
    text: La ville dévastée ╵restera assise par terre.
