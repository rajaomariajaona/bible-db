document_id: 2KI.9
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Elisée envoie l’un de ses disciples oindre Jéhu
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Le prophète Elisée appela l’un des disciples des prophètes et lui dit : Habille-toi pour partir. Prends cette fiole d’huile et va à Ramoth en Galaad. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Là tu iras voir Jéhu, fils de Josaphat et petit-fils de Nimshi. Tu l’aborderas et tu lui demanderas de laisser ses compagnons et de te suivre seul dans une pièce retirée. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Tu prendras la fiole d’huile et tu en verseras le contenu sur sa tête en disant : « Voici ce que déclare l’Eternel : Je te confère l’onction pour t’établir roi d’Israël ! » Puis tu te précipiteras vers la porte et tu t’enfuiras sans attendre.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Le jeune prophète partit donc pour Ramoth en Galaad. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Quand il arriva, il trouva les chefs de l’armée d’Israël siégeant ensemble. Il dit : Chef, j’ai un message pour toi.'
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Jéhu demanda : Pour lequel d’entre nous ?'
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Il répondit : Pour toi, chef !'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Jéhu se leva et entra dans la maison. Le prophète lui répandit l’huile sur la tête et lui dit : Voici ce que déclare l’Eternel, le Dieu d’Israël : « Je te confère l’onction pour t’établir roi d’Israël, le peuple de l’Eternel'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '9.6 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Voir '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1 R 19.6
        metadata:
          usfm: 1KI.19.6
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Tu frapperas la maison d’Achab, ton seigneur. Ainsi, je vengerai le meurtre de mes serviteurs les prophètes et celui de tous les serviteurs de l’Eternel assassinés par Jézabel. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Oui, toute la famille d’Achab périra. J’en exterminerai tous les hommes, esclaves et libres, en Israël. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Je traiterai cette maison comme j’ai traité celle de Jéroboam, fils de Nebath, et celle de Baésha, fils d’Ahiya
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '9.9 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Voir 1 R 15.29 ; 16.11-12.
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Quant à Jézabel, elle sera dévorée par les chiens dans le domaine de Jizréel, sans qu’il y ait personne pour l’enterrer
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '9.10 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Voir '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1 R 21.23
        metadata:
          usfm: 1KI.21.23
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: . »
- type: usfm
  marker: p
  children:
  - type: text
    text: Après avoir dit cela, le prophète ouvrit la porte et s’enfuit.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Lorsque Jéhu revint auprès des autres officiers du roi, ils lui demandèrent : Est-ce que ça va ? Pourquoi cet exalté est-il venu te voir ?'
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Jéhu leur répondit : Vous connaissez bien ce genre de personnes et leurs divagations.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Mais ils répliquèrent : Tu mens ! Raconte-nous donc ce qui s’est passé.'
- type: usfm
  marker: p
  children:
  - type: text
    text: '– Eh bien, dit-il, voici comment il m’a parlé. Il m’a dit : « Voici ce que déclare l’Eternel : Je te confère l’onction pour t’établir roi d’Israël. »'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'A ces mots, les officiers s’empressèrent d’étendre leurs manteaux devant lui sur les marches de l’escalier, puis ils sonnèrent du cor et se mirent à crier : Vive le roi Jéhu !'
- type: usfm
  marker: s1
  children:
  - type: text
    text: Jéhu assassine Yoram et Ahazia
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'C’est ainsi que Jéhu, fils de Josaphat, petit-fils de Nimshi, forma une conspiration contre Yoram à l’époque où celui-ci défendait, avec tout Israël, Ramoth en Galaad contre Hazaël, roi de Syrie. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Le roi Yoram était retourné à Jizréel pour se faire soigner des blessures que lui avaient infligées les Syriens pendant le combat contre Hazaël, roi de Syrie. Jéhu dit à ses compagnons : Si vous êtes décidés à vous rallier à moi, il faut que personne ne s’échappe de la ville pour aller annoncer la chose à Jizréel.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Puis Jéhu monta sur son char et partit pour Jizréel où Yoram était alité et recevait la visite d’Ahazia, le roi de Juda.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'La sentinelle, postée sur la tour de Jizréel, vit venir la troupe de Jéhu et fit dire au roi : J’aperçois une troupe.'
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Yoram ordonna : Qu’on désigne un cavalier et qu’on l’envoie à leur rencontre pour leur demander s’ils viennent pour la paix.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Le cavalier se rendit à la rencontre de Jéhu et lui dit : Ainsi parle le roi : « Viens-tu pour la paix ? »'
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Jéhu répondit : Que t’importe la paix ? Fais demi-tour et passe derrière moi.'
- type: usfm
  marker: p
  children:
  - type: text
    text: 'La sentinelle fit son rapport en disant : Le messager est arrivé jusqu’à eux, mais il ne revient pas.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'On envoya un deuxième cavalier qui arriva auprès d’eux et dit : Ainsi parle le roi : « Viens-tu pour la paix ? »'
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Jéhu répondit : Que t’importe la paix ? Fais demi-tour et passe derrière moi.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'La sentinelle fit son rapport en disant : Il est arrivé jusqu’à eux, mais il ne revient pas. Le chef de la troupe conduit son char à la manière de Jéhu, petit-fils de Nimshi : il conduit comme un fou.'
- type: usfm
  marker: r
  children:
  - type: text
    text: (2 Ch 22.7-9)
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Alors Yoram ordonna : Qu’on attelle mon char !'
- type: usfm
  marker: p
  children:
  - type: text
    text: Et l’on attela son char. Yoram, roi d’Israël et Ahazia, roi de Juda, sortirent chacun sur son char pour aller au-devant de Jéhu, ils le rejoignirent dans le champ de Naboth de Jizréel
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '9.21 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Voir '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1 R 21.1
        metadata:
          usfm: 1KI.21.1
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Dès que Yoram fut à portée de voix de Jéhu, il lui demanda : Viens-tu pour la paix, Jéhu ?'
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Jéhu répondit : Comment peut-il être question de paix tant que durent les prostitutions de ta mère Jézabel et ses innombrables pratiques de sorcellerie ?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Alors Yoram fit demi-tour et s’enfuit, en criant à Ahazia : Attention, Ahazia ! c’est une trahison !'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Mais Jéhu saisit son arc et tira. La flèche frappa Yoram entre les deux épaules, lui transperça le cœur et ressortit par la poitrine. Yoram s’effondra mort dans son char. '
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Jéhu dit à son écuyer Bidqar : Prends son cadavre et jette-le dans le champ de Naboth de Jizréel ! Te rappelles-tu ? Lorsque nous étions ensemble sur un char derrière son père Achab, l’Eternel a prononcé contre lui cette sentence : '
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: '« Voici ce que déclare l’Eternel : Puisque j’ai vu couler le sang de Naboth et celui de ses enfants, je te le ferai payer dans ce champ même – l’Eternel le déclare'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '9.26 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Voir '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1 R 21.19
        metadata:
          usfm: 1KI.21.19
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: '  ! » Maintenant donc, emporte-le et jette-le dans ce champ, comme l’Eternel l’a annoncé.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'Quand Ahazia, roi de Juda, vit ce qui se passait, il s’enfuit en direction de Beth-Hagân. Mais Jéhu se lança à sa poursuite et ordonna à ses hommes : Lui aussi, frappez-le sur son char !'
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Il fut blessé à la montée de Gour près de Yibleam et réussit à fuir jusqu’à Meguiddo où il mourut. '
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'Ses serviteurs le ramenèrent sur un char à Jérusalem, et l’ensevelirent dans son tombeau à côté de ses ancêtres dans la Cité de David. '
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: Ahazia était devenu roi de Juda la onzième année du règne de Yoram, fils d’Achab.
- type: usfm
  marker: s1
  children:
  - type: text
    text: La fin de Jézabel
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'Jéhu était sur le point d’entrer à Jizréel. A cette nouvelle, Jézabel se farda les yeux, arrangea sa chevelure et se pencha à sa fenêtre pour regarder. '
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'Lorsque Jéhu eut franchi la porte de la ville, elle lui cria : Viens-tu pour la paix, nouveau Zimri'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '9.31 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Allusion à Zimri, qui tua le roi Ela d’Israël 45 ans plus tôt, assassina toute la famille de Baésha, mais ne régna que sept jours (
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1 R 16.8-20
        metadata:
          usfm: 1KI.16.8+1KI.16.9+1KI.16.10+1KI.16.11+1KI.16.12+1KI.16.13+1KI.16.14+1KI.16.15+1KI.16.16+1KI.16.17+1KI.16.18+1KI.16.19+1KI.16.20
      - type: text
        text: ).
    marker-yv: yv-n
  - type: text
    text: ', assassin de ton seigneur ?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '32'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'Il leva les yeux vers la fenêtre et s’écria : Qui de vous est pour moi ? Qui donc ?'
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Alors deux ou trois chambellans se penchèrent vers lui aux fenêtres. '
  - type: usfm
    marker: v
    metadata:
      v: '33'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: 'Il leur ordonna : Jetez-la en bas !'
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Ils la précipitèrent dans le vide, et son sang éclaboussa le mur et les chevaux. Jéhu passa sur elle avec son char, '
  - type: usfm
    marker: v
    metadata:
      v: '34'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: 'puis il entra dans le palais pour manger et pour boire. Ensuite, il ordonna à ses compagnons : Occupez-vous de cette femme maudite et enterrez-la. Après tout, c’est une fille de roi'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '9.34 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Du roi des Sidoniens (
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1 R 16.31
        metadata:
          usfm: 1KI.16.31
      - type: text
        text: ).
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '35'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: 'Ses hommes allèrent pour la mettre au tombeau, mais ils ne trouvèrent d’elle que son crâne, ses pieds et ses mains. '
  - type: usfm
    marker: v
    metadata:
      v: '36'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: 'Ils retournèrent l’annoncer à Jéhu qui s’écria : C’est bien ce que l’Eternel avait annoncé par son serviteur Elie de Tishbé, lorsqu’il a déclaré : « Les chiens dévoreront le corps de Jézabel dans le champ de Jizréel'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '9.36 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Voir '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1 R 21.23
        metadata:
          usfm: 1KI.21.23
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '37'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: 'Les restes du cadavre de Jézabel seront dispersés comme du fumier épandu sur le sol du champ de Jizréel, de sorte que personne ne pourra dire : C’est Jézabel. »'
