document_id: PSA.146
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Il fait droit aux opprimés
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Louez l’Eternel !
- type: usfm
  marker: q1
  children:
  - type: text
    text: Que, de tout mon être, ╵je loue l’Eternel !
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Je veux louer l’Eternel ╵tant que je vivrai,
- type: usfm
  marker: q1
  children:
  - type: text
    text: je célébrerai ╵mon Dieu en musique ╵tout au long ╵de mon existence.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Ne placez pas votre foi ╵dans les puissants de ce monde
- type: usfm
  marker: q1
  children:
  - type: text
    text: ni dans des humains ╵incapables de sauver !
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Dès qu’ils ont poussé ╵leur dernier soupir, ╵ils retournent à la terre
- type: usfm
  marker: q1
  children:
  - type: text
    text: et, au même instant, ╵leurs projets s’évanouissent.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Heureux l’homme ╵qui reçoit son aide ╵du Dieu de Jacob,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et dont l’espérance ╵est dans l’Eternel son Dieu.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Car l’Eternel a créé ╵le ciel et la terre
- type: usfm
  marker: q1
  children:
  - type: text
    text: ainsi que la mer, ╵avec tout ce qui s’y trouve
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '146.6 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Voir Ex 20.11 ; Ac 4.24 ; 14.15.
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: q1
  children:
  - type: text
    text: Il reste à jamais fidèle.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Il fait droit aux opprimés ;
- type: usfm
  marker: q1
  children:
  - type: text
    text: il nourrit les affamés ;
- type: usfm
  marker: q1
  children:
  - type: text
    text: l’Eternel relâche ╵ceux qui sont emprisonnés.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: L’Eternel rend la vue aux aveugles.
- type: usfm
  marker: q1
  children:
  - type: text
    text: L’Eternel relève ╵celui qui fléchit.
- type: usfm
  marker: q1
  children:
  - type: text
    text: L’Eternel aime les justes.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: L’Eternel protège ╵l’étranger,
- type: usfm
  marker: q1
  children:
  - type: text
    text: il est le soutien ╵de la veuve ╵et de l’orphelin.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Mais il fait dévier ╵le chemin qu’empruntent les méchants.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: L’Eternel est Roi ╵pour l’éternité,
- type: usfm
  marker: q1
  children:
  - type: text
    text: lui qui est ton Dieu, ╵ô Sion, ╵de génération ╵en génération.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Louez l’Eternel !
