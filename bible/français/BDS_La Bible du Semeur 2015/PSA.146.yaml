document_id: PSA.146,21
type_code: fra
verses:
  '1':
  - type: heading
    content: Il fait droit aux opprimés
  - type: text
    content: Louez l’Eternel !
  - type: text
    content: Que, de tout mon être, ╵je loue l’Eternel !
  '10':
  - type: text
    content: L’Eternel est Roi ╵pour l’éternité,
  - type: text
    content: lui qui est ton Dieu, ╵ô Sion, ╵de génération ╵en génération.
  - type: text
    content: Louez l’Eternel !
  '2':
  - type: text
    content: Je veux louer l’Eternel ╵tant que je vivrai,
  - type: text
    content: je célébrerai ╵mon Dieu en musique ╵tout au long ╵de mon existence.
  '3':
  - type: text
    content: Ne placez pas votre foi ╵dans les puissants de ce monde
  - type: text
    content: ni dans des humains ╵incapables de sauver !
  '4':
  - type: text
    content: Dès qu’ils ont poussé ╵leur dernier soupir, ╵ils retournent à la terre
  - type: text
    content: et, au même instant, ╵leurs projets s’évanouissent.
  '5':
  - type: text
    content: Heureux l’homme ╵qui reçoit son aide ╵du Dieu de Jacob,
  - type: text
    content: et dont l’espérance ╵est dans l’Eternel son Dieu.
  '6':
  - type: text
    content: Car l’Eternel a créé ╵le ciel et la terre
  - type: text
    content: ainsi que la mer, ╵avec tout ce qui s’y trouve
  - type: note
    content: Voir Ex 20.11 ; Ac 4.24 ; 14.15.
  - type: text
    content: .
  - type: text
    content: Il reste à jamais fidèle.
  '7':
  - type: text
    content: Il fait droit aux opprimés ;
  - type: text
    content: il nourrit les affamés ;
  - type: text
    content: l’Eternel relâche ╵ceux qui sont emprisonnés.
  '8':
  - type: text
    content: L’Eternel rend la vue aux aveugles.
  - type: text
    content: L’Eternel relève ╵celui qui fléchit.
  - type: text
    content: L’Eternel aime les justes.
  '9':
  - type: text
    content: L’Eternel protège ╵l’étranger,
  - type: text
    content: il est le soutien ╵de la veuve ╵et de l’orphelin.
  - type: text
    content: Mais il fait dévier ╵le chemin qu’empruntent les méchants.
