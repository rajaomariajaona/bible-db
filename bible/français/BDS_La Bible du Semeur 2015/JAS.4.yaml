document_id: JAS.4,21
type_code: fra
verses:
  '1':
  - type: heading
    content: Le danger des mauvais désirs
  - type: text
    content: 'D’où proviennent les conflits et les querelles entre vous ? N’est-ce pas des désirs égoïstes qui combattent sans cesse en vous ? '
  '10':
  - type: text
    content: Abaissez-vous devant le Seigneur, et il vous relèvera.
  - type: heading
    content: Ne pas s’ériger en juge d’autrui
  '11':
  - type: text
    content: 'Frères et sœurs, ne vous critiquez pas les uns les autres. Celui qui critique son frère ou sa sœur, ou qui se fait son juge, critique la Loi et la juge. Mais si tu juges la Loi, tu n’es plus celui qui lui obéit, tu t’en fais le juge. '
  '12':
  - type: text
    content: Or il n’y a qu’un seul législateur et juge, celui qui peut sauver et faire périr. Mais pour qui te prends-tu, toi qui juges ton prochain ?
  - type: heading
    content: La tentation des richesses
  '13':
  - type: text
    content: 'Et maintenant, écoutez-moi, vous qui dites : « Aujourd’hui ou demain, nous irons dans telle ville, nous y passerons une année, nous y ferons des affaires et nous gagnerons de l’argent. » '
  '14':
  - type: text
    content: 'Savez-vous ce que demain vous réserve ? Qu’est-ce que votre vie ? Une brume légère, visible quelques instants et qui se dissipe bien vite. '
  '15':
  - type: text
    content: 'Voici ce que vous devriez dire : « Si le Seigneur le veut, nous vivrons et nous ferons ceci ou cela ! » '
  '16':
  - type: text
    content: 'Mais en réalité, vous mettez votre orgueil dans vos projets présomptueux. Tout orgueil de ce genre est mauvais. '
  '17':
  - type: text
    content: Or, qui sait faire le bien et ne le fait pas se rend coupable d’un péché.
  '2':
  - type: text
    content: 'Vous convoitez beaucoup de choses, mais vos désirs restent insatisfaits. Vous êtes meurtriers, vous vous consumez en jalousie, et vous ne pouvez rien obtenir. Vous bataillez et vous vous disputez. Vous n’avez pas ce que vous désirez parce que vous ne demandez pas à Dieu. '
  '3':
  - type: text
    content: 'Ou bien, quand vous demandez, vous ne recevez pas, car vous demandez avec de mauvais motifs : vous voulez que l’objet de vos demandes serve à votre propre plaisir.'
  '4':
  - type: text
    content: Peuple adultère
  - type: note
    content: L’amour du monde est un adultère spirituel, une rupture de l’engagement envers Dieu pour se lier à un autre dieu.
  - type: text
    content: ' que vous êtes ! Ne savez-vous pas qu’aimer le monde, c’est haïr Dieu ? Si donc quelqu’un veut être l’ami du monde, il se fait l’ennemi de Dieu. '
  '5':
  - type: text
    content: Prenez-vous pour des paroles en l’air ce que déclare l’Ecriture
  - type: note
    content: C’est-à-dire la citation de la fin du v. 6.
  - type: text
    content: '  ? – Dieu ne tolère aucun rival de l’Esprit qu’il a fait habiter en nous'
  - type: note
    content: 'Autres traductions : Dieu réclame pour lui seul l’esprit qu’il a fait habiter en nous ou l’Esprit que Dieu a fait habiter en nous désire d’un amour sans partage ou l’esprit (humain) que Dieu a fait habiter en nous est plein de désirs envieux.'
  - type: text
    content: ', '
  '6':
  - type: text
    content: 'mais bien plus grande est la grâce qu’il nous accorde. – Voici donc ce que déclare l’Ecriture : '
  - type: text
    content: Dieu s’oppose aux orgueilleux, mais il accorde sa grâce aux humbles
  - type: note
    content: Pr 3.34 cité selon l’ancienne version grecque.
  - type: text
    content: .
  - type: text
    content: ' '
  '7':
  - type: text
    content: 'Soumettez-vous donc à Dieu, résistez au diable, et il fuira loin de vous. '
  '8':
  - type: text
    content: 'Approchez-vous de Dieu, et il s’approchera de vous. Nettoyez vos mains, pécheurs, et purifiez votre cœur, vous qui avez le cœur partagé. '
  '9':
  - type: text
    content: 'Prenez conscience de votre misère et soyez dans le deuil ; pleurez ! Que votre rire se change en pleurs et votre gaieté en tristesse ! '
