document_id: JAS.4,21
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Le danger des mauvais désirs
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'D’où proviennent les conflits et les querelles entre vous ? N’est-ce pas des désirs égoïstes qui combattent sans cesse en vous ? '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Abaissez-vous devant le Seigneur, et il vous relèvera.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ne pas s’ériger en juge d’autrui
    marker-yv: yv-h
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Frères et sœurs, ne vous critiquez pas les uns les autres. Celui qui critique son frère ou sa sœur, ou qui se fait son juge, critique la Loi et la juge. Mais si tu juges la Loi, tu n’es plus celui qui lui obéit, tu t’en fais le juge. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Or il n’y a qu’un seul législateur et juge, celui qui peut sauver et faire périr. Mais pour qui te prends-tu, toi qui juges ton prochain ?
  - type: usfm
    marker: s1
    children:
    - type: text
      text: La tentation des richesses
    marker-yv: yv-h
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Et maintenant, écoutez-moi, vous qui dites : « Aujourd’hui ou demain, nous irons dans telle ville, nous y passerons une année, nous y ferons des affaires et nous gagnerons de l’argent. » '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Savez-vous ce que demain vous réserve ? Qu’est-ce que votre vie ? Une brume légère, visible quelques instants et qui se dissipe bien vite. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Voici ce que vous devriez dire : « Si le Seigneur le veut, nous vivrons et nous ferons ceci ou cela ! » '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Mais en réalité, vous mettez votre orgueil dans vos projets présomptueux. Tout orgueil de ce genre est mauvais. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Or, qui sait faire le bien et ne le fait pas se rend coupable d’un péché.
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Vous convoitez beaucoup de choses, mais vos désirs restent insatisfaits. Vous êtes meurtriers, vous vous consumez en jalousie, et vous ne pouvez rien obtenir. Vous bataillez et vous vous disputez. Vous n’avez pas ce que vous désirez parce que vous ne demandez pas à Dieu. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ou bien, quand vous demandez, vous ne recevez pas, car vous demandez avec de mauvais motifs : vous voulez que l’objet de vos demandes serve à votre propre plaisir.'
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Peuple adultère
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '4.4 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'L’amour du monde est un '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'adultère '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: spirituel, une rupture de l’engagement envers Dieu pour se lier à un autre dieu.
      marker-yv: yv-n
    - type: text
      text: ' que vous êtes ! Ne savez-vous pas qu’aimer le monde, c’est haïr Dieu ? Si donc quelqu’un veut être l’ami du monde, il se fait l’ennemi de Dieu. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Prenez-vous pour des paroles en l’air ce que déclare l’Ecriture
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '4.5 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: C’est-à-dire la citation de la fin du v. 6.
      marker-yv: yv-n
    - type: text
      text: '  ? – Dieu ne tolère aucun rival de l’Esprit qu’il a fait habiter en nous'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '4.5 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Autres traductions : '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'Dieu réclame pour lui seul l’esprit qu’il a fait habiter en nous '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'ou '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'l’Esprit que Dieu a fait habiter en nous désire d’un amour sans partage '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'ou '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: l’esprit (humain) que Dieu a fait habiter en nous est plein de désirs envieux.
      marker-yv: yv-n
    - type: text
      text: ', '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'mais bien plus grande est la grâce qu’il nous accorde. – Voici donc ce que déclare l’Ecriture : '
    - type: usfm
      marker: qt
      children:
      - type: text
        text: Dieu s’oppose aux orgueilleux, mais il accorde sa grâce aux humbles
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '4.6 '
      - type: usfm
        marker: ft
        children:
        - type: usfm
          marker: ref
          children:
          - type: text
            text: Pr 3.34
        - type: text
          text: ' cité selon l’ancienne version grecque.'
      marker-yv: yv-n
    - type: usfm
      marker: qt
      children:
      - type: text
        text: .
    - type: text
      text: ' '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Soumettez-vous donc à Dieu, résistez au diable, et il fuira loin de vous. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Approchez-vous de Dieu, et il s’approchera de vous. Nettoyez vos mains, pécheurs, et purifiez votre cœur, vous qui avez le cœur partagé. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Prenez conscience de votre misère et soyez dans le deuil ; pleurez ! Que votre rire se change en pleurs et votre gaieté en tristesse ! '
