document_id: EXO.34,21
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Le renouvellement de l’alliance
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'L’Eternel dit à Moïse : Taille toi-même deux tablettes de pierre semblables aux premières et j’y graverai les paroles qui se trouvaient sur celles que tu as brisées. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'Dieu répondit : Je vais conclure une alliance avec vous. En présence de tout ton peuple, je ferai des prodiges tels qu’il ne s’en est jamais produit sur la terre entière chez aucun autre peuple, et tout le peuple qui t’entoure verra combien est impressionnante l’œuvre de l’Eternel que j’accomplis avec toi.'
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'Retenez bien ce que je vous commande aujourd’hui. Je vais chasser devant vous les Amoréens, les Cananéens, les Hittites, les Phéréziens, les Héviens et les Yebousiens. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'Gardez-vous de conclure une alliance avec les habitants du pays dans lequel vous allez entrer, ils deviendraient un piège au milieu de vous. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: Au contraire, vous renverserez leurs autels, vous briserez leurs stèles
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '34.13 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Pierres dressées, symboles de la divinité masculine, dont le culte est condamné par l’Eternel : 23.24 ; Lv 26.1 ; Dt 7.5 ; 12.3 ; 16.22.'
      marker-yv: yv-n
    - type: text
      text: ', et vous abattrez leurs pieux sacrés voués à la déesse Ashéra'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '34.13 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Pieux ou poteaux sacrés des sanctuaires cananéens, dont le nom a parfois été employé pour désigner la divinité qu’ils étaient censés représenter (Jg 6.25 ; 1 R 14.23 ; 15.13). Voir '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: Dt 16.21-22
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: .
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: Vous ne vous prosternerez devant aucune autre divinité ; car son nom à lui, c’est « l’Eternel qui ne tolère aucun rival » et il est effectivement un Dieu qui ne tolère aucun rival.
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'N’allez donc pas conclure une alliance avec les habitants du pays ; car ces gens se prostituent à leurs dieux, ils leur offrent des sacrifices, et, à leur invitation, vous mangeriez de ce qu’ils leur ont offert. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: Vous prendriez parmi leurs filles des épouses pour vos fils, et leurs filles, qui se prostituent à leurs dieux, entraîneraient vos fils à faire de même.
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: Vous ne vous ferez pas de dieu en métal fondu
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '34.17 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Voir Ex 20.4-5 ; Lv 19.4 ; 26.1 ; Dt 4.15-18 ; 5.8 ; 27.15.
      marker-yv: yv-n
    - type: text
      text: .
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: Vous observerez la fête des Pains sans levain. Pendant les sept jours fixés du mois des épis, vous mangerez des pains sans levain, comme je vous l’ai prescrit, car c’est au cours de ce mois que vous êtes sortis d’Egypte
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '34.18 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Pour les v. 18-26, voir Ex 23.14-19 ; Dt 16.1-17 ; Ex 12.14-20 ; Lv 23.6-8 ; Nb 28.16-25.
      marker-yv: yv-n
    - type: text
      text: .
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: Tout premier-né m’appartient. Il en est ainsi de tout premier-né mâle de ton bétail, veau ou agneau
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '34.19 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Voir Ex 13.2 ; Nb 3.13 ; Lc 2.23.
      marker-yv: yv-n
    - type: text
      text: '. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'Sois prêt pour demain matin ; monte dès l’aube sur le mont Sinaï et tiens-toi là pour m’attendre, au sommet de la montagne. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: Quant au premier-né de l’âne, vous le rachèterez par un agneau ; si vous ne le rachetez pas, vous lui briserez la nuque. Vous rachèterez toujours tout premier-né de vos fils.
  - type: usfm
    marker: p
    children:
    - type: text
      text: Vous ne viendrez pas vous présenter devant moi les mains vides
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '34.20 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Voir Ex 13.13 ; Nb 18.15.
      marker-yv: yv-n
    - type: text
      text: '  !'
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: Vous travaillerez six jours, mais le septième jour, vous vous reposerez ; même au temps du labour et de la moisson, vous vous reposerez
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '34.21 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Voir Ex 20.8-11 ; 23.12 ; 31.12-17 ; 35.2 ; Lv 23.3 ; Dt 5.13-14.
      marker-yv: yv-n
    - type: text
      text: .
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: Observe aussi la fête des Semaines
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '34.22 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Appelée ainsi parce que l’on comptait sept semaines à partir de la Pâque.
      marker-yv: yv-n
    - type: text
      text: ' à l’occasion des premiers grains de blé moissonnés, ainsi que la fête de la récolte à la fin de l’année'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '34.22 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Voir Ex 23.16 ; Lv 23.15-21 ; Nb 28.26-31.
      marker-yv: yv-n
    - type: text
      text: '. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: 'Trois fois par an, tous les hommes du peuple viendront se présenter devant moi, le Souverain, l’Eternel, le Dieu d’Israël. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: Car je déposséderai d’autres peuples devant vous, j’agrandirai votre territoire, et personne ne cherchera à conquérir votre pays pendant que vous monterez pour vous présenter devant l’Eternel votre Dieu trois fois par an.
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: Vous ne ferez pas couler le sang de mon sacrifice sur du pain levé, et vous ne garderez pas jusqu’au lendemain matin la viande du sacrifice de la fête de Pâque
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '34.25 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Voir '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: '12.10'
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: .
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: Vous apporterez le meilleur des premiers produits de votre terre au sanctuaire de l’Eternel votre Dieu.
  - type: usfm
    marker: p
    children:
    - type: text
      text: Vous ne ferez pas cuire un chevreau dans le lait de sa mère
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '34.26 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Voir '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: '23.19'
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: .
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: 'L’Eternel dit à Moïse : Inscris-toi ces paroles-là ; car c’est dans ces termes que je conclus alliance avec toi et avec le peuple d’Israël.'
  '28':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: Moïse demeura là avec l’Eternel quarante jours et quarante nuits, sans rien manger ni boire, et l’Eternel écrivit sur les tablettes les paroles de l’alliance, les dix commandements.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Le visage de Moïse
    marker-yv: yv-h
  '29':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: Puis Moïse redescendit du mont Sinaï, tenant en main les deux tablettes de l’acte de l’alliance. Il ne savait pas que la peau de son visage était devenue rayonnante pendant qu’il s’entretenait avec l’Eternel
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '34.29 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Pour les v. 29-35, allusion en '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: 2 Co 3.7-16
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: '. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: Personne ne montera avec toi, on ne verra aucune autre personne sur toute la montagne. Que même ni petit ni gros bétail ne paisse aux abords de la montagne.
  '30':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '30'
    - type: text
      text: 'Aaron et tous les Israélites regardèrent Moïse, et s’aperçurent que la peau de son visage rayonnait. Ils eurent peur de s’approcher de lui. '
  '31':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '31'
    - type: text
      text: 'Alors Moïse les appela. Aaron et tous les chefs de la communauté revinrent vers lui, et il s’entretint avec eux. '
  '32':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '32'
    - type: text
      text: Après cela, tous les Israélites s’approchèrent de lui et il leur transmit tous les commandements que l’Eternel lui avait donnés sur le mont Sinaï.
  '33':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '33'
    - type: text
      text: 'Quand il eut terminé de parler avec eux, il se couvrit le visage d’un voile. '
  '34':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '34'
    - type: text
      text: 'Lorsqu’il se rendait devant l’Eternel pour s’entretenir avec lui, il ôtait le voile jusqu’à ce qu’il ressorte de la tente. A sa sortie, il communiquait aux Israélites les ordres qu’il avait reçus. '
  '35':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '35'
    - type: text
      text: Les Israélites voyaient que la peau du visage de Moïse rayonnait, puis Moïse remettait le voile sur son visage jusqu’à ce qu’il retourne s’entretenir avec l’Eternel.
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: Moïse tailla deux tablettes de pierre semblables aux précédentes et le lendemain matin, de bonne heure, gravit le mont Sinaï, comme l’Eternel le lui avait ordonné, tenant en main les deux tablettes de pierre.
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'L’Eternel descendit dans la nuée, il se tint là près de lui et proclama son nom : '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'il passa devant lui en proclamant : L’Eternel, l’Eternel, un Dieu plein de compassion et de grâce, lent à se mettre en colère, et riche en amour et en fidélité'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '34.6 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Pour les v. 6-7, voir, entre autres, Ex 20.5-6 ; Nb 14.18 ; Dt 5.9-10 ; 7.9-10.
      marker-yv: yv-n
    - type: text
      text: '  ! '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'Il conserve son amour jusqu’à la millième génération : il pardonne le crime, la faute et le péché, mais ne tient pas le coupable pour innocent, il punit la faute des pères sur leurs descendants jusqu’à la troisième, voire même la quatrième génération.'
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'Aussitôt, Moïse s’inclina jusqu’à terre et se prosterna. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'Puis il dit : Seigneur, si j’ai obtenu ta faveur, je t’en prie, Seigneur, marche au milieu de nous. Oui, c’est un peuple rebelle, mais veuille pardonner nos fautes et nos péchés et conserver notre peuple comme ta possession !'
