document_id: PRO.27
type_code: fra
segments:
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Ne te vante pas de ce que tu feras demain,
- type: usfm
  marker: q1
  children:
  - type: text
    text: car tu ne sais pas ce qu’un jour peut apporter
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '27.1 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Voir '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Jc 4.13-16
        metadata:
          usfm: JAS.4.13+JAS.4.14+JAS.4.15+JAS.4.16
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Que ta bouche ne chante pas tes louanges, laisse aux autres le soin de le faire.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Oui, que ce ne soit pas toi, mais quelqu’un d’autre, qui fasse ton éloge.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: La pierre est lourde et le sable pesant,
- type: usfm
  marker: q1
  children:
  - type: text
    text: mais l’irritation causée par l’insensé est plus lourde que ces deux ensemble.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Cruelle est la colère et impétueuse la fureur,
- type: usfm
  marker: q1
  children:
  - type: text
    text: mais qui tiendra devant la jalousie ?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Mieux vaut un reproche énoncé franchement,
- type: usfm
  marker: q1
  children:
  - type: text
    text: qu’un amour qui cache ce qu’il pense.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Un ami qui vous blesse vous prouve par là sa fidélité,
- type: usfm
  marker: q1
  children:
  - type: text
    text: mais un ennemi multiplie les embrassades.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Qui est rassasié dédaigne le miel,
- type: usfm
  marker: q1
  children:
  - type: text
    text: mais, pour l’affamé, même ce qui est amer paraît doux.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: L’homme qui erre loin de son pays
- type: usfm
  marker: q1
  children:
  - type: text
    text: est comme un oiseau errant loin de son nid.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: L’huile odorante et les parfums mettent le cœur en joie,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et le conseil donné du fond du cœur rend douce l’amitié
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '27.9 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Sens incertain. L’ancienne version grecque a : '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: mais les malheurs troublent l’esprit.
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Ne délaisse pas ton ami, ni l’ami de ton père,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'et quand le malheur t’atteint, ne t’adresse pas à ta parenté :'
- type: usfm
  marker: q1
  children:
  - type: text
    text: un voisin près de toi vaut mieux qu’un parent qui se trouve loin.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Acquiers la sagesse, mon fils, et mon cœur se réjouira ;
- type: usfm
  marker: q1
  children:
  - type: text
    text: je pourrai répondre à ceux qui me critiquent.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: L’homme avisé voit venir le malheur et se met à l’abri ;
- type: usfm
  marker: q1
  children:
  - type: text
    text: l’homme sans expérience poursuit son chemin et en subira les conséquences.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Si quelqu’un s’est porté garant des dettes d’autrui, prends-lui son vêtement,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et s’il a cautionné des inconnus
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '27.13 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'D’après l’ancienne version grecque. Le texte hébreu traditionnel a : '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'une femme étrangère. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Voir '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '20.16'
        metadata:
          usfm: PRO.20.16
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: ', exige qu’il te donne des gages.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Si, de grand matin, quelqu’un vient bénir son prochain à voix forte,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ce sera pris comme une malédiction
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '27.14 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Les salutations et éloges intempestifs et empressés font soupçonner quelque arrière-pensée non avouée (
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ps 12.3
        metadata:
          usfm: PSA.12.3
      - type: text
        text: ).
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Une femme querelleuse est pareille
- type: usfm
  marker: q1
  children:
  - type: text
    text: à une gouttière percée qui ne cesse de couler un jour de pluie.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Arrêter ses récriminations ?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Autant vouloir arrêter le vent,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ou retenir de l’huile dans sa main !
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Le fer s’aiguise par le fer,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et le visage de l’homme s’affine au contact de son prochain.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Qui soigne son figuier jouira de ses fruits,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et qui prend soin de son maître sera honoré.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Regardez dans l’eau : vous verrez votre propre visage s’y réfléchir.'
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Sondez le cœur d’un homme : vous verrez s’y réfléchir votre propre cœur.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Le séjour des morts le lieu des disparus sont insatiables,
- type: usfm
  marker: q1
  children:
  - type: text
    text: de même, les yeux de l’homme ne sont jamais rassasiés.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Le creuset épure l’argent, et le four l’or,
- type: usfm
  marker: q1
  children:
  - type: text
    text: mais on juge l’homme d’après sa réputation.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: Même si tu broyais l’insensé dans un mortier avec un pilon comme on pile le grain,
- type: usfm
  marker: q1
  children:
  - type: text
    text: tu ne parviendrais pas à en détacher sa sottise.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: Tâche de bien connaître l’état de chacune de tes brebis,
- type: usfm
  marker: q1
  children:
  - type: text
    text: sois attentif à tes troupeaux,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: car la richesse n’est pas éternelle,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et une couronne ne subsiste pas à toujours.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: Quand tu auras récolté le foin
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '27.25 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: C’est-à-dire en mars-avril.
    marker-yv: yv-n
  - type: text
    text: ', pendant que pousse le regain,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: et que l’herbe des montagnes est recueillie,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: des moutons te fourniront de quoi te vêtir
- type: usfm
  marker: q1
  children:
  - type: text
    text: et des boucs serviront à te payer un champ,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: le lait des chèvres suffira à ta nourriture, à celle de ta famille,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et à l’entretien de tes servantes.
