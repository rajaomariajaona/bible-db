document_id: PRO.27,21
type_code: fra
verses:
  '1':
  - type: text
    content: Ne te vante pas de ce que tu feras demain,
  - type: text
    content: car tu ne sais pas ce qu’un jour peut apporter
  - type: note
    content: Voir Jc 4.13-16.
  - type: text
    content: .
  '10':
  - type: text
    content: Ne délaisse pas ton ami, ni l’ami de ton père,
  - type: text
    content: 'et quand le malheur t’atteint, ne t’adresse pas à ta parenté :'
  - type: text
    content: un voisin près de toi vaut mieux qu’un parent qui se trouve loin.
  '11':
  - type: text
    content: Acquiers la sagesse, mon fils, et mon cœur se réjouira ;
  - type: text
    content: je pourrai répondre à ceux qui me critiquent.
  '12':
  - type: text
    content: L’homme avisé voit venir le malheur et se met à l’abri ;
  - type: text
    content: l’homme sans expérience poursuit son chemin et en subira les conséquences.
  '13':
  - type: text
    content: Si quelqu’un s’est porté garant des dettes d’autrui, prends-lui son vêtement,
  - type: text
    content: et s’il a cautionné des inconnus
  - type: note
    content: 'D’après l’ancienne version grecque. Le texte hébreu traditionnel a : une femme étrangère. Voir 20.16.'
  - type: text
    content: ', exige qu’il te donne des gages.'
  '14':
  - type: text
    content: Si, de grand matin, quelqu’un vient bénir son prochain à voix forte,
  - type: text
    content: ce sera pris comme une malédiction
  - type: note
    content: Les salutations et éloges intempestifs et empressés font soupçonner quelque arrière-pensée non avouée (Ps 12.3).
  - type: text
    content: .
  '15':
  - type: text
    content: Une femme querelleuse est pareille
  - type: text
    content: à une gouttière percée qui ne cesse de couler un jour de pluie.
  '16':
  - type: text
    content: Arrêter ses récriminations ?
  - type: text
    content: Autant vouloir arrêter le vent,
  - type: text
    content: ou retenir de l’huile dans sa main !
  '17':
  - type: text
    content: Le fer s’aiguise par le fer,
  - type: text
    content: et le visage de l’homme s’affine au contact de son prochain.
  '18':
  - type: text
    content: Qui soigne son figuier jouira de ses fruits,
  - type: text
    content: et qui prend soin de son maître sera honoré.
  '19':
  - type: text
    content: 'Regardez dans l’eau : vous verrez votre propre visage s’y réfléchir.'
  - type: text
    content: 'Sondez le cœur d’un homme : vous verrez s’y réfléchir votre propre cœur.'
  '2':
  - type: text
    content: Que ta bouche ne chante pas tes louanges, laisse aux autres le soin de le faire.
  - type: text
    content: Oui, que ce ne soit pas toi, mais quelqu’un d’autre, qui fasse ton éloge.
  '20':
  - type: text
    content: Le séjour des morts le lieu des disparus sont insatiables,
  - type: text
    content: de même, les yeux de l’homme ne sont jamais rassasiés.
  '21':
  - type: text
    content: Le creuset épure l’argent, et le four l’or,
  - type: text
    content: mais on juge l’homme d’après sa réputation.
  '22':
  - type: text
    content: Même si tu broyais l’insensé dans un mortier avec un pilon comme on pile le grain,
  - type: text
    content: tu ne parviendrais pas à en détacher sa sottise.
  '23':
  - type: text
    content: Tâche de bien connaître l’état de chacune de tes brebis,
  - type: text
    content: sois attentif à tes troupeaux,
  '24':
  - type: text
    content: car la richesse n’est pas éternelle,
  - type: text
    content: et une couronne ne subsiste pas à toujours.
  '25':
  - type: text
    content: Quand tu auras récolté le foin
  - type: note
    content: C’est-à-dire en mars-avril.
  - type: text
    content: ', pendant que pousse le regain,'
  - type: text
    content: et que l’herbe des montagnes est recueillie,
  '26':
  - type: text
    content: des moutons te fourniront de quoi te vêtir
  - type: text
    content: et des boucs serviront à te payer un champ,
  '27':
  - type: text
    content: le lait des chèvres suffira à ta nourriture, à celle de ta famille,
  - type: text
    content: et à l’entretien de tes servantes.
  '3':
  - type: text
    content: La pierre est lourde et le sable pesant,
  - type: text
    content: mais l’irritation causée par l’insensé est plus lourde que ces deux ensemble.
  '4':
  - type: text
    content: Cruelle est la colère et impétueuse la fureur,
  - type: text
    content: mais qui tiendra devant la jalousie ?
  '5':
  - type: text
    content: Mieux vaut un reproche énoncé franchement,
  - type: text
    content: qu’un amour qui cache ce qu’il pense.
  '6':
  - type: text
    content: Un ami qui vous blesse vous prouve par là sa fidélité,
  - type: text
    content: mais un ennemi multiplie les embrassades.
  '7':
  - type: text
    content: Qui est rassasié dédaigne le miel,
  - type: text
    content: mais, pour l’affamé, même ce qui est amer paraît doux.
  '8':
  - type: text
    content: L’homme qui erre loin de son pays
  - type: text
    content: est comme un oiseau errant loin de son nid.
  '9':
  - type: text
    content: L’huile odorante et les parfums mettent le cœur en joie,
  - type: text
    content: et le conseil donné du fond du cœur rend douce l’amitié
  - type: note
    content: 'Sens incertain. L’ancienne version grecque a : mais les malheurs troublent l’esprit.'
  - type: text
    content: .
