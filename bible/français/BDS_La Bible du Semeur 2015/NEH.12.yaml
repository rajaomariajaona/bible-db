document_id: NEH.12,21
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Les prêtres et les lévites revenus de l’exil
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Voici la liste des prêtres et des lévites qui revinrent de l’exil avec Zorobabel, fils de Shealtiel, et avec Josué : c’étaient Seraya, Jérémie, Esdras'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '12.1 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'A ne pas confondre avec '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'Esdras, '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: le prêtre et spécialiste de la Loi, qui était de la famille de Seraya (
        - type: usfm
          marker: ref
          children:
          - type: text
            text: Esd 7.1-5
        - type: text
          text: ).
      marker-yv: yv-n
    - type: text
      text: ', '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'Josué fut le père de Yoyaqim, dont les descendants en ligne directe furent Eliashib, Yoyada, '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'Jonathan et Yaddoua. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'Voici, au temps de Yoyaqim, quels étaient les chefs des familles sacerdotales : pour la famille de Seraya, c’était Meraya ; pour celle de Jérémie, Hanania ; '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'pour la famille d’Esdras, Meshoullam ; pour celle d’Amaria, Yohanân ; '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: pour celle de Melouki, Jonathan ; pour celle de Shebania
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '12.14 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Plusieurs manuscrits hébreux, certains manuscrits de l’ancienne version grecque et la version syriaque (voir '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: Né 12.3
        - type: text
          text: ') ont : '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: Shekania.
      marker-yv: yv-n
    - type: text
      text: ', Joseph ; '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: pour celle de Harim, Adna ; pour celle de Merayoth
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '12.15 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Certains manuscrits de l’ancienne version grecque (voir '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: Né 12.3
        - type: text
          text: ') ont : '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: Merémoth.
      marker-yv: yv-n
    - type: text
      text: ', Helkaï ; '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'pour celle d’Iddo, Zacharie ; pour celle de Guinnethôn, Meshoullam ; '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: pour celle d’Abiya, Zikri ; pour celle de Minyamîn, Moadia, Pilthaï
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '12.17 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Il est possible qu’il manque ici un nom : '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: Minyamîn, X ; pour celle de Moadia, …
      marker-yv: yv-n
    - type: text
      text: '  ; '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'pour celle de Bilga, Shammoua ; pour celle de Shemaya, Jonathan ; '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'pour celle de Yoyarib, Matthnaï ; pour celle de Yedaeya, Ouzzi ; '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'Amaria, Mallouk, Hattoush, '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: 'pour celle de Sallaï, Qallaï ; pour celle d’Amoq, Eber ; '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: pour celle de Hilqiya, Hashabia ; pour celle de Yedaeya, Netanéel.
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: 'Au temps d’Eliashib, de Yoyada, de Yohanân et de Yaddoua, on fit des listes des chefs de familles lévitiques et sacerdotales. Elles furent établies pendant le règne de Darius, le Perse. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: Les noms des chefs de familles lévitiques furent inscrits sur le livre des Annales jusqu’au temps de Yohanân, fils d’Eliashib.
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: 'Les chefs des lévites, Hashabia, Shérébia et Josué, fils de Qadmiel, ainsi que leurs collègues se tenaient les uns en face des autres pour louer et célébrer l’Eternel, conformément aux instructions laissées par David, homme de Dieu. Ils se répondaient tour à tour les uns aux autres. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: 'Les portiers Mattania, Baqbouqia, Abdias, Meshoullam, Talmôn et Aqqoub montaient la garde auprès des entrepôts situés près des portes du Temple. '
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: Tels sont ceux qui étaient en fonction au temps de Yoyaqim, fils de Josué, et petit-fils de Yotsadaq, et au temps de Néhémie, le gouverneur, et d’Esdras, le prêtre et spécialiste de la Loi.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: La dédicace solennelle de la muraille
    marker-yv: yv-h
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: 'Lors de l’inauguration de la muraille de Jérusalem, on fit venir les lévites à Jérusalem de toutes les localités où ils habitaient, afin de célébrer l’événement dans la joie, par la louange et par le chant des cantiques accompagnés par les cymbales, les luths et les lyres. '
  '28':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: 'Les musiciens se rassemblèrent du district des alentours de Jérusalem, ainsi que des environs de Netopha, '
  '29':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: 'de Beth-Guilgal et des territoires de Guéba et d’Azmaveth, car ils s’étaient construit des villages autour de Jérusalem. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'Shekania, Rehoum, Merémoth, '
  '30':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '30'
    - type: text
      text: Les prêtres et les lévites accomplirent les rites de purification, tant pour eux-mêmes que pour le peuple, pour les portes et pour la muraille.
  '31':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '31'
    - type: text
      text: Je fis monter sur la muraille
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '12.31 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Autre traduction : '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: aller le long de la muraille.
      marker-yv: yv-n
    - type: text
      text: ' les chefs de Juda et je formai deux grands chœurs. Le premier se dirigea du côté droit et marcha sur la muraille'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '12.31 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Autre traduction : '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: marcha le long de la muraille.
      marker-yv: yv-n
    - type: text
      text: ' vers la porte du Fumier. '
  '32':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '32'
    - type: text
      text: 'Derrière les choristes venaient Osée et la moitié des chefs de Juda, '
  '33':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '33'
    - type: text
      text: 'Azaria, Esdras, Meshoullam, '
  '34':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '34'
    - type: text
      text: 'Juda, Benjamin, Shemaya et Jérémie. '
  '35':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '35'
    - type: text
      text: 'Puis venaient des prêtres munis de trompettes : Zacharie, fils de Jonathan, qui avait pour ascendants Shemaya, Mattania, Michée et Zakkour, Asaph, '
  '36':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '36'
    - type: text
      text: 'et ses collègues Shemaya, Azaréel, Milalaï, Guilalaï, Maaï, Netanéel, Juda et Hanani qui jouaient des instruments de David, homme de Dieu. Esdras, le spécialiste de la Loi, était à leur tête. '
  '37':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '37'
    - type: text
      text: A la porte de la Source, ils gravirent en face d’eux les marches qui les conduisaient à la Cité de David, par la montée qui mène au rempart qui surplombe l’ancien palais de David, puis ils continuèrent jusqu’à la porte des Eaux, du côté oriental de la ville.
  '38':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '38'
    - type: text
      text: Le second chœur partit vers la gauche. Je les suivis avec l’autre moitié du peuple sur le haut de la muraille
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '12.38 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Autre traduction : '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: le long de la muraille.
      marker-yv: yv-n
    - type: text
      text: '. Nous avons passé près de la tour des Fours, puis par l’endroit où la muraille s’élargit, '
  '39':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '39'
    - type: text
      text: au-dessus de la porte d’Ephraïm, de la porte de la vieille ville, puis de la porte des Poissons, puis la tour de Hananéel et la tour de Méa jusqu’à la porte des Brebis. On s’arrêta à la porte de la Prison.
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'Iddo, Guinnethoï, Abiya, '
  '40':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '40'
    - type: text
      text: 'Les deux chœurs prirent place dans le temple de Dieu. Je fis de même, avec la moitié des chefs du peuple '
  '41':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '41'
    - type: text
      text: 'ainsi que les prêtres Eliaqim, Maaséya, Minyamîn, Michée, Elyoénaï, Zacharie et Hanania, qui portaient des trompettes. '
  '42':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '42'
    - type: text
      text: Il y avait aussi Maaséya, Shemaya, Eléazar, Ouzzi, Yohanân, Malkiya, Elam et Ezer. Les musiciens faisaient résonner leurs cantiques sous la direction de Yizrahya.
  '43':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '43'
    - type: text
      text: Les gens offrirent ce jour-là de nombreux sacrifices et ils s’adonnèrent à la joie car Dieu leur avait accordé un grand sujet de joie. Les femmes et les enfants prirent part aux réjouissances et l’on entendait de loin les cris de joie qui retentissaient à Jérusalem.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: L’organisation de la collecte des offrandes et des dîmes
    marker-yv: yv-h
  '44':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '44'
    - type: text
      text: 'A cette époque, des hommes furent préposés à la surveillance des salles où étaient entreposées les offrandes et les dîmes. On les chargea d’y recueillir les parts attribuées par la Loi aux prêtres et aux lévites, provenant des champs qui entouraient les villes. En effet, le peuple de Juda se réjouissait de ce que les prêtres et les lévites étaient en fonction, '
  '45':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '45'
    - type: text
      text: de ce qu’ils assuraient le service de leur Dieu et accomplissaient les rites de purification, et de ce que les musiciens et les portiers assumaient leurs fonctions conformément aux instructions de David et de son fils Salomon
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '12.45 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Voir 1 Ch 25.1-8 ; 26.1-12.
      marker-yv: yv-n
    - type: text
      text: '. '
  '46':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '46'
    - type: text
      text: 'En effet, il y avait eu autrefois, du temps de David et d’Asaph, des chefs des musiciens qui exécutaient les chants de louange et de reconnaissance en l’honneur de Dieu. '
  '47':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '47'
    - type: text
      text: A l’époque de Zorobabel et au temps de Néhémie, tout le peuple d’Israël donnait chaque jour aux musiciens et aux portiers les parts qui leur revenaient. Ils remettaient aussi aux lévites les redevances sacrées, ceux-ci donnaient aux descendants d’Aaron la part qui leur revenait.
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'Miyamîn, Maadia, Bilga, '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'Shemaya, Yoyarib, Yedaeya, '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: Sallou, Amoq, Hilqiya, Yedaeya. C’étaient là les chefs des prêtres et leurs collègues au temps de Josué.
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'Parmi les lévites, il y avait : Josué, Binnouï, Qadmiel, Shérébia, Juda et Mattania, responsable avec ses collègues des chants de louange. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'Leurs collègues Baqbouqia et Ounni se tenaient en face d’eux pour leur répondre. '
