document_id: NEH.12,21
type_code: fra
verses:
  '1':
  - type: heading
    content: Les prêtres et les lévites revenus de l’exil
  - type: text
    content: 'Voici la liste des prêtres et des lévites qui revinrent de l’exil avec Zorobabel, fils de Shealtiel, et avec Josué : c’étaient Seraya, Jérémie, Esdras'
  - type: note
    content: A ne pas confondre avec Esdras, le prêtre et spécialiste de la Loi, qui était de la famille de Seraya (Esd 7.1-5).
  - type: text
    content: ', '
  '10':
  - type: text
    content: 'Josué fut le père de Yoyaqim, dont les descendants en ligne directe furent Eliashib, Yoyada, '
  '11':
  - type: text
    content: 'Jonathan et Yaddoua. '
  '12':
  - type: text
    content: 'Voici, au temps de Yoyaqim, quels étaient les chefs des familles sacerdotales : pour la famille de Seraya, c’était Meraya ; pour celle de Jérémie, Hanania ; '
  '13':
  - type: text
    content: 'pour la famille d’Esdras, Meshoullam ; pour celle d’Amaria, Yohanân ; '
  '14':
  - type: text
    content: pour celle de Melouki, Jonathan ; pour celle de Shebania
  - type: note
    content: 'Plusieurs manuscrits hébreux, certains manuscrits de l’ancienne version grecque et la version syriaque (voir Né 12.3) ont : Shekania.'
  - type: text
    content: ', Joseph ; '
  '15':
  - type: text
    content: pour celle de Harim, Adna ; pour celle de Merayoth
  - type: note
    content: 'Certains manuscrits de l’ancienne version grecque (voir Né 12.3) ont : Merémoth.'
  - type: text
    content: ', Helkaï ; '
  '16':
  - type: text
    content: 'pour celle d’Iddo, Zacharie ; pour celle de Guinnethôn, Meshoullam ; '
  '17':
  - type: text
    content: pour celle d’Abiya, Zikri ; pour celle de Minyamîn, Moadia, Pilthaï
  - type: note
    content: 'Il est possible qu’il manque ici un nom : Minyamîn, X ; pour celle de Moadia, …'
  - type: text
    content: '  ; '
  '18':
  - type: text
    content: 'pour celle de Bilga, Shammoua ; pour celle de Shemaya, Jonathan ; '
  '19':
  - type: text
    content: 'pour celle de Yoyarib, Matthnaï ; pour celle de Yedaeya, Ouzzi ; '
  '2':
  - type: text
    content: 'Amaria, Mallouk, Hattoush, '
  '20':
  - type: text
    content: 'pour celle de Sallaï, Qallaï ; pour celle d’Amoq, Eber ; '
  '21':
  - type: text
    content: pour celle de Hilqiya, Hashabia ; pour celle de Yedaeya, Netanéel.
  '22':
  - type: text
    content: 'Au temps d’Eliashib, de Yoyada, de Yohanân et de Yaddoua, on fit des listes des chefs de familles lévitiques et sacerdotales. Elles furent établies pendant le règne de Darius, le Perse. '
  '23':
  - type: text
    content: Les noms des chefs de familles lévitiques furent inscrits sur le livre des Annales jusqu’au temps de Yohanân, fils d’Eliashib.
  '24':
  - type: text
    content: 'Les chefs des lévites, Hashabia, Shérébia et Josué, fils de Qadmiel, ainsi que leurs collègues se tenaient les uns en face des autres pour louer et célébrer l’Eternel, conformément aux instructions laissées par David, homme de Dieu. Ils se répondaient tour à tour les uns aux autres. '
  '25':
  - type: text
    content: 'Les portiers Mattania, Baqbouqia, Abdias, Meshoullam, Talmôn et Aqqoub montaient la garde auprès des entrepôts situés près des portes du Temple. '
  '26':
  - type: text
    content: Tels sont ceux qui étaient en fonction au temps de Yoyaqim, fils de Josué, et petit-fils de Yotsadaq, et au temps de Néhémie, le gouverneur, et d’Esdras, le prêtre et spécialiste de la Loi.
  - type: heading
    content: La dédicace solennelle de la muraille
  '27':
  - type: text
    content: 'Lors de l’inauguration de la muraille de Jérusalem, on fit venir les lévites à Jérusalem de toutes les localités où ils habitaient, afin de célébrer l’événement dans la joie, par la louange et par le chant des cantiques accompagnés par les cymbales, les luths et les lyres. '
  '28':
  - type: text
    content: 'Les musiciens se rassemblèrent du district des alentours de Jérusalem, ainsi que des environs de Netopha, '
  '29':
  - type: text
    content: 'de Beth-Guilgal et des territoires de Guéba et d’Azmaveth, car ils s’étaient construit des villages autour de Jérusalem. '
  '3':
  - type: text
    content: 'Shekania, Rehoum, Merémoth, '
  '30':
  - type: text
    content: Les prêtres et les lévites accomplirent les rites de purification, tant pour eux-mêmes que pour le peuple, pour les portes et pour la muraille.
  '31':
  - type: text
    content: Je fis monter sur la muraille
  - type: note
    content: 'Autre traduction : aller le long de la muraille.'
  - type: text
    content: ' les chefs de Juda et je formai deux grands chœurs. Le premier se dirigea du côté droit et marcha sur la muraille'
  - type: note
    content: 'Autre traduction : marcha le long de la muraille.'
  - type: text
    content: ' vers la porte du Fumier. '
  '32':
  - type: text
    content: 'Derrière les choristes venaient Osée et la moitié des chefs de Juda, '
  '33':
  - type: text
    content: 'Azaria, Esdras, Meshoullam, '
  '34':
  - type: text
    content: 'Juda, Benjamin, Shemaya et Jérémie. '
  '35':
  - type: text
    content: 'Puis venaient des prêtres munis de trompettes : Zacharie, fils de Jonathan, qui avait pour ascendants Shemaya, Mattania, Michée et Zakkour, Asaph, '
  '36':
  - type: text
    content: 'et ses collègues Shemaya, Azaréel, Milalaï, Guilalaï, Maaï, Netanéel, Juda et Hanani qui jouaient des instruments de David, homme de Dieu. Esdras, le spécialiste de la Loi, était à leur tête. '
  '37':
  - type: text
    content: A la porte de la Source, ils gravirent en face d’eux les marches qui les conduisaient à la Cité de David, par la montée qui mène au rempart qui surplombe l’ancien palais de David, puis ils continuèrent jusqu’à la porte des Eaux, du côté oriental de la ville.
  '38':
  - type: text
    content: Le second chœur partit vers la gauche. Je les suivis avec l’autre moitié du peuple sur le haut de la muraille
  - type: note
    content: 'Autre traduction : le long de la muraille.'
  - type: text
    content: '. Nous avons passé près de la tour des Fours, puis par l’endroit où la muraille s’élargit, '
  '39':
  - type: text
    content: au-dessus de la porte d’Ephraïm, de la porte de la vieille ville, puis de la porte des Poissons, puis la tour de Hananéel et la tour de Méa jusqu’à la porte des Brebis. On s’arrêta à la porte de la Prison.
  '4':
  - type: text
    content: 'Iddo, Guinnethoï, Abiya, '
  '40':
  - type: text
    content: 'Les deux chœurs prirent place dans le temple de Dieu. Je fis de même, avec la moitié des chefs du peuple '
  '41':
  - type: text
    content: 'ainsi que les prêtres Eliaqim, Maaséya, Minyamîn, Michée, Elyoénaï, Zacharie et Hanania, qui portaient des trompettes. '
  '42':
  - type: text
    content: Il y avait aussi Maaséya, Shemaya, Eléazar, Ouzzi, Yohanân, Malkiya, Elam et Ezer. Les musiciens faisaient résonner leurs cantiques sous la direction de Yizrahya.
  '43':
  - type: text
    content: Les gens offrirent ce jour-là de nombreux sacrifices et ils s’adonnèrent à la joie car Dieu leur avait accordé un grand sujet de joie. Les femmes et les enfants prirent part aux réjouissances et l’on entendait de loin les cris de joie qui retentissaient à Jérusalem.
  - type: heading
    content: L’organisation de la collecte des offrandes et des dîmes
  '44':
  - type: text
    content: 'A cette époque, des hommes furent préposés à la surveillance des salles où étaient entreposées les offrandes et les dîmes. On les chargea d’y recueillir les parts attribuées par la Loi aux prêtres et aux lévites, provenant des champs qui entouraient les villes. En effet, le peuple de Juda se réjouissait de ce que les prêtres et les lévites étaient en fonction, '
  '45':
  - type: text
    content: de ce qu’ils assuraient le service de leur Dieu et accomplissaient les rites de purification, et de ce que les musiciens et les portiers assumaient leurs fonctions conformément aux instructions de David et de son fils Salomon
  - type: note
    content: Voir 1 Ch 25.1-8 ; 26.1-12.
  - type: text
    content: '. '
  '46':
  - type: text
    content: 'En effet, il y avait eu autrefois, du temps de David et d’Asaph, des chefs des musiciens qui exécutaient les chants de louange et de reconnaissance en l’honneur de Dieu. '
  '47':
  - type: text
    content: A l’époque de Zorobabel et au temps de Néhémie, tout le peuple d’Israël donnait chaque jour aux musiciens et aux portiers les parts qui leur revenaient. Ils remettaient aussi aux lévites les redevances sacrées, ceux-ci donnaient aux descendants d’Aaron la part qui leur revenait.
  '5':
  - type: text
    content: 'Miyamîn, Maadia, Bilga, '
  '6':
  - type: text
    content: 'Shemaya, Yoyarib, Yedaeya, '
  '7':
  - type: text
    content: Sallou, Amoq, Hilqiya, Yedaeya. C’étaient là les chefs des prêtres et leurs collègues au temps de Josué.
  '8':
  - type: text
    content: 'Parmi les lévites, il y avait : Josué, Binnouï, Qadmiel, Shérébia, Juda et Mattania, responsable avec ses collègues des chants de louange. '
  '9':
  - type: text
    content: 'Leurs collègues Baqbouqia et Ounni se tenaient en face d’eux pour leur répondre. '
