document_id: 2TH.1,21
type_code: fra
verses:
  '1':
  - type: heading
    content: Salutation
  - type: text
    content: Paul, Silvain et Timothée saluent l’Eglise des Thessaloniciens dans la communion avec Dieu le Père et avec le Seigneur Jésus-Christ.
  '10':
  - type: text
    content: lorsqu’il viendra pour être en ce jour-là honoré dans la personne des membres du peuple saint
  - type: note
    content: 'Autre traduction : de ses saints anges.'
  - type: text
    content: ' et admiré dans la personne de tous les croyants'
  - type: note
    content: 'D’autres comprennent : honoré par ceux qui lui appartiennent et admiré par tous les croyants.'
  - type: text
    content: . Et vous aussi, vous en ferez partie, puisque vous avez cru au message que nous vous avons annoncé.
  '11':
  - type: text
    content: 'C’est pourquoi nous prions continuellement notre Dieu pour vous : qu’il vous trouve dignes de l’appel qu’il vous a adressé et que, par sa puissance, il fasse aboutir tous vos désirs de faire le bien et rende parfaite l’œuvre que votre foi vous fait entreprendre. '
  '12':
  - type: text
    content: Ainsi le Seigneur Jésus-Christ sera honoré en vous et vous serez honorés en lui
  - type: note
    content: 'Autre traduction : honoré par vous… honorés par lui.'
  - type: text
    content: '  ; ce sera là un effet de la grâce de notre Dieu et Seigneur Jésus-Christ'
  - type: note
    content: 'Autre traduction : de notre Dieu et du Seigneur Jésus-Christ.'
  - type: text
    content: .
  '2':
  - type: text
    content: Que la grâce et la paix vous soient accordées par Dieu notre Père et par le Seigneur Jésus-Christ.
  - type: heading
    content: Prière de reconnaissance et encouragements
  '3':
  - type: text
    content: Nous devons toujours remercier Dieu à votre sujet, frères et sœurs, et il est juste que nous le fassions. En effet, votre foi fait de magnifiques progrès et, en chacun de vous, l’amour que vous vous portez les uns aux autres ne cesse d’augmenter.
  '4':
  - type: text
    content: Aussi exprimons-nous dans les Eglises de Dieu notre fierté en ce qui vous concerne, à cause de votre persévérance et de votre foi au milieu de toutes les persécutions et de toutes les détresses que vous endurez.
  '5':
  - type: text
    content: 'Ici se laisse voir le juste jugement de Dieu qui désire vous trouver dignes de son royaume pour lequel vous souffrez. '
  '6':
  - type: text
    content: 'En effet, il est juste aux yeux de Dieu de rendre la souffrance à ceux qui vous font souffrir, '
  '7':
  - type: text
    content: 'et de vous accorder, à vous qui souffrez, du repos avec nous. Cela se produira lorsque le Seigneur Jésus apparaîtra du haut du ciel, avec ses anges puissants '
  '8':
  - type: text
    content: 'et dans '
  - type: text
    content: une flamme
  - type: text
    content: '. Ce jour-là, '
  - type: text
    content: il punira comme ils le méritent ceux qui ne connaissent pas Dieu
  - type: note
    content: Ex 3.2 ; Es 66.15 ; Jr 10.25.
  - type: text
    content: ' et qui n’obéissent pas à l’Evangile de notre Seigneur Jésus. '
  '9':
  - type: text
    content: 'Ils auront pour châtiment une ruine éternelle, '
  - type: text
    content: loin de la présence du Seigneur et de sa puissance glorieuse
  - type: note
    content: Es 2.10.
  - type: text
    content: ' '
