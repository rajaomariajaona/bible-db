document_id: 2TH.1,21
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Salutation
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: Paul, Silvain et Timothée saluent l’Eglise des Thessaloniciens dans la communion avec Dieu le Père et avec le Seigneur Jésus-Christ.
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: lorsqu’il viendra pour être en ce jour-là honoré dans la personne des membres du peuple saint
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1.10 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Autre traduction : '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: de ses saints anges.
      marker-yv: yv-n
    - type: text
      text: ' et admiré dans la personne de tous les croyants'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1.10 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'D’autres comprennent : '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: honoré par ceux qui lui appartiennent et admiré par tous les croyants.
      marker-yv: yv-n
    - type: text
      text: . Et vous aussi, vous en ferez partie, puisque vous avez cru au message que nous vous avons annoncé.
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'C’est pourquoi nous prions continuellement notre Dieu pour vous : qu’il vous trouve dignes de l’appel qu’il vous a adressé et que, par sa puissance, il fasse aboutir tous vos désirs de faire le bien et rende parfaite l’œuvre que votre foi vous fait entreprendre. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: Ainsi le Seigneur Jésus-Christ sera honoré en vous et vous serez honorés en lui
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1.12 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Autre traduction : '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: honoré par vous… honorés par lui.
      marker-yv: yv-n
    - type: text
      text: '  ; ce sera là un effet de la grâce de notre Dieu et Seigneur Jésus-Christ'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1.12 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Autre traduction : '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: de notre Dieu et du Seigneur Jésus-Christ.
      marker-yv: yv-n
    - type: text
      text: .
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: Que la grâce et la paix vous soient accordées par Dieu notre Père et par le Seigneur Jésus-Christ.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Prière de reconnaissance et encouragements
    marker-yv: yv-h
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: Nous devons toujours remercier Dieu à votre sujet, frères et sœurs, et il est juste que nous le fassions. En effet, votre foi fait de magnifiques progrès et, en chacun de vous, l’amour que vous vous portez les uns aux autres ne cesse d’augmenter.
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: Aussi exprimons-nous dans les Eglises de Dieu notre fierté en ce qui vous concerne, à cause de votre persévérance et de votre foi au milieu de toutes les persécutions et de toutes les détresses que vous endurez.
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'Ici se laisse voir le juste jugement de Dieu qui désire vous trouver dignes de son royaume pour lequel vous souffrez. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'En effet, il est juste aux yeux de Dieu de rendre la souffrance à ceux qui vous font souffrir, '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'et de vous accorder, à vous qui souffrez, du repos avec nous. Cela se produira lorsque le Seigneur Jésus apparaîtra du haut du ciel, avec ses anges puissants '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'et dans '
    - type: usfm
      marker: qt
      children:
      - type: text
        text: une flamme
    - type: text
      text: '. Ce jour-là, '
    - type: usfm
      marker: qt
      children:
      - type: text
        text: il punira comme ils le méritent ceux qui ne connaissent pas Dieu
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1.8 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Ex 3.2 ; Es 66.15 ; Jr 10.25.
      marker-yv: yv-n
    - type: text
      text: ' et qui n’obéissent pas à l’Evangile de notre Seigneur Jésus. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'Ils auront pour châtiment une ruine éternelle, '
    - type: usfm
      marker: qt
      children:
      - type: text
        text: loin de la présence du Seigneur et de sa puissance glorieuse
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1.9 '
      - type: usfm
        marker: ft
        children:
        - type: usfm
          marker: ref
          children:
          - type: text
            text: Es 2.10
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: ' '
