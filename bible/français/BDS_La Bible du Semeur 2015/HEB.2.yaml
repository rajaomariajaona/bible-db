document_id: HEB.2,21
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ne pas négliger le salut apporté par le Fils
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: Puisqu’il en est ainsi, nous devons prendre encore plus au sérieux les enseignements que nous avons reçus afin de ne pas être entraînés à la dérive.
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: En effet, Dieu, qui a créé tout ce qui existe et pour qui sont toutes choses, voulait conduire beaucoup de fils à participer à la gloire. Il lui convenait pour cela d’élever à la perfection par ses souffrances celui qui devait leur ouvrir le chemin du salut
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '2.10 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Autre traduction : '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'le chef du salut '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '(voir '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: '12.2'
        - type: text
          text: ).
      marker-yv: yv-n
    - type: text
      text: '. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Car Jésus, qui purifie les hommes de leurs péchés, et ceux qui sont ainsi purifiés partagent la même humanité
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '2.11 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Autre traduction : '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'ont tous la même origine : Dieu.'
      marker-yv: yv-n
    - type: text
      text: '. C’est pourquoi il n’a pas honte de les appeler ses '
    - type: usfm
      marker: qt
      children:
      - type: text
        text: frères et sœurs
    - type: text
      text: ' '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'lorsqu’il dit :'
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: qt
      children:
      - type: text
        text: Je proclamerai à mes frères
    - type: text
      text: ' ╵'
    - type: usfm
      marker: qt
      children:
      - type: text
        text: quel Dieu tu es,
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: qt
      children:
      - type: text
        text: je te louerai
    - type: text
      text: ' ╵'
    - type: usfm
      marker: qt
      children:
      - type: text
        text: dans l’assemblée
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '2.12 '
      - type: usfm
        marker: ft
        children:
        - type: usfm
          marker: ref
          children:
          - type: text
            text: Ps 22.23
        - type: text
          text: .
      marker-yv: yv-n
    - type: usfm
      marker: qt
      children:
      - type: text
        text: .
  '13':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'Il dit aussi : '
    - type: usfm
      marker: qt
      children:
      - type: text
        text: 'Pour moi, je mettrai toute ma '
      - type: usfm
        marker: w
        children:
        - type: text
          text: confiance
      - type: text
        text: ' en Dieu'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '2.13 '
      - type: usfm
        marker: ft
        children:
        - type: usfm
          marker: ref
          children:
          - type: text
            text: Es 8.17
        - type: text
          text: ' cité selon l’ancienne version grecque.'
      marker-yv: yv-n
    - type: text
      text: ', et encore : '
    - type: usfm
      marker: qt
      children:
      - type: text
        text: Me voici avec les disciples que Dieu m’a donnés
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '2.13 '
      - type: usfm
        marker: ft
        children:
        - type: usfm
          marker: ref
          children:
          - type: text
            text: Es 8.18
        - type: text
          text: .
      marker-yv: yv-n
    - type: usfm
      marker: qt
      children:
      - type: text
        text: .
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ainsi donc, puisque ces '
    - type: usfm
      marker: qt
      children:
      - type: text
        text: disciples
    - type: text
      text: ' sont des êtres de chair et de sang, lui aussi, de la même façon, a partagé leur condition. Il l’a fait pour réduire à l’impuissance, par la mort, celui qui détenait le pouvoir de la mort, c’est-à-dire le diable, '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: et pour délivrer tous ceux qui étaient réduits à l’esclavage leur vie durant par la peur de la mort.
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Car ce n’est évidemment pas pour porter secours à des anges qu’il est venu ; non, c’est à la descendance d’Abraham qu’il vient en aide. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Voilà pourquoi il devait être rendu, à tous égards, semblable à ses '
    - type: usfm
      marker: qt
      children:
      - type: text
        text: frères
    - type: text
      text: ' afin de devenir un grand-prêtre plein de compassion et fidèle dans le domaine des relations de l’homme avec Dieu, en vue d’expier les péchés de son peuple. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Car, puisqu’il a lui-même été éprouvé dans ce qu’il a souffert, il peut secourir ceux qui sont éprouvés.
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'En effet, la parole transmise à nos ancêtres par des anges est entrée pleinement en vigueur et chaque transgression, chaque désobéissance, a reçu la sanction qu’elle méritait. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Alors, comment pourrons-nous échapper nous-mêmes au châtiment si nous négligeons un si grand salut ? Car ce salut a tout d’abord été annoncé par le Seigneur lui-même, ceux qui l’ont entendu en ont ensuite confirmé la validité pour nous '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: et Dieu a authentifié leur témoignage en y ajoutant le sien, c’est-à-dire, en accomplissant toutes sortes de signes miraculeux, d’actes extraordinaires, de manifestations diverses de sa puissance et en accordant à ces témoins, selon sa propre volonté, de recevoir chacun sa juste part de l’Esprit Saint.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Dieu a tout soumis au Fils
    marker-yv: yv-h
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Car ce n’est pas à des anges que Dieu a soumis le monde à venir dont nous parlons. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Au contraire, quelqu’un, dans un texte de l’Ecriture, déclare :'
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: qt
      children:
      - type: text
        text: Qu’est-ce que l’homme,
    - type: text
      text: ' ╵'
    - type: usfm
      marker: qt
      children:
      - type: text
        text: pour que tu prennes soin de lui ?
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: qt
      children:
      - type: text
        text: Qu’est-ce qu’un être humain
    - type: text
      text: ' ╵'
    - type: usfm
      marker: qt
      children:
      - type: text
        text: pour que tu t’intéresses à lui ?
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: qt
      children:
      - type: text
        text: Tu l’as abaissé pour un peu de temps
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '2.7 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Autre traduction : '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: quelque peu.
      marker-yv: yv-n
    - type: text
      text: ╵
    - type: usfm
      marker: qt
      children:
      - type: text
        text: au-dessous des anges,
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: qt
      children:
      - type: text
        text: tu l’as couronné de gloire et d’honneur
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '2.7 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Certains manuscrits ajoutent : '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: tu l’as établi roi sur les œuvres de tes mains.
      marker-yv: yv-n
    - type: usfm
      marker: qt
      children:
      - type: text
        text: ','
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: qt
      children:
      - type: text
        text: tu as tout mis sous ses pieds
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '2.8 '
      - type: usfm
        marker: ft
        children:
        - type: usfm
          marker: ref
          children:
          - type: text
            text: Ps 8.5-7
        - type: text
          text: ' cité selon l’ancienne version grecque.'
      marker-yv: yv-n
    - type: usfm
      marker: qt
      children:
      - type: text
        text: .
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'En soumettant '
    - type: usfm
      marker: qt
      children:
      - type: text
        text: tout
    - type: text
      text: ' à son autorité, Dieu n’a rien laissé qui puisse ne pas lui être soumis. Or actuellement nous ne voyons pas encore que tout lui soit soumis. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Mais voici ce que nous constatons : après avoir été '
    - type: usfm
      marker: qt
      children:
      - type: text
        text: abaissé pour un peu de temps au-dessous des anges
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '2.9 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Durant le ministère terrestre de Jésus.
      marker-yv: yv-n
    - type: text
      text: ', Jésus se trouve maintenant '
    - type: usfm
      marker: qt
      children:
      - type: text
        text: couronné de gloire et d’honneur
    - type: text
      text: ', à cause de la mort qu’il a soufferte. Ainsi, par la grâce de Dieu, c’est pour tous les hommes qu’il a connu la mort.'
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Le Fils, frère des hommes
    marker-yv: yv-h
