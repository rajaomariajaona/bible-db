document_id: HEB.2,21
type_code: fra
verses:
  '1':
  - type: heading
    content: Ne pas négliger le salut apporté par le Fils
  - type: text
    content: Puisqu’il en est ainsi, nous devons prendre encore plus au sérieux les enseignements que nous avons reçus afin de ne pas être entraînés à la dérive.
  '10':
  - type: text
    content: En effet, Dieu, qui a créé tout ce qui existe et pour qui sont toutes choses, voulait conduire beaucoup de fils à participer à la gloire. Il lui convenait pour cela d’élever à la perfection par ses souffrances celui qui devait leur ouvrir le chemin du salut
  - type: note
    content: 'Autre traduction : le chef du salut (voir 12.2).'
  - type: text
    content: '. '
  '11':
  - type: text
    content: Car Jésus, qui purifie les hommes de leurs péchés, et ceux qui sont ainsi purifiés partagent la même humanité
  - type: note
    content: 'Autre traduction : ont tous la même origine : Dieu.'
  - type: text
    content: '. C’est pourquoi il n’a pas honte de les appeler ses '
  - type: text
    content: frères et sœurs
  - type: text
    content: ' '
  '12':
  - type: text
    content: 'lorsqu’il dit :'
  - type: text
    content: Je proclamerai à mes frères
  - type: text
    content: ' ╵'
  - type: text
    content: quel Dieu tu es,
  - type: text
    content: je te louerai
  - type: text
    content: ' ╵'
  - type: text
    content: dans l’assemblée
  - type: note
    content: Ps 22.23.
  - type: text
    content: .
  '13':
  - type: text
    content: 'Il dit aussi : '
  - type: text
    content: 'Pour moi, je mettrai toute ma '
  - type: text
    content: confiance
  - type: text
    content: ' en Dieu'
  - type: note
    content: Es 8.17 cité selon l’ancienne version grecque.
  - type: text
    content: ', et encore : '
  - type: text
    content: Me voici avec les disciples que Dieu m’a donnés
  - type: note
    content: Es 8.18.
  - type: text
    content: .
  '14':
  - type: text
    content: 'Ainsi donc, puisque ces '
  - type: text
    content: disciples
  - type: text
    content: ' sont des êtres de chair et de sang, lui aussi, de la même façon, a partagé leur condition. Il l’a fait pour réduire à l’impuissance, par la mort, celui qui détenait le pouvoir de la mort, c’est-à-dire le diable, '
  '15':
  - type: text
    content: et pour délivrer tous ceux qui étaient réduits à l’esclavage leur vie durant par la peur de la mort.
  '16':
  - type: text
    content: 'Car ce n’est évidemment pas pour porter secours à des anges qu’il est venu ; non, c’est à la descendance d’Abraham qu’il vient en aide. '
  '17':
  - type: text
    content: 'Voilà pourquoi il devait être rendu, à tous égards, semblable à ses '
  - type: text
    content: frères
  - type: text
    content: ' afin de devenir un grand-prêtre plein de compassion et fidèle dans le domaine des relations de l’homme avec Dieu, en vue d’expier les péchés de son peuple. '
  '18':
  - type: text
    content: Car, puisqu’il a lui-même été éprouvé dans ce qu’il a souffert, il peut secourir ceux qui sont éprouvés.
  '2':
  - type: text
    content: 'En effet, la parole transmise à nos ancêtres par des anges est entrée pleinement en vigueur et chaque transgression, chaque désobéissance, a reçu la sanction qu’elle méritait. '
  '3':
  - type: text
    content: 'Alors, comment pourrons-nous échapper nous-mêmes au châtiment si nous négligeons un si grand salut ? Car ce salut a tout d’abord été annoncé par le Seigneur lui-même, ceux qui l’ont entendu en ont ensuite confirmé la validité pour nous '
  '4':
  - type: text
    content: et Dieu a authentifié leur témoignage en y ajoutant le sien, c’est-à-dire, en accomplissant toutes sortes de signes miraculeux, d’actes extraordinaires, de manifestations diverses de sa puissance et en accordant à ces témoins, selon sa propre volonté, de recevoir chacun sa juste part de l’Esprit Saint.
  - type: heading
    content: Dieu a tout soumis au Fils
  '5':
  - type: text
    content: 'Car ce n’est pas à des anges que Dieu a soumis le monde à venir dont nous parlons. '
  '6':
  - type: text
    content: 'Au contraire, quelqu’un, dans un texte de l’Ecriture, déclare :'
  - type: text
    content: Qu’est-ce que l’homme,
  - type: text
    content: ' ╵'
  - type: text
    content: pour que tu prennes soin de lui ?
  - type: text
    content: Qu’est-ce qu’un être humain
  - type: text
    content: ' ╵'
  - type: text
    content: pour que tu t’intéresses à lui ?
  '7':
  - type: text
    content: ' '
  - type: text
    content: Tu l’as abaissé pour un peu de temps
  - type: text
    content: ' '
  - type: note
    content: 'Autre traduction : quelque peu.'
  - type: text
    content: ╵
  - type: text
    content: au-dessous des anges,
  - type: text
    content: tu l’as couronné de gloire et d’honneur
  - type: text
    content: ' '
  - type: note
    content: 'Certains manuscrits ajoutent : tu l’as établi roi sur les œuvres de tes mains.'
  - type: text
    content: ','
  '8':
  - type: text
    content: ' '
  - type: text
    content: tu as tout mis sous ses pieds
  - type: text
    content: ' '
  - type: note
    content: Ps 8.5-7 cité selon l’ancienne version grecque.
  - type: text
    content: .
  - type: text
    content: 'En soumettant '
  - type: text
    content: tout
  - type: text
    content: ' à son autorité, Dieu n’a rien laissé qui puisse ne pas lui être soumis. Or actuellement nous ne voyons pas encore que tout lui soit soumis. '
  '9':
  - type: text
    content: 'Mais voici ce que nous constatons : après avoir été '
  - type: text
    content: abaissé pour un peu de temps au-dessous des anges
  - type: note
    content: Durant le ministère terrestre de Jésus.
  - type: text
    content: ', Jésus se trouve maintenant '
  - type: text
    content: couronné de gloire et d’honneur
  - type: text
    content: ', à cause de la mort qu’il a soufferte. Ainsi, par la grâce de Dieu, c’est pour tous les hommes qu’il a connu la mort.'
  - type: heading
    content: Le Fils, frère des hommes
