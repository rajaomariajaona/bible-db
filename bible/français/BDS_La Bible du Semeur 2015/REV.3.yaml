document_id: REV.3,21
type_code: fra
verses:
  '1':
  - type: heading
    content: A l’Eglise qui est à Sardes
  - type: text
    content: ' '
  - type: text
    content: A l’
  - type: text
    content: ange
  - type: text
    content: ' de l’Eglise qui est à Sardes, écris : « Voici ce que dit celui qui a les sept esprits de Dieu'
  - type: text
    content: ' '
  - type: note
    content: C’est-à-dire l’Esprit de Dieu dans sa plénitude (comparer 1.4).
  - type: text
    content: 'et les sept étoiles : Je connais ta conduite, je sais que tu passes pour être vivant, mais tu es mort.'
  - type: text
    content: ' '
  '10':
  - type: text
    content: Tu as gardé le commandement de persévérer que je t’ai donné. C’est pourquoi, à mon tour, je te garderai à l’heure de l’épreuve qui va venir sur le monde entier pour éprouver tous les habitants de la terre.
  - type: text
    content: ' '
  '11':
  - type: text
    content: Je viens bientôt, tiens ferme ce que tu as pour que personne ne te ravisse ta couronne.
  '12':
  - type: text
    content: ' '
  - type: text
    content: 'Du vainqueur, je ferai un pilier dans le '
  - type: text
    content: temple
  - type: text
    content: ' de mon Dieu, et il n’en sortira plus jamais. Je graverai sur lui le nom de mon Dieu et celui de la ville de mon Dieu, la nouvelle '
  - type: text
    content: Jérusalem
  - type: text
    content: ', qui descend du ciel d’auprès de mon Dieu, ainsi que mon nom nouveau.'
  '13':
  - type: text
    content: ' '
  - type: text
    content: Que celui qui a des oreilles écoute ce que l’Esprit dit aux Eglises. »
  - type: heading
    content: A l’Eglise qui est à Laodicée
  '14':
  - type: text
    content: ' '
  - type: text
    content: A l’
  - type: text
    content: ange
  - type: text
    content: ' de l’Eglise qui est à Laodicée, écris : « Voici ce que dit celui qui s’appelle '
  - type: text
    content: Amen
  - type: text
    content: ' '
  - type: note
    content: C’est-à-dire celui en qui tout est vrai, certain, en qui toutes les promesses de Dieu sont accomplies (voir 2 Co 1.20).
  - type: text
    content: ', le témoin digne de foi et véridique, '
  - type: text
    content: celui qui est au commencement de la création de Dieu
  - type: text
    content: ' '
  - type: note
    content: 'Voir Ap 22.13 ; Pr 8.22. Autre traduction : Celui qui a présidé à la création de Dieu.'
  - type: text
    content: .
  - type: text
    content: ' '
  '15':
  - type: text
    content: Je connais ta conduite et je sais que tu n’es ni froid, ni bouillant. Ah ! si seulement tu étais froid ou bouillant !
  '16':
  - type: text
    content: ' '
  - type: text
    content: Mais puisque tu es tiède, puisque tu n’es ni froid, ni bouillant, je vais te vomir de ma bouche.
  - type: text
    content: ' '
  '17':
  - type: text
    content: 'Tu dis : Je suis riche ! J’ai amassé des trésors ! Je n’ai besoin de rien ! Et tu ne te rends pas compte que tu es misérable et pitoyable, que tu es pauvre, aveugle et nu !'
  - type: text
    content: ' '
  '18':
  - type: text
    content: 'C’est pourquoi je te donne un conseil : achète chez moi de l’or purifié au feu pour devenir réellement riche, des vêtements blancs pour te couvrir afin qu’on ne voie pas ta honteuse nudité, et un collyre pour soigner tes yeux afin que tu puisses voir clair.'
  - type: text
    content: ' '
  '19':
  - type: text
    content: Moi, ceux que j’aime, je les reprends et je les corrige
  - type: note
    content: Pr 3.12.
  - type: text
    content: . Fais donc preuve de zèle, et change !
  - type: text
    content: ' '
  '2':
  - type: text
    content: Deviens vigilant, raffermis ceux qui restent et qui étaient sur le point de mourir. Car je n’ai pas trouvé ta conduite parfaite devant mon Dieu.
  - type: text
    content: ' '
  '20':
  - type: text
    content: 'Voici : je me tiens devant la porte et je frappe. Si quelqu’un entend ma voix et ouvre la porte, j’entrerai chez lui et je dînerai avec lui et lui avec moi.'
  '21':
  - type: text
    content: ' '
  - type: text
    content: Le vainqueur, je le ferai siéger avec moi sur mon trône, comme moi-même, je suis allé siéger avec mon Père sur son trône après avoir remporté la victoire.
  '22':
  - type: text
    content: ' '
  - type: text
    content: Que celui qui a des oreilles écoute ce que l’Esprit dit aux Eglises. »
  '3':
  - type: text
    content: 'Rappelle-toi donc comment tu as reçu et entendu la Parole : Obéis et change ! Car, si tu n’es pas vigilant, je viendrai comme un voleur et tu n’auras aucun moyen de savoir à quelle heure je viendrai te surprendre.'
  - type: text
    content: ' '
  '4':
  - type: text
    content: Cependant, tu as à Sardes quelques personnes qui n’ont pas sali leurs vêtements ; elles marcheront avec moi en vêtements blancs, car elles en sont dignes.
  '5':
  - type: text
    content: ' '
  - type: text
    content: Le vainqueur portera ainsi des vêtements blancs, je n’effacerai jamais son nom du livre de vie, je le reconnaîtrai comme mien en présence de mon Père et de ses anges.
  '6':
  - type: text
    content: ' '
  - type: text
    content: Que celui qui a des oreilles écoute ce que l’Esprit dit aux Eglises. »
  - type: heading
    content: A l’Eglise qui est à Philadelphie
  '7':
  - type: text
    content: ' '
  - type: text
    content: A l’
  - type: text
    content: ange
  - type: text
    content: ' de l’Eglise qui est à Philadelphie, écris : « Voici ce que dit le Saint, le Véritable, celui qui tient '
  - type: text
    content: 'la clé de '
  - type: text
    content: David
  - type: text
    content: ' '
  - type: note
    content: Posséder la clé c’est pouvoir ouvrir, avoir autorité. Jésus est un descendant du roi David (Ac 2.30), il a toute autorité sur le royaume éternel promis à David.
  - type: text
    content: ', celui qui ouvre et nul ne peut fermer, qui ferme, et nul ne peut ouvrir'
  - type: text
    content: ' '
  - type: note
    content: Es 22.20 .
  - type: text
    content: ':'
  '8':
  - type: text
    content: ' '
  - type: text
    content: 'Je connais ta conduite. Voici : j’ai ouvert devant toi une porte que nul ne peut fermer. Je le sais : tu n’as que peu de puissance, tu as obéi à ma Parole et tu ne m’as pas renié.'
  - type: text
    content: ' '
  '9':
  - type: text
    content: 'Eh bien, je te donne des membres de la '
  - type: text
    content: synagogue
  - type: text
    content: ' de '
  - type: text
    content: Satan
  - type: text
    content: '. Ils se disent '
  - type: text
    content: juifs
  - type: text
    content: ', mais ne le sont pas : ils mentent. Je les ferai venir se prosterner à tes pieds et reconnaître que moi, je t’ai aimé.'
  - type: text
    content: ' '
