document_id: REV.3,21
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: A l’Eglise qui est à Sardes
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: ' '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: A l’
      - type: usfm
        marker: w
        children:
        - type: text
          text: ange
      - type: text
        text: ' de l’Eglise qui est à Sardes, écris : « Voici ce que dit celui qui a les sept esprits de Dieu'
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '3.1 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'C’est-à-dire l’Esprit de Dieu dans sa plénitude (comparer '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: '1.4'
        - type: text
          text: ).
      marker-yv: yv-n
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'et les sept étoiles : Je connais ta conduite, je sais que tu passes pour être vivant, mais tu es mort.'
    - type: text
      text: ' '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Tu as gardé le commandement de persévérer que je t’ai donné. C’est pourquoi, à mon tour, je te garderai à l’heure de l’épreuve qui va venir sur le monde entier pour éprouver tous les habitants de la terre.
    - type: text
      text: ' '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Je viens bientôt, tiens ferme ce que tu as pour que personne ne te ravisse ta couronne.
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: ' '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'Du vainqueur, je ferai un pilier dans le '
      - type: usfm
        marker: w
        children:
        - type: text
          text: temple
      - type: text
        text: ' de mon Dieu, et il n’en sortira plus jamais. Je graverai sur lui le nom de mon Dieu et celui de la ville de mon Dieu, la nouvelle '
      - type: usfm
        marker: w
        children:
        - type: text
          text: Jérusalem
      - type: text
        text: ', qui descend du ciel d’auprès de mon Dieu, ainsi que mon nom nouveau.'
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: ' '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Que celui qui a des oreilles écoute ce que l’Esprit dit aux Eglises. »
  - type: usfm
    marker: s1
    children:
    - type: text
      text: A l’Eglise qui est à Laodicée
    marker-yv: yv-h
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: ' '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: A l’
      - type: usfm
        marker: w
        children:
        - type: text
          text: ange
      - type: text
        text: ' de l’Eglise qui est à Laodicée, écris : « Voici ce que dit celui qui s’appelle '
      - type: usfm
        marker: w
        children:
        - type: text
          text: Amen
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '3.14 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'C’est-à-dire celui en qui tout est vrai, certain, en qui toutes les promesses de Dieu sont accomplies (voir '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: 2 Co 1.20
        - type: text
          text: ).
      marker-yv: yv-n
    - type: usfm
      marker: wj
      children:
      - type: text
        text: ', le témoin digne de foi et véridique, '
      - type: usfm
        marker: qt
        children:
        - type: text
          text: celui qui est au commencement de la création de Dieu
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '3.14 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Voir Ap 22.13 ; Pr 8.22. Autre traduction : '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: Celui qui a présidé à la création de Dieu.
      marker-yv: yv-n
    - type: usfm
      marker: wj
      children:
      - type: usfm
        marker: qt
        children:
        - type: text
          text: .
      - type: text
        text: ' '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Je connais ta conduite et je sais que tu n’es ni froid, ni bouillant. Ah ! si seulement tu étais froid ou bouillant !
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: ' '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Mais puisque tu es tiède, puisque tu n’es ni froid, ni bouillant, je vais te vomir de ma bouche.
    - type: text
      text: ' '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'Tu dis : Je suis riche ! J’ai amassé des trésors ! Je n’ai besoin de rien ! Et tu ne te rends pas compte que tu es misérable et pitoyable, que tu es pauvre, aveugle et nu !'
    - type: text
      text: ' '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'C’est pourquoi je te donne un conseil : achète chez moi de l’or purifié au feu pour devenir réellement riche, des vêtements blancs pour te couvrir afin qu’on ne voie pas ta honteuse nudité, et un collyre pour soigner tes yeux afin que tu puisses voir clair.'
    - type: text
      text: ' '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: usfm
      marker: wj
      children:
      - type: usfm
        marker: qt
        children:
        - type: text
          text: Moi, ceux que j’aime, je les reprends et je les corrige
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '3.19 '
      - type: usfm
        marker: ft
        children:
        - type: usfm
          marker: ref
          children:
          - type: text
            text: Pr 3.12
        - type: text
          text: .
      marker-yv: yv-n
    - type: usfm
      marker: wj
      children:
      - type: text
        text: . Fais donc preuve de zèle, et change !
    - type: text
      text: ' '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Deviens vigilant, raffermis ceux qui restent et qui étaient sur le point de mourir. Car je n’ai pas trouvé ta conduite parfaite devant mon Dieu.
    - type: text
      text: ' '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'Voici : je me tiens devant la porte et je frappe. Si quelqu’un entend ma voix et ouvre la porte, j’entrerai chez lui et je dînerai avec lui et lui avec moi.'
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: ' '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Le vainqueur, je le ferai siéger avec moi sur mon trône, comme moi-même, je suis allé siéger avec mon Père sur son trône après avoir remporté la victoire.
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: ' '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Que celui qui a des oreilles écoute ce que l’Esprit dit aux Eglises. »
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'Rappelle-toi donc comment tu as reçu et entendu la Parole : Obéis et change ! Car, si tu n’es pas vigilant, je viendrai comme un voleur et tu n’auras aucun moyen de savoir à quelle heure je viendrai te surprendre.'
    - type: text
      text: ' '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Cependant, tu as à Sardes quelques personnes qui n’ont pas sali leurs vêtements ; elles marcheront avec moi en vêtements blancs, car elles en sont dignes.
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: ' '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Le vainqueur portera ainsi des vêtements blancs, je n’effacerai jamais son nom du livre de vie, je le reconnaîtrai comme mien en présence de mon Père et de ses anges.
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: ' '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Que celui qui a des oreilles écoute ce que l’Esprit dit aux Eglises. »
  - type: usfm
    marker: s1
    children:
    - type: text
      text: A l’Eglise qui est à Philadelphie
    marker-yv: yv-h
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: ' '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: A l’
      - type: usfm
        marker: w
        children:
        - type: text
          text: ange
      - type: text
        text: ' de l’Eglise qui est à Philadelphie, écris : « Voici ce que dit le Saint, le Véritable, celui qui tient '
      - type: usfm
        marker: qt
        children:
        - type: text
          text: 'la clé de '
        - type: usfm
          marker: w
          children:
          - type: text
            text: David
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '3.7 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Posséder la clé c’est pouvoir ouvrir, avoir autorité. Jésus est un descendant du roi David (
        - type: usfm
          marker: ref
          children:
          - type: text
            text: Ac 2.30
        - type: text
          text: ), il a toute autorité sur le royaume éternel promis à David.
      marker-yv: yv-n
    - type: usfm
      marker: wj
      children:
      - type: usfm
        marker: qt
        children:
        - type: text
          text: ', celui qui ouvre et nul ne peut fermer, qui ferme, et nul ne peut ouvrir'
      - type: text
        text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '3.7 '
      - type: usfm
        marker: ft
        children:
        - type: usfm
          marker: ref
          children:
          - type: text
            text: Es 22.20
        - type: text
          text: ' .'
      marker-yv: yv-n
    - type: usfm
      marker: wj
      children:
      - type: usfm
        marker: qt
        children:
        - type: text
          text: ':'
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: ' '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'Je connais ta conduite. Voici : j’ai ouvert devant toi une porte que nul ne peut fermer. Je le sais : tu n’as que peu de puissance, tu as obéi à ma Parole et tu ne m’as pas renié.'
    - type: text
      text: ' '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'Eh bien, je te donne des membres de la '
      - type: usfm
        marker: w
        children:
        - type: text
          text: synagogue
      - type: text
        text: ' de '
      - type: usfm
        marker: w
        children:
        - type: text
          text: Satan
      - type: text
        text: '. Ils se disent '
      - type: usfm
        marker: w
        children:
        - type: text
          text: juifs
      - type: text
        text: ', mais ne le sont pas : ils mentent. Je les ferai venir se prosterner à tes pieds et reconnaître que moi, je t’ai aimé.'
    - type: text
      text: ' '
