document_id: ISA.11,21
type_code: fra
verses:
  '1':
  - type: heading
    content: Le Roi et le règne à venir
  - type: text
    content: Un rameau poussera ╵sur le tronc d’Isaï
  - type: note
    content: 'Isaï (ou Jessé) : père de David (1 S 16.18-19).'
  - type: text
    content: ','
  - type: text
    content: un rejeton naîtra ╵de ses racines, ╵et portera du fruit
  - type: note
    content: 'Autre traduction supposant une légère modification d’une lettre de l’hébreu : un rejeton germera de ses racines.'
  - type: text
    content: .
  '10':
  - type: text
    content: Il adviendra ╵en ce jour-là ╵que le descendant d’Isaï
  - type: note
    content: 'L’hébreu a : la racine d’Isaï.'
  - type: text
    content: se dressera ╵comme un étendard pour les peuples,
  - type: text
    content: et tous les peuples étrangers ╵se tourneront vers lui.
  - type: text
    content: Et son lieu de repos ╵resplendira de gloire
  - type: note
    content: Cité en Rm 15.12, selon l’ancienne version grecque.
  - type: text
    content: .
  '11':
  - type: text
    content: En ce jour-là, ╵le Seigneur étendra sa main ╵une seconde fois
  - type: note
    content: 'une seconde fois: la première étant la sortie d’Egypte (v. 16).'
  - type: text
    content: pour libérer le reste de son peuple
  - type: text
    content: qui aura subsisté en Assyrie ╵et en Egypte,
  - type: text
    content: à Patros et en Ethiopie,
  - type: text
    content: à Elam, en Babylonie, ╵et à Hamath
  - type: note
    content: 'Patros: la Haute-Egypte ; Elam: la Perse ; Hamath: ville de Syrie.'
  - type: text
    content: ','
  - type: text
    content: ainsi que dans les îles ╵et les régions côtières.
  '12':
  - type: text
    content: Il dressera son étendard ╵en direction des peuples étrangers ;
  - type: text
    content: quant aux exilés d’Israël, ╵il les rassemblera,
  - type: text
    content: et les dispersés de Juda, ╵il les regroupera
  - type: text
    content: des quatre coins du monde.
  '13':
  - type: text
    content: Ce jour-là cessera ╵la rivalité d’Ephraïm,
  - type: text
    content: et les ennemis de Juda ╵disparaîtront.
  - type: text
    content: D’une part, Ephraïm ╵n’enviera plus Juda,
  - type: text
    content: et d’autre part, Juda ╵ne sera plus ╵l’ennemi d’Ephraïm.
  '14':
  - type: text
    content: De concert, ils fondront sur les collines ╵des Philistins à l’ouest,
  - type: text
    content: et pilleront ╵les peuples de l’Orient
  - type: note
    content: Peut-être les Madianites.
  - type: text
    content: .
  - type: text
    content: Ils s’en prendront ╵à Edom et Moab,
  - type: text
    content: et domineront sur les Ammonites
  - type: note
    content: Allusion à 2 S 8.12.
  - type: text
    content: .
  '15':
  - type: text
    content: Et l’Eternel asséchera
  - type: text
    content: le golfe de la mer d’Egypte
  - type: note
    content: Allusion à l’assèchement de la mer des Roseaux au cours de l’Exode (Ex 14.21-22, 29 ; 15.8).
  - type: text
    content: ','
  - type: text
    content: il lèvera sa main ╵pour menacer l’Euphrate,
  - type: text
    content: et, par son souffle impétueux,
  - type: text
    content: il brisera ce fleuve ╵en sept rivières
  - type: text
    content: que l’on pourra passer ╵sans ôter ses sandales.
  '16':
  - type: text
    content: Et il y aura une route ╵pour ceux de son peuple qui resteront,
  - type: text
    content: et qui demeureront encore ╵en Assyrie,
  - type: text
    content: comme il y eut jadis ╵une route pour Israël
  - type: text
    content: quand il sortit d’Egypte.
  '2':
  - type: text
    content: L’Esprit de l’Eternel ╵reposera sur lui,
  - type: text
    content: et cet Esprit lui donnera ╵le discernement, la sagesse,
  - type: text
    content: le conseil et la force ;
  - type: text
    content: il lui fera connaître ╵et craindre l’Eternel.
  '3':
  - type: text
    content: Il sera tout empreint ╵de la crainte de l’Eternel.
  - type: text
    content: Il ne jugera pas ╵d’après les apparences,
  - type: text
    content: et n’arbitrera pas ╵d’après des ouï-dire.
  '4':
  - type: text
    content: Il jugera les pauvres ╵avec justice,
  - type: text
    content: et il arbitrera ╵selon le droit
  - type: text
    content: en faveur des malheureux du pays.
  - type: text
    content: Il frappera la terre ╵de sa parole ╵comme avec un bâton ;
  - type: text
    content: le souffle de sa bouche ╵abattra le méchant
  - type: note
    content: Allusion en 2 Th 2.8.
  - type: text
    content: .
  '5':
  - type: text
    content: Il aura la justice ╵pour ceinture à ses reins
  - type: text
    content: et la fidélité ╵pour ceinture à ses hanches.
  '6':
  - type: text
    content: Le loup vivra avec l’agneau,
  - type: text
    content: la panthère reposera ╵aux côtés du chevreau.
  - type: text
    content: Le veau et le lionceau ╵et le bœuf à l’engrais ╵seront
  - type: note
    content: 'à l’engrais seront: selon le texte hébreu traditionnel. L’ancienne version grecque a : se nourriront.'
  - type: text
    content: ' ensemble,'
  - type: text
    content: et un petit enfant ╵les conduira
  - type: note
    content: Les v. 6-9 ont leur parallèle en 65.25.
  - type: text
    content: .
  '7':
  - type: text
    content: Les vaches et les ourses ╵brouteront côte à côte,
  - type: text
    content: et leurs petits ╵auront un même gîte.
  - type: text
    content: Le lion et le bœuf ╵se nourriront de paille.
  '8':
  - type: text
    content: Le nourrisson ╵s’ébattra sans danger ╵près du nid du cobra,
  - type: text
    content: et le tout jeune enfant ╵pourra mettre la main ╵dans l’antre du serpent.
  '9':
  - type: text
    content: On ne commettra plus ╵ni mal ni destruction
  - type: text
    content: sur toute l’étendue ╵de ma montagne sainte.
  - type: text
    content: Car la terre sera remplie ╵de la connaissance de l’Eternel
  - type: text
    content: comme les eaux recouvrent ╵le fond des mers
  - type: note
    content: Voir Ha 2.14.
  - type: text
    content: .
