document_id: ISA.11,21
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Le Roi et le règne à venir
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: Un rameau poussera ╵sur le tronc d’Isaï
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '11.1 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Isaï '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '(ou Jessé) : père de David ('
        - type: usfm
          marker: ref
          children:
          - type: text
            text: 1 S 16.18-19
        - type: text
          text: ).
      marker-yv: yv-n
    - type: text
      text: ','
  - type: usfm
    marker: q1
    children:
    - type: text
      text: un rejeton naîtra ╵de ses racines, ╵et portera du fruit
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '11.1 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Autre traduction supposant une légère modification d’une lettre de l’hébreu : '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: un rejeton germera de ses racines.
      marker-yv: yv-n
    - type: text
      text: .
  '10':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Il adviendra ╵en ce jour-là ╵que le descendant d’Isaï
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '11.10 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'L’hébreu a : '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: la racine d’Isaï.
      marker-yv: yv-n
  - type: usfm
    marker: q1
    children:
    - type: text
      text: se dressera ╵comme un étendard pour les peuples,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et tous les peuples étrangers ╵se tourneront vers lui.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et son lieu de repos ╵resplendira de gloire
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '11.10 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Cité en '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: Rm 15.12
        - type: text
          text: ', selon l’ancienne version grecque.'
      marker-yv: yv-n
    - type: text
      text: .
  '11':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: En ce jour-là, ╵le Seigneur étendra sa main ╵une seconde fois
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '11.11 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: une seconde fois
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: ': '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: la première étant la sortie d’Egypte (v. 16).
      marker-yv: yv-n
  - type: usfm
    marker: q1
    children:
    - type: text
      text: pour libérer le reste de son peuple
  - type: usfm
    marker: q1
    children:
    - type: text
      text: qui aura subsisté en Assyrie ╵et en Egypte,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: à Patros et en Ethiopie,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: à Elam, en Babylonie, ╵et à Hamath
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '11.11 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Patros
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: ': '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'la Haute-Egypte ; '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Elam
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: ': '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'la Perse ; '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Hamath
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: ': '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ville de Syrie.
      marker-yv: yv-n
    - type: text
      text: ','
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ainsi que dans les îles ╵et les régions côtières.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Il dressera son étendard ╵en direction des peuples étrangers ;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: quant aux exilés d’Israël, ╵il les rassemblera,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et les dispersés de Juda, ╵il les regroupera
  - type: usfm
    marker: q1
    children:
    - type: text
      text: des quatre coins du monde.
  '13':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ce jour-là cessera ╵la rivalité d’Ephraïm,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et les ennemis de Juda ╵disparaîtront.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: D’une part, Ephraïm ╵n’enviera plus Juda,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et d’autre part, Juda ╵ne sera plus ╵l’ennemi d’Ephraïm.
  '14':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: De concert, ils fondront sur les collines ╵des Philistins à l’ouest,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et pilleront ╵les peuples de l’Orient
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '11.14 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Peut-être les Madianites.
      marker-yv: yv-n
    - type: text
      text: .
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ils s’en prendront ╵à Edom et Moab,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et domineront sur les Ammonites
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '11.14 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Allusion à '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: 2 S 8.12
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: .
  '15':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et l’Eternel asséchera
  - type: usfm
    marker: q1
    children:
    - type: text
      text: le golfe de la mer d’Egypte
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '11.15 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Allusion à l’assèchement de la mer des Roseaux au cours de l’Exode (Ex 14.21-22, 29 ; 15.8).
      marker-yv: yv-n
    - type: text
      text: ','
  - type: usfm
    marker: q1
    children:
    - type: text
      text: il lèvera sa main ╵pour menacer l’Euphrate,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et, par son souffle impétueux,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: il brisera ce fleuve ╵en sept rivières
  - type: usfm
    marker: q1
    children:
    - type: text
      text: que l’on pourra passer ╵sans ôter ses sandales.
  '16':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et il y aura une route ╵pour ceux de son peuple qui resteront,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et qui demeureront encore ╵en Assyrie,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: comme il y eut jadis ╵une route pour Israël
  - type: usfm
    marker: q1
    children:
    - type: text
      text: quand il sortit d’Egypte.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: L’Esprit de l’Eternel ╵reposera sur lui,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et cet Esprit lui donnera ╵le discernement, la sagesse,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: le conseil et la force ;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: il lui fera connaître ╵et craindre l’Eternel.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Il sera tout empreint ╵de la crainte de l’Eternel.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Il ne jugera pas ╵d’après les apparences,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et n’arbitrera pas ╵d’après des ouï-dire.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Il jugera les pauvres ╵avec justice,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et il arbitrera ╵selon le droit
  - type: usfm
    marker: q1
    children:
    - type: text
      text: en faveur des malheureux du pays.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Il frappera la terre ╵de sa parole ╵comme avec un bâton ;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: le souffle de sa bouche ╵abattra le méchant
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '11.4 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Allusion en '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: 2 Th 2.8
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: .
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Il aura la justice ╵pour ceinture à ses reins
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et la fidélité ╵pour ceinture à ses hanches.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Le loup vivra avec l’agneau,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: la panthère reposera ╵aux côtés du chevreau.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Le veau et le lionceau ╵et le bœuf à l’engrais ╵seront
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '11.6 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'à l’engrais '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: seront
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: ': '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'selon le texte hébreu traditionnel. L’ancienne version grecque a : '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: se nourriront.
      marker-yv: yv-n
    - type: text
      text: ' ensemble,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et un petit enfant ╵les conduira
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '11.6 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Les v. 6-9 ont leur parallèle en '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: '65.25'
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: .
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Les vaches et les ourses ╵brouteront côte à côte,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et leurs petits ╵auront un même gîte.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Le lion et le bœuf ╵se nourriront de paille.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Le nourrisson ╵s’ébattra sans danger ╵près du nid du cobra,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et le tout jeune enfant ╵pourra mettre la main ╵dans l’antre du serpent.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: On ne commettra plus ╵ni mal ni destruction
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sur toute l’étendue ╵de ma montagne sainte.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Car la terre sera remplie ╵de la connaissance de l’Eternel
  - type: usfm
    marker: q1
    children:
    - type: text
      text: comme les eaux recouvrent ╵le fond des mers
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '11.9 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Voir '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: Ha 2.14
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: .
