document_id: EXO.30
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: L’autel des parfums
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Tu feras aussi un autel pour faire brûler du parfum ; tu le feras en bois d’acacia. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Il sera carré, de cinquante centimètres de côté, relevé aux angles de quatre cornes en saillie. Il aura un mètre de hauteur
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '30.2 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'En hébreu : '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: une coudée de côté et deux coudées de hauteur.
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Tu en plaqueras d’or pur
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '30.3 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: L’autel des holocaustes était revêtu de bronze. Plus on se rapproche du lieu très saint, plus les matériaux sont précieux.
    marker-yv: yv-n
  - type: text
    text: ' le plateau, les parois tout autour et les cornes et tu le garniras d’une bordure d’or qui en fera le tour. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Tu lui feras deux anneaux d’or, que tu fixeras sous la bordure de part et d’autre, sur les deux parois pour recevoir les barres servant à transporter l’autel. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Tu feras ces barres en bois d’acacia plaqué d’or. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Tu placeras l’autel devant le voile qui cache le coffre de l’acte de l’alliance, devant le propitiatoire qui est au-dessus de l’acte de l’alliance, là où je te rencontrerai. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'C’est sur cet autel que chaque matin Aaron fera brûler les essences parfumées pendant qu’il arrangera les lampes, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'et chaque soir, quand il les allumera. Le parfum brûlera continuellement devant l’Eternel, de génération en génération. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Vous n’y offrirez pas de parfum profane ni d’holocauste, ni d’offrande, et vous n’y répandrez aucune libation
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '30.9 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Offrande liquide (de vin).
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Une fois l’an, Aaron fera le rite d’expiation sur les cornes de l’autel : de génération en génération, il fera le rite d’expiation pour l’autel une fois par an'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '30.10 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Le jour des Expiations (
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Lv 16
        metadata:
          usfm: LEV.16
      - type: text
        text: ).
    marker-yv: yv-n
  - type: text
    text: ' avec le sang du sacrifice pour le péché offert pour l’expiation. Cet autel est éminemment saint pour l’Eternel.'
- type: usfm
  marker: s1
  children:
  - type: text
    text: L’offrande pour racheter la vie des Israélites
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'L’Eternel parla encore à Moïse en ces termes : '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Lorsque tu recenseras les Israélites, chacun d’eux donnera à l’Eternel une rançon pour sa vie au moment où il sera recensé ; ainsi ce dénombrement ne leur attirera aucun malheur. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Chacun de ceux qui seront recensés versera la moitié de l’unité de poids en vigueur au sanctuaire
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '30.13 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'En hébreu : '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: un demi-sicle sur la base du sicle (11, 4 g) du sanctuaire qui vaut vingt guéras.
    marker-yv: yv-n
  - type: text
    text: ' c’est-à-dire six grammes d’argent : c’est un prélèvement pour l’Eternel. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Toute personne de vingt ans et au-dessus comptée lors de ce recensement donnera ce prélèvement pour l’Eternel. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Les riches ne paieront pas plus et les pauvres pas moins que cette somme pour acquitter le prélèvement dû à l’Eternel, en rançon pour leur vie. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Tu percevras des Israélites l’argent de cette rançon et tu le destineras à l’entretien de la tente de la Rencontre. Il rappellera à l’Eternel que la rançon pour leur vie a été versée.
- type: usfm
  marker: s1
  children:
  - type: text
    text: La cuve pour les ablutions
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Ensuite l’Eternel parla à Moïse en ces termes : '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Tu feras aussi une cuve de bronze pour les ablutions. Elle sera montée sur un socle du même métal ; tu la placeras entre la tente de la Rencontre et l’autel et tu la rempliras d’eau. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Avec cette eau, Aaron et ses fils se laveront les mains et les pieds. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Avant d’entrer dans la tente de la Rencontre, ils se passeront à l’eau ; ainsi ils ne mourront pas. De même, lorsqu’ils viendront faire leur service à l’autel pour brûler un sacrifice consumé par le feu pour l’Eternel, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: ils se laveront les mains et les pieds, et ils ne mourront pas. C’est là, pour Aaron et pour ses descendants, une ordonnance qui sera en vigueur à perpétuité, de génération en génération.
- type: usfm
  marker: s1
  children:
  - type: text
    text: L’huile d’onction
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Puis l’Eternel parla à Moïse en ces termes : '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Procure-toi des aromates de première qualité : six kilogrammes de myrrhe fluide'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '30.23 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: La myrrhe vient d’un arbuste d’Afrique orientale et d’Arabie.
    marker-yv: yv-n
  - type: text
    text: ', la moitié, soit trois kilogrammes, de cinnamome aromatique'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '30.23 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Le cinnamome était l’écorce d’une sorte de laurier des pays orientaux.
    marker-yv: yv-n
  - type: text
    text: ', trois kilogrammes de cannelle, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: six kilogrammes de casse – selon l’unité de poids en vigueur au sanctuaire
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '30.24 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Il s’agit de '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: sicles.
    marker-yv: yv-n
  - type: text
    text: ' et six litres d’huile d’olive'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '30.24 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'En hébreu, un '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: hîn.
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: Tu en feras une huile d’onction sainte, un baume odorant fabriqué par un parfumeur ; ce sera une huile sainte pour l’onction.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Avec cette huile, tu oindras la tente de la Rencontre et le coffre de l’acte de l’alliance, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'la table avec tous ses ustensiles, le chandelier et ses accessoires, l’autel des parfums, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'l’autel des holocaustes et tous ses accessoires, ainsi que la cuve avec son socle. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'Tu les consacreras et ils seront éminemment saints. Tout ce qui les touchera sera saint. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: Tu oindras aussi Aaron et ses fils et tu les consacreras à mon service comme prêtres.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'Puis tu t’adresseras aux Israélites en ces termes : Cette huile d’onction sainte sera réservée à l’Eternel de génération en génération. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'On n’en répandra pas sur le corps d’un humain et vous n’en composerez pas selon la même formule. Elle est sainte et vous la considérerez comme telle. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: Celui qui composera une huile semblable et qui en appliquera sur quelqu’un d’autre qu’un prêtre sera retranché de son peuple.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Le parfum
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: 'L’Eternel dit à Moïse : Procure-toi des essences parfumées : du stacté, de l’onyx et du galbanum'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '30.34 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Le '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'stacté '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'et le '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'galbanum '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: proviennent de plantes ou de résines ; l’
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'onyx '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: n’est pas ici la pierre précieuse, mais la carapace d’un mollusque.
    marker-yv: yv-n
  - type: text
    text: ', et avec ces aromates, de l’encens raffiné, le tout en quantités égales. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: Tu en feras faire un mélange parfumé, composé par un parfumeur, ce sera un parfum salé
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '30.35 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Le sel symbolise sans doute l’alliance (voir '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Lv 2.13
        metadata:
          usfm: LEV.2.13
      - type: text
        text: '). Des versions anciennes ont traduit ici : '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'avec soin, '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'au lieu de '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: avec du sel.
    marker-yv: yv-n
  - type: text
    text: ', pur et saint. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: 'Tu en réduiras une partie en poudre fine que tu poseras devant l’acte de l’alliance dans la tente de la Rencontre où je te rencontrerai. Ce sera pour vous une chose éminemment sainte. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: 'Vous ne ferez pas de parfum de même composition pour votre usage personnel. Vous le considérerez comme une chose sainte, réservée à l’Eternel. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: text
    text: Celui qui en fera pour jouir de son odeur sera retranché de son peuple.
