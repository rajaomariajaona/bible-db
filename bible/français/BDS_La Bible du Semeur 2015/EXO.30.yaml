document_id: EXO.30,21
type_code: fra
verses:
  '1':
  - type: heading
    content: L’autel des parfums
  - type: text
    content: 'Tu feras aussi un autel pour faire brûler du parfum ; tu le feras en bois d’acacia. '
  '10':
  - type: text
    content: 'Une fois l’an, Aaron fera le rite d’expiation sur les cornes de l’autel : de génération en génération, il fera le rite d’expiation pour l’autel une fois par an'
  - type: note
    content: Le jour des Expiations (Lv 16).
  - type: text
    content: ' avec le sang du sacrifice pour le péché offert pour l’expiation. Cet autel est éminemment saint pour l’Eternel.'
  - type: heading
    content: L’offrande pour racheter la vie des Israélites
  '11':
  - type: text
    content: 'L’Eternel parla encore à Moïse en ces termes : '
  '12':
  - type: text
    content: 'Lorsque tu recenseras les Israélites, chacun d’eux donnera à l’Eternel une rançon pour sa vie au moment où il sera recensé ; ainsi ce dénombrement ne leur attirera aucun malheur. '
  '13':
  - type: text
    content: Chacun de ceux qui seront recensés versera la moitié de l’unité de poids en vigueur au sanctuaire
  - type: note
    content: 'En hébreu : un demi-sicle sur la base du sicle (11, 4 g) du sanctuaire qui vaut vingt guéras.'
  - type: text
    content: ' c’est-à-dire six grammes d’argent : c’est un prélèvement pour l’Eternel. '
  '14':
  - type: text
    content: 'Toute personne de vingt ans et au-dessus comptée lors de ce recensement donnera ce prélèvement pour l’Eternel. '
  '15':
  - type: text
    content: 'Les riches ne paieront pas plus et les pauvres pas moins que cette somme pour acquitter le prélèvement dû à l’Eternel, en rançon pour leur vie. '
  '16':
  - type: text
    content: Tu percevras des Israélites l’argent de cette rançon et tu le destineras à l’entretien de la tente de la Rencontre. Il rappellera à l’Eternel que la rançon pour leur vie a été versée.
  - type: heading
    content: La cuve pour les ablutions
  '17':
  - type: text
    content: 'Ensuite l’Eternel parla à Moïse en ces termes : '
  '18':
  - type: text
    content: 'Tu feras aussi une cuve de bronze pour les ablutions. Elle sera montée sur un socle du même métal ; tu la placeras entre la tente de la Rencontre et l’autel et tu la rempliras d’eau. '
  '19':
  - type: text
    content: 'Avec cette eau, Aaron et ses fils se laveront les mains et les pieds. '
  '2':
  - type: text
    content: Il sera carré, de cinquante centimètres de côté, relevé aux angles de quatre cornes en saillie. Il aura un mètre de hauteur
  - type: note
    content: 'En hébreu : une coudée de côté et deux coudées de hauteur.'
  - type: text
    content: '. '
  '20':
  - type: text
    content: 'Avant d’entrer dans la tente de la Rencontre, ils se passeront à l’eau ; ainsi ils ne mourront pas. De même, lorsqu’ils viendront faire leur service à l’autel pour brûler un sacrifice consumé par le feu pour l’Eternel, '
  '21':
  - type: text
    content: ils se laveront les mains et les pieds, et ils ne mourront pas. C’est là, pour Aaron et pour ses descendants, une ordonnance qui sera en vigueur à perpétuité, de génération en génération.
  - type: heading
    content: L’huile d’onction
  '22':
  - type: text
    content: 'Puis l’Eternel parla à Moïse en ces termes : '
  '23':
  - type: text
    content: 'Procure-toi des aromates de première qualité : six kilogrammes de myrrhe fluide'
  - type: note
    content: La myrrhe vient d’un arbuste d’Afrique orientale et d’Arabie.
  - type: text
    content: ', la moitié, soit trois kilogrammes, de cinnamome aromatique'
  - type: note
    content: Le cinnamome était l’écorce d’une sorte de laurier des pays orientaux.
  - type: text
    content: ', trois kilogrammes de cannelle, '
  '24':
  - type: text
    content: six kilogrammes de casse – selon l’unité de poids en vigueur au sanctuaire
  - type: note
    content: Il s’agit de sicles.
  - type: text
    content: ' et six litres d’huile d’olive'
  - type: note
    content: En hébreu, un hîn.
  - type: text
    content: '. '
  '25':
  - type: text
    content: Tu en feras une huile d’onction sainte, un baume odorant fabriqué par un parfumeur ; ce sera une huile sainte pour l’onction.
  '26':
  - type: text
    content: 'Avec cette huile, tu oindras la tente de la Rencontre et le coffre de l’acte de l’alliance, '
  '27':
  - type: text
    content: 'la table avec tous ses ustensiles, le chandelier et ses accessoires, l’autel des parfums, '
  '28':
  - type: text
    content: 'l’autel des holocaustes et tous ses accessoires, ainsi que la cuve avec son socle. '
  '29':
  - type: text
    content: 'Tu les consacreras et ils seront éminemment saints. Tout ce qui les touchera sera saint. '
  '3':
  - type: text
    content: Tu en plaqueras d’or pur
  - type: note
    content: L’autel des holocaustes était revêtu de bronze. Plus on se rapproche du lieu très saint, plus les matériaux sont précieux.
  - type: text
    content: ' le plateau, les parois tout autour et les cornes et tu le garniras d’une bordure d’or qui en fera le tour. '
  '30':
  - type: text
    content: Tu oindras aussi Aaron et ses fils et tu les consacreras à mon service comme prêtres.
  '31':
  - type: text
    content: 'Puis tu t’adresseras aux Israélites en ces termes : Cette huile d’onction sainte sera réservée à l’Eternel de génération en génération. '
  '32':
  - type: text
    content: 'On n’en répandra pas sur le corps d’un humain et vous n’en composerez pas selon la même formule. Elle est sainte et vous la considérerez comme telle. '
  '33':
  - type: text
    content: Celui qui composera une huile semblable et qui en appliquera sur quelqu’un d’autre qu’un prêtre sera retranché de son peuple.
  - type: heading
    content: Le parfum
  '34':
  - type: text
    content: 'L’Eternel dit à Moïse : Procure-toi des essences parfumées : du stacté, de l’onyx et du galbanum'
  - type: note
    content: Le stacté et le galbanum proviennent de plantes ou de résines ; l’onyx n’est pas ici la pierre précieuse, mais la carapace d’un mollusque.
  - type: text
    content: ', et avec ces aromates, de l’encens raffiné, le tout en quantités égales. '
  '35':
  - type: text
    content: Tu en feras faire un mélange parfumé, composé par un parfumeur, ce sera un parfum salé
  - type: note
    content: 'Le sel symbolise sans doute l’alliance (voir Lv 2.13). Des versions anciennes ont traduit ici : avec soin, au lieu de avec du sel.'
  - type: text
    content: ', pur et saint. '
  '36':
  - type: text
    content: 'Tu en réduiras une partie en poudre fine que tu poseras devant l’acte de l’alliance dans la tente de la Rencontre où je te rencontrerai. Ce sera pour vous une chose éminemment sainte. '
  '37':
  - type: text
    content: 'Vous ne ferez pas de parfum de même composition pour votre usage personnel. Vous le considérerez comme une chose sainte, réservée à l’Eternel. '
  '38':
  - type: text
    content: Celui qui en fera pour jouir de son odeur sera retranché de son peuple.
  '4':
  - type: text
    content: 'Tu lui feras deux anneaux d’or, que tu fixeras sous la bordure de part et d’autre, sur les deux parois pour recevoir les barres servant à transporter l’autel. '
  '5':
  - type: text
    content: 'Tu feras ces barres en bois d’acacia plaqué d’or. '
  '6':
  - type: text
    content: 'Tu placeras l’autel devant le voile qui cache le coffre de l’acte de l’alliance, devant le propitiatoire qui est au-dessus de l’acte de l’alliance, là où je te rencontrerai. '
  '7':
  - type: text
    content: 'C’est sur cet autel que chaque matin Aaron fera brûler les essences parfumées pendant qu’il arrangera les lampes, '
  '8':
  - type: text
    content: 'et chaque soir, quand il les allumera. Le parfum brûlera continuellement devant l’Eternel, de génération en génération. '
  '9':
  - type: text
    content: Vous n’y offrirez pas de parfum profane ni d’holocauste, ni d’offrande, et vous n’y répandrez aucune libation
  - type: note
    content: Offrande liquide (de vin).
  - type: text
    content: '. '
