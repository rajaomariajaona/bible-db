document_id: 1CO.6,21
type_code: fra
verses:
  '1':
  - type: heading
    content: Des procès entre chrétiens
  - type: text
    content: Lorsque l’un de vous a un différend avec un frère ou une sœur, comment ose-t-il le citer en justice devant des juges incroyants au lieu de recourir à l’arbitrage des membres du peuple saint ?
  '11':
  - type: text
    content: Voilà bien ce que vous étiez, certains d’entre vous. Mais vous avez été lavés, vous avez été purifiés du péché, vous en avez été déclarés justes au nom du Seigneur Jésus-Christ et par l’Esprit de notre Dieu.
  - type: heading
    content: Sur l’inconduite
  '12':
  - type: text
    content: Tout m’est permis. Certes, mais tout n’est pas bon pour moi. Tout m’est permis, c’est vrai, mais je ne veux pas me placer sous un esclavage quelconque
  - type: note
    content: 'Autre traduction : mais je ne veux être l’esclave de personne.'
  - type: text
    content: '. '
  '13':
  - type: text
    content: '« Les aliments sont faits pour le ventre et le ventre pour les aliments. » Certes, cependant un jour, Dieu détruira l’un comme l’autre. Mais attention : notre corps, lui, n’a pas été fait pour l’inconduite, il est pour le Seigneur et le Seigneur est pour le corps. '
  '14':
  - type: text
    content: En effet, comme Dieu a ressuscité le Seigneur, il nous ressuscitera, nous aussi, par sa puissance.
  '15':
  - type: text
    content: Ignorez-vous que vos corps sont des membres de Christ ? Vais-je donc arracher les membres de Christ pour en faire ceux d’une prostituée
  - type: note
    content: 'La ville de Corinthe avait mauvaise réputation : on prétendait que mille prostituées sacrées vivaient sur l’Acrocorinthe.'
  - type: text
    content: '  ? Sûrement pas !'
  '16':
  - type: text
    content: 'Ou bien, ignorez-vous qu’un homme qui s’unit à une prostituée devient un seul corps avec elle ? Car il est écrit : '
  - type: text
    content: Les deux ne feront plus qu’un
  - type: note
    content: Gn 2.24.
  - type: text
    content: '. '
  '17':
  - type: text
    content: 'Mais celui qui s’unit au Seigneur devient, lui, un seul esprit avec lui. '
  '18':
  - type: text
    content: C’est pourquoi, fuyez l’inconduite sexuelle. Tous les autres péchés qu’un homme peut commettre n’impliquent pas son corps, mais celui qui se livre à l’inconduite pèche contre son propre corps.
  '19':
  - type: text
    content: 'Ou bien encore, ignorez-vous que votre corps est le temple même du Saint-Esprit qui vous a été donné par Dieu et qui, maintenant, demeure en vous ? Vous ne vous appartenez donc pas à vous-mêmes. '
  '2':
  - type: text
    content: 'Ignorez-vous que ceux-ci auront un jour à juger le monde ? Si donc vous êtes destinés à être les juges du monde, seriez-vous incapables de vous prononcer sur des questions bien moins importantes ? '
  '20':
  - type: text
    content: Car vous avez été rachetés à grand prix. Honorez donc Dieu dans votre corps.
  '3':
  - type: text
    content: Ne savez-vous pas que nous jugerons même les anges ? Et nous serions incompétents pour les affaires de la vie présente !
  '4':
  - type: text
    content: 'Or, si vous avez des litiges au sujet des affaires de la vie courante, vous prenez comme juges des gens qui ne comptent pour rien dans l’Eglise ! '
  '5':
  - type: text
    content: 'Je le dis à votre honte ! N’y a-t-il vraiment pas un seul homme sage parmi vous qui puisse servir d’arbitre entre ses frères ? '
  '6':
  - type: text
    content: 'Faut-il qu’on se traîne en justice entre frères et qu’on aille plaider l’un contre l’autre devant des incroyants ? '
  '7':
  - type: text
    content: De toute façon, vos différends constituent déjà une défaite. Pourquoi ne souffrez-vous pas plutôt l’injustice ? Pourquoi ne consentez-vous pas plutôt à vous laisser dépouiller ?
  '8':
  - type: text
    content: 'Mais non, c’est au contraire vous qui commettez des injustices et dépouillez les autres, et ce sont vos frères et sœurs que vous traitez ainsi ! '
  '9':
  - type: text
    content: 'Ne savez-vous pas que ceux qui pratiquent l’injustice n’auront aucune part au royaume de Dieu ? Ne vous y trompez pas : il n’y aura point de part dans l’héritage de ce royaume pour les débauchés, les idolâtres, les adultères, les pervers ou les homosexuels, ni pour les voleurs, les avares, pas plus que pour les ivrognes, les calomniateurs ou les malhonnêtes. '
