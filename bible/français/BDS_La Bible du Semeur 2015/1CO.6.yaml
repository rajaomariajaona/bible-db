document_id: 1CO.6
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Des procès entre chrétiens
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Lorsque l’un de vous a un différend avec un frère ou une sœur, comment ose-t-il le citer en justice devant des juges incroyants au lieu de recourir à l’arbitrage des membres du peuple saint ?
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Ignorez-vous que ceux-ci auront un jour à juger le monde ? Si donc vous êtes destinés à être les juges du monde, seriez-vous incapables de vous prononcer sur des questions bien moins importantes ? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Ne savez-vous pas que nous jugerons même les anges ? Et nous serions incompétents pour les affaires de la vie présente !
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Or, si vous avez des litiges au sujet des affaires de la vie courante, vous prenez comme juges des gens qui ne comptent pour rien dans l’Eglise ! '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Je le dis à votre honte ! N’y a-t-il vraiment pas un seul homme sage parmi vous qui puisse servir d’arbitre entre ses frères ? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Faut-il qu’on se traîne en justice entre frères et qu’on aille plaider l’un contre l’autre devant des incroyants ? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: De toute façon, vos différends constituent déjà une défaite. Pourquoi ne souffrez-vous pas plutôt l’injustice ? Pourquoi ne consentez-vous pas plutôt à vous laisser dépouiller ?
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Mais non, c’est au contraire vous qui commettez des injustices et dépouillez les autres, et ce sont vos frères et sœurs que vous traitez ainsi ! '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 9-10
  - type: text
    text: 'Ne savez-vous pas que ceux qui pratiquent l’injustice n’auront aucune part au royaume de Dieu ? Ne vous y trompez pas : il n’y aura point de part dans l’héritage de ce royaume pour les débauchés, les idolâtres, les adultères, les pervers ou les homosexuels, ni pour les voleurs, les avares, pas plus que pour les ivrognes, les calomniateurs ou les malhonnêtes. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Voilà bien ce que vous étiez, certains d’entre vous. Mais vous avez été lavés, vous avez été purifiés du péché, vous en avez été déclarés justes au nom du Seigneur Jésus-Christ et par l’Esprit de notre Dieu.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Sur l’inconduite
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Tout m’est permis. Certes, mais tout n’est pas bon pour moi. Tout m’est permis, c’est vrai, mais je ne veux pas me placer sous un esclavage quelconque
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '6.12 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Autre traduction : '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: mais je ne veux être l’esclave de personne.
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: '« Les aliments sont faits pour le ventre et le ventre pour les aliments. » Certes, cependant un jour, Dieu détruira l’un comme l’autre. Mais attention : notre corps, lui, n’a pas été fait pour l’inconduite, il est pour le Seigneur et le Seigneur est pour le corps. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: En effet, comme Dieu a ressuscité le Seigneur, il nous ressuscitera, nous aussi, par sa puissance.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Ignorez-vous que vos corps sont des membres de Christ ? Vais-je donc arracher les membres de Christ pour en faire ceux d’une prostituée
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '6.15 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'La ville de Corinthe avait mauvaise réputation : on prétendait que mille prostituées sacrées vivaient sur l’Acrocorinthe.'
    marker-yv: yv-n
  - type: text
    text: '  ? Sûrement pas !'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Ou bien, ignorez-vous qu’un homme qui s’unit à une prostituée devient un seul corps avec elle ? Car il est écrit : '
  - type: usfm
    marker: qt
    children:
    - type: text
      text: Les deux ne feront plus qu’un
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '6.16 '
    - type: usfm
      marker: ft
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Gn 2.24
        metadata:
          usfm: GEN.2.24
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Mais celui qui s’unit au Seigneur devient, lui, un seul esprit avec lui. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: C’est pourquoi, fuyez l’inconduite sexuelle. Tous les autres péchés qu’un homme peut commettre n’impliquent pas son corps, mais celui qui se livre à l’inconduite pèche contre son propre corps.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Ou bien encore, ignorez-vous que votre corps est le temple même du Saint-Esprit qui vous a été donné par Dieu et qui, maintenant, demeure en vous ? Vous ne vous appartenez donc pas à vous-mêmes. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Car vous avez été rachetés à grand prix. Honorez donc Dieu dans votre corps.
