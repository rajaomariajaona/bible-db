document_id: ZEC.10,21
type_code: fra
verses:
  '1':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: Demandez donc à l’Eternel ╵de la pluie au printemps !
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Il produit les orages :'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: il vous accordera ╵une pluie abondante
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et fera pousser l’herbe ╵de chacun dans son champ.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Le jugement sur les idoles
    marker-yv: yv-h
  '10':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: Je les ramènerai d’Egypte,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: je les rassemblerai ╵de l’Assyrie
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '10.10 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: L’
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'Egypte '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: et l’
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'Assyrie '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: (qui n’existe plus à l’époque) sont citées comme typiques des nations hostiles au peuple de Dieu.
      marker-yv: yv-n
    - type: text
      text: ','
  - type: usfm
    marker: q1
    children:
    - type: text
      text: je les ferai rentrer ╵en Galaad et au Liban
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '10.10 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Au nord et à l’est d’Israël.
      marker-yv: yv-n
    - type: text
      text: ','
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et, même ainsi, l’espace ╵ne leur suffira pas.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: Israël franchira ╵la mer de la détresse.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: L’Eternel frappera ╵les vagues de la mer,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et il mettra à sec ╵le Nil jusqu’en ses profondeurs.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: L’orgueil de l’Assyrie ╵sera brisé,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: le sceptre de l’Egypte ╵lui sera enlevé.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: Et aux Israélites, ╵je donnerai la force ╵qui vient de l’Eternel.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ils marcheront pour lui,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: l’Eternel le déclare.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: Car vos idoles domestiques ╵ont débité des mots trompeurs,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: les devins ont transmis ╵des révélations fausses.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ils racontaient des songes ╵qui n’étaient que mensonges,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et leurs consolations ╵étaient des illusions.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Voilà pourquoi ce peuple ╵a dû partir au loin,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dans la misère, ╵comme un troupeau ╵qui n’a pas de berger.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Un nouvel exode
    marker-yv: yv-h
  '3':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: C’est contre les bergers ╵que je suis en colère,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: j’interviendrai contre les boucs.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Le Seigneur des armées célestes ╵vient s’occuper
  - type: usfm
    marker: q1
    children:
    - type: text
      text: de son troupeau, ╵le peuple de Juda,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et il va faire d’eux ╵son cheval glorieux ╵pour la bataille.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: Car la pierre angulaire
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '10.4 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Voir 3.9 ; Es 28.16.
      marker-yv: yv-n
    - type: text
      text: ' ╵sortira de Juda,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: de lui aussi viendra ╵le piquet de la tente
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ainsi que l’arc de guerre.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Oui, de lui tous les chefs ╵seront issus.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: Pareils à des guerriers
  - type: usfm
    marker: q1
    children:
    - type: text
      text: foulant la boue des rues ╵au cours de la bataille,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ils combattront.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: L’Eternel sera avec eux.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Alors leurs ennemis ╵montés sur des chevaux
  - type: usfm
    marker: q1
    children:
    - type: text
      text: seront couverts de honte.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: J’affermirai ╵le peuple de Juda,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: je sauverai ╵le peuple de Joseph.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Je les rétablirai,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: car j’aurai de l’amour pour eux,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ils seront comme un peuple ╵que je n’aurais jamais ╵rejeté loin de moi.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Car je suis l’Eternel, leur Dieu ;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: je les exaucerai.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: Le peuple d’Ephraïm
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '10.7 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Voir '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: '9.3'
        - type: text
          text: ' et note.'
      marker-yv: yv-n
    - type: text
      text: ' ╵aura de la vaillance ╵tels des guerriers,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: leur cœur sera joyeux ╵tout comme on se réjouit ╵quand on a bu du vin.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Leurs enfants le verront ╵et eux aussi seront joyeux
  - type: usfm
    marker: q1
    children:
    - type: text
      text: car à cause de l’Eternel ╵ils auront le cœur plein de joie.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: Oui, en sifflant, ╵je les rassemblerai,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: car je les aurai délivrés
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et ils seront aussi nombreux ╵qu’ils l’étaient autrefois.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: Je les ai dispersés ╵au sein de peuples étrangers,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dans des pays lointains ; ╵là ils se souviendront de moi.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ils subsisteront avec leurs enfants,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ils reviendront.
