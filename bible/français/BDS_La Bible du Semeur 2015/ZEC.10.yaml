document_id: ZEC.10,21
type_code: fra
verses:
  '1':
  - type: text
    content: Demandez donc à l’Eternel ╵de la pluie au printemps !
  - type: text
    content: 'Il produit les orages :'
  - type: text
    content: il vous accordera ╵une pluie abondante
  - type: text
    content: et fera pousser l’herbe ╵de chacun dans son champ.
  - type: heading
    content: Le jugement sur les idoles
  '10':
  - type: text
    content: Je les ramènerai d’Egypte,
  - type: text
    content: je les rassemblerai ╵de l’Assyrie
  - type: note
    content: L’Egypte et l’Assyrie (qui n’existe plus à l’époque) sont citées comme typiques des nations hostiles au peuple de Dieu.
  - type: text
    content: ','
  - type: text
    content: je les ferai rentrer ╵en Galaad et au Liban
  - type: note
    content: Au nord et à l’est d’Israël.
  - type: text
    content: ','
  - type: text
    content: et, même ainsi, l’espace ╵ne leur suffira pas.
  '11':
  - type: text
    content: Israël franchira ╵la mer de la détresse.
  - type: text
    content: L’Eternel frappera ╵les vagues de la mer,
  - type: text
    content: et il mettra à sec ╵le Nil jusqu’en ses profondeurs.
  - type: text
    content: L’orgueil de l’Assyrie ╵sera brisé,
  - type: text
    content: le sceptre de l’Egypte ╵lui sera enlevé.
  '12':
  - type: text
    content: Et aux Israélites, ╵je donnerai la force ╵qui vient de l’Eternel.
  - type: text
    content: Ils marcheront pour lui,
  - type: text
    content: l’Eternel le déclare.
  '2':
  - type: text
    content: Car vos idoles domestiques ╵ont débité des mots trompeurs,
  - type: text
    content: les devins ont transmis ╵des révélations fausses.
  - type: text
    content: Ils racontaient des songes ╵qui n’étaient que mensonges,
  - type: text
    content: et leurs consolations ╵étaient des illusions.
  - type: text
    content: Voilà pourquoi ce peuple ╵a dû partir au loin,
  - type: text
    content: dans la misère, ╵comme un troupeau ╵qui n’a pas de berger.
  - type: heading
    content: Un nouvel exode
  '3':
  - type: text
    content: C’est contre les bergers ╵que je suis en colère,
  - type: text
    content: j’interviendrai contre les boucs.
  - type: text
    content: Le Seigneur des armées célestes ╵vient s’occuper
  - type: text
    content: de son troupeau, ╵le peuple de Juda,
  - type: text
    content: et il va faire d’eux ╵son cheval glorieux ╵pour la bataille.
  '4':
  - type: text
    content: Car la pierre angulaire
  - type: note
    content: Voir 3.9 ; Es 28.16.
  - type: text
    content: ' ╵sortira de Juda,'
  - type: text
    content: de lui aussi viendra ╵le piquet de la tente
  - type: text
    content: ainsi que l’arc de guerre.
  - type: text
    content: Oui, de lui tous les chefs ╵seront issus.
  '5':
  - type: text
    content: Pareils à des guerriers
  - type: text
    content: foulant la boue des rues ╵au cours de la bataille,
  - type: text
    content: ils combattront.
  - type: text
    content: L’Eternel sera avec eux.
  - type: text
    content: Alors leurs ennemis ╵montés sur des chevaux
  - type: text
    content: seront couverts de honte.
  '6':
  - type: text
    content: J’affermirai ╵le peuple de Juda,
  - type: text
    content: je sauverai ╵le peuple de Joseph.
  - type: text
    content: Je les rétablirai,
  - type: text
    content: car j’aurai de l’amour pour eux,
  - type: text
    content: ils seront comme un peuple ╵que je n’aurais jamais ╵rejeté loin de moi.
  - type: text
    content: Car je suis l’Eternel, leur Dieu ;
  - type: text
    content: je les exaucerai.
  '7':
  - type: text
    content: Le peuple d’Ephraïm
  - type: note
    content: Voir 9.3 et note.
  - type: text
    content: ' ╵aura de la vaillance ╵tels des guerriers,'
  - type: text
    content: leur cœur sera joyeux ╵tout comme on se réjouit ╵quand on a bu du vin.
  - type: text
    content: Leurs enfants le verront ╵et eux aussi seront joyeux
  - type: text
    content: car à cause de l’Eternel ╵ils auront le cœur plein de joie.
  '8':
  - type: text
    content: Oui, en sifflant, ╵je les rassemblerai,
  - type: text
    content: car je les aurai délivrés
  - type: text
    content: et ils seront aussi nombreux ╵qu’ils l’étaient autrefois.
  '9':
  - type: text
    content: Je les ai dispersés ╵au sein de peuples étrangers,
  - type: text
    content: dans des pays lointains ; ╵là ils se souviendront de moi.
  - type: text
    content: Ils subsisteront avec leurs enfants,
  - type: text
    content: ils reviendront.
