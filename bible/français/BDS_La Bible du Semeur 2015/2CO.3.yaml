document_id: 2CO.3
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Les serviteurs de la nouvelle alliance
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: En parlant ainsi, commençons-nous de nouveau à nous recommander nous-mêmes, ou avons-nous besoin, comme certains, de vous présenter des lettres de recommandation ou de vous en demander
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '3.1 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Les adversaires de Paul étaient venus à Corinthe munis de lettres de recommandation émanant probablement de Jérusalem. Avant de repartir, ils avaient demandé de telles lettres aux Corinthiens pour continuer leur mission dans d’autres Eglises.
    marker-yv: yv-n
  - type: text
    text: '  ? '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Notre lettre c’est vous-mêmes, une lettre écrite dans notre cœur, que tout le monde peut connaître et lire. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Il est évident que vous êtes une lettre que Christ a confiée à notre ministère et qu’il nous a fait écrire, non avec de l’encre, mais par l’Esprit du Dieu vivant, non sur des tablettes de pierre
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '3.3 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Allusion aux tables de la Loi (Ex 24.12 ; 31.18 ; 34.28-29).
    marker-yv: yv-n
  - type: text
    text: ', mais sur des tablettes de chair : sur votre cœur'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '3.3 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Voir '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Jr 31.33
        metadata:
          usfm: JER.31.33
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Telle est l’assurance que nous avons par Christ, devant Dieu. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Cela ne veut pas dire que nous puissions nous considérer par nous-mêmes à la hauteur d’une telle tâche
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '3.5 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Autre traduction : '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: cela ne veut pas dire que nous soyons capables de concevoir quelque chose par nous-mêmes.
    marker-yv: yv-n
  - type: text
    text: '  ; au contraire, notre capacité vient de Dieu. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: C’est lui qui nous a rendus capables d’être les serviteurs d’une nouvelle alliance qui ne dépend pas de la Loi, avec ses commandements écrits, mais de l’Esprit. Car la Loi, avec ses commandements écrits, inflige la mort. L’Esprit, lui, communique la vie.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Le ministère de Moïse, au service de la Loi, dont les lettres ont été gravées sur des pierres, a conduit à la mort. Cependant, ce ministère a été glorieux, au point que les Israélites n’ont pas pu regarder Moïse en face, à cause de la gloire, pourtant passagère, dont rayonnait son visage. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Mais alors, le ministère au service de l’Esprit ne sera-t-il pas bien plus glorieux encore ?
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'En effet, si le ministère qui a entraîné la condamnation des hommes a été glorieux, combien plus glorieux est celui qui conduit les hommes à être déclarés justes par Dieu ! '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'On peut même dire que cette gloire du passé perd tout son éclat quand on la compare à la gloire présente qui lui est bien supérieure. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Car si ce qui est passager a été touché par la gloire, combien plus grande sera la gloire de ce qui demeure éternellement !
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Cette espérance nous remplit d’assurance. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Nous ne faisons pas comme Moïse qui « couvrait son visage d’un voile » pour empêcher les Israélites de voir la réalité vers laquelle tendait ce qui était passager
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '3.13 '
    - type: usfm
      marker: ft
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ex 34.35
        metadata:
          usfm: EXO.34.35
      - type: text
        text: '. D’autres comprennent : '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: de voir le terme auquel tendait ce qui était passager.
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Mais leur esprit est devenu incapable de comprendre : aujourd’hui encore, lorsqu’ils lisent le Livre de l’Ancienne Alliance'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '3.14 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: C’est-à-dire l’Ancien Testament.
    marker-yv: yv-n
  - type: text
    text: ', ce même voile demeure ; il ne leur est pas ôté, car c’est dans l’union avec Christ qu’il est levé.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Aussi, jusqu’à ce jour, toutes les fois que les Israélites lisent les écrits de Moïse, un voile leur couvre l’esprit. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Mais, comme le dit l’Ecriture : '
  - type: usfm
    marker: qt
    children:
    - type: text
      text: Lorsque Moïse se tournait vers le Seigneur, il ôtait le voile
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '3.16 '
    - type: usfm
      marker: ft
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ex 34.34
        metadata:
          usfm: EXO.34.34
      - type: text
        text: '. D’autres comprennent : '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: lorsque quelqu’un se tourne vers le Seigneur, le voile est ôté.
    marker-yv: yv-n
  - type: usfm
    marker: qt
    children:
    - type: text
      text: .
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: usfm
    marker: qt
    children:
    - type: text
      text: Le Seigneur
  - type: text
    text: ' dont parle le texte, c’est l’Esprit'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '3.17 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'D’autres comprennent : '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: le Seigneur, c’est l’Esprit.
    marker-yv: yv-n
  - type: text
    text: ', et là où est l’Esprit du Seigneur, là règne la liberté.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Et nous tous qui, le visage découvert, contemplons
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '3.18 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Autre traduction : '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: reflétons.
    marker-yv: yv-n
  - type: text
    text: ', comme dans un miroir, la gloire du Seigneur, nous sommes transformés en son image dans une gloire dont l’éclat ne cesse de grandir. C’est là l’œuvre du Seigneur, c’est-à-dire de l’Esprit.'
