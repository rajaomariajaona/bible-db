document_id: 2CO.3,21
type_code: fra
verses:
  '1':
  - type: heading
    content: Les serviteurs de la nouvelle alliance
  - type: text
    content: En parlant ainsi, commençons-nous de nouveau à nous recommander nous-mêmes, ou avons-nous besoin, comme certains, de vous présenter des lettres de recommandation ou de vous en demander
  - type: note
    content: Les adversaires de Paul étaient venus à Corinthe munis de lettres de recommandation émanant probablement de Jérusalem. Avant de repartir, ils avaient demandé de telles lettres aux Corinthiens pour continuer leur mission dans d’autres Eglises.
  - type: text
    content: '  ? '
  '10':
  - type: text
    content: 'On peut même dire que cette gloire du passé perd tout son éclat quand on la compare à la gloire présente qui lui est bien supérieure. '
  '11':
  - type: text
    content: Car si ce qui est passager a été touché par la gloire, combien plus grande sera la gloire de ce qui demeure éternellement !
  '12':
  - type: text
    content: 'Cette espérance nous remplit d’assurance. '
  '13':
  - type: text
    content: Nous ne faisons pas comme Moïse qui « couvrait son visage d’un voile » pour empêcher les Israélites de voir la réalité vers laquelle tendait ce qui était passager
  - type: note
    content: 'Ex 34.35. D’autres comprennent : de voir le terme auquel tendait ce qui était passager.'
  - type: text
    content: .
  '14':
  - type: text
    content: 'Mais leur esprit est devenu incapable de comprendre : aujourd’hui encore, lorsqu’ils lisent le Livre de l’Ancienne Alliance'
  - type: note
    content: C’est-à-dire l’Ancien Testament.
  - type: text
    content: ', ce même voile demeure ; il ne leur est pas ôté, car c’est dans l’union avec Christ qu’il est levé.'
  '15':
  - type: text
    content: 'Aussi, jusqu’à ce jour, toutes les fois que les Israélites lisent les écrits de Moïse, un voile leur couvre l’esprit. '
  '16':
  - type: text
    content: 'Mais, comme le dit l’Ecriture : '
  - type: text
    content: Lorsque Moïse se tournait vers le Seigneur, il ôtait le voile
  - type: note
    content: 'Ex 34.34. D’autres comprennent : lorsque quelqu’un se tourne vers le Seigneur, le voile est ôté.'
  - type: text
    content: .
  - type: text
    content: ' '
  '17':
  - type: text
    content: Le Seigneur
  - type: text
    content: ' dont parle le texte, c’est l’Esprit'
  - type: note
    content: 'D’autres comprennent : le Seigneur, c’est l’Esprit.'
  - type: text
    content: ', et là où est l’Esprit du Seigneur, là règne la liberté.'
  '18':
  - type: text
    content: Et nous tous qui, le visage découvert, contemplons
  - type: note
    content: 'Autre traduction : reflétons.'
  - type: text
    content: ', comme dans un miroir, la gloire du Seigneur, nous sommes transformés en son image dans une gloire dont l’éclat ne cesse de grandir. C’est là l’œuvre du Seigneur, c’est-à-dire de l’Esprit.'
  '2':
  - type: text
    content: 'Notre lettre c’est vous-mêmes, une lettre écrite dans notre cœur, que tout le monde peut connaître et lire. '
  '3':
  - type: text
    content: Il est évident que vous êtes une lettre que Christ a confiée à notre ministère et qu’il nous a fait écrire, non avec de l’encre, mais par l’Esprit du Dieu vivant, non sur des tablettes de pierre
  - type: note
    content: Allusion aux tables de la Loi (Ex 24.12 ; 31.18 ; 34.28-29).
  - type: text
    content: ', mais sur des tablettes de chair : sur votre cœur'
  - type: note
    content: Voir Jr 31.33.
  - type: text
    content: .
  '4':
  - type: text
    content: 'Telle est l’assurance que nous avons par Christ, devant Dieu. '
  '5':
  - type: text
    content: Cela ne veut pas dire que nous puissions nous considérer par nous-mêmes à la hauteur d’une telle tâche
  - type: note
    content: 'Autre traduction : cela ne veut pas dire que nous soyons capables de concevoir quelque chose par nous-mêmes.'
  - type: text
    content: '  ; au contraire, notre capacité vient de Dieu. '
  '6':
  - type: text
    content: C’est lui qui nous a rendus capables d’être les serviteurs d’une nouvelle alliance qui ne dépend pas de la Loi, avec ses commandements écrits, mais de l’Esprit. Car la Loi, avec ses commandements écrits, inflige la mort. L’Esprit, lui, communique la vie.
  '7':
  - type: text
    content: 'Le ministère de Moïse, au service de la Loi, dont les lettres ont été gravées sur des pierres, a conduit à la mort. Cependant, ce ministère a été glorieux, au point que les Israélites n’ont pas pu regarder Moïse en face, à cause de la gloire, pourtant passagère, dont rayonnait son visage. '
  '8':
  - type: text
    content: Mais alors, le ministère au service de l’Esprit ne sera-t-il pas bien plus glorieux encore ?
  '9':
  - type: text
    content: 'En effet, si le ministère qui a entraîné la condamnation des hommes a été glorieux, combien plus glorieux est celui qui conduit les hommes à être déclarés justes par Dieu ! '
