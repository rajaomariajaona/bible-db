document_id: JHN.14
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Le chemin, la vérité et la vie
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Jésus dit : '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Que votre cœur ne se trouble pas. Ayez foi en Dieu, ayez aussi foi en moi.
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'Dans la maison de mon Père, il y a beaucoup de demeures ; si ce n’était pas vrai, je vous l’aurais dit : en effet je vais vous préparer une place.'
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Lorsque je vous aurai préparé une place, je reviendrai et je vous prendrai avec moi, afin que vous soyez, vous aussi, là où je suis.
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Mais vous en connaissez le chemin.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Thomas lui dit : Seigneur, nous ne savons même pas où tu vas, comment pourrions-nous savoir par quel chemin on y parvient ?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: ' '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: – Je suis, moi, le chemin,
  - type: text
    text: ' répondit Jésus, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: la vérité et la vie. Personne ne va au Père sans passer par moi.
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Si vous me connaissez, vous connaîtrez aussi mon Père
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '14.7 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Certains manuscrits ont : '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: si vous m’aviez connu, vous connaîtriez aussi mon Père.
    marker-yv: yv-n
  - type: usfm
    marker: wj
    children:
    - type: text
      text: . Et maintenant déjà vous le connaissez, vous l’avez même vu.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Philippe intervint : Seigneur, montre-nous le Père, et cela nous suffit.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: ' '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: – Eh quoi,
  - type: text
    text: ' lui répondit Jésus, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'après tout le temps que j’ai passé avec vous, tu ne me connais pas encore, Philippe ! Celui qui m’a vu, a vu le Père. Comment peux-tu dire : « Montre-nous le Père ? »'
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'Ne crois-tu pas que je suis dans le Père et que le Père est en moi ? Ce que je vous dis, je ne le dis pas de moi-même : le Père demeure en moi et c’est lui qui accomplit ainsi ses propres œuvres.'
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'Croyez-moi : Je suis dans le Père et le Père est en moi. Sinon, croyez au moins à cause des œuvres que vous m’avez vu accomplir.'
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'Vraiment, je vous l’assure : celui qui croit en moi accomplira les œuvres que je fais. Il en fera même de plus grandes parce que je vais auprès du Père.'
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Et quoi que ce soit que vous demandiez en mon nom, je le réaliserai pour que la gloire du Père soit manifestée par le Fils.
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'Je le répète : Si vous me demandez'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '14.14 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Certains manuscrits ont : '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: si vous demandez.
    marker-yv: yv-n
  - type: text
    text: ' '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: quelque chose en mon nom, je le ferai.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Jésus promet l’Esprit Saint
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: ' '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Si vous m’aimez, vous suivrez mes commandements.
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Et moi, je demanderai au Père de vous donner un autre défenseur en justice
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '14.16 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Jean présente l’opposition à Jésus sous la forme d’un procès. Mis en accusation (
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 5.16-18
        metadata:
          usfm: JHN.5.16+JHN.5.17+JHN.5.18
      - type: text
        text: ), Jésus défend sa cause, qui est aussi celle du Père, en produisant ses témoins (
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 5.19-46
        metadata:
          usfm: JHN.5.19+JHN.5.20+JHN.5.21+JHN.5.22+JHN.5.23+JHN.5.24+JHN.5.25+JHN.5.26+JHN.5.27+JHN.5.28+JHN.5.29+JHN.5.30+JHN.5.31+JHN.5.32+JHN.5.33+JHN.5.34+JHN.5.35+JHN.5.36+JHN.5.37+JHN.5.38+JHN.5.39+JHN.5.40+JHN.5.41+JHN.5.42+JHN.5.43+JHN.5.44+JHN.5.45+JHN.5.46
      - type: text
        text: ) et en mettant ses adversaires au défi de prouver sa culpabilité (
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '8.46'
        metadata:
          usfm: JHN.8.46
      - type: text
        text: ). Une fois qu’il sera parti, le Saint-Esprit prendra le relais pour défendre la cause de Jésus dans le procès qui l’oppose au monde incrédule. Il le fera en équipant les apôtres pour qu’ils témoignent en faveur de Jésus (14.26 ; 15.26-27 ; 16.8-15)
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: .
    marker-yv: yv-n
  - type: usfm
    marker: wj
    children:
    - type: text
      text: ', afin qu’il reste pour toujours avec vous :'
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: c’est l’Esprit de vérité, celui que le monde est incapable de recevoir parce qu’il ne le voit pas et ne le connaît pas. Quant à vous, vous le connaissez, car il demeure auprès de vous, et il sera
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '14.17 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'De très bons manuscrits ont : '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: il est en vous.
    marker-yv: yv-n
  - type: text
    text: ' '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: en vous.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: ' '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Non, je ne vous laisserai pas orphelins, mais je reviendrai vers vous.
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Sous peu, le monde ne me verra plus ; mais vous, vous me verrez parce que je vis et que, vous aussi, vous vivrez.
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Quand ce jour viendra, vous connaîtrez que je suis en mon Père ; vous saurez aussi que vous êtes en moi, et que moi je suis en vous.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: ' '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Celui qui m’aime, c’est celui qui retient mes commandements et les applique. Mon Père aimera celui qui m’aime ; moi aussi, je l’aimerai et je me ferai connaître à lui.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Jude (qu’il ne faut pas confondre avec Judas Iscariot) lui demanda : Seigneur, pourquoi est-ce seulement à nous que tu veux te manifester, et non au monde ?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Jésus lui répondit : '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'Si quelqu’un m’aime, il obéira à ma parole. Mon Père aussi l’aimera : nous viendrons à lui et nous établirons notre demeure chez lui.'
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Mais celui qui ne m’aime pas ne met pas mes paroles en pratique. Or, cette Parole que vous entendez ne vient pas de moi, c’est la Parole même du Père qui m’a envoyé.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: ' '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Je vous dis tout cela pendant que je suis encore avec vous.
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Mais le Défenseur
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '14.26 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Voir v. 16 et la note.
    marker-yv: yv-n
  - type: text
    text: ' '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: en justice, le Saint-Esprit que le Père enverra en mon nom, vous enseignera toutes choses et vous rappellera tout ce que je vous ai dit moi-même.
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Je pars, mais je vous laisse la paix, c’est ma paix que je vous donne. Je ne vous la donne pas comme le monde la donne. C’est pourquoi, ne soyez pas troublés et n’ayez aucune crainte en votre cœur.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: ' '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Vous m’avez entendu dire que je pars, mais aussi que je reviendrai auprès de vous. Si vous m’aimiez, vous seriez heureux de savoir que je vais au Père, car le Père est plus grand que moi.
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Je vous ai prévenus dès maintenant, avant que ces choses arrivent, pour qu’au jour où elles se produiront, vous croyiez.
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Désormais, je n’aurai plus guère l’occasion de m’entretenir avec vous, car le dominateur de ce monde vient. Ce n’est pas qu’il ait une prise sur moi,
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: mais il faut que le monde reconnaisse que j’aime le Père et que j’agis conformément à ce qu’il m’a ordonné. Levez-vous ; partons d’ici.
