document_id: JHN.14,21
type_code: fra
verses:
  '1':
  - type: heading
    content: Le chemin, la vérité et la vie
  - type: text
    content: 'Jésus dit : '
  - type: text
    content: Que votre cœur ne se trouble pas. Ayez foi en Dieu, ayez aussi foi en moi.
  - type: text
    content: ' '
  '10':
  - type: text
    content: 'Ne crois-tu pas que je suis dans le Père et que le Père est en moi ? Ce que je vous dis, je ne le dis pas de moi-même : le Père demeure en moi et c’est lui qui accomplit ainsi ses propres œuvres.'
  - type: text
    content: ' '
  '11':
  - type: text
    content: 'Croyez-moi : Je suis dans le Père et le Père est en moi. Sinon, croyez au moins à cause des œuvres que vous m’avez vu accomplir.'
  - type: text
    content: ' '
  '12':
  - type: text
    content: 'Vraiment, je vous l’assure : celui qui croit en moi accomplira les œuvres que je fais. Il en fera même de plus grandes parce que je vais auprès du Père.'
  - type: text
    content: ' '
  '13':
  - type: text
    content: Et quoi que ce soit que vous demandiez en mon nom, je le réaliserai pour que la gloire du Père soit manifestée par le Fils.
  - type: text
    content: ' '
  '14':
  - type: text
    content: 'Je le répète : Si vous me demandez'
  - type: note
    content: 'Certains manuscrits ont : si vous demandez.'
  - type: text
    content: ' '
  - type: text
    content: quelque chose en mon nom, je le ferai.
  - type: heading
    content: Jésus promet l’Esprit Saint
  '15':
  - type: text
    content: ' '
  - type: text
    content: Si vous m’aimez, vous suivrez mes commandements.
  - type: text
    content: ' '
  '16':
  - type: text
    content: Et moi, je demanderai au Père de vous donner un autre défenseur en justice
  - type: note
    content: Jean présente l’opposition à Jésus sous la forme d’un procès. Mis en accusation (5.16-18), Jésus défend sa cause, qui est aussi celle du Père, en produisant ses témoins (5.19-46) et en mettant ses adversaires au défi de prouver sa culpabilité (8.46). Une fois qu’il sera parti, le Saint-Esprit prendra le relais pour défendre la cause de Jésus dans le procès qui l’oppose au monde incrédule. Il le fera en équipant les apôtres pour qu’ils témoignent en faveur de Jésus (14.26 ; 15.26-27 ; 16.8-15).
  - type: text
    content: ', afin qu’il reste pour toujours avec vous :'
  - type: text
    content: ' '
  '17':
  - type: text
    content: c’est l’Esprit de vérité, celui que le monde est incapable de recevoir parce qu’il ne le voit pas et ne le connaît pas. Quant à vous, vous le connaissez, car il demeure auprès de vous, et il sera
  - type: note
    content: 'De très bons manuscrits ont : il est en vous.'
  - type: text
    content: ' '
  - type: text
    content: en vous.
  '18':
  - type: text
    content: ' '
  - type: text
    content: Non, je ne vous laisserai pas orphelins, mais je reviendrai vers vous.
  - type: text
    content: ' '
  '19':
  - type: text
    content: Sous peu, le monde ne me verra plus ; mais vous, vous me verrez parce que je vis et que, vous aussi, vous vivrez.
  - type: text
    content: ' '
  '2':
  - type: text
    content: 'Dans la maison de mon Père, il y a beaucoup de demeures ; si ce n’était pas vrai, je vous l’aurais dit : en effet je vais vous préparer une place.'
  - type: text
    content: ' '
  '20':
  - type: text
    content: Quand ce jour viendra, vous connaîtrez que je suis en mon Père ; vous saurez aussi que vous êtes en moi, et que moi je suis en vous.
  '21':
  - type: text
    content: ' '
  - type: text
    content: Celui qui m’aime, c’est celui qui retient mes commandements et les applique. Mon Père aimera celui qui m’aime ; moi aussi, je l’aimerai et je me ferai connaître à lui.
  '22':
  - type: text
    content: 'Jude (qu’il ne faut pas confondre avec Judas Iscariot) lui demanda : Seigneur, pourquoi est-ce seulement à nous que tu veux te manifester, et non au monde ?'
  '23':
  - type: text
    content: 'Jésus lui répondit : '
  - type: text
    content: 'Si quelqu’un m’aime, il obéira à ma parole. Mon Père aussi l’aimera : nous viendrons à lui et nous établirons notre demeure chez lui.'
  - type: text
    content: ' '
  '24':
  - type: text
    content: Mais celui qui ne m’aime pas ne met pas mes paroles en pratique. Or, cette Parole que vous entendez ne vient pas de moi, c’est la Parole même du Père qui m’a envoyé.
  '25':
  - type: text
    content: ' '
  - type: text
    content: Je vous dis tout cela pendant que je suis encore avec vous.
  - type: text
    content: ' '
  '26':
  - type: text
    content: Mais le Défenseur
  - type: note
    content: Voir v. 16 et la note.
  - type: text
    content: ' '
  - type: text
    content: en justice, le Saint-Esprit que le Père enverra en mon nom, vous enseignera toutes choses et vous rappellera tout ce que je vous ai dit moi-même.
  - type: text
    content: ' '
  '27':
  - type: text
    content: Je pars, mais je vous laisse la paix, c’est ma paix que je vous donne. Je ne vous la donne pas comme le monde la donne. C’est pourquoi, ne soyez pas troublés et n’ayez aucune crainte en votre cœur.
  '28':
  - type: text
    content: ' '
  - type: text
    content: Vous m’avez entendu dire que je pars, mais aussi que je reviendrai auprès de vous. Si vous m’aimiez, vous seriez heureux de savoir que je vais au Père, car le Père est plus grand que moi.
  - type: text
    content: ' '
  '29':
  - type: text
    content: Je vous ai prévenus dès maintenant, avant que ces choses arrivent, pour qu’au jour où elles se produiront, vous croyiez.
  - type: text
    content: ' '
  '3':
  - type: text
    content: Lorsque je vous aurai préparé une place, je reviendrai et je vous prendrai avec moi, afin que vous soyez, vous aussi, là où je suis.
  - type: text
    content: ' '
  '30':
  - type: text
    content: Désormais, je n’aurai plus guère l’occasion de m’entretenir avec vous, car le dominateur de ce monde vient. Ce n’est pas qu’il ait une prise sur moi,
  - type: text
    content: ' '
  '31':
  - type: text
    content: mais il faut que le monde reconnaisse que j’aime le Père et que j’agis conformément à ce qu’il m’a ordonné. Levez-vous ; partons d’ici.
  '4':
  - type: text
    content: Mais vous en connaissez le chemin.
  '5':
  - type: text
    content: 'Thomas lui dit : Seigneur, nous ne savons même pas où tu vas, comment pourrions-nous savoir par quel chemin on y parvient ?'
  '6':
  - type: text
    content: ' '
  - type: text
    content: – Je suis, moi, le chemin,
  - type: text
    content: ' répondit Jésus, '
  - type: text
    content: la vérité et la vie. Personne ne va au Père sans passer par moi.
  - type: text
    content: ' '
  '7':
  - type: text
    content: Si vous me connaissez, vous connaîtrez aussi mon Père
  - type: note
    content: 'Certains manuscrits ont : si vous m’aviez connu, vous connaîtriez aussi mon Père.'
  - type: text
    content: . Et maintenant déjà vous le connaissez, vous l’avez même vu.
  '8':
  - type: text
    content: 'Philippe intervint : Seigneur, montre-nous le Père, et cela nous suffit.'
  '9':
  - type: text
    content: ' '
  - type: text
    content: – Eh quoi,
  - type: text
    content: ' lui répondit Jésus, '
  - type: text
    content: 'après tout le temps que j’ai passé avec vous, tu ne me connais pas encore, Philippe ! Celui qui m’a vu, a vu le Père. Comment peux-tu dire : « Montre-nous le Père ? »'
  - type: text
    content: ' '
