document_id: 2CO.12,21
type_code: fra
verses:
  '1':
  - type: text
    content: Faut-il se vanter ? Cela n’est pas convenable. J’en viendrai cependant à des visions et à des révélations du Seigneur.
  '10':
  - type: text
    content: Je trouve ainsi ma joie dans la faiblesse, les insultes, la détresse, les persécutions et les angoisses que j’endure pour Christ. Car c’est lorsque je suis faible que je suis réellement fort.
  - type: heading
    content: Le souci de Paul pour les Corinthiens
  '11':
  - type: text
    content: Voilà que je parle en insensé, mais vous m’y avez forcé. C’est vous qui auriez dû me recommander, car bien que je ne sois rien, je ne suis en rien inférieur à ces « super-apôtres ».
  '12':
  - type: text
    content: 'Les marques qui caractérisent un apôtre ont été produites parmi vous : une persévérance sans faille, des signes miraculeux, des prodiges, des actes extraordinaires.'
  '13':
  - type: text
    content: En quoi avez-vous été défavorisés par rapport aux autres Eglises ? Tout au plus par le fait que je ne vous ai pas été à charge. Pardonnez-moi cette injustice !
  '14':
  - type: text
    content: 'Me voici prêt à me rendre chez vous pour la troisième fois. Et à nouveau, je ne vous serai pas à charge, car ce ne sont pas vos biens que je recherche, c’est vous-mêmes. En effet, ce n’est pas aux enfants d’épargner pour leurs parents : ce sont les parents qui doivent le faire pour leurs enfants. '
  '15':
  - type: text
    content: Pour moi, c’est très volontiers que je ferai des dépenses, et que je me dépenserai moi-même tout entier pour vous. Si je vous aime davantage, devrais-je être moins aimé de vous ?
  '16':
  - type: text
    content: 'Soit, diront certains, je ne vous ai pas été à charge, mais en malin que je suis, je vous ai pris par ruse. '
  '17':
  - type: text
    content: 'Vous ai-je exploités par l’intermédiaire de l’un ou l’autre de mes envoyés ? '
  '18':
  - type: text
    content: 'J’ai demandé à Tite d’aller chez vous et j’ai envoyé avec lui le frère dont j’ai parlé. Tite vous a-t-il exploités ? N’avons-nous pas marché tous deux dans le même esprit ? N’avons-nous pas suivi les mêmes traces ? '
  '19':
  - type: text
    content: 'Vous croyez depuis longtemps que nous cherchons à nous justifier à vos yeux. Non, c’est devant Dieu que nous parlons, en accord avec Christ ; et tout cela, mes chers amis, ne vise qu’à une seule chose : votre croissance dans la foi.'
  '2':
  - type: text
    content: Je connais un homme, qui appartient à Christ
  - type: note
    content: Paul parle de lui-même à la troisième personne parce qu’il répugne à se mettre en avant.
  - type: text
    content: ', et qui, il y a quatorze ans'
  - type: note
    content: C’est-à-dire en 42 (ou 43) lors de son séjour en Cilicie (Ac 9.30 ; 11.25 ; Ga 1.21) ou à Antioche.
  - type: text
    content: ', a été enlevé jusqu’au troisième ciel – était-ce dans son corps, je ne sais, ou sans son corps, je ne sais, mais Dieu le sait. '
  '20':
  - type: text
    content: Car, je l’avoue, j’ai peur qu’à mon arrivée, je ne vous trouve pas tels que je voudrais, et que vous, de votre côté, vous me trouviez tout autre que vous le souhaitez. Je crains de découvrir de la discorde, des jalousies, de la colère, des rivalités, des médisances, des commérages, de l’orgueil et des désordres.
  '21':
  - type: text
    content: Oui, j’ai peur qu’à mon arrivée, Dieu me réserve encore des expériences humiliantes parmi vous, je crains d’avoir à pleurer sur plusieurs qui ont péché auparavant et ne se sont pas détournés de leurs pratiques dégradantes, de la débauche et de l’inconduite dans lesquelles ils ont vécu.
  '3':
  - type: text
    content: 'Je sais seulement que cet homme – dans son corps ou hors de son corps, je ne sais, Dieu le sait – '
  '4':
  - type: text
    content: a été enlevé au paradis et qu’il a entendu des paroles qu’on ne peut pas répéter parce qu’il n’est pas permis à un homme de les dire
  - type: note
    content: 'D’autres comprennent : des paroles ineffables qu’on ne saurait répéter.'
  - type: text
    content: .
  '5':
  - type: text
    content: 'Au sujet d’un tel homme, je me vanterai, mais au sujet de moi-même, je ne me vanterai que de mes faiblesses. '
  '6':
  - type: text
    content: 'Et pourtant, si je voulais me vanter, je ne serais pas un insensé, car je ne dirais que la vérité. Mais je m’en abstiens. Car je désire éviter que l’on se fasse de moi une idée supérieure à ce qu’on peut déduire de mes actes et de mes paroles. '
  '7':
  - type: text
    content: D’ailleurs, parce que ces révélations étaient extraordinaires, pour me garder de l’orgueil, Dieu m’a imposé une épreuve qui, telle une écharde
  - type: note
    content: Il pourrait s’agir d’une maladie des yeux (voir Ga 4.13-15 ; 6.11), ou bien il s’agit d’un autre mal dont nous ignorons tout.
  - type: text
    content: ', tourmente mon corps. Elle me vient de Satan qui a été chargé de me frapper pour que je ne sois pas rempli d’orgueil.'
  '8':
  - type: text
    content: 'Au sujet de cette épreuve, j’ai prié par trois fois le Seigneur de l’éloigner de moi, '
  '9':
  - type: text
    content: 'mais il m’a répondu : '
  - type: text
    content: « Ma grâce te suffit, c’est dans la faiblesse que ma puissance se manifeste pleinement. »
  - type: text
    content: ' C’est pourquoi je me vanterai plutôt de mes faiblesses, afin que la puissance de Christ repose sur moi.'
