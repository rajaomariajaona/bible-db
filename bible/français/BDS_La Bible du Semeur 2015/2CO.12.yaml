document_id: 2CO.12,21
type_code: fra
verses:
  '1':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: Faut-il se vanter ? Cela n’est pas convenable. J’en viendrai cependant à des visions et à des révélations du Seigneur.
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: Je trouve ainsi ma joie dans la faiblesse, les insultes, la détresse, les persécutions et les angoisses que j’endure pour Christ. Car c’est lorsque je suis faible que je suis réellement fort.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Le souci de Paul pour les Corinthiens
    marker-yv: yv-h
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: Voilà que je parle en insensé, mais vous m’y avez forcé. C’est vous qui auriez dû me recommander, car bien que je ne sois rien, je ne suis en rien inférieur à ces « super-apôtres ».
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'Les marques qui caractérisent un apôtre ont été produites parmi vous : une persévérance sans faille, des signes miraculeux, des prodiges, des actes extraordinaires.'
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: En quoi avez-vous été défavorisés par rapport aux autres Eglises ? Tout au plus par le fait que je ne vous ai pas été à charge. Pardonnez-moi cette injustice !
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'Me voici prêt à me rendre chez vous pour la troisième fois. Et à nouveau, je ne vous serai pas à charge, car ce ne sont pas vos biens que je recherche, c’est vous-mêmes. En effet, ce n’est pas aux enfants d’épargner pour leurs parents : ce sont les parents qui doivent le faire pour leurs enfants. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: Pour moi, c’est très volontiers que je ferai des dépenses, et que je me dépenserai moi-même tout entier pour vous. Si je vous aime davantage, devrais-je être moins aimé de vous ?
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'Soit, diront certains, je ne vous ai pas été à charge, mais en malin que je suis, je vous ai pris par ruse. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'Vous ai-je exploités par l’intermédiaire de l’un ou l’autre de mes envoyés ? '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'J’ai demandé à Tite d’aller chez vous et j’ai envoyé avec lui le frère dont j’ai parlé. Tite vous a-t-il exploités ? N’avons-nous pas marché tous deux dans le même esprit ? N’avons-nous pas suivi les mêmes traces ? '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'Vous croyez depuis longtemps que nous cherchons à nous justifier à vos yeux. Non, c’est devant Dieu que nous parlons, en accord avec Christ ; et tout cela, mes chers amis, ne vise qu’à une seule chose : votre croissance dans la foi.'
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: Je connais un homme, qui appartient à Christ
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '12.2 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Paul parle de lui-même à la troisième personne parce qu’il répugne à se mettre en avant.
      marker-yv: yv-n
    - type: text
      text: ', et qui, il y a quatorze ans'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '12.2 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: C’est-à-dire en 42 (ou 43) lors de son séjour en Cilicie (Ac 9.30 ; 11.25 ; Ga 1.21) ou à Antioche.
      marker-yv: yv-n
    - type: text
      text: ', a été enlevé jusqu’au troisième ciel – était-ce dans son corps, je ne sais, ou sans son corps, je ne sais, mais Dieu le sait. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: Car, je l’avoue, j’ai peur qu’à mon arrivée, je ne vous trouve pas tels que je voudrais, et que vous, de votre côté, vous me trouviez tout autre que vous le souhaitez. Je crains de découvrir de la discorde, des jalousies, de la colère, des rivalités, des médisances, des commérages, de l’orgueil et des désordres.
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: Oui, j’ai peur qu’à mon arrivée, Dieu me réserve encore des expériences humiliantes parmi vous, je crains d’avoir à pleurer sur plusieurs qui ont péché auparavant et ne se sont pas détournés de leurs pratiques dégradantes, de la débauche et de l’inconduite dans lesquelles ils ont vécu.
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'Je sais seulement que cet homme – dans son corps ou hors de son corps, je ne sais, Dieu le sait – '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: a été enlevé au paradis et qu’il a entendu des paroles qu’on ne peut pas répéter parce qu’il n’est pas permis à un homme de les dire
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '12.4 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'D’autres comprennent : '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: des paroles ineffables qu’on ne saurait répéter.
      marker-yv: yv-n
    - type: text
      text: .
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'Au sujet d’un tel homme, je me vanterai, mais au sujet de moi-même, je ne me vanterai que de mes faiblesses. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'Et pourtant, si je voulais me vanter, je ne serais pas un insensé, car je ne dirais que la vérité. Mais je m’en abstiens. Car je désire éviter que l’on se fasse de moi une idée supérieure à ce qu’on peut déduire de mes actes et de mes paroles. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: D’ailleurs, parce que ces révélations étaient extraordinaires, pour me garder de l’orgueil, Dieu m’a imposé une épreuve qui, telle une écharde
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '12.7 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Il pourrait s’agir d’une maladie des yeux (voir Ga 4.13-15 ; 6.11), ou bien il s’agit d’un autre mal dont nous ignorons tout.
      marker-yv: yv-n
    - type: text
      text: ', tourmente mon corps. Elle me vient de Satan qui a été chargé de me frapper pour que je ne sois pas rempli d’orgueil.'
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'Au sujet de cette épreuve, j’ai prié par trois fois le Seigneur de l’éloigner de moi, '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'mais il m’a répondu : '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: « Ma grâce te suffit, c’est dans la faiblesse que ma puissance se manifeste pleinement. »
    - type: text
      text: ' C’est pourquoi je me vanterai plutôt de mes faiblesses, afin que la puissance de Christ repose sur moi.'
