document_id: JOS.18,21
type_code: fra
verses:
  '1':
  - type: heading
    content: Le partage du reste du pays entre les sept autres tribus
  - type: text
    content: Toute la communauté des Israélites se réunit à Silo
  - type: note
    content: A une quarantaine de kilomètres au nord de Jérusalem, dans une position centrale pour les tribus principales (Juda et les descendants de Joseph). Silo devint le centre politique et religieux du pays. Le tabernacle y resta jusqu’au temps de Samuel (1 S 4.1-11) où il fut transféré à Gabaon (1 Ch 21.29).
  - type: text
    content: '  ; ils y dressèrent la tente de la Rencontre, car tout le pays était soumis devant eux. '
  '10':
  - type: text
    content: Devant l’Eternel, à Silo, Josué partagea le pays entre les Israélites par tirage au sort, en assignant à chaque tribu la part qui lui revenait.
  - type: heading
    content: Le territoire de la tribu de Benjamin
  '11':
  - type: text
    content: 'Le premier lot revint aux familles de la tribu des Benjaminites. Le territoire qui leur échut était situé entre celui des descendants de Juda et celui des descendants de Joseph. '
  '12':
  - type: text
    content: 'Leur frontière nord partait du Jourdain, montait au flanc de Jéricho au nord, puis traversait la région montagneuse à l’ouest, pour aboutir au désert de Beth-Aven. '
  '13':
  - type: text
    content: 'De là, elle gagnait Louz, appelée aujourd’hui Béthel, qu’elle contournait sur le flanc sud, puis elle descendait à Ataroth-Addar par-dessus la montagne située au sud de Beth-Horôn-la-Basse. '
  '14':
  - type: text
    content: Ensuite, depuis cette montagne, elle s’infléchissait du côté de l’ouest et tournait vers le sud pour aboutir à Qiryath-Baal, devenu Qiryath-Yearim, ville de la tribu de Juda. Voilà où passait la frontière du côté ouest.
  '15':
  - type: text
    content: 'La frontière méridionale partait de Qiryath-Yearim, allait vers l’ouest en direction de la source des eaux de Nephtoah, '
  '16':
  - type: text
    content: 'd’où elle descendait au pied de la montagne qui domine la vallée de Ben-Hinnom, au nord de la vallée des Rephaïm. Elle descendait la vallée de Hinnom, sur le versant sud de la colline des Yebousiens jusqu’à Eyn-Roguel. '
  '17':
  - type: text
    content: 'Alors elle tournait vers le nord pour aboutir à Eyn-Shémesh, puis vers Gueliloth en face de la montée d’Adoummim. De là, elle descendait vers la pierre dite de Bohân, du nom d’un des fils de Ruben. '
  '18':
  - type: text
    content: Elle passait par le versant nord de la montagne qui domine la vallée du Jourdain
  - type: note
    content: 'Au lieu de : qui domine la vallée du Jourdain, l’ancienne version grecque a : de Beth Arabah.'
  - type: text
    content: ' et descendait dans cette vallée. '
  '19':
  - type: text
    content: 'Elle continuait sur le flanc nord de Beth-Hogla et aboutissait à la pointe nord de la mer Morte vers l’embouchure du Jourdain. Voilà où passait leur frontière méridionale. '
  '2':
  - type: text
    content: 'Mais il restait parmi les Israélites sept tribus qui n’avaient pas encore pris possession de leur patrimoine. '
  '20':
  - type: text
    content: Le Jourdain constituait la frontière du côté est. Telles furent les frontières du territoire attribué aux familles des Benjaminites.
  '21':
  - type: text
    content: 'Voici les villes attribuées aux familles de la tribu de Benjamin : Jéricho, Beth-Hogla, Emeq-Qetsits, '
  '22':
  - type: text
    content: 'Beth-Araba, Tsemaraïm, Béthel, '
  '23':
  - type: text
    content: 'Avvim, Para, Ophra, '
  '24':
  - type: text
    content: 'Kephar-Ammonaï, Ophni et Guéba : soit douze villes et leurs villages, '
  '25':
  - type: text
    content: 'Gabaon, Rama, Beéroth, '
  '26':
  - type: text
    content: 'Mitspé, Kephira, Motsa, '
  '27':
  - type: text
    content: 'Réqem, Yirpéel, Tareala, '
  '28':
  - type: text
    content: 'Tsela, Eleph, Yebous c’est-à-dire Jérusalem, Guibeath, Qiryath : soit quatorze villes avec les villages qui en dépendent. Tout cela constituait le patrimoine des familles de Benjamin.'
  '3':
  - type: text
    content: 'Josué dit alors aux Israélites : Pendant combien de temps encore négligerez-vous d’aller prendre possession du pays que l’Eternel, le Dieu de vos ancêtres, vous a donné ? '
  '4':
  - type: text
    content: 'Désignez trois hommes par tribu et je les enverrai en mission : ils iront parcourir le pays et ils feront le plan de leurs patrimoines respectifs, après quoi ils reviendront me trouver. '
  '5':
  - type: text
    content: 'Alors ils le partageront en sept parts. Les descendants de Juda conserveront leur territoire au sud, et ceux de Joseph le leur au nord. '
  '6':
  - type: text
    content: 'Etablissez donc un relevé descriptif du pays en y délimitant sept parts. Vous viendrez ensuite me le présenter et je tirerai ici vos lots au sort devant l’Eternel notre Dieu. '
  '7':
  - type: text
    content: Mais les descendants de Lévi ne recevront aucun territoire parmi vous, car le sacerdoce de l’Eternel constitue leur part
  - type: note
    content: Voir 13.14 ; Dt 18.1-8.
  - type: text
    content: . Quant aux tribus de Gad, de Ruben et à la demi-tribu de Manassé, ils ont déjà reçu, à l’est du Jourdain, la part que Moïse, serviteur de l’Eternel, leur a attribuée.
  '8':
  - type: text
    content: 'Les hommes désignés pour faire le relevé du pays se mirent en route. Avant leur départ, Josué leur avait donné les ordres suivants : Allez parcourir le pays, faites-en le relevé, puis revenez auprès de moi. Ici même à Silo, je procéderai au tirage au sort devant l’Eternel.'
  '9':
  - type: text
    content: 'Ces hommes partirent donc et parcoururent le pays, ils en dressèrent le relevé, ville par ville, sur un document, et partagèrent tout le territoire en sept sections. Puis ils revinrent trouver Josué au camp de Silo. '
