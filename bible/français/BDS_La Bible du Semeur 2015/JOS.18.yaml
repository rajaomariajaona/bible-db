document_id: JOS.18,21
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Le partage du reste du pays entre les sept autres tribus
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: Toute la communauté des Israélites se réunit à Silo
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '18.1 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: A une quarantaine de kilomètres au nord de Jérusalem, dans une position centrale pour les tribus principales (Juda et les descendants de Joseph). Silo devint le centre politique et religieux du pays. Le tabernacle y resta jusqu’au temps de Samuel (
        - type: usfm
          marker: ref
          children:
          - type: text
            text: 1 S 4.1-11
        - type: text
          text: ) où il fut transféré à Gabaon (
        - type: usfm
          marker: ref
          children:
          - type: text
            text: 1 Ch 21.29
        - type: text
          text: ).
      marker-yv: yv-n
    - type: text
      text: '  ; ils y dressèrent la tente de la Rencontre, car tout le pays était soumis devant eux. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: Devant l’Eternel, à Silo, Josué partagea le pays entre les Israélites par tirage au sort, en assignant à chaque tribu la part qui lui revenait.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Le territoire de la tribu de Benjamin
    marker-yv: yv-h
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'Le premier lot revint aux familles de la tribu des Benjaminites. Le territoire qui leur échut était situé entre celui des descendants de Juda et celui des descendants de Joseph. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'Leur frontière nord partait du Jourdain, montait au flanc de Jéricho au nord, puis traversait la région montagneuse à l’ouest, pour aboutir au désert de Beth-Aven. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'De là, elle gagnait Louz, appelée aujourd’hui Béthel, qu’elle contournait sur le flanc sud, puis elle descendait à Ataroth-Addar par-dessus la montagne située au sud de Beth-Horôn-la-Basse. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: Ensuite, depuis cette montagne, elle s’infléchissait du côté de l’ouest et tournait vers le sud pour aboutir à Qiryath-Baal, devenu Qiryath-Yearim, ville de la tribu de Juda. Voilà où passait la frontière du côté ouest.
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'La frontière méridionale partait de Qiryath-Yearim, allait vers l’ouest en direction de la source des eaux de Nephtoah, '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'd’où elle descendait au pied de la montagne qui domine la vallée de Ben-Hinnom, au nord de la vallée des Rephaïm. Elle descendait la vallée de Hinnom, sur le versant sud de la colline des Yebousiens jusqu’à Eyn-Roguel. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'Alors elle tournait vers le nord pour aboutir à Eyn-Shémesh, puis vers Gueliloth en face de la montée d’Adoummim. De là, elle descendait vers la pierre dite de Bohân, du nom d’un des fils de Ruben. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: Elle passait par le versant nord de la montagne qui domine la vallée du Jourdain
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '18.18 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Au lieu de : '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'qui domine la vallée du Jourdain, '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'l’ancienne version grecque a : '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: de Beth Arabah.
      marker-yv: yv-n
    - type: text
      text: ' et descendait dans cette vallée. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'Elle continuait sur le flanc nord de Beth-Hogla et aboutissait à la pointe nord de la mer Morte vers l’embouchure du Jourdain. Voilà où passait leur frontière méridionale. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'Mais il restait parmi les Israélites sept tribus qui n’avaient pas encore pris possession de leur patrimoine. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: Le Jourdain constituait la frontière du côté est. Telles furent les frontières du territoire attribué aux familles des Benjaminites.
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: 'Voici les villes attribuées aux familles de la tribu de Benjamin : Jéricho, Beth-Hogla, Emeq-Qetsits, '
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: 'Beth-Araba, Tsemaraïm, Béthel, '
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: 'Avvim, Para, Ophra, '
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: 'Kephar-Ammonaï, Ophni et Guéba : soit douze villes et leurs villages, '
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: 'Gabaon, Rama, Beéroth, '
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: 'Mitspé, Kephira, Motsa, '
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: 'Réqem, Yirpéel, Tareala, '
  '28':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: 'Tsela, Eleph, Yebous c’est-à-dire Jérusalem, Guibeath, Qiryath : soit quatorze villes avec les villages qui en dépendent. Tout cela constituait le patrimoine des familles de Benjamin.'
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'Josué dit alors aux Israélites : Pendant combien de temps encore négligerez-vous d’aller prendre possession du pays que l’Eternel, le Dieu de vos ancêtres, vous a donné ? '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'Désignez trois hommes par tribu et je les enverrai en mission : ils iront parcourir le pays et ils feront le plan de leurs patrimoines respectifs, après quoi ils reviendront me trouver. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'Alors ils le partageront en sept parts. Les descendants de Juda conserveront leur territoire au sud, et ceux de Joseph le leur au nord. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'Etablissez donc un relevé descriptif du pays en y délimitant sept parts. Vous viendrez ensuite me le présenter et je tirerai ici vos lots au sort devant l’Eternel notre Dieu. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: Mais les descendants de Lévi ne recevront aucun territoire parmi vous, car le sacerdoce de l’Eternel constitue leur part
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '18.7 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Voir 13.14 ; Dt 18.1-8.
      marker-yv: yv-n
    - type: text
      text: . Quant aux tribus de Gad, de Ruben et à la demi-tribu de Manassé, ils ont déjà reçu, à l’est du Jourdain, la part que Moïse, serviteur de l’Eternel, leur a attribuée.
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'Les hommes désignés pour faire le relevé du pays se mirent en route. Avant leur départ, Josué leur avait donné les ordres suivants : Allez parcourir le pays, faites-en le relevé, puis revenez auprès de moi. Ici même à Silo, je procéderai au tirage au sort devant l’Eternel.'
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'Ces hommes partirent donc et parcoururent le pays, ils en dressèrent le relevé, ville par ville, sur un document, et partagèrent tout le territoire en sept sections. Puis ils revinrent trouver Josué au camp de Silo. '
