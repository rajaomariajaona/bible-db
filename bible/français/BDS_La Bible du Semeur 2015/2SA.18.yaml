document_id: 2SA.18,21
type_code: fra
verses:
  '1':
  - type: heading
    content: La bataille décisive
  - type: text
    content: 'David passa en revue les troupes qui étaient avec lui et il nomma des officiers, chefs de « milliers » et de « centaines ». '
  '10':
  - type: text
    content: 'Un soldat le vit et le rapporta à Joab. Il dit : Je viens de voir Absalom suspendu à un chêne.'
  '11':
  - type: text
    content: 'Joab lui dit : Comment ? Tu l’as vu ! Alors pourquoi ne l’as-tu pas abattu sur-le-champ ? Je t’aurais bien donné une centaine de grammes d’argent'
  - type: note
    content: Dix fois l’unité, le sicle, celui-ci étant de 11,4 g.
  - type: text
    content: ' et une ceinture d’apparat.'
  '12':
  - type: text
    content: 'Mais le soldat lui répondit : Non, même si tu me pesais et me mettais en main mille pièces d’argent, je ne porterais pas la main sur le fils du roi, car nous avons entendu l’ordre que le roi t’a donné, à toi comme à Abishaï et à Ittaï, lorsqu’il a dit : « Par égard pour moi, épargnez le jeune Absalom. » '
  '13':
  - type: text
    content: D’ailleurs, si j’avais agi traîtreusement au péril de ma vie, le roi aurait fini par le découvrir – car rien ne lui demeure caché – et toi-même tu te serais bien gardé d’intervenir en ma faveur.
  '14':
  - type: text
    content: 'Joab s’écria : Je n’ai pas de temps à perdre à rester là avec toi.'
  - type: text
    content: 'Il empoigna trois épieux et les planta dans la poitrine d’Absalom retenu vivant au milieu du chêne. '
  '15':
  - type: text
    content: Puis les dix soldats qui portaient les armes de Joab entourèrent aussitôt Absalom et lui portèrent leurs coups pour l’achever.
  '16':
  - type: text
    content: 'Alors Joab fit sonner du cor pour arrêter le combat. Son armée cessa de poursuivre celle d’Israël et prit le chemin du retour, car Joab voulait épargner le peuple. '
  '17':
  - type: text
    content: On saisit le corps d’Absalom et on le jeta dans une fosse profonde en pleine forêt, puis on accumula sur lui un énorme tas de pierres. Pendant ce temps, les hommes d’Israël s’enfuirent, chacun chez soi.
  '18':
  - type: text
    content: De son vivant, Absalom s’était fait ériger la stèle qui est dans la vallée royale
  - type: note
    content: Située aux environs de Jérusalem (voir Gn 14.17).
  - type: text
    content: ', car il disait : Je n’ai pas de fils pour perpétuer mon nom.'
  - type: text
    content: Il avait donné son propre nom à la stèle qui s’appelle encore aujourd’hui le Monument d’Absalom.
  - type: heading
    content: David apprend la mort d’Absalom
  '19':
  - type: text
    content: 'Ahimaats, fils de Tsadoq, dit à Joab : Permets-moi de courir annoncer au roi la nouvelle que l’Eternel lui a rendu justice en le délivrant de ses ennemis.'
  '2':
  - type: text
    content: Ensuite, il partagea l’armée en trois corps qu’il confia à Joab, à Abishaï, fils de Tserouya, frère de Joab, et à Ittaï, de Gath
  - type: note
    content: Joab et Abishaï sont deux neveux de David (voir 2.18). Pour Ittaï, voir 15.18-22.
  - type: text
    content: '. Puis il annonça à la troupe qu’il les accompagnerait lui-même au combat. '
  '20':
  - type: text
    content: 'Joab lui répondit : Si tu y vas, tu ne seras pas porteur d’une bonne nouvelle aujourd’hui. Tu pourras être une autre fois porteur de bonnes nouvelles. Mais aujourd’hui, ce ne sera pas une bonne nouvelle puisque le fils du roi est mort.'
  '21':
  - type: text
    content: 'Joab dit à un Ethiopien : Va raconter au roi ce que tu as vu.'
  - type: text
    content: L’homme s’inclina devant Joab et partit en courant.
  '22':
  - type: text
    content: 'Ahimaats, fils de Tsadoq, revint à la charge et insista auprès de Joab : Advienne que pourra ! Laisse-moi courir derrière cet Ethiopien.'
  - type: text
    content: 'Mais Joab lui dit : Pourquoi veux-tu courir, mon ami ? Pareille nouvelle ne te vaudra aucune récompense !'
  '23':
  - type: text
    content: – Advienne que pourra, répéta-t-il, je voudrais y courir.
  - type: text
    content: – Eh bien, cours donc, lui dit Joab.
  - type: text
    content: Ahimaats s’élança sur le chemin de la plaine du Jourdain et dépassa l’Ethiopien.
  '24':
  - type: text
    content: 'David était assis entre la porte extérieure et la porte intérieure de la ville. La sentinelle se rendit sur le rempart, au-dessus de la porte, et scruta l’horizon. Soudain, elle aperçut au loin un homme qui courait seul. '
  '25':
  - type: text
    content: 'La sentinelle cria la nouvelle pour en informer le roi. Celui-ci lui répondit : S’il est seul, il apporte une bonne nouvelle.'
  - type: text
    content: 'L’homme poursuivait sa course et s’approchait. '
  '26':
  - type: text
    content: 'Alors la sentinelle aperçut un autre homme qui courait. Elle cria au gardien de la porte : Voilà un autre coureur isolé.'
  - type: text
    content: 'Le roi déclara : Lui aussi apporte une bonne nouvelle.'
  '27':
  - type: text
    content: 'La sentinelle reprit : A la manière de courir du premier, je crois reconnaître Ahimaats, fils de Tsadoq.'
  - type: text
    content: 'Le roi dit : C’est un homme de bien, et il apporte certainement une bonne nouvelle.'
  '28':
  - type: text
    content: 'Ahimaats s’approcha et s’écria en s’adressant au roi : Tout va bien !'
  - type: text
    content: 'Puis il se prosterna devant le roi, le visage contre terre, et dit : Béni soit l’Eternel ton Dieu, qui t’a donné la victoire sur ceux qui avaient osé s’attaquer au roi mon seigneur.'
  '29':
  - type: text
    content: 'Le roi lui demanda : Est-ce que le jeune Absalom est sain et sauf ?'
  - type: text
    content: 'Ahimaats répondit : Au moment où Joab m’a envoyé vers toi en même temps qu’un autre serviteur, j’ai vu qu’on s’agitait beaucoup, mais je ne sais pas pourquoi.'
  '3':
  - type: text
    content: 'Mais les soldats s’écrièrent : Non, tu ne dois pas venir avec nous ! Car si nous étions mis en fuite, on ne ferait pas attention à nous, et si même la moitié d’entre nous succombait, on n’y attacherait pas d’importance, mais toi, tu comptes autant que dix mille d’entre nous ; d’autre part, il est préférable que tu puisses à tout moment venir à notre aide depuis la ville.'
  '30':
  - type: text
    content: 'Le roi lui dit : Mets-toi de côté et tiens-toi là.'
  - type: text
    content: Il s’écarta et attendit.
  '31':
  - type: text
    content: 'Alors l’Ethiopien arriva et dit : C’est une bonne nouvelle que je viens apprendre au roi mon seigneur, car l’Eternel t’a rendu justice aujourd’hui en te délivrant de tous ceux qui s’étaient révoltés contre toi.'
  '32':
  - type: text
    content: 'Le roi lui demanda alors : Le jeune Absalom, est-il sain et sauf ?'
  - type: text
    content: 'L’Ethiopien répondit : Que tous les ennemis de mon seigneur le roi et tous ceux qui se révoltent contre toi pour te faire du mal subissent le même sort que ce jeune homme.'
  '4':
  - type: text
    content: 'Le roi leur dit : Je ferai ce que vous jugerez bon.'
  - type: text
    content: Il se plaça donc près de la porte de la ville et toute l’armée sortit par « centaines » et par « milliers
  - type: note
    content: Ces «  centaines » et ces «  milliers » étaient peut-être des corps d’armée comprenant respectivement quelques dizaines et quelques centaines d’hommes.
  - type: text
    content: '  ». '
  '5':
  - type: text
    content: 'Le roi donna cet ordre à Joab, à Abishaï et à Ittaï : Par égard pour moi, ménagez le jeune Absalom !'
  - type: text
    content: 'Toute la troupe l’entendit donner cet ordre à tous les chefs de l’armée au sujet d’Absalom. '
  '6':
  - type: text
    content: L’armée sortit dans la campagne pour aller combattre Israël. La bataille s’engagea dans la forêt d’Ephraïm
  - type: note
    content: Cette forêt semble se situer, non sur le territoire d’Ephraïm, mais à l’est du Jourdain. Elle fut appelée ainsi soit parce que les Ephraïmites avaient manifesté des prétentions sur cette région, soit parce que certains d’entre eux s’étaient établis là.
  - type: text
    content: '. '
  '7':
  - type: text
    content: 'L’armée d’Israël fut battue là par les hommes de David, elle subit une lourde perte de vingt mille hommes. '
  '8':
  - type: text
    content: Les combattants s’éparpillèrent sur toute la région et, ce jour-là, ceux qui trouvèrent la mort dans la forêt furent plus nombreux que ceux qui furent tués par l’épée.
  - type: heading
    content: La fin d’Absalom
  '9':
  - type: text
    content: 'Absalom se trouva soudain face à face avec des hommes de David ; il s’enfuit sur son mulet qui s’engagea sous les branches enchevêtrées d’un grand chêne. Sa chevelure s’accrocha aux branches de l’arbre et il demeura suspendu entre ciel et terre tandis que son mulet s’échappait sous lui. '
