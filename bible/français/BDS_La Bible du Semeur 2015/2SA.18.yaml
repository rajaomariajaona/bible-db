document_id: 2SA.18
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: La bataille décisive
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'David passa en revue les troupes qui étaient avec lui et il nomma des officiers, chefs de « milliers » et de « centaines ». '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Ensuite, il partagea l’armée en trois corps qu’il confia à Joab, à Abishaï, fils de Tserouya, frère de Joab, et à Ittaï, de Gath
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '18.2 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Joab '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'et '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'Abishaï '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'sont deux neveux de David (voir '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '2.18'
        metadata:
          usfm: 2SA.2.18
      - type: text
        text: '). Pour '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'Ittaï, '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'voir '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 15.18-22
        metadata:
          usfm: 2SA.15.18+2SA.15.19+2SA.15.20+2SA.15.21+2SA.15.22
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: '. Puis il annonça à la troupe qu’il les accompagnerait lui-même au combat. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Mais les soldats s’écrièrent : Non, tu ne dois pas venir avec nous ! Car si nous étions mis en fuite, on ne ferait pas attention à nous, et si même la moitié d’entre nous succombait, on n’y attacherait pas d’importance, mais toi, tu comptes autant que dix mille d’entre nous ; d’autre part, il est préférable que tu puisses à tout moment venir à notre aide depuis la ville.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Le roi leur dit : Je ferai ce que vous jugerez bon.'
- type: usfm
  marker: p
  children:
  - type: text
    text: Il se plaça donc près de la porte de la ville et toute l’armée sortit par « centaines » et par « milliers
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '18.4 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Ces «  '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'centaines » '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'et ces «  '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'milliers » '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: étaient peut-être des corps d’armée comprenant respectivement quelques dizaines et quelques centaines d’hommes.
    marker-yv: yv-n
  - type: text
    text: '  ». '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Le roi donna cet ordre à Joab, à Abishaï et à Ittaï : Par égard pour moi, ménagez le jeune Absalom !'
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Toute la troupe l’entendit donner cet ordre à tous les chefs de l’armée au sujet d’Absalom. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: L’armée sortit dans la campagne pour aller combattre Israël. La bataille s’engagea dans la forêt d’Ephraïm
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '18.6 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Cette forêt semble se situer, non sur le territoire d’Ephraïm, mais à l’est du Jourdain. Elle fut appelée ainsi soit parce que les Ephraïmites avaient manifesté des prétentions sur cette région, soit parce que certains d’entre eux s’étaient établis là.
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'L’armée d’Israël fut battue là par les hommes de David, elle subit une lourde perte de vingt mille hommes. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Les combattants s’éparpillèrent sur toute la région et, ce jour-là, ceux qui trouvèrent la mort dans la forêt furent plus nombreux que ceux qui furent tués par l’épée.
- type: usfm
  marker: s1
  children:
  - type: text
    text: La fin d’Absalom
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Absalom se trouva soudain face à face avec des hommes de David ; il s’enfuit sur son mulet qui s’engagea sous les branches enchevêtrées d’un grand chêne. Sa chevelure s’accrocha aux branches de l’arbre et il demeura suspendu entre ciel et terre tandis que son mulet s’échappait sous lui. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Un soldat le vit et le rapporta à Joab. Il dit : Je viens de voir Absalom suspendu à un chêne.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Joab lui dit : Comment ? Tu l’as vu ! Alors pourquoi ne l’as-tu pas abattu sur-le-champ ? Je t’aurais bien donné une centaine de grammes d’argent'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '18.11 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Dix fois l’unité, le sicle, celui-ci étant de 11,4 g.
    marker-yv: yv-n
  - type: text
    text: ' et une ceinture d’apparat.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Mais le soldat lui répondit : Non, même si tu me pesais et me mettais en main mille pièces d’argent, je ne porterais pas la main sur le fils du roi, car nous avons entendu l’ordre que le roi t’a donné, à toi comme à Abishaï et à Ittaï, lorsqu’il a dit : « Par égard pour moi, épargnez le jeune Absalom. » '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: D’ailleurs, si j’avais agi traîtreusement au péril de ma vie, le roi aurait fini par le découvrir – car rien ne lui demeure caché – et toi-même tu te serais bien gardé d’intervenir en ma faveur.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Joab s’écria : Je n’ai pas de temps à perdre à rester là avec toi.'
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Il empoigna trois épieux et les planta dans la poitrine d’Absalom retenu vivant au milieu du chêne. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Puis les dix soldats qui portaient les armes de Joab entourèrent aussitôt Absalom et lui portèrent leurs coups pour l’achever.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Alors Joab fit sonner du cor pour arrêter le combat. Son armée cessa de poursuivre celle d’Israël et prit le chemin du retour, car Joab voulait épargner le peuple. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: On saisit le corps d’Absalom et on le jeta dans une fosse profonde en pleine forêt, puis on accumula sur lui un énorme tas de pierres. Pendant ce temps, les hommes d’Israël s’enfuirent, chacun chez soi.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: De son vivant, Absalom s’était fait ériger la stèle qui est dans la vallée royale
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '18.18 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Située aux environs de Jérusalem (voir '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Gn 14.17
        metadata:
          usfm: GEN.14.17
      - type: text
        text: ).
    marker-yv: yv-n
  - type: text
    text: ', car il disait : Je n’ai pas de fils pour perpétuer mon nom.'
- type: usfm
  marker: p
  children:
  - type: text
    text: Il avait donné son propre nom à la stèle qui s’appelle encore aujourd’hui le Monument d’Absalom.
- type: usfm
  marker: s1
  children:
  - type: text
    text: David apprend la mort d’Absalom
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Ahimaats, fils de Tsadoq, dit à Joab : Permets-moi de courir annoncer au roi la nouvelle que l’Eternel lui a rendu justice en le délivrant de ses ennemis.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Joab lui répondit : Si tu y vas, tu ne seras pas porteur d’une bonne nouvelle aujourd’hui. Tu pourras être une autre fois porteur de bonnes nouvelles. Mais aujourd’hui, ce ne sera pas une bonne nouvelle puisque le fils du roi est mort.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Joab dit à un Ethiopien : Va raconter au roi ce que tu as vu.'
- type: usfm
  marker: p
  children:
  - type: text
    text: L’homme s’inclina devant Joab et partit en courant.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Ahimaats, fils de Tsadoq, revint à la charge et insista auprès de Joab : Advienne que pourra ! Laisse-moi courir derrière cet Ethiopien.'
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Mais Joab lui dit : Pourquoi veux-tu courir, mon ami ? Pareille nouvelle ne te vaudra aucune récompense !'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: – Advienne que pourra, répéta-t-il, je voudrais y courir.
- type: usfm
  marker: p
  children:
  - type: text
    text: – Eh bien, cours donc, lui dit Joab.
- type: usfm
  marker: p
  children:
  - type: text
    text: Ahimaats s’élança sur le chemin de la plaine du Jourdain et dépassa l’Ethiopien.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'David était assis entre la porte extérieure et la porte intérieure de la ville. La sentinelle se rendit sur le rempart, au-dessus de la porte, et scruta l’horizon. Soudain, elle aperçut au loin un homme qui courait seul. '
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'La sentinelle cria la nouvelle pour en informer le roi. Celui-ci lui répondit : S’il est seul, il apporte une bonne nouvelle.'
- type: usfm
  marker: p
  children:
  - type: text
    text: 'L’homme poursuivait sa course et s’approchait. '
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Alors la sentinelle aperçut un autre homme qui courait. Elle cria au gardien de la porte : Voilà un autre coureur isolé.'
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Le roi déclara : Lui aussi apporte une bonne nouvelle.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'La sentinelle reprit : A la manière de courir du premier, je crois reconnaître Ahimaats, fils de Tsadoq.'
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Le roi dit : C’est un homme de bien, et il apporte certainement une bonne nouvelle.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'Ahimaats s’approcha et s’écria en s’adressant au roi : Tout va bien !'
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Puis il se prosterna devant le roi, le visage contre terre, et dit : Béni soit l’Eternel ton Dieu, qui t’a donné la victoire sur ceux qui avaient osé s’attaquer au roi mon seigneur.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'Le roi lui demanda : Est-ce que le jeune Absalom est sain et sauf ?'
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Ahimaats répondit : Au moment où Joab m’a envoyé vers toi en même temps qu’un autre serviteur, j’ai vu qu’on s’agitait beaucoup, mais je ne sais pas pourquoi.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'Le roi lui dit : Mets-toi de côté et tiens-toi là.'
- type: usfm
  marker: p
  children:
  - type: text
    text: Il s’écarta et attendit.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'Alors l’Ethiopien arriva et dit : C’est une bonne nouvelle que je viens apprendre au roi mon seigneur, car l’Eternel t’a rendu justice aujourd’hui en te délivrant de tous ceux qui s’étaient révoltés contre toi.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '32'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'Le roi lui demanda alors : Le jeune Absalom, est-il sain et sauf ?'
- type: usfm
  marker: p
  children:
  - type: text
    text: 'L’Ethiopien répondit : Que tous les ennemis de mon seigneur le roi et tous ceux qui se révoltent contre toi pour te faire du mal subissent le même sort que ce jeune homme.'
