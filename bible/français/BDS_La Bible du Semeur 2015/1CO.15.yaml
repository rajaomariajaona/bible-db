document_id: 1CO.15,21
type_code: fra
verses:
  '1':
  - type: heading
    content: Sur la résurrection
  - type: heading
    content: La foi qui sauve
  - type: text
    content: 'Frères et sœurs, je vous rappelle l’Evangile que je vous ai annoncé, que vous avez reçu et auquel vous demeurez attachés. '
  '10':
  - type: text
    content: 'Ce que je suis à présent, c’est à la grâce de Dieu que je le dois, et cette grâce qu’il m’a témoignée n’a pas été inefficace. Loin de là, j’ai peiné à la tâche plus que tous les autres apôtres – non pas moi, certes, mais la grâce de Dieu qui est avec moi. '
  '11':
  - type: text
    content: Bref, que ce soient eux ou que ce soit moi, voilà le message que nous proclamons et voilà aussi ce que vous avez cru.
  - type: heading
    content: Christ est bien ressuscité
  '12':
  - type: text
    content: Or, si nous proclamons que Christ est ressuscité, comment quelques-uns parmi vous peuvent-ils prétendre qu’il n’y a pas de résurrection des morts ?
  '13':
  - type: text
    content: 'S’il n’y a pas de résurrection des morts, alors Christ lui non plus n’est pas ressuscité. '
  '14':
  - type: text
    content: Et si Christ n’est pas ressuscité, notre prédication n’a plus de contenu, et votre foi est sans objet.
  '15':
  - type: text
    content: 'Il y a plus : s’il est vrai que les morts ne ressuscitent pas, nous devons être considérés comme de faux témoins à l’égard de Dieu. En effet, nous avons porté témoignage que Dieu a ressuscité Christ. Mais s’il est vrai que les morts ne ressuscitent pas, il ne l’a pas fait. '
  '16':
  - type: text
    content: Car, si les morts ne peuvent pas revivre, Christ non plus n’est pas revenu à la vie.
  '17':
  - type: text
    content: 'Or, si Christ n’est pas ressuscité, votre foi est une illusion, et vous êtes encore sous le poids de vos péchés. '
  '18':
  - type: text
    content: 'De plus, ceux qui sont morts unis à Christ sont à jamais perdus. '
  '19':
  - type: text
    content: Si c’est seulement pour la vie présente que nous avons mis notre espérance en Christ, nous sommes les plus à plaindre des hommes.
  '2':
  - type: text
    content: C’est par cet Evangile que vous êtes sauvés si vous le retenez tel que je vous l’ai annoncé ; autrement vous auriez cru en vain.
  '20':
  - type: text
    content: Mais, en réalité, Christ est bien revenu à la vie et, comme les premiers fruits de la moisson, il annonce la résurrection des morts.
  '21':
  - type: text
    content: 'Car, tout comme la mort a fait son entrée dans ce monde par un homme, la résurrection vient aussi par un homme. '
  '22':
  - type: text
    content: En effet, de même que tous les hommes meurent du fait de leur union avec Adam, tous seront ramenés à la vie du fait de leur union avec Christ.
  '23':
  - type: text
    content: 'Mais cette résurrection s’effectue selon un ordre bien déterminé : Christ est ressuscité en premier lieu, comme le premier fruit de la moisson ; ensuite, au moment où il viendra, ceux qui lui appartiennent ressusciteront à leur tour. '
  '24':
  - type: text
    content: Puis viendra la fin, lorsque Christ remettra la royauté à Dieu le Père, après avoir réduit à l’impuissance toute Domination, toute Autorité et toute Puissance hostiles.
  '25':
  - type: text
    content: 'Il faut, en effet, qu’il règne jusqu’à ce que Dieu ait '
  - type: text
    content: mis tous ses ennemis sous ses pieds
  - type: note
    content: Ps 110.1.
  - type: text
    content: .
  - type: text
    content: ' '
  '26':
  - type: text
    content: 'Et le dernier ennemi qui sera anéanti, c’est la mort. '
  '27':
  - type: text
    content: 'Car, comme il est écrit : '
  - type: text
    content: Dieu a tout mis sous ses pieds
  - type: note
    content: Ps 8.7.
  - type: text
    content: '. Mais quand l’Ecriture déclare : '
  - type: text
    content: Tout lui a été soumis,
  - type: text
    content: ' il faut, de toute évidence, en excepter celui qui lui a donné cette domination universelle. '
  '28':
  - type: text
    content: Et lorsque tout se trouvera ainsi amené sous l’autorité de Christ, alors le Fils lui-même se placera sous l’autorité de celui qui lui a tout soumis. Ainsi Dieu sera tout en tous.
  '29':
  - type: text
    content: D’autre part, pourquoi certains se font-ils baptiser pour les morts ? S’il est vrai que les morts ne ressuscitent pas, pourquoi donc se font-ils baptiser pour eux
  - type: note
    content: 'Il est difficile de savoir à quoi Paul fait référence ici. Certains proposent la traduction suivante : pourquoi certains se font-ils baptiser au risque d’être mis à mort ? …pourquoi donc se font-ils baptiser au risque de mourir ? en voyant là une référence au martyre auquel on s’exposait en adhérant publiquement à la foi chrétienne.'
  - type: text
    content: '  ?'
  '3':
  - type: text
    content: 'Je vous ai transmis, comme un enseignement de première importance, ce que j’avais moi-même reçu : Christ est mort pour nos péchés, conformément aux Ecritures ; '
  '30':
  - type: text
    content: 'Et nous-mêmes, pourquoi affronterions-nous à tous moments des dangers de mort ? '
  '31':
  - type: text
    content: Journellement, je vois la mort en face, frères et sœurs, aussi vrai que je suis fier de vous, à cause de l’œuvre de Jésus-Christ notre Seigneur.
  '32':
  - type: text
    content: 'Si la lutte que j’ai soutenue à Ephèse, véritable '
  - type: text
    content: combat contre des fauves
  - type: note
    content: Voir Ps 22.13-14, 17. L’apôtre emploie sans doute cette expression au sens figuré car, étant citoyen romain, il ne pouvait pas être condamné à ce supplice.
  - type: text
    content: ', n’a été inspirée que par des motifs purement humains, à quoi cela m’a-t-il servi ? Si les morts ne ressuscitent pas, alors, comme le dit le proverbe : '
  - type: text
    content: « Mangeons et buvons, car demain nous mourrons
  - type: note
    content: Es 22.13.
  - type: text
    content: .
  - type: text
    content: »
  - type: text
    content: ' '
  '33':
  - type: text
    content: 'Attention, ne vous y trompez pas : '
  - type: text
    content: Les mauvaises compagnies corrompent les bonnes mœurs
  - type: note
    content: Citation d’un vers du poète grec Ménandre.
  - type: text
    content: .
  - type: text
    content: ' '
  '34':
  - type: text
    content: Revenez une fois pour toutes à votre bon sens, et ne péchez pas ; car certains d’entre vous ne connaissent pas Dieu. Je le dis à votre honte.
  - type: heading
    content: Le corps ressuscité
  '35':
  - type: text
    content: Mais, demandera peut-être quelqu’un, comment les morts ressusciteront-ils ? Avec quel corps reviendront-ils à la vie ?
  '36':
  - type: text
    content: 'Insensés que vous êtes ! Dans la nature, la graine que vous semez ne peut reprendre vie qu’après être passée par la mort. '
  '37':
  - type: text
    content: 'Lorsque vous faites vos semailles, vous ne mettez pas en terre le corps que la plante aura quand elle aura poussé, mais une simple graine, un grain de blé par exemple ou quelque autre semence. '
  '38':
  - type: text
    content: 'Et Dieu lui donne le corps qu’il veut. A chaque semence correspond un corps particulier. '
  '39':
  - type: text
    content: 'Tous les êtres vivants n’ont pas non plus la même chair : les hommes ont leur propre chair, les animaux en ont une autre, les oiseaux une autre encore, une autre aussi les poissons. '
  '4':
  - type: text
    content: 'il a été mis au tombeau, il est ressuscité le troisième jour, comme l’avaient annoncé les Ecritures. '
  '40':
  - type: text
    content: 'De même, nous distinguons les « corps » des astres de ceux des créatures terrestres ; chacun d’entre eux a son aspect propre. '
  '41':
  - type: text
    content: Le soleil a son propre éclat, de même que la lune, et le rayonnement des étoiles est encore différent. Et chaque étoile même brille d’un éclat particulier.
  '42':
  - type: text
    content: 'Il en va de même pour la résurrection. Lorsque le corps est porté en terre comme la graine que l’on sème, il est corruptible, et il ressuscite incorruptible ; '
  '43':
  - type: text
    content: 'semé infirme et faible, il ressuscite plein de force et glorieux. '
  '44':
  - type: text
    content: 'Ce que l’on enterre, c’est un corps doué de la seule vie naturelle ; ce qui revit, c’est un corps dans lequel règne l’Esprit de Dieu. Aussi vrai qu’il existe un corps doté de la seule vie naturelle, il existe aussi un corps régi par l’Esprit. '
  '45':
  - type: text
    content: 'L’Ecriture ne déclare-t-elle pas : '
  - type: text
    content: Le premier homme, Adam, devint un être vivant
  - type: note
    content: Gn 2.7.
  - type: text
    content: ', doué de la vie naturelle ? Le dernier Adam est devenu, lui, un être qui, animé par l’Esprit, communique la vie.'
  '46':
  - type: text
    content: 'Mais ce qui vient en premier lieu, ce n’est pas ce qui appartient au règne de l’Esprit, c’est ce qui appartient à l’ordre naturel ; ce qui appartient au règne de l’Esprit ne vient qu’ensuite. '
  '47':
  - type: text
    content: Le premier homme, formé de la poussière du sol, appartient à la terre. Le « second homme » appartient au ciel
  - type: note
    content: 'appartient à la terre… appartient au ciel. Autre traduction : vient de la terre… vient du ciel.'
  - type: text
    content: '. '
  '48':
  - type: text
    content: 'Or, tous ceux qui ont été formés de poussière sont semblables à celui qui a été formé de poussière. De même aussi, ceux qui appartiennent au ciel sont semblables à celui qui appartient au ciel. '
  '49':
  - type: text
    content: Et comme nous avons porté l’image de l’homme formé de poussière, nous porterons aussi l’image de l’homme qui appartient au ciel.
  '5':
  - type: text
    content: 'Il est apparu à Pierre, puis aux Douze. '
  '50':
  - type: text
    content: 'Ce que je dis, frères et sœurs, c’est que notre corps de chair et de sang ne peut accéder au royaume de Dieu : ce qui est corruptible ne peut avoir part à l’incorruptibilité.'
  '51':
  - type: text
    content: 'Voici, je vais vous révéler un mystère : nous ne passerons pas tous par la mort, mais nous serons tous transformés, '
  '52':
  - type: text
    content: 'en un instant, en un clin d’œil, au son de la trompette dernière. Car, lorsque cette trompette retentira, les morts ressusciteront pour être désormais incorruptibles, tandis que nous, nous serons changés. '
  '53':
  - type: text
    content: En effet, ce corps corruptible doit se revêtir d’incorruptibilité et ce corps mortel doit se revêtir d’immortalité.
  '54':
  - type: text
    content: 'Lorsque ce corps corruptible aura revêtu l’incorruptibilité et que ce corps mortel aura revêtu l’immortalité, alors se trouvera réalisée cette parole de l’Ecriture :'
  - type: text
    content: La victoire totale sur la mort
  - type: text
    content: ' ╵'
  - type: text
    content: a été remportée
  - type: note
    content: Es 25.8 cité selon l’ancienne version grecque.
  - type: text
    content: .
  '55':
  - type: text
    content: ' '
  - type: text
    content: O mort, qu’est devenue ta victoire ?
  - type: text
    content: O mort, où est ton dard
  - type: text
    content: ' '
  - type: note
    content: Os 13.14 cité selon l’ancienne version grecque.
  - type: text
    content: '?'
  '56':
  - type: text
    content: Le dard de la mort, c’est le péché, et le péché tire sa force de la Loi.
  '57':
  - type: text
    content: Mais loué soit Dieu qui nous donne la victoire par notre Seigneur Jésus-Christ.
  '58':
  - type: text
    content: C’est pourquoi, mes chers frères et sœurs, soyez fermes, ne vous laissez pas ébranler, travaillez sans relâche pour le Seigneur, sachant que la peine que vous vous donnez au service du Seigneur n’est pas inutile.
  '6':
  - type: text
    content: 'Après cela, il a été vu par plus de cinq cents frères à la fois, dont la plupart vivent encore aujourd’hui – quelques-uns d’entre eux seulement sont morts. '
  '7':
  - type: text
    content: 'Ensuite, il est apparu à Jacques, puis à tous les apôtres. '
  '8':
  - type: text
    content: En tout dernier lieu, il m’est apparu à moi, comme à un enfant né après terme
  - type: note
    content: 'Paul, contrairement aux autres apôtres, a été appelé après la mort de Christ. D’autres comprennent : l’avorton, le « moins que rien » qui serait un sobriquet par lequel ses adversaires le désignaient.'
  - type: text
    content: '. '
  '9':
  - type: text
    content: 'Oui, je suis le moindre des apôtres ; je ne mérite pas de porter le titre d’apôtre, puisque j’ai persécuté l’Eglise de Dieu. '
