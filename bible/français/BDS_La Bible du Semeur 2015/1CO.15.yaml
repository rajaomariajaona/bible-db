document_id: 1CO.15
type_code: fra
segments:
- type: usfm
  marker: ms1
  children:
  - type: text
    text: Sur la résurrection
  marker-yv: yv-h
- type: usfm
  marker: s1
  children:
  - type: text
    text: La foi qui sauve
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Frères et sœurs, je vous rappelle l’Evangile que je vous ai annoncé, que vous avez reçu et auquel vous demeurez attachés. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: C’est par cet Evangile que vous êtes sauvés si vous le retenez tel que je vous l’ai annoncé ; autrement vous auriez cru en vain.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Je vous ai transmis, comme un enseignement de première importance, ce que j’avais moi-même reçu : Christ est mort pour nos péchés, conformément aux Ecritures ; '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'il a été mis au tombeau, il est ressuscité le troisième jour, comme l’avaient annoncé les Ecritures. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Il est apparu à Pierre, puis aux Douze. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Après cela, il a été vu par plus de cinq cents frères à la fois, dont la plupart vivent encore aujourd’hui – quelques-uns d’entre eux seulement sont morts. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Ensuite, il est apparu à Jacques, puis à tous les apôtres. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: En tout dernier lieu, il m’est apparu à moi, comme à un enfant né après terme
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '15.8 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Paul, contrairement aux autres apôtres, a été appelé après la mort de Christ. D’autres comprennent : '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'l’avorton, le « moins que rien » '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: qui serait un sobriquet par lequel ses adversaires le désignaient.
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Oui, je suis le moindre des apôtres ; je ne mérite pas de porter le titre d’apôtre, puisque j’ai persécuté l’Eglise de Dieu. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Ce que je suis à présent, c’est à la grâce de Dieu que je le dois, et cette grâce qu’il m’a témoignée n’a pas été inefficace. Loin de là, j’ai peiné à la tâche plus que tous les autres apôtres – non pas moi, certes, mais la grâce de Dieu qui est avec moi. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Bref, que ce soient eux ou que ce soit moi, voilà le message que nous proclamons et voilà aussi ce que vous avez cru.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Christ est bien ressuscité
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Or, si nous proclamons que Christ est ressuscité, comment quelques-uns parmi vous peuvent-ils prétendre qu’il n’y a pas de résurrection des morts ?
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'S’il n’y a pas de résurrection des morts, alors Christ lui non plus n’est pas ressuscité. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Et si Christ n’est pas ressuscité, notre prédication n’a plus de contenu, et votre foi est sans objet.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Il y a plus : s’il est vrai que les morts ne ressuscitent pas, nous devons être considérés comme de faux témoins à l’égard de Dieu. En effet, nous avons porté témoignage que Dieu a ressuscité Christ. Mais s’il est vrai que les morts ne ressuscitent pas, il ne l’a pas fait. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Car, si les morts ne peuvent pas revivre, Christ non plus n’est pas revenu à la vie.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Or, si Christ n’est pas ressuscité, votre foi est une illusion, et vous êtes encore sous le poids de vos péchés. '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'De plus, ceux qui sont morts unis à Christ sont à jamais perdus. '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Si c’est seulement pour la vie présente que nous avons mis notre espérance en Christ, nous sommes les plus à plaindre des hommes.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Mais, en réalité, Christ est bien revenu à la vie et, comme les premiers fruits de la moisson, il annonce la résurrection des morts.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Car, tout comme la mort a fait son entrée dans ce monde par un homme, la résurrection vient aussi par un homme. '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: En effet, de même que tous les hommes meurent du fait de leur union avec Adam, tous seront ramenés à la vie du fait de leur union avec Christ.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Mais cette résurrection s’effectue selon un ordre bien déterminé : Christ est ressuscité en premier lieu, comme le premier fruit de la moisson ; ensuite, au moment où il viendra, ceux qui lui appartiennent ressusciteront à leur tour. '
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: Puis viendra la fin, lorsque Christ remettra la royauté à Dieu le Père, après avoir réduit à l’impuissance toute Domination, toute Autorité et toute Puissance hostiles.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Il faut, en effet, qu’il règne jusqu’à ce que Dieu ait '
  - type: usfm
    marker: qt
    children:
    - type: text
      text: mis tous ses ennemis sous ses pieds
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '15.25 '
    - type: usfm
      marker: ft
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ps 110.1
        metadata:
          usfm: PSA.110.1
      - type: text
        text: .
    marker-yv: yv-n
  - type: usfm
    marker: qt
    children:
    - type: text
      text: .
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Et le dernier ennemi qui sera anéanti, c’est la mort. '
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'Car, comme il est écrit : '
  - type: usfm
    marker: qt
    children:
    - type: text
      text: Dieu a tout mis sous ses pieds
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '15.27 '
    - type: usfm
      marker: ft
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ps 8.7
        metadata:
          usfm: PSA.8.7
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: '. Mais quand l’Ecriture déclare : '
  - type: usfm
    marker: qt
    children:
    - type: text
      text: Tout lui a été soumis,
  - type: text
    text: ' il faut, de toute évidence, en excepter celui qui lui a donné cette domination universelle. '
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: Et lorsque tout se trouvera ainsi amené sous l’autorité de Christ, alors le Fils lui-même se placera sous l’autorité de celui qui lui a tout soumis. Ainsi Dieu sera tout en tous.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: D’autre part, pourquoi certains se font-ils baptiser pour les morts ? S’il est vrai que les morts ne ressuscitent pas, pourquoi donc se font-ils baptiser pour eux
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '15.29 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Il est difficile de savoir à quoi Paul fait référence ici. Certains proposent la traduction suivante : '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'pourquoi certains se font-ils baptiser au risque d’être mis à mort ? …pourquoi donc se font-ils baptiser au risque de mourir ? '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: en voyant là une référence au martyre auquel on s’exposait en adhérant publiquement à la foi chrétienne.
    marker-yv: yv-n
  - type: text
    text: '  ?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'Et nous-mêmes, pourquoi affronterions-nous à tous moments des dangers de mort ? '
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: Journellement, je vois la mort en face, frères et sœurs, aussi vrai que je suis fier de vous, à cause de l’œuvre de Jésus-Christ notre Seigneur.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '32'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'Si la lutte que j’ai soutenue à Ephèse, véritable '
  - type: usfm
    marker: qt
    children:
    - type: text
      text: combat contre des fauves
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '15.32 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Voir '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ps 22.13-14
        metadata:
          usfm: PSA.22.13+PSA.22.14
      - type: text
        text: ', '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '17'
        metadata:
          usfm: PSA.22.17
      - type: text
        text: . L’apôtre emploie sans doute cette expression au sens figuré car, étant citoyen romain, il ne pouvait pas être condamné à ce supplice.
    marker-yv: yv-n
  - type: text
    text: ', n’a été inspirée que par des motifs purement humains, à quoi cela m’a-t-il servi ? Si les morts ne ressuscitent pas, alors, comme le dit le proverbe : '
  - type: usfm
    marker: qt
    children:
    - type: text
      text: « Mangeons et buvons, car demain nous mourrons
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '15.32 '
    - type: usfm
      marker: ft
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Es 22.13
        metadata:
          usfm: ISA.22.13
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: .
  - type: usfm
    marker: qt
    children:
    - type: text
      text: »
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '33'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: 'Attention, ne vous y trompez pas : '
  - type: usfm
    marker: qt
    children:
    - type: text
      text: Les mauvaises compagnies corrompent les bonnes mœurs
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '15.33 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Citation d’un vers du poète grec Ménandre.
    marker-yv: yv-n
  - type: usfm
    marker: qt
    children:
    - type: text
      text: .
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '34'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: Revenez une fois pour toutes à votre bon sens, et ne péchez pas ; car certains d’entre vous ne connaissent pas Dieu. Je le dis à votre honte.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Le corps ressuscité
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '35'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: Mais, demandera peut-être quelqu’un, comment les morts ressusciteront-ils ? Avec quel corps reviendront-ils à la vie ?
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '36'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: 'Insensés que vous êtes ! Dans la nature, la graine que vous semez ne peut reprendre vie qu’après être passée par la mort. '
  - type: usfm
    marker: v
    metadata:
      v: '37'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: 'Lorsque vous faites vos semailles, vous ne mettez pas en terre le corps que la plante aura quand elle aura poussé, mais une simple graine, un grain de blé par exemple ou quelque autre semence. '
  - type: usfm
    marker: v
    metadata:
      v: '38'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: text
    text: 'Et Dieu lui donne le corps qu’il veut. A chaque semence correspond un corps particulier. '
  - type: usfm
    marker: v
    metadata:
      v: '39'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '39'
  - type: text
    text: 'Tous les êtres vivants n’ont pas non plus la même chair : les hommes ont leur propre chair, les animaux en ont une autre, les oiseaux une autre encore, une autre aussi les poissons. '
  - type: usfm
    marker: v
    metadata:
      v: '40'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '40'
  - type: text
    text: 'De même, nous distinguons les « corps » des astres de ceux des créatures terrestres ; chacun d’entre eux a son aspect propre. '
  - type: usfm
    marker: v
    metadata:
      v: '41'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '41'
  - type: text
    text: Le soleil a son propre éclat, de même que la lune, et le rayonnement des étoiles est encore différent. Et chaque étoile même brille d’un éclat particulier.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '42'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '42'
  - type: text
    text: 'Il en va de même pour la résurrection. Lorsque le corps est porté en terre comme la graine que l’on sème, il est corruptible, et il ressuscite incorruptible ; '
  - type: usfm
    marker: v
    metadata:
      v: '43'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '43'
  - type: text
    text: 'semé infirme et faible, il ressuscite plein de force et glorieux. '
  - type: usfm
    marker: v
    metadata:
      v: '44'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '44'
  - type: text
    text: 'Ce que l’on enterre, c’est un corps doué de la seule vie naturelle ; ce qui revit, c’est un corps dans lequel règne l’Esprit de Dieu. Aussi vrai qu’il existe un corps doté de la seule vie naturelle, il existe aussi un corps régi par l’Esprit. '
  - type: usfm
    marker: v
    metadata:
      v: '45'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '45'
  - type: text
    text: 'L’Ecriture ne déclare-t-elle pas : '
  - type: usfm
    marker: qt
    children:
    - type: text
      text: Le premier homme, Adam, devint un être vivant
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '15.45 '
    - type: usfm
      marker: ft
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Gn 2.7
        metadata:
          usfm: GEN.2.7
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: ', doué de la vie naturelle ? Le dernier Adam est devenu, lui, un être qui, animé par l’Esprit, communique la vie.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '46'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '46'
  - type: text
    text: 'Mais ce qui vient en premier lieu, ce n’est pas ce qui appartient au règne de l’Esprit, c’est ce qui appartient à l’ordre naturel ; ce qui appartient au règne de l’Esprit ne vient qu’ensuite. '
  - type: usfm
    marker: v
    metadata:
      v: '47'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '47'
  - type: text
    text: Le premier homme, formé de la poussière du sol, appartient à la terre. Le « second homme » appartient au ciel
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '15.47 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'appartient à la terre… appartient au ciel. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Autre traduction : '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: vient de la terre… vient du ciel.
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '48'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '48'
  - type: text
    text: 'Or, tous ceux qui ont été formés de poussière sont semblables à celui qui a été formé de poussière. De même aussi, ceux qui appartiennent au ciel sont semblables à celui qui appartient au ciel. '
  - type: usfm
    marker: v
    metadata:
      v: '49'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '49'
  - type: text
    text: Et comme nous avons porté l’image de l’homme formé de poussière, nous porterons aussi l’image de l’homme qui appartient au ciel.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '50'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '50'
  - type: text
    text: 'Ce que je dis, frères et sœurs, c’est que notre corps de chair et de sang ne peut accéder au royaume de Dieu : ce qui est corruptible ne peut avoir part à l’incorruptibilité.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '51'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '51'
  - type: text
    text: 'Voici, je vais vous révéler un mystère : nous ne passerons pas tous par la mort, mais nous serons tous transformés, '
  - type: usfm
    marker: v
    metadata:
      v: '52'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '52'
  - type: text
    text: 'en un instant, en un clin d’œil, au son de la trompette dernière. Car, lorsque cette trompette retentira, les morts ressusciteront pour être désormais incorruptibles, tandis que nous, nous serons changés. '
  - type: usfm
    marker: v
    metadata:
      v: '53'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '53'
  - type: text
    text: En effet, ce corps corruptible doit se revêtir d’incorruptibilité et ce corps mortel doit se revêtir d’immortalité.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '54'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '54'
  - type: text
    text: 'Lorsque ce corps corruptible aura revêtu l’incorruptibilité et que ce corps mortel aura revêtu l’immortalité, alors se trouvera réalisée cette parole de l’Ecriture :'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: qt
    children:
    - type: text
      text: La victoire totale sur la mort
  - type: text
    text: ' ╵'
  - type: usfm
    marker: qt
    children:
    - type: text
      text: a été remportée
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '15.54 '
    - type: usfm
      marker: ft
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Es 25.8
        metadata:
          usfm: ISA.25.8
      - type: text
        text: ' cité selon l’ancienne version grecque.'
    marker-yv: yv-n
  - type: usfm
    marker: qt
    children:
    - type: text
      text: .
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '55'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '55'
  - type: text
    text: ' '
  - type: usfm
    marker: qt
    children:
    - type: text
      text: O mort, qu’est devenue ta victoire ?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: qt
    children:
    - type: text
      text: O mort, où est ton dard
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '15.55 '
    - type: usfm
      marker: ft
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Os 13.14
        metadata:
          usfm: HOS.13.14
      - type: text
        text: ' cité selon l’ancienne version grecque.'
    marker-yv: yv-n
  - type: usfm
    marker: qt
    children:
    - type: text
      text: '?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '56'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '56'
  - type: text
    text: Le dard de la mort, c’est le péché, et le péché tire sa force de la Loi.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '57'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '57'
  - type: text
    text: Mais loué soit Dieu qui nous donne la victoire par notre Seigneur Jésus-Christ.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '58'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '58'
  - type: text
    text: C’est pourquoi, mes chers frères et sœurs, soyez fermes, ne vous laissez pas ébranler, travaillez sans relâche pour le Seigneur, sachant que la peine que vous vous donnez au service du Seigneur n’est pas inutile.
