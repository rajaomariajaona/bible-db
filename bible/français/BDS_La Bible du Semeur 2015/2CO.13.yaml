document_id: 2CO.13,21
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Avertissement
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: Voici donc la troisième fois
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '13.1 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: La première fois correspond à la fondation de l’Eglise (
        - type: usfm
          marker: ref
          children:
          - type: text
            text: Ac 18
        - type: text
          text: ). La seconde visite (v. 2) était une visite brève, interrompant le séjour de l’apôtre à Ephèse (
        - type: usfm
          marker: ref
          children:
          - type: text
            text: Ac 19
        - type: text
          text: ).
      marker-yv: yv-n
    - type: text
      text: ' que je viendrai chez vous. Comme le dit l’Ecriture, '
    - type: usfm
      marker: qt
      children:
      - type: text
        text: toute affaire sera réglée sur les déclarations de deux ou trois témoins
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '13.1 '
      - type: usfm
        marker: ft
        children:
        - type: usfm
          marker: ref
          children:
          - type: text
            text: Dt 19.15
        - type: text
          text: .
      marker-yv: yv-n
    - type: usfm
      marker: qt
      children:
      - type: text
        text: .
    - type: text
      text: ' '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'Voilà pourquoi je vous écris tout cela pendant que je suis encore loin, pour qu’étant présent, je n’aie pas à faire usage, avec sévérité, de l’autorité que le Seigneur m’a donnée pour construire et non '
    - type: usfm
      marker: qt
      children:
      - type: text
        text: pour renverser
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '13.10 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Voir '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: '10.8'
        - type: text
          text: ' et '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: Jr 1.10
        - type: text
          text: .
      marker-yv: yv-n
    - type: usfm
      marker: qt
      children:
      - type: text
        text: .
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Dernières recommandations et salutations
    marker-yv: yv-h
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: J’ai terminé, frères et sœurs. Soyez dans la joie. Travaillez à votre perfectionnement. Encouragez-vous mutuellement. Soyez d’accord entre vous. Vivez dans la paix. Alors le Dieu d’amour et de paix sera avec vous.
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'Saluez-vous en vous donnant le baiser fraternel. Tous ceux qui, ici, font partie du peuple saint vous saluent. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: Que la grâce du Seigneur Jésus-Christ, l’amour de Dieu et la communion du Saint-Esprit soient avec vous tous.
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'Je vous ai déjà prévenus lors de ma seconde visite, et maintenant que je me trouve encore loin, je le répète à ceux qui ont péché précédemment, ainsi qu’à tous les autres : quand je reviendrai, j’agirai sans ménagements '
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'puisque vous voulez avoir la preuve que Christ parle par moi ; car vous n’avez pas affaire à un Christ faible : il agit avec puissance parmi vous.'
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: Certes, il est mort sur la croix à cause de sa faiblesse, mais il vit par la puissance de Dieu. Nous, de même, dans notre union avec lui, nous sommes faibles, mais nous nous montrerons vivants avec lui par la puissance de Dieu dans notre façon d’agir envers vous.
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: Faites donc vous-mêmes votre propre critique, et examinez-vous, pour voir si vous vivez dans la foi. Ne reconnaissez-vous pas que Jésus-Christ est en vous
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '13.5 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Autre traduction : '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: parmi vous.
      marker-yv: yv-n
    - type: text
      text: '  ? A moins, peut-être, que cet examen n’aboutisse pour vous à un échec.'
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'Mais vous reconnaîtrez, je l’espère, que nous, nous avons fait nos preuves ! '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'Ce que nous demandons à Dieu, c’est que vous vous absteniez de tout mal. Car, en fait, nous ne tenons pas du tout à montrer que nous avons fait nos preuves. Tout ce que nous désirons, c’est que vous fassiez le bien, même si l’épreuve paraît devoir tourner contre nous. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'En effet, nous n’avons aucun pouvoir contre la vérité. C’est seulement pour la vérité que nous en avons. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'Nous sommes contents d’être faibles si vous, vous êtes réellement forts. C’est justement ce que nous demandons à Dieu dans nos prières : votre perfectionnement. '
