  '1':
  - type: heading
    content: Avertissement
  - type: text
    content: Voici donc la troisième fois
  - type: note
    content: La première fois correspond à la fondation de l’Eglise (Ac 18). La seconde visite (v. 2) était une visite brève, interrompant le séjour de l’apôtre à Ephèse (Ac 19).
  - type: text
    content: ' que je viendrai chez vous. Comme le dit l’Ecriture, '
  - type: text
    content: toute affaire sera réglée sur les déclarations de deux ou trois témoins
  - type: note
    content: Dt 19.15.
  - type: text
    content: .
  - type: text
    content: ' '
  '10':
  - type: text
    content: 'Voilà pourquoi je vous écris tout cela pendant que je suis encore loin, pour qu’étant présent, je n’aie pas à faire usage, avec sévérité, de l’autorité que le Seigneur m’a donnée pour construire et non '
  - type: text
    content: pour renverser
  - type: note
    content: Voir 10.8 et Jr 1.10.
  - type: text
    content: .
  - type: heading
    content: Dernières recommandations et salutations
  '11':
  - type: text
    content: J’ai terminé, frères et sœurs. Soyez dans la joie. Travaillez à votre perfectionnement. Encouragez-vous mutuellement. Soyez d’accord entre vous. Vivez dans la paix. Alors le Dieu d’amour et de paix sera avec vous.
  '12':
  - type: text
    content: 'Saluez-vous en vous donnant le baiser fraternel. Tous ceux qui, ici, font partie du peuple saint vous saluent. '
  '13':
  - type: text
    content: Que la grâce du Seigneur Jésus-Christ, l’amour de Dieu et la communion du Saint-Esprit soient avec vous tous.
  '2':
  - type: text
    content: 'Je vous ai déjà prévenus lors de ma seconde visite, et maintenant que je me trouve encore loin, je le répète à ceux qui ont péché précédemment, ainsi qu’à tous les autres : quand je reviendrai, j’agirai sans ménagements '
  '3':
  - type: text
    content: 'puisque vous voulez avoir la preuve que Christ parle par moi ; car vous n’avez pas affaire à un Christ faible : il agit avec puissance parmi vous.'
  '4':
  - type: text
    content: Certes, il est mort sur la croix à cause de sa faiblesse, mais il vit par la puissance de Dieu. Nous, de même, dans notre union avec lui, nous sommes faibles, mais nous nous montrerons vivants avec lui par la puissance de Dieu dans notre façon d’agir envers vous.
  '5':
  - type: text
    content: Faites donc vous-mêmes votre propre critique, et examinez-vous, pour voir si vous vivez dans la foi. Ne reconnaissez-vous pas que Jésus-Christ est en vous
  - type: note
    content: 'Autre traduction : parmi vous.'
  - type: text
    content: '  ? A moins, peut-être, que cet examen n’aboutisse pour vous à un échec.'
  '6':
  - type: text
    content: 'Mais vous reconnaîtrez, je l’espère, que nous, nous avons fait nos preuves ! '
  '7':
  - type: text
    content: 'Ce que nous demandons à Dieu, c’est que vous vous absteniez de tout mal. Car, en fait, nous ne tenons pas du tout à montrer que nous avons fait nos preuves. Tout ce que nous désirons, c’est que vous fassiez le bien, même si l’épreuve paraît devoir tourner contre nous. '
  '8':
  - type: text
    content: 'En effet, nous n’avons aucun pouvoir contre la vérité. C’est seulement pour la vérité que nous en avons. '
  '9':
  - type: text
    content: 'Nous sommes contents d’être faibles si vous, vous êtes réellement forts. C’est justement ce que nous demandons à Dieu dans nos prières : votre perfectionnement. '
