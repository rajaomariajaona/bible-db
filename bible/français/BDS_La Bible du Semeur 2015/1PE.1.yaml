document_id: 1PE.1,21
type_code: fra
verses:
  '1':
  - type: heading
    content: Salutation
  - type: text
    content: Pierre, apôtre de Jésus-Christ, salue ceux que Dieu a choisis et qui vivent comme des résidents étrangers, dispersés
  - type: note
    content: Ce terme désignait généralement les Juifs de la diaspora, c’est-à-dire des pays autres que celui d’Israël. Il s’applique aux chrétiens dispersés dans les provinces nommées de l’Empire romain (voir Jc 1.1 et note).
  - type: text
    content: ' dans les provinces du Pont, de Galatie, de Cappadoce, d’Asie et de Bithynie'
  - type: note
    content: Cinq provinces d’Asie Mineure (l’actuelle Turquie).
  - type: text
    content: '. '
  '10':
  - type: text
    content: 'Ce salut a fait l’objet des recherches et des investigations des prophètes qui ont annoncé d’avance la grâce qui vous était destinée. '
  '11':
  - type: text
    content: 'Ils cherchaient à découvrir à quelle époque et à quels événements se rapportaient les indications données par l’Esprit de Christ. Cet Esprit était en eux et annonçait à l’avance les souffrances du Messie et la gloire dont elles seraient suivies. '
  '12':
  - type: text
    content: Il leur fut révélé que le message dont ils étaient chargés n’était pas pour eux, mais pour vous. Et ce message vous a été communiqué maintenant par ceux qui vous ont annoncé la Bonne Nouvelle sous l’action de l’Esprit Saint envoyé du ciel ; les anges eux-mêmes ne se lassent pas de le découvrir
  - type: note
    content: 'Autre traduction : désirent le découvrir.'
  - type: text
    content: .
  - type: heading
    content: Les impératifs de la vie chrétienne
  - type: heading
    content: Espérer
  '13':
  - type: text
    content: C’est pourquoi, tenez votre esprit en éveil
  - type: note
    content: 'Littéralement : ceignez les reins de votre esprit. Les contemporains de l’apôtre portaient une longue tunique qu’ils laissaient flottante dans la maison, mais lorsqu’ils voulaient marcher ou travailler, ils mettaient une ceinture autour des reins pour ne pas être gênés par les plis amples de cette tunique.'
  - type: text
    content: ' et faites preuve de modération ; mettez toute votre espérance dans la grâce qui vous sera accordée le jour où Jésus-Christ apparaîtra.'
  - type: heading
    content: Etre saints
  '14':
  - type: text
    content: 'Comme des enfants obéissants, ne vous laissez plus diriger par les passions qui vous gouvernaient autrefois, au temps de votre ignorance. '
  '15':
  - type: text
    content: 'Au contraire, tout comme celui qui vous a appelés est saint, soyez saints dans tout votre comportement. '
  '16':
  - type: text
    content: 'Car voici ce que Dieu dit dans l’Ecriture : '
  - type: text
    content: Soyez saints, car je suis saint
  - type: note
    content: Lv 19.2.
  - type: text
    content: .
  - type: heading
    content: Vivre dans la crainte de Dieu
  '17':
  - type: text
    content: Dans vos prières, vous appelez Père celui qui juge impartialement tout homme selon ses actes. Par conséquent, pendant tout le temps de votre séjour en ce monde, que la crainte de Dieu inspire votre conduite.
  '18':
  - type: text
    content: 'Vous avez été libérés de cette manière futile de vivre que vous ont transmise vos ancêtres et vous savez à quel prix. Ce n’est pas par des biens périssables comme l’argent et l’or. '
  '19':
  - type: text
    content: Non, il a fallu que Christ, tel un agneau pur et sans défaut
  - type: note
    content: C’étaient les conditions requises pour tout agneau offert en sacrifice (Ex 12.5  ; voir 1 Co 5.7). Pierre était présent lorsque Jean-Baptiste a désigné Jésus comme l’agneau qui ôte les péchés du monde (Jn 1.29).
  - type: text
    content: ', verse son sang précieux en sacrifice pour vous. '
  '2':
  - type: text
    content: Dieu, le Père, vous a choisis d’avance
  - type: note
    content: 'Voir 1.20 et Rm 8.29. D’autres comprennent : vous a choisis selon ce qu’il connaissait d’avance.'
  - type: text
    content: ', conformément à son plan, et vous avez été purifiés par l’Esprit, pour obéir à Jésus-Christ et bénéficier de l’aspersion de son sang'
  - type: note
    content: 'Le vocabulaire de ce verset est emprunté à celui des sacrifices de l’ancienne alliance : l’aspersion du sang purifiait les objets et les personnes, préfigurant la mort de Christ qui nous purifie de nos péchés (voir Ex 24.3-8 ; 29.21 ; Lv 16.14-15). Ceux qui étaient aspergés avec le sang étaient mis symboliquement au bénéfice du sacrifice offert.'
  - type: text
    content: . Que la grâce et la paix vous soient abondamment accordées.
  - type: heading
    content: L’espérance du salut
  - type: heading
    content: Une espérance vivante
  '20':
  - type: text
    content: Dès avant la création du monde, Dieu l’avait choisi
  - type: note
    content: 'Autre traduction : Il l’avait connu d’avance.'
  - type: text
    content: ' pour cela, et il a paru, dans ces temps qui sont les derniers, pour agir en votre faveur. '
  '21':
  - type: text
    content: Par lui, vous croyez en Dieu, qui l’a ressuscité et lui a donné la gloire. Ainsi votre foi et votre espérance sont tournées vers Dieu.
  - type: heading
    content: Aimer
  '22':
  - type: text
    content: Par votre obéissance à la vérité
  - type: note
    content: 'Certains manuscrits précisent : par l’Esprit.'
  - type: text
    content: ', vous avez purifié votre être afin d’aimer sincèrement vos frères et sœurs. Aimez-vous donc ardemment les uns les autres de tout votre cœur'
  - type: note
    content: 'Certains manuscrits ont : d’un cœur pur.'
  - type: text
    content: '. '
  '23':
  - type: text
    content: 'Car vous êtes nés à une vie nouvelle, non d’un homme mortel, mais d’une semence immortelle : la Parole vivante et éternelle de Dieu. '
  '24':
  - type: text
    content: 'En effet, il est écrit :'
  - type: text
    content: Tout homme est pareil à l’herbe,
  - type: text
    content: et toute sa gloire comme la fleur des champs.
  - type: text
    content: L’herbe se dessèche et sa fleur tombe,
  '25':
  - type: text
    content: ' '
  - type: text
    content: mais la Parole du Seigneur subsiste éternellement
  - type: text
    content: ' '
  - type: note
    content: Es 40.6-8 .
  - type: text
    content: .
  - type: text
    content: Or, cette Parole, c’est l’Evangile qui vous a été annoncé.
  '3':
  - type: text
    content: 'Béni soit Dieu, le Père de notre Seigneur Jésus-Christ. Dans sa grande compassion, il nous a fait naître à une vie nouvelle, pour nous donner une espérance vivante par la résurrection de Jésus-Christ. '
  '4':
  - type: text
    content: 'Car il a préparé pour nous un héritage qui ne peut ni se détruire, ni se corrompre, ni perdre sa beauté. Il le tient en réserve pour vous dans les cieux, '
  '5':
  - type: text
    content: vous qu’il garde, par sa puissance, au moyen de la foi, en vue du salut qui est prêt à être révélé au moment de la fin.
  '6':
  - type: text
    content: 'Voilà ce qui fait votre joie, même si, actuellement, il faut que vous soyez attristés pour un peu de temps par diverses épreuves : '
  '7':
  - type: text
    content: celles-ci servent à éprouver la valeur de votre foi. Le feu du creuset n’éprouve-t-il pas l’or qui pourtant disparaîtra un jour ? Pourtant, votre foi qui a résisté à l’épreuve a une valeur beaucoup plus précieuse. Elle vous vaudra louange, gloire et honneur, lorsque Jésus-Christ apparaîtra.
  '8':
  - type: text
    content: 'Jésus, vous ne l’avez pas vu, et pourtant vous l’aimez ; mais en plaçant votre confiance en lui sans le voir encore, vous êtes remplis d’une joie glorieuse et inexprimable, '
  '9':
  - type: text
    content: car vous obtenez en retour votre salut qui est le but de votre foi.
  - type: heading
    content: Les prophètes l’ont annoncée pour nous
