document_id: 1PE.1
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Salutation
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Pierre, apôtre de Jésus-Christ, salue ceux que Dieu a choisis et qui vivent comme des résidents étrangers, dispersés
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1.1 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Ce terme désignait généralement les Juifs de la diaspora, c’est-à-dire des pays autres que celui d’Israël. Il s’applique aux chrétiens dispersés dans les provinces nommées de l’Empire romain (voir '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Jc 1.1
        metadata:
          usfm: JAS.1.1
      - type: text
        text: ' et note).'
    marker-yv: yv-n
  - type: text
    text: ' dans les provinces du Pont, de Galatie, de Cappadoce, d’Asie et de Bithynie'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1.1 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Cinq provinces d’Asie Mineure (l’actuelle Turquie).
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Dieu, le Père, vous a choisis d’avance
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1.2 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Voir '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '1.20'
        metadata:
          usfm: 1PE.1.20
      - type: text
        text: ' et '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Rm 8.29
        metadata:
          usfm: ROM.8.29
      - type: text
        text: '. D’autres comprennent : '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: vous a choisis selon ce qu’il connaissait d’avance.
    marker-yv: yv-n
  - type: text
    text: ', conformément à son plan, et vous avez été purifiés par l’Esprit, pour obéir à Jésus-Christ et bénéficier de l’aspersion de son sang'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1.2 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Le vocabulaire de ce verset est emprunté à celui des sacrifices de l’ancienne alliance : l’aspersion du sang purifiait les objets et les personnes, préfigurant la mort de Christ qui nous purifie de nos péchés (voir Ex 24.3-8 ; 29.21 ; Lv 16.14-15). Ceux qui étaient aspergés avec le sang étaient mis symboliquement au bénéfice du sacrifice offert.'
    marker-yv: yv-n
  - type: text
    text: . Que la grâce et la paix vous soient abondamment accordées.
- type: usfm
  marker: ms1
  children:
  - type: text
    text: L’espérance du salut
  marker-yv: yv-h
- type: usfm
  marker: s1
  children:
  - type: text
    text: Une espérance vivante
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Béni soit Dieu, le Père de notre Seigneur Jésus-Christ. Dans sa grande compassion, il nous a fait naître à une vie nouvelle, pour nous donner une espérance vivante par la résurrection de Jésus-Christ. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Car il a préparé pour nous un héritage qui ne peut ni se détruire, ni se corrompre, ni perdre sa beauté. Il le tient en réserve pour vous dans les cieux, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: vous qu’il garde, par sa puissance, au moyen de la foi, en vue du salut qui est prêt à être révélé au moment de la fin.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Voilà ce qui fait votre joie, même si, actuellement, il faut que vous soyez attristés pour un peu de temps par diverses épreuves : '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: celles-ci servent à éprouver la valeur de votre foi. Le feu du creuset n’éprouve-t-il pas l’or qui pourtant disparaîtra un jour ? Pourtant, votre foi qui a résisté à l’épreuve a une valeur beaucoup plus précieuse. Elle vous vaudra louange, gloire et honneur, lorsque Jésus-Christ apparaîtra.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Jésus, vous ne l’avez pas vu, et pourtant vous l’aimez ; mais en plaçant votre confiance en lui sans le voir encore, vous êtes remplis d’une joie glorieuse et inexprimable, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: car vous obtenez en retour votre salut qui est le but de votre foi.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Les prophètes l’ont annoncée pour nous
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Ce salut a fait l’objet des recherches et des investigations des prophètes qui ont annoncé d’avance la grâce qui vous était destinée. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Ils cherchaient à découvrir à quelle époque et à quels événements se rapportaient les indications données par l’Esprit de Christ. Cet Esprit était en eux et annonçait à l’avance les souffrances du Messie et la gloire dont elles seraient suivies. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Il leur fut révélé que le message dont ils étaient chargés n’était pas pour eux, mais pour vous. Et ce message vous a été communiqué maintenant par ceux qui vous ont annoncé la Bonne Nouvelle sous l’action de l’Esprit Saint envoyé du ciel ; les anges eux-mêmes ne se lassent pas de le découvrir
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1.12 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Autre traduction : '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: désirent le découvrir.
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: ms1
  children:
  - type: text
    text: Les impératifs de la vie chrétienne
  marker-yv: yv-h
- type: usfm
  marker: s1
  children:
  - type: text
    text: Espérer
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: C’est pourquoi, tenez votre esprit en éveil
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1.13 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Littéralement : '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'ceignez les reins de votre esprit. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Les contemporains de l’apôtre portaient une longue tunique qu’ils laissaient flottante dans la maison, mais lorsqu’ils voulaient marcher ou travailler, ils mettaient une ceinture autour des reins pour ne pas être gênés par les plis amples de cette tunique.
    marker-yv: yv-n
  - type: text
    text: ' et faites preuve de modération ; mettez toute votre espérance dans la grâce qui vous sera accordée le jour où Jésus-Christ apparaîtra.'
- type: usfm
  marker: s1
  children:
  - type: text
    text: Etre saints
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Comme des enfants obéissants, ne vous laissez plus diriger par les passions qui vous gouvernaient autrefois, au temps de votre ignorance. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Au contraire, tout comme celui qui vous a appelés est saint, soyez saints dans tout votre comportement. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Car voici ce que Dieu dit dans l’Ecriture : '
  - type: usfm
    marker: qt
    children:
    - type: text
      text: Soyez saints, car je suis saint
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1.16 '
    - type: usfm
      marker: ft
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Lv 19.2
        metadata:
          usfm: LEV.19.2
      - type: text
        text: .
    marker-yv: yv-n
  - type: usfm
    marker: qt
    children:
    - type: text
      text: .
- type: usfm
  marker: s1
  children:
  - type: text
    text: Vivre dans la crainte de Dieu
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Dans vos prières, vous appelez Père celui qui juge impartialement tout homme selon ses actes. Par conséquent, pendant tout le temps de votre séjour en ce monde, que la crainte de Dieu inspire votre conduite.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Vous avez été libérés de cette manière futile de vivre que vous ont transmise vos ancêtres et vous savez à quel prix. Ce n’est pas par des biens périssables comme l’argent et l’or. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Non, il a fallu que Christ, tel un agneau pur et sans défaut
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1.19 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: C’étaient les conditions requises pour tout agneau offert en sacrifice (
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ex 12.5
        metadata:
          usfm: EXO.12.5
      - type: text
        text: '  ; voir '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1 Co 5.7
        metadata:
          usfm: 1CO.5.7
      - type: text
        text: ). Pierre était présent lorsque Jean-Baptiste a désigné Jésus comme l’agneau qui ôte les péchés du monde (
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Jn 1.29
        metadata:
          usfm: JHN.1.29
      - type: text
        text: ).
    marker-yv: yv-n
  - type: text
    text: ', verse son sang précieux en sacrifice pour vous. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Dès avant la création du monde, Dieu l’avait choisi
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1.20 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Autre traduction : '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: Il l’avait connu d’avance.
    marker-yv: yv-n
  - type: text
    text: ' pour cela, et il a paru, dans ces temps qui sont les derniers, pour agir en votre faveur. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Par lui, vous croyez en Dieu, qui l’a ressuscité et lui a donné la gloire. Ainsi votre foi et votre espérance sont tournées vers Dieu.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Aimer
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: Par votre obéissance à la vérité
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1.22 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Certains manuscrits précisent : '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: par l’Esprit.
    marker-yv: yv-n
  - type: text
    text: ', vous avez purifié votre être afin d’aimer sincèrement vos frères et sœurs. Aimez-vous donc ardemment les uns les autres de tout votre cœur'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1.22 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Certains manuscrits ont : '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: d’un cœur pur.
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Car vous êtes nés à une vie nouvelle, non d’un homme mortel, mais d’une semence immortelle : la Parole vivante et éternelle de Dieu. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'En effet, il est écrit :'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: qt
    children:
    - type: text
      text: Tout homme est pareil à l’herbe,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: qt
    children:
    - type: text
      text: et toute sa gloire comme la fleur des champs.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: qt
    children:
    - type: text
      text: L’herbe se dessèche et sa fleur tombe,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: ' '
  - type: usfm
    marker: qt
    children:
    - type: text
      text: mais la Parole du Seigneur subsiste éternellement
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1.25 '
    - type: usfm
      marker: ft
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Es 40.6-8
        metadata:
          usfm: ISA.40.6+ISA.40.7+ISA.40.8
      - type: text
        text: ' .'
    marker-yv: yv-n
  - type: usfm
    marker: qt
    children:
    - type: text
      text: .
- type: usfm
  marker: p
  children:
  - type: text
    text: Or, cette Parole, c’est l’Evangile qui vous a été annoncé.
