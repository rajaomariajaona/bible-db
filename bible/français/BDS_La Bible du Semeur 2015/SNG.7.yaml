document_id: SNG.7,21
type_code: fra
verses:
  '1':
  - type: heading
    content: Le chœur
  - type: text
    content: « Reviens, reviens, ╵ô Sulamite
  - type: note
    content: 'Sulamite: la bien-aimée. Selon certains, ce mot serait une variante du nom Sunamite, c’est-à-dire « femme originaire de Sunem » (Jos 19.18). Abishag la Sunamite était réputée pour sa beauté (1 R 1.3-4). Selon d’autres, ce mot serait une forme féminine du nom de Salomon.'
  - type: text
    content: '  !'
  - type: text
    content: Reviens, reviens, ╵que nous puissions te contempler. »
  - type: heading
    content: Une danse enivrante
  - type: text
    content: « Pourquoi regardez-vous ╵la Sulamite
  - type: text
    content: comme on regarde ╵la danse des deux camps ? »
  '10':
  - type: text
    content: et ton palais distille ╵le vin le plus exquis… »
  - type: text
    content: « Oui, un bon vin ╵qui va droit à mon bien-aimé,
  - type: text
    content: et glisse
  - type: note
    content: 'glisse: sens incertain.'
  - type: text
    content: ' sur les lèvres ╵de ceux qui s’assoupissent'
  - type: note
    content: 'En modifiant légèrement le texte hébreu, on peut lire, avec l’ancienne version grecque : et les dents.'
  - type: text
    content: . »
  - type: heading
    content: Viens donc, mon bien-aimé !
  '11':
  - type: text
    content: « Moi, je suis à mon bien-aimé
  - type: text
    content: et c’est moi qu’il désire
  - type: note
    content: Voir 2.16 ; 6.3.
  - type: text
    content: .
  '12':
  - type: text
    content: Viens donc, mon bien-aimé, ╵sortons dans la campagne.
  - type: text
    content: Nous passerons la nuit ╵au milieu des hameaux,
  '13':
  - type: text
    content: et nous nous lèverons ╵au matin, de bonne heure,
  - type: text
    content: pour aller dans les vignes,
  - type: text
    content: pour voir si elles sont en fleur ╵et si leurs bourgeons sont ouverts,
  - type: text
    content: si déjà sont sorties ╵les fleurs des grenadiers.
  - type: text
    content: Là-bas, je te ferai ╵le don de mon amour.
  '14':
  - type: text
    content: Les mandragores
  - type: note
    content: Fruits auxquels certains attribuent encore aujourd’hui le pouvoir de favoriser la fécondité (voir Gn 30.14-16).
  - type: text
    content: ' ╵exhalent leur parfum.'
  - type: text
    content: Nous avons, à nos portes, ╵des fruits exquis de toutes sortes,
  - type: text
    content: des nouveaux comme des anciens.
  - type: text
    content: Pour toi, mon bien-aimé, ╵je les ai réservés.
  '2':
  - type: text
    content: « Que tes pas sont gracieux ╵dans tes sandales, ╵fille de prince !
  - type: text
    content: Le contour de tes hanches ╵ressemble à un collier,
  - type: text
    content: œuvre de mains d’artiste.
  '3':
  - type: text
    content: Ton nombril est comme une coupe ╵bien arrondie
  - type: text
    content: où le vin parfumé ╵ne manque pas.
  - type: text
    content: Ton ventre ╵est comme une meule de blé
  - type: text
    content: bordée de lis.
  '4':
  - type: text
    content: Comme deux faons, ╵jumeaux d’une gazelle
  - type: note
    content: Voir 4.5.
  - type: text
    content: ','
  - type: text
    content: paissant parmi les lis, ╵sont tes deux seins.
  '5':
  - type: text
    content: Ton cou est une tour d’ivoire
  - type: text
    content: et tes yeux sont les étangs de Heshbôn
  - type: note
    content: 'Heshbôn: ancienne capitale du royaume amoréen situé à l’est du Jourdain où Sihôn avait été vaincu par Moïse (Nb 21.26).'
  - type: text
    content: près de la porte Populeuse
  - type: note
    content: 'Littéralement : près de la porte de Bath-Rabbim (= fille d’une multitude), probablement un nom poétique de Heshbôn.'
  - type: text
    content: ','
  - type: text
    content: et ton nez est semblable ╵à la tour du Liban
  - type: text
    content: postée en sentinelle ╵en face de Damas
  - type: note
    content: Soit une tour de garde sur la frontière nord du royaume de Salomon, vers la Syrie, soit les monts du Liban.
  - type: text
    content: .
  '6':
  - type: text
    content: Ta tête, sur ton corps, ╵est comme le Carmel
  - type: text
    content: et tes cheveux ╵ont des reflets de pourpre.
  - type: text
    content: Un roi est enchaîné ╵dans leurs ondulations. »
  '7':
  - type: text
    content: « Que tu es belle ╵et que tu es gracieuse,
  - type: text
    content: toi, mon amour ╵et mes délices.
  '8':
  - type: text
    content: Par ta taille élancée ╵tu es comme un palmier.
  - type: text
    content: Tes seins en sont les grappes.
  '9':
  - type: text
    content: 'Alors j’ai dit : ╵“Ah, je vais monter au palmier,'
  - type: text
    content: j’en saisirai les fruits.”
  - type: text
    content: Que tes seins soient pour moi ╵des grappes de raisin !
  - type: text
    content: Le parfum de ton souffle ╵comme celui des pommes,
