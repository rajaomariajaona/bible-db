document_id: SNG.7,21
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Le chœur
    marker-yv: yv-h
  - type: usfm
    marker: q1
    children:
    - type: text
      text: « Reviens, reviens, ╵ô Sulamite
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '7.1 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Sulamite
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: ': '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: la bien-aimée. Selon certains, ce mot serait une variante du nom Sunamite, c’est-à-dire « femme originaire de Sunem » (
        - type: usfm
          marker: ref
          children:
          - type: text
            text: Jos 19.18
        - type: text
          text: ). Abishag la Sunamite était réputée pour sa beauté (
        - type: usfm
          marker: ref
          children:
          - type: text
            text: 1 R 1.3-4
        - type: text
          text: ). Selon d’autres, ce mot serait une forme féminine du nom de Salomon.
      marker-yv: yv-n
    - type: text
      text: '  !'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Reviens, reviens, ╵que nous puissions te contempler. »
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Une danse enivrante
    marker-yv: yv-h
  - type: usfm
    marker: q1
    children:
    - type: text
      text: « Pourquoi regardez-vous ╵la Sulamite
  - type: usfm
    marker: q1
    children:
    - type: text
      text: comme on regarde ╵la danse des deux camps ? »
  '10':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et ton palais distille ╵le vin le plus exquis… »
  - type: usfm
    marker: q1
    children:
    - type: text
      text: « Oui, un bon vin ╵qui va droit à mon bien-aimé,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et glisse
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '7.10 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: glisse
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: ': '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: sens incertain.
      marker-yv: yv-n
    - type: text
      text: ' sur les lèvres ╵de ceux qui s’assoupissent'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '7.10 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'En modifiant légèrement le texte hébreu, on peut lire, avec l’ancienne version grecque : '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: et les dents.
      marker-yv: yv-n
    - type: text
      text: . »
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Viens donc, mon bien-aimé !
    marker-yv: yv-h
  '11':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: « Moi, je suis à mon bien-aimé
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et c’est moi qu’il désire
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '7.11 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Voir 2.16 ; 6.3.
      marker-yv: yv-n
    - type: text
      text: .
  '12':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Viens donc, mon bien-aimé, ╵sortons dans la campagne.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Nous passerons la nuit ╵au milieu des hameaux,
  '13':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et nous nous lèverons ╵au matin, de bonne heure,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: pour aller dans les vignes,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: pour voir si elles sont en fleur ╵et si leurs bourgeons sont ouverts,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: si déjà sont sorties ╵les fleurs des grenadiers.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Là-bas, je te ferai ╵le don de mon amour.
  '14':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Les mandragores
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '7.14 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Fruits auxquels certains attribuent encore aujourd’hui le pouvoir de favoriser la fécondité (voir '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: Gn 30.14-16
        - type: text
          text: ).
      marker-yv: yv-n
    - type: text
      text: ' ╵exhalent leur parfum.'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Nous avons, à nos portes, ╵des fruits exquis de toutes sortes,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: des nouveaux comme des anciens.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Pour toi, mon bien-aimé, ╵je les ai réservés.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: « Que tes pas sont gracieux ╵dans tes sandales, ╵fille de prince !
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Le contour de tes hanches ╵ressemble à un collier,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: œuvre de mains d’artiste.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ton nombril est comme une coupe ╵bien arrondie
  - type: usfm
    marker: q1
    children:
    - type: text
      text: où le vin parfumé ╵ne manque pas.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ton ventre ╵est comme une meule de blé
  - type: usfm
    marker: q1
    children:
    - type: text
      text: bordée de lis.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Comme deux faons, ╵jumeaux d’une gazelle
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '7.4 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Voir '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: '4.5'
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: ','
  - type: usfm
    marker: q1
    children:
    - type: text
      text: paissant parmi les lis, ╵sont tes deux seins.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ton cou est une tour d’ivoire
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et tes yeux sont les étangs de Heshbôn
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '7.5 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Heshbôn
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: ': '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ancienne capitale du royaume amoréen situé à l’est du Jourdain où Sihôn avait été vaincu par Moïse (
        - type: usfm
          marker: ref
          children:
          - type: text
            text: Nb 21.26
        - type: text
          text: ).
      marker-yv: yv-n
  - type: usfm
    marker: q1
    children:
    - type: text
      text: près de la porte Populeuse
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '7.5 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Littéralement : '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'près de la porte de Bath-Rabbim '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: (= fille d’une multitude), probablement un nom poétique de Heshbôn.
      marker-yv: yv-n
    - type: text
      text: ','
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et ton nez est semblable ╵à la tour du Liban
  - type: usfm
    marker: q1
    children:
    - type: text
      text: postée en sentinelle ╵en face de Damas
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '7.5 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Soit une tour de garde sur la frontière nord du royaume de Salomon, vers la Syrie, soit les monts du Liban.
      marker-yv: yv-n
    - type: text
      text: .
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ta tête, sur ton corps, ╵est comme le Carmel
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et tes cheveux ╵ont des reflets de pourpre.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Un roi est enchaîné ╵dans leurs ondulations. »
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: « Que tu es belle ╵et que tu es gracieuse,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: toi, mon amour ╵et mes délices.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Par ta taille élancée ╵tu es comme un palmier.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tes seins en sont les grappes.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Alors j’ai dit : ╵“Ah, je vais monter au palmier,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: j’en saisirai les fruits.”
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Que tes seins soient pour moi ╵des grappes de raisin !
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Le parfum de ton souffle ╵comme celui des pommes,
