document_id: GAL.6
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Travailler au bien de tous
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Frères et sœurs, si quelqu’un s’est laissé surprendre par quelque faute
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '6.1 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Autre traduction : '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: si quelqu’un vient à être surpris en faute.
    marker-yv: yv-n
  - type: text
    text: ', vous qui vivez selon l’Esprit, ramenez-le dans le droit chemin avec un esprit de douceur. Et toi qui interviens, fais attention de ne pas te laisser toi-même tenter.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Aidez-vous les uns les autres à porter vos fardeaux. De cette manière, vous accomplirez la loi de Christ.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Celui qui s’imagine être quelqu’un d’important – alors qu’en fait il n’est rien – s’abuse lui-même. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Que chacun examine ce qu’il accomplit lui-même. S’il y découvre quelque aspect louable, alors il pourra en éprouver de la fierté par rapport à lui-même et non pas par comparaison avec les autres, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: car chacun aura à répondre pour lui-même de ses propres actions.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Que celui à qui l’on enseigne la Parole donne une part de tous ses biens à celui qui l’enseigne.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Ne vous faites pas d’illusions : Dieu ne se laisse pas traiter avec mépris. On récolte ce que l’on a semé. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Celui qui sème pour satisfaire ses propres désirs d’homme livré à lui-même récoltera ce que produit cet homme, c’est-à-dire la corruption. Mais celui qui sème pour l’Esprit moissonnera ce que produit l’Esprit : la vie éternelle.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Faisons le bien sans nous laisser gagner par le découragement. Car si nous ne relâchons pas nos efforts, nous récolterons au bon moment.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Ainsi donc, tant que nous en avons l’occasion, faisons du bien à tout le monde, et en premier lieu à ceux qui appartiennent à la famille des croyants.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Derniers avertissements et salutation
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Vous remarquez ces grandes lettres ; c’est bien de ma propre main que je vous écris. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Ceux qui vous imposent la circoncision sont des gens qui veulent faire bonne figure devant les hommes. Ils n’ont qu’un seul but : éviter d’être persécutés à cause de la mort de Christ sur la croix'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '6.12 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Prêcher la circoncision mettait à l’abri de la persécution à la fois des Juifs et des Romains (puisque le judaïsme était une « religion licite »).
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Car ceux qui pratiquent la circoncision, n’observent pas la Loi, eux non plus. S’ils veulent vous faire circoncire, c’est pour pouvoir se vanter de vous avoir imposé cette marque dans votre corps.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'En ce qui me concerne, je ne veux à aucun prix placer ma fierté ailleurs que dans la mort de notre Seigneur Jésus-Christ sur la croix. Par elle, en effet, le monde dominé par le mal a été crucifié pour moi, de même que moi je l’ai été pour ce monde. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Peu importe d’être circoncis ou non. Ce qui compte, c’est la nouvelle création
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '6.15 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Autre traduction : '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: c’est d’être une nouvelle créature.
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Que la paix et la compassion de Dieu soient accordées à tous ceux qui suivent cette règle de vie, et à l’Israël de Dieu.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Désormais, que personne ne me cause plus de peine, car je porte sur mon corps les cicatrices des blessures que j’ai reçues pour la cause de Jésus.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Chers frères et sœurs, que la grâce de notre Seigneur Jésus-Christ soit avec vous tous.
- type: usfm
  marker: p
  children:
  - type: text
    text: Amen.
