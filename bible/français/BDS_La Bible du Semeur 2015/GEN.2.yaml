document_id: GEN.2,21
type_code: fra
verses:
  '1':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ainsi furent achevés le ciel et la terre avec toute l’armée de ce qu’ils contiennent.
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Du pays d’Eden sortait un fleuve qui arrosait le jardin. De là, il se divisait en quatre bras.
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Le nom du premier est Pishôn : il contourne tout le pays de Havila où se trouve de l’or, '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: un or d’excellente qualité. On trouve aussi dans cette contrée de l’ambre parfumée et la pierre précieuse appelée onyx.
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Le deuxième fleuve s’appelle Guihôn, il parcourt tout le pays de Koush
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '2.13 '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'Koush '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: désigne habituellement le Soudan ou l’Ethiopie. Le fleuve serait donc le Nil. Certains situent cependant le pays de Koush, dont parle ce passage, en Mésopotamie, à l’est du Tigre, et l’identifient à la région du peuple des Kassites.
      marker-yv: yv-n
    - type: text
      text: .
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Le troisième fleuve s’appelle le Tigre, c’est celui qui coule à l’orient de l’Assyrie.
  - type: usfm
    marker: p
    children:
    - type: text
      text: Et le quatrième fleuve c’est l’Euphrate.
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: L’Eternel Dieu prit l’homme et l’établit dans le jardin d’Eden pour le cultiver et le garder.
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Et l’Eternel Dieu ordonna à l’homme : Mange librement des fruits de tous les arbres du jardin, '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: sauf du fruit de l’arbre de la détermination du bien et du mal. De celui-là, n’en mange pas, car le jour où tu en mangeras, tu mourras.
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'L’Eternel Dieu dit : Il n’est pas bon que l’homme soit seul, je lui ferai une aide qui soit son vis-à-vis.'
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'L’Eternel Dieu, qui avait façonné du sol tous les animaux des champs et tous les oiseaux du ciel, les fit venir vers l’homme pour voir comment il les nommerait, afin que tout être vivant porte le nom que l’homme lui donnerait. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Le septième jour, Dieu avait achevé tout ce qu’il avait créé. Alors il se reposa
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '2.2 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Verbe d’où dérive le mot hébreu qui désigne le sabbat.
      marker-yv: yv-n
    - type: text
      text: ' en ce jour-là de toutes les œuvres qu’il avait accomplies.'
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: L’homme donna donc un nom à tous les animaux domestiques, à tous les oiseaux du ciel et aux animaux sauvages. Mais il ne trouva pas d’aide qui soit son vis-à-vis.
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Alors l’Eternel Dieu plongea l’homme dans un profond sommeil. Pendant que celui-ci dormait, il prit une de ses côtes
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '2.21 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Autre traduction : '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: une partie du côté de l’homme.
      marker-yv: yv-n
    - type: text
      text: ' et referma la chair à la place. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: L’Eternel Dieu forma une femme de la côte qu’il avait prise de l’homme, et il l’amena à l’homme.
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Alors l’homme s’écria :'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Voici bien cette fois
  - type: usfm
    marker: q1
    children:
    - type: text
      text: celle qui est
  - type: usfm
    marker: q1
    children:
    - type: text
      text: os de mes os,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: chair de ma chair.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: On la nommera « Femme »
  - type: usfm
    marker: q1
    children:
    - type: text
      text: car elle a été prise
  - type: usfm
    marker: q1
    children:
    - type: text
      text: de l’homme.
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: C’est pourquoi l’homme laissera son père et sa mère et s’attachera à sa femme, et les deux ne feront plus qu’un
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '2.24 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Cité en Mt 19.5 ; Mc 10.7-8 ; 1 Co 6.16 ; Ep 5.31.
      marker-yv: yv-n
    - type: text
      text: '. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: L’homme et sa femme étaient tous deux nus sans en éprouver aucune honte.
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Il bénit le septième jour, il en fit un jour saint, car, en ce jour-là, il se reposa de toute l’œuvre de création qu’il avait accomplie
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '2.3 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Allusion en '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: Ex 20.11
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: .
  - type: usfm
    marker: ms1
    children:
    - type: text
      text: L’histoire des débuts de l’humanité
    marker-yv: yv-h
  - type: usfm
    marker: s1
    children:
    - type: text
      text: L’alliance d’Eden
    marker-yv: yv-h
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Voici l’histoire de ce qui est advenu au ciel et sur la terre lorsqu’ils furent créés.
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Au temps où l’Eternel Dieu fit la terre et le ciel, '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'il n’existait encore sur la terre aucun arbuste, et aucune herbe des champs n’avait encore germé, car l’Eternel Dieu n’avait pas fait pleuvoir sur la terre, et il n’y avait pas d’homme pour cultiver la terre. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: De l’eau se mit à sourdre et à irriguer toute la surface du sol.
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: L’Eternel Dieu façonna l’homme avec de la poussière du sol, il lui insuffla dans les narines le souffle de vie, et l’homme devint un être vivant
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '2.7 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Allusion en '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: 1 Co 15.45
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: .
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'L’Eternel Dieu planta un jardin vers l’orient : l’Eden, le pays des Délices. Il y plaça l’homme qu’il avait façonné.'
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: L’Eternel Dieu fit pousser du sol toutes sortes d’arbres portant des fruits d’aspect agréable et délicieux, et il mit l’arbre de la vie
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '2.9 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Voir Pr 3.18 ; Ap 2.7 ; 22.2, 14.
      marker-yv: yv-n
    - type: text
      text: ' au milieu du jardin. Il y plaça aussi l’arbre de la détermination du bien et du mal'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '2.9 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Autre traduction : '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'l’arbre de la connaissance du bien et du mal '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: (de même au v. 17).
      marker-yv: yv-n
    - type: text
      text: .
