document_id: GEN.2,21
type_code: fra
verses:
  '1':
  - type: text
    content: Ainsi furent achevés le ciel et la terre avec toute l’armée de ce qu’ils contiennent.
  '10':
  - type: text
    content: Du pays d’Eden sortait un fleuve qui arrosait le jardin. De là, il se divisait en quatre bras.
  '11':
  - type: text
    content: 'Le nom du premier est Pishôn : il contourne tout le pays de Havila où se trouve de l’or, '
  '12':
  - type: text
    content: un or d’excellente qualité. On trouve aussi dans cette contrée de l’ambre parfumée et la pierre précieuse appelée onyx.
  '13':
  - type: text
    content: Le deuxième fleuve s’appelle Guihôn, il parcourt tout le pays de Koush
  - type: note
    content: Koush désigne habituellement le Soudan ou l’Ethiopie. Le fleuve serait donc le Nil. Certains situent cependant le pays de Koush, dont parle ce passage, en Mésopotamie, à l’est du Tigre, et l’identifient à la région du peuple des Kassites.
  - type: text
    content: .
  '14':
  - type: text
    content: Le troisième fleuve s’appelle le Tigre, c’est celui qui coule à l’orient de l’Assyrie.
  - type: text
    content: Et le quatrième fleuve c’est l’Euphrate.
  '15':
  - type: text
    content: L’Eternel Dieu prit l’homme et l’établit dans le jardin d’Eden pour le cultiver et le garder.
  '16':
  - type: text
    content: 'Et l’Eternel Dieu ordonna à l’homme : Mange librement des fruits de tous les arbres du jardin, '
  '17':
  - type: text
    content: sauf du fruit de l’arbre de la détermination du bien et du mal. De celui-là, n’en mange pas, car le jour où tu en mangeras, tu mourras.
  '18':
  - type: text
    content: 'L’Eternel Dieu dit : Il n’est pas bon que l’homme soit seul, je lui ferai une aide qui soit son vis-à-vis.'
  '19':
  - type: text
    content: 'L’Eternel Dieu, qui avait façonné du sol tous les animaux des champs et tous les oiseaux du ciel, les fit venir vers l’homme pour voir comment il les nommerait, afin que tout être vivant porte le nom que l’homme lui donnerait. '
  '2':
  - type: text
    content: Le septième jour, Dieu avait achevé tout ce qu’il avait créé. Alors il se reposa
  - type: note
    content: Verbe d’où dérive le mot hébreu qui désigne le sabbat.
  - type: text
    content: ' en ce jour-là de toutes les œuvres qu’il avait accomplies.'
  '20':
  - type: text
    content: L’homme donna donc un nom à tous les animaux domestiques, à tous les oiseaux du ciel et aux animaux sauvages. Mais il ne trouva pas d’aide qui soit son vis-à-vis.
  '21':
  - type: text
    content: Alors l’Eternel Dieu plongea l’homme dans un profond sommeil. Pendant que celui-ci dormait, il prit une de ses côtes
  - type: note
    content: 'Autre traduction : une partie du côté de l’homme.'
  - type: text
    content: ' et referma la chair à la place. '
  '22':
  - type: text
    content: L’Eternel Dieu forma une femme de la côte qu’il avait prise de l’homme, et il l’amena à l’homme.
  '23':
  - type: text
    content: 'Alors l’homme s’écria :'
  - type: text
    content: Voici bien cette fois
  - type: text
    content: celle qui est
  - type: text
    content: os de mes os,
  - type: text
    content: chair de ma chair.
  - type: text
    content: On la nommera « Femme »
  - type: text
    content: car elle a été prise
  - type: text
    content: de l’homme.
  '24':
  - type: text
    content: C’est pourquoi l’homme laissera son père et sa mère et s’attachera à sa femme, et les deux ne feront plus qu’un
  - type: note
    content: Cité en Mt 19.5 ; Mc 10.7-8 ; 1 Co 6.16 ; Ep 5.31.
  - type: text
    content: '. '
  '25':
  - type: text
    content: L’homme et sa femme étaient tous deux nus sans en éprouver aucune honte.
  '3':
  - type: text
    content: Il bénit le septième jour, il en fit un jour saint, car, en ce jour-là, il se reposa de toute l’œuvre de création qu’il avait accomplie
  - type: note
    content: Allusion en Ex 20.11.
  - type: text
    content: .
  - type: heading
    content: L’histoire des débuts de l’humanité
  - type: heading
    content: L’alliance d’Eden
  '4':
  - type: text
    content: Voici l’histoire de ce qui est advenu au ciel et sur la terre lorsqu’ils furent créés.
  - type: text
    content: 'Au temps où l’Eternel Dieu fit la terre et le ciel, '
  '5':
  - type: text
    content: 'il n’existait encore sur la terre aucun arbuste, et aucune herbe des champs n’avait encore germé, car l’Eternel Dieu n’avait pas fait pleuvoir sur la terre, et il n’y avait pas d’homme pour cultiver la terre. '
  '6':
  - type: text
    content: De l’eau se mit à sourdre et à irriguer toute la surface du sol.
  '7':
  - type: text
    content: L’Eternel Dieu façonna l’homme avec de la poussière du sol, il lui insuffla dans les narines le souffle de vie, et l’homme devint un être vivant
  - type: note
    content: Allusion en 1 Co 15.45.
  - type: text
    content: .
  '8':
  - type: text
    content: 'L’Eternel Dieu planta un jardin vers l’orient : l’Eden, le pays des Délices. Il y plaça l’homme qu’il avait façonné.'
  '9':
  - type: text
    content: L’Eternel Dieu fit pousser du sol toutes sortes d’arbres portant des fruits d’aspect agréable et délicieux, et il mit l’arbre de la vie
  - type: note
    content: Voir Pr 3.18 ; Ap 2.7 ; 22.2, 14.
  - type: text
    content: ' au milieu du jardin. Il y plaça aussi l’arbre de la détermination du bien et du mal'
  - type: note
    content: 'Autre traduction : l’arbre de la connaissance du bien et du mal (de même au v. 17).'
  - type: text
    content: .
