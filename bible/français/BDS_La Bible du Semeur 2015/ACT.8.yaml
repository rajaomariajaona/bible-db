document_id: ACT.8,21
type_code: fra
verses:
  '1':
  - type: usfm
    marker: ms1
    children:
    - type: text
      text: Témoins en Judée et en Samarie
    marker-yv: yv-h
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Persécution et dispersion des croyants
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Saul avait donné son approbation à l’exécution d’Etienne. A partir de ce jour-là, une violente persécution se déchaîna contre l’Eglise qui était à Jérusalem ; tous les croyants se dispersèrent à travers la Judée et la Samarie, à l’exception des apôtres. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: Toute la population, du plus petit jusqu’au plus grand, lui accordait donc une grande attention.
  - type: usfm
    marker: p
    children:
    - type: text
      text: – Cet homme, disaient-ils, est la puissance même de Dieu, celle qu’on appelle la « Grande Puissance ».
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: S’ils s’attachaient ainsi à lui, c’était parce que, depuis assez longtemps, il les étonnait par ses actes de magie.
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'Mais quand ils crurent Philippe qui leur annonçait ce qui concerne le royaume de Dieu et Jésus-Christ, ils se firent baptiser, tant les hommes que les femmes. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: Simon lui-même crut et fut baptisé. Dès lors, il ne quittait plus Philippe, émerveillé par les signes miraculeux et les prodiges extraordinaires qui s’accomplissaient sous ses yeux.
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'Quand les apôtres, restés à Jérusalem, apprirent que les Samaritains avaient accepté la Parole de Dieu, ils déléguèrent auprès d’eux Pierre et Jean. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'Dès leur arrivée, ceux-ci prièrent pour les nouveaux disciples afin qu’ils reçoivent le Saint-Esprit. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'En effet, il n’était encore descendu sur aucun d’eux : ils avaient seulement été baptisés au nom du Seigneur Jésus. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: Pierre et Jean leur imposèrent donc les mains et ils reçurent l’Esprit Saint.
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'Simon vit que l’Esprit Saint était donné aux croyants quand les apôtres leur imposaient les mains. Alors il leur proposa de l’argent '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'et leur dit : Donnez-moi aussi ce pouvoir pour que ceux à qui j’imposerai les mains reçoivent l’Esprit Saint.'
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'Quelques hommes pieux enterrèrent Etienne et le pleurèrent beaucoup. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: 'Mais Pierre lui répondit : Que ton argent périsse, et toi avec lui, puisque tu t’es imaginé qu’on pouvait se procurer le don de Dieu avec de l’argent ! '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: 'Tu n’as ni part ni droit dans cette affaire, car ton cœur n’est pas droit devant Dieu. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: 'Détourne-toi donc du mal qui est en toi, et demande au Seigneur de te pardonner, s’il est possible, d’avoir eu de telles intentions dans ton cœur. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: Car, à ce que je vois, tu es rempli d’amertume et de méchanceté et tu es captif du mal.
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: 'Alors Simon demanda à Pierre et Jean : Priez vous-mêmes le Seigneur pour moi : qu’il ne m’arrive rien de ce que vous avez dit.'
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: Pierre et Jean continuèrent à rendre témoignage à Jésus-Christ en annonçant la Parole du Seigneur, puis ils retournèrent à Jérusalem, tout en annonçant l’Evangile dans un grand nombre de villages samaritains.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Philippe et le dignitaire éthiopien
    marker-yv: yv-h
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: 'Un ange du Seigneur s’adressa à Philippe et lui dit : Lève-toi, pars en direction du sud'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '8.26 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Autre traduction : '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: vers midi.
      marker-yv: yv-n
    - type: text
      text: ', prends la route qui descend de Jérusalem à Gaza, celle qui est déserte'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '8.26 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: déserte
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: ', '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ou « qui traverse une région déserte ». Il existait deux villes portant le nom de Gaza. « Gaza l’ancienne » avait été ravagée et changée en désert en 96 avant Jésus-Christ. D’où le nom de Gaza-la-déserte qui lui est resté même après sa reconstruction. Deux routes menaient à Gaza, l’une longeait la mer, l’autre, beaucoup moins fréquentée, passait par des régions peu habitées. C’est sans doute cette route que Philippe devait prendre.
      marker-yv: yv-n
    - type: text
      text: .
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: Il se leva immédiatement et se mit en route. Et voici qu’il rencontra un haut dignitaire
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '8.27 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Un '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'haut dignitaire, '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'en grec : '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'un eunuque. '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Les hommes au service d’une reine étaient souvent castrés. Ce terme s’est appliqué par la suite aux différents dignitaires du palais royal. Aux temps bibliques, le nom Ethiopie désignait la Nubie, dans l’actuel Soudan, à quelque 800 kilomètres au sud de l’Egypte. Il existait quelques colonies juives dans ce pays. Ainsi ce haut dignitaire a pu apprendre à connaître leur religion.
      marker-yv: yv-n
    - type: text
      text: ' éthiopien, administrateur des biens de Candace'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '8.27 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Candace
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: ': '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: nom générique des reines d’Ethiopie (comme Pharaon était celui des rois d’Egypte).
      marker-yv: yv-n
    - type: text
      text: ', reine d’Ethiopie. Cet homme était venu à Jérusalem pour adorer Dieu. '
  '28':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: Il était sur le chemin du retour, et, assis dans son char, il lisait à haute voix un passage du prophète Esaïe.
  '29':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: 'L’Esprit dit à Philippe : Avance jusqu’à ce char et marche à côté de lui.'
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: Quant à Saul, il cherchait à détruire l’Eglise, allant de maison en maison pour en arracher les croyants, hommes et femmes, et les jeter en prison.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: La prédication de Philippe et le don de l’Esprit en Samarie
    marker-yv: yv-h
  '30':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '30'
    - type: text
      text: 'Philippe courut et entendit l’Ethiopien lire dans le livre du prophète Esaïe. Alors il lui demanda : Comprends-tu ce que tu lis ?'
  '31':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '31'
    - type: text
      text: – Comment le pourrais-je, répondit-il, si je n’ai personne pour me l’expliquer ?
  - type: usfm
    marker: p
    children:
    - type: text
      text: Et il invita Philippe à monter s’asseoir à côté de lui.
  '32':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '32'
    - type: text
      text: 'Or, il était en train de lire ce passage de l’Ecriture :'
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: qt
      children:
      - type: text
        text: Semblable à un mouton
    - type: text
      text: ' ╵'
    - type: usfm
      marker: qt
      children:
      - type: text
        text: mené à l’abattoir,
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: qt
      children:
      - type: text
        text: comme un agneau muet
    - type: text
      text: ' ╵'
    - type: usfm
      marker: qt
      children:
      - type: text
        text: devant ceux qui le tondent,
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: qt
      children:
      - type: text
        text: il n’a pas dit un mot.
  '33':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '33'
    - type: text
      text: ' '
    - type: usfm
      marker: qt
      children:
      - type: text
        text: Il a été humilié
    - type: text
      text: ' ╵'
    - type: usfm
      marker: qt
      children:
      - type: text
        text: et n’a pas obtenu justice.
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: qt
      children:
      - type: text
        text: Qui racontera sa descendance ?
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: qt
      children:
      - type: text
        text: Car sa vie sur la terre
    - type: text
      text: ' ╵'
    - type: usfm
      marker: qt
      children:
      - type: text
        text: a été supprimée
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '8.33 '
      - type: usfm
        marker: ft
        children:
        - type: usfm
          marker: ref
          children:
          - type: text
            text: Es 53.7-8
        - type: text
          text: ' cité selon l’ancienne version grecque.'
      marker-yv: yv-n
    - type: usfm
      marker: qt
      children:
      - type: text
        text: .
  '34':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '34'
    - type: text
      text: 'L’Ethiopien demanda à Philippe : Explique-moi, s’il te plaît : de qui est-il question ? Est-ce de lui-même que le prophète parle, ou de quelqu’un d’autre ?'
  '35':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '35'
    - type: text
      text: Alors Philippe prit la parole et, partant de ce texte, lui annonça ce qui concerne Jésus.
  '36':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '36'
    - type: text
      text: 'En continuant leur route, ils arrivèrent près d’un point d’eau. Alors, le dignitaire s’écria : Voici de l’eau ; qu’est-ce qui empêche que je sois baptisé ?'
  - type: usfm
    marker: p
    children:
    - type: text
      text: '['
  '37':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '37'
    - type: text
      text: – Si tu crois de tout ton cœur, tu peux être baptisé.
  - type: usfm
    marker: p
    children:
    - type: text
      text: – Oui, répondit le dignitaire, je crois que Jésus-Christ est le Fils de Dieu
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '8.37 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Le verset 37 est absent de plusieurs manuscrits.
      marker-yv: yv-n
    - type: text
      text: .]
  '38':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '38'
    - type: text
      text: 'Aussitôt, il donna l’ordre d’arrêter le char ; Philippe et le dignitaire descendirent tous deux dans l’eau et Philippe le baptisa. '
  '39':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '39'
    - type: text
      text: Quand ils sortirent de l’eau, l’Esprit du Seigneur enleva Philippe, et le dignitaire ne le vit plus. Celui-ci poursuivit sa route, le cœur rempli de joie.
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'Les croyants qui s’étaient dispersés parcouraient le pays, en proclamant le message de l’Evangile. '
  '40':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '40'
    - type: text
      text: Philippe se retrouva à Ashdod
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '8.40 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Ashdod
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: ': '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: nom de l’une des capitales de l’ancienne Philistie.
      marker-yv: yv-n
    - type: text
      text: ', d’où il se rendit à Césarée en annonçant l’Evangile dans toutes les localités qu’il traversait.'
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: Philippe se rendit dans la capitale
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '8.5 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Plusieurs manuscrits ont : '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: une ville.
      marker-yv: yv-n
    - type: text
      text: ' de la Samarie et prêcha le Messie à la population. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'Elle se montra tout entière très attentive à ses paroles en l’entendant et en voyant les signes miraculeux qu’il accomplissait. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'En effet, beaucoup de personnes qui avaient des démons en elles en furent délivrées ; ils sortaient d’elles en poussant de grands cris, et de nombreux paralysés et des infirmes furent guéris. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: Aussi, toute la ville était-elle dans une grande joie.
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'Or, depuis quelque temps, un homme nommé Simon s’était établi dans la ville et y exerçait la magie. Il émerveillait le peuple de Samarie et prétendait être un grand personnage. '
