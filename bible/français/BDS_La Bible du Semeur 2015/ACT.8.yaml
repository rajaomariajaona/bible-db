document_id: ACT.8,21
type_code: fra
verses:
  '1':
  - type: heading
    content: Témoins en Judée et en Samarie
  - type: heading
    content: Persécution et dispersion des croyants
  - type: text
    content: 'Saul avait donné son approbation à l’exécution d’Etienne. A partir de ce jour-là, une violente persécution se déchaîna contre l’Eglise qui était à Jérusalem ; tous les croyants se dispersèrent à travers la Judée et la Samarie, à l’exception des apôtres. '
  '10':
  - type: text
    content: Toute la population, du plus petit jusqu’au plus grand, lui accordait donc une grande attention.
  - type: text
    content: – Cet homme, disaient-ils, est la puissance même de Dieu, celle qu’on appelle la « Grande Puissance ».
  '11':
  - type: text
    content: S’ils s’attachaient ainsi à lui, c’était parce que, depuis assez longtemps, il les étonnait par ses actes de magie.
  '12':
  - type: text
    content: 'Mais quand ils crurent Philippe qui leur annonçait ce qui concerne le royaume de Dieu et Jésus-Christ, ils se firent baptiser, tant les hommes que les femmes. '
  '13':
  - type: text
    content: Simon lui-même crut et fut baptisé. Dès lors, il ne quittait plus Philippe, émerveillé par les signes miraculeux et les prodiges extraordinaires qui s’accomplissaient sous ses yeux.
  '14':
  - type: text
    content: 'Quand les apôtres, restés à Jérusalem, apprirent que les Samaritains avaient accepté la Parole de Dieu, ils déléguèrent auprès d’eux Pierre et Jean. '
  '15':
  - type: text
    content: 'Dès leur arrivée, ceux-ci prièrent pour les nouveaux disciples afin qu’ils reçoivent le Saint-Esprit. '
  '16':
  - type: text
    content: 'En effet, il n’était encore descendu sur aucun d’eux : ils avaient seulement été baptisés au nom du Seigneur Jésus. '
  '17':
  - type: text
    content: Pierre et Jean leur imposèrent donc les mains et ils reçurent l’Esprit Saint.
  '18':
  - type: text
    content: 'Simon vit que l’Esprit Saint était donné aux croyants quand les apôtres leur imposaient les mains. Alors il leur proposa de l’argent '
  '19':
  - type: text
    content: 'et leur dit : Donnez-moi aussi ce pouvoir pour que ceux à qui j’imposerai les mains reçoivent l’Esprit Saint.'
  '2':
  - type: text
    content: 'Quelques hommes pieux enterrèrent Etienne et le pleurèrent beaucoup. '
  '20':
  - type: text
    content: 'Mais Pierre lui répondit : Que ton argent périsse, et toi avec lui, puisque tu t’es imaginé qu’on pouvait se procurer le don de Dieu avec de l’argent ! '
  '21':
  - type: text
    content: 'Tu n’as ni part ni droit dans cette affaire, car ton cœur n’est pas droit devant Dieu. '
  '22':
  - type: text
    content: 'Détourne-toi donc du mal qui est en toi, et demande au Seigneur de te pardonner, s’il est possible, d’avoir eu de telles intentions dans ton cœur. '
  '23':
  - type: text
    content: Car, à ce que je vois, tu es rempli d’amertume et de méchanceté et tu es captif du mal.
  '24':
  - type: text
    content: 'Alors Simon demanda à Pierre et Jean : Priez vous-mêmes le Seigneur pour moi : qu’il ne m’arrive rien de ce que vous avez dit.'
  '25':
  - type: text
    content: Pierre et Jean continuèrent à rendre témoignage à Jésus-Christ en annonçant la Parole du Seigneur, puis ils retournèrent à Jérusalem, tout en annonçant l’Evangile dans un grand nombre de villages samaritains.
  - type: heading
    content: Philippe et le dignitaire éthiopien
  '26':
  - type: text
    content: 'Un ange du Seigneur s’adressa à Philippe et lui dit : Lève-toi, pars en direction du sud'
  - type: note
    content: 'Autre traduction : vers midi.'
  - type: text
    content: ', prends la route qui descend de Jérusalem à Gaza, celle qui est déserte'
  - type: note
    content: déserte, ou « qui traverse une région déserte ». Il existait deux villes portant le nom de Gaza. « Gaza l’ancienne » avait été ravagée et changée en désert en 96 avant Jésus-Christ. D’où le nom de Gaza-la-déserte qui lui est resté même après sa reconstruction. Deux routes menaient à Gaza, l’une longeait la mer, l’autre, beaucoup moins fréquentée, passait par des régions peu habitées. C’est sans doute cette route que Philippe devait prendre.
  - type: text
    content: .
  '27':
  - type: text
    content: Il se leva immédiatement et se mit en route. Et voici qu’il rencontra un haut dignitaire
  - type: note
    content: 'Un haut dignitaire, en grec : un eunuque. Les hommes au service d’une reine étaient souvent castrés. Ce terme s’est appliqué par la suite aux différents dignitaires du palais royal. Aux temps bibliques, le nom Ethiopie désignait la Nubie, dans l’actuel Soudan, à quelque 800 kilomètres au sud de l’Egypte. Il existait quelques colonies juives dans ce pays. Ainsi ce haut dignitaire a pu apprendre à connaître leur religion.'
  - type: text
    content: ' éthiopien, administrateur des biens de Candace'
  - type: note
    content: 'Candace: nom générique des reines d’Ethiopie (comme Pharaon était celui des rois d’Egypte).'
  - type: text
    content: ', reine d’Ethiopie. Cet homme était venu à Jérusalem pour adorer Dieu. '
  '28':
  - type: text
    content: Il était sur le chemin du retour, et, assis dans son char, il lisait à haute voix un passage du prophète Esaïe.
  '29':
  - type: text
    content: 'L’Esprit dit à Philippe : Avance jusqu’à ce char et marche à côté de lui.'
  '3':
  - type: text
    content: Quant à Saul, il cherchait à détruire l’Eglise, allant de maison en maison pour en arracher les croyants, hommes et femmes, et les jeter en prison.
  - type: heading
    content: La prédication de Philippe et le don de l’Esprit en Samarie
  '30':
  - type: text
    content: 'Philippe courut et entendit l’Ethiopien lire dans le livre du prophète Esaïe. Alors il lui demanda : Comprends-tu ce que tu lis ?'
  '31':
  - type: text
    content: – Comment le pourrais-je, répondit-il, si je n’ai personne pour me l’expliquer ?
  - type: text
    content: Et il invita Philippe à monter s’asseoir à côté de lui.
  '32':
  - type: text
    content: 'Or, il était en train de lire ce passage de l’Ecriture :'
  - type: text
    content: Semblable à un mouton
  - type: text
    content: ' ╵'
  - type: text
    content: mené à l’abattoir,
  - type: text
    content: comme un agneau muet
  - type: text
    content: ' ╵'
  - type: text
    content: devant ceux qui le tondent,
  - type: text
    content: il n’a pas dit un mot.
  '33':
  - type: text
    content: ' '
  - type: text
    content: Il a été humilié
  - type: text
    content: ' ╵'
  - type: text
    content: et n’a pas obtenu justice.
  - type: text
    content: Qui racontera sa descendance ?
  - type: text
    content: Car sa vie sur la terre
  - type: text
    content: ' ╵'
  - type: text
    content: a été supprimée
  - type: note
    content: Es 53.7-8 cité selon l’ancienne version grecque.
  - type: text
    content: .
  '34':
  - type: text
    content: 'L’Ethiopien demanda à Philippe : Explique-moi, s’il te plaît : de qui est-il question ? Est-ce de lui-même que le prophète parle, ou de quelqu’un d’autre ?'
  '35':
  - type: text
    content: Alors Philippe prit la parole et, partant de ce texte, lui annonça ce qui concerne Jésus.
  '36':
  - type: text
    content: 'En continuant leur route, ils arrivèrent près d’un point d’eau. Alors, le dignitaire s’écria : Voici de l’eau ; qu’est-ce qui empêche que je sois baptisé ?'
  - type: text
    content: '['
  '37':
  - type: text
    content: – Si tu crois de tout ton cœur, tu peux être baptisé.
  - type: text
    content: – Oui, répondit le dignitaire, je crois que Jésus-Christ est le Fils de Dieu
  - type: note
    content: Le verset 37 est absent de plusieurs manuscrits.
  - type: text
    content: .]
  '38':
  - type: text
    content: 'Aussitôt, il donna l’ordre d’arrêter le char ; Philippe et le dignitaire descendirent tous deux dans l’eau et Philippe le baptisa. '
  '39':
  - type: text
    content: Quand ils sortirent de l’eau, l’Esprit du Seigneur enleva Philippe, et le dignitaire ne le vit plus. Celui-ci poursuivit sa route, le cœur rempli de joie.
  '4':
  - type: text
    content: 'Les croyants qui s’étaient dispersés parcouraient le pays, en proclamant le message de l’Evangile. '
  '40':
  - type: text
    content: Philippe se retrouva à Ashdod
  - type: note
    content: 'Ashdod: nom de l’une des capitales de l’ancienne Philistie.'
  - type: text
    content: ', d’où il se rendit à Césarée en annonçant l’Evangile dans toutes les localités qu’il traversait.'
  '5':
  - type: text
    content: Philippe se rendit dans la capitale
  - type: note
    content: 'Plusieurs manuscrits ont : une ville.'
  - type: text
    content: ' de la Samarie et prêcha le Messie à la population. '
  '6':
  - type: text
    content: 'Elle se montra tout entière très attentive à ses paroles en l’entendant et en voyant les signes miraculeux qu’il accomplissait. '
  '7':
  - type: text
    content: 'En effet, beaucoup de personnes qui avaient des démons en elles en furent délivrées ; ils sortaient d’elles en poussant de grands cris, et de nombreux paralysés et des infirmes furent guéris. '
  '8':
  - type: text
    content: Aussi, toute la ville était-elle dans une grande joie.
  '9':
  - type: text
    content: 'Or, depuis quelque temps, un homme nommé Simon s’était établi dans la ville et y exerçait la magie. Il émerveillait le peuple de Samarie et prétendait être un grand personnage. '
