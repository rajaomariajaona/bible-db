document_id: OBA.1,21
type_code: fra
verses:
  '1':
  - type: text
    content: Révélation reçue par Abdias.
  - type: text
    content: Le Seigneur, l’Eternel ╵déclare sur Edom
  - type: note
    content: Peuple descendant d’Esaü (Gn 25.19-26 ; 36.1-43) installé au sud-est de la mer Morte, très souvent hostile à Israël (voir v. 10 et note ; Nb 20.21 ; Dt 23.8).
  - type: text
    content: '  :'
  - type: text
    content: j’ai entendu
  - type: note
    content: 'j’ai entendu: d’après l’ancienne version grecque et Jr 49.14.'
  - type: text
    content: ' ╵une nouvelle'
  - type: text
    content: venant de l’Eternel,
  - type: text
    content: 'et un héraut ╵a été envoyé ╵parmi les autres peuples :'
  - type: text
    content: Levez-vous, leur dit-il.
  - type: text
    content: Partons en guerre contre Edom
  - type: note
    content: Les v. 1-4 ont leur parallèle en Jr 49.14-16  ; les v. 5-6 en Jr 49.9-10. L’idée du v. 8 se retrouve en Jr 49.7.
  - type: text
    content: .
  - type: heading
    content: Le jugement d’Edom
  - type: heading
    content: La ruine d’Edom
  '10':
  - type: text
    content: Tu t’es montré violent ╵envers Jacob ton frère,
  - type: text
    content: c’est pourquoi tu seras ╵couvert de honte
  - type: text
    content: et tu disparaîtras ╵à tout jamais
  - type: note
    content: 'Voir v. 10-14 : Abdias fait référence à une participation édomite soit lors du sac de Jérusalem sous Yoram, vers 845 av. J.-C. (voir 2 Ch 21.8-10, 16-17) soit lors de la prise de Jérusalem par les Babyloniens en 587 av. J.-C. (2 R 25.8-12 ; Ps 137.7 ; Ez 25.12-14 ; 35).'
  - type: text
    content: .
  '11':
  - type: text
    content: Car tu étais présent
  - type: note
    content: 'D’autres comprennent : tu te tenais à l’écart.'
  - type: text
    content: en ce jour où des étrangers ╵emportaient ses richesses,
  - type: text
    content: lorsque des étrangers ╵pénétraient dans sa ville,
  - type: text
    content: et, en tirant au sort, ╵se partageaient entre eux ╵le butin de Jérusalem.
  - type: text
    content: Oui, toi aussi, ╵tu as agi comme eux.
  '12':
  - type: text
    content: Non, tu n’aurais pas dû ╵te complaire au spectacle ╵au jour du malheur de ton frère,
  - type: text
    content: au jour de sa détresse.
  - type: text
    content: Non, tu n’aurais pas dû ╵te réjouir ╵au détriment des Judéens
  - type: text
    content: au jour de leur désastre,
  - type: text
    content: ni ouvrir grand la bouche ╵pour insulter et te moquer
  - type: text
    content: au jour de leur angoisse.
  '13':
  - type: text
    content: Et tu n’aurais pas dû ╵pénétrer dans la ville de mon peuple
  - type: text
    content: au jour de son malheur,
  - type: text
    content: ni te complaire, ╵oui, toi aussi, ╵à la vue de ses maux,
  - type: text
    content: ni t’emparer ╵de toutes ses richesses
  - type: text
    content: au jour de son malheur !
  '14':
  - type: text
    content: Non, tu ne devais pas
  - type: text
    content: te tenir là ╵au carrefour des routes
  - type: note
    content: 'au carrefour des routes. Autre traduction : après avoir brisé son joug (voir Gn 27.40).'
  - type: text
    content: pour massacrer ses rescapés
  - type: text
    content: et pour livrer ╵les derniers survivants
  - type: text
    content: au jour de leur détresse !
  - type: heading
    content: Le jour de l’Eternel
  '15':
  - type: text
    content: Le jour est proche ╵où l’Eternel jugera tous les peuples
  - type: text
    content: 'et l’on te traitera ╵comme tu as traité les autres :'
  - type: text
    content: le mal que tu as fait ╵retombera sur toi.
  '16':
  - type: text
    content: Vous avez bu ╵la coupe de l’orgie
  - type: note
    content: 'D’autres comprennent : vous, les Judéens, vous avez bu la coupe de colère.'
  - type: text
    content: ' ╵sur ma sainte montagne :'
  - type: text
    content: De même, tous les peuples étrangers ╵ne cesseront de boire ╵la coupe de colère
  - type: note
    content: Voir Jr 25.15-29.
  - type: text
    content: .
  - type: text
    content: Ils la boiront, ╵et ils l’avaleront,
  - type: text
    content: puis ils seront anéantis.
  '17':
  - type: text
    content: 'Mais sur le mont Sion ╵il y aura des rescapés :'
  - type: text
    content: ce sera un lieu saint.
  - type: text
    content: Le peuple de Jacob ╵spoliera à son tour
  - type: text
    content: ceux qui l’auront spolié.
  '18':
  - type: text
    content: Le peuple de Jacob ╵sera semblable au feu,
  - type: text
    content: les enfants de Joseph ╵seront comme une flamme ;
  - type: text
    content: 'les enfants d’Esaü, par contre, ╵seront comme du chaume :'
  - type: text
    content: ceux-ci embraseront ceux-là ╵et les consumeront ;
  - type: text
    content: 'il ne réchappera ╵pas un seul survivant ╵parmi les enfants d’Esaü :'
  - type: text
    content: l’Eternel le déclare.
  - type: heading
    content: A l’Eternel appartiendra le règne
  '19':
  - type: text
    content: Ceux du Néguev s’empareront ╵de la montagne d’Esaü
  - type: text
    content: et ceux qui vivent dans la plaine ╵posséderont la Philistie.
  - type: text
    content: Ils viendront occuper
  - type: note
    content: 'Ils viendront occuper: une modification légère du texte hébreu traditionnel permet de lire : Jérusalem possédera.'
  - type: text
    content: ' ╵le territoire d’Ephraïm,'
  - type: text
    content: qui est celui de Samarie.
  - type: text
    content: Les gens de Benjamin ╵s’empareront de Galaad
  - type: note
    content: Galaad, à l’est du Jourdain, région rattachée au royaume du Nord.
  - type: text
    content: ','
  '2':
  - type: text
    content: Je vais te rendre ╵petit parmi les peuples
  - type: text
    content: et tu seras très méprisé.
  '20':
  - type: text
    content: et les déportés d’Israël ╵ – toute une armée –
  - type: text
    content: posséderont ╵le pays des Cananéens ╵jusque vers Sarepta.
  - type: text
    content: Les exilés à Sardes
  - type: note
    content: 'Sarepta: entre Tyr et Sidon (voir 1 R 17.9), sur la côte de la Méditerranée. Sardes: en hébreu, Sepharad. Très certainement Sardes en Asie Mineure. Selon d’autres, Sparte en Grèce.'
  - type: text
    content: ', ╵déportés de Jérusalem,'
  - type: text
    content: posséderont ╵les villes du Néguev.
  '21':
  - type: text
    content: Des sauvés
  - type: note
    content: 'D’après les versions. Le texte hébreu traditionnel a : des sauveurs.'
  - type: text
    content: ' graviront ╵le mont Sion'
  - type: text
    content: pour dominer ╵sur les monts d’Esaü
  - type: note
    content: 'graviront le mont Sion… d’Esaü. Autre traduction : sur le mont Sion, iront exercer leur domination sur la montagne d’Esaü.'
  - type: text
    content: .
  - type: text
    content: Alors l’Eternel régnera !
  '3':
  - type: text
    content: Car ton orgueil t’égare,
  - type: text
    content: toi qui as ta demeure ╵dans les creux du rocher
  - type: note
    content: rocher, en hébreu séla, est peut-être une allusion à la ville du même nom, taillée dans le roc, capitale d’Edom (2 R 14.7). Séla était peut-être sur le même site que la Pétra ultérieure des Nabatéens, qui elle est bien connue ; elle se situait en tout cas dans la même région.
  - type: text
    content: .
  - type: text
    content: Toi dont l’habitation ╵est haut perchée,
  - type: text
    content: 'tu te dis en toi-même :'
  - type: text
    content: « Qui m’en fera descendre ? »
  '4':
  - type: text
    content: Si comme l’aigle ╵tu t’élevais,
  - type: text
    content: et quand bien même ╵ton nid serait placé ╵au milieu des étoiles,
  - type: text
    content: je t’en ferais descendre,
  - type: text
    content: l’Eternel le déclare.
  '5':
  - type: text
    content: Si des voleurs ╵ou des pillards ╵viennent chez toi ╵pendant la nuit,
  - type: text
    content: ils saccageront tout.
  - type: text
    content: Ne s’empareront-ils pas de tes biens ╵jusqu’à ce qu’ils en aient assez ?
  - type: text
    content: Si des vendangeurs pénètrent chez toi,
  - type: text
    content: ne laisseront-ils pas ╵que ce qui se grappille ?
  '6':
  - type: text
    content: O ! Esaü, ╵comme on te fouille !
  - type: text
    content: On met à jour ╵tous tes trésors cachés.
  '7':
  - type: text
    content: Tous tes alliés ╵t’ont refoulé ╵jusque sur ta frontière.
  - type: text
    content: Tous tes amis te trompent ╵et te réduisent ╵en leur pouvoir.
  - type: text
    content: Tes associés ╵tendent
  - type: note
    content: 'Tes associés tendent. Autre traduction : ils profitent de ton hospitalité pour tendre.'
  - type: text
    content: ' des pièges sous tes pas.'
  - type: text
    content: Il n’y a en Edom ╵aucun discernement.
  '8':
  - type: text
    content: En ce jour-là,
  - type: text
    content: l’Eternel le déclare,
  - type: text
    content: je vais faire périr ╵tous les sages d’Edom,
  - type: text
    content: je ferai disparaître ╵tout le discernement ╵de la montagne d’Esaü.
  '9':
  - type: text
    content: Tes guerriers, ô Témân
  - type: note
    content: Ville ou région d’Edom qui représente ici tout le pays (voir Jr 49.7 ; Am 1.12).
  - type: text
    content: ', ╵seront pris de panique'
  - type: text
    content: si bien qu’au grand massacre,
  - type: text
    content: tout homme sera retranché ╵de la montagne d’Esaü.
  - type: heading
    content: Contre ceux qui profitent du malheur d’autrui
