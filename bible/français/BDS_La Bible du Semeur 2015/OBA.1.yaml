document_id: OBA.1,21
type_code: fra
verses:
  '1':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Révélation reçue par Abdias.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Le Seigneur, l’Eternel ╵déclare sur Edom
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Peuple descendant d’Esaü (Gn 25.19-26 ; 36.1-43) installé au sud-est de la mer Morte, très souvent hostile à Israël (voir v. 10 et note ; Nb 20.21 ; Dt 23.8).
      marker-yv: yv-n
    - type: text
      text: '  :'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: j’ai entendu
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: j’ai entendu
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: ': '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'd’après l’ancienne version grecque et '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: Jr 49.14
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: ' ╵une nouvelle'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: venant de l’Eternel,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'et un héraut ╵a été envoyé ╵parmi les autres peuples :'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Levez-vous, leur dit-il.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Partons en guerre contre Edom
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Les v. 1-4 ont leur parallèle en '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: Jr 49.14-16
        - type: text
          text: '  ; les v. 5-6 en '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: Jr 49.9-10
        - type: text
          text: '. L’idée du v. 8 se retrouve en '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: Jr 49.7
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: .
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Le jugement d’Edom
    marker-yv: yv-h
  - type: usfm
    marker: s2
    children:
    - type: text
      text: La ruine d’Edom
    marker-yv: yv-h
  '10':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tu t’es montré violent ╵envers Jacob ton frère,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: c’est pourquoi tu seras ╵couvert de honte
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et tu disparaîtras ╵à tout jamais
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '10 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Voir v. 10-14 : Abdias fait référence à une participation édomite soit lors du sac de Jérusalem sous Yoram, vers 845 av. J.-C. (voir '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: 2 Ch 21.8-10
        - type: text
          text: ', '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: 16-17
        - type: text
          text: ) soit lors de la prise de Jérusalem par les Babyloniens en 587 av. J.-C. (2 R 25.8-12 ; Ps 137.7 ; Ez 25.12-14 ; 35).
      marker-yv: yv-n
    - type: text
      text: .
  '11':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Car tu étais présent
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '11 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'D’autres comprennent : '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: tu te tenais à l’écart.
      marker-yv: yv-n
  - type: usfm
    marker: q1
    children:
    - type: text
      text: en ce jour où des étrangers ╵emportaient ses richesses,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: lorsque des étrangers ╵pénétraient dans sa ville,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et, en tirant au sort, ╵se partageaient entre eux ╵le butin de Jérusalem.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Oui, toi aussi, ╵tu as agi comme eux.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Non, tu n’aurais pas dû ╵te complaire au spectacle ╵au jour du malheur de ton frère,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: au jour de sa détresse.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Non, tu n’aurais pas dû ╵te réjouir ╵au détriment des Judéens
  - type: usfm
    marker: q1
    children:
    - type: text
      text: au jour de leur désastre,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ni ouvrir grand la bouche ╵pour insulter et te moquer
  - type: usfm
    marker: q1
    children:
    - type: text
      text: au jour de leur angoisse.
  '13':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et tu n’aurais pas dû ╵pénétrer dans la ville de mon peuple
  - type: usfm
    marker: q1
    children:
    - type: text
      text: au jour de son malheur,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ni te complaire, ╵oui, toi aussi, ╵à la vue de ses maux,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ni t’emparer ╵de toutes ses richesses
  - type: usfm
    marker: q1
    children:
    - type: text
      text: au jour de son malheur !
  '14':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Non, tu ne devais pas
  - type: usfm
    marker: q1
    children:
    - type: text
      text: te tenir là ╵au carrefour des routes
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '14 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'au carrefour des routes. '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Autre traduction : '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'après avoir brisé son joug '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '(voir '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: Gn 27.40
        - type: text
          text: ).
      marker-yv: yv-n
  - type: usfm
    marker: q1
    children:
    - type: text
      text: pour massacrer ses rescapés
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et pour livrer ╵les derniers survivants
  - type: usfm
    marker: q1
    children:
    - type: text
      text: au jour de leur détresse !
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Le jour de l’Eternel
    marker-yv: yv-h
  '15':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Le jour est proche ╵où l’Eternel jugera tous les peuples
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'et l’on te traitera ╵comme tu as traité les autres :'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: le mal que tu as fait ╵retombera sur toi.
  '16':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Vous avez bu ╵la coupe de l’orgie
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '16 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'D’autres comprennent : '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: vous, les Judéens, vous avez bu la coupe de colère.
      marker-yv: yv-n
    - type: text
      text: ' ╵sur ma sainte montagne :'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: De même, tous les peuples étrangers ╵ne cesseront de boire ╵la coupe de colère
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '16 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Voir '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: Jr 25.15-29
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: .
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ils la boiront, ╵et ils l’avaleront,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: puis ils seront anéantis.
  '17':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Mais sur le mont Sion ╵il y aura des rescapés :'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ce sera un lieu saint.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Le peuple de Jacob ╵spoliera à son tour
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ceux qui l’auront spolié.
  '18':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Le peuple de Jacob ╵sera semblable au feu,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: les enfants de Joseph ╵seront comme une flamme ;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'les enfants d’Esaü, par contre, ╵seront comme du chaume :'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ceux-ci embraseront ceux-là ╵et les consumeront ;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'il ne réchappera ╵pas un seul survivant ╵parmi les enfants d’Esaü :'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: l’Eternel le déclare.
  - type: usfm
    marker: s2
    children:
    - type: text
      text: A l’Eternel appartiendra le règne
    marker-yv: yv-h
  '19':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ceux du Néguev s’empareront ╵de la montagne d’Esaü
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et ceux qui vivent dans la plaine ╵posséderont la Philistie.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ils viendront occuper
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '19 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Ils viendront occuper
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: ': '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'une modification légère du texte hébreu traditionnel permet de lire : '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: Jérusalem possédera.
      marker-yv: yv-n
    - type: text
      text: ' ╵le territoire d’Ephraïm,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: qui est celui de Samarie.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Les gens de Benjamin ╵s’empareront de Galaad
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '19 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Galaad
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: ', '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: à l’est du Jourdain, région rattachée au royaume du Nord.
      marker-yv: yv-n
    - type: text
      text: ','
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Je vais te rendre ╵petit parmi les peuples
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et tu seras très méprisé.
  '20':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et les déportés d’Israël ╵ – toute une armée –
  - type: usfm
    marker: q1
    children:
    - type: text
      text: posséderont ╵le pays des Cananéens ╵jusque vers Sarepta.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Les exilés à Sardes
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '20 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Sarepta
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: ': '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'entre Tyr et Sidon (voir '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: 1 R 17.9
        - type: text
          text: '), sur la côte de la Méditerranée. '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Sardes
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: ': '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'en hébreu, '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'Sepharad. '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Très certainement Sardes en Asie Mineure. Selon d’autres, Sparte en Grèce.
      marker-yv: yv-n
    - type: text
      text: ', ╵déportés de Jérusalem,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: posséderont ╵les villes du Néguev.
  '21':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Des sauvés
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '21 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'D’après les versions. Le texte hébreu traditionnel a : '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: des sauveurs.
      marker-yv: yv-n
    - type: text
      text: ' graviront ╵le mont Sion'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: pour dominer ╵sur les monts d’Esaü
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '21 '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'graviront le mont Sion… d’Esaü. '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Autre traduction : '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: sur le mont Sion, iront exercer leur domination sur la montagne d’Esaü.
      marker-yv: yv-n
    - type: text
      text: .
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Alors l’Eternel régnera !
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Car ton orgueil t’égare,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: toi qui as ta demeure ╵dans les creux du rocher
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '3 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: rocher
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: ', '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'en hébreu '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'séla, '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: est peut-être une allusion à la ville du même nom, taillée dans le roc, capitale d’Edom (
        - type: usfm
          marker: ref
          children:
          - type: text
            text: 2 R 14.7
        - type: text
          text: ). Séla était peut-être sur le même site que la Pétra ultérieure des Nabatéens, qui elle est bien connue ; elle se situait en tout cas dans la même région.
      marker-yv: yv-n
    - type: text
      text: .
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Toi dont l’habitation ╵est haut perchée,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'tu te dis en toi-même :'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: « Qui m’en fera descendre ? »
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Si comme l’aigle ╵tu t’élevais,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et quand bien même ╵ton nid serait placé ╵au milieu des étoiles,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: je t’en ferais descendre,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: l’Eternel le déclare.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Si des voleurs ╵ou des pillards ╵viennent chez toi ╵pendant la nuit,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ils saccageront tout.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ne s’empareront-ils pas de tes biens ╵jusqu’à ce qu’ils en aient assez ?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Si des vendangeurs pénètrent chez toi,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ne laisseront-ils pas ╵que ce qui se grappille ?
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: O ! Esaü, ╵comme on te fouille !
  - type: usfm
    marker: q1
    children:
    - type: text
      text: On met à jour ╵tous tes trésors cachés.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tous tes alliés ╵t’ont refoulé ╵jusque sur ta frontière.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tous tes amis te trompent ╵et te réduisent ╵en leur pouvoir.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tes associés ╵tendent
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '7 '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'Tes associés tendent. '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Autre traduction : '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: ils profitent de ton hospitalité pour tendre.
      marker-yv: yv-n
    - type: text
      text: ' des pièges sous tes pas.'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Il n’y a en Edom ╵aucun discernement.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: En ce jour-là,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: l’Eternel le déclare,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: je vais faire périr ╵tous les sages d’Edom,
  - type: usfm
    marker: q1
    children:
    - type: text
