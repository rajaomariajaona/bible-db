document_id: PSA.23
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: L’Eternel est mon berger
  marker-yv: yv-h
- type: usfm
  marker: d
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Psaume de David.
- type: usfm
  marker: q1
  children:
  - type: text
    text: L’Eternel est mon berger
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '23.1 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Image familière à David. Le terme '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'berger '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'est un titre royal (78.71-72 ; Es 44.28 ; Jr 3.15). Dieu est le berger d’Israël : 28.9 ; 79.13 ; Ez 34.11-16. Voir Jn 10.11, 14 ; Hé 13.20 ; 1 P 5.4 ; Ap 7.17.'
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: q1
  children:
  - type: text
    text: Je ne manquerai de rien.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Grâce à lui, je me repose ╵dans des prairies verdoyantes,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et c’est lui qui me conduit ╵au bord des eaux calmes.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Il me revigore,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et, pour l’honneur de son nom,
- type: usfm
  marker: q1
  children:
  - type: text
    text: il me conduit sur le droit chemin.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Si je devais traverser ╵la vallée où règnent ╵d’épaisses ténèbres,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'je ne craindrais aucun mal, ╵car tu es auprès de moi :'
- type: usfm
  marker: q1
  children:
  - type: text
    text: ta houlette me conduit ╵et ton bâton me protège.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Pour moi, tu dresses une table
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '23.5 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Le divin Roi-Berger reçoit David, son vassal, à sa table. Les traités d’alliance étaient généralement scellés par un repas exprimant la joie et l’amitié (41.10 ; Gn 31.54 ; Ab 7), le vassal étant l’hôte de son suzerain (
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ex 24.8-12
        metadata:
          usfm: EXO.24.8+EXO.24.9+EXO.24.10+EXO.24.11+EXO.24.12
      - type: text
        text: ).
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: text
    text: aux yeux de mes ennemis,
- type: usfm
  marker: q1
  children:
  - type: text
    text: tu oins d’huile parfumée ma tête
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '23.5 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: On répandait cette huile parfumée sur les cheveux. Geste coutumier pour honorer un invité lors d’un banquet (voir 2 S 12.20 ; Ec 9.8 ; Dn 10.3 ; Lc 7.46).
    marker-yv: yv-n
  - type: text
    text: ','
- type: usfm
  marker: q1
  children:
  - type: text
    text: tu fais déborder ma coupe.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Oui, toute ma vie,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ta bonté et ton amour me poursuivront
- type: usfm
  marker: q1
  children:
  - type: text
    text: et je pourrai retourner
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '23.6 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Texte hébreu traditionnel. Certaines versions anciennes ont : '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: j’habiterai.
    marker-yv: yv-n
  - type: text
    text: ' ╵au sanctuaire de l’Eternel'
- type: usfm
  marker: q1
  children:
  - type: text
    text: tant que je vivrai
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '23.6 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Autre traduction : '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: à tout jamais.
    marker-yv: yv-n
  - type: text
    text: .
