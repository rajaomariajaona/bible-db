document_id: PSA.23,21
type_code: fra
verses:
  '1':
  - type: heading
    content: L’Eternel est mon berger
  - type: text
    content: Psaume de David.
  - type: text
    content: L’Eternel est mon berger
  - type: note
    content: 'Image familière à David. Le terme berger est un titre royal (78.71-72 ; Es 44.28 ; Jr 3.15). Dieu est le berger d’Israël : 28.9 ; 79.13 ; Ez 34.11-16. Voir Jn 10.11, 14 ; Hé 13.20 ; 1 P 5.4 ; Ap 7.17.'
  - type: text
    content: .
  - type: text
    content: Je ne manquerai de rien.
  '2':
  - type: text
    content: Grâce à lui, je me repose ╵dans des prairies verdoyantes,
  - type: text
    content: et c’est lui qui me conduit ╵au bord des eaux calmes.
  '3':
  - type: text
    content: Il me revigore,
  - type: text
    content: et, pour l’honneur de son nom,
  - type: text
    content: il me conduit sur le droit chemin.
  '4':
  - type: text
    content: Si je devais traverser ╵la vallée où règnent ╵d’épaisses ténèbres,
  - type: text
    content: 'je ne craindrais aucun mal, ╵car tu es auprès de moi :'
  - type: text
    content: ta houlette me conduit ╵et ton bâton me protège.
  '5':
  - type: text
    content: Pour moi, tu dresses une table
  - type: note
    content: Le divin Roi-Berger reçoit David, son vassal, à sa table. Les traités d’alliance étaient généralement scellés par un repas exprimant la joie et l’amitié (41.10 ; Gn 31.54 ; Ab 7), le vassal étant l’hôte de son suzerain (Ex 24.8-12).
  - type: text
    content: aux yeux de mes ennemis,
  - type: text
    content: tu oins d’huile parfumée ma tête
  - type: note
    content: On répandait cette huile parfumée sur les cheveux. Geste coutumier pour honorer un invité lors d’un banquet (voir 2 S 12.20 ; Ec 9.8 ; Dn 10.3 ; Lc 7.46).
  - type: text
    content: ','
  - type: text
    content: tu fais déborder ma coupe.
  '6':
  - type: text
    content: Oui, toute ma vie,
  - type: text
    content: ta bonté et ton amour me poursuivront
  - type: text
    content: et je pourrai retourner
  - type: note
    content: 'Texte hébreu traditionnel. Certaines versions anciennes ont : j’habiterai.'
  - type: text
    content: ' ╵au sanctuaire de l’Eternel'
  - type: text
    content: tant que je vivrai
  - type: note
    content: 'Autre traduction : à tout jamais.'
  - type: text
    content: .
