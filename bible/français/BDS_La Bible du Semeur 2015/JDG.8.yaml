document_id: JDG.8
type_code: fra
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Les hommes d’Ephraïm dirent à Gédéon : Pourquoi as-tu agi de cette manière envers nous ? Pourquoi ne nous as-tu pas appelés en renfort quand tu es parti combattre les Madianites ?'
- type: usfm
  marker: p
  children:
  - type: text
    text: Et ils le prirent violemment à partie.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Gédéon leur répondit : Qu’ai-je fait en comparaison de vous ? Le grappillage d’Ephraïm a été plus productif que toute la vendange de la famille d’Abiézer. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Après tout : c’est à vous que Dieu a livré les chefs madianites Oreb et Zéeb. Qu’ai-je pu faire en comparaison avec vous ?'
- type: usfm
  marker: p
  children:
  - type: text
    text: Ces paroles apaisèrent leur colère.
- type: usfm
  marker: s1
  children:
  - type: text
    text: La victoire sur les rois madianites
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Lorsqu’il atteignit le Jourdain, Gédéon le traversa avec les trois cents hommes qui l’accompagnaient. Malgré leur fatigue, ils continuaient à poursuivre l’ennemi. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Arrivés à la ville de Soukkoth
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '8.5 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'A l’est du Jourdain (voir '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Gn 33.17
        metadata:
          usfm: GEN.33.17
      - type: text
        text: ). Cette ville devait être importante vu le nombre de ses chefs et responsables (v. 14).
    marker-yv: yv-n
  - type: text
    text: ', Gédéon dit à ses habitants : Donnez, je vous prie, des miches de pain aux hommes qui m’accompagnent, car ils sont épuisés et je suis à la poursuite des deux rois madianites Zébah et Tsalmounna.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Mais les chefs de Soukkoth lui répondirent : Tiens-tu déjà Zébah et Tsalmounna en ton pouvoir pour que nous donnions du pain à ta troupe ?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: – Eh bien, riposta Gédéon, quand l’Eternel aura livré Zébah et Tsalmounna en mon pouvoir, je vous fouetterai avec des chardons et des épines du désert !
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: De là, Gédéon se rendit à Penouel
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '8.8 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Le lieu où Jacob avait lutté avec Dieu (nommé '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'Péniel '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'dans '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Gn 32.30-31
        metadata:
          usfm: GEN.32.30+GEN.32.31
      - type: text
        text: ) à 8 kilomètres de Soukkoth.
    marker-yv: yv-n
  - type: text
    text: ' où il adressa la même demande aux habitants. Il reçut la même réponse qu’à Soukkoth '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'et déclara aux gens de Penouel : Quand je repasserai, une fois le combat terminé, je démolirai cette tour.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Or, Zébah et Tsalmounna s’étaient retranchés à Qarqor avec leur troupe qui comprenait quinze mille hommes. C’était tout ce qui leur restait de la grande armée des Bédouins de l’Orient. En effet, cent vingt mille soldats étaient déjà tombés. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Gédéon prit la route des caravanes de nomades à l’est de Nobah et de Yogbeha et attaqua le camp ennemi qui se croyait en sécurité. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Les deux rois de Madian, Zébah et Tsalmounna, s’enfuirent, Gédéon les poursuivit, il les captura tous les deux et sema la panique dans toute leur armée.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Le châtiment de Soukkoth et de Penouel
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Lorsque la guerre fut terminée, Gédéon fils de Joas retourna par la montée de Hérès. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Il mit la main sur un jeune homme de Soukkoth qu’il questionna et qui lui inscrivit les noms des soixante-dix-sept chefs et responsables de Soukkoth. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Gédéon alla trouver les habitants de Soukkoth et leur dit : Rappelez-vous comment vous m’avez insulté en disant : « Tiens-tu déjà Zébah et Tsalmounna en ton pouvoir pour que nous soyons obligés de donner du pain à tes gens fatigués ? » Eh bien, les voilà !'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Alors il fit saisir les responsables de la ville et les fit fouetter à coups de chardons et d’épines du désert. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Il démolit aussi la tour de Penouel et massacra les hommes de la localité.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Puis il demanda à Zébah et Tsalmounna : Comment étaient les hommes que vous avez tués au Thabor ?'
- type: usfm
  marker: p
  children:
  - type: text
    text: – Ils te ressemblaient, répondirent-ils, ils avaient le port d’un fils de roi.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: – C’étaient mes frères, les fils de ma propre mère, s’écria Gédéon. Par le Dieu vivant je jure que si vous les aviez épargnés, je ne vous tuerais pas non plus.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Puis il ordonna à son fils aîné Yéter : Viens, tue-les !'
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Mais le jeune homme ne dégaina pas son épée, car il n’était encore qu’un jeune garçon et il avait peur. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Zébah et Tsalmounna dirent alors à Gédéon : Frappe-nous donc toi-même, car c’est la tâche d’un homme fort.'
- type: usfm
  marker: p
  children:
  - type: text
    text: Alors Gédéon tua Zébah et Tsalmounna. Puis il prit les ornements en forme de croissants qui pendaient au cou de leurs chameaux.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Gédéon refuse la royauté
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Après cela, les hommes d’Israël dirent à Gédéon : Règne sur nous, puisque tu nous as délivrés des Madianites. Ton fils, puis ton petit-fils te succéderont.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Gédéon leur répondit : Non, je ne régnerai pas sur vous, et mon fils ne vous gouvernera pas non plus. C’est l’Eternel qui régnera sur vous.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Puis il ajouta : J’aurais cependant une demande à vous faire : Donnez-moi chacun une boucle d’oreille en or prise sur votre butin.'
- type: usfm
  marker: p
  children:
  - type: text
    text: Les ennemis portaient, en effet, des boucles d’or, car ils étaient ismaélites
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '8.24 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Les Ismaélites étaient parents des Madianites (
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Gn 25.1-2
        metadata:
          usfm: GEN.25.1+GEN.25.2
      - type: text
        text: ) et leur sont quelquefois identifiés (v. 22, 24 ; Gn 37.25-28 ; 39.1).
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: – Très volontiers, lui répondirent-ils.
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Ils étendirent un manteau par terre, et chacun y jeta un anneau prélevé sur son butin. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Les anneaux d’or que Gédéon avait demandés pesaient près de vingt kilogrammes en tout. Il reçut également les croissants d’or, les pendants d’oreilles et les manteaux de pourpre que portaient les rois madianites, ainsi que les colliers qui ornaient le cou de leurs chameaux. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: Avec l’or, Gédéon fabriqua une statue qu’il installa dans son village, à Ophra. Tout Israël s’y prostitua, en lui rendant un culte, de sorte que cette statue devint un piège pour Gédéon et pour sa famille.
- type: usfm
  marker: s1
  children:
  - type: text
    text: La fin de la vie de Gédéon
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: Ainsi les Madianites furent affaiblis par les Israélites et ils ne se relevèrent pas de leur défaite. Aussi longtemps que Gédéon vécut, c’est-à-dire encore pendant quarante ans, le pays jouit de la paix.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'Yeroubbaal, fils de Joas, s’en retourna dans sa maison et y demeura. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'Gédéon eut soixante-dix fils car il avait de nombreuses femmes. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: Une épouse de second rang habitant à Sichem lui donna aussi un fils qu’il appela Abimélek.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: Après une heureuse vieillesse, Gédéon, fils de Joas, mourut et fut enterré dans le tombeau de Joas son père, à Ophra de la famille d’Abiézer.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: Après la mort de Gédéon, les Israélites recommencèrent à se prostituer aux Baals et adoptèrent Baal-Berith comme dieu
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '8.33 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: Baal-Berith
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: ', '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'divinité qui avait un sanctuaire à Sichem (voir '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '9.4'
        metadata:
          usfm: JDG.9.4
      - type: text
        text: ).
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: 'Ils oublièrent l’Eternel leur Dieu qui les avait délivrés de tous les ennemis qui les entouraient. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: Ils ne témoignèrent aucune gratitude à la famille de Yeroubbaal-Gédéon pour tout le bien que celui-ci avait fait à Israël.
