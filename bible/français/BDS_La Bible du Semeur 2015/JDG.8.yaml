document_id: JDG.8,21
type_code: fra
verses:
  '1':
  - type: text
    content: 'Les hommes d’Ephraïm dirent à Gédéon : Pourquoi as-tu agi de cette manière envers nous ? Pourquoi ne nous as-tu pas appelés en renfort quand tu es parti combattre les Madianites ?'
  - type: text
    content: Et ils le prirent violemment à partie.
  '10':
  - type: text
    content: 'Or, Zébah et Tsalmounna s’étaient retranchés à Qarqor avec leur troupe qui comprenait quinze mille hommes. C’était tout ce qui leur restait de la grande armée des Bédouins de l’Orient. En effet, cent vingt mille soldats étaient déjà tombés. '
  '11':
  - type: text
    content: 'Gédéon prit la route des caravanes de nomades à l’est de Nobah et de Yogbeha et attaqua le camp ennemi qui se croyait en sécurité. '
  '12':
  - type: text
    content: Les deux rois de Madian, Zébah et Tsalmounna, s’enfuirent, Gédéon les poursuivit, il les captura tous les deux et sema la panique dans toute leur armée.
  - type: heading
    content: Le châtiment de Soukkoth et de Penouel
  '13':
  - type: text
    content: 'Lorsque la guerre fut terminée, Gédéon fils de Joas retourna par la montée de Hérès. '
  '14':
  - type: text
    content: 'Il mit la main sur un jeune homme de Soukkoth qu’il questionna et qui lui inscrivit les noms des soixante-dix-sept chefs et responsables de Soukkoth. '
  '15':
  - type: text
    content: 'Gédéon alla trouver les habitants de Soukkoth et leur dit : Rappelez-vous comment vous m’avez insulté en disant : « Tiens-tu déjà Zébah et Tsalmounna en ton pouvoir pour que nous soyons obligés de donner du pain à tes gens fatigués ? » Eh bien, les voilà !'
  '16':
  - type: text
    content: 'Alors il fit saisir les responsables de la ville et les fit fouetter à coups de chardons et d’épines du désert. '
  '17':
  - type: text
    content: Il démolit aussi la tour de Penouel et massacra les hommes de la localité.
  '18':
  - type: text
    content: 'Puis il demanda à Zébah et Tsalmounna : Comment étaient les hommes que vous avez tués au Thabor ?'
  - type: text
    content: – Ils te ressemblaient, répondirent-ils, ils avaient le port d’un fils de roi.
  '19':
  - type: text
    content: – C’étaient mes frères, les fils de ma propre mère, s’écria Gédéon. Par le Dieu vivant je jure que si vous les aviez épargnés, je ne vous tuerais pas non plus.
  '2':
  - type: text
    content: 'Gédéon leur répondit : Qu’ai-je fait en comparaison de vous ? Le grappillage d’Ephraïm a été plus productif que toute la vendange de la famille d’Abiézer. '
  '20':
  - type: text
    content: 'Puis il ordonna à son fils aîné Yéter : Viens, tue-les !'
  - type: text
    content: 'Mais le jeune homme ne dégaina pas son épée, car il n’était encore qu’un jeune garçon et il avait peur. '
  '21':
  - type: text
    content: 'Zébah et Tsalmounna dirent alors à Gédéon : Frappe-nous donc toi-même, car c’est la tâche d’un homme fort.'
  - type: text
    content: Alors Gédéon tua Zébah et Tsalmounna. Puis il prit les ornements en forme de croissants qui pendaient au cou de leurs chameaux.
  - type: heading
    content: Gédéon refuse la royauté
  '22':
  - type: text
    content: 'Après cela, les hommes d’Israël dirent à Gédéon : Règne sur nous, puisque tu nous as délivrés des Madianites. Ton fils, puis ton petit-fils te succéderont.'
  '23':
  - type: text
    content: 'Gédéon leur répondit : Non, je ne régnerai pas sur vous, et mon fils ne vous gouvernera pas non plus. C’est l’Eternel qui régnera sur vous.'
  '24':
  - type: text
    content: 'Puis il ajouta : J’aurais cependant une demande à vous faire : Donnez-moi chacun une boucle d’oreille en or prise sur votre butin.'
  - type: text
    content: Les ennemis portaient, en effet, des boucles d’or, car ils étaient ismaélites
  - type: note
    content: Les Ismaélites étaient parents des Madianites (Gn 25.1-2) et leur sont quelquefois identifiés (v. 22, 24 ; Gn 37.25-28 ; 39.1).
  - type: text
    content: .
  '25':
  - type: text
    content: – Très volontiers, lui répondirent-ils.
  - type: text
    content: 'Ils étendirent un manteau par terre, et chacun y jeta un anneau prélevé sur son butin. '
  '26':
  - type: text
    content: 'Les anneaux d’or que Gédéon avait demandés pesaient près de vingt kilogrammes en tout. Il reçut également les croissants d’or, les pendants d’oreilles et les manteaux de pourpre que portaient les rois madianites, ainsi que les colliers qui ornaient le cou de leurs chameaux. '
  '27':
  - type: text
    content: Avec l’or, Gédéon fabriqua une statue qu’il installa dans son village, à Ophra. Tout Israël s’y prostitua, en lui rendant un culte, de sorte que cette statue devint un piège pour Gédéon et pour sa famille.
  - type: heading
    content: La fin de la vie de Gédéon
  '28':
  - type: text
    content: Ainsi les Madianites furent affaiblis par les Israélites et ils ne se relevèrent pas de leur défaite. Aussi longtemps que Gédéon vécut, c’est-à-dire encore pendant quarante ans, le pays jouit de la paix.
  '29':
  - type: text
    content: 'Yeroubbaal, fils de Joas, s’en retourna dans sa maison et y demeura. '
  '3':
  - type: text
    content: 'Après tout : c’est à vous que Dieu a livré les chefs madianites Oreb et Zéeb. Qu’ai-je pu faire en comparaison avec vous ?'
  - type: text
    content: Ces paroles apaisèrent leur colère.
  - type: heading
    content: La victoire sur les rois madianites
  '30':
  - type: text
    content: 'Gédéon eut soixante-dix fils car il avait de nombreuses femmes. '
  '31':
  - type: text
    content: Une épouse de second rang habitant à Sichem lui donna aussi un fils qu’il appela Abimélek.
  '32':
  - type: text
    content: Après une heureuse vieillesse, Gédéon, fils de Joas, mourut et fut enterré dans le tombeau de Joas son père, à Ophra de la famille d’Abiézer.
  '33':
  - type: text
    content: Après la mort de Gédéon, les Israélites recommencèrent à se prostituer aux Baals et adoptèrent Baal-Berith comme dieu
  - type: note
    content: Baal-Berith, divinité qui avait un sanctuaire à Sichem (voir 9.4).
  - type: text
    content: '. '
  '34':
  - type: text
    content: 'Ils oublièrent l’Eternel leur Dieu qui les avait délivrés de tous les ennemis qui les entouraient. '
  '35':
  - type: text
    content: Ils ne témoignèrent aucune gratitude à la famille de Yeroubbaal-Gédéon pour tout le bien que celui-ci avait fait à Israël.
  '4':
  - type: text
    content: 'Lorsqu’il atteignit le Jourdain, Gédéon le traversa avec les trois cents hommes qui l’accompagnaient. Malgré leur fatigue, ils continuaient à poursuivre l’ennemi. '
  '5':
  - type: text
    content: Arrivés à la ville de Soukkoth
  - type: note
    content: A l’est du Jourdain (voir Gn 33.17). Cette ville devait être importante vu le nombre de ses chefs et responsables (v. 14).
  - type: text
    content: ', Gédéon dit à ses habitants : Donnez, je vous prie, des miches de pain aux hommes qui m’accompagnent, car ils sont épuisés et je suis à la poursuite des deux rois madianites Zébah et Tsalmounna.'
  '6':
  - type: text
    content: 'Mais les chefs de Soukkoth lui répondirent : Tiens-tu déjà Zébah et Tsalmounna en ton pouvoir pour que nous donnions du pain à ta troupe ?'
  '7':
  - type: text
    content: – Eh bien, riposta Gédéon, quand l’Eternel aura livré Zébah et Tsalmounna en mon pouvoir, je vous fouetterai avec des chardons et des épines du désert !
  '8':
  - type: text
    content: De là, Gédéon se rendit à Penouel
  - type: note
    content: Le lieu où Jacob avait lutté avec Dieu (nommé Péniel dans Gn 32.30-31) à 8 kilomètres de Soukkoth.
  - type: text
    content: ' où il adressa la même demande aux habitants. Il reçut la même réponse qu’à Soukkoth '
  '9':
  - type: text
    content: 'et déclara aux gens de Penouel : Quand je repasserai, une fois le combat terminé, je démolirai cette tour.'
