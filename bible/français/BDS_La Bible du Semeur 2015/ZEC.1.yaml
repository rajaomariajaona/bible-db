document_id: ZEC.1,21
type_code: fra
verses:
  '1':
  - type: heading
    content: Le livre des visions
  - type: heading
    content: 'L’alliance reste établie : Revenez à moi'
  - type: text
    content: Au huitième mois de la deuxième année du règne de Darius
  - type: note
    content: En octobre-novembre 520 av. J.-C., deux mois après qu’Aggée a commencé à prophétiser (voir Ag 1.1). Sur Darius, voir Ag 1.1 et note.
  - type: text
    content: ', l’Eternel adressa la parole à Zacharie, le prophète'
  - type: note
    content: Sur Zacharie, voir Esd 5.1 ; 6.14 ; Né 12.4, 16.
  - type: text
    content: ', fils de Barachie et petit-fils d’Iddo, en ces termes :'
  '10':
  - type: text
    content: 'Et l’individu qui se tenait parmi les myrtes intervint en disant : Ce sont les coursiers que l’Eternel a envoyés pour parcourir la terre.'
  '11':
  - type: text
    content: 'Alors les cavaliers s’adressèrent à l’ange de l’Eternel qui se tenait parmi les myrtes, et lui firent ce rapport : Nous venons de parcourir la terre et nous avons constaté qu’elle est toute tranquille et calme.'
  '12':
  - type: text
    content: 'Là-dessus, l’ange de l’Eternel s’exclama : Seigneur des armées célestes, voilà soixante-dix ans'
  - type: note
    content: Voir Jr 25.11 ; 29.10.
  - type: text
    content: ' que tu es irrité contre Jérusalem et contre les villes de Juda. Jusques à quand tarderas-tu à les prendre en pitié'
  - type: note
    content: Réminiscence en Ap 6.10.
  - type: text
    content: '  ?'
  '13':
  - type: text
    content: Alors l’Eternel répondit à l’ange qui me parlait par des paroles bienveillantes et des paroles de consolation.
  '14':
  - type: text
    content: 'L’ange qui me parlait me dit : Proclame ces paroles : Voici ce que déclare le Seigneur des armées célestes : J’éprouve pour Jérusalem et pour Sion un amour passionné. '
  '15':
  - type: text
    content: 'Et je suis saisi d’une violente indignation contre les peuples ennemis qui vivent dans la tranquillité. Car je n’étais qu’un peu irrité contre mon peuple, mais eux, ils ont accru son malheur. '
  '16':
  - type: text
    content: 'C’est pourquoi voici ce que dit l’Eternel : Je me tourne vers Jérusalem avec compassion. Mon temple y sera rebâti – le Seigneur des armées célestes le déclare – et l’on étendra le cordeau d’arpenteur sur Jérusalem.'
  '17':
  - type: text
    content: 'Proclame encore ce message : Voici ce que déclare le Seigneur des armées célestes : Mes villes déborderont de nouveau de prospérité, l’Eternel consolera de nouveau Sion et choisira de nouveau Jérusalem.'
  '2':
  - type: text
    content: 'L’Eternel s’est violemment irrité contre vos pères. '
  '3':
  - type: text
    content: 'Dis à ce peuple : Voici ce que déclare le Seigneur des armées célestes : Revenez à moi, dit le Seigneur des armées célestes, et je reviendrai à vous, a dit le Seigneur des armées célestes. '
  '4':
  - type: text
    content: 'Ne faites pas comme vos ancêtres, que les prophètes d’autrefois ont exhortés en leur disant : « Voici ce que déclare le Seigneur des armées célestes : Abandonnez votre mauvaise conduite et renoncez à vos mauvaises actions. » Mais vos ancêtres n’ont pas écouté, ils n’ont pas prêté attention à mes paroles, l’Eternel le déclare.'
  '5':
  - type: text
    content: 'Vos ancêtres où sont-ils à présent ? Et les prophètes, sont-ils toujours en vie ? '
  '6':
  - type: text
    content: 'Or mes paroles et mes lois que j’avais ordonné à mes serviteurs les prophètes de leur transmettre, n’ont-elles pas été suivies d’effet pour vos pères ? Alors ils ont changé d’attitude et ils ont reconnu : « Oui, le Seigneur des armées célestes nous a traités comme il avait résolu de le faire, comme le méritaient notre conduite et nos actes. »'
  - type: heading
    content: Les huit visions nocturnes
  - type: heading
    content: Les quatre cavaliers
  '7':
  - type: text
    content: La deuxième année du règne de Darius, au vingt-quatrième jour du onzième mois, le mois de Shebath
  - type: note
    content: Le 15 février 519 av. J.-C. Shebath est un nom de mois babylonien.
  - type: text
    content: ', la parole de l’Eternel fut adressée à Zacharie le prophète, fils de Barachie et petit-fils d’Iddo.'
  '8':
  - type: text
    content: Cette nuit j’ai vu, dans une vision, un cavalier monté sur un cheval roux. Il se tenait parmi les myrtes
  - type: note
    content: Arbustes qui restent toujours verts, croissant dans les régions méditerranéennes surtout dans les fonds de vallées (voir Es 41.19 ; 55.13).
  - type: text
    content: ' dans les profondeurs, et derrière lui, il y avait d’autres chevaux : des roux, des gris-verts et des blancs'
  - type: note
    content: Pour les v. 8-11, voir Ap 6.1-8.
  - type: text
    content: '. '
  '9':
  - type: text
    content: 'Je demandai alors : Mon seigneur, que représentent-ils ?'
  - type: text
    content: 'L’ange qui me parlait répondit : Je vais te montrer ce qu’ils représentent.'
