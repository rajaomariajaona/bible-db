document_id: ECC.5,21
type_code: fra
verses:
  '1':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Ne te presse pas d’ouvrir la bouche et ne te laisse pas entraîner par ton cœur à formuler hâtivement une parole en présence de Dieu, car Dieu est au ciel, et toi tu es sur la terre. Que tes propos soient donc peu nombreux. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: Plus on possède de biens, plus se multiplient les profiteurs. Et quel avantage en tire leur possesseur si ce n’est le spectacle que lui offrent ces gens ?
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: Doux est le sommeil du travailleur, qu’il ait peu ou beaucoup à manger, mais l’abondance du riche l’empêche de dormir.
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'J’ai vu sous le soleil une terrible calamité : il arrive que les richesses conservées par un homme fassent son malheur. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'Qu’elles viennent à se perdre à cause de quelque mauvaise affaire, et il ne lui en reste rien lorsqu’il met un fils au monde. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'Il est sorti nu du sein de sa mère, et il partira comme il est venu, sans emporter dans ses mains une miette du fruit de son labeur. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'Qu’il reparte comme il était venu est aussi une terrible calamité. Quel avantage a-t-il donc à trimer ainsi pour du vent ? '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: Sa vie durant, ses jours s’écoulent bien sombres, pleins de chagrins, de souffrances et d’amertume.
  - type: usfm
    marker: s2
    children:
    - type: text
      text: 'Conclusion : Jouis de la vie que Dieu te donne'
    marker-yv: yv-h
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'Voici ce que j’ai considéré comme bon pour ma part : il est approprié pour l’homme de manger, de boire et de goûter au bonheur au milieu de tout le labeur qui lui donne tant de peine sous le soleil, pendant les jours que Dieu lui donne à vivre ; c’est là sa part. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'En effet, si Dieu donne à un homme des richesses et des biens, et s’il lui accorde la possibilité d’en profiter, d’en retirer sa part et de trouver de la joie au milieu de son labeur, c’est un don de Dieu. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: Ainsi cet homme ne s’appesantit pas sur sa vie
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '5.19 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Autre traduction : '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: ne réfléchit pas à la brièveté de sa vie.
      marker-yv: yv-n
    - type: text
      text: ' puisque Dieu le tient occupé à la joie'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '5.19 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'D’après les versions anciennes. D’autres comprennent : '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: Dieu lui répond par la joie.
      marker-yv: yv-n
    - type: text
      text: ' qui remplit son cœur.'
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: En effet, de même que les rêves naissent de la multitude des occupations, de même un flot abondant de paroles engendre des propos inconsidérés.
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: Si tu as fait un vœu à Dieu, accomplis-le sans tarder
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '5.3 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Pour les règles régissant les vœux, voir Dt 23.22-24 ; 1 S 1.11, 24-28.
      marker-yv: yv-n
    - type: text
      text: ', car les insensés déplaisent à Dieu. Ce que tu as promis, tiens-le. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: Il vaut mieux ne pas faire de vœu qu’en faire et ne pas s’en acquitter.
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: Ne laisse pas tes paroles te charger d’une faute et ne va pas dire au représentant de Dieu
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '5.5 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: C’est-à-dire le prêtre chargé de présenter à Dieu les vœux des fidèles (
        - type: usfm
          marker: ref
          children:
          - type: text
            text: Ml 2.7
        - type: text
          text: ).
      marker-yv: yv-n
    - type: text
      text: '  : « Mon vœu était une erreur. » Pourquoi irriter Dieu par tes paroles et faire échouer tes entreprises ? '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: C’est pourquoi, là où il y a abondance de rêves et multiplication de paroles légères
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '5.6 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Autre traduction : '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: Car beaucoup de vaines rêveries aboutissent à beaucoup de paroles en l’air.
      marker-yv: yv-n
    - type: text
      text: ', crains plutôt Dieu.'
  - type: usfm
    marker: s2
    children:
    - type: text
      text: La hiérarchie oppressive
    marker-yv: yv-h
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: Si tu vois dans une région que les pauvres sont opprimés, que la justice et le droit sont bafoués, ne t’étonne pas trop de la chose, car chaque dirigeant dépend du pouvoir
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '5.7 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'L’hébreu peut signifier deux choses : soit que le dirigeant subordonné est couvert par son supérieur, soit qu’il est soumis aux pressions exercées par son supérieur.'
      marker-yv: yv-n
    - type: text
      text: ' d’un supérieur, et au-dessus d’eux, il y a encore des supérieurs hiérarchiques. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'Mais malgré tout, ceci demeure dans l’intérêt du pays : qu’au profit de l’agriculture, on se soumette au roi'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '5.8 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Autres traductions : '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'qu’il y ait un roi au service de l’agriculture ; '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'ou bien : '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: le roi est lui aussi dépendant de l’agriculture.
      marker-yv: yv-n
    - type: text
      text: .
  - type: usfm
    marker: s2
    children:
    - type: text
      text: Sur la richesse
    marker-yv: yv-h
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: Qui aime l’argent n’en aura jamais assez, et qui se complaît dans l’abondance ne sera jamais satisfait de ses revenus. Cela encore est dérisoire.
