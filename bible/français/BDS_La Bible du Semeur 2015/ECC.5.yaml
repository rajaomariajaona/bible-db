document_id: ECC.5,21
type_code: fra
verses:
  '1':
  - type: text
    content: 'Ne te presse pas d’ouvrir la bouche et ne te laisse pas entraîner par ton cœur à formuler hâtivement une parole en présence de Dieu, car Dieu est au ciel, et toi tu es sur la terre. Que tes propos soient donc peu nombreux. '
  '10':
  - type: text
    content: Plus on possède de biens, plus se multiplient les profiteurs. Et quel avantage en tire leur possesseur si ce n’est le spectacle que lui offrent ces gens ?
  '11':
  - type: text
    content: Doux est le sommeil du travailleur, qu’il ait peu ou beaucoup à manger, mais l’abondance du riche l’empêche de dormir.
  '12':
  - type: text
    content: 'J’ai vu sous le soleil une terrible calamité : il arrive que les richesses conservées par un homme fassent son malheur. '
  '13':
  - type: text
    content: 'Qu’elles viennent à se perdre à cause de quelque mauvaise affaire, et il ne lui en reste rien lorsqu’il met un fils au monde. '
  '14':
  - type: text
    content: 'Il est sorti nu du sein de sa mère, et il partira comme il est venu, sans emporter dans ses mains une miette du fruit de son labeur. '
  '15':
  - type: text
    content: 'Qu’il reparte comme il était venu est aussi une terrible calamité. Quel avantage a-t-il donc à trimer ainsi pour du vent ? '
  '16':
  - type: text
    content: Sa vie durant, ses jours s’écoulent bien sombres, pleins de chagrins, de souffrances et d’amertume.
  - type: heading
    content: 'Conclusion : Jouis de la vie que Dieu te donne'
  '17':
  - type: text
    content: 'Voici ce que j’ai considéré comme bon pour ma part : il est approprié pour l’homme de manger, de boire et de goûter au bonheur au milieu de tout le labeur qui lui donne tant de peine sous le soleil, pendant les jours que Dieu lui donne à vivre ; c’est là sa part. '
  '18':
  - type: text
    content: 'En effet, si Dieu donne à un homme des richesses et des biens, et s’il lui accorde la possibilité d’en profiter, d’en retirer sa part et de trouver de la joie au milieu de son labeur, c’est un don de Dieu. '
  '19':
  - type: text
    content: Ainsi cet homme ne s’appesantit pas sur sa vie
  - type: note
    content: 'Autre traduction : ne réfléchit pas à la brièveté de sa vie.'
  - type: text
    content: ' puisque Dieu le tient occupé à la joie'
  - type: note
    content: 'D’après les versions anciennes. D’autres comprennent : Dieu lui répond par la joie.'
  - type: text
    content: ' qui remplit son cœur.'
  '2':
  - type: text
    content: En effet, de même que les rêves naissent de la multitude des occupations, de même un flot abondant de paroles engendre des propos inconsidérés.
  '3':
  - type: text
    content: Si tu as fait un vœu à Dieu, accomplis-le sans tarder
  - type: note
    content: Pour les règles régissant les vœux, voir Dt 23.22-24 ; 1 S 1.11, 24-28.
  - type: text
    content: ', car les insensés déplaisent à Dieu. Ce que tu as promis, tiens-le. '
  '4':
  - type: text
    content: Il vaut mieux ne pas faire de vœu qu’en faire et ne pas s’en acquitter.
  '5':
  - type: text
    content: Ne laisse pas tes paroles te charger d’une faute et ne va pas dire au représentant de Dieu
  - type: note
    content: C’est-à-dire le prêtre chargé de présenter à Dieu les vœux des fidèles (Ml 2.7).
  - type: text
    content: '  : « Mon vœu était une erreur. » Pourquoi irriter Dieu par tes paroles et faire échouer tes entreprises ? '
  '6':
  - type: text
    content: C’est pourquoi, là où il y a abondance de rêves et multiplication de paroles légères
  - type: note
    content: 'Autre traduction : Car beaucoup de vaines rêveries aboutissent à beaucoup de paroles en l’air.'
  - type: text
    content: ', crains plutôt Dieu.'
  - type: heading
    content: La hiérarchie oppressive
  '7':
  - type: text
    content: Si tu vois dans une région que les pauvres sont opprimés, que la justice et le droit sont bafoués, ne t’étonne pas trop de la chose, car chaque dirigeant dépend du pouvoir
  - type: note
    content: 'L’hébreu peut signifier deux choses : soit que le dirigeant subordonné est couvert par son supérieur, soit qu’il est soumis aux pressions exercées par son supérieur.'
  - type: text
    content: ' d’un supérieur, et au-dessus d’eux, il y a encore des supérieurs hiérarchiques. '
  '8':
  - type: text
    content: 'Mais malgré tout, ceci demeure dans l’intérêt du pays : qu’au profit de l’agriculture, on se soumette au roi'
  - type: note
    content: 'Autres traductions : qu’il y ait un roi au service de l’agriculture ; ou bien : le roi est lui aussi dépendant de l’agriculture.'
  - type: text
    content: .
  - type: heading
    content: Sur la richesse
  '9':
  - type: text
    content: Qui aime l’argent n’en aura jamais assez, et qui se complaît dans l’abondance ne sera jamais satisfait de ses revenus. Cela encore est dérisoire.
