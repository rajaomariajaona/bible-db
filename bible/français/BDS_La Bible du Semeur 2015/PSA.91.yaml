document_id: PSA.91
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Un refuge sûr
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Qui s’abrite auprès du Très-Haut,
- type: usfm
  marker: q1
  children:
  - type: text
    text: repose sous la protection ╵du Tout-Puissant.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Je dis à l’Eternel
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '91.2 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'L’ancienne version grecque a : '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: il dira.
    marker-yv: yv-n
  - type: text
    text: '  : ╵« Tu es mon refuge et ma forteresse,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: mon Dieu en qui je me confie ! »
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: C’est lui qui te délivre du filet ╵de l’oiseleur,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et de la peste qui fait des ravages.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Il te couvre sous son plumage,
- type: usfm
  marker: q1
  children:
  - type: text
    text: tu es en sécurité sous son aile,
- type: usfm
  marker: q1
  children:
  - type: text
    text: sa fidélité te protège ╵comme un grand bouclier.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Tu n’as donc pas à craindre ╵les terreurs de la nuit,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ni les flèches qui volent ╵dans la journée,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: ou bien la peste ╵qui rôde dans l’obscurité,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ou encore le coup fatal ╵qui frappe à l’heure de midi.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Que mille tombent à côté de toi,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et dix mille à ta droite,
- type: usfm
  marker: q1
  children:
  - type: text
    text: toi, tu ne seras pas atteint.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Il te suffira de regarder de tes yeux
- type: usfm
  marker: q1
  children:
  - type: text
    text: pour constater ╵la rétribution des méchants.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Oui, tu es mon refuge ╵ô Eternel !
- type: usfm
  marker: q1
  children:
  - type: text
    text: Si toi, tu fais ╵du Très-Haut ton abri,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: aucun malheur ne t’atteindra,
- type: usfm
  marker: q1
  children:
  - type: text
    text: nulle calamité ╵n’approchera de ta demeure ;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: car à ses anges, ╵il donnera des ordres à ton sujet
- type: usfm
  marker: q1
  children:
  - type: text
    text: pour qu’ils te protègent sur tes chemins
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '91.11 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Les v. 11-12 ont été cités par Satan à Jésus lors de la tentation (Mt 4.6 ; Lc 4.10-11). Sur les anges chargés de veiller sur les hommes, voir Gn 24.7 ; Ex 23.20 ; Ps 34.8.
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Ils te porteront sur leurs mains,
- type: usfm
  marker: q1
  children:
  - type: text
    text: de peur que ton pied ne heurte une pierre.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Tu pourras marcher sur le lion ╵et la vipère,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et piétiner ╵le jeune lion et le serpent
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '91.13 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Voir '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Lc 10.19
        metadata:
          usfm: LUK.10.19
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Oui, celui qui m’est attaché, ╵je le délivrerai
- type: usfm
  marker: q1
  children:
  - type: text
    text: et je protègerai ╵celui qui entretient ╵une relation avec moi.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Lui, il m’invoquera, ╵et je lui répondrai,
- type: usfm
  marker: q1
  children:
  - type: text
    text: je serai avec lui ╵au jour de la détresse,
- type: usfm
  marker: q1
  children:
  - type: text
    text: je le délivrerai ╵et je l’honorerai,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: je le comblerai d’une longue vie
- type: usfm
  marker: q1
  children:
  - type: text
    text: et lui ferai expérimenter mon salut.
