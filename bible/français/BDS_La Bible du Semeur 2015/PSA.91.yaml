document_id: PSA.91,21
type_code: fra
verses:
  '1':
  - type: heading
    content: Un refuge sûr
  - type: text
    content: Qui s’abrite auprès du Très-Haut,
  - type: text
    content: repose sous la protection ╵du Tout-Puissant.
  '10':
  - type: text
    content: aucun malheur ne t’atteindra,
  - type: text
    content: nulle calamité ╵n’approchera de ta demeure ;
  '11':
  - type: text
    content: car à ses anges, ╵il donnera des ordres à ton sujet
  - type: text
    content: pour qu’ils te protègent sur tes chemins
  - type: note
    content: Les v. 11-12 ont été cités par Satan à Jésus lors de la tentation (Mt 4.6 ; Lc 4.10-11). Sur les anges chargés de veiller sur les hommes, voir Gn 24.7 ; Ex 23.20 ; Ps 34.8.
  - type: text
    content: .
  '12':
  - type: text
    content: Ils te porteront sur leurs mains,
  - type: text
    content: de peur que ton pied ne heurte une pierre.
  '13':
  - type: text
    content: Tu pourras marcher sur le lion ╵et la vipère,
  - type: text
    content: et piétiner ╵le jeune lion et le serpent
  - type: note
    content: Voir Lc 10.19.
  - type: text
    content: .
  '14':
  - type: text
    content: Oui, celui qui m’est attaché, ╵je le délivrerai
  - type: text
    content: et je protègerai ╵celui qui entretient ╵une relation avec moi.
  '15':
  - type: text
    content: Lui, il m’invoquera, ╵et je lui répondrai,
  - type: text
    content: je serai avec lui ╵au jour de la détresse,
  - type: text
    content: je le délivrerai ╵et je l’honorerai,
  '16':
  - type: text
    content: je le comblerai d’une longue vie
  - type: text
    content: et lui ferai expérimenter mon salut.
  '2':
  - type: text
    content: Je dis à l’Eternel
  - type: note
    content: 'L’ancienne version grecque a : il dira.'
  - type: text
    content: '  : ╵« Tu es mon refuge et ma forteresse,'
  - type: text
    content: mon Dieu en qui je me confie ! »
  '3':
  - type: text
    content: C’est lui qui te délivre du filet ╵de l’oiseleur,
  - type: text
    content: et de la peste qui fait des ravages.
  '4':
  - type: text
    content: Il te couvre sous son plumage,
  - type: text
    content: tu es en sécurité sous son aile,
  - type: text
    content: sa fidélité te protège ╵comme un grand bouclier.
  '5':
  - type: text
    content: Tu n’as donc pas à craindre ╵les terreurs de la nuit,
  - type: text
    content: ni les flèches qui volent ╵dans la journée,
  '6':
  - type: text
    content: ou bien la peste ╵qui rôde dans l’obscurité,
  - type: text
    content: ou encore le coup fatal ╵qui frappe à l’heure de midi.
  '7':
  - type: text
    content: Que mille tombent à côté de toi,
  - type: text
    content: et dix mille à ta droite,
  - type: text
    content: toi, tu ne seras pas atteint.
  '8':
  - type: text
    content: Il te suffira de regarder de tes yeux
  - type: text
    content: pour constater ╵la rétribution des méchants.
  '9':
  - type: text
    content: Oui, tu es mon refuge ╵ô Eternel !
  - type: text
    content: Si toi, tu fais ╵du Très-Haut ton abri,
