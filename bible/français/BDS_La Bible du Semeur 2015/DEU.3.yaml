document_id: DEU.3,21
type_code: fra
verses:
  '1':
  - type: text
    content: 'Nous avons changé de direction et pris la route du Basan ; mais Og, roi du Basan, a marché contre nous avec toute son armée et nous a attaqués à Edréi. '
  '10':
  - type: text
    content: 'Nous avons pris toutes les villes du Haut-Plateau, tout le Galaad et tout le Basan jusqu’aux villes de Salka et d’Edréi qui faisaient partie du royaume d’Og en Basan. '
  '11':
  - type: text
    content: Og, roi du Basan, était le seul survivant des Rephaïm
  - type: note
    content: Race de géants en voie d’extinction au moment de la conquête de Canaan.
  - type: text
    content: . Son lit
  - type: note
    content: 'Certains comprennent : cercueil.'
  - type: text
    content: ', un lit en fer, qui se trouve toujours dans la ville ammonite de Rabbath, faisait plus de quatre mètres de long et près de deux mètres de large'
  - type: note
    content: 'Hébreu : neuf coudées de long et quatre de larges, en coudées d’homme, c’est-à-dire ordinaires.'
  - type: text
    content: .
  - type: heading
    content: Le partage du pays à l’est du Jourdain
  '12':
  - type: text
    content: 'Nous avons conquis en ce temps-là tout ce pays. J’ai donné aux tribus de Ruben et de Gad le territoire qui s’étend depuis Aroër sur le torrent de l’Arnon jusqu’à la moitié de la région montagneuse de Galaad avec ses villes. '
  '13':
  - type: text
    content: 'J’ai attribué à la demi-tribu de Manassé le reste de Galaad et tout le royaume d’Og en Basan, c’est-à-dire toute la région de l’Argob, avec tout le Basan ; c’est ce qu’on appelait le pays des Rephaïm. '
  '14':
  - type: text
    content: 'Yaïr, un descendant de Manassé, conquit toute la contrée d’Argob, jusqu’à la frontière des Gueshouriens et des Maakathiens, il donna son nom aux villages du Basan qu’on appelle jusqu’à ce jour villages de Yaïr. '
  '15':
  - type: text
    content: J’ai assigné Galaad à Makir
  - type: note
    content: Fils de Manassé.
  - type: text
    content: '. '
  '16':
  - type: text
    content: 'Et j’ai attribué aux tribus de Ruben et de Gad une partie de Galaad s’étendant jusqu’à la vallée de l’Arnon, dont le lit sert de frontière, et jusqu’au torrent du Yabboq, qui sert de frontière aux Ammonites, '
  '17':
  - type: text
    content: ainsi que la plaine jusqu’au Jourdain qui sert de frontière depuis Kinnéreth jusqu’à la mer Morte, la mer Salée, au pied du versant oriental du Pisga.
  '18':
  - type: text
    content: 'En même temps, je leur ai donné ces ordres : « L’Eternel votre Dieu vous a donné ce pays en possession. Mais tous ceux d’entre vous qui sont aptes à porter les armes, vous marcherez en tête de vos frères israélites en tenue de combat'
  - type: note
    content: Pour les v. 18-20, voir Jos 1.12-15.
  - type: text
    content: '. '
  '19':
  - type: text
    content: 'Vos femmes seulement, vos enfants et votre nombreux bétail resteront dans les villes que je vous ai données '
  '2':
  - type: text
    content: 'Alors l’Eternel m’a dit : « N’aie pas peur de lui, car je te le livre avec toute son armée et tout son pays. Tu le traiteras comme tu as traité Sihôn, roi des Amoréens, qui habitait à Heshbôn. » '
  '20':
  - type: text
    content: jusqu’à ce que l’Eternel ait accordé une existence paisible à vos frères comme à vous, et qu’ils aient pris possession, eux aussi, du pays que l’Eternel votre Dieu leur donne de l’autre côté du Jourdain ; puis vous retournerez chacun dans le territoire que je vous ai donné. »
  '21':
  - type: text
    content: 'A cette même époque, j’ai dit à Josué : « Tu as vu comment l’Eternel votre Dieu a traité ces deux rois ; il traitera de même tous les royaumes dans lesquels tu vas passer. '
  '22':
  - type: text
    content: Vous n’en aurez pas peur, car l’Eternel, votre Dieu, combat lui-même pour vous. »
  - type: heading
    content: Moïse n’entrera pas au pays promis
  '23':
  - type: text
    content: Je demandai alors une faveur à l’Eternel
  - type: note
    content: Pour les v. 23-27, voir Nb 27.12-14 ; Dt 32.48-52.
  - type: text
    content: '  : '
  '24':
  - type: text
    content: '« Seigneur Eternel, lui dis-je, tu as commencé à montrer à ton serviteur ta grandeur et ta puissance ; et quel dieu, dans le ciel et sur la terre, pourrait accomplir de telles œuvres, et avec autant de puissance ? '
  '25':
  - type: text
    content: Permets-moi, je te prie, de traverser le Jourdain
  - type: note
    content: Par rapport aux territoires de ces tribus, c’est-à-dire à l’ouest du Jourdain.
  - type: text
    content: ' pour voir ce bon pays qui se trouve de l’autre côté, cette belle contrée montagneuse et le Liban. » '
  '26':
  - type: text
    content: 'Mais l’Eternel s’était mis en colère contre moi à cause de vous et il ne voulut pas me l’accorder. « Assez ! me dit-il, ne me parle plus de cette affaire. '
  '27':
  - type: text
    content: 'Monte au sommet du Pisga et promène tes regards vers l’ouest, le nord, le sud et l’est, et contemple le pays de tes yeux, mais tu ne passeras pas le Jourdain. '
  '28':
  - type: text
    content: Donne tes ordres à Josué, encourage-le et affermis-le, car c’est lui qui conduira ce peuple et qui le mettra en possession du pays que tu vas contempler. »
  '29':
  - type: text
    content: Nous sommes donc restés dans la vallée vis-à-vis de Beth-Peor.
  '3':
  - type: text
    content: 'Ainsi l’Eternel notre Dieu nous livra aussi Og, roi du Basan, avec toute son armée, et nous l’avons battu jusqu’à ce qu’il ne lui reste plus de survivant. '
  '4':
  - type: text
    content: 'Puis nous nous sommes emparés de toutes ses villes ; il y en avait soixante dans toute la contrée d’Argob qui constituaient le royaume d’Og en Basan ; nous les avons prises toutes sans exception. '
  '5':
  - type: text
    content: 'Toutes ces villes étaient fortifiées, entourées de hautes murailles et munies de portes verrouillées de barres de fer. En plus, nous avons pris un très grand nombre de villages non fortifiés. '
  '6':
  - type: text
    content: 'Et nous en avons complètement exterminé la population pour la vouer à l’Eternel, hommes, femmes et enfants, comme nous l’avions fait à l’égard du royaume de Sihôn, roi de Heshbôn. '
  '7':
  - type: text
    content: Mais nous nous sommes réservé tout le bétail et le butin pris dans les villes.
  '8':
  - type: text
    content: 'Nous avons donc conquis à cette époque-là le pays des deux rois amoréens qui se trouvaient à l’est du Jourdain, depuis le torrent de l’Arnon jusqu’au mont Hermon. '
  '9':
  - type: text
    content: (Les Sidoniens nomment le mont Hermon Siriôn, et les Amoréens l’appellent Senir
  - type: note
    content: Le mont Hermon, sommet de l’Anti-Liban (2 860 mètres) couvert de neige une grande partie de l’année. Le Jourdain y prend sa source. Les noms Siriôn et Senir ont été retrouvés dans des documents cananéens et assyriens de l’époque.
  - type: text
    content: '.) '
