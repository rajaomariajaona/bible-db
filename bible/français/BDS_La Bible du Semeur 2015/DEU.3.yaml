document_id: DEU.3,21
type_code: fra
verses:
  '1':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Nous avons changé de direction et pris la route du Basan ; mais Og, roi du Basan, a marché contre nous avec toute son armée et nous a attaqués à Edréi. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Nous avons pris toutes les villes du Haut-Plateau, tout le Galaad et tout le Basan jusqu’aux villes de Salka et d’Edréi qui faisaient partie du royaume d’Og en Basan. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Og, roi du Basan, était le seul survivant des Rephaïm
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '3.11 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Race de géants en voie d’extinction au moment de la conquête de Canaan.
      marker-yv: yv-n
    - type: text
      text: . Son lit
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '3.11 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Certains comprennent : '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: cercueil.
      marker-yv: yv-n
    - type: text
      text: ', un lit en fer, qui se trouve toujours dans la ville ammonite de Rabbath, faisait plus de quatre mètres de long et près de deux mètres de large'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '3.11 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Hébreu : neuf coudées de long et quatre de larges, en coudées d’homme, c’est-à-dire ordinaires.'
      marker-yv: yv-n
    - type: text
      text: .
  - type: usfm
    marker: s2
    children:
    - type: text
      text: Le partage du pays à l’est du Jourdain
    marker-yv: yv-h
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Nous avons conquis en ce temps-là tout ce pays. J’ai donné aux tribus de Ruben et de Gad le territoire qui s’étend depuis Aroër sur le torrent de l’Arnon jusqu’à la moitié de la région montagneuse de Galaad avec ses villes. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'J’ai attribué à la demi-tribu de Manassé le reste de Galaad et tout le royaume d’Og en Basan, c’est-à-dire toute la région de l’Argob, avec tout le Basan ; c’est ce qu’on appelait le pays des Rephaïm. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Yaïr, un descendant de Manassé, conquit toute la contrée d’Argob, jusqu’à la frontière des Gueshouriens et des Maakathiens, il donna son nom aux villages du Basan qu’on appelle jusqu’à ce jour villages de Yaïr. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: J’ai assigné Galaad à Makir
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '3.15 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Fils de Manassé.
      marker-yv: yv-n
    - type: text
      text: '. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Et j’ai attribué aux tribus de Ruben et de Gad une partie de Galaad s’étendant jusqu’à la vallée de l’Arnon, dont le lit sert de frontière, et jusqu’au torrent du Yabboq, qui sert de frontière aux Ammonites, '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ainsi que la plaine jusqu’au Jourdain qui sert de frontière depuis Kinnéreth jusqu’à la mer Morte, la mer Salée, au pied du versant oriental du Pisga.
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'En même temps, je leur ai donné ces ordres : « L’Eternel votre Dieu vous a donné ce pays en possession. Mais tous ceux d’entre vous qui sont aptes à porter les armes, vous marcherez en tête de vos frères israélites en tenue de combat'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '3.18 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Pour les v. 18-20, voir '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: Jos 1.12-15
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: '. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Vos femmes seulement, vos enfants et votre nombreux bétail resteront dans les villes que je vous ai données '
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Alors l’Eternel m’a dit : « N’aie pas peur de lui, car je te le livre avec toute son armée et tout son pays. Tu le traiteras comme tu as traité Sihôn, roi des Amoréens, qui habitait à Heshbôn. » '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: jusqu’à ce que l’Eternel ait accordé une existence paisible à vos frères comme à vous, et qu’ils aient pris possession, eux aussi, du pays que l’Eternel votre Dieu leur donne de l’autre côté du Jourdain ; puis vous retournerez chacun dans le territoire que je vous ai donné. »
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'A cette même époque, j’ai dit à Josué : « Tu as vu comment l’Eternel votre Dieu a traité ces deux rois ; il traitera de même tous les royaumes dans lesquels tu vas passer. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Vous n’en aurez pas peur, car l’Eternel, votre Dieu, combat lui-même pour vous. »
  - type: usfm
    marker: s2
    children:
    - type: text
      text: Moïse n’entrera pas au pays promis
    marker-yv: yv-h
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Je demandai alors une faveur à l’Eternel
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '3.23 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Pour les v. 23-27, voir Nb 27.12-14 ; Dt 32.48-52.
      marker-yv: yv-n
    - type: text
      text: '  : '
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '« Seigneur Eternel, lui dis-je, tu as commencé à montrer à ton serviteur ta grandeur et ta puissance ; et quel dieu, dans le ciel et sur la terre, pourrait accomplir de telles œuvres, et avec autant de puissance ? '
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Permets-moi, je te prie, de traverser le Jourdain
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '3.25 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Par rapport aux territoires de ces tribus, c’est-à-dire à l’ouest du Jourdain.
      marker-yv: yv-n
    - type: text
      text: ' pour voir ce bon pays qui se trouve de l’autre côté, cette belle contrée montagneuse et le Liban. » '
  '26':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Mais l’Eternel s’était mis en colère contre moi à cause de vous et il ne voulut pas me l’accorder. « Assez ! me dit-il, ne me parle plus de cette affaire. '
  '27':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Monte au sommet du Pisga et promène tes regards vers l’ouest, le nord, le sud et l’est, et contemple le pays de tes yeux, mais tu ne passeras pas le Jourdain. '
  '28':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Donne tes ordres à Josué, encourage-le et affermis-le, car c’est lui qui conduira ce peuple et qui le mettra en possession du pays que tu vas contempler. »
  '29':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Nous sommes donc restés dans la vallée vis-à-vis de Beth-Peor.
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ainsi l’Eternel notre Dieu nous livra aussi Og, roi du Basan, avec toute son armée, et nous l’avons battu jusqu’à ce qu’il ne lui reste plus de survivant. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Puis nous nous sommes emparés de toutes ses villes ; il y en avait soixante dans toute la contrée d’Argob qui constituaient le royaume d’Og en Basan ; nous les avons prises toutes sans exception. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Toutes ces villes étaient fortifiées, entourées de hautes murailles et munies de portes verrouillées de barres de fer. En plus, nous avons pris un très grand nombre de villages non fortifiés. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Et nous en avons complètement exterminé la population pour la vouer à l’Eternel, hommes, femmes et enfants, comme nous l’avions fait à l’égard du royaume de Sihôn, roi de Heshbôn. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Mais nous nous sommes réservé tout le bétail et le butin pris dans les villes.
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Nous avons donc conquis à cette époque-là le pays des deux rois amoréens qui se trouvaient à l’est du Jourdain, depuis le torrent de l’Arnon jusqu’au mont Hermon. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: (Les Sidoniens nomment le mont Hermon Siriôn, et les Amoréens l’appellent Senir
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '3.9 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Le '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'mont Hermon, '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'sommet de l’Anti-Liban (2 860 mètres) couvert de neige une grande partie de l’année. Le Jourdain y prend sa source. Les noms '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Siriôn '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'et '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'Senir '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ont été retrouvés dans des documents cananéens et assyriens de l’époque.
      marker-yv: yv-n
    - type: text
      text: '.) '
