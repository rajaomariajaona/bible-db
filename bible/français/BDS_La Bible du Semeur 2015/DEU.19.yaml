document_id: DEU.19
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Les atteintes aux personnes
  marker-yv: yv-h
- type: usfm
  marker: s2
  children:
  - type: text
    text: Les meurtriers et les villes de refuge
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Lorsque l’Eternel votre Dieu aura fait disparaître les peuples dont il veut vous donner le pays, quand vous les aurez dépossédés et que vous serez établis dans leurs villes et dans leurs maisons, '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: vous mettrez à part trois villes au milieu du pays que l’Eternel votre Dieu vous donne en possession
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '19.2 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Trois villes avaient déjà été désignées dans le territoire conquis à l’est du Jourdain (
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 4.41-43
        metadata:
          usfm: DEU.4.41+DEU.4.42+DEU.4.43
      - type: text
        text: '). Il s’agit ici de trois autres villes à l’ouest du Jourdain pour arriver au nombre de six indiqué en '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Nb 35.13
        metadata:
          usfm: NUM.35.13
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Vous y ferez aboutir des routes pour qu’un meurtrier puisse y chercher refuge et vous partagerez en trois districts tout le territoire du pays que l’Eternel votre Dieu vous donne
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '19.3 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Voir Nb 35.9-34 ; Dt 4.41-43 ; Jos 20.
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Voici dans quel cas le meurtrier pourra se réfugier dans l’une de ces villes et y avoir la vie sauve : s’il a tué son prochain involontairement sans avoir jamais eu de haine contre lui auparavant. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Ce sera le cas, par exemple, s’il s’est rendu avec son camarade en forêt pour y couper du bois, et si pendant que sa main brandissait la hache pour abattre un arbre, le fer s’est détaché du manche et a touché son compagnon qui en est mort. Cet homme-là pourra s’enfuir dans l’une de ces villes et avoir la vie sauve. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Il ne faudrait pas que l’homme chargé de punir le crime le poursuive avec colère et, la distance jusqu’à la ville étant trop longue, le rattrape et le mette à mort alors que cet homme n’a pas mérité d’être mis à mort. En effet, il n’a jamais eu de haine contre celui qu’il a tué. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: C’est pourquoi je vous ordonne de mettre à part trois villes.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Et si l’Eternel votre Dieu agrandit votre territoire, comme il l’a promis à vos ancêtres, et qu’il vous donne tout le pays qu’il a promis de leur donner, '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'c’est-à-dire si vous obéissez fidèlement à tous ces commandements que je vous prescris aujourd’hui, en aimant l’Eternel votre Dieu et en suivant toujours ses voies, vous ajouterez encore trois villes aux premières. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: De cette manière, on évitera de mettre à mort des innocents dans le pays que l’Eternel votre Dieu vous donne en possession, car vous porteriez alors la responsabilité d’une telle mort.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Mais si un homme est animé de haine contre son prochain, s’il lui dresse des embûches, l’attaque et le frappe mortellement, puis va se réfugier dans l’une de ces villes, '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'les responsables de sa ville enverront quelqu’un le chercher et ils le livreront à celui qui est chargé de punir le crime, et il sera mis à mort. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Vous ne vous apitoierez pas sur lui, mais vous purifierez Israël du sang d’un innocent qui a été versé, et vous vous en trouverez bien.
- type: usfm
  marker: s2
  children:
  - type: text
    text: Le respect de la propriété foncière
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Lorsque vous serez établis dans le pays que l’Eternel votre Dieu vous donne en partage, vous ne déplacerez pas les bornes qui marquent les limites de la propriété de vos voisins qui auront été fixées par les premiers arrivés
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '19.14 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Les haies et les murs étaient généralement utilisés pour enclore les jardins ; les limites des champs étaient marquées par de simples pierres faciles à déplacer (voir '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '27.17'
        metadata:
          usfm: DEU.27.17
      - type: text
        text: ).
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: s2
  children:
  - type: text
    text: Les témoins d’un crime ou d’un délit
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: La déposition d’un seul témoin ne suffira pas pour établir la culpabilité d’un homme accusé d’un crime, d’un délit ou d’une faute quelle qu’elle soit, on ne pourra instruire l’affaire qu’après avoir entendu les déclarations de deux ou de trois témoins
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '19.15 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Voir Nb 35.30 ; Dt 17.6. Principe repris dans le Nouveau Testament : Mt 18.16 ; Jn 8.17 ; 2 Co 13.1 ; 1 Tm 5.19 ; Hé 10.28.'
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Si un témoin malveillant accuse quelqu’un d’un méfait, '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'les deux parties comparaîtront devant l’Eternel, devant les prêtres et les juges qui seront en fonction à ce moment-là. '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Les juges feront une enquête sérieuse. S’ils découvrent que le témoin a menti et qu’il a fait une fausse déposition contre son frère, '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'vous lui infligerez la peine qu’il voulait faire subir à celui-ci. Ainsi, vous ferez disparaître le mal du milieu de vous. '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Les autres, qui l’apprendront, en éprouveront de la crainte et l’on n’osera plus commettre un tel méfait parmi vous. '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Vous ne vous laisserez pas apitoyer, la règle sera : vie pour vie, œil pour œil, dent pour dent, main pour main et pied pour pied'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '19.21 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Voir Ex 21.23-25 ; Lv 24.19-20 ; Mt 5.38.
    marker-yv: yv-n
  - type: text
    text: .
