document_id: DEU.19,21
type_code: fra
verses:
  '1':
  - type: heading
    content: Les atteintes aux personnes
  - type: heading
    content: Les meurtriers et les villes de refuge
  - type: text
    content: 'Lorsque l’Eternel votre Dieu aura fait disparaître les peuples dont il veut vous donner le pays, quand vous les aurez dépossédés et que vous serez établis dans leurs villes et dans leurs maisons, '
  '10':
  - type: text
    content: De cette manière, on évitera de mettre à mort des innocents dans le pays que l’Eternel votre Dieu vous donne en possession, car vous porteriez alors la responsabilité d’une telle mort.
  '11':
  - type: text
    content: 'Mais si un homme est animé de haine contre son prochain, s’il lui dresse des embûches, l’attaque et le frappe mortellement, puis va se réfugier dans l’une de ces villes, '
  '12':
  - type: text
    content: 'les responsables de sa ville enverront quelqu’un le chercher et ils le livreront à celui qui est chargé de punir le crime, et il sera mis à mort. '
  '13':
  - type: text
    content: Vous ne vous apitoierez pas sur lui, mais vous purifierez Israël du sang d’un innocent qui a été versé, et vous vous en trouverez bien.
  - type: heading
    content: Le respect de la propriété foncière
  '14':
  - type: text
    content: Lorsque vous serez établis dans le pays que l’Eternel votre Dieu vous donne en partage, vous ne déplacerez pas les bornes qui marquent les limites de la propriété de vos voisins qui auront été fixées par les premiers arrivés
  - type: note
    content: Les haies et les murs étaient généralement utilisés pour enclore les jardins ; les limites des champs étaient marquées par de simples pierres faciles à déplacer (voir 27.17).
  - type: text
    content: .
  - type: heading
    content: Les témoins d’un crime ou d’un délit
  '15':
  - type: text
    content: La déposition d’un seul témoin ne suffira pas pour établir la culpabilité d’un homme accusé d’un crime, d’un délit ou d’une faute quelle qu’elle soit, on ne pourra instruire l’affaire qu’après avoir entendu les déclarations de deux ou de trois témoins
  - type: note
    content: 'Voir Nb 35.30 ; Dt 17.6. Principe repris dans le Nouveau Testament : Mt 18.16 ; Jn 8.17 ; 2 Co 13.1 ; 1 Tm 5.19 ; Hé 10.28.'
  - type: text
    content: .
  '16':
  - type: text
    content: 'Si un témoin malveillant accuse quelqu’un d’un méfait, '
  '17':
  - type: text
    content: 'les deux parties comparaîtront devant l’Eternel, devant les prêtres et les juges qui seront en fonction à ce moment-là. '
  '18':
  - type: text
    content: 'Les juges feront une enquête sérieuse. S’ils découvrent que le témoin a menti et qu’il a fait une fausse déposition contre son frère, '
  '19':
  - type: text
    content: 'vous lui infligerez la peine qu’il voulait faire subir à celui-ci. Ainsi, vous ferez disparaître le mal du milieu de vous. '
  '2':
  - type: text
    content: vous mettrez à part trois villes au milieu du pays que l’Eternel votre Dieu vous donne en possession
  - type: note
    content: Trois villes avaient déjà été désignées dans le territoire conquis à l’est du Jourdain (4.41-43). Il s’agit ici de trois autres villes à l’ouest du Jourdain pour arriver au nombre de six indiqué en Nb 35.13.
  - type: text
    content: '. '
  '20':
  - type: text
    content: 'Les autres, qui l’apprendront, en éprouveront de la crainte et l’on n’osera plus commettre un tel méfait parmi vous. '
  '21':
  - type: text
    content: 'Vous ne vous laisserez pas apitoyer, la règle sera : vie pour vie, œil pour œil, dent pour dent, main pour main et pied pour pied'
  - type: note
    content: Voir Ex 21.23-25 ; Lv 24.19-20 ; Mt 5.38.
  - type: text
    content: .
  '3':
  - type: text
    content: Vous y ferez aboutir des routes pour qu’un meurtrier puisse y chercher refuge et vous partagerez en trois districts tout le territoire du pays que l’Eternel votre Dieu vous donne
  - type: note
    content: Voir Nb 35.9-34 ; Dt 4.41-43 ; Jos 20.
  - type: text
    content: .
  '4':
  - type: text
    content: 'Voici dans quel cas le meurtrier pourra se réfugier dans l’une de ces villes et y avoir la vie sauve : s’il a tué son prochain involontairement sans avoir jamais eu de haine contre lui auparavant. '
  '5':
  - type: text
    content: 'Ce sera le cas, par exemple, s’il s’est rendu avec son camarade en forêt pour y couper du bois, et si pendant que sa main brandissait la hache pour abattre un arbre, le fer s’est détaché du manche et a touché son compagnon qui en est mort. Cet homme-là pourra s’enfuir dans l’une de ces villes et avoir la vie sauve. '
  '6':
  - type: text
    content: 'Il ne faudrait pas que l’homme chargé de punir le crime le poursuive avec colère et, la distance jusqu’à la ville étant trop longue, le rattrape et le mette à mort alors que cet homme n’a pas mérité d’être mis à mort. En effet, il n’a jamais eu de haine contre celui qu’il a tué. '
  '7':
  - type: text
    content: C’est pourquoi je vous ordonne de mettre à part trois villes.
  '8':
  - type: text
    content: 'Et si l’Eternel votre Dieu agrandit votre territoire, comme il l’a promis à vos ancêtres, et qu’il vous donne tout le pays qu’il a promis de leur donner, '
  '9':
  - type: text
    content: 'c’est-à-dire si vous obéissez fidèlement à tous ces commandements que je vous prescris aujourd’hui, en aimant l’Eternel votre Dieu et en suivant toujours ses voies, vous ajouterez encore trois villes aux premières. '
