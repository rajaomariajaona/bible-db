document_id: 2KI.3,21
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Le règne de Yoram sur Israël
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: Yoram, fils d’Achab, devint roi d’Israël à Samarie, la dix-huitième année du règne de Josaphat, roi de Juda. Il régna douze ans
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '3.1 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Voir 1.17 ; 1 R 15.24. Yoram régna de 852 à 841 av. J.-C. La 18
        - type: usfm
          marker: ord
          children:
          - type: text
            text: e
        - type: text
          text: ' année de Josaphat s’explique par la corégence de celui-ci avec son père Asa de 872 à 869. 852 est donc la 18'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: e
        - type: text
          text: ' année de son règne personnel (voir '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: '8.16'
        - type: text
          text: ).
      marker-yv: yv-n
    - type: text
      text: '. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Alors le roi d’Israël s’écria : Hélas ! Que ferons-nous ? L’Eternel nous a certainement attirés ici, nous les trois rois, pour nous livrer aux Moabites. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Mais Josaphat demanda : N’y a-t-il ici aucun prophète de l’Eternel par qui nous pourrions consulter l’Eternel ?'
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'L’un des officiers du roi d’Israël répondit : Il y a ici Elisée, fils de Shaphath, le serviteur d’Elie.'
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Josaphat déclara : En effet, cet homme-là reçoit la parole de l’Eternel.'
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Le roi d’Israël, Josaphat et le roi d’Edom se rendirent donc auprès de lui. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Mais Elisée apostropha le roi d’Israël : Qu’ai-je à faire avec toi ? Va donc trouver les prophètes de ton père et ceux de ta mère !'
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Alors le roi d’Israël lui dit : Mais non ! C’est certainement l’Eternel qui a attiré ces trois rois ici pour les livrer aux Moabites.'
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Elisée répondit : Aussi vrai que l’Eternel, le Dieu des armées célestes dont je suis le serviteur, est vivant, je t’assure que si ce n’était par égard pour Josaphat, roi de Juda, je ne te prêterais nulle attention ; je ne te regarderais même pas. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Maintenant, amenez-moi un joueur de harpe !
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Quand le harpiste se mit à jouer, l’Eternel se saisit d’Elisée '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'qui dit : Voici ce que déclare l’Eternel : « Creusez beaucoup de fosses dans le lit desséché de ce torrent ! '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Car l’Eternel vous le dit : ce ravin se remplira d’eau sans que vous voyiez ici ni vent ni pluie. Et vous aurez à boire vous, vos troupeaux et vos bêtes de somme. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Mais c’est encore peu de chose pour l’Eternel. Il vous donnera aussi la victoire sur les Moabites. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Vous attaquerez toutes leurs villes fortifiées et toutes les villes importantes, vous abattrez tous leurs arbres, vous boucherez toutes leurs sources d’eau et vous dévasterez tous leurs meilleurs terrains en les couvrant de pierres. »
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Il fit ce que l’Eternel considère comme mal, sans toutefois aller aussi loin que son père et sa mère
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '3.2 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Achab (voir '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: 1 R 16.29-33
        - type: text
          text: ) et Jézabel (voir 1 R 18.4 ; 19.1-2 ; 21.7-15).
      marker-yv: yv-n
    - type: text
      text: '. Il renversa la statue de Baal que son père avait fait ériger, '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Le lendemain matin, à l’heure de la présentation de l’offrande, de l’eau descendit du côté d’Edom et la contrée fut inondée. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Cependant, les Moabites, ayant appris que les trois rois venaient les attaquer, avaient mobilisé tous les hommes en âge de porter les armes et même ceux qui avaient passé l’âge, et avaient pris position sur la frontière. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Le matin, quand ils se levèrent, les soldats moabites virent en face d’eux des eaux rouges comme du sang, car le soleil se reflétait dans l’eau. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ils s’écrièrent : C’est du sang ! Certainement les rois ont tiré l’épée l’un contre l’autre, et ils se sont mutuellement entretués. A présent, Moabites, courons au pillage !'
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Et ils se précipitèrent sur le camp des Israélites ; mais ceux-ci surgirent devant eux et les battirent, puis les poursuivirent après les avoir mis en fuite. Ils pénétrèrent plus avant dans leur pays et leur infligèrent une lourde défaite. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ils détruisirent les villes, saccagèrent tous les champs cultivés en y jetant chacun sa pierre jusqu’à ce qu’ils en soient couverts, ils bouchèrent toutes les sources d’eau et abattirent tous les bons arbres. Finalement, seule la ville de Qir-Haréseth
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '3.25 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Ancienne capitale moabite appelée aussi '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'Qir-Harès '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: (
        - type: usfm
          marker: ref
          children:
          - type: text
            text: Es 16.11
        - type: text
          text: '), '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'Qir-Hérès '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: (
        - type: usfm
          marker: ref
          children:
          - type: text
            text: Jr 48.31
        - type: text
          text: ') ou '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'Qir-Moab '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: (
        - type: usfm
          marker: ref
          children:
          - type: text
            text: Es 15.1
        - type: text
          text: ) ; elle était située à 18 kilomètres à l’est de la mer Morte et à 24 kilomètres au sud de l’Arnon.
      marker-yv: yv-n
    - type: text
      text: ' resta intacte, mais elle fut encerclée et attaquée à son tour par les hommes armés de frondes. '
  '26':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Quand le roi de Moab comprit qu’il ne pourrait résister à l’attaque, il prit avec lui sept cents soldats armés d’épées et tenta de se frayer un passage en direction du roi d’Edom, mais il n’y réussit pas. '
  '27':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Alors, il fit venir son fils aîné qui devait lui succéder sur le trône et il l’offrit en holocauste sur le rempart. A ce spectacle, les Israélites furent si indignés qu’ils se retirèrent loin du roi et rentrèrent dans leur pays.
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: mais il resta attaché aux péchés de Jéroboam, fils de Nebath, qui avait entraîné le peuple d’Israël dans le péché. Il ne s’en détourna pas.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: La campagne contre les Moabites – Elisée annonce la victoire
    marker-yv: yv-h
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Mésha, roi de Moab
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '3.4 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Mentionné sur la « pierre de Moab » ou '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'stèle de Mésha '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: découverte en 1868, datant d’environ 850 av. J.-C. et retraçant les conflits de Moab avec Israël depuis les temps d’Omri. Le pays de Moab était situé sur le plateau fertile s’étendant à l’est de la mer Morte sur 50 kilomètres de long et 40 kilomètres de large (
        - type: usfm
          marker: ref
          children:
          - type: text
            text: Es 16.1
        - type: text
          text: ', '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: '7'
        - type: text
          text: ).
      marker-yv: yv-n
    - type: text
      text: ', élevait de nombreux troupeaux de moutons. Chaque année, il devait payer au roi d’Israël un tribut de cent mille agneaux et de cent mille béliers avec leur laine. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'A la mort d’Achab, le roi de Moab se révolta contre le roi d’Israël. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Alors, le roi Yoram quitta Samarie et passa toute l’armée d’Israël en revue. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Il envoya un message à Josaphat, roi de Juda, pour lui dire : Le roi de Moab s’est révolté contre moi. Viendras-tu l’attaquer avec moi ?'
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Josaphat répondit : Oui, je viendrai. Nous nous unirons pour l’attaquer, toi et moi, mes troupes avec les tiennes et mes chevaux avec les tiens. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Il ajouta : Quel chemin prendrons-nous ?'
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Yoram répondit : Nous attaquerons par le chemin du désert d’Edom'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '3.8 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: C’est-à-dire en contournant la mer Morte par l’ouest afin d’attaquer Moab par le sud. Ils devaient donc passer par le territoire d’Edom soumis à Juda.
      marker-yv: yv-n
    - type: text
      text: .
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Les rois d’Israël, de Juda et d’Edom
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '3.9 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Le roi d’Edom était en réalité un gouverneur nommé par Josaphat (voir 8.20 ; 1 R 22.48).
      marker-yv: yv-n
    - type: text
      text: ' se mirent donc en campagne. Ils firent sept jours de marche, mais l’eau vint à manquer pour les hommes comme pour les bêtes de somme qui les suivaient. '
