document_id: JER.24,21
type_code: fra
verses:
  '1':
  - type: heading
    content: Conclusions
  - type: heading
    content: Les bonnes et les mauvaises figues
  - type: text
    content: Après que Nabuchodonosor, roi de Babylone, eut déporté de Jérusalem et emmené à Babylone Yekonia
  - type: note
    content: Sur Yekonia, appelé Konia en 22.24 et Yehoyakîn ailleurs, voir 22.24 et note ; 2 R 24.8-16 ; 2 Ch 36.8-10.
  - type: text
    content: ', fils de Yehoyaqim, roi de Juda, les chefs de Juda, les artisans et les forgerons, l’Eternel me donna une vision : deux paniers de figues étaient posés devant le temple de l’Eternel.'
  '10':
  - type: text
    content: Je déchaînerai contre eux l’épée, la famine et la peste, jusqu’à ce qu’ils aient complètement disparu du pays que je leur ai donné, à leurs ancêtres puis à eux.
  '2':
  - type: text
    content: L’un de ces paniers contenait d’excellentes figues, comme le sont celles de la première récolte
  - type: note
    content: Les figues de la première récolte, mûres en juin, sont les meilleures (voir Es 28.4). Les figues d’été mûrissant en août sont sèches (voir Os 9.10 ; Mi 7.1).
  - type: text
    content: '  ; l’autre, des figues très mauvaises, si mauvaises qu’on ne pouvait les manger.'
  '3':
  - type: text
    content: 'Et l’Eternel me demanda : Que vois-tu, Jérémie ?'
  - type: text
    content: 'Je répondis : Des figues : les unes sont excellentes ; les autres, très mauvaises, si mauvaises qu’on ne peut les manger.'
  '4':
  - type: text
    content: 'Alors l’Eternel m’adressa la parole en ces termes : '
  '5':
  - type: text
    content: 'Voici ce que déclare l’Eternel, le Dieu d’Israël : Je considère les exilés de Juda que j’ai déportés de ce lieu-ci au pays des Chaldéens comme ces bonnes figues, pour leur faire du bien.'
  '6':
  - type: text
    content: Oui, je veillerai sur eux pour leur bien et je les ramènerai dans ce pays-ci où je les reconstruirai pour ne plus les détruire, où je les replanterai pour ne plus les arracher
  - type: note
    content: 'Reconstruirai… détruire… replanterai… arracher: voir 1.10  ; comparer 31.28 ; 42.10 ; 45.4.'
  - type: text
    content: .
  '7':
  - type: text
    content: Je disposerai leur cœur à me connaître et à savoir que je suis l’Eternel. Alors ils seront mon peuple, et moi, je serai leur Dieu ; car ils reviendront à moi de tout leur cœur.
  '8':
  - type: text
    content: Mais, déclare l’Eternel, je traiterai Sédécias, roi de Juda, ses hauts dignitaires et ceux qui subsistent de Jérusalem, ceux qui restent dans ce pays et ceux qui se sont réfugiés en Egypte, comme de mauvaises figues, qui sont si mauvaises qu’elles ne sont plus mangeables.
  '9':
  - type: text
    content: Je ferai d’eux un objet d’horreur et de malheur
  - type: note
    content: 'et de malheur. Autre traduction : et on citera leur nom dans les formules d’imprécations.'
  - type: text
    content: ' dans tous les royaumes de la terre. Partout où je les disperserai, on les couvrira d’opprobre, ils seront la fable et la risée des gens, et un objet de malédiction.'
