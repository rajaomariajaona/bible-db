document_id: JER.24
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Conclusions
  marker-yv: yv-h
- type: usfm
  marker: s2
  children:
  - type: text
    text: Les bonnes et les mauvaises figues
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Après que Nabuchodonosor, roi de Babylone, eut déporté de Jérusalem et emmené à Babylone Yekonia
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '24.1 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Sur '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'Yekonia, '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'appelé Konia en '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '22.24'
        metadata:
          usfm: JER.22.24
      - type: text
        text: ' et Yehoyakîn ailleurs, voir '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '22.24'
        metadata:
          usfm: JER.22.24
      - type: text
        text: ' et note ; 2 R 24.8-16 ; 2 Ch 36.8-10.'
    marker-yv: yv-n
  - type: text
    text: ', fils de Yehoyaqim, roi de Juda, les chefs de Juda, les artisans et les forgerons, l’Eternel me donna une vision : deux paniers de figues étaient posés devant le temple de l’Eternel.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: L’un de ces paniers contenait d’excellentes figues, comme le sont celles de la première récolte
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '24.2 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Les figues de la première récolte, mûres en juin, sont les meilleures (voir '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Es 28.4
        metadata:
          usfm: ISA.28.4
      - type: text
        text: ). Les figues d’été mûrissant en août sont sèches (voir Os 9.10 ; Mi 7.1).
    marker-yv: yv-n
  - type: text
    text: '  ; l’autre, des figues très mauvaises, si mauvaises qu’on ne pouvait les manger.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Et l’Eternel me demanda : Que vois-tu, Jérémie ?'
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Je répondis : Des figues : les unes sont excellentes ; les autres, très mauvaises, si mauvaises qu’on ne peut les manger.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Alors l’Eternel m’adressa la parole en ces termes : '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Voici ce que déclare l’Eternel, le Dieu d’Israël : Je considère les exilés de Juda que j’ai déportés de ce lieu-ci au pays des Chaldéens comme ces bonnes figues, pour leur faire du bien.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Oui, je veillerai sur eux pour leur bien et je les ramènerai dans ce pays-ci où je les reconstruirai pour ne plus les détruire, où je les replanterai pour ne plus les arracher
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '24.6 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: Reconstruirai… détruire… replanterai… arracher
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: ': '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'voir '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '1.10'
        metadata:
          usfm: JER.1.10
      - type: text
        text: '  ; comparer 31.28 ; 42.10 ; 45.4.'
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Je disposerai leur cœur à me connaître et à savoir que je suis l’Eternel. Alors ils seront mon peuple, et moi, je serai leur Dieu ; car ils reviendront à moi de tout leur cœur.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Mais, déclare l’Eternel, je traiterai Sédécias, roi de Juda, ses hauts dignitaires et ceux qui subsistent de Jérusalem, ceux qui restent dans ce pays et ceux qui se sont réfugiés en Egypte, comme de mauvaises figues, qui sont si mauvaises qu’elles ne sont plus mangeables.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Je ferai d’eux un objet d’horreur et de malheur
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '24.9 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'et de malheur. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Autre traduction : '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: et on citera leur nom dans les formules d’imprécations.
    marker-yv: yv-n
  - type: text
    text: ' dans tous les royaumes de la terre. Partout où je les disperserai, on les couvrira d’opprobre, ils seront la fable et la risée des gens, et un objet de malédiction.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Je déchaînerai contre eux l’épée, la famine et la peste, jusqu’à ce qu’ils aient complètement disparu du pays que je leur ai donné, à leurs ancêtres puis à eux.
