document_id: MIC.6
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Le procès contre des ingrats
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Ecoutez donc ╵ce que dit l’Eternel :'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Lève-toi et engage ╵un procès devant les montagnes
- type: usfm
  marker: q1
  children:
  - type: text
    text: et que les collines t’entendent !
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Ecoutez donc, montagnes, ╵fondements immuables de la terre,
- type: usfm
  marker: q1
  children:
  - type: text
    text: le plaidoyer de l’Eternel.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Car l’Eternel est en procès ╵avec son peuple,
- type: usfm
  marker: q1
  children:
  - type: text
    text: il va plaider contre Israël.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Que t’ai-je fait, mon peuple ?
- type: usfm
  marker: q1
  children:
  - type: text
    text: En quoi t’ai-je lassé ?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Réponds-moi donc !
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: T’ai-je lassé ╵en te faisant sortir
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '6.4 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Il y a un jeu de mots entre les verbes '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'lasser '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'et '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'faire sortir '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: qui se ressemblent en hébreu.
    marker-yv: yv-n
  - type: text
    text: ' d’Egypte,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: et en te délivrant ╵de ce pays où tu étais esclave,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et en envoyant devant toi ╵Moïse, Aaron et Miryam
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '6.4 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Voir '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ex 15.20-21
        metadata:
          usfm: EXO.15.20+EXO.15.21
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: '  ?'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Souviens-toi donc,
- type: usfm
  marker: q1
  children:
  - type: text
    text: de ce qu’avait tramé ╵Balaq, roi de Moab,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et de ce que lui répondit ╵Balaam
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '6.5 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Voir Nb 22 à 24.
    marker-yv: yv-n
  - type: text
    text: ', le fils de Béor.'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Souviens-toi du chemin ╵que tu as parcouru ╵de Shittim à Guilgal
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '6.5 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Voir Jos 3.1 à 4.24.
    marker-yv: yv-n
  - type: text
    text: ','
- type: usfm
  marker: q1
  children:
  - type: text
    text: et reconnais que l’Eternel
- type: usfm
  marker: q1
  children:
  - type: text
    text: t’a fait justice.
- type: usfm
  marker: s2
  children:
  - type: text
    text: Le vrai culte
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Avec quoi donc pourrai-je ╵me présenter à l’Eternel ?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et avec quoi m’inclinerai-je ╵devant le Dieu d’en haut ?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Irai-je devant lui ╵avec des holocaustes,
- type: usfm
  marker: q1
  children:
  - type: text
    text: avec des veaux âgés d’un an ?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: L’Eternel voudra-t-il ╵des milliers de béliers,
- type: usfm
  marker: q1
  children:
  - type: text
    text: dix mille torrents d’huile ?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Devrai-je sacrifier ╵mon enfant premier-né ╵pour payer pour ma transgression,
- type: usfm
  marker: q1
  children:
  - type: text
    text: l’enfant issu de moi, ╵pour expier ma faute ?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: On te l’a enseigné, ô homme, ╵ce qui est bien
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'et ce que l’Eternel ╵attend de toi :'
- type: usfm
  marker: q1
  children:
  - type: text
    text: c’est que tu te conduises ╵avec droiture,
- type: usfm
  marker: q1
  children:
  - type: text
    text: que tu prennes plaisir ╵à la bonté
- type: usfm
  marker: q1
  children:
  - type: text
    text: et que tu vives dans l’humilité ╵avec ton Dieu
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '6.8 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Certains comprennent : '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: qu’avec vigilance tu vives avec ton Dieu.
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: s2
  children:
  - type: text
    text: Contre les fraudeurs
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'L’Eternel s’adresse à la ville :'
- type: usfm
  marker: q1
  children:
  - type: text
    text: – la sagesse, c’est de le craindre
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '6.9 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: la sagesse, c’est de le craindre
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: ': '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'sens incertain. L’ancienne version grecque porte : '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: il sauvera ceux qui le craignent.
    marker-yv: yv-n
  - type: text
    text: '  :'
- type: usfm
  marker: q1
  children:
  - type: text
    text: alors, écoutez la menace ╵de votre châtiment
- type: usfm
  marker: q1
  children:
  - type: text
    text: et celui qui l’a décidé –
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Supporterai-je encore, ╵communauté méchante,
- type: usfm
  marker: q1
  children:
  - type: text
    text: les biens injustement acquis,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et des mesures de capacité réduites
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '6.10 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'C’est-à-dire les mesures de capacité fausses (voir '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Am 8.5
        metadata:
          usfm: AMO.8.5
      - type: text
        text: ' et note).'
    marker-yv: yv-n
  - type: text
    text: ', ╵objets de ma malédiction ?'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Laisserai-je impuni ╵celui qui utilise ╵des balances faussées
- type: usfm
  marker: q1
  children:
  - type: text
    text: et qui a dans son sac ╵des poids truqués ?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Les riches de la ville ╵ont recours à la violence,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ses habitants ╵profèrent des mensonges,
- type: usfm
  marker: q1
  children:
  - type: text
    text: leur langue ne fait que tromper.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: A mon tour, je vous frapperai, ╵jusqu’à vous en rendre malades,
- type: usfm
  marker: q1
  children:
  - type: text
    text: je vous dévasterai ╵à cause de vos fautes,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: vous mangerez ╵sans être rassasiés,
- type: usfm
  marker: q1
  children:
  - type: text
    text: cela vous tordra les entrailles.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Vous ferez des réserves, ╵vous n’en sauverez rien.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ce que vous sauveriez,
- type: usfm
  marker: q1
  children:
  - type: text
    text: je le livrerai à l’épée
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '6.14 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: cela vous tordra… livrerai à l’épée
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: ': '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'traduction incertaine. Autre traduction : '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: l’enfant que vous portez, vous le mettrez au monde, mais ne pourrez pas le sauver. Ceux que vous sauverez quand même, je les livrerai à l’épée !
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Vous sèmerez
- type: usfm
  marker: q1
  children:
  - type: text
    text: sans pouvoir moissonner ;
- type: usfm
  marker: q1
  children:
  - type: text
    text: vous presserez l’olive,
- type: usfm
  marker: q1
  children:
  - type: text
    text: mais sans vous frotter d’huile ;
- type: usfm
  marker: q1
  children:
  - type: text
    text: vous foulerez les grappes,
- type: usfm
  marker: q1
  children:
  - type: text
    text: sans en boire le vin.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Vous êtes résolus à suivre ╵les préceptes d’Omri,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et vous suivez l’exemple ╵de toutes les pratiques ╵de la maison d’Achab
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '6.16 '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'Omri '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'et son fils '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'Achab '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: furent deux rois infidèles qui ont favorisé le culte de Baal et méprisé la justice (voir 1 R 16.23 à 22.40).
    marker-yv: yv-n
  - type: text
    text: ','
- type: usfm
  marker: q1
  children:
  - type: text
    text: oui, vous vous conduisez ╵selon leurs modes de pensée.
- type: usfm
  marker: q1
  children:
  - type: text
    text: C’est pourquoi je vais provoquer ╵la destruction de votre ville.
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Je ferai de ses habitants ╵un sujet de sarcasme :'
- type: usfm
  marker: q1
  children:
  - type: text
    text: vous porterez
- type: usfm
  marker: q1
  children:
  - type: text
    text: l’opprobre de mon peuple.
