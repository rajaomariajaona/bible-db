document_id: MIC.6,21
type_code: fra
verses:
  '1':
  - type: heading
    content: Le procès contre des ingrats
  - type: text
    content: 'Ecoutez donc ╵ce que dit l’Eternel :'
  - type: text
    content: Lève-toi et engage ╵un procès devant les montagnes
  - type: text
    content: et que les collines t’entendent !
  '10':
  - type: text
    content: Supporterai-je encore, ╵communauté méchante,
  - type: text
    content: les biens injustement acquis,
  - type: text
    content: et des mesures de capacité réduites
  - type: note
    content: C’est-à-dire les mesures de capacité fausses (voir Am 8.5 et note).
  - type: text
    content: ', ╵objets de ma malédiction ?'
  '11':
  - type: text
    content: Laisserai-je impuni ╵celui qui utilise ╵des balances faussées
  - type: text
    content: et qui a dans son sac ╵des poids truqués ?
  '12':
  - type: text
    content: Les riches de la ville ╵ont recours à la violence,
  - type: text
    content: ses habitants ╵profèrent des mensonges,
  - type: text
    content: leur langue ne fait que tromper.
  '13':
  - type: text
    content: A mon tour, je vous frapperai, ╵jusqu’à vous en rendre malades,
  - type: text
    content: je vous dévasterai ╵à cause de vos fautes,
  '14':
  - type: text
    content: vous mangerez ╵sans être rassasiés,
  - type: text
    content: cela vous tordra les entrailles.
  - type: text
    content: Vous ferez des réserves, ╵vous n’en sauverez rien.
  - type: text
    content: Ce que vous sauveriez,
  - type: text
    content: je le livrerai à l’épée
  - type: note
    content: 'cela vous tordra… livrerai à l’épée: traduction incertaine. Autre traduction : l’enfant que vous portez, vous le mettrez au monde, mais ne pourrez pas le sauver. Ceux que vous sauverez quand même, je les livrerai à l’épée !'
  - type: text
    content: .
  '15':
  - type: text
    content: Vous sèmerez
  - type: text
    content: sans pouvoir moissonner ;
  - type: text
    content: vous presserez l’olive,
  - type: text
    content: mais sans vous frotter d’huile ;
  - type: text
    content: vous foulerez les grappes,
  - type: text
    content: sans en boire le vin.
  '16':
  - type: text
    content: Vous êtes résolus à suivre ╵les préceptes d’Omri,
  - type: text
    content: et vous suivez l’exemple ╵de toutes les pratiques ╵de la maison d’Achab
  - type: note
    content: Omri et son fils Achab furent deux rois infidèles qui ont favorisé le culte de Baal et méprisé la justice (voir 1 R 16.23 à 22.40).
  - type: text
    content: ','
  - type: text
    content: oui, vous vous conduisez ╵selon leurs modes de pensée.
  - type: text
    content: C’est pourquoi je vais provoquer ╵la destruction de votre ville.
  - type: text
    content: 'Je ferai de ses habitants ╵un sujet de sarcasme :'
  - type: text
    content: vous porterez
  - type: text
    content: l’opprobre de mon peuple.
  '2':
  - type: text
    content: Ecoutez donc, montagnes, ╵fondements immuables de la terre,
  - type: text
    content: le plaidoyer de l’Eternel.
  - type: text
    content: Car l’Eternel est en procès ╵avec son peuple,
  - type: text
    content: il va plaider contre Israël.
  '3':
  - type: text
    content: Que t’ai-je fait, mon peuple ?
  - type: text
    content: En quoi t’ai-je lassé ?
  - type: text
    content: Réponds-moi donc !
  '4':
  - type: text
    content: T’ai-je lassé ╵en te faisant sortir
  - type: note
    content: Il y a un jeu de mots entre les verbes lasser et faire sortir qui se ressemblent en hébreu.
  - type: text
    content: ' d’Egypte,'
  - type: text
    content: et en te délivrant ╵de ce pays où tu étais esclave,
  - type: text
    content: et en envoyant devant toi ╵Moïse, Aaron et Miryam
  - type: note
    content: Voir Ex 15.20-21.
  - type: text
    content: '  ?'
  '5':
  - type: text
    content: Souviens-toi donc,
  - type: text
    content: de ce qu’avait tramé ╵Balaq, roi de Moab,
  - type: text
    content: et de ce que lui répondit ╵Balaam
  - type: note
    content: Voir Nb 22 à 24.
  - type: text
    content: ', le fils de Béor.'
  - type: text
    content: Souviens-toi du chemin ╵que tu as parcouru ╵de Shittim à Guilgal
  - type: note
    content: Voir Jos 3.1 à 4.24.
  - type: text
    content: ','
  - type: text
    content: et reconnais que l’Eternel
  - type: text
    content: t’a fait justice.
  - type: heading
    content: Le vrai culte
  '6':
  - type: text
    content: Avec quoi donc pourrai-je ╵me présenter à l’Eternel ?
  - type: text
    content: Et avec quoi m’inclinerai-je ╵devant le Dieu d’en haut ?
  - type: text
    content: Irai-je devant lui ╵avec des holocaustes,
  - type: text
    content: avec des veaux âgés d’un an ?
  '7':
  - type: text
    content: L’Eternel voudra-t-il ╵des milliers de béliers,
  - type: text
    content: dix mille torrents d’huile ?
  - type: text
    content: Devrai-je sacrifier ╵mon enfant premier-né ╵pour payer pour ma transgression,
  - type: text
    content: l’enfant issu de moi, ╵pour expier ma faute ?
  '8':
  - type: text
    content: On te l’a enseigné, ô homme, ╵ce qui est bien
  - type: text
    content: 'et ce que l’Eternel ╵attend de toi :'
  - type: text
    content: c’est que tu te conduises ╵avec droiture,
  - type: text
    content: que tu prennes plaisir ╵à la bonté
  - type: text
    content: et que tu vives dans l’humilité ╵avec ton Dieu
  - type: note
    content: 'Certains comprennent : qu’avec vigilance tu vives avec ton Dieu.'
  - type: text
    content: .
  - type: heading
    content: Contre les fraudeurs
  '9':
  - type: text
    content: 'L’Eternel s’adresse à la ville :'
  - type: text
    content: – la sagesse, c’est de le craindre
  - type: note
    content: 'la sagesse, c’est de le craindre: sens incertain. L’ancienne version grecque porte : il sauvera ceux qui le craignent.'
  - type: text
    content: '  :'
  - type: text
    content: alors, écoutez la menace ╵de votre châtiment
  - type: text
    content: et celui qui l’a décidé –
