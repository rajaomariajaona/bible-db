document_id: EXO.20,21
type_code: fra
verses:
  '1':
  - type: heading
    content: La charte de l’alliance
  - type: text
    content: 'Alors Dieu prononça toutes ces paroles :'
  '10':
  - type: text
    content: 'Mais le septième jour est le jour du repos consacré à l’Eternel, ton Dieu ; tu ne feras aucun travail ce jour-là, ni toi, ni ton fils, ni ta fille, ni ton serviteur, ni ta servante, ni ton bétail, ni l’étranger qui réside chez toi ; '
  '11':
  - type: text
    content: car en six jours, l’Eternel a fait le ciel, la terre, la mer, et tout ce qui s’y trouve, mais le septième jour, il s’est reposé. C’est pourquoi l’Eternel a béni le jour du sabbat et en a fait un jour qui lui est consacré
  - type: note
    content: Voir Gn 2.1-3 ; Ex 16.23-30 ; 23.12 ; 31.12-17 ; 34.21 ; 35.2 ; Lv 23.3.
  - type: text
    content: .
  '12':
  - type: text
    content: Honore ton père et ta mère afin de jouir d’une longue vie dans le pays que l’Eternel ton Dieu te donne
  - type: note
    content: Voir Dt 27.16 ; Mt 15.4 ; 19.19 ; Mc 7.10 ; 10.19 ; Lc 18.20 ; Ep 6.2-3.
  - type: text
    content: .
  '13':
  - type: text
    content: Tu ne commettras pas de meurtre
  - type: note
    content: Voir Gn 9.6 ; Lv 24.17 ; Mt 5.21 ; 19.18 ; Mc 10.19 ; Lc 18.20 ; Rm 13.9 ; Jc 2.11.
  - type: text
    content: .
  '14':
  - type: text
    content: Tu ne commettras pas d’adultère
  - type: note
    content: Voir Lv 20.10 ; Mt 5.27 ; 19.18 ; Mc 10.19 ; Lc 18.20 ; Rm 13.9 ; Jc 2.11.
  - type: text
    content: .
  '15':
  - type: text
    content: Tu ne commettras pas de vol
  - type: note
    content: Voir Lv 19.11 ; Mt 19.18 ; Mc 10.19 ; Lc 18.20 ; Rm 13.9.
  - type: text
    content: .
  '16':
  - type: text
    content: Tu ne porteras pas de faux témoignage contre ton prochain
  - type: note
    content: Voir Ex 23.1 ; Mt 19.18 ; Mc 10.19 ; Lc 18.20.
  - type: text
    content: .
  '17':
  - type: text
    content: Tu ne convoiteras pas la maison de ton prochain, tu ne convoiteras pas la femme de ton prochain, ni son serviteur, ni sa servante, ni son bœuf, ni son âne, ni rien qui appartienne à ton prochain
  - type: note
    content: Voir Rm 7.7 ; 13.9.
  - type: text
    content: .
  - type: heading
    content: 'Moïse : intermédiaire entre Dieu et le peuple'
  '18':
  - type: text
    content: 'Tout le peuple entendait le tonnerre et le son du cor et voyait les éclairs et la fumée qui enveloppait la montagne. A ce spectacle, ils se mirent tous à trembler de peur et ils se tinrent à distance. '
  '19':
  - type: text
    content: 'Ils dirent à Moïse : Parle-nous toi-même, et nous t’obéirons, mais que Dieu ne nous parle pas directement, pour que nous ne mourions pas'
  - type: note
    content: Allusion en Hé 12.18-19.
  - type: text
    content: .
  '2':
  - type: text
    content: Je suis l’Eternel ton Dieu qui t’ai fait sortir d’Egypte, du pays où tu étais esclave.
  '20':
  - type: text
    content: 'Moïse répondit : N’ayez pas peur ! Si Dieu est venu ainsi, c’est pour vous mettre à l’épreuve, et pour que vous le craigniez afin de ne pas pécher.'
  '21':
  - type: text
    content: Le peuple restait à distance, Moïse seul s’approcha de l’épaisse nuée dans laquelle Dieu se tenait.
  - type: heading
    content: La loi sur les autels pour l’Eternel
  '22':
  - type: text
    content: 'L’Eternel dit à Moïse : Voici ce que tu diras aux Israélites : « Vous avez vu comme je vous ai parlé du haut du ciel. '
  '23':
  - type: text
    content: 'Vous ne m’associerez aucune divinité, vous ne vous fabriquerez aucune idole en argent ou en or. '
  '24':
  - type: text
    content: 'Vous construirez pour moi un autel en terre sur lequel vous offrirez vos holocaustes et vos sacrifices de communion, votre petit et votre gros bétail ; en tout lieu où je rappellerai mon souvenir, je viendrai vers vous et je vous bénirai. '
  '25':
  - type: text
    content: Si vous me construisez un autel en pierres, vous ne le bâtirez pas en pierres taillées, car en taillant les pierres au ciseau, vous les profaneriez
  - type: note
    content: Voir Dt 27.5-6 ; Jos 8.31.
  - type: text
    content: '. '
  '26':
  - type: text
    content: Vous ne construirez pas d’autel auquel on monte par des marches pour ne pas exposer aux regards la nudité de ceux qui y monteront. »
  '3':
  - type: text
    content: Tu n’auras pas d’autre dieu que moi.
  '4':
  - type: text
    content: Tu ne te feras pas d’idole ni de représentation quelconque de ce qui se trouve en haut dans le ciel, ici-bas sur la terre, ou dans les eaux plus bas que la terre
  - type: note
    content: Pour les v. 4-5, voir Ex 34.17 ; Lv 19.4 ; 26.1 ; Dt 4.15-18 ; 27.15.
  - type: text
    content: '. '
  '5':
  - type: text
    content: Tu ne te prosterneras pas devant de telles idoles
  - type: note
    content: Ce mot est aussi traduit par images.
  - type: text
    content: ' et tu ne leur rendras pas de culte, car moi, l’Eternel, ton Dieu, je suis un Dieu qui ne tolère aucun rival'
  - type: note
    content: 'Souvent traduit : je suis un Dieu jaloux. L’expression signifie que Dieu requiert que son peuple lui conserve l’exclusivité dans son culte. C’est là une marque de l’amour divin. On peut comparer au mari qui, parce qu’il aime son épouse, attend l’exclusivité dans sa relation avec elle (voir 34.14 ; Dt 4.24 ; 32.16, 21 ; Jos 24.19 ; Ps 78.58 ; 1 Co 10.22).'
  - type: text
    content: '  : je punis les fils pour la faute de leur père, jusqu’à la troisième, voire la quatrième génération de ceux qui me haïssent. '
  '6':
  - type: text
    content: Mais j’agis avec amour jusqu’à la millième génération envers ceux qui m’aiment et qui obéissent à mes commandements.
  '7':
  - type: text
    content: Tu n’utiliseras pas le nom de l’Eternel ton Dieu pour tromper
  - type: note
    content: 'Autre traduction : de manière abusive.'
  - type: text
    content: ', car l’Eternel ne laisse pas impuni celui qui utilise son nom pour tromper'
  - type: note
    content: Voir Lv 19.12.
  - type: text
    content: .
  '8':
  - type: text
    content: 'Pense à observer le jour du sabbat et fais-en un jour consacré à l’Eternel. '
  '9':
  - type: text
    content: 'Tu travailleras six jours pour faire tout ce que tu as à faire. '
