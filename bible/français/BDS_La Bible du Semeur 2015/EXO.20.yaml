document_id: EXO.20
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: La charte de l’alliance
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Alors Dieu prononça toutes ces paroles :'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Je suis l’Eternel ton Dieu qui t’ai fait sortir d’Egypte, du pays où tu étais esclave.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Tu n’auras pas d’autre dieu que moi.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Tu ne te feras pas d’idole ni de représentation quelconque de ce qui se trouve en haut dans le ciel, ici-bas sur la terre, ou dans les eaux plus bas que la terre
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '20.4 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Pour les v. 4-5, voir Ex 34.17 ; Lv 19.4 ; 26.1 ; Dt 4.15-18 ; 27.15.
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Tu ne te prosterneras pas devant de telles idoles
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '20.5 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Ce mot est aussi traduit par '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: images.
    marker-yv: yv-n
  - type: text
    text: ' et tu ne leur rendras pas de culte, car moi, l’Eternel, ton Dieu, je suis un Dieu qui ne tolère aucun rival'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '20.5 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Souvent traduit : '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'je suis un Dieu jaloux. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: L’expression signifie que Dieu requiert que son peuple lui conserve l’exclusivité dans son culte. C’est là une marque de l’amour divin. On peut comparer au mari qui, parce qu’il aime son épouse, attend l’exclusivité dans sa relation avec elle (voir 34.14 ; Dt 4.24 ; 32.16, 21 ; Jos 24.19 ; Ps 78.58 ; 1 Co 10.22).
    marker-yv: yv-n
  - type: text
    text: '  : je punis les fils pour la faute de leur père, jusqu’à la troisième, voire la quatrième génération de ceux qui me haïssent. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Mais j’agis avec amour jusqu’à la millième génération envers ceux qui m’aiment et qui obéissent à mes commandements.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Tu n’utiliseras pas le nom de l’Eternel ton Dieu pour tromper
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '20.7 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Autre traduction : '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: de manière abusive.
    marker-yv: yv-n
  - type: text
    text: ', car l’Eternel ne laisse pas impuni celui qui utilise son nom pour tromper'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '20.7 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Voir '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Lv 19.12
        metadata:
          usfm: LEV.19.12
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Pense à observer le jour du sabbat et fais-en un jour consacré à l’Eternel. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Tu travailleras six jours pour faire tout ce que tu as à faire. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Mais le septième jour est le jour du repos consacré à l’Eternel, ton Dieu ; tu ne feras aucun travail ce jour-là, ni toi, ni ton fils, ni ta fille, ni ton serviteur, ni ta servante, ni ton bétail, ni l’étranger qui réside chez toi ; '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: car en six jours, l’Eternel a fait le ciel, la terre, la mer, et tout ce qui s’y trouve, mais le septième jour, il s’est reposé. C’est pourquoi l’Eternel a béni le jour du sabbat et en a fait un jour qui lui est consacré
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '20.11 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Voir Gn 2.1-3 ; Ex 16.23-30 ; 23.12 ; 31.12-17 ; 34.21 ; 35.2 ; Lv 23.3.
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Honore ton père et ta mère afin de jouir d’une longue vie dans le pays que l’Eternel ton Dieu te donne
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '20.12 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Voir Dt 27.16 ; Mt 15.4 ; 19.19 ; Mc 7.10 ; 10.19 ; Lc 18.20 ; Ep 6.2-3.
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Tu ne commettras pas de meurtre
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '20.13 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Voir Gn 9.6 ; Lv 24.17 ; Mt 5.21 ; 19.18 ; Mc 10.19 ; Lc 18.20 ; Rm 13.9 ; Jc 2.11.
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Tu ne commettras pas d’adultère
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '20.14 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Voir Lv 20.10 ; Mt 5.27 ; 19.18 ; Mc 10.19 ; Lc 18.20 ; Rm 13.9 ; Jc 2.11.
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Tu ne commettras pas de vol
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '20.15 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Voir Lv 19.11 ; Mt 19.18 ; Mc 10.19 ; Lc 18.20 ; Rm 13.9.
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Tu ne porteras pas de faux témoignage contre ton prochain
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '20.16 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Voir Ex 23.1 ; Mt 19.18 ; Mc 10.19 ; Lc 18.20.
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Tu ne convoiteras pas la maison de ton prochain, tu ne convoiteras pas la femme de ton prochain, ni son serviteur, ni sa servante, ni son bœuf, ni son âne, ni rien qui appartienne à ton prochain
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '20.17 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Voir Rm 7.7 ; 13.9.
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: s1
  children:
  - type: text
    text: 'Moïse : intermédiaire entre Dieu et le peuple'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Tout le peuple entendait le tonnerre et le son du cor et voyait les éclairs et la fumée qui enveloppait la montagne. A ce spectacle, ils se mirent tous à trembler de peur et ils se tinrent à distance. '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Ils dirent à Moïse : Parle-nous toi-même, et nous t’obéirons, mais que Dieu ne nous parle pas directement, pour que nous ne mourions pas'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '20.19 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Allusion en '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Hé 12.18-19
        metadata:
          usfm: HEB.12.18+HEB.12.19
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Moïse répondit : N’ayez pas peur ! Si Dieu est venu ainsi, c’est pour vous mettre à l’épreuve, et pour que vous le craigniez afin de ne pas pécher.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Le peuple restait à distance, Moïse seul s’approcha de l’épaisse nuée dans laquelle Dieu se tenait.
- type: usfm
  marker: s1
  children:
  - type: text
    text: La loi sur les autels pour l’Eternel
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'L’Eternel dit à Moïse : Voici ce que tu diras aux Israélites : « Vous avez vu comme je vous ai parlé du haut du ciel. '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Vous ne m’associerez aucune divinité, vous ne vous fabriquerez aucune idole en argent ou en or. '
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Vous construirez pour moi un autel en terre sur lequel vous offrirez vos holocaustes et vos sacrifices de communion, votre petit et votre gros bétail ; en tout lieu où je rappellerai mon souvenir, je viendrai vers vous et je vous bénirai. '
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: Si vous me construisez un autel en pierres, vous ne le bâtirez pas en pierres taillées, car en taillant les pierres au ciseau, vous les profaneriez
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '20.25 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Voir Dt 27.5-6 ; Jos 8.31.
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: Vous ne construirez pas d’autel auquel on monte par des marches pour ne pas exposer aux regards la nudité de ceux qui y monteront. »
