document_id: NUM.4,21
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Les fonctions des Qehatites
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'L’Eternel parla à Moïse et à Aaron et dit : '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ils l’envelopperont avec tous ses accessoires dans une housse de peau de dauphin, et déposeront le tout sur un brancard. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ils déploieront une étoffe de pourpre violette sur l’autel d’or, et ils le recouvriront d’une couverture de peau de dauphin ; puis ils y fixeront les barres pour le transport. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ils prendront tous les objets dont on se sert pour officier dans le sanctuaire, ils les mettront dans une étoffe de pourpre violette, et les envelopperont d’une couverture de peau de dauphin, puis ils les déposeront sur un brancard. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ils ôteront les cendres grasses de l’autel
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '4.13 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: L’autel des holocaustes (
        - type: usfm
          marker: ref
          children:
          - type: text
            text: Ex 27.1-8
        - type: text
          text: '). La cuve de bronze n’est pas mentionnée (comme dans '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: '3.31'
        - type: text
          text: ).
      marker-yv: yv-n
    - type: text
      text: ' et étendront par-dessus une étoffe de pourpre écarlate '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'sur laquelle ils poseront tous les instruments utilisés pour le service de l’autel : les encensoirs, les fourchettes, les pelles à cendres et les bassines ; puis ils étendront par-dessus le tout une couverture de peau de dauphin et fixeront les barres pour le transport.'
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Quand Aaron et ses fils auront fini de couvrir le sanctuaire et tous ses ustensiles, au moment du départ du camp, les Qehatites viendront pour les transporter. Ils ne toucheront pas directement au sanctuaire, car ils seraient mis à mort. Telle est la responsabilité des Qehatites concernant la tente de la Rencontre.
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Quant à Eléazar, fils du prêtre Aaron, il sera responsable de l’huile du chandelier, de l’encens aromatique, de l’offrande perpétuelle et de l’huile d’onction ; il assurera la supervision de tout le tabernacle, de tout ce qui s’y trouve, tant du sanctuaire que de ses accessoires.
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'L’Eternel parla à Moïse et Aaron et dit : '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'N’exposez pas le groupe des familles des Qehatites à être retranché du milieu des lévites. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Voici la manière dont vous agirez à leur égard pour qu’ils vivent et ne soient pas frappés de mort lorsqu’ils s’approcheront des objets très saints : Toi, Aaron et tes fils, vous entrerez et vous assignerez à chacun sa tâche en lui indiquant ce qu’il devra transporter. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fais le recensement des descendants de Qehath d’entre les fils de Lévi, selon leurs familles et leurs groupes familiaux, '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ils ne doivent jamais entrer seuls pour regarder le sanctuaire, ne fût-ce qu’un instant, car ils mourraient.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Les fonctions des Guershonites
    marker-yv: yv-h
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'L’Eternel parla à Moïse et dit : '
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fais aussi le recensement des descendants de Guershôn, selon leurs groupes familiaux et leurs familles. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Tu compteras tous les hommes âgés de trente à cinquante ans, tous ceux qui seront recrutés pour effectuer une tâche quelconque dans la tente de la Rencontre.
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Voici quelle sera la tâche des familles des Guershonites, ce qu’ils auront à faire et à transporter : '
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'ils porteront les tentures du tabernacle ainsi que la tente de la Rencontre avec sa couverture et la bâche de peau de dauphin qui se met par-dessus, le rideau de l’entrée de la tente de la Rencontre, '
  '26':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'les toiles du parvis, avec le rideau de la porte du parvis, qui entourent le tabernacle et l’autel, leurs cordages et tous les ustensiles qui en dépendent. Ils feront tout le travail qui s’y rapporte. '
  '27':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ils feront tout leur service sous la direction d’Aaron et de ses fils, pour porter ce qu’ils doivent et accomplir leurs tâches ; vous leur indiquerez tout ce qu’ils auront à transporter. '
  '28':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Tel est le service des familles des Guershonites concernant la tente de la Rencontre. Ils l’accompliront sous la direction d’Itamar, fils du prêtre Aaron.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Les fonctions des Merarites
    marker-yv: yv-h
  '29':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Tu feras aussi le recensement des descendants de Merari, par familles et par groupes familiaux. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: depuis l’âge de trente ans jusqu’à celui de cinquante ans, c’est-à-dire de tous ceux qui seront recrutés pour accomplir quelque tâche dans la tente de la Rencontre.
  '30':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Tu compteras tous les hommes âgés de trente à cinquante ans, ceux qui seront recrutés pour effectuer une tâche quelconque dans la tente de la Rencontre.
  '31':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Voici quelles parties de la tente de la Rencontre ils auront pour tâche de transporter : les planches du tabernacle, ses traverses, ses piliers, ses socles, '
  '32':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'les piliers qui entourent le parvis, leurs socles, leurs piquets, leurs cordages, ainsi que tous les outils nécessaires à leur montage. Vous attribuerez à chacun nominativement les objets qu’il aura pour tâche de transporter. '
  '33':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Tel est le service des familles des Merarites, c’est là leur travail concernant la tente de la Rencontre. Ils l’accompliront sous la direction d’Itamar, fils du prêtre Aaron.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Le compte des lévites en service
    marker-yv: yv-h
  '34':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Moïse, Aaron et les chefs de la communauté firent le recensement des Qehatites, par familles et par groupes familiaux ; '
  '35':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'ils dénombrèrent tous les hommes âgés de trente à cinquante ans, ceux qui devaient être recrutés pour accomplir une tâche quelconque dans la tente de la Rencontre. '
  '36':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'L’effectif total de leurs familles était de 2 750. '
  '37':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Tel fut le contingent des familles des Qehatites qui avaient tous un service à effectuer dans la tente de la Rencontre. Moïse et Aaron en firent le recensement comme l’Eternel l’avait ordonné à Moïse.
  '38':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Les descendants de Guershôn recensés de la même manière étaient au nombre de 2 630 ; '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Voici quelle est la tâche des Qehatites dans la tente de la Rencontre : ils auront la responsabilité des objets très saints. '
  '42':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'ceux des descendants de Merari : 3 200. '
  '46':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Le nombre total des lévites recensés par Moïse, Aaron et les chefs d’Israël, par familles et par groupes familiaux, '
  '47':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'âgés de trente à cinquante ans, et qui devaient être recrutés pour accomplir leur tâche dans la tente de la Rencontre, '
  '48':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'était de 8 580. '
  '49':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Sur l’ordre de l’Eternel, Moïse assigna à chacun le service qu’il devait accomplir et ce qu’il devait transporter, comme l’Eternel le lui avait ordonné.
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Lorsqu’on lèvera le camp, Aaron et ses fils descendront le voile de séparation, ils en couvriront le coffre de l’acte de l’alliance, '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: puis ils mettront par-dessus une couverture de peau de dauphin sur laquelle ils étendront une étoffe entièrement teinte de pourpre violette ; ensuite, ils fixeront les barres servant à transporter le coffre
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '4.6 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Voir Ex 26.1-14 ; 27.9-16.
      marker-yv: yv-n
    - type: text
      text: '. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ils étendront également une étoffe de pourpre violette sur la table des pains qui sont exposés devant moi
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '4.7 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Voir '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: Lv 24.5-9
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: ', ils y mettront les plats, les coupes, les bols et les gobelets pour la libation. Quant au pain de l’oblation perpétuelle, il restera sur la table. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ils étendront sur ces objets une étoffe de rouge éclatant, et recouvriront le tout d’une couverture de peau de dauphin, puis ils y fixeront les barres pour le transport. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ils prendront une étoffe de pourpre violette et ils recouvriront le chandelier, ses lampes, ses pincettes, ses mouchettes et tous les récipients d’huile destinés à son service. '
