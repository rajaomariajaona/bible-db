document_id: NUM.4,21
type_code: fra
verses:
  '1':
  - type: heading
    content: Les fonctions des Qehatites
  - type: text
    content: 'L’Eternel parla à Moïse et à Aaron et dit : '
  '10':
  - type: text
    content: 'Ils l’envelopperont avec tous ses accessoires dans une housse de peau de dauphin, et déposeront le tout sur un brancard. '
  '11':
  - type: text
    content: 'Ils déploieront une étoffe de pourpre violette sur l’autel d’or, et ils le recouvriront d’une couverture de peau de dauphin ; puis ils y fixeront les barres pour le transport. '
  '12':
  - type: text
    content: 'Ils prendront tous les objets dont on se sert pour officier dans le sanctuaire, ils les mettront dans une étoffe de pourpre violette, et les envelopperont d’une couverture de peau de dauphin, puis ils les déposeront sur un brancard. '
  '13':
  - type: text
    content: Ils ôteront les cendres grasses de l’autel
  - type: note
    content: L’autel des holocaustes (Ex 27.1-8). La cuve de bronze n’est pas mentionnée (comme dans 3.31).
  - type: text
    content: ' et étendront par-dessus une étoffe de pourpre écarlate '
  '14':
  - type: text
    content: 'sur laquelle ils poseront tous les instruments utilisés pour le service de l’autel : les encensoirs, les fourchettes, les pelles à cendres et les bassines ; puis ils étendront par-dessus le tout une couverture de peau de dauphin et fixeront les barres pour le transport.'
  '15':
  - type: text
    content: Quand Aaron et ses fils auront fini de couvrir le sanctuaire et tous ses ustensiles, au moment du départ du camp, les Qehatites viendront pour les transporter. Ils ne toucheront pas directement au sanctuaire, car ils seraient mis à mort. Telle est la responsabilité des Qehatites concernant la tente de la Rencontre.
  '16':
  - type: text
    content: Quant à Eléazar, fils du prêtre Aaron, il sera responsable de l’huile du chandelier, de l’encens aromatique, de l’offrande perpétuelle et de l’huile d’onction ; il assurera la supervision de tout le tabernacle, de tout ce qui s’y trouve, tant du sanctuaire que de ses accessoires.
  '17':
  - type: text
    content: 'L’Eternel parla à Moïse et Aaron et dit : '
  '18':
  - type: text
    content: 'N’exposez pas le groupe des familles des Qehatites à être retranché du milieu des lévites. '
  '19':
  - type: text
    content: 'Voici la manière dont vous agirez à leur égard pour qu’ils vivent et ne soient pas frappés de mort lorsqu’ils s’approcheront des objets très saints : Toi, Aaron et tes fils, vous entrerez et vous assignerez à chacun sa tâche en lui indiquant ce qu’il devra transporter. '
  '2':
  - type: text
    content: 'Fais le recensement des descendants de Qehath d’entre les fils de Lévi, selon leurs familles et leurs groupes familiaux, '
  '20':
  - type: text
    content: Ils ne doivent jamais entrer seuls pour regarder le sanctuaire, ne fût-ce qu’un instant, car ils mourraient.
  - type: heading
    content: Les fonctions des Guershonites
  '21':
  - type: text
    content: 'L’Eternel parla à Moïse et dit : '
  '22':
  - type: text
    content: 'Fais aussi le recensement des descendants de Guershôn, selon leurs groupes familiaux et leurs familles. '
  '23':
  - type: text
    content: Tu compteras tous les hommes âgés de trente à cinquante ans, tous ceux qui seront recrutés pour effectuer une tâche quelconque dans la tente de la Rencontre.
  '24':
  - type: text
    content: 'Voici quelle sera la tâche des familles des Guershonites, ce qu’ils auront à faire et à transporter : '
  '25':
  - type: text
    content: 'ils porteront les tentures du tabernacle ainsi que la tente de la Rencontre avec sa couverture et la bâche de peau de dauphin qui se met par-dessus, le rideau de l’entrée de la tente de la Rencontre, '
  '26':
  - type: text
    content: 'les toiles du parvis, avec le rideau de la porte du parvis, qui entourent le tabernacle et l’autel, leurs cordages et tous les ustensiles qui en dépendent. Ils feront tout le travail qui s’y rapporte. '
  '27':
  - type: text
    content: 'Ils feront tout leur service sous la direction d’Aaron et de ses fils, pour porter ce qu’ils doivent et accomplir leurs tâches ; vous leur indiquerez tout ce qu’ils auront à transporter. '
  '28':
  - type: text
    content: Tel est le service des familles des Guershonites concernant la tente de la Rencontre. Ils l’accompliront sous la direction d’Itamar, fils du prêtre Aaron.
  - type: heading
    content: Les fonctions des Merarites
  '29':
  - type: text
    content: 'Tu feras aussi le recensement des descendants de Merari, par familles et par groupes familiaux. '
  '3':
  - type: text
    content: depuis l’âge de trente ans jusqu’à celui de cinquante ans, c’est-à-dire de tous ceux qui seront recrutés pour accomplir quelque tâche dans la tente de la Rencontre.
  '30':
  - type: text
    content: Tu compteras tous les hommes âgés de trente à cinquante ans, ceux qui seront recrutés pour effectuer une tâche quelconque dans la tente de la Rencontre.
  '31':
  - type: text
    content: 'Voici quelles parties de la tente de la Rencontre ils auront pour tâche de transporter : les planches du tabernacle, ses traverses, ses piliers, ses socles, '
  '32':
  - type: text
    content: 'les piliers qui entourent le parvis, leurs socles, leurs piquets, leurs cordages, ainsi que tous les outils nécessaires à leur montage. Vous attribuerez à chacun nominativement les objets qu’il aura pour tâche de transporter. '
  '33':
  - type: text
    content: Tel est le service des familles des Merarites, c’est là leur travail concernant la tente de la Rencontre. Ils l’accompliront sous la direction d’Itamar, fils du prêtre Aaron.
  - type: heading
    content: Le compte des lévites en service
  '34':
  - type: text
    content: 'Moïse, Aaron et les chefs de la communauté firent le recensement des Qehatites, par familles et par groupes familiaux ; '
  '35':
  - type: text
    content: 'ils dénombrèrent tous les hommes âgés de trente à cinquante ans, ceux qui devaient être recrutés pour accomplir une tâche quelconque dans la tente de la Rencontre. '
  '36':
  - type: text
    content: 'L’effectif total de leurs familles était de 2 750. '
  '37':
  - type: text
    content: Tel fut le contingent des familles des Qehatites qui avaient tous un service à effectuer dans la tente de la Rencontre. Moïse et Aaron en firent le recensement comme l’Eternel l’avait ordonné à Moïse.
  '38':
  - type: text
    content: 'Les descendants de Guershôn recensés de la même manière étaient au nombre de 2 630 ; '
  '4':
  - type: text
    content: 'Voici quelle est la tâche des Qehatites dans la tente de la Rencontre : ils auront la responsabilité des objets très saints. '
  '42':
  - type: text
    content: 'ceux des descendants de Merari : 3 200. '
  '46':
  - type: text
    content: 'Le nombre total des lévites recensés par Moïse, Aaron et les chefs d’Israël, par familles et par groupes familiaux, '
  '47':
  - type: text
    content: 'âgés de trente à cinquante ans, et qui devaient être recrutés pour accomplir leur tâche dans la tente de la Rencontre, '
  '48':
  - type: text
    content: 'était de 8 580. '
  '49':
  - type: text
    content: Sur l’ordre de l’Eternel, Moïse assigna à chacun le service qu’il devait accomplir et ce qu’il devait transporter, comme l’Eternel le lui avait ordonné.
  '5':
  - type: text
    content: 'Lorsqu’on lèvera le camp, Aaron et ses fils descendront le voile de séparation, ils en couvriront le coffre de l’acte de l’alliance, '
  '6':
  - type: text
    content: puis ils mettront par-dessus une couverture de peau de dauphin sur laquelle ils étendront une étoffe entièrement teinte de pourpre violette ; ensuite, ils fixeront les barres servant à transporter le coffre
  - type: note
    content: Voir Ex 26.1-14 ; 27.9-16.
  - type: text
    content: '. '
  '7':
  - type: text
    content: Ils étendront également une étoffe de pourpre violette sur la table des pains qui sont exposés devant moi
  - type: note
    content: Voir Lv 24.5-9.
  - type: text
    content: ', ils y mettront les plats, les coupes, les bols et les gobelets pour la libation. Quant au pain de l’oblation perpétuelle, il restera sur la table. '
  '8':
  - type: text
    content: 'Ils étendront sur ces objets une étoffe de rouge éclatant, et recouvriront le tout d’une couverture de peau de dauphin, puis ils y fixeront les barres pour le transport. '
  '9':
  - type: text
    content: 'Ils prendront une étoffe de pourpre violette et ils recouvriront le chandelier, ses lampes, ses pincettes, ses mouchettes et tous les récipients d’huile destinés à son service. '
