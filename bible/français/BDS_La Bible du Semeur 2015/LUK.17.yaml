document_id: LUK.17
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Les rapports entre frères
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: (Mt 18.6-7 ; Mc 9.42)
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Jésus dit à ses disciples : '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Il est inévitable qu’il y ait pour les hommes des occasions de chute, mais malheur à celui qui crée de telles occasions.
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Mieux vaudrait pour lui être précipité dans le lac avec une pierre de meule attachée au cou que de provoquer la chute de l’un de ces petits.
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Prenez donc bien garde à vous-mêmes !
- type: usfm
  marker: r
  children:
  - type: text
    text: (Mt 18.21-22)
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Si ton frère s’est rendu coupable d’une faute, reprends-le et, s’il change d’attitude
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '17.3 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Autres traductions : '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 's’il se repent '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'ou '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: s’il change de comportement.
    marker-yv: yv-n
  - type: usfm
    marker: wj
    children:
    - type: text
      text: ', pardonne-lui.'
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Et même s’il se rend coupable à ton égard sept fois au cours de la même journée, et que sept fois il vienne te trouver en disant qu’il change d’attitude
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '17.4 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Autres traductions : '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'qu’il se repent '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'ou '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: qu’il change de comportement.
    marker-yv: yv-n
  - type: usfm
    marker: wj
    children:
    - type: text
      text: ', pardonne-lui.'
- type: usfm
  marker: s1
  children:
  - type: text
    text: La foi comme une graine de moutarde
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: (Mt 17.20)
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Les apôtres dirent au Seigneur : Augmente notre foi.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: ' '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: – Si vous aviez la foi, leur répondit le Seigneur, même aussi petite qu’une graine de moutarde
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '17.6 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'La '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'graine de moutarde '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: était considérée comme la plus petite graine.
    marker-yv: yv-n
  - type: usfm
    marker: wj
    children:
    - type: text
      text: ', vous pourriez commander à ce mûrier-là : « Arrache tes racines du sol et va te planter dans la mer » et il vous obéirait.'
- type: usfm
  marker: s1
  children:
  - type: text
    text: Des serviteurs sans mérite
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: ' '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'Supposons que l’un de vous ait un serviteur occupé à labourer ou à garder le troupeau. En le voyant rentrer des champs, lui direz-vous : « Viens vite, assieds-toi à table » ?'
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'Ne lui direz-vous pas plutôt : « Prépare-moi mon dîner, mets-toi en tenue pour me servir jusqu’à ce que j’aie fini de manger et de boire ; ensuite tu mangeras et tu boiras à ton tour » ?'
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Le maître doit-il une reconnaissance particulière à cet esclave parce qu’il a fait ce qui lui était commandé ? Bien sûr que non !
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'Il en est de même pour vous. Quand vous aurez fait tout ce qui vous est commandé, dites : « Nous ne sommes que des serviteurs sans mérite particulier ; nous n’avons fait que notre devoir. »'
- type: usfm
  marker: s1
  children:
  - type: text
    text: Reconnaissance et ingratitude
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Alors qu’il se rendait à Jérusalem, Jésus longea la frontière entre la Samarie et la Galilée. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: A l’entrée d’un village, dix lépreux vinrent à sa rencontre ; ils s’arrêtèrent à distance
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '17.12 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Voir '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Lv 13.46
        metadata:
          usfm: LEV.13.46
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'et se mirent à le supplier à haute voix : Jésus, Maître, aie pitié de nous !'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Jésus les vit et leur dit : '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'Allez vous montrer aux '
    - type: usfm
      marker: w
      children:
      - type: text
        text: prêtres
    - type: text
      text: '  !'
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Pendant qu’ils y allaient, ils furent guéris. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'L’un d’eux, quand il se rendit compte qu’il était guéri, revint sur ses pas en louant Dieu à pleine voix. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Il se prosterna aux pieds de Jésus, face contre terre, et le remercia. Or, c’était un Samaritain.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Alors Jésus dit : '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Ils sont bien dix qui ont été guéris, n’est-ce pas ? Où sont donc les neuf autres ?
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Il ne s’est donc trouvé personne d’autre que cet étranger pour revenir louer Dieu ?
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Puis, s’adressant à ce Samaritain, il lui dit : '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'Relève-toi, et va : parce que tu as eu foi en moi, tu es sauvé'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '17.19 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Autre traduction : '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: tu es guéri.
    marker-yv: yv-n
  - type: usfm
    marker: wj
    children:
    - type: text
      text: .
- type: usfm
  marker: s1
  children:
  - type: text
    text: Comment vient le royaume
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Un jour, les pharisiens lui demandèrent quand arriverait le royaume de Dieu. Jésus leur répondit : '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Le royaume de Dieu ne viendra pas de façon visible.
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'On ne dira pas : « Venez, il est ici », ou : « Il est là », car, notez-le bien, le royaume de Dieu est parmi vous'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '17.21 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Autre traduction : '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: au-dedans de vous.
    marker-yv: yv-n
  - type: usfm
    marker: wj
    children:
    - type: text
      text: .
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Puis il s’adressa à ses disciples : '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'Le temps viendra où vous désirerez ardemment être avec le '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Fils de l’homme
    - type: text
      text: ', ne fût-ce qu’un seul jour, mais vous ne le pourrez pas.'
- type: usfm
  marker: r
  children:
  - type: text
    text: (Mt 24.23-28)
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: ' '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'Alors on vous dira : « Il est ici ! » ou « Il est là ! » N’y allez pas ! Ne vous y précipitez pas !'
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: L’éclair jaillit d’un point du ciel et l’illumine d’un bout à l’autre. Ainsi en sera-t-il du Fils de l’homme en son Jour.
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Mais il faut d’abord qu’il endure beaucoup de souffrances et qu’il soit rejeté par les gens de notre temps.
- type: usfm
  marker: r
  children:
  - type: text
    text: (Mt 24.37-41)
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: ' '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'Le jour où le Fils de l’homme reviendra, les choses se passeront comme au temps de '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Noé
    - type: text
      text: '  :'
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'les gens mangeaient, buvaient, se mariaient et étaient donnés en mariage, jusqu’au jour où '
    - type: usfm
      marker: qt
      children:
      - type: text
        text: Noé entra dans le bateau
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '17.27 '
    - type: usfm
      marker: ft
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Gn 7.7
        metadata:
          usfm: GEN.7.7
      - type: text
        text: .
    marker-yv: yv-n
  - type: usfm
    marker: wj
    children:
    - type: text
      text: . Alors vint le déluge qui les fit tous périr.
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'C’est encore ce qui est arrivé du temps de Loth : les gens mangeaient, buvaient, achetaient, vendaient, plantaient, bâtissaient.'
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'Mais le jour où Loth sortit de '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Sodome
    - type: text
      text: ', une pluie de feu et de soufre tomba du ciel et les fit tous périr.'
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Il en sera de même le jour où le Fils de l’homme apparaîtra.
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: En ce jour-là, si quelqu’un est sur le toit en terrasse de sa maison, qu’il n’en descende pas pour prendre les affaires qu’il aura laissées en bas ; de même, que celui qui se trouvera dans les champs ne retourne pas chez lui.
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Rappelez-vous ce qui est arrivé à la femme de Loth.
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Celui qui cherchera à préserver sa vie, la perdra ; mais celui qui la perdra, la conservera.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: ' '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'Cette nuit-là, je vous le dis, deux personnes seront couchées dans un même lit : l’une sera emmenée, l’autre sera laissée.'
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'Deux femmes seront en train de tourner ensemble la pierre de meule : l’une sera emmenée, l’autre laissée.'
  - type: text
    text: ' ['
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'Deux hommes seront dans un champ : l’un sera emmené, l’autre laissé'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '17.36 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Ce verset est absent de plusieurs anciens manuscrits (voir '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Mt 24.40
        metadata:
          usfm: MAT.24.40
      - type: text
        text: ).
    marker-yv: yv-n
  - type: usfm
    marker: wj
    children:
    - type: text
      text: .
  - type: text
    text: ']'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: 'Alors les disciples lui demandèrent : Où cela se passera-t-il, Seigneur ?'
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Il leur répondit : '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Là où sera le cadavre, là se rassembleront les vautours
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '17.37 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Voir '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Mt 24.28
        metadata:
          usfm: MAT.24.28
      - type: text
        text: .
    marker-yv: yv-n
  - type: usfm
    marker: wj
    children:
    - type: text
      text: .
