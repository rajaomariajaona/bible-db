document_id: LUK.17,21
type_code: fra
verses:
  '1':
  - type: heading
    content: Les rapports entre frères
  - type: heading
    content: (Mt 18.6-7 ; Mc 9.42)
  - type: text
    content: 'Jésus dit à ses disciples : '
  - type: text
    content: Il est inévitable qu’il y ait pour les hommes des occasions de chute, mais malheur à celui qui crée de telles occasions.
  - type: text
    content: ' '
  '10':
  - type: text
    content: 'Il en est de même pour vous. Quand vous aurez fait tout ce qui vous est commandé, dites : « Nous ne sommes que des serviteurs sans mérite particulier ; nous n’avons fait que notre devoir. »'
  - type: heading
    content: Reconnaissance et ingratitude
  '11':
  - type: text
    content: 'Alors qu’il se rendait à Jérusalem, Jésus longea la frontière entre la Samarie et la Galilée. '
  '12':
  - type: text
    content: A l’entrée d’un village, dix lépreux vinrent à sa rencontre ; ils s’arrêtèrent à distance
  - type: note
    content: Voir Lv 13.46.
  - type: text
    content: ' '
  '13':
  - type: text
    content: 'et se mirent à le supplier à haute voix : Jésus, Maître, aie pitié de nous !'
  '14':
  - type: text
    content: 'Jésus les vit et leur dit : '
  - type: text
    content: 'Allez vous montrer aux '
  - type: text
    content: prêtres
  - type: text
    content: '  !'
  - type: text
    content: 'Pendant qu’ils y allaient, ils furent guéris. '
  '15':
  - type: text
    content: 'L’un d’eux, quand il se rendit compte qu’il était guéri, revint sur ses pas en louant Dieu à pleine voix. '
  '16':
  - type: text
    content: Il se prosterna aux pieds de Jésus, face contre terre, et le remercia. Or, c’était un Samaritain.
  '17':
  - type: text
    content: 'Alors Jésus dit : '
  - type: text
    content: Ils sont bien dix qui ont été guéris, n’est-ce pas ? Où sont donc les neuf autres ?
  - type: text
    content: ' '
  '18':
  - type: text
    content: Il ne s’est donc trouvé personne d’autre que cet étranger pour revenir louer Dieu ?
  '19':
  - type: text
    content: 'Puis, s’adressant à ce Samaritain, il lui dit : '
  - type: text
    content: 'Relève-toi, et va : parce que tu as eu foi en moi, tu es sauvé'
  - type: note
    content: 'Autre traduction : tu es guéri.'
  - type: text
    content: .
  - type: heading
    content: Comment vient le royaume
  '2':
  - type: text
    content: Mieux vaudrait pour lui être précipité dans le lac avec une pierre de meule attachée au cou que de provoquer la chute de l’un de ces petits.
  - type: text
    content: ' '
  '20':
  - type: text
    content: 'Un jour, les pharisiens lui demandèrent quand arriverait le royaume de Dieu. Jésus leur répondit : '
  - type: text
    content: Le royaume de Dieu ne viendra pas de façon visible.
  - type: text
    content: ' '
  '21':
  - type: text
    content: 'On ne dira pas : « Venez, il est ici », ou : « Il est là », car, notez-le bien, le royaume de Dieu est parmi vous'
  - type: note
    content: 'Autre traduction : au-dedans de vous.'
  - type: text
    content: .
  '22':
  - type: text
    content: 'Puis il s’adressa à ses disciples : '
  - type: text
    content: 'Le temps viendra où vous désirerez ardemment être avec le '
  - type: text
    content: Fils de l’homme
  - type: text
    content: ', ne fût-ce qu’un seul jour, mais vous ne le pourrez pas.'
  - type: heading
    content: (Mt 24.23-28)
  '23':
  - type: text
    content: ' '
  - type: text
    content: 'Alors on vous dira : « Il est ici ! » ou « Il est là ! » N’y allez pas ! Ne vous y précipitez pas !'
  - type: text
    content: ' '
  '24':
  - type: text
    content: L’éclair jaillit d’un point du ciel et l’illumine d’un bout à l’autre. Ainsi en sera-t-il du Fils de l’homme en son Jour.
  - type: text
    content: ' '
  '25':
  - type: text
    content: Mais il faut d’abord qu’il endure beaucoup de souffrances et qu’il soit rejeté par les gens de notre temps.
  - type: heading
    content: (Mt 24.37-41)
  '26':
  - type: text
    content: ' '
  - type: text
    content: 'Le jour où le Fils de l’homme reviendra, les choses se passeront comme au temps de '
  - type: text
    content: Noé
  - type: text
    content: '  :'
  - type: text
    content: ' '
  '27':
  - type: text
    content: 'les gens mangeaient, buvaient, se mariaient et étaient donnés en mariage, jusqu’au jour où '
  - type: text
    content: Noé entra dans le bateau
  - type: note
    content: Gn 7.7.
  - type: text
    content: . Alors vint le déluge qui les fit tous périr.
  - type: text
    content: ' '
  '28':
  - type: text
    content: 'C’est encore ce qui est arrivé du temps de Loth : les gens mangeaient, buvaient, achetaient, vendaient, plantaient, bâtissaient.'
  - type: text
    content: ' '
  '29':
  - type: text
    content: 'Mais le jour où Loth sortit de '
  - type: text
    content: Sodome
  - type: text
    content: ', une pluie de feu et de soufre tomba du ciel et les fit tous périr.'
  - type: text
    content: ' '
  '3':
  - type: text
    content: Prenez donc bien garde à vous-mêmes !
  - type: heading
    content: (Mt 18.21-22)
  - type: text
    content: Si ton frère s’est rendu coupable d’une faute, reprends-le et, s’il change d’attitude
  - type: text
    content: ' '
  - type: note
    content: 'Autres traductions : s’il se repent ou s’il change de comportement.'
  - type: text
    content: ', pardonne-lui.'
  - type: text
    content: ' '
  '30':
  - type: text
    content: Il en sera de même le jour où le Fils de l’homme apparaîtra.
  - type: text
    content: ' '
  '31':
  - type: text
    content: En ce jour-là, si quelqu’un est sur le toit en terrasse de sa maison, qu’il n’en descende pas pour prendre les affaires qu’il aura laissées en bas ; de même, que celui qui se trouvera dans les champs ne retourne pas chez lui.
  - type: text
    content: ' '
  '32':
  - type: text
    content: Rappelez-vous ce qui est arrivé à la femme de Loth.
  - type: text
    content: ' '
  '33':
  - type: text
    content: Celui qui cherchera à préserver sa vie, la perdra ; mais celui qui la perdra, la conservera.
  '34':
  - type: text
    content: ' '
  - type: text
    content: 'Cette nuit-là, je vous le dis, deux personnes seront couchées dans un même lit : l’une sera emmenée, l’autre sera laissée.'
  - type: text
    content: ' '
  '35':
  - type: text
    content: 'Deux femmes seront en train de tourner ensemble la pierre de meule : l’une sera emmenée, l’autre laissée.'
  - type: text
    content: ' ['
  '36':
  - type: text
    content: 'Deux hommes seront dans un champ : l’un sera emmené, l’autre laissé'
  - type: note
    content: Ce verset est absent de plusieurs anciens manuscrits (voir Mt 24.40).
  - type: text
    content: .
  - type: text
    content: ']'
  '37':
  - type: text
    content: 'Alors les disciples lui demandèrent : Où cela se passera-t-il, Seigneur ?'
  - type: text
    content: 'Il leur répondit : '
  - type: text
    content: Là où sera le cadavre, là se rassembleront les vautours
  - type: note
    content: Voir Mt 24.28.
  - type: text
    content: .
  '4':
  - type: text
    content: Et même s’il se rend coupable à ton égard sept fois au cours de la même journée, et que sept fois il vienne te trouver en disant qu’il change d’attitude
  - type: note
    content: 'Autres traductions : qu’il se repent ou qu’il change de comportement.'
  - type: text
    content: ', pardonne-lui.'
  - type: heading
    content: La foi comme une graine de moutarde
  - type: heading
    content: (Mt 17.20)
  '5':
  - type: text
    content: 'Les apôtres dirent au Seigneur : Augmente notre foi.'
  '6':
  - type: text
    content: ' '
  - type: text
    content: – Si vous aviez la foi, leur répondit le Seigneur, même aussi petite qu’une graine de moutarde
  - type: text
    content: ' '
  - type: note
    content: La graine de moutarde était considérée comme la plus petite graine.
  - type: text
    content: ', vous pourriez commander à ce mûrier-là : « Arrache tes racines du sol et va te planter dans la mer » et il vous obéirait.'
  - type: heading
    content: Des serviteurs sans mérite
  '7':
  - type: text
    content: ' '
  - type: text
    content: 'Supposons que l’un de vous ait un serviteur occupé à labourer ou à garder le troupeau. En le voyant rentrer des champs, lui direz-vous : « Viens vite, assieds-toi à table » ?'
  - type: text
    content: ' '
  '8':
  - type: text
    content: 'Ne lui direz-vous pas plutôt : « Prépare-moi mon dîner, mets-toi en tenue pour me servir jusqu’à ce que j’aie fini de manger et de boire ; ensuite tu mangeras et tu boiras à ton tour » ?'
  - type: text
    content: ' '
  '9':
  - type: text
    content: Le maître doit-il une reconnaissance particulière à cet esclave parce qu’il a fait ce qui lui était commandé ? Bien sûr que non !
  - type: text
    content: ' '
