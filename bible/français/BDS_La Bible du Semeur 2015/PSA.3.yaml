document_id: PSA.3,21
type_code: fra
verses:
  '1':
  - type: heading
    content: Le salut vient de l’Eternel
  - type: text
    content: Psaume de David, quand il fuyait devant son fils Absalom
  - type: note
    content: Voir 2 S 15.13-37.
  - type: text
    content: .
  '2':
  - type: text
    content: O Eternel, ╵mes ennemis sont si nombreux !
  - type: text
    content: Oui, si nombreux mes adversaires ╵qui se sont dressés contre moi.
  '3':
  - type: text
    content: Et si nombreux ceux qui prétendent
  - type: text
    content: qu’il n’y a plus aucun secours ╵pour moi auprès de Dieu.
  - type: text
    content: Pause
  - type: note
    content: Le sens de ce terme n’est pas assuré.
  '4':
  - type: text
    content: Pourtant, ô Eternel, ╵tu es pour moi un bouclier ╵qui me protège.
  - type: text
    content: O toi ma gloire, ╵tu me feras marcher encore ╵la tête haute.
  '5':
  - type: text
    content: A haute voix, je crie vers l’Eternel ;
  - type: text
    content: de sa montagne sainte, ╵mon Dieu m’exaucera.
  - type: text
    content: Pause
  '6':
  - type: text
    content: Quand je me couche, je m’endors ;
  - type: text
    content: je me réveille ╵car l’Eternel est mon soutien.
  '7':
  - type: text
    content: Je ne craindrai donc pas ╵ces multitudes
  - type: text
    content: qui sont postées autour de moi.
  '8':
  - type: text
    content: Eternel, lève-toi ! ╵Au secours, mon Dieu, sauve-moi !
  - type: text
    content: 'Tu gifles tous mes ennemis :'
  - type: text
    content: tu casses les dents aux méchants.
  '9':
  - type: text
    content: De l’Eternel vient le salut.
  - type: text
    content: O Eternel, fais reposer ╵ta bénédiction sur les tiens.
  - type: text
    content: Pause
