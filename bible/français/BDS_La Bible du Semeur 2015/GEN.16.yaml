document_id: GEN.16,21
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: La naissance d’Ismaël
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Saraï, l’épouse d’Abram, ne lui avait pas donné d’enfant. Mais elle avait une esclave égyptienne nommée Agar. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Et il ajouta : Je te donnerai de très nombreux descendants ; ils seront si nombreux qu’on ne pourra pas les compter'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '16.10 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Voir 17.20 ; 25.13-16.
      marker-yv: yv-n
    - type: text
      text: '. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Puis il ajouta :'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Tu attends un enfant :'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ce sera un garçon.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tu l’appelleras Ismaël (Dieu entend)
  - type: usfm
    marker: q1
    children:
    - type: text
      text: car l’Eternel t’a entendue ╵dans ta détresse.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Ton fils sera comme un âne sauvage :'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: lui, il s’opposera à tous
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et tous s’opposeront à lui,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: mais il assurera sa place ╵en face de tous ses semblables.
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Agar se demanda : Ai-je réellement vu ici même celui qui me voit ?'
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Et elle appela l’Eternel qui lui avait parlé du nom de Atta-El-Roï (C’est toi le Dieu qui me voit). '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'C’est pourquoi on appelle ce puits : Beer-Lachaï-Roï (le Puits du Vivant-qui-me-voit). Il se trouve entre Qadesh et Béred.'
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Agar donna le jour à un fils que son père appela Ismaël. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Abram avait quatre-vingt-six ans quand Agar lui donna ce fils.
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Elle dit à Abram : Tu vois que l’Eternel m’a empêchée d’avoir des enfants'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '16.2 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: La stérilité d’une femme était souvent considérée comme une punition divine (25.21 ; Lv 20.20 ; Jr 22.30 ; Ps 127.3-4). La coutume (consignée dans le code d’Hammourabi, roi babylonien du II
        - type: usfm
          marker: ord
          children:
          - type: text
            text: e
        - type: text
          text: ' millénaire av. J.-C.) autorisait la femme stérile à choisir une épouse à son mari et à considérer comme siens les enfants que celle-ci lui donnerait.'
      marker-yv: yv-n
    - type: text
      text: '. Va donc vers ma servante : peut-être aurai-je un fils par son intermédiaire.'
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Abram suivit le conseil de sa femme. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Saraï, femme d’Abram, prit donc sa servante Agar et la donna pour femme à Abram, son mari. Il y avait alors dix ans qu’Abram séjournait au pays de Canaan. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Il s’unit à Agar et elle devint enceinte.
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Quand elle vit qu’elle attendait un enfant, elle se mit à mépriser sa maîtresse. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Alors Saraï dit à Abram : C’est toi qui es responsable de l’injure qui m’est faite. J’ai poussé ma servante dans tes bras et depuis qu’elle s’est vue enceinte, elle me méprise. Que l’Eternel soit juge entre nous.'
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Abram lui répondit : Ta servante est en ton pouvoir. Agis envers elle comme bon te semblera.'
  - type: usfm
    marker: p
    children:
    - type: text
      text: Alors Saraï la traita si durement que celle-ci s’enfuit.
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'L’ange de l’Eternel la rencontra près d’une source d’eau dans le désert, celle qui se trouve sur le chemin de Shour. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Il lui demanda : Agar, servante de Saraï, d’où viens-tu et où vas-tu ?'
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Elle répondit : Je m’enfuis de chez Saraï, ma maîtresse.'
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'L’ange de l’Eternel lui dit : Retourne auprès de ta maîtresse et humilie-toi devant elle. '
