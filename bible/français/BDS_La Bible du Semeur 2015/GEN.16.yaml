document_id: GEN.16,21
type_code: fra
verses:
  '1':
  - type: heading
    content: La naissance d’Ismaël
  - type: text
    content: 'Saraï, l’épouse d’Abram, ne lui avait pas donné d’enfant. Mais elle avait une esclave égyptienne nommée Agar. '
  '10':
  - type: text
    content: 'Et il ajouta : Je te donnerai de très nombreux descendants ; ils seront si nombreux qu’on ne pourra pas les compter'
  - type: note
    content: Voir 17.20 ; 25.13-16.
  - type: text
    content: '. '
  '11':
  - type: text
    content: 'Puis il ajouta :'
  - type: text
    content: 'Tu attends un enfant :'
  - type: text
    content: ce sera un garçon.
  - type: text
    content: Tu l’appelleras Ismaël (Dieu entend)
  - type: text
    content: car l’Eternel t’a entendue ╵dans ta détresse.
  '12':
  - type: text
    content: 'Ton fils sera comme un âne sauvage :'
  - type: text
    content: lui, il s’opposera à tous
  - type: text
    content: et tous s’opposeront à lui,
  - type: text
    content: mais il assurera sa place ╵en face de tous ses semblables.
  '13':
  - type: text
    content: 'Agar se demanda : Ai-je réellement vu ici même celui qui me voit ?'
  - type: text
    content: 'Et elle appela l’Eternel qui lui avait parlé du nom de Atta-El-Roï (C’est toi le Dieu qui me voit). '
  '14':
  - type: text
    content: 'C’est pourquoi on appelle ce puits : Beer-Lachaï-Roï (le Puits du Vivant-qui-me-voit). Il se trouve entre Qadesh et Béred.'
  '15':
  - type: text
    content: 'Agar donna le jour à un fils que son père appela Ismaël. '
  '16':
  - type: text
    content: Abram avait quatre-vingt-six ans quand Agar lui donna ce fils.
  '2':
  - type: text
    content: 'Elle dit à Abram : Tu vois que l’Eternel m’a empêchée d’avoir des enfants'
  - type: note
    content: La stérilité d’une femme était souvent considérée comme une punition divine (25.21 ; Lv 20.20 ; Jr 22.30 ; Ps 127.3-4). La coutume (consignée dans le code d’Hammourabi, roi babylonien du IIe millénaire av. J.-C.) autorisait la femme stérile à choisir une épouse à son mari et à considérer comme siens les enfants que celle-ci lui donnerait.
  - type: text
    content: '. Va donc vers ma servante : peut-être aurai-je un fils par son intermédiaire.'
  - type: text
    content: 'Abram suivit le conseil de sa femme. '
  '3':
  - type: text
    content: 'Saraï, femme d’Abram, prit donc sa servante Agar et la donna pour femme à Abram, son mari. Il y avait alors dix ans qu’Abram séjournait au pays de Canaan. '
  '4':
  - type: text
    content: Il s’unit à Agar et elle devint enceinte.
  - type: text
    content: 'Quand elle vit qu’elle attendait un enfant, elle se mit à mépriser sa maîtresse. '
  '5':
  - type: text
    content: 'Alors Saraï dit à Abram : C’est toi qui es responsable de l’injure qui m’est faite. J’ai poussé ma servante dans tes bras et depuis qu’elle s’est vue enceinte, elle me méprise. Que l’Eternel soit juge entre nous.'
  '6':
  - type: text
    content: 'Abram lui répondit : Ta servante est en ton pouvoir. Agis envers elle comme bon te semblera.'
  - type: text
    content: Alors Saraï la traita si durement que celle-ci s’enfuit.
  '7':
  - type: text
    content: 'L’ange de l’Eternel la rencontra près d’une source d’eau dans le désert, celle qui se trouve sur le chemin de Shour. '
  '8':
  - type: text
    content: 'Il lui demanda : Agar, servante de Saraï, d’où viens-tu et où vas-tu ?'
  - type: text
    content: 'Elle répondit : Je m’enfuis de chez Saraï, ma maîtresse.'
  '9':
  - type: text
    content: 'L’ange de l’Eternel lui dit : Retourne auprès de ta maîtresse et humilie-toi devant elle. '
