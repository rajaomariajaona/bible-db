document_id: JOB.33,21
type_code: fra
verses:
  '1':
  - type: heading
    content: Dieu se sert de la souffrance pour parler aux hommes
  - type: text
    content: Maintenant, Job, veuille écouter
  - type: text
    content: mon propos, je te prie
  - type: text
    content: et prête bien l’oreille ╵à toutes mes paroles ;
  '10':
  - type: text
    content: Cependant, Dieu invente ╵contre moi des prétextes,
  - type: text
    content: et il me considère ╵comme son ennemi
  - type: note
    content: Voir 9.17 ; 13.24 ; 19.11.
  - type: text
    content: '  :'
  '11':
  - type: text
    content: il a mis mes pieds dans des fers
  - type: text
    content: et il surveille tous mes pas. »
  '12':
  - type: text
    content: En cela, tu n’as pas raison, ╵laisse-moi te le dire,
  - type: text
    content: car Dieu est bien plus grand que l’homme.
  '13':
  - type: text
    content: Pourquoi lui fais-tu un procès ?
  - type: text
    content: Il n’a de compte à rendre ╵pour aucun de ses actes
  - type: note
    content: 'Autre traduction : pourquoi lui reproches-tu de ne pas répondre aux questions qu’on lui pose ?'
  - type: text
    content: .
  '14':
  - type: text
    content: Et pourtant, Dieu nous parle, ╵tantôt d’une manière
  - type: text
    content: et puis tantôt d’une autre. ╵Mais l’on n’y prend pas garde.
  '15':
  - type: text
    content: Il parle par des songes ╵et des visions nocturnes,
  - type: text
    content: quand un profond sommeil ╵accable les humains
  - type: text
    content: endormis sur leur couche.
  '16':
  - type: text
    content: Alors il se révèle ╵à l’oreille des hommes,
  - type: text
    content: scellant les instructions ╵dont il les avertit,
  '17':
  - type: text
    content: afin d’écarter l’homme ╵de ses agissements,
  - type: text
    content: de le préserver de l’orgueil.
  '18':
  - type: text
    content: Ainsi, le garde-t-il ╵hors de la tombe,
  - type: text
    content: il le préserve ╵des coups du javelot.
  '19':
  - type: text
    content: Ou encore, il corrige ╵l’homme par la souffrance ╵qui le tient sur sa couche,
  - type: text
    content: lorsque ses os ╵s’agitent sans arrêt.
  '2':
  - type: text
    content: voici, j’ouvre la bouche,
  - type: text
    content: et ma langue s’exprime.
  '20':
  - type: text
    content: Le voilà dégoûté ╵de toute nourriture,
  - type: text
    content: il n’a plus d’appétit ╵pour les mets les plus fins.
  '21':
  - type: text
    content: La chair sur son corps dépérit, ╵elle ne se laisse plus voir,
  - type: text
    content: et ses os qu’on ne voyait pas ╵sont maintenant saillants.
  '22':
  - type: text
    content: De la fosse, il s’approche
  - type: text
    content: et sa vie est livrée ╵aux anges de la mort.
  '23':
  - type: text
    content: Mais s’il se trouve auprès de lui ╵un ange interprète de Dieu
  - type: note
    content: 'Certains comprennent un messager et pensent à un humain (ce pourrait être Elihou lui-même). Il semble pourtant plus naturel d’y voir un ange chargé de faire comprendre à l’homme ce que Dieu veut lui dire par sa souffrance, comme le suggère la fin du verset. D’autres comprennent : un ange intercesseur.'
  - type: text
    content: ','
  - type: text
    content: un parmi les milliers,
  - type: text
    content: pour lui faire savoir ╵quel est le droit chemin,
  '24':
  - type: text
    content: 'qui ait pitié de lui ╵et qui demande à Dieu :'
  - type: text
    content: « Délivre-le du gouffre, ╵qu’il n’y descende pas,
  - type: text
    content: j’ai trouvé sa rançon »,
  '25':
  - type: text
    content: alors sa chair retrouve ╵sa fraîcheur juvénile,
  - type: text
    content: et il revient aux jours ╵de sa jeunesse.
  '26':
  - type: text
    content: Il peut invoquer Dieu, ╵qui lui rend sa faveur,
  - type: text
    content: il se présente à lui ╵avec des cris de joie.
  - type: text
    content: Car Dieu le reconnaît ╵à nouveau comme juste.
  '27':
  - type: text
    content: Il se met à chanter ╵et, devant tout le monde,
  - type: text
    content: 'il dit : « J’avais péché ╵et perverti le droit,'
  - type: text
    content: et je n’ai pas subi ╵ce que je méritais.
  '28':
  - type: text
    content: Car Dieu a délivré ╵mon être de la fosse
  - type: text
    content: et il a maintenu ╵ma vie dans la lumière. »
  '29':
  - type: text
    content: Vois, Dieu fait tout cela
  - type: text
    content: deux fois, trois fois pour l’homme,
  '3':
  - type: text
    content: Mes mots proviennent ╵d’un cœur plein de droiture,
  - type: text
    content: ma bouche exposera la science ╵en toute vérité.
  '30':
  - type: text
    content: pour le détourner de la tombe
  - type: text
    content: et pour l’illuminer ╵de la lumière des vivants.
  '31':
  - type: text
    content: Sois donc attentif, Job, ╵écoute-moi !
  - type: text
    content: Tais-toi, que je puisse parler.
  '32':
  - type: text
    content: Toutefois, si tu as ╵quelque chose à répondre, ╵dis-le, réplique-moi,
  - type: text
    content: car je serais heureux ╵de reconnaître ╵ton innocence.
  '33':
  - type: text
    content: Si tu n’as rien à dire, ╵alors écoute-moi,
  - type: text
    content: tais-toi, ╵et je t’apprendrai la sagesse.
  '4':
  - type: text
    content: Oui, c’est l’Esprit de Dieu ╵qui m’a formé,
  - type: text
    content: c’est le souffle du Tout-Puissant ╵qui me fait vivre.
  '5':
  - type: text
    content: Si tu peux, réponds-moi,
  - type: text
    content: prépare ta défense ╵et prends position devant moi.
  '6':
  - type: text
    content: Car voici, devant Dieu ╵je suis semblable à toi,
  - type: text
    content: j’ai été, comme toi, ╵façonné dans l’argile.
  '7':
  - type: text
    content: Ainsi tu ne trembleras pas ╵de frayeur devant moi
  - type: text
    content: et je ne t’écraserai pas.
  '8':
  - type: text
    content: Tu as dit devant moi,
  - type: text
    content: 'et j’ai bien entendu ╵le son de tes paroles :'
  '9':
  - type: text
    content: « Je suis irréprochable ╵et je n’ai pas commis ╵de transgression ;
  - type: text
    content: moi, je suis innocent, ╵je n’ai rien fait de mal
  - type: note
    content: Voir 10.7 ; 23.11-12 ; 27.6 ; 31.
  - type: text
    content: .
