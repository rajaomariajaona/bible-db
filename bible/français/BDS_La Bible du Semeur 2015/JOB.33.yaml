document_id: JOB.33
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Dieu se sert de la souffrance pour parler aux hommes
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Maintenant, Job, veuille écouter
- type: usfm
  marker: q1
  children:
  - type: text
    text: mon propos, je te prie
- type: usfm
  marker: q1
  children:
  - type: text
    text: et prête bien l’oreille ╵à toutes mes paroles ;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: voici, j’ouvre la bouche,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et ma langue s’exprime.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Mes mots proviennent ╵d’un cœur plein de droiture,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ma bouche exposera la science ╵en toute vérité.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Oui, c’est l’Esprit de Dieu ╵qui m’a formé,
- type: usfm
  marker: q1
  children:
  - type: text
    text: c’est le souffle du Tout-Puissant ╵qui me fait vivre.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Si tu peux, réponds-moi,
- type: usfm
  marker: q1
  children:
  - type: text
    text: prépare ta défense ╵et prends position devant moi.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Car voici, devant Dieu ╵je suis semblable à toi,
- type: usfm
  marker: q1
  children:
  - type: text
    text: j’ai été, comme toi, ╵façonné dans l’argile.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Ainsi tu ne trembleras pas ╵de frayeur devant moi
- type: usfm
  marker: q1
  children:
  - type: text
    text: et je ne t’écraserai pas.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Tu as dit devant moi,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'et j’ai bien entendu ╵le son de tes paroles :'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: « Je suis irréprochable ╵et je n’ai pas commis ╵de transgression ;
- type: usfm
  marker: q1
  children:
  - type: text
    text: moi, je suis innocent, ╵je n’ai rien fait de mal
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '33.9 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Voir 10.7 ; 23.11-12 ; 27.6 ; 31.
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Cependant, Dieu invente ╵contre moi des prétextes,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et il me considère ╵comme son ennemi
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '33.10 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Voir 9.17 ; 13.24 ; 19.11.
    marker-yv: yv-n
  - type: text
    text: '  :'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: il a mis mes pieds dans des fers
- type: usfm
  marker: q1
  children:
  - type: text
    text: et il surveille tous mes pas. »
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: En cela, tu n’as pas raison, ╵laisse-moi te le dire,
- type: usfm
  marker: q1
  children:
  - type: text
    text: car Dieu est bien plus grand que l’homme.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Pourquoi lui fais-tu un procès ?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Il n’a de compte à rendre ╵pour aucun de ses actes
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '33.13 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Autre traduction : '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: pourquoi lui reproches-tu de ne pas répondre aux questions qu’on lui pose ?
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Et pourtant, Dieu nous parle, ╵tantôt d’une manière
- type: usfm
  marker: q1
  children:
  - type: text
    text: et puis tantôt d’une autre. ╵Mais l’on n’y prend pas garde.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Il parle par des songes ╵et des visions nocturnes,
- type: usfm
  marker: q1
  children:
  - type: text
    text: quand un profond sommeil ╵accable les humains
- type: usfm
  marker: q1
  children:
  - type: text
    text: endormis sur leur couche.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Alors il se révèle ╵à l’oreille des hommes,
- type: usfm
  marker: q1
  children:
  - type: text
    text: scellant les instructions ╵dont il les avertit,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: afin d’écarter l’homme ╵de ses agissements,
- type: usfm
  marker: q1
  children:
  - type: text
    text: de le préserver de l’orgueil.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Ainsi, le garde-t-il ╵hors de la tombe,
- type: usfm
  marker: q1
  children:
  - type: text
    text: il le préserve ╵des coups du javelot.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Ou encore, il corrige ╵l’homme par la souffrance ╵qui le tient sur sa couche,
- type: usfm
  marker: q1
  children:
  - type: text
    text: lorsque ses os ╵s’agitent sans arrêt.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Le voilà dégoûté ╵de toute nourriture,
- type: usfm
  marker: q1
  children:
  - type: text
    text: il n’a plus d’appétit ╵pour les mets les plus fins.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: La chair sur son corps dépérit, ╵elle ne se laisse plus voir,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et ses os qu’on ne voyait pas ╵sont maintenant saillants.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: De la fosse, il s’approche
- type: usfm
  marker: q1
  children:
  - type: text
    text: et sa vie est livrée ╵aux anges de la mort.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: Mais s’il se trouve auprès de lui ╵un ange interprète de Dieu
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '33.23 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Certains comprennent un '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'messager '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'et pensent à un humain (ce pourrait être Elihou lui-même). Il semble pourtant plus naturel d’y voir un ange chargé de faire comprendre à l’homme ce que Dieu veut lui dire par sa souffrance, comme le suggère la fin du verset. D’autres comprennent : '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: un ange intercesseur.
    marker-yv: yv-n
  - type: text
    text: ','
- type: usfm
  marker: q1
  children:
  - type: text
    text: un parmi les milliers,
- type: usfm
  marker: q1
  children:
  - type: text
    text: pour lui faire savoir ╵quel est le droit chemin,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'qui ait pitié de lui ╵et qui demande à Dieu :'
- type: usfm
  marker: q1
  children:
  - type: text
    text: « Délivre-le du gouffre, ╵qu’il n’y descende pas,
- type: usfm
  marker: q1
  children:
  - type: text
    text: j’ai trouvé sa rançon »,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: alors sa chair retrouve ╵sa fraîcheur juvénile,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et il revient aux jours ╵de sa jeunesse.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: Il peut invoquer Dieu, ╵qui lui rend sa faveur,
- type: usfm
  marker: q1
  children:
  - type: text
    text: il se présente à lui ╵avec des cris de joie.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Car Dieu le reconnaît ╵à nouveau comme juste.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: Il se met à chanter ╵et, devant tout le monde,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'il dit : « J’avais péché ╵et perverti le droit,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: et je n’ai pas subi ╵ce que je méritais.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: Car Dieu a délivré ╵mon être de la fosse
- type: usfm
  marker: q1
  children:
  - type: text
    text: et il a maintenu ╵ma vie dans la lumière. »
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: Vois, Dieu fait tout cela
- type: usfm
  marker: q1
  children:
  - type: text
    text: deux fois, trois fois pour l’homme,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: pour le détourner de la tombe
- type: usfm
  marker: q1
  children:
  - type: text
    text: et pour l’illuminer ╵de la lumière des vivants.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: Sois donc attentif, Job, ╵écoute-moi !
- type: usfm
  marker: q1
  children:
  - type: text
    text: Tais-toi, que je puisse parler.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '32'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: Toutefois, si tu as ╵quelque chose à répondre, ╵dis-le, réplique-moi,
- type: usfm
  marker: q1
  children:
  - type: text
    text: car je serais heureux ╵de reconnaître ╵ton innocence.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '33'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: Si tu n’as rien à dire, ╵alors écoute-moi,
- type: usfm
  marker: q1
  children:
  - type: text
    text: tais-toi, ╵et je t’apprendrai la sagesse.
