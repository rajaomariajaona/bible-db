document_id: NUM.13,21
type_code: fra
verses:
  '1':
  - type: heading
    content: L’entrée en Canaan retardée de quarante ans
  - type: heading
    content: L’exploration du pays de Canaan
  - type: text
    content: 'L’Eternel parla à Moïse et dit : '
  '10':
  - type: text
    content: 'Pour la tribu de Zabulon : Gaddiel, fils de Sodi ;'
  '11':
  - type: text
    content: 'Pour la tribu de Joseph, c’est-à-dire celle de Manassé : Gaddi, fils de Sousi ;'
  '12':
  - type: text
    content: 'Pour la tribu de Dan : Ammiel, fils de Guemalli ;'
  '13':
  - type: text
    content: 'Pour la tribu d’Aser : Setour, fils de Michaël ;'
  '14':
  - type: text
    content: 'Pour la tribu de Nephtali : Nahbi, fils de Vophsi ;'
  '15':
  - type: text
    content: 'Pour la tribu de Gad : Guéouel, fils de Maki.'
  '16':
  - type: text
    content: Tels sont les noms des hommes que Moïse envoya pour explorer le pays. Moïse donna à Osée
  - type: note
    content: 'Voir v. 8. Osée signifie : Salut.'
  - type: text
    content: ', fils de Noun, le nom de Josué'
  - type: note
    content: 'Voir Ex 17.8-16. Josué signifie : l’Eternel sauve.'
  - type: text
    content: .
  '17':
  - type: text
    content: 'Moïse les envoya donc pour reconnaître le pays de Canaan, en leur disant : Passez par le Néguev, gagnez la région montagneuse '
  '18':
  - type: text
    content: 'et examinez le pays. Voyez comment il se présente et quel peuple l’habite, observez s’il est fort ou faible, nombreux ou pas ; '
  '19':
  - type: text
    content: 'voyez de quel genre est le pays où il habite ; s’il est bon ou mauvais ; et comment sont les villes, si elles sont ouvertes ou fortifiées. '
  '2':
  - type: text
    content: Envoie des hommes, un de chaque tribu, choisis parmi les chefs, pour explorer le pays de Canaan que je donne aux Israélites.
  '20':
  - type: text
    content: La terre est-elle fertile ou pauvre, y trouve-t-on des arbres ou non ? Ayez du courage et rapportez des fruits du pays.
  - type: text
    content: C’était, en effet, l’époque des premiers raisins.
  '21':
  - type: text
    content: Ainsi, ces hommes partirent et explorèrent le pays depuis le désert de Tsîn jusqu’à Rehob, près de Lebo-Hamath
  - type: note
    content: 'Autre traduction : jusqu’à Rehob, à l’entrée de Hamath. Le désert de Tsîn se trouve au sud-est du pays d’Israël, Rehob tout au nord, à l’entrée du territoire de Hamath sur l’Oronte, à quelque 200 kilomètres au nord de Damas : un voyage d’environ 800 kilomètres aller-retour qui leur a pris quarante jours (v. 25).'
  - type: text
    content: '. '
  '22':
  - type: text
    content: Ils montèrent dans le Néguev et parvinrent à Hébron où vivaient les familles d’Ahimân, de Shéshaï et de Talmaï, descendants d’Anaq
  - type: note
    content: Anciens habitants de Canaan, décrits comme étant des géants.
  - type: text
    content: . Hébron avait été fondée sept ans avant Tanis
  - type: note
    content: Ville fondée vers 1730 av. J.-C.
  - type: text
    content: ' en Egypte. '
  '23':
  - type: text
    content: 'Arrivés dans la vallée d’Eshkol, ils coupèrent un sarment de vigne portant une grappe de raisins si lourde qu’ils durent la porter à deux au moyen d’une perche ; ils prirent aussi des grenades et des figues. '
  '24':
  - type: text
    content: 'C’est depuis lors qu’on a nommé ce lieu : la vallée d’Eshkol (de la Grappe) en souvenir de la grappe de raisin que les Israélites y avaient coupée.'
  - type: heading
    content: Le rapport des envoyés
  '25':
  - type: text
    content: 'Au bout de quarante jours, ils furent de retour de leur exploration du pays. '
  '26':
  - type: text
    content: 'Ils vinrent trouver Moïse et Aaron et toute la communauté des Israélites dans le désert de Parân à Qadesh, ils leur rendirent compte de leur expédition et leur montrèrent les fruits du pays. '
  '27':
  - type: text
    content: 'Voici le rapport qu’ils firent à Moïse : Nous sommes arrivés dans le pays où tu nous as envoyés. Oui, c’est vraiment un pays ruisselant de lait et de miel'
  - type: note
    content: Voir Ex 3.8.
  - type: text
    content: '  ; et en voici les fruits. '
  '28':
  - type: text
    content: 'Seulement, le peuple qui l’habite est terriblement fort, les villes sont d’immenses forteresses, et nous avons même vu des descendants d’Anaq. '
  '29':
  - type: text
    content: Les Amalécites occupent la région du Néguev, les Hittites, les Yebousiens et les Amoréens tiennent la montagne, et les Cananéens
  - type: note
    content: Noms des différents peuples habitant ce qui deviendra le pays d’Israël. Pour les Hittites, voir note Gn 23.3. Les Yebousiens occupaient la région de la future Jérusalem (Jos 15.63), les Amoréens étaient installés dans les régions montagneuses bordant la vallée du Jourdain (Gn 15.16 ; Nb 21.31).
  - type: text
    content: ' occupent le littoral de la Méditerranée et toute la vallée du Jourdain.'
  '3':
  - type: text
    content: 'Moïse envoya des hommes depuis le désert de Parân, comme l’Eternel le lui avait demandé. C’étaient tous des chefs des Israélites. '
  '30':
  - type: text
    content: 'Alors Caleb essaya de faire taire le peuple qui commençait à s’en prendre à Moïse. Il lui dit : Allons-y, faisons la conquête de ce pays, car nous en sommes vraiment capables.'
  '31':
  - type: text
    content: 'Mais les hommes qui l’avaient accompagné disaient : Nous ne sommes pas en mesure d’attaquer ce peuple, car il est plus fort que nous.'
  '32':
  - type: text
    content: 'Puis ils se mirent à décrier le pays qu’ils avaient exploré devant les Israélites, en disant : Le pays que nous avons parcouru et exploré est une terre qui consume ses habitants ; quant à la population que nous y avons vue, ce sont tous des gens très grands. '
  '33':
  - type: text
    content: Nous y avons même vu des géants
  - type: note
    content: Voir Gn 6.4.
  - type: text
    content: ', des descendants d’Anaq, de cette race de géants ; à côté d’eux, nous avions l’impression d’être comme des sauterelles, et c’est bien l’effet que nous leur faisions.'
  '4':
  - type: text
    content: 'Voici leurs noms :'
  - type: text
    content: 'Pour la tribu de Ruben : Shammoua, fils de Zakkour ;'
  '5':
  - type: text
    content: 'Pour la tribu de Siméon : Shaphath, fils de Hori ;'
  '6':
  - type: text
    content: 'Pour la tribu de Juda : Caleb, fils de Yephounné ;'
  '7':
  - type: text
    content: 'Pour la tribu d’Issacar : Yiguéal, fils de Joseph ;'
  '8':
  - type: text
    content: 'Pour la tribu d’Ephraïm : Osée, fils de Noun ;'
  '9':
  - type: text
    content: 'Pour la tribu de Benjamin : Palti, fils de Raphou ;'
