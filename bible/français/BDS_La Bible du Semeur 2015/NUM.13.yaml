document_id: NUM.13
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: L’entrée en Canaan retardée de quarante ans
  marker-yv: yv-h
- type: usfm
  marker: s2
  children:
  - type: text
    text: L’exploration du pays de Canaan
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'L’Eternel parla à Moïse et dit : '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Envoie des hommes, un de chaque tribu, choisis parmi les chefs, pour explorer le pays de Canaan que je donne aux Israélites.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Moïse envoya des hommes depuis le désert de Parân, comme l’Eternel le lui avait demandé. C’étaient tous des chefs des Israélites. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Voici leurs noms :'
- type: usfm
  marker: li1
  children:
  - type: text
    text: 'Pour la tribu de Ruben : Shammoua, fils de Zakkour ;'
- type: usfm
  marker: li1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Pour la tribu de Siméon : Shaphath, fils de Hori ;'
- type: usfm
  marker: li1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Pour la tribu de Juda : Caleb, fils de Yephounné ;'
- type: usfm
  marker: li1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Pour la tribu d’Issacar : Yiguéal, fils de Joseph ;'
- type: usfm
  marker: li1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Pour la tribu d’Ephraïm : Osée, fils de Noun ;'
- type: usfm
  marker: li1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Pour la tribu de Benjamin : Palti, fils de Raphou ;'
- type: usfm
  marker: li1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Pour la tribu de Zabulon : Gaddiel, fils de Sodi ;'
- type: usfm
  marker: li1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Pour la tribu de Joseph, c’est-à-dire celle de Manassé : Gaddi, fils de Sousi ;'
- type: usfm
  marker: li1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Pour la tribu de Dan : Ammiel, fils de Guemalli ;'
- type: usfm
  marker: li1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Pour la tribu d’Aser : Setour, fils de Michaël ;'
- type: usfm
  marker: li1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Pour la tribu de Nephtali : Nahbi, fils de Vophsi ;'
- type: usfm
  marker: li1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Pour la tribu de Gad : Guéouel, fils de Maki.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Tels sont les noms des hommes que Moïse envoya pour explorer le pays. Moïse donna à Osée
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '13.16 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Voir v. 8. Osée signifie : '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: Salut.
    marker-yv: yv-n
  - type: text
    text: ', fils de Noun, le nom de Josué'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '13.16 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Voir '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ex 17.8-16
        metadata:
          usfm: EXO.17.8+EXO.17.9+EXO.17.10+EXO.17.11+EXO.17.12+EXO.17.13+EXO.17.14+EXO.17.15+EXO.17.16
      - type: text
        text: '. Josué signifie : '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: l’Eternel sauve.
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Moïse les envoya donc pour reconnaître le pays de Canaan, en leur disant : Passez par le Néguev, gagnez la région montagneuse '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'et examinez le pays. Voyez comment il se présente et quel peuple l’habite, observez s’il est fort ou faible, nombreux ou pas ; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'voyez de quel genre est le pays où il habite ; s’il est bon ou mauvais ; et comment sont les villes, si elles sont ouvertes ou fortifiées. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: La terre est-elle fertile ou pauvre, y trouve-t-on des arbres ou non ? Ayez du courage et rapportez des fruits du pays.
- type: usfm
  marker: p
  children:
  - type: text
    text: C’était, en effet, l’époque des premiers raisins.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Ainsi, ces hommes partirent et explorèrent le pays depuis le désert de Tsîn jusqu’à Rehob, près de Lebo-Hamath
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '13.21 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Autre traduction : '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'jusqu’à Rehob, à l’entrée de Hamath. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Le désert de Tsîn se trouve au sud-est du pays d’Israël, Rehob tout au nord, à l’entrée du territoire de Hamath sur l’Oronte, à quelque 200 kilomètres au nord de Damas : un voyage d’environ 800 kilomètres aller-retour qui leur a pris quarante jours (v. 25).'
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: Ils montèrent dans le Néguev et parvinrent à Hébron où vivaient les familles d’Ahimân, de Shéshaï et de Talmaï, descendants d’Anaq
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '13.22 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Anciens habitants de Canaan, décrits comme étant des géants.
    marker-yv: yv-n
  - type: text
    text: . Hébron avait été fondée sept ans avant Tanis
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '13.22 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Ville fondée vers 1730 av. J.-C.
    marker-yv: yv-n
  - type: text
    text: ' en Egypte. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Arrivés dans la vallée d’Eshkol, ils coupèrent un sarment de vigne portant une grappe de raisins si lourde qu’ils durent la porter à deux au moyen d’une perche ; ils prirent aussi des grenades et des figues. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'C’est depuis lors qu’on a nommé ce lieu : la vallée d’Eshkol (de la Grappe) en souvenir de la grappe de raisin que les Israélites y avaient coupée.'
- type: usfm
  marker: s2
  children:
  - type: text
    text: Le rapport des envoyés
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Au bout de quarante jours, ils furent de retour de leur exploration du pays. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Ils vinrent trouver Moïse et Aaron et toute la communauté des Israélites dans le désert de Parân à Qadesh, ils leur rendirent compte de leur expédition et leur montrèrent les fruits du pays. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'Voici le rapport qu’ils firent à Moïse : Nous sommes arrivés dans le pays où tu nous as envoyés. Oui, c’est vraiment un pays ruisselant de lait et de miel'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '13.27 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Voir '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ex 3.8
        metadata:
          usfm: EXO.3.8
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: '  ; et en voici les fruits. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'Seulement, le peuple qui l’habite est terriblement fort, les villes sont d’immenses forteresses, et nous avons même vu des descendants d’Anaq. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: Les Amalécites occupent la région du Néguev, les Hittites, les Yebousiens et les Amoréens tiennent la montagne, et les Cananéens
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '13.29 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Noms des différents peuples habitant ce qui deviendra le pays d’Israël. Pour les '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: Hittites
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: ', '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'voir note '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Gn 23.3
        metadata:
          usfm: GEN.23.3
      - type: text
        text: '. Les '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Yebousiens '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: occupaient la région de la future Jérusalem (
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Jos 15.63
        metadata:
          usfm: JOS.15.63
      - type: text
        text: '), les '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'Amoréens '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: étaient installés dans les régions montagneuses bordant la vallée du Jourdain (Gn 15.16 ; Nb 21.31).
    marker-yv: yv-n
  - type: text
    text: ' occupent le littoral de la Méditerranée et toute la vallée du Jourdain.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'Alors Caleb essaya de faire taire le peuple qui commençait à s’en prendre à Moïse. Il lui dit : Allons-y, faisons la conquête de ce pays, car nous en sommes vraiment capables.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'Mais les hommes qui l’avaient accompagné disaient : Nous ne sommes pas en mesure d’attaquer ce peuple, car il est plus fort que nous.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'Puis ils se mirent à décrier le pays qu’ils avaient exploré devant les Israélites, en disant : Le pays que nous avons parcouru et exploré est une terre qui consume ses habitants ; quant à la population que nous y avons vue, ce sont tous des gens très grands. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: Nous y avons même vu des géants
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '13.33 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Voir '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Gn 6.4
        metadata:
          usfm: GEN.6.4
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: ', des descendants d’Anaq, de cette race de géants ; à côté d’eux, nous avions l’impression d’être comme des sauterelles, et c’est bien l’effet que nous leur faisions.'
