type_code: fra
verses:
  '1':
  - type: usfm
    marker: imt1
    children:
    - type: text
      text: Introduction
  - type: usfm
    marker: ip
    children:
    - type: text
      text: 'Les premier et second livres des Rois qui, primitivement, ne formaient qu’un volume, font suite aux livres de Samuel et retracent l’histoire d’Israël de la fin du règne de David, en 970, à la destruction de Jérusalem, en 587 avant Jésus-Christ, et l’exil à Babylone. La coupure entre les deux livres est arbitraire, intervenant au milieu du « cycle d’Elie ». Pour rédiger ces livres, l’auteur, inconnu, certainement exilé à Babylone (2 R 25.27-30), avait à sa disposition des documents officiels aujourd’hui disparus : les Annales de Salomon, des rois de Juda et des rois d’Israël (11.41 ; 14.19, 29 ; 15.7, 23).'
  - type: usfm
    marker: ip
    children:
    - type: text
      text: 'Le premier livre couvre une période d’environ cent vingt ans. David meurt en nommant son fils Salomon pour lui succéder sur le trône. C’est sous son règne de quarante ans, de 970 à 930 avant Jésus-Christ (11.42), qu’Israël a vécu en paix dans un royaume aux frontières qui correspondaient à celles du pays promis (5.1). La grande œuvre de Salomon fut la construction du temple de l’Eternel à Jérusalem (chap. 6 à 8). Marqué par la sagesse et la prospérité matérielle (10.23), son règne, qui a commencé dans la fidélité à l’Eternel, a une triste fin : Salomon s’éloigne de Dieu, ce qui ne peut que susciter le jugement de l’Eternel (chap. 11).'
  - type: usfm
    marker: ip
    children:
    - type: text
      text: 'Ce châtiment intervient sous Roboam, son fils, en 930 avant Jésus-Christ. Le royaume est divisé entre Roboam auquel seul Juda (le royaume du Sud) reste fidèle, et son serviteur Jéroboam auquel se rallie tout Israël (le royaume du Nord). Pour éviter de dépendre de Jérusalem sur le plan religieux, Jéroboam fait construire deux sanctuaires idolâtres, au nord et au sud de son royaume (chap. 12). Le royaume du Nord sera marqué par l’instabilité et la violence tandis qu’au sud se perpétuera la lignée légitime : celle de David.'
  - type: usfm
    marker: ip
    children:
    - type: text
      text: 'L’intention de l’auteur de 1 et 2 Rois n’est pas de relater toute l’histoire des rois d’Israël et de Juda. Il ne consacre, par exemple, que six versets au règne d’Omri (1 R 16.23-28), roi de grande envergure du royaume du Nord, mentionné dans des documents extra-bibliques. L’auteur écrit l’histoire dans la perspective de l’alliance. C’est pourquoi revient comme un refrain la phrase : « Il fit ce que l’Eternel considère comme juste (ou) comme mal. » L’auteur évalue les règnes selon l’attitude des rois envers le culte de Dieu et selon leur respect du choix qu’il a fait de Jérusalem comme lieu du culte. Pour cette évaluation, il se sert de deux modèles de référence : David, modèle du roi fidèle, et Jéroboam, modèle du roi idolâtre.'
  - type: usfm
    marker: ip
    children:
    - type: text
      text: Cette perspective de l’alliance est encore soulignée par l’intervention régulière, dans les deux livres des Rois, de ces autres figures de la vie nationale d’Israël que sont les prophètes, porte-parole du Suzerain de l’alliance auprès des rois, puis du peuple lui-même à partir du huitième siècle avant Jésus-Christ. Elie, dont le « cycle » recouvre la fin de 1 Rois et le début de 2 Rois, en est l’exemple par excellence. Envoyé par l’Eternel auprès d’Achab, roi d’Israël (le royaume du Nord), il n’aura de cesse de lui rappeler, au péril de sa vie, les exigences éthiques et religieuses de l’alliance.
