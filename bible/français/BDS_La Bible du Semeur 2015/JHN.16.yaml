document_id: JHN.16,21
type_code: fra
verses:
  '1':
  - type: text
    content: ' '
  - type: text
    content: Je vous ai dit tout cela pour que vous soyez préservés de toute chute.
  - type: text
    content: ' '
  '10':
  - type: text
    content: au sujet de ce qui est juste, parce que je m’en vais auprès du Père et que vous ne me verrez plus ;
  - type: text
    content: ' '
  '11':
  - type: text
    content: et au sujet du jugement, parce que le dominateur de ce monde est d’ores et déjà condamné.
  '12':
  - type: text
    content: ' '
  - type: text
    content: J’ai encore beaucoup de choses à vous dire, mais elles sont encore trop lourdes à porter pour vous.
  '13':
  - type: text
    content: ' '
  - type: text
    content: Quand l’Esprit de vérité sera venu, il vous conduira dans la vérité tout entière, car il ne parlera pas de lui-même, mais tout ce qu’il aura entendu, il le dira, et il vous annoncera les choses à venir.
  - type: text
    content: ' '
  '14':
  - type: text
    content: Il manifestera ma gloire, car il puisera dans ce qui est à moi et vous l’annoncera.
  '15':
  - type: text
    content: ' '
  - type: text
    content: Tout ce que le Père possède m’appartient à moi aussi ; voilà pourquoi je vous dis qu’il puisera dans ce qui est à moi et vous l’annoncera.
  - type: text
    content: ' '
  '16':
  - type: text
    content: Dans peu de temps, vous ne me verrez plus ; puis encore un peu de temps, et vous me reverrez.
  - type: heading
    content: La tristesse des disciples sera changée en joie
  '17':
  - type: text
    content: 'Certains de ses disciples se demandèrent alors entre eux : Qu’est-ce qu’il veut nous dire par là : '
  - type: text
    content: « Dans peu de temps, vous ne me verrez plus ; encore un peu de temps, et vous me reverrez » ?
  - type: text
    content: ' Et aussi lorsqu’il affirme : '
  - type: text
    content: « Je vais au Père » ?
  '18':
  - type: text
    content: 'Ils ajoutèrent : Que signifie ce '
  - type: text
    content: « peu de temps »
  - type: text
    content: ' dont il parle ? Nous ne voyons pas ce qu’il veut dire.'
  '19':
  - type: text
    content: 'Jésus comprit qu’ils voulaient l’interroger ; il leur dit : '
  - type: text
    content: 'Vous êtes en train de vous demander entre vous ce que j’ai voulu dire par ces mots : « Dans peu de temps, vous ne me verrez plus ; encore un peu de temps, et vous me reverrez. »'
  - type: text
    content: ' '
  '2':
  - type: text
    content: 'Car on vous exclura des '
  - type: text
    content: synagogues
  - type: text
    content: ', et même l’heure vient où tous ceux qui vous mettront à mort s’imagineront rendre un culte à Dieu.'
  - type: text
    content: ' '
  '20':
  - type: text
    content: Vraiment, je vous l’assure, vous allez pleurer et vous lamenter, tandis que les gens de ce monde jubileront. Vous serez accablés de douleur, mais votre douleur se changera en joie.
  - type: text
    content: ' '
  '21':
  - type: text
    content: Lorsqu’une femme accouche, elle éprouve de la douleur parce que c’est le moment ; mais à peine a-t-elle donné le jour au bébé, qu’elle oublie son épreuve à cause de sa joie d’avoir mis au monde un enfant.
  - type: text
    content: ' '
  '22':
  - type: text
    content: 'Vous, de même, vous êtes maintenant dans la douleur, mais je vous verrai de nouveau : alors votre cœur sera rempli de joie, et cette joie, personne ne pourra vous l’enlever.'
  - type: text
    content: ' '
  '23':
  - type: text
    content: 'Quand ce jour viendra, vous ne me poserez plus aucune question. Oui, vraiment, je vous l’assure : tout ce que vous demanderez au Père en mon nom, il vous l’accordera'
  - type: note
    content: 'Certains manuscrits ont : tout ce que vous demanderez au Père, il vous l’accordera en mon nom.'
  - type: text
    content: .
  - type: text
    content: ' '
  '24':
  - type: text
    content: Jusqu’à présent vous n’avez rien demandé en mon nom. Demandez, et vous recevrez, pour que votre joie soit complète.
  '25':
  - type: text
    content: ' '
  - type: text
    content: Je vous ai dit tout cela de manière figurée
  - type: text
    content: ' '
  - type: note
    content: 'Ou : en paraboles, ou : de manière énigmatique.'
  - type: text
    content: . L’heure vient où je ne vous parlerai plus de cette manière ; je vous annoncerai en toute clarté ce qui concerne le Père.
  - type: text
    content: ' '
  '26':
  - type: text
    content: Ce jour-là, vous adresserez vos demandes au Père en mon nom. Et je ne vous dis même pas que j’interviendrai en votre faveur auprès du Père.
  - type: text
    content: ' '
  '27':
  - type: text
    content: Car le Père lui-même vous aime parce que vous m’aimez et que vous avez cru que je suis venu de Dieu.
  - type: text
    content: ' '
  '28':
  - type: text
    content: 'C’est vrai : Oui, je suis venu du Père et je suis venu dans le monde. Maintenant, je quitte le monde et je retourne auprès du Père.'
  '29':
  - type: text
    content: '– Maintenant enfin, s’écrièrent ses disciples, tu nous parles en toute clarté, et non plus de manière figurée. '
  '3':
  - type: text
    content: Ils en arriveront là parce qu’ils n’ont jamais connu ni mon Père ni moi.
  - type: text
    content: ' '
  '30':
  - type: text
    content: A présent, nous savons que tu sais tout et que tu connais d’avance les questions que l’on aimerait te poser. C’est pourquoi nous croyons que tu viens de Dieu.
  '31':
  - type: text
    content: ' '
  - type: text
    content: – Ainsi donc,
  - type: text
    content: ' leur répondit Jésus, '
  - type: text
    content: vous croyez à présent !
  - type: text
    content: ' '
  '32':
  - type: text
    content: Mais l’heure vient, et elle est déjà là, où vous serez dispersés chacun de son côté, et où vous me laisserez seul. Mais je ne suis pas seul, puisque le Père est avec moi.
  - type: text
    content: ' '
  '33':
  - type: text
    content: Il fallait que je vous dise aussi cela pour que vous trouviez la paix en moi. Dans le monde, vous aurez à souffrir bien des afflictions. Mais courage ! Moi, j’ai vaincu le monde.
  '4':
  - type: text
    content: Je vous ai annoncé tout cela d’avance pour que, lorsque l’heure sera venue pour eux d’agir ainsi, vous vous rappeliez que je vous l’ai prédit. Je ne vous en ai pas parlé dès le début, parce que j’étais encore avec vous.
  - type: heading
    content: L’œuvre du Saint-Esprit
  '5':
  - type: text
    content: ' '
  - type: text
    content: Maintenant, je vais auprès de celui qui m’a envoyé, et aucun de vous ne me demande où je vais ?
  - type: text
    content: ' '
  '6':
  - type: text
    content: Mais, à cause de ce que je vous ai dit, la tristesse vous a envahis.
  - type: text
    content: ' '
  '7':
  - type: text
    content: 'Pourtant, c’est la vérité que je vais vous dire : il vaut mieux pour vous que je m’en aille. En effet, si je ne m’en vais pas, le Défenseur en justice'
  - type: note
    content: Voir note à 14.16.
  - type: text
    content: ' '
  - type: text
    content: ne viendra pas à vous. Mais si je m’en vais, alors je vous l’enverrai.
  '8':
  - type: text
    content: ' '
  - type: text
    content: 'Et quand il sera venu, il produira la preuve que le monde s’égare au sujet du péché, de ce qui est juste et du jugement :'
  - type: text
    content: ' '
  '9':
  - type: text
    content: au sujet du péché, parce que le monde ne croit pas en moi ;
  - type: text
    content: ' '
