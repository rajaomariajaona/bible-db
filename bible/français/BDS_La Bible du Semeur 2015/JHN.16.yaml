document_id: JHN.16
type_code: fra
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: ' '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Je vous ai dit tout cela pour que vous soyez préservés de toute chute.
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'Car on vous exclura des '
    - type: usfm
      marker: w
      children:
      - type: text
        text: synagogues
    - type: text
      text: ', et même l’heure vient où tous ceux qui vous mettront à mort s’imagineront rendre un culte à Dieu.'
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Ils en arriveront là parce qu’ils n’ont jamais connu ni mon Père ni moi.
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Je vous ai annoncé tout cela d’avance pour que, lorsque l’heure sera venue pour eux d’agir ainsi, vous vous rappeliez que je vous l’ai prédit. Je ne vous en ai pas parlé dès le début, parce que j’étais encore avec vous.
- type: usfm
  marker: s1
  children:
  - type: text
    text: L’œuvre du Saint-Esprit
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: ' '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Maintenant, je vais auprès de celui qui m’a envoyé, et aucun de vous ne me demande où je vais ?
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Mais, à cause de ce que je vous ai dit, la tristesse vous a envahis.
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'Pourtant, c’est la vérité que je vais vous dire : il vaut mieux pour vous que je m’en aille. En effet, si je ne m’en vais pas, le Défenseur en justice'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '16.7 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Voir note à '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '14.16'
        metadata:
          usfm: JHN.14.16
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: ' '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: ne viendra pas à vous. Mais si je m’en vais, alors je vous l’enverrai.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: ' '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'Et quand il sera venu, il produira la preuve que le monde s’égare au sujet du péché, de ce qui est juste et du jugement :'
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: au sujet du péché, parce que le monde ne croit pas en moi ;
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: au sujet de ce qui est juste, parce que je m’en vais auprès du Père et que vous ne me verrez plus ;
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: et au sujet du jugement, parce que le dominateur de ce monde est d’ores et déjà condamné.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: ' '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: J’ai encore beaucoup de choses à vous dire, mais elles sont encore trop lourdes à porter pour vous.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: ' '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Quand l’Esprit de vérité sera venu, il vous conduira dans la vérité tout entière, car il ne parlera pas de lui-même, mais tout ce qu’il aura entendu, il le dira, et il vous annoncera les choses à venir.
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Il manifestera ma gloire, car il puisera dans ce qui est à moi et vous l’annoncera.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: ' '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Tout ce que le Père possède m’appartient à moi aussi ; voilà pourquoi je vous dis qu’il puisera dans ce qui est à moi et vous l’annoncera.
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Dans peu de temps, vous ne me verrez plus ; puis encore un peu de temps, et vous me reverrez.
- type: usfm
  marker: s1
  children:
  - type: text
    text: La tristesse des disciples sera changée en joie
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Certains de ses disciples se demandèrent alors entre eux : Qu’est-ce qu’il veut nous dire par là : '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: « Dans peu de temps, vous ne me verrez plus ; encore un peu de temps, et vous me reverrez » ?
  - type: text
    text: ' Et aussi lorsqu’il affirme : '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: « Je vais au Père » ?
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Ils ajoutèrent : Que signifie ce '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: « peu de temps »
  - type: text
    text: ' dont il parle ? Nous ne voyons pas ce qu’il veut dire.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Jésus comprit qu’ils voulaient l’interroger ; il leur dit : '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'Vous êtes en train de vous demander entre vous ce que j’ai voulu dire par ces mots : « Dans peu de temps, vous ne me verrez plus ; encore un peu de temps, et vous me reverrez. »'
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Vraiment, je vous l’assure, vous allez pleurer et vous lamenter, tandis que les gens de ce monde jubileront. Vous serez accablés de douleur, mais votre douleur se changera en joie.
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Lorsqu’une femme accouche, elle éprouve de la douleur parce que c’est le moment ; mais à peine a-t-elle donné le jour au bébé, qu’elle oublie son épreuve à cause de sa joie d’avoir mis au monde un enfant.
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'Vous, de même, vous êtes maintenant dans la douleur, mais je vous verrai de nouveau : alors votre cœur sera rempli de joie, et cette joie, personne ne pourra vous l’enlever.'
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'Quand ce jour viendra, vous ne me poserez plus aucune question. Oui, vraiment, je vous l’assure : tout ce que vous demanderez au Père en mon nom, il vous l’accordera'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '16.23 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Certains manuscrits ont : '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: tout ce que vous demanderez au Père, il vous l’accordera en mon nom.
    marker-yv: yv-n
  - type: usfm
    marker: wj
    children:
    - type: text
      text: .
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Jusqu’à présent vous n’avez rien demandé en mon nom. Demandez, et vous recevrez, pour que votre joie soit complète.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: ' '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Je vous ai dit tout cela de manière figurée
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '16.25 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Ou : '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'en paraboles, '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'ou : '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: de manière énigmatique.
    marker-yv: yv-n
  - type: usfm
    marker: wj
    children:
    - type: text
      text: . L’heure vient où je ne vous parlerai plus de cette manière ; je vous annoncerai en toute clarté ce qui concerne le Père.
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Ce jour-là, vous adresserez vos demandes au Père en mon nom. Et je ne vous dis même pas que j’interviendrai en votre faveur auprès du Père.
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Car le Père lui-même vous aime parce que vous m’aimez et que vous avez cru que je suis venu de Dieu.
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'C’est vrai : Oui, je suis venu du Père et je suis venu dans le monde. Maintenant, je quitte le monde et je retourne auprès du Père.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: '– Maintenant enfin, s’écrièrent ses disciples, tu nous parles en toute clarté, et non plus de manière figurée. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: A présent, nous savons que tu sais tout et que tu connais d’avance les questions que l’on aimerait te poser. C’est pourquoi nous croyons que tu viens de Dieu.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: ' '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: – Ainsi donc,
  - type: text
    text: ' leur répondit Jésus, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: vous croyez à présent !
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Mais l’heure vient, et elle est déjà là, où vous serez dispersés chacun de son côté, et où vous me laisserez seul. Mais je ne suis pas seul, puisque le Père est avec moi.
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Il fallait que je vous dise aussi cela pour que vous trouviez la paix en moi. Dans le monde, vous aurez à souffrir bien des afflictions. Mais courage ! Moi, j’ai vaincu le monde.
