document_id: LEV.5,21
type_code: fra
verses:
  '1':
  - type: heading
    content: Exemples de péchés expiés par ce sacrifice
  - type: text
    content: Si, dans une procédure de justice, quelqu’un entend la formule d’adjuration et ne dit pas ce qu’il sait alors qu’il est témoin ou qu’il a vu ou appris quelque chose, il portera la responsabilité de sa faute
  - type: note
    content: Voir Pr 29.24.
  - type: text
    content: .
  '10':
  - type: text
    content: Il offrira le second oiseau en holocauste selon la règle. Le prêtre accomplira ainsi pour cet homme le rite d’expiation pour sa faute, et il lui sera pardonné.
  '11':
  - type: text
    content: 'S’il n’a pas les moyens de se procurer deux tourterelles ou deux pigeonneaux, il apportera en offrande pour sa faute trois kilogrammes de fleur de farine, comme sacrifice pour le péché. Il n’y versera pas d’huile, il n’y ajoutera pas d’encens, car c’est un sacrifice pour le péché. '
  '12':
  - type: text
    content: 'Il l’apportera au prêtre, qui en prendra une pleine poignée pour servir de mémorial et la brûlera sur l’autel, sur les sacrifices et offrandes consumés par le feu qui appartiennent à l’Eternel. C’est un sacrifice pour le péché. '
  '13':
  - type: text
    content: Le prêtre accomplira ainsi le rite d’expiation pour la faute que cet homme a commise, dans l’un ou l’autre des cas énumérés, et il lui sera pardonné. Le reste sera pour le prêtre, comme dans le cas de l’offrande.
  - type: heading
    content: Le sacrifice de réparation
  '14':
  - type: text
    content: 'L’Eternel parla encore à Moïse :'
  '15':
  - type: text
    content: Si quelqu’un se rend coupable d’une infraction, d’une faute involontaire à l’égard de ce qui est consacré à l’Eternel, il apportera à l’Eternel en sacrifice de réparation un bélier sans défaut, choisi dans le troupeau, d’après ton estimation de sa valeur en argent, selon l’unité de poids en vigueur au sanctuaire, pour le sacrifice de réparation
  - type: note
    content: Il est difficile de distinguer nettement ce sacrifice du sacrifice pour le péché. On offrait, semble-t-il, un sacrifice de réparation lorsque la restitution était possible (voir 5.21-26) alors qu’on offrait un sacrifice pour le péché lorsqu’une telle réparation était impossible.
  - type: text
    content: '. '
  '16':
  - type: text
    content: De plus, il restituera ce dont il a lésé le sanctuaire par sa faute
  - type: note
    content: Amende qui punissait la négligence. Pour les détournements volontaires, elle était de dix à vingt-cinq fois plus forte (Ex 22.1-4).
  - type: text
    content: '  ; cette restitution sera majorée d’un cinquième, et il la remettra au prêtre, qui fera l’expiation pour lui avec le bélier offert en sacrifice de réparation, et il lui sera pardonné.'
  '17':
  - type: text
    content: Si quelqu’un pèche en faisant sans le savoir l’une des choses que l’Eternel a interdites dans ses commandements, il sera tenu pour coupable et portera la responsabilité de sa faute.
  '18':
  - type: text
    content: 'Il présentera au prêtre, pour le sacrifice de réparation, un bélier sans défaut, choisi dans le troupeau d’après ton estimation, et le prêtre accomplira pour lui le rite d’expiation pour la faute qu’il a commise involontairement, sans s’en rendre compte, et il lui sera pardonné. '
  '19':
  - type: text
    content: C’est un sacrifice de réparation, car cet homme était effectivement coupable envers l’Eternel.
  '2':
  - type: text
    content: Si quelqu’un touche par inadvertance une chose rituellement impure
  - type: note
    content: Voir Lv 11.24-40.
  - type: text
    content: ', que ce soit le cadavre d’une bête sauvage ou domestique impure, ou celui d’un reptile impur, il deviendra lui-même impur et sera coupable.'
  '20':
  - type: text
    content: 'L’Eternel parla à Moïse en disant : '
  '21':
  - type: text
    content: 'Lorsqu’un homme pèche et se rend coupable de désobéissance à l’Eternel en trompant son prochain au sujet d’un objet reçu en dépôt, prêté ou volé, lui extorque quelque chose, '
  '22':
  - type: text
    content: 'dit un mensonge concernant un objet perdu qu’il a trouvé ou prête un faux serment au sujet d’un méfait comme ceux dont les hommes peuvent se rendre coupables – '
  '23':
  - type: text
    content: 'lorsqu’il a commis un tel péché et s’est rendu coupable, il rendra ce qu’il a volé ou extorqué, l’objet qui lui a été confié en dépôt ou l’objet perdu qu’il a trouvé, '
  '24':
  - type: text
    content: 'ou tout objet au sujet duquel il a prononcé un faux serment, il le restituera et il y ajoutera un cinquième de sa valeur ; il le remettra à son propriétaire le jour même où il se reconnaîtra coupable. '
  '25':
  - type: text
    content: 'A titre de réparation envers l’Eternel, il amènera au prêtre un bélier sans défaut, choisi dans le troupeau, d’après ton estimation, pour le sacrifice de réparation. '
  '26':
  - type: text
    content: Le prêtre accomplira le rite d’expiation pour lui devant l’Eternel, et il lui sera pardonné ce dont il s’est rendu coupable, quoi que ce soit
  - type: note
    content: Pour les v. 20-26, voir Nb 5.5-8.
  - type: text
    content: .
  '3':
  - type: text
    content: Si quelqu’un touche sans le savoir une impureté humaine
  - type: note
    content: Voir Lv 12 à 15.
  - type: text
    content: ' dont le contact rend impur, s’il s’en rend compte et se reconnaît coupable ; '
  '4':
  - type: text
    content: ou si quelqu’un s’est laissé aller à jurer de faire du mal ou du bien, toutes choses que l’on promet sans réfléchir, s’il s’en rend compte, et se reconnaît coupable
  - type: note
    content: Voir Nb 30.2-9 ; Ps 15.4.
  - type: text
    content: '  ; '
  '5':
  - type: text
    content: 'si quelqu’un se trouve en faute dans l’un de ces cas, il avouera son péché, '
  '6':
  - type: text
    content: et, comme réparation envers l’Eternel pour la faute qu’il a commise, il amènera une femelle de petit bétail, brebis ou chèvre, en sacrifice pour le péché. Le prêtre accomplira pour lui le rite d’expiation pour son péché.
  - type: heading
    content: Si quelqu’un est trop pauvre
  '7':
  - type: text
    content: 'Si l’homme n’a pas les moyens de se procurer une brebis ou une chèvre, il apportera à l’Eternel, comme réparation pour son péché, deux tourterelles ou deux pigeonneaux ; l’un sera offert comme sacrifice pour le péché, l’autre comme holocauste. '
  '8':
  - type: text
    content: 'Il les apportera au prêtre qui offrira en premier lieu l’oiseau destiné au sacrifice pour le péché ; il lui rompra la nuque sans détacher complètement la tête, '
  '9':
  - type: text
    content: 'puis il fera l’aspersion du sang du sacrifice pour le péché sur la paroi de l’autel ; le reste du sang sera répandu sur le socle de l’autel. C’est un sacrifice pour le péché. '
