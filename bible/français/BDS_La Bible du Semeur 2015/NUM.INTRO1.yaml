type_code: fra
verses:
  '1':
  - type: text
    content: Introduction
  - type: text
    content: Le titre de ce livre vient des deux recensements qu’il relate, avant le départ du Sinaï (chap. 1 à 3) et aux frontières du pays promis (chap. 26). Des sections contenant des lois (chap. 5 à 10.10 ; 15 ; 18 et 19 ; 26 à 36) y alternent avec des sections narratives (10.11 à 14.45 ; chap. 16 et 17 ; 20 à 25), souvent en relation étroite.
  - type: text
    content: 'Après les préparatifs du départ du Sinaï – avec le recensement et l’organisation du peuple et la mise en place des institutions cultuelles (chap. 1 à 10.10) – Israël se met en route, conduit par l’Eternel, dont la présence était symbolisée par la nuée (9.15-23 ; 10.11). Arrivé à Qadesh-Barnéa, aux portes mêmes du pays promis, le peuple refuse d’y pénétrer, par crainte et par incrédulité (chap. 13 à 14). Dieu le condamne alors à passer quarante ans dans le désert, mot sous lequel il ne faut pas s’imaginer une étendue de sable : c’était un paysage très tourmenté, émaillé d’oasis où la végétation était autrefois plus dense qu’aujourd’hui. Israël repart ainsi vers le sud et suit un itinéraire aujourd’hui difficile à jalonner, plus de la moitié des noms de lieux n’ayant pu être identifiés ; celui-ci est résumé au chapitre 33. Le livre se termine, une génération plus tard, dans les plaines de Moab, à l’est de la mer Morte, sur les préparatifs de la conquête de Canaan.'
  - type: text
    content: 'L’auteur relate tout particulièrement les crises et les révoltes, souvent tragiques, qui ont caractérisé le séjour d’Israël au désert : jalousie de Miryam et d’Aaron (chap. 12), crainte et incrédulité du peuple (chap. 13 et 14), rébellion contre Moïse et Aaron (chap. 16 à 18), murmures (chap. 20), idolâtrie et immoralité (chap. 25). Le Nouveau Testament nous encourage à nous laisser instruire par ces événements : « Tous ces faits nous servent d’exemples pour nous avertir de ne pas tolérer en nous de mauvais désirs comme ceux auxquels ils ont succombé » (1 Co 10.6). Mais il rappelle aussi que, comme il l’a été pour Israël dans le désert, « Dieu est fidèle » (1 Co 10.13).'
