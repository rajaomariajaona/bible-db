document_id: 2CH.15
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Asa renouvelle l’alliance avec l’Eternel
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'L’Esprit de Dieu saisit Azaria, fils d’Oded, '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'qui s’avança à la rencontre d’Asa et lui dit :'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ecoutez-moi, Asa, ╵vous, tous les Judéens ╵et les Benjaminites !
- type: usfm
  marker: q1
  children:
  - type: text
    text: L’Eternel sera avec vous ╵tant que vous serez avec lui ;
- type: usfm
  marker: q1
  children:
  - type: text
    text: si vous vous attachez à lui, ╵il interviendra en votre faveur ;
- type: usfm
  marker: q1
  children:
  - type: text
    text: si vous l’abandonnez, ╵lui, il vous abandonnera.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Pendant de nombreux jours, ╵Israël a vécu ╵sans avoir ni vrai Dieu,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ni prêtres qui l’enseignent, ╵et sans avoir de Loi
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '15.3 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Voir '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Jg 2.10-23
        metadata:
          usfm: JDG.2.10+JDG.2.11+JDG.2.12+JDG.2.13+JDG.2.14+JDG.2.15+JDG.2.16+JDG.2.17+JDG.2.18+JDG.2.19+JDG.2.20+JDG.2.21+JDG.2.22+JDG.2.23
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Au sein de la détresse, ╵les hommes d’Israël ╵se sont tournés ╵vers l’Eternel, Dieu d’Israël,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ils se sont adressés à lui,
- type: usfm
  marker: q1
  children:
  - type: text
    text: il est intervenu pour eux.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: En ces temps-là, ╵il n’y avait ni paix ╵ni sécurité pour tous ceux ╵qui allaient et venaient,
- type: usfm
  marker: q1
  children:
  - type: text
    text: car les temps étaient bien troublés ╵pour tous les habitants ╵de ces contrées.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Partout, on se battait, ╵peuple contre autre peuple,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et ville contre ville,
- type: usfm
  marker: q1
  children:
  - type: text
    text: car Dieu leur infligeait ╵des malheurs en tous genres.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Quant à vous, soyez fermes, ╵et ne faiblissez pas,
- type: usfm
  marker: q1
  children:
  - type: text
    text: parce que vos efforts ╵auront leur récompense.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Un temps de réformes
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Après avoir entendu ce message du prophète [fils d’
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '15.8 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Les mots entre crochets manquent dans le texte hébreu traditionnel mais sont rajoutés d’après la Vulgate et la version syriaque (voir v. 1).
    marker-yv: yv-n
  - type: text
    text: ']Oded, Asa en fut encouragé et il fit disparaître les idoles abominables de tout le pays de Juda et de Benjamin, ainsi que des villes dont il s’était emparé dans la région montagneuse d’Ephraïm. Il restaura l’autel de l’Eternel qui se trouvait devant le portique du temple de l’Eternel. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Puis il rassembla toute la population de Juda et de Benjamin, ainsi que les émigrés des tribus d’Ephraïm, de Manassé et de Siméon, car beaucoup de gens du royaume d’Israël s’étaient ralliés à lui lorsqu’ils avaient vu que l’Eternel son Dieu était avec lui. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Ils se rassemblèrent tous à Jérusalem le troisième mois de la quinzième année du règne d’Asa
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '15.10 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: En 895 av. J.-C. La fête des Semaines (Pentecôte) avait lieu durant ce mois (
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Lv 23.15-21
        metadata:
          usfm: LEV.23.15+LEV.23.16+LEV.23.17+LEV.23.18+LEV.23.19+LEV.23.20+LEV.23.21
      - type: text
        text: ).
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Ce jour-là, ils offrirent des sacrifices à l’Eternel, en prenant une part du butin qu’ils avaient ramené : sept cents bœufs et sept mille moutons. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Ils s’engagèrent par une alliance à s’attacher à l’Eternel, le Dieu de leurs ancêtres, de tout leur cœur et de tout leur être. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Cette alliance stipulait que quiconque ne s’attacherait pas à l’Eternel, le Dieu d’Israël, serait mis à mort, quelle que soit sa condition sociale, homme ou femme. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Ils prêtèrent serment à l’Eternel, d’une voix forte, au milieu des acclamations et au son des trompettes et des cors. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Tout le royaume de Juda fut dans la joie à cause de ce serment, car ses habitants avaient prêté ce serment de tout leur cœur. C’était de plein gré qu’ils avaient décidé de s’attacher à l’Eternel et, par conséquent, il intervint en leur faveur et leur assura la paix sur toutes leurs frontières.
- type: usfm
  marker: r
  children:
  - type: text
    text: (1 R 15.13-15)
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Le roi Asa destitua même sa grand-mère Maaka de son rang de reine mère parce qu’elle avait fait dresser à la déesse Ashéra une idole obscène. Asa abattit cette horrible idole, la réduisit en pièces, et la fit brûler dans la vallée du Cédron. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Cependant, bien qu’Asa ait eu un cœur sans partage durant toute sa vie, les hauts lieux ne disparurent pas d’Israël. '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Il déposa dans le temple de Dieu tous les objets d’argent et d’or, et d’autres ustensiles que son père avait consacrés, en y ajoutant ceux que lui-même consacra.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Il n’y eut plus de guerre jusqu’à la trente-cinquième année de son règne.
