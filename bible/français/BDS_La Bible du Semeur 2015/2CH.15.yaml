document_id: 2CH.15,21
type_code: fra
verses:
  '1':
  - type: heading
    content: Asa renouvelle l’alliance avec l’Eternel
  - type: text
    content: 'L’Esprit de Dieu saisit Azaria, fils d’Oded, '
  '10':
  - type: text
    content: Ils se rassemblèrent tous à Jérusalem le troisième mois de la quinzième année du règne d’Asa
  - type: note
    content: En 895 av. J.-C. La fête des Semaines (Pentecôte) avait lieu durant ce mois (Lv 23.15-21).
  - type: text
    content: '. '
  '11':
  - type: text
    content: 'Ce jour-là, ils offrirent des sacrifices à l’Eternel, en prenant une part du butin qu’ils avaient ramené : sept cents bœufs et sept mille moutons. '
  '12':
  - type: text
    content: 'Ils s’engagèrent par une alliance à s’attacher à l’Eternel, le Dieu de leurs ancêtres, de tout leur cœur et de tout leur être. '
  '13':
  - type: text
    content: 'Cette alliance stipulait que quiconque ne s’attacherait pas à l’Eternel, le Dieu d’Israël, serait mis à mort, quelle que soit sa condition sociale, homme ou femme. '
  '14':
  - type: text
    content: 'Ils prêtèrent serment à l’Eternel, d’une voix forte, au milieu des acclamations et au son des trompettes et des cors. '
  '15':
  - type: text
    content: Tout le royaume de Juda fut dans la joie à cause de ce serment, car ses habitants avaient prêté ce serment de tout leur cœur. C’était de plein gré qu’ils avaient décidé de s’attacher à l’Eternel et, par conséquent, il intervint en leur faveur et leur assura la paix sur toutes leurs frontières.
  - type: heading
    content: (1 R 15.13-15)
  '16':
  - type: text
    content: 'Le roi Asa destitua même sa grand-mère Maaka de son rang de reine mère parce qu’elle avait fait dresser à la déesse Ashéra une idole obscène. Asa abattit cette horrible idole, la réduisit en pièces, et la fit brûler dans la vallée du Cédron. '
  '17':
  - type: text
    content: 'Cependant, bien qu’Asa ait eu un cœur sans partage durant toute sa vie, les hauts lieux ne disparurent pas d’Israël. '
  '18':
  - type: text
    content: Il déposa dans le temple de Dieu tous les objets d’argent et d’or, et d’autres ustensiles que son père avait consacrés, en y ajoutant ceux que lui-même consacra.
  '19':
  - type: text
    content: Il n’y eut plus de guerre jusqu’à la trente-cinquième année de son règne.
  '2':
  - type: text
    content: 'qui s’avança à la rencontre d’Asa et lui dit :'
  - type: text
    content: Ecoutez-moi, Asa, ╵vous, tous les Judéens ╵et les Benjaminites !
  - type: text
    content: L’Eternel sera avec vous ╵tant que vous serez avec lui ;
  - type: text
    content: si vous vous attachez à lui, ╵il interviendra en votre faveur ;
  - type: text
    content: si vous l’abandonnez, ╵lui, il vous abandonnera.
  '3':
  - type: text
    content: Pendant de nombreux jours, ╵Israël a vécu ╵sans avoir ni vrai Dieu,
  - type: text
    content: ni prêtres qui l’enseignent, ╵et sans avoir de Loi
  - type: note
    content: Voir Jg 2.10-23.
  - type: text
    content: .
  '4':
  - type: text
    content: Au sein de la détresse, ╵les hommes d’Israël ╵se sont tournés ╵vers l’Eternel, Dieu d’Israël,
  - type: text
    content: ils se sont adressés à lui,
  - type: text
    content: il est intervenu pour eux.
  '5':
  - type: text
    content: En ces temps-là, ╵il n’y avait ni paix ╵ni sécurité pour tous ceux ╵qui allaient et venaient,
  - type: text
    content: car les temps étaient bien troublés ╵pour tous les habitants ╵de ces contrées.
  '6':
  - type: text
    content: Partout, on se battait, ╵peuple contre autre peuple,
  - type: text
    content: et ville contre ville,
  - type: text
    content: car Dieu leur infligeait ╵des malheurs en tous genres.
  '7':
  - type: text
    content: Quant à vous, soyez fermes, ╵et ne faiblissez pas,
  - type: text
    content: parce que vos efforts ╵auront leur récompense.
  - type: heading
    content: Un temps de réformes
  '8':
  - type: text
    content: Après avoir entendu ce message du prophète [fils d’
  - type: note
    content: Les mots entre crochets manquent dans le texte hébreu traditionnel mais sont rajoutés d’après la Vulgate et la version syriaque (voir v. 1).
  - type: text
    content: ']Oded, Asa en fut encouragé et il fit disparaître les idoles abominables de tout le pays de Juda et de Benjamin, ainsi que des villes dont il s’était emparé dans la région montagneuse d’Ephraïm. Il restaura l’autel de l’Eternel qui se trouvait devant le portique du temple de l’Eternel. '
  '9':
  - type: text
    content: 'Puis il rassembla toute la population de Juda et de Benjamin, ainsi que les émigrés des tribus d’Ephraïm, de Manassé et de Siméon, car beaucoup de gens du royaume d’Israël s’étaient ralliés à lui lorsqu’ils avaient vu que l’Eternel son Dieu était avec lui. '
