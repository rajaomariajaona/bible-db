document_id: NAM.3,21
type_code: fra
verses:
  '1':
  - type: heading
    content: Malheur à la ville sanguinaire
  - type: text
    content: Malheur à toi, ô ville, ╵qui te repais de sang,
  - type: text
    content: ville où tout n’est que fraude ╵et extorsions,
  - type: text
    content: qui ne met pas de terme ╵à toutes ses rapines.
  '10':
  - type: text
    content: Et pourtant, elle aussi ╵est partie en exil,
  - type: text
    content: oui, elle a été déportée
  - type: text
    content: et ses petits enfants ╵ont été écrasés
  - type: text
    content: à tous les coins de rue.
  - type: text
    content: On a tiré au sort ses nobles ╵pour les réduire en esclavage,
  - type: text
    content: et tous ses grands ╵ont été enchaînés.
  '11':
  - type: text
    content: Toi aussi, à ton tour, ╵tu seras enivrée,
  - type: text
    content: tu devras te cacher.
  - type: text
    content: Toi aussi, tu devras ╵chercher refuge ╵contre tes ennemis.
  - type: heading
    content: La situation est désespérée
  '12':
  - type: text
    content: Toutes tes forteresses
  - type: text
    content: 'sont comme des figuiers ╵chargés des premiers fruits :'
  - type: text
    content: à la moindre secousse ils tombent ╵dans une bouche prête à les manger.
  '13':
  - type: text
    content: 'Considère ton peuple :'
  - type: text
    content: il ne reste plus chez toi que des femmes,
  - type: text
    content: et les portes de ton pays
  - type: text
    content: sont, pour tes ennemis, ╵toutes grandes ouvertes ;
  - type: text
    content: le feu a consumé leurs barres.
  '14':
  - type: text
    content: Puise de l’eau ╵en vue du siège,
  - type: text
    content: renforce ta défense.
  - type: text
    content: Va prendre de l’argile, ╵pétris la glaise,
  - type: text
    content: mets en état ton four
  - type: note
    content: 'mets en état ton four. Autre traduction : saisis le moule à briques.'
  - type: text
    content: à briques
  - type: note
    content: Afin de pouvoir renforcer les remparts.
  - type: text
    content: '  !'
  '15':
  - type: text
    content: Là, le feu te consumera,
  - type: text
    content: l’épée vous exterminera,
  - type: text
    content: et elle vous dévorera ╵comme des sauterelles.
  - type: heading
    content: Ninive est déserte
  - type: text
    content: Que ta population pullule ╵comme les sauterelles,
  - type: text
    content: qu’elle pullule comme les criquets !
  '16':
  - type: text
    content: Tu as multiplié ╵tes commis voyageurs,
  - type: text
    content: ils surpassent en nombre ╵les étoiles du ciel,
  - type: text
    content: tout comme des criquets font irruption, ╵puis prennent leur envol.
  '17':
  - type: text
    content: Ils pullulaient, tes inspecteurs, ╵comme des sauterelles,
  - type: text
    content: 'tes officiers grouillaient ╵comme des essaims de criquets :'
  - type: text
    content: ils se posent dans une haie ╵par un jour de froidure.
  - type: text
    content: Dès que le soleil brille, ╵les voilà envolés,
  - type: text
    content: et disparus on ne sait où.
  '18':
  - type: text
    content: Roi d’Assyrie, ╵tes dirigeants sont endormis ╵de leur dernier sommeil.
  - type: text
    content: Tes nobles sont couchés à terre,
  - type: text
    content: toutes tes troupes ╵sont dispersées sur les montagnes,
  - type: text
    content: et nul ne les rassemble.
  - type: heading
    content: Le désastre est irrémédiable
  '19':
  - type: text
    content: Irrémédiable est ton désastre !
  - type: text
    content: Ta plaie est incurable.
  - type: text
    content: Tous ceux qui apprendront ╵ce qui t’est arrivé
  - type: text
    content: applaudiront à ton sujet.
  - type: text
    content: Car qui n’a pas subi ╵ton incessante cruauté ?
  '2':
  - type: text
    content: Fouets qui claquent !
  - type: text
    content: Fracas des roues !
  - type: text
    content: Des chevaux au galop !
  - type: text
    content: Déferlement de chars !
  '3':
  - type: text
    content: Charge des cavaliers !
  - type: text
    content: Flamboiement des épées !
  - type: text
    content: Eclairs des lances !
  - type: text
    content: Blessés sans nombre !
  - type: text
    content: Amas de corps !
  - type: text
    content: 'A perte de vue : des cadavres !'
  - type: text
    content: On trébuche sur les cadavres.
  - type: heading
    content: La prostituée au pilori
  '4':
  - type: text
    content: Tout cela c’est à cause ╵des nombreuses débauches ╵de la prostituée
  - type: note
    content: Référence à la déesse de la fécondité assyrienne, à son culte qui s’accompagnait de prostitution sacrée, et peut-être à la richesse de Ninive due à ses échanges commerciaux (voir Es 23.15-18).
  - type: text
    content: à la beauté si séduisante, ╵experte en sortilèges,
  - type: text
    content: qui asservissait les nations ╵par ses prostitutions,
  - type: text
    content: de même que les peuples ╵par ses enchantements.
  '5':
  - type: text
    content: Je vais m’en prendre à toi,
  - type: text
    content: l’Eternel le déclare, ╵le Seigneur des armées célestes,
  - type: text
    content: et je vais retrousser ╵tous les pans de ta robe ╵jusque sur ton visage.
  - type: text
    content: Je t’exhiberai nue ╵aux autres peuples,
  - type: text
    content: j’exposerai ta honte ╵devant tous les royaumes.
  '6':
  - type: text
    content: Je jetterai sur toi ╵des masses d’immondices,
  - type: text
    content: et je t’avilirai,
  - type: text
    content: je te donnerai en spectacle.
  '7':
  - type: text
    content: Tous ceux qui te verront ╵s’enfuiront loin de toi
  - type: text
    content: 'en criant : « Ninive est détruite !'
  - type: text
    content: Qui aurait pitié d’elle ? »
  - type: text
    content: Pour toi où chercherais-je ╵des gens pour te réconforter ?
  - type: heading
    content: Ninive subira le sort de Thèbes
  '8':
  - type: text
    content: As-tu quelque avantage ╵sur la ville de Thèbes
  - type: note
    content: Capitale de la Haute-Egypte détruite par Assourbanipal en 663 av. J.-C.
  - type: text
    content: qui était installée ╵entre les bras du Nil,
  - type: text
    content: encerclée par les eaux,
  - type: text
    content: protégée par le fleuve
  - type: text
    content: qu’elle avait pour rempart ?
  '9':
  - type: text
    content: L’Ethiopie et l’Egypte
  - type: text
    content: constituaient sa force ╵qui était sans limite.
  - type: text
    content: Les habitants de Pouth
  - type: note
    content: Région voisine à l’identification incertaine.
  - type: text
    content: ' ╵et ceux de la Libye ╵faisaient partie de ses alliés'
  - type: note
    content: 'ses alliés: selon l’ancienne version grecque et la syriaque. Hébreu : tes alliés.'
  - type: text
    content: .
