document_id: NAM.3,21
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s2
    children:
    - type: text
      text: Malheur à la ville sanguinaire
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: Malheur à toi, ô ville, ╵qui te repais de sang,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ville où tout n’est que fraude ╵et extorsions,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: qui ne met pas de terme ╵à toutes ses rapines.
  '10':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et pourtant, elle aussi ╵est partie en exil,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: oui, elle a été déportée
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et ses petits enfants ╵ont été écrasés
  - type: usfm
    marker: q1
    children:
    - type: text
      text: à tous les coins de rue.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: On a tiré au sort ses nobles ╵pour les réduire en esclavage,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et tous ses grands ╵ont été enchaînés.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Toi aussi, à ton tour, ╵tu seras enivrée,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: tu devras te cacher.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Toi aussi, tu devras ╵chercher refuge ╵contre tes ennemis.
  - type: usfm
    marker: s2
    children:
    - type: text
      text: La situation est désespérée
    marker-yv: yv-h
  '12':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Toutes tes forteresses
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'sont comme des figuiers ╵chargés des premiers fruits :'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: à la moindre secousse ils tombent ╵dans une bouche prête à les manger.
  '13':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Considère ton peuple :'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: il ne reste plus chez toi que des femmes,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et les portes de ton pays
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sont, pour tes ennemis, ╵toutes grandes ouvertes ;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: le feu a consumé leurs barres.
  '14':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Puise de l’eau ╵en vue du siège,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: renforce ta défense.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Va prendre de l’argile, ╵pétris la glaise,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: mets en état ton four
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '3.14 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'mets en état ton four. '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Autre traduction : '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: saisis le moule à briques.
      marker-yv: yv-n
  - type: usfm
    marker: q1
    children:
    - type: text
      text: à briques
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '3.14 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Afin de pouvoir renforcer les remparts.
      marker-yv: yv-n
    - type: text
      text: '  !'
  '15':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Là, le feu te consumera,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: l’épée vous exterminera,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et elle vous dévorera ╵comme des sauterelles.
  - type: usfm
    marker: s2
    children:
    - type: text
      text: Ninive est déserte
    marker-yv: yv-h
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Que ta population pullule ╵comme les sauterelles,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: qu’elle pullule comme les criquets !
  '16':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tu as multiplié ╵tes commis voyageurs,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ils surpassent en nombre ╵les étoiles du ciel,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: tout comme des criquets font irruption, ╵puis prennent leur envol.
  '17':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ils pullulaient, tes inspecteurs, ╵comme des sauterelles,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'tes officiers grouillaient ╵comme des essaims de criquets :'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ils se posent dans une haie ╵par un jour de froidure.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Dès que le soleil brille, ╵les voilà envolés,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et disparus on ne sait où.
  '18':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Roi d’Assyrie, ╵tes dirigeants sont endormis ╵de leur dernier sommeil.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tes nobles sont couchés à terre,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: toutes tes troupes ╵sont dispersées sur les montagnes,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et nul ne les rassemble.
  - type: usfm
    marker: s2
    children:
    - type: text
      text: Le désastre est irrémédiable
    marker-yv: yv-h
  '19':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Irrémédiable est ton désastre !
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ta plaie est incurable.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tous ceux qui apprendront ╵ce qui t’est arrivé
  - type: usfm
    marker: q1
    children:
    - type: text
      text: applaudiront à ton sujet.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Car qui n’a pas subi ╵ton incessante cruauté ?
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fouets qui claquent !
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fracas des roues !
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Des chevaux au galop !
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Déferlement de chars !
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Charge des cavaliers !
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Flamboiement des épées !
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Eclairs des lances !
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Blessés sans nombre !
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Amas de corps !
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'A perte de vue : des cadavres !'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: On trébuche sur les cadavres.
  - type: usfm
    marker: s2
    children:
    - type: text
      text: La prostituée au pilori
    marker-yv: yv-h
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tout cela c’est à cause ╵des nombreuses débauches ╵de la prostituée
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '3.4 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Référence à la déesse de la fécondité assyrienne, à son culte qui s’accompagnait de prostitution sacrée, et peut-être à la richesse de Ninive due à ses échanges commerciaux (voir '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: Es 23.15-18
        - type: text
          text: ).
      marker-yv: yv-n
  - type: usfm
    marker: q1
    children:
    - type: text
      text: à la beauté si séduisante, ╵experte en sortilèges,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: qui asservissait les nations ╵par ses prostitutions,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: de même que les peuples ╵par ses enchantements.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Je vais m’en prendre à toi,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: l’Eternel le déclare, ╵le Seigneur des armées célestes,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et je vais retrousser ╵tous les pans de ta robe ╵jusque sur ton visage.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Je t’exhiberai nue ╵aux autres peuples,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: j’exposerai ta honte ╵devant tous les royaumes.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Je jetterai sur toi ╵des masses d’immondices,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et je t’avilirai,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: je te donnerai en spectacle.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tous ceux qui te verront ╵s’enfuiront loin de toi
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'en criant : « Ninive est détruite !'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Qui aurait pitié d’elle ? »
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Pour toi où chercherais-je ╵des gens pour te réconforter ?
  - type: usfm
    marker: s2
    children:
    - type: text
      text: Ninive subira le sort de Thèbes
    marker-yv: yv-h
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: As-tu quelque avantage ╵sur la ville de Thèbes
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '3.8 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Capitale de la Haute-Egypte détruite par Assourbanipal en 663 av. J.-C.
      marker-yv: yv-n
  - type: usfm
    marker: q1
    children:
    - type: text
      text: qui était installée ╵entre les bras du Nil,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: encerclée par les eaux,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: protégée par le fleuve
  - type: usfm
    marker: q1
    children:
    - type: text
      text: qu’elle avait pour rempart ?
  '9':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: L’Ethiopie et l’Egypte
  - type: usfm
    marker: q1
    children:
    - type: text
      text: constituaient sa force ╵qui était sans limite.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Les habitants de Pouth
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '3.9 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Région voisine à l’identification incertaine.
      marker-yv: yv-n
    - type: text
      text: ' ╵et ceux de la Libye ╵faisaient partie de ses alliés'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '3.9 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: ses alliés
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: ': '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'selon l’ancienne version grecque et la syriaque. Hébreu : '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: tes alliés.
      marker-yv: yv-n
    - type: text
      text: .
