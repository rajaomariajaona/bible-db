document_id: ECC.4
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: La vie sociale
  marker-yv: yv-h
- type: usfm
  marker: s2
  children:
  - type: text
    text: Les oppressions
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'J’ai encore considéré toutes les oppressions qui se pratiquent sous le soleil. Les opprimés versent des larmes et il n’y a personne pour les consoler ; la force est du côté de leurs oppresseurs, sans qu’il y ait quelqu’un pour les consoler. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Alors j’ai trouvé que les défunts, eux qui sont morts, ont un avantage sur les vivants, sur ceux qui sont encore en vie
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '4.2 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Pour les v. 2-3, voir 6.3-5 ; Jb 3.11-16 ; 10.18-19.
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Et s’en trouve mieux que les uns et les autres celui qui n’est pas encore venu à l’existence, parce qu’il n’a pas vu tout le mal qui se commet sous le soleil.
- type: usfm
  marker: s2
  children:
  - type: text
    text: Sur le travail
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'J’ai aussi constaté que tout labeur et que toute habileté que les hommes mettent à leurs œuvres sont motivés par la rivalité des uns envers les autres. Cela aussi est dérisoire : autant courir après le vent.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Celui qui se croise les bras est un insensé et il se détruit lui-même. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Il vaut mieux une main pleine de repos que deux mains pleines de labeur, que de courir ainsi après le vent.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'J’ai encore constaté une autre chose dérisoire sous le soleil. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Voilà un homme seul qui n’a personne avec lui : ni fils, ni frère, et pourtant, il travaille dur sans jamais s’arrêter. Jamais ses yeux ne se rassasient de richesses. « Pour qui donc est-ce que je travaille si dur ? Pour qui est-ce que je me prive de bonnes choses ? » se dit-il. Cela aussi est dérisoire ; c’est une bien mauvaise affaire.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Mieux vaut être à deux que tout seul. On tire alors un bon profit de son labeur. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Et si l’un tombe, l’autre le relève, mais malheur à celui qui est seul et qui vient à tomber sans avoir personne pour l’aider à se relever.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: De même, si deux personnes dorment ensemble, elles se tiennent chaud, mais comment celui qui est seul se réchauffera-t-il ?
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Un homme seul est facilement maîtrisé par un adversaire, mais à deux ils pourront tenir tête à celui-ci. Et une corde faite de trois cordelettes tressées n’est pas vite rompue.
- type: usfm
  marker: s2
  children:
  - type: text
    text: La vie politique
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Mieux vaut un jeune homme pauvre mais sage qu’un roi âgé et insensé qui ne sait plus écouter les conseils. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Mais que le jeune successeur soit sorti de prison pour accéder au trône, ou encore qu’il soit né pauvre dans le royaume, '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'j’ai constaté que tous les humains qui vivent sous le soleil se rallient à lui lorsqu’il prend la place du roi. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Il n’y a pas de fin au cortège de tout ce peuple, de tous ces gens dont il a pris la tête. Et pourtant, la génération suivante ne se félicitera pas davantage d’avoir un tel roi ! Cela encore est dérisoire : autant courir après le vent.'
- type: usfm
  marker: s2
  children:
  - type: text
    text: Sur la piété
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Veille bien sur tes pas lorsque tu te rends au sanctuaire de Dieu. Il est préférable de s’y rendre pour écouter, plutôt que pour offrir un sacrifice à la manière des insensés qui n’ont même pas conscience de faire le mal.
