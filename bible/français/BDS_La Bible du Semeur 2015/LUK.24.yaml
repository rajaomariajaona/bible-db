document_id: LUK.24
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Jésus est ressuscité !
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: (Mt 28.1-9 ; Mc 16.1-8 ; Jn 20.1-10)
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Le dimanche matin de très bonne heure, les femmes se rendirent au tombeau emportant les huiles aromatiques qu’elles avaient préparées. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Elles découvrirent que la pierre fermant l’entrée du sépulcre avait été roulée à quelque distance de l’ouverture. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Elles pénétrèrent à l’intérieur, mais ne trouvèrent pas le corps du Seigneur Jésus. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Pendant qu’elles en étaient encore à se demander ce que cela signifiait, deux personnages vêtus d’habits étincelants se tinrent tout à coup devant elles. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Elles étaient tout effrayées et baissaient les yeux vers le sol. Ils leur dirent alors : Pourquoi cherchez-vous parmi les morts celui qui est vivant ? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Il n’est plus ici, mais il est ressuscité. Rappelez-vous ce qu’il vous disait quand il était encore en Galilée : '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: '« Il faut que le '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Fils de l’homme
    - type: text
      text: ' soit livré entre les mains des pécheurs, qu’il soit crucifié, et qu’il ressuscite le troisième jour. »'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Elles se souvinrent alors des paroles de Jésus. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Elles revinrent du tombeau et allèrent tout raconter aux Onze, ainsi qu’à tous les autres disciples. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'C’étaient Marie de Magdala, Jeanne, Marie, la mère de Jacques. Quelques autres femmes, qui étaient avec elles, portèrent aussi la nouvelle aux apôtres ; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: mais ceux-ci trouvèrent leurs propos absurdes et n’y ajoutèrent pas foi.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Pierre, cependant, partit et courut au tombeau. En se penchant, il ne vit que des linges funéraires. Il s’en retourna, très étonné de ce qui s’était passé
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '24.12 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Ce verset est absent de certains manuscrits.
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: s1
  children:
  - type: text
    text: Jésus apparaît à quelques disciples
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '24.13 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Voir '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Mc 16.12-13
        metadata:
          usfm: MRK.16.12+MRK.16.13
      - type: text
        text: .
    marker-yv: yv-n
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Le même jour, deux de ces disciples se rendaient à un village nommé Emmaüs, à une douzaine de kilomètres de Jérusalem. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Ils s’entretenaient de tous ces événements. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Pendant qu’ils échangeaient ainsi leurs propos et leurs réflexions, Jésus lui-même s’approcha d’eux et les accompagna. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Mais leurs yeux étaient incapables de le reconnaître.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Il leur dit : '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: De quoi discutez-vous en marchant ?
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Ils s’arrêtèrent, l’air attristé. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'L’un d’eux, nommé Cléopas, lui répondit : Es-tu le seul parmi ceux qui séjournent à Jérusalem qui ne sache pas ce qui s’y est passé ces jours-ci ?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: ' '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: – Quoi donc ?
  - type: text
    text: ' leur demanda-t-il.'
- type: usfm
  marker: p
  children:
  - type: text
    text: '– Ce qui est arrivé à Jésus de Nazareth. C’était un prophète qui agissait et parlait avec puissance, devant Dieu et devant tout le peuple. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Nos chefs des prêtres et nos dirigeants l’ont livré aux Romains pour le faire condamner à mort et clouer sur une croix. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Nous avions espéré qu’il était celui qui devait délivrer Israël. Mais hélas ! Voilà déjà trois jours que tout cela est arrivé.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Il est vrai que quelques femmes de notre groupe nous ont fort étonnés. Elles sont allées au tombeau très tôt ce matin, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'mais elles n’ont pas trouvé son corps et sont venues raconter qu’elles ont vu apparaître des anges qui leur ont assuré qu’il est vivant. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: Là-dessus, quelques-uns de ceux qui étaient avec nous se sont aussi rendus au tombeau ; ils ont bien trouvé les choses telles que les femmes les ont décrites ; mais lui, ils ne l’ont pas vu.
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Alors Jésus leur dit : '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Ah ! hommes sans intelligence ! Vous êtes bien lents à croire tout ce que les prophètes ont annoncé.
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Le Messie ne devait-il pas souffrir toutes ces choses avant d’entrer dans sa gloire ?
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: Alors, commençant par les livres de Moïse et parcourant tous ceux des prophètes, Jésus leur expliqua ce qui se rapportait à lui dans toutes les Ecritures.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'Entre-temps, ils arrivèrent près du village où ils se rendaient. Jésus sembla vouloir continuer sa route. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'Mais ils le retinrent avec une vive insistance en disant : Reste donc avec nous ; tu vois : le jour baisse et le soir approche.'
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Alors il entra dans la maison pour rester avec eux. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'Il se mit à table avec eux, prit le pain et, après avoir prononcé la prière de bénédiction, il le partagea et le leur donna. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'Alors leurs yeux s’ouvrirent et ils le reconnurent… mais, déjà, il avait disparu. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'Et ils se dirent l’un à l’autre : N’avons-nous pas senti comme un feu dans notre cœur pendant qu’il nous parlait en chemin et qu’il nous expliquait les Ecritures ?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: Ils se levèrent sur l’heure et retournèrent à Jérusalem. Ils y trouvèrent les Onze réunis avec leurs compagnons.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: 'Tous les accueillirent par ces paroles : Le Seigneur est réellement ressuscité, il s’est montré à Simon.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: Alors les deux disciples racontèrent à leur tour ce qui leur était arrivé en chemin et comment ils avaient reconnu Jésus au moment où il avait partagé le pain.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Jésus apparaît aux Onze
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '24.36 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Voir '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Mc 16.14-18
        metadata:
          usfm: MRK.16.14+MRK.16.15+MRK.16.16+MRK.16.17+MRK.16.18
      - type: text
        text: .
    marker-yv: yv-n
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: (Jn 20.19-23)
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: 'Pendant qu’ils s’entretenaient ainsi, Jésus se trouva au milieu d’eux et leur dit : '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Que la paix soit avec vous !
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: Mais ils furent saisis de crainte et d’effroi, croyant voir un esprit.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: text
    text: ' '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: – Pourquoi êtes-vous troublés ?
  - type: text
    text: ' leur dit-il. '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Pourquoi les doutes envahissent-ils votre cœur ?
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '39'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Regardez mes mains et mes pieds, et reconnaissez que c’est bien moi. Touchez-moi et regardez ! Car un esprit n’a ni chair ni os. Or, vous voyez bien que j’en ai.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '40'
  - type: text
    text: Tout en disant cela, il leur montra ses mains et ses pieds
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '24.40 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Ce verset est absent de certains manuscrits.
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '41'
  - type: text
    text: 'Mais ils étaient si heureux qu’ils ne parvenaient pas à croire et restaient dans l’étonnement. Alors il leur demanda : '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Avez-vous quelque chose à manger ?
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '42'
  - type: text
    text: 'Ils lui présentèrent un morceau de poisson grillé. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '43'
  - type: text
    text: Il le prit et le mangea sous leurs yeux.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '44'
  - type: text
    text: 'Puis il leur dit : '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'Voici ce que je vous ai dit quand j’étais encore avec vous : « Il faut que s’accomplisse tout ce qui est écrit de moi dans la '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Loi
    - type: text
      text: ' de '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Moïse
    - type: text
      text: ', dans les prophètes, et dans les Psaumes. »'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '45'
  - type: text
    text: Là-dessus, il leur ouvrit l’intelligence pour qu’ils comprennent les Ecritures.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '46'
  - type: text
    text: ' '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: – Vous voyez,
  - type: text
    text: ' leur dit-il, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'les Ecritures enseignent que le '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Messie
    - type: text
      text: ' doit souffrir, qu’il ressuscitera le troisième jour,'
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '47'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: et qu’on annoncera de sa part à tous les peuples, en commençant par Jérusalem, qu’ils doivent changer pour obtenir le pardon des péchés.
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '48'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Vous êtes les témoins de ces événements.
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '49'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Quant à moi, j’enverrai bientôt sur vous ce que mon Père vous a promis. Vous donc, restez ici dans cette ville, jusqu’à ce que vous soyez revêtus de la puissance d’en haut.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Jésus enlevé au ciel
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '50'
  - type: text
    text: Par la suite il les emmena hors de la ville jusqu’aux environs de Béthanie
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '24.50 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Village situé sur le flanc est du mont des Oliviers, colline séparée de Jérusalem par la vallée du Cédron.
    marker-yv: yv-n
  - type: text
    text: ' et là, élevant ses mains, il les bénit.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '51'
  - type: text
    text: Pendant qu’il les bénissait, il les quitta et fut enlevé au ciel.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '52'
  - type: text
    text: 'Quant à eux, après l’avoir adoré, ils retournèrent à Jérusalem, le cœur rempli de joie. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '53'
  - type: text
    text: Là, ils se retrouvaient à toute heure dans la cour du Temple pour louer Dieu.
