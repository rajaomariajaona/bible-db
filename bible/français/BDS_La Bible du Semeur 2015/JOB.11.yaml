document_id: JOB.11
type_code: fra
segments:
- type: usfm
  marker: ms1
  children:
  - type: text
    text: Premier discours de Tsophar
  marker-yv: yv-h
- type: usfm
  marker: s1
  children:
  - type: text
    text: La sagesse de Dieu nous dépasse
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Puis Tsophar de Naama prit la parole et dit :'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Ne répondra-t-on pas ╵à ce flot de paroles ?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Suffit-il de parler ╵pour que l’on ait raison ?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: A cause de tes vains discours, ╵tous devront-ils se taire ?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Railleras-tu ╵sans qu’on t’en fasse honte ?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Or, tu as osé dire : ╵« L’enseignement que j’ai reçu est impeccable,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: je suis pur devant toi. »
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Ah ! S’il plaisait à Dieu ╵de te parler lui-même,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et s’il ouvrait la bouche ╵pour te répondre !
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Il te révélerait ╵de la sagesse les secrets
- type: usfm
  marker: q1
  children:
  - type: text
    text: car elle est bien trop haute ╵pour notre intelligence ;
- type: usfm
  marker: q1
  children:
  - type: text
    text: tu comprendrais alors ╵que Dieu laisse passer ╵une part de tes fautes.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Prétends-tu pénétrer ╵les profondeurs de Dieu,
- type: usfm
  marker: q1
  children:
  - type: text
    text: saisir la perfection ╵du Tout-Puissant ?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Elle est plus haute que le ciel. ╵Que feras-tu ?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et plus profonde que l’abîme
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '11.8 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Il s’agit du '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'séjour des morts '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '(voir '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '7.9'
        metadata:
          usfm: JOB.7.9
      - type: text
        text: ).
    marker-yv: yv-n
  - type: text
    text: . ╵Qu’en sauras-tu ?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Elle est plus longue que la terre,
- type: usfm
  marker: q1
  children:
  - type: text
    text: plus large que la mer.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Si, au passage, ╵il emprisonne le coupable
- type: usfm
  marker: q1
  children:
  - type: text
    text: et s’il le convoque en justice, ╵qui peut s’y opposer ?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Car il connaît bien les trompeurs,
- type: usfm
  marker: q1
  children:
  - type: text
    text: il discerne une faute ╵sans effort d’attention.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Celui qui a la tête vide ╵pourra devenir sage
- type: usfm
  marker: q1
  children:
  - type: text
    text: quand un ânon sauvage ╵naîtra domestiqué
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '11.12 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Traduction incertaine. D’autres comprennent : '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: celui qui a la tête vide ne peut pas plus devenir sage que l’ânon sauvage ne peut naître homme.
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Toi, si tu affermis ton cœur
- type: usfm
  marker: q1
  children:
  - type: text
    text: et si tu tends les bras vers Dieu,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: si tu abandonnes les fautes ╵dont tes mains sont coupables,
- type: usfm
  marker: q1
  children:
  - type: text
    text: si tu ne permets pas ╵à la perversité ╵d’habiter sous ta tente,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: alors tu lèveras la tête ╵sans avoir honte
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '11.15 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Réplique aux paroles de Job (
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '10.15'
        metadata:
          usfm: JOB.10.15
      - type: text
        text: ).
    marker-yv: yv-n
  - type: text
    text: ','
- type: usfm
  marker: q1
  children:
  - type: text
    text: tu tiendras ferme ╵et tu ne craindras rien.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Tu oublieras ta peine,
- type: usfm
  marker: q1
  children:
  - type: text
    text: son souvenir sera ╵comme une eau écoulée.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Ta vie sera plus radieuse ╵que le soleil en plein midi,
- type: usfm
  marker: q1
  children:
  - type: text
    text: l’obscurité ╵luira comme une aurore.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Tu reprendras confiance ╵car l’espoir renaîtra.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et tu regarderas ╵autour de toi
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '11.18 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Autre traduction : '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: et après avoir perdu la face.
    marker-yv: yv-n
  - type: text
    text: ', ╵tu dormiras tranquille,'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: et tu te coucheras ╵sans que nul ne te trouble.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Beaucoup de gens viendront ╵implorer ta faveur.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Mais les yeux des méchants ╵finiront par s’éteindre.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Leur refuge fera défaut,
- type: usfm
  marker: q1
  children:
  - type: text
    text: leur seul espoir ╵sera de rendre l’âme.
