document_id: JOB.11,21
type_code: fra
verses:
  '1':
  - type: heading
    content: Premier discours de Tsophar
  - type: heading
    content: La sagesse de Dieu nous dépasse
  - type: text
    content: 'Puis Tsophar de Naama prit la parole et dit :'
  '10':
  - type: text
    content: Si, au passage, ╵il emprisonne le coupable
  - type: text
    content: et s’il le convoque en justice, ╵qui peut s’y opposer ?
  '11':
  - type: text
    content: Car il connaît bien les trompeurs,
  - type: text
    content: il discerne une faute ╵sans effort d’attention.
  '12':
  - type: text
    content: Celui qui a la tête vide ╵pourra devenir sage
  - type: text
    content: quand un ânon sauvage ╵naîtra domestiqué
  - type: note
    content: 'Traduction incertaine. D’autres comprennent : celui qui a la tête vide ne peut pas plus devenir sage que l’ânon sauvage ne peut naître homme.'
  - type: text
    content: .
  '13':
  - type: text
    content: Toi, si tu affermis ton cœur
  - type: text
    content: et si tu tends les bras vers Dieu,
  '14':
  - type: text
    content: si tu abandonnes les fautes ╵dont tes mains sont coupables,
  - type: text
    content: si tu ne permets pas ╵à la perversité ╵d’habiter sous ta tente,
  '15':
  - type: text
    content: alors tu lèveras la tête ╵sans avoir honte
  - type: note
    content: Réplique aux paroles de Job (10.15).
  - type: text
    content: ','
  - type: text
    content: tu tiendras ferme ╵et tu ne craindras rien.
  '16':
  - type: text
    content: Tu oublieras ta peine,
  - type: text
    content: son souvenir sera ╵comme une eau écoulée.
  '17':
  - type: text
    content: Ta vie sera plus radieuse ╵que le soleil en plein midi,
  - type: text
    content: l’obscurité ╵luira comme une aurore.
  '18':
  - type: text
    content: Tu reprendras confiance ╵car l’espoir renaîtra.
  - type: text
    content: Et tu regarderas ╵autour de toi
  - type: note
    content: 'Autre traduction : et après avoir perdu la face.'
  - type: text
    content: ', ╵tu dormiras tranquille,'
  '19':
  - type: text
    content: et tu te coucheras ╵sans que nul ne te trouble.
  - type: text
    content: Beaucoup de gens viendront ╵implorer ta faveur.
  '2':
  - type: text
    content: Ne répondra-t-on pas ╵à ce flot de paroles ?
  - type: text
    content: Suffit-il de parler ╵pour que l’on ait raison ?
  '20':
  - type: text
    content: Mais les yeux des méchants ╵finiront par s’éteindre.
  - type: text
    content: Leur refuge fera défaut,
  - type: text
    content: leur seul espoir ╵sera de rendre l’âme.
  '3':
  - type: text
    content: A cause de tes vains discours, ╵tous devront-ils se taire ?
  - type: text
    content: Railleras-tu ╵sans qu’on t’en fasse honte ?
  '4':
  - type: text
    content: 'Or, tu as osé dire : ╵« L’enseignement que j’ai reçu est impeccable,'
  - type: text
    content: je suis pur devant toi. »
  '5':
  - type: text
    content: Ah ! S’il plaisait à Dieu ╵de te parler lui-même,
  - type: text
    content: et s’il ouvrait la bouche ╵pour te répondre !
  '6':
  - type: text
    content: Il te révélerait ╵de la sagesse les secrets
  - type: text
    content: car elle est bien trop haute ╵pour notre intelligence ;
  - type: text
    content: tu comprendrais alors ╵que Dieu laisse passer ╵une part de tes fautes.
  '7':
  - type: text
    content: Prétends-tu pénétrer ╵les profondeurs de Dieu,
  - type: text
    content: saisir la perfection ╵du Tout-Puissant ?
  '8':
  - type: text
    content: Elle est plus haute que le ciel. ╵Que feras-tu ?
  - type: text
    content: Et plus profonde que l’abîme
  - type: note
    content: Il s’agit du séjour des morts (voir 7.9).
  - type: text
    content: . ╵Qu’en sauras-tu ?
  '9':
  - type: text
    content: Elle est plus longue que la terre,
  - type: text
    content: plus large que la mer.
