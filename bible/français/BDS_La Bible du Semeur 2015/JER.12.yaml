document_id: JER.12
type_code: fra
segments:
- type: usfm
  marker: s2
  children:
  - type: text
    text: Pourquoi les méchants prospèrent-ils ?
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Tu es juste ! Eternel, ╵comment donc oserais-je ╵contester avec toi
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '12.1 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Autre traduction : '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: cependant je te prendrai à partie.
    marker-yv: yv-n
  - type: text
    text: '  ?'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Cependant, je voudrais ╵discuter avec toi ╵de la justice.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Pourquoi les méchants réussissent-ils ?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Pourquoi les traîtres ╵vivent-ils si tranquilles ?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Oui, tu les as plantés
- type: usfm
  marker: q1
  children:
  - type: text
    text: et ils ont pris racine ;
- type: usfm
  marker: q1
  children:
  - type: text
    text: ils progressent sans cesse
- type: usfm
  marker: q1
  children:
  - type: text
    text: et ils portent du fruit.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ils ont ton nom à la bouche,
- type: usfm
  marker: q1
  children:
  - type: text
    text: mais tu es très loin de leur cœur.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Mais toi, ô Eternel, ╵tu me connais et tu me vois,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et tu sondes mon cœur ╵qui a pris ton parti
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '12.3 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Autre traduction : '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: tu sondes mes pensées à ton sujet.
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: q1
  children:
  - type: text
    text: Entraîne-les, ╵tout comme des moutons ╵qu’on mène à l’abattoir !
- type: usfm
  marker: q1
  children:
  - type: text
    text: Réserve-les, ╵pour le jour du massacre !
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Jusques à quand ╵le pays sera-t-il en deuil,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et l’herbe des campagnes ╵se desséchera-t-elle ?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et tout cela à cause ╵de la méchanceté ╵de ceux qui y habitent ?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Les animaux périssent, ╵ainsi que les oiseaux,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'parce que les gens disent :'
- type: usfm
  marker: q1
  children:
  - type: text
    text: « L’Eternel ne voit pas ╵ce qui nous adviendra. »
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Mais l’Eternel me dit :'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Si, déjà, tu t’épuises
- type: usfm
  marker: q1
  children:
  - type: text
    text: en courant avec des piétons,
- type: usfm
  marker: q1
  children:
  - type: text
    text: comment donc tiendras-tu ╵en courant avec des chevaux ?
- type: usfm
  marker: q1
  children:
  - type: text
    text: S’il te faut un pays tranquille
- type: usfm
  marker: q1
  children:
  - type: text
    text: pour ta sécurité,
- type: usfm
  marker: q1
  children:
  - type: text
    text: qu’adviendra-t-il de toi ╵lorsque tu feras face ╵à la crue
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '12.5 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: la crue
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: ': '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: l’hébreu emploie un terme qui signifie par ailleurs « orgueil ». Ici, il peut s’agir de la crue du Jourdain, ou des fourrés que l’on trouvait sur ses rives et qui étaient peuplés de bêtes sauvages.
    marker-yv: yv-n
  - type: text
    text: ' du Jourdain ?'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Car même les gens de ta parenté,
- type: usfm
  marker: q1
  children:
  - type: text
    text: de ta propre famille, ╵sont traîtres envers toi,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et ils crient bien fort contre toi.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ne te fie pas à eux,
- type: usfm
  marker: q1
  children:
  - type: text
    text: même quand ils t’adressent ╵des propos bienveillants !
- type: usfm
  marker: s2
  children:
  - type: text
    text: 'Le patrimoine de Dieu : un domaine abandonné'
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: J’ai délaissé mon temple,
- type: usfm
  marker: q1
  children:
  - type: text
    text: j’ai rejeté le peuple ╵qui est mon patrimoine,
- type: usfm
  marker: q1
  children:
  - type: text
    text: j’ai livré à ses ennemis
- type: usfm
  marker: q1
  children:
  - type: text
    text: celle que je chéris.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Car le peuple qui m’appartient ╵est devenu pour moi ╵comme un lion de la forêt ;
- type: usfm
  marker: q1
  children:
  - type: text
    text: il rugit contre moi ;
- type: usfm
  marker: q1
  children:
  - type: text
    text: c’est pourquoi je l’ai pris en haine.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Eh quoi ! le peuple ╵qui m’appartient ╵est-il donc devenu pour moi ╵comme un rapace ╵aux couleurs bigarrées
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '12.9 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Les oiseaux de proie s’attaquent, paraît-il, à ceux qui ont un plumage plus éclatant que le leur.
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: text
    text: pour que, de toutes parts, ╵les autres rapaces l’entourent ?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Allez et rassemblez ╵les animaux sauvages !
- type: usfm
  marker: q1
  children:
  - type: text
    text: Qu’on les fasse venir ╵pour le festin !
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Oui, de nombreux bergers
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '12.10 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Voir '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '6.3'
        metadata:
          usfm: JER.6.3
      - type: text
        text: ss Les bergers sont les chefs ennemis.
    marker-yv: yv-n
  - type: text
    text: ' ╵ont saccagé ma vigne'
- type: usfm
  marker: q1
  children:
  - type: text
    text: et foulé mon domaine,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et ils ont transformé ╵mon domaine plaisant
- type: usfm
  marker: q1
  children:
  - type: text
    text: en un désert aride !
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Ils l’ont changé en friche ╵où tout est dévasté ;
- type: usfm
  marker: q1
  children:
  - type: text
    text: le voici devant moi ╵dans sa désolation.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Tout le pays est dévasté
- type: usfm
  marker: q1
  children:
  - type: text
    text: et nul ne s’en soucie.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Sur toutes les hauteurs ╵dans le désert
- type: usfm
  marker: q1
  children:
  - type: text
    text: arrivent les dévastateurs,
- type: usfm
  marker: q1
  children:
  - type: text
    text: car voici que l’épée de l’Eternel ╵ravage le pays ╵d’un bout à l’autre,
- type: usfm
  marker: q1
  children:
  - type: text
    text: il n’y a plus de paix ╵pour aucun être humain.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Ils ont semé du blé,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ils récoltent des ronces ;
- type: usfm
  marker: q1
  children:
  - type: text
    text: ils se sont fatigués ╵pour n’aboutir à rien.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Le fruit de vos moissons ╵vous remplira de honte,
- type: usfm
  marker: q1
  children:
  - type: text
    text: c’est là l’effet de la colère ardente ╵de l’Eternel.
- type: usfm
  marker: s2
  children:
  - type: text
    text: Le sort des mauvais voisins
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Voici ce que déclare l’Eternel au sujet des mauvais voisins qui se sont attaqués au pays que j’avais donné en patrimoine à mon peuple Israël : Je vais les arracher de leur pays, et puis j’arracherai du milieu d’eux la communauté de Juda. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Pourtant, après les avoir arrachés, j’aurai de nouveau compassion d’eux, et je les ferai retourner chacun dans son domaine, chacun dans son pays. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Et s’ils apprennent à se comporter comme mon peuple, s’ils prêtent serment par mon nom, disant : « L’Eternel est vivant », comme ils ont appris à mon peuple à jurer par Baal, alors ils auront une place au milieu de mon peuple. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Mais s’ils n’écoutent pas, j’arracherai définitivement un tel peuple et je le ferai périr, l’Eternel le déclare.
