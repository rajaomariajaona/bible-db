document_id: JER.12,21
type_code: fra
verses:
  '1':
  - type: heading
    content: Pourquoi les méchants prospèrent-ils ?
  - type: text
    content: Tu es juste ! Eternel, ╵comment donc oserais-je ╵contester avec toi
  - type: note
    content: 'Autre traduction : cependant je te prendrai à partie.'
  - type: text
    content: '  ?'
  - type: text
    content: Cependant, je voudrais ╵discuter avec toi ╵de la justice.
  - type: text
    content: Pourquoi les méchants réussissent-ils ?
  - type: text
    content: Pourquoi les traîtres ╵vivent-ils si tranquilles ?
  '10':
  - type: text
    content: Oui, de nombreux bergers
  - type: note
    content: Voir 6.3ss Les bergers sont les chefs ennemis.
  - type: text
    content: ' ╵ont saccagé ma vigne'
  - type: text
    content: et foulé mon domaine,
  - type: text
    content: et ils ont transformé ╵mon domaine plaisant
  - type: text
    content: en un désert aride !
  '11':
  - type: text
    content: Ils l’ont changé en friche ╵où tout est dévasté ;
  - type: text
    content: le voici devant moi ╵dans sa désolation.
  - type: text
    content: Tout le pays est dévasté
  - type: text
    content: et nul ne s’en soucie.
  '12':
  - type: text
    content: Sur toutes les hauteurs ╵dans le désert
  - type: text
    content: arrivent les dévastateurs,
  - type: text
    content: car voici que l’épée de l’Eternel ╵ravage le pays ╵d’un bout à l’autre,
  - type: text
    content: il n’y a plus de paix ╵pour aucun être humain.
  '13':
  - type: text
    content: Ils ont semé du blé,
  - type: text
    content: ils récoltent des ronces ;
  - type: text
    content: ils se sont fatigués ╵pour n’aboutir à rien.
  - type: text
    content: Le fruit de vos moissons ╵vous remplira de honte,
  - type: text
    content: c’est là l’effet de la colère ardente ╵de l’Eternel.
  - type: heading
    content: Le sort des mauvais voisins
  '14':
  - type: text
    content: 'Voici ce que déclare l’Eternel au sujet des mauvais voisins qui se sont attaqués au pays que j’avais donné en patrimoine à mon peuple Israël : Je vais les arracher de leur pays, et puis j’arracherai du milieu d’eux la communauté de Juda. '
  '15':
  - type: text
    content: 'Pourtant, après les avoir arrachés, j’aurai de nouveau compassion d’eux, et je les ferai retourner chacun dans son domaine, chacun dans son pays. '
  '16':
  - type: text
    content: 'Et s’ils apprennent à se comporter comme mon peuple, s’ils prêtent serment par mon nom, disant : « L’Eternel est vivant », comme ils ont appris à mon peuple à jurer par Baal, alors ils auront une place au milieu de mon peuple. '
  '17':
  - type: text
    content: Mais s’ils n’écoutent pas, j’arracherai définitivement un tel peuple et je le ferai périr, l’Eternel le déclare.
  '2':
  - type: text
    content: Oui, tu les as plantés
  - type: text
    content: et ils ont pris racine ;
  - type: text
    content: ils progressent sans cesse
  - type: text
    content: et ils portent du fruit.
  - type: text
    content: Ils ont ton nom à la bouche,
  - type: text
    content: mais tu es très loin de leur cœur.
  '3':
  - type: text
    content: Mais toi, ô Eternel, ╵tu me connais et tu me vois,
  - type: text
    content: et tu sondes mon cœur ╵qui a pris ton parti
  - type: note
    content: 'Autre traduction : tu sondes mes pensées à ton sujet.'
  - type: text
    content: .
  - type: text
    content: Entraîne-les, ╵tout comme des moutons ╵qu’on mène à l’abattoir !
  - type: text
    content: Réserve-les, ╵pour le jour du massacre !
  '4':
  - type: text
    content: Jusques à quand ╵le pays sera-t-il en deuil,
  - type: text
    content: et l’herbe des campagnes ╵se desséchera-t-elle ?
  - type: text
    content: Et tout cela à cause ╵de la méchanceté ╵de ceux qui y habitent ?
  - type: text
    content: Les animaux périssent, ╵ainsi que les oiseaux,
  - type: text
    content: 'parce que les gens disent :'
  - type: text
    content: « L’Eternel ne voit pas ╵ce qui nous adviendra. »
  - type: text
    content: 'Mais l’Eternel me dit :'
  '5':
  - type: text
    content: Si, déjà, tu t’épuises
  - type: text
    content: en courant avec des piétons,
  - type: text
    content: comment donc tiendras-tu ╵en courant avec des chevaux ?
  - type: text
    content: S’il te faut un pays tranquille
  - type: text
    content: pour ta sécurité,
  - type: text
    content: qu’adviendra-t-il de toi ╵lorsque tu feras face ╵à la crue
  - type: note
    content: 'la crue: l’hébreu emploie un terme qui signifie par ailleurs « orgueil ». Ici, il peut s’agir de la crue du Jourdain, ou des fourrés que l’on trouvait sur ses rives et qui étaient peuplés de bêtes sauvages.'
  - type: text
    content: ' du Jourdain ?'
  '6':
  - type: text
    content: Car même les gens de ta parenté,
  - type: text
    content: de ta propre famille, ╵sont traîtres envers toi,
  - type: text
    content: et ils crient bien fort contre toi.
  - type: text
    content: Ne te fie pas à eux,
  - type: text
    content: même quand ils t’adressent ╵des propos bienveillants !
  - type: heading
    content: 'Le patrimoine de Dieu : un domaine abandonné'
  '7':
  - type: text
    content: J’ai délaissé mon temple,
  - type: text
    content: j’ai rejeté le peuple ╵qui est mon patrimoine,
  - type: text
    content: j’ai livré à ses ennemis
  - type: text
    content: celle que je chéris.
  '8':
  - type: text
    content: Car le peuple qui m’appartient ╵est devenu pour moi ╵comme un lion de la forêt ;
  - type: text
    content: il rugit contre moi ;
  - type: text
    content: c’est pourquoi je l’ai pris en haine.
  '9':
  - type: text
    content: Eh quoi ! le peuple ╵qui m’appartient ╵est-il donc devenu pour moi ╵comme un rapace ╵aux couleurs bigarrées
  - type: note
    content: Les oiseaux de proie s’attaquent, paraît-il, à ceux qui ont un plumage plus éclatant que le leur.
  - type: text
    content: pour que, de toutes parts, ╵les autres rapaces l’entourent ?
  - type: text
    content: Allez et rassemblez ╵les animaux sauvages !
  - type: text
    content: Qu’on les fasse venir ╵pour le festin !
