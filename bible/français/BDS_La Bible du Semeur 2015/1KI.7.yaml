document_id: 1KI.7,21
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: La construction du palais royal
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: Salomon entreprit aussi de construire son propre palais. Il lui fallut treize années pour l’achever.
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'Les fondations consistaient en grands blocs de pierres de prix ayant quatre et cinq mètres de long. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: Par-dessus ces fondations étaient posées des pierres taillées sur mesure et des poutres de cèdre.
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: Les murs de la cour du palais étaient faits tout à l’entour de trois rangées de pierres de taille et d’une rangée de poutres de cèdre comme le parvis intérieur du temple de l’Eternel et comme le portique.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: La fabrication des objets de bronze et d’or pour le Temple
    marker-yv: yv-h
  - type: usfm
    marker: s2
    children:
    - type: text
      text: Le fabricant des objets de bronze
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: (2 Ch 2.12-13)
    marker-yv: yv-h
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'Le roi Salomon envoya chercher à Tyr un ouvrier nommé Hiram. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: C’était le fils d’une veuve de la tribu de Nephtali et d’un père tyrien. Il travaillait le bronze. Il était très habile, intelligent et compétent pour fabriquer toutes sortes d’ouvrages de bronze. Il vint auprès du roi Salomon et effectua tous ses ouvrages.
  - type: usfm
    marker: s2
    children:
    - type: text
      text: Les colonnes de bronze
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: (2 Ch 3.15-17)
    marker-yv: yv-h
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'Il fit les deux colonnes de bronze hautes de neuf mètres et ayant cinq mètres cinquante de circonférence. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'Il coula ensuite les deux chapiteaux en bronze destinés au sommet de ces colonnes ; chacun d’eux avait deux mètres cinquante de haut. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'Ces chapiteaux étaient décorés de figures en forme de treillis et de chaînettes en forme de guirlandes. Il y en avait sept sur chaque chapiteau. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'Hiram disposa des grenades en deux rangées autour de chaque treillis pour orner les chapiteaux. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'Sur les colonnes du portique, il y avait un chapiteau de deux mètres de haut en forme de fleur de lis. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: Il bâtit d’abord le palais de la Forêt-du-Liban
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '7.2 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Appelée ainsi peut-être parce que les colonnes de cèdre formaient comme une forêt. Les cèdres venaient du Liban.
      marker-yv: yv-n
    - type: text
      text: ', et lui donna les dimensions suivantes : cinquante mètres de long, vingt-cinq mètres de large et quinze mètres de haut. Son plafond, supporté par des poutres de cèdre, reposait sur quatre rangées de colonnes de cèdre.'
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: 'Au-dessus du renflement qui dépassait le treillis des chapiteaux placés sur les deux colonnes, on pouvait compter deux cents grenades placées en rangées circulaires autour de chaque chapiteau. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: 'Hiram érigea les deux colonnes devant le portique du Temple. Il appela la colonne de droite Yakîn (Il affermit) et celle de gauche Boaz (La force est en Lui). '
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: Sur le sommet de chaque colonne, il y avait une sculpture représentant des lis. Ainsi fut achevée la fabrication des colonnes.
  - type: usfm
    marker: s2
    children:
    - type: text
      text: La grande cuve
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: (2 Ch 4.2-5)
    marker-yv: yv-h
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: Puis il fit la grande cuve ronde en métal fondu
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '7.23 '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'Cuve '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'de bronze employée pour les ablutions rituelles des prêtres (voir '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: Ex 30.17-21
        - type: text
          text: ).
      marker-yv: yv-n
    - type: text
      text: '. Elle mesurait cinq mètres de diamètre et deux mètres cinquante de hauteur, un cordeau de quinze mètres mesurait sa circonférence. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: 'Au-dessous de son rebord, sur tout le pourtour, se trouvaient deux rangées de coloquintes coulées d’une seule pièce avec la cuve. Il y en avait dix par demi-mètre. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: 'La cuve elle-même reposait sur douze bœufs de bronze ayant leurs têtes tournées trois par trois vers le nord, l’ouest, le sud et l’est, alors que la partie postérieure de leur corps était tournée vers l’intérieur et portait la cuve. '
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: La paroi de la cuve avait huit centimètres d’épaisseur et son rebord était façonné comme celui d’une coupe en forme de pétale de lis. Elle contenait environ quarante mille litres d’eau.
  - type: usfm
    marker: s2
    children:
    - type: text
      text: Les chariots de bronze
    marker-yv: yv-h
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: 'Hiram fabriqua ensuite les dix chariots de bronze. Chacun d’eux mesurait deux mètres de long, autant de large et un mètre cinquante de haut. '
  '28':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: 'Ils étaient constitués de châssis faits de plaques de bronze, entretoisées de traverses '
  '29':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: 'sur lesquelles Hiram sculpta des lions, des bœufs et des chérubins, de même que sur les plaques du châssis ; au-dessus et en dessous des lions et des bœufs, il y avait des guirlandes de fleurs. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'Par-dessus les poutres s’étendaient trois rangées de quinze traverses de cèdre, soit quarante-cinq en tout, soutenues aussi par les colonnes. '
  '30':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '30'
    - type: text
      text: 'Chaque chariot avait quatre roues de bronze montées sur des essieux de bronze. Les quatre angles étaient munis de consoles qui allaient plus bas que les guirlandes et étaient destinées à soutenir un bassin. '
  '31':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '31'
    - type: text
      text: 'Sur le dessus de chaque chariot se trouvait un renfoncement circulaire de cinquante centimètres de profondeur et de soixante-quinze centimètres de diamètre pour servir de support au bassin. Hiram y cisela des sculptures. Le châssis était carré et non arrondi. '
  '32':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '32'
    - type: text
      text: 'Les quatre roues se trouvaient sous les traverses et leurs essieux étaient fixés à la base du chariot. Chaque roue avait soixante-quinze centimètres de diamètre. '
  '33':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '33'
    - type: text
      text: 'Elles étaient conçues comme les roues d’un char. Leurs essieux, leurs jantes, leurs rayons et leurs moyeux étaient en métal fondu. '
  '34':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '34'
    - type: text
      text: 'Les quatre consoles aux quatre angles de chaque chariot faisaient corps avec les châssis. '
  '35':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '35'
    - type: text
      text: 'La partie supérieure de chaque chariot était décorée d’une couronne de vingt-cinq centimètres de large qui faisait le tour du renfoncement. Là se trouvaient également des poignées et des traverses qui faisaient corps avec le reste du chariot. '
  '36':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '36'
    - type: text
      text: 'Sur les surfaces libres de ces poignées et de ces traverses, Hiram grava des chérubins, des lions et des palmes, entourés de guirlandes. '
  '37':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '37'
    - type: text
      text: Il procéda de la même manière pour les dix chariots. Ils avaient tous les mêmes dimensions et la même forme, et étaient tous coulés en métal fondu.
  - type: usfm
    marker: r
    children:
    - type: text
      text: (2 Ch 4.6, 10 à 5.1)
    marker-yv: yv-h
  '38':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '38'
    - type: text
      text: 'Il fabriqua encore dix bassins de bronze de deux mètres de diamètre pouvant contenir mille litres d’eau. Chaque bassin reposait sur l’un des dix chariots. '
  '39':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '39'
    - type: text
      text: Il disposa cinq chariots avec leurs bassins à droite du Temple et les cinq autres sur le côté gauche. La grande cuve ronde fut placée du côté droit du Temple vers le sud-est.
  - type: usfm
    marker: s2
    children:
    - type: text
      text: Les accessoires du culte
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: (2 Ch 4.11a)
    marker-yv: yv-h
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'Sur chaque côté du bâtiment, trois rangées de fenêtres à cadres se faisaient face sur trois niveaux. '
  '40':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '40'
    - type: text
      text: Hiram fabriqua les bassins
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '7.40 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Utilisés peut-être pour faire cuire la viande des sacrifices de communion (
        - type: usfm
          marker: ref
          children:
          - type: text
            text: Lv 7.11-17
        - type: text
          text: ).
      marker-yv: yv-n
    - type: text
      text: ', les pelles et les coupes à aspersion'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '7.40 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Voir '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: Ex 27.3
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: .
  - type: usfm
    marker: s2
    children:
    - type: text
      text: Récapitulation des objets de bronze fabriqués
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: (2 Ch 4.11b-18)
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Il termina ainsi tout le travail que le roi Salomon lui avait confié pour le temple de l’Eternel : '
  '41':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '41'
    - type: text
      text: 'les deux colonnes avec leurs chapiteaux évasés qui les surmontaient, les deux treillis pour recouvrir les évasements de ces chapiteaux, '
  '42':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '42'
    - type: text
      text: 'les quatre cents grenades accrochées aux treillis – deux rangées de grenades par treillis – '
  '43':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '43'
    - type: text
      text: 'les dix chariots et les dix bassins placés dessus, '
  '44':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '44'
    - type: text
      text: 'la grande cuve, unique en son genre, et les douze bœufs qui la supportaient, '
  '45':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '45'
    - type: text
      text: 'les chaudrons, les pelles et les coupes à aspersion. Tous ces objets, destinés au temple de l’Eternel, que Hiram avait fabriqués pour le roi Salomon étaient de bronze poli. '
  '46':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '46'
    - type: text
      text: Le roi les fit fondre dans la plaine du Jourdain, dans des couches d’argile, entre Soukkoth et Tsartân
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '7.46 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Soukkoth '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: se trouvait sur la rive orientale du Jourdain (voir Gn 33.17 ; Jos 13.27 ; Jg 8.4-5), un peu au nord de l’embouchure du Yabboq.
      marker-yv: yv-n
    - type: text
      text: '. '
  '47':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '47'
    - type: text
      text: Salomon mit en place tous ces objets ; on ne pouvait évaluer le poids de bronze utilisé, car la quantité en était trop grande.
  - type: usfm
    marker: s2
    children:
    - type: text
      text: Les objets en or
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: (2 Ch 4.19-22)
    marker-yv: yv-h
  '48':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '48'
    - type: text
      text: 'Il fit encore fabriquer tous les autres objets destinés au temple de l’Eternel : l’autel des parfums en or'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '7.48 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Voir '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: Ex 30.1-3
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: ', la table d’or sur laquelle on plaçait les pains exposés devant l’Eternel'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '7.48 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Voir '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: Ex 25.23-30
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: ', '
  '49':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '49'
    - type: text
      text: les chandeliers d’or fin avec leurs lampes, placés cinq à droite et cinq à gauche devant la salle du fond, avec leurs fleurons, leurs lampes et les mouchettes en or
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '7.49 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Dans le tabernacle, il n’y avait qu’un seul chandelier à sept branches (Ex 25.31-40 ; 26.35). Salomon le remplaça par dix chandeliers.
      marker-yv: yv-n
    - type: text
      text: ', '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: Toutes ces portes et ces fenêtres avaient une forme carrée et les fenêtres étaient placées les unes en face des autres en trois rangées.
  '50':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '50'
    - type: text
      text: 'les bassins, les couteaux, les calices, les coupes et les brasiers d’or fin, ainsi que les gonds en or pour les portes de l’intérieur du Temple, à l’entrée du lieu très saint, et pour les portes de la grande salle, à l’entrée du Temple. '
  '51':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '51'
    - type: text
      text: Quand tous les travaux que le roi Salomon fit exécuter pour le temple de l’Eternel furent achevés, Salomon fit apporter les objets que son père David avait consacrés
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '7.51 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Voir 2 S 8.11 ; 1 Ch 18.11.
      marker-yv: yv-n
    - type: text
      text: '  : l’argent, l’or et les ustensiles, et il les déposa dans le trésor du temple de l’Eternel.'
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'Salomon construisit ensuite la salle des colonnes, d’une longueur de vingt-cinq mètres et d’une largeur de quinze mètres. On y entrait par un portique à auvent soutenu par des colonnes sur la façade. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: Puis il fit construire la salle du trône où il rendait la justice, appelée aussi la salle du Jugement. Elle était lambrissée de boiseries de cèdre du sol jusqu’au plafond
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '7.7 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'D’après l’ancienne version grecque et la Vulgate. Le texte hébreu traditionnel a : '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: sur tout le sol.
      marker-yv: yv-n
    - type: text
      text: .
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: Son habitation privée se trouvait dans une autre cour que la salle du Trône. Elle était construite selon le même plan. Salomon fit construire un palais semblable pour la fille du pharaon qu’il avait épousée
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '7.8 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Voir '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: 1 R 3.1
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: .
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'Les murs de tous ces bâtiments, des fondations aux corniches du toit, et les constructions extérieures jusqu’à la muraille de la grande cour, étaient faits de belles pierres de taille, sciées sur mesure sur leurs faces intérieures et extérieures. '
