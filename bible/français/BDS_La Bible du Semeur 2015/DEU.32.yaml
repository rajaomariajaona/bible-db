        text: Pour les v. 48-52, voir Nb 27.12-14 ; Dt 3.23-27.
    marker-yv: yv-n
  - type: text
    text: '  : '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '49'
  - type: text
    text: Monte sur les Abarim, sur le mont Nébo
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '32.49 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Un des sommets du Pisga, la partie nord des monts Abarim.
    marker-yv: yv-n
  - type: text
    text: ' situé dans le pays de Moab en face de Jéricho, et contemple le pays de Canaan que je donne en possession aux Israélites. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '50'
  - type: text
    text: Tu vas mourir sur cette montagne où tu vas monter et tu rejoindras tes ancêtres décédés, comme ton frère Aaron est mort sur la montagne de Hor et est allé rejoindre les siens
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '32.50 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Voir '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Nb 20.22-26
        metadata:
          usfm: NUM.20.22+NUM.20.23+NUM.20.24+NUM.20.25+NUM.20.26
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '51'
  - type: text
    text: Car vous m’avez tous deux désobéi devant les Israélites aux eaux de Meriba près de Qadesh dans le désert de Tsîn. Vous n’avez pas permis à ma sainteté de se manifester devant les Israélites
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '32.51 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Voir '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Nb 20.1-13
        metadata:
          usfm: NUM.20.1+NUM.20.2+NUM.20.3+NUM.20.4+NUM.20.5+NUM.20.6+NUM.20.7+NUM.20.8+NUM.20.9+NUM.20.10+NUM.20.11+NUM.20.12+NUM.20.13
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '52'
  - type: text
    text: C’est de loin seulement que tu verras le pays que je donne aux Israélites, tu n’y entreras pas.
