document_id: DEU.32
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Le cantique de l’alliance
  marker-yv: yv-h
- type: usfm
  marker: s2
  children:
  - type: text
    text: Introduction
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: O ciel, prête l’oreille, ╵je parlerai.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et toi, ô terre, ╵écoute ce que je vais dire.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Mes instructions ruissellent ╵comme la pluie,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et ma parole coule ╵ainsi que la rosée
- type: usfm
  marker: q1
  children:
  - type: text
    text: – comme une fine pluie ╵tombe sur la verdure
- type: usfm
  marker: q1
  children:
  - type: text
    text: ou comme des ondées sur l’herbe.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Car je vais proclamer ╵comment est l’Eternel.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Célébrez la grandeur ╵de notre Dieu !
- type: usfm
  marker: s2
  children:
  - type: text
    text: Dieu est juste, Israël est corrompu
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Il est comme un rocher, ╵ses œuvres sont parfaites,
- type: usfm
  marker: q1
  children:
  - type: text
    text: tout ce qu’il fait est juste.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Il est un Dieu fidèle ╵qui ne commet pas d’injustice,
- type: usfm
  marker: q1
  children:
  - type: text
    text: c’est un Dieu juste et droit.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Mais vous, à son égard, ╵vous êtes corrompus,
- type: usfm
  marker: q1
  children:
  - type: text
    text: vous n’êtes plus ses fils, ╵à cause de vos tares,
- type: usfm
  marker: q1
  children:
  - type: text
    text: gens pervers, dépravés !
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Comment peut-on ainsi ╵se conduire envers lui,
- type: usfm
  marker: q1
  children:
  - type: text
    text: peuple fou, insensé !
- type: usfm
  marker: q1
  children:
  - type: text
    text: N’est-il pas votre père ╵et votre créateur,
- type: usfm
  marker: q1
  children:
  - type: text
    text: celui qui vous a faits, ╵qui vous a établis ?
- type: usfm
  marker: s2
  children:
  - type: text
    text: Les œuvres de Dieu en faveur d’Israël
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Pensez aux jours d’alors
- type: usfm
  marker: q1
  children:
  - type: text
    text: et songez aux années ╵du temps de vos aïeux !
- type: usfm
  marker: q1
  children:
  - type: text
    text: Interrogez vos pères ╵et ils vous le diront,
- type: usfm
  marker: q1
  children:
  - type: text
    text: demandez aux vieillards ╵et ils vous l’apprendront.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Quand le Très-Haut donna ╵un territoire aux peuples,
- type: usfm
  marker: q1
  children:
  - type: text
    text: quand il dissémina ╵les hommes sur la terre,
- type: usfm
  marker: q1
  children:
  - type: text
    text: en fixant les frontières ╵des diverses nations,
- type: usfm
  marker: q1
  children:
  - type: text
    text: il tint compte du nombre ╵des enfants d’Israël
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '32.8 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Texte hébreu traditionnel. Un manuscrit hébreu de Qumrân et plusieurs versions anciennes portent : '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'des anges. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Allusion en '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ac 17.26
        metadata:
          usfm: ACT.17.26
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: L’Eternel a pour bien son peuple ;
- type: usfm
  marker: q1
  children:
  - type: text
    text: les enfants de Jacob, ╵voilà sa possession.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: L’Eternel l’a trouvé ╵dans une steppe aride,
- type: usfm
  marker: q1
  children:
  - type: text
    text: dans un désert inhabité, ╵rempli de hurlements.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Il a pris soin de lui ╵et il l’a éduqué.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Il a veillé sur lui ╵comme sur la prunelle de ses yeux !
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Il fut comme un grand aigle ╵qui pousse sa couvée ╵à prendre son envol,
- type: usfm
  marker: q1
  children:
  - type: text
    text: planant sur ses aiglons,
- type: usfm
  marker: q1
  children:
  - type: text
    text: puis, étendant ses ailes, ╵il les a pris
- type: usfm
  marker: q1
  children:
  - type: text
    text: et portés sur ses ailes.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Lui seul les a conduits,
- type: usfm
  marker: q1
  children:
  - type: text
    text: aucun dieu étranger ╵n’est venu à son aide.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Il les fit chevaucher ╵les hauteurs du pays,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et il les a nourris ╵des productions des champs.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Il leur a fait goûter ╵le miel qui s’écoulait ╵dans le creux des rochers
- type: usfm
  marker: q1
  children:
  - type: text
    text: et l’huile qui jaillit ╵dans un sol rocailleux
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '32.13 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Les abeilles construisent parfois leurs ruches dans des creux de rochers (voir Es 7.18-19 ; Ps 81.17).
    marker-yv: yv-n
  - type: text
    text: ','
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: le lait des vaches ╵et des brebis,
- type: usfm
  marker: q1
  children:
  - type: text
    text: les viandes grasses des agneaux,
- type: usfm
  marker: q1
  children:
  - type: text
    text: des béliers du Basan ╵aussi bien que des boucs.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ils se sont régalés ╵du meilleur des froments,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ils ont bu le vin rouge ╵extrait de bons raisins.
- type: usfm
  marker: s2
  children:
  - type: text
    text: La trahison d’Israël
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Mais bientôt Yeshouroun
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '32.15 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Nom poétique d’Israël (voir 33.5 ; Es 44.2), signifiant : '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: celui qui est droit.
    marker-yv: yv-n
  - type: text
    text: ', ╵après s’être engraissé, ╵s’est mis à regimber.'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Devenu gros et gras, ╵bien chargé d’embonpoint,
- type: usfm
  marker: q1
  children:
  - type: text
    text: il a abandonné ╵le Dieu qui l’a créé,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et il a méprisé ╵le Roc qui l’a sauvé.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Ils l’ont rendu jaloux ╵parce qu’ils l’ont trahi ╵en suivant d’autres dieux,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et ils l’ont irrité ╵par leurs pratiques ╵abominables.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Ils ont sacrifié ╵à des démons ╵qui ne sont pas des dieux,
- type: usfm
  marker: q1
  children:
  - type: text
    text: à des divinités ╵qu’ils n’avaient pas connues,
- type: usfm
  marker: q1
  children:
  - type: text
    text: des dieux nouveaux venus,
- type: usfm
  marker: q1
  children:
  - type: text
    text: des dieux que vos ancêtres ╵n’avaient pas redoutés
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '32.17 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Voir '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1 Co 10.20
        metadata:
          usfm: 1CO.10.20
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Israël, tu oublies ╵le rocher protecteur ╵par lequel tu es né,
- type: usfm
  marker: q1
  children:
  - type: text
    text: tu négliges le Dieu ╵qui t’a donné la vie.
- type: usfm
  marker: s2
  children:
  - type: text
    text: La colère de l’Eternel
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Quand l’Eternel l’a vu, ╵il s’est mis en colère :'
- type: usfm
  marker: q1
  children:
  - type: text
    text: il était offensé ╵par ses fils et ses filles,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'et il a déclaré : ╵« Je me détourne d’eux,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: je verrai bien alors ╵le sort qui les attend.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Car ce sont des gens fourbes,
- type: usfm
  marker: q1
  children:
  - type: text
    text: des enfants infidèles
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '32.20 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Autre traduction : '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: pas dignes de confiance.
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Ils m’ont rendu jaloux ╵par ce qui n’est pas Dieu
- type: usfm
  marker: q1
  children:
  - type: text
    text: et ils m’ont irrité ╵par des divinités ╵qui ne sont pas des dieux.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Eh bien, de mon côté, ╵je les rendrai jaloux ╵de ceux qui ne sont pas un peuple
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '32.21 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Texte cité dans '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Rm 10.19
        metadata:
          usfm: ROM.10.19
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: q1
  children:
  - type: text
    text: Je les irriterai ╵par une nation folle.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: Comme un feu, ma colère ╵s’enflamme,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et elle brûle ╵jusqu’au fond de l’abîme,
- type: usfm
  marker: q1
  children:
  - type: text
    text: elle incendie la terre ╵avec tous ses produits,
- type: usfm
  marker: q1
  children:
  - type: text
    text: elle va embraser ╵les fondements des monts.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: Je lancerai contre eux ╵un malheur après l’autre,
- type: usfm
  marker: q1
  children:
  - type: text
    text: j’épuiserai mes flèches ╵à les persécuter.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: Ils seront consumés ╵par la famine, ╵dévorés par la fièvre
- type: usfm
  marker: q1
  children:
  - type: text
    text: et la peste mortelle,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et j’enverrai encore ╵contre eux les crocs des fauves
- type: usfm
  marker: q1
  children:
  - type: text
    text: et les poisons brûlants ╵des serpents venimeux.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: A l’extérieur des murs, ╵c’est l’épée qui les prive ╵de leurs enfants ;
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'au-dedans, c’est l’effroi :'
- type: usfm
  marker: q1
  children:
  - type: text
    text: jeune homme et jeune fille,
- type: usfm
  marker: q1
  children:
  - type: text
    text: nourrisson et vieillard ╵auront le même sort.
- type: usfm
  marker: s2
  children:
  - type: text
    text: Contre les ennemis du peuple de l’Eternel
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: Je voulais tout d’abord ╵les réduire à néant
- type: usfm
  marker: q1
  children:
  - type: text
    text: et faire disparaître ╵jusqu’à leur souvenir ╵du milieu des humains.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: Mais ce que je craignais ╵c’est que les ennemis ╵y trouvent l’occasion ╵de venir m’insulter,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'et que leurs adversaires ╵se méprennent et disent :'
- type: usfm
  marker: q1
  children:
  - type: text
    text: “C’est par notre puissance ╵que nous avons vaincu”,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'et non : “C’est l’Eternel ╵qui a fait tout cela !” »'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: Car voilà bien un peuple ╵dont les projets avortent ;
- type: usfm
  marker: q1
  children:
  - type: text
    text: ils n’ont pas de bon sens.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: S’ils en avaient un peu, ╵ils auraient bien compris,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ils auraient réfléchi ╵à ce qui les attend.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: Comment est-il possible ╵qu’un guerrier à lui seul ╵en poursuive un millier,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ou que deux seulement ╵en fassent fuir dix mille,
- type: usfm
  marker: q1
  children:
  - type: text
    text: si Dieu, qui fut toujours ╵leur rocher protecteur, ╵ne les avait vendus,
- type: usfm
  marker: q1
  children:
  - type: text
    text: si l’Eternel n’avait ╵livré son peuple à d’autres ?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: Car leur rocher n’est pas ╵comme notre rocher.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Même nos ennemis ╵devront le reconnaître.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: Ils sont comme une vigne ╵transplantée de Sodome,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ce sont des plantations ╵qui viennent de Gomorrhe.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ils ne font que produire ╵des raisins vénéneux,
- type: usfm
  marker: q1
  children:
  - type: text
    text: leurs grappes sont amères.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: Leur vin est un venin ╵craché par des serpents,
- type: usfm
  marker: q1
  children:
  - type: text
    text: c’est un poison mortel ╵craché par des vipères.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: Mais je tiens en réserve,
- type: usfm
  marker: q1
  children:
  - type: text
    text: scellé dans mes trésors, ╵de quoi faire justice.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: C’est à moi qu’il revient ╵de leur payer leur dû
- type: usfm
  marker: q1
  children:
  - type: text
    text: au moment où leur pied ╵viendra à trébucher,
- type: usfm
  marker: q1
  children:
  - type: text
    text: car le jour de leur ruine ╵se rapproche à grands pas,
- type: usfm
  marker: q1
  children:
  - type: text
    text: le sort prévu pour eux ╵se hâte de venir
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '32.35 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Cité en Rm 12.19 ; Hé 10.30.
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: 'Car voici : l’Eternel ╵rend justice à son peuple,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: et il a compassion ╵de nous ses serviteurs
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '32.36 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Cité en '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ps 135.14
        metadata:
          usfm: PSA.135.14
      - type: text
        text: .
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: text
    text: quand il constatera ╵qu’ils sont à bout de forces,
- type: usfm
  marker: q1
  children:
  - type: text
    text: qu’il n’y a plus chez eux ╵ni esclave, ni libre.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: 'Alors il s’écriera : ╵« Où donc sont leurs faux dieux ?'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Où donc est le rocher ╵auquel ils se confiaient ?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: text
    text: Et ces dieux qui mangeaient ╵la graisse des victimes,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et qui buvaient le vin ╵offert en libation ?
- type: usfm
  marker: q1
  children:
  - type: text
    text: A présent qu’ils se lèvent ╵et viennent vous aider !
- type: usfm
  marker: q1
  children:
  - type: text
    text: Qu’ils soient votre refuge !
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '39'
  - type: text
    text: 'Reconnaissez-le donc : ╵C’est moi seul qui suis Dieu,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: il n’y en a pas d’autre !
- type: usfm
  marker: q1
  children:
  - type: text
    text: C’est moi qui fais mourir ╵et moi seul qui fais vivre,
- type: usfm
  marker: q1
  children:
  - type: text
    text: c’est moi qui ai blessé, ╵c’est moi qui guérirai,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et de ma main, ╵nul ne peut délivrer.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '40'
  - type: text
    text: La main levée au ciel, j’atteste
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'et je déclare : ╵Aussi vrai que je vis ╵à perpétuité,'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '41'
  - type: text
    text: 'voici : j’aiguiserai ╵la lame de l’épée,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: et ma main brandira ╵l’arme du jugement,
- type: usfm
  marker: q1
  children:
  - type: text
    text: je ferai rendre compte ╵à tous mes ennemis,
- type: usfm
  marker: q1
  children:
  - type: text
    text: je paierai de retour ╵tous ceux qui me haïssent.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '42'
  - type: text
    text: J’enivrerai mes flèches ╵du sang des adversaires,
- type: usfm
  marker: q1
  children:
  - type: text
    text: mon épée pourfendra ╵la chair de ses victimes
- type: usfm
  marker: q1
  children:
  - type: text
    text: et la tête des chefs ╵des peuples ennemis.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Je verserai le sang ╵des blessés, des captifs. »
- type: usfm
  marker: s2
  children:
  - type: text
    text: Conclusion
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '43'
  - type: text
    text: Peuples, réjouissez-vous ╵avec son peuple
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '32.43 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'D’après l’ancienne version grecque. Cité en '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Rm 15.10
        metadata:
          usfm: ROM.15.10
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: '  !'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Adorez-le ╵vous tous les anges
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '32.43 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Ces mots, absents du texte hébreu traditionnel, se trouvent dans les manuscrits de Qumrân et l’ancienne version grecque. Cité en '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Hé 1.6
        metadata:
          usfm: HEB.1.6
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: q1
  children:
  - type: text
    text: Car Dieu venge la mort ╵de ceux qui sont ses serviteurs,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et il paie de retour ╵ses ennemis.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Il fait l’expiation ╵pour son pays et pour son peuple.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '44'
  - type: text
    text: Moïse, accompagné d’Osée
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '32.44 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'C’est-à-dire Josué. Voir '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Nb 13.16
        metadata:
          usfm: NUM.13.16
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: ', fils de Noun, vint réciter tout le texte de ce cantique au peuple.'
- type: usfm
  marker: s1
  children:
  - type: text
    text: L’appel à l’obéissance
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '45'
  - type: text
    text: 'Quand il eut achevé de communiquer toutes ces paroles à tout le peuple d’Israël, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '46'
  - type: text
    text: 'il leur dit : Prenez à cœur toutes ces paroles par lesquelles je témoigne contre vous aujourd’hui. Vous les inculquerez à vos enfants afin qu’ils obéissent à tous les commandements de cette Loi et qu’ils les appliquent. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '47'
  - type: text
    text: 'Car ce n’est pas une parole sans importance pour vous ; d’elle dépend votre vie même : en lui obéissant vous obtiendrez une longue vie dans le pays dont vous allez prendre possession après avoir traversé le Jourdain.'
- type: usfm
  marker: s1
  children:
  - type: text
    text: L’ordre de gravir le mont Nébo
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '48'
  - type: text
    text: Ce même jour, l’Eternel parla à Moïse et lui dit
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '32.48 '
    - type: usfm
      marker: ft
