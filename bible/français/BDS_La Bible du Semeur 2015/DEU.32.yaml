document_id: DEU.32,21
type_code: fra
verses:
  '1':
  - type: heading
    content: Le cantique de l’alliance
  - type: heading
    content: Introduction
  - type: text
    content: O ciel, prête l’oreille, ╵je parlerai.
  - type: text
    content: Et toi, ô terre, ╵écoute ce que je vais dire.
  '10':
  - type: text
    content: L’Eternel l’a trouvé ╵dans une steppe aride,
  - type: text
    content: dans un désert inhabité, ╵rempli de hurlements.
  - type: text
    content: Il a pris soin de lui ╵et il l’a éduqué.
  - type: text
    content: Il a veillé sur lui ╵comme sur la prunelle de ses yeux !
  '11':
  - type: text
    content: Il fut comme un grand aigle ╵qui pousse sa couvée ╵à prendre son envol,
  - type: text
    content: planant sur ses aiglons,
  - type: text
    content: puis, étendant ses ailes, ╵il les a pris
  - type: text
    content: et portés sur ses ailes.
  '12':
  - type: text
    content: Lui seul les a conduits,
  - type: text
    content: aucun dieu étranger ╵n’est venu à son aide.
  '13':
  - type: text
    content: Il les fit chevaucher ╵les hauteurs du pays,
  - type: text
    content: et il les a nourris ╵des productions des champs.
  - type: text
    content: Il leur a fait goûter ╵le miel qui s’écoulait ╵dans le creux des rochers
  - type: text
    content: et l’huile qui jaillit ╵dans un sol rocailleux
  - type: note
    content: Les abeilles construisent parfois leurs ruches dans des creux de rochers (voir Es 7.18-19 ; Ps 81.17).
  - type: text
    content: ','
  '14':
  - type: text
    content: le lait des vaches ╵et des brebis,
  - type: text
    content: les viandes grasses des agneaux,
  - type: text
    content: des béliers du Basan ╵aussi bien que des boucs.
  - type: text
    content: Ils se sont régalés ╵du meilleur des froments,
  - type: text
    content: ils ont bu le vin rouge ╵extrait de bons raisins.
  - type: heading
    content: La trahison d’Israël
  '15':
  - type: text
    content: Mais bientôt Yeshouroun
  - type: note
    content: 'Nom poétique d’Israël (voir 33.5 ; Es 44.2), signifiant : celui qui est droit.'
  - type: text
    content: ', ╵après s’être engraissé, ╵s’est mis à regimber.'
  - type: text
    content: Devenu gros et gras, ╵bien chargé d’embonpoint,
  - type: text
    content: il a abandonné ╵le Dieu qui l’a créé,
  - type: text
    content: et il a méprisé ╵le Roc qui l’a sauvé.
  '16':
  - type: text
    content: Ils l’ont rendu jaloux ╵parce qu’ils l’ont trahi ╵en suivant d’autres dieux,
  - type: text
    content: et ils l’ont irrité ╵par leurs pratiques ╵abominables.
  '17':
  - type: text
    content: Ils ont sacrifié ╵à des démons ╵qui ne sont pas des dieux,
  - type: text
    content: à des divinités ╵qu’ils n’avaient pas connues,
  - type: text
    content: des dieux nouveaux venus,
  - type: text
    content: des dieux que vos ancêtres ╵n’avaient pas redoutés
  - type: note
    content: Voir 1 Co 10.20.
  - type: text
    content: .
  '18':
  - type: text
    content: Israël, tu oublies ╵le rocher protecteur ╵par lequel tu es né,
  - type: text
    content: tu négliges le Dieu ╵qui t’a donné la vie.
  - type: heading
    content: La colère de l’Eternel
  '19':
  - type: text
    content: 'Quand l’Eternel l’a vu, ╵il s’est mis en colère :'
  - type: text
    content: il était offensé ╵par ses fils et ses filles,
  '2':
  - type: text
    content: Mes instructions ruissellent ╵comme la pluie,
  - type: text
    content: et ma parole coule ╵ainsi que la rosée
  - type: text
    content: – comme une fine pluie ╵tombe sur la verdure
  - type: text
    content: ou comme des ondées sur l’herbe.
  '20':
  - type: text
    content: 'et il a déclaré : ╵« Je me détourne d’eux,'
  - type: text
    content: je verrai bien alors ╵le sort qui les attend.
  - type: text
    content: Car ce sont des gens fourbes,
  - type: text
    content: des enfants infidèles
  - type: note
    content: 'Autre traduction : pas dignes de confiance.'
  - type: text
    content: .
  '21':
  - type: text
    content: Ils m’ont rendu jaloux ╵par ce qui n’est pas Dieu
  - type: text
    content: et ils m’ont irrité ╵par des divinités ╵qui ne sont pas des dieux.
  - type: text
    content: Eh bien, de mon côté, ╵je les rendrai jaloux ╵de ceux qui ne sont pas un peuple
  - type: note
    content: Texte cité dans Rm 10.19.
  - type: text
    content: .
  - type: text
    content: Je les irriterai ╵par une nation folle.
  '22':
  - type: text
    content: Comme un feu, ma colère ╵s’enflamme,
  - type: text
    content: et elle brûle ╵jusqu’au fond de l’abîme,
  - type: text
    content: elle incendie la terre ╵avec tous ses produits,
  - type: text
    content: elle va embraser ╵les fondements des monts.
  '23':
  - type: text
    content: Je lancerai contre eux ╵un malheur après l’autre,
  - type: text
    content: j’épuiserai mes flèches ╵à les persécuter.
  '24':
  - type: text
    content: Ils seront consumés ╵par la famine, ╵dévorés par la fièvre
  - type: text
    content: et la peste mortelle,
  - type: text
    content: et j’enverrai encore ╵contre eux les crocs des fauves
  - type: text
    content: et les poisons brûlants ╵des serpents venimeux.
  '25':
  - type: text
    content: A l’extérieur des murs, ╵c’est l’épée qui les prive ╵de leurs enfants ;
  - type: text
    content: 'au-dedans, c’est l’effroi :'
  - type: text
    content: jeune homme et jeune fille,
  - type: text
    content: nourrisson et vieillard ╵auront le même sort.
  - type: heading
    content: Contre les ennemis du peuple de l’Eternel
  '26':
  - type: text
    content: Je voulais tout d’abord ╵les réduire à néant
  - type: text
    content: et faire disparaître ╵jusqu’à leur souvenir ╵du milieu des humains.
  '27':
  - type: text
    content: Mais ce que je craignais ╵c’est que les ennemis ╵y trouvent l’occasion ╵de venir m’insulter,
  - type: text
    content: 'et que leurs adversaires ╵se méprennent et disent :'
  - type: text
    content: “C’est par notre puissance ╵que nous avons vaincu”,
  - type: text
    content: 'et non : “C’est l’Eternel ╵qui a fait tout cela !” »'
  '28':
  - type: text
    content: Car voilà bien un peuple ╵dont les projets avortent ;
  - type: text
    content: ils n’ont pas de bon sens.
  '29':
  - type: text
    content: S’ils en avaient un peu, ╵ils auraient bien compris,
  - type: text
    content: ils auraient réfléchi ╵à ce qui les attend.
  '3':
  - type: text
    content: Car je vais proclamer ╵comment est l’Eternel.
  - type: text
    content: Célébrez la grandeur ╵de notre Dieu !
  - type: heading
    content: Dieu est juste, Israël est corrompu
  '30':
  - type: text
    content: Comment est-il possible ╵qu’un guerrier à lui seul ╵en poursuive un millier,
  - type: text
    content: ou que deux seulement ╵en fassent fuir dix mille,
  - type: text
    content: si Dieu, qui fut toujours ╵leur rocher protecteur, ╵ne les avait vendus,
  - type: text
    content: si l’Eternel n’avait ╵livré son peuple à d’autres ?
  '31':
  - type: text
    content: Car leur rocher n’est pas ╵comme notre rocher.
  - type: text
    content: Même nos ennemis ╵devront le reconnaître.
  '32':
  - type: text
    content: Ils sont comme une vigne ╵transplantée de Sodome,
  - type: text
    content: ce sont des plantations ╵qui viennent de Gomorrhe.
  - type: text
    content: Ils ne font que produire ╵des raisins vénéneux,
  - type: text
    content: leurs grappes sont amères.
  '33':
  - type: text
    content: Leur vin est un venin ╵craché par des serpents,
  - type: text
    content: c’est un poison mortel ╵craché par des vipères.
  '34':
  - type: text
    content: Mais je tiens en réserve,
  - type: text
    content: scellé dans mes trésors, ╵de quoi faire justice.
  '35':
  - type: text
    content: C’est à moi qu’il revient ╵de leur payer leur dû
  - type: text
    content: au moment où leur pied ╵viendra à trébucher,
  - type: text
    content: car le jour de leur ruine ╵se rapproche à grands pas,
  - type: text
    content: le sort prévu pour eux ╵se hâte de venir
  - type: note
    content: Cité en Rm 12.19 ; Hé 10.30.
  - type: text
    content: .
  '36':
  - type: text
    content: 'Car voici : l’Eternel ╵rend justice à son peuple,'
  - type: text
    content: et il a compassion ╵de nous ses serviteurs
  - type: note
    content: Cité en Ps 135.14.
  - type: text
    content: quand il constatera ╵qu’ils sont à bout de forces,
  - type: text
    content: qu’il n’y a plus chez eux ╵ni esclave, ni libre.
  '37':
  - type: text
    content: 'Alors il s’écriera : ╵« Où donc sont leurs faux dieux ?'
  - type: text
    content: Où donc est le rocher ╵auquel ils se confiaient ?
  '38':
  - type: text
    content: Et ces dieux qui mangeaient ╵la graisse des victimes,
  - type: text
    content: et qui buvaient le vin ╵offert en libation ?
  - type: text
    content: A présent qu’ils se lèvent ╵et viennent vous aider !
  - type: text
    content: Qu’ils soient votre refuge !
  '39':
  - type: text
    content: 'Reconnaissez-le donc : ╵C’est moi seul qui suis Dieu,'
  - type: text
    content: il n’y en a pas d’autre !
  - type: text
    content: C’est moi qui fais mourir ╵et moi seul qui fais vivre,
  - type: text
    content: c’est moi qui ai blessé, ╵c’est moi qui guérirai,
  - type: text
    content: et de ma main, ╵nul ne peut délivrer.
  '4':
  - type: text
    content: Il est comme un rocher, ╵ses œuvres sont parfaites,
  - type: text
    content: tout ce qu’il fait est juste.
  - type: text
    content: Il est un Dieu fidèle ╵qui ne commet pas d’injustice,
  - type: text
    content: c’est un Dieu juste et droit.
  '40':
  - type: text
    content: La main levée au ciel, j’atteste
  - type: text
    content: 'et je déclare : ╵Aussi vrai que je vis ╵à perpétuité,'
  '41':
  - type: text
    content: 'voici : j’aiguiserai ╵la lame de l’épée,'
  - type: text
    content: et ma main brandira ╵l’arme du jugement,
  - type: text
    content: je ferai rendre compte ╵à tous mes ennemis,
  - type: text
    content: je paierai de retour ╵tous ceux qui me haïssent.
  '42':
  - type: text
    content: J’enivrerai mes flèches ╵du sang des adversaires,
  - type: text
    content: mon épée pourfendra ╵la chair de ses victimes
  - type: text
    content: et la tête des chefs ╵des peuples ennemis.
  - type: text
    content: Je verserai le sang ╵des blessés, des captifs. »
  - type: heading
    content: Conclusion
  '43':
  - type: text
    content: Peuples, réjouissez-vous ╵avec son peuple
  - type: note
    content: D’après l’ancienne version grecque. Cité en Rm 15.10.
  - type: text
    content: '  !'
  - type: text
    content: Adorez-le ╵vous tous les anges
  - type: note
    content: Ces mots, absents du texte hébreu traditionnel, se trouvent dans les manuscrits de Qumrân et l’ancienne version grecque. Cité en Hé 1.6.
  - type: text
    content: .
  - type: text
    content: Car Dieu venge la mort ╵de ceux qui sont ses serviteurs,
  - type: text
    content: et il paie de retour ╵ses ennemis.
  - type: text
    content: Il fait l’expiation ╵pour son pays et pour son peuple.
  '44':
  - type: text
    content: Moïse, accompagné d’Osée
  - type: note
    content: C’est-à-dire Josué. Voir Nb 13.16.
  - type: text
    content: ', fils de Noun, vint réciter tout le texte de ce cantique au peuple.'
  - type: heading
    content: L’appel à l’obéissance
  '45':
  - type: text
    content: 'Quand il eut achevé de communiquer toutes ces paroles à tout le peuple d’Israël, '
  '46':
  - type: text
    content: 'il leur dit : Prenez à cœur toutes ces paroles par lesquelles je témoigne contre vous aujourd’hui. Vous les inculquerez à vos enfants afin qu’ils obéissent à tous les commandements de cette Loi et qu’ils les appliquent. '
  '47':
  - type: text
    content: 'Car ce n’est pas une parole sans importance pour vous ; d’elle dépend votre vie même : en lui obéissant vous obtiendrez une longue vie dans le pays dont vous allez prendre possession après avoir traversé le Jourdain.'
  - type: heading
    content: L’ordre de gravir le mont Nébo
  '48':
  - type: text
    content: Ce même jour, l’Eternel parla à Moïse et lui dit
  - type: note
    content: Pour les v. 48-52, voir Nb 27.12-14 ; Dt 3.23-27.
  - type: text
    content: '  : '
  '49':
  - type: text
    content: Monte sur les Abarim, sur le mont Nébo
  - type: note
    content: Un des sommets du Pisga, la partie nord des monts Abarim.
  - type: text
    content: ' situé dans le pays de Moab en face de Jéricho, et contemple le pays de Canaan que je donne en possession aux Israélites. '
  '5':
  - type: text
    content: Mais vous, à son égard, ╵vous êtes corrompus,
  - type: text
    content: vous n’êtes plus ses fils, ╵à cause de vos tares,
  - type: text
    content: gens pervers, dépravés !
  '50':
  - type: text
    content: Tu vas mourir sur cette montagne où tu vas monter et tu rejoindras tes ancêtres décédés, comme ton frère Aaron est mort sur la montagne de Hor et est allé rejoindre les siens
  - type: note
    content: Voir Nb 20.22-26.
  - type: text
    content: '. '
  '51':
  - type: text
    content: Car vous m’avez tous deux désobéi devant les Israélites aux eaux de Meriba près de Qadesh dans le désert de Tsîn. Vous n’avez pas permis à ma sainteté de se manifester devant les Israélites
  - type: note
    content: Voir Nb 20.1-13.
  - type: text
    content: '. '
  '52':
  - type: text
    content: C’est de loin seulement que tu verras le pays que je donne aux Israélites, tu n’y entreras pas.
  '6':
  - type: text
    content: Comment peut-on ainsi ╵se conduire envers lui,
  - type: text
    content: peuple fou, insensé !
  - type: text
    content: N’est-il pas votre père ╵et votre créateur,
  - type: text
    content: celui qui vous a faits, ╵qui vous a établis ?
  - type: heading
    content: Les œuvres de Dieu en faveur d’Israël
  '7':
  - type: text
    content: Pensez aux jours d’alors
  - type: text
    content: et songez aux années ╵du temps de vos aïeux !
  - type: text
    content: Interrogez vos pères ╵et ils vous le diront,
  - type: text
    content: demandez aux vieillards ╵et ils vous l’apprendront.
  '8':
  - type: text
    content: Quand le Très-Haut donna ╵un territoire aux peuples,
  - type: text
    content: quand il dissémina ╵les hommes sur la terre,
  - type: text
    content: en fixant les frontières ╵des diverses nations,
  - type: text
    content: il tint compte du nombre ╵des enfants d’Israël
  - type: note
    content: 'Texte hébreu traditionnel. Un manuscrit hébreu de Qumrân et plusieurs versions anciennes portent : des anges. Allusion en Ac 17.26.'
  - type: text
    content: .
  '9':
  - type: text
    content: L’Eternel a pour bien son peuple ;
  - type: text
    content: les enfants de Jacob, ╵voilà sa possession.
