document_id: JOB.41,21
type_code: fra
verses:
  '1':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: Vois, devant lui, ╵tout espoir de le vaincre ╵est illusoire.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: A sa vue seule, ╵on sera terrassé.
  '10':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'Il éternue : ╵c’est un jet de lumière'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '41.10 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Par sa respiration et ses éternuements, de fines gouttelettes sont projetées en l’air ; éclairées par les rayons du soleil, elles font l’effet de jets de lumière.
      marker-yv: yv-n
    - type: text
      text: .
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ses yeux ressemblent ╵aux lueurs de l’aurore
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '41.10 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Dans l’écriture hiéroglyphique, l’aurore est représentée par des yeux de crocodile.
      marker-yv: yv-n
    - type: text
      text: .
  '11':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: Des étincelles ╵jaillissent de sa gueule,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ce sont des gerbes ╵de flammes qui s’échappent.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: De ses narines ╵la fumée sort en jets
  - type: usfm
    marker: q1
    children:
    - type: text
      text: comme d’une marmite ╵ou d’un chaudron bouillant.
  '13':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: Son souffle embrase ╵comme un charbon ardent
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et, de sa gueule, ╵une flamme jaillit.
  '14':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: C’est dans son cou ╵que sa vigueur réside,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et la terreur ╵danse au-devant de lui.
  '15':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: Qu’ils sont massifs, ╵les replis de sa peau !
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Soudés sur lui, ╵ils sont inébranlables.
  '16':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: Son cœur est dur, ╵figé comme une pierre
  - type: usfm
    marker: q1
    children:
    - type: text
      text: il est durci ╵comme une meule à grain.
  '17':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: Quand il se dresse
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '41.17 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Autre traduction : '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: Devant sa majesté.
      marker-yv: yv-n
    - type: text
      text: ', ╵les plus vaillants ont peur.'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ils se dérobent, ╵saisis par l’épouvante.
  '18':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: L’épée l’atteint ╵sans trouver nulle prise
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '41.18 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Autre traduction : '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: Pour celui qui l’approche, l’épée ne sert à rien.
      marker-yv: yv-n
    - type: text
      text: ','
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et il en va de même de la lance, ╵de la flèche ou du javelot.
  '19':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: Pour lui, le fer ╵est comme de la paille,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: il prend le bronze ╵pour du bois vermoulu.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: Nul n’aura assez de courage ╵pour l’exciter.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Qui donc alors ╵pourrait me tenir tête ?
  '20':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: Les traits de l’arc ╵ne le font jamais fuir
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et les cailloux ╵qu’on lance avec la fronde ╵ne sont pour lui ╵que des fétus de paille.
  '21':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: Oui, la massue ╵est pour lui un fétu de paille,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et il se rit ╵du sifflement des lances.
  '22':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: Son ventre, armé ╵de tessons acérés,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: est une herse ╵qu’il traîne sur la boue.
  '23':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: Les eaux profondes, ╵il les fait bouillonner ╵comme un chaudron.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Il transforme le lac, ╵lorsqu’il y entre, ╵en un brûle-parfum.
  '24':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: Sur son passage ╵son sillage étincelle.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Les flots paraissent ╵couverts de cheveux blancs.
  '25':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: Nul n’est son maître ╵ici-bas sur la terre.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Il fut créé ╵pour ne rien redouter.
  '26':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: Il brave tous les grands colosses.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Il est le roi ╵des plus fiers animaux.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: Qui m’a prêté ╵pour que j’aie à lui rendre ?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tout est à moi ╵sous l’étendue du ciel
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '41.3 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Cité en '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: Rm 11.35
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: .
  '4':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: Je ne veux pas ╵me taire sur ses membres,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et je dirai sa force, ╵et la beauté ╵de sa constitution.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: Qui a ouvert ╵par-devant son habit
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '41.5 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Sa carapace est comparée à une cuirasse couvrant son corps.
      marker-yv: yv-n
    - type: text
      text: '  ?'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Qui a franchi ╵les deux rangs de ses dents ?
  '6':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: Qui a forcé ╵les battants de sa gueule ?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ses crocs aigus ╵font régner la terreur.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: Majestueuses ╵sont ses rangées d’écailles,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et tels des boucliers ╵scellés entre eux,
  '8':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: serrées les unes ╵contre les autres,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'de sorte qu’aucun souffle ╵ne pourrait se glisser entre elles :'
  '9':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: soudées ensemble, ╵chacune à sa voisine,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: elles se tiennent ╵et sont inséparables.
