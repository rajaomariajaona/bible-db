document_id: JOB.41,21
type_code: fra
verses:
  '1':
  - type: text
    content: Vois, devant lui, ╵tout espoir de le vaincre ╵est illusoire.
  - type: text
    content: A sa vue seule, ╵on sera terrassé.
  '10':
  - type: text
    content: 'Il éternue : ╵c’est un jet de lumière'
  - type: note
    content: Par sa respiration et ses éternuements, de fines gouttelettes sont projetées en l’air ; éclairées par les rayons du soleil, elles font l’effet de jets de lumière.
  - type: text
    content: .
  - type: text
    content: Ses yeux ressemblent ╵aux lueurs de l’aurore
  - type: note
    content: Dans l’écriture hiéroglyphique, l’aurore est représentée par des yeux de crocodile.
  - type: text
    content: .
  '11':
  - type: text
    content: Des étincelles ╵jaillissent de sa gueule,
  - type: text
    content: ce sont des gerbes ╵de flammes qui s’échappent.
  '12':
  - type: text
    content: De ses narines ╵la fumée sort en jets
  - type: text
    content: comme d’une marmite ╵ou d’un chaudron bouillant.
  '13':
  - type: text
    content: Son souffle embrase ╵comme un charbon ardent
  - type: text
    content: et, de sa gueule, ╵une flamme jaillit.
  '14':
  - type: text
    content: C’est dans son cou ╵que sa vigueur réside,
  - type: text
    content: et la terreur ╵danse au-devant de lui.
  '15':
  - type: text
    content: Qu’ils sont massifs, ╵les replis de sa peau !
  - type: text
    content: Soudés sur lui, ╵ils sont inébranlables.
  '16':
  - type: text
    content: Son cœur est dur, ╵figé comme une pierre
  - type: text
    content: il est durci ╵comme une meule à grain.
  '17':
  - type: text
    content: Quand il se dresse
  - type: note
    content: 'Autre traduction : Devant sa majesté.'
  - type: text
    content: ', ╵les plus vaillants ont peur.'
  - type: text
    content: Ils se dérobent, ╵saisis par l’épouvante.
  '18':
  - type: text
    content: L’épée l’atteint ╵sans trouver nulle prise
  - type: note
    content: 'Autre traduction : Pour celui qui l’approche, l’épée ne sert à rien.'
  - type: text
    content: ','
  - type: text
    content: et il en va de même de la lance, ╵de la flèche ou du javelot.
  '19':
  - type: text
    content: Pour lui, le fer ╵est comme de la paille,
  - type: text
    content: il prend le bronze ╵pour du bois vermoulu.
  '2':
  - type: text
    content: Nul n’aura assez de courage ╵pour l’exciter.
  - type: text
    content: Qui donc alors ╵pourrait me tenir tête ?
  '20':
  - type: text
    content: Les traits de l’arc ╵ne le font jamais fuir
  - type: text
    content: et les cailloux ╵qu’on lance avec la fronde ╵ne sont pour lui ╵que des fétus de paille.
  '21':
  - type: text
    content: Oui, la massue ╵est pour lui un fétu de paille,
  - type: text
    content: et il se rit ╵du sifflement des lances.
  '22':
  - type: text
    content: Son ventre, armé ╵de tessons acérés,
  - type: text
    content: est une herse ╵qu’il traîne sur la boue.
  '23':
  - type: text
    content: Les eaux profondes, ╵il les fait bouillonner ╵comme un chaudron.
  - type: text
    content: Il transforme le lac, ╵lorsqu’il y entre, ╵en un brûle-parfum.
  '24':
  - type: text
    content: Sur son passage ╵son sillage étincelle.
  - type: text
    content: Les flots paraissent ╵couverts de cheveux blancs.
  '25':
  - type: text
    content: Nul n’est son maître ╵ici-bas sur la terre.
  - type: text
    content: Il fut créé ╵pour ne rien redouter.
  '26':
  - type: text
    content: Il brave tous les grands colosses.
  - type: text
    content: Il est le roi ╵des plus fiers animaux.
  '3':
  - type: text
    content: Qui m’a prêté ╵pour que j’aie à lui rendre ?
  - type: text
    content: Tout est à moi ╵sous l’étendue du ciel
  - type: note
    content: Cité en Rm 11.35.
  - type: text
    content: .
  '4':
  - type: text
    content: Je ne veux pas ╵me taire sur ses membres,
  - type: text
    content: et je dirai sa force, ╵et la beauté ╵de sa constitution.
  '5':
  - type: text
    content: Qui a ouvert ╵par-devant son habit
  - type: note
    content: Sa carapace est comparée à une cuirasse couvrant son corps.
  - type: text
    content: '  ?'
  - type: text
    content: Qui a franchi ╵les deux rangs de ses dents ?
  '6':
  - type: text
    content: Qui a forcé ╵les battants de sa gueule ?
  - type: text
    content: Ses crocs aigus ╵font régner la terreur.
  '7':
  - type: text
    content: Majestueuses ╵sont ses rangées d’écailles,
  - type: text
    content: et tels des boucliers ╵scellés entre eux,
  '8':
  - type: text
    content: serrées les unes ╵contre les autres,
  - type: text
    content: 'de sorte qu’aucun souffle ╵ne pourrait se glisser entre elles :'
  '9':
  - type: text
    content: soudées ensemble, ╵chacune à sa voisine,
  - type: text
    content: elles se tiennent ╵et sont inséparables.
