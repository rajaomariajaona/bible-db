document_id: 2KI.12,21
type_code: fra
verses:
  '1':
  - type: heading
    content: Appréciation sur le règne de Joas
  - type: heading
    content: (2 Ch 24.1-14 ; 24.23-27)
  - type: text
    content: 'Joas était âgé de sept ans lorsqu’il devint roi. '
  '10':
  - type: text
    content: 'Le prêtre Yehoyada prit un coffre, dont il fit percer le couvercle d’un trou, puis il le plaça à côté de l’autel, à droite de l’entrée du Temple. Les prêtres qui surveillaient cette entrée y déposaient tout l’argent qui était apporté au temple de l’Eternel. '
  '11':
  - type: text
    content: 'Lorsqu’ils constataient qu’il y avait beaucoup d’argent dans le tronc, le secrétaire du roi venait avec le grand-prêtre, ils emportaient les dons puis les comptaient ensemble. '
  '12':
  - type: text
    content: 'Une fois l’argent comptabilisé, ils le remettaient aux entrepreneurs qui avaient la responsabilité des travaux du Temple. Avec cet argent, ceux-ci payaient les charpentiers et les ouvriers du bâtiment qui travaillaient à la réparation du temple de l’Eternel, '
  '13':
  - type: text
    content: 'ainsi que les maçons et les tailleurs de pierres. Ils achetaient le bois et les pierres de taille nécessaires pour réparer les dégradations du temple de l’Eternel et couvraient tous les frais de cette réfection. '
  '14':
  - type: text
    content: On n’utilisa pas les sommes apportées au Temple pour confectionner des coupes à aspersion, des couteaux, des coupes, des trompettes ou d’autres objets d’or ou d’argent
  - type: note
    content: Voir 1 R 7.50.
  - type: text
    content: '. '
  '15':
  - type: text
    content: 'On le remettait intégralement aux artisans qui faisaient le travail afin qu’ils effectuent les réparations du Temple. '
  '16':
  - type: text
    content: 'D’ailleurs, on ne demandait pas de comptes aux hommes chargés de payer les ouvriers qui exécutaient l’ouvrage, car c’étaient des gens honnêtes. '
  '17':
  - type: text
    content: L’argent versé à la place d’un sacrifice de culpabilité ou d’un sacrifice pour le péché n’était pas déposé dans le coffre du Temple, il revenait aux prêtres
  - type: note
    content: Voir Lv 7.7.
  - type: text
    content: .
  - type: heading
    content: La fin de Joas
  '18':
  - type: text
    content: En ce temps-là
  - type: note
    content: Vers la fin du règne de Joas (voir 2 Ch 24.18-25).
  - type: text
    content: ', Hazaël, roi de Syrie, vint attaquer la ville de Gath'
  - type: note
    content: L’une des cinq principales villes de la Philistie (Jos 13.3), conquise par David (1 Ch 18.1), qui demeura soumise à Juda durant le règne de Roboam (2 Ch 11.8).
  - type: text
    content: ' et s’en empara, puis il décida de marcher sur Jérusalem. '
  '19':
  - type: text
    content: Joas, roi de Juda, prit tous les objets consacrés, ceux que ses ancêtres Josaphat, Yoram et Ahazia, rois de Juda, avaient consacrés. Il y ajouta ceux qu’il avait lui-même consacrés et tout l’or déposé dans la chambre du trésor du temple de l’Eternel et dans le palais royal, et il fit porter le tout à Hazaël, roi de Syrie. Là-dessus, celui-ci se détourna de Jérusalem.
  '2':
  - type: text
    content: Il accéda au trône la septième année du règne de Jéhu et régna quarante ans à Jérusalem
  - type: note
    content: De 835 à 796 av. J.-C.
  - type: text
    content: '. Sa mère se nommait Tsibia, elle était originaire de Beer-Sheva. '
  '20':
  - type: text
    content: 'Les autres faits et gestes de Joas et toutes ses réalisations sont cités dans le livre des Annales des rois de Juda. '
  '21':
  - type: text
    content: Ses ministres se révoltèrent contre lui et fomentèrent un complot. Ils assassinèrent Joas à Beth-Millo
  - type: note
    content: Sans doute un édifice élevé sur les terrasses de la Cité de David (cf. 2 S 5.9 ; 1 R 11.27) où le roi fut assassiné « dans son lit » (2 Ch 24.25).
  - type: text
    content: ' sur la route qui descend vers Silla'
  - type: note
    content: Peut-être un chemin en pente qui descend de la Cité de David à la vallée du Cédron.
  - type: text
    content: '. '
  '22':
  - type: text
    content: Ce furent Yozabad, fils de Shimeath et Yehozabad, fils de Shomer, ses ministres, qui le frappèrent à mort. On l’enterra auprès de ses ancêtres dans la Cité de David. Son fils Amatsia lui succéda sur le trône.
  '3':
  - type: text
    content: 'Joas fit ce que l’Eternel considère comme juste pendant tout le temps qu’il suivit les instructions du prêtre Yehoyada. '
  '4':
  - type: text
    content: Toutefois les hauts lieux ne disparurent pas ; le peuple continuait à offrir des sacrifices et à brûler des parfums dans ces sanctuaires.
  - type: heading
    content: La réfection du Temple
  '5':
  - type: text
    content: 'Joas dit aux prêtres : Mettez à part tout l’argent consacré que l’on apporte dans le temple de l’Eternel, l’argent qui a cours'
  - type: note
    content: 'l’argent qui a cours: traduction incertaine.'
  - type: text
    content: ', l’argent provenant des taxes versées par tout Israélite recensé et celui qui est offert volontairement au Temple'
  - type: note
    content: Voir Ex 30.11-16 ; Lv 27.1-8.
  - type: text
    content: '. '
  '6':
  - type: text
    content: Faites donc collecter tout cet argent par vos receveurs et utilisez-le pour faire réparer le Temple des dégradations qu’il a subies, partout où l’on en constatera.
  '7':
  - type: text
    content: Mais la vingt-troisième année du règne de Joas, les prêtres n’avaient pas encore fait réparer les dégâts subis par le Temple
  - type: note
    content: Joas a 30 ans à présent et prend les affaires personnellement en main.
  - type: text
    content: '. '
  '8':
  - type: text
    content: 'Alors le roi convoqua le prêtre Yehoyada ainsi que les autres prêtres, et leur demanda : Pourquoi n’avez-vous pas fait réparer le Temple ? A l’avenir, vous ne garderez plus l’argent que vous recevez de vos collecteurs, vous le remettrez directement pour les réparations du Temple.'
  '9':
  - type: text
    content: 'Les prêtres acceptèrent de ne plus recevoir de l’argent de la population et de ne plus s’occuper des réparations du Temple. '
