document_id: 2KI.12,21
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Appréciation sur le règne de Joas
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: (2 Ch 24.1-14 ; 24.23-27)
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Joas était âgé de sept ans lorsqu’il devint roi. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Le prêtre Yehoyada prit un coffre, dont il fit percer le couvercle d’un trou, puis il le plaça à côté de l’autel, à droite de l’entrée du Temple. Les prêtres qui surveillaient cette entrée y déposaient tout l’argent qui était apporté au temple de l’Eternel. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Lorsqu’ils constataient qu’il y avait beaucoup d’argent dans le tronc, le secrétaire du roi venait avec le grand-prêtre, ils emportaient les dons puis les comptaient ensemble. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Une fois l’argent comptabilisé, ils le remettaient aux entrepreneurs qui avaient la responsabilité des travaux du Temple. Avec cet argent, ceux-ci payaient les charpentiers et les ouvriers du bâtiment qui travaillaient à la réparation du temple de l’Eternel, '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'ainsi que les maçons et les tailleurs de pierres. Ils achetaient le bois et les pierres de taille nécessaires pour réparer les dégradations du temple de l’Eternel et couvraient tous les frais de cette réfection. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: On n’utilisa pas les sommes apportées au Temple pour confectionner des coupes à aspersion, des couteaux, des coupes, des trompettes ou d’autres objets d’or ou d’argent
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '12.14 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Voir '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: 1 R 7.50
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: '. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'On le remettait intégralement aux artisans qui faisaient le travail afin qu’ils effectuent les réparations du Temple. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'D’ailleurs, on ne demandait pas de comptes aux hommes chargés de payer les ouvriers qui exécutaient l’ouvrage, car c’étaient des gens honnêtes. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: L’argent versé à la place d’un sacrifice de culpabilité ou d’un sacrifice pour le péché n’était pas déposé dans le coffre du Temple, il revenait aux prêtres
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '12.17 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Voir '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: Lv 7.7
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: .
  - type: usfm
    marker: s1
    children:
    - type: text
      text: La fin de Joas
    marker-yv: yv-h
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: En ce temps-là
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '12.18 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Vers la fin du règne de Joas (voir '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: 2 Ch 24.18-25
        - type: text
          text: ).
      marker-yv: yv-n
    - type: text
      text: ', Hazaël, roi de Syrie, vint attaquer la ville de Gath'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '12.18 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: L’une des cinq principales villes de la Philistie (
        - type: usfm
          marker: ref
          children:
          - type: text
            text: Jos 13.3
        - type: text
          text: ), conquise par David (
        - type: usfm
          marker: ref
          children:
          - type: text
            text: 1 Ch 18.1
        - type: text
          text: ), qui demeura soumise à Juda durant le règne de Roboam (
        - type: usfm
          marker: ref
          children:
          - type: text
            text: 2 Ch 11.8
        - type: text
          text: ).
      marker-yv: yv-n
    - type: text
      text: ' et s’en empara, puis il décida de marcher sur Jérusalem. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Joas, roi de Juda, prit tous les objets consacrés, ceux que ses ancêtres Josaphat, Yoram et Ahazia, rois de Juda, avaient consacrés. Il y ajouta ceux qu’il avait lui-même consacrés et tout l’or déposé dans la chambre du trésor du temple de l’Eternel et dans le palais royal, et il fit porter le tout à Hazaël, roi de Syrie. Là-dessus, celui-ci se détourna de Jérusalem.
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Il accéda au trône la septième année du règne de Jéhu et régna quarante ans à Jérusalem
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '12.2 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: De 835 à 796 av. J.-C.
      marker-yv: yv-n
    - type: text
      text: '. Sa mère se nommait Tsibia, elle était originaire de Beer-Sheva. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Les autres faits et gestes de Joas et toutes ses réalisations sont cités dans le livre des Annales des rois de Juda. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ses ministres se révoltèrent contre lui et fomentèrent un complot. Ils assassinèrent Joas à Beth-Millo
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '12.21 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Sans doute un édifice élevé sur les terrasses de la Cité de David (cf. 2 S 5.9 ; 1 R 11.27) où le roi fut assassiné « dans son lit » (
        - type: usfm
          marker: ref
          children:
          - type: text
            text: 2 Ch 24.25
        - type: text
          text: ).
      marker-yv: yv-n
    - type: text
      text: ' sur la route qui descend vers Silla'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '12.21 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Peut-être un chemin en pente qui descend de la Cité de David à la vallée du Cédron.
      marker-yv: yv-n
    - type: text
      text: '. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ce furent Yozabad, fils de Shimeath et Yehozabad, fils de Shomer, ses ministres, qui le frappèrent à mort. On l’enterra auprès de ses ancêtres dans la Cité de David. Son fils Amatsia lui succéda sur le trône.
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Joas fit ce que l’Eternel considère comme juste pendant tout le temps qu’il suivit les instructions du prêtre Yehoyada. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Toutefois les hauts lieux ne disparurent pas ; le peuple continuait à offrir des sacrifices et à brûler des parfums dans ces sanctuaires.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: La réfection du Temple
    marker-yv: yv-h
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Joas dit aux prêtres : Mettez à part tout l’argent consacré que l’on apporte dans le temple de l’Eternel, l’argent qui a cours'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '12.5 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: l’argent qui a cours
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: ': '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: traduction incertaine.
      marker-yv: yv-n
    - type: text
      text: ', l’argent provenant des taxes versées par tout Israélite recensé et celui qui est offert volontairement au Temple'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '12.5 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Voir Ex 30.11-16 ; Lv 27.1-8.
      marker-yv: yv-n
    - type: text
      text: '. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Faites donc collecter tout cet argent par vos receveurs et utilisez-le pour faire réparer le Temple des dégradations qu’il a subies, partout où l’on en constatera.
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Mais la vingt-troisième année du règne de Joas, les prêtres n’avaient pas encore fait réparer les dégâts subis par le Temple
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '12.7 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Joas a 30 ans à présent et prend les affaires personnellement en main.
      marker-yv: yv-n
    - type: text
      text: '. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Alors le roi convoqua le prêtre Yehoyada ainsi que les autres prêtres, et leur demanda : Pourquoi n’avez-vous pas fait réparer le Temple ? A l’avenir, vous ne garderez plus l’argent que vous recevez de vos collecteurs, vous le remettrez directement pour les réparations du Temple.'
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Les prêtres acceptèrent de ne plus recevoir de l’argent de la population et de ne plus s’occuper des réparations du Temple. '
