document_id: GEN.29
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Chez Laban
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Jacob reprit sa marche et se dirigea vers les pays de l’Orient
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '29.1 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Pays situés sur les rives de l’Euphrate.
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Un jour, il aperçut dans la campagne un puits où l’on menait boire les troupeaux. Trois troupeaux de moutons et de chèvres étaient couchés alentour. L’ouverture du puits était fermée par une grosse pierre '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'que l’on roulait de côté lorsque tous les troupeaux y étaient rassemblés. Après avoir abreuvé les bêtes, on remettait la pierre sur l’ouverture. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Jacob demanda aux bergers : D’où êtes-vous, les amis ?'
- type: usfm
  marker: p
  children:
  - type: text
    text: – Nous sommes de Harân, lui répondirent-ils.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: – Alors, reprit-il, connaissez-vous Laban, descendant de Nahor ?
- type: usfm
  marker: p
  children:
  - type: text
    text: – Oui, nous le connaissons.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: – Comment va-t-il ?
- type: usfm
  marker: p
  children:
  - type: text
    text: – Il va bien. D’ailleurs, voici justement sa fille Rachel qui vient avec le troupeau.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: – Mais, dit Jacob, il fait encore grand jour ! Ce n’est pas le moment de rassembler le bétail. Faites-donc boire les bêtes et ramenez-les aux pâturages !
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: – Nous ne pouvons rien faire, lui répondirent-ils, avant que tous les troupeaux soient rassemblés ; alors seulement nous roulons la pierre qui bouche l’ouverture du puits et nous faisons boire les bêtes.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Pendant qu’il s’entretenait ainsi avec eux, Rachel arriva avec le troupeau de son père. Elle était en effet bergère. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Lorsque Jacob vit Rachel, la fille de son oncle Laban et les bêtes de son oncle, il s’approcha, roula la pierre de l’ouverture du puits et fit boire le troupeau de son oncle. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Puis il embrassa Rachel et éclata en pleurs.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Il apprit à la jeune fille qu’il était un parent de son père, un fils de Rébecca. Rachel courut prévenir son père. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Dès que Laban entendit parler de Jacob, le fils de sa sœur, il se précipita à sa rencontre, le serra contre lui et l’embrassa, puis il le conduisit dans sa maison. Alors Jacob lui raconta tout ce qui s’était passé. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Laban lui dit : Tu es bien du même sang que moi !'
- type: usfm
  marker: p
  children:
  - type: text
    text: Pendant tout un mois, Jacob demeura chez lui.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Les épouses de Jacob
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Puis Laban lui dit : Travailleras-tu pour rien chez moi parce que tu es mon neveu ? Dis-moi ce que tu voudrais comme salaire.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Or, Laban avait deux filles, l’aînée s’appelait Léa, et la cadette Rachel. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Léa avait le regard tendre, mais Rachel était bien faite et d’une grande beauté. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Jacob s’était épris de Rachel et il dit à Laban : Je te servirai pendant sept ans si tu me donnes Rachel, ta fille cadette, en mariage'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '29.18 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Le fiancé versait une dot à son futur beau-père (
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '34.12'
        metadata:
          usfm: GEN.34.12
      - type: text
        text: ). S’il ne pouvait la payer, il s’acquittait de sa dette par un service en nature.
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Et Laban répondit : Je préfère te la donner à toi plutôt qu’à un autre. Reste chez moi.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Jacob travailla sept ans pour obtenir Rachel, et ces années furent à ses yeux comme quelques jours parce qu’il l’aimait.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Puis il dit à Laban : Donne-moi maintenant ma femme, car j’ai accompli mon temps de service et je voudrais l’épouser.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Alors Laban fit un festin auquel il invita tous les habitants de la localité. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: La nuit venue, il prit sa fille Léa et l’amena à Jacob qui s’unit à elle
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '29.23 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: La mariée portait un voile sur le visage.
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Laban donna sa servante Zilpa à sa fille Léa. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Le lendemain matin, Jacob se rendit compte que c’était Léa. Jacob dit à Laban : Que m’as-tu fait ? N’est-ce pas pour Rachel que j’ai travaillé chez toi ? Pourquoi alors m’as-tu trompé ?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Laban répondit : Chez nous, il n’est pas d’usage de marier la cadette avant l’aînée. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: Mais termine la semaine de noces avec celle-ci, et nous te donnerons aussi l’autre en contrepartie de sept autres années de travail chez moi
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '29.27 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Rachel fut sans doute donnée à Jacob à la fin de la semaine des festivités. Les sept autres années de travail allaient suivre ce mariage.
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'Jacob accepta : il termina cette semaine-là avec Léa, et Laban lui donna sa fille Rachel pour épouse. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: Il donna aussi à Rachel sa servante Bilha
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '29.29 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Coutume attestée par les documents de l’époque.
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: Jacob s’unit aussi à Rachel qu’il aimait plus que Léa. Il travailla encore sept autres années chez Laban.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Les enfants de Jacob
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'L’Eternel vit que Léa était mal aimée et il lui accorda des enfants, tandis que Rachel était stérile. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'Ainsi Léa devint enceinte et donna naissance à un fils qu’elle appela Ruben (Voyez, un fils !), car elle dit : L’Eternel a vu ma misère ; à présent, mon mari m’aimera.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: 'Puis elle fut de nouveau enceinte et eut encore un fils. Elle dit : L’Eternel a entendu que je n’étais pas aimée et il m’a encore accordé celui-ci.'
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Et elle le nomma Siméon (Il entend). '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: 'Elle devint encore enceinte et enfanta un fils. Elle dit : Cette fois-ci, mon mari s’attachera à moi, car je lui ai donné trois fils.'
- type: usfm
  marker: p
  children:
  - type: text
    text: 'C’est pourquoi elle l’appela Lévi (Il s’attache). '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: 'De nouveau, elle devint enceinte et eut un fils. Elle s’écria : Cette fois, je louerai l’Eternel.'
- type: usfm
  marker: p
  children:
  - type: text
    text: C’est pourquoi elle le nomma Juda (Il loue). Puis elle cessa d’avoir des enfants.
