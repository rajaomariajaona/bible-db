document_id: GEN.29,21
type_code: fra
verses:
  '1':
  - type: heading
    content: Chez Laban
  - type: text
    content: Jacob reprit sa marche et se dirigea vers les pays de l’Orient
  - type: note
    content: Pays situés sur les rives de l’Euphrate.
  - type: text
    content: '. '
  '10':
  - type: text
    content: 'Lorsque Jacob vit Rachel, la fille de son oncle Laban et les bêtes de son oncle, il s’approcha, roula la pierre de l’ouverture du puits et fit boire le troupeau de son oncle. '
  '11':
  - type: text
    content: Puis il embrassa Rachel et éclata en pleurs.
  '12':
  - type: text
    content: 'Il apprit à la jeune fille qu’il était un parent de son père, un fils de Rébecca. Rachel courut prévenir son père. '
  '13':
  - type: text
    content: 'Dès que Laban entendit parler de Jacob, le fils de sa sœur, il se précipita à sa rencontre, le serra contre lui et l’embrassa, puis il le conduisit dans sa maison. Alors Jacob lui raconta tout ce qui s’était passé. '
  '14':
  - type: text
    content: 'Laban lui dit : Tu es bien du même sang que moi !'
  - type: text
    content: Pendant tout un mois, Jacob demeura chez lui.
  - type: heading
    content: Les épouses de Jacob
  '15':
  - type: text
    content: 'Puis Laban lui dit : Travailleras-tu pour rien chez moi parce que tu es mon neveu ? Dis-moi ce que tu voudrais comme salaire.'
  '16':
  - type: text
    content: 'Or, Laban avait deux filles, l’aînée s’appelait Léa, et la cadette Rachel. '
  '17':
  - type: text
    content: 'Léa avait le regard tendre, mais Rachel était bien faite et d’une grande beauté. '
  '18':
  - type: text
    content: 'Jacob s’était épris de Rachel et il dit à Laban : Je te servirai pendant sept ans si tu me donnes Rachel, ta fille cadette, en mariage'
  - type: note
    content: Le fiancé versait une dot à son futur beau-père (34.12). S’il ne pouvait la payer, il s’acquittait de sa dette par un service en nature.
  - type: text
    content: .
  '19':
  - type: text
    content: 'Et Laban répondit : Je préfère te la donner à toi plutôt qu’à un autre. Reste chez moi.'
  '2':
  - type: text
    content: 'Un jour, il aperçut dans la campagne un puits où l’on menait boire les troupeaux. Trois troupeaux de moutons et de chèvres étaient couchés alentour. L’ouverture du puits était fermée par une grosse pierre '
  '20':
  - type: text
    content: Jacob travailla sept ans pour obtenir Rachel, et ces années furent à ses yeux comme quelques jours parce qu’il l’aimait.
  '21':
  - type: text
    content: 'Puis il dit à Laban : Donne-moi maintenant ma femme, car j’ai accompli mon temps de service et je voudrais l’épouser.'
  '22':
  - type: text
    content: 'Alors Laban fit un festin auquel il invita tous les habitants de la localité. '
  '23':
  - type: text
    content: La nuit venue, il prit sa fille Léa et l’amena à Jacob qui s’unit à elle
  - type: note
    content: La mariée portait un voile sur le visage.
  - type: text
    content: '. '
  '24':
  - type: text
    content: 'Laban donna sa servante Zilpa à sa fille Léa. '
  '25':
  - type: text
    content: 'Le lendemain matin, Jacob se rendit compte que c’était Léa. Jacob dit à Laban : Que m’as-tu fait ? N’est-ce pas pour Rachel que j’ai travaillé chez toi ? Pourquoi alors m’as-tu trompé ?'
  '26':
  - type: text
    content: 'Laban répondit : Chez nous, il n’est pas d’usage de marier la cadette avant l’aînée. '
  '27':
  - type: text
    content: Mais termine la semaine de noces avec celle-ci, et nous te donnerons aussi l’autre en contrepartie de sept autres années de travail chez moi
  - type: note
    content: Rachel fut sans doute donnée à Jacob à la fin de la semaine des festivités. Les sept autres années de travail allaient suivre ce mariage.
  - type: text
    content: .
  '28':
  - type: text
    content: 'Jacob accepta : il termina cette semaine-là avec Léa, et Laban lui donna sa fille Rachel pour épouse. '
  '29':
  - type: text
    content: Il donna aussi à Rachel sa servante Bilha
  - type: note
    content: Coutume attestée par les documents de l’époque.
  - type: text
    content: '. '
  '3':
  - type: text
    content: 'que l’on roulait de côté lorsque tous les troupeaux y étaient rassemblés. Après avoir abreuvé les bêtes, on remettait la pierre sur l’ouverture. '
  '30':
  - type: text
    content: Jacob s’unit aussi à Rachel qu’il aimait plus que Léa. Il travailla encore sept autres années chez Laban.
  - type: heading
    content: Les enfants de Jacob
  '31':
  - type: text
    content: 'L’Eternel vit que Léa était mal aimée et il lui accorda des enfants, tandis que Rachel était stérile. '
  '32':
  - type: text
    content: 'Ainsi Léa devint enceinte et donna naissance à un fils qu’elle appela Ruben (Voyez, un fils !), car elle dit : L’Eternel a vu ma misère ; à présent, mon mari m’aimera.'
  '33':
  - type: text
    content: 'Puis elle fut de nouveau enceinte et eut encore un fils. Elle dit : L’Eternel a entendu que je n’étais pas aimée et il m’a encore accordé celui-ci.'
  - type: text
    content: 'Et elle le nomma Siméon (Il entend). '
  '34':
  - type: text
    content: 'Elle devint encore enceinte et enfanta un fils. Elle dit : Cette fois-ci, mon mari s’attachera à moi, car je lui ai donné trois fils.'
  - type: text
    content: 'C’est pourquoi elle l’appela Lévi (Il s’attache). '
  '35':
  - type: text
    content: 'De nouveau, elle devint enceinte et eut un fils. Elle s’écria : Cette fois, je louerai l’Eternel.'
  - type: text
    content: C’est pourquoi elle le nomma Juda (Il loue). Puis elle cessa d’avoir des enfants.
  '4':
  - type: text
    content: 'Jacob demanda aux bergers : D’où êtes-vous, les amis ?'
  - type: text
    content: – Nous sommes de Harân, lui répondirent-ils.
  '5':
  - type: text
    content: – Alors, reprit-il, connaissez-vous Laban, descendant de Nahor ?
  - type: text
    content: – Oui, nous le connaissons.
  '6':
  - type: text
    content: – Comment va-t-il ?
  - type: text
    content: – Il va bien. D’ailleurs, voici justement sa fille Rachel qui vient avec le troupeau.
  '7':
  - type: text
    content: – Mais, dit Jacob, il fait encore grand jour ! Ce n’est pas le moment de rassembler le bétail. Faites-donc boire les bêtes et ramenez-les aux pâturages !
  '8':
  - type: text
    content: – Nous ne pouvons rien faire, lui répondirent-ils, avant que tous les troupeaux soient rassemblés ; alors seulement nous roulons la pierre qui bouche l’ouverture du puits et nous faisons boire les bêtes.
  '9':
  - type: text
    content: 'Pendant qu’il s’entretenait ainsi avec eux, Rachel arriva avec le troupeau de son père. Elle était en effet bergère. '
