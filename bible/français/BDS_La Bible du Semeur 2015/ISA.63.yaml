document_id: ISA.63,21
type_code: fra
verses:
  '1':
  - type: heading
    content: Le divin Vendangeur
  - type: text
    content: Qui donc est-il, ╵celui qui arrive d’Edom,
  - type: text
    content: qui nous vient de Botsra ╵en habits écarlates,
  - type: text
    content: drapé avec splendeur,
  - type: text
    content: et qui s’avance fièrement
  - type: text
    content: avec sa grande force ?
  - type: text
    content: – C’est moi, dit l’Eternel, ╵qui parle avec justice
  - type: text
    content: et qui ai le pouvoir ╵de vous sauver
  - type: note
    content: 'Autre traduction : et qui entre en procès pour vous sauver.'
  - type: text
    content: .
  '10':
  - type: text
    content: Mais eux, ils se sont rebellés
  - type: text
    content: et ils ont attristé ╵son Esprit Saint.
  - type: text
    content: Dès lors, il s’est changé ╵pour eux en ennemi,
  - type: text
    content: et les a combattus.
  '11':
  - type: text
    content: Alors ils se sont souvenus ╵des temps anciens ╵et de Moïse, et de son peuple
  - type: note
    content: 'Autre traduction : Alors il s’est souvenu des temps anciens, de Moïse et de son peuple.'
  - type: text
    content: 'et ils ont dit : ╵« Où est celui ╵qui les a fait sortir'
  - type: text
    content: de la mer avec le berger ╵de son troupeau ?
  - type: text
    content: Et où est celui qui a mis ╵son Esprit Saint au milieu d’eux
  - type: note
    content: Voir Ex 14.15-23.
  - type: text
    content: ','
  '12':
  - type: text
    content: celui qui a tendu ╵son bras glorieux
  - type: text
    content: aux côtés de Moïse,
  - type: text
    content: pour fendre les eaux devant eux
  - type: text
    content: et qui s’est fait ainsi ╵un renom éternel ? »
  '13':
  - type: text
    content: Oui, il les a fait avancer ╵à travers les abîmes
  - type: text
    content: comme un cheval dans le désert
  - type: text
    content: sans qu’ils trébuchent.
  '14':
  - type: text
    content: Ils ressemblaient à un troupeau ╵qui rejoint la vallée,
  - type: text
    content: lorsque l’Esprit de l’Eternel ╵les a menés vers le repos ;
  - type: text
    content: ainsi tu as conduit ton peuple
  - type: text
    content: et tu t’es fait ╵une glorieuse renommée.
  - type: heading
    content: Seigneur, aie pitié de nous
  '15':
  - type: text
    content: Du haut du ciel, ╵de ta demeure sainte,
  - type: text
    content: du séjour de ta gloire, ╵regarde et vois !
  - type: text
    content: Que sont donc devenus ╵ton amour passionné ╵et ta puissance ?
  - type: text
    content: Ton cœur s’est-il donc retenu ╵de frémir de tendresse,
  - type: text
    content: de compassion pour moi ?
  '16':
  - type: text
    content: 'Car tu es notre père :'
  - type: text
    content: Abraham ne nous connaît pas,
  - type: text
    content: et Israël non plus ╵ne nous reconnaît pas.
  - type: text
    content: Mais toi, ô Eternel, ╵toi, tu es notre père,
  - type: text
    content: et ton nom est depuis toujours ╵« Notre Libérateur ».
  '17':
  - type: text
    content: Pourquoi, ô Eternel, ╵pourquoi nous fais-tu donc errer ╵loin des voies que tu as prescrites ?
  - type: text
    content: Pourquoi rends-tu ╵notre cœur obstiné ╵de sorte que nous ne te craignions pas ?
  - type: text
    content: Reviens, de grâce, pour tes serviteurs
  - type: text
    content: et les tribus qui t’appartiennent.
  '18':
  - type: text
    content: Ton peuple saint a possédé ╵le pays pour bien peu de temps ;
  - type: text
    content: nos ennemis ont piétiné ╵ton sanctuaire.
  '19':
  - type: text
    content: Nous sommes depuis bien longtemps
  - type: text
    content: comme des gens ╵sur qui tu ne régnerais pas,
  - type: text
    content: qui ne porteraient pas ton nom.
  - type: heading
    content: Oh, si tu descendais du ciel !
  - type: text
    content: Oh, si tu déchirais le ciel
  - type: text
    content: et si tu descendais !
  - type: text
    content: Devant toi, les montagnes ╵s’effondreraient !
  '2':
  - type: text
    content: – Pourquoi tes vêtements ╵sont-ils tachés de rouge
  - type: text
    content: et pourquoi tes habits ╵ressemblent-ils ╵à ceux des vendangeurs ╵qui foulent au pressoir ?
  '3':
  - type: text
    content: – C’est que j’ai été seul ╵à fouler la cuvée.
  - type: text
    content: Et nul parmi les peuples
  - type: note
    content: 'Selon le texte hébreu traditionnel. Le texte hébreu de Qumrân a : de mon peuple.'
  - type: text
    content: ' ╵n’a été avec moi,'
  - type: text
    content: oui, j’ai foulé les peuples ╵dans ma colère,
  - type: text
    content: je les ai piétinés ╵dans mon indignation.
  - type: text
    content: Leur sang a rejailli ╵sur mes habits,
  - type: text
    content: j’ai taché tous mes vêtements
  - type: note
    content: Les raisins étaient foulés dans la cuve par les pieds des vendangeurs.
  - type: text
    content: .
  '4':
  - type: text
    content: J’avais fixé ╵le jour de la rétribution,
  - type: text
    content: elle est venue, ╵l’année de la libération ╵de tous les miens.
  '5':
  - type: text
    content: 'J’ai regardé partout :'
  - type: text
    content: personne pour m’aider !
  - type: text
    content: Je me suis étonné
  - type: note
    content: 'Autre traduction : désolé (voir 59.16).'
  - type: text
    content: '  :'
  - type: text
    content: n’y a-t-il donc personne ╵pour me prêter main-forte ?
  - type: text
    content: Mais mon bras a fait œuvre de salut pour moi,
  - type: text
    content: et mon indignation ╵a été mon soutien.
  '6':
  - type: text
    content: J’ai écrasé les peuples ╵dans ma colère,
  - type: text
    content: je les ai enivrés ╵dans ma fureur,
  - type: text
    content: j’ai fait couler leur sang par terre.
  - type: heading
    content: Louange et prière
  - type: heading
    content: Les grâces du Seigneur
  '7':
  - type: text
    content: Je rappellerai les actes de bienveillance ╵de l’Eternel
  - type: text
    content: 'et les motifs de le louer :'
  - type: text
    content: il a tout fait pour nous.
  - type: text
    content: Je dirai les nombreux bienfaits ╵dont il a comblé Israël,
  - type: text
    content: le bien qu’il leur a fait
  - type: text
    content: dans sa tendresse
  - type: text
    content: et sa grande bonté.
  '8':
  - type: text
    content: 'Il avait dit : ╵« Oui, les Israélites ╵sont mon peuple,'
  - type: text
    content: ce sont des fils ╵qui ne décevront pas. »
  - type: text
    content: Et il les a sauvés.
  '9':
  - type: text
    content: Dans toutes leurs détresses,
  - type: text
    content: il a été lui-même ╵dans la détresse,
  - type: text
    content: et l’ange qui se tient en sa présence ╵les a sauvés.
  - type: text
    content: Dans son amour ╵et dans sa compassion,
  - type: text
    content: il les a libérés,
  - type: text
    content: il les a soutenus ╵et il les a portés
  - type: text
    content: tous les jours d’autrefois.
