document_id: ISA.63,21
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Le divin Vendangeur
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: Qui donc est-il, ╵celui qui arrive d’Edom,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: qui nous vient de Botsra ╵en habits écarlates,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: drapé avec splendeur,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et qui s’avance fièrement
  - type: usfm
    marker: q1
    children:
    - type: text
      text: avec sa grande force ?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: – C’est moi, dit l’Eternel, ╵qui parle avec justice
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et qui ai le pouvoir ╵de vous sauver
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '63.1 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Autre traduction : '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: et qui entre en procès pour vous sauver.
      marker-yv: yv-n
    - type: text
      text: .
  '10':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: Mais eux, ils se sont rebellés
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et ils ont attristé ╵son Esprit Saint.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Dès lors, il s’est changé ╵pour eux en ennemi,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et les a combattus.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: Alors ils se sont souvenus ╵des temps anciens ╵et de Moïse, et de son peuple
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '63.11 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Autre traduction : '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: Alors il s’est souvenu des temps anciens, de Moïse et de son peuple.
      marker-yv: yv-n
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'et ils ont dit : ╵« Où est celui ╵qui les a fait sortir'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: de la mer avec le berger ╵de son troupeau ?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et où est celui qui a mis ╵son Esprit Saint au milieu d’eux
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '63.11 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Voir '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: Ex 14.15-23
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: ','
  '12':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: celui qui a tendu ╵son bras glorieux
  - type: usfm
    marker: q1
    children:
    - type: text
      text: aux côtés de Moïse,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: pour fendre les eaux devant eux
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et qui s’est fait ainsi ╵un renom éternel ? »
  '13':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: Oui, il les a fait avancer ╵à travers les abîmes
  - type: usfm
    marker: q1
    children:
    - type: text
      text: comme un cheval dans le désert
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sans qu’ils trébuchent.
  '14':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: Ils ressemblaient à un troupeau ╵qui rejoint la vallée,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: lorsque l’Esprit de l’Eternel ╵les a menés vers le repos ;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ainsi tu as conduit ton peuple
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et tu t’es fait ╵une glorieuse renommée.
  - type: usfm
    marker: s2
    children:
    - type: text
      text: Seigneur, aie pitié de nous
    marker-yv: yv-h
  '15':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: Du haut du ciel, ╵de ta demeure sainte,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: du séjour de ta gloire, ╵regarde et vois !
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Que sont donc devenus ╵ton amour passionné ╵et ta puissance ?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ton cœur s’est-il donc retenu ╵de frémir de tendresse,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: de compassion pour moi ?
  '16':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'Car tu es notre père :'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Abraham ne nous connaît pas,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et Israël non plus ╵ne nous reconnaît pas.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mais toi, ô Eternel, ╵toi, tu es notre père,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et ton nom est depuis toujours ╵« Notre Libérateur ».
  '17':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: Pourquoi, ô Eternel, ╵pourquoi nous fais-tu donc errer ╵loin des voies que tu as prescrites ?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Pourquoi rends-tu ╵notre cœur obstiné ╵de sorte que nous ne te craignions pas ?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Reviens, de grâce, pour tes serviteurs
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et les tribus qui t’appartiennent.
  '18':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: Ton peuple saint a possédé ╵le pays pour bien peu de temps ;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: nos ennemis ont piétiné ╵ton sanctuaire.
  '19':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: Nous sommes depuis bien longtemps
  - type: usfm
    marker: q1
    children:
    - type: text
      text: comme des gens ╵sur qui tu ne régnerais pas,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: qui ne porteraient pas ton nom.
  - type: usfm
    marker: s2
    children:
    - type: text
      text: Oh, si tu descendais du ciel !
    marker-yv: yv-h
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Oh, si tu déchirais le ciel
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et si tu descendais !
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Devant toi, les montagnes ╵s’effondreraient !
  '2':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: – Pourquoi tes vêtements ╵sont-ils tachés de rouge
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et pourquoi tes habits ╵ressemblent-ils ╵à ceux des vendangeurs ╵qui foulent au pressoir ?
  '3':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: – C’est que j’ai été seul ╵à fouler la cuvée.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et nul parmi les peuples
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '63.3 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Selon le texte hébreu traditionnel. Le texte hébreu de Qumrân a : '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: de mon peuple.
      marker-yv: yv-n
    - type: text
      text: ' ╵n’a été avec moi,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: oui, j’ai foulé les peuples ╵dans ma colère,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: je les ai piétinés ╵dans mon indignation.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Leur sang a rejailli ╵sur mes habits,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: j’ai taché tous mes vêtements
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '63.3 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Les raisins étaient foulés dans la cuve par les pieds des vendangeurs.
      marker-yv: yv-n
    - type: text
      text: .
  '4':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: J’avais fixé ╵le jour de la rétribution,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: elle est venue, ╵l’année de la libération ╵de tous les miens.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'J’ai regardé partout :'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: personne pour m’aider !
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Je me suis étonné
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '63.5 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Autre traduction : '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'désolé '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '(voir '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: '59.16'
        - type: text
          text: ).
      marker-yv: yv-n
    - type: text
      text: '  :'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: n’y a-t-il donc personne ╵pour me prêter main-forte ?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mais mon bras a fait œuvre de salut pour moi,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et mon indignation ╵a été mon soutien.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: J’ai écrasé les peuples ╵dans ma colère,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: je les ai enivrés ╵dans ma fureur,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: j’ai fait couler leur sang par terre.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Louange et prière
    marker-yv: yv-h
  - type: usfm
    marker: s2
    children:
    - type: text
      text: Les grâces du Seigneur
    marker-yv: yv-h
  '7':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: Je rappellerai les actes de bienveillance ╵de l’Eternel
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'et les motifs de le louer :'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: il a tout fait pour nous.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Je dirai les nombreux bienfaits ╵dont il a comblé Israël,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: le bien qu’il leur a fait
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dans sa tendresse
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et sa grande bonté.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'Il avait dit : ╵« Oui, les Israélites ╵sont mon peuple,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ce sont des fils ╵qui ne décevront pas. »
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et il les a sauvés.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: Dans toutes leurs détresses,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: il a été lui-même ╵dans la détresse,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et l’ange qui se tient en sa présence ╵les a sauvés.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Dans son amour ╵et dans sa compassion,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: il les a libérés,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: il les a soutenus ╵et il les a portés
  - type: usfm
    marker: q1
    children:
    - type: text
      text: tous les jours d’autrefois.
