document_id: 1SA.15
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: La guerre contre les Amalécites et la nouvelle désobéissance de Saül
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Un jour, Samuel dit à Saül : C’est moi que l’Eternel a envoyé pour te conférer l’onction qui t’a établi roi de son peuple, Israël. Maintenant donc, écoute les paroles de l’Eternel. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Voici ce que déclare l’Eternel, le Seigneur des armées célestes : « J’ai décidé de punir les Amalécites pour ce qu’ils ont fait au peuple d’Israël, en se mettant en travers de sa route quand il venait d’Egypte'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '15.2 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Voir '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ex 17.8-16
        metadata:
          usfm: EXO.17.8+EXO.17.9+EXO.17.10+EXO.17.11+EXO.17.12+EXO.17.13+EXO.17.14+EXO.17.15+EXO.17.16
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Maintenant, va les attaquer et voue-les moi
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '15.3 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Voir '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Lv 27.28-29
        metadata:
          usfm: LEV.27.28+LEV.27.29
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: ' en les exterminant totalement avec tout ce qui leur appartient. Sois sans pitié et fais périr hommes et femmes, enfants et bébés, bœufs, moutons, chèvres, chameaux et ânes. »'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Saül mobilisa son armée et la passa en revue à Telaïm ; il compta deux cent mille soldats des provinces du Nord et dix mille hommes de Juda
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '15.4 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Il pourrait s’agir de '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'deux cents « milliers » de soldats et de dix « milliers » d’hommes de Juda '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '(voir note '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '8.12'
        metadata:
          usfm: 1SA.8.12
      - type: text
        text: ).
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Il les conduisit jusqu’à la ville d’Amalec et plaça une embuscade dans le ravin. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Puis il fit dire aux Qéniens : Partez, séparez-vous des Amalécites pour que je ne vous fasse pas subir le même sort qu’à eux, car vous avez été bons envers les Israélites quand ils venaient d’Egypte.'
- type: usfm
  marker: p
  children:
  - type: text
    text: Les Qéniens se retirèrent donc du milieu des Amalécites
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '15.6 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Voir '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Jg 4.11
        metadata:
          usfm: JDG.4.11
      - type: text
        text: ' et note.'
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Saül battit Amalec depuis Havila jusqu’aux abords de Shour à l’est de l’Egypte
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '15.7 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Shour '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'est situé sur la frontière orientale de l’Egypte (27.8 ; Gn 16.7 ; 20.1). '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'Havila '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'semble s’appliquer à toute la région du désert au sud-est du pays d’Israël (voir '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Gn 25.18
        metadata:
          usfm: GEN.25.18
      - type: text
        text: ).
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Il captura Agag, roi d’Amalec, vivant, et extermina toute la population par l’épée. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Saül et ses soldats épargnèrent Agag ainsi que les meilleurs animaux du butin : moutons, chèvres et bœufs, bêtes grasses et agneaux ; ils ne voulurent pas les détruire pour les vouer à l’Eternel. Par contre, ils détruisirent tout ce qui était méprisable et sans valeur.'
- type: usfm
  marker: s1
  children:
  - type: text
    text: L’Eternel rejette Saül
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'L’Eternel parla à Samuel et lui dit : '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Je décide d’annuler ce que j’ai fait en établissant Saül roi, car il s’est détourné de moi et il n’a pas tenu compte de mes ordres.
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Samuel en fut bouleversé et il implora l’Eternel toute la nuit. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Le lendemain matin, il partit trouver Saül. En chemin, il apprit que celui-ci s’était rendu à Karmel
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '15.12 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Localité de Juda située à une douzaine de kilomètres au sud d’Hébron (voir 25.2 ; Jos 15.55).
    marker-yv: yv-n
  - type: text
    text: ' pour y ériger un mémorial, puis qu’il était reparti en direction de Guilgal. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Finalement, Samuel le rejoignit
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '15.13 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'L’ancienne version grecque ajoute ici : '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: pendant qu’il offrait des holocaustes à l’Eternel, pris sur le butin qu’il avait ramené d’Amalec.
    marker-yv: yv-n
  - type: text
    text: '. Saül l’aborda par ces mots : Que l’Eternel te bénisse ! J’ai exécuté l’ordre de l’Eternel.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Mais Samuel lui demanda : D’où viennent donc ces bêlements de moutons qui résonnent à mes oreilles et ces mugissements de bœufs que j’entends ?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Saül répondit : Ils les ont ramenés de chez les Amalécites, car les soldats ont épargné les meilleures bêtes parmi les moutons et les bœufs pour les offrir en sacrifice à l’Eternel ton Dieu ; le reste nous l’avons totalement détruit.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: – Assez, interrompit Samuel. Je vais t’apprendre ce que l’Eternel m’a dit cette nuit.
- type: usfm
  marker: p
  children:
  - type: text
    text: – Parle, lui dit Saül.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Et Samuel lui déclara : Alors que tu te considérais comme un personnage peu important, tu es devenu le chef des tribus d’Israël et l’Eternel t’a oint pour t’établir roi d’Israël. '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Il t’a envoyé en campagne avec cet ordre précis : « Va et détruis les Amalécites pour me les vouer, ce peuple de pécheurs, en les combattant jusqu’à leur totale extermination. »'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Alors pourquoi n’as-tu pas obéi à l’ordre de l’Eternel ? Pourquoi as-tu fait ce qu’il considère comme mal en te précipitant sur le butin ?
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Saül répliqua : Mais si, j’ai obéi à l’ordre de l’Eternel et j’ai accompli la mission qu’il m’avait confiée : j’ai ramené Agag, roi d’Amalec, et j’ai exterminé les Amalécites pour les vouer à l’Eternel. '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Mais les soldats ont prélevé sur le butin les meilleurs moutons et les meilleurs bœufs qui devaient être voués à l’Eternel par destruction, pour les offrir en sacrifice à l’Eternel ton Dieu à Guilgal.
- type: usfm
  marker: s1
  children:
  - type: text
    text: L’obéissance vaut mieux que les sacrifices
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Samuel lui dit alors :'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Les holocaustes et les sacrifices
- type: usfm
  marker: q1
  children:
  - type: text
    text: font-ils autant plaisir à l’Eternel
- type: usfm
  marker: q1
  children:
  - type: text
    text: que l’obéissance à ses ordres ?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Non ! Car l’obéissance ╵est préférable aux sacrifices,
- type: usfm
  marker: q1
  children:
  - type: text
    text: la soumission vaut mieux ╵que la graisse des béliers.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: Car l’insoumission est aussi coupable ╵que le péché de divination
- type: usfm
  marker: q1
  children:
  - type: text
    text: et la désobéissance aussi grave ╵que le péché d’idolâtrie.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Puisque tu as rejeté les ordres de
- type: usfm
  marker: q1
  children:
  - type: text
    text: l’Eternel,
- type: usfm
  marker: q1
  children:
  - type: text
    text: lui aussi te rejette et te retire la
- type: usfm
  marker: q1
  children:
  - type: text
    text: royauté.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Alors Saül répondit à Samuel : J’ai péché, car j’ai transgressé l’ordre de l’Eternel et tes instructions, parce que j’ai eu peur de mécontenter mes soldats, et j’ai cédé à leurs demandes. '
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: A présent, je t’en prie, pardonne ma faute ; et reviens avec moi pour que je me prosterne devant l’Eternel.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: – Non, répliqua Samuel. Je n’irai pas avec toi, car tu as rejeté les ordres de l’Eternel, c’est pourquoi l’Eternel te rejette aussi et te retire la royauté sur Israël.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'Comme Samuel se retournait pour partir, Saül le saisit par le pan de son manteau et le morceau fut arraché. '
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'Alors Samuel lui déclara : C’est ainsi que l’Eternel t’arrache aujourd’hui la royauté d’Israël pour la donner à un autre qui est meilleur que toi. '
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'Sois-en certain : Celui qui est la gloire d’Israël ne ment pas et ne se rétractera pas, car il n’est pas comme un être humain pour se rétracter.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'Saül répéta : J’ai péché ! Toutefois, en ce moment, je t’en supplie, continue à m’honorer devant les responsables de mon peuple et devant Israël. Reviens avec moi et je me prosternerai devant l’Eternel ton Dieu !'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'A la fin, Samuel l’accompagna et Saül se prosterna devant l’Eternel. '
  - type: usfm
    marker: v
    metadata:
      v: '32'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'Samuel ordonna : Amenez-moi Agag, roi d’Amalec !'
- type: usfm
  marker: p
  children:
  - type: text
    text: Celui-ci arriva d’un air content
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '15.32 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Autres traductions : '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'plein d’assurance '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'ou '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: en tremblant.
    marker-yv: yv-n
  - type: text
    text: ', car il se disait : « Certainement l’amertume de la mort s’est éloignée. »'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '33'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: 'Mais Samuel lui déclara : Ton épée a privé bien des femmes de leurs enfants, à présent c’est ta mère qui sera privée de son fils !'
- type: usfm
  marker: p
  children:
  - type: text
    text: Et Samuel exécuta Agag devant l’Eternel à Guilgal.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '34'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: Puis il retourna à Rama, et Saül rentra chez lui à Guibéa de Saül.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '35'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: Samuel n’alla plus voir Saül jusqu’au jour de sa mort ; mais il était dans l’affliction à son sujet parce que l’Eternel avait décidé d’annuler ce qu’il avait fait en l’établissant roi sur Israël.
