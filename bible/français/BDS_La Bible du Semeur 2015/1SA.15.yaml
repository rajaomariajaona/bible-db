document_id: 1SA.15,21
type_code: fra
verses:
  '1':
  - type: heading
    content: La guerre contre les Amalécites et la nouvelle désobéissance de Saül
  - type: text
    content: 'Un jour, Samuel dit à Saül : C’est moi que l’Eternel a envoyé pour te conférer l’onction qui t’a établi roi de son peuple, Israël. Maintenant donc, écoute les paroles de l’Eternel. '
  '10':
  - type: text
    content: 'L’Eternel parla à Samuel et lui dit : '
  '11':
  - type: text
    content: Je décide d’annuler ce que j’ai fait en établissant Saül roi, car il s’est détourné de moi et il n’a pas tenu compte de mes ordres.
  - type: text
    content: 'Samuel en fut bouleversé et il implora l’Eternel toute la nuit. '
  '12':
  - type: text
    content: Le lendemain matin, il partit trouver Saül. En chemin, il apprit que celui-ci s’était rendu à Karmel
  - type: note
    content: Localité de Juda située à une douzaine de kilomètres au sud d’Hébron (voir 25.2 ; Jos 15.55).
  - type: text
    content: ' pour y ériger un mémorial, puis qu’il était reparti en direction de Guilgal. '
  '13':
  - type: text
    content: Finalement, Samuel le rejoignit
  - type: note
    content: 'L’ancienne version grecque ajoute ici : pendant qu’il offrait des holocaustes à l’Eternel, pris sur le butin qu’il avait ramené d’Amalec.'
  - type: text
    content: '. Saül l’aborda par ces mots : Que l’Eternel te bénisse ! J’ai exécuté l’ordre de l’Eternel.'
  '14':
  - type: text
    content: 'Mais Samuel lui demanda : D’où viennent donc ces bêlements de moutons qui résonnent à mes oreilles et ces mugissements de bœufs que j’entends ?'
  '15':
  - type: text
    content: 'Saül répondit : Ils les ont ramenés de chez les Amalécites, car les soldats ont épargné les meilleures bêtes parmi les moutons et les bœufs pour les offrir en sacrifice à l’Eternel ton Dieu ; le reste nous l’avons totalement détruit.'
  '16':
  - type: text
    content: – Assez, interrompit Samuel. Je vais t’apprendre ce que l’Eternel m’a dit cette nuit.
  - type: text
    content: – Parle, lui dit Saül.
  '17':
  - type: text
    content: 'Et Samuel lui déclara : Alors que tu te considérais comme un personnage peu important, tu es devenu le chef des tribus d’Israël et l’Eternel t’a oint pour t’établir roi d’Israël. '
  '18':
  - type: text
    content: 'Il t’a envoyé en campagne avec cet ordre précis : « Va et détruis les Amalécites pour me les vouer, ce peuple de pécheurs, en les combattant jusqu’à leur totale extermination. »'
  '19':
  - type: text
    content: Alors pourquoi n’as-tu pas obéi à l’ordre de l’Eternel ? Pourquoi as-tu fait ce qu’il considère comme mal en te précipitant sur le butin ?
  '2':
  - type: text
    content: 'Voici ce que déclare l’Eternel, le Seigneur des armées célestes : « J’ai décidé de punir les Amalécites pour ce qu’ils ont fait au peuple d’Israël, en se mettant en travers de sa route quand il venait d’Egypte'
  - type: note
    content: Voir Ex 17.8-16.
  - type: text
    content: '. '
  '20':
  - type: text
    content: 'Saül répliqua : Mais si, j’ai obéi à l’ordre de l’Eternel et j’ai accompli la mission qu’il m’avait confiée : j’ai ramené Agag, roi d’Amalec, et j’ai exterminé les Amalécites pour les vouer à l’Eternel. '
  '21':
  - type: text
    content: Mais les soldats ont prélevé sur le butin les meilleurs moutons et les meilleurs bœufs qui devaient être voués à l’Eternel par destruction, pour les offrir en sacrifice à l’Eternel ton Dieu à Guilgal.
  - type: heading
    content: L’obéissance vaut mieux que les sacrifices
  '22':
  - type: text
    content: 'Samuel lui dit alors :'
  - type: text
    content: Les holocaustes et les sacrifices
  - type: text
    content: font-ils autant plaisir à l’Eternel
  - type: text
    content: que l’obéissance à ses ordres ?
  - type: text
    content: Non ! Car l’obéissance ╵est préférable aux sacrifices,
  - type: text
    content: la soumission vaut mieux ╵que la graisse des béliers.
  '23':
  - type: text
    content: Car l’insoumission est aussi coupable ╵que le péché de divination
  - type: text
    content: et la désobéissance aussi grave ╵que le péché d’idolâtrie.
  - type: text
    content: Puisque tu as rejeté les ordres de
  - type: text
    content: l’Eternel,
  - type: text
    content: lui aussi te rejette et te retire la
  - type: text
    content: royauté.
  '24':
  - type: text
    content: 'Alors Saül répondit à Samuel : J’ai péché, car j’ai transgressé l’ordre de l’Eternel et tes instructions, parce que j’ai eu peur de mécontenter mes soldats, et j’ai cédé à leurs demandes. '
  '25':
  - type: text
    content: A présent, je t’en prie, pardonne ma faute ; et reviens avec moi pour que je me prosterne devant l’Eternel.
  '26':
  - type: text
    content: – Non, répliqua Samuel. Je n’irai pas avec toi, car tu as rejeté les ordres de l’Eternel, c’est pourquoi l’Eternel te rejette aussi et te retire la royauté sur Israël.
  '27':
  - type: text
    content: 'Comme Samuel se retournait pour partir, Saül le saisit par le pan de son manteau et le morceau fut arraché. '
  '28':
  - type: text
    content: 'Alors Samuel lui déclara : C’est ainsi que l’Eternel t’arrache aujourd’hui la royauté d’Israël pour la donner à un autre qui est meilleur que toi. '
  '29':
  - type: text
    content: 'Sois-en certain : Celui qui est la gloire d’Israël ne ment pas et ne se rétractera pas, car il n’est pas comme un être humain pour se rétracter.'
  '3':
  - type: text
    content: Maintenant, va les attaquer et voue-les moi
  - type: note
    content: Voir Lv 27.28-29.
  - type: text
    content: ' en les exterminant totalement avec tout ce qui leur appartient. Sois sans pitié et fais périr hommes et femmes, enfants et bébés, bœufs, moutons, chèvres, chameaux et ânes. »'
  '30':
  - type: text
    content: 'Saül répéta : J’ai péché ! Toutefois, en ce moment, je t’en supplie, continue à m’honorer devant les responsables de mon peuple et devant Israël. Reviens avec moi et je me prosternerai devant l’Eternel ton Dieu !'
  '31':
  - type: text
    content: 'A la fin, Samuel l’accompagna et Saül se prosterna devant l’Eternel. '
  '32':
  - type: text
    content: 'Samuel ordonna : Amenez-moi Agag, roi d’Amalec !'
  - type: text
    content: Celui-ci arriva d’un air content
  - type: note
    content: 'Autres traductions : plein d’assurance ou en tremblant.'
  - type: text
    content: ', car il se disait : « Certainement l’amertume de la mort s’est éloignée. »'
  '33':
  - type: text
    content: 'Mais Samuel lui déclara : Ton épée a privé bien des femmes de leurs enfants, à présent c’est ta mère qui sera privée de son fils !'
  - type: text
    content: Et Samuel exécuta Agag devant l’Eternel à Guilgal.
  '34':
  - type: text
    content: Puis il retourna à Rama, et Saül rentra chez lui à Guibéa de Saül.
  '35':
  - type: text
    content: Samuel n’alla plus voir Saül jusqu’au jour de sa mort ; mais il était dans l’affliction à son sujet parce que l’Eternel avait décidé d’annuler ce qu’il avait fait en l’établissant roi sur Israël.
  '4':
  - type: text
    content: Saül mobilisa son armée et la passa en revue à Telaïm ; il compta deux cent mille soldats des provinces du Nord et dix mille hommes de Juda
  - type: note
    content: Il pourrait s’agir de deux cents « milliers » de soldats et de dix « milliers » d’hommes de Juda (voir note 8.12).
  - type: text
    content: '. '
  '5':
  - type: text
    content: 'Il les conduisit jusqu’à la ville d’Amalec et plaça une embuscade dans le ravin. '
  '6':
  - type: text
    content: 'Puis il fit dire aux Qéniens : Partez, séparez-vous des Amalécites pour que je ne vous fasse pas subir le même sort qu’à eux, car vous avez été bons envers les Israélites quand ils venaient d’Egypte.'
  - type: text
    content: Les Qéniens se retirèrent donc du milieu des Amalécites
  - type: note
    content: Voir Jg 4.11 et note.
  - type: text
    content: .
  '7':
  - type: text
    content: Saül battit Amalec depuis Havila jusqu’aux abords de Shour à l’est de l’Egypte
  - type: note
    content: Shour est situé sur la frontière orientale de l’Egypte (27.8 ; Gn 16.7 ; 20.1). Havila semble s’appliquer à toute la région du désert au sud-est du pays d’Israël (voir Gn 25.18).
  - type: text
    content: '. '
  '8':
  - type: text
    content: 'Il captura Agag, roi d’Amalec, vivant, et extermina toute la population par l’épée. '
  '9':
  - type: text
    content: 'Saül et ses soldats épargnèrent Agag ainsi que les meilleurs animaux du butin : moutons, chèvres et bœufs, bêtes grasses et agneaux ; ils ne voulurent pas les détruire pour les vouer à l’Eternel. Par contre, ils détruisirent tout ce qui était méprisable et sans valeur.'
  - type: heading
    content: L’Eternel rejette Saül
