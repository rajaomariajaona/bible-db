document_id: 2SA.5,21
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: David devient roi de tout Israël
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: (1 Ch 11.1-3)
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Des représentants de toutes les tribus d’Israël vinrent auprès de David à Hébron et lui dirent : Nous voici ! Nous sommes de ta race et de ton sang. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: David devenait de plus en plus puissant, et l’Eternel, le Dieu des armées célestes, était avec lui.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: La délégation d’Hiram, roi de Tyr
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: (1 Ch 14.1-2)
    marker-yv: yv-h
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'Hiram, le roi de Tyr, envoya une délégation à David, en lui faisant livrer du bois de cèdre et en lui envoyant des charpentiers et des tailleurs de pierre qui lui construisirent un palais. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: David reconnut alors que l’Eternel le confirmait comme roi sur Israël et qu’il donnait de l’éclat à son règne à cause d’Israël, son peuple.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Les fils de David nés à Jérusalem
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: (1 Ch 3.5-9 ; 14.3-7)
    marker-yv: yv-h
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: Après son départ d’Hébron et son installation à Jérusalem, David épousa encore d’autres femmes de premier et de second rang, dont il eut des fils et des filles.
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'Voici le nom de ses enfants nés à Jérusalem : Shammoua, Shobab, Nathan, Salomon'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '5.14 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Tous fils de Bath-Shéba (voir '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: 1 Ch 3.5
        - type: text
          text: ).
      marker-yv: yv-n
    - type: text
      text: ', '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'Yibhar, Elishoua, Népheg, Yaphia, '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: Elishama, Elyada et Eliphéleth.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: David défait les Philistins
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: (1 Ch 14.8-16)
    marker-yv: yv-h
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: Lorsque les Philistins apprirent que David avait été établi roi d’Israël par l’onction, ils se mirent tous en campagne à sa recherche. David en fut informé et se retira dans le refuge fortifié
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '5.17 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Probablement le refuge d’Adoullam près de Bethléhem (voir 1 S 22.1 ; 2 S 23.14).
      marker-yv: yv-n
    - type: text
      text: '. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: Les Philistins arrivèrent et se déployèrent dans la vallée des Rephaïm
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '5.18 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Au sud-ouest de Jérusalem (Jos 15.8 ; 18.16).
      marker-yv: yv-n
    - type: text
      text: '. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'David consulta l’Eternel et lui demanda : Dois-je attaquer les Philistins ? Me donneras-tu la victoire sur eux ?'
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'L’Eternel répondit à David : Attaque-les ! Car je t’assure que je te donnerai la victoire sur les Philistins.'
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: Autrefois déjà, du temps où Saül était notre roi, c’est toi qui dirigeais les expéditions militaires d’Israël. Or l’Eternel t’a promis que tu serais le berger d’Israël son peuple et que tu en deviendrais le chef.
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: 'David se rendit donc jusqu’à Baal-Peratsim et les battit là. Puis il déclara : Comme les eaux rompent une digue, l’Eternel a fait une brèche devant moi dans les rangs de mes ennemis.'
  - type: usfm
    marker: p
    children:
    - type: text
      text: C’est pourquoi on a donné à ce lieu le nom de Baal-Peratsim (le Maître des brèches
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '5.20 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Victoire mentionnée en '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: Es 28.21
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: '). '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: Les Philistins abandonnèrent leurs idoles sur place, et David et ses gens les emportèrent.
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: 'Les Philistins revinrent à l’attaque et se déployèrent de nouveau dans la vallée des Rephaïm. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: 'David consulta l’Eternel qui lui répondit : N’y va pas directement ! Contourne-les par leurs arrières, puis reviens sur eux en face de la forêt des mûriers. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: Quand tu entendras un bruissement de pas dans les cimes des mûriers, alors hâte-toi, car je me serai mis en campagne devant toi pour battre l’armée des Philistins.
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: David fit ce que l’Eternel lui avait ordonné, et il battit les Philistins en les poursuivant depuis Guéba
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '5.25 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'L’ancienne version grecque, comme '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: 1 Ch 14.16
        - type: text
          text: ', a : '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: Gabaon.
      marker-yv: yv-n
    - type: text
      text: ' jusqu’à l’entrée de Guézer.'
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: Ainsi tous les responsables d’Israël vinrent trouver le roi à Hébron. Là, le roi David conclut une alliance avec eux devant l’Eternel, et ils lui conférèrent l’onction pour le faire roi d’Israël
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '5.3 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Troisième onction (1 S 16.13 ; 2 S 2.4) qui fait de lui le roi de tout Israël.
      marker-yv: yv-n
    - type: text
      text: .
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'David était âgé de trente ans à son avènement, et son règne dura quarante ans. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: Il régna sept ans et six mois sur Juda à Hébron, et il régna trente-trois ans sur tout Israël et Juda à Jérusalem
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '5.5 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Voir 1 R 2.11 ; 1 Ch 3.4 ; 29.27.
      marker-yv: yv-n
    - type: text
      text: .
  - type: usfm
    marker: s1
    children:
    - type: text
      text: La conquête de Jérusalem
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: (1 Ch 11.4-9)
    marker-yv: yv-h
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: Le roi marcha avec ses hommes sur Jérusalem pour combattre les Yebousiens
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '5.6 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Voir Jos 15.63 ; Jg 1.21.
      marker-yv: yv-n
    - type: text
      text: ' qui habitaient la région. Ceux-ci déclarèrent à David : Tu n’entreras pas ici ! Même des aveugles et des boiteux te repousseraient.'
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'C’était une manière de dire : David n’entrera pas dans la ville. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'Mais David s’empara de la forteresse de Sion, qu’on appelle la Cité de David. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'Ce jour-là, David avait déclaré à ses hommes : Celui qui veut battre les Yebousiens n’a qu’à grimper par le canal souterrain pour les atteindre. Quant à ces boiteux et ces aveugles, je les déteste. C’est de là que vient le dicton : Les aveugles et les boiteux n’entreront pas dans ma maison'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '5.8 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Autre traduction : '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: dans le Temple.
      marker-yv: yv-n
    - type: text
      text: .
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'David s’installa dans la forteresse qu’il appela la Cité de David. Il fit des constructions tout autour, depuis les terrasses aménagées pour les cultures jusque vers l’intérieur. '
