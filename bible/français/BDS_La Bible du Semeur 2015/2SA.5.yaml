document_id: 2SA.5,21
type_code: fra
verses:
  '1':
  - type: heading
    content: David devient roi de tout Israël
  - type: heading
    content: (1 Ch 11.1-3)
  - type: text
    content: 'Des représentants de toutes les tribus d’Israël vinrent auprès de David à Hébron et lui dirent : Nous voici ! Nous sommes de ta race et de ton sang. '
  '10':
  - type: text
    content: David devenait de plus en plus puissant, et l’Eternel, le Dieu des armées célestes, était avec lui.
  - type: heading
    content: La délégation d’Hiram, roi de Tyr
  - type: heading
    content: (1 Ch 14.1-2)
  '11':
  - type: text
    content: 'Hiram, le roi de Tyr, envoya une délégation à David, en lui faisant livrer du bois de cèdre et en lui envoyant des charpentiers et des tailleurs de pierre qui lui construisirent un palais. '
  '12':
  - type: text
    content: David reconnut alors que l’Eternel le confirmait comme roi sur Israël et qu’il donnait de l’éclat à son règne à cause d’Israël, son peuple.
  - type: heading
    content: Les fils de David nés à Jérusalem
  - type: heading
    content: (1 Ch 3.5-9 ; 14.3-7)
  '13':
  - type: text
    content: Après son départ d’Hébron et son installation à Jérusalem, David épousa encore d’autres femmes de premier et de second rang, dont il eut des fils et des filles.
  '14':
  - type: text
    content: 'Voici le nom de ses enfants nés à Jérusalem : Shammoua, Shobab, Nathan, Salomon'
  - type: note
    content: Tous fils de Bath-Shéba (voir 1 Ch 3.5).
  - type: text
    content: ', '
  '15':
  - type: text
    content: 'Yibhar, Elishoua, Népheg, Yaphia, '
  '16':
  - type: text
    content: Elishama, Elyada et Eliphéleth.
  - type: heading
    content: David défait les Philistins
  - type: heading
    content: (1 Ch 14.8-16)
  '17':
  - type: text
    content: Lorsque les Philistins apprirent que David avait été établi roi d’Israël par l’onction, ils se mirent tous en campagne à sa recherche. David en fut informé et se retira dans le refuge fortifié
  - type: note
    content: Probablement le refuge d’Adoullam près de Bethléhem (voir 1 S 22.1 ; 2 S 23.14).
  - type: text
    content: '. '
  '18':
  - type: text
    content: Les Philistins arrivèrent et se déployèrent dans la vallée des Rephaïm
  - type: note
    content: Au sud-ouest de Jérusalem (Jos 15.8 ; 18.16).
  - type: text
    content: '. '
  '19':
  - type: text
    content: 'David consulta l’Eternel et lui demanda : Dois-je attaquer les Philistins ? Me donneras-tu la victoire sur eux ?'
  - type: text
    content: 'L’Eternel répondit à David : Attaque-les ! Car je t’assure que je te donnerai la victoire sur les Philistins.'
  '2':
  - type: text
    content: Autrefois déjà, du temps où Saül était notre roi, c’est toi qui dirigeais les expéditions militaires d’Israël. Or l’Eternel t’a promis que tu serais le berger d’Israël son peuple et que tu en deviendrais le chef.
  '20':
  - type: text
    content: 'David se rendit donc jusqu’à Baal-Peratsim et les battit là. Puis il déclara : Comme les eaux rompent une digue, l’Eternel a fait une brèche devant moi dans les rangs de mes ennemis.'
  - type: text
    content: C’est pourquoi on a donné à ce lieu le nom de Baal-Peratsim (le Maître des brèches
  - type: note
    content: Victoire mentionnée en Es 28.21.
  - type: text
    content: '). '
  '21':
  - type: text
    content: Les Philistins abandonnèrent leurs idoles sur place, et David et ses gens les emportèrent.
  '22':
  - type: text
    content: 'Les Philistins revinrent à l’attaque et se déployèrent de nouveau dans la vallée des Rephaïm. '
  '23':
  - type: text
    content: 'David consulta l’Eternel qui lui répondit : N’y va pas directement ! Contourne-les par leurs arrières, puis reviens sur eux en face de la forêt des mûriers. '
  '24':
  - type: text
    content: Quand tu entendras un bruissement de pas dans les cimes des mûriers, alors hâte-toi, car je me serai mis en campagne devant toi pour battre l’armée des Philistins.
  '25':
  - type: text
    content: David fit ce que l’Eternel lui avait ordonné, et il battit les Philistins en les poursuivant depuis Guéba
  - type: note
    content: 'L’ancienne version grecque, comme 1 Ch 14.16, a : Gabaon.'
  - type: text
    content: ' jusqu’à l’entrée de Guézer.'
  '3':
  - type: text
    content: Ainsi tous les responsables d’Israël vinrent trouver le roi à Hébron. Là, le roi David conclut une alliance avec eux devant l’Eternel, et ils lui conférèrent l’onction pour le faire roi d’Israël
  - type: note
    content: Troisième onction (1 S 16.13 ; 2 S 2.4) qui fait de lui le roi de tout Israël.
  - type: text
    content: .
  '4':
  - type: text
    content: 'David était âgé de trente ans à son avènement, et son règne dura quarante ans. '
  '5':
  - type: text
    content: Il régna sept ans et six mois sur Juda à Hébron, et il régna trente-trois ans sur tout Israël et Juda à Jérusalem
  - type: note
    content: Voir 1 R 2.11 ; 1 Ch 3.4 ; 29.27.
  - type: text
    content: .
  - type: heading
    content: La conquête de Jérusalem
  - type: heading
    content: (1 Ch 11.4-9)
  '6':
  - type: text
    content: Le roi marcha avec ses hommes sur Jérusalem pour combattre les Yebousiens
  - type: note
    content: Voir Jos 15.63 ; Jg 1.21.
  - type: text
    content: ' qui habitaient la région. Ceux-ci déclarèrent à David : Tu n’entreras pas ici ! Même des aveugles et des boiteux te repousseraient.'
  - type: text
    content: 'C’était une manière de dire : David n’entrera pas dans la ville. '
  '7':
  - type: text
    content: 'Mais David s’empara de la forteresse de Sion, qu’on appelle la Cité de David. '
  '8':
  - type: text
    content: 'Ce jour-là, David avait déclaré à ses hommes : Celui qui veut battre les Yebousiens n’a qu’à grimper par le canal souterrain pour les atteindre. Quant à ces boiteux et ces aveugles, je les déteste. C’est de là que vient le dicton : Les aveugles et les boiteux n’entreront pas dans ma maison'
  - type: note
    content: 'Autre traduction : dans le Temple.'
  - type: text
    content: .
  '9':
  - type: text
    content: 'David s’installa dans la forteresse qu’il appela la Cité de David. Il fit des constructions tout autour, depuis les terrasses aménagées pour les cultures jusque vers l’intérieur. '
