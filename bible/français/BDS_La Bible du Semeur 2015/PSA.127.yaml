document_id: PSA.127,21
type_code: fra
verses:
  '1':
  - type: heading
    content: De qui tout dépend
  - type: text
    content: Cantique pour la route vers la demeure de l’Eternel
  - type: note
    content: Voir note 120.1.
  - type: text
    content: . De Salomon.
  - type: text
    content: Si l’Eternel ╵ne bâtit la maison,
  - type: text
    content: en vain les bâtisseurs travaillent.
  - type: text
    content: Si l’Eternel ╵ne garde pas la ville,
  - type: text
    content: en vain la sentinelle veille.
  '2':
  - type: text
    content: Oui, il est vain ╵de vous lever très tôt ╵et de vous coucher tard,
  - type: text
    content: et de vous donner tant de peine ╵pour gagner votre pain.
  - type: text
    content: Car Dieu en donne autant ╵à ceux qui lui sont chers ╵pendant qu’ils dorment.
  '3':
  - type: text
    content: 'Des fils : ╵voilà le patrimoine ╵que donne l’Eternel,'
  - type: text
    content: oui, des enfants ╵sont une récompense.
  '4':
  - type: text
    content: Ils sont pareils aux flèches ╵dans la main d’un guerrier,
  - type: text
    content: les fils de la jeunesse
  - type: note
    content: Nés alors que les parents étaient encore jeunes et qui pourront donc les assister (v. 5) lorsqu’ils seront âgés.
  - type: text
    content: .
  '5':
  - type: text
    content: Heureux est l’homme ╵dont le carquois en est rempli !
  - type: text
    content: Il ne connaîtra pas la honte
  - type: text
    content: lorsqu’il entrera en contestation ╵avec son adversaire ╵aux portes de la ville
  - type: note
    content: Là où se traitaient les affaires et où l’on exerçait la justice.
  - type: text
    content: .
