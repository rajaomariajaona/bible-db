document_id: PSA.127,21
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: De qui tout dépend
    marker-yv: yv-h
  - type: usfm
    marker: d
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: Cantique pour la route vers la demeure de l’Eternel
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '127.1 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Voir note '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: '120.1'
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: . De Salomon.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Si l’Eternel ╵ne bâtit la maison,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: en vain les bâtisseurs travaillent.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Si l’Eternel ╵ne garde pas la ville,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: en vain la sentinelle veille.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: Oui, il est vain ╵de vous lever très tôt ╵et de vous coucher tard,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et de vous donner tant de peine ╵pour gagner votre pain.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Car Dieu en donne autant ╵à ceux qui lui sont chers ╵pendant qu’ils dorment.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'Des fils : ╵voilà le patrimoine ╵que donne l’Eternel,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: oui, des enfants ╵sont une récompense.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: Ils sont pareils aux flèches ╵dans la main d’un guerrier,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: les fils de la jeunesse
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '127.4 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Nés alors que les parents étaient encore jeunes et qui pourront donc les assister (v. 5) lorsqu’ils seront âgés.
      marker-yv: yv-n
    - type: text
      text: .
  '5':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: Heureux est l’homme ╵dont le carquois en est rempli !
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Il ne connaîtra pas la honte
  - type: usfm
    marker: q1
    children:
    - type: text
      text: lorsqu’il entrera en contestation ╵avec son adversaire ╵aux portes de la ville
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '127.5 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Là où se traitaient les affaires et où l’on exerçait la justice.
      marker-yv: yv-n
    - type: text
      text: .
