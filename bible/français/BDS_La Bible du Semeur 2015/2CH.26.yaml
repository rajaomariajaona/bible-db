document_id: 2CH.26
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ozias est fidèle à l’Eternel et il est béni
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: (2 R 14.21-22 ; 15.1-3)
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Alors tout le peuple de Juda prit son fils Ozias
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '26.1 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Appelé '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'Azaria '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: en 2 R 14.21-22 ; 15.1-7.
    marker-yv: yv-n
  - type: text
    text: ', âgé de seize ans, pour le proclamer roi à la place de son père Amatsia. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: C’est lui qui ramena Eiloth sous la domination de Juda et qui la reconstruisit, après la mort du roi
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '26.2 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Voir '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 2 Ch 8.17
        metadata:
          usfm: 2CH.8.17
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Ozias était âgé de seize ans à son avènement, et il régna cinquante-deux ans à Jérusalem
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '26.3 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: De 792 à 740 av. J.-C., dont une corégence avec son père Amatsia de 792 à 767 av. J.-C.
    marker-yv: yv-n
  - type: text
    text: '. Sa mère se nommait Yekolia. Elle était de Jérusalem. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Il fit ce que l’Eternel considère comme juste, imitant en tout point son père Amatsia.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Il s’attacha à Dieu tant que vécut Zacharie
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '26.5 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Zacharie '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: semble avoir été un conseiller d’Ozias.
    marker-yv: yv-n
  - type: text
    text: ' qui lui enseignait la crainte de Dieu'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '26.5 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'D’après plusieurs manuscrits hébreux, l’ancienne version grecque et la version syriaque. D’autres manuscrits hébreux ont : '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: les révélations de Dieu.
    marker-yv: yv-n
  - type: text
    text: '. Aussi longtemps qu’il resta attaché à l’Eternel, Dieu lui accorda la réussite. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Il fit campagne contre les Philistins et démolit les remparts de Gath, ceux de Yabné et ceux d’Ashdod. Il fortifia plusieurs villes dans la région d’Ashdod et dans d’autres territoires philistins
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '26.6 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Ozias oriente ses conquêtes vers le sud-est et le sud-ouest, le nord étant bloqué par le puissant Jéroboam II du royaume du Nord.
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Dieu l’assista dans la lutte contre les Philistins, contre les Arabes établis à Gour-Baal, et contre les Maonites
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '26.7 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Voir note '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '20.1'
        metadata:
          usfm: 2CH.20.1
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Les Ammonites lui payèrent un tribut et sa renommée se répandit au loin jusqu’en Egypte, car il était devenu extrêmement puissant. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Ozias bâtit des tours fortifiées à Jérusalem au-dessus de la porte de l’Angle, de la porte de la Vallée et à l’angle. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Il construisit aussi des tours de garde dans les régions de steppes et fit creuser beaucoup de citernes pour les nombreux troupeaux qu’il possédait. Il favorisa les agriculteurs dans le Bas-Pays et la plaine côtière, et les vignerons dans les régions montagneuses et sur le Carmel, car il aimait beaucoup la terre. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Il avait une armée bien entraînée. Pour aller au combat, elle avait été organisée en divisions d’après le nombre des hommes recrutés par le secrétaire Yeïel et le commissaire Maaséya, sous la direction de Hanania, haut fonctionnaire du roi. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: '2 600 chefs de groupes familiaux commandaient ces guerriers valeureux. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Ils avaient sous leurs ordres une armée de 307 500 combattants toujours prêts à engager le combat avec force pour défendre le roi contre ses ennemis. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: A chaque campagne
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '26.14 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Autre traduction : '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: à toute l’armée.
    marker-yv: yv-n
  - type: text
    text: ', Ozias leur distribuait des boucliers, des lances, des casques, des cuirasses, des arcs et des pierres de fronde. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Il fit aussi fabriquer à Jérusalem des engins conçus par un artisan habile et destinés à être placés sur les tours et aux angles des murailles pour tirer des flèches et lancer de grosses pierres. Ainsi, sa renommée s’étendit au loin, car il fut merveilleusement aidé jusqu’à ce qu’il soit devenu puissant.
- type: usfm
  marker: s1
  children:
  - type: text
    text: L’orgueil et la faute d’Ozias
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Mais lorsqu’il fut devenu puissant, son cœur se gonfla d’orgueil, ce qui entraîna sa perte. Il fut rebelle à l’Eternel son Dieu car il pénétra dans son temple pour offrir des parfums sur l’autel des parfums
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '26.16 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Seuls les prêtres avaient le droit d’offrir l’encens (Nb 3.10 ; 17.5 ; 18.7 ; 1 Ch 23.13). Peut-être Ozias voulait-il imiter les rois païens environnants qui étaient à la fois rois et prêtres ?
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Le prêtre Azaria entra derrière lui accompagné de quatre-vingts prêtres de l’Eternel, qui, avec courage, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 's’opposèrent au roi Ozias et lui dirent : Ce n’est pas à toi, Ozias, d’offrir l’encens à l’Eternel, mais c’est réservé aux prêtres, descendants d’Aaron, qui ont été consacrés pour cela. Sors du sanctuaire, car tu commets un acte de rébellion et, de par l’Eternel Dieu, cet acte ne sera pas à ta gloire.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Alors Ozias, qui tenait un encensoir à la main, se mit en colère contre les prêtres. Au même moment, alors qu’il était là, dans le temple de l’Eternel, près de l’autel des parfums, une affection de la peau apparut sur son front en présence des prêtres. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Le grand-prêtre Azaria et tous les prêtres le regardèrent et aperçurent des taches malignes sur son front. Ils l’expulsèrent immédiatement du Temple
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '26.20 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: La maladie de peau dont était affecté le roi le rendait rituellement impur, ce qui entraînait son exclusion de la communauté (
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Lv 13.45-46
        metadata:
          usfm: LEV.13.45+LEV.13.46
      - type: text
        text: ).
    marker-yv: yv-n
  - type: text
    text: ', tandis que lui-même se dépêchait de sortir parce que l’Eternel l’avait frappé.'
- type: usfm
  marker: r
  children:
  - type: text
    text: (2 R 15.5-7)
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Le roi Ozias resta affecté de cette maladie jusqu’au jour de sa mort et vécut dans une maison d’isolement comme impur, tenu à l’écart du temple de l’Eternel. Son fils Yotam avait la charge du palais royal et gouvernait le peuple du pays. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: Les autres faits et gestes d’Ozias, des premiers aux derniers, a été consigné par écrit par le prophète Esaïe, fils d’Amots.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Ozias rejoignit ses ancêtres décédés et fut enterré auprès d’eux sur un terrain de sépultures, car on disait : « Il était atteint d’une maladie rendant impur. »'
- type: usfm
  marker: p
  children:
  - type: text
    text: Son fils Yotam lui succéda sur le trône.
