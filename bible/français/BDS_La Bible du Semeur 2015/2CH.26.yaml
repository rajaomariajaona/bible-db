document_id: 2CH.26,21
type_code: fra
verses:
  '1':
  - type: heading
    content: Ozias est fidèle à l’Eternel et il est béni
  - type: heading
    content: (2 R 14.21-22 ; 15.1-3)
  - type: text
    content: Alors tout le peuple de Juda prit son fils Ozias
  - type: note
    content: Appelé Azaria en 2 R 14.21-22 ; 15.1-7.
  - type: text
    content: ', âgé de seize ans, pour le proclamer roi à la place de son père Amatsia. '
  '10':
  - type: text
    content: 'Il construisit aussi des tours de garde dans les régions de steppes et fit creuser beaucoup de citernes pour les nombreux troupeaux qu’il possédait. Il favorisa les agriculteurs dans le Bas-Pays et la plaine côtière, et les vignerons dans les régions montagneuses et sur le Carmel, car il aimait beaucoup la terre. '
  '11':
  - type: text
    content: 'Il avait une armée bien entraînée. Pour aller au combat, elle avait été organisée en divisions d’après le nombre des hommes recrutés par le secrétaire Yeïel et le commissaire Maaséya, sous la direction de Hanania, haut fonctionnaire du roi. '
  '12':
  - type: text
    content: '2 600 chefs de groupes familiaux commandaient ces guerriers valeureux. '
  '13':
  - type: text
    content: 'Ils avaient sous leurs ordres une armée de 307 500 combattants toujours prêts à engager le combat avec force pour défendre le roi contre ses ennemis. '
  '14':
  - type: text
    content: A chaque campagne
  - type: note
    content: 'Autre traduction : à toute l’armée.'
  - type: text
    content: ', Ozias leur distribuait des boucliers, des lances, des casques, des cuirasses, des arcs et des pierres de fronde. '
  '15':
  - type: text
    content: Il fit aussi fabriquer à Jérusalem des engins conçus par un artisan habile et destinés à être placés sur les tours et aux angles des murailles pour tirer des flèches et lancer de grosses pierres. Ainsi, sa renommée s’étendit au loin, car il fut merveilleusement aidé jusqu’à ce qu’il soit devenu puissant.
  - type: heading
    content: L’orgueil et la faute d’Ozias
  '16':
  - type: text
    content: Mais lorsqu’il fut devenu puissant, son cœur se gonfla d’orgueil, ce qui entraîna sa perte. Il fut rebelle à l’Eternel son Dieu car il pénétra dans son temple pour offrir des parfums sur l’autel des parfums
  - type: note
    content: Seuls les prêtres avaient le droit d’offrir l’encens (Nb 3.10 ; 17.5 ; 18.7 ; 1 Ch 23.13). Peut-être Ozias voulait-il imiter les rois païens environnants qui étaient à la fois rois et prêtres ?
  - type: text
    content: '. '
  '17':
  - type: text
    content: 'Le prêtre Azaria entra derrière lui accompagné de quatre-vingts prêtres de l’Eternel, qui, avec courage, '
  '18':
  - type: text
    content: 's’opposèrent au roi Ozias et lui dirent : Ce n’est pas à toi, Ozias, d’offrir l’encens à l’Eternel, mais c’est réservé aux prêtres, descendants d’Aaron, qui ont été consacrés pour cela. Sors du sanctuaire, car tu commets un acte de rébellion et, de par l’Eternel Dieu, cet acte ne sera pas à ta gloire.'
  '19':
  - type: text
    content: 'Alors Ozias, qui tenait un encensoir à la main, se mit en colère contre les prêtres. Au même moment, alors qu’il était là, dans le temple de l’Eternel, près de l’autel des parfums, une affection de la peau apparut sur son front en présence des prêtres. '
  '2':
  - type: text
    content: C’est lui qui ramena Eiloth sous la domination de Juda et qui la reconstruisit, après la mort du roi
  - type: note
    content: Voir 2 Ch 8.17.
  - type: text
    content: '. '
  '20':
  - type: text
    content: Le grand-prêtre Azaria et tous les prêtres le regardèrent et aperçurent des taches malignes sur son front. Ils l’expulsèrent immédiatement du Temple
  - type: note
    content: La maladie de peau dont était affecté le roi le rendait rituellement impur, ce qui entraînait son exclusion de la communauté (Lv 13.45-46).
  - type: text
    content: ', tandis que lui-même se dépêchait de sortir parce que l’Eternel l’avait frappé.'
  - type: heading
    content: (2 R 15.5-7)
  '21':
  - type: text
    content: 'Le roi Ozias resta affecté de cette maladie jusqu’au jour de sa mort et vécut dans une maison d’isolement comme impur, tenu à l’écart du temple de l’Eternel. Son fils Yotam avait la charge du palais royal et gouvernait le peuple du pays. '
  '22':
  - type: text
    content: Les autres faits et gestes d’Ozias, des premiers aux derniers, a été consigné par écrit par le prophète Esaïe, fils d’Amots.
  '23':
  - type: text
    content: 'Ozias rejoignit ses ancêtres décédés et fut enterré auprès d’eux sur un terrain de sépultures, car on disait : « Il était atteint d’une maladie rendant impur. »'
  - type: text
    content: Son fils Yotam lui succéda sur le trône.
  '3':
  - type: text
    content: Ozias était âgé de seize ans à son avènement, et il régna cinquante-deux ans à Jérusalem
  - type: note
    content: De 792 à 740 av. J.-C., dont une corégence avec son père Amatsia de 792 à 767 av. J.-C.
  - type: text
    content: '. Sa mère se nommait Yekolia. Elle était de Jérusalem. '
  '4':
  - type: text
    content: Il fit ce que l’Eternel considère comme juste, imitant en tout point son père Amatsia.
  '5':
  - type: text
    content: Il s’attacha à Dieu tant que vécut Zacharie
  - type: note
    content: Zacharie semble avoir été un conseiller d’Ozias.
  - type: text
    content: ' qui lui enseignait la crainte de Dieu'
  - type: note
    content: 'D’après plusieurs manuscrits hébreux, l’ancienne version grecque et la version syriaque. D’autres manuscrits hébreux ont : les révélations de Dieu.'
  - type: text
    content: '. Aussi longtemps qu’il resta attaché à l’Eternel, Dieu lui accorda la réussite. '
  '6':
  - type: text
    content: Il fit campagne contre les Philistins et démolit les remparts de Gath, ceux de Yabné et ceux d’Ashdod. Il fortifia plusieurs villes dans la région d’Ashdod et dans d’autres territoires philistins
  - type: note
    content: Ozias oriente ses conquêtes vers le sud-est et le sud-ouest, le nord étant bloqué par le puissant Jéroboam II du royaume du Nord.
  - type: text
    content: '. '
  '7':
  - type: text
    content: Dieu l’assista dans la lutte contre les Philistins, contre les Arabes établis à Gour-Baal, et contre les Maonites
  - type: note
    content: Voir note 20.1.
  - type: text
    content: '. '
  '8':
  - type: text
    content: 'Les Ammonites lui payèrent un tribut et sa renommée se répandit au loin jusqu’en Egypte, car il était devenu extrêmement puissant. '
  '9':
  - type: text
    content: 'Ozias bâtit des tours fortifiées à Jérusalem au-dessus de la porte de l’Angle, de la porte de la Vallée et à l’angle. '
