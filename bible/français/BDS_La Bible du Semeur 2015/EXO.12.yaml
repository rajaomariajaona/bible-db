document_id: EXO.12,21
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: La Pâque
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'L’Eternel parla à Moïse et à Aaron en Egypte. Il leur dit : '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'Vous n’en garderez rien pour le lendemain. S’il reste quelque chose jusqu’au lendemain, vous le brûlerez. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'Vous le mangerez à la hâte, prêts à partir : la ceinture nouée aux reins, les sandales aux pieds et le bâton à la main. Ce sera la Pâque'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '12.11 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Dans la maison, on ne portait ni sandales, ni ceinture. Les mettre ici était un acte de foi dans l’ordre imminent de départ. Le mot hébreu rendu par '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Pâque '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'vient d’un terme signifiant : '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'passer par-dessus '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: (v. 13, 23, 27).
      marker-yv: yv-n
    - type: text
      text: ' que l’on célébrera en l’honneur de l’Eternel. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'Je parcourrai l’Egypte cette nuit-là et je frapperai tout premier-né dans le pays, homme et bête, et j’exercerai ainsi mes jugements contre tous les dieux de l’Egypte ; je suis l’Eternel. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: Le sang sera pour vous un signe sur les maisons où vous serez ; je verrai le sang, je passerai par-dessus vous. Ainsi le fléau destructeur ne vous atteindra pas lorsque je frapperai l’Egypte.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: La semaine des pains sans levain
    marker-yv: yv-h
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'De génération en génération, vous commémorerez ce jour par une fête que vous célébrerez en l’honneur de l’Eternel. Cette fête est une institution en vigueur à perpétuité. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: Pendant sept jours, vous mangerez des pains sans levain
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '12.15 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: C’est pourquoi la Pâque est souvent aussi appelée la fête des Pains sans levain (Lv 23.6 ; Lc 22.7 ; Ac 12.3). Plus tard, de manière négative, le levain symbolisera souvent l’hypocrisie (
        - type: usfm
          marker: ref
          children:
          - type: text
            text: Lc 12.1
        - type: text
          text: ), « le mal et la méchanceté » (
        - type: usfm
          marker: ref
          children:
          - type: text
            text: 1 Co 5.8
        - type: text
          text: ).
      marker-yv: yv-n
    - type: text
      text: '. Dès le premier jour, vous ferez disparaître tout levain de vos maisons ; car si quelqu’un mange du pain levé, entre le premier jour et le septième, il sera retranché du peuple d’Israël. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'Vous aurez une assemblée cultuelle le premier jour, ainsi que le septième. Pendant ces deux jours-là, on ne fera aucun travail, sauf ce qui sera nécessaire pour préparer le repas de chacun. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'Vous célébrerez la fête des Pains sans levain pour commémorer ce jour où j’aurai fait sortir vos tribus d’Egypte. Vous observerez ce jour-là de génération en génération comme une institution en vigueur à perpétuité. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'A partir du soir du quatorzième jour du premier mois, vous mangerez des pains sans levain, jusqu’au soir du vingt et unième jour. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'Pendant sept jours, on ne devra trouver aucune trace de levain dans vos maisons. Toute personne qui mangera du pain levé sera exclue de la communauté d’Israël, que ce soit un étranger ou l’un des vôtres. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: Ce mois-ci
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '12.2 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Le mois des épis (Abib, plus tard Nisân) débute avec la première pleine lune du printemps (mars-avril).
      marker-yv: yv-n
    - type: text
      text: ' sera pour vous le premier mois de l’année. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: Vous ne consommerez aucune pâte levée dans tous les lieux où vous habiterez, vous ne mangerez que des pains sans levain.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: 'Dixième fléau : la mort des premiers-nés'
    marker-yv: yv-h
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: 'Moïse convoqua tous les responsables d’Israël et leur dit : Allez chercher un agneau ou un chevreau par famille, prenez-le et immolez-le comme agneau pascal. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: Ensuite, vous prendrez un bouquet d’hysope, vous le tremperez dans le bassin contenant le sang de l’animal et vous en badigeonnerez le linteau et les deux montants de vos portes. Aucun de vous ne passera la porte de sa maison pour sortir jusqu’au matin.
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: L’Eternel parcourra l’Egypte pour la frapper. Quand il verra le sang sur le linteau et sur les deux montants de vos portes, il passera par-dessus la porte et ne permettra pas au destructeur
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '12.23 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Un ange chargé d’exécuter ce jugement de Dieu (voir Gn 19.13 ; 2 S 24.16 ; Hé 11.28).
      marker-yv: yv-n
    - type: text
      text: ' de pénétrer dans votre maison pour porter ses coups.'
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: 'Vous observerez toutes ces prescriptions comme une institution pour vous et pour toutes les générations à venir. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: 'Lorsque vous serez arrivés dans le pays que l’Eternel vous donnera comme il l’a promis, vous accomplirez cette cérémonie. '
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: 'Lorsque vos enfants vous demanderont ce qu’elle signifie pour vous, '
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: 'vous leur répondrez : « C’est le sacrifice de la Pâque en l’honneur de l’Eternel qui a passé par-dessus les maisons des Israélites en Egypte lorsqu’il a frappé l’Egypte et qu’il a préservé nos familles. »'
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Le peuple s’agenouilla et se prosterna. '
  '28':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: Puis les Israélites se retirèrent et accomplirent tout ce que l’Eternel avait ordonné à Moïse et à Aaron.
  '29':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: 'Au milieu de la nuit, l’Eternel frappa tous les fils aînés d’Egypte, depuis celui du pharaon, qui régnait sur le trône, jusqu’à celui du détenu qui se trouvait en prison, et aux premiers-nés des animaux. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'Donnez à toute la communauté d’Israël les instructions suivantes : le dixième jour de ce mois, que chaque maison ou chaque famille se procure un agneau. '
  '30':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '30'
    - type: text
      text: Cette nuit-là, le pharaon se leva ainsi que tous ses hauts fonctionnaires et tous les Egyptiens. De grands cris furent poussés dans toute l’Egypte, car il n’y avait pas une maison où il n’y eût un mort.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: L’Exode
    marker-yv: yv-h
  '31':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '31'
    - type: text
      text: 'En pleine nuit, le pharaon convoqua Moïse et Aaron et leur dit : Levez-vous, partez de chez nous, vous et les Israélites, et allez rendre un culte à l’Eternel comme vous l’avez demandé ! '
  '32':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '32'
    - type: text
      text: Prenez avec vous votre bétail, gros et petit, comme vous l’avez dit, allez-vous-en et demandez pour moi la bénédiction de Dieu.
  '33':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '33'
    - type: text
      text: 'Les Egyptiens pressaient le peuple pour qu’il quitte rapidement le pays, car ils disaient : Nous allons tous mourir !'
  '34':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '34'
    - type: text
      text: 'Le peuple emporta sa pâte à pain avant qu’elle n’eût levé, ils enveloppèrent leurs corbeilles à pétrir dans leurs manteaux et les chargèrent sur leurs épaules. '
  '35':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '35'
    - type: text
      text: 'Par ailleurs, les Israélites s’étaient conformés aux instructions de Moïse : ils avaient demandé aux Egyptiens des objets d’argent et d’or ainsi que des vêtements. '
  '36':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '36'
    - type: text
      text: L’Eternel leur avait fait gagner la faveur des Egyptiens qui leur avaient donné ce qu’ils demandaient. C’est ainsi qu’ils dépouillèrent les Egyptiens.
  '37':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '37'
    - type: text
      text: Les Israélites partirent de Ramsès en direction de Soukkoth
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '12.37 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Ramsès
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: ': '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'voir '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: '1.11'
        - type: text
          text: ' et note. '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Soukkoth
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: ': '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ville du delta du Nil.
      marker-yv: yv-n
    - type: text
      text: '. Ils étaient environ six cent mille hommes de pied, sans compter les femmes et les enfants. '
  '38':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '38'
    - type: text
      text: 'Une foule nombreuse et composite se joignit à eux ; de plus, ils emmenaient un cheptel important de gros et de menu bétail. '
  '39':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '39'
    - type: text
      text: 'Comme ils avaient été chassés précipitamment d’Egypte sans pouvoir préparer de provisions de route, ils n’avaient emporté que la pâte non levée, ils se mirent donc à la cuire pour en faire des galettes sans levain. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'Si dans une maison on est trop peu nombreux pour manger un agneau, qu’on s’associe à la famille voisine la plus proche en tenant compte du nombre de personnes ; et l’on choisira l’agneau en fonction de ce que chacun peut manger. '
  '40':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '40'
    - type: text
      text: Les descendants d’Israël avaient séjourné durant quatre cent trente ans en Egypte
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '12.40 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Le Pentateuque samaritain et l’ancienne version grecque ajoutent : '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'et en Canaan. '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Voir Gn 15.13 ; Ga 3.17.
      marker-yv: yv-n
    - type: text
      text: '. '
  '41':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '41'
    - type: text
      text: Au terme de ces quatre cent trente ans, le jour de la Pâque, toutes les troupes de l’Eternel
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '12.41 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Allusion à l’ordre bien réglé, comme celui d’une armée, de ceux qui partaient (voir '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: '6.26'
        - type: text
          text: ).
      marker-yv: yv-n
    - type: text
      text: ' quittèrent l’Egypte.'
  '42':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '42'
    - type: text
      text: 'Comme l’Eternel veilla cette nuit-là, pour les faire sortir d’Egypte, cette nuit est réservée à l’Eternel : ce sera une nuit de veille pour les Israélites dans les générations à venir.'
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Les lois sur la participation à la Pâque
    marker-yv: yv-h
  '43':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '43'
    - type: text
      text: 'L’Eternel dit à Moïse et à Aaron : Voici les prescriptions au sujet de la Pâque : Aucun étranger n’en mangera. '
  '44':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '44'
    - type: text
      text: 'Un esclave acquis à prix d’argent devra être circoncis, puis il prendra part au repas de la Pâque. '
  '45':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '45'
    - type: text
      text: 'Mais le résident temporaire et l’ouvrier salarié n’y participeront pas. '
  '46':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '46'
    - type: text
      text: On mangera chaque agneau à l’intérieur de la maison. Vous n’emporterez aucun morceau de viande à l’extérieur et vous ne briserez aucun os de l’animal
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '12.46 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Voir '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: Nb 9.12
        - type: text
          text: '  ; verset cité dans '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: Jn 19.36
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: '. '
  '47':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '47'
    - type: text
      text: 'Toute la communauté d’Israël célébrera la Pâque. '
  '48':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '48'
    - type: text
      text: 'Si un étranger en résidence chez toi désire célébrer la Pâque en l’honneur de l’Eternel, tous les hommes de sa famille devront d’abord être circoncis ; il pourra alors célébrer la fête au même titre que l’Israélite. Aucun incirconcis ne pourra y prendre part. '
  '49':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '49'
    - type: text
      text: Une seule et même règle s’appliquera aux Israélites et aux étrangers séjournant parmi vous.
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'Vous prendrez un agneau ou un chevreau sans défaut, un mâle âgé d’un an. '
  '50':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '50'
    - type: text
      text: 'Tous les Israélites se conformèrent à ce que l’Eternel avait ordonné à Moïse et à Aaron. '
  '51':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '51'
    - type: text
      text: C’est en ce jour précis que l’Eternel fit sortir les descendants d’Israël d’Egypte, comme une armée en bon ordre.
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'Vous le garderez jusqu’au quatorzième jour de ce mois : ce jour-là, tout l’ensemble de la communauté d’Israël immolera ces agneaux à la nuit tombante'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '12.6 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'En hébreu : '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'entre les deux soirs, '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: c’est-à-dire entre le coucher du soleil et la nuit totale.
      marker-yv: yv-n
    - type: text
      text: .
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'On prendra de son sang et l’on en badigeonnera les deux montants et le linteau de la porte des maisons où il sera mangé. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: On en rôtira la viande et on la mangera cette nuit-là avec des pains sans levain et des herbes amères
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '12.8 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Laitue sauvage, chicorée ou autres plantes.
      marker-yv: yv-n
    - type: text
      text: '. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'Vous n’en mangerez rien qui soit à moitié cuit ou bouilli dans l’eau, tout sera rôti au feu avec la tête, les pattes et les abats. '
