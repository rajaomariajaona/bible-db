document_id: ISA.2,21
type_code: fra
verses:
  '1':
  - type: heading
    content: Le mont de l’Eternel
  - type: text
    content: Voici le message que Dieu a révélé à Esaïe, fils d’Amots, au sujet de Juda et de Jérusalem.
  '10':
  - type: text
    content: Réfugiez-vous dans les rochers
  - type: text
    content: et cachez-vous sous terre
  - type: text
    content: à cause des terreurs ╵que l’Eternel provoque,
  - type: text
    content: de l’éclat de sa majesté
  - type: note
    content: Voir Ap 6.15.
  - type: text
    content: .
  '11':
  - type: text
    content: L’homme au regard hautain ╵devra baisser les yeux,
  - type: text
    content: l’orgueil humain sera brisé,
  - type: text
    content: car en ce jour-là, l’Eternel ╵sera seul honoré.
  '12':
  - type: text
    content: Car l’Eternel, ╵le Seigneur des armées célestes, ╵tient en réserve un jour
  - type: text
    content: où il se dressera ╵contre tous les hautains, ╵les arrogants,
  - type: text
    content: les orgueilleux, ╵pour qu’ils soient abaissés ;
  '13':
  - type: text
    content: contre les cèdres du Liban, ╵qui s’élèvent bien haut,
  - type: text
    content: et contre tous les chênes ╵des plateaux du Basan
  - type: note
    content: Région à l’est du Jourdain et au nord de Galaad, réputée pour ses chênes (Ez 27.6) et ses troupeaux (Ez 39.18).
  - type: text
    content: ','
  '14':
  - type: text
    content: et contre les hautes montagnes
  - type: text
    content: et contre les collines ╵qui sont altières,
  '15':
  - type: text
    content: contre toutes les tours ╵qui sont très élevées
  - type: text
    content: et toutes les murailles ╵qui sont fortifiées,
  '16':
  - type: text
    content: contre les vaisseaux au long cours
  - type: note
    content: Voir 1 R 10.22 et note.
  - type: text
    content: et leurs denrées précieuses
  - type: note
    content: 'Autre traduction : contre les navires somptueux.'
  - type: text
    content: '  :'
  '17':
  - type: text
    content: il courbera ╵la fierté des humains
  - type: text
    content: et il abaissera ╵l’orgueil humain.
  - type: text
    content: Car, en ce jour-là, l’Eternel ╵sera seul honoré.
  '18':
  - type: text
    content: Et toutes les idoles ╵disparaîtront ensemble.
  '19':
  - type: text
    content: On se réfugiera ╵dans les cavernes des rochers
  - type: text
    content: et dans les antres de la terre
  - type: text
    content: à cause des terreurs ╵que l’Eternel provoque,
  - type: text
    content: de l’éclat de sa majesté
  - type: text
    content: quand il se lèvera ╵pour terrifier la terre.
  '2':
  - type: text
    content: Dans l’avenir, il adviendra
  - type: text
    content: que le mont ╵sur lequel est le temple ╵de l’Eternel
  - type: note
    content: C’est-à-dire le mont Sion.
  - type: text
    content: sera fermement établi ╵au-dessus des montagnes,
  - type: text
    content: et il s’élèvera ╵par-dessus toutes les hauteurs,
  - type: text
    content: et tous les peuples étrangers ╵y afflueront
  - type: note
    content: Les v. 2-4 sont repris en Mi 4.2-4.
  - type: text
    content: .
  '20':
  - type: text
    content: En ce jour-là,
  - type: text
    content: les hommes jetteront aux taupes
  - type: text
    content: et aux chauves-souris
  - type: text
    content: les idoles d’argent
  - type: text
    content: et les idoles d’or
  - type: text
    content: qu’ils se sont fabriquées ╵pour se prosterner devant elles.
  '21':
  - type: text
    content: Ils se réfugieront ╵dans les cavernes
  - type: text
    content: et dans les fentes des rochers
  - type: text
    content: à cause des terreurs ╵que l’Eternel provoque,
  - type: text
    content: de l’éclat de sa majesté
  - type: text
    content: quand il se lèvera ╵pour terrifier la terre.
  '22':
  - type: text
    content: C’est pourquoi, cessez donc ╵de vous confier en l’homme
  - type: text
    content: dont la vie ne tient qu’à un souffle,
  - type: text
    content: car, quelle est sa valeur ?
  '3':
  - type: text
    content: Oui, de nombreux peuples viendront,
  - type: text
    content: 'en se disant les uns aux autres :'
  - type: text
    content: « Venez, montons ╵au mont de l’Eternel,
  - type: text
    content: au temple du Dieu de Jacob !
  - type: text
    content: Il nous enseignera ╵les voies qu’il a prescrites ;
  - type: text
    content: nous suivrons ses sentiers. »
  - type: text
    content: Car de Sion viendra la Loi,
  - type: text
    content: et de Jérusalem, ╵la Parole de l’Eternel.
  '4':
  - type: text
    content: Et il sera l’arbitre ╵entre les nations ;
  - type: text
    content: oui, il sera le juge ╵de nombreux peuples.
  - type: text
    content: Martelant leurs épées, ╵ils forgeront des socs ╵pour leurs charrues,
  - type: text
    content: et, de leurs lances, ╵ils feront des faucilles
  - type: note
    content: Voir Jl 4.10.
  - type: text
    content: .
  - type: text
    content: Plus aucune nation ╵ne brandira l’épée ╵contre une autre nation,
  - type: text
    content: et l’on n’apprendra plus la guerre.
  '5':
  - type: text
    content: Descendants de Jacob,
  - type: text
    content: venez donc et marchons ╵à la lumière ╵de l’Eternel.
  '6':
  - type: text
    content: Tu as abandonné ton peuple, ╵la communauté de Jacob,
  - type: text
    content: car il est envahi ╵par les superstitions ╵qui viennent de l’Orient ;
  - type: text
    content: les devins y pullulent ╵autant qu’en Philistie.
  - type: text
    content: On pactise avec l’étranger.
  '7':
  - type: text
    content: Le pays est rempli ╵d’argent et d’or
  - type: text
    content: et de trésors sans fin.
  - type: text
    content: Il est plein de chevaux,
  - type: text
    content: et ses chars de combat ╵ne peuvent se compter.
  '8':
  - type: text
    content: Le pays est rempli d’idoles
  - type: text
    content: et les gens se prosternent
  - type: text
    content: devant leurs propres œuvres
  - type: text
    content: fabriquées de leurs mains.
  '9':
  - type: text
    content: Mais les hommes s’inclineront,
  - type: text
    content: ils seront humiliés.
  - type: text
    content: Ne leur pardonne pas
  - type: note
    content: 'Autre traduction : ne les relève pas.'
  - type: text
    content: '  !'
