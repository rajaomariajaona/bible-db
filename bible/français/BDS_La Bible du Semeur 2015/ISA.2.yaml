document_id: ISA.2
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Le mont de l’Eternel
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Voici le message que Dieu a révélé à Esaïe, fils d’Amots, au sujet de Juda et de Jérusalem.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Dans l’avenir, il adviendra
- type: usfm
  marker: q1
  children:
  - type: text
    text: que le mont ╵sur lequel est le temple ╵de l’Eternel
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '2.2 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'C’est-à-dire '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: le mont Sion.
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: text
    text: sera fermement établi ╵au-dessus des montagnes,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et il s’élèvera ╵par-dessus toutes les hauteurs,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et tous les peuples étrangers ╵y afflueront
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '2.2 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Les v. 2-4 sont repris en '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Mi 4.2-4
        metadata:
          usfm: MIC.4.2+MIC.4.3+MIC.4.4
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Oui, de nombreux peuples viendront,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'en se disant les uns aux autres :'
- type: usfm
  marker: q1
  children:
  - type: text
    text: « Venez, montons ╵au mont de l’Eternel,
- type: usfm
  marker: q1
  children:
  - type: text
    text: au temple du Dieu de Jacob !
- type: usfm
  marker: q1
  children:
  - type: text
    text: Il nous enseignera ╵les voies qu’il a prescrites ;
- type: usfm
  marker: q1
  children:
  - type: text
    text: nous suivrons ses sentiers. »
- type: usfm
  marker: q1
  children:
  - type: text
    text: Car de Sion viendra la Loi,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et de Jérusalem, ╵la Parole de l’Eternel.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Et il sera l’arbitre ╵entre les nations ;
- type: usfm
  marker: q1
  children:
  - type: text
    text: oui, il sera le juge ╵de nombreux peuples.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Martelant leurs épées, ╵ils forgeront des socs ╵pour leurs charrues,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et, de leurs lances, ╵ils feront des faucilles
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '2.4 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Voir '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Jl 4.10
        metadata:
          usfm: JOL.4.10
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: q1
  children:
  - type: text
    text: Plus aucune nation ╵ne brandira l’épée ╵contre une autre nation,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et l’on n’apprendra plus la guerre.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Descendants de Jacob,
- type: usfm
  marker: q1
  children:
  - type: text
    text: venez donc et marchons ╵à la lumière ╵de l’Eternel.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Tu as abandonné ton peuple, ╵la communauté de Jacob,
- type: usfm
  marker: q1
  children:
  - type: text
    text: car il est envahi ╵par les superstitions ╵qui viennent de l’Orient ;
- type: usfm
  marker: q1
  children:
  - type: text
    text: les devins y pullulent ╵autant qu’en Philistie.
- type: usfm
  marker: q1
  children:
  - type: text
    text: On pactise avec l’étranger.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Le pays est rempli ╵d’argent et d’or
- type: usfm
  marker: q1
  children:
  - type: text
    text: et de trésors sans fin.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Il est plein de chevaux,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et ses chars de combat ╵ne peuvent se compter.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Le pays est rempli d’idoles
- type: usfm
  marker: q1
  children:
  - type: text
    text: et les gens se prosternent
- type: usfm
  marker: q1
  children:
  - type: text
    text: devant leurs propres œuvres
- type: usfm
  marker: q1
  children:
  - type: text
    text: fabriquées de leurs mains.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Mais les hommes s’inclineront,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ils seront humiliés.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ne leur pardonne pas
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '2.9 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Autre traduction : '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: ne les relève pas.
    marker-yv: yv-n
  - type: text
    text: '  !'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Réfugiez-vous dans les rochers
- type: usfm
  marker: q1
  children:
  - type: text
    text: et cachez-vous sous terre
- type: usfm
  marker: q1
  children:
  - type: text
    text: à cause des terreurs ╵que l’Eternel provoque,
- type: usfm
  marker: q1
  children:
  - type: text
    text: de l’éclat de sa majesté
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '2.10 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Voir '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ap 6.15
        metadata:
          usfm: REV.6.15
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: L’homme au regard hautain ╵devra baisser les yeux,
- type: usfm
  marker: q1
  children:
  - type: text
    text: l’orgueil humain sera brisé,
- type: usfm
  marker: q1
  children:
  - type: text
    text: car en ce jour-là, l’Eternel ╵sera seul honoré.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Car l’Eternel, ╵le Seigneur des armées célestes, ╵tient en réserve un jour
- type: usfm
  marker: q1
  children:
  - type: text
    text: où il se dressera ╵contre tous les hautains, ╵les arrogants,
- type: usfm
  marker: q1
  children:
  - type: text
    text: les orgueilleux, ╵pour qu’ils soient abaissés ;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: contre les cèdres du Liban, ╵qui s’élèvent bien haut,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et contre tous les chênes ╵des plateaux du Basan
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '2.13 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Région à l’est du Jourdain et au nord de Galaad, réputée pour ses chênes (
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ez 27.6
        metadata:
          usfm: EZK.27.6
      - type: text
        text: ) et ses troupeaux (
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ez 39.18
        metadata:
          usfm: EZK.39.18
      - type: text
        text: ).
    marker-yv: yv-n
  - type: text
    text: ','
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: et contre les hautes montagnes
- type: usfm
  marker: q1
  children:
  - type: text
    text: et contre les collines ╵qui sont altières,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: contre toutes les tours ╵qui sont très élevées
- type: usfm
  marker: q1
  children:
  - type: text
    text: et toutes les murailles ╵qui sont fortifiées,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: contre les vaisseaux au long cours
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '2.16 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Voir '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1 R 10.22
        metadata:
          usfm: 1KI.10.22
      - type: text
        text: ' et note.'
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: text
    text: et leurs denrées précieuses
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '2.16 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Autre traduction : '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: contre les navires somptueux.
    marker-yv: yv-n
  - type: text
    text: '  :'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: il courbera ╵la fierté des humains
- type: usfm
  marker: q1
  children:
  - type: text
    text: et il abaissera ╵l’orgueil humain.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Car, en ce jour-là, l’Eternel ╵sera seul honoré.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Et toutes les idoles ╵disparaîtront ensemble.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: On se réfugiera ╵dans les cavernes des rochers
- type: usfm
  marker: q1
  children:
  - type: text
    text: et dans les antres de la terre
- type: usfm
  marker: q1
  children:
  - type: text
    text: à cause des terreurs ╵que l’Eternel provoque,
- type: usfm
  marker: q1
  children:
  - type: text
    text: de l’éclat de sa majesté
- type: usfm
  marker: q1
  children:
  - type: text
    text: quand il se lèvera ╵pour terrifier la terre.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: En ce jour-là,
- type: usfm
  marker: q1
  children:
  - type: text
    text: les hommes jetteront aux taupes
- type: usfm
  marker: q1
  children:
  - type: text
    text: et aux chauves-souris
- type: usfm
  marker: q1
  children:
  - type: text
    text: les idoles d’argent
- type: usfm
  marker: q1
  children:
  - type: text
    text: et les idoles d’or
- type: usfm
  marker: q1
  children:
  - type: text
    text: qu’ils se sont fabriquées ╵pour se prosterner devant elles.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Ils se réfugieront ╵dans les cavernes
- type: usfm
  marker: q1
  children:
  - type: text
    text: et dans les fentes des rochers
- type: usfm
  marker: q1
  children:
  - type: text
    text: à cause des terreurs ╵que l’Eternel provoque,
- type: usfm
  marker: q1
  children:
  - type: text
    text: de l’éclat de sa majesté
- type: usfm
  marker: q1
  children:
  - type: text
    text: quand il se lèvera ╵pour terrifier la terre.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: C’est pourquoi, cessez donc ╵de vous confier en l’homme
- type: usfm
  marker: q1
  children:
  - type: text
    text: dont la vie ne tient qu’à un souffle,
- type: usfm
  marker: q1
  children:
  - type: text
    text: car, quelle est sa valeur ?
