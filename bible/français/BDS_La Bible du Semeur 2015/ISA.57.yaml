document_id: ISA.57
type_code: fra
segments:
- type: usfm
  marker: s2
  children:
  - type: text
    text: Malheur à un peuple idolâtre
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Or des justes périssent
- type: usfm
  marker: q1
  children:
  - type: text
    text: mais nul ne s’en soucie,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et des hommes de bien ╵sont enlevés,
- type: usfm
  marker: q1
  children:
  - type: text
    text: sans que nul ne comprenne
- type: usfm
  marker: q1
  children:
  - type: text
    text: que les justes sont emportés ╵afin que leur soit épargné ╵le malheur à venir
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '57.1 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Autre traduction : '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: que c’est à cause des méchants que les justes sont emportés.
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: La paix viendra
- type: usfm
  marker: q1
  children:
  - type: text
    text: et ceux qui suivent ╵le droit chemin
- type: usfm
  marker: q1
  children:
  - type: text
    text: pourront dormir tranquilles.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Mais vous, approchez-vous,
- type: usfm
  marker: q1
  children:
  - type: text
    text: fils de ces femmes qui se livrent ╵à la divination,
- type: usfm
  marker: q1
  children:
  - type: text
    text: race adultère, prostituée !
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: De qui vous moquez-vous ?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et contre qui ouvrez-vous grand la bouche,
- type: usfm
  marker: q1
  children:
  - type: text
    text: contre qui tirez-vous la langue ?
- type: usfm
  marker: q1
  children:
  - type: text
    text: N’êtes-vous pas ╵des enfants infidèles
- type: usfm
  marker: q1
  children:
  - type: text
    text: et une race fourbe,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: vous qui vous échauffez ╵auprès des chênes
- type: usfm
  marker: q1
  children:
  - type: text
    text: et sous chaque arbre vert,
- type: usfm
  marker: q1
  children:
  - type: text
    text: vous qui immolez les enfants ╵en sacrifice ╵dans les lits des torrents
- type: usfm
  marker: q1
  children:
  - type: text
    text: et les creux des rochers ?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Les pierres polies du torrent
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '57.6 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Ces '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'pierres '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '(ou rocs) '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'polies '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: devaient servir à des cultes idolâtres, peut-être liés aux cultes de la fécondité dénoncés au v. 5.
    marker-yv: yv-n
  - type: text
    text: ','
- type: usfm
  marker: q1
  children:
  - type: text
    text: voilà ton bien,
- type: usfm
  marker: q1
  children:
  - type: text
    text: voilà, voilà ton lot !
- type: usfm
  marker: q1
  children:
  - type: text
    text: C’est pour ces pierres-là ╵que tu as répandu ╵des libations de vin,
- type: usfm
  marker: q1
  children:
  - type: text
    text: que tu fais des offrandes !
- type: usfm
  marker: q1
  children:
  - type: text
    text: Devrais-je donc me consoler ╵de tout cela ?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Tu as dressé ta couche
- type: usfm
  marker: q1
  children:
  - type: text
    text: sur de hautes montagnes
- type: usfm
  marker: q1
  children:
  - type: text
    text: et tu y montes pour offrir ╵des sacrifices.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Tu as placé ton mémorial
- type: usfm
  marker: q1
  children:
  - type: text
    text: derrière le battant ╵et le linteau des portes !
- type: usfm
  marker: q1
  children:
  - type: text
    text: C’est loin de moi ╵que tu t’es mise nue,
- type: usfm
  marker: q1
  children:
  - type: text
    text: que tu es montée sur ton lit ╵pour y faire une large place.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Tu as conclu un pacte ╵avec ces gens
- type: usfm
  marker: q1
  children:
  - type: text
    text: dont tu aimes la couche
- type: usfm
  marker: q1
  children:
  - type: text
    text: et tu as contemplé ╵leur nudité.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Tu as apporté en présent de l’huile ╵au dieu Molok
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '57.9 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Autre traduction : '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'au grand roi. Molok '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: était la divinité principale des Ammonites.
    marker-yv: yv-n
  - type: text
    text: ','
- type: usfm
  marker: q1
  children:
  - type: text
    text: tu lui as offert des parfums
- type: usfm
  marker: q1
  children:
  - type: text
    text: et tu as envoyé ╵tes messagers au loin ;
- type: usfm
  marker: q1
  children:
  - type: text
    text: et ainsi tu t’es abaissée
- type: usfm
  marker: q1
  children:
  - type: text
    text: jusqu’au séjour des morts !
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Tu es devenue lasse ╵à force de marcher,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'sans jamais avouer : ╵« Tout cela, c’est désespéré ! »'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Tu retrouves des forces,
- type: usfm
  marker: q1
  children:
  - type: text
    text: aussi n’es-tu pas abattue.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Et qui donc craignais-tu,
- type: usfm
  marker: q1
  children:
  - type: text
    text: de qui avais-tu peur, ╵pour que tu m’aies trompé,
- type: usfm
  marker: q1
  children:
  - type: text
    text: pour que tu ne te sois ╵plus souvenue de moi,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et que tu m’aies chassé ╵de tes pensées ?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Serait-ce parce que, depuis longtemps, ╵j’ai gardé le silence ?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Serait-ce pour cela ╵que tu ne me crains plus ?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Mais je vais exposer ╵ce que vaut ta « justice ».
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et toutes tes actions
- type: usfm
  marker: q1
  children:
  - type: text
    text: ne te seront d’aucun profit !
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Qu’ils te délivrent donc, ╵tous tes nombreux faux dieux,
- type: usfm
  marker: q1
  children:
  - type: text
    text: quand tu crieras vers eux,
- type: usfm
  marker: q1
  children:
  - type: text
    text: mais le vent les balaiera tous,
- type: usfm
  marker: q1
  children:
  - type: text
    text: une rafale les emportera !
- type: usfm
  marker: q1
  children:
  - type: text
    text: Mais celui qui s’appuie sur moi
- type: usfm
  marker: q1
  children:
  - type: text
    text: recevra le pays
- type: usfm
  marker: q1
  children:
  - type: text
    text: et entrera en possession ╵de ma montagne sainte.
- type: usfm
  marker: s2
  children:
  - type: text
    text: L’Eternel guérira
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Et l’on dira : ╵Frayez la route, ╵oui, frayez-la,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: préparez le chemin !
- type: usfm
  marker: q1
  children:
  - type: text
    text: Enlevez tout obstacle
- type: usfm
  marker: q1
  children:
  - type: text
    text: du chemin de mon peuple.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Car voici ce que dit ╵le Dieu très élevé
- type: usfm
  marker: q1
  children:
  - type: text
    text: qui demeure éternellement,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'et qui est saint :'
- type: usfm
  marker: q1
  children:
  - type: text
    text: J’habite dans un lieu ╵qui est très haut et saint,
- type: usfm
  marker: q1
  children:
  - type: text
    text: mais je demeure aussi ╵avec l’homme accablé,
- type: usfm
  marker: q1
  children:
  - type: text
    text: à l’esprit abattu,
- type: usfm
  marker: q1
  children:
  - type: text
    text: pour ranimer la vie ╵de qui a l’esprit abattu
- type: usfm
  marker: q1
  children:
  - type: text
    text: et vivifier le cœur ╵des hommes accablés.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Car ce n’est pas toujours ╵que j’intenterai un procès,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ni éternellement ╵que je m’irriterai,
- type: usfm
  marker: q1
  children:
  - type: text
    text: car sinon, devant moi, ╵le souffle de la vie ╵s’évanouirait,
- type: usfm
  marker: q1
  children:
  - type: text
    text: les êtres que j’ai faits ╵dépériraient.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: L’avidité coupable ╵du peuple d’Israël
- type: usfm
  marker: q1
  children:
  - type: text
    text: m’avait mis en colère.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Alors je l’ai frappé
- type: usfm
  marker: q1
  children:
  - type: text
    text: et je me suis caché ╵dans mon irritation.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Mais lui, rebelle, ╵il a suivi la voie
- type: usfm
  marker: q1
  children:
  - type: text
    text: où l’inclinait son cœur.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: J’ai bien vu sa conduite,
- type: usfm
  marker: q1
  children:
  - type: text
    text: mais je le guérirai
- type: usfm
  marker: q1
  children:
  - type: text
    text: et je le conduirai,
- type: usfm
  marker: q1
  children:
  - type: text
    text: je lui accorderai ╵une pleine consolation,
- type: usfm
  marker: q1
  children:
  - type: text
    text: à lui, et aux siens affligés.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Je créerai sur leurs lèvres ╵des hymnes de louange.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Paix, paix à qui est loin
- type: usfm
  marker: q1
  children:
  - type: text
    text: comme à ceux qui sont près
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '57.19 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Allusion en '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ep 2.17
        metadata:
          usfm: EPH.2.17
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: ','
- type: usfm
  marker: q1
  children:
  - type: text
    text: déclare l’Eternel.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Oui, je le guérirai.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Mais les méchants ressemblent ╵à la mer agitée
- type: usfm
  marker: q1
  children:
  - type: text
    text: qui ne peut se calmer
- type: usfm
  marker: q1
  children:
  - type: text
    text: et dont les flots agitent ╵la vase et le limon.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Il n’y a pas de paix
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '57.21 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Voir '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Es 48.22
        metadata:
          usfm: ISA.48.22
      - type: text
        text: .
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: text
    text: a dit mon Dieu, ╵pour les méchants.
