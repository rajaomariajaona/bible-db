document_id: ISA.57,21
type_code: fra
verses:
  '1':
  - type: heading
    content: Malheur à un peuple idolâtre
  - type: text
    content: Or des justes périssent
  - type: text
    content: mais nul ne s’en soucie,
  - type: text
    content: et des hommes de bien ╵sont enlevés,
  - type: text
    content: sans que nul ne comprenne
  - type: text
    content: que les justes sont emportés ╵afin que leur soit épargné ╵le malheur à venir
  - type: note
    content: 'Autre traduction : que c’est à cause des méchants que les justes sont emportés.'
  - type: text
    content: .
  '10':
  - type: text
    content: Tu es devenue lasse ╵à force de marcher,
  - type: text
    content: 'sans jamais avouer : ╵« Tout cela, c’est désespéré ! »'
  - type: text
    content: Tu retrouves des forces,
  - type: text
    content: aussi n’es-tu pas abattue.
  '11':
  - type: text
    content: Et qui donc craignais-tu,
  - type: text
    content: de qui avais-tu peur, ╵pour que tu m’aies trompé,
  - type: text
    content: pour que tu ne te sois ╵plus souvenue de moi,
  - type: text
    content: et que tu m’aies chassé ╵de tes pensées ?
  - type: text
    content: Serait-ce parce que, depuis longtemps, ╵j’ai gardé le silence ?
  - type: text
    content: Serait-ce pour cela ╵que tu ne me crains plus ?
  '12':
  - type: text
    content: Mais je vais exposer ╵ce que vaut ta « justice ».
  - type: text
    content: Et toutes tes actions
  - type: text
    content: ne te seront d’aucun profit !
  '13':
  - type: text
    content: Qu’ils te délivrent donc, ╵tous tes nombreux faux dieux,
  - type: text
    content: quand tu crieras vers eux,
  - type: text
    content: mais le vent les balaiera tous,
  - type: text
    content: une rafale les emportera !
  - type: text
    content: Mais celui qui s’appuie sur moi
  - type: text
    content: recevra le pays
  - type: text
    content: et entrera en possession ╵de ma montagne sainte.
  - type: heading
    content: L’Eternel guérira
  '14':
  - type: text
    content: 'Et l’on dira : ╵Frayez la route, ╵oui, frayez-la,'
  - type: text
    content: préparez le chemin !
  - type: text
    content: Enlevez tout obstacle
  - type: text
    content: du chemin de mon peuple.
  '15':
  - type: text
    content: Car voici ce que dit ╵le Dieu très élevé
  - type: text
    content: qui demeure éternellement,
  - type: text
    content: 'et qui est saint :'
  - type: text
    content: J’habite dans un lieu ╵qui est très haut et saint,
  - type: text
    content: mais je demeure aussi ╵avec l’homme accablé,
  - type: text
    content: à l’esprit abattu,
  - type: text
    content: pour ranimer la vie ╵de qui a l’esprit abattu
  - type: text
    content: et vivifier le cœur ╵des hommes accablés.
  '16':
  - type: text
    content: Car ce n’est pas toujours ╵que j’intenterai un procès,
  - type: text
    content: ni éternellement ╵que je m’irriterai,
  - type: text
    content: car sinon, devant moi, ╵le souffle de la vie ╵s’évanouirait,
  - type: text
    content: les êtres que j’ai faits ╵dépériraient.
  '17':
  - type: text
    content: L’avidité coupable ╵du peuple d’Israël
  - type: text
    content: m’avait mis en colère.
  - type: text
    content: Alors je l’ai frappé
  - type: text
    content: et je me suis caché ╵dans mon irritation.
  - type: text
    content: Mais lui, rebelle, ╵il a suivi la voie
  - type: text
    content: où l’inclinait son cœur.
  '18':
  - type: text
    content: J’ai bien vu sa conduite,
  - type: text
    content: mais je le guérirai
  - type: text
    content: et je le conduirai,
  - type: text
    content: je lui accorderai ╵une pleine consolation,
  - type: text
    content: à lui, et aux siens affligés.
  '19':
  - type: text
    content: Je créerai sur leurs lèvres ╵des hymnes de louange.
  - type: text
    content: Paix, paix à qui est loin
  - type: text
    content: comme à ceux qui sont près
  - type: note
    content: Allusion en Ep 2.17.
  - type: text
    content: ','
  - type: text
    content: déclare l’Eternel.
  - type: text
    content: Oui, je le guérirai.
  '2':
  - type: text
    content: La paix viendra
  - type: text
    content: et ceux qui suivent ╵le droit chemin
  - type: text
    content: pourront dormir tranquilles.
  '20':
  - type: text
    content: Mais les méchants ressemblent ╵à la mer agitée
  - type: text
    content: qui ne peut se calmer
  - type: text
    content: et dont les flots agitent ╵la vase et le limon.
  '21':
  - type: text
    content: Il n’y a pas de paix
  - type: note
    content: Voir Es 48.22.
  - type: text
    content: a dit mon Dieu, ╵pour les méchants.
  '3':
  - type: text
    content: Mais vous, approchez-vous,
  - type: text
    content: fils de ces femmes qui se livrent ╵à la divination,
  - type: text
    content: race adultère, prostituée !
  '4':
  - type: text
    content: De qui vous moquez-vous ?
  - type: text
    content: Et contre qui ouvrez-vous grand la bouche,
  - type: text
    content: contre qui tirez-vous la langue ?
  - type: text
    content: N’êtes-vous pas ╵des enfants infidèles
  - type: text
    content: et une race fourbe,
  '5':
  - type: text
    content: vous qui vous échauffez ╵auprès des chênes
  - type: text
    content: et sous chaque arbre vert,
  - type: text
    content: vous qui immolez les enfants ╵en sacrifice ╵dans les lits des torrents
  - type: text
    content: et les creux des rochers ?
  '6':
  - type: text
    content: Les pierres polies du torrent
  - type: note
    content: Ces pierres (ou rocs) polies devaient servir à des cultes idolâtres, peut-être liés aux cultes de la fécondité dénoncés au v. 5.
  - type: text
    content: ','
  - type: text
    content: voilà ton bien,
  - type: text
    content: voilà, voilà ton lot !
  - type: text
    content: C’est pour ces pierres-là ╵que tu as répandu ╵des libations de vin,
  - type: text
    content: que tu fais des offrandes !
  - type: text
    content: Devrais-je donc me consoler ╵de tout cela ?
  '7':
  - type: text
    content: Tu as dressé ta couche
  - type: text
    content: sur de hautes montagnes
  - type: text
    content: et tu y montes pour offrir ╵des sacrifices.
  '8':
  - type: text
    content: Tu as placé ton mémorial
  - type: text
    content: derrière le battant ╵et le linteau des portes !
  - type: text
    content: C’est loin de moi ╵que tu t’es mise nue,
  - type: text
    content: que tu es montée sur ton lit ╵pour y faire une large place.
  - type: text
    content: Tu as conclu un pacte ╵avec ces gens
  - type: text
    content: dont tu aimes la couche
  - type: text
    content: et tu as contemplé ╵leur nudité.
  '9':
  - type: text
    content: Tu as apporté en présent de l’huile ╵au dieu Molok
  - type: note
    content: 'Autre traduction : au grand roi. Molok était la divinité principale des Ammonites.'
  - type: text
    content: ','
  - type: text
    content: tu lui as offert des parfums
  - type: text
    content: et tu as envoyé ╵tes messagers au loin ;
  - type: text
    content: et ainsi tu t’es abaissée
  - type: text
    content: jusqu’au séjour des morts !
