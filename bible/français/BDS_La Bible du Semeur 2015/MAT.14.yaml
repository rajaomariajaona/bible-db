document_id: MAT.14,21
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: L’exécution de Jean-Baptiste
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: (Mc 6.14-29 ; Lc 9.7-9 ; 3.19-20)
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: A cette époque, Hérode, le gouverneur de la Galilée, entendit parler de Jésus.
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'Il envoya un soldat décapiter Jean-Baptiste dans la prison. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'La tête de ce dernier fut apportée sur un plat et remise à la jeune fille qui la porta à sa mère. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: Les disciples de Jean-Baptiste vinrent prendre son corps pour l’enterrer, puis ils allèrent informer Jésus de ce qui s’était passé.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Avec cinq pains et deux poissons
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: (Mc 6.30-44 ; Lc 9.10-17 ; Jn 6.1-15)
    marker-yv: yv-h
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'Quand Jésus entendit la nouvelle, il quitta la contrée en bateau et se retira, à l’écart, dans un endroit désert. Mais les foules l’apprirent ; elles sortirent de leurs bourgades et le suivirent à pied. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: Aussi, quand Jésus descendit du bateau, il vit une foule nombreuse. Alors il fut pris de compassion pour elle et guérit les malades.
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'Le soir venu, les disciples s’approchèrent de lui et lui dirent : Cet endroit est désert et il se fait tard ; renvoie donc ces gens pour qu’ils aillent dans les villages voisins s’acheter de la nourriture.'
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'Mais Jésus leur dit : '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'Ils n’ont pas besoin d’y aller : donnez-leur vous-mêmes à manger !'
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: – Mais, lui répondirent-ils, nous n’avons ici que cinq pains et deux poissons.
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: ' '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: – Apportez-les moi,
    - type: text
      text: ' leur dit Jésus.'
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: Il ordonna à la foule de s’asseoir sur l’herbe, puis il prit les cinq pains et les deux poissons, il leva les yeux vers le ciel et prononça la prière de bénédiction ; ensuite, il partagea les pains et les donna aux disciples qui les distribuèrent à la foule.
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: '– Cet homme, dit-il à ses courtisans, c’est sûrement Jean-Baptiste : le voilà ressuscité des morts ! C’est pour cela qu’il détient le pouvoir de faire des miracles.'
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: 'Tout le monde mangea à satiété. On ramassa les morceaux qui restaient ; on en remplit douze paniers. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: Ceux qui avaient mangé étaient au nombre de cinq mille hommes, sans compter les femmes et les enfants.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Jésus marche sur les eaux
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: (Mc 6.45-52 ; Jn 6.16-21)
    marker-yv: yv-h
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: 'Aussitôt après, Jésus pressa ses disciples de remonter dans le bateau pour qu’ils le précèdent de l’autre côté du lac, pendant qu’il renverrait la foule. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: Quand tout le monde se fut dispersé, il gravit une colline pour prier à l’écart. A la tombée de la nuit, il était là, tout seul.
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: 'Pendant ce temps, à plusieurs centaines de mètres au large, le bateau luttait contre les vagues, car le vent était contraire. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: 'Vers la fin de la nuit, Jésus se dirigea vers ses disciples en marchant sur les eaux du lac. '
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: 'Quand ils le virent marcher sur l’eau, ils furent pris de panique : C’est un fantôme, dirent-ils. Et ils se mirent à pousser des cris de frayeur.'
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: 'Mais Jésus leur parla aussitôt : '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Rassurez-vous,
    - type: text
      text: ' leur dit-il, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: c’est moi, n’ayez pas peur !
  '28':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: 'Alors Pierre lui dit : Si c’est bien toi, Seigneur, ordonne-moi de venir te rejoindre sur l’eau.'
  '29':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: ' '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: – Viens,
    - type: text
      text: ' lui dit Jésus.'
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Aussitôt, Pierre descendit du bateau et se mit à marcher sur l’eau, en direction de Jésus. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'En effet, Hérode avait ordonné d’arrêter Jean, l’avait fait enchaîner et jeter en prison, à cause d’Hérodiade, la femme de Philippe, son demi-frère, '
  '30':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '30'
    - type: text
      text: 'Mais quand il remarqua combien le vent soufflait fort, il prit peur et, comme il commençait à s’enfoncer, il s’écria : Seigneur, sauve-moi !'
  '31':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '31'
    - type: text
      text: Aussitôt, Jésus lui tendit la main et le saisit.
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: – Ta foi est bien petite !
    - type: text
      text: ' lui dit-il, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: pourquoi as-tu douté ?
  '32':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '32'
    - type: text
      text: Puis ils montèrent tous deux dans le bateau ; le vent tomba.
  '33':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '33'
    - type: text
      text: 'Les hommes qui se trouvaient dans l’embarcation se prosternèrent devant lui en disant : Tu es vraiment le Fils de Dieu.'
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Les guérisons à Génésareth
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: (Mc 6.53-56)
    marker-yv: yv-h
  '34':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '34'
    - type: text
      text: Après avoir traversé le lac, ils touchèrent terre à Génésareth
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '14.34 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Génésareth
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: ': '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: région fertile au sud-ouest de Capernaüm.
      marker-yv: yv-n
    - type: text
      text: '. '
  '35':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '35'
    - type: text
      text: 'Quand les habitants du lieu eurent reconnu Jésus, ils firent prévenir tout le voisinage, et on lui amena tous les malades. '
  '36':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '36'
    - type: text
      text: Ils le suppliaient de leur permettre simplement de toucher la frange de son vêtement. Et tous ceux qui la touchaient étaient guéris.
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'parce qu’il lui disait : Tu n’as pas le droit de la prendre pour femme.'
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'Hérode cherchait donc à le faire mourir. Mais il craignait la foule, car elle considérait Jean-Baptiste comme un prophète. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'Or, le jour de l’anniversaire d’Hérode, la fille d’Hérodiade exécuta une danse devant les invités. Hérode était sous son charme : '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: aussi lui promit-il, avec serment, de lui donner tout ce qu’elle demanderait.
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'A l’instigation de sa mère, elle lui dit : Donne-moi ici, sur un plat, la tête de Jean-Baptiste.'
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'Cette demande attrista le roi. Mais à cause de son serment et de ses invités, il donna l’ordre de la lui accorder. '
