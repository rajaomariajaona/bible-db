document_id: MAT.14,21
type_code: fra
verses:
  '1':
  - type: heading
    content: L’exécution de Jean-Baptiste
  - type: heading
    content: (Mc 6.14-29 ; Lc 9.7-9 ; 3.19-20)
  - type: text
    content: A cette époque, Hérode, le gouverneur de la Galilée, entendit parler de Jésus.
  '10':
  - type: text
    content: 'Il envoya un soldat décapiter Jean-Baptiste dans la prison. '
  '11':
  - type: text
    content: 'La tête de ce dernier fut apportée sur un plat et remise à la jeune fille qui la porta à sa mère. '
  '12':
  - type: text
    content: Les disciples de Jean-Baptiste vinrent prendre son corps pour l’enterrer, puis ils allèrent informer Jésus de ce qui s’était passé.
  - type: heading
    content: Avec cinq pains et deux poissons
  - type: heading
    content: (Mc 6.30-44 ; Lc 9.10-17 ; Jn 6.1-15)
  '13':
  - type: text
    content: 'Quand Jésus entendit la nouvelle, il quitta la contrée en bateau et se retira, à l’écart, dans un endroit désert. Mais les foules l’apprirent ; elles sortirent de leurs bourgades et le suivirent à pied. '
  '14':
  - type: text
    content: Aussi, quand Jésus descendit du bateau, il vit une foule nombreuse. Alors il fut pris de compassion pour elle et guérit les malades.
  '15':
  - type: text
    content: 'Le soir venu, les disciples s’approchèrent de lui et lui dirent : Cet endroit est désert et il se fait tard ; renvoie donc ces gens pour qu’ils aillent dans les villages voisins s’acheter de la nourriture.'
  '16':
  - type: text
    content: 'Mais Jésus leur dit : '
  - type: text
    content: 'Ils n’ont pas besoin d’y aller : donnez-leur vous-mêmes à manger !'
  '17':
  - type: text
    content: – Mais, lui répondirent-ils, nous n’avons ici que cinq pains et deux poissons.
  '18':
  - type: text
    content: ' '
  - type: text
    content: – Apportez-les moi,
  - type: text
    content: ' leur dit Jésus.'
  '19':
  - type: text
    content: Il ordonna à la foule de s’asseoir sur l’herbe, puis il prit les cinq pains et les deux poissons, il leva les yeux vers le ciel et prononça la prière de bénédiction ; ensuite, il partagea les pains et les donna aux disciples qui les distribuèrent à la foule.
  '2':
  - type: text
    content: '– Cet homme, dit-il à ses courtisans, c’est sûrement Jean-Baptiste : le voilà ressuscité des morts ! C’est pour cela qu’il détient le pouvoir de faire des miracles.'
  '20':
  - type: text
    content: 'Tout le monde mangea à satiété. On ramassa les morceaux qui restaient ; on en remplit douze paniers. '
  '21':
  - type: text
    content: Ceux qui avaient mangé étaient au nombre de cinq mille hommes, sans compter les femmes et les enfants.
  - type: heading
    content: Jésus marche sur les eaux
  - type: heading
    content: (Mc 6.45-52 ; Jn 6.16-21)
  '22':
  - type: text
    content: 'Aussitôt après, Jésus pressa ses disciples de remonter dans le bateau pour qu’ils le précèdent de l’autre côté du lac, pendant qu’il renverrait la foule. '
  '23':
  - type: text
    content: Quand tout le monde se fut dispersé, il gravit une colline pour prier à l’écart. A la tombée de la nuit, il était là, tout seul.
  '24':
  - type: text
    content: 'Pendant ce temps, à plusieurs centaines de mètres au large, le bateau luttait contre les vagues, car le vent était contraire. '
  '25':
  - type: text
    content: 'Vers la fin de la nuit, Jésus se dirigea vers ses disciples en marchant sur les eaux du lac. '
  '26':
  - type: text
    content: 'Quand ils le virent marcher sur l’eau, ils furent pris de panique : C’est un fantôme, dirent-ils. Et ils se mirent à pousser des cris de frayeur.'
  '27':
  - type: text
    content: 'Mais Jésus leur parla aussitôt : '
  - type: text
    content: Rassurez-vous,
  - type: text
    content: ' leur dit-il, '
  - type: text
    content: c’est moi, n’ayez pas peur !
  '28':
  - type: text
    content: 'Alors Pierre lui dit : Si c’est bien toi, Seigneur, ordonne-moi de venir te rejoindre sur l’eau.'
  '29':
  - type: text
    content: ' '
  - type: text
    content: – Viens,
  - type: text
    content: ' lui dit Jésus.'
  - type: text
    content: 'Aussitôt, Pierre descendit du bateau et se mit à marcher sur l’eau, en direction de Jésus. '
  '3':
  - type: text
    content: 'En effet, Hérode avait ordonné d’arrêter Jean, l’avait fait enchaîner et jeter en prison, à cause d’Hérodiade, la femme de Philippe, son demi-frère, '
  '30':
  - type: text
    content: 'Mais quand il remarqua combien le vent soufflait fort, il prit peur et, comme il commençait à s’enfoncer, il s’écria : Seigneur, sauve-moi !'
  '31':
  - type: text
    content: Aussitôt, Jésus lui tendit la main et le saisit.
  - type: text
    content: – Ta foi est bien petite !
  - type: text
    content: ' lui dit-il, '
  - type: text
    content: pourquoi as-tu douté ?
  '32':
  - type: text
    content: Puis ils montèrent tous deux dans le bateau ; le vent tomba.
  '33':
  - type: text
    content: 'Les hommes qui se trouvaient dans l’embarcation se prosternèrent devant lui en disant : Tu es vraiment le Fils de Dieu.'
  - type: heading
    content: Les guérisons à Génésareth
  - type: heading
    content: (Mc 6.53-56)
  '34':
  - type: text
    content: Après avoir traversé le lac, ils touchèrent terre à Génésareth
  - type: note
    content: 'Génésareth: région fertile au sud-ouest de Capernaüm.'
  - type: text
    content: '. '
  '35':
  - type: text
    content: 'Quand les habitants du lieu eurent reconnu Jésus, ils firent prévenir tout le voisinage, et on lui amena tous les malades. '
  '36':
  - type: text
    content: Ils le suppliaient de leur permettre simplement de toucher la frange de son vêtement. Et tous ceux qui la touchaient étaient guéris.
  '4':
  - type: text
    content: 'parce qu’il lui disait : Tu n’as pas le droit de la prendre pour femme.'
  '5':
  - type: text
    content: 'Hérode cherchait donc à le faire mourir. Mais il craignait la foule, car elle considérait Jean-Baptiste comme un prophète. '
  '6':
  - type: text
    content: 'Or, le jour de l’anniversaire d’Hérode, la fille d’Hérodiade exécuta une danse devant les invités. Hérode était sous son charme : '
  '7':
  - type: text
    content: aussi lui promit-il, avec serment, de lui donner tout ce qu’elle demanderait.
  '8':
  - type: text
    content: 'A l’instigation de sa mère, elle lui dit : Donne-moi ici, sur un plat, la tête de Jean-Baptiste.'
  '9':
  - type: text
    content: 'Cette demande attrista le roi. Mais à cause de son serment et de ses invités, il donna l’ordre de la lui accorder. '
