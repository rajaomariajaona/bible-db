document_id: PRO.24
type_code: fra
segments:
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Ne porte pas envie à ceux qui font le mal
- type: usfm
  marker: q1
  children:
  - type: text
    text: et ne recherche pas leur compagnie,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: car ils ne songent qu’à détruire
- type: usfm
  marker: q1
  children:
  - type: text
    text: et ils ne parlent que de nuire.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: C’est par la sagesse qu’on construit une maison,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et par l’intelligence qu’on la rend solide.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: C’est grâce au savoir que les chambres se remplissent
- type: usfm
  marker: q1
  children:
  - type: text
    text: de toutes sortes de biens précieux et agréables.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Un homme sage est un homme fort,
- type: usfm
  marker: q1
  children:
  - type: text
    text: qui a de la connaissance accroît sa force.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: En effet, c’est par une bonne stratégie que tu gagneras la bataille,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et la victoire s’acquiert grâce à un grand nombre de conseillers.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Pour l’insensé, la sagesse est trop élevée ;
- type: usfm
  marker: q1
  children:
  - type: text
    text: c’est pourquoi, il n’ouvre pas la bouche dans l’assemblée aux portes de la ville
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '24.7 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Lieu où se jugeaient les causes et où l’on discutait des intérêts de la cité.
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Qui projette de faire le mal
- type: usfm
  marker: q1
  children:
  - type: text
    text: aura la réputation d’être un intrigant.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Les machinations insensées sont coupables,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et le moqueur se rend odieux.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Si tu te laisses abattre au jour de l’adversité,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ta force est bien peu de chose.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Délivre ceux que l’on entraîne à la mort
- type: usfm
  marker: q1
  children:
  - type: text
    text: et sauve ceux qui chancellent et vont se faire tuer.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Car si tu dis : « Je ne le savais pas »,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: celui qui sait ce qui se passe au fond des cœurs, ne discerne-t-il pas, lui ?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Oui, celui qui protège ta vie le sait,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et il rendra à chacun selon ses actes.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Mon fils, mange du miel, car c’est bon,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ton palais appréciera la douceur de ce qui coule des rayons.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: De même, connais la sagesse, c’est bon pour toi ;
- type: usfm
  marker: q1
  children:
  - type: text
    text: si tu la trouves, il y a de l’avenir pour toi,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et ton espérance ne sera pas déçue.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Ne tends pas de piège, comme un méchant, contre la maison du juste
- type: usfm
  marker: q1
  children:
  - type: text
    text: et ne détruis pas sa demeure,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: car même si le juste tombe sept fois, il se relèvera,
- type: usfm
  marker: q1
  children:
  - type: text
    text: alors que les méchants s’effondrent dans le malheur.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Si ton ennemi tombe, ne t’en réjouis pas ;
- type: usfm
  marker: q1
  children:
  - type: text
    text: que ton cœur ne jubile pas s’il s’effondre,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: car l’Eternel le verrait d’un mauvais œil
- type: usfm
  marker: q1
  children:
  - type: text
    text: et sa colère risquerait de se détourner de lui.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Ne t’irrite pas au sujet de ceux qui font le mal
- type: usfm
  marker: q1
  children:
  - type: text
    text: et n’envie pas les méchants,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: car ceux qui font le mal n’ont pas d’avenir,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et la vie des méchants s’éteindra.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Crains l’Eternel, mon fils, ainsi que le roi.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ne t’associe pas à ceux qui veulent tout bouleverser
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '24.21 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Autre traduction : '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: à des gens de haut rang.
    marker-yv: yv-n
  - type: text
    text: ','
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: car leur ruine viendra de façon soudaine,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et qui sait quel malheur l’Eternel et le roi peuvent leur causer ?
- type: usfm
  marker: ms1
  children:
  - type: text
    text: Autres proverbes des sages
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Voici encore des proverbes émanant des sages :'
- type: usfm
  marker: q1
  children:
  - type: text
    text: la partialité, en justice, est une mauvaise chose.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Un juge qui dit à un criminel : « Tu es innocent »'
- type: usfm
  marker: q1
  children:
  - type: text
    text: s’attire la malédiction des foules et l’indignation des gens,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: mais ceux qui le condamnent s’en trouveront bien
- type: usfm
  marker: q1
  children:
  - type: text
    text: et ils obtiendront une belle bénédiction.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: Qui répond honnêtement
- type: usfm
  marker: q1
  children:
  - type: text
    text: donne une preuve de son amitié.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: Assure ton travail au-dehors,
- type: usfm
  marker: q1
  children:
  - type: text
    text: prépare bien tes champs,
- type: usfm
  marker: q1
  children:
  - type: text
    text: après cela, tu pourras bâtir ta maison.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: Ne témoigne pas sans raison contre ton prochain,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et ne trompe pas par tes paroles.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'Ne dis pas : « Je le traiterai comme il m’a traité,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: je rendrai à cet homme selon ce qu’il a fait. »
- type: usfm
  marker: s1
  children:
  - type: text
    text: Le salaire de la paresse
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: J’ai passé près du champ d’un paresseux
- type: usfm
  marker: q1
  children:
  - type: text
    text: et le long du vignoble d’un homme sans courage,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: et voici que les orties avaient tout envahi,
- type: usfm
  marker: q1
  children:
  - type: text
    text: les ronces recouvraient le sol
- type: usfm
  marker: q1
  children:
  - type: text
    text: et le muret de pierres était en ruine.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: En voyant cela, je me suis mis à réfléchir
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'et j’ai tiré une leçon de ce que j’ai observé :'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: « Je vais juste faire un petit somme, dis-tu, juste un peu m’assoupir,
- type: usfm
  marker: q1
  children:
  - type: text
    text: rien qu’un peu croiser les mains et rester couché un instant
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '24.33 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Pour les v. 33-34, voir '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 6.10-11
        metadata:
          usfm: PRO.6.10+PRO.6.11
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: '  »,'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: mais pendant ce temps, la pauvreté s’introduit chez toi comme un rôdeur,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et la misère comme un pillard.
