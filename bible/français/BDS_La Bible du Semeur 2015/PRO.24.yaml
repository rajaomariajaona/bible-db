document_id: PRO.24,21
type_code: fra
verses:
  '1':
  - type: text
    content: Ne porte pas envie à ceux qui font le mal
  - type: text
    content: et ne recherche pas leur compagnie,
  '10':
  - type: text
    content: Si tu te laisses abattre au jour de l’adversité,
  - type: text
    content: ta force est bien peu de chose.
  '11':
  - type: text
    content: Délivre ceux que l’on entraîne à la mort
  - type: text
    content: et sauve ceux qui chancellent et vont se faire tuer.
  '12':
  - type: text
    content: 'Car si tu dis : « Je ne le savais pas »,'
  - type: text
    content: celui qui sait ce qui se passe au fond des cœurs, ne discerne-t-il pas, lui ?
  - type: text
    content: Oui, celui qui protège ta vie le sait,
  - type: text
    content: et il rendra à chacun selon ses actes.
  '13':
  - type: text
    content: Mon fils, mange du miel, car c’est bon,
  - type: text
    content: ton palais appréciera la douceur de ce qui coule des rayons.
  '14':
  - type: text
    content: De même, connais la sagesse, c’est bon pour toi ;
  - type: text
    content: si tu la trouves, il y a de l’avenir pour toi,
  - type: text
    content: et ton espérance ne sera pas déçue.
  '15':
  - type: text
    content: Ne tends pas de piège, comme un méchant, contre la maison du juste
  - type: text
    content: et ne détruis pas sa demeure,
  '16':
  - type: text
    content: car même si le juste tombe sept fois, il se relèvera,
  - type: text
    content: alors que les méchants s’effondrent dans le malheur.
  '17':
  - type: text
    content: Si ton ennemi tombe, ne t’en réjouis pas ;
  - type: text
    content: que ton cœur ne jubile pas s’il s’effondre,
  '18':
  - type: text
    content: car l’Eternel le verrait d’un mauvais œil
  - type: text
    content: et sa colère risquerait de se détourner de lui.
  '19':
  - type: text
    content: Ne t’irrite pas au sujet de ceux qui font le mal
  - type: text
    content: et n’envie pas les méchants,
  '2':
  - type: text
    content: car ils ne songent qu’à détruire
  - type: text
    content: et ils ne parlent que de nuire.
  '20':
  - type: text
    content: car ceux qui font le mal n’ont pas d’avenir,
  - type: text
    content: et la vie des méchants s’éteindra.
  '21':
  - type: text
    content: Crains l’Eternel, mon fils, ainsi que le roi.
  - type: text
    content: Ne t’associe pas à ceux qui veulent tout bouleverser
  - type: note
    content: 'Autre traduction : à des gens de haut rang.'
  - type: text
    content: ','
  '22':
  - type: text
    content: car leur ruine viendra de façon soudaine,
  - type: text
    content: et qui sait quel malheur l’Eternel et le roi peuvent leur causer ?
  - type: heading
    content: Autres proverbes des sages
  '23':
  - type: text
    content: 'Voici encore des proverbes émanant des sages :'
  - type: text
    content: la partialité, en justice, est une mauvaise chose.
  '24':
  - type: text
    content: 'Un juge qui dit à un criminel : « Tu es innocent »'
  - type: text
    content: s’attire la malédiction des foules et l’indignation des gens,
  '25':
  - type: text
    content: mais ceux qui le condamnent s’en trouveront bien
  - type: text
    content: et ils obtiendront une belle bénédiction.
  '26':
  - type: text
    content: Qui répond honnêtement
  - type: text
    content: donne une preuve de son amitié.
  '27':
  - type: text
    content: Assure ton travail au-dehors,
  - type: text
    content: prépare bien tes champs,
  - type: text
    content: après cela, tu pourras bâtir ta maison.
  '28':
  - type: text
    content: Ne témoigne pas sans raison contre ton prochain,
  - type: text
    content: et ne trompe pas par tes paroles.
  '29':
  - type: text
    content: 'Ne dis pas : « Je le traiterai comme il m’a traité,'
  - type: text
    content: je rendrai à cet homme selon ce qu’il a fait. »
  - type: heading
    content: Le salaire de la paresse
  '3':
  - type: text
    content: C’est par la sagesse qu’on construit une maison,
  - type: text
    content: et par l’intelligence qu’on la rend solide.
  '30':
  - type: text
    content: J’ai passé près du champ d’un paresseux
  - type: text
    content: et le long du vignoble d’un homme sans courage,
  '31':
  - type: text
    content: et voici que les orties avaient tout envahi,
  - type: text
    content: les ronces recouvraient le sol
  - type: text
    content: et le muret de pierres était en ruine.
  '32':
  - type: text
    content: En voyant cela, je me suis mis à réfléchir
  - type: text
    content: 'et j’ai tiré une leçon de ce que j’ai observé :'
  '33':
  - type: text
    content: « Je vais juste faire un petit somme, dis-tu, juste un peu m’assoupir,
  - type: text
    content: rien qu’un peu croiser les mains et rester couché un instant
  - type: note
    content: Pour les v. 33-34, voir 6.10-11.
  - type: text
    content: '  »,'
  '34':
  - type: text
    content: mais pendant ce temps, la pauvreté s’introduit chez toi comme un rôdeur,
  - type: text
    content: et la misère comme un pillard.
  '4':
  - type: text
    content: C’est grâce au savoir que les chambres se remplissent
  - type: text
    content: de toutes sortes de biens précieux et agréables.
  '5':
  - type: text
    content: Un homme sage est un homme fort,
  - type: text
    content: qui a de la connaissance accroît sa force.
  '6':
  - type: text
    content: En effet, c’est par une bonne stratégie que tu gagneras la bataille,
  - type: text
    content: et la victoire s’acquiert grâce à un grand nombre de conseillers.
  '7':
  - type: text
    content: Pour l’insensé, la sagesse est trop élevée ;
  - type: text
    content: c’est pourquoi, il n’ouvre pas la bouche dans l’assemblée aux portes de la ville
  - type: note
    content: Lieu où se jugeaient les causes et où l’on discutait des intérêts de la cité.
  - type: text
    content: .
  '8':
  - type: text
    content: Qui projette de faire le mal
  - type: text
    content: aura la réputation d’être un intrigant.
  '9':
  - type: text
    content: Les machinations insensées sont coupables,
  - type: text
    content: et le moqueur se rend odieux.
