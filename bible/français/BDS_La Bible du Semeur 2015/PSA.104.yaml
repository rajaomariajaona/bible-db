document_id: PSA.104
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Louange au Créateur
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Que tout mon être ╵bénisse l’Eternel !
- type: usfm
  marker: q1
  children:
  - type: text
    text: O Eternel, mon Dieu, que tu es grand !
- type: usfm
  marker: q1
  children:
  - type: text
    text: Tu es revêtu de splendeur, ╵et de magnificence,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: tu t’enveloppes de lumière ╵comme on se revêt d’un manteau,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et tu déploies le ciel ╵comme une tente.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Tu fixes au-dessus des eaux du ciel ╵la charpente de tes hautes demeures,
- type: usfm
  marker: q1
  children:
  - type: text
    text: tu fais des nuages ton char,
- type: usfm
  marker: q1
  children:
  - type: text
    text: tu te déplaces ╵sur les ailes du vent,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: tu fais des vents tes messagers,
- type: usfm
  marker: q1
  children:
  - type: text
    text: les éclairs étincelants sont tes serviteurs
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '104.4 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Cité en '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Hé 1.7
        metadata:
          usfm: HEB.1.7
      - type: text
        text: ' selon l’ancienne version grecque.'
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Tu as fondé la terre sur ses bases
- type: usfm
  marker: q1
  children:
  - type: text
    text: pour qu’elle reste inébranlable ╵à tout jamais.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Les eaux de l’abîme la recouvraient ╵tout comme un vêtement,
- type: usfm
  marker: q1
  children:
  - type: text
    text: sur les montagnes les eaux reposaient ;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: à ta menace, ╵elles se sont enfuies,
- type: usfm
  marker: q1
  children:
  - type: text
    text: au bruit de ton tonnerre, ╵elles se sont vite élancées,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: gravissant des montagnes, ╵dévalant vers des plaines
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '104.8 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Autre traduction : '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: et les montagnes se sont élevées et les vallées se sont creusées.
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: text
    text: jusqu’à l’endroit ╵que tu leur avais assigné.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Tu as fixé une limite ╵que les eaux ne franchiront plus,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et elles ne reviendront plus ╵pour submerger la terre.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Tu fais jaillir des sources ╵pour alimenter des torrents
- type: usfm
  marker: q1
  children:
  - type: text
    text: qui coulent entre les montagnes.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Elles abreuvent ╵les animaux des champs,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et les onagres
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '104.11 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Les ânes sauvages.
    marker-yv: yv-n
  - type: text
    text: ' ╵y étanchent leur soif.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Les oiseaux nichent sur leurs rives,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et chantent au sein du feuillage.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: De tes hautes demeures ╵tu arroses les monts,
- type: usfm
  marker: q1
  children:
  - type: text
    text: la terre est rassasiée ╵par l’effet de tes œuvres.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Tu fais pousser l’herbe pour le bétail,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et tu fais prospérer les plantes ╵cultivées par les hommes,
- type: usfm
  marker: q1
  children:
  - type: text
    text: afin qu’ils tirent de la terre ╵le pain pour se nourrir.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Le vin réjouit le cœur de l’homme
- type: usfm
  marker: q1
  children:
  - type: text
    text: et fait resplendir son visage, ╵le rendant brillant plus que l’huile.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Le pain restaure sa vigueur.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Les arbres, ouvrages de l’Eternel, ╵sont pleins de sève.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Tels sont les cèdres, ╵qu’il a plantés.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: C’est là que nichent les oiseaux
- type: usfm
  marker: q1
  children:
  - type: text
    text: et la cigogne a sa demeure ╵dans les cyprès.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Les bouquetins ont leurs retraites ╵sur les monts élevés,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et les rochers ╵sont le refuge des damans.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Tu as formé la lune ╵pour marquer les dates des fêtes.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Le soleil sait quand il se couche.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Tu fais descendre les ténèbres, ╵et c’est la nuit.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Alors les hôtes des forêts ╵se mettent tous en mouvement ;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: les lionceaux rugissent ╵après leur proie,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ils demandent à Dieu ╵leur nourriture
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '104.21 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Voir 147.9 ; Jb 38.39-40 ; Es 31.4.
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: Mais dès que paraît le soleil, ╵ils se retirent
- type: usfm
  marker: q1
  children:
  - type: text
    text: pour se coucher dans leurs tanières.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: Et l’homme sort ╵pour se livrer à son activité,
- type: usfm
  marker: q1
  children:
  - type: text
    text: accomplir son travail ╵jusqu’à la nuit.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: Combien tes œuvres sont nombreuses, ╵ô Eternel,
- type: usfm
  marker: q1
  children:
  - type: text
    text: tu as tout fait avec sagesse,
- type: usfm
  marker: q1
  children:
  - type: text
    text: la terre est pleine ╵de tout ce que tu as réalisé ;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: voici la mer immense ╵qui s’étend à perte de vue,
- type: usfm
  marker: q1
  children:
  - type: text
    text: peuplée d’animaux innombrables,
- type: usfm
  marker: q1
  children:
  - type: text
    text: des plus petits jusqu’aux plus grands,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: les bateaux la parcourent,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ainsi que le monstre marin ╵que tu as fait pour qu’il y joue.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: Ils comptent sur toi, tous ces êtres,
- type: usfm
  marker: q1
  children:
  - type: text
    text: pour recevoir leur nourriture, ╵chacun au moment opportun.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: Tu la leur donnes, ils la prennent,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ta main s’ouvre, et ils sont comblés ╵de bonnes choses.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: Tu te détournes, ╵ils sont épouvantés.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Tu leur ôtes le souffle, ╵les voilà qui périssent,
- type: usfm
  marker: q1
  children:
  - type: text
    text: redevenant poussière.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: Et si tu envoies ton Esprit, ╵ils sont créés,
- type: usfm
  marker: q1
  children:
  - type: text
    text: tu renouvelles l’aspect de la terre.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: Que l’Eternel ╵soit à jamais glorifié !
- type: usfm
  marker: q1
  children:
  - type: text
    text: Qu’il se réjouisse de ses œuvres !
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '32'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: Son regard fait trembler la terre,
- type: usfm
  marker: q1
  children:
  - type: text
    text: il touche les montagnes ╵et elles fument.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '33'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: Je veux chanter pour l’Eternel ╵ma vie durant,
- type: usfm
  marker: q1
  children:
  - type: text
    text: célébrer mon Dieu en musique ╵tant que j’existerai.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '34'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: Que mes paroles lui soient agréables !
- type: usfm
  marker: q1
  children:
  - type: text
    text: Moi, j’ai ma joie en l’Eternel.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '35'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: Que les pécheurs soient ôtés de la terre !
- type: usfm
  marker: q1
  children:
  - type: text
    text: Que les méchants n’existent plus !
- type: usfm
  marker: q1
  children:
  - type: text
    text: Que tout mon être ╵bénisse l’Eternel !
- type: usfm
  marker: q1
  children:
  - type: text
    text: Oui, louez l’Eternel !
