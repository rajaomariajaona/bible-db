document_id: PSA.104,21
type_code: fra
verses:
  '1':
  - type: heading
    content: Louange au Créateur
  - type: text
    content: Que tout mon être ╵bénisse l’Eternel !
  - type: text
    content: O Eternel, mon Dieu, que tu es grand !
  - type: text
    content: Tu es revêtu de splendeur, ╵et de magnificence,
  '10':
  - type: text
    content: Tu fais jaillir des sources ╵pour alimenter des torrents
  - type: text
    content: qui coulent entre les montagnes.
  '11':
  - type: text
    content: Elles abreuvent ╵les animaux des champs,
  - type: text
    content: et les onagres
  - type: note
    content: Les ânes sauvages.
  - type: text
    content: ' ╵y étanchent leur soif.'
  '12':
  - type: text
    content: Les oiseaux nichent sur leurs rives,
  - type: text
    content: et chantent au sein du feuillage.
  '13':
  - type: text
    content: De tes hautes demeures ╵tu arroses les monts,
  - type: text
    content: la terre est rassasiée ╵par l’effet de tes œuvres.
  '14':
  - type: text
    content: Tu fais pousser l’herbe pour le bétail,
  - type: text
    content: et tu fais prospérer les plantes ╵cultivées par les hommes,
  - type: text
    content: afin qu’ils tirent de la terre ╵le pain pour se nourrir.
  '15':
  - type: text
    content: Le vin réjouit le cœur de l’homme
  - type: text
    content: et fait resplendir son visage, ╵le rendant brillant plus que l’huile.
  - type: text
    content: Le pain restaure sa vigueur.
  '16':
  - type: text
    content: Les arbres, ouvrages de l’Eternel, ╵sont pleins de sève.
  - type: text
    content: Tels sont les cèdres, ╵qu’il a plantés.
  '17':
  - type: text
    content: C’est là que nichent les oiseaux
  - type: text
    content: et la cigogne a sa demeure ╵dans les cyprès.
  '18':
  - type: text
    content: Les bouquetins ont leurs retraites ╵sur les monts élevés,
  - type: text
    content: et les rochers ╵sont le refuge des damans.
  '19':
  - type: text
    content: Tu as formé la lune ╵pour marquer les dates des fêtes.
  - type: text
    content: Le soleil sait quand il se couche.
  '2':
  - type: text
    content: tu t’enveloppes de lumière ╵comme on se revêt d’un manteau,
  - type: text
    content: et tu déploies le ciel ╵comme une tente.
  '20':
  - type: text
    content: Tu fais descendre les ténèbres, ╵et c’est la nuit.
  - type: text
    content: Alors les hôtes des forêts ╵se mettent tous en mouvement ;
  '21':
  - type: text
    content: les lionceaux rugissent ╵après leur proie,
  - type: text
    content: ils demandent à Dieu ╵leur nourriture
  - type: note
    content: Voir 147.9 ; Jb 38.39-40 ; Es 31.4.
  - type: text
    content: .
  '22':
  - type: text
    content: Mais dès que paraît le soleil, ╵ils se retirent
  - type: text
    content: pour se coucher dans leurs tanières.
  '23':
  - type: text
    content: Et l’homme sort ╵pour se livrer à son activité,
  - type: text
    content: accomplir son travail ╵jusqu’à la nuit.
  '24':
  - type: text
    content: Combien tes œuvres sont nombreuses, ╵ô Eternel,
  - type: text
    content: tu as tout fait avec sagesse,
  - type: text
    content: la terre est pleine ╵de tout ce que tu as réalisé ;
  '25':
  - type: text
    content: voici la mer immense ╵qui s’étend à perte de vue,
  - type: text
    content: peuplée d’animaux innombrables,
  - type: text
    content: des plus petits jusqu’aux plus grands,
  '26':
  - type: text
    content: les bateaux la parcourent,
  - type: text
    content: ainsi que le monstre marin ╵que tu as fait pour qu’il y joue.
  '27':
  - type: text
    content: Ils comptent sur toi, tous ces êtres,
  - type: text
    content: pour recevoir leur nourriture, ╵chacun au moment opportun.
  '28':
  - type: text
    content: Tu la leur donnes, ils la prennent,
  - type: text
    content: ta main s’ouvre, et ils sont comblés ╵de bonnes choses.
  '29':
  - type: text
    content: Tu te détournes, ╵ils sont épouvantés.
  - type: text
    content: Tu leur ôtes le souffle, ╵les voilà qui périssent,
  - type: text
    content: redevenant poussière.
  '3':
  - type: text
    content: Tu fixes au-dessus des eaux du ciel ╵la charpente de tes hautes demeures,
  - type: text
    content: tu fais des nuages ton char,
  - type: text
    content: tu te déplaces ╵sur les ailes du vent,
  '30':
  - type: text
    content: Et si tu envoies ton Esprit, ╵ils sont créés,
  - type: text
    content: tu renouvelles l’aspect de la terre.
  '31':
  - type: text
    content: Que l’Eternel ╵soit à jamais glorifié !
  - type: text
    content: Qu’il se réjouisse de ses œuvres !
  '32':
  - type: text
    content: Son regard fait trembler la terre,
  - type: text
    content: il touche les montagnes ╵et elles fument.
  '33':
  - type: text
    content: Je veux chanter pour l’Eternel ╵ma vie durant,
  - type: text
    content: célébrer mon Dieu en musique ╵tant que j’existerai.
  '34':
  - type: text
    content: Que mes paroles lui soient agréables !
  - type: text
    content: Moi, j’ai ma joie en l’Eternel.
  '35':
  - type: text
    content: Que les pécheurs soient ôtés de la terre !
  - type: text
    content: Que les méchants n’existent plus !
  - type: text
    content: Que tout mon être ╵bénisse l’Eternel !
  - type: text
    content: Oui, louez l’Eternel !
  '4':
  - type: text
    content: tu fais des vents tes messagers,
  - type: text
    content: les éclairs étincelants sont tes serviteurs
  - type: note
    content: Cité en Hé 1.7 selon l’ancienne version grecque.
  - type: text
    content: .
  '5':
  - type: text
    content: Tu as fondé la terre sur ses bases
  - type: text
    content: pour qu’elle reste inébranlable ╵à tout jamais.
  '6':
  - type: text
    content: Les eaux de l’abîme la recouvraient ╵tout comme un vêtement,
  - type: text
    content: sur les montagnes les eaux reposaient ;
  '7':
  - type: text
    content: à ta menace, ╵elles se sont enfuies,
  - type: text
    content: au bruit de ton tonnerre, ╵elles se sont vite élancées,
  '8':
  - type: text
    content: gravissant des montagnes, ╵dévalant vers des plaines
  - type: note
    content: 'Autre traduction : et les montagnes se sont élevées et les vallées se sont creusées.'
  - type: text
    content: jusqu’à l’endroit ╵que tu leur avais assigné.
  '9':
  - type: text
    content: Tu as fixé une limite ╵que les eaux ne franchiront plus,
  - type: text
    content: et elles ne reviendront plus ╵pour submerger la terre.
