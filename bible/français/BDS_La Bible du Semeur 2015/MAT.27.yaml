document_id: MAT.27
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Jésus devant Pilate
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: (Mc 15.1 ; Lc 23.1 ; Jn 18.28)
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'L’aube s’était levée. L’ensemble des chefs des prêtres et des responsables du peuple tinrent conseil contre Jésus pour le faire condamner à mort. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Ils le firent lier et le conduisirent chez Pilate, le gouverneur, pour le remettre entre ses mains.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Le suicide de Judas
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: (voir Ac 1.18-19)
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'En voyant que Jésus était condamné, Judas, qui l’avait trahi, fut pris de remords : il alla rapporter aux chefs des prêtres et aux responsables du peuple les trente pièces d’argent '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'et leur dit : J’ai péché en livrant un innocent à la mort !'
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Mais ils lui répliquèrent : Que nous importe ? Cela te regarde !'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Judas jeta les pièces d’argent dans le Temple, partit, et alla se pendre.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Les chefs des prêtres ramassèrent l’argent et déclarèrent : On n’a pas le droit de verser cette somme dans le trésor du Temple, car c’est le prix du sang'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '27.6 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Le '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'prix du sang, '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: c’est-à-dire le prix d’une vie humaine.
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Ils tinrent donc conseil et décidèrent d’acquérir, avec cet argent, le « Champ-du-Potier » et d’en faire un cimetière pour les étrangers. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Voilà pourquoi ce terrain s’appelle encore de nos jours « le champ du sang ».
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Ainsi s’accomplit la parole du prophète Jérémie :'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: qt
    children:
    - type: text
      text: Ils ont pris les trente pièces d’argent, le prix auquel les descendants d’
    - type: usfm
      marker: w
      children:
      - type: text
        text: Israël
    - type: text
      text: ' l’ont estimé,'
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: usfm
    marker: qt
    children:
    - type: text
      text: et ils les ont données pour acheter le champ du potier, comme le Seigneur me l’avait ordonné
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '27.10 '
    - type: usfm
      marker: ft
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Za 11.12-13
        metadata:
          usfm: ZEC.11.12+ZEC.11.13
      - type: text
        text: . Voir Jr 18.2-3 ; 19.1-2 ; 32.6-15.
    marker-yv: yv-n
  - type: usfm
    marker: qt
    children:
    - type: text
      text: .
- type: usfm
  marker: s1
  children:
  - type: text
    text: Jésus condamné à mort
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: (Mc 15.2-15 ; Lc 23.2-5, 13-25 ; Jn 18.29-40 ; 19.4-16)
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Jésus comparut devant le gouverneur qui l’interrogea.
- type: usfm
  marker: p
  children:
  - type: text
    text: – Es-tu le roi des Juifs ? lui demanda-t-il.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: wj
    children:
    - type: text
      text: – Tu le dis toi-même,
  - type: text
    text: ' répondit Jésus.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Mais ensuite, quand les chefs des prêtres et les responsables du peuple vinrent l’accuser, il ne répondit rien.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Alors Pilate lui dit : Tu n’entends pas tout ce qu’ils disent contre toi ?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Mais, au grand étonnement du gouverneur, Jésus ne répondit pas même sur un seul point.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'A chaque fête de la Pâque, le gouverneur avait l’habitude de relâcher un prisonnier, celui que la foule désignait. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Or, à ce moment-là, il y avait sous les verrous, un prisonnier célèbre nommé Barabbas
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '27.16 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: Barabbas
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: ': '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'certains manuscrits ont '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'Jésus Barabbas. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: De même qu’au v. 17.
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'En voyant la foule rassemblée, Pilate lui demanda donc : Lequel de ces deux hommes voulez-vous que je vous relâche, Barabbas ou Jésus, qu’on appelle le Messie ?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: En effet, il s’était bien rendu compte que c’était par jalousie qu’on lui avait livré Jésus.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Pendant qu’il siégeait au tribunal, sa femme lui fit parvenir un message disant : Ne te mêle pas de l’affaire de ce juste, car cette nuit, j’ai été fort tourmentée par des rêves à cause de lui.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Cependant, les chefs des prêtres et les responsables du peuple persuadèrent la foule de réclamer la libération de Barabbas et l’exécution de Jésus.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Le gouverneur prit la parole et redemanda à la foule : Lequel des deux voulez-vous que je vous relâche ?'
- type: usfm
  marker: p
  children:
  - type: text
    text: – Barabbas ! crièrent-ils.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: – Mais alors, insista Pilate, que dois-je faire de Jésus, qu’on appelle le Messie
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '27.22 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Autre traduction : '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: Christ.
    marker-yv: yv-n
  - type: text
    text: '  ?'
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Et tous répondirent : Crucifie-le !'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: – Mais enfin, reprit Pilate, qu’a-t-il fait de mal ?
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Eux, cependant, criaient de plus en plus fort : Crucifie-le !'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Quand Pilate vit qu’il n’aboutissait à rien, mais qu’au contraire, l’agitation de la foule augmentait, il prit de l’eau et, devant la foule, se lava les mains en disant : Je ne suis pas responsable de la mort de cet homme. Cela vous regarde.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Et tout le peuple répondit : Que la responsabilité de sa mort retombe sur nous et sur nos enfants !'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: Alors Pilate leur relâcha Barabbas. Quant à Jésus, après l’avoir fait battre à coups de fouet, il le livra pour qu’on le crucifie.
- type: usfm
  marker: r
  children:
  - type: text
    text: (Mc 15.16-20 ; Lc 23.11 ; Jn 19.2-3)
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'Les soldats du gouverneur traînèrent Jésus vers l’intérieur du palais et rassemblèrent toute la cohorte autour de lui. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'Ils lui arrachèrent ses vêtements et le revêtirent d’un manteau écarlate. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'Ils lui posèrent sur la tête une couronne tressée de rameaux épineux ; dans sa main droite, ils placèrent un roseau en guise de sceptre. Ils s’agenouillèrent devant lui en disant sur un ton sarcastique : Salut, roi des Juifs !'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'Ils crachaient sur lui et, prenant le roseau, ils le frappaient à la tête. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: Quand ils eurent fini de se moquer de lui, ils lui ôtèrent le manteau, lui remirent ses vêtements et l’emmenèrent pour le crucifier.
- type: usfm
  marker: s1
  children:
  - type: text
    text: La mort de Jésus
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: (Mc 15.21-32 ; Lc 23.26-43 ; Jn 19.17-22)
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: A la sortie de la ville, ils rencontrèrent un nommé Simon, originaire de Cyrène. Ils lui firent porter la croix de Jésus.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: 'Ils arrivèrent à un endroit nommé Golgotha (c’est-à-dire : « le lieu du crâne »). '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: Là, ils donnèrent à boire à Jésus du vin mélangé avec du fiel
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '27.34 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Sorte d’anesthésique destiné à adoucir la douleur. Mais Jésus a voulu rester lucide jusqu’à la fin.
    marker-yv: yv-n
  - type: text
    text: '  ; mais quand il l’eut goûté, il refusa de le boire. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: 'Après l’avoir cloué sur la croix, les soldats se partagèrent ses vêtements en les tirant au sort. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: Puis ils s’assirent pour monter la garde.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: 'Ils avaient fixé au-dessus de la tête de Jésus un écriteau sur lequel était inscrit, comme motif de sa condamnation : « Celui-ci est Jésus, le roi des Juifs. » '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: text
    text: Deux brigands furent crucifiés en même temps que lui, l’un à sa droite, l’autre à sa gauche.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '39'
  - type: text
    text: 'Ceux qui passaient par là lui lançaient des insultes en secouant la tête, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '40'
  - type: text
    text: 'et criaient : Hé, toi qui démolis le Temple et qui le reconstruis en trois jours, sauve-toi toi-même. Si tu es le Fils de Dieu, descends de la croix !'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '41'
  - type: text
    text: 'De même, les chefs des prêtres se moquaient de lui, avec les spécialistes de la Loi et les responsables du peuple, en disant : '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '42'
  - type: text
    text: 'Dire qu’il a sauvé les autres, et qu’il est incapable de se sauver lui-même ! C’est ça le roi d’Israël ? Qu’il descende donc de la croix ; alors nous croirons en lui ! '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '43'
  - type: usfm
    marker: qt
    children:
    - type: text
      text: Il a mis sa confiance en Dieu. Eh bien, si Dieu trouve son plaisir en lui, qu’il le délivre
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '27.43 '
    - type: usfm
      marker: ft
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ps 22.9
        metadata:
          usfm: PSA.22.9
      - type: text
        text: .
    marker-yv: yv-n
  - type: usfm
    marker: qt
    children:
    - type: text
      text: '!'
  - type: text
    text: ' N’a-t-il pas dit : « Je suis le Fils de Dieu » ?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '44'
  - type: text
    text: Les brigands crucifiés avec lui l’insultaient, eux aussi, de la même manière.
- type: usfm
  marker: r
  children:
  - type: text
    text: (Mc 15.33-41 ; Lc 23.44-49 ; Jn 19.25-30)
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '45'
  - type: text
    text: A partir de midi, et jusqu’à trois heures de l’après-midi, le pays entier
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '27.45 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Autre traduction : '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: sur toute la terre.
    marker-yv: yv-n
  - type: text
    text: ' fut plongé dans l’obscurité.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '46'
  - type: text
    text: 'Vers trois heures, Jésus cria d’une voix forte : '
  - type: usfm
    marker: tl
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Eli, Eli, lama sabachthani ?
  - type: text
    text: ' ce qui veut dire : '
  - type: usfm
    marker: wj
    children:
    - type: usfm
      marker: qt
      children:
      - type: text
        text: Mon Dieu, mon Dieu, pourquoi m’as-tu abandonné
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '27.46 '
    - type: usfm
      marker: ft
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ps 22.2
        metadata:
          usfm: PSA.22.2
      - type: text
        text: .
    marker-yv: yv-n
  - type: usfm
    marker: wj
    children:
    - type: usfm
      marker: qt
      children:
      - type: text
        text: '?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '47'
  - type: text
    text: 'En entendant ces paroles, quelques-uns de ceux qui étaient là disaient : Il appelle Elie !'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '48'
  - type: text
    text: 'L’un d’entre eux courut aussitôt prendre une éponge, qu’il imbiba de vinaigre et piqua au bout d’un roseau. Il la présenta à Jésus pour qu’il boive, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '49'
  - type: text
    text: 'quand les autres lui dirent : Attends ! On va bien voir si Elie vient le délivrer.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '50'
  - type: text
    text: 'A ce moment, Jésus poussa de nouveau un grand cri et rendit l’esprit. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '51'
  - type: text
    text: 'Et voici qu’au même instant, le rideau du Temple se déchira en deux, de haut en bas ; la terre trembla, les rochers se fendirent. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '52'
  - type: text
    text: 'Des tombes s’ouvrirent et les corps de beaucoup d’hommes fidèles à Dieu qui étaient morts ressuscitèrent. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '53'
  - type: text
    text: Ils quittèrent leurs tombeaux et, après la résurrection de Jésus, ils entrèrent dans la ville sainte où beaucoup de personnes les virent.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '54'
  - type: text
    text: 'En voyant le tremblement de terre et tout ce qui se passait, l’officier romain et les soldats qui gardaient Jésus furent saisis d’épouvante et dirent : Cet homme était vraiment le Fils de Dieu'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '27.54 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Ou : '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: un fils de Dieu !
    marker-yv: yv-n
  - type: text
    text: '  !'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '55'
  - type: text
    text: Il y avait aussi là plusieurs femmes qui regardaient de loin ; c’étaient celles qui avaient suivi Jésus depuis la Galilée
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '27.55 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Le ministère de Jésus avait commencé dans la province du nord du pays d’Israël, la '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: Galilée.
    marker-yv: yv-n
  - type: text
    text: ', pour être à son service. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '56'
  - type: text
    text: Parmi elles, Marie de Magdala, Marie, la mère de Jacques et de Joseph et la mère des fils de Zébédée.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Jésus mis au tombeau
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: (Mc 15.42-47 ; Lc 23.50-56 ; Jn 19.38-42)
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '57'
  - type: text
    text: 'Le soir venu, arriva un homme riche appelé Joseph, originaire de la ville d’Arimathée. Lui aussi était un disciple de Jésus. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '58'
  - type: text
    text: 'Il alla demander à Pilate le corps de Jésus. Alors Pilate donna l’ordre de le lui remettre. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '59'
  - type: text
    text: 'Joseph prit donc le corps, l’enroula dans un drap de lin pur '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '60'
  - type: text
    text: 'et le déposa dans le tombeau tout neuf qu’il s’était fait tailler pour lui-même dans le roc. Puis il roula un grand bloc de pierre devant l’entrée du tombeau et s’en alla. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '61'
  - type: text
    text: Il y avait là Marie de Magdala et l’autre Marie, assises en face de la tombe.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '62'
  - type: text
    text: Le lendemain, le jour qui suivait la préparation du sabbat
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '27.62 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Le vendredi était appelé jour de la préparation (du sabbat) : les Juifs accomplissaient toutes les tâches qui leur éviteraient de travailler le jour du repos.'
    marker-yv: yv-n
  - type: text
    text: ', les chefs des prêtres et des pharisiens se rendirent ensemble chez Pilate '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '63'
  - type: text
    text: 'pour lui dire : Excellence, nous nous souvenons que cet imposteur a dit, pendant qu’il était encore en vie : '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: « Après trois jours, je ressusciterai. »
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '64'
  - type: text
    text: 'Fais donc surveiller étroitement la tombe jusqu’à ce troisième jour : il faut à tout prix éviter que ses disciples viennent dérober le corps pour dire ensuite au peuple qu’il est ressuscité. Cette dernière supercherie serait encore pire que la première.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '65'
  - type: text
    text: 'Pilate leur déclara : D’accord ! Prenez un corps de garde'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '27.65 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Autre traduction : '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: vous avez une garde.
    marker-yv: yv-n
  - type: text
    text: ' et assurez la protection de ce tombeau à votre guise.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '66'
  - type: text
    text: Ils se rendirent donc au tombeau et le firent surveiller après avoir apposé les scellés sur la pierre en présence de la garde.
