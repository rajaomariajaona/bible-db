document_id: MAT.27,21
type_code: fra
verses:
  '1':
  - type: heading
    content: Jésus devant Pilate
  - type: heading
    content: (Mc 15.1 ; Lc 23.1 ; Jn 18.28)
  - type: text
    content: 'L’aube s’était levée. L’ensemble des chefs des prêtres et des responsables du peuple tinrent conseil contre Jésus pour le faire condamner à mort. '
  '10':
  - type: text
    content: et ils les ont données pour acheter le champ du potier, comme le Seigneur me l’avait ordonné
  - type: note
    content: Za 11.12-13. Voir Jr 18.2-3 ; 19.1-2 ; 32.6-15.
  - type: text
    content: .
  - type: heading
    content: Jésus condamné à mort
  - type: heading
    content: (Mc 15.2-15 ; Lc 23.2-5, 13-25 ; Jn 18.29-40 ; 19.4-16)
  '11':
  - type: text
    content: Jésus comparut devant le gouverneur qui l’interrogea.
  - type: text
    content: – Es-tu le roi des Juifs ? lui demanda-t-il.
  - type: text
    content: – Tu le dis toi-même,
  - type: text
    content: ' répondit Jésus.'
  '12':
  - type: text
    content: Mais ensuite, quand les chefs des prêtres et les responsables du peuple vinrent l’accuser, il ne répondit rien.
  '13':
  - type: text
    content: 'Alors Pilate lui dit : Tu n’entends pas tout ce qu’ils disent contre toi ?'
  '14':
  - type: text
    content: Mais, au grand étonnement du gouverneur, Jésus ne répondit pas même sur un seul point.
  '15':
  - type: text
    content: 'A chaque fête de la Pâque, le gouverneur avait l’habitude de relâcher un prisonnier, celui que la foule désignait. '
  '16':
  - type: text
    content: Or, à ce moment-là, il y avait sous les verrous, un prisonnier célèbre nommé Barabbas
  - type: note
    content: 'Barabbas: certains manuscrits ont Jésus Barabbas. De même qu’au v. 17.'
  - type: text
    content: .
  '17':
  - type: text
    content: 'En voyant la foule rassemblée, Pilate lui demanda donc : Lequel de ces deux hommes voulez-vous que je vous relâche, Barabbas ou Jésus, qu’on appelle le Messie ?'
  '18':
  - type: text
    content: En effet, il s’était bien rendu compte que c’était par jalousie qu’on lui avait livré Jésus.
  '19':
  - type: text
    content: 'Pendant qu’il siégeait au tribunal, sa femme lui fit parvenir un message disant : Ne te mêle pas de l’affaire de ce juste, car cette nuit, j’ai été fort tourmentée par des rêves à cause de lui.'
  '2':
  - type: text
    content: Ils le firent lier et le conduisirent chez Pilate, le gouverneur, pour le remettre entre ses mains.
  - type: heading
    content: Le suicide de Judas
  - type: heading
    content: (voir Ac 1.18-19)
  '20':
  - type: text
    content: Cependant, les chefs des prêtres et les responsables du peuple persuadèrent la foule de réclamer la libération de Barabbas et l’exécution de Jésus.
  '21':
  - type: text
    content: 'Le gouverneur prit la parole et redemanda à la foule : Lequel des deux voulez-vous que je vous relâche ?'
  - type: text
    content: – Barabbas ! crièrent-ils.
  '22':
  - type: text
    content: – Mais alors, insista Pilate, que dois-je faire de Jésus, qu’on appelle le Messie
  - type: note
    content: 'Autre traduction : Christ.'
  - type: text
    content: '  ?'
  - type: text
    content: 'Et tous répondirent : Crucifie-le !'
  '23':
  - type: text
    content: – Mais enfin, reprit Pilate, qu’a-t-il fait de mal ?
  - type: text
    content: 'Eux, cependant, criaient de plus en plus fort : Crucifie-le !'
  '24':
  - type: text
    content: 'Quand Pilate vit qu’il n’aboutissait à rien, mais qu’au contraire, l’agitation de la foule augmentait, il prit de l’eau et, devant la foule, se lava les mains en disant : Je ne suis pas responsable de la mort de cet homme. Cela vous regarde.'
  '25':
  - type: text
    content: 'Et tout le peuple répondit : Que la responsabilité de sa mort retombe sur nous et sur nos enfants !'
  '26':
  - type: text
    content: Alors Pilate leur relâcha Barabbas. Quant à Jésus, après l’avoir fait battre à coups de fouet, il le livra pour qu’on le crucifie.
  - type: heading
    content: (Mc 15.16-20 ; Lc 23.11 ; Jn 19.2-3)
  '27':
  - type: text
    content: 'Les soldats du gouverneur traînèrent Jésus vers l’intérieur du palais et rassemblèrent toute la cohorte autour de lui. '
  '28':
  - type: text
    content: 'Ils lui arrachèrent ses vêtements et le revêtirent d’un manteau écarlate. '
  '29':
  - type: text
    content: 'Ils lui posèrent sur la tête une couronne tressée de rameaux épineux ; dans sa main droite, ils placèrent un roseau en guise de sceptre. Ils s’agenouillèrent devant lui en disant sur un ton sarcastique : Salut, roi des Juifs !'
  '3':
  - type: text
    content: 'En voyant que Jésus était condamné, Judas, qui l’avait trahi, fut pris de remords : il alla rapporter aux chefs des prêtres et aux responsables du peuple les trente pièces d’argent '
  '30':
  - type: text
    content: 'Ils crachaient sur lui et, prenant le roseau, ils le frappaient à la tête. '
  '31':
  - type: text
    content: Quand ils eurent fini de se moquer de lui, ils lui ôtèrent le manteau, lui remirent ses vêtements et l’emmenèrent pour le crucifier.
  - type: heading
    content: La mort de Jésus
  - type: heading
    content: (Mc 15.21-32 ; Lc 23.26-43 ; Jn 19.17-22)
  '32':
  - type: text
    content: A la sortie de la ville, ils rencontrèrent un nommé Simon, originaire de Cyrène. Ils lui firent porter la croix de Jésus.
  '33':
  - type: text
    content: 'Ils arrivèrent à un endroit nommé Golgotha (c’est-à-dire : « le lieu du crâne »). '
  '34':
  - type: text
    content: Là, ils donnèrent à boire à Jésus du vin mélangé avec du fiel
  - type: note
    content: Sorte d’anesthésique destiné à adoucir la douleur. Mais Jésus a voulu rester lucide jusqu’à la fin.
  - type: text
    content: '  ; mais quand il l’eut goûté, il refusa de le boire. '
  '35':
  - type: text
    content: 'Après l’avoir cloué sur la croix, les soldats se partagèrent ses vêtements en les tirant au sort. '
  '36':
  - type: text
    content: Puis ils s’assirent pour monter la garde.
  '37':
  - type: text
    content: 'Ils avaient fixé au-dessus de la tête de Jésus un écriteau sur lequel était inscrit, comme motif de sa condamnation : « Celui-ci est Jésus, le roi des Juifs. » '
  '38':
  - type: text
    content: Deux brigands furent crucifiés en même temps que lui, l’un à sa droite, l’autre à sa gauche.
  '39':
  - type: text
    content: 'Ceux qui passaient par là lui lançaient des insultes en secouant la tête, '
  '4':
  - type: text
    content: 'et leur dit : J’ai péché en livrant un innocent à la mort !'
  - type: text
    content: 'Mais ils lui répliquèrent : Que nous importe ? Cela te regarde !'
  '40':
  - type: text
    content: 'et criaient : Hé, toi qui démolis le Temple et qui le reconstruis en trois jours, sauve-toi toi-même. Si tu es le Fils de Dieu, descends de la croix !'
  '41':
  - type: text
    content: 'De même, les chefs des prêtres se moquaient de lui, avec les spécialistes de la Loi et les responsables du peuple, en disant : '
  '42':
  - type: text
    content: 'Dire qu’il a sauvé les autres, et qu’il est incapable de se sauver lui-même ! C’est ça le roi d’Israël ? Qu’il descende donc de la croix ; alors nous croirons en lui ! '
  '43':
  - type: text
    content: Il a mis sa confiance en Dieu. Eh bien, si Dieu trouve son plaisir en lui, qu’il le délivre
  - type: note
    content: Ps 22.9.
  - type: text
    content: '!'
  - type: text
    content: ' N’a-t-il pas dit : « Je suis le Fils de Dieu » ?'
  '44':
  - type: text
    content: Les brigands crucifiés avec lui l’insultaient, eux aussi, de la même manière.
  - type: heading
    content: (Mc 15.33-41 ; Lc 23.44-49 ; Jn 19.25-30)
  '45':
  - type: text
    content: A partir de midi, et jusqu’à trois heures de l’après-midi, le pays entier
  - type: note
    content: 'Autre traduction : sur toute la terre.'
  - type: text
    content: ' fut plongé dans l’obscurité.'
  '46':
  - type: text
    content: 'Vers trois heures, Jésus cria d’une voix forte : '
  - type: text
    content: Eli, Eli, lama sabachthani ?
  - type: text
    content: ' ce qui veut dire : '
  - type: text
    content: Mon Dieu, mon Dieu, pourquoi m’as-tu abandonné
  - type: note
    content: Ps 22.2.
  - type: text
    content: '?'
  '47':
  - type: text
    content: 'En entendant ces paroles, quelques-uns de ceux qui étaient là disaient : Il appelle Elie !'
  '48':
  - type: text
    content: 'L’un d’entre eux courut aussitôt prendre une éponge, qu’il imbiba de vinaigre et piqua au bout d’un roseau. Il la présenta à Jésus pour qu’il boive, '
  '49':
  - type: text
    content: 'quand les autres lui dirent : Attends ! On va bien voir si Elie vient le délivrer.'
  '5':
  - type: text
    content: Judas jeta les pièces d’argent dans le Temple, partit, et alla se pendre.
  '50':
  - type: text
    content: 'A ce moment, Jésus poussa de nouveau un grand cri et rendit l’esprit. '
  '51':
  - type: text
    content: 'Et voici qu’au même instant, le rideau du Temple se déchira en deux, de haut en bas ; la terre trembla, les rochers se fendirent. '
  '52':
  - type: text
    content: 'Des tombes s’ouvrirent et les corps de beaucoup d’hommes fidèles à Dieu qui étaient morts ressuscitèrent. '
  '53':
  - type: text
    content: Ils quittèrent leurs tombeaux et, après la résurrection de Jésus, ils entrèrent dans la ville sainte où beaucoup de personnes les virent.
  '54':
  - type: text
    content: 'En voyant le tremblement de terre et tout ce qui se passait, l’officier romain et les soldats qui gardaient Jésus furent saisis d’épouvante et dirent : Cet homme était vraiment le Fils de Dieu'
  - type: note
    content: 'Ou : un fils de Dieu !'
  - type: text
    content: '  !'
  '55':
  - type: text
    content: Il y avait aussi là plusieurs femmes qui regardaient de loin ; c’étaient celles qui avaient suivi Jésus depuis la Galilée
  - type: note
    content: Le ministère de Jésus avait commencé dans la province du nord du pays d’Israël, la Galilée.
  - type: text
    content: ', pour être à son service. '
  '56':
  - type: text
    content: Parmi elles, Marie de Magdala, Marie, la mère de Jacques et de Joseph et la mère des fils de Zébédée.
  - type: heading
    content: Jésus mis au tombeau
  - type: heading
    content: (Mc 15.42-47 ; Lc 23.50-56 ; Jn 19.38-42)
  '57':
  - type: text
    content: 'Le soir venu, arriva un homme riche appelé Joseph, originaire de la ville d’Arimathée. Lui aussi était un disciple de Jésus. '
  '58':
  - type: text
    content: 'Il alla demander à Pilate le corps de Jésus. Alors Pilate donna l’ordre de le lui remettre. '
  '59':
  - type: text
    content: 'Joseph prit donc le corps, l’enroula dans un drap de lin pur '
  '6':
  - type: text
    content: 'Les chefs des prêtres ramassèrent l’argent et déclarèrent : On n’a pas le droit de verser cette somme dans le trésor du Temple, car c’est le prix du sang'
  - type: note
    content: Le prix du sang, c’est-à-dire le prix d’une vie humaine.
  - type: text
    content: .
  '60':
  - type: text
    content: 'et le déposa dans le tombeau tout neuf qu’il s’était fait tailler pour lui-même dans le roc. Puis il roula un grand bloc de pierre devant l’entrée du tombeau et s’en alla. '
  '61':
  - type: text
    content: Il y avait là Marie de Magdala et l’autre Marie, assises en face de la tombe.
  '62':
  - type: text
    content: Le lendemain, le jour qui suivait la préparation du sabbat
  - type: note
    content: 'Le vendredi était appelé jour de la préparation (du sabbat) : les Juifs accomplissaient toutes les tâches qui leur éviteraient de travailler le jour du repos.'
  - type: text
    content: ', les chefs des prêtres et des pharisiens se rendirent ensemble chez Pilate '
  '63':
  - type: text
    content: 'pour lui dire : Excellence, nous nous souvenons que cet imposteur a dit, pendant qu’il était encore en vie : '
  - type: text
    content: « Après trois jours, je ressusciterai. »
  - type: text
    content: ' '
  '64':
  - type: text
    content: 'Fais donc surveiller étroitement la tombe jusqu’à ce troisième jour : il faut à tout prix éviter que ses disciples viennent dérober le corps pour dire ensuite au peuple qu’il est ressuscité. Cette dernière supercherie serait encore pire que la première.'
  '65':
  - type: text
    content: 'Pilate leur déclara : D’accord ! Prenez un corps de garde'
  - type: note
    content: 'Autre traduction : vous avez une garde.'
  - type: text
    content: ' et assurez la protection de ce tombeau à votre guise.'
  '66':
  - type: text
    content: Ils se rendirent donc au tombeau et le firent surveiller après avoir apposé les scellés sur la pierre en présence de la garde.
  '7':
  - type: text
    content: 'Ils tinrent donc conseil et décidèrent d’acquérir, avec cet argent, le « Champ-du-Potier » et d’en faire un cimetière pour les étrangers. '
  '8':
  - type: text
    content: Voilà pourquoi ce terrain s’appelle encore de nos jours « le champ du sang ».
  '9':
  - type: text
    content: 'Ainsi s’accomplit la parole du prophète Jérémie :'
  - type: text
    content: Ils ont pris les trente pièces d’argent, le prix auquel les descendants d’
  - type: text
    content: Israël
  - type: text
    content: ' l’ont estimé,'
  - type: text
    content: ' '
