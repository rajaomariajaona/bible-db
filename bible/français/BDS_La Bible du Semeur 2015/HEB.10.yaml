document_id: HEB.10,21
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: L’inefficacité de la Loi et l’efficacité du sacrifice de Christ
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'La Loi de Moïse ne possède qu’une ombre des biens à venir et non pas l’image même de ces réalités. Elle ne peut donc en aucun cas amener à la perfection ceux qui s’approchent ainsi de Dieu sur la base des mêmes sacrifices offerts perpétuellement d’année en année. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Et c’est en raison de cette '
    - type: usfm
      marker: qt
      children:
      - type: text
        text: volonté
    - type: text
      text: ' de Dieu que nous sommes purifiés du péché, grâce au sacrifice de son propre '
    - type: usfm
      marker: qt
      children:
      - type: text
        text: corps
    - type: text
      text: ' que Jésus-Christ a offert une fois pour toutes. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Tout prêtre se présente chaque jour pour accomplir son service et offrir souvent les mêmes sacrifices qui, cependant, ne peuvent jamais ôter les péchés. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Christ, lui, a offert un sacrifice unique pour les péchés, valable pour toujours, et il '
    - type: usfm
      marker: qt
      children:
      - type: text
        text: s’est assis à la droite de Dieu
    - type: text
      text: ' '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'où il attend désormais que '
    - type: usfm
      marker: qt
      children:
      - type: text
        text: ses ennemis soient mis à terre sous ses pieds
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '10.13 '
      - type: usfm
        marker: ft
        children:
        - type: usfm
          marker: ref
          children:
          - type: text
            text: Ps 110.1
        - type: text
          text: .
      marker-yv: yv-n
    - type: usfm
      marker: qt
      children:
      - type: text
        text: .
    - type: text
      text: ' '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Par une offrande unique, en effet, il a rendu parfaits pour toujours ceux qu’il purifie du péché. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'C’est là ce que le Saint-Esprit nous confirme de son côté. Car il dit d’abord :'
  '16':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: qt
      children:
      - type: text
        text: Mais voici quelle alliance
    - type: text
      text: ' ╵'
    - type: usfm
      marker: qt
      children:
      - type: text
        text: je vais conclure avec eux
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: qt
      children:
      - type: text
        text: 'après ces jours-là, dit le Seigneur :'
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: qt
      children:
      - type: text
        text: je placerai mes lois sur leur cœur
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: qt
      children:
      - type: text
        text: et je les graverai dans leur pensée.
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Puis il ajoute :'
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: qt
      children:
      - type: text
        text: Je ne tiendrai plus compte
    - type: text
      text: ' ╵'
    - type: usfm
      marker: qt
      children:
      - type: text
        text: ni de leurs péchés, ni de leurs fautes
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '10.17 '
      - type: usfm
        marker: ft
        children:
        - type: usfm
          marker: ref
          children:
          - type: text
            text: Jr 31.33-34
        - type: text
          text: .
      marker-yv: yv-n
    - type: usfm
      marker: qt
      children:
      - type: text
        text: .
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Or, lorsque les péchés ont été pardonnés, il n’est plus nécessaire de présenter une offrande pour les ôter.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ne pas abandonner son assurance
    marker-yv: yv-h
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ainsi donc, frères et sœurs, nous avons une pleine liberté pour entrer dans le lieu très saint, grâce au sang du sacrifice de Jésus. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Si elle l’avait pu, ceux qui participent à ce culte auraient depuis longtemps cessé d’offrir ces sacrifices car, purifiés une fois pour toutes, ils n’auraient plus eu la conscience chargée d’aucun péché.
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Il nous en a ouvert le chemin, un chemin nouveau et vivant à travers le rideau du sanctuaire
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '10.20 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: C’est-à-dire dans le lieu très saint, dans la présence même de Dieu.
      marker-yv: yv-n
    - type: text
      text: ', c’est-à-dire à travers son propre corps. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ainsi, nous avons un grand-prêtre éminent placé à la tête de la maison de Dieu. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Approchons-nous donc de Dieu avec un cœur sincère, avec la pleine assurance que donne la foi, le cœur purifié de toute mauvaise conscience, et le corps lavé d’une eau pure.
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Restons fermement attachés à l’espérance que nous reconnaissons comme vraie, sans fléchir, car celui qui nous a fait les promesses est fidèle. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Et veillons les uns sur les autres pour nous encourager mutuellement à l’amour et à la pratique du bien.
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ne délaissons pas nos réunions, comme certains en ont pris l’habitude. Au contraire, encourageons-nous mutuellement, et cela d’autant plus que vous voyez se rapprocher le jour du Seigneur.
  '26':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'En effet, si, après avoir reçu la connaissance de la vérité, nous vivons délibérément dans le péché, il ne reste plus pour nous de sacrifice pour les péchés. '
  '27':
  - type: usfm
    marker: p
    children:
    - type: text
      text: La seule perspective est alors l’attente terrifiante du jugement et du feu ardent qui embrasera ceux qui se révoltent contre Dieu.
  '28':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Celui qui désobéit à la Loi de Moïse est '
    - type: usfm
      marker: qt
      children:
      - type: text
        text: mis à mort
    - type: text
      text: ' sans pitié, '
    - type: usfm
      marker: qt
      children:
      - type: text
        text: sur la déposition de deux ou trois témoins
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '10.28 '
      - type: usfm
        marker: ft
        children:
        - type: usfm
          marker: ref
          children:
          - type: text
            text: Dt 17.6
        - type: text
          text: .
      marker-yv: yv-n
    - type: usfm
      marker: qt
      children:
      - type: text
        text: .
    - type: text
      text: ' '
  '29':
  - type: usfm
    marker: p
    children:
    - type: text
      text: A votre avis, si quelqu’un couvre de mépris le Fils de Dieu, s’il considère comme sans valeur le sang de l’alliance, par lequel il a été purifié
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '10.29 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Autre traduction : '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: par lequel cette alliance a été consacrée.
      marker-yv: yv-n
    - type: text
      text: ', s’il outrage le Saint-Esprit, qui nous transmet la grâce divine, ne pensez-vous pas qu’il mérite un châtiment plus sévère encore ?'
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Mais, en fait, ces sacrifices rappellent chaque année le souvenir des péchés. '
  '30':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Nous connaissons bien celui qui a déclaré : '
    - type: usfm
      marker: qt
      children:
      - type: text
        text: C’est à moi qu’il appartient de faire justice ; c’est moi qui rendrai à chacun son dû,
    - type: text
      text: ' et encore : '
    - type: usfm
      marker: qt
      children:
      - type: text
        text: Le Seigneur jugera son peuple
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '10.30 '
      - type: usfm
        marker: ft
        children:
        - type: usfm
          marker: ref
          children:
          - type: text
            text: Dt 32.35-36
        - type: text
          text: .
      marker-yv: yv-n
    - type: usfm
      marker: qt
      children:
      - type: text
        text: .
    - type: text
      text: ' '
  '31':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Il est terrible de tomber entre les mains du Dieu vivant !
  '32':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Rappelez-vous au contraire les premiers temps où, après avoir été éclairés par Dieu, vous avez enduré les souffrances d’un rude combat. '
  '33':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Car tantôt vous avez été exposés publiquement aux injures et aux mauvais traitements, tantôt vous vous êtes rendus solidaires de ceux qui étaient traités de cette manière-là. '
  '34':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Oui, vous avez pris part à la souffrance des prisonniers et vous avez accepté avec joie d’être dépouillés de vos biens, car vous vous saviez en possession de richesses plus précieuses, et qui durent toujours.
  '35':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'N’abandonnez donc pas votre assurance : une grande récompense lui appartient. '
  '36':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Car il vous faut de la persévérance, afin qu’après avoir accompli la volonté de Dieu vous obteniez ce qu’il a promis. '
  '37':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: qt
      children:
      - type: text
        text: Encore un peu de temps, un tout petit peu de temps
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '10.37 '
      - type: usfm
        marker: ft
        children:
        - type: usfm
          marker: ref
          children:
          - type: text
            text: Es 26.20
        - type: text
          text: ' cité selon l’ancienne version grecque.'
      marker-yv: yv-n
    - type: text
      text: ', et'
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: qt
      children:
      - type: text
        text: celui qui doit venir viendra,
    - type: text
      text: ' ╵'
    - type: usfm
      marker: qt
      children:
      - type: text
        text: il ne tardera pas.
  '38':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: qt
      children:
      - type: text
        text: Celui qui est juste à mes yeux
    - type: text
      text: ' ╵'
    - type: usfm
      marker: qt
      children:
      - type: text
        text: vivra par la foi,
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: qt
      children:
      - type: text
        text: mais s’il retourne en arrière,
    - type: text
      text: ' ╵'
    - type: usfm
      marker: qt
      children:
      - type: text
        text: je ne prends pas plaisir en lui
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '10.38 '
      - type: usfm
        marker: ft
        children:
        - type: usfm
          marker: ref
          children:
          - type: text
            text: Ha 2.3-4
        - type: text
          text: ' cité selon l’ancienne version grecque.'
      marker-yv: yv-n
    - type: usfm
      marker: qt
      children:
      - type: text
        text: .
  '39':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Quant à nous, nous ne sommes pas de ceux qui '
    - type: usfm
      marker: qt
      children:
      - type: text
        text: retournent en arrière
    - type: text
      text: ' pour aller se perdre, mais de ceux qui ont '
    - type: usfm
      marker: qt
      children:
      - type: text
        text: la foi
    - type: text
      text: ' pour être sauvés.'
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'En effet, il est impossible que du sang de taureaux et de boucs ôte les péchés. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Voilà pourquoi, en entrant dans le monde, Christ a dit :'
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: qt
      children:
      - type: text
        text: Tu n’as voulu
    - type: text
      text: ' ╵'
    - type: usfm
      marker: qt
      children:
      - type: text
        text: 'ni sacrifice, ni offrande :'
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: qt
      children:
      - type: text
        text: tu m’as formé un corps.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: qt
      children:
      - type: text
        text: Tu n’as pris nul plaisir
    - type: text
      text: ' ╵'
    - type: usfm
      marker: qt
      children:
      - type: text
        text: 'aux '
      - type: usfm
        marker: w
        children:
        - type: text
          text: holocaustes
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '10.6 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Voir '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: Lv 1
        - type: text
          text: .
      marker-yv: yv-n
    - type: usfm
      marker: qt
      children:
      - type: text
        text: ','
    - type: text
      text: ' ╵'
    - type: usfm
      marker: qt
      children:
      - type: text
        text: aux sacrifices
    - type: text
      text: ' ╵'
    - type: usfm
      marker: qt
      children:
      - type: text
        text: pour le péché.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: qt
      children:
      - type: text
        text: 'Alors j’ai dit : Voici je viens'
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: qt
      children:
      - type: text
        text: – dans le rouleau du livre,
    - type: text
      text: ' ╵'
    - type: usfm
      marker: qt
      children:
      - type: text
        text: il est question de moi –
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: qt
      children:
      - type: text
        text: pour faire, ô Dieu, ta volonté
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '10.7 '
      - type: usfm
        marker: ft
        children:
        - type: usfm
          marker: ref
          children:
          - type: text
            text: Ps 40.7-9
        - type: text
          text: ' .'
      marker-yv: yv-n
    - type: usfm
      marker: qt
      children:
      - type: text
        text: .
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Il commence ainsi par dire : «  '
    - type: usfm
      marker: qt
      children:
      - type: text
        text: Tu n’as voulu ni sacrifice, ni offrande, ni holocaustes, ni sacrifices pour le péché ; tu n’y as pris nul plaisir
    - type: text
      text: '. » Pourtant, ces sacrifices sont offerts conformément à la Loi. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ensuite il déclare : '
    - type: usfm
      marker: qt
      children:
      - type: text
        text: Voici, je viens pour faire ta volonté
    - type: text
      text: . Ainsi il abolit le premier état des choses pour établir le second.
