document_id: HEB.10,21
type_code: fra
verses:
  '1':
  - type: heading
    content: L’inefficacité de la Loi et l’efficacité du sacrifice de Christ
  - type: text
    content: 'La Loi de Moïse ne possède qu’une ombre des biens à venir et non pas l’image même de ces réalités. Elle ne peut donc en aucun cas amener à la perfection ceux qui s’approchent ainsi de Dieu sur la base des mêmes sacrifices offerts perpétuellement d’année en année. '
  '10':
  - type: text
    content: 'Et c’est en raison de cette '
  - type: text
    content: volonté
  - type: text
    content: ' de Dieu que nous sommes purifiés du péché, grâce au sacrifice de son propre '
  - type: text
    content: corps
  - type: text
    content: ' que Jésus-Christ a offert une fois pour toutes. '
  '11':
  - type: text
    content: 'Tout prêtre se présente chaque jour pour accomplir son service et offrir souvent les mêmes sacrifices qui, cependant, ne peuvent jamais ôter les péchés. '
  '12':
  - type: text
    content: 'Christ, lui, a offert un sacrifice unique pour les péchés, valable pour toujours, et il '
  - type: text
    content: s’est assis à la droite de Dieu
  - type: text
    content: ' '
  '13':
  - type: text
    content: 'où il attend désormais que '
  - type: text
    content: ses ennemis soient mis à terre sous ses pieds
  - type: note
    content: Ps 110.1.
  - type: text
    content: .
  - type: text
    content: ' '
  '14':
  - type: text
    content: 'Par une offrande unique, en effet, il a rendu parfaits pour toujours ceux qu’il purifie du péché. '
  '15':
  - type: text
    content: 'C’est là ce que le Saint-Esprit nous confirme de son côté. Car il dit d’abord :'
  '16':
  - type: text
    content: ' '
  - type: text
    content: Mais voici quelle alliance
  - type: text
    content: ' ╵'
  - type: text
    content: je vais conclure avec eux
  - type: text
    content: 'après ces jours-là, dit le Seigneur :'
  - type: text
    content: je placerai mes lois sur leur cœur
  - type: text
    content: et je les graverai dans leur pensée.
  '17':
  - type: text
    content: 'Puis il ajoute :'
  - type: text
    content: Je ne tiendrai plus compte
  - type: text
    content: ' ╵'
  - type: text
    content: ni de leurs péchés, ni de leurs fautes
  - type: note
    content: Jr 31.33-34.
  - type: text
    content: .
  '18':
  - type: text
    content: Or, lorsque les péchés ont été pardonnés, il n’est plus nécessaire de présenter une offrande pour les ôter.
  - type: heading
    content: Ne pas abandonner son assurance
  '19':
  - type: text
    content: 'Ainsi donc, frères et sœurs, nous avons une pleine liberté pour entrer dans le lieu très saint, grâce au sang du sacrifice de Jésus. '
  '2':
  - type: text
    content: Si elle l’avait pu, ceux qui participent à ce culte auraient depuis longtemps cessé d’offrir ces sacrifices car, purifiés une fois pour toutes, ils n’auraient plus eu la conscience chargée d’aucun péché.
  '20':
  - type: text
    content: Il nous en a ouvert le chemin, un chemin nouveau et vivant à travers le rideau du sanctuaire
  - type: note
    content: C’est-à-dire dans le lieu très saint, dans la présence même de Dieu.
  - type: text
    content: ', c’est-à-dire à travers son propre corps. '
  '21':
  - type: text
    content: 'Ainsi, nous avons un grand-prêtre éminent placé à la tête de la maison de Dieu. '
  '22':
  - type: text
    content: Approchons-nous donc de Dieu avec un cœur sincère, avec la pleine assurance que donne la foi, le cœur purifié de toute mauvaise conscience, et le corps lavé d’une eau pure.
  '23':
  - type: text
    content: 'Restons fermement attachés à l’espérance que nous reconnaissons comme vraie, sans fléchir, car celui qui nous a fait les promesses est fidèle. '
  '24':
  - type: text
    content: Et veillons les uns sur les autres pour nous encourager mutuellement à l’amour et à la pratique du bien.
  '25':
  - type: text
    content: Ne délaissons pas nos réunions, comme certains en ont pris l’habitude. Au contraire, encourageons-nous mutuellement, et cela d’autant plus que vous voyez se rapprocher le jour du Seigneur.
  '26':
  - type: text
    content: 'En effet, si, après avoir reçu la connaissance de la vérité, nous vivons délibérément dans le péché, il ne reste plus pour nous de sacrifice pour les péchés. '
  '27':
  - type: text
    content: La seule perspective est alors l’attente terrifiante du jugement et du feu ardent qui embrasera ceux qui se révoltent contre Dieu.
  '28':
  - type: text
    content: 'Celui qui désobéit à la Loi de Moïse est '
  - type: text
    content: mis à mort
  - type: text
    content: ' sans pitié, '
  - type: text
    content: sur la déposition de deux ou trois témoins
  - type: note
    content: Dt 17.6.
  - type: text
    content: .
  - type: text
    content: ' '
  '29':
  - type: text
    content: A votre avis, si quelqu’un couvre de mépris le Fils de Dieu, s’il considère comme sans valeur le sang de l’alliance, par lequel il a été purifié
  - type: note
    content: 'Autre traduction : par lequel cette alliance a été consacrée.'
  - type: text
    content: ', s’il outrage le Saint-Esprit, qui nous transmet la grâce divine, ne pensez-vous pas qu’il mérite un châtiment plus sévère encore ?'
  '3':
  - type: text
    content: 'Mais, en fait, ces sacrifices rappellent chaque année le souvenir des péchés. '
  '30':
  - type: text
    content: 'Nous connaissons bien celui qui a déclaré : '
  - type: text
    content: C’est à moi qu’il appartient de faire justice ; c’est moi qui rendrai à chacun son dû,
  - type: text
    content: ' et encore : '
  - type: text
    content: Le Seigneur jugera son peuple
  - type: note
    content: Dt 32.35-36.
  - type: text
    content: .
  - type: text
    content: ' '
  '31':
  - type: text
    content: Il est terrible de tomber entre les mains du Dieu vivant !
  '32':
  - type: text
    content: 'Rappelez-vous au contraire les premiers temps où, après avoir été éclairés par Dieu, vous avez enduré les souffrances d’un rude combat. '
  '33':
  - type: text
    content: 'Car tantôt vous avez été exposés publiquement aux injures et aux mauvais traitements, tantôt vous vous êtes rendus solidaires de ceux qui étaient traités de cette manière-là. '
  '34':
  - type: text
    content: Oui, vous avez pris part à la souffrance des prisonniers et vous avez accepté avec joie d’être dépouillés de vos biens, car vous vous saviez en possession de richesses plus précieuses, et qui durent toujours.
  '35':
  - type: text
    content: 'N’abandonnez donc pas votre assurance : une grande récompense lui appartient. '
  '36':
  - type: text
    content: 'Car il vous faut de la persévérance, afin qu’après avoir accompli la volonté de Dieu vous obteniez ce qu’il a promis. '
  '37':
  - type: text
    content: Encore un peu de temps, un tout petit peu de temps
  - type: note
    content: Es 26.20 cité selon l’ancienne version grecque.
  - type: text
    content: ', et'
  - type: text
    content: celui qui doit venir viendra,
  - type: text
    content: ' ╵'
  - type: text
    content: il ne tardera pas.
  '38':
  - type: text
    content: ' '
  - type: text
    content: Celui qui est juste à mes yeux
  - type: text
    content: ' ╵'
  - type: text
    content: vivra par la foi,
  - type: text
    content: mais s’il retourne en arrière,
  - type: text
    content: ' ╵'
  - type: text
    content: je ne prends pas plaisir en lui
  - type: note
    content: Ha 2.3-4 cité selon l’ancienne version grecque.
  - type: text
    content: .
  '39':
  - type: text
    content: 'Quant à nous, nous ne sommes pas de ceux qui '
  - type: text
    content: retournent en arrière
  - type: text
    content: ' pour aller se perdre, mais de ceux qui ont '
  - type: text
    content: la foi
  - type: text
    content: ' pour être sauvés.'
  '4':
  - type: text
    content: 'En effet, il est impossible que du sang de taureaux et de boucs ôte les péchés. '
  '5':
  - type: text
    content: 'Voilà pourquoi, en entrant dans le monde, Christ a dit :'
  - type: text
    content: Tu n’as voulu
  - type: text
    content: ' ╵'
  - type: text
    content: 'ni sacrifice, ni offrande :'
  - type: text
    content: tu m’as formé un corps.
  '6':
  - type: text
    content: ' '
  - type: text
    content: Tu n’as pris nul plaisir
  - type: text
    content: ' ╵'
  - type: text
    content: 'aux '
  - type: text
    content: holocaustes
  - type: note
    content: Voir Lv 1.
  - type: text
    content: ','
  - type: text
    content: ' ╵'
  - type: text
    content: aux sacrifices
  - type: text
    content: ' ╵'
  - type: text
    content: pour le péché.
  '7':
  - type: text
    content: ' '
  - type: text
    content: 'Alors j’ai dit : Voici je viens'
  - type: text
    content: – dans le rouleau du livre,
  - type: text
    content: ' ╵'
  - type: text
    content: il est question de moi –
  - type: text
    content: pour faire, ô Dieu, ta volonté
  - type: text
    content: ' '
  - type: note
    content: Ps 40.7-9 .
  - type: text
    content: .
  '8':
  - type: text
    content: 'Il commence ainsi par dire : «  '
  - type: text
    content: Tu n’as voulu ni sacrifice, ni offrande, ni holocaustes, ni sacrifices pour le péché ; tu n’y as pris nul plaisir
  - type: text
    content: '. » Pourtant, ces sacrifices sont offerts conformément à la Loi. '
  '9':
  - type: text
    content: 'Ensuite il déclare : '
  - type: text
    content: Voici, je viens pour faire ta volonté
  - type: text
    content: . Ainsi il abolit le premier état des choses pour établir le second.
