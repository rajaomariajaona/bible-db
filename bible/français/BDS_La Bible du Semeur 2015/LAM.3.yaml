document_id: LAM.3,21
type_code: fra
verses:
  '1':
  - type: heading
    content: 'Troisième élégie : l’espoir malgré la détresse'
  - type: heading
    content: Profonde détresse du prophète
  - type: text
    content: Moi, je suis l’homme ╵qui a vu l’affliction
  - type: text
    content: sous les coups du bâton ╵de sa colère.
  '10':
  - type: text
    content: Il m’a épié ╵comme un ours aux aguets
  - type: text
    content: ou comme un lion ╵tapi dans sa cachette.
  '11':
  - type: text
    content: Il m’a fait sortir du chemin, ╵il m’a mis en pièces,
  - type: text
    content: et il m’a transformé ╵en une terre dévastée.
  '12':
  - type: text
    content: Il a bandé son arc,
  - type: text
    content: et il m’a pris pour cible.
  '13':
  - type: text
    content: Il m’a percé les reins avec les flèches
  - type: text
    content: tirées de son carquois.
  '14':
  - type: text
    content: Je suis devenu la risée ╵de tout mon peuple
  - type: note
    content: 'Selon le texte hébreu traditionnel. De nombreux manuscrits hébreux et la version syriaque ont : tous les peuples.'
  - type: text
    content: et le sujet de ses chansons, ╵à longueur de journée
  - type: note
    content: Voir Jr 20.7.
  - type: text
    content: .
  '15':
  - type: text
    content: Il m’a gavé d’herbes amères
  - type: text
    content: et il m’a abreuvé d’absinthe.
  '16':
  - type: text
    content: Il m’a brisé les dents ╵sur du gravier ;
  - type: text
    content: il m’a couvert de cendre.
  '17':
  - type: text
    content: Tu m’as banni loin de la paix,
  - type: text
    content: je ne sais plus ╵quel goût a le bonheur.
  '18':
  - type: text
    content: 'Alors j’ai dit : ╵C’en est fini ╵de tout mon avenir'
  - type: note
    content: 'Autre traduction : de ma splendeur.'
  - type: text
    content: '  :'
  - type: text
    content: je n’espère plus rien ╵de l’Eternel.
  - type: heading
    content: L’Eternel est ma part
  '19':
  - type: text
    content: Oh ! souviens-toi ╵de mon humiliation ╵et de ma vie errante,
  - type: text
    content: du poison, de l’absinthe ╵dont je suis abreuvé !
  '2':
  - type: text
    content: Il
  - type: note
    content: C’est-à-dire Dieu que Jérémie ne veut pas nommer (voir v. 18).
  - type: text
    content: ' m’a mené ╵et il m’a fait marcher'
  - type: text
    content: dans des ténèbres ╵sans aucune lumière.
  '20':
  - type: text
    content: Sans cesse, ╵je m’en souviens,
  - type: text
    content: et j’en suis abattu.
  '21':
  - type: text
    content: Mais voici la pensée ╵que je me rappelle à moi-même,
  - type: text
    content: 'la raison pour laquelle ╵j’aurai de l’espérance :'
  '22':
  - type: text
    content: non, les bontés de l’Eternel ╵ne sont pas à leur terme
  - type: text
    content: et ses tendresses ╵ne sont pas épuisées.
  '23':
  - type: text
    content: Chaque matin, ╵elles se renouvellent.
  - type: text
    content: Oui, ta fidélité est grande !
  '24':
  - type: text
    content: 'J’ai dit : L’Eternel est mon bien,'
  - type: text
    content: c’est pourquoi je compte sur lui.
  '25':
  - type: text
    content: L’Eternel est plein de bonté ╵pour ceux qui ont confiance en lui,
  - type: text
    content: pour ceux qui se tournent vers lui.
  '26':
  - type: text
    content: Il est bon d’attendre en silence
  - type: text
    content: la délivrance ╵que l’Eternel opérera.
  '27':
  - type: text
    content: C’est une bonne chose,
  - type: text
    content: pour l’homme, de porter ╵le joug dans sa jeunesse.
  '28':
  - type: text
    content: Qu’il se tienne à l’écart ╵et garde le silence
  - type: text
    content: quand l’Eternel le lui impose !
  '29':
  - type: text
    content: 'Et qu’il s’incline, ╵le visage dans la poussière :'
  - type: text
    content: peut-être y a-t-il un espoir…
  '3':
  - type: text
    content: C’est contre moi ╵qu’à longueur de journée
  - type: text
    content: il tourne et retourne sa main.
  '30':
  - type: text
    content: Qu’il présente la joue ╵à celui qui le frappe
  - type: note
    content: Voir Mt 5.39.
  - type: text
    content: ','
  - type: text
    content: qu’il se rassasie de mépris !
  '31':
  - type: text
    content: Car le Seigneur
  - type: text
    content: ne le rejettera pas pour toujours.
  '32':
  - type: text
    content: Mais s’il afflige, ╵il aura aussi compassion
  - type: text
    content: selon son grand amour.
  '33':
  - type: text
    content: Ce n’est pas par plaisir ╵qu’il humilie
  - type: text
    content: et qu’il afflige les humains.
  '34':
  - type: text
    content: Lorsque l’on foule aux pieds
  - type: text
    content: tous les prisonniers du pays
  - type: note
    content: Comme l’ont fait les Babyloniens à Jérusalem en 587 av. J.-C.
  - type: text
    content: ','
  '35':
  - type: text
    content: lorsque l’on viole ╵le droit d’un homme
  - type: text
    content: sous les yeux mêmes du Très-Haut,
  '36':
  - type: text
    content: et lorsque l’on opprime ╵quelqu’un dans son procès,
  - type: text
    content: le Seigneur ne le voit-il pas ?
  '37':
  - type: text
    content: Qui donc n’a qu’à parler ╵pour qu’une chose soit
  - type: note
    content: Voir Ps 33.9.
  - type: text
    content: ','
  - type: text
    content: quand le Seigneur ╵ne l’a pas ordonné ?
  '38':
  - type: text
    content: Par sa parole, le Très-Haut ╵ne suscite-t-il pas
  - type: text
    content: et le malheur et le bonheur ?
  '39':
  - type: text
    content: Pourquoi l’homme se plaindrait-il ╵alors qu’il reste en vie ?
  - type: text
    content: Que chacun se plaigne de ses péchés
  - type: note
    content: 'Autre traduction : alors qu’il reste en vie malgré ses péchés ?'
  - type: text
    content: .
  - type: heading
    content: Revenons à l’Eternel !
  '4':
  - type: text
    content: Il a usé ma chair, ma peau,
  - type: text
    content: il a brisé mes os.
  '40':
  - type: text
    content: Considérons notre conduite ╵et examinons-la,
  - type: text
    content: puis revenons à l’Eternel.
  '41':
  - type: text
    content: Tournons notre cœur, élevons nos mains
  - type: text
    content: vers Dieu qui est au ciel.
  '42':
  - type: text
    content: Nous, nous avons péché ╵et nous nous sommes révoltés.
  - type: text
    content: 'Tu ne nous as pas pardonné :'
  '43':
  - type: text
    content: tu t’es drapé dans ta colère, ╵tu nous as poursuivis,
  - type: text
    content: tu as massacré sans pitié.
  '44':
  - type: text
    content: Tu t’es couvert d’une nuée
  - type: text
    content: pour que notre prière ╵ne parvienne pas jusqu’à toi.
  '45':
  - type: text
    content: Tu as fait de nous un rebut ╵et un déchet,
  - type: text
    content: parmi les peuples,
  '46':
  - type: text
    content: et tous nos ennemis
  - type: text
    content: ouvrent la bouche contre nous.
  '47':
  - type: text
    content: Nous avons en partage ╵l’effroi, la fosse,
  - type: text
    content: la destruction, la ruine.
  - type: heading
    content: Pleurs et plaintes
  '48':
  - type: text
    content: Je verse des torrents de larmes
  - type: text
    content: à cause du désastre ╵qui a atteint ╵la communauté de mon peuple.
  '49':
  - type: text
    content: Mes yeux pleurent sans cesse,
  - type: text
    content: ils n’ont aucun répit
  '5':
  - type: text
    content: Il a dressé contre moi
  - type: note
    content: Lors des sièges, l’assaillant dressait des terrasses, des sortes de contre-remparts contre les remparts de la ville pour pouvoir y pénétrer.
  - type: text
    content: ' des remparts'
  - type: text
    content: pour m’assiéger d’amertume et de peine.
  '50':
  - type: text
    content: jusqu’à ce qu’enfin l’Eternel,
  - type: text
    content: du haut du ciel, regarde et voie.
  '51':
  - type: text
    content: Je suis bien malheureux
  - type: text
    content: à la vue de ce qui arrive ╵aux filles de ma ville.
  '52':
  - type: text
    content: Ils m’ont donné la chasse ╵comme à un passereau,
  - type: text
    content: ceux qui sans cause sont mes ennemis.
  '53':
  - type: text
    content: Ils m’ont mis dans une citerne ╵dans le but de m’ôter la vie,
  - type: text
    content: ils m’ont jeté des pierres.
  '54':
  - type: text
    content: 'L’eau montait plus haut que ma tête, ╵je me disais : Je suis perdu.'
  '55':
  - type: text
    content: Mais du fond de la fosse,
  - type: text
    content: ô Eternel, ╵j’ai fait appel à toi,
  '56':
  - type: text
    content: et tu m’as entendu.
  - type: text
    content: Ne ferme pas l’oreille ╵à mes soupirs, ╵à mes cris de détresse !
  - type: heading
    content: Dieu répond
  '57':
  - type: text
    content: Au jour où je t’ai invoqué, ╵tu es venu auprès de moi,
  - type: text
    content: 'tu m’as dit : « N’aie pas peur ! »'
  '58':
  - type: text
    content: Seigneur, tu as plaidé ma cause,
  - type: text
    content: tu m’as sauvé la vie.
  '59':
  - type: text
    content: 'Tu as vu, Eternel, ╵les maux dont on m’accable :'
  - type: text
    content: fais-moi justice !
  '6':
  - type: text
    content: Il m’a fait habiter ╵dans des lieux ténébreux
  - type: text
    content: comme ceux qui sont morts ╵depuis longtemps.
  '60':
  - type: text
    content: Tu as été témoin ╵de leur soif de vengeance
  - type: text
    content: et de leurs complots contre moi.
  '61':
  - type: text
    content: Tu entends leurs outrages, ╵ô Eternel,
  - type: text
    content: tu connais les complots ╵qu’ils forgent contre moi,
  '62':
  - type: text
    content: leurs propos, leurs pensées
  - type: text
    content: sont tournés contre moi ╵à longueur de journée.
  '63':
  - type: text
    content: 'Regarde-les : ╵qu’ils s’assoient, qu’ils se lèvent,'
  - type: text
    content: moi, je suis le sujet ╵de leurs chansons.
  '64':
  - type: text
    content: Tu les rétribueras, ╵ô Eternel,
  - type: text
    content: selon ce qu’ils ont fait
  '65':
  - type: text
    content: tu rendras leur cœur obstiné
  - type: text
    content: et tu les frapperas ╵de ta malédiction.
  '66':
  - type: text
    content: Tu les harcèleras ╵dans ta colère ardente, ╵et tu les détruiras
  - type: text
    content: de sous ton ciel, ╵ô Eternel.
  '7':
  - type: text
    content: Il m’a enclos d’un mur ╵afin que je ne sorte pas,
  - type: text
    content: il m’a chargé ╵de lourdes chaînes.
  '8':
  - type: text
    content: J’ai beau crier et implorer,
  - type: text
    content: il n’écoute pas ma prière.
  '9':
  - type: text
    content: Il a barré tous mes chemins ╵avec d’énormes pierres,
  - type: text
    content: il rend ma route impraticable.
