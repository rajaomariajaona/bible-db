document_id: LAM.3
type_code: fra
segments:
- type: usfm
  marker: ms1
  children:
  - type: text
    text: 'Troisième élégie : l’espoir malgré la détresse'
  marker-yv: yv-h
- type: usfm
  marker: s1
  children:
  - type: text
    text: Profonde détresse du prophète
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Moi, je suis l’homme ╵qui a vu l’affliction
- type: usfm
  marker: q1
  children:
  - type: text
    text: sous les coups du bâton ╵de sa colère.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Il
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '3.2 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'C’est-à-dire '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'Dieu '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: que Jérémie ne veut pas nommer (voir v. 18).
    marker-yv: yv-n
  - type: text
    text: ' m’a mené ╵et il m’a fait marcher'
- type: usfm
  marker: q1
  children:
  - type: text
    text: dans des ténèbres ╵sans aucune lumière.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: C’est contre moi ╵qu’à longueur de journée
- type: usfm
  marker: q1
  children:
  - type: text
    text: il tourne et retourne sa main.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Il a usé ma chair, ma peau,
- type: usfm
  marker: q1
  children:
  - type: text
    text: il a brisé mes os.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Il a dressé contre moi
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '3.5 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Lors des sièges, l’assaillant dressait des terrasses, des sortes de contre-remparts contre les remparts de la ville pour pouvoir y pénétrer.
    marker-yv: yv-n
  - type: text
    text: ' des remparts'
- type: usfm
  marker: q1
  children:
  - type: text
    text: pour m’assiéger d’amertume et de peine.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Il m’a fait habiter ╵dans des lieux ténébreux
- type: usfm
  marker: q1
  children:
  - type: text
    text: comme ceux qui sont morts ╵depuis longtemps.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Il m’a enclos d’un mur ╵afin que je ne sorte pas,
- type: usfm
  marker: q1
  children:
  - type: text
    text: il m’a chargé ╵de lourdes chaînes.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: J’ai beau crier et implorer,
- type: usfm
  marker: q1
  children:
  - type: text
    text: il n’écoute pas ma prière.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Il a barré tous mes chemins ╵avec d’énormes pierres,
- type: usfm
  marker: q1
  children:
  - type: text
    text: il rend ma route impraticable.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Il m’a épié ╵comme un ours aux aguets
- type: usfm
  marker: q1
  children:
  - type: text
    text: ou comme un lion ╵tapi dans sa cachette.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Il m’a fait sortir du chemin, ╵il m’a mis en pièces,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et il m’a transformé ╵en une terre dévastée.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Il a bandé son arc,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et il m’a pris pour cible.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Il m’a percé les reins avec les flèches
- type: usfm
  marker: q1
  children:
  - type: text
    text: tirées de son carquois.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Je suis devenu la risée ╵de tout mon peuple
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '3.14 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Selon le texte hébreu traditionnel. De nombreux manuscrits hébreux et la version syriaque ont : '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: tous les peuples.
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: text
    text: et le sujet de ses chansons, ╵à longueur de journée
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '3.14 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Voir '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Jr 20.7
        metadata:
          usfm: JER.20.7
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Il m’a gavé d’herbes amères
- type: usfm
  marker: q1
  children:
  - type: text
    text: et il m’a abreuvé d’absinthe.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Il m’a brisé les dents ╵sur du gravier ;
- type: usfm
  marker: q1
  children:
  - type: text
    text: il m’a couvert de cendre.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Tu m’as banni loin de la paix,
- type: usfm
  marker: q1
  children:
  - type: text
    text: je ne sais plus ╵quel goût a le bonheur.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Alors j’ai dit : ╵C’en est fini ╵de tout mon avenir'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '3.18 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Autre traduction : '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: de ma splendeur.
    marker-yv: yv-n
  - type: text
    text: '  :'
- type: usfm
  marker: q1
  children:
  - type: text
    text: je n’espère plus rien ╵de l’Eternel.
- type: usfm
  marker: s1
  children:
  - type: text
    text: L’Eternel est ma part
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Oh ! souviens-toi ╵de mon humiliation ╵et de ma vie errante,
- type: usfm
  marker: q1
  children:
  - type: text
    text: du poison, de l’absinthe ╵dont je suis abreuvé !
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Sans cesse, ╵je m’en souviens,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et j’en suis abattu.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Mais voici la pensée ╵que je me rappelle à moi-même,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'la raison pour laquelle ╵j’aurai de l’espérance :'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: non, les bontés de l’Eternel ╵ne sont pas à leur terme
- type: usfm
  marker: q1
  children:
  - type: text
    text: et ses tendresses ╵ne sont pas épuisées.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: Chaque matin, ╵elles se renouvellent.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Oui, ta fidélité est grande !
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'J’ai dit : L’Eternel est mon bien,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: c’est pourquoi je compte sur lui.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: L’Eternel est plein de bonté ╵pour ceux qui ont confiance en lui,
- type: usfm
  marker: q1
  children:
  - type: text
    text: pour ceux qui se tournent vers lui.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: Il est bon d’attendre en silence
- type: usfm
  marker: q1
  children:
  - type: text
    text: la délivrance ╵que l’Eternel opérera.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: C’est une bonne chose,
- type: usfm
  marker: q1
  children:
  - type: text
    text: pour l’homme, de porter ╵le joug dans sa jeunesse.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: Qu’il se tienne à l’écart ╵et garde le silence
- type: usfm
  marker: q1
  children:
  - type: text
    text: quand l’Eternel le lui impose !
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'Et qu’il s’incline, ╵le visage dans la poussière :'
- type: usfm
  marker: q1
  children:
  - type: text
    text: peut-être y a-t-il un espoir…
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: Qu’il présente la joue ╵à celui qui le frappe
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '3.30 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Voir '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Mt 5.39
        metadata:
          usfm: MAT.5.39
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: ','
- type: usfm
  marker: q1
  children:
  - type: text
    text: qu’il se rassasie de mépris !
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: Car le Seigneur
- type: usfm
  marker: q1
  children:
  - type: text
    text: ne le rejettera pas pour toujours.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '32'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: Mais s’il afflige, ╵il aura aussi compassion
- type: usfm
  marker: q1
  children:
  - type: text
    text: selon son grand amour.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '33'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: Ce n’est pas par plaisir ╵qu’il humilie
- type: usfm
  marker: q1
  children:
  - type: text
    text: et qu’il afflige les humains.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '34'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: Lorsque l’on foule aux pieds
- type: usfm
  marker: q1
  children:
  - type: text
    text: tous les prisonniers du pays
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '3.34 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Comme l’ont fait les Babyloniens à Jérusalem en 587 av. J.-C.
    marker-yv: yv-n
  - type: text
    text: ','
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '35'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: lorsque l’on viole ╵le droit d’un homme
- type: usfm
  marker: q1
  children:
  - type: text
    text: sous les yeux mêmes du Très-Haut,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '36'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: et lorsque l’on opprime ╵quelqu’un dans son procès,
- type: usfm
  marker: q1
  children:
  - type: text
    text: le Seigneur ne le voit-il pas ?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '37'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: Qui donc n’a qu’à parler ╵pour qu’une chose soit
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '3.37 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Voir '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ps 33.9
        metadata:
          usfm: PSA.33.9
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: ','
- type: usfm
  marker: q1
  children:
  - type: text
    text: quand le Seigneur ╵ne l’a pas ordonné ?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '38'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: text
    text: Par sa parole, le Très-Haut ╵ne suscite-t-il pas
- type: usfm
  marker: q1
  children:
  - type: text
    text: et le malheur et le bonheur ?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '39'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '39'
  - type: text
    text: Pourquoi l’homme se plaindrait-il ╵alors qu’il reste en vie ?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Que chacun se plaigne de ses péchés
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '3.39 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Autre traduction : '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: alors qu’il reste en vie malgré ses péchés ?
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: s1
  children:
  - type: text
    text: Revenons à l’Eternel !
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '40'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '40'
  - type: text
    text: Considérons notre conduite ╵et examinons-la,
- type: usfm
  marker: q1
  children:
  - type: text
    text: puis revenons à l’Eternel.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '41'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '41'
  - type: text
    text: Tournons notre cœur, élevons nos mains
- type: usfm
  marker: q1
  children:
  - type: text
    text: vers Dieu qui est au ciel.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '42'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '42'
  - type: text
    text: Nous, nous avons péché ╵et nous nous sommes révoltés.
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Tu ne nous as pas pardonné :'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '43'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '43'
  - type: text
    text: tu t’es drapé dans ta colère, ╵tu nous as poursuivis,
- type: usfm
  marker: q1
  children:
  - type: text
    text: tu as massacré sans pitié.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '44'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '44'
  - type: text
    text: Tu t’es couvert d’une nuée
- type: usfm
  marker: q1
  children:
  - type: text
    text: pour que notre prière ╵ne parvienne pas jusqu’à toi.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '45'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '45'
  - type: text
    text: Tu as fait de nous un rebut ╵et un déchet,
- type: usfm
  marker: q1
  children:
  - type: text
    text: parmi les peuples,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '46'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '46'
  - type: text
    text: et tous nos ennemis
- type: usfm
  marker: q1
  children:
  - type: text
    text: ouvrent la bouche contre nous.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '47'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '47'
  - type: text
    text: Nous avons en partage ╵l’effroi, la fosse,
- type: usfm
  marker: q1
  children:
  - type: text
    text: la destruction, la ruine.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Pleurs et plaintes
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '48'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '48'
  - type: text
    text: Je verse des torrents de larmes
- type: usfm
  marker: q1
  children:
  - type: text
    text: à cause du désastre ╵qui a atteint ╵la communauté de mon peuple.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '49'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '49'
  - type: text
    text: Mes yeux pleurent sans cesse,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ils n’ont aucun répit
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '50'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '50'
  - type: text
    text: jusqu’à ce qu’enfin l’Eternel,
- type: usfm
  marker: q1
  children:
  - type: text
    text: du haut du ciel, regarde et voie.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '51'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '51'
  - type: text
    text: Je suis bien malheureux
- type: usfm
  marker: q1
  children:
  - type: text
    text: à la vue de ce qui arrive ╵aux filles de ma ville.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '52'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '52'
  - type: text
    text: Ils m’ont donné la chasse ╵comme à un passereau,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ceux qui sans cause sont mes ennemis.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '53'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '53'
  - type: text
    text: Ils m’ont mis dans une citerne ╵dans le but de m’ôter la vie,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ils m’ont jeté des pierres.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '54'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '54'
  - type: text
    text: 'L’eau montait plus haut que ma tête, ╵je me disais : Je suis perdu.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '55'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '55'
  - type: text
    text: Mais du fond de la fosse,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ô Eternel, ╵j’ai fait appel à toi,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '56'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '56'
  - type: text
    text: et tu m’as entendu.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ne ferme pas l’oreille ╵à mes soupirs, ╵à mes cris de détresse !
- type: usfm
  marker: s1
  children:
  - type: text
    text: Dieu répond
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '57'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '57'
  - type: text
    text: Au jour où je t’ai invoqué, ╵tu es venu auprès de moi,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'tu m’as dit : « N’aie pas peur ! »'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '58'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '58'
  - type: text
    text: Seigneur, tu as plaidé ma cause,
- type: usfm
  marker: q1
  children:
  - type: text
    text: tu m’as sauvé la vie.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '59'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '59'
  - type: text
    text: 'Tu as vu, Eternel, ╵les maux dont on m’accable :'
- type: usfm
  marker: q1
  children:
  - type: text
    text: fais-moi justice !
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '60'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '60'
  - type: text
    text: Tu as été témoin ╵de leur soif de vengeance
- type: usfm
  marker: q1
  children:
  - type: text
    text: et de leurs complots contre moi.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '61'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '61'
  - type: text
    text: Tu entends leurs outrages, ╵ô Eternel,
- type: usfm
  marker: q1
  children:
  - type: text
    text: tu connais les complots ╵qu’ils forgent contre moi,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '62'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '62'
  - type: text
    text: leurs propos, leurs pensées
- type: usfm
  marker: q1
  children:
  - type: text
    text: sont tournés contre moi ╵à longueur de journée.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '63'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '63'
  - type: text
    text: 'Regarde-les : ╵qu’ils s’assoient, qu’ils se lèvent,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: moi, je suis le sujet ╵de leurs chansons.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '64'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '64'
  - type: text
    text: Tu les rétribueras, ╵ô Eternel,
- type: usfm
  marker: q1
  children:
  - type: text
    text: selon ce qu’ils ont fait
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '65'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '65'
  - type: text
    text: tu rendras leur cœur obstiné
- type: usfm
  marker: q1
  children:
  - type: text
    text: et tu les frapperas ╵de ta malédiction.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '66'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '66'
  - type: text
    text: Tu les harcèleras ╵dans ta colère ardente, ╵et tu les détruiras
- type: usfm
  marker: q1
  children:
  - type: text
    text: de sous ton ciel, ╵ô Eternel.
