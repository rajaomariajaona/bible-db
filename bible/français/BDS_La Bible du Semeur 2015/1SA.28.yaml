document_id: 1SA.28
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Les Philistins se mettent en campagne contre Israël
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'A cette époque-là, les Philistins rassemblèrent toutes leurs troupes en une seule armée pour faire la guerre à Israël. Le roi Akish dit à David : Tu dois savoir que toi et tes hommes, vous partirez en guerre avec moi.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'David lui répondit : Eh bien, tu verras ce que ton serviteur va faire.'
- type: usfm
  marker: p
  children:
  - type: text
    text: – Bien, reprit Akish, je te nomme mon garde de corps à titre définitif.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Saül chez une femme qui interroge les morts
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Entre-temps, Samuel était mort et tout Israël avait pris le deuil à cause de lui. On l’avait enterré à Rama, dans sa ville. D’autre part, Saül avait fait disparaître du pays tous ceux qui évoquaient les morts et ceux qui pratiquaient la divination
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '28.3 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Voir '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Lv 19.31
        metadata:
          usfm: LEV.19.31
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Les Philistins regroupèrent leurs troupes et établirent leur camp à Sunem
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '28.4 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Sur le territoire d’Issacar, en Galilée à quelque 80 kilomètres au nord de Jérusalem.
    marker-yv: yv-n
  - type: text
    text: '  ; Saül mobilisa tout Israël et dressa son camp à Guilboa. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Lorsque Saül vit le camp des Philistins, il eut grand-peur et son cœur fut saisi d’angoisse. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Il voulut consulter l’Eternel, mais l’Eternel ne lui répondit ni par des rêves, ni par l’ourim
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '28.6 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Voir '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ex 28.30
        metadata:
          usfm: EXO.28.30
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: ', ni par les prophètes.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Alors il ordonna à ses fonctionnaires : Recherchez-moi une femme capable d’interroger les morts, afin que je puisse aller chez elle pour la consulter.'
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Ses serviteurs lui dirent : Il reste encore à Eyn-Dor'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '28.7 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: A une douzaine de kilomètres de Guilboa (v. 4).
    marker-yv: yv-n
  - type: text
    text: ' une femme qui interroge les morts.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Saül se déguisa en endossant d’autres vêtements, puis il se mit en route avec deux hommes. Ils arrivèrent de nuit chez la femme, et Saül lui dit : Je désire que tu me prédises l’avenir en faisant apparaître l’esprit d’un mort, celui que je te désignerai.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'La femme lui répondit : Tu sais bien que Saül a fait disparaître du pays ceux qui évoquent les morts et ceux qui pratiquent la divination. Pourquoi donc me tends-tu un piège ? Est-ce que tu veux ma mort ?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Saül prêta serment par l’Eternel : Aussi vrai que l’Eternel est vivant, dit-il, il ne t’arrivera aucun mal pour cette affaire.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Alors la femme lui demanda : Qui dois-je faire revenir pour toi ?'
- type: usfm
  marker: p
  children:
  - type: text
    text: – Fais-moi revenir Samuel, dit-il.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Quand la femme vit Samuel, elle poussa un grand cri, puis, s’adressant à Saül, elle dit : Pourquoi m’as-tu trompée ? Tu es Saül !'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: – N’aie pas peur, lui dit le roi. Dis-moi plutôt ce que tu as vu.
- type: usfm
  marker: p
  children:
  - type: text
    text: – Je vois un être surnaturel qui monte des profondeurs de la terre, lui répondit-elle.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: – Quel est son aspect ? lui demanda Saül.
- type: usfm
  marker: p
  children:
  - type: text
    text: – C’est un vieillard qui revient, drapé dans un manteau.
- type: usfm
  marker: p
  children:
  - type: text
    text: Alors Saül comprit que c’était Samuel et il s’inclina, la face contre terre, et se prosterna.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: – Pourquoi troubles-tu mon repos ? lui demanda Samuel. Pourquoi m’as-tu fait revenir ?
- type: usfm
  marker: p
  children:
  - type: text
    text: – Je suis dans une grande détresse, lui dit Saül. Les Philistins m’ont déclaré la guerre et Dieu s’est détourné de moi, il ne me répond plus ni par les prophètes ni par des rêves. Alors je t’ai fait appeler pour que tu m’indiques ce que je dois faire.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: '– Et pourquoi donc me consultes-tu, reprit Samuel, si l’Eternel s’est détourné de toi et s’il t’est devenu hostile ? '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Oui, l’Eternel exécute ce qu’il t’a déclaré par mon intermédiaire, il t’a arraché la royauté et l’a donnée à l’un de tes proches, à David, '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: parce que tu n’as pas obéi à ses ordres et que tu n’as pas exécuté le jugement qu’il avait décidé dans sa colère contre les Amalécites. Voilà pourquoi l’Eternel agit ainsi envers toi aujourd’hui
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '28.18 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Voir '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1 S 15
        metadata:
          usfm: 1SA.15
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Bien plus : avec toi, l’Eternel livrera aussi Israël au pouvoir des Philistins. Demain, toi et tes fils, vous serez avec moi. Oui, c’est bien toute l’armée d’Israël que le Seigneur livre au pouvoir des Philistins.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: A ces mots, Saül s’affala de tout son long sur le sol, épouvanté par les paroles de Samuel. De plus, comme il n’avait rien mangé depuis la veille, il était sans forces.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'La femme s’approcha de lui, vit qu’il était terrifié et lui dit : Voici que ta servante a obéi à tes ordres. J’ai risqué ma vie pour faire ce que tu m’as demandé. '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Maintenant, je te prie, écoute aussi la voix de ta servante : Laisse-moi te servir un morceau de pain. Mange, afin que tu aies des forces pour reprendre ta route.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Saül refusa en disant : « Je ne mangerai pas », mais ses hauts fonctionnaires et la femme insistèrent, si bien qu’il finit par céder à leurs instances. Il se releva et s’assit sur le lit. '
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'La femme avait chez elle un veau à l’engrais. Elle se hâta de l’abattre, prit de la farine et la pétrit pour en cuire des pains sans levain. '
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: Elle servit ce repas à Saül et à ses hauts fonctionnaires ; ils mangèrent, puis ils se mirent en route et repartirent pendant qu’il faisait encore nuit.
