document_id: 1SA.28,21
type_code: fra
verses:
  '1':
  - type: heading
    content: Les Philistins se mettent en campagne contre Israël
  - type: text
    content: 'A cette époque-là, les Philistins rassemblèrent toutes leurs troupes en une seule armée pour faire la guerre à Israël. Le roi Akish dit à David : Tu dois savoir que toi et tes hommes, vous partirez en guerre avec moi.'
  '10':
  - type: text
    content: 'Saül prêta serment par l’Eternel : Aussi vrai que l’Eternel est vivant, dit-il, il ne t’arrivera aucun mal pour cette affaire.'
  '11':
  - type: text
    content: 'Alors la femme lui demanda : Qui dois-je faire revenir pour toi ?'
  - type: text
    content: – Fais-moi revenir Samuel, dit-il.
  '12':
  - type: text
    content: 'Quand la femme vit Samuel, elle poussa un grand cri, puis, s’adressant à Saül, elle dit : Pourquoi m’as-tu trompée ? Tu es Saül !'
  '13':
  - type: text
    content: – N’aie pas peur, lui dit le roi. Dis-moi plutôt ce que tu as vu.
  - type: text
    content: – Je vois un être surnaturel qui monte des profondeurs de la terre, lui répondit-elle.
  '14':
  - type: text
    content: – Quel est son aspect ? lui demanda Saül.
  - type: text
    content: – C’est un vieillard qui revient, drapé dans un manteau.
  - type: text
    content: Alors Saül comprit que c’était Samuel et il s’inclina, la face contre terre, et se prosterna.
  '15':
  - type: text
    content: – Pourquoi troubles-tu mon repos ? lui demanda Samuel. Pourquoi m’as-tu fait revenir ?
  - type: text
    content: – Je suis dans une grande détresse, lui dit Saül. Les Philistins m’ont déclaré la guerre et Dieu s’est détourné de moi, il ne me répond plus ni par les prophètes ni par des rêves. Alors je t’ai fait appeler pour que tu m’indiques ce que je dois faire.
  '16':
  - type: text
    content: '– Et pourquoi donc me consultes-tu, reprit Samuel, si l’Eternel s’est détourné de toi et s’il t’est devenu hostile ? '
  '17':
  - type: text
    content: 'Oui, l’Eternel exécute ce qu’il t’a déclaré par mon intermédiaire, il t’a arraché la royauté et l’a donnée à l’un de tes proches, à David, '
  '18':
  - type: text
    content: parce que tu n’as pas obéi à ses ordres et que tu n’as pas exécuté le jugement qu’il avait décidé dans sa colère contre les Amalécites. Voilà pourquoi l’Eternel agit ainsi envers toi aujourd’hui
  - type: note
    content: Voir 1 S 15.
  - type: text
    content: '. '
  '19':
  - type: text
    content: 'Bien plus : avec toi, l’Eternel livrera aussi Israël au pouvoir des Philistins. Demain, toi et tes fils, vous serez avec moi. Oui, c’est bien toute l’armée d’Israël que le Seigneur livre au pouvoir des Philistins.'
  '2':
  - type: text
    content: 'David lui répondit : Eh bien, tu verras ce que ton serviteur va faire.'
  - type: text
    content: – Bien, reprit Akish, je te nomme mon garde de corps à titre définitif.
  - type: heading
    content: Saül chez une femme qui interroge les morts
  '20':
  - type: text
    content: A ces mots, Saül s’affala de tout son long sur le sol, épouvanté par les paroles de Samuel. De plus, comme il n’avait rien mangé depuis la veille, il était sans forces.
  '21':
  - type: text
    content: 'La femme s’approcha de lui, vit qu’il était terrifié et lui dit : Voici que ta servante a obéi à tes ordres. J’ai risqué ma vie pour faire ce que tu m’as demandé. '
  '22':
  - type: text
    content: 'Maintenant, je te prie, écoute aussi la voix de ta servante : Laisse-moi te servir un morceau de pain. Mange, afin que tu aies des forces pour reprendre ta route.'
  '23':
  - type: text
    content: 'Saül refusa en disant : « Je ne mangerai pas », mais ses hauts fonctionnaires et la femme insistèrent, si bien qu’il finit par céder à leurs instances. Il se releva et s’assit sur le lit. '
  '24':
  - type: text
    content: 'La femme avait chez elle un veau à l’engrais. Elle se hâta de l’abattre, prit de la farine et la pétrit pour en cuire des pains sans levain. '
  '25':
  - type: text
    content: Elle servit ce repas à Saül et à ses hauts fonctionnaires ; ils mangèrent, puis ils se mirent en route et repartirent pendant qu’il faisait encore nuit.
  '3':
  - type: text
    content: Entre-temps, Samuel était mort et tout Israël avait pris le deuil à cause de lui. On l’avait enterré à Rama, dans sa ville. D’autre part, Saül avait fait disparaître du pays tous ceux qui évoquaient les morts et ceux qui pratiquaient la divination
  - type: note
    content: Voir Lv 19.31.
  - type: text
    content: .
  '4':
  - type: text
    content: Les Philistins regroupèrent leurs troupes et établirent leur camp à Sunem
  - type: note
    content: Sur le territoire d’Issacar, en Galilée à quelque 80 kilomètres au nord de Jérusalem.
  - type: text
    content: '  ; Saül mobilisa tout Israël et dressa son camp à Guilboa. '
  '5':
  - type: text
    content: 'Lorsque Saül vit le camp des Philistins, il eut grand-peur et son cœur fut saisi d’angoisse. '
  '6':
  - type: text
    content: Il voulut consulter l’Eternel, mais l’Eternel ne lui répondit ni par des rêves, ni par l’ourim
  - type: note
    content: Voir Ex 28.30.
  - type: text
    content: ', ni par les prophètes.'
  '7':
  - type: text
    content: 'Alors il ordonna à ses fonctionnaires : Recherchez-moi une femme capable d’interroger les morts, afin que je puisse aller chez elle pour la consulter.'
  - type: text
    content: 'Ses serviteurs lui dirent : Il reste encore à Eyn-Dor'
  - type: note
    content: A une douzaine de kilomètres de Guilboa (v. 4).
  - type: text
    content: ' une femme qui interroge les morts.'
  '8':
  - type: text
    content: 'Saül se déguisa en endossant d’autres vêtements, puis il se mit en route avec deux hommes. Ils arrivèrent de nuit chez la femme, et Saül lui dit : Je désire que tu me prédises l’avenir en faisant apparaître l’esprit d’un mort, celui que je te désignerai.'
  '9':
  - type: text
    content: 'La femme lui répondit : Tu sais bien que Saül a fait disparaître du pays ceux qui évoquent les morts et ceux qui pratiquent la divination. Pourquoi donc me tends-tu un piège ? Est-ce que tu veux ma mort ?'
