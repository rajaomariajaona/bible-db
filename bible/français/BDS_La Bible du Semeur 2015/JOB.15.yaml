document_id: JOB.15,21
type_code: fra
verses:
  '1':
  - type: heading
    content: Deuxième discours d’Éliphaz
  - type: heading
    content: Les méchants sont punis
  - type: text
    content: 'Eliphaz de Témân prit la parole et dit :'
  '10':
  - type: text
    content: Il y a aussi parmi nous ╵des anciens, des vieillards
  - type: text
    content: plus âgés que ton père !
  '11':
  - type: text
    content: Tiens-tu pour peu de chose ╵le réconfort que Dieu t’apporte
  - type: text
    content: et les paroles modérées ╵qui te sont adressées ?
  '12':
  - type: text
    content: Où t’emporte ton cœur ?
  - type: text
    content: A quoi font allusion ╵ces clignements des yeux ?
  '13':
  - type: text
    content: Comment peux-tu oser ╵t’irriter contre Dieu,
  - type: text
    content: et laisser échapper ╵tous ces propos ?
  '14':
  - type: text
    content: Comment un être humain ╵pourrait-il être pur ?
  - type: text
    content: Et comment l’être ╵né d’une femme ╵pourrait-il être juste ?
  '15':
  - type: text
    content: Or, même à ses saints anges
  - type: note
    content: Voir 5.1 et note.
  - type: text
    content: ' ╵Dieu ne fait pas confiance,'
  - type: text
    content: le ciel n’est pas pur à ses yeux.
  '16':
  - type: text
    content: Combien moins l’être détestable, ╵cet homme corrompu
  - type: text
    content: qui commet l’injustice ╵comme il boirait de l’eau !
  '17':
  - type: text
    content: 'Je vais t’instruire : écoute-moi !'
  - type: text
    content: Je vais te raconter ╵ce que j’ai découvert,
  '18':
  - type: text
    content: l’enseignement des sages ╵qu’ils tenaient de leurs pères
  - type: text
    content: qu’ils ont transmis sans rien cacher.
  '19':
  - type: text
    content: A eux seuls, le pays ╵avait été donné,
  - type: text
    content: et aucun étranger ╵n’était encore passé parmi eux.
  '2':
  - type: text
    content: Est-il digne d’un sage ╵de répliquer par un savoir ╵qui n’est rien que du vent,
  - type: text
    content: de se remplir le ventre ╵d’un sirocco aride
  - type: note
    content: Vent brûlant venant du désert (27.21 ; 38.24 ; Gn 41.6 ; Jr 4.11) qui n’apporte ni rafraîchissement ni pluie fertilisante mais brûle tout sur son passage.
  - type: text
    content: '  ?'
  '20':
  - type: text
    content: Tous les jours de sa vie, ╵le méchant connaît le tourment,
  - type: text
    content: tout au long des années ╵réservées au tyran.
  '21':
  - type: text
    content: Un bruit plein d’épouvante ╵résonne à ses oreilles
  - type: text
    content: et même en temps de paix ╵un destructeur fondra sur lui.
  '22':
  - type: text
    content: Il ne peut espérer ╵revenir des ténèbres,
  - type: text
    content: et le glaive le guette.
  '23':
  - type: text
    content: 'Il erre çà et là : ╵où donc trouver du pain ?'
  - type: text
    content: Il sait que des jours sombres ╵se préparent pour lui.
  '24':
  - type: text
    content: Le tourment et l’angoisse ╵le jetteront dans l’épouvante
  - type: text
    content: et se rueront sur lui ╵comme un roi préparé ╵à marcher au combat,
  '25':
  - type: text
    content: parce que, contre Dieu ╵il a levé le poing,
  - type: text
    content: et qu’il s’est élevé ╵contre le Tout-Puissant.
  '26':
  - type: text
    content: Il a foncé sur lui ╵tête baissée
  - type: text
    content: en s’abritant derrière ╵un épais bouclier.
  '27':
  - type: text
    content: Son visage est bouffi de graisse,
  - type: text
    content: ses flancs lourds d’embonpoint.
  '28':
  - type: text
    content: Mais il aura pour domicile ╵des villes dévastées,
  - type: text
    content: dans des maisons inhabitées,
  - type: text
    content: tombant en ruine.
  '29':
  - type: text
    content: Il ne pourra pas s’enrichir, ╵sa fortune ne tiendra pas,
  - type: text
    content: et sa prospérité ╵ne s’étalera plus sur terre.
  '3':
  - type: text
    content: Va-t-il argumenter ╵à coups de mots futiles,
  - type: text
    content: avec de longs discours ╵qui ne servent à rien ?
  '30':
  - type: text
    content: Il ne pourra ╵échapper aux ténèbres.
  - type: text
    content: La flamme rendra secs ╵tous ses rameaux
  - type: note
    content: Le méchant est comparé à un arbre.
  - type: text
    content: ','
  - type: text
    content: et il sera chassé ╵par le souffle de Dieu
  - type: note
    content: 'Autre traduction : et il fuira sa propre haleine.'
  - type: text
    content: .
  '31':
  - type: text
    content: C’est dans la fausseté ╵qu’il a mis sa confiance.
  - type: text
    content: Mais il se trompe, ╵car il récoltera ╵la fausseté.
  '32':
  - type: text
    content: Avant que son jour vienne ╵cela s’accomplira,
  - type: text
    content: et, jamais, sa ramure ╵ne reverdira plus.
  '33':
  - type: text
    content: Il est comme une vigne ╵qui laisserait tomber ╵ses raisins encore verts,
  - type: text
    content: ou comme un olivier ╵perdant ses fleurs.
  '34':
  - type: text
    content: Car la famille de l’impie ╵demeurera stérile ;
  - type: text
    content: les maisons qui abritent ╵la corruption ╵seront la proie des flammes.
  '35':
  - type: text
    content: Car qui conçoit le mal ╵enfante le malheur
  - type: text
    content: et au fond de son cœur ╵mûrit la tromperie.
  '4':
  - type: text
    content: Voilà que toi, ╵tu réduis à néant ╵la crainte due à Dieu,
  - type: text
    content: et tu rends inutile ╵toute réflexion devant Dieu.
  '5':
  - type: text
    content: C’est ton iniquité ╵qui inspire ta bouche,
  - type: text
    content: et tu as adopté ╵la langue des rusés.
  '6':
  - type: text
    content: C’est donc ta propre bouche ╵qui te condamnera, ╵ce ne sera pas moi.
  - type: text
    content: Ce sont tes propres lèvres ╵qui déposeront contre toi.
  '7':
  - type: text
    content: Es-tu le premier homme ╵qui soit né ici-bas ?
  - type: text
    content: Aurais-tu vu le jour ╵bien avant les collines ?
  '8':
  - type: text
    content: Aurais-tu entendu ╵ce qui s’est dit ╵dans le conseil de Dieu ?
  - type: text
    content: Aurais-tu confisqué ╵pour toi seul la sagesse ?
  '9':
  - type: text
    content: En fait, que sais-tu donc ╵que nous ne sachions pas ?
  - type: text
    content: Qu’as-tu bien pu comprendre ╵qui nous ait échappé ?
