document_id: JOB.15,21
type_code: fra
verses:
  '1':
  - type: usfm
    marker: ms1
    children:
    - type: text
      text: Deuxième discours d’Éliphaz
    marker-yv: yv-h
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Les méchants sont punis
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Eliphaz de Témân prit la parole et dit :'
  '10':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: Il y a aussi parmi nous ╵des anciens, des vieillards
  - type: usfm
    marker: q1
    children:
    - type: text
      text: plus âgés que ton père !
  '11':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: Tiens-tu pour peu de chose ╵le réconfort que Dieu t’apporte
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et les paroles modérées ╵qui te sont adressées ?
  '12':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: Où t’emporte ton cœur ?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: A quoi font allusion ╵ces clignements des yeux ?
  '13':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: Comment peux-tu oser ╵t’irriter contre Dieu,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et laisser échapper ╵tous ces propos ?
  '14':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: Comment un être humain ╵pourrait-il être pur ?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et comment l’être ╵né d’une femme ╵pourrait-il être juste ?
  '15':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: Or, même à ses saints anges
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '15.15 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Voir '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: '5.1'
        - type: text
          text: ' et note.'
      marker-yv: yv-n
    - type: text
      text: ' ╵Dieu ne fait pas confiance,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: le ciel n’est pas pur à ses yeux.
  '16':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: Combien moins l’être détestable, ╵cet homme corrompu
  - type: usfm
    marker: q1
    children:
    - type: text
      text: qui commet l’injustice ╵comme il boirait de l’eau !
  '17':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'Je vais t’instruire : écoute-moi !'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Je vais te raconter ╵ce que j’ai découvert,
  '18':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: l’enseignement des sages ╵qu’ils tenaient de leurs pères
  - type: usfm
    marker: q1
    children:
    - type: text
      text: qu’ils ont transmis sans rien cacher.
  '19':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: A eux seuls, le pays ╵avait été donné,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et aucun étranger ╵n’était encore passé parmi eux.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: Est-il digne d’un sage ╵de répliquer par un savoir ╵qui n’est rien que du vent,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: de se remplir le ventre ╵d’un sirocco aride
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '15.2 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Vent brûlant venant du désert (27.21 ; 38.24 ; Gn 41.6 ; Jr 4.11) qui n’apporte ni rafraîchissement ni pluie fertilisante mais brûle tout sur son passage.
      marker-yv: yv-n
    - type: text
      text: '  ?'
  '20':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: Tous les jours de sa vie, ╵le méchant connaît le tourment,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: tout au long des années ╵réservées au tyran.
  '21':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: Un bruit plein d’épouvante ╵résonne à ses oreilles
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et même en temps de paix ╵un destructeur fondra sur lui.
  '22':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: Il ne peut espérer ╵revenir des ténèbres,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et le glaive le guette.
  '23':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: 'Il erre çà et là : ╵où donc trouver du pain ?'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Il sait que des jours sombres ╵se préparent pour lui.
  '24':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: Le tourment et l’angoisse ╵le jetteront dans l’épouvante
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et se rueront sur lui ╵comme un roi préparé ╵à marcher au combat,
  '25':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: parce que, contre Dieu ╵il a levé le poing,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et qu’il s’est élevé ╵contre le Tout-Puissant.
  '26':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: Il a foncé sur lui ╵tête baissée
  - type: usfm
    marker: q1
    children:
    - type: text
      text: en s’abritant derrière ╵un épais bouclier.
  '27':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: Son visage est bouffi de graisse,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ses flancs lourds d’embonpoint.
  '28':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: Mais il aura pour domicile ╵des villes dévastées,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dans des maisons inhabitées,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: tombant en ruine.
  '29':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: Il ne pourra pas s’enrichir, ╵sa fortune ne tiendra pas,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et sa prospérité ╵ne s’étalera plus sur terre.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: Va-t-il argumenter ╵à coups de mots futiles,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: avec de longs discours ╵qui ne servent à rien ?
  '30':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '30'
    - type: text
      text: Il ne pourra ╵échapper aux ténèbres.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: La flamme rendra secs ╵tous ses rameaux
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '15.30 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Le méchant est comparé à un arbre.
      marker-yv: yv-n
    - type: text
      text: ','
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et il sera chassé ╵par le souffle de Dieu
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '15.30 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Autre traduction : '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: et il fuira sa propre haleine.
      marker-yv: yv-n
    - type: text
      text: .
  '31':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '31'
    - type: text
      text: C’est dans la fausseté ╵qu’il a mis sa confiance.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mais il se trompe, ╵car il récoltera ╵la fausseté.
  '32':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '32'
    - type: text
      text: Avant que son jour vienne ╵cela s’accomplira,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et, jamais, sa ramure ╵ne reverdira plus.
  '33':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '33'
    - type: text
      text: Il est comme une vigne ╵qui laisserait tomber ╵ses raisins encore verts,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ou comme un olivier ╵perdant ses fleurs.
  '34':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '34'
    - type: text
      text: Car la famille de l’impie ╵demeurera stérile ;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: les maisons qui abritent ╵la corruption ╵seront la proie des flammes.
  '35':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '35'
    - type: text
      text: Car qui conçoit le mal ╵enfante le malheur
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et au fond de son cœur ╵mûrit la tromperie.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: Voilà que toi, ╵tu réduis à néant ╵la crainte due à Dieu,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et tu rends inutile ╵toute réflexion devant Dieu.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: C’est ton iniquité ╵qui inspire ta bouche,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et tu as adopté ╵la langue des rusés.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: C’est donc ta propre bouche ╵qui te condamnera, ╵ce ne sera pas moi.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ce sont tes propres lèvres ╵qui déposeront contre toi.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: Es-tu le premier homme ╵qui soit né ici-bas ?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Aurais-tu vu le jour ╵bien avant les collines ?
  '8':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: Aurais-tu entendu ╵ce qui s’est dit ╵dans le conseil de Dieu ?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Aurais-tu confisqué ╵pour toi seul la sagesse ?
  '9':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: En fait, que sais-tu donc ╵que nous ne sachions pas ?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Qu’as-tu bien pu comprendre ╵qui nous ait échappé ?
