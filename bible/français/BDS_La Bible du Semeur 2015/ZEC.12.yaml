document_id: ZEC.12,21
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: La victoire finale du Roi
    marker-yv: yv-h
  - type: usfm
    marker: s2
    children:
    - type: text
      text: Dieu défend Jérusalem
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: Proclamation.
  - type: usfm
    marker: p
    children:
    - type: text
      text: Déclaration de l’Eternel au sujet d’Israël.
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'L’Eternel dit ceci, lui qui a étendu le ciel et posé les fondements de la terre, qui a formé l’esprit humain dans l’homme :'
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Je répandrai alors sur la famille de David et sur ceux qui habitent Jérusalem un Esprit
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '12.10 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Autre traduction : '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: esprit.
      marker-yv: yv-n
    - type: text
      text: ' de grâce et de supplication. Alors ils tourneront leurs regards vers moi, celui qu’ils auront transpercé'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '12.10 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Cité en Jn 19.37 ; Ap 1.7.
      marker-yv: yv-n
    - type: text
      text: '. Ils porteront le deuil pour lui comme on porte le deuil pour un fils unique ; ils pleureront sur lui tout comme on pleure amèrement pour son fils premier-né. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: En ce jour-là, il y aura un très grand deuil dans tout Jérusalem, comme le deuil d’Hadadrimmôn dans la vallée de Meguiddo
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '12.11 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Hadadrimmôn
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: ': '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'soit un site de la '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'vallée de Meguiddo '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: où le peuple de Juda a pleuré la mort du roi Josias (
        - type: usfm
          marker: ref
          children:
          - type: text
            text: 2 Ch 35.20-27
        - type: text
          text: '), soit la divinité phénicienne (voir '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: 2 R 5.18
        - type: text
          text: ) de la végétation dont on disait qu’elle mourait à la fin des récoltes pour renaître au retour des pluies.
      marker-yv: yv-n
    - type: text
      text: '. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Le pays tout entier célébrera ce deuil, chaque famille à part, la famille de David à part, et ses femmes à part, la famille de Nathan à part, et ses femmes à part, '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'la famille de Lévi à part, et ses femmes à part, la famille de Shimeï à part, et ses femmes à part, '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: et toutes les autres familles, chacune à part, et les femmes à part.
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: De Jérusalem je vais faire une coupe enivrante pour tous les peuples qui l’entourent. Il en sera de même pour Juda
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '12.2 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'L’ancienne version grecque, la Vulgate et le targoum ont : '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: Juda sera avec eux.
      marker-yv: yv-n
    - type: text
      text: ' quand on assiégera Jérusalem. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Voici : en ce jour-là, je ferai de Jérusalem une très lourde pierre pour tous les autres peuples et quiconque essaiera de la lever de terre en sera tout meurtri. Tous les peuples du monde uniront leurs efforts pour la combattre. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: En ce jour-là – l’Eternel le déclare – je frapperai les chevaux d’épouvante et leurs cavaliers de folie.
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Mais sur le peuple de Juda, je veillerai, alors que je rendrai aveugles tous les chevaux des autres peuples. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Et les chefs de Juda reconnaîtront alors que, pour Jérusalem et pour ceux qui l’habitent, la force est en leur Dieu, le Seigneur des armées célestes
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '12.5 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Autre traduction : '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'Les chefs de Juda se diront : Les habitants de Jérusalem sont notre force, grâce au Seigneur des armées célestes, leur Dieu.'
      marker-yv: yv-n
    - type: text
      text: '. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'En ce jour-là, je ferai des chefs de Juda un foyer d’incendie dans un tas de bois, une torche enflammée dans un grand tas de foin, et ils consumeront à leur droite et à leur gauche les peuples d’alentour. Et Jérusalem restera installée à sa place. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'En premier lieu, l’Eternel sauvera la population de Juda pour que la famille de David et tous ceux qui habitent Jérusalem ne soient pas orgueilleux et ne s’exaltent pas au-dessus de Juda. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'En ce jour-là, l’Eternel défendra la population de Jérusalem. Le plus chancelant d’entre eux sera en ce jour-là comme David, et la dynastie de David sera comme Dieu même, comme l’ange de l’Eternel. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Alors, en ce jour-là, j’entreprendrai de détruire toute nation qui viendra pour combattre contre Jérusalem.
  - type: usfm
    marker: s2
    children:
    - type: text
      text: Deuil et purification
    marker-yv: yv-h
