document_id: ZEC.12,21
type_code: fra
verses:
  '1':
  - type: heading
    content: La victoire finale du Roi
  - type: heading
    content: Dieu défend Jérusalem
  - type: text
    content: Proclamation.
  - type: text
    content: Déclaration de l’Eternel au sujet d’Israël.
  - type: text
    content: 'L’Eternel dit ceci, lui qui a étendu le ciel et posé les fondements de la terre, qui a formé l’esprit humain dans l’homme :'
  '10':
  - type: text
    content: Je répandrai alors sur la famille de David et sur ceux qui habitent Jérusalem un Esprit
  - type: note
    content: 'Autre traduction : esprit.'
  - type: text
    content: ' de grâce et de supplication. Alors ils tourneront leurs regards vers moi, celui qu’ils auront transpercé'
  - type: note
    content: Cité en Jn 19.37 ; Ap 1.7.
  - type: text
    content: '. Ils porteront le deuil pour lui comme on porte le deuil pour un fils unique ; ils pleureront sur lui tout comme on pleure amèrement pour son fils premier-né. '
  '11':
  - type: text
    content: En ce jour-là, il y aura un très grand deuil dans tout Jérusalem, comme le deuil d’Hadadrimmôn dans la vallée de Meguiddo
  - type: note
    content: 'Hadadrimmôn: soit un site de la vallée de Meguiddo où le peuple de Juda a pleuré la mort du roi Josias (2 Ch 35.20-27), soit la divinité phénicienne (voir 2 R 5.18) de la végétation dont on disait qu’elle mourait à la fin des récoltes pour renaître au retour des pluies.'
  - type: text
    content: '. '
  '12':
  - type: text
    content: 'Le pays tout entier célébrera ce deuil, chaque famille à part, la famille de David à part, et ses femmes à part, la famille de Nathan à part, et ses femmes à part, '
  '13':
  - type: text
    content: 'la famille de Lévi à part, et ses femmes à part, la famille de Shimeï à part, et ses femmes à part, '
  '14':
  - type: text
    content: et toutes les autres familles, chacune à part, et les femmes à part.
  '2':
  - type: text
    content: De Jérusalem je vais faire une coupe enivrante pour tous les peuples qui l’entourent. Il en sera de même pour Juda
  - type: note
    content: 'L’ancienne version grecque, la Vulgate et le targoum ont : Juda sera avec eux.'
  - type: text
    content: ' quand on assiégera Jérusalem. '
  '3':
  - type: text
    content: 'Voici : en ce jour-là, je ferai de Jérusalem une très lourde pierre pour tous les autres peuples et quiconque essaiera de la lever de terre en sera tout meurtri. Tous les peuples du monde uniront leurs efforts pour la combattre. '
  '4':
  - type: text
    content: En ce jour-là – l’Eternel le déclare – je frapperai les chevaux d’épouvante et leurs cavaliers de folie.
  - type: text
    content: 'Mais sur le peuple de Juda, je veillerai, alors que je rendrai aveugles tous les chevaux des autres peuples. '
  '5':
  - type: text
    content: Et les chefs de Juda reconnaîtront alors que, pour Jérusalem et pour ceux qui l’habitent, la force est en leur Dieu, le Seigneur des armées célestes
  - type: note
    content: 'Autre traduction : Les chefs de Juda se diront : Les habitants de Jérusalem sont notre force, grâce au Seigneur des armées célestes, leur Dieu.'
  - type: text
    content: '. '
  '6':
  - type: text
    content: 'En ce jour-là, je ferai des chefs de Juda un foyer d’incendie dans un tas de bois, une torche enflammée dans un grand tas de foin, et ils consumeront à leur droite et à leur gauche les peuples d’alentour. Et Jérusalem restera installée à sa place. '
  '7':
  - type: text
    content: 'En premier lieu, l’Eternel sauvera la population de Juda pour que la famille de David et tous ceux qui habitent Jérusalem ne soient pas orgueilleux et ne s’exaltent pas au-dessus de Juda. '
  '8':
  - type: text
    content: 'En ce jour-là, l’Eternel défendra la population de Jérusalem. Le plus chancelant d’entre eux sera en ce jour-là comme David, et la dynastie de David sera comme Dieu même, comme l’ange de l’Eternel. '
  '9':
  - type: text
    content: Alors, en ce jour-là, j’entreprendrai de détruire toute nation qui viendra pour combattre contre Jérusalem.
  - type: heading
    content: Deuil et purification
