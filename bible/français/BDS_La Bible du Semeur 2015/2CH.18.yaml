document_id: 2CH.18
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Josaphat fait alliance avec Achab
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: (1 R 22.1-28)
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Josaphat était comblé de richesse et de gloire. Il s’allia par mariage avec Achab
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '18.1 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Yoram, fils de Josaphat, épousa Athalie, fille d’Achab (voir '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '22.2'
        metadata:
          usfm: 2CH.22.2
      - type: text
        text: ).
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Au bout de quelques années, il lui rendit visite à Samarie et Achab abattit pour lui et pour ceux qui l’accompagnaient une grande quantité de moutons et de bœufs. Puis il le persuada d’aller avec lui attaquer la ville de Ramoth en Galaad
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '18.2 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Voir note '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1 R 22.3
        metadata:
          usfm: 1KI.22.3
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Achab, roi d’Israël, demanda à Josaphat, roi de Juda : Viendras-tu avec moi à Ramoth en Galaad ?'
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Celui-ci lui répondit : J’irai avec toi, mes troupes iront avec les tiennes, nous livrerons combat avec toi.'
- type: usfm
  marker: s1
  children:
  - type: text
    text: Une unanimité impressionnante
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Mais il ajouta : Consulte d’abord l’Eternel, je te prie.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Le roi d’Israël rassembla les prophètes, qui étaient environ quatre cents, et leur demanda : Devons-nous aller reprendre Ramoth en Galaad, ou dois-je y renoncer ?'
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Ils répondirent : Vas-y ! Dieu la livrera au roi.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Mais Josaphat insista : N’y a-t-il plus ici aucun prophète de l’Eternel, par qui nous puissions le consulter ?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Le roi d’Israël lui répondit : Il y a encore un homme par qui l’on pourrait consulter l’Eternel, mais je le déteste, car il ne m’annonce jamais rien de bon ; il m’annonce toujours du malheur. Il s’agit de Michée, fils de Yimla'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '18.7 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: A ne pas confondre avec le prophète qui est l’auteur du livre de Michée et qui a vécu un siècle et demi plus tard.
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Josaphat s’écria : Que le roi ne parle pas ainsi !'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Alors le roi d’Israël appela un chambellan et lui ordonna de faire venir au plus vite Michée, fils de Yimla.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Le roi d’Israël et Josaphat, roi de Juda, revêtus de leurs costumes royaux, siégeaient chacun sur un trône, sur l’esplanade qui s’étend devant la porte de Samarie, tandis que tous les prophètes étaient devant eux dans un état d’exaltation. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'L’un d’eux, Sédécias, fils de Kenaana, s’était fabriqué des cornes de fer et affirmait : Voici ce que déclare l’Eternel : « Avec ces cornes, tu frapperas les Syriens jusqu’à leur extermination. »'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Tous les autres prophètes confirmaient ce message et disaient : Va attaquer Ramoth en Galaad ! Tu seras vainqueur, et l’Eternel livrera la ville au roi.'
- type: usfm
  marker: s1
  children:
  - type: text
    text: Un prophète qui dérange
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Pendant ce temps, le messager qui était allé chercher Michée lui dit : Les prophètes sont unanimes pour prédire du bien au roi. Tu feras bien de parler comme eux et de lui prédire aussi le succès !'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Michée lui répondit : Aussi vrai que l’Eternel est vivant, je transmettrai ce que Dieu me dira.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Lorsqu’il fut arrivé devant le roi, celui-ci lui demanda : Michée, devons-nous aller attaquer Ramoth en Galaad ou dois-je y renoncer ?'
- type: usfm
  marker: p
  children:
  - type: text
    text: – Bien sûr, allez-y, répondit Michée, vous serez vainqueurs, et la ville vous sera livrée !
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Mais le roi lui rétorqua : Combien de fois faudra-t-il que je t’adjure de me dire seulement la vérité de la part de l’Eternel ?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Alors Michée déclara :'
- type: usfm
  marker: q1
  children:
  - type: text
    text: J’ai vu tous les Israélites
- type: usfm
  marker: q1
  children:
  - type: text
    text: disséminés sur les montagnes ;
- type: usfm
  marker: q1
  children:
  - type: text
    text: ils ressemblaient à des brebis ╵qui n’ont pas de berger
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '18.16 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Voir Nb 27.17 ; 1 R 22.17 ; Ez 34.5 ; Mt 9.36 ; Mc 6.34.
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Et l’Eternel a dit :'
- type: usfm
  marker: q1
  children:
  - type: text
    text: « Ces gens n’ont plus de souverain.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Que chacun d’eux retourne ╵tranquillement chez soi ! »
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Le roi d’Israël dit alors à Josaphat : Je te l’avais bien dit : « Cet homme-là ne me prophétise jamais rien de bon, c’est toujours du mal. »'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Mais Michée continua : Eh bien, oui. Ecoutez ce que dit l’Eternel ! J’ai vu l’Eternel siégeant sur son trône, tandis que toute l’armée des êtres célestes se tenait à sa droite et à sa gauche. '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'L’Eternel demanda : « Qui trompera Achab, le roi d’Israël, pour qu’il aille attaquer Ramoth en Galaad et qu’il tombe sur le champ de bataille ? » L’un proposait ceci, l’autre cela. '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Finalement, un esprit s’avança, se plaça devant l’Eternel et dit : « Moi, je le tromperai. » L’Eternel lui demanda : « Et comment t’y prendras-tu ? » '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: '« J’irai, répondit-il, inspirer des mensonges à tous ses prophètes. » L’Eternel dit : « Pour sûr, tu le tromperas, tu y réussiras. Va donc et fais comme tu l’as dit ! » '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Et maintenant, conclut Michée, c’est ce qui est arrivé : l’Eternel a fait qu’un esprit de mensonge inspire tes prophètes ici présents, car l’Eternel a résolu ta perte.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Alors Sédécias, fils de Kenaana, l’un des prophètes, s’approcha, gifla Michée et lui demanda : Par quel chemin l’esprit qui vient de l’Eternel'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '18.23 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Autre traduction : '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: l’Esprit de l’Eternel.
    marker-yv: yv-n
  - type: text
    text: ' est-il sorti de moi pour te parler ?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Michée répondit : Tu le sauras le jour où tu fuiras en passant de chambre en chambre pour te cacher.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Aussitôt le roi d’Israël ordonna : Arrêtez Michée et emmenez-le à Amôn, le gouverneur de la ville, et à Joas, le fils du roi'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '18.25 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'L’expression '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'fils du roi '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: désigne peut-être ici un haut fonctionnaire du roi.
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: Vous leur ordonnerez de ma part de jeter cet individu en prison et de ne lui donner qu’une ration réduite de pain et d’eau, jusqu’à ce que je revienne sain et sauf de cette expédition.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'Michée s’écria : Si vraiment tu reviens sain et sauf, ce sera la preuve que l’Eternel n’a pas parlé par moi.'
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Puis il ajouta : Ecoutez, vous tous les peuples !'
- type: usfm
  marker: s1
  children:
  - type: text
    text: Josaphat échappe de peu à la mort
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: (1 R 22.29-36)
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'Alors le roi d’Israël et Josaphat, roi de Juda, partirent pour Ramoth en Galaad. '
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'En chemin, Achab dit à Josaphat : Je vais me déguiser pour aller au combat ; mais toi, garde tes habits royaux.'
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Le roi d’Israël se déguisa donc pour la bataille. '
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'Le roi de Syrie avait donné cet ordre aux chefs de ses chars : Vous ne vous occuperez ni des simples soldats ni des officiers, vous concentrerez votre attaque sur le roi d’Israël uniquement.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'Quand les chefs des chars aperçurent Josaphat, ils se dirent : « C’est lui, le roi d’Israël », et ils l’encerclèrent pour l’attaquer. Mais Josaphat poussa un cri, et l’Eternel le secourut : Dieu détourna les Syriens de lui. '
  - type: usfm
    marker: v
    metadata:
      v: '32'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'En effet, quand les chefs des chars se rendirent compte qu’il n’était pas le roi d’Israël, ils se détournèrent de lui. '
  - type: usfm
    marker: v
    metadata:
      v: '33'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: 'Un soldat syrien tira une flèche de son arc, au hasard ; elle atteignit le roi d’Israël à la jointure entre les pièces de la cuirasse. Alors le roi cria au conducteur de son char : Fais demi-tour et conduis-moi hors du champ de bataille, car je suis blessé.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '34'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: Mais ce jour-là, le combat devint si rude que le roi d’Israël dut se tenir debout dans son char face aux Syriens. Il resta ainsi jusqu’au soir et expira vers le coucher du soleil.
