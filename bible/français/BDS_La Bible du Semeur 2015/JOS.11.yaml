document_id: JOS.11,21
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: La victoire sur une coalition de rois de la partie nord du pays
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: Lorsque Yabîn
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '11.1 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Yabîn était peut-être un nom de dynastie (voir '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: Jg 4.2
        - type: text
          text: ', '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: '17'
        - type: text
          text: ).
      marker-yv: yv-n
    - type: text
      text: ', le roi de Hatsor'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '11.1 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Après les campagnes dans le centre et le sud du pays, Josué voit se former une coalition des rois du Nord sous la direction du roi de Hatsor, principale ville de cette région et la mieux fortifiée.
      marker-yv: yv-n
    - type: text
      text: ', apprit les victoires de Josué, il envoya des messagers à Yobab, roi de Madôn'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '11.1 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Située près de Tibériade.
      marker-yv: yv-n
    - type: text
      text: ', aux rois de Shimrôn'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '11.1 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: A l’ouest de Nazareth, en haute Galilée (voir 12.20 ; 19.15-16).
      marker-yv: yv-n
    - type: text
      text: ' et d’Akshaph'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '11.1 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Localisation incertaine.
      marker-yv: yv-n
    - type: text
      text: ', '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'A la même époque, sur le chemin du retour, Josué s’empara de Hatsor qui était autrefois la capitale de tous ces royaumes. Il tua son roi par l’épée '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'et il frappa du tranchant de l’épée tous les êtres vivants qui s’y trouvaient sans y laisser âme qui vive pour les vouer à l’Eternel, puis il incendia la ville. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Il s’empara aussi de toutes les villes des autres rois coalisés. Il captura leurs rois et les fit périr, il extermina totalement leurs habitants et les détruisit complètement pour les vouer à l’Eternel, comme Moïse, serviteur de l’Eternel, l’avait ordonné
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '11.12 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Voir Dt 7.1-2 ; 20.17.
      marker-yv: yv-n
    - type: text
      text: '. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Cependant, les Israélites n’incendièrent aucune des villes situées sur les collines, excepté Hatsor, que Josué fit brûler. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ils emportèrent comme butin toutes les richesses et le bétail de ces villes, mais ils en exterminèrent toute la population, sans épargner personne. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Josué se conforma entièrement aux ordres que l’Eternel avait donnés à son serviteur Moïse et que celui-ci lui avait transmis. Il n’enfreignit aucun de ces ordres.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Les territoires conquis par Josué
    marker-yv: yv-h
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'C’est ainsi que Josué conquit tout le pays : la région montagneuse, tout le Néguev, la région de Goshen, la plaine côtière, la vallée du Jourdain, ainsi que la région montagneuse et les plaines du Nord. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Il captura et tua tous les rois des régions situées entre le mont Halaq qui se dresse près de Séir au sud, jusqu’à Baal-Gad dans la dépression du Liban au pied du mont Hermon au nord. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: La guerre qu’il livra contre tous ces rois dura de longues années
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '11.18 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Au moins sept ans : Caleb avait 78 ans lors de la conquête de Canaan (Dt 2.14 ; Jos 14.7) et 85 ans lorsqu’il prit Hébron ('
        - type: usfm
          marker: ref
          children:
          - type: text
            text: '14.10'
        - type: text
          text: ).
      marker-yv: yv-n
    - type: text
      text: '. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Aucune ville – sauf Gabaon habitée par les Héviens – ne fit la paix avec les Israélites ; il s’en empara par les armes. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ainsi qu’à ceux qui étaient établis dans la région montagneuse du nord
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '11.2 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Allant jusqu’au Liban et à l’Hermon.
      marker-yv: yv-n
    - type: text
      text: ', dans la plaine du Jourdain au sud du lac de Kineroth, dans la plaine côtière et sur les coteaux de Dor à l’ouest'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '11.2 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: A quelques kilomètres au sud du mont Carmel.
      marker-yv: yv-n
    - type: text
      text: '. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Cela venait de l’Eternel ; en effet, il avait rendu ces gens obstinés pour qu’ils affrontent Israël, afin qu’ils soient détruits sans pitié jusqu’à leur totale extermination pour lui être voués, comme il l’avait ordonné à Moïse.
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: A la même époque, Josué alla éliminer les Anaqim
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '11.21 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Les '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'géants '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: dont les douze espions avaient parlé (
        - type: usfm
          marker: ref
          children:
          - type: text
            text: Nb 13.32
        - type: text
          text: ). Josué les anéantit avec Caleb (
        - type: usfm
          marker: ref
          children:
          - type: text
            text: 14.12-15
        - type: text
          text: '  ; voir '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: Dt 2.10
        - type: text
          text: ', '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: '11'
        - type: text
          text: ', '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: '21'
        - type: text
          text: ).
      marker-yv: yv-n
    - type: text
      text: ' qui vivaient dans les montagnes d’Hébron, de Debir, d’Anab, dans les monts de Juda et dans la montagne d’Israël. Il les extermina et détruisit totalement leurs villes pour les vouer à l’Eternel. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Il ne resta plus d’Anaqim dans le pays des Israélites, sauf dans les villes de Gaza, Gath et Ashdod. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Josué conquit donc tout le pays, comme l’Eternel l’avait dit à Moïse, et il le répartit entre les tribus d’Israël pour qu’elles possèdent chacune sa part. Et la guerre cessa dans le pays.
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Il adressa des messages aux Cananéens établis à l’est et à l’ouest, aux Amoréens, aux Hittites, aux Phéréziens, et aux Yebousiens établis dans la région montagneuse, et aux Héviens établis au pied de l’Hermon dans la région de Mitspa
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '11.3 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Au sud de l’Anti-Liban près des sources du Jourdain. Ces différentes peuplades (voir. 3.10 ; 9.1 ; Ex 3.8, 17) formèrent la plus grande armée qu’Israël eut à combattre.
      marker-yv: yv-n
    - type: text
      text: '. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Tous ces rois se mirent en campagne avec leurs armées au complet. C’était une multitude innombrable comme les grains de sable des bords de la mer, et ils étaient équipés d’un nombre énorme de chevaux et de chars de guerre. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ils se donnèrent rendez-vous et vinrent établir leur camp près des eaux de Mérom
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '11.5 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: A une dizaine de kilomètres au nord-ouest du lac de Galilée.
      marker-yv: yv-n
    - type: text
      text: ', pour attaquer Israël. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'L’Eternel dit à Josué : N’aie pas peur d’eux, car demain à cette heure-ci, je les livrerai tous, blessés à mort, au pouvoir d’Israël ; tu couperas les jarrets à leurs chevaux et tu brûleras leurs chars.'
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Josué et toute son armée vinrent attaquer leurs ennemis par surprise près des eaux de Mérom et ils se ruèrent sur eux. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: L’Eternel les livra au pouvoir des Israélites qui les battirent en les poursuivant jusqu’à Sidon la grande ville, jusqu’à Misrephoth-Maïm
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '11.8 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Ce nom signifie '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'incendie des eaux, '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: peut-être une allusion à des sources chaudes. Cette ville pourrait se situer entre Tyr et Acre.
      marker-yv: yv-n
    - type: text
      text: ' et jusqu’à la vallée de Mitspé à l’est. Ils leur infligèrent une défaite totale au point de ne leur laisser aucun survivant. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Josué les traita comme l’Eternel le lui avait ordonné : il coupa les jarrets à leurs chevaux et brûla leurs chars.'
  - type: usfm
    marker: s1
    children:
    - type: text
      text: La conquête des villes de ces rois
    marker-yv: yv-h
