document_id: JOS.11,21
type_code: fra
verses:
  '1':
  - type: heading
    content: La victoire sur une coalition de rois de la partie nord du pays
  - type: text
    content: Lorsque Yabîn
  - type: note
    content: Yabîn était peut-être un nom de dynastie (voir Jg 4.2, 17).
  - type: text
    content: ', le roi de Hatsor'
  - type: note
    content: Après les campagnes dans le centre et le sud du pays, Josué voit se former une coalition des rois du Nord sous la direction du roi de Hatsor, principale ville de cette région et la mieux fortifiée.
  - type: text
    content: ', apprit les victoires de Josué, il envoya des messagers à Yobab, roi de Madôn'
  - type: note
    content: Située près de Tibériade.
  - type: text
    content: ', aux rois de Shimrôn'
  - type: note
    content: A l’ouest de Nazareth, en haute Galilée (voir 12.20 ; 19.15-16).
  - type: text
    content: ' et d’Akshaph'
  - type: note
    content: Localisation incertaine.
  - type: text
    content: ', '
  '10':
  - type: text
    content: 'A la même époque, sur le chemin du retour, Josué s’empara de Hatsor qui était autrefois la capitale de tous ces royaumes. Il tua son roi par l’épée '
  '11':
  - type: text
    content: 'et il frappa du tranchant de l’épée tous les êtres vivants qui s’y trouvaient sans y laisser âme qui vive pour les vouer à l’Eternel, puis il incendia la ville. '
  '12':
  - type: text
    content: Il s’empara aussi de toutes les villes des autres rois coalisés. Il captura leurs rois et les fit périr, il extermina totalement leurs habitants et les détruisit complètement pour les vouer à l’Eternel, comme Moïse, serviteur de l’Eternel, l’avait ordonné
  - type: note
    content: Voir Dt 7.1-2 ; 20.17.
  - type: text
    content: '. '
  '13':
  - type: text
    content: 'Cependant, les Israélites n’incendièrent aucune des villes situées sur les collines, excepté Hatsor, que Josué fit brûler. '
  '14':
  - type: text
    content: 'Ils emportèrent comme butin toutes les richesses et le bétail de ces villes, mais ils en exterminèrent toute la population, sans épargner personne. '
  '15':
  - type: text
    content: Josué se conforma entièrement aux ordres que l’Eternel avait donnés à son serviteur Moïse et que celui-ci lui avait transmis. Il n’enfreignit aucun de ces ordres.
  - type: heading
    content: Les territoires conquis par Josué
  '16':
  - type: text
    content: 'C’est ainsi que Josué conquit tout le pays : la région montagneuse, tout le Néguev, la région de Goshen, la plaine côtière, la vallée du Jourdain, ainsi que la région montagneuse et les plaines du Nord. '
  '17':
  - type: text
    content: 'Il captura et tua tous les rois des régions situées entre le mont Halaq qui se dresse près de Séir au sud, jusqu’à Baal-Gad dans la dépression du Liban au pied du mont Hermon au nord. '
  '18':
  - type: text
    content: La guerre qu’il livra contre tous ces rois dura de longues années
  - type: note
    content: 'Au moins sept ans : Caleb avait 78 ans lors de la conquête de Canaan (Dt 2.14 ; Jos 14.7) et 85 ans lorsqu’il prit Hébron (14.10).'
  - type: text
    content: '. '
  '19':
  - type: text
    content: 'Aucune ville – sauf Gabaon habitée par les Héviens – ne fit la paix avec les Israélites ; il s’en empara par les armes. '
  '2':
  - type: text
    content: ainsi qu’à ceux qui étaient établis dans la région montagneuse du nord
  - type: note
    content: Allant jusqu’au Liban et à l’Hermon.
  - type: text
    content: ', dans la plaine du Jourdain au sud du lac de Kineroth, dans la plaine côtière et sur les coteaux de Dor à l’ouest'
  - type: note
    content: A quelques kilomètres au sud du mont Carmel.
  - type: text
    content: '. '
  '20':
  - type: text
    content: Cela venait de l’Eternel ; en effet, il avait rendu ces gens obstinés pour qu’ils affrontent Israël, afin qu’ils soient détruits sans pitié jusqu’à leur totale extermination pour lui être voués, comme il l’avait ordonné à Moïse.
  '21':
  - type: text
    content: A la même époque, Josué alla éliminer les Anaqim
  - type: note
    content: Les géants dont les douze espions avaient parlé (Nb 13.32). Josué les anéantit avec Caleb (14.12-15  ; voir Dt 2.10, 11, 21).
  - type: text
    content: ' qui vivaient dans les montagnes d’Hébron, de Debir, d’Anab, dans les monts de Juda et dans la montagne d’Israël. Il les extermina et détruisit totalement leurs villes pour les vouer à l’Eternel. '
  '22':
  - type: text
    content: 'Il ne resta plus d’Anaqim dans le pays des Israélites, sauf dans les villes de Gaza, Gath et Ashdod. '
  '23':
  - type: text
    content: Josué conquit donc tout le pays, comme l’Eternel l’avait dit à Moïse, et il le répartit entre les tribus d’Israël pour qu’elles possèdent chacune sa part. Et la guerre cessa dans le pays.
  '3':
  - type: text
    content: Il adressa des messages aux Cananéens établis à l’est et à l’ouest, aux Amoréens, aux Hittites, aux Phéréziens, et aux Yebousiens établis dans la région montagneuse, et aux Héviens établis au pied de l’Hermon dans la région de Mitspa
  - type: note
    content: Au sud de l’Anti-Liban près des sources du Jourdain. Ces différentes peuplades (voir. 3.10 ; 9.1 ; Ex 3.8, 17) formèrent la plus grande armée qu’Israël eut à combattre.
  - type: text
    content: '. '
  '4':
  - type: text
    content: 'Tous ces rois se mirent en campagne avec leurs armées au complet. C’était une multitude innombrable comme les grains de sable des bords de la mer, et ils étaient équipés d’un nombre énorme de chevaux et de chars de guerre. '
  '5':
  - type: text
    content: Ils se donnèrent rendez-vous et vinrent établir leur camp près des eaux de Mérom
  - type: note
    content: A une dizaine de kilomètres au nord-ouest du lac de Galilée.
  - type: text
    content: ', pour attaquer Israël. '
  '6':
  - type: text
    content: 'L’Eternel dit à Josué : N’aie pas peur d’eux, car demain à cette heure-ci, je les livrerai tous, blessés à mort, au pouvoir d’Israël ; tu couperas les jarrets à leurs chevaux et tu brûleras leurs chars.'
  '7':
  - type: text
    content: 'Josué et toute son armée vinrent attaquer leurs ennemis par surprise près des eaux de Mérom et ils se ruèrent sur eux. '
  '8':
  - type: text
    content: L’Eternel les livra au pouvoir des Israélites qui les battirent en les poursuivant jusqu’à Sidon la grande ville, jusqu’à Misrephoth-Maïm
  - type: note
    content: Ce nom signifie incendie des eaux, peut-être une allusion à des sources chaudes. Cette ville pourrait se situer entre Tyr et Acre.
  - type: text
    content: ' et jusqu’à la vallée de Mitspé à l’est. Ils leur infligèrent une défaite totale au point de ne leur laisser aucun survivant. '
  '9':
  - type: text
    content: 'Josué les traita comme l’Eternel le lui avait ordonné : il coupa les jarrets à leurs chevaux et brûla leurs chars.'
  - type: heading
    content: La conquête des villes de ces rois
