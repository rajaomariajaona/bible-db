document_id: ROM.INTRO1
type_code: fra
segments:
- type: usfm
  marker: imt1
  children:
  - type: text
    text: Introduction
- type: usfm
  marker: ip
  children:
  - type: text
    text: Par la richesse de son contenu, la lettre de Paul aux Romains occupe une place privilégiée dans la prédication et dans l’histoire de l’Eglise.
- type: usfm
  marker: ip
  children:
  - type: text
    text: Paul vient de terminer la collecte pour les chrétiens de Jérusalem (15.22-26) ; il est sur le point de partir pour la Judée (Ac 20.11). La rédaction se situe donc au cours de son troisième voyage missionnaire, pendant les trois mois qu’il passe à Corinthe (entre 56 et 58). Une femme, Phœbé, qui exerce un ministère dans l’Eglise voisine de Cenchrées (à quelques kilomètres de Corinthe), doit porter la lettre à Rome (16.1).
- type: usfm
  marker: ip
  children:
  - type: text
    text: 'Paul ne s’est encore jamais rendu dans la capitale de l’Empire : il en a toujours été empêché (15.20-24), mais il connaît là-bas de nombreux chrétiens de l’Eglise, qu’il a rencontrés ailleurs (et qu’il salue au chap. 16).'
- type: usfm
  marker: ip
  children:
  - type: text
    text: Avant la visite qu’il prévoit de leur faire, il leur adresse un exposé ordonné de la doctrine chrétienne du salut, pour que cette Eglise soit solidement fondée dans la foi, inaccessible aux influences des judaïsants, adversaires de l’apôtre, qu’elle grandisse dans l’unité et soit capable de le soutenir par la prière. Le jour où il passera chez eux, elle pourra ainsi constituer son nouveau port d’attache en vue de l’évangélisation de l’Espagne.
- type: usfm
  marker: ip
  children:
  - type: text
    text: 'Après avoir donné une définition de l’Evangile au premier chapitre : « la puissance de Dieu par laquelle il sauve tous ceux qui croient » (v. 16), Paul l’explique dans son développement.'
- type: usfm
  marker: ip
  children:
  - type: text
    text: 'Il commence par affirmer l’universalité du péché : les non-Juifs sont sans excuse devant Dieu (1.18-32), mais aussi les Juifs (2.17-29). Si tous les hommes font le mal (3.1-20), tous peuvent être déclarés justes par la foi (3.21-31). Ainsi le fut Abraham (chap. 4). Les hommes condamnés en Adam ne peuvent être déclarés justes qu’en Christ (chap. 5). Dans les chapitres 6 et 7, Paul répond aux objections des adversaires de l’Evangile. Il clarifie, en particulier, le rôle de la Loi : « sainte » et « bonne », elle a donné à l’homme la connaissance du péché (7.1-12), mais c’est le péché, et non la Loi, qui lui fait faire le mal (7.13-25). Quant à l’Esprit (chap. 8), il fait de nous des enfants de Dieu et vient à notre secours.'
- type: usfm
  marker: ip
  children:
  - type: text
    text: 'Les chapitres 9 à 11 sont consacrés au sort d’Israël dans le plan du salut divin : la majorité des Juifs ont rejeté l’Evangile (9.30 à 10.20). Mais Dieu n’a pas rejeté son peuple (chap. 11) et il fait cette mystérieuse promesse : « Tout Israël sera sauvé » (v. 26).'
- type: usfm
  marker: ip
  children:
  - type: text
    text: 'Les chapitres 12 à 15 forment un tout. L’apôtre termine sa lettre par un ensemble de recommandations pratiques sur les relations dans l’Eglise (12.1-16 ; 13.8 à 15.7) et hors de l’Eglise (12.17 à 13.7) : elles doivent porter la marque de l’amour.'
