document_id: 2SA.1
type_code: fra
segments:
- type: usfm
  marker: ms1
  children:
  - type: text
    text: Le règne de David
  marker-yv: yv-h
- type: usfm
  marker: s1
  children:
  - type: text
    text: David apprend la mort de Saül et de Jonathan
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Saül était déjà mort quand, après avoir battu les Amalécites, David rentra à Tsiqlag. Il y passa deux jours, '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'et le troisième jour, un homme arriva du camp de Saül, les habits déchirés et la tête couverte de poussière en signe de deuil. Lorsqu’il fut arrivé auprès de David, il se jeta à terre pour se prosterner devant lui. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'David lui demanda : D’où viens-tu ?'
- type: usfm
  marker: p
  children:
  - type: text
    text: – Je me suis sauvé du camp d’Israël, dit-il.
- type: usfm
  marker: r
  children:
  - type: text
    text: (1 S 31.1-13 ; 1 Ch 10.1-12)
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: – Qu’est-il arrivé ? poursuivit David, raconte-le-moi, je t’en prie.
- type: usfm
  marker: p
  children:
  - type: text
    text: – L’armée d’Israël s’est enfuie du champ de bataille, beaucoup d’hommes ont été tués. Même Saül et Jonathan son fils sont morts.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'David demanda au jeune homme qui lui faisait ce rapport : Comment sais-tu que Saül et son fils Jonathan sont morts ?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Le jeune homme lui dit : Je me trouvais justement sur le mont Guilboa ; Saül était appuyé sur sa lance, tandis que les chars et les cavaliers allaient l’atteindre. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'S’étant retourné, il m’a aperçu et m’a appelé. J’ai répondu : « Oui, je viens ! » '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Alors il m’a demandé : « Qui es-tu ? » J’ai dit : « Je suis un Amalécite. » '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Alors il m’a ordonné : « Approche-toi et donne-moi la mort, car je suis pris d’un malaise bien que je sois encore plein de vie. » '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Je me suis approché de lui et je lui ai donné un coup mortel parce que je savais qu’il ne survivrait pas à sa défaite. Puis j’ai enlevé la couronne de sa tête et le bracelet qu’il avait au bras. Les voici, je te les apporte, mon seigneur.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Alors David saisit ses vêtements et les déchira en signe de deuil, et tous ses hommes firent comme lui. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Ils prirent le deuil, se lamentèrent et jeûnèrent jusqu’au soir à cause de Saül, de son fils Jonathan et de toute l’armée de l’Eternel et du peuple d’Israël qui avaient péri par l’épée.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'David dit encore au jeune homme qui lui avait apporté ces nouvelles : D’où es-tu ?'
- type: usfm
  marker: p
  children:
  - type: text
    text: – Je suis le fils d’un immigré amalécite.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Et David lui dit : Comment as-tu osé tuer de ta main celui à qui l’Eternel avait conféré l’onction ?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Alors David appela l’un de ses hommes, et lui dit : Viens et tue-le !'
- type: usfm
  marker: p
  children:
  - type: text
    text: Le soldat le frappa et il mourut.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'David lui dit : Tu es toi-même responsable de ta mort, car tu as toi-même déposé contre toi lorsque tu as dit : « C’est moi qui ai mis à mort l’oint de l’Eternel. »'
- type: usfm
  marker: s1
  children:
  - type: text
    text: Elégie sur Saül et Jonathan
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: David composa cette complainte sur Saül et son fils Jonathan.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Il ordonna de l’enseigner aux descendants de Juda ; c’est la complainte de l’Arc qui est consignée dans le livre du Juste
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1.18 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Livre mentionné en '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Jos 10.13
        metadata:
          usfm: JOS.10.13
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Ton élite, Israël, ╵a été transpercée ╵là-bas sur tes collines.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Hélas, ils sont tombés ╵tous les guerriers !
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: N’allez pas publier ╵cette nouvelle à Gath,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et ne l’annoncez pas ╵dans les rues d’Ashkelôn
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1.20 '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'Gath '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'et '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'Ashkelôn '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: étaient deux métropoles philistines, l’une la plus proche des frontières d’Israël, l’autre la plus éloignée. Elles représentent donc toute la Philistie.
    marker-yv: yv-n
  - type: text
    text: '  :'
- type: usfm
  marker: q1
  children:
  - type: text
    text: les filles philistines ╵se mettraient à chanter,
- type: usfm
  marker: q1
  children:
  - type: text
    text: les filles des incirconcis ╵en sauteraient de joie.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: O monts de Guilboa,
- type: usfm
  marker: q1
  children:
  - type: text
    text: qu’il n’y ait ni rosée ╵ni pluie tombant sur vous,
- type: usfm
  marker: q1
  children:
  - type: text
    text: qu’il n’y ait sur vos pentes ╵plus de champs plantureux ╵d’où viennent des offrandes,
- type: usfm
  marker: q1
  children:
  - type: text
    text: là furent avilis ╵les boucliers des braves
- type: usfm
  marker: q1
  children:
  - type: text
    text: et celui de Saül
- type: usfm
  marker: q1
  children:
  - type: text
    text: que l’on n’enduira plus jamais ╵avec de l’huile
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1.21 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Les boucliers, faits de cuir, étaient enduits d’huile, ce qui les entretenait et faisait glisser les flèches ennemies. Ces boucliers, souillés par le sang des braves, ne serviront jamais plus.
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: Ah ! l’arc de Jonathan ╵ne reculait jamais
- type: usfm
  marker: q1
  children:
  - type: text
    text: sans avoir fait couler ╵le sang de ses victimes, ╵sans avoir transpercé ╵la graisse des guerriers,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et l’épée de Saül ╵ne revenait jamais ╵sans avoir accompli ╵sa tâche avec succès.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: Saül et Jonathan, ╵aimés et estimés ╵pendant toute leur vie,
- type: usfm
  marker: q1
  children:
  - type: text
    text: n’ont pas été séparés dans leur mort.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Oui, vous étiez tous deux ╵plus légers que les aigles
- type: usfm
  marker: q1
  children:
  - type: text
    text: et plus forts que les lions.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: O filles d’Israël, ╵pleurez, pleurez Saül
- type: usfm
  marker: q1
  children:
  - type: text
    text: qui vous a revêtues ╵de pourpre et de parures ╵et comblées de délices,
- type: usfm
  marker: q1
  children:
  - type: text
    text: qui ornait vos habits
- type: usfm
  marker: q1
  children:
  - type: text
    text: d’une parure d’or.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: Hélas, ils sont tombés ces braves ╵au milieu du combat !
- type: usfm
  marker: q1
  children:
  - type: text
    text: Oui ! Hélas, Jonathan ! ╵Il a été frappé ╵à mort sur les collines !
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: Ah ! Jonathan, mon frère,
- type: usfm
  marker: q1
  children:
  - type: text
    text: je suis dans la détresse ╵à cause de ta mort,
- type: usfm
  marker: q1
  children:
  - type: text
    text: toi, mon meilleur ami, ╵qui m’as été si cher !
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ton affection pour moi ╵m’a été plus précieuse
- type: usfm
  marker: q1
  children:
  - type: text
    text: que l’amour d’une femme !
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: Hélas, ils sont tombés ╵tous ces guerriers !
- type: usfm
  marker: q1
  children:
  - type: text
    text: Hélas, ils ont péri ╵ces hommes de combat !
