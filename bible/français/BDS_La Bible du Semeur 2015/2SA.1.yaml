document_id: 2SA.1,21
type_code: fra
verses:
  '1':
  - type: heading
    content: Le règne de David
  - type: heading
    content: David apprend la mort de Saül et de Jonathan
  - type: text
    content: 'Saül était déjà mort quand, après avoir battu les Amalécites, David rentra à Tsiqlag. Il y passa deux jours, '
  '10':
  - type: text
    content: Je me suis approché de lui et je lui ai donné un coup mortel parce que je savais qu’il ne survivrait pas à sa défaite. Puis j’ai enlevé la couronne de sa tête et le bracelet qu’il avait au bras. Les voici, je te les apporte, mon seigneur.
  '11':
  - type: text
    content: 'Alors David saisit ses vêtements et les déchira en signe de deuil, et tous ses hommes firent comme lui. '
  '12':
  - type: text
    content: Ils prirent le deuil, se lamentèrent et jeûnèrent jusqu’au soir à cause de Saül, de son fils Jonathan et de toute l’armée de l’Eternel et du peuple d’Israël qui avaient péri par l’épée.
  '13':
  - type: text
    content: 'David dit encore au jeune homme qui lui avait apporté ces nouvelles : D’où es-tu ?'
  - type: text
    content: – Je suis le fils d’un immigré amalécite.
  '14':
  - type: text
    content: 'Et David lui dit : Comment as-tu osé tuer de ta main celui à qui l’Eternel avait conféré l’onction ?'
  '15':
  - type: text
    content: 'Alors David appela l’un de ses hommes, et lui dit : Viens et tue-le !'
  - type: text
    content: Le soldat le frappa et il mourut.
  '16':
  - type: text
    content: 'David lui dit : Tu es toi-même responsable de ta mort, car tu as toi-même déposé contre toi lorsque tu as dit : « C’est moi qui ai mis à mort l’oint de l’Eternel. »'
  - type: heading
    content: Elégie sur Saül et Jonathan
  '17':
  - type: text
    content: David composa cette complainte sur Saül et son fils Jonathan.
  '18':
  - type: text
    content: Il ordonna de l’enseigner aux descendants de Juda ; c’est la complainte de l’Arc qui est consignée dans le livre du Juste
  - type: note
    content: Livre mentionné en Jos 10.13.
  - type: text
    content: .
  '19':
  - type: text
    content: Ton élite, Israël, ╵a été transpercée ╵là-bas sur tes collines.
  - type: text
    content: Hélas, ils sont tombés ╵tous les guerriers !
  '2':
  - type: text
    content: 'et le troisième jour, un homme arriva du camp de Saül, les habits déchirés et la tête couverte de poussière en signe de deuil. Lorsqu’il fut arrivé auprès de David, il se jeta à terre pour se prosterner devant lui. '
  '20':
  - type: text
    content: N’allez pas publier ╵cette nouvelle à Gath,
  - type: text
    content: et ne l’annoncez pas ╵dans les rues d’Ashkelôn
  - type: note
    content: Gath et Ashkelôn étaient deux métropoles philistines, l’une la plus proche des frontières d’Israël, l’autre la plus éloignée. Elles représentent donc toute la Philistie.
  - type: text
    content: '  :'
  - type: text
    content: les filles philistines ╵se mettraient à chanter,
  - type: text
    content: les filles des incirconcis ╵en sauteraient de joie.
  '21':
  - type: text
    content: O monts de Guilboa,
  - type: text
    content: qu’il n’y ait ni rosée ╵ni pluie tombant sur vous,
  - type: text
    content: qu’il n’y ait sur vos pentes ╵plus de champs plantureux ╵d’où viennent des offrandes,
  - type: text
    content: là furent avilis ╵les boucliers des braves
  - type: text
    content: et celui de Saül
  - type: text
    content: que l’on n’enduira plus jamais ╵avec de l’huile
  - type: note
    content: Les boucliers, faits de cuir, étaient enduits d’huile, ce qui les entretenait et faisait glisser les flèches ennemies. Ces boucliers, souillés par le sang des braves, ne serviront jamais plus.
  - type: text
    content: .
  '22':
  - type: text
    content: Ah ! l’arc de Jonathan ╵ne reculait jamais
  - type: text
    content: sans avoir fait couler ╵le sang de ses victimes, ╵sans avoir transpercé ╵la graisse des guerriers,
  - type: text
    content: et l’épée de Saül ╵ne revenait jamais ╵sans avoir accompli ╵sa tâche avec succès.
  '23':
  - type: text
    content: Saül et Jonathan, ╵aimés et estimés ╵pendant toute leur vie,
  - type: text
    content: n’ont pas été séparés dans leur mort.
  - type: text
    content: Oui, vous étiez tous deux ╵plus légers que les aigles
  - type: text
    content: et plus forts que les lions.
  '24':
  - type: text
    content: O filles d’Israël, ╵pleurez, pleurez Saül
  - type: text
    content: qui vous a revêtues ╵de pourpre et de parures ╵et comblées de délices,
  - type: text
    content: qui ornait vos habits
  - type: text
    content: d’une parure d’or.
  '25':
  - type: text
    content: Hélas, ils sont tombés ces braves ╵au milieu du combat !
  - type: text
    content: Oui ! Hélas, Jonathan ! ╵Il a été frappé ╵à mort sur les collines !
  '26':
  - type: text
    content: Ah ! Jonathan, mon frère,
  - type: text
    content: je suis dans la détresse ╵à cause de ta mort,
  - type: text
    content: toi, mon meilleur ami, ╵qui m’as été si cher !
  - type: text
    content: Ton affection pour moi ╵m’a été plus précieuse
  - type: text
    content: que l’amour d’une femme !
  '27':
  - type: text
    content: Hélas, ils sont tombés ╵tous ces guerriers !
  - type: text
    content: Hélas, ils ont péri ╵ces hommes de combat !
  '3':
  - type: text
    content: 'David lui demanda : D’où viens-tu ?'
  - type: text
    content: – Je me suis sauvé du camp d’Israël, dit-il.
  - type: heading
    content: (1 S 31.1-13 ; 1 Ch 10.1-12)
  '4':
  - type: text
    content: – Qu’est-il arrivé ? poursuivit David, raconte-le-moi, je t’en prie.
  - type: text
    content: – L’armée d’Israël s’est enfuie du champ de bataille, beaucoup d’hommes ont été tués. Même Saül et Jonathan son fils sont morts.
  '5':
  - type: text
    content: 'David demanda au jeune homme qui lui faisait ce rapport : Comment sais-tu que Saül et son fils Jonathan sont morts ?'
  '6':
  - type: text
    content: 'Le jeune homme lui dit : Je me trouvais justement sur le mont Guilboa ; Saül était appuyé sur sa lance, tandis que les chars et les cavaliers allaient l’atteindre. '
  '7':
  - type: text
    content: 'S’étant retourné, il m’a aperçu et m’a appelé. J’ai répondu : « Oui, je viens ! » '
  '8':
  - type: text
    content: 'Alors il m’a demandé : « Qui es-tu ? » J’ai dit : « Je suis un Amalécite. » '
  '9':
  - type: text
    content: 'Alors il m’a ordonné : « Approche-toi et donne-moi la mort, car je suis pris d’un malaise bien que je sois encore plein de vie. » '
