document_id: JER.26,21
type_code: fra
verses:
  '1':
  - type: usfm
    marker: ms1
    children:
    - type: text
      text: Salut pour Israël et Juda
    marker-yv: yv-h
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Conflit de Jérémie avec les responsables religieux
    marker-yv: yv-h
  - type: usfm
    marker: s2
    children:
    - type: text
      text: Prédication au Temple
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Au commencement du règne de Yehoyaqim, fils de Josias, roi de Juda, l’Eternel m’adressa la parole :'
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: Lorsque les ministres de Juda apprirent ce qui se passait, ils montèrent du palais royal au Temple et siégèrent à l’entrée de la « porte Neuve » du Temple
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '26.10 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Sans doute pour juger le cas de Jérémie. La porte Neuve est celle qu’avait fait construire le roi Yotam (
        - type: usfm
          marker: ref
          children:
          - type: text
            text: 2 R 15.35
        - type: text
          text: ') ; elle est mentionnée aussi en '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: '36.10'
        - type: text
          text: . Elle menait au parvis intérieur.
      marker-yv: yv-n
    - type: text
      text: '. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'Alors les prêtres et les prophètes dirent aux ministres et à toute la foule : Cet homme mérite d’être condamné à mort, car il a prophétisé contre cette ville, comme vous l’avez entendu de vos propres oreilles.'
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'Jérémie dit à tous les ministres et à toute la foule : L’Eternel m’a chargé de prophétiser au sujet de ce temple et de cette ville tout ce que vous m’avez entendu dire. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'Maintenant, adoptez une conduite bonne et agissez selon ce qui est bien et obéissez à l’Eternel, votre Dieu, alors l’Eternel renoncera au malheur dont il vous a menacés. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'Quant à moi, je suis en votre pouvoir, faites de moi ce que vous jugerez bon et juste. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: Mais, sachez bien que si vous me faites mourir, vous vous rendrez responsables, vous, cette ville et ses habitants, du meurtre d’un innocent, car l’Eternel m’a vraiment envoyé vers vous pour vous dire toutes ces choses.
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'Alors les ministres et tout le peuple dirent aux prêtres et aux prophètes : Cet homme ne mérite pas la mort, car c’est au nom de l’Eternel, notre Dieu, qu’il nous a parlé.'
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'Quelques responsables du pays se levèrent et dirent à toute la foule qui était rassemblée : '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'Au temps d’Ezéchias, roi de Juda, Michée de Morésheth prophétisait et il a dit ceci à tout le peuple de Juda : Voici ce que déclare le Seigneur des armées célestes :'
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: qt
      children:
      - type: usfm
        marker: w
        children:
        - type: text
          text: Sion
      - type: text
        text: ' sera'
    - type: text
      text: ' ╵'
    - type: usfm
      marker: qt
      children:
      - type: text
        text: labourée comme un champ,
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: qt
      children:
      - type: text
        text: et Jérusalem deviendra
    - type: text
      text: ' ╵'
    - type: usfm
      marker: qt
      children:
      - type: text
        text: un tas de ruines ;
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: qt
      children:
      - type: text
        text: le mont du Temple
    - type: text
      text: ' ╵'
    - type: usfm
      marker: qt
      children:
      - type: text
        text: sera une colline
    - type: text
      text: ' ╵'
    - type: usfm
      marker: qt
      children:
      - type: text
        text: couverte de broussailles
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '26.18 '
      - type: usfm
        marker: ft
        children:
        - type: usfm
          marker: ref
          children:
          - type: text
            text: Mi 3.12
        - type: text
          text: .
      marker-yv: yv-n
    - type: usfm
      marker: qt
      children:
      - type: text
        text: .
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: A-t-il été mis à mort pour cela par Ezéchias, roi de Juda, ou par le peuple de Juda ? Le roi n’a-t-il pas plutôt craint l’Eternel ? Il l’a imploré, si bien que l’Eternel a renoncé au malheur dont il les avait menacés. Et nous, nous nous rendrions responsables d’un si grand crime
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '26.19 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Autre traduction : '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: nous nous attirerions un terrible malheur.
      marker-yv: yv-n
    - type: text
      text: '  ?'
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'Voici ce que déclare l’Eternel : Tiens-toi dans le parvis du temple de l’Eternel, et proclame aux habitants de toutes les villes de Juda qui viennent se prosterner dans le Temple, tout ce que je t’ordonne de leur dire ; tu n’en retrancheras pas un mot. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: 'Il y avait encore un autre homme qui prophétisait au nom de l’Eternel : Urie, fils de Shemaya, de Qiryath-Yearim. Lui aussi prophétisa contre cette ville et contre ce pays, dans les mêmes termes que Jérémie. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: 'Le roi Yehoyaqim, tous les hommes de sa garde et tous ses ministres entendirent ses discours. Et le roi chercha à le faire mourir. Urie l’apprit, il eut peur et s’enfuit en Egypte. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: 'Mais le roi Yehoyaqim envoya des hommes en Egypte : Elnathan, fils d’Akbor'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '26.22 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Elnathan
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: ': '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: l’un des ministres du roi Yehoyaqim (
        - type: usfm
          marker: ref
          children:
          - type: text
            text: '36.12'
        - type: text
          text: ). Il interviendra auprès du roi en faveur de Jérémie (
        - type: usfm
          marker: ref
          children:
          - type: text
            text: 36.14-26
        - type: text
          text: ) et demanda au prophète de se cacher (
        - type: usfm
          marker: ref
          children:
          - type: text
            text: '36.19'
        - type: text
          text: ).
      marker-yv: yv-n
    - type: text
      text: ', accompagné de quelques autres. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: Ils ramenèrent Urie d’Egypte et le conduisirent devant le roi Yehoyaqim
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '26.23 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Cet épisode se place sans doute au début du règne de Yehoyaqim au temps où il était encore vassal du pharaon Néko (
        - type: usfm
          marker: ref
          children:
          - type: text
            text: 2 Ch 36.4
        - type: text
          text: ) et où il pouvait donc lui demander l’extradition du prophète.
      marker-yv: yv-n
    - type: text
      text: ' qui le fit tuer par l’épée et ordonna de jeter son cadavre dans la fosse commune.'
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: Quant à Jérémie, il avait l’appui d’Ahiqam, fils de Shaphân
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '26.24 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Il s’agit probablement du Shaphân qui fut le secrétaire royal (voir '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: 2 R 22.12-14
        - type: text
          text: '). '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'Ahiqam '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'aura comme fils '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'Guedalia, '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: gouverneur de Juda après la chute de Jérusalem (
        - type: usfm
          marker: ref
          children:
          - type: text
            text: '40.7'
        - type: text
          text: '). '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'Guemaria, '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: un défenseur de Jérémie (
        - type: usfm
          marker: ref
          children:
          - type: text
            text: '36.12'
        - type: text
          text: ', '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: '25'
        - type: text
          text: ) est sans doute aussi son fils.
      marker-yv: yv-n
    - type: text
      text: ', qui empêchait qu’il soit livré au peuple pour être mis à mort.'
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'Peut-être écouteront-ils et renonceront-ils à leur mauvaise conduite ; alors je renoncerai, de mon côté, au malheur que j’ai décidé de leur infliger à cause de leurs mauvaises actions. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'Tu leur diras : Voici ce que déclare l’Eternel : Si vous ne m’écoutez pas, si vous ne vivez pas selon la Loi que je vous ai donnée, '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'si vous n’écoutez pas les paroles de mes serviteurs les prophètes que je vous envoie sans me lasser, depuis longtemps, sans que vous les écoutiez, '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: alors je traiterai ce temple comme j’ai traité le sanctuaire de Silo
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '26.6 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Voir '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: '7.12'
        - type: text
          text: ' et note.'
      marker-yv: yv-n
    - type: text
      text: ', et tous les peuples de la terre utiliseront le nom de cette ville dans leurs imprécations.'
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'Les prêtres, les prophètes et tout le peuple entendirent Jérémie prononcer ces paroles dans la cour du Temple. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'A peine eut-il achevé de dire tout ce que l’Eternel lui avait ordonné de dire à tout le peuple, que les prêtres, les prophètes et tout le peuple se saisirent de lui en criant : A mort ! A mort ! '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: Comment oses-tu prophétiser au nom de l’Eternel en disant que ce temple va subir le même sort que le sanctuaire de Silo, et que cette ville sera détruite au point qu’il n’y restera plus d’habitants ?
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Et toute la foule s’attroupa autour de Jérémie dans le Temple. '
