document_id: JER.26,21
type_code: fra
verses:
  '1':
  - type: heading
    content: Salut pour Israël et Juda
  - type: heading
    content: Conflit de Jérémie avec les responsables religieux
  - type: heading
    content: Prédication au Temple
  - type: text
    content: 'Au commencement du règne de Yehoyaqim, fils de Josias, roi de Juda, l’Eternel m’adressa la parole :'
  '10':
  - type: text
    content: Lorsque les ministres de Juda apprirent ce qui se passait, ils montèrent du palais royal au Temple et siégèrent à l’entrée de la « porte Neuve » du Temple
  - type: note
    content: Sans doute pour juger le cas de Jérémie. La porte Neuve est celle qu’avait fait construire le roi Yotam (2 R 15.35) ; elle est mentionnée aussi en 36.10. Elle menait au parvis intérieur.
  - type: text
    content: '. '
  '11':
  - type: text
    content: 'Alors les prêtres et les prophètes dirent aux ministres et à toute la foule : Cet homme mérite d’être condamné à mort, car il a prophétisé contre cette ville, comme vous l’avez entendu de vos propres oreilles.'
  '12':
  - type: text
    content: 'Jérémie dit à tous les ministres et à toute la foule : L’Eternel m’a chargé de prophétiser au sujet de ce temple et de cette ville tout ce que vous m’avez entendu dire. '
  '13':
  - type: text
    content: 'Maintenant, adoptez une conduite bonne et agissez selon ce qui est bien et obéissez à l’Eternel, votre Dieu, alors l’Eternel renoncera au malheur dont il vous a menacés. '
  '14':
  - type: text
    content: 'Quant à moi, je suis en votre pouvoir, faites de moi ce que vous jugerez bon et juste. '
  '15':
  - type: text
    content: Mais, sachez bien que si vous me faites mourir, vous vous rendrez responsables, vous, cette ville et ses habitants, du meurtre d’un innocent, car l’Eternel m’a vraiment envoyé vers vous pour vous dire toutes ces choses.
  '16':
  - type: text
    content: 'Alors les ministres et tout le peuple dirent aux prêtres et aux prophètes : Cet homme ne mérite pas la mort, car c’est au nom de l’Eternel, notre Dieu, qu’il nous a parlé.'
  '17':
  - type: text
    content: 'Quelques responsables du pays se levèrent et dirent à toute la foule qui était rassemblée : '
  '18':
  - type: text
    content: 'Au temps d’Ezéchias, roi de Juda, Michée de Morésheth prophétisait et il a dit ceci à tout le peuple de Juda : Voici ce que déclare le Seigneur des armées célestes :'
  - type: text
    content: Sion
  - type: text
    content: ' sera'
  - type: text
    content: ' ╵'
  - type: text
    content: labourée comme un champ,
  - type: text
    content: et Jérusalem deviendra
  - type: text
    content: ' ╵'
  - type: text
    content: un tas de ruines ;
  - type: text
    content: le mont du Temple
  - type: text
    content: ' ╵'
  - type: text
    content: sera une colline
  - type: text
    content: ' ╵'
  - type: text
    content: couverte de broussailles
  - type: note
    content: Mi 3.12.
  - type: text
    content: .
  '19':
  - type: text
    content: A-t-il été mis à mort pour cela par Ezéchias, roi de Juda, ou par le peuple de Juda ? Le roi n’a-t-il pas plutôt craint l’Eternel ? Il l’a imploré, si bien que l’Eternel a renoncé au malheur dont il les avait menacés. Et nous, nous nous rendrions responsables d’un si grand crime
  - type: note
    content: 'Autre traduction : nous nous attirerions un terrible malheur.'
  - type: text
    content: '  ?'
  '2':
  - type: text
    content: 'Voici ce que déclare l’Eternel : Tiens-toi dans le parvis du temple de l’Eternel, et proclame aux habitants de toutes les villes de Juda qui viennent se prosterner dans le Temple, tout ce que je t’ordonne de leur dire ; tu n’en retrancheras pas un mot. '
  '20':
  - type: text
    content: 'Il y avait encore un autre homme qui prophétisait au nom de l’Eternel : Urie, fils de Shemaya, de Qiryath-Yearim. Lui aussi prophétisa contre cette ville et contre ce pays, dans les mêmes termes que Jérémie. '
  '21':
  - type: text
    content: 'Le roi Yehoyaqim, tous les hommes de sa garde et tous ses ministres entendirent ses discours. Et le roi chercha à le faire mourir. Urie l’apprit, il eut peur et s’enfuit en Egypte. '
  '22':
  - type: text
    content: 'Mais le roi Yehoyaqim envoya des hommes en Egypte : Elnathan, fils d’Akbor'
  - type: note
    content: 'Elnathan: l’un des ministres du roi Yehoyaqim (36.12). Il interviendra auprès du roi en faveur de Jérémie (36.14-26) et demanda au prophète de se cacher (36.19).'
  - type: text
    content: ', accompagné de quelques autres. '
  '23':
  - type: text
    content: Ils ramenèrent Urie d’Egypte et le conduisirent devant le roi Yehoyaqim
  - type: note
    content: Cet épisode se place sans doute au début du règne de Yehoyaqim au temps où il était encore vassal du pharaon Néko (2 Ch 36.4) et où il pouvait donc lui demander l’extradition du prophète.
  - type: text
    content: ' qui le fit tuer par l’épée et ordonna de jeter son cadavre dans la fosse commune.'
  '24':
  - type: text
    content: Quant à Jérémie, il avait l’appui d’Ahiqam, fils de Shaphân
  - type: note
    content: Il s’agit probablement du Shaphân qui fut le secrétaire royal (voir 2 R 22.12-14). Ahiqam aura comme fils Guedalia, gouverneur de Juda après la chute de Jérusalem (40.7). Guemaria, un défenseur de Jérémie (36.12, 25) est sans doute aussi son fils.
  - type: text
    content: ', qui empêchait qu’il soit livré au peuple pour être mis à mort.'
  '3':
  - type: text
    content: 'Peut-être écouteront-ils et renonceront-ils à leur mauvaise conduite ; alors je renoncerai, de mon côté, au malheur que j’ai décidé de leur infliger à cause de leurs mauvaises actions. '
  '4':
  - type: text
    content: 'Tu leur diras : Voici ce que déclare l’Eternel : Si vous ne m’écoutez pas, si vous ne vivez pas selon la Loi que je vous ai donnée, '
  '5':
  - type: text
    content: 'si vous n’écoutez pas les paroles de mes serviteurs les prophètes que je vous envoie sans me lasser, depuis longtemps, sans que vous les écoutiez, '
  '6':
  - type: text
    content: alors je traiterai ce temple comme j’ai traité le sanctuaire de Silo
  - type: note
    content: Voir 7.12 et note.
  - type: text
    content: ', et tous les peuples de la terre utiliseront le nom de cette ville dans leurs imprécations.'
  '7':
  - type: text
    content: 'Les prêtres, les prophètes et tout le peuple entendirent Jérémie prononcer ces paroles dans la cour du Temple. '
  '8':
  - type: text
    content: 'A peine eut-il achevé de dire tout ce que l’Eternel lui avait ordonné de dire à tout le peuple, que les prêtres, les prophètes et tout le peuple se saisirent de lui en criant : A mort ! A mort ! '
  '9':
  - type: text
    content: Comment oses-tu prophétiser au nom de l’Eternel en disant que ce temple va subir le même sort que le sanctuaire de Silo, et que cette ville sera détruite au point qu’il n’y restera plus d’habitants ?
  - type: text
    content: 'Et toute la foule s’attroupa autour de Jérémie dans le Temple. '
