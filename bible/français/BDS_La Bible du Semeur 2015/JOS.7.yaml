document_id: JOS.7,21
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: La faute d’Akân
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Les Israélites commirent un acte d’infidélité à l’égard des objets voués à l’Eternel : Akân, fils de Karmi'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '7.1 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'L’ancienne version grecque et '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: 1 Ch 2.6
        - type: text
          text: ' ont : '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: Zimri.
      marker-yv: yv-n
    - type: text
      text: ' et descendant de Zabdi et de Zérah, de la tribu de Juda, prit pour lui certains de ces objets, et l’Eternel se mit en colère contre les Israélites.'
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'L’Eternel répondit à Josué : Lève-toi ! Pourquoi restes-tu prostré la face contre terre ? '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'Israël a commis un péché. On a transgressé l’alliance que j’avais établie pour eux. On a pris des objets qui m’étaient voués, on en a dérobé, caché et mis dans ses propres affaires. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'C’est pourquoi les Israélites ne pourront plus résister à leurs ennemis, ils fuiront devant eux car ils sont sous le coup d’une sentence de destruction. Je ne continuerai pas à être avec vous si vous ne détruisez pas ce qui est au milieu de vous. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'Maintenant, lève-toi, Josué, convoque le peuple et purifie-le. Dis-leur : « Purifiez-vous pour demain, car voici ce que déclare l’Eternel, le Dieu d’Israël ! Vous avez au milieu de vous, Israélites, ce qui m’est voué. Vous ne pourrez pas résister à vos ennemis tant que vous n’aurez pas ôté cela du milieu de vous. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: Demain matin, vous vous présenterez devant moi, par tribus. Puis la tribu que l’Eternel désignera par le sort
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '7.14 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Sans doute au moyen de l’ourim et du toummim (voir note '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: Ex 28.30
        - type: text
          text: ).
      marker-yv: yv-n
    - type: text
      text: ' se présentera, groupe familial par groupe familial, et le groupe familial que l’Eternel désignera s’avancera famille par famille. Dans la famille que j’aurai désignée, les hommes se présenteront un par un. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: Celui qui sera désigné comme coupable d’avoir pris ce qui m’était voué sera brûlé avec tout ce qui lui appartient, parce qu’il a transgressé l’alliance de l’Eternel et qu’il a commis une infamie en Israël. »
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Le châtiment d’Akân
    marker-yv: yv-h
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'Le lendemain, Josué se leva de bon matin et fit avancer les Israélites tribu par tribu. Et c’est la tribu de Juda qui fut désignée. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'Il la fit approcher groupe familial par groupe familial, le sort désigna celui de Zérah. Il fit passer les familles du groupe familial de Zérah l’une après l’autre, et c’est la famille de Zabdi qui fut désignée. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: Il fit avancer cette famille homme par homme, et Akân, fils de Karmi, descendant de Zabdi et de Zérah, de la tribu de Juda, fut désigné par le sort.
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'Josué lui dit : Mon fils, je te prie solennellement, au nom de l’Eternel, le Dieu d’Israël, de l’honorer en m’avouant ce que tu as fait, sans rien me cacher.'
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: De Jéricho, Josué envoya des hommes à la ville d’Aï
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '7.2 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Selon l’identification traditionnelle, ville à environ 2 kilomètres à l’est de Béthel (
        - type: usfm
          marker: ref
          children:
          - type: text
            text: '10.2'
        - type: text
          text: ), qui existait déjà du temps d’Abraham (
        - type: usfm
          marker: ref
          children:
          - type: text
            text: Gn 12.8
        - type: text
          text: ).
      marker-yv: yv-n
    - type: text
      text: ' près de Beth-Aven à l’est de Béthel, en leur demandant d’explorer cette région. Ils allèrent explorer Aï. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: 'Akân lui répondit : C’est vrai, j’ai commis une faute envers l’Eternel, le Dieu d’Israël. Voici ce que j’ai fait : '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: J’ai vu dans le butin un magnifique manteau de Babylone
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '7.21 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'En hébreu, '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'Shinéar, '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ancien nom du territoire de Babylone (
        - type: usfm
          marker: ref
          children:
          - type: text
            text: Gn 10.10
        - type: text
          text: ).
      marker-yv: yv-n
    - type: text
      text: ', deux cents pièces d’argent et un lingot d’or d’une livre. J’en ai eu fortement envie, alors je m’en suis emparé. Ces objets sont enterrés au milieu de ma tente, et l’argent est en-dessous.'
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: 'Josué envoya des hommes à la tente d’Akân, ils se dépêchèrent d’y aller et retrouvèrent effectivement le manteau enfoui dans la tente et l’argent en-dessous. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: 'Ils prirent le tout et l’apportèrent à Josué et à tous les Israélites, puis on le déposa devant l’Eternel. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: Josué, aidé de tous les Israélites, saisit Akân avec l’argent, le manteau et le lingot d’or, ainsi que ses fils, ses filles, ses bœufs, ses ânes, ses brebis, sa tente, bref, tout ce qui lui appartenait, et ils les menèrent dans la vallée d’Akor
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '7.24 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Vallée que l’on n’identifie pas avec certitude.
      marker-yv: yv-n
    - type: text
      text: '. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: 'Josué dit à Akân : Pourquoi nous as-tu attiré le malheur'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '7.25 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Le verbe hébreu rendu par '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'attiré le malheur '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'fait assonance avec le nom '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: Akor.
      marker-yv: yv-n
    - type: text
      text: '  ? Que l’Eternel fasse ton malheur aujourd’hui ! Alors tous les Israélites le lapidèrent. Ils lapidèrent aussi tous les siens et brûlèrent les cadavres. '
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: Puis on éleva sur lui un grand tas de pierres qui existe encore aujourd’hui. Après cela, l’Eternel abandonna sa colère. C’est à cette occasion que l’endroit fut appelé vallée d’Akor (vallée du Malheur), nom qui lui est resté jusqu’à ce jour.
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'A leur retour, ils dirent à Josué : Il est inutile d’envoyer toute l’armée : deux ou trois mille hommes suffiront pour battre Aï. Ne donne pas de fatigue à tout le peuple, car l’adversaire est peu nombreux.'
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'Ainsi, environ trois mille soldats allèrent attaquer la ville, mais ils furent mis en fuite par les habitants d’Aï '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'qui leur tuèrent environ trente-six hommes : ils les poursuivirent depuis la porte de la ville jusqu’à Shebarim et les battirent dans la descente. Alors le peuple atterré perdit tous ses moyens.'
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: Josué déchira ses vêtements
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '7.6 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Signe de consternation et de détresse ou de deuil (voir Gn 37.29, 34 ; Jg 11.35).
      marker-yv: yv-n
    - type: text
      text: ', il se jeta, la face contre terre, devant le coffre de l’Eternel et resta là jusqu’au soir. Les responsables d’Israël firent de même. Et ils se jetèrent de la poussière sur la tête. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'Josué s’écria : Ah ! Seigneur Eternel, pourquoi donc as-tu fait traverser le Jourdain à ce peuple, si c’est pour nous livrer aux Amoréens et nous faire périr ? Si seulement nous étions restés de l’autre côté du fleuve ! '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'Maintenant, je te prie, Seigneur, que puis-je dire après qu’Israël a pris la fuite devant ses ennemis ? '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: Les Cananéens et les autres habitants du pays l’apprendront, ils nous encercleront et feront disparaître notre nom de la terre. Comment alors feras-tu reconnaître ta grandeur ?
