document_id: 2CH.34,21
type_code: fra
verses:
  '1':
  - type: heading
    content: Les réformes de Josias
  - type: heading
    content: (2 R 22.1-2)
  - type: text
    content: Josias avait huit ans à son avènement et il régna trente et un ans à Jérusalem
  - type: note
    content: De 640 à 609 av. J.-C.
  - type: text
    content: '. '
  '10':
  - type: text
    content: 'On remit cet argent aux entrepreneurs qui avaient la responsabilité des travaux dans le temple de l’Eternel. Ceux-ci payaient les ouvriers qui effectuaient les travaux de restauration et de réparation dans le Temple. '
  '11':
  - type: text
    content: 'Ils le donnaient donc aux charpentiers et aux ouvriers du bâtiment pour l’achat de pierres de taille et du bois pour les poutres d’assemblage et la charpente que les rois de Juda avaient laissé tomber en ruine. '
  '12':
  - type: text
    content: 'Ces hommes accomplissaient honnêtement leur travail. Ils étaient placés sous la direction de Yahath et d’Abdias, des lévites de la lignée de Merari, et de Zacharie et Meshoullam de la lignée des Qehatites, chargés de la supervision des travaux. '
  '13':
  - type: text
    content: Les lévites étaient tous d’habiles musiciens. Ils surveillaient les porteurs et dirigeaient tous les ouvriers des différents corps de métier dans chaque sorte de travail. D’autres lévites étaient secrétaires, intendants et portiers.
  - type: heading
    content: (2 R 22.8-20)
  '14':
  - type: text
    content: 'Au moment où l’on retira du coffre l’argent qui avait été apporté au temple de l’Eternel, le prêtre Hilqiya découvrit le livre de la Loi de l’Eternel transmise par Moïse. '
  '15':
  - type: text
    content: 'Alors Hilqiya dit à Shaphân, le secrétaire : J’ai trouvé le livre de la Loi'
  - type: note
    content: Voir note 2 R 22.8.
  - type: text
    content: ' dans le temple de l’Eternel.'
  - type: text
    content: Et Hilqiya remit le livre à Shaphân.
  '16':
  - type: text
    content: 'Celui-ci l’apporta au roi et lui fit un rapport : Tes serviteurs, dit-il, ont fait tout ce qui leur a été commandé. '
  '17':
  - type: text
    content: 'Ils ont versé l’argent qui se trouvait dans le temple de l’Eternel aux responsables et aux entrepreneurs des travaux. '
  '18':
  - type: text
    content: 'Puis il ajouta : Le prêtre Hilqiya m’a remis un livre.'
  - type: text
    content: Et Shaphân se mit à en faire la lecture devant le roi.
  - type: heading
    content: Les conséquences d’une lecture
  '19':
  - type: text
    content: 'Lorsque Josias entendit le contenu de la Loi, il déchira ses vêtements. '
  '2':
  - type: text
    content: Il fit ce que l’Eternel considère comme juste et suivit l’exemple de son ancêtre David sans jamais s’en écarter ni d’un côté ni de l’autre.
  - type: heading
    content: (2 R 23.4-20)
  '20':
  - type: text
    content: Puis il convoqua Hilqiya, Ahiqam, fils de Shaphân, Abdôn, fils de Michée, Shaphân, le secrétaire, et Asaya, l’un des ministres.
  '21':
  - type: text
    content: – Allez consulter l’Eternel pour moi, leur dit-il, ainsi que pour le reste du peuple qui se trouve en Israël et en Juda, au sujet des enseignements du livre que l’on vient de retrouver. Car la colère de l’Eternel est bien grande. Elle s’est répandue sur nous parce que nos ancêtres n’ont pas obéi à la parole de l’Eternel et n’ont pas appliqué tout ce qui est écrit dans ce livre.
  '22':
  - type: text
    content: 'Hilqiya et ceux que le roi avait désignés se rendirent chez la prophétesse Houlda, femme de Shalloum, fils de Toqehath, et petit-fils de Hasra, responsable du vestiaire du Temple. Elle habitait à Jérusalem dans le nouveau quartier. Ils lui exposèrent la situation comme convenu. '
  '23':
  - type: text
    content: 'Alors Houlda leur dit : Voici ce que déclare l’Eternel, le Dieu d’Israël : « Annoncez à l’homme qui vous a envoyés à moi : '
  '24':
  - type: text
    content: 'L’Eternel dit : Je vais faire venir un malheur sur cette contrée et sur ses habitants en accomplissant toutes les malédictions inscrites dans ce livre que l’on a lu devant le roi de Juda. '
  '25':
  - type: text
    content: 'En effet, parce qu’ils m’ont abandonné et qu’ils ont fait brûler des parfums à d’autres dieux, et parce qu’ils m’ont ainsi irrité par toute leur conduite, ma colère s’est répandue sur ce lieu et elle n’est pas près de s’apaiser. '
  '26':
  - type: text
    content: 'Mais vous direz au roi de Juda qui vous a envoyés pour consulter l’Eternel : Voici ce que déclare l’Eternel, le Dieu d’Israël : Tu as entendu les paroles contenues dans ce livre. '
  '27':
  - type: text
    content: 'Ton cœur s’est laissé toucher, tu t’es humilié devant Dieu en entendant ce qu’il a décrété contre ce lieu et contre ses habitants. Tu t’es humilié devant moi, tu as déchiré tes vêtements et tu as pleuré devant moi. De mon côté, moi aussi, j’ai entendu ta prière – l’Eternel le déclare. '
  '28':
  - type: text
    content: C’est pourquoi je te ferai rejoindre tes ancêtres décédés et tu seras déposé paisiblement dans l’un de tes tombeaux, sans avoir vu tout le malheur que je vais amener sur cette contrée et sur ses habitants. »
  - type: text
    content: Les envoyés rapportèrent cette réponse au roi.
  - type: heading
    content: Le renouvellement de l’alliance avec Dieu
  - type: heading
    content: (2 R 23.1-3)
  '29':
  - type: text
    content: 'Le roi Josias fit convoquer auprès de lui tous les responsables de Juda et de Jérusalem. '
  '3':
  - type: text
    content: 'Dès la huitième année de son règne, alors qu’il était encore jeune, il entreprit de chercher à plaire au Dieu de David, son ancêtre, et la douzième année, il se mit à purifier Juda et Jérusalem des hauts lieux, des pieux sacrés d’Ashéra, des idoles de bois sculpté et des idoles en métal fondu. '
  '30':
  - type: text
    content: 'Puis il monta au temple de l’Eternel, accompagné de toute la population de Juda et des habitants de Jérusalem, des prêtres, des lévites et de tous les gens du peuple, quelle que fût leur condition sociale. Devant tous, il lut tout ce qui était écrit dans le livre de l’alliance que l’on avait retrouvé au temple de l’Eternel. '
  '31':
  - type: text
    content: 'Il se tint debout sur l’estrade qui lui était réservée et, en présence de l’Eternel, il conclut cette alliance avec lui par laquelle il s’engagea à être fidèle à l’Eternel et à obéir à ses commandements, à ses lois et à ses ordonnances, de tout son cœur et de tout son être, et à appliquer toutes les clauses de l’alliance figurant dans ce livre. '
  '32':
  - type: text
    content: Le roi fit aussi prendre ce même engagement à tous les gens qui se trouvaient à Jérusalem et dans le territoire de Benjamin. Et les habitants de Jérusalem se conformèrent aux termes de l’alliance de Dieu, du Dieu de leurs ancêtres.
  '33':
  - type: text
    content: Puis Josias fit disparaître toutes les idoles abominables dans tous les territoires appartenant aux Israélites. Il obligea tous les gens qui se trouvaient en Israël à servir l’Eternel leur Dieu. De cette manière, ils ne se détournèrent pas de l’Eternel, le Dieu de leurs ancêtres, durant toute la vie de Josias.
  '4':
  - type: text
    content: On démolit en sa présence les autels des Baals. On abattit les autels à parfums
  - type: note
    content: Terme de sens incertain. Il pourrait aussi s’agir d’un sanctuaire différent d’un haut lieu.
  - type: text
    content: ' placés sur ces autels. Il coupa les pieux sacrés d’Ashéra, brisa les idoles sculptées ou fondues et les réduisit en poussière qu’il dispersa sur les tombes de ceux qui avaient offert des sacrifices à ces faux dieux. '
  '5':
  - type: text
    content: Il brûla les ossements des prêtres des idoles sur leurs autels
  - type: note
    content: Pour les profaner (voir 1 R 13.2).
  - type: text
    content: '. C’est ainsi qu’il purifia Juda et Jérusalem. '
  '6':
  - type: text
    content: Puis il passa dans les villes de Manassé, d’Ephraïm, de Siméon et jusqu’en Nephtali et fit de même dans les ruines aux alentours
  - type: note
    content: Ruines du royaume du Nord dévasté par les Assyriens près d’un siècle auparavant.
  - type: text
    content: '. '
  '7':
  - type: text
    content: Il démolit les autels et les pieux sacrés d’Ashéra, brisa les statues d’idoles et les réduisit en poussière. Il abattit tous les autels à parfums dans tout le pays d’Israël. Ensuite, il retourna à Jérusalem.
  - type: heading
    content: Le livre de la Loi redécouvert
  - type: heading
    content: (2 R 22.3-7)
  '8':
  - type: text
    content: La dix-huitième année de son règne
  - type: note
    content: En 622 av. J.-C.
  - type: text
    content: ', afin de purifier le pays et le Temple, il envoya Shaphân, fils d’Atsalia, à Maaséya, le chef de la ville, et Yoah, fils de Yoahaz, l’archiviste, pour réparer le temple de l’Eternel son Dieu. '
  '9':
  - type: text
    content: 'Ces trois hommes se rendirent auprès du grand-prêtre Hilqiya et lui remirent l’argent qui avait été apporté dans le temple de Dieu, et que les lévites-portiers de l’entrée avaient collecté des tribus de Manassé et d’Ephraïm et du reste des Israélites du Nord, ainsi que de tout Juda et Benjamin, et des habitants de Jérusalem. '
