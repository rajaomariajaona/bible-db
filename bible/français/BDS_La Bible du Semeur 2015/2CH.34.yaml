document_id: 2CH.34,21
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Les réformes de Josias
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: (2 R 22.1-2)
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: Josias avait huit ans à son avènement et il régna trente et un ans à Jérusalem
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '34.1 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: De 640 à 609 av. J.-C.
      marker-yv: yv-n
    - type: text
      text: '. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'On remit cet argent aux entrepreneurs qui avaient la responsabilité des travaux dans le temple de l’Eternel. Ceux-ci payaient les ouvriers qui effectuaient les travaux de restauration et de réparation dans le Temple. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'Ils le donnaient donc aux charpentiers et aux ouvriers du bâtiment pour l’achat de pierres de taille et du bois pour les poutres d’assemblage et la charpente que les rois de Juda avaient laissé tomber en ruine. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'Ces hommes accomplissaient honnêtement leur travail. Ils étaient placés sous la direction de Yahath et d’Abdias, des lévites de la lignée de Merari, et de Zacharie et Meshoullam de la lignée des Qehatites, chargés de la supervision des travaux. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: Les lévites étaient tous d’habiles musiciens. Ils surveillaient les porteurs et dirigeaient tous les ouvriers des différents corps de métier dans chaque sorte de travail. D’autres lévites étaient secrétaires, intendants et portiers.
  - type: usfm
    marker: r
    children:
    - type: text
      text: (2 R 22.8-20)
    marker-yv: yv-h
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'Au moment où l’on retira du coffre l’argent qui avait été apporté au temple de l’Eternel, le prêtre Hilqiya découvrit le livre de la Loi de l’Eternel transmise par Moïse. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'Alors Hilqiya dit à Shaphân, le secrétaire : J’ai trouvé le livre de la Loi'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '34.15 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Voir note '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: 2 R 22.8
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: ' dans le temple de l’Eternel.'
  - type: usfm
    marker: p
    children:
    - type: text
      text: Et Hilqiya remit le livre à Shaphân.
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'Celui-ci l’apporta au roi et lui fit un rapport : Tes serviteurs, dit-il, ont fait tout ce qui leur a été commandé. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'Ils ont versé l’argent qui se trouvait dans le temple de l’Eternel aux responsables et aux entrepreneurs des travaux. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'Puis il ajouta : Le prêtre Hilqiya m’a remis un livre.'
  - type: usfm
    marker: p
    children:
    - type: text
      text: Et Shaphân se mit à en faire la lecture devant le roi.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Les conséquences d’une lecture
    marker-yv: yv-h
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'Lorsque Josias entendit le contenu de la Loi, il déchira ses vêtements. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: Il fit ce que l’Eternel considère comme juste et suivit l’exemple de son ancêtre David sans jamais s’en écarter ni d’un côté ni de l’autre.
  - type: usfm
    marker: r
    children:
    - type: text
      text: (2 R 23.4-20)
    marker-yv: yv-h
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: Puis il convoqua Hilqiya, Ahiqam, fils de Shaphân, Abdôn, fils de Michée, Shaphân, le secrétaire, et Asaya, l’un des ministres.
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: – Allez consulter l’Eternel pour moi, leur dit-il, ainsi que pour le reste du peuple qui se trouve en Israël et en Juda, au sujet des enseignements du livre que l’on vient de retrouver. Car la colère de l’Eternel est bien grande. Elle s’est répandue sur nous parce que nos ancêtres n’ont pas obéi à la parole de l’Eternel et n’ont pas appliqué tout ce qui est écrit dans ce livre.
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: 'Hilqiya et ceux que le roi avait désignés se rendirent chez la prophétesse Houlda, femme de Shalloum, fils de Toqehath, et petit-fils de Hasra, responsable du vestiaire du Temple. Elle habitait à Jérusalem dans le nouveau quartier. Ils lui exposèrent la situation comme convenu. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: 'Alors Houlda leur dit : Voici ce que déclare l’Eternel, le Dieu d’Israël : « Annoncez à l’homme qui vous a envoyés à moi : '
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: 'L’Eternel dit : Je vais faire venir un malheur sur cette contrée et sur ses habitants en accomplissant toutes les malédictions inscrites dans ce livre que l’on a lu devant le roi de Juda. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: 'En effet, parce qu’ils m’ont abandonné et qu’ils ont fait brûler des parfums à d’autres dieux, et parce qu’ils m’ont ainsi irrité par toute leur conduite, ma colère s’est répandue sur ce lieu et elle n’est pas près de s’apaiser. '
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: 'Mais vous direz au roi de Juda qui vous a envoyés pour consulter l’Eternel : Voici ce que déclare l’Eternel, le Dieu d’Israël : Tu as entendu les paroles contenues dans ce livre. '
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: 'Ton cœur s’est laissé toucher, tu t’es humilié devant Dieu en entendant ce qu’il a décrété contre ce lieu et contre ses habitants. Tu t’es humilié devant moi, tu as déchiré tes vêtements et tu as pleuré devant moi. De mon côté, moi aussi, j’ai entendu ta prière – l’Eternel le déclare. '
  '28':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: C’est pourquoi je te ferai rejoindre tes ancêtres décédés et tu seras déposé paisiblement dans l’un de tes tombeaux, sans avoir vu tout le malheur que je vais amener sur cette contrée et sur ses habitants. »
  - type: usfm
    marker: p
    children:
    - type: text
      text: Les envoyés rapportèrent cette réponse au roi.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Le renouvellement de l’alliance avec Dieu
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: (2 R 23.1-3)
    marker-yv: yv-h
  '29':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: 'Le roi Josias fit convoquer auprès de lui tous les responsables de Juda et de Jérusalem. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'Dès la huitième année de son règne, alors qu’il était encore jeune, il entreprit de chercher à plaire au Dieu de David, son ancêtre, et la douzième année, il se mit à purifier Juda et Jérusalem des hauts lieux, des pieux sacrés d’Ashéra, des idoles de bois sculpté et des idoles en métal fondu. '
  '30':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '30'
    - type: text
      text: 'Puis il monta au temple de l’Eternel, accompagné de toute la population de Juda et des habitants de Jérusalem, des prêtres, des lévites et de tous les gens du peuple, quelle que fût leur condition sociale. Devant tous, il lut tout ce qui était écrit dans le livre de l’alliance que l’on avait retrouvé au temple de l’Eternel. '
  '31':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '31'
    - type: text
      text: 'Il se tint debout sur l’estrade qui lui était réservée et, en présence de l’Eternel, il conclut cette alliance avec lui par laquelle il s’engagea à être fidèle à l’Eternel et à obéir à ses commandements, à ses lois et à ses ordonnances, de tout son cœur et de tout son être, et à appliquer toutes les clauses de l’alliance figurant dans ce livre. '
  '32':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '32'
    - type: text
      text: Le roi fit aussi prendre ce même engagement à tous les gens qui se trouvaient à Jérusalem et dans le territoire de Benjamin. Et les habitants de Jérusalem se conformèrent aux termes de l’alliance de Dieu, du Dieu de leurs ancêtres.
  '33':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '33'
    - type: text
      text: Puis Josias fit disparaître toutes les idoles abominables dans tous les territoires appartenant aux Israélites. Il obligea tous les gens qui se trouvaient en Israël à servir l’Eternel leur Dieu. De cette manière, ils ne se détournèrent pas de l’Eternel, le Dieu de leurs ancêtres, durant toute la vie de Josias.
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: On démolit en sa présence les autels des Baals. On abattit les autels à parfums
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '34.4 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Terme de sens incertain. Il pourrait aussi s’agir d’un sanctuaire différent d’un haut lieu.
      marker-yv: yv-n
    - type: text
      text: ' placés sur ces autels. Il coupa les pieux sacrés d’Ashéra, brisa les idoles sculptées ou fondues et les réduisit en poussière qu’il dispersa sur les tombes de ceux qui avaient offert des sacrifices à ces faux dieux. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: Il brûla les ossements des prêtres des idoles sur leurs autels
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '34.5 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Pour les profaner (voir '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: 1 R 13.2
        - type: text
          text: ).
      marker-yv: yv-n
    - type: text
      text: '. C’est ainsi qu’il purifia Juda et Jérusalem. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: Puis il passa dans les villes de Manassé, d’Ephraïm, de Siméon et jusqu’en Nephtali et fit de même dans les ruines aux alentours
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '34.6 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Ruines du royaume du Nord dévasté par les Assyriens près d’un siècle auparavant.
      marker-yv: yv-n
    - type: text
      text: '. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: Il démolit les autels et les pieux sacrés d’Ashéra, brisa les statues d’idoles et les réduisit en poussière. Il abattit tous les autels à parfums dans tout le pays d’Israël. Ensuite, il retourna à Jérusalem.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Le livre de la Loi redécouvert
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: (2 R 22.3-7)
    marker-yv: yv-h
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: La dix-huitième année de son règne
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '34.8 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: En 622 av. J.-C.
      marker-yv: yv-n
    - type: text
      text: ', afin de purifier le pays et le Temple, il envoya Shaphân, fils d’Atsalia, à Maaséya, le chef de la ville, et Yoah, fils de Yoahaz, l’archiviste, pour réparer le temple de l’Eternel son Dieu. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'Ces trois hommes se rendirent auprès du grand-prêtre Hilqiya et lui remirent l’argent qui avait été apporté dans le temple de Dieu, et que les lévites-portiers de l’entrée avaient collecté des tribus de Manassé et d’Ephraïm et du reste des Israélites du Nord, ainsi que de tout Juda et Benjamin, et des habitants de Jérusalem. '
