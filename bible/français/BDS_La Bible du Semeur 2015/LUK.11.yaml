document_id: LUK.11,21
type_code: fra
verses:
  '1':
  - type: heading
    content: Comment prier
  - type: heading
    content: (Mt 6.9-13)
  - type: text
    content: 'Un jour, Jésus priait en un certain lieu. Quand il eut fini, l’un de ses disciples lui demanda : Seigneur, apprends-nous à prier, comme Jean l’a appris à ses disciples !'
  '10':
  - type: text
    content: Car celui qui demande reçoit ; celui qui cherche trouve ; et l’on ouvre à celui qui frappe.
  '11':
  - type: text
    content: ' '
  - type: text
    content: Il y a des pères parmi vous. Lequel d’entre vous donnera-t-il un serpent à son fils quand celui-ci lui demande un poisson
  - type: text
    content: ' '
  - type: note
    content: 'Certains manuscrits ajoutent : ou une pierre alors qu’il lui demande du pain.'
  - type: text
    content: '?'
  - type: text
    content: ' '
  '12':
  - type: text
    content: Ou encore, s’il demande un œuf, lui donnera-t-il un scorpion
  - type: note
    content: Voir note Lc 10.19.
  - type: text
    content: '?'
  - type: text
    content: ' '
  '13':
  - type: text
    content: Si donc, tout mauvais que vous êtes, vous savez donner de bonnes choses à vos enfants, à combien plus forte raison le Père céleste donnera-t-il l’Esprit Saint à ceux qui le lui demandent.
  - type: heading
    content: Dieu ou Satan ?
  - type: heading
    content: (Mt 12.22-30 ; Mc 3.20-27)
  '14':
  - type: text
    content: 'Un jour, Jésus chassait un démon qui rendait un homme muet. Quand le démon fut sorti, le muet se mit à parler, et la foule était émerveillée. '
  '15':
  - type: text
    content: 'Cependant quelques-uns disaient : C’est par le pouvoir de Béelzébul, le chef des démons, qu’il chasse les démons.'
  '16':
  - type: text
    content: 'D’autres, pour lui tendre un piège, lui réclamaient un signe venant du ciel. '
  '17':
  - type: text
    content: 'Mais, comme il connaissait leurs pensées, il leur dit : '
  - type: text
    content: Tout royaume déchiré par la guerre civile est dévasté et les maisons s’y écroulent l’une sur l’autre.
  - type: text
    content: ' '
  '18':
  - type: text
    content: 'Vous prétendez que je chasse les démons par le pouvoir de Béelzébul. Mais si '
  - type: text
    content: Satan
  - type: text
    content: ' est en conflit avec lui-même ; comment alors son royaume subsistera-t-il ?'
  - type: text
    content: ' '
  '19':
  - type: text
    content: 'D’ailleurs, si moi je chasse les démons par Béelzébul, qui donc donne à vos '
  - type: text
    content: disciples
  - type: text
    content: ' le pouvoir de les chasser ? C’est pourquoi ils seront eux-mêmes vos juges.'
  '2':
  - type: text
    content: 'Il leur répondit : '
  - type: text
    content: 'Quand vous priez, dites :'
  - type: text
    content: Père,
  - type: text
    content: que ton nom soit sanctifié
  - type: text
    content: ' '
  - type: note
    content: 'Autres traductions : que tu sois reconnu pour Dieu ou que la gloire de ta personne soit manifeste ou que les hommes te rendent le culte qui t’est dû.'
  - type: text
    content: ','
  - type: text
    content: que ton règne vienne.
  '20':
  - type: text
    content: ' '
  - type: text
    content: 'Mais si c’est par la puissance de Dieu que je chasse les démons, alors, de toute évidence, le '
  - type: text
    content: royaume de Dieu
  - type: text
    content: ' est venu jusqu’à vous.'
  - type: text
    content: ' '
  '21':
  - type: text
    content: Tant qu’un homme fort et bien armé garde sa maison, ses biens sont en sécurité ;
  - type: text
    content: ' '
  '22':
  - type: text
    content: mais si un autre, plus fort que lui, l’attaque et parvient à le maîtriser, il lui enlève toutes les armes sur lesquelles le premier comptait, lui prend tous ses biens et les distribue.
  '23':
  - type: text
    content: ' '
  - type: text
    content: Celui qui n’est pas avec moi est contre moi, et celui qui ne se joint pas à moi pour rassembler, disperse.
  - type: heading
    content: (Mt 12.43-45)
  '24':
  - type: text
    content: ' '
  - type: text
    content: 'Lorsqu’un esprit mauvais est sorti de quelqu’un, il erre çà et là dans des lieux déserts, à la recherche d’un lieu de repos, et il n’en trouve pas. Il se dit alors : « Mieux vaut regagner la demeure que j’ai quittée. »'
  '25':
  - type: text
    content: ' '
  - type: text
    content: Il y retourne donc et la trouve balayée et mise en ordre.
  - type: text
    content: ' '
  '26':
  - type: text
    content: Alors il va chercher sept autres esprits encore plus méchants que lui et les amène avec lui. Ils entrent dans la demeure et s’y installent. Finalement, la condition de cet homme est pire qu’avant.
  '27':
  - type: text
    content: 'Pendant qu’il parlait ainsi, du milieu de la foule, une femme s’écria : Heureuse la femme qui t’a mis au monde et qui t’a allaité !'
  '28':
  - type: text
    content: 'Mais Jésus répondit : '
  - type: text
    content: Heureux plutôt ceux qui écoutent la Parole de Dieu et qui y obéissent !
  - type: heading
    content: Signe et lumière
  - type: heading
    content: (Mt 12.38-42)
  '29':
  - type: text
    content: 'Comme la foule grossissait autour de lui, il dit : '
  - type: text
    content: Les gens de notre temps sont mauvais. Ils réclament un signe miraculeux. Un signe… il ne leur en sera pas accordé d’autre que celui de Jonas.
  - type: text
    content: ' '
  '3':
  - type: text
    content: ' '
  - type: text
    content: Donne-nous, chaque jour,
  - type: text
    content: le pain dont nous avons besoin
  - type: text
    content: ' '
  - type: note
    content: 'Autres traductions : la nourriture de ce jour ou du lendemain.'
  - type: text
    content: .
  '30':
  - type: text
    content: Car, de même que Jonas a été un signe pour les habitants de Ninive
  - type: note
    content: Voir Jon 3.
  - type: text
    content: ', de même aussi le '
  - type: text
    content: Fils de l’homme
  - type: text
    content: ' sera un signe pour les gens de notre temps.'
  '31':
  - type: text
    content: ' '
  - type: text
    content: 'Au jour du jugement, la reine du Midi se lèvera et condamnera les gens de notre temps, car elle est venue du bout du monde pour écouter l’enseignement plein de sagesse de '
  - type: text
    content: Salomon
  - type: text
    content: . Or, il y a ici plus que Salomon !
  - type: text
    content: ' '
  '32':
  - type: text
    content: 'Au jour du jugement, les habitants de Ninive se lèveront et condamneront les gens de notre temps, car ils ont '
  - type: text
    content: changé
  - type: text
    content: ' en réponse à la prédication de Jonas. Or, il y a ici plus que Jonas.'
  - type: heading
    content: (Mt 5.15 ; Mc 4.21)
  '33':
  - type: text
    content: ' '
  - type: text
    content: Personne n’allume une lampe pour la mettre dans un recoin ou sous une mesure à grain
  - type: text
    content: ' '
  - type: note
    content: 'Les mots : ou sous une mesure à grain sont absents de certains manuscrits (voir Mt 5.15 ; Mc 4.21).'
  - type: text
    content: . Non, on la place sur un pied de lampe pour que ceux qui entrent voient la lumière.
  - type: heading
    content: (Mt 6.22-23)
  '34':
  - type: text
    content: ' '
  - type: text
    content: Tes yeux sont comme une lampe pour ton corps. Si tes yeux sont en bon état, tout ton corps jouit de la lumière ; mais s’ils sont malades, tout ton corps est plongé dans l’obscurité.
  - type: text
    content: ' '
  '35':
  - type: text
    content: Fais donc attention à ce que ta lumière ne soit pas obscurcie.
  - type: text
    content: ' '
  '36':
  - type: text
    content: Si ton corps tout entier est dans la lumière, sans aucune partie dans l’obscurité, il jouira pleinement de la lumière, comme lorsque la lampe t’éclaire de sa clarté.
  - type: heading
    content: La condamnation des chefs religieux
  - type: heading
    content: (Mt 23.4-36)
  '37':
  - type: text
    content: 'Pendant qu’il parlait, un pharisien l’invita à venir manger chez lui. Jésus entra dans la maison et se mit à table. '
  '38':
  - type: text
    content: Le pharisien remarqua qu’il n’avait pas fait les ablutions rituelles avant le repas, et il s’en étonna.
  '39':
  - type: text
    content: 'Le Seigneur lui dit alors : '
  - type: text
    content: Vous pharisiens, vous nettoyez soigneusement l’extérieur de vos coupes et de vos plats, mais à l’intérieur, vous êtes remplis du désir de voler et pleins de méchanceté.
  - type: text
    content: ' '
  '4':
  - type: text
    content: ' '
  - type: text
    content: Pardonne-nous nos péchés,
  - type: text
    content: car nous pardonnons nous-mêmes
  - type: text
    content: à ceux qui ont des torts envers nous.
  - type: text
    content: Et ne nous expose pas à la tentation
  - type: text
    content: ' '
  - type: note
    content: 'Autre traduction : Garde-nous de céder à la tentation.'
  - type: text
    content: .
  '40':
  - type: text
    content: Fous que vous êtes ! Est-ce que celui qui a créé l’extérieur n’a pas aussi fait l’intérieur ?
  - type: text
    content: ' '
  '41':
  - type: text
    content: Donnez plutôt en offrande à Dieu votre être intérieur
  - type: note
    content: 'D’autres comprennent : donnez aux pauvres ce que vous avez.'
  - type: text
    content: ', et vous serez du même coup entièrement '
  - type: text
    content: purs
  - type: text
    content: .
  - type: text
    content: ' '
  '42':
  - type: text
    content: Mais malheur à vous, pharisiens, vous vous acquittez scrupuleusement de la dîme sur toutes les plus petites herbes, comme la menthe et la rue
  - type: note
    content: La rue était une plante aromatique et médicinale cultivée en Israël.
  - type: text
    content: ', et sur le moindre légume, mais vous négligez la droiture et l’amour de Dieu ! Voilà ce qu’il fallait faire, sans laisser le reste de côté.'
  '43':
  - type: text
    content: ' '
  - type: text
    content: 'Malheur à vous, pharisiens, parce que vous aimez les sièges d’honneur dans les '
  - type: text
    content: synagogues
  - type: text
    content: '  ; vous aimez qu’on vous salue respectueusement sur les places publiques.'
  - type: text
    content: ' '
  '44':
  - type: text
    content: Malheur à vous ! vous ressemblez à ces tombes que rien ne signale au regard et sur lesquelles on passe sans s’en douter
  - type: note
    content: Selon les rabbins, marcher sur un tombeau rendait impur.
  - type: text
    content: .
  '45':
  - type: text
    content: 'Là-dessus, un enseignant de la Loi se mit à protester en disant : Maître, en parlant ainsi, tu nous insultes, nous aussi !'
  '46':
  - type: text
    content: ' '
  - type: text
    content: – Oui, malheur à vous aussi, enseignants de la Loi,
  - type: text
    content: ' lui répondit Jésus, '
  - type: text
    content: vous imposez aux gens des fardeaux accablants ; mais vous-mêmes, vous n’y touchez pas du petit doigt !
  '47':
  - type: text
    content: ' '
  - type: text
    content: 'Malheur à vous, parce que vous édifiez des monuments funéraires pour les '
  - type: text
    content: prophètes
  - type: text
    content: ', ces prophètes que vos ancêtres ont tués !'
  - type: text
    content: ' '
  '48':
  - type: text
    content: 'Vous montrez clairement par là que vous approuvez ce que vos ancêtres ont fait : eux, ils ont tué les prophètes, et vous, vous bâtissez leurs tombeaux !'
  '49':
  - type: text
    content: ' '
  - type: text
    content: 'C’est bien pour cela que Dieu, dans sa sagesse, a déclaré : « Je leur enverrai des prophètes et des messagers ; ils tueront les uns, ils persécuteront les autres. »'
  - type: text
    content: ' '
  '5':
  - type: text
    content: 'Puis il ajouta : '
  - type: text
    content: 'Supposez que l’un de vous ait un ami et qu’il aille le réveiller en pleine nuit pour lui dire : « Mon ami, prête-moi trois pains,'
  - type: text
    content: ' '
  '50':
  - type: text
    content: C’est pourquoi les gens de notre temps auront à répondre du meurtre de tous les prophètes qui ont été tués depuis le commencement du monde,
  - type: text
    content: ' '
  '51':
  - type: text
    content: 'depuis le meurtre d’Abel, jusqu’à celui de Zacharie, assassiné entre l’autel du sacrifice et le '
  - type: text
    content: Temple
  - type: text
    content: . Oui, je vous l’assure, les hommes de notre temps auront à répondre de tous ces crimes.
  '52':
  - type: text
    content: ' '
  - type: text
    content: Malheur à vous, enseignants de la Loi, vous vous êtes emparés de la clé de la connaissance. Non seulement vous n’entrez pas vous-mêmes, mais vous empêchez d’entrer ceux qui voudraient le faire !
  '53':
  - type: text
    content: 'Quand Jésus fut sorti de la maison, les spécialistes de la Loi et les pharisiens s’acharnèrent contre lui et le harcelèrent de questions sur toutes sortes de sujets : '
  '54':
  - type: text
    content: ils lui tendaient ainsi des pièges pour trouver dans ses paroles un motif d’accusation.
  '6':
  - type: text
    content: car un de mes amis qui est en voyage vient d’arriver chez moi et je n’ai rien à lui offrir. »
  - type: text
    content: ' '
  '7':
  - type: text
    content: 'Supposons que l’autre, de l’intérieur de la maison, lui réponde : « Laisse-moi tranquille, ne me dérange pas, ma porte est fermée, mes enfants et moi nous sommes couchés, je ne peux pas me lever pour te les donner. »'
  '8':
  - type: text
    content: ' '
  - type: text
    content: Je vous assure que, même s’il ne se lève pas pour lui donner ces pains par amitié pour lui, il se lèvera pour ne pas manquer à l’honneur
  - type: text
    content: ' '
  - type: note
    content: 'Autre traduction : parce que l’autre le dérange.'
  - type: text
    content: ', et il lui donnera tout ce dont il a besoin.'
  - type: heading
    content: (Mt 7.7-11)
  '9':
  - type: text
    content: ' '
  - type: text
    content: 'Ainsi, moi je vous le dis : Demandez, et vous recevrez ; cherchez, et vous trouverez ; frappez, et l’on vous ouvrira.'
  - type: text
    content: ' '
