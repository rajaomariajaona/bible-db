document_id: LUK.11
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Comment prier
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: (Mt 6.9-13)
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Un jour, Jésus priait en un certain lieu. Quand il eut fini, l’un de ses disciples lui demanda : Seigneur, apprends-nous à prier, comme Jean l’a appris à ses disciples !'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Il leur répondit : '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'Quand vous priez, dites :'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Père,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: wj
    children:
    - type: text
      text: que ton nom soit sanctifié
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '11.2 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Autres traductions : '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'que tu sois reconnu pour Dieu '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'ou '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'que la gloire de ta personne soit manifeste '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'ou '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: que les hommes te rendent le culte qui t’est dû.
    marker-yv: yv-n
  - type: usfm
    marker: wj
    children:
    - type: text
      text: ','
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: wj
    children:
    - type: text
      text: que ton règne vienne.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: ' '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Donne-nous, chaque jour,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: wj
    children:
    - type: text
      text: le pain dont nous avons besoin
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '11.3 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Autres traductions : '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'la nourriture de ce jour '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'ou '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: du lendemain.
    marker-yv: yv-n
  - type: usfm
    marker: wj
    children:
    - type: text
      text: .
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: ' '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Pardonne-nous nos péchés,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: wj
    children:
    - type: text
      text: car nous pardonnons nous-mêmes
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: wj
    children:
    - type: text
      text: à ceux qui ont des torts envers nous.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Et ne nous expose pas à la tentation
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '11.4 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Autre traduction : '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: Garde-nous de céder à la tentation.
    marker-yv: yv-n
  - type: usfm
    marker: wj
    children:
    - type: text
      text: .
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Puis il ajouta : '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'Supposez que l’un de vous ait un ami et qu’il aille le réveiller en pleine nuit pour lui dire : « Mon ami, prête-moi trois pains,'
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: car un de mes amis qui est en voyage vient d’arriver chez moi et je n’ai rien à lui offrir. »
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'Supposons que l’autre, de l’intérieur de la maison, lui réponde : « Laisse-moi tranquille, ne me dérange pas, ma porte est fermée, mes enfants et moi nous sommes couchés, je ne peux pas me lever pour te les donner. »'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: ' '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Je vous assure que, même s’il ne se lève pas pour lui donner ces pains par amitié pour lui, il se lèvera pour ne pas manquer à l’honneur
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '11.8 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Autre traduction : '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: parce que l’autre le dérange.
    marker-yv: yv-n
  - type: usfm
    marker: wj
    children:
    - type: text
      text: ', et il lui donnera tout ce dont il a besoin.'
- type: usfm
  marker: r
  children:
  - type: text
    text: (Mt 7.7-11)
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: ' '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'Ainsi, moi je vous le dis : Demandez, et vous recevrez ; cherchez, et vous trouverez ; frappez, et l’on vous ouvrira.'
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Car celui qui demande reçoit ; celui qui cherche trouve ; et l’on ouvre à celui qui frappe.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: ' '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Il y a des pères parmi vous. Lequel d’entre vous donnera-t-il un serpent à son fils quand celui-ci lui demande un poisson
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '11.11 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Certains manuscrits ajoutent : '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: ou une pierre alors qu’il lui demande du pain.
    marker-yv: yv-n
  - type: usfm
    marker: wj
    children:
    - type: text
      text: '?'
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Ou encore, s’il demande un œuf, lui donnera-t-il un scorpion
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '11.12 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Voir note '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Lc 10.19
        metadata:
          usfm: LUK.10.19
      - type: text
        text: .
    marker-yv: yv-n
  - type: usfm
    marker: wj
    children:
    - type: text
      text: '?'
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Si donc, tout mauvais que vous êtes, vous savez donner de bonnes choses à vos enfants, à combien plus forte raison le Père céleste donnera-t-il l’Esprit Saint à ceux qui le lui demandent.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Dieu ou Satan ?
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: (Mt 12.22-30 ; Mc 3.20-27)
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Un jour, Jésus chassait un démon qui rendait un homme muet. Quand le démon fut sorti, le muet se mit à parler, et la foule était émerveillée. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Cependant quelques-uns disaient : C’est par le pouvoir de Béelzébul, le chef des démons, qu’il chasse les démons.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'D’autres, pour lui tendre un piège, lui réclamaient un signe venant du ciel. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Mais, comme il connaissait leurs pensées, il leur dit : '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Tout royaume déchiré par la guerre civile est dévasté et les maisons s’y écroulent l’une sur l’autre.
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'Vous prétendez que je chasse les démons par le pouvoir de Béelzébul. Mais si '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Satan
    - type: text
      text: ' est en conflit avec lui-même ; comment alors son royaume subsistera-t-il ?'
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'D’ailleurs, si moi je chasse les démons par Béelzébul, qui donc donne à vos '
    - type: usfm
      marker: w
      children:
      - type: text
        text: disciples
    - type: text
      text: ' le pouvoir de les chasser ? C’est pourquoi ils seront eux-mêmes vos juges.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: ' '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'Mais si c’est par la puissance de Dieu que je chasse les démons, alors, de toute évidence, le '
    - type: usfm
      marker: w
      children:
      - type: text
        text: royaume de Dieu
    - type: text
      text: ' est venu jusqu’à vous.'
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Tant qu’un homme fort et bien armé garde sa maison, ses biens sont en sécurité ;
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: mais si un autre, plus fort que lui, l’attaque et parvient à le maîtriser, il lui enlève toutes les armes sur lesquelles le premier comptait, lui prend tous ses biens et les distribue.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: ' '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Celui qui n’est pas avec moi est contre moi, et celui qui ne se joint pas à moi pour rassembler, disperse.
- type: usfm
  marker: r
  children:
  - type: text
    text: (Mt 12.43-45)
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: ' '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'Lorsqu’un esprit mauvais est sorti de quelqu’un, il erre çà et là dans des lieux déserts, à la recherche d’un lieu de repos, et il n’en trouve pas. Il se dit alors : « Mieux vaut regagner la demeure que j’ai quittée. »'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: ' '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Il y retourne donc et la trouve balayée et mise en ordre.
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Alors il va chercher sept autres esprits encore plus méchants que lui et les amène avec lui. Ils entrent dans la demeure et s’y installent. Finalement, la condition de cet homme est pire qu’avant.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'Pendant qu’il parlait ainsi, du milieu de la foule, une femme s’écria : Heureuse la femme qui t’a mis au monde et qui t’a allaité !'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'Mais Jésus répondit : '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Heureux plutôt ceux qui écoutent la Parole de Dieu et qui y obéissent !
- type: usfm
  marker: s1
  children:
  - type: text
    text: Signe et lumière
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: (Mt 12.38-42)
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'Comme la foule grossissait autour de lui, il dit : '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Les gens de notre temps sont mauvais. Ils réclament un signe miraculeux. Un signe… il ne leur en sera pas accordé d’autre que celui de Jonas.
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Car, de même que Jonas a été un signe pour les habitants de Ninive
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '11.30 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Voir '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Jon 3
        metadata:
          usfm: JON.3
      - type: text
        text: .
    marker-yv: yv-n
  - type: usfm
    marker: wj
    children:
    - type: text
      text: ', de même aussi le '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Fils de l’homme
    - type: text
      text: ' sera un signe pour les gens de notre temps.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: ' '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'Au jour du jugement, la reine du Midi se lèvera et condamnera les gens de notre temps, car elle est venue du bout du monde pour écouter l’enseignement plein de sagesse de '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Salomon
    - type: text
      text: . Or, il y a ici plus que Salomon !
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'Au jour du jugement, les habitants de Ninive se lèveront et condamneront les gens de notre temps, car ils ont '
    - type: usfm
      marker: w
      children:
      - type: text
        text: changé
    - type: text
      text: ' en réponse à la prédication de Jonas. Or, il y a ici plus que Jonas.'
- type: usfm
  marker: r
  children:
  - type: text
    text: (Mt 5.15 ; Mc 4.21)
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: ' '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Personne n’allume une lampe pour la mettre dans un recoin ou sous une mesure à grain
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '11.33 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Les mots : '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'ou sous une mesure à grain '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: sont absents de certains manuscrits (voir Mt 5.15 ; Mc 4.21).
    marker-yv: yv-n
  - type: usfm
    marker: wj
    children:
    - type: text
      text: . Non, on la place sur un pied de lampe pour que ceux qui entrent voient la lumière.
- type: usfm
  marker: r
  children:
  - type: text
    text: (Mt 6.22-23)
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: ' '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Tes yeux sont comme une lampe pour ton corps. Si tes yeux sont en bon état, tout ton corps jouit de la lumière ; mais s’ils sont malades, tout ton corps est plongé dans l’obscurité.
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Fais donc attention à ce que ta lumière ne soit pas obscurcie.
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Si ton corps tout entier est dans la lumière, sans aucune partie dans l’obscurité, il jouira pleinement de la lumière, comme lorsque la lampe t’éclaire de sa clarté.
- type: usfm
  marker: s1
  children:
  - type: text
    text: La condamnation des chefs religieux
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: (Mt 23.4-36)
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: 'Pendant qu’il parlait, un pharisien l’invita à venir manger chez lui. Jésus entra dans la maison et se mit à table. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: text
    text: Le pharisien remarqua qu’il n’avait pas fait les ablutions rituelles avant le repas, et il s’en étonna.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '39'
  - type: text
    text: 'Le Seigneur lui dit alors : '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Vous pharisiens, vous nettoyez soigneusement l’extérieur de vos coupes et de vos plats, mais à l’intérieur, vous êtes remplis du désir de voler et pleins de méchanceté.
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '40'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Fous que vous êtes ! Est-ce que celui qui a créé l’extérieur n’a pas aussi fait l’intérieur ?
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '41'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Donnez plutôt en offrande à Dieu votre être intérieur
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '11.41 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'D’autres comprennent : '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: donnez aux pauvres ce que vous avez.
    marker-yv: yv-n
  - type: usfm
    marker: wj
    children:
    - type: text
      text: ', et vous serez du même coup entièrement '
    - type: usfm
      marker: w
      children:
      - type: text
        text: purs
    - type: text
      text: .
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '42'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Mais malheur à vous, pharisiens, vous vous acquittez scrupuleusement de la dîme sur toutes les plus petites herbes, comme la menthe et la rue
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '11.42 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'La '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'rue '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: était une plante aromatique et médicinale cultivée en Israël.
    marker-yv: yv-n
  - type: usfm
    marker: wj
    children:
    - type: text
      text: ', et sur le moindre légume, mais vous négligez la droiture et l’amour de Dieu ! Voilà ce qu’il fallait faire, sans laisser le reste de côté.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '43'
  - type: text
    text: ' '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'Malheur à vous, pharisiens, parce que vous aimez les sièges d’honneur dans les '
    - type: usfm
      marker: w
      children:
      - type: text
        text: synagogues
    - type: text
      text: '  ; vous aimez qu’on vous salue respectueusement sur les places publiques.'
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '44'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Malheur à vous ! vous ressemblez à ces tombes que rien ne signale au regard et sur lesquelles on passe sans s’en douter
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '11.44 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Selon les rabbins, marcher sur un tombeau rendait impur.
    marker-yv: yv-n
  - type: usfm
    marker: wj
    children:
    - type: text
      text: .
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '45'
  - type: text
    text: 'Là-dessus, un enseignant de la Loi se mit à protester en disant : Maître, en parlant ainsi, tu nous insultes, nous aussi !'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '46'
  - type: text
    text: ' '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: – Oui, malheur à vous aussi, enseignants de la Loi,
  - type: text
    text: ' lui répondit Jésus, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: vous imposez aux gens des fardeaux accablants ; mais vous-mêmes, vous n’y touchez pas du petit doigt !
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '47'
  - type: text
    text: ' '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'Malheur à vous, parce que vous édifiez des monuments funéraires pour les '
    - type: usfm
      marker: w
      children:
      - type: text
        text: prophètes
    - type: text
      text: ', ces prophètes que vos ancêtres ont tués !'
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '48'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'Vous montrez clairement par là que vous approuvez ce que vos ancêtres ont fait : eux, ils ont tué les prophètes, et vous, vous bâtissez leurs tombeaux !'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '49'
  - type: text
    text: ' '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'C’est bien pour cela que Dieu, dans sa sagesse, a déclaré : « Je leur enverrai des prophètes et des messagers ; ils tueront les uns, ils persécuteront les autres. »'
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '50'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: C’est pourquoi les gens de notre temps auront à répondre du meurtre de tous les prophètes qui ont été tués depuis le commencement du monde,
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '51'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'depuis le meurtre d’Abel, jusqu’à celui de Zacharie, assassiné entre l’autel du sacrifice et le '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Temple
    - type: text
      text: . Oui, je vous l’assure, les hommes de notre temps auront à répondre de tous ces crimes.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '52'
  - type: text
    text: ' '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Malheur à vous, enseignants de la Loi, vous vous êtes emparés de la clé de la connaissance. Non seulement vous n’entrez pas vous-mêmes, mais vous empêchez d’entrer ceux qui voudraient le faire !
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '53'
  - type: text
    text: 'Quand Jésus fut sorti de la maison, les spécialistes de la Loi et les pharisiens s’acharnèrent contre lui et le harcelèrent de questions sur toutes sortes de sujets : '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '54'
  - type: text
    text: ils lui tendaient ainsi des pièges pour trouver dans ses paroles un motif d’accusation.
