document_id: 1KI.4,21
type_code: fra
verses:
  '1':
  - type: heading
    content: Les ministres de Salomon
  - type: text
    content: Le roi Salomon régnait sur tout Israël
  - type: note
    content: C’est-à-dire sur l’ensemble des douze tribus qui se sépareront après sa mort.
  - type: text
    content: '. '
  '10':
  - type: text
    content: Ben-Hésed à Aroubboth dont relevaient aussi Soko et tout le pays de Hépher.
  '11':
  - type: text
    content: Ben-Abinadab dans toute la contrée de Dor. Il avait épousé Taphath, une fille de Salomon.
  '12':
  - type: text
    content: Baana, fils d’Ahiloud, gouvernait Taanak et Meguiddo
  - type: note
    content: Taanak et Meguiddo se trouvaient près du mont Carmel. Le district englobait la riche plaine de Jizréel.
  - type: text
    content: ' et toute la région de Beth-Sheân qui est près de Tsartân au-dessous de Jizréel, depuis Beth-Sheân jusqu’à Abel-Mehola et jusqu’au-delà de Yoqmeam.'
  '13':
  - type: text
    content: Ben-Guéber résidait à Ramoth en Galaad ; il était responsable de la région des villages de Yaïr, fils de Manassé, en Galaad, et de la contrée d’Argob en Basan qui comprenait soixante grandes villes fortifiées, munies de remparts et fermées par des barres de bronze.
  '14':
  - type: text
    content: Ahinadab, fils d’Iddo, supervisait la région de Mahanaïm.
  '15':
  - type: text
    content: Ahimaats, celle de Nephtali. Lui aussi avait épousé une fille de Salomon nommée Basmath.
  '16':
  - type: text
    content: 'Baana, fils de Houshaï, était responsable en Aser et à Bealoth ; '
  '17':
  - type: text
    content: 'Josaphat, fils de Parouah, en Issacar ; '
  '18':
  - type: text
    content: 'Shimeï, fils d’Ela, en Benjamin ; '
  '19':
  - type: text
    content: Guéber, fils d’Ouri, dans la province de Galaad ; il gouvernait la contrée qui avait appartenu à Sihôn, roi des Amoréens, et à Og, roi du Basan
  - type: note
    content: Voir Nb 21.21-35. Leur territoire à l’est du Jourdain fut partagé entre les tribus de Ruben, de Gad et la demi-tribu de Manassé (Jos 12.1-6 ; 13.15-29).
  - type: text
    content: . Il y avait, de plus, un gouverneur qui supervisait tout le pays
  - type: note
    content: 'Autre traduction : il n’y avait qu’un gouverneur pour toute cette région.'
  - type: text
    content: .
  '2':
  - type: text
    content: 'Voici les ministres qui l’assistaient : Azaria, petit-fils du prêtre Tsadoq'
  - type: note
    content: Il était fils d’Ahimaats, un fils de Tsadoq (voir 2 S 15.27, 36 et 1 Ch 5.34). Sans doute Ahimaats était-il mort. Azaria restera grand-prêtre durant tout le règne de Salomon. Il présidera la dédicace du Temple.
  - type: text
    content: ', '
  '20':
  - type: text
    content: La population de Juda et d’Israël était alors aussi nombreuse que les grains de sable au bord de la mer. Ils avaient à manger et à boire et ils étaient dans la joie.
  '3':
  - type: text
    content: Elihoreph et Ahiya, fils de Shisha, étaient ses secrétaires ; Josaphat, fils d’Ahiloud, était archiviste
  - type: note
    content: La charge précise de cet archiviste ne nous est pas connue, mais elle dut être importante car on la retrouve durant toute l’histoire de la monarchie (2 R 18.18, 37 ; 2 Ch 34.8 ; Es 36.3, 11, 22). L’archiviste dut, entre autres, jouer le rôle d’historiographe, rédacteur des chroniques, chargé de consigner les événements importants du règne.
  - type: text
    content: '. '
  '4':
  - type: text
    content: 'Benaya, fils de Yehoyada, était le général en chef de l’armée, Tsadoq et Abiatar étaient prêtres ; '
  '5':
  - type: text
    content: 'Azaria, fils de Nathan, était chef des gouverneurs ; Zaboud, fils de Nathan, était prêtre et conseiller personnel du roi ; '
  '6':
  - type: text
    content: Ahishar était l’intendant du palais royal et Adoniram, fils d’Abda, était préposé à la surveillance des corvées.
  - type: heading
    content: Les douze provinces et leurs gouverneurs
  '7':
  - type: text
    content: 'Salomon nomma douze gouverneurs sur tout Israël. Ils étaient chargés de pourvoir à l’entretien du roi et de tout le personnel de son palais. Chacun d’eux assurait le ravitaillement un mois par an. '
  '8':
  - type: text
    content: 'Voici leurs noms : Ben-Hour exerçait sa fonction dans la région montagneuse d’Ephraïm'
  - type: note
    content: Partie centrale du pays, l’une des plus cultivées du pays d’Israël.
  - type: text
    content: .
  '9':
  - type: text
    content: Ben-Déqer dans la région de Maqats, à Shaalbim, à Beth-Shémesh, à Elôn et à Beth-Hanân.
