document_id: 1KI.4
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Les ministres de Salomon
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Le roi Salomon régnait sur tout Israël
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '4.1 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: C’est-à-dire sur l’ensemble des douze tribus qui se sépareront après sa mort.
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Voici les ministres qui l’assistaient : Azaria, petit-fils du prêtre Tsadoq'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '4.2 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Il était fils d’Ahimaats, un fils de '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'Tsadoq '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '(voir '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 2 S 15.27
        metadata:
          usfm: 2SA.15.27
      - type: text
        text: ', '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '36'
        metadata:
          usfm: 2SA.15.36
      - type: text
        text: ' et '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1 Ch 5.34
        metadata:
          usfm: 1CH.5.34
      - type: text
        text: '). Sans doute Ahimaats était-il mort. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'Azaria '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: restera grand-prêtre durant tout le règne de Salomon. Il présidera la dédicace du Temple.
    marker-yv: yv-n
  - type: text
    text: ', '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Elihoreph et Ahiya, fils de Shisha, étaient ses secrétaires ; Josaphat, fils d’Ahiloud, était archiviste
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '4.3 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'La charge précise de cet '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'archiviste '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ne nous est pas connue, mais elle dut être importante car on la retrouve durant toute l’histoire de la monarchie (2 R 18.18, 37 ; 2 Ch 34.8 ; Es 36.3, 11, 22). L’archiviste dut, entre autres, jouer le rôle d’historiographe, rédacteur des chroniques, chargé de consigner les événements importants du règne.
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Benaya, fils de Yehoyada, était le général en chef de l’armée, Tsadoq et Abiatar étaient prêtres ; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Azaria, fils de Nathan, était chef des gouverneurs ; Zaboud, fils de Nathan, était prêtre et conseiller personnel du roi ; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Ahishar était l’intendant du palais royal et Adoniram, fils d’Abda, était préposé à la surveillance des corvées.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Les douze provinces et leurs gouverneurs
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Salomon nomma douze gouverneurs sur tout Israël. Ils étaient chargés de pourvoir à l’entretien du roi et de tout le personnel de son palais. Chacun d’eux assurait le ravitaillement un mois par an. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Voici leurs noms : Ben-Hour exerçait sa fonction dans la région montagneuse d’Ephraïm'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '4.8 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Partie centrale du pays, l’une des plus cultivées du pays d’Israël.
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Ben-Déqer dans la région de Maqats, à Shaalbim, à Beth-Shémesh, à Elôn et à Beth-Hanân.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Ben-Hésed à Aroubboth dont relevaient aussi Soko et tout le pays de Hépher.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Ben-Abinadab dans toute la contrée de Dor. Il avait épousé Taphath, une fille de Salomon.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Baana, fils d’Ahiloud, gouvernait Taanak et Meguiddo
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '4.12 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Taanak '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'et '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'Meguiddo '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: se trouvaient près du mont Carmel. Le district englobait la riche plaine de Jizréel.
    marker-yv: yv-n
  - type: text
    text: ' et toute la région de Beth-Sheân qui est près de Tsartân au-dessous de Jizréel, depuis Beth-Sheân jusqu’à Abel-Mehola et jusqu’au-delà de Yoqmeam.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Ben-Guéber résidait à Ramoth en Galaad ; il était responsable de la région des villages de Yaïr, fils de Manassé, en Galaad, et de la contrée d’Argob en Basan qui comprenait soixante grandes villes fortifiées, munies de remparts et fermées par des barres de bronze.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Ahinadab, fils d’Iddo, supervisait la région de Mahanaïm.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Ahimaats, celle de Nephtali. Lui aussi avait épousé une fille de Salomon nommée Basmath.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Baana, fils de Houshaï, était responsable en Aser et à Bealoth ; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Josaphat, fils de Parouah, en Issacar ; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Shimeï, fils d’Ela, en Benjamin ; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Guéber, fils d’Ouri, dans la province de Galaad ; il gouvernait la contrée qui avait appartenu à Sihôn, roi des Amoréens, et à Og, roi du Basan
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '4.19 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Voir '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Nb 21.21-35
        metadata:
          usfm: NUM.21.21+NUM.21.22+NUM.21.23+NUM.21.24+NUM.21.25+NUM.21.26+NUM.21.27+NUM.21.28+NUM.21.29+NUM.21.30+NUM.21.31+NUM.21.32+NUM.21.33+NUM.21.34+NUM.21.35
      - type: text
        text: . Leur territoire à l’est du Jourdain fut partagé entre les tribus de Ruben, de Gad et la demi-tribu de Manassé (Jos 12.1-6 ; 13.15-29).
    marker-yv: yv-n
  - type: text
    text: . Il y avait, de plus, un gouverneur qui supervisait tout le pays
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '4.19 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Autre traduction : '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: il n’y avait qu’un gouverneur pour toute cette région.
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: La population de Juda et d’Israël était alors aussi nombreuse que les grains de sable au bord de la mer. Ils avaient à manger et à boire et ils étaient dans la joie.
