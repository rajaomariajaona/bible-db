document_id: ACT.20,21
type_code: fra
verses:
  '1':
  - type: heading
    content: Paul à Troas
  - type: text
    content: 'Quand le tumulte se fut apaisé, Paul convoqua les disciples pour les encourager. Puis il prit congé d’eux et partit pour la Macédoine. '
  '10':
  - type: text
    content: Paul descendit, se pencha vers lui
  - type: note
    content: 'Autre traduction : se précipita vers lui.'
  - type: text
    content: ', le prit dans ses bras et dit : Ne vous inquiétez pas ! Il est encore en vie.'
  '11':
  - type: text
    content: 'Il remonta, rompit le pain, mangea, et continua de parler jusqu’au point du jour. Puis il partit. '
  '12':
  - type: text
    content: Quant au jeune homme, il fut ramené chez lui indemne, au grand réconfort de tous.
  - type: heading
    content: Paul fait ses adieux aux responsables de l’Eglise d’Ephèse
  '13':
  - type: text
    content: 'Pour nous, nous avons pris les devants, et nous nous sommes embarqués sur un bateau qui nous a amenés à Assos, où nous devions prendre Paul, conformément à ce qu’il avait décidé. Car il voulait faire la route à pied jusque-là. '
  '14':
  - type: text
    content: 'Quand il nous eut rejoints à Assos, nous avons repris la mer ensemble. Après une escale à Mytilène, '
  '15':
  - type: text
    content: nous avons passé le lendemain au large de Chio. Le jour suivant, nous jetions l’ancre à Samos et, un jour plus tard
  - type: note
    content: 'Certains manuscrits précisent : après nous être arrêtés à Trogyllion.'
  - type: text
    content: ', nous abordions à Milet. '
  '16':
  - type: text
    content: 'Paul avait, en effet, décidé de dépasser Ephèse sans s’y arrêter pour ne pas risquer de s’attarder dans la province d’Asie. Il se hâtait pour être à Jérusalem, si possible, le jour de la Pentecôte. '
  '17':
  - type: text
    content: Pendant l’escale à Milet, il envoya quelqu’un à Ephèse pour demander aux responsables de l’Eglise de venir le rejoindre.
  '18':
  - type: text
    content: 'Quand ils furent arrivés auprès de lui, il leur dit :'
  - type: text
    content: 'Vous savez comment je me suis comporté pendant tout le temps que j’ai passé parmi vous, depuis le jour de mon arrivée dans la province d’Asie. '
  '19':
  - type: text
    content: 'J’ai servi le Seigneur en toute humilité, avec des larmes, au milieu d’épreuves suscitées par les complots des Juifs. '
  '2':
  - type: text
    content: 'En parcourant cette province, il eut de nombreuses occasions d’encourager les croyants. De là, il passa en Grèce '
  '20':
  - type: text
    content: 'Vous savez aussi que, sans rien vous cacher, je vous ai annoncé et enseigné tout ce qui pouvait vous être utile, soit publiquement, soit dans vos maisons. '
  '21':
  - type: text
    content: Sans cesse, j’ai appelé Juifs et Grecs à se tourner vers Dieu et à croire en Jésus, notre Seigneur.
  '22':
  - type: text
    content: 'Et maintenant, me voici en route pour Jérusalem. L’Esprit m’y oblige, mais j’ignore ce qui m’y arrivera. '
  '23':
  - type: text
    content: 'Tout ce que je sais, c’est que le Saint-Esprit m’avertit de ville en ville que je dois m’attendre à être emprisonné et à connaître bien des souffrances. '
  '24':
  - type: text
    content: 'Ma vie m’importe peu, je ne lui accorde aucun prix ; mon but c’est d’aller jusqu’au bout de ma course et d’accomplir pleinement le service que le Seigneur Jésus m’a confié c’est-à-dire de proclamer l’Evangile, ce message de la grâce de Dieu. '
  '25':
  - type: text
    content: 'Et maintenant, je le sais : vous tous, au milieu de qui j’ai passé en prêchant le royaume de Dieu, vous ne me reverrez plus. '
  '26':
  - type: text
    content: 'C’est pourquoi je vous le déclare solennellement aujourd’hui : je suis dégagé de toute responsabilité à votre égard, '
  '27':
  - type: text
    content: 'car je vous ai annoncé tout le plan de Dieu, sans rien passer sous silence. '
  '28':
  - type: text
    content: Veillez donc sur vous-mêmes et sur tout le troupeau de l’Eglise que le Saint-Esprit a confié à votre garde. Comme le berger le fait de son troupeau, prenez soin de l’Eglise de Dieu
  - type: note
    content: 'Certains manuscrits ont : l’Eglise du Seigneur.'
  - type: text
    content: ' qu’il s’est acquise par son sacrifice. '
  '29':
  - type: text
    content: 'Je le sais : quand je ne serai plus là, des loups féroces se glisseront parmi vous, et ils seront sans pitié pour le troupeau. '
  '3':
  - type: text
    content: 'où il demeura trois mois. Au moment où il allait s’embarquer pour la Syrie, il apprit que les Juifs avaient formé un complot contre lui. Il décida alors de repasser par la Macédoine. '
  '30':
  - type: text
    content: 'De vos propres rangs surgiront des hommes qui emploieront un langage mensonger pour se faire des disciples. '
  '31':
  - type: text
    content: Soyez donc vigilants ! Rappelez-vous que, pendant trois années, la nuit comme le jour, je n’ai cessé de vous conseiller un à un, et parfois même avec larmes.
  '32':
  - type: text
    content: 'Et maintenant il ne me reste plus qu’à vous confier à Dieu et à sa Parole de grâce. Il a le pouvoir de vous faire grandir dans la foi et de vous assurer l’héritage qu’il vous réserve avec tous les membres de son peuple saint. '
  '33':
  - type: text
    content: 'Je n’ai désiré ni l’argent, ni l’or, ni les vêtements de personne. '
  '34':
  - type: text
    content: 'Regardez mes mains : ce sont elles, vous le savez bien, qui ont pourvu à mes besoins et à ceux de mes compagnons. '
  '35':
  - type: text
    content: 'Je vous ai montré partout et toujours qu’il faut travailler ainsi pour aider les pauvres. Souvenons-nous de ce que le Seigneur Jésus lui-même a dit : '
  - type: text
    content: « Il y a plus de bonheur à donner qu’à recevoir
  - type: note
    content: Parole qui ne figure pas dans les évangiles et que la tradition orale a transmise à Paul.
  - type: text
    content: . »
  '36':
  - type: text
    content: 'Après avoir ainsi parlé, Paul se mit à genoux et pria avec eux. '
  '37':
  - type: text
    content: 'Tous, alors, éclatèrent en sanglots et ils se jetaient au cou de Paul pour l’embrasser. '
  '38':
  - type: text
    content: Ce qui les affligeait surtout, c’était de l’avoir entendu dire qu’ils ne le reverraient plus. Puis ils l’accompagnèrent jusqu’au bateau.
  '4':
  - type: text
    content: Ses compagnons
  - type: note
    content: 'Certains manuscrits ont : il avait pour l’accompagner jusque dans la province d’Asie.'
  - type: text
    content: ' étaient Sopater, fils de Pyrrhus, originaire de Bérée, Aristarque et Secondus de Thessalonique, Gaïus, de Derbé, Timothée, et enfin Tychique et Trophime de la province d’Asie. '
  '5':
  - type: text
    content: 'Ils prirent les devants pour aller nous attendre à Troas. '
  '6':
  - type: text
    content: Quant à nous, nous nous sommes embarqués à Philippes après la fête des Pains sans levain
  - type: note
    content: Voir Ex 12.14-20.
  - type: text
    content: ' et, après une traversée de cinq jours, nous les avons rejoints à Troas où nous avons passé une semaine.'
  '7':
  - type: text
    content: Le dimanche
  - type: note
    content: 'Autre traduction : le samedi soir.'
  - type: text
    content: ', nous'
  - type: note
    content: 'nous: voir note 16.10.'
  - type: text
    content: ' étions réunis pour rompre le pain'
  - type: note
    content: C’est-à-dire pour la cène, « le repas du Seigneur », qui se célébrait au cours d’un repas fraternel (voir 1 Co 11.18-34).
  - type: text
    content: '. Comme il devait partir le lendemain, Paul s’entretenait avec les assistants et prolongea son discours jusque vers minuit. '
  '8':
  - type: text
    content: 'Nous étions réunis à l’étage supérieur de la maison, éclairé par de nombreuses lampes. '
  '9':
  - type: text
    content: Un jeune homme nommé Eutychus s’était assis sur le rebord de la fenêtre et, comme Paul prolongeait encore l’entretien, il s’endormit profondément. Soudain, dans son sommeil, il perdit l’équilibre et tomba du troisième étage. Quand on le releva, il était mort.
