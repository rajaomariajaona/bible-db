document_id: ACT.20
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Paul à Troas
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Quand le tumulte se fut apaisé, Paul convoqua les disciples pour les encourager. Puis il prit congé d’eux et partit pour la Macédoine. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'En parcourant cette province, il eut de nombreuses occasions d’encourager les croyants. De là, il passa en Grèce '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'où il demeura trois mois. Au moment où il allait s’embarquer pour la Syrie, il apprit que les Juifs avaient formé un complot contre lui. Il décida alors de repasser par la Macédoine. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Ses compagnons
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '20.4 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Certains manuscrits ont : '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: il avait pour l’accompagner jusque dans la province d’Asie.
    marker-yv: yv-n
  - type: text
    text: ' étaient Sopater, fils de Pyrrhus, originaire de Bérée, Aristarque et Secondus de Thessalonique, Gaïus, de Derbé, Timothée, et enfin Tychique et Trophime de la province d’Asie. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Ils prirent les devants pour aller nous attendre à Troas. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Quant à nous, nous nous sommes embarqués à Philippes après la fête des Pains sans levain
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '20.6 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Voir '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ex 12.14-20
        metadata:
          usfm: EXO.12.14+EXO.12.15+EXO.12.16+EXO.12.17+EXO.12.18+EXO.12.19+EXO.12.20
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: ' et, après une traversée de cinq jours, nous les avons rejoints à Troas où nous avons passé une semaine.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Le dimanche
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '20.7 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Autre traduction : '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: le samedi soir.
    marker-yv: yv-n
  - type: text
    text: ', nous'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '20.7 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: nous
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: ': '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'voir note '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '16.10'
        metadata:
          usfm: ACT.16.10
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: ' étions réunis pour rompre le pain'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '20.7 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'C’est-à-dire pour la cène, « le repas du Seigneur », qui se célébrait au cours d’un repas fraternel (voir '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1 Co 11.18-34
        metadata:
          usfm: 1CO.11.18+1CO.11.19+1CO.11.20+1CO.11.21+1CO.11.22+1CO.11.23+1CO.11.24+1CO.11.25+1CO.11.26+1CO.11.27+1CO.11.28+1CO.11.29+1CO.11.30+1CO.11.31+1CO.11.32+1CO.11.33+1CO.11.34
      - type: text
        text: ).
    marker-yv: yv-n
  - type: text
    text: '. Comme il devait partir le lendemain, Paul s’entretenait avec les assistants et prolongea son discours jusque vers minuit. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Nous étions réunis à l’étage supérieur de la maison, éclairé par de nombreuses lampes. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Un jeune homme nommé Eutychus s’était assis sur le rebord de la fenêtre et, comme Paul prolongeait encore l’entretien, il s’endormit profondément. Soudain, dans son sommeil, il perdit l’équilibre et tomba du troisième étage. Quand on le releva, il était mort.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Paul descendit, se pencha vers lui
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '20.10 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Autre traduction : '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: se précipita vers lui.
    marker-yv: yv-n
  - type: text
    text: ', le prit dans ses bras et dit : Ne vous inquiétez pas ! Il est encore en vie.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Il remonta, rompit le pain, mangea, et continua de parler jusqu’au point du jour. Puis il partit. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Quant au jeune homme, il fut ramené chez lui indemne, au grand réconfort de tous.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Paul fait ses adieux aux responsables de l’Eglise d’Ephèse
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Pour nous, nous avons pris les devants, et nous nous sommes embarqués sur un bateau qui nous a amenés à Assos, où nous devions prendre Paul, conformément à ce qu’il avait décidé. Car il voulait faire la route à pied jusque-là. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Quand il nous eut rejoints à Assos, nous avons repris la mer ensemble. Après une escale à Mytilène, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: nous avons passé le lendemain au large de Chio. Le jour suivant, nous jetions l’ancre à Samos et, un jour plus tard
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '20.15 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Certains manuscrits précisent : '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: après nous être arrêtés à Trogyllion.
    marker-yv: yv-n
  - type: text
    text: ', nous abordions à Milet. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Paul avait, en effet, décidé de dépasser Ephèse sans s’y arrêter pour ne pas risquer de s’attarder dans la province d’Asie. Il se hâtait pour être à Jérusalem, si possible, le jour de la Pentecôte. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Pendant l’escale à Milet, il envoya quelqu’un à Ephèse pour demander aux responsables de l’Eglise de venir le rejoindre.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Quand ils furent arrivés auprès de lui, il leur dit :'
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Vous savez comment je me suis comporté pendant tout le temps que j’ai passé parmi vous, depuis le jour de mon arrivée dans la province d’Asie. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'J’ai servi le Seigneur en toute humilité, avec des larmes, au milieu d’épreuves suscitées par les complots des Juifs. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Vous savez aussi que, sans rien vous cacher, je vous ai annoncé et enseigné tout ce qui pouvait vous être utile, soit publiquement, soit dans vos maisons. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Sans cesse, j’ai appelé Juifs et Grecs à se tourner vers Dieu et à croire en Jésus, notre Seigneur.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Et maintenant, me voici en route pour Jérusalem. L’Esprit m’y oblige, mais j’ignore ce qui m’y arrivera. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Tout ce que je sais, c’est que le Saint-Esprit m’avertit de ville en ville que je dois m’attendre à être emprisonné et à connaître bien des souffrances. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Ma vie m’importe peu, je ne lui accorde aucun prix ; mon but c’est d’aller jusqu’au bout de ma course et d’accomplir pleinement le service que le Seigneur Jésus m’a confié c’est-à-dire de proclamer l’Evangile, ce message de la grâce de Dieu. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Et maintenant, je le sais : vous tous, au milieu de qui j’ai passé en prêchant le royaume de Dieu, vous ne me reverrez plus. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'C’est pourquoi je vous le déclare solennellement aujourd’hui : je suis dégagé de toute responsabilité à votre égard, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'car je vous ai annoncé tout le plan de Dieu, sans rien passer sous silence. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: Veillez donc sur vous-mêmes et sur tout le troupeau de l’Eglise que le Saint-Esprit a confié à votre garde. Comme le berger le fait de son troupeau, prenez soin de l’Eglise de Dieu
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '20.28 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Certains manuscrits ont : '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: l’Eglise du Seigneur.
    marker-yv: yv-n
  - type: text
    text: ' qu’il s’est acquise par son sacrifice. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'Je le sais : quand je ne serai plus là, des loups féroces se glisseront parmi vous, et ils seront sans pitié pour le troupeau. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'De vos propres rangs surgiront des hommes qui emploieront un langage mensonger pour se faire des disciples. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: Soyez donc vigilants ! Rappelez-vous que, pendant trois années, la nuit comme le jour, je n’ai cessé de vous conseiller un à un, et parfois même avec larmes.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'Et maintenant il ne me reste plus qu’à vous confier à Dieu et à sa Parole de grâce. Il a le pouvoir de vous faire grandir dans la foi et de vous assurer l’héritage qu’il vous réserve avec tous les membres de son peuple saint. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: 'Je n’ai désiré ni l’argent, ni l’or, ni les vêtements de personne. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: 'Regardez mes mains : ce sont elles, vous le savez bien, qui ont pourvu à mes besoins et à ceux de mes compagnons. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: 'Je vous ai montré partout et toujours qu’il faut travailler ainsi pour aider les pauvres. Souvenons-nous de ce que le Seigneur Jésus lui-même a dit : '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: « Il y a plus de bonheur à donner qu’à recevoir
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '20.35 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Parole qui ne figure pas dans les évangiles et que la tradition orale a transmise à Paul.
    marker-yv: yv-n
  - type: usfm
    marker: wj
    children:
    - type: text
      text: . »
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: 'Après avoir ainsi parlé, Paul se mit à genoux et pria avec eux. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: 'Tous, alors, éclatèrent en sanglots et ils se jetaient au cou de Paul pour l’embrasser. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: text
    text: Ce qui les affligeait surtout, c’était de l’avoir entendu dire qu’ils ne le reverraient plus. Puis ils l’accompagnèrent jusqu’au bateau.
