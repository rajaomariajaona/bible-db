document_id: NUM.19
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: L’eau de purification
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'L’Eternel parla à Moïse et à Aaron, en ces termes : '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Voici ce que prescrit la Loi de l’Eternel : Demandez aux Israélites de vous amener une vache rousse, sans défaut et sans tache, qui n’ait pas encore porté le joug. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Vous la remettrez au prêtre Eléazar. Celui-ci la mènera à l’extérieur du camp et on l’immolera en sa présence. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Il prendra du sang de la vache avec son doigt, et il en fera sept fois l’aspersion en direction de l’entrée de la tente de la Rencontre. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Puis on brûlera la vache sous ses yeux : peau, chair, sang et excréments. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Ensuite, le prêtre prendra du bois de cèdre, de l’hysope et un fil de laine teint en rouge éclatant, et il les jettera au milieu des flammes où se consume la vache. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Après cela, il lavera ses vêtements et se baignera avant de rentrer dans le camp ; néanmoins il sera rituellement impur jusqu’au soir. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Celui qui aura brûlé la vache lavera aussi ses vêtements et se baignera, et il sera impur jusqu’au soir. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Un homme rituellement pur recueillera les cendres de la vache et les déposera hors du camp dans un endroit pur où elles seront conservées pour la communauté des Israélites pour la préparation de l’eau de purification. Cela équivaut à un sacrifice pour le péché
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '19.9 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Allusion en '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Hé 9.13
        metadata:
          usfm: HEB.9.13
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Celui qui aura recueilli les cendres de la vache lavera aussi ses vêtements et sera impur jusqu’au soir. Ce sera, pour les Israélites aussi bien que pour l’immigré installé au milieu d’eux, une ordonnance en vigueur à perpétuité.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Celui qui touchera le cadavre d’un homme, quel qu’il soit, sera rituellement impur pendant sept jours. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: S’il se purifie le troisième et le septième jour avec cette eau, il sera pur
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '19.12 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'D’après les versions anciennes. Le texte hébreu traditionnel a : '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: s’il se purifie le troisième jour avec cette eau, le septième jour, il sera pur.
    marker-yv: yv-n
  - type: text
    text: ', sinon il restera impur. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Si quelqu’un touche un cadavre et néglige de se purifier, il souille le tabernacle de l’Eternel. Cet homme sera retranché d’Israël, parce que l’eau de purification n’a pas été répandue sur lui ; il est encore souillé, son impureté reste attachée à lui.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Voici la loi qu’il convient de suivre si quelqu’un meurt dans une tente : tous ceux qui entrent dans la tente comme tous ceux qui se trouvent déjà dans la tente seront impurs pendant sept jours. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Tout récipient ouvert sur lequel il n’y a pas de couvercle attaché sera impur. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Si quelqu’un touche dans les champs le cadavre d’un homme tué par un autre ou mort naturellement, ou bien butte sur des ossements humains ou sur une tombe, il sera impur pendant sept jours. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Pour le purifier, on prendra des cendres de la vache consumée en sacrifice pour le péché, on les mettra dans un récipient et l’on versera dessus de l’eau de source. '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Un homme en état de pureté prendra une branche d’hysope et la trempera dans l’eau, en aspergera la tente où quelqu’un est mort, ainsi que tous les ustensiles et toutes les personnes qui s’y trouvaient. Il fera de même pour celui qui a touché des ossements, le cadavre d’un homme tué par un autre ou mort naturellement, ou une tombe. '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: L’homme pur aspergera celui qui est souillé le troisième et le septième jour. Le septième jour, il le purifiera entièrement de sa faute. L’homme impur lavera ses vêtements et se baignera ; et le soir, il sera pur.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Mais si l’homme qui s’est souillé néglige de se purifier ainsi, il sera retranché de la communauté, car il souille le sanctuaire de l’Eternel. Puisque l’eau de purification n’a pas été répandue sur lui, il reste impur. '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Ce sera pour eux une ordonnance en vigueur à perpétuité. Celui qui aura fait l’aspersion de l’eau de purification lavera ses vêtements, et celui qui touchera cette eau sera impur jusqu’au soir. '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: Tout ce que touchera l’homme impur sera impur, et la personne qui le touchera sera impure jusqu’au soir.
