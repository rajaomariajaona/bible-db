document_id: EXO.38
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: L’autel des holocaustes et ses accessoires
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '38.1 titre '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Pour les v. 1-7, voir '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 27.1-8
        metadata:
          usfm: EXO.27.1+EXO.27.2+EXO.27.3+EXO.27.4+EXO.27.5+EXO.27.6+EXO.27.7+EXO.27.8
      - type: text
        text: '. En hébreu, les mesures sont en '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'coudées '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: (une coudée = 50 cm).
    marker-yv: yv-n
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Betsaléel fit l’autel des holocaustes en bois d’acacia, carré, de deux mètres cinquante de côté, et d’un mètre cinquante de hauteur. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'A ses quatre angles, il fit quatre cornes en saillie de l’autel, et il le plaqua de bronze. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Il fabriqua aussi en bronze tous les ustensiles de l’autel : les récipients destinés à recueillir les cendres, les pelles, les bassines, les fourchettes et les brasiers. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Il munit l’autel d’une grille faite d’un treillis de bronze et la plaça sous la bordure de l’autel, depuis le bas jusqu’à mi-hauteur. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Il fondit quatre anneaux qu’il fixa aux quatre coins de la grille de bronze pour recevoir les barres. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Il fit des barres en bois d’acacia et les recouvrit de bronze. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Il introduisit dans les anneaux sur les côtés de l’autel les barres qui devaient servir à le transporter ; il le fit avec des panneaux et l’autel était creux à l’intérieur.
- type: usfm
  marker: s1
  children:
  - type: text
    text: La cuve de bronze
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '38.8 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Voir '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 30.17-21
        metadata:
          usfm: EXO.30.17+EXO.30.18+EXO.30.19+EXO.30.20+EXO.30.21
      - type: text
        text: .
    marker-yv: yv-n
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Il fit aussi la cuve de bronze avec son socle de même métal en employant les miroirs des femmes qui s’assemblaient à l’entrée de la tente de la Rencontre.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Le parvis
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '38.9 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Pour les v. 9-20, voir '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 27.9-19
        metadata:
          usfm: EXO.27.9+EXO.27.10+EXO.27.11+EXO.27.12+EXO.27.13+EXO.27.14+EXO.27.15+EXO.27.16+EXO.27.17+EXO.27.18+EXO.27.19
      - type: text
        text: .
    marker-yv: yv-n
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Après cela, il fabriqua le parvis. Du côté sud, sur une longueur de cinquante mètres, il était délimité par des tentures de lin retors. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Elles étaient soutenues par vingt piliers, reposant sur vingt socles de bronze et munis de crochets et de tringles en argent. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Du côté nord, il y avait également cinquante mètres de tentures soutenues par vingt piliers reposant sur vingt socles de bronze et munis de crochets et de tringles en argent. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'A l’ouest, vingt-cinq mètres de tentures, soutenues par dix piliers reposant sur dix socles et munis de crochets et de tringles en argent. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Du côté est, le parvis avait aussi vingt-cinq mètres de largeur. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 14-15
  - type: text
    text: 'De chaque côté de la porte, sur sept mètres cinquante, il fit des tentures soutenues par trois piliers reposant sur leurs trois socles. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Toutes les tentures formant l’enceinte du parvis étaient en fin lin retors. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Les socles des piliers étaient de bronze, mais leurs crochets et les tringles qui les reliaient étaient en argent ainsi que leurs chapiteaux. Toutes les colonnes du parvis étaient équipées de tringles d’argent. '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Le rideau de la porte du parvis était un ouvrage brodé en fils de pourpre violette et écarlate, de rouge éclatant et de fin lin retors ; il avait dix mètres de long et deux mètres cinquante de haut comme les tentures du parvis. '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Ses quatre piliers et leurs quatre socles étaient en bronze, leurs crochets et leurs tringles en argent, et leurs chapiteaux étaient revêtus d’argent. '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Tous les piquets du tabernacle et ceux du parvis étaient faits de bronze.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Les comptes
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '38.21 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'En hébreu, les poids sont en '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'talents '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '(un talent = 300 sicles) et en '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'sicles '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: (un sicle = 11,4 g).
    marker-yv: yv-n
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Voici les comptes du tabernacle, de la Demeure de l’acte de l’alliance, établis sur l’ordre de Moïse, par les soins des lévites, sous la direction d’Itamar, fils du prêtre Aaron. '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Betsaléel, fils d’Ouri, descendant de Hour, de la tribu de Juda, fit tout ce que l’Eternel avait ordonné à Moïse, '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: assisté par Oholiab, fils d’Ahisamak de la tribu de Dan qui était sculpteur, concepteur et brodeur en pourpre violette et écarlate, en rouge éclatant et en fin lin.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Quantité d’or utilisée pour la construction et tous les ouvrages du sanctuaire, or qui avait été présenté à l’Eternel : 1 000 kilogrammes, pesé selon l’unité de poids (le sicle) en vigueur au sanctuaire. '
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'L’argent apporté par les membres de la communauté dont on fit le recensement pesait 3 440 kilogrammes, selon l’unité de poids en vigueur au sanctuaire, '
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: ce qui représentait une demi-unité de poids, soit 5,7 grammes par tête pour tous les hommes de vingt ans et au-dessus qui furent recensés, c’est-à-dire 603 550 hommes
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '38.26 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Pour les v. 25-26, voir '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 30.11-16
        metadata:
          usfm: EXO.30.11+EXO.30.12+EXO.30.13+EXO.30.14+EXO.30.15+EXO.30.16
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: '3 420 kilogrammes furent utilisés pour les cent socles du sanctuaire et ceux du voile, soit 34,20 kilogrammes par socle. '
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'Les 20 kilogrammes restants furent utilisés pour les crochets et les tringles reliant les piliers, ainsi que pour le revêtement des chapiteaux. '
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'Le peuple avait présenté à l’Eternel 2 421 kilogrammes de bronze. '
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'On en fit les socles de l’entrée de la tente de la Rencontre et l’autel de bronze avec sa grille et tous ses ustensiles, '
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: les socles du parvis tout autour, ceux de l’entrée du parvis et tous les piquets du tabernacle et du parvis.
