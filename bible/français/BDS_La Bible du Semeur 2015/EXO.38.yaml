document_id: EXO.38,21
type_code: fra
verses:
  '1':
  - type: heading
    content: L’autel des holocaustes et ses accessoiresPour les v. 1-7, voir 27.1-8. En hébreu, les mesures sont en coudées (une coudée = 50 cm).
  - type: text
    content: 'Betsaléel fit l’autel des holocaustes en bois d’acacia, carré, de deux mètres cinquante de côté, et d’un mètre cinquante de hauteur. '
  '10':
  - type: text
    content: 'Elles étaient soutenues par vingt piliers, reposant sur vingt socles de bronze et munis de crochets et de tringles en argent. '
  '11':
  - type: text
    content: 'Du côté nord, il y avait également cinquante mètres de tentures soutenues par vingt piliers reposant sur vingt socles de bronze et munis de crochets et de tringles en argent. '
  '12':
  - type: text
    content: 'A l’ouest, vingt-cinq mètres de tentures, soutenues par dix piliers reposant sur dix socles et munis de crochets et de tringles en argent. '
  '13':
  - type: text
    content: 'Du côté est, le parvis avait aussi vingt-cinq mètres de largeur. '
  '14':
  - type: text
    content: 'De chaque côté de la porte, sur sept mètres cinquante, il fit des tentures soutenues par trois piliers reposant sur leurs trois socles. '
  '16':
  - type: text
    content: 'Toutes les tentures formant l’enceinte du parvis étaient en fin lin retors. '
  '17':
  - type: text
    content: 'Les socles des piliers étaient de bronze, mais leurs crochets et les tringles qui les reliaient étaient en argent ainsi que leurs chapiteaux. Toutes les colonnes du parvis étaient équipées de tringles d’argent. '
  '18':
  - type: text
    content: 'Le rideau de la porte du parvis était un ouvrage brodé en fils de pourpre violette et écarlate, de rouge éclatant et de fin lin retors ; il avait dix mètres de long et deux mètres cinquante de haut comme les tentures du parvis. '
  '19':
  - type: text
    content: 'Ses quatre piliers et leurs quatre socles étaient en bronze, leurs crochets et leurs tringles en argent, et leurs chapiteaux étaient revêtus d’argent. '
  '2':
  - type: text
    content: 'A ses quatre angles, il fit quatre cornes en saillie de l’autel, et il le plaqua de bronze. '
  '20':
  - type: text
    content: Tous les piquets du tabernacle et ceux du parvis étaient faits de bronze.
  - type: heading
    content: Les comptesEn hébreu, les poids sont en talents (un talent = 300 sicles) et en sicles (un sicle = 11,4 g).
  '21':
  - type: text
    content: 'Voici les comptes du tabernacle, de la Demeure de l’acte de l’alliance, établis sur l’ordre de Moïse, par les soins des lévites, sous la direction d’Itamar, fils du prêtre Aaron. '
  '22':
  - type: text
    content: 'Betsaléel, fils d’Ouri, descendant de Hour, de la tribu de Juda, fit tout ce que l’Eternel avait ordonné à Moïse, '
  '23':
  - type: text
    content: assisté par Oholiab, fils d’Ahisamak de la tribu de Dan qui était sculpteur, concepteur et brodeur en pourpre violette et écarlate, en rouge éclatant et en fin lin.
  '24':
  - type: text
    content: 'Quantité d’or utilisée pour la construction et tous les ouvrages du sanctuaire, or qui avait été présenté à l’Eternel : 1 000 kilogrammes, pesé selon l’unité de poids (le sicle) en vigueur au sanctuaire. '
  '25':
  - type: text
    content: 'L’argent apporté par les membres de la communauté dont on fit le recensement pesait 3 440 kilogrammes, selon l’unité de poids en vigueur au sanctuaire, '
  '26':
  - type: text
    content: ce qui représentait une demi-unité de poids, soit 5,7 grammes par tête pour tous les hommes de vingt ans et au-dessus qui furent recensés, c’est-à-dire 603 550 hommes
  - type: note
    content: Pour les v. 25-26, voir 30.11-16.
  - type: text
    content: '. '
  '27':
  - type: text
    content: '3 420 kilogrammes furent utilisés pour les cent socles du sanctuaire et ceux du voile, soit 34,20 kilogrammes par socle. '
  '28':
  - type: text
    content: 'Les 20 kilogrammes restants furent utilisés pour les crochets et les tringles reliant les piliers, ainsi que pour le revêtement des chapiteaux. '
  '29':
  - type: text
    content: 'Le peuple avait présenté à l’Eternel 2 421 kilogrammes de bronze. '
  '3':
  - type: text
    content: 'Il fabriqua aussi en bronze tous les ustensiles de l’autel : les récipients destinés à recueillir les cendres, les pelles, les bassines, les fourchettes et les brasiers. '
  '30':
  - type: text
    content: 'On en fit les socles de l’entrée de la tente de la Rencontre et l’autel de bronze avec sa grille et tous ses ustensiles, '
  '31':
  - type: text
    content: les socles du parvis tout autour, ceux de l’entrée du parvis et tous les piquets du tabernacle et du parvis.
  '4':
  - type: text
    content: 'Il munit l’autel d’une grille faite d’un treillis de bronze et la plaça sous la bordure de l’autel, depuis le bas jusqu’à mi-hauteur. '
  '5':
  - type: text
    content: 'Il fondit quatre anneaux qu’il fixa aux quatre coins de la grille de bronze pour recevoir les barres. '
  '6':
  - type: text
    content: 'Il fit des barres en bois d’acacia et les recouvrit de bronze. '
  '7':
  - type: text
    content: Il introduisit dans les anneaux sur les côtés de l’autel les barres qui devaient servir à le transporter ; il le fit avec des panneaux et l’autel était creux à l’intérieur.
  - type: heading
    content: La cuve de bronzeVoir 30.17-21.
  '8':
  - type: text
    content: Il fit aussi la cuve de bronze avec son socle de même métal en employant les miroirs des femmes qui s’assemblaient à l’entrée de la tente de la Rencontre.
  - type: heading
    content: Le parvisPour les v. 9-20, voir 27.9-19.
  '9':
  - type: text
    content: 'Après cela, il fabriqua le parvis. Du côté sud, sur une longueur de cinquante mètres, il était délimité par des tentures de lin retors. '
