document_id: HEB.5
type_code: fra
segments:
- type: usfm
  marker: ms1
  children:
  - type: text
    text: Le ministère sacerdotal de Christ
  marker-yv: yv-h
- type: usfm
  marker: s1
  children:
  - type: text
    text: Christ, grand-prêtre et auteur du salut des siens
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Tout grand-prêtre est pris parmi les hommes et il est établi en faveur des hommes pour leurs relations avec Dieu. Il est chargé de présenter à Dieu des offrandes et des sacrifices pour les péchés. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Il peut avoir de la compréhension pour ceux qui sont dans l’ignorance et qui s’égarent, parce qu’il est lui aussi exposé à la faiblesse. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: A cause de cette faiblesse, il doit offrir des sacrifices, non seulement pour les péchés du peuple, mais aussi, de la même manière, pour les siens propres.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'De plus, on ne s’attribue pas, de sa propre initiative, l’honneur d’être grand-prêtre : on le reçoit en y étant appelé par Dieu, comme ce fut le cas pour Aaron. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Il en est de même pour Christ. Ce n’est pas lui qui s’est attribué, de son propre chef, l’honneur de devenir grand-prêtre, mais c’est Dieu qui lui a déclaré :'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: qt
    children:
    - type: text
      text: Tu es mon Fils ; aujourd’hui,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: qt
    children:
    - type: text
      text: je fais de toi mon enfant
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '5.5 '
    - type: usfm
      marker: ft
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ps 2.7
        metadata:
          usfm: PSA.2.7
      - type: text
        text: ' .'
    marker-yv: yv-n
  - type: usfm
    marker: qt
    children:
    - type: text
      text: .
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Et, dans un autre passage :'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: qt
    children:
    - type: text
      text: 'Tu seras '
    - type: usfm
      marker: w
      children:
      - type: text
        text: prêtre
    - type: text
      text: ' pour toujours'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: qt
    children:
    - type: text
      text: selon la ligne de Melchisédek
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '5.6 '
    - type: usfm
      marker: ft
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ps 110.4
        metadata:
          usfm: PSA.110.4
      - type: text
        text: ' .'
    marker-yv: yv-n
  - type: usfm
    marker: qt
    children:
    - type: text
      text: .
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Ainsi, au cours de sa vie sur terre, Jésus, avec de grands cris et des larmes, a présenté des prières et des supplications à celui qui pouvait le sauver de la mort, et il a été exaucé, à cause de sa soumission à Dieu
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '5.7 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Ce passage se rapporte à l’agonie de Jésus à Gethsémané (
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Mt 26.36-46
        metadata:
          usfm: MAT.26.36+MAT.26.37+MAT.26.38+MAT.26.39+MAT.26.40+MAT.26.41+MAT.26.42+MAT.26.43+MAT.26.44+MAT.26.45+MAT.26.46
      - type: text
        text: ).
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Bien qu’étant Fils de Dieu, il a appris l’obéissance par tout ce qu’il a souffert. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Et c’est parce qu’il a été ainsi amené à la perfection qu’il est devenu, pour tous ceux qui lui obéissent, l’auteur d’un salut éternel : '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Dieu, en effet, l’a déclaré grand-prêtre '
  - type: usfm
    marker: qt
    children:
    - type: text
      text: selon la ligne de Melchisédek.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Recevoir une nourriture pour adultes
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: C’est un sujet sur lequel nous avons bien des choses à dire, et qui sont difficiles à expliquer ; car vous êtes devenus lents à comprendre.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'En effet, après tout ce temps, vous devriez être des maîtres dans les choses de Dieu ; or vous avez de nouveau besoin qu’on vous enseigne les rudiments des paroles de Dieu. Vous en êtes venus au point d’avoir besoin, non de nourriture solide, mais de lait. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Celui qui continue à se nourrir de lait n’a aucune expérience de la parole qui enseigne ce qu’est la vie juste : car c’est encore un bébé. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Les adultes, quant à eux, prennent de la nourriture solide : par la pratique'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '5.14 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'par la pratique. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Autre traduction : '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: en raison de leurs dispositions.
    marker-yv: yv-n
  - type: text
    text: ', ils ont exercé leurs facultés à distinguer ce qui est bien de ce qui est mal.'
