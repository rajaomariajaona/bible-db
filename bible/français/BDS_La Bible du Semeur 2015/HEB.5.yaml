document_id: HEB.5,21
type_code: fra
verses:
  '1':
  - type: heading
    content: Le ministère sacerdotal de Christ
  - type: heading
    content: Christ, grand-prêtre et auteur du salut des siens
  - type: text
    content: 'Tout grand-prêtre est pris parmi les hommes et il est établi en faveur des hommes pour leurs relations avec Dieu. Il est chargé de présenter à Dieu des offrandes et des sacrifices pour les péchés. '
  '10':
  - type: text
    content: 'Dieu, en effet, l’a déclaré grand-prêtre '
  - type: text
    content: selon la ligne de Melchisédek.
  - type: heading
    content: Recevoir une nourriture pour adultes
  '11':
  - type: text
    content: C’est un sujet sur lequel nous avons bien des choses à dire, et qui sont difficiles à expliquer ; car vous êtes devenus lents à comprendre.
  '12':
  - type: text
    content: 'En effet, après tout ce temps, vous devriez être des maîtres dans les choses de Dieu ; or vous avez de nouveau besoin qu’on vous enseigne les rudiments des paroles de Dieu. Vous en êtes venus au point d’avoir besoin, non de nourriture solide, mais de lait. '
  '13':
  - type: text
    content: 'Celui qui continue à se nourrir de lait n’a aucune expérience de la parole qui enseigne ce qu’est la vie juste : car c’est encore un bébé. '
  '14':
  - type: text
    content: 'Les adultes, quant à eux, prennent de la nourriture solide : par la pratique'
  - type: note
    content: 'par la pratique. Autre traduction : en raison de leurs dispositions.'
  - type: text
    content: ', ils ont exercé leurs facultés à distinguer ce qui est bien de ce qui est mal.'
  '2':
  - type: text
    content: 'Il peut avoir de la compréhension pour ceux qui sont dans l’ignorance et qui s’égarent, parce qu’il est lui aussi exposé à la faiblesse. '
  '3':
  - type: text
    content: A cause de cette faiblesse, il doit offrir des sacrifices, non seulement pour les péchés du peuple, mais aussi, de la même manière, pour les siens propres.
  '4':
  - type: text
    content: 'De plus, on ne s’attribue pas, de sa propre initiative, l’honneur d’être grand-prêtre : on le reçoit en y étant appelé par Dieu, comme ce fut le cas pour Aaron. '
  '5':
  - type: text
    content: 'Il en est de même pour Christ. Ce n’est pas lui qui s’est attribué, de son propre chef, l’honneur de devenir grand-prêtre, mais c’est Dieu qui lui a déclaré :'
  - type: text
    content: Tu es mon Fils ; aujourd’hui,
  - type: text
    content: je fais de toi mon enfant
  - type: text
    content: ' '
  - type: note
    content: Ps 2.7 .
  - type: text
    content: .
  '6':
  - type: text
    content: 'Et, dans un autre passage :'
  - type: text
    content: 'Tu seras '
  - type: text
    content: prêtre
  - type: text
    content: ' pour toujours'
  - type: text
    content: selon la ligne de Melchisédek
  - type: text
    content: ' '
  - type: note
    content: Ps 110.4 .
  - type: text
    content: .
  '7':
  - type: text
    content: Ainsi, au cours de sa vie sur terre, Jésus, avec de grands cris et des larmes, a présenté des prières et des supplications à celui qui pouvait le sauver de la mort, et il a été exaucé, à cause de sa soumission à Dieu
  - type: note
    content: Ce passage se rapporte à l’agonie de Jésus à Gethsémané (Mt 26.36-46).
  - type: text
    content: '. '
  '8':
  - type: text
    content: 'Bien qu’étant Fils de Dieu, il a appris l’obéissance par tout ce qu’il a souffert. '
  '9':
  - type: text
    content: 'Et c’est parce qu’il a été ainsi amené à la perfection qu’il est devenu, pour tous ceux qui lui obéissent, l’auteur d’un salut éternel : '
