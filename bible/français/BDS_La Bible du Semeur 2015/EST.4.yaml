document_id: EST.4
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Mardochée demande à Esther d’intervenir
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Lorsque Mardochée apprit tout ce qui s’était passé, il déchira ses vêtements, se couvrit d’un habit de toile de sac et répandit de la cendre sur lui. C’est ainsi qu’il parcourut la ville en poussant de grands cris de douleur. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Puis il alla jusque devant la porte du palais impérial, par laquelle personne n’avait le droit d’entrer revêtu d’un habit de toile de sac.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Dans chaque province, à mesure qu’y parvenaient l’ordonnance et le décret de l’empereur, c’était comme un deuil qui frappait les Juifs ; ils se mettaient à jeûner, à pleurer et à pousser des cris : beaucoup se couchaient sur des toiles de sac et de la cendre'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '4.3 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Signe habituel de deuil ou d’une grande tristesse (voir Ez 27.30 ; Jon 3.6).
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Les servantes d’Esther et ses eunuques vinrent la mettre au courant, et l’impératrice en fut toute bouleversée. Elle envoya des vêtements à Mardochée, pour qu’il s’habille correctement et enlève l’habit de toile de sac qu’il portait. Mais il les refusa. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Alors Esther appela Hathac, l’un des eunuques que l’empereur avait mis à son service, et le chargea de s’enquérir auprès de Mardochée de ce qui se passait et qui le poussait à agir ainsi. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Hathac alla trouver Mardochée qui se tenait toujours sur la place publique, devant la porte du palais impérial. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Mardochée l’informa de tout ce qui lui était arrivé et il lui dit notamment quelle quantité d’argent Haman avait promis de verser dans les coffres de l’empereur pour que l’on fasse périr tous les Juifs. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Il lui remit aussi une copie du texte de l’édit d’extermination qui avait été publié dans Suse pour qu’il la montre à Esther, l’informe de la situation et lui communique l’ordre de se rendre chez l’empereur afin d’implorer sa pitié et de le supplier en faveur de son peuple.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Hathac revint et rapporta à Esther les paroles de Mardochée. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Celle-ci ordonna à Hathac de rapporter sa réponse à Mardochée : '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Tous les serviteurs de l’empereur ainsi que les habitants de toutes les provinces de l’empire savent bien qu’il y a une loi, qui est la même pour tous, en vertu de laquelle tout homme ou toute femme qui pénétrerait dans la cour intérieure du palais pour se rendre auprès de l’empereur sans avoir été convoqué par lui, sera mis à mort, sauf si l’empereur lui tend son sceptre d’or. Alors seulement sa vie lui sera épargnée. Quant à moi, voilà trente jours que je n’ai plus été invitée à me rendre chez l’empereur.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Lorsqu’on eut rapporté à Mardochée les paroles d’Esther, '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'il lui fit répondre : Ne t’imagine pas qu’étant dans le palais impérial, tu seras épargnée à la différence de tous les autres Juifs ! '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Bien au contraire ! Car si tu persistes à garder le silence dans les circonstances présentes, le salut et la délivrance viendront d’ailleurs pour les Juifs
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '4.14 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Allusion à Dieu.
    marker-yv: yv-n
  - type: text
    text: ', alors que toi et ta famille, vous périrez. D’ailleurs, qui sait si ce n’est pas en vue de telles circonstances que tu es devenue impératrice ?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Alors Esther fit porter cette réponse à Mardochée : '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Va rassembler tous les Juifs qui se trouvent à Suse. Jeûnez pour moi, sans manger ni boire pendant trois jours et trois nuits. J’observerai de mon côté le même jeûne avec mes servantes. Ensuite, je me rendrai chez l’empereur, malgré la loi. Si je dois mourir, je mourrai !
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Mardochée partit et fit ce qu’Esther lui avait commandé.
