document_id: PSA.113,21
type_code: fra
verses:
  '1':
  - type: heading
    content: Le Dieu incomparable
  - type: text
    content: Louez l’Eternel
  - type: note
    content: Cet hymne célébrant la majesté et la bonté de l’Eternel introduit la série des Ps 113 à 118 appelée le Hallel. Ces psaumes étaient chantés lors des grandes fêtes israélites (Pâque, fête des Semaines, des Cabanes, de la Dédicace, nouvelle lune, voir Nb 10.10 ; Jn 10.22). Lors de la Pâque, on chantait les Ps 113 et 114 avant la seconde coupe (donc avant le repas même).
  - type: text
    content: '  !'
  - type: text
    content: Louez l’Eternel ╵vous ses serviteurs !
  - type: text
    content: Louez-le, lui, l’Eternel !
  '2':
  - type: text
    content: Que l’Eternel soit béni
  - type: text
    content: dès maintenant et toujours !
  '3':
  - type: text
    content: De l’Orient ╵jusqu’à l’Occident,
  - type: text
    content: que l’Eternel soit loué.
  '4':
  - type: text
    content: L’Eternel est élevé ╵au-dessus de tous les peuples.
  - type: text
    content: Sa gloire est plus haute ╵que le ciel.
  '5':
  - type: text
    content: Qui est comparable ╵à l’Eternel notre Dieu ?
  - type: text
    content: Dans les lieux très-hauts, il siège,
  '6':
  - type: text
    content: mais il s’abaisse pour voir
  - type: text
    content: le ciel et la terre.
  '7':
  - type: text
    content: Il arrache à la poussière ╵l’homme pauvre,
  - type: text
    content: du tas de fumier, ╵il élève l’indigent
  '8':
  - type: text
    content: pour le faire asseoir ╵parmi les notables,
  - type: text
    content: les notables de son peuple
  - type: note
    content: Voir 1 S 2.8 ; Lc 1.52-53.
  - type: text
    content: .
  '9':
  - type: text
    content: Il installe en sa maison ╵la femme stérile,
  - type: text
    content: et elle y connaît ╵la joie d’être mère ╵de nombreux enfants
  - type: note
    content: Dans la société antique, la stérilité d’une femme était une grande disgrâce et une terrible tragédie (voir Gn 30.1 ; 1 S 1.6-7, 10).
  - type: text
    content: .
  - type: text
    content: Louez l’Eternel !
