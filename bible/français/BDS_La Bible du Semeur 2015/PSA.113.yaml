document_id: PSA.113,21
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Le Dieu incomparable
    marker-yv: yv-h
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: Louez l’Eternel
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '113.1 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Cet hymne célébrant la majesté et la bonté de l’Eternel introduit la série des Ps 113 à 118 appelée le Hallel. Ces psaumes étaient chantés lors des grandes fêtes israélites (Pâque, fête des Semaines, des Cabanes, de la Dédicace, nouvelle lune, voir Nb 10.10 ; Jn 10.22). Lors de la Pâque, on chantait les '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: Ps 113
        - type: text
          text: ' et '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: '114'
        - type: text
          text: ' avant la seconde coupe (donc avant le repas même).'
      marker-yv: yv-n
    - type: text
      text: '  !'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Louez l’Eternel ╵vous ses serviteurs !
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Louez-le, lui, l’Eternel !
  '2':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: Que l’Eternel soit béni
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dès maintenant et toujours !
  '3':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: De l’Orient ╵jusqu’à l’Occident,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: que l’Eternel soit loué.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: L’Eternel est élevé ╵au-dessus de tous les peuples.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Sa gloire est plus haute ╵que le ciel.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: Qui est comparable ╵à l’Eternel notre Dieu ?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Dans les lieux très-hauts, il siège,
  '6':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: mais il s’abaisse pour voir
  - type: usfm
    marker: q1
    children:
    - type: text
      text: le ciel et la terre.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: Il arrache à la poussière ╵l’homme pauvre,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: du tas de fumier, ╵il élève l’indigent
  '8':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: pour le faire asseoir ╵parmi les notables,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: les notables de son peuple
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '113.8 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Voir 1 S 2.8 ; Lc 1.52-53.
      marker-yv: yv-n
    - type: text
      text: .
  '9':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: Il installe en sa maison ╵la femme stérile,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et elle y connaît ╵la joie d’être mère ╵de nombreux enfants
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '113.9 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Dans la société antique, la stérilité d’une femme était une grande disgrâce et une terrible tragédie (voir Gn 30.1 ; 1 S 1.6-7, 10).
      marker-yv: yv-n
    - type: text
      text: .
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Louez l’Eternel !
