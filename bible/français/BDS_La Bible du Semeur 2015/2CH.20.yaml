document_id: 2CH.20,21
type_code: fra
verses:
  '1':
  - type: heading
    content: Une armée ennemie marche sur Juda – la prière de Josaphat
  - type: text
    content: Par la suite, les Moabites et les Ammonites
  - type: note
    content: Pour les Moabites et les Ammonites, voir note Gn 19.37, 38.
  - type: text
    content: ' renforcés par des Maonites'
  - type: note
    content: 'D’après certains manuscrits de l’ancienne version grecque ; le texte hébreu traditionnel a : Ammonites. Habitants de Maôn, au sud d’Edom (Jos 15.55 ; 2 Ch 20.10, 22-23 ; 26.7).'
  - type: text
    content: ' se mirent en route pour faire la guerre à Josaphat. '
  '10':
  - type: text
    content: Eh bien, maintenant, voici que les Ammonites, les Moabites et les habitants des monts de Séir viennent nous attaquer. Quand Israël venait d’Egypte
  - type: note
    content: Voir Nb 20.14-21 ; Dt 2.1-9 qui précisent que ce sont les Edomites qui ont refusé de laisser passer les Israélites sur leur territoire.
  - type: text
    content: ', tu ne lui as pas permis de traverser le pays de ces gens-là et il a fait un détour ; il ne les a pas détruits. '
  '11':
  - type: text
    content: 'Et voilà comment ils nous récompensent : ils viennent nous chasser de la propriété que tu nous as attribuée. '
  '12':
  - type: text
    content: Notre Dieu, n’exerceras-tu pas tes jugements sur eux ? Car nous sommes impuissants pour résister à cette immense armée qui vient nous attaquer et nous ne savons que faire, mais nous tournons nos regards vers toi.
  '13':
  - type: text
    content: Tout Juda, femmes et enfants y compris, se tenait debout devant l’Eternel.
  - type: heading
    content: La prophétie de Yahaziel
  '14':
  - type: text
    content: Alors l’Esprit de l’Eternel vint sur Yahaziel, fils de Zacharie, descendant de Benaya, de Yeïel et de Mattania, un lévite de la lignée d’Asaph
  - type: note
    content: Une famille de musiciens du Temple (voir 1 Ch 15.17).
  - type: text
    content: ', au milieu de l’assemblée. '
  '15':
  - type: text
    content: 'Yahaziel dit : Soyez attentifs, vous tous qui habitez Juda et Jérusalem, et toi aussi, roi Josaphat ! Voici ce que vous déclare l’Eternel : « Ne craignez rien et ne vous laissez pas effrayer devant cette immense armée, car cette guerre n’est pas votre affaire, c’est celle de Dieu. '
  '16':
  - type: text
    content: Demain matin, marchez contre eux. Ils vont gravir la montée de la Fleur. Vous les rencontrerez au bout du défilé à l’entrée du désert de Yerouel
  - type: note
    content: Partie du désert de Juda qui s’étendait entre la mer Morte et Teqoa. La montée de la Fleur était un sentier sinueux taillé dans le roc, débouchant à l’ouest de Teqoa. C’était le seul accès de Jérusalem depuis Eyn-Guédi.
  - type: text
    content: '. '
  '17':
  - type: text
    content: 'Vous n’aurez même pas à combattre ; contentez-vous de prendre position et de vous tenir là : vous verrez l’Eternel vous accorder la délivrance. Gens de Juda et de Jérusalem, ne craignez rien et ne vous laissez pas effrayer ! Demain, marchez à leur rencontre, et l’Eternel sera avec vous'
  - type: note
    content: Voir Dt 20.1-4.
  - type: text
    content: '  ! »'
  '18':
  - type: text
    content: 'Josaphat se prosterna le visage contre terre et tout Juda et les habitants de Jérusalem se laissèrent tomber devant l’Eternel et se prosternèrent devant lui. '
  '19':
  - type: text
    content: Alors les lévites qehatites et qoréites
  - type: note
    content: Familles de lévites consacrées au chant sacré et à la musique (1 Ch 6.16-23 ; Ps 42.1).
  - type: text
    content: ' se levèrent pour louer l’Eternel, le Dieu d’Israël, en chantant d’une voix très forte.'
  - type: heading
    content: La délivrance
  '2':
  - type: text
    content: 'On vint prévenir Josaphat en ces termes : Une vaste armée est en train de marcher contre toi d’au-delà de la mer Morte et d’Edom'
  - type: note
    content: 'D’après un manuscrit hébreu, une ancienne version latine et le contexte géographique. La plupart des manuscrits hébreux, l’ancienne version grecque et la Vulgate ont : la Syrie. Les deux noms se ressemblent en hébreu et se confondent facilement.'
  - type: text
    content: . Elle a déjà atteint Hatsatsôn-Tamar (c’est-à-dire Eyn-Guédi).
  '20':
  - type: text
    content: Le lendemain matin, ils se levèrent tôt, et les hommes se mirent en route pour le désert de Teqoa
  - type: note
    content: Au sud de Bethléhem (voir 2 S 14.2).
  - type: text
    content: '. Au moment du départ, Josaphat leur adressa la parole : Ecoutez-moi, hommes de Juda et habitants de Jérusalem ! Faites confiance à l’Eternel votre Dieu, et vous serez invulnérables ! Faites confiance à ses prophètes, et vous aurez la victoire !'
  '21':
  - type: text
    content: 'Il s’était concerté avec le peuple et avait placé en tête de l’armée des musiciens pour louer l’Eternel et la majesté de sa sainte personne. Ils se mirent en route devant les soldats en armes en chantant :'
  - type: text
    content: Louez l’Eternel,
  - type: text
    content: car son amour ╵dure à toujours.
  '22':
  - type: text
    content: 'Au moment où ils entonnèrent leurs cantiques de louange, l’Eternel plaça une embuscade contre les Ammonites, les Moabites et les habitants des monts de Séir qui venaient attaquer Juda, de sorte qu’ils furent battus. '
  '23':
  - type: text
    content: Les Ammonites et les Moabites se dressèrent contre les habitants des monts de Séir et les exterminèrent. Quand ils en eurent terminé avec eux, ils se jetèrent les uns sur les autres, jusqu’à s’anéantir.
  '24':
  - type: text
    content: 'Lorsque les Judéens parvinrent au promontoire d’où l’on apercevait le désert, ils regardèrent du côté de leurs ennemis et ils ne virent que des cadavres jonchant le sol : il n’y avait aucun rescapé.'
  '25':
  - type: text
    content: Josaphat et son armée allèrent s’emparer du butin ; ils trouvèrent en abondance toutes sortes de biens, des vêtements
  - type: note
    content: 'D’après certains manuscrits hébreux et la Vulgate. Les autres manuscrits hébreux ont : des cadavres.'
  - type: text
    content: ' et des objets précieux. Ils en ramassèrent une telle quantité qu’ils ne purent tout emporter. Ils restèrent trois jours à piller le butin tant il était abondant. '
  '26':
  - type: text
    content: Le quatrième jour, ils s’assemblèrent dans la vallée de la Bénédiction où ils bénirent l’Eternel ; c’est pourquoi on a appelé cet endroit vallée de la Bénédiction, nom qu’il porte encore aujourd’hui.
  '27':
  - type: text
    content: 'Tous les hommes de Juda et de Jérusalem reprirent joyeusement le chemin de la ville, Josaphat en tête, car l’Eternel les avait remplis de joie en les délivrant de leurs ennemis. '
  '28':
  - type: text
    content: 'Ils arrivèrent à Jérusalem au son des luths, des lyres et des trompettes et se rendirent au temple de l’Eternel. '
  '29':
  - type: text
    content: 'Tous les autres peuples furent frappés de terreur à cause de l’Eternel lorsqu’ils apprirent comment il avait combattu les ennemis d’Israël. '
  '3':
  - type: text
    content: 'Josaphat prit peur et décida de consulter l’Eternel. Il proclama un jeûne pour tout Juda, '
  '30':
  - type: text
    content: Dès lors, le royaume de Josaphat jouit de la tranquillité et son Dieu lui assura la paix sur toutes ses frontières.
  - type: heading
    content: La fin du règne de Josaphat – alliance coupable et échec
  - type: heading
    content: (1 R 22.41-51)
  '31':
  - type: text
    content: 'Ainsi régna Josaphat sur Juda. Il était âgé de trente-cinq ans à son avènement, et il régna vingt-cinq ans à Jérusalem. Sa mère s’appelait Azouba, elle était fille de Shilhi. '
  '32':
  - type: text
    content: 'Il suivit l’exemple de son père Asa sans en dévier, en faisant ce que l’Eternel considère comme juste. '
  '33':
  - type: text
    content: 'Cependant, les hauts lieux ne disparurent pas : le peuple n’avait toujours pas attaché fermement son cœur au Dieu de ses ancêtres.'
  '34':
  - type: text
    content: Les autres faits et gestes de Josaphat, des premiers aux derniers, sont cités dans les Actes de Jéhu, fils de Hanani, qui ont été insérés dans le livre des rois d’Israël.
  '35':
  - type: text
    content: 'Après cela, Josaphat, roi de Juda, s’allia avec Ahazia, roi d’Israël, dont la conduite n’était pas conforme à la volonté de Dieu. '
  '36':
  - type: text
    content: 'Ils se mirent ensemble pour construire des navires au long cours. Ils fabriquèrent ces navires dans le port d’Etsyôn-Guéber. '
  '37':
  - type: text
    content: 'Alors Eliézer, fils de Dodavahou, de Marésha, adressa à Josaphat la prophétie suivante : Parce que tu t’es allié à Ahazia, l’Eternel va détruire tes réalisations.'
  - type: text
    content: Effectivement, les navires furent brisés avant d’avoir pu atteindre Tarsis
  - type: note
    content: 'Tarsis: généralement compris comme un port d’Espagne. Mais il est peu probable que des navires partant d’Etsyôn-Guéber, port du golfe d’Aqaba menant à la mer Rouge, aient pu prendre la direction de l’Espagne. L’expression « aller à Tarsis » était-elle devenue une formule idiomatique pour dire « aller au bout du monde » ?'
  - type: text
    content: .
  '4':
  - type: text
    content: 'et les Judéens se rassemblèrent pour implorer le secours de l’Eternel. Ils vinrent de toutes les villes de Juda. '
  '5':
  - type: text
    content: 'Josaphat se tint debout avec l’assemblée des gens de Juda et de Jérusalem dans le temple de l’Eternel, en face du nouveau parvis. '
  '6':
  - type: text
    content: 'Il pria ainsi : Eternel, Dieu de nos ancêtres, n’es-tu pas Dieu, habitant dans le ciel, et n’est-ce pas toi qui domines sur tous les royaumes des peuples ? Tu disposes de force et de puissance ! Nul ne peut te résister. '
  '7':
  - type: text
    content: N’est-ce pas toi, notre Dieu, qui as chassé les anciens habitants de ce pays pour faire place à ton peuple Israël, et qui as donné ce pays pour toujours aux descendants d’Abraham, ton ami qui t’aimait
  - type: note
    content: Voir Jc 2.23.
  - type: text
    content: '  ? '
  '8':
  - type: text
    content: 'Ils s’y sont établis, ils y ont construit un sanctuaire en ton honneur. Puis ils ont dit : '
  '9':
  - type: text
    content: '« Si un malheur s’abat sur nous : une guerre, un châtiment, une épidémie ou la famine, nous viendrons nous tenir devant ce temple, devant toi, puisque ta présence est établie dans ce sanctuaire, et du fond de notre détresse, nous implorerons ton secours ; alors tu écouteras et tu sauveras'
  - type: note
    content: Allusion à la prière de Salomon (6.14-42 ; 7.12-22).
  - type: text
    content: '  ! » '
