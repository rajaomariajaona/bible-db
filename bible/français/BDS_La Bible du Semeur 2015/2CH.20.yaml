document_id: 2CH.20
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Une armée ennemie marche sur Juda – la prière de Josaphat
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Par la suite, les Moabites et les Ammonites
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '20.1 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Pour les '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'Moabites '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'et les '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'Ammonites, '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'voir note '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Gn 19.37
        metadata:
          usfm: GEN.19.37
      - type: text
        text: ', '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '38'
        metadata:
          usfm: GEN.19.38
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: ' renforcés par des Maonites'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '20.1 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'D’après certains manuscrits de l’ancienne version grecque ; le texte hébreu traditionnel a : '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'Ammonites. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Habitants de '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'Maôn, '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: au sud d’Edom (Jos 15.55 ; 2 Ch 20.10, 22-23 ; 26.7).
    marker-yv: yv-n
  - type: text
    text: ' se mirent en route pour faire la guerre à Josaphat. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'On vint prévenir Josaphat en ces termes : Une vaste armée est en train de marcher contre toi d’au-delà de la mer Morte et d’Edom'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '20.2 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'D’après un manuscrit hébreu, une ancienne version latine et le contexte géographique. La plupart des manuscrits hébreux, l’ancienne version grecque et la Vulgate ont : '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'la Syrie. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Les deux noms se ressemblent en hébreu et se confondent facilement.
    marker-yv: yv-n
  - type: text
    text: . Elle a déjà atteint Hatsatsôn-Tamar (c’est-à-dire Eyn-Guédi).
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Josaphat prit peur et décida de consulter l’Eternel. Il proclama un jeûne pour tout Juda, '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'et les Judéens se rassemblèrent pour implorer le secours de l’Eternel. Ils vinrent de toutes les villes de Juda. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Josaphat se tint debout avec l’assemblée des gens de Juda et de Jérusalem dans le temple de l’Eternel, en face du nouveau parvis. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Il pria ainsi : Eternel, Dieu de nos ancêtres, n’es-tu pas Dieu, habitant dans le ciel, et n’est-ce pas toi qui domines sur tous les royaumes des peuples ? Tu disposes de force et de puissance ! Nul ne peut te résister. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: N’est-ce pas toi, notre Dieu, qui as chassé les anciens habitants de ce pays pour faire place à ton peuple Israël, et qui as donné ce pays pour toujours aux descendants d’Abraham, ton ami qui t’aimait
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '20.7 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Voir '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Jc 2.23
        metadata:
          usfm: JAS.2.23
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: '  ? '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Ils s’y sont établis, ils y ont construit un sanctuaire en ton honneur. Puis ils ont dit : '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: '« Si un malheur s’abat sur nous : une guerre, un châtiment, une épidémie ou la famine, nous viendrons nous tenir devant ce temple, devant toi, puisque ta présence est établie dans ce sanctuaire, et du fond de notre détresse, nous implorerons ton secours ; alors tu écouteras et tu sauveras'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '20.9 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Allusion à la prière de Salomon (6.14-42 ; 7.12-22).
    marker-yv: yv-n
  - type: text
    text: '  ! » '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Eh bien, maintenant, voici que les Ammonites, les Moabites et les habitants des monts de Séir viennent nous attaquer. Quand Israël venait d’Egypte
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '20.10 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Voir Nb 20.14-21 ; Dt 2.1-9 qui précisent que ce sont les Edomites qui ont refusé de laisser passer les Israélites sur leur territoire.
    marker-yv: yv-n
  - type: text
    text: ', tu ne lui as pas permis de traverser le pays de ces gens-là et il a fait un détour ; il ne les a pas détruits. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Et voilà comment ils nous récompensent : ils viennent nous chasser de la propriété que tu nous as attribuée. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Notre Dieu, n’exerceras-tu pas tes jugements sur eux ? Car nous sommes impuissants pour résister à cette immense armée qui vient nous attaquer et nous ne savons que faire, mais nous tournons nos regards vers toi.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Tout Juda, femmes et enfants y compris, se tenait debout devant l’Eternel.
- type: usfm
  marker: s1
  children:
  - type: text
    text: La prophétie de Yahaziel
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Alors l’Esprit de l’Eternel vint sur Yahaziel, fils de Zacharie, descendant de Benaya, de Yeïel et de Mattania, un lévite de la lignée d’Asaph
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '20.14 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Une famille de musiciens du Temple (voir '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1 Ch 15.17
        metadata:
          usfm: 1CH.15.17
      - type: text
        text: ).
    marker-yv: yv-n
  - type: text
    text: ', au milieu de l’assemblée. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Yahaziel dit : Soyez attentifs, vous tous qui habitez Juda et Jérusalem, et toi aussi, roi Josaphat ! Voici ce que vous déclare l’Eternel : « Ne craignez rien et ne vous laissez pas effrayer devant cette immense armée, car cette guerre n’est pas votre affaire, c’est celle de Dieu. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Demain matin, marchez contre eux. Ils vont gravir la montée de la Fleur. Vous les rencontrerez au bout du défilé à l’entrée du désert de Yerouel
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '20.16 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Partie du désert de Juda qui s’étendait entre la mer Morte et Teqoa. La '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'montée de la Fleur '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: était un sentier sinueux taillé dans le roc, débouchant à l’ouest de Teqoa. C’était le seul accès de Jérusalem depuis Eyn-Guédi.
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Vous n’aurez même pas à combattre ; contentez-vous de prendre position et de vous tenir là : vous verrez l’Eternel vous accorder la délivrance. Gens de Juda et de Jérusalem, ne craignez rien et ne vous laissez pas effrayer ! Demain, marchez à leur rencontre, et l’Eternel sera avec vous'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '20.17 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Voir '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Dt 20.1-4
        metadata:
          usfm: DEU.20.1+DEU.20.2+DEU.20.3+DEU.20.4
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: '  ! »'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Josaphat se prosterna le visage contre terre et tout Juda et les habitants de Jérusalem se laissèrent tomber devant l’Eternel et se prosternèrent devant lui. '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Alors les lévites qehatites et qoréites
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '20.19 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Familles de lévites consacrées au chant sacré et à la musique (1 Ch 6.16-23 ; Ps 42.1).
    marker-yv: yv-n
  - type: text
    text: ' se levèrent pour louer l’Eternel, le Dieu d’Israël, en chantant d’une voix très forte.'
- type: usfm
  marker: s1
  children:
  - type: text
    text: La délivrance
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Le lendemain matin, ils se levèrent tôt, et les hommes se mirent en route pour le désert de Teqoa
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '20.20 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Au sud de Bethléhem (voir '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 2 S 14.2
        metadata:
          usfm: 2SA.14.2
      - type: text
        text: ).
    marker-yv: yv-n
  - type: text
    text: '. Au moment du départ, Josaphat leur adressa la parole : Ecoutez-moi, hommes de Juda et habitants de Jérusalem ! Faites confiance à l’Eternel votre Dieu, et vous serez invulnérables ! Faites confiance à ses prophètes, et vous aurez la victoire !'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Il s’était concerté avec le peuple et avait placé en tête de l’armée des musiciens pour louer l’Eternel et la majesté de sa sainte personne. Ils se mirent en route devant les soldats en armes en chantant :'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Louez l’Eternel,
- type: usfm
  marker: q1
  children:
  - type: text
    text: car son amour ╵dure à toujours.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Au moment où ils entonnèrent leurs cantiques de louange, l’Eternel plaça une embuscade contre les Ammonites, les Moabites et les habitants des monts de Séir qui venaient attaquer Juda, de sorte qu’ils furent battus. '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: Les Ammonites et les Moabites se dressèrent contre les habitants des monts de Séir et les exterminèrent. Quand ils en eurent terminé avec eux, ils se jetèrent les uns sur les autres, jusqu’à s’anéantir.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Lorsque les Judéens parvinrent au promontoire d’où l’on apercevait le désert, ils regardèrent du côté de leurs ennemis et ils ne virent que des cadavres jonchant le sol : il n’y avait aucun rescapé.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: Josaphat et son armée allèrent s’emparer du butin ; ils trouvèrent en abondance toutes sortes de biens, des vêtements
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '20.25 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'D’après certains manuscrits hébreux et la Vulgate. Les autres manuscrits hébreux ont : '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: des cadavres.
    marker-yv: yv-n
  - type: text
    text: ' et des objets précieux. Ils en ramassèrent une telle quantité qu’ils ne purent tout emporter. Ils restèrent trois jours à piller le butin tant il était abondant. '
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: Le quatrième jour, ils s’assemblèrent dans la vallée de la Bénédiction où ils bénirent l’Eternel ; c’est pourquoi on a appelé cet endroit vallée de la Bénédiction, nom qu’il porte encore aujourd’hui.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'Tous les hommes de Juda et de Jérusalem reprirent joyeusement le chemin de la ville, Josaphat en tête, car l’Eternel les avait remplis de joie en les délivrant de leurs ennemis. '
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'Ils arrivèrent à Jérusalem au son des luths, des lyres et des trompettes et se rendirent au temple de l’Eternel. '
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'Tous les autres peuples furent frappés de terreur à cause de l’Eternel lorsqu’ils apprirent comment il avait combattu les ennemis d’Israël. '
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: Dès lors, le royaume de Josaphat jouit de la tranquillité et son Dieu lui assura la paix sur toutes ses frontières.
- type: usfm
  marker: s1
  children:
  - type: text
    text: La fin du règne de Josaphat – alliance coupable et échec
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: (1 R 22.41-51)
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'Ainsi régna Josaphat sur Juda. Il était âgé de trente-cinq ans à son avènement, et il régna vingt-cinq ans à Jérusalem. Sa mère s’appelait Azouba, elle était fille de Shilhi. '
  - type: usfm
    marker: v
    metadata:
      v: '32'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'Il suivit l’exemple de son père Asa sans en dévier, en faisant ce que l’Eternel considère comme juste. '
  - type: usfm
    marker: v
    metadata:
      v: '33'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: 'Cependant, les hauts lieux ne disparurent pas : le peuple n’avait toujours pas attaché fermement son cœur au Dieu de ses ancêtres.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '34'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: Les autres faits et gestes de Josaphat, des premiers aux derniers, sont cités dans les Actes de Jéhu, fils de Hanani, qui ont été insérés dans le livre des rois d’Israël.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '35'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: 'Après cela, Josaphat, roi de Juda, s’allia avec Ahazia, roi d’Israël, dont la conduite n’était pas conforme à la volonté de Dieu. '
  - type: usfm
    marker: v
    metadata:
      v: '36'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: 'Ils se mirent ensemble pour construire des navires au long cours. Ils fabriquèrent ces navires dans le port d’Etsyôn-Guéber. '
  - type: usfm
    marker: v
    metadata:
      v: '37'
  - type: usfm
    marker: vlbl
    children:
    - type: text
