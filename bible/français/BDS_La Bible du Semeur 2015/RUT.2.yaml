document_id: RUT.2,21
type_code: fra
verses:
  '1':
  - type: heading
    content: Ruth rencontre Booz
  - type: text
    content: Noémi avait un parent du côté de son mari, un homme de valeur influent, de la famille d’Elimélek, nommé Booz.
  '10':
  - type: text
    content: Ruth s’inclina jusqu’à terre
  - type: note
    content: Signe de profond respect (voir Gn 17.3 ; Lv 9.24).
  - type: text
    content: ', se prosterna et lui dit : Pourquoi m’accueilles-tu avec tant de faveur et t’intéresses-tu à moi qui ne suis qu’une étrangère'
  - type: note
    content: En hébreu, il y a un jeu de mots entre s’intéresser à et étrangère.
  - type: text
    content: '  ?'
  '11':
  - type: text
    content: 'Booz lui répondit : On m’a bien raconté tout ce que tu as fait pour ta belle-mère après la mort de ton mari. Je sais que tu as quitté ton père et ta mère et ton pays natal pour venir vivre chez un peuple que tu ne connaissais pas auparavant. '
  '12':
  - type: text
    content: Que l’Eternel te récompense pour ce que tu as fait et que le Dieu d’Israël, sous la protection
  - type: note
    content: Voir 3.9.
  - type: text
    content: ' duquel tu es venue t’abriter, t’accorde une pleine récompense !'
  '13':
  - type: text
    content: 'Ruth dit : Mon maître, tu m’accueilles avec tant de faveur que j’en suis réconfortée. Tes paroles me touchent, moi ta servante, bien que je ne sois pas même au rang de tes servantes.'
  '14':
  - type: text
    content: 'A l’heure du repas, Booz lui dit : Approche-toi et viens prendre un morceau de pain. Trempe-le dans la vinaigrette'
  - type: note
    content: Boisson faite de vin acidulé et d’un peu d’huile.
  - type: text
    content: '  !'
  - type: text
    content: Alors elle s’assit à côté des moissonneurs, et Booz lui offrit des épis grillés
  - type: note
    content: 'épis grillés: voir Lv 2.14.'
  - type: text
    content: '. Elle en mangea à satiété et garda le reste. '
  '15':
  - type: text
    content: 'Quand elle retourna pour glaner, Booz ordonna à ses serviteurs : Permettez-lui aussi de glaner entre les gerbes sans la rabrouer ! '
  '16':
  - type: text
    content: Laissez même tomber exprès pour elle quelques épis des javelles et abandonnez-les pour qu’elle puisse les ramasser ! Et ne lui faites pas de reproches !
  '17':
  - type: text
    content: Ainsi Ruth glana dans le champ jusqu’au soir, puis elle battit ce qu’elle avait ramassé
  - type: note
    content: Normalement, le grain était foulé par des animaux (Dt 25.4 ; Os 10.11), mais lorsqu’on avait peu de récolte, on le battait au fléau (voir Jg 6.11).
  - type: text
    content: . Il y avait quarante litres d’orge
  - type: note
    content: 'Hébreu : Il y eut environ un épha d’orge. L’épha était une mesure de capacité pour les solides. Il contenait environ 36 litres, c’est-à-dire près de trente kilogrammes d’orge. D’où le v. 19.'
  - type: text
    content: '. '
  '18':
  - type: text
    content: Elle l’emporta, rentra au village et montra à sa belle-mère ce qu’elle avait ramassé. Elle sortit aussi les épis qui restaient de son repas de midi après qu’elle se fut rassasiée et les lui donna.
  - type: heading
    content: Noémi reconnaît la main de Dieu
  '19':
  - type: text
    content: 'Sa belle-mère lui demanda : Mais où donc as-tu glané aujourd’hui ? Dans quel champ as-tu travaillé ? Que l’Eternel bénisse celui qui a eu pour toi tant d’attention'
  - type: note
    content: En hébreu, le même verbe qu’au v. 10. Nouveau jeu de mots sur étrangère.
  - type: text
    content: '  !'
  - type: text
    content: Alors Ruth raconta à sa belle-mère chez qui elle avait travaillé et lui apprit qu’il s’appelait Booz.
  '2':
  - type: text
    content: 'Ruth la Moabite dit à Noémi : Permets-moi d’aller aux champs ramasser des épis laissés par les moissonneurs'
  - type: note
    content: Privilège des veuves et des orphelins comme des étrangers (Lv 19.9-10 ; 23.22 ; Dt 24.19-22).
  - type: text
    content: . J’irai derrière celui qui m’accueillera aimablement.
  - type: text
    content: 'Noémi lui répondit : Va ma fille.'
  '20':
  - type: text
    content: 'Noémi dit à sa belle-fille : Que l’Eternel le bénisse ! L’Eternel n’a cessé d’être bon envers nous les vivants comme il l’a été envers ceux qui sont morts. Puis elle ajouta : Cet homme est notre proche parent, l’un de ceux qui ont le devoir de prendre soin de notre lignée'
  - type: note
    content: Il s’agit de l’un des proches parents du défunt qui avait le droit de racheter en priorité les terres qui avaient appartenues à ce dernier (voir 4.1, 8 ; Jr 32.7-9) ; il devait épouser sa veuve lorsqu’elle n’avait pas d’enfant (1.11 ; 3.9 ; 4.5, 14 ; Dt 25.5-10).
  - type: text
    content: .
  '21':
  - type: text
    content: 'Alors Ruth la Moabite reprit : Il m’a même dit : « Reste avec mes serviteurs jusqu’à ce qu’ils aient fini toute ma moisson ! »'
  '22':
  - type: text
    content: 'Noémi lui répondit : C’est bien, ma fille, continue d’aller avec ses servantes, ainsi tu ne risqueras pas de te faire maltraiter dans un autre champ.'
  '23':
  - type: text
    content: Ruth resta donc avec les servantes de Booz pour glaner jusqu’à la fin de la moisson des orges, puis de celle des blés
  - type: note
    content: Fin mai, début juin.
  - type: text
    content: . Et elle habitait avec sa belle-mère.
  '3':
  - type: text
    content: 'Ruth partit donc et se mit à glaner dans les champs derrière les moissonneurs. Il arriva par hasard qu’elle se trouvait dans un champ appartenant à Booz, ce parent d’Elimélek. '
  '4':
  - type: text
    content: 'Un peu plus tard, Booz lui-même vint de Bethléhem et salua les moissonneurs en leur disant : Que l’Eternel soit avec vous !'
  - type: text
    content: 'Ils lui répondirent : Que l’Eternel te bénisse !'
  '5':
  - type: text
    content: 'Booz demanda au serviteur qui était responsable des moissonneurs : A qui est cette jeune femme ?'
  '6':
  - type: text
    content: 'Le responsable des moissonneurs lui répondit : C’est la jeune Moabite qui est revenue avec Noémi des plaines de Moab. '
  '7':
  - type: text
    content: Elle nous a demandé la permission de glaner les épis entre les gerbes derrière les moissonneurs. Elle est venue ce matin et, depuis, elle a été à pied d’œuvre jusqu’à maintenant et s’est à peine reposée un instant
  - type: note
    content: 'Texte hébreu peu clair. Certains comprennent : ne s’est assise qu’un moment à la maison.'
  - type: text
    content: .
  '8':
  - type: text
    content: 'Booz dit à Ruth : Ecoute bien, ma fille : Ne va pas glaner dans un autre champ ; reste ici et suis mes servantes ! '
  '9':
  - type: text
    content: Regarde bien où mes hommes moissonneront et suis les femmes qui ramassent les épis. J’ai interdit à mes serviteurs de t’ennuyer. Et si tu as soif, va boire aux cruches qu’ils ont remplies.
