document_id: ACT.10,21
type_code: fra
verses:
  '1':
  - type: heading
    content: Témoins devant les non-Juifs
  - type: heading
    content: Pierre chez l’officier Corneille
  - type: text
    content: A Césarée
  - type: note
    content: Césarée était le centre principal des garnisons romaines.
  - type: text
    content: ' vivait un officier romain nommé Corneille qui avait un poste de commandement dans la cohorte appelée « l’Italique ». '
  '10':
  - type: text
    content: 'il eut faim et voulut manger. Pendant qu’on lui préparait son repas, il tomba en extase. '
  '11':
  - type: text
    content: 'Il vit le ciel ouvert et une sorte de grande toile, tenue aux quatre coins, qui s’abaissait et descendait vers la terre ; '
  '12':
  - type: text
    content: 'elle contenait toutes sortes d’animaux : des quadrupèdes, des reptiles et des oiseaux.'
  '13':
  - type: text
    content: 'Il entendit une voix qui lui disait : '
  - type: text
    content: Lève-toi, Pierre, tue ces bêtes et mange-les.
  '14':
  - type: text
    content: – Oh non ! Seigneur, répliqua Pierre, car jamais de ma vie je n’ai rien mangé de souillé ou d’impur.
  '15':
  - type: text
    content: 'Mais la voix reprit et dit : '
  - type: text
    content: Ce que Dieu a déclaré pur, ce n’est pas à toi de le considérer comme impur.
  '16':
  - type: text
    content: Par trois fois, cela se renouvela, puis la nappe disparut dans le ciel.
  '17':
  - type: text
    content: 'Pierre était fort perplexe et se demandait ce que cette vision signifiait. Pendant ce temps, les hommes envoyés par Corneille s’étaient renseignés pour savoir où se trouvait la maison de Simon, et ils se présentèrent à la porte d’entrée : '
  '18':
  - type: text
    content: ils appelèrent et demandèrent si c’était bien là que logeait Simon, surnommé Pierre.
  '19':
  - type: text
    content: 'Comme Pierre en était toujours à réfléchir sur sa vision, l’Esprit lui dit : Ecoute, il y a trois'
  - type: note
    content: Selon les manuscrits, on trouve aussi des hommes ou deux hommes.
  - type: text
    content: ' hommes qui te demandent. '
  '2':
  - type: text
    content: 'Il était pieux et craignait Dieu, avec tous les gens de sa maison. Il était généreux envers les pauvres du peuple et priait Dieu en tout temps. '
  '20':
  - type: text
    content: Va, descends et pars avec eux sans hésiter, car c’est moi qui les ai envoyés.
  '21':
  - type: text
    content: 'Alors Pierre descendit et se présenta en disant : Me voilà, c’est moi que vous cherchez. Pourquoi êtes-vous venus ?'
  '22':
  - type: text
    content: – Nous venons de la part du centurion Corneille, répondirent-ils. C’est un homme droit, qui craint Dieu et qui jouit de l’estime de toute la population juive. Un ange de Dieu lui a demandé de te faire venir dans sa maison pour écouter ce que tu peux avoir à lui dire.
  '23':
  - type: text
    content: Alors Pierre les fit entrer et leur offrit l’hospitalité pour la nuit. Le lendemain, il se mit en route avec eux, accompagné de quelques frères de Jaffa.
  - type: heading
    content: Pierre témoin de Jésus-Christ devant les non-Juifs
  '24':
  - type: text
    content: 'Le jour suivant, il arriva à Césarée. Corneille les attendait ; il avait invité sa parenté et ses amis intimes. '
  '25':
  - type: text
    content: Au moment où Pierre allait entrer, Corneille s’avança vers lui, se jeta à ses pieds et se prosterna devant lui.
  '26':
  - type: text
    content: Mais Pierre le releva.
  - type: text
    content: – Non, lui dit-il, lève-toi ! Je ne suis qu’un simple homme, moi aussi.
  '27':
  - type: text
    content: 'Puis, tout en s’entretenant avec lui, il entra dans la maison et découvrit les nombreuses personnes qui s’y étaient réunies. '
  '28':
  - type: text
    content: 'Il leur dit : Vous savez que la Loi interdit à un Juif de fréquenter un étranger ou d’entrer chez lui. Mais Dieu m’a fait comprendre qu’il ne faut considérer aucun être humain comme souillé ou impur. '
  '29':
  - type: text
    content: Voilà pourquoi je n’ai fait aucune difficulté pour venir quand vous m’avez appelé. A présent, puis-je savoir pour quelle raison vous m’avez fait venir ?
  '3':
  - type: text
    content: Un jour, vers trois heures de l’après-midi
  - type: note
    content: C’était l’heure habituelle de prière des Juifs (voir 3.1).
  - type: text
    content: ', il eut une vision : il vit distinctement un ange de Dieu qui entrait chez lui et qui lui dit : Corneille !'
  '30':
  - type: text
    content: 'Corneille lui répondit : Il y a trois jours, à peu près à cette heure-ci, j’étais chez moi en train de faire la prière'
  - type: note
    content: 'Certains manuscrits ont : je priais et jeûnais.'
  - type: text
    content: ' de trois heures de l’après-midi. Soudain, un homme aux habits resplendissants s’est présenté devant moi '
  '31':
  - type: text
    content: 'et m’a dit : « Corneille, ta prière a été entendue et Dieu a tenu compte des secours que tu as apportés aux pauvres. '
  '32':
  - type: text
    content: 'Envoie donc des hommes à Jaffa pour inviter Simon, que l’on surnomme Pierre, à venir ici. Il loge chez un autre Simon, un tanneur qui habite une maison près de la mer. » '
  '33':
  - type: text
    content: Par conséquent, je t’ai donc immédiatement envoyé chercher, et je te remercie d’avoir bien voulu venir. Nous voici donc maintenant tous ici devant Dieu, prêts à écouter tout ce que le Seigneur t’a chargé de nous dire.
  '34':
  - type: text
    content: 'Alors Pierre prit la parole et dit :'
  - type: text
    content: 'Maintenant je me rends vraiment compte que Dieu ne fait pas de différence entre les hommes. '
  '35':
  - type: text
    content: 'Au contraire, parmi tous les peuples, tout homme qui le craint et qui fait ce qui est juste lui est agréable. '
  '36':
  - type: text
    content: 'Il a adressé sa parole aux Israélites pour leur annoncer la paix par Jésus-Christ, qui est le Seigneur de tous les hommes. '
  '37':
  - type: text
    content: 'Vous savez ce qui s’est passé, à commencer par la Galilée, puis dans toute la Judée, après que Jean a appelé les foules à se faire baptiser. '
  '38':
  - type: text
    content: Ensuite, Dieu a oint Jésus de Nazareth en répandant sur lui la puissance du Saint-Esprit. Celui-ci a parcouru le pays en faisant le bien et en guérissant tous ceux qui étaient tombés sous le pouvoir du diable, car Dieu était avec lui.
  '39':
  - type: text
    content: 'Nous sommes les témoins de tout ce qu’il a fait, dans le pays des Juifs et à Jérusalem, où ils l’ont mis à mort en le clouant à la croix. '
  '4':
  - type: text
    content: 'Corneille le regarda et, tout tremblant, demanda : Qu’y a-t-il, Seigneur ?'
  - type: text
    content: 'L’ange lui répondit : Tes prières et tes largesses envers les pauvres ont été accueillies par Dieu et il est intervenu en ta faveur. '
  '40':
  - type: text
    content: 'Mais Dieu l’a ramené à la vie le troisième jour et lui a donné de se montrer vivant, '
  '41':
  - type: text
    content: 'non à tout le peuple, mais aux témoins que Dieu avait lui-même choisis d’avance, c’est-à-dire à nous. Et nous avons mangé et bu avec lui après sa résurrection. '
  '42':
  - type: text
    content: 'Jésus nous a donné l’ordre de prêcher au peuple juif et de proclamer que c’est lui que Dieu a désigné pour juger les vivants et les morts. '
  '43':
  - type: text
    content: Tous les prophètes ont parlé de lui en disant que tout homme qui croit en lui reçoit par lui le pardon de ses péchés.
  - type: heading
    content: Le don de l’Esprit aux non-Juifs
  '44':
  - type: text
    content: 'Alors que Pierre prononçait ces mots, l’Esprit Saint descendit soudain sur tous ceux qui écoutaient la Parole. '
  '45':
  - type: text
    content: 'Les croyants juifs qui étaient venus avec Pierre furent très étonnés de voir que l’Esprit Saint était aussi donné aux non-Juifs, et répandu sur eux. '
  '46':
  - type: text
    content: En effet, ils les entendaient parler en différentes langues et célébrer la grandeur de Dieu.
  '47':
  - type: text
    content: 'Alors Pierre demanda : Peut-on refuser de baptiser dans l’eau ceux qui ont reçu l’Esprit Saint aussi bien que nous ?'
  '48':
  - type: text
    content: Et il donna ordre de les baptiser au nom de Jésus-Christ. Ensuite, ils le prièrent de rester encore quelques jours avec eux.
  '5':
  - type: text
    content: 'C’est pourquoi ; maintenant, envoie des hommes à Jaffa pour faire venir ici un certain Simon que l’on surnomme Pierre. '
  '6':
  - type: text
    content: Il loge chez un autre Simon, un tanneur, qui habite une maison près de la mer.
  '7':
  - type: text
    content: 'Dès que l’ange qui venait de lui parler fut parti, Corneille appela deux de ses serviteurs et l’un des soldats affectés à son service, qui était un homme pieux. '
  '8':
  - type: text
    content: Il leur raconta tout ce qui venait de se passer et les envoya à Jaffa
  - type: note
    content: Jaffa était à environ 50 kilomètres de Césarée. Les envoyés sont partis le soir même et sont arrivés le lendemain après-midi.
  - type: text
    content: .
  '9':
  - type: text
    content: Le lendemain, tandis qu’ils étaient en chemin et se rapprochaient de Jaffa, Pierre monta sur la terrasse de la maison pour prier. Il était à peu près midi
  - type: note
    content: 'midi: deuxième temps de prière des Juifs.'
  - type: text
    content: '  : '
