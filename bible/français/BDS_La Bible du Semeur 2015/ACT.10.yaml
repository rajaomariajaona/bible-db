document_id: ACT.10,21
type_code: fra
verses:
  '1':
  - type: usfm
    marker: ms1
    children:
    - type: text
      text: Témoins devant les non-Juifs
    marker-yv: yv-h
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Pierre chez l’officier Corneille
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: A Césarée
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '10.1 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Césarée '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: était le centre principal des garnisons romaines.
      marker-yv: yv-n
    - type: text
      text: ' vivait un officier romain nommé Corneille qui avait un poste de commandement dans la cohorte appelée « l’Italique ». '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'il eut faim et voulut manger. Pendant qu’on lui préparait son repas, il tomba en extase. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Il vit le ciel ouvert et une sorte de grande toile, tenue aux quatre coins, qui s’abaissait et descendait vers la terre ; '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'elle contenait toutes sortes d’animaux : des quadrupèdes, des reptiles et des oiseaux.'
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Il entendit une voix qui lui disait : '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Lève-toi, Pierre, tue ces bêtes et mange-les.
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: – Oh non ! Seigneur, répliqua Pierre, car jamais de ma vie je n’ai rien mangé de souillé ou d’impur.
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Mais la voix reprit et dit : '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Ce que Dieu a déclaré pur, ce n’est pas à toi de le considérer comme impur.
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Par trois fois, cela se renouvela, puis la nappe disparut dans le ciel.
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Pierre était fort perplexe et se demandait ce que cette vision signifiait. Pendant ce temps, les hommes envoyés par Corneille s’étaient renseignés pour savoir où se trouvait la maison de Simon, et ils se présentèrent à la porte d’entrée : '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ils appelèrent et demandèrent si c’était bien là que logeait Simon, surnommé Pierre.
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Comme Pierre en était toujours à réfléchir sur sa vision, l’Esprit lui dit : Ecoute, il y a trois'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '10.19 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Selon les manuscrits, on trouve aussi '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'des hommes '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'ou '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: deux hommes.
      marker-yv: yv-n
    - type: text
      text: ' hommes qui te demandent. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Il était pieux et craignait Dieu, avec tous les gens de sa maison. Il était généreux envers les pauvres du peuple et priait Dieu en tout temps. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Va, descends et pars avec eux sans hésiter, car c’est moi qui les ai envoyés.
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Alors Pierre descendit et se présenta en disant : Me voilà, c’est moi que vous cherchez. Pourquoi êtes-vous venus ?'
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: – Nous venons de la part du centurion Corneille, répondirent-ils. C’est un homme droit, qui craint Dieu et qui jouit de l’estime de toute la population juive. Un ange de Dieu lui a demandé de te faire venir dans sa maison pour écouter ce que tu peux avoir à lui dire.
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Alors Pierre les fit entrer et leur offrit l’hospitalité pour la nuit. Le lendemain, il se mit en route avec eux, accompagné de quelques frères de Jaffa.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Pierre témoin de Jésus-Christ devant les non-Juifs
    marker-yv: yv-h
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Le jour suivant, il arriva à Césarée. Corneille les attendait ; il avait invité sa parenté et ses amis intimes. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Au moment où Pierre allait entrer, Corneille s’avança vers lui, se jeta à ses pieds et se prosterna devant lui.
  '26':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Mais Pierre le releva.
  - type: usfm
    marker: p
    children:
    - type: text
      text: – Non, lui dit-il, lève-toi ! Je ne suis qu’un simple homme, moi aussi.
  '27':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Puis, tout en s’entretenant avec lui, il entra dans la maison et découvrit les nombreuses personnes qui s’y étaient réunies. '
  '28':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Il leur dit : Vous savez que la Loi interdit à un Juif de fréquenter un étranger ou d’entrer chez lui. Mais Dieu m’a fait comprendre qu’il ne faut considérer aucun être humain comme souillé ou impur. '
  '29':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Voilà pourquoi je n’ai fait aucune difficulté pour venir quand vous m’avez appelé. A présent, puis-je savoir pour quelle raison vous m’avez fait venir ?
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Un jour, vers trois heures de l’après-midi
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '10.3 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'C’était l’heure habituelle de prière des Juifs (voir '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: '3.1'
        - type: text
          text: ).
      marker-yv: yv-n
    - type: text
      text: ', il eut une vision : il vit distinctement un ange de Dieu qui entrait chez lui et qui lui dit : Corneille !'
  '30':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Corneille lui répondit : Il y a trois jours, à peu près à cette heure-ci, j’étais chez moi en train de faire la prière'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '10.30 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Certains manuscrits ont : '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: je priais et jeûnais.
      marker-yv: yv-n
    - type: text
      text: ' de trois heures de l’après-midi. Soudain, un homme aux habits resplendissants s’est présenté devant moi '
  '31':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'et m’a dit : « Corneille, ta prière a été entendue et Dieu a tenu compte des secours que tu as apportés aux pauvres. '
  '32':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Envoie donc des hommes à Jaffa pour inviter Simon, que l’on surnomme Pierre, à venir ici. Il loge chez un autre Simon, un tanneur qui habite une maison près de la mer. » '
  '33':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Par conséquent, je t’ai donc immédiatement envoyé chercher, et je te remercie d’avoir bien voulu venir. Nous voici donc maintenant tous ici devant Dieu, prêts à écouter tout ce que le Seigneur t’a chargé de nous dire.
  '34':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Alors Pierre prit la parole et dit :'
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Maintenant je me rends vraiment compte que Dieu ne fait pas de différence entre les hommes. '
  '35':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Au contraire, parmi tous les peuples, tout homme qui le craint et qui fait ce qui est juste lui est agréable. '
  '36':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Il a adressé sa parole aux Israélites pour leur annoncer la paix par Jésus-Christ, qui est le Seigneur de tous les hommes. '
  '37':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Vous savez ce qui s’est passé, à commencer par la Galilée, puis dans toute la Judée, après que Jean a appelé les foules à se faire baptiser. '
  '38':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ensuite, Dieu a oint Jésus de Nazareth en répandant sur lui la puissance du Saint-Esprit. Celui-ci a parcouru le pays en faisant le bien et en guérissant tous ceux qui étaient tombés sous le pouvoir du diable, car Dieu était avec lui.
  '39':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Nous sommes les témoins de tout ce qu’il a fait, dans le pays des Juifs et à Jérusalem, où ils l’ont mis à mort en le clouant à la croix. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Corneille le regarda et, tout tremblant, demanda : Qu’y a-t-il, Seigneur ?'
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'L’ange lui répondit : Tes prières et tes largesses envers les pauvres ont été accueillies par Dieu et il est intervenu en ta faveur. '
  '40':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Mais Dieu l’a ramené à la vie le troisième jour et lui a donné de se montrer vivant, '
  '41':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'non à tout le peuple, mais aux témoins que Dieu avait lui-même choisis d’avance, c’est-à-dire à nous. Et nous avons mangé et bu avec lui après sa résurrection. '
  '42':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Jésus nous a donné l’ordre de prêcher au peuple juif et de proclamer que c’est lui que Dieu a désigné pour juger les vivants et les morts. '
  '43':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Tous les prophètes ont parlé de lui en disant que tout homme qui croit en lui reçoit par lui le pardon de ses péchés.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Le don de l’Esprit aux non-Juifs
    marker-yv: yv-h
  '44':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Alors que Pierre prononçait ces mots, l’Esprit Saint descendit soudain sur tous ceux qui écoutaient la Parole. '
  '45':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Les croyants juifs qui étaient venus avec Pierre furent très étonnés de voir que l’Esprit Saint était aussi donné aux non-Juifs, et répandu sur eux. '
  '46':
  - type: usfm
    marker: p
    children:
    - type: text
      text: En effet, ils les entendaient parler en différentes langues et célébrer la grandeur de Dieu.
  '47':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Alors Pierre demanda : Peut-on refuser de baptiser dans l’eau ceux qui ont reçu l’Esprit Saint aussi bien que nous ?'
  '48':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Et il donna ordre de les baptiser au nom de Jésus-Christ. Ensuite, ils le prièrent de rester encore quelques jours avec eux.
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'C’est pourquoi ; maintenant, envoie des hommes à Jaffa pour faire venir ici un certain Simon que l’on surnomme Pierre. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Il loge chez un autre Simon, un tanneur, qui habite une maison près de la mer.
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dès que l’ange qui venait de lui parler fut parti, Corneille appela deux de ses serviteurs et l’un des soldats affectés à son service, qui était un homme pieux. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Il leur raconta tout ce qui venait de se passer et les envoya à Jaffa
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '10.8 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Jaffa '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: était à environ 50 kilomètres de Césarée. Les envoyés sont partis le soir même et sont arrivés le lendemain après-midi.
      marker-yv: yv-n
    - type: text
      text: .
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Le lendemain, tandis qu’ils étaient en chemin et se rapprochaient de Jaffa, Pierre monta sur la terrasse de la maison pour prier. Il était à peu près midi
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '10.9 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: midi
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: ': '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: deuxième temps de prière des Juifs.
      marker-yv: yv-n
    - type: text
      text: '  : '
