document_id: EZK.5,21
type_code: fra
verses:
  '1':
  - type: text
    content: 'Ecoute, fils d’homme, prends une épée affilée et sers-t’en comme d’un rasoir : rase-toi la tête et la barbe. Prends ensuite une balance et fais plusieurs parts des poils et des cheveux que tu auras coupés'
  - type: note
    content: Voir 2 S 10.4-5 ; Es 7.20.
  - type: text
    content: '. '
  '10':
  - type: text
    content: Ainsi, au milieu de toi, des pères dévoreront leurs propres fils et des fils mangeront leurs pères
  - type: note
    content: 'dévoreront leurs propres fils… leurs pères. On peut aussi comprendre : des pères feront le malheur de leurs fils pour profiter d’eux, et pareillement des fils à l’égard de leur père.'
  - type: text
    content: '  ; j’exécuterai mon jugement contre toi et je disperserai à tout vent ce qui restera de vous.'
  '11':
  - type: text
    content: 'C’est pourquoi, aussi vrai que je suis vivant, déclare le Seigneur, l’Eternel : puisque vous avez rendu mon sanctuaire impur par toutes vos idoles répugnantes et abominables, je passerai le rasoir sur vous, sans un regard de pitié, et j’agirai sans ménagement. '
  '12':
  - type: text
    content: 'Un tiers de tes habitants mourra de la peste ou périra de faim dans tes murs. Un autre tiers tombera, frappé par l’épée autour de toi, et le dernier tiers, je le disperserai à tout vent, et je le poursuivrai avec l’épée. '
  '13':
  - type: text
    content: Je donnerai libre cours à ma colère et je ferai peser mon courroux sur eux. Je leur ferai payer leur trahison, et quand j’aurai donné libre cours à ma colère, ils reconnaîtront que moi, l’Eternel, j’ai parlé, parce que je ne transige pas avec leur infidélité.
  '14':
  - type: text
    content: 'Je te réduirai à l’état de ruine, Jérusalem, et tu porteras le déshonneur parmi tous les peuples qui t’entourent ainsi qu’aux yeux de tous les gens qui passeront par là. '
  '15':
  - type: text
    content: Tu seras dans la honte, on te couvrira de sarcasmes et tu constitueras un avertissement pour les peuples qui t’entourent, ils regarderont vers toi avec effroi quand j’aurai exécuté mes jugements contre toi dans ma colère et mon indignation, quand je t’aurai châtiée dans ma colère. Moi, l’Eternel, j’ai parlé !
  '16':
  - type: text
    content: 'Je vais décocher contre vous les flèches mauvaises et mortelles de la famine pour vous exterminer. Je rendrai cette famine encore plus implacable et je détruirai toutes vos réserves de pain. '
  '17':
  - type: text
    content: J’enverrai contre vous, en plus de la famine, des bêtes féroces qui te raviront tes enfants ; la peste et le carnage passeront au milieu de toi, et j’enverrai l’épée contre toi. Moi, l’Eternel, j’ai parlé.
  '2':
  - type: text
    content: Quand le temps du siège sera révolu, tu en brûleras un tiers dans le feu au milieu de la ville. Tu prendras un second tiers et tu le frapperas de ton épée tout autour de la ville. Enfin, tu disperseras le dernier tiers au vent, et moi je les poursuivrai de mon épée
  - type: note
    content: Voir l’explication de ces signes au v. 12.
  - type: text
    content: .
  '3':
  - type: text
    content: Cependant, tu prélèveras une petite quantité de ces cheveux et tu les serreras dans les pans de ton manteau.
  '4':
  - type: text
    content: De ce reste, tu prendras encore une partie que tu jetteras dans le feu pour les brûler. La flamme qui en jaillira s’étendra à toute la communauté d’Israël.
  '5':
  - type: text
    content: 'Voici ce que déclare le Seigneur, l’Eternel : Voilà Jérusalem ; je l’avais placée au milieu des nations, avec de vastes contrées autour d’elle. '
  '6':
  - type: text
    content: 'Mais elle s’est révoltée contre mes commandements avec plus de perversité que les autres peuples, elle a violé mes lois plus que les pays qui l’entourent, car ses habitants ont méprisé mes commandements, et n’ont pas respecté mes lois. '
  '7':
  - type: text
    content: 'C’est pourquoi le Seigneur, l’Eternel, déclare : Parce que vous avez été plus rebelles que les peuples qui vous entourent, que vous n’avez ni obéi à mes lois, ni appliqué mes commandements, que vous n’avez même pas agi'
  - type: note
    content: 'vous n’avez même pas agi: selon le texte hébreu traditionnel. Certains manuscrits hébreux et la version syriaque ont : vous avez agi.'
  - type: text
    content: ' selon le droit des peuples qui vous entourent, '
  '8':
  - type: text
    content: 'à cause de cela, moi, le Seigneur, l’Eternel, je dis : Je vais me tourner contre toi, Jérusalem. J’exécuterai au milieu de toi ma sentence sous les yeux des autres peuples. '
  '9':
  - type: text
    content: 'A cause de toutes vos abominations, j’agirai contre toi comme je ne l’ai jamais fait et comme je ne le ferai plus jamais. '
