document_id: EZK.5
type_code: fra
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Ecoute, fils d’homme, prends une épée affilée et sers-t’en comme d’un rasoir : rase-toi la tête et la barbe. Prends ensuite une balance et fais plusieurs parts des poils et des cheveux que tu auras coupés'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '5.1 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Voir 2 S 10.4-5 ; Es 7.20.
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Quand le temps du siège sera révolu, tu en brûleras un tiers dans le feu au milieu de la ville. Tu prendras un second tiers et tu le frapperas de ton épée tout autour de la ville. Enfin, tu disperseras le dernier tiers au vent, et moi je les poursuivrai de mon épée
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '5.2 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Voir l’explication de ces signes au v. 12.
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Cependant, tu prélèveras une petite quantité de ces cheveux et tu les serreras dans les pans de ton manteau.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: De ce reste, tu prendras encore une partie que tu jetteras dans le feu pour les brûler. La flamme qui en jaillira s’étendra à toute la communauté d’Israël.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Voici ce que déclare le Seigneur, l’Eternel : Voilà Jérusalem ; je l’avais placée au milieu des nations, avec de vastes contrées autour d’elle. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Mais elle s’est révoltée contre mes commandements avec plus de perversité que les autres peuples, elle a violé mes lois plus que les pays qui l’entourent, car ses habitants ont méprisé mes commandements, et n’ont pas respecté mes lois. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'C’est pourquoi le Seigneur, l’Eternel, déclare : Parce que vous avez été plus rebelles que les peuples qui vous entourent, que vous n’avez ni obéi à mes lois, ni appliqué mes commandements, que vous n’avez même pas agi'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '5.7 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: vous n’avez même pas agi
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: ': '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'selon le texte hébreu traditionnel. Certains manuscrits hébreux et la version syriaque ont : '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: vous avez agi.
    marker-yv: yv-n
  - type: text
    text: ' selon le droit des peuples qui vous entourent, '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'à cause de cela, moi, le Seigneur, l’Eternel, je dis : Je vais me tourner contre toi, Jérusalem. J’exécuterai au milieu de toi ma sentence sous les yeux des autres peuples. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'A cause de toutes vos abominations, j’agirai contre toi comme je ne l’ai jamais fait et comme je ne le ferai plus jamais. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Ainsi, au milieu de toi, des pères dévoreront leurs propres fils et des fils mangeront leurs pères
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '5.10 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'dévoreront leurs propres fils… leurs pères. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'On peut aussi comprendre : '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: des pères feront le malheur de leurs fils pour profiter d’eux, et pareillement des fils à l’égard de leur père.
    marker-yv: yv-n
  - type: text
    text: '  ; j’exécuterai mon jugement contre toi et je disperserai à tout vent ce qui restera de vous.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'C’est pourquoi, aussi vrai que je suis vivant, déclare le Seigneur, l’Eternel : puisque vous avez rendu mon sanctuaire impur par toutes vos idoles répugnantes et abominables, je passerai le rasoir sur vous, sans un regard de pitié, et j’agirai sans ménagement. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Un tiers de tes habitants mourra de la peste ou périra de faim dans tes murs. Un autre tiers tombera, frappé par l’épée autour de toi, et le dernier tiers, je le disperserai à tout vent, et je le poursuivrai avec l’épée. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Je donnerai libre cours à ma colère et je ferai peser mon courroux sur eux. Je leur ferai payer leur trahison, et quand j’aurai donné libre cours à ma colère, ils reconnaîtront que moi, l’Eternel, j’ai parlé, parce que je ne transige pas avec leur infidélité.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Je te réduirai à l’état de ruine, Jérusalem, et tu porteras le déshonneur parmi tous les peuples qui t’entourent ainsi qu’aux yeux de tous les gens qui passeront par là. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Tu seras dans la honte, on te couvrira de sarcasmes et tu constitueras un avertissement pour les peuples qui t’entourent, ils regarderont vers toi avec effroi quand j’aurai exécuté mes jugements contre toi dans ma colère et mon indignation, quand je t’aurai châtiée dans ma colère. Moi, l’Eternel, j’ai parlé !
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Je vais décocher contre vous les flèches mauvaises et mortelles de la famine pour vous exterminer. Je rendrai cette famine encore plus implacable et je détruirai toutes vos réserves de pain. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: J’enverrai contre vous, en plus de la famine, des bêtes féroces qui te raviront tes enfants ; la peste et le carnage passeront au milieu de toi, et j’enverrai l’épée contre toi. Moi, l’Eternel, j’ai parlé.
