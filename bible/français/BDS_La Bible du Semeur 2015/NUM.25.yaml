document_id: NUM.25
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: L’idolâtrie dans les steppes de Moab
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Israël s’établit à Shittim. Là, le peuple commença à se livrer à la débauche avec des filles de Moab
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '25.1 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Shittim se trouvait à l’est du Jourdain, en face de Jéricho. Les Moabites, les plus proches voisins d’Israël alors, voulaient leur ruine. C’est pourquoi ils s’étaient alliés aux Madianites (
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '22.4'
        metadata:
          usfm: NUM.22.4
      - type: text
        text: '). Selon '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '31.8'
        metadata:
          usfm: NUM.31.8
      - type: text
        text: ', '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '16'
        metadata:
          usfm: NUM.31.16
      - type: text
        text: ' (voir '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ap 2.14
        metadata:
          usfm: REV.2.14
      - type: text
        text: ), c’est sur le conseil de Balaam que les filles moabites invitèrent les jeunes gens israélites à participer à leur culte païen comportant des rites de fertilité, avec leur débauche sexuelle.
    marker-yv: yv-n
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'qui les invitèrent aux sacrifices offerts à leurs dieux. Les Israélites participèrent à leurs repas sacrés et se prosternèrent devant leurs dieux. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Ils adoptèrent ainsi le culte du dieu Baal de Peor
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '25.3 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: Baal
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: ': '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'voir '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '22.41'
        metadata:
          usfm: NUM.22.41
      - type: text
        text: '. '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: Baal de Peor
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: ': '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: voir Dt 4.3 ; Os 9.10 ; Ps 106.28.
    marker-yv: yv-n
  - type: text
    text: ', et l’Eternel se mit en colère contre eux. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'L’Eternel dit à Moïse : Prends avec toi tous les chefs du peuple et fais-les pendre en ma présence face au soleil, afin que l’ardeur de ma colère se détourne d’Israël.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Moïse ordonna aux juges d’Israël
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '25.5 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Institués selon '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ex 18.19-26
        metadata:
          usfm: EXO.18.19+EXO.18.20+EXO.18.21+EXO.18.22+EXO.18.23+EXO.18.24+EXO.18.25+EXO.18.26
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: '  : Que chacun de vous exécute ceux de ses gens qui se sont adonnés au culte du Baal de Peor.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'A ce moment survint un Israélite amenant vers ses compatriotes une fille madianite, sous les yeux de Moïse et devant toute la communauté des Israélites qui pleuraient à l’entrée de la tente de la Rencontre. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Voyant cela, Phinéas, fils d’Eléazar et petit-fils du prêtre Aaron, se leva du milieu de la communauté, saisit une lance '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'et suivit cet Israélite jusque dans la partie arrière de sa tente. Là, il transperça tous les deux, l’homme et la femme, d’un coup en plein ventre. Et le fléau qui sévissait parmi les Israélites cessa. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Mais il avait déjà fait vingt-quatre mille victimes
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '25.9 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Allusion à ce récit dans '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1 Co 10.8
        metadata:
          usfm: 1CO.10.8
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Alors l’Eternel parla à Moïse en ces termes : '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Phinéas, fils d’Eléazar, petit-fils du prêtre Aaron, a détourné ma colère des Israélites, car il a pris vivement à cœur mes intérêts. Aussi, je n’ai pas exterminé les Israélites dans ma colère de les voir bafouer mon amour pour eux. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'C’est pourquoi, déclare-lui que je conclus avec lui une alliance de paix. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Cette alliance lui garantira, à lui et à ses descendants, le sacerdoce à perpétuité, parce qu’il a pris vivement à cœur les intérêts de son Dieu, et qu’il a accompli un acte expiatoire pour les Israélites.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'L’Israélite qui avait été tué avec la Madianite s’appelait Zimri, il était fils de Salou et chef d’un groupe familial de la tribu de Siméon. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: La Madianite se nommait Kozbi, c’était une fille de Tsour, un chef de plusieurs familles d’un groupe familial des Madianites.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'L’Eternel parla à Moïse, en ces termes : '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Attaquez les Madianites et battez-les, '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: car ils sont devenus vos ennemis en usant de ruse contre vous dans l’affaire de Peor et au moyen de Kozbi, fille d’un de leurs chefs, qui fut mise à mort lors du fléau survenu à cause du Baal de Peor.
- type: usfm
  marker: ms1
  children:
  - type: text
    text: Préparatifs en vue de l’entrée dans le pays promis
  marker-yv: yv-h
- type: usfm
  marker: s1
  children:
  - type: text
    text: Le nouveau recensement
  marker-yv: yv-h
- type: usfm
  marker: s2
  children:
  - type: text
    text: Le recensement des douze tribus
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Après ce fléau,
