document_id: NUM.25,21
type_code: fra
verses:
  '1':
  - type: heading
    content: L’idolâtrie dans les steppes de Moab
  - type: text
    content: Israël s’établit à Shittim. Là, le peuple commença à se livrer à la débauche avec des filles de Moab
  - type: note
    content: Shittim se trouvait à l’est du Jourdain, en face de Jéricho. Les Moabites, les plus proches voisins d’Israël alors, voulaient leur ruine. C’est pourquoi ils s’étaient alliés aux Madianites (22.4). Selon 31.8, 16 (voir Ap 2.14), c’est sur le conseil de Balaam que les filles moabites invitèrent les jeunes gens israélites à participer à leur culte païen comportant des rites de fertilité, avec leur débauche sexuelle.
  - type: text
    content: ' '
  '10':
  - type: text
    content: 'Alors l’Eternel parla à Moïse en ces termes : '
  '11':
  - type: text
    content: 'Phinéas, fils d’Eléazar, petit-fils du prêtre Aaron, a détourné ma colère des Israélites, car il a pris vivement à cœur mes intérêts. Aussi, je n’ai pas exterminé les Israélites dans ma colère de les voir bafouer mon amour pour eux. '
  '12':
  - type: text
    content: 'C’est pourquoi, déclare-lui que je conclus avec lui une alliance de paix. '
  '13':
  - type: text
    content: Cette alliance lui garantira, à lui et à ses descendants, le sacerdoce à perpétuité, parce qu’il a pris vivement à cœur les intérêts de son Dieu, et qu’il a accompli un acte expiatoire pour les Israélites.
  '14':
  - type: text
    content: 'L’Israélite qui avait été tué avec la Madianite s’appelait Zimri, il était fils de Salou et chef d’un groupe familial de la tribu de Siméon. '
  '15':
  - type: text
    content: La Madianite se nommait Kozbi, c’était une fille de Tsour, un chef de plusieurs familles d’un groupe familial des Madianites.
  '16':
  - type: text
    content: 'L’Eternel parla à Moïse, en ces termes : '
  '17':
  - type: text
    content: 'Attaquez les Madianites et battez-les, '
  '18':
  - type: text
    content: car ils sont devenus vos ennemis en usant de ruse contre vous dans l’affaire de Peor et au moyen de Kozbi, fille d’un de leurs chefs, qui fut mise à mort lors du fléau survenu à cause du Baal de Peor.
  - type: heading
    content: Préparatifs en vue de l’entrée dans le pays promis
  - type: heading
    content: Le nouveau recensement
  - type: heading
    content: Le recensement des douze tribus
  '19':
  - type: text
    content: Après ce fléau,
  '2':
  - type: text
    content: 'qui les invitèrent aux sacrifices offerts à leurs dieux. Les Israélites participèrent à leurs repas sacrés et se prosternèrent devant leurs dieux. '
  '3':
  - type: text
    content: Ils adoptèrent ainsi le culte du dieu Baal de Peor
  - type: note
    content: 'Baal: voir 22.41. Baal de Peor: voir Dt 4.3 ; Os 9.10 ; Ps 106.28.'
  - type: text
    content: ', et l’Eternel se mit en colère contre eux. '
  '4':
  - type: text
    content: 'L’Eternel dit à Moïse : Prends avec toi tous les chefs du peuple et fais-les pendre en ma présence face au soleil, afin que l’ardeur de ma colère se détourne d’Israël.'
  '5':
  - type: text
    content: Moïse ordonna aux juges d’Israël
  - type: note
    content: Institués selon Ex 18.19-26.
  - type: text
    content: '  : Que chacun de vous exécute ceux de ses gens qui se sont adonnés au culte du Baal de Peor.'
  '6':
  - type: text
    content: 'A ce moment survint un Israélite amenant vers ses compatriotes une fille madianite, sous les yeux de Moïse et devant toute la communauté des Israélites qui pleuraient à l’entrée de la tente de la Rencontre. '
  '7':
  - type: text
    content: 'Voyant cela, Phinéas, fils d’Eléazar et petit-fils du prêtre Aaron, se leva du milieu de la communauté, saisit une lance '
  '8':
  - type: text
    content: 'et suivit cet Israélite jusque dans la partie arrière de sa tente. Là, il transperça tous les deux, l’homme et la femme, d’un coup en plein ventre. Et le fléau qui sévissait parmi les Israélites cessa. '
  '9':
  - type: text
    content: Mais il avait déjà fait vingt-quatre mille victimes
  - type: note
    content: Allusion à ce récit dans 1 Co 10.8.
  - type: text
    content: .
