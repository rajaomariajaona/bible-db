document_id: GEN.32
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Jacob a peur de rencontrer Esaü
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Le lendemain, de bon matin, Laban embrassa ses petits-enfants et ses filles et les bénit ; puis il partit et retourna chez lui. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Jacob poursuivit sa route. Des anges de Dieu vinrent à sa rencontre. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'En les voyant, il s’écria : C’est ici le camp de Dieu ! Et il nomma ce lieu : Mahanaïm'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '32.3 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Cette localité, située près du Yabboq, jouera un grand rôle au temps de David et de Salomon (2 S 2.8 ; 17.24 ; 1 R 4.14).
    marker-yv: yv-n
  - type: text
    text: ' (Les deux camps).'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Puis il envoya devant lui des messagers vers son frère Esaü, au pays de Séir, dans la steppe d’Edom
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '32.4 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Au sud et sud-est de la mer Morte où Esaü s’est installé (
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 27.39-40
        metadata:
          usfm: GEN.27.39+GEN.27.40
      - type: text
        text: ).
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Il leur donna les instructions suivantes : Voici ce que vous direz à mon seigneur Esaü : « Ainsi parle ton serviteur Jacob : J’ai séjourné chez Laban et je m’y suis attardé jusqu’à maintenant. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: J’ai acquis des bovins et des ânes, des moutons, des chèvres, des serviteurs et des servantes, et j’en fais informer mon seigneur pour recevoir bon accueil auprès de lui. »
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Les messagers revinrent auprès de Jacob en disant : Nous sommes allés trouver ton frère Esaü et le voilà qui vient à ta rencontre – avec quatre cents hommes.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Jacob eut très peur, l’angoisse le saisit. Il répartit en deux camps les gens qui étaient avec lui, le menu et le gros bétail ainsi que les chameaux, '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'car il se disait : « Si Esaü attaque l’un des camps et le détruit, celui qui restera pourra en réchapper. »'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Puis Jacob pria : Dieu de mon père Abraham, Dieu de mon père Isaac, ô Eternel, toi qui m’as dit : « Retourne dans ton pays, dans ta famille, et je te ferai du bien », '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'je suis indigne de toutes les faveurs que tu as témoignées avec tant de fidélité à ton serviteur ; car lorsque j’ai passé ce Jourdain, je n’avais que mon bâton, et maintenant je me trouve à la tête de deux camps. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Délivre-moi, je te prie, de mon frère Esaü ; car j’ai peur qu’il vienne me tuer, sans épargner ni mère ni enfant. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Pourtant, toi tu m’as dit : « Je te ferai du bien, et je rendrai tes descendants aussi nombreux que le sable de la mer que nul ne peut compter. »'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Jacob s’installa à cet endroit pour la nuit. Il choisit dans ce qu’il avait à sa disposition de quoi faire un présent à son frère Esaü : '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'deux cents chèvres et vingt boucs, deux cents brebis et vingt béliers, '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'trente chamelles qui allaitaient avec leurs petits, quarante vaches et dix taureaux, vingt ânesses et dix ânons. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Il les confia à ses serviteurs, par troupeaux séparés, en leur disant : Passez devant moi et laissez une certaine distance entre chaque troupeau.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Puis il donna les instructions suivantes au premier serviteur : Quand tu rencontreras mon frère Esaü et qu’il te demandera : « Quel est ton maître, où vas-tu, et à qui appartient ce troupeau qui te précède ? », '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'tu répondras : « C’est à ton serviteur Jacob, et ce troupeau est un cadeau qu’il t’envoie, mon seigneur Esaü. Lui-même arrive derrière nous. »'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Il donna les mêmes instructions au deuxième serviteur, au troisième, puis à tous ceux qui allaient marcher derrière les troupeaux : C’est ainsi que vous parlerez à Esaü quand vous le rencontrerez ! '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Et dites-lui bien : « Voici, ton serviteur Jacob vient lui aussi derrière nous ! »'
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Car il se disait : Je l’apaiserai par ce présent qui me précède, ensuite je paraîtrai devant lui, et peut-être me permettra-t-il de le regarder en face.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: Les bêtes offertes en cadeau s’en allèrent donc devant lui, et lui-même passa cette nuit-là dans le camp.
- type: usfm
  marker: s1
  children:
  - type: text
    text: La lutte avec Dieu
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: Dans la nuit, il se leva, emmena ses deux femmes, leurs servantes et ses onze fils et passa le gué du Yabboq
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '32.23 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Affluent principal, à l’est du Jourdain, à une quarantaine de kilomètres de l’embouchure de celui-ci.
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Après leur avoir fait traverser le torrent et avoir fait passer tout ce qui lui appartenait, '
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Jacob resta seul. Alors un individu lutta avec lui jusqu’à l’aube. '
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Quand celui-ci vit qu’il n’arrivait pas à vaincre Jacob, il lui porta un coup à l’articulation de la hanche qui se démit pendant qu’il luttait avec lui. '
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'Puis il dit à Jacob : Laisse-moi partir, car le jour se lève.'
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Mais Jacob répondit : Je ne te laisserai pas aller avant que tu ne m’aies béni.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: – Quel est ton nom ? demanda l’individu.
- type: usfm
  marker: p
  children:
  - type: text
    text: – Jacob, répondit-il.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: – Désormais, reprit l’autre, tu ne t’appelleras plus Jacob mais Israël (Il lutte avec Dieu), car tu as lutté avec Dieu et avec les hommes et tu as vaincu.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'Jacob l’interrogea : Je t’en prie, fais-moi connaître ton nom.'
- type: usfm
  marker: p
  children:
  - type: text
    text: – Pourquoi me demandes-tu mon nom ? lui répondit-il.
- type: usfm
  marker: p
  children:
  - type: text
    text: Et il le bénit là.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: Jacob nomma ce lieu Péniel (La face de Dieu) car, dit-il, j’ai vu Dieu face à face et j’ai eu la vie sauve
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '32.31 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Voir Ex 33.20, 23 ; 24.10 ; Nb 12.8 ; Dt 34.10.
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '32'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: Le soleil se leva quand il passa le gué de Penouel
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '32.32 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: Penouel
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ', variante orthographique de l’hébreu pour Péniel.'
    marker-yv: yv-n
  - type: text
    text: '. Jacob boitait de la hanche. '
  - type: usfm
    marker: v
    metadata:
      v: '33'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: C’est pourquoi, jusqu’à ce jour, les Israélites ne mangent pas le muscle de la cuisse fixé à l’articulation de la hanche, car c’est là que Dieu avait frappé Jacob.
