document_id: GEN.32,21
type_code: fra
verses:
  '1':
  - type: heading
    content: Jacob a peur de rencontrer Esaü
  - type: text
    content: 'Le lendemain, de bon matin, Laban embrassa ses petits-enfants et ses filles et les bénit ; puis il partit et retourna chez lui. '
  '10':
  - type: text
    content: 'Puis Jacob pria : Dieu de mon père Abraham, Dieu de mon père Isaac, ô Eternel, toi qui m’as dit : « Retourne dans ton pays, dans ta famille, et je te ferai du bien », '
  '11':
  - type: text
    content: 'je suis indigne de toutes les faveurs que tu as témoignées avec tant de fidélité à ton serviteur ; car lorsque j’ai passé ce Jourdain, je n’avais que mon bâton, et maintenant je me trouve à la tête de deux camps. '
  '12':
  - type: text
    content: 'Délivre-moi, je te prie, de mon frère Esaü ; car j’ai peur qu’il vienne me tuer, sans épargner ni mère ni enfant. '
  '13':
  - type: text
    content: 'Pourtant, toi tu m’as dit : « Je te ferai du bien, et je rendrai tes descendants aussi nombreux que le sable de la mer que nul ne peut compter. »'
  '14':
  - type: text
    content: 'Jacob s’installa à cet endroit pour la nuit. Il choisit dans ce qu’il avait à sa disposition de quoi faire un présent à son frère Esaü : '
  '15':
  - type: text
    content: 'deux cents chèvres et vingt boucs, deux cents brebis et vingt béliers, '
  '16':
  - type: text
    content: 'trente chamelles qui allaitaient avec leurs petits, quarante vaches et dix taureaux, vingt ânesses et dix ânons. '
  '17':
  - type: text
    content: 'Il les confia à ses serviteurs, par troupeaux séparés, en leur disant : Passez devant moi et laissez une certaine distance entre chaque troupeau.'
  '18':
  - type: text
    content: 'Puis il donna les instructions suivantes au premier serviteur : Quand tu rencontreras mon frère Esaü et qu’il te demandera : « Quel est ton maître, où vas-tu, et à qui appartient ce troupeau qui te précède ? », '
  '19':
  - type: text
    content: 'tu répondras : « C’est à ton serviteur Jacob, et ce troupeau est un cadeau qu’il t’envoie, mon seigneur Esaü. Lui-même arrive derrière nous. »'
  '2':
  - type: text
    content: 'Jacob poursuivit sa route. Des anges de Dieu vinrent à sa rencontre. '
  '20':
  - type: text
    content: 'Il donna les mêmes instructions au deuxième serviteur, au troisième, puis à tous ceux qui allaient marcher derrière les troupeaux : C’est ainsi que vous parlerez à Esaü quand vous le rencontrerez ! '
  '21':
  - type: text
    content: 'Et dites-lui bien : « Voici, ton serviteur Jacob vient lui aussi derrière nous ! »'
  - type: text
    content: 'Car il se disait : Je l’apaiserai par ce présent qui me précède, ensuite je paraîtrai devant lui, et peut-être me permettra-t-il de le regarder en face.'
  '22':
  - type: text
    content: Les bêtes offertes en cadeau s’en allèrent donc devant lui, et lui-même passa cette nuit-là dans le camp.
  - type: heading
    content: La lutte avec Dieu
  '23':
  - type: text
    content: Dans la nuit, il se leva, emmena ses deux femmes, leurs servantes et ses onze fils et passa le gué du Yabboq
  - type: note
    content: Affluent principal, à l’est du Jourdain, à une quarantaine de kilomètres de l’embouchure de celui-ci.
  - type: text
    content: '. '
  '24':
  - type: text
    content: 'Après leur avoir fait traverser le torrent et avoir fait passer tout ce qui lui appartenait, '
  '25':
  - type: text
    content: 'Jacob resta seul. Alors un individu lutta avec lui jusqu’à l’aube. '
  '26':
  - type: text
    content: 'Quand celui-ci vit qu’il n’arrivait pas à vaincre Jacob, il lui porta un coup à l’articulation de la hanche qui se démit pendant qu’il luttait avec lui. '
  '27':
  - type: text
    content: 'Puis il dit à Jacob : Laisse-moi partir, car le jour se lève.'
  - type: text
    content: 'Mais Jacob répondit : Je ne te laisserai pas aller avant que tu ne m’aies béni.'
  '28':
  - type: text
    content: – Quel est ton nom ? demanda l’individu.
  - type: text
    content: – Jacob, répondit-il.
  '29':
  - type: text
    content: – Désormais, reprit l’autre, tu ne t’appelleras plus Jacob mais Israël (Il lutte avec Dieu), car tu as lutté avec Dieu et avec les hommes et tu as vaincu.
  '3':
  - type: text
    content: 'En les voyant, il s’écria : C’est ici le camp de Dieu ! Et il nomma ce lieu : Mahanaïm'
  - type: note
    content: Cette localité, située près du Yabboq, jouera un grand rôle au temps de David et de Salomon (2 S 2.8 ; 17.24 ; 1 R 4.14).
  - type: text
    content: ' (Les deux camps).'
  '30':
  - type: text
    content: 'Jacob l’interrogea : Je t’en prie, fais-moi connaître ton nom.'
  - type: text
    content: – Pourquoi me demandes-tu mon nom ? lui répondit-il.
  - type: text
    content: Et il le bénit là.
  '31':
  - type: text
    content: Jacob nomma ce lieu Péniel (La face de Dieu) car, dit-il, j’ai vu Dieu face à face et j’ai eu la vie sauve
  - type: note
    content: Voir Ex 33.20, 23 ; 24.10 ; Nb 12.8 ; Dt 34.10.
  - type: text
    content: .
  '32':
  - type: text
    content: Le soleil se leva quand il passa le gué de Penouel
  - type: note
    content: Penouel, variante orthographique de l’hébreu pour Péniel.
  - type: text
    content: '. Jacob boitait de la hanche. '
  '33':
  - type: text
    content: C’est pourquoi, jusqu’à ce jour, les Israélites ne mangent pas le muscle de la cuisse fixé à l’articulation de la hanche, car c’est là que Dieu avait frappé Jacob.
  '4':
  - type: text
    content: Puis il envoya devant lui des messagers vers son frère Esaü, au pays de Séir, dans la steppe d’Edom
  - type: note
    content: Au sud et sud-est de la mer Morte où Esaü s’est installé (27.39-40).
  - type: text
    content: '. '
  '5':
  - type: text
    content: 'Il leur donna les instructions suivantes : Voici ce que vous direz à mon seigneur Esaü : « Ainsi parle ton serviteur Jacob : J’ai séjourné chez Laban et je m’y suis attardé jusqu’à maintenant. '
  '6':
  - type: text
    content: J’ai acquis des bovins et des ânes, des moutons, des chèvres, des serviteurs et des servantes, et j’en fais informer mon seigneur pour recevoir bon accueil auprès de lui. »
  '7':
  - type: text
    content: 'Les messagers revinrent auprès de Jacob en disant : Nous sommes allés trouver ton frère Esaü et le voilà qui vient à ta rencontre – avec quatre cents hommes.'
  '8':
  - type: text
    content: 'Jacob eut très peur, l’angoisse le saisit. Il répartit en deux camps les gens qui étaient avec lui, le menu et le gros bétail ainsi que les chameaux, '
  '9':
  - type: text
    content: 'car il se disait : « Si Esaü attaque l’un des camps et le détruit, celui qui restera pourra en réchapper. »'
