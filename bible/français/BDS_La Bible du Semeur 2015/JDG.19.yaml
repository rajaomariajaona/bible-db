document_id: JDG.19,21
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Le crime des habitants de Guibéa
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'A cette époque où il n’y avait pas de roi en Israël, un lévite qui résidait dans l’arrière-pays de la région montagneuse d’Ephraïm prit pour épouse de second rang, une femme de Bethléhem en Juda. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'Mais cette fois-ci, le lévite refusa de passer une autre nuit, il se leva et partit avec ses deux ânes sellés et sa femme. Il arriva en vue de Yebous – c’est-à-dire Jérusalem. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'Alors qu’ils approchaient de Yebous, le jour tombait et le serviteur conseilla à son maître : Viens, je te prie, faisons un détour vers cette ville des Yebousiens pour y passer la nuit.'
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: – Non, lui répondit son maître, nous ne nous arrêterons pas dans une ville étrangère où il n’y a pas d’Israélite. Poussons jusqu’à Guibéa
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '19.12 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: En Benjamin (voir v. 14).
      marker-yv: yv-n
    - type: text
      text: '. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'Puis il ajouta : Allons, essayons d’arriver jusqu’à Guibéa ou à Rama'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '19.13 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Ces deux villes sont à quelque 7 kilomètres de Jérusalem.
      marker-yv: yv-n
    - type: text
      text: ', et nous passerons la nuit dans l’une de ces localités.'
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'Ils continuèrent donc leur marche et arrivèrent près de Guibéa, une ville de la tribu de Benjamin, quand le soleil se couchait. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: Alors ils s’écartèrent de leur route pour aller dormir à Guibéa. Le lévite entra dans la ville et s’arrêta sur la place, mais personne ne leur offrit l’hospitalité pour la nuit dans sa maison.
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'Finalement, un vieillard rentra tard dans la soirée de son travail des champs. C’était un homme originaire de la région montagneuse d’Ephraïm qui séjournait à Guibéa parmi les Benjaminites. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'Lorsqu’il aperçut le voyageur sur la place de la ville, il lui demanda : Où vas-tu et d’où viens-tu ?'
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'L’autre lui répondit : Nous venons de Bethléhem de Juda, et nous nous rendons dans l’arrière-pays de la région montagneuse d’Ephraïm, où je suis né. Je viens de quitter Bethléhem de Juda et je me rends au sanctuaire de l’Eternel'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '19.18 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Le lévite désire se rendre à Silo, semble-t-il (voir 18.31 ; Jos 18.1). L’ancienne version grecque a : '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: chez moi.
      marker-yv: yv-n
    - type: text
      text: ', mais il n’y a personne qui veuille me recevoir dans sa maison. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: Pourtant j’ai de la paille et du fourrage pour nos ânes, ainsi que du pain et du vin pour moi, pour ma femme et pour le serviteur qui nous accompagne ; nous n’avons besoin de rien.
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: Mais celle-ci se livra à la prostitution
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '19.2 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'L’ancienne version grecque porte : '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: se mit en colère.
      marker-yv: yv-n
    - type: text
      text: ' et le quitta pour retourner chez son père à Bethléhem où elle resta quatre mois. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: 'Le vieillard dit alors : La paix soit avec toi ! Sois le bienvenu ! Laisse-moi pourvoir à tous tes besoins, tu ne vas pas passer la nuit sur la place.'
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: Il le fit entrer dans sa maison et donna du fourrage aux ânes, les voyageurs se lavèrent les pieds
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '19.21 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Témoignage d’hospitalité dans une région où l’on marche en sandales sur des routes poussiéreuses (voir Gn 18.4 ; 24.32 ; 43.24 ; Lc 7.44 ; Jn 13.5-14).
      marker-yv: yv-n
    - type: text
      text: ', puis ils mangèrent et burent.'
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: 'Pendant qu’ils se donnaient du bon temps, des hommes de la ville, une bande de vauriens, encercla la maison. Ils frappaient violemment à la porte et criaient au vieillard, propriétaire de la maison : Fais sortir l’homme que tu as reçu chez toi pour que nous en jouissions'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '19.22 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Voir '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: Gn 19.1-8
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: .
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: 'Le maître de la maison sortit vers eux et leur dit : Non, mes amis, ne commettez pas de mal, je vous prie ! Puisque cet homme est l’hôte de ma maison, ne faites pas une chose si infâme. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: 'Ecoutez : j’ai une fille qui est encore vierge, l’homme a une épouse de second rang avec lui, je vous les amènerai, vous pourrez en disposer et les traiter comme vous jugerez bon'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '19.24 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Il s’agit ici du refrain fréquent dans le livre et qui est généralement rendu ailleurs par : '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: comme ils le jugeaient bon.
      marker-yv: yv-n
    - type: text
      text: . Mais ne commettez pas une action si infâme envers cet homme.
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: 'Mais ces hommes ne voulurent rien entendre. Alors le lévite prit son épouse et la fit sortir vers eux. Ils la violèrent et abusèrent d’elle toute la nuit jusqu’au matin, ne l’abandonnant qu’au lever du jour. '
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: 'Aux approches du matin, la femme vint s’écrouler à la porte de la maison où se trouvait son mari. Elle y resta jusqu’à ce qu’il fasse jour. '
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: 'Le matin venu, son mari se leva, ouvrit la porte de la maison et sortit pour continuer son voyage, quand il vit cette femme, son épouse de second rang, affalée à l’entrée de la maison, les mains sur le seuil. '
  '28':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: 'Il lui dit : Lève-toi et partons !'
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Mais il n’y eut pas de réponse. Alors le mari la chargea sur l’un de ses ânes et se remit en route pour rentrer chez lui. '
  '29':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: 'Arrivé dans sa maison, il saisit un coutelas, prit le corps de la femme et le découpa membre par membre en douze morceaux, qu’il envoya dans tout le territoire d’Israël. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: Son mari alla la trouver pour lui parler et la persuader de revenir chez lui. Il était accompagné d’un serviteur et avait emmené deux ânes. La femme l’introduisit dans la maison de son père. Lorsque ce dernier le vit, il l’accueillit avec joie.
  '30':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '30'
    - type: text
      text: 'A tous ceux qui voyaient cela, les émissaires demandaient : A-t-on jamais vu un crime aussi horrible depuis que les Israélites sont sortis d’Egypte ? Réfléchissez, consultez-vous, et prenez une décision !'
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: Le beau-père retint son gendre trois jours chez lui. Ils mangèrent et burent et logèrent là.
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'Le quatrième jour, ils se levèrent de bon matin et le lévite se disposait à partir quand son beau-père lui dit : Restaure-toi ! Prends un morceau de pain, vous partirez après.'
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'Ils s’assirent donc, mangèrent et burent tous deux ensemble. Puis le père de la jeune femme dit au mari : Consens à rester cette nuit ici et donne-toi encore du bon temps.'
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: Le mari se leva d’abord pour s’en aller, mais son beau-père insista tellement qu’il finit par rester et passer encore la nuit là.
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'Le matin du cinquième jour, il se leva de bonne heure pour partir. Et, de nouveau, son beau-père lui dit : Restaure-toi d’abord et remets ton départ jusqu’à ce que le jour baisse.'
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Puis ils mangèrent tous deux ensemble. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'Lorsque le mari se leva pour partir avec sa femme et son serviteur, son beau-père lui dit : Vois-tu, le jour baisse, c’est déjà presque le soir, pourquoi ne passeriez-vous pas la nuit encore ici ? Oui, le jour décline et vous pouvez tranquillement dormir là et prendre du bon temps. Demain vous vous lèverez de bonne heure pour vous mettre en route, et tu retourneras chez toi.'
