document_id: 1SA.7,21
type_code: fra
verses:
  '1':
  - type: text
    content: Les gens de Qiryath-Yearim vinrent prendre le coffre de l’Eternel et le transportèrent dans la maison d’Abinadab sur la colline. Ils établirent son fils Eléazar comme gardien du coffre de l’Eternel
  - type: note
    content: Le coffre restera là jusqu’à ce que David le fasse transférer à Jérusalem (2 S 6.2-3).
  - type: text
    content: .
  - type: heading
    content: Les Israélites reviennent à l’Eternel
  '10':
  - type: text
    content: 'Pendant que Samuel offrait l’holocauste, les Philistins s’approchèrent pour attaquer Israël. Mais à ce moment-là, l’Eternel fit tourner contre les Philistins un puissant tonnerre qui les mit en déroute, de sorte qu’ils furent battus par les Israélites. '
  '11':
  - type: text
    content: Ces derniers sortirent de Mitspa, et battirent les Philistins en les poursuivant jusqu’au-delà de Beth-Kar.
  '12':
  - type: text
    content: 'Samuel prit alors une pierre, la dressa entre Mitspa et Shén et l’appela du nom d’Eben-Ezer (la Pierre du Secours), en disant : « Jusqu’ici l’Eternel nous a secourus. » '
  '13':
  - type: text
    content: 'Les Philistins furent humiliés par cette défaite. Ils ne pénétrèrent plus à l’intérieur des frontières d’Israël, car l’Eternel intervint contre eux pendant toute la vie de Samuel. '
  '14':
  - type: text
    content: Les villes que les Philistins avaient prises à Israël, d’Eqrôn à Gath, revinrent aux Israélites, qui libérèrent tout leur territoire de leur emprise. La paix régna également entre Israël et les Amoréens
  - type: note
    content: Terme général désignant toutes les populations de Canaan.
  - type: text
    content: .
  - type: heading
    content: Saül et l’échec de la royauté
  - type: heading
    content: Samuel exerce le pouvoir judiciaire
  '15':
  - type: text
    content: 'Samuel continua à exercer le pouvoir judiciaire en Israël durant toute sa vie. '
  '16':
  - type: text
    content: Chaque année, il faisait un circuit, s’arrêtant à Béthel, à Guilgal et à Mitspa
  - type: note
    content: Trois villes de Benjamin, assez rapprochées, où se trouvaient des sanctuaires (voir Jos 4.19 ; Jg 1.22 ; 20.1 ; 21.1).
  - type: text
    content: ', et il rendait la justice pour les Israélites en chacun de ces endroits. '
  '17':
  - type: text
    content: Puis il revenait à Rama
  - type: note
    content: En Benjamin (voir 1.1 et note).
  - type: text
    content: ' où il demeurait. Là aussi, il rendait la justice pour les Israélites. Il y avait bâti un autel à l’Eternel.'
  '2':
  - type: text
    content: 'Vingt ans s’écoulèrent depuis le jour où le coffre avait été déposé à Qiryath-Yearim. L’ensemble du peuple d’Israël aspirait à revenir à l’Eternel. '
  '3':
  - type: text
    content: 'Alors Samuel dit à tous les Israélites : Si c’est de tout votre cœur que vous voulez revenir à l’Eternel, faites disparaître de chez vous les dieux étrangers et les idoles d’Astarté, et attachez-vous de tout votre cœur à l’Eternel et rendez-lui un culte à lui seul. Alors il vous délivrera des Philistins.'
  '4':
  - type: text
    content: Les Israélites firent disparaître de chez eux les Baals et les Astartés, et ils ne rendirent plus de culte qu’à l’Eternel.
  '5':
  - type: text
    content: 'Samuel leur dit alors : Assemblez tout Israël à Mitspa, je prierai l’Eternel pour vous'
  - type: note
    content: 'Mitspa: localité du territoire de Benjamin, à 12 kilomètres au nord de Jérusalem, où s’était déjà rassemblé le peuple (Jg 20.1 ; 21.1).'
  - type: text
    content: '. '
  '6':
  - type: text
    content: 'Ils s’assemblèrent à Mitspa, puisèrent de l’eau et la répandirent sur le sol devant l’Eternel ; ils jeûnèrent ce jour-là et confessèrent : Nous avons péché contre l’Eternel.'
  - type: text
    content: C’est là, à Mitspa, que Samuel fut le juge du peuple d’Israël.
  - type: heading
    content: L’Eternel donne la victoire sur les Philistins
  '7':
  - type: text
    content: 'Lorsque les Philistins apprirent que les Israélites s’étaient réunis à Mitspa, leurs cinq princes décidèrent de les attaquer. Les Israélites en furent informés et ils prirent peur des Philistins. '
  '8':
  - type: text
    content: 'Ils dirent à Samuel : Ne cesse pas de supplier l’Eternel notre Dieu en notre faveur pour qu’il nous sauve des Philistins !'
  '9':
  - type: text
    content: Samuel prit un agneau de lait et l’offrit entièrement en holocauste à l’Eternel ; puis il supplia l’Eternel de venir en aide à Israël, et l’Eternel exauça sa prière.
