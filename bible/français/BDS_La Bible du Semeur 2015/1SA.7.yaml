document_id: 1SA.7,21
type_code: fra
verses:
  '1':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: Les gens de Qiryath-Yearim vinrent prendre le coffre de l’Eternel et le transportèrent dans la maison d’Abinadab sur la colline. Ils établirent son fils Eléazar comme gardien du coffre de l’Eternel
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '7.1 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Le coffre restera là jusqu’à ce que David le fasse transférer à Jérusalem (
        - type: usfm
          marker: ref
          children:
          - type: text
            text: 2 S 6.2-3
        - type: text
          text: ).
      marker-yv: yv-n
    - type: text
      text: .
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Les Israélites reviennent à l’Eternel
    marker-yv: yv-h
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'Pendant que Samuel offrait l’holocauste, les Philistins s’approchèrent pour attaquer Israël. Mais à ce moment-là, l’Eternel fit tourner contre les Philistins un puissant tonnerre qui les mit en déroute, de sorte qu’ils furent battus par les Israélites. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: Ces derniers sortirent de Mitspa, et battirent les Philistins en les poursuivant jusqu’au-delà de Beth-Kar.
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'Samuel prit alors une pierre, la dressa entre Mitspa et Shén et l’appela du nom d’Eben-Ezer (la Pierre du Secours), en disant : « Jusqu’ici l’Eternel nous a secourus. » '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'Les Philistins furent humiliés par cette défaite. Ils ne pénétrèrent plus à l’intérieur des frontières d’Israël, car l’Eternel intervint contre eux pendant toute la vie de Samuel. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: Les villes que les Philistins avaient prises à Israël, d’Eqrôn à Gath, revinrent aux Israélites, qui libérèrent tout leur territoire de leur emprise. La paix régna également entre Israël et les Amoréens
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '7.14 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Terme général désignant toutes les populations de Canaan.
      marker-yv: yv-n
    - type: text
      text: .
  - type: usfm
    marker: ms1
    children:
    - type: text
      text: Saül et l’échec de la royauté
    marker-yv: yv-h
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Samuel exerce le pouvoir judiciaire
    marker-yv: yv-h
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'Samuel continua à exercer le pouvoir judiciaire en Israël durant toute sa vie. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: Chaque année, il faisait un circuit, s’arrêtant à Béthel, à Guilgal et à Mitspa
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '7.16 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Trois villes de Benjamin, assez rapprochées, où se trouvaient des sanctuaires (voir Jos 4.19 ; Jg 1.22 ; 20.1 ; 21.1).
      marker-yv: yv-n
    - type: text
      text: ', et il rendait la justice pour les Israélites en chacun de ces endroits. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: Puis il revenait à Rama
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '7.17 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'En Benjamin (voir '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: '1.1'
        - type: text
          text: ' et note).'
      marker-yv: yv-n
    - type: text
      text: ' où il demeurait. Là aussi, il rendait la justice pour les Israélites. Il y avait bâti un autel à l’Eternel.'
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'Vingt ans s’écoulèrent depuis le jour où le coffre avait été déposé à Qiryath-Yearim. L’ensemble du peuple d’Israël aspirait à revenir à l’Eternel. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'Alors Samuel dit à tous les Israélites : Si c’est de tout votre cœur que vous voulez revenir à l’Eternel, faites disparaître de chez vous les dieux étrangers et les idoles d’Astarté, et attachez-vous de tout votre cœur à l’Eternel et rendez-lui un culte à lui seul. Alors il vous délivrera des Philistins.'
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: Les Israélites firent disparaître de chez eux les Baals et les Astartés, et ils ne rendirent plus de culte qu’à l’Eternel.
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'Samuel leur dit alors : Assemblez tout Israël à Mitspa, je prierai l’Eternel pour vous'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '7.5 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Mitspa
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: ': '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: localité du territoire de Benjamin, à 12 kilomètres au nord de Jérusalem, où s’était déjà rassemblé le peuple (Jg 20.1 ; 21.1).
      marker-yv: yv-n
    - type: text
      text: '. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'Ils s’assemblèrent à Mitspa, puisèrent de l’eau et la répandirent sur le sol devant l’Eternel ; ils jeûnèrent ce jour-là et confessèrent : Nous avons péché contre l’Eternel.'
  - type: usfm
    marker: p
    children:
    - type: text
      text: C’est là, à Mitspa, que Samuel fut le juge du peuple d’Israël.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: L’Eternel donne la victoire sur les Philistins
    marker-yv: yv-h
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'Lorsque les Philistins apprirent que les Israélites s’étaient réunis à Mitspa, leurs cinq princes décidèrent de les attaquer. Les Israélites en furent informés et ils prirent peur des Philistins. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'Ils dirent à Samuel : Ne cesse pas de supplier l’Eternel notre Dieu en notre faveur pour qu’il nous sauve des Philistins !'
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: Samuel prit un agneau de lait et l’offrit entièrement en holocauste à l’Eternel ; puis il supplia l’Eternel de venir en aide à Israël, et l’Eternel exauça sa prière.
