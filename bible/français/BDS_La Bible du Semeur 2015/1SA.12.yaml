document_id: 1SA.12,21
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Le discours d’adieu de Samuel
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Samuel dit à tout le peuple d’Israël : Vous avez vu que je vous ai accordé tout ce que vous m’avez demandé : j’ai établi un roi sur vous. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Alors ils ont de nouveau imploré l’Eternel en confessant : « Nous avons péché, car nous avons abandonné l’Eternel et nous avons adoré les dieux Baals et Astartés. Mais à présent, délivre-nous de nos ennemis et nous te servirons'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '12.10 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Voir '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: Jg 10.10-15
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: . »
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Alors l’Eternel a envoyé Yeroubbaal
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '12.11 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Autre nom de Gédéon (
        - type: usfm
          marker: ref
          children:
          - type: text
            text: Jg 6.32
        - type: text
          text: ). Voir Jg 6 à 8.
      marker-yv: yv-n
    - type: text
      text: ', Baraq'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '12.11 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Voir '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: Jg 4.6
        - type: text
          text: '. D’après certains manuscrits de l’ancienne version grecque et la version syriaque ; le texte hébreu traditionnel a : '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: Bedan.
      marker-yv: yv-n
    - type: text
      text: ' et Jephté'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '12.11 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Voir '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: Jg 11
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: ', et finalement moi, Samuel'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '12.11 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Certains manuscrits de l’ancienne version grecque et la version syriaque ont : '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: Samson.
      marker-yv: yv-n
    - type: text
      text: . Il vous a délivrés de tous les ennemis qui vous entourent et vous avez habité le pays en sécurité.
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Lorsque vous avez vu Nahash le roi des Ammonites venir vous attaquer, vous êtes venus me dire : « Nous ne voulons pas continuer ainsi ; il faut qu’un roi règne sur nous. » Comme si l’Eternel n’était pas votre roi ! '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Eh bien, maintenant, voici votre roi selon ce que vous avez choisi et demandé. C’est l’Eternel qui l’a établi sur vous. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Si désormais vous craignez l’Eternel, si vous lui rendez votre culte, si vous lui obéissez sans vous révolter contre ses paroles et si vous et votre roi qui règne sur vous, vous suivez l’Eternel votre Dieu, tout ira bien. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Mais si vous n’écoutez pas l’Eternel et si vous êtes rebelles à ses commandements, l’Eternel vous frappera sévèrement, ainsi que votre roi, comme il a frappé sévèrement vos ancêtres.
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Maintenant, restez encore là, et observez la chose extraordinaire que l’Eternel va accomplir sous vos yeux. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ne sommes-nous pas actuellement au temps de la moisson des blés
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '12.17 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: C’est-à-dire entre mi-avril et mi-juin. La pluie est rare en Israël à cette époque de l’année.
      marker-yv: yv-n
    - type: text
      text: '  ? Eh bien, je vais invoquer l’Eternel et il fera tonner et pleuvoir pour que vous soyez bien conscients que vous avez commis une grave faute aux yeux de l’Eternel en demandant un roi.'
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Alors Samuel invoqua l’Eternel, et l’Eternel fit tonner et pleuvoir ce jour-là. Tout le peuple fut saisi d’une grande crainte à l’égard de l’Eternel et de Samuel. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Tous supplièrent Samuel : Intercède pour tes serviteurs auprès de l’Eternel ton Dieu afin que nous ne mourions pas, car nous avons ajouté à toutes nos fautes celle de demander un roi pour nous.'
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Maintenant, voici le roi qui vous dirigera. Quant à moi, je suis devenu vieux, mes cheveux ont blanchi et mes fils sont parmi vous. Je vous ai dirigés depuis ma jeunesse jusqu’à ce jour. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Samuel rassura le peuple : Soyez sans crainte ! Oui, vous êtes bien coupables de ce mal, mais ne vous détournez pas de l’Eternel et servez-le de tout votre cœur. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ne vous éloignez pas de lui, sinon vous courrez après des choses de néant qui sont inutiles et incapables de secourir, parce qu’elles ne sont que néant. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Il a plu à l’Eternel de faire de vous son peuple. C’est pourquoi il ne vous abandonnera pas, car il tient à faire honneur à son grand nom. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'En ce qui me concerne, que l’Eternel me garde de commettre une faute contre lui en cessant de prier pour vous. Je continuerai à vous enseigner le bon et droit chemin. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'De votre côté, craignez l’Eternel et servez-le sincèrement de tout votre cœur en considérant les grandes choses qu’il a accomplies pour vous. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Mais si vous faites le mal, vous serez détruits, vous et votre roi.
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Je me tiens aujourd’hui devant vous. Répondez-moi devant l’Eternel et devant celui qui a reçu son onction : De qui ai-je pris le bœuf ? De qui ai-je pris l’âne ? Ai-je exploité ou opprimé l’un de vous ? De qui ai-je accepté un présent pour fermer les yeux sur sa conduite ? Dites-le, et je vous rendrai tout ce que j’aurais pris injustement.'
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ils lui répondirent : Tu ne nous as ni exploités, ni opprimés, et tu n’as jamais rien accepté de personne.'
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Il reprit : L’Eternel est donc témoin devant vous, et celui qui a reçu l’onction de sa part l’est aussi aujourd’hui : vous n’avez rien trouvé à me reprocher.'
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Le peuple confirma : Oui, il en est témoin.'
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Samuel dit encore au peuple : C’est l’Eternel qui a établi Moïse et Aaron et qui a fait sortir nos ancêtres d’Egypte'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '12.6 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Voir '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: Ex 6.26
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: '. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Maintenant donc, comparaissez en sa présence et je vais vous citer tous les actes puissants qu’il a accomplis pour vous sauver, vous et vos ancêtres.
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Après que Jacob fut venu en Egypte, lorsque vos ancêtres ont imploré l’Eternel
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '12.8 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Voir '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: Ex 2.23
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: ', il a envoyé Moïse et Aaron qui les ont fait sortir d’Egypte pour les établir dans le pays où nous sommes. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Mais eux, ils ont délaissé l’Eternel leur Dieu. C’est pourquoi il les a livrés à Sisera, le chef de l’armée de Hatsor, aux Philistins et au roi de Moab qui leur ont fait la guerre
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '12.9 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Voir '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: Jg 4
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: '. '
