document_id: EPH.4
type_code: fra
segments:
- type: usfm
  marker: ms1
  children:
  - type: text
    text: La vie de la nouvelle communauté
  marker-yv: yv-h
- type: usfm
  marker: s1
  children:
  - type: text
    text: 'L’unité : la conserver'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Moi qui suis prisonnier à cause du Seigneur, je vous demande donc instamment de vous conduire d’une manière digne de l’appel qui vous a été adressé : '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'soyez toujours humbles, empreints de douceur et patients, supportez-vous les uns les autres avec amour. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Efforcez-vous de conserver l’unité que donne l’Esprit, dans la paix qui vous lie les uns aux autres. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Il y a un seul corps et un seul Esprit ; de même, Dieu vous a fait venir à lui en vous donnant une seule espérance : celle à laquelle vous avez été appelés.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Il y a un seul Seigneur, une seule foi, un seul baptême, '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: un seul Dieu et Père de tous qui règne sur tous, qui agit par tous et qui est en tous
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '4.6 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Autre traduction : '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: qui règne sur tout, qui agit par tout et qui est en tout.
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: s1
  children:
  - type: text
    text: 'L’unité : l’acquérir'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Cependant, chacun de nous a reçu la grâce de Dieu selon la part que Christ lui donne dans son œuvre.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'C’est bien ce que déclare l’Ecriture :'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: qt
    children:
    - type: text
      text: Il est monté sur les hauteurs,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: qt
    children:
    - type: text
      text: il a emmené des captifs
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: qt
    children:
    - type: text
      text: et il a fait des dons aux hommes
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '4.8 '
    - type: usfm
      marker: ft
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ps 68.19
        metadata:
          usfm: PSA.68.19
      - type: text
        text: ' .'
    marker-yv: yv-n
  - type: usfm
    marker: qt
    children:
    - type: text
      text: .
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Or, que signifie : '
  - type: usfm
    marker: qt
    children:
    - type: text
      text: Il est monté ?
  - type: text
    text: ' Cela implique qu’auparavant, il est descendu jusqu’en bas, c’est-à-dire sur la terre'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '4.9 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Certains comprennent : '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: dans les régions les plus profondes de la terre.
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Celui qui est descendu, c’est aussi celui qui est '
  - type: usfm
    marker: qt
    children:
    - type: text
      text: monté
  - type: text
    text: ' au-dessus de tous les cieux afin de remplir l’univers entier.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'C’est lui qui '
  - type: usfm
    marker: qt
    children:
    - type: text
      text: a fait don
  - type: text
    text: ' de certains comme apôtres, d’autres comme prophètes, d’autres comme prédicateurs de l’Evangile, et d’autres encore, comparables à des bergers'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '4.11 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Paul fait peut-être allusion ici aux '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'bergers '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'que Dieu avait promis de donner à son peuple selon '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Jr 3.15
        metadata:
          usfm: JER.3.15
      - type: text
        text: . L’image du berger est fréquente dans l’Ancien Testament pour des dirigeants politiques (
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ez 34
        metadata:
          usfm: EZK.34
      - type: text
        text: ), mais Jérémie se compare aussi lui-même à un berger en tant que prophète (
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Jr 17.16
        metadata:
          usfm: JER.17.16
      - type: text
        text: '  ; voir aussi '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Es 56.10-11
        metadata:
          usfm: ISA.56.10+ISA.56.11
      - type: text
        text: ). Ici, ce sont les enseignants de l’Eglise qui sont comparés à des bergers.
    marker-yv: yv-n
  - type: text
    text: ', comme enseignants. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Il a fait don de ces hommes pour que les membres du peuple saint soient rendus aptes à accomplir leur service
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '4.12 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Autre traduction : '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: il a fait don de ces hommes pour que ceux-ci œuvrent par leur ministère au perfectionnement des membres du peuple saint.
    marker-yv: yv-n
  - type: text
    text: ' en vue de la construction du corps de Christ.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Ainsi nous parviendrons tous ensemble à l’unité dans la foi et dans la connaissance du Fils de Dieu, à l’état d’adultes, à un stade de maturité où se manifeste la plénitude qui nous vient de Christ. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: De cette manière, nous ne serons plus de petits enfants ballottés comme des barques par les vagues et emportés çà et là par le vent de toutes sortes d’enseignements, à la merci d’hommes habiles à entraîner les autres dans l’erreur.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Au contraire, en exprimant la vérité dans l’amour, nous grandirons à tous égards vers celui qui est la tête : Christ.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: C’est de lui que le corps tout entier tire sa croissance pour s’affermir dans l’amour, sa cohésion et sa forte unité lui venant de toutes les articulations dont il est pourvu, pour assurer l’activité attribuée à chacune de ses parties
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '4.16 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'pour assurer… parties. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Autre traduction : '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: avec la mesure de force que chacune de ses parties a reçue.
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: s1
  children:
  - type: text
    text: La vie en Christ
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Voici donc ce que je vous dis, ce que je vous déclare au nom du Seigneur : vous ne devez plus vivre comme les païens, qui suivent leurs pensées vides de sens. '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Ils ont, en effet, l’intelligence obscurcie et sont étrangers à la vie que Dieu donne, à cause de l’ignorance qui est en eux et qui provient de l’endurcissement de leur cœur. '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Ayant perdu tout sens moral, ils se sont livrés à l’inconduite pour se jeter avec frénésie dans toutes sortes de vices.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Mais vous, ce n’est pas ainsi que vous avez appris Christ, '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: puisqu’on vous a fait savoir ce qu’il est et qu’on vous a enseigné, dans le cadre de votre union avec lui, ce qui est conforme à la vérité qui est en Jésus
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '4.21 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Autre traduction : '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: et qu’on vous a enseigné dans le cadre de votre union avec lui, puisque la vérité est en Jésus.
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Cela consiste à vous débarrasser de votre ancienne manière de vivre, celle de l’homme que vous étiez autrefois et qui se corrompait en suivant ses désirs trompeurs, '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'à être renouvelés quant à votre esprit et votre intelligence, '
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: et à vous revêtir de l’homme nouveau, créé conformément à la pensée de Dieu, pour être juste et saint conformément à la vérité.
- type: usfm
  marker: s1
  children:
  - type: text
    text: La vie dans l’amour
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'C’est pourquoi, débarrassés du mensonge, '
  - type: usfm
    marker: qt
    children:
    - type: text
      text: que chacun de vous dise la vérité à son prochain
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '4.25 '
    - type: usfm
      marker: ft
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Za 8.16
        metadata:
          usfm: ZEC.8.16
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: . Ne sommes-nous pas membres les uns des autres ?
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: ' '
  - type: usfm
    marker: qt
    children:
    - type: text
      text: Mettez-vous en colère
  - type: text
    text: ' ╵'
  - type: usfm
    marker: qt
    children:
    - type: text
      text: mais n’allez pas jusqu’à pécher
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '4.26 '
    - type: usfm
      marker: ft
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ps 4.5
        metadata:
          usfm: PSA.4.5
      - type: text
        text: ' cité selon l’ancienne version grecque. D’autres traduisent : '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: Si vous vous mettez en colère, ne commettez pas de péché.
    marker-yv: yv-n
  - type: usfm
    marker: qt
    children:
    - type: text
      text: ;
  - type: text
    text: ' que votre colère s’apaise avant le coucher du soleil. '
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: Ne donnez aucune prise au diable.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: Que le voleur cesse de dérober ; qu’il se donne plutôt de la peine et travaille honnêtement de ses mains pour qu’il ait de quoi donner à ceux qui sont dans le besoin.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: Ne laissez aucune mauvaise parole franchir vos lèvres ; ayez au contraire des paroles empreintes de bonté, qui aident les autres à grandir dans la foi selon les besoins. Ainsi elles feront du bien à ceux qui vous entendent.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: N’attristez
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '4.30 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Autre traduction : '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: N’entravez pas l’action de l’Esprit.
    marker-yv: yv-n
  - type: text
    text: ' pas le Saint-Esprit de Dieu car, par cet Esprit, Dieu vous a marqués de son sceau comme sa propriété pour le jour de la délivrance finale.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'Amertume, irritation, colère, éclats de voix, insultes : faites disparaître tout cela du milieu de vous, ainsi que toute forme de méchanceté. '
  - type: usfm
    marker: v
    metadata:
      v: '32'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: Soyez bons et compréhensifs les uns envers les autres. Pardonnez-vous réciproquement comme Dieu vous
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '4.32 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Certains manuscrits ont : '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: nous.
    marker-yv: yv-n
  - type: text
    text: ' a pardonné en Christ.'
