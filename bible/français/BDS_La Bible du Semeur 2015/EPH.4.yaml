document_id: EPH.4,21
type_code: fra
verses:
  '1':
  - type: heading
    content: La vie de la nouvelle communauté
  - type: heading
    content: 'L’unité : la conserver'
  - type: text
    content: 'Moi qui suis prisonnier à cause du Seigneur, je vous demande donc instamment de vous conduire d’une manière digne de l’appel qui vous a été adressé : '
  '10':
  - type: text
    content: 'Celui qui est descendu, c’est aussi celui qui est '
  - type: text
    content: monté
  - type: text
    content: ' au-dessus de tous les cieux afin de remplir l’univers entier.'
  '11':
  - type: text
    content: 'C’est lui qui '
  - type: text
    content: a fait don
  - type: text
    content: ' de certains comme apôtres, d’autres comme prophètes, d’autres comme prédicateurs de l’Evangile, et d’autres encore, comparables à des bergers'
  - type: note
    content: Paul fait peut-être allusion ici aux bergers que Dieu avait promis de donner à son peuple selon Jr 3.15. L’image du berger est fréquente dans l’Ancien Testament pour des dirigeants politiques (Ez 34), mais Jérémie se compare aussi lui-même à un berger en tant que prophète (Jr 17.16  ; voir aussi Es 56.10-11). Ici, ce sont les enseignants de l’Eglise qui sont comparés à des bergers.
  - type: text
    content: ', comme enseignants. '
  '12':
  - type: text
    content: Il a fait don de ces hommes pour que les membres du peuple saint soient rendus aptes à accomplir leur service
  - type: note
    content: 'Autre traduction : il a fait don de ces hommes pour que ceux-ci œuvrent par leur ministère au perfectionnement des membres du peuple saint.'
  - type: text
    content: ' en vue de la construction du corps de Christ.'
  '13':
  - type: text
    content: 'Ainsi nous parviendrons tous ensemble à l’unité dans la foi et dans la connaissance du Fils de Dieu, à l’état d’adultes, à un stade de maturité où se manifeste la plénitude qui nous vient de Christ. '
  '14':
  - type: text
    content: De cette manière, nous ne serons plus de petits enfants ballottés comme des barques par les vagues et emportés çà et là par le vent de toutes sortes d’enseignements, à la merci d’hommes habiles à entraîner les autres dans l’erreur.
  '15':
  - type: text
    content: 'Au contraire, en exprimant la vérité dans l’amour, nous grandirons à tous égards vers celui qui est la tête : Christ.'
  '16':
  - type: text
    content: C’est de lui que le corps tout entier tire sa croissance pour s’affermir dans l’amour, sa cohésion et sa forte unité lui venant de toutes les articulations dont il est pourvu, pour assurer l’activité attribuée à chacune de ses parties
  - type: note
    content: 'pour assurer… parties. Autre traduction : avec la mesure de force que chacune de ses parties a reçue.'
  - type: text
    content: .
  - type: heading
    content: La vie en Christ
  '17':
  - type: text
    content: 'Voici donc ce que je vous dis, ce que je vous déclare au nom du Seigneur : vous ne devez plus vivre comme les païens, qui suivent leurs pensées vides de sens. '
  '18':
  - type: text
    content: 'Ils ont, en effet, l’intelligence obscurcie et sont étrangers à la vie que Dieu donne, à cause de l’ignorance qui est en eux et qui provient de l’endurcissement de leur cœur. '
  '19':
  - type: text
    content: Ayant perdu tout sens moral, ils se sont livrés à l’inconduite pour se jeter avec frénésie dans toutes sortes de vices.
  '2':
  - type: text
    content: 'soyez toujours humbles, empreints de douceur et patients, supportez-vous les uns les autres avec amour. '
  '20':
  - type: text
    content: 'Mais vous, ce n’est pas ainsi que vous avez appris Christ, '
  '21':
  - type: text
    content: puisqu’on vous a fait savoir ce qu’il est et qu’on vous a enseigné, dans le cadre de votre union avec lui, ce qui est conforme à la vérité qui est en Jésus
  - type: note
    content: 'Autre traduction : et qu’on vous a enseigné dans le cadre de votre union avec lui, puisque la vérité est en Jésus.'
  - type: text
    content: '. '
  '22':
  - type: text
    content: 'Cela consiste à vous débarrasser de votre ancienne manière de vivre, celle de l’homme que vous étiez autrefois et qui se corrompait en suivant ses désirs trompeurs, '
  '23':
  - type: text
    content: 'à être renouvelés quant à votre esprit et votre intelligence, '
  '24':
  - type: text
    content: et à vous revêtir de l’homme nouveau, créé conformément à la pensée de Dieu, pour être juste et saint conformément à la vérité.
  - type: heading
    content: La vie dans l’amour
  '25':
  - type: text
    content: 'C’est pourquoi, débarrassés du mensonge, '
  - type: text
    content: que chacun de vous dise la vérité à son prochain
  - type: note
    content: Za 8.16.
  - type: text
    content: . Ne sommes-nous pas membres les uns des autres ?
  '26':
  - type: text
    content: ' '
  - type: text
    content: Mettez-vous en colère
  - type: text
    content: ' ╵'
  - type: text
    content: mais n’allez pas jusqu’à pécher
  - type: note
    content: 'Ps 4.5 cité selon l’ancienne version grecque. D’autres traduisent : Si vous vous mettez en colère, ne commettez pas de péché.'
  - type: text
    content: ;
  - type: text
    content: ' que votre colère s’apaise avant le coucher du soleil. '
  '27':
  - type: text
    content: Ne donnez aucune prise au diable.
  '28':
  - type: text
    content: Que le voleur cesse de dérober ; qu’il se donne plutôt de la peine et travaille honnêtement de ses mains pour qu’il ait de quoi donner à ceux qui sont dans le besoin.
  '29':
  - type: text
    content: Ne laissez aucune mauvaise parole franchir vos lèvres ; ayez au contraire des paroles empreintes de bonté, qui aident les autres à grandir dans la foi selon les besoins. Ainsi elles feront du bien à ceux qui vous entendent.
  '3':
  - type: text
    content: 'Efforcez-vous de conserver l’unité que donne l’Esprit, dans la paix qui vous lie les uns aux autres. '
  '30':
  - type: text
    content: N’attristez
  - type: note
    content: 'Autre traduction : N’entravez pas l’action de l’Esprit.'
  - type: text
    content: ' pas le Saint-Esprit de Dieu car, par cet Esprit, Dieu vous a marqués de son sceau comme sa propriété pour le jour de la délivrance finale.'
  '31':
  - type: text
    content: 'Amertume, irritation, colère, éclats de voix, insultes : faites disparaître tout cela du milieu de vous, ainsi que toute forme de méchanceté. '
  '32':
  - type: text
    content: Soyez bons et compréhensifs les uns envers les autres. Pardonnez-vous réciproquement comme Dieu vous
  - type: note
    content: 'Certains manuscrits ont : nous.'
  - type: text
    content: ' a pardonné en Christ.'
  '4':
  - type: text
    content: 'Il y a un seul corps et un seul Esprit ; de même, Dieu vous a fait venir à lui en vous donnant une seule espérance : celle à laquelle vous avez été appelés.'
  '5':
  - type: text
    content: 'Il y a un seul Seigneur, une seule foi, un seul baptême, '
  '6':
  - type: text
    content: un seul Dieu et Père de tous qui règne sur tous, qui agit par tous et qui est en tous
  - type: note
    content: 'Autre traduction : qui règne sur tout, qui agit par tout et qui est en tout.'
  - type: text
    content: .
  - type: heading
    content: 'L’unité : l’acquérir'
  '7':
  - type: text
    content: Cependant, chacun de nous a reçu la grâce de Dieu selon la part que Christ lui donne dans son œuvre.
  '8':
  - type: text
    content: 'C’est bien ce que déclare l’Ecriture :'
  - type: text
    content: Il est monté sur les hauteurs,
  - type: text
    content: il a emmené des captifs
  - type: text
    content: et il a fait des dons aux hommes
  - type: text
    content: ' '
  - type: note
    content: Ps 68.19 .
  - type: text
    content: .
  '9':
  - type: text
    content: 'Or, que signifie : '
  - type: text
    content: Il est monté ?
  - type: text
    content: ' Cela implique qu’auparavant, il est descendu jusqu’en bas, c’est-à-dire sur la terre'
  - type: note
    content: 'Certains comprennent : dans les régions les plus profondes de la terre.'
  - type: text
    content: '. '
