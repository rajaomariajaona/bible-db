document_id: 2CH.10,21
type_code: fra
verses:
  '1':
  - type: heading
    content: Les rois de Juda du schisme à l’exil
  - type: heading
    content: La dureté de Roboam envers le peuple
  - type: heading
    content: (1 R 12.1-24)
  - type: text
    content: Roboam se rendit à Sichem
  - type: note
    content: Voir note 1 R 12.1.
  - type: text
    content: ', où tout Israël s’était rassemblé pour le proclamer roi. '
  '10':
  - type: text
    content: 'Les hommes jeunes qui avaient grandi avec lui lui répondirent : Ces gens se plaignent en prétendant que ton père a rendu leur joug trop pesant, et ils te demandent de l’alléger ? Eh bien, voici comment tu leur répondras : « Mon petit doigt est plus gros que les reins de mon père. '
  '11':
  - type: text
    content: Oui, mon père vous a chargés d’un joug pesant, mais moi, je le rendrai encore plus pesant ! Mon père vous a fait marcher à coups de fouet, moi, je vous ferai marcher avec des lanières cloutées. »
  '12':
  - type: text
    content: 'Le surlendemain, Jéroboam et tout le peuple vinrent trouver Roboam comme le roi le leur avait commandé. '
  '13':
  - type: text
    content: 'Le roi Roboam ne tint pas compte du conseil des responsables et il parla durement au peuple. '
  '14':
  - type: text
    content: 'Il lui répondit comme les hommes jeunes le lui avaient conseillé : Mon père vous a imposé'
  - type: note
    content: 'D’après plusieurs manuscrits hébreux, les versions anciennes, et 1 R 12.14. Les autres manuscrits hébreux ont : je vous imposerai.'
  - type: text
    content: ' un joug pesant, leur dit-il, eh bien, moi je le rendrai encore plus pesant. Mon père vous a fait marcher à coups de fouet, moi je vous ferai marcher à coups de lanières cloutées.'
  '15':
  - type: text
    content: Le roi refusa donc de tenir compte des revendications du peuple, car Dieu dirigeait le cours des événements pour accomplir ce qu’il avait annoncé à Jéroboam, fils de Nebath, par l’intermédiaire d’Ahiya de Silo
  - type: note
    content: Voir 1 R 11.29-39.
  - type: text
    content: .
  - type: heading
    content: La révolte des Israélites du Nord
  '16':
  - type: text
    content: 'Comme le roi ne les écoutait pas, tous les Israélites répliquèrent au roi : Qu’avons-nous à faire avec David ? Nous n’avons rien à voir avec le fils d’Isaï ! Retournons chacun chez soi, gens d’Israël ! Quant à toi, descendant de David, tu n’as qu’à t’occuper de ta propre maison !'
  - type: text
    content: Et tous les Israélites rentrèrent chez eux
  - type: note
    content: Voir 2 S 20.1.
  - type: text
    content: '. '
  '17':
  - type: text
    content: 'Roboam régna sur les Israélites qui habitaient les villes de Juda. '
  '18':
  - type: text
    content: 'Alors le roi Roboam envoya Hadoram, le chef des corvées, auprès des Israélites du Nord, mais les Israélites le lapidèrent et il mourut. Le roi lui-même réussit de justesse à sauter sur un char pour s’enfuir à Jérusalem. '
  '19':
  - type: text
    content: C’est ainsi que les Israélites du Nord sont en révolte contre la dynastie de David jusqu’à ce jour.
  '2':
  - type: text
    content: 'Quand Jéroboam, fils de Nebath, qui se trouvait en Egypte où il s’était réfugié pour échapper au roi Salomon, en fut informé, il revint d’Egypte. '
  '3':
  - type: text
    content: 'On l’envoya chercher, et Jéroboam vint avec tout Israël parler à Roboam. Ils lui dirent : '
  '4':
  - type: text
    content: Ton père nous a imposé un joug très pesant. Nous te serons soumis à condition que tu allèges maintenant la lourde servitude et ce joug pesant que ton père nous a imposés.
  '5':
  - type: text
    content: 'Roboam leur répondit : Laissez-moi réfléchir et revenez me trouver après-demain.'
  - type: text
    content: Le peuple se retira donc.
  '6':
  - type: text
    content: 'Le roi Roboam consulta les responsables qui avaient conseillé son père Salomon de son vivant. Il leur demanda : Que me conseillez-vous de répondre à ces gens ?'
  '7':
  - type: text
    content: 'Les responsables lui dirent : Si aujourd’hui tu te montres bon envers ce peuple, si tu les traites favorablement et si tu leur parles en termes bienveillants, ils seront pour toujours tes serviteurs.'
  '8':
  - type: text
    content: 'Mais Roboam n’écouta pas le conseil que lui donnaient les responsables. Il consulta les hommes jeunes de son entourage qui avaient grandi avec lui. '
  '9':
  - type: text
    content: 'Il leur demanda : Ces gens me demandent d’alléger le joug que mon père leur a imposé. Que me conseillez-vous de leur répondre ?'
