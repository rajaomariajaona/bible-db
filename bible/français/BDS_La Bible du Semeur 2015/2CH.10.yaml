document_id: 2CH.10
type_code: fra
segments:
- type: usfm
  marker: ms1
  children:
  - type: text
    text: Les rois de Juda du schisme à l’exil
  marker-yv: yv-h
- type: usfm
  marker: s1
  children:
  - type: text
    text: La dureté de Roboam envers le peuple
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: (1 R 12.1-24)
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Roboam se rendit à Sichem
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '10.1 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Voir note '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1 R 12.1
        metadata:
          usfm: 1KI.12.1
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: ', où tout Israël s’était rassemblé pour le proclamer roi. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Quand Jéroboam, fils de Nebath, qui se trouvait en Egypte où il s’était réfugié pour échapper au roi Salomon, en fut informé, il revint d’Egypte. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'On l’envoya chercher, et Jéroboam vint avec tout Israël parler à Roboam. Ils lui dirent : '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Ton père nous a imposé un joug très pesant. Nous te serons soumis à condition que tu allèges maintenant la lourde servitude et ce joug pesant que ton père nous a imposés.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Roboam leur répondit : Laissez-moi réfléchir et revenez me trouver après-demain.'
- type: usfm
  marker: p
  children:
  - type: text
    text: Le peuple se retira donc.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Le roi Roboam consulta les responsables qui avaient conseillé son père Salomon de son vivant. Il leur demanda : Que me conseillez-vous de répondre à ces gens ?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Les responsables lui dirent : Si aujourd’hui tu te montres bon envers ce peuple, si tu les traites favorablement et si tu leur parles en termes bienveillants, ils seront pour toujours tes serviteurs.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Mais Roboam n’écouta pas le conseil que lui donnaient les responsables. Il consulta les hommes jeunes de son entourage qui avaient grandi avec lui. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Il leur demanda : Ces gens me demandent d’alléger le joug que mon père leur a imposé. Que me conseillez-vous de leur répondre ?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Les hommes jeunes qui avaient grandi avec lui lui répondirent : Ces gens se plaignent en prétendant que ton père a rendu leur joug trop pesant, et ils te demandent de l’alléger ? Eh bien, voici comment tu leur répondras : « Mon petit doigt est plus gros que les reins de mon père. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Oui, mon père vous a chargés d’un joug pesant, mais moi, je le rendrai encore plus pesant ! Mon père vous a fait marcher à coups de fouet, moi, je vous ferai marcher avec des lanières cloutées. »
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Le surlendemain, Jéroboam et tout le peuple vinrent trouver Roboam comme le roi le leur avait commandé. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Le roi Roboam ne tint pas compte du conseil des responsables et il parla durement au peuple. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Il lui répondit comme les hommes jeunes le lui avaient conseillé : Mon père vous a imposé'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '10.14 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'D’après plusieurs manuscrits hébreux, les versions anciennes, et '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1 R 12.14
        metadata:
          usfm: 1KI.12.14
      - type: text
        text: '. Les autres manuscrits hébreux ont : '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: je vous imposerai.
    marker-yv: yv-n
  - type: text
    text: ' un joug pesant, leur dit-il, eh bien, moi je le rendrai encore plus pesant. Mon père vous a fait marcher à coups de fouet, moi je vous ferai marcher à coups de lanières cloutées.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Le roi refusa donc de tenir compte des revendications du peuple, car Dieu dirigeait le cours des événements pour accomplir ce qu’il avait annoncé à Jéroboam, fils de Nebath, par l’intermédiaire d’Ahiya de Silo
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '10.15 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Voir '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1 R 11.29-39
        metadata:
          usfm: 1KI.11.29+1KI.11.30+1KI.11.31+1KI.11.32+1KI.11.33+1KI.11.34+1KI.11.35+1KI.11.36+1KI.11.37+1KI.11.38+1KI.11.39
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: s1
  children:
  - type: text
    text: La révolte des Israélites du Nord
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Comme le roi ne les écoutait pas, tous les Israélites répliquèrent au roi : Qu’avons-nous à faire avec David ? Nous n’avons rien à voir avec le fils d’Isaï ! Retournons chacun chez soi, gens d’Israël ! Quant à toi, descendant de David, tu n’as qu’à t’occuper de ta propre maison !'
- type: usfm
  marker: p
  children:
  - type: text
    text: Et tous les Israélites rentrèrent chez eux
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '10.16 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Voir '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 2 S 20.1
        metadata:
          usfm: 2SA.20.1
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Roboam régna sur les Israélites qui habitaient les villes de Juda. '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Alors le roi Roboam envoya Hadoram, le chef des corvées, auprès des Israélites du Nord, mais les Israélites le lapidèrent et il mourut. Le roi lui-même réussit de justesse à sauter sur un char pour s’enfuir à Jérusalem. '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: C’est ainsi que les Israélites du Nord sont en révolte contre la dynastie de David jusqu’à ce jour.
