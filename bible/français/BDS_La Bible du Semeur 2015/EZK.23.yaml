document_id: EZK.23,21
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s2
    children:
    - type: text
      text: Amours coupables
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'L’Eternel m’adressa la parole en ces termes :'
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: Eux, ils la mirent à nu. Ils se sont emparés de ses fils et de ses filles, puis ils l’ont tuée par l’épée et elle est devenue pour les femmes un exemple parce qu’on a exécuté la sentence sur elle
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '23.10 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Voir Os 2.5 ; 2 R 17.6.
      marker-yv: yv-n
    - type: text
      text: .
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'Sa sœur Oholiba a bien vu tout cela, mais dans ses désirs passionnels, elle s’est corrompue plus qu’elle, et ses prostitutions ont été encore pires que celles de sa sœur. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'Elle a brûlé d’un désir passionnel pour les Assyriens, gouverneurs et seigneurs, guerriers élégamment vêtus, cavaliers à cheval, tous jeunes hommes séduisants. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'Et j’ai vu qu’elle aussi se rendait impure : toutes deux avaient suivi un chemin identique. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'Mais Oholiba alla plus loin encore dans la prostitution : elle vit sur le mur des hommes dessinés, des représentations de Chaldéens dessinés, peints en rouge, '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'portant, serrés aux reins, des ceinturons, et la tête couverte de turbans luxueux. Tous avaient l’apparence de nobles capitaines ; tels étaient les portraits des fils de Babylone qui sont nés en Chaldée. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: En les voyant, elle s’est enflammée pour eux d’un désir passionnel, et elle a dépêché des messagers vers eux en Chaldée
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '23.16 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Allusion aux relations diplomatiques entre les rois de Juda et de Babylone, par exemple entre Ezéchias et Merodak-Baladân (voir 2 R 20.12-19 ; 24.1 ; Es 39).
      marker-yv: yv-n
    - type: text
      text: '. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'Et les Babyloniens se sont rendus chez elle pour partager son lit et pour la rendre impure par leurs prostitutions. Après s’être rendue impure avec eux, elle les a pris en dégoût. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'Elle a manifesté au grand jour ses prostitutions et a exposé sa nudité ; alors je l’ai prise en dégoût comme j’avais déjà pris sa sœur en dégoût. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'Elle a multiplié le nombre de ses prostitutions pour rappeler le souvenir de sa jeunesse où elle se prostituait en Egypte. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: Fils d’homme, il y avait deux femmes nées d’une même mère
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '23.2 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Voir 16.3, 44-46 ; Jr 3.6-12.
      marker-yv: yv-n
    - type: text
      text: '. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: 'Elle s’est enflammée d’un désir passionnel pour leurs hommes débauchés ayant des membres d’âne et qui ont l’ardeur d’étalons. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: Tu as voulu revivre les débauches de ta jeunesse, lorsque les Egyptiens te saisissaient les seins et caressaient tes seins de jeune fille.
  - type: usfm
    marker: s2
    children:
    - type: text
      text: Le châtiment de la jeune sœur
    marker-yv: yv-h
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: 'C’est pourquoi, le Seigneur, l’Eternel, te déclare : Ecoute, Oholiba, je vais dresser tes amants contre toi, ceux que tu as pris en dégoût, je les ferai venir de partout contre toi : '
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: 'les Babyloniens et tous les Chaldéens, gens de Peqod, de Shoa, de Qoa, et tous les Assyriens, séduisants jeunes hommes, gouverneurs et seigneurs, tous nobles capitaines, hauts dignitaires, tous montés à cheval. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: Des peuples assemblés contre toi s’avancent avec leurs armes
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '23.24 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: avec leurs armes
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: ': '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'terme hébreu de sens incertain. L’ancienne version grecque a : '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: du nord.
      marker-yv: yv-n
    - type: text
      text: ', leurs chars de guerre et tous leurs attelages, munis de petits et de grands boucliers et de casques. Ils prendront position tout autour de toi. Je leur remettrai le pouvoir de te juger, et ils te jugeront selon leurs propres lois. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: 'Je répandrai sur toi le poids de ma vive indignation. Ils exerceront leur fureur contre toi, et ils te couperont le nez et les oreilles. Ce qui restera tombera par l’épée ; ils prendront tes fils et tes filles, et ceux qui subsisteront seront livrés au feu. '
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: 'Ils te dépouilleront de tous tes vêtements et ils t’arracheront les bijoux dont tu te pares. '
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: Ainsi je mettrai fin à tes prostitutions et à tes mœurs infâmes qui ont commencé en Egypte, et tu ne lèveras plus les yeux vers ces gens, tu ne te souviendras plus jamais de l’Egypte.
  '28':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: 'Car voici ce que dit le Seigneur, l’Eternel : Je vais t’abandonner à ceux que tu détestes, ceux que tu as pris en dégoût. '
  '29':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: 'Ils agiront contre toi avec haine et ils emporteront le fruit de ton travail. Ils t’abandonneront toute nue, dépouillée, en exposant ainsi la honte de ton immoralité, ton impudicité et tes prostitutions. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'Elles se sont prostituées en Egypte. Oui, là, dès leur jeunesse, elles se sont prostituées ; on leur a caressé les seins, et l’on a saisi leurs seins de jeunes filles. '
  '30':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '30'
    - type: text
      text: 'Ce qui te vaut cela, c’est de t’être prostituée à ces peuples païens et de t’être rendue impure avec leurs idoles. '
  '31':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '31'
    - type: text
      text: Tu as marché sur les traces de ta sœur, c’est pourquoi je te mettrai dans la main la coupe
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '23.31 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Voir Es 51.17, 22 ; Jr 25.15ss
      marker-yv: yv-n
    - type: text
      text: ' qu’elle a bue.'
  '32':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '32'
    - type: text
      text: 'Voici ce que déclare ╵le Seigneur, l’Eternel :'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: La coupe que ta sœur a bue, ╵tu la boiras aussi,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: coupe large et profonde,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: qui donnera à rire, ╵à se moquer,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: tant elle est pleine.
  '33':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '33'
    - type: text
      text: Tu seras rassasiée ╵d’ivresse et d’affliction.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: C’est une coupe ╵de dévastation et d’effroi,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: la coupe de ta sœur, ╵de Samarie.
  '34':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '34'
    - type: text
      text: Tu boiras cette coupe ╵et tu la videras,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: tu la briseras en morceaux
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et, avec ses tessons, ╵tu te lacéreras les seins,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: car, c’est moi qui le dis.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: C’est là ce que déclare ╵le Seigneur, l’Eternel.
  '35':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '35'
    - type: text
      text: 'C’est pourquoi, le Seigneur, l’Eternel, te déclare : Puisque tu m’as mis en oubli, que tu m’as rejeté en me tournant le dos, tu paieras toi aussi, pour tes débauches et ta prostitution.'
  - type: usfm
    marker: s2
    children:
    - type: text
      text: Un sérieux avertissement
    marker-yv: yv-h
  '36':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '36'
    - type: text
      text: 'Puis l’Eternel me dit : Fils d’homme, prononce un jugement contre Ohola et contre Oholiba et dénonce leurs abominations ! '
  '37':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '37'
    - type: text
      text: 'Car elles ont été toutes deux adultères et les mains de chacune sont couvertes de sang. C’est avec leurs idoles qu’elles ont commis adultère et elles leur ont sacrifié les fils qu’elles m’avaient enfantés pour que celles-ci les dévorent. '
  '38':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '38'
    - type: text
      text: 'Et elles m’ont fait plus encore en ce jour-là : toutes deux ont rendu impur mon sanctuaire et ont profané mes jours de sabbat. '
  '39':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '39'
    - type: text
      text: Quand elles immolaient leurs fils à leurs idoles, elles sont entrées ce jour même dans mon sanctuaire pour le profaner, oui voilà ce qu’elles ont fait au milieu de mon temple.
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'L’aînée c’est : Ohola, et sa sœur, c’est Oholiba'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '23.4 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Ohola
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: ', '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'nom qui signifie : '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'sa propre tente ; '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'c’est sans doute là une allusion aux sanctuaires illégitimes érigés dans le royaume du Nord. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'Oholiba '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'signifie : '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'ma tente en elle ; '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: sans doute une allusion au temple de Jérusalem.
      marker-yv: yv-n
    - type: text
      text: . Puis elles m’appartinrent et elles m’ont donné des fils et des filles. Or, le nom d’Ohola, c’est Samarie, celui d’Oholiba, Jérusalem.
  '40':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '40'
    - type: text
      text: 'Elles ont envoyé chercher au loin des hommes. Sitôt qu’ils ont reçu les messagers qui leur ont été envoyés, ils sont venus. Pour eux, tu t’es baignée, tu t’es fardé les yeux, tu as mis tes bijoux '
  '41':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '41'
    - type: text
      text: 'et tu t’es assise là sur un lit d’apparat devant lequel on a disposé une table et tu y as posé mon encens et mon huile. '
  '42':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '42'
    - type: text
      text: On entendait la voix d’une multitude insouciante. Parmi les hommes de la populace, on a fait venir du désert des ivrognes
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '23.42 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: des ivrognes
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: ': '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'selon le texte hébreu traditionnel tel qu’il est écrit. Une ancienne tradition de scribe y indique qu’il faut lire, en supprimant une lettre, '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: des Sabéens.
      marker-yv: yv-n
    - type: text
      text: ' qui ont passé des bracelets aux mains de ces deux sœurs et ils ont posé des couronnes splendides sur leurs têtes. '
  '43':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '43'
    - type: text
      text: 'Alors je me suis interrogé sur cette femme flétrie par l’adultère : Va-t-elle se livrer encore à ses prostitutions'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '23.43 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Va-t-elle… prostitutions
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: ': '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: hébreu pas clair.
      marker-yv: yv-n
    - type: text
      text: '  ? '
  '44':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '44'
    - type: text
      text: On est venu vers elle tout comme on va trouver une prostituée. Oui, c’est ainsi qu’ils sont venus vers Ohola et vers Oholiba, ces femmes débauchées.
  '45':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '45'
    - type: text
      text: 'Mais des hommes justes les jugeront selon le droit qui s’applique aux femmes adultères et aux femmes qui répandent le sang, car elles sont bien adultères et ont du sang sur les mains. '
  '46':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '46'
    - type: text
      text: 'Car voici ce que dit le Seigneur, l’Eternel : Que l’on fasse venir contre elles une grande coalition et je les livrerai à la terreur et au pillage ! '
  '47':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '47'
    - type: text
      text: 'Cette coalition les lapidera et les taillera en pièces à coups d’épée. Ces gens tueront leurs fils et leurs filles et brûleront leurs maisons. '
  '48':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '48'
    - type: text
      text: 'Ainsi je mettrai fin aux débauches dans le pays ; toutes les autres femmes apprendront par cela à ne pas imiter votre impudicité. '
  '49':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '49'
    - type: text
      text: Ils feront retomber sur vous votre débauche, vous paierez ainsi pour vos péchés d’idolâtrie ; et vous reconnaîtrez que je suis le Seigneur, l’Eternel.
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: Ohola était mienne, mais elle s’est prostituée. Ce fut avec passion qu’elle aima ses amants les Assyriens, guerriers
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '23.5 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Allusion ici et dans les versets qui suivent aux alliances avec des nations étrangères.
      marker-yv: yv-n
    - type: text
      text: ' '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'vêtus d’habits de pourpre, gouverneurs et seigneurs, tous jeunes hommes séduisants, cavaliers à cheval. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'Elle prodigua ses faveurs à l’élite des Assyriens, elle brûlait pour eux d’un désir passionnel, et elle s’est rendue impure en servant leurs idoles. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'Elle n’a pas délaissé ses prostitutions du passé dans le pays d’Egypte : là-bas, les Egyptiens avaient couché avec elle, dans sa jeunesse. Ils avaient saisi ses seins de jeune fille et l’avaient submergée de leurs prostitutions. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'Aussi je l’ai livrée à ses amants, les Assyriens pour qui elle brûlait d’un désir passionnel. '
