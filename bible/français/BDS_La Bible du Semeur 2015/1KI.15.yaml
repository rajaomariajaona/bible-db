document_id: 1KI.15,21
type_code: fra
verses:
  '1':
  - type: heading
    content: Le règne d’Abiyam sur Juda
  - type: heading
    content: (2 Ch 13.1-2)
  - type: text
    content: 'La dix-huitième année du règne de Jéroboam, fils de Nebath, Abiyam devint roi de Juda. '
  '10':
  - type: text
    content: Il régna quarante et un ans à Jérusalem. Il descendait d’Abishalom par sa grand-mère Maaka
  - type: note
    content: Voir v. 2.
  - type: text
    content: .
  '11':
  - type: text
    content: 'Asa fit ce que l’Eternel considère comme juste, comme son ancêtre David. '
  '12':
  - type: text
    content: 'Il expulsa du pays les gens qui se livraient à la prostitution sacrée et il fit disparaître toutes les idoles que ses ancêtres avaient fabriquées. '
  '13':
  - type: text
    content: 'Il destitua même sa grand-mère Maaka de son rang de reine mère parce qu’elle avait fait dresser une idole obscène à la déesse Ashéra. Asa abattit cette horrible idole et la fit brûler dans la vallée du Cédron. '
  '14':
  - type: text
    content: 'Cependant, bien qu’Asa ait eu un cœur attaché sans partage à l’Eternel durant toute sa vie, les hauts lieux ne disparurent pas. '
  '15':
  - type: text
    content: Il déposa dans le temple de l’Eternel tous les objets d’argent et d’or et d’autres ustensiles que son père avait consacrés, en y ajoutant ceux que lui-même consacra.
  '16':
  - type: text
    content: 'Il y eut la guerre entre Asa et Baésha, roi d’Israël, pendant toute leur vie. '
  '17':
  - type: text
    content: Baésha, roi d’Israël, vint attaquer le royaume de Juda. Il fortifia Rama
  - type: note
    content: Village de Benjamin (Jos 18.25 ; Jg 19.13) situé à 9 kilomètres au nord de Jérusalem, aux confins des deux royaumes, au sommet d’un col par lequel passait la seule route de Jérusalem vers le centre du royaume du Nord.
  - type: text
    content: ', pour empêcher qu’on pénètre sur le territoire d’Asa, roi de Juda'
  - type: note
    content: 'Autre traduction : Rama, pour barrer le passage à Asa, roi de Juda.'
  - type: text
    content: ', et qu’on en sorte. '
  '18':
  - type: text
    content: Alors Asa prit tout l’argent et l’or qui étaient restés dans le trésor du temple de l’Eternel
  - type: note
    content: Après le pillage mentionné en 14.26.
  - type: text
    content: ' et les richesses du palais royal, et il les remit à ses ministres pour les faire porter à Ben-Hadad, fils de Tabrimmôn et petit-fils de Hézyiôn, roi de Syrie qui résidait à Damas. Il les accompagna du message suivant : '
  '19':
  - type: text
    content: '« Faisons une alliance comme il y en a eu une entre nos pères respectifs. Voici que je t’envoie de l’argent et de l’or en cadeau. Je te demande, en échange, de rompre ton alliance avec Baésha, roi d’Israël, afin qu’il cesse de me faire la guerre. » '
  '2':
  - type: text
    content: Il régna trois ans à Jérusalem. Sa mère s’appelait Maaka, elle était une fille d’Abishalom.
  '20':
  - type: text
    content: Ben-Hadad accepta la proposition du roi Asa ; il envoya ses chefs militaires attaquer les villes d’Israël et il frappa les villes d’Iyôn, de Dan et d’Abel-Beth-Maaka, ainsi que toute la région de Kineroth et le territoire de Nephtali
  - type: note
    content: Les villes prises par Ben-Hadad contrôlaient les routes commerciales vers l’Egypte au sud, le long de la côte, et vers Tyr à l’ouest.
  - type: text
    content: '. '
  '21':
  - type: text
    content: 'Lorsque Baésha apprit cette nouvelle, il renonça à fortifier Rama, et se retira à Tirtsa. '
  '22':
  - type: text
    content: Alors le roi Asa mobilisa tous les Judéens sans exception pour enlever les pierres et le bois que Baésha avait rassemblés pour fortifier Rama, et il s’en servit pour fortifier la ville de Guéba sur le territoire de Benjamin ainsi que celle de Mitspa
  - type: note
    content: Au nord de Jérusalem, Asa établit des forteresses sur ses frontières septentrionales pour empêcher Baésha de s’étendre vers le sud. Guéba se trouvait à l’est et Mitspa au sud-ouest de Rama.
  - type: text
    content: .
  - type: heading
    content: (2 Ch 16.11 à 17.1)
  '23':
  - type: text
    content: 'Les autres faits et gestes d’Asa, sa bravoure, ses réalisations et les villes qu’il a fait bâtir, sont cités dans le livre des Annales des rois de Juda. Dans ses vieux jours, il eut une maladie des pieds. '
  '24':
  - type: text
    content: Quand il rejoignit ses ancêtres décédés, il fut enterré auprès d’eux dans la Cité de David. Son fils Josaphat lui succéda sur le trône
  - type: note
    content: La suite de l’histoire de Josaphat reprend en 22.41.
  - type: text
    content: .
  - type: heading
    content: Le règne de Nadab sur Israël et la fin de la dynastie de Jéroboam
  '25':
  - type: text
    content: Nadab, fils de Jéroboam, devint roi d’Israël la deuxième année du règne d’Asa, roi de Juda. Il régna deux ans sur Israël
  - type: note
    content: De 909 à 908 av. J.-C.
  - type: text
    content: '. '
  '26':
  - type: text
    content: 'Il fit ce que l’Eternel considère comme mal en imitant l’exemple de son père et en entraînant son peuple dans le même péché. '
  '27':
  - type: text
    content: Alors Baésha, fils d’Ahiya, de la tribu d’Issacar, conspira contre lui et l’assassina devant Guibbetôn, une ville des Philistins
  - type: note
    content: Guibbetôn avait été une ville lévitique de la tribu de Dan (Jos 19.44 ; 21.23) sur la frontière de la Philistie.
  - type: text
    content: ', au moment où Nadab et l’armée d’Israël l’assiégeaient. '
  '28':
  - type: text
    content: 'Baésha commit ce meurtre la troisième année du règne d’Asa, roi de Juda, et il le supplanta sur le trône. '
  '29':
  - type: text
    content: Quand il fut roi, il fit périr tous les membres de la famille de Jéroboam. Il n’y laissa subsister personne, massacrant tout le monde, comme l’Eternel l’avait prédit par l’intermédiaire de son serviteur Ahiya de Silo
  - type: note
    content: Voir 1 R 14.10-11.
  - type: text
    content: ', '
  '3':
  - type: text
    content: 'Il se rendit coupable des mêmes péchés que son père avant lui, et son cœur ne fut pas entièrement attaché à l’Eternel son Dieu, comme celui de son ancêtre David. '
  '30':
  - type: text
    content: à cause des péchés que Jéroboam avait commis et de ceux qu’il avait fait commettre au peuple d’Israël, ce qui avait irrité l’Eternel, leur Dieu.
  '31':
  - type: text
    content: 'Les autres faits et gestes de Nadab et toutes ses réalisations sont cités dans le livre des Annales des rois d’Israël. '
  '32':
  - type: text
    content: Asa et Baésha, roi d’Israël, furent, toute leur vie, en guerre l’un contre l’autre
  - type: note
    content: Voir v. 16.
  - type: text
    content: .
  - type: heading
    content: Le règne de Baésha sur Israël et le prophète Jéhu
  '33':
  - type: text
    content: La troisième année du règne d’Asa, roi de Juda, Baésha, fils d’Ahiya, devint roi de tout Israël à Tirtsa. Il régna vingt-quatre ans
  - type: note
    content: De 908 à 886 av. J.-C.
  - type: text
    content: '. '
  '34':
  - type: text
    content: Il fit ce que l’Eternel considère comme mal en imitant l’exemple de Jéroboam et en entraînant Israël dans le même péché.
  '4':
  - type: text
    content: Mais à cause de David, l’Eternel, son Dieu, lui accorda quand même un descendant à Jérusalem pour lui succéder, pour que sa dynastie ne s’éteigne pas, et pour que la ville subsiste
  - type: note
    content: Voir 11.36.
  - type: text
    content: '. '
  '5':
  - type: text
    content: En effet, David avait fait ce que l’Eternel considère comme juste et, durant toute sa vie, il n’avait jamais désobéi à rien de ce qui lui avait été ordonné, sauf dans l’affaire d’Urie le Hittite
  - type: note
    content: Voir 2 S 11.
  - type: text
    content: .
  '6':
  - type: text
    content: Il y eut la guerre entre Roboam et Jéroboam pendant toute la vie de Roboam.
  - type: heading
    content: (2 Ch 13.22-23)
  '7':
  - type: text
    content: 'Les autres faits et gestes d’Abiyam et toutes ses réalisations sont cités dans le livre des Annales des rois de Juda. Lui aussi fut en guerre contre Jéroboam. '
  '8':
  - type: text
    content: Quand il rejoignit ses ancêtres décédés, on l’enterra dans la Cité de David et son fils Asa lui succéda sur le trône.
  - type: heading
    content: Le règne d’Asa sur Juda
  - type: heading
    content: (2 Ch 14.2-3 ; 15.16 à 16.6)
  '9':
  - type: text
    content: La vingtième année du règne de Jéroboam, roi d’Israël, Asa devint roi de Juda
  - type: note
    content: Il régna de 910 à 869 av. J.-C.
  - type: text
    content: '. '
