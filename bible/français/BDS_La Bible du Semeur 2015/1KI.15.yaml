document_id: 1KI.15
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Le règne d’Abiyam sur Juda
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: (2 Ch 13.1-2)
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'La dix-huitième année du règne de Jéroboam, fils de Nebath, Abiyam devint roi de Juda. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Il régna trois ans à Jérusalem. Sa mère s’appelait Maaka, elle était une fille d’Abishalom.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Il se rendit coupable des mêmes péchés que son père avant lui, et son cœur ne fut pas entièrement attaché à l’Eternel son Dieu, comme celui de son ancêtre David. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Mais à cause de David, l’Eternel, son Dieu, lui accorda quand même un descendant à Jérusalem pour lui succéder, pour que sa dynastie ne s’éteigne pas, et pour que la ville subsiste
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '15.4 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Voir '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '11.36'
        metadata:
          usfm: 1KI.11.36
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: En effet, David avait fait ce que l’Eternel considère comme juste et, durant toute sa vie, il n’avait jamais désobéi à rien de ce qui lui avait été ordonné, sauf dans l’affaire d’Urie le Hittite
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '15.5 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Voir '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 2 S 11
        metadata:
          usfm: 2SA.11
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Il y eut la guerre entre Roboam et Jéroboam pendant toute la vie de Roboam.
- type: usfm
  marker: r
  children:
  - type: text
    text: (2 Ch 13.22-23)
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Les autres faits et gestes d’Abiyam et toutes ses réalisations sont cités dans le livre des Annales des rois de Juda. Lui aussi fut en guerre contre Jéroboam. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Quand il rejoignit ses ancêtres décédés, on l’enterra dans la Cité de David et son fils Asa lui succéda sur le trône.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Le règne d’Asa sur Juda
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: (2 Ch 14.2-3 ; 15.16 à 16.6)
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: La vingtième année du règne de Jéroboam, roi d’Israël, Asa devint roi de Juda
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '15.9 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Il régna de 910 à 869 av. J.-C.
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Il régna quarante et un ans à Jérusalem. Il descendait d’Abishalom par sa grand-mère Maaka
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '15.10 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Voir v. 2.
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Asa fit ce que l’Eternel considère comme juste, comme son ancêtre David. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Il expulsa du pays les gens qui se livraient à la prostitution sacrée et il fit disparaître toutes les idoles que ses ancêtres avaient fabriquées. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Il destitua même sa grand-mère Maaka de son rang de reine mère parce qu’elle avait fait dresser une idole obscène à la déesse Ashéra. Asa abattit cette horrible idole et la fit brûler dans la vallée du Cédron. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Cependant, bien qu’Asa ait eu un cœur attaché sans partage à l’Eternel durant toute sa vie, les hauts lieux ne disparurent pas. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Il déposa dans le temple de l’Eternel tous les objets d’argent et d’or et d’autres ustensiles que son père avait consacrés, en y ajoutant ceux que lui-même consacra.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Il y eut la guerre entre Asa et Baésha, roi d’Israël, pendant toute leur vie. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Baésha, roi d’Israël, vint attaquer le royaume de Juda. Il fortifia Rama
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '15.17 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Village de Benjamin (Jos 18.25 ; Jg 19.13) situé à 9 kilomètres au nord de Jérusalem, aux confins des deux royaumes, au sommet d’un col par lequel passait la seule route de Jérusalem vers le centre du royaume du Nord.
    marker-yv: yv-n
  - type: text
    text: ', pour empêcher qu’on pénètre sur le territoire d’Asa, roi de Juda'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '15.17 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Autre traduction : '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: Rama, pour barrer le passage à Asa, roi de Juda.
    marker-yv: yv-n
  - type: text
    text: ', et qu’on en sorte. '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Alors Asa prit tout l’argent et l’or qui étaient restés dans le trésor du temple de l’Eternel
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '15.18 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Après le pillage mentionné en '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '14.26'
        metadata:
          usfm: 1KI.14.26
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: ' et les richesses du palais royal, et il les remit à ses ministres pour les faire porter à Ben-Hadad, fils de Tabrimmôn et petit-fils de Hézyiôn, roi de Syrie qui résidait à Damas. Il les accompagna du message suivant : '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: '« Faisons une alliance comme il y en a eu une entre nos pères respectifs. Voici que je t’envoie de l’argent et de l’or en cadeau. Je te demande, en échange, de rompre ton alliance avec Baésha, roi d’Israël, afin qu’il cesse de me faire la guerre. » '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Ben-Hadad accepta la proposition du roi Asa ; il envoya ses chefs militaires attaquer les villes d’Israël et il frappa les villes d’Iyôn, de Dan et d’Abel-Beth-Maaka, ainsi que toute la région de Kineroth et le territoire de Nephtali
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '15.20 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Les villes prises par Ben-Hadad contrôlaient les routes commerciales vers l’Egypte au sud, le long de la côte, et vers Tyr à l’ouest.
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Lorsque Baésha apprit cette nouvelle, il renonça à fortifier Rama, et se retira à Tirtsa. '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: Alors le roi Asa mobilisa tous les Judéens sans exception pour enlever les pierres et le bois que Baésha avait rassemblés pour fortifier Rama, et il s’en servit pour fortifier la ville de Guéba sur le territoire de Benjamin ainsi que celle de Mitspa
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '15.22 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Au nord de Jérusalem, Asa établit des forteresses sur ses frontières septentrionales pour empêcher Baésha de s’étendre vers le sud. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'Guéba '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'se trouvait à l’est et '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'Mitspa '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: au sud-ouest de Rama.
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: r
  children:
  - type: text
    text: (2 Ch 16.11 à 17.1)
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Les autres faits et gestes d’Asa, sa bravoure, ses réalisations et les villes qu’il a fait bâtir, sont cités dans le livre des Annales des rois de Juda. Dans ses vieux jours, il eut une maladie des pieds. '
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: Quand il rejoignit ses ancêtres décédés, il fut enterré auprès d’eux dans la Cité de David. Son fils Josaphat lui succéda sur le trône
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '15.24 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'La suite de l’histoire de Josaphat reprend en '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '22.41'
        metadata:
          usfm: 1KI.22.41
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: s1
  children:
  - type: text
    text: Le règne de Nadab sur Israël et la fin de la dynastie de Jéroboam
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: Nadab, fils de Jéroboam, devint roi d’Israël la deuxième année du règne d’Asa, roi de Juda. Il régna deux ans sur Israël
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '15.25 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: De 909 à 908 av. J.-C.
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Il fit ce que l’Eternel considère comme mal en imitant l’exemple de son père et en entraînant son peuple dans le même péché. '
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: Alors Baésha, fils d’Ahiya, de la tribu d’Issacar, conspira contre lui et l’assassina devant Guibbetôn, une ville des Philistins
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '15.27 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Guibbetôn '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: avait été une ville lévitique de la tribu de Dan (Jos 19.44 ; 21.23) sur la frontière de la Philistie.
    marker-yv: yv-n
  - type: text
    text: ', au moment où Nadab et l’armée d’Israël l’assiégeaient. '
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'Baésha commit ce meurtre la troisième année du règne d’Asa, roi de Juda, et il le supplanta sur le trône. '
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: Quand il fut roi, il fit périr tous les membres de la famille de Jéroboam. Il n’y laissa subsister personne, massacrant tout le monde, comme l’Eternel l’avait prédit par l’intermédiaire de son serviteur Ahiya de Silo
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '15.29 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Voir '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1 R 14.10-11
        metadata:
          usfm: 1KI.14.10+1KI.14.11
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: ', '
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: à cause des péchés que Jéroboam avait commis et de ceux qu’il avait fait commettre au peuple d’Israël, ce qui avait irrité l’Eternel, leur Dieu.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'Les autres faits et gestes de Nadab et toutes ses réalisations sont cités dans le livre des Annales des rois d’Israël. '
  - type: usfm
    marker: v
    metadata:
      v: '32'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: Asa et Baésha, roi d’Israël, furent, toute leur vie, en guerre l’un contre l’autre
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '15.32 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Voir v. 16.
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: s1
  children:
  - type: text
    text: Le règne de Baésha sur Israël et le prophète Jéhu
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '33'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: La troisième année du règne d’Asa, roi de Juda, Baésha, fils d’Ahiya, devint roi de tout Israël à Tirtsa. Il régna vingt-quatre ans
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '15.33 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: De 908 à 886 av. J.-C.
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '34'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: Il fit ce que l’Eternel considère comme mal en imitant l’exemple de Jéroboam et en entraînant Israël dans le même péché.
