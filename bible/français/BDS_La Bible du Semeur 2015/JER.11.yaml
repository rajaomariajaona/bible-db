document_id: JER.11
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Les luttes de Jérémie
  marker-yv: yv-h
- type: usfm
  marker: s2
  children:
  - type: text
    text: L’alliance rompue
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'L’Eternel adressa la parole à Jérémie en ces termes : '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Ecoutez donc les clauses de cette alliance
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '11.2 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: L’
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'alliance '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: conclue avec les ancêtres du peuple à leur sortie d’Egypte (v. 4) et récemment renouvelée par Josias (2 R 22.8 à 23.25). Plusieurs de ces versets rappellent le langage du Deutéronome (voir Dt 4.23 ; 5.2 ; 11.26-28 ; 27.26 ; 28.1 ; 29.13).
    marker-yv: yv-n
  - type: text
    text: ', tu les énonceras pour les gens de Juda et les habitants de Jérusalem ! '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Tu leur diras : Voici ce que déclare l’Eternel, le Dieu d’Israël : Maudit soit l’homme qui ne respecte pas les termes de l’alliance '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'que j’ai imposés à vos ancêtres lorsque je les ai fait sortir d’Egypte, de ce creuset de fer, et que je leur ai dit : Ecoutez-moi et appliquez tout ce que je vous ordonne, et vous serez mon peuple, et moi je serai votre Dieu. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Alors je tiendrai le serment que j’ai fait à vos ancêtres, de leur accorder ce pays où coulent le lait et le miel, comme c’est le cas aujourd’hui.
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Je répondis : C’est vrai, ô Eternel.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Et l’Eternel me dit : Proclame toutes ces paroles dans les villes de Juda et les rues de Jérusalem ! Dis-leur : Ecoutez les termes de l’alliance, appliquez-les. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Car j’ai averti vos ancêtres dès le jour où je les ai fait sortir d’Egypte jusqu’à ce jour. Oui, sans me lasser, je les ai bien avertis de m’écouter. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Ils n’ont pas écouté, non, ils n’ont pas prêté l’oreille, mais chacun a suivi les penchants de son cœur obstiné et mauvais. Alors j’ai fait venir contre eux tous les maux dont il est question dans l’alliance à laquelle je leur avais commandé d’obéir, puisqu’ils ne l’ont pas appliquée.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'L’Eternel ajouta : Les habitants des villes de Juda et de Jérusalem préparent un complot : '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: ils ont commis les mêmes fautes que leurs premiers ancêtres qui avaient refusé d’écouter mes paroles. Eux aussi, ils ont adopté d’autres dieux qu’ils ont adorés ; oui, le royaume d’Israël et le royaume de Juda ont transgressé l’alliance que j’avais autrefois conclue avec leurs ancêtres.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'C’est pourquoi l’Eternel vous déclare aujourd’hui : Je ferai fondre une calamité sur eux et ils ne pourront pas y échapper : lorsqu’ils m’imploreront, je ne les écouterai pas. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Alors les habitants des villes de Juda et de Jérusalem pourront aller lancer des appels à leurs dieux auxquels ils offrent des parfums. Mais ces dieux-là ne les sauveront pas lorsqu’ils seront dans le malheur. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Autant tu as de villes, autant tu as de dieux, Juda
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '11.13 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Voir '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '2.28'
        metadata:
          usfm: JER.2.28
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: . Autant tu as de rues, Jérusalem, autant tu as dressé d’autels à l’infamie, des autels pour offrir des parfums à Baal.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Quant à toi, Jérémie, ne prie pas pour ce peuple et ne prononce en sa faveur ni supplication ni requête. Lorsqu’ils m’invoqueront à cause de leur malheur, je n’écouterai pas.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Pourquoi ma bien-aimée ╵vient-elle dans mon temple
- type: usfm
  marker: q1
  children:
  - type: text
    text: tout en accomplissant ╵ses desseins pernicieux ?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Penses-tu que les vœux ╵et les offrandes d’animaux
- type: usfm
  marker: q1
  children:
  - type: text
    text: vont éloigner de toi
- type: usfm
  marker: q1
  children:
  - type: text
    text: le châtiment ?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Penses-tu t’en sortir
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '11.15 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: Penses-tu que les vœux… t’en sortir
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: ': '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'd’après l’ancienne version grecque. L’hébreu est peu clair ; certains traduisent : '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: la viande consacrée pourrait-elle détourner (le châtiment) ? C’est quand tu fais le mal que tu te réjouis !
    marker-yv: yv-n
  - type: text
    text: '  ?'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'L’Eternel t’appelait :'
- type: usfm
  marker: q1
  children:
  - type: text
    text: « Olivier verdoyant ╵orné de fruits superbes ».
- type: usfm
  marker: q1
  children:
  - type: text
    text: Cependant, maintenant, ╵au bruit d’un grand fracas, ╵il y mettra le feu
- type: usfm
  marker: q1
  children:
  - type: text
    text: et ses rameaux seront brisés.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Le Seigneur des armées célestes qui t’a planté a décidé ton malheur à cause des méfaits que les gens d’Israël et les gens de Juda ont accomplis, car ils m’ont irrité en offrant des parfums à Baal.
- type: usfm
  marker: s2
  children:
  - type: text
    text: Complot contre Jérémie
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: L’Eternel m’en a informé, je l’ai donc appris ; il m’a fait voir
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '11.18 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: il m’a fait voir
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: ': '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'selon le texte hébreu traditionnel. L’ancienne version grecque, la version syriaque et la Vulgate ont : '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: je vois.
    marker-yv: yv-n
  - type: text
    text: ' leurs agissements. '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'J’étais comme un agneau docile qu’on mène à l’abattoir et je ne savais pas que c’était contre moi qu’ils concevaient de tels projets, disant : « Abattons l’arbre pendant qu’il est en sève, venez, supprimons-le du monde des vivants, et qu’on ne s’en souvienne plus ! »'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: O Seigneur des armées célestes, ╵tu es un juste juge,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et tu éprouves ╵le cœur et les pensées.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Que je voie donc ╵comment tu les rétribueras ;
- type: usfm
  marker: q1
  children:
  - type: text
    text: en effet, c’est à toi ╵que j’ai remis ma cause.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: C’est pourquoi voici ce que déclare l’Eternel au sujet des hommes d’Anatoth
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '11.21 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: C’est-à-dire les compatriotes de Jérémie (voir 1.1 ; 32.7).
    marker-yv: yv-n
  - type: text
    text: ' qui veulent te tuer et qui disent : « Ne prophétise pas au nom de l’Eternel, sinon nous te tuerons. » '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Oui, c’est pourquoi voici ce que déclare le Seigneur des armées célestes : Je vais sévir contre eux, leurs jeunes gens périront par l’épée ; leurs fils et leurs filles mourront par la famine, '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: et il n’en restera aucun. Je ferai venir le malheur sur les gens d’Anatoth dans l’année de leur châtiment.
