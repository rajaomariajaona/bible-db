document_id: JER.11,21
type_code: fra
verses:
  '1':
  - type: heading
    content: Les luttes de Jérémie
  - type: heading
    content: L’alliance rompue
  - type: text
    content: 'L’Eternel adressa la parole à Jérémie en ces termes : '
  '10':
  - type: text
    content: ils ont commis les mêmes fautes que leurs premiers ancêtres qui avaient refusé d’écouter mes paroles. Eux aussi, ils ont adopté d’autres dieux qu’ils ont adorés ; oui, le royaume d’Israël et le royaume de Juda ont transgressé l’alliance que j’avais autrefois conclue avec leurs ancêtres.
  '11':
  - type: text
    content: 'C’est pourquoi l’Eternel vous déclare aujourd’hui : Je ferai fondre une calamité sur eux et ils ne pourront pas y échapper : lorsqu’ils m’imploreront, je ne les écouterai pas. '
  '12':
  - type: text
    content: 'Alors les habitants des villes de Juda et de Jérusalem pourront aller lancer des appels à leurs dieux auxquels ils offrent des parfums. Mais ces dieux-là ne les sauveront pas lorsqu’ils seront dans le malheur. '
  '13':
  - type: text
    content: Autant tu as de villes, autant tu as de dieux, Juda
  - type: note
    content: Voir 2.28.
  - type: text
    content: . Autant tu as de rues, Jérusalem, autant tu as dressé d’autels à l’infamie, des autels pour offrir des parfums à Baal.
  '14':
  - type: text
    content: Quant à toi, Jérémie, ne prie pas pour ce peuple et ne prononce en sa faveur ni supplication ni requête. Lorsqu’ils m’invoqueront à cause de leur malheur, je n’écouterai pas.
  '15':
  - type: text
    content: Pourquoi ma bien-aimée ╵vient-elle dans mon temple
  - type: text
    content: tout en accomplissant ╵ses desseins pernicieux ?
  - type: text
    content: Penses-tu que les vœux ╵et les offrandes d’animaux
  - type: text
    content: vont éloigner de toi
  - type: text
    content: le châtiment ?
  - type: text
    content: Penses-tu t’en sortir
  - type: note
    content: 'Penses-tu que les vœux… t’en sortir: d’après l’ancienne version grecque. L’hébreu est peu clair ; certains traduisent : la viande consacrée pourrait-elle détourner (le châtiment) ? C’est quand tu fais le mal que tu te réjouis !'
  - type: text
    content: '  ?'
  '16':
  - type: text
    content: 'L’Eternel t’appelait :'
  - type: text
    content: « Olivier verdoyant ╵orné de fruits superbes ».
  - type: text
    content: Cependant, maintenant, ╵au bruit d’un grand fracas, ╵il y mettra le feu
  - type: text
    content: et ses rameaux seront brisés.
  '17':
  - type: text
    content: Le Seigneur des armées célestes qui t’a planté a décidé ton malheur à cause des méfaits que les gens d’Israël et les gens de Juda ont accomplis, car ils m’ont irrité en offrant des parfums à Baal.
  - type: heading
    content: Complot contre Jérémie
  '18':
  - type: text
    content: L’Eternel m’en a informé, je l’ai donc appris ; il m’a fait voir
  - type: note
    content: 'il m’a fait voir: selon le texte hébreu traditionnel. L’ancienne version grecque, la version syriaque et la Vulgate ont : je vois.'
  - type: text
    content: ' leurs agissements. '
  '19':
  - type: text
    content: 'J’étais comme un agneau docile qu’on mène à l’abattoir et je ne savais pas que c’était contre moi qu’ils concevaient de tels projets, disant : « Abattons l’arbre pendant qu’il est en sève, venez, supprimons-le du monde des vivants, et qu’on ne s’en souvienne plus ! »'
  '2':
  - type: text
    content: Ecoutez donc les clauses de cette alliance
  - type: note
    content: L’alliance conclue avec les ancêtres du peuple à leur sortie d’Egypte (v. 4) et récemment renouvelée par Josias (2 R 22.8 à 23.25). Plusieurs de ces versets rappellent le langage du Deutéronome (voir Dt 4.23 ; 5.2 ; 11.26-28 ; 27.26 ; 28.1 ; 29.13).
  - type: text
    content: ', tu les énonceras pour les gens de Juda et les habitants de Jérusalem ! '
  '20':
  - type: text
    content: O Seigneur des armées célestes, ╵tu es un juste juge,
  - type: text
    content: et tu éprouves ╵le cœur et les pensées.
  - type: text
    content: Que je voie donc ╵comment tu les rétribueras ;
  - type: text
    content: en effet, c’est à toi ╵que j’ai remis ma cause.
  '21':
  - type: text
    content: C’est pourquoi voici ce que déclare l’Eternel au sujet des hommes d’Anatoth
  - type: note
    content: C’est-à-dire les compatriotes de Jérémie (voir 1.1 ; 32.7).
  - type: text
    content: ' qui veulent te tuer et qui disent : « Ne prophétise pas au nom de l’Eternel, sinon nous te tuerons. » '
  '22':
  - type: text
    content: 'Oui, c’est pourquoi voici ce que déclare le Seigneur des armées célestes : Je vais sévir contre eux, leurs jeunes gens périront par l’épée ; leurs fils et leurs filles mourront par la famine, '
  '23':
  - type: text
    content: et il n’en restera aucun. Je ferai venir le malheur sur les gens d’Anatoth dans l’année de leur châtiment.
  '3':
  - type: text
    content: 'Tu leur diras : Voici ce que déclare l’Eternel, le Dieu d’Israël : Maudit soit l’homme qui ne respecte pas les termes de l’alliance '
  '4':
  - type: text
    content: 'que j’ai imposés à vos ancêtres lorsque je les ai fait sortir d’Egypte, de ce creuset de fer, et que je leur ai dit : Ecoutez-moi et appliquez tout ce que je vous ordonne, et vous serez mon peuple, et moi je serai votre Dieu. '
  '5':
  - type: text
    content: Alors je tiendrai le serment que j’ai fait à vos ancêtres, de leur accorder ce pays où coulent le lait et le miel, comme c’est le cas aujourd’hui.
  - type: text
    content: 'Je répondis : C’est vrai, ô Eternel.'
  '6':
  - type: text
    content: 'Et l’Eternel me dit : Proclame toutes ces paroles dans les villes de Juda et les rues de Jérusalem ! Dis-leur : Ecoutez les termes de l’alliance, appliquez-les. '
  '7':
  - type: text
    content: 'Car j’ai averti vos ancêtres dès le jour où je les ai fait sortir d’Egypte jusqu’à ce jour. Oui, sans me lasser, je les ai bien avertis de m’écouter. '
  '8':
  - type: text
    content: Ils n’ont pas écouté, non, ils n’ont pas prêté l’oreille, mais chacun a suivi les penchants de son cœur obstiné et mauvais. Alors j’ai fait venir contre eux tous les maux dont il est question dans l’alliance à laquelle je leur avais commandé d’obéir, puisqu’ils ne l’ont pas appliquée.
  '9':
  - type: text
    content: 'L’Eternel ajouta : Les habitants des villes de Juda et de Jérusalem préparent un complot : '
