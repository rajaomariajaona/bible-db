document_id: HEB.6,21
type_code: fra
verses:
  '1':
  - type: text
    content: 'C’est pourquoi ne nous attardons pas aux notions élémentaires de l’enseignement relatif à Christ. Tournons-nous plutôt vers ce qui correspond au stade adulte, sans nous remettre à poser les fondements, c’est-à-dire : l’abandon des actes qui mènent à la mort et la foi en Dieu, '
  '10':
  - type: text
    content: 'Car Dieu n’est pas injuste au point d’oublier l’activité que vous avez déployée, par amour pour lui, dans les services que vous avez rendus – et que vous rendez encore – à ceux qui font partie du peuple saint. '
  '11':
  - type: text
    content: 'Mais nous désirons que chacun de vous fasse preuve du même zèle pour amener votre espérance à son plein épanouissement jusqu’à la fin. '
  '12':
  - type: text
    content: Ainsi vous ne vous relâcherez pas, mais vous imiterez ceux qui, par leur foi et leur attente patiente, reçoivent l’héritage promis.
  - type: heading
    content: Une espérance certaine
  '13':
  - type: text
    content: 'Lorsque Dieu fit sa promesse à Abraham, '
  - type: text
    content: il prêta serment par lui-même
  - type: note
    content: Gn 22.16.
  - type: text
    content: ','
  - type: text
    content: ' car il ne pouvait pas jurer par un plus grand que lui. '
  '14':
  - type: text
    content: 'Il déclara : '
  - type: text
    content: Assurément, je te comblerai de bénédictions et je multiplierai ta descendance
  - type: note
    content: Gn 22.16-17.
  - type: text
    content: .
  - type: text
    content: ' '
  '15':
  - type: text
    content: Abraham attendit patiemment et c’est ainsi qu’il vit se réaliser ce que Dieu lui avait promis
  - type: note
    content: Pendant 25 ans ; la réalisation eut lieu par la naissance d’Isaac (Gn 17.2 ; 18.10 ; 21.5).
  - type: text
    content: .
  '16':
  - type: text
    content: 'En effet, les hommes prêtent serment par un plus grand qu’eux. Le serment leur sert de garantie pour mettre fin à toute contestation. '
  '17':
  - type: text
    content: 'De même, voulant donner aux héritiers de ce qu’il avait promis une preuve plus forte encore du caractère irrévocable de sa décision, Dieu a garanti sa promesse par un serment. '
  '18':
  - type: text
    content: Ainsi, il nous a mis en présence de deux actes irrévocables, dans lesquels il est impossible que Dieu mente. Ces actes constituent un puissant encouragement pour nous qui avons cherché refuge en saisissant fermement l’espérance qui nous est proposée.
  '19':
  - type: text
    content: 'Cette espérance est pour nous comme l’ancre de notre vie, sûre et solide. Elle pénètre, par-delà le voile, dans le lieu très saint '
  '2':
  - type: text
    content: l’enseignement sur les différents baptêmes
  - type: note
    content: Peut-être, puisque l’auteur s’adresse à des chrétiens issus du judaïsme, s’agit-il des ablutions juives, du baptême de Jean et du baptême chrétien.
  - type: text
    content: ', l’imposition des mains, la résurrection et le jugement éternel. '
  '20':
  - type: text
    content: 'où Jésus est entré pour nous en précurseur. Car il est devenu grand-prêtre '
  - type: text
    content: pour l’éternité selon la ligne de Melchisédek.
  '3':
  - type: text
    content: Nous allons donc nous occuper de ce qui correspond au stade adulte, si Dieu le permet.
  '4':
  - type: text
    content: 'En effet, ceux qui ont été une fois éclairés, qui ont goûté au don du ciel, qui ont eu part au Saint-Esprit, '
  '5':
  - type: text
    content: 'qui ont expérimenté combien la Parole de Dieu est bienfaisante et fait l’expérience des forces du monde à venir '
  '6':
  - type: text
    content: et qui, pourtant, se sont détournés de la foi, ne peuvent être amenés de nouveau à changer d’attitude, car ils crucifient le Fils de Dieu, pour leur propre compte, et le déshonorent publiquement.
  '7':
  - type: text
    content: 'En effet, lorsqu’une terre arrosée par des pluies fréquentes produit des plantes utiles à ceux pour qui on la cultive, Dieu la bénit. '
  '8':
  - type: text
    content: Mais si elle ne produit que des buissons d’épines et des chardons, elle ne vaut rien, elle ne tardera pas à être maudite et on finira par y mettre le feu.
  '9':
  - type: text
    content: 'Mes chers amis, même si nous tenons ici un tel langage, nous sommes convaincus qu’une meilleure part vous attend, celle du salut. '
