document_id: ISA.19,21
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Sur l’Egypte
    marker-yv: yv-h
  - type: usfm
    marker: s2
    children:
    - type: text
      text: Menace
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Oracle sur l’Egypte :'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: L’Eternel monte ╵un nuage rapide,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: il arrive en Egypte.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Voici qu’à son approche, ╵les dieux d’Egypte ╵se mettent à trembler
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et le peuple égyptien ╵perd tout courage.
  '10':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tous les grands du pays ╵seront tout abattus
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et tous les ouvriers ╵seront découragés.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Les princes de Tsoân
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '19.11 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Tsoân '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ou Tanis (
        - type: usfm
          marker: ref
          children:
          - type: text
            text: Nb 13.22
        - type: text
          text: ') : ville située dans le delta du Nil, capitale du Nord de la XXV'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: e
        - type: text
          text: ' dynastie égyptienne.'
      marker-yv: yv-n
    - type: text
      text: ' ╵ont perdu la raison,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: les sages qui conseillent ╵le pharaon d’Egypte
  - type: usfm
    marker: q1
    children:
    - type: text
      text: forment un conseil d’insensés.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Comment osez-vous dire ╵au pharaon :'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: « Nous, nous sommes des disciples des sages, ╵des disciples des anciens rois » ?
  '12':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Où sont-ils maintenant, ╵tes sages conseillers ?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Qu’ils te déclarent donc ╵et te fassent savoir
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ce que le Seigneur des armées célestes
  - type: usfm
    marker: q1
    children:
    - type: text
      text: a décrété contre l’Egypte.
  '13':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Les princes de Tsoân ╵sont dépourvus de sens
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et les chefs de Memphis
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '19.13 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Memphis
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: ': '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ancienne capitale de l’Egypte, à une vingtaine de kilomètres au sud du Caire.
      marker-yv: yv-n
    - type: text
      text: ' ╵sont tous dans l’illusion.'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Eux qui étaient chargés ╵de diriger l’Egypte, ╵ils la font s’égarer.
  '14':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: L’Eternel a versé ╵parmi les Egyptiens ╵un esprit de vertige.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Eux, ils l’égarent ╵en tout ce qu’elle fait
  - type: usfm
    marker: q1
    children:
    - type: text
      text: comme un ivrogne qui s’égare ╵dans ce qu’il a vomi.
  '15':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et nul ne pourra plus ╵rien faire pour l’Egypte,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: pas plus la tête que la queue,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: la palme ou le roseau.
  - type: usfm
    marker: s2
    children:
    - type: text
      text: Conversion en Egypte
    marker-yv: yv-h
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'En ce jour-là, les Egyptiens seront comme de faibles femmes : ils trembleront et s’épouvanteront quand l’Eternel, le Seigneur des armées célestes, agitera la main contre eux. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Le pays de Juda sera cause d’effroi pour l’Egypte, qui tremblera à la simple mention de son nom devant elle, à cause du projet que l’Eternel, le Seigneur des armées célestes, a formé contre elle.
  - type: usfm
    marker: s2
    children:
    - type: text
      text: L’Eternel frappe pour guérir
    marker-yv: yv-h
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'En ce jour-là, il y aura dans le pays d’Egypte cinq villes où l’on parlera la langue des Hébreux et où l’on prêtera serment par l’Eternel, le Seigneur des armées célestes. On appellera l’une d’elles : la Ville du Soleil'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '19.18 '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'La Ville du Soleil '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '(Héliopolis) : d’après certains manuscrits du texte hébreu traditionnel, le texte hébreu de Qumrân et la Vulgate. La plupart des manuscrits du texte hébreu traditionnel ont : '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: la Ville de la Destruction.
      marker-yv: yv-n
    - type: text
      text: .
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'En ce jour-là, l’Eternel aura un autel au milieu de l’Egypte, et une stèle sera dressée en l’honneur du Seigneur sur sa frontière. '
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Je dresserai les Egyptiens ╵les uns contre les autres
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '19.2 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Il pourrait s’agir des luttes intestines qui opposèrent les Egyptiens entre eux à la fin de la XXIV
        - type: usfm
          marker: ord
          children:
          - type: text
            text: e
        - type: text
          text: ' dynastie (saïte) et qui permirent aux rois éthiopiens de la XXV'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: e
        - type: text
          text: ' dynastie de s’imposer dans tout le pays (voir '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: '18.1'
        - type: text
          text: ' et note).'
      marker-yv: yv-n
    - type: text
      text: ','
  - type: usfm
    marker: q1
    children:
    - type: text
      text: déclare l’Eternel.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ils se feront la guerre, ╵qui, contre son parent, ╵qui, contre son ami,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: cité contre cité, ╵et province contre province.
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ils serviront de signe et de témoins pour l’Eternel, le Seigneur des armées célestes, dans le pays d’Egypte. Et quand les Egyptiens crieront à l’Eternel à cause de leurs oppresseurs, il leur enverra un libérateur qui prendra leur parti et les délivrera. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'L’Eternel se fera connaître au pays de l’Egypte et, ce jour-là, les Egyptiens connaîtront l’Eternel. Ils lui rendront un culte avec des sacrifices et des offrandes, et ils feront des vœux à l’Eternel et s’en acquitteront. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: L’Eternel frappera les Egyptiens, il frappera, mais il les guérira, et ils se tourneront vers l’Eternel qui les exaucera et qui les guérira.
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'En ce jour-là, il y aura une route allant d’Egypte en Assyrie. Les Assyriens se rendront en Egypte, les Egyptiens en Assyrie ; des Egyptiens et des Assyriens rendront leur culte ensemble. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'En ce jour-là, Israël sera le troisième, avec l’Egypte et l’Assyrie, et, pour la terre entière, ce sera une bénédiction. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Et l’Eternel, le Seigneur des armées célestes, les bénira, disant : Bénie soit l’Egypte, mon peuple, bénie soit l’Assyrie, mon œuvre, et Israël, qui m’appartient.'
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Les Egyptiens perdront l’esprit
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et j’anéantirai ╵leur politique.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ils iront consulter ╵leurs sorciers, leurs idoles,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ceux qui évoquent les morts ╵et les devins.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Je livrerai l’Egypte ╵aux mains d’un maître dur,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: un roi puissant ╵dominera sur eux
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '19.4 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: En 712, le roi Shabaka de Nubie (d’Ethiopie) s’est rendu maître de toute l’Egypte. D’autres pensent que cette prophétie vise les rois assyriens Esar-Haddôn ou Assourbanipal qui, en 670 et 662, ont envahi l’Egypte.
      marker-yv: yv-n
    - type: text
      text: .
  - type: usfm
    marker: q1
    children:
    - type: text
      text: L’Eternel le déclare, ╵le Seigneur des armées célestes.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: L’eau de la mer s’asséchera,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: le fleuve tarira ╵et son lit sera sec.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: L’eau croupira ╵à l’intérieur des bras du fleuve
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et les canaux d’Egypte ╵baisseront et s’assécheront ;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: les joncs et les roseaux s’étioleront ;
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: les prés, le long du fleuve ╵et à son embouchure,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: tous les champs cultivés ╵irrigués par le Nil, ╵se dessécheront
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'et seront emportés : ╵il n’en restera rien.'
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Les pêcheurs gémiront,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: tous ceux qui jettent l’hameçon ╵dans le Nil se lamenteront.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ceux qui étendent leurs filets
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sur la face des eaux ╵seront bien misérables.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ceux qui travaillent le fin lin ╵seront couverts de honte,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ceux qui le peignent et qui le tissent ╵deviendront blancs de peur.
