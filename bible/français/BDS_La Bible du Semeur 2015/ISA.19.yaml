document_id: ISA.19,21
type_code: fra
verses:
  '1':
  - type: heading
    content: Sur l’Egypte
  - type: heading
    content: Menace
  - type: text
    content: 'Oracle sur l’Egypte :'
  - type: text
    content: L’Eternel monte ╵un nuage rapide,
  - type: text
    content: il arrive en Egypte.
  - type: text
    content: Voici qu’à son approche, ╵les dieux d’Egypte ╵se mettent à trembler
  - type: text
    content: et le peuple égyptien ╵perd tout courage.
  '10':
  - type: text
    content: Tous les grands du pays ╵seront tout abattus
  - type: text
    content: et tous les ouvriers ╵seront découragés.
  '11':
  - type: text
    content: Les princes de Tsoân
  - type: note
    content: 'Tsoân ou Tanis (Nb 13.22) : ville située dans le delta du Nil, capitale du Nord de la XXVe dynastie égyptienne.'
  - type: text
    content: ' ╵ont perdu la raison,'
  - type: text
    content: les sages qui conseillent ╵le pharaon d’Egypte
  - type: text
    content: forment un conseil d’insensés.
  - type: text
    content: 'Comment osez-vous dire ╵au pharaon :'
  - type: text
    content: « Nous, nous sommes des disciples des sages, ╵des disciples des anciens rois » ?
  '12':
  - type: text
    content: Où sont-ils maintenant, ╵tes sages conseillers ?
  - type: text
    content: Qu’ils te déclarent donc ╵et te fassent savoir
  - type: text
    content: ce que le Seigneur des armées célestes
  - type: text
    content: a décrété contre l’Egypte.
  '13':
  - type: text
    content: Les princes de Tsoân ╵sont dépourvus de sens
  - type: text
    content: et les chefs de Memphis
  - type: note
    content: 'Memphis: ancienne capitale de l’Egypte, à une vingtaine de kilomètres au sud du Caire.'
  - type: text
    content: ' ╵sont tous dans l’illusion.'
  - type: text
    content: Eux qui étaient chargés ╵de diriger l’Egypte, ╵ils la font s’égarer.
  '14':
  - type: text
    content: L’Eternel a versé ╵parmi les Egyptiens ╵un esprit de vertige.
  - type: text
    content: Eux, ils l’égarent ╵en tout ce qu’elle fait
  - type: text
    content: comme un ivrogne qui s’égare ╵dans ce qu’il a vomi.
  '15':
  - type: text
    content: Et nul ne pourra plus ╵rien faire pour l’Egypte,
  - type: text
    content: pas plus la tête que la queue,
  - type: text
    content: la palme ou le roseau.
  - type: heading
    content: Conversion en Egypte
  '16':
  - type: text
    content: 'En ce jour-là, les Egyptiens seront comme de faibles femmes : ils trembleront et s’épouvanteront quand l’Eternel, le Seigneur des armées célestes, agitera la main contre eux. '
  '17':
  - type: text
    content: Le pays de Juda sera cause d’effroi pour l’Egypte, qui tremblera à la simple mention de son nom devant elle, à cause du projet que l’Eternel, le Seigneur des armées célestes, a formé contre elle.
  - type: heading
    content: L’Eternel frappe pour guérir
  '18':
  - type: text
    content: 'En ce jour-là, il y aura dans le pays d’Egypte cinq villes où l’on parlera la langue des Hébreux et où l’on prêtera serment par l’Eternel, le Seigneur des armées célestes. On appellera l’une d’elles : la Ville du Soleil'
  - type: note
    content: 'La Ville du Soleil (Héliopolis) : d’après certains manuscrits du texte hébreu traditionnel, le texte hébreu de Qumrân et la Vulgate. La plupart des manuscrits du texte hébreu traditionnel ont : la Ville de la Destruction.'
  - type: text
    content: .
  '19':
  - type: text
    content: 'En ce jour-là, l’Eternel aura un autel au milieu de l’Egypte, et une stèle sera dressée en l’honneur du Seigneur sur sa frontière. '
  '2':
  - type: text
    content: Je dresserai les Egyptiens ╵les uns contre les autres
  - type: note
    content: Il pourrait s’agir des luttes intestines qui opposèrent les Egyptiens entre eux à la fin de la XXIVe dynastie (saïte) et qui permirent aux rois éthiopiens de la XXVe dynastie de s’imposer dans tout le pays (voir 18.1 et note).
  - type: text
    content: ','
  - type: text
    content: déclare l’Eternel.
  - type: text
    content: Ils se feront la guerre, ╵qui, contre son parent, ╵qui, contre son ami,
  - type: text
    content: cité contre cité, ╵et province contre province.
  '20':
  - type: text
    content: 'Ils serviront de signe et de témoins pour l’Eternel, le Seigneur des armées célestes, dans le pays d’Egypte. Et quand les Egyptiens crieront à l’Eternel à cause de leurs oppresseurs, il leur enverra un libérateur qui prendra leur parti et les délivrera. '
  '21':
  - type: text
    content: 'L’Eternel se fera connaître au pays de l’Egypte et, ce jour-là, les Egyptiens connaîtront l’Eternel. Ils lui rendront un culte avec des sacrifices et des offrandes, et ils feront des vœux à l’Eternel et s’en acquitteront. '
  '22':
  - type: text
    content: L’Eternel frappera les Egyptiens, il frappera, mais il les guérira, et ils se tourneront vers l’Eternel qui les exaucera et qui les guérira.
  '23':
  - type: text
    content: 'En ce jour-là, il y aura une route allant d’Egypte en Assyrie. Les Assyriens se rendront en Egypte, les Egyptiens en Assyrie ; des Egyptiens et des Assyriens rendront leur culte ensemble. '
  '24':
  - type: text
    content: 'En ce jour-là, Israël sera le troisième, avec l’Egypte et l’Assyrie, et, pour la terre entière, ce sera une bénédiction. '
  '25':
  - type: text
    content: 'Et l’Eternel, le Seigneur des armées célestes, les bénira, disant : Bénie soit l’Egypte, mon peuple, bénie soit l’Assyrie, mon œuvre, et Israël, qui m’appartient.'
  '3':
  - type: text
    content: Les Egyptiens perdront l’esprit
  - type: text
    content: et j’anéantirai ╵leur politique.
  - type: text
    content: Ils iront consulter ╵leurs sorciers, leurs idoles,
  - type: text
    content: ceux qui évoquent les morts ╵et les devins.
  '4':
  - type: text
    content: Je livrerai l’Egypte ╵aux mains d’un maître dur,
  - type: text
    content: un roi puissant ╵dominera sur eux
  - type: note
    content: En 712, le roi Shabaka de Nubie (d’Ethiopie) s’est rendu maître de toute l’Egypte. D’autres pensent que cette prophétie vise les rois assyriens Esar-Haddôn ou Assourbanipal qui, en 670 et 662, ont envahi l’Egypte.
  - type: text
    content: .
  - type: text
    content: L’Eternel le déclare, ╵le Seigneur des armées célestes.
  '5':
  - type: text
    content: L’eau de la mer s’asséchera,
  - type: text
    content: le fleuve tarira ╵et son lit sera sec.
  '6':
  - type: text
    content: L’eau croupira ╵à l’intérieur des bras du fleuve
  - type: text
    content: et les canaux d’Egypte ╵baisseront et s’assécheront ;
  - type: text
    content: les joncs et les roseaux s’étioleront ;
  '7':
  - type: text
    content: les prés, le long du fleuve ╵et à son embouchure,
  - type: text
    content: tous les champs cultivés ╵irrigués par le Nil, ╵se dessécheront
  - type: text
    content: 'et seront emportés : ╵il n’en restera rien.'
  '8':
  - type: text
    content: Les pêcheurs gémiront,
  - type: text
    content: tous ceux qui jettent l’hameçon ╵dans le Nil se lamenteront.
  - type: text
    content: Ceux qui étendent leurs filets
  - type: text
    content: sur la face des eaux ╵seront bien misérables.
  '9':
  - type: text
    content: Ceux qui travaillent le fin lin ╵seront couverts de honte,
  - type: text
    content: ceux qui le peignent et qui le tissent ╵deviendront blancs de peur.
