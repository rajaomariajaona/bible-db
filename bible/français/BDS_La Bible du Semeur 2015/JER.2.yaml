document_id: JER.2
type_code: fra
segments:
- type: usfm
  marker: ms1
  children:
  - type: text
    text: Prophéties sur Juda et Jérusalem
  marker-yv: yv-h
- type: usfm
  marker: s1
  children:
  - type: text
    text: L’infidélité de Juda
  marker-yv: yv-h
- type: usfm
  marker: s2
  children:
  - type: text
    text: Juda a abandonné l’Eternel
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'L’Eternel m’adressa la parole en ces termes :'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Va à Jérusalem et crie à ses oreilles :'
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Voici ce que déclare l’Eternel :'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Je me souviens de ton amour ╵au temps de ta jeunesse
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '2.2 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Lors de l’établissement de l’alliance au mont Sinaï (voir '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Os 2.16-22
        metadata:
          usfm: HOS.2.16+HOS.2.17+HOS.2.18+HOS.2.19+HOS.2.20+HOS.2.21+HOS.2.22
      - type: text
        text: ).
    marker-yv: yv-n
  - type: text
    text: ','
- type: usfm
  marker: q1
  children:
  - type: text
    text: et comment tu m’aimais ╵au temps où tu étais ╵une jeune mariée,
- type: usfm
  marker: q1
  children:
  - type: text
    text: lorsque tu me suivais, ╵à travers le désert,
- type: usfm
  marker: q1
  children:
  - type: text
    text: dans une terre inculte.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Car Israël, ╵tu étais alors consacré ╵à l’Eternel,
- type: usfm
  marker: q1
  children:
  - type: text
    text: tout comme les prémices ╵d’une récolte.
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Tous ceux qui en mangeaient ╵étaient châtiés :'
- type: usfm
  marker: q1
  children:
  - type: text
    text: et le malheur les atteignait,
- type: usfm
  marker: q1
  children:
  - type: text
    text: l’Eternel le déclare.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Vous, communauté de Jacob,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et toutes les familles ╵du peuple d’Israël,
- type: usfm
  marker: q1
  children:
  - type: text
    text: écoutez la parole ╵que l’Eternel prononce.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Voici ce que dit l’Eternel :'
- type: usfm
  marker: q1
  children:
  - type: text
    text: En quoi donc vos ancêtres ╵m’ont-ils trouvé en tort
- type: usfm
  marker: q1
  children:
  - type: text
    text: pour s’éloigner de moi,
- type: usfm
  marker: q1
  children:
  - type: text
    text: pour s’en aller après des dieux ╵qui ne sont que du vent
- type: usfm
  marker: q1
  children:
  - type: text
    text: et n’être plus eux-mêmes que du vent
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '2.5 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Voir '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 2 R 17.15
        metadata:
          usfm: 2KI.17.15
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: '  ?'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Ils n’ont pas demandé : ╵« Où donc est l’Eternel'
- type: usfm
  marker: q1
  children:
  - type: text
    text: qui nous a fait sortir d’Egypte
- type: usfm
  marker: q1
  children:
  - type: text
    text: et qui nous a conduits ╵à travers le désert,
- type: usfm
  marker: q1
  children:
  - type: text
    text: au pays de la steppe ╵rempli de fondrières,
- type: usfm
  marker: q1
  children:
  - type: text
    text: dans une terre aride ╵où règnent les ténèbres,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et dans une région ╵où ne passe personne,
- type: usfm
  marker: q1
  children:
  - type: text
    text: où n’habite personne ? »
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Or, je vous ai conduits ╵vers un pays fertile
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'pour en manger les fruits : ╵des produits excellents.'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Mais une fois arrivés là, ╵vous avez souillé ce pays
- type: usfm
  marker: q1
  children:
  - type: text
    text: et fait de mon domaine ╵un lieu abominable.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Les prêtres n’ont pas demandé : ╵« Où donc est l’Eternel ? »'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Les spécialistes de la Loi ╵ne me connaissent pas,
- type: usfm
  marker: q1
  children:
  - type: text
    text: les dirigeants du peuple ╵se sont révoltés contre moi.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et les prophètes même ╵proclament leurs messages ╵au nom du dieu Baal.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ils vont après des dieux ╵qui ne servent à rien.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: C’est pourquoi je vous intente un procès,
- type: usfm
  marker: q1
  children:
  - type: text
    text: à vous et à vos descendants.
- type: usfm
  marker: q1
  children:
  - type: text
    text: L’Eternel le déclare.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Rendez-vous donc ╵dans les îles de Chypre, ╵et regardez !
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ou envoyez ╵des hommes à Qédar
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '2.10 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: Qédar
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: ': '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: tribu nomade du désert d’Arabie, à l’est du pays d’Israël.
    marker-yv: yv-n
  - type: text
    text: ' ╵et qu’ils observent bien !'
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Voyez si jamais il arrive ╵une chose pareille :'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: existe-t-il un peuple ╵qui ait changé de dieux ?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et pourtant ces dieux-là ╵ne sont pas de vrais dieux !
- type: usfm
  marker: q1
  children:
  - type: text
    text: Mon peuple, quant à lui, ╵a échangé celui qui fait sa gloire
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '2.11 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'C’est-à-dire Dieu (voir '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ps 106.20
        metadata:
          usfm: PSA.106.20
      - type: text
        text: ).
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: text
    text: contre ce qui ne sert à rien !
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Cieux, étonnez-vous-en,
- type: usfm
  marker: q1
  children:
  - type: text
    text: soyez-en horrifiés ╵et consternés,
- type: usfm
  marker: q1
  children:
  - type: text
    text: l’Eternel le déclare.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Car mon peuple a commis un double mal :'
- type: usfm
  marker: q1
  children:
  - type: text
    text: il m’a abandonné, ╵moi, la source d’eaux vives,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et il s’est creusé des citernes, ╵des citernes fendues
- type: usfm
  marker: q1
  children:
  - type: text
    text: et qui ne retiennent pas l’eau.
- type: usfm
  marker: s2
  children:
  - type: text
    text: Les conséquences de l’abandon
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Israël est-il donc ╵un esclave acheté
- type: usfm
  marker: q1
  children:
  - type: text
    text: ou né dans la maison ?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Pourquoi est-il mis au pillage
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '2.14 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Pillé par les Assyriens et les Egyptiens (voir v. 15-16).
    marker-yv: yv-n
  - type: text
    text: '  ?'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: De jeunes lions ╵rugissent contre lui,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et leur voix retentit,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ils ont dévasté son pays,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ses villes sont brûlées, ╵et n’ont plus d’habitants.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Et même les habitants de Memphis ╵avec ceux de Daphné
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '2.16 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Deux villes égyptiennes du delta du Nil.
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: text
    text: vous ont brisé
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '2.16 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: brisé
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: ': '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'autre traduction : '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: rasé.
    marker-yv: yv-n
  - type: text
    text: ' le crâne.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Pourquoi donc tout cela ╵t’arrive-t-il ?
- type: usfm
  marker: q1
  children:
  - type: text
    text: N’est-ce pas pour avoir ╵délaissé l’Eternel ton Dieu,
- type: usfm
  marker: q1
  children:
  - type: text
    text: alors même qu’il te guidait ╵sur le chemin ?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Maintenant, que te sert ╵de partir en Egypte,
- type: usfm
  marker: q1
  children:
  - type: text
    text: pour aller boire ╵les eaux du Nil
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '2.18 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'En hébreu, le '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'Shihor : '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: le Nil ou l’un de ses affluents.
    marker-yv: yv-n
  - type: text
    text: '  ?'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et que te sert de prendre ╵la route pour te rendre ╵en Assyrie,
- type: usfm
  marker: q1
  children:
  - type: text
    text: pour aller boire ╵les eaux du Fleuve
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '2.18 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: C’est-à-dire l’Euphrate. Dans ce verset, Jérémie fait certainement allusion à des tentatives d’alliance avec ces peuples païens (voir v. 36).
    marker-yv: yv-n
  - type: text
    text: '  ?'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Car ta méchanceté ╵entraînera ton châtiment,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ton infidélité ╵fera venir ta punition.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Sache et vois bien ╵combien il est mauvais, ╵combien il est amer
- type: usfm
  marker: q1
  children:
  - type: text
    text: de t’être détourné ╵de l’Eternel, ton Dieu,
- type: usfm
  marker: q1
  children:
  - type: text
    text: de ne plus avoir peur de moi.
- type: usfm
  marker: q1
  children:
  - type: text
    text: L’Eternel le déclare, ╵le Seigneur des armées célestes.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Juda, l’infidèle
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Voici : depuis toujours, ╵tu as brisé ton joug,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: tu as rompu tes liens
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'en disant : « Je ne veux plus être esclave ! »'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Mais, sur toute haute colline
- type: usfm
  marker: q1
  children:
  - type: text
    text: et sous tout arbre vert,
- type: usfm
  marker: q1
  children:
  - type: text
    text: toi, tu t’es allongée
- type: usfm
  marker: q1
  children:
  - type: text
    text: tout comme une prostituée
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '2.20 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Le culte des faux dieux est qualifié par les prophètes de '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'prostitution. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Très souvent, l’idolâtrie cananéenne s’accompagnait de prostitution sacrée, liée au culte de la fécondité.
    marker-yv: yv-n
  - type: text
    text: '  !'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Moi, je t’avais plantée ╵comme un cep excellent
- type: usfm
  marker: q1
  children:
  - type: text
    text: d’une variété sûre.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Comment se fait-il donc ╵que tu te sois changée ╵à mon égard
- type: usfm
  marker: q1
  children:
  - type: text
    text: en plant dégénéré ╵d’une vigne sauvage ?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: Quand tu te laverais ╵avec de la potasse
- type: usfm
  marker: q1
  children:
  - type: text
    text: et que tu emploierais ╵des quantités de soude,
- type: usfm
  marker: q1
  children:
  - type: text
    text: la tache de ta faute ╵resterait devant moi.
- type: usfm
  marker: q1
  children:
  - type: text
    text: C’est là ce que déclare ╵le Seigneur, l’Eternel.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Comment oses-tu dire : ╵« Je ne me suis jamais souillée,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: je ne suis pas allée ╵après les Baals » ?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Va observer dans la vallée
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '2.23 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Certainement la vallée de Ben-Hinnom où avaient lieu des pratiques idolâtres (voir Jr 7.31-32 ; 32.35 ; 2 R 23.10).
    marker-yv: yv-n
  - type: text
    text: ' ╵les traces de tes pas !'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Reconnais ce que tu as fait,
- type: usfm
  marker: q1
  children:
  - type: text
    text: chamelle écervelée, ╵qui vagabonde ╵dans tous les sens,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: oui, ânesse sauvage ╵qui a l’habitude de vivre ╵dans les steppes désertes !
- type: usfm
  marker: q1
  children:
  - type: text
    text: Le feu de sa passion ╵lui fait renifler l’air.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Qui pourrait réfréner ╵l’ardeur de ses désirs ?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Tous ceux qui la recherchent ╵n’auront pas à se fatiguer,
- type: usfm
  marker: q1
  children:
  - type: text
    text: car ils la trouveront ╵quand elle est en chaleur.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: Prends garde que ton pied ╵ne se déchausse pas !
- type: usfm
  marker: q1
  children:
  - type: text
    text: Prends garde à ton gosier ╵qui va se dessécher !
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Mais toi, tu réponds : « C’est peine perdue !'
- type: usfm
  marker: q1
  children:
  - type: text
    text: J’aime les étrangers,
- type: usfm
  marker: q1
  children:
  - type: text
    text: c’est eux que je veux suivre. »
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: Comme un voleur a honte ╵lorsqu’il est découvert,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ainsi seront couverts de honte ╵la communauté d’Israël,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ses rois et ses ministres,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ses prêtres, ses prophètes.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'Ils disent à du bois : ╵« Tu es mon père'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '2.27 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Voir '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '3.4'
        metadata:
          usfm: JER.3.4
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: '  ! »'
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'et à la pierre : ╵« Toi, tu m’as mis au monde ! »'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ils m’ont tourné le dos, ╵ne m’ont pas regardé en face,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'mais au jour du malheur, ils disent :'
- type: usfm
  marker: q1
  children:
  - type: text
    text: « Lève-toi, sauve-nous ! »
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: Mais où donc sont les dieux ╵que tu t’es fabriqués ?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Qu’ils se lèvent, donc, eux, ╵s’ils peuvent te sauver ╵quand le malheur t’atteint !
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Car, ô Juda : ╵autant tu as de villes, ╵autant tu as de dieux'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '2.28 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Voir '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '11.13'
        metadata:
          usfm: JER.11.13
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: '  !'
- type: usfm
  marker: s2
  children:
  - type: text
    text: Juda a oublié son Dieu
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: Pourquoi m’intenter un procès ?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Vous vous êtes tous ╵révoltés contre moi,
- type: usfm
  marker: q1
  children:
  - type: text
    text: l’Eternel le déclare.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: J’ai frappé vos enfants, ╵mais c’est peine perdue !
- type: usfm
  marker: q1
  children:
  - type: text
    text: Car ils n’ont pas voulu ╵accepter la leçon.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Vous avez mis à mort ╵par l’épée vos prophètes
- type: usfm
  marker: q1
  children:
  - type: text
    text: comme un lion destructeur.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: Gens d’aujourd’hui,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'voyez ce que dit l’Eternel :'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Suis-je pour Israël ╵une terre déserte,
- type: usfm
  marker: q1
  children:
  - type: text
    text: un pays de ténèbres ?
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Pourquoi mon peuple dit-il donc :'
- type: usfm
  marker: q1
  children:
  - type: text
    text: « Nous errerons où nous voulons,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et nous ne voulons plus ╵avoir affaire à toi » ?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '32'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: Quoi donc, la jeune fille ╵oublierait-elle ses bijoux,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ou la jeune mariée ╵sa ceinture tressée ?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Or, mon peuple m’oublie
- type: usfm
  marker: q1
  children:
  - type: text
    text: depuis des jours sans nombre.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '33'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: Oh ! comme tu sais bien
- type: usfm
  marker: q1
  children:
  - type: text
    text: rechercher tes amants !
- type: usfm
  marker: q1
  children:
  - type: text
    text: Par ta conduite, ╵tu en remontrerais ╵à la pire des femmes !
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '34'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: Et jusque sur les pans ╵de tes habits,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'on voit le sang de pauvres ╵qui étaient innocents :'
- type: usfm
  marker: q1
  children:
  - type: text
    text: tu ne les avais pas surpris ╵en flagrant délit d’effraction
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '2.34 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Voir '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ex 22.1
        metadata:
          usfm: EXO.22.1
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: '  !'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '35'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: 'Et malgré tout cela, tu dis :'
- type: usfm
  marker: q1
  children:
  - type: text
    text: « Moi, je suis innocente.
- type: usfm
  marker: q1
  children:
  - type: text
    text: La colère divine ╵va très certainement ╵se détourner de moi ! »
- type: usfm
  marker: q1
  children:
  - type: text
    text: Eh bien, moi, je vais te juger
- type: usfm
  marker: q1
  children:
  - type: text
    text: parce que tu prétends ╵que tu n’as pas péché.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '36'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: Comme tu t’avilis
- type: usfm
  marker: q1
  children:
  - type: text
    text: à changer de conduite !
- type: usfm
  marker: q1
  children:
  - type: text
    text: Te tourner vers l’Egypte,
- type: usfm
  marker: q1
  children:
  - type: text
    text: comme vers l’Assyrie
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '2.36 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Voir v. 18 et note.
    marker-yv: yv-n
  - type: text
    text: ', ╵cela t’attirera la honte,'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '37'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: et tu en reviendras
- type: usfm
  marker: q1
  children:
  - type: text
    text: en te cachant la face ╵avec les mains.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Car l’Eternel rejette ╵ceux sur lesquels tu comptes
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '2.37 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: L’Egypte et l’Assyrie.
    marker-yv: yv-n
  - type: text
    text: '  ;'
- type: usfm
  marker: q1
  children:
  - type: text
    text: ce n’est pas avec eux ╵que tu aboutiras à quelque chose.
