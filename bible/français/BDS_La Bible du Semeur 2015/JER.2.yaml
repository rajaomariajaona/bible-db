document_id: JER.2,21
type_code: fra
verses:
  '1':
  - type: heading
    content: Prophéties sur Juda et Jérusalem
  - type: heading
    content: L’infidélité de Juda
  - type: heading
    content: Juda a abandonné l’Eternel
  - type: text
    content: 'L’Eternel m’adressa la parole en ces termes :'
  '10':
  - type: text
    content: Rendez-vous donc ╵dans les îles de Chypre, ╵et regardez !
  - type: text
    content: Ou envoyez ╵des hommes à Qédar
  - type: note
    content: 'Qédar: tribu nomade du désert d’Arabie, à l’est du pays d’Israël.'
  - type: text
    content: ' ╵et qu’ils observent bien !'
  - type: text
    content: 'Voyez si jamais il arrive ╵une chose pareille :'
  '11':
  - type: text
    content: existe-t-il un peuple ╵qui ait changé de dieux ?
  - type: text
    content: Et pourtant ces dieux-là ╵ne sont pas de vrais dieux !
  - type: text
    content: Mon peuple, quant à lui, ╵a échangé celui qui fait sa gloire
  - type: note
    content: C’est-à-dire Dieu (voir Ps 106.20).
  - type: text
    content: contre ce qui ne sert à rien !
  '12':
  - type: text
    content: Cieux, étonnez-vous-en,
  - type: text
    content: soyez-en horrifiés ╵et consternés,
  - type: text
    content: l’Eternel le déclare.
  '13':
  - type: text
    content: 'Car mon peuple a commis un double mal :'
  - type: text
    content: il m’a abandonné, ╵moi, la source d’eaux vives,
  - type: text
    content: et il s’est creusé des citernes, ╵des citernes fendues
  - type: text
    content: et qui ne retiennent pas l’eau.
  - type: heading
    content: Les conséquences de l’abandon
  '14':
  - type: text
    content: Israël est-il donc ╵un esclave acheté
  - type: text
    content: ou né dans la maison ?
  - type: text
    content: Pourquoi est-il mis au pillage
  - type: note
    content: Pillé par les Assyriens et les Egyptiens (voir v. 15-16).
  - type: text
    content: '  ?'
  '15':
  - type: text
    content: De jeunes lions ╵rugissent contre lui,
  - type: text
    content: et leur voix retentit,
  - type: text
    content: ils ont dévasté son pays,
  - type: text
    content: ses villes sont brûlées, ╵et n’ont plus d’habitants.
  '16':
  - type: text
    content: Et même les habitants de Memphis ╵avec ceux de Daphné
  - type: note
    content: Deux villes égyptiennes du delta du Nil.
  - type: text
    content: vous ont brisé
  - type: note
    content: 'brisé: autre traduction : rasé.'
  - type: text
    content: ' le crâne.'
  '17':
  - type: text
    content: Pourquoi donc tout cela ╵t’arrive-t-il ?
  - type: text
    content: N’est-ce pas pour avoir ╵délaissé l’Eternel ton Dieu,
  - type: text
    content: alors même qu’il te guidait ╵sur le chemin ?
  '18':
  - type: text
    content: Maintenant, que te sert ╵de partir en Egypte,
  - type: text
    content: pour aller boire ╵les eaux du Nil
  - type: note
    content: 'En hébreu, le Shihor : le Nil ou l’un de ses affluents.'
  - type: text
    content: '  ?'
  - type: text
    content: Et que te sert de prendre ╵la route pour te rendre ╵en Assyrie,
  - type: text
    content: pour aller boire ╵les eaux du Fleuve
  - type: note
    content: C’est-à-dire l’Euphrate. Dans ce verset, Jérémie fait certainement allusion à des tentatives d’alliance avec ces peuples païens (voir v. 36).
  - type: text
    content: '  ?'
  '19':
  - type: text
    content: Car ta méchanceté ╵entraînera ton châtiment,
  - type: text
    content: ton infidélité ╵fera venir ta punition.
  - type: text
    content: Sache et vois bien ╵combien il est mauvais, ╵combien il est amer
  - type: text
    content: de t’être détourné ╵de l’Eternel, ton Dieu,
  - type: text
    content: de ne plus avoir peur de moi.
  - type: text
    content: L’Eternel le déclare, ╵le Seigneur des armées célestes.
  - type: heading
    content: Juda, l’infidèle
  '2':
  - type: text
    content: 'Va à Jérusalem et crie à ses oreilles :'
  - type: text
    content: 'Voici ce que déclare l’Eternel :'
  - type: text
    content: Je me souviens de ton amour ╵au temps de ta jeunesse
  - type: note
    content: Lors de l’établissement de l’alliance au mont Sinaï (voir Os 2.16-22).
  - type: text
    content: ','
  - type: text
    content: et comment tu m’aimais ╵au temps où tu étais ╵une jeune mariée,
  - type: text
    content: lorsque tu me suivais, ╵à travers le désert,
  - type: text
    content: dans une terre inculte.
  '20':
  - type: text
    content: 'Voici : depuis toujours, ╵tu as brisé ton joug,'
  - type: text
    content: tu as rompu tes liens
  - type: text
    content: 'en disant : « Je ne veux plus être esclave ! »'
  - type: text
    content: Mais, sur toute haute colline
  - type: text
    content: et sous tout arbre vert,
  - type: text
    content: toi, tu t’es allongée
  - type: text
    content: tout comme une prostituée
  - type: note
    content: Le culte des faux dieux est qualifié par les prophètes de prostitution. Très souvent, l’idolâtrie cananéenne s’accompagnait de prostitution sacrée, liée au culte de la fécondité.
  - type: text
    content: '  !'
  '21':
  - type: text
    content: Moi, je t’avais plantée ╵comme un cep excellent
  - type: text
    content: d’une variété sûre.
  - type: text
    content: Comment se fait-il donc ╵que tu te sois changée ╵à mon égard
  - type: text
    content: en plant dégénéré ╵d’une vigne sauvage ?
  '22':
  - type: text
    content: Quand tu te laverais ╵avec de la potasse
  - type: text
    content: et que tu emploierais ╵des quantités de soude,
  - type: text
    content: la tache de ta faute ╵resterait devant moi.
  - type: text
    content: C’est là ce que déclare ╵le Seigneur, l’Eternel.
  '23':
  - type: text
    content: 'Comment oses-tu dire : ╵« Je ne me suis jamais souillée,'
  - type: text
    content: je ne suis pas allée ╵après les Baals » ?
  - type: text
    content: Va observer dans la vallée
  - type: note
    content: Certainement la vallée de Ben-Hinnom où avaient lieu des pratiques idolâtres (voir Jr 7.31-32 ; 32.35 ; 2 R 23.10).
  - type: text
    content: ' ╵les traces de tes pas !'
  - type: text
    content: Reconnais ce que tu as fait,
  - type: text
    content: chamelle écervelée, ╵qui vagabonde ╵dans tous les sens,
  '24':
  - type: text
    content: oui, ânesse sauvage ╵qui a l’habitude de vivre ╵dans les steppes désertes !
  - type: text
    content: Le feu de sa passion ╵lui fait renifler l’air.
  - type: text
    content: Qui pourrait réfréner ╵l’ardeur de ses désirs ?
  - type: text
    content: Tous ceux qui la recherchent ╵n’auront pas à se fatiguer,
  - type: text
    content: car ils la trouveront ╵quand elle est en chaleur.
  '25':
  - type: text
    content: Prends garde que ton pied ╵ne se déchausse pas !
  - type: text
    content: Prends garde à ton gosier ╵qui va se dessécher !
  - type: text
    content: 'Mais toi, tu réponds : « C’est peine perdue !'
  - type: text
    content: J’aime les étrangers,
  - type: text
    content: c’est eux que je veux suivre. »
  '26':
  - type: text
    content: Comme un voleur a honte ╵lorsqu’il est découvert,
  - type: text
    content: ainsi seront couverts de honte ╵la communauté d’Israël,
  - type: text
    content: ses rois et ses ministres,
  - type: text
    content: ses prêtres, ses prophètes.
  '27':
  - type: text
    content: 'Ils disent à du bois : ╵« Tu es mon père'
  - type: note
    content: Voir 3.4.
  - type: text
    content: '  ! »'
  - type: text
    content: 'et à la pierre : ╵« Toi, tu m’as mis au monde ! »'
  - type: text
    content: Ils m’ont tourné le dos, ╵ne m’ont pas regardé en face,
  - type: text
    content: 'mais au jour du malheur, ils disent :'
  - type: text
    content: « Lève-toi, sauve-nous ! »
  '28':
  - type: text
    content: Mais où donc sont les dieux ╵que tu t’es fabriqués ?
  - type: text
    content: Qu’ils se lèvent, donc, eux, ╵s’ils peuvent te sauver ╵quand le malheur t’atteint !
  - type: text
    content: 'Car, ô Juda : ╵autant tu as de villes, ╵autant tu as de dieux'
  - type: note
    content: Voir 11.13.
  - type: text
    content: '  !'
  - type: heading
    content: Juda a oublié son Dieu
  '29':
  - type: text
    content: Pourquoi m’intenter un procès ?
  - type: text
    content: Vous vous êtes tous ╵révoltés contre moi,
  - type: text
    content: l’Eternel le déclare.
  '3':
  - type: text
    content: Car Israël, ╵tu étais alors consacré ╵à l’Eternel,
  - type: text
    content: tout comme les prémices ╵d’une récolte.
  - type: text
    content: 'Tous ceux qui en mangeaient ╵étaient châtiés :'
  - type: text
    content: et le malheur les atteignait,
  - type: text
    content: l’Eternel le déclare.
  '30':
  - type: text
    content: J’ai frappé vos enfants, ╵mais c’est peine perdue !
  - type: text
    content: Car ils n’ont pas voulu ╵accepter la leçon.
  - type: text
    content: Vous avez mis à mort ╵par l’épée vos prophètes
  - type: text
    content: comme un lion destructeur.
  '31':
  - type: text
    content: Gens d’aujourd’hui,
  - type: text
    content: 'voyez ce que dit l’Eternel :'
  - type: text
    content: Suis-je pour Israël ╵une terre déserte,
  - type: text
    content: un pays de ténèbres ?
  - type: text
    content: 'Pourquoi mon peuple dit-il donc :'
  - type: text
    content: « Nous errerons où nous voulons,
  - type: text
    content: et nous ne voulons plus ╵avoir affaire à toi » ?
  '32':
  - type: text
    content: Quoi donc, la jeune fille ╵oublierait-elle ses bijoux,
  - type: text
    content: ou la jeune mariée ╵sa ceinture tressée ?
  - type: text
    content: Or, mon peuple m’oublie
  - type: text
    content: depuis des jours sans nombre.
  '33':
  - type: text
    content: Oh ! comme tu sais bien
  - type: text
    content: rechercher tes amants !
  - type: text
    content: Par ta conduite, ╵tu en remontrerais ╵à la pire des femmes !
  '34':
  - type: text
    content: Et jusque sur les pans ╵de tes habits,
  - type: text
    content: 'on voit le sang de pauvres ╵qui étaient innocents :'
  - type: text
    content: tu ne les avais pas surpris ╵en flagrant délit d’effraction
  - type: note
    content: Voir Ex 22.1.
  - type: text
    content: '  !'
  '35':
  - type: text
    content: 'Et malgré tout cela, tu dis :'
  - type: text
    content: « Moi, je suis innocente.
  - type: text
    content: La colère divine ╵va très certainement ╵se détourner de moi ! »
  - type: text
    content: Eh bien, moi, je vais te juger
  - type: text
    content: parce que tu prétends ╵que tu n’as pas péché.
  '36':
  - type: text
    content: Comme tu t’avilis
  - type: text
    content: à changer de conduite !
  - type: text
    content: Te tourner vers l’Egypte,
  - type: text
    content: comme vers l’Assyrie
  - type: note
    content: Voir v. 18 et note.
  - type: text
    content: ', ╵cela t’attirera la honte,'
  '37':
  - type: text
    content: et tu en reviendras
  - type: text
    content: en te cachant la face ╵avec les mains.
  - type: text
    content: Car l’Eternel rejette ╵ceux sur lesquels tu comptes
  - type: note
    content: L’Egypte et l’Assyrie.
  - type: text
    content: '  ;'
  - type: text
    content: ce n’est pas avec eux ╵que tu aboutiras à quelque chose.
  '4':
  - type: text
    content: Vous, communauté de Jacob,
  - type: text
    content: et toutes les familles ╵du peuple d’Israël,
  - type: text
    content: écoutez la parole ╵que l’Eternel prononce.
  '5':
  - type: text
    content: 'Voici ce que dit l’Eternel :'
  - type: text
    content: En quoi donc vos ancêtres ╵m’ont-ils trouvé en tort
  - type: text
    content: pour s’éloigner de moi,
  - type: text
    content: pour s’en aller après des dieux ╵qui ne sont que du vent
  - type: text
    content: et n’être plus eux-mêmes que du vent
  - type: note
    content: Voir 2 R 17.15.
  - type: text
    content: '  ?'
  '6':
  - type: text
    content: 'Ils n’ont pas demandé : ╵« Où donc est l’Eternel'
  - type: text
    content: qui nous a fait sortir d’Egypte
  - type: text
    content: et qui nous a conduits ╵à travers le désert,
  - type: text
    content: au pays de la steppe ╵rempli de fondrières,
  - type: text
    content: dans une terre aride ╵où règnent les ténèbres,
  - type: text
    content: et dans une région ╵où ne passe personne,
  - type: text
    content: où n’habite personne ? »
  '7':
  - type: text
    content: Or, je vous ai conduits ╵vers un pays fertile
  - type: text
    content: 'pour en manger les fruits : ╵des produits excellents.'
  - type: text
    content: Mais une fois arrivés là, ╵vous avez souillé ce pays
  - type: text
    content: et fait de mon domaine ╵un lieu abominable.
  '8':
  - type: text
    content: 'Les prêtres n’ont pas demandé : ╵« Où donc est l’Eternel ? »'
  - type: text
    content: Les spécialistes de la Loi ╵ne me connaissent pas,
  - type: text
    content: les dirigeants du peuple ╵se sont révoltés contre moi.
  - type: text
    content: Et les prophètes même ╵proclament leurs messages ╵au nom du dieu Baal.
  - type: text
    content: Ils vont après des dieux ╵qui ne servent à rien.
  '9':
  - type: text
    content: C’est pourquoi je vous intente un procès,
  - type: text
    content: à vous et à vos descendants.
  - type: text
    content: L’Eternel le déclare.
