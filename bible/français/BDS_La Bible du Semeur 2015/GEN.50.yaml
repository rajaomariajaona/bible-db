document_id: GEN.50
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: L’enterrement de Jacob
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Joseph se jeta sur le visage de son père, pleura sur lui et l’embrassa. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Puis il ordonna aux médecins qui étaient à son service de l’embaumer. Ceux-ci embaumèrent donc Israël. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Ils y passèrent quarante jours, le temps nécessaire à un embaumement, et les Egyptiens le pleurèrent pendant soixante-dix jours.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Quand les jours de deuil furent écoulés, Joseph dit aux hauts fonctionnaires de la cour du pharaon : Si vous voulez bien m’accorder cette faveur, portez à l’attention du pharaon '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'que mon père m’a fait prêter serment en disant : « Me voici sur le point de mourir ; j’ai fait creuser un tombeau au pays de Canaan, c’est là que vous m’enterrerez. » Maintenant donc, permets-moi d’y monter pour ensevelir mon père ; après quoi, je reviendrai.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Le pharaon répondit à Joseph : Va et enterre ton père, comme il te l’a fait jurer.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Joseph partit donc pour ensevelir son père, accompagné de tous les hauts fonctionnaires du pharaon, des dignitaires de sa cour et de tous les hauts responsables d’Egypte, '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'ainsi que de toute sa famille, et celle de ses frères, toute la famille de son père. Ils ne laissèrent dans le pays de Goshen que leurs enfants, leurs moutons, leurs chèvres et leurs bovins. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Joseph fit le voyage, escorté et de chars et de leur équipage ; le convoi ainsi formé était très impressionnant.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Lorsqu’ils furent arrivés à l’Aire d’Atad, située de l’autre côté du Jourdain, ils y célébrèrent de grandes funérailles très imposantes. Joseph mena deuil pour son père pendant sept jours. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'En voyant ces funérailles dans l’Aire d’Atad, les Cananéens qui habitaient le pays dirent : Ce doit être un deuil important pour les Egyptiens.'
- type: usfm
  marker: p
  children:
  - type: text
    text: 'C’est pourquoi on a nommé cet endroit de l’autre côté du Jourdain : Abel-Mitsraïm (Deuil de l’Egypte). '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Les fils de Jacob firent donc ce que leur père leur avait demandé. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Ils le transportèrent au pays de Canaan et l’enterrèrent dans la caverne du champ de Makpéla qu’Abraham avait achetée avec le champ à Ephrôn le Hittite, comme propriété funéraire vis-à-vis de Mamré
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '50.13 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Voir '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ac 7.16
        metadata:
          usfm: ACT.7.16
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Après avoir enterré son père, Joseph revint en Egypte avec ses frères et tous ceux qui l’avaient accompagné aux funérailles.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Le Dieu souverain
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Maintenant que leur père était mort, les frères de Joseph se dirent : Qui sait, peut-être Joseph se mettra-t-il à nous haïr et à nous rendre tout le mal que nous lui avons fait.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Alors ils lui envoyèrent un messager pour lui dire : Avant de mourir, ton père nous a donné cet ordre : '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: '« Vous demanderez à Joseph : Veuille, je te prie, pardonner le crime de tes frères et leur péché ; car ils t’ont fait beaucoup de mal. Oui, je te prie, pardonne maintenant la faute des serviteurs du Dieu de ton père. »'
- type: usfm
  marker: p
  children:
  - type: text
    text: 'En recevant ce message, Joseph se mit à pleurer. '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Ses frères vinrent en personne se jeter à ses pieds en disant : Nous sommes tes esclaves.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Mais Joseph leur dit : N’ayez aucune crainte ! Suis-je à la place de Dieu ? '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Vous aviez projeté de me faire du mal, mais par ce que vous avez fait, Dieu a projeté du bien en vue d’accomplir ce qui se réalise aujourd’hui, pour sauver la vie à un peuple nombreux. '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Maintenant donc, n’ayez aucune crainte, je pourvoirai à vos besoins ainsi qu’à ceux de vos enfants.
- type: usfm
  marker: p
  children:
  - type: text
    text: Ainsi il les rassura et toucha leur cœur par ses paroles.
- type: usfm
  marker: s1
  children:
  - type: text
    text: La fin de la vie de Joseph
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Joseph demeura en Egypte, ainsi que la famille de son père. Il vécut cent dix ans. '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Il vit les descendants d’Ephraïm jusqu’à la troisième génération ; de plus, les enfants de Makir, fils de Manassé, furent placés sur ses genoux à leur naissance. '
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'A la fin de sa vie, il dit aux siens : Je vais mourir, mais Dieu ne manquera pas d’intervenir en votre faveur et vous fera remonter de ce pays vers celui qu’il a promis par serment à Abraham, à Isaac et à Jacob.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Puis Joseph fit prêter serment aux Israélites en leur disant : Lorsque Dieu interviendra pour vous, vous emporterez d’ici mes ossements'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '50.25 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Allusion en '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Hé 11.22
        metadata:
          usfm: HEB.11.22
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: Joseph mourut à l’âge de cent dix ans ; on l’embauma, et on le déposa dans un sarcophage en Egypte.
