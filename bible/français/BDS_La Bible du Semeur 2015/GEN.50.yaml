document_id: GEN.50,21
type_code: fra
verses:
  '1':
  - type: heading
    content: L’enterrement de Jacob
  - type: text
    content: 'Joseph se jeta sur le visage de son père, pleura sur lui et l’embrassa. '
  '10':
  - type: text
    content: 'Lorsqu’ils furent arrivés à l’Aire d’Atad, située de l’autre côté du Jourdain, ils y célébrèrent de grandes funérailles très imposantes. Joseph mena deuil pour son père pendant sept jours. '
  '11':
  - type: text
    content: 'En voyant ces funérailles dans l’Aire d’Atad, les Cananéens qui habitaient le pays dirent : Ce doit être un deuil important pour les Egyptiens.'
  - type: text
    content: 'C’est pourquoi on a nommé cet endroit de l’autre côté du Jourdain : Abel-Mitsraïm (Deuil de l’Egypte). '
  '12':
  - type: text
    content: 'Les fils de Jacob firent donc ce que leur père leur avait demandé. '
  '13':
  - type: text
    content: Ils le transportèrent au pays de Canaan et l’enterrèrent dans la caverne du champ de Makpéla qu’Abraham avait achetée avec le champ à Ephrôn le Hittite, comme propriété funéraire vis-à-vis de Mamré
  - type: note
    content: Voir Ac 7.16.
  - type: text
    content: '. '
  '14':
  - type: text
    content: Après avoir enterré son père, Joseph revint en Egypte avec ses frères et tous ceux qui l’avaient accompagné aux funérailles.
  - type: heading
    content: Le Dieu souverain
  '15':
  - type: text
    content: 'Maintenant que leur père était mort, les frères de Joseph se dirent : Qui sait, peut-être Joseph se mettra-t-il à nous haïr et à nous rendre tout le mal que nous lui avons fait.'
  '16':
  - type: text
    content: 'Alors ils lui envoyèrent un messager pour lui dire : Avant de mourir, ton père nous a donné cet ordre : '
  '17':
  - type: text
    content: '« Vous demanderez à Joseph : Veuille, je te prie, pardonner le crime de tes frères et leur péché ; car ils t’ont fait beaucoup de mal. Oui, je te prie, pardonne maintenant la faute des serviteurs du Dieu de ton père. »'
  - type: text
    content: 'En recevant ce message, Joseph se mit à pleurer. '
  '18':
  - type: text
    content: 'Ses frères vinrent en personne se jeter à ses pieds en disant : Nous sommes tes esclaves.'
  '19':
  - type: text
    content: 'Mais Joseph leur dit : N’ayez aucune crainte ! Suis-je à la place de Dieu ? '
  '2':
  - type: text
    content: 'Puis il ordonna aux médecins qui étaient à son service de l’embaumer. Ceux-ci embaumèrent donc Israël. '
  '20':
  - type: text
    content: 'Vous aviez projeté de me faire du mal, mais par ce que vous avez fait, Dieu a projeté du bien en vue d’accomplir ce qui se réalise aujourd’hui, pour sauver la vie à un peuple nombreux. '
  '21':
  - type: text
    content: Maintenant donc, n’ayez aucune crainte, je pourvoirai à vos besoins ainsi qu’à ceux de vos enfants.
  - type: text
    content: Ainsi il les rassura et toucha leur cœur par ses paroles.
  - type: heading
    content: La fin de la vie de Joseph
  '22':
  - type: text
    content: 'Joseph demeura en Egypte, ainsi que la famille de son père. Il vécut cent dix ans. '
  '23':
  - type: text
    content: 'Il vit les descendants d’Ephraïm jusqu’à la troisième génération ; de plus, les enfants de Makir, fils de Manassé, furent placés sur ses genoux à leur naissance. '
  '24':
  - type: text
    content: 'A la fin de sa vie, il dit aux siens : Je vais mourir, mais Dieu ne manquera pas d’intervenir en votre faveur et vous fera remonter de ce pays vers celui qu’il a promis par serment à Abraham, à Isaac et à Jacob.'
  '25':
  - type: text
    content: 'Puis Joseph fit prêter serment aux Israélites en leur disant : Lorsque Dieu interviendra pour vous, vous emporterez d’ici mes ossements'
  - type: note
    content: Allusion en Hé 11.22.
  - type: text
    content: .
  '26':
  - type: text
    content: Joseph mourut à l’âge de cent dix ans ; on l’embauma, et on le déposa dans un sarcophage en Egypte.
  '3':
  - type: text
    content: Ils y passèrent quarante jours, le temps nécessaire à un embaumement, et les Egyptiens le pleurèrent pendant soixante-dix jours.
  '4':
  - type: text
    content: 'Quand les jours de deuil furent écoulés, Joseph dit aux hauts fonctionnaires de la cour du pharaon : Si vous voulez bien m’accorder cette faveur, portez à l’attention du pharaon '
  '5':
  - type: text
    content: 'que mon père m’a fait prêter serment en disant : « Me voici sur le point de mourir ; j’ai fait creuser un tombeau au pays de Canaan, c’est là que vous m’enterrerez. » Maintenant donc, permets-moi d’y monter pour ensevelir mon père ; après quoi, je reviendrai.'
  '6':
  - type: text
    content: 'Le pharaon répondit à Joseph : Va et enterre ton père, comme il te l’a fait jurer.'
  '7':
  - type: text
    content: 'Joseph partit donc pour ensevelir son père, accompagné de tous les hauts fonctionnaires du pharaon, des dignitaires de sa cour et de tous les hauts responsables d’Egypte, '
  '8':
  - type: text
    content: 'ainsi que de toute sa famille, et celle de ses frères, toute la famille de son père. Ils ne laissèrent dans le pays de Goshen que leurs enfants, leurs moutons, leurs chèvres et leurs bovins. '
  '9':
  - type: text
    content: Joseph fit le voyage, escorté et de chars et de leur équipage ; le convoi ainsi formé était très impressionnant.
