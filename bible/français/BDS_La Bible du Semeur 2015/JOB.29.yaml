document_id: JOB.29
type_code: fra
segments:
- type: usfm
  marker: ms1
  children:
  - type: text
    text: Dernier discours de Job
  marker-yv: yv-h
- type: usfm
  marker: s1
  children:
  - type: text
    text: Job évoque sa condition passée
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Job prononça un autre discours et dit :'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Qui me fera revivre ╵les saisons d’autrefois,
- type: usfm
  marker: q1
  children:
  - type: text
    text: comme en ces jours passés ╵où Dieu veillait sur moi,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: où il faisait briller ╵sa lampe sur ma tête
- type: usfm
  marker: q1
  children:
  - type: text
    text: et qu’avec sa lumière ╵j’affrontais les ténèbres ?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Ah ! si j’étais encore ╵aux jours de ma vigueur,
- type: usfm
  marker: q1
  children:
  - type: text
    text: quand ma demeure jouissait ╵de l’intimité avec Dieu,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: et quand le Tout-Puissant ╵était encore à mes côtés,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et mes enfants ╵autour de moi,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: quand je baignais mes pieds ╵dans le lait fermenté
- type: usfm
  marker: q1
  children:
  - type: text
    text: et quand le roc versait ╵pour moi des torrents d’huile
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '29.6 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Images classiques de la prospérité : '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'le roc '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: désigne le pressoir d’olives dont la base d’où s’écoulait l’huile était faite en pierre.
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Lorsque je me rendais ╵aux portes de la ville,
- type: usfm
  marker: q1
  children:
  - type: text
    text: quand je dressais mon siège ╵sur la place publique
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '29.7 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Le conseil des notables siégeait sur la place publique près des portes de la ville. Ce conseil fonctionnait aussi comme tribunal. Les v. 7-10 illustrent les habitudes de politesse orientale.
    marker-yv: yv-n
  - type: text
    text: ','
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: les jeunes me voyaient ╵et ils se retiraient,
- type: usfm
  marker: q1
  children:
  - type: text
    text: les vieillards se levaient ╵et ils restaient debout
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '29.8 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Jusqu’à ce que Job se soit assis.
    marker-yv: yv-n
  - type: text
    text: ','
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: les notables arrêtaient ╵leurs propos
- type: usfm
  marker: q1
  children:
  - type: text
    text: et se mettaient ╵une main sur la bouche.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Les grands baissaient la voix
- type: usfm
  marker: q1
  children:
  - type: text
    text: et ils tenaient leur langue ╵collée à leur palais.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Celui qui m’écoutait ╵me déclarait heureux,
- type: usfm
  marker: q1
  children:
  - type: text
    text: celui qui me voyait ╵parlait de moi en bien.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Car je sauvais le pauvre ╵qui appelait à l’aide
- type: usfm
  marker: q1
  children:
  - type: text
    text: ainsi que l’orphelin ╵privé de tout secours.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Ceux qui allaient mourir ╵me bénissaient,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et je mettais la joie ╵dans le cœur de la veuve.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'J’endossais la justice : ╵c’était mon vêtement.'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ma robe et mon turban, ╵c’était ma probité.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: J’étais l’œil de l’aveugle
- type: usfm
  marker: q1
  children:
  - type: text
    text: et les pieds du boiteux,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: et j’étais comme un père ╵pour ceux qui étaient pauvres.
- type: usfm
  marker: q1
  children:
  - type: text
    text: J’examinais à fond ╵le cas des inconnus
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '29.16 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Autre traduction : '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: les cas que je ne savais pas trancher.
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Je brisais les mâchoires ╵de l’homme inique
- type: usfm
  marker: q1
  children:
  - type: text
    text: et je lui arrachais ╵la proie d’entre les dents.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Je me disais alors : ╵« Je mourrai dans mon nid,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: j’aurai des jours nombreux ╵comme les grains de sable
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '29.18 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'D’autres comprennent : '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'comme le phœnix, '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'oiseau légendaire qui vivait 500 ans puis brûlait avec son nid pour renaître aussitôt de ses cendres. L’ancienne version grecque a : '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: comme le palmier.
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: La source de l’eau vive ╵baignera mes racines,
- type: usfm
  marker: q1
  children:
  - type: text
    text: la rosée passera ╵la nuit sur ma ramure.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Ma gloire auprès de moi ╵se renouvellera
- type: usfm
  marker: q1
  children:
  - type: text
    text: et, dans ma main, ╵mon arc rajeunira. »
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Alors on m’écoutait
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '29.21 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Suite des v. 7-10.
    marker-yv: yv-n
  - type: text
    text: ' ╵attendant mon avis'
- type: usfm
  marker: q1
  children:
  - type: text
    text: et l’on faisait silence ╵pour avoir mon conseil.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: Lorsque j’avais parlé, ╵on ne discutait pas.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ma parole, sur eux, ╵se répandait avec douceur.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: Et ils comptaient sur moi ╵comme on attend la pluie.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ils ouvraient grand la bouche, ╵comme pour recueillir ╵les ondées du printemps.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: Quand je leur souriais ╵ils n’osaient pas y croire,
- type: usfm
  marker: q1
  children:
  - type: text
    text: on ne pouvait éteindre ╵l’éclat de mon visage
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '29.24 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Autre traduction : '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: ils ne négligeaient aucun signe favorable sur mon visage.
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: C’est moi qui choisissais ╵la voie qu’ils devaient suivre. ╵Je siégeais à leur tête,
- type: usfm
  marker: q1
  children:
  - type: text
    text: je trônais comme un roi ╵au milieu de ses troupes,
- type: usfm
  marker: q1
  children:
  - type: text
    text: comme un consolateur ╵pour les gens affligés.
