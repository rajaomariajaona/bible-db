document_id: JOB.29,21
type_code: fra
verses:
  '1':
  - type: heading
    content: Dernier discours de Job
  - type: heading
    content: Job évoque sa condition passée
  - type: text
    content: 'Job prononça un autre discours et dit :'
  '10':
  - type: text
    content: Les grands baissaient la voix
  - type: text
    content: et ils tenaient leur langue ╵collée à leur palais.
  '11':
  - type: text
    content: Celui qui m’écoutait ╵me déclarait heureux,
  - type: text
    content: celui qui me voyait ╵parlait de moi en bien.
  '12':
  - type: text
    content: Car je sauvais le pauvre ╵qui appelait à l’aide
  - type: text
    content: ainsi que l’orphelin ╵privé de tout secours.
  '13':
  - type: text
    content: Ceux qui allaient mourir ╵me bénissaient,
  - type: text
    content: et je mettais la joie ╵dans le cœur de la veuve.
  '14':
  - type: text
    content: 'J’endossais la justice : ╵c’était mon vêtement.'
  - type: text
    content: Ma robe et mon turban, ╵c’était ma probité.
  '15':
  - type: text
    content: J’étais l’œil de l’aveugle
  - type: text
    content: et les pieds du boiteux,
  '16':
  - type: text
    content: et j’étais comme un père ╵pour ceux qui étaient pauvres.
  - type: text
    content: J’examinais à fond ╵le cas des inconnus
  - type: note
    content: 'Autre traduction : les cas que je ne savais pas trancher.'
  - type: text
    content: .
  '17':
  - type: text
    content: Je brisais les mâchoires ╵de l’homme inique
  - type: text
    content: et je lui arrachais ╵la proie d’entre les dents.
  '18':
  - type: text
    content: 'Je me disais alors : ╵« Je mourrai dans mon nid,'
  - type: text
    content: j’aurai des jours nombreux ╵comme les grains de sable
  - type: note
    content: 'D’autres comprennent : comme le phœnix, oiseau légendaire qui vivait 500 ans puis brûlait avec son nid pour renaître aussitôt de ses cendres. L’ancienne version grecque a : comme le palmier.'
  - type: text
    content: .
  '19':
  - type: text
    content: La source de l’eau vive ╵baignera mes racines,
  - type: text
    content: la rosée passera ╵la nuit sur ma ramure.
  '2':
  - type: text
    content: Qui me fera revivre ╵les saisons d’autrefois,
  - type: text
    content: comme en ces jours passés ╵où Dieu veillait sur moi,
  '20':
  - type: text
    content: Ma gloire auprès de moi ╵se renouvellera
  - type: text
    content: et, dans ma main, ╵mon arc rajeunira. »
  '21':
  - type: text
    content: Alors on m’écoutait
  - type: note
    content: Suite des v. 7-10.
  - type: text
    content: ' ╵attendant mon avis'
  - type: text
    content: et l’on faisait silence ╵pour avoir mon conseil.
  '22':
  - type: text
    content: Lorsque j’avais parlé, ╵on ne discutait pas.
  - type: text
    content: Ma parole, sur eux, ╵se répandait avec douceur.
  '23':
  - type: text
    content: Et ils comptaient sur moi ╵comme on attend la pluie.
  - type: text
    content: Ils ouvraient grand la bouche, ╵comme pour recueillir ╵les ondées du printemps.
  '24':
  - type: text
    content: Quand je leur souriais ╵ils n’osaient pas y croire,
  - type: text
    content: on ne pouvait éteindre ╵l’éclat de mon visage
  - type: note
    content: 'Autre traduction : ils ne négligeaient aucun signe favorable sur mon visage.'
  - type: text
    content: .
  '25':
  - type: text
    content: C’est moi qui choisissais ╵la voie qu’ils devaient suivre. ╵Je siégeais à leur tête,
  - type: text
    content: je trônais comme un roi ╵au milieu de ses troupes,
  - type: text
    content: comme un consolateur ╵pour les gens affligés.
  '3':
  - type: text
    content: où il faisait briller ╵sa lampe sur ma tête
  - type: text
    content: et qu’avec sa lumière ╵j’affrontais les ténèbres ?
  '4':
  - type: text
    content: Ah ! si j’étais encore ╵aux jours de ma vigueur,
  - type: text
    content: quand ma demeure jouissait ╵de l’intimité avec Dieu,
  '5':
  - type: text
    content: et quand le Tout-Puissant ╵était encore à mes côtés,
  - type: text
    content: et mes enfants ╵autour de moi,
  '6':
  - type: text
    content: quand je baignais mes pieds ╵dans le lait fermenté
  - type: text
    content: et quand le roc versait ╵pour moi des torrents d’huile
  - type: note
    content: 'Images classiques de la prospérité : le roc désigne le pressoir d’olives dont la base d’où s’écoulait l’huile était faite en pierre.'
  - type: text
    content: .
  '7':
  - type: text
    content: Lorsque je me rendais ╵aux portes de la ville,
  - type: text
    content: quand je dressais mon siège ╵sur la place publique
  - type: note
    content: Le conseil des notables siégeait sur la place publique près des portes de la ville. Ce conseil fonctionnait aussi comme tribunal. Les v. 7-10 illustrent les habitudes de politesse orientale.
  - type: text
    content: ','
  '8':
  - type: text
    content: les jeunes me voyaient ╵et ils se retiraient,
  - type: text
    content: les vieillards se levaient ╵et ils restaient debout
  - type: note
    content: Jusqu’à ce que Job se soit assis.
  - type: text
    content: ','
  '9':
  - type: text
    content: les notables arrêtaient ╵leurs propos
  - type: text
    content: et se mettaient ╵une main sur la bouche.
