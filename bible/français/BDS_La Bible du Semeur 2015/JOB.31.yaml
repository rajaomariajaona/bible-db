document_id: JOB.31
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Job évoque sa conduite
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Pourtant, j’avais conclu ╵un pacte avec mes yeux :'
- type: usfm
  marker: q1
  children:
  - type: text
    text: ils ne devaient jamais porter ╵un regard chargé de désir ╵sur une jeune fille.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Car quelle part ╵Dieu pourrait-il ╵me réserver d’en haut ?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Quel serait l’héritage ╵que me destinerait ╵du haut des cieux ╵le Tout-Puissant ?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: En effet, le malheur ╵n’est-il pas réservé ╵à ceux qui sont injustes
- type: usfm
  marker: q1
  children:
  - type: text
    text: et la tribulation ╵à ceux qui font le mal ?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Et ne voit-il donc pas ╵comment je me comporte ?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ne tient-il pas le compte ╵de tous mes faits et gestes ?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Ai-je vécu ╵dans le mensonge ?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Mon pied s’est-il hâté ╵pour commettre la fraude ?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Que Dieu me pèse ╵sur la balance juste,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et il constatera ╵mon innocence.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Si mes pas ont dévié ╵du droit chemin,
- type: usfm
  marker: q1
  children:
  - type: text
    text: si mon cœur a suivi ╵les désirs de mes yeux
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '31.7 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Voir '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Mt 5.28
        metadata:
          usfm: MAT.5.28
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: ','
- type: usfm
  marker: q1
  children:
  - type: text
    text: et si quelque souillure ╵m’a rendu les mains sales,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: alors, ce que je sème, ╵qu’un autre le consomme,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et que l’on déracine ╵ce que j’avais planté.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Si je me suis laissé séduire ╵par une femme,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ou si j’ai fait le guet ╵devant la porte ╵de mon voisin,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: qu’alors ma femme tourne ╵la meule pour un autre
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '31.10 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Travail des esclaves (Ex 11.5 ; Es 47.2).
    marker-yv: yv-n
  - type: text
    text: ','
- type: usfm
  marker: q1
  children:
  - type: text
    text: et qu’elle soit livrée ╵aux désirs d’autres hommes !
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Car c’est une infamie,
- type: usfm
  marker: q1
  children:
  - type: text
    text: un crime qui relève ╵du tribunal des juges,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: c’est un feu qui dévore ╵jusque dans l’abîme infernal
- type: usfm
  marker: q1
  children:
  - type: text
    text: et qui me priverait ╵de tout mon revenu.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Si je n’ai pas fait droit ╵à ma servante ╵ou à mon serviteur
- type: usfm
  marker: q1
  children:
  - type: text
    text: quand, avec moi, ╵ils avaient un litige,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: je ne saurai que faire ╵quand Dieu se lèvera ╵pour me juger,
- type: usfm
  marker: q1
  children:
  - type: text
    text: je ne saurai que lui répondre ╵quand il demandera des comptes.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Celui qui m’a tissé ╵dans le sein de ma mère, ╵ne les a-t-il pas faits, ╵eux, tout autant que moi ?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Oui, c’est le même Dieu ╵qui nous a tous formés ╵dans le sein maternel.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Me suis-je donc soustrait ╵aux requêtes des pauvres,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ou bien ai-je déçu ╵le regard plein d’espoir des veuves ?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Ai-je mangé mon pain ╵tout seul,
- type: usfm
  marker: q1
  children:
  - type: text
    text: sans partager ╵avec un orphelin ?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Non, depuis ma jeunesse, ╵j’ai été pour lui comme un père ╵auprès duquel il a grandi.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Dès le sein de ma mère, ╵j’ai servi de guide à la veuve.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Ai-je vu l’indigent ╵privé de vêtement,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et le nécessiteux ╵manquant de couverture,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: sans leur donner ╵une occasion de me bénir
- type: usfm
  marker: q1
  children:
  - type: text
    text: pour avoir pu se réchauffer ╵sous la toison de mes brebis ?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Si j’ai brandi le poing ╵à l’encontre d’un orphelin,
- type: usfm
  marker: q1
  children:
  - type: text
    text: me sachant soutenu ╵au tribunal,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: alors que mon épaule ╵s’arrache de mon corps
- type: usfm
  marker: q1
  children:
  - type: text
    text: et que mon avant-bras ╵se rompe au coude !
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'En fait, j’ai toujours redouté ╵le châtiment de Dieu :'
- type: usfm
  marker: q1
  children:
  - type: text
    text: je ne peux rien ╵devant sa majesté.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: Ai-je placé ╵ma confiance dans l’or ?
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Ai-je dit à l’or fin : ╵« Tu es mon assurance » ?'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: Ai-je tiré ma joie ╵de ma grande fortune
- type: usfm
  marker: q1
  children:
  - type: text
    text: et de ce que mes mains ╵avaient beaucoup gagné ?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: Quand j’ai contemplé la lumière ╵pendant qu’elle resplendissait,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ou quand j’ai vu la lune ╵s’avancer dans le ciel, ╵brillant avec éclat,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: mon cœur s’est-il laissé séduire ╵secrètement,
- type: usfm
  marker: q1
  children:
  - type: text
    text: leur ai-je envoyé des baisers ╵en portant ma main à la bouche
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '31.27 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Geste exprimant la vénération et l’adoration (1 R 19.18 ; Ps 2.12 ; Os 13.2). L’adoration des corps célestes était une forme très ancienne de l’idolâtrie, interdite par la Loi (Dt 4.19 ; 17.3  ; voir '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ez 8.16-17
        metadata:
          usfm: EZK.8.16+EZK.8.17
      - type: text
        text: ).
    marker-yv: yv-n
  - type: text
    text: '  ?'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: En agissant ainsi, ╵j’aurais encore commis une faute ╵menant au tribunal,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et j’aurais renié ╵le Dieu du ciel.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: Ai-je trouvé plaisir ╵à voir mon ennemi ╵plongé dans l’infortune ?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ai-je sauté de joie ╵lorsque le malheur l’atteignait
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '31.29 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Voir Ex 23.4-5 ; Mt 5.43-47.
    marker-yv: yv-n
  - type: text
    text: '  ?'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: Moi qui n’aurais jamais ╵autorisé ma langue ╵à commettre une faute
- type: usfm
  marker: q1
  children:
  - type: text
    text: en demandant sa mort ╵par des imprécations…
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'Voyez ce que déclarent ╵ceux que j’ai abrités :'
- type: usfm
  marker: q1
  children:
  - type: text
    text: « Qui n’a-t-il pas nourri ╵de viande à satiété ? »
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: Jamais un étranger ╵n’a dû coucher dehors,
- type: usfm
  marker: q1
  children:
  - type: text
    text: j’ouvrais toujours ma porte ╵au voyageur.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: Ai-je caché ╵mes péchés comme Adam
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '31.33 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Autre traduction : '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: comme les hommes.
    marker-yv: yv-n
  - type: text
    text: ','
- type: usfm
  marker: q1
  children:
  - type: text
    text: afin d’enfouir ╵mes fautes en moi-même ?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: Parce que j’avais peur ╵de l’opinion des foules,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ou bien par crainte ╵du mépris des familles,
- type: usfm
  marker: q1
  children:
  - type: text
    text: suis-je resté muet, ╵n’osant franchir ma porte ?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: Ah ! si j’avais quelqu’un ╵qui veuille m’écouter !
- type: usfm
  marker: q1
  children:
  - type: text
    text: Voilà mon dernier mot
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '31.35 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Littéralement : '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'mon tav, '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'dernière lettre de l’alphabet hébreu. Cette lettre, en forme de croix, servait de signature à ceux qui ne savaient pas écrire, d’où l’autre sens suggéré par certains traducteurs : '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'voilà ma signature, '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'c’est-à-dire : je persiste et je signe.'
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: q1
  children:
  - type: text
    text: Que le Dieu tout-puissant ╵me donne sa réponse.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Quant à l’acte d’accusation ╵rédigé par mon adversaire,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: je le mettrais sur mon épaule
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '31.36 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Parfois on portait des déclarations sur l’épaule pour en rappeler l’importance (voir '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ex 28.12
        metadata:
          usfm: EXO.28.12
      - type: text
        text: ).
    marker-yv: yv-n
  - type: text
    text: ','
- type: usfm
  marker: q1
  children:
  - type: text
    text: je m’en ceindrais le front ╵comme d’un diadème.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: Et je lui rendrais compte ╵de chacun de mes actes,
- type: usfm
  marker: q1
  children:
  - type: text
    text: j’avancerais vers lui ╵aussi digne qu’un prince.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: text
    text: Si mes terres m’ont accusé,
- type: usfm
  marker: q1
  children:
  - type: text
    text: si j’ai fait pleurer leurs sillons,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '39'
  - type: text
    text: si j’ai joui de leurs produits ╵sans les avoir payés,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et si j’ai opprimé ╵ceux qui s’en occupaient,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '40'
  - type: text
    text: alors qu’au lieu de blé, ╵il y pousse des ronces,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et des orties ╵à la place de l’orge.
- type: usfm
  marker: p
  children:
  - type: text
    text: C’est ici que finissent les paroles de Job.
