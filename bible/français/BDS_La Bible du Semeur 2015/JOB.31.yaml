document_id: JOB.31,21
type_code: fra
verses:
  '1':
  - type: heading
    content: Job évoque sa conduite
  - type: text
    content: 'Pourtant, j’avais conclu ╵un pacte avec mes yeux :'
  - type: text
    content: ils ne devaient jamais porter ╵un regard chargé de désir ╵sur une jeune fille.
  '10':
  - type: text
    content: qu’alors ma femme tourne ╵la meule pour un autre
  - type: note
    content: Travail des esclaves (Ex 11.5 ; Es 47.2).
  - type: text
    content: ','
  - type: text
    content: et qu’elle soit livrée ╵aux désirs d’autres hommes !
  '11':
  - type: text
    content: Car c’est une infamie,
  - type: text
    content: un crime qui relève ╵du tribunal des juges,
  '12':
  - type: text
    content: c’est un feu qui dévore ╵jusque dans l’abîme infernal
  - type: text
    content: et qui me priverait ╵de tout mon revenu.
  '13':
  - type: text
    content: Si je n’ai pas fait droit ╵à ma servante ╵ou à mon serviteur
  - type: text
    content: quand, avec moi, ╵ils avaient un litige,
  '14':
  - type: text
    content: je ne saurai que faire ╵quand Dieu se lèvera ╵pour me juger,
  - type: text
    content: je ne saurai que lui répondre ╵quand il demandera des comptes.
  '15':
  - type: text
    content: Celui qui m’a tissé ╵dans le sein de ma mère, ╵ne les a-t-il pas faits, ╵eux, tout autant que moi ?
  - type: text
    content: Oui, c’est le même Dieu ╵qui nous a tous formés ╵dans le sein maternel.
  '16':
  - type: text
    content: Me suis-je donc soustrait ╵aux requêtes des pauvres,
  - type: text
    content: ou bien ai-je déçu ╵le regard plein d’espoir des veuves ?
  '17':
  - type: text
    content: Ai-je mangé mon pain ╵tout seul,
  - type: text
    content: sans partager ╵avec un orphelin ?
  '18':
  - type: text
    content: Non, depuis ma jeunesse, ╵j’ai été pour lui comme un père ╵auprès duquel il a grandi.
  - type: text
    content: Dès le sein de ma mère, ╵j’ai servi de guide à la veuve.
  '19':
  - type: text
    content: Ai-je vu l’indigent ╵privé de vêtement,
  - type: text
    content: et le nécessiteux ╵manquant de couverture,
  '2':
  - type: text
    content: Car quelle part ╵Dieu pourrait-il ╵me réserver d’en haut ?
  - type: text
    content: Quel serait l’héritage ╵que me destinerait ╵du haut des cieux ╵le Tout-Puissant ?
  '20':
  - type: text
    content: sans leur donner ╵une occasion de me bénir
  - type: text
    content: pour avoir pu se réchauffer ╵sous la toison de mes brebis ?
  '21':
  - type: text
    content: Si j’ai brandi le poing ╵à l’encontre d’un orphelin,
  - type: text
    content: me sachant soutenu ╵au tribunal,
  '22':
  - type: text
    content: alors que mon épaule ╵s’arrache de mon corps
  - type: text
    content: et que mon avant-bras ╵se rompe au coude !
  '23':
  - type: text
    content: 'En fait, j’ai toujours redouté ╵le châtiment de Dieu :'
  - type: text
    content: je ne peux rien ╵devant sa majesté.
  '24':
  - type: text
    content: Ai-je placé ╵ma confiance dans l’or ?
  - type: text
    content: 'Ai-je dit à l’or fin : ╵« Tu es mon assurance » ?'
  '25':
  - type: text
    content: Ai-je tiré ma joie ╵de ma grande fortune
  - type: text
    content: et de ce que mes mains ╵avaient beaucoup gagné ?
  '26':
  - type: text
    content: Quand j’ai contemplé la lumière ╵pendant qu’elle resplendissait,
  - type: text
    content: ou quand j’ai vu la lune ╵s’avancer dans le ciel, ╵brillant avec éclat,
  '27':
  - type: text
    content: mon cœur s’est-il laissé séduire ╵secrètement,
  - type: text
    content: leur ai-je envoyé des baisers ╵en portant ma main à la bouche
  - type: note
    content: Geste exprimant la vénération et l’adoration (1 R 19.18 ; Ps 2.12 ; Os 13.2). L’adoration des corps célestes était une forme très ancienne de l’idolâtrie, interdite par la Loi (Dt 4.19 ; 17.3  ; voir Ez 8.16-17).
  - type: text
    content: '  ?'
  '28':
  - type: text
    content: En agissant ainsi, ╵j’aurais encore commis une faute ╵menant au tribunal,
  - type: text
    content: et j’aurais renié ╵le Dieu du ciel.
  '29':
  - type: text
    content: Ai-je trouvé plaisir ╵à voir mon ennemi ╵plongé dans l’infortune ?
  - type: text
    content: Ai-je sauté de joie ╵lorsque le malheur l’atteignait
  - type: note
    content: Voir Ex 23.4-5 ; Mt 5.43-47.
  - type: text
    content: '  ?'
  '3':
  - type: text
    content: En effet, le malheur ╵n’est-il pas réservé ╵à ceux qui sont injustes
  - type: text
    content: et la tribulation ╵à ceux qui font le mal ?
  '30':
  - type: text
    content: Moi qui n’aurais jamais ╵autorisé ma langue ╵à commettre une faute
  - type: text
    content: en demandant sa mort ╵par des imprécations…
  '31':
  - type: text
    content: 'Voyez ce que déclarent ╵ceux que j’ai abrités :'
  - type: text
    content: « Qui n’a-t-il pas nourri ╵de viande à satiété ? »
  '32':
  - type: text
    content: Jamais un étranger ╵n’a dû coucher dehors,
  - type: text
    content: j’ouvrais toujours ma porte ╵au voyageur.
  '33':
  - type: text
    content: Ai-je caché ╵mes péchés comme Adam
  - type: note
    content: 'Autre traduction : comme les hommes.'
  - type: text
    content: ','
  - type: text
    content: afin d’enfouir ╵mes fautes en moi-même ?
  '34':
  - type: text
    content: Parce que j’avais peur ╵de l’opinion des foules,
  - type: text
    content: ou bien par crainte ╵du mépris des familles,
  - type: text
    content: suis-je resté muet, ╵n’osant franchir ma porte ?
  '35':
  - type: text
    content: Ah ! si j’avais quelqu’un ╵qui veuille m’écouter !
  - type: text
    content: Voilà mon dernier mot
  - type: note
    content: 'Littéralement : mon tav, dernière lettre de l’alphabet hébreu. Cette lettre, en forme de croix, servait de signature à ceux qui ne savaient pas écrire, d’où l’autre sens suggéré par certains traducteurs : voilà ma signature, c’est-à-dire : je persiste et je signe.'
  - type: text
    content: .
  - type: text
    content: Que le Dieu tout-puissant ╵me donne sa réponse.
  - type: text
    content: Quant à l’acte d’accusation ╵rédigé par mon adversaire,
  '36':
  - type: text
    content: je le mettrais sur mon épaule
  - type: note
    content: Parfois on portait des déclarations sur l’épaule pour en rappeler l’importance (voir Ex 28.12).
  - type: text
    content: ','
  - type: text
    content: je m’en ceindrais le front ╵comme d’un diadème.
  '37':
  - type: text
    content: Et je lui rendrais compte ╵de chacun de mes actes,
  - type: text
    content: j’avancerais vers lui ╵aussi digne qu’un prince.
  '38':
  - type: text
    content: Si mes terres m’ont accusé,
  - type: text
    content: si j’ai fait pleurer leurs sillons,
  '39':
  - type: text
    content: si j’ai joui de leurs produits ╵sans les avoir payés,
  - type: text
    content: et si j’ai opprimé ╵ceux qui s’en occupaient,
  '4':
  - type: text
    content: Et ne voit-il donc pas ╵comment je me comporte ?
  - type: text
    content: Ne tient-il pas le compte ╵de tous mes faits et gestes ?
  '40':
  - type: text
    content: alors qu’au lieu de blé, ╵il y pousse des ronces,
  - type: text
    content: et des orties ╵à la place de l’orge.
  - type: text
    content: C’est ici que finissent les paroles de Job.
  '5':
  - type: text
    content: Ai-je vécu ╵dans le mensonge ?
  - type: text
    content: Mon pied s’est-il hâté ╵pour commettre la fraude ?
  '6':
  - type: text
    content: Que Dieu me pèse ╵sur la balance juste,
  - type: text
    content: et il constatera ╵mon innocence.
  '7':
  - type: text
    content: Si mes pas ont dévié ╵du droit chemin,
  - type: text
    content: si mon cœur a suivi ╵les désirs de mes yeux
  - type: note
    content: Voir Mt 5.28.
  - type: text
    content: ','
  - type: text
    content: et si quelque souillure ╵m’a rendu les mains sales,
  '8':
  - type: text
    content: alors, ce que je sème, ╵qu’un autre le consomme,
  - type: text
    content: et que l’on déracine ╵ce que j’avais planté.
  '9':
  - type: text
    content: Si je me suis laissé séduire ╵par une femme,
  - type: text
    content: ou si j’ai fait le guet ╵devant la porte ╵de mon voisin,
