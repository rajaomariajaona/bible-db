document_id: LEV.3,21
type_code: fra
verses:
  '1':
  - type: heading
    content: Les sacrifices de communion
  - type: text
    content: Si on offre en sacrifice de communion
  - type: note
    content: Appelé aussi « sacrifice de paix, de reconnaissance, d’action de grâces ». Par ce sacrifice, l’Israélite exprimait sa reconnaissance envers Dieu pour ses bienfaits (voir 7.11-15 ; Ps 50.14, 23 ; 56.13 ; Hé 13.15).
  - type: text
    content: ' une tête de gros bétail, mâle ou femelle, on présentera un animal sans défaut à l’Eternel. '
  '10':
  - type: text
    content: 'les deux rognons et la graisse qui les enveloppe et qui couvre le dos, ainsi que le dessus du foie qu’on ôtera avec les rognons. '
  '11':
  - type: text
    content: 'Le prêtre les fera brûler sur l’autel : c’est un aliment consumé par le feu, à l’odeur apaisante pour l’Eternel.'
  '12':
  - type: text
    content: 'Si c’est une chèvre qu’on offre, on la présentera devant l’Eternel. '
  '13':
  - type: text
    content: 'On posera la main sur la tête de l’animal avant de l’égorger devant la tente de la Rencontre et les descendants d’Aaron en aspergeront de son sang tous les côtés de l’autel. '
  '14':
  - type: text
    content: 'On en offrira à l’Eternel en les consumant par le feu, la graisse qui recouvre les entrailles et toute celle qui y est attachée, '
  '15':
  - type: text
    content: 'les deux rognons et la graisse qui les enveloppe et qui couvre le dos, ainsi que le dessus du foie qu’on ôtera avec les rognons. '
  '16':
  - type: text
    content: Le prêtre fera brûler ces morceaux sur l’autel ; c’est un aliment consumé par le feu, à l’odeur apaisante pour l’Eternel.
  - type: text
    content: 'Toute graisse revient à l’Eternel. '
  '17':
  - type: text
    content: 'C’est une ordonnance immuable que vous respecterez de génération en génération partout où vous habiterez : vous ne consommerez aucune graisse, ni aucun sang.'
  '2':
  - type: text
    content: 'On posera la main sur la tête de la victime avant de l’égorger à l’entrée de la tente de la Rencontre. Les prêtres, descendants d’Aaron, aspergeront de son sang tous les côtés de l’autel. '
  '3':
  - type: text
    content: 'De ce sacrifice de communion, on offrira à l’Eternel, en les consumant par le feu, la graisse qui recouvre les entrailles et toute celle qui y est attachée, '
  '4':
  - type: text
    content: 'les deux rognons et la graisse qui les enveloppe, qui couvre le dos, ainsi que le dessus du foie, qu’on ôtera avec les rognons. '
  '5':
  - type: text
    content: Les descendants d’Aaron les feront brûler sur l’autel, par-dessus l’holocauste déjà placé sur les bûches qui sont sur le feu. Ce sera un sacrifice consumé par le feu, à l’odeur apaisante pour l’Eternel.
  '6':
  - type: text
    content: 'Si c’est du petit bétail qu’on offre en sacrifice de communion à l’Eternel, on offrira un mâle ou une femelle sans défaut. '
  '7':
  - type: text
    content: 'Si l’on offre un mouton en sacrifice, on le présentera devant l’Eternel. '
  '8':
  - type: text
    content: 'Celui qui l’offre posera sa main sur la tête de la victime avant de l’égorger devant la tente de la Rencontre, et les descendants d’Aaron aspergeront de son sang tous les côtés de l’autel. '
  '9':
  - type: text
    content: 'On prélèvera de ce sacrifice de communion, pour l’offrir à l’Eternel en le consumant par le feu, les parties grasses : la queue entière coupée près de l’échine, la graisse qui recouvre les entrailles et toute celle qui y est attachée, '
