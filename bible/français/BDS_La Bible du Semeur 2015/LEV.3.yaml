document_id: LEV.3
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Les sacrifices de communion
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Si on offre en sacrifice de communion
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '3.1 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Appelé aussi « sacrifice de paix, de reconnaissance, d’action de grâces ». Par ce sacrifice, l’Israélite exprimait sa reconnaissance envers Dieu pour ses bienfaits (voir 7.11-15 ; Ps 50.14, 23 ; 56.13 ; Hé 13.15).
    marker-yv: yv-n
  - type: text
    text: ' une tête de gros bétail, mâle ou femelle, on présentera un animal sans défaut à l’Eternel. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'On posera la main sur la tête de la victime avant de l’égorger à l’entrée de la tente de la Rencontre. Les prêtres, descendants d’Aaron, aspergeront de son sang tous les côtés de l’autel. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'De ce sacrifice de communion, on offrira à l’Eternel, en les consumant par le feu, la graisse qui recouvre les entrailles et toute celle qui y est attachée, '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'les deux rognons et la graisse qui les enveloppe, qui couvre le dos, ainsi que le dessus du foie, qu’on ôtera avec les rognons. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Les descendants d’Aaron les feront brûler sur l’autel, par-dessus l’holocauste déjà placé sur les bûches qui sont sur le feu. Ce sera un sacrifice consumé par le feu, à l’odeur apaisante pour l’Eternel.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Si c’est du petit bétail qu’on offre en sacrifice de communion à l’Eternel, on offrira un mâle ou une femelle sans défaut. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Si l’on offre un mouton en sacrifice, on le présentera devant l’Eternel. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Celui qui l’offre posera sa main sur la tête de la victime avant de l’égorger devant la tente de la Rencontre, et les descendants d’Aaron aspergeront de son sang tous les côtés de l’autel. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'On prélèvera de ce sacrifice de communion, pour l’offrir à l’Eternel en le consumant par le feu, les parties grasses : la queue entière coupée près de l’échine, la graisse qui recouvre les entrailles et toute celle qui y est attachée, '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'les deux rognons et la graisse qui les enveloppe et qui couvre le dos, ainsi que le dessus du foie qu’on ôtera avec les rognons. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Le prêtre les fera brûler sur l’autel : c’est un aliment consumé par le feu, à l’odeur apaisante pour l’Eternel.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Si c’est une chèvre qu’on offre, on la présentera devant l’Eternel. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'On posera la main sur la tête de l’animal avant de l’égorger devant la tente de la Rencontre et les descendants d’Aaron en aspergeront de son sang tous les côtés de l’autel. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'On en offrira à l’Eternel en les consumant par le feu, la graisse qui recouvre les entrailles et toute celle qui y est attachée, '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'les deux rognons et la graisse qui les enveloppe et qui couvre le dos, ainsi que le dessus du foie qu’on ôtera avec les rognons. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Le prêtre fera brûler ces morceaux sur l’autel ; c’est un aliment consumé par le feu, à l’odeur apaisante pour l’Eternel.
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Toute graisse revient à l’Eternel. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'C’est une ordonnance immuable que vous respecterez de génération en génération partout où vous habiterez : vous ne consommerez aucune graisse, ni aucun sang.'
