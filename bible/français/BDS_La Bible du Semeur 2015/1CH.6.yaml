    - type: usfm
      marker: fr
      children:
      - type: text
        text: '6.51 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Peut-être une erreur de copiste pour : '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'par tirage au sort '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '(voir '
      - type: usfm
