    marker: v
    metadata:
      v: '53'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '53'
  - type: text
    text: 'Yoqmeam, Beth-Horôn, '
  - type: usfm
    marker: v
    metadata:
      v: '54'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '54'
  - type: text
    text: 'Ayalôn, Gath-Rimmôn. '
  - type: usfm
    marker: v
    metadata:
      v: '55'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '55'
  - type: text
    text: 'Dans le territoire de la demi-tribu de Manassé, ils reçurent, avec leurs terres attenantes : Aner et Bileam. Voilà ce que reçurent les autres familles des descendants de Qehath.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '56'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '56'
  - type: text
    text: 'Les descendants de Guershôn reçurent : dans le territoire des familles de la demi-tribu de Manassé les villes suivantes, avec leurs terres attenantes : Golân, dans le Basan, et Ashtaroth. '
  - type: usfm
    marker: v
    metadata:
      v: '57'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '57'
  - type: text
    text: 'Dans le territoire de la tribu d’Issacar, ils reçurent, avec leurs terres attenantes : Qédesh, Dobrath, '
  - type: usfm
