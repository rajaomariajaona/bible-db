    marker-yv: yv-n
  - type: text
    text: ' des villes situées dans le territoire de la tribu d’Ephraïm '
  - type: usfm
    marker: v
    metadata:
      v: '52'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '52'
