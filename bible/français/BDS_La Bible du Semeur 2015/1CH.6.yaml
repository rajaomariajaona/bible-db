document_id: 1CH.6,21
type_code: fra
verses:
  '1':
  - type: text
    content: Fils de Lévi
  - type: note
    content: Pour les v. 1-4, voir Ex 6.16-19 ; Nb 3.17-20.
  - type: text
    content: '  : Guershôn, Qehath et Merari. '
  '10':
  - type: text
    content: 'Fils d’Elqana : Amasaï et Ahimoth. '
  '11':
  - type: text
    content: Voici les descendants d’Elqana de père en fils
  - type: note
    content: 'Voici les descendants d’Elqana de père en fils: certains manuscrits hébreux, l’ancienne version grecque et la version syriaque ont : …descendants d’Ahimoth, de père en fils : Elqana…'
  - type: text
    content: '  : Tsophaï, Nahath, '
  '12':
  - type: text
    content: Eliab, Yeroham, Elqana et Samuel
  - type: note
    content: 'et Samuel: d’après certains manuscrits de l’ancienne version grecque (1 S 1.19, 20 ; 1 Ch 6.18-19). Ces mots manquent dans le texte hébreu traditionnel.'
  - type: text
    content: '. '
  '13':
  - type: text
    content: 'Fils de Samuel : Joël'
  - type: note
    content: 'Joël: d’après certains manuscrits de l’ancienne version grecque et la version syriaque (voir 1 S 8.2 et 1 Ch 6.18). Ce nom manque dans le texte hébreu traditionnel.'
  - type: text
    content: ' l’aîné, et Abiya le cadet. '
  '14':
  - type: text
    content: 'Les descendants de Merari en ligne directe de père en fils furent : Mahli, Libni, Shimeï, Ouzza, '
  '15':
  - type: text
    content: Shimea, Hagguiya et Asaya.
  '16':
  - type: text
    content: 'Voici les noms des lévites à qui David confia la responsabilité du chant dans le sanctuaire de l’Eternel, dès que le coffre y fut déposé. '
  '17':
  - type: text
    content: Ils exerçaient déjà leur service par le chant devant le tabernacle, la tente de la Rencontre, jusqu’à ce que Salomon ait bâti le temple de l’Eternel à Jérusalem, et ils exerçaient leur fonction d’après la règle qui leur avait été prescrite.
  '18':
  - type: text
    content: 'Voici ceux qui accomplissaient ce service avec leurs fils. Parmi les Qehatites, Hémân officiait comme musicien. Ses ascendants en ligne directe étaient : Joël, Samuel'
  - type: note
    content: Le prophète et chef-juge en Israël.
  - type: text
    content: ', '
  '19':
  - type: text
    content: 'Elqana, Yeroham, Eliel, Toah, '
  '2':
  - type: text
    content: 'Voici les noms des fils de Guershôn : Libni et Shimeï. '
  '20':
  - type: text
    content: 'Tsouph, Elqana, Mahath, Amasaï, '
  '21':
  - type: text
    content: 'Elqana, Joël, Azaria, Sophonie, '
  '22':
  - type: text
    content: 'Tahath, Assir, Ebyasaph, Qoré, '
  '23':
  - type: text
    content: 'Yitsehar, Qehath, Lévi, fils d’Israël. '
  '24':
  - type: text
    content: 'A la droite de Hémân se tenait Asaph, membre de la même tribu, dont les ascendants de fils en père étaient Bérékia, Shimea, '
  '25':
  - type: text
    content: 'Michaël, Baaséya, Malkiya, '
  '26':
  - type: text
    content: 'Etni, Zérah, Adaya, '
  '27':
  - type: text
    content: 'Etân, Zimma, Shimeï, '
  '28':
  - type: text
    content: Yahath, Guershôn, fils de Lévi.
  '29':
  - type: text
    content: 'Sur la gauche se tenait Etân, des descendants de Merari, membres de la même tribu qu’eux. Les ascendants d’Etân en ligne directe étaient : Qishi, Abdi, Mallouk, '
  '3':
  - type: text
    content: 'Descendants de Qehath : Amram, Yitsehar, Hébron et Ouzziel. '
  '30':
  - type: text
    content: 'Hashabia, Amatsia, Hilqiya, '
  '31':
  - type: text
    content: 'Amtsi, Bani, Shémer, '
  '32':
  - type: text
    content: Mahli, Moushi, Merari, Lévi.
  '33':
  - type: text
    content: 'Les autres lévites étaient affectés à toutes les autres tâches afférentes au sanctuaire de Dieu. '
  '34':
  - type: text
    content: Aaron et ses descendants offraient les sacrifices sur l’autel des holocaustes et les parfums sur l’autel des parfums ; ils accomplissaient toutes les tâches relatives au lieu très saint et faisaient le rite d’expiation pour Israël, conformément à tout ce qu’avait ordonné Moïse, serviteur de Dieu.
  '35':
  - type: text
    content: 'Voici la liste des descendants d’Aaron de père en fils : Eléazar, Phinéas, Abishoua, '
  '36':
  - type: text
    content: 'Bouqqi, Ouzzi, Zerahya, '
  '37':
  - type: text
    content: 'Merayoth, Amaria, Ahitoub, '
  '38':
  - type: text
    content: Tsadoq et Ahimaats.
  '39':
  - type: text
    content: Voici la liste des territoires avec leurs enclos attribués aux descendants d’Aaron, de la famille des Qehatites, auxquels fut attribué par le sort un lot
  - type: note
    content: Pour les v. 39-45, voir Jos 21.10-19.
  - type: text
    content: '  : '
  '4':
  - type: text
    content: 'Fils de Merari : Mahli et Moushi.'
  '40':
  - type: text
    content: 'Hébron, dans le pays de Juda, avec les terres attenantes ; '
  '41':
  - type: text
    content: mais les champs et les villages qui dépendaient de la ville furent donnés à Caleb, fils de Yephounné
  - type: note
    content: Voir Jos 14.13-14.
  - type: text
    content: '. '
  '42':
  - type: text
    content: On donna aux descendants d’Aaron Hébron, la ville de refuge
  - type: note
    content: Où pouvait se réfugier l’auteur d’un homicide involontaire pour échapper à l’homme chargé de punir le crime (Nb 35.9-34).
  - type: text
    content: ', et les villes suivantes avec leurs terres attenantes : Libna, Yattir, Eshtemoa, '
  '43':
  - type: text
    content: 'Hilên, Debir, '
  '44':
  - type: text
    content: Ashân
  - type: note
    content: 'Certains manuscrits de l’ancienne version grecque, la version syriaque et Jos 21.16 ajoutent ici : Youtta.'
  - type: text
    content: ', Beth-Shémesh. '
  '45':
  - type: text
    content: 'Dans le territoire de la tribu de Benjamin, ils reçurent, avec leurs terres attenantes : Guéba, Allémeth, Anatoth. Ils reçurent donc au total treize villes'
  - type: note
    content: Onze villes seulement sont citées. Youtta et Gabaon, mentionnées en Jos 21.16-17, n’existaient peut-être plus à l’époque de la rédaction des Chroniques.
  - type: text
    content: ' réparties entre leurs familles.'
  '46':
  - type: text
    content: Les autres Qehatites obtinrent par tirage au sort dix villes situées dans les territoires des familles de la tribu [d’Ephraïm, de la tribu de Dan et
  - type: note
    content: Les mots entre crochets manquent dans le texte hébreu traditionnel. Ils sont rajoutés ici d’après Jos 21.5.
  - type: text
    content: '] de la demi-tribu de Manassé'
  - type: note
    content: Pour les v. 46-48, voir Jos 21.5-8.
  - type: text
    content: '. '
  '47':
  - type: text
    content: 'Les Guershonites obtinrent pour leurs familles treize villes situées dans les territoires des tribus d’Issacar, d’Aser, de Nephtali et de la tribu de Manassé établie dans le Basan. '
  '48':
  - type: text
    content: 'Les Merarites reçurent pour leurs familles, par tirage au sort, douze villes situées dans les territoires des tribus de Ruben, de Gad et de Zabulon. '
  '49':
  - type: text
    content: 'Les Israélites attribuèrent ces villes et les terres attenantes aux lévites. '
  '5':
  - type: text
    content: 'Voici les familles de Lévi, données à partir de leur ancêtre. Pour Guershôn, de père en fils : Libni, Yahath, Zimma, '
  '50':
  - type: text
    content: 'Ils attribuèrent par tirage au sort ces villes désignées par leur nom et situées dans le territoire des tribus de Juda, de Siméon et de Benjamin. '
  '51':
  - type: text
    content: Les autres familles des Qehatites obtinrent pour domaine
  - type: note
    content: 'Peut-être une erreur de copiste pour : par tirage au sort (voir Jos 21.5). En hébreu, les deux expressions se ressemblent.'
  - type: text
    content: ' des villes situées dans le territoire de la tribu d’Ephraïm '
  '52':
  - type: text
    content: avec leurs terres attenantes
  - type: note
    content: Pour les v. 51-66, voir Jos 21.20-39.
  - type: text
    content: '  : Sichem, la ville de refuge, dans la région montagneuse d’Ephraïm, Guézer, '
  '53':
  - type: text
    content: 'Yoqmeam, Beth-Horôn, '
  '54':
  - type: text
    content: 'Ayalôn, Gath-Rimmôn. '
  '55':
  - type: text
    content: 'Dans le territoire de la demi-tribu de Manassé, ils reçurent, avec leurs terres attenantes : Aner et Bileam. Voilà ce que reçurent les autres familles des descendants de Qehath.'
  '56':
  - type: text
    content: 'Les descendants de Guershôn reçurent : dans le territoire des familles de la demi-tribu de Manassé les villes suivantes, avec leurs terres attenantes : Golân, dans le Basan, et Ashtaroth. '
  '57':
  - type: text
    content: 'Dans le territoire de la tribu d’Issacar, ils reçurent, avec leurs terres attenantes : Qédesh, Dobrath, '
  '58':
  - type: text
    content: 'Ramoth et Anem. '
  '59':
  - type: text
    content: 'Dans le territoire de la tribu d’Aser, avec leurs terres attenantes : Mashal, Abdôn, '
  '6':
  - type: text
    content: Yoah, Iddo, Zérah, Yeatraï.
  '60':
  - type: text
    content: 'Houqoq et Rehob. '
  '61':
  - type: text
    content: 'Et dans le territoire de la tribu de Nephtali : Qédesh en Galilée et les terres attenantes, Hammôn et les terres attenantes et Qiryataïm et les terres attenantes.'
  '62':
  - type: text
    content: Le reste des Merarites reçurent, dans le territoire de la tribu de Zabulon
  - type: note
    content: 'L’ancienne version grecque et Jos 21.34 ajoutent : Yoqneam, Qarta.'
  - type: text
    content: ', les villes suivantes avec leurs terres attenantes : Rimmono, Thabor. '
  '63':
  - type: text
    content: 'En Transjordanie, en face de Jéricho, à l’est du Jourdain, dans le territoire de la tribu de Ruben, ils reçurent, avec leurs terres attenantes : Bétser au désert, Yahats, '
  '64':
  - type: text
    content: 'Qedémoth, Méphaath. '
  '65':
  - type: text
    content: 'Et dans le territoire de la tribu de Gad, avec leurs terres attenantes : Ramoth en Galaad, Mahanaïm, '
  '66':
  - type: text
    content: Heshbôn et Yaezer.
  '7':
  - type: text
    content: 'Descendants de Qehath de père en fils : Amminadab, Qoré, Assir, '
  '8':
  - type: text
    content: 'Elqana, Ebyasaph, Assir, '
  '9':
  - type: text
    content: 'Tahath, Ouriel, Ozias, Saül. '
