      v: '61'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '61'
  - type: text
    text: 'Et dans le territoire de la tribu de Nephtali : Qédesh en Galilée et les terres attenantes, Hammôn et les terres attenantes et Qiryataïm et les terres attenantes.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '62'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '62'
