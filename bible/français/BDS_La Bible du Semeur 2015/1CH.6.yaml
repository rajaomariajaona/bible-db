      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Fils de Lévi
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '6.1 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Pour les v. 1-4, voir Ex 6.16-19 ; Nb 3.17-20.
    marker-yv: yv-n
  - type: text
    text: '  : Guershôn, Qehath et Merari. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Voici les noms des fils de Guershôn : Libni et Shimeï. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Descendants de Qehath : Amram, Yitsehar, Hébron et Ouzziel. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Fils de Merari : Mahli et Moushi.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Voici les familles de Lévi, données à partir de leur ancêtre. Pour Guershôn, de père en fils : Libni, Yahath, Zimma, '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Yoah, Iddo, Zérah, Yeatraï.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Descendants de Qehath de père en fils : Amminadab, Qoré, Assir, '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Elqana, Ebyasaph, Assir, '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Tahath, Ouriel, Ozias, Saül. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Fils d’Elqana : Amasaï et Ahimoth. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Voici les descendants d’Elqana de père en fils
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '6.11 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: Voici les descendants d’Elqana de père en fils
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: ': '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'certains manuscrits hébreux, l’ancienne version grecque et la version syriaque ont : '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: '…descendants d’Ahimoth, de père en fils : Elqana…'
    marker-yv: yv-n
  - type: text
    text: '  : Tsophaï, Nahath, '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Eliab, Yeroham, Elqana et Samuel
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '6.12 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: et Samuel
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: ': '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: d’après certains manuscrits de l’ancienne version grecque (1 S 1.19, 20 ; 1 Ch 6.18-19). Ces mots manquent dans le texte hébreu traditionnel.
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Fils de Samuel : Joël'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '6.13 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: Joël
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: ': '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'd’après certains manuscrits de l’ancienne version grecque et la version syriaque (voir '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1 S 8.2
        metadata:
          usfm: 1SA.8.2
      - type: text
        text: ' et '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1 Ch 6.18
        metadata:
          usfm: 1CH.6.18
      - type: text
        text: ). Ce nom manque dans le texte hébreu traditionnel.
    marker-yv: yv-n
  - type: text
    text: ' l’aîné, et Abiya le cadet. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Les descendants de Merari en ligne directe de père en fils furent : Mahli, Libni, Shimeï, Ouzza, '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Shimea, Hagguiya et Asaya.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Voici les noms des lévites à qui David confia la responsabilité du chant dans le sanctuaire de l’Eternel, dès que le coffre y fut déposé. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Ils exerçaient déjà leur service par le chant devant le tabernacle, la tente de la Rencontre, jusqu’à ce que Salomon ait bâti le temple de l’Eternel à Jérusalem, et ils exerçaient leur fonction d’après la règle qui leur avait été prescrite.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Voici ceux qui accomplissaient ce service avec leurs fils. Parmi les Qehatites, Hémân officiait comme musicien. Ses ascendants en ligne directe étaient : Joël, Samuel'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '6.18 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Le prophète et chef-juge en Israël.
    marker-yv: yv-n
  - type: text
    text: ', '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Elqana, Yeroham, Eliel, Toah, '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Tsouph, Elqana, Mahath, Amasaï, '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Elqana, Joël, Azaria, Sophonie, '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Tahath, Assir, Ebyasaph, Qoré, '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Yitsehar, Qehath, Lévi, fils d’Israël. '
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'A la droite de Hémân se tenait Asaph, membre de la même tribu, dont les ascendants de fils en père étaient Bérékia, Shimea, '
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Michaël, Baaséya, Malkiya, '
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Etni, Zérah, Adaya, '
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'Etân, Zimma, Shimeï, '
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: Yahath, Guershôn, fils de Lévi.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'Sur la gauche se tenait Etân, des descendants de Merari, membres de la même tribu qu’eux. Les ascendants d’Etân en ligne directe étaient : Qishi, Abdi, Mallouk, '
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'Hashabia, Amatsia, Hilqiya, '
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'Amtsi, Bani, Shémer, '
  - type: usfm
    marker: v
    metadata:
      v: '32'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: Mahli, Moushi, Merari, Lévi.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '33'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: 'Les autres lévites étaient affectés à toutes les autres tâches afférentes au sanctuaire de Dieu. '
  - type: usfm
    marker: v
    metadata:
      v: '34'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: Aaron et ses descendants offraient les sacrifices sur l’autel des holocaustes et les parfums sur l’autel des parfums ; ils accomplissaient toutes les tâches relatives au lieu très saint et faisaient le rite d’expiation pour Israël, conformément à tout ce qu’avait ordonné Moïse, serviteur de Dieu.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '35'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: 'Voici la liste des descendants d’Aaron de père en fils : Eléazar, Phinéas, Abishoua, '
  - type: usfm
    marker: v
    metadata:
      v: '36'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: 'Bouqqi, Ouzzi, Zerahya, '
  - type: usfm
    marker: v
    metadata:
      v: '37'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: 'Merayoth, Amaria, Ahitoub, '
  - type: usfm
    marker: v
    metadata:
      v: '38'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: text
    text: Tsadoq et Ahimaats.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '39'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '39'
  - type: text
    text: Voici la liste des territoires avec leurs enclos attribués aux descendants d’Aaron, de la famille des Qehatites, auxquels fut attribué par le sort un lot
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '6.39 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Pour les v. 39-45, voir '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Jos 21.10-19
        metadata:
          usfm: JOS.21.10+JOS.21.11+JOS.21.12+JOS.21.13+JOS.21.14+JOS.21.15+JOS.21.16+JOS.21.17+JOS.21.18+JOS.21.19
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: '  : '
  - type: usfm
    marker: v
    metadata:
      v: '40'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '40'
  - type: text
    text: 'Hébron, dans le pays de Juda, avec les terres attenantes ; '
  - type: usfm
    marker: v
    metadata:
      v: '41'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '41'
  - type: text
    text: mais les champs et les villages qui dépendaient de la ville furent donnés à Caleb, fils de Yephounné
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '6.41 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Voir '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Jos 14.13-14
        metadata:
          usfm: JOS.14.13+JOS.14.14
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '42'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '42'
  - type: text
    text: On donna aux descendants d’Aaron Hébron, la ville de refuge
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '6.42 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Où pouvait se réfugier l’auteur d’un homicide involontaire pour échapper à l’homme chargé de punir le crime (
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Nb 35.9-34
        metadata:
          usfm: NUM.35.9+NUM.35.10+NUM.35.11+NUM.35.12+NUM.35.13+NUM.35.14+NUM.35.15+NUM.35.16+NUM.35.17+NUM.35.18+NUM.35.19+NUM.35.20+NUM.35.21+NUM.35.22+NUM.35.23+NUM.35.24+NUM.35.25+NUM.35.26+NUM.35.27+NUM.35.28+NUM.35.29+NUM.35.30+NUM.35.31+NUM.35.32+NUM.35.33+NUM.35.34
      - type: text
        text: ).
    marker-yv: yv-n
  - type: text
    text: ', et les villes suivantes avec leurs terres attenantes : Libna, Yattir, Eshtemoa, '
  - type: usfm
    marker: v
    metadata:
      v: '43'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '43'
  - type: text
    text: 'Hilên, Debir, '
  - type: usfm
    marker: v
    metadata:
      v: '44'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '44'
  - type: text
    text: Ashân
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '6.44 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Certains manuscrits de l’ancienne version grecque, la version syriaque et '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Jos 21.16
        metadata:
          usfm: JOS.21.16
      - type: text
        text: ' ajoutent ici : '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: Youtta.
    marker-yv: yv-n
  - type: text
    text: ', Beth-Shémesh. '
  - type: usfm
    marker: v
    metadata:
      v: '45'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '45'
  - type: text
    text: 'Dans le territoire de la tribu de Benjamin, ils reçurent, avec leurs terres attenantes : Guéba, Allémeth, Anatoth. Ils reçurent donc au total treize villes'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '6.45 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Onze villes seulement sont citées. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'Youtta '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'et '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'Gabaon, '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'mentionnées en '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Jos 21.16-17
        metadata:
          usfm: JOS.21.16+JOS.21.17
      - type: text
        text: ', n’existaient peut-être plus à l’époque de la rédaction des Chroniques.'
    marker-yv: yv-n
  - type: text
    text: ' réparties entre leurs familles.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '46'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '46'
  - type: text
    text: Les autres Qehatites obtinrent par tirage au sort dix villes situées dans les territoires des familles de la tribu [d’Ephraïm, de la tribu de Dan et
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '6.46 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Les mots entre crochets manquent dans le texte hébreu traditionnel. Ils sont rajoutés ici d’après '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Jos 21.5
        metadata:
          usfm: JOS.21.5
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: '] de la demi-tribu de Manassé'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '6.46 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Pour les v. 46-48, voir '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Jos 21.5-8
        metadata:
          usfm: JOS.21.5+JOS.21.6+JOS.21.7+JOS.21.8
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '47'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '47'
  - type: text
    text: 'Les Guershonites obtinrent pour leurs familles treize villes situées dans les territoires des tribus d’Issacar, d’Aser, de Nephtali et de la tribu de Manassé établie dans le Basan. '
  - type: usfm
    marker: v
    metadata:
      v: '48'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '48'
  - type: text
    text: 'Les Merarites reçurent pour leurs familles, par tirage au sort, douze villes situées dans les territoires des tribus de Ruben, de Gad et de Zabulon. '
  - type: usfm
    marker: v
    metadata:
      v: '49'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '49'
  - type: text
    text: 'Les Israélites attribuèrent ces villes et les terres attenantes aux lévites. '
  - type: usfm
    marker: v
    metadata:
      v: '50'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '50'
  - type: text
    text: 'Ils attribuèrent par tirage au sort ces villes désignées par leur nom et situées dans le territoire des tribus de Juda, de Siméon et de Benjamin. '
  - type: usfm
    marker: v
    metadata:
      v: '51'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '51'
