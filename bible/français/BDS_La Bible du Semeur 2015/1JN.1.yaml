document_id: 1JN.1,21
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: 'Le fondement : le message des apôtres'
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: Nous vous annonçons le message de celui qui est la vie
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1.1 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Autre traduction : '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: nous vous écrivons au sujet de celui qui est la parole de vie.
      marker-yv: yv-n
    - type: text
      text: '. Nous vous annonçons ce qui était dès le commencement : nous l’avons entendu, nous l’avons vu de nos propres yeux, nous l’avons contemplé et nos mains l’ont touché. – '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: Si nous prétendons ne pas être pécheurs, nous faisons de Dieu un menteur et sa Parole n’est pas en nous.
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'Celui qui est la vie s’est manifesté : nous l’avons vu, nous en parlons en témoins et nous vous annonçons la vie éternelle qui était auprès du Père et qui s’est manifestée pour nous. – '
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'Oui, ce que nous avons vu et entendu, nous vous l’annonçons, à vous aussi, afin que vous aussi vous soyez en communion avec nous. Or, la communion dont nous jouissons est avec le Père et avec son Fils Jésus-Christ. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: Si nous vous écrivons ces choses, c’est pour que notre joie
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1.4 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Certains manuscrits ont : '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: votre joie.
      marker-yv: yv-n
    - type: text
      text: ' soit complète.'
  - type: usfm
    marker: s1
    children:
    - type: text
      text: 'Dieu est lumière : la vie dans la lumière'
    marker-yv: yv-h
  - type: usfm
    marker: s2
    children:
    - type: text
      text: Pardonnés, mais ne péchez pas
    marker-yv: yv-h
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'Voici le message que nous avons entendu de Jésus-Christ et que nous vous annonçons : Dieu est lumière et il n’y a aucune trace de ténèbres en lui.'
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'Si nous prétendons être en communion avec lui, tout en vivant dans les ténèbres, nous sommes des menteurs et nous n’agissons pas comme la vérité l’exige. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: Mais si nous vivons dans la lumière, tout comme Dieu lui-même est dans la lumière, alors nous sommes en communion les uns avec les autres et, parce que Jésus, son Fils, a versé son sang, nous sommes purifiés de tout péché.
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'Si nous prétendons n’être coupables d’aucun péché, nous sommes dans l’illusion, et la vérité n’habite pas en nous. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: Si nous reconnaissons nos péchés, Dieu est fidèle et juste et, par conséquent, il nous pardonnera nos péchés et nous purifiera de tout le mal que nous avons commis.
