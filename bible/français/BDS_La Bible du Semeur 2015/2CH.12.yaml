document_id: 2CH.12
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: L’invasion égyptienne
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: (1 R 14.21-31)
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Une fois que Roboam eut affermi son autorité royale et qu’il fut devenu puissant, il cessa d’obéir à la Loi de l’Eternel, et tout Israël avec lui. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: La cinquième année du règne de Roboam, Shishaq, roi d’Egypte
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '12.2 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: Shishaq
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: ', '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: fondateur de la XXII
      - type: usfm
        marker: ord
        children:
        - type: text
          text: e
      - type: text
        text: ' dynastie égyptienne, a régné de 945 à 924 av. J.-C. La cinquième année du règne de Roboam correspond à 925 av. J.-C.'
    marker-yv: yv-n
  - type: text
    text: ', vint attaquer Jérusalem ; ce fut la conséquence de l’infidélité d’Israël envers l’Eternel. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Shishaq vint d’Egypte avec mille deux cents chars et soixante mille soldats sur char. Il commandait une armée innombrable de soldats égyptiens, libyens, soukkiens et éthiopiens. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Il s’empara des villes fortifiées de Juda et s’avança jusqu’à Jérusalem.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Alors le prophète Shemaya alla trouver Roboam et les chefs de Juda qui s’étaient retirés à Jérusalem à l’approche de Shishaq. Il leur dit : Voici ce que déclare l’Eternel : « Vous m’avez abandonné. A mon tour, je vous abandonne entre les mains de Shishaq. »'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Les chefs d’Israël et le roi s’humilièrent et déclarèrent : L’Eternel est juste !'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Quand l’Eternel vit qu’ils s’humiliaient, il adressa une nouvelle parole à Shemaya : Puisqu’ils se sont humiliés, dit-il, je ne les détruirai pas ; d’ici peu de temps, je leur accorderai la délivrance et je ne déchaînerai pas ma colère sur Jérusalem par le moyen de Shishaq. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Toutefois, ils lui seront assujettis et ils pourront apprécier la différence entre me servir et servir des rois d’autres pays.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Shishaq, roi d’Egypte, vint attaquer Jérusalem. Il s’empara des trésors du temple de l’Eternel et de ceux du palais royal. Il prit absolument tout, notamment les boucliers d’or que Salomon avait fait faire
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '12.9 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Voir '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 2 Ch 9.15-16
        metadata:
          usfm: 2CH.9.15+2CH.9.16
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Le roi Roboam fit faire des boucliers de bronze pour les remplacer et les confia aux chefs des gardes chargés de surveiller l’entrée du palais royal. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Chaque fois que le roi se rendait au temple de l’Eternel, les gardes venaient les enlever, puis ils les replaçaient dans la salle du corps de garde.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Lorsque Roboam s’humilia, la colère de l’Eternel se détourna de lui et sa ruine ne fut pas totale. D’ailleurs, il y avait encore de bonnes choses en Juda. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Le roi Roboam affermit son pouvoir à Jérusalem et continua à régner. Il avait quarante et un ans à son avènement, et il régna dix-sept ans à Jérusalem
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '12.13 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: De 930 à 913 av. J.-C.
    marker-yv: yv-n
  - type: text
    text: ', la ville que l’Eternel avait choisie parmi toutes les tribus d’Israël pour y établir sa présence. Sa mère était une Ammonite nommée Naama. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Il fit ce qui est mal, parce qu’il n’appliqua pas son cœur à s’attacher à l’Eternel.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Les faits et gestes de Roboam, des premiers aux derniers, sont cités dans les Actes du prophète Shemaya et du prophète Iddo où sont enregistrées des listes généalogiques. Roboam et Jéroboam furent tout le temps en guerre l’un avec l’autre. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Quand Roboam rejoignit ses ancêtres décédés, il fut enterré dans la Cité de David. Son fils Abiya lui succéda sur le trône.
