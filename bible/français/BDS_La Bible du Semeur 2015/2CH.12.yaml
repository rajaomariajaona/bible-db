document_id: 2CH.12,21
type_code: fra
verses:
  '1':
  - type: heading
    content: L’invasion égyptienne
  - type: heading
    content: (1 R 14.21-31)
  - type: text
    content: 'Une fois que Roboam eut affermi son autorité royale et qu’il fut devenu puissant, il cessa d’obéir à la Loi de l’Eternel, et tout Israël avec lui. '
  '10':
  - type: text
    content: 'Le roi Roboam fit faire des boucliers de bronze pour les remplacer et les confia aux chefs des gardes chargés de surveiller l’entrée du palais royal. '
  '11':
  - type: text
    content: Chaque fois que le roi se rendait au temple de l’Eternel, les gardes venaient les enlever, puis ils les replaçaient dans la salle du corps de garde.
  '12':
  - type: text
    content: 'Lorsque Roboam s’humilia, la colère de l’Eternel se détourna de lui et sa ruine ne fut pas totale. D’ailleurs, il y avait encore de bonnes choses en Juda. '
  '13':
  - type: text
    content: Le roi Roboam affermit son pouvoir à Jérusalem et continua à régner. Il avait quarante et un ans à son avènement, et il régna dix-sept ans à Jérusalem
  - type: note
    content: De 930 à 913 av. J.-C.
  - type: text
    content: ', la ville que l’Eternel avait choisie parmi toutes les tribus d’Israël pour y établir sa présence. Sa mère était une Ammonite nommée Naama. '
  '14':
  - type: text
    content: Il fit ce qui est mal, parce qu’il n’appliqua pas son cœur à s’attacher à l’Eternel.
  '15':
  - type: text
    content: 'Les faits et gestes de Roboam, des premiers aux derniers, sont cités dans les Actes du prophète Shemaya et du prophète Iddo où sont enregistrées des listes généalogiques. Roboam et Jéroboam furent tout le temps en guerre l’un avec l’autre. '
  '16':
  - type: text
    content: Quand Roboam rejoignit ses ancêtres décédés, il fut enterré dans la Cité de David. Son fils Abiya lui succéda sur le trône.
  '2':
  - type: text
    content: La cinquième année du règne de Roboam, Shishaq, roi d’Egypte
  - type: note
    content: Shishaq, fondateur de la XXIIe dynastie égyptienne, a régné de 945 à 924 av. J.-C. La cinquième année du règne de Roboam correspond à 925 av. J.-C.
  - type: text
    content: ', vint attaquer Jérusalem ; ce fut la conséquence de l’infidélité d’Israël envers l’Eternel. '
  '3':
  - type: text
    content: 'Shishaq vint d’Egypte avec mille deux cents chars et soixante mille soldats sur char. Il commandait une armée innombrable de soldats égyptiens, libyens, soukkiens et éthiopiens. '
  '4':
  - type: text
    content: Il s’empara des villes fortifiées de Juda et s’avança jusqu’à Jérusalem.
  '5':
  - type: text
    content: 'Alors le prophète Shemaya alla trouver Roboam et les chefs de Juda qui s’étaient retirés à Jérusalem à l’approche de Shishaq. Il leur dit : Voici ce que déclare l’Eternel : « Vous m’avez abandonné. A mon tour, je vous abandonne entre les mains de Shishaq. »'
  '6':
  - type: text
    content: 'Les chefs d’Israël et le roi s’humilièrent et déclarèrent : L’Eternel est juste !'
  '7':
  - type: text
    content: 'Quand l’Eternel vit qu’ils s’humiliaient, il adressa une nouvelle parole à Shemaya : Puisqu’ils se sont humiliés, dit-il, je ne les détruirai pas ; d’ici peu de temps, je leur accorderai la délivrance et je ne déchaînerai pas ma colère sur Jérusalem par le moyen de Shishaq. '
  '8':
  - type: text
    content: Toutefois, ils lui seront assujettis et ils pourront apprécier la différence entre me servir et servir des rois d’autres pays.
  '9':
  - type: text
    content: Shishaq, roi d’Egypte, vint attaquer Jérusalem. Il s’empara des trésors du temple de l’Eternel et de ceux du palais royal. Il prit absolument tout, notamment les boucliers d’or que Salomon avait fait faire
  - type: note
    content: Voir 2 Ch 9.15-16.
  - type: text
    content: '. '
