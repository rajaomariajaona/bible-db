document_id: DAN.7,21
type_code: fra
verses:
  '1':
  - type: heading
    content: Les quatre bêtes et le Fils de l’homme
  - type: heading
    content: La vision des quatre bêtes
  - type: text
    content: Au cours de la première année du règne de Balthazar, roi de Babylone
  - type: note
    content: Sans doute vers 550 av. J.-C. Les événements relatés dans ce chapitre précèdent donc ceux des chapitres 5 et 6.
  - type: text
    content: ', comme Daniel était couché sur son lit, il eut un rêve : des visions se présentèrent à son esprit. Il consigna le rêve par écrit. En voici le récit :'
  '10':
  - type: text
    content: Un fleuve de feu jaillissait
  - type: text
    content: et coulait devant lui,
  - type: text
    content: des millions d’êtres le servaient,
  - type: text
    content: et des centaines de millions ╵se tenaient debout devant lui.
  - type: text
    content: La cour de justice prit place
  - type: text
    content: et l’on ouvrit des livres
  - type: note
    content: Voir Ap 5.11 ; 20.12.
  - type: text
    content: .
  '11':
  - type: text
    content: 'Je regardai toujours. Alors, à cause des propos arrogants proférés par la corne, je vis qu’on tuait la bête et que son corps était détruit, jeté dans un brasier de feu. '
  '12':
  - type: text
    content: 'Quant au reste des bêtes, on leur enleva leur pouvoir mais on leur accorda une prolongation de vie jusqu’à un temps et un moment fixés. '
  '13':
  - type: text
    content: 'Je regardai encore dans mes visions nocturnes :'
  - type: text
    content: Sur les nuées du ciel,
  - type: text
    content: je vis venir quelqu’un ╵semblable à un fils d’homme.
  - type: text
    content: Il s’avança jusqu’au vieillard ╵âgé de nombreux jours
  - type: text
    content: et on le fit approcher devant lui
  - type: note
    content: Voir Mt 24.30 ; 26.64 ; Mc 13.26 ; 14.62 ; Lc 21.27 ; Ap 1.7, 13 ; 14.14. Voir l’expression Fils de l’homme dans le lexique.
  - type: text
    content: .
  '14':
  - type: text
    content: On lui donna la souveraineté, ╵et la gloire et la royauté,
  - type: text
    content: et tous les peuples, toutes les nations, ╵les hommes de toutes les langues ╵lui apportèrent leurs hommages.
  - type: text
    content: Sa souveraineté est éternelle,
  - type: text
    content: elle ne passera jamais,
  - type: text
    content: et quant à son royaume, ╵il ne sera jamais détruit
  - type: note
    content: Voir Ap 11.15.
  - type: text
    content: .
  '15':
  - type: text
    content: 'Moi, Daniel, je fus profondément angoissé au-dedans de moi et mes visions me remplirent d’effroi. '
  '16':
  - type: text
    content: 'Je m’approchai de l’un de ceux qui se tenaient là pour lui demander quelle était la signification véritable de tout ce que j’avais vu. Il me répondit pour m’en donner l’interprétation. '
  '17':
  - type: text
    content: « Ces quatre bêtes énormes, dit-il, représentent quatre rois
  - type: note
    content: Voir Dn 2.37-43.
  - type: text
    content: ' qui apparaîtront sur la terre. '
  '18':
  - type: text
    content: Mais la royauté sera donnée aux membres du peuple saint du Très-Haut et ils la posséderont pour toujours, éternellement. »
  '19':
  - type: text
    content: 'Alors je voulus être fixé avec certitude au sujet de la quatrième bête qui était si différente de toutes les autres, cette bête très effrayante qui avait des dents de fer et des griffes de bronze, qui dévorait, déchiquetait et piétinait ce qui restait de ses victimes. '
  '2':
  - type: text
    content: Au cours de mes visions nocturnes, je regardais et voici que les quatre vents du ciel agitaient la grande mer
  - type: note
    content: Pour les v. 2-8, voir Ap 13.1-6.
  - type: text
    content: .
  '20':
  - type: text
    content: 'Je voulus aussi savoir ce que représentaient les dix cornes qu’elle avait sur la tête et l’autre corne qui avait poussé et devant laquelle trois des premières cornes étaient tombées, cette corne qui avait des yeux et une bouche parlant avec arrogance et qui paraissait plus grande que les autres. '
  '21':
  - type: text
    content: Tandis que je regardais, cette corne faisait la guerre aux membres du peuple saint et elle remportait la victoire sur eux
  - type: note
    content: Voir Ap 13.7.
  - type: text
    content: ' '
  '22':
  - type: text
    content: jusqu’à ce que vienne le vieillard âgé de nombreux jours, et que le jugement soit rendu en faveur des membres du peuple saint du Très-Haut et qu’arrive pour eux le temps de prendre possession de la royauté
  - type: note
    content: Voir Ap 17.12.
  - type: text
    content: .
  '23':
  - type: text
    content: 'Celui que j’avais interrogé me dit : « La quatrième bête représente un quatrième royaume qui apparaîtra sur la terre. Il sera différent de tous les royaumes précédents : il dévorera le monde entier, le piétinera et le déchiquettera. '
  '24':
  - type: text
    content: 'Les dix cornes représentent dix rois qui surgiront de ce royaume. Un autre roi se lèvera après eux, il sera différent de ses prédécesseurs. Il renversera trois rois. '
  '25':
  - type: text
    content: Il proférera des paroles contre le Très-Haut, opprimera les membres du peuple saint du Très-Haut, entreprendra de changer le calendrier et la loi ; et le peuple saint sera livré à sa merci pendant un temps, deux temps et la moitié d’un temps
  - type: note
    content: Voir Ap 12.14 ; 13.5-6.
  - type: text
    content: '. '
  '26':
  - type: text
    content: 'Mais alors, la cour de justice siégera et on ôtera la domination à ce roi pour l’anéantir et la faire disparaître définitivement. '
  '27':
  - type: text
    content: Le règne, la souveraineté et la grandeur de tous les royaumes qui sont sous le ciel seront attribués aux membres du peuple saint du Très-Haut. Le règne de ce peuple est éternel, et toutes les puissances du monde le serviront et lui obéiront
  - type: note
    content: Voir Ap 22.5.
  - type: text
    content: . »
  '28':
  - type: text
    content: Ici prend fin le récit. Quant à moi, Daniel, je fus très effrayé par mes pensées et j’en devins blême. Je gardai ces choses en mémoire.
  '3':
  - type: text
    content: Quatre bêtes
  - type: note
    content: Cette vision est parallèle à celle du chapitre 2.
  - type: text
    content: ' énormes, différentes les unes des autres, surgirent de la mer. '
  '4':
  - type: text
    content: La première ressemblait à un lion avec des ailes d’aigle. Tandis que je la regardais, ses ailes lui furent arrachées, elle fut soulevée de terre et dressée sur ses pieds comme un homme, un cœur humain lui fut donné.
  '5':
  - type: text
    content: 'Et voici que surgit une deuxième bête, ressemblant à un ours : elle était dressée sur un côté et tenait dans sa gueule trois côtes entre les dents. J’entendis qu’on lui disait : « Debout, mange beaucoup de chair ! » '
  '6':
  - type: text
    content: Après cela, je continuai à regarder et je vis un autre animal qui ressemblait à un léopard, avec quatre ailes d’oiseaux sur le dos et quatre têtes. Le pouvoir lui fut donné.
  '7':
  - type: text
    content: 'Après cela, dans mes visions nocturnes, je vis surgir une quatrième bête, effrayante, terrifiante et d’une force extraordinaire ; elle avait d’énormes dents de fer, elle dévorait, déchiquetait et piétinait ce qui restait de ses victimes ; elle était bien différente de toutes les bêtes qui l’avaient précédée ; elle avait aussi dix cornes. '
  '8':
  - type: text
    content: 'J’observais ces cornes et voilà qu’au milieu d’elles surgit une autre corne plus petite : trois des premières cornes furent arrachées devant elle. Sur cette corne, il y avait des yeux ressemblant à des yeux humains, et une bouche qui parlait avec arrogance.'
  - type: heading
    content: Le Fils de l’homme
  '9':
  - type: text
    content: Je regardai encore
  - type: text
    content: pendant qu’on installait des trônes,
  - type: text
    content: un vieillard âgé de très nombreux jours
  - type: note
    content: Le Dieu éternel.
  - type: text
    content: ' ╵prit place sur l’un d’eux.'
  - type: text
    content: Son vêtement ╵était blanc comme de la neige
  - type: note
    content: Voir Ap 1.14
  - type: text
    content: et ses cheveux étaient ╵comme la laine nettoyée.
  - type: text
    content: Son trône
  - type: note
    content: Voir Ap 20.11
  - type: text
    content: ', embrasé de flammes de feu,'
  - type: text
    content: avait des roues de feu ardent.
