document_id: DAN.7,21
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Les quatre bêtes et le Fils de l’homme
    marker-yv: yv-h
  - type: usfm
    marker: s2
    children:
    - type: text
      text: La vision des quatre bêtes
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: Au cours de la première année du règne de Balthazar, roi de Babylone
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '7.1 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Sans doute vers 550 av. J.-C. Les événements relatés dans ce chapitre précèdent donc ceux des chapitres 5 et 6.
      marker-yv: yv-n
    - type: text
      text: ', comme Daniel était couché sur son lit, il eut un rêve : des visions se présentèrent à son esprit. Il consigna le rêve par écrit. En voici le récit :'
  '10':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Un fleuve de feu jaillissait
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et coulait devant lui,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: des millions d’êtres le servaient,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et des centaines de millions ╵se tenaient debout devant lui.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: La cour de justice prit place
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et l’on ouvrit des livres
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '7.10 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Voir Ap 5.11 ; 20.12.
      marker-yv: yv-n
    - type: text
      text: .
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Je regardai toujours. Alors, à cause des propos arrogants proférés par la corne, je vis qu’on tuait la bête et que son corps était détruit, jeté dans un brasier de feu. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Quant au reste des bêtes, on leur enleva leur pouvoir mais on leur accorda une prolongation de vie jusqu’à un temps et un moment fixés. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Je regardai encore dans mes visions nocturnes :'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Sur les nuées du ciel,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: je vis venir quelqu’un ╵semblable à un fils d’homme.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Il s’avança jusqu’au vieillard ╵âgé de nombreux jours
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et on le fit approcher devant lui
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '7.13 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Voir Mt 24.30 ; 26.64 ; Mc 13.26 ; 14.62 ; Lc 21.27 ; Ap 1.7, 13 ; 14.14. Voir l’expression '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'Fils de l’homme '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: dans le lexique.
      marker-yv: yv-n
    - type: text
      text: .
  '14':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: On lui donna la souveraineté, ╵et la gloire et la royauté,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et tous les peuples, toutes les nations, ╵les hommes de toutes les langues ╵lui apportèrent leurs hommages.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Sa souveraineté est éternelle,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: elle ne passera jamais,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et quant à son royaume, ╵il ne sera jamais détruit
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '7.14 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Voir '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: Ap 11.15
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: .
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Moi, Daniel, je fus profondément angoissé au-dedans de moi et mes visions me remplirent d’effroi. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Je m’approchai de l’un de ceux qui se tenaient là pour lui demander quelle était la signification véritable de tout ce que j’avais vu. Il me répondit pour m’en donner l’interprétation. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: « Ces quatre bêtes énormes, dit-il, représentent quatre rois
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '7.17 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Voir '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: Dn 2.37-43
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: ' qui apparaîtront sur la terre. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Mais la royauté sera donnée aux membres du peuple saint du Très-Haut et ils la posséderont pour toujours, éternellement. »
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Alors je voulus être fixé avec certitude au sujet de la quatrième bête qui était si différente de toutes les autres, cette bête très effrayante qui avait des dents de fer et des griffes de bronze, qui dévorait, déchiquetait et piétinait ce qui restait de ses victimes. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Au cours de mes visions nocturnes, je regardais et voici que les quatre vents du ciel agitaient la grande mer
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '7.2 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Pour les v. 2-8, voir '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: Ap 13.1-6
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: .
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Je voulus aussi savoir ce que représentaient les dix cornes qu’elle avait sur la tête et l’autre corne qui avait poussé et devant laquelle trois des premières cornes étaient tombées, cette corne qui avait des yeux et une bouche parlant avec arrogance et qui paraissait plus grande que les autres. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Tandis que je regardais, cette corne faisait la guerre aux membres du peuple saint et elle remportait la victoire sur eux
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '7.21 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Voir '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: Ap 13.7
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: ' '
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: jusqu’à ce que vienne le vieillard âgé de nombreux jours, et que le jugement soit rendu en faveur des membres du peuple saint du Très-Haut et qu’arrive pour eux le temps de prendre possession de la royauté
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '7.22 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Voir '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: Ap 17.12
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: .
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Celui que j’avais interrogé me dit : « La quatrième bête représente un quatrième royaume qui apparaîtra sur la terre. Il sera différent de tous les royaumes précédents : il dévorera le monde entier, le piétinera et le déchiquettera. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Les dix cornes représentent dix rois qui surgiront de ce royaume. Un autre roi se lèvera après eux, il sera différent de ses prédécesseurs. Il renversera trois rois. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Il proférera des paroles contre le Très-Haut, opprimera les membres du peuple saint du Très-Haut, entreprendra de changer le calendrier et la loi ; et le peuple saint sera livré à sa merci pendant un temps, deux temps et la moitié d’un temps
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '7.25 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Voir Ap 12.14 ; 13.5-6.
      marker-yv: yv-n
    - type: text
      text: '. '
  '26':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Mais alors, la cour de justice siégera et on ôtera la domination à ce roi pour l’anéantir et la faire disparaître définitivement. '
  '27':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Le règne, la souveraineté et la grandeur de tous les royaumes qui sont sous le ciel seront attribués aux membres du peuple saint du Très-Haut. Le règne de ce peuple est éternel, et toutes les puissances du monde le serviront et lui obéiront
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '7.27 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Voir '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: Ap 22.5
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: . »
  '28':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ici prend fin le récit. Quant à moi, Daniel, je fus très effrayé par mes pensées et j’en devins blême. Je gardai ces choses en mémoire.
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Quatre bêtes
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '7.3 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Cette vision est parallèle à celle du chapitre 2.
      marker-yv: yv-n
    - type: text
      text: ' énormes, différentes les unes des autres, surgirent de la mer. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: La première ressemblait à un lion avec des ailes d’aigle. Tandis que je la regardais, ses ailes lui furent arrachées, elle fut soulevée de terre et dressée sur ses pieds comme un homme, un cœur humain lui fut donné.
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Et voici que surgit une deuxième bête, ressemblant à un ours : elle était dressée sur un côté et tenait dans sa gueule trois côtes entre les dents. J’entendis qu’on lui disait : « Debout, mange beaucoup de chair ! » '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Après cela, je continuai à regarder et je vis un autre animal qui ressemblait à un léopard, avec quatre ailes d’oiseaux sur le dos et quatre têtes. Le pouvoir lui fut donné.
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Après cela, dans mes visions nocturnes, je vis surgir une quatrième bête, effrayante, terrifiante et d’une force extraordinaire ; elle avait d’énormes dents de fer, elle dévorait, déchiquetait et piétinait ce qui restait de ses victimes ; elle était bien différente de toutes les bêtes qui l’avaient précédée ; elle avait aussi dix cornes. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'J’observais ces cornes et voilà qu’au milieu d’elles surgit une autre corne plus petite : trois des premières cornes furent arrachées devant elle. Sur cette corne, il y avait des yeux ressemblant à des yeux humains, et une bouche qui parlait avec arrogance.'
  - type: usfm
    marker: s2
    children:
    - type: text
      text: Le Fils de l’homme
    marker-yv: yv-h
  '9':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Je regardai encore
  - type: usfm
    marker: q1
    children:
    - type: text
      text: pendant qu’on installait des trônes,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: un vieillard âgé de très nombreux jours
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '7.9 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Le Dieu éternel.
      marker-yv: yv-n
    - type: text
      text: ' ╵prit place sur l’un d’eux.'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Son vêtement ╵était blanc comme de la neige
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '7.9 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Voir '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: Ap 1.14
      marker-yv: yv-n
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et ses cheveux étaient ╵comme la laine nettoyée.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Son trône
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '7.9 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Voir '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: Ap 20.11
      marker-yv: yv-n
    - type: text
      text: ', embrasé de flammes de feu,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: avait des roues de feu ardent.
