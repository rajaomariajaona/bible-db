document_id: LEV.19,21
type_code: fra
verses:
  '1':
  - type: heading
    content: « Vous serez saints »
  - type: text
    content: 'L’Eternel s’adressa à Moïse en ces termes : '
  '10':
  - type: text
    content: De même, tu ne cueilleras pas les grappes restées dans ta vigne et tu ne ramasseras pas les fruits qui y seront tombés. Tu laisseras tout cela au pauvre et à l’immigré. Je suis l’Eternel, votre Dieu.
  '11':
  - type: text
    content: Vous ne commettrez pas de vol, vous n’userez ni de mensonge
  - type: note
    content: 'vol: voir Ex 20.15 ; Dt 5.19. mensonge: voir Lv 5.21-22 ; Za 8.16 ; Ep 4.25.'
  - type: text
    content: ' ni de tromperie à l’égard de votre prochain. '
  '12':
  - type: text
    content: Vous ne prononcerez pas de faux serment par mon nom, car vous profaneriez le nom de votre Dieu. Je suis l’Eternel
  - type: note
    content: Voir Ex 20.7, 16 ; Lv 5.24 ; Jr 5.2 ; Ac 6.13. Cité en Mt 5.33.
  - type: text
    content: .
  '13':
  - type: text
    content: Tu n’exploiteras pas ton prochain et tu ne le voleras pas. Tu ne retiendras pas le salaire d’un ouvrier jusqu’au lendemain matin
  - type: note
    content: Voir Ex 22.20 ; Lv 5.21-23 ; Dt 24.14-15 ; Ez 22.12.
  - type: text
    content: '. '
  '14':
  - type: text
    content: Tu n’insulteras pas un sourd et tu ne mettras pas d’obstacle sur le chemin d’un aveugle, et tu craindras ton Dieu. Je suis l’Eternel
  - type: note
    content: Voir Dt 27.18 ; Jb 29.15.
  - type: text
    content: .
  '15':
  - type: text
    content: Vous ne commettrez pas d’injustice dans les jugements. Tu n’avantageras pas le pauvre, et tu ne favoriseras pas le grand ; tu jugeras ton prochain selon la justice
  - type: note
    content: Voir Ex 23.3, 6-8 ; Dt 1.17 ; 16.19.
  - type: text
    content: '. '
  '16':
  - type: text
    content: 'Tu ne calomnieras pas les membres de ton peuple ; tu ne porteras pas atteinte à la vie de ton prochain par un faux témoignage. Je suis l’Eternel. '
  '17':
  - type: text
    content: Tu ne haïras pas ton frère dans ton cœur, mais tu ne manqueras pas de reprendre ton prochain pour ne pas te charger d’un péché
  - type: note
    content: Cité en Mt 18.15.
  - type: text
    content: '. '
  '18':
  - type: text
    content: Tu ne te vengeras pas et tu ne garderas pas de rancune envers les membres de ton peuple, mais tu aimeras ton prochain comme toi-même. Je suis l’Eternel
  - type: note
    content: Voir Lv 19.34. Cité en Mt 5.43 ; 19.19 ; 22.39 ; Mc 12.31 ; Lc 10.27 ; Rm 13.9 ; Ga 5.14.
  - type: text
    content: .
  '19':
  - type: text
    content: Vous obéirez à mes commandements. Tu n’accoupleras pas des animaux de ton bétail d’espèces différentes. Tu n’ensemenceras pas ton champ de deux espèces de graines. Tu ne porteras pas un vêtement tissé de deux fibres différentes
  - type: note
    content: Voir Dt 22.9-11.
  - type: text
    content: .
  '2':
  - type: text
    content: 'Parle à toute la communauté des Israélites et dis-leur : Soyez saints, car je suis saint, moi l’Eternel, votre Dieu'
  - type: note
    content: Voir Lv 11.44-45. Cité en 1 P 1.16.
  - type: text
    content: .
  '20':
  - type: text
    content: 'Si un homme couche avec une servante fiancée à un autre homme sans qu’elle ait été ni achetée ni affranchie, il versera une indemnité, mais les deux ne seront pas punis de mort car elle n’avait pas encore été affranchie. '
  '21':
  - type: text
    content: 'Cet homme apportera à l’Eternel, à l’entrée de la tente de la Rencontre, comme sacrifice de réparation pour sa faute, un bélier '
  '22':
  - type: text
    content: avec lequel le prêtre accomplira le rite d’expiation pour lui devant l’Eternel, pour le péché qu’il a commis, et sa faute lui sera pardonnée.
  '23':
  - type: text
    content: Quand vous serez entrés dans le pays promis et que vous planterez toutes sortes d’arbres fruitiers, vous considérerez pendant trois ans leurs fruits comme impurs
  - type: note
    content: Le terme hébreu signifie habituellement incirconcis.
  - type: text
    content: ', vous n’en mangerez donc pas. '
  '24':
  - type: text
    content: 'La quatrième année, tous leurs fruits seront consacrés à l’Eternel en témoignage de reconnaissance. '
  '25':
  - type: text
    content: La cinquième année, vous en mangerez les fruits. Ainsi vous aurez des récoltes abondantes. Je suis l’Eternel, votre Dieu.
  '26':
  - type: text
    content: Vous ne mangerez aucune viande contenant encore son sang. Vous ne pratiquerez pas la divination ; vous ne rechercherez pas les augures
  - type: note
    content: Voir Dt 18.10-11 ; 2 R 17.17 ; 21.6 ; 2 Ch 33.6.
  - type: text
    content: '. '
  '27':
  - type: text
    content: 'Vous ne vous taillerez pas en rond le bord de la chevelure, vous ne vous raserez pas les coins de la barbe. '
  '28':
  - type: text
    content: Vous ne vous ferez pas d’incisions sur le corps à cause d’un mort et vous ne ferez pas dessiner des tatouages sur le corps
  - type: note
    content: Rites pratiqués par les Egyptiens et certains peuples du Moyen-Orient (voir Lv 21.5 ; Dt 14.1 ; Jr 41.5).
  - type: text
    content: . Je suis l’Eternel.
  '29':
  - type: text
    content: Ne déshonorez pas vos filles en faisant d’elles des prostituées ; le pays entier s’adonnerait à la prostitution et se remplirait d’immoralité
  - type: note
    content: Voir Dt 23.18.
  - type: text
    content: .
  '3':
  - type: text
    content: Que chacun de vous respecte l’autorité de sa mère
  - type: note
    content: Voir Ex 20.12 ; 21.17 ; Lv 20.9 ; Dt 5.16 ; Ez 22.7 ; Mt 15.4 ; Ep 6.2.
  - type: text
    content: ' et de son père, et observe les jours de repos que j’ai prescrits'
  - type: note
    content: Voir Ex 20.8-11 ; Lv 19.30 ; 23.3 ; 26.2 ; Dt 5.12-15 ; Ez 22.8 ; Mt 12.1-2.
  - type: text
    content: . Je suis l’Eternel, votre Dieu.
  '30':
  - type: text
    content: Vous observerez les jours de repos que je vous ai prescrits et vous révérerez mon sanctuaire. Je suis l’Eternel
  - type: note
    content: Voir 19.3.
  - type: text
    content: .
  '31':
  - type: text
    content: Ne vous adressez ni à des médiums, ni à des devins ; ne les consultez pas, vous vous rendriez impurs. Je suis l’Eternel, votre Dieu
  - type: note
    content: Voir Lv 20.6, 27 ; Dt 18.10-11 ; 1 S 28.3 ; 2 R 23.24.
  - type: text
    content: .
  '32':
  - type: text
    content: Tu te lèveras devant les cheveux blancs, tu honoreras la personne du vieillard, et tu craindras ton Dieu. Je suis l’Eternel.
  '33':
  - type: text
    content: Si un étranger vient s’installer dans votre pays, ne l’exploitez pas
  - type: note
    content: Pour les v. 33-34, voir Ex 22.20 ; Dt 24.17-18 ; 27.19.
  - type: text
    content: '. '
  '34':
  - type: text
    content: 'Traitez-le comme s’il était l’un des vôtres. Tu l’aimeras comme toi-même : car vous avez été vous-mêmes étrangers en Egypte. Je suis l’Eternel, votre Dieu.'
  '35':
  - type: text
    content: Vous ne commettrez pas de malhonnêteté en fraudant sur les mesures de longueur, de poids ou de capacité
  - type: note
    content: Pour les v. 35-36, voir Dt 25.13-16 ; Pr 11.1 ; 20.10 ; Ez 45.10-12 ; Am 8.5 ; Mi 6.11.
  - type: text
    content: '. '
  '36':
  - type: text
    content: Vous vous servirez de balances justes, de poids justes, de mesures de capacité justes. Je suis l’Eternel, votre Dieu, qui vous ai fait sortir d’Egypte.
  '37':
  - type: text
    content: Vous obéirez donc à toutes mes ordonnances et à toutes mes lois et vous les appliquerez. Je suis l’Eternel.
  '4':
  - type: text
    content: Ne vous tournez pas vers les faux dieux
  - type: note
    content: Voir Ex 20.3 ; 34.14 ; Lv 26.1 ; Ps 81.10 ; Mt 4.10.
  - type: text
    content: ', ne vous fabriquez pas d’idoles sous forme de statues en métal fondu'
  - type: note
    content: Voir Ex 20.4-5 ; 32.1-6 ; 34.17 ; Dt 27.15 ; 1 R 12.28-30 ; Es 44.16-17.
  - type: text
    content: . Je suis l’Eternel, votre Dieu.
  '5':
  - type: text
    content: 'Lorsque vous m’offrirez un sacrifice de communion, faites-le de façon à ce qu’il puisse être agréé. '
  '6':
  - type: text
    content: 'La victime sera mangée le jour même où vous l’offrirez en sacrifice, ou le lendemain ; ce qui en restera le troisième jour sera brûlé, '
  '7':
  - type: text
    content: 'le troisième jour, si on en mange, ce sera impur et le sacrifice ne sera pas agréé. '
  '8':
  - type: text
    content: Celui qui en mangera portera le poids de sa faute, car il a profané une chose consacrée à l’Eternel, et il sera retranché de son peuple.
  '9':
  - type: text
    content: Quand vous ferez les moissons dans votre pays, tu ne couperas pas les épis jusqu’au bord de ton champ, et tu ne ramasseras pas ce qui reste à glaner
  - type: note
    content: Pour les v. 9-10, voir Lv 23.22 ; Dt 24.19-22.
  - type: text
    content: '. '
