document_id: LEV.19
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: « Vous serez saints »
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'L’Eternel s’adressa à Moïse en ces termes : '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Parle à toute la communauté des Israélites et dis-leur : Soyez saints, car je suis saint, moi l’Eternel, votre Dieu'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '19.2 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Voir '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Lv 11.44-45
        metadata:
          usfm: LEV.11.44+LEV.11.45
      - type: text
        text: '. Cité en '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1 P 1.16
        metadata:
          usfm: 1PE.1.16
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Que chacun de vous respecte l’autorité de sa mère
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '19.3 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Voir Ex 20.12 ; 21.17 ; Lv 20.9 ; Dt 5.16 ; Ez 22.7 ; Mt 15.4 ; Ep 6.2.
    marker-yv: yv-n
  - type: text
    text: ' et de son père, et observe les jours de repos que j’ai prescrits'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '19.3 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Voir Ex 20.8-11 ; Lv 19.30 ; 23.3 ; 26.2 ; Dt 5.12-15 ; Ez 22.8 ; Mt 12.1-2.
    marker-yv: yv-n
  - type: text
    text: . Je suis l’Eternel, votre Dieu.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Ne vous tournez pas vers les faux dieux
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '19.4 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Voir Ex 20.3 ; 34.14 ; Lv 26.1 ; Ps 81.10 ; Mt 4.10.
    marker-yv: yv-n
  - type: text
    text: ', ne vous fabriquez pas d’idoles sous forme de statues en métal fondu'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '19.4 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Voir Ex 20.4-5 ; 32.1-6 ; 34.17 ; Dt 27.15 ; 1 R 12.28-30 ; Es 44.16-17.
    marker-yv: yv-n
  - type: text
    text: . Je suis l’Eternel, votre Dieu.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Lorsque vous m’offrirez un sacrifice de communion, faites-le de façon à ce qu’il puisse être agréé. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'La victime sera mangée le jour même où vous l’offrirez en sacrifice, ou le lendemain ; ce qui en restera le troisième jour sera brûlé, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'le troisième jour, si on en mange, ce sera impur et le sacrifice ne sera pas agréé. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Celui qui en mangera portera le poids de sa faute, car il a profané une chose consacrée à l’Eternel, et il sera retranché de son peuple.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Quand vous ferez les moissons dans votre pays, tu ne couperas pas les épis jusqu’au bord de ton champ, et tu ne ramasseras pas ce qui reste à glaner
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '19.9 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Pour les v. 9-10, voir Lv 23.22 ; Dt 24.19-22.
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: De même, tu ne cueilleras pas les grappes restées dans ta vigne et tu ne ramasseras pas les fruits qui y seront tombés. Tu laisseras tout cela au pauvre et à l’immigré. Je suis l’Eternel, votre Dieu.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Vous ne commettrez pas de vol, vous n’userez ni de mensonge
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '19.11 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: vol
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: ': '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'voir Ex 20.15 ; Dt 5.19. '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: mensonge
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: ': '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: voir Lv 5.21-22 ; Za 8.16 ; Ep 4.25.
    marker-yv: yv-n
  - type: text
    text: ' ni de tromperie à l’égard de votre prochain. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Vous ne prononcerez pas de faux serment par mon nom, car vous profaneriez le nom de votre Dieu. Je suis l’Eternel
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '19.12 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Voir Ex 20.7, 16 ; Lv 5.24 ; Jr 5.2 ; Ac 6.13. Cité en '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Mt 5.33
        metadata:
          usfm: MAT.5.33
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Tu n’exploiteras pas ton prochain et tu ne le voleras pas. Tu ne retiendras pas le salaire d’un ouvrier jusqu’au lendemain matin
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '19.13 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Voir Ex 22.20 ; Lv 5.21-23 ; Dt 24.14-15 ; Ez 22.12.
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Tu n’insulteras pas un sourd et tu ne mettras pas d’obstacle sur le chemin d’un aveugle, et tu craindras ton Dieu. Je suis l’Eternel
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '19.14 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Voir Dt 27.18 ; Jb 29.15.
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Vous ne commettrez pas d’injustice dans les jugements. Tu n’avantageras pas le pauvre, et tu ne favoriseras pas le grand ; tu jugeras ton prochain selon la justice
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '19.15 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Voir Ex 23.3, 6-8 ; Dt 1.17 ; 16.19.
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Tu ne calomnieras pas les membres de ton peuple ; tu ne porteras pas atteinte à la vie de ton prochain par un faux témoignage. Je suis l’Eternel. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Tu ne haïras pas ton frère dans ton cœur, mais tu ne manqueras pas de reprendre ton prochain pour ne pas te charger d’un péché
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '19.17 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Cité en '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Mt 18.15
        metadata:
          usfm: MAT.18.15
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Tu ne te vengeras pas et tu ne garderas pas de rancune envers les membres de ton peuple, mais tu aimeras ton prochain comme toi-même. Je suis l’Eternel
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '19.18 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Voir '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Lv 19.34
        metadata:
          usfm: LEV.19.34
      - type: text
        text: . Cité en Mt 5.43 ; 19.19 ; 22.39 ; Mc 12.31 ; Lc 10.27 ; Rm 13.9 ; Ga 5.14.
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Vous obéirez à mes commandements. Tu n’accoupleras pas des animaux de ton bétail d’espèces différentes. Tu n’ensemenceras pas ton champ de deux espèces de graines. Tu ne porteras pas un vêtement tissé de deux fibres différentes
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '19.19 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Voir '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Dt 22.9-11
        metadata:
          usfm: DEU.22.9+DEU.22.10+DEU.22.11
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Si un homme couche avec une servante fiancée à un autre homme sans qu’elle ait été ni achetée ni affranchie, il versera une indemnité, mais les deux ne seront pas punis de mort car elle n’avait pas encore été affranchie. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Cet homme apportera à l’Eternel, à l’entrée de la tente de la Rencontre, comme sacrifice de réparation pour sa faute, un bélier '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: avec lequel le prêtre accomplira le rite d’expiation pour lui devant l’Eternel, pour le péché qu’il a commis, et sa faute lui sera pardonnée.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: Quand vous serez entrés dans le pays promis et que vous planterez toutes sortes d’arbres fruitiers, vous considérerez pendant trois ans leurs fruits comme impurs
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '19.23 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Le terme hébreu signifie habituellement '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: incirconcis.
    marker-yv: yv-n
  - type: text
    text: ', vous n’en mangerez donc pas. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'La quatrième année, tous leurs fruits seront consacrés à l’Eternel en témoignage de reconnaissance. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: La cinquième année, vous en mangerez les fruits. Ainsi vous aurez des récoltes abondantes. Je suis l’Eternel, votre Dieu.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: Vous ne mangerez aucune viande contenant encore son sang. Vous ne pratiquerez pas la divination ; vous ne rechercherez pas les augures
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '19.26 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Voir Dt 18.10-11 ; 2 R 17.17 ; 21.6 ; 2 Ch 33.6.
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'Vous ne vous taillerez pas en rond le bord de la chevelure, vous ne vous raserez pas les coins de la barbe. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: Vous ne vous ferez pas d’incisions sur le corps à cause d’un mort et vous ne ferez pas dessiner des tatouages sur le corps
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '19.28 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Rites pratiqués par les Egyptiens et certains peuples du Moyen-Orient (voir Lv 21.5 ; Dt 14.1 ; Jr 41.5).
    marker-yv: yv-n
  - type: text
    text: . Je suis l’Eternel.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: Ne déshonorez pas vos filles en faisant d’elles des prostituées ; le pays entier s’adonnerait à la prostitution et se remplirait d’immoralité
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '19.29 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Voir '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Dt 23.18
        metadata:
          usfm: DEU.23.18
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: Vous observerez les jours de repos que je vous ai prescrits et vous révérerez mon sanctuaire. Je suis l’Eternel
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '19.30 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Voir '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '19.3'
        metadata:
          usfm: LEV.19.3
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: Ne vous adressez ni à des médiums, ni à des devins ; ne les consultez pas, vous vous rendriez impurs. Je suis l’Eternel, votre Dieu
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '19.31 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Voir Lv 20.6, 27 ; Dt 18.10-11 ; 1 S 28.3 ; 2 R 23.24.
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: Tu te lèveras devant les cheveux blancs, tu honoreras la personne du vieillard, et tu craindras ton Dieu. Je suis l’Eternel.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: Si un étranger vient s’installer dans votre pays, ne l’exploitez pas
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '19.33 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Pour les v. 33-34, voir Ex 22.20 ; Dt 24.17-18 ; 27.19.
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: 'Traitez-le comme s’il était l’un des vôtres. Tu l’aimeras comme toi-même : car vous avez été vous-mêmes étrangers en Egypte. Je suis l’Eternel, votre Dieu.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: Vous ne commettrez pas de malhonnêteté en fraudant sur les mesures de longueur, de poids ou de capacité
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '19.35 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Pour les v. 35-36, voir Dt 25.13-16 ; Pr 11.1 ; 20.10 ; Ez 45.10-12 ; Am 8.5 ; Mi 6.11.
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: Vous vous servirez de balances justes, de poids justes, de mesures de capacité justes. Je suis l’Eternel, votre Dieu, qui vous ai fait sortir d’Egypte.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: Vous obéirez donc à toutes mes ordonnances et à toutes mes lois et vous les appliquerez. Je suis l’Eternel.
