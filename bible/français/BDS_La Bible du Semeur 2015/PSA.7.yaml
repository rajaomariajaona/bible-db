document_id: PSA.7,21
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Rends-moi justice contre des accusations injustes !
    marker-yv: yv-h
  - type: usfm
    marker: d
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: Complainte de David qu’il chanta au Seigneur au sujet de ce que Koush
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '7.1 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Personnage inconnu de la cour de Saül. Certaines versions l’ont identifié à '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'l’Ethiopien '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '(en hébreu '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: le Koushite
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ') de 2 S '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: 18.21-23
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: ' le Benjaminite avait dit.'
  '10':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: Mets donc un terme ╵aux méfaits des méchants,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et affermis le juste,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: toi qui es juste ╵et qui sondes les cœurs
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '7.10 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Voir '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: Ap 2.23
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: ' ╵et les désirs secrets.'
  '11':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: Dieu est mon bouclier.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Il sauve qui a le cœur droit.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: Dieu est un juste juge,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: qui, chaque jour, ╵fait sentir son indignation
  '13':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: à qui ne revient pas à lui.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: L’ennemi
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '7.13 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'L’hébreu ne permet pas de déterminer si c’est Dieu ou l’ennemi qui est le sujet des verbes des v. 13-14. D’où l’autre traduction possible : '
      - type: usfm
        marker: fv
        children:
        - type: text
          text: '13 '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'Si l’on ne revient pas à lui, Dieu aiguise son glaive… '
      - type: usfm
        marker: fv
        children:
        - type: text
          text: '15 '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: L’ennemi conçoit des méfaits…
      marker-yv: yv-n
    - type: text
      text: ' aiguise son glaive,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: il tend son arc ╵et se met à viser.
  '14':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: Il se prépare ╵des armes meurtrières,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et il apprête ╵des flèches enflammées
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '7.14 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Les anciens enduisaient parfois les flèches de matières inflammables pour allumer des incendies dans les villes assiégées (cf. '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: Ep 6.16
        - type: text
          text: ).
      marker-yv: yv-n
    - type: text
      text: .
  '15':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: Il conçoit des méfaits,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: porte en son sein ╵de quoi répandre la misère, ╵et il accouche de la fausseté.
  '16':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: Il creuse en terre ╵un trou profond
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '7.16 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Allusion aux pièges préparés pour la capture des fauves : des trous profonds recouverts de branchages.'
      marker-yv: yv-n
    - type: text
      text: ','
  - type: usfm
    marker: q1
    children:
    - type: text
      text: mais, dans la fosse qu’il a faite, ╵c’est lui qui tombera.
  '17':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: Son mauvais coup ╵se retournera contre lui,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et sa violence ╵lui retombera sur la tête.
  '18':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: Je louerai l’Eternel ╵pour sa justice,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: je célébrerai par des chants ╵le Dieu très-haut.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'O Eternel, mon Dieu, ╵en toi, j’ai un refuge :'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: viens, sauve-moi ╵de ceux qui me poursuivent ! ╵Viens donc me délivrer !
  '3':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: Sinon, comme des lions
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '7.3 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Comme jeune berger, David a été attaqué par des lions (
        - type: usfm
          marker: ref
          children:
          - type: text
            text: 1 S 17.34-35
        - type: text
          text: ). Dans les Psaumes, les ennemis sont souvent comparés à des bêtes féroces (10.9 ; 17.12 ; 22.13-14, 17, 21-22 ; 25.17 ; 57.5 ; 58.7 ; 124.6).
      marker-yv: yv-n
    - type: text
      text: ', ╵ils vont me déchirer,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: je serai mis en pièces ╵sans que personne ╵ne vienne à mon secours.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: O Eternel, mon Dieu, ╵si j’ai agi ╵comme on me le reproche,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: si j’ai commis une injustice,
  '5':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: si j’ai causé du tort ╵à mon ami,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: si, sans raison, ╵j’ai dépouillé mon adversaire
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '7.5 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Autre traduction : '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: Si j’ai laissé échapper mon adversaire pour rien.
      marker-yv: yv-n
    - type: text
      text: ','
  '6':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: alors, qu’un ennemi ╵se mette à me poursuivre,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: qu’il me rattrape et me piétine,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: qu’il traîne mon honneur ╵dans la poussière.
  - type: usfm
    marker: q4
    children:
    - type: text
      text: Pause
  '7':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: O Eternel, ╵dans ta colère, lève-toi,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dresse-toi contre la furie ╵de ceux qui sont mes adversaires
  - type: usfm
    marker: q1
    children:
    - type: text
      text: entre en action en ma faveur, ╵toi qui as établi le droit.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: Que les peuples s’assemblent ╵autour de toi,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et toi, domine-les ╵des hauteurs de ton trône.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: O Eternel, ╵toi le juge des peuples,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: rends-moi justice, ╵et agis selon ma droiture !
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Qu’il me soit fait ╵selon mon innocence !
