document_id: PSA.7,21
type_code: fra
verses:
  '1':
  - type: heading
    content: Rends-moi justice contre des accusations injustes !
  - type: text
    content: Complainte de David qu’il chanta au Seigneur au sujet de ce que Koush
  - type: note
    content: Personnage inconnu de la cour de Saül. Certaines versions l’ont identifié à l’Ethiopien (en hébreu le Koushite) de 2 S 18.21-23.
  - type: text
    content: ' le Benjaminite avait dit.'
  '10':
  - type: text
    content: Mets donc un terme ╵aux méfaits des méchants,
  - type: text
    content: et affermis le juste,
  - type: text
    content: toi qui es juste ╵et qui sondes les cœurs
  - type: note
    content: Voir Ap 2.23.
  - type: text
    content: ' ╵et les désirs secrets.'
  '11':
  - type: text
    content: Dieu est mon bouclier.
  - type: text
    content: Il sauve qui a le cœur droit.
  '12':
  - type: text
    content: Dieu est un juste juge,
  - type: text
    content: qui, chaque jour, ╵fait sentir son indignation
  '13':
  - type: text
    content: à qui ne revient pas à lui.
  - type: text
    content: L’ennemi
  - type: note
    content: 'L’hébreu ne permet pas de déterminer si c’est Dieu ou l’ennemi qui est le sujet des verbes des v. 13-14. D’où l’autre traduction possible : 13 Si l’on ne revient pas à lui, Dieu aiguise son glaive… 15 L’ennemi conçoit des méfaits…'
  - type: text
    content: ' aiguise son glaive,'
  - type: text
    content: il tend son arc ╵et se met à viser.
  '14':
  - type: text
    content: Il se prépare ╵des armes meurtrières,
  - type: text
    content: et il apprête ╵des flèches enflammées
  - type: note
    content: Les anciens enduisaient parfois les flèches de matières inflammables pour allumer des incendies dans les villes assiégées (cf. Ep 6.16).
  - type: text
    content: .
  '15':
  - type: text
    content: Il conçoit des méfaits,
  - type: text
    content: porte en son sein ╵de quoi répandre la misère, ╵et il accouche de la fausseté.
  '16':
  - type: text
    content: Il creuse en terre ╵un trou profond
  - type: note
    content: 'Allusion aux pièges préparés pour la capture des fauves : des trous profonds recouverts de branchages.'
  - type: text
    content: ','
  - type: text
    content: mais, dans la fosse qu’il a faite, ╵c’est lui qui tombera.
  '17':
  - type: text
    content: Son mauvais coup ╵se retournera contre lui,
  - type: text
    content: et sa violence ╵lui retombera sur la tête.
  '18':
  - type: text
    content: Je louerai l’Eternel ╵pour sa justice,
  - type: text
    content: je célébrerai par des chants ╵le Dieu très-haut.
  '2':
  - type: text
    content: 'O Eternel, mon Dieu, ╵en toi, j’ai un refuge :'
  - type: text
    content: viens, sauve-moi ╵de ceux qui me poursuivent ! ╵Viens donc me délivrer !
  '3':
  - type: text
    content: Sinon, comme des lions
  - type: note
    content: Comme jeune berger, David a été attaqué par des lions (1 S 17.34-35). Dans les Psaumes, les ennemis sont souvent comparés à des bêtes féroces (10.9 ; 17.12 ; 22.13-14, 17, 21-22 ; 25.17 ; 57.5 ; 58.7 ; 124.6).
  - type: text
    content: ', ╵ils vont me déchirer,'
  - type: text
    content: je serai mis en pièces ╵sans que personne ╵ne vienne à mon secours.
  '4':
  - type: text
    content: O Eternel, mon Dieu, ╵si j’ai agi ╵comme on me le reproche,
  - type: text
    content: si j’ai commis une injustice,
  '5':
  - type: text
    content: si j’ai causé du tort ╵à mon ami,
  - type: text
    content: si, sans raison, ╵j’ai dépouillé mon adversaire
  - type: note
    content: 'Autre traduction : Si j’ai laissé échapper mon adversaire pour rien.'
  - type: text
    content: ','
  '6':
  - type: text
    content: alors, qu’un ennemi ╵se mette à me poursuivre,
  - type: text
    content: qu’il me rattrape et me piétine,
  - type: text
    content: qu’il traîne mon honneur ╵dans la poussière.
  - type: text
    content: Pause
  '7':
  - type: text
    content: O Eternel, ╵dans ta colère, lève-toi,
  - type: text
    content: dresse-toi contre la furie ╵de ceux qui sont mes adversaires
  - type: text
    content: entre en action en ma faveur, ╵toi qui as établi le droit.
  '8':
  - type: text
    content: Que les peuples s’assemblent ╵autour de toi,
  - type: text
    content: et toi, domine-les ╵des hauteurs de ton trône.
  '9':
  - type: text
    content: O Eternel, ╵toi le juge des peuples,
  - type: text
    content: rends-moi justice, ╵et agis selon ma droiture !
  - type: text
    content: Qu’il me soit fait ╵selon mon innocence !
