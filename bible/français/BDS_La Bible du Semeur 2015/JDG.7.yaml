document_id: JDG.7,21
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Gédéon et les trois cents soldats
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: Le lendemain matin, Yeroubbaal, c’est-à-dire Gédéon, se mit en route avec toutes ses troupes et ils établirent leur camp près de Eyn-Harod. L’armée des Madianites était campée plus au nord dans la vallée qui s’étend au pied de la colline de Moré
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '7.1 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: De l’autre côté de la vallée de Jizréel, à une quinzaine de kilomètres des Israélites.
      marker-yv: yv-n
    - type: text
      text: '. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Cependant, si tu as peur d’y aller, vas-y d’abord avec ton serviteur Poura. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ecoute ce qu’ils disent, et cela t’encouragera ; tu descendras ensuite attaquer le camp.
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Gédéon descendit donc avec son serviteur Poura jusqu’aux avant-postes du camp. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Les Madianites, les Amalécites et les nomades de l’Orient étaient répandus dans la vallée en aussi grand nombre qu’une nuée de sauterelles, et leurs chameaux étaient innombrables comme le sable au bord de la mer. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Gédéon s’approcha et il entendit un homme raconter un rêve à son camarade.
  - type: usfm
    marker: p
    children:
    - type: text
      text: – Ecoute, disait-il, j’ai fait un rêve. Je voyais une miche de pain d’orge rouler à travers le camp de Madian ; arrivée à la tente, elle l’a frappée de plein fouet, l’a fait tomber et l’a renversée sens dessus dessous, si bien que la tente était par terre.
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Son camarade répondit : Cela ne représente rien d’autre que l’épée de Gédéon, fils de Joas, homme d’Israël à qui Dieu donne la victoire sur Madian et toute l’armée.'
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Lorsque Gédéon eut entendu le récit du rêve et son interprétation, il se prosterna, puis il retourna au camp d’Israël et cria : Tout le monde debout, car l’Eternel vous donne la victoire sur l’armée de Madian !'
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Gédéon divisa les trois cents hommes en trois groupes et remit à chaque soldat un cor et une cruche vide dans laquelle fut mise une torche allumée. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Il leur dit : Vous me regarderez faire et vous ferez exactement comme moi. Je vais m’avancer jusqu’aux abords du camp. Quand j’y serai arrivé, vous n’aurez qu’à m’imiter. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Quand je sonnerai du cor avec ceux de mon groupe, vous sonnerez aussi du cor tout autour du camp et vous crierez : « Pour l’Eternel et pour Gédéon ! »'
  - type: usfm
    marker: s1
    children:
    - type: text
      text: L’Eternel donne la victoire
    marker-yv: yv-h
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Peu avant minuit, Gédéon et les cent hommes de son groupe arrivèrent aux abords du camp. On venait juste de remplacer les sentinelles. Soudain, ils sonnèrent du cor et cassèrent les cruches qu’ils tenaient à la main. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'L’Eternel dit à Gédéon : Ton armée est trop nombreuse pour que je te donne la victoire sur les Madianites. Sinon les Israélites s’en vanteraient à mes dépens, en pensant que c’est par leurs propres forces qu’ils se sont délivrés. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Les trois groupes sonnèrent du cor et cassèrent leurs cruches. De la main gauche, ils brandirent les torches, et de la droite ils tenaient les cors pour en sonner, et ils crièrent : « A vos épées, pour l’Eternel et pour Gédéon ! » '
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'tout en restant chacun à sa place autour du camp. Les hommes dans le camp se mirent à courir, à crier et à se sauver. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Les trois cents Israélites continuèrent à sonner du cor, et l’Eternel fit que dans tout le camp chacun tourne son épée contre son compagnon. Finalement, ils s’enfuirent tous jusqu’à Beth-Shitta, du côté de Tseréra et jusqu’aux abords de Abel-Mehola près de Tabbath.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Des troupes israélites viennent en renfort
    marker-yv: yv-h
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Les hommes d’Israël se rassemblèrent, ceux des tribus de Nephtali, d’Aser et de tout Manassé s’unirent et se lancèrent à la poursuite des Madianites. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Gédéon envoya des messagers dans toute la région montagneuse d’Ephraïm pour faire dire aux hommes de descendre afin de couper la retraite aux Madianites en occupant tous les points d’eau jusqu’à Beth-Bara et tous les gués le long du Jourdain. Tous les hommes d’Ephraïm se rassemblèrent et occupèrent les points d’eau jusqu’à Beth-Bara et les gués du Jourdain. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ils capturèrent deux chefs madianites appelés Oreb et Zéeb. Ils tuèrent le premier au rocher d’Oreb et le second au pressoir de Zéeb. Ils poursuivirent les Madianites et rapportèrent les têtes d’Oreb et de Zéeb à Gédéon qui se trouvait alors à l’est du Jourdain.
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fais donc la proclamation suivante à tes troupes : « Qui d’entre vous a peur au point de trembler'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '7.3 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'En hébreu, le verbe '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'trembler '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: fait jeu de mots avec le nom Harod (v. 1).
      marker-yv: yv-n
    - type: text
      text: '  ? Qu’il s’éloigne du mont Galaad'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '7.3 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Le mont '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'Galaad '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: se trouve à l’est du Jourdain. Peut-être ce mot désignait-il aussi le mont Guilboa.
      marker-yv: yv-n
    - type: text
      text: ' et rentre chez lui. »'
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Vingt-deux mille hommes de son armée s’en allèrent, et il en resta dix mille. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Mais l’Eternel dit à Gédéon : Les troupes sont encore trop nombreuses. Fais-les descendre au bord du torrent, et là je les trierai pour toi. Ceux que je désignerai pour t’accompagner iront avec toi, mais ceux dont je te dirai qu’ils ne doivent pas t’accompagner n’iront pas avec toi.'
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Gédéon fit descendre ses hommes au bord du torrent, et l’Eternel lui dit : Tu mettras d’un côté tous ceux qui lapent l’eau avec la langue comme les chiens, et de l’autre côté ceux qui s’agenouillent pour boire.'
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Il y eut trois cents hommes qui prirent de l’eau dans leurs mains pour la porter à leur bouche et la laper, et tous les autres s’agenouillèrent pour boire. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'L’Eternel dit à Gédéon : C’est avec ces trois cents hommes qui ont lapé l’eau dans leurs mains que je vous délivrerai des Madianites en vous donnant la victoire sur eux. Que tous les autres rentrent chez eux !'
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Les trois cents hommes reçurent les provisions et les cors des autres et Gédéon renvoya le gros des hommes d’Israël chez eux, en ne retenant que les trois cents hommes. Or, le camp des Madianites était en dessous du sien dans la vallée.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Le rêve du soldat ennemi
    marker-yv: yv-h
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Cette nuit-là, l’Eternel dit à Gédéon : Va, descends attaquer le camp madianite, car je le livre en ton pouvoir. '
