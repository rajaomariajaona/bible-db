document_id: JDG.7,21
type_code: fra
verses:
  '1':
  - type: heading
    content: Gédéon et les trois cents soldats
  - type: text
    content: Le lendemain matin, Yeroubbaal, c’est-à-dire Gédéon, se mit en route avec toutes ses troupes et ils établirent leur camp près de Eyn-Harod. L’armée des Madianites était campée plus au nord dans la vallée qui s’étend au pied de la colline de Moré
  - type: note
    content: De l’autre côté de la vallée de Jizréel, à une quinzaine de kilomètres des Israélites.
  - type: text
    content: '. '
  '10':
  - type: text
    content: 'Cependant, si tu as peur d’y aller, vas-y d’abord avec ton serviteur Poura. '
  '11':
  - type: text
    content: Ecoute ce qu’ils disent, et cela t’encouragera ; tu descendras ensuite attaquer le camp.
  - type: text
    content: 'Gédéon descendit donc avec son serviteur Poura jusqu’aux avant-postes du camp. '
  '12':
  - type: text
    content: 'Les Madianites, les Amalécites et les nomades de l’Orient étaient répandus dans la vallée en aussi grand nombre qu’une nuée de sauterelles, et leurs chameaux étaient innombrables comme le sable au bord de la mer. '
  '13':
  - type: text
    content: Gédéon s’approcha et il entendit un homme raconter un rêve à son camarade.
  - type: text
    content: – Ecoute, disait-il, j’ai fait un rêve. Je voyais une miche de pain d’orge rouler à travers le camp de Madian ; arrivée à la tente, elle l’a frappée de plein fouet, l’a fait tomber et l’a renversée sens dessus dessous, si bien que la tente était par terre.
  '14':
  - type: text
    content: 'Son camarade répondit : Cela ne représente rien d’autre que l’épée de Gédéon, fils de Joas, homme d’Israël à qui Dieu donne la victoire sur Madian et toute l’armée.'
  '15':
  - type: text
    content: 'Lorsque Gédéon eut entendu le récit du rêve et son interprétation, il se prosterna, puis il retourna au camp d’Israël et cria : Tout le monde debout, car l’Eternel vous donne la victoire sur l’armée de Madian !'
  '16':
  - type: text
    content: 'Gédéon divisa les trois cents hommes en trois groupes et remit à chaque soldat un cor et une cruche vide dans laquelle fut mise une torche allumée. '
  '17':
  - type: text
    content: 'Il leur dit : Vous me regarderez faire et vous ferez exactement comme moi. Je vais m’avancer jusqu’aux abords du camp. Quand j’y serai arrivé, vous n’aurez qu’à m’imiter. '
  '18':
  - type: text
    content: 'Quand je sonnerai du cor avec ceux de mon groupe, vous sonnerez aussi du cor tout autour du camp et vous crierez : « Pour l’Eternel et pour Gédéon ! »'
  - type: heading
    content: L’Eternel donne la victoire
  '19':
  - type: text
    content: 'Peu avant minuit, Gédéon et les cent hommes de son groupe arrivèrent aux abords du camp. On venait juste de remplacer les sentinelles. Soudain, ils sonnèrent du cor et cassèrent les cruches qu’ils tenaient à la main. '
  '2':
  - type: text
    content: 'L’Eternel dit à Gédéon : Ton armée est trop nombreuse pour que je te donne la victoire sur les Madianites. Sinon les Israélites s’en vanteraient à mes dépens, en pensant que c’est par leurs propres forces qu’ils se sont délivrés. '
  '20':
  - type: text
    content: 'Les trois groupes sonnèrent du cor et cassèrent leurs cruches. De la main gauche, ils brandirent les torches, et de la droite ils tenaient les cors pour en sonner, et ils crièrent : « A vos épées, pour l’Eternel et pour Gédéon ! » '
  '21':
  - type: text
    content: 'tout en restant chacun à sa place autour du camp. Les hommes dans le camp se mirent à courir, à crier et à se sauver. '
  '22':
  - type: text
    content: Les trois cents Israélites continuèrent à sonner du cor, et l’Eternel fit que dans tout le camp chacun tourne son épée contre son compagnon. Finalement, ils s’enfuirent tous jusqu’à Beth-Shitta, du côté de Tseréra et jusqu’aux abords de Abel-Mehola près de Tabbath.
  - type: heading
    content: Des troupes israélites viennent en renfort
  '23':
  - type: text
    content: 'Les hommes d’Israël se rassemblèrent, ceux des tribus de Nephtali, d’Aser et de tout Manassé s’unirent et se lancèrent à la poursuite des Madianites. '
  '24':
  - type: text
    content: 'Gédéon envoya des messagers dans toute la région montagneuse d’Ephraïm pour faire dire aux hommes de descendre afin de couper la retraite aux Madianites en occupant tous les points d’eau jusqu’à Beth-Bara et tous les gués le long du Jourdain. Tous les hommes d’Ephraïm se rassemblèrent et occupèrent les points d’eau jusqu’à Beth-Bara et les gués du Jourdain. '
  '25':
  - type: text
    content: Ils capturèrent deux chefs madianites appelés Oreb et Zéeb. Ils tuèrent le premier au rocher d’Oreb et le second au pressoir de Zéeb. Ils poursuivirent les Madianites et rapportèrent les têtes d’Oreb et de Zéeb à Gédéon qui se trouvait alors à l’est du Jourdain.
  '3':
  - type: text
    content: 'Fais donc la proclamation suivante à tes troupes : « Qui d’entre vous a peur au point de trembler'
  - type: note
    content: En hébreu, le verbe trembler fait jeu de mots avec le nom Harod (v. 1).
  - type: text
    content: '  ? Qu’il s’éloigne du mont Galaad'
  - type: note
    content: Le mont Galaad se trouve à l’est du Jourdain. Peut-être ce mot désignait-il aussi le mont Guilboa.
  - type: text
    content: ' et rentre chez lui. »'
  - type: text
    content: 'Vingt-deux mille hommes de son armée s’en allèrent, et il en resta dix mille. '
  '4':
  - type: text
    content: 'Mais l’Eternel dit à Gédéon : Les troupes sont encore trop nombreuses. Fais-les descendre au bord du torrent, et là je les trierai pour toi. Ceux que je désignerai pour t’accompagner iront avec toi, mais ceux dont je te dirai qu’ils ne doivent pas t’accompagner n’iront pas avec toi.'
  '5':
  - type: text
    content: 'Gédéon fit descendre ses hommes au bord du torrent, et l’Eternel lui dit : Tu mettras d’un côté tous ceux qui lapent l’eau avec la langue comme les chiens, et de l’autre côté ceux qui s’agenouillent pour boire.'
  '6':
  - type: text
    content: 'Il y eut trois cents hommes qui prirent de l’eau dans leurs mains pour la porter à leur bouche et la laper, et tous les autres s’agenouillèrent pour boire. '
  '7':
  - type: text
    content: 'L’Eternel dit à Gédéon : C’est avec ces trois cents hommes qui ont lapé l’eau dans leurs mains que je vous délivrerai des Madianites en vous donnant la victoire sur eux. Que tous les autres rentrent chez eux !'
  '8':
  - type: text
    content: Les trois cents hommes reçurent les provisions et les cors des autres et Gédéon renvoya le gros des hommes d’Israël chez eux, en ne retenant que les trois cents hommes. Or, le camp des Madianites était en dessous du sien dans la vallée.
  - type: heading
    content: Le rêve du soldat ennemi
  '9':
  - type: text
    content: 'Cette nuit-là, l’Eternel dit à Gédéon : Va, descends attaquer le camp madianite, car je le livre en ton pouvoir. '
