document_id: 1CO.8,21
type_code: fra
verses:
  '1':
  - type: heading
    content: Sur les viandes sacrifiées aux idoles
  - type: text
    content: Passons au problème
  - type: note
    content: Voir note 7.1.
  - type: text
    content: ' des viandes provenant d’animaux sacrifiés aux idoles'
  - type: note
    content: Ces viandes provenaient des animaux offerts en sacrifice dans les temples païens. Une partie de la viande était consommée sur place, une autre était donnée aux prêtres, ce qui restait était rendu aux offrants ou vendu au marché (10.25). Certains chrétiens se demandaient si ce n’était pas participer à l’idolâtrie que de consommer des viandes (achetées au marché) qui avaient été offertes aux idoles (voir Ac 15.29).
  - type: text
    content: '. Nous possédons tous la connaissance voulue, nous le savons. Mais la connaissance rend orgueilleux. L’amour, lui, fait grandir dans la foi. '
  '10':
  - type: text
    content: Supposons, en effet, que l’un d’eux te voie, toi, qui as la connaissance, assis à table dans un temple d’idoles
  - type: note
    content: Les païens invitaient leurs amis aux repas de sacrifice dans les temples d’idoles.
  - type: text
    content: '. Sa conscience ne va-t-elle pas l’encourager, lui qui est mal affermi, à manger des viandes sacrifiées aux idoles ? '
  '11':
  - type: text
    content: 'Ainsi, à cause de ta connaissance, ce chrétien mal affermi va courir à sa perte. Et pourtant, c’est un frère ou une sœur pour qui Christ a donné sa vie ! '
  '12':
  - type: text
    content: 'Si vous péchez de la sorte envers des frères ou des sœurs, en blessant leur conscience qui est faible, vous péchez contre Christ lui-même. '
  '13':
  - type: text
    content: C’est pourquoi, si ce que je mange devait causer la chute de mon frère ou de ma sœur, j’y renoncerais à tout jamais, afin de ne pas être pour lui une occasion de chute.
  '2':
  - type: text
    content: 'Celui qui s’imagine avoir de la connaissance ne connaît pas encore comme on doit connaître. '
  '3':
  - type: text
    content: 'Mais celui qui aime Dieu, celui-là est connu de Dieu. '
  '4':
  - type: text
    content: 'Qu’en est-il donc de la question de la consommation des viandes sacrifiées aux idoles ? Nous savons qu’il n’existe pas d’idoles dans le monde et qu’il n’y a qu’un seul Dieu. '
  '5':
  - type: text
    content: 'Certes, bien des êtres célestes ou terrestres sont considérés comme des divinités, de sorte qu’il y a de nombreux dieux ou seigneurs. '
  '6':
  - type: text
    content: 'Mais pour ce qui nous concerne, il n’y a qu’un seul Dieu : le Père, de qui toute chose vient, et pour qui nous vivons, et il n’y a qu’un seul Seigneur : Jésus-Christ, par qui tout existe et par qui nous sommes.'
  '7':
  - type: text
    content: 'Mais tous les chrétiens n’ont pas encore bien assimilé ces vérités. Quelques-uns, encore marqués par leur habitude de rendre un culte aux idoles, continuent à manger ces viandes avec la pensée qu’elles ont été offertes à des idoles. Alors leur conscience, qui est faible, se charge de culpabilité. '
  '8':
  - type: text
    content: 'Mais ce n’est pas un aliment qui peut nous rapprocher de Dieu ; en manger ou pas ne nous rendra ni meilleurs, ni pires. '
  '9':
  - type: text
    content: 'Toutefois, faites bien attention à ce que votre liberté ne cause pas la chute de ceux qui sont mal affermis dans la foi. '
