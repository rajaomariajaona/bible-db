document_id: 2CO.4,21
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Un trésor dans des vases d’argile
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Ainsi, puisque tel est le ministère que Dieu nous a confié dans sa bonté, nous ne perdons pas courage. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'Oui, nous portons toujours et en tout lieu, dans notre corps, la mort de Jésus, afin que la vie de Jésus soit, elle aussi, rendue manifeste par notre corps. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: Car sans cesse, nous qui vivons, nous sommes exposés à la mort à cause de Jésus, afin que la vie de Jésus soit aussi rendue manifeste dans notre corps mortel.
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'Ainsi, la mort fait son œuvre en nous, et la vie en vous. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'Nous sommes animés de ce même esprit de foi dont il est question dans cette parole de l’Ecriture : '
    - type: usfm
      marker: qt
      children:
      - type: text
        text: J’ai cru, voilà pourquoi j’ai parlé
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '4.13 '
      - type: usfm
        marker: ft
        children:
        - type: usfm
          marker: ref
          children:
          - type: text
            text: Ps 116.10
        - type: text
          text: ' cité selon l’ancienne version grecque.'
      marker-yv: yv-n
    - type: text
      text: '. Nous aussi nous croyons, et c’est pour cela que nous parlons. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: Nous savons en effet que Dieu, qui a ressuscité le Seigneur Jésus, nous ressuscitera aussi avec Jésus, et nous fera paraître, avec vous, en sa présence.
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: Ainsi, tout ce que nous endurons, c’est à cause de vous, pour que la grâce abonde en atteignant des hommes toujours plus nombreux, et qu’ainsi augmente le nombre des prières de reconnaissance à la gloire de Dieu.
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: Voilà pourquoi nous ne perdons pas courage. Et même si notre être extérieur se détériore peu à peu, intérieurement, nous sommes renouvelés de jour en jour.
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'En effet, nos détresses présentes sont passagères et légères par rapport au poids insurpassable de gloire éternelle qu’elles nous préparent. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: Et nous ne portons pas notre attention sur les choses visibles, mais sur les réalités encore invisibles. Car les réalités visibles ne durent qu’un temps, mais les invisibles demeureront éternellement.
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: Nous rejetons les intrigues et les procédés indignes. Nous ne recourons pas à la ruse et nous ne falsifions pas la Parole de Dieu. Au contraire, en faisant connaître la vérité, nous nous en remettons devant Dieu au jugement de tout homme.
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'Et si notre Evangile demeure « voilé », il ne l’est que pour ceux qui vont à la perdition, '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: pour les incrédules. Le dieu de ce monde a aveuglé leur esprit et les empêche ainsi de voir briller la lumière de l’Evangile qui fait resplendir la gloire de Christ, lui qui est l’image de Dieu.
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'Ce n’est pas nous-mêmes que nous mettons en avant dans notre prédication, c’est le Seigneur Jésus-Christ. Nous-mêmes, nous sommes vos serviteurs à cause de Jésus. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'En effet, le même Dieu qui, un jour, a dit : '
    - type: usfm
      marker: qt
      children:
      - type: text
        text: Que la lumière brille du sein des ténèbres
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '4.6 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Voir Gn 1.3 ; Es 9.1.
      marker-yv: yv-n
    - type: usfm
      marker: qt
      children:
      - type: text
        text: ','
    - type: text
      text: ' a lui-même brillé dans notre cœur pour y faire resplendir la connaissance de la gloire de Dieu qui rayonne du visage de Jésus-Christ.'
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: Mais ce trésor, nous le portons dans des vases faits d’argile, pour que ce soit la puissance extraordinaire de Dieu qui se manifeste, et non notre propre capacité.
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'Ainsi, nous sommes accablés par toutes sortes de détresses et cependant jamais écrasés. Nous sommes désemparés, mais non désespérés, '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: persécutés, mais non abandonnés, terrassés, mais non pas anéantis.
