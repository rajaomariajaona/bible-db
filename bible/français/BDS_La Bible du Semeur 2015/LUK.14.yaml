document_id: LUK.14,21
type_code: fra
verses:
  '1':
  - type: heading
    content: Nouvelle guérison le jour du sabbat
  - type: text
    content: 'Un jour de sabbat, Jésus était invité pour un repas chez l’un des dirigeants du parti pharisien. Ceux qui étaient à table avec lui l’observaient attentivement. '
  '10':
  - type: text
    content: 'Non, quand tu es invité, va, au contraire, te mettre tout de suite à la dernière place. Alors, quand ton hôte entrera dans la salle, il te dira : « Mon ami, il y a une place bien meilleure pour toi, viens t’asseoir plus haut ! » Ainsi tu seras honoré devant tous les convives.'
  '11':
  - type: text
    content: ' '
  - type: text
    content: En effet, celui qui s’élève sera abaissé, et celui qui s’abaisse sera élevé.
  '12':
  - type: text
    content: 'Jésus dit aussi à son hôte : '
  - type: text
    content: Quand tu donnes un déjeuner ou un dîner, n’invite pas tes amis, tes frères, ta parenté ou de riches voisins, car ils pourraient t’inviter à leur tour et te payer ainsi de ta peine.
  - type: text
    content: ' '
  '13':
  - type: text
    content: Non, si tu donnes une réception, invite des pauvres, des estropiés, des paralysés, des aveugles.
  - type: text
    content: ' '
  '14':
  - type: text
    content: Si tu fais cela, tu en seras très heureux, parce que ces gens-là n’ont pas la possibilité de te rendre la pareille. Et Dieu te le revaudra lorsque les justes ressusciteront.
  - type: heading
    content: La parabole des invités
  - type: heading
    content: (Mt 22.1-10)
  '15':
  - type: text
    content: 'A ces mots, l’un des convives dit à Jésus : Heureux celui qui prendra part au banquet dans le royaume de Dieu !'
  '16':
  - type: text
    content: 'Jésus lui répondit : '
  - type: text
    content: Un jour, un homme avait organisé une grande réception. Il avait invité beaucoup de monde.
  - type: text
    content: ' '
  '17':
  - type: text
    content: 'Lorsque le moment du festin arriva, il envoya son serviteur dire aux invités : « Venez maintenant, tout est prêt'
  - type: note
    content: 'Certains manuscrits ont : c’est prêt (voir Mt 22.4).'
  - type: text
    content: . »
  '18':
  - type: text
    content: ' '
  - type: text
    content: Mais ceux-ci s’excusèrent tous l’un après l’autre.
  - type: text
    content: 'Le premier lui fit dire : « J’ai acheté un champ et il faut absolument que j’aille le voir. Excuse-moi, je te prie. »'
  '19':
  - type: text
    content: ' '
  - type: text
    content: 'Un autre dit : « Je viens d’acquérir cinq paires de bœufs, et je m’en vais les essayer. Excuse-moi, je te prie. »'
  '2':
  - type: text
    content: 'Or, il y avait là un homme dont le corps était couvert d’œdèmes. '
  '20':
  - type: text
    content: ' '
  - type: text
    content: 'Un autre encore dit : « Je viens de me marier, il m’est donc impossible de venir. »'
  '21':
  - type: text
    content: ' '
  - type: text
    content: 'Quand le serviteur fut de retour auprès de son maître, il lui rapporta toutes les excuses qu’on lui avait données. Alors le maître de la maison se mit en colère et dit à son serviteur : « Dépêche-toi ! Va-t’en sur les places et dans les rues de la ville et amène ici les pauvres, les estropiés, les aveugles, les paralysés… ! »'
  '22':
  - type: text
    content: ' '
  - type: text
    content: 'Au bout d’un moment, le serviteur vint dire : « Maître, j’ai fait ce que tu m’as dit, mais il y a encore de la place.'
  '23':
  - type: text
    content: ' '
  - type: text
    content: – Eh bien, lui dit le maître, va sur les chemins, le long des haies, fais en sorte que les gens viennent, pour que ma maison soit pleine.
  - type: text
    content: ' '
  '24':
  - type: text
    content: 'Une chose est sûre : pas un seul des premiers invités ne goûtera à mon festin. »'
  - type: heading
    content: S’engager en pleine conscience
  '25':
  - type: text
    content: 'Comme de grandes foules accompagnaient Jésus, il se retourna vers ceux qui le suivaient et leur dit : '
  '26':
  - type: text
    content: 'Si quelqu’un vient à moi et n’est pas prêt à renoncer à son père, sa mère, sa femme, ses enfants, ses frères, ses sœurs, et même à sa propre vie, il ne peut être mon '
  - type: text
    content: disciple
  - type: text
    content: .
  - type: text
    content: ' '
  '27':
  - type: text
    content: Celui qui ne porte pas sa croix, et qui ne me suit pas, ne peut être mon disciple.
  - type: text
    content: ' '
  '28':
  - type: text
    content: En effet, si l’un de vous veut bâtir une tour, est-ce qu’il ne prend pas d’abord le temps de s’asseoir pour calculer ce qu’elle lui coûtera et de vérifier s’il a les moyens de mener son entreprise à bonne fin ?
  - type: text
    content: ' '
  '29':
  - type: text
    content: Sans quoi, s’il n’arrive pas à terminer sa construction après avoir posé les fondations, il risque d’être la risée de tous les témoins de son échec.
  - type: text
    content: ' '
  '3':
  - type: text
    content: 'Jésus prit la parole et s’adressa aux enseignants de la Loi et aux pharisiens : '
  - type: text
    content: Est-il permis, oui ou non, de guérir quelqu’un le jour du sabbat ?
  '30':
  - type: text
    content: « Regardez, diront-ils, en voilà un qui a commencé à construire et qui n’a pas pu terminer ! »
  '31':
  - type: text
    content: ' '
  - type: text
    content: Ou bien, supposez qu’un roi soit sur le point de partir en guerre contre un autre. Ne prendra-t-il pas le temps de s’asseoir pour examiner s’il peut, avec dix mille hommes, affronter celui qui est sur le point de marcher contre lui avec vingt mille ?
  - type: text
    content: ' '
  '32':
  - type: text
    content: S’il se rend compte qu’il en est incapable, il lui enverra une délégation, pendant que l’ennemi est encore loin, pour négocier la paix avec lui.
  '33':
  - type: text
    content: ' '
  - type: text
    content: Il en est de même pour vous ; celui qui n’est pas prêt à abandonner tout ce qu’il possède, ne peut pas être mon disciple.
  - type: heading
    content: (Mc 9.50)
  '34':
  - type: text
    content: ' '
  - type: text
    content: Le sel est une bonne chose, mais s’il devient insipide, comment lui rendra-t-on sa saveur ?
  - type: text
    content: ' '
  '35':
  - type: text
    content: On ne peut plus l’utiliser, ni pour la terre, ni pour le fumier. Il n’y a plus qu’à le jeter. Celui qui a des oreilles pour entendre, qu’il entende !
  '4':
  - type: text
    content: Ils ne répondirent rien.
  - type: text
    content: 'Alors Jésus, saisissant le malade, le guérit et lui dit de rentrer chez lui. '
  '5':
  - type: text
    content: 'Puis, se tournant vers ceux qui étaient là, il leur demanda : '
  - type: text
    content: Qui de vous, si son fils ou son bœuf tombe dans un puits, ne l’en retire pas le plus tôt possible, même si c’est le jour du sabbat ?
  '6':
  - type: text
    content: Là encore, ils ne surent que répondre.
  - type: heading
    content: Leçons d’humilité et de générosité
  '7':
  - type: text
    content: 'Ayant remarqué comment les invités cherchaient tous les places d’honneur, il leur dit cette parabole : '
  '8':
  - type: text
    content: Si quelqu’un t’invite à un repas de noces, ne va pas t’installer à la place d’honneur. Peut-être y a-t-il, parmi les invités, un personnage plus important que toi
  - type: text
    content: ' '
  '9':
  - type: text
    content: 'et celui qui vous a invités l’un et l’autre viendra-t-il te dire : « Cède-lui cette place. » Il te faudra alors honteusement gagner la dernière place !'
  - type: text
    content: ' '
