document_id: LUK.14,21
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Nouvelle guérison le jour du sabbat
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Un jour de sabbat, Jésus était invité pour un repas chez l’un des dirigeants du parti pharisien. Ceux qui étaient à table avec lui l’observaient attentivement. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'Non, quand tu es invité, va, au contraire, te mettre tout de suite à la dernière place. Alors, quand ton hôte entrera dans la salle, il te dira : « Mon ami, il y a une place bien meilleure pour toi, viens t’asseoir plus haut ! » Ainsi tu seras honoré devant tous les convives.'
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: ' '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: En effet, celui qui s’élève sera abaissé, et celui qui s’abaisse sera élevé.
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'Jésus dit aussi à son hôte : '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Quand tu donnes un déjeuner ou un dîner, n’invite pas tes amis, tes frères, ta parenté ou de riches voisins, car ils pourraient t’inviter à leur tour et te payer ainsi de ta peine.
    - type: text
      text: ' '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Non, si tu donnes une réception, invite des pauvres, des estropiés, des paralysés, des aveugles.
    - type: text
      text: ' '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Si tu fais cela, tu en seras très heureux, parce que ces gens-là n’ont pas la possibilité de te rendre la pareille. Et Dieu te le revaudra lorsque les justes ressusciteront.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: La parabole des invités
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: (Mt 22.1-10)
    marker-yv: yv-h
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'A ces mots, l’un des convives dit à Jésus : Heureux celui qui prendra part au banquet dans le royaume de Dieu !'
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'Jésus lui répondit : '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Un jour, un homme avait organisé une grande réception. Il avait invité beaucoup de monde.
    - type: text
      text: ' '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'Lorsque le moment du festin arriva, il envoya son serviteur dire aux invités : « Venez maintenant, tout est prêt'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '14.17 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Certains manuscrits ont : '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'c’est prêt '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '(voir '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: Mt 22.4
        - type: text
          text: ).
      marker-yv: yv-n
    - type: usfm
      marker: wj
      children:
      - type: text
        text: . »
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: ' '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Mais ceux-ci s’excusèrent tous l’un après l’autre.
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'Le premier lui fit dire : « J’ai acheté un champ et il faut absolument que j’aille le voir. Excuse-moi, je te prie. »'
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: ' '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'Un autre dit : « Je viens d’acquérir cinq paires de bœufs, et je m’en vais les essayer. Excuse-moi, je te prie. »'
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'Or, il y avait là un homme dont le corps était couvert d’œdèmes. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: ' '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'Un autre encore dit : « Je viens de me marier, il m’est donc impossible de venir. »'
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: ' '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'Quand le serviteur fut de retour auprès de son maître, il lui rapporta toutes les excuses qu’on lui avait données. Alors le maître de la maison se mit en colère et dit à son serviteur : « Dépêche-toi ! Va-t’en sur les places et dans les rues de la ville et amène ici les pauvres, les estropiés, les aveugles, les paralysés… ! »'
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: ' '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'Au bout d’un moment, le serviteur vint dire : « Maître, j’ai fait ce que tu m’as dit, mais il y a encore de la place.'
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: ' '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: – Eh bien, lui dit le maître, va sur les chemins, le long des haies, fais en sorte que les gens viennent, pour que ma maison soit pleine.
    - type: text
      text: ' '
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'Une chose est sûre : pas un seul des premiers invités ne goûtera à mon festin. »'
  - type: usfm
    marker: s1
    children:
    - type: text
      text: S’engager en pleine conscience
    marker-yv: yv-h
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: 'Comme de grandes foules accompagnaient Jésus, il se retourna vers ceux qui le suivaient et leur dit : '
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'Si quelqu’un vient à moi et n’est pas prêt à renoncer à son père, sa mère, sa femme, ses enfants, ses frères, ses sœurs, et même à sa propre vie, il ne peut être mon '
      - type: usfm
        marker: w
        children:
        - type: text
          text: disciple
      - type: text
        text: .
    - type: text
      text: ' '
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Celui qui ne porte pas sa croix, et qui ne me suit pas, ne peut être mon disciple.
    - type: text
      text: ' '
  '28':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: usfm
      marker: wj
      children:
      - type: text
        text: En effet, si l’un de vous veut bâtir une tour, est-ce qu’il ne prend pas d’abord le temps de s’asseoir pour calculer ce qu’elle lui coûtera et de vérifier s’il a les moyens de mener son entreprise à bonne fin ?
    - type: text
      text: ' '
  '29':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Sans quoi, s’il n’arrive pas à terminer sa construction après avoir posé les fondations, il risque d’être la risée de tous les témoins de son échec.
    - type: text
      text: ' '
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'Jésus prit la parole et s’adressa aux enseignants de la Loi et aux pharisiens : '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Est-il permis, oui ou non, de guérir quelqu’un le jour du sabbat ?
  '30':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '30'
    - type: usfm
      marker: wj
      children:
      - type: text
        text: « Regardez, diront-ils, en voilà un qui a commencé à construire et qui n’a pas pu terminer ! »
  '31':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '31'
    - type: text
      text: ' '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Ou bien, supposez qu’un roi soit sur le point de partir en guerre contre un autre. Ne prendra-t-il pas le temps de s’asseoir pour examiner s’il peut, avec dix mille hommes, affronter celui qui est sur le point de marcher contre lui avec vingt mille ?
    - type: text
      text: ' '
  '32':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '32'
    - type: usfm
      marker: wj
      children:
      - type: text
        text: S’il se rend compte qu’il en est incapable, il lui enverra une délégation, pendant que l’ennemi est encore loin, pour négocier la paix avec lui.
  '33':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '33'
    - type: text
      text: ' '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Il en est de même pour vous ; celui qui n’est pas prêt à abandonner tout ce qu’il possède, ne peut pas être mon disciple.
  - type: usfm
    marker: r
    children:
    - type: text
      text: (Mc 9.50)
    marker-yv: yv-h
  '34':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '34'
    - type: text
      text: ' '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Le sel est une bonne chose, mais s’il devient insipide, comment lui rendra-t-on sa saveur ?
    - type: text
      text: ' '
  '35':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '35'
    - type: usfm
      marker: wj
      children:
      - type: text
        text: On ne peut plus l’utiliser, ni pour la terre, ni pour le fumier. Il n’y a plus qu’à le jeter. Celui qui a des oreilles pour entendre, qu’il entende !
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: Ils ne répondirent rien.
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Alors Jésus, saisissant le malade, le guérit et lui dit de rentrer chez lui. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'Puis, se tournant vers ceux qui étaient là, il leur demanda : '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Qui de vous, si son fils ou son bœuf tombe dans un puits, ne l’en retire pas le plus tôt possible, même si c’est le jour du sabbat ?
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: Là encore, ils ne surent que répondre.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Leçons d’humilité et de générosité
    marker-yv: yv-h
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'Ayant remarqué comment les invités cherchaient tous les places d’honneur, il leur dit cette parabole : '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Si quelqu’un t’invite à un repas de noces, ne va pas t’installer à la place d’honneur. Peut-être y a-t-il, parmi les invités, un personnage plus important que toi
    - type: text
      text: ' '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'et celui qui vous a invités l’un et l’autre viendra-t-il te dire : « Cède-lui cette place. » Il te faudra alors honteusement gagner la dernière place !'
    - type: text
      text: ' '
