document_id: DEU.23,21
type_code: fra
verses:
  '1':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Personne ne prendra pour épouse l’une des femmes de son père et ne portera ainsi atteinte à son père
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '23.1 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Voir Lv 18.8 ; 20.11 ; Dt 27.20.
      marker-yv: yv-n
    - type: text
      text: .
  - type: usfm
    marker: s2
    children:
    - type: text
      text: L’admission dans l’assemblée de l’Eternel
    marker-yv: yv-h
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Lorsque vous partirez en campagne pour faire la guerre à vos ennemis, vous éviterez avec soin tout ce qui est mal. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Si l’un des hommes devient rituellement impur pendant la nuit par suite d’une émission séminale, il se retirera du camp et n’y rentrera pas pendant la journée. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: A l’approche du soir, il se lavera et au coucher du soleil il pourra réintégrer le camp.
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Vous désignerez un endroit, à l’extérieur du camp, où vous pourrez vous retirer pour satisfaire vos besoins naturels. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Chaque soldat aura une pelle dans son équipement et, lorsqu’il se rendra à l’écart, il creusera d’abord un trou et, en partant, il recouvrira ses excréments. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Car l’Eternel votre Dieu parcourt votre camp pour vous protéger et pour vous donner la victoire sur vos ennemis. Tout votre camp doit donc être tenu pour saint et Dieu ne doit y voir rien d’inconvenant qui l’obligerait à se détourner de vous.
  - type: usfm
    marker: s2
    children:
    - type: text
      text: Le droit d’asile
    marker-yv: yv-h
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Si un esclave s’enfuit de chez son maître et vient se réfugier dans votre pays, vous ne le ramènerez pas à son maître. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Il pourra demeurer parmi vous dans votre pays, à l’endroit qui lui plaira, dans l’une de vos villes où il se trouvera bien. Vous ne l’exploiterez pas.
  - type: usfm
    marker: s2
    children:
    - type: text
      text: Interdiction de la prostitution sacrée
    marker-yv: yv-h
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Il n’y aura pas de prostituées sacrées parmi les filles d’Israël, ni d’homme qui se livre à la prostitution sacrée parmi les Israélites
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '23.18 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Voir Lv 19.29 ; Jr 2.20.
      marker-yv: yv-n
    - type: text
      text: '. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Vous n’apporterez jamais dans la maison de l’Eternel votre Dieu, pour l’accomplissement d’un vœu, le salaire de la prostitution d’une femme ou d’un homme, car l’un et l’autre sont en horreur à l’Eternel votre Dieu.
  - type: usfm
    marker: s2
    children:
    - type: text
      text: Les prêts à intérêt
    marker-yv: yv-h
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Aucun homme dont les testicules ont été écrasés, ou dont le membre viril a été mutilé, ne sera admis dans l’assemblée de l’Eternel
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '23.2 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Par cette interdiction, la Loi empêche les eunuques de jouer un rôle religieux prédominant, comme cela se passait dans certaines religions païennes. Ou peut-être cette disposition est-elle liée au fait que le signe de l’alliance, la circoncision, était « porté » sur les organes génitaux.
      marker-yv: yv-n
    - type: text
      text: '. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Lorsque tu prêteras de l’argent, des vivres ou toute autre chose à un compatriote, vous n’exigerez pas d’intérêt de sa part. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Vous pouvez exiger des intérêts lorsque vous faites un prêt à un étranger, mais vous ne prêterez pas à intérêt à vos compatriotes. Alors l’Eternel votre Dieu vous bénira dans tout ce que vous entreprendrez dans le pays où vous allez entrer pour en prendre possession
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '23.21 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Voir Ex 22.24 ; Lv 25.36-37 ; Dt 15.7-11.
      marker-yv: yv-n
    - type: text
      text: .
  - type: usfm
    marker: s2
    children:
    - type: text
      text: Les vœux
    marker-yv: yv-h
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Quand tu auras fait un vœu à l’Eternel votre Dieu, tu n’en différeras pas l’accomplissement, car l’Eternel ton Dieu ne manquerait pas de t’en demander compte, et tu porterais la responsabilité d’une faute
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '23.22 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Voir Nb 30.3 ; Mt 5.33.
      marker-yv: yv-n
    - type: text
      text: '. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'D’ailleurs, tu n’es pas tenu de prononcer un vœu ; si tu t’en abstiens, tu ne seras pas coupable pour cela. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Mais si une promesse a franchi tes lèvres, tu dois la tenir et accomplir le vœu que tu auras librement fait à l’Eternel ton Dieu de ta propre bouche.
  - type: usfm
    marker: s2
    children:
    - type: text
      text: Le droit de grappiller
    marker-yv: yv-h
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Si tu viens à passer par le vignoble de ton prochain, tu pourras manger autant de raisin que tu veux, jusqu’à satiété, mais tu n’en emporteras pas dans ton panier. '
  '26':
  - type: usfm
    marker: p
    children:
    - type: text
      text: De même, si tu traverses le champ de blé mûr de ton prochain, tu pourras cueillir des épis à la main, mais tu n’en couperas pas à la faucille
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '23.26 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Voir Mt 12.1 ; Mc 2.24 ; Lc 6.1.
      marker-yv: yv-n
    - type: text
      text: .
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: L’homme né d’une union illicite, et ses descendants jusqu’à la dixième génération ne seront pas admis dans l’assemblée de l’Eternel
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '23.3 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Voir Lv 18.6-20 ; 20.10-21.
      marker-yv: yv-n
    - type: text
      text: .
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Les Ammonites et les Moabites ne seront jamais admis dans l’assemblée de l’Eternel – pas même leurs descendants de la dixième génération. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: En effet, lorsque vous êtes sortis d’Egypte, ils ne sont pas venus vous accueillir sur votre route avec du pain et de l’eau. Au contraire, ils ont soudoyé contre vous Balaam, fils de Béor, et l’ont fait venir de Petor en Mésopotamie pour vous maudire
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '23.5 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Voir Nb 22.4 à 24.25.
      marker-yv: yv-n
    - type: text
      text: '. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Mais l’Eternel votre Dieu a refusé d’écouter Balaam et il a changé pour vous la malédiction en bénédiction, car l’Eternel votre Dieu vous aime. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Tant que vous vivrez, vous ne conclurez pas de traité de paix et d’amitié avec eux.
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Vous ne considérerez pas les Edomites comme abominables, car c’est un peuple frère
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '23.8 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Les Edomites étaient les descendants d’Esaü, frère de Jacob-Israël (
        - type: usfm
          marker: ref
          children:
          - type: text
            text: Gn 25.25-26
        - type: text
          text: ).
      marker-yv: yv-n
    - type: text
      text: '. Vous ne tiendrez pas non plus les Egyptiens pour abominables, car vous avez séjourné dans leur pays. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Les membres de ces deux peuples pourront entrer dans l’assemblée de l’Eternel à partir de la troisième génération.
  - type: usfm
    marker: s2
    children:
    - type: text
      text: La pureté des campements militaires
    marker-yv: yv-h
