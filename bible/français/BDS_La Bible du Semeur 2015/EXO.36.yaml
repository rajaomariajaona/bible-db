document_id: EXO.36
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Les artisans se mettent au travail
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Betsaléel et Oholiab et tous les hommes habiles que l’Eternel avait doués d’habileté, d’intelligence et de compétence pour exécuter tous les ouvrages à réaliser pour le sanctuaire, exécutèrent tout conformément aux ordres de l’Eternel.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Moïse fit venir Betsaléel et Oholiab et tous les hommes habiles que l’Eternel avait doués d’habileté, et tous ceux dont le cœur était disposé à exécuter les travaux. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Ils reçurent de Moïse toutes les contributions que les Israélites avaient apportées pour exécuter les travaux nécessaires à la construction du sanctuaire. Et chaque matin, on continuait à apporter des offrandes volontaires à Moïse. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Alors tous les artisans habiles qui exécutaient tous les ouvrages du sanctuaire, interrompirent l’un après l’autre leur travail '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'et vinrent dire à Moïse : Le peuple en apporte plus qu’il ne faut pour exécuter l’ouvrage que l’Eternel a commandé de faire.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Là-dessus, Moïse fit passer dans le camp le mot d’ordre suivant : « Que plus personne, ni homme, ni femme, ne prépare d’offrande pour le sanctuaire. » Le peuple cessa donc d’en apporter, '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: car les matériaux étaient en quantité suffisante pour l’ensemble des travaux à réaliser. Il y en avait même en surplus.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Les tentures
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '36.8 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Pour les v. 8-38, voir '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 26.1-37
        metadata:
          usfm: EXO.26.1+EXO.26.2+EXO.26.3+EXO.26.4+EXO.26.5+EXO.26.6+EXO.26.7+EXO.26.8+EXO.26.9+EXO.26.10+EXO.26.11+EXO.26.12+EXO.26.13+EXO.26.14+EXO.26.15+EXO.26.16+EXO.26.17+EXO.26.18+EXO.26.19+EXO.26.20+EXO.26.21+EXO.26.22+EXO.26.23+EXO.26.24+EXO.26.25+EXO.26.26+EXO.26.27+EXO.26.28+EXO.26.29+EXO.26.30+EXO.26.31+EXO.26.32+EXO.26.33+EXO.26.34+EXO.26.35+EXO.26.36+EXO.26.37
      - type: text
        text: '. Les mesures, en hébreu, sont en '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'coudées '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: (une coudée = 50 cm).
    marker-yv: yv-n
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Ainsi les artisans habiles qui étaient à l’ouvrage firent le tabernacle avec dix tentures de fin lin retors, de pourpre violette ou écarlate et de rouge éclatant ornées de chérubins, dans les règles de l’art. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Chaque tenture avait quatorze mètres de long et deux mètres de large. Elles étaient toutes identiques. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Cinq de ces tentures furent cousues l’une à l’autre, et l’on fit de même avec les cinq autres. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Sur le bord de la dernière tenture de chaque assemblage, on fixa des cordons de pourpre violette. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Il y en avait cinquante à l’extrémité de chacun des deux assemblages et les cordons se correspondaient l’un à l’autre. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: On fit aussi cinquante agrafes d’or au moyen desquelles on assembla les deux séries de tentures, de sorte que le tabernacle forma un tout.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'On confectionna aussi onze tentures de poil de chèvre pour recouvrir le tabernacle comme d’une tente. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Ces tentures avaient quinze mètres de long et deux mètres de large. Elles étaient toutes identiques. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'On les assembla cinq d’une part et six de l’autre. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'On fixa cinquante cordons sur le bord de la dernière tenture de chaque assemblage. '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'On fabriqua cinquante agrafes de bronze pour assembler la tente afin qu’elle forme un tout. '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Ensuite, on fit pour la tente une couverture de peaux de béliers teintes en rouge et une couverture de peaux de dauphins par-dessus.
- type: usfm
  marker: s1
  children:
  - type: text
    text: L’armature
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'On fit aussi des cadres en bois d’acacia, posés à la verticale, pour le tabernacle. '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Chaque cadre avait cinq mètres de long et soixante-quinze centimètres de large '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'et était muni de deux tenons parallèles. On fit ainsi pour tous les cadres du tabernacle. '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'On fit vingt cadres pour le côté sud du tabernacle. '
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Pour chacun d’eux, on disposa deux socles d’argent, un pour chaque tenon, soit quarante socles pour les vingt cadres. '
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'On fit de même pour le côté nord du tabernacle : vingt cadres '
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'et quarante socles d’argent, deux pour chaque cadre. '
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'Pour l’arrière du tabernacle, tourné vers l’ouest, on fit six cadres, '
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'plus deux cadres comme contreforts des angles arrières du tabernacle. '
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'Chacun était jumelé avec l’un des cadres des extrémités, depuis le bas, et bien lié avec lui jusqu’à son sommet par un seul anneau ; c’est ainsi qu’on les fit tous deux pour les deux angles. '
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: Il y avait donc en tout huit cadres et seize socles d’argent, deux pour chaque cadre.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'On fit cinq traverses de bois d’acacia pour les cadres d’un côté du tabernacle, '
  - type: usfm
    marker: v
    metadata:
      v: '32'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'cinq traverses pour l’autre côté, et cinq pour le fond à l’ouest. '
  - type: usfm
    marker: v
    metadata:
      v: '33'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: 'Ils firent la traverse médiane qui passait au milieu des cadres, d’une extrémité à l’autre du tabernacle. '
  - type: usfm
    marker: v
    metadata:
      v: '34'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: On plaqua ces cadres d’or et l’on fabriqua des anneaux d’or pour recevoir les traverses que l’on plaqua également d’or.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Le voile et le rideau
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '35'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: 'On fit le voile de pourpre violette et écarlate, de rouge éclatant et de fin lin retors, en l’ornant de chérubins, dans les règles de l’art. '
  - type: usfm
    marker: v
    metadata:
      v: '36'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: 'Pour le suspendre, on tailla quatre piliers d’acacia que l’on plaqua d’or ; ils étaient munis de crochets d’or et reposaient sur quatre socles d’argent. '
  - type: usfm
    marker: v
    metadata:
      v: '37'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: 'On confectionna pour l’entrée de la tente un rideau de pourpre violette et écarlate, de rouge éclatant et de fin lin retors, en ouvrage de broderie. '
  - type: usfm
    marker: v
    metadata:
      v: '38'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: text
    text: On fit, pour l’y suspendre, cinq piliers avec leurs crochets ; on plaqua d’or leurs chapiteaux et leurs tringles ; leurs cinq socles étaient en bronze.
