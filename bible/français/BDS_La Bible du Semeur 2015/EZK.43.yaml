document_id: EZK.43,21
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s2
    children:
    - type: text
      text: Le Seigneur vient dans son temple
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Puis le personnage me conduisit vers la porte orientale. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Quant à toi, fils d’homme, décris ce temple à la communauté d’Israël pour qu’ils aient honte de leurs péchés, et qu’ils mesurent les plans de cet édifice. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Et s’ils ont vraiment honte de tout ce qu’ils ont fait, fais-leur connaître la configuration de ce temple, sa structure, ses entrées et ses sorties, oui, toute sa configuration, et toutes les prescriptions et les lois qui lui sont relatives. Mets-les par écrit sous leurs yeux et qu’ils obéissent à cette configuration et à ces prescriptions pour les appliquer. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'C’est ici la loi du Temple qui se trouve au sommet de la montagne : son territoire tout autour est très saint. Oui, telle est la loi du Temple.'
  - type: usfm
    marker: s2
    children:
    - type: text
      text: Le culte dans le nouveau temple
    marker-yv: yv-h
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Et voici les dimensions de l’autel, données en grandes coudées, c’est-à-dire une coudée étant augmentée d’une paume : tout autour de la base de l’autel court un fossé ayant une coudée de profondeur et autant de largeur ; il est entouré d’un rebord d’une paume. Pour la hauteur de l’autel, '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'depuis la base de l’autel, enterrée dans le sol, jusqu’au socle inférieur, il y a deux coudées. La section suivante est d’une coudée en retrait et, depuis le petit socle jusqu’au grand, elle a quatre coudées de haut. Puis vient un nouveau rebord d’une coudée de large. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Le sommet de l’autel, avec le foyer
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '43.15 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'En hébreu : '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'la montagne de Dieu, '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: terme qui n’apparaît qu’ici dans l’Ancien Testament. C’est un mot technique babylonien qui désigne le sommet de l’autel.
      marker-yv: yv-n
    - type: text
      text: ', a quatre coudées de hauteur, il est surmonté de quatre cornes. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ce foyer forme un carré de douze coudées de côté. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Le grand socle est également un carré ayant quatorze coudées de côté avec un rebord d’une demi-coudée tout autour et un fossé d’une coudée tout autour. Les marches pour monter à l’autel se trouvent du côté est.
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Le personnage me dit : Fils d’homme, voici ce que déclare le Seigneur, l’Eternel : Les prescriptions concernant l’autel pour le jour où il sera construit afin d’y offrir l’holocauste et d’y faire l’aspersion du sang sont les suivantes : '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'tu remettras un jeune taureau comme sacrifice pour le péché aux prêtres-lévites qui sont de la postérité de Tsadoq et qui s’approchent de moi pour officier pour mon culte ; le Seigneur, l’Eternel, le déclare. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Alors la gloire du Dieu d’Israël arriva par le côté est. Sa voix était comme celle des grandes eaux et la terre était illuminée de sa gloire
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '43.2 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Pour les v. 2-3, voir 1.1-3 ; 10.19 ; 8.4 et note ; '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: '11.23'
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: '. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Tu prendras de son sang et tu l’appliqueras sur les quatre cornes de l’autel ainsi que sur les quatre angles du socle et sur le rebord qui l’entoure ; tu purifieras ainsi l’autel et tu accompliras le rite d’expiation pour lui. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Tu prendras ensuite le taureau qui a été offert pour le péché et tu le brûleras dans le lieu du Temple réservé à cet usage, en dehors du sanctuaire.
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Le second jour, tu offriras pour le péché un jeune bouc sans défaut et l’on purifiera l’autel comme on l’a fait avec le taureau. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Quand tu auras terminé ce rite de purification, tu offriras un jeune taureau sans défaut et un bélier sans défaut pris dans le troupeau. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Tu les présenteras devant l’Eternel ; les prêtres jetteront du sel
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '43.24 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Voir '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: Lv 2.13
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: ' sur eux et les offriront en holocaustes à l’Eternel. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Pendant sept jours consécutifs, tu offriras chaque jour un bouc en sacrifice pour le péché, puis un jeune taureau et un bélier sans défaut pris dans le troupeau. '
  '26':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Pendant sept jours, on accomplira le rite d’expiation pour l’autel, on le purifiera et on le consacrera. '
  '27':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Une fois ces jours passés, les prêtres offriront sur l’autel, le huitième jour et les jours suivants, vos holocaustes et vos sacrifices de communion, et je vous agréerai, le Seigneur, l’Eternel, le déclare.
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: La vision que je contemplais était semblable à celle que j’avais eue lorsqu’il était venu pour détruire la ville, et à celle que j’avais eue sur les bords du fleuve Kebar. Je tombai sur ma face.
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: La gloire de l’Eternel entra dans le Temple par la porte orientale.
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'L’Esprit m’enleva et me transporta dans le parvis intérieur : la gloire de l’Eternel remplissait le Temple'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '43.5 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Comme lors de la consécration du temple de Salomon (
        - type: usfm
          marker: ref
          children:
          - type: text
            text: 1 R 8.11
        - type: text
          text: ).
      marker-yv: yv-n
    - type: text
      text: '. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Tandis que le personnage se tenait toujours à mes côtés, j’entendis quelqu’un qui me parlait depuis l’intérieur de la maison. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Il me dit : Fils d’homme, c’est ici le lieu de mon trône, le lieu où je poserai mes pieds et où j’habiterai pour toujours au milieu des Israélites. Et ni la communauté d’Israël, ni ses rois ne me profaneront plus, moi qui suis saint, par leurs prostitutions, par les cadavres de leurs rois sur leurs hauts lieux'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '43.7 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Au lieu de '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'sur leurs hauts lieux, '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'certains manuscrits ont, moyennant une vocalisation légèrement différente : '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: au moment de la mort de ceux-ci.
      marker-yv: yv-n
    - type: text
      text: ', '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ou en accolant le seuil de leurs demeures contre mon seuil, et les montants de leurs portes contre les miens, de sorte qu’il n’y avait qu’un mur mitoyen entre eux et moi
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '43.8 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Le palais des rois où l’on adorait les idoles n’était séparé du Temple que par un mur.
      marker-yv: yv-n
    - type: text
      text: '. Oui, ils m’ont ainsi profané, moi qui suis saint, par les abominations qu’ils ont commises. C’est pour cela que je les ai consumés dans ma colère. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Désormais, ils éloigneront de moi leurs prostitutions ainsi que les cadavres de leurs rois, et j’habiterai pour toujours au milieu d’eux.
