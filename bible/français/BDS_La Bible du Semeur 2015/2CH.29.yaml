document_id: 2CH.29,21
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Le roi Ezéchias purifie le Temple
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: (2 R 18.2-3)
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: Ezéchias était âgé de vingt-cinq ans lorsqu’il commença à régner et il régna vingt-neuf ans à Jérusalem
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '29.1 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Soit de 715 à 686 av. J.-C., soit plutôt de 728 à 698 av. J.-C., avec un temps de corégence avec son père Ahaz jusqu’en 715.
      marker-yv: yv-n
    - type: text
      text: '. Sa mère s’appelait Abiya, elle était fille de Zacharie. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'C’est pourquoi j’ai décidé de conclure une alliance avec l’Eternel, le Dieu d’Israël, pour qu’il détourne de nous son ardente colère. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: Maintenant, mes amis, ne vous dérobez pas, car c’est vous que l’Eternel a choisis pour vous tenir devant lui, à son service, pour célébrer son culte et brûler des parfums en son honneur.
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'Alors les lévites suivants se mirent à l’œuvre : Mahath, fils d’Amasaï, Joël, fils d’Azaria, de la lignée des Qehatites ; de la lignée de Merari ce furent Qish, fils d’Abdi, et Azaria, fils de Yehalléléel ; parmi les Guershonites : Yoah, fils de Zimma, et Eden, fils de Yoah ; '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'de la lignée d’Elitsaphân : Shimri et Yeïel ; de la lignée d’Asaph : Zacharie et Mattania. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'De la lignée de Hémân : Yehiel et Shimeï et de celle de Yedoutoun : Shemaya et Ouzziel.'
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'Ils rassemblèrent les membres de leurs familles respectives et, après s’être rendus rituellement purs, ils allèrent entreprendre la purification du temple de l’Eternel, comme le roi le leur avait ordonné et conformément aux paroles de l’Eternel. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'Les prêtres entrèrent à l’intérieur du temple de l’Eternel pour le purifier, ils jetèrent dans la cour tous les objets impurs qu’ils y trouvèrent. Les lévites les ramassèrent pour les emporter dehors dans la vallée du Cédron. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: Ils commencèrent cette purification le premier jour du premier mois et, le huitième jour du mois, ils en arrivèrent au portique du Temple. Ils mirent huit jours à purifier le temple de l’Eternel. Le seizième jour du premier mois, le travail était terminé.
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'Alors ils se rendirent chez le roi Ezéchias et lui dirent : Nous avons purifié tout le temple de l’Eternel, l’autel des holocaustes, tous ses accessoires, et la table des pains exposés devant Dieu avec tous ses accessoires. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'Nous avons préparé et purifié tous les objets que, dans sa rébellion contre l’Eternel, le roi Ahaz avait profanés pendant son règne : ils sont devant l’autel de l’Eternel.'
  - type: usfm
    marker: s1
    children:
    - type: text
      text: La reconsécration du Temple
    marker-yv: yv-h
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: Il fit ce que l’Eternel considère comme juste, en tout point comme l’avait fait son ancêtre David.
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: 'Le lendemain, le roi Ezéchias se leva de grand matin. Il rassembla les dirigeants de la ville et monta au temple de l’Eternel. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: 'On amena sept taureaux, sept béliers, sept agneaux, ainsi que sept boucs en sacrifice pour le péché, pour le royaume, pour le sanctuaire et pour Juda. Le roi ordonna aux prêtres, de la lignée d’Aaron, de les offrir sur l’autel de l’Eternel. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: Les prêtres égorgèrent le gros bétail, recueillirent le sang des victimes et le répandirent sur l’autel. Ils égorgèrent de même les béliers et en répandirent le sang sur l’autel. Ils égorgèrent les agneaux et en répandirent le sang sur l’autel
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '29.22 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Selon l’ordre de '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: Lv 1.3-5
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: '. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: 'Ensuite on fit approcher les boucs destinés au sacrifice pour le péché devant le roi et devant l’assemblée. Ceux-ci posèrent leurs mains sur eux. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: 'Les prêtres les égorgèrent et en répandirent le sang sur l’autel pour l’offrir en sacrifice pour le péché, et accomplir ainsi le rite d’expiation pour tout Israël. Car le roi avait précisé que l’holocauste et le sacrifice pour le péché devaient être offerts pour tout Israël. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: 'Il fit placer les lévites dans la cour du temple de l’Eternel avec des cymbales, des luths et des lyres, selon la règle fixée par David, par Gad, le prophète du roi, et par le prophète Nathan, car c’était un commandement de l’Eternel transmis par l’intermédiaire de ses prophètes. '
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: 'Les lévites prirent place avec les instruments de musique de David, et les prêtres tenaient à la main les trompettes. '
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: 'Ezéchias ordonna d’offrir l’holocauste sur l’autel ; et, au moment où commença l’holocauste, retentit aussi le chant en l’honneur de l’Eternel accompagné des trompettes et des instruments de David, roi d’Israël. '
  '28':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: 'Toute l’assemblée se prosterna, le chœur chanta et les trompettes résonnèrent jusqu’à ce qu’on ait terminé d’offrir l’holocauste. '
  '29':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: 'Quand le sacrifice fut terminé, le roi et tous ceux qui étaient avec lui s’inclinèrent et se prosternèrent. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: Au premier mois de la première année de son règne, il rouvrit les portes du temple de l’Eternel et les fit remettre en état
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '29.3 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Nécessaire après les déprédations d’Ahaz (
        - type: usfm
          marker: ref
          children:
          - type: text
            text: '28.24'
        - type: text
          text: ). La réparation des portes impliquait l’apposition de plaques d’or (
        - type: usfm
          marker: ref
          children:
          - type: text
            text: 2 R 18.16
        - type: text
          text: ).
      marker-yv: yv-n
    - type: text
      text: '. '
  '30':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '30'
    - type: text
      text: Puis le roi et les dirigeants dirent aux lévites de louer l’Eternel avec les paroles composées par David et le prophète Asaph. Ils se répandirent en joyeuses louanges, puis ils s’inclinèrent et se prosternèrent.
  '31':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '31'
    - type: text
      text: 'Alors Ezéchias reprit la parole et dit : Maintenant que vous avez été reconsacrés à l’Eternel, approchez-vous, amenez les victimes des sacrifices et les offrandes de reconnaissance au temple de l’Eternel.'
  - type: usfm
    marker: p
    children:
    - type: text
      text: L’assemblée amena des victimes pour offrir des sacrifices et des offrandes de louange, et tous ceux dont le cœur était généreux offrirent des holocaustes
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '29.31 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Dans l’holocauste, l’animal était presque entièrement brûlé sur l’autel : rien ne revenait à l’adorateur. D’où la mention de la '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'générosité '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: du donateur.
      marker-yv: yv-n
    - type: text
      text: '. '
  '32':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '32'
    - type: text
      text: 'L’assemblée offrit ainsi en holocauste à l’Eternel soixante-dix taureaux et bœufs, cent béliers et deux cents agneaux. '
  '33':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '33'
    - type: text
      text: 'On consacra en outre six cents bovins et trois mille moutons. '
  '34':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '34'
    - type: text
      text: Mais les prêtres étaient trop peu nombreux pour dépecer tous ces animaux. Leurs frères les lévites les aidèrent
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '29.34 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Les holocaustes pouvaient normalement être préparés et offerts seulement par les prêtres, mais dans ce cas exceptionnel, les lévites les aidèrent.
      marker-yv: yv-n
    - type: text
      text: ' jusqu’à ce que ce travail soit terminé et jusqu’à ce que les autres prêtres se soient tous rendus rituellement purs, car il faut dire que les lévites avaient mis plus d’empressement à se purifier que les prêtres. '
  '35':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '35'
    - type: text
      text: 'En plus de nombreux holocaustes, il fallait encore brûler la graisse des sacrifices de communion et répandre les coupes de vin accompagnant les holocaustes. Ainsi fut rétabli le culte au temple de l’Eternel. '
  '36':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '36'
    - type: text
      text: Ezéchias et tout le peuple se réjouirent de la manière dont Dieu avait dirigé les choses, car tout cela s’était fait très rapidement.
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: Il convoqua les prêtres et les lévites et les réunit sur la place orientale.
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'Il leur dit : Ecoutez-moi, lévites ! Maintenant, rendez-vous rituellement purs, puis purifiez le temple de l’Eternel, le Dieu de vos ancêtres. Faites disparaître du sanctuaire tout ce qui le souille. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'Car nos pères ont été infidèles, ils ont fait ce que l’Eternel notre Dieu considère comme mal, ils l’ont abandonné, ils ont délaissé la demeure de l’Eternel et lui ont tourné le dos. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'Ils ont même fermé les portes du portique, ils ont éteint les lampes, ils ont cessé d’offrir au Dieu d’Israël les parfums et les holocaustes dans le sanctuaire. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'Aussi, l’Eternel s’est mis en colère contre Juda et Jérusalem et a fait de notre peuple un exemple terrifiant et un sujet de raillerie, et de notre pays une étendue désolée, comme vous le constatez vous-mêmes. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'Car nos pères sont tombés par l’épée, nos fils, nos filles et nos femmes ont été emmenés en captivité à cause de cela. '
