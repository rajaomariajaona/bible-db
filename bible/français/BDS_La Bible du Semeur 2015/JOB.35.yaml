document_id: JOB.35,21
type_code: fra
verses:
  '1':
  - type: heading
    content: Job tient des propos insensés
  - type: text
    content: 'Elihou reprit la parole et dit :'
  '10':
  - type: text
    content: 'Mais nul ne songe à dire : ╵« Où est Dieu qui m’a fait ?'
  - type: text
    content: Lui qui, en pleine nuit, ╵donne des chants joyeux,
  '11':
  - type: text
    content: lui qui nous instruit mieux ╵que les bêtes des champs
  - type: text
    content: et qui nous rend plus sages ╵que les oiseaux du ciel ? »
  '12':
  - type: text
    content: Alors on crie, ╵mais Dieu ne répond pas,
  - type: text
    content: à cause de l’orgueil ╵de ceux qui font le mal.
  '13':
  - type: text
    content: Oui, c’est en vain qu’ils crient ╵car Dieu n’exauce pas
  - type: note
    content: 'Au lieu de : Oui, c’est en vain… n’exauce pas, on pourrait traduire : non, Dieu n’écoutera pas ces paroles mensongères.'
  - type: text
    content: '  :'
  - type: text
    content: le Tout-Puissant ╵n’y fait pas attention.
  '14':
  - type: text
    content: Cependant, bien que tu prétendes ╵que tu ne le vois pas,
  - type: text
    content: ta cause est devant lui ╵tu peux compter sur lui.
  '15':
  - type: text
    content: Parce que sa colère ╵n’intervient pas encore
  - type: text
    content: et qu’il ne semble guère ╵faire cas des pires révoltes
  - type: note
    content: 'révolte: mot de sens incertain, traduit d’après des versions anciennes.'
  - type: text
    content: ','
  '16':
  - type: text
    content: Job a la bouche pleine ╵de paroles en l’air
  - type: text
    content: et multiplie les discours insensés.
  '2':
  - type: text
    content: 'Penses-tu être dans ton droit ╵quand tu affirmes :'
  - type: text
    content: « Oui, je suis plus juste que Dieu
  - type: note
    content: Voir 32.2.
  - type: text
    content: '  ! » ?'
  '3':
  - type: text
    content: 'Et tu ajoutes : ╵« A quoi me sert-il donc ╵d’éviter le péché ? »'
  - type: text
    content: 'et : « Quel profit ╵Dieu peut-il en tirer ? »'
  '4':
  - type: text
    content: Moi, je te répondrai
  - type: text
    content: ainsi qu’à tes amis.
  '5':
  - type: text
    content: Vois le ciel et regarde,
  - type: text
    content: 'contemple les nuages : ╵combien ils te dominent !'
  '6':
  - type: text
    content: Or, si tu agis mal, ╵en quoi nuis-tu à Dieu ?
  - type: text
    content: Multiplie tes révoltes, ╵quel tort lui causes-tu ?
  '7':
  - type: text
    content: Si tu es juste, ╵que lui apportes-tu ?
  - type: text
    content: Que reçoit-il de toi ?
  '8':
  - type: text
    content: Car ta méchanceté ╵n’atteint que tes semblables,
  - type: text
    content: de même ta justice ╵n’est utile qu’aux hommes.
  '9':
  - type: text
    content: Le poids de l’oppression ╵fait crier les victimes,
  - type: text
    content: contre la violence des puissants, ╵on appelle au secours.
