document_id: JOB.35,21
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Job tient des propos insensés
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Elihou reprit la parole et dit :'
  '10':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Mais nul ne songe à dire : ╵« Où est Dieu qui m’a fait ?'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Lui qui, en pleine nuit, ╵donne des chants joyeux,
  '11':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: lui qui nous instruit mieux ╵que les bêtes des champs
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et qui nous rend plus sages ╵que les oiseaux du ciel ? »
  '12':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Alors on crie, ╵mais Dieu ne répond pas,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: à cause de l’orgueil ╵de ceux qui font le mal.
  '13':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Oui, c’est en vain qu’ils crient ╵car Dieu n’exauce pas
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '35.13 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Au lieu de : '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'Oui, c’est en vain… n’exauce pas, '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'on pourrait traduire : '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: non, Dieu n’écoutera pas ces paroles mensongères.
      marker-yv: yv-n
    - type: text
      text: '  :'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: le Tout-Puissant ╵n’y fait pas attention.
  '14':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Cependant, bien que tu prétendes ╵que tu ne le vois pas,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ta cause est devant lui ╵tu peux compter sur lui.
  '15':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Parce que sa colère ╵n’intervient pas encore
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et qu’il ne semble guère ╵faire cas des pires révoltes
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '35.15 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: révolte
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: ': '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: mot de sens incertain, traduit d’après des versions anciennes.
      marker-yv: yv-n
    - type: text
      text: ','
  '16':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Job a la bouche pleine ╵de paroles en l’air
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et multiplie les discours insensés.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Penses-tu être dans ton droit ╵quand tu affirmes :'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: « Oui, je suis plus juste que Dieu
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '35.2 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Voir '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: '32.2'
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: '  ! » ?'
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Et tu ajoutes : ╵« A quoi me sert-il donc ╵d’éviter le péché ? »'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'et : « Quel profit ╵Dieu peut-il en tirer ? »'
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Moi, je te répondrai
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ainsi qu’à tes amis.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Vois le ciel et regarde,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'contemple les nuages : ╵combien ils te dominent !'
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Or, si tu agis mal, ╵en quoi nuis-tu à Dieu ?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Multiplie tes révoltes, ╵quel tort lui causes-tu ?
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Si tu es juste, ╵que lui apportes-tu ?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Que reçoit-il de toi ?
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Car ta méchanceté ╵n’atteint que tes semblables,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: de même ta justice ╵n’est utile qu’aux hommes.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Le poids de l’oppression ╵fait crier les victimes,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: contre la violence des puissants, ╵on appelle au secours.
