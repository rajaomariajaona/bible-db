document_id: 1CO.3,21
type_code: fra
verses:
  '1':
  - type: heading
    content: Le rôle des prédicateurs de l’Evangile
  - type: text
    content: 'En réalité, frères et sœurs, je n’ai pas pu m’adresser à vous comme à des hommes et des femmes conduits par l’Esprit. J’ai dû vous parler comme si vous étiez des hommes ou des femmes livrés à eux-mêmes, comme à de petits enfants en Christ. '
  '10':
  - type: text
    content: Conformément à la mission que Dieu, dans sa grâce, m’a confiée, j’ai posé chez vous le fondement comme un sage architecte. A présent, quelqu’un d’autre bâtit sur ce fondement. Seulement, que chacun prenne garde à la manière dont il bâtit.
  '11':
  - type: text
    content: 'Pour ce qui est du fondement, nul ne peut en poser un autre que celui qui est déjà en place, c’est-à-dire Jésus-Christ. '
  '12':
  - type: text
    content: 'Or on peut bâtir sur ce fondement avec de l’or, de l’argent, des pierres précieuses ou du bois, du chaume ou du torchis de paille. '
  '13':
  - type: text
    content: Mais le jour du jugement montrera clairement la qualité de l’œuvre de chacun et la rendra évidente. En effet, ce jour sera comme un feu qui éprouvera l’œuvre de chacun pour en révéler la nature.
  '14':
  - type: text
    content: 'Si la construction édifiée sur le fondement résiste à l’épreuve, son auteur recevra son salaire ; '
  '15':
  - type: text
    content: mais si elle est consumée, il en subira les conséquences. Lui, personnellement, sera sauvé, mais tout juste, comme un homme qui réussit à échapper au feu.
  '16':
  - type: text
    content: Ne savez-vous pas que vous êtes le temple de Dieu
  - type: note
    content: L’Eglise est le temple de Dieu de la nouvelle alliance.
  - type: text
    content: ' et que l’Esprit de Dieu habite en vous ? '
  '17':
  - type: text
    content: Si quelqu’un détruit son temple, Dieu le détruira. Car son temple est saint, et vous êtes ce temple.
  '18':
  - type: text
    content: 'Que personne ne se fasse d’illusions sur ce point. Si quelqu’un parmi vous se croit sage selon les critères de ce monde, qu’il devienne fou afin de devenir véritablement sage. '
  '19':
  - type: text
    content: 'Car ce qui passe pour sagesse dans ce monde est folie aux yeux de Dieu. Il est écrit en effet : '
  - type: text
    content: Il attrape les sages à leur propre piège
  - type: note
    content: Jb 5.13.
  - type: text
    content: ','
  - type: text
    content: ' '
  '2':
  - type: text
    content: 'C’est pourquoi je vous ai donné du lait et non de la nourriture solide ; car vous n’auriez pas pu l’assimiler alors. Et même aujourd’hui, vous êtes encore incapables de la supporter, '
  '20':
  - type: text
    content: 'et encore : '
  - type: text
    content: 'Le Seigneur connaît les pensées des sages : elles ne sont que du vent'
  - type: note
    content: Ps 94.11.
  - type: text
    content: .
  '21':
  - type: text
    content: 'Que personne ne mette donc sa fierté dans des hommes, car tout est à vous, '
  '22':
  - type: text
    content: 'soit Paul, soit Apollos, soit Pierre, soit le monde, soit la vie, soit la mort, soit le présent, soit l’avenir. Tout est à vous, '
  '23':
  - type: text
    content: mais vous, vous êtes à Christ, et Christ est à Dieu.
  '3':
  - type: text
    content: parce que vous êtes comme des hommes et des femmes livrés à eux-mêmes. En effet, lorsque vous vous jalousez les uns les autres et que vous vous disputez, n’êtes-vous pas semblables à des hommes livrés à eux-mêmes, ne vous comportez-vous pas d’une manière tout humaine ?
  '4':
  - type: text
    content: 'Lorsque vous dites : « Pour moi, c’est Paul ! » ou : « Pour moi, c’est Apollos ! », n’êtes-vous pas comme les autres hommes ?'
  '5':
  - type: text
    content: 'Après tout, que sont donc Apollos et Paul ? Des serviteurs, grâce auxquels vous avez été amenés à la foi, chacun d’eux accomplissant la tâche particulière que Dieu lui a confiée. '
  '6':
  - type: text
    content: 'Moi j’ai planté, Apollos a arrosé, mais c’est Dieu qui a fait croître. '
  '7':
  - type: text
    content: 'Peu importe, en fait, qui plante et qui arrose. Ce qui compte, c’est Dieu qui fait croître. '
  '8':
  - type: text
    content: 'Celui qui plante et celui qui arrose sont égaux et chacun recevra son propre salaire en fonction du travail accompli. '
  '9':
  - type: text
    content: 'Car nous travaillons ensemble au service de Dieu, et vous, vous êtes le champ qu’il cultive. Ou encore : vous êtes l’édifice qu’il construit.'
