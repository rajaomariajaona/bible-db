document_id: 1CO.3
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Le rôle des prédicateurs de l’Evangile
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'En réalité, frères et sœurs, je n’ai pas pu m’adresser à vous comme à des hommes et des femmes conduits par l’Esprit. J’ai dû vous parler comme si vous étiez des hommes ou des femmes livrés à eux-mêmes, comme à de petits enfants en Christ. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'C’est pourquoi je vous ai donné du lait et non de la nourriture solide ; car vous n’auriez pas pu l’assimiler alors. Et même aujourd’hui, vous êtes encore incapables de la supporter, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: parce que vous êtes comme des hommes et des femmes livrés à eux-mêmes. En effet, lorsque vous vous jalousez les uns les autres et que vous vous disputez, n’êtes-vous pas semblables à des hommes livrés à eux-mêmes, ne vous comportez-vous pas d’une manière tout humaine ?
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Lorsque vous dites : « Pour moi, c’est Paul ! » ou : « Pour moi, c’est Apollos ! », n’êtes-vous pas comme les autres hommes ?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Après tout, que sont donc Apollos et Paul ? Des serviteurs, grâce auxquels vous avez été amenés à la foi, chacun d’eux accomplissant la tâche particulière que Dieu lui a confiée. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Moi j’ai planté, Apollos a arrosé, mais c’est Dieu qui a fait croître. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Peu importe, en fait, qui plante et qui arrose. Ce qui compte, c’est Dieu qui fait croître. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Celui qui plante et celui qui arrose sont égaux et chacun recevra son propre salaire en fonction du travail accompli. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Car nous travaillons ensemble au service de Dieu, et vous, vous êtes le champ qu’il cultive. Ou encore : vous êtes l’édifice qu’il construit.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Conformément à la mission que Dieu, dans sa grâce, m’a confiée, j’ai posé chez vous le fondement comme un sage architecte. A présent, quelqu’un d’autre bâtit sur ce fondement. Seulement, que chacun prenne garde à la manière dont il bâtit.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Pour ce qui est du fondement, nul ne peut en poser un autre que celui qui est déjà en place, c’est-à-dire Jésus-Christ. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Or on peut bâtir sur ce fondement avec de l’or, de l’argent, des pierres précieuses ou du bois, du chaume ou du torchis de paille. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Mais le jour du jugement montrera clairement la qualité de l’œuvre de chacun et la rendra évidente. En effet, ce jour sera comme un feu qui éprouvera l’œuvre de chacun pour en révéler la nature.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Si la construction édifiée sur le fondement résiste à l’épreuve, son auteur recevra son salaire ; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: mais si elle est consumée, il en subira les conséquences. Lui, personnellement, sera sauvé, mais tout juste, comme un homme qui réussit à échapper au feu.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Ne savez-vous pas que vous êtes le temple de Dieu
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '3.16 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: L’Eglise est le temple de Dieu de la nouvelle alliance.
    marker-yv: yv-n
  - type: text
    text: ' et que l’Esprit de Dieu habite en vous ? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Si quelqu’un détruit son temple, Dieu le détruira. Car son temple est saint, et vous êtes ce temple.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Que personne ne se fasse d’illusions sur ce point. Si quelqu’un parmi vous se croit sage selon les critères de ce monde, qu’il devienne fou afin de devenir véritablement sage. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Car ce qui passe pour sagesse dans ce monde est folie aux yeux de Dieu. Il est écrit en effet : '
  - type: usfm
    marker: qt
    children:
    - type: text
      text: Il attrape les sages à leur propre piège
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '3.19 '
    - type: usfm
      marker: ft
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Jb 5.13
        metadata:
          usfm: JOB.5.13
      - type: text
        text: .
    marker-yv: yv-n
  - type: usfm
    marker: qt
    children:
    - type: text
      text: ','
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'et encore : '
  - type: usfm
    marker: qt
    children:
    - type: text
      text: 'Le Seigneur connaît les pensées des sages : elles ne sont que du vent'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '3.20 '
    - type: usfm
      marker: ft
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ps 94.11
        metadata:
          usfm: PSA.94.11
      - type: text
        text: .
    marker-yv: yv-n
  - type: usfm
    marker: qt
    children:
    - type: text
      text: .
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Que personne ne mette donc sa fierté dans des hommes, car tout est à vous, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'soit Paul, soit Apollos, soit Pierre, soit le monde, soit la vie, soit la mort, soit le présent, soit l’avenir. Tout est à vous, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: mais vous, vous êtes à Christ, et Christ est à Dieu.
