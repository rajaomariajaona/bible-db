document_id: DEU.18,21
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s2
    children:
    - type: text
      text: Les prêtres-lévites
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Les prêtres-lévites et tous les autres descendants de Lévi ne recevront ni part ni héritage comme le reste des Israélites ; ils vivront des sacrifices consumés en l’honneur de l’Eternel, et de ce qui lui revient. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Qu’on ne trouve chez vous personne qui immole son fils ou sa fille par le feu
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '18.10 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Voir '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: Lv 18.21
        - type: text
          text: ' et note.'
      marker-yv: yv-n
    - type: text
      text: ', personne qui pratique la divination, qui recherche les présages, consulte les augures ou s’adonne à la magie, '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: personne qui jette des sorts, consulte les spirites et les devins ou interroge les morts
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '18.11 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Voir Ex 22.17 ; Lv 19.26, 31.
      marker-yv: yv-n
    - type: text
      text: '. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Car le Seigneur a en abomination ceux qui se livrent à de telles pratiques, et c’est parce que les peuples qui habitent le pays où vous allez entrer s’y adonnent que l’Eternel votre Dieu va les déposséder en votre faveur. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Quant à vous, soyez irréprochables envers l’Eternel votre Dieu
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '18.13 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Voir '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: Mt 5.48
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: .
  - type: usfm
    marker: s2
    children:
    - type: text
      text: Les prophètes
    marker-yv: yv-h
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Car ces peuples étrangers que vous allez déposséder écoutent les faiseurs de présages et les devins ; mais pour vous, l’Eternel votre Dieu n’a rien voulu de pareil. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Il suscitera pour vous un prophète comme moi, issu de votre peuple, l’un de vos compatriotes : écoutez-le'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '18.15 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Cité en Ac 3.22 ; 7.37. Voir aussi '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: Jn 1.21
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: '. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Cela est conforme à ce que vous avez demandé à l’Eternel votre Dieu le jour où vous étiez rassemblés au mont Horeb : « Nous ne voulons plus entendre la voix de l’Eternel notre Dieu, nous ne voulons plus voir ce grand feu ! Nous ne voulons pas mourir'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '18.16 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Ex 20.18-19 ; Dt 5.25.
      marker-yv: yv-n
    - type: text
      text: '  ! » '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Alors l’Eternel m’a dit : « J’approuve ce qu’ils disent là. » '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Je vais leur susciter un prophète comme toi, l’un de leurs compatriotes. Je mettrai mes paroles dans sa bouche et il leur transmettra tout ce que je lui ordonnerai. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Et si quelqu’un refuse d’écouter ce qu’il dira de ma part, je lui en demanderai compte moi-même
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '18.19 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Cité en '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: Ac 3.23
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: '. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ils n’auront pas de patrimoine foncier au milieu de leurs compatriotes ; l’Eternel est leur patrimoine, comme il le leur a lui-même déclaré
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '18.2 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Voir '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: Nb 18.20
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: .
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Mais si un prophète a l’audace de prononcer en mon nom un message dont je ne l’ai pas chargé, ou s’il se met à parler au nom d’autres divinités, il sera mis à mort.
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Peut-être vous demanderez-vous : « Comment saurons-nous qu’une prophétie ne vient pas de l’Eternel ? » '
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Sachez donc que si le prophète annonce de la part de l’Eternel une chose qui ne se réalise pas, si sa parole reste sans effet, c’est que son message ne vient pas de l’Eternel, c’est par présomption que le prophète l’aura prononcé : vous ne vous laisserez donc pas impressionner par lui.'
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Voici ce qui revient de droit aux prêtres de la part du peuple : tous ceux qui offriront en sacrifice un bœuf ou un mouton leur remettront l’épaule, les joues et l’estomac. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Vous leur donnerez également les premiers produits du sol en blé, vin nouveau et huile ainsi que la première laine que vous tondrez sur vos moutons ; '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: car, parmi vos tribus, l’Eternel votre Dieu a choisi Lévi et ses descendants pour qu’ils se tiennent pour toujours au service du sanctuaire en son nom.
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Si un lévite quitte l’une des villes d’Israël où il habitait, parce qu’il a le vif désir de se rendre au lieu que l’Eternel aura choisi, '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'pour y accomplir le service au nom de l’Eternel son Dieu au même titre que tous ses frères lévites qui se tiennent là devant l’Eternel, '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: il aura droit, pour son entretien, à une part égale à la leur – indépendamment du produit éventuel de la vente des biens qu’il aura hérités de son père.
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Lorsque vous serez entrés dans le pays que l’Eternel votre Dieu vous donne, n’allez pas imiter les pratiques abominables des peuples qui y habitent actuellement. '
