document_id: DEU.18,21
type_code: fra
verses:
  '1':
  - type: heading
    content: Les prêtres-lévites
  - type: text
    content: 'Les prêtres-lévites et tous les autres descendants de Lévi ne recevront ni part ni héritage comme le reste des Israélites ; ils vivront des sacrifices consumés en l’honneur de l’Eternel, et de ce qui lui revient. '
  '10':
  - type: text
    content: Qu’on ne trouve chez vous personne qui immole son fils ou sa fille par le feu
  - type: note
    content: Voir Lv 18.21 et note.
  - type: text
    content: ', personne qui pratique la divination, qui recherche les présages, consulte les augures ou s’adonne à la magie, '
  '11':
  - type: text
    content: personne qui jette des sorts, consulte les spirites et les devins ou interroge les morts
  - type: note
    content: Voir Ex 22.17 ; Lv 19.26, 31.
  - type: text
    content: '. '
  '12':
  - type: text
    content: 'Car le Seigneur a en abomination ceux qui se livrent à de telles pratiques, et c’est parce que les peuples qui habitent le pays où vous allez entrer s’y adonnent que l’Eternel votre Dieu va les déposséder en votre faveur. '
  '13':
  - type: text
    content: Quant à vous, soyez irréprochables envers l’Eternel votre Dieu
  - type: note
    content: Voir Mt 5.48.
  - type: text
    content: .
  - type: heading
    content: Les prophètes
  '14':
  - type: text
    content: 'Car ces peuples étrangers que vous allez déposséder écoutent les faiseurs de présages et les devins ; mais pour vous, l’Eternel votre Dieu n’a rien voulu de pareil. '
  '15':
  - type: text
    content: 'Il suscitera pour vous un prophète comme moi, issu de votre peuple, l’un de vos compatriotes : écoutez-le'
  - type: note
    content: Cité en Ac 3.22 ; 7.37. Voir aussi Jn 1.21.
  - type: text
    content: '. '
  '16':
  - type: text
    content: 'Cela est conforme à ce que vous avez demandé à l’Eternel votre Dieu le jour où vous étiez rassemblés au mont Horeb : « Nous ne voulons plus entendre la voix de l’Eternel notre Dieu, nous ne voulons plus voir ce grand feu ! Nous ne voulons pas mourir'
  - type: note
    content: Ex 20.18-19 ; Dt 5.25.
  - type: text
    content: '  ! » '
  '17':
  - type: text
    content: 'Alors l’Eternel m’a dit : « J’approuve ce qu’ils disent là. » '
  '18':
  - type: text
    content: 'Je vais leur susciter un prophète comme toi, l’un de leurs compatriotes. Je mettrai mes paroles dans sa bouche et il leur transmettra tout ce que je lui ordonnerai. '
  '19':
  - type: text
    content: Et si quelqu’un refuse d’écouter ce qu’il dira de ma part, je lui en demanderai compte moi-même
  - type: note
    content: Cité en Ac 3.23.
  - type: text
    content: '. '
  '2':
  - type: text
    content: Ils n’auront pas de patrimoine foncier au milieu de leurs compatriotes ; l’Eternel est leur patrimoine, comme il le leur a lui-même déclaré
  - type: note
    content: Voir Nb 18.20.
  - type: text
    content: .
  '20':
  - type: text
    content: Mais si un prophète a l’audace de prononcer en mon nom un message dont je ne l’ai pas chargé, ou s’il se met à parler au nom d’autres divinités, il sera mis à mort.
  '21':
  - type: text
    content: 'Peut-être vous demanderez-vous : « Comment saurons-nous qu’une prophétie ne vient pas de l’Eternel ? » '
  '22':
  - type: text
    content: 'Sachez donc que si le prophète annonce de la part de l’Eternel une chose qui ne se réalise pas, si sa parole reste sans effet, c’est que son message ne vient pas de l’Eternel, c’est par présomption que le prophète l’aura prononcé : vous ne vous laisserez donc pas impressionner par lui.'
  '3':
  - type: text
    content: 'Voici ce qui revient de droit aux prêtres de la part du peuple : tous ceux qui offriront en sacrifice un bœuf ou un mouton leur remettront l’épaule, les joues et l’estomac. '
  '4':
  - type: text
    content: 'Vous leur donnerez également les premiers produits du sol en blé, vin nouveau et huile ainsi que la première laine que vous tondrez sur vos moutons ; '
  '5':
  - type: text
    content: car, parmi vos tribus, l’Eternel votre Dieu a choisi Lévi et ses descendants pour qu’ils se tiennent pour toujours au service du sanctuaire en son nom.
  '6':
  - type: text
    content: 'Si un lévite quitte l’une des villes d’Israël où il habitait, parce qu’il a le vif désir de se rendre au lieu que l’Eternel aura choisi, '
  '7':
  - type: text
    content: 'pour y accomplir le service au nom de l’Eternel son Dieu au même titre que tous ses frères lévites qui se tiennent là devant l’Eternel, '
  '8':
  - type: text
    content: il aura droit, pour son entretien, à une part égale à la leur – indépendamment du produit éventuel de la vente des biens qu’il aura hérités de son père.
  '9':
  - type: text
    content: 'Lorsque vous serez entrés dans le pays que l’Eternel votre Dieu vous donne, n’allez pas imiter les pratiques abominables des peuples qui y habitent actuellement. '
