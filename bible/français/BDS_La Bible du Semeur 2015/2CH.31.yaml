document_id: 2CH.31,21
type_code: fra
verses:
  '1':
  - type: heading
    content: Ezéchias réorganise le service du Temple
  - type: text
    content: Lorsque toute la fête fut terminée, tous les Israélites qui se trouvaient là partirent pour les villes de Juda et brisèrent les stèles des idoles, abattirent les pieux sacrés d’Ashéra et démolirent les hauts lieux et les autels dans tout Juda et Benjamin, ainsi que dans les territoires d’Ephraïm et de Manassé, jusqu’à ce qu’il n’en reste plus. Puis tous les Israélites retournèrent dans leurs villes, chacun dans sa propriété.
  '10':
  - type: text
    content: 'Alors le grand-prêtre Azaria, un descendant de Tsadoq, lui répondit : Depuis que le peuple a commencé d’apporter sa contribution au temple de l’Eternel, nous avons eu de quoi manger à satiété, et il en reste énormément, car l’Eternel a béni le peuple. Ce qui est entassé ici, c’est le surplus.'
  '11':
  - type: text
    content: 'Ezéchias donna l’ordre d’aménager des entrepôts dans le temple de l’Eternel. Quand ils furent prêts, '
  '12':
  - type: text
    content: on y déposa fidèlement les contributions du peuple, les dîmes et les autres offrandes saintes. Le lévite Konania s’en vit confier la responsabilité. Il était secondé par son frère Shimeï.
  '13':
  - type: text
    content: 'Sous leur direction, Yehiel, Azazia, Nahath, Asaël, Yerimoth, Yozabad, Eliel, Yismakia, Mahath et Benaya assuraient la supervision des opérations par décision du roi Ezéchias et d’Azaria, le surintendant du temple de Dieu. '
  '14':
  - type: text
    content: 'Le lévite Qoré, fils de Yimna, qui était gardien de la porte orientale, fut chargé de recevoir les dons volontaires faits à Dieu et de répartir les contributions apportées pour l’Eternel et les offrandes très saintes. '
  '15':
  - type: text
    content: Il avait sous ses ordres des lévites dans les villes sacerdotales
  - type: note
    content: Voir Nb 35.1-8 ; Jos 21.1-42.
  - type: text
    content: '. C’étaient Eden, Minyamîn, Josué, Shemaya, Amaria et Shekania. Ils étaient chargés de distribuer consciencieusement les vivres à leurs collègues selon leurs classes, sans faire de différences entre ceux de rang important et ceux de rang moins important. '
  '16':
  - type: text
    content: 'Ils accordaient des parts, non seulement à tous les hommes enregistrés depuis l’âge de trois ans sur les listes du recensement sacerdotal, mais encore à tous ceux qui accomplissaient jour par jour les tâches relatives à leur service, selon leur classe, dans le temple de l’Eternel. '
  '17':
  - type: text
    content: 'Les prêtres furent enregistrés d’après leurs groupes familiaux, tandis que les lévites de vingt ans et plus étaient inscrits d’après leur service et leur classe. '
  '18':
  - type: text
    content: 'Ils étaient enregistrés avec leurs enfants, leurs femmes, leurs fils et leurs filles et cela était le cas pour toute la communauté des prêtres et des lévites, parce qu’ils s’acquittaient fidèlement des rites de purification pour être saints. '
  '19':
  - type: text
    content: Quant aux prêtres descendants d’Aaron, qui demeuraient à la campagne dans les alentours des villes sacerdotales, certains d’entre eux furent désignés nommément dans chaque localité pour assurer la distribution des vivres à tous les hommes parmi les prêtres et à tous les lévites enregistrés.
  - type: heading
    content: (2 R 18.5-7)
  '2':
  - type: text
    content: 'Ezéchias rétablit l’organisation des prêtres et des lévites d’après leurs classes. Dans ces classes, il assigna à chacun sa fonction propre ; les prêtres et les lévites devaient s’occuper des holocaustes et des sacrifices de communion, du service, du chant des cantiques de louange et de remerciement aux portes de la demeure de l’Eternel. '
  '20':
  - type: text
    content: 'C’est ainsi qu’Ezéchias agit dans tout le pays de Juda. Il fit ce qui est bien, juste et fidèle devant l’Eternel son Dieu. '
  '21':
  - type: text
    content: Pour tout ce qu’il entreprit, qu’il s’agisse du service du temple de Dieu ou de l’obéissance à la Loi et aux commandements, il chercha à plaire à son Dieu de tout son cœur, et tout lui réussit.
  '3':
  - type: text
    content: Le roi réserva une part de ses biens pour les holocaustes du matin et du soir et pour ceux des sabbats, des nouvelles lunes et des autres fêtes, selon ce qui est écrit dans la Loi de l’Eternel
  - type: note
    content: Sur les sacrifices, voir Nb 28 et 29.
  - type: text
    content: '. '
  '4':
  - type: text
    content: D’autre part, il ordonna à la population de Jérusalem de donner la part des prêtres et des lévites, afin qu’ils puissent se consacrer aux tâches que leur prescrit la Loi de l’Eternel
  - type: note
    content: Pour les v. 4-5, voir Nb 18.12-13, 21.
  - type: text
    content: '. '
  '5':
  - type: text
    content: 'Dès que cet ordre eut été publié, les Israélites apportèrent en grandes quantités les premières récoltes de blé, de vin nouveau, d’huile, de miel et de tous les produits agricoles. Ils apportèrent aussi la dîme de tout en abondance. '
  '6':
  - type: text
    content: 'Les Israélites et les Judéens qui habitaient dans les villes de Juda apportèrent eux aussi la dîme du gros bétail, des moutons et des chèvres, ainsi que celle des offrandes saintes qui étaient consacrées à l’Eternel leur Dieu. On fit des tas considérables des divers produits. '
  '7':
  - type: text
    content: 'Cette accumulation, commencée en mai-juin, ne prit fin qu’en septembre-octobre. '
  '8':
  - type: text
    content: 'Ezéchias et les ministres vinrent voir tout ce qui avait été apporté, et ils bénirent l’Eternel et son peuple d’Israël. '
  '9':
  - type: text
    content: 'Ezéchias s’enquit au sujet de ces dons auprès des prêtres et des lévites. '
