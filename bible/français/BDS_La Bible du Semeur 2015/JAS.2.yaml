document_id: JAS.2
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: 'Riches et pauvres : la foi et les œuvres'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Mes frères et sœurs, gardez-vous de toutes formes de favoritisme : c’est incompatible avec la foi en notre glorieux Seigneur Jésus-Christ. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Supposez, en effet, qu’un homme vêtu d’habits somptueux, portant une bague en or entre dans votre assemblée, et qu’entre aussi un pauvre en haillons. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Si, voyant l’homme somptueusement vêtu, vous vous empressez autour de lui et vous lui dites : « Veuillez vous asseoir ici, c’est une bonne place ! » tandis que vous dites au pauvre : « Tenez-vous là, debout, ou asseyez-vous par terre, à mes pieds », '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: ne faites-vous pas des différences parmi vous, et ne portez-vous pas des jugements fondés sur de mauvaises raisons ?
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Ecoutez, mes chers frères et sœurs, Dieu n’a-t-il pas choisi ceux qui sont pauvres dans ce monde pour qu’ils soient riches dans la foi et qu’ils héritent du royaume qu’il a promis à ceux qui l’aiment ? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Et vous, vous méprisez le pauvre ? Ce sont pourtant les riches qui vous oppriment et qui vous traînent en justice devant les tribunaux ! '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Ce sont encore eux qui outragent le beau nom que l’on a invoqué sur vous
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '2.7 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Lors du baptême. D’autres comprennent : '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: le beau nom que Dieu vous a donné.
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Si, au contraire, vous vous conformez à la loi du royaume de Dieu
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '2.8 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Autre traduction : '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: la loi qui surpasse toute autre loi.
    marker-yv: yv-n
  - type: text
    text: ', telle qu’on la trouve dans l’Ecriture'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '2.8 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'D’autres comprennent : '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'si au contraire, en vous inspirant de cette parole de l’Ecriture : Tu aimeras ton prochain comme toi-même, vous accomplirez la loi du royaume de Dieu, vous faites bien.'
    marker-yv: yv-n
  - type: text
    text: '  : '
  - type: usfm
    marker: qt
    children:
    - type: text
      text: Tu aimeras ton prochain comme toi-même
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '2.8 '
    - type: usfm
      marker: ft
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Lv 19.18
        metadata:
          usfm: LEV.19.18
      - type: text
        text: .
    marker-yv: yv-n
  - type: usfm
    marker: qt
    children:
    - type: text
      text: ','
  - type: text
    text: ' alors vous agissez bien. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Mais si vous faites preuve de favoritisme, vous commettez un péché et vous voilà condamnés par la Loi, parce que vous lui désobéissez. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'En effet, celui qui désobéit à un seul commandement de la Loi, même s’il obéit à tous les autres, se rend coupable à l’égard de toute la Loi. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Car celui qui a dit : '
  - type: usfm
    marker: qt
    children:
    - type: text
      text: Tu ne commettras pas d’adultère,
  - type: text
    text: ' a dit aussi : '
  - type: usfm
    marker: qt
    children:
    - type: text
      text: Tu ne commettras pas de meurtre
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '2.11 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Ex 20.13-14 ; Dt 5.17-18.
    marker-yv: yv-n
  - type: text
    text: . Si donc, tout en évitant l’adultère, tu commets un meurtre, tu désobéis bel et bien à la Loi.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Parlez et agissez donc comme des personnes appelées à être jugées par la loi qui donne la liberté. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Dieu jugera sans pitié celui qui n’a témoigné aucune compassion aux autres ; mais la compassion triomphe du jugement.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Mes frères et sœurs, à quoi servirait-il à quelqu’un de dire qu’il a la foi s’il ne le démontre pas par ses actes ? Une telle foi peut-elle le sauver ?
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Supposez qu’un frère ou une sœur manquent de vêtements et n’aient pas tous les jours assez à manger. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Et voilà que l’un de vous leur dit : « Au revoir, mes amis, portez-vous bien, restez au chaud et bon appétit », sans leur donner de quoi pourvoir aux besoins de leur corps, à quoi cela sert-il ? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Il en est ainsi de la foi : si elle reste seule, sans se traduire en actes, elle est morte'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '2.17 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Autre traduction : '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: si elle ne se traduit pas en actes, elle est morte puisqu’elle n’est plus elle-même.
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Mais quelqu’un dira : « L’un a la foi, l’autre les actes'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '2.18 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'D’autres comprennent : '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'toi (« faux » croyant), tu prétends avoir la foi ; et moi j’ai les œuvres. Eh bien, montre-moi… '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'ou encore : '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: toi (Jacques), tu prétends avoir la foi ; et moi j’ai les œuvres. Eh bien…
    marker-yv: yv-n
  - type: text
    text: '. » Eh bien ! Montre-moi ta foi sans les actes, et je te montrerai ma foi par mes actes. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Tu crois qu’il y a un seul Dieu ? C’est bien. Mais les démons aussi le croient, et ils tremblent. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Insensé ! Veux-tu avoir la preuve que la foi sans les actes ne sert à rien
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '2.20 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Certains manuscrits ont : '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: morte.
    marker-yv: yv-n
  - type: text
    text: '  ? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Abraham, notre ancêtre, n’a-t-il pas été déclaré juste à cause de ses actes, lorsqu’il a offert son fils Isaac sur l’autel ? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Tu le vois, sa foi et ses actes agissaient ensemble et, grâce à ses actes, sa foi a atteint son plein épanouissement. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Ainsi s’accomplit ce que l’Ecriture déclare à son sujet : Abraham a eu confiance en Dieu, et '
  - type: usfm
    marker: qt
    children:
    - type: text
      text: Dieu, en portant sa foi à son crédit, l’a déclaré juste
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '2.23 '
    - type: usfm
      marker: ft
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Gn 15.6
        metadata:
          usfm: GEN.15.6
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: ', et il l’a appelé son '
  - type: usfm
    marker: qt
    children:
    - type: text
      text: ami
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '2.23 '
    - type: usfm
      marker: ft
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Es 41.8
        metadata:
          usfm: ISA.41.8
      - type: text
        text: .
    marker-yv: yv-n
  - type: usfm
    marker: qt
    children:
    - type: text
      text: .
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Vous le voyez donc : on est déclaré juste devant Dieu à cause de ses actes, et pas uniquement à cause de sa foi. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: Rahab, la prostituée, n’a-t-elle pas aussi été déclarée juste par Dieu à cause de ses actes, lorsqu’elle a donné asile aux envoyés israélites et les a aidés à s’échapper par un autre chemin
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '2.25 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Voir '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Jos 2.1-21
        metadata:
          usfm: JOS.2.1+JOS.2.2+JOS.2.3+JOS.2.4+JOS.2.5+JOS.2.6+JOS.2.7+JOS.2.8+JOS.2.9+JOS.2.10+JOS.2.11+JOS.2.12+JOS.2.13+JOS.2.14+JOS.2.15+JOS.2.16+JOS.2.17+JOS.2.18+JOS.2.19+JOS.2.20+JOS.2.21
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: '  ? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: Car comme le corps sans l’esprit est mort, la foi sans les actes est morte.
