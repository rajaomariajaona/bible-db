document_id: JAS.2,21
type_code: fra
verses:
  '1':
  - type: heading
    content: 'Riches et pauvres : la foi et les œuvres'
  - type: text
    content: 'Mes frères et sœurs, gardez-vous de toutes formes de favoritisme : c’est incompatible avec la foi en notre glorieux Seigneur Jésus-Christ. '
  '10':
  - type: text
    content: 'En effet, celui qui désobéit à un seul commandement de la Loi, même s’il obéit à tous les autres, se rend coupable à l’égard de toute la Loi. '
  '11':
  - type: text
    content: 'Car celui qui a dit : '
  - type: text
    content: Tu ne commettras pas d’adultère,
  - type: text
    content: ' a dit aussi : '
  - type: text
    content: Tu ne commettras pas de meurtre
  - type: note
    content: Ex 20.13-14 ; Dt 5.17-18.
  - type: text
    content: . Si donc, tout en évitant l’adultère, tu commets un meurtre, tu désobéis bel et bien à la Loi.
  '12':
  - type: text
    content: 'Parlez et agissez donc comme des personnes appelées à être jugées par la loi qui donne la liberté. '
  '13':
  - type: text
    content: Dieu jugera sans pitié celui qui n’a témoigné aucune compassion aux autres ; mais la compassion triomphe du jugement.
  '14':
  - type: text
    content: Mes frères et sœurs, à quoi servirait-il à quelqu’un de dire qu’il a la foi s’il ne le démontre pas par ses actes ? Une telle foi peut-elle le sauver ?
  '15':
  - type: text
    content: 'Supposez qu’un frère ou une sœur manquent de vêtements et n’aient pas tous les jours assez à manger. '
  '16':
  - type: text
    content: 'Et voilà que l’un de vous leur dit : « Au revoir, mes amis, portez-vous bien, restez au chaud et bon appétit », sans leur donner de quoi pourvoir aux besoins de leur corps, à quoi cela sert-il ? '
  '17':
  - type: text
    content: 'Il en est ainsi de la foi : si elle reste seule, sans se traduire en actes, elle est morte'
  - type: note
    content: 'Autre traduction : si elle ne se traduit pas en actes, elle est morte puisqu’elle n’est plus elle-même.'
  - type: text
    content: '. '
  '18':
  - type: text
    content: 'Mais quelqu’un dira : « L’un a la foi, l’autre les actes'
  - type: note
    content: 'D’autres comprennent : toi (« faux » croyant), tu prétends avoir la foi ; et moi j’ai les œuvres. Eh bien, montre-moi… ou encore : toi (Jacques), tu prétends avoir la foi ; et moi j’ai les œuvres. Eh bien…'
  - type: text
    content: '. » Eh bien ! Montre-moi ta foi sans les actes, et je te montrerai ma foi par mes actes. '
  '19':
  - type: text
    content: 'Tu crois qu’il y a un seul Dieu ? C’est bien. Mais les démons aussi le croient, et ils tremblent. '
  '2':
  - type: text
    content: 'Supposez, en effet, qu’un homme vêtu d’habits somptueux, portant une bague en or entre dans votre assemblée, et qu’entre aussi un pauvre en haillons. '
  '20':
  - type: text
    content: Insensé ! Veux-tu avoir la preuve que la foi sans les actes ne sert à rien
  - type: note
    content: 'Certains manuscrits ont : morte.'
  - type: text
    content: '  ? '
  '21':
  - type: text
    content: 'Abraham, notre ancêtre, n’a-t-il pas été déclaré juste à cause de ses actes, lorsqu’il a offert son fils Isaac sur l’autel ? '
  '22':
  - type: text
    content: 'Tu le vois, sa foi et ses actes agissaient ensemble et, grâce à ses actes, sa foi a atteint son plein épanouissement. '
  '23':
  - type: text
    content: 'Ainsi s’accomplit ce que l’Ecriture déclare à son sujet : Abraham a eu confiance en Dieu, et '
  - type: text
    content: Dieu, en portant sa foi à son crédit, l’a déclaré juste
  - type: note
    content: Gn 15.6.
  - type: text
    content: ', et il l’a appelé son '
  - type: text
    content: ami
  - type: note
    content: Es 41.8.
  - type: text
    content: .
  - type: text
    content: ' '
  '24':
  - type: text
    content: 'Vous le voyez donc : on est déclaré juste devant Dieu à cause de ses actes, et pas uniquement à cause de sa foi. '
  '25':
  - type: text
    content: Rahab, la prostituée, n’a-t-elle pas aussi été déclarée juste par Dieu à cause de ses actes, lorsqu’elle a donné asile aux envoyés israélites et les a aidés à s’échapper par un autre chemin
  - type: note
    content: Voir Jos 2.1-21.
  - type: text
    content: '  ? '
  '26':
  - type: text
    content: Car comme le corps sans l’esprit est mort, la foi sans les actes est morte.
  '3':
  - type: text
    content: 'Si, voyant l’homme somptueusement vêtu, vous vous empressez autour de lui et vous lui dites : « Veuillez vous asseoir ici, c’est une bonne place ! » tandis que vous dites au pauvre : « Tenez-vous là, debout, ou asseyez-vous par terre, à mes pieds », '
  '4':
  - type: text
    content: ne faites-vous pas des différences parmi vous, et ne portez-vous pas des jugements fondés sur de mauvaises raisons ?
  '5':
  - type: text
    content: 'Ecoutez, mes chers frères et sœurs, Dieu n’a-t-il pas choisi ceux qui sont pauvres dans ce monde pour qu’ils soient riches dans la foi et qu’ils héritent du royaume qu’il a promis à ceux qui l’aiment ? '
  '6':
  - type: text
    content: 'Et vous, vous méprisez le pauvre ? Ce sont pourtant les riches qui vous oppriment et qui vous traînent en justice devant les tribunaux ! '
  '7':
  - type: text
    content: Ce sont encore eux qui outragent le beau nom que l’on a invoqué sur vous
  - type: note
    content: 'Lors du baptême. D’autres comprennent : le beau nom que Dieu vous a donné.'
  - type: text
    content: .
  '8':
  - type: text
    content: Si, au contraire, vous vous conformez à la loi du royaume de Dieu
  - type: note
    content: 'Autre traduction : la loi qui surpasse toute autre loi.'
  - type: text
    content: ', telle qu’on la trouve dans l’Ecriture'
  - type: note
    content: 'D’autres comprennent : si au contraire, en vous inspirant de cette parole de l’Ecriture : Tu aimeras ton prochain comme toi-même, vous accomplirez la loi du royaume de Dieu, vous faites bien.'
  - type: text
    content: '  : '
  - type: text
    content: Tu aimeras ton prochain comme toi-même
  - type: note
    content: Lv 19.18.
  - type: text
    content: ','
  - type: text
    content: ' alors vous agissez bien. '
  '9':
  - type: text
    content: 'Mais si vous faites preuve de favoritisme, vous commettez un péché et vous voilà condamnés par la Loi, parce que vous lui désobéissez. '
