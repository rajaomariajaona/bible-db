document_id: 1KI.12,21
type_code: fra
verses:
  '1':
  - type: heading
    content: Le royaume divisé
  - type: heading
    content: La dureté de Roboam envers le peuple
  - type: heading
    content: (2 Ch 10.1 à 11.4)
  - type: text
    content: Roboam se rendit à Sichem
  - type: note
    content: Ville très ancienne qui a servi depuis longtemps de lieu saint et de point de rassemblement des tribus du Nord (voir Gn 12.6 ; 33.18-20 ; Jos 8.30-35 ; 20.7 ; 21.21 ; 24.1-33 ; Jg 9.6). Elle était située à une cinquantaine de kilomètres au nord de Jérusalem.
  - type: text
    content: ', où tout Israël s’était rassemblé pour le proclamer roi. '
  '10':
  - type: text
    content: 'Les hommes jeunes qui avaient grandi avec lui lui répondirent : Ces gens se plaignent en prétendant que ton père a rendu leur joug trop pesant, et ils te demandent de l’alléger ? Eh bien, voici comment tu leur parleras : « Mon petit doigt est plus gros que les reins de mon père. '
  '11':
  - type: text
    content: Oui, mon père vous a chargés d’un joug pesant, mais moi, je le rendrai encore plus pesant. Mon père vous a fait marcher à coups de fouet, moi, je vous ferai marcher avec des lanières cloutées. »
  '12':
  - type: text
    content: 'Le surlendemain, Jéroboam et tout le peuple vinrent trouver Roboam comme le roi le leur avait commandé. '
  '13':
  - type: text
    content: 'Le roi ne tint pas compte du conseil des responsables et il parla durement au peuple. '
  '14':
  - type: text
    content: 'Il lui répondit comme les hommes jeunes le lui avaient conseillé : Mon père vous a imposé un joug pesant, leur dit-il ; et bien, moi je le rendrai encore plus pesant. Mon père vous a fait marcher à coups de fouet, moi je vous ferai marcher à coups de lanières cloutées.'
  '15':
  - type: text
    content: Le roi refusa donc de tenir compte des revendications du peuple, car l’Eternel dirigeait le cours des événements pour accomplir ce qu’il avait annoncé à Jéroboam, fils de Nebath, par l’intermédiaire d’Ahiya de Silo.
  - type: heading
    content: La révolte des Israélites du Nord
  '16':
  - type: text
    content: Voyant que le roi ne les écoutait pas, tous les Israélites
  - type: note
    content: C’est-à-dire les Israélites du Nord (voir note v. 1).
  - type: text
    content: ' répliquèrent au roi : Qu’avons-nous à faire avec David ? Nous n’avons rien à voir avec le fils d’Isaï ! Retournons chez nous, gens d’Israël ! Quant à toi, descendant de David, tu n’as qu’à t’occuper de ta propre maison !'
  - type: text
    content: Et les Israélites rentrèrent chez eux
  - type: note
    content: Voir 2 S 20.1.
  - type: text
    content: '. '
  '17':
  - type: text
    content: 'Roboam régna sur les Israélites qui habitaient les villes de Juda. '
  '18':
  - type: text
    content: Alors le roi Roboam envoya Adoram
  - type: note
    content: Peut-être Adoniram – qui avait déjà été ministre de David et de Salomon (2 S 20.24 ; 1 R 4.6 ; 5.28) – comme le lisent certains manuscrits de l’ancienne version grecque et la version syriaque.
  - type: text
    content: ', le chef des corvées, auprès des Israélites du Nord ; mais tous les Israélites le lapidèrent et il mourut. Le roi lui-même réussit de justesse à sauter sur un char pour s’enfuir à Jérusalem. '
  '19':
  - type: text
    content: C’est ainsi que les Israélites du Nord sont en révolte contre la dynastie de David jusqu’à ce jour.
  '2':
  - type: text
    content: 'Quand Jéroboam, fils de Nebath, qui se trouvait encore en Egypte où il s’était réfugié pour échapper au roi Salomon, en fut informé, il resta en Egypte. '
  '20':
  - type: text
    content: Lorsque les Israélites du Nord apprirent que Jéroboam était revenu d’Egypte, ils l’invitèrent à l’assemblée du peuple et le proclamèrent roi sur tout Israël. Seule la tribu de Juda resta fidèle à la dynastie de David.
  - type: heading
    content: Le prophète Shemaya empêche la guerre fratricide
  '21':
  - type: text
    content: 'Lorsque Roboam fut de retour à Jérusalem, il mobilisa tous les hommes des tribus de Juda et de Benjamin, soit 180 000 soldats d’élite, pour combattre les Israélites du Nord afin de ramener le royaume sous son autorité. '
  '22':
  - type: text
    content: 'Mais Dieu adressa le message suivant à Shemaya, homme de Dieu : '
  '23':
  - type: text
    content: 'Parle à Roboam, fils de Salomon, roi de Juda, et à toute la tribu de Juda et de Benjamin, ainsi qu’au reste du peuple pour leur dire : '
  '24':
  - type: text
    content: '« Voici ce que déclare l’Eternel : Ne partez pas en guerre contre vos compatriotes, les Israélites, n’allez pas les combattre ! Que chacun de vous rentre chez soi, car c’est moi qui ai produit tout ce qui s’est passé. »'
  - type: text
    content: Ils obéirent à l’Eternel et s’en retournèrent chez eux.
  - type: heading
    content: Le péché de Jéroboam
  '25':
  - type: text
    content: Jéroboam fortifia la ville de Sichem dans la région montagneuse d’Ephraïm et il en fit sa résidence. Par la suite, il la quitta et fortifia Penouel
  - type: note
    content: C’est-à-dire Péniel (Gn 32.31 ; Jg 8.8, 17) située à l’est du Jourdain ; un endroit de grande importance stratégique dans la défense contre les Araméens de Damas (voir 11.22-25) et les Ammonites.
  - type: text
    content: .
  '26':
  - type: text
    content: 'Jéroboam se dit : Telles que les choses se présentent, les sujets de mon royaume pourraient bien retourner sous l’autorité du fils de David. '
  '27':
  - type: text
    content: S’ils continuent à se rendre à Jérusalem pour y offrir des sacrifices dans le temple de l’Eternel, ce peuple s’attachera de nouveau à son seigneur Roboam, roi de Juda. Alors ils me tueront et se soumettront à Roboam.
  '28':
  - type: text
    content: 'Après avoir pris conseil, le roi fit faire deux veaux d’or et déclara au peuple : En voilà assez avec ces pèlerinages à Jérusalem ! Voici vos dieux, Israël, qui vous ont fait sortir d’Egypte !'
  '29':
  - type: text
    content: Il dressa l’une des statues d’or à Béthel et installa l’autre à Dan
  - type: note
    content: Béthel est un ancien sanctuaire d’Israël (Gn 12.8 ; 28.11-19 ; 35.6-7 ; Jg 20.26-28 ; 1 S 7.16) à une vingtaine de kilomètres au nord de Jérusalem, tout au sud du nouveau royaume. Dan (voir Jg 18.27-31) est tout au nord du pays, près du mont Hermon.
  - type: text
    content: '. '
  '3':
  - type: text
    content: 'On l’envoya chercher et Jéroboam vint avec toute l’assemblée d’Israël parler à Roboam. Ils lui dirent : '
  '30':
  - type: text
    content: 'Ce fut là un péché. Beaucoup de gens accompagnèrent l’un des veaux jusqu’à Dan. '
  '31':
  - type: text
    content: Jéroboam fit aussi construire des sanctuaires sur des hauts lieux et il établit prêtres des hommes pris dans la masse du peuple qui n’appartenaient pas à la tribu de Lévi
  - type: note
    content: Parce que la plupart des lévites s’étaient réfugiés auprès de Roboam (2 Ch 11.13-17).
  - type: text
    content: .
  '32':
  - type: text
    content: Jéroboam institua au quinzième jour du huitième mois une fête semblable à celle qui se célébrait en Juda
  - type: note
    content: Fête semblable à celle des Cabanes, décalée d’un mois (du 7e au 8e mois, mais le même jour).
  - type: text
    content: ' et il offrit lui-même des sacrifices sur l’autel. C’est ainsi qu’il agit à Béthel en offrant des sacrifices aux veaux qu’il avait fait fabriquer. Il établit aussi à Béthel les prêtres des hauts lieux qu’il avait fondés. '
  '33':
  - type: text
    content: Il se rendit à l’autel qu’il avait érigé à Béthel le quinzième jour du huitième mois, date qu’il avait fixée de sa propre initiative. Il institua une fête pour les Israélites et gravit l’autel pour y offrir des parfums.
  '4':
  - type: text
    content: Ton père nous a imposé un joug très pesant. Nous te serons soumis à condition que toi, tu allèges maintenant la lourde servitude et ce joug pesant que ton père nous a imposés.
  '5':
  - type: text
    content: 'Roboam leur répondit : Allez, laissez-moi réfléchir et revenez me trouver après-demain.'
  - type: text
    content: Le peuple se retira donc.
  '6':
  - type: text
    content: 'Le roi Roboam consulta les responsables qui avaient conseillé son père Salomon de son vivant. Il leur demanda : Que me conseillez-vous de répondre à ces gens ?'
  '7':
  - type: text
    content: 'Les responsables lui dirent : Si aujourd’hui tu te montres le serviteur de ce peuple, si tu cèdes à leur requête et si tu leur réponds en termes bienveillants, ils seront pour toujours tes serviteurs.'
  '8':
  - type: text
    content: 'Mais Roboam n’écouta pas le conseil que lui donnaient les responsables. Il consulta les hommes jeunes de son entourage qui avaient grandi avec lui. '
  '9':
  - type: text
    content: 'Il leur demanda : Ces gens me demandent d’alléger le joug que mon père leur a imposé. Que me conseillez-vous de leur répondre ?'
