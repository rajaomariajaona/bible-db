document_id: 1KI.12,21
type_code: fra
verses:
  '1':
  - type: usfm
    marker: ms1
    children:
    - type: text
      text: Le royaume divisé
    marker-yv: yv-h
  - type: usfm
    marker: s1
    children:
    - type: text
      text: La dureté de Roboam envers le peuple
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: (2 Ch 10.1 à 11.4)
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: Roboam se rendit à Sichem
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '12.1 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Ville très ancienne qui a servi depuis longtemps de lieu saint et de point de rassemblement des tribus du Nord (voir Gn 12.6 ; 33.18-20 ; Jos 8.30-35 ; 20.7 ; 21.21 ; 24.1-33 ; Jg 9.6). Elle était située à une cinquantaine de kilomètres au nord de Jérusalem.
      marker-yv: yv-n
    - type: text
      text: ', où tout Israël s’était rassemblé pour le proclamer roi. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'Les hommes jeunes qui avaient grandi avec lui lui répondirent : Ces gens se plaignent en prétendant que ton père a rendu leur joug trop pesant, et ils te demandent de l’alléger ? Eh bien, voici comment tu leur parleras : « Mon petit doigt est plus gros que les reins de mon père. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: Oui, mon père vous a chargés d’un joug pesant, mais moi, je le rendrai encore plus pesant. Mon père vous a fait marcher à coups de fouet, moi, je vous ferai marcher avec des lanières cloutées. »
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'Le surlendemain, Jéroboam et tout le peuple vinrent trouver Roboam comme le roi le leur avait commandé. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'Le roi ne tint pas compte du conseil des responsables et il parla durement au peuple. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'Il lui répondit comme les hommes jeunes le lui avaient conseillé : Mon père vous a imposé un joug pesant, leur dit-il ; et bien, moi je le rendrai encore plus pesant. Mon père vous a fait marcher à coups de fouet, moi je vous ferai marcher à coups de lanières cloutées.'
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: Le roi refusa donc de tenir compte des revendications du peuple, car l’Eternel dirigeait le cours des événements pour accomplir ce qu’il avait annoncé à Jéroboam, fils de Nebath, par l’intermédiaire d’Ahiya de Silo.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: La révolte des Israélites du Nord
    marker-yv: yv-h
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: Voyant que le roi ne les écoutait pas, tous les Israélites
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '12.16 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: C’est-à-dire les Israélites du Nord (voir note v. 1).
      marker-yv: yv-n
    - type: text
      text: ' répliquèrent au roi : Qu’avons-nous à faire avec David ? Nous n’avons rien à voir avec le fils d’Isaï ! Retournons chez nous, gens d’Israël ! Quant à toi, descendant de David, tu n’as qu’à t’occuper de ta propre maison !'
  - type: usfm
    marker: p
    children:
    - type: text
      text: Et les Israélites rentrèrent chez eux
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '12.16 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Voir '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: 2 S 20.1
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: '. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'Roboam régna sur les Israélites qui habitaient les villes de Juda. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: Alors le roi Roboam envoya Adoram
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '12.18 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Peut-être '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'Adoniram '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: – qui avait déjà été ministre de David et de Salomon (2 S 20.24 ; 1 R 4.6 ; 5.28) – comme le lisent certains manuscrits de l’ancienne version grecque et la version syriaque.
      marker-yv: yv-n
    - type: text
      text: ', le chef des corvées, auprès des Israélites du Nord ; mais tous les Israélites le lapidèrent et il mourut. Le roi lui-même réussit de justesse à sauter sur un char pour s’enfuir à Jérusalem. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: C’est ainsi que les Israélites du Nord sont en révolte contre la dynastie de David jusqu’à ce jour.
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'Quand Jéroboam, fils de Nebath, qui se trouvait encore en Egypte où il s’était réfugié pour échapper au roi Salomon, en fut informé, il resta en Egypte. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: Lorsque les Israélites du Nord apprirent que Jéroboam était revenu d’Egypte, ils l’invitèrent à l’assemblée du peuple et le proclamèrent roi sur tout Israël. Seule la tribu de Juda resta fidèle à la dynastie de David.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Le prophète Shemaya empêche la guerre fratricide
    marker-yv: yv-h
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: 'Lorsque Roboam fut de retour à Jérusalem, il mobilisa tous les hommes des tribus de Juda et de Benjamin, soit 180 000 soldats d’élite, pour combattre les Israélites du Nord afin de ramener le royaume sous son autorité. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: 'Mais Dieu adressa le message suivant à Shemaya, homme de Dieu : '
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: 'Parle à Roboam, fils de Salomon, roi de Juda, et à toute la tribu de Juda et de Benjamin, ainsi qu’au reste du peuple pour leur dire : '
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: '« Voici ce que déclare l’Eternel : Ne partez pas en guerre contre vos compatriotes, les Israélites, n’allez pas les combattre ! Que chacun de vous rentre chez soi, car c’est moi qui ai produit tout ce qui s’est passé. »'
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ils obéirent à l’Eternel et s’en retournèrent chez eux.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Le péché de Jéroboam
    marker-yv: yv-h
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: Jéroboam fortifia la ville de Sichem dans la région montagneuse d’Ephraïm et il en fit sa résidence. Par la suite, il la quitta et fortifia Penouel
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '12.25 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'C’est-à-dire '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'Péniel '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '(Gn 32.31 ; Jg 8.8, 17) située à l’est du Jourdain ; un endroit de grande importance stratégique dans la défense contre les Araméens de Damas (voir '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: 11.22-25
        - type: text
          text: ) et les Ammonites.
      marker-yv: yv-n
    - type: text
      text: .
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: 'Jéroboam se dit : Telles que les choses se présentent, les sujets de mon royaume pourraient bien retourner sous l’autorité du fils de David. '
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: S’ils continuent à se rendre à Jérusalem pour y offrir des sacrifices dans le temple de l’Eternel, ce peuple s’attachera de nouveau à son seigneur Roboam, roi de Juda. Alors ils me tueront et se soumettront à Roboam.
  '28':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: 'Après avoir pris conseil, le roi fit faire deux veaux d’or et déclara au peuple : En voilà assez avec ces pèlerinages à Jérusalem ! Voici vos dieux, Israël, qui vous ont fait sortir d’Egypte !'
  '29':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: Il dressa l’une des statues d’or à Béthel et installa l’autre à Dan
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '12.29 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Béthel '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'est un ancien sanctuaire d’Israël (Gn 12.8 ; 28.11-19 ; 35.6-7 ; Jg 20.26-28 ; 1 S 7.16) à une vingtaine de kilomètres au nord de Jérusalem, tout au sud du nouveau royaume. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'Dan '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '(voir '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: Jg 18.27-31
        - type: text
          text: ) est tout au nord du pays, près du mont Hermon.
      marker-yv: yv-n
    - type: text
      text: '. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'On l’envoya chercher et Jéroboam vint avec toute l’assemblée d’Israël parler à Roboam. Ils lui dirent : '
  '30':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '30'
    - type: text
      text: 'Ce fut là un péché. Beaucoup de gens accompagnèrent l’un des veaux jusqu’à Dan. '
  '31':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '31'
    - type: text
      text: Jéroboam fit aussi construire des sanctuaires sur des hauts lieux et il établit prêtres des hommes pris dans la masse du peuple qui n’appartenaient pas à la tribu de Lévi
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '12.31 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Parce que la plupart des lévites s’étaient réfugiés auprès de Roboam (
        - type: usfm
          marker: ref
          children:
          - type: text
            text: 2 Ch 11.13-17
        - type: text
          text: ).
      marker-yv: yv-n
    - type: text
      text: .
  '32':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '32'
    - type: text
      text: Jéroboam institua au quinzième jour du huitième mois une fête semblable à celle qui se célébrait en Juda
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '12.32 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Fête semblable à celle des Cabanes, décalée d’un mois (du 7
        - type: usfm
          marker: ord
          children:
          - type: text
            text: e
        - type: text
          text: ' au 8'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: e
        - type: text
          text: ' mois, mais le même jour).'
      marker-yv: yv-n
    - type: text
      text: ' et il offrit lui-même des sacrifices sur l’autel. C’est ainsi qu’il agit à Béthel en offrant des sacrifices aux veaux qu’il avait fait fabriquer. Il établit aussi à Béthel les prêtres des hauts lieux qu’il avait fondés. '
  '33':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '33'
    - type: text
      text: Il se rendit à l’autel qu’il avait érigé à Béthel le quinzième jour du huitième mois, date qu’il avait fixée de sa propre initiative. Il institua une fête pour les Israélites et gravit l’autel pour y offrir des parfums.
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: Ton père nous a imposé un joug très pesant. Nous te serons soumis à condition que toi, tu allèges maintenant la lourde servitude et ce joug pesant que ton père nous a imposés.
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'Roboam leur répondit : Allez, laissez-moi réfléchir et revenez me trouver après-demain.'
  - type: usfm
    marker: p
    children:
    - type: text
      text: Le peuple se retira donc.
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'Le roi Roboam consulta les responsables qui avaient conseillé son père Salomon de son vivant. Il leur demanda : Que me conseillez-vous de répondre à ces gens ?'
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'Les responsables lui dirent : Si aujourd’hui tu te montres le serviteur de ce peuple, si tu cèdes à leur requête et si tu leur réponds en termes bienveillants, ils seront pour toujours tes serviteurs.'
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'Mais Roboam n’écouta pas le conseil que lui donnaient les responsables. Il consulta les hommes jeunes de son entourage qui avaient grandi avec lui. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'Il leur demanda : Ces gens me demandent d’alléger le joug que mon père leur a imposé. Que me conseillez-vous de leur répondre ?'
