document_id: 1KI.5
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: L’étendue de la domination de Salomon
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Salomon dominait sur tous les petits royaumes qui s’étendaient de l’Euphrate jusqu’au pays des Philistins, et jusqu’à la frontière de l’Egypte
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '5.1 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: C’est-à-dire le torrent d’Egypte (voir Gn 15.18 ; Nb 34.5 ; Jos 15.4 ; 2 Ch 9.26). Les frontières du royaume de Salomon atteignaient les limites du pays promis à Abraham (Gn 15.18-21 ; Dt 1.7 ; 11.24 ; Jos 1.4).
    marker-yv: yv-n
  - type: text
    text: . Pendant toute sa vie, ces peuples lui apportèrent leur tribut et lui restèrent assujettis.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Chaque jour, Salomon recevait pour son entretien et celui de tout son personnel : neuf tonnes de farine fine et dix-huit tonnes de farine ordinaire, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: dix bœufs engraissés, vingt bœufs de pâturage et cent moutons – sans compter les cerfs, les gazelles, les chevreuils et les volailles engraissées.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Il exerçait sa domination sur tout le pays situé au sud-ouest de l’Euphrate depuis Tiphsah jusqu’à Gaza
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '5.4 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Tiphsah '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'était une ville importante sur la rive occidentale de l’Euphrate, elle constituait la limite nord-est du royaume. Gaza en Philistie, près de la Méditerranée, marquait la limite sud-ouest : environ 650 kilomètres.'
    marker-yv: yv-n
  - type: text
    text: ', sur tous les rois de ces contrées, et la paix régnait avec tous les pays alentour. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Pendant toute sa vie, les habitants des territoires de Juda et d’Israël, de Dan à Beer-Sheva, vivaient en toute sécurité, chacun sous sa vigne et sous son figuier
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '5.5 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Expression classique, image de paix et de sécurité.
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Salomon avait quatre mille
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '5.6 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'D’après l’ancienne version grecque (voir '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 2 Ch 9.25
        metadata:
          usfm: 2CH.9.25
      - type: text
        text: '). Le texte hébreu traditionnel a : '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'quarante mille '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: (voir 1 R 10.26 ; 2 Ch 1.14).
    marker-yv: yv-n
  - type: text
    text: ' écuries pour les chevaux de ses chars, et douze mille'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '5.6 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Voir note '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1 S 8.12
        metadata:
          usfm: 1SA.8.12
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: ' hommes d’équipage pour ses chars. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Les gouverneurs pourvoyaient, chacun pendant son mois, au ravitaillement du roi Salomon et de tous ceux qui mangeaient à sa table ; ils veillaient à ce qu’ils ne manquent de rien. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Ils fournissaient aussi, chacun à son tour et suivant sa règle, de l’orge et de la paille pour les chevaux de trait et ceux des attelages de chars à l’endroit où se trouvait le roi.
- type: usfm
  marker: s1
  children:
  - type: text
    text: La sagesse de Salomon
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Dieu donna à Salomon une sagesse exceptionnelle, une très grande intelligence et une large ouverture d’esprit qui le fit s’intéresser à des questions aussi nombreuses que les grains de sable au bord de la mer. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Sa sagesse dépassait celle de tous les sages de l’Orient
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '5.10 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'L’expression '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'de l’Orient '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: servait à désigner les membres des tribus arabes à l’est et au sud-est du pays d’Israël (voir Jr 49.28 ; Ez 25.4, 10).
    marker-yv: yv-n
  - type: text
    text: ' et de l’Egypte. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Il surpassait tous les autres, même Etân l’Ezrahite
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '5.11 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Voir '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ps 89.1
        metadata:
          usfm: PSA.89.1
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: ', Hémân, Kalkol et Darda, les fils de Mahol. Aussi, sa renommée se répandit parmi tous les peuples voisins. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Il fut l’auteur de trois mille proverbes et composa mille cinq chants
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '5.12 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Voir Pr 1.1 ; 10.1 ; 25.1. Les '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ps 72
        metadata:
          usfm: PSA.72
      - type: text
        text: ' et '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '127'
        metadata:
          usfm: PSA.127
      - type: text
        text: ' sont attribués à Salomon.'
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Il a décrit les plantes, du cèdre du Liban jusqu’à la branche d’hysope qui pousse sur les murailles, il a aussi parlé des animaux, des oiseaux, des reptiles et des poissons. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Tous les rois de la terre qui avaient entendu vanter sa sagesse, envoyaient des délégations de tous les pays du monde pour l’entendre.
- type: usfm
  marker: s1
  children:
  - type: text
    text: L’alliance avec le roi de Tyr
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: (2 Ch 2.1-17)
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Hiram, le roi de Tyr, qui avait toujours été un allié de David, envoya des ambassadeurs auprès de Salomon quand il apprit qu’on l’avait établi roi par l’onction pour succéder à son père.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Salomon envoya des messagers à Hiram pour lui dire : '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Tu as toi-même connu David, mon père ; il n’a pas pu construire un temple pour l’Eternel, son Dieu, parce qu’il a dû livrer des guerres aux peuples qui l’entouraient, jusqu’à ce que l’Eternel ait fini par les lui soumettre. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Maintenant, l’Eternel, mon Dieu, m’a accordé de vivre sans être inquiété d’aucun côté, et sans plus avoir à redouter ni adversaire, ni menace de mauvais coup. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'A présent, j’ai décidé de bâtir un temple en l’honneur de l’Eternel, mon Dieu, conformément à ce que l’Eternel a déclaré à mon père David : « C’est ton fils que je te donnerai pour successeur au trône qui construira un temple en mon honneur'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '5.19 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Voir 2 S 7.12-13 ; 1 Ch 17.11-12.
    marker-yv: yv-n
  - type: text
    text: '. » '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Maintenant donc, veuille donner des ordres pour qu’on coupe pour moi des cèdres du Liban
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '5.20 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Pour plus de détails, voir '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 2 Ch 2.3-10
        metadata:
          usfm: 2CH.2.3+2CH.2.4+2CH.2.5+2CH.2.6+2CH.2.7+2CH.2.8+2CH.2.9+2CH.2.10
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: . Mes ouvriers aideront les tiens et je te paierai le salaire de ceux qui travaillent, selon ce que tu fixeras, car tu sais qu’il n’y a personne parmi nous qui sache couper les arbres comme vous, les Sidoniens
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '5.20 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Nom donné aux Phéniciens, Sidon étant la ville phénicienne la plus anciennement connue.
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Lorsque Hiram reçut le message de Salomon, il s’en réjouit fort et déclara : Béni soit aujourd’hui l’Eternel, qui a donné à David un fils plein de sagesse pour gouverner ce grand peuple !'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Puis il envoya cette réponse à Salomon : J’ai bien reçu ton message. Je ferai tout ce que tu désires et je te fournirai le bois de cèdre et de cyprès nécessaire. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: Mes ouvriers transporteront les troncs d’arbre du Liban à la mer, ils les assembleront en radeaux que je ferai remorquer jusqu’à l’endroit que tu me désigneras. Là, je les ferai disjoindre et tes hommes les prendront en charge. Quant à toi, tu pourras répondre à mes désirs en fournissant des vivres pour le personnel de mon palais.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Ainsi Hiram procura à Salomon autant de bois de cèdre et de cyprès qu’il en désirait. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: De son côté, Salomon livrait chaque année à Hiram six mille tonnes de blé et neuf mille litres
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '5.25 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'D’après l’ancienne version grecque (voir '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 2 Ch 2.9
        metadata:
          usfm: 2CH.2.9
      - type: text
        text: '). Le texte hébreu traditionnel a : '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 900 litres.
    marker-yv: yv-n
  - type: text
    text: ' d’huile d’olive de première qualité pour approvisionner son palais.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: Selon sa promesse, l’Eternel avait donné de la sagesse à Salomon, de sorte qu’il sut vivre en bonne harmonie avec Hiram, et ils conclurent ensemble une alliance.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Les préparatifs pour la construction du Temple
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'Le roi Salomon recruta dans tout Israël trente mille hommes de corvée. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'Il les divisa en trois groupes de dix mille, chacun d’eux passait à tour de rôle un mois au Liban et deux mois à la maison. Adoniram était le responsable en chef de ces corvées. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'Salomon employait aussi 70 000 hommes pour les transports et 80 000 tailleurs pour extraire les pierres dans la montagne ; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 3 300
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '5.30 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Certains manuscrits de l’ancienne version grecque et '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 2 Ch 2.1
        metadata:
          usfm: 2CH.2.1
      - type: text
        text: ', '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '17'
        metadata:
          usfm: 2CH.2.17
      - type: text
        text: ' ont : '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 3 600
    - type: usfm
      marker: ft
      children:
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: ' contremaîtres subordonnés aux préfets de Salomon surveillaient les travaux de tous ces ouvriers.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'Le roi ordonna d’extraire de grands blocs de belle pierre qui devaient être taillés pour servir de fondements au Temple. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: Les ouvriers de Salomon et ceux de Hiram, aidés par des spécialistes de la ville de Byblos, se mirent à les tailler et à préparer les bois et les pierres pour la construction du Temple.
