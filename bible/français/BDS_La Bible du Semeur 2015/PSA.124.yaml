document_id: PSA.124,21
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Notre secours vient de l’Eternel
    marker-yv: yv-h
  - type: usfm
    marker: d
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: Cantique pour la route vers la demeure de l’Eternel
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '124.1 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Voir note '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: '120.1'
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: . De David.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Si l’Eternel ╵n’avait pas été avec nous
  - type: usfm
    marker: q1
    children:
    - type: text
      text: – Oui, qu’Israël le dise ! –
  '2':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: si l’Eternel ╵n’avait pas été avec nous
  - type: usfm
    marker: q1
    children:
    - type: text
      text: lorsque des hommes nous ont attaqués,
  '3':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: alors ils nous auraient ╵engloutis tout vivants
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dans l’ardeur de leur rage ╵déchaînée contre nous.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: Le flot nous aurait entraînés
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et le torrent ╵nous aurait submergés.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: Alors des eaux tumultueuses
  - type: usfm
    marker: q1
    children:
    - type: text
      text: auraient passé sur nous.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: Béni soit l’Eternel,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: lui qui n’a pas permis
  - type: usfm
    marker: q1
    children:
    - type: text
      text: que nous soyons ╵une proie pour leurs dents.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'Nous avons pu nous échapper ╵comme l’oiseau du filet des chasseurs :'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: le filet s’est rompu ╵et nous nous sommes échappés.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: Notre secours ╵nous vient de l’Eternel
  - type: usfm
    marker: q1
    children:
    - type: text
      text: qui a fait le ciel et la terre.
