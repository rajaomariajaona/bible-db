document_id: PSA.124,21
type_code: fra
verses:
  '1':
  - type: heading
    content: Notre secours vient de l’Eternel
  - type: text
    content: Cantique pour la route vers la demeure de l’Eternel
  - type: note
    content: Voir note 120.1.
  - type: text
    content: . De David.
  - type: text
    content: Si l’Eternel ╵n’avait pas été avec nous
  - type: text
    content: – Oui, qu’Israël le dise ! –
  '2':
  - type: text
    content: si l’Eternel ╵n’avait pas été avec nous
  - type: text
    content: lorsque des hommes nous ont attaqués,
  '3':
  - type: text
    content: alors ils nous auraient ╵engloutis tout vivants
  - type: text
    content: dans l’ardeur de leur rage ╵déchaînée contre nous.
  '4':
  - type: text
    content: Le flot nous aurait entraînés
  - type: text
    content: et le torrent ╵nous aurait submergés.
  '5':
  - type: text
    content: Alors des eaux tumultueuses
  - type: text
    content: auraient passé sur nous.
  '6':
  - type: text
    content: Béni soit l’Eternel,
  - type: text
    content: lui qui n’a pas permis
  - type: text
    content: que nous soyons ╵une proie pour leurs dents.
  '7':
  - type: text
    content: 'Nous avons pu nous échapper ╵comme l’oiseau du filet des chasseurs :'
  - type: text
    content: le filet s’est rompu ╵et nous nous sommes échappés.
  '8':
  - type: text
    content: Notre secours ╵nous vient de l’Eternel
  - type: text
    content: qui a fait le ciel et la terre.
