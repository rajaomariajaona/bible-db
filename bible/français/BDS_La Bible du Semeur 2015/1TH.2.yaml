document_id: 1TH.2
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: L’annonce de l’Evangile à Thessalonique
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Vous-mêmes, frères et sœurs, vous le savez aussi : l’accueil que vous nous avez réservé n’a certes pas été inutile. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Nous venions d’être maltraités et insultés à Philippes
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '2.2 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Voir '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ac 16.19-24
        metadata:
          usfm: ACT.16.19+ACT.16.20+ACT.16.21+ACT.16.22+ACT.16.23+ACT.16.24
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: ', comme vous le savez. Mais Dieu nous a donné toute l’assurance nécessaire pour vous annoncer, au milieu d’une grande opposition, la Bonne Nouvelle de l’Evangile qui vient de lui.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: En effet, si nous invitons les hommes à croire, ce n’est pas parce que nous serions dans l’erreur, ou que nous aurions des motifs malhonnêtes ou que nous voulions les tromper
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '2.3 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: L’apôtre évoque des accusations que les Juifs de Thessalonique ont dû lancer contre lui et que Timothée lui a sans doute rapportées.
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Non, c’est parce que Dieu nous a jugés dignes d’être chargés de la proclamation de l’Evangile et nous l’annonçons, pour plaire non aux hommes mais à Dieu qui juge notre cœur.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Jamais, vous le savez, nous n’avons eu recours à des discours flatteurs. Jamais nous n’avons tenté de vous exploiter : Dieu en est témoin'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '2.5 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Voir note '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '2.3'
        metadata:
          usfm: 1TH.2.3
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: '  ! '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Nous n’avons jamais cherché à être applaudis par les hommes, pas plus par vous que par d’autres, '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: alors même qu’en tant qu’apôtres de Christ, nous aurions pu vous imposer notre autorité
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '2.7 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Autre traduction : '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'Nous aurions pu vous être à charge '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '(voir '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 2 Th 3.9
        metadata:
          usfm: 2TH.3.9
      - type: text
        text: ).
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: p
  children:
  - type: text
    text: Au contraire, pendant que nous étions parmi vous, nous avons été pleins de tendresse
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '2.7 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'pleins de tendresse. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'De nombreux manuscrits ont : '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: de petits enfants.
    marker-yv: yv-n
  - type: text
    text: '. Comme une mère qui prend soin des enfants qu’elle nourrit, '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'ainsi dans notre vive affection pour vous, nous aurions voulu, non seulement vous annoncer l’Evangile de Dieu, mais encore donner notre propre vie pour vous, tant vous nous étiez devenus chers. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Vous vous souvenez, frères et sœurs, de nos travaux et de toute la peine que nous avons prise. Tout en travaillant de nos mains jour et nuit pour n’être à charge à aucun de vous, nous vous avons annoncé l’Evangile qui vient de Dieu. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Vous en êtes témoins, et Dieu aussi : nous nous sommes comportés, envers vous qui croyez, d’une manière pure, juste et irréprochable. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Et vous savez aussi de quelle manière nous avons agi à l’égard de chacun de vous : comme un père le fait pour ses enfants, '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: nous n’avons cessé de vous transmettre des recommandations, de vous encourager et de vous inciter à vivre d’une manière digne de Dieu qui vous appelle à son royaume et à sa gloire.
- type: usfm
  marker: s1
  children:
  - type: text
    text: La foi et les souffrances des Thessaloniciens
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Et voici pourquoi nous remercions Dieu sans nous lasser : en recevant la Parole de Dieu que nous vous avons annoncée, vous ne l’avez pas accueillie comme une parole purement humaine, mais comme ce qu’elle est réellement, c’est-à-dire la Parole de Dieu, qui agit avec efficacité en vous qui croyez.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Vous l’avez montré, frères et sœurs, en suivant l’exemple des Eglises de Dieu en Judée qui sont unies à Jésus-Christ, car vous aussi, vous avez souffert, de la part de vos compatriotes, les mêmes persécutions qu’elles ont endurées de la part des Juifs
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '2.14 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Voir '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ac 17.5-6
        metadata:
          usfm: ACT.17.5+ACT.17.6
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Ce sont eux qui ont fait mourir le Seigneur Jésus et les prophètes. Ils nous ont persécutés
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '2.15 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Voir Ac 9.23, 29 ; 13.45, 50 ; 14.2, 5, 19 ; 17.5, 13 ; 18.12.
    marker-yv: yv-n
  - type: text
    text: ' nous-mêmes, ils ne se soucient nullement de plaire à Dieu et se montrent ennemis de tous les hommes. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Ils essaient, en effet, de nous empêcher d’annoncer la Parole aux non-Juifs pour que ceux-ci soient sauvés et ils '
  - type: usfm
    marker: qt
    children:
    - type: text
      text: portent ainsi à leur comble les péchés
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '2.16 '
    - type: usfm
      marker: ft
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Gn 15.16
        metadata:
          usfm: GEN.15.16
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: ' qu’ils ont toujours commis. Aussi la colère de Dieu a-t-elle fini par les atteindre.'
- type: usfm
  marker: s1
  children:
  - type: text
    text: L’envoi de Timothée
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'En ce qui nous concerne, frères et sœurs, étant séparés de vous pour un temps – de corps mais non de cœur – nous avons fait beaucoup d’efforts pour vous revoir, car nous en avions le vif désir. '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: C’est pourquoi nous avons voulu aller chez vous – moi, Paul, je l’ai tenté à une et même deux reprises – mais Satan nous en a empêchés.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'N’êtes-vous pas, en effet, vous aussi, notre espérance, notre joie et la couronne dont nous serons fiers en présence de notre Seigneur Jésus au jour de sa venue ? '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Oui, c’est vous qui êtes notre gloire et notre joie !
