document_id: 1TH.2,21
type_code: fra
verses:
  '1':
  - type: heading
    content: L’annonce de l’Evangile à Thessalonique
  - type: text
    content: 'Vous-mêmes, frères et sœurs, vous le savez aussi : l’accueil que vous nous avez réservé n’a certes pas été inutile. '
  '10':
  - type: text
    content: 'Vous en êtes témoins, et Dieu aussi : nous nous sommes comportés, envers vous qui croyez, d’une manière pure, juste et irréprochable. '
  '11':
  - type: text
    content: 'Et vous savez aussi de quelle manière nous avons agi à l’égard de chacun de vous : comme un père le fait pour ses enfants, '
  '12':
  - type: text
    content: nous n’avons cessé de vous transmettre des recommandations, de vous encourager et de vous inciter à vivre d’une manière digne de Dieu qui vous appelle à son royaume et à sa gloire.
  - type: heading
    content: La foi et les souffrances des Thessaloniciens
  '13':
  - type: text
    content: 'Et voici pourquoi nous remercions Dieu sans nous lasser : en recevant la Parole de Dieu que nous vous avons annoncée, vous ne l’avez pas accueillie comme une parole purement humaine, mais comme ce qu’elle est réellement, c’est-à-dire la Parole de Dieu, qui agit avec efficacité en vous qui croyez.'
  '14':
  - type: text
    content: Vous l’avez montré, frères et sœurs, en suivant l’exemple des Eglises de Dieu en Judée qui sont unies à Jésus-Christ, car vous aussi, vous avez souffert, de la part de vos compatriotes, les mêmes persécutions qu’elles ont endurées de la part des Juifs
  - type: note
    content: Voir Ac 17.5-6.
  - type: text
    content: '. '
  '15':
  - type: text
    content: Ce sont eux qui ont fait mourir le Seigneur Jésus et les prophètes. Ils nous ont persécutés
  - type: note
    content: Voir Ac 9.23, 29 ; 13.45, 50 ; 14.2, 5, 19 ; 17.5, 13 ; 18.12.
  - type: text
    content: ' nous-mêmes, ils ne se soucient nullement de plaire à Dieu et se montrent ennemis de tous les hommes. '
  '16':
  - type: text
    content: 'Ils essaient, en effet, de nous empêcher d’annoncer la Parole aux non-Juifs pour que ceux-ci soient sauvés et ils '
  - type: text
    content: portent ainsi à leur comble les péchés
  - type: note
    content: Gn 15.16.
  - type: text
    content: ' qu’ils ont toujours commis. Aussi la colère de Dieu a-t-elle fini par les atteindre.'
  - type: heading
    content: L’envoi de Timothée
  '17':
  - type: text
    content: 'En ce qui nous concerne, frères et sœurs, étant séparés de vous pour un temps – de corps mais non de cœur – nous avons fait beaucoup d’efforts pour vous revoir, car nous en avions le vif désir. '
  '18':
  - type: text
    content: C’est pourquoi nous avons voulu aller chez vous – moi, Paul, je l’ai tenté à une et même deux reprises – mais Satan nous en a empêchés.
  '19':
  - type: text
    content: 'N’êtes-vous pas, en effet, vous aussi, notre espérance, notre joie et la couronne dont nous serons fiers en présence de notre Seigneur Jésus au jour de sa venue ? '
  '2':
  - type: text
    content: Nous venions d’être maltraités et insultés à Philippes
  - type: note
    content: Voir Ac 16.19-24.
  - type: text
    content: ', comme vous le savez. Mais Dieu nous a donné toute l’assurance nécessaire pour vous annoncer, au milieu d’une grande opposition, la Bonne Nouvelle de l’Evangile qui vient de lui.'
  '20':
  - type: text
    content: Oui, c’est vous qui êtes notre gloire et notre joie !
  '3':
  - type: text
    content: En effet, si nous invitons les hommes à croire, ce n’est pas parce que nous serions dans l’erreur, ou que nous aurions des motifs malhonnêtes ou que nous voulions les tromper
  - type: note
    content: L’apôtre évoque des accusations que les Juifs de Thessalonique ont dû lancer contre lui et que Timothée lui a sans doute rapportées.
  - type: text
    content: '. '
  '4':
  - type: text
    content: Non, c’est parce que Dieu nous a jugés dignes d’être chargés de la proclamation de l’Evangile et nous l’annonçons, pour plaire non aux hommes mais à Dieu qui juge notre cœur.
  '5':
  - type: text
    content: 'Jamais, vous le savez, nous n’avons eu recours à des discours flatteurs. Jamais nous n’avons tenté de vous exploiter : Dieu en est témoin'
  - type: note
    content: Voir note 2.3.
  - type: text
    content: '  ! '
  '6':
  - type: text
    content: 'Nous n’avons jamais cherché à être applaudis par les hommes, pas plus par vous que par d’autres, '
  '7':
  - type: text
    content: alors même qu’en tant qu’apôtres de Christ, nous aurions pu vous imposer notre autorité
  - type: note
    content: 'Autre traduction : Nous aurions pu vous être à charge (voir 2 Th 3.9).'
  - type: text
    content: .
  - type: text
    content: Au contraire, pendant que nous étions parmi vous, nous avons été pleins de tendresse
  - type: note
    content: 'pleins de tendresse. De nombreux manuscrits ont : de petits enfants.'
  - type: text
    content: '. Comme une mère qui prend soin des enfants qu’elle nourrit, '
  '8':
  - type: text
    content: 'ainsi dans notre vive affection pour vous, nous aurions voulu, non seulement vous annoncer l’Evangile de Dieu, mais encore donner notre propre vie pour vous, tant vous nous étiez devenus chers. '
  '9':
  - type: text
    content: 'Vous vous souvenez, frères et sœurs, de nos travaux et de toute la peine que nous avons prise. Tout en travaillant de nos mains jour et nuit pour n’être à charge à aucun de vous, nous vous avons annoncé l’Evangile qui vient de Dieu. '
