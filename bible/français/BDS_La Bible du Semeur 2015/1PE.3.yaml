document_id: 1PE.3,21
type_code: fra
verses:
  '1':
  - type: heading
    content: Les femmes et leurs maris
  - type: text
    content: 'Vous de même, femmes, soyez soumises chacune à son mari, pour que si certains d’entre eux ne croient pas à la Parole de Dieu, ils soient gagnés à la foi sans parole, par votre conduite, '
  '10':
  - type: text
    content: Car,
  - type: text
    content: Celui qui souhaite aimer la vie
  - type: text
    content: et voir des jours heureux
  - type: text
    content: qu’il veille sur sa langue
  - type: text
    content: ' ╵'
  - type: text
    content: pour ne faire aucun mal,
  - type: text
    content: et pour qu’aucun propos menteur
  - type: text
    content: ' ╵'
  - type: text
    content: ne passe sur ses lèvres.
  '11':
  - type: text
    content: ' '
  - type: text
    content: Qu’il fuie le mal
  - type: text
    content: ' ╵'
  - type: text
    content: et fasse ce qui est bien ;
  - type: text
    content: qu’il recherche la paix
  - type: text
    content: ' ╵'
  - type: text
    content: avec ténacité,
  '12':
  - type: text
    content: ' '
  - type: text
    content: car les yeux du Seigneur
  - type: text
    content: ' ╵'
  - type: text
    content: 'se tournent vers les justes :'
  - type: text
    content: son oreille est tendue
  - type: text
    content: ' ╵'
  - type: text
    content: pour écouter leur prière.
  - type: text
    content: Mais le Seigneur s’oppose
  - type: text
    content: ' ╵'
  - type: text
    content: à ceux qui font le mal
  - type: note
    content: Ps 34.13-17.
  - type: text
    content: .
  - type: heading
    content: Etre prêt à défendre son espérance
  '13':
  - type: text
    content: 'D’ailleurs, qui vous fera du mal si vous vous appliquez avec zèle à faire ce qui est bien ? '
  '14':
  - type: text
    content: 'Et même s’il vous arrivait de souffrir parce que vous faites ce qui est juste, vous seriez heureux. '
  - type: text
    content: Ne craignez pas les hommes, ne vous laissez pas troubler.
  - type: text
    content: ' '
  '15':
  - type: text
    content: 'Dans votre cœur, '
  - type: text
    content: reconnaissez le Seigneur
  - type: text
    content: ' – c’est-à-dire Christ – '
  - type: text
    content: comme saint
  - type: note
    content: Es 8.12-13.
  - type: text
    content: '  ; si l’on vous demande de justifier votre espérance, soyez toujours prêts à la défendre, '
  '16':
  - type: text
    content: avec humilité
  - type: note
    content: 'Autre traduction : tact.'
  - type: text
    content: ' et respect, et veillez à garder votre conscience pure. Ainsi, ceux qui disent du mal de votre bonne conduite, qui découle de votre union à Christ, auront à rougir de leurs calomnies. '
  '17':
  - type: text
    content: Car il vaut mieux souffrir en faisant le bien, si telle est la volonté de Dieu, qu’en faisant le mal.
  - type: heading
    content: L’exemple par excellence
  '18':
  - type: text
    content: Christ lui-même a souffert la mort
  - type: note
    content: 'Certains manuscrits ont : a souffert.'
  - type: text
    content: ' pour les péchés'
  - type: note
    content: 'Certains manuscrits précisent : pour vous.'
  - type: text
    content: ', une fois pour toutes. Lui l’innocent, il est mort pour des coupables, afin de vous'
  - type: note
    content: 'Certains manuscrits ont : nous.'
  - type: text
    content: ' conduire à Dieu. Il a été mis à mort dans son corps mais il a été ramené à la vie par l’Esprit.'
  '19':
  - type: text
    content: 'C’est aussi par cet Esprit qu’il a proclamé sa victoire aux esprits célestes en prison, ceux qui autrefois s’étaient montrés rebelles, '
  '2':
  - type: text
    content: en observant votre attitude respectueuse et pure.
  '20':
  - type: text
    content: 'alors que Dieu faisait preuve de patience à l’époque où Noé construisait le bateau. Un petit nombre de personnes, huit en tout, y furent sauvées à travers l’eau. '
  '21':
  - type: text
    content: 'C’est ainsi que vous êtes sauvés maintenant, vous aussi : ces événements préfiguraient le baptême'
  - type: note
    content: 'Autres traductions : c’était une préfiguration du baptême qui vous sauve à présent, qui ne consiste pas… ou : par l’eau 21 qui vous sauve à présent, c’est-à-dire le baptême qu’elle préfigurait et qui…'
  - type: text
    content: . Celui-ci ne consiste pas à laver les impuretés du corps, mais à s’engager envers Dieu avec une conscience pure
  - type: note
    content: 'D’autres comprennent : mais à demander à Dieu d’avoir une conscience pure ou : mais en la demande à Dieu faite par une conscience pure.'
  - type: text
    content: '. Tout cela est possible grâce à la résurrection de Jésus-Christ '
  '22':
  - type: text
    content: qui, depuis son ascension, siège à la droite de Dieu, et à qui les anges, les autorités et les puissances célestes sont soumis.
  '3':
  - type: text
    content: 'Que votre parure ne soit pas extérieure : cheveux habilement tressés, bijoux en or, toilettes élégantes, '
  '4':
  - type: text
    content: 'mais la parure cachée de l’être intérieur : la beauté impérissable d’un esprit doux et paisible, à laquelle Dieu attache un grand prix. '
  '5':
  - type: text
    content: Car c’est ainsi que se paraient autrefois les saintes femmes qui plaçaient leur espérance en Dieu, et elles étaient soumises à leur mari.
  '6':
  - type: text
    content: 'Tel était, par exemple, le cas de Sara : dans son obéissance à Abraham, elle l’appelait : '
  - type: text
    content: mon seigneur
  - type: note
    content: Gn 18.12.
  - type: text
    content: . C’est d’elle que vous êtes les filles, si vous faites le bien sans vous laisser troubler par aucune crainte.
  '7':
  - type: text
    content: Vous de même, maris, vivez chacun avec votre femme en faisant preuve de discernement, et en tenant compte de la nature plus délicate de la femme.
  - type: text
    content: 'Traitez-les avec respect : elles doivent recevoir avec vous la vie que Dieu accorde dans sa grâce. Agissez ainsi afin que rien ne vienne faire obstacle à vos prières.'
  - type: heading
    content: Faire le bien
  '8':
  - type: text
    content: 'Enfin, visez tous le même but, partagez vos peines, aimez-vous comme des frères et des sœurs, soyez bons, soyez humbles. '
  '9':
  - type: text
    content: 'Ne rendez pas le mal pour le mal, ni l’injure pour l’injure. Répondez au contraire par la bénédiction, car c’est à cela que vous avez été appelés, afin de recevoir vous-mêmes la bénédiction. '
