document_id: 1PE.3,21
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Les femmes et leurs maris
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Vous de même, femmes, soyez soumises chacune à son mari, pour que si certains d’entre eux ne croient pas à la Parole de Dieu, ils soient gagnés à la foi sans parole, par votre conduite, '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: Car,
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: qt
      children:
      - type: text
        text: Celui qui souhaite aimer la vie
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: qt
      children:
      - type: text
        text: et voir des jours heureux
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: qt
      children:
      - type: text
        text: qu’il veille sur sa langue
    - type: text
      text: ' ╵'
    - type: usfm
      marker: qt
      children:
      - type: text
        text: pour ne faire aucun mal,
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: qt
      children:
      - type: text
        text: et pour qu’aucun propos menteur
    - type: text
      text: ' ╵'
    - type: usfm
      marker: qt
      children:
      - type: text
        text: ne passe sur ses lèvres.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: ' '
    - type: usfm
      marker: qt
      children:
      - type: text
        text: Qu’il fuie le mal
    - type: text
      text: ' ╵'
    - type: usfm
      marker: qt
      children:
      - type: text
        text: et fasse ce qui est bien ;
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: qt
      children:
      - type: text
        text: qu’il recherche la paix
    - type: text
      text: ' ╵'
    - type: usfm
      marker: qt
      children:
      - type: text
        text: avec ténacité,
  '12':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: ' '
    - type: usfm
      marker: qt
      children:
      - type: text
        text: car les yeux du Seigneur
    - type: text
      text: ' ╵'
    - type: usfm
      marker: qt
      children:
      - type: text
        text: 'se tournent vers les justes :'
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: qt
      children:
      - type: text
        text: son oreille est tendue
    - type: text
      text: ' ╵'
    - type: usfm
      marker: qt
      children:
      - type: text
        text: pour écouter leur prière.
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: qt
      children:
      - type: text
        text: Mais le Seigneur s’oppose
    - type: text
      text: ' ╵'
    - type: usfm
      marker: qt
      children:
      - type: text
        text: à ceux qui font le mal
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '3.12 '
      - type: usfm
        marker: ft
        children:
        - type: usfm
          marker: ref
          children:
          - type: text
            text: Ps 34.13-17
        - type: text
          text: .
      marker-yv: yv-n
    - type: usfm
      marker: qt
      children:
      - type: text
        text: .
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Etre prêt à défendre son espérance
    marker-yv: yv-h
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'D’ailleurs, qui vous fera du mal si vous vous appliquez avec zèle à faire ce qui est bien ? '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'Et même s’il vous arrivait de souffrir parce que vous faites ce qui est juste, vous seriez heureux. '
    - type: usfm
      marker: qt
      children:
      - type: text
        text: Ne craignez pas les hommes, ne vous laissez pas troubler.
    - type: text
      text: ' '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'Dans votre cœur, '
    - type: usfm
      marker: qt
      children:
      - type: text
        text: reconnaissez le Seigneur
    - type: text
      text: ' – c’est-à-dire Christ – '
    - type: usfm
      marker: qt
      children:
      - type: text
        text: comme saint
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '3.15 '
      - type: usfm
        marker: ft
        children:
        - type: usfm
          marker: ref
          children:
          - type: text
            text: Es 8.12-13
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: '  ; si l’on vous demande de justifier votre espérance, soyez toujours prêts à la défendre, '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: avec humilité
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '3.16 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Autre traduction : '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: tact.
      marker-yv: yv-n
    - type: text
      text: ' et respect, et veillez à garder votre conscience pure. Ainsi, ceux qui disent du mal de votre bonne conduite, qui découle de votre union à Christ, auront à rougir de leurs calomnies. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: Car il vaut mieux souffrir en faisant le bien, si telle est la volonté de Dieu, qu’en faisant le mal.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: L’exemple par excellence
    marker-yv: yv-h
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: Christ lui-même a souffert la mort
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '3.18 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Certains manuscrits ont : '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: a souffert.
      marker-yv: yv-n
    - type: text
      text: ' pour les péchés'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '3.18 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Certains manuscrits précisent : '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: pour vous.
      marker-yv: yv-n
    - type: text
      text: ', une fois pour toutes. Lui l’innocent, il est mort pour des coupables, afin de vous'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '3.18 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Certains manuscrits ont : '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: nous.
      marker-yv: yv-n
    - type: text
      text: ' conduire à Dieu. Il a été mis à mort dans son corps mais il a été ramené à la vie par l’Esprit.'
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'C’est aussi par cet Esprit qu’il a proclamé sa victoire aux esprits célestes en prison, ceux qui autrefois s’étaient montrés rebelles, '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: en observant votre attitude respectueuse et pure.
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: 'alors que Dieu faisait preuve de patience à l’époque où Noé construisait le bateau. Un petit nombre de personnes, huit en tout, y furent sauvées à travers l’eau. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: 'C’est ainsi que vous êtes sauvés maintenant, vous aussi : ces événements préfiguraient le baptême'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '3.21 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Autres traductions : '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'c’était une préfiguration du baptême qui vous sauve à présent, qui ne consiste pas… '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'ou : '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'par l’eau '
      - type: usfm
        marker: fv
        children:
        - type: text
          text: '21 '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: qui vous sauve à présent, c’est-à-dire le baptême qu’elle préfigurait et qui…
      marker-yv: yv-n
    - type: text
      text: . Celui-ci ne consiste pas à laver les impuretés du corps, mais à s’engager envers Dieu avec une conscience pure
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '3.21 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'D’autres comprennent : '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'mais à demander à Dieu d’avoir une conscience pure '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'ou : '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: mais en la demande à Dieu faite par une conscience pure.
      marker-yv: yv-n
    - type: text
      text: '. Tout cela est possible grâce à la résurrection de Jésus-Christ '
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: qui, depuis son ascension, siège à la droite de Dieu, et à qui les anges, les autorités et les puissances célestes sont soumis.
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'Que votre parure ne soit pas extérieure : cheveux habilement tressés, bijoux en or, toilettes élégantes, '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'mais la parure cachée de l’être intérieur : la beauté impérissable d’un esprit doux et paisible, à laquelle Dieu attache un grand prix. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: Car c’est ainsi que se paraient autrefois les saintes femmes qui plaçaient leur espérance en Dieu, et elles étaient soumises à leur mari.
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'Tel était, par exemple, le cas de Sara : dans son obéissance à Abraham, elle l’appelait : '
    - type: usfm
      marker: qt
      children:
      - type: text
        text: mon seigneur
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '3.6 '
      - type: usfm
        marker: ft
        children:
        - type: usfm
          marker: ref
          children:
          - type: text
            text: Gn 18.12
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: . C’est d’elle que vous êtes les filles, si vous faites le bien sans vous laisser troubler par aucune crainte.
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: Vous de même, maris, vivez chacun avec votre femme en faisant preuve de discernement, et en tenant compte de la nature plus délicate de la femme.
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Traitez-les avec respect : elles doivent recevoir avec vous la vie que Dieu accorde dans sa grâce. Agissez ainsi afin que rien ne vienne faire obstacle à vos prières.'
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Faire le bien
    marker-yv: yv-h
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'Enfin, visez tous le même but, partagez vos peines, aimez-vous comme des frères et des sœurs, soyez bons, soyez humbles. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'Ne rendez pas le mal pour le mal, ni l’injure pour l’injure. Répondez au contraire par la bénédiction, car c’est à cela que vous avez été appelés, afin de recevoir vous-mêmes la bénédiction. '
