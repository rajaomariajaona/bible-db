    children:
    - type: text
      text: Calme au milieu des ennemis
    marker-yv: yv-h
  - type: usfm
    marker: d
    children:
    - type: text
      text: Au maître de chant. Cantique
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '57.1 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Sens incertain.
      marker-yv: yv-n
    - type: text
      text: ' de David sur la mélodie de « Ne détruis pas ! » lorsqu’il s’enfuit, poursuivi par Saül et se réfugia dans la caverne'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '57.1 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Voir 1 S 22.1-2 ; 24.1-9 ; Ps 142.1.
      marker-yv: yv-n
    - type: text
      text: .
  '10':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: je veux te louer, ╵ô Seigneur, ╵au milieu des peuples,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et te célébrer ╵en musique ╵parmi les nations.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ton amour atteint ╵jusqu’aux cieux,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ta fidélité ╵jusqu’aux nues.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: O Dieu, manifeste ╵ta grandeur ╵au-dessus des cieux
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et ta gloire ╵sur toute la terre !
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Aie pitié de moi, ô Dieu ! ╵Aie pitié !
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Car en toi je cherche ╵mon refuge ;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: je me réfugie ╵sous tes ailes
  - type: usfm
    marker: q1
    children:
    - type: text
      text: jusqu’à ce que passe ╵le malheur.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Oui, j’appelle Dieu, ╵le Très-Haut,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Dieu qui mènera ╵tout à bien pour moi.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Qu’il m’envoie du ciel ╵son salut,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et qu’il réprimande ╵ceux qui me poursuivent !
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Que Dieu manifeste ╵envers moi ╵sa fidélité, ╵son amour !
  - type: usfm
    marker: q4
    children:
    - type: text
      text: Pause
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Je suis entouré ╵de lions,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: couché au milieu ╵de gens qui consument ╵des humains.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Leurs dents sont des lances ╵et des flèches,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et leur langue ╵est une épée acérée.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: O Dieu, manifeste ╵ta grandeur ╵au-dessus des cieux
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et ta gloire ╵sur toute la terre !
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ils ont tendu un filet ╵sur ma route.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Je suis humilié.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Devant moi, ╵ils avaient creusé ╵une fosse ;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ils y sont tombés en plein.
  - type: usfm
    marker: q4
    children:
    - type: text
      text: Pause
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mon cœur est tranquille, ╵ô mon Dieu ! ╵Mon cœur est tranquille.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Oui, je chante ╵et je te célèbre ╵en musique
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '57.8 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Pour les v. 8-12, voir '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: 108.2-6
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: '  !'
  '9':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Vite, éveille-toi, ╵ô mon âme,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: vite, éveillez-vous, ╵luth et lyre !
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Je veux éveiller l’aurore,
