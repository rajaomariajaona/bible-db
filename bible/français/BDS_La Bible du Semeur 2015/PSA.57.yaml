document_id: PSA.57,21
type_code: fra
verses:
  '1':
  - type: heading
    content: Calme au milieu des ennemis
  - type: text
    content: Au maître de chant. Cantique
  - type: note
    content: Sens incertain.
  - type: text
    content: ' de David sur la mélodie de « Ne détruis pas ! » lorsqu’il s’enfuit, poursuivi par Saül et se réfugia dans la caverne'
  - type: note
    content: Voir 1 S 22.1-2 ; 24.1-9 ; Ps 142.1.
  - type: text
    content: .
  '10':
  - type: text
    content: je veux te louer, ╵ô Seigneur, ╵au milieu des peuples,
  - type: text
    content: et te célébrer ╵en musique ╵parmi les nations.
  '11':
  - type: text
    content: Ton amour atteint ╵jusqu’aux cieux,
  - type: text
    content: ta fidélité ╵jusqu’aux nues.
  '12':
  - type: text
    content: O Dieu, manifeste ╵ta grandeur ╵au-dessus des cieux
  - type: text
    content: et ta gloire ╵sur toute la terre !
  '2':
  - type: text
    content: Aie pitié de moi, ô Dieu ! ╵Aie pitié !
  - type: text
    content: Car en toi je cherche ╵mon refuge ;
  - type: text
    content: je me réfugie ╵sous tes ailes
  - type: text
    content: jusqu’à ce que passe ╵le malheur.
  '3':
  - type: text
    content: Oui, j’appelle Dieu, ╵le Très-Haut,
  - type: text
    content: Dieu qui mènera ╵tout à bien pour moi.
  '4':
  - type: text
    content: Qu’il m’envoie du ciel ╵son salut,
  - type: text
    content: et qu’il réprimande ╵ceux qui me poursuivent !
  - type: text
    content: Que Dieu manifeste ╵envers moi ╵sa fidélité, ╵son amour !
  - type: text
    content: Pause
  '5':
  - type: text
    content: Je suis entouré ╵de lions,
  - type: text
    content: couché au milieu ╵de gens qui consument ╵des humains.
  - type: text
    content: Leurs dents sont des lances ╵et des flèches,
  - type: text
    content: et leur langue ╵est une épée acérée.
  '6':
  - type: text
    content: O Dieu, manifeste ╵ta grandeur ╵au-dessus des cieux
  - type: text
    content: et ta gloire ╵sur toute la terre !
  '7':
  - type: text
    content: Ils ont tendu un filet ╵sur ma route.
  - type: text
    content: Je suis humilié.
  - type: text
    content: Devant moi, ╵ils avaient creusé ╵une fosse ;
  - type: text
    content: ils y sont tombés en plein.
  - type: text
    content: Pause
  '8':
  - type: text
    content: Mon cœur est tranquille, ╵ô mon Dieu ! ╵Mon cœur est tranquille.
  - type: text
    content: Oui, je chante ╵et je te célèbre ╵en musique
  - type: note
    content: Pour les v. 8-12, voir 108.2-6.
  - type: text
    content: '  !'
  '9':
  - type: text
    content: Vite, éveille-toi, ╵ô mon âme,
  - type: text
    content: vite, éveillez-vous, ╵luth et lyre !
  - type: text
    content: Je veux éveiller l’aurore,
