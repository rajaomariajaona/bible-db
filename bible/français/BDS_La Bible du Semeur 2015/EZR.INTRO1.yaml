document_id: EZR.INTRO1,21
type_code: fra
verses:
  '1':
  - type: text
    content: Introduction
  - type: text
    content: Le livre qui, pendant longtemps n’a fait qu’un avec celui de Néhémie, contient des textes qui proviennent de sources diverses. Plusieurs listes, de différentes natures, reproduisent très certainement des documents officiels (1.9-11 ; chap. 2 ; 7.1-5 ; 8.1-14 ; 10.18-43). A ces listes s’ajoutent sept lettres ou textes officiels dont le premier est en hébreu et les six autres en araméen, langue diplomatique de l’époque (1.2-4 ; 4.11-16, 17-22 ; 5.7-17 ; 6.2-5, 6-12 ; 7.12-26). Les derniers chapitres (7-10, auxquels on peut ajouter Né 8 à 9) constituent ce qu’on peut appeler les « mémoires » d’Esdras, avec une partie rédigée à la troisième personne et une autre à la première personne (7.27 à 9.15).
  - type: text
    content: Des rapprochements entre les Chroniques et Esdras-Néhémie (2 Ch 36.22-23 ; Esd 1.1-3) ont conduit de nombreux spécialistes à proposer un même rédacteur pour ces livres, mais d’autres ont relevé des différences notables entre les accents de ces deux groupes d’écrits. Esdras et Néhémie ont dû être écrits dans la seconde moitié du cinquième siècle avant Jésus-Christ.
  - type: text
    content: 'Les repères chronologiques essentiels du livre sont les suivants :'
  - type: text
    content: 538 av. J.-C. Première année du règne de Cyrus (1.1)
  - type: text
    content: 537 Reconstruction de l’autel (3.1-2)
  - type: text
    content: 536 Début des travaux de reconstruction du Temple (3.8)
  - type: text
    content: 530 à 520 Arrêt des travaux du Temple
  - type: text
    content: 520 à 516 Reprise et fin des travaux du Temple (5.2 ; 6.15)
  - type: text
    content: 458 Arrivée d’Esdras à Jérusalem (7.6-9)
  - type: text
    content: 458​457 Assemblée du peuple (10.9) et examen des cas de mariage mixte (10.16-17).
  - type: text
    content: 'Les Perses, plus tolérants que les Babyloniens qu’ils avaient vaincus, respectaient la religion des peuples qui leur étaient soumis et favorisaient le retour des déportés dans leur pays d’origine. Ainsi, en 538 avant Jésus-Christ, Cyrus permet aux Juifs de rentrer à Jérusalem (chap. 1). Dès leur arrivée, comme les Israélites sous Josué (Jos 5), ils proclament leur dépendance du Suzerain de l’alliance, l’Eternel : ils relèvent l’autel des holocaustes détruit, célèbrent la fête des Cabanes et se mettent à reconstruire le Temple (chap. 3). Celui-ci est achevé en 516 sous l’impulsion des prophètes Aggée et Zacharie (5.1 ; 6.14), après une interruption de dix ans due en partie à l’opposition des autres habitants de la région.'
  - type: text
    content: Mais les rapatriés imitent aussi les Israélites du passé dans leur péché. Lorsque cinquante ans plus tard Esdras, homme versé dans la Loi, arrive à Jérusalem avec deux mille exilés (chap. 7 à 8), il constate que les premiers rapatriés se sont unis par mariage à des non-Israélites de la région et s’adonnent à « leurs pratiques abominables » (9.1-2 ; voir Jos 23.12). Il s’attache alors à la restauration spirituelle (chap. 9 à 10) de ces « survivants » du peuple (9.8), faible « reste » promis par les prophètes, d’où viendra quelques siècles plus tard le Sauveur du monde.
