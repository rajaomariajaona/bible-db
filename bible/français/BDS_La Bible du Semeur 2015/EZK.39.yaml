document_id: EZK.39
type_code: fra
segments:
- type: usfm
  marker: s2
  children:
  - type: text
    text: En pâture aux rapaces
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Et toi, fils d’homme, prophétise sur Gog et dis : Voici ce que déclare le Seigneur, l’Eternel : Je m’en prends à toi, Gog, prince suprême'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '39.1 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Voir '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '38.2'
        metadata:
          usfm: EZK.38.2
      - type: text
        text: ' et note.'
    marker-yv: yv-n
  - type: text
    text: ' de Méshek ainsi que de Toubal, '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'je te ferai faire demi-tour et je te conduirai. Je te ferai venir des confins du septentrion pour te faire arriver sur les montagnes d’Israël. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Je frapperai ton arc pour que ta main gauche le lâche et je ferai tomber tes flèches de ta droite. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Sur les montagnes d’Israël, tu tomberas, toi et tes bataillons, et les peuples qui seront avec toi. Je donnerai ton corps en pâture à toutes sortes d’oiseaux de proie, et aux bêtes sauvages. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Tu tomberas là-bas dans les campagnes, car c’est moi qui le dis. C’est là ce que déclare le Seigneur, l’Eternel. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'J’enverrai le feu dans Magog et sur tous ceux qui vivent dans la sécurité dans les îles et les régions côtières, et ils reconnaîtront que je suis l’Eternel. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Je ferai reconnaître ma sainteté au milieu d’Israël, mon peuple, et je ne me laisserai plus profaner, moi qui suis saint, et les autres peuples sauront que je suis l’Eternel, le Saint en Israël.
- type: usfm
  marker: s2
  children:
  - type: text
    text: Au feu les armes
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Tout cela va venir et tout s’accomplira. C’est là ce que déclare le Seigneur, l’Eternel : Le jour dont j’ai parlé viendra'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '39.8 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Voir '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Jr 4.1-17
        metadata:
          usfm: JER.4.1+JER.4.2+JER.4.3+JER.4.4+JER.4.5+JER.4.6+JER.4.7+JER.4.8+JER.4.9+JER.4.10+JER.4.11+JER.4.12+JER.4.13+JER.4.14+JER.4.15+JER.4.16+JER.4.17
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Alors les habitants des villes d’Israël sortiront allumer un feu, ils brûleront les armes : petits et grands boucliers, arcs et flèches, bâtons et javelots. Ils en feront du feu qui durera sept ans. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Ils n’iront plus aux champs pour ramasser du bois, ils n’auront plus besoin d’aller dans les forêts pour abattre des arbres, car c’est avec les armes que l’on fera du feu, et ils dépouilleront ceux qui les avaient dépouillés et pilleront tous ceux qui les avaient pillés. C’est là ce que déclare le Seigneur, l’Eternel.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Là-bas, en ce jour-là, je donnerai à Gog un lieu de sépulture en Israël : la vallée des Abarim'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '39.11 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Une vallée du pays de Moab par laquelle passait la route des caravanes reliant Damas à la mer Rouge et à l’Arabie.
    marker-yv: yv-n
  - type: text
    text: ', à l’orient de la mer, et cela bouchera le chemin aux passants. On y enterrera Gog et toute sa multitude ; on l’appellera la vallée de la Multitude de Gog.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'La communauté d’Israël les ensevelira afin que le pays soit purifié et cela prendra sept mois. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Tous les gens du pays y participeront, et ce sera pour eux un titre de fierté, le jour où je démontrerai ma gloire. C’est là ce que déclare le Seigneur, l’Eternel.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'On choisira des hommes dont la mission sera de parcourir sans cesse le pays tout entier pour chercher les cadavres demeurés sur le sol, et pour les enterrer afin de purifier le pays d’Israël. Quand les sept mois seront passés, ils feront leurs recherches. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Et quand ces inspecteurs parcourront le pays, lorsque l’un d’eux verra des ossements humains, il dressera à côté d’eux un tas de pierres jusqu’à ce que les fossoyeurs les aient portés en terre dans la vallée de la Multitude de Gog. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Et « Multitude » est aussi le nom d’une ville
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '39.16 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Cette remarque intrigante fait-elle référence à une ville qui portera ce nom au temps de Gog ? Ou bien à la ville infidèle de Jérusalem à l’époque du prophète ? Le terme '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'multitude '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: a en effet été employé précédemment dans des oracles d’Ezéchiel dénonçant les fautes de Jérusalem et annonçant son châtiment (Ez 7.11-14 ; 23.42). Il y aurait alors un contraste entre la situation contemporaine et la purification future du pays.
    marker-yv: yv-n
  - type: text
    text: . Mais le pays sera purifié.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Quant à toi, fils d’homme, voici ce que déclare le Seigneur, l’Eternel : Crie aux oiseaux de toutes sortes et aux bêtes sauvages : « Venez, rassemblez-vous ! Accourez de partout en vue du sacrifice que j’offre pour vous. C’est un grand sacrifice sur les montagnes d’Israël : vous mangerez de la chair et vous boirez du sang. '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Oui, vous vous repaîtrez de la chair des guerriers et vous boirez le sang des princes de la terre, ce sont tous des béliers, des agneaux et des boucs, et de jeunes taureaux, tous engraissés au Basan. '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Vous mangerez à satiété de la graisse, et vous boirez du sang jusqu’à l’ivresse à l’occasion du sacrifice que j’offre pour vous. '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Vous vous repaîtrez à ma table de la chair des chevaux, des hommes d’équipage des chars, des guerriers et de tous les soldats. C’est là ce que déclare le Seigneur, l’Eternel. »
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Je manifesterai ma gloire parmi les peuples non israélites, et tous ces peuples verront mon jugement quand je l’exercerai, ils sentiront la force de mon bras que je ferai peser sur eux. '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'La communauté d’Israël reconnaîtra à partir de ce jour-là que je suis l’Eternel, son Dieu. '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Et les autres peuples sauront que si la communauté d’Israël a été menée en exil, c’est parce qu’elle avait péché, c’est parce que ses membres m’ont été infidèles. Je me suis détourné d’eux et je les ai livrés au pouvoir de leurs ennemis, et ils sont tous tombés sous les coups de l’épée. '
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: C’est parce qu’ils se sont rendus impurs et ont transgressé ma loi que je les ai traités ainsi et que je me suis détourné d’eux.
- type: usfm
  marker: s2
  children:
  - type: text
    text: Un avenir glorieux
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'C’est pourquoi le Seigneur, l’Eternel, déclare ceci : Maintenant je ramènerai les captifs'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '39.25 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'je ramènerai les captifs. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Autre traduction : '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: je changerai le sort.
    marker-yv: yv-n
  - type: text
    text: ' de Jacob, et j’aurai pitié de toute la communauté d’Israël et j’aurai le plus grand souci de faire respecter ma sainteté. '
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Ils auront alors honte en considérant toutes les révoltes dont ils se sont rendus coupables envers moi, l’Eternel, lorsqu’ils habiteront en paix et en sécurité dans leur propre pays, sans avoir rien à craindre de personne. '
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'Lorsque je les ramènerai du milieu des peuples étrangers, que je les rassemblerai des pays de leurs ennemis, et que je manifesterai ma sainteté par ce que je ferai en leur faveur aux yeux de nombreux peuples, '
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'ils reconnaîtront que je suis moi, l’Eternel leur Dieu : car je les ai envoyés en exil au sein de peuples étrangers puis je les ai rassemblés dans leur propre pays sans en laisser un seul là-bas. '
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: Et plus jamais je ne me détournerai d’eux quand j’aurai répandu mon Esprit sur la communauté d’Israël, c’est là ce que déclare le Seigneur, l’Eternel.
