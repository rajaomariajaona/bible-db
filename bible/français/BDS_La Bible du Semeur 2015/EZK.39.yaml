document_id: EZK.39,21
type_code: fra
verses:
  '1':
  - type: heading
    content: En pâture aux rapaces
  - type: text
    content: 'Et toi, fils d’homme, prophétise sur Gog et dis : Voici ce que déclare le Seigneur, l’Eternel : Je m’en prends à toi, Gog, prince suprême'
  - type: note
    content: Voir 38.2 et note.
  - type: text
    content: ' de Méshek ainsi que de Toubal, '
  '10':
  - type: text
    content: Ils n’iront plus aux champs pour ramasser du bois, ils n’auront plus besoin d’aller dans les forêts pour abattre des arbres, car c’est avec les armes que l’on fera du feu, et ils dépouilleront ceux qui les avaient dépouillés et pilleront tous ceux qui les avaient pillés. C’est là ce que déclare le Seigneur, l’Eternel.
  '11':
  - type: text
    content: 'Là-bas, en ce jour-là, je donnerai à Gog un lieu de sépulture en Israël : la vallée des Abarim'
  - type: note
    content: Une vallée du pays de Moab par laquelle passait la route des caravanes reliant Damas à la mer Rouge et à l’Arabie.
  - type: text
    content: ', à l’orient de la mer, et cela bouchera le chemin aux passants. On y enterrera Gog et toute sa multitude ; on l’appellera la vallée de la Multitude de Gog.'
  '12':
  - type: text
    content: 'La communauté d’Israël les ensevelira afin que le pays soit purifié et cela prendra sept mois. '
  '13':
  - type: text
    content: Tous les gens du pays y participeront, et ce sera pour eux un titre de fierté, le jour où je démontrerai ma gloire. C’est là ce que déclare le Seigneur, l’Eternel.
  '14':
  - type: text
    content: 'On choisira des hommes dont la mission sera de parcourir sans cesse le pays tout entier pour chercher les cadavres demeurés sur le sol, et pour les enterrer afin de purifier le pays d’Israël. Quand les sept mois seront passés, ils feront leurs recherches. '
  '15':
  - type: text
    content: 'Et quand ces inspecteurs parcourront le pays, lorsque l’un d’eux verra des ossements humains, il dressera à côté d’eux un tas de pierres jusqu’à ce que les fossoyeurs les aient portés en terre dans la vallée de la Multitude de Gog. '
  '16':
  - type: text
    content: Et « Multitude » est aussi le nom d’une ville
  - type: note
    content: Cette remarque intrigante fait-elle référence à une ville qui portera ce nom au temps de Gog ? Ou bien à la ville infidèle de Jérusalem à l’époque du prophète ? Le terme multitude a en effet été employé précédemment dans des oracles d’Ezéchiel dénonçant les fautes de Jérusalem et annonçant son châtiment (Ez 7.11-14 ; 23.42). Il y aurait alors un contraste entre la situation contemporaine et la purification future du pays.
  - type: text
    content: . Mais le pays sera purifié.
  '17':
  - type: text
    content: 'Quant à toi, fils d’homme, voici ce que déclare le Seigneur, l’Eternel : Crie aux oiseaux de toutes sortes et aux bêtes sauvages : « Venez, rassemblez-vous ! Accourez de partout en vue du sacrifice que j’offre pour vous. C’est un grand sacrifice sur les montagnes d’Israël : vous mangerez de la chair et vous boirez du sang. '
  '18':
  - type: text
    content: 'Oui, vous vous repaîtrez de la chair des guerriers et vous boirez le sang des princes de la terre, ce sont tous des béliers, des agneaux et des boucs, et de jeunes taureaux, tous engraissés au Basan. '
  '19':
  - type: text
    content: 'Vous mangerez à satiété de la graisse, et vous boirez du sang jusqu’à l’ivresse à l’occasion du sacrifice que j’offre pour vous. '
  '2':
  - type: text
    content: 'je te ferai faire demi-tour et je te conduirai. Je te ferai venir des confins du septentrion pour te faire arriver sur les montagnes d’Israël. '
  '20':
  - type: text
    content: Vous vous repaîtrez à ma table de la chair des chevaux, des hommes d’équipage des chars, des guerriers et de tous les soldats. C’est là ce que déclare le Seigneur, l’Eternel. »
  '21':
  - type: text
    content: 'Je manifesterai ma gloire parmi les peuples non israélites, et tous ces peuples verront mon jugement quand je l’exercerai, ils sentiront la force de mon bras que je ferai peser sur eux. '
  '22':
  - type: text
    content: 'La communauté d’Israël reconnaîtra à partir de ce jour-là que je suis l’Eternel, son Dieu. '
  '23':
  - type: text
    content: 'Et les autres peuples sauront que si la communauté d’Israël a été menée en exil, c’est parce qu’elle avait péché, c’est parce que ses membres m’ont été infidèles. Je me suis détourné d’eux et je les ai livrés au pouvoir de leurs ennemis, et ils sont tous tombés sous les coups de l’épée. '
  '24':
  - type: text
    content: C’est parce qu’ils se sont rendus impurs et ont transgressé ma loi que je les ai traités ainsi et que je me suis détourné d’eux.
  - type: heading
    content: Un avenir glorieux
  '25':
  - type: text
    content: 'C’est pourquoi le Seigneur, l’Eternel, déclare ceci : Maintenant je ramènerai les captifs'
  - type: note
    content: 'je ramènerai les captifs. Autre traduction : je changerai le sort.'
  - type: text
    content: ' de Jacob, et j’aurai pitié de toute la communauté d’Israël et j’aurai le plus grand souci de faire respecter ma sainteté. '
  '26':
  - type: text
    content: 'Ils auront alors honte en considérant toutes les révoltes dont ils se sont rendus coupables envers moi, l’Eternel, lorsqu’ils habiteront en paix et en sécurité dans leur propre pays, sans avoir rien à craindre de personne. '
  '27':
  - type: text
    content: 'Lorsque je les ramènerai du milieu des peuples étrangers, que je les rassemblerai des pays de leurs ennemis, et que je manifesterai ma sainteté par ce que je ferai en leur faveur aux yeux de nombreux peuples, '
  '28':
  - type: text
    content: 'ils reconnaîtront que je suis moi, l’Eternel leur Dieu : car je les ai envoyés en exil au sein de peuples étrangers puis je les ai rassemblés dans leur propre pays sans en laisser un seul là-bas. '
  '29':
  - type: text
    content: Et plus jamais je ne me détournerai d’eux quand j’aurai répandu mon Esprit sur la communauté d’Israël, c’est là ce que déclare le Seigneur, l’Eternel.
  '3':
  - type: text
    content: 'Je frapperai ton arc pour que ta main gauche le lâche et je ferai tomber tes flèches de ta droite. '
  '4':
  - type: text
    content: 'Sur les montagnes d’Israël, tu tomberas, toi et tes bataillons, et les peuples qui seront avec toi. Je donnerai ton corps en pâture à toutes sortes d’oiseaux de proie, et aux bêtes sauvages. '
  '5':
  - type: text
    content: 'Tu tomberas là-bas dans les campagnes, car c’est moi qui le dis. C’est là ce que déclare le Seigneur, l’Eternel. '
  '6':
  - type: text
    content: 'J’enverrai le feu dans Magog et sur tous ceux qui vivent dans la sécurité dans les îles et les régions côtières, et ils reconnaîtront que je suis l’Eternel. '
  '7':
  - type: text
    content: Je ferai reconnaître ma sainteté au milieu d’Israël, mon peuple, et je ne me laisserai plus profaner, moi qui suis saint, et les autres peuples sauront que je suis l’Eternel, le Saint en Israël.
  - type: heading
    content: Au feu les armes
  '8':
  - type: text
    content: 'Tout cela va venir et tout s’accomplira. C’est là ce que déclare le Seigneur, l’Eternel : Le jour dont j’ai parlé viendra'
  - type: note
    content: Voir Jr 4.1-17.
  - type: text
    content: '. '
  '9':
  - type: text
    content: 'Alors les habitants des villes d’Israël sortiront allumer un feu, ils brûleront les armes : petits et grands boucliers, arcs et flèches, bâtons et javelots. Ils en feront du feu qui durera sept ans. '
