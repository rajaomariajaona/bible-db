document_id: LEV.17,21
type_code: fra
verses:
  '1':
  - type: usfm
    marker: ms1
    children:
    - type: text
      text: Lois rituelles sur la consommation de viande
    marker-yv: yv-h
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Le lieu de sacrifice des animaux
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'L’Eternel s’adressa à Moïse en ces termes : '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Tout Israélite ou étranger résidant au milieu d’eux qui consommera du sang, je me retournerai contre lui et je le retrancherai de son peuple. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Car le sang, c’est la vie de toute créature. Et moi, je vous l’ai donné afin qu’il serve à accomplir sur l’autel le rite d’expiation pour votre vie. En effet c’est parce qu’il représente la vie que le sang sert d’expiation
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '17.11 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Voir '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: Hé 9.22
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: '. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'C’est pourquoi j’ai dit aux Israélites : Aucun de vous ne doit manger du sang et l’étranger qui réside au milieu de vous n’en consommera pas non plus.'
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Lorsqu’un Israélite ou un étranger installé parmi vous aura pris à la chasse un animal ou un oiseau qu’on a le droit de manger, il en fera couler le sang sur le sol et le recouvrira de terre ; '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'car la vie de toute créature, tant qu’elle est vivante, c’est son sang. C’est pourquoi j’ai dit aux Israélites : Vous ne consommerez le sang d’aucune créature, car son sang, c’est sa vie. Quiconque en consommera sera exclu du peuple'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '17.14 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Voir Gn 9.4 ; Lv 7.26-27 ; Dt 12.16, 23 ; 15.23.
      marker-yv: yv-n
    - type: text
      text: .
  - type: usfm
    marker: s1
    children:
    - type: text
      text: La consommation d’animaux trouvés morts
    marker-yv: yv-h
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Toute personne – autochtone ou immigrée – qui mangera une bête morte ou déchiquetée par une bête sauvage, nettoiera ses vêtements, se lavera à l’eau et restera impure jusqu’au soir ; ensuite elle sera pure. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Si elle ne nettoie pas ses vêtements et ne se lave pas le corps, elle sera tenue pour coupable de sa faute.
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Parle à Aaron, à ses fils et à tous les Israélites et dis-leur : Voici ce que l’Eternel a commandé : '
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'A tout homme d’Israël qui abattra un bœuf, un agneau ou une chèvre dans le camp ou à l’extérieur du camp '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'sans l’avoir amené à l’entrée de la tente de la Rencontre pour le présenter en offrande à l’Eternel devant son tabernacle, il sera demandé compte du sang : puisqu’il a versé le sang, il sera retranché de son peuple. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ainsi, au lieu de faire leurs sacrifices en pleine campagne, les Israélites amèneront les victimes de leurs sacrifices au prêtre, à l’entrée de la tente de la Rencontre, pour l’Eternel, et ils les offriront en sacrifice de communion à l’Eternel. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Le prêtre aspergera du sang de ce sacrifice l’autel de l’Eternel, à l’entrée de la tente de la Rencontre, et il brûlera la graisse, produisant ainsi une odeur apaisante pour l’Eternel. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Le peuple d’Israël n’offrira plus des sacrifices aux idoles à forme de bouc
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '17.7 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'La traduction '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'idoles à forme de bouc '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'rend le mot hébreu qui signifie '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'boucs '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: et qui pourrait désigner des démons.
      marker-yv: yv-n
    - type: text
      text: ' avec lesquelles il se prostitue'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '17.7 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Autre traduction : '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: ils se prostituent.
      marker-yv: yv-n
    - type: text
      text: . C’est une loi en vigueur à perpétuité et pour toutes les générations.
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Tu leur diras encore : Si un Israélite ou un étranger résidant au milieu d’eux offre un holocauste ou un autre sacrifice '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: sans amener la victime à l’entrée de la tente de la Rencontre pour l’offrir à l’Eternel, il sera retranché du peuple.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Le respect du sang
    marker-yv: yv-h
