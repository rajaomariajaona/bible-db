document_id: DEU.24,21
type_code: fra
verses:
  '1':
  - type: heading
    content: Divorce et remariage
  - type: text
    content: Supposons qu’un homme ait épousé une femme et que, plus tard, il cesse de la considérer avec faveur parce qu’il trouve quelque chose d’infâme à lui reprocher. Alors il rédige une lettre de divorce, il la lui remet et la renvoie de chez lui
  - type: note
    content: Cité en Mt 5.31 ; 19.7 ; Mc 10.4.
  - type: text
    content: '. '
  '10':
  - type: text
    content: Si tu prêtes quelque chose à ton prochain, tu ne pénétreras pas dans sa maison pour te saisir d’un gage
  - type: note
    content: Pour les v. 10-13, voir Ex 22.25-26.
  - type: text
    content: '  ; '
  '11':
  - type: text
    content: 'tu attendras dehors que l’emprunteur t’apporte son gage à l’extérieur. '
  '12':
  - type: text
    content: 'S’il s’agit d’un pauvre, tu ne te coucheras pas sans lui avoir restitué le gage. '
  '13':
  - type: text
    content: Tu ne manqueras pas de le lui rapporter au coucher du soleil pour qu’il puisse s’en couvrir à son coucher en te bénissant, et l’Eternel ton Dieu considérera cela comme une marque de justice.
  '14':
  - type: text
    content: 'Tu n’exploiteras pas l’ouvrier journalier qui est d’humble condition ou pauvre – qu’il s’agisse d’un Israélite ou d’un immigré habitant chez toi dans ton pays. '
  '15':
  - type: text
    content: Tu lui donneras son salaire chaque jour avant le coucher du soleil, car étant pauvre, il attend sa paie avec impatience ; sinon il en appellerait à l’Eternel contre toi et tu porterais la responsabilité d’un péché
  - type: note
    content: Voir Lv 19.13.
  - type: text
    content: .
  '16':
  - type: text
    content: 'Les parents ne seront pas mis à mort pour les crimes commis par leurs enfants, ni les enfants pour ceux de leurs parents : si quelqu’un doit être mis à mort, ce sera pour son propre péché.'
  '17':
  - type: text
    content: 'Tu ne fausseras pas le cours de la justice au détriment d’un immigré, ni d’un orphelin, et tu ne prendras pas en gage le vêtement d’une veuve. '
  '18':
  - type: text
    content: Rappelez-vous que vous avez été esclaves en Egypte, et que l’Eternel votre Dieu vous en a libérés ; c’est pourquoi je vous ordonne d’agir ainsi
  - type: note
    content: Voir Ex 23.9 ; Lv 19.33-34 ; Dt 27.19.
  - type: text
    content: .
  '19':
  - type: text
    content: 'Quand tu moissonneras ton champ, si tu oublies une gerbe dans le champ, ne retourne pas pour la ramasser, laisse-la pour l’immigré, pour l’orphelin ou la veuve, afin que l’Eternel ton Dieu te bénisse dans tout ce que tu entreprendras. '
  '2':
  - type: text
    content: 'Après être partie de chez lui, cette femme se remarie avec un autre homme. '
  '20':
  - type: text
    content: 'Quand tu secoueras tes oliviers, ne cueille pas ensuite ce qui reste aux branches, ce sera pour l’immigré, l’orphelin ou la veuve. '
  '21':
  - type: text
    content: 'De même, quand tu vendangeras ta vigne, n’y reviens pas pour grappiller ce qui reste, ce sera pour l’étranger, l’orphelin ou la veuve. '
  '22':
  - type: text
    content: Rappelez-vous que vous avez été esclaves en Egypte ; c’est pourquoi je vous ordonne d’agir ainsi.
  '3':
  - type: text
    content: 'Supposons que ce second mari cesse aussi de l’aimer, qu’il rédige à son tour une lettre de divorce, la lui remette et la renvoie de chez lui, ou supposons qu’il meure. '
  '4':
  - type: text
    content: Dans ce cas, le premier mari qui l’a renvoyée n’aura pas le droit de la reprendre pour femme, car elle est devenue impure pour lui, et ce serait une chose abominable aux yeux de l’Eternel. Vous ne chargerez pas de péché le pays que l’Eternel votre Dieu vous donne en possession.
  - type: heading
    content: Quelques atteintes aux personnes
  '5':
  - type: text
    content: Lorsqu’un homme vient de se marier, il sera dispensé du service militaire et on ne le chargera d’aucune obligation particulière ; il restera disponible pour son foyer pendant un an, et fera la joie de la femme qu’il aura épousée.
  '6':
  - type: text
    content: On ne prendra pas en gage les deux meules de son prochain, on ne saisira même pas celle du dessus, car ce serait prendre en gage ses moyens d’existence.
  '7':
  - type: text
    content: Si l’on découvre qu’un Israélite a enlevé l’un de ses compatriotes israélites et l’a réduit en esclavage ou l’a vendu, cet homme sera puni de mort. Ainsi vous ferez disparaître du milieu de vous la souillure qu’entraîne le mal
  - type: note
    content: Voir Ex 21.16.
  - type: text
    content: .
  - type: heading
    content: Les maladies de peau
  '8':
  - type: text
    content: Veillez à observer les prescriptions relatives aux maladies de peau à caractère évolutif, du genre « lèpre ». Suivez très soigneusement tous les ordres que j’ai donnés aux prêtres-lévites et qu’ils vous transmettront. Obéissez-y et appliquez-les
  - type: note
    content: A propos de ces maladies de peau, voir Lv 13 et 14.
  - type: text
    content: '. '
  '9':
  - type: text
    content: Souvenez-vous de ce que l’Eternel votre Dieu a fait à Miryam pendant votre voyage après la sortie d’Egypte
  - type: note
    content: Voir Nb 12.10.
  - type: text
    content: .
  - type: heading
    content: Protection des démunis
