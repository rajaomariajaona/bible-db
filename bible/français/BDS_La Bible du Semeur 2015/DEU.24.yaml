document_id: DEU.24
type_code: fra
segments:
- type: usfm
  marker: s2
  children:
  - type: text
    text: Divorce et remariage
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Supposons qu’un homme ait épousé une femme et que, plus tard, il cesse de la considérer avec faveur parce qu’il trouve quelque chose d’infâme à lui reprocher. Alors il rédige une lettre de divorce, il la lui remet et la renvoie de chez lui
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '24.1 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Cité en Mt 5.31 ; 19.7 ; Mc 10.4.
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Après être partie de chez lui, cette femme se remarie avec un autre homme. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Supposons que ce second mari cesse aussi de l’aimer, qu’il rédige à son tour une lettre de divorce, la lui remette et la renvoie de chez lui, ou supposons qu’il meure. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Dans ce cas, le premier mari qui l’a renvoyée n’aura pas le droit de la reprendre pour femme, car elle est devenue impure pour lui, et ce serait une chose abominable aux yeux de l’Eternel. Vous ne chargerez pas de péché le pays que l’Eternel votre Dieu vous donne en possession.
- type: usfm
  marker: s2
  children:
  - type: text
    text: Quelques atteintes aux personnes
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Lorsqu’un homme vient de se marier, il sera dispensé du service militaire et on ne le chargera d’aucune obligation particulière ; il restera disponible pour son foyer pendant un an, et fera la joie de la femme qu’il aura épousée.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: On ne prendra pas en gage les deux meules de son prochain, on ne saisira même pas celle du dessus, car ce serait prendre en gage ses moyens d’existence.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Si l’on découvre qu’un Israélite a enlevé l’un de ses compatriotes israélites et l’a réduit en esclavage ou l’a vendu, cet homme sera puni de mort. Ainsi vous ferez disparaître du milieu de vous la souillure qu’entraîne le mal
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '24.7 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Voir '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ex 21.16
        metadata:
          usfm: EXO.21.16
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: s2
  children:
  - type: text
    text: Les maladies de peau
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Veillez à observer les prescriptions relatives aux maladies de peau à caractère évolutif, du genre « lèpre ». Suivez très soigneusement tous les ordres que j’ai donnés aux prêtres-lévites et qu’ils vous transmettront. Obéissez-y et appliquez-les
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '24.8 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'A propos de ces maladies de peau, voir '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Lv 13
        metadata:
          usfm: LEV.13
      - type: text
        text: ' et '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '14'
        metadata:
          usfm: LEV.14
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Souvenez-vous de ce que l’Eternel votre Dieu a fait à Miryam pendant votre voyage après la sortie d’Egypte
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '24.9 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Voir '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Nb 12.10
        metadata:
          usfm: NUM.12.10
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: s2
  children:
  - type: text
    text: Protection des démunis
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Si tu prêtes quelque chose à ton prochain, tu ne pénétreras pas dans sa maison pour te saisir d’un gage
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '24.10 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Pour les v. 10-13, voir '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ex 22.25-26
        metadata:
          usfm: EXO.22.25+EXO.22.26
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: '  ; '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'tu attendras dehors que l’emprunteur t’apporte son gage à l’extérieur. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'S’il s’agit d’un pauvre, tu ne te coucheras pas sans lui avoir restitué le gage. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Tu ne manqueras pas de le lui rapporter au coucher du soleil pour qu’il puisse s’en couvrir à son coucher en te bénissant, et l’Eternel ton Dieu considérera cela comme une marque de justice.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Tu n’exploiteras pas l’ouvrier journalier qui est d’humble condition ou pauvre – qu’il s’agisse d’un Israélite ou d’un immigré habitant chez toi dans ton pays. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Tu lui donneras son salaire chaque jour avant le coucher du soleil, car étant pauvre, il attend sa paie avec impatience ; sinon il en appellerait à l’Eternel contre toi et tu porterais la responsabilité d’un péché
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '24.15 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Voir '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Lv 19.13
        metadata:
          usfm: LEV.19.13
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Les parents ne seront pas mis à mort pour les crimes commis par leurs enfants, ni les enfants pour ceux de leurs parents : si quelqu’un doit être mis à mort, ce sera pour son propre péché.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Tu ne fausseras pas le cours de la justice au détriment d’un immigré, ni d’un orphelin, et tu ne prendras pas en gage le vêtement d’une veuve. '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Rappelez-vous que vous avez été esclaves en Egypte, et que l’Eternel votre Dieu vous en a libérés ; c’est pourquoi je vous ordonne d’agir ainsi
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '24.18 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Voir Ex 23.9 ; Lv 19.33-34 ; Dt 27.19.
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Quand tu moissonneras ton champ, si tu oublies une gerbe dans le champ, ne retourne pas pour la ramasser, laisse-la pour l’immigré, pour l’orphelin ou la veuve, afin que l’Eternel ton Dieu te bénisse dans tout ce que tu entreprendras. '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Quand tu secoueras tes oliviers, ne cueille pas ensuite ce qui reste aux branches, ce sera pour l’immigré, l’orphelin ou la veuve. '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'De même, quand tu vendangeras ta vigne, n’y reviens pas pour grappiller ce qui reste, ce sera pour l’étranger, l’orphelin ou la veuve. '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: Rappelez-vous que vous avez été esclaves en Egypte ; c’est pourquoi je vous ordonne d’agir ainsi.
