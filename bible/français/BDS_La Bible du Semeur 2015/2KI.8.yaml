document_id: 2KI.8
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Le roi rend justice à la Sunamite
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Elisée dit à la femme dont il avait ressuscité le fils
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '8.1 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Voir '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 2 R 4
        metadata:
          usfm: 2KI.4
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: '  : Mets-toi en route et va à l’étranger avec ta famille. Allez vous installer où vous pourrez, car l’Eternel a décidé d’envoyer dans ce pays une famine qui sévira durant sept ans.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'La femme suivit le conseil de l’homme de Dieu : elle s’en alla avec sa famille et s’installa pendant sept ans dans le pays des Philistins'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '8.2 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Plus fertile que les montagnes d’Israël, moins menacé par les incursions des Syriens.
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'A la fin de la septième année, elle en revint et se rendit chez le roi pour implorer son intervention afin qu’on lui rende sa maison et ses terres. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Le roi s’entretenait justement avec Guéhazi, le serviteur de l’homme de Dieu, et lui demandait : Raconte-moi donc toutes les grandes choses qu’Elisée a accomplies.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Or, au moment précis où il lui racontait comment Elisée avait ramené un mort à la vie, la femme dont il avait ressuscité le fils arriva auprès du roi pour implorer son intervention au sujet de sa maison et de ses terres. Alors Guéhazi s’exclama : Mon seigneur le roi, voici la femme dont je te parlais et voici son fils qu’Elisée a rendu à la vie !'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Le roi interrogea la femme et elle lui raconta toute son histoire. Puis le roi mit à sa disposition l’un de ses chambellans auquel il dit : Fais restituer à cette femme tout ce qui lui appartient, et qu’on lui paie même une redevance pour ce que ses terres ont rapporté depuis le jour où elle a quitté le pays jusqu’à maintenant.'
- type: usfm
  marker: s1
  children:
  - type: text
    text: Hazaël rencontre Elisée et devient roi de Syrie
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Une autre fois, Elisée se rendit à Damas. Ben-Hadad, le roi de Syrie, était malade. On lui annonça que l’homme de Dieu était venu jusque-là. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Le roi dit à Hazaël : Prends un cadeau, va trouver l’homme de Dieu et consulte l’Eternel par son intermédiaire pour savoir si je guérirai de cette maladie.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Hazaël alla trouver Elisée en emportant un présent composé des meilleurs produits de Damas
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '8.9 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Damas '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: était un centre commercial important au carrefour des routes entre l’Egypte, l’Asie Mineure et la Mésopotamie.
    marker-yv: yv-n
  - type: text
    text: ', chargés sur quarante chameaux. Lorsqu’il fut arrivé auprès de lui, il se tint devant lui et dit : Ton serviteur Ben-Hadad, roi de Syrie, m’envoie vers toi pour te demander s’il sortira vivant de cette maladie.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Elisée lui répondit : Va et dis-lui : « Oui, certainement, tu guériras de cette maladie. » Cependant, l’Eternel m’a révélé qu’il va mourir.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Puis le regard de l’homme de Dieu se figea, il fixa Hazaël avec intensité, jusqu’à ce que celui-ci rougisse de honte, puis il se mit à pleurer.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Hazaël lui demanda : Pourquoi mon seigneur pleure-t-il ?'
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Elisée répondit : Parce que je sais tout le mal que tu feras aux Israélites, tu incendieras leurs villes fortifiées, tu massacreras leurs jeunes gens, tu écraseras leurs petits enfants et tu fendras le ventre de leurs femmes enceintes'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '8.12 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Voir 10.32 ; 12.18-19 ; 13.3, 22.
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Hazaël reprit étonné : Mais qu’est donc ton serviteur, pour accomplir de pareilles choses ? Je n’ai pas plus de valeur qu’un chien.'
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Elisée répliqua : L’Eternel m’a fait voir que tu deviendras roi de Syrie'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '8.13 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Voir '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1 R 19.15
        metadata:
          usfm: 1KI.19.15
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Hazaël quitta Elisée et revint auprès de son souverain qui lui demanda : Que t’a dit Elisée ?'
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Il répondit : Il m’a dit : « Oui, certainement tu guériras de cette maladie. »'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Le lendemain Hazaël prit une couverture, la trempa dans l’eau et en recouvrit le visage du roi qui mourut. Hazaël lui succéda sur le trône.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Le règne de Yoram sur Juda
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: (2 Ch 21.5-10,  20)
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'La cinquième année du règne de Yoram, fils d’Achab, roi d’Israël, tandis que Josaphat était encore roi de Juda, Yoram, son fils, devint roi de Juda. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Il avait trente-deux ans à son avènement et il régna huit ans à Jérusalem
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '8.17 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: De 848 à 841 av. J.-C. Ne pas confondre Yoram et Ahazia de Juda avec Ahazia et Yoram d’Israël.
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Il suivit l’exemple des rois d’Israël, agissant comme la dynastie d’Achab, car il avait épousé une fille d’Achab
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '8.18 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'La femme de Yoram était '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'Athalie, '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'une fille d’Achab (v. 26 ; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 2 Ch 18.1
        metadata:
          usfm: 2CH.18.1
      - type: text
        text: ).
    marker-yv: yv-n
  - type: text
    text: '. Il fit ce que l’Eternel considère comme mal. '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Pourtant, l’Eternel ne voulut pas détruire Juda, à cause de son serviteur David à qui il avait promis que ses descendants régneraient pour toujours
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '8.19 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Voir 2 S 7.12-16 ; 1 R 11.36.
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Sous le règne de Yoram, les Edomites se révoltèrent contre la domination de Juda, et se donnèrent un roi
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '8.20 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Voir '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Gn 27.40
        metadata:
          usfm: GEN.27.40
      - type: text
        text: . Jusque-là, Edom avait été vassal de Juda, sous les ordres d’un gouverneur (3.9 ; 1 R 22.48).
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Alors Yoram partit pour Tsaïr
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '8.21 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Localité inconnue, très certainement en Edom ou proche d’Edom.
    marker-yv: yv-n
  - type: text
    text: ' avec tous ses chars de guerre. En pleine nuit, il tomba sur les Edomites qui l’avaient déjà encerclé, et il les battit ainsi que les chefs des chars ; les soldats s’enfuirent chez eux. '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: Depuis lors, Edom fut en révolte contre Juda, et il l’est toujours. A la même époque, Libna
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '8.22 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Ville de Juda sur les confins de la Philistie, près de Lakish (
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '19.8'
        metadata:
          usfm: 2KI.19.8
      - type: text
        text: ), à une quarantaine de kilomètres à l’ouest de Jérusalem. C’était l’une des villes des prêtres (
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Jos 21.13
        metadata:
          usfm: JOS.21.13
      - type: text
        text: '). Sa révolte est peut-être liée à celles des Philistins et des Arabes mentionnées en '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 2 Ch 21.16-17
        metadata:
          usfm: 2CH.21.16+2CH.21.17
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: ' se révolta également.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Les autres faits et gestes de Yoram et toutes ses réalisations sont cités dans le livre des Annales des rois de Juda. '
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: Yoram rejoignit ses ancêtres décédés et fut enterré à leurs côtés dans la Cité de David. Ahazia, son fils, lui succéda sur le trône.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Le règne d’Ahazia sur Juda
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: (2 Ch 22.1-6)
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'La douzième année du règne de Yoram, fils d’Achab, roi d’Israël, Ahazia, fils de Yoram, devint roi de Juda. '
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: Il était âgé de vingt-deux ans à son avènement et il régna un an à Jérusalem
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '8.26 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: En 841 av. J.-C.
    marker-yv: yv-n
  - type: text
    text: '. Sa mère s’appelait Athalie, elle était une petite-fille d’Omri, roi d’Israël. '
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'Ahazia suivit l’exemple de la dynastie d’Achab et fit ce que l’Eternel considère comme mal, comme la famille d’Achab, car il était allié par mariage à cette famille. '
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'Il partit avec Yoram, le fils d’Achab, pour une expédition militaire contre Hazaël, roi de Syrie, à Ramoth en Galaad. Yoram fut blessé par les Syriens. '
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: Alors, il retourna à Jizréel
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '8.29 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Où était l’une des résidences des rois d’Israël (cf. 1 R 18.45-46 ; 21.1-2).
    marker-yv: yv-n
  - type: text
    text: ' pour se faire soigner des blessures que les Syriens lui avaient infligées à Rama pendant le combat contre Hazaël, roi de Syrie. Ahazia, fils de Yoram, roi de Juda, y alla pour lui rendre visite au cours de sa maladie.'
