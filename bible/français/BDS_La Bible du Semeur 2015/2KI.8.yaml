document_id: 2KI.8,21
type_code: fra
verses:
  '1':
  - type: heading
    content: Le roi rend justice à la Sunamite
  - type: text
    content: Elisée dit à la femme dont il avait ressuscité le fils
  - type: note
    content: Voir 2 R 4.
  - type: text
    content: '  : Mets-toi en route et va à l’étranger avec ta famille. Allez vous installer où vous pourrez, car l’Eternel a décidé d’envoyer dans ce pays une famine qui sévira durant sept ans.'
  '10':
  - type: text
    content: 'Elisée lui répondit : Va et dis-lui : « Oui, certainement, tu guériras de cette maladie. » Cependant, l’Eternel m’a révélé qu’il va mourir.'
  '11':
  - type: text
    content: Puis le regard de l’homme de Dieu se figea, il fixa Hazaël avec intensité, jusqu’à ce que celui-ci rougisse de honte, puis il se mit à pleurer.
  '12':
  - type: text
    content: 'Hazaël lui demanda : Pourquoi mon seigneur pleure-t-il ?'
  - type: text
    content: 'Elisée répondit : Parce que je sais tout le mal que tu feras aux Israélites, tu incendieras leurs villes fortifiées, tu massacreras leurs jeunes gens, tu écraseras leurs petits enfants et tu fendras le ventre de leurs femmes enceintes'
  - type: note
    content: Voir 10.32 ; 12.18-19 ; 13.3, 22.
  - type: text
    content: .
  '13':
  - type: text
    content: 'Hazaël reprit étonné : Mais qu’est donc ton serviteur, pour accomplir de pareilles choses ? Je n’ai pas plus de valeur qu’un chien.'
  - type: text
    content: 'Elisée répliqua : L’Eternel m’a fait voir que tu deviendras roi de Syrie'
  - type: note
    content: Voir 1 R 19.15.
  - type: text
    content: .
  '14':
  - type: text
    content: 'Hazaël quitta Elisée et revint auprès de son souverain qui lui demanda : Que t’a dit Elisée ?'
  - type: text
    content: 'Il répondit : Il m’a dit : « Oui, certainement tu guériras de cette maladie. »'
  '15':
  - type: text
    content: Le lendemain Hazaël prit une couverture, la trempa dans l’eau et en recouvrit le visage du roi qui mourut. Hazaël lui succéda sur le trône.
  - type: heading
    content: Le règne de Yoram sur Juda
  - type: heading
    content: (2 Ch 21.5-10,  20)
  '16':
  - type: text
    content: 'La cinquième année du règne de Yoram, fils d’Achab, roi d’Israël, tandis que Josaphat était encore roi de Juda, Yoram, son fils, devint roi de Juda. '
  '17':
  - type: text
    content: Il avait trente-deux ans à son avènement et il régna huit ans à Jérusalem
  - type: note
    content: De 848 à 841 av. J.-C. Ne pas confondre Yoram et Ahazia de Juda avec Ahazia et Yoram d’Israël.
  - type: text
    content: '. '
  '18':
  - type: text
    content: Il suivit l’exemple des rois d’Israël, agissant comme la dynastie d’Achab, car il avait épousé une fille d’Achab
  - type: note
    content: La femme de Yoram était Athalie, une fille d’Achab (v. 26 ; 2 Ch 18.1).
  - type: text
    content: '. Il fit ce que l’Eternel considère comme mal. '
  '19':
  - type: text
    content: Pourtant, l’Eternel ne voulut pas détruire Juda, à cause de son serviteur David à qui il avait promis que ses descendants régneraient pour toujours
  - type: note
    content: Voir 2 S 7.12-16 ; 1 R 11.36.
  - type: text
    content: .
  '2':
  - type: text
    content: 'La femme suivit le conseil de l’homme de Dieu : elle s’en alla avec sa famille et s’installa pendant sept ans dans le pays des Philistins'
  - type: note
    content: Plus fertile que les montagnes d’Israël, moins menacé par les incursions des Syriens.
  - type: text
    content: '. '
  '20':
  - type: text
    content: Sous le règne de Yoram, les Edomites se révoltèrent contre la domination de Juda, et se donnèrent un roi
  - type: note
    content: Voir Gn 27.40. Jusque-là, Edom avait été vassal de Juda, sous les ordres d’un gouverneur (3.9 ; 1 R 22.48).
  - type: text
    content: '. '
  '21':
  - type: text
    content: Alors Yoram partit pour Tsaïr
  - type: note
    content: Localité inconnue, très certainement en Edom ou proche d’Edom.
  - type: text
    content: ' avec tous ses chars de guerre. En pleine nuit, il tomba sur les Edomites qui l’avaient déjà encerclé, et il les battit ainsi que les chefs des chars ; les soldats s’enfuirent chez eux. '
  '22':
  - type: text
    content: Depuis lors, Edom fut en révolte contre Juda, et il l’est toujours. A la même époque, Libna
  - type: note
    content: Ville de Juda sur les confins de la Philistie, près de Lakish (19.8), à une quarantaine de kilomètres à l’ouest de Jérusalem. C’était l’une des villes des prêtres (Jos 21.13). Sa révolte est peut-être liée à celles des Philistins et des Arabes mentionnées en 2 Ch 21.16-17.
  - type: text
    content: ' se révolta également.'
  '23':
  - type: text
    content: 'Les autres faits et gestes de Yoram et toutes ses réalisations sont cités dans le livre des Annales des rois de Juda. '
  '24':
  - type: text
    content: Yoram rejoignit ses ancêtres décédés et fut enterré à leurs côtés dans la Cité de David. Ahazia, son fils, lui succéda sur le trône.
  - type: heading
    content: Le règne d’Ahazia sur Juda
  - type: heading
    content: (2 Ch 22.1-6)
  '25':
  - type: text
    content: 'La douzième année du règne de Yoram, fils d’Achab, roi d’Israël, Ahazia, fils de Yoram, devint roi de Juda. '
  '26':
  - type: text
    content: Il était âgé de vingt-deux ans à son avènement et il régna un an à Jérusalem
  - type: note
    content: En 841 av. J.-C.
  - type: text
    content: '. Sa mère s’appelait Athalie, elle était une petite-fille d’Omri, roi d’Israël. '
  '27':
  - type: text
    content: 'Ahazia suivit l’exemple de la dynastie d’Achab et fit ce que l’Eternel considère comme mal, comme la famille d’Achab, car il était allié par mariage à cette famille. '
  '28':
  - type: text
    content: 'Il partit avec Yoram, le fils d’Achab, pour une expédition militaire contre Hazaël, roi de Syrie, à Ramoth en Galaad. Yoram fut blessé par les Syriens. '
  '29':
  - type: text
    content: Alors, il retourna à Jizréel
  - type: note
    content: Où était l’une des résidences des rois d’Israël (cf. 1 R 18.45-46 ; 21.1-2).
  - type: text
    content: ' pour se faire soigner des blessures que les Syriens lui avaient infligées à Rama pendant le combat contre Hazaël, roi de Syrie. Ahazia, fils de Yoram, roi de Juda, y alla pour lui rendre visite au cours de sa maladie.'
  '3':
  - type: text
    content: 'A la fin de la septième année, elle en revint et se rendit chez le roi pour implorer son intervention afin qu’on lui rende sa maison et ses terres. '
  '4':
  - type: text
    content: 'Le roi s’entretenait justement avec Guéhazi, le serviteur de l’homme de Dieu, et lui demandait : Raconte-moi donc toutes les grandes choses qu’Elisée a accomplies.'
  '5':
  - type: text
    content: 'Or, au moment précis où il lui racontait comment Elisée avait ramené un mort à la vie, la femme dont il avait ressuscité le fils arriva auprès du roi pour implorer son intervention au sujet de sa maison et de ses terres. Alors Guéhazi s’exclama : Mon seigneur le roi, voici la femme dont je te parlais et voici son fils qu’Elisée a rendu à la vie !'
  '6':
  - type: text
    content: 'Le roi interrogea la femme et elle lui raconta toute son histoire. Puis le roi mit à sa disposition l’un de ses chambellans auquel il dit : Fais restituer à cette femme tout ce qui lui appartient, et qu’on lui paie même une redevance pour ce que ses terres ont rapporté depuis le jour où elle a quitté le pays jusqu’à maintenant.'
  - type: heading
    content: Hazaël rencontre Elisée et devient roi de Syrie
  '7':
  - type: text
    content: 'Une autre fois, Elisée se rendit à Damas. Ben-Hadad, le roi de Syrie, était malade. On lui annonça que l’homme de Dieu était venu jusque-là. '
  '8':
  - type: text
    content: 'Le roi dit à Hazaël : Prends un cadeau, va trouver l’homme de Dieu et consulte l’Eternel par son intermédiaire pour savoir si je guérirai de cette maladie.'
  '9':
  - type: text
    content: Hazaël alla trouver Elisée en emportant un présent composé des meilleurs produits de Damas
  - type: note
    content: Damas était un centre commercial important au carrefour des routes entre l’Egypte, l’Asie Mineure et la Mésopotamie.
  - type: text
    content: ', chargés sur quarante chameaux. Lorsqu’il fut arrivé auprès de lui, il se tint devant lui et dit : Ton serviteur Ben-Hadad, roi de Syrie, m’envoie vers toi pour te demander s’il sortira vivant de cette maladie.'
