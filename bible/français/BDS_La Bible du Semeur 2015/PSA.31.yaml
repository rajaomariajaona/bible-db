document_id: PSA.31,21
type_code: fra
verses:
  '1':
  - type: heading
    content: J’ai mis ma confiance en l’Eternel
  - type: text
    content: Au chef de chœur. Psaume de David.
  '10':
  - type: text
    content: Aie pitié de moi, Eternel, ╵je suis dans la détresse,
  - type: text
    content: le chagrin me ronge les yeux, ╵l’âme et le corps entier.
  '11':
  - type: text
    content: Ma vie se consume en tourments,
  - type: text
    content: mes années en gémissements.
  - type: text
    content: Les forces m’abandonnent ╵à cause de ma faute
  - type: note
    content: 'Autre traduction : à cause de ma misère.'
  - type: text
    content: et mon corps dépérit.
  '12':
  - type: text
    content: A cause de mes ennemis, ╵je dois porter l’opprobre,
  - type: text
    content: de mes voisins, je suis la honte
  - type: text
    content: et je fais peur ╵à ceux qui me connaissent.
  - type: text
    content: Ceux qui me croisent en chemin ╵s’écartent loin de moi
  - type: note
    content: Voir 38.12 ; 41.10 ; 69.9 ; 88.9, 19 ; Jb 19.13-19 ; Jr 12.6 ; 15.17.
  - type: text
    content: .
  '13':
  - type: text
    content: 'Ils m’ont rayé de leur mémoire : ╵me voilà comme un mort,'
  - type: text
    content: je suis comme un objet perdu.
  '14':
  - type: text
    content: J’entends toutes les médisances ╵que l’on répand à mon sujet.
  - type: text
    content: 'Autour de moi, c’est la terreur :'
  - type: text
    content: ils se concertent contre moi,
  - type: text
    content: ils forment des complots ╵pour m’enlever la vie
  - type: note
    content: Voir Jr 6.25 ; 20.3, 10 ; 46.5 ; 49.29.
  - type: text
    content: .
  '15':
  - type: text
    content: Mais moi, ô Eternel, ╵je me confie en toi.
  - type: text
    content: 'Je dis : « Tu es mon Dieu ! »'
  '16':
  - type: text
    content: Mes destinées sont dans ta main.
  - type: text
    content: Délivre-moi ╵de la main de mes ennemis, ╵car ils s’acharnent contre moi.
  '17':
  - type: text
    content: 'Regarde-moi avec bonté : ╵je suis ton serviteur !'
  - type: text
    content: Viens me sauver dans ton amour !
  '18':
  - type: text
    content: Que je ne sois pas dans la honte, ╵ô Eternel, quand je t’invoque,
  - type: text
    content: mais que les méchants soient honteux
  - type: text
    content: et réduits au silence ╵dans le séjour des morts !
  '19':
  - type: text
    content: Qu’ils soient rendus muets ╵tous ces menteurs aux lèvres fausses
  - type: text
    content: qui parlent avec arrogance ╵contre le juste,
  - type: text
    content: avec orgueil, avec mépris.
  '2':
  - type: text
    content: C’est en toi, Eternel, ╵que je cherche un refuge.
  - type: text
    content: Que jamais cela ne tourne à ma confusion !
  - type: text
    content: Toi qui es juste, ╵délivre-moi
  - type: note
    content: Pour les v. 2-4, voir 71.1-3.
  - type: text
    content: ','
  '20':
  - type: text
    content: Combien est grande la bonté
  - type: text
    content: que tu tiens en réserve ╵en faveur de ceux qui te craignent,
  - type: text
    content: et que tu viens répandre, ╵sur ceux qui s’abritent en toi,
  - type: text
    content: au vu de tous les hommes.
  '21':
  - type: text
    content: Auprès de toi, ╵tu leur donnes un refuge ╵loin des machinations des hommes.
  - type: text
    content: Tu les préserves dans ta tente ╵des langues médisantes.
  '22':
  - type: text
    content: Béni soit l’Eternel,
  - type: text
    content: car il m’a témoigné ╵son merveilleux amour
  - type: text
    content: lorsque je me trouvais ╵dans une cité assiégée.
  '23':
  - type: text
    content: 'Désemparé, je me disais :'
  - type: text
    content: « Il ne se soucie plus de moi. »
  - type: text
    content: Mais tu m’as entendu ╵quand je te suppliais,
  - type: text
    content: quand je t’appelais à mon aide.
  '24':
  - type: text
    content: Soyez remplis d’amour ╵pour l’Eternel, ╵vous qui lui êtes attachés !
  - type: text
    content: L’Eternel garde ╵ceux qui lui sont fidèles,
  - type: text
    content: mais il punit sévèrement ╵les arrogants.
  '25':
  - type: text
    content: Soyez forts et prenez courage,
  - type: text
    content: vous qui vous attendez ╵à l’Eternel.
  '3':
  - type: text
    content: tends l’oreille vers moi !
  - type: text
    content: Viens vite ! Viens me délivrer !
  - type: text
    content: Sois pour moi un rocher ╵entouré de murailles, ╵une solide forteresse
  - type: text
    content: où je trouverai le salut !
  '4':
  - type: text
    content: 'Oui, tu es pour moi un rocher, ╵et une forteresse :'
  - type: text
    content: à cause de ce que tu es, ╵toi, tu me guideras ╵et tu me conduiras.
  '5':
  - type: text
    content: Du piège que l’on m’a tendu ╵tu me feras sortir,
  - type: text
    content: puisque tu es ma forteresse.
  '6':
  - type: text
    content: Je remets mon esprit ╵entre tes mains
  - type: note
    content: Cité en Lc 23.46.
  - type: text
    content: ','
  - type: text
    content: tu m’as libéré, Eternel, ╵toi, le Dieu véritable.
  '7':
  - type: text
    content: Je les hais, tous ceux qui s’attachent ╵à des idoles de néant ;
  - type: text
    content: je me confie en l’Eternel.
  '8':
  - type: text
    content: Ton amour me fait jubiler, ╵il me remplit de joie
  - type: text
    content: puisque tu as vu ma misère,
  - type: text
    content: que tu as porté attention ╵à ma grande détresse.
  '9':
  - type: text
    content: Tu ne m’as pas abandonné ╵au pouvoir de mes ennemis,
  - type: text
    content: et tu m’as mis au large.
