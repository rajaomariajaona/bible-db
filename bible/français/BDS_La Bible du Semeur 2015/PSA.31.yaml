document_id: PSA.31,21
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: J’ai mis ma confiance en l’Eternel
    marker-yv: yv-h
  - type: usfm
    marker: d
    children:
    - type: text
      text: Au chef de chœur. Psaume de David.
  '10':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Aie pitié de moi, Eternel, ╵je suis dans la détresse,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: le chagrin me ronge les yeux, ╵l’âme et le corps entier.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ma vie se consume en tourments,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: mes années en gémissements.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Les forces m’abandonnent ╵à cause de ma faute
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '31.11 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Autre traduction : '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: à cause de ma misère.
      marker-yv: yv-n
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et mon corps dépérit.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: A cause de mes ennemis, ╵je dois porter l’opprobre,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: de mes voisins, je suis la honte
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et je fais peur ╵à ceux qui me connaissent.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ceux qui me croisent en chemin ╵s’écartent loin de moi
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '31.12 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Voir 38.12 ; 41.10 ; 69.9 ; 88.9, 19 ; Jb 19.13-19 ; Jr 12.6 ; 15.17.
      marker-yv: yv-n
    - type: text
      text: .
  '13':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Ils m’ont rayé de leur mémoire : ╵me voilà comme un mort,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: je suis comme un objet perdu.
  '14':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: J’entends toutes les médisances ╵que l’on répand à mon sujet.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Autour de moi, c’est la terreur :'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ils se concertent contre moi,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ils forment des complots ╵pour m’enlever la vie
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '31.14 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Voir Jr 6.25 ; 20.3, 10 ; 46.5 ; 49.29.
      marker-yv: yv-n
    - type: text
      text: .
  '15':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mais moi, ô Eternel, ╵je me confie en toi.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Je dis : « Tu es mon Dieu ! »'
  '16':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mes destinées sont dans ta main.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Délivre-moi ╵de la main de mes ennemis, ╵car ils s’acharnent contre moi.
  '17':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Regarde-moi avec bonté : ╵je suis ton serviteur !'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Viens me sauver dans ton amour !
  '18':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Que je ne sois pas dans la honte, ╵ô Eternel, quand je t’invoque,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: mais que les méchants soient honteux
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et réduits au silence ╵dans le séjour des morts !
  '19':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Qu’ils soient rendus muets ╵tous ces menteurs aux lèvres fausses
  - type: usfm
    marker: q1
    children:
    - type: text
      text: qui parlent avec arrogance ╵contre le juste,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: avec orgueil, avec mépris.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: C’est en toi, Eternel, ╵que je cherche un refuge.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Que jamais cela ne tourne à ma confusion !
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Toi qui es juste, ╵délivre-moi
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '31.2 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Pour les v. 2-4, voir '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: 71.1-3
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: ','
  '20':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Combien est grande la bonté
  - type: usfm
    marker: q1
    children:
    - type: text
      text: que tu tiens en réserve ╵en faveur de ceux qui te craignent,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et que tu viens répandre, ╵sur ceux qui s’abritent en toi,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: au vu de tous les hommes.
  '21':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Auprès de toi, ╵tu leur donnes un refuge ╵loin des machinations des hommes.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tu les préserves dans ta tente ╵des langues médisantes.
  '22':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Béni soit l’Eternel,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: car il m’a témoigné ╵son merveilleux amour
  - type: usfm
    marker: q1
    children:
    - type: text
      text: lorsque je me trouvais ╵dans une cité assiégée.
  '23':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Désemparé, je me disais :'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: « Il ne se soucie plus de moi. »
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mais tu m’as entendu ╵quand je te suppliais,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: quand je t’appelais à mon aide.
  '24':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Soyez remplis d’amour ╵pour l’Eternel, ╵vous qui lui êtes attachés !
  - type: usfm
    marker: q1
    children:
    - type: text
      text: L’Eternel garde ╵ceux qui lui sont fidèles,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: mais il punit sévèrement ╵les arrogants.
  '25':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Soyez forts et prenez courage,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: vous qui vous attendez ╵à l’Eternel.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: tends l’oreille vers moi !
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Viens vite ! Viens me délivrer !
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Sois pour moi un rocher ╵entouré de murailles, ╵une solide forteresse
  - type: usfm
    marker: q1
    children:
    - type: text
      text: où je trouverai le salut !
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Oui, tu es pour moi un rocher, ╵et une forteresse :'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: à cause de ce que tu es, ╵toi, tu me guideras ╵et tu me conduiras.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Du piège que l’on m’a tendu ╵tu me feras sortir,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: puisque tu es ma forteresse.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Je remets mon esprit ╵entre tes mains
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '31.6 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Cité en '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: Lc 23.46
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: ','
  - type: usfm
    marker: q1
    children:
    - type: text
      text: tu m’as libéré, Eternel, ╵toi, le Dieu véritable.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Je les hais, tous ceux qui s’attachent ╵à des idoles de néant ;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: je me confie en l’Eternel.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ton amour me fait jubiler, ╵il me remplit de joie
  - type: usfm
    marker: q1
    children:
    - type: text
      text: puisque tu as vu ma misère,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: que tu as porté attention ╵à ma grande détresse.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tu ne m’as pas abandonné ╵au pouvoir de mes ennemis,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et tu m’as mis au large.
