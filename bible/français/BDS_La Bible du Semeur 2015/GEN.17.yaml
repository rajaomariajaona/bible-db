document_id: GEN.17
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Le signe de l’alliance
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Quand Abram eut quatre-vingt-dix-neuf ans, l’Eternel lui apparut et lui dit : Je suis le Dieu tout-puissant. Mène ta vie sous mon regard et comporte-toi de manière intègre '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: afin que j’établisse mon alliance avec toi et que je multiplie ta descendance à l’extrême.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Abram se prosterna, la face contre terre, et Dieu ajouta : '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Pour moi, voici quelle est mon alliance avec toi : Tu deviendras le père d’une multitude de peuples. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Désormais ton nom ne sera plus Abram (Père éminent), mais Abraham, car je ferai de toi le père d’une multitude de peuples
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '17.5 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Cité en '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Rm 4.17-18
        metadata:
          usfm: ROM.4.17+ROM.4.18
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Je multiplierai à l’extrême le nombre de tes descendants et je te donnerai d’être à l’origine de divers peuples ; des rois même seront issus de toi. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Je maintiendrai pour toujours mon alliance avec toi, et avec ta descendance après toi, de génération en génération. En vertu de cette alliance, je serai ton Dieu et celui de ta descendance après toi. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Je te donnerai, ainsi qu’à ta descendance, ce pays de Canaan où tu vis maintenant en étranger. Il sera votre propriété pour toujours. Et je serai le Dieu de ta descendance
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '17.8 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Voir '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ac 7.5
        metadata:
          usfm: ACT.7.5
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Puis Dieu ajouta : De ton côté, tu respecteras les clauses de mon alliance, toi et ta descendance, de génération en génération. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Voici quelle est mon alliance avec vous et avec ta descendance, quels en sont les termes que vous devrez respecter : tous ceux qui sont de sexe masculin parmi vous seront circoncis'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '17.10 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Voir Ac 7.8 ; Rm 4.11.
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Vous porterez cette marque dans votre chair, et cela sera le signe de l’alliance entre moi et vous. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'De génération en génération, tout garçon devra être circoncis à l’âge de huit jours. Cela s’applique aussi à tout garçon né dans ta maison, et aux étrangers qui auront été achetés comme esclaves, et qui ne sont pas de ta descendance. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Tous sans exception seront circoncis, qu’ils soient nés dans ta maison ou acquis à prix d’argent ; ainsi le signe de mon alliance sera gravé dans votre chair. C’est là une alliance à perpétuité. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Celui qui n’aura pas été circoncis sera retranché de son peuple parce qu’il n’aura pas respecté les clauses de mon alliance.
- type: usfm
  marker: s1
  children:
  - type: text
    text: L’héritier de l’alliance
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Dieu dit encore à Abraham : Pour ce qui concerne ta femme Saraï, tu ne l’appelleras plus Saraï (Ma princesse), désormais son nom est Sara (Princesse). '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Je la bénirai et je t’accorderai par elle un fils ; je la bénirai et elle deviendra l’ancêtre de plusieurs peuples ; des rois de divers peuples sortiront d’elle.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Alors Abraham se prosterna de nouveau la face contre terre, et il se mit à rire en se disant intérieurement : Eh quoi ! un homme centenaire peut-il encore avoir un enfant ? Et Sara, une femme de quatre-vingt-dix ans, peut-elle donner naissance à un enfant ? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Et il dit à Dieu : Tout ce que je demande c’est qu’Ismaël vive et que tu prennes soin de lui'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '17.18 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Autre traduction : '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: en ta présence.
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Dieu reprit : Mais non ! c’est Sara, ta femme, qui te donnera un fils. Tu l’appelleras Isaac (Il rit) et j’établirai mon alliance avec lui, pour toujours, et avec sa descendance après lui. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'En ce qui concerne Ismaël, j’ai entendu ta prière en sa faveur. Oui, je le bénirai. Je lui donnerai de nombreux descendants : je le multiplierai à l’extrême. Douze princes seront issus de lui et je ferai de lui l’ancêtre d’un grand peuple. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Mais mon alliance, c’est avec Isaac que je l’établirai, le fils que Sara te donnera l’année prochaine à cette époque.
- type: usfm
  marker: s1
  children:
  - type: text
    text: La circoncision d’Abraham et des siens
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Après avoir achevé de parler avec Abraham, Dieu s’éleva au-dessus de lui. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Ce même jour, Abraham circoncit Ismaël son fils, ainsi que tous les gens nés dans sa maison et tous les esclaves qu’il avait achetés. Tous les gens de sexe masculin qui appartenaient à la maison d’Abraham furent circoncis comme Dieu le lui avait ordonné. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Abraham avait quatre-vingt-dix-neuf ans quand il fut circoncis et '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Ismaël son fils en avait treize. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Abraham et son fils Ismaël furent circoncis le même jour, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: en même temps que tous les hommes de sa maison nés chez lui et les étrangers acquis à prix d’argent.
