document_id: GEN.17,21
type_code: fra
verses:
  '1':
  - type: heading
    content: Le signe de l’alliance
  - type: text
    content: 'Quand Abram eut quatre-vingt-dix-neuf ans, l’Eternel lui apparut et lui dit : Je suis le Dieu tout-puissant. Mène ta vie sous mon regard et comporte-toi de manière intègre '
  '10':
  - type: text
    content: 'Voici quelle est mon alliance avec vous et avec ta descendance, quels en sont les termes que vous devrez respecter : tous ceux qui sont de sexe masculin parmi vous seront circoncis'
  - type: note
    content: Voir Ac 7.8 ; Rm 4.11.
  - type: text
    content: '. '
  '11':
  - type: text
    content: 'Vous porterez cette marque dans votre chair, et cela sera le signe de l’alliance entre moi et vous. '
  '12':
  - type: text
    content: 'De génération en génération, tout garçon devra être circoncis à l’âge de huit jours. Cela s’applique aussi à tout garçon né dans ta maison, et aux étrangers qui auront été achetés comme esclaves, et qui ne sont pas de ta descendance. '
  '13':
  - type: text
    content: 'Tous sans exception seront circoncis, qu’ils soient nés dans ta maison ou acquis à prix d’argent ; ainsi le signe de mon alliance sera gravé dans votre chair. C’est là une alliance à perpétuité. '
  '14':
  - type: text
    content: Celui qui n’aura pas été circoncis sera retranché de son peuple parce qu’il n’aura pas respecté les clauses de mon alliance.
  - type: heading
    content: L’héritier de l’alliance
  '15':
  - type: text
    content: 'Dieu dit encore à Abraham : Pour ce qui concerne ta femme Saraï, tu ne l’appelleras plus Saraï (Ma princesse), désormais son nom est Sara (Princesse). '
  '16':
  - type: text
    content: Je la bénirai et je t’accorderai par elle un fils ; je la bénirai et elle deviendra l’ancêtre de plusieurs peuples ; des rois de divers peuples sortiront d’elle.
  '17':
  - type: text
    content: 'Alors Abraham se prosterna de nouveau la face contre terre, et il se mit à rire en se disant intérieurement : Eh quoi ! un homme centenaire peut-il encore avoir un enfant ? Et Sara, une femme de quatre-vingt-dix ans, peut-elle donner naissance à un enfant ? '
  '18':
  - type: text
    content: 'Et il dit à Dieu : Tout ce que je demande c’est qu’Ismaël vive et que tu prennes soin de lui'
  - type: note
    content: 'Autre traduction : en ta présence.'
  - type: text
    content: .
  '19':
  - type: text
    content: 'Dieu reprit : Mais non ! c’est Sara, ta femme, qui te donnera un fils. Tu l’appelleras Isaac (Il rit) et j’établirai mon alliance avec lui, pour toujours, et avec sa descendance après lui. '
  '2':
  - type: text
    content: afin que j’établisse mon alliance avec toi et que je multiplie ta descendance à l’extrême.
  '20':
  - type: text
    content: 'En ce qui concerne Ismaël, j’ai entendu ta prière en sa faveur. Oui, je le bénirai. Je lui donnerai de nombreux descendants : je le multiplierai à l’extrême. Douze princes seront issus de lui et je ferai de lui l’ancêtre d’un grand peuple. '
  '21':
  - type: text
    content: Mais mon alliance, c’est avec Isaac que je l’établirai, le fils que Sara te donnera l’année prochaine à cette époque.
  - type: heading
    content: La circoncision d’Abraham et des siens
  '22':
  - type: text
    content: 'Après avoir achevé de parler avec Abraham, Dieu s’éleva au-dessus de lui. '
  '23':
  - type: text
    content: 'Ce même jour, Abraham circoncit Ismaël son fils, ainsi que tous les gens nés dans sa maison et tous les esclaves qu’il avait achetés. Tous les gens de sexe masculin qui appartenaient à la maison d’Abraham furent circoncis comme Dieu le lui avait ordonné. '
  '24':
  - type: text
    content: 'Abraham avait quatre-vingt-dix-neuf ans quand il fut circoncis et '
  '25':
  - type: text
    content: 'Ismaël son fils en avait treize. '
  '26':
  - type: text
    content: 'Abraham et son fils Ismaël furent circoncis le même jour, '
  '27':
  - type: text
    content: en même temps que tous les hommes de sa maison nés chez lui et les étrangers acquis à prix d’argent.
  '3':
  - type: text
    content: 'Abram se prosterna, la face contre terre, et Dieu ajouta : '
  '4':
  - type: text
    content: 'Pour moi, voici quelle est mon alliance avec toi : Tu deviendras le père d’une multitude de peuples. '
  '5':
  - type: text
    content: Désormais ton nom ne sera plus Abram (Père éminent), mais Abraham, car je ferai de toi le père d’une multitude de peuples
  - type: note
    content: Cité en Rm 4.17-18.
  - type: text
    content: '. '
  '6':
  - type: text
    content: 'Je multiplierai à l’extrême le nombre de tes descendants et je te donnerai d’être à l’origine de divers peuples ; des rois même seront issus de toi. '
  '7':
  - type: text
    content: 'Je maintiendrai pour toujours mon alliance avec toi, et avec ta descendance après toi, de génération en génération. En vertu de cette alliance, je serai ton Dieu et celui de ta descendance après toi. '
  '8':
  - type: text
    content: Je te donnerai, ainsi qu’à ta descendance, ce pays de Canaan où tu vis maintenant en étranger. Il sera votre propriété pour toujours. Et je serai le Dieu de ta descendance
  - type: note
    content: Voir Ac 7.5.
  - type: text
    content: .
  '9':
  - type: text
    content: 'Puis Dieu ajouta : De ton côté, tu respecteras les clauses de mon alliance, toi et ta descendance, de génération en génération. '
