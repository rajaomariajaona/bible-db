document_id: PSA.99,21
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Adorez l’Eternel car il est saint !
    marker-yv: yv-h
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: L’Eternel règne. ╵Les peuples tremblent.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Il siège sur des chérubins. ╵La terre est ébranlée.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: L’Eternel est grand dans Sion.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Il est haut élevé ╵bien au-dessus de tous les peuples.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: Qu’ils te célèbrent, ╵toi qui es grand et redoutable !
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Oui, il est saint !
  '4':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: Que l’on célèbre la puissance ╵du Roi qui aime la justice !
  - type: usfm
    marker: q1
    children:
    - type: text
      text: C’est toi qui as établi l’équité,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et qui as déterminé en Jacob ╵le droit et la justice.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: Proclamez la grandeur ╵de l’Eternel, lui notre Dieu,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: prosternez-vous devant son marchepied,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: car il est saint.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: Moïse avec Aaron étaient de ses prêtres
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '99.6 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Moïse a exercé les fonctions de prêtres jusqu’à l’entrée en fonction d’Aaron et de ses fils (voir en particulier '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: Lv 8
        - type: text
          text: ).
      marker-yv: yv-n
    - type: text
      text: ','
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et Samuel était de ceux qui l’invoquaient
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '99.6 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Les trois personnages cités sont les représentants les plus éminents des hommes de Dieu, qui furent aussi des hommes de prière (voir Ex 17.11-13 ; 32.11-14, 30-34 ; Nb 12.13 ; 14.13-19 ; 21.7 ; Ps 106.23 ; Nb 17.11-15 ; 1 S 7.8-9 ; 12.16-23 ; Jr 15.1).
      marker-yv: yv-n
    - type: text
      text: .
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Oui, ils invoquaient l’Eternel, ╵et lui les exauçait.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: De la colonne de nuée, ╵il parlait avec eux
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '99.7 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Voir Ex 13.21-22 ; 33.7-11 ; Nb 12.5-6.
      marker-yv: yv-n
    - type: text
      text: ','
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ils ont observé ses commandements,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et la règle qu’il leur avait donnée.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: Eternel notre Dieu, ╵tu les as exaucés
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et tu fus pour eux un Dieu qui pardonne,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: mais tu les as châtiés ╵pour leurs actes coupables
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '99.8 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Voir Nb 20.12, 24 ; 27.14 ; Dt 3.25-27.
      marker-yv: yv-n
    - type: text
      text: .
  '9':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: Proclamez la grandeur ╵de l’Eternel, lui notre Dieu,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: prosternez-vous ╵en direction de son saint mont,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: car il est saint, ╵l’Eternel, notre Dieu !
