document_id: PSA.99,21
type_code: fra
verses:
  '1':
  - type: heading
    content: Adorez l’Eternel car il est saint !
  - type: text
    content: L’Eternel règne. ╵Les peuples tremblent.
  - type: text
    content: Il siège sur des chérubins. ╵La terre est ébranlée.
  '2':
  - type: text
    content: L’Eternel est grand dans Sion.
  - type: text
    content: Il est haut élevé ╵bien au-dessus de tous les peuples.
  '3':
  - type: text
    content: Qu’ils te célèbrent, ╵toi qui es grand et redoutable !
  - type: text
    content: Oui, il est saint !
  '4':
  - type: text
    content: Que l’on célèbre la puissance ╵du Roi qui aime la justice !
  - type: text
    content: C’est toi qui as établi l’équité,
  - type: text
    content: et qui as déterminé en Jacob ╵le droit et la justice.
  '5':
  - type: text
    content: Proclamez la grandeur ╵de l’Eternel, lui notre Dieu,
  - type: text
    content: prosternez-vous devant son marchepied,
  - type: text
    content: car il est saint.
  '6':
  - type: text
    content: Moïse avec Aaron étaient de ses prêtres
  - type: note
    content: Moïse a exercé les fonctions de prêtres jusqu’à l’entrée en fonction d’Aaron et de ses fils (voir en particulier Lv 8).
  - type: text
    content: ','
  - type: text
    content: et Samuel était de ceux qui l’invoquaient
  - type: note
    content: Les trois personnages cités sont les représentants les plus éminents des hommes de Dieu, qui furent aussi des hommes de prière (voir Ex 17.11-13 ; 32.11-14, 30-34 ; Nb 12.13 ; 14.13-19 ; 21.7 ; Ps 106.23 ; Nb 17.11-15 ; 1 S 7.8-9 ; 12.16-23 ; Jr 15.1).
  - type: text
    content: .
  - type: text
    content: Oui, ils invoquaient l’Eternel, ╵et lui les exauçait.
  '7':
  - type: text
    content: De la colonne de nuée, ╵il parlait avec eux
  - type: note
    content: Voir Ex 13.21-22 ; 33.7-11 ; Nb 12.5-6.
  - type: text
    content: ','
  - type: text
    content: ils ont observé ses commandements,
  - type: text
    content: et la règle qu’il leur avait donnée.
  '8':
  - type: text
    content: Eternel notre Dieu, ╵tu les as exaucés
  - type: text
    content: et tu fus pour eux un Dieu qui pardonne,
  - type: text
    content: mais tu les as châtiés ╵pour leurs actes coupables
  - type: note
    content: Voir Nb 20.12, 24 ; 27.14 ; Dt 3.25-27.
  - type: text
    content: .
  '9':
  - type: text
    content: Proclamez la grandeur ╵de l’Eternel, lui notre Dieu,
  - type: text
    content: prosternez-vous ╵en direction de son saint mont,
  - type: text
    content: car il est saint, ╵l’Eternel, notre Dieu !
