document_id: 1JN.3
type_code: fra
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Voyez combien le Père nous a aimés pour que nous puissions être appelés enfants de Dieu – et nous le sommes ! Voici pourquoi le monde ne nous reconnaît pas : c’est parce qu’il n’a pas reconnu Dieu.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Mes chers amis, dès à présent nous sommes enfants de Dieu et ce que nous serons un jour n’a pas encore été rendu manifeste. Nous savons que lorsque Christ paraîtra, nous serons semblables à lui, car nous le verrons tel qu’il est. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Tous ceux qui fondent sur Christ une telle espérance se rendent eux-mêmes purs, tout comme Christ est pur.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Celui qui commet le péché viole la Loi de Dieu, car le péché, c’est la violation de cette Loi. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Or, vous le savez : Jésus est apparu pour ôter les péchés'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '3.5 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Certains manuscrits ont : '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: nos péchés.
    marker-yv: yv-n
  - type: text
    text: ', et il n’y a pas de péché en lui. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Par conséquent, celui qui demeure uni à lui ne pèche pas et celui qui pèche ne l’a jamais vu et ne l’a jamais connu.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Mes enfants, que personne ne vous trompe sur ce point : est juste celui qui fait ce qui est juste, tout comme Christ lui-même est juste. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Celui qui commet le péché est du diable, car le diable pèche dès le commencement. Or, le Fils de Dieu est précisément apparu pour détruire les œuvres du diable. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Celui qui est né de Dieu ne pèche pas, car la vie
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '3.9 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Il pourrait s’agir soit de la Parole (voir Jc 1.21 ; 1 P 1.23) soit de l’Esprit de Dieu, puissance de vie (
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Jn 3.5
        metadata:
          usfm: JHN.3.5
      - type: text
        text: ).
    marker-yv: yv-n
  - type: text
    text: ' qui vient de Dieu a été implantée en lui et demeure en lui. Il ne peut pas pécher'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '3.9 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Jean n’enseigne pas que le chrétien ne peut plus pécher et qu’il est devenu parfait (voir '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '1.8'
        metadata:
          usfm: 1JN.1.8
      - type: text
        text: ', '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '10'
        metadata:
          usfm: 1JN.1.10
      - type: text
        text: ). Certains soulignent que Jean procède par oppositions radicales (lumière​ténèbres, vérité​mensonge, Christ​antichrist) et que notre régénération, notre naissance de Dieu, n’est pas encore achevée (
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ga 4.19
        metadata:
          usfm: GAL.4.19
      - type: text
        text: '). Il est aussi possible de comprendre ces formules comme se référant à une impossibilité morale. Autrement dit : celui qui est né de Dieu ne doit pas pécher.'
    marker-yv: yv-n
  - type: text
    text: ', puisqu’il est né de Dieu.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'C’est ainsi que se manifeste la différence entre les enfants de Dieu et les enfants du diable : celui qui ne fait pas ce qui est juste n’est pas de Dieu, pas plus que celui qui n’aime pas son frère.'
- type: usfm
  marker: s2
  children:
  - type: text
    text: L’amour, caractéristique de l’enfant de Dieu
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'En effet, voici le message que vous avez entendu dès le commencement : aimons-nous les uns les autres. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Que personne ne suive donc l’exemple de Caïn, qui était du diable
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '3.12 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Autre traduction : '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: au mal.
    marker-yv: yv-n
  - type: text
    text: ' et qui a égorgé son frère. Et pourquoi l’a-t-il égorgé ? Parce que sa façon d’agir était mauvaise, alors que celle de son frère était juste.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Mes frères, ne vous étonnez donc pas si le monde a de la haine pour vous. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Quant à nous, nous savons que nous sommes passés de la mort à la vie parce que nous aimons nos frères. Celui qui n’aime pas demeure dans la mort. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Car si quelqu’un déteste son frère, c’est un meurtrier, et vous savez qu’aucun meurtrier ne possède en lui la vie éternelle. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Voici comment nous savons ce que c’est que d’aimer : Jésus-Christ a donné sa vie pour nous. Nous devons, nous aussi, donner notre vie pour nos frères.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Si quelqu’un qui possède du bien en ce monde voit son frère dans le besoin et lui ferme son cœur, l’amour de Dieu ne peut être présent en lui. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Mes enfants, que notre amour ne se limite pas à des discours et à de belles paroles, mais qu’il manifeste sa réalité par des actes.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'C’est ainsi que nous saurons que nous sommes de la vérité, et nous rassurerons notre cœur devant Dieu, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'si notre cœur nous condamne d’une manière ou d’une autre ; car Dieu est plus grand que notre cœur et il connaît tout. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Mes chers amis, si notre cœur ne nous condamne pas, nous sommes pleins d’assurance devant Dieu. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Il nous donne ce que nous lui demandons, parce que nous obéissons à ses commandements et que nous faisons ce qui lui plaît. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: Or, que nous commande-t-il ? De placer notre confiance en son Fils Jésus-Christ et de nous aimer les uns les autres, comme il nous l’a lui-même prescrit.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: Celui qui obéit à ses commandements demeure en Dieu et Dieu demeure en lui. Et à quoi reconnaissons-nous qu’il demeure en nous ? De par l’Esprit qu’il nous a donné.
