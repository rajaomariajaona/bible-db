document_id: 1JN.3,21
type_code: fra
verses:
  '1':
  - type: text
    content: 'Voyez combien le Père nous a aimés pour que nous puissions être appelés enfants de Dieu – et nous le sommes ! Voici pourquoi le monde ne nous reconnaît pas : c’est parce qu’il n’a pas reconnu Dieu.'
  '10':
  - type: text
    content: 'C’est ainsi que se manifeste la différence entre les enfants de Dieu et les enfants du diable : celui qui ne fait pas ce qui est juste n’est pas de Dieu, pas plus que celui qui n’aime pas son frère.'
  - type: heading
    content: L’amour, caractéristique de l’enfant de Dieu
  '11':
  - type: text
    content: 'En effet, voici le message que vous avez entendu dès le commencement : aimons-nous les uns les autres. '
  '12':
  - type: text
    content: Que personne ne suive donc l’exemple de Caïn, qui était du diable
  - type: note
    content: 'Autre traduction : au mal.'
  - type: text
    content: ' et qui a égorgé son frère. Et pourquoi l’a-t-il égorgé ? Parce que sa façon d’agir était mauvaise, alors que celle de son frère était juste.'
  '13':
  - type: text
    content: 'Mes frères, ne vous étonnez donc pas si le monde a de la haine pour vous. '
  '14':
  - type: text
    content: 'Quant à nous, nous savons que nous sommes passés de la mort à la vie parce que nous aimons nos frères. Celui qui n’aime pas demeure dans la mort. '
  '15':
  - type: text
    content: 'Car si quelqu’un déteste son frère, c’est un meurtrier, et vous savez qu’aucun meurtrier ne possède en lui la vie éternelle. '
  '16':
  - type: text
    content: 'Voici comment nous savons ce que c’est que d’aimer : Jésus-Christ a donné sa vie pour nous. Nous devons, nous aussi, donner notre vie pour nos frères.'
  '17':
  - type: text
    content: 'Si quelqu’un qui possède du bien en ce monde voit son frère dans le besoin et lui ferme son cœur, l’amour de Dieu ne peut être présent en lui. '
  '18':
  - type: text
    content: Mes enfants, que notre amour ne se limite pas à des discours et à de belles paroles, mais qu’il manifeste sa réalité par des actes.
  '19':
  - type: text
    content: 'C’est ainsi que nous saurons que nous sommes de la vérité, et nous rassurerons notre cœur devant Dieu, '
  '2':
  - type: text
    content: 'Mes chers amis, dès à présent nous sommes enfants de Dieu et ce que nous serons un jour n’a pas encore été rendu manifeste. Nous savons que lorsque Christ paraîtra, nous serons semblables à lui, car nous le verrons tel qu’il est. '
  '20':
  - type: text
    content: 'si notre cœur nous condamne d’une manière ou d’une autre ; car Dieu est plus grand que notre cœur et il connaît tout. '
  '21':
  - type: text
    content: 'Mes chers amis, si notre cœur ne nous condamne pas, nous sommes pleins d’assurance devant Dieu. '
  '22':
  - type: text
    content: 'Il nous donne ce que nous lui demandons, parce que nous obéissons à ses commandements et que nous faisons ce qui lui plaît. '
  '23':
  - type: text
    content: Or, que nous commande-t-il ? De placer notre confiance en son Fils Jésus-Christ et de nous aimer les uns les autres, comme il nous l’a lui-même prescrit.
  '24':
  - type: text
    content: Celui qui obéit à ses commandements demeure en Dieu et Dieu demeure en lui. Et à quoi reconnaissons-nous qu’il demeure en nous ? De par l’Esprit qu’il nous a donné.
  '3':
  - type: text
    content: Tous ceux qui fondent sur Christ une telle espérance se rendent eux-mêmes purs, tout comme Christ est pur.
  '4':
  - type: text
    content: 'Celui qui commet le péché viole la Loi de Dieu, car le péché, c’est la violation de cette Loi. '
  '5':
  - type: text
    content: 'Or, vous le savez : Jésus est apparu pour ôter les péchés'
  - type: note
    content: 'Certains manuscrits ont : nos péchés.'
  - type: text
    content: ', et il n’y a pas de péché en lui. '
  '6':
  - type: text
    content: Par conséquent, celui qui demeure uni à lui ne pèche pas et celui qui pèche ne l’a jamais vu et ne l’a jamais connu.
  '7':
  - type: text
    content: 'Mes enfants, que personne ne vous trompe sur ce point : est juste celui qui fait ce qui est juste, tout comme Christ lui-même est juste. '
  '8':
  - type: text
    content: 'Celui qui commet le péché est du diable, car le diable pèche dès le commencement. Or, le Fils de Dieu est précisément apparu pour détruire les œuvres du diable. '
  '9':
  - type: text
    content: Celui qui est né de Dieu ne pèche pas, car la vie
  - type: note
    content: Il pourrait s’agir soit de la Parole (voir Jc 1.21 ; 1 P 1.23) soit de l’Esprit de Dieu, puissance de vie (Jn 3.5).
  - type: text
    content: ' qui vient de Dieu a été implantée en lui et demeure en lui. Il ne peut pas pécher'
  - type: note
    content: 'Jean n’enseigne pas que le chrétien ne peut plus pécher et qu’il est devenu parfait (voir 1.8, 10). Certains soulignent que Jean procède par oppositions radicales (lumière​ténèbres, vérité​mensonge, Christ​antichrist) et que notre régénération, notre naissance de Dieu, n’est pas encore achevée (Ga 4.19). Il est aussi possible de comprendre ces formules comme se référant à une impossibilité morale. Autrement dit : celui qui est né de Dieu ne doit pas pécher.'
  - type: text
    content: ', puisqu’il est né de Dieu.'
