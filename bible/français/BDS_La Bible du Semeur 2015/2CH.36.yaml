document_id: 2CH.36
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Les trois règnes funestes
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Le peuple du pays prit Yoahaz, fils de Josias, et l’établit roi pour succéder à son père sur le trône à Jérusalem.
- type: usfm
  marker: r
  children:
  - type: text
    text: (2 R 23.31-34)
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Yoahaz avait vingt-trois ans à son avènement et il régna trois mois à Jérusalem
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '36.2 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'En 609 av. J.-C. Voir note '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 2 R 23.31
        metadata:
          usfm: 2KI.23.31
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: ', '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: car le roi d’Egypte le destitua à Jérusalem même et imposa au pays un tribut de trois mille quatre cents kilogrammes d’argent et d’or.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Ensuite le roi d’Egypte établit Elyaqim, le frère de Yoahaz
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '36.4 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Sur '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'Yoahaz, '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'voir '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Jr 22.11-12
        metadata:
          usfm: JER.22.11+JER.22.12
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: ', comme roi sur Jérusalem et Juda. Il changea son nom en celui de Yehoyaqim. Quant à son frère Yoahaz, Néko le prit et l’emmena en Egypte.'
- type: usfm
  marker: r
  children:
  - type: text
    text: (2 R 23.36 à 24.6)
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Yehoyaqim avait vingt-cinq ans à son avènement, et il régna onze ans à Jérusalem
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '36.5 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'De 609 à 598 av. J.-C. Sur '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'Yehoyaqim, '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: voir Jr 22.18-19 ; 26.1-6 ; 35.1-19.
    marker-yv: yv-n
  - type: text
    text: '. Il fit ce que l’Eternel considère comme mal. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Nabuchodonosor, roi de Babylone, lui fit la guerre. Il le fit lier avec une double chaîne de bronze et l’emmena à Babylone
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '36.6 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Voir Jr 25.1-38 ; 36.1-32 ; 45.1-5.
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Nabuchodonosor emporta à Babylone une partie des objets du temple de l’Eternel et les plaça dans son palais à Babylone.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Les autres faits et gestes de Yehoyaqim ainsi que les pratiques abominables auxquelles il s’est livré et ce qui lui est arrivé, tout cela est cité dans le livre des rois d’Israël et de Juda. Son fils Yehoyakîn lui succéda sur le trône.
- type: usfm
  marker: r
  children:
  - type: text
    text: (2 R 24.8-17)
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Yehoyakîn était âgé de dix-huit ans
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '36.9 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'D’après un manuscrit hébreu, certains manuscrits de l’ancienne version grecque et la version syriaque (voir '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 2 R 24.8
        metadata:
          usfm: 2KI.24.8
      - type: text
        text: '). La plupart des manuscrits hébreux ont : '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: huit ans.
    marker-yv: yv-n
  - type: text
    text: ' à son avènement et il régna trois mois et dix jours à Jérusalem'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '36.9 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'De décembre 598 à mars 597 av. J.-C. Voir note '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 2 R 24.8
        metadata:
          usfm: 2KI.24.8
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: . Il fit ce que l’Eternel considère comme mal.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Vers la fin de l’année, au printemps, le roi Nabuchodonosor envoya son armée pour le prendre et l’amener à Babylone en même temps que les objets précieux du temple de l’Eternel
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '36.10 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Sur l’exil de Yehoyakîn, voir Jr 22.24-30 ; 24.1-10 ; 29.1-2 ; Ez 17.12.
    marker-yv: yv-n
  - type: text
    text: . Il établit Sédécias
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '36.10 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Sur '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'Sédécias, '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: voir Jr 37.1 ; Ez 17.13.
    marker-yv: yv-n
  - type: text
    text: ', un parent de Yehoyakîn, comme roi de Juda et de Jérusalem.'
- type: usfm
  marker: s1
  children:
  - type: text
    text: Le dernier roi de Juda
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: (2 R 24.18-20)
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Sédécias avait vingt et un ans à son avènement. Il régna onze ans à Jérusalem
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '36.11 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: De 597 à 587 av. J.-C.
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Il fit ce que l’Eternel considère comme mal et il refusa de s’humilier devant le prophète Jérémie qui s’adressait à lui de la part de l’Eternel.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: De plus, il se révolta contre Nabuchodonosor qui lui avait fait prêter un serment de loyauté au nom de Dieu
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '36.13 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Voir '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ez 17.15
        metadata:
          usfm: EZK.17.15
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: '. Au lieu de revenir à l’Eternel, le Dieu d’Israël, il s’obstina dans sa révolte contre lui et lui ferma son cœur. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: De même, tous les chefs des prêtres et le peuple multiplièrent les pires infidélités en se livrant aux mêmes pratiques abominables que les autres peuples. Ils profanèrent le temple de l’Eternel dont il avait fait un lieu saint à Jérusalem.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'L’Eternel, le Dieu de leurs ancêtres, leur avait adressé très tôt et à maintes reprises des avertissements par l’intermédiaire de ses messagers, car il aurait voulu épargner son peuple et le lieu de sa résidence. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Mais les Israélites méprisaient les envoyés de Dieu, ils faisaient fi de ses paroles et tournaient ses prophètes en ridicule, jusqu’à ce que la colère de l’Eternel contre son peuple eut atteint le point de non-retour.
- type: usfm
  marker: s1
  children:
  - type: text
    text: La fin du royaume de Juda
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: (2 R 25.1-21)
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Alors l’Eternel fit venir contre eux le roi des Chaldéens qui massacra leurs jeunes gens jusque dans leur sanctuaire. Il n’épargna personne : jeune homme, jeune fille, vieillard, personne âgée : Dieu lui livra tout'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '36.17 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Voir Jr 21.1-10 ; 34.1-5.
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Nabuchodonosor emporta à Babylone tous les objets, grands ou petits, qu’il y avait dans le temple de Dieu, tous les trésors du temple de l’Eternel, et tous ceux du roi et de ses grands. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Les envahisseurs incendièrent le temple de Dieu et démolirent les murailles de Jérusalem. Ils mirent le feu à tous les palais et détruisirent tous les objets de prix
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '36.19 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Voir '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 2 Ch 7.19-22
        metadata:
          usfm: 2CH.7.19+2CH.7.20+2CH.7.21+2CH.7.22
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Nabuchodonosor fit déporter à Babylone les survivants du massacre et il en fit des serviteurs pour lui et pour ses fils, jusqu’à la prise du pouvoir par l’Empire perse.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Ainsi s’accomplit la parole de l’Eternel, transmise par le prophète Jérémie, disant que le pays serait abandonné pour bénéficier du repos pendant soixante-dix ans jusqu’à ce qu’il ait joui de son temps de repos
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '36.21 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Voir Jr 25.11 ; Lv 26.34-35.
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: s1
  children:
  - type: text
    text: Cyrus donne le signal du retour
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: La première année du règne de Cyrus de Perse
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '36.22 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: C’est-à-dire en 538 av. J.-C. (Cyrus conquit Babylone en 539). Voir Es 44.28 ; 45.1.
    marker-yv: yv-n
  - type: text
    text: ', l’Eternel, pour accomplir la parole qu’il avait prononcée par le prophète Jérémie, agit sur l’esprit de Cyrus, empereur de Perse. Alors Cyrus fit faire, oralement et par écrit, la proclamation suivante à travers tout son empire'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '36.22 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Voir Jr 25.11-12 ; 29.10. Les v. 22-23 sont parallèles à '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Esd 1.1-3
        metadata:
          usfm: EZR.1.1+EZR.1.2+EZR.1.3
      - type: text
        text: '. Voir note '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Esd 1.1
        metadata:
          usfm: EZR.1.1
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: '  : '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Voici ce que déclare Cyrus, empereur de Perse : « L’Eternel, le Dieu du ciel, m’a donné tous les royaumes de la terre et m’a chargé de lui construire un temple à Jérusalem en Juda. Quels sont ceux d’entre vous qui font partie de son peuple ? L’Eternel leur Dieu sera avec eux ; qu’ils partent'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '36.23 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Voir '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Es 44.28
        metadata:
          usfm: ISA.44.28
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: '  ! »'
