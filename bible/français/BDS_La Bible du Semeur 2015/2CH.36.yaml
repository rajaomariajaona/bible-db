document_id: 2CH.36,21
type_code: fra
verses:
  '1':
  - type: heading
    content: Les trois règnes funestes
  - type: text
    content: Le peuple du pays prit Yoahaz, fils de Josias, et l’établit roi pour succéder à son père sur le trône à Jérusalem.
  - type: heading
    content: (2 R 23.31-34)
  '10':
  - type: text
    content: Vers la fin de l’année, au printemps, le roi Nabuchodonosor envoya son armée pour le prendre et l’amener à Babylone en même temps que les objets précieux du temple de l’Eternel
  - type: note
    content: Sur l’exil de Yehoyakîn, voir Jr 22.24-30 ; 24.1-10 ; 29.1-2 ; Ez 17.12.
  - type: text
    content: . Il établit Sédécias
  - type: note
    content: Sur Sédécias, voir Jr 37.1 ; Ez 17.13.
  - type: text
    content: ', un parent de Yehoyakîn, comme roi de Juda et de Jérusalem.'
  - type: heading
    content: Le dernier roi de Juda
  - type: heading
    content: (2 R 24.18-20)
  '11':
  - type: text
    content: Sédécias avait vingt et un ans à son avènement. Il régna onze ans à Jérusalem
  - type: note
    content: De 597 à 587 av. J.-C.
  - type: text
    content: '. '
  '12':
  - type: text
    content: Il fit ce que l’Eternel considère comme mal et il refusa de s’humilier devant le prophète Jérémie qui s’adressait à lui de la part de l’Eternel.
  '13':
  - type: text
    content: De plus, il se révolta contre Nabuchodonosor qui lui avait fait prêter un serment de loyauté au nom de Dieu
  - type: note
    content: Voir Ez 17.15.
  - type: text
    content: '. Au lieu de revenir à l’Eternel, le Dieu d’Israël, il s’obstina dans sa révolte contre lui et lui ferma son cœur. '
  '14':
  - type: text
    content: De même, tous les chefs des prêtres et le peuple multiplièrent les pires infidélités en se livrant aux mêmes pratiques abominables que les autres peuples. Ils profanèrent le temple de l’Eternel dont il avait fait un lieu saint à Jérusalem.
  '15':
  - type: text
    content: 'L’Eternel, le Dieu de leurs ancêtres, leur avait adressé très tôt et à maintes reprises des avertissements par l’intermédiaire de ses messagers, car il aurait voulu épargner son peuple et le lieu de sa résidence. '
  '16':
  - type: text
    content: Mais les Israélites méprisaient les envoyés de Dieu, ils faisaient fi de ses paroles et tournaient ses prophètes en ridicule, jusqu’à ce que la colère de l’Eternel contre son peuple eut atteint le point de non-retour.
  - type: heading
    content: La fin du royaume de Juda
  - type: heading
    content: (2 R 25.1-21)
  '17':
  - type: text
    content: 'Alors l’Eternel fit venir contre eux le roi des Chaldéens qui massacra leurs jeunes gens jusque dans leur sanctuaire. Il n’épargna personne : jeune homme, jeune fille, vieillard, personne âgée : Dieu lui livra tout'
  - type: note
    content: Voir Jr 21.1-10 ; 34.1-5.
  - type: text
    content: '. '
  '18':
  - type: text
    content: 'Nabuchodonosor emporta à Babylone tous les objets, grands ou petits, qu’il y avait dans le temple de Dieu, tous les trésors du temple de l’Eternel, et tous ceux du roi et de ses grands. '
  '19':
  - type: text
    content: Les envahisseurs incendièrent le temple de Dieu et démolirent les murailles de Jérusalem. Ils mirent le feu à tous les palais et détruisirent tous les objets de prix
  - type: note
    content: Voir 2 Ch 7.19-22.
  - type: text
    content: '. '
  '2':
  - type: text
    content: Yoahaz avait vingt-trois ans à son avènement et il régna trois mois à Jérusalem
  - type: note
    content: En 609 av. J.-C. Voir note 2 R 23.31.
  - type: text
    content: ', '
  '20':
  - type: text
    content: Nabuchodonosor fit déporter à Babylone les survivants du massacre et il en fit des serviteurs pour lui et pour ses fils, jusqu’à la prise du pouvoir par l’Empire perse.
  '21':
  - type: text
    content: Ainsi s’accomplit la parole de l’Eternel, transmise par le prophète Jérémie, disant que le pays serait abandonné pour bénéficier du repos pendant soixante-dix ans jusqu’à ce qu’il ait joui de son temps de repos
  - type: note
    content: Voir Jr 25.11 ; Lv 26.34-35.
  - type: text
    content: .
  - type: heading
    content: Cyrus donne le signal du retour
  '22':
  - type: text
    content: La première année du règne de Cyrus de Perse
  - type: note
    content: C’est-à-dire en 538 av. J.-C. (Cyrus conquit Babylone en 539). Voir Es 44.28 ; 45.1.
  - type: text
    content: ', l’Eternel, pour accomplir la parole qu’il avait prononcée par le prophète Jérémie, agit sur l’esprit de Cyrus, empereur de Perse. Alors Cyrus fit faire, oralement et par écrit, la proclamation suivante à travers tout son empire'
  - type: note
    content: Voir Jr 25.11-12 ; 29.10. Les v. 22-23 sont parallèles à Esd 1.1-3. Voir note Esd 1.1.
  - type: text
    content: '  : '
  '23':
  - type: text
    content: 'Voici ce que déclare Cyrus, empereur de Perse : « L’Eternel, le Dieu du ciel, m’a donné tous les royaumes de la terre et m’a chargé de lui construire un temple à Jérusalem en Juda. Quels sont ceux d’entre vous qui font partie de son peuple ? L’Eternel leur Dieu sera avec eux ; qu’ils partent'
  - type: note
    content: Voir Es 44.28.
  - type: text
    content: '  ! »'
  '3':
  - type: text
    content: car le roi d’Egypte le destitua à Jérusalem même et imposa au pays un tribut de trois mille quatre cents kilogrammes d’argent et d’or.
  '4':
  - type: text
    content: Ensuite le roi d’Egypte établit Elyaqim, le frère de Yoahaz
  - type: note
    content: Sur Yoahaz, voir Jr 22.11-12.
  - type: text
    content: ', comme roi sur Jérusalem et Juda. Il changea son nom en celui de Yehoyaqim. Quant à son frère Yoahaz, Néko le prit et l’emmena en Egypte.'
  - type: heading
    content: (2 R 23.36 à 24.6)
  '5':
  - type: text
    content: Yehoyaqim avait vingt-cinq ans à son avènement, et il régna onze ans à Jérusalem
  - type: note
    content: De 609 à 598 av. J.-C. Sur Yehoyaqim, voir Jr 22.18-19 ; 26.1-6 ; 35.1-19.
  - type: text
    content: '. Il fit ce que l’Eternel considère comme mal. '
  '6':
  - type: text
    content: Nabuchodonosor, roi de Babylone, lui fit la guerre. Il le fit lier avec une double chaîne de bronze et l’emmena à Babylone
  - type: note
    content: Voir Jr 25.1-38 ; 36.1-32 ; 45.1-5.
  - type: text
    content: '. '
  '7':
  - type: text
    content: Nabuchodonosor emporta à Babylone une partie des objets du temple de l’Eternel et les plaça dans son palais à Babylone.
  '8':
  - type: text
    content: Les autres faits et gestes de Yehoyaqim ainsi que les pratiques abominables auxquelles il s’est livré et ce qui lui est arrivé, tout cela est cité dans le livre des rois d’Israël et de Juda. Son fils Yehoyakîn lui succéda sur le trône.
  - type: heading
    content: (2 R 24.8-17)
  '9':
  - type: text
    content: Yehoyakîn était âgé de dix-huit ans
  - type: note
    content: 'D’après un manuscrit hébreu, certains manuscrits de l’ancienne version grecque et la version syriaque (voir 2 R 24.8). La plupart des manuscrits hébreux ont : huit ans.'
  - type: text
    content: ' à son avènement et il régna trois mois et dix jours à Jérusalem'
  - type: note
    content: De décembre 598 à mars 597 av. J.-C. Voir note 2 R 24.8.
  - type: text
    content: . Il fit ce que l’Eternel considère comme mal.
