document_id: 2SA.12
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Les reproches du prophète Nathan
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'L’Eternel envoya Nathan chez David. Le prophète alla donc le trouver et lui dit : Dans une ville vivaient deux hommes, l’un riche et l’autre pauvre'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '12.1 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Voir '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ps 51.2
        metadata:
          usfm: PSA.51.2
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Le riche possédait beaucoup de moutons et de bœufs. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Le pauvre n’avait qu’une petite brebis qu’il avait achetée et qu’il élevait ; elle grandissait chez lui auprès de ses enfants, elle mangeait de son pain, buvait à son bol et couchait dans ses bras ; elle était pour lui comme une fille. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Un jour, un voyageur arriva chez l’homme riche, mais celui-ci ne voulut pas prendre une bête de ses troupeaux de moutons ou de bœufs pour préparer un repas au voyageur de passage. Alors il alla prendre la brebis du pauvre et la fit apprêter pour son hôte.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'David entra dans une violente colère contre cet homme. Il dit à Nathan : Aussi vrai que l’Eternel est vivant, l’homme qui a fait cela mérite la mort ! '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Il restituera quatre fois la valeur de la brebis pour avoir commis un tel acte et pour avoir agi sans pitié.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Alors Nathan dit à David : Cet homme-là, c’est toi ! Voici ce que déclare l’Eternel, le Dieu d’Israël : « Je t’ai conféré l’onction pour t’établir roi d’Israël et je t’ai délivré de Saül. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Je t’ai livré la maison de ton seigneur Saül, j’ai mis les femmes de ton seigneur dans tes bras et je t’ai établi chef sur Israël et sur Juda ; et si cela était trop peu, j’étais prêt à y ajouter encore d’autres dons. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Alors pourquoi as-tu méprisé ma parole en faisant ce que je considère comme mal ? Tu as assassiné par l’épée Urie le Hittite. Tu as pris sa femme pour en faire la tienne, et lui-même tu l’as fait mourir par l’épée des Ammonites. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Maintenant, la violence ne quittera plus jamais ta famille parce que tu m’as méprisé et que tu as pris la femme d’Urie le Hittite pour en faire ta femme. » '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Voici ce que déclare l’Eternel : « Je vais faire venir le malheur contre toi, du sein même de ta famille, je prendrai sous tes yeux tes propres femmes pour les donner à un autre, qui s’unira à elles au grand jour. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Toi, tu as agi en cachette ; mais moi j’exécuterai cela sous les yeux de tout Israël, au grand jour. »
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'David dit à Nathan : J’ai péché contre l’Eternel !'
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Nathan lui répondit : Eh bien, l’Eternel a passé sur ton péché. Tu ne mourras pas. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Toutefois, comme par cette affaire tu as fourni aux ennemis de l’Eternel
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '12.14 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'On pourrait comprendre : '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: tu as montré beaucoup de mépris pour l’Eternel.
    marker-yv: yv-n
  - type: text
    text: ' une occasion de le mépriser, le fils qui t’est né mourra.'
- type: usfm
  marker: s1
  children:
  - type: text
    text: Les conséquences de la faute de David
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Nathan retourna chez lui. L’Eternel rendit gravement malade l’enfant que la femme d’Urie avait donné à David. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Le roi implora Dieu en sa faveur, il s’imposa un jeûne et passa toute la nuit prostré à terre. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Les hauts responsables du palais insistèrent auprès de lui pour qu’il se lève, mais il refusa et ne consentit pas à manger avec eux. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Au bout de sept jours, l’enfant mourut ; les serviteurs de David n’osaient pas lui annoncer la nouvelle car ils se disaient : Quand l’enfant vivait encore, nous lui avons parlé, mais il n’a rien voulu entendre. Si nous lui annonçons maintenant que l’enfant est mort, il va faire un malheur !'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Mais David s’aperçut que ses serviteurs chuchotaient entre eux, il comprit que l’enfant était mort et leur demanda : L’enfant est-il mort ?'
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Ils répondirent : Il est mort.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Alors David se releva de terre, prit un bain, se parfuma et changea de vêtements, puis il se rendit au sanctuaire de l’Eternel et se prosterna devant lui. Ensuite, il rentra chez lui, demanda qu’on lui prépare un repas et se mit à manger. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Ses serviteurs le questionnèrent : Que signifie ta façon d’agir ? Tant que l’enfant était vivant, tu as jeûné et pleuré, et maintenant qu’il est mort, tu te relèves et tu manges ?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'David leur répondit : Tant que l’enfant vivait encore, j’ai jeûné et pleuré, car je me disais : « Qui sait ? Peut-être l’Eternel aura-t-il pitié, et laissera-t-il l’enfant en vie. » '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: Maintenant qu’il est mort, pourquoi jeûnerais-je ? Est-ce que je peux le faire revenir à la vie ? C’est moi qui irai le rejoindre, mais lui ne reviendra pas vers moi.
- type: usfm
  marker: s1
  children:
  - type: text
    text: La naissance de Salomon
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: David consola Bath-Shéba sa femme, il alla vers elle et s’unit à elle. Elle eut de nouveau un fils qu’elle appela Salomon (le Pacifique
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '12.24 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Salomon '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'fait assonance avec '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: paix.
    marker-yv: yv-n
  - type: text
    text: '). L’Eternel l’aima '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: et envoya le prophète Nathan adresser une parole de sa part à David. Aussi celui-ci appela l’enfant Yedidya (Bien-aimé de l’Eternel), à cause de l’Eternel.
- type: usfm
  marker: s1
  children:
  - type: text
    text: David s’empare de la capitale des Ammonites
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Entre-temps, Joab attaqua Rabba, la cité ammonite, et il s’empara de la ville royale. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'Alors il envoya des messagers à David pour lui dire : J’ai donné l’assaut à Rabba et je me suis même emparé du quartier d’en bas où se trouve la réserve d’eau. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: Maintenant rassemble le reste de l’armée et viens toi-même assiéger la ville et t’en emparer. Il ne convient pas que ce soit moi qui la prenne et que tout l’honneur m’en revienne.
- type: usfm
  marker: r
  children:
  - type: text
    text: (1 Ch 20.1-3)
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'David rassembla donc tout le peuple et partit pour Rabba. Il donna l’assaut à la ville et s’en empara. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: Il prit la couronne qui se trouvait sur la tête de leur roi
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '12.30 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'L’ancienne version grecque a compris : '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: leur dieu Milkom.
    marker-yv: yv-n
  - type: text
    text: '. Cette couronne, qui était tout en or, pesait une trentaine de kilos et était garnie d’une pierre précieuse. Elle vint orner la tête de David. Le roi emporta de la ville un immense butin. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: Quant aux habitants, il les emmena et les affecta à diverses corvées pour manier la scie, les herses de fer et les haches de fer
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '12.31 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Certains traduisent : '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: et les fit supplicier par la scie, les herses de fer et les haches de fer.
    marker-yv: yv-n
  - type: text
    text: . Il en établit aussi comme mouleurs de briques. Il agit de même avec les populations de toutes les villes des Ammonites. Après cela, David et toute son armée rentrèrent à Jérusalem.
