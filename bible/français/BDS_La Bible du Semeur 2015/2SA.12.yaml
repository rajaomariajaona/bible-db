document_id: 2SA.12,21
type_code: fra
verses:
  '1':
  - type: heading
    content: Les reproches du prophète Nathan
  - type: text
    content: 'L’Eternel envoya Nathan chez David. Le prophète alla donc le trouver et lui dit : Dans une ville vivaient deux hommes, l’un riche et l’autre pauvre'
  - type: note
    content: Voir Ps 51.2.
  - type: text
    content: '. '
  '10':
  - type: text
    content: 'Maintenant, la violence ne quittera plus jamais ta famille parce que tu m’as méprisé et que tu as pris la femme d’Urie le Hittite pour en faire ta femme. » '
  '11':
  - type: text
    content: 'Voici ce que déclare l’Eternel : « Je vais faire venir le malheur contre toi, du sein même de ta famille, je prendrai sous tes yeux tes propres femmes pour les donner à un autre, qui s’unira à elles au grand jour. '
  '12':
  - type: text
    content: Toi, tu as agi en cachette ; mais moi j’exécuterai cela sous les yeux de tout Israël, au grand jour. »
  '13':
  - type: text
    content: 'David dit à Nathan : J’ai péché contre l’Eternel !'
  - type: text
    content: 'Nathan lui répondit : Eh bien, l’Eternel a passé sur ton péché. Tu ne mourras pas. '
  '14':
  - type: text
    content: Toutefois, comme par cette affaire tu as fourni aux ennemis de l’Eternel
  - type: note
    content: 'On pourrait comprendre : tu as montré beaucoup de mépris pour l’Eternel.'
  - type: text
    content: ' une occasion de le mépriser, le fils qui t’est né mourra.'
  - type: heading
    content: Les conséquences de la faute de David
  '15':
  - type: text
    content: 'Nathan retourna chez lui. L’Eternel rendit gravement malade l’enfant que la femme d’Urie avait donné à David. '
  '16':
  - type: text
    content: 'Le roi implora Dieu en sa faveur, il s’imposa un jeûne et passa toute la nuit prostré à terre. '
  '17':
  - type: text
    content: 'Les hauts responsables du palais insistèrent auprès de lui pour qu’il se lève, mais il refusa et ne consentit pas à manger avec eux. '
  '18':
  - type: text
    content: 'Au bout de sept jours, l’enfant mourut ; les serviteurs de David n’osaient pas lui annoncer la nouvelle car ils se disaient : Quand l’enfant vivait encore, nous lui avons parlé, mais il n’a rien voulu entendre. Si nous lui annonçons maintenant que l’enfant est mort, il va faire un malheur !'
  '19':
  - type: text
    content: 'Mais David s’aperçut que ses serviteurs chuchotaient entre eux, il comprit que l’enfant était mort et leur demanda : L’enfant est-il mort ?'
  - type: text
    content: 'Ils répondirent : Il est mort.'
  '2':
  - type: text
    content: 'Le riche possédait beaucoup de moutons et de bœufs. '
  '20':
  - type: text
    content: 'Alors David se releva de terre, prit un bain, se parfuma et changea de vêtements, puis il se rendit au sanctuaire de l’Eternel et se prosterna devant lui. Ensuite, il rentra chez lui, demanda qu’on lui prépare un repas et se mit à manger. '
  '21':
  - type: text
    content: 'Ses serviteurs le questionnèrent : Que signifie ta façon d’agir ? Tant que l’enfant était vivant, tu as jeûné et pleuré, et maintenant qu’il est mort, tu te relèves et tu manges ?'
  '22':
  - type: text
    content: 'David leur répondit : Tant que l’enfant vivait encore, j’ai jeûné et pleuré, car je me disais : « Qui sait ? Peut-être l’Eternel aura-t-il pitié, et laissera-t-il l’enfant en vie. » '
  '23':
  - type: text
    content: Maintenant qu’il est mort, pourquoi jeûnerais-je ? Est-ce que je peux le faire revenir à la vie ? C’est moi qui irai le rejoindre, mais lui ne reviendra pas vers moi.
  - type: heading
    content: La naissance de Salomon
  '24':
  - type: text
    content: David consola Bath-Shéba sa femme, il alla vers elle et s’unit à elle. Elle eut de nouveau un fils qu’elle appela Salomon (le Pacifique
  - type: note
    content: Salomon fait assonance avec paix.
  - type: text
    content: '). L’Eternel l’aima '
  '25':
  - type: text
    content: et envoya le prophète Nathan adresser une parole de sa part à David. Aussi celui-ci appela l’enfant Yedidya (Bien-aimé de l’Eternel), à cause de l’Eternel.
  - type: heading
    content: David s’empare de la capitale des Ammonites
  '26':
  - type: text
    content: 'Entre-temps, Joab attaqua Rabba, la cité ammonite, et il s’empara de la ville royale. '
  '27':
  - type: text
    content: 'Alors il envoya des messagers à David pour lui dire : J’ai donné l’assaut à Rabba et je me suis même emparé du quartier d’en bas où se trouve la réserve d’eau. '
  '28':
  - type: text
    content: Maintenant rassemble le reste de l’armée et viens toi-même assiéger la ville et t’en emparer. Il ne convient pas que ce soit moi qui la prenne et que tout l’honneur m’en revienne.
  - type: heading
    content: (1 Ch 20.1-3)
  '29':
  - type: text
    content: 'David rassembla donc tout le peuple et partit pour Rabba. Il donna l’assaut à la ville et s’en empara. '
  '3':
  - type: text
    content: 'Le pauvre n’avait qu’une petite brebis qu’il avait achetée et qu’il élevait ; elle grandissait chez lui auprès de ses enfants, elle mangeait de son pain, buvait à son bol et couchait dans ses bras ; elle était pour lui comme une fille. '
  '30':
  - type: text
    content: Il prit la couronne qui se trouvait sur la tête de leur roi
  - type: note
    content: 'L’ancienne version grecque a compris : leur dieu Milkom.'
  - type: text
    content: '. Cette couronne, qui était tout en or, pesait une trentaine de kilos et était garnie d’une pierre précieuse. Elle vint orner la tête de David. Le roi emporta de la ville un immense butin. '
  '31':
  - type: text
    content: Quant aux habitants, il les emmena et les affecta à diverses corvées pour manier la scie, les herses de fer et les haches de fer
  - type: note
    content: 'Certains traduisent : et les fit supplicier par la scie, les herses de fer et les haches de fer.'
  - type: text
    content: . Il en établit aussi comme mouleurs de briques. Il agit de même avec les populations de toutes les villes des Ammonites. Après cela, David et toute son armée rentrèrent à Jérusalem.
  '4':
  - type: text
    content: Un jour, un voyageur arriva chez l’homme riche, mais celui-ci ne voulut pas prendre une bête de ses troupeaux de moutons ou de bœufs pour préparer un repas au voyageur de passage. Alors il alla prendre la brebis du pauvre et la fit apprêter pour son hôte.
  '5':
  - type: text
    content: 'David entra dans une violente colère contre cet homme. Il dit à Nathan : Aussi vrai que l’Eternel est vivant, l’homme qui a fait cela mérite la mort ! '
  '6':
  - type: text
    content: Il restituera quatre fois la valeur de la brebis pour avoir commis un tel acte et pour avoir agi sans pitié.
  '7':
  - type: text
    content: 'Alors Nathan dit à David : Cet homme-là, c’est toi ! Voici ce que déclare l’Eternel, le Dieu d’Israël : « Je t’ai conféré l’onction pour t’établir roi d’Israël et je t’ai délivré de Saül. '
  '8':
  - type: text
    content: 'Je t’ai livré la maison de ton seigneur Saül, j’ai mis les femmes de ton seigneur dans tes bras et je t’ai établi chef sur Israël et sur Juda ; et si cela était trop peu, j’étais prêt à y ajouter encore d’autres dons. '
  '9':
  - type: text
    content: 'Alors pourquoi as-tu méprisé ma parole en faisant ce que je considère comme mal ? Tu as assassiné par l’épée Urie le Hittite. Tu as pris sa femme pour en faire la tienne, et lui-même tu l’as fait mourir par l’épée des Ammonites. '
