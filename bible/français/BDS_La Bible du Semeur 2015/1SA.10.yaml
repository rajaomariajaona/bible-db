document_id: 1SA.10,21
type_code: fra
verses:
  '1':
  - type: text
    content: 'Samuel prit le flacon d’huile qu’il avait emporté et en répandit le contenu sur la tête de Saül, puis il l’embrassa et dit : Par cette onction, l’Eternel t’établit chef du peuple qui lui appartient. [C’est toi qui le gouverneras, tu le sauveras des ennemis qui l’entourent. Et voici la preuve que c’est l’Eternel qui t’établit chef de son peuple par cette onction'
  - type: note
    content: Les mots entre crochets ne se trouvent pas dans le texte hébreu traditionnel. Ils sont rajoutés d’après l’ancienne version grecque et la version syriaque.
  - type: text
    content: '.] '
  '10':
  - type: text
    content: 'Quand ils arrivèrent à Guibéa, une confrérie de disciples des prophètes venait dans sa direction. Alors l’Esprit de Dieu tomba sur lui et il entra dans un état d’exaltation au milieu d’eux. '
  '11':
  - type: text
    content: 'Tous ceux qui le connaissaient auparavant et qui le virent dans un tel état avec les disciples des prophètes se demandèrent l’un à l’autre : « Qu’est-il donc arrivé au fils de Qish ? Saül fait-il maintenant partie, lui aussi, des disciples des prophètes ? » '
  '12':
  - type: text
    content: 'L’un des assistants ajouta : Et qui donc est leur maître ?'
  - type: text
    content: 'C’est ainsi qu’est née l’expression proverbiale : Saül fait-il maintenant partie, lui aussi, des disciples des prophètes ?'
  '13':
  - type: text
    content: 'Lorsque Saül fut sorti de son état d’exaltation, il se rendit au haut lieu. '
  '14':
  - type: text
    content: 'Son oncle lui demanda ainsi qu’à son serviteur : Où donc êtes-vous allés ?'
  - type: text
    content: – A la recherche des ânesses, dit-il. Comme nous ne les avons trouvées nulle part, nous sommes allés consulter Samuel.
  '15':
  - type: text
    content: – Raconte-moi donc ce qu’il vous a dit, demanda l’oncle.
  '16':
  - type: text
    content: 'Saül lui répondit : Il nous a assuré que les ânesses étaient retrouvées.'
  - type: text
    content: Mais il ne souffla mot de ce que Samuel avait dit au sujet de la royauté.
  - type: heading
    content: Saül devient roi d’Israël
  '17':
  - type: text
    content: Samuel convoqua le peuple auprès de l’Eternel à Mitspa
  - type: note
    content: Jg 20.1 ; 21.1 ; 1 S 7.5. Lieu habituel de délibération du peuple.
  - type: text
    content: '. '
  '18':
  - type: text
    content: 'Il dit aux Israélites : Voici ce que déclare l’Eternel, le Dieu d’Israël : « Je vous ai moi-même fait sortir d’Egypte et je vous ai libérés des Egyptiens et de tous les royaumes qui vous opprimaient. '
  '19':
  - type: text
    content: Et vous, aujourd’hui, vous avez rejeté votre Dieu, qui pourtant vous a délivrés de tous vos maux et de toutes vos détresses. Vous lui avez dit
  - type: note
    content: 'D’après la plupart des manuscrits hébreux. Quelques manuscrits hébreux et les versions anciennes ont : vous m’avez dit.'
  - type: text
    content: '  : Il faut que tu établisses un roi sur nous. Eh bien, puisqu’il en est ainsi, présentez-vous devant l’Eternel, par tribus et par familles. »'
  '2':
  - type: text
    content: 'Aujourd’hui, quand tu m’auras quitté, tu rencontreras deux hommes près du tombeau de Rachel, à Tseltsah, dans le territoire de Benjamin. Ils te diront : « Les ânesses que tu es allé rechercher ont été retrouvées. Maintenant, ton père ne se préoccupe plus à leur sujet, mais il s’inquiète de vous et se demande ce qu’il doit faire pour te retrouver. » '
  '20':
  - type: text
    content: Samuel fit avancer toutes les tribus d’Israël l’une après l’autre, et le sort
  - type: note
    content: Ce tirage au sort a sans doute été effectué à l’aide de l’ourim et du toummim (2.28 ; Ex 28.30 ; Jos 7.15-18).
  - type: text
    content: ' désigna la tribu de Benjamin. '
  '21':
  - type: text
    content: 'Puis il fit approcher la tribu de Benjamin par familles, et le sort désigna la famille de Matri. Finalement, ce fut Saül, fils de Qish, qui fut désigné. On le chercha, mais on ne réussit pas à le trouver. '
  '22':
  - type: text
    content: 'Alors on interrogea de nouveau l’Eternel en demandant : Y a-t-il encore quelqu’un qui soit venu ici ?'
  - type: text
    content: 'Et l’Eternel répondit : Oui, il se cache du côté des bagages.'
  '23':
  - type: text
    content: 'Ils coururent et le tirèrent de là pour le placer au milieu du peuple ; et voici qu’il dépassait tout le monde de la tête. '
  '24':
  - type: text
    content: 'Samuel dit à tout le peuple : Voyez celui que l’Eternel a choisi ! Il n’a pas son pareil dans tout Israël.'
  - type: text
    content: Tous l’acclamèrent aux cris de Vive le roi !
  '25':
  - type: text
    content: Samuel énuméra devant eux le droit concernant le roi
  - type: note
    content: Voir Dt 17.14-20  ; cf. 1 S 8.11-18.
  - type: text
    content: ', puis il le consigna par écrit dans un document qu’il déposa dans le sanctuaire devant l’Eternel. Après cela, il renvoya le peuple chacun chez soi.'
  '26':
  - type: text
    content: 'Saül aussi retourna chez lui, à Guibéa, accompagné d’un groupe de vaillants hommes que Dieu avait incités à le suivre. '
  '27':
  - type: text
    content: 'Il y eut toutefois quelques vauriens pour dire : De quel secours nous serait-il, celui-là ?'
  - type: text
    content: Ils le méprisèrent et ne lui offrirent aucun présent. Mais Saül n’y fit pas attention.
  '3':
  - type: text
    content: 'En poursuivant ta route, lorsque tu arriveras au chêne de Thabor, tu rencontreras trois hommes montant à Béthel pour adorer Dieu. L’un d’eux portera trois chevreaux, l’autre trois miches de pain et le dernier une outre de vin. '
  '4':
  - type: text
    content: 'Ils te salueront et t’offriront deux pains. Tu les accepteras. '
  '5':
  - type: text
    content: Après cela, tu arriveras à Guibéa-Elohim
  - type: note
    content: A 6 kilomètres au nord de Jérusalem ; patrie de Saül (v. 26 ; 11.4), appelée Guibéa de Benjamin (13.2, 15) ou de Saül (15.34 ; 2 S 21.6). Ici, Samuel l’appelle Guibéa-Elohim, c’est-à-dire de Dieu, peut-être pour rappeler qu’elle appartient à Dieu malgré la présence des Philistins (Dt 32.43 ; Es 14.2 ; Os 9.3).
  - type: text
    content: ' où se trouve une garnison de Philistins. Puis, en entrant dans la ville, tu rencontreras une confrérie de disciples des prophètes descendant du haut lieu ; ils seront précédés de joueurs de luth, de tambourin, de flûte et de lyre. Ils seront dans un état d’exaltation. '
  '6':
  - type: text
    content: 'Alors, l’Esprit de l’Eternel tombera sur toi, tu deviendras tout exalté comme eux et tu seras changé en un autre homme. '
  '7':
  - type: text
    content: 'Quand ces signes se seront réalisés pour toi, agis selon ce que tu trouveras à faire, car Dieu est avec toi ! '
  '8':
  - type: text
    content: Tu me précéderas à Guilgal
  - type: note
    content: Où se trouvait le premier sanctuaire érigé en Canaan (Jos 4.19-24 ; 5.10 ; Jg 2.1 ; 3.19).
  - type: text
    content: ' où je te rejoindrai pour offrir des holocaustes et des sacrifices de communion. Tu m’attendras sept jours jusqu’à ce que je vienne te retrouver. Alors je te ferai savoir ce que tu dois faire.'
  - type: heading
    content: L’Esprit de Dieu s’empare de Saül
  '9':
  - type: text
    content: 'Saül quitta Samuel, et lorsqu’il se retourna pour reprendre la route, Dieu opéra une transformation en son être intérieur, et tous les signes annoncés se produisirent ce même jour. '
