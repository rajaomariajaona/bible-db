document_id: DEU.7
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Les Cananéens et leurs idoles
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Lorsque l’Eternel ton Dieu t’aura fait entrer dans le pays où tu te rends pour en prendre possession, et qu’il aura chassé devant toi de nombreux peuples : les Hittites, les Guirgasiens, les Amoréens, les Cananéens, les Phéréziens, les Héviens et les Yebousiens, ces sept peuples plus nombreux et plus puissants que toi'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '7.1 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Voir '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ac 13.19
        metadata:
          usfm: ACT.13.19
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: ', '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'lorsqu’il te les aura livrés et que tu les auras vaincus, tu les extermineras totalement pour les vouer à l’Eternel ; tu ne concluras pas d’alliance avec eux et tu n’auras pour eux aucune pitié. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Tu ne t’uniras pas avec eux par des mariages, tu ne donneras pas tes filles à leurs fils et tu ne prendras pas leurs filles pour tes fils ; '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'car ils détourneraient de moi tes enfants, qui iraient rendre un culte à d’autres dieux : ma colère s’enflammerait alors contre vous et je ne tarderais pas à vous exterminer. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Voici, au contraire, comment vous agirez à leur égard : vous démolirez leurs autels, vous briserez leurs statues, vous abattrez leurs pieux sacrés voués à la déesse Ashéra et vous brûlerez leurs idoles sculptées'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '7.5 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Voir '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Dt 12.3
        metadata:
          usfm: DEU.12.3
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Tu es, en effet, un peuple saint pour l’Eternel ton Dieu, il t’a choisi parmi tous les peuples qui se trouvent sur la surface de la terre pour que tu sois son peuple précieux
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '7.6 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Voir Ex 19.5 ; Tt 2.14 ; 1 P 2.9.
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Si l’Eternel s’est attaché à vous et vous a choisis, ce n’est nullement parce que vous êtes plus nombreux que les autres peuples. En fait, vous êtes le moindre de tous. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Mais c’est parce que l’Eternel vous aime et parce qu’il veut accomplir ce qu’il a promis par serment à vos ancêtres
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '7.8 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Voir Gn 13.15 ; 26.3 ; 28.13.
    marker-yv: yv-n
  - type: text
    text: ', c’est pour cela qu’il vous a arrachés avec puissance au pouvoir du pharaon, roi d’Egypte, et qu’il vous a libérés de l’esclavage.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Reconnais donc que l’Eternel ton Dieu est le seul vrai Dieu, un Dieu fidèle à son alliance en témoignant de l’amour pour mille générations envers ceux qui l’aiment et qui obéissent à ses commandements
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '7.9 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Pour les v. 9-10, voir Ex 20.5-6 ; 34.6-7 ; Nb 14.18 ; Dt 5.9-10.
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Mais il rend directement leur dû à ceux qui le haïssent et il les fait périr ; sans tarder, il paie de retour directement ceux qui le haïssent. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: C’est pourquoi, obéissez aux commandements, aux ordonnances et aux lois que je vous donne aujourd’hui et appliquez-les.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Car si vous prêtez attention à ces lois, si vous y obéissez et si vous les appliquez, l’Eternel votre Dieu tiendra l’engagement de vous aimer qu’il a pris par serment en concluant une alliance avec vos ancêtres
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '7.12 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Pour les v. 12-16, voir '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Dt 11.13-17
        metadata:
          usfm: DEU.11.13+DEU.11.14+DEU.11.15+DEU.11.16+DEU.11.17
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Il vous aimera, vous bénira, vous rendra nombreux, et il bénira vos enfants, il vous bénira par tout ce que produiront vos terres : votre blé, votre vin nouveau, votre huile fraîche, et en accroissant les portées de votre gros et de votre petit bétail sur la terre qu’il a promis par serment à vos ancêtres de vous donner. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Vous jouirez de plus de bénédictions que tous les autres peuples, et il n’y aura chez vous ni homme ni femme stérile, ni bête stérile dans vos troupeaux.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: L’Eternel vous préservera de toute maladie ; il ne vous infligera aucune de ces terribles épidémies qui ont frappé l’Egypte comme vous le savez. Il les enverra à tous ceux qui vous haïssent.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Vous supprimerez tous les peuples que l’Eternel votre Dieu livrera en votre pouvoir, sans avoir de pitié pour eux ; vous ne rendrez pas de culte à leurs dieux : ce serait un piège pour vous.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Peut-être te diras-tu : « Ces peuples sont plus puissants que moi ! Comment pourrais-je les déposséder ? » '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'N’aie pas peur d’eux ! Souviens-toi seulement de ce que l’Eternel ton Dieu a fait au pharaon et à toute l’Egypte. '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Rappelle-toi les terribles épreuves que tu as vues de tes yeux, les signes miraculeux et les prodiges, et le déploiement de puissance par lesquels l’Eternel ton Dieu t’a fait sortir d’Egypte. L’Eternel ton Dieu traitera de la même manière tous les peuples que tu crains. '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: De plus, il enverra contre eux les frelons
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '7.20 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Voir Ex 23.28 ; Jos 24.12. Mot hébreu rare. Les commentaires juifs et les versions anciennes l’ont traduit : '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: frelons
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: '. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Il pourrait s’agir de plaies comme celles d’Egypte. Les insectes sont l’un des fléaux les plus redoutés des agriculteurs. D’autres voient dans les frelons une allusion à une expédition militaire de l’Egypte qui avait pris le frelon comme emblème. D’autres encore traduisent : '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'Dieu enverra le découragement. '
    - type: usfm
      marker: ft
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Dt 1.44
        metadata:
          usfm: DEU.1.44
      - type: text
        text: ' et '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ps 118.12
        metadata:
          usfm: PSA.118.12
      - type: text
        text: ' comparent les ennemis à des abeilles.'
    marker-yv: yv-n
  - type: text
    text: ' pour faire périr les rescapés qui se seraient cachés pour t’échapper. '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Ne tremble pas devant eux, car l’Eternel ton Dieu qui est au milieu de toi est un Dieu grand et redoutable. '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: C’est seulement petit à petit que l’Eternel ton Dieu chassera ces peuples étrangers devant toi, tu ne pourras pas les éliminer d’un seul coup, sinon les bêtes sauvages se multiplieraient dangereusement chez toi
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '7.22 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Voir v. 1. Les bêtes sauvages se multiplient rapidement dans un pays dépeuplé (voir '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ex 23.29-30
        metadata:
          usfm: EXO.23.29+EXO.23.30
      - type: text
        text: ) ; les lions et les ours étaient fréquents dans le pays alloué à Israël (Jg 14.5 ; 1 S 17.34-35 ; 2 R 17.25-26 ; Am 5.19).
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'L’Eternel ton Dieu livrera ces peuples en ton pouvoir et les mettra en déroute, jusqu’à leur destruction totale. '
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Il te livrera leurs rois, et tu feras disparaître leur nom de dessous le ciel ; personne ne pourra te résister : tu les extermineras tous. '
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Vous brûlerez les statues de leurs dieux. Ne cède pas à la tentation de récupérer l’argent ou l’or qui les recouvre ! Ne le prends pas ! Cela pourrait constituer un piège pour toi, car c’est une abomination pour l’Eternel ton Dieu. '
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: Tu n’introduiras donc pas dans ta maison une abomination, car tu te mettrais avec elle sous le coup de la malédiction. Tu la tiendras pour une chose réprouvée, tu l’auras en abomination, car elle est sous la malédiction.
