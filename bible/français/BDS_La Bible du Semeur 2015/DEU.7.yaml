document_id: DEU.7,21
type_code: fra
verses:
  '1':
  - type: heading
    content: Les Cananéens et leurs idoles
  - type: text
    content: 'Lorsque l’Eternel ton Dieu t’aura fait entrer dans le pays où tu te rends pour en prendre possession, et qu’il aura chassé devant toi de nombreux peuples : les Hittites, les Guirgasiens, les Amoréens, les Cananéens, les Phéréziens, les Héviens et les Yebousiens, ces sept peuples plus nombreux et plus puissants que toi'
  - type: note
    content: Voir Ac 13.19.
  - type: text
    content: ', '
  '10':
  - type: text
    content: 'Mais il rend directement leur dû à ceux qui le haïssent et il les fait périr ; sans tarder, il paie de retour directement ceux qui le haïssent. '
  '11':
  - type: text
    content: C’est pourquoi, obéissez aux commandements, aux ordonnances et aux lois que je vous donne aujourd’hui et appliquez-les.
  '12':
  - type: text
    content: Car si vous prêtez attention à ces lois, si vous y obéissez et si vous les appliquez, l’Eternel votre Dieu tiendra l’engagement de vous aimer qu’il a pris par serment en concluant une alliance avec vos ancêtres
  - type: note
    content: Pour les v. 12-16, voir Dt 11.13-17.
  - type: text
    content: '. '
  '13':
  - type: text
    content: 'Il vous aimera, vous bénira, vous rendra nombreux, et il bénira vos enfants, il vous bénira par tout ce que produiront vos terres : votre blé, votre vin nouveau, votre huile fraîche, et en accroissant les portées de votre gros et de votre petit bétail sur la terre qu’il a promis par serment à vos ancêtres de vous donner. '
  '14':
  - type: text
    content: Vous jouirez de plus de bénédictions que tous les autres peuples, et il n’y aura chez vous ni homme ni femme stérile, ni bête stérile dans vos troupeaux.
  '15':
  - type: text
    content: L’Eternel vous préservera de toute maladie ; il ne vous infligera aucune de ces terribles épidémies qui ont frappé l’Egypte comme vous le savez. Il les enverra à tous ceux qui vous haïssent.
  '16':
  - type: text
    content: 'Vous supprimerez tous les peuples que l’Eternel votre Dieu livrera en votre pouvoir, sans avoir de pitié pour eux ; vous ne rendrez pas de culte à leurs dieux : ce serait un piège pour vous.'
  '17':
  - type: text
    content: 'Peut-être te diras-tu : « Ces peuples sont plus puissants que moi ! Comment pourrais-je les déposséder ? » '
  '18':
  - type: text
    content: 'N’aie pas peur d’eux ! Souviens-toi seulement de ce que l’Eternel ton Dieu a fait au pharaon et à toute l’Egypte. '
  '19':
  - type: text
    content: 'Rappelle-toi les terribles épreuves que tu as vues de tes yeux, les signes miraculeux et les prodiges, et le déploiement de puissance par lesquels l’Eternel ton Dieu t’a fait sortir d’Egypte. L’Eternel ton Dieu traitera de la même manière tous les peuples que tu crains. '
  '2':
  - type: text
    content: 'lorsqu’il te les aura livrés et que tu les auras vaincus, tu les extermineras totalement pour les vouer à l’Eternel ; tu ne concluras pas d’alliance avec eux et tu n’auras pour eux aucune pitié. '
  '20':
  - type: text
    content: De plus, il enverra contre eux les frelons
  - type: note
    content: 'Voir Ex 23.28 ; Jos 24.12. Mot hébreu rare. Les commentaires juifs et les versions anciennes l’ont traduit : frelons. Il pourrait s’agir de plaies comme celles d’Egypte. Les insectes sont l’un des fléaux les plus redoutés des agriculteurs. D’autres voient dans les frelons une allusion à une expédition militaire de l’Egypte qui avait pris le frelon comme emblème. D’autres encore traduisent : Dieu enverra le découragement. Dt 1.44 et Ps 118.12 comparent les ennemis à des abeilles.'
  - type: text
    content: ' pour faire périr les rescapés qui se seraient cachés pour t’échapper. '
  '21':
  - type: text
    content: 'Ne tremble pas devant eux, car l’Eternel ton Dieu qui est au milieu de toi est un Dieu grand et redoutable. '
  '22':
  - type: text
    content: C’est seulement petit à petit que l’Eternel ton Dieu chassera ces peuples étrangers devant toi, tu ne pourras pas les éliminer d’un seul coup, sinon les bêtes sauvages se multiplieraient dangereusement chez toi
  - type: note
    content: Voir v. 1. Les bêtes sauvages se multiplient rapidement dans un pays dépeuplé (voir Ex 23.29-30) ; les lions et les ours étaient fréquents dans le pays alloué à Israël (Jg 14.5 ; 1 S 17.34-35 ; 2 R 17.25-26 ; Am 5.19).
  - type: text
    content: '. '
  '23':
  - type: text
    content: 'L’Eternel ton Dieu livrera ces peuples en ton pouvoir et les mettra en déroute, jusqu’à leur destruction totale. '
  '24':
  - type: text
    content: 'Il te livrera leurs rois, et tu feras disparaître leur nom de dessous le ciel ; personne ne pourra te résister : tu les extermineras tous. '
  '25':
  - type: text
    content: 'Vous brûlerez les statues de leurs dieux. Ne cède pas à la tentation de récupérer l’argent ou l’or qui les recouvre ! Ne le prends pas ! Cela pourrait constituer un piège pour toi, car c’est une abomination pour l’Eternel ton Dieu. '
  '26':
  - type: text
    content: Tu n’introduiras donc pas dans ta maison une abomination, car tu te mettrais avec elle sous le coup de la malédiction. Tu la tiendras pour une chose réprouvée, tu l’auras en abomination, car elle est sous la malédiction.
  '3':
  - type: text
    content: 'Tu ne t’uniras pas avec eux par des mariages, tu ne donneras pas tes filles à leurs fils et tu ne prendras pas leurs filles pour tes fils ; '
  '4':
  - type: text
    content: 'car ils détourneraient de moi tes enfants, qui iraient rendre un culte à d’autres dieux : ma colère s’enflammerait alors contre vous et je ne tarderais pas à vous exterminer. '
  '5':
  - type: text
    content: 'Voici, au contraire, comment vous agirez à leur égard : vous démolirez leurs autels, vous briserez leurs statues, vous abattrez leurs pieux sacrés voués à la déesse Ashéra et vous brûlerez leurs idoles sculptées'
  - type: note
    content: Voir Dt 12.3.
  - type: text
    content: '. '
  '6':
  - type: text
    content: Tu es, en effet, un peuple saint pour l’Eternel ton Dieu, il t’a choisi parmi tous les peuples qui se trouvent sur la surface de la terre pour que tu sois son peuple précieux
  - type: note
    content: Voir Ex 19.5 ; Tt 2.14 ; 1 P 2.9.
  - type: text
    content: .
  '7':
  - type: text
    content: 'Si l’Eternel s’est attaché à vous et vous a choisis, ce n’est nullement parce que vous êtes plus nombreux que les autres peuples. En fait, vous êtes le moindre de tous. '
  '8':
  - type: text
    content: Mais c’est parce que l’Eternel vous aime et parce qu’il veut accomplir ce qu’il a promis par serment à vos ancêtres
  - type: note
    content: Voir Gn 13.15 ; 26.3 ; 28.13.
  - type: text
    content: ', c’est pour cela qu’il vous a arrachés avec puissance au pouvoir du pharaon, roi d’Egypte, et qu’il vous a libérés de l’esclavage.'
  '9':
  - type: text
    content: Reconnais donc que l’Eternel ton Dieu est le seul vrai Dieu, un Dieu fidèle à son alliance en témoignant de l’amour pour mille générations envers ceux qui l’aiment et qui obéissent à ses commandements
  - type: note
    content: Pour les v. 9-10, voir Ex 20.5-6 ; 34.6-7 ; Nb 14.18 ; Dt 5.9-10.
  - type: text
    content: '. '
