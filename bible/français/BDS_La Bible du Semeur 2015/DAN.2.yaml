document_id: DAN.2
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Le rêve de la statue brisée
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: La deuxième année du règne de Nabuchodonosor, le roi fit un rêve qui le troubla au point qu’il en perdit le sommeil.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Il ordonna de convoquer les mages, les magiciens, les sorciers et les astrologues pour qu’ils lui révèlent ses rêves. Ils vinrent et se tinrent devant le roi.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Celui-ci leur dit : J’ai fait un rêve et mon esprit est tourmenté par le désir de savoir ce que c’était.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Les astrologues dirent au roi en langue araméenne
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '2.4 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'A partir de là, et jusqu’à la fin du chapitre 7, le texte original est en araméen, la langue internationale de tout le Moyen-Orient depuis le '
      - type: usfm
        marker: sc
        children:
        - type: text
          text: viii
      - type: usfm
        marker: ord
        children:
        - type: text
          text: e
      - type: text
        text: ' siècle avant J.-C.'
    marker-yv: yv-n
  - type: text
    text: '  : Que le roi vive éternellement ! Raconte le rêve à tes serviteurs, et nous t’en donnerons l’interprétation.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Le roi répondit aux astrologues : Ma décision est ferme : si vous ne me révélez pas le contenu du rêve et son interprétation, vous serez mis en pièces et vos maisons seront réduites en tas de décombres. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Mais si vous me les révélez, je vous comblerai de cadeaux, de dons et de grands honneurs. Exposez-moi donc mon rêve et ce qu’il signifie.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Ils dirent pour la seconde fois au roi : Que Sa Majesté raconte le rêve à ses serviteurs, et nous lui en donnerons l’interprétation.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Le roi rétorqua : Je vois ce qu’il en est : il est clair que vous cherchez à gagner du temps parce que vous avez compris que ma décision est fermement arrêtée. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Si vous ne me faites pas connaître le rêve, une seule et même sentence vous frappera. Vous vous êtes mis d’accord pour me débiter quelque discours mensonger et trompeur en espérant qu’avec le temps la situation changera. C’est pourquoi, dites-moi ce que j’ai rêvé et je saurai que vous êtes aussi capables de m’en donner l’interprétation.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Les astrologues reprirent la parole devant le roi et dirent : Il n’est personne au monde qui puisse faire connaître à Sa Majesté ce qu’elle demande. Aussi, jamais roi, si grand et si puissant qu’il ait été, n’a exigé pareille chose d’aucun mage, magicien ou astrologue. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Ce que le roi demande est trop difficile et il n’y a personne qui soit capable de révéler cette chose au roi, excepté les dieux, mais eux, ils n’habitent pas parmi les mortels.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Là-dessus le roi s’irrita et entra dans une colère violente. Il ordonna de mettre à mort tous les sages de Babylone. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Lorsque le décret de tuer les sages fut publié, on rechercha aussi Daniel et ses compagnons pour les mettre à mort.
- type: usfm
  marker: s2
  children:
  - type: text
    text: Dieu révèle la signification du rêve à Daniel
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Alors Daniel s’adressa avec sagesse et tact à Aryok, le chef des gardes du roi, qui s’apprêtait à tuer les sages de Babylone.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Il demanda à Aryok, l’officier du roi : Pourquoi le roi a-t-il promulgué une si terrible sentence ?'
- type: usfm
  marker: p
  children:
  - type: text
    text: Alors Aryok lui exposa l’affaire.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Daniel se rendit auprès du roi et le pria de lui accorder un délai, en lui disant qu’il lui ferait alors connaître l’interprétation demandée. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Puis il rentra chez lui et informa ses compagnons Hanania, Mishaël et Azaria de ce qui s’était passé, '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'en leur demandant de supplier le Dieu des cieux que, dans sa grâce, il leur révèle ce secret afin qu’on ne le fasse pas périr, ses compagnons et lui, avec le reste des sages de Babylone. '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Au cours de la nuit, dans une vision, le secret fut révélé à Daniel. Alors celui-ci bénit le Dieu des cieux. '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Il dit :'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Béni soit Dieu
- type: usfm
  marker: q1
  children:
  - type: text
    text: dès maintenant et à toujours,
- type: usfm
  marker: q1
  children:
  - type: text
    text: car à lui appartiennent ╵la sagesse et la force.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Il fait changer les temps ╵et modifie les circonstances,
- type: usfm
  marker: q1
  children:
  - type: text
    text: il renverse les rois
- type: usfm
  marker: q1
  children:
  - type: text
    text: et établit les rois,
- type: usfm
  marker: q1
  children:
  - type: text
    text: il donne la sagesse aux sages
- type: usfm
  marker: q1
  children:
  - type: text
    text: et, à ceux qui savent comprendre, ╵il accorde la connaissance.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: Il dévoile des choses ╵profondes et secrètes,
- type: usfm
  marker: q1
  children:
  - type: text
    text: il sait ce qu’il y a ╵dans les ténèbres,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et la lumière brille auprès de lui.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: C’est toi, Dieu de mes pères,
- type: usfm
  marker: q1
  children:
  - type: text
    text: que je célèbre et que je loue,
- type: usfm
  marker: q1
  children:
  - type: text
    text: tu m’as rempli ╵de sagesse et de force
- type: usfm
  marker: q1
  children:
  - type: text
    text: et tu m’as fait connaître ╵ce que nous t’avons demandé,
- type: usfm
  marker: q1
  children:
  - type: text
    text: tu nous as révélé ╵ce que le roi demande.
- type: usfm
  marker: s2
  children:
  - type: text
    text: Le colosse aux pieds d’argile
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Après cela, Daniel alla trouver Aryok, que le roi avait chargé de faire périr les sages de Babylone et il lui dit : Ne fais pas mourir les sages de Babylone. Introduis-moi en présence du roi et je lui révélerai l’interprétation de son rêve.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Alors Aryok s’empressa d’introduire Daniel auprès du roi et dit à celui-ci : J’ai trouvé parmi les déportés de Juda un homme qui donnera à Sa Majesté l’interprétation de son rêve.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Le roi s’adressa à Daniel, surnommé Beltshatsar, et lui demanda : Es-tu vraiment capable de me révéler le rêve que j’ai eu et de m’en donner l’interprétation ?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'Daniel s’adressa au roi et lui dit : Le secret que Sa Majesté demande, aucun sage, aucun magicien, aucun mage, aucun astrologue n’est capable de le lui faire connaître. '
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'Mais il y a, dans le ciel, un Dieu qui révèle les secrets ; et il a fait savoir au roi Nabuchodonosor ce qui doit arriver dans les temps à venir. Eh bien, voici ce que tu as rêvé et quelles sont les visions que tu as eues sur ton lit : '
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'pendant que tu étais couché, ô roi, tu t’es mis à penser à l’avenir. Alors celui qui révèle les secrets t’a fait connaître ce qui doit arriver. '
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: Quant à moi, ce n’est pas parce que je posséderais une sagesse supérieure à celle de tous les autres hommes que ce secret m’a été révélé, mais c’est afin que l’interprétation en soit donnée au roi et que tu comprennes ce qui préoccupe ton cœur.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'Voici donc, ô roi, la vision que tu as eue : tu as vu une grande statue. Cette statue était immense, et d’une beauté éblouissante. Elle était dressée devant toi et son aspect était terrifiant. '
  - type: usfm
    marker: v
    metadata:
      v: '32'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'La tête de cette statue était en or pur, la poitrine et les bras en argent, le ventre et les hanches en bronze, '
  - type: usfm
    marker: v
    metadata:
      v: '33'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: 'les jambes en fer, les pieds partiellement en fer et partiellement en argile. '
  - type: usfm
    marker: v
    metadata:
      v: '34'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: Pendant que tu étais plongé dans ta contemplation, une pierre se détacha
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '2.34 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'se détacha. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'L’ancienne version grecque ajoute : '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'de la montagne '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: (voir v. 45).
    marker-yv: yv-n
  - type: text
    text: ' sans l’intervention d’aucune main, vint heurter la statue au niveau de ses pieds de fer et d’argile, et les pulvérisa. '
  - type: usfm
    marker: v
    metadata:
      v: '35'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: Du même coup furent réduits ensemble en poussière le fer, l’argile, le bronze, l’argent et l’or, et ils devinrent comme la bale de blé qui s’envole de l’aire en été ; le vent les emporta sans en laisser la moindre trace. Quant à la pierre qui avait heurté la statue, elle devint une immense montagne et remplit toute la terre.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '36'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: 'Voilà ton rêve. Quant à ce qu’il signifie, nous allons l’exposer au roi. '
  - type: usfm
    marker: v
    metadata:
      v: '37'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: 'Toi, ô roi, tu es le roi des rois, à qui le Dieu des cieux a donné la royauté, la puissance, la force et la gloire. '
  - type: usfm
    marker: v
    metadata:
      v: '38'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: text
    text: 'Dieu a placé sous ton autorité les hommes, les bêtes sauvages et les oiseaux en quelque lieu qu’ils habitent. Il t’a donné la domination sur eux tous. C’est toi qui es la tête d’or. '
  - type: usfm
    marker: v
    metadata:
      v: '39'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '39'
  - type: text
    text: Après toi surgira un autre empire, moins puissant que le tien, puis un troisième représenté par le bronze, qui dominera toute la terre
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '2.39 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Après Babylone (v. 38) viennent l’Empire des Mèdes et des Perses établi par Cyrus (539 av. J.-C.), puis celui des Grecs fondé par Alexandre le Grand (330 av. J.-C.). Le quatrième royaume (v. 40ss) est l’empire romain. Les visions du chapitre 7 reprennent cette prophétie plus en détail.
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '40'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '40'
  - type: text
    text: 'Un quatrième royaume lui succédera, il sera dur comme le fer ; comme le fer pulvérise et écrase tout et le met en pièces, ainsi il pulvérisera et mettra en pièces tous les autres royaumes. '
  - type: usfm
    marker: v
    metadata:
      v: '41'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '41'
  - type: text
    text: 'Et si tu as vu les pieds et les orteils partiellement en argile et partiellement en fer, cela signifie que ce sera un royaume divisé ; il y aura en lui quelque chose de la dureté du fer, selon que tu as vu le fer mêlé à la terre cuite. '
  - type: usfm
    marker: v
    metadata:
      v: '42'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '42'
  - type: text
    text: 'Mais comme les orteils des pieds étaient en partie de fer et en partie d’argile, ce royaume sera en partie fort et en partie fragile. '
  - type: usfm
    marker: v
    metadata:
      v: '43'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '43'
  - type: text
    text: Que tu aies vu le fer mêlé de terre cuite, cela signifie que les hommes chercheront à s’unir par des alliances, mais ils ne tiendront pas ensemble, pas plus que le fer ne tient à l’argile.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '44'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '44'
  - type: text
    text: 'A l’époque de ces rois-là, le Dieu des cieux suscitera un royaume qui ne sera jamais détruit et dont la souveraineté ne passera pas à un autre peuple ; il pulvérisera tous ces royaumes-là et mettra un terme à leur existence, mais lui-même subsistera éternellement. '
  - type: usfm
    marker: v
    metadata:
      v: '45'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '45'
  - type: text
    text: C’est ce que représente la pierre que tu as vue se détacher de la montagne sans l’intervention d’aucune main humaine pour venir pulvériser le fer, le bronze, l’argile, l’argent et l’or. Le grand Dieu a révélé au roi ce qui arrivera dans l’avenir. Ce qu’annonce le rêve est chose certaine, et son interprétation est digne de foi.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '46'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '46'
  - type: text
    text: 'Alors le roi Nabuchodonosor se jeta la face contre terre et se prosterna devant Daniel, il ordonna de lui offrir des offrandes et des parfums. '
  - type: usfm
    marker: v
    metadata:
      v: '47'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '47'
  - type: text
    text: 'Puis il lui déclara : Il est bien vrai que votre Dieu est le Dieu des dieux, le souverain des rois et celui qui révèle les secrets, puisque tu as pu me dévoiler ce secret.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '48'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '48'
  - type: text
    text: 'Le roi éleva Daniel à une haute position et lui donna de nombreux et riches présents ; il le nomma gouverneur de toute la province de Babylone et l’institua chef suprême de tous les sages de Babylone. '
  - type: usfm
    marker: v
    metadata:
      v: '49'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '49'
  - type: text
    text: A la demande de Daniel, le roi confia l’administration de la province de Babylone à Shadrak, Méshak et Abed-Nego, et Daniel lui-même demeura à la cour du roi.
