document_id: PSA.38,21
type_code: fra
verses:
  '1':
  - type: heading
    content: Accablé par la maladie et le péché
  - type: text
    content: Un psaume de David, pour se rappeler au souvenir de Dieu.
  '10':
  - type: text
    content: Eternel, tous mes désirs ╵je te les ai présentés,
  - type: text
    content: et tous mes soupirs ╵sont connus de toi.
  '11':
  - type: text
    content: Mon cœur bat violemment ╵et mes forces m’abandonnent,
  - type: text
    content: mes yeux ont perdu ╵toute leur lumière.
  '12':
  - type: text
    content: Ma plaie écarte de moi ╵mes amis, mes compagnons,
  - type: text
    content: ceux qui me sont les plus proches ╵restent loin de moi.
  '13':
  - type: text
    content: Ceux qui veulent me tuer ╵m’ont tendu des pièges,
  - type: text
    content: ceux qui cherchent mon malheur ╵parlent pour me nuire,
  - type: text
    content: ils murmurent des mensonges ╵à longueur de jour.
  '14':
  - type: text
    content: Pourtant, moi je fais le sourd ╵pour ne pas entendre,
  - type: text
    content: je reste la bouche close ╵comme si j’étais muet.
  '15':
  - type: text
    content: Je suis comme un homme ╵qui ne peut entendre
  - type: text
    content: et ne répond pas.
  '16':
  - type: text
    content: Car c’est sur toi, Eternel, ╵que je compte.
  - type: text
    content: Tu me répondras, ╵ô Seigneur, mon Dieu.
  '17':
  - type: text
    content: 'J’avais demandé : ╵« Qu’ils ne puissent pas ╵rire de mon sort,'
  - type: text
    content: s’exalter à mes dépens ╵lorsque je chancelle. »
  '18':
  - type: text
    content: Me voici près de tomber,
  - type: text
    content: ma douleur est toujours là.
  '19':
  - type: text
    content: Oui, je reconnais ma faute,
  - type: text
    content: mon péché m’angoisse,
  '2':
  - type: text
    content: Eternel, dans ta colère, ╵ne me punis pas,
  - type: text
    content: et, dans ton indignation, ╵ne me châtie pas !
  '20':
  - type: text
    content: alors que mes ennemis ╵sont pleins de vie, pleins de force,
  - type: text
    content: et qu’ils sont nombreux ╵à me haïr sans raison.
  '21':
  - type: text
    content: Ceux qui me rendent le mal ╵pour le bien que j’accomplis
  - type: text
    content: me font le reproche ╵de vouloir chercher le bien.
  '22':
  - type: text
    content: Eternel, ╵ne me laisse pas,
  - type: text
    content: ô mon Dieu, ╵ne te tiens pas loin de moi !
  '23':
  - type: text
    content: Viens en hâte à mon secours,
  - type: text
    content: toi mon Seigneur, mon Sauveur !
  '3':
  - type: text
    content: 'Vois : tes flèches m’ont atteint,'
  - type: text
    content: 'ta main m’a frappé :'
  '4':
  - type: text
    content: en mon corps, ╵plus rien n’est intact ╵sous l’effet de ta colère,
  - type: text
    content: dans mes membres, rien n’est sain, ╵mon péché en est la cause.
  '5':
  - type: text
    content: Je suis submergé ╵par mes fautes,
  - type: text
    content: elles sont un poids ╵bien trop lourd pour moi.
  '6':
  - type: text
    content: 'Mes plaies infectées suppurent :'
  - type: text
    content: ma folie en est la cause.
  '7':
  - type: text
    content: Triste, accablé, abattu,
  - type: text
    content: je me traîne tout le jour,
  '8':
  - type: text
    content: je sens un feu dans mes reins,
  - type: text
    content: plus rien n’est intact en moi.
  '9':
  - type: text
    content: Je suis à bout, écrasé,
  - type: text
    content: j’ai le cœur en désarroi, ╵je ne cesse de gémir.
