document_id: PSA.38
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Accablé par la maladie et le péché
  marker-yv: yv-h
- type: usfm
  marker: d
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Un psaume de David, pour se rappeler au souvenir de Dieu.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Eternel, dans ta colère, ╵ne me punis pas,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et, dans ton indignation, ╵ne me châtie pas !
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Vois : tes flèches m’ont atteint,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'ta main m’a frappé :'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: en mon corps, ╵plus rien n’est intact ╵sous l’effet de ta colère,
- type: usfm
  marker: q1
  children:
  - type: text
    text: dans mes membres, rien n’est sain, ╵mon péché en est la cause.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Je suis submergé ╵par mes fautes,
- type: usfm
  marker: q1
  children:
  - type: text
    text: elles sont un poids ╵bien trop lourd pour moi.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Mes plaies infectées suppurent :'
- type: usfm
  marker: q1
  children:
  - type: text
    text: ma folie en est la cause.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Triste, accablé, abattu,
- type: usfm
  marker: q1
  children:
  - type: text
    text: je me traîne tout le jour,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: je sens un feu dans mes reins,
- type: usfm
  marker: q1
  children:
  - type: text
    text: plus rien n’est intact en moi.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Je suis à bout, écrasé,
- type: usfm
  marker: q1
  children:
  - type: text
    text: j’ai le cœur en désarroi, ╵je ne cesse de gémir.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Eternel, tous mes désirs ╵je te les ai présentés,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et tous mes soupirs ╵sont connus de toi.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Mon cœur bat violemment ╵et mes forces m’abandonnent,
- type: usfm
  marker: q1
  children:
  - type: text
    text: mes yeux ont perdu ╵toute leur lumière.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Ma plaie écarte de moi ╵mes amis, mes compagnons,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ceux qui me sont les plus proches ╵restent loin de moi.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Ceux qui veulent me tuer ╵m’ont tendu des pièges,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ceux qui cherchent mon malheur ╵parlent pour me nuire,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ils murmurent des mensonges ╵à longueur de jour.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Pourtant, moi je fais le sourd ╵pour ne pas entendre,
- type: usfm
  marker: q1
  children:
  - type: text
    text: je reste la bouche close ╵comme si j’étais muet.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Je suis comme un homme ╵qui ne peut entendre
- type: usfm
  marker: q1
  children:
  - type: text
    text: et ne répond pas.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Car c’est sur toi, Eternel, ╵que je compte.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Tu me répondras, ╵ô Seigneur, mon Dieu.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'J’avais demandé : ╵« Qu’ils ne puissent pas ╵rire de mon sort,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: s’exalter à mes dépens ╵lorsque je chancelle. »
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Me voici près de tomber,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ma douleur est toujours là.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Oui, je reconnais ma faute,
- type: usfm
  marker: q1
  children:
  - type: text
    text: mon péché m’angoisse,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: alors que mes ennemis ╵sont pleins de vie, pleins de force,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et qu’ils sont nombreux ╵à me haïr sans raison.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Ceux qui me rendent le mal ╵pour le bien que j’accomplis
- type: usfm
  marker: q1
  children:
  - type: text
    text: me font le reproche ╵de vouloir chercher le bien.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: Eternel, ╵ne me laisse pas,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ô mon Dieu, ╵ne te tiens pas loin de moi !
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: Viens en hâte à mon secours,
- type: usfm
  marker: q1
  children:
  - type: text
    text: toi mon Seigneur, mon Sauveur !
