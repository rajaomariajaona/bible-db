document_id: 2CH.7
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: La gloire de l’Eternel remplit le Temple
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: (1 R 8.62-66)
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Lorsque Salomon eut terminé sa prière, le feu tomba du ciel et consuma l’holocauste ainsi que les sacrifices, et la gloire de l’Eternel remplit le Temple
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '7.1 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Voir '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Lv 9.23-24
        metadata:
          usfm: LEV.9.23+LEV.9.24
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Les prêtres ne pouvaient pénétrer dans le temple de l’Eternel, car la gloire de l’Eternel avait rempli l’édifice. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Tous les Israélites virent descendre le feu et la gloire de l’Eternel sur le Temple ; ils s’inclinèrent le visage contre terre sur le dallage du parvis, se prosternèrent et se mirent à louer l’Eternel en disant : « Oui il est bon, oui son amour est éternel ! »'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Le roi et tout le peuple offrirent des sacrifices devant l’Eternel. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Le roi Salomon offrit en sacrifice 22 000 bœufs et 120 000 moutons. C’est de cette manière que le roi et tout le peuple inaugurèrent le temple de Dieu. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Les prêtres se tenaient à leur poste, les lévites prirent position avec les instruments de musique de l’Eternel que le roi David avait conçus pour louer l’Eternel en chantant : « Oui, son amour dure à toujours » ; c’est David qui les avait chargés de jouer de ces instruments pour louer l’Eternel. Quant aux prêtres, ils faisaient retentir les trompettes vis-à-vis d’eux et tout Israël se tenait debout.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Salomon consacra l’intérieur de la cour qui s’étend devant le temple de l’Eternel pour y offrir les holocaustes et les graisses des sacrifices de communion, car l’autel de bronze que Salomon avait fait fabriquer ne pouvait recevoir tous les holocaustes, les offrandes et les graisses. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Salomon et tout Israël célébrèrent la fête
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '7.8 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Il s’agit de la fête des Cabanes (voir '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '5.3'
        metadata:
          usfm: 2CH.5.3
      - type: text
        text: ).
    marker-yv: yv-n
  - type: text
    text: ' pendant sept jours. Un très grand nombre de gens étaient venus depuis la région de Hamath jusqu’au torrent d’Egypte'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '7.8 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'C’est-à-dire de l’extrême nord à l’extrême sud du pays. Le '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'torrent d’Egypte '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: est sans doute le Wadi el-Arish qui a son embouchure à quelque 80 kilomètres au sud de Gaza.
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Le huitième jour eut lieu une réunion cultuelle. Ainsi, on avait fait la dédicace de l’autel pendant sept jours, et l’on avait célébré la fête durant sept autres jours
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '7.9 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: La fête de la Dédicace avait duré du 8
      - type: usfm
        marker: ord
        children:
        - type: text
          text: e
      - type: text
        text: ' au 14'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: e
      - type: text
        text: ' jour du mois, la fête des Cabanes du 15'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: e
      - type: text
        text: ' au 22'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: e
      - type: text
        text: ' jour.'
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Le vingt-troisième jour du septième mois, Salomon renvoya le peuple chacun chez soi. Tous étaient joyeux et avaient le cœur content à cause des bienfaits que l’Eternel avait accordés à David, à Salomon et à Israël, son peuple.
- type: usfm
  marker: s1
  children:
  - type: text
    text: La réponse de l’Eternel à Salomon
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: (1 R 9.1-9)
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Salomon acheva ainsi le temple de l’Eternel et le palais royal. Il réussit à réaliser tout ce qu’il s’était proposé de faire pour ces deux édifices. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Alors l’Eternel apparut à Salomon pendant la nuit et lui dit : J’ai exaucé ta prière et je choisis cet endroit comme lieu de sacrifices pour moi. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Lorsque je fermerai le ciel et qu’il n’y aura pas de pluie, lorsque j’ordonnerai aux sauterelles de ravager le pays ou que j’enverrai la peste contre mon peuple, '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'si alors mon peuple qui est appelé de mon nom s’humilie, prie et recherche ma grâce, s’il se détourne de sa mauvaise conduite, moi, je l’écouterai du ciel, je lui pardonnerai ses péchés et je guérirai son pays. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Désormais, j’écouterai attentivement et je considérerai favorablement la prière faite en ce lieu. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'A présent, je choisis cet édifice et j’en fais un lieu saint pour y être à jamais présent. Je veillerai toujours sur lui et j’y aurai mon cœur. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Quant à toi, si tu te conduis devant moi comme ton père David, si tu fais tout ce que je t’ai ordonné et si tu obéis aux ordonnances et aux lois que je t’ai données, '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'je rendrai stable pour toujours ton trône royal selon l’alliance que j’ai conclue avec ton père David lorsque je lui ai dit : « Il y aura toujours l’un de tes descendants qui gouvernera Israël'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '7.18 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Voir '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1 R 2.4
        metadata:
          usfm: 1KI.2.4
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: '. » '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Mais si vous vous détournez, si vous négligez mes ordonnances et mes lois que j’ai établies pour vous, et si vous allez rendre un culte à d’autres dieux et vous prosterner devant eux, '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'alors je vous arracherai de mon pays que je vous ai donné, je rejetterai loin de ma vue ce temple que j’ai consacré pour y être présent, et je ferai en sorte que tous les peuples s’en moquent et ricanent à son sujet. '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Et ce temple qui aura été si glorieux, tous ceux qui passeront à proximité seront consternés et s’exclameront : « Pourquoi l’Eternel a-t-il traité ainsi ce pays et ce temple'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '7.21 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Voir '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 2 Ch 36.19
        metadata:
          usfm: 2CH.36.19
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: '  ? » '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Et l’on répondra : « C’est parce qu’ils ont abandonné l’Eternel, le Dieu de leurs ancêtres, qui les avait fait sortir d’Egypte, parce qu’ils se sont attachés à d’autres dieux, qu’ils se sont prosternés devant eux et les ont adorés. Voilà pourquoi il leur a infligé tout ce malheur. »'
