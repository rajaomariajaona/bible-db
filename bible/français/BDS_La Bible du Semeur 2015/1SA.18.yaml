document_id: 1SA.18,21
type_code: fra
verses:
  '1':
  - type: heading
    content: Le pacte d’amitié entre Jonathan et David
  - type: text
    content: 'Quand David eut terminé de parler avec Saül, Jonathan s’était profondément attaché à David et s’était mis à l’aimer comme lui-même. '
  '10':
  - type: text
    content: 'Dès le lendemain, un mauvais esprit envoyé par Dieu s’empara de Saül, de sorte qu’il entra dans un état d’exaltation au milieu de sa maison. Comme les autres jours, David jouait de son instrument. Saül avait sa lance en main. '
  '11':
  - type: text
    content: 'Soudain, il la lança en se disant : Je vais le clouer contre la paroi.'
  - type: text
    content: Mais, par deux fois, David esquiva le coup.
  '12':
  - type: text
    content: 'A partir de ce jour-là, Saül craignit David, car l’Eternel était avec David alors qu’il s’était retiré de lui. '
  '13':
  - type: text
    content: 'C’est pourquoi Saül l’écarta d’auprès de lui et le nomma commandant d’un « millier » d’hommes. Ainsi David entreprenait des expéditions militaires à la tête de ses hommes. '
  '14':
  - type: text
    content: 'Il réussissait dans tout ce qu’il entreprenait, car l’Eternel était avec lui. '
  '15':
  - type: text
    content: 'Lorsque Saül constata ses grands succès, sa peur ne fit qu’augmenter. '
  '16':
  - type: text
    content: Par contre, tout Israël et tout Juda aimaient David, car il marchait à la tête de leurs soldats dans les expéditions militaires.
  - type: heading
    content: David devient le gendre du roi
  '17':
  - type: text
    content: 'Un jour, Saül dit à David : Je suis prêt à te donner ma fille aînée Mérab en mariage à condition que tu me serves vaillamment et que tu livres les combats de l’Eternel.'
  - type: text
    content: 'Il se disait : Il vaut mieux que ce ne soit pas moi-même qui attente à sa vie, mais plutôt les Philistins !'
  '18':
  - type: text
    content: 'David lui répondit : Qui suis-je et que vaut ma vie, de quelle importance est la famille de mon père en Israël, pour que je devienne le gendre du roi ?'
  '19':
  - type: text
    content: Mais, quand vint le moment où Mérab, la fille de Saül, devait être donnée à David, Saül la donna à Adriel de Mehola.
  '2':
  - type: text
    content: 'Saül ne le laissa pas retourner dans la maison de son père ce jour-là, il le prit chez lui. '
  '20':
  - type: text
    content: 'Or Mikal, l’autre fille de Saül, aimait David. Quand Saül l’apprit, il en fut ravi, '
  '21':
  - type: text
    content: 'car il se dit : Je vais la lui donner en mariage, elle sera un bon piège pour lui, ainsi il tombera par la main des Philistins !'
  - type: text
    content: 'Il dit donc à David : Aujourd’hui, tu as une seconde occasion de devenir mon gendre.'
  '22':
  - type: text
    content: 'Puis il ordonna à ses hommes de confiance de parler discrètement à David et de lui dire : Tu vois que le roi t’a pris en affection et tous ses gens t’aiment, accepte donc maintenant de devenir son gendre !'
  '23':
  - type: text
    content: 'Les ministres de Saül allèrent répéter ces paroles à David ; mais celui-ci leur répondit : Croyez-vous que ce soit une petite affaire que de devenir le gendre du roi ? Je ne suis qu’un homme pauvre et insignifiant.'
  '24':
  - type: text
    content: Les ministres du roi lui rapportèrent la réponse de David.
  '25':
  - type: text
    content: '– Eh bien, reprit Saül, voilà ce que vous lui direz : « Le roi ne demande pas de dot d’argent pour sa fille. Tout ce qu’il désire, c’est que tu lui apportes cent prépuces de Philistins pour le venger de ses ennemis. »'
  - type: text
    content: En fait, Saül avait comme but de faire périr David par la main des Philistins.
  '26':
  - type: text
    content: 'Les hauts fonctionnaires de Saül rapportèrent ces paroles à David. La proposition de devenir le gendre du roi à ces conditions lui parut acceptable. Avant même l’expiration du délai fixé par le roi, '
  '27':
  - type: text
    content: David se mit en campagne avec ses hommes, il tua deux cents Philistins et rapporta la totalité de leurs prépuces au roi pour devenir son gendre. Saül donna donc en mariage à David sa fille Mikal.
  '28':
  - type: text
    content: 'Saül vit ainsi très clairement que l’Eternel était avec David et que Mikal sa propre fille aimait David. '
  '29':
  - type: text
    content: 'Sa crainte à l’égard de David redoubla et, dès lors, sa haine envers lui devint définitive. '
  '3':
  - type: text
    content: 'Jonathan conclut un pacte d’amitié avec David parce qu’il l’aimait comme lui-même. '
  '30':
  - type: text
    content: Mais à chaque incursion des princes des Philistins, David remportait plus de succès que tous les autres chefs militaires de Saül, de sorte que son nom devint très célèbre.
  '4':
  - type: text
    content: 'Il enleva son manteau et le donna à David, il lui offrit aussi son équipement et jusqu’à son épée, son arc et son ceinturon. '
  '5':
  - type: text
    content: Chaque fois que Saül l’envoyait en expédition militaire, David accomplissait sa mission avec succès, de sorte que le roi lui confia le commandement de ses troupes de choc. Il était estimé de tout le peuple ainsi que des ministres de Saül.
  - type: heading
    content: Saül devient jaloux de David
  '6':
  - type: text
    content: 'Lorsqu’ils étaient revenus de la guerre, après que David eut tué le Philistin, les femmes étaient sorties de toutes les villes d’Israël à la rencontre du roi Saül en chantant, en dansant et en poussant des cris de joie au son de tambourins et de cymbales. '
  '7':
  - type: text
    content: 'Elles chantaient en chœurs alternés, tout en dansant :'
  - type: text
    content: Saül a vaincu ses milliers
  - type: text
    content: et David ses dizaines de milliers.
  '8':
  - type: text
    content: Saül le prit très mal et se mit dans une grande colère.
  - type: text
    content: – Elles en attribuent dix mille à David, dit-il, et à moi seulement mille ! Il ne lui manque plus que la royauté !
  '9':
  - type: text
    content: A partir de ce moment-là, Saül regarda David d’un mauvais œil.
