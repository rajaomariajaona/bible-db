document_id: 1SA.18
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Le pacte d’amitié entre Jonathan et David
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Quand David eut terminé de parler avec Saül, Jonathan s’était profondément attaché à David et s’était mis à l’aimer comme lui-même. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Saül ne le laissa pas retourner dans la maison de son père ce jour-là, il le prit chez lui. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Jonathan conclut un pacte d’amitié avec David parce qu’il l’aimait comme lui-même. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Il enleva son manteau et le donna à David, il lui offrit aussi son équipement et jusqu’à son épée, son arc et son ceinturon. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Chaque fois que Saül l’envoyait en expédition militaire, David accomplissait sa mission avec succès, de sorte que le roi lui confia le commandement de ses troupes de choc. Il était estimé de tout le peuple ainsi que des ministres de Saül.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Saül devient jaloux de David
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Lorsqu’ils étaient revenus de la guerre, après que David eut tué le Philistin, les femmes étaient sorties de toutes les villes d’Israël à la rencontre du roi Saül en chantant, en dansant et en poussant des cris de joie au son de tambourins et de cymbales. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Elles chantaient en chœurs alternés, tout en dansant :'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Saül a vaincu ses milliers
- type: usfm
  marker: q1
  children:
  - type: text
    text: et David ses dizaines de milliers.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Saül le prit très mal et se mit dans une grande colère.
- type: usfm
  marker: p
  children:
  - type: text
    text: – Elles en attribuent dix mille à David, dit-il, et à moi seulement mille ! Il ne lui manque plus que la royauté !
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: A partir de ce moment-là, Saül regarda David d’un mauvais œil.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Dès le lendemain, un mauvais esprit envoyé par Dieu s’empara de Saül, de sorte qu’il entra dans un état d’exaltation au milieu de sa maison. Comme les autres jours, David jouait de son instrument. Saül avait sa lance en main. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Soudain, il la lança en se disant : Je vais le clouer contre la paroi.'
- type: usfm
  marker: p
  children:
  - type: text
    text: Mais, par deux fois, David esquiva le coup.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'A partir de ce jour-là, Saül craignit David, car l’Eternel était avec David alors qu’il s’était retiré de lui. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'C’est pourquoi Saül l’écarta d’auprès de lui et le nomma commandant d’un « millier » d’hommes. Ainsi David entreprenait des expéditions militaires à la tête de ses hommes. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Il réussissait dans tout ce qu’il entreprenait, car l’Eternel était avec lui. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Lorsque Saül constata ses grands succès, sa peur ne fit qu’augmenter. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Par contre, tout Israël et tout Juda aimaient David, car il marchait à la tête de leurs soldats dans les expéditions militaires.
- type: usfm
  marker: s1
  children:
  - type: text
    text: David devient le gendre du roi
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Un jour, Saül dit à David : Je suis prêt à te donner ma fille aînée Mérab en mariage à condition que tu me serves vaillamment et que tu livres les combats de l’Eternel.'
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Il se disait : Il vaut mieux que ce ne soit pas moi-même qui attente à sa vie, mais plutôt les Philistins !'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'David lui répondit : Qui suis-je et que vaut ma vie, de quelle importance est la famille de mon père en Israël, pour que je devienne le gendre du roi ?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Mais, quand vint le moment où Mérab, la fille de Saül, devait être donnée à David, Saül la donna à Adriel de Mehola.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Or Mikal, l’autre fille de Saül, aimait David. Quand Saül l’apprit, il en fut ravi, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'car il se dit : Je vais la lui donner en mariage, elle sera un bon piège pour lui, ainsi il tombera par la main des Philistins !'
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Il dit donc à David : Aujourd’hui, tu as une seconde occasion de devenir mon gendre.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Puis il ordonna à ses hommes de confiance de parler discrètement à David et de lui dire : Tu vois que le roi t’a pris en affection et tous ses gens t’aiment, accepte donc maintenant de devenir son gendre !'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Les ministres de Saül allèrent répéter ces paroles à David ; mais celui-ci leur répondit : Croyez-vous que ce soit une petite affaire que de devenir le gendre du roi ? Je ne suis qu’un homme pauvre et insignifiant.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: Les ministres du roi lui rapportèrent la réponse de David.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: '– Eh bien, reprit Saül, voilà ce que vous lui direz : « Le roi ne demande pas de dot d’argent pour sa fille. Tout ce qu’il désire, c’est que tu lui apportes cent prépuces de Philistins pour le venger de ses ennemis. »'
- type: usfm
  marker: p
  children:
  - type: text
    text: En fait, Saül avait comme but de faire périr David par la main des Philistins.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Les hauts fonctionnaires de Saül rapportèrent ces paroles à David. La proposition de devenir le gendre du roi à ces conditions lui parut acceptable. Avant même l’expiration du délai fixé par le roi, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: David se mit en campagne avec ses hommes, il tua deux cents Philistins et rapporta la totalité de leurs prépuces au roi pour devenir son gendre. Saül donna donc en mariage à David sa fille Mikal.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'Saül vit ainsi très clairement que l’Eternel était avec David et que Mikal sa propre fille aimait David. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'Sa crainte à l’égard de David redoubla et, dès lors, sa haine envers lui devint définitive. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: Mais à chaque incursion des princes des Philistins, David remportait plus de succès que tous les autres chefs militaires de Saül, de sorte que son nom devint très célèbre.
