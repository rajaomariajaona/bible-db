document_id: HEB.4,21
type_code: fra
verses:
  '1':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: Ainsi donc, pendant que la promesse d’entrer dans le repos prévu par Dieu est toujours en vigueur, craignons que l’un d’entre vous se trouve coupable
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '4.1 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Autres traductions : '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'estime être resté, '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'ou : '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: décide de rester.
      marker-yv: yv-n
    - type: text
      text: ' d’être resté en arrière'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '4.1 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Autre traduction : '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: d’être arrivé trop tard.
      marker-yv: yv-n
    - type: text
      text: '. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: Car celui qui est entré dans le repos prévu par Dieu se repose de ses œuvres, comme Dieu s’est reposé des siennes.
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'Empressons-nous donc d’entrer dans ce repos afin que personne ne tombe dans la désobéissance à l’exemple des Israélites. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: Car la Parole de Dieu est vivante et efficace. Elle est plus tranchante que toute épée à double tranchant et, pénétrant jusqu’à la division de l’âme ainsi que de l’esprit, et des jointures ainsi que de la moelle
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '4.12 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'D’autres comprennent : '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: elle pénètre jusqu’au point de division de l’âme et l’esprit, des jointures et de la moelle.
      marker-yv: yv-n
    - type: text
      text: ', elle juge les dispositions et les pensées du cœur. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: Nulle créature n’échappe au regard de Dieu, tout est à nu et à découvert aux yeux de celui à qui nous devons rendre compte.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Un grand-prêtre qui nous permet de nous approcher de Dieu
    marker-yv: yv-h
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'Ainsi, puisque nous avons en Jésus, le Fils de Dieu, un grand-prêtre éminent qui a traversé les cieux, demeurons fermement attachés à la foi que nous reconnaissons comme vraie. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: En effet, nous n’avons pas un grand-prêtre qui serait incapable de compatir à nos faiblesses. Au contraire, il a été tenté en tout point comme nous le sommes, mais sans commettre de péché.
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: Approchons-nous donc du trône du Dieu de grâce avec une pleine assurance. Là, Dieu nous accordera sa bonté et nous donnera sa grâce pour que nous soyons secourus au bon moment.
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: Car nous aussi, nous avons entendu une Bonne Nouvelle, l’Evangile, tout comme eux. Mais le message qu’ils ont entendu ne leur a servi à rien, car ils ne se sont pas associés par leur foi à ceux qui l’ont reçu
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '4.2 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Certains manuscrits portent : '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: car ce message n’a pas rencontré la foi chez ceux qui l’ont entendu.
      marker-yv: yv-n
    - type: text
      text: '. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'En effet, c’est nous qui avons cru, qui entrons dans ce repos, conformément à la parole de Dieu, quand il a dit :'
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: qt
      children:
      - type: text
        text: C’est pourquoi, dans ma colère,
    - type: text
      text: ' ╵'
    - type: usfm
      marker: qt
      children:
      - type: text
        text: 'j’ai fait ce serment :'
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: qt
      children:
      - type: text
        text: ils n’entreront pas dans le lieu de repos
    - type: text
      text: ' ╵'
    - type: usfm
      marker: qt
      children:
      - type: text
        text: que j’avais prévu pour eux !
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'C’est ainsi que Dieu a parlé alors que ses œuvres étaient achevées depuis la création du monde. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'En effet, il est dit quelque part à propos du septième jour : '
    - type: usfm
      marker: qt
      children:
      - type: text
        text: Et Dieu se reposa le septième jour de toutes ses œuvres
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '4.4 '
      - type: usfm
        marker: ft
        children:
        - type: usfm
          marker: ref
          children:
          - type: text
            text: Gn 2.2
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: .
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'Et, dans notre texte, il dit : '
    - type: usfm
      marker: qt
      children:
      - type: text
        text: Ils n’entreront pas dans le lieu de repos que j’avais prévu pour eux
    - type: text
      text: '  !'
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'Il demeure donc établi que certains doivent entrer dans le repos. Or, ceux qui ont les premiers entendu cette Bonne Nouvelle n’y sont pas entrés parce qu’ils ont désobéi à Dieu, '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'c’est pourquoi Dieu fixe de nouveau un jour, qu’il appelle aujourd’hui, lorsqu’il dit beaucoup plus tard, dans les psaumes de David, ces paroles déjà citées :'
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: qt
      children:
      - type: text
        text: Aujourd’hui,
    - type: text
      text: ' ╵'
    - type: usfm
      marker: qt
      children:
      - type: text
        text: si vous entendez la voix de Dieu,
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: qt
      children:
      - type: text
        text: ne vous endurcissez pas.
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'En effet, si Josué avait assuré le repos aux Israélites, Dieu ne parlerait pas, après cela, d’un autre '
    - type: usfm
      marker: qt
      children:
      - type: text
        text: jour
    - type: text
      text: '. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: C’est donc qu’un repos de sabbat
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '4.9 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Autre traduction : '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: une célébration de sabbat.
      marker-yv: yv-n
    - type: text
      text: ' subsiste pour le peuple de Dieu. '
