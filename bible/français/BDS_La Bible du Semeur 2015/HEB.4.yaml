document_id: HEB.4,21
type_code: fra
verses:
  '1':
  - type: text
    content: Ainsi donc, pendant que la promesse d’entrer dans le repos prévu par Dieu est toujours en vigueur, craignons que l’un d’entre vous se trouve coupable
  - type: note
    content: 'Autres traductions : estime être resté, ou : décide de rester.'
  - type: text
    content: ' d’être resté en arrière'
  - type: note
    content: 'Autre traduction : d’être arrivé trop tard.'
  - type: text
    content: '. '
  '10':
  - type: text
    content: Car celui qui est entré dans le repos prévu par Dieu se repose de ses œuvres, comme Dieu s’est reposé des siennes.
  '11':
  - type: text
    content: 'Empressons-nous donc d’entrer dans ce repos afin que personne ne tombe dans la désobéissance à l’exemple des Israélites. '
  '12':
  - type: text
    content: Car la Parole de Dieu est vivante et efficace. Elle est plus tranchante que toute épée à double tranchant et, pénétrant jusqu’à la division de l’âme ainsi que de l’esprit, et des jointures ainsi que de la moelle
  - type: note
    content: 'D’autres comprennent : elle pénètre jusqu’au point de division de l’âme et l’esprit, des jointures et de la moelle.'
  - type: text
    content: ', elle juge les dispositions et les pensées du cœur. '
  '13':
  - type: text
    content: Nulle créature n’échappe au regard de Dieu, tout est à nu et à découvert aux yeux de celui à qui nous devons rendre compte.
  - type: heading
    content: Un grand-prêtre qui nous permet de nous approcher de Dieu
  '14':
  - type: text
    content: 'Ainsi, puisque nous avons en Jésus, le Fils de Dieu, un grand-prêtre éminent qui a traversé les cieux, demeurons fermement attachés à la foi que nous reconnaissons comme vraie. '
  '15':
  - type: text
    content: En effet, nous n’avons pas un grand-prêtre qui serait incapable de compatir à nos faiblesses. Au contraire, il a été tenté en tout point comme nous le sommes, mais sans commettre de péché.
  '16':
  - type: text
    content: Approchons-nous donc du trône du Dieu de grâce avec une pleine assurance. Là, Dieu nous accordera sa bonté et nous donnera sa grâce pour que nous soyons secourus au bon moment.
  '2':
  - type: text
    content: Car nous aussi, nous avons entendu une Bonne Nouvelle, l’Evangile, tout comme eux. Mais le message qu’ils ont entendu ne leur a servi à rien, car ils ne se sont pas associés par leur foi à ceux qui l’ont reçu
  - type: note
    content: 'Certains manuscrits portent : car ce message n’a pas rencontré la foi chez ceux qui l’ont entendu.'
  - type: text
    content: '. '
  '3':
  - type: text
    content: 'En effet, c’est nous qui avons cru, qui entrons dans ce repos, conformément à la parole de Dieu, quand il a dit :'
  - type: text
    content: C’est pourquoi, dans ma colère,
  - type: text
    content: ' ╵'
  - type: text
    content: 'j’ai fait ce serment :'
  - type: text
    content: ils n’entreront pas dans le lieu de repos
  - type: text
    content: ' ╵'
  - type: text
    content: que j’avais prévu pour eux !
  - type: text
    content: 'C’est ainsi que Dieu a parlé alors que ses œuvres étaient achevées depuis la création du monde. '
  '4':
  - type: text
    content: 'En effet, il est dit quelque part à propos du septième jour : '
  - type: text
    content: Et Dieu se reposa le septième jour de toutes ses œuvres
  - type: note
    content: Gn 2.2.
  - type: text
    content: .
  '5':
  - type: text
    content: 'Et, dans notre texte, il dit : '
  - type: text
    content: Ils n’entreront pas dans le lieu de repos que j’avais prévu pour eux
  - type: text
    content: '  !'
  '6':
  - type: text
    content: 'Il demeure donc établi que certains doivent entrer dans le repos. Or, ceux qui ont les premiers entendu cette Bonne Nouvelle n’y sont pas entrés parce qu’ils ont désobéi à Dieu, '
  '7':
  - type: text
    content: 'c’est pourquoi Dieu fixe de nouveau un jour, qu’il appelle aujourd’hui, lorsqu’il dit beaucoup plus tard, dans les psaumes de David, ces paroles déjà citées :'
  - type: text
    content: Aujourd’hui,
  - type: text
    content: ' ╵'
  - type: text
    content: si vous entendez la voix de Dieu,
  - type: text
    content: ne vous endurcissez pas.
  '8':
  - type: text
    content: 'En effet, si Josué avait assuré le repos aux Israélites, Dieu ne parlerait pas, après cela, d’un autre '
  - type: text
    content: jour
  - type: text
    content: '. '
  '9':
  - type: text
    content: C’est donc qu’un repos de sabbat
  - type: note
    content: 'Autre traduction : une célébration de sabbat.'
  - type: text
    content: ' subsiste pour le peuple de Dieu. '
