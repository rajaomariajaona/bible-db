verses:
  '1':
  - type: text
    content: Introduction
  - type: text
    content: 'Le deuxième livre de Samuel constitue la suite immédiate de 1 Samuel. Les principaux repères chronologiques du livre sont les suivants :'
  - type: text
    content: 1010 av. J.-C. Mort de Saül (chap. 1)
  - type: text
    content: Début du règne de David sur Juda à Hébron (2.1, 4, 11)
  - type: text
    content: 1003 Début du règne de David sur tout Israël (5.1-5)
  - type: text
    content: 1004 Prise de Jérusalem (5.6-10)
  - type: text
    content: 997 à 992 Les guerres de David (8.1-14)
  - type: text
    content: 991 Naissance de Salomon (12.24 ; 1 R 3.7 ; 11.42)
  - type: text
    content: 970 Fin du règne de David (5.4-5 ; 1 R 2.10).
  - type: text
    content: 'Après la mort de Saül, David devient roi. Les chapitres 1 à 10 décrivent son ascension. Devenu roi de Juda à Hébron, David doit faire face à la guerre civile : Ish-Bosheth, l’un des fils de Saül, revendique le pouvoir, soutenu par Abner, général en chef de l’armée de Saül (chap. 2). Après la mort d’Abner et d’Ish-Bosheth, David est proclamé roi sur tout Israël (5.1-5). Il consolide alors son pouvoir : il s’empare de Jérusalem, dont il fait la capitale du pays et où il fait transporter le « coffre de l’Eternel » (5.6-10 ; chap. 6), et soumet les ennemis d’Israël (5.17-25 ; 8.1-14 ; 10.1-19). Si le règne de Saül a mis en évidence la face sombre de la royauté, celui de David en a révélé la face lumineuse.'
  - type: text
    content: 'Cependant, le récit de la vie de David n’est pas idéalisé : il n’omet, dans une deuxième partie (chap. 11 à 20), ni ses fautes ni les malheurs qui ont déchiré sa famille et parcouru son règne. Car David s’est rendu coupable d’un adultère avec Bath-Shéba et du meurtre d’Urie, le mari de celle-ci (chap. 11). Le prophète Nathan, qui lui reproche cette faute, lui en annonce les conséquences : « Voici ce que déclare l’Eternel : je vais faire venir le malheur contre toi, du sein même de ta famille » (12.11). Cette sombre prophétie se réalise dans la douloureuse tentative de coup d’Etat d’Absalom (chap. 13 à 19). David, homme « qui correspond aux désirs » de Dieu (1 S 13.14), demeure un exemple en ce qu’il a reconnu devant l’Eternel le mal qu’il a fait (12.13 ; Ps 51). Le livre se termine sur quelques documents complémentaires (chap. 21 à 24).'
  - type: text
    content: 'Au chapitre 7, en réponse à la volonté de David de construire un temple au Seigneur, l’Eternel lui annonce la permanence de sa dynastie et dit de son descendant : « Je serai pour lui un père, et il sera pour moi un fils » (7.14). Cette promesse a nourri la réflexion des prophètes. Esaïe annonce le règne du « rameau » qui « poussera sur le tronc d’Isaï », c’est-à-dire du père de David (Es 11.1), Jérémie et Zacharie prédisent la venue du « germe » de David (Jr 23.5 ; Za 3.8 ; 6.12) et Ezéchiel, celle d’un nouveau David (Ez 34.23). Jésus, « fils » de David, est venu accomplir la promesse : intronisé lors de l’Ascension (Ac 5.31 ; 15.16-18), il soumettra le dernier ennemi : la mort elle-même (1 Co 15.25-26).'
