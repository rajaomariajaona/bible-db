document_id: 1TI.INTRO1
type_code: fra
segments:
- type: usfm
  marker: imt1
  children:
  - type: text
    text: Introduction
- type: usfm
  marker: ip
  children:
  - type: text
    text: Après une libération de sa première captivité romaine (Ac 28), que laissaient prévoir ses lettres aux Philippiens (Ph 1.25 ; 2.24) et à Philémon (Phm 22), Paul reprend la route pour accomplir sa mission. De Macédoine, il écrit à Timothée, un de ses collaborateurs qu’il affectionne particulièrement ; il lui recommande de rester à Ephèse pour y encourager et enseigner les chrétiens (1.3-4).
- type: usfm
  marker: ip
  children:
  - type: text
    text: Cette lettre contient des avertissements et des conseils relatifs à la vie (chap. 2 à 4) et à la discipline dans l’Eglise (5 à 6.19) ; ils gardent toute leur valeur pour aujourd’hui.
- type: usfm
  marker: ip
  children:
  - type: text
    text: Le chapitre 2 est consacré à la prière et à l’attitude des hommes et des femmes dans la communauté. Puis (chap. 3), Paul définit les qualités nécessaires aux dirigeants de l’Eglise et à leurs assistants. Au chapitre 4, il recommande personnellement à Timothée l’attachement à Dieu et le ministère de l’enseignement. Cet enseignement est d’autant plus nécessaire que des « prédicateurs de mensonges » prêchent des « récits absurdes et contraires à la foi » (4.1-4).
- type: usfm
  marker: ip
  children:
  - type: text
    text: 'Dans la deuxième partie, Paul donne des conseils relatifs aux diverses catégories de personnes qui composent la communauté : les veuves (5.3-16), les responsables (5.17-25), les maîtres et les esclaves (6.1-2), les riches (6.17-19).'
- type: usfm
  marker: ip
  children:
  - type: text
    text: 'Cette lettre nous permet de mieux connaître la structure d’une Eglise locale : il y a plusieurs responsables (ou dirigeants) dans l’Eglise, et on précise les conditions de leur nomination et leurs fonctions. Certaines veuves sont prises en charge par l’Eglise. A côté des prières spontanées apparaissent des formulations plus élaborées et des cantiques (3.16). L’enseignement prend une grande importance, car il faut, non seulement exposer la vérité, mais encore lutter contre les erreurs qui se multiplient.'
