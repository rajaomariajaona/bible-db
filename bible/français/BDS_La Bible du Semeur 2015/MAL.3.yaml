document_id: MAL.3,21
type_code: fra
verses:
  '1':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: Eh bien je vais envoyer mon messager pour qu’il aplanisse la route devant moi
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '3.1 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Voir '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: Es 40.3
        - type: text
          text: '  ; cité en Mt 11.10 ; Mc 1.2 ; Lc 7.27.'
      marker-yv: yv-n
    - type: text
      text: . Et, soudain, il viendra pour entrer dans son temple, le Seigneur que vous attendez ; c’est l’ange de l’alliance, appelé de vos vœux. Le voici, il arrive, déclare l’Eternel, le Seigneur des armées célestes.
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: Apportez donc vos dîmes
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '3.10 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Dix pour cent du revenu, part réservée à Dieu et affectée, entre autres, à l’entretien des prêtres (voir Lv 27.30-32 ; Nb 18.21-29 ; Dt 14.24-27 ; 28.8-12 ; Né 10.38).
      marker-yv: yv-n
    - type: text
      text: ' dans leur totalité au trésor du Temple pour qu’il y ait des vivres dans ma demeure ! De cette façon-là, mettez-moi à l’épreuve, déclare l’Eternel, le Seigneur des armées célestes : alors vous verrez bien si, de mon côté, je n’ouvre pas pour vous les écluses des cieux, et ne vous comble pas avec surabondance de ma bénédiction. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: Pour vous, je réprimerai l’insecte qui dévore
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '3.11 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'C’est-à-dire les sauterelles et les criquets (voir '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: Jl 1.4-7
        - type: text
          text: ).
      marker-yv: yv-n
    - type: text
      text: '. Il ne détruira plus les produits de vos terres, et vos vignes, dans vos campagnes, ne manqueront plus de donner leurs fruits, déclare l’Eternel, le Seigneur des armées célestes. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: Et tous les autres peuples vous diront bienheureux, car vous serez alors un pays de délices, déclare l’Eternel, le Seigneur des armées célestes.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: La fidélité récompensée
    marker-yv: yv-h
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'Vos propos contre moi sont durs, dit l’Eternel, et vous, vous demandez : « Quels propos avons-nous proférés contre toi ? » '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'Eh bien, vous avez dit : « Il est bien inutile de servir Dieu, et qu’avons-nous gagné en lui obéissant et en menant le deuil'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '3.14 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Cérémonies de deuil national et de jeûnes collectifs accompagnés de lamentations. Les Israélites pensaient qu’il suffisait de participer à ces solennités pour que Dieu se montre de nouveau favorable.
      marker-yv: yv-n
    - type: text
      text: ' devant le Seigneur des armées célestes ? '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'C’est pourquoi, maintenant, nous estimons heureux les arrogants, car ceux qui font le mal prospèrent : tout en mettant Dieu au défi ils s’en sortent indemnes. »'
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: Mais ceux qui craignent l’Eternel se sont entretenus les uns avec les autres, et l’Eternel a prêté attention à ce qu’ils se sont dit. Il les a entendus, alors on a écrit un livre devant lui pour que soit conservé le souvenir de ceux qui craignent l’Eternel et qui l’honorent.
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'Au jour où j’agirai, déclare l’Eternel, le Seigneur des armées célestes, ces gens m’appartiendront et me seront précieux. J’aurai compassion d’eux tout comme un père a de la compassion pour un fils qui le sert. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'Alors à nouveau vous verrez qu’il y a une différence entre les justes et les méchants, et entre celui qui sert Dieu et celui qui ne le sert pas. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'Car voici : le jour vient, ardent comme un brasier, où tous les arrogants et ceux qui font le mal seront comme du chaume. Ce jour-là, ils seront consumés par le feu, déclare l’Eternel, le Seigneur des armées célestes. Et il n’en restera ni rameaux ni racines.'
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'Mais qui supportera le jour de sa venue ? Ou qui tiendra quand il apparaîtra ? Car il sera semblable au brasier du fondeur, au savon des blanchisseurs. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: Mais pour vous, cependant, vous qui me craignez, pour vous se lèvera le soleil de justice
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '3.20 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Dieu et sa gloire sont comparés au soleil dans '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: Es 60.1
        - type: text
          text: ', '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: '19'
        - type: text
          text: '. Voir '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: Lc 1.78-79
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: ', qui portera la guérison dans ses rayons. Alors vous sortirez et vous gambaderez tout comme des veaux à l’engrais. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: Vous piétinerez les méchants et ils seront comme de la cendre sous la plante de vos pieds
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '3.21 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Comme les vendangeurs foulaient les raisins (
        - type: usfm
          marker: ref
          children:
          - type: text
            text: Es 63.2-3
        - type: text
          text: ).
      marker-yv: yv-n
    - type: text
      text: ', au jour où j’agirai, déclare l’Eternel, le Seigneur des armées célestes.'
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: Rappelez-vous la Loi de Moïse mon serviteur, à qui j’ai prescrit au mont Horeb
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '3.22 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Autre nom du mont Sinaï (voir '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: Ex 3.1
        - type: text
          text: ).
      marker-yv: yv-n
    - type: text
      text: ' des ordonnances et des lois pour tout le peuple d’Israël. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: 'Voici : je vous envoie Elie'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '3.23 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Sur '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: Elie, voir 1 R 17 à 21. Jésus a déclaré que cette prophétie s’est réalisée par le ministère de Jean-Baptiste (Mt 17.10-13 ; Mc 9.11-13).
      marker-yv: yv-n
    - type: text
      text: ', le prophète, avant que le jour de l’Eternel arrive, ce jour grand et terrible. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: Il fera revenir le cœur des pères vers leurs fils, et celui des fils vers leurs pères, de peur que je vienne pour frapper le pays et me le vouer par destruction
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '3.24 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Cité en '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: Lc 1.17
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: .
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'Il siégera pour fondre et épurer l’argent ; oui, les descendants de Lévi, il les purifiera, il les affinera comme l’or et l’argent, et ils seront alors, pour l’Eternel, des hommes qui lui présenteront l’offrande dans les règles. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: L’offrande de Juda et de Jérusalem plaira à l’Eternel, comme aux jours d’autrefois, aux années de jadis.
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: Et je viendrai à vous en vue du jugement, et je me hâterai d’être un témoin à charge contre les magiciens, contre les adultères, et contre les parjures, contre ceux qui privent l’ouvrier de son gain, contre ceux qui oppriment la veuve et l’orphelin, et contre ceux qui violent le droit de l’immigré, ceux qui ne me craignent pas, déclare l’Eternel, le Seigneur des armées célestes.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: L’appel à la conversion
    marker-yv: yv-h
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: Moi, je suis l’Eternel et je n’ai pas changé. A cause de cela, descendants de Jacob, vous n’avez pas encore été exterminés
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '3.6 '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'A cause de cela… exterminés. '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Autre traduction : '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'et vous, vous ne cessez pas non plus d’être des fils de Jacob. '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Il y aurait là une allusion au jeu sur le nom Jacob qui fait assonance avec le verbe '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'tromper, supplanter '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '(voir '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: Gn 27.36
        - type: text
          text: ).
      marker-yv: yv-n
    - type: text
      text: '. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'Depuis le temps de vos ancêtres, vous vous détournez de mes lois et vous n’y obéissez pas. Revenez donc à moi, et moi, je reviendrai à vous, déclare l’Eternel, le Seigneur des armées célestes. Et vous dites : « En quoi devons-nous revenir ? » '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'Un homme peut-il voler Dieu ? Pourtant, vous me volez, et puis vous demandez : « En quoi t’avons-nous donc volé ? » Vous me volez sur les dîmes et sur les offrandes ! '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: Vous êtes sous le coup d’une malédiction parce que tout ce peuple, vous tous, vous me volez.
