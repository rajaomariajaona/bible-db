document_id: JOB.42
type_code: fra
segments:
- type: usfm
  marker: ms1
  children:
  - type: text
    text: Seconde réponse de Job à Dieu
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Job répondit alors à l’Eternel :'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Je sais que tu peux tout,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et que rien ne peut faire obstacle ╵à tes projets.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: « Qui ose, disais-tu, ╵obscurcir mes desseins ╵par des discours sans connaissance ? »
- type: usfm
  marker: q1
  children:
  - type: text
    text: Oui, j’ai parlé sans les comprendre
- type: usfm
  marker: q1
  children:
  - type: text
    text: de choses merveilleuses ╵qui me dépassent, ╵que je ne connais pas
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '42.3 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Pour les v. 3-4, voir Job '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 38.2-3
        metadata:
          usfm: JOB.38.2+JOB.38.3
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: '« Ecoute, disais-tu, ╵c’est moi qui parlerai :'
- type: usfm
  marker: q1
  children:
  - type: text
    text: je vais te poser des questions, ╵et tu m’enseigneras. »
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Jusqu’à présent ╵j’avais seulement entendu ╵parler de toi.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Mais maintenant, ╵mes yeux t’ont vu.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Aussi je me condamne, ╵je regrette mon attitude
- type: usfm
  marker: q1
  children:
  - type: text
    text: en m’humiliant ╵sur la poussière et sur la cendre
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '42.6 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Marques de deuil.
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: ms1
  children:
  - type: text
    text: Épilogue
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Après avoir dit ces choses à Job, l’Eternel s’adressa à Eliphaz de Témân et lui dit : Je suis très en colère contre toi et tes deux amis, car contrairement à mon serviteur Job, vous n’avez pas parlé de moi correctement. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Procurez-vous donc maintenant sept taureaux et sept béliers
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '42.8 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Voir note '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '1.5'
        metadata:
          usfm: JOB.1.5
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: ', et allez trouver mon serviteur Job. Vous offrirez ces animaux pour vous en holocauste. Et mon serviteur Job priera pour vous. C’est par égard pour lui que je ne vous traiterai pas selon votre folie. Car, contrairement à mon serviteur Job, vous n’avez pas parlé de moi correctement.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Eliphaz de Témân, Bildad de Shouah et Tsophar de Naama allèrent accomplir ce que l’Eternel leur avait demandé. L’Eternel eut égard à la prière de Job. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Puis, lorsque Job eut prié pour ses amis, l’Eternel le rétablit dans son ancienne condition. Il donna même à Job deux fois autant des biens qu’il avait possédés.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Tous les frères et sœurs de Job, et toutes ses connaissances vinrent lui rendre visite. Ils partagèrent un repas avec lui dans sa maison ; ils le consolèrent et ils lui témoignèrent toute leur compassion pour tous les malheurs que l’Eternel lui avait envoyés. Chacun d’entre eux lui donna une pièce d’argent
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '42.11 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'En hébreu : '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'une qésita, '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: monnaie correspondant à un certain poids d’argent, terme qui ne se retrouve que dans Gn 33.19 ; Jos 24.32.
    marker-yv: yv-n
  - type: text
    text: ' et un anneau d’or.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'L’Eternel bénit le reste de la vie de Job plus que la première partie, si bien qu’il posséda quatorze mille moutons et chèvres et six mille chameaux, mille paires de bœufs et mille ânesses. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Il eut aussi sept fils et trois filles. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Il nomma la première Yemima (Tourterelle), la deuxième eut pour nom Qetsia (Fleur-de-cannelle) et la troisième Qérèn-Happouk (Fard-à-paupières). '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: On ne pouvait trouver dans le pays entier des femmes aussi belles que les filles de Job. Leur père leur donna une part d’héritage au même titre qu’à leurs frères.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Après cela, Job vécut encore cent quarante ans, de sorte qu’il vit ses descendants jusqu’à la quatrième génération. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Puis Job mourut âgé et rassasié de jours
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '42.17 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Voir 5.26 ; Gn 15.15 ; 25.8.
    marker-yv: yv-n
  - type: text
    text: .
