document_id: JOB.42,21
type_code: fra
verses:
  '1':
  - type: heading
    content: Seconde réponse de Job à Dieu
  - type: text
    content: 'Job répondit alors à l’Eternel :'
  '10':
  - type: text
    content: Puis, lorsque Job eut prié pour ses amis, l’Eternel le rétablit dans son ancienne condition. Il donna même à Job deux fois autant des biens qu’il avait possédés.
  '11':
  - type: text
    content: Tous les frères et sœurs de Job, et toutes ses connaissances vinrent lui rendre visite. Ils partagèrent un repas avec lui dans sa maison ; ils le consolèrent et ils lui témoignèrent toute leur compassion pour tous les malheurs que l’Eternel lui avait envoyés. Chacun d’entre eux lui donna une pièce d’argent
  - type: note
    content: 'En hébreu : une qésita, monnaie correspondant à un certain poids d’argent, terme qui ne se retrouve que dans Gn 33.19 ; Jos 24.32.'
  - type: text
    content: ' et un anneau d’or.'
  '12':
  - type: text
    content: 'L’Eternel bénit le reste de la vie de Job plus que la première partie, si bien qu’il posséda quatorze mille moutons et chèvres et six mille chameaux, mille paires de bœufs et mille ânesses. '
  '13':
  - type: text
    content: 'Il eut aussi sept fils et trois filles. '
  '14':
  - type: text
    content: 'Il nomma la première Yemima (Tourterelle), la deuxième eut pour nom Qetsia (Fleur-de-cannelle) et la troisième Qérèn-Happouk (Fard-à-paupières). '
  '15':
  - type: text
    content: On ne pouvait trouver dans le pays entier des femmes aussi belles que les filles de Job. Leur père leur donna une part d’héritage au même titre qu’à leurs frères.
  '16':
  - type: text
    content: 'Après cela, Job vécut encore cent quarante ans, de sorte qu’il vit ses descendants jusqu’à la quatrième génération. '
  '17':
  - type: text
    content: Puis Job mourut âgé et rassasié de jours
  - type: note
    content: Voir 5.26 ; Gn 15.15 ; 25.8.
  - type: text
    content: .
  '2':
  - type: text
    content: Je sais que tu peux tout,
  - type: text
    content: et que rien ne peut faire obstacle ╵à tes projets.
  '3':
  - type: text
    content: « Qui ose, disais-tu, ╵obscurcir mes desseins ╵par des discours sans connaissance ? »
  - type: text
    content: Oui, j’ai parlé sans les comprendre
  - type: text
    content: de choses merveilleuses ╵qui me dépassent, ╵que je ne connais pas
  - type: note
    content: Pour les v. 3-4, voir Job 38.2-3.
  - type: text
    content: .
  '4':
  - type: text
    content: '« Ecoute, disais-tu, ╵c’est moi qui parlerai :'
  - type: text
    content: je vais te poser des questions, ╵et tu m’enseigneras. »
  '5':
  - type: text
    content: Jusqu’à présent ╵j’avais seulement entendu ╵parler de toi.
  - type: text
    content: Mais maintenant, ╵mes yeux t’ont vu.
  '6':
  - type: text
    content: Aussi je me condamne, ╵je regrette mon attitude
  - type: text
    content: en m’humiliant ╵sur la poussière et sur la cendre
  - type: note
    content: Marques de deuil.
  - type: text
    content: .
  - type: heading
    content: Épilogue
  '7':
  - type: text
    content: 'Après avoir dit ces choses à Job, l’Eternel s’adressa à Eliphaz de Témân et lui dit : Je suis très en colère contre toi et tes deux amis, car contrairement à mon serviteur Job, vous n’avez pas parlé de moi correctement. '
  '8':
  - type: text
    content: Procurez-vous donc maintenant sept taureaux et sept béliers
  - type: note
    content: Voir note 1.5.
  - type: text
    content: ', et allez trouver mon serviteur Job. Vous offrirez ces animaux pour vous en holocauste. Et mon serviteur Job priera pour vous. C’est par égard pour lui que je ne vous traiterai pas selon votre folie. Car, contrairement à mon serviteur Job, vous n’avez pas parlé de moi correctement.'
  '9':
  - type: text
    content: 'Eliphaz de Témân, Bildad de Shouah et Tsophar de Naama allèrent accomplir ce que l’Eternel leur avait demandé. L’Eternel eut égard à la prière de Job. '
