document_id: PSA.41,21
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Malade et persécuté
    marker-yv: yv-h
  - type: usfm
    marker: d
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: Au chef de chœur. Psaume de David.
  '10':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: Et même mon ami,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: en qui j’avais confiance, ╵celui qui partageait mon pain,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: s’est tourné contre moi
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '41.10 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Cité en '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: Jn 13.18
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: .
  '11':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'Mais toi, ô Eternel, ╵aie compassion de moi, ╵et viens me relever :'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: je leur rendrai leur dû.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'Voici comment je reconnaîtrai ╵ton affection pour moi :'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: c’est quand mon ennemi ╵cessera de clamer ╵qu’il triomphe de moi.
  '13':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: Pour prix de mon intégrité, ╵tu viens me soutenir.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tu me fais subsister ╵devant toi pour toujours.
  '14':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: Béni soit l’Eternel, ╵Dieu d’Israël, ╵depuis toujours ╵et pour toujours.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Amen, Amen !
  '2':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: Heureux celui ╵qui se soucie du pauvre.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Lorsque vient le malheur, ╵l’Eternel le délivre,
  '3':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'l’Eternel le protège ╵et préserve sa vie :'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: il le rend heureux sur la terre
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et ne le livre pas ╵au désir de ses ennemis.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: L’Eternel le soutient ╵sur son lit de souffrance,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et quand il est malade ╵il lui refait sa couche
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '41.4 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Autre traduction : '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: il lui fait quitter sa couche.
      marker-yv: yv-n
    - type: text
      text: .
  '5':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'J’ai dit : « O Eternel, ╵aie compassion de moi,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et veuille me guérir ! ╵J’ai péché contre toi. »
  '6':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'Mes adversaires parlent ╵méchamment contre moi :'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: « Quand donc va-t-il mourir ? ╵Quand donc l’oubliera-t-on ? »
  '7':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'Si l’un d’eux vient me voir, ╵il se met à mentir :'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: il amasse en lui-même ╵un tas de médisances
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et sort pour les répandre.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: Mes ennemis ╵chuchotent tous ensemble ╵à mon sujet,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'en formant des projets ╵pour mon malheur :'
  '9':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: « Cette maladie qui le frappe, ╵quelle mauvaise affaire !
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Il a dû s’aliter, ╵il ne se relèvera plus ! »
