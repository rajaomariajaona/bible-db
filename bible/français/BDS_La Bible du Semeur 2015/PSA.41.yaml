document_id: PSA.41,21
type_code: fra
verses:
  '1':
  - type: heading
    content: Malade et persécuté
  - type: text
    content: Au chef de chœur. Psaume de David.
  '10':
  - type: text
    content: Et même mon ami,
  - type: text
    content: en qui j’avais confiance, ╵celui qui partageait mon pain,
  - type: text
    content: s’est tourné contre moi
  - type: note
    content: Cité en Jn 13.18.
  - type: text
    content: .
  '11':
  - type: text
    content: 'Mais toi, ô Eternel, ╵aie compassion de moi, ╵et viens me relever :'
  - type: text
    content: je leur rendrai leur dû.
  '12':
  - type: text
    content: 'Voici comment je reconnaîtrai ╵ton affection pour moi :'
  - type: text
    content: c’est quand mon ennemi ╵cessera de clamer ╵qu’il triomphe de moi.
  '13':
  - type: text
    content: Pour prix de mon intégrité, ╵tu viens me soutenir.
  - type: text
    content: Tu me fais subsister ╵devant toi pour toujours.
  '14':
  - type: text
    content: Béni soit l’Eternel, ╵Dieu d’Israël, ╵depuis toujours ╵et pour toujours.
  - type: text
    content: Amen, Amen !
  '2':
  - type: text
    content: Heureux celui ╵qui se soucie du pauvre.
  - type: text
    content: Lorsque vient le malheur, ╵l’Eternel le délivre,
  '3':
  - type: text
    content: 'l’Eternel le protège ╵et préserve sa vie :'
  - type: text
    content: il le rend heureux sur la terre
  - type: text
    content: et ne le livre pas ╵au désir de ses ennemis.
  '4':
  - type: text
    content: L’Eternel le soutient ╵sur son lit de souffrance,
  - type: text
    content: et quand il est malade ╵il lui refait sa couche
  - type: note
    content: 'Autre traduction : il lui fait quitter sa couche.'
  - type: text
    content: .
  '5':
  - type: text
    content: 'J’ai dit : « O Eternel, ╵aie compassion de moi,'
  - type: text
    content: et veuille me guérir ! ╵J’ai péché contre toi. »
  '6':
  - type: text
    content: 'Mes adversaires parlent ╵méchamment contre moi :'
  - type: text
    content: « Quand donc va-t-il mourir ? ╵Quand donc l’oubliera-t-on ? »
  '7':
  - type: text
    content: 'Si l’un d’eux vient me voir, ╵il se met à mentir :'
  - type: text
    content: il amasse en lui-même ╵un tas de médisances
  - type: text
    content: et sort pour les répandre.
  '8':
  - type: text
    content: Mes ennemis ╵chuchotent tous ensemble ╵à mon sujet,
  - type: text
    content: 'en formant des projets ╵pour mon malheur :'
  '9':
  - type: text
    content: « Cette maladie qui le frappe, ╵quelle mauvaise affaire !
  - type: text
    content: Il a dû s’aliter, ╵il ne se relèvera plus ! »
