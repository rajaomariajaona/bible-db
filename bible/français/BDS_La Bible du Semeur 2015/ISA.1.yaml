document_id: ISA.1,21
type_code: fra
verses:
  '1':
  - type: text
    content: Révélations reçues par Esaïe, fils d’Amots, au sujet de Juda et de Jérusalem, sous les règnes d’Ozias, de Yotam, d’Ahaz et d’Ezéchias, rois de Juda
  - type: note
    content: 'Ozias: 2 R 15.1-7 ; 2 Ch 26.1-23  ; Yotam: 2 R 15.32-38 ; 2 Ch 27.1-9  ; Ahaz: 2 R 16.1-20 ; 2 Ch 28.1-27  ; Ezéchias: 2 R 18.1-20 ; 2 Ch 29.1-32. Ces rois ont régné en Juda de 792 à 698 (ou 686) av. J.-C. Esaïe a exercé son ministère de 740 jusqu’au début du viie siècle av. J.-C.'
  - type: text
    content: .
  - type: heading
    content: Prophéties sur Juda et sur Israël
  - type: heading
    content: Juda est bien malade
  '10':
  - type: text
    content: Vous, les chefs de Sodome,
  - type: text
    content: écoutez bien ╵ce que dit l’Eternel,
  - type: text
    content: vous, peuple de Gomorrhe
  - type: note
    content: 'Sodome, Gomorrhe: voir Gn 18.20 ; 19.'
  - type: text
    content: ','
  - type: text
    content: écoutez bien ╵la Loi de notre Dieu.
  '11':
  - type: text
    content: A quoi peuvent bien me servir ╵vos nombreux sacrifices ?
  - type: text
    content: dit l’Eternel,
  - type: text
    content: car je suis rassasié ╵des holocaustes de béliers,
  - type: text
    content: et de la graisse ╵de bêtes à l’engrais.
  - type: text
    content: Je ne prends pas plaisir
  - type: text
    content: aux sacrifices de taureaux, ╵d’agneaux comme de boucs
  - type: note
    content: Pour les v. 11-14, voir Am 5.21-22.
  - type: text
    content: .
  '12':
  - type: text
    content: Quand vous venez ╵pour vous présenter devant moi,
  - type: text
    content: qui vous a demandé ╵de fouler mes parvis ?
  '13':
  - type: text
    content: 'Cessez de m’apporter ╵d’inutiles offrandes :'
  - type: text
    content: j’ai l’encens en horreur ;
  - type: text
    content: quant aux nouvelles lunes, ╵aux sabbats et aux assemblées,
  - type: text
    content: je ne veux plus ╵de ces rassemblements de culte ╵de gens qui font le mal.
  '14':
  - type: text
    content: Oui, vos nouvelles lunes, ╵toutes vos fêtes, ╵je les déteste,
  - type: text
    content: elles sont un fardeau pour moi ;
  - type: text
    content: je suis las de les supporter.
  '15':
  - type: text
    content: Lorsque vous étendez les mains ╵pour me prier,
  - type: text
    content: je me cache les yeux,
  - type: text
    content: vous avez beau multiplier ╵le nombre des prières,
  - type: text
    content: je ne vous entends pas,
  - type: text
    content: car vos mains sont pleines de sang.
  '16':
  - type: text
    content: Lavez-vous donc, ╵purifiez-vous,
  - type: text
    content: écartez de ma vue ╵vos mauvaises actions
  - type: text
    content: et cessez de faire le mal.
  '17':
  - type: text
    content: Apprenez à faire le bien,
  - type: text
    content: efforcez-vous d’agir avec droiture,
  - type: text
    content: assistez l’opprimé
  - type: note
    content: 'D’après les versions anciennes. Le texte hébreu traditionnel a : l’oppresseur.'
  - type: text
    content: ','
  - type: text
    content: et défendez le droit ╵de l’orphelin,
  - type: text
    content: plaidez la cause de la veuve !
  '18':
  - type: text
    content: Venez et discutons ensemble,
  - type: text
    content: 'dit l’Eternel :'
  - type: text
    content: si vos péchés sont rouges ╵comme de l’écarlate,
  - type: text
    content: ils deviendront
  - type: text
    content: aussi blancs que la neige.
  - type: text
    content: Oui, s’ils sont rouges ╵comme la pourpre,
  - type: text
    content: ils deviendront ╵aussi blancs que la laine.
  '19':
  - type: text
    content: Si vous vous décidez à m’obéir,
  - type: text
    content: vous mangerez ╵les meilleurs produits du pays.
  '2':
  - type: text
    content: Vous, les cieux, écoutez,
  - type: text
    content: toi, terre, tends l’oreille,
  - type: text
    content: 'c’est l’Eternel qui parle :'
  - type: text
    content: J’ai élevé des enfants, et j’ai pris soin d’eux,
  - type: text
    content: mais ils se sont révoltés contre moi.
  '20':
  - type: text
    content: Mais, si vous refusez, ╵si vous êtes rebelles,
  - type: text
    content: c’est l’épée qui vous mangera,
  - type: text
    content: l’Eternel le déclare.
  - type: heading
    content: Autrefois, aujourd’hui et demain
  '21':
  - type: text
    content: Jérusalem !
  - type: text
    content: Comment se fait-il donc ╵que la cité fidèle
  - type: text
    content: soit devenue ╵une prostituée
  - type: note
    content: L’infidélité d’Israël à l’alliance avec l’Eternel est souvent comparée par les prophètes à la prostitution (Jr 3.2 ; 13.27 ; Ez 16.15 ; 23.11 ; Os 2.4 ; Na 3.4).
  - type: text
    content: '  ?'
  - type: text
    content: Toi, jadis pleine de droiture,
  - type: text
    content: où la justice demeurait,
  - type: text
    content: maintenant, tu abrites ╵des assassins.
  '22':
  - type: text
    content: Ton argent n’est plus que scories,
  - type: text
    content: et ton vin le meilleur ╵est coupé d’eau.
  '23':
  - type: text
    content: Tes chefs sont des rebelles,
  - type: text
    content: complices de voleurs,
  - type: text
    content: tous aiment les pots-de-vin
  - type: text
    content: et sont avides de présents,
  - type: text
    content: ils ne défendent pas ╵les droits de l’orphelin ;
  - type: text
    content: la cause de la veuve ╵jamais ne leur parvient.
  '24':
  - type: text
    content: C’est pourquoi l’Eternel,
  - type: text
    content: le Seigneur des armées célestes,
  - type: text
    content: 'le Puissant d’Israël, ╵vous déclare ceci :'
  - type: text
    content: Malheur à vous !
  - type: text
    content: Je tirerai vengeance ╵de vous, mes adversaires,
  - type: text
    content: je vous ferai payer, ╵ô vous, mes ennemis.
  '25':
  - type: text
    content: Je tournerai ma main ╵contre toi, ô Jérusalem,
  - type: text
    content: je fondrai tes scories,
  - type: text
    content: comme avec de la soude
  - type: note
    content: Ou de la potasse.
  - type: text
    content: ','
  - type: text
    content: et je vais supprimer ╵tous tes déchets.
  '26':
  - type: text
    content: Je te redonnerai des dirigeants ╵comme ceux d’autrefois,
  - type: text
    content: des conseillers ╵comme au commencement.
  - type: text
    content: Après cela, ╵tu seras appelée
  - type: text
    content: la Ville-de-Justice
  - type: text
    content: et la Cité fidèle.
  '27':
  - type: text
    content: Le salut viendra pour Sion ╵selon le droit,
  - type: text
    content: ses habitants ╵qui reviendront à Dieu
  - type: note
    content: 'Autre traduction : chez elle.'
  - type: text
    content: ' ╵seront sauvés : ╵ils obtiendront justice.'
  '28':
  - type: text
    content: Mais les pécheurs ╵et ceux qui transgressent la Loi
  - type: text
    content: seront brisés ensemble
  - type: text
    content: et ceux qui se détournent ╵de l’Eternel, ╵disparaîtront.
  '29':
  - type: text
    content: Et quant aux chênes, ╵ceux que vous aimez tant,
  - type: text
    content: ils tourneront à votre honte,
  - type: text
    content: vous rougirez ╵à cause des jardins sacrés
  - type: note
    content: Voir Es 17.10 ; Os 4.13.
  - type: text
    content: que vous avez choisis.
  '3':
  - type: text
    content: Le bœuf sait bien ╵à qui il appartient,
  - type: text
    content: et l’âne connaît la mangeoire ╵où le nourrit son maître.
  - type: text
    content: Israël ne veut rien savoir,
  - type: text
    content: et mon peuple ne comprend pas.
  '30':
  - type: text
    content: Car vous serez vous-mêmes ╵pareils aux chênes
  - type: text
    content: au feuillage flétri,
  - type: text
    content: ou tout comme un jardin ╵qui serait privé d’eau.
  '31':
  - type: text
    content: L’homme le plus puissant ╵sera comme l’étoupe,
  - type: text
    content: et ce qu’il a produit ╵servira d’étincelle
  - type: text
    content: pour qu’il soit consumé ╵avec ce qu’il a fait
  - type: text
    content: sans qu’il y ait personne ╵pour éteindre les flammes
  - type: note
    content: 'Autre traduction : le lin semi-traité deviendra de l’étoupe, et celui qui l’a fait sera une étincelle. Avec son œuvre, il brûlera sans qu’il y ait personne pour éteindre les flammes.'
  - type: text
    content: .
  '4':
  - type: text
    content: Malheur à toi, nation coupable,
  - type: text
    content: peuple chargé de fautes,
  - type: text
    content: race adonnée au mal
  - type: text
    content: et enfants corrompus !
  - type: text
    content: Vous avez abandonné l’Eternel,
  - type: text
    content: méprisé le Saint d’Israël,
  - type: text
    content: vous lui avez tourné le dos.
  '5':
  - type: text
    content: Où
  - type: note
    content: 'Autre traduction : Pourquoi ?'
  - type: text
    content: ' vous frapper encore,'
  - type: text
    content: puisque vous persistez ╵dans votre rébellion ?
  - type: text
    content: Car, déjà, votre tête ╵tout entière est malade,
  - type: text
    content: votre cœur est tout affligé.
  '6':
  - type: text
    content: De la plante des pieds ╵jusqu’à la tête,
  - type: text
    content: rien n’est en bon état,
  - type: text
    content: ce ne sont que blessures, ╵contusions et plaies vives
  - type: text
    content: que l’on n’a pas pansées ╵ni bandées, ni soignées
  - type: text
    content: avec de l’huile.
  '7':
  - type: text
    content: Le pays que vous habitez ╵est dévasté
  - type: note
    content: Allusion à l’invasion assyrienne de 701, sous Sennachérib (Es 36 à 37 ; 2 R 18.13), ou à l’invasion des Syriens et des Israélites du Nord, vers 734 (Es 7 ; 2 Ch 28.5-8, 17-18).
  - type: text
    content: ','
  - type: text
    content: vos villes sont détruites par le feu,
  - type: text
    content: vos campagnes sont ravagées ╵sous vos yeux par des étrangers.
  - type: text
    content: Oui, tout est dévasté, ╵détruit par des envahisseurs
  - type: note
    content: 'En modifiant légèrement le texte hébreu traditionnel, on obtient : comme à la catastrophe de Sodome (voir Gn 19.23-25).'
  - type: text
    content: .
  '8':
  - type: text
    content: Et Sion est restée
  - type: text
    content: comme une hutte ╵au milieu d’une vigne,
  - type: text
    content: comme un abri ╵dans un champ de concombres,
  - type: text
    content: comme une ville ╵entourée d’armées ennemies.
  '9':
  - type: text
    content: Si l’Eternel, ╵le Seigneur des armées célestes,
  - type: text
    content: ne nous avait laissé ╵un faible reste,
  - type: text
    content: nous ressemblerions à Sodome
  - type: text
    content: et nous serions comme Gomorrhe
  - type: note
    content: Cité en Rm 9.29.
  - type: text
    content: .
  - type: heading
    content: Changez de comportement
