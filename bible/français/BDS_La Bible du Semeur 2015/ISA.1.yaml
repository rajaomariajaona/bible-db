document_id: ISA.1,21
type_code: fra
verses:
  '1':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Révélations reçues par Esaïe, fils d’Amots, au sujet de Juda et de Jérusalem, sous les règnes d’Ozias, de Yotam, d’Ahaz et d’Ezéchias, rois de Juda
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1.1 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Ozias
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: ': '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '2 R 15.1-7 ; 2 Ch 26.1-23  ; '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Yotam
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: ': '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '2 R 15.32-38 ; 2 Ch 27.1-9  ; '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Ahaz
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: ': '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '2 R 16.1-20 ; 2 Ch 28.1-27  ; '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Ezéchias
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: ': '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '2 R 18.1-20 ; 2 Ch 29.1-32. Ces rois ont régné en Juda de 792 à 698 (ou 686) av. J.-C. Esaïe a exercé son ministère de 740 jusqu’au début du '
        - type: usfm
          marker: sc
          children:
          - type: text
            text: vii
        - type: usfm
          marker: ord
          children:
          - type: text
            text: e
        - type: text
          text: ' siècle av. J.-C.'
      marker-yv: yv-n
    - type: text
      text: .
  - type: usfm
    marker: ms1
    children:
    - type: text
      text: Prophéties sur Juda et sur Israël
    marker-yv: yv-h
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Juda est bien malade
    marker-yv: yv-h
  '10':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Vous, les chefs de Sodome,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: écoutez bien ╵ce que dit l’Eternel,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: vous, peuple de Gomorrhe
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1.10 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Sodome
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: ', '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Gomorrhe
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: ': '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: voir Gn 18.20 ; 19.
      marker-yv: yv-n
    - type: text
      text: ','
  - type: usfm
    marker: q1
    children:
    - type: text
      text: écoutez bien ╵la Loi de notre Dieu.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: A quoi peuvent bien me servir ╵vos nombreux sacrifices ?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dit l’Eternel,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: car je suis rassasié ╵des holocaustes de béliers,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et de la graisse ╵de bêtes à l’engrais.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Je ne prends pas plaisir
  - type: usfm
    marker: q1
    children:
    - type: text
      text: aux sacrifices de taureaux, ╵d’agneaux comme de boucs
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1.11 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Pour les v. 11-14, voir '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: Am 5.21-22
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: .
  '12':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Quand vous venez ╵pour vous présenter devant moi,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: qui vous a demandé ╵de fouler mes parvis ?
  '13':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Cessez de m’apporter ╵d’inutiles offrandes :'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: j’ai l’encens en horreur ;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: quant aux nouvelles lunes, ╵aux sabbats et aux assemblées,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: je ne veux plus ╵de ces rassemblements de culte ╵de gens qui font le mal.
  '14':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Oui, vos nouvelles lunes, ╵toutes vos fêtes, ╵je les déteste,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: elles sont un fardeau pour moi ;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: je suis las de les supporter.
  '15':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Lorsque vous étendez les mains ╵pour me prier,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: je me cache les yeux,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: vous avez beau multiplier ╵le nombre des prières,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: je ne vous entends pas,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: car vos mains sont pleines de sang.
  '16':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Lavez-vous donc, ╵purifiez-vous,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: écartez de ma vue ╵vos mauvaises actions
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et cessez de faire le mal.
  '17':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Apprenez à faire le bien,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: efforcez-vous d’agir avec droiture,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: assistez l’opprimé
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1.17 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'D’après les versions anciennes. Le texte hébreu traditionnel a : '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: l’oppresseur.
      marker-yv: yv-n
    - type: text
      text: ','
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et défendez le droit ╵de l’orphelin,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: plaidez la cause de la veuve !
  '18':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Venez et discutons ensemble,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'dit l’Eternel :'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: si vos péchés sont rouges ╵comme de l’écarlate,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ils deviendront
  - type: usfm
    marker: q1
    children:
    - type: text
      text: aussi blancs que la neige.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Oui, s’ils sont rouges ╵comme la pourpre,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ils deviendront ╵aussi blancs que la laine.
  '19':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Si vous vous décidez à m’obéir,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: vous mangerez ╵les meilleurs produits du pays.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Vous, les cieux, écoutez,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: toi, terre, tends l’oreille,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'c’est l’Eternel qui parle :'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: J’ai élevé des enfants, et j’ai pris soin d’eux,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: mais ils se sont révoltés contre moi.
  '20':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mais, si vous refusez, ╵si vous êtes rebelles,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: c’est l’épée qui vous mangera,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: l’Eternel le déclare.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Autrefois, aujourd’hui et demain
    marker-yv: yv-h
  '21':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Jérusalem !
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Comment se fait-il donc ╵que la cité fidèle
  - type: usfm
    marker: q1
    children:
    - type: text
      text: soit devenue ╵une prostituée
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1.21 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: L’infidélité d’Israël à l’alliance avec l’Eternel est souvent comparée par les prophètes à la prostitution (Jr 3.2 ; 13.27 ; Ez 16.15 ; 23.11 ; Os 2.4 ; Na 3.4).
      marker-yv: yv-n
    - type: text
      text: '  ?'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Toi, jadis pleine de droiture,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: où la justice demeurait,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: maintenant, tu abrites ╵des assassins.
  '22':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ton argent n’est plus que scories,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et ton vin le meilleur ╵est coupé d’eau.
  '23':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tes chefs sont des rebelles,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: complices de voleurs,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: tous aiment les pots-de-vin
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et sont avides de présents,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ils ne défendent pas ╵les droits de l’orphelin ;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: la cause de la veuve ╵jamais ne leur parvient.
  '24':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: C’est pourquoi l’Eternel,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: le Seigneur des armées célestes,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'le Puissant d’Israël, ╵vous déclare ceci :'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Malheur à vous !
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Je tirerai vengeance ╵de vous, mes adversaires,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: je vous ferai payer, ╵ô vous, mes ennemis.
  '25':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Je tournerai ma main ╵contre toi, ô Jérusalem,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: je fondrai tes scories,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: comme avec de la soude
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1.25 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Ou '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: de la potasse.
      marker-yv: yv-n
    - type: text
      text: ','
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et je vais supprimer ╵tous tes déchets.
  '26':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Je te redonnerai des dirigeants ╵comme ceux d’autrefois,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: des conseillers ╵comme au commencement.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Après cela, ╵tu seras appelée
  - type: usfm
    marker: q1
    children:
    - type: text
      text: la Ville-de-Justice
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et la Cité fidèle.
  '27':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Le salut viendra pour Sion ╵selon le droit,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ses habitants ╵qui reviendront à Dieu
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1.27 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Autre traduction : '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: chez elle.
      marker-yv: yv-n
    - type: text
      text: ' ╵seront sauvés : ╵ils obtiendront justice.'
  '28':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mais les pécheurs ╵et ceux qui transgressent la Loi
  - type: usfm
    marker: q1
    children:
    - type: text
      text: seront brisés ensemble
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et ceux qui se détournent ╵de l’Eternel, ╵disparaîtront.
  '29':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et quant aux chênes, ╵ceux que vous aimez tant,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ils tourneront à votre honte,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: vous rougirez ╵à cause des jardins sacrés
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1.29 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Voir Es 17.10 ; Os 4.13.
      marker-yv: yv-n
  - type: usfm
    marker: q1
    children:
    - type: text
      text: que vous avez choisis.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Le bœuf sait bien ╵à qui il appartient,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et l’âne connaît la mangeoire ╵où le nourrit son maître.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Israël ne veut rien savoir,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et mon peuple ne comprend pas.
  '30':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Car vous serez vous-mêmes ╵pareils aux chênes
  - type: usfm
    marker: q1
    children:
    - type: text
      text: au feuillage flétri,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ou tout comme un jardin ╵qui serait privé d’eau.
  '31':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: L’homme le plus puissant ╵sera comme l’étoupe,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et ce qu’il a produit ╵servira d’étincelle
  - type: usfm
    marker: q1
    children:
    - type: text
      text: pour qu’il soit consumé ╵avec ce qu’il a fait
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sans qu’il y ait personne ╵pour éteindre les flammes
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1.31 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Autre traduction : '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: le lin semi-traité deviendra de l’étoupe, et celui qui l’a fait sera une étincelle. Avec son œuvre, il brûlera sans qu’il y ait personne pour éteindre les flammes.
      marker-yv: yv-n
    - type: text
      text: .
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Malheur à toi, nation coupable,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: peuple chargé de fautes,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: race adonnée au mal
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et enfants corrompus !
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Vous avez abandonné l’Eternel,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: méprisé le Saint d’Israël,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: vous lui avez tourné le dos.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Où
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1.5 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Autre traduction : '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: Pourquoi ?
      marker-yv: yv-n
    - type: text
      text: ' vous frapper encore,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: puisque vous persistez ╵dans votre rébellion ?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Car, déjà, votre tête ╵tout entière est malade,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: votre cœur est tout affligé.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: De la plante des pieds ╵jusqu’à la tête,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: rien n’est en bon état,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ce ne sont que blessures, ╵contusions et plaies vives
  - type: usfm
    marker: q1
    children:
    - type: text
      text: que l’on n’a pas pansées ╵ni bandées, ni soignées
  - type: usfm
    marker: q1
    children:
    - type: text
      text: avec de l’huile.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Le pays que vous habitez ╵est dévasté
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1.7 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Allusion à l’invasion assyrienne de 701, sous Sennachérib (Es 36 à 37 ; 2 R 18.13), ou à l’invasion des Syriens et des Israélites du Nord, vers 734 (Es 7 ; 2 Ch 28.5-8, 17-18).
      marker-yv: yv-n
