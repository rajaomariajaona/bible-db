type_code: fra
verses:
  '1':
  - type: text
    content: Introduction
  - type: text
    content: Bien que le livre d’Habaquq ne fournisse aucun renseignement sur l’identité du prophète, il est possible, grâce aux indications historiques qu’il contient – en particulier la mention des Babyloniens (1.6) – de préciser l’époque à laquelle Habaquq a exercé son ministère.
  - type: text
    content: 'En effet, à partir de 630 avant Jésus-Christ, les Babyloniens se sont peu à peu rendus maîtres de toute la Mésopotamie, après s’être libérés de la domination assyrienne. En 626, ils fondent leur nouvel empire et en 612, alliés aux Mèdes, ils s’emparent de Ninive, la capitale de l’Assyrie. L’Egypte tente alors de venir au secours de ce qui reste de l’Assyrie. En 609, les armées égyptiennes pénètrent en Juda pour se rendre sur l’Euphrate. Josias, roi de Juda, qui veut les empêcher de traverser son territoire, trouve la mort au combat, à Meguiddo. Les troupes du pharaon livrent bataille à celles du Babylonien Nabopolassar : l’issue n’est pas décisive. Sur le chemin du retour, le pharaon repasse par Jérusalem où il dépose le nouveau roi de Juda, Yoahaz, pour le remplacer par Yehoyaqim, pro-égyptien (2 R 23.29-35). En 605 a lieu un nouvel affrontement entre les deux puissances. Nabopolassar succombe à la maladie et son fils, Nabuchodonosor, remporte à Karkemish une victoire décisive sur l’Egypte désormais très affaiblie. Les armées babyloniennes poursuivent leurs ennemis en fuite au moins jusqu’à Jérusalem. Nabuchodonosor assiège la ville et Yehoyaqim fait acte de soumission (2 R 24.1). Nabuchodonosor emporte avec lui un grand butin et emmène un premier convoi de captifs, peu nombreux, mais choisis parmi l’aristocratie judéenne (Dn 1.1). Il inaugure ainsi un règne long et prospère.'
  - type: text
    content: Habaquq connaît les Babyloniens et sait avec quelle violence ils agissent (1.6-11). Mais à son époque, ceux-ci ne semblent pas encore être intervenus en Juda (1.5). La prophétie daterait donc d’avant la bataille de Karkemish. Par ailleurs, Habaquq dénonce l’injustice sociale et l’oppression qui se pratiquent en Juda (1.2-4), ce qui correspond plutôt au règne de Yehoyaqim qu’à celui de Josias. On peut ainsi situer son ministère au début du règne de Yehoyaqim, entre 609 et 605. Habaquq est donc un contemporain de Jérémie.
  - type: text
    content: 'La prophétie se compose en grande partie d’un dialogue entre le prophète et l’Eternel, qui porte sur la manière dont Dieu dirige l’histoire : comment lui qui est juste peut-il tolérer l’injustice (1.2-4) ou punir le méchant par plus méchant que lui (1.12 à 2.1) ? Dans ses réponses, l’Eternel souligne que les méchants seront jugés (1.5-11 ; 2.5-20) et la justice établie sur terre (2.13-14). Mais ces réalités viendront en leur temps (2.3 ; 3.3 ; voir Hé 10.37). Ainsi, dans l’attente de la « venue » de Dieu (2.3 ; 3.3), le prophète est-il appelé à vivre par la foi, en croyant que le Seigneur accomplira ce qu’il a promis (2.3-4). L’apôtre Paul discernera dans cet appel le principe qui gouverne la relation du fidèle à Dieu (Rm 1.17 ; Ga 3.11). Habaquq, quant à lui, y répond par la prière de la foi (chap. 3), nourrie des promesses de l’Eternel (3.2ss) et de l’attente du salut de Dieu (3.16-19).'
