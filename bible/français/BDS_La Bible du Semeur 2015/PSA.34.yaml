document_id: PSA.34
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Le Seigneur m’a délivré
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '34 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Psaume alphabétique (cf. note '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '9.1'
        metadata:
          usfm: PSA.9.1
      - type: text
        text: ).
    marker-yv: yv-n
  marker-yv: yv-h
- type: usfm
  marker: d
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Un psaume de David lorsqu’il simula la folie en présence d’Abimélek qui le chassa, de sorte que David put s’en aller
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '34.1 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Voir '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1 S 21.11-16
        metadata:
          usfm: 1SA.21.11+1SA.21.12+1SA.21.13+1SA.21.14+1SA.21.15+1SA.21.16
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Je bénirai ╵l’Eternel en tout temps
- type: usfm
  marker: q1
  children:
  - type: text
    text: et à jamais, ╵mes lèvres le loueront.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Mon sujet de fierté, ╵c’est l’Eternel !
- type: usfm
  marker: q1
  children:
  - type: text
    text: Que les humbles l’entendent ╵et qu’ils se réjouissent !
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Venez proclamer avec moi ╵que l’Eternel est grand !
- type: usfm
  marker: q1
  children:
  - type: text
    text: Exaltons-le ensemble !
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Moi, je me suis tourné ╵vers l’Eternel ╵et il m’a répondu.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Oui, il m’a délivré ╵de toutes mes frayeurs.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Qui regarde vers lui ╵est rayonnant de joie
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '34.6 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Certains manuscrits hébreux et des versions anciennes ont : '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: regardez vers lui et rayonnez de joie, et que vos visages ne rougissent plus de honte.
    marker-yv: yv-n
  - type: text
    text: ','
- type: usfm
  marker: q1
  children:
  - type: text
    text: et son visage ╵n’aura pas à rougir de honte.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Un malheureux a appelé, ╵et l’Eternel a entendu,
- type: usfm
  marker: q1
  children:
  - type: text
    text: car il l’a délivré ╵de toutes ses détresses.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: L’ange de l’Eternel
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '34.8 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Représentant de l’Eternel (35.5-6 ; Gn 16.7 ; 32.1-2 ; Ex 14.19 ; 2 R 6.14-23 ; 19.35), agissant en faveur du peuple de Dieu, assurant notamment sa protection.
    marker-yv: yv-n
  - type: text
    text: ' ╵campe autour de ceux qui le craignent,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: et les délivre.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Goûtez et constatez ╵que l’Eternel est bon
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '34.9 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Réminiscence en '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1 P 2.3
        metadata:
          usfm: 1PE.2.3
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: '  !'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Oui, heureux l’homme ╵qui trouve son refuge en lui.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Craignez donc l’Eternel, ╵vous, membres de son peuple saint,
- type: usfm
  marker: q1
  children:
  - type: text
    text: car pour ceux qui le craignent, ╵il n’y a pas de manque !
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Le lion
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '34.11 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'L’ancienne version grecque et la version syriaque ont : '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: le riche.
    marker-yv: yv-n
  - type: text
    text: ' peut connaître ╵la disette et la faim,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: mais pour ceux qui se tournent ╵vers l’Eternel, ╵il ne manquera aucun bien.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Venez, mes fils, écoutez-moi,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et je vous apprendrai ╵à craindre l’Eternel
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '34.12 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Formule traditionnelle des maîtres qui enseignent la sagesse à leurs disciples appelés leurs fils (voir Pr 1.8, 10 ; 2.1).
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Qui désire une longue vie ?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Qui souhaite vivre ╵de nombreux jours ╵pour goûter au bonheur
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '34.13 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Les v. 13-17 sont cités en '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1 P 3.10-12
        metadata:
          usfm: 1PE.3.10+1PE.3.11+1PE.3.12
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: '  ?'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Qu’il veille sur sa langue ╵pour ne faire aucun mal,
- type: usfm
  marker: q1
  children:
  - type: text
    text: qu’aucun propos menteur ╵ne passe sur ses lèvres.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Détourne-toi du mal, ╵et fais ce qui est bien,
- type: usfm
  marker: q1
  children:
  - type: text
    text: cherche la paix avec ténacité.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Les yeux de l’Eternel ╵se tournent vers les justes,
- type: usfm
  marker: q1
  children:
  - type: text
    text: son oreille est tendue ╵pour écouter leurs cris.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Mais l’Eternel s’oppose ╵à ceux qui font le mal,
- type: usfm
  marker: q1
  children:
  - type: text
    text: pour ôter de la terre ╵jusqu’à leur souvenir.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Lorsque les hommes justes ╵lancent leurs cris vers lui, ╵l’Eternel les entend ;
- type: usfm
  marker: q1
  children:
  - type: text
    text: aussi, il les délivre ╵de toutes leurs détresses.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Car l’Eternel est proche ╵de ceux qui ont le cœur brisé.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Il sauve ceux ╵qui ont un esprit abattu.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: De nombreux malheurs atteignent le juste
- type: usfm
  marker: q1
  children:
  - type: text
    text: mais l’Eternel le délivre de tous.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Il veille sur ses os :'
- type: usfm
  marker: q1
  children:
  - type: text
    text: aucun d’eux n’est brisé
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '34.21 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Cité en '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Jn 19.36
        metadata:
          usfm: JHN.19.36
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: Le malheur fera mourir le méchant,
- type: usfm
  marker: q1
  children:
  - type: text
    text: les ennemis du juste ╵porteront leur condamnation,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: mais l’Eternel ╵sauve la vie ╵de tous ses serviteurs,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et ceux dont il est le refuge ╵ne seront jamais condamnés.
