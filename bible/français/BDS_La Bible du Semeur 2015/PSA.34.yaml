document_id: PSA.34,21
type_code: fra
verses:
  '1':
  - type: heading
    content: Le Seigneur m’a délivréPsaume alphabétique (cf. note 9.1).
  - type: text
    content: Un psaume de David lorsqu’il simula la folie en présence d’Abimélek qui le chassa, de sorte que David put s’en aller
  - type: note
    content: Voir 1 S 21.11-16.
  - type: text
    content: .
  '10':
  - type: text
    content: Craignez donc l’Eternel, ╵vous, membres de son peuple saint,
  - type: text
    content: car pour ceux qui le craignent, ╵il n’y a pas de manque !
  '11':
  - type: text
    content: Le lion
  - type: note
    content: 'L’ancienne version grecque et la version syriaque ont : le riche.'
  - type: text
    content: ' peut connaître ╵la disette et la faim,'
  - type: text
    content: mais pour ceux qui se tournent ╵vers l’Eternel, ╵il ne manquera aucun bien.
  '12':
  - type: text
    content: Venez, mes fils, écoutez-moi,
  - type: text
    content: et je vous apprendrai ╵à craindre l’Eternel
  - type: note
    content: Formule traditionnelle des maîtres qui enseignent la sagesse à leurs disciples appelés leurs fils (voir Pr 1.8, 10 ; 2.1).
  - type: text
    content: .
  '13':
  - type: text
    content: Qui désire une longue vie ?
  - type: text
    content: Qui souhaite vivre ╵de nombreux jours ╵pour goûter au bonheur
  - type: note
    content: Les v. 13-17 sont cités en 1 P 3.10-12.
  - type: text
    content: '  ?'
  '14':
  - type: text
    content: Qu’il veille sur sa langue ╵pour ne faire aucun mal,
  - type: text
    content: qu’aucun propos menteur ╵ne passe sur ses lèvres.
  '15':
  - type: text
    content: Détourne-toi du mal, ╵et fais ce qui est bien,
  - type: text
    content: cherche la paix avec ténacité.
  '16':
  - type: text
    content: Les yeux de l’Eternel ╵se tournent vers les justes,
  - type: text
    content: son oreille est tendue ╵pour écouter leurs cris.
  '17':
  - type: text
    content: Mais l’Eternel s’oppose ╵à ceux qui font le mal,
  - type: text
    content: pour ôter de la terre ╵jusqu’à leur souvenir.
  '18':
  - type: text
    content: Lorsque les hommes justes ╵lancent leurs cris vers lui, ╵l’Eternel les entend ;
  - type: text
    content: aussi, il les délivre ╵de toutes leurs détresses.
  '19':
  - type: text
    content: Car l’Eternel est proche ╵de ceux qui ont le cœur brisé.
  - type: text
    content: Il sauve ceux ╵qui ont un esprit abattu.
  '2':
  - type: text
    content: Je bénirai ╵l’Eternel en tout temps
  - type: text
    content: et à jamais, ╵mes lèvres le loueront.
  '20':
  - type: text
    content: De nombreux malheurs atteignent le juste
  - type: text
    content: mais l’Eternel le délivre de tous.
  '21':
  - type: text
    content: 'Il veille sur ses os :'
  - type: text
    content: aucun d’eux n’est brisé
  - type: note
    content: Cité en Jn 19.36.
  - type: text
    content: .
  '22':
  - type: text
    content: Le malheur fera mourir le méchant,
  - type: text
    content: les ennemis du juste ╵porteront leur condamnation,
  '23':
  - type: text
    content: mais l’Eternel ╵sauve la vie ╵de tous ses serviteurs,
  - type: text
    content: et ceux dont il est le refuge ╵ne seront jamais condamnés.
  '3':
  - type: text
    content: Mon sujet de fierté, ╵c’est l’Eternel !
  - type: text
    content: Que les humbles l’entendent ╵et qu’ils se réjouissent !
  '4':
  - type: text
    content: Venez proclamer avec moi ╵que l’Eternel est grand !
  - type: text
    content: Exaltons-le ensemble !
  '5':
  - type: text
    content: Moi, je me suis tourné ╵vers l’Eternel ╵et il m’a répondu.
  - type: text
    content: Oui, il m’a délivré ╵de toutes mes frayeurs.
  '6':
  - type: text
    content: Qui regarde vers lui ╵est rayonnant de joie
  - type: note
    content: 'Certains manuscrits hébreux et des versions anciennes ont : regardez vers lui et rayonnez de joie, et que vos visages ne rougissent plus de honte.'
  - type: text
    content: ','
  - type: text
    content: et son visage ╵n’aura pas à rougir de honte.
  '7':
  - type: text
    content: Un malheureux a appelé, ╵et l’Eternel a entendu,
  - type: text
    content: car il l’a délivré ╵de toutes ses détresses.
  '8':
  - type: text
    content: L’ange de l’Eternel
  - type: note
    content: Représentant de l’Eternel (35.5-6 ; Gn 16.7 ; 32.1-2 ; Ex 14.19 ; 2 R 6.14-23 ; 19.35), agissant en faveur du peuple de Dieu, assurant notamment sa protection.
  - type: text
    content: ' ╵campe autour de ceux qui le craignent,'
  - type: text
    content: et les délivre.
  '9':
  - type: text
    content: Goûtez et constatez ╵que l’Eternel est bon
  - type: note
    content: Réminiscence en 1 P 2.3.
  - type: text
    content: '  !'
  - type: text
    content: Oui, heureux l’homme ╵qui trouve son refuge en lui.
