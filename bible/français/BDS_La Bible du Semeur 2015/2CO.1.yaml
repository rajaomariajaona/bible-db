document_id: 2CO.1,21
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Salutation
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: Paul, apôtre de Jésus-Christ par la volonté de Dieu, et le frère Timothée, saluent l’Eglise de Dieu qui est à Corinthe
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1.1 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Cette lettre a été envoyée de Macédoine (voir note '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: '1.16'
        - type: text
          text: ) environ deux années après 1 Corinthiens.
      marker-yv: yv-n
    - type: text
      text: ' ainsi que tous les membres du peuple saint dans l’ensemble de l’Achaïe'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1.1 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Province romaine occupant la moitié sud de la Grèce.
      marker-yv: yv-n
    - type: text
      text: .
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'C’est lui qui nous a délivrés d’une telle mort et qui nous en délivrera encore. Oui, nous avons cette espérance en lui qu’il nous délivrera encore, '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: et vous y contribuez en priant pour nous. Ainsi, le don de la grâce qu’il nous accorde en réponse aux prières de beaucoup, sera aussi pour beaucoup une occasion de remercier Dieu à notre sujet.
  - type: usfm
    marker: ms1
    children:
    - type: text
      text: Les problèmes de relations entre Paul et les Corinthiens
    marker-yv: yv-h
  - type: usfm
    marker: s1
    children:
    - type: text
      text: L’ajournement de la visite de Paul
    marker-yv: yv-h
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: S’il est une chose dont nous pouvons être fiers, c’est le témoignage de notre conscience ; il nous atteste que nous nous sommes conduits dans le monde, et tout spécialement envers vous, avec la sincérité
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1.12 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Certains manuscrits ont : '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: sainteté.
      marker-yv: yv-n
    - type: text
      text: ' et la pureté qui viennent de Dieu, en nous fondant, non sur une sagesse purement humaine, mais sur la grâce de Dieu. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Car ce que nous vous écrivons dans nos lettres ne veut pas dire autre chose que ce que vous pouvez y lire et y comprendre. Et j’espère que vous le comprendrez pleinement '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '– comme vous l’avez déjà compris en partie : vous pouvez être fiers de nous, comme nous le serons de vous au jour de notre Seigneur Jésus.'
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Persuadé que telle était votre pensée, je m’étais proposé de me rendre chez vous en premier lieu, afin de vous procurer une double joie
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1.15 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Certains manuscrits ont : '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: un bienfait.
      marker-yv: yv-n
    - type: text
      text: '  : '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: je comptais passer par chez vous en allant en Macédoine, puis revenir de Macédoine
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1.16 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Province romaine occupant la moitié nord de la Grèce ; capitale : Thessalonique où il y avait une Eglise ainsi qu’à Philippes et à Bérée.'
      marker-yv: yv-n
    - type: text
      text: ' chez vous. Vous auriez alors pu m’aider à poursuivre mon voyage vers la Judée'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1.16 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Sur ce projet, voir '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: 1 Co 16.5-9
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: .
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: En formant ce projet, ai-je fait preuve de légèreté ? Ou bien mes plans seraient-ils inspirés par des motifs purement humains, en sorte que lorsque je dis « oui », cela pourrait être « non »
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1.17 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: On avait reproché à Paul de modifier ses plans de voyage au gré de sa fantaisie.
      marker-yv: yv-n
    - type: text
      text: '  ?'
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Aussi vrai que Dieu est digne de confiance, je vous le garantis : la parole que nous vous avons adressée n’est pas à la fois « oui » et « non ». '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Car Jésus-Christ, le Fils de Dieu, que moi-même comme Silvain
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1.19 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Appelé aussi Silas. Un collaborateur de Paul ayant fait partie, comme Timothée, de l’équipe qui avait évangélisé Corinthe (voir Ac 15.22-40 ; 16.19-29 ; 18.1-5 ; 1 P 5.12).
      marker-yv: yv-n
    - type: text
      text: ' et Timothée nous avons proclamé parmi vous, n’a pas été à la fois oui et non. En lui était le oui : '
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Que la grâce et la paix vous soient accordées par Dieu notre Père et par le Seigneur Jésus-Christ.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Prière de reconnaissance
    marker-yv: yv-h
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'car c’est en lui que Dieu a dit « oui » à tout ce qu’il avait promis. Aussi est-ce par lui que nous disons « oui », « amen », pour que la gloire revienne à Dieu. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'C’est Dieu, en effet, qui nous a fermement unis avec vous à Christ et qui nous a consacrés à lui par son onction. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Et c’est encore Dieu qui nous a marqués de son sceau, comme sa propriété, et qui a mis dans notre cœur son Esprit comme acompte des biens à venir.
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Pourquoi donc ne suis-je pas encore revenu à Corinthe ? J’en prends Dieu à témoin sur ma vie : c’est parce que je voulais vous ménager ; '
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: notre rôle n’est pas de dominer sur votre foi, mais de collaborer ensemble à votre joie, car vous tenez ferme dans la foi.
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Béni soit Dieu, le Père de notre Seigneur Jésus-Christ, le Père qui est plein de bonté, le Dieu qui réconforte dans toutes les situations. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Il nous réconforte dans toutes nos détresses, afin qu’à notre tour nous soyons capables de réconforter ceux qui passent par toutes sortes de détresses, en leur apportant le réconfort que Dieu nous a apporté.
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'De même, en effet, que les souffrances de Christ surabondent dans notre vie, le réconfort qu’il nous donne surabonde. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Si donc nous passons par la détresse, c’est pour votre réconfort et votre salut. Et si nous sommes réconfortés, c’est pour que vous receviez, vous aussi, du réconfort afin de pouvoir supporter les mêmes souffrances que celles que nous endurons.
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Et nous possédons à votre sujet une ferme espérance. Car nous savons que si vous avez part aux souffrances, vous avez aussi part au réconfort. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Il faut, en effet, que vous sachiez, frères et sœurs, quelle détresse nous avons connue dans la province d’Asie
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1.8 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Province romaine à l’ouest de l’Asie Mineure ; capitale : Ephèse. Nous ne savons pas à quelle épreuve l’apôtre fait allusion. C’était certainement un danger plus grave que l’épisode mentionné en '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: Ac 19.23-40
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: . Nous étions écrasés, à bout de forces, au point même que nous désespérions de conserver la vie.
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Nous avions accepté en nous-mêmes notre condamnation à mort. Cela nous a appris à ne pas mettre notre confiance en nous-mêmes, mais uniquement en Dieu qui ressuscite les morts. '
