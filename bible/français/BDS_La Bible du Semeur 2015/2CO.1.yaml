document_id: 2CO.1,21
type_code: fra
verses:
  '1':
  - type: heading
    content: Salutation
  - type: text
    content: Paul, apôtre de Jésus-Christ par la volonté de Dieu, et le frère Timothée, saluent l’Eglise de Dieu qui est à Corinthe
  - type: note
    content: Cette lettre a été envoyée de Macédoine (voir note 1.16) environ deux années après 1 Corinthiens.
  - type: text
    content: ' ainsi que tous les membres du peuple saint dans l’ensemble de l’Achaïe'
  - type: note
    content: Province romaine occupant la moitié sud de la Grèce.
  - type: text
    content: .
  '10':
  - type: text
    content: 'C’est lui qui nous a délivrés d’une telle mort et qui nous en délivrera encore. Oui, nous avons cette espérance en lui qu’il nous délivrera encore, '
  '11':
  - type: text
    content: et vous y contribuez en priant pour nous. Ainsi, le don de la grâce qu’il nous accorde en réponse aux prières de beaucoup, sera aussi pour beaucoup une occasion de remercier Dieu à notre sujet.
  - type: heading
    content: Les problèmes de relations entre Paul et les Corinthiens
  - type: heading
    content: L’ajournement de la visite de Paul
  '12':
  - type: text
    content: S’il est une chose dont nous pouvons être fiers, c’est le témoignage de notre conscience ; il nous atteste que nous nous sommes conduits dans le monde, et tout spécialement envers vous, avec la sincérité
  - type: note
    content: 'Certains manuscrits ont : sainteté.'
  - type: text
    content: ' et la pureté qui viennent de Dieu, en nous fondant, non sur une sagesse purement humaine, mais sur la grâce de Dieu. '
  '13':
  - type: text
    content: 'Car ce que nous vous écrivons dans nos lettres ne veut pas dire autre chose que ce que vous pouvez y lire et y comprendre. Et j’espère que vous le comprendrez pleinement '
  '14':
  - type: text
    content: '– comme vous l’avez déjà compris en partie : vous pouvez être fiers de nous, comme nous le serons de vous au jour de notre Seigneur Jésus.'
  '15':
  - type: text
    content: Persuadé que telle était votre pensée, je m’étais proposé de me rendre chez vous en premier lieu, afin de vous procurer une double joie
  - type: note
    content: 'Certains manuscrits ont : un bienfait.'
  - type: text
    content: '  : '
  '16':
  - type: text
    content: je comptais passer par chez vous en allant en Macédoine, puis revenir de Macédoine
  - type: note
    content: 'Province romaine occupant la moitié nord de la Grèce ; capitale : Thessalonique où il y avait une Eglise ainsi qu’à Philippes et à Bérée.'
  - type: text
    content: ' chez vous. Vous auriez alors pu m’aider à poursuivre mon voyage vers la Judée'
  - type: note
    content: Sur ce projet, voir 1 Co 16.5-9.
  - type: text
    content: .
  '17':
  - type: text
    content: En formant ce projet, ai-je fait preuve de légèreté ? Ou bien mes plans seraient-ils inspirés par des motifs purement humains, en sorte que lorsque je dis « oui », cela pourrait être « non »
  - type: note
    content: On avait reproché à Paul de modifier ses plans de voyage au gré de sa fantaisie.
  - type: text
    content: '  ?'
  '18':
  - type: text
    content: 'Aussi vrai que Dieu est digne de confiance, je vous le garantis : la parole que nous vous avons adressée n’est pas à la fois « oui » et « non ». '
  '19':
  - type: text
    content: Car Jésus-Christ, le Fils de Dieu, que moi-même comme Silvain
  - type: note
    content: Appelé aussi Silas. Un collaborateur de Paul ayant fait partie, comme Timothée, de l’équipe qui avait évangélisé Corinthe (voir Ac 15.22-40 ; 16.19-29 ; 18.1-5 ; 1 P 5.12).
  - type: text
    content: ' et Timothée nous avons proclamé parmi vous, n’a pas été à la fois oui et non. En lui était le oui : '
  '2':
  - type: text
    content: Que la grâce et la paix vous soient accordées par Dieu notre Père et par le Seigneur Jésus-Christ.
  - type: heading
    content: Prière de reconnaissance
  '20':
  - type: text
    content: 'car c’est en lui que Dieu a dit « oui » à tout ce qu’il avait promis. Aussi est-ce par lui que nous disons « oui », « amen », pour que la gloire revienne à Dieu. '
  '21':
  - type: text
    content: 'C’est Dieu, en effet, qui nous a fermement unis avec vous à Christ et qui nous a consacrés à lui par son onction. '
  '22':
  - type: text
    content: Et c’est encore Dieu qui nous a marqués de son sceau, comme sa propriété, et qui a mis dans notre cœur son Esprit comme acompte des biens à venir.
  '23':
  - type: text
    content: 'Pourquoi donc ne suis-je pas encore revenu à Corinthe ? J’en prends Dieu à témoin sur ma vie : c’est parce que je voulais vous ménager ; '
  '24':
  - type: text
    content: notre rôle n’est pas de dominer sur votre foi, mais de collaborer ensemble à votre joie, car vous tenez ferme dans la foi.
  '3':
  - type: text
    content: 'Béni soit Dieu, le Père de notre Seigneur Jésus-Christ, le Père qui est plein de bonté, le Dieu qui réconforte dans toutes les situations. '
  '4':
  - type: text
    content: Il nous réconforte dans toutes nos détresses, afin qu’à notre tour nous soyons capables de réconforter ceux qui passent par toutes sortes de détresses, en leur apportant le réconfort que Dieu nous a apporté.
  '5':
  - type: text
    content: 'De même, en effet, que les souffrances de Christ surabondent dans notre vie, le réconfort qu’il nous donne surabonde. '
  '6':
  - type: text
    content: Si donc nous passons par la détresse, c’est pour votre réconfort et votre salut. Et si nous sommes réconfortés, c’est pour que vous receviez, vous aussi, du réconfort afin de pouvoir supporter les mêmes souffrances que celles que nous endurons.
  '7':
  - type: text
    content: 'Et nous possédons à votre sujet une ferme espérance. Car nous savons que si vous avez part aux souffrances, vous avez aussi part au réconfort. '
  '8':
  - type: text
    content: Il faut, en effet, que vous sachiez, frères et sœurs, quelle détresse nous avons connue dans la province d’Asie
  - type: note
    content: 'Province romaine à l’ouest de l’Asie Mineure ; capitale : Ephèse. Nous ne savons pas à quelle épreuve l’apôtre fait allusion. C’était certainement un danger plus grave que l’épisode mentionné en Ac 19.23-40.'
  - type: text
    content: . Nous étions écrasés, à bout de forces, au point même que nous désespérions de conserver la vie.
  '9':
  - type: text
    content: 'Nous avions accepté en nous-mêmes notre condamnation à mort. Cela nous a appris à ne pas mettre notre confiance en nous-mêmes, mais uniquement en Dieu qui ressuscite les morts. '
