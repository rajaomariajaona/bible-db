document_id: 2CO.10,21
type_code: fra
verses:
  '1':
  - type: usfm
    marker: ms1
    children:
    - type: text
      text: Paul défend son apostolat
    marker-yv: yv-h
  - type: usfm
    marker: s1
    children:
    - type: text
      text: L’autorité de l’apôtre
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Moi, Paul, je suis, paraît-il, « timide » quand je suis présent parmi vous et « hardi » quand je suis absent, loin de vous. Mais c’est au nom de la douceur et de la bonté de Christ que je vous adresse cet appel : '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '« Ses lettres, dit-on, sont sévères et énergiques, mais lorsqu’il est là, c’est un faible et sa parole ne mérite pas l’attention. » '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Que celui qui tient ces propos en soit bien convaincu : nos actes, quand nous serons chez vous, seront conformes à ce que nous vous écrivons dans nos lettres quand nous sommes loin de vous.'
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Certes, nous n’aurions pas l’audace de nous prétendre égaux ou même comparables à certains qui se recommandent eux-mêmes ! La mesure avec laquelle ils se mesurent, c’est eux-mêmes, et ils ne se comparent à rien d’autre qu’à eux-mêmes. N’est-ce pas là une preuve de leur folie ?
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Quant à nous, nous ne nous laisserons pas aller à une fierté démesurée, mais nous prendrons comme mesure les limites du champ d’action que Dieu nous a confié. C’est ainsi que nous nous sommes rendus jusque chez vous. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Aussi ne dépassons-nous pas les limites de notre domaine comme si nous n’étions pas arrivés jusqu’à vous. Car nous sommes bien venus chez vous les premiers pour vous annoncer l’Evangile de Christ.
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Nous n’avons donc pas une fierté démesurée comme si nous nous vantions d’un travail accompli par d’autres. Au contraire, nous gardons l’espoir qu’avec les progrès de votre foi, notre œuvre grandira de plus en plus parmi vous, dans les limites de notre champ d’action.
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Nous pourrons ainsi annoncer l’Evangile dans les régions situées au-delà de chez vous, sans nous vanter du travail accompli par d’autres dans leur propre champ d’action.
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: qt
      children:
      - type: text
        text: Si quelqu’un veut éprouver de la fierté, qu’il place sa fierté dans le Seigneur,
    - type: text
      text: ' déclare l’Ecriture'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '10.17 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Jr 9.23 ; 1 Co 1.31.
      marker-yv: yv-n
    - type: text
      text: '. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ainsi, celui qui est approuvé, ce n’est pas l’homme qui se recommande lui-même, mais celui que le Seigneur recommande.
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: je vous en prie, ne m’obligez pas, lorsque je serai chez vous, à me montrer « hardi ». Car je compte faire preuve de mon assurance et agir avec « audace » envers certains qui jugent notre conduite « trop humaine ».
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Sans doute, nous sommes des hommes et nous vivons comme tels, mais nous ne menons pas notre combat d’une manière purement humaine. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Car les armes avec lesquelles nous combattons ne sont pas simplement humaines ; elles tiennent leur puissance de Dieu qui les rend capables de renverser des forteresses. Oui, nous renversons les faux raisonnements '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'ainsi que tout ce qui se dresse présomptueusement contre la connaissance de Dieu, et nous faisons prisonnière toute pensée pour l’amener à obéir à Christ. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Aussi sommes-nous prêts à punir toute désobéissance dès que votre obéissance sera entière.
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Regardez donc la réalité en face. Si quelqu’un se persuade d’appartenir à Christ, qu’il soit vraiment convaincu de ceci : nous appartenons à Christ, nous aussi, tout autant que lui !'
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Et même si je me montre un peu trop fier de l’autorité que le Seigneur nous a donnée '
    - type: usfm
      marker: qt
      children:
      - type: text
        text: pour construire
    - type: text
      text: ' et non '
    - type: usfm
      marker: qt
      children:
      - type: text
        text: pour renverser
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '10.8 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Voir '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: '13.10'
        - type: text
          text: ' et '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: Jr 1.10
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: ', je n’en rougirai pas. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Car je ne veux pas passer pour quelqu’un qui ne serait capable d’intimider que par des lettres, comme on le prétend : '
