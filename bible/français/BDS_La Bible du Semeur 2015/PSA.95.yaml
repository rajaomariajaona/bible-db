document_id: PSA.95
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Il tient l’univers dans ses mains
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Venez, crions notre joie ╵en l’honneur de l’Eternel !
- type: usfm
  marker: q1
  children:
  - type: text
    text: Acclamons notre rocher ╵car il est notre Sauveur !
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Présentons-nous devant lui ╵avec des prières ╵de reconnaissance.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Acclamons-le en musique.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: L’Eternel est le grand Dieu,
- type: usfm
  marker: q1
  children:
  - type: text
    text: il est le grand Roi ╵au-dessus de tous les dieux.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: C’est lui qui tient dans sa main ╵les profondeurs de la terre,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et les cimes des montagnes ╵sont aussi à lui.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'A lui appartient la mer : ╵c’est lui qui l’a faite ;'
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'à lui est le continent : ╵ses mains l’ont formé.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Venez et prosternons-nous,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ployons les genoux ╵devant l’Eternel ╵qui nous a créés.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Il est notre Dieu,
- type: usfm
  marker: q1
  children:
  - type: text
    text: nous sommes le peuple ╵de son pâturage
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '95.7 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Les rois étaient souvent appelés les bergers de leur peuple, leur royaume était leur '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'pâturage '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '(Jr 25.36 ; 49.19-20 ; 50.44-45). La même image s’applique à Dieu, le Roi-Berger suprême (voir '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '23.1'
        metadata:
          usfm: PSA.23.1
      - type: text
        text: ).
    marker-yv: yv-n
  - type: text
    text: ','
- type: usfm
  marker: q1
  children:
  - type: text
    text: le troupeau ╵que sa main conduit.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Aujourd’hui, ╵si vous entendez sa voix
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '95.7 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Les v. 7b-8 sont cités, d’après l’ancienne version grecque, en '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Hé 3.15
        metadata:
          usfm: HEB.3.15
      - type: text
        text: ' et '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '4.7'
        metadata:
          usfm: HEB.4.7
      - type: text
        text: ', et les v. 7b-11 en '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Hé 3.7-11
        metadata:
          usfm: HEB.3.7+HEB.3.8+HEB.3.9+HEB.3.10+HEB.3.11
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: ','
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: ne vous endurcissez pas ╵comme à Meriba,
- type: usfm
  marker: q1
  children:
  - type: text
    text: comme au jour de l’incident ╵de Massa dans le désert
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '95.8 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Voir Ex 17.7 ; Nb 20.1-3.
    marker-yv: yv-n
  - type: text
    text: ','
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: où vos ancêtres m’ont provoqué,
- type: usfm
  marker: q1
  children:
  - type: text
    text: voulant me forcer la main, ╵bien qu’ils m’aient vu à l’action.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Pendant quarante ans
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '95.10 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Voir '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Nb 14.33-34
        metadata:
          usfm: NUM.14.33+NUM.14.34
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: ', ╵j’ai éprouvé du dégoût ╵pour cette génération,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'et j’ai dit alors : ╵C’est un peuple égaré par son cœur,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: et qui ne fait aucun cas ╵des voies que je lui prescris.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'C’est pourquoi, dans ma colère, ╵j’ai fait ce serment :'
- type: usfm
  marker: q1
  children:
  - type: text
    text: ils n’entreront pas dans le lieu de repos
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '95.11 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Voir '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Dt 12.9-10
        metadata:
          usfm: DEU.12.9+DEU.12.10
      - type: text
        text: '. Le terme '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'repos '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'a été traduit ailleurs par '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'existence paisible. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Il s’agit de la paix que l’Eternel voulait donner à son peuple dans le pays promis, en le libérant de tous ses ennemis, si celui-ci se montrait fidèle (
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Dt 12.9-10
        metadata:
          usfm: DEU.12.9+DEU.12.10
      - type: text
        text: ).
    marker-yv: yv-n
  - type: text
    text: ' ╵que j’avais prévu pour eux.'
