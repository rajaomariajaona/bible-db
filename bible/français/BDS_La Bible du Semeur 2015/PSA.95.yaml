document_id: PSA.95,21
type_code: fra
verses:
  '1':
  - type: heading
    content: Il tient l’univers dans ses mains
  - type: text
    content: Venez, crions notre joie ╵en l’honneur de l’Eternel !
  - type: text
    content: Acclamons notre rocher ╵car il est notre Sauveur !
  '10':
  - type: text
    content: Pendant quarante ans
  - type: note
    content: Voir Nb 14.33-34.
  - type: text
    content: ', ╵j’ai éprouvé du dégoût ╵pour cette génération,'
  - type: text
    content: 'et j’ai dit alors : ╵C’est un peuple égaré par son cœur,'
  - type: text
    content: et qui ne fait aucun cas ╵des voies que je lui prescris.
  '11':
  - type: text
    content: 'C’est pourquoi, dans ma colère, ╵j’ai fait ce serment :'
  - type: text
    content: ils n’entreront pas dans le lieu de repos
  - type: note
    content: Voir Dt 12.9-10. Le terme repos a été traduit ailleurs par existence paisible. Il s’agit de la paix que l’Eternel voulait donner à son peuple dans le pays promis, en le libérant de tous ses ennemis, si celui-ci se montrait fidèle (Dt 12.9-10).
  - type: text
    content: ' ╵que j’avais prévu pour eux.'
  '2':
  - type: text
    content: Présentons-nous devant lui ╵avec des prières ╵de reconnaissance.
  - type: text
    content: Acclamons-le en musique.
  '3':
  - type: text
    content: L’Eternel est le grand Dieu,
  - type: text
    content: il est le grand Roi ╵au-dessus de tous les dieux.
  '4':
  - type: text
    content: C’est lui qui tient dans sa main ╵les profondeurs de la terre,
  - type: text
    content: et les cimes des montagnes ╵sont aussi à lui.
  '5':
  - type: text
    content: 'A lui appartient la mer : ╵c’est lui qui l’a faite ;'
  - type: text
    content: 'à lui est le continent : ╵ses mains l’ont formé.'
  '6':
  - type: text
    content: Venez et prosternons-nous,
  - type: text
    content: ployons les genoux ╵devant l’Eternel ╵qui nous a créés.
  '7':
  - type: text
    content: Il est notre Dieu,
  - type: text
    content: nous sommes le peuple ╵de son pâturage
  - type: note
    content: Les rois étaient souvent appelés les bergers de leur peuple, leur royaume était leur pâturage (Jr 25.36 ; 49.19-20 ; 50.44-45). La même image s’applique à Dieu, le Roi-Berger suprême (voir 23.1).
  - type: text
    content: ','
  - type: text
    content: le troupeau ╵que sa main conduit.
  - type: text
    content: Aujourd’hui, ╵si vous entendez sa voix
  - type: note
    content: Les v. 7b-8 sont cités, d’après l’ancienne version grecque, en Hé 3.15 et 4.7, et les v. 7b-11 en Hé 3.7-11.
  - type: text
    content: ','
  '8':
  - type: text
    content: ne vous endurcissez pas ╵comme à Meriba,
  - type: text
    content: comme au jour de l’incident ╵de Massa dans le désert
  - type: note
    content: Voir Ex 17.7 ; Nb 20.1-3.
  - type: text
    content: ','
  '9':
  - type: text
    content: où vos ancêtres m’ont provoqué,
  - type: text
    content: voulant me forcer la main, ╵bien qu’ils m’aient vu à l’action.
