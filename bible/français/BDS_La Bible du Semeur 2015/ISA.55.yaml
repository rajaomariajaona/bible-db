document_id: ISA.55,21
type_code: fra
verses:
  '1':
  - type: heading
    content: L’offre et l’appel universels
  - type: heading
    content: Le festin gratuit
  - type: text
    content: Vous tous qui avez soif,
  - type: text
    content: venez chercher de l’eau !
  - type: text
    content: Et même vous ╵qui n’avez pas d’argent,
  - type: text
    content: venez, achetez et mangez !
  - type: text
    content: Venez acheter sans argent, ╵oui, sans paiement,
  - type: text
    content: du vin, du lait
  - type: note
    content: Réminiscence en Ap 21.6 ; 22.17.
  - type: text
    content: '  !'
  '10':
  - type: text
    content: Or, la pluie et la neige ╵qui descendent du ciel
  - type: text
    content: n’y retournent jamais
  - type: text
    content: sans avoir arrosé ╵et fécondé la terre,
  - type: text
    content: sans avoir fait germer ╵les graines qui s’y trouvent,
  - type: text
    content: sans fournir au semeur ╵le grain qu’il doit semer,
  - type: text
    content: et sans donner du pain ╵à tous ceux qui le mangent
  - type: note
    content: Réminiscence en 2 Co 9.10.
  - type: text
    content: .
  '11':
  - type: text
    content: 'Il en sera de même ╵de la parole que j’ai prononcée :'
  - type: text
    content: elle ne reviendra ╵jamais vers moi à vide,
  - type: text
    content: sans avoir accompli ╵ce que je désirais
  - type: text
    content: et sans avoir atteint le but
  - type: text
    content: que je lui ai fixé.
  '12':
  - type: text
    content: Car vous sortirez pleins de joie,
  - type: text
    content: vous serez conduits dans la paix.
  - type: text
    content: Montagnes et collines
  - type: text
    content: éclateront en cris de joie ╵devant vos pas.
  - type: text
    content: Tous les arbres des champs ╵applaudiront.
  '13':
  - type: text
    content: Où croissent les broussailles ╵poussera le cyprès,
  - type: text
    content: et au lieu des orties ╵croîtra le myrte.
  - type: text
    content: Ce sera un titre de gloire ╵pour l’Eternel
  - type: text
    content: et un signe perpétuel
  - type: text
    content: qui ne disparaîtra jamais.
  '2':
  - type: text
    content: Pourquoi dépensez-vous ╵votre argent pour payer
  - type: text
    content: ce qui ne nourrit pas ?
  - type: text
    content: Pourquoi travaillez-vous
  - type: text
    content: pour une nourriture ╵qui ne rassasie pas ?
  - type: text
    content: Ecoutez, oui, écoutez-moi,
  - type: text
    content: alors vous mangerez ╵ce qui est bon,
  - type: text
    content: vous vous délecterez ╵d’aliments savoureux.
  '3':
  - type: text
    content: Tendez l’oreille, ╵venez à moi,
  - type: text
    content: écoutez-moi ╵et vous vivrez.
  - type: text
    content: Car je conclurai avec vous ╵une alliance éternelle,
  - type: text
    content: j’accomplirai pour vous ╵avec fidélité ╵les œuvres bienveillantes ╵que j’ai promises à David
  - type: note
    content: Cité en Ac 13.34 d’après l’ancienne version grecque.
  - type: text
    content: .
  '4':
  - type: text
    content: Voici, j’ai fait de lui ╵un témoin pour les peuples,
  - type: text
    content: un chef pour commander aux peuples.
  '5':
  - type: text
    content: Oui, tu appelleras ╵une nation que tu ne connais pas ;
  - type: text
    content: une nation qui ne te connaît pas ╵va accourir vers toi ;
  - type: text
    content: c’est à cause de moi, ╵moi, l’Eternel ton Dieu,
  - type: text
    content: moi, le Saint d’Israël,
  - type: text
    content: qui te couvre de gloire.
  '6':
  - type: text
    content: Tournez-vous donc vers l’Eternel,
  - type: text
    content: tant qu’on peut le trouver.
  - type: text
    content: Adressez-vous à lui
  - type: text
    content: tant qu’il est proche !
  '7':
  - type: text
    content: Que le coupable ╵abandonne sa voie,
  - type: text
    content: et l’homme malfaisant ╵ses mauvaises pensées !
  - type: text
    content: Et qu’il revienne à l’Eternel
  - type: text
    content: qui aura compassion de lui,
  - type: text
    content: à notre Dieu
  - type: text
    content: qui lui accordera ╵un pardon généreux.
  '8':
  - type: text
    content: Car vos pensées ╵ne sont pas mes pensées,
  - type: text
    content: et vos voies ne sont pas les voies ╵que j’ai prescrites,
  - type: text
    content: déclare l’Eternel ;
  '9':
  - type: text
    content: autant le ciel est élevé ╵au-dessus de la terre,
  - type: text
    content: autant les voies que je vous ai prescrites ╵sont élevées au-dessus de vos voies,
  - type: text
    content: et autant mes pensées ╵sont élevées loin au-dessus des vôtres.
