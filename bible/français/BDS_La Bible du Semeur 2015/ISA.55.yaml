document_id: ISA.55,21
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: L’offre et l’appel universels
    marker-yv: yv-h
  - type: usfm
    marker: s2
    children:
    - type: text
      text: Le festin gratuit
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: Vous tous qui avez soif,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: venez chercher de l’eau !
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et même vous ╵qui n’avez pas d’argent,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: venez, achetez et mangez !
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Venez acheter sans argent, ╵oui, sans paiement,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: du vin, du lait
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '55.1 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Réminiscence en Ap 21.6 ; 22.17.
      marker-yv: yv-n
    - type: text
      text: '  !'
  '10':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: Or, la pluie et la neige ╵qui descendent du ciel
  - type: usfm
    marker: q1
    children:
    - type: text
      text: n’y retournent jamais
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sans avoir arrosé ╵et fécondé la terre,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sans avoir fait germer ╵les graines qui s’y trouvent,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sans fournir au semeur ╵le grain qu’il doit semer,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et sans donner du pain ╵à tous ceux qui le mangent
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '55.10 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Réminiscence en '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: 2 Co 9.10
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: .
  '11':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'Il en sera de même ╵de la parole que j’ai prononcée :'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: elle ne reviendra ╵jamais vers moi à vide,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sans avoir accompli ╵ce que je désirais
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et sans avoir atteint le but
  - type: usfm
    marker: q1
    children:
    - type: text
      text: que je lui ai fixé.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: Car vous sortirez pleins de joie,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: vous serez conduits dans la paix.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Montagnes et collines
  - type: usfm
    marker: q1
    children:
    - type: text
      text: éclateront en cris de joie ╵devant vos pas.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tous les arbres des champs ╵applaudiront.
  '13':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: Où croissent les broussailles ╵poussera le cyprès,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et au lieu des orties ╵croîtra le myrte.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ce sera un titre de gloire ╵pour l’Eternel
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et un signe perpétuel
  - type: usfm
    marker: q1
    children:
    - type: text
      text: qui ne disparaîtra jamais.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: Pourquoi dépensez-vous ╵votre argent pour payer
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ce qui ne nourrit pas ?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Pourquoi travaillez-vous
  - type: usfm
    marker: q1
    children:
    - type: text
      text: pour une nourriture ╵qui ne rassasie pas ?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ecoutez, oui, écoutez-moi,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: alors vous mangerez ╵ce qui est bon,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: vous vous délecterez ╵d’aliments savoureux.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: Tendez l’oreille, ╵venez à moi,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: écoutez-moi ╵et vous vivrez.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Car je conclurai avec vous ╵une alliance éternelle,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: j’accomplirai pour vous ╵avec fidélité ╵les œuvres bienveillantes ╵que j’ai promises à David
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '55.3 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Cité en '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: Ac 13.34
        - type: text
          text: ' d’après l’ancienne version grecque.'
      marker-yv: yv-n
    - type: text
      text: .
  '4':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: Voici, j’ai fait de lui ╵un témoin pour les peuples,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: un chef pour commander aux peuples.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: Oui, tu appelleras ╵une nation que tu ne connais pas ;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: une nation qui ne te connaît pas ╵va accourir vers toi ;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: c’est à cause de moi, ╵moi, l’Eternel ton Dieu,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: moi, le Saint d’Israël,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: qui te couvre de gloire.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: Tournez-vous donc vers l’Eternel,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: tant qu’on peut le trouver.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Adressez-vous à lui
  - type: usfm
    marker: q1
    children:
    - type: text
      text: tant qu’il est proche !
  '7':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: Que le coupable ╵abandonne sa voie,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et l’homme malfaisant ╵ses mauvaises pensées !
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et qu’il revienne à l’Eternel
  - type: usfm
    marker: q1
    children:
    - type: text
      text: qui aura compassion de lui,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: à notre Dieu
  - type: usfm
    marker: q1
    children:
    - type: text
      text: qui lui accordera ╵un pardon généreux.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: Car vos pensées ╵ne sont pas mes pensées,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et vos voies ne sont pas les voies ╵que j’ai prescrites,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: déclare l’Eternel ;
  '9':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: autant le ciel est élevé ╵au-dessus de la terre,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: autant les voies que je vous ai prescrites ╵sont élevées au-dessus de vos voies,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et autant mes pensées ╵sont élevées loin au-dessus des vôtres.
