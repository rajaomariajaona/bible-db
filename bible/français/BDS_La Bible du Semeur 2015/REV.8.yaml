document_id: REV.8,21
type_code: fra
verses:
  '1':
  - type: heading
    content: 'Ouverture du septième sceau : un grand silence'
  - type: text
    content: Quand l’Agneau ouvrit le septième sceau, il se fit dans le ciel un silence d’environ une demi-heure.
  - type: heading
    content: Les sept trompettes
  '10':
  - type: text
    content: 'Le troisième ange sonna de la trompette : un grand astre enflammé, une sorte de globe de feu, tomba du ciel sur le tiers des fleuves et sur les sources d’eau. '
  '11':
  - type: text
    content: Cet astre se nomme « Absinthe ». Le tiers des eaux se transforma en un liquide amer comme l’absinthe et beaucoup d’hommes moururent pour avoir bu ces eaux parce qu’elles étaient devenues amères.
  '12':
  - type: text
    content: 'Le quatrième ange sonna de la trompette : le tiers du soleil, le tiers de la lune et le tiers des étoiles furent frappés, de sorte que le tiers de leur lumière s’éteignit, et la clarté du jour, comme celle de la nuit, diminua d’un tiers.'
  - type: heading
    content: L’annonce de trois malheurs
  '13':
  - type: text
    content: 'Alors je vis un aigle qui planait au zénith et je l’entendis crier d’une voix forte : Malheur, malheur, malheur aux habitants de la terre, quand retentiront les trois trompettes que les trois derniers anges vont faire sonner !'
  '2':
  - type: text
    content: Alors je vis les sept anges qui se tiennent devant Dieu. Sept trompettes leur furent données.
  '3':
  - type: text
    content: 'Un autre ange vint et se plaça sur l’autel. Il portait un encensoir d’or. On lui remit de nombreux parfums pour les offrir sur l’autel d’or devant le trône avec les prières des membres du peuple saint. '
  '4':
  - type: text
    content: Et, de la main de l’ange, la fumée des parfums s’éleva devant Dieu, avec les prières des membres du peuple saint.
  '5':
  - type: text
    content: L’ange prit l’encensoir, le remplit de braises ardentes prises sur l’autel et le lança sur la terre. Il y eut alors des coups de tonnerre, des voix, des éclairs et un tremblement de terre.
  '6':
  - type: text
    content: Alors les sept anges qui tenaient les sept trompettes s’apprêtèrent à en sonner.
  - type: heading
    content: Les quatre premières trompettes
  '7':
  - type: text
    content: 'Le premier ange sonna de la trompette : aussitôt de la grêle'
  - type: note
    content: Ces fléaux rappellent les plaies d’Egypte (comparer Ex 9.13-25).
  - type: text
    content: ' mêlée de feu et de sang s’abattit sur la terre. Le tiers de la terre fut brûlé, le tiers des arbres fut brûlé et toute plante verte fut brûlée.'
  '8':
  - type: text
    content: 'Le deuxième ange sonna de la trompette : une énorme masse incandescente ressemblant à une montagne embrasée fut précipitée dans la mer. Le tiers de la mer devint comme du sang. '
  '9':
  - type: text
    content: Le tiers des créatures vivantes dans la mer périrent et le tiers des bateaux furent détruits.
