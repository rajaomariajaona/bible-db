document_id: REV.8
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: 'Ouverture du septième sceau : un grand silence'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Quand l’Agneau ouvrit le septième sceau, il se fit dans le ciel un silence d’environ une demi-heure.
- type: usfm
  marker: ms1
  children:
  - type: text
    text: Les sept trompettes
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Alors je vis les sept anges qui se tiennent devant Dieu. Sept trompettes leur furent données.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Un autre ange vint et se plaça sur l’autel. Il portait un encensoir d’or. On lui remit de nombreux parfums pour les offrir sur l’autel d’or devant le trône avec les prières des membres du peuple saint. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Et, de la main de l’ange, la fumée des parfums s’éleva devant Dieu, avec les prières des membres du peuple saint.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: L’ange prit l’encensoir, le remplit de braises ardentes prises sur l’autel et le lança sur la terre. Il y eut alors des coups de tonnerre, des voix, des éclairs et un tremblement de terre.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Alors les sept anges qui tenaient les sept trompettes s’apprêtèrent à en sonner.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Les quatre premières trompettes
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Le premier ange sonna de la trompette : aussitôt de la grêle'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '8.7 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Ces fléaux rappellent les plaies d’Egypte (comparer '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ex 9.13-25
        metadata:
          usfm: EXO.9.13+EXO.9.14+EXO.9.15+EXO.9.16+EXO.9.17+EXO.9.18+EXO.9.19+EXO.9.20+EXO.9.21+EXO.9.22+EXO.9.23+EXO.9.24+EXO.9.25
      - type: text
        text: ).
    marker-yv: yv-n
  - type: text
    text: ' mêlée de feu et de sang s’abattit sur la terre. Le tiers de la terre fut brûlé, le tiers des arbres fut brûlé et toute plante verte fut brûlée.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Le deuxième ange sonna de la trompette : une énorme masse incandescente ressemblant à une montagne embrasée fut précipitée dans la mer. Le tiers de la mer devint comme du sang. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Le tiers des créatures vivantes dans la mer périrent et le tiers des bateaux furent détruits.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Le troisième ange sonna de la trompette : un grand astre enflammé, une sorte de globe de feu, tomba du ciel sur le tiers des fleuves et sur les sources d’eau. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Cet astre se nomme « Absinthe ». Le tiers des eaux se transforma en un liquide amer comme l’absinthe et beaucoup d’hommes moururent pour avoir bu ces eaux parce qu’elles étaient devenues amères.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Le quatrième ange sonna de la trompette : le tiers du soleil, le tiers de la lune et le tiers des étoiles furent frappés, de sorte que le tiers de leur lumière s’éteignit, et la clarté du jour, comme celle de la nuit, diminua d’un tiers.'
- type: usfm
  marker: s1
  children:
  - type: text
    text: L’annonce de trois malheurs
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Alors je vis un aigle qui planait au zénith et je l’entendis crier d’une voix forte : Malheur, malheur, malheur aux habitants de la terre, quand retentiront les trois trompettes que les trois derniers anges vont faire sonner !'
