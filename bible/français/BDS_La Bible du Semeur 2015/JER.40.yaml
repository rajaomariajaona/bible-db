document_id: JER.40,21
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: En Judée pendant le siège
    marker-yv: yv-h
  - type: usfm
    marker: s2
    children:
    - type: text
      text: Le sort de Jérémie
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: Voici ce que l’Eternel dit à Jérémie lorsqu’il s’adressa à lui après que Nebouzaradân, le chef de la garde, l’eut renvoyé à Rama. Celui-ci l’avait en effet trouvé enchaîné au milieu de tous les captifs de Jérusalem et de Juda que l’on déportait à Babylone
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '40.1 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Soit '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: 40.1-6
        - type: text
          text: ' développe ce qui est résumé en '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: '39.14'
        - type: text
          text: ', soit Jérémie a été arrêté par mégarde après sa libération de la cour de garde.'
      marker-yv: yv-n
    - type: text
      text: '. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Moi, je vais m’installer à Mitspa pour vous représenter auprès des Chaldéens lorsqu’ils viendront nous trouver. Mais vous autres, faites les récoltes de vin, des fruits d’été et d’huile
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '40.10 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Nebouzaradân (
        - type: usfm
          marker: ref
          children:
          - type: text
            text: '39.9'
        - type: text
          text: ) arriva à Jérusalem en août 587 av. J.-C. (
        - type: usfm
          marker: ref
          children:
          - type: text
            text: '52.12'
        - type: text
          text: ). Les récoltes mentionnées se font en Israël en août et septembre.
      marker-yv: yv-n
    - type: text
      text: ', et faites-en provision. Installez-vous dans les villes que vous occupez.'
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Tous les autres Judéens, qui s’étaient réfugiés dans le pays de Moab, chez les Ammonites, en Edom et dans tous les autres pays d’alentour, apprirent aussi que le roi de Babylone avait laissé un reste de la population dans le territoire de Juda et qu’il avait établi sur eux comme gouverneur Guedalia, fils d’Ahiqam et petit-fils de Shaphân.
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Alors tous les Judéens revinrent de tous les lieux où ils avaient été dispersés ; ils revinrent en Juda et se rendirent auprès de Guedalia à Mitspa. Ils firent une abondante récolte de vin et des fruits d’été.
  - type: usfm
    marker: s2
    children:
    - type: text
      text: L’assassinat du gouverneur
    marker-yv: yv-h
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Yohanân, fils de Qaréah, et tous les chefs de l’armée qui se trouvaient dans la campagne, vinrent trouver Guedalia à Mitspa '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'et lui dirent : Ne sais-tu donc pas que Baalis, le roi des Ammonites, a chargé Ismaël, fils de Netania, de t’assassiner'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '40.14 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Baalis
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: ', '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: le roi des Ammonites, voulait sans doute provoquer une rébellion en vue de polariser l’attention des Babyloniens sur Juda, pour éviter la conquête de son pays, jusque-là épargné par les armées babyloniennes. Ismaël, qui était de descendance royale (
        - type: usfm
          marker: ref
          children:
          - type: text
            text: '41.1'
        - type: text
          text: ), se prête peut-être à ce complot par jalousie envers Guedalia qui l’a supplanté à ce poste, ou parce qu’il le considère comme un usurpateur du trône et un traître (pro-babylonien).
      marker-yv: yv-n
    - type: text
      text: '  ?'
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Mais Guedalia, fils d’Ahiqam, ne voulut pas les croire. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Yohanân, fils de Qaréah, dit même en secret à Guedalia, à Mitspa : Laisse-moi aller tuer Ismaël, fils de Netania ! Personne ne le saura. Pourquoi le laisser t’assassiner ? Pourquoi faudrait-il que tous les Juifs qui se sont regroupés autour de toi soient dispersés et que ce qui reste de Juda périsse ?'
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Mais Guedalia, fils d’Ahiqam, répondit à Yohanân, fils de Qaréah : Ne fais pas une chose pareille, car ce que tu racontes au sujet d’Ismaël est faux.'
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Le chef de la garde l’avait donc fait retirer du convoi et lui avait dit : L’Eternel ton Dieu avait annoncé que ce malheur viendrait sur ce lieu, '
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'et maintenant il l’a fait venir et a réalisé ainsi ce qu’il avait annoncé. Cela vous est arrivé parce que vous vous êtes rendus coupables envers l’Eternel, et que vous ne lui avez pas obéi. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Maintenant, vois, je détache aujourd’hui les chaînes de tes poignets. Si tu le juges bon, viens avec moi à Babylone, et je prendrai soin de toi. Mais si tu préfères ne pas me suivre à Babylone, reste ici. Vois : tout le pays est devant toi ; va où bon te semblera et où il te conviendra d’aller.'
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Comme Jérémie hésitait à répondre
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '40.5 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Autre traduction : '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: ne s’en allait pas.
      marker-yv: yv-n
    - type: text
      text: ', Nebouzaradân lui dit : Retourne auprès de Guedalia, fils d’Ahiqam, et petit-fils de Shaphân, à qui le roi de Babylone a confié la responsabilité des villes de Juda, et demeure avec lui au milieu du peuple, ou bien va où bon te semblera.'
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Puis le chef de la garde lui donna des vivres, lui offrit un présent et prit congé de lui. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Jérémie se rendit donc auprès de Guedalia, fils d’Ahiqam, à Mitspa
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '40.6 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Mitspa
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: ': '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: à quelques kilomètres au nord-ouest de Jérusalem, dans le territoire de Benjamin (voir 1 S 7.16 ; 10.17 ; 1 R 15.22).
      marker-yv: yv-n
    - type: text
      text: ', et il demeura avec lui parmi le peuple qui avait été laissé dans le pays.'
  - type: usfm
    marker: s2
    children:
    - type: text
      text: Les Judéens dispersés reviennent dans leur pays
    marker-yv: yv-h
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Lorsque tous les chefs de l’armée, qui s’étaient dispersés dans la campagne, et leurs hommes apprirent que le roi de Babylone avait nommé Guedalia, fils d’Ahiqam, comme gouverneur du pays, et qu’il lui avait confié les hommes, les femmes et les enfants, et les gens pauvres du pays qui n’avaient pas été déportés à Babylone
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '40.7 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Pour '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: '40.7'
        - type: text
          text: ' à '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: '41.8'
        - type: text
          text: ', voir '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: 2 R 25.22-26
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: ', '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ils allèrent trouver Guedalia à Mitspa. C’étaient Ismaël, fils de Netania, Yohanân et Jonathan, fils de Qaréah, Seraya, fils de Tanhoumeth, les fils d’Ephaï de Netopha et Yezania, fils d’un Maakathien
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '40.8 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Netopha
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: ': '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'près de Bethléhem (voir 1 Ch 2.54 ; Esd 2.22). '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Maakathien
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: ': '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: de Maaka, au nord du Basan, au-delà du Jourdain (Dt 3.14 ; Jos 12.5).
      marker-yv: yv-n
    - type: text
      text: '. Ils vinrent, accompagnés de leurs hommes. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Guedalia, fils d’Ahiqam, petit-fils de Shaphân, leur déclara avec serment, à eux et à leurs hommes : Vous n’avez rien à craindre en vous soumettant aux Chaldéens ; installez-vous dans le pays, soumettez-vous au roi de Babylone et tout ira bien pour vous. '
