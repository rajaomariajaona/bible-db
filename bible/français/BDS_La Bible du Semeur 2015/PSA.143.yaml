document_id: PSA.143,21
type_code: fra
verses:
  '1':
  - type: heading
    content: Conduis-moi dans tes voies !
  - type: text
    content: Psaume de David.
  - type: text
    content: O Eternel, ╵écoute ma prière,
  - type: text
    content: prête l’oreille ╵à mes supplications !
  - type: text
    content: Tu es fidèle ╵et tu es juste, ╵réponds-moi donc !
  '10':
  - type: text
    content: Enseigne-moi ╵à accomplir ╵ce qui te plaît,
  - type: text
    content: car tu es mon Dieu !
  - type: text
    content: 'Que ton Esprit qui est bon me conduise ╵sur un sol aplani :'
  '11':
  - type: text
    content: Par égard pour ta renommée, ╵ô Eternel, ╵garde ma vie,
  - type: text
    content: toi qui es juste ; ╵délivre-moi ╵de la détresse.
  '12':
  - type: text
    content: Dans ton amour, ╵tu détruiras mes ennemis,
  - type: text
    content: et tu feras périr ╵tous mes persécuteurs,
  - type: text
    content: car moi, je suis ╵ton serviteur.
  '2':
  - type: text
    content: N’entre pas en procès ╵avec ton serviteur !
  - type: text
    content: Aucun vivant ╵n’est juste devant toi
  - type: note
    content: Voir Rm 3.10, 20 ; Ga 2.16.
  - type: text
    content: .
  '3':
  - type: text
    content: Un ennemi ╵me poursuit sans relâche,
  - type: text
    content: et il veut écraser ╵ma vie à terre,
  - type: text
    content: il me fait demeurer ╵dans les ténèbres
  - type: text
    content: comme les morts, ╵ces gens des temps passés.
  '4':
  - type: text
    content: J’ai l’esprit abattu,
  - type: text
    content: je suis désemparé.
  '5':
  - type: text
    content: Je me souviens ╵des temps anciens,
  - type: text
    content: je me redis ╵tout ce que tu as fait,
  - type: text
    content: et je médite ╵sur l’œuvre de tes mains.
  '6':
  - type: text
    content: Je tends les mains vers toi,
  - type: text
    content: je me sens devant toi ╵comme une terre aride.
  - type: text
    content: Pause
  '7':
  - type: text
    content: O Eternel, ╵viens vite m’exaucer,
  - type: text
    content: je me sens défaillir.
  - type: text
    content: Ne te détourne pas de moi,
  - type: text
    content: de peur que je sois comme ceux ╵qui descendent dans le tombeau.
  '8':
  - type: text
    content: Dès le matin, ╵annonce-moi ╵ta bienveillance,
  - type: text
    content: car c’est en toi ╵que j’ai mis ma confiance !
  - type: text
    content: Fais-moi connaître ╵la voie que je dois suivre,
  - type: text
    content: car c’est vers toi ╵que je me tourne !
  '9':
  - type: text
    content: Délivre-moi, ╵ô Eternel, ╵de tous mes ennemis,
  - type: text
    content: je cherche mon refuge ╵auprès de toi !
