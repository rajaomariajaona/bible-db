document_id: PSA.143,21
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Conduis-moi dans tes voies !
    marker-yv: yv-h
  - type: usfm
    marker: d
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: Psaume de David.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: O Eternel, ╵écoute ma prière,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: prête l’oreille ╵à mes supplications !
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tu es fidèle ╵et tu es juste, ╵réponds-moi donc !
  '10':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: Enseigne-moi ╵à accomplir ╵ce qui te plaît,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: car tu es mon Dieu !
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Que ton Esprit qui est bon me conduise ╵sur un sol aplani :'
  '11':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: Par égard pour ta renommée, ╵ô Eternel, ╵garde ma vie,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: toi qui es juste ; ╵délivre-moi ╵de la détresse.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: Dans ton amour, ╵tu détruiras mes ennemis,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et tu feras périr ╵tous mes persécuteurs,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: car moi, je suis ╵ton serviteur.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: N’entre pas en procès ╵avec ton serviteur !
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Aucun vivant ╵n’est juste devant toi
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '143.2 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Voir Rm 3.10, 20 ; Ga 2.16.
      marker-yv: yv-n
    - type: text
      text: .
  '3':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: Un ennemi ╵me poursuit sans relâche,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et il veut écraser ╵ma vie à terre,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: il me fait demeurer ╵dans les ténèbres
  - type: usfm
    marker: q1
    children:
    - type: text
      text: comme les morts, ╵ces gens des temps passés.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: J’ai l’esprit abattu,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: je suis désemparé.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: Je me souviens ╵des temps anciens,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: je me redis ╵tout ce que tu as fait,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et je médite ╵sur l’œuvre de tes mains.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: Je tends les mains vers toi,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: je me sens devant toi ╵comme une terre aride.
  - type: usfm
    marker: q4
    children:
    - type: text
      text: Pause
  '7':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: O Eternel, ╵viens vite m’exaucer,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: je me sens défaillir.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ne te détourne pas de moi,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: de peur que je sois comme ceux ╵qui descendent dans le tombeau.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: Dès le matin, ╵annonce-moi ╵ta bienveillance,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: car c’est en toi ╵que j’ai mis ma confiance !
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fais-moi connaître ╵la voie que je dois suivre,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: car c’est vers toi ╵que je me tourne !
  '9':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: Délivre-moi, ╵ô Eternel, ╵de tous mes ennemis,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: je cherche mon refuge ╵auprès de toi !
