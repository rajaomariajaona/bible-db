document_id: MAT.19,21
type_code: fra
verses:
  '1':
  - type: usfm
    marker: ms1
    children:
    - type: text
      text: La rupture et la grâce
    marker-yv: yv-h
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Controverse sur le divorce
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: (Mc 10.1-12)
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Après avoir donné ces enseignements, Jésus quitta la Galilée et se rendit dans la partie de la Judée située de l’autre côté du Jourdain. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Les disciples lui dirent : Si telle est la situation de l’homme par rapport à la femme, il n’est pas intéressant pour lui de se marier.'
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Il leur répondit : '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Tous les hommes ne sont pas capables d’accepter cet enseignement. Cela n’est possible qu’à ceux qui en ont reçu le don.
    - type: text
      text: ' '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'En effet, il y a ceux qui ne peuvent pas avoir de vie sexuelle normale parce que, de naissance, ils en sont incapables ; pour d’autres, il en est ainsi à cause d’une intervention humaine ; d’autres, enfin, y renoncent à cause du '
      - type: usfm
        marker: w
        children:
        - type: text
          text: royaume des cieux
      - type: text
        text: . Que celui qui est capable d’accepter cet enseignement, l’accepte !
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Jésus accueille des enfants
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: (Mc 10.13-16 ; Lc 18.15-17)
    marker-yv: yv-h
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Peu après, des gens lui amenèrent des petits enfants pour qu’il leur impose les mains et prie pour eux. Les disciples leur firent des reproches. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Mais Jésus leur dit : '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Laissez donc ces petits enfants, ne les empêchez pas de venir à moi, car le royaume des cieux appartient à ceux qui leur ressemblent.
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Puis il leur imposa les mains et poursuivit son chemin.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Les riches et le royaume de Dieu
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: (Mc 10.17-31 ; Lc 18.18-30)
    marker-yv: yv-h
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Alors un homme s’approcha de lui et lui dit : Maître, que dois-je faire de bon pour avoir la vie éternelle ?'
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: – Pourquoi m’interroges-tu sur ce qui est bon ?
    - type: text
      text: ' lui répondit Jésus. '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Un seul est bon. Si tu veux entrer dans la vie, applique les commandements.
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: – Lesquels ? demanda l’homme.
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: – Eh bien,
    - type: text
      text: ' répondit Jésus, '
    - type: usfm
      marker: wj
      children:
      - type: usfm
        marker: qt
        children:
        - type: text
          text: tu ne commettras pas de meurtre ; tu ne commettras pas d’adultère ; tu ne commettras pas de vol ; tu ne porteras pas de faux témoignage
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '19.18 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Ex 20.12-16 ; Dt 5.16-20.
      marker-yv: yv-n
    - type: text
      text: ' '
    - type: usfm
      marker: wj
      children:
      - type: usfm
        marker: qt
        children:
        - type: text
          text: ;
    - type: text
      text: ' '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: usfm
        marker: qt
        children:
        - type: text
          text: honore ton père et ta mère
      - type: text
        text: ', et '
      - type: usfm
        marker: qt
        children:
        - type: text
          text: tu aimeras ton prochain comme toi-même
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '19.19 '
      - type: usfm
        marker: ft
        children:
        - type: usfm
          marker: ref
          children:
          - type: text
            text: Lv 19.18
        - type: text
          text: .
      marker-yv: yv-n
    - type: usfm
      marker: wj
      children:
      - type: usfm
        marker: qt
        children:
        - type: text
          text: .
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: De grandes foules le suivaient et il guérit là les malades.
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: – Tout cela, lui dit le jeune homme, je l’ai appliqué. Que me manque-t-il encore ?
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Jésus lui répondit : '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Si tu veux être parfait, va vendre tes biens, distribue le produit de la vente aux pauvres, et tu auras un trésor dans le ciel. Puis viens et suis-moi !
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Quand il entendit cela, le jeune homme s’en alla tout triste, car il était très riche.
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Alors Jésus dit à ses disciples : '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'Vraiment, je vous l’assure : il est difficile à un riche d’entrer dans le '
      - type: usfm
        marker: w
        children:
        - type: text
          text: royaume des cieux
      - type: text
        text: .
    - type: text
      text: ' '
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'Oui, j’insiste : il est plus facile à un chameau de passer par le trou d’une aiguille qu’à un riche d’entrer dans le royaume de Dieu.'
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'En entendant cela, les disciples furent très étonnés et demandèrent : Mais alors, qui donc peut être sauvé ?'
  '26':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Jésus les regarda et leur dit : '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Cela est impossible aux hommes ; mais à Dieu, tout est possible.
  '27':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Alors Pierre prit la parole et lui dit : Nous, nous avons tout quitté pour te suivre : qu’en sera-t-il de nous ?'
  '28':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Jésus leur dit : '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'Vraiment, je vous l’assure : quand le monde connaîtra son renouveau et que le '
      - type: usfm
        marker: w
        children:
        - type: text
          text: Fils de l’homme
      - type: text
        text: ' aura pris place sur son trône glorieux, vous qui m’avez suivi, vous siégerez, vous aussi, sur douze trônes pour gouverner les douze tribus d’'
      - type: usfm
        marker: w
        children:
        - type: text
          text: Israël
      - type: text
        text: .
    - type: text
      text: ' '
  '29':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Tous ceux qui auront quitté, à cause de moi, leurs maisons, leurs frères ou leurs sœurs, leur père ou leur mère, leurs enfants ou leur terre, recevront cent fois plus et auront part à la vie éternelle.
    - type: text
      text: ' '
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Des pharisiens s’approchèrent de lui avec l’intention de lui tendre un piège. Ils lui demandèrent : Un homme a-t-il le droit de divorcer d’avec sa femme pour une raison quelconque ?'
  '30':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Mais beaucoup de ceux qui sont maintenant les premiers seront parmi les derniers, et beaucoup de ceux qui sont maintenant les derniers seront parmi les premiers.
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Il leur répondit : '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: N’avez-vous pas lu dans les Ecritures qu’au commencement le Créateur a créé l’être humain homme et femme
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '19.4 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Gn 1.27 ; 5.2.
      marker-yv: yv-n
    - type: text
      text: ' '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'et qu’il a déclaré : '
      - type: usfm
        marker: qt
        children:
        - type: text
          text: C’est pourquoi l’homme laissera son père et sa mère pour s’attacher à sa femme,
      - type: text
        text: ' et '
      - type: usfm
        marker: qt
        children:
        - type: text
          text: les deux ne feront plus qu’un
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '19.5 '
      - type: usfm
        marker: ft
        children:
        - type: usfm
          marker: ref
          children:
          - type: text
            text: Gn 2.24
        - type: text
          text: .
      marker-yv: yv-n
    - type: usfm
      marker: wj
      children:
      - type: text
        text: '?'
    - type: text
      text: ' '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Ainsi, ils ne sont plus deux, ils font un. Que l’homme ne sépare donc pas ce que Dieu a uni.
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Mais les pharisiens objectèrent : Pourquoi alors Moïse a-t-il commandé à l’homme de remettre à sa femme un certificat de divorce quand il divorce d’avec elle'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '19.7 '
      - type: usfm
        marker: ft
        children:
        - type: usfm
          marker: ref
          children:
          - type: text
            text: Dt 24.1-4
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: '  ?'
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Il leur répondit : '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: C’est à cause de la dureté de votre cœur que Moïse vous a permis de divorcer d’avec votre épouse. Mais, au commencement, il n’en était pas ainsi.
    - type: text
      text: ' '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Aussi, je vous déclare que celui qui divorce et se remarie, commet un adultère – sauf en cas d’immoralité sexuelle.
