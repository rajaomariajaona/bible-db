document_id: MAT.19,21
type_code: fra
verses:
  '1':
  - type: heading
    content: La rupture et la grâce
  - type: heading
    content: Controverse sur le divorce
  - type: heading
    content: (Mc 10.1-12)
  - type: text
    content: 'Après avoir donné ces enseignements, Jésus quitta la Galilée et se rendit dans la partie de la Judée située de l’autre côté du Jourdain. '
  '10':
  - type: text
    content: 'Les disciples lui dirent : Si telle est la situation de l’homme par rapport à la femme, il n’est pas intéressant pour lui de se marier.'
  '11':
  - type: text
    content: 'Il leur répondit : '
  - type: text
    content: Tous les hommes ne sont pas capables d’accepter cet enseignement. Cela n’est possible qu’à ceux qui en ont reçu le don.
  - type: text
    content: ' '
  '12':
  - type: text
    content: 'En effet, il y a ceux qui ne peuvent pas avoir de vie sexuelle normale parce que, de naissance, ils en sont incapables ; pour d’autres, il en est ainsi à cause d’une intervention humaine ; d’autres, enfin, y renoncent à cause du '
  - type: text
    content: royaume des cieux
  - type: text
    content: . Que celui qui est capable d’accepter cet enseignement, l’accepte !
  - type: heading
    content: Jésus accueille des enfants
  - type: heading
    content: (Mc 10.13-16 ; Lc 18.15-17)
  '13':
  - type: text
    content: 'Peu après, des gens lui amenèrent des petits enfants pour qu’il leur impose les mains et prie pour eux. Les disciples leur firent des reproches. '
  '14':
  - type: text
    content: 'Mais Jésus leur dit : '
  - type: text
    content: Laissez donc ces petits enfants, ne les empêchez pas de venir à moi, car le royaume des cieux appartient à ceux qui leur ressemblent.
  '15':
  - type: text
    content: Puis il leur imposa les mains et poursuivit son chemin.
  - type: heading
    content: Les riches et le royaume de Dieu
  - type: heading
    content: (Mc 10.17-31 ; Lc 18.18-30)
  '16':
  - type: text
    content: 'Alors un homme s’approcha de lui et lui dit : Maître, que dois-je faire de bon pour avoir la vie éternelle ?'
  '17':
  - type: text
    content: ' '
  - type: text
    content: – Pourquoi m’interroges-tu sur ce qui est bon ?
  - type: text
    content: ' lui répondit Jésus. '
  - type: text
    content: Un seul est bon. Si tu veux entrer dans la vie, applique les commandements.
  '18':
  - type: text
    content: – Lesquels ? demanda l’homme.
  - type: text
    content: – Eh bien,
  - type: text
    content: ' répondit Jésus, '
  - type: text
    content: tu ne commettras pas de meurtre ; tu ne commettras pas d’adultère ; tu ne commettras pas de vol ; tu ne porteras pas de faux témoignage
  - type: note
    content: Ex 20.12-16 ; Dt 5.16-20.
  - type: text
    content: ' '
  - type: text
    content: ;
  - type: text
    content: ' '
  '19':
  - type: text
    content: honore ton père et ta mère
  - type: text
    content: ', et '
  - type: text
    content: tu aimeras ton prochain comme toi-même
  - type: note
    content: Lv 19.18.
  - type: text
    content: .
  '2':
  - type: text
    content: De grandes foules le suivaient et il guérit là les malades.
  '20':
  - type: text
    content: – Tout cela, lui dit le jeune homme, je l’ai appliqué. Que me manque-t-il encore ?
  '21':
  - type: text
    content: 'Jésus lui répondit : '
  - type: text
    content: Si tu veux être parfait, va vendre tes biens, distribue le produit de la vente aux pauvres, et tu auras un trésor dans le ciel. Puis viens et suis-moi !
  '22':
  - type: text
    content: Quand il entendit cela, le jeune homme s’en alla tout triste, car il était très riche.
  '23':
  - type: text
    content: 'Alors Jésus dit à ses disciples : '
  - type: text
    content: 'Vraiment, je vous l’assure : il est difficile à un riche d’entrer dans le '
  - type: text
    content: royaume des cieux
  - type: text
    content: .
  - type: text
    content: ' '
  '24':
  - type: text
    content: 'Oui, j’insiste : il est plus facile à un chameau de passer par le trou d’une aiguille qu’à un riche d’entrer dans le royaume de Dieu.'
  '25':
  - type: text
    content: 'En entendant cela, les disciples furent très étonnés et demandèrent : Mais alors, qui donc peut être sauvé ?'
  '26':
  - type: text
    content: 'Jésus les regarda et leur dit : '
  - type: text
    content: Cela est impossible aux hommes ; mais à Dieu, tout est possible.
  '27':
  - type: text
    content: 'Alors Pierre prit la parole et lui dit : Nous, nous avons tout quitté pour te suivre : qu’en sera-t-il de nous ?'
  '28':
  - type: text
    content: 'Jésus leur dit : '
  - type: text
    content: 'Vraiment, je vous l’assure : quand le monde connaîtra son renouveau et que le '
  - type: text
    content: Fils de l’homme
  - type: text
    content: ' aura pris place sur son trône glorieux, vous qui m’avez suivi, vous siégerez, vous aussi, sur douze trônes pour gouverner les douze tribus d’'
  - type: text
    content: Israël
  - type: text
    content: .
  - type: text
    content: ' '
  '29':
  - type: text
    content: Tous ceux qui auront quitté, à cause de moi, leurs maisons, leurs frères ou leurs sœurs, leur père ou leur mère, leurs enfants ou leur terre, recevront cent fois plus et auront part à la vie éternelle.
  - type: text
    content: ' '
  '3':
  - type: text
    content: 'Des pharisiens s’approchèrent de lui avec l’intention de lui tendre un piège. Ils lui demandèrent : Un homme a-t-il le droit de divorcer d’avec sa femme pour une raison quelconque ?'
  '30':
  - type: text
    content: Mais beaucoup de ceux qui sont maintenant les premiers seront parmi les derniers, et beaucoup de ceux qui sont maintenant les derniers seront parmi les premiers.
  '4':
  - type: text
    content: 'Il leur répondit : '
  - type: text
    content: N’avez-vous pas lu dans les Ecritures qu’au commencement le Créateur a créé l’être humain homme et femme
  - type: note
    content: Gn 1.27 ; 5.2.
  - type: text
    content: ' '
  '5':
  - type: text
    content: 'et qu’il a déclaré : '
  - type: text
    content: C’est pourquoi l’homme laissera son père et sa mère pour s’attacher à sa femme,
  - type: text
    content: ' et '
  - type: text
    content: les deux ne feront plus qu’un
  - type: note
    content: Gn 2.24.
  - type: text
    content: '?'
  - type: text
    content: ' '
  '6':
  - type: text
    content: Ainsi, ils ne sont plus deux, ils font un. Que l’homme ne sépare donc pas ce que Dieu a uni.
  '7':
  - type: text
    content: 'Mais les pharisiens objectèrent : Pourquoi alors Moïse a-t-il commandé à l’homme de remettre à sa femme un certificat de divorce quand il divorce d’avec elle'
  - type: note
    content: Dt 24.1-4.
  - type: text
    content: '  ?'
  '8':
  - type: text
    content: 'Il leur répondit : '
  - type: text
    content: C’est à cause de la dureté de votre cœur que Moïse vous a permis de divorcer d’avec votre épouse. Mais, au commencement, il n’en était pas ainsi.
  - type: text
    content: ' '
  '9':
  - type: text
    content: Aussi, je vous déclare que celui qui divorce et se remarie, commet un adultère – sauf en cas d’immoralité sexuelle.
