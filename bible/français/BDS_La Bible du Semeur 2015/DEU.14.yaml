document_id: DEU.14
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Les lois sur la pureté des Israélites
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Vous êtes les enfants de l’Eternel votre Dieu : vous ne vous ferez donc pas d’incision sur le corps ni de tonsure sur le front de votre tête'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '14.1 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Divers rites de deuil païens (voir Lv 19.28 ; 21.5 ; 1 R 18.28 ; Jr 16.6 ; 41.5 ; 47.5).
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Vous êtes, en effet, un peuple saint pour l’Eternel votre Dieu, et l’Eternel vous a choisis parmi tous les peuples répandus sur la surface de la terre pour que vous lui apparteniez comme un peuple précieux
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '14.2 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Voir Ex 19.5 ; Tt 2.14 ; 1 P 2.9.
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Vous ne mangerez rien d’abominable
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '14.3 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Pour les v. 3-20, voir '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Lv 11.1-23
        metadata:
          usfm: LEV.11.1+LEV.11.2+LEV.11.3+LEV.11.4+LEV.11.5+LEV.11.6+LEV.11.7+LEV.11.8+LEV.11.9+LEV.11.10+LEV.11.11+LEV.11.12+LEV.11.13+LEV.11.14+LEV.11.15+LEV.11.16+LEV.11.17+LEV.11.18+LEV.11.19+LEV.11.20+LEV.11.21+LEV.11.22+LEV.11.23
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Voici les animaux que vous pourrez manger : le bœuf, le mouton et la chèvre, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'le cerf, la gazelle et le daim, le bouquetin, le chevreuil, le mouflon, la chèvre sauvage '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: et toute bête qui a les sabots fendus en deux et qui remue constamment les mâchoires
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '14.6 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'La classification zoologique des Hébreux se fondait sur des critères extérieurs faciles à discerner : il s’agit ici, non seulement des ruminants, mais de tout animal qui remue constamment au moins une mâchoire (voir note '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Lv 11.6
        metadata:
          usfm: LEV.11.6
      - type: text
        text: ).
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Mais vous ne mangerez pas celles qui remuent constamment les mâchoires seulement ou qui ont seulement les sabots fendus, comme le chameau, le lièvre et le daman, car bien qu’ils remuent constamment les mâchoires, ils n’ont pas le sabot fendu. Vous les tiendrez donc pour impurs. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Le porc, lui, a le sabot fendu mais ne remue pas constamment les mâchoires ; vous le considérerez comme impur. Vous ne mangerez pas de sa viande et vous ne toucherez pas à son cadavre.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Parmi les animaux aquatiques, vous pourrez manger tous ceux qui ont des nageoires et des écailles. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Mais vous ne mangerez pas ceux qui n’ont pas de nageoires et d’écailles, vous les considérerez comme impurs.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Vous pourrez manger tout oiseau pur. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Mais voici une liste d’oiseaux que vous ne devez pas manger
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '14.12 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: L’identification des oiseaux qui suivent n’est pas toujours certaine.
    marker-yv: yv-n
  - type: text
    text: '  : l’aigle, le gypaète, le vautour, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'la buse, le faucon, toutes les diverses espèces de milans, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'toutes les variétés de corbeaux, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'l’autruche, la chouette, la mouette et toutes les espèces d’éperviers, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'le hibou, le chat-huant et l’effraie, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'le pélican, l’orfraie et le cormoran, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: la cigogne et les diverses variétés de hérons, la huppe et la chauve-souris.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Vous considérerez comme impur tout insecte ailé, et vous n’en mangerez pas. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Vous pourrez cependant manger ce qui vole et qui est pur
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '14.20 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Voir '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Lv 11.21-22
        metadata:
          usfm: LEV.11.21+LEV.11.22
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Vous ne mangerez pas une bête morte. Vous pourrez la donner à l’immigré pour qu’il la mange
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '14.21 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Parce qu’ils ne sont pas soumis aux règles rituelles des Juifs.
    marker-yv: yv-n
  - type: text
    text: ', ou la vendre à un étranger. Vous, en effet, vous êtes un peuple saint pour l’Eternel votre Dieu. Vous ne ferez pas cuire'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '14.21 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Voir '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ex 23.19
        metadata:
          usfm: EXO.23.19
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: ' un chevreau dans le lait de sa mère.'
- type: usfm
  marker: s1
  children:
  - type: text
    text: Les lois sociales
  marker-yv: yv-h
- type: usfm
  marker: s2
  children:
  - type: text
    text: La dîme
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Chaque année, vous prélèverez la dîme de tous les produits de vos champs. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: Vous mangerez, devant l’Eternel votre Dieu au lieu qu’il aura choisi pour y établir sa présence, la dîme de votre blé, du vin nouveau et de l’huile, ainsi que les premiers-nés de vos troupeaux de gros et de petit bétail. Ainsi vous apprendrez à craindre l’Eternel votre Dieu tous les jours de votre vie
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '14.23 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Voir '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Lv 27.30-33
        metadata:
          usfm: LEV.27.30+LEV.27.31+LEV.27.32+LEV.27.33
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Lorsque l’Eternel t’aura comblé de bénédictions, si tu ne peux pas transporter ta dîme jusqu’à l’endroit que l’Eternel ton Dieu aura choisi pour y établir sa présence parce qu’il sera trop loin de chez toi, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'tu vendras la dîme, tu prendras l’argent et tu te rendras au lieu que l’Eternel ton Dieu aura choisi. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Là, tu achèteras avec l’argent tout ce qui te plaira : bœufs, moutons ou chevreaux, vin ou autres boissons alcoolisées, bref, tout ce dont tu auras envie, et tu le consommeras là devant l’Eternel ton Dieu, en te réjouissant avec ta famille. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: Vous n’oublierez pas de partager avec les lévites qui habiteront dans vos villes, car ils n’ont pas reçu de part de patrimoine foncier comme vous.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'Tous les trois ans, vous prélèverez toute la dîme des récoltes de cette année-là, et vous la déposerez à l’intérieur de votre ville. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: Alors les lévites, qui n’ont pas de part de patrimoine foncier comme vous, viendront, ainsi que les immigrés, les orphelins et les veuves qui habitent dans votre ville, et ils mangeront à satiété. Alors l’Eternel votre Dieu vous bénira dans tous les travaux que vous entreprendrez.
