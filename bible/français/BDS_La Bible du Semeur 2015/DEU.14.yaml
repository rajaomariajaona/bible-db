document_id: DEU.14,21
type_code: fra
verses:
  '1':
  - type: heading
    content: Les lois sur la pureté des Israélites
  - type: text
    content: 'Vous êtes les enfants de l’Eternel votre Dieu : vous ne vous ferez donc pas d’incision sur le corps ni de tonsure sur le front de votre tête'
  - type: note
    content: Divers rites de deuil païens (voir Lv 19.28 ; 21.5 ; 1 R 18.28 ; Jr 16.6 ; 41.5 ; 47.5).
  - type: text
    content: '. '
  '10':
  - type: text
    content: Mais vous ne mangerez pas ceux qui n’ont pas de nageoires et d’écailles, vous les considérerez comme impurs.
  '11':
  - type: text
    content: 'Vous pourrez manger tout oiseau pur. '
  '12':
  - type: text
    content: Mais voici une liste d’oiseaux que vous ne devez pas manger
  - type: note
    content: L’identification des oiseaux qui suivent n’est pas toujours certaine.
  - type: text
    content: '  : l’aigle, le gypaète, le vautour, '
  '13':
  - type: text
    content: 'la buse, le faucon, toutes les diverses espèces de milans, '
  '14':
  - type: text
    content: 'toutes les variétés de corbeaux, '
  '15':
  - type: text
    content: 'l’autruche, la chouette, la mouette et toutes les espèces d’éperviers, '
  '16':
  - type: text
    content: 'le hibou, le chat-huant et l’effraie, '
  '17':
  - type: text
    content: 'le pélican, l’orfraie et le cormoran, '
  '18':
  - type: text
    content: la cigogne et les diverses variétés de hérons, la huppe et la chauve-souris.
  '19':
  - type: text
    content: 'Vous considérerez comme impur tout insecte ailé, et vous n’en mangerez pas. '
  '2':
  - type: text
    content: Vous êtes, en effet, un peuple saint pour l’Eternel votre Dieu, et l’Eternel vous a choisis parmi tous les peuples répandus sur la surface de la terre pour que vous lui apparteniez comme un peuple précieux
  - type: note
    content: Voir Ex 19.5 ; Tt 2.14 ; 1 P 2.9.
  - type: text
    content: .
  '20':
  - type: text
    content: Vous pourrez cependant manger ce qui vole et qui est pur
  - type: note
    content: Voir Lv 11.21-22.
  - type: text
    content: .
  '21':
  - type: text
    content: Vous ne mangerez pas une bête morte. Vous pourrez la donner à l’immigré pour qu’il la mange
  - type: note
    content: Parce qu’ils ne sont pas soumis aux règles rituelles des Juifs.
  - type: text
    content: ', ou la vendre à un étranger. Vous, en effet, vous êtes un peuple saint pour l’Eternel votre Dieu. Vous ne ferez pas cuire'
  - type: note
    content: Voir Ex 23.19.
  - type: text
    content: ' un chevreau dans le lait de sa mère.'
  - type: heading
    content: Les lois sociales
  - type: heading
    content: La dîme
  '22':
  - type: text
    content: 'Chaque année, vous prélèverez la dîme de tous les produits de vos champs. '
  '23':
  - type: text
    content: Vous mangerez, devant l’Eternel votre Dieu au lieu qu’il aura choisi pour y établir sa présence, la dîme de votre blé, du vin nouveau et de l’huile, ainsi que les premiers-nés de vos troupeaux de gros et de petit bétail. Ainsi vous apprendrez à craindre l’Eternel votre Dieu tous les jours de votre vie
  - type: note
    content: Voir Lv 27.30-33.
  - type: text
    content: '. '
  '24':
  - type: text
    content: 'Lorsque l’Eternel t’aura comblé de bénédictions, si tu ne peux pas transporter ta dîme jusqu’à l’endroit que l’Eternel ton Dieu aura choisi pour y établir sa présence parce qu’il sera trop loin de chez toi, '
  '25':
  - type: text
    content: 'tu vendras la dîme, tu prendras l’argent et tu te rendras au lieu que l’Eternel ton Dieu aura choisi. '
  '26':
  - type: text
    content: 'Là, tu achèteras avec l’argent tout ce qui te plaira : bœufs, moutons ou chevreaux, vin ou autres boissons alcoolisées, bref, tout ce dont tu auras envie, et tu le consommeras là devant l’Eternel ton Dieu, en te réjouissant avec ta famille. '
  '27':
  - type: text
    content: Vous n’oublierez pas de partager avec les lévites qui habiteront dans vos villes, car ils n’ont pas reçu de part de patrimoine foncier comme vous.
  '28':
  - type: text
    content: 'Tous les trois ans, vous prélèverez toute la dîme des récoltes de cette année-là, et vous la déposerez à l’intérieur de votre ville. '
  '29':
  - type: text
    content: Alors les lévites, qui n’ont pas de part de patrimoine foncier comme vous, viendront, ainsi que les immigrés, les orphelins et les veuves qui habitent dans votre ville, et ils mangeront à satiété. Alors l’Eternel votre Dieu vous bénira dans tous les travaux que vous entreprendrez.
  '3':
  - type: text
    content: Vous ne mangerez rien d’abominable
  - type: note
    content: Pour les v. 3-20, voir Lv 11.1-23.
  - type: text
    content: '. '
  '4':
  - type: text
    content: 'Voici les animaux que vous pourrez manger : le bœuf, le mouton et la chèvre, '
  '5':
  - type: text
    content: 'le cerf, la gazelle et le daim, le bouquetin, le chevreuil, le mouflon, la chèvre sauvage '
  '6':
  - type: text
    content: et toute bête qui a les sabots fendus en deux et qui remue constamment les mâchoires
  - type: note
    content: 'La classification zoologique des Hébreux se fondait sur des critères extérieurs faciles à discerner : il s’agit ici, non seulement des ruminants, mais de tout animal qui remue constamment au moins une mâchoire (voir note Lv 11.6).'
  - type: text
    content: '. '
  '7':
  - type: text
    content: 'Mais vous ne mangerez pas celles qui remuent constamment les mâchoires seulement ou qui ont seulement les sabots fendus, comme le chameau, le lièvre et le daman, car bien qu’ils remuent constamment les mâchoires, ils n’ont pas le sabot fendu. Vous les tiendrez donc pour impurs. '
  '8':
  - type: text
    content: Le porc, lui, a le sabot fendu mais ne remue pas constamment les mâchoires ; vous le considérerez comme impur. Vous ne mangerez pas de sa viande et vous ne toucherez pas à son cadavre.
  '9':
  - type: text
    content: 'Parmi les animaux aquatiques, vous pourrez manger tous ceux qui ont des nageoires et des écailles. '
