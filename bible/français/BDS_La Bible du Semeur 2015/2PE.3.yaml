document_id: 2PE.3
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: La venue certaine du Seigneur
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Mes chers amis, voici déjà la deuxième lettre que je vous écris ; dans l’une comme dans l’autre, je cherche à stimuler en vous une saine manière de penser en vous rappelant l’enseignement que vous avez reçu. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Souvenez-vous, en effet, des paroles dites autrefois par les saints prophètes, ainsi que du commandement du Seigneur et Sauveur que vos apôtres vous ont transmis. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Sachez tout d’abord que, dans les derniers jours
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '3.3 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Expression qui couvre l’ensemble de la période finale de l’histoire inaugurée par la venue de Jésus-Christ.
    marker-yv: yv-n
  - type: text
    text: ', des moqueurs viendront, qui vivront au gré de leurs propres désirs. Ils tourneront votre foi en ridicule en disant : '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: « Alors, qu’en est-il de la promesse de sa venue ? Nos ancêtres sont morts et depuis que le monde est monde, rien n’a changé ! »
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Mais il y a un fait que ces gens oublient délibérément : c’est que Dieu, par sa parole, a créé autrefois le ciel et la terre. Il a séparé la terre des eaux et il l’a rassemblée du milieu des eaux. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'De la même manière, Dieu a détruit le monde d’alors par les eaux du déluge. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Quant à la terre et aux cieux actuels, ils sont réservés par cette même parole pour être livrés au feu : ils sont gardés en vue du jour du jugement où tous ceux qui n’ont aucun respect pour Dieu périront.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Mais il y a un fait que vous ne devez pas oublier, mes chers amis : c’est que, pour le Seigneur, un jour est comme mille ans et '
  - type: usfm
    marker: qt
    children:
    - type: text
      text: mille ans sont comme un jour
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '3.8 '
    - type: usfm
      marker: ft
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ps 90.4
        metadata:
          usfm: PSA.90.4
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Le Seigneur n’est pas en retard dans l’accomplissement de sa promesse, comme certains se l’imaginent, il fait simplement preuve de patience à votre égard, car il ne veut pas qu’un seul périsse. Il voudrait, au contraire, que tous parviennent à se convertir
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '3.9 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Mot traduit ailleurs par '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'changer, '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'ou '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: changer d’attitude.
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Mais le jour du Seigneur viendra comme un voleur. En ce jour-là, le ciel disparaîtra dans un fracas terrifiant, les astres
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '3.10 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Autre traduction : '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: les éléments.
    marker-yv: yv-n
  - type: text
    text: ' embrasés se désagrégeront et la terre se trouvera jugée'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '3.10 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Certains manuscrits ont : '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: sera consumé.
    marker-yv: yv-n
  - type: text
    text: ' avec toutes les œuvres qui auront été accomplies sur elle. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Puisque tout l’univers doit ainsi se désagréger, quelle vie sainte vous devez mener et avec quelle piété, '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: en attendant que vienne le jour de Dieu et en hâtant sa venue ! Ce jour-là, le ciel en feu se désagrégera et les astres
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '3.12 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Autre traduction : '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: les éléments.
    marker-yv: yv-n
  - type: text
    text: ' embrasés fondront. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Mais nous, nous attendons, comme Dieu l’a promis, un nouveau ciel et une nouvelle terre où la justice habitera.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: C’est pourquoi, mes chers amis, dans cette attente, faites tous vos efforts pour que Dieu vous trouve purs et irréprochables à ses yeux, dans la paix qu’il donne.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Comprenez bien que la patience du Seigneur a pour but votre salut. Paul, notre frère bien-aimé, vous l’a aussi écrit avec la sagesse que Dieu lui a donnée. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Il l’a fait comme dans toutes ses lettres, où il aborde ces sujets. Certes, il s’y trouve des passages difficiles à comprendre, dont les personnes ignorantes et mal affermies déforment le sens, comme elles le font aussi – pour leur propre ruine – des autres textes de l’Ecriture.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Dernières recommandations
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Quant à vous, mes chers amis, vous voilà prévenus. Prenez garde de ne pas vous laisser entraîner par l’égarement de ces hommes vivant sans respect pour Dieu et de perdre ainsi la position solide que vous occupez. '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Au contraire, progressez sans cesse dans la grâce et dans la connaissance de notre Seigneur et Sauveur Jésus-Christ. A lui soit la gloire dès maintenant et pour l’éternité. Amen.
