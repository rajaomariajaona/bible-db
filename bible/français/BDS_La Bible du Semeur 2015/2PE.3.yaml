document_id: 2PE.3,21
type_code: fra
verses:
  '1':
  - type: heading
    content: La venue certaine du Seigneur
  - type: text
    content: 'Mes chers amis, voici déjà la deuxième lettre que je vous écris ; dans l’une comme dans l’autre, je cherche à stimuler en vous une saine manière de penser en vous rappelant l’enseignement que vous avez reçu. '
  '10':
  - type: text
    content: Mais le jour du Seigneur viendra comme un voleur. En ce jour-là, le ciel disparaîtra dans un fracas terrifiant, les astres
  - type: note
    content: 'Autre traduction : les éléments.'
  - type: text
    content: ' embrasés se désagrégeront et la terre se trouvera jugée'
  - type: note
    content: 'Certains manuscrits ont : sera consumé.'
  - type: text
    content: ' avec toutes les œuvres qui auront été accomplies sur elle. '
  '11':
  - type: text
    content: 'Puisque tout l’univers doit ainsi se désagréger, quelle vie sainte vous devez mener et avec quelle piété, '
  '12':
  - type: text
    content: en attendant que vienne le jour de Dieu et en hâtant sa venue ! Ce jour-là, le ciel en feu se désagrégera et les astres
  - type: note
    content: 'Autre traduction : les éléments.'
  - type: text
    content: ' embrasés fondront. '
  '13':
  - type: text
    content: Mais nous, nous attendons, comme Dieu l’a promis, un nouveau ciel et une nouvelle terre où la justice habitera.
  '14':
  - type: text
    content: C’est pourquoi, mes chers amis, dans cette attente, faites tous vos efforts pour que Dieu vous trouve purs et irréprochables à ses yeux, dans la paix qu’il donne.
  '15':
  - type: text
    content: 'Comprenez bien que la patience du Seigneur a pour but votre salut. Paul, notre frère bien-aimé, vous l’a aussi écrit avec la sagesse que Dieu lui a donnée. '
  '16':
  - type: text
    content: Il l’a fait comme dans toutes ses lettres, où il aborde ces sujets. Certes, il s’y trouve des passages difficiles à comprendre, dont les personnes ignorantes et mal affermies déforment le sens, comme elles le font aussi – pour leur propre ruine – des autres textes de l’Ecriture.
  - type: heading
    content: Dernières recommandations
  '17':
  - type: text
    content: 'Quant à vous, mes chers amis, vous voilà prévenus. Prenez garde de ne pas vous laisser entraîner par l’égarement de ces hommes vivant sans respect pour Dieu et de perdre ainsi la position solide que vous occupez. '
  '18':
  - type: text
    content: Au contraire, progressez sans cesse dans la grâce et dans la connaissance de notre Seigneur et Sauveur Jésus-Christ. A lui soit la gloire dès maintenant et pour l’éternité. Amen.
  '2':
  - type: text
    content: 'Souvenez-vous, en effet, des paroles dites autrefois par les saints prophètes, ainsi que du commandement du Seigneur et Sauveur que vos apôtres vous ont transmis. '
  '3':
  - type: text
    content: Sachez tout d’abord que, dans les derniers jours
  - type: note
    content: Expression qui couvre l’ensemble de la période finale de l’histoire inaugurée par la venue de Jésus-Christ.
  - type: text
    content: ', des moqueurs viendront, qui vivront au gré de leurs propres désirs. Ils tourneront votre foi en ridicule en disant : '
  '4':
  - type: text
    content: « Alors, qu’en est-il de la promesse de sa venue ? Nos ancêtres sont morts et depuis que le monde est monde, rien n’a changé ! »
  '5':
  - type: text
    content: 'Mais il y a un fait que ces gens oublient délibérément : c’est que Dieu, par sa parole, a créé autrefois le ciel et la terre. Il a séparé la terre des eaux et il l’a rassemblée du milieu des eaux. '
  '6':
  - type: text
    content: 'De la même manière, Dieu a détruit le monde d’alors par les eaux du déluge. '
  '7':
  - type: text
    content: 'Quant à la terre et aux cieux actuels, ils sont réservés par cette même parole pour être livrés au feu : ils sont gardés en vue du jour du jugement où tous ceux qui n’ont aucun respect pour Dieu périront.'
  '8':
  - type: text
    content: 'Mais il y a un fait que vous ne devez pas oublier, mes chers amis : c’est que, pour le Seigneur, un jour est comme mille ans et '
  - type: text
    content: mille ans sont comme un jour
  - type: note
    content: Ps 90.4.
  - type: text
    content: '. '
  '9':
  - type: text
    content: Le Seigneur n’est pas en retard dans l’accomplissement de sa promesse, comme certains se l’imaginent, il fait simplement preuve de patience à votre égard, car il ne veut pas qu’un seul périsse. Il voudrait, au contraire, que tous parviennent à se convertir
  - type: note
    content: Mot traduit ailleurs par changer, ou changer d’attitude.
  - type: text
    content: '. '
