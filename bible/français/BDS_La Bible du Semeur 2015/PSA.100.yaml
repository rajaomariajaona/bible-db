document_id: PSA.100,21
type_code: fra
verses:
  '1':
  - type: heading
    content: L’Eternel est célébré par son peuple
  - type: text
    content: Psaume pour remercier Dieu.
  - type: text
    content: Acclame l’Eternel,
  - type: text
    content: ô terre tout entière !
  '2':
  - type: text
    content: Servez l’Eternel avec joie !
  - type: text
    content: Entrez en sa présence ╵avec des chants joyeux !
  '3':
  - type: text
    content: Sachez que c’est l’Eternel qui est Dieu !
  - type: text
    content: C’est lui qui nous a faits, ╵nous lui appartenons
  - type: note
    content: 'D’après les indications de lecture des copistes, en marge du texte, et des versions anciennes. L’hébreu a, dans le texte : et non pas nous-mêmes.'
  - type: text
    content: ','
  - type: text
    content: et nous sommes son peuple, ╵le troupeau qu’il fait paître.
  '4':
  - type: text
    content: Avancez par ses portes ╵avec reconnaissance !
  - type: text
    content: Entrez dans ses parvis ╵en chantant ses louanges !
  - type: text
    content: Rendez-lui votre hommage ╵bénissez-le.
  '5':
  - type: text
    content: Car l’Eternel est bon, ╵car son amour dure à toujours
  - type: text
    content: et sa fidélité ╵s’étendra d’âge en âge
  - type: note
    content: Voir 106.1 ; 107.1 ; 118.1, 29 ; 136 ; 1 Ch 16.34 ; 2 Ch 5.13 ; 7.3 ; Esd 3.11 ; Jr 33.11.
  - type: text
    content: .
