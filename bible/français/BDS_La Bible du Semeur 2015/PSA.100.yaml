document_id: PSA.100,21
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: L’Eternel est célébré par son peuple
    marker-yv: yv-h
  - type: usfm
    marker: d
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: Psaume pour remercier Dieu.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Acclame l’Eternel,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ô terre tout entière !
  '2':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: Servez l’Eternel avec joie !
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Entrez en sa présence ╵avec des chants joyeux !
  '3':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: Sachez que c’est l’Eternel qui est Dieu !
  - type: usfm
    marker: q1
    children:
    - type: text
      text: C’est lui qui nous a faits, ╵nous lui appartenons
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '100.3 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'D’après les indications de lecture des copistes, en marge du texte, et des versions anciennes. L’hébreu a, dans le texte : '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: et non pas nous-mêmes.
      marker-yv: yv-n
    - type: text
      text: ','
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et nous sommes son peuple, ╵le troupeau qu’il fait paître.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: Avancez par ses portes ╵avec reconnaissance !
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Entrez dans ses parvis ╵en chantant ses louanges !
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Rendez-lui votre hommage ╵bénissez-le.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: Car l’Eternel est bon, ╵car son amour dure à toujours
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et sa fidélité ╵s’étendra d’âge en âge
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '100.5 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Voir 106.1 ; 107.1 ; 118.1, 29 ; 136 ; 1 Ch 16.34 ; 2 Ch 5.13 ; 7.3 ; Esd 3.11 ; Jr 33.11.
      marker-yv: yv-n
    - type: text
      text: .
