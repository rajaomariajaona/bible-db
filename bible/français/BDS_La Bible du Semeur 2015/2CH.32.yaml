document_id: 2CH.32
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: La menace assyrienne
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Après ces événements qui démontrèrent la fidélité d’Ezéchias envers Dieu, Sennachérib, roi d’Assyrie, vint envahir le territoire de Juda. Il assiégea les villes fortifiées et ordonna d’en forcer les remparts
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '32.1 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Autre traduction : '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: avec l’intention de s’en emparer.
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Ezéchias, voyant que Sennachérib était venu avec l’intention d’attaquer Jérusalem, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'tint conseil avec ses ministres et ses officiers pour faire obturer les sources d’eau situées en dehors de la ville. Tous l’aidèrent '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: et beaucoup de gens se rassemblèrent. Ils bouchèrent toutes les sources, y compris celle dont l’eau s’écoulait par un canal souterrain
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '32.4 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Primitivement, les eaux de la source de Guihôn s’écoulaient vers le Cédron. Pour empêcher les assiégeants de trouver de l’eau pour leurs besoins, Ezéchias fit obstruer l’écoulement extérieur et capta les eaux pour les amener par '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'un canal souterrain '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'à l’intérieur de la ville où elles ravitaillaient les assiégés en eau potable (voir '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 2 R 20.20
        metadata:
          usfm: 2KI.20.20
      - type: text
        text: ).
    marker-yv: yv-n
  - type: text
    text: '. « Pourquoi, disaient-ils, les rois d’Assyrie trouveraient-ils à leur arrivée de l’eau en abondance ? » '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Ensuite, Ezéchias se mit courageusement à reconstruire toute la muraille de la ville là où elle avait des brèches et il suréleva les tours. Il la doubla d’une seconde muraille à l’extérieur, renforça les terrasses aménagées pour les cultures dans la Cité de David. Il fit aussi fabriquer une grande quantité d’armes et de boucliers. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Enfin, il établit des chefs militaires sur l’armée, puis il les rassembla autour de lui sur la place près de la porte de la ville pour les encourager. Il leur dit : '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Soyez forts et prenez courage ! Soyez sans crainte, ne vous laissez pas effrayer par le roi d’Assyrie et les troupes nombreuses qui l’accompagnent ; car nous avons avec nous quelqu’un de plus puissant que lui. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Ce roi n’a avec lui qu’une force humaine, mais nous, nous avons avec nous l’Eternel notre Dieu. Il viendra à notre secours et il combattra pour nous.
- type: usfm
  marker: p
  children:
  - type: text
    text: Alors toute la population fit confiance aux paroles d’Ezéchias, roi de Juda.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Le défi
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: (2 R 18.17-35)
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Après cela, Sennachérib, roi d’Assyrie, envoya une délégation à Jérusalem vers Ezéchias, roi de Juda, et vers tous ceux de Juda qui étaient dans Jérusalem pendant qu’il était lui-même devant Lakish avec toutes ses forces. Il leur fit dire
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '32.9 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Voir v. 9-19 : parallèles à '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Es 36.2-20
        metadata:
          usfm: ISA.36.2+ISA.36.3+ISA.36.4+ISA.36.5+ISA.36.6+ISA.36.7+ISA.36.8+ISA.36.9+ISA.36.10+ISA.36.11+ISA.36.12+ISA.36.13+ISA.36.14+ISA.36.15+ISA.36.16+ISA.36.17+ISA.36.18+ISA.36.19+ISA.36.20
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: '  : '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Voici ce que déclare Sennachérib, roi d’Assyrie : En quoi placez-vous votre confiance, pour que vous restiez ainsi enfermés dans la forteresse de Jérusalem ? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Ne voyez-vous pas qu’Ezéchias vous trompe pour vous faire mourir de faim et de soif quand il dit : « L’Eternel, notre Dieu, nous délivrera du roi d’Assyrie ? » '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'N’est-ce pas précisément ce Dieu dont Ezéchias a fait disparaître les hauts lieux et les autels, en disant aux habitants de Juda et de Jérusalem de rendre leur culte uniquement devant un seul autel et d’y brûler des parfums ? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Ne savez-vous pas ce que nous avons fait, moi et mes ancêtres, à tous les peuples des autres pays ? Leurs dieux ont-ils pu délivrer leur pays de mon emprise ? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'De tous les dieux de ces peuples exterminés par mes ancêtres, quels sont ceux qui ont délivré leur peuple pour que votre Dieu soit capable de vous délivrer ? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Maintenant, ne vous laissez donc pas tromper par Ezéchias et qu’il ne vous abuse pas de cette manière ! Ne vous fiez pas à lui ! Car aucun dieu d’aucun peuple ni d’aucun royaume n’a pu délivrer son peuple de moi-même, ou de mes ancêtres. Et vos dieux ne vous délivreront pas davantage de mon emprise !
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Les envoyés de Sennachérib continuèrent à parler contre l’Eternel Dieu et contre Ezéchias son serviteur. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Sennachérib avait aussi écrit des lettres outrageantes pour l’Eternel, le Dieu d’Israël, dans lesquelles il le prenait à partie disant : Pas plus que les dieux des autres pays n’ont délivré leur peuple de mon emprise, le Dieu d’Ezéchias ne délivrera son peuple de mon emprise.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Les envoyés crièrent d’une voix forte en hébreu, à l’adresse des habitants de Jérusalem qui étaient sur la muraille, afin de les effrayer et de les terroriser pour pouvoir s’emparer de la ville. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Ils parlèrent du Dieu de Jérusalem comme s’il s’agissait d’un dieu des peuples païens, simple ouvrage fabriqué par des hommes.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Dieu répond aux prières
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: (2 R 19.35-37)
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Le roi Ezéchias et le prophète Esaïe, fils d’Amots, se mirent à prier à ce sujet, et ils crièrent vers le ciel pour implorer du secours
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '32.20 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Voir v. 20-21 : parallèles à '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Es 37.36-38
        metadata:
          usfm: ISA.37.36+ISA.37.37+ISA.37.38
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Alors l’Eternel envoya un ange qui extermina dans le camp du roi d’Assyrie tous les guerriers valeureux, y compris les généraux et les officiers, si bien que le roi retourna dans son pays tout confus. Un jour, il pénétra dans le temple de son dieu, et ses propres fils l’y assassinèrent d’un coup d’épée.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: C’est ainsi que l’Eternel délivra Ezéchias et les habitants de Jérusalem de Sennachérib, roi d’Assyrie, et de tout autre ennemi. Il leur accorda la paix sur toutes leurs frontières
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '32.22 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'D’après l’ancienne version grecque et la Vulgate ; le texte hébreu traditionnel a : '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'il les conduisit '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'ou '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: il prit soin d’eux.
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: Nombreux furent ceux qui apportèrent alors à Jérusalem une offrande à l’Eternel et de riches présents pour Ezéchias, roi de Juda. A la suite de ces événements, il acquit un grand prestige aux yeux de tous les autres peuples.
- type: usfm
  marker: s1
  children:
  - type: text
    text: La fin du règne d’Ezéchias
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: (2 R 20.1-21)
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: A cette époque Ezéchias tomba très gravement malade. Il pria l’Eternel qui lui donna un signe prodigieux
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '32.24 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Miracle raconté en '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 2 R 20.1-11
        metadata:
          usfm: 2KI.20.1+2KI.20.2+2KI.20.3+2KI.20.4+2KI.20.5+2KI.20.6+2KI.20.7+2KI.20.8+2KI.20.9+2KI.20.10+2KI.20.11
      - type: text
        text: ' que le Chroniste suppose connu de ses lecteurs. Voir v. 24-33 : parallèles à Es 38.1-8 ; 39.1-8.'
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Mais Ezéchias ne se conduisit pas ensuite d’une manière qui marque sa reconnaissance pour cela ; au contraire, il devint orgueilleux et attira la colère de l’Eternel sur lui, sur Juda et sur Jérusalem. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: Alors Ezéchias s’humilia de son orgueil et les habitants de Jérusalem firent de même, de sorte que l’Eternel ne fit pas éclater sa colère contre eux du vivant d’Ezéchias.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: Ezéchias fut grandement comblé de richesses et de gloire. Il se constitua des réserves d’argent, d’or, de pierres précieuses, de parfums et d’aromates, de boucliers
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '32.27 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Sans doute des boucliers décoratifs, peut-être en or (voir '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1 R 10.16-17
        metadata:
          usfm: 1KI.10.16+1KI.10.17
      - type: text
        text: ).
    marker-yv: yv-n
  - type: text
    text: ' et de toutes sortes d’objets précieux. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'Il fit bâtir des entrepôts pour engranger les récoltes de blé, de vin nouveau et d’huile. Il construisit des étables pour toutes sortes d’animaux domestiques et aménagea des enclos pour ses troupeaux. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'Il édifia des villes et eut des troupeaux nombreux de petit et de gros bétail, car Dieu lui avait donné d’immenses richesses. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: Ce fut aussi lui, Ezéchias, qui fit obturer l’issue supérieure des eaux de la source de Guihôn et les canalisa plus bas vers l’ouest de la Cité de David. Ainsi, Ezéchias réussit dans toutes ses entreprises.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: Cependant, lors de la visite des ambassadeurs des dirigeants babyloniens envoyés pour s’informer sur le prodige qui avait eu lieu dans le pays, Dieu l’abandonna à lui-même pour le mettre à l’épreuve et savoir ce qui était réellement au fond de son cœur.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: Les autres faits et gestes d’Ezéchias, et ses actes de piété sont cités dans la révélation du prophète Esaïe
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '32.32 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Voir Es 36 à 39.
    marker-yv: yv-n
  - type: text
    text: ', fils d’Amots, et dans le livre des rois de Juda et d’Israël'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '32.32 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Voir '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '16.11'
        metadata:
          usfm: 2CH.16.11
      - type: text
        text: ' et note.'
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: Ezéchias rejoignit ses ancêtres décédés, et on l’enterra dans la partie supérieure des tombeaux des descendants de David. Tout Juda et les habitants de Jérusalem lui rendirent les derniers honneurs. Son fils Manassé lui succéda sur le trône.
