document_id: 2CH.32,21
type_code: fra
verses:
  '1':
  - type: heading
    content: La menace assyrienne
  - type: text
    content: Après ces événements qui démontrèrent la fidélité d’Ezéchias envers Dieu, Sennachérib, roi d’Assyrie, vint envahir le territoire de Juda. Il assiégea les villes fortifiées et ordonna d’en forcer les remparts
  - type: note
    content: 'Autre traduction : avec l’intention de s’en emparer.'
  - type: text
    content: '. '
  '10':
  - type: text
    content: 'Voici ce que déclare Sennachérib, roi d’Assyrie : En quoi placez-vous votre confiance, pour que vous restiez ainsi enfermés dans la forteresse de Jérusalem ? '
  '11':
  - type: text
    content: 'Ne voyez-vous pas qu’Ezéchias vous trompe pour vous faire mourir de faim et de soif quand il dit : « L’Eternel, notre Dieu, nous délivrera du roi d’Assyrie ? » '
  '12':
  - type: text
    content: 'N’est-ce pas précisément ce Dieu dont Ezéchias a fait disparaître les hauts lieux et les autels, en disant aux habitants de Juda et de Jérusalem de rendre leur culte uniquement devant un seul autel et d’y brûler des parfums ? '
  '13':
  - type: text
    content: 'Ne savez-vous pas ce que nous avons fait, moi et mes ancêtres, à tous les peuples des autres pays ? Leurs dieux ont-ils pu délivrer leur pays de mon emprise ? '
  '14':
  - type: text
    content: 'De tous les dieux de ces peuples exterminés par mes ancêtres, quels sont ceux qui ont délivré leur peuple pour que votre Dieu soit capable de vous délivrer ? '
  '15':
  - type: text
    content: Maintenant, ne vous laissez donc pas tromper par Ezéchias et qu’il ne vous abuse pas de cette manière ! Ne vous fiez pas à lui ! Car aucun dieu d’aucun peuple ni d’aucun royaume n’a pu délivrer son peuple de moi-même, ou de mes ancêtres. Et vos dieux ne vous délivreront pas davantage de mon emprise !
  '16':
  - type: text
    content: 'Les envoyés de Sennachérib continuèrent à parler contre l’Eternel Dieu et contre Ezéchias son serviteur. '
  '17':
  - type: text
    content: 'Sennachérib avait aussi écrit des lettres outrageantes pour l’Eternel, le Dieu d’Israël, dans lesquelles il le prenait à partie disant : Pas plus que les dieux des autres pays n’ont délivré leur peuple de mon emprise, le Dieu d’Ezéchias ne délivrera son peuple de mon emprise.'
  '18':
  - type: text
    content: 'Les envoyés crièrent d’une voix forte en hébreu, à l’adresse des habitants de Jérusalem qui étaient sur la muraille, afin de les effrayer et de les terroriser pour pouvoir s’emparer de la ville. '
  '19':
  - type: text
    content: Ils parlèrent du Dieu de Jérusalem comme s’il s’agissait d’un dieu des peuples païens, simple ouvrage fabriqué par des hommes.
  - type: heading
    content: Dieu répond aux prières
  - type: heading
    content: (2 R 19.35-37)
  '2':
  - type: text
    content: 'Ezéchias, voyant que Sennachérib était venu avec l’intention d’attaquer Jérusalem, '
  '20':
  - type: text
    content: Le roi Ezéchias et le prophète Esaïe, fils d’Amots, se mirent à prier à ce sujet, et ils crièrent vers le ciel pour implorer du secours
  - type: note
    content: 'Voir v. 20-21 : parallèles à Es 37.36-38.'
  - type: text
    content: '. '
  '21':
  - type: text
    content: Alors l’Eternel envoya un ange qui extermina dans le camp du roi d’Assyrie tous les guerriers valeureux, y compris les généraux et les officiers, si bien que le roi retourna dans son pays tout confus. Un jour, il pénétra dans le temple de son dieu, et ses propres fils l’y assassinèrent d’un coup d’épée.
  '22':
  - type: text
    content: C’est ainsi que l’Eternel délivra Ezéchias et les habitants de Jérusalem de Sennachérib, roi d’Assyrie, et de tout autre ennemi. Il leur accorda la paix sur toutes leurs frontières
  - type: note
    content: 'D’après l’ancienne version grecque et la Vulgate ; le texte hébreu traditionnel a : il les conduisit ou il prit soin d’eux.'
  - type: text
    content: '. '
  '23':
  - type: text
    content: Nombreux furent ceux qui apportèrent alors à Jérusalem une offrande à l’Eternel et de riches présents pour Ezéchias, roi de Juda. A la suite de ces événements, il acquit un grand prestige aux yeux de tous les autres peuples.
  - type: heading
    content: La fin du règne d’Ezéchias
  - type: heading
    content: (2 R 20.1-21)
  '24':
  - type: text
    content: A cette époque Ezéchias tomba très gravement malade. Il pria l’Eternel qui lui donna un signe prodigieux
  - type: note
    content: 'Miracle raconté en 2 R 20.1-11 que le Chroniste suppose connu de ses lecteurs. Voir v. 24-33 : parallèles à Es 38.1-8 ; 39.1-8.'
  - type: text
    content: '. '
  '25':
  - type: text
    content: 'Mais Ezéchias ne se conduisit pas ensuite d’une manière qui marque sa reconnaissance pour cela ; au contraire, il devint orgueilleux et attira la colère de l’Eternel sur lui, sur Juda et sur Jérusalem. '
  '26':
  - type: text
    content: Alors Ezéchias s’humilia de son orgueil et les habitants de Jérusalem firent de même, de sorte que l’Eternel ne fit pas éclater sa colère contre eux du vivant d’Ezéchias.
  '27':
  - type: text
    content: Ezéchias fut grandement comblé de richesses et de gloire. Il se constitua des réserves d’argent, d’or, de pierres précieuses, de parfums et d’aromates, de boucliers
  - type: note
    content: Sans doute des boucliers décoratifs, peut-être en or (voir 1 R 10.16-17).
  - type: text
    content: ' et de toutes sortes d’objets précieux. '
  '28':
  - type: text
    content: 'Il fit bâtir des entrepôts pour engranger les récoltes de blé, de vin nouveau et d’huile. Il construisit des étables pour toutes sortes d’animaux domestiques et aménagea des enclos pour ses troupeaux. '
  '29':
  - type: text
    content: 'Il édifia des villes et eut des troupeaux nombreux de petit et de gros bétail, car Dieu lui avait donné d’immenses richesses. '
  '3':
  - type: text
    content: 'tint conseil avec ses ministres et ses officiers pour faire obturer les sources d’eau situées en dehors de la ville. Tous l’aidèrent '
  '30':
  - type: text
    content: Ce fut aussi lui, Ezéchias, qui fit obturer l’issue supérieure des eaux de la source de Guihôn et les canalisa plus bas vers l’ouest de la Cité de David. Ainsi, Ezéchias réussit dans toutes ses entreprises.
  '31':
  - type: text
    content: Cependant, lors de la visite des ambassadeurs des dirigeants babyloniens envoyés pour s’informer sur le prodige qui avait eu lieu dans le pays, Dieu l’abandonna à lui-même pour le mettre à l’épreuve et savoir ce qui était réellement au fond de son cœur.
  '32':
  - type: text
    content: Les autres faits et gestes d’Ezéchias, et ses actes de piété sont cités dans la révélation du prophète Esaïe
  - type: note
    content: Voir Es 36 à 39.
  - type: text
    content: ', fils d’Amots, et dans le livre des rois de Juda et d’Israël'
  - type: note
    content: Voir 16.11 et note.
  - type: text
    content: .
  '33':
  - type: text
    content: Ezéchias rejoignit ses ancêtres décédés, et on l’enterra dans la partie supérieure des tombeaux des descendants de David. Tout Juda et les habitants de Jérusalem lui rendirent les derniers honneurs. Son fils Manassé lui succéda sur le trône.
  '4':
  - type: text
    content: et beaucoup de gens se rassemblèrent. Ils bouchèrent toutes les sources, y compris celle dont l’eau s’écoulait par un canal souterrain
  - type: note
    content: Primitivement, les eaux de la source de Guihôn s’écoulaient vers le Cédron. Pour empêcher les assiégeants de trouver de l’eau pour leurs besoins, Ezéchias fit obstruer l’écoulement extérieur et capta les eaux pour les amener par un canal souterrain à l’intérieur de la ville où elles ravitaillaient les assiégés en eau potable (voir 2 R 20.20).
  - type: text
    content: '. « Pourquoi, disaient-ils, les rois d’Assyrie trouveraient-ils à leur arrivée de l’eau en abondance ? » '
  '5':
  - type: text
    content: 'Ensuite, Ezéchias se mit courageusement à reconstruire toute la muraille de la ville là où elle avait des brèches et il suréleva les tours. Il la doubla d’une seconde muraille à l’extérieur, renforça les terrasses aménagées pour les cultures dans la Cité de David. Il fit aussi fabriquer une grande quantité d’armes et de boucliers. '
  '6':
  - type: text
    content: 'Enfin, il établit des chefs militaires sur l’armée, puis il les rassembla autour de lui sur la place près de la porte de la ville pour les encourager. Il leur dit : '
  '7':
  - type: text
    content: 'Soyez forts et prenez courage ! Soyez sans crainte, ne vous laissez pas effrayer par le roi d’Assyrie et les troupes nombreuses qui l’accompagnent ; car nous avons avec nous quelqu’un de plus puissant que lui. '
  '8':
  - type: text
    content: Ce roi n’a avec lui qu’une force humaine, mais nous, nous avons avec nous l’Eternel notre Dieu. Il viendra à notre secours et il combattra pour nous.
  - type: text
    content: Alors toute la population fit confiance aux paroles d’Ezéchias, roi de Juda.
  - type: heading
    content: Le défi
  - type: heading
    content: (2 R 18.17-35)
  '9':
  - type: text
    content: Après cela, Sennachérib, roi d’Assyrie, envoya une délégation à Jérusalem vers Ezéchias, roi de Juda, et vers tous ceux de Juda qui étaient dans Jérusalem pendant qu’il était lui-même devant Lakish avec toutes ses forces. Il leur fit dire
  - type: note
    content: 'Voir v. 9-19 : parallèles à Es 36.2-20.'
  - type: text
    content: '  : '
