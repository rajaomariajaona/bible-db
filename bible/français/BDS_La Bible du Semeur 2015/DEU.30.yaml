document_id: DEU.30,21
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s2
    children:
    - type: text
      text: Les bénédictions d’un retour à l’Eternel
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ces paroles que je viens de prononcer, les bénédictions et les malédictions entre lesquelles je vous offre le choix, se réaliseront. Si vous les prenez de nouveau à cœur, au milieu de tous les peuples parmi lesquels l’Eternel votre Dieu vous aura dispersés, '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: pourvu que vous l’écoutiez en obéissant à ses commandements et ses ordonnances consignés dans ce livre de la Loi, et que vous reveniez à lui de tout votre cœur et de tout votre être !
  - type: usfm
    marker: s1
    children:
    - type: text
      text: La Loi dans le cœur
    marker-yv: yv-h
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Le code de lois que je vous donne aujourd’hui n’est certainement pas trop difficile pour vous, ni hors de votre portée. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Il n’est pas au ciel pour que l’on dise : « Qui montera au ciel pour aller nous le chercher et nous le faire comprendre afin que nous puissions l’appliquer ? » '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Il n’est pas non plus au-delà de l’océan pour que l’on dise : « Qui traversera pour nous les mers pour aller nous le chercher, et nous le faire comprendre, afin que nous puissions l’appliquer ? » '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Non, la parole est toute proche de vous : elle est dans votre bouche et dans votre cœur, pour que vous l’appliquiez'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '30.14 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Les formules de ce verset sont reprises en '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: Rm 10.6-8
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: .
  - type: usfm
    marker: s1
    children:
    - type: text
      text: La vie et la mort
    marker-yv: yv-h
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Voyez, je place aujourd’hui devant vous, d’un côté, la vie et le bonheur, de l’autre, la mort et le malheur. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ce que je vous commande aujourd’hui, c’est d’aimer l’Eternel votre Dieu, de suivre le chemin qu’il vous trace et d’obéir à ses commandements, ses ordonnances et ses lois. En faisant cela, vous aurez la vie, vous deviendrez nombreux et vous serez bénis par l’Eternel votre Dieu dans le pays où vous vous rendez pour en prendre possession. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Mais si votre cœur se détourne de lui, si vous refusez de lui obéir et si vous vous laissez entraîner à adorer d’autres dieux et à leur rendre un culte, '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: je vous préviens dès aujourd’hui que vous périrez à coup sûr. Vous ne vivrez pas longtemps dans le pays au-delà du Jourdain où vous vous rendez pour en prendre possession.
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Je prends aujourd’hui le ciel et la terre à témoins : je vous offre le choix entre la vie et la mort, entre la bénédiction et la malédiction. Choisissez donc la vie, afin que vous viviez, vous et vos descendants. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'si vous revenez à l’Eternel votre Dieu et si vous l’écoutez en obéissant de tout votre cœur et de tout votre être, vous et vos enfants, à tout ce que je vous ordonne aujourd’hui, '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Choisissez d’aimer l’Eternel votre Dieu, de lui obéir et de lui rester attachés, car c’est lui qui vous fait vivre et qui pourra vous accorder de passer de nombreux jours dans le pays que l’Eternel a promis par serment de donner à vos ancêtres Abraham, Isaac et Jacob
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '30.20 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Voir Gn 12.7 ; 26.3 ; 28.13.
      marker-yv: yv-n
    - type: text
      text: .
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'alors l’Eternel votre Dieu aura compassion de vous : il vous restaurera'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '30.3 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'On peut peut-être traduire '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: il ramènera ceux d’entre vous qui auront été en captivité.
      marker-yv: yv-n
    - type: text
      text: ' et vous rassemblera pour vous faire revenir de chez tous les peuples parmi lesquels il vous aura dispersés. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Même si les exilés de votre peuple sont aux confins du monde, l’Eternel votre Dieu ira les chercher là-bas et les rassembler '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'pour les ramener au pays que leurs ancêtres auront possédé et ils en retrouveront la possession. Il les y rendra plus heureux et plus nombreux que leurs ancêtres. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'L’Eternel votre Dieu vous circoncira le cœur et celui de vos descendants pour que vous l’aimiez de tout votre cœur et de tout votre être, et qu’ainsi vous viviez. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Il infligera alors toutes ces malédictions que je vous ai décrites à vos ennemis, à ceux qui vous haïssent et qui vous auront persécutés. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Quant à vous, vous reviendrez à lui, vous l’écouterez et vous appliquerez tous ses commandements que je vous transmets aujourd’hui. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'L’Eternel votre Dieu vous comblera de bonheur en faisant réussir tout ce que vous entreprendrez ; il vous donnera de nombreux enfants, il multipliera votre bétail et vous accordera d’abondantes récoltes. Car l’Eternel prendra de nouveau plaisir à votre bonheur comme il prenait plaisir à celui de vos ancêtres, '
