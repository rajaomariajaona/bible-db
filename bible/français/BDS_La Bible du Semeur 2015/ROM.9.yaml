document_id: ROM.9
type_code: fra
segments:
- type: usfm
  marker: ms1
  children:
  - type: text
    text: Israël dans l’histoire du salut
  marker-yv: yv-h
- type: usfm
  marker: s1
  children:
  - type: text
    text: Les sentiments de Paul à l’égard des Israélites
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Je dis la vérité, en tant qu’homme uni à Christ, je ne mens pas ; ma conscience, en accord avec l’Esprit Saint, me rend ce témoignage : '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'j’éprouve une profonde tristesse et un chagrin continuel dans mon cœur. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Oui, je demanderais à Dieu d’être maudit
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '9.3 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Autre traduction : '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: Je souhaiterais être maudit.
    marker-yv: yv-n
  - type: text
    text: ' et séparé de Christ pour mes frères, nés du même peuple que moi. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Ce sont les Israélites. C’est à eux qu’appartiennent la condition de fils adoptifs de Dieu, la manifestation glorieuse de la présence divine, les alliances
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '9.4 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Certains manuscrits ont : '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: l’alliance.
    marker-yv: yv-n
  - type: text
    text: ', le don de la Loi, le culte et les promesses ; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: à eux les patriarches ! Et c’est d’eux qu’est issu Christ dans son humanité ; il est aussi au-dessus de tout, Dieu béni pour toujours. Amen !
- type: usfm
  marker: s1
  children:
  - type: text
    text: Le véritable Israël selon l’élection de Dieu
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Ce n’est pas que la Parole de Dieu soit restée sans effet ! Car ce ne sont pas tous ceux qui descendent du patriarche Israël
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '9.6 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Autre traduction : '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: tous ceux qui font partie d’Israël.
    marker-yv: yv-n
  - type: text
    text: ' qui constituent Israël ; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'et ceux qui descendent d’Abraham ne sont pas tous ses enfants. Car Dieu dit à Abraham : '
  - type: usfm
    marker: qt
    children:
    - type: text
      text: C’est par Isaac que te sera suscitée une descendance
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '9.7 '
    - type: usfm
      marker: ft
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Gn 21.12
        metadata:
          usfm: GEN.21.12
      - type: text
        text: .
    marker-yv: yv-n
  - type: usfm
    marker: qt
    children:
    - type: text
      text: .
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Cela veut dire que tous les enfants de la descendance naturelle d’Abraham ne sont pas enfants de Dieu. Seuls les enfants nés selon la promesse sont considérés comme sa descendance. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Car telle est la promesse de Dieu : '
  - type: usfm
    marker: qt
    children:
    - type: text
      text: Vers cette époque, je viendrai, et Sara aura un fils
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '9.9 '
    - type: usfm
      marker: ft
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Gn 18.10
        metadata:
          usfm: GEN.18.10
      - type: text
        text: ', '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '14'
        metadata:
          usfm: GEN.18.14
      - type: text
        text: .
    marker-yv: yv-n
  - type: usfm
    marker: qt
    children:
    - type: text
      text: .
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Et ce n’est pas tout : Rébecca eut des jumeaux nés d’un seul et même père, de notre ancêtre Isaac. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 11-12
  - type: text
    text: 'Or, Dieu a un plan qui s’accomplit selon son libre choix et qui dépend, non des actions des hommes, mais uniquement de la volonté de celui qui appelle. Et pour que ce plan demeure, c’est avant même la naissance de ces enfants, et par conséquent avant qu’ils n’aient fait ni bien ni mal, que Dieu dit à Rébecca : '
  - type: usfm
    marker: qt
    children:
    - type: text
      text: L’aîné sera assujetti au cadet
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '9.11-12 '
    - type: usfm
      marker: ft
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Gn 25.23
        metadata:
          usfm: GEN.25.23
      - type: text
        text: .
    marker-yv: yv-n
  - type: usfm
    marker: qt
    children:
    - type: text
      text: .
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Ceci s’accorde avec cet autre texte de l’Ecriture : '
  - type: usfm
    marker: qt
    children:
    - type: text
      text: J’ai aimé Jacob, et j’ai écarté Esaü
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '9.13 '
    - type: usfm
      marker: ft
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ml 1.2-3
        metadata:
          usfm: MAL.1.2+MAL.1.3
      - type: text
        text: .
    marker-yv: yv-n
  - type: usfm
    marker: qt
    children:
    - type: text
      text: .
- type: usfm
  marker: s1
  children:
  - type: text
    text: Le Dieu souverain est juste
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Mais alors, que dire ? Dieu serait-il injuste ? Loin de là ! '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Car il a dit à Moïse :'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: qt
    children:
    - type: text
      text: Je ferai grâce à qui je veux faire grâce,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: qt
    children:
    - type: text
      text: j’aurai compassion de qui je veux avoir compassion
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '9.15 '
    - type: usfm
      marker: ft
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ex 33.19
        metadata:
          usfm: EXO.33.19
      - type: text
        text: ' .'
    marker-yv: yv-n
  - type: usfm
    marker: qt
    children:
    - type: text
      text: .
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Cela ne dépend donc ni de la volonté de l’homme, ni de ses efforts, mais de Dieu qui fait grâce. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Dans l’Ecriture, Dieu dit au pharaon :'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: qt
    children:
    - type: text
      text: 'Voici pourquoi je t’ai fait parvenir où tu es : pour montrer en toi ma puissance et pour que ma renommée se répande par toute la terre'
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '9.17 '
    - type: usfm
      marker: ft
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ex 9.16
        metadata:
          usfm: EXO.9.16
      - type: text
        text: ' cité selon l’ancienne version grecque.'
    marker-yv: yv-n
  - type: usfm
    marker: qt
    children:
    - type: text
      text: .
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Ainsi donc, Dieu fait grâce à qui il veut et il endurcit qui il veut.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Tu vas me dire : pourquoi alors fait-il encore des reproches ? Car qui a jamais pu résister à sa volonté ? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Mais, qui es-tu donc toi, un homme, pour critiquer Dieu ? '
  - type: usfm
    marker: qt
    children:
    - type: text
      text: 'L’ouvrage demandera-t-il à l’ouvrier : « Pourquoi m’as-tu fait ains'
  - type: text
    text: i
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '9.20 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Voir '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Es 45.9
        metadata:
          usfm: ISA.45.9
      - type: text
        text: .
    marker-yv: yv-n
  - type: usfm
    marker: qt
    children:
    - type: text
      text: ? »
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Le potier n’a-t-il pas le droit, à partir du même bloc d’argile, de fabriquer un pot d’usage noble et un autre pour l’usage courant ?
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: Et qu’as-tu à redire si Dieu, parce qu’il voulait montrer sa colère et faire connaître sa puissance, a supporté avec une immense patience ceux qui étaient les objets de sa colère, tout prêts
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '9.22 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Autre traduction : '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: préparés pour.
    marker-yv: yv-n
  - type: text
    text: ' pour la destruction ? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: Oui, qu’as-tu à redire si Dieu a agi ainsi pour manifester la richesse de sa gloire en faveur de ceux qui sont les objets de sa compassion, ceux qu’il a préparés d’avance pour la gloire ?
- type: usfm
  marker: s1
  children:
  - type: text
    text: Pour les Juifs et pour les non-Juifs
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'C’est nous qui sommes les objets de sa compassion, nous qu’il a appelés non seulement d’entre les Juifs, mais aussi d’entre les non-Juifs. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'C’est ce qu’il dit dans le livre du prophète Osée :'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: qt
    children:
    - type: text
      text: Celui qui n’était pas mon peuple,
  - type: text
    text: ' ╵'
  - type: usfm
    marker: qt
    children:
    - type: text
      text: je l’appellerai « mon peuple ».
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: qt
    children:
    - type: text
      text: Celle qui n’était pas la bien-aimée,
  - type: text
    text: ' ╵'
  - type: usfm
    marker: qt
    children:
    - type: text
      text: je la nommerai « bien-aimée »
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '9.25 '
    - type: usfm
      marker: ft
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Os 2.25
        metadata:
          usfm: HOS.2.25
      - type: text
        text: .
    marker-yv: yv-n
  - type: usfm
    marker: qt
    children:
    - type: text
      text: .
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: ' '
  - type: usfm
    marker: qt
    children:
    - type: text
      text: 'Au lieu même où on leur avait dit : « Vous n’êtes pas mon peuple », on leur dira alors : « Vous êtes les enfants du Dieu vivant'
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '9.26 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Os 2.1 ; 1.9.
    marker-yv: yv-n
  - type: usfm
    marker: qt
    children:
    - type: text
      text: . »
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'Et pour ce qui concerne Israël, Esaïe déclare de son côté :'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: qt
    children:
    - type: text
      text: Même si les descendants d’
    - type: usfm
      marker: w
      children:
      - type: text
        text: Israël
  - type: text
    text: ' ╵'
  - type: usfm
    marker: qt
    children:
    - type: text
      text: étaient aussi nombreux que les grains de sable au bord de la mer,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: qt
    children:
    - type: text
      text: 'seul un reste sera '
    - type: usfm
      marker: w
      children:
      - type: text
        text: sauvé
    - type: text
      text: .
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: ' '
  - type: usfm
    marker: qt
    children:
    - type: text
      text: Car pleinement et promptement
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '9.28 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Autre traduction : '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: de façon décisive.
    marker-yv: yv-n
  - type: usfm
    marker: qt
    children:
    - type: text
      text: ','
  - type: text
    text: ' ╵'
  - type: usfm
    marker: qt
    children:
    - type: text
      text: le Seigneur accomplira sa parole sur la terre
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '9.28 '
    - type: usfm
      marker: ft
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Es 10.22-23
        metadata:
          usfm: ISA.10.22+ISA.10.23
      - type: text
        text: ' cité selon l’ancienne version grecque.'
    marker-yv: yv-n
  - type: usfm
    marker: qt
    children:
    - type: text
      text: .
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'Et comme Esaïe l’avait dit par avance :'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: qt
    children:
    - type: text
      text: Si le Seigneur des armées célestes
  - type: text
    text: ' ╵'
  - type: usfm
    marker: qt
    children:
    - type: text
      text: ne nous avait laissé des descendants,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: qt
    children:
    - type: text
      text: 'nous ressemblerions à '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Sodome
    - type: text
      text: ','
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: qt
    children:
    - type: text
      text: 'nous serions comme '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Gomorrhe
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '9.29 '
    - type: usfm
      marker: ft
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Es 1.9
        metadata:
          usfm: ISA.1.9
      - type: text
        text: ' cité selon l’ancienne version grecque. '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: Sodome… Gomorrhe
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: ': '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: deux villes qui ont subi un terrible jugement de la part de Dieu (
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Gn 19.23-28
        metadata:
          usfm: GEN.19.23+GEN.19.24+GEN.19.25+GEN.19.26+GEN.19.27+GEN.19.28
      - type: text
        text: ).
    marker-yv: yv-n
  - type: usfm
    marker: qt
    children:
    - type: text
      text: .
- type: usfm
  marker: s1
  children:
  - type: text
    text: 'Etre juste : par la foi et non par la Loi'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'Que dire maintenant ? Voici ce que nous disons : les païens qui ne cherchaient pas à être déclarés justes par Dieu ont saisi cette justice, mais il s’agit de la justice qui est reçue par la foi. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: Les Israélites, eux, qui cherchaient à être déclarés justes en obéissant à une loi, n’y sont pas parvenus
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '9.31 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Autre traduction : '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: n’ont pas trouvé une Loi par laquelle ils auraient pu être déclarés justes.
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
