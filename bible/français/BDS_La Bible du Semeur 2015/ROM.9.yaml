document_id: ROM.9,21
type_code: fra
verses:
  '1':
  - type: heading
    content: Israël dans l’histoire du salut
  - type: heading
    content: Les sentiments de Paul à l’égard des Israélites
  - type: text
    content: 'Je dis la vérité, en tant qu’homme uni à Christ, je ne mens pas ; ma conscience, en accord avec l’Esprit Saint, me rend ce témoignage : '
  '10':
  - type: text
    content: 'Et ce n’est pas tout : Rébecca eut des jumeaux nés d’un seul et même père, de notre ancêtre Isaac. '
  '11':
  - type: text
    content: 'Or, Dieu a un plan qui s’accomplit selon son libre choix et qui dépend, non des actions des hommes, mais uniquement de la volonté de celui qui appelle. Et pour que ce plan demeure, c’est avant même la naissance de ces enfants, et par conséquent avant qu’ils n’aient fait ni bien ni mal, que Dieu dit à Rébecca : '
  - type: text
    content: L’aîné sera assujetti au cadet
  - type: note
    content: Gn 25.23.
  - type: text
    content: .
  - type: text
    content: ' '
  '13':
  - type: text
    content: 'Ceci s’accorde avec cet autre texte de l’Ecriture : '
  - type: text
    content: J’ai aimé Jacob, et j’ai écarté Esaü
  - type: note
    content: Ml 1.2-3.
  - type: text
    content: .
  - type: heading
    content: Le Dieu souverain est juste
  '14':
  - type: text
    content: 'Mais alors, que dire ? Dieu serait-il injuste ? Loin de là ! '
  '15':
  - type: text
    content: 'Car il a dit à Moïse :'
  - type: text
    content: Je ferai grâce à qui je veux faire grâce,
  - type: text
    content: j’aurai compassion de qui je veux avoir compassion
  - type: text
    content: ' '
  - type: note
    content: Ex 33.19 .
  - type: text
    content: .
  '16':
  - type: text
    content: 'Cela ne dépend donc ni de la volonté de l’homme, ni de ses efforts, mais de Dieu qui fait grâce. '
  '17':
  - type: text
    content: 'Dans l’Ecriture, Dieu dit au pharaon :'
  - type: text
    content: 'Voici pourquoi je t’ai fait parvenir où tu es : pour montrer en toi ma puissance et pour que ma renommée se répande par toute la terre'
  - type: text
    content: ' '
  - type: note
    content: Ex 9.16 cité selon l’ancienne version grecque.
  - type: text
    content: .
  '18':
  - type: text
    content: Ainsi donc, Dieu fait grâce à qui il veut et il endurcit qui il veut.
  '19':
  - type: text
    content: 'Tu vas me dire : pourquoi alors fait-il encore des reproches ? Car qui a jamais pu résister à sa volonté ? '
  '2':
  - type: text
    content: 'j’éprouve une profonde tristesse et un chagrin continuel dans mon cœur. '
  '20':
  - type: text
    content: 'Mais, qui es-tu donc toi, un homme, pour critiquer Dieu ? '
  - type: text
    content: 'L’ouvrage demandera-t-il à l’ouvrier : « Pourquoi m’as-tu fait ains'
  - type: text
    content: i
  - type: note
    content: Voir Es 45.9.
  - type: text
    content: ? »
  - type: text
    content: ' '
  '21':
  - type: text
    content: Le potier n’a-t-il pas le droit, à partir du même bloc d’argile, de fabriquer un pot d’usage noble et un autre pour l’usage courant ?
  '22':
  - type: text
    content: Et qu’as-tu à redire si Dieu, parce qu’il voulait montrer sa colère et faire connaître sa puissance, a supporté avec une immense patience ceux qui étaient les objets de sa colère, tout prêts
  - type: note
    content: 'Autre traduction : préparés pour.'
  - type: text
    content: ' pour la destruction ? '
  '23':
  - type: text
    content: Oui, qu’as-tu à redire si Dieu a agi ainsi pour manifester la richesse de sa gloire en faveur de ceux qui sont les objets de sa compassion, ceux qu’il a préparés d’avance pour la gloire ?
  - type: heading
    content: Pour les Juifs et pour les non-Juifs
  '24':
  - type: text
    content: 'C’est nous qui sommes les objets de sa compassion, nous qu’il a appelés non seulement d’entre les Juifs, mais aussi d’entre les non-Juifs. '
  '25':
  - type: text
    content: 'C’est ce qu’il dit dans le livre du prophète Osée :'
  - type: text
    content: Celui qui n’était pas mon peuple,
  - type: text
    content: ' ╵'
  - type: text
    content: je l’appellerai « mon peuple ».
  - type: text
    content: Celle qui n’était pas la bien-aimée,
  - type: text
    content: ' ╵'
  - type: text
    content: je la nommerai « bien-aimée »
  - type: note
    content: Os 2.25.
  - type: text
    content: .
  '26':
  - type: text
    content: ' '
  - type: text
    content: 'Au lieu même où on leur avait dit : « Vous n’êtes pas mon peuple », on leur dira alors : « Vous êtes les enfants du Dieu vivant'
  - type: text
    content: ' '
  - type: note
    content: Os 2.1 ; 1.9.
  - type: text
    content: . »
  '27':
  - type: text
    content: 'Et pour ce qui concerne Israël, Esaïe déclare de son côté :'
  - type: text
    content: Même si les descendants d’
  - type: text
    content: Israël
  - type: text
    content: ' ╵'
  - type: text
    content: étaient aussi nombreux que les grains de sable au bord de la mer,
  - type: text
    content: 'seul un reste sera '
  - type: text
    content: sauvé
  - type: text
    content: .
  '28':
  - type: text
    content: ' '
  - type: text
    content: Car pleinement et promptement
  - type: text
    content: ' '
  - type: note
    content: 'Autre traduction : de façon décisive.'
  - type: text
    content: ','
  - type: text
    content: ' ╵'
  - type: text
    content: le Seigneur accomplira sa parole sur la terre
  - type: note
    content: Es 10.22-23 cité selon l’ancienne version grecque.
  - type: text
    content: .
  '29':
  - type: text
    content: 'Et comme Esaïe l’avait dit par avance :'
  - type: text
    content: Si le Seigneur des armées célestes
  - type: text
    content: ' ╵'
  - type: text
    content: ne nous avait laissé des descendants,
  - type: text
    content: 'nous ressemblerions à '
  - type: text
    content: Sodome
  - type: text
    content: ','
  - type: text
    content: 'nous serions comme '
  - type: text
    content: Gomorrhe
  - type: text
    content: ' '
  - type: note
    content: 'Es 1.9 cité selon l’ancienne version grecque. Sodome… Gomorrhe : deux villes qui ont subi un terrible jugement de la part de Dieu (Gn 19.23-28).'
  - type: text
    content: .
  - type: heading
    content: 'Etre juste : par la foi et non par la Loi'
  '3':
  - type: text
    content: Oui, je demanderais à Dieu d’être maudit
  - type: note
    content: 'Autre traduction : Je souhaiterais être maudit.'
  - type: text
    content: ' et séparé de Christ pour mes frères, nés du même peuple que moi. '
  '30':
  - type: text
    content: 'Que dire maintenant ? Voici ce que nous disons : les païens qui ne cherchaient pas à être déclarés justes par Dieu ont saisi cette justice, mais il s’agit de la justice qui est reçue par la foi. '
  '31':
  - type: text
    content: Les Israélites, eux, qui cherchaient à être déclarés justes en obéissant à une loi, n’y sont pas parvenus
  - type: note
    content: 'Autre traduction : n’ont pas trouvé une Loi par laquelle ils auraient pu être déclarés justes.'
  - type: text
    content: '. '
  '32':
  - type: text
    content: 'Pour quelle raison ? Parce qu’ils ont cherché à être déclarés justes non pas en comptant sur la foi, mais comme si la justice pouvait provenir de la pratique de la Loi. Ils ont buté contre la pierre qui fait tomber, '
  '33':
  - type: text
    content: 'conformément à ce que dit l’Ecriture :'
  - type: text
    content: Moi, je place en Sion
  - type: text
    content: ' ╵'
  - type: text
    content: une pierre qu’on heurte,
  - type: text
    content: un rocher qui fait trébucher.
  - type: text
    content: 'Celui qui met en lui sa '
  - type: text
    content: confiance
  - type: text
    content: ' ╵'
  - type: text
    content: ne connaîtra jamais le déshonneur
  - type: note
    content: Es 8.14 ; 28.16 cités selon l’ancienne version grecque.
  - type: text
    content: .
  '4':
  - type: text
    content: Ce sont les Israélites. C’est à eux qu’appartiennent la condition de fils adoptifs de Dieu, la manifestation glorieuse de la présence divine, les alliances
  - type: note
    content: 'Certains manuscrits ont : l’alliance.'
  - type: text
    content: ', le don de la Loi, le culte et les promesses ; '
  '5':
  - type: text
    content: à eux les patriarches ! Et c’est d’eux qu’est issu Christ dans son humanité ; il est aussi au-dessus de tout, Dieu béni pour toujours. Amen !
  - type: heading
    content: Le véritable Israël selon l’élection de Dieu
  '6':
  - type: text
    content: Ce n’est pas que la Parole de Dieu soit restée sans effet ! Car ce ne sont pas tous ceux qui descendent du patriarche Israël
  - type: note
    content: 'Autre traduction : tous ceux qui font partie d’Israël.'
  - type: text
    content: ' qui constituent Israël ; '
  '7':
  - type: text
    content: 'et ceux qui descendent d’Abraham ne sont pas tous ses enfants. Car Dieu dit à Abraham : '
  - type: text
    content: C’est par Isaac que te sera suscitée une descendance
  - type: note
    content: Gn 21.12.
  - type: text
    content: .
  - type: text
    content: ' '
  '8':
  - type: text
    content: 'Cela veut dire que tous les enfants de la descendance naturelle d’Abraham ne sont pas enfants de Dieu. Seuls les enfants nés selon la promesse sont considérés comme sa descendance. '
  '9':
  - type: text
    content: 'Car telle est la promesse de Dieu : '
  - type: text
    content: Vers cette époque, je viendrai, et Sara aura un fils
  - type: note
    content: Gn 18.10, 14.
  - type: text
    content: .
