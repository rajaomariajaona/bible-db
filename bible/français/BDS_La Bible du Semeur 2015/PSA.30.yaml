document_id: PSA.30,21
type_code: fra
verses:
  '1':
  - type: heading
    content: Tu m’as rendu à la vie
  - type: text
    content: Cantique pour l’inauguration du Temple. Un psaume de David.
  '10':
  - type: text
    content: « Si je descends dans la tombe,
  - type: text
    content: si je meurs, quel avantage ╵en retires-tu ?
  - type: text
    content: Celui qui n’est plus ╵que poussière, ╵peut-il te louer encore,
  - type: text
    content: peut-il proclamer ╵ta fidélité ?
  '11':
  - type: text
    content: Ecoute, Eternel, ╵aie pitié de moi,
  - type: text
    content: Eternel, viens à mon aide ! »
  '12':
  - type: text
    content: Tu as transformé mes pleurs ╵en une danse de joie,
  - type: text
    content: et tu m’as ôté ╵mes habits de deuil ╵pour me revêtir ╵d’un habit de fête,
  '13':
  - type: text
    content: afin que, de tout mon cœur, ╵et sans me lasser, ╵je te chante.
  - type: text
    content: Eternel, mon Dieu, ╵je te louerai à jamais.
  '2':
  - type: text
    content: Je te loue, ô Eternel, ╵car tu m’as tiré du gouffre.
  - type: text
    content: Tu n’as pas permis ╵que mes ennemis ╵se réjouissent à mes dépens.
  '3':
  - type: text
    content: Eternel, mon Dieu,
  - type: text
    content: 'je t’ai appelé ╵à mon aide, ╵et tu m’as guéri :'
  '4':
  - type: text
    content: Eternel, tu m’as fait échapper ╵au séjour des morts,
  - type: text
    content: tu m’as rendu à la vie, ╵en m’évitant de rejoindre ╵les gens qui descendent ╵au tombeau.
  '5':
  - type: text
    content: Chantez donc à l’Eternel, ╵vous tous qui lui êtes attachés !
  - type: text
    content: Apportez-lui vos louanges ! ╵Proclamez sa sainteté !
  '6':
  - type: text
    content: Son courroux dure un instant,
  - type: text
    content: sa faveur est pour la vie.
  - type: text
    content: Si, le soir, des pleurs subsistent,
  - type: text
    content: au matin, la joie éclate.
  '7':
  - type: text
    content: 'Je vivais paisiblement, ╵et je me disais :'
  - type: text
    content: « Je ne tomberai jamais. »
  '8':
  - type: text
    content: Eternel, dans ta faveur, ╵tu avais fortifié ╵la montagne où je demeure.
  - type: text
    content: Tu t’es détourné de moi, ╵et je fus désemparé.
  '9':
  - type: text
    content: J’ai crié vers toi, ╵Eternel,
  - type: text
    content: 'et j’ai imploré ta grâce, ╵ô Seigneur :'
