document_id: PSA.30,21
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Tu m’as rendu à la vie
    marker-yv: yv-h
  - type: usfm
    marker: d
    children:
    - type: text
      text: Cantique pour l’inauguration du Temple. Un psaume de David.
  '10':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: « Si je descends dans la tombe,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: si je meurs, quel avantage ╵en retires-tu ?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Celui qui n’est plus ╵que poussière, ╵peut-il te louer encore,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: peut-il proclamer ╵ta fidélité ?
  '11':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ecoute, Eternel, ╵aie pitié de moi,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Eternel, viens à mon aide ! »
  '12':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tu as transformé mes pleurs ╵en une danse de joie,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et tu m’as ôté ╵mes habits de deuil ╵pour me revêtir ╵d’un habit de fête,
  '13':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: afin que, de tout mon cœur, ╵et sans me lasser, ╵je te chante.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Eternel, mon Dieu, ╵je te louerai à jamais.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Je te loue, ô Eternel, ╵car tu m’as tiré du gouffre.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tu n’as pas permis ╵que mes ennemis ╵se réjouissent à mes dépens.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Eternel, mon Dieu,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'je t’ai appelé ╵à mon aide, ╵et tu m’as guéri :'
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Eternel, tu m’as fait échapper ╵au séjour des morts,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: tu m’as rendu à la vie, ╵en m’évitant de rejoindre ╵les gens qui descendent ╵au tombeau.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Chantez donc à l’Eternel, ╵vous tous qui lui êtes attachés !
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Apportez-lui vos louanges ! ╵Proclamez sa sainteté !
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Son courroux dure un instant,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sa faveur est pour la vie.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Si, le soir, des pleurs subsistent,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: au matin, la joie éclate.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Je vivais paisiblement, ╵et je me disais :'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: « Je ne tomberai jamais. »
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Eternel, dans ta faveur, ╵tu avais fortifié ╵la montagne où je demeure.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tu t’es détourné de moi, ╵et je fus désemparé.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: J’ai crié vers toi, ╵Eternel,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'et j’ai imploré ta grâce, ╵ô Seigneur :'
