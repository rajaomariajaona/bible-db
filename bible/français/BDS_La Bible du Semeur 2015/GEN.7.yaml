document_id: GEN.7,21
type_code: fra
verses:
  '1':
  - type: heading
    content: L’embarquement
  - type: text
    content: 'Puis l’Eternel dit à Noé : Entre dans le bateau, toi et toute ta famille car je ne vois que toi qui sois juste parmi tes contemporains. '
  '10':
  - type: text
    content: Au bout de sept jours, les eaux du déluge s’abattirent sur la terre.
  - type: heading
    content: Le déluge
  '11':
  - type: text
    content: 'L’an 600 de la vie de Noé, le dix-septième jour du deuxième mois de l’année, quand toutes les sources d’eaux souterraines jaillirent et les écluses du ciel s’ouvrirent, '
  '12':
  - type: text
    content: 'et la pluie tomba sur la terre durant quarante jours et quarante nuits. '
  '13':
  - type: text
    content: 'Ce même jour, Noé entra dans le bateau ainsi que ses fils, Sem, Cham et Japhet, sa femme et ses trois belles-filles. '
  '14':
  - type: text
    content: 'Avec eux était entrée chaque espèce d’animaux sauvages, de bestiaux, de bêtes qui se meuvent à ras de terre, d’oiseaux, de petits oiseaux et tous les volatiles. '
  '15':
  - type: text
    content: 'Un couple de tout être vivant était venu trouver Noé pour entrer dans le bateau. '
  '16':
  - type: text
    content: 'Ils étaient arrivés deux par deux, mâle et femelle, comme Dieu l’avait ordonné. Puis l’Eternel referma la porte derrière Noé, '
  '17':
  - type: text
    content: et le déluge s’abattit durant quarante jours sur la terre, les eaux montèrent et soulevèrent le bateau, qui se mit à flotter au-dessus de la terre.
  '18':
  - type: text
    content: 'Les eaux montèrent, grossirent considérablement sur la terre et le bateau vogua sur les flots. '
  '19':
  - type: text
    content: 'Le niveau de l’eau montait de plus en plus, de sorte que toutes les hautes montagnes sous tous les cieux furent submergées. '
  '2':
  - type: text
    content: Prends sept couples des animaux purs
  - type: note
    content: C’est-à-dire les animaux que la Loi de Moïse déclarera aptes à être mangés ou offerts en sacrifice (voir Lv 11). Certains seront offerts en sacrifice à la fin du déluge (8.20).
  - type: text
    content: ', sept mâles et sept femelles, et un couple de tous les animaux qui ne sont pas purs, le mâle et sa femelle. '
  '20':
  - type: text
    content: Les eaux s’élevèrent de sept à huit mètres
  - type: note
    content: 'L’hébreu a : quinze coudées.'
  - type: text
    content: ' au-dessus des montagnes qui disparurent sous les flots, '
  '21':
  - type: text
    content: 'et toute créature qui bougeait sur la terre périt : les oiseaux, le bétail et les animaux sauvages, toutes les bestioles qui pullulaient sur la terre, et tous les hommes. '
  '22':
  - type: text
    content: 'Tout ce qui respirait sur la terre ferme mourut. '
  '23':
  - type: text
    content: 'Ainsi l’Eternel effaça de la surface du sol tous les êtres vivants, depuis l’homme jusqu’au bétail, jusqu’aux animaux qui se meuvent à ras de terre et jusqu’aux oiseaux du ciel. Ils furent effacés de la terre et il ne resta que Noé et ceux qui étaient avec lui dans le bateau. '
  '24':
  - type: text
    content: La crue des eaux au-dessus de la terre dura cent cinquante jours.
  '3':
  - type: text
    content: 'Prends aussi sept couples de chaque espèce d’oiseaux pour en perpétuer la race sur toute la terre. '
  '4':
  - type: text
    content: Car dans sept jours, je vais faire pleuvoir sur la terre durant quarante jours et quarante nuits et j’effacerai de la surface de la terre tous les êtres que j’ai créés.
  '5':
  - type: text
    content: Noé fit tout ce que l’Eternel lui avait ordonné.
  '6':
  - type: text
    content: 'Noé était âgé de six cents ans quand le déluge vint sur la terre. '
  '7':
  - type: text
    content: Il entra dans le bateau avec ses fils, sa femme et ses belles-filles pour échapper aux eaux du déluge
  - type: note
    content: Cité en Mt 24.38 ; Lc 17.27.
  - type: text
    content: '. '
  '8':
  - type: text
    content: 'Un couple d’animaux – un mâle et une femelle de ceux qui sont purs et de ceux qui ne le sont pas – ainsi que des oiseaux et de tout ce qui se meut à ras de terre '
  '9':
  - type: text
    content: 'deux par deux, vinrent trouver Noé pour entrer dans le bateau, comme Dieu l’avait prescrit à Noé. '
