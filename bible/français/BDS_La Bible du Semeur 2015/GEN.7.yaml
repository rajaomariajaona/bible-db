document_id: GEN.7
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: L’embarquement
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Puis l’Eternel dit à Noé : Entre dans le bateau, toi et toute ta famille car je ne vois que toi qui sois juste parmi tes contemporains. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Prends sept couples des animaux purs
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '7.2 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'C’est-à-dire les animaux que la Loi de Moïse déclarera aptes à être mangés ou offerts en sacrifice (voir '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Lv 11
        metadata:
          usfm: LEV.11
      - type: text
        text: ). Certains seront offerts en sacrifice à la fin du déluge (
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '8.20'
        metadata:
          usfm: GEN.8.20
      - type: text
        text: ).
    marker-yv: yv-n
  - type: text
    text: ', sept mâles et sept femelles, et un couple de tous les animaux qui ne sont pas purs, le mâle et sa femelle. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Prends aussi sept couples de chaque espèce d’oiseaux pour en perpétuer la race sur toute la terre. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Car dans sept jours, je vais faire pleuvoir sur la terre durant quarante jours et quarante nuits et j’effacerai de la surface de la terre tous les êtres que j’ai créés.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Noé fit tout ce que l’Eternel lui avait ordonné.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Noé était âgé de six cents ans quand le déluge vint sur la terre. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Il entra dans le bateau avec ses fils, sa femme et ses belles-filles pour échapper aux eaux du déluge
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '7.7 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Cité en Mt 24.38 ; Lc 17.27.
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Un couple d’animaux – un mâle et une femelle de ceux qui sont purs et de ceux qui ne le sont pas – ainsi que des oiseaux et de tout ce qui se meut à ras de terre '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'deux par deux, vinrent trouver Noé pour entrer dans le bateau, comme Dieu l’avait prescrit à Noé. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Au bout de sept jours, les eaux du déluge s’abattirent sur la terre.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Le déluge
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'L’an 600 de la vie de Noé, le dix-septième jour du deuxième mois de l’année, quand toutes les sources d’eaux souterraines jaillirent et les écluses du ciel s’ouvrirent, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'et la pluie tomba sur la terre durant quarante jours et quarante nuits. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Ce même jour, Noé entra dans le bateau ainsi que ses fils, Sem, Cham et Japhet, sa femme et ses trois belles-filles. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Avec eux était entrée chaque espèce d’animaux sauvages, de bestiaux, de bêtes qui se meuvent à ras de terre, d’oiseaux, de petits oiseaux et tous les volatiles. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Un couple de tout être vivant était venu trouver Noé pour entrer dans le bateau. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Ils étaient arrivés deux par deux, mâle et femelle, comme Dieu l’avait ordonné. Puis l’Eternel referma la porte derrière Noé, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: et le déluge s’abattit durant quarante jours sur la terre, les eaux montèrent et soulevèrent le bateau, qui se mit à flotter au-dessus de la terre.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Les eaux montèrent, grossirent considérablement sur la terre et le bateau vogua sur les flots. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Le niveau de l’eau montait de plus en plus, de sorte que toutes les hautes montagnes sous tous les cieux furent submergées. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Les eaux s’élevèrent de sept à huit mètres
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '7.20 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'L’hébreu a : '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: quinze coudées.
    marker-yv: yv-n
  - type: text
    text: ' au-dessus des montagnes qui disparurent sous les flots, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'et toute créature qui bougeait sur la terre périt : les oiseaux, le bétail et les animaux sauvages, toutes les bestioles qui pullulaient sur la terre, et tous les hommes. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Tout ce qui respirait sur la terre ferme mourut. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Ainsi l’Eternel effaça de la surface du sol tous les êtres vivants, depuis l’homme jusqu’au bétail, jusqu’aux animaux qui se meuvent à ras de terre et jusqu’aux oiseaux du ciel. Ils furent effacés de la terre et il ne resta que Noé et ceux qui étaient avec lui dans le bateau. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: La crue des eaux au-dessus de la terre dura cent cinquante jours.
