document_id: JER.25,21
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s2
    children:
    - type: text
      text: Où mène le refus d’obéir
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: Voici le message qui fut adressé à Jérémie au sujet de tout le peuple de Juda, la quatrième année de Yehoyaqim, fils de Josias, roi de Juda, ce qui correspond à la première année du règne de Nabuchodonosor, roi de Babylone
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '25.1 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'En 605 av. J.-C., l’année où Nabuchodonosor vainquit les Egyptiens à Karkemish, vint à Jérusalem et imposa un tribut au roi Yehoyaqim (voir '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: Dn 1.1-2
        - type: text
          text: ).
      marker-yv: yv-n
    - type: text
      text: '. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'Je ferai disparaître de chez eux tous les cris de réjouissance et d’allégresse, la voix du marié et de la mariée, le bruit de la meule et la lumière de la lampe. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: Le pays tout entier ne sera plus que ruines et terre dévastée. L’ensemble de ces peuples seront assujettis au roi de Babylone pendant soixante-dix ans
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '25.11 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Voir 29.10 ; Dn 9.2 ; 2 Ch 36.21.
      marker-yv: yv-n
    - type: text
      text: '. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: Et au bout de ces soixante-dix ans, je demanderai compte de leur crime au roi de Babylone et à son peuple – l’Eternel le déclare – je sévirai contre le pays des Chaldéens et je le réduirai en désert pour toujours.
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: J’accomplirai contre ce pays toutes les menaces que j’ai proférées contre lui et tout ce qui est écrit dans ce livre, ce que Jérémie a prophétisé au sujet de ces divers peuples
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '25.13 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: C’est ici que l’ancienne version grecque insère les chapitres 46 à 51.
      marker-yv: yv-n
    - type: text
      text: .
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: Car les Chaldéens eux-mêmes seront assujettis par des peuples nombreux et des rois puissants et je leur rendrai ce que leur auront valu leurs actes et leurs agissements.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: La coupe de colère pour tous les peuples
    marker-yv: yv-h
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'Car voici ce que m’a déclaré l’Eternel, le Dieu d’Israël : Prends de ma main cette coupe du vin de la colère et donne-la à boire à tous les peuples vers lesquels je t’envoie. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: Ils boiront, ils tituberont et seront comme fous devant l’épée que je vais envoyer contre eux.
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'Alors je pris la coupe de la main de l’Eternel et je fis boire tous les peuples vers lesquels l’Eternel m’avait envoyé. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: Je fis boire Jérusalem, les villes de Juda, ses rois et ses hauts dignitaires, pour en faire une ruine et une terre dévastée, un objet de sifflements horrifiés et de malédiction
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '25.18 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'et de malédiction. '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Autre traduction : '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: cité dans les formules d’imprécations.
      marker-yv: yv-n
    - type: text
      text: ', comme ils le sont à ce jour. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'Je la fis boire au pharaon, le roi d’Egypte, et à ses fonctionnaires, à ses hauts dignitaires et à tout son peuple, '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'Jérémie, le prophète, s’adressa à tout le peuple de Juda et à tous les habitants de Jérusalem en ces termes :'
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: à tout le ramassis de peuples vivant dans leur pays
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '25.20 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'L’Egypte a, de tout temps, reçu et cherché à assimiler des étrangers (voir '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: Ex 12.38
        - type: text
          text: ). Peu avant Jérémie, Psammétique avait enrôlé des Ioniens et des Cariens dans son armée.
      marker-yv: yv-n
    - type: text
      text: ', à tous les rois du pays d’Outs, à tous les rois des Philistins, à Ashkelôn, Gaza, Eqrôn et à ce qui reste d’Ashdod'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '25.20 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Ashdod avait été considérablement réduite après le siège de 29 ans que lui avait imposé le pharaon Psammétique, le père du pharaon Néko.
      marker-yv: yv-n
    - type: text
      text: ', '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: 'à Edom, à Moab ainsi qu’aux Ammonites ; '
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: 'à tous les rois de Tyr, à tous ceux de Sidon ainsi qu’aux rois des îles et des régions côtières au-delà de la mer, '
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: à Dedân, à Téma, à Bouz et à tous ceux qui se rasent le haut des joues
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '25.23 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Voir '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: '9.25'
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: '  ; '
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: 'à tous les rois de l’Arabie, à tous les rois des peuples habitant le désert ; '
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: à tous les rois des Cimmériens, à tous les rois d’Elam, et à tous les rois de Médie
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '25.25 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Les '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Cimmériens
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: ': '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'peuple venant des monts d’Arménie. Selon d’autres, il s’agirait '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'des rois de Zimri, '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: région non identifiée. L’
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'Elam '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'et la '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'Médie '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: se trouvent au nord-est de la Babylonie.
      marker-yv: yv-n
    - type: text
      text: '  ; '
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: à tous les rois du nord, rapprochés ou lointains, l’un après l’autre ; à tous les royaumes du monde répartis sur la terre. Et le roi de Shéshak
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '25.26 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Shéshak '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'désigne Babylone, selon un procédé de codage qui consiste à remplacer la première lettre de l’alphabet par la dernière, la deuxième par l’avant-dernière, etc. (voir '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: Jr 51.1
        - type: text
          text: ).
      marker-yv: yv-n
    - type: text
      text: ' boira après eux tous.'
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: 'Tu leur diras : Voici ce que déclare le Seigneur des armées célestes, Dieu d’Israël : Buvez, enivrez-vous, vomissez et tombez sans plus vous relever devant l’épée que j’envoie parmi vous ! '
  '28':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: 'Si jamais ils refusent de prendre de ta main la coupe pour la boire, alors tu leur diras : Voici ce que déclare le Seigneur des armées célestes : Vous la boirez quand même ! '
  '29':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: C’est sur la ville qui m’appartient que je commence à faire venir le malheur, et vous en seriez exemptés ? Non, vous n’en serez pas exemptés ! Car je fais venir l’épée contre tous les habitants de la terre, l’Eternel le déclare, le Seigneur des armées célestes.
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'Depuis la treizième année de Josias, fils d’Amôn, roi de Juda, jusqu’à ce jour, cela fait vingt-trois ans que la parole de l’Eternel m’est adressée et que je vous la transmets, sans me lasser, mais vous ne m’avez pas écouté. '
  '30':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '30'
    - type: text
      text: 'Toi, tu leur prophétiseras toutes ces choses et puis tu leur diras :'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: L’Eternel rugit de là-haut,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: de sa demeure sainte, ╵il donne de la voix,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: il pousse des rugissements ╵contre son pâturage,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: il crie contre tous les habitants de la terre ╵tout comme ceux qui foulent le raisin.
  '31':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '31'
    - type: text
      text: Le tumulte en parvient ╵aux confins de la terre,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: car l’Eternel entre en procès ╵avec les peuples,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et il juge tous les humains,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: il livre les méchants au glaive,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: l’Eternel le déclare.
  '32':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '32'
    - type: text
      text: 'Voici ce que déclare ╵le Seigneur des armées célestes :'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Un malheur se propage ╵d’un peuple à l’autre ;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: des confins de la terre, ╵un terrible ouragan se lève.
  '33':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '33'
    - type: text
      text: Ce jour-là, les victimes frappées par l’Eternel joncheront le sol, d’un bout du monde à l’autre. Nul ne mènera deuil sur eux, on ne les recueillera pas pour les mettre au tombeau. Ils deviendront du fumier sur le sol.
  '34':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '34'
    - type: text
      text: Lamentez-vous, bergers, ╵poussez des cris !
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Roulez-vous sur le sol, ╵vous puissants du troupeau,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: car le jour du massacre ╵est arrivé pour vous.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Vous tomberez ╵et vous serez brisés ╵comme on brise un beau vase.
  '35':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '35'
    - type: text
      text: Alors les bergers perdront tout refuge ;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: les puissants du troupeau ╵n’auront plus aucun moyen d’échapper.
  '36':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '36'
    - type: text
      text: On entend les clameurs ╵poussées par les bergers,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et les lamentations ╵des puissants du troupeau,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: car l’Eternel dévaste ╵leurs pâturages.
  '37':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '37'
    - type: text
      text: Sous l’effet de son ardente colère,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: les paisibles enclos ╵sont réduits au silence.
  '38':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '38'
    - type: text
      text: Il quitte sa retraite ╵comme un jeune lion.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Leur pays sera dévasté
  - type: usfm
    marker: q1
    children:
    - type: text
      text: à cause de l’épée
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '25.38 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: l’épée
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: ': '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'd’après plusieurs manuscrits hébreux, l’ancienne version grecque et Jr 46.16 ; 50.16. La plupart des manuscrits hébreux ont : '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: la colère.
      marker-yv: yv-n
    - type: text
      text: ' ╵des oppresseurs,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et de leur ardente colère.
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'L’Eternel vous a envoyé, sans se lasser, tous ses serviteurs les prophètes ; mais vous n’avez ni écouté ni prêté attention à leur message. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'Ils vous disaient : « Que chacun de vous abandonne sa mauvaise conduite et ses actes mauvais ! Alors vous demeurerez dans le pays que l’Eternel vous a donné, à vos ancêtres et à vous, depuis toujours et pour toujours. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'Ne courez pas après d’autres dieux pour leur rendre un culte et vous prosterner devant eux, et ne m’irritez pas par des idoles de votre fabrication ; alors je ne vous ferai pas de mal. » '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: Mais vous ne m’avez pas écouté, déclare l’Eternel, et vous m’avez irrité par les idoles que vous vous êtes fabriquées, pour votre propre malheur.
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'C’est pourquoi, voici ce que déclare le Seigneur des armées célestes : Puisque vous n’avez pas écouté mes paroles, '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'je vais envoyer chercher toutes les peuplades du nord – l’Eternel le déclare – et Nabuchodonosor, roi de Babylone, qui sera mon serviteur. Je les ferai venir contre ce pays et contre ses habitants, et contre tous les peuples qui l’entourent. Je les vouerai à l’extermination, je les dévasterai, j’en ferai pour toujours des ruines et l’on sifflera d’horreur à leur sujet. '
