document_id: JER.25,21
type_code: fra
verses:
  '1':
  - type: heading
    content: Où mène le refus d’obéir
  - type: text
    content: Voici le message qui fut adressé à Jérémie au sujet de tout le peuple de Juda, la quatrième année de Yehoyaqim, fils de Josias, roi de Juda, ce qui correspond à la première année du règne de Nabuchodonosor, roi de Babylone
  - type: note
    content: En 605 av. J.-C., l’année où Nabuchodonosor vainquit les Egyptiens à Karkemish, vint à Jérusalem et imposa un tribut au roi Yehoyaqim (voir Dn 1.1-2).
  - type: text
    content: '. '
  '10':
  - type: text
    content: 'Je ferai disparaître de chez eux tous les cris de réjouissance et d’allégresse, la voix du marié et de la mariée, le bruit de la meule et la lumière de la lampe. '
  '11':
  - type: text
    content: Le pays tout entier ne sera plus que ruines et terre dévastée. L’ensemble de ces peuples seront assujettis au roi de Babylone pendant soixante-dix ans
  - type: note
    content: Voir 29.10 ; Dn 9.2 ; 2 Ch 36.21.
  - type: text
    content: '. '
  '12':
  - type: text
    content: Et au bout de ces soixante-dix ans, je demanderai compte de leur crime au roi de Babylone et à son peuple – l’Eternel le déclare – je sévirai contre le pays des Chaldéens et je le réduirai en désert pour toujours.
  '13':
  - type: text
    content: J’accomplirai contre ce pays toutes les menaces que j’ai proférées contre lui et tout ce qui est écrit dans ce livre, ce que Jérémie a prophétisé au sujet de ces divers peuples
  - type: note
    content: C’est ici que l’ancienne version grecque insère les chapitres 46 à 51.
  - type: text
    content: .
  '14':
  - type: text
    content: Car les Chaldéens eux-mêmes seront assujettis par des peuples nombreux et des rois puissants et je leur rendrai ce que leur auront valu leurs actes et leurs agissements.
  - type: heading
    content: La coupe de colère pour tous les peuples
  '15':
  - type: text
    content: 'Car voici ce que m’a déclaré l’Eternel, le Dieu d’Israël : Prends de ma main cette coupe du vin de la colère et donne-la à boire à tous les peuples vers lesquels je t’envoie. '
  '16':
  - type: text
    content: Ils boiront, ils tituberont et seront comme fous devant l’épée que je vais envoyer contre eux.
  '17':
  - type: text
    content: 'Alors je pris la coupe de la main de l’Eternel et je fis boire tous les peuples vers lesquels l’Eternel m’avait envoyé. '
  '18':
  - type: text
    content: Je fis boire Jérusalem, les villes de Juda, ses rois et ses hauts dignitaires, pour en faire une ruine et une terre dévastée, un objet de sifflements horrifiés et de malédiction
  - type: note
    content: 'et de malédiction. Autre traduction : cité dans les formules d’imprécations.'
  - type: text
    content: ', comme ils le sont à ce jour. '
  '19':
  - type: text
    content: 'Je la fis boire au pharaon, le roi d’Egypte, et à ses fonctionnaires, à ses hauts dignitaires et à tout son peuple, '
  '2':
  - type: text
    content: 'Jérémie, le prophète, s’adressa à tout le peuple de Juda et à tous les habitants de Jérusalem en ces termes :'
  '20':
  - type: text
    content: à tout le ramassis de peuples vivant dans leur pays
  - type: note
    content: L’Egypte a, de tout temps, reçu et cherché à assimiler des étrangers (voir Ex 12.38). Peu avant Jérémie, Psammétique avait enrôlé des Ioniens et des Cariens dans son armée.
  - type: text
    content: ', à tous les rois du pays d’Outs, à tous les rois des Philistins, à Ashkelôn, Gaza, Eqrôn et à ce qui reste d’Ashdod'
  - type: note
    content: Ashdod avait été considérablement réduite après le siège de 29 ans que lui avait imposé le pharaon Psammétique, le père du pharaon Néko.
  - type: text
    content: ', '
  '21':
  - type: text
    content: 'à Edom, à Moab ainsi qu’aux Ammonites ; '
  '22':
  - type: text
    content: 'à tous les rois de Tyr, à tous ceux de Sidon ainsi qu’aux rois des îles et des régions côtières au-delà de la mer, '
  '23':
  - type: text
    content: à Dedân, à Téma, à Bouz et à tous ceux qui se rasent le haut des joues
  - type: note
    content: Voir 9.25.
  - type: text
    content: '  ; '
  '24':
  - type: text
    content: 'à tous les rois de l’Arabie, à tous les rois des peuples habitant le désert ; '
  '25':
  - type: text
    content: à tous les rois des Cimmériens, à tous les rois d’Elam, et à tous les rois de Médie
  - type: note
    content: 'Les Cimmériens: peuple venant des monts d’Arménie. Selon d’autres, il s’agirait des rois de Zimri, région non identifiée. L’Elam et la Médie se trouvent au nord-est de la Babylonie.'
  - type: text
    content: '  ; '
  '26':
  - type: text
    content: à tous les rois du nord, rapprochés ou lointains, l’un après l’autre ; à tous les royaumes du monde répartis sur la terre. Et le roi de Shéshak
  - type: note
    content: Shéshak désigne Babylone, selon un procédé de codage qui consiste à remplacer la première lettre de l’alphabet par la dernière, la deuxième par l’avant-dernière, etc. (voir Jr 51.1).
  - type: text
    content: ' boira après eux tous.'
  '27':
  - type: text
    content: 'Tu leur diras : Voici ce que déclare le Seigneur des armées célestes, Dieu d’Israël : Buvez, enivrez-vous, vomissez et tombez sans plus vous relever devant l’épée que j’envoie parmi vous ! '
  '28':
  - type: text
    content: 'Si jamais ils refusent de prendre de ta main la coupe pour la boire, alors tu leur diras : Voici ce que déclare le Seigneur des armées célestes : Vous la boirez quand même ! '
  '29':
  - type: text
    content: C’est sur la ville qui m’appartient que je commence à faire venir le malheur, et vous en seriez exemptés ? Non, vous n’en serez pas exemptés ! Car je fais venir l’épée contre tous les habitants de la terre, l’Eternel le déclare, le Seigneur des armées célestes.
  '3':
  - type: text
    content: 'Depuis la treizième année de Josias, fils d’Amôn, roi de Juda, jusqu’à ce jour, cela fait vingt-trois ans que la parole de l’Eternel m’est adressée et que je vous la transmets, sans me lasser, mais vous ne m’avez pas écouté. '
  '30':
  - type: text
    content: 'Toi, tu leur prophétiseras toutes ces choses et puis tu leur diras :'
  - type: text
    content: L’Eternel rugit de là-haut,
  - type: text
    content: de sa demeure sainte, ╵il donne de la voix,
  - type: text
    content: il pousse des rugissements ╵contre son pâturage,
  - type: text
    content: il crie contre tous les habitants de la terre ╵tout comme ceux qui foulent le raisin.
  '31':
  - type: text
    content: Le tumulte en parvient ╵aux confins de la terre,
  - type: text
    content: car l’Eternel entre en procès ╵avec les peuples,
  - type: text
    content: et il juge tous les humains,
  - type: text
    content: il livre les méchants au glaive,
  - type: text
    content: l’Eternel le déclare.
  '32':
  - type: text
    content: 'Voici ce que déclare ╵le Seigneur des armées célestes :'
  - type: text
    content: Un malheur se propage ╵d’un peuple à l’autre ;
  - type: text
    content: des confins de la terre, ╵un terrible ouragan se lève.
  '33':
  - type: text
    content: Ce jour-là, les victimes frappées par l’Eternel joncheront le sol, d’un bout du monde à l’autre. Nul ne mènera deuil sur eux, on ne les recueillera pas pour les mettre au tombeau. Ils deviendront du fumier sur le sol.
  '34':
  - type: text
    content: Lamentez-vous, bergers, ╵poussez des cris !
  - type: text
    content: Roulez-vous sur le sol, ╵vous puissants du troupeau,
  - type: text
    content: car le jour du massacre ╵est arrivé pour vous.
  - type: text
    content: Vous tomberez ╵et vous serez brisés ╵comme on brise un beau vase.
  '35':
  - type: text
    content: Alors les bergers perdront tout refuge ;
  - type: text
    content: les puissants du troupeau ╵n’auront plus aucun moyen d’échapper.
  '36':
  - type: text
    content: On entend les clameurs ╵poussées par les bergers,
  - type: text
    content: et les lamentations ╵des puissants du troupeau,
  - type: text
    content: car l’Eternel dévaste ╵leurs pâturages.
  '37':
  - type: text
    content: Sous l’effet de son ardente colère,
  - type: text
    content: les paisibles enclos ╵sont réduits au silence.
  '38':
  - type: text
    content: Il quitte sa retraite ╵comme un jeune lion.
  - type: text
    content: Leur pays sera dévasté
  - type: text
    content: à cause de l’épée
  - type: note
    content: 'l’épée: d’après plusieurs manuscrits hébreux, l’ancienne version grecque et Jr 46.16 ; 50.16. La plupart des manuscrits hébreux ont : la colère.'
  - type: text
    content: ' ╵des oppresseurs,'
  - type: text
    content: et de leur ardente colère.
  '4':
  - type: text
    content: 'L’Eternel vous a envoyé, sans se lasser, tous ses serviteurs les prophètes ; mais vous n’avez ni écouté ni prêté attention à leur message. '
  '5':
  - type: text
    content: 'Ils vous disaient : « Que chacun de vous abandonne sa mauvaise conduite et ses actes mauvais ! Alors vous demeurerez dans le pays que l’Eternel vous a donné, à vos ancêtres et à vous, depuis toujours et pour toujours. '
  '6':
  - type: text
    content: 'Ne courez pas après d’autres dieux pour leur rendre un culte et vous prosterner devant eux, et ne m’irritez pas par des idoles de votre fabrication ; alors je ne vous ferai pas de mal. » '
  '7':
  - type: text
    content: Mais vous ne m’avez pas écouté, déclare l’Eternel, et vous m’avez irrité par les idoles que vous vous êtes fabriquées, pour votre propre malheur.
  '8':
  - type: text
    content: 'C’est pourquoi, voici ce que déclare le Seigneur des armées célestes : Puisque vous n’avez pas écouté mes paroles, '
  '9':
  - type: text
    content: 'je vais envoyer chercher toutes les peuplades du nord – l’Eternel le déclare – et Nabuchodonosor, roi de Babylone, qui sera mon serviteur. Je les ferai venir contre ce pays et contre ses habitants, et contre tous les peuples qui l’entourent. Je les vouerai à l’extermination, je les dévasterai, j’en ferai pour toujours des ruines et l’on sifflera d’horreur à leur sujet. '
