document_id: PRO.6,21
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Les promesses impossibles
    marker-yv: yv-h
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mon fils, si tu t’es porté garant des dettes de ton prochain,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: si tu t’es engagé pour autrui en topant dans la main
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '6.1 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Pour emprunter et garantir le remboursement de leur dette, les Israélites recouraient souvent au cautionnement (Gn 43.9 ; 44.32). Le proverbe met en garde contre cette pratique (11.15 ; 17.18 ; 20.16 ; 22.26 ; 27.13) par laquelle on se livrait, personne et biens, entre les mains du créancier au cas où son débiteur ne rembourserait pas la dette contractée.
      marker-yv: yv-n
    - type: text
      text: ','
  '10':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: « Je vais faire juste un petit somme, dis-tu, juste un peu m’assoupir,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: rien qu’un peu croiser les mains et rester couché un instant
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '6.10 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Pour les v. 10-11, voir '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: 24.33-34
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: . »
  '11':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mais pendant ce temps, la pauvreté s’introduit chez toi comme un rôdeur,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et la misère comme un pillard.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Le colporteur de mensonges
    marker-yv: yv-h
  '12':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: C’est un vaurien, un personnage inique,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: celui qui va, colportant des mensonges.
  '13':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Il appuie ses dires de clignements d’yeux,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'de tapements des pieds, et de signes des doigts :'
  '14':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: il n’y a que des pensées perverses dans son cœur,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: il manigance du mal et passe son temps à susciter des querelles.
  '15':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Aussi la ruine fondra-t-elle sur lui sans crier gare,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: il sera brisé soudainement et sans remède
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '6.15 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Voir 1.26 ; 24.22 ; Jb 34.20.
      marker-yv: yv-n
    - type: text
      text: .
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ce que l’Eternel déteste
    marker-yv: yv-h
  '16':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Il y a six choses que l’Eternel déteste,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et même sept qui lui sont en horreur
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '6.16 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Voir v. 16-19 : de telles énumérations sont courantes dans les écrits de sagesse. Dans les Proverbes, voir '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: '30.15'
        - type: text
          text: ', '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: '18'
        - type: text
          text: ', 21, 24, 29 (comparer '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: Jb 5.19
        - type: text
          text: ).
      marker-yv: yv-n
    - type: text
      text: '  :'
  '17':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: les yeux qui regardent les autres de haut,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: la langue qui répand des mensonges,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: les mains qui font couler le sang des innocents,
  '18':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: le cœur qui médite des projets coupables,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: les pieds qui se hâtent de courir vers le mal,
  '19':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: le faux témoin qui dit des mensonges
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et l’homme qui sème la discorde entre des frères.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Comment fuir l’immoralité
    marker-yv: yv-h
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: si tu t’es laissé prendre au piège par tes promesses,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: si tu es prisonnier de tes propres paroles,
  '20':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mon fils, reste attaché aux préceptes de ton père,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et ne rejette pas l’enseignement de ta mère !
  '21':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tiens-les constamment sur ton cœur,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: attache-les comme un collier à ton cou !
  '22':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ils te guideront quand tu voyageras,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ils veilleront sur toi durant ton sommeil
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et s’entretiendront avec toi à ton réveil.
  '23':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Car le précepte est une lampe, et l’enseignement une lumière.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Les avertissements et les reproches sont le chemin vers la vie.
  '24':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ils te préserveront de la femme immorale
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et te garderont de te laisser séduire par les paroles enjôleuses d’une inconnue
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '6.24 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Voir '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: '5.3'
        - type: text
          text: ' et note.'
      marker-yv: yv-n
    - type: text
      text: .
  '25':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ne la convoite pas dans ton cœur à cause de sa beauté,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ne te laisse pas séduire par ses œillades !
  '26':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Car, à cause d’une prostituée
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '6.26 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Autre traduction : '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: Car, si aller vers une prostituée ne coûte qu’une miche de pain, la femme adultère…
      marker-yv: yv-n
    - type: text
      text: ','
  - type: usfm
    marker: q1
    children:
    - type: text
      text: on peut être réduit à un morceau de pain,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et la femme adultère met en péril une vie précieuse.
  '27':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Peut-on mettre du feu dans sa poche
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sans que les vêtements s’enflamment ?
  '28':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Peut-on marcher sur des braises sans se brûler les pieds ?
  '29':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: De même, celui qui court après la femme de son prochain ne demeurera pas indemne ;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: s’il la touche, il ne saurait rester impuni.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: alors, vite, mon fils, fais ce que je te dis pour te désengager,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'car tu t’es livré toi-même au pouvoir d’autrui :'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: va, humilie-toi devant le créancier, insiste auprès de lui,
  '30':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: On ne méprise pas celui qui a volé
  - type: usfm
    marker: q1
    children:
    - type: text
      text: pour assouvir sa faim parce qu’il n’avait rien à manger.
  '31':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Pourtant s’il est découvert, il devra restituer sept fois plus,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et il donnera tout ce qu’il a dans sa maison
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '6.31 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: C’est-à-dire restituer complètement. La Loi prévoyait la restitution au double (
        - type: usfm
          marker: ref
          children:
          - type: text
            text: Ex 22.3
        - type: text
          text: ', '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: '6'
        - type: text
          text: ', '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: '8'
        - type: text
          text: ).
      marker-yv: yv-n
    - type: text
      text: .
  '32':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mais celui qui commet un adultère avec une femme est dépourvu de sens,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: agir ainsi, c’est se détruire soi-même ;
  '33':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: celui qui fait cela ne récoltera que souffrances et déshonneur,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sa honte ne s’effacera jamais.
  '34':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Car la jalousie met le mari en fureur,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: il sera sans pitié au jour de la vengeance.
  '35':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Il ne se laissera apaiser par aucune indemnité ;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: il ne l’acceptera pas, même si tu multiplies les présents.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: n’accorde ni sommeil à tes yeux,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ni assoupissement à tes paupières ;
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dégage-toi comme la gazelle du piège tendu,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: comme l’oiseau du filet de l’oiseleur.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Le paresseux
    marker-yv: yv-h
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Toi qui es paresseux, va donc voir la fourmi,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: observe son comportement et tu apprendras la sagesse.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Elle n’a ni commandant,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ni contremaître, ni chef.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Durant l’été, elle prépare sa nourriture,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: au temps de la moisson, elle amasse ses provisions.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et toi, paresseux, combien de temps vas-tu rester couché ?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Quand donc sortiras-tu de ton sommeil pour te lever ?
