document_id: PRO.6,21
type_code: fra
verses:
  '1':
  - type: heading
    content: Les promesses impossibles
  - type: text
    content: Mon fils, si tu t’es porté garant des dettes de ton prochain,
  - type: text
    content: si tu t’es engagé pour autrui en topant dans la main
  - type: note
    content: Pour emprunter et garantir le remboursement de leur dette, les Israélites recouraient souvent au cautionnement (Gn 43.9 ; 44.32). Le proverbe met en garde contre cette pratique (11.15 ; 17.18 ; 20.16 ; 22.26 ; 27.13) par laquelle on se livrait, personne et biens, entre les mains du créancier au cas où son débiteur ne rembourserait pas la dette contractée.
  - type: text
    content: ','
  '10':
  - type: text
    content: « Je vais faire juste un petit somme, dis-tu, juste un peu m’assoupir,
  - type: text
    content: rien qu’un peu croiser les mains et rester couché un instant
  - type: note
    content: Pour les v. 10-11, voir 24.33-34.
  - type: text
    content: . »
  '11':
  - type: text
    content: Mais pendant ce temps, la pauvreté s’introduit chez toi comme un rôdeur,
  - type: text
    content: et la misère comme un pillard.
  - type: heading
    content: Le colporteur de mensonges
  '12':
  - type: text
    content: C’est un vaurien, un personnage inique,
  - type: text
    content: celui qui va, colportant des mensonges.
  '13':
  - type: text
    content: Il appuie ses dires de clignements d’yeux,
  - type: text
    content: 'de tapements des pieds, et de signes des doigts :'
  '14':
  - type: text
    content: il n’y a que des pensées perverses dans son cœur,
  - type: text
    content: il manigance du mal et passe son temps à susciter des querelles.
  '15':
  - type: text
    content: Aussi la ruine fondra-t-elle sur lui sans crier gare,
  - type: text
    content: il sera brisé soudainement et sans remède
  - type: note
    content: Voir 1.26 ; 24.22 ; Jb 34.20.
  - type: text
    content: .
  - type: heading
    content: Ce que l’Eternel déteste
  '16':
  - type: text
    content: Il y a six choses que l’Eternel déteste,
  - type: text
    content: et même sept qui lui sont en horreur
  - type: note
    content: 'Voir v. 16-19 : de telles énumérations sont courantes dans les écrits de sagesse. Dans les Proverbes, voir 30.15, 18, 21, 24, 29 (comparer Jb 5.19).'
  - type: text
    content: '  :'
  '17':
  - type: text
    content: les yeux qui regardent les autres de haut,
  - type: text
    content: la langue qui répand des mensonges,
  - type: text
    content: les mains qui font couler le sang des innocents,
  '18':
  - type: text
    content: le cœur qui médite des projets coupables,
  - type: text
    content: les pieds qui se hâtent de courir vers le mal,
  '19':
  - type: text
    content: le faux témoin qui dit des mensonges
  - type: text
    content: et l’homme qui sème la discorde entre des frères.
  - type: heading
    content: Comment fuir l’immoralité
  '2':
  - type: text
    content: si tu t’es laissé prendre au piège par tes promesses,
  - type: text
    content: si tu es prisonnier de tes propres paroles,
  '20':
  - type: text
    content: Mon fils, reste attaché aux préceptes de ton père,
  - type: text
    content: et ne rejette pas l’enseignement de ta mère !
  '21':
  - type: text
    content: Tiens-les constamment sur ton cœur,
  - type: text
    content: attache-les comme un collier à ton cou !
  '22':
  - type: text
    content: Ils te guideront quand tu voyageras,
  - type: text
    content: ils veilleront sur toi durant ton sommeil
  - type: text
    content: et s’entretiendront avec toi à ton réveil.
  '23':
  - type: text
    content: Car le précepte est une lampe, et l’enseignement une lumière.
  - type: text
    content: Les avertissements et les reproches sont le chemin vers la vie.
  '24':
  - type: text
    content: Ils te préserveront de la femme immorale
  - type: text
    content: et te garderont de te laisser séduire par les paroles enjôleuses d’une inconnue
  - type: note
    content: Voir 5.3 et note.
  - type: text
    content: .
  '25':
  - type: text
    content: Ne la convoite pas dans ton cœur à cause de sa beauté,
  - type: text
    content: ne te laisse pas séduire par ses œillades !
  '26':
  - type: text
    content: Car, à cause d’une prostituée
  - type: note
    content: 'Autre traduction : Car, si aller vers une prostituée ne coûte qu’une miche de pain, la femme adultère…'
  - type: text
    content: ','
  - type: text
    content: on peut être réduit à un morceau de pain,
  - type: text
    content: et la femme adultère met en péril une vie précieuse.
  '27':
  - type: text
    content: Peut-on mettre du feu dans sa poche
  - type: text
    content: sans que les vêtements s’enflamment ?
  '28':
  - type: text
    content: Peut-on marcher sur des braises sans se brûler les pieds ?
  '29':
  - type: text
    content: De même, celui qui court après la femme de son prochain ne demeurera pas indemne ;
  - type: text
    content: s’il la touche, il ne saurait rester impuni.
  '3':
  - type: text
    content: alors, vite, mon fils, fais ce que je te dis pour te désengager,
  - type: text
    content: 'car tu t’es livré toi-même au pouvoir d’autrui :'
  - type: text
    content: va, humilie-toi devant le créancier, insiste auprès de lui,
  '30':
  - type: text
    content: On ne méprise pas celui qui a volé
  - type: text
    content: pour assouvir sa faim parce qu’il n’avait rien à manger.
  '31':
  - type: text
    content: Pourtant s’il est découvert, il devra restituer sept fois plus,
  - type: text
    content: et il donnera tout ce qu’il a dans sa maison
  - type: note
    content: C’est-à-dire restituer complètement. La Loi prévoyait la restitution au double (Ex 22.3, 6, 8).
  - type: text
    content: .
  '32':
  - type: text
    content: Mais celui qui commet un adultère avec une femme est dépourvu de sens,
  - type: text
    content: agir ainsi, c’est se détruire soi-même ;
  '33':
  - type: text
    content: celui qui fait cela ne récoltera que souffrances et déshonneur,
  - type: text
    content: sa honte ne s’effacera jamais.
  '34':
  - type: text
    content: Car la jalousie met le mari en fureur,
  - type: text
    content: il sera sans pitié au jour de la vengeance.
  '35':
  - type: text
    content: Il ne se laissera apaiser par aucune indemnité ;
  - type: text
    content: il ne l’acceptera pas, même si tu multiplies les présents.
  '4':
  - type: text
    content: n’accorde ni sommeil à tes yeux,
  - type: text
    content: ni assoupissement à tes paupières ;
  '5':
  - type: text
    content: dégage-toi comme la gazelle du piège tendu,
  - type: text
    content: comme l’oiseau du filet de l’oiseleur.
  - type: heading
    content: Le paresseux
  '6':
  - type: text
    content: Toi qui es paresseux, va donc voir la fourmi,
  - type: text
    content: observe son comportement et tu apprendras la sagesse.
  '7':
  - type: text
    content: Elle n’a ni commandant,
  - type: text
    content: ni contremaître, ni chef.
  '8':
  - type: text
    content: Durant l’été, elle prépare sa nourriture,
  - type: text
    content: au temps de la moisson, elle amasse ses provisions.
  '9':
  - type: text
    content: Et toi, paresseux, combien de temps vas-tu rester couché ?
  - type: text
    content: Quand donc sortiras-tu de ton sommeil pour te lever ?
