document_id: EXO.32,21
type_code: fra
verses:
  '1':
  - type: heading
    content: L’idolâtrie d’Israël et le renouvellement de l’alliance
  - type: heading
    content: Le veau d’or
  - type: text
    content: 'Quand le peuple s’aperçut que Moïse tardait à redescendre de la montagne, il se rassembla autour d’Aaron et lui dit : Allons ! Fabrique-nous des dieux qui marchent à notre tête, car Moïse, cet homme qui nous a fait sortir d’Egypte, nous ne savons pas ce qui lui est arrivé.'
  '10':
  - type: text
    content: 'Maintenant, laisse-moi faire : ma colère s’enflammera contre eux et je les exterminerai. Mais je ferai de toi un autre grand peuple.'
  '11':
  - type: text
    content: 'Alors Moïse supplia l’Eternel son Dieu d’avoir pitié en disant : Eternel, pourquoi ta colère s’enflammerait-elle contre ton peuple que tu as fait sortir d’Egypte par un formidable déploiement de force et de puissance'
  - type: note
    content: Pour les v. 11-14, voir Nb 14.13-19.
  - type: text
    content: '  ? '
  '12':
  - type: text
    content: 'Pourquoi les Egyptiens diraient-ils que c’est dans de mauvaises intentions que leur Dieu les a fait sortir de leur pays : pour les faire périr dans la région des montagnes et les faire disparaître de la terre ? Laisse ta colère et renonce à envoyer le malheur à ton peuple. '
  '13':
  - type: text
    content: 'Souviens-toi d’Abraham, d’Isaac et d’Israël, tes serviteurs, envers qui tu t’es engagé par serment en ton propre nom en leur déclarant : « Je rendrai vos descendants aussi nombreux que les étoiles du ciel, je leur donnerai tout ce pays dont j’ai parlé, et ils le posséderont pour toujours'
  - type: note
    content: Voir Gn 17.8 ; 22.16-17.
  - type: text
    content: . »
  '14':
  - type: text
    content: Alors l’Eternel renonça à faire venir sur son peuple le malheur dont il l’avait menacé.
  - type: heading
    content: La colère de Moïse
  '15':
  - type: text
    content: 'Moïse s’en retourna et redescendit de la montagne, tenant en main les deux tablettes de l’acte de l’alliance. Elles étaient gravées des deux côtés, sur leurs deux faces. '
  '16':
  - type: text
    content: Ces tablettes étaient l’œuvre de Dieu, l’écriture était celle de Dieu, gravée sur les tablettes.
  '17':
  - type: text
    content: 'Quand Josué entendit les clameurs poussées par le peuple, il dit à Moïse : Il y a un bruit de guerre dans le camp.'
  '18':
  - type: text
    content: – Non ! répondit Moïse, ce ne sont ni des cris de victoire ni des lamentations de défaite. C’est un bruit de chansons que j’entends.
  '19':
  - type: text
    content: 'Quand il fut près du camp, qu’il aperçut le veau et vit les chœurs de danses, il entra dans une grande colère : il lança les tablettes qu’il tenait en mains et les mit en pièces au pied de la montagne. '
  '2':
  - type: text
    content: 'Aaron leur répondit : Otez les pendants d’or des oreilles de vos femmes, de vos fils'
  - type: note
    content: Les hommes portaient également des boucles d’oreilles (voir Jg 8.24-26).
  - type: text
    content: ' et de vos filles, et apportez-les moi.'
  '20':
  - type: text
    content: 'Il saisit le veau que le peuple avait fabriqué, le jeta au feu et le réduisit en poussière qu’il éparpilla à la surface de l’eau, puis il fit boire cette eau aux Israélites. '
  '21':
  - type: text
    content: 'Ensuite, il demanda à Aaron : Que t’a donc fait ce peuple pour que tu l’aies entraîné à se rendre coupable d’un si grand péché ?'
  '22':
  - type: text
    content: 'Aaron répondit : Que mon seigneur ne se fâche pas ! Tu sais toi-même que ce peuple est porté à faire le mal. '
  '23':
  - type: text
    content: 'Ils m’ont dit : « Fabrique-nous des dieux qui marchent à notre tête, car ce Moïse, cet homme qui nous a fait sortir d’Egypte, nous ne savons pas ce qui lui est arrivé'
  - type: note
    content: Voir Ac 7.40.
  - type: text
    content: '. » '
  '24':
  - type: text
    content: 'Je leur ai donc répondu : « Que ceux qui ont de l’or s’en dessaisissent ! » Ils m’en ont remis, je l’ai fait fondre au feu et voilà le veau qui en est sorti.'
  '25':
  - type: text
    content: 'Moïse vit que le peuple était déchaîné. Aaron l’avait laissé faire, de sorte qu’il s’exposait au mépris de ses ennemis. '
  '26':
  - type: text
    content: 'Alors il se posta à l’entrée du camp et s’écria : Que tous ceux qui sont pour l’Eternel viennent vers moi !'
  - type: text
    content: 'Tous les membres de la tribu de Lévi se rallièrent à lui. '
  '27':
  - type: text
    content: 'Il leur dit : Voici ce qu’ordonne l’Eternel, le Dieu d’Israël : Que chacun de vous mette son épée au côté ! Parcourez tout le camp, allez d’une tente à l’autre, que chacun tue jusqu’à son frère, son ami, son proche.'
  '28':
  - type: text
    content: 'Les lévites obéirent à Moïse de sorte que, ce jour-là, environ trois mille hommes du peuple perdirent la vie. '
  '29':
  - type: text
    content: 'Moïse dit aux lévites : Vous avez été investis aujourd’hui au service de l’Eternel, car vous avez combattu chacun contre son fils et son frère, de sorte que l’Eternel vous accorde aujourd’hui sa bénédiction.'
  - type: heading
    content: Moïse prie l’Eternel de pardonner au peuple
  '3':
  - type: text
    content: 'Tous se défirent des pendants d’or qui étaient à leurs oreilles et les apportèrent à Aaron. '
  '30':
  - type: text
    content: 'Le lendemain, Moïse dit au peuple : Vous vous êtes rendus coupables d’un grand péché. Maintenant je vais remonter auprès de l’Eternel. Peut-être obtiendrai-je un moyen d’expiation pour votre péché.'
  '31':
  - type: text
    content: 'Moïse retourna donc auprès de l’Eternel et dit : Hélas ! ce peuple s’est rendu coupable d’un grand péché, il s’est fait un dieu d’or. '
  '32':
  - type: text
    content: Mais maintenant, veuille pardonner ce péché. Sinon, efface-moi du livre
  - type: note
    content: Voir Ps 69.29 ; Ap 3.5.
  - type: text
    content: ' que tu as écrit.'
  '33':
  - type: text
    content: 'L’Eternel répondit à Moïse : C’est celui qui a péché contre moi que j’effacerai de mon livre. '
  '34':
  - type: text
    content: Maintenant va, conduis le peuple là où je t’ai dit. Mon ange marchera devant toi, mais au jour où j’interviendrai, je les châtierai pour leur péché.
  '35':
  - type: text
    content: L’Eternel frappa le peuple, à cause du veau d’or qu’avait fabriqué Aaron.
  '4':
  - type: text
    content: 'Celui-ci les reçut de leurs mains, façonna l’or au burin et en coula la statue d’un veau. Alors le peuple s’écria : Israël, Voici tes dieux, qui t’ont fait sortir d’Egypte'
  - type: note
    content: Parodie de 20.2 (voir 1 R 12.28-29 ; Ac 7.41).
  - type: text
    content: '  !'
  '5':
  - type: text
    content: 'Voyant cela, Aaron construisit un autel devant le veau ; puis il proclama : Demain il y aura fête en l’honneur de l’Eternel.'
  '6':
  - type: text
    content: Le lendemain, levé de bon matin, le peuple se mit à offrir des holocaustes et des sacrifices de communion. Ils s’assirent pour manger et boire, puis ils se levèrent pour se divertir
  - type: note
    content: Le verbe traduit par se divertir peut avoir une connotation sexuelle (Gn 26.8). Des orgies licencieuses accompagnaient généralement les fêtes païennes. C’est dans ce sens que Paul interprète ce texte (1 Co 10.7).
  - type: text
    content: .
  - type: heading
    content: Moïse apaise l’Eternel
  '7':
  - type: text
    content: 'L’Eternel dit à Moïse : Va, redescends, car ton peuple que tu as fait sortir d’Egypte se conduit très mal. '
  '8':
  - type: text
    content: 'Ils se sont bien vite détournés de la voie que je leur avais indiquée. Ils se sont fabriqué un veau de métal fondu, ils se sont prosternés devant lui et lui ont offert des sacrifices en disant : « Israël, voici tes dieux, qui t’ont fait sortir d’Egypte ! »'
  '9':
  - type: text
    content: 'L’Eternel ajouta : Je constate que ce peuple est un peuple rebelle. '
