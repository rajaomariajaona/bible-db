document_id: EXO.32
type_code: fra
segments:
- type: usfm
  marker: ms1
  children:
  - type: text
    text: L’idolâtrie d’Israël et le renouvellement de l’alliance
  marker-yv: yv-h
- type: usfm
  marker: s1
  children:
  - type: text
    text: Le veau d’or
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Quand le peuple s’aperçut que Moïse tardait à redescendre de la montagne, il se rassembla autour d’Aaron et lui dit : Allons ! Fabrique-nous des dieux qui marchent à notre tête, car Moïse, cet homme qui nous a fait sortir d’Egypte, nous ne savons pas ce qui lui est arrivé.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Aaron leur répondit : Otez les pendants d’or des oreilles de vos femmes, de vos fils'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '32.2 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Les hommes portaient également des boucles d’oreilles (voir '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Jg 8.24-26
        metadata:
          usfm: JDG.8.24+JDG.8.25+JDG.8.26
      - type: text
        text: ).
    marker-yv: yv-n
  - type: text
    text: ' et de vos filles, et apportez-les moi.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Tous se défirent des pendants d’or qui étaient à leurs oreilles et les apportèrent à Aaron. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Celui-ci les reçut de leurs mains, façonna l’or au burin et en coula la statue d’un veau. Alors le peuple s’écria : Israël, Voici tes dieux, qui t’ont fait sortir d’Egypte'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '32.4 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Parodie de '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '20.2'
        metadata:
          usfm: EXO.20.2
      - type: text
        text: ' (voir 1 R 12.28-29 ; Ac 7.41).'
    marker-yv: yv-n
  - type: text
    text: '  !'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Voyant cela, Aaron construisit un autel devant le veau ; puis il proclama : Demain il y aura fête en l’honneur de l’Eternel.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Le lendemain, levé de bon matin, le peuple se mit à offrir des holocaustes et des sacrifices de communion. Ils s’assirent pour manger et boire, puis ils se levèrent pour se divertir
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '32.6 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Le verbe traduit par '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'se divertir '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: peut avoir une connotation sexuelle (
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Gn 26.8
        metadata:
          usfm: GEN.26.8
      - type: text
        text: ). Des orgies licencieuses accompagnaient généralement les fêtes païennes. C’est dans ce sens que Paul interprète ce texte (
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1 Co 10.7
        metadata:
          usfm: 1CO.10.7
      - type: text
        text: ).
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: s1
  children:
  - type: text
    text: Moïse apaise l’Eternel
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'L’Eternel dit à Moïse : Va, redescends, car ton peuple que tu as fait sortir d’Egypte se conduit très mal. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Ils se sont bien vite détournés de la voie que je leur avais indiquée. Ils se sont fabriqué un veau de métal fondu, ils se sont prosternés devant lui et lui ont offert des sacrifices en disant : « Israël, voici tes dieux, qui t’ont fait sortir d’Egypte ! »'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'L’Eternel ajouta : Je constate que ce peuple est un peuple rebelle. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Maintenant, laisse-moi faire : ma colère s’enflammera contre eux et je les exterminerai. Mais je ferai de toi un autre grand peuple.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Alors Moïse supplia l’Eternel son Dieu d’avoir pitié en disant : Eternel, pourquoi ta colère s’enflammerait-elle contre ton peuple que tu as fait sortir d’Egypte par un formidable déploiement de force et de puissance'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '32.11 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Pour les v. 11-14, voir '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Nb 14.13-19
        metadata:
          usfm: NUM.14.13+NUM.14.14+NUM.14.15+NUM.14.16+NUM.14.17+NUM.14.18+NUM.14.19
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: '  ? '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Pourquoi les Egyptiens diraient-ils que c’est dans de mauvaises intentions que leur Dieu les a fait sortir de leur pays : pour les faire périr dans la région des montagnes et les faire disparaître de la terre ? Laisse ta colère et renonce à envoyer le malheur à ton peuple. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Souviens-toi d’Abraham, d’Isaac et d’Israël, tes serviteurs, envers qui tu t’es engagé par serment en ton propre nom en leur déclarant : « Je rendrai vos descendants aussi nombreux que les étoiles du ciel, je leur donnerai tout ce pays dont j’ai parlé, et ils le posséderont pour toujours'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '32.13 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Voir Gn 17.8 ; 22.16-17.
    marker-yv: yv-n
  - type: text
    text: . »
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Alors l’Eternel renonça à faire venir sur son peuple le malheur dont il l’avait menacé.
- type: usfm
  marker: s1
  children:
  - type: text
    text: La colère de Moïse
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Moïse s’en retourna et redescendit de la montagne, tenant en main les deux tablettes de l’acte de l’alliance. Elles étaient gravées des deux côtés, sur leurs deux faces. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Ces tablettes étaient l’œuvre de Dieu, l’écriture était celle de Dieu, gravée sur les tablettes.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Quand Josué entendit les clameurs poussées par le peuple, il dit à Moïse : Il y a un bruit de guerre dans le camp.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: – Non ! répondit Moïse, ce ne sont ni des cris de victoire ni des lamentations de défaite. C’est un bruit de chansons que j’entends.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Quand il fut près du camp, qu’il aperçut le veau et vit les chœurs de danses, il entra dans une grande colère : il lança les tablettes qu’il tenait en mains et les mit en pièces au pied de la montagne. '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Il saisit le veau que le peuple avait fabriqué, le jeta au feu et le réduisit en poussière qu’il éparpilla à la surface de l’eau, puis il fit boire cette eau aux Israélites. '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Ensuite, il demanda à Aaron : Que t’a donc fait ce peuple pour que tu l’aies entraîné à se rendre coupable d’un si grand péché ?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Aaron répondit : Que mon seigneur ne se fâche pas ! Tu sais toi-même que ce peuple est porté à faire le mal. '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Ils m’ont dit : « Fabrique-nous des dieux qui marchent à notre tête, car ce Moïse, cet homme qui nous a fait sortir d’Egypte, nous ne savons pas ce qui lui est arrivé'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '32.23 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Voir '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ac 7.40
        metadata:
          usfm: ACT.7.40
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: '. » '
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Je leur ai donc répondu : « Que ceux qui ont de l’or s’en dessaisissent ! » Ils m’en ont remis, je l’ai fait fondre au feu et voilà le veau qui en est sorti.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Moïse vit que le peuple était déchaîné. Aaron l’avait laissé faire, de sorte qu’il s’exposait au mépris de ses ennemis. '
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Alors il se posta à l’entrée du camp et s’écria : Que tous ceux qui sont pour l’Eternel viennent vers moi !'
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Tous les membres de la tribu de Lévi se rallièrent à lui. '
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'Il leur dit : Voici ce qu’ordonne l’Eternel, le Dieu d’Israël : Que chacun de vous mette son épée au côté ! Parcourez tout le camp, allez d’une tente à l’autre, que chacun tue jusqu’à son frère, son ami, son proche.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'Les lévites obéirent à Moïse de sorte que, ce jour-là, environ trois mille hommes du peuple perdirent la vie. '
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'Moïse dit aux lévites : Vous avez été investis aujourd’hui au service de l’Eternel, car vous avez combattu chacun contre son fils et son frère, de sorte que l’Eternel vous accorde aujourd’hui sa bénédiction.'
- type: usfm
  marker: s1
  children:
  - type: text
    text: Moïse prie l’Eternel de pardonner au peuple
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'Le lendemain, Moïse dit au peuple : Vous vous êtes rendus coupables d’un grand péché. Maintenant je vais remonter auprès de l’Eternel. Peut-être obtiendrai-je un moyen d’expiation pour votre péché.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'Moïse retourna donc auprès de l’Eternel et dit : Hélas ! ce peuple s’est rendu coupable d’un grand péché, il s’est fait un dieu d’or. '
  - type: usfm
    marker: v
    metadata:
      v: '32'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: Mais maintenant, veuille pardonner ce péché. Sinon, efface-moi du livre
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '32.32 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Voir Ps 69.29 ; Ap 3.5.
    marker-yv: yv-n
  - type: text
    text: ' que tu as écrit.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '33'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: 'L’Eternel répondit à Moïse : C’est celui qui a péché contre moi que j’effacerai de mon livre. '
  - type: usfm
    marker: v
    metadata:
      v: '34'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: Maintenant va, conduis le peuple là où je t’ai dit. Mon ange marchera devant toi, mais au jour où j’interviendrai, je les châtierai pour leur péché.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '35'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: L’Eternel frappa le peuple, à cause du veau d’or qu’avait fabriqué Aaron.
