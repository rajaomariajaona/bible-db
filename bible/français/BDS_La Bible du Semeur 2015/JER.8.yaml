document_id: JER.8,21
type_code: fra
verses:
  '1':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'A ce moment-là, l’Eternel le déclare, on sortira de leurs tombeaux les ossements des rois de Juda, ceux de ses ministres, ceux des prêtres, ceux des prophètes et ceux des habitants de Jérusalem. '
  '10':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Aussi, je donnerai ╵à d’autres leurs épouses,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et les champs qu’ils cultivent ╵à ceux qui les prendront,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: car tous, petits et grands,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sont avides de gains,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: tous, du prophète au prêtre
  - type: usfm
    marker: q1
    children:
    - type: text
      text: pratiquent la duplicité.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ils guérissent superficiellement
  - type: usfm
    marker: q1
    children:
    - type: text
      text: mon peuple du désastre
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'en disant : « Tout va bien ! ╵Tout va vraiment très bien ! »'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: alors que rien ne va
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '8.11 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Voir '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: Ez 13.10
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: .
  '12':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Sont-ils honteux ╵d’avoir commis ╵des abominations ?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ils n’ont aucune honte,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et ils ne savent pas rougir,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et c’est pourquoi ils tomberont ╵avec ceux qui succombent
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et ils s’écrouleront ╵au moment où je leur ferai ╵rendre des comptes,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: l’Eternel le déclare.
  - type: usfm
    marker: s2
    children:
    - type: text
      text: Attente déçue
    marker-yv: yv-h
  '13':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Je leur ôterai leurs récoltes,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: déclare l’Eternel,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et il n’y aura plus ╵de raisin sur la vigne,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et il n’y aura plus de figues ╵sur le figuier,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: le feuillage est flétri !
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Car je donnerai tout
  - type: usfm
    marker: q1
    children:
    - type: text
      text: à ceux qui passeront sur eux.
  '14':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Pourquoi rester sur place ?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Rassemblez-vous,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: rallions nos villes fortifiées
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et là, nous périrons !
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Puisque l’Eternel notre Dieu ╵nous fait périr
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et veut nous abreuver ╵d’une eau empoisonnée,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: puisque nous avons péché contre lui.
  '15':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Nous espérions la paix,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: mais rien de bon n’arrive,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: un temps de guérison,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: en fait c’est l’épouvante.
  '16':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: On entend depuis Dan ╵les chevaux qui hennissent.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: En entendant hennir ╵les fougueux étalons,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: toute la terre tremble.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Les voici, ils arrivent, ╵dévorant le pays
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et tout ce qu’il contient,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: la ville et tous ses habitants.
  '17':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Je vais envoyer contre vous
  - type: usfm
    marker: q1
    children:
    - type: text
      text: des serpents venimeux
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'que nul ne peut charmer :'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ils vous mordront,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: l’Eternel le déclare,
  '18':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ce sera sans remède.
  - type: usfm
    marker: s2
    children:
    - type: text
      text: La souffrance du prophète
    marker-yv: yv-h
  - type: usfm
    marker: q1
    children:
    - type: text
      text: La douleur
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '8.18 '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'ce sera sans remède. La douleur… '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Autre traduction : '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: et sans qu’il y ait de remède, la douleur…
      marker-yv: yv-n
    - type: text
      text: ' me submerge,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: mon cœur est affligé.
  '19':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: La communauté de mon peuple ╵pousse des cris plaintifs
  - type: usfm
    marker: q1
    children:
    - type: text
      text: depuis un pays éloigné.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: L’Eternel, gémit-elle, ╵n’est-il plus en Sion ?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Son roi n’est-il plus là ?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: – Ah ! pourquoi m’ont-ils irrité ╵par leurs statues taillées,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: par ces dieux inutiles ╵et étrangers ?
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: On les exposera face au soleil, à la lune et à tous les astres du ciel, ces astres qu’ils ont adorés, auxquels ils ont rendu un culte, qu’ils ont suivis, qu’ils ont consultés et devant lesquels ils se sont prosternés
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '8.2 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Le culte des astres s’est répandu en Israël à l’époque des rois sous l’influence de la Mésopotamie (voir '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: 2 R 17.16
        - type: text
          text: ).
      marker-yv: yv-n
    - type: text
      text: '. Ces ossements ne seront pas recueillis de nouveau pour être ensevelis ; ils deviendront du fumier sur le sol. '
  '20':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: – La moisson est passée, ╵l’été est terminé
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et nous ne sommes pas sauvés.
  '21':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Elle est brisée, ╵la communauté de mon peuple, ╵j’en suis brisé,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: oui, j’en suis accablé, ╵en proie à la consternation.
  '22':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: N’y a-t-il pas ╵de baume en Galaad
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '8.22 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'La région de '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'Galaad '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: à l’est du Jourdain était célèbre pour ses balsamiers. Avec sa résine, on fabriquait un baume pour guérir les plaies (voir 46.11 ; Gn 37.25 ; 43.11 ; Ez 27.17).
      marker-yv: yv-n
    - type: text
      text: '  ?'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: N’y a-t-il pas de médecin ?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Pourquoi ne voit-on pas guérir ╵la communauté de mon peuple ?
  '23':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Je voudrais que ma tête ╵soit changée en fontaine
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et que mes yeux deviennent ╵une source de larmes ;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: que, nuit et jour, je pleure
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sur les victimes ╵de la communauté ╵de tout mon peuple.
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Tous ceux de ce peuple mauvais qui subsisteront dans les divers lieux où je les aurai dispersés, préféreront la mort à la vie, l’Eternel le déclare, le Seigneur des armées célestes.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Vraie et fausse sagesse
    marker-yv: yv-h
  - type: usfm
    marker: s2
    children:
    - type: text
      text: Une obstination incompréhensible
    marker-yv: yv-h
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Tu leur diras : Voici ce que déclare l’Eternel :'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Si quelqu’un tombe ╵ne se relèvera-t-il pas ?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Si quelqu’un se détourne du chemin, ╵n’y reviendra-t-il pas ?
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Alors pourquoi ╵ce peuple de Jérusalem ╵se détourne-t-il du chemin ?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Pourquoi persiste-t-il ╵dans l’infidélité ?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fermement, les gens de ce peuple ╵s’attachent à leurs illusions
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et ils refusent ╵de revenir à moi.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'J’ai, attentivement, ╵écouté ce qu’ils disent :'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: je n’ai pas entendu ╵une parole dans ce sens !
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Il n’y a parmi eux ╵personne qui renonce ╵au mal qu’il a commis,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'en disant : « Qu’ai-je fait ! »'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tous poursuivent leur course
  - type: usfm
    marker: q1
    children:
    - type: text
      text: comme un cheval qui fonce ╵dans la bataille !
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: La cigogne elle-même, ╵dans le ciel, connaît bien ╵le temps des migrations,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: la colombe, la grue ╵et l’hirondelle
  - type: usfm
    marker: q1
    children:
    - type: text
      text: observent l’époque de leur retour ;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: mais mon peuple ne connaît pas ╵les lois que l’Eternel a établies.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Comment pouvez-vous dire :'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: « Nous, nous sommes des sages
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et nous avons la Loi de l’Eternel » ?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Car, en réalité, ╵le stylet mensonger ╵des spécialistes de la Loi
  - type: usfm
    marker: q1
    children:
    - type: text
      text: l’a changée en mensonge.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Les sages sont couverts de honte,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ils sont pris de terreur ╵et emmenés captifs,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: car ils ont rejeté ╵la parole de l’Eternel.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Que peuvent-ils encore ╵avoir comme sagesse ?
