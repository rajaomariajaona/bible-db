document_id: JER.8,21
type_code: fra
verses:
  '1':
  - type: text
    content: 'A ce moment-là, l’Eternel le déclare, on sortira de leurs tombeaux les ossements des rois de Juda, ceux de ses ministres, ceux des prêtres, ceux des prophètes et ceux des habitants de Jérusalem. '
  '10':
  - type: text
    content: Aussi, je donnerai ╵à d’autres leurs épouses,
  - type: text
    content: et les champs qu’ils cultivent ╵à ceux qui les prendront,
  - type: text
    content: car tous, petits et grands,
  - type: text
    content: sont avides de gains,
  - type: text
    content: tous, du prophète au prêtre
  - type: text
    content: pratiquent la duplicité.
  '11':
  - type: text
    content: Ils guérissent superficiellement
  - type: text
    content: mon peuple du désastre
  - type: text
    content: 'en disant : « Tout va bien ! ╵Tout va vraiment très bien ! »'
  - type: text
    content: alors que rien ne va
  - type: note
    content: Voir Ez 13.10.
  - type: text
    content: .
  '12':
  - type: text
    content: Sont-ils honteux ╵d’avoir commis ╵des abominations ?
  - type: text
    content: Ils n’ont aucune honte,
  - type: text
    content: et ils ne savent pas rougir,
  - type: text
    content: et c’est pourquoi ils tomberont ╵avec ceux qui succombent
  - type: text
    content: et ils s’écrouleront ╵au moment où je leur ferai ╵rendre des comptes,
  - type: text
    content: l’Eternel le déclare.
  - type: heading
    content: Attente déçue
  '13':
  - type: text
    content: Je leur ôterai leurs récoltes,
  - type: text
    content: déclare l’Eternel,
  - type: text
    content: et il n’y aura plus ╵de raisin sur la vigne,
  - type: text
    content: et il n’y aura plus de figues ╵sur le figuier,
  - type: text
    content: le feuillage est flétri !
  - type: text
    content: Car je donnerai tout
  - type: text
    content: à ceux qui passeront sur eux.
  '14':
  - type: text
    content: Pourquoi rester sur place ?
  - type: text
    content: Rassemblez-vous,
  - type: text
    content: rallions nos villes fortifiées
  - type: text
    content: et là, nous périrons !
  - type: text
    content: Puisque l’Eternel notre Dieu ╵nous fait périr
  - type: text
    content: et veut nous abreuver ╵d’une eau empoisonnée,
  - type: text
    content: puisque nous avons péché contre lui.
  '15':
  - type: text
    content: Nous espérions la paix,
  - type: text
    content: mais rien de bon n’arrive,
  - type: text
    content: un temps de guérison,
  - type: text
    content: en fait c’est l’épouvante.
  '16':
  - type: text
    content: On entend depuis Dan ╵les chevaux qui hennissent.
  - type: text
    content: En entendant hennir ╵les fougueux étalons,
  - type: text
    content: toute la terre tremble.
  - type: text
    content: Les voici, ils arrivent, ╵dévorant le pays
  - type: text
    content: et tout ce qu’il contient,
  - type: text
    content: la ville et tous ses habitants.
  '17':
  - type: text
    content: Je vais envoyer contre vous
  - type: text
    content: des serpents venimeux
  - type: text
    content: 'que nul ne peut charmer :'
  - type: text
    content: ils vous mordront,
  - type: text
    content: l’Eternel le déclare,
  '18':
  - type: text
    content: ce sera sans remède.
  - type: heading
    content: La souffrance du prophète
  - type: text
    content: La douleur
  - type: note
    content: 'ce sera sans remède. La douleur… Autre traduction : et sans qu’il y ait de remède, la douleur…'
  - type: text
    content: ' me submerge,'
  - type: text
    content: mon cœur est affligé.
  '19':
  - type: text
    content: La communauté de mon peuple ╵pousse des cris plaintifs
  - type: text
    content: depuis un pays éloigné.
  - type: text
    content: L’Eternel, gémit-elle, ╵n’est-il plus en Sion ?
  - type: text
    content: Son roi n’est-il plus là ?
  - type: text
    content: – Ah ! pourquoi m’ont-ils irrité ╵par leurs statues taillées,
  - type: text
    content: par ces dieux inutiles ╵et étrangers ?
  '2':
  - type: text
    content: On les exposera face au soleil, à la lune et à tous les astres du ciel, ces astres qu’ils ont adorés, auxquels ils ont rendu un culte, qu’ils ont suivis, qu’ils ont consultés et devant lesquels ils se sont prosternés
  - type: note
    content: Le culte des astres s’est répandu en Israël à l’époque des rois sous l’influence de la Mésopotamie (voir 2 R 17.16).
  - type: text
    content: '. Ces ossements ne seront pas recueillis de nouveau pour être ensevelis ; ils deviendront du fumier sur le sol. '
  '20':
  - type: text
    content: – La moisson est passée, ╵l’été est terminé
  - type: text
    content: et nous ne sommes pas sauvés.
  '21':
  - type: text
    content: Elle est brisée, ╵la communauté de mon peuple, ╵j’en suis brisé,
  - type: text
    content: oui, j’en suis accablé, ╵en proie à la consternation.
  '22':
  - type: text
    content: N’y a-t-il pas ╵de baume en Galaad
  - type: note
    content: La région de Galaad à l’est du Jourdain était célèbre pour ses balsamiers. Avec sa résine, on fabriquait un baume pour guérir les plaies (voir 46.11 ; Gn 37.25 ; 43.11 ; Ez 27.17).
  - type: text
    content: '  ?'
  - type: text
    content: N’y a-t-il pas de médecin ?
  - type: text
    content: Pourquoi ne voit-on pas guérir ╵la communauté de mon peuple ?
  '23':
  - type: text
    content: Je voudrais que ma tête ╵soit changée en fontaine
  - type: text
    content: et que mes yeux deviennent ╵une source de larmes ;
  - type: text
    content: que, nuit et jour, je pleure
  - type: text
    content: sur les victimes ╵de la communauté ╵de tout mon peuple.
  '3':
  - type: text
    content: Tous ceux de ce peuple mauvais qui subsisteront dans les divers lieux où je les aurai dispersés, préféreront la mort à la vie, l’Eternel le déclare, le Seigneur des armées célestes.
  - type: heading
    content: Vraie et fausse sagesse
  - type: heading
    content: Une obstination incompréhensible
  '4':
  - type: text
    content: 'Tu leur diras : Voici ce que déclare l’Eternel :'
  - type: text
    content: Si quelqu’un tombe ╵ne se relèvera-t-il pas ?
  - type: text
    content: Si quelqu’un se détourne du chemin, ╵n’y reviendra-t-il pas ?
  '5':
  - type: text
    content: Alors pourquoi ╵ce peuple de Jérusalem ╵se détourne-t-il du chemin ?
  - type: text
    content: Pourquoi persiste-t-il ╵dans l’infidélité ?
  - type: text
    content: Fermement, les gens de ce peuple ╵s’attachent à leurs illusions
  - type: text
    content: et ils refusent ╵de revenir à moi.
  '6':
  - type: text
    content: 'J’ai, attentivement, ╵écouté ce qu’ils disent :'
  - type: text
    content: je n’ai pas entendu ╵une parole dans ce sens !
  - type: text
    content: Il n’y a parmi eux ╵personne qui renonce ╵au mal qu’il a commis,
  - type: text
    content: 'en disant : « Qu’ai-je fait ! »'
  - type: text
    content: Tous poursuivent leur course
  - type: text
    content: comme un cheval qui fonce ╵dans la bataille !
  '7':
  - type: text
    content: La cigogne elle-même, ╵dans le ciel, connaît bien ╵le temps des migrations,
  - type: text
    content: la colombe, la grue ╵et l’hirondelle
  - type: text
    content: observent l’époque de leur retour ;
  - type: text
    content: mais mon peuple ne connaît pas ╵les lois que l’Eternel a établies.
  '8':
  - type: text
    content: 'Comment pouvez-vous dire :'
  - type: text
    content: « Nous, nous sommes des sages
  - type: text
    content: et nous avons la Loi de l’Eternel » ?
  - type: text
    content: Car, en réalité, ╵le stylet mensonger ╵des spécialistes de la Loi
  - type: text
    content: l’a changée en mensonge.
  '9':
  - type: text
    content: Les sages sont couverts de honte,
  - type: text
    content: ils sont pris de terreur ╵et emmenés captifs,
  - type: text
    content: car ils ont rejeté ╵la parole de l’Eternel.
  - type: text
    content: Que peuvent-ils encore ╵avoir comme sagesse ?
