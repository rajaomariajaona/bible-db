document_id: PSA.135
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Le Seigneur est bon
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Louez l’Eternel !
- type: usfm
  marker: q1
  children:
  - type: text
    text: Oui, louez l’Eternel !
- type: usfm
  marker: q1
  children:
  - type: text
    text: Louez-le, vous, ╵les serviteurs de l’Eternel,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: vous qui vous tenez dans le temple ╵de l’Eternel,
- type: usfm
  marker: q1
  children:
  - type: text
    text: dans les parvis de la demeure ╵de notre Dieu !
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Oui, louez l’Eternel ╵car l’Eternel est bon !
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et célébrez-le en musique, ╵car il est digne d’être aimé
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '135.3 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Autre traduction : '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: car cela est beau.
    marker-yv: yv-n
  - type: text
    text: '  !'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: L’Eternel s’est choisi Jacob,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Israël comme son bien précieux
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '135.4 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Voir '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ex 19.5
        metadata:
          usfm: EXO.19.5
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Je sais bien pour ma part ╵que l’Eternel est grand
- type: usfm
  marker: q1
  children:
  - type: text
    text: et que notre Seigneur ╵surpasse tous les dieux.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: L’Eternel fait ╵tout ce qu’il veut
- type: usfm
  marker: q1
  children:
  - type: text
    text: au ciel et sur la terre,
- type: usfm
  marker: q1
  children:
  - type: text
    text: dans les mers et dans les abîmes.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Des confins de la terre, ╵il fait monter les brumes.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Il produit les éclairs ╵au milieu de la pluie,
- type: usfm
  marker: q1
  children:
  - type: text
    text: il fait lever le vent ╵qu’il tenait en réserve.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: C’est lui qui a frappé ╵les premiers-nés d’Egypte
- type: usfm
  marker: q1
  children:
  - type: text
    text: depuis les hommes ╵jusqu’au bétail
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '135.8 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Voir '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ex 12.12
        metadata:
          usfm: EXO.12.12
      - type: text
        text: ', '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '29'
        metadata:
          usfm: EXO.12.29
      - type: text
        text: . Les v. 8-11 sont un rappel sommaire des grands événements par lesquels Dieu a sauvé son peuple.
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Il a réalisé ╵des signes extraordinaires ╵et des prodiges
- type: usfm
  marker: q1
  children:
  - type: text
    text: en plein cœur de l’Egypte
- type: usfm
  marker: q1
  children:
  - type: text
    text: contre le pharaon ╵et tous ses serviteurs
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '135.9 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Voir Ex 7 à 14.
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: C’est lui qui a frappé ╵des peuples en grand nombre
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'et qui a abattu ╵des souverains puissants :'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Sihôn, le roi des Amoréens
- type: usfm
  marker: q1
  children:
  - type: text
    text: et Og, roi du Basan,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et tous les rois de Canaan
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '135.11 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Voir '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Nb 21.21-35
        metadata:
          usfm: NUM.21.21+NUM.21.22+NUM.21.23+NUM.21.24+NUM.21.25+NUM.21.26+NUM.21.27+NUM.21.28+NUM.21.29+NUM.21.30+NUM.21.31+NUM.21.32+NUM.21.33+NUM.21.34+NUM.21.35
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Puis il donna leurs territoires ╵en possession
- type: usfm
  marker: q1
  children:
  - type: text
    text: à Israël son peuple.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: O Eternel, ╵ta renommée ╵demeure pour l’éternité,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et d’âge en âge l’on proclamera ╵ton nom, ô Eternel.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Car l’Eternel ╵rend justice à son peuple,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et il nous témoigne sa compassion ╵à nous, ses serviteurs.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Les idoles des autres peuples sont d’argent et d’or,
- type: usfm
  marker: q1
  children:
  - type: text
    text: fabriquées par des hommes
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '135.15 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Pour les v. 15-18, voir '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 115.4-8
        metadata:
          usfm: PSA.115.4+PSA.115.5+PSA.115.6+PSA.115.7+PSA.115.8
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: '  :'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: elles ont une bouche, ╵mais ne peuvent parler,
- type: usfm
  marker: q1
  children:
  - type: text
    text: elles ont bien des yeux, ╵mais elles ne voient pas.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Elles ont des oreilles, ╵mais qui n’entendent rien.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et pas le moindre souffle ╵ne se trouve en leur bouche.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Ils leur ressemblent ╵tous ceux qui les fabriquent
- type: usfm
  marker: q1
  children:
  - type: text
    text: et tous ceux qui mettent leur confiance en elles.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: O peuple d’Israël, ╵bénissez l’Eternel !
- type: usfm
  marker: q1
  children:
  - type: text
    text: Descendants d’Aaron, ╵bénissez l’Eternel !
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Descendants de Lévi, ╵bénissez l’Eternel !
- type: usfm
  marker: q1
  children:
  - type: text
    text: Vous tous qui craignez l’Eternel, ╵bénissez l’Eternel !
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Béni soit l’Eternel ╵depuis le mont Sion,
- type: usfm
  marker: q1
  children:
  - type: text
    text: lui qui réside dans Jérusalem !
- type: usfm
  marker: q1
  children:
  - type: text
    text: Louez l’Eternel !
