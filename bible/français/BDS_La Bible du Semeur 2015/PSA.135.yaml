document_id: PSA.135,21
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Le Seigneur est bon
    marker-yv: yv-h
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Louez l’Eternel !
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Oui, louez l’Eternel !
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Louez-le, vous, ╵les serviteurs de l’Eternel,
  '10':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: C’est lui qui a frappé ╵des peuples en grand nombre
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'et qui a abattu ╵des souverains puissants :'
  '11':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Sihôn, le roi des Amoréens
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et Og, roi du Basan,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et tous les rois de Canaan
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '135.11 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Voir '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: Nb 21.21-35
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: .
  '12':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Puis il donna leurs territoires ╵en possession
  - type: usfm
    marker: q1
    children:
    - type: text
      text: à Israël son peuple.
  '13':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: O Eternel, ╵ta renommée ╵demeure pour l’éternité,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et d’âge en âge l’on proclamera ╵ton nom, ô Eternel.
  '14':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Car l’Eternel ╵rend justice à son peuple,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et il nous témoigne sa compassion ╵à nous, ses serviteurs.
  '15':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Les idoles des autres peuples sont d’argent et d’or,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: fabriquées par des hommes
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '135.15 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Pour les v. 15-18, voir '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: 115.4-8
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: '  :'
  '16':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: elles ont une bouche, ╵mais ne peuvent parler,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: elles ont bien des yeux, ╵mais elles ne voient pas.
  '17':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Elles ont des oreilles, ╵mais qui n’entendent rien.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et pas le moindre souffle ╵ne se trouve en leur bouche.
  '18':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ils leur ressemblent ╵tous ceux qui les fabriquent
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et tous ceux qui mettent leur confiance en elles.
  '19':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: O peuple d’Israël, ╵bénissez l’Eternel !
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Descendants d’Aaron, ╵bénissez l’Eternel !
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: vous qui vous tenez dans le temple ╵de l’Eternel,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dans les parvis de la demeure ╵de notre Dieu !
  '20':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Descendants de Lévi, ╵bénissez l’Eternel !
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Vous tous qui craignez l’Eternel, ╵bénissez l’Eternel !
  '21':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Béni soit l’Eternel ╵depuis le mont Sion,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: lui qui réside dans Jérusalem !
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Louez l’Eternel !
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Oui, louez l’Eternel ╵car l’Eternel est bon !
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et célébrez-le en musique, ╵car il est digne d’être aimé
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '135.3 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Autre traduction : '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: car cela est beau.
      marker-yv: yv-n
    - type: text
      text: '  !'
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: L’Eternel s’est choisi Jacob,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Israël comme son bien précieux
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '135.4 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Voir '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: Ex 19.5
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: .
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Je sais bien pour ma part ╵que l’Eternel est grand
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et que notre Seigneur ╵surpasse tous les dieux.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: L’Eternel fait ╵tout ce qu’il veut
  - type: usfm
    marker: q1
    children:
    - type: text
      text: au ciel et sur la terre,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dans les mers et dans les abîmes.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Des confins de la terre, ╵il fait monter les brumes.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Il produit les éclairs ╵au milieu de la pluie,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: il fait lever le vent ╵qu’il tenait en réserve.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: C’est lui qui a frappé ╵les premiers-nés d’Egypte
  - type: usfm
    marker: q1
    children:
    - type: text
      text: depuis les hommes ╵jusqu’au bétail
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '135.8 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Voir '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: Ex 12.12
        - type: text
          text: ', '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: '29'
        - type: text
          text: . Les v. 8-11 sont un rappel sommaire des grands événements par lesquels Dieu a sauvé son peuple.
      marker-yv: yv-n
    - type: text
      text: .
  '9':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Il a réalisé ╵des signes extraordinaires ╵et des prodiges
  - type: usfm
    marker: q1
    children:
    - type: text
      text: en plein cœur de l’Egypte
  - type: usfm
    marker: q1
    children:
    - type: text
      text: contre le pharaon ╵et tous ses serviteurs
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '135.9 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Voir Ex 7 à 14.
      marker-yv: yv-n
    - type: text
      text: .
