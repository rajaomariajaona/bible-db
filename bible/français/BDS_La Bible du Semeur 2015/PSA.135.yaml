document_id: PSA.135,21
type_code: fra
verses:
  '1':
  - type: heading
    content: Le Seigneur est bon
  - type: text
    content: Louez l’Eternel !
  - type: text
    content: Oui, louez l’Eternel !
  - type: text
    content: Louez-le, vous, ╵les serviteurs de l’Eternel,
  '10':
  - type: text
    content: C’est lui qui a frappé ╵des peuples en grand nombre
  - type: text
    content: 'et qui a abattu ╵des souverains puissants :'
  '11':
  - type: text
    content: Sihôn, le roi des Amoréens
  - type: text
    content: et Og, roi du Basan,
  - type: text
    content: et tous les rois de Canaan
  - type: note
    content: Voir Nb 21.21-35.
  - type: text
    content: .
  '12':
  - type: text
    content: Puis il donna leurs territoires ╵en possession
  - type: text
    content: à Israël son peuple.
  '13':
  - type: text
    content: O Eternel, ╵ta renommée ╵demeure pour l’éternité,
  - type: text
    content: et d’âge en âge l’on proclamera ╵ton nom, ô Eternel.
  '14':
  - type: text
    content: Car l’Eternel ╵rend justice à son peuple,
  - type: text
    content: et il nous témoigne sa compassion ╵à nous, ses serviteurs.
  '15':
  - type: text
    content: Les idoles des autres peuples sont d’argent et d’or,
  - type: text
    content: fabriquées par des hommes
  - type: note
    content: Pour les v. 15-18, voir 115.4-8.
  - type: text
    content: '  :'
  '16':
  - type: text
    content: elles ont une bouche, ╵mais ne peuvent parler,
  - type: text
    content: elles ont bien des yeux, ╵mais elles ne voient pas.
  '17':
  - type: text
    content: Elles ont des oreilles, ╵mais qui n’entendent rien.
  - type: text
    content: Et pas le moindre souffle ╵ne se trouve en leur bouche.
  '18':
  - type: text
    content: Ils leur ressemblent ╵tous ceux qui les fabriquent
  - type: text
    content: et tous ceux qui mettent leur confiance en elles.
  '19':
  - type: text
    content: O peuple d’Israël, ╵bénissez l’Eternel !
  - type: text
    content: Descendants d’Aaron, ╵bénissez l’Eternel !
  '2':
  - type: text
    content: vous qui vous tenez dans le temple ╵de l’Eternel,
  - type: text
    content: dans les parvis de la demeure ╵de notre Dieu !
  '20':
  - type: text
    content: Descendants de Lévi, ╵bénissez l’Eternel !
  - type: text
    content: Vous tous qui craignez l’Eternel, ╵bénissez l’Eternel !
  '21':
  - type: text
    content: Béni soit l’Eternel ╵depuis le mont Sion,
  - type: text
    content: lui qui réside dans Jérusalem !
  - type: text
    content: Louez l’Eternel !
  '3':
  - type: text
    content: Oui, louez l’Eternel ╵car l’Eternel est bon !
  - type: text
    content: Et célébrez-le en musique, ╵car il est digne d’être aimé
  - type: note
    content: 'Autre traduction : car cela est beau.'
  - type: text
    content: '  !'
  '4':
  - type: text
    content: L’Eternel s’est choisi Jacob,
  - type: text
    content: Israël comme son bien précieux
  - type: note
    content: Voir Ex 19.5.
  - type: text
    content: .
  '5':
  - type: text
    content: Je sais bien pour ma part ╵que l’Eternel est grand
  - type: text
    content: et que notre Seigneur ╵surpasse tous les dieux.
  '6':
  - type: text
    content: L’Eternel fait ╵tout ce qu’il veut
  - type: text
    content: au ciel et sur la terre,
  - type: text
    content: dans les mers et dans les abîmes.
  '7':
  - type: text
    content: Des confins de la terre, ╵il fait monter les brumes.
  - type: text
    content: Il produit les éclairs ╵au milieu de la pluie,
  - type: text
    content: il fait lever le vent ╵qu’il tenait en réserve.
  '8':
  - type: text
    content: C’est lui qui a frappé ╵les premiers-nés d’Egypte
  - type: text
    content: depuis les hommes ╵jusqu’au bétail
  - type: note
    content: Voir Ex 12.12, 29. Les v. 8-11 sont un rappel sommaire des grands événements par lesquels Dieu a sauvé son peuple.
  - type: text
    content: .
  '9':
  - type: text
    content: Il a réalisé ╵des signes extraordinaires ╵et des prodiges
  - type: text
    content: en plein cœur de l’Egypte
  - type: text
    content: contre le pharaon ╵et tous ses serviteurs
  - type: note
    content: Voir Ex 7 à 14.
  - type: text
    content: .
