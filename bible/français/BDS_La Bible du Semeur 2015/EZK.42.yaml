document_id: EZK.42,21
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s2
    children:
    - type: text
      text: Les appartements des prêtres
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Le personnage me fit ensuite sortir vers le parvis extérieur par le côté nord et il me fit entrer dans la salle située en face de l’espace libre et vis-à-vis du bâtiment, du côté nord. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Sur la largeur du mur du parvis, au sud
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '42.10 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'D’après l’ancienne version grecque et les v. 11-12. Le texte hébreu traditionnel a : '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: à l’est.
      marker-yv: yv-n
    - type: text
      text: ', face à l’espace libre et au bâtiment, il y avait encore des salles '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'et, devant elles, un passage. Elles étaient pareilles aux salles qui se trouvaient au nord : leur longueur et leur largeur étaient les mêmes, ainsi que leurs issues, leur disposition et leurs portes. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Il en était de même des salles se trouvant du côté sud. Il y avait également une porte à l’entrée du passage situé à l’est, en face du mur de protection, et c’est par là que l’on entrait
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '42.12 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: C’est par là que l’on entrait
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: ': '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: hébreu obscur et traduction incertaine.
      marker-yv: yv-n
    - type: text
      text: '. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Le personnage me dit : Les salles du côté nord et celles du côté sud qui donnent sur l’espace libre, sont des salles saintes où les prêtres qui officient pour l’Eternel mangeront les aliments très saints'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '42.13 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Les descendants de Tsadoq (
        - type: usfm
          marker: ref
          children:
          - type: text
            text: '40.6'
        - type: text
          text: ) ont le droit, comme tous les prêtres, de manger certaines parts des sacrifices (voir Lv 2.3 ; 5.13 ; 6.9, 19, 22 ; 7.6, 10).
      marker-yv: yv-n
    - type: text
      text: '  ; c’est là qu’ils les déposeront ainsi que l’offrande végétale et la viande des sacrifices pour le péché et des sacrifices de réparation. Car ce lieu est saint. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Une fois entrés, les prêtres ne sortiront pas du lieu saint pour aller dans le parvis extérieur sans avoir déposé là les vêtements avec lesquels ils auront fait le service, car ces vêtements sont saints. Ils revêtiront d’autres habits avant de s’approcher des parties réservées au peuple.
  - type: usfm
    marker: s2
    children:
    - type: text
      text: Dans le parvis extérieur
    marker-yv: yv-h
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Lorsque le personnage eut ainsi achevé de mesurer l’intérieur du Temple, il me fit sortir par la porte orientale et il mesura l’enceinte tout autour de l’édifice.
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Il arpenta, avec sa règle, le côté oriental et trouva cinq cents coudées. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Il mesura le côté nord : cinq cents coudées. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Il mesura le côté sud : cinq cents coudées. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Il mesura enfin le côté ouest : cinq cents coudées. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'L’édifice contenant les salles avait cent coudées de long vers l’entrée nord et cinquante coudées de large. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Il mesura les quatre côtés. Il y avait là une muraille, dont la longueur et la largeur faisaient cinq cents coudées, pour séparer le sacré du profane.
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'En face des vingt coudées du parvis intérieur et vis-à-vis du dallage du parvis extérieur s’étendaient des galeries superposées sur trois étages. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Devant les salles, il y avait une allée large de dix coudées et longue de cent coudées
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '42.4 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: cent coudées
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: ': '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'd’après l’ancienne version grecque et la version syriaque. Le texte hébreu traditionnel a : '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: une coudée.
      marker-yv: yv-n
    - type: text
      text: ', pour aller vers l’intérieur. Leurs portes donnaient du côté nord. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Les salles de l’étage supérieur étaient plus étroites, car les galeries empiétaient sur elles plus que sur les salles inférieures et sur celles du milieu. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Les salles étaient disposées sur trois étages et n’étaient pas soutenues par des colonnes semblables à celles des parvis ; c’est pourquoi les salles de l’étage supérieur étaient plus étroites que celles du premier étage et du rez-de-chaussée. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Le mur extérieur longeant le parvis extérieur parallèlement aux salles avait cinquante coudées de long en face des salles, '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: car la longueur totale sur laquelle il y avait des salles donnant sur le parvis extérieur était de cinquante coudées, tandis que sur la façade orientée vers le Temple, la longueur totale sur laquelle il y avait des salles était de cent coudées.
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'En contrebas de ces salles, il y avait, du côté est, une entrée pour y accéder depuis le parvis extérieur. '
