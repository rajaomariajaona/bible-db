document_id: ISA.27,21
type_code: fra
verses:
  '1':
  - type: text
    content: Ce jour-là, l’Eternel
  - type: text
    content: interviendra ╵avec sa dure épée, ╵sa grande et forte épée,
  - type: text
    content: contre le Léviathan
  - type: note
    content: Selon certains, ce monstre, dont la description est empruntée aux mythes païens cananéens, représenterait des peuples ennemis du peuple de Dieu, comme c’est le cas du monstre Rahav dans d’autres passages de l’Ecriture (30.7 et note). Pour d’autres, il serait le symbole des puissances maléfiques agissant dans l’histoire par l’intermédiaire de ces peuples.
  - type: text
    content: ', ╵le serpent fugitif,'
  - type: text
    content: contre le Léviathan, ╵le serpent tortueux ;
  - type: text
    content: il le tuera, ce monstre ╵qui habite la mer.
  - type: heading
    content: La vigne du Seigneur
  '10':
  - type: text
    content: La cité fortifiée ╵restera solitaire
  - type: text
    content: et elle deviendra ╵un camp abandonné ╵et délaissé comme un désert ;
  - type: text
    content: les veaux y viendront paître, ╵ils s’y reposeront,
  - type: text
    content: ils brouteront les branches.
  '11':
  - type: text
    content: Et quand les branches seront sèches, ╵on viendra les briser,
  - type: text
    content: des femmes les feront brûler.
  - type: text
    content: Car c’est un peuple sans intelligence ;
  - type: text
    content: c’est pourquoi celui qui l’a fait ╵n’en aura pas pitié,
  - type: text
    content: et celui qui l’a façonné ╵ne lui fera pas grâce.
  - type: heading
    content: Le grand retour
  '12':
  - type: text
    content: 'En ce jour-là, l’Eternel secouera les arbres des rives de l’Euphrate jusqu’au torrent d’Egypte. Et vous serez recueillis, vous, Israélites, un à un. '
  '13':
  - type: text
    content: En ce jour-là, le grand cor sonnera, ceux qui dépérissaient en Assyrie et tous ceux qui étaient exilés en Egypte viendront adorer l’Eternel sur la sainte montagne au milieu de Jérusalem.
  '2':
  - type: text
    content: 'Ce jour-là, on dira :'
  - type: text
    content: Chantez la vigne aux beaux raisins
  - type: note
    content: Pour les v. 2-6, voir Es 5.1-7.
  - type: text
    content: .
  '3':
  - type: text
    content: C’est moi, l’Eternel, qui la garde ;
  - type: text
    content: en tout temps, je l’arrose.
  - type: text
    content: De peur que l’on s’en prenne à elle,
  - type: text
    content: nuit et jour je la garde.
  '4':
  - type: text
    content: Ma colère est passée,
  - type: text
    content: et s’il se trouve ╵des ronces, des épines,
  - type: text
    content: je marcherai contre elles ╵pour leur faire la guerre
  - type: text
    content: et j’y mettrai le feu.
  '5':
  - type: text
    content: A moins qu’on me prenne ╵pour refuge et rempart,
  - type: text
    content: qu’on fasse la paix,
  - type: text
    content: oui, la paix avec moi.
  '6':
  - type: text
    content: Dans les jours à venir, ╵Jacob prendra racine,
  - type: text
    content: Israël fleurira ╵et fera des bourgeons,
  - type: text
    content: il couvrira de fruits ╵la surface du monde.
  '7':
  - type: text
    content: L’Eternel les a-t-il frappés ╵comme il a frappé ceux ╵qui leur donnaient des coups ?
  - type: text
    content: Les a-t-il mis à mort ╵comme il a mis à mort ╵ceux qui semaient la mort ╵au milieu d’eux ?
  '8':
  - type: text
    content: Non, c’est avec mesure ╵que tu as conduit leur procès
  - type: note
    content: 'Autre traduction : tu as fait leur procès en les chassant.'
  - type: text
    content: ', ╵en les envoyant en exil.'
  - type: text
    content: Tu les as enlevés ╵par ton souffle terrible
  - type: text
    content: en un jour de vent d’est.
  '9':
  - type: text
    content: C’est par ce châtiment ╵que sera expiée ╵la faute de Jacob,
  - type: text
    content: 'et voici quel sera le fruit ╵du pardon de sa faute :'
  - type: text
    content: il pulvérisera ╵toutes les pierres ╵des autels idolâtres
  - type: text
    content: comme des pierres à chaux ;
  - type: text
    content: les pieux sacrés voués à Ashéra, ╵de même que les encensoirs, ╵ne seront jamais rétablis.
  - type: heading
    content: La ville abandonnée
