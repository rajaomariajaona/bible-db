document_id: ISA.27,21
type_code: fra
verses:
  '1':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ce jour-là, l’Eternel
  - type: usfm
    marker: q1
    children:
    - type: text
      text: interviendra ╵avec sa dure épée, ╵sa grande et forte épée,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: contre le Léviathan
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '27.1 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Selon certains, ce monstre, dont la description est empruntée aux mythes païens cananéens, représenterait des peuples ennemis du peuple de Dieu, comme c’est le cas du monstre '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'Rahav '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: dans d’autres passages de l’Ecriture (
        - type: usfm
          marker: ref
          children:
          - type: text
            text: '30.7'
        - type: text
          text: ' et note). Pour d’autres, il serait le symbole des puissances maléfiques agissant dans l’histoire par l’intermédiaire de ces peuples.'
      marker-yv: yv-n
    - type: text
      text: ', ╵le serpent fugitif,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: contre le Léviathan, ╵le serpent tortueux ;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: il le tuera, ce monstre ╵qui habite la mer.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: La vigne du Seigneur
    marker-yv: yv-h
  '10':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: La cité fortifiée ╵restera solitaire
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et elle deviendra ╵un camp abandonné ╵et délaissé comme un désert ;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: les veaux y viendront paître, ╵ils s’y reposeront,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ils brouteront les branches.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et quand les branches seront sèches, ╵on viendra les briser,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: des femmes les feront brûler.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Car c’est un peuple sans intelligence ;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: c’est pourquoi celui qui l’a fait ╵n’en aura pas pitié,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et celui qui l’a façonné ╵ne lui fera pas grâce.
  - type: usfm
    marker: s2
    children:
    - type: text
      text: Le grand retour
    marker-yv: yv-h
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'En ce jour-là, l’Eternel secouera les arbres des rives de l’Euphrate jusqu’au torrent d’Egypte. Et vous serez recueillis, vous, Israélites, un à un. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: En ce jour-là, le grand cor sonnera, ceux qui dépérissaient en Assyrie et tous ceux qui étaient exilés en Egypte viendront adorer l’Eternel sur la sainte montagne au milieu de Jérusalem.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Ce jour-là, on dira :'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Chantez la vigne aux beaux raisins
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '27.2 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Pour les v. 2-6, voir '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: Es 5.1-7
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: .
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: C’est moi, l’Eternel, qui la garde ;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: en tout temps, je l’arrose.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: De peur que l’on s’en prenne à elle,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: nuit et jour je la garde.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ma colère est passée,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et s’il se trouve ╵des ronces, des épines,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: je marcherai contre elles ╵pour leur faire la guerre
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et j’y mettrai le feu.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: A moins qu’on me prenne ╵pour refuge et rempart,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: qu’on fasse la paix,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: oui, la paix avec moi.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Dans les jours à venir, ╵Jacob prendra racine,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Israël fleurira ╵et fera des bourgeons,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: il couvrira de fruits ╵la surface du monde.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: L’Eternel les a-t-il frappés ╵comme il a frappé ceux ╵qui leur donnaient des coups ?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Les a-t-il mis à mort ╵comme il a mis à mort ╵ceux qui semaient la mort ╵au milieu d’eux ?
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Non, c’est avec mesure ╵que tu as conduit leur procès
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '27.8 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Autre traduction : '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: tu as fait leur procès en les chassant.
      marker-yv: yv-n
    - type: text
      text: ', ╵en les envoyant en exil.'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tu les as enlevés ╵par ton souffle terrible
  - type: usfm
    marker: q1
    children:
    - type: text
      text: en un jour de vent d’est.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: C’est par ce châtiment ╵que sera expiée ╵la faute de Jacob,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'et voici quel sera le fruit ╵du pardon de sa faute :'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: il pulvérisera ╵toutes les pierres ╵des autels idolâtres
  - type: usfm
    marker: q1
    children:
    - type: text
      text: comme des pierres à chaux ;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: les pieux sacrés voués à Ashéra, ╵de même que les encensoirs, ╵ne seront jamais rétablis.
  - type: usfm
    marker: s2
    children:
    - type: text
      text: La ville abandonnée
    marker-yv: yv-h
