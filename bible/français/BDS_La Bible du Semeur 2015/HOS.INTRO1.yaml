verses:
  '1':
  - type: text
    content: Introduction
  - type: text
    content: Osée, vraisemblablement originaire du royaume du Nord, y a été porte-parole de l’Eternel peu après le prophète Amos, dont il connaît les proclamations. Il a exercé son ministère pendant près de quarante ans, lors de la période finale de l’histoire du royaume d’Israël, à partir de la fin du règne de Jéroboam II (793 à 753) et durant l’époque d’anarchie qui s’ensuivit (2 R 15.8 à 17.41). Esaïe est son contemporain en Juda.
  - type: text
    content: 'C’est pendant ces années que Tiglath Piléser III (745 à 727) réussit à faire de l’Assyrie la première puissance régionale. L’Egypte, affaiblie, encourage des soulèvements dans les pays progressivement assujettis à l’Empire assyrien. La politique israélite oscille entre la soumission à l’Assyrie (2 R 15.19-20) et la recherche de l’appui égyptien (Os 7.11 ; 12.2). Mais cet appui est trompeur : en représailles, le royaume du Nord se voit privé par les Assyriens d’une partie de son territoire (2 R 15.29). La guerre entreprise en alliance avec la Syrie contre le royaume de Juda fournira à Tiglath Piléser une nouvelle occasion de s’en prendre à Israël (2 R 16). Finalement, suite à une révolte du roi Osée, les Assyriens détruiront la capitale, Samarie, en 722, et déporteront la majeure partie de sa population (2 R 17).'
  - type: text
    content: Comme Amos, son prédécesseur, Osée dénonce la corruption morale, sociale et politique (4.1-2 ; 6.7-10 ; 7.1-16), mais l’accent de sa prédication tombe sur l’infidélité religieuse du peuple qu’incarne en particulier le sanctuaire de Béthel (4.15 ; 5.8 ; 10.8) édifié par Jéroboam I
  - type: text
    content: er
  - type: text
    content: ' (1 R 12.29). Ainsi, à la condamnation de l’idolâtrie s’ajoute celle des pratiques cananéennes comme la prostitution sacrée, qui se sont frayé un chemin jusque dans le culte rendu à l’Eternel (4.10-19 ; 9.1  ; etc.).'
  - type: text
    content: 'Pour dénoncer l’infidélité du peuple, Osée se sert du symbolisme conjugal car, comme pour les époux dans le mariage, la relation entre Dieu et son peuple est régie par une alliance (chap. 1 à 3). Selon certains, ce symbolisme s’appuierait sur la vie maritale du prophète qui aurait épousé Gomer, une prostituée (1.2-9 ; 3.1-3). Selon d’autres, ce mariage constituerait un « mime » ou une « action » prophétique à l’exemple des mimes produits par Jérémie (Jr 13.1-7) ou Ezéchiel (Ez 3.22 à 5.17). Au symbolisme conjugal se rattache le thème du procès : l’Eternel intente un procès (2.4ss ; chap. 12) à son peuple infidèle comme un mari à son épouse adultère, et lui signifie son rejet : Israël perd sa qualité de peuple de Dieu (1.6-8 ; 2.4). Comme les paroles pieuses et les rites cultuels des Israélites ne sont pas accompagnés d’une véritable humiliation et d’un amour durable pour l’Eternel (chap. 6), le châtiment est imminent ; ce sera la guerre et l’exil (5.8ss ; chap. 8 à 10 ; 13).'
  - type: text
    content: Pourtant, dans son amour, l’Eternel rappelle le peuple infidèle. L’exil sera comme un retour au désert où l’Eternel se fera connaître à son peuple comme au Sinaï. Il lui accordera le pardon, le reprendra pour son peuple, en le transformant pour qu’il aime fidèlement l’Eternel et vive selon le droit (2.1-3, 18ss ; chap. 14). Car cet amour qui caractérise l’Eternel doit aussi caractériser ceux qui lui appartiennent dans leur relation avec Dieu et avec leur prochain (6.6 ; 12.7).
