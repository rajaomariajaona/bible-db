document_id: PHP.4
type_code: fra
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Ainsi donc, mes frères et sœurs bien-aimés, vous que je désire tant revoir, vous qui êtes ma joie et ma couronne, c’est de cette manière, mes chers amis, que vous devez tenir ferme, en restant attachés au Seigneur.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Recommandations
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Je recommande à Evodie et à Syntyche
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '4.2 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Deux anciennes collaboratrices de Paul opposées maintenant par un différend suffisamment grave pour qu’il soit parvenu aux oreilles de l’apôtre.
    marker-yv: yv-n
  - type: text
    text: ' de vivre en parfaite harmonie, l’une avec l’autre, selon le Seigneur ; je les y invite instamment.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Toi, mon fidèle collègue
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '4.3 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Paul s’adresse sans doute à l’un des responsables de l’Eglise. Peut-être le mot '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'susugos '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'traduit par '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'collègue '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'est-il le nom d’un responsable. L’apôtre jouerait ainsi sur le sens de ce nom (comme il l’a fait dans '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Phm 11
        metadata:
          usfm: PHM.1.11
      - type: text
        text: ).
    marker-yv: yv-n
  - type: text
    text: ', je te le demande : viens-leur en aide, car elles ont combattu à mes côtés pour la cause de l’Evangile, tout comme Clément et mes autres collaborateurs dont les noms sont inscrits dans le livre de vie'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '4.3 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Voir '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ap 3.5
        metadata:
          usfm: REV.3.5
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Réjouissez-vous en tout temps de tout ce que le Seigneur est pour vous. Oui, je le répète, soyez dans la joie. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Faites-vous connaître par votre amabilité envers tous les hommes. Le Seigneur est proche. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Ne vous mettez en souci pour rien, mais, en toute chose, exposez vos demandes à Dieu en lui adressant vos prières et vos supplications, tout en lui exprimant votre reconnaissance.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Alors la paix de Dieu, qui surpasse tout ce qu’on peut concevoir, gardera votre cœur et votre pensée sous la protection de Jésus-Christ.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Enfin, frères et sœurs, nourrissez vos pensées
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '4.8 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Autre traduction : '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: tenez compte de.
    marker-yv: yv-n
  - type: text
    text: ' de tout ce qui est vrai, noble, juste, pur, digne d’amour ou d’approbation, de tout ce qui est vertueux et mérite louange.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Ce que vous avez appris et reçu de moi, ce que vous m’avez entendu dire et vu faire, mettez-le en pratique. Alors le Dieu qui donne la paix sera avec vous.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Reconnaissance de Paul
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Je me suis profondément réjoui, dans le Seigneur, en voyant que votre intérêt pour moi a pu finalement porter de nouveaux fruits. Car cette sollicitude à mon égard, vous l’éprouviez toujours, mais vous n’aviez pas eu l’occasion de la manifester.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Ce n’est pas le besoin qui me fait parler ainsi, car j’ai appris en toutes circonstances à être content avec ce que j’ai. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Je sais vivre dans le dénuement, je sais aussi vivre dans l’abondance. C’est le secret que j’ai appris : m’accommoder à toutes les situations et toutes les circonstances, que je sois rassasié ou que j’aie faim, que je connaisse l’abondance ou que je sois dans le besoin. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Je peux tout, grâce à celui qui me fortifie.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Pourtant, vous avez bien fait de prendre part à ma détresse. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Comme vous le savez, Philippiens, dans les premiers temps de mon activité pour la cause de l’Evangile, lorsque j’ai quitté la Macédoine
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '4.15 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Voir note '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 2 Co 1.16
        metadata:
          usfm: 2CO.1.16
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: ', aucune autre Eglise n’est entrée avec moi dans un échange réciproque de dons matériels et spirituels'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '4.15 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Paul utilise une expression du langage commercial désignant un compte de profits et pertes.
    marker-yv: yv-n
  - type: text
    text: . Vous seuls l’avez fait.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Pendant mon séjour à Thessalonique, vous m’avez envoyé, par deux fois, des dons pour subvenir à mes besoins.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Ce n’est pas que je tienne à recevoir des dons ; ce qui m’intéresse, c’est qu’un plus grand nombre de fruits soit porté à votre actif.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: J’atteste par cette lettre avoir reçu tous vos dons, et je suis dans l’abondance. Depuis qu’Epaphrodite me les a remis, je suis comblé. Ils ont été pour moi comme le doux parfum d’une offrande agréée par Dieu et qui lui fait plaisir.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Aussi, mon Dieu subviendra pleinement à tous vos besoins ; il le fera, selon sa glorieuse richesse qui se manifeste en Jésus-Christ. '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: A notre Dieu et Père soit la gloire dans tous les siècles ! Amen !
- type: usfm
  marker: s1
  children:
  - type: text
    text: Salutations
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Saluez tous ceux qui, par leur union avec Jésus-Christ, font partie du peuple saint.
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Les frères qui sont ici avec moi vous saluent. '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: Tous les membres du peuple saint vous adressent leurs salutations, et en particulier ceux qui sont au service de l’empereur.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: Que la grâce du Seigneur Jésus-Christ soit avec vous.
