document_id: PHP.4,21
type_code: fra
verses:
  '1':
  - type: text
    content: Ainsi donc, mes frères et sœurs bien-aimés, vous que je désire tant revoir, vous qui êtes ma joie et ma couronne, c’est de cette manière, mes chers amis, que vous devez tenir ferme, en restant attachés au Seigneur.
  - type: heading
    content: Recommandations
  '10':
  - type: text
    content: Je me suis profondément réjoui, dans le Seigneur, en voyant que votre intérêt pour moi a pu finalement porter de nouveaux fruits. Car cette sollicitude à mon égard, vous l’éprouviez toujours, mais vous n’aviez pas eu l’occasion de la manifester.
  '11':
  - type: text
    content: 'Ce n’est pas le besoin qui me fait parler ainsi, car j’ai appris en toutes circonstances à être content avec ce que j’ai. '
  '12':
  - type: text
    content: 'Je sais vivre dans le dénuement, je sais aussi vivre dans l’abondance. C’est le secret que j’ai appris : m’accommoder à toutes les situations et toutes les circonstances, que je sois rassasié ou que j’aie faim, que je connaisse l’abondance ou que je sois dans le besoin. '
  '13':
  - type: text
    content: Je peux tout, grâce à celui qui me fortifie.
  '14':
  - type: text
    content: 'Pourtant, vous avez bien fait de prendre part à ma détresse. '
  '15':
  - type: text
    content: Comme vous le savez, Philippiens, dans les premiers temps de mon activité pour la cause de l’Evangile, lorsque j’ai quitté la Macédoine
  - type: note
    content: Voir note 2 Co 1.16.
  - type: text
    content: ', aucune autre Eglise n’est entrée avec moi dans un échange réciproque de dons matériels et spirituels'
  - type: note
    content: Paul utilise une expression du langage commercial désignant un compte de profits et pertes.
  - type: text
    content: . Vous seuls l’avez fait.
  '16':
  - type: text
    content: Pendant mon séjour à Thessalonique, vous m’avez envoyé, par deux fois, des dons pour subvenir à mes besoins.
  '17':
  - type: text
    content: Ce n’est pas que je tienne à recevoir des dons ; ce qui m’intéresse, c’est qu’un plus grand nombre de fruits soit porté à votre actif.
  '18':
  - type: text
    content: J’atteste par cette lettre avoir reçu tous vos dons, et je suis dans l’abondance. Depuis qu’Epaphrodite me les a remis, je suis comblé. Ils ont été pour moi comme le doux parfum d’une offrande agréée par Dieu et qui lui fait plaisir.
  '19':
  - type: text
    content: 'Aussi, mon Dieu subviendra pleinement à tous vos besoins ; il le fera, selon sa glorieuse richesse qui se manifeste en Jésus-Christ. '
  '2':
  - type: text
    content: Je recommande à Evodie et à Syntyche
  - type: note
    content: Deux anciennes collaboratrices de Paul opposées maintenant par un différend suffisamment grave pour qu’il soit parvenu aux oreilles de l’apôtre.
  - type: text
    content: ' de vivre en parfaite harmonie, l’une avec l’autre, selon le Seigneur ; je les y invite instamment.'
  '20':
  - type: text
    content: A notre Dieu et Père soit la gloire dans tous les siècles ! Amen !
  - type: heading
    content: Salutations
  '21':
  - type: text
    content: Saluez tous ceux qui, par leur union avec Jésus-Christ, font partie du peuple saint.
  - type: text
    content: 'Les frères qui sont ici avec moi vous saluent. '
  '22':
  - type: text
    content: Tous les membres du peuple saint vous adressent leurs salutations, et en particulier ceux qui sont au service de l’empereur.
  '23':
  - type: text
    content: Que la grâce du Seigneur Jésus-Christ soit avec vous.
  '3':
  - type: text
    content: Toi, mon fidèle collègue
  - type: note
    content: Paul s’adresse sans doute à l’un des responsables de l’Eglise. Peut-être le mot susugos traduit par collègue est-il le nom d’un responsable. L’apôtre jouerait ainsi sur le sens de ce nom (comme il l’a fait dans Phm 11).
  - type: text
    content: ', je te le demande : viens-leur en aide, car elles ont combattu à mes côtés pour la cause de l’Evangile, tout comme Clément et mes autres collaborateurs dont les noms sont inscrits dans le livre de vie'
  - type: note
    content: Voir Ap 3.5.
  - type: text
    content: .
  '4':
  - type: text
    content: 'Réjouissez-vous en tout temps de tout ce que le Seigneur est pour vous. Oui, je le répète, soyez dans la joie. '
  '5':
  - type: text
    content: 'Faites-vous connaître par votre amabilité envers tous les hommes. Le Seigneur est proche. '
  '6':
  - type: text
    content: Ne vous mettez en souci pour rien, mais, en toute chose, exposez vos demandes à Dieu en lui adressant vos prières et vos supplications, tout en lui exprimant votre reconnaissance.
  '7':
  - type: text
    content: Alors la paix de Dieu, qui surpasse tout ce qu’on peut concevoir, gardera votre cœur et votre pensée sous la protection de Jésus-Christ.
  '8':
  - type: text
    content: Enfin, frères et sœurs, nourrissez vos pensées
  - type: note
    content: 'Autre traduction : tenez compte de.'
  - type: text
    content: ' de tout ce qui est vrai, noble, juste, pur, digne d’amour ou d’approbation, de tout ce qui est vertueux et mérite louange.'
  '9':
  - type: text
    content: Ce que vous avez appris et reçu de moi, ce que vous m’avez entendu dire et vu faire, mettez-le en pratique. Alors le Dieu qui donne la paix sera avec vous.
  - type: heading
    content: Reconnaissance de Paul
