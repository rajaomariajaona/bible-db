document_id: MRK.10,21
type_code: fra
verses:
  '1':
  - type: heading
    content: Ministère de Jésus en Judée et à Jérusalem
  - type: heading
    content: Controverse sur le divorce
  - type: heading
    content: (Mt 19.1-12)
  - type: text
    content: Jésus partit de là pour se rendre dans la partie de la Judée située de l’autre côté du Jourdain. De nouveau, les foules se rassemblèrent autour de lui et, selon son habitude, il se mit à les enseigner.
  '10':
  - type: text
    content: 'De retour à la maison, les disciples l’interrogèrent à nouveau sur ce sujet. '
  '11':
  - type: text
    content: 'Il leur dit : '
  - type: text
    content: Celui qui divorce et se remarie commet un adultère à l’égard de sa première femme.
  - type: text
    content: ' '
  '12':
  - type: text
    content: Et si une femme divorce et se remarie, elle commet un adultère.
  - type: heading
    content: Jésus accueille des enfants
  - type: heading
    content: (Mt 19.13-15 ; Lc 18.15-17)
  '13':
  - type: text
    content: Des gens amenèrent à Jésus de petits enfants pour qu’il pose les mains sur eux, mais les disciples leur firent des reproches.
  '14':
  - type: text
    content: Jésus le vit, et s’en indigna.
  - type: text
    content: '– Laissez donc les petits enfants venir à moi, ne les en empêchez pas, car le '
  - type: text
    content: royaume de Dieu
  - type: text
    content: ' appartient à ceux qui leur ressemblent.'
  - type: text
    content: ' '
  '15':
  - type: text
    content: 'Vraiment, je vous l’assure : celui qui ne reçoit pas le royaume de Dieu comme un petit enfant, n’y entrera pas.'
  '16':
  - type: text
    content: Là-dessus, il prit les enfants dans ses bras, posa les mains sur eux et les bénit.
  - type: heading
    content: Les riches et le royaume
  - type: heading
    content: (Mt 19.16-30 ; Lc 18.18-30)
  '17':
  - type: text
    content: 'Comme il partait, un homme accourut, se jeta à genoux devant lui et lui demanda : Bon Maître, que dois-je faire pour obtenir la vie éternelle ?'
  '18':
  - type: text
    content: ' '
  - type: text
    content: – Pourquoi m’appelles-tu bon ?
  - type: text
    content: ' lui répondit Jésus. '
  - type: text
    content: Personne n’est bon, sinon Dieu seul.
  - type: text
    content: ' '
  '19':
  - type: text
    content: 'Tu connais les commandements : '
  - type: text
    content: Ne commets pas de meurtre ; ne commets pas d’adultère ; ne commets pas de vol ; ne porte pas de faux témoignage ; ne fais de tort à personne ; honore ton père et ta mère
  - type: note
    content: Ex 20.12-16 ; Dt 5.16-20.
  - type: text
    content: .
  '2':
  - type: text
    content: 'Des pharisiens s’approchèrent et lui posèrent une question : Un homme a-t-il le droit de divorcer d’avec sa femme ?'
  - type: text
    content: Ils voulaient par là lui tendre un piège.
  '20':
  - type: text
    content: – Maître, répondit l’homme, tout cela je l’ai appliqué depuis ma jeunesse.
  '21':
  - type: text
    content: 'Jésus posa sur cet homme un regard plein d’amour et lui dit : '
  - type: text
    content: 'Il ne te manque qu’une chose : va, vends tout ce que tu possèdes, donne le produit de la vente aux pauvres et tu auras un trésor dans le ciel. Puis viens et suis-moi !'
  '22':
  - type: text
    content: En entendant ces paroles, l’homme s’assombrit et s’en alla tout triste, car il était très riche.
  '23':
  - type: text
    content: 'Jésus parcourut du regard le cercle de ses disciples, puis il leur dit : '
  - type: text
    content: 'Qu’il est difficile à ceux qui ont des richesses d’entrer dans le '
  - type: text
    content: royaume de Dieu
  - type: text
    content: '  !'
  '24':
  - type: text
    content: 'Cette parole les surprit, mais Jésus insista : '
  - type: text
    content: Oui, mes enfants, qu’il est difficile
  - type: note
    content: 'Certains manuscrits ajoutent : à ceux qui se confient dans les richesses.'
  - type: text
    content: ' '
  - type: text
    content: d’entrer dans le royaume de Dieu.
  - type: text
    content: ' '
  '25':
  - type: text
    content: Il est plus facile à un chameau de passer par le trou d’une aiguille qu’à un riche d’entrer dans le royaume de Dieu !
  '26':
  - type: text
    content: 'Les disciples furent encore plus étonnés, et ils se demandaient entre eux : Mais alors, qui peut être sauvé ?'
  '27':
  - type: text
    content: 'Jésus les regarda et leur dit : '
  - type: text
    content: Aux hommes c’est impossible, mais non à Dieu. Car tout est possible à Dieu.
  '28':
  - type: text
    content: 'Alors Pierre lui dit : Nous, nous avons tout quitté pour te suivre.'
  - type: text
    content: 'Jésus répondit : '
  '29':
  - type: text
    content: 'Vraiment, je vous l’assure : si quelqu’un quitte, à cause de moi et de l’Evangile, sa maison, ses frères, ses sœurs, sa mère, son père, ses enfants ou ses terres,'
  - type: text
    content: ' '
  '3':
  - type: text
    content: 'Il leur répondit : '
  - type: text
    content: 'Quel commandement '
  - type: text
    content: Moïse
  - type: text
    content: ' vous a-t-il donné ?'
  '30':
  - type: text
    content: 'il recevra cent fois plus dès à présent : des maisons, des frères, des sœurs, des mères, des enfants, des terres, avec des persécutions ; et, dans le monde à venir, la vie éternelle.'
  - type: text
    content: ' '
  '31':
  - type: text
    content: Mais beaucoup de ceux qui sont maintenant les premiers seront parmi les derniers, et beaucoup de ceux qui sont maintenant les derniers seront parmi les premiers.
  - type: heading
    content: Ce qui attend Jésus à Jérusalem
  - type: heading
    content: (Mt 20.17-19 ; Lc 18.31-34)
  '32':
  - type: text
    content: Ils étaient en route pour monter à Jérusalem. Jésus marchait en tête. L’angoisse s’était emparée des disciples et ceux qui les suivaient étaient dans la crainte.
  - type: text
    content: 'Jésus prit de nouveau les Douze à part, et il se mit à leur dire ce qui allait arriver : '
  '33':
  - type: text
    content: 'Voici, nous montons à Jérusalem. Le '
  - type: text
    content: Fils de l’homme
  - type: text
    content: ' y sera livré aux chefs des '
  - type: text
    content: prêtres
  - type: text
    content: ' et aux '
  - type: text
    content: spécialistes de la Loi
  - type: text
    content: . Ils le condamneront à mort et le remettront entre les mains des païens.
  - type: text
    content: ' '
  '34':
  - type: text
    content: Ils se moqueront de lui, lui cracheront au visage, le battront à coups de fouet et le mettront à mort. Puis, au bout de trois jours, il ressuscitera.
  - type: heading
    content: Grandeur et service
  - type: heading
    content: (Mt 20.20-28 ; Lc 22.25-27)
  '35':
  - type: text
    content: 'Alors Jacques et Jean, les fils de Zébédée, s’approchèrent de Jésus et lui dirent : Maître, nous désirons que tu fasses pour nous ce que nous allons te demander.'
  '36':
  - type: text
    content: ' '
  - type: text
    content: – Que désirez-vous que je fasse pour vous ?
  - type: text
    content: ' leur demanda-t-il.'
  '37':
  - type: text
    content: 'Ils répondirent : Accorde-nous de siéger l’un à ta droite et l’autre à ta gauche lorsque tu seras dans la gloire.'
  '38':
  - type: text
    content: 'Mais Jésus leur dit : '
  - type: text
    content: Vous ne vous rendez pas compte de ce que vous demandez ! Pouvez-vous boire la coupe que je vais boire, ou passer par le baptême que j’aurai à subir ?
  '39':
  - type: text
    content: – Oui, lui répondirent-ils, nous le pouvons.
  - type: text
    content: 'Alors Jésus reprit : '
  - type: text
    content: Vous boirez en effet la coupe que je vais boire, et vous subirez le baptême par lequel je vais passer,
  - type: text
    content: ' '
  '4':
  - type: text
    content: '– Moïse, lui dirent-ils, a permis '
  - type: text
    content: de divorcer d’avec sa femme, à condition de lui donner un certificat de divorce
  - type: note
    content: Dt 24.1, 3.
  - type: text
    content: .
  '40':
  - type: text
    content: 'mais quant à siéger à ma droite ou à ma gauche, il ne m’appartient pas de vous l’accorder : ces places reviendront à ceux pour qui elles ont été préparées.'
  '41':
  - type: text
    content: En entendant cela, les dix autres s’indignèrent contre Jacques et Jean.
  '42':
  - type: text
    content: 'Alors Jésus les appela tous auprès de lui et leur dit : '
  - type: text
    content: 'Vous savez ce qui se passe dans les nations : ceux que l’on considère comme les chefs politiques dominent sur leurs peuples et les grands personnages font peser leur autorité sur eux.'
  - type: text
    content: ' '
  '43':
  - type: text
    content: 'Il ne doit pas en être ainsi parmi vous. Au contraire : si quelqu’un veut être grand parmi vous, qu’il soit votre serviteur,'
  - type: text
    content: ' '
  '44':
  - type: text
    content: et si quelqu’un veut être le premier parmi vous, qu’il soit l’esclave de tous.
  - type: text
    content: ' '
  '45':
  - type: text
    content: 'Car le '
  - type: text
    content: Fils de l’homme
  - type: text
    content: ' n’est pas venu pour se faire servir, mais pour servir et donner sa vie en rançon pour beaucoup.'
  - type: heading
    content: La guérison d’un aveugle
  - type: heading
    content: (Mt 20.29-34 ; Lc 18.35-43)
  '46':
  - type: text
    content: Ils arrivèrent à Jéricho. Jésus et ses disciples sortaient de la ville, accompagnés d’une foule nombreuse.
  - type: text
    content: 'Bartimée, fils de Timée, un mendiant aveugle, était assis au bord du chemin. '
  '47':
  - type: text
    content: 'Lorsqu’il entendit que c’était Jésus de Nazareth, il se mit à crier : Jésus, Fils de David, aie pitié de moi !'
  '48':
  - type: text
    content: Mais beaucoup le rabrouaient pour le faire taire.
  - type: text
    content: 'Lui, cependant, criait de plus belle : Fils de David, aie pitié de moi !'
  '49':
  - type: text
    content: 'Jésus s’arrêta et dit : '
  - type: text
    content: Appelez-le !
  - type: text
    content: 'On appela l’aveugle en lui disant : Courage, lève-toi, il t’appelle.'
  '5':
  - type: text
    content: 'Jésus leur répondit : '
  - type: text
    content: C’est à cause de la dureté de votre cœur que Moïse a écrit ce commandement pour vous.
  - type: text
    content: ' '
  '50':
  - type: text
    content: A ces mots, il jeta son manteau, se leva d’un bond et vint vers Jésus.
  '51':
  - type: text
    content: 'Jésus lui dit : '
  - type: text
    content: Que veux-tu que je fasse pour toi ?
  - type: text
    content: – Maître, lui répondit l’aveugle, fais que je puisse voir !
  '52':
  - type: text
    content: ' '
  - type: text
    content: – Va,
  - type: text
    content: ' lui dit Jésus. '
  - type: text
    content: Parce que tu as cru en moi, tu es guéri
  - type: note
    content: 'Autre traduction : ta foi t’a sauvé.'
  - type: text
    content: .
  - type: text
    content: Aussitôt, il recouvra la vue et suivit Jésus sur le chemin.
  '6':
  - type: text
    content: Mais, au commencement de la création, Dieu a créé l’être humain homme et femme
  - type: note
    content: Gn 1.27 et 5.2.
  - type: text
    content: .
  '7':
  - type: text
    content: ' '
  - type: text
    content: C’est pourquoi l’homme laissera son père et sa mère pour s’attacher à sa femme
  - type: text
    content: ' '
  - type: note
    content: L’expression pour s’attacher à sa femme est absente de certains manuscrits.
  - type: text
    content: ','
  - type: text
    content: ' '
  '8':
  - type: text
    content: et les deux ne feront plus qu’un
  - type: note
    content: Gn 2.24.
  - type: text
    content: . Ainsi, ils ne sont plus deux, ils font un.
  - type: text
    content: ' '
  '9':
  - type: text
    content: Que l’homme ne sépare donc pas ce que Dieu a uni.
