document_id: MRK.10,21
type_code: fra
verses:
  '1':
  - type: usfm
    marker: ms1
    children:
    - type: text
      text: Ministère de Jésus en Judée et à Jérusalem
    marker-yv: yv-h
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Controverse sur le divorce
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: (Mt 19.1-12)
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: Jésus partit de là pour se rendre dans la partie de la Judée située de l’autre côté du Jourdain. De nouveau, les foules se rassemblèrent autour de lui et, selon son habitude, il se mit à les enseigner.
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'De retour à la maison, les disciples l’interrogèrent à nouveau sur ce sujet. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'Il leur dit : '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Celui qui divorce et se remarie commet un adultère à l’égard de sa première femme.
    - type: text
      text: ' '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Et si une femme divorce et se remarie, elle commet un adultère.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Jésus accueille des enfants
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: (Mt 19.13-15 ; Lc 18.15-17)
    marker-yv: yv-h
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: Des gens amenèrent à Jésus de petits enfants pour qu’il pose les mains sur eux, mais les disciples leur firent des reproches.
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: Jésus le vit, et s’en indigna.
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: '– Laissez donc les petits enfants venir à moi, ne les en empêchez pas, car le '
      - type: usfm
        marker: w
        children:
        - type: text
          text: royaume de Dieu
      - type: text
        text: ' appartient à ceux qui leur ressemblent.'
    - type: text
      text: ' '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'Vraiment, je vous l’assure : celui qui ne reçoit pas le royaume de Dieu comme un petit enfant, n’y entrera pas.'
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: Là-dessus, il prit les enfants dans ses bras, posa les mains sur eux et les bénit.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Les riches et le royaume
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: (Mt 19.16-30 ; Lc 18.18-30)
    marker-yv: yv-h
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'Comme il partait, un homme accourut, se jeta à genoux devant lui et lui demanda : Bon Maître, que dois-je faire pour obtenir la vie éternelle ?'
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: ' '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: – Pourquoi m’appelles-tu bon ?
    - type: text
      text: ' lui répondit Jésus. '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Personne n’est bon, sinon Dieu seul.
    - type: text
      text: ' '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'Tu connais les commandements : '
      - type: usfm
        marker: qt
        children:
        - type: text
          text: Ne commets pas de meurtre ; ne commets pas d’adultère ; ne commets pas de vol ; ne porte pas de faux témoignage ; ne fais de tort à personne ; honore ton père et ta mère
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '10.19 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Ex 20.12-16 ; Dt 5.16-20.
      marker-yv: yv-n
    - type: usfm
      marker: wj
      children:
      - type: usfm
        marker: qt
        children:
        - type: text
          text: .
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'Des pharisiens s’approchèrent et lui posèrent une question : Un homme a-t-il le droit de divorcer d’avec sa femme ?'
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ils voulaient par là lui tendre un piège.
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: – Maître, répondit l’homme, tout cela je l’ai appliqué depuis ma jeunesse.
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: 'Jésus posa sur cet homme un regard plein d’amour et lui dit : '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'Il ne te manque qu’une chose : va, vends tout ce que tu possèdes, donne le produit de la vente aux pauvres et tu auras un trésor dans le ciel. Puis viens et suis-moi !'
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: En entendant ces paroles, l’homme s’assombrit et s’en alla tout triste, car il était très riche.
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: 'Jésus parcourut du regard le cercle de ses disciples, puis il leur dit : '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'Qu’il est difficile à ceux qui ont des richesses d’entrer dans le '
      - type: usfm
        marker: w
        children:
        - type: text
          text: royaume de Dieu
      - type: text
        text: '  !'
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: 'Cette parole les surprit, mais Jésus insista : '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Oui, mes enfants, qu’il est difficile
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '10.24 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Certains manuscrits ajoutent : '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: à ceux qui se confient dans les richesses.
      marker-yv: yv-n
    - type: text
      text: ' '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: d’entrer dans le royaume de Dieu.
    - type: text
      text: ' '
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Il est plus facile à un chameau de passer par le trou d’une aiguille qu’à un riche d’entrer dans le royaume de Dieu !
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: 'Les disciples furent encore plus étonnés, et ils se demandaient entre eux : Mais alors, qui peut être sauvé ?'
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: 'Jésus les regarda et leur dit : '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Aux hommes c’est impossible, mais non à Dieu. Car tout est possible à Dieu.
  '28':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: 'Alors Pierre lui dit : Nous, nous avons tout quitté pour te suivre.'
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Jésus répondit : '
  '29':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'Vraiment, je vous l’assure : si quelqu’un quitte, à cause de moi et de l’Evangile, sa maison, ses frères, ses sœurs, sa mère, son père, ses enfants ou ses terres,'
    - type: text
      text: ' '
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'Il leur répondit : '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'Quel commandement '
      - type: usfm
        marker: w
        children:
        - type: text
          text: Moïse
      - type: text
        text: ' vous a-t-il donné ?'
  '30':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '30'
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'il recevra cent fois plus dès à présent : des maisons, des frères, des sœurs, des mères, des enfants, des terres, avec des persécutions ; et, dans le monde à venir, la vie éternelle.'
    - type: text
      text: ' '
  '31':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '31'
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Mais beaucoup de ceux qui sont maintenant les premiers seront parmi les derniers, et beaucoup de ceux qui sont maintenant les derniers seront parmi les premiers.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ce qui attend Jésus à Jérusalem
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: (Mt 20.17-19 ; Lc 18.31-34)
    marker-yv: yv-h
  '32':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '32'
    - type: text
      text: Ils étaient en route pour monter à Jérusalem. Jésus marchait en tête. L’angoisse s’était emparée des disciples et ceux qui les suivaient étaient dans la crainte.
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Jésus prit de nouveau les Douze à part, et il se mit à leur dire ce qui allait arriver : '
  '33':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '33'
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'Voici, nous montons à Jérusalem. Le '
      - type: usfm
        marker: w
        children:
        - type: text
          text: Fils de l’homme
      - type: text
        text: ' y sera livré aux chefs des '
      - type: usfm
        marker: w
        children:
        - type: text
          text: prêtres
      - type: text
        text: ' et aux '
      - type: usfm
        marker: w
        children:
        - type: text
          text: spécialistes de la Loi
      - type: text
        text: . Ils le condamneront à mort et le remettront entre les mains des païens.
    - type: text
      text: ' '
  '34':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '34'
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Ils se moqueront de lui, lui cracheront au visage, le battront à coups de fouet et le mettront à mort. Puis, au bout de trois jours, il ressuscitera.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Grandeur et service
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: (Mt 20.20-28 ; Lc 22.25-27)
    marker-yv: yv-h
  '35':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '35'
    - type: text
      text: 'Alors Jacques et Jean, les fils de Zébédée, s’approchèrent de Jésus et lui dirent : Maître, nous désirons que tu fasses pour nous ce que nous allons te demander.'
  '36':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '36'
    - type: text
      text: ' '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: – Que désirez-vous que je fasse pour vous ?
    - type: text
      text: ' leur demanda-t-il.'
  '37':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '37'
    - type: text
      text: 'Ils répondirent : Accorde-nous de siéger l’un à ta droite et l’autre à ta gauche lorsque tu seras dans la gloire.'
  '38':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '38'
    - type: text
      text: 'Mais Jésus leur dit : '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Vous ne vous rendez pas compte de ce que vous demandez ! Pouvez-vous boire la coupe que je vais boire, ou passer par le baptême que j’aurai à subir ?
  '39':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '39'
    - type: text
      text: – Oui, lui répondirent-ils, nous le pouvons.
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Alors Jésus reprit : '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Vous boirez en effet la coupe que je vais boire, et vous subirez le baptême par lequel je vais passer,
    - type: text
      text: ' '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: '– Moïse, lui dirent-ils, a permis '
    - type: usfm
      marker: qt
      children:
      - type: text
        text: de divorcer d’avec sa femme, à condition de lui donner un certificat de divorce
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '10.4 '
      - type: usfm
        marker: ft
        children:
        - type: usfm
          marker: ref
          children:
          - type: text
            text: Dt 24.1
        - type: text
          text: ', '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: '3'
        - type: text
          text: .
      marker-yv: yv-n
    - type: usfm
      marker: qt
      children:
      - type: text
        text: .
  '40':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '40'
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'mais quant à siéger à ma droite ou à ma gauche, il ne m’appartient pas de vous l’accorder : ces places reviendront à ceux pour qui elles ont été préparées.'
  '41':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '41'
    - type: text
      text: En entendant cela, les dix autres s’indignèrent contre Jacques et Jean.
  '42':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '42'
    - type: text
      text: 'Alors Jésus les appela tous auprès de lui et leur dit : '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'Vous savez ce qui se passe dans les nations : ceux que l’on considère comme les chefs politiques dominent sur leurs peuples et les grands personnages font peser leur autorité sur eux.'
    - type: text
      text: ' '
  '43':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '43'
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'Il ne doit pas en être ainsi parmi vous. Au contraire : si quelqu’un veut être grand parmi vous, qu’il soit votre serviteur,'
    - type: text
      text: ' '
  '44':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '44'
    - type: usfm
      marker: wj
      children:
      - type: text
        text: et si quelqu’un veut être le premier parmi vous, qu’il soit l’esclave de tous.
    - type: text
      text: ' '
  '45':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '45'
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'Car le '
      - type: usfm
        marker: w
        children:
        - type: text
          text: Fils de l’homme
      - type: text
        text: ' n’est pas venu pour se faire servir, mais pour servir et donner sa vie en rançon pour beaucoup.'
  - type: usfm
    marker: s1
    children:
    - type: text
      text: La guérison d’un aveugle
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: (Mt 20.29-34 ; Lc 18.35-43)
    marker-yv: yv-h
  '46':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '46'
    - type: text
      text: Ils arrivèrent à Jéricho. Jésus et ses disciples sortaient de la ville, accompagnés d’une foule nombreuse.
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Bartimée, fils de Timée, un mendiant aveugle, était assis au bord du chemin. '
  '47':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '47'
    - type: text
      text: 'Lorsqu’il entendit que c’était Jésus de Nazareth, il se mit à crier : Jésus, Fils de David, aie pitié de moi !'
  '48':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '48'
    - type: text
      text: Mais beaucoup le rabrouaient pour le faire taire.
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Lui, cependant, criait de plus belle : Fils de David, aie pitié de moi !'
  '49':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '49'
    - type: text
      text: 'Jésus s’arrêta et dit : '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Appelez-le !
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'On appela l’aveugle en lui disant : Courage, lève-toi, il t’appelle.'
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'Jésus leur répondit : '
    - type: usfm
