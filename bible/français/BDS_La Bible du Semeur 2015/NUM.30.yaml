document_id: NUM.30,21
type_code: fra
verses:
  '1':
  - type: heading
    content: La loi sur les vœux
  - type: text
    content: Moïse communiqua aux Israélites tout ce que l’Eternel lui avait ordonné.
  '10':
  - type: text
    content: 'Mais une femme veuve ou divorcée reste liée, elle, par ses vœux et par tout engagement qu’elle a pris. '
  '11':
  - type: text
    content: 'Si une femme mariée fait un vœu ou prend un engagement par serment, '
  '12':
  - type: text
    content: 'et si son mari, après en avoir été informé, n’y a pas fait d’objection et ne l’a pas désapprouvée, elle reste liée par ses vœux et engagements. '
  '13':
  - type: text
    content: 'Si, toutefois, il les annule le jour où il en est informé, tout ce qu’elle aura prononcé, en fait de vœux ou d’engagements, sera sans valeur. Puisque son mari les a annulés, l’Eternel ne lui tiendra pas rigueur d’avoir manqué à sa parole. '
  '14':
  - type: text
    content: 'Son mari peut donc ratifier ou annuler tout vœu ou tout serment par lequel elle s’impose de renoncer à quelque chose. '
  '15':
  - type: text
    content: 'S’il n’oppose aucune objection jusqu’au lendemain, sa femme est alors liée par tous les vœux ou les engagements qu’elle a pris, car il les ratifie en ne lui disant rien le jour où il en a été informé. '
  '16':
  - type: text
    content: S’il décide de les annuler après le jour où il en a eu connaissance, c’est lui qui portera la responsabilité de la faute de sa femme.
  '17':
  - type: text
    content: Telles sont les lois que l’Eternel a prescrites à Moïse sur les relations entre un homme et sa femme, ainsi qu’entre un père et sa fille, tant qu’elle est chez son père, durant sa jeunesse.
  '2':
  - type: text
    content: 'Il parla aux chefs des tribus d’Israël en disant : Voici ce que l’Eternel a ordonné : '
  '3':
  - type: text
    content: Si un homme fait un vœu à l’Eternel, ou s’il prend certains engagements par serment, il ne violera pas sa parole ; il agira conformément à ce qu’il a dit
  - type: note
    content: Voir Dt 23.22-24 ; Mt 5.33.
  - type: text
    content: '. '
  '4':
  - type: text
    content: 'Si une jeune fille fait un vœu à l’Eternel en prenant un certain engagement pendant qu’elle habite encore chez son père, '
  '5':
  - type: text
    content: 'et que son père, après en avoir été informé, n’y objecte pas, ces vœux et ces engagements seront valables. '
  '6':
  - type: text
    content: Mais si son père la désapprouve le jour où il en est informé, aucun de ses vœux et de ses engagements qu’elle se sera imposés ne sera valide ; il ne lui sera pas tenu rigueur d’avoir manqué à sa parole puisque son père a annulé ses vœux.
  '7':
  - type: text
    content: 'Supposons qu’une jeune fille ait fait un vœu ou se soit engagée verbalement, et qu’ensuite elle vienne à se marier. '
  '8':
  - type: text
    content: 'Si son mari en est informé et n’y objecte pas le jour où il l’apprend, ses vœux et ses engagements seront valides. '
  '9':
  - type: text
    content: Mais si, ce jour-là, il la désapprouve et annule le vœu qu’elle a fait et l’engagement qu’elle a pris, l’Eternel ne lui tiendra pas rigueur d’avoir manqué à sa parole.
