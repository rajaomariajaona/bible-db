document_id: NUM.30
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: La loi sur les vœux
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Moïse communiqua aux Israélites tout ce que l’Eternel lui avait ordonné.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Il parla aux chefs des tribus d’Israël en disant : Voici ce que l’Eternel a ordonné : '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Si un homme fait un vœu à l’Eternel, ou s’il prend certains engagements par serment, il ne violera pas sa parole ; il agira conformément à ce qu’il a dit
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '30.3 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Voir Dt 23.22-24 ; Mt 5.33.
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Si une jeune fille fait un vœu à l’Eternel en prenant un certain engagement pendant qu’elle habite encore chez son père, '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'et que son père, après en avoir été informé, n’y objecte pas, ces vœux et ces engagements seront valables. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Mais si son père la désapprouve le jour où il en est informé, aucun de ses vœux et de ses engagements qu’elle se sera imposés ne sera valide ; il ne lui sera pas tenu rigueur d’avoir manqué à sa parole puisque son père a annulé ses vœux.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Supposons qu’une jeune fille ait fait un vœu ou se soit engagée verbalement, et qu’ensuite elle vienne à se marier. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Si son mari en est informé et n’y objecte pas le jour où il l’apprend, ses vœux et ses engagements seront valides. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Mais si, ce jour-là, il la désapprouve et annule le vœu qu’elle a fait et l’engagement qu’elle a pris, l’Eternel ne lui tiendra pas rigueur d’avoir manqué à sa parole.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Mais une femme veuve ou divorcée reste liée, elle, par ses vœux et par tout engagement qu’elle a pris. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Si une femme mariée fait un vœu ou prend un engagement par serment, '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'et si son mari, après en avoir été informé, n’y a pas fait d’objection et ne l’a pas désapprouvée, elle reste liée par ses vœux et engagements. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Si, toutefois, il les annule le jour où il en est informé, tout ce qu’elle aura prononcé, en fait de vœux ou d’engagements, sera sans valeur. Puisque son mari les a annulés, l’Eternel ne lui tiendra pas rigueur d’avoir manqué à sa parole. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Son mari peut donc ratifier ou annuler tout vœu ou tout serment par lequel elle s’impose de renoncer à quelque chose. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'S’il n’oppose aucune objection jusqu’au lendemain, sa femme est alors liée par tous les vœux ou les engagements qu’elle a pris, car il les ratifie en ne lui disant rien le jour où il en a été informé. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: S’il décide de les annuler après le jour où il en a eu connaissance, c’est lui qui portera la responsabilité de la faute de sa femme.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Telles sont les lois que l’Eternel a prescrites à Moïse sur les relations entre un homme et sa femme, ainsi qu’entre un père et sa fille, tant qu’elle est chez son père, durant sa jeunesse.
