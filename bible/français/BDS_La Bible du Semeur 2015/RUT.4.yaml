document_id: RUT.4
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Le mariage de Ruth et de Booz
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Booz se rendit à la porte de la ville, et il y prit place. Quand le plus proche parent, dont il avait parlé et qui avait le devoir de s’occuper de Ruth vint à passer, Booz lui dit : Un tel ! Viens donc t’asseoir ici !'
- type: usfm
  marker: p
  children:
  - type: text
    text: 'L’homme s’approcha et s’assit. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Booz fit approcher dix hommes parmi les responsables de la ville et leur demanda de s’asseoir avec eux
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '4.2 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Les responsables d’une ville faisaient aussi fonction de juges (Dt 21.19 ; 22.15 ; 25.7). Ici, ils seront surtout témoins de la transaction entre Booz et son parent.
    marker-yv: yv-n
  - type: text
    text: '. Lorsqu’ils se furent installés, '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'il s’adressa ainsi au plus proche parent : Noémi, qui est revenue du pays de Moab, met en vente le champ d’Elimélek, notre parent. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: J’ai pensé t’en informer et te proposer de le racheter par-devant les habitants de la ville et les responsables de mon peuple ici présents. Si tu veux exercer ton droit de rachat, fais-le. Sinon, déclare-le-moi, que je le sache, car tu viens en premier lieu pour disposer du droit de rachat, et je viens directement après toi.
- type: usfm
  marker: p
  children:
  - type: text
    text: 'L’homme lui répondit : Oui, je veux le racheter.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Booz poursuivit : Si tu acquiers le champ de la main de Noémi, tu prendras pour femme Ruth'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '4.5 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'D’après la version syriaque et la Vulgate. Le texte hébreu traditionnel a : '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: et de Ruth…
    marker-yv: yv-n
  - type: text
    text: ' la Moabite, la veuve du défunt, pour donner au défunt une descendance qui héritera de son patrimoine.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: – Dans ces conditions, dit le plus proche parent, je ne peux pas racheter pour mon compte, car je ferais tort à mon propre patrimoine. Reprends donc à ton compte mon droit de rachat, car je ne puis en profiter moi-même.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Autrefois, en Israël, lorsqu’on procédait à un rachat ou à un échange de biens, la coutume voulait que l’un des contractants ôte sa sandale et la donne à l’autre pour valider la transaction
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '4.7 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Dans les pays orientaux, la sandale est symbole de possession (voir '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ps 60.10
        metadata:
          usfm: PSA.60.10
      - type: text
        text: ). Conférer un droit ou une propriété à quelqu’un était souligné par le geste symbolique du don d’une sandale (voir Am 2.6 ; 8.6).
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Ainsi, l’homme qui avait le droit de rachat dit à Booz : « Acquiers le champ », et il retira sa sandale'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '4.8 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'L’ancienne version grecque a : '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: et la lui donna.
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Alors Booz déclara aux responsables et à tous ceux qui étaient là : Vous êtes témoins aujourd’hui que j’ai acquis de la main de Noémi tout ce qui appartenait à Elimélek et tout ce qui était à Kilyôn et à Mahlôn. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: De ce fait, je prends aussi pour femme Ruth la Moabite, la veuve de Mahlôn, pour susciter au défunt une descendance qui recevra son héritage et pour que son nom ne disparaisse pas dans son lignage et dans sa ville natale. Vous en êtes témoins aujourd’hui.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Alors tous ceux qui se trouvaient à la porte et tous les responsables dirent : Oui : nous en sommes témoins ! Que l’Eternel rende la femme qui entre dans ta famille semblable à Rachel et à Léa'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '4.11 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Rachel et Léa ont donné naissance à tout le peuple d’Israël. Ainsi Ruth donnera naissance à la lignée de David, et donc du Messie.
    marker-yv: yv-n
  - type: text
    text: ' qui, à elles deux, ont donné naissance à tout le peuple d’Israël ! Puisses-tu toi-même prospérer à Ephrata et devenir célèbre à Bethléhem ! '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Que l’Eternel t’accorde, par cette jeune femme, une descendance aussi nombreuse que celle de Pérets, le fils que Tamar a donné à Juda
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '4.12 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Pérets '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: était un ancêtre de Booz (voir 18-21 ; Mt 1.3 ; Lc 3.33).
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: s1
  children:
  - type: text
    text: Un petit-fils pour Noémi
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: C’est ainsi que Booz prit Ruth pour femme.
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Lorsqu’il se fut uni à elle, l’Eternel accorda à Ruth de devenir enceinte, et elle donna naissance à un fils. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Les femmes de Bethléhem dirent à Noémi : Béni soit l’Eternel qui ne t’a pas privée d’un soutien de famille ! Que son nom devienne célèbre en Israël ! '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Il te rendra une raison de vivre et prendra soin de toi dans tes vieux jours, puisque c’est ta belle-fille qui t’aime qui t’a donné ce petit-fils. Elle vaut mieux pour toi que sept fils.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Noémi prit le nouveau-né et le serra sur son cœur. C’est elle qui se chargea de l’élever. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Les voisines s’écrièrent : Noémi a eu un fils !'
- type: usfm
  marker: p
  children:
  - type: text
    text: Et elles lui donnèrent le nom d’Obed.
- type: usfm
  marker: p
  children:
  - type: text
    text: Obed fut le père d’Isaï et le grand-père de David.
- type: usfm
  marker: s1
  children:
  - type: text
    text: La liste généalogique de Pérets
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Voici la liste généalogique de Pérets : Pérets eut pour fils Hetsrôn, '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'qui eut pour fils Ram, qui eut pour fils Amminadab, '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: qui eut pour fils Nahshôn, qui eut pour fils Salma
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '4.20 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'D’après quelques manuscrits hébreux, la Vulgate et '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1 Ch 2.11
        metadata:
          usfm: 1CH.2.11
      - type: text
        text: '. Le texte hébreu traditionnel a : '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: Salmôn.
    marker-yv: yv-n
  - type: text
    text: ', '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'qui eut pour fils Booz, qui eut pour fils Obed, '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: qui eut pour fils Isaï, qui eut pour fils David.
