document_id: RUT.4,21
type_code: fra
verses:
  '1':
  - type: heading
    content: Le mariage de Ruth et de Booz
  - type: text
    content: 'Booz se rendit à la porte de la ville, et il y prit place. Quand le plus proche parent, dont il avait parlé et qui avait le devoir de s’occuper de Ruth vint à passer, Booz lui dit : Un tel ! Viens donc t’asseoir ici !'
  - type: text
    content: 'L’homme s’approcha et s’assit. '
  '10':
  - type: text
    content: De ce fait, je prends aussi pour femme Ruth la Moabite, la veuve de Mahlôn, pour susciter au défunt une descendance qui recevra son héritage et pour que son nom ne disparaisse pas dans son lignage et dans sa ville natale. Vous en êtes témoins aujourd’hui.
  '11':
  - type: text
    content: 'Alors tous ceux qui se trouvaient à la porte et tous les responsables dirent : Oui : nous en sommes témoins ! Que l’Eternel rende la femme qui entre dans ta famille semblable à Rachel et à Léa'
  - type: note
    content: Rachel et Léa ont donné naissance à tout le peuple d’Israël. Ainsi Ruth donnera naissance à la lignée de David, et donc du Messie.
  - type: text
    content: ' qui, à elles deux, ont donné naissance à tout le peuple d’Israël ! Puisses-tu toi-même prospérer à Ephrata et devenir célèbre à Bethléhem ! '
  '12':
  - type: text
    content: Que l’Eternel t’accorde, par cette jeune femme, une descendance aussi nombreuse que celle de Pérets, le fils que Tamar a donné à Juda
  - type: note
    content: Pérets était un ancêtre de Booz (voir 18-21 ; Mt 1.3 ; Lc 3.33).
  - type: text
    content: .
  - type: heading
    content: Un petit-fils pour Noémi
  '13':
  - type: text
    content: C’est ainsi que Booz prit Ruth pour femme.
  - type: text
    content: 'Lorsqu’il se fut uni à elle, l’Eternel accorda à Ruth de devenir enceinte, et elle donna naissance à un fils. '
  '14':
  - type: text
    content: 'Les femmes de Bethléhem dirent à Noémi : Béni soit l’Eternel qui ne t’a pas privée d’un soutien de famille ! Que son nom devienne célèbre en Israël ! '
  '15':
  - type: text
    content: Il te rendra une raison de vivre et prendra soin de toi dans tes vieux jours, puisque c’est ta belle-fille qui t’aime qui t’a donné ce petit-fils. Elle vaut mieux pour toi que sept fils.
  '16':
  - type: text
    content: 'Noémi prit le nouveau-né et le serra sur son cœur. C’est elle qui se chargea de l’élever. '
  '17':
  - type: text
    content: 'Les voisines s’écrièrent : Noémi a eu un fils !'
  - type: text
    content: Et elles lui donnèrent le nom d’Obed.
  - type: text
    content: Obed fut le père d’Isaï et le grand-père de David.
  - type: heading
    content: La liste généalogique de Pérets
  '18':
  - type: text
    content: 'Voici la liste généalogique de Pérets : Pérets eut pour fils Hetsrôn, '
  '19':
  - type: text
    content: 'qui eut pour fils Ram, qui eut pour fils Amminadab, '
  '2':
  - type: text
    content: Booz fit approcher dix hommes parmi les responsables de la ville et leur demanda de s’asseoir avec eux
  - type: note
    content: Les responsables d’une ville faisaient aussi fonction de juges (Dt 21.19 ; 22.15 ; 25.7). Ici, ils seront surtout témoins de la transaction entre Booz et son parent.
  - type: text
    content: '. Lorsqu’ils se furent installés, '
  '20':
  - type: text
    content: qui eut pour fils Nahshôn, qui eut pour fils Salma
  - type: note
    content: 'D’après quelques manuscrits hébreux, la Vulgate et 1 Ch 2.11. Le texte hébreu traditionnel a : Salmôn.'
  - type: text
    content: ', '
  '21':
  - type: text
    content: 'qui eut pour fils Booz, qui eut pour fils Obed, '
  '22':
  - type: text
    content: qui eut pour fils Isaï, qui eut pour fils David.
  '3':
  - type: text
    content: 'il s’adressa ainsi au plus proche parent : Noémi, qui est revenue du pays de Moab, met en vente le champ d’Elimélek, notre parent. '
  '4':
  - type: text
    content: J’ai pensé t’en informer et te proposer de le racheter par-devant les habitants de la ville et les responsables de mon peuple ici présents. Si tu veux exercer ton droit de rachat, fais-le. Sinon, déclare-le-moi, que je le sache, car tu viens en premier lieu pour disposer du droit de rachat, et je viens directement après toi.
  - type: text
    content: 'L’homme lui répondit : Oui, je veux le racheter.'
  '5':
  - type: text
    content: 'Booz poursuivit : Si tu acquiers le champ de la main de Noémi, tu prendras pour femme Ruth'
  - type: note
    content: 'D’après la version syriaque et la Vulgate. Le texte hébreu traditionnel a : et de Ruth…'
  - type: text
    content: ' la Moabite, la veuve du défunt, pour donner au défunt une descendance qui héritera de son patrimoine.'
  '6':
  - type: text
    content: – Dans ces conditions, dit le plus proche parent, je ne peux pas racheter pour mon compte, car je ferais tort à mon propre patrimoine. Reprends donc à ton compte mon droit de rachat, car je ne puis en profiter moi-même.
  '7':
  - type: text
    content: Autrefois, en Israël, lorsqu’on procédait à un rachat ou à un échange de biens, la coutume voulait que l’un des contractants ôte sa sandale et la donne à l’autre pour valider la transaction
  - type: note
    content: Dans les pays orientaux, la sandale est symbole de possession (voir Ps 60.10). Conférer un droit ou une propriété à quelqu’un était souligné par le geste symbolique du don d’une sandale (voir Am 2.6 ; 8.6).
  - type: text
    content: '. '
  '8':
  - type: text
    content: 'Ainsi, l’homme qui avait le droit de rachat dit à Booz : « Acquiers le champ », et il retira sa sandale'
  - type: note
    content: 'L’ancienne version grecque a : et la lui donna.'
  - type: text
    content: .
  '9':
  - type: text
    content: 'Alors Booz déclara aux responsables et à tous ceux qui étaient là : Vous êtes témoins aujourd’hui que j’ai acquis de la main de Noémi tout ce qui appartenait à Elimélek et tout ce qui était à Kilyôn et à Mahlôn. '
