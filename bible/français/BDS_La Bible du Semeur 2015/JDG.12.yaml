document_id: JDG.12
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Conflit avec Ephraïm
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Les hommes de la tribu d’Ephraïm se rassemblèrent, ils se rendirent à Tsaphôn
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '12.1 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Ville du territoire de Gad, mentionnée à côté de Soukkoth en '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Jos 13.27
        metadata:
          usfm: JOS.13.27
      - type: text
        text: '. On peut aussi traduire : '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: en direction du nord.
    marker-yv: yv-n
  - type: text
    text: ', et ils dirent à Jephté : Pourquoi es-tu allé combattre les Ammonites sans nous avoir appelés pour aller au combat avec toi ? Nous allons brûler ta maison sur toi.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Jephté leur répondit : J’étais engagé, moi et mon peuple, dans un grand conflit avec les Ammonites et lorsque je vous ai appelés à l’aide, vous n’êtes pas venus à mon secours contre eux. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Quand j’ai vu qu’il ne fallait pas compter sur vous, je suis allé seul combattre les Ammonites au risque de ma vie et l’Eternel m’a donné la victoire sur eux. Pourquoi donc venez-vous aujourd’hui m’attaquer ?
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Puis Jephté mobilisa tous les hommes de Galaad et combattit ceux d’Ephraïm qui leur avaient dit : Vous, les gens de Galaad, vous n’êtes que des fuyards d’Ephraïm passés en Manassé.'
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Les hommes de Galaad battirent ceux d’Ephraïm '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'et leur coupèrent la retraite en occupant les gués du Jourdain menant à Ephraïm. Quand l’un des fuyards d’Ephraïm voulait traverser la rivière, les hommes de Galaad lui demandaient s’il venait d’Ephraïm. S’il répondait : « Non », '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'ils lui ordonnaient de prononcer le mot Shibboleth. S’il disait : « Sibboleth », parce qu’il n’arrivait pas à le prononcer comme eux, ils le saisissaient et l’exécutaient près des gués du Jourdain. Quarante-deux mille hommes d’Ephraïm périrent en cette circonstance.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Après avoir été chef en Israël pendant six ans, Jephté de Galaad mourut et fut enterré dans l’une des villes de Galaad
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '12.7 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'L’ancienne version grecque a : '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: en Galaad ; dans sa ville natale.
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ibtsân, Elôn et Abdôn
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Après lui, Ibtsân de Bethléhem
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '12.8 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'La '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'Bethléhem '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: de Zabulon (
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Jos 19.15
        metadata:
          usfm: JOS.19.15
      - type: text
        text: ), près de Nazareth, non celle de Juda.
    marker-yv: yv-n
  - type: text
    text: ' fut chef en Israël. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Il eut trente fils et trente filles qu’il maria avec des filles et des fils étrangers. Après avoir dirigé Israël pendant sept ans, '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: il mourut et fut enterré à Bethléhem.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Après lui, Elôn de Zabulon fut chef en Israël pendant dix ans. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: A sa mort, il fut enterré à Ayalôn dans le territoire de Zabulon.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Après lui, Abdôn, fils de Hillel, de Piratôn, fut chef en Israël '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'pendant huit ans. Il eut quarante fils et trente petits-fils qui montaient soixante-dix ânons. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Lorsqu’il mourut, il fut enterré à Piratôn sur la montagne des Amalécites dans le territoire d’Ephraïm.
