document_id: JDG.12,21
type_code: fra
verses:
  '1':
  - type: heading
    content: Conflit avec Ephraïm
  - type: text
    content: Les hommes de la tribu d’Ephraïm se rassemblèrent, ils se rendirent à Tsaphôn
  - type: note
    content: 'Ville du territoire de Gad, mentionnée à côté de Soukkoth en Jos 13.27. On peut aussi traduire : en direction du nord.'
  - type: text
    content: ', et ils dirent à Jephté : Pourquoi es-tu allé combattre les Ammonites sans nous avoir appelés pour aller au combat avec toi ? Nous allons brûler ta maison sur toi.'
  '10':
  - type: text
    content: il mourut et fut enterré à Bethléhem.
  '11':
  - type: text
    content: 'Après lui, Elôn de Zabulon fut chef en Israël pendant dix ans. '
  '12':
  - type: text
    content: A sa mort, il fut enterré à Ayalôn dans le territoire de Zabulon.
  '13':
  - type: text
    content: 'Après lui, Abdôn, fils de Hillel, de Piratôn, fut chef en Israël '
  '14':
  - type: text
    content: 'pendant huit ans. Il eut quarante fils et trente petits-fils qui montaient soixante-dix ânons. '
  '15':
  - type: text
    content: Lorsqu’il mourut, il fut enterré à Piratôn sur la montagne des Amalécites dans le territoire d’Ephraïm.
  '2':
  - type: text
    content: 'Jephté leur répondit : J’étais engagé, moi et mon peuple, dans un grand conflit avec les Ammonites et lorsque je vous ai appelés à l’aide, vous n’êtes pas venus à mon secours contre eux. '
  '3':
  - type: text
    content: Quand j’ai vu qu’il ne fallait pas compter sur vous, je suis allé seul combattre les Ammonites au risque de ma vie et l’Eternel m’a donné la victoire sur eux. Pourquoi donc venez-vous aujourd’hui m’attaquer ?
  '4':
  - type: text
    content: 'Puis Jephté mobilisa tous les hommes de Galaad et combattit ceux d’Ephraïm qui leur avaient dit : Vous, les gens de Galaad, vous n’êtes que des fuyards d’Ephraïm passés en Manassé.'
  - type: text
    content: 'Les hommes de Galaad battirent ceux d’Ephraïm '
  '5':
  - type: text
    content: 'et leur coupèrent la retraite en occupant les gués du Jourdain menant à Ephraïm. Quand l’un des fuyards d’Ephraïm voulait traverser la rivière, les hommes de Galaad lui demandaient s’il venait d’Ephraïm. S’il répondait : « Non », '
  '6':
  - type: text
    content: 'ils lui ordonnaient de prononcer le mot Shibboleth. S’il disait : « Sibboleth », parce qu’il n’arrivait pas à le prononcer comme eux, ils le saisissaient et l’exécutaient près des gués du Jourdain. Quarante-deux mille hommes d’Ephraïm périrent en cette circonstance.'
  '7':
  - type: text
    content: Après avoir été chef en Israël pendant six ans, Jephté de Galaad mourut et fut enterré dans l’une des villes de Galaad
  - type: note
    content: 'L’ancienne version grecque a : en Galaad ; dans sa ville natale.'
  - type: text
    content: .
  - type: heading
    content: Ibtsân, Elôn et Abdôn
  '8':
  - type: text
    content: Après lui, Ibtsân de Bethléhem
  - type: note
    content: La Bethléhem de Zabulon (Jos 19.15), près de Nazareth, non celle de Juda.
  - type: text
    content: ' fut chef en Israël. '
  '9':
  - type: text
    content: 'Il eut trente fils et trente filles qu’il maria avec des filles et des fils étrangers. Après avoir dirigé Israël pendant sept ans, '
