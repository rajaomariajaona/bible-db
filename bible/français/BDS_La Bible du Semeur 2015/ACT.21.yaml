document_id: ACT.21
type_code: fra
segments:
- type: usfm
  marker: ms1
  children:
  - type: text
    text: Témoins à Rome
  marker-yv: yv-h
- type: usfm
  marker: s1
  children:
  - type: text
    text: Paul et ses compagnons se rendent à Jérusalem
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Après nous être séparés d’eux, nous avons pris la mer et nous avons mis directement le cap sur l’île de Cos, puis le lendemain, nous avons continué sur Rhodes et, de là, vers Patara. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Pendant notre escale, nous avons trouvé un navire en partance pour la Phénicie. Nous nous y sommes embarqués et nous avons pris le large. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Arrivés en vue de Chypre, nous l’avons laissée sur notre gauche et nous avons continué notre route vers la Syrie, pour débarquer à Tyr où le navire devait livrer sa cargaison. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Il y avait là des disciples. Après les avoir trouvés, nous sommes restés sept jours avec eux. Or ceux-ci, poussés par l’Esprit, conseillaient à Paul de ne pas se rendre à Jérusalem.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Malgré cela, une fois cette semaine écoulée, nous sommes partis pour continuer notre voyage. Ils nous ont accompagnés, tous, avec leurs femmes et leurs enfants, à quelque distance de la ville. Là, nous nous sommes agenouillés sur le rivage pour prier. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Puis, après avoir pris congé les uns des autres, nous sommes montés à bord du bateau, et les croyants s’en sont retournés chez eux.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Nous avons terminé notre voyage par mer en allant de Tyr à Ptolémaïs
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '21.7 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: Ptolémaïs
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: ': '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: actuellement St-Jean-d’Acre.
    marker-yv: yv-n
  - type: text
    text: . Dans cette ville, nous avons salué les frères et passé une journée avec eux.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Dès le lendemain, nous sommes repartis par la route pour Césarée
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '21.8 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: Césarée
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: ': '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: port de Judée, résidence habituelle des gouverneurs romains (appelée aujourd’hui Césarée maritime pour la distinguer de Césarée de Philippe près des sources du Jourdain). Césarée était à 56 kilomètres au sud de Ptolémaïs.
    marker-yv: yv-n
  - type: text
    text: . Nous nous sommes rendus à la maison de Philippe
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '21.8 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Voir 6.5 ; 8.5.
    marker-yv: yv-n
  - type: text
    text: ', le prédicateur de l’Evangile – c’était l’un des sept hommes que l’on avait élus à Jérusalem – , et nous avons logé chez lui. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Il avait quatre filles non mariées qui étaient prophétesses. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Nous étions déjà là depuis plusieurs jours, lorsque arriva de Judée un prophète appelé Agabus. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Il vint nous trouver, prit la ceinture de Paul et s’en servit pour s’attacher les pieds et les mains.
- type: usfm
  marker: p
  children:
  - type: text
    text: – Voici ce que déclare l’Esprit Saint, dit-il. L’homme à qui appartient cette ceinture sera attaché de cette manière par les Juifs à Jérusalem, puis ils le livreront entre les mains des non-Juifs.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: En entendant cette déclaration, nous avons supplié Paul, nous et les croyants de Césarée, de ne pas monter à Jérusalem.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Mais il nous répondit : Que faites-vous là ? Voulez-vous me briser le cœur avec vos larmes ? Je suis tout à fait prêt, moi, non seulement à aller en prison, mais même à mourir à Jérusalem pour le Seigneur Jésus.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Comme nous n’arrivions pas à le faire changer d’avis, nous n’avons plus insisté et nous nous sommes contentés de dire : Que la volonté du Seigneur soit faite !'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Après avoir passé ces quelques jours à Césarée, nous avons fait nos préparatifs et nous avons pris le chemin de Jérusalem. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Quelques disciples de Césarée nous ont accompagnés et nous ont emmenés chez un certain Mnason, originaire de Chypre, disciple depuis longtemps déjà, qui allait nous loger.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Paul, juif avec les Juifs
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'A notre arrivée à Jérusalem, les frères nous accueillirent avec joie. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Le lendemain, Paul se rendit avec nous chez Jacques
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '21.18 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Voir note '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '12.17'
        metadata:
          usfm: ACT.12.17
      - type: text
        text: '  ; comparer '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '15.13'
        metadata:
          usfm: ACT.15.13
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: ', où tous les responsables de l’Eglise se rassemblèrent aussi. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Après les avoir salués, Paul exposa en détail tout ce que Dieu avait accompli par son ministère parmi les non-Juifs.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'En l’écoutant, ils louaient Dieu, puis ils dirent à Paul :'
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Vois-tu, frère, combien de milliers de Juifs sont devenus croyants, et tous sont très attachés à la Loi de Moïse. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Or, ils ont entendu dire que tu enseignes à tous les Juifs disséminés à l’étranger d’abandonner les prescriptions de Moïse en leur disant de ne plus faire circoncire leurs enfants et, d’une manière générale, de ne plus suivre les coutumes juives. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: Que faire donc ? Car, naturellement, ils vont apprendre ton arrivée.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Eh bien, voici ce que nous te conseillons : nous avons parmi nous quatre hommes qui ont fait un vœu. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: Prends-les avec toi, participe avec eux à la cérémonie de la purification, et pourvois à leurs dépenses pour qu’ils se fassent raser la tête
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '21.24 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Voir note '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '18.18'
        metadata:
          usfm: ACT.18.18
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: '. Ainsi tout le monde saura que les bruits répandus sur ton compte n’ont aucun fondement, mais qu’au contraire, tu continues toi-même à observer les prescriptions de la Loi. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Quant aux non-Juifs devenus croyants, voici les recommandations que nous leur avons données par lettre à la suite de nos délibérations : qu’ils ne mangent ni viande sacrifiée à des idoles, ni sang, ni viande d’animaux étouffés, et qu’ils s’abstiennent de toute inconduite sexuelle'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '21.25 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Voir note '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '15.20'
        metadata:
          usfm: ACT.15.20
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: Le lendemain donc, Paul emmena ces hommes et participa avec eux à la cérémonie de la purification. Puis il entra dans la cour du Temple où il déclara à quelle date la période de la purification serait achevée, c’est-à-dire à quel moment on offrirait le sacrifice pour chacun d’eux.
- type: usfm
  marker: s1
  children:
  - type: text
    text: L’arrestation de Paul
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'La semaine exigée pour la purification allait s’achever, lorsque des Juifs de la province d’Asie virent Paul dans la cour du Temple. Ils ameutèrent toute la foule et se jetèrent sur lui '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'en criant : Israélites ! Au secours ! Le voilà, celui qui ne cesse de prêcher partout et à tout le monde contre notre peuple, contre la Loi de Moïse et contre ce temple ! Et même, à présent, il a introduit des non-Juifs dans l’enceinte sacrée ; il a souillé ce saint lieu !'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: Ils disaient cela parce qu’ils avaient vu Trophime
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '21.29 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: Trophime
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: ': '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'voir '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '20.4'
        metadata:
          usfm: ACT.20.4
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: ' d’Ephèse en ville avec lui, et ils s’imaginaient que Paul l’avait fait entrer dans la cour intérieure du Temple.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'L’agitation gagna la ville tout entière et le peuple accourut en foule de toutes parts. On s’empara de Paul et on le traîna hors de la cour du Temple dont on ferma immédiatement les portes. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'On cherchait à le mettre à mort, quand le commandant de la garnison romaine fut informé que tout Jérusalem était en effervescence. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'Aussitôt, il rassembla des soldats avec leurs officiers et se précipita vers la foule. Dès qu’on aperçut le commandant et les soldats, on cessa de battre Paul. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: 'Alors le commandant s’approcha, fit saisir Paul et donna ordre de le lier avec une double chaîne, puis il demanda qui il était et ce qu’il avait fait. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: Mais dans la foule, les uns criaient une chose, les autres une autre, et le commandant ne put rien savoir de sûr de ce tumulte. Alors il ordonna de conduire Paul à la forteresse
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '21.34 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'A l’angle nord-ouest de la terrasse du Temple, Hérode le Grand avait fait bâtir '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'la forteresse Antonia, '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: où les troupes romaines étaient cantonnées.
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: 'Quand Paul commença à gravir les marches de l’escalier, les soldats, devant la violence de la foule, se virent obligés de le porter à bras-le-corps. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: 'En effet, tout le peuple le suivait en hurlant : A mort !'
- type: usfm
  marker: s1
  children:
  - type: text
    text: Paul défend sa cause
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: 'Au moment où on allait le faire entrer dans la citadelle, Paul demanda au commandant : M’est-il permis de te dire quelque chose ?'
- type: usfm
  marker: p
  children:
  - type: text
    text: '– Comment, fit l’autre, tu sais le grec ! '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: text
    text: Tu n’es donc pas cet Egyptien qui a provoqué une émeute dernièrement et qui a entraîné quatre mille rebelles au désert ?
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '39'
  - type: text
    text: – Non, répondit Paul, je suis juif, né à Tarse en Cilicie, et citoyen d’une ville assez importante. Je te prie, permets-moi de dire quelques mots au peuple.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '40'
  - type: text
    text: Le commandant lui en accorda la permission.
- type: usfm
  marker: p
  children:
  - type: text
    text: Alors Paul, debout sur les marches, fit signe de la main à la foule. Il se fit un grand silence, et Paul leur adressa la parole en hébreu.
