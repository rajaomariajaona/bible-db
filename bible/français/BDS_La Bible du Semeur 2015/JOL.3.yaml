document_id: JOL.3,21
type_code: fra
verses:
  '1':
  - type: heading
    content: Le jour de l’Eternel à la fin des temps
  - type: heading
    content: L’effusion de l’Esprit
  - type: text
    content: Après cela, ╵moi, je répandrai mon Esprit ╵sur tout le monde.
  - type: text
    content: Vos fils, vos filles prophétiseront.
  - type: text
    content: Vos vieillards, par des songes,
  - type: text
    content: vos jeunes gens, par des visions, ╵recevront des révélations
  - type: note
    content: Les v. 1-5 sont cités en Ac 2.16-21. Pour l’effusion de l’Esprit, voir Es 32.15 ; 44.3 ; Jr 31.33-34 ; Ez 36.26-27 ; 39.29 ; Za 12.10-13.
  - type: text
    content: .
  '2':
  - type: text
    content: Et même sur les serviteurs, ╵sur les servantes,
  - type: text
    content: moi, je répandrai mon Esprit ╵en ces jours-là.
  '3':
  - type: text
    content: Je produirai ╵des signes prodigieux
  - type: text
    content: 'dans le ciel, sur la terre :'
  - type: text
    content: du sang, du feu ╵et des colonnes de fumée.
  '4':
  - type: text
    content: Et le soleil s’obscurcira,
  - type: text
    content: la lune deviendra de sang
  - type: text
    content: avant que vienne ╵le jour de l’Eternel,
  - type: text
    content: ce jour grand et terrible.
  '5':
  - type: text
    content: Alors tous ceux ╵qui invoqueront l’Eternel ╵seront sauvés
  - type: note
    content: Voir Dn 12.1. Cité en Rm 10.13.
  - type: text
    content: '  :'
  - type: text
    content: selon ce qu’a dit l’Eternel
  - type: note
    content: 'selon ce qu’a dit l’Eternel: voir Ab 17 ; Es 37.32.'
  - type: text
    content: ','
  - type: text
    content: il y aura, ╵des rescapés
  - type: text
    content: sur le mont de Sion ╵et à Jérusalem
  - type: note
    content: 'il y aura… Jérusalem. Sens obtenu en adoptant une légère modification du texte hébreu traditionnel et d’après Ab 17 ; Es 37.32. Le texte hébreu traditionnel a : sur le mont Sion, et dans Jérusalem, il y aura des rescapés, selon ce qu’a dit l’Eternel, et parmi les survivants que l’Eternel appellera (la fin du verset n’est pas compréhensible). Au lieu de des rescapés, certains traduisent la délivrance.'
  - type: text
    content: ','
  - type: text
    content: les survivants ╵que l’Eternel appellera
  - type: note
    content: Réminiscence en Ac 2.39.
  - type: text
    content: .
