  - type: usfm
    marker: q1
    children:
    - type: text
      text: il y aura, ╵des rescapés
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sur le mont de Sion ╵et à Jérusalem
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '3.5 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'il y aura… Jérusalem. '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Sens obtenu en adoptant une légère modification du texte hébreu traditionnel et d’après Ab 17 ; Es 37.32. Le texte hébreu traditionnel a : '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'sur le mont Sion, et dans Jérusalem, il y aura des rescapés, selon ce qu’a dit l’Eternel, et parmi les survivants que l’Eternel appellera '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '(la fin du verset n’est pas compréhensible). Au lieu de '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'des rescapés, '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'certains traduisent '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: la délivrance.
      marker-yv: yv-n
    - type: text
      text: ','
  - type: usfm
    marker: q1
    children:
    - type: text
      text: les survivants ╵que l’Eternel appellera
    - type: usfm
