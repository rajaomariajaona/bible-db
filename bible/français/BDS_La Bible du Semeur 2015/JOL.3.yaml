document_id: JOL.3,21
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Le jour de l’Eternel à la fin des temps
    marker-yv: yv-h
  - type: usfm
    marker: s2
    children:
    - type: text
      text: L’effusion de l’Esprit
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: Après cela, ╵moi, je répandrai mon Esprit ╵sur tout le monde.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Vos fils, vos filles prophétiseront.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Vos vieillards, par des songes,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: vos jeunes gens, par des visions, ╵recevront des révélations
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '3.1 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Les v. 1-5 sont cités en '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: Ac 2.16-21
        - type: text
          text: . Pour l’effusion de l’Esprit, voir Es 32.15 ; 44.3 ; Jr 31.33-34 ; Ez 36.26-27 ; 39.29 ; Za 12.10-13.
      marker-yv: yv-n
    - type: text
      text: .
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et même sur les serviteurs, ╵sur les servantes,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: moi, je répandrai mon Esprit ╵en ces jours-là.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Je produirai ╵des signes prodigieux
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'dans le ciel, sur la terre :'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: du sang, du feu ╵et des colonnes de fumée.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et le soleil s’obscurcira,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: la lune deviendra de sang
  - type: usfm
    marker: q1
    children:
    - type: text
      text: avant que vienne ╵le jour de l’Eternel,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ce jour grand et terrible.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Alors tous ceux ╵qui invoqueront l’Eternel ╵seront sauvés
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '3.5 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Voir '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: Dn 12.1
        - type: text
          text: '. Cité en '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: Rm 10.13
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: '  :'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: selon ce qu’a dit l’Eternel
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '3.5 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: selon ce qu’a dit l’Eternel
      - type: usfm
