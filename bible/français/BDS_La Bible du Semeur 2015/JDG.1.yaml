document_id: JDG.1,21
type_code: fra
verses:
  '1':
  - type: heading
    content: 'Introduction : conquête limitée du pays'
  - type: heading
    content: Les tribus du Sud conquièrent en partie leur territoire
  - type: text
    content: 'Après la mort de Josué, les Israélites consultèrent l’Eternel pour savoir quelle tribu devait aller la première attaquer les Cananéens. '
  '10':
  - type: text
    content: Juda marcha aussi contre les Cananéens qui habitaient Hébron, dont le nom était autrefois Qiryath-Arba. Ils battirent Shéshaï, Ahimân et Talmaï
  - type: note
    content: Pour les v. 10-15, voir Jos 15.13-14.
  - type: text
    content: '. '
  '11':
  - type: text
    content: De là, ils partirent attaquer les habitants de Debir, appelée autrefois Qiryath-Sépher
  - type: note
    content: Voir Jos 15.15-19 et les notes.
  - type: text
    content: '. '
  '12':
  - type: text
    content: 'Caleb promit sa fille Aksa en mariage à celui qui battrait et prendrait Qiryath-Sépher. '
  '13':
  - type: text
    content: 'Ce fut son neveu Otniel, fils de Qenaz, le frère cadet de Caleb, qui s’en empara ; et Caleb lui donna sa fille Aksa en mariage. '
  '14':
  - type: text
    content: 'Dès son arrivée auprès de son mari, elle l’engagea à demander un champ à son père Caleb. Puis elle sauta de son âne et Caleb lui demanda : Quel est ton désir ?'
  '15':
  - type: text
    content: 'Elle lui répondit : Accorde-moi un cadeau. Puisque tu m’as établie dans une terre aride, donne-moi aussi des points d’eau.'
  - type: text
    content: Et Caleb lui donna les sources supérieures et les sources inférieures.
  '16':
  - type: text
    content: Les descendants du Qénien, beau-père de Moïse, quittèrent la ville des palmiers
  - type: note
    content: Jéricho.
  - type: text
    content: ' avec les hommes de Juda pour aller s’installer parmi le peuple dans les territoires désertiques de Juda qui se situent au sud d’Arad. '
  '17':
  - type: text
    content: Les hommes de Juda se joignirent à ceux de Siméon, frère de Juda, pour battre les Cananéens qui habitaient Tsephath, ils en exterminèrent la population et détruisirent entièrement la ville, pour la vouer à l’Eternel, et on lui donna le nom de Horma.
  '18':
  - type: text
    content: Les gens de Juda s’emparèrent également
  - type: note
    content: 'L’ancienne version grecque a : ne s’emparèrent pas.'
  - type: text
    content: ' de Gaza, d’Ashkelôn et d’Eqrôn'
  - type: note
    content: Trois villes de la Philistie (cf. Jos 13.3).
  - type: text
    content: ' ainsi que des territoires voisins de ces villes. '
  '19':
  - type: text
    content: 'L’Eternel lui-même était avec eux, et c’est ainsi que les hommes de Juda purent conquérir la région montagneuse. Ils ne réussirent pas à déposséder les habitants de la vallée, car ceux-ci disposaient de chars de combat bardés de fer. '
  '2':
  - type: text
    content: 'L’Eternel répondit : C’est Juda qui ira la première : je livre le pays en son pouvoir.'
  '20':
  - type: text
    content: On attribua Hébron à Caleb, comme Moïse l’avait dit. Il en expulsa les trois descendants d’Anaq
  - type: note
    content: Nb 14.24 ; Dt 1.36 ; Jos 14.9-14.
  - type: text
    content: '. '
  '21':
  - type: text
    content: Les descendants de Benjamin ne dépossédèrent pas les Yebousiens qui habitaient Jérusalem ; ceux-ci y vivent encore aujourd’hui avec les Benjaminites.
  - type: heading
    content: Les tribus du Nord conquièrent en partie leur territoire
  '22':
  - type: text
    content: 'Les descendants de Joseph partirent de leur côté attaquer Béthel et l’Eternel fut avec eux. '
  '23':
  - type: text
    content: 'Ils envoyèrent d’abord des hommes en reconnaissance à Béthel qui s’appelait autrefois Louz. '
  '24':
  - type: text
    content: 'Les envoyés virent un homme sortir de la ville et ils lui dirent : Montre-nous par où on peut pénétrer dans la ville, et nous te traiterons avec bonté.'
  '25':
  - type: text
    content: 'L’homme leur montra donc comment pénétrer dans la ville. Ils massacrèrent tous les habitants, mais laissèrent partir cet homme avec toute sa famille. '
  '26':
  - type: text
    content: L’homme émigra dans le pays des Hittites
  - type: note
    content: Voir note Jos 1.4.
  - type: text
    content: '  ; il y construisit une ville à laquelle il donna le nom de Louz qu’elle porte encore aujourd’hui.'
  '27':
  - type: text
    content: 'Les hommes de Manassé ne dépossédèrent pas les habitants de Beth-Sheân, de Taanak, de Dor, de Yibleam, de Meguiddo et des localités qui dépendaient de ces villes. Les Cananéens continuèrent donc à se maintenir dans cette région. '
  '28':
  - type: text
    content: Lorsque les Israélites furent devenus plus forts, ils leur imposèrent des corvées, mais ils ne les dépossédèrent pas.
  '29':
  - type: text
    content: Les gens d’Ephraïm ne dépossédèrent pas les Cananéens établis à Guézer, et ceux-ci continuèrent à y vivre au milieu des Ephraïmites.
  '3':
  - type: text
    content: Alors les hommes de Juda dirent à ceux de Siméon, frère de Juda
  - type: note
    content: Les deux étaient fils de Léa. D’autre part, des villes attribuées à la tribu de Siméon se trouvaient incluses dans le territoire de Juda.
  - type: text
    content: '  : Venez avec nous à la conquête du territoire qui nous a été attribué. Nous combattrons ensemble les Cananéens. Ensuite, nous vous aiderons également à conquérir le territoire qui vous est échu.'
  - type: text
    content: 'Les gens de Siméon se joignirent donc à eux, '
  '30':
  - type: text
    content: Ceux de Zabulon ne dépossédèrent pas non plus les habitants de Qitrôn et de Nahalol ; les Cananéens habitèrent donc au milieu des gens de Zabulon qui leur imposèrent des corvées.
  '31':
  - type: text
    content: Les gens d’Aser ne dépossédèrent pas les habitants d’Akko
  - type: note
    content: Ancienne ville phénicienne près du mont Carmel, que les Grecs appelaient Ptolémaïs (Ac 21.7). C’est la Saint-Jean-d’Acre du temps des croisades.
  - type: text
    content: ', de Sidon, d’Ahlab, d’Akzib, de Helba, d’Aphiq et de Rehob. '
  '32':
  - type: text
    content: Les descendants d’Aser s’établirent donc au milieu des Cananéens qui occupaient le pays, car ils ne les dépossédèrent pas.
  '33':
  - type: text
    content: Les gens de Nephtali ne dépossédèrent pas les habitants de Beth-Shémesh ni ceux de Beth-Anath. Ils s’installèrent au milieu des Cananéens qui habitaient le pays et ils soumirent à des corvées les habitants de ces deux villes.
  '34':
  - type: text
    content: 'Les Amoréens refoulèrent les Danites dans la région montagneuse et les empêchèrent de descendre dans la vallée. '
  '35':
  - type: text
    content: 'Les Amoréens continuèrent donc à se maintenir à Har-Hérès, à Ayalôn et à Shaalbim, mais les descendants de Joseph furent de plus en plus puissants et leur imposèrent des corvées. '
  '36':
  - type: text
    content: Le territoire des Amoréens s’étendait de la montée des Scorpions, depuis Séla et en remontant.
  '4':
  - type: text
    content: et Juda se mit en campagne. L’Eternel leur donna la victoire sur les Cananéens et les Phéréziens
  - type: note
    content: Peuplade souvent associée aux Cananéens (Gn 13.7 ; 34.30 ; Jos 17.15), qui nous est par ailleurs inconnue.
  - type: text
    content: '. A Bézeq, ils battirent dix mille hommes. '
  '5':
  - type: text
    content: 'En effet, ils tombèrent là sur le roi Adoni-Bézeq et l’attaquèrent. Ils battirent les Cananéens et les Phéréziens. '
  '6':
  - type: text
    content: Adoni-Bézeq s’enfuit, mais ils le poursuivirent, s’emparèrent de lui et lui coupèrent les pouces des mains et des pieds
  - type: note
    content: La mutilation des prisonniers de guerre était une pratique courante dans le Moyen-Orient ancien (voir 16.21) ; elle était destinée à rendre inapte au combat.
  - type: text
    content: '. '
  '7':
  - type: text
    content: 'Adoni-Bézeq s’exclama : Soixante-dix rois'
  - type: note
    content: Canaan était divisée en petits Etats groupés autour d’une ville ; chacun d’eux était gouverné par un roi.
  - type: text
    content: ', dont on avait coupé les pouces des mains et des pieds, ramassaient les miettes qui tombaient sous ma table. Dieu m’a rendu ce que j’ai fait.'
  - type: text
    content: On l’emmena à Jérusalem et c’est là qu’il mourut.
  '8':
  - type: text
    content: 'Les hommes de Juda attaquèrent Jérusalem et s’en emparèrent. Ils massacrèrent ses habitants et mirent le feu à la ville. '
  '9':
  - type: text
    content: Ensuite, ils partirent combattre les Cananéens qui occupaient la région montagneuse, le Néguev et le Bas-Pays.
