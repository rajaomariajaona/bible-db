document_id: JDG.1,21
type_code: fra
verses:
  '1':
  - type: usfm
    marker: ms1
    children:
    - type: text
      text: 'Introduction : conquête limitée du pays'
    marker-yv: yv-h
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Les tribus du Sud conquièrent en partie leur territoire
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Après la mort de Josué, les Israélites consultèrent l’Eternel pour savoir quelle tribu devait aller la première attaquer les Cananéens. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Juda marcha aussi contre les Cananéens qui habitaient Hébron, dont le nom était autrefois Qiryath-Arba. Ils battirent Shéshaï, Ahimân et Talmaï
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1.10 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Pour les v. 10-15, voir '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: Jos 15.13-14
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: '. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: De là, ils partirent attaquer les habitants de Debir, appelée autrefois Qiryath-Sépher
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1.11 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Voir '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: Jos 15.15-19
        - type: text
          text: ' et les notes.'
      marker-yv: yv-n
    - type: text
      text: '. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Caleb promit sa fille Aksa en mariage à celui qui battrait et prendrait Qiryath-Sépher. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ce fut son neveu Otniel, fils de Qenaz, le frère cadet de Caleb, qui s’en empara ; et Caleb lui donna sa fille Aksa en mariage. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dès son arrivée auprès de son mari, elle l’engagea à demander un champ à son père Caleb. Puis elle sauta de son âne et Caleb lui demanda : Quel est ton désir ?'
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Elle lui répondit : Accorde-moi un cadeau. Puisque tu m’as établie dans une terre aride, donne-moi aussi des points d’eau.'
  - type: usfm
    marker: p
    children:
    - type: text
      text: Et Caleb lui donna les sources supérieures et les sources inférieures.
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Les descendants du Qénien, beau-père de Moïse, quittèrent la ville des palmiers
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1.16 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Jéricho.
      marker-yv: yv-n
    - type: text
      text: ' avec les hommes de Juda pour aller s’installer parmi le peuple dans les territoires désertiques de Juda qui se situent au sud d’Arad. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Les hommes de Juda se joignirent à ceux de Siméon, frère de Juda, pour battre les Cananéens qui habitaient Tsephath, ils en exterminèrent la population et détruisirent entièrement la ville, pour la vouer à l’Eternel, et on lui donna le nom de Horma.
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Les gens de Juda s’emparèrent également
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1.18 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'L’ancienne version grecque a : '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: ne s’emparèrent pas.
      marker-yv: yv-n
    - type: text
      text: ' de Gaza, d’Ashkelôn et d’Eqrôn'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1.18 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Trois villes de la Philistie (cf. '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: Jos 13.3
        - type: text
          text: ).
      marker-yv: yv-n
    - type: text
      text: ' ainsi que des territoires voisins de ces villes. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'L’Eternel lui-même était avec eux, et c’est ainsi que les hommes de Juda purent conquérir la région montagneuse. Ils ne réussirent pas à déposséder les habitants de la vallée, car ceux-ci disposaient de chars de combat bardés de fer. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'L’Eternel répondit : C’est Juda qui ira la première : je livre le pays en son pouvoir.'
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: On attribua Hébron à Caleb, comme Moïse l’avait dit. Il en expulsa les trois descendants d’Anaq
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1.20 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Nb 14.24 ; Dt 1.36 ; Jos 14.9-14.
      marker-yv: yv-n
    - type: text
      text: '. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Les descendants de Benjamin ne dépossédèrent pas les Yebousiens qui habitaient Jérusalem ; ceux-ci y vivent encore aujourd’hui avec les Benjaminites.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Les tribus du Nord conquièrent en partie leur territoire
    marker-yv: yv-h
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Les descendants de Joseph partirent de leur côté attaquer Béthel et l’Eternel fut avec eux. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ils envoyèrent d’abord des hommes en reconnaissance à Béthel qui s’appelait autrefois Louz. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Les envoyés virent un homme sortir de la ville et ils lui dirent : Montre-nous par où on peut pénétrer dans la ville, et nous te traiterons avec bonté.'
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'L’homme leur montra donc comment pénétrer dans la ville. Ils massacrèrent tous les habitants, mais laissèrent partir cet homme avec toute sa famille. '
  '26':
  - type: usfm
    marker: p
    children:
    - type: text
      text: L’homme émigra dans le pays des Hittites
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1.26 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Voir note '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: Jos 1.4
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: '  ; il y construisit une ville à laquelle il donna le nom de Louz qu’elle porte encore aujourd’hui.'
  '27':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Les hommes de Manassé ne dépossédèrent pas les habitants de Beth-Sheân, de Taanak, de Dor, de Yibleam, de Meguiddo et des localités qui dépendaient de ces villes. Les Cananéens continuèrent donc à se maintenir dans cette région. '
  '28':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Lorsque les Israélites furent devenus plus forts, ils leur imposèrent des corvées, mais ils ne les dépossédèrent pas.
  '29':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Les gens d’Ephraïm ne dépossédèrent pas les Cananéens établis à Guézer, et ceux-ci continuèrent à y vivre au milieu des Ephraïmites.
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Alors les hommes de Juda dirent à ceux de Siméon, frère de Juda
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1.3 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Les deux étaient fils de Léa. D’autre part, des villes attribuées à la tribu de Siméon se trouvaient incluses dans le territoire de Juda.
      marker-yv: yv-n
    - type: text
      text: '  : Venez avec nous à la conquête du territoire qui nous a été attribué. Nous combattrons ensemble les Cananéens. Ensuite, nous vous aiderons également à conquérir le territoire qui vous est échu.'
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Les gens de Siméon se joignirent donc à eux, '
  '30':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ceux de Zabulon ne dépossédèrent pas non plus les habitants de Qitrôn et de Nahalol ; les Cananéens habitèrent donc au milieu des gens de Zabulon qui leur imposèrent des corvées.
  '31':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Les gens d’Aser ne dépossédèrent pas les habitants d’Akko
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1.31 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Ancienne ville phénicienne près du mont Carmel, que les Grecs appelaient Ptolémaïs (
        - type: usfm
          marker: ref
          children:
          - type: text
            text: Ac 21.7
        - type: text
          text: ). C’est la Saint-Jean-d’Acre du temps des croisades.
      marker-yv: yv-n
    - type: text
      text: ', de Sidon, d’Ahlab, d’Akzib, de Helba, d’Aphiq et de Rehob. '
  '32':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Les descendants d’Aser s’établirent donc au milieu des Cananéens qui occupaient le pays, car ils ne les dépossédèrent pas.
  '33':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Les gens de Nephtali ne dépossédèrent pas les habitants de Beth-Shémesh ni ceux de Beth-Anath. Ils s’installèrent au milieu des Cananéens qui habitaient le pays et ils soumirent à des corvées les habitants de ces deux villes.
  '34':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Les Amoréens refoulèrent les Danites dans la région montagneuse et les empêchèrent de descendre dans la vallée. '
  '35':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Les Amoréens continuèrent donc à se maintenir à Har-Hérès, à Ayalôn et à Shaalbim, mais les descendants de Joseph furent de plus en plus puissants et leur imposèrent des corvées. '
  '36':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Le territoire des Amoréens s’étendait de la montée des Scorpions, depuis Séla et en remontant.
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: et Juda se mit en campagne. L’Eternel leur donna la victoire sur les Cananéens et les Phéréziens
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1.4 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Peuplade souvent associée aux Cananéens (Gn 13.7 ; 34.30 ; Jos 17.15), qui nous est par ailleurs inconnue.
      marker-yv: yv-n
    - type: text
      text: '. A Bézeq, ils battirent dix mille hommes. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'En effet, ils tombèrent là sur le roi Adoni-Bézeq et l’attaquèrent. Ils battirent les Cananéens et les Phéréziens. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Adoni-Bézeq s’enfuit, mais ils le poursuivirent, s’emparèrent de lui et lui coupèrent les pouces des mains et des pieds
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1.6 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'La mutilation des prisonniers de guerre était une pratique courante dans le Moyen-Orient ancien (voir '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: '16.21'
        - type: text
          text: ) ; elle était destinée à rendre inapte au combat.
      marker-yv: yv-n
    - type: text
      text: '. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Adoni-Bézeq s’exclama : Soixante-dix rois'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1.7 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Canaan était divisée en petits Etats groupés autour d’une ville ; chacun d’eux était gouverné par un roi.
      marker-yv: yv-n
    - type: text
      text: ', dont on avait coupé les pouces des mains et des pieds, ramassaient les miettes qui tombaient sous ma table. Dieu m’a rendu ce que j’ai fait.'
  - type: usfm
    marker: p
    children:
    - type: text
      text: On l’emmena à Jérusalem et c’est là qu’il mourut.
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Les hommes de Juda attaquèrent Jérusalem et s’en emparèrent. Ils massacrèrent ses habitants et mirent le feu à la ville. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ensuite, ils partirent combattre les Cananéens qui occupaient la région montagneuse, le Néguev et le Bas-Pays.
