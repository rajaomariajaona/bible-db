document_id: 2CH.33,21
type_code: fra
verses:
  '1':
  - type: heading
    content: Manassé, roi de Juda
  - type: heading
    content: (2 R 21.1-10)
  - type: text
    content: Manassé était âgé de douze ans à son avènement. Il régna cinquante-cinq ans à Jérusalem
  - type: note
    content: Environ de 697 à 642 av. J.-C., avec une éventuelle corégence avec son père Ezéchias si celui-ci a vécu jusqu’en 686 av. J.-C. ( voir note sur 29.1).
  - type: text
    content: '. '
  '10':
  - type: text
    content: L’Eternel adressa des avertissements à Manassé et à son peuple, mais ils n’écoutèrent pas.
  - type: heading
    content: La réaction de Dieu
  '11':
  - type: text
    content: Alors l’Eternel fit venir contre eux les généraux du roi d’Assyrie
  - type: note
    content: Le roi Esar-Haddôn (681 à 669 av. J.-C.), fils et successeur de Sennachérib, ou, plus probablement, son successeur Assourbanipal.
  - type: text
    content: ', qui capturèrent Manassé. Ils lui mirent des crochets au nez, l’attachèrent avec des chaînes de bronze et l’emmenèrent à Babylone. '
  '12':
  - type: text
    content: 'Lorsqu’il fut dans la détresse, il implora l’Eternel son Dieu et s’humilia profondément devant le Dieu de ses ancêtres. '
  '13':
  - type: text
    content: Il le pria, et l’Eternel l’exauça, il écouta sa supplication et le fit revenir à Jérusalem dans son royaume. Ainsi Manassé comprit que l’Eternel seul est Dieu.
  '14':
  - type: text
    content: 'Après ces événements, il construisit à l’extérieur de la Cité de David un rempart qui passait à l’ouest des sources de Guihôn, longeait la vallée du Cédron jusqu’à l’entrée de la porte des Poissons et contournait l’Ophel. Manassé lui donna une très grande hauteur. Il établit aussi des chefs militaires dans toutes les villes fortifiées de Juda. '
  '15':
  - type: text
    content: 'Il fit disparaître du temple de l’Eternel les dieux étrangers et la statue, ainsi que les autels qu’il avait édifiés sur la colline du Temple et dans Jérusalem. Et on les jeta hors de la ville. '
  '16':
  - type: text
    content: 'Il rebâtit l’autel de l’Eternel. Il offrit des sacrifices de communion et de reconnaissance et il ordonna aux Judéens de rendre leur culte à l’Eternel, le Dieu d’Israël. '
  '17':
  - type: text
    content: A vrai dire, le peuple continuait à offrir des sacrifices sur les hauts lieux, mais seulement à l’Eternel son Dieu.
  - type: heading
    content: (2 R 21.17-18)
  '18':
  - type: text
    content: Les autres faits et gestes de Manassé, la prière qu’il adressa à son Dieu et les messages que les prophètes lui adressèrent de la part de l’Eternel, le Dieu d’Israël, se trouvent dans les Actes des rois d’Israël
  - type: note
    content: Voir 1 R 14.19 ; 2 Ch 16.11.
  - type: text
    content: '. '
  '19':
  - type: text
    content: Sa prière et l’exaucement que Dieu lui accorda, toutes ses fautes et son infidélité envers Dieu, la liste des endroits où il bâtit des hauts lieux et où il dressa des pieux sacrés d’Ashéra et des statues avant de s’humilier, tout cela est cité dans les Actes de Hozaï
  - type: note
    content: 'Hozaï: personnage inconnu. Un manuscrit hébreu et l’ancienne version grecque ont : des prophètes.'
  - type: text
    content: '. '
  '2':
  - type: text
    content: 'Il fit ce que l’Eternel considère comme mal et s’adonna aux mêmes pratiques abominables que les peuples étrangers dépossédés par l’Eternel en faveur des Israélites. '
  '20':
  - type: text
    content: Manassé rejoignit ses ancêtres décédés, et on l’enterra dans son palais. Son fils Amôn lui succéda sur le trône.
  - type: heading
    content: Le bref règne d’Amôn
  - type: heading
    content: (2 R 21.19-24)
  '21':
  - type: text
    content: Amôn avait vingt-deux ans à son avènement et il régna deux ans à Jérusalem
  - type: note
    content: De 642 à 640 av. J.-C.
  - type: text
    content: '. '
  '22':
  - type: text
    content: 'Il fit ce que l’Eternel considère comme mal, comme l’avait fait son père Manassé. Il sacrifia à toutes les idoles que son père Manassé avait fait dresser et leur rendit un culte. '
  '23':
  - type: text
    content: 'Il ne s’humilia pas devant l’Eternel comme l’avait fait son père Manassé. Au contraire, il se rendit extrêmement coupable. '
  '24':
  - type: text
    content: 'Ses ministres conspirèrent contre lui et l’assassinèrent dans son palais. '
  '25':
  - type: text
    content: Mais la population du pays massacra tous ceux qui avaient comploté contre le roi Amôn et proclama son fils Josias roi à sa place.
  '3':
  - type: text
    content: 'Il rebâtit les hauts lieux que son père Ezéchias avait démolis, il érigea des autels aux Baals, et dressa des poteaux sacrés à la déesse Ashéra. Il se prosterna devant tous les astres du ciel et leur rendit un culte. '
  '4':
  - type: text
    content: 'Il construisit des autels païens dans le temple de l’Eternel, malgré cette parole de l’Eternel : C’est là, à Jérusalem, que j’établirai pour toujours ma présence'
  - type: note
    content: Voir 2 Ch 7.16.
  - type: text
    content: .
  '5':
  - type: text
    content: 'Il érigea des autels en l’honneur de tous les astres du ciel dans les deux parvis du temple de l’Eternel. '
  '6':
  - type: text
    content: Il alla même jusqu’à brûler ses fils pour les offrir en sacrifice dans la vallée de Ben-Hinnom
  - type: note
    content: Voir Lv 20.2-5 ; Dt 12.31 ; 18.10.
  - type: text
    content: . Il consultait les augures, les devins et les magiciens. Il installa des gens qui évoquaient les morts et qui prédisaient l’avenir
  - type: note
    content: Voir Dt 18.9-14.
  - type: text
    content: '. Il multiplia les actes que l’Eternel considère comme mauvais, et l’irrita de cette manière. '
  '7':
  - type: text
    content: 'Il fit dresser dans le Temple l’idole sculptée qu’il avait fabriquée, alors que Dieu avait déclaré à David et à son fils Salomon : C’est dans ce temple et dans Jérusalem, que j’ai choisie parmi toutes les tribus d’Israël, que j’établirai pour toujours ma présence. '
  '8':
  - type: text
    content: Si les Israélites s’appliquent à obéir à tout ce que je leur ai commandé, à toute la Loi, les ordonnances et les articles de droit qu’ils ont reçus par l’intermédiaire de Moïse, je ne leur ferai plus quitter le pays que j’ai attribué à leurs ancêtres
  - type: note
    content: Voir 1 Ch 17.7-15 ; 2 Ch 6.4-11 ; 2 Ch 7.12-22 ; 1 R 2.2-4.
  - type: text
    content: .
  '9':
  - type: text
    content: 'Mais Manassé égara le peuple de Juda et les habitants de Jérusalem, de sorte qu’ils firent encore plus de mal que les peuples étrangers que l’Eternel avait exterminés au profit des Israélites. '
