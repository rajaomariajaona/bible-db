document_id: 2CH.33
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Manassé, roi de Juda
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: (2 R 21.1-10)
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Manassé était âgé de douze ans à son avènement. Il régna cinquante-cinq ans à Jérusalem
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '33.1 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Environ de 697 à 642 av. J.-C., avec une éventuelle corégence avec son père Ezéchias si celui-ci a vécu jusqu’en 686 av. J.-C. ( voir note sur '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '29.1'
        metadata:
          usfm: 2CH.29.1
      - type: text
        text: ).
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Il fit ce que l’Eternel considère comme mal et s’adonna aux mêmes pratiques abominables que les peuples étrangers dépossédés par l’Eternel en faveur des Israélites. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Il rebâtit les hauts lieux que son père Ezéchias avait démolis, il érigea des autels aux Baals, et dressa des poteaux sacrés à la déesse Ashéra. Il se prosterna devant tous les astres du ciel et leur rendit un culte. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Il construisit des autels païens dans le temple de l’Eternel, malgré cette parole de l’Eternel : C’est là, à Jérusalem, que j’établirai pour toujours ma présence'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '33.4 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Voir '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 2 Ch 7.16
        metadata:
          usfm: 2CH.7.16
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Il érigea des autels en l’honneur de tous les astres du ciel dans les deux parvis du temple de l’Eternel. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Il alla même jusqu’à brûler ses fils pour les offrir en sacrifice dans la vallée de Ben-Hinnom
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '33.6 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Voir Lv 20.2-5 ; Dt 12.31 ; 18.10.
    marker-yv: yv-n
  - type: text
    text: . Il consultait les augures, les devins et les magiciens. Il installa des gens qui évoquaient les morts et qui prédisaient l’avenir
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '33.6 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Voir '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Dt 18.9-14
        metadata:
          usfm: DEU.18.9+DEU.18.10+DEU.18.11+DEU.18.12+DEU.18.13+DEU.18.14
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: '. Il multiplia les actes que l’Eternel considère comme mauvais, et l’irrita de cette manière. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Il fit dresser dans le Temple l’idole sculptée qu’il avait fabriquée, alors que Dieu avait déclaré à David et à son fils Salomon : C’est dans ce temple et dans Jérusalem, que j’ai choisie parmi toutes les tribus d’Israël, que j’établirai pour toujours ma présence. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Si les Israélites s’appliquent à obéir à tout ce que je leur ai commandé, à toute la Loi, les ordonnances et les articles de droit qu’ils ont reçus par l’intermédiaire de Moïse, je ne leur ferai plus quitter le pays que j’ai attribué à leurs ancêtres
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '33.8 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Voir 1 Ch 17.7-15 ; 2 Ch 6.4-11 ; 2 Ch 7.12-22 ; 1 R 2.2-4.
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Mais Manassé égara le peuple de Juda et les habitants de Jérusalem, de sorte qu’ils firent encore plus de mal que les peuples étrangers que l’Eternel avait exterminés au profit des Israélites. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: L’Eternel adressa des avertissements à Manassé et à son peuple, mais ils n’écoutèrent pas.
- type: usfm
  marker: s1
  children:
  - type: text
    text: La réaction de Dieu
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Alors l’Eternel fit venir contre eux les généraux du roi d’Assyrie
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '33.11 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Le roi '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'Esar-Haddôn '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: (681 à 669 av. J.-C.), fils et successeur de Sennachérib, ou, plus probablement, son successeur Assourbanipal.
    marker-yv: yv-n
  - type: text
    text: ', qui capturèrent Manassé. Ils lui mirent des crochets au nez, l’attachèrent avec des chaînes de bronze et l’emmenèrent à Babylone. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Lorsqu’il fut dans la détresse, il implora l’Eternel son Dieu et s’humilia profondément devant le Dieu de ses ancêtres. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Il le pria, et l’Eternel l’exauça, il écouta sa supplication et le fit revenir à Jérusalem dans son royaume. Ainsi Manassé comprit que l’Eternel seul est Dieu.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Après ces événements, il construisit à l’extérieur de la Cité de David un rempart qui passait à l’ouest des sources de Guihôn, longeait la vallée du Cédron jusqu’à l’entrée de la porte des Poissons et contournait l’Ophel. Manassé lui donna une très grande hauteur. Il établit aussi des chefs militaires dans toutes les villes fortifiées de Juda. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Il fit disparaître du temple de l’Eternel les dieux étrangers et la statue, ainsi que les autels qu’il avait édifiés sur la colline du Temple et dans Jérusalem. Et on les jeta hors de la ville. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Il rebâtit l’autel de l’Eternel. Il offrit des sacrifices de communion et de reconnaissance et il ordonna aux Judéens de rendre leur culte à l’Eternel, le Dieu d’Israël. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: A vrai dire, le peuple continuait à offrir des sacrifices sur les hauts lieux, mais seulement à l’Eternel son Dieu.
- type: usfm
  marker: r
  children:
  - type: text
    text: (2 R 21.17-18)
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Les autres faits et gestes de Manassé, la prière qu’il adressa à son Dieu et les messages que les prophètes lui adressèrent de la part de l’Eternel, le Dieu d’Israël, se trouvent dans les Actes des rois d’Israël
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '33.18 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Voir 1 R 14.19 ; 2 Ch 16.11.
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Sa prière et l’exaucement que Dieu lui accorda, toutes ses fautes et son infidélité envers Dieu, la liste des endroits où il bâtit des hauts lieux et où il dressa des pieux sacrés d’Ashéra et des statues avant de s’humilier, tout cela est cité dans les Actes de Hozaï
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '33.19 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: Hozaï
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: ': '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'personnage inconnu. Un manuscrit hébreu et l’ancienne version grecque ont : '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: des prophètes.
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Manassé rejoignit ses ancêtres décédés, et on l’enterra dans son palais. Son fils Amôn lui succéda sur le trône.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Le bref règne d’Amôn
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: (2 R 21.19-24)
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Amôn avait vingt-deux ans à son avènement et il régna deux ans à Jérusalem
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '33.21 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: De 642 à 640 av. J.-C.
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Il fit ce que l’Eternel considère comme mal, comme l’avait fait son père Manassé. Il sacrifia à toutes les idoles que son père Manassé avait fait dresser et leur rendit un culte. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Il ne s’humilia pas devant l’Eternel comme l’avait fait son père Manassé. Au contraire, il se rendit extrêmement coupable. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Ses ministres conspirèrent contre lui et l’assassinèrent dans son palais. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: Mais la population du pays massacra tous ceux qui avaient comploté contre le roi Amôn et proclama son fils Josias roi à sa place.
