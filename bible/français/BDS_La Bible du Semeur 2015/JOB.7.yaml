document_id: JOB.7,21
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Pourquoi la souffrance ?
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: Le sort de l’homme sur la terre ╵est celui d’un soldat
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et ses jours sont semblables ╵à ceux d’un mercenaire.
  '10':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Il ne reviendra plus ╵dans sa maison
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et sa demeure même ╵ne le reconnaît plus.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: C’est pourquoi je ne veux ╵plus réfréner ma langue,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: je parlerai ╵dans ma détresse,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: je me lamenterai ╵car mon cœur est amer.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Suis-je donc une mer ╵ou un monstre marin
  - type: usfm
    marker: q1
    children:
    - type: text
      text: pour que tu établisses ╵contre moi, une garde
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '7.12 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Le '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: monstre marin
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: ': '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'image des puissances souvent hostiles à Dieu et pourtant domptées par le Seigneur (voir '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: '3.8'
        - type: text
          text: ' et note).'
      marker-yv: yv-n
    - type: text
      text: '  ?'
  '13':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Si je me dis : ╵« Mon lit m’apaisera,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ma couche m’aidera ╵à porter ma douleur »,
  '14':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: alors tu m’épouvantes ╵par d’affreux cauchemars
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et tu me terrifies ╵par des visions nocturnes.
  '15':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: J’aimerais mieux être étranglé,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: la mort vaudrait bien mieux ╵que vivre dans ces os.
  '16':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Je suis plein de dégoût ! ╵Je ne durerai pas toujours.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Laisse-moi donc tranquille : ╵ma vie est si fragile.'
  '17':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Qu’est-ce que l’homme, ╵pour que tu fasses ╵un si grand cas de lui,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et pour que tu lui prêtes ╵une telle attention,
  '18':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: pour que tu l’examines ╵matin après matin,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et pour qu’à chaque instant ╵tu viennes l’éprouver ?
  '19':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Quand détourneras-tu ╵enfin tes yeux de moi ?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ne lâcheras-tu pas ╵un instant ton étreinte, ╵ne fût-ce que le temps ╵d’avaler ma salive ?
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Il est comme un esclave ╵qui soupire après l’ombre
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '7.2 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: C’est-à-dire le soir, qui apporte fraîcheur et repos après le travail du jour.
      marker-yv: yv-n
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et comme un ouvrier ╵qui attend son salaire.
  '20':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et puis même si j’ai péché, ╵que t’ai-je fait, à toi, ╵censeur des hommes ?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Pourquoi donc m’as-tu pris pour cible ?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Suis-je devenu une charge
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '7.20 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'D’après quelques manuscrits du texte hébreu traditionnel, une ancienne tradition de copistes et l’ancienne version grecque. La plupart des manuscrits du texte hébreu traditionnel ont : '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: je suis devenu une charge pour moi-même.
      marker-yv: yv-n
    - type: text
      text: '  ?'
  '21':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Pourquoi ne veux-tu pas ╵pardonner mon offense
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et ne passes-tu pas ╵sur mon iniquité ?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Bientôt j’irai dormir ╵au sein de la poussière
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et tu me chercheras, ╵mais je ne serai plus.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: J’ai reçu en partage ╵des mois de déception,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: j’ai trouvé dans mon lot ╵des nuits de peine amère.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Dès que je suis couché, je dis : ╵« Quand vais-je me lever ? »'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Sitôt levé, je pense : ╵« Quand donc viendra le soir'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '7.4 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Sitôt levé… le soir
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: ': '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'd’après l’ancienne version grecque ; le texte hébreu traditionnel a : '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: le soir tarde à venir.
      marker-yv: yv-n
    - type: text
      text: '  ? »'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et, jusqu’au crépuscule, ╵je suis agité de douleurs.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mon corps est couvert de vermine ╵et de croûtes terreuses,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ma peau s’est crevassée, ╵partout, mes plaies suppurent.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mes jours se sont enfuis ╵plus rapides que la navette ╵d’un tisserand habile.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ils tirent à leur fin ╵sans qu’il y ait d’espoir.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Rappelle-toi, ô Dieu, ╵que ma vie n’est qu’un souffle
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et que jamais mes yeux ╵ne reverront plus le bonheur.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Oui, l’œil qui me regarde ╵ne pourra plus me voir,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: tes yeux me chercheront ╵et j’aurai disparu.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tout comme une nuée ╵qui se dissipe et passe,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: l’homme va dans la tombe
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '7.9 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Autre traduction : '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: dans le séjour des morts.
      marker-yv: yv-n
    - type: text
      text: ' ╵pour n’en plus remonter.'
