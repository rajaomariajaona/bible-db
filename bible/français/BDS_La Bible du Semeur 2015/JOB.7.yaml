document_id: JOB.7,21
type_code: fra
verses:
  '1':
  - type: heading
    content: Pourquoi la souffrance ?
  - type: text
    content: Le sort de l’homme sur la terre ╵est celui d’un soldat
  - type: text
    content: et ses jours sont semblables ╵à ceux d’un mercenaire.
  '10':
  - type: text
    content: Il ne reviendra plus ╵dans sa maison
  - type: text
    content: et sa demeure même ╵ne le reconnaît plus.
  '11':
  - type: text
    content: C’est pourquoi je ne veux ╵plus réfréner ma langue,
  - type: text
    content: je parlerai ╵dans ma détresse,
  - type: text
    content: je me lamenterai ╵car mon cœur est amer.
  '12':
  - type: text
    content: Suis-je donc une mer ╵ou un monstre marin
  - type: text
    content: pour que tu établisses ╵contre moi, une garde
  - type: note
    content: 'Le monstre marin: image des puissances souvent hostiles à Dieu et pourtant domptées par le Seigneur (voir 3.8 et note).'
  - type: text
    content: '  ?'
  '13':
  - type: text
    content: 'Si je me dis : ╵« Mon lit m’apaisera,'
  - type: text
    content: ma couche m’aidera ╵à porter ma douleur »,
  '14':
  - type: text
    content: alors tu m’épouvantes ╵par d’affreux cauchemars
  - type: text
    content: et tu me terrifies ╵par des visions nocturnes.
  '15':
  - type: text
    content: J’aimerais mieux être étranglé,
  - type: text
    content: la mort vaudrait bien mieux ╵que vivre dans ces os.
  '16':
  - type: text
    content: Je suis plein de dégoût ! ╵Je ne durerai pas toujours.
  - type: text
    content: 'Laisse-moi donc tranquille : ╵ma vie est si fragile.'
  '17':
  - type: text
    content: Qu’est-ce que l’homme, ╵pour que tu fasses ╵un si grand cas de lui,
  - type: text
    content: et pour que tu lui prêtes ╵une telle attention,
  '18':
  - type: text
    content: pour que tu l’examines ╵matin après matin,
  - type: text
    content: et pour qu’à chaque instant ╵tu viennes l’éprouver ?
  '19':
  - type: text
    content: Quand détourneras-tu ╵enfin tes yeux de moi ?
  - type: text
    content: Ne lâcheras-tu pas ╵un instant ton étreinte, ╵ne fût-ce que le temps ╵d’avaler ma salive ?
  '2':
  - type: text
    content: Il est comme un esclave ╵qui soupire après l’ombre
  - type: note
    content: C’est-à-dire le soir, qui apporte fraîcheur et repos après le travail du jour.
  - type: text
    content: et comme un ouvrier ╵qui attend son salaire.
  '20':
  - type: text
    content: Et puis même si j’ai péché, ╵que t’ai-je fait, à toi, ╵censeur des hommes ?
  - type: text
    content: Pourquoi donc m’as-tu pris pour cible ?
  - type: text
    content: Suis-je devenu une charge
  - type: note
    content: 'D’après quelques manuscrits du texte hébreu traditionnel, une ancienne tradition de copistes et l’ancienne version grecque. La plupart des manuscrits du texte hébreu traditionnel ont : je suis devenu une charge pour moi-même.'
  - type: text
    content: '  ?'
  '21':
  - type: text
    content: Pourquoi ne veux-tu pas ╵pardonner mon offense
  - type: text
    content: et ne passes-tu pas ╵sur mon iniquité ?
  - type: text
    content: Bientôt j’irai dormir ╵au sein de la poussière
  - type: text
    content: et tu me chercheras, ╵mais je ne serai plus.
  '3':
  - type: text
    content: J’ai reçu en partage ╵des mois de déception,
  - type: text
    content: j’ai trouvé dans mon lot ╵des nuits de peine amère.
  '4':
  - type: text
    content: 'Dès que je suis couché, je dis : ╵« Quand vais-je me lever ? »'
  - type: text
    content: 'Sitôt levé, je pense : ╵« Quand donc viendra le soir'
  - type: note
    content: 'Sitôt levé… le soir: d’après l’ancienne version grecque ; le texte hébreu traditionnel a : le soir tarde à venir.'
  - type: text
    content: '  ? »'
  - type: text
    content: Et, jusqu’au crépuscule, ╵je suis agité de douleurs.
  '5':
  - type: text
    content: Mon corps est couvert de vermine ╵et de croûtes terreuses,
  - type: text
    content: ma peau s’est crevassée, ╵partout, mes plaies suppurent.
  '6':
  - type: text
    content: Mes jours se sont enfuis ╵plus rapides que la navette ╵d’un tisserand habile.
  - type: text
    content: Ils tirent à leur fin ╵sans qu’il y ait d’espoir.
  '7':
  - type: text
    content: Rappelle-toi, ô Dieu, ╵que ma vie n’est qu’un souffle
  - type: text
    content: et que jamais mes yeux ╵ne reverront plus le bonheur.
  '8':
  - type: text
    content: Oui, l’œil qui me regarde ╵ne pourra plus me voir,
  - type: text
    content: tes yeux me chercheront ╵et j’aurai disparu.
  '9':
  - type: text
    content: Tout comme une nuée ╵qui se dissipe et passe,
  - type: text
    content: l’homme va dans la tombe
  - type: note
    content: 'Autre traduction : dans le séjour des morts.'
  - type: text
    content: ' ╵pour n’en plus remonter.'
