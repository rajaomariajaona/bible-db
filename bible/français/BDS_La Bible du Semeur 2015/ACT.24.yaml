document_id: ACT.24,21
type_code: fra
verses:
  '1':
  - type: heading
    content: Paul devant le gouverneur Félix
  - type: text
    content: Cinq jours après, le grand-prêtre Ananias descendit à Césarée accompagné de quelques responsables du peuple et d’un avocat nommé Tertulle. Ils se présentèrent au gouverneur
  - type: note
    content: 'C’est-à-dire Félix : voir note 23.24.'
  - type: text
    content: ' pour porter plainte contre Paul.'
  '10':
  - type: text
    content: 'Sur un signe du gouverneur, Paul prit à son tour la parole :'
  - type: text
    content: 'Je sais, dit-il, que depuis plusieurs années tu exerces la justice sur notre peuple. C’est donc en toute confiance que je viens te présenter ma défense. '
  '11':
  - type: text
    content: 'Comme tu peux le vérifier toi-même, il n’y a pas plus de douze jours que je suis monté à Jérusalem pour y rendre un culte à Dieu. '
  '12':
  - type: text
    content: 'Or, personne ne m’a vu dans la cour du Temple en train de discuter avec quelqu’un. Jamais on ne m’a surpris à soulever le peuple ni dans les synagogues, ni dans la ville, '
  '13':
  - type: text
    content: 'et ces gens ne peuvent pas apporter la moindre preuve pour appuyer les accusations qu’ils viennent de porter contre moi. '
  '14':
  - type: text
    content: 'Certes, je le reconnais volontiers devant toi : je sers le Dieu de mes ancêtres suivant la « Voie » qu’ils qualifient de « secte » ; je crois tout ce qui est écrit dans la Loi et les prophètes. '
  '15':
  - type: text
    content: 'J’ai cette espérance en Dieu – et cette espérance est aussi la leur – que les morts, justes et injustes, ressusciteront. '
  '16':
  - type: text
    content: C’est pourquoi je m’applique sans cesse, moi aussi, à garder une conscience irréprochable, tant devant Dieu que devant les hommes.
  '17':
  - type: text
    content: 'Après plusieurs années d’absence, je suis revenu dans mon pays pour apporter une aide en argent aux gens de mon peuple et pour présenter des offrandes à Dieu. '
  '18':
  - type: text
    content: 'J’étais alors dans la cour du Temple, après avoir accompli les cérémonies de la purification ; il n’y avait autour de moi ni attroupement, ni désordre. Telle était la situation quand ils m’ont trouvé. '
  '19':
  - type: text
    content: 'Mais, en fait, ce sont des Juifs de la province d’Asie qui m’ont trouvé, et ce sont eux qui devraient être ici pour soutenir leurs accusations devant toi, s’ils ont quelque reproche à me faire. '
  '2':
  - type: text
    content: 'On appela celui-ci et Tertulle commença son réquisitoire en ces termes :'
  - type: text
    content: 'Excellence, grâce à toi, à ta sage administration et aux réformes que ta sollicitude pour ce peuple t’a inspirées, nous jouissons d’une paix parfaite. '
  '20':
  - type: text
    content: 'Ou bien alors, que ceux qui sont ici présents disent de quel méfait ils m’ont reconnu coupable lorsque j’ai comparu devant le Grand-Conseil. '
  '21':
  - type: text
    content: 'A moins qu’ils ne me fassent grief de cette seule phrase que j’ai lancée, debout devant eux : « Si je suis mis en accusation, c’est parce que je crois en la résurrection des morts. »'
  '22':
  - type: text
    content: 'Alors Félix, qui était très bien renseigné au sujet de la « Voie », ajourna le procès en disant : Quand le commandant Lysias viendra ici, j’examinerai votre affaire.'
  '23':
  - type: text
    content: Il donna à l’officier responsable de Paul l’ordre de le garder prisonnier, mais en lui laissant une certaine liberté et sans empêcher sa parenté et ses amis de venir lui rendre des services.
  '24':
  - type: text
    content: Quelques jours plus tard, Félix revint, accompagné de sa femme Drusille
  - type: note
    content: 'Drusille: fille cadette d’Hérode Agrippa Ier. Mariée au roi d’Emèse, elle lui fut enlevée par Félix.'
  - type: text
    content: ' qui était juive. Il fit appeler Paul et il l’écouta parler de la foi en Jésus-Christ.'
  '25':
  - type: text
    content: 'Mais lorsque Paul en vint à ce qu’est la juste manière de vivre, à la maîtrise de soi et au jugement à venir, Félix prit peur et lui dit : Pour aujourd’hui, cela suffit : tu peux te retirer. Quand j’en aurai le temps, je te ferai rappeler.'
  '26':
  - type: text
    content: Il nourrissait l’espoir que Paul lui donnerait de l’argent. C’est pourquoi il le faisait venir assez souvent pour s’entretenir avec lui.
  '27':
  - type: text
    content: Deux années s’écoulèrent ainsi ; après quoi, Félix fut remplacé par Porcius Festus
  - type: note
    content: Festus prit le gouvernement de la Judée vers 59-60.
  - type: text
    content: . Mais, pour se ménager les bonnes grâces des Juifs, Félix laissa Paul en prison.
  '3':
  - type: text
    content: 'Sois assuré, très excellent gouverneur Félix, que partout et toujours, nous en éprouvons la plus vive gratitude. '
  '4':
  - type: text
    content: Toutefois, nous ne voudrions pas te retenir trop longtemps. Je te prie seulement de nous accorder pour quelques instants ta bienveillante attention.
  '5':
  - type: text
    content: 'Nous avons découvert que cet individu est un danger public : il provoque des troubles chez tous les Juifs dans le monde entier, c’est un chef de la secte des Nazaréens'
  - type: note
    content: 'Nazaréens: voir Mt 2.23.'
  - type: text
    content: ', '
  '6':
  - type: text
    content: 'et il a même tenté de profaner le Temple. C’est alors que nous l’avons arrêté. [Nous voulions le juger d’après notre Loi. '
  '7':
  - type: text
    content: 'Mais le commandant Lysias est intervenu avec beaucoup de violence et l’a arraché de nos mains, '
  '8':
  - type: text
    content: nous ordonnant de porter notre accusation devant toi
  - type: note
    content: Le passage entre crochets est absent de plusieurs manuscrits.
  - type: text
    content: .] Procède toi-même à son interrogatoire et tu pourras reconnaître, d’après ses réponses, le bien-fondé de toutes nos accusations contre lui.
  '9':
  - type: text
    content: 'Les Juifs s’empressèrent de confirmer ses paroles en disant : Oui, tout ce qu’il a dit est exact.'
