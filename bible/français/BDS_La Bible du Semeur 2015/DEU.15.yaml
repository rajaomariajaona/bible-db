document_id: DEU.15,21
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s2
    children:
    - type: text
      text: L’année de la remise des dettes et de la libération des esclaves
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Tous les sept ans, vous remettrez les dettes. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Donne-lui généreusement et non pas à contrecœur. Et pour cela, l’Eternel ton Dieu te bénira dans tout ce que tu feras et dans tout ce que tu entreprendras. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: En fait, il y aura toujours des nécessiteux
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '15.11 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Réminiscence en Mt 26.11 ; Mc 14.7 ; Jn 12.8.
      marker-yv: yv-n
    - type: text
      text: ' dans le pays : c’est pourquoi, je t’ordonne d’ouvrir toute grande ta main à ton compatriote, au malheureux et au pauvre dans ton pays.'
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Si l’un de tes compatriotes hébreux, homme ou femme, se vend à toi comme esclave, il sera à ton service pendant six ans. La septième année
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '15.12 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Non l’année sabbatique, mais la septième année après l’entrée en service. Cette loi s’applique à ceux qui avaient dû se vendre comme esclaves parce qu’ils ne pouvaient rembourser une dette.
      marker-yv: yv-n
    - type: text
      text: ', tu lui rendras la liberté'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '15.12 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Pour les v. 12-18, voir '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: Lv 25.39-46
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: '. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Mais le jour de sa libération, tu ne le laisseras pas partir les mains vides. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Tu lui donneras en présent une part de ce que l’Eternel t’aura accordé comme bénédiction : du petit bétail, du blé et du vin. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Souvenez-vous que vous avez vous-mêmes été esclaves en Egypte et que l’Eternel votre Dieu vous en a libérés. C’est pour cela que je vous donne aujourd’hui ce commandement.
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Il peut arriver que ton esclave te dise : « Je ne veux pas te quitter », parce qu’il s’est attaché à toi et à ta famille et qu’il est heureux chez toi'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '15.16 '
      - type: usfm
        marker: ft
        children:
        - type: usfm
          marker: ref
          children:
          - type: text
            text: Ex 21.5-6
        - type: text
          text: ' ajoute une autre raison : s’il veut rester avec sa famille.'
      marker-yv: yv-n
    - type: text
      text: '. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Alors tu prendras un poinçon et tu lui perceras l’oreille en l’appuyant contre le battant de ta porte
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '15.17 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Geste symbolisant le lien définitif entre lui et la famille de son maître.
      marker-yv: yv-n
    - type: text
      text: . Ainsi, il sera pour toujours ton serviteur. Tu agiras de même pour ta servante.
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Mais si tu dois rendre la liberté à un esclave, n’en sois pas contrarié, car après t’avoir servi pendant six ans, il t’a rapporté deux fois plus qu’un ouvrier salarié. Rends-lui donc sa liberté, et l’Eternel ton Dieu te bénira dans tout ce que tu entreprendras.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Les manifestations au sanctuaire unique
    marker-yv: yv-h
  - type: usfm
    marker: s2
    children:
    - type: text
      text: Loi sur les premiers-nés mâles du bétail
    marker-yv: yv-h
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Tu consacreras à l’Eternel ton Dieu tous les premiers-nés mâles de ton gros et ton petit bétail. Tu ne feras pas travailler un bœuf ou un taureau premier-né et tu ne tondras pas un mouton premier-né
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '15.19 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Voir '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: Ex 13.12
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: '. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Voici ce qui concerne cette remise des dettes : lorsque l’année de la remise aura été proclamée en l’honneur de l’Eternel, tout créancier remettra la dette contractée envers lui par son prochain, qui est son compatriote, sans rien exiger de lui. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Tu les mangeras chaque année avec ta famille devant l’Eternel ton Dieu, au lieu que l’Eternel ton Dieu aura choisi
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '15.20 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Voir '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: Dt 14.23
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: '. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Si l’un de ces animaux a quelque tare, s’il est boiteux ou aveugle, ou s’il a n’importe quel autre défaut grave, tu ne l’offriras pas en sacrifice à l’Eternel ton Dieu. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Tu le mangeras là où tu habites et chacun pourra en manger, qu’il soit rituellement pur ou impur, comme lorsqu’on mange de la gazelle ou du cerf. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Toutefois, tu n’en mangeras pas le sang, que tu répandras sur la terre comme de l’eau
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '15.23 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Voir Gn 9.4 ; Lv 7.26-27 ; 17.10-14 ; Dt 12.16.
      marker-yv: yv-n
    - type: text
      text: .
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Vous pourrez exiger des étrangers le remboursement de leurs dettes, mais vous annulerez les dettes
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '15.3 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Puisqu’ils n’étaient pas obligés, comme les Israélites, de laisser leurs terres en friche cette année-là, ils pouvaient donc gagner de quoi rembourser leurs dettes.
      marker-yv: yv-n
    - type: text
      text: ' de vos compatriotes envers vous. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'En fait, il ne doit pas y avoir de pauvres parmi vous, car l’Eternel votre Dieu veut vous combler de bénédictions dans le pays qu’il vous donne comme patrimoine foncier pour que vous en preniez possession – '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'à condition toutefois que vous l’écoutiez pour obéir à tous les commandements que je vous transmets aujourd’hui et pour les appliquer, '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: car l’Eternel votre Dieu vous bénira comme il vous l’a promis. Alors vous prêterez de l’argent à beaucoup de peuples étrangers, sans jamais avoir besoin d’emprunter. En effet, vous dominerez beaucoup de peuples, et aucun ne vous dominera.
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Si l’un de tes compatriotes tombe dans la pauvreté dans le pays que l’Eternel ton Dieu te donne, tu ne lui fermeras pas ton cœur et tu ne lui refuseras pas ton aide. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Au contraire, tu lui ouvriras ta main toute grande et tu lui prêteras suffisamment selon ses besoins
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '15.8 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Voir '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: Lv 25.35
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: '. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Garde-toi bien de nourrir dans ton cœur des pensées mesquines et de te dire : « C’est bientôt la septième année, l’année de la remise des dettes » et, pour cette raison, de regarder ton compatriote pauvre d’un mauvais œil sans rien lui donner. Car alors, il se plaindrait de toi à l’Eternel et tu porterais la responsabilité d’une faute. '
