document_id: JER.14
type_code: fra
segments:
- type: usfm
  marker: s2
  children:
  - type: text
    text: Sécheresse et famine
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Voici ce que dit l’Eternel à Jérémie concernant la sécheresse :'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Juda est dans le deuil,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ses villes dépérissent,
- type: usfm
  marker: q1
  children:
  - type: text
    text: leurs habitants sont affligés, ╵au sujet du pays
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '14.2 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Autre traduction : '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: abattus à même le sol.
    marker-yv: yv-n
  - type: text
    text: ','
- type: usfm
  marker: q1
  children:
  - type: text
    text: et le cri plaintif de Jérusalem ╵se fait entendre.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Les notables envoient ╵les gens de basse condition ╵chercher de l’eau.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Arrivés aux citernes, ╵ils ne trouvent pas d’eau,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et ils reviennent ╵avec des cruches vides ;
- type: usfm
  marker: q1
  children:
  - type: text
    text: tout honteux et penauds,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ils se voilent la face
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '14.3 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: En signe de confusion ou de deuil.
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Le sol est crevassé
- type: usfm
  marker: q1
  children:
  - type: text
    text: car la pluie a manqué ╵dans le pays,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et les cultivateurs, ╵déçus dans leurs espoirs,
- type: usfm
  marker: q1
  children:
  - type: text
    text: se voilent le visage.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: La biche, dans les champs,
- type: usfm
  marker: q1
  children:
  - type: text
    text: abandonne son faon ╵après l’avoir mis bas,
- type: usfm
  marker: q1
  children:
  - type: text
    text: car il n’y a plus de verdure.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Les onagres se tiennent ╵sur les hauteurs,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et ils flairent le vent ╵comme font les chacals ;
- type: usfm
  marker: q1
  children:
  - type: text
    text: mais leurs yeux se fatiguent
- type: usfm
  marker: q1
  children:
  - type: text
    text: car il n’y a plus d’herbe.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Même si nos péchés ╵témoignent contre nous,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ô Eternel, agis ╵pour l’honneur de ton nom !
- type: usfm
  marker: q1
  children:
  - type: text
    text: Nos infidélités ╵se sont multipliées,
- type: usfm
  marker: q1
  children:
  - type: text
    text: nous avons péché contre toi.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Toi, l’espérance d’Israël,
- type: usfm
  marker: q1
  children:
  - type: text
    text: toi qui le sauves ╵au temps de la détresse,
- type: usfm
  marker: q1
  children:
  - type: text
    text: pourquoi te conduis-tu ╵comme un simple étranger ╵dans le pays,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ou comme un voyageur ╵qui se détourne de sa route ╵pour passer la nuit quelque part ?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Pourquoi te conduis-tu ╵comme un homme éperdu,
- type: usfm
  marker: q1
  children:
  - type: text
    text: comme un guerrier ╵qui ne peut délivrer ?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et pourtant, tu es parmi nous, ╵ô Eternel,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'et nous portons ton nom :'
- type: usfm
  marker: q1
  children:
  - type: text
    text: ne nous délaisse pas !
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Voici ce que déclare ╵l’Eternel à ce peuple :'
- type: usfm
  marker: q1
  children:
  - type: text
    text: « Ils trouvent leur plaisir ╵à vagabonder çà et là
- type: usfm
  marker: q1
  children:
  - type: text
    text: sans retenir leurs pas.
- type: usfm
  marker: q1
  children:
  - type: text
    text: L’Eternel ne les agrée pas.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Il va se souvenir ╵maintenant de leurs crimes,
- type: usfm
  marker: q1
  children:
  - type: text
    text: il va châtier leurs fautes. »
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Et l’Eternel me dit : Ne prie pas pour le bien-être de ce peuple ! '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Ils auront beau jeûner, je n’écouterai pas leurs supplications, et s’ils m’offrent des holocaustes et des offrandes, je ne les agréerai pas, je m’en vais les exterminer : par l’épée, par la famine et par la peste.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Et je lui répondis : Ah ! Seigneur, Eternel, les prophètes leur disent : « Vous ne connaîtrez pas la guerre et vous ne subirez pas la famine, car je vous donnerai en ce lieu-ci une paix véritable. »'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Et l’Eternel me dit : En mon nom, ces prophètes profèrent des mensonges. Je ne les ai pas mandatés, je ne leur ai rien ordonné et je ne leur ai pas parlé : toutes leurs prophéties sont visions mensongères, oracles sans valeur, des inventions venant d’eux-mêmes. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'C’est pourquoi voici ce que déclare l’Eternel au sujet des prophètes qui prophétisent en son nom sans avoir été envoyés, ces prophètes qui disent : « La guerre et la famine ne viendront pas dans ce pays ». C’est par la guerre et la famine que ces prophètes périront, '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: et les gens du peuple auxquels ils prophétisent seront jetés à terre dans les rues de Jérusalem par la famine et par l’épée, sans qu’il y ait personne pour les mettre au tombeau, ni eux, ni leurs femmes, ni leurs fils, ni leurs filles ; je ferai retomber sur eux le mal qu’ils ont commis.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Et toi, dis-leur ceci :'
- type: usfm
  marker: q1
  children:
  - type: text
    text: « Sans cesse, nuit et jour, ╵mes yeux versent des larmes, ╵ils ne tarissent pas !
- type: usfm
  marker: q1
  children:
  - type: text
    text: Car un malheur terrible va atteindre
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'la communauté de mon peuple :'
- type: usfm
  marker: q1
  children:
  - type: text
    text: c’est une plaie très douloureuse.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Si je sors dans les champs,
- type: usfm
  marker: q1
  children:
  - type: text
    text: je vois des morts, ╵victimes de l’épée ;
- type: usfm
  marker: q1
  children:
  - type: text
    text: si j’entre dans la ville,
- type: usfm
  marker: q1
  children:
  - type: text
    text: je vois des gens, ╵affaiblis par la faim !
- type: usfm
  marker: q1
  children:
  - type: text
    text: Le prophète et le prêtre ╵parcourent le pays
- type: usfm
  marker: q1
  children:
  - type: text
    text: sans rien comprendre. »
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: As-tu donc vraiment rejeté Juda ?
- type: usfm
  marker: q1
  children:
  - type: text
    text: As-tu pris Sion en dégoût ?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Pourquoi nous as-tu infligé ╵de telles plaies
- type: usfm
  marker: q1
  children:
  - type: text
    text: sans qu’il y ait ╵de guérison pour nous ?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Nous espérions la paix,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et rien de bon n’arrive,
- type: usfm
  marker: q1
  children:
  - type: text
    text: un temps de guérison,
- type: usfm
  marker: q1
  children:
  - type: text
    text: en fait, c’est l’épouvante.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Eternel, nous reconnaissons ╵notre méchanceté,
- type: usfm
  marker: q1
  children:
  - type: text
    text: les fautes de nos pères.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Car nous avons ╵commis des péchés contre toi.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Pour l’honneur de ton nom, ╵ne nous méprise pas,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ne laisse pas déshonorer ╵le trône de ta gloire
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '14.21 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'C’est-à-dire le coffre de l’alliance et, par extension, le temple qui le contient, la ville où il se trouve (voir '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 3.16-17
        metadata:
          usfm: JER.3.16+JER.3.17
      - type: text
        text: ).
    marker-yv: yv-n
  - type: text
    text: '  ;'
- type: usfm
  marker: q1
  children:
  - type: text
    text: et n’oublie pas l’alliance ╵que tu as conclue avec nous, ╵ne la révoque pas !
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: Qui, parmi les faux dieux ╵des autres peuples,
- type: usfm
  marker: q1
  children:
  - type: text
    text: peut donner de la pluie ?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ou bien est-ce le ciel ╵qui pourrait, par lui-même, ╵déclencher les averses ?
- type: usfm
  marker: q1
  children:
  - type: text
    text: N’est-ce pas toi, ╵Eternel, notre Dieu,
- type: usfm
  marker: q1
  children:
  - type: text
    text: toi sur qui nous comptons ?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Car c’est toi seul, ╵qui fais toutes ces choses.
