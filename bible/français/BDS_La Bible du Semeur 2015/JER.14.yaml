document_id: JER.14,21
type_code: fra
verses:
  '1':
  - type: heading
    content: Sécheresse et famine
  - type: text
    content: 'Voici ce que dit l’Eternel à Jérémie concernant la sécheresse :'
  '10':
  - type: text
    content: 'Voici ce que déclare ╵l’Eternel à ce peuple :'
  - type: text
    content: « Ils trouvent leur plaisir ╵à vagabonder çà et là
  - type: text
    content: sans retenir leurs pas.
  - type: text
    content: L’Eternel ne les agrée pas.
  - type: text
    content: Il va se souvenir ╵maintenant de leurs crimes,
  - type: text
    content: il va châtier leurs fautes. »
  '11':
  - type: text
    content: 'Et l’Eternel me dit : Ne prie pas pour le bien-être de ce peuple ! '
  '12':
  - type: text
    content: 'Ils auront beau jeûner, je n’écouterai pas leurs supplications, et s’ils m’offrent des holocaustes et des offrandes, je ne les agréerai pas, je m’en vais les exterminer : par l’épée, par la famine et par la peste.'
  '13':
  - type: text
    content: 'Et je lui répondis : Ah ! Seigneur, Eternel, les prophètes leur disent : « Vous ne connaîtrez pas la guerre et vous ne subirez pas la famine, car je vous donnerai en ce lieu-ci une paix véritable. »'
  '14':
  - type: text
    content: 'Et l’Eternel me dit : En mon nom, ces prophètes profèrent des mensonges. Je ne les ai pas mandatés, je ne leur ai rien ordonné et je ne leur ai pas parlé : toutes leurs prophéties sont visions mensongères, oracles sans valeur, des inventions venant d’eux-mêmes. '
  '15':
  - type: text
    content: 'C’est pourquoi voici ce que déclare l’Eternel au sujet des prophètes qui prophétisent en son nom sans avoir été envoyés, ces prophètes qui disent : « La guerre et la famine ne viendront pas dans ce pays ». C’est par la guerre et la famine que ces prophètes périront, '
  '16':
  - type: text
    content: et les gens du peuple auxquels ils prophétisent seront jetés à terre dans les rues de Jérusalem par la famine et par l’épée, sans qu’il y ait personne pour les mettre au tombeau, ni eux, ni leurs femmes, ni leurs fils, ni leurs filles ; je ferai retomber sur eux le mal qu’ils ont commis.
  '17':
  - type: text
    content: 'Et toi, dis-leur ceci :'
  - type: text
    content: « Sans cesse, nuit et jour, ╵mes yeux versent des larmes, ╵ils ne tarissent pas !
  - type: text
    content: Car un malheur terrible va atteindre
  - type: text
    content: 'la communauté de mon peuple :'
  - type: text
    content: c’est une plaie très douloureuse.
  '18':
  - type: text
    content: Si je sors dans les champs,
  - type: text
    content: je vois des morts, ╵victimes de l’épée ;
  - type: text
    content: si j’entre dans la ville,
  - type: text
    content: je vois des gens, ╵affaiblis par la faim !
  - type: text
    content: Le prophète et le prêtre ╵parcourent le pays
  - type: text
    content: sans rien comprendre. »
  '19':
  - type: text
    content: As-tu donc vraiment rejeté Juda ?
  - type: text
    content: As-tu pris Sion en dégoût ?
  - type: text
    content: Pourquoi nous as-tu infligé ╵de telles plaies
  - type: text
    content: sans qu’il y ait ╵de guérison pour nous ?
  - type: text
    content: Nous espérions la paix,
  - type: text
    content: et rien de bon n’arrive,
  - type: text
    content: un temps de guérison,
  - type: text
    content: en fait, c’est l’épouvante.
  '2':
  - type: text
    content: Juda est dans le deuil,
  - type: text
    content: ses villes dépérissent,
  - type: text
    content: leurs habitants sont affligés, ╵au sujet du pays
  - type: note
    content: 'Autre traduction : abattus à même le sol.'
  - type: text
    content: ','
  - type: text
    content: et le cri plaintif de Jérusalem ╵se fait entendre.
  '20':
  - type: text
    content: Eternel, nous reconnaissons ╵notre méchanceté,
  - type: text
    content: les fautes de nos pères.
  - type: text
    content: Car nous avons ╵commis des péchés contre toi.
  '21':
  - type: text
    content: Pour l’honneur de ton nom, ╵ne nous méprise pas,
  - type: text
    content: ne laisse pas déshonorer ╵le trône de ta gloire
  - type: note
    content: C’est-à-dire le coffre de l’alliance et, par extension, le temple qui le contient, la ville où il se trouve (voir 3.16-17).
  - type: text
    content: '  ;'
  - type: text
    content: et n’oublie pas l’alliance ╵que tu as conclue avec nous, ╵ne la révoque pas !
  '22':
  - type: text
    content: Qui, parmi les faux dieux ╵des autres peuples,
  - type: text
    content: peut donner de la pluie ?
  - type: text
    content: Ou bien est-ce le ciel ╵qui pourrait, par lui-même, ╵déclencher les averses ?
  - type: text
    content: N’est-ce pas toi, ╵Eternel, notre Dieu,
  - type: text
    content: toi sur qui nous comptons ?
  - type: text
    content: Car c’est toi seul, ╵qui fais toutes ces choses.
  '3':
  - type: text
    content: Les notables envoient ╵les gens de basse condition ╵chercher de l’eau.
  - type: text
    content: Arrivés aux citernes, ╵ils ne trouvent pas d’eau,
  - type: text
    content: et ils reviennent ╵avec des cruches vides ;
  - type: text
    content: tout honteux et penauds,
  - type: text
    content: ils se voilent la face
  - type: note
    content: En signe de confusion ou de deuil.
  - type: text
    content: .
  '4':
  - type: text
    content: Le sol est crevassé
  - type: text
    content: car la pluie a manqué ╵dans le pays,
  - type: text
    content: et les cultivateurs, ╵déçus dans leurs espoirs,
  - type: text
    content: se voilent le visage.
  '5':
  - type: text
    content: La biche, dans les champs,
  - type: text
    content: abandonne son faon ╵après l’avoir mis bas,
  - type: text
    content: car il n’y a plus de verdure.
  '6':
  - type: text
    content: Les onagres se tiennent ╵sur les hauteurs,
  - type: text
    content: et ils flairent le vent ╵comme font les chacals ;
  - type: text
    content: mais leurs yeux se fatiguent
  - type: text
    content: car il n’y a plus d’herbe.
  '7':
  - type: text
    content: Même si nos péchés ╵témoignent contre nous,
  - type: text
    content: ô Eternel, agis ╵pour l’honneur de ton nom !
  - type: text
    content: Nos infidélités ╵se sont multipliées,
  - type: text
    content: nous avons péché contre toi.
  '8':
  - type: text
    content: Toi, l’espérance d’Israël,
  - type: text
    content: toi qui le sauves ╵au temps de la détresse,
  - type: text
    content: pourquoi te conduis-tu ╵comme un simple étranger ╵dans le pays,
  - type: text
    content: ou comme un voyageur ╵qui se détourne de sa route ╵pour passer la nuit quelque part ?
  '9':
  - type: text
    content: Pourquoi te conduis-tu ╵comme un homme éperdu,
  - type: text
    content: comme un guerrier ╵qui ne peut délivrer ?
  - type: text
    content: Et pourtant, tu es parmi nous, ╵ô Eternel,
  - type: text
    content: 'et nous portons ton nom :'
  - type: text
    content: ne nous délaisse pas !
