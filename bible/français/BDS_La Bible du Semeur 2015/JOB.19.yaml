document_id: JOB.19
type_code: fra
segments:
- type: usfm
  marker: ms1
  children:
  - type: text
    text: Réponse de Job à Bildad
  marker-yv: yv-h
- type: usfm
  marker: s1
  children:
  - type: text
    text: Dieu s’acharne-t-il contre moi ?
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Et Job prit la parole et dit :'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Jusques à quand ╵me tourmenterez-vous ?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Oui, jusqu’à quand ╵allez-vous m’accabler ╵de vos discours ?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Voilà déjà dix fois ╵que vous me flétrissez !
- type: usfm
  marker: q1
  children:
  - type: text
    text: N’avez-vous donc pas honte ╵de m’outrager ainsi ?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Même s’il était vrai ╵que j’aie fait fausse route,
- type: usfm
  marker: q1
  children:
  - type: text
    text: après tout, c’est moi seul ╵que mon erreur concerne.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Quant à vous, si vraiment ╵vous voulez vous montrer ╵bien supérieurs à moi,
- type: usfm
  marker: q1
  children:
  - type: text
    text: si vous me reprochez ╵mon humiliation,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: sachez bien que c’est Dieu ╵qui a violé mon droit
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '19.6 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Autre traduction : '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: qui m’opprime.
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: text
    text: et qui, autour de moi, ╵a tendu ses filets.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Si je crie à la violence ╵dont je suis la victime, ╵personne ne répond,
- type: usfm
  marker: q1
  children:
  - type: text
    text: si j’appelle au secours, ╵il n’est pas fait justice.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Il a bloqué ma route, ╵et je ne puis passer.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Il a enveloppé ╵mes sentiers de ténèbres.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Il m’a ravi ma dignité,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et la couronne de ma tête ╵il l’a ôtée.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Il m’a détruit de tous côtés ╵et je vais disparaître.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Il a déraciné ╵mon espoir comme un arbre.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Contre moi, il déchaîne ╵le feu de sa colère,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et il me considère ╵comme son adversaire.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Ses bataillons, ensemble, ╵se sont tous mis en route,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et jusqu’à moi ╵ils se sont frayé leur chemin,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ils ont dressé leur camp ╵autour de ma demeure
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '19.12 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Comme une armée faisant le siège d’une ville ; les troupes envoyées par Dieu sont les nombreux maux dont Job souffre.
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Il a fait s’éloigner ╵de moi ma parenté
- type: usfm
  marker: q1
  children:
  - type: text
    text: et ceux qui me connaissent ╵se détournent de moi.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Mes proches et mes connaissances ╵m’ont tous abandonné,
- type: usfm
  marker: q1
  children:
  - type: text
    text: les hôtes de passage, ╵dans ma maison, ╵m’ont oublié,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: et mes propres servantes
- type: usfm
  marker: q1
  children:
  - type: text
    text: font comme si j’étais ╵un étranger.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Je ne suis plus pour eux ╵qu’un inconnu.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: J’appelle mon esclave, ╵et il ne répond pas,
- type: usfm
  marker: q1
  children:
  - type: text
    text: même si je l’implore.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Mon haleine répugne ╵à ma femme elle-même,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et les fils de ma mère ╵me prennent en dégoût.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Les petits enfants même ╵me montrent leur dédain
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '19.18 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Insulte suprême en Orient où les personnes âgées jouissaient d’un grand respect (
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ex 20.12
        metadata:
          usfm: EXO.20.12
      - type: text
        text: ).
    marker-yv: yv-n
  - type: text
    text: '  :'
- type: usfm
  marker: q1
  children:
  - type: text
    text: quand je veux me lever, ╵ils jasent sur mon compte.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Ils ont horreur de moi, ╵tous mes amis intimes
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '19.19 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Autre traduction : '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: ceux qui siégeaient au conseil à mes côtés.
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ceux que j’aimais le plus ╵se tournent contre moi.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Ma peau colle à mes os ╵de même que ma chair
- type: usfm
  marker: q1
  children:
  - type: text
    text: et je n’ai survécu ╵qu’avec la peau des dents
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '19.20 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Cela pourrait désigner les gencives. D’autres y voient une expression proverbiale signifiant : '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: j’ai tout perdu.
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Ayez pitié de moi, ╵ayez pitié de moi, ╵vous, du moins, mes amis !
- type: usfm
  marker: q1
  children:
  - type: text
    text: Car, la main de Dieu m’a frappé.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: Pourquoi vous acharner ╵sur moi, tout comme Dieu ?
- type: usfm
  marker: q1
  children:
  - type: text
    text: N’en avez-vous donc pas assez ╵de me persécuter ?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: Oh ! si quelqu’un voulait ╵consigner mes paroles !
- type: usfm
  marker: q1
  children:
  - type: text
    text: Si quelqu’un voulait bien ╵les graver dans un livre !
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: Que d’une pointe en fer ╵ou d’un stylet de plomb
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '19.24 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: On gravait des mots dans la pierre avec une pointe en fer, puis on passait dans le creux avec un stylet de plomb pour le noircir et rendre les lettres plus lisibles. Job veut que sa défense subsiste après sa mort jusqu’à ce qu’il soit réhabilité.
    marker-yv: yv-n
  - type: text
    text: ','
- type: usfm
  marker: q1
  children:
  - type: text
    text: elles soient incisées ╵pour toujours dans le roc !
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Mais je sais, moi, ╵que mon défenseur est vivant :'
- type: usfm
  marker: q1
  children:
  - type: text
    text: en dernier lieu ╵il surgira sur la poussière.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: Après que cette peau ╵aura été détruite,
- type: usfm
  marker: q1
  children:
  - type: text
    text: moi, dans mon corps
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '19.26 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'D’autres comprennent : '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: hors de mon corps.
    marker-yv: yv-n
  - type: text
    text: ', ╵je contemplerai Dieu.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: Oui, moi, je le verrai ╵prendre alors mon parti
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '19.27 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Littéralement : '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'pour moi ; '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'certains traduisent : '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: je le verrai moi-même.
    marker-yv: yv-n
  - type: text
    text: ','
- type: usfm
  marker: q1
  children:
  - type: text
    text: et, de mes propres yeux, ╵je le contemplerai. ╵Et il ne sera plus ╵un étranger pour moi
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '19.27 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Certains traduisent : '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'je le contemplerai, moi, et pas un étranger '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'ou '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: je le contemplerai, et pas comme un étranger.
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ah ! mon cœur se consume ╵d’attente au fond de moi.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'Vous qui vous demandez : ╵« Comment allons-nous le poursuivre ? »'
- type: usfm
  marker: q1
  children:
  - type: text
    text: et qui trouvez en moi ╵la racine du mal,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: craignez pour vous l’épée,
- type: usfm
  marker: q1
  children:
  - type: text
    text: car votre acharnement ╵est passible du glaive.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ainsi vous apprendrez ╵qu’il y a bien un jugement.
