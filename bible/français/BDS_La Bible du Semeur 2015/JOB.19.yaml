document_id: JOB.19,21
type_code: fra
verses:
  '1':
  - type: heading
    content: Réponse de Job à Bildad
  - type: heading
    content: Dieu s’acharne-t-il contre moi ?
  - type: text
    content: 'Et Job prit la parole et dit :'
  '10':
  - type: text
    content: Il m’a détruit de tous côtés ╵et je vais disparaître.
  - type: text
    content: Il a déraciné ╵mon espoir comme un arbre.
  '11':
  - type: text
    content: Contre moi, il déchaîne ╵le feu de sa colère,
  - type: text
    content: et il me considère ╵comme son adversaire.
  '12':
  - type: text
    content: Ses bataillons, ensemble, ╵se sont tous mis en route,
  - type: text
    content: et jusqu’à moi ╵ils se sont frayé leur chemin,
  - type: text
    content: ils ont dressé leur camp ╵autour de ma demeure
  - type: note
    content: Comme une armée faisant le siège d’une ville ; les troupes envoyées par Dieu sont les nombreux maux dont Job souffre.
  - type: text
    content: .
  '13':
  - type: text
    content: Il a fait s’éloigner ╵de moi ma parenté
  - type: text
    content: et ceux qui me connaissent ╵se détournent de moi.
  '14':
  - type: text
    content: Mes proches et mes connaissances ╵m’ont tous abandonné,
  - type: text
    content: les hôtes de passage, ╵dans ma maison, ╵m’ont oublié,
  '15':
  - type: text
    content: et mes propres servantes
  - type: text
    content: font comme si j’étais ╵un étranger.
  - type: text
    content: Je ne suis plus pour eux ╵qu’un inconnu.
  '16':
  - type: text
    content: J’appelle mon esclave, ╵et il ne répond pas,
  - type: text
    content: même si je l’implore.
  '17':
  - type: text
    content: Mon haleine répugne ╵à ma femme elle-même,
  - type: text
    content: et les fils de ma mère ╵me prennent en dégoût.
  '18':
  - type: text
    content: Les petits enfants même ╵me montrent leur dédain
  - type: note
    content: Insulte suprême en Orient où les personnes âgées jouissaient d’un grand respect (Ex 20.12).
  - type: text
    content: '  :'
  - type: text
    content: quand je veux me lever, ╵ils jasent sur mon compte.
  '19':
  - type: text
    content: Ils ont horreur de moi, ╵tous mes amis intimes
  - type: note
    content: 'Autre traduction : ceux qui siégeaient au conseil à mes côtés.'
  - type: text
    content: .
  - type: text
    content: Ceux que j’aimais le plus ╵se tournent contre moi.
  '2':
  - type: text
    content: Jusques à quand ╵me tourmenterez-vous ?
  - type: text
    content: Oui, jusqu’à quand ╵allez-vous m’accabler ╵de vos discours ?
  '20':
  - type: text
    content: Ma peau colle à mes os ╵de même que ma chair
  - type: text
    content: et je n’ai survécu ╵qu’avec la peau des dents
  - type: note
    content: 'Cela pourrait désigner les gencives. D’autres y voient une expression proverbiale signifiant : j’ai tout perdu.'
  - type: text
    content: .
  '21':
  - type: text
    content: Ayez pitié de moi, ╵ayez pitié de moi, ╵vous, du moins, mes amis !
  - type: text
    content: Car, la main de Dieu m’a frappé.
  '22':
  - type: text
    content: Pourquoi vous acharner ╵sur moi, tout comme Dieu ?
  - type: text
    content: N’en avez-vous donc pas assez ╵de me persécuter ?
  '23':
  - type: text
    content: Oh ! si quelqu’un voulait ╵consigner mes paroles !
  - type: text
    content: Si quelqu’un voulait bien ╵les graver dans un livre !
  '24':
  - type: text
    content: Que d’une pointe en fer ╵ou d’un stylet de plomb
  - type: note
    content: On gravait des mots dans la pierre avec une pointe en fer, puis on passait dans le creux avec un stylet de plomb pour le noircir et rendre les lettres plus lisibles. Job veut que sa défense subsiste après sa mort jusqu’à ce qu’il soit réhabilité.
  - type: text
    content: ','
  - type: text
    content: elles soient incisées ╵pour toujours dans le roc !
  '25':
  - type: text
    content: 'Mais je sais, moi, ╵que mon défenseur est vivant :'
  - type: text
    content: en dernier lieu ╵il surgira sur la poussière.
  '26':
  - type: text
    content: Après que cette peau ╵aura été détruite,
  - type: text
    content: moi, dans mon corps
  - type: note
    content: 'D’autres comprennent : hors de mon corps.'
  - type: text
    content: ', ╵je contemplerai Dieu.'
  '27':
  - type: text
    content: Oui, moi, je le verrai ╵prendre alors mon parti
  - type: note
    content: 'Littéralement : pour moi ; certains traduisent : je le verrai moi-même.'
  - type: text
    content: ','
  - type: text
    content: et, de mes propres yeux, ╵je le contemplerai. ╵Et il ne sera plus ╵un étranger pour moi
  - type: note
    content: 'Certains traduisent : je le contemplerai, moi, et pas un étranger ou je le contemplerai, et pas comme un étranger.'
  - type: text
    content: .
  - type: text
    content: Ah ! mon cœur se consume ╵d’attente au fond de moi.
  '28':
  - type: text
    content: 'Vous qui vous demandez : ╵« Comment allons-nous le poursuivre ? »'
  - type: text
    content: et qui trouvez en moi ╵la racine du mal,
  '29':
  - type: text
    content: craignez pour vous l’épée,
  - type: text
    content: car votre acharnement ╵est passible du glaive.
  - type: text
    content: Ainsi vous apprendrez ╵qu’il y a bien un jugement.
  '3':
  - type: text
    content: Voilà déjà dix fois ╵que vous me flétrissez !
  - type: text
    content: N’avez-vous donc pas honte ╵de m’outrager ainsi ?
  '4':
  - type: text
    content: Même s’il était vrai ╵que j’aie fait fausse route,
  - type: text
    content: après tout, c’est moi seul ╵que mon erreur concerne.
  '5':
  - type: text
    content: Quant à vous, si vraiment ╵vous voulez vous montrer ╵bien supérieurs à moi,
  - type: text
    content: si vous me reprochez ╵mon humiliation,
  '6':
  - type: text
    content: sachez bien que c’est Dieu ╵qui a violé mon droit
  - type: note
    content: 'Autre traduction : qui m’opprime.'
  - type: text
    content: et qui, autour de moi, ╵a tendu ses filets.
  '7':
  - type: text
    content: Si je crie à la violence ╵dont je suis la victime, ╵personne ne répond,
  - type: text
    content: si j’appelle au secours, ╵il n’est pas fait justice.
  '8':
  - type: text
    content: Il a bloqué ma route, ╵et je ne puis passer.
  - type: text
    content: Il a enveloppé ╵mes sentiers de ténèbres.
  '9':
  - type: text
    content: Il m’a ravi ma dignité,
  - type: text
    content: et la couronne de ma tête ╵il l’a ôtée.
