document_id: 2CH.14
type_code: fra
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Asa fit ce que l’Eternel son Dieu considère comme bien et juste.
- type: usfm
  marker: r
  children:
  - type: text
    text: (1 R 15.11-12)
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Il fit disparaître les autels des divinités étrangères et les hauts lieux, il brisa les stèles sacrées et abattit les poteaux d’Ashéra. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Il demanda aux Judéens de s’attacher à l’Eternel, le Dieu de leurs ancêtres, et d’obéir aux commandements de la Loi.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Il fit détruire les hauts lieux et les autels à parfums
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '14.4 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Terme de sens incertain. Il pourrait aussi s’agir d’un sanctuaire différent d’un haut lieu.
    marker-yv: yv-n
  - type: text
    text: ' dans toutes les villes de Juda, et le royaume fut tranquille sous son règne.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Il profita de cette période de paix pour bâtir des villes fortifiées en Juda et, pendant toutes ces années-là, il n’eut à soutenir aucune guerre, car l’Eternel lui assurait la paix. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Il déclara donc aux Judéens : Bâtissons ces villes et entourons-les de murailles jalonnées de tours et de portes à verrous pendant que nous sommes maîtres du pays, puisque nous avons cherché à faire la volonté de l’Eternel, notre Dieu. Parce que nous sommes attachés à lui, il nous a accordé la paix sur toutes nos frontières.'
- type: usfm
  marker: p
  children:
  - type: text
    text: Ils se mirent donc à bâtir et réussirent cette entreprise.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Les victoires d’Asa
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Asa avait une armée de trois cent mille hommes de Juda équipés de lances et de grands boucliers et de deux cent quatre-vingt mille de Benjamin portant le petit bouclier et maniant l’arc ; tous étaient de valeureux guerriers. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: L’Ethiopien Zérah se mit en campagne contre eux avec une armée d’un million d’hommes et de trois cents chars, il s’avança jusqu’à Marésha
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '14.8 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: A une quarantaine de kilomètres à l’ouest de Jérusalem (voir Jos 15.44 ; 2 Ch 11.8).
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Asa marcha au-devant de lui, et les deux armées se rangèrent en ordre de bataille dans la vallée de Tsephata, près de Marésha. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Asa invoqua l’Eternel, son Dieu. Il pria : Eternel, personne d’autre que toi ne peut venir en aide à un faible contre un fort. Viens donc à notre secours, Eternel notre Dieu ! Car c’est sur toi que nous nous appuyons, et c’est en ton nom que nous marchons contre cette multitude. Eternel, tu es notre Dieu, ne permets pas qu’un homme l’emporte sur toi !'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Alors l’Eternel battit les Ethiopiens devant Asa et les Judéens, et ils prirent la fuite. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Asa et son armée les poursuivirent jusqu’à Guérar
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '14.12 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Vieille ville près de Gaza, sur la route d’Israël en Egypte (voir Gn 10.19 ; 20.1).
    marker-yv: yv-n
  - type: text
    text: '. Les Ethiopiens tombèrent en si grand nombre qu’il n’en subsista pas âme qui vive, car ils furent brisés par l’Eternel et par son armée. Asa et les siens rapportèrent un énorme butin. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Comme, à cause de l’Eternel, la terreur s’était emparée de toutes les villes situées dans les environs de Guérar, ils les attaquèrent, les battirent, et en emportèrent de grandes richesses. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Ils s’attaquèrent aussi aux parcs des troupeaux et ils capturèrent une grande quantité de moutons et de chèvres, ainsi que des chameaux. Après quoi, ils regagnèrent Jérusalem.
