document_id: 2CH.14,21
type_code: fra
verses:
  '1':
  - type: text
    content: Asa fit ce que l’Eternel son Dieu considère comme bien et juste.
  - type: heading
    content: (1 R 15.11-12)
  '10':
  - type: text
    content: 'Asa invoqua l’Eternel, son Dieu. Il pria : Eternel, personne d’autre que toi ne peut venir en aide à un faible contre un fort. Viens donc à notre secours, Eternel notre Dieu ! Car c’est sur toi que nous nous appuyons, et c’est en ton nom que nous marchons contre cette multitude. Eternel, tu es notre Dieu, ne permets pas qu’un homme l’emporte sur toi !'
  '11':
  - type: text
    content: 'Alors l’Eternel battit les Ethiopiens devant Asa et les Judéens, et ils prirent la fuite. '
  '12':
  - type: text
    content: Asa et son armée les poursuivirent jusqu’à Guérar
  - type: note
    content: Vieille ville près de Gaza, sur la route d’Israël en Egypte (voir Gn 10.19 ; 20.1).
  - type: text
    content: '. Les Ethiopiens tombèrent en si grand nombre qu’il n’en subsista pas âme qui vive, car ils furent brisés par l’Eternel et par son armée. Asa et les siens rapportèrent un énorme butin. '
  '13':
  - type: text
    content: 'Comme, à cause de l’Eternel, la terreur s’était emparée de toutes les villes situées dans les environs de Guérar, ils les attaquèrent, les battirent, et en emportèrent de grandes richesses. '
  '14':
  - type: text
    content: Ils s’attaquèrent aussi aux parcs des troupeaux et ils capturèrent une grande quantité de moutons et de chèvres, ainsi que des chameaux. Après quoi, ils regagnèrent Jérusalem.
  '2':
  - type: text
    content: 'Il fit disparaître les autels des divinités étrangères et les hauts lieux, il brisa les stèles sacrées et abattit les poteaux d’Ashéra. '
  '3':
  - type: text
    content: Il demanda aux Judéens de s’attacher à l’Eternel, le Dieu de leurs ancêtres, et d’obéir aux commandements de la Loi.
  '4':
  - type: text
    content: Il fit détruire les hauts lieux et les autels à parfums
  - type: note
    content: Terme de sens incertain. Il pourrait aussi s’agir d’un sanctuaire différent d’un haut lieu.
  - type: text
    content: ' dans toutes les villes de Juda, et le royaume fut tranquille sous son règne.'
  '5':
  - type: text
    content: 'Il profita de cette période de paix pour bâtir des villes fortifiées en Juda et, pendant toutes ces années-là, il n’eut à soutenir aucune guerre, car l’Eternel lui assurait la paix. '
  '6':
  - type: text
    content: 'Il déclara donc aux Judéens : Bâtissons ces villes et entourons-les de murailles jalonnées de tours et de portes à verrous pendant que nous sommes maîtres du pays, puisque nous avons cherché à faire la volonté de l’Eternel, notre Dieu. Parce que nous sommes attachés à lui, il nous a accordé la paix sur toutes nos frontières.'
  - type: text
    content: Ils se mirent donc à bâtir et réussirent cette entreprise.
  - type: heading
    content: Les victoires d’Asa
  '7':
  - type: text
    content: 'Asa avait une armée de trois cent mille hommes de Juda équipés de lances et de grands boucliers et de deux cent quatre-vingt mille de Benjamin portant le petit bouclier et maniant l’arc ; tous étaient de valeureux guerriers. '
  '8':
  - type: text
    content: L’Ethiopien Zérah se mit en campagne contre eux avec une armée d’un million d’hommes et de trois cents chars, il s’avança jusqu’à Marésha
  - type: note
    content: A une quarantaine de kilomètres à l’ouest de Jérusalem (voir Jos 15.44 ; 2 Ch 11.8).
  - type: text
    content: '. '
  '9':
  - type: text
    content: 'Asa marcha au-devant de lui, et les deux armées se rangèrent en ordre de bataille dans la vallée de Tsephata, près de Marésha. '
