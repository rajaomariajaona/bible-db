document_id: GEN.9,21
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: L’alliance avec Noé
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dieu bénit Noé et ses fils et leur dit : Soyez féconds, multipliez-vous et remplissez la terre. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'ainsi qu’avec tous les êtres vivants qui sont avec vous : oiseaux, bétail et bêtes sauvages, tous ceux qui sont sortis du bateau avec vous, tous les animaux de la terre. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Je m’engage envers vous par alliance à ce que toutes les créatures ne soient plus jamais détruites par les eaux d’un déluge et qu’il n’y ait plus de déluge pour ravager la terre.
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Et Dieu ajouta : Voici le signe de l’alliance que je conclus pour tous les âges à venir entre moi et vous et tout être vivant qui est avec vous : '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'je place mon arc dans les nuées ; il servira de signe d’alliance entre moi et la terre. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Quand j’amoncellerai des nuages au-dessus de la terre, l’arc apparaîtra dans la nuée ; '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'alors je me souviendrai de mon alliance avec vous et avec tout être vivant, quel qu’il soit, et les eaux ne formeront plus de déluge pour détruire toutes les créatures. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: L’arc sera dans la nuée, et je le regarderai pour me rappeler l’alliance éternelle conclue entre moi et tous les êtres vivants qui sont sur la terre.
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dieu répéta à Noé : Tel est le signe de l’alliance que j’ai établie entre moi et toute créature qui vit sur la terre.'
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Nouveau départ, nouveau péché
    marker-yv: yv-h
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Les fils de Noé qui sortirent du bateau étaient Sem, Cham et Japhet ; Cham était le père de Canaan. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: C’est à partir de ces trois fils de Noé que toute la terre fut repeuplée.
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Vous inspirerez désormais la crainte et la terreur à toutes les bêtes de la terre et à tous les oiseaux du ciel ; tous les animaux qui se meuvent sur la terre et tous les poissons de la mer sont livrés en votre pouvoir. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Noé se mit à cultiver la terre et il planta une vigne. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Il en but le vin et s’enivra, de sorte qu’il se mit tout nu au milieu de sa tente. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Cham, le père de Canaan, vit son père nu et sortit le raconter à ses deux frères. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Alors Sem et Japhet prirent la tunique de Noé et la placèrent sur leurs épaules. Puis ils marchèrent à reculons vers leur père et le couvrirent. Comme leur visage était tourné de l’autre côté, ils ne virent pas leur père tout nu. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Quand Noé se réveilla de son ivresse, il apprit ce que son plus jeune fils avait fait. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Alors il s’écria :'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Maudit soit Canaan !
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Qu’il soit le dernier des esclaves de ses frères !
  '26':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Puis il ajouta :'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Béni soit l’Eternel, le Dieu de Sem,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et que Canaan, de Sem soit l’esclave !
  '27':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Que Dieu étende ╵le territoire de Japhet,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: qu’il habite dans les tentes de Sem,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: que Canaan soit leur esclave !
  '28':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Après le déluge Noé vécut encore 350 ans. '
  '29':
  - type: usfm
    marker: p
    children:
    - type: text
      text: La durée totale de sa vie fut de 950 ans, puis il mourut.
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Tout ce qui remue et qui vit vous servira de nourriture comme les légumes et les plantes : je vous donne tout cela. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Toutefois, vous ne mangerez pas de viande contenant encore sa vie, c’est-à-dire son sang
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '9.4 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Interdiction destinée à réserver l’usage du sang aux sacrifices (voir Lv 7.26-27 ; 17.10-14 ; Dt 12.16, 23 ; 15.23).
      marker-yv: yv-n
    - type: text
      text: '. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Quant à votre sang à vous j’en demanderai compte pour votre vie. Quiconque le répandra, que ce soit un animal ou un être humain, je lui en demanderai compte. Je demanderai compte à chaque homme de la vie de son semblable.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Qui verse le sang d’un humain,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: par un humain, aura son sang versé.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Car l’être humain a été fait
  - type: usfm
    marker: q1
    children:
    - type: text
      text: en sorte d’être l’image de Dieu.
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Vous donc, soyez féconds, multipliez-vous et proliférez sur la terre, multipliez-vous.
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dieu dit encore à Noé et à ses fils : '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Pour ma part, je vais établir mon alliance avec vous et avec vos descendants après vous, '
