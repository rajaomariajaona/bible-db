document_id: MAT.20,21
type_code: fra
verses:
  '1':
  - type: heading
    content: La parabole du vigneron et de ses ouvriers
  - type: text
    content: ' '
  - type: text
    content: 'Voici, en effet, à quoi ressemble le '
  - type: text
    content: royaume des cieux
  - type: text
    content: '  : un propriétaire sort le matin de bonne heure afin d’embaucher des ouvriers pour travailler dans son vignoble.'
  - type: text
    content: ' '
  '10':
  - type: text
    content: 'Puis vient le tour des premiers engagés : ils s’attendent à recevoir davantage, mais eux aussi touchent chacun une pièce d’argent.'
  - type: text
    content: ' '
  '11':
  - type: text
    content: 'Lorsqu’ils la reçoivent, ils manifestent leur mécontentement à l’égard du propriétaire :'
  - type: text
    content: ' '
  '12':
  - type: text
    content: « Ceux-là sont arrivés les derniers, disent-ils, ils n’ont travaillé qu’une heure, et tu leur as donné autant qu’à nous qui avons travaillé dur toute la journée sous la forte chaleur. »
  '13':
  - type: text
    content: ' '
  - type: text
    content: 'Mais le maître répond à l’un d’eux : « Mon ami, dit-il, je ne te fais pas le moindre tort. Une pièce d’argent : n’est-ce pas le salaire sur lequel nous étions d’accord ?'
  - type: text
    content: ' '
  '14':
  - type: text
    content: Prends donc ce qui te revient et rentre chez toi. Si cela me fait plaisir de donner au dernier arrivé autant qu’à toi, cela me regarde.
  - type: text
    content: ' '
  '15':
  - type: text
    content: Ne puis-je pas disposer de mon argent comme je le veux ? Ou bien, m’en veux-tu pour ma bonté ? »
  '16':
  - type: text
    content: ' '
  - type: text
    content: Voilà comment les derniers seront les premiers et comment les premiers seront les derniers.
  - type: heading
    content: Ce qui attend Jésus à Jérusalem
  - type: heading
    content: (Mc 10.32-34 ; Lc 18.31-34)
  '17':
  - type: text
    content: 'Alors qu’il montait à Jérusalem, Jésus prit les Douze à part et leur dit, en cours de route : '
  '18':
  - type: text
    content: 'Voici, nous montons à Jérusalem. Le '
  - type: text
    content: Fils de l’homme
  - type: text
    content: ' y sera livré aux chefs des '
  - type: text
    content: prêtres
  - type: text
    content: ' et aux '
  - type: text
    content: spécialistes de la Loi
  - type: text
    content: . Ils le condamneront à mort,
  - type: text
    content: ' '
  '19':
  - type: text
    content: et le remettront entre les mains des païens pour qu’ils se moquent de lui, le battent à coups de fouet et le clouent sur une croix. Puis, le troisième jour, il ressuscitera.
  - type: heading
    content: Grandeur et service
  - type: heading
    content: (Mc 10.35-45 ; Lc 22.25-27)
  '2':
  - type: text
    content: Il convient avec eux de leur donner comme salaire une pièce d’argent pour la journée, puis il les envoie dans sa vigne.
  - type: text
    content: ' '
  '20':
  - type: text
    content: Alors, la femme de Zébédée, s’approcha de Jésus avec ses fils. Elle se prosterna devant lui pour lui demander une faveur.
  '21':
  - type: text
    content: ' '
  - type: text
    content: – Que désires-tu ?
  - type: text
    content: ' lui demanda-t-il.'
  - type: text
    content: 'Elle lui répondit : Voici mes deux fils. Promets-moi de faire siéger l’un à ta droite, l’autre à ta gauche, dans ton royaume.'
  '22':
  - type: text
    content: 'Jésus leur répondit : '
  - type: text
    content: Vous ne vous rendez pas compte de ce que vous demandez. Pouvez-vous boire la coupe que je vais boire ?
  - type: text
    content: – Oui, lui répondirent-ils, nous le pouvons.
  '23':
  - type: text
    content: 'Alors Jésus reprit : '
  - type: text
    content: Vous boirez, en effet, ma coupe, mais quant à siéger à ma droite ou à ma gauche, il ne m’appartient pas de vous l’accorder. Ces places reviendront à ceux pour qui mon Père les a préparées.
  '24':
  - type: text
    content: En entendant cela, les dix autres s’indignèrent contre les deux frères.
  '25':
  - type: text
    content: 'Alors Jésus les appela tous auprès de lui et dit : '
  - type: text
    content: 'Vous savez ce qui se passe dans les nations : les chefs politiques dominent sur leurs peuples et les grands personnages font peser sur eux leur autorité.'
  - type: text
    content: ' '
  '26':
  - type: text
    content: 'Qu’il n’en soit pas ainsi parmi vous. Au contraire : si quelqu’un veut être grand parmi vous, qu’il soit votre serviteur,'
  - type: text
    content: ' '
  '27':
  - type: text
    content: si quelqu’un veut être le premier parmi vous, qu’il soit votre esclave.
  - type: text
    content: ' '
  '28':
  - type: text
    content: 'Car, de même, le '
  - type: text
    content: Fils de l’homme
  - type: text
    content: ' n’est pas venu pour se faire servir, mais pour servir et donner sa vie en rançon'
  - type: note
    content: Somme versée pour racheter la liberté d’un esclave ou d’un prisonnier.
  - type: text
    content: ' '
  - type: text
    content: pour beaucoup.
  - type: heading
    content: La guérison de deux aveugles
  - type: heading
    content: (Mc 10.46-52 ; Lc 18.35-43)
  '29':
  - type: text
    content: Lorsqu’ils sortirent de Jéricho, une grande foule suivit Jésus.
  '3':
  - type: text
    content: Vers neuf heures du matin, il sort de nouveau et en aperçoit d’autres qui se tiennent sur la place du marché sans rien faire.
  - type: text
    content: ' '
  '30':
  - type: text
    content: 'Deux aveugles étaient assis au bord du chemin. Quand ils entendirent que Jésus passait par là, ils se mirent à crier : Seigneur'
  - type: note
    content: 'Certains manuscrits n’ont pas : Seigneur.'
  - type: text
    content: ', Fils de David, aie pitié de nous !'
  '31':
  - type: text
    content: 'La foule les rabroua pour les faire taire, mais ils se mirent à crier de plus belle : Seigneur, Fils de David, aie pitié de nous !'
  '32':
  - type: text
    content: 'Jésus s’arrêta, les appela et leur demanda : '
  - type: text
    content: Que voulez-vous que je fasse pour vous ?
  '33':
  - type: text
    content: – Seigneur, répondirent-ils, que nos yeux s’ouvrent !
  '34':
  - type: text
    content: Pris de compassion pour eux, Jésus leur toucha les yeux. Aussitôt, ils recouvrèrent la vue et le suivirent.
  '4':
  - type: text
    content: 'Il leur dit : « Vous aussi, allez travailler dans ma vigne et je vous paierai correctement. »'
  '5':
  - type: text
    content: ' '
  - type: text
    content: Ils y vont. Il sort encore vers midi, puis vers trois heures de l’après-midi et, chaque fois, il agit de la même manière.
  - type: text
    content: ' '
  '6':
  - type: text
    content: 'Enfin, étant ressorti à cinq heures du soir, il en trouve encore d’autres sur la place. Il leur dit : « Pourquoi restez-vous ainsi toute la journée à ne rien faire ?'
  '7':
  - type: text
    content: ' '
  - type: text
    content: – C’est que personne ne nous a embauchés.
  - type: text
    content: – Eh bien, vous aussi, allez travailler dans ma vigne ! »
  '8':
  - type: text
    content: ' '
  - type: text
    content: 'Le soir, le propriétaire du vignoble dit à son administrateur : « Fais venir les ouvriers et donne-leur la paye. Tu commenceras par ceux qui ont été engagés les derniers, pour finir par les premiers. »'
  '9':
  - type: text
    content: ' '
  - type: text
    content: Les ouvriers embauchés à cinq heures du soir se présentent d’abord et touchent chacun une pièce d’argent.
  - type: text
    content: ' '
