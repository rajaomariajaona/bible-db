document_id: MAT.20,21
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: La parabole du vigneron et de ses ouvriers
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'Voici, en effet, à quoi ressemble le '
      - type: usfm
        marker: w
        children:
        - type: text
          text: royaume des cieux
      - type: text
        text: '  : un propriétaire sort le matin de bonne heure afin d’embaucher des ouvriers pour travailler dans son vignoble.'
    - type: text
      text: ' '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'Puis vient le tour des premiers engagés : ils s’attendent à recevoir davantage, mais eux aussi touchent chacun une pièce d’argent.'
    - type: text
      text: ' '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'Lorsqu’ils la reçoivent, ils manifestent leur mécontentement à l’égard du propriétaire :'
    - type: text
      text: ' '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: « Ceux-là sont arrivés les derniers, disent-ils, ils n’ont travaillé qu’une heure, et tu leur as donné autant qu’à nous qui avons travaillé dur toute la journée sous la forte chaleur. »
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'Mais le maître répond à l’un d’eux : « Mon ami, dit-il, je ne te fais pas le moindre tort. Une pièce d’argent : n’est-ce pas le salaire sur lequel nous étions d’accord ?'
    - type: text
      text: ' '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Prends donc ce qui te revient et rentre chez toi. Si cela me fait plaisir de donner au dernier arrivé autant qu’à toi, cela me regarde.
    - type: text
      text: ' '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Ne puis-je pas disposer de mon argent comme je le veux ? Ou bien, m’en veux-tu pour ma bonté ? »
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Voilà comment les derniers seront les premiers et comment les premiers seront les derniers.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ce qui attend Jésus à Jérusalem
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: (Mc 10.32-34 ; Lc 18.31-34)
    marker-yv: yv-h
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Alors qu’il montait à Jérusalem, Jésus prit les Douze à part et leur dit, en cours de route : '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'Voici, nous montons à Jérusalem. Le '
      - type: usfm
        marker: w
        children:
        - type: text
          text: Fils de l’homme
      - type: text
        text: ' y sera livré aux chefs des '
      - type: usfm
        marker: w
        children:
        - type: text
          text: prêtres
      - type: text
        text: ' et aux '
      - type: usfm
        marker: w
        children:
        - type: text
          text: spécialistes de la Loi
      - type: text
        text: . Ils le condamneront à mort,
    - type: text
      text: ' '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: et le remettront entre les mains des païens pour qu’ils se moquent de lui, le battent à coups de fouet et le clouent sur une croix. Puis, le troisième jour, il ressuscitera.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Grandeur et service
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: (Mc 10.35-45 ; Lc 22.25-27)
    marker-yv: yv-h
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Il convient avec eux de leur donner comme salaire une pièce d’argent pour la journée, puis il les envoie dans sa vigne.
    - type: text
      text: ' '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Alors, la femme de Zébédée, s’approcha de Jésus avec ses fils. Elle se prosterna devant lui pour lui demander une faveur.
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: – Que désires-tu ?
    - type: text
      text: ' lui demanda-t-il.'
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Elle lui répondit : Voici mes deux fils. Promets-moi de faire siéger l’un à ta droite, l’autre à ta gauche, dans ton royaume.'
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Jésus leur répondit : '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Vous ne vous rendez pas compte de ce que vous demandez. Pouvez-vous boire la coupe que je vais boire ?
  - type: usfm
    marker: p
    children:
    - type: text
      text: – Oui, lui répondirent-ils, nous le pouvons.
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Alors Jésus reprit : '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Vous boirez, en effet, ma coupe, mais quant à siéger à ma droite ou à ma gauche, il ne m’appartient pas de vous l’accorder. Ces places reviendront à ceux pour qui mon Père les a préparées.
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: En entendant cela, les dix autres s’indignèrent contre les deux frères.
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Alors Jésus les appela tous auprès de lui et dit : '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'Vous savez ce qui se passe dans les nations : les chefs politiques dominent sur leurs peuples et les grands personnages font peser sur eux leur autorité.'
    - type: text
      text: ' '
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'Qu’il n’en soit pas ainsi parmi vous. Au contraire : si quelqu’un veut être grand parmi vous, qu’il soit votre serviteur,'
    - type: text
      text: ' '
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: si quelqu’un veut être le premier parmi vous, qu’il soit votre esclave.
    - type: text
      text: ' '
  '28':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'Car, de même, le '
      - type: usfm
        marker: w
        children:
        - type: text
          text: Fils de l’homme
      - type: text
        text: ' n’est pas venu pour se faire servir, mais pour servir et donner sa vie en rançon'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '20.28 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Somme versée pour racheter la liberté d’un esclave ou d’un prisonnier.
      marker-yv: yv-n
    - type: text
      text: ' '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: pour beaucoup.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: La guérison de deux aveugles
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: (Mc 10.46-52 ; Lc 18.35-43)
    marker-yv: yv-h
  '29':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Lorsqu’ils sortirent de Jéricho, une grande foule suivit Jésus.
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Vers neuf heures du matin, il sort de nouveau et en aperçoit d’autres qui se tiennent sur la place du marché sans rien faire.
    - type: text
      text: ' '
  '30':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Deux aveugles étaient assis au bord du chemin. Quand ils entendirent que Jésus passait par là, ils se mirent à crier : Seigneur'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '20.30 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Certains manuscrits n’ont pas : '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: Seigneur.
      marker-yv: yv-n
    - type: text
      text: ', Fils de David, aie pitié de nous !'
  '31':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'La foule les rabroua pour les faire taire, mais ils se mirent à crier de plus belle : Seigneur, Fils de David, aie pitié de nous !'
  '32':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Jésus s’arrêta, les appela et leur demanda : '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Que voulez-vous que je fasse pour vous ?
  '33':
  - type: usfm
    marker: p
    children:
    - type: text
      text: – Seigneur, répondirent-ils, que nos yeux s’ouvrent !
  '34':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Pris de compassion pour eux, Jésus leur toucha les yeux. Aussitôt, ils recouvrèrent la vue et le suivirent.
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'Il leur dit : « Vous aussi, allez travailler dans ma vigne et je vous paierai correctement. »'
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Ils y vont. Il sort encore vers midi, puis vers trois heures de l’après-midi et, chaque fois, il agit de la même manière.
    - type: text
      text: ' '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'Enfin, étant ressorti à cinq heures du soir, il en trouve encore d’autres sur la place. Il leur dit : « Pourquoi restez-vous ainsi toute la journée à ne rien faire ?'
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: – C’est que personne ne nous a embauchés.
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: – Eh bien, vous aussi, allez travailler dans ma vigne ! »
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'Le soir, le propriétaire du vignoble dit à son administrateur : « Fais venir les ouvriers et donne-leur la paye. Tu commenceras par ceux qui ont été engagés les derniers, pour finir par les premiers. »'
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Les ouvriers embauchés à cinq heures du soir se présentent d’abord et touchent chacun une pièce d’argent.
    - type: text
      text: ' '
