document_id: ECC.12
type_code: fra
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Et tiens compte de ton Créateur ╵au temps de ta jeunesse,
- type: usfm
  marker: q1
  children:
  - type: text
    text: avant que t’adviennent ╵les jours mauvais
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'et avant que viennent ╵les années dont tu te diras :'
- type: usfm
  marker: q1
  children:
  - type: text
    text: « Je n’y prends pas plaisir ! » ;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: avant que s’obscurcissent ╵le soleil, la lumière,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et que la lune et les étoiles ╵perdent leur éclat,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et que les nuages reparaissent ╵sitôt après la pluie.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: C’est l’époque où se mettent à trembler
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '12.3 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'La description qui suit illustre, de façon poétique, le vieillissement de l’homme qui aboutit à la mort. Elle fait allusion aux différentes parties du corps : bras, dos, dents, yeux, oreilles, cordes vocales, cheveux, etc.'
    marker-yv: yv-n
  - type: text
    text: ' ╵les gens qui gardent la maison,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: et où se courbent ╵les hommes vigoureux,
- type: usfm
  marker: q1
  children:
  - type: text
    text: où cessent les broyeuses ╵car les voilà trop peu nombreuses,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et où celles qui regardent par les ouvertures ╵sombrent dans l’obscurité ;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: où les deux battants de la porte ╵se ferment sur la rue,
- type: usfm
  marker: q1
  children:
  - type: text
    text: où le bruit de la meule ╵s’affaiblit,
- type: usfm
  marker: q1
  children:
  - type: text
    text: où l’on se lève ╵dès le chant de l’oiseau,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et où faiblissent toutes les chanteuses.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: C’est le temps où l’on craint la moindre pente,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'et où l’on a peur en chemin :'
- type: usfm
  marker: q1
  children:
  - type: text
    text: où l’amandier fleurit,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et où la sauterelle devient lourde,
- type: usfm
  marker: q1
  children:
  - type: text
    text: où la câpre n’a plus de goût.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et ainsi s’en va l’homme ╵vers la demeure qui l’attend, ╵dans les ténèbres
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '12.5 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'D’autres comprennent : '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: vers sa demeure éternelle.
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: text
    text: et, déjà, les pleureuses ╵s’assemblent dans les rues.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Oui, tiens compte de Lui ╵avant que se rompe ╵le fil d’argent,
- type: usfm
  marker: q1
  children:
  - type: text
    text: que se brise ╵la coupe d’or,
- type: usfm
  marker: q1
  children:
  - type: text
    text: que la jarre à la fontaine se casse,
- type: usfm
  marker: q1
  children:
  - type: text
    text: que la poulie se brise ╵et tombe dans le puits,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: que la poussière ╵retourne à la terre ╵comme elle était auparavant,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et que l’esprit retourne ╵à Dieu qui l’a donné.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Thèse
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Dérisoire, absolument dérisoire, dit le Maître, oui, tout est dérisoire !
- type: usfm
  marker: s1
  children:
  - type: text
    text: Le Maître et son œuvre
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Non seulement le Maître fut un sage, mais il a enseigné la sagesse au peuple. Il a pesé, examiné et mis en forme un grand nombre de proverbes. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Il s’est efforcé de trouver des propos agréables et d’écrire avec honnêteté des paroles vraies.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Les paroles des sages sont comme des aiguillons et ceux qui rassemblent ces paroles ressemblent à des clous bien plantés. Elles sont données par un Berger
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '12.11 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Autre traduction : '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: berger.
    marker-yv: yv-n
  - type: text
    text: ' unique.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Par-dessus tout cela, mon disciple, prête attention à ce qui suit. On peut multiplier les livres sans fin et le corps se fatigue à force d’étude.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Voici la conclusion de ce discours, maintenant que tout a été entendu : Crains Dieu et obéis à ses commandements, car cela vaut pour tout homme. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: En effet, Dieu prononcera son jugement sur toute œuvre, même celles qui ont été accomplies en cachette, les bonnes et les mauvaises.
