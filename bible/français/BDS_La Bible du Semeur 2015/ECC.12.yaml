document_id: ECC.12,21
type_code: fra
verses:
  '1':
  - type: text
    content: Et tiens compte de ton Créateur ╵au temps de ta jeunesse,
  - type: text
    content: avant que t’adviennent ╵les jours mauvais
  - type: text
    content: 'et avant que viennent ╵les années dont tu te diras :'
  - type: text
    content: « Je n’y prends pas plaisir ! » ;
  '10':
  - type: text
    content: Il s’est efforcé de trouver des propos agréables et d’écrire avec honnêteté des paroles vraies.
  '11':
  - type: text
    content: Les paroles des sages sont comme des aiguillons et ceux qui rassemblent ces paroles ressemblent à des clous bien plantés. Elles sont données par un Berger
  - type: note
    content: 'Autre traduction : berger.'
  - type: text
    content: ' unique.'
  '12':
  - type: text
    content: Par-dessus tout cela, mon disciple, prête attention à ce qui suit. On peut multiplier les livres sans fin et le corps se fatigue à force d’étude.
  '13':
  - type: text
    content: 'Voici la conclusion de ce discours, maintenant que tout a été entendu : Crains Dieu et obéis à ses commandements, car cela vaut pour tout homme. '
  '14':
  - type: text
    content: En effet, Dieu prononcera son jugement sur toute œuvre, même celles qui ont été accomplies en cachette, les bonnes et les mauvaises.
  '2':
  - type: text
    content: avant que s’obscurcissent ╵le soleil, la lumière,
  - type: text
    content: et que la lune et les étoiles ╵perdent leur éclat,
  - type: text
    content: et que les nuages reparaissent ╵sitôt après la pluie.
  '3':
  - type: text
    content: C’est l’époque où se mettent à trembler
  - type: note
    content: 'La description qui suit illustre, de façon poétique, le vieillissement de l’homme qui aboutit à la mort. Elle fait allusion aux différentes parties du corps : bras, dos, dents, yeux, oreilles, cordes vocales, cheveux, etc.'
  - type: text
    content: ' ╵les gens qui gardent la maison,'
  - type: text
    content: et où se courbent ╵les hommes vigoureux,
  - type: text
    content: où cessent les broyeuses ╵car les voilà trop peu nombreuses,
  - type: text
    content: et où celles qui regardent par les ouvertures ╵sombrent dans l’obscurité ;
  '4':
  - type: text
    content: où les deux battants de la porte ╵se ferment sur la rue,
  - type: text
    content: où le bruit de la meule ╵s’affaiblit,
  - type: text
    content: où l’on se lève ╵dès le chant de l’oiseau,
  - type: text
    content: et où faiblissent toutes les chanteuses.
  '5':
  - type: text
    content: C’est le temps où l’on craint la moindre pente,
  - type: text
    content: 'et où l’on a peur en chemin :'
  - type: text
    content: où l’amandier fleurit,
  - type: text
    content: et où la sauterelle devient lourde,
  - type: text
    content: où la câpre n’a plus de goût.
  - type: text
    content: Et ainsi s’en va l’homme ╵vers la demeure qui l’attend, ╵dans les ténèbres
  - type: note
    content: 'D’autres comprennent : vers sa demeure éternelle.'
  - type: text
    content: et, déjà, les pleureuses ╵s’assemblent dans les rues.
  '6':
  - type: text
    content: Oui, tiens compte de Lui ╵avant que se rompe ╵le fil d’argent,
  - type: text
    content: que se brise ╵la coupe d’or,
  - type: text
    content: que la jarre à la fontaine se casse,
  - type: text
    content: que la poulie se brise ╵et tombe dans le puits,
  '7':
  - type: text
    content: que la poussière ╵retourne à la terre ╵comme elle était auparavant,
  - type: text
    content: et que l’esprit retourne ╵à Dieu qui l’a donné.
  - type: heading
    content: Thèse
  '8':
  - type: text
    content: Dérisoire, absolument dérisoire, dit le Maître, oui, tout est dérisoire !
  - type: heading
    content: Le Maître et son œuvre
  '9':
  - type: text
    content: 'Non seulement le Maître fut un sage, mais il a enseigné la sagesse au peuple. Il a pesé, examiné et mis en forme un grand nombre de proverbes. '
