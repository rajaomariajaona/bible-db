document_id: OBA.INTRO1,21
type_code: fra
verses:
  '1':
  - type: usfm
    marker: imt1
    children:
    - type: text
      text: Introduction
  - type: usfm
    marker: ip
    children:
    - type: text
      text: 'Abdias, nom courant dans l’Ecriture (1 R 18.3-16 ; 1 Ch 3.21 ; 7.3 ; 8.38  ; etc.), annonce dans une courte prophétie la ruine d’Edom, peuple descendant d’Esaü, le frère jumeau de Jacob (Gn 24.24-25) qui s’était installé dans les monts de Séir, au sud-est du Jourdain (Gn 36). Le livre ne donne aucun renseignement sur le prophète lui-même, mais il se réfère à une invasion de Jérusalem par des armées ennemies, dont les Edomites ont tiré profit (v.  10-14). Cette indication permet de proposer deux dates pour la prédication d’Abdias :'
  - type: usfm
    marker: ip
    children:
    - type: text
      text: 1. Vers 845 avant Jésus-Christ. En effet, Edom, jusque-là assujetti à Juda, s’est révolté sous le règne de Yoram (848 à 841, 2 Ch 21.8-10). Vers 845, les Philistins et les Arabes ont investi Jérusalem, pillé le palais royal et emmené des captifs (2 Ch 21.16-17). Il semble que les Edomites se soient associés à ces violences car le prophète Amos, écrivant au huitième siècle, mentionne un événement comparable à celui que décrit Abdias (Am 1.6, 9, 11).
  - type: usfm
    marker: ip
    children:
    - type: text
      text: 2. Après 587 avant Jésus-Christ. En effet, lorsque les armées babyloniennes de Nabuchodonosor ont pris Jérusalem, les Edomites en ont profité pour se venger des Judéens, comme le soulignent de nombreux passages de l’Ancien Testament (Ps 139.7 ; Ez 25.12-14 ; 35 ; Lm 4.21-22).
  - type: usfm
    marker: ip
    children:
    - type: text
      text: 'Le prophète, dans un premier temps, annonce le jugement d’Edom (v.  1-14). Celui-ci s’est réjoui du malheur de son frère, le peuple de Jacob, Juda (v.  10-12), et il s’est rendu coupable de crimes de guerre (v.  13-14). C’est pourquoi il lui sera fait comme il a fait, selon la loi du talion : « Œil pour œil, dent pour dent » (Ex 21.24).'
  - type: usfm
    marker: ip
    children:
    - type: text
      text: 'Mais au-delà du jugement d’Edom, Abdias discerne un jugement plus large qui englobera tous les peuples et auquel celui du peuple d’Esaü sert d’image (v.  15-21). Car au jour de l’Eternel, Dieu punira tous les humains pour le mal qu’ils auront fait, selon la même loi du talion (v.  15-16). Cependant, avec le jugement viendra aussi le salut : le peuple des « sauvés » (v.  17) se répandra sur la terre entière (v.  19-20), et Dieu y établira son règne (v.  21).'
  - type: usfm
    marker: ip
    children:
    - type: text
      text: Jésus annoncera lui aussi un tel jugement (Mt 25.31-46). Mais avant cela, il faudra que la Bonne Nouvelle du salut se répande dans le monde entier, à partir de Jérusalem (Lc 24.46).
