document_id: EZR.10
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Les chefs israélites s’engagent à obéir à Dieu
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Pendant qu’Esdras, prosterné devant le temple de Dieu, faisait cette prière et cette confession en pleurant, une foule très nombreuse d’hommes, de femmes et d’enfants israélites s’était rassemblée autour de lui, et tous pleuraient abondamment. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Alors Shekania, fils de Yehiel, un descendant d’Elam, prit la parole et dit à Esdras : Nous avons été infidèles envers notre Dieu en épousant des femmes étrangères prises parmi les peuples du pays. Mais malgré cela, il reste encore une espérance pour Israël dans cette affaire. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Engageons-nous maintenant par une alliance avec notre Dieu à renvoyer toutes ces femmes avec leurs enfants, conformément au conseil de mon seigneur Esdras et de ceux qui respectent les commandements de notre Dieu. Que la Loi soit observée ! '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Lève-toi, car c’est à toi de régler cette affaire. Mais nous sommes avec toi. Prends courage et agis !
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Alors Esdras se releva et fit prêter serment aux chefs des prêtres, des lévites et de tout Israël d’agir comme il venait d’être dit. Ils en firent tous le serment. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Puis Esdras quitta la cour du Temple et se rendit dans une salle de Yohanân, fils d’Eliashib, où il passa la nuit
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '10.6 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: où il passa la nuit
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: ': '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'd’après l’ancienne version grecque ; le texte hébreu traditionnel a : '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'et il alla. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Il est aisé de confondre les deux termes en hébreu.
    marker-yv: yv-n
  - type: text
    text: '  ; mais il refusa toute nourriture et toute boisson car il menait deuil à cause de la faute grave des anciens exilés.'
- type: usfm
  marker: s1
  children:
  - type: text
    text: La réunion des anciens déportés à Jérusalem
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'On fit ensuite publier dans Juda et à Jérusalem un ordre enjoignant à tous les anciens déportés de se réunir à Jérusalem. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Les chefs et les responsables du peuple avaient décidé que ceux qui ne se présenteraient pas dans un délai de trois jours verraient tous leurs biens voués à l’Eternel et seraient eux-mêmes exclus de la communauté des anciens déportés. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Alors tous les hommes de Juda et de Benjamin se rassemblèrent à Jérusalem dans les trois jours. C’était le vingtième jour du neuvième mois. Tout le peuple se tenait dans la cour du Temple en tremblant, à cause de cette affaire, et aussi parce qu’il pleuvait à verse. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Esdras le prêtre se leva et leur dit : Vous avez commis une faute grave en épousant des femmes étrangères, et vous avez rendu Israël encore plus coupable. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Reconnaissez donc maintenant votre péché devant l’Eternel, le Dieu de vos pères, et conformez-vous à sa volonté ! Séparez-vous de la population du pays et de vos femmes d’origine étrangère !
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Toute l’assemblée répondit à haute voix : Tu as raison. Notre devoir est d’agir comme tu l’as dit ! '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Mais nous sommes nombreux et c’est la saison des pluies ; nous ne pouvons pas rester ici en plein air. D’ailleurs, cette affaire ne peut pas se régler en un jour ni même en deux, car il y en a beaucoup parmi nous qui ont commis une faute dans ce domaine. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Il vaudrait mieux que nos chefs restent ici pour représenter l’assemblée. Tous ceux qui, dans nos villes, ont épousé des femmes étrangères se présenteront à tour de rôle aux dates qu’on leur fixera, avec des responsables et des juges de leurs villes respectives, jusqu’à ce que l’ardente colère de notre Dieu provoquée par cette affaire se soit détournée de nous.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Seuls Jonathan, fils d’Asaël, et Yahzia, fils de Thiqva, soutenus par Meshoullam et par le lévite Shabthaï, s’opposèrent à cette mesure. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Mais la majorité des anciens déportés s’y conformèrent. Esdras, le prêtre, choisit, en les désignant nommément, des chefs des groupes familiaux. Ceux-ci commencèrent à siéger le premier jour du dixième mois pour examiner les cas. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Ils achevèrent de régler la situation de tous les hommes qui avaient épousé des femmes étrangères le premier jour du premier mois
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '10.17 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Trois mois plus tard (voir v. 9).
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: s1
  children:
  - type: text
    text: La liste des fautifs
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Voici quels étaient les prêtres qui avaient épousé des femmes étrangères :'
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Parmi les descendants de Josué, fils de Yotsadaq, et ceux des hommes de sa parenté : Maaséya, Eliézer, Yarib et Guedalia. '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Ils s’engagèrent par une poignée de main à renvoyer leurs femmes et à offrir un bélier en sacrifice pour expier leur faute.
- type: usfm
  marker: li1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Des descendants d’Immer :'
- type: usfm
  marker: li2
  children:
  - type: text
    text: Hanani et Zebadia ;
- type: usfm
  marker: li1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'des descendants de Harim :'
- type: usfm
  marker: li2
  children:
  - type: text
    text: Maaséya, Elie, Shemaya, Yehiel et Ozias ;
- type: usfm
  marker: li1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'des descendants de Pashhour :'
- type: usfm
  marker: li2
  children:
  - type: text
    text: Elyoénaï, Maaséya, Ismaël, Netanéel, Yozabad et Eleasa.
- type: usfm
  marker: li1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Parmi les lévites :'
- type: usfm
  marker: li2
  children:
  - type: text
    text: Yozabad, Shimeï, Qélaya appelé aussi Qelita, Petahya, Juda et Eliézer.
- type: usfm
  marker: li1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Parmi les musiciens :'
- type: usfm
  marker: li2
  children:
  - type: text
    text: Eliashib.
- type: usfm
  marker: li1
  children:
  - type: text
    text: 'Parmi les portiers : Shalloum, Thélem et Ouri.'
- type: usfm
  marker: li1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Parmi les autres Israélites :'
- type: usfm
  marker: li1
  children:
  - type: text
    text: 'des descendants de Pareosh :'
- type: usfm
  marker: li2
  children:
  - type: text
    text: Ramia, Yizziya, Malkiya, Miyamîn, Eléazar, Malkiya et Benaya.
- type: usfm
  marker: li1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Des descendants d’Elam :'
- type: usfm
  marker: li2
  children:
  - type: text
    text: Mattania, Zacharie, Yehiel, Abdi, Yerémoth et Elie.
- type: usfm
  marker: li1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'Des descendants de Zatthou :'
- type: usfm
  marker: li2
  children:
  - type: text
    text: Elyoénaï, Eliashib, Mattania, Yerémoth, Zabad et Aziza.
- type: usfm
  marker: li1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'Des descendants de Bébaï :'
- type: usfm
  marker: li2
  children:
  - type: text
    text: Yohanân, Hanania, Zabbaï et Athlaï.
- type: usfm
  marker: li1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'Des descendants de Bani :'
- type: usfm
  marker: li2
  children:
  - type: text
    text: Meshoullam, Mallouk, Adaya, Yashoub, Sheal et Ramoth.
- type: usfm
  marker: li1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'Des descendants de Pahath-Moab :'
- type: usfm
  marker: li2
  children:
  - type: text
    text: Adna, Kelal, Benaya, Maaséya, Mattania, Betsaléel, Binnouï et Manassé.
- type: usfm
  marker: li1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'Des descendants de Harim :'
- type: usfm
  marker: li2
  children:
  - type: text
    text: 'Eliézer, Yishiya, Malkiya, Shemaya, Siméon, '
  - type: usfm
    marker: v
    metadata:
      v: '32'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: Benjamin, Mallouk et Shemaria.
- type: usfm
  marker: li1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '33'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: 'Des descendants de Hashoum :'
- type: usfm
  marker: li2
  children:
  - type: text
    text: Matthnaï ; Mattattha, Zabad, Eliphéleth, Yerémaï, Manassé et Shimeï.
- type: usfm
  marker: li1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '34'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: 'Des descendants de Bani :'
- type: usfm
  marker: li2
  children:
  - type: text
    text: 'Maadaï, Amram, Ouel, '
  - type: usfm
    marker: v
    metadata:
      v: '35'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: 'Benaya, Bédia, Kelouhou, '
  - type: usfm
    marker: v
    metadata:
      v: '36'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: 'Vania, Merémoth, Eliashib, '
  - type: usfm
    marker: v
    metadata:
      v: '37'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: 'Mattania, Matthnaï, Yaasaï, '
  - type: usfm
    marker: v
    metadata:
      v: '38'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: text
    text: Bani, Binnouï
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '10.38 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: Bani, Binnouï
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: ': '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'on pourrait aussi comprendre, comme l’a fait l’ancienne version grecque : '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: des descendants de Binnouï.
    marker-yv: yv-n
  - type: text
    text: ', Shimeï, '
  - type: usfm
    marker: v
    metadata:
      v: '39'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '39'
  - type: text
    text: 'Shélémia, Nathan, Adaya, '
  - type: usfm
    marker: v
    metadata:
      v: '40'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '40'
  - type: text
    text: 'Maknadbaï, Shashaï, Sharaï, '
  - type: usfm
    marker: v
    metadata:
      v: '41'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '41'
  - type: text
    text: 'Azaréel, Shélémia, Shemaria, '
  - type: usfm
    marker: v
    metadata:
      v: '42'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '42'
  - type: text
    text: Shalloum, Amaria et Joseph.
- type: usfm
  marker: li1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '43'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '43'
  - type: text
    text: 'Des descendants de Nébo :'
- type: usfm
  marker: li2
  children:
  - type: text
    text: Yeïel, Mattitia, Zabad, Zebina, Yaddaï, Joël et Benaya.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '44'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '44'
  - type: text
    text: Tous ces hommes avaient épousé des femmes étrangères, et plusieurs en avaient eu des enfants
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '10.44 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Autre traduction : '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: tous ces hommes renvoyèrent leurs femmes et leurs enfants.
    marker-yv: yv-n
  - type: text
    text: .
