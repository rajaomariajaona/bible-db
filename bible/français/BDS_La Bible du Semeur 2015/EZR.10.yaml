document_id: EZR.10,21
type_code: fra
verses:
  '1':
  - type: heading
    content: Les chefs israélites s’engagent à obéir à Dieu
  - type: text
    content: 'Pendant qu’Esdras, prosterné devant le temple de Dieu, faisait cette prière et cette confession en pleurant, une foule très nombreuse d’hommes, de femmes et d’enfants israélites s’était rassemblée autour de lui, et tous pleuraient abondamment. '
  '10':
  - type: text
    content: 'Esdras le prêtre se leva et leur dit : Vous avez commis une faute grave en épousant des femmes étrangères, et vous avez rendu Israël encore plus coupable. '
  '11':
  - type: text
    content: Reconnaissez donc maintenant votre péché devant l’Eternel, le Dieu de vos pères, et conformez-vous à sa volonté ! Séparez-vous de la population du pays et de vos femmes d’origine étrangère !
  '12':
  - type: text
    content: 'Toute l’assemblée répondit à haute voix : Tu as raison. Notre devoir est d’agir comme tu l’as dit ! '
  '13':
  - type: text
    content: 'Mais nous sommes nombreux et c’est la saison des pluies ; nous ne pouvons pas rester ici en plein air. D’ailleurs, cette affaire ne peut pas se régler en un jour ni même en deux, car il y en a beaucoup parmi nous qui ont commis une faute dans ce domaine. '
  '14':
  - type: text
    content: Il vaudrait mieux que nos chefs restent ici pour représenter l’assemblée. Tous ceux qui, dans nos villes, ont épousé des femmes étrangères se présenteront à tour de rôle aux dates qu’on leur fixera, avec des responsables et des juges de leurs villes respectives, jusqu’à ce que l’ardente colère de notre Dieu provoquée par cette affaire se soit détournée de nous.
  '15':
  - type: text
    content: 'Seuls Jonathan, fils d’Asaël, et Yahzia, fils de Thiqva, soutenus par Meshoullam et par le lévite Shabthaï, s’opposèrent à cette mesure. '
  '16':
  - type: text
    content: 'Mais la majorité des anciens déportés s’y conformèrent. Esdras, le prêtre, choisit, en les désignant nommément, des chefs des groupes familiaux. Ceux-ci commencèrent à siéger le premier jour du dixième mois pour examiner les cas. '
  '17':
  - type: text
    content: Ils achevèrent de régler la situation de tous les hommes qui avaient épousé des femmes étrangères le premier jour du premier mois
  - type: note
    content: Trois mois plus tard (voir v. 9).
  - type: text
    content: .
  - type: heading
    content: La liste des fautifs
  '18':
  - type: text
    content: 'Voici quels étaient les prêtres qui avaient épousé des femmes étrangères :'
  - type: text
    content: 'Parmi les descendants de Josué, fils de Yotsadaq, et ceux des hommes de sa parenté : Maaséya, Eliézer, Yarib et Guedalia. '
  '19':
  - type: text
    content: Ils s’engagèrent par une poignée de main à renvoyer leurs femmes et à offrir un bélier en sacrifice pour expier leur faute.
  '2':
  - type: text
    content: 'Alors Shekania, fils de Yehiel, un descendant d’Elam, prit la parole et dit à Esdras : Nous avons été infidèles envers notre Dieu en épousant des femmes étrangères prises parmi les peuples du pays. Mais malgré cela, il reste encore une espérance pour Israël dans cette affaire. '
  '20':
  - type: text
    content: 'Des descendants d’Immer :'
  - type: text
    content: Hanani et Zebadia ;
  '21':
  - type: text
    content: 'des descendants de Harim :'
  - type: text
    content: Maaséya, Elie, Shemaya, Yehiel et Ozias ;
  '22':
  - type: text
    content: 'des descendants de Pashhour :'
  - type: text
    content: Elyoénaï, Maaséya, Ismaël, Netanéel, Yozabad et Eleasa.
  '23':
  - type: text
    content: 'Parmi les lévites :'
  - type: text
    content: Yozabad, Shimeï, Qélaya appelé aussi Qelita, Petahya, Juda et Eliézer.
  '24':
  - type: text
    content: 'Parmi les musiciens :'
  - type: text
    content: Eliashib.
  - type: text
    content: 'Parmi les portiers : Shalloum, Thélem et Ouri.'
  '25':
  - type: text
    content: 'Parmi les autres Israélites :'
  - type: text
    content: 'des descendants de Pareosh :'
  - type: text
    content: Ramia, Yizziya, Malkiya, Miyamîn, Eléazar, Malkiya et Benaya.
  '26':
  - type: text
    content: 'Des descendants d’Elam :'
  - type: text
    content: Mattania, Zacharie, Yehiel, Abdi, Yerémoth et Elie.
  '27':
  - type: text
    content: 'Des descendants de Zatthou :'
  - type: text
    content: Elyoénaï, Eliashib, Mattania, Yerémoth, Zabad et Aziza.
  '28':
  - type: text
    content: 'Des descendants de Bébaï :'
  - type: text
    content: Yohanân, Hanania, Zabbaï et Athlaï.
  '29':
  - type: text
    content: 'Des descendants de Bani :'
  - type: text
    content: Meshoullam, Mallouk, Adaya, Yashoub, Sheal et Ramoth.
  '3':
  - type: text
    content: 'Engageons-nous maintenant par une alliance avec notre Dieu à renvoyer toutes ces femmes avec leurs enfants, conformément au conseil de mon seigneur Esdras et de ceux qui respectent les commandements de notre Dieu. Que la Loi soit observée ! '
  '30':
  - type: text
    content: 'Des descendants de Pahath-Moab :'
  - type: text
    content: Adna, Kelal, Benaya, Maaséya, Mattania, Betsaléel, Binnouï et Manassé.
  '31':
  - type: text
    content: 'Des descendants de Harim :'
  - type: text
    content: 'Eliézer, Yishiya, Malkiya, Shemaya, Siméon, '
  '32':
  - type: text
    content: Benjamin, Mallouk et Shemaria.
  '33':
  - type: text
    content: 'Des descendants de Hashoum :'
  - type: text
    content: Matthnaï ; Mattattha, Zabad, Eliphéleth, Yerémaï, Manassé et Shimeï.
  '34':
  - type: text
    content: 'Des descendants de Bani :'
  - type: text
    content: 'Maadaï, Amram, Ouel, '
  '35':
  - type: text
    content: 'Benaya, Bédia, Kelouhou, '
  '36':
  - type: text
    content: 'Vania, Merémoth, Eliashib, '
  '37':
  - type: text
    content: 'Mattania, Matthnaï, Yaasaï, '
  '38':
  - type: text
    content: Bani, Binnouï
  - type: note
    content: 'Bani, Binnouï: on pourrait aussi comprendre, comme l’a fait l’ancienne version grecque : des descendants de Binnouï.'
  - type: text
    content: ', Shimeï, '
  '39':
  - type: text
    content: 'Shélémia, Nathan, Adaya, '
  '4':
  - type: text
    content: Lève-toi, car c’est à toi de régler cette affaire. Mais nous sommes avec toi. Prends courage et agis !
  '40':
  - type: text
    content: 'Maknadbaï, Shashaï, Sharaï, '
  '41':
  - type: text
    content: 'Azaréel, Shélémia, Shemaria, '
  '42':
  - type: text
    content: Shalloum, Amaria et Joseph.
  '43':
  - type: text
    content: 'Des descendants de Nébo :'
  - type: text
    content: Yeïel, Mattitia, Zabad, Zebina, Yaddaï, Joël et Benaya.
  '44':
  - type: text
    content: Tous ces hommes avaient épousé des femmes étrangères, et plusieurs en avaient eu des enfants
  - type: note
    content: 'Autre traduction : tous ces hommes renvoyèrent leurs femmes et leurs enfants.'
  - type: text
    content: .
  '5':
  - type: text
    content: 'Alors Esdras se releva et fit prêter serment aux chefs des prêtres, des lévites et de tout Israël d’agir comme il venait d’être dit. Ils en firent tous le serment. '
  '6':
  - type: text
    content: Puis Esdras quitta la cour du Temple et se rendit dans une salle de Yohanân, fils d’Eliashib, où il passa la nuit
  - type: note
    content: 'où il passa la nuit: d’après l’ancienne version grecque ; le texte hébreu traditionnel a : et il alla. Il est aisé de confondre les deux termes en hébreu.'
  - type: text
    content: '  ; mais il refusa toute nourriture et toute boisson car il menait deuil à cause de la faute grave des anciens exilés.'
  - type: heading
    content: La réunion des anciens déportés à Jérusalem
  '7':
  - type: text
    content: 'On fit ensuite publier dans Juda et à Jérusalem un ordre enjoignant à tous les anciens déportés de se réunir à Jérusalem. '
  '8':
  - type: text
    content: 'Les chefs et les responsables du peuple avaient décidé que ceux qui ne se présenteraient pas dans un délai de trois jours verraient tous leurs biens voués à l’Eternel et seraient eux-mêmes exclus de la communauté des anciens déportés. '
  '9':
  - type: text
    content: 'Alors tous les hommes de Juda et de Benjamin se rassemblèrent à Jérusalem dans les trois jours. C’était le vingtième jour du neuvième mois. Tout le peuple se tenait dans la cour du Temple en tremblant, à cause de cette affaire, et aussi parce qu’il pleuvait à verse. '
