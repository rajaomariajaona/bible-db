document_id: NUM.26,21
type_code: fra
verses:
  '1':
  - type: usfm
    marker: nb
    children:
    - type: text
      text: 'l’Eternel dit à Moïse et à Eléazar, fils du prêtre Aaron : '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'La terre se fendit et les engloutit avec Qoré le jour où tous ses partisans périrent par le feu qui dévora les deux cent cinquante hommes. Ils servirent ainsi d’exemple. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Par contre, les fils de Qoré ne moururent pas.
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Descendants de Siméon, classés par familles : issue de Nemouel, la famille des Nemouélites ; de Yamîn, celle des Yaminites ; de Yakîn, celle des Yakinites ; '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'de Zérah, celle des Zérahites ; de Saül, celle des Saülites. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Telles étaient les familles de Siméon. Leur effectif était de 22 200 hommes.
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Descendants de Gad, classés par familles : de Tsephôn, la famille des Tsephonites ; de Haggui, celle des Hagguites ; de Shouni, celle des Shounites ; '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'd’Ozni, celle des Oznites ; d’Eri, celle des Erites ; '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: d’Arod
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '26.17 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Selon le texte hébreu traditionnel. Le Pentateuque samaritain, la version syriaque et '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: Gn 46.16
        - type: text
          text: ' ont : '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: Arodi.
      marker-yv: yv-n
    - type: text
      text: ', celle des Arodites ; d’Areéli, celle des Areélites. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Telles étaient les familles de Gad. Leur effectif était de 40 500 hommes.
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Descendants de Juda : deux d’entre eux, Er et Onân, moururent dans le pays de Canaan. '
  '2':
  - type: usfm
    marker: nb
    children:
    - type: text
      text: Faites le recensement de toute la communauté d’Israël ; vous dénombrerez, par groupes familiaux, tous les hommes de vingt ans et plus, aptes à servir dans l’armée d’Israël
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '26.2 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Le premier recensement avait eu lieu trente-huit ans plus tôt (voir Nb 1 à 3). A l’exception de Caleb et de Josué, les hommes du premier recensement sont tous morts (voir '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: 26.64-65
        - type: text
          text: ).
      marker-yv: yv-n
    - type: text
      text: .
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Autres descendants de Juda, classés par familles : de Shéla, la famille des Shélanites ; de Pérets, celle des Partsites ; de Zérah, celle des Zérahites. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Pérets eut deux fils : Hetsrôn, de qui est issue la famille des Hetsronites, et Hamoul, de qui est issue la famille des Hamoulites. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Telles étaient les familles de Juda. Leur effectif était de 76 500 hommes.
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Descendants d’Issacar, classés par familles : de Tola, la famille des Tolaïtes ; de Pouva, celle des Pouvites'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '26.23 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Le Pentateuque samaritain, l’ancienne version grecque, la Vulgate et '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: 1 Ch 7.1
        - type: text
          text: ' ont : '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: Poua… Pouites.
      marker-yv: yv-n
    - type: text
      text: '  ; '
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'de Yashoub, celle des Yashoubites ; de Shimrôn, celle des Shimronites. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Telles étaient les familles d’Issacar. Leur effectif était de 64 300 hommes.
  '26':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Descendants de Zabulon, classés par familles : de Séred, la famille des Sardites ; d’Elôn, celle des Elonites ; de Yahléel, celle des Yahleélites. '
  '27':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Telles étaient les familles de Zabulon. Leur effectif était de 60 500 hommes.
  '28':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Joseph eut pour fils Manassé et Ephraïm. '
  '29':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fils de Manassé : Makir, de qui est issue la famille des Makirites et qui eut pour fils Galaad, de qui sont issus les Galaadites. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Moïse et le prêtre Eléazar s’adressèrent au peuple dans les plaines de Moab au bord du Jourdain à la hauteur de Jéricho. Ils leur dirent : '
  '30':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Voici les descendants de Galaad : Yézer, de qui est issue la famille des Yézérites ; Héleq avec la famille des Hélqites ; '
  '31':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Asriel avec la famille des Asriélites ; Sichem avec la famille des Sichémites ; '
  '32':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Shemida avec la famille des Shemidaïtes ; Hépher avec la famille des Héphrites. '
  '33':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Tselophhad, fils de Hépher, n’eut pas de fils, mais il eut pour filles : Mahla, Noa, Hogla, Milka et Tirtsa. '
  '34':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Telles étaient les familles de Manassé. Leur effectif était de 52 700 hommes.
  '35':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Voici les descendants d’Ephraïm classés par familles : de Shoutélah, la famille des Shoutalhites ; de Béker, celle des Bakrites ; de Tahân, celle des Tahanites. '
  '36':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Shoutélah eut pour fils Erân de qui est issue la famille des Eranites. '
  '37':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Telles étaient les familles d’Ephraïm. Leur effectif était de 32 500 hommes. Tels sont les descendants de Joseph selon leurs familles.
  '38':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Descendants de Benjamin, classés par familles : de Béla, la famille des Balites ; d’Ashbel, celle des Ashbélites ; d’Ahiram, celle des Ahiramites ; '
  '39':
  - type: usfm
    marker: p
    children:
    - type: text
      text: de Shoupham
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '26.39 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'D’après quelques manuscrits du texte hébreu traditionnel, le Pentateuque samaritain, la version syriaque et la Vulgate. La plupart des manuscrits du texte hébreu traditionnel ont : '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: Shephoupham.
      marker-yv: yv-n
    - type: text
      text: ', celle des Shouphamites ; de Houpham, celle des Houphamites. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Nous allons faire le recensement de tous les hommes de vingt ans et plus, comme l’Eternel l’a ordonné à Moïse. Voici les descendants d’Israël sortis d’Egypte.
  '40':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Béla eut deux fils : Ard'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '26.40 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: D’après le Pentateuque samaritain et la version syriaque. Manque dans le texte hébreu traditionnel.
      marker-yv: yv-n
    - type: text
      text: ', de qui est issue la famille des Ardites, et Naaman, de qui est issue la famille des Naamanites. '
  '41':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Telles étaient les familles de Benjamin. Leur effectif était de 45 600 hommes.
  '42':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Voici les descendants de Dan classés par familles : de Shouham est issue la famille des Shouhamites. Les familles de Dan sont les familles des Shouhamites. '
  '43':
  - type: usfm
    marker: p
    children:
    - type: text
      text: L’ensemble des familles des Shouhamites était de 64 400 hommes.
  '44':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Descendants d’Aser, classés par familles : de Yimna la famille des Yimnites ; de Yishvi, celle des Yishvites ; de Beria, celle des Beriites. '
  '45':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'De ce dernier sont issues la famille des Hébrites de Héber et celle des Malkiélites de Malkiel. '
  '46':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Aser avait aussi une fille appelée Sérah. '
  '47':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Telles étaient les familles d’Aser. Leur effectif était de 53 400 hommes.
  '48':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Descendants de Nephtali, classés par familles : de Yahtséel, la famille des Yahtseélites ; de Gouni, celle des Gounites ; '
  '49':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'de Yétser, celle des Yitsrites ; de Shillem, celle des Shillémites. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fils de Ruben, premier-né d’Israël : Hénok, de qui est issue la famille des Hénokites ; de Pallou, la famille des Pallouites ; '
  '50':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Telles étaient les familles de Nephtali. Leur effectif était de 45 400 hommes.
  '51':
  - type: usfm
    marker: p
    children:
    - type: text
      text: L’effectif total des Israélites recensés était de 601 730 hommes.
  '52':
  - type: usfm
    marker: p
    children:
    - type: text
      text: L’Eternel parla à Moïse, en ces termes
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '26.52 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Pour les v. 52-56, voir Nb 33.54 ; 34.13 ; Jos 14.1-2.
      marker-yv: yv-n
    - type: text
      text: '  : '
  '53':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'C’est entre ceux-là que le pays sera partagé, et donné en possession en se basant sur le nombre de personnes. '
  '54':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Aux tribus plus nombreuses, tu donneras un patrimoine plus grand, et aux moins nombreuses, un plus petit ; à chacun sera donné un territoire proportionné à son effectif. '
  '55':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Toutefois, c’est par tirage au sort que se fera le partage du pays ; chaque tribu recevra sa part d’après le nombre de ses ressortissants. '
  '56':
  - type: usfm
    marker: p
    children:
    - type: text
      text: C’est le sort qui décidera du territoire attribué aux plus nombreux et à ceux qui le sont moins.
  - type: usfm
    marker: s2
    children:
    - type: text
      text: Le recensement des lévites
    marker-yv: yv-h
  '57':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Voici les effectifs des lévites recensés par familles : de Guershôn est issue la famille des Guershonites ; de Qehath, celle des Qehatites ; de Merari, celle des Merarites. '
  '58':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Voici les familles issues de Lévi : celle des Libnites, des Hébronites, des Mahlites, des Moushites et des Qoréites. Qehath eut pour fils Amram'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '26.58 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Voir '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: Ex 6.17-19
        - type: text
          text: ', '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: '24'
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: ' '
  '59':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'qui épousa Yokébed, fille de Lévi, née en Egypte. Ils eurent pour enfants Aaron, Moïse et leur sœur Miryam. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: de Hetsrôn, celle des Hetsronites ; de Karmi, celle des Karmites
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '26.6 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Voir '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: Gn 46.9
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: .
  '60':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Aaron eut pour fils : Nadab, Abihou, Eléazar et Itamar'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '26.60 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Voir Ex 6.23 ; Nb 3.2.
      marker-yv: yv-n
    - type: text
      text: '. '
  '61':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Nadab et Abihou moururent pour avoir présenté devant l’Eternel un feu profane
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '26.61 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Voir Lv 10.1-7 ; Nb 3.4.
      marker-yv: yv-n
    - type: text
      text: .
  '62':
  - type: usfm
    marker: p
    children:
    - type: text
      text: L’effectif des lévites de sexe masculin âgés d’un mois et plus était de 23 000. Les lévites ne furent pas compris dans le recensement des Israélites, car ils ne devaient pas recevoir de patrimoine comme ceux-ci.
  - type: usfm
    marker: s2
    children:
    - type: text
      text: Conclusion
    marker-yv: yv-h
  '63':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Tel fut le résultat du recensement des Israélites effectué par Moïse et le prêtre Eléazar dans les plaines de Moab au bord du Jourdain, en face de Jéricho. '
  '64':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Parmi eux, il ne restait plus personne de ceux que Moïse et Aaron avaient recensés dans le désert du Sinaï
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '26.64 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Voir Nb 1 ; 3.
      marker-yv: yv-n
    - type: text
      text: ', '
  '65':
  - type: usfm
    marker: p
    children:
    - type: text
      text: car l’Eternel leur avait déclaré qu’ils mourraient dans le désert. Il ne subsistait donc aucun d’entre eux, excepté Caleb, fils de Yephounné, et Josué, fils de Noun
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '26.65 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Voir '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: 14.26-38
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: .
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Telles étaient les familles de Ruben. Leur effectif était de 43 730 hommes. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Eliab, fils de Pallou, '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'eut pour fils : Nemouel, Datan et Abiram. Ce sont ces deux derniers, membres du conseil de la communauté, qui s’en prirent à Moïse et Aaron avec les partisans de Qoré, lorsque ceux-ci se rebellèrent contre l’Eternel'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '26.9 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Voir le chapitre '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: '16'
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: '. '
