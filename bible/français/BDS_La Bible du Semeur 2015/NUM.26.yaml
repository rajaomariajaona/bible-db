document_id: NUM.26,21
type_code: fra
verses:
  '1':
  - type: text
    content: 'l’Eternel dit à Moïse et à Eléazar, fils du prêtre Aaron : '
  '10':
  - type: text
    content: 'La terre se fendit et les engloutit avec Qoré le jour où tous ses partisans périrent par le feu qui dévora les deux cent cinquante hommes. Ils servirent ainsi d’exemple. '
  '11':
  - type: text
    content: Par contre, les fils de Qoré ne moururent pas.
  '12':
  - type: text
    content: 'Descendants de Siméon, classés par familles : issue de Nemouel, la famille des Nemouélites ; de Yamîn, celle des Yaminites ; de Yakîn, celle des Yakinites ; '
  '13':
  - type: text
    content: 'de Zérah, celle des Zérahites ; de Saül, celle des Saülites. '
  '14':
  - type: text
    content: Telles étaient les familles de Siméon. Leur effectif était de 22 200 hommes.
  '15':
  - type: text
    content: 'Descendants de Gad, classés par familles : de Tsephôn, la famille des Tsephonites ; de Haggui, celle des Hagguites ; de Shouni, celle des Shounites ; '
  '16':
  - type: text
    content: 'd’Ozni, celle des Oznites ; d’Eri, celle des Erites ; '
  '17':
  - type: text
    content: d’Arod
  - type: note
    content: 'Selon le texte hébreu traditionnel. Le Pentateuque samaritain, la version syriaque et Gn 46.16 ont : Arodi.'
  - type: text
    content: ', celle des Arodites ; d’Areéli, celle des Areélites. '
  '18':
  - type: text
    content: Telles étaient les familles de Gad. Leur effectif était de 40 500 hommes.
  '19':
  - type: text
    content: 'Descendants de Juda : deux d’entre eux, Er et Onân, moururent dans le pays de Canaan. '
  '2':
  - type: text
    content: Faites le recensement de toute la communauté d’Israël ; vous dénombrerez, par groupes familiaux, tous les hommes de vingt ans et plus, aptes à servir dans l’armée d’Israël
  - type: note
    content: Le premier recensement avait eu lieu trente-huit ans plus tôt (voir Nb 1 à 3). A l’exception de Caleb et de Josué, les hommes du premier recensement sont tous morts (voir 26.64-65).
  - type: text
    content: .
  '20':
  - type: text
    content: 'Autres descendants de Juda, classés par familles : de Shéla, la famille des Shélanites ; de Pérets, celle des Partsites ; de Zérah, celle des Zérahites. '
  '21':
  - type: text
    content: 'Pérets eut deux fils : Hetsrôn, de qui est issue la famille des Hetsronites, et Hamoul, de qui est issue la famille des Hamoulites. '
  '22':
  - type: text
    content: Telles étaient les familles de Juda. Leur effectif était de 76 500 hommes.
  '23':
  - type: text
    content: 'Descendants d’Issacar, classés par familles : de Tola, la famille des Tolaïtes ; de Pouva, celle des Pouvites'
  - type: note
    content: 'Le Pentateuque samaritain, l’ancienne version grecque, la Vulgate et 1 Ch 7.1 ont : Poua… Pouites.'
  - type: text
    content: '  ; '
  '24':
  - type: text
    content: 'de Yashoub, celle des Yashoubites ; de Shimrôn, celle des Shimronites. '
  '25':
  - type: text
    content: Telles étaient les familles d’Issacar. Leur effectif était de 64 300 hommes.
  '26':
  - type: text
    content: 'Descendants de Zabulon, classés par familles : de Séred, la famille des Sardites ; d’Elôn, celle des Elonites ; de Yahléel, celle des Yahleélites. '
  '27':
  - type: text
    content: Telles étaient les familles de Zabulon. Leur effectif était de 60 500 hommes.
  '28':
  - type: text
    content: 'Joseph eut pour fils Manassé et Ephraïm. '
  '29':
  - type: text
    content: 'Fils de Manassé : Makir, de qui est issue la famille des Makirites et qui eut pour fils Galaad, de qui sont issus les Galaadites. '
  '3':
  - type: text
    content: 'Moïse et le prêtre Eléazar s’adressèrent au peuple dans les plaines de Moab au bord du Jourdain à la hauteur de Jéricho. Ils leur dirent : '
  '30':
  - type: text
    content: 'Voici les descendants de Galaad : Yézer, de qui est issue la famille des Yézérites ; Héleq avec la famille des Hélqites ; '
  '31':
  - type: text
    content: 'Asriel avec la famille des Asriélites ; Sichem avec la famille des Sichémites ; '
  '32':
  - type: text
    content: 'Shemida avec la famille des Shemidaïtes ; Hépher avec la famille des Héphrites. '
  '33':
  - type: text
    content: 'Tselophhad, fils de Hépher, n’eut pas de fils, mais il eut pour filles : Mahla, Noa, Hogla, Milka et Tirtsa. '
  '34':
  - type: text
    content: Telles étaient les familles de Manassé. Leur effectif était de 52 700 hommes.
  '35':
  - type: text
    content: 'Voici les descendants d’Ephraïm classés par familles : de Shoutélah, la famille des Shoutalhites ; de Béker, celle des Bakrites ; de Tahân, celle des Tahanites. '
  '36':
  - type: text
    content: 'Shoutélah eut pour fils Erân de qui est issue la famille des Eranites. '
  '37':
  - type: text
    content: Telles étaient les familles d’Ephraïm. Leur effectif était de 32 500 hommes. Tels sont les descendants de Joseph selon leurs familles.
  '38':
  - type: text
    content: 'Descendants de Benjamin, classés par familles : de Béla, la famille des Balites ; d’Ashbel, celle des Ashbélites ; d’Ahiram, celle des Ahiramites ; '
  '39':
  - type: text
    content: de Shoupham
  - type: note
    content: 'D’après quelques manuscrits du texte hébreu traditionnel, le Pentateuque samaritain, la version syriaque et la Vulgate. La plupart des manuscrits du texte hébreu traditionnel ont : Shephoupham.'
  - type: text
    content: ', celle des Shouphamites ; de Houpham, celle des Houphamites. '
  '4':
  - type: text
    content: Nous allons faire le recensement de tous les hommes de vingt ans et plus, comme l’Eternel l’a ordonné à Moïse. Voici les descendants d’Israël sortis d’Egypte.
  '40':
  - type: text
    content: 'Béla eut deux fils : Ard'
  - type: note
    content: D’après le Pentateuque samaritain et la version syriaque. Manque dans le texte hébreu traditionnel.
  - type: text
    content: ', de qui est issue la famille des Ardites, et Naaman, de qui est issue la famille des Naamanites. '
  '41':
  - type: text
    content: Telles étaient les familles de Benjamin. Leur effectif était de 45 600 hommes.
  '42':
  - type: text
    content: 'Voici les descendants de Dan classés par familles : de Shouham est issue la famille des Shouhamites. Les familles de Dan sont les familles des Shouhamites. '
  '43':
  - type: text
    content: L’ensemble des familles des Shouhamites était de 64 400 hommes.
  '44':
  - type: text
    content: 'Descendants d’Aser, classés par familles : de Yimna la famille des Yimnites ; de Yishvi, celle des Yishvites ; de Beria, celle des Beriites. '
  '45':
  - type: text
    content: 'De ce dernier sont issues la famille des Hébrites de Héber et celle des Malkiélites de Malkiel. '
  '46':
  - type: text
    content: 'Aser avait aussi une fille appelée Sérah. '
  '47':
  - type: text
    content: Telles étaient les familles d’Aser. Leur effectif était de 53 400 hommes.
  '48':
  - type: text
    content: 'Descendants de Nephtali, classés par familles : de Yahtséel, la famille des Yahtseélites ; de Gouni, celle des Gounites ; '
  '49':
  - type: text
    content: 'de Yétser, celle des Yitsrites ; de Shillem, celle des Shillémites. '
  '5':
  - type: text
    content: 'Fils de Ruben, premier-né d’Israël : Hénok, de qui est issue la famille des Hénokites ; de Pallou, la famille des Pallouites ; '
  '50':
  - type: text
    content: Telles étaient les familles de Nephtali. Leur effectif était de 45 400 hommes.
  '51':
  - type: text
    content: L’effectif total des Israélites recensés était de 601 730 hommes.
  '52':
  - type: text
    content: L’Eternel parla à Moïse, en ces termes
  - type: note
    content: Pour les v. 52-56, voir Nb 33.54 ; 34.13 ; Jos 14.1-2.
  - type: text
    content: '  : '
  '53':
  - type: text
    content: 'C’est entre ceux-là que le pays sera partagé, et donné en possession en se basant sur le nombre de personnes. '
  '54':
  - type: text
    content: 'Aux tribus plus nombreuses, tu donneras un patrimoine plus grand, et aux moins nombreuses, un plus petit ; à chacun sera donné un territoire proportionné à son effectif. '
  '55':
  - type: text
    content: 'Toutefois, c’est par tirage au sort que se fera le partage du pays ; chaque tribu recevra sa part d’après le nombre de ses ressortissants. '
  '56':
  - type: text
    content: C’est le sort qui décidera du territoire attribué aux plus nombreux et à ceux qui le sont moins.
  - type: heading
    content: Le recensement des lévites
  '57':
  - type: text
    content: 'Voici les effectifs des lévites recensés par familles : de Guershôn est issue la famille des Guershonites ; de Qehath, celle des Qehatites ; de Merari, celle des Merarites. '
  '58':
  - type: text
    content: 'Voici les familles issues de Lévi : celle des Libnites, des Hébronites, des Mahlites, des Moushites et des Qoréites. Qehath eut pour fils Amram'
  - type: note
    content: Voir Ex 6.17-19, 24.
  - type: text
    content: ' '
  '59':
  - type: text
    content: 'qui épousa Yokébed, fille de Lévi, née en Egypte. Ils eurent pour enfants Aaron, Moïse et leur sœur Miryam. '
  '6':
  - type: text
    content: de Hetsrôn, celle des Hetsronites ; de Karmi, celle des Karmites
  - type: note
    content: Voir Gn 46.9.
  - type: text
    content: .
  '60':
  - type: text
    content: 'Aaron eut pour fils : Nadab, Abihou, Eléazar et Itamar'
  - type: note
    content: Voir Ex 6.23 ; Nb 3.2.
  - type: text
    content: '. '
  '61':
  - type: text
    content: Nadab et Abihou moururent pour avoir présenté devant l’Eternel un feu profane
  - type: note
    content: Voir Lv 10.1-7 ; Nb 3.4.
  - type: text
    content: .
  '62':
  - type: text
    content: L’effectif des lévites de sexe masculin âgés d’un mois et plus était de 23 000. Les lévites ne furent pas compris dans le recensement des Israélites, car ils ne devaient pas recevoir de patrimoine comme ceux-ci.
  - type: heading
    content: Conclusion
  '63':
  - type: text
    content: 'Tel fut le résultat du recensement des Israélites effectué par Moïse et le prêtre Eléazar dans les plaines de Moab au bord du Jourdain, en face de Jéricho. '
  '64':
  - type: text
    content: Parmi eux, il ne restait plus personne de ceux que Moïse et Aaron avaient recensés dans le désert du Sinaï
  - type: note
    content: Voir Nb 1 ; 3.
  - type: text
    content: ', '
  '65':
  - type: text
    content: car l’Eternel leur avait déclaré qu’ils mourraient dans le désert. Il ne subsistait donc aucun d’entre eux, excepté Caleb, fils de Yephounné, et Josué, fils de Noun
  - type: note
    content: Voir 14.26-38.
  - type: text
    content: .
  '7':
  - type: text
    content: 'Telles étaient les familles de Ruben. Leur effectif était de 43 730 hommes. '
  '8':
  - type: text
    content: 'Eliab, fils de Pallou, '
  '9':
  - type: text
    content: 'eut pour fils : Nemouel, Datan et Abiram. Ce sont ces deux derniers, membres du conseil de la communauté, qui s’en prirent à Moïse et Aaron avec les partisans de Qoré, lorsque ceux-ci se rebellèrent contre l’Eternel'
  - type: note
    content: Voir le chapitre 16.
  - type: text
    content: '. '
