document_id: DEU.6,21
type_code: fra
verses:
  '1':
  - type: heading
    content: L’Eternel seul
  - type: text
    content: 'Voici les commandements, les ordonnances et les lois que l’Eternel ton Dieu m’a chargé de t’enseigner pour que tu les appliques dans le pays où tu vas entrer pour en prendre possession, '
  '10':
  - type: text
    content: Lorsque l’Eternel ton Dieu t’aura fait entrer dans le pays qu’il a promis par serment à tes ancêtres Abraham, Isaac et Jacob
  - type: note
    content: Voir Gn 12.7 ; 26.3 ; 28.13.
  - type: text
    content: ' de te donner, tu y trouveras de grandes et belles cités que tu n’as pas bâties, '
  '11':
  - type: text
    content: 'des maisons remplies de toutes sortes de biens que tu n’as pas amassés, des citernes taillées dans le roc que tu n’as pas creusées, des vignes et des oliviers que tu n’as pas plantés. Lorsque tu mangeras et que tu seras rassasié, '
  '12':
  - type: text
    content: 'garde-toi bien d’oublier l’Eternel qui t’a fait sortir d’Egypte, du pays où tu étais esclave. '
  '13':
  - type: text
    content: C’est l’Eternel ton Dieu que tu dois craindre, c’est à lui que tu rendras un culte, et c’est par son nom que tu prêteras serment
  - type: note
    content: Cité en Mt 4.10 ; Lc 4.8.
  - type: text
    content: '. '
  '14':
  - type: text
    content: 'Vous ne vous rallierez pas à d’autres dieux, ces dieux des peuples qui vous entoureront, '
  '15':
  - type: text
    content: 'car l’Eternel votre Dieu, qui est au milieu de vous, est un Dieu qui ne tolère aucun rival : il se mettrait en colère contre vous et vous ferait disparaître de la surface de la terre. '
  '16':
  - type: text
    content: Vous ne forcerez pas la main à l’Eternel votre Dieu comme vous l’avez fait à Massa
  - type: note
    content: Voir Ex 17.1-7.
  - type: text
    content: '  ; '
  '17':
  - type: text
    content: 'mais vous aurez soin d’obéir aux commandements, aux lois et aux ordonnances que l’Eternel votre Dieu vous a donnés. '
  '18':
  - type: text
    content: 'Tu feras ce que l’Eternel juge juste et bon, afin que tu sois heureux et que tu parviennes à prendre possession du bon pays que l’Eternel a promis par serment à tes ancêtres, '
  '19':
  - type: text
    content: en chassant tous tes ennemis, comme il l’a promis.
  '2':
  - type: text
    content: 'et que tu craignes l’Eternel ton Dieu en obéissant toute ta vie à toutes ses ordonnances et à tous ses commandements que je te transmets. Ils sont pour toi, pour tes fils et pour leurs descendants. Ainsi tu jouiras d’une longue vie. '
  '20':
  - type: text
    content: 'Lorsque, plus tard, vos fils vous demanderont : « De quel droit l’Eternel notre Dieu vous a-t-il imposé ces ordonnances, ces lois et ces décrets ? » '
  '21':
  - type: text
    content: 'vous leur répondrez : « Nous avons été esclaves du pharaon en Egypte, et l’Eternel nous a tirés de là avec puissance. '
  '22':
  - type: text
    content: 'Il a accompli sous nos yeux des signes miraculeux et de grands prodiges pour le malheur de l’Egypte, du pharaon et de tous ceux de son entourage. '
  '23':
  - type: text
    content: 'Mais nous, il nous a fait sortir de là pour nous amener ici et nous donner le pays qu’il avait promis par serment à nos ancêtres. '
  '24':
  - type: text
    content: 'Et l’Eternel notre Dieu nous a ordonné d’appliquer toutes ces lois et de le craindre ainsi, afin que nous soyons toujours heureux et qu’il nous accorde de vivre comme il l’a fait jusqu’à ce jour. '
  '25':
  - type: text
    content: Nous serons donc justes
  - type: note
    content: 'Autres traductions : ce ne sera donc pour nous que justice si… ou nous serons donc tenus pour justes si…'
  - type: text
    content: ' si nous prenons soin d’obéir à tous ces commandements en présence de l’Eternel notre Dieu, comme il nous l’a ordonné. »'
  '3':
  - type: text
    content: C’est pourquoi, ô Israël, écoute-les, veille à y obéir, et applique-les, afin d’être heureux et de devenir très nombreux dans ce pays ruisselant de lait et de miel, comme l’Eternel, le Dieu de tes ancêtres, te l’a dit.
  '4':
  - type: text
    content: Ecoute, Israël, l’Eternel est notre Dieu, l’Eternel seul
  - type: note
    content: 'Autres traductions : L’Eternel est unique ou l’Eternel le seul Dieu. Voir Mc 12.29.'
  - type: text
    content: .
  '5':
  - type: text
    content: Tu aimeras l’Eternel ton Dieu de tout ton cœur, de toute ton âme et de toute ta force
  - type: note
    content: Cité en Mt 22.37 ; Mc 12.30 ; Lc 10.27.
  - type: text
    content: '. '
  '6':
  - type: text
    content: Que ces commandements que je te donne aujourd’hui restent gravés dans ton cœur
  - type: note
    content: Pour les v. 6-9, voir Dt 11.18-20.
  - type: text
    content: '. '
  '7':
  - type: text
    content: 'Tu les inculqueras à tes enfants et tu en parleras chez toi dans ta maison, et quand tu marcheras sur la route, quand tu te coucheras et quand tu te lèveras. '
  '8':
  - type: text
    content: 'Qu’ils soient attachés comme un signe sur ta main et comme une marque sur ton front. '
  '9':
  - type: text
    content: Tu les inscriras sur les poteaux de ta maison et sur les montants de tes portes
  - type: note
    content: 'Ou : sur les portes (des villes). Les v. 8-9 utilisent un langage imagé. Le judaïsme les a pris à la lettre, d’où les tefilins, ou phylactères, petites boîtes en cuir que portent les Israélites sur le front et sur le bras gauche (fixées à l’aide de bandelettes de cuir) lors de la prière quotidienne (voit Mt 23.5), ainsi que les mezouzas fixées sur le montant de leur porte d’entrée. Ces objets contiennent trois textes du Pentateuque sur des bandes de parchemin.'
  - type: text
    content: .
