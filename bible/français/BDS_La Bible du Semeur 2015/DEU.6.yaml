document_id: DEU.6
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: L’Eternel seul
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Voici les commandements, les ordonnances et les lois que l’Eternel ton Dieu m’a chargé de t’enseigner pour que tu les appliques dans le pays où tu vas entrer pour en prendre possession, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'et que tu craignes l’Eternel ton Dieu en obéissant toute ta vie à toutes ses ordonnances et à tous ses commandements que je te transmets. Ils sont pour toi, pour tes fils et pour leurs descendants. Ainsi tu jouiras d’une longue vie. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: C’est pourquoi, ô Israël, écoute-les, veille à y obéir, et applique-les, afin d’être heureux et de devenir très nombreux dans ce pays ruisselant de lait et de miel, comme l’Eternel, le Dieu de tes ancêtres, te l’a dit.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Ecoute, Israël, l’Eternel est notre Dieu, l’Eternel seul
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '6.4 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Autres traductions : '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'L’Eternel est unique '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'ou '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'l’Eternel le seul Dieu. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Voir '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Mc 12.29
        metadata:
          usfm: MRK.12.29
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Tu aimeras l’Eternel ton Dieu de tout ton cœur, de toute ton âme et de toute ta force
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '6.5 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Cité en Mt 22.37 ; Mc 12.30 ; Lc 10.27.
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Que ces commandements que je te donne aujourd’hui restent gravés dans ton cœur
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '6.6 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Pour les v. 6-9, voir '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Dt 11.18-20
        metadata:
          usfm: DEU.11.18+DEU.11.19+DEU.11.20
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Tu les inculqueras à tes enfants et tu en parleras chez toi dans ta maison, et quand tu marcheras sur la route, quand tu te coucheras et quand tu te lèveras. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Qu’ils soient attachés comme un signe sur ta main et comme une marque sur ton front. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Tu les inscriras sur les poteaux de ta maison et sur les montants de tes portes
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '6.9 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Ou : '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: sur les portes (des villes)
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '. Les v. 8-9 utilisent un langage imagé. Le judaïsme les a pris à la lettre, d’où les '
      - type: usfm
        marker: tl
        children:
        - type: text
          text: tefilins,
      - type: text
        text: ' ou phylactères, petites boîtes en cuir que portent les Israélites sur le front et sur le bras gauche (fixées à l’aide de bandelettes de cuir) lors de la prière quotidienne (voit '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Mt 23.5
        metadata:
          usfm: MAT.23.5
      - type: text
        text: '), ainsi que les '
      - type: usfm
        marker: tl
        children:
        - type: text
          text: mezouzas
      - type: text
        text: ' fixées sur le montant de leur porte d’entrée. Ces objets contiennent trois textes du Pentateuque sur des bandes de parchemin.'
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Lorsque l’Eternel ton Dieu t’aura fait entrer dans le pays qu’il a promis par serment à tes ancêtres Abraham, Isaac et Jacob
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '6.10 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Voir Gn 12.7 ; 26.3 ; 28.13.
    marker-yv: yv-n
  - type: text
    text: ' de te donner, tu y trouveras de grandes et belles cités que tu n’as pas bâties, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'des maisons remplies de toutes sortes de biens que tu n’as pas amassés, des citernes taillées dans le roc que tu n’as pas creusées, des vignes et des oliviers que tu n’as pas plantés. Lorsque tu mangeras et que tu seras rassasié, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'garde-toi bien d’oublier l’Eternel qui t’a fait sortir d’Egypte, du pays où tu étais esclave. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: C’est l’Eternel ton Dieu que tu dois craindre, c’est à lui que tu rendras un culte, et c’est par son nom que tu prêteras serment
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '6.13 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Cité en Mt 4.10 ; Lc 4.8.
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Vous ne vous rallierez pas à d’autres dieux, ces dieux des peuples qui vous entoureront, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'car l’Eternel votre Dieu, qui est au milieu de vous, est un Dieu qui ne tolère aucun rival : il se mettrait en colère contre vous et vous ferait disparaître de la surface de la terre. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Vous ne forcerez pas la main à l’Eternel votre Dieu comme vous l’avez fait à Massa
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '6.16 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Voir '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ex 17.1-7
        metadata:
          usfm: EXO.17.1+EXO.17.2+EXO.17.3+EXO.17.4+EXO.17.5+EXO.17.6+EXO.17.7
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: '  ; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'mais vous aurez soin d’obéir aux commandements, aux lois et aux ordonnances que l’Eternel votre Dieu vous a donnés. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Tu feras ce que l’Eternel juge juste et bon, afin que tu sois heureux et que tu parviennes à prendre possession du bon pays que l’Eternel a promis par serment à tes ancêtres, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: en chassant tous tes ennemis, comme il l’a promis.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Lorsque, plus tard, vos fils vous demanderont : « De quel droit l’Eternel notre Dieu vous a-t-il imposé ces ordonnances, ces lois et ces décrets ? » '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'vous leur répondrez : « Nous avons été esclaves du pharaon en Egypte, et l’Eternel nous a tirés de là avec puissance. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Il a accompli sous nos yeux des signes miraculeux et de grands prodiges pour le malheur de l’Egypte, du pharaon et de tous ceux de son entourage. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Mais nous, il nous a fait sortir de là pour nous amener ici et nous donner le pays qu’il avait promis par serment à nos ancêtres. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Et l’Eternel notre Dieu nous a ordonné d’appliquer toutes ces lois et de le craindre ainsi, afin que nous soyons toujours heureux et qu’il nous accorde de vivre comme il l’a fait jusqu’à ce jour. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: Nous serons donc justes
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '6.25 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Autres traductions : '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'ce ne sera donc pour nous que justice si… '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'ou '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: nous serons donc tenus pour justes si…
    marker-yv: yv-n
  - type: text
    text: ' si nous prenons soin d’obéir à tous ces commandements en présence de l’Eternel notre Dieu, comme il nous l’a ordonné. »'
