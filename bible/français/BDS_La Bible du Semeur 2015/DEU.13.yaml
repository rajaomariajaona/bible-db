document_id: DEU.13,21
type_code: fra
verses:
  '1':
  - type: heading
    content: Ne suivez pas les faux prophètes !
  - type: text
    content: Vous obéirez à tout ce que je vous commande et vous l’appliquerez, sans rien y ajouter et sans rien en retrancher
  - type: note
    content: Voir Dt 4.2 ; Ap 22.18-19.
  - type: text
    content: .
  '10':
  - type: text
    content: 'Au contraire, tu as le devoir de le faire périr. Ta main se lèvera la première sur lui pour le mettre à mort, puis tout le peuple t’imitera. '
  '11':
  - type: text
    content: Tu le lapideras pour le faire mourir
  - type: note
    content: Par cette exécution à coups de pierre (lapidation), chaque membre du peuple se désolidarisait du coupable et exprimait son accord avec le jugement, ainsi que sa volonté d’éradiquer le mal et de maintenir le respect de la Loi. Les témoins accusateurs jetaient les premières pierres (v. 10 ; 17.7).
  - type: text
    content: ', parce qu’il a cherché à te détourner de l’Eternel ton Dieu qui t’a fait sortir d’Egypte où tu étais esclave. '
  '12':
  - type: text
    content: Tout Israël l’apprendra et sera saisi de crainte, et l’on ne recommencera pas à commettre un tel méfait au milieu de vous.
  - type: heading
    content: Le châtiment des Israélites infidèles
  '13':
  - type: text
    content: 'Si vous entendez dire que, dans l’une des villes que l’Eternel ton Dieu vous donne pour y habiter, '
  '14':
  - type: text
    content: des vauriens
  - type: note
    content: 'Littéralement : des hommes, fils de Bélial (cf. 1 S 1.16 ; 2.12 ; 25.17). Plus tard, le mot Bélial sera utilisé comme nom de Satan (2 Co 6.15).'
  - type: text
    content: ' de votre propre peuple ont entraîné les habitants en disant : « Allons rendre un culte à d’autres dieux que vous ne connaissez pas ! », '
  '15':
  - type: text
    content: 'vous ferez des recherches, vous mènerez une enquête approfondie en interrogeant les gens avec soin. Si la chose est vraie, s’il est établi qu’une telle abomination a été commise chez vous, '
  '16':
  - type: text
    content: 'vous ferez périr par l’épée tous les habitants de cette ville ainsi que le bétail. Vous la détruirez avec tout ce qu’elle contient pour la vouer à l’Eternel. '
  '17':
  - type: text
    content: 'Vous rassemblerez toutes ses richesses au milieu de la place et vous brûlerez entièrement la ville et tous ses biens pour l’Eternel votre Dieu. Elle restera pour toujours un monceau de ruines et ne sera plus jamais rebâtie. '
  '18':
  - type: text
    content: 'Vous ne mettrez la main sur rien de ce qui, voué à la malédiction, a été détruit, afin que l’ardente colère de l’Eternel s’apaise. Il vous accordera sa compassion et vous fera grâce en vous rendant nombreux, comme il l’a promis à vos ancêtres, '
  '19':
  - type: text
    content: si vous l’écoutez pour obéir à tous ses commandements que je vous transmets aujourd’hui et pour faire ce qu’il considère comme juste.
  '2':
  - type: text
    content: Peut-être un prophète apparaîtra-t-il un jour parmi vous, ou un visionnaire qui vous donnera un signe miraculeux ou vous annoncera un prodige
  - type: note
    content: Pour les v. 2-6, sur les faux prophètes, voir aussi Jr 23.25-32.
  - type: text
    content: '. '
  '3':
  - type: text
    content: 'Si le signe ou le prodige annoncé s’accomplit, et s’il vous dit : « Allons suivre d’autres dieux que vous ne connaissez pas et rendons-leur un culte », '
  '4':
  - type: text
    content: 'vous n’écouterez pas les paroles de ce prophète ou de ce visionnaire, car l’Eternel votre Dieu se servira de lui pour vous mettre à l’épreuve, afin de voir si vous l’aimez réellement de tout votre cœur et de tout votre être. '
  '5':
  - type: text
    content: 'C’est à l’Eternel votre Dieu que vous rendrez un culte, c’est lui que vous craindrez ; vous obéirez à ses commandements, vous l’écouterez, c’est à lui seul que vous rendrez un culte, et c’est à lui seul que vous vous attacherez. '
  '6':
  - type: text
    content: Quant à ce prophète ou ce visionnaire, il sera puni de mort pour avoir prêché la désobéissance à l’Eternel votre Dieu, qui vous a fait sortir d’Egypte et vous a libérés de l’esclavage, car il aura voulu vous entraîner hors du chemin que l’Eternel votre Dieu vous a ordonné de suivre. Ainsi, vous ferez disparaître le mal du milieu de vous.
  - type: heading
    content: Ne vous laissez pas entraîner par un proche !
  '7':
  - type: text
    content: 'Si ton frère, fils de ta mère, ou ton fils ou ta fille, ou la femme que tu serres contre ton cœur, ou ton ami intime essaie de te séduire en secret en te disant : « Allons rendre un culte à d’autres dieux que ni toi ni tes ancêtres n’avez connus, '
  '8':
  - type: text
    content: 'des dieux d’entre les divinités des peuples étrangers, proches ou lointains, qui habitent d’une extrémité de la terre à l’autre », '
  '9':
  - type: text
    content: 'tu n’accepteras pas sa suggestion et tu ne l’écouteras pas ; bien plus, tu ne t’apitoieras pas sur lui, tu ne l’épargneras pas et tu ne couvriras pas sa faute. '
