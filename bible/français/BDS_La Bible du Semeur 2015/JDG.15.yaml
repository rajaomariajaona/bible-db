document_id: JDG.15
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: La vengeance de Samson contre les Philistins
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Quelque temps après, lors de la moisson des blés
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '15.1 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Fin mai, début juin.
    marker-yv: yv-n
  - type: text
    text: ', Samson rendit visite à sa femme et lui apporta un jeune chevreau'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '15.1 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Présent habituel dans ce cas (voir '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Gn 38.17
        metadata:
          usfm: GEN.38.17
      - type: text
        text: ). Dans ce type de mariage, la mariée restait dans la maison de son père qui ne percevait pas de dot, mais des cadeaux lors de chaque visite de l’époux.
    marker-yv: yv-n
  - type: text
    text: '. Il déclara : Je veux aller auprès de ma femme dans sa chambre.'
- type: usfm
  marker: p
  children:
  - type: text
    text: Mais son beau-père ne le laissa pas y aller.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: – J’étais persuadé, lui dit-il, que tu l’avais prise en haine, alors je l’ai donnée à ton garçon d’honneur. Est-ce que sa jeune sœur n’est pas plus charmante qu’elle ? Prends-la donc à sa place.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Samson répliqua : Cette fois-ci, on ne pourra pas me reprocher le mal que je vais faire aux Philistins.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Là-dessus, il s’en alla et attrapa trois cents chacals
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '15.4 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Mot qui signifie aussi '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'renard. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Ici, il s’agit sans doute de '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'chacals '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: car ces animaux vivent en bandes et sont donc relativement faciles à attraper.
    marker-yv: yv-n
  - type: text
    text: '. Après quoi, il prit des torches, attacha les animaux deux par deux par leurs queues en fixant une torche entre chaque paire de queues. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Puis il alluma les torches et lâcha les chacals dans les blés mûrs des Philistins. Le feu ravagea les blés en meule aussi bien que ceux sur pied, et jusqu’aux vignes et aux oliviers.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Les Philistins demandèrent : Qui a fait cela ?'
- type: usfm
  marker: p
  children:
  - type: text
    text: 'On leur répondit : C’est Samson, le gendre d’un homme de Timna, parce que celui-ci lui a repris sa femme et l’a donnée à son garçon d’honneur.'
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Alors les Philistins allèrent brûler vifs la femme et son père. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Samson leur dit : Puisque c’est ainsi que vous agissez, je n’aurai de cesse jusqu’à ce que je me sois vengé sur vous !'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Là-dessus, il les battit à plate couture et leur infligea une grande défaite. Puis il partit vivre dans la caverne du rocher d’Etam
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '15.8 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Entre Bethléhem (de Juda) et Teqoa (
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 2 Ch 11.6
        metadata:
          usfm: 2CH.11.6
      - type: text
        text: ) ; cette région est trouée de grottes.
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: s1
  children:
  - type: text
    text: Samson livré aux Philistins
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Les Philistins pénétrèrent dans le territoire de Juda, et y installèrent leur camp, et ils se répandirent dans la région de Léhi. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Les habitants de Juda demandèrent : Pourquoi êtes-vous venus nous attaquer ?'
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Ils répondirent : C’est pour capturer Samson que nous sommes venus, afin de lui rendre le mal qu’il nous a fait.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Alors trois mille hommes de Juda se rendirent à la caverne du rocher d’Etam et dirent à Samson : Ne sais-tu pas que les Philistins exercent leur domination sur nous ? Te rends-tu compte de ce que tu nous as fait ?'
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Il répondit : Je les ai traités comme ils m’ont traité.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Mais ils reprirent : Nous sommes venus pour te ligoter et te livrer ensuite aux Philistins.'
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Samson leur dit : Jurez-moi que vous ne me tuerez pas vous-mêmes.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Ils lui assurèrent : Non, nous voulons seulement te ligoter et te remettre à eux ; nous ne te ferons pas mourir.'
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Ils le lièrent avec deux cordes neuves et le firent sortir de la grotte. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: C’est ainsi que Samson arriva à Léhi. Les Philistins accoururent en poussant des cris de triomphe. Alors l’Esprit de l’Eternel fondit sur lui et les cordes qui liaient ses bras se déchirèrent comme si c’étaient des fils de lin brûlés. Ses liens se désagrégèrent sur ses mains.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Il trouva une mâchoire d’âne encore fraîche, la ramassa et s’en servit pour tuer mille hommes. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Puis il s’écria :'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Avec la mâchoire d’un âne ╵j’en ai fait des tas et des tas,
- type: usfm
  marker: q1
  children:
  - type: text
    text: oui, j’ai tué un millier d’hommes ╵avec la mâchoire d’un âne.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Après avoir dit cela, il jeta la mâchoire loin de lui et nomma le lieu Ramath-Léhi (la colline de la Mâchoire).
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Comme il avait horriblement soif, il pria l’Eternel et dit : C’est toi qui as accordé cette grande victoire à ton serviteur. Me laisseras-tu maintenant mourir de soif et tomber entre les mains de ces incirconcis ?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Alors Dieu fendit le rocher creux qui se trouve à Léhi, et il en jaillit de l’eau. Samson but, il reprit ses esprits et se sentit revivre. C’est pourquoi on a nommé cette source Eyn-Haqqoré (la Source de celui qui prie) ; elle existe encore aujourd’hui à Léhi. '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Samson fut chef en Israël pendant vingt ans à l’époque où les Philistins dominaient le pays.
