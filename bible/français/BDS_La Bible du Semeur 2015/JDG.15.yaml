document_id: JDG.15,21
type_code: fra
verses:
  '1':
  - type: heading
    content: La vengeance de Samson contre les Philistins
  - type: text
    content: Quelque temps après, lors de la moisson des blés
  - type: note
    content: Fin mai, début juin.
  - type: text
    content: ', Samson rendit visite à sa femme et lui apporta un jeune chevreau'
  - type: note
    content: Présent habituel dans ce cas (voir Gn 38.17). Dans ce type de mariage, la mariée restait dans la maison de son père qui ne percevait pas de dot, mais des cadeaux lors de chaque visite de l’époux.
  - type: text
    content: '. Il déclara : Je veux aller auprès de ma femme dans sa chambre.'
  - type: text
    content: Mais son beau-père ne le laissa pas y aller.
  '10':
  - type: text
    content: 'Les habitants de Juda demandèrent : Pourquoi êtes-vous venus nous attaquer ?'
  - type: text
    content: 'Ils répondirent : C’est pour capturer Samson que nous sommes venus, afin de lui rendre le mal qu’il nous a fait.'
  '11':
  - type: text
    content: 'Alors trois mille hommes de Juda se rendirent à la caverne du rocher d’Etam et dirent à Samson : Ne sais-tu pas que les Philistins exercent leur domination sur nous ? Te rends-tu compte de ce que tu nous as fait ?'
  - type: text
    content: 'Il répondit : Je les ai traités comme ils m’ont traité.'
  '12':
  - type: text
    content: 'Mais ils reprirent : Nous sommes venus pour te ligoter et te livrer ensuite aux Philistins.'
  - type: text
    content: 'Samson leur dit : Jurez-moi que vous ne me tuerez pas vous-mêmes.'
  '13':
  - type: text
    content: 'Ils lui assurèrent : Non, nous voulons seulement te ligoter et te remettre à eux ; nous ne te ferons pas mourir.'
  - type: text
    content: 'Ils le lièrent avec deux cordes neuves et le firent sortir de la grotte. '
  '14':
  - type: text
    content: C’est ainsi que Samson arriva à Léhi. Les Philistins accoururent en poussant des cris de triomphe. Alors l’Esprit de l’Eternel fondit sur lui et les cordes qui liaient ses bras se déchirèrent comme si c’étaient des fils de lin brûlés. Ses liens se désagrégèrent sur ses mains.
  '15':
  - type: text
    content: 'Il trouva une mâchoire d’âne encore fraîche, la ramassa et s’en servit pour tuer mille hommes. '
  '16':
  - type: text
    content: 'Puis il s’écria :'
  - type: text
    content: Avec la mâchoire d’un âne ╵j’en ai fait des tas et des tas,
  - type: text
    content: oui, j’ai tué un millier d’hommes ╵avec la mâchoire d’un âne.
  '17':
  - type: text
    content: Après avoir dit cela, il jeta la mâchoire loin de lui et nomma le lieu Ramath-Léhi (la colline de la Mâchoire).
  '18':
  - type: text
    content: 'Comme il avait horriblement soif, il pria l’Eternel et dit : C’est toi qui as accordé cette grande victoire à ton serviteur. Me laisseras-tu maintenant mourir de soif et tomber entre les mains de ces incirconcis ?'
  '19':
  - type: text
    content: 'Alors Dieu fendit le rocher creux qui se trouve à Léhi, et il en jaillit de l’eau. Samson but, il reprit ses esprits et se sentit revivre. C’est pourquoi on a nommé cette source Eyn-Haqqoré (la Source de celui qui prie) ; elle existe encore aujourd’hui à Léhi. '
  '2':
  - type: text
    content: – J’étais persuadé, lui dit-il, que tu l’avais prise en haine, alors je l’ai donnée à ton garçon d’honneur. Est-ce que sa jeune sœur n’est pas plus charmante qu’elle ? Prends-la donc à sa place.
  '20':
  - type: text
    content: Samson fut chef en Israël pendant vingt ans à l’époque où les Philistins dominaient le pays.
  '3':
  - type: text
    content: 'Samson répliqua : Cette fois-ci, on ne pourra pas me reprocher le mal que je vais faire aux Philistins.'
  '4':
  - type: text
    content: Là-dessus, il s’en alla et attrapa trois cents chacals
  - type: note
    content: Mot qui signifie aussi renard. Ici, il s’agit sans doute de chacals car ces animaux vivent en bandes et sont donc relativement faciles à attraper.
  - type: text
    content: '. Après quoi, il prit des torches, attacha les animaux deux par deux par leurs queues en fixant une torche entre chaque paire de queues. '
  '5':
  - type: text
    content: Puis il alluma les torches et lâcha les chacals dans les blés mûrs des Philistins. Le feu ravagea les blés en meule aussi bien que ceux sur pied, et jusqu’aux vignes et aux oliviers.
  '6':
  - type: text
    content: 'Les Philistins demandèrent : Qui a fait cela ?'
  - type: text
    content: 'On leur répondit : C’est Samson, le gendre d’un homme de Timna, parce que celui-ci lui a repris sa femme et l’a donnée à son garçon d’honneur.'
  - type: text
    content: 'Alors les Philistins allèrent brûler vifs la femme et son père. '
  '7':
  - type: text
    content: 'Samson leur dit : Puisque c’est ainsi que vous agissez, je n’aurai de cesse jusqu’à ce que je me sois vengé sur vous !'
  '8':
  - type: text
    content: Là-dessus, il les battit à plate couture et leur infligea une grande défaite. Puis il partit vivre dans la caverne du rocher d’Etam
  - type: note
    content: Entre Bethléhem (de Juda) et Teqoa (2 Ch 11.6) ; cette région est trouée de grottes.
  - type: text
    content: .
  - type: heading
    content: Samson livré aux Philistins
  '9':
  - type: text
    content: 'Les Philistins pénétrèrent dans le territoire de Juda, et y installèrent leur camp, et ils se répandirent dans la région de Léhi. '
