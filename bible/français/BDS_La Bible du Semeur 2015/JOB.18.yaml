document_id: JOB.18,21
type_code: fra
verses:
  '1':
  - type: heading
    content: Deuxième discours de Bildad
  - type: heading
    content: La lumière des méchants s’éteindra
  - type: text
    content: 'Bildad de Shouah prit la parole et dit :'
  '10':
  - type: text
    content: la corde pour le prendre ╵est cachée dans la terre,
  - type: text
    content: un piège l’attend sur sa route.
  '11':
  - type: text
    content: De toutes parts, ╵la terreur l’épouvante,
  - type: text
    content: s’attachant à ses pas.
  '12':
  - type: text
    content: Sa vigueur s’affaiblit, ╵consumée par la faim,
  - type: text
    content: et la calamité ╵se tient à ses côtés.
  '13':
  - type: text
    content: Elle dévorera ╵des morceaux de sa peau.
  - type: text
    content: Et les prémices de la mort ╵rongeront tous ses membres.
  '14':
  - type: text
    content: Il sera arraché ╵du milieu de sa tente ╵où il est en sécurité,
  - type: text
    content: et forcé de marcher ╵vers le roi des terreurs
  - type: note
    content: C’est-à-dire la mort.
  - type: text
    content: .
  '15':
  - type: text
    content: 'Qu’on s’installe en sa tente : ╵elle n’est plus à lui.'
  - type: text
    content: Du soufre est répandu ╵sur son habitation
  - type: note
    content: 'Signe de malédiction : voir en Gn 19.24 ; Dt 29.22 le cas de Sodome et de Gomorrhe. Selon d’autres, il s’agirait d’un désinfectant que les nouveaux propriétaires auraient répandu sur la demeure.'
  - type: text
    content: .
  '16':
  - type: text
    content: En bas, ses racines dessèchent,
  - type: text
    content: en haut, sa ramure se fane.
  '17':
  - type: text
    content: Son souvenir ╵disparaît sur la terre,
  - type: text
    content: son nom n’est plus cité ╵au-dehors, dans les rues.
  '18':
  - type: text
    content: Il sera repoussé ╵de la lumière ╵vers les ténèbres.
  - type: text
    content: Il sera expulsé ╵hors du monde habité.
  '19':
  - type: text
    content: Il n’aura ni enfant ╵ni aucun descendant ╵au milieu de son peuple,
  - type: text
    content: et point de survivant ╵dans le lieu où il résidait
  - type: note
    content: Allusion à Job privé de ses enfants.
  - type: text
    content: .
  '2':
  - type: text
    content: Quand donc ferez-vous
  - type: note
    content: Ce vous renvoie peut-être aux hommes droits de 17.8 qui, selon Job, devraient défendre sa cause.
  - type: text
    content: ' taire ╵tout ce flot de paroles ?'
  - type: text
    content: Réfléchissez ╵et puis nous parlerons.
  '20':
  - type: text
    content: Et ceux de l’Occident ╵seront saisis d’effroi ╵devant sa destinée,
  - type: text
    content: et tous ceux de l’Orient ╵seront remplis d’horreur.
  '21':
  - type: text
    content: Voilà ce qui attend ╵les maisons de l’injuste,
  - type: text
    content: et tel est le destin ╵de qui ignore Dieu.
  '3':
  - type: text
    content: Pourquoi passerions-nous ╵pour n’être que des bêtes ?
  - type: text
    content: A vos yeux sommes-nous stupides ?
  '4':
  - type: text
    content: O toi qui te meurtris ╵par ton emportement,
  - type: text
    content: est-ce à cause de toi ╵que la terre devrait ╵rester abandonnée ?
  - type: text
    content: Faut-il que les rochers ╵se déplacent pour toi ?
  '5':
  - type: text
    content: Oui, la lumière du méchant ╵sûrement va s’éteindre,
  - type: text
    content: et sa flamme de feu ╵cessera de briller.
  '6':
  - type: text
    content: La lumière s’obscurcira ╵dans sa demeure,
  - type: text
    content: et elle s’éteindra, ╵la lampe de sa vie.
  '7':
  - type: text
    content: Son allure si ferme ╵devient embarrassée,
  - type: text
    content: et ses propres desseins ╵le feront trébucher.
  '8':
  - type: text
    content: Car ses pieds seront pris ╵dans des filets tendus,
  - type: text
    content: et c’est parmi les mailles ╵d’un piège qu’il avance.
  '9':
  - type: text
    content: Oui, un lacet le prendra au talon,
  - type: text
    content: un collet se refermera sur lui ;
