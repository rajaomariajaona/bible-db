document_id: JOB.18,21
type_code: fra
verses:
  '1':
  - type: usfm
    marker: ms1
    children:
    - type: text
      text: Deuxième discours de Bildad
    marker-yv: yv-h
  - type: usfm
    marker: s1
    children:
    - type: text
      text: La lumière des méchants s’éteindra
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Bildad de Shouah prit la parole et dit :'
  '10':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: la corde pour le prendre ╵est cachée dans la terre,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: un piège l’attend sur sa route.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: De toutes parts, ╵la terreur l’épouvante,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: s’attachant à ses pas.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Sa vigueur s’affaiblit, ╵consumée par la faim,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et la calamité ╵se tient à ses côtés.
  '13':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Elle dévorera ╵des morceaux de sa peau.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et les prémices de la mort ╵rongeront tous ses membres.
  '14':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Il sera arraché ╵du milieu de sa tente ╵où il est en sécurité,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et forcé de marcher ╵vers le roi des terreurs
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '18.14 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'C’est-à-dire '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: la mort.
      marker-yv: yv-n
    - type: text
      text: .
  '15':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Qu’on s’installe en sa tente : ╵elle n’est plus à lui.'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Du soufre est répandu ╵sur son habitation
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '18.15 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Signe de malédiction : voir en Gn 19.24 ; Dt 29.22 le cas de Sodome et de Gomorrhe. Selon d’autres, il s’agirait d’un désinfectant que les nouveaux propriétaires auraient répandu sur la demeure.'
      marker-yv: yv-n
    - type: text
      text: .
  '16':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: En bas, ses racines dessèchent,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: en haut, sa ramure se fane.
  '17':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Son souvenir ╵disparaît sur la terre,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: son nom n’est plus cité ╵au-dehors, dans les rues.
  '18':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Il sera repoussé ╵de la lumière ╵vers les ténèbres.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Il sera expulsé ╵hors du monde habité.
  '19':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Il n’aura ni enfant ╵ni aucun descendant ╵au milieu de son peuple,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et point de survivant ╵dans le lieu où il résidait
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '18.19 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Allusion à Job privé de ses enfants.
      marker-yv: yv-n
    - type: text
      text: .
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Quand donc ferez-vous
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '18.2 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Ce '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'vous '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'renvoie peut-être aux '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'hommes droits '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'de '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: '17.8'
        - type: text
          text: ' qui, selon Job, devraient défendre sa cause.'
      marker-yv: yv-n
    - type: text
      text: ' taire ╵tout ce flot de paroles ?'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Réfléchissez ╵et puis nous parlerons.
  '20':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et ceux de l’Occident ╵seront saisis d’effroi ╵devant sa destinée,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et tous ceux de l’Orient ╵seront remplis d’horreur.
  '21':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Voilà ce qui attend ╵les maisons de l’injuste,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et tel est le destin ╵de qui ignore Dieu.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Pourquoi passerions-nous ╵pour n’être que des bêtes ?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: A vos yeux sommes-nous stupides ?
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: O toi qui te meurtris ╵par ton emportement,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: est-ce à cause de toi ╵que la terre devrait ╵rester abandonnée ?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Faut-il que les rochers ╵se déplacent pour toi ?
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Oui, la lumière du méchant ╵sûrement va s’éteindre,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et sa flamme de feu ╵cessera de briller.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: La lumière s’obscurcira ╵dans sa demeure,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et elle s’éteindra, ╵la lampe de sa vie.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Son allure si ferme ╵devient embarrassée,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et ses propres desseins ╵le feront trébucher.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Car ses pieds seront pris ╵dans des filets tendus,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et c’est parmi les mailles ╵d’un piège qu’il avance.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Oui, un lacet le prendra au talon,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: un collet se refermera sur lui ;
