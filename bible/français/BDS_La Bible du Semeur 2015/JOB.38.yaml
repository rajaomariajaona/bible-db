document_id: JOB.38,21
type_code: fra
verses:
  '1':
  - type: usfm
    marker: ms1
    children:
    - type: text
      text: Premier discours de Dieu
    marker-yv: yv-h
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Dieu évoque son œuvre de création et sa providence
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Alors, du sein de la tempête, l’Eternel répondit à Job :'
  '10':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: quand je lui imposai ma loi,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: quand je plaçai verrous et portes
  '11':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'en lui disant : ╵« C’est jusqu’ici que tu iras, ╵et pas plus loin,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ici s’arrêteront ╵tes flots impétueux » ?
  '12':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: As-tu, un seul jour de ta vie, ╵commandé au matin
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et assigné sa place à l’aube
  '13':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: pour qu’elle se saisisse ╵des extrémités de la terre
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et qu’elle en secoue les méchants
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '38.13 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: La terre est comparée au tapis que l’on secoue le matin hors de la tente pour en chasser la poussière.
      marker-yv: yv-n
    - type: text
      text: '  ?'
  '14':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Alors, la terre est transformée ╵comme l’argile sous l’empreinte
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '38.14 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: L’argile servait de cire, on y imprimait son sceau, lui donnant du relief. La lumière a le même effet sur le paysage.
      marker-yv: yv-n
    - type: text
      text: ','
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et toutes choses sont parées ╵comme d’un vêtement.
  '15':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mais les méchants ╵se voient privés de leur lumière
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et le bras levé est brisé.
  '16':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Es-tu parvenu jusqu’aux sources ╵qui font jaillir les mers ?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ou t’es-tu promené ╵dans les profondeurs de l’abîme ?
  '17':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Les portes de la mort ╵ont-elles paru devant toi ?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: As-tu vu les accès ╵du royaume des épaisses ténèbres ?
  '18':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: As-tu embrassé du regard ╵l’étendue de la terre ?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Dis-le, si tu sais tout cela.
  '19':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: De quel côté est le chemin ╵vers le séjour de la lumière,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et les ténèbres, ╵où donc ont-elles leur demeure,
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Qui donc obscurcit mes desseins
  - type: usfm
    marker: q1
    children:
    - type: text
      text: par des discours sans connaissance ?
  '20':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: pour que tu puisses les saisir ╵là où elles se séparent
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '38.20 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: C’est-à-dire à la limite du jour et de la nuit.
      marker-yv: yv-n
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et bien comprendre les sentiers ╵de leur habitation ?
  '21':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tu dois connaître tout cela, ╵puisque tu étais déjà né,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et que tes jours sont si nombreux !
  '22':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: As-tu visité les greniers ╵qui recèlent la neige,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et les dépôts de grêle, ╵les as-tu vus ?
  '23':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Je les tiens en réserve ╵pour les temps de détresse,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: les jours de lutte et de combat
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '38.23 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Voir Jos 10.11 ; Ps 18.13-14 ; Es 28.17 ; 30.30.
      marker-yv: yv-n
    - type: text
      text: .
  '24':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Par quelle voie ╵se répand la lumière ?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Par où le vent d’orient ╵envahit-il la terre ?
  '25':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Qui ouvre le passage ╵pour les torrents de pluie ?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Qui a frayé la voie ╵aux éclairs de l’orage ╵tonitruant,
  '26':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: faisant tomber la pluie ╵sur une terre inhabitée,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sur un désert inoccupé,
  '27':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: pour arroser les solitudes ╵et les régions arides,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et pour y faire germer l’herbe ?
  '28':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: La pluie a-t-elle un père ?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et qui donc a fait naître ╵les gouttes de rosée ?
  '29':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: De quel sein sort la glace,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: qui a donné naissance ╵au blanc frimas du ciel,
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Mets ta ceinture, comme un brave :'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: je vais te poser des questions ╵et tu m’enseigneras
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '38.3 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Voir '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: 42.3-4
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: .
  '30':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: lorsque les eaux durcissent ╵pour devenir comme la pierre
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et que se fige ╵la surface des lacs profonds ?
  '31':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Peux-tu nouer ╵les cordes des Pléiades
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ou desserrer ╵les cordages d’Orion
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '38.31 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Voir '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: '9.9'
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: '  ?'
  '32':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fais-tu paraître ╵les constellations en leur temps ?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Conduis-tu la Grande Ourse ╵et ses étoiles secondaires ?
  '33':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Sais-tu par quelles lois ╵le ciel est gouverné ?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Est-ce toi qui imposes ╵son pouvoir sur la terre ?
  '34':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Te suffit-il ╵de parler aux nuages
  - type: usfm
    marker: q1
    children:
    - type: text
      text: pour que des trombes d’eau ╵se déversent sur toi ?
  '35':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Les éclairs partent-ils ╵à ton commandement
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'te disant : « Nous voici » ?'
  '36':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Qui a implanté la sagesse ╵au cœur de l’homme
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et le discernement ╵en son esprit
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '38.36 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'La traduction des deux mots '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'cœur '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'et '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'esprit '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: est incertaine. Certains pensent qu’ils désignent l’
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'ibis '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'et le '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'coq, '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: le premier oiseau annonçant la venue du printemps, le second celle de l’aurore.
      marker-yv: yv-n
    - type: text
      text: '  ?'
  '37':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Qui a la compétence ╵pour compter les nuages
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et qui peut incliner ╵les amphores du ciel
  '38':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: pour agréger ╵en glèbe la poussière,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et pour coller ╵les mottes de la terre ?
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Dieu évoque le règne animal
    marker-yv: yv-h
  '39':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Peux-tu chasser la proie ╵pour la lionne ?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Apaises-tu la faim ╵des lionceaux
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Où étais-tu quand je posai ╵les fondations du monde
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '38.4 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Dans les v. 4-6, l’auteur parle de la terre comme d’un '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: édifice.
      marker-yv: yv-n
    - type: text
      text: '  ?'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Déclare-le, ╵puisque ta science est si profonde !
  '40':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: quand ils sont tous tapis ╵au fond de leurs tanières,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: quand ils sont à l’affût ╵dans les taillis épais ?
  '41':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Qui donc prépare ╵au corbeau sa pâture
  - type: usfm
    marker: q1
    children:
    - type: text
      text: quand ses oisillons crient vers Dieu,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et sont errants, sans nourriture ?
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Qui en a fixé les mesures, ╵le sais-tu donc ?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Qui a tendu sur lui ╵le cordeau d’arpenteur ?
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Dans quoi les socles ╵de ses colonnes ╵s’enfoncent-ils ?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Qui en posa ╵la pierre principale d’angle,
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: quand les étoiles du matin
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '38.7 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Expression qui peut être prise dans son sens propre (comme dans '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: Ps 148.3
        - type: text
          text: ') ou dans un sens figuré (comme dans '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: Es 14.12
        - type: text
          text: ) comme désignant les anges dont parle la fin du verset. C’est le matin de la création qu’acclament les premières créatures.
      marker-yv: yv-n
    - type: text
      text: ' ╵éclataient, unanimes, ╵dans des chants d’allégresse,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et que tous les anges de Dieu
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '38.7 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Appelés ici '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'fils de Dieu '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '(voir notes 1.6 ; 2.1 et '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: Ps 29.1
        - type: text
          text: ).
      marker-yv: yv-n
    - type: text
      text: ' ╵poussaient des cris de joie ?'
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Qui enferma la mer ╵par une porte à deux battants
  - type: usfm
    marker: q1
    children:
    - type: text
      text: lorsqu’elle jaillit du sein maternel ?
  '9':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: lorsque je fis, de la nuée, ╵son vêtement,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et de l’obscurité ses langes,
