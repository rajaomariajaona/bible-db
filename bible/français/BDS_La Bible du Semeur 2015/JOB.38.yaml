document_id: JOB.38
type_code: fra
segments:
- type: usfm
  marker: ms1
  children:
  - type: text
    text: Premier discours de Dieu
  marker-yv: yv-h
- type: usfm
  marker: s1
  children:
  - type: text
    text: Dieu évoque son œuvre de création et sa providence
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Alors, du sein de la tempête, l’Eternel répondit à Job :'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Qui donc obscurcit mes desseins
- type: usfm
  marker: q1
  children:
  - type: text
    text: par des discours sans connaissance ?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Mets ta ceinture, comme un brave :'
- type: usfm
  marker: q1
  children:
  - type: text
    text: je vais te poser des questions ╵et tu m’enseigneras
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '38.3 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Voir '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 42.3-4
        metadata:
          usfm: JOB.42.3+JOB.42.4
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Où étais-tu quand je posai ╵les fondations du monde
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '38.4 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Dans les v. 4-6, l’auteur parle de la terre comme d’un '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: édifice.
    marker-yv: yv-n
  - type: text
    text: '  ?'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Déclare-le, ╵puisque ta science est si profonde !
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Qui en a fixé les mesures, ╵le sais-tu donc ?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Qui a tendu sur lui ╵le cordeau d’arpenteur ?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Dans quoi les socles ╵de ses colonnes ╵s’enfoncent-ils ?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Qui en posa ╵la pierre principale d’angle,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: quand les étoiles du matin
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '38.7 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Expression qui peut être prise dans son sens propre (comme dans '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ps 148.3
        metadata:
          usfm: PSA.148.3
      - type: text
        text: ') ou dans un sens figuré (comme dans '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Es 14.12
        metadata:
          usfm: ISA.14.12
      - type: text
        text: ) comme désignant les anges dont parle la fin du verset. C’est le matin de la création qu’acclament les premières créatures.
    marker-yv: yv-n
  - type: text
    text: ' ╵éclataient, unanimes, ╵dans des chants d’allégresse,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: et que tous les anges de Dieu
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '38.7 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Appelés ici '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'fils de Dieu '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '(voir notes 1.6 ; 2.1 et '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ps 29.1
        metadata:
          usfm: PSA.29.1
      - type: text
        text: ).
    marker-yv: yv-n
  - type: text
    text: ' ╵poussaient des cris de joie ?'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Qui enferma la mer ╵par une porte à deux battants
- type: usfm
  marker: q1
  children:
  - type: text
    text: lorsqu’elle jaillit du sein maternel ?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: lorsque je fis, de la nuée, ╵son vêtement,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et de l’obscurité ses langes,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: quand je lui imposai ma loi,
- type: usfm
  marker: q1
  children:
  - type: text
    text: quand je plaçai verrous et portes
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'en lui disant : ╵« C’est jusqu’ici que tu iras, ╵et pas plus loin,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: ici s’arrêteront ╵tes flots impétueux » ?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: As-tu, un seul jour de ta vie, ╵commandé au matin
- type: usfm
  marker: q1
  children:
  - type: text
    text: et assigné sa place à l’aube
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: pour qu’elle se saisisse ╵des extrémités de la terre
- type: usfm
  marker: q1
  children:
  - type: text
    text: et qu’elle en secoue les méchants
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '38.13 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: La terre est comparée au tapis que l’on secoue le matin hors de la tente pour en chasser la poussière.
    marker-yv: yv-n
  - type: text
    text: '  ?'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Alors, la terre est transformée ╵comme l’argile sous l’empreinte
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '38.14 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: L’argile servait de cire, on y imprimait son sceau, lui donnant du relief. La lumière a le même effet sur le paysage.
    marker-yv: yv-n
  - type: text
    text: ','
- type: usfm
  marker: q1
  children:
  - type: text
    text: et toutes choses sont parées ╵comme d’un vêtement.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Mais les méchants ╵se voient privés de leur lumière
- type: usfm
  marker: q1
  children:
  - type: text
    text: et le bras levé est brisé.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Es-tu parvenu jusqu’aux sources ╵qui font jaillir les mers ?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ou t’es-tu promené ╵dans les profondeurs de l’abîme ?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Les portes de la mort ╵ont-elles paru devant toi ?
- type: usfm
  marker: q1
  children:
  - type: text
    text: As-tu vu les accès ╵du royaume des épaisses ténèbres ?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: As-tu embrassé du regard ╵l’étendue de la terre ?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Dis-le, si tu sais tout cela.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: De quel côté est le chemin ╵vers le séjour de la lumière,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et les ténèbres, ╵où donc ont-elles leur demeure,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: pour que tu puisses les saisir ╵là où elles se séparent
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '38.20 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: C’est-à-dire à la limite du jour et de la nuit.
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: text
    text: et bien comprendre les sentiers ╵de leur habitation ?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Tu dois connaître tout cela, ╵puisque tu étais déjà né,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et que tes jours sont si nombreux !
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: As-tu visité les greniers ╵qui recèlent la neige,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et les dépôts de grêle, ╵les as-tu vus ?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: Je les tiens en réserve ╵pour les temps de détresse,
- type: usfm
  marker: q1
  children:
  - type: text
    text: les jours de lutte et de combat
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '38.23 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Voir Jos 10.11 ; Ps 18.13-14 ; Es 28.17 ; 30.30.
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: Par quelle voie ╵se répand la lumière ?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Par où le vent d’orient ╵envahit-il la terre ?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: Qui ouvre le passage ╵pour les torrents de pluie ?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Qui a frayé la voie ╵aux éclairs de l’orage ╵tonitruant,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: faisant tomber la pluie ╵sur une terre inhabitée,
- type: usfm
  marker: q1
  children:
  - type: text
    text: sur un désert inoccupé,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: pour arroser les solitudes ╵et les régions arides,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et pour y faire germer l’herbe ?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: La pluie a-t-elle un père ?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et qui donc a fait naître ╵les gouttes de rosée ?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: De quel sein sort la glace,
- type: usfm
  marker: q1
  children:
  - type: text
    text: qui a donné naissance ╵au blanc frimas du ciel,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: lorsque les eaux durcissent ╵pour devenir comme la pierre
- type: usfm
  marker: q1
  children:
  - type: text
    text: et que se fige ╵la surface des lacs profonds ?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: Peux-tu nouer ╵les cordes des Pléiades
- type: usfm
  marker: q1
  children:
  - type: text
    text: ou desserrer ╵les cordages d’Orion
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '38.31 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Voir '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '9.9'
        metadata:
          usfm: JOB.9.9
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: '  ?'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: Fais-tu paraître ╵les constellations en leur temps ?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Conduis-tu la Grande Ourse ╵et ses étoiles secondaires ?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: Sais-tu par quelles lois ╵le ciel est gouverné ?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Est-ce toi qui imposes ╵son pouvoir sur la terre ?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: Te suffit-il ╵de parler aux nuages
- type: usfm
  marker: q1
  children:
  - type: text
    text: pour que des trombes d’eau ╵se déversent sur toi ?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: Les éclairs partent-ils ╵à ton commandement
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'te disant : « Nous voici » ?'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: Qui a implanté la sagesse ╵au cœur de l’homme
- type: usfm
  marker: q1
  children:
  - type: text
    text: et le discernement ╵en son esprit
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '38.36 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'La traduction des deux mots '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'cœur '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'et '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'esprit '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: est incertaine. Certains pensent qu’ils désignent l’
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'ibis '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'et le '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'coq, '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: le premier oiseau annonçant la venue du printemps, le second celle de l’aurore.
    marker-yv: yv-n
  - type: text
    text: '  ?'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: Qui a la compétence ╵pour compter les nuages
- type: usfm
  marker: q1
  children:
  - type: text
    text: et qui peut incliner ╵les amphores du ciel
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: text
    text: pour agréger ╵en glèbe la poussière,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et pour coller ╵les mottes de la terre ?
- type: usfm
  marker: s1
  children:
  - type: text
    text: Dieu évoque le règne animal
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '39'
  - type: text
    text: Peux-tu chasser la proie ╵pour la lionne ?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Apaises-tu la faim ╵des lionceaux
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '40'
  - type: text
    text: quand ils sont tous tapis ╵au fond de leurs tanières,
- type: usfm
  marker: q1
  children:
  - type: text
    text: quand ils sont à l’affût ╵dans les taillis épais ?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '41'
  - type: text
    text: Qui donc prépare ╵au corbeau sa pâture
- type: usfm
  marker: q1
  children:
  - type: text
    text: quand ses oisillons crient vers Dieu,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et sont errants, sans nourriture ?
