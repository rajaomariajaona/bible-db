document_id: JOB.38,21
type_code: fra
verses:
  '1':
  - type: heading
    content: Premier discours de Dieu
  - type: heading
    content: Dieu évoque son œuvre de création et sa providence
  - type: text
    content: 'Alors, du sein de la tempête, l’Eternel répondit à Job :'
  '10':
  - type: text
    content: quand je lui imposai ma loi,
  - type: text
    content: quand je plaçai verrous et portes
  '11':
  - type: text
    content: 'en lui disant : ╵« C’est jusqu’ici que tu iras, ╵et pas plus loin,'
  - type: text
    content: ici s’arrêteront ╵tes flots impétueux » ?
  '12':
  - type: text
    content: As-tu, un seul jour de ta vie, ╵commandé au matin
  - type: text
    content: et assigné sa place à l’aube
  '13':
  - type: text
    content: pour qu’elle se saisisse ╵des extrémités de la terre
  - type: text
    content: et qu’elle en secoue les méchants
  - type: note
    content: La terre est comparée au tapis que l’on secoue le matin hors de la tente pour en chasser la poussière.
  - type: text
    content: '  ?'
  '14':
  - type: text
    content: Alors, la terre est transformée ╵comme l’argile sous l’empreinte
  - type: note
    content: L’argile servait de cire, on y imprimait son sceau, lui donnant du relief. La lumière a le même effet sur le paysage.
  - type: text
    content: ','
  - type: text
    content: et toutes choses sont parées ╵comme d’un vêtement.
  '15':
  - type: text
    content: Mais les méchants ╵se voient privés de leur lumière
  - type: text
    content: et le bras levé est brisé.
  '16':
  - type: text
    content: Es-tu parvenu jusqu’aux sources ╵qui font jaillir les mers ?
  - type: text
    content: Ou t’es-tu promené ╵dans les profondeurs de l’abîme ?
  '17':
  - type: text
    content: Les portes de la mort ╵ont-elles paru devant toi ?
  - type: text
    content: As-tu vu les accès ╵du royaume des épaisses ténèbres ?
  '18':
  - type: text
    content: As-tu embrassé du regard ╵l’étendue de la terre ?
  - type: text
    content: Dis-le, si tu sais tout cela.
  '19':
  - type: text
    content: De quel côté est le chemin ╵vers le séjour de la lumière,
  - type: text
    content: et les ténèbres, ╵où donc ont-elles leur demeure,
  '2':
  - type: text
    content: Qui donc obscurcit mes desseins
  - type: text
    content: par des discours sans connaissance ?
  '20':
  - type: text
    content: pour que tu puisses les saisir ╵là où elles se séparent
  - type: note
    content: C’est-à-dire à la limite du jour et de la nuit.
  - type: text
    content: et bien comprendre les sentiers ╵de leur habitation ?
  '21':
  - type: text
    content: Tu dois connaître tout cela, ╵puisque tu étais déjà né,
  - type: text
    content: et que tes jours sont si nombreux !
  '22':
  - type: text
    content: As-tu visité les greniers ╵qui recèlent la neige,
  - type: text
    content: et les dépôts de grêle, ╵les as-tu vus ?
  '23':
  - type: text
    content: Je les tiens en réserve ╵pour les temps de détresse,
  - type: text
    content: les jours de lutte et de combat
  - type: note
    content: Voir Jos 10.11 ; Ps 18.13-14 ; Es 28.17 ; 30.30.
  - type: text
    content: .
  '24':
  - type: text
    content: Par quelle voie ╵se répand la lumière ?
  - type: text
    content: Par où le vent d’orient ╵envahit-il la terre ?
  '25':
  - type: text
    content: Qui ouvre le passage ╵pour les torrents de pluie ?
  - type: text
    content: Qui a frayé la voie ╵aux éclairs de l’orage ╵tonitruant,
  '26':
  - type: text
    content: faisant tomber la pluie ╵sur une terre inhabitée,
  - type: text
    content: sur un désert inoccupé,
  '27':
  - type: text
    content: pour arroser les solitudes ╵et les régions arides,
  - type: text
    content: et pour y faire germer l’herbe ?
  '28':
  - type: text
    content: La pluie a-t-elle un père ?
  - type: text
    content: Et qui donc a fait naître ╵les gouttes de rosée ?
  '29':
  - type: text
    content: De quel sein sort la glace,
  - type: text
    content: qui a donné naissance ╵au blanc frimas du ciel,
  '3':
  - type: text
    content: 'Mets ta ceinture, comme un brave :'
  - type: text
    content: je vais te poser des questions ╵et tu m’enseigneras
  - type: note
    content: Voir 42.3-4.
  - type: text
    content: .
  '30':
  - type: text
    content: lorsque les eaux durcissent ╵pour devenir comme la pierre
  - type: text
    content: et que se fige ╵la surface des lacs profonds ?
  '31':
  - type: text
    content: Peux-tu nouer ╵les cordes des Pléiades
  - type: text
    content: ou desserrer ╵les cordages d’Orion
  - type: note
    content: Voir 9.9.
  - type: text
    content: '  ?'
  '32':
  - type: text
    content: Fais-tu paraître ╵les constellations en leur temps ?
  - type: text
    content: Conduis-tu la Grande Ourse ╵et ses étoiles secondaires ?
  '33':
  - type: text
    content: Sais-tu par quelles lois ╵le ciel est gouverné ?
  - type: text
    content: Est-ce toi qui imposes ╵son pouvoir sur la terre ?
  '34':
  - type: text
    content: Te suffit-il ╵de parler aux nuages
  - type: text
    content: pour que des trombes d’eau ╵se déversent sur toi ?
  '35':
  - type: text
    content: Les éclairs partent-ils ╵à ton commandement
  - type: text
    content: 'te disant : « Nous voici » ?'
  '36':
  - type: text
    content: Qui a implanté la sagesse ╵au cœur de l’homme
  - type: text
    content: et le discernement ╵en son esprit
  - type: note
    content: La traduction des deux mots cœur et esprit est incertaine. Certains pensent qu’ils désignent l’ibis et le coq, le premier oiseau annonçant la venue du printemps, le second celle de l’aurore.
  - type: text
    content: '  ?'
  '37':
  - type: text
    content: Qui a la compétence ╵pour compter les nuages
  - type: text
    content: et qui peut incliner ╵les amphores du ciel
  '38':
  - type: text
    content: pour agréger ╵en glèbe la poussière,
  - type: text
    content: et pour coller ╵les mottes de la terre ?
  - type: heading
    content: Dieu évoque le règne animal
  '39':
  - type: text
    content: Peux-tu chasser la proie ╵pour la lionne ?
  - type: text
    content: Apaises-tu la faim ╵des lionceaux
  '4':
  - type: text
    content: Où étais-tu quand je posai ╵les fondations du monde
  - type: note
    content: Dans les v. 4-6, l’auteur parle de la terre comme d’un édifice.
  - type: text
    content: '  ?'
  - type: text
    content: Déclare-le, ╵puisque ta science est si profonde !
  '40':
  - type: text
    content: quand ils sont tous tapis ╵au fond de leurs tanières,
  - type: text
    content: quand ils sont à l’affût ╵dans les taillis épais ?
  '41':
  - type: text
    content: Qui donc prépare ╵au corbeau sa pâture
  - type: text
    content: quand ses oisillons crient vers Dieu,
  - type: text
    content: et sont errants, sans nourriture ?
  '5':
  - type: text
    content: Qui en a fixé les mesures, ╵le sais-tu donc ?
  - type: text
    content: Qui a tendu sur lui ╵le cordeau d’arpenteur ?
  '6':
  - type: text
    content: Dans quoi les socles ╵de ses colonnes ╵s’enfoncent-ils ?
  - type: text
    content: Qui en posa ╵la pierre principale d’angle,
  '7':
  - type: text
    content: quand les étoiles du matin
  - type: note
    content: Expression qui peut être prise dans son sens propre (comme dans Ps 148.3) ou dans un sens figuré (comme dans Es 14.12) comme désignant les anges dont parle la fin du verset. C’est le matin de la création qu’acclament les premières créatures.
  - type: text
    content: ' ╵éclataient, unanimes, ╵dans des chants d’allégresse,'
  - type: text
    content: et que tous les anges de Dieu
  - type: note
    content: Appelés ici fils de Dieu (voir notes 1.6 ; 2.1 et Ps 29.1).
  - type: text
    content: ' ╵poussaient des cris de joie ?'
  '8':
  - type: text
    content: Qui enferma la mer ╵par une porte à deux battants
  - type: text
    content: lorsqu’elle jaillit du sein maternel ?
  '9':
  - type: text
    content: lorsque je fis, de la nuée, ╵son vêtement,
  - type: text
    content: et de l’obscurité ses langes,
