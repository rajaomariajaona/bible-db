document_id: 1KI.6,21
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: La construction du Temple
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: (2 Ch 3.1-14)
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: Le roi Salomon commença la construction du Temple en l’honneur de l’Eternel quatre cent quatre-vingts ans
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '6.1 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'L’ancienne version grecque a : '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 440 ans.
      marker-yv: yv-n
    - type: text
      text: ' après la sortie des Israélites d’Egypte, soit la quatrième année de son règne sur Israël'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '6.1 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Ce qui correspond environ à l’an 960 av. J.-C.
      marker-yv: yv-n
    - type: text
      text: ', au deuxième mois, le mois de Ziv'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '6.1 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Ziv
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: ': '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: mois de mai, deuxième mois de l’année juive.
      marker-yv: yv-n
    - type: text
      text: .
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Il construisit les étages adossés à tout le bâtiment en donnant à chacun d’eux deux mètres cinquante de hauteur. Ils étaient reliés au Temple par des poutres de cèdre.
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'L’Eternel s’adressa à Salomon et lui dit : Tu es en train de bâtir ce temple. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Si tu te conduis selon mes ordonnances, si tu obéis à mes lois, si tu suis fidèlement tous mes commandements pour vivre en conformité avec eux, je réaliserai pour toi la promesse que j’ai faite à ton père David
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '6.12 '
      - type: usfm
        marker: ft
        children:
        - type: usfm
          marker: ref
          children:
          - type: text
            text: 2 S 7.13-16
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: '. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Je viendrai habiter au milieu des Israélites et je n’abandonnerai pas mon peuple Israël.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: L’aménagement intérieur du Temple
    marker-yv: yv-h
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Après avoir achevé le gros œuvre du Temple, Salomon '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'fit lambrisser l’intérieur des murs, de bas en haut, avec des boiseries de cèdre et revêtir le sol du Temple d’un plancher de cyprès. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Il fit aussi recouvrir de boiseries de cèdre depuis le sol jusqu’au plafond les murs intérieurs de l’arrière-corps de l’édifice, bâti sur dix mètres de long. Puis il fit aménager l’intérieur de cette partie pour en faire le lieu très saint
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '6.16 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Voir '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: Ex 26.33-34
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: .
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Le reste du Temple, la grande salle qui était devant, avait vingt mètres de long. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Les boiseries de cèdre qui revêtaient l’intérieur du sanctuaire étaient ornées de sculptures en formes de coloquintes et de fleurs entrouvertes. Tout était recouvert de boiseries de cèdre, on ne voyait aucune pierre.
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Salomon fit arranger dans l’arrière-corps la pièce la plus importante du Temple pour y déposer le coffre de l’alliance de l’Eternel. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'L’édifice que le roi Salomon bâtit à l’Eternel avait trente mètres de long, dix mètres de large et quinze mètres de haut. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Cette pièce avait la forme d’un cube de dix mètres de côté
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '6.20 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Pour comparaison, le lieu très saint de la tente de la Rencontre ne faisait à la base que 5 mètres sur 4,50 mètres, avec 5 mètres de hauteur (
        - type: usfm
          marker: ref
          children:
          - type: text
            text: Ex 26
        - type: text
          text: ).
      marker-yv: yv-n
    - type: text
      text: . Ses murs étaient plaqués d’or fin
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '6.20 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'L’or symbolise la gloire de Dieu (comparer '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: Ap 21.10-11
        - type: text
          text: ', '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: '18'
        - type: text
          text: ', '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: '21'
        - type: text
          text: ).
      marker-yv: yv-n
    - type: text
      text: '. On lambrissa également un autel en cèdre. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Salomon plaqua tout l’intérieur de l’édifice d’or fin. Devant l’entrée de la salle du fond, il fit tendre des chaînettes d’or. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Tout l’intérieur du Temple était donc plaqué d’or, de même que l’autel
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '6.22 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Il s’agit de l’autel des parfums (7.48 ; Ex 30.1, 6 ; 37.25-28 ; Hé 9.3-4).
      marker-yv: yv-n
    - type: text
      text: ' placé devant l’entrée du lieu très saint'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '6.22 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Voir '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: Ex 30.1-3
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: '. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: On sculpta en bois d’olivier sauvage deux chérubins de cinq mètres de haut pour les placer dans le lieu très saint
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '6.23 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Pour les v. 23-28, voir '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: Ex 25.18-20
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: '. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Chacune de leurs ailes avait deux mètres cinquante de long, il y avait donc cinq mètres de l’extrémité d’une aile à celle de l’autre. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Les deux chérubins avaient la même dimension et la même forme. '
  '27':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Salomon fit placer les chérubins au milieu de la pièce la plus intérieure du Temple. De leurs ailes extérieures déployées, ils touchaient les deux parois opposées alors que leurs deux autres ailes se touchaient au milieu de la pièce.
  '28':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Salomon fit aussi plaquer d’or ces chérubins. '
  '29':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Il fit sculpter en relief sur tous les murs intérieurs du Temple, dans les deux pièces, des chérubins, des palmes et des fleurs entrouvertes.
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Sur la façade avant du Temple, devant la grande salle, il y avait un portique de dix mètres de largeur, comme le Temple, et de cinq mètres de profondeur.
  '30':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Il fit recouvrir d’or le plancher des deux pièces.
  '31':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Pour fermer le lieu très saint, il fit faire une porte à deux battants en bois d’olivier sauvage. Le linteau et les montants prenaient un cinquième du mur. '
  '32':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Les deux battants étaient de bois d’olivier sauvage, ils étaient ornés de sculptures plaquées d’or représentant des chérubins, des palmes et des fleurs entrouvertes. On étendit l’or en pellicules sur les chérubins et sur les palmes.
  '33':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Pour fermer l’entrée de la grande salle du Temple, le roi fit également faire une porte à deux battants en bois de cyprès avec un encadrement de bois d’olivier sauvage prenant le quart de la dimension du mur. Chacun des deux battants était muni de deux gonds
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '6.33-34 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Autre traduction : '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: constitué de deux parties pivotantes.
      marker-yv: yv-n
    - type: text
      text: '. '
  '35':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ils étaient décorés de sculptures plaquées d’or représentant des chérubins, des palmes et des fleurs entrouvertes, le placage d’or suivait exactement les contours des sculptures.
  '36':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Puis Salomon fit entourer la cour intérieure d’un mur de trois rangées de pierres de taille superposées et d’une rangée de poutres de cèdre.
  '37':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Les fondations du temple de l’Eternel furent posées la quatrième année, au mois de Ziv. '
  '38':
  - type: usfm
    marker: p
    children:
    - type: text
      text: La onzième année, au mois de Boul
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '6.38 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Sans doute octobre-novembre.
      marker-yv: yv-n
    - type: text
      text: ' – le huitième mois – le Temple fut achevé dans tous ses détails conformément à tout ce qui était prévu. Salomon avait donc mis sept ans pour le construire.'
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dans les murs du Temple, on pratiqua des fenêtres à claire-voie grillagées. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Tout autour du Temple, on adossa aux murs de la grande salle et de la salle du fond un bâtiment comprenant des salles annexes. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: L’étage inférieur de cette annexe avait deux mètres cinquante de large, l’étage intermédiaire, trois mètres, et l’étage supérieur, trois mètres cinquante. En effet, le mur extérieur du Temple devenait moins épais vers le haut, de sorte que la charpente ne venait pas entamer les murs mêmes du Temple.
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Lorsqu’on édifia le Temple, on n’employa que des pierres déjà entièrement taillées, de sorte que, pendant la construction, on n’entendit aucun bruit de marteau, de pic ou d’autre instrument de fer dans le Temple.
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: On accédait aux chambres annexes de l’étage inférieur
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '6.8 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'L’ancienne version grecque a : '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: de l’étage du milieu.
      marker-yv: yv-n
    - type: text
      text: ' par une porte située sur le côté sud du Temple ; de là on montait aux étages supérieurs par des escaliers en colimaçon.'
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Après avoir achevé de bâtir le Temple, Salomon le fit couvrir d’un plafond soutenu par une armature de poutres de cèdre. '
