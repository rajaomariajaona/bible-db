document_id: 1KI.6,21
type_code: fra
verses:
  '1':
  - type: heading
    content: La construction du Temple
  - type: heading
    content: (2 Ch 3.1-14)
  - type: text
    content: Le roi Salomon commença la construction du Temple en l’honneur de l’Eternel quatre cent quatre-vingts ans
  - type: note
    content: 'L’ancienne version grecque a : 440 ans.'
  - type: text
    content: ' après la sortie des Israélites d’Egypte, soit la quatrième année de son règne sur Israël'
  - type: note
    content: Ce qui correspond environ à l’an 960 av. J.-C.
  - type: text
    content: ', au deuxième mois, le mois de Ziv'
  - type: note
    content: 'Ziv: mois de mai, deuxième mois de l’année juive.'
  - type: text
    content: .
  '10':
  - type: text
    content: Il construisit les étages adossés à tout le bâtiment en donnant à chacun d’eux deux mètres cinquante de hauteur. Ils étaient reliés au Temple par des poutres de cèdre.
  '11':
  - type: text
    content: 'L’Eternel s’adressa à Salomon et lui dit : Tu es en train de bâtir ce temple. '
  '12':
  - type: text
    content: Si tu te conduis selon mes ordonnances, si tu obéis à mes lois, si tu suis fidèlement tous mes commandements pour vivre en conformité avec eux, je réaliserai pour toi la promesse que j’ai faite à ton père David
  - type: note
    content: 2 S 7.13-16.
  - type: text
    content: '. '
  '13':
  - type: text
    content: Je viendrai habiter au milieu des Israélites et je n’abandonnerai pas mon peuple Israël.
  - type: heading
    content: L’aménagement intérieur du Temple
  '14':
  - type: text
    content: 'Après avoir achevé le gros œuvre du Temple, Salomon '
  '15':
  - type: text
    content: 'fit lambrisser l’intérieur des murs, de bas en haut, avec des boiseries de cèdre et revêtir le sol du Temple d’un plancher de cyprès. '
  '16':
  - type: text
    content: Il fit aussi recouvrir de boiseries de cèdre depuis le sol jusqu’au plafond les murs intérieurs de l’arrière-corps de l’édifice, bâti sur dix mètres de long. Puis il fit aménager l’intérieur de cette partie pour en faire le lieu très saint
  - type: note
    content: Voir Ex 26.33-34.
  - type: text
    content: .
  '17':
  - type: text
    content: 'Le reste du Temple, la grande salle qui était devant, avait vingt mètres de long. '
  '18':
  - type: text
    content: Les boiseries de cèdre qui revêtaient l’intérieur du sanctuaire étaient ornées de sculptures en formes de coloquintes et de fleurs entrouvertes. Tout était recouvert de boiseries de cèdre, on ne voyait aucune pierre.
  '19':
  - type: text
    content: 'Salomon fit arranger dans l’arrière-corps la pièce la plus importante du Temple pour y déposer le coffre de l’alliance de l’Eternel. '
  '2':
  - type: text
    content: 'L’édifice que le roi Salomon bâtit à l’Eternel avait trente mètres de long, dix mètres de large et quinze mètres de haut. '
  '20':
  - type: text
    content: Cette pièce avait la forme d’un cube de dix mètres de côté
  - type: note
    content: Pour comparaison, le lieu très saint de la tente de la Rencontre ne faisait à la base que 5 mètres sur 4,50 mètres, avec 5 mètres de hauteur (Ex 26).
  - type: text
    content: . Ses murs étaient plaqués d’or fin
  - type: note
    content: L’or symbolise la gloire de Dieu (comparer Ap 21.10-11, 18, 21).
  - type: text
    content: '. On lambrissa également un autel en cèdre. '
  '21':
  - type: text
    content: 'Salomon plaqua tout l’intérieur de l’édifice d’or fin. Devant l’entrée de la salle du fond, il fit tendre des chaînettes d’or. '
  '22':
  - type: text
    content: Tout l’intérieur du Temple était donc plaqué d’or, de même que l’autel
  - type: note
    content: Il s’agit de l’autel des parfums (7.48 ; Ex 30.1, 6 ; 37.25-28 ; Hé 9.3-4).
  - type: text
    content: ' placé devant l’entrée du lieu très saint'
  - type: note
    content: Voir Ex 30.1-3.
  - type: text
    content: '. '
  '23':
  - type: text
    content: On sculpta en bois d’olivier sauvage deux chérubins de cinq mètres de haut pour les placer dans le lieu très saint
  - type: note
    content: Pour les v. 23-28, voir Ex 25.18-20.
  - type: text
    content: '. '
  '24':
  - type: text
    content: 'Chacune de leurs ailes avait deux mètres cinquante de long, il y avait donc cinq mètres de l’extrémité d’une aile à celle de l’autre. '
  '25':
  - type: text
    content: 'Les deux chérubins avaient la même dimension et la même forme. '
  '27':
  - type: text
    content: Salomon fit placer les chérubins au milieu de la pièce la plus intérieure du Temple. De leurs ailes extérieures déployées, ils touchaient les deux parois opposées alors que leurs deux autres ailes se touchaient au milieu de la pièce.
  '28':
  - type: text
    content: 'Salomon fit aussi plaquer d’or ces chérubins. '
  '29':
  - type: text
    content: Il fit sculpter en relief sur tous les murs intérieurs du Temple, dans les deux pièces, des chérubins, des palmes et des fleurs entrouvertes.
  '3':
  - type: text
    content: Sur la façade avant du Temple, devant la grande salle, il y avait un portique de dix mètres de largeur, comme le Temple, et de cinq mètres de profondeur.
  '30':
  - type: text
    content: Il fit recouvrir d’or le plancher des deux pièces.
  '31':
  - type: text
    content: 'Pour fermer le lieu très saint, il fit faire une porte à deux battants en bois d’olivier sauvage. Le linteau et les montants prenaient un cinquième du mur. '
  '32':
  - type: text
    content: Les deux battants étaient de bois d’olivier sauvage, ils étaient ornés de sculptures plaquées d’or représentant des chérubins, des palmes et des fleurs entrouvertes. On étendit l’or en pellicules sur les chérubins et sur les palmes.
  '33':
  - type: text
    content: Pour fermer l’entrée de la grande salle du Temple, le roi fit également faire une porte à deux battants en bois de cyprès avec un encadrement de bois d’olivier sauvage prenant le quart de la dimension du mur. Chacun des deux battants était muni de deux gonds
  - type: note
    content: 'Autre traduction : constitué de deux parties pivotantes.'
  - type: text
    content: '. '
  '35':
  - type: text
    content: Ils étaient décorés de sculptures plaquées d’or représentant des chérubins, des palmes et des fleurs entrouvertes, le placage d’or suivait exactement les contours des sculptures.
  '36':
  - type: text
    content: Puis Salomon fit entourer la cour intérieure d’un mur de trois rangées de pierres de taille superposées et d’une rangée de poutres de cèdre.
  '37':
  - type: text
    content: 'Les fondations du temple de l’Eternel furent posées la quatrième année, au mois de Ziv. '
  '38':
  - type: text
    content: La onzième année, au mois de Boul
  - type: note
    content: Sans doute octobre-novembre.
  - type: text
    content: ' – le huitième mois – le Temple fut achevé dans tous ses détails conformément à tout ce qui était prévu. Salomon avait donc mis sept ans pour le construire.'
  '4':
  - type: text
    content: 'Dans les murs du Temple, on pratiqua des fenêtres à claire-voie grillagées. '
  '5':
  - type: text
    content: 'Tout autour du Temple, on adossa aux murs de la grande salle et de la salle du fond un bâtiment comprenant des salles annexes. '
  '6':
  - type: text
    content: L’étage inférieur de cette annexe avait deux mètres cinquante de large, l’étage intermédiaire, trois mètres, et l’étage supérieur, trois mètres cinquante. En effet, le mur extérieur du Temple devenait moins épais vers le haut, de sorte que la charpente ne venait pas entamer les murs mêmes du Temple.
  '7':
  - type: text
    content: Lorsqu’on édifia le Temple, on n’employa que des pierres déjà entièrement taillées, de sorte que, pendant la construction, on n’entendit aucun bruit de marteau, de pic ou d’autre instrument de fer dans le Temple.
  '8':
  - type: text
    content: On accédait aux chambres annexes de l’étage inférieur
  - type: note
    content: 'L’ancienne version grecque a : de l’étage du milieu.'
  - type: text
    content: ' par une porte située sur le côté sud du Temple ; de là on montait aux étages supérieurs par des escaliers en colimaçon.'
  '9':
  - type: text
    content: 'Après avoir achevé de bâtir le Temple, Salomon le fit couvrir d’un plafond soutenu par une armature de poutres de cèdre. '
