document_id: JOB.2
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Les souffrances de Job
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Un autre jour, les anges
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '2.1 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Appelés ici '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'fils de Dieu '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '(voir notes 1.6 ; 38.7 et '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ps 29.1
        metadata:
          usfm: PSA.29.1
      - type: text
        text: ).
    marker-yv: yv-n
  - type: text
    text: ' se rendirent au conseil de Dieu. L’Accusateur (Satan) vint aussi parmi eux au conseil de l’Eternel.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'L’Eternel dit à l’Accusateur : D’où viens-tu donc ?'
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Celui-ci lui répondit : Je viens de parcourir la terre et de la sillonner.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Alors l’Eternel demanda à l’Accusateur : As-tu remarqué mon serviteur Job ? Il n’y a personne comme lui sur la terre : c’est un homme intègre et droit, un homme qui craint Dieu et qui évite de mal faire. Il persévère toujours dans son intégrité. C’est pour rien que tu m’as incité à l’accabler.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'L’Accusateur lui répondit : Peau pour peau, tout ce qui est à lui, l’homme y renoncera en échange de sa vie. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Mais porte donc la main sur son corps et l’on verra s’il ne te maudit pas en face !
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Alors l’Eternel dit à l’Accusateur : Il est en ton pouvoir, mais épargne sa vie.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Alors l’Accusateur se retira de la présence de l’Eternel et il infligea à Job une douloureuse maladie de peau qui s’étendit de la plante des pieds jusqu’au crâne.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Job prit un morceau de poterie pour se gratter, et resta assis au milieu de la cendre.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Sa femme lui dit : Tu persévères toujours dans ton intégrité ! Maudis donc Dieu et meurs !'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Mais il lui répondit : Tu parles comme une insensée. Quoi ! nous recevrions de Dieu le bonheur, et nous ne recevrions pas aussi le malheur !'
- type: usfm
  marker: p
  children:
  - type: text
    text: Au milieu de tous ces malheurs, Job ne commit pas de péché dans tout ce qu’il dit.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Les trois amis de Job
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Or, trois amis de Job apprirent que tous ces malheurs venaient de fondre sur lui. Ils vinrent chacun de son pays. C’était Eliphaz de Témân
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '2.11 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: Eliphaz
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: ': '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: un nom édomite (
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Gn 36.10-11
        metadata:
          usfm: GEN.36.10+GEN.36.11
      - type: text
        text: '). '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'Témân '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: était un village d’Edom, au sud de la mer Morte (Jr 49.7 ; Ez 25.13 ; Am 1.12 ; Ab 9).
    marker-yv: yv-n
  - type: text
    text: ', Bildad de Shouah'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '2.11 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Bildad '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: appartenait peut-être à la tribu arabe descendant d’Abraham par Qetoura (Gn 25.2 ; 36.35).
    marker-yv: yv-n
  - type: text
    text: ', et Tsophar de Naama'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '2.11 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Localité inconnue, non mentionnée dans la Bible en dehors du livre de Job (11.1 ; 20.1 ; 42.9), différente de la Naama de '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Jos 15.41
        metadata:
          usfm: JOS.15.41
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: '. En effet, ils décidèrent ensemble d’aller lui témoigner leur sympathie et le consoler. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Lorsqu’ils l’aperçurent de loin, ils ne le reconnurent pas, et ils se mirent à pleurer à grand bruit. Ils déchirèrent leur manteau et jetèrent de la poussière en l’air, au-dessus de leur tête. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Puis ils restèrent là, assis par terre, à ses côtés, sept jours et sept nuits. Aucun d’eux ne lui dit un mot car ils voyaient bien combien sa souffrance était grande.
