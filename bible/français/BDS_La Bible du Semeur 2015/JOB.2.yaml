document_id: JOB.2,21
type_code: fra
verses:
  '1':
  - type: heading
    content: Les souffrances de Job
  - type: text
    content: Un autre jour, les anges
  - type: note
    content: Appelés ici fils de Dieu (voir notes 1.6 ; 38.7 et Ps 29.1).
  - type: text
    content: ' se rendirent au conseil de Dieu. L’Accusateur (Satan) vint aussi parmi eux au conseil de l’Eternel.'
  '10':
  - type: text
    content: 'Mais il lui répondit : Tu parles comme une insensée. Quoi ! nous recevrions de Dieu le bonheur, et nous ne recevrions pas aussi le malheur !'
  - type: text
    content: Au milieu de tous ces malheurs, Job ne commit pas de péché dans tout ce qu’il dit.
  - type: heading
    content: Les trois amis de Job
  '11':
  - type: text
    content: Or, trois amis de Job apprirent que tous ces malheurs venaient de fondre sur lui. Ils vinrent chacun de son pays. C’était Eliphaz de Témân
  - type: note
    content: 'Eliphaz: un nom édomite (Gn 36.10-11). Témân était un village d’Edom, au sud de la mer Morte (Jr 49.7 ; Ez 25.13 ; Am 1.12 ; Ab 9).'
  - type: text
    content: ', Bildad de Shouah'
  - type: note
    content: Bildad appartenait peut-être à la tribu arabe descendant d’Abraham par Qetoura (Gn 25.2 ; 36.35).
  - type: text
    content: ', et Tsophar de Naama'
  - type: note
    content: Localité inconnue, non mentionnée dans la Bible en dehors du livre de Job (11.1 ; 20.1 ; 42.9), différente de la Naama de Jos 15.41.
  - type: text
    content: '. En effet, ils décidèrent ensemble d’aller lui témoigner leur sympathie et le consoler. '
  '12':
  - type: text
    content: 'Lorsqu’ils l’aperçurent de loin, ils ne le reconnurent pas, et ils se mirent à pleurer à grand bruit. Ils déchirèrent leur manteau et jetèrent de la poussière en l’air, au-dessus de leur tête. '
  '13':
  - type: text
    content: Puis ils restèrent là, assis par terre, à ses côtés, sept jours et sept nuits. Aucun d’eux ne lui dit un mot car ils voyaient bien combien sa souffrance était grande.
  '2':
  - type: text
    content: 'L’Eternel dit à l’Accusateur : D’où viens-tu donc ?'
  - type: text
    content: 'Celui-ci lui répondit : Je viens de parcourir la terre et de la sillonner.'
  '3':
  - type: text
    content: 'Alors l’Eternel demanda à l’Accusateur : As-tu remarqué mon serviteur Job ? Il n’y a personne comme lui sur la terre : c’est un homme intègre et droit, un homme qui craint Dieu et qui évite de mal faire. Il persévère toujours dans son intégrité. C’est pour rien que tu m’as incité à l’accabler.'
  '4':
  - type: text
    content: 'L’Accusateur lui répondit : Peau pour peau, tout ce qui est à lui, l’homme y renoncera en échange de sa vie. '
  '5':
  - type: text
    content: Mais porte donc la main sur son corps et l’on verra s’il ne te maudit pas en face !
  '6':
  - type: text
    content: 'Alors l’Eternel dit à l’Accusateur : Il est en ton pouvoir, mais épargne sa vie.'
  '7':
  - type: text
    content: Alors l’Accusateur se retira de la présence de l’Eternel et il infligea à Job une douloureuse maladie de peau qui s’étendit de la plante des pieds jusqu’au crâne.
  '8':
  - type: text
    content: Job prit un morceau de poterie pour se gratter, et resta assis au milieu de la cendre.
  '9':
  - type: text
    content: 'Sa femme lui dit : Tu persévères toujours dans ton intégrité ! Maudis donc Dieu et meurs !'
