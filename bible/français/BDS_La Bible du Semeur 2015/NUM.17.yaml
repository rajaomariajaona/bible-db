document_id: NUM.17,21
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s2
    children:
    - type: text
      text: Qui peut s’approcher de Dieu ?
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: L’Eternel parla à Moïse et dit
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '17.1 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Certaines Bibles rattachent les v. 1-15 de ce chapitre au chap. '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: '16'
        - type: text
          text: ' (v. 36-50). Le chap. '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: '17'
        - type: text
          text: ' ne commence alors qu’au v. 16 et n’a que treize versets. Les Bibles plus récentes ont repris la numérotation des Bibles hébraïques.'
      marker-yv: yv-n
    - type: text
      text: '  : '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: Ecartez-vous de cette communauté et je les consumerai en un instant.
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Alors ils se jetèrent face contre terre, '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'puis Moïse dit à Aaron : Prends vite ton encensoir et mets-y des charbons ardents pris sur l’autel, répands-y de l’encens et hâte-toi d’aller avec cela vers la communauté, accomplis pour elle un rite d’expiation, car la colère de l’Eternel se déchaîne et, déjà, le fléau sévit.'
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'Aaron fit ce que Moïse lui avait dit : il prit l’encensoir et courut au milieu de l’assemblée ; le fléau avait effectivement déjà commencé à frapper le peuple. Aaron répandit l’encens pour accomplir le rite d’expiation pour le peuple. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'Il se plaça entre les morts et les vivants, et la mort cessa de frapper. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'Le nombre des victimes qui périrent de ce fléau s’éleva à 14 700, sans parler de ceux qui avaient péri à cause de l’affaire de Qoré. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: Aaron retourna auprès de Moïse à l’entrée de la tente de la Rencontre. Le fléau s’était arrêté.
  - type: usfm
    marker: s2
    children:
    - type: text
      text: Le bâton d’Aaron
    marker-yv: yv-h
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'L’Eternel parla à Moïse en ces termes : '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'Demande aux Israélites de te donner un bâton par tribu, les chefs de tribu te remettront douze bâtons, et tu inscriras le nom de chacun d’eux sur son bâton. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'Et tu inscriras le nom d’Aaron sur le bâton de la tribu de Lévi ; car il y aura un bâton par chef de tribu. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'Puis tu déposeras ces bâtons dans la tente de la Rencontre, devant le coffre de l’acte de l’alliance, à l’endroit où je vous rencontre. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'Parle à Eléazar, fils du prêtre Aaron, et demande-lui d’arracher de l’incendie les encensoirs et d’en répandre au loin les charbons ardents, car ils sont devenus des objets sacrés. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: Le bâton de l’homme que je choisirai bourgeonnera. Ainsi je mettrai fin, pour ne plus les entendre, à ces plaintes que les Israélites ne cessent d’élever contre vous.
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: 'Moïse transmit ces instructions aux Israélites et tous les chefs lui apportèrent un bâton, un par chef et par tribu, soit douze bâtons en tout. Le bâton d’Aaron était au milieu des autres. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: 'Moïse les déposa devant l’Eternel, dans la tente de l’acte de l’alliance. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: Le lendemain, il entra dans la tente et constata que le bâton d’Aaron qu’il avait déposé pour la tribu de Lévi avait produit des bourgeons, et qu’il s’y trouvait des fleurs écloses et même des amandes déjà mûres
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '17.23 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Pour les v. 23-25, allusion en '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: Hé 9.4
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: '. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: Moïse reprit tous les bâtons qui se trouvaient devant l’Eternel et les apporta aux Israélites ; ils constatèrent ce qui s’était passé et chacun des hommes reprit son bâton.
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: 'L’Eternel dit à Moïse : Remets le bâton d’Aaron devant le coffre de l’acte de l’alliance. On le conservera là comme un avertissement pour ceux qui voudraient se révolter. Ainsi tu mettras fin à leurs plaintes qui cesseront de monter jusqu’à moi, pour qu’ils ne soient pas frappés de mort.'
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: Moïse obéit à l’ordre de l’Eternel.
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: 'Puis les Israélites dirent à Moïse : Voici : nous sommes perdus, nous allons tous mourir ! '
  '28':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: Car quiconque s’approche du tabernacle de l’Eternel est frappé de mort. Faudra-t-il donc que nous expirions jusqu’au dernier ?
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'Que l’on prenne donc les encensoirs de ces gens qui ont péché et l’ont payé de leur vie et qu’on les martèle pour en faire des lames minces dont on recouvrira l’autel ; car ils ont été présentés devant l’Eternel et ils sont devenus sacrés : ils serviront de signe d’avertissement aux Israélites.'
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'Eléazar le prêtre prit les brasiers de bronze qu’avaient présentés les hommes qui avaient été consumés et l’on en fit des lames pour recouvrir l’autel. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: Ces plaques rappellent aux Israélites qu’aucun profane, étranger à la descendance d’Aaron, ne doit s’approcher pour offrir de l’encens devant l’Eternel, sous peine de subir le même sort que Qoré et sa troupe, comme l’Eternel l’avait demandé par l’intermédiaire de Moïse.
  - type: usfm
    marker: s2
    children:
    - type: text
      text: Tout le peuple se plaint
    marker-yv: yv-h
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'Le lendemain, toute la communauté des Israélites se mit à se plaindre de Moïse et d’Aaron, en disant : Vous faites mourir le peuple de l’Eternel !'
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'Mais pendant qu’ils s’attroupaient pour s’en prendre à eux et qu’ils se tournaient vers la tente de la Rencontre, voici que soudain la nuée la couvrit et que la gloire de l’Eternel apparut. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'Moïse et Aaron allèrent se placer devant la tente de la Rencontre. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'L’Eternel dit à Moïse : '
