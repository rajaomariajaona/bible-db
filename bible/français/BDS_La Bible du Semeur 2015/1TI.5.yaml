document_id: 1TI.5,21
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Les fidèles
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ne rudoie pas un homme âgé, mais encourage-le comme s’il était ton père. Traite de la même manière les jeunes gens comme des frères, '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Elle doit être connue pour ses œuvres bonnes, avoir bien élevé ses enfants, ouvert sa maison aux étrangers, lavé les pieds des membres du peuple saint
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '5.10 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Laver les pieds de ses hôtes faisait partie des devoirs d’hospitalité (
        - type: usfm
          marker: ref
          children:
          - type: text
            text: Lc 7.44
        - type: text
          text: ).
      marker-yv: yv-n
    - type: text
      text: ', secouru les malheureux, et pratiqué toutes sortes d’actions bonnes.'
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Quant aux veuves plus jeunes, n’accepte pas de les inscrire, car il arrive que leurs désirs se raniment et les détournent de Christ ; elles veulent alors se remarier, '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: et encourent ainsi le reproche d’avoir rompu l’engagement qu’elles avaient pris auparavant
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '5.12 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Autre traduction : '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'd’avoir abandonné la foi qu’elles avaient manifestée auparavant. '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Certains pensent que les veuves assistées par l’Eglise prenaient l’engagement de servir l’Eglise et de ne pas se remarier. Pour d’autres, le danger était que les jeunes veuves cherchent à se remarier à tout prix, quitte à épouser un incroyant, et, pour cela, à abandonner la foi. Ou encore, que de jeunes veuves ayant pris l’engagement de rester célibataire pour bénéficier de l’assistance de l’Eglise, finissent par tomber dans l’immoralité.
      marker-yv: yv-n
    - type: text
      text: '. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Avec cela, elles prennent l’habitude de ne rien faire et elles passent leur temps à aller de maison en maison, et pas seulement pour n’y rien faire, mais encore pour se répandre en commérages, se mêler de tout et parler à tort et à travers.
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'C’est pourquoi je préfère nettement que les jeunes veuves se marient, qu’elles aient des enfants, et tiennent bien leur ménage afin de ne pas prêter le flanc aux critiques de nos adversaires. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Il y en a, hélas, déjà plusieurs qui se sont détournées du droit chemin pour suivre Satan.
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Si une croyante a des veuves dans sa famille, qu’elle subvienne à leurs besoins, et que l’Eglise n’en ait pas la charge pour pouvoir réserver son assistance aux veuves qui n’ont pas de soutien.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Les responsables dans l’Eglise
    marker-yv: yv-h
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Les responsables qui dirigent bien l’Eglise méritent des honoraires doubles
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '5.17 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Certains comprennent : '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: méritent un double honneur.
      marker-yv: yv-n
    - type: text
      text: ', notamment ceux qui se dévouent au ministère astreignant de la prédication et de l’enseignement. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Car l’Ecriture déclare : '
    - type: usfm
      marker: qt
      children:
      - type: text
        text: Tu ne mettras pas de muselière au bœuf qui foule le grain
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '5.18 '
      - type: usfm
        marker: ft
        children:
        - type: usfm
          marker: ref
          children:
          - type: text
            text: Dt 25.4
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: ' et encore : '
    - type: usfm
      marker: qt
      children:
      - type: text
        text: L’ouvrier mérite son salaire
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '5.18 '
      - type: usfm
        marker: ft
        children:
        - type: usfm
          marker: ref
          children:
          - type: text
            text: Lc 10.7
        - type: text
          text: .
      marker-yv: yv-n
    - type: usfm
      marker: qt
      children:
      - type: text
        text: .
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'N’accepte pas d’accusation contre un responsable d’Eglise si elle n’est pas appuyée '
    - type: usfm
      marker: qt
      children:
      - type: text
        text: par deux ou trois témoins
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '5.19 '
      - type: usfm
        marker: ft
        children:
        - type: usfm
          marker: ref
          children:
          - type: text
            text: Dt 17.6
        - type: text
          text: .
      marker-yv: yv-n
    - type: usfm
      marker: qt
      children:
      - type: text
        text: .
    - type: text
      text: ' '
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: les femmes âgées comme des mères, les plus jeunes comme des sœurs, en toute pureté.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Les veuves
    marker-yv: yv-h
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ceux qui ont péché, reprends-les devant tous, afin que cela inspire de la crainte aux autres.
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Je te conjure solennellement devant Dieu, devant Jésus-Christ et ses anges élus, d’observer ces règles sans parti pris ni favoritisme.
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: N’impose pas trop vite les mains à quelqu’un et ne t’associe pas aux péchés d’autrui. Conserve-toi pur.
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Tu ne devrais pas boire exclusivement de l’eau : prends un peu de vin à cause de ton estomac et de tes fréquents malaises.'
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Il y a des personnes dont les fautes sont évidentes avant même qu’on les juge. Pour d’autres, on ne les découvre que par la suite. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Il en est de même des bonnes actions : chez certains, elles sont immédiatement apparentes, mais là où ce n’est pas le cas, elles ne sauraient rester indéfiniment cachées.'
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Occupe-toi des veuves avec respect, je veux dire de celles qui sont réellement privées de soutien. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Si une veuve a des enfants ou des petits-enfants, ceux-ci doivent apprendre, avant tout, à vivre leur piété en prenant soin de leur propre famille. Qu’ils s’acquittent de leur dette envers leurs parents, car cela plaît à Dieu.
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'La veuve qui est restée vraiment seule et privée de soutien met son espérance en Dieu et passe ses jours et ses nuits à faire toutes sortes de prières. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Quant à celle qui court après les plaisirs, elle est déjà morte, quoique vivante. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Transmets-leur ces avertissements afin qu’elles mènent une vie irréprochable. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Si quelqu’un ne prend pas soin des siens, en particulier des membres de sa famille, il a renié la foi et il est pire qu’un incroyant.
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Pour être inscrite sur la liste des veuves assistées par l’Eglise, une femme doit être âgée d’au moins soixante ans et avoir été une épouse fidèle à son mari
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '5.9 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Autre traduction : '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'qu’elle n’ait été mariée qu’une seule fois. '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'L’expression est symétrique à celle de '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: '3.2'
        - type: text
          text: ', '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: '12'
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: '. '
