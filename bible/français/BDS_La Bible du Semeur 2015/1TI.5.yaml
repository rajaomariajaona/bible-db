document_id: 1TI.5,21
type_code: fra
verses:
  '1':
  - type: heading
    content: Les fidèles
  - type: text
    content: 'Ne rudoie pas un homme âgé, mais encourage-le comme s’il était ton père. Traite de la même manière les jeunes gens comme des frères, '
  '10':
  - type: text
    content: Elle doit être connue pour ses œuvres bonnes, avoir bien élevé ses enfants, ouvert sa maison aux étrangers, lavé les pieds des membres du peuple saint
  - type: note
    content: Laver les pieds de ses hôtes faisait partie des devoirs d’hospitalité (Lc 7.44).
  - type: text
    content: ', secouru les malheureux, et pratiqué toutes sortes d’actions bonnes.'
  '11':
  - type: text
    content: 'Quant aux veuves plus jeunes, n’accepte pas de les inscrire, car il arrive que leurs désirs se raniment et les détournent de Christ ; elles veulent alors se remarier, '
  '12':
  - type: text
    content: et encourent ainsi le reproche d’avoir rompu l’engagement qu’elles avaient pris auparavant
  - type: note
    content: 'Autre traduction : d’avoir abandonné la foi qu’elles avaient manifestée auparavant. Certains pensent que les veuves assistées par l’Eglise prenaient l’engagement de servir l’Eglise et de ne pas se remarier. Pour d’autres, le danger était que les jeunes veuves cherchent à se remarier à tout prix, quitte à épouser un incroyant, et, pour cela, à abandonner la foi. Ou encore, que de jeunes veuves ayant pris l’engagement de rester célibataire pour bénéficier de l’assistance de l’Eglise, finissent par tomber dans l’immoralité.'
  - type: text
    content: '. '
  '13':
  - type: text
    content: Avec cela, elles prennent l’habitude de ne rien faire et elles passent leur temps à aller de maison en maison, et pas seulement pour n’y rien faire, mais encore pour se répandre en commérages, se mêler de tout et parler à tort et à travers.
  '14':
  - type: text
    content: 'C’est pourquoi je préfère nettement que les jeunes veuves se marient, qu’elles aient des enfants, et tiennent bien leur ménage afin de ne pas prêter le flanc aux critiques de nos adversaires. '
  '15':
  - type: text
    content: Il y en a, hélas, déjà plusieurs qui se sont détournées du droit chemin pour suivre Satan.
  '16':
  - type: text
    content: Si une croyante a des veuves dans sa famille, qu’elle subvienne à leurs besoins, et que l’Eglise n’en ait pas la charge pour pouvoir réserver son assistance aux veuves qui n’ont pas de soutien.
  - type: heading
    content: Les responsables dans l’Eglise
  '17':
  - type: text
    content: Les responsables qui dirigent bien l’Eglise méritent des honoraires doubles
  - type: note
    content: 'Certains comprennent : méritent un double honneur.'
  - type: text
    content: ', notamment ceux qui se dévouent au ministère astreignant de la prédication et de l’enseignement. '
  '18':
  - type: text
    content: 'Car l’Ecriture déclare : '
  - type: text
    content: Tu ne mettras pas de muselière au bœuf qui foule le grain
  - type: note
    content: Dt 25.4.
  - type: text
    content: ' et encore : '
  - type: text
    content: L’ouvrier mérite son salaire
  - type: note
    content: Lc 10.7.
  - type: text
    content: .
  '19':
  - type: text
    content: 'N’accepte pas d’accusation contre un responsable d’Eglise si elle n’est pas appuyée '
  - type: text
    content: par deux ou trois témoins
  - type: note
    content: Dt 17.6.
  - type: text
    content: .
  - type: text
    content: ' '
  '2':
  - type: text
    content: les femmes âgées comme des mères, les plus jeunes comme des sœurs, en toute pureté.
  - type: heading
    content: Les veuves
  '20':
  - type: text
    content: Ceux qui ont péché, reprends-les devant tous, afin que cela inspire de la crainte aux autres.
  '21':
  - type: text
    content: Je te conjure solennellement devant Dieu, devant Jésus-Christ et ses anges élus, d’observer ces règles sans parti pris ni favoritisme.
  '22':
  - type: text
    content: N’impose pas trop vite les mains à quelqu’un et ne t’associe pas aux péchés d’autrui. Conserve-toi pur.
  '23':
  - type: text
    content: 'Tu ne devrais pas boire exclusivement de l’eau : prends un peu de vin à cause de ton estomac et de tes fréquents malaises.'
  '24':
  - type: text
    content: 'Il y a des personnes dont les fautes sont évidentes avant même qu’on les juge. Pour d’autres, on ne les découvre que par la suite. '
  '25':
  - type: text
    content: 'Il en est de même des bonnes actions : chez certains, elles sont immédiatement apparentes, mais là où ce n’est pas le cas, elles ne sauraient rester indéfiniment cachées.'
  '3':
  - type: text
    content: 'Occupe-toi des veuves avec respect, je veux dire de celles qui sont réellement privées de soutien. '
  '4':
  - type: text
    content: Si une veuve a des enfants ou des petits-enfants, ceux-ci doivent apprendre, avant tout, à vivre leur piété en prenant soin de leur propre famille. Qu’ils s’acquittent de leur dette envers leurs parents, car cela plaît à Dieu.
  '5':
  - type: text
    content: 'La veuve qui est restée vraiment seule et privée de soutien met son espérance en Dieu et passe ses jours et ses nuits à faire toutes sortes de prières. '
  '6':
  - type: text
    content: 'Quant à celle qui court après les plaisirs, elle est déjà morte, quoique vivante. '
  '7':
  - type: text
    content: 'Transmets-leur ces avertissements afin qu’elles mènent une vie irréprochable. '
  '8':
  - type: text
    content: Si quelqu’un ne prend pas soin des siens, en particulier des membres de sa famille, il a renié la foi et il est pire qu’un incroyant.
  '9':
  - type: text
    content: Pour être inscrite sur la liste des veuves assistées par l’Eglise, une femme doit être âgée d’au moins soixante ans et avoir été une épouse fidèle à son mari
  - type: note
    content: 'Autre traduction : qu’elle n’ait été mariée qu’une seule fois. L’expression est symétrique à celle de 3.2, 12.'
  - type: text
    content: '. '
