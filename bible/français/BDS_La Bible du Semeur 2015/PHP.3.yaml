document_id: PHP.3,21
type_code: fra
verses:
  '1':
  - type: heading
    content: L’important, c’est Christ
  - type: text
    content: Enfin, mes frères et sœurs, réjouissez-vous de tout ce que le Seigneur est pour vous. Il ne m’en coûte pas de me répéter en vous écrivant et, pour vous, cela ne peut que contribuer à votre sécurité.
  '10':
  - type: text
    content: 'C’est ainsi que je pourrai connaître Christ, c’est-à-dire expérimenter la puissance de sa résurrection et avoir part à ses souffrances, en devenant semblable à lui jusque dans sa mort, '
  '11':
  - type: text
    content: afin de parvenir, quoi qu’il arrive
  - type: note
    content: 'Autres traductions : quel qu’en soit le chemin, ou : avec l’espoir de parvenir.'
  - type: text
    content: ', à la résurrection.'
  '12':
  - type: text
    content: Non, certes, je ne suis pas encore parvenu au but, je n’ai pas atteint la perfection, mais je continue à courir pour tâcher de saisir le prix. Car Jésus-Christ s’est saisi de moi.
  - type: heading
    content: Courir vers le but
  '13':
  - type: text
    content: 'Non, frères et sœurs, pour moi je n’estime pas avoir saisi le prix. Mais je fais une seule chose : oubliant ce qui est derrière moi, et tendant de toute mon énergie vers ce qui est devant moi, '
  '14':
  - type: text
    content: je poursuis ma course vers le but pour remporter le prix attaché à l’appel que Dieu nous a adressé du haut du ciel dans l’union avec Jésus-Christ
  - type: note
    content: 'Autre traduction : remporter le prix que Dieu nous a appelés à recevoir au ciel dans l’union avec Jésus-Christ.'
  - type: text
    content: .
  '15':
  - type: text
    content: 'Nous tous qui sommes spirituellement adultes, c’est cette pensée qui doit nous diriger. Et si, sur un point quelconque, vous pensez différemment, Dieu vous éclairera aussi là-dessus. '
  '16':
  - type: text
    content: Seulement, au point où nous sommes parvenus, continuons à marcher ensemble dans la même direction.
  '17':
  - type: text
    content: Suivez mon exemple, frères et sœurs, et observez comment se conduisent ceux qui vivent selon le modèle que vous trouvez en nous.
  '18':
  - type: text
    content: 'Car il en est beaucoup qui vivent en ennemis de la croix de Christ. Je vous en ai souvent parlé, je vous le dis une fois de plus, en pleurant. '
  '19':
  - type: text
    content: Ils finiront par se perdre. Ils ont pour dieu leur ventre
  - type: note
    content: Ce qui pourrait vouloir dire qu’ils ne pensent qu’à satisfaire leurs appétits, ou à servir leurs propres intérêts. Certains pensent que Paul fait allusion aux nombreuses prescriptions alimentaires auxquelles les judaïsants attachaient une grande importance (comparer Rm 16.18 ; Col 2.16, 20-21), à moins qu’il pense à la circoncision.
  - type: text
    content: ', ils mettent leur fierté dans ce qui fait leur honte, leurs pensées sont toutes dirigées vers les choses de ce monde.'
  '2':
  - type: text
    content: Prenez garde aux mauvais ouvriers, à ces hommes ignobles qui vous poussent à mutiler votre corps
  - type: note
    content: 'Autre traduction : Vous connaissez les mauvais ouvriers, ces hommes ignobles qui… Paul vise les partisans de la circoncision.'
  - type: text
    content: '. '
  '20':
  - type: text
    content: 'Quant à nous, nous sommes citoyens des cieux : de là, nous attendons ardemment la venue du Seigneur Jésus-Christ pour nous sauver. '
  '21':
  - type: text
    content: Car il transformera notre corps misérable pour le rendre conforme à son corps glorieux par la puissance qui lui permet aussi de tout soumettre à son autorité.
  '3':
  - type: text
    content: 'En réalité, c’est nous qui sommes circoncis de la vraie circoncision puisque nous rendons notre culte à Dieu par son Esprit et que nous mettons toute notre fierté en Jésus-Christ – au lieu de placer notre confiance dans ce que l’homme produit par lui-même. '
  '4':
  - type: text
    content: 'Et pourtant, je pourrais, moi aussi, placer ma confiance dans ce qui vient de l’homme. Si quelqu’un croit pouvoir se confier en ce qui vient de l’homme, je le puis bien davantage : '
  '5':
  - type: text
    content: j’ai été circoncis le huitième jour, je suis Israélite de naissance, de la tribu de Benjamin, de pur sang hébreu
  - type: note
    content: 'On peut comprendre que Paul affirme ici qu’il est juif à cent pour cent. Il est aussi possible que cette formule ait pour but de préciser que la famille de Paul avait maintenu, même loin du pays d’Israël, l’usage de l’hébreu (contrairement aux Juifs hellénistes qui avaient adopté le grec ; voir Ac 6) ; ou encore qu’elle respectait les traditions juives (contrairement aux Juifs assimilés aux populations hellénisées qui ne les respectaient plus). Benjamin: tribu en haute estime dans le judaïsme car elle était restée fidèle à la dynastie de David.'
  - type: text
    content: '. Pour ce qui concerne le respect de la Loi, je faisais partie des pharisiens. '
  '6':
  - type: text
    content: Quant à mon zèle, il m’a conduit à persécuter l’Eglise. Face aux exigences de la Loi, j’étais sans reproche.
  '7':
  - type: text
    content: 'Toutes ces choses constituaient, à mes yeux, un gain, mais à cause de Christ, je les considère désormais comme une perte. '
  '8':
  - type: text
    content: 'Oui, je considère toutes choses comme une perte à cause de ce bien suprême : la connaissance de Jésus-Christ mon Seigneur. A cause de lui, j’ai accepté de perdre tout cela, oui, je le considère comme bon à être mis au rebut, afin de gagner Christ. '
  '9':
  - type: text
    content: Mon désir est d’être trouvé en lui, non pas avec une justice que j’aurais moi-même acquise en obéissant à la Loi mais avec la justice qui vient de la foi en Christ et que Dieu accorde à ceux qui croient.
