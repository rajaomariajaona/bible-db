document_id: LEV.21,21
type_code: fra
verses:
  '1':
  - type: heading
    content: Les conditions de sainteté pour les prêtres
  - type: text
    content: 'L’Eternel dit à Moïse : Parle aux prêtres, fils d’Aaron, et dis-leur : Un prêtre ne doit pas se rendre rituellement impur en touchant le corps d’une personne de son peuple qui vient de mourir, '
  '10':
  - type: text
    content: Le prêtre qui a la prééminence sur les autres prêtres, sur la tête duquel a été répandue l’huile d’onction et qui a reçu sa charge pour porter les vêtements sacrés, ne se décoiffera pas la tête et ne déchirera pas ses vêtements
  - type: note
    content: Voir 10.6.
  - type: text
    content: '. '
  '11':
  - type: text
    content: 'Il ne s’approchera d’aucun corps mort ; il ne se rendra même pas impur, pour son père ou sa mère. '
  '12':
  - type: text
    content: Il ne quittera pas le sanctuaire pour ne pas profaner le sanctuaire de son Dieu, car il a été consacré par l’huile d’onction de son Dieu. Je suis l’Eternel.
  '13':
  - type: text
    content: 'Il prendra pour femme une jeune fille. '
  '14':
  - type: text
    content: 'Il n’épousera ni une veuve ni une femme répudiée, déshonorée ou prostituée ; c’est une jeune fille de son peuple qu’il épousera. '
  '15':
  - type: text
    content: Il ne profanera pas sa descendance au milieu de son peuple, car moi, l’Eternel, je le rends saint.
  '16':
  - type: text
    content: 'Puis l’Eternel s’adressa à Moïse en ces termes : '
  '17':
  - type: text
    content: 'Parle à Aaron et dis-lui : Aucun homme parmi tes descendants, dans toutes les générations, qui serait atteint d’une malformation corporelle ne s’approchera pour offrir l’aliment de son Dieu. '
  '18':
  - type: text
    content: 'Sont exclus du service tous ceux qui ont une infirmité : quelqu’un qui est aveugle ou boiteux, qui est défiguré ou qui a des membres disproportionnés, '
  '19':
  - type: text
    content: 'qui est estropié de la jambe ou du bras, '
  '2':
  - type: text
    content: 'excepté s’il s’agit d’un proche parent : sa mère, son père, son fils, sa fille, son frère '
  '20':
  - type: text
    content: 'bossu ou nain, affligé d’une taie sur l’œil, qui a la gale, des plaies purulentes ou les testicules écrasés. '
  '21':
  - type: text
    content: 'Aucun descendant du prêtre Aaron ayant une malformation n’offrira à l’Eternel les sacrifices consumés par le feu ; du moment qu’il a une malformation en lui, il ne s’approchera pas pour offrir les aliments de son Dieu. '
  '22':
  - type: text
    content: 'Il pourra consommer l’aliment de son Dieu, les offrandes saintes et très saintes, '
  '23':
  - type: text
    content: mais il ne s’avancera pas jusqu’au voile
  - type: note
    content: Voir Ex 26.31-35.
  - type: text
    content: ' et ne s’approchera pas de l’autel, à cause de sa malformation ; ainsi il ne profanera pas mes lieux saints'
  - type: note
    content: 'Autre traduction : mes choses qui me sont consacrées.'
  - type: text
    content: ', car moi, l’Eternel, je les rends saints.'
  '24':
  - type: text
    content: Moïse transmit ces paroles à Aaron, à ses fils et à tous les Israélites.
  '3':
  - type: text
    content: 'ou sa sœur si elle n’est pas mariée – pour une jeune fille de sa proche parenté qui n’est pas mariée, il peut se rendre impur. '
  '4':
  - type: text
    content: Chef parmi son peuple, il ne se rendra pas impur
  - type: note
    content: 'Traduction incertaine. Autre traduction : il ne doit pas se rendre impur pour une personne qui lui est apparentée par mariage.'
  - type: text
    content: ', car il se profanerait'
  - type: note
    content: 'Autres traductions : profanerait son peuple, profanerait cette personne.'
  - type: text
    content: .
  '5':
  - type: text
    content: Les prêtres ne se tonsureront pas, ils ne se raseront pas les coins de la barbe, ni se feront d’incisions sur leur corps
  - type: note
    content: Voir 19.27-28.
  - type: text
    content: '. '
  '6':
  - type: text
    content: Ils seront saints pour leur Dieu et ne déshonoreront pas leur Dieu, car ce sont eux qui offrent à l’Eternel les aliments de leur Dieu consumés par le feu. C’est pourquoi ils seront saints.
  '7':
  - type: text
    content: 'Ils n’épouseront pas une femme prostituée ou déshonorée ou répudiée par son mari, car le prêtre est saint pour son Dieu. '
  '8':
  - type: text
    content: Tu le considéreras comme saint, car c’est lui qui offre l’aliment de ton Dieu, et il sera pour toi quelqu’un de saint, car je suis saint, moi, l’Eternel, qui vous rends saints.
  '9':
  - type: text
    content: Si une fille de prêtre se déshonore en s’adonnant à la prostitution, elle profane son père, elle périra par le feu.
