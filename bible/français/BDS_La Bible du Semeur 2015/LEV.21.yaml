document_id: LEV.21
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Les conditions de sainteté pour les prêtres
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'L’Eternel dit à Moïse : Parle aux prêtres, fils d’Aaron, et dis-leur : Un prêtre ne doit pas se rendre rituellement impur en touchant le corps d’une personne de son peuple qui vient de mourir, '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'excepté s’il s’agit d’un proche parent : sa mère, son père, son fils, sa fille, son frère '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'ou sa sœur si elle n’est pas mariée – pour une jeune fille de sa proche parenté qui n’est pas mariée, il peut se rendre impur. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Chef parmi son peuple, il ne se rendra pas impur
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '21.4 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Traduction incertaine. Autre traduction : '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: il ne doit pas se rendre impur pour une personne qui lui est apparentée par mariage.
    marker-yv: yv-n
  - type: text
    text: ', car il se profanerait'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '21.4 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Autres traductions : '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: profanerait son peuple, profanerait cette personne.
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Les prêtres ne se tonsureront pas, ils ne se raseront pas les coins de la barbe, ni se feront d’incisions sur leur corps
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '21.5 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Voir '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 19.27-28
        metadata:
          usfm: LEV.19.27+LEV.19.28
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Ils seront saints pour leur Dieu et ne déshonoreront pas leur Dieu, car ce sont eux qui offrent à l’Eternel les aliments de leur Dieu consumés par le feu. C’est pourquoi ils seront saints.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Ils n’épouseront pas une femme prostituée ou déshonorée ou répudiée par son mari, car le prêtre est saint pour son Dieu. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Tu le considéreras comme saint, car c’est lui qui offre l’aliment de ton Dieu, et il sera pour toi quelqu’un de saint, car je suis saint, moi, l’Eternel, qui vous rends saints.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Si une fille de prêtre se déshonore en s’adonnant à la prostitution, elle profane son père, elle périra par le feu.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Le prêtre qui a la prééminence sur les autres prêtres, sur la tête duquel a été répandue l’huile d’onction et qui a reçu sa charge pour porter les vêtements sacrés, ne se décoiffera pas la tête et ne déchirera pas ses vêtements
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '21.10 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Voir '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '10.6'
        metadata:
          usfm: LEV.10.6
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Il ne s’approchera d’aucun corps mort ; il ne se rendra même pas impur, pour son père ou sa mère. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Il ne quittera pas le sanctuaire pour ne pas profaner le sanctuaire de son Dieu, car il a été consacré par l’huile d’onction de son Dieu. Je suis l’Eternel.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Il prendra pour femme une jeune fille. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Il n’épousera ni une veuve ni une femme répudiée, déshonorée ou prostituée ; c’est une jeune fille de son peuple qu’il épousera. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Il ne profanera pas sa descendance au milieu de son peuple, car moi, l’Eternel, je le rends saint.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Puis l’Eternel s’adressa à Moïse en ces termes : '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Parle à Aaron et dis-lui : Aucun homme parmi tes descendants, dans toutes les générations, qui serait atteint d’une malformation corporelle ne s’approchera pour offrir l’aliment de son Dieu. '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Sont exclus du service tous ceux qui ont une infirmité : quelqu’un qui est aveugle ou boiteux, qui est défiguré ou qui a des membres disproportionnés, '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'qui est estropié de la jambe ou du bras, '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'bossu ou nain, affligé d’une taie sur l’œil, qui a la gale, des plaies purulentes ou les testicules écrasés. '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Aucun descendant du prêtre Aaron ayant une malformation n’offrira à l’Eternel les sacrifices consumés par le feu ; du moment qu’il a une malformation en lui, il ne s’approchera pas pour offrir les aliments de son Dieu. '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Il pourra consommer l’aliment de son Dieu, les offrandes saintes et très saintes, '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: mais il ne s’avancera pas jusqu’au voile
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '21.23 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Voir '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ex 26.31-35
        metadata:
          usfm: EXO.26.31+EXO.26.32+EXO.26.33+EXO.26.34+EXO.26.35
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: ' et ne s’approchera pas de l’autel, à cause de sa malformation ; ainsi il ne profanera pas mes lieux saints'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '21.23 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Autre traduction : '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: mes choses qui me sont consacrées.
    marker-yv: yv-n
  - type: text
    text: ', car moi, l’Eternel, je les rends saints.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: Moïse transmit ces paroles à Aaron, à ses fils et à tous les Israélites.
