document_id: MRK.8
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Avec sept pains et des poissons
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: (Mt 15.32-39)
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'En ces jours-là, une grande foule s’était de nouveau rassemblée autour de Jésus et elle n’avait rien à manger. Jésus appela donc ses disciples et leur dit : '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'J’ai pitié de cette foule : cela fait trois jours que ces gens sont avec moi et ils n’ont rien à manger.'
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Si je les renvoie chez eux à jeun, les forces vont leur manquer en chemin, car certains d’entre eux sont venus de loin.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Ses disciples lui répondirent : Où pourra-t-on trouver dans cet endroit désert assez de pain pour les nourrir ?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: ' '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: – Combien avez-vous de pains ?
  - type: text
    text: ' leur demanda-t-il.'
- type: usfm
  marker: p
  children:
  - type: text
    text: – Sept, répondirent-ils.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Alors il invita tout le monde à s’asseoir par terre. Il prit les sept pains et, après avoir remercié Dieu, il les partagea et les donna à ses disciples pour qu’ils les distribuent à la foule. Ce qu’ils firent. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Ils avaient aussi quelques petits poissons. Jésus prononça la prière de bénédiction pour les poissons et dit à ses disciples de les distribuer également. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Tout le monde mangea à satiété. On ramassa sept corbeilles des morceaux qui restaient. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Il y avait là environ quatre mille hommes. Ensuite Jésus les congédia.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Aussitôt après, il monta dans le bateau avec ses disciples et se rendit dans la région de Dalmanoutha
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '8.10 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: A l’ouest du lac de Galilée.
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: s1
  children:
  - type: text
    text: Jésus et les chefs religieux juifs
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: (Mt 16.1-4)
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Des pharisiens arrivèrent et engagèrent une discussion avec lui. Ils lui demandaient de leur faire voir un signe miraculeux qui viendrait du ciel : ils lui tendaient un piège.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Jésus poussa un profond soupir et dit : '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'Pourquoi les gens de notre temps réclament-ils un signe miraculeux ? Vraiment, je vous l’assure : il ne leur en sera accordé aucun !'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Il les quitta, remonta dans le bateau et partit pour l’autre rive.
- type: usfm
  marker: r
  children:
  - type: text
    text: (Mt 16.5-12)
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Les disciples avaient oublié d’emporter du pain ; ils n’en avaient qu’un seul avec eux dans le bateau.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Or, Jésus leur recommanda : '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'Faites bien attention : gardez-vous du '
    - type: usfm
      marker: w
      children:
      - type: text
        text: levain
    - type: text
      text: ' des pharisiens et de celui d’'
    - type: usfm
      marker: w
      children:
      - type: text
        text: Hérode
    - type: text
      text: '  !'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Les disciples discutaient entre eux : Il dit cela parce que nous n’avons pas de pain !'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Jésus, sachant ce qui se passait, leur dit : '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Vous discutez parce que vous n’avez pas de pain. Pourquoi ? Ne comprenez-vous pas encore et ne saisissez-vous pas ? Votre intelligence est-elle aveuglée ?
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: usfm
    marker: wj
    children:
    - type: usfm
      marker: qt
      children:
      - type: text
        text: Avez-vous des yeux pour ne pas voir, des oreilles pour ne pas entendre
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '8.18 '
    - type: usfm
      marker: ft
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Jr 5.21
        metadata:
          usfm: JER.5.21
      - type: text
        text: .
    marker-yv: yv-n
  - type: usfm
    marker: wj
    children:
    - type: usfm
      marker: qt
      children:
      - type: text
        text: '?'
    - type: text
      text: ' Ne vous souvenez-vous pas :'
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: quand j’ai partagé les cinq pains entre les cinq mille hommes, combien de paniers pleins de morceaux avez-vous emportés ?
- type: usfm
  marker: p
  children:
  - type: text
    text: – Douze, répondirent-ils.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: ' '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: – Et quand j’ai partagé les sept pains entre les quatre mille hommes, combien de corbeilles pleines de morceaux avez-vous emportées ?
- type: usfm
  marker: p
  children:
  - type: text
    text: – Sept, dirent-ils.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Alors il ajouta : '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Vous ne comprenez toujours pas ?
- type: usfm
  marker: s1
  children:
  - type: text
    text: La guérison d’un aveugle
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: Ils arrivèrent à Bethsaïda. On amena un aveugle à Jésus et on le supplia de le toucher.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Jésus prit l’aveugle par la main et le conduisit hors du village, puis il lui mouilla les yeux avec sa salive, lui imposa les mains et lui demanda : '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Est-ce que tu vois quelque chose ?
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'L’aveugle regarda et répondit : J’aperçois des hommes, mais je les vois comme des arbres qui marchent.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: Jésus posa de nouveau ses mains sur les yeux de l’aveugle. Alors celui-ci vit clair ; il était guéri et voyait tout distinctement.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Jésus le renvoya chez lui en lui disant : '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Ne rentre pas dans le village !
- type: usfm
  marker: ms1
  children:
  - type: text
    text: Jésus et ses disciples
  marker-yv: yv-h
- type: usfm
  marker: s1
  children:
  - type: text
    text: Qui est vraiment Jésus ?
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: (Mt 16.13-23 ; Lc 9.18-22)
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: Jésus s’en alla, accompagné de ses disciples, et se rendit dans les villages autour de Césarée de Philippe
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '8.27 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Ville proche des sources du Jourdain, nommée d’après son fondateur Philippe Hérode.
    marker-yv: yv-n
  - type: text
    text: '. En chemin, il interrogea ses disciples : '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Que disent les gens à mon sujet ? Qui suis-je d’après eux ?
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'Ils lui répondirent : Pour les uns, tu es Jean-Baptiste ; pour d’autres, Elie ; pour d’autres encore, l’un des prophètes.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'Alors il leur demanda : '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Et vous, qui dites-vous que je suis ?
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Pierre lui répondit : Tu es le Messie.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: Il leur ordonna de ne le dire à personne.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'Et il commença à leur enseigner que le Fils de l’homme devait beaucoup souffrir, être rejeté par les responsables du peuple, les chefs des prêtres et les spécialistes de la Loi ; il devait être mis à mort et ressusciter trois jours après. '
  - type: usfm
    marker: v
    metadata:
      v: '32'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: Il leur dit tout cela très clairement.
- type: usfm
  marker: p
  children:
  - type: text
    text: Alors Pierre le prit à part et se mit à lui faire des reproches.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '33'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: 'Mais Jésus se retourna, regarda ses disciples et reprit Pierre sévèrement : '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'Arrière, «  '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Satan
    - type: text
      text: '  » ! Eloigne-toi de moi ! Car tes pensées ne sont pas celles de Dieu ; ce sont des pensées tout humaines.'
- type: usfm
  marker: s1
  children:
  - type: text
    text: Comment suivre Jésus
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: (Mt 16.24-28 ; Lc 9.23-27)
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '34'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: 'Là-dessus, Jésus appela la foule ainsi que ses disciples et leur dit : '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Si quelqu’un veut me suivre, qu’il renonce à lui-même, qu’il se charge de sa croix et qu’il me suive.
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '35'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: En effet, celui qui est préoccupé de sauver sa vie la perdra ; mais celui qui perdra sa vie à cause de moi et de l’Evangile, la sauvera.
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '36'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Si un homme parvenait à posséder le monde entier, à quoi cela lui servirait-il, s’il perd sa vie ?
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '37'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Et que peut-on donner pour racheter sa vie ?
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '38'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'Si quelqu’un a honte de moi et de mes paroles au milieu des hommes de ce temps, qui sont infidèles à Dieu et qui transgressent sa '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Loi
    - type: text
      text: ', le '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Fils de l’homme
    - type: text
      text: ', à son tour, aura honte de lui quand il viendra dans la gloire de son Père avec les saints '
    - type: usfm
      marker: w
      children:
      - type: text
        text: anges
    - type: text
      text: .
