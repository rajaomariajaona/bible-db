document_id: MRK.8,21
type_code: fra
verses:
  '1':
  - type: heading
    content: Avec sept pains et des poissons
  - type: heading
    content: (Mt 15.32-39)
  - type: text
    content: 'En ces jours-là, une grande foule s’était de nouveau rassemblée autour de Jésus et elle n’avait rien à manger. Jésus appela donc ses disciples et leur dit : '
  '10':
  - type: text
    content: Aussitôt après, il monta dans le bateau avec ses disciples et se rendit dans la région de Dalmanoutha
  - type: note
    content: A l’ouest du lac de Galilée.
  - type: text
    content: .
  - type: heading
    content: Jésus et les chefs religieux juifs
  - type: heading
    content: (Mt 16.1-4)
  '11':
  - type: text
    content: 'Des pharisiens arrivèrent et engagèrent une discussion avec lui. Ils lui demandaient de leur faire voir un signe miraculeux qui viendrait du ciel : ils lui tendaient un piège.'
  '12':
  - type: text
    content: 'Jésus poussa un profond soupir et dit : '
  - type: text
    content: 'Pourquoi les gens de notre temps réclament-ils un signe miraculeux ? Vraiment, je vous l’assure : il ne leur en sera accordé aucun !'
  '13':
  - type: text
    content: Il les quitta, remonta dans le bateau et partit pour l’autre rive.
  - type: heading
    content: (Mt 16.5-12)
  '14':
  - type: text
    content: Les disciples avaient oublié d’emporter du pain ; ils n’en avaient qu’un seul avec eux dans le bateau.
  '15':
  - type: text
    content: 'Or, Jésus leur recommanda : '
  - type: text
    content: 'Faites bien attention : gardez-vous du '
  - type: text
    content: levain
  - type: text
    content: ' des pharisiens et de celui d’'
  - type: text
    content: Hérode
  - type: text
    content: '  !'
  '16':
  - type: text
    content: 'Les disciples discutaient entre eux : Il dit cela parce que nous n’avons pas de pain !'
  '17':
  - type: text
    content: 'Jésus, sachant ce qui se passait, leur dit : '
  - type: text
    content: Vous discutez parce que vous n’avez pas de pain. Pourquoi ? Ne comprenez-vous pas encore et ne saisissez-vous pas ? Votre intelligence est-elle aveuglée ?
  - type: text
    content: ' '
  '18':
  - type: text
    content: Avez-vous des yeux pour ne pas voir, des oreilles pour ne pas entendre
  - type: note
    content: Jr 5.21.
  - type: text
    content: '?'
  - type: text
    content: ' Ne vous souvenez-vous pas :'
  - type: text
    content: ' '
  '19':
  - type: text
    content: quand j’ai partagé les cinq pains entre les cinq mille hommes, combien de paniers pleins de morceaux avez-vous emportés ?
  - type: text
    content: – Douze, répondirent-ils.
  '2':
  - type: text
    content: 'J’ai pitié de cette foule : cela fait trois jours que ces gens sont avec moi et ils n’ont rien à manger.'
  - type: text
    content: ' '
  '20':
  - type: text
    content: ' '
  - type: text
    content: – Et quand j’ai partagé les sept pains entre les quatre mille hommes, combien de corbeilles pleines de morceaux avez-vous emportées ?
  - type: text
    content: – Sept, dirent-ils.
  '21':
  - type: text
    content: 'Alors il ajouta : '
  - type: text
    content: Vous ne comprenez toujours pas ?
  - type: heading
    content: La guérison d’un aveugle
  '22':
  - type: text
    content: Ils arrivèrent à Bethsaïda. On amena un aveugle à Jésus et on le supplia de le toucher.
  '23':
  - type: text
    content: 'Jésus prit l’aveugle par la main et le conduisit hors du village, puis il lui mouilla les yeux avec sa salive, lui imposa les mains et lui demanda : '
  - type: text
    content: Est-ce que tu vois quelque chose ?
  '24':
  - type: text
    content: 'L’aveugle regarda et répondit : J’aperçois des hommes, mais je les vois comme des arbres qui marchent.'
  '25':
  - type: text
    content: Jésus posa de nouveau ses mains sur les yeux de l’aveugle. Alors celui-ci vit clair ; il était guéri et voyait tout distinctement.
  '26':
  - type: text
    content: 'Jésus le renvoya chez lui en lui disant : '
  - type: text
    content: Ne rentre pas dans le village !
  - type: heading
    content: Jésus et ses disciples
  - type: heading
    content: Qui est vraiment Jésus ?
  - type: heading
    content: (Mt 16.13-23 ; Lc 9.18-22)
  '27':
  - type: text
    content: Jésus s’en alla, accompagné de ses disciples, et se rendit dans les villages autour de Césarée de Philippe
  - type: note
    content: Ville proche des sources du Jourdain, nommée d’après son fondateur Philippe Hérode.
  - type: text
    content: '. En chemin, il interrogea ses disciples : '
  - type: text
    content: Que disent les gens à mon sujet ? Qui suis-je d’après eux ?
  '28':
  - type: text
    content: 'Ils lui répondirent : Pour les uns, tu es Jean-Baptiste ; pour d’autres, Elie ; pour d’autres encore, l’un des prophètes.'
  '29':
  - type: text
    content: 'Alors il leur demanda : '
  - type: text
    content: Et vous, qui dites-vous que je suis ?
  - type: text
    content: 'Pierre lui répondit : Tu es le Messie.'
  '3':
  - type: text
    content: Si je les renvoie chez eux à jeun, les forces vont leur manquer en chemin, car certains d’entre eux sont venus de loin.
  '30':
  - type: text
    content: Il leur ordonna de ne le dire à personne.
  '31':
  - type: text
    content: 'Et il commença à leur enseigner que le Fils de l’homme devait beaucoup souffrir, être rejeté par les responsables du peuple, les chefs des prêtres et les spécialistes de la Loi ; il devait être mis à mort et ressusciter trois jours après. '
  '32':
  - type: text
    content: Il leur dit tout cela très clairement.
  - type: text
    content: Alors Pierre le prit à part et se mit à lui faire des reproches.
  '33':
  - type: text
    content: 'Mais Jésus se retourna, regarda ses disciples et reprit Pierre sévèrement : '
  - type: text
    content: 'Arrière, «  '
  - type: text
    content: Satan
  - type: text
    content: '  » ! Eloigne-toi de moi ! Car tes pensées ne sont pas celles de Dieu ; ce sont des pensées tout humaines.'
  - type: heading
    content: Comment suivre Jésus
  - type: heading
    content: (Mt 16.24-28 ; Lc 9.23-27)
  '34':
  - type: text
    content: 'Là-dessus, Jésus appela la foule ainsi que ses disciples et leur dit : '
  - type: text
    content: Si quelqu’un veut me suivre, qu’il renonce à lui-même, qu’il se charge de sa croix et qu’il me suive.
  - type: text
    content: ' '
  '35':
  - type: text
    content: En effet, celui qui est préoccupé de sauver sa vie la perdra ; mais celui qui perdra sa vie à cause de moi et de l’Evangile, la sauvera.
  - type: text
    content: ' '
  '36':
  - type: text
    content: Si un homme parvenait à posséder le monde entier, à quoi cela lui servirait-il, s’il perd sa vie ?
  - type: text
    content: ' '
  '37':
  - type: text
    content: Et que peut-on donner pour racheter sa vie ?
  - type: text
    content: ' '
  '38':
  - type: text
    content: 'Si quelqu’un a honte de moi et de mes paroles au milieu des hommes de ce temps, qui sont infidèles à Dieu et qui transgressent sa '
  - type: text
    content: Loi
  - type: text
    content: ', le '
  - type: text
    content: Fils de l’homme
  - type: text
    content: ', à son tour, aura honte de lui quand il viendra dans la gloire de son Père avec les saints '
  - type: text
    content: anges
  - type: text
    content: .
  '4':
  - type: text
    content: 'Ses disciples lui répondirent : Où pourra-t-on trouver dans cet endroit désert assez de pain pour les nourrir ?'
  '5':
  - type: text
    content: ' '
  - type: text
    content: – Combien avez-vous de pains ?
  - type: text
    content: ' leur demanda-t-il.'
  - type: text
    content: – Sept, répondirent-ils.
  '6':
  - type: text
    content: 'Alors il invita tout le monde à s’asseoir par terre. Il prit les sept pains et, après avoir remercié Dieu, il les partagea et les donna à ses disciples pour qu’ils les distribuent à la foule. Ce qu’ils firent. '
  '7':
  - type: text
    content: 'Ils avaient aussi quelques petits poissons. Jésus prononça la prière de bénédiction pour les poissons et dit à ses disciples de les distribuer également. '
  '8':
  - type: text
    content: 'Tout le monde mangea à satiété. On ramassa sept corbeilles des morceaux qui restaient. '
  '9':
  - type: text
    content: Il y avait là environ quatre mille hommes. Ensuite Jésus les congédia.
