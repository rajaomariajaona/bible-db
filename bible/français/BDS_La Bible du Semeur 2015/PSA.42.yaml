document_id: PSA.42,21
type_code: fra
verses:
  '1':
  - type: heading
    content: Deuxième livre
  - type: heading
    content: Soif de Dieu !
  - type: text
    content: Au chef de chœur. Méditation
  - type: note
    content: Signification incertaine.
  - type: text
    content: ' des Qoréites'
  - type: note
    content: Descendants de Qoré, l’un des fils de Lévi (Ex 6.24 ; Nb 16 ; 26.11). Ils devinrent musiciens dans le tabernacle (1 Ch 6.18, 22) et portiers (1 Ch 26.1). Leur chef, du temps de David, était Hémân (88.1).
  - type: text
    content: .
  '10':
  - type: text
    content: 'Car je veux dire à Dieu, ╵lui qui est mon rocher :'
  - type: text
    content: « Pourquoi m’ignores-tu ?
  - type: text
    content: Pourquoi donc me faut-il ╵vivre dans la tristesse,
  - type: text
    content: subissant l’oppression ╵de l’ennemi ? »
  '11':
  - type: text
    content: Mes membres sont meurtris, ╵mes ennemis m’insultent,
  - type: text
    content: 'sans cesse, ils me demandent : ╵« Ton Dieu, où est-il donc ? »'
  '12':
  - type: text
    content: Pourquoi donc, ô mon âme, ╵es-tu si abattue, ╵et gémis-tu sur moi ?
  - type: text
    content: Mets ton espoir en Dieu ! ╵Je le louerai encore,
  - type: text
    content: mon Sauveur et mon Dieu.
  '2':
  - type: text
    content: Comme une biche tourne la tête ╵vers le cours d’eau,
  - type: text
    content: je me tourne vers toi, ô Dieu
  - type: note
    content: 'Autre traduction : Comme une biche soupire après les cours d’eau, je soupire après toi, ô Dieu.'
  - type: text
    content: '  !'
  '3':
  - type: text
    content: J’ai soif de Dieu, ╵du Dieu vivant !
  - type: text
    content: Quand donc pourrai-je aller ╵et me présenter devant Dieu ?
  '4':
  - type: text
    content: Mes larmes sont le pain ╵de mes jours comme de mes nuits.
  - type: text
    content: 'Sans cesse, on me répète :'
  - type: text
    content: « Ton Dieu, où est-il donc ? »
  '5':
  - type: text
    content: Alors que j’épanche mon cœur, ╵je me souviens du temps
  - type: text
    content: où, avec le cortège, ╵je m’avançais,
  - type: text
    content: marchant avec la foule ╵vers le temple de Dieu,
  - type: text
    content: au milieu de la joie ╵et des cris de reconnaissance
  - type: text
    content: de tout un peuple en fête.
  '6':
  - type: text
    content: Pourquoi donc, ô mon âme, ╵es-tu si abattue
  - type: text
    content: et gémis-tu sur moi ?
  - type: text
    content: Mets ton espoir en Dieu ! ╵je le louerai encore,
  - type: text
    content: car il est mon Sauveur.
  '7':
  - type: text
    content: Mon Dieu
  - type: note
    content: 'Certains rattachent ces mots à la fin du v. 6 et traduisent : car il est mon Sauveur, il est mon Dieu. 7 Je suis…'
  - type: text
    content: ', mon âme est abattue !'
  - type: text
    content: Voilà pourquoi, je pense à toi ╵du pays du Jourdain,
  - type: text
    content: des cimes de l’Hermon ╵et du mont Mitséar
  - type: note
    content: L’Hermon constituait la frontière nord du pays de la promesse (Dt 3.8 ; Jos 11.17 ; 13.11 ; 1 Ch 5.23). Le mont Mitséar ou Petit-Mont n’est cité nulle part ailleurs.
  - type: text
    content: .
  '8':
  - type: text
    content: Un abîme en appelle un autre, ╵au grondement de tes cascades ;
  - type: text
    content: tous tes flots et tes lames ╵ont déferlé sur moi.
  '9':
  - type: text
    content: 'Que, le jour, l’Eternel ╵me montre son amour :'
  - type: text
    content: je passerai la nuit ╵à chanter ses louanges
  - type: text
    content: et j’adresserai ma prière ╵au Dieu qui me fait vivre.
