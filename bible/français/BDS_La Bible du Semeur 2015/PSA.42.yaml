document_id: PSA.42,21
type_code: fra
verses:
  '1':
  - type: usfm
    marker: ms1
    children:
    - type: text
      text: Deuxième livre
    marker-yv: yv-h
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Soif de Dieu !
    marker-yv: yv-h
  - type: usfm
    marker: d
    children:
    - type: text
      text: Au chef de chœur. Méditation
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '42.1 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Signification incertaine.
      marker-yv: yv-n
    - type: text
      text: ' des Qoréites'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '42.1 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Descendants de Qoré, l’un des fils de Lévi (Ex 6.24 ; Nb 16 ; 26.11). Ils devinrent musiciens dans le tabernacle (
        - type: usfm
          marker: ref
          children:
          - type: text
            text: 1 Ch 6.18
        - type: text
          text: ', '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: '22'
        - type: text
          text: ) et portiers (
        - type: usfm
          marker: ref
          children:
          - type: text
            text: 1 Ch 26.1
        - type: text
          text: ). Leur chef, du temps de David, était Hémân (
        - type: usfm
          marker: ref
          children:
          - type: text
            text: '88.1'
        - type: text
          text: ).
      marker-yv: yv-n
    - type: text
      text: .
  '10':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Car je veux dire à Dieu, ╵lui qui est mon rocher :'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: « Pourquoi m’ignores-tu ?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Pourquoi donc me faut-il ╵vivre dans la tristesse,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: subissant l’oppression ╵de l’ennemi ? »
  '11':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mes membres sont meurtris, ╵mes ennemis m’insultent,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'sans cesse, ils me demandent : ╵« Ton Dieu, où est-il donc ? »'
  '12':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Pourquoi donc, ô mon âme, ╵es-tu si abattue, ╵et gémis-tu sur moi ?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mets ton espoir en Dieu ! ╵Je le louerai encore,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: mon Sauveur et mon Dieu.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Comme une biche tourne la tête ╵vers le cours d’eau,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: je me tourne vers toi, ô Dieu
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '42.2 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Autre traduction : '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: Comme une biche soupire après les cours d’eau, je soupire après toi, ô Dieu.
      marker-yv: yv-n
    - type: text
      text: '  !'
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: J’ai soif de Dieu, ╵du Dieu vivant !
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Quand donc pourrai-je aller ╵et me présenter devant Dieu ?
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mes larmes sont le pain ╵de mes jours comme de mes nuits.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Sans cesse, on me répète :'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: « Ton Dieu, où est-il donc ? »
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Alors que j’épanche mon cœur, ╵je me souviens du temps
  - type: usfm
    marker: q1
    children:
    - type: text
      text: où, avec le cortège, ╵je m’avançais,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: marchant avec la foule ╵vers le temple de Dieu,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: au milieu de la joie ╵et des cris de reconnaissance
  - type: usfm
    marker: q1
    children:
    - type: text
      text: de tout un peuple en fête.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Pourquoi donc, ô mon âme, ╵es-tu si abattue
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et gémis-tu sur moi ?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mets ton espoir en Dieu ! ╵je le louerai encore,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: car il est mon Sauveur.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mon Dieu
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '42.7 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Certains rattachent ces mots à la fin du v. 6 et traduisent : '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'car il est mon Sauveur, il est mon Dieu. '
      - type: usfm
        marker: fv
        children:
        - type: text
          text: '7 '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: Je suis…
      marker-yv: yv-n
    - type: text
      text: ', mon âme est abattue !'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Voilà pourquoi, je pense à toi ╵du pays du Jourdain,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: des cimes de l’Hermon ╵et du mont Mitséar
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '42.7 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: L’
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'Hermon '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'constituait la frontière nord du pays de la promesse (Dt 3.8 ; Jos 11.17 ; 13.11 ; 1 Ch 5.23). Le mont Mitséar ou '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'Petit-Mont '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: n’est cité nulle part ailleurs.
      marker-yv: yv-n
    - type: text
      text: .
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Un abîme en appelle un autre, ╵au grondement de tes cascades ;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: tous tes flots et tes lames ╵ont déferlé sur moi.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Que, le jour, l’Eternel ╵me montre son amour :'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: je passerai la nuit ╵à chanter ses louanges
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et j’adresserai ma prière ╵au Dieu qui me fait vivre.
