document_id: NUM.21
type_code: fra
segments:
- type: usfm
  marker: s2
  children:
  - type: text
    text: La victoire sur le roi d’Arad
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Le roi cananéen d’Arad qui habitait le Néguev apprit que les Israélites arrivaient par la route d’Atarim. Il les attaqua et fit des prisonniers parmi eux
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '21.1 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Arad était une ville du sud du pays de Canaan (voir Jg 1.16 ; Jos 12.14) à 25 kilomètres environ au sud d’Hébron. C’est la première victoire depuis les défaites infligées par les Amalécites et les Cananéens, que rappelle le nom de Horma donné à ce lieu (v. 3 ; voir '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 14.41-45
        metadata:
          usfm: NUM.14.41+NUM.14.42+NUM.14.43+NUM.14.44+NUM.14.45
      - type: text
        text: ).
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Alors les Israélites firent un vœu à l’Eternel en disant : Si tu livres ce peuple entre nos mains, nous vouerons leurs villes à l’Eternel en les détruisant.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: L’Eternel exauça les Israélites et leur donna la victoire sur les Cananéens. Ils les lui vouèrent en détruisant leurs villes avec leurs habitants, et l’on donna à ce lieu le nom de Horma (Destruction).
- type: usfm
  marker: s2
  children:
  - type: text
    text: Le serpent de bronze
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Les Israélites quittèrent la montagne de Hor par la route de la mer des Roseaux pour contourner le pays d’Edom
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '21.4 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Voir '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Dt 2.1
        metadata:
          usfm: DEU.2.1
      - type: text
        text: '. '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: Roseaux
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: ': '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'route pénible à travers un désert aride, décrite en '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Dt 8.15
        metadata:
          usfm: DEU.8.15
      - type: text
        text: ' (voir '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ps 107.4-7
        metadata:
          usfm: PSA.107.4+PSA.107.5+PSA.107.6+PSA.107.7
      - type: text
        text: ), pour contourner Edom par l’ouest.
    marker-yv: yv-n
  - type: text
    text: '. En cours de route, le peuple se découragea. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Ils se mirent à parler contre Dieu et contre Moïse en disant : Pourquoi nous avez-vous fait sortir d’Egypte pour nous faire mourir dans le désert ? Car il n’y a ni pain ni eau, et nous sommes dégoûtés de cette nourriture de misère'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '21.5 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Pour les v. 5-6, allusion en '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1 Co 10.9
        metadata:
          usfm: 1CO.10.9
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: '  !'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Alors l’Eternel envoya contre le peuple des serpents venimeux
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '21.6 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'En hébreu : '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'serpents brûlants, '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'à la morsure cuisante, causant une douleur semblable à celle d’une brûlure. Paul fait allusion à cet épisode en '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1 Co 10.9
        metadata:
          usfm: 1CO.10.9
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: ' qui les mordirent, et il mourut beaucoup de gens d’Israël. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Le peuple vint trouver Moïse en disant : Nous avons péché lorsque nous avons parlé contre l’Eternel et contre toi. Maintenant, veuille implorer l’Eternel pour qu’il nous débarrasse de ces serpents !'
- type: usfm
  marker: p
  children:
  - type: text
    text: Moïse pria donc pour le peuple.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'L’Eternel lui répondit : Fais-toi un serpent en métal et fixe-le en haut d’une perche. Celui qui aura été mordu et qui fixera son regard sur ce serpent aura la vie sauve.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Moïse façonna un serpent de bronze
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '21.9 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Voir 2 R 18.4 ; Jn 3.14.
    marker-yv: yv-n
  - type: text
    text: ' et le fixa au haut d’une perche. Dès lors, si quelqu’un était mordu par un serpent, et qu’il levait les yeux vers le serpent de bronze, il avait la vie sauve.'
- type: usfm
  marker: s2
  children:
  - type: text
    text: Jusqu’aux frontières du pays promis
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Après cela, les Israélites levèrent le camp et s’établirent à Oboth
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '21.10 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'A l’ouest de la Araba (entre le sud de la mer Morte et le golfe d’Aqaba). Israël a dû contourner Edom par le sud (voir '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Nb 33.40-44
        metadata:
          usfm: NUM.33.40+NUM.33.41+NUM.33.42+NUM.33.43+NUM.33.44
      - type: text
        text: ).
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'De là, ils partirent vers Iyé-Abarim dans le désert situé en face de Moab, à l’est. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Ensuite, ils transportèrent leur camp dans la vallée de Zéred, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'puis de l’autre côté de l’Arnon, le torrent qui passe par le désert après être descendu du territoire des Amoréens et qui marque la frontière entre Moab et le pays des Amoréens. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: C’est pourquoi il est précisé dans le livre des Guerres de l’Eternel
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '21.14 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Livre mentionné seulement ici. Peut-être un recueil de poèmes relatant les guerres dans lesquelles l’Eternel a soutenu son peuple.
    marker-yv: yv-n
  - type: text
    text: '  : Waheb en Soupha, avec ses vallées, et l’Arnon, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: avec ses gorges qui descendent vers la ville d’Ar et touche au territoire de Moab.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'De là, ils gagnèrent Beer. C’est à propos de ce puits que l’Eternel dit à Moïse : Assemble le peuple, et je leur donnerai de l’eau.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Alors Israël entonna le chant suivant :'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Monte, ô puits ! ╵Lancez des acclamations !
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Voici le puits ╵qui fut creusé par des princes,
- type: usfm
  marker: q1
  children:
  - type: text
    text: celui que les grands du peuple ╵ont foré avec leur sceptre
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '21.18 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: C’est-à-dire ont présidé au forage, mais peut-être est-ce aussi une allusion au fait qu’il a suffi de creuser à une faible profondeur avec un bâton pour trouver de l’eau (comme c’est le cas à l’est du Jourdain).
    marker-yv: yv-n
  - type: text
    text: ', ╵avec leurs cannes.'
- type: usfm
  marker: p
  children:
  - type: text
    text: 'De Beer, ils se rendirent successivement à Mattana, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'à Nahaliel, à Bamoth, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: puis au plateau qui s’étend dans la campagne de Moab vers le sommet du Pisga d’où l’on domine le désert.
- type: usfm
  marker: s2
  children:
  - type: text
    text: La victoire sur Sihôn et les Amoréens
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Les Israélites envoyèrent des émissaires à Sihôn, roi des Amoréens, pour lui demander '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: la permission de traverser son pays.
- type: usfm
  marker: p
  children:
  - type: text
    text: – Nous n’entrerons ni dans vos champs ni dans vos vignes, lui dirent-ils, et nous ne boirons pas l’eau des puits, nous suivrons la route royale jusqu’à ce que nous ayons traversé ton territoire.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Mais Sihôn leur refusa l’autorisation de traverser son territoire. Il mobilisa toutes ses troupes et marcha contre Israël dans le désert, il arriva à Yahats et lui livra bataille. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Mais Israël le battit et prit possession de son pays depuis l’Arnon jusqu’au Yabboq et jusqu’au territoire des Ammonites dont la frontière était fortifiée. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Israël s’empara de toutes ces villes et occupa toutes les villes des Amoréens, y compris la cité de Heshbôn et les localités qui en dépendaient. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Heshbôn était la capitale où résidait Sihôn, le roi des Amoréens, depuis qu’il avait combattu le précédent roi de Moab et s’était emparé de tout le pays jusqu’à l’Arnon. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'C’est pourquoi les poètes chantent :'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Venez à Heshbôn !
- type: usfm
  marker: q1
  children:
  - type: text
    text: Que la ville de Sihôn ╵soit rebâtie et consolidée !
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: Car de Heshbôn est sorti un feu.
- type: usfm
  marker: q1
  children:
  - type: text
    text: De la cité de Sihôn, ╵la flamme a jailli
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '21.28 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Le roi des Amoréens est parti de Heshbôn pour faire la conquête des territoires de Moab jusqu’à l’Arnon.
    marker-yv: yv-n
  - type: text
    text: ','
- type: usfm
  marker: q1
  children:
  - type: text
    text: elle a consumé ╵Ar au pays de Moab,
- type: usfm
  marker: q1
  children:
  - type: text
    text: avec ceux qui règnent ╵sur les hauteurs de l’Arnon.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: Malheur à toi, ô Moab !
- type: usfm
  marker: q1
  children:
  - type: text
    text: Oui, tu es perdu, ╵peuple de Kemosh
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '21.29 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Divinité principale des Moabites. Ses fils et ses filles sont les membres de son peuple qu’il n’a pas su défendre contre Sihôn.
    marker-yv: yv-n
  - type: text
    text: '  !'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Tes fils sont en fuite,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et tes filles sont captives
- type: usfm
  marker: q1
  children:
  - type: text
    text: du roi des Amoréens,
- type: usfm
  marker: q1
  children:
  - type: text
    text: oui, du roi Sihôn.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: Mais nous les avons ╵criblés de nos flèches,
- type: usfm
  marker: q1
  children:
  - type: text
    text: de Heshbôn jusqu’à Dibôn ╵voilà que tout est détruit !
- type: usfm
  marker: q1
  children:
  - type: text
    text: Nous avons tout dévasté ╵jusques à Nophah,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et jusques à Médeba.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'Israël s’établit dans le pays des Amoréens. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: Moïse envoya des gens en reconnaissance dans la région de Yaezer
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '21.32 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: A 25 kilomètres à l’est du Jourdain, du côté du Basan.
    marker-yv: yv-n
  - type: text
    text: '  ; ils s’emparèrent des villes qui en dépendaient'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '21.32 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'L’ancienne version grecque a : '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: ils s’en emparèrent ainsi que des villes qui en dépendent.
    marker-yv: yv-n
  - type: text
    text: ' et chassèrent les Amoréens qui s’y trouvaient.'
- type: usfm
  marker: s2
  children:
  - type: text
    text: La victoire sur Og, roi du Basan
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: Puis ils changèrent de direction et se dirigèrent du côté du Basan
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '21.33 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Région au nord-est du lac de Galilée.
    marker-yv: yv-n
  - type: text
    text: '. Og, roi du Basan, marcha contre eux avec toutes ses troupes et leur livra bataille à Edréi. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: 'Alors l’Eternel dit à Moïse : Ne le crains pas, car je le livre en ton pouvoir, lui, toute son armée et son pays ; tu le traiteras comme tu as traité Sihôn, roi des Amoréens, qui régnait à Heshbôn.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: Les Israélites le battirent, lui et ses fils et toute son armée, sans lui laisser aucun survivant, et ils prirent possession de son pays
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '21.35 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Après cette victoire, Israël contrôlait tout l’est du Jourdain depuis Moab jusqu’aux hauteurs du Basan dans les environs de l’Hermon. La victoire sur Sihôn et Og fut souvent célébrée (Ps 135.10-11 ; 136.19-20).
    marker-yv: yv-n
  - type: text
    text: .
