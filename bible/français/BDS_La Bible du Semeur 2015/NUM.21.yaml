document_id: NUM.21,21
type_code: fra
verses:
  '1':
  - type: heading
    content: La victoire sur le roi d’Arad
  - type: text
    content: Le roi cananéen d’Arad qui habitait le Néguev apprit que les Israélites arrivaient par la route d’Atarim. Il les attaqua et fit des prisonniers parmi eux
  - type: note
    content: Arad était une ville du sud du pays de Canaan (voir Jg 1.16 ; Jos 12.14) à 25 kilomètres environ au sud d’Hébron. C’est la première victoire depuis les défaites infligées par les Amalécites et les Cananéens, que rappelle le nom de Horma donné à ce lieu (v. 3 ; voir 14.41-45).
  - type: text
    content: '. '
  '10':
  - type: text
    content: Après cela, les Israélites levèrent le camp et s’établirent à Oboth
  - type: note
    content: A l’ouest de la Araba (entre le sud de la mer Morte et le golfe d’Aqaba). Israël a dû contourner Edom par le sud (voir Nb 33.40-44).
  - type: text
    content: '. '
  '11':
  - type: text
    content: 'De là, ils partirent vers Iyé-Abarim dans le désert situé en face de Moab, à l’est. '
  '12':
  - type: text
    content: 'Ensuite, ils transportèrent leur camp dans la vallée de Zéred, '
  '13':
  - type: text
    content: 'puis de l’autre côté de l’Arnon, le torrent qui passe par le désert après être descendu du territoire des Amoréens et qui marque la frontière entre Moab et le pays des Amoréens. '
  '14':
  - type: text
    content: C’est pourquoi il est précisé dans le livre des Guerres de l’Eternel
  - type: note
    content: Livre mentionné seulement ici. Peut-être un recueil de poèmes relatant les guerres dans lesquelles l’Eternel a soutenu son peuple.
  - type: text
    content: '  : Waheb en Soupha, avec ses vallées, et l’Arnon, '
  '15':
  - type: text
    content: avec ses gorges qui descendent vers la ville d’Ar et touche au territoire de Moab.
  '16':
  - type: text
    content: 'De là, ils gagnèrent Beer. C’est à propos de ce puits que l’Eternel dit à Moïse : Assemble le peuple, et je leur donnerai de l’eau.'
  '17':
  - type: text
    content: 'Alors Israël entonna le chant suivant :'
  - type: text
    content: Monte, ô puits ! ╵Lancez des acclamations !
  '18':
  - type: text
    content: Voici le puits ╵qui fut creusé par des princes,
  - type: text
    content: celui que les grands du peuple ╵ont foré avec leur sceptre
  - type: note
    content: C’est-à-dire ont présidé au forage, mais peut-être est-ce aussi une allusion au fait qu’il a suffi de creuser à une faible profondeur avec un bâton pour trouver de l’eau (comme c’est le cas à l’est du Jourdain).
  - type: text
    content: ', ╵avec leurs cannes.'
  - type: text
    content: 'De Beer, ils se rendirent successivement à Mattana, '
  '19':
  - type: text
    content: 'à Nahaliel, à Bamoth, '
  '2':
  - type: text
    content: 'Alors les Israélites firent un vœu à l’Eternel en disant : Si tu livres ce peuple entre nos mains, nous vouerons leurs villes à l’Eternel en les détruisant.'
  '20':
  - type: text
    content: puis au plateau qui s’étend dans la campagne de Moab vers le sommet du Pisga d’où l’on domine le désert.
  - type: heading
    content: La victoire sur Sihôn et les Amoréens
  '21':
  - type: text
    content: 'Les Israélites envoyèrent des émissaires à Sihôn, roi des Amoréens, pour lui demander '
  '22':
  - type: text
    content: la permission de traverser son pays.
  - type: text
    content: – Nous n’entrerons ni dans vos champs ni dans vos vignes, lui dirent-ils, et nous ne boirons pas l’eau des puits, nous suivrons la route royale jusqu’à ce que nous ayons traversé ton territoire.
  '23':
  - type: text
    content: 'Mais Sihôn leur refusa l’autorisation de traverser son territoire. Il mobilisa toutes ses troupes et marcha contre Israël dans le désert, il arriva à Yahats et lui livra bataille. '
  '24':
  - type: text
    content: 'Mais Israël le battit et prit possession de son pays depuis l’Arnon jusqu’au Yabboq et jusqu’au territoire des Ammonites dont la frontière était fortifiée. '
  '25':
  - type: text
    content: 'Israël s’empara de toutes ces villes et occupa toutes les villes des Amoréens, y compris la cité de Heshbôn et les localités qui en dépendaient. '
  '26':
  - type: text
    content: 'Heshbôn était la capitale où résidait Sihôn, le roi des Amoréens, depuis qu’il avait combattu le précédent roi de Moab et s’était emparé de tout le pays jusqu’à l’Arnon. '
  '27':
  - type: text
    content: 'C’est pourquoi les poètes chantent :'
  - type: text
    content: Venez à Heshbôn !
  - type: text
    content: Que la ville de Sihôn ╵soit rebâtie et consolidée !
  '28':
  - type: text
    content: Car de Heshbôn est sorti un feu.
  - type: text
    content: De la cité de Sihôn, ╵la flamme a jailli
  - type: note
    content: Le roi des Amoréens est parti de Heshbôn pour faire la conquête des territoires de Moab jusqu’à l’Arnon.
  - type: text
    content: ','
  - type: text
    content: elle a consumé ╵Ar au pays de Moab,
  - type: text
    content: avec ceux qui règnent ╵sur les hauteurs de l’Arnon.
  '29':
  - type: text
    content: Malheur à toi, ô Moab !
  - type: text
    content: Oui, tu es perdu, ╵peuple de Kemosh
  - type: note
    content: Divinité principale des Moabites. Ses fils et ses filles sont les membres de son peuple qu’il n’a pas su défendre contre Sihôn.
  - type: text
    content: '  !'
  - type: text
    content: Tes fils sont en fuite,
  - type: text
    content: et tes filles sont captives
  - type: text
    content: du roi des Amoréens,
  - type: text
    content: oui, du roi Sihôn.
  '3':
  - type: text
    content: L’Eternel exauça les Israélites et leur donna la victoire sur les Cananéens. Ils les lui vouèrent en détruisant leurs villes avec leurs habitants, et l’on donna à ce lieu le nom de Horma (Destruction).
  - type: heading
    content: Le serpent de bronze
  '30':
  - type: text
    content: Mais nous les avons ╵criblés de nos flèches,
  - type: text
    content: de Heshbôn jusqu’à Dibôn ╵voilà que tout est détruit !
  - type: text
    content: Nous avons tout dévasté ╵jusques à Nophah,
  - type: text
    content: et jusques à Médeba.
  '31':
  - type: text
    content: 'Israël s’établit dans le pays des Amoréens. '
  '32':
  - type: text
    content: Moïse envoya des gens en reconnaissance dans la région de Yaezer
  - type: note
    content: A 25 kilomètres à l’est du Jourdain, du côté du Basan.
  - type: text
    content: '  ; ils s’emparèrent des villes qui en dépendaient'
  - type: note
    content: 'L’ancienne version grecque a : ils s’en emparèrent ainsi que des villes qui en dépendent.'
  - type: text
    content: ' et chassèrent les Amoréens qui s’y trouvaient.'
  - type: heading
    content: La victoire sur Og, roi du Basan
  '33':
  - type: text
    content: Puis ils changèrent de direction et se dirigèrent du côté du Basan
  - type: note
    content: Région au nord-est du lac de Galilée.
  - type: text
    content: '. Og, roi du Basan, marcha contre eux avec toutes ses troupes et leur livra bataille à Edréi. '
  '34':
  - type: text
    content: 'Alors l’Eternel dit à Moïse : Ne le crains pas, car je le livre en ton pouvoir, lui, toute son armée et son pays ; tu le traiteras comme tu as traité Sihôn, roi des Amoréens, qui régnait à Heshbôn.'
  '35':
  - type: text
    content: Les Israélites le battirent, lui et ses fils et toute son armée, sans lui laisser aucun survivant, et ils prirent possession de son pays
  - type: note
    content: Après cette victoire, Israël contrôlait tout l’est du Jourdain depuis Moab jusqu’aux hauteurs du Basan dans les environs de l’Hermon. La victoire sur Sihôn et Og fut souvent célébrée (Ps 135.10-11 ; 136.19-20).
  - type: text
    content: .
  '4':
  - type: text
    content: Les Israélites quittèrent la montagne de Hor par la route de la mer des Roseaux pour contourner le pays d’Edom
  - type: note
    content: 'Voir Dt 2.1. Roseaux: route pénible à travers un désert aride, décrite en Dt 8.15 (voir Ps 107.4-7), pour contourner Edom par l’ouest.'
  - type: text
    content: '. En cours de route, le peuple se découragea. '
  '5':
  - type: text
    content: 'Ils se mirent à parler contre Dieu et contre Moïse en disant : Pourquoi nous avez-vous fait sortir d’Egypte pour nous faire mourir dans le désert ? Car il n’y a ni pain ni eau, et nous sommes dégoûtés de cette nourriture de misère'
  - type: note
    content: Pour les v. 5-6, allusion en 1 Co 10.9.
  - type: text
    content: '  !'
  '6':
  - type: text
    content: Alors l’Eternel envoya contre le peuple des serpents venimeux
  - type: note
    content: 'En hébreu : serpents brûlants, à la morsure cuisante, causant une douleur semblable à celle d’une brûlure. Paul fait allusion à cet épisode en 1 Co 10.9.'
  - type: text
    content: ' qui les mordirent, et il mourut beaucoup de gens d’Israël. '
  '7':
  - type: text
    content: 'Le peuple vint trouver Moïse en disant : Nous avons péché lorsque nous avons parlé contre l’Eternel et contre toi. Maintenant, veuille implorer l’Eternel pour qu’il nous débarrasse de ces serpents !'
  - type: text
    content: Moïse pria donc pour le peuple.
  '8':
  - type: text
    content: 'L’Eternel lui répondit : Fais-toi un serpent en métal et fixe-le en haut d’une perche. Celui qui aura été mordu et qui fixera son regard sur ce serpent aura la vie sauve.'
  '9':
  - type: text
    content: Moïse façonna un serpent de bronze
  - type: note
    content: Voir 2 R 18.4 ; Jn 3.14.
  - type: text
    content: ' et le fixa au haut d’une perche. Dès lors, si quelqu’un était mordu par un serpent, et qu’il levait les yeux vers le serpent de bronze, il avait la vie sauve.'
  - type: heading
    content: Jusqu’aux frontières du pays promis
