document_id: SNG.3,21
type_code: fra
verses:
  '1':
  - type: heading
    content: Pensées nocturnes
  - type: text
    content: Sur mon lit, au long de la nuit,
  - type: text
    content: j’ai recherché ╵celui que mon cœur aime.
  - type: text
    content: Je l’ai cherché, ╵mais ne l’ai pas trouvé.
  '10':
  - type: text
    content: Ses colonnes sont en argent,
  - type: text
    content: son dossier
  - type: note
    content: 'Terme de sens incertain. Autres traductions : lit, siège, base, support, trône.'
  - type: text
    content: ' est en or,'
  - type: text
    content: son siège est fait en pourpre.
  - type: text
    content: Les filles de Jérusalem
  - type: text
    content: ont tapissé avec amour ╵tout l’intérieur du palanquin.
  '11':
  - type: text
    content: O filles de Sion, sortez, ╵contemplez le roi Salomon
  - type: text
    content: portant le diadème ╵dont le ceignit sa mère
  - type: text
    content: au jour de son mariage,
  - type: text
    content: au jour où tout son cœur ╵était rempli de joie. »
  '2':
  - type: text
    content: 'Je me suis dit alors : ╵Il faut que je me lève,'
  - type: text
    content: je ferai le tour de la ville ╵par les rues et les places,
  - type: text
    content: je chercherai partout ╵celui que mon cœur aime.
  - type: text
    content: Je l’ai cherché, ╵mais ne l’ai pas trouvé.
  '3':
  - type: text
    content: Les gardes m’ont trouvée, ╵ceux qui font le tour de la ville
  - type: note
    content: Les gardes se tenaient la nuit près de la porte (Né 3.29 ; 11.19 ; 13.22) ou sur les remparts (5.7 ; 2 S 13.34 ; 18.24-27 ; 2 R 9.17-20 ; Ps 127.1 ; Es 52.8 ; 62.6). Sans doute patrouillaient-ils aussi dans la ville (5.7).
  - type: text
    content: .
  - type: text
    content: 'Je leur ai demandé : ╵Celui que mon cœur aime, ╵ne l’avez-vous pas vu ?'
  '4':
  - type: text
    content: Les ayant dépassés,
  - type: text
    content: peu après, j’ai trouvé ╵celui que mon cœur aime.
  - type: text
    content: Je l’ai saisi bien fort, ╵et ne l’ai plus lâché
  - type: text
    content: jusqu’à l’avoir conduit ╵au logis de ma mère,
  - type: text
    content: dans la chambre de celle ╵qui m’a conçue.
  '5':
  - type: text
    content: O filles de Jérusalem, ╵oh, je vous en conjure
  - type: text
    content: 'par les gazelles ╵ou par les biches ╵de la campagne :'
  - type: text
    content: n’éveillez pas, ╵non, ne réveillez pas l’amour
  - type: text
    content: avant qu’il ne le veuille
  - type: note
    content: Voir 2.7 et note ; 8.4.
  - type: text
    content: . »
  - type: heading
    content: Cortège royal
  '6':
  - type: text
    content: « Qui donc est celle-ci ╵qui monte du désert
  - type: note
    content: Voir 8.5. Le désert est celui de Judée, c’est-à-dire les collines incultes entourant Jérusalem.
  - type: text
    content: comme un nuage de fumée,
  - type: text
    content: aux senteurs de myrrhe et d’encens
  - type: text
    content: et de tous parfums exotiques ?
  '7':
  - type: text
    content: Voici la litière de Salomon
  - type: text
    content: escortée de ses soixante guerriers,
  - type: text
    content: l’élite des guerriers en Israël.
  '8':
  - type: text
    content: Tous armés de l’épée,
  - type: text
    content: exercés au combat,
  - type: text
    content: ils ont leur épée au côté
  - type: text
    content: pour parer aux terreurs nocturnes.
  '9':
  - type: text
    content: Le palanquin
  - type: note
    content: Sans doute la litière mentionnée au v. 7 et qui devait être richement ornée.
  - type: text
    content: ' royal ╵fait sur ordre de Salomon'
  - type: text
    content: est en bois du Liban.
