document_id: SNG.3,21
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Pensées nocturnes
    marker-yv: yv-h
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: Sur mon lit, au long de la nuit,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: j’ai recherché ╵celui que mon cœur aime.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Je l’ai cherché, ╵mais ne l’ai pas trouvé.
  '10':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: Ses colonnes sont en argent,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: son dossier
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '3.10 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Terme de sens incertain. Autres traductions : '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: lit, siège, base, support, trône.
      marker-yv: yv-n
    - type: text
      text: ' est en or,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: son siège est fait en pourpre.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Les filles de Jérusalem
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ont tapissé avec amour ╵tout l’intérieur du palanquin.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: O filles de Sion, sortez, ╵contemplez le roi Salomon
  - type: usfm
    marker: q1
    children:
    - type: text
      text: portant le diadème ╵dont le ceignit sa mère
  - type: usfm
    marker: q1
    children:
    - type: text
      text: au jour de son mariage,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: au jour où tout son cœur ╵était rempli de joie. »
  '2':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'Je me suis dit alors : ╵Il faut que je me lève,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: je ferai le tour de la ville ╵par les rues et les places,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: je chercherai partout ╵celui que mon cœur aime.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Je l’ai cherché, ╵mais ne l’ai pas trouvé.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: Les gardes m’ont trouvée, ╵ceux qui font le tour de la ville
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '3.3 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Les gardes se tenaient la nuit près de la porte (Né 3.29 ; 11.19 ; 13.22) ou sur les remparts (5.7 ; 2 S 13.34 ; 18.24-27 ; 2 R 9.17-20 ; Ps 127.1 ; Es 52.8 ; 62.6). Sans doute patrouillaient-ils aussi dans la ville (
        - type: usfm
          marker: ref
          children:
          - type: text
            text: '5.7'
        - type: text
          text: ).
      marker-yv: yv-n
    - type: text
      text: .
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Je leur ai demandé : ╵Celui que mon cœur aime, ╵ne l’avez-vous pas vu ?'
  '4':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: Les ayant dépassés,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: peu après, j’ai trouvé ╵celui que mon cœur aime.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Je l’ai saisi bien fort, ╵et ne l’ai plus lâché
  - type: usfm
    marker: q1
    children:
    - type: text
      text: jusqu’à l’avoir conduit ╵au logis de ma mère,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dans la chambre de celle ╵qui m’a conçue.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: O filles de Jérusalem, ╵oh, je vous en conjure
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'par les gazelles ╵ou par les biches ╵de la campagne :'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: n’éveillez pas, ╵non, ne réveillez pas l’amour
  - type: usfm
    marker: q1
    children:
    - type: text
      text: avant qu’il ne le veuille
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '3.5 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Voir '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: '2.7'
        - type: text
          text: ' et note ; '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: '8.4'
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: . »
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Cortège royal
    marker-yv: yv-h
  '6':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: « Qui donc est celle-ci ╵qui monte du désert
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '3.6 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Voir '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: '8.5'
        - type: text
          text: '. Le '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'désert '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: est celui de Judée, c’est-à-dire les collines incultes entourant Jérusalem.
      marker-yv: yv-n
  - type: usfm
    marker: q1
    children:
    - type: text
      text: comme un nuage de fumée,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: aux senteurs de myrrhe et d’encens
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et de tous parfums exotiques ?
  '7':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: Voici la litière de Salomon
  - type: usfm
    marker: q1
    children:
    - type: text
      text: escortée de ses soixante guerriers,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: l’élite des guerriers en Israël.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: Tous armés de l’épée,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: exercés au combat,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ils ont leur épée au côté
  - type: usfm
    marker: q1
    children:
    - type: text
      text: pour parer aux terreurs nocturnes.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: Le palanquin
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '3.9 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Sans doute la litière mentionnée au v. 7 et qui devait être richement ornée.
      marker-yv: yv-n
    - type: text
      text: ' royal ╵fait sur ordre de Salomon'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: est en bois du Liban.
