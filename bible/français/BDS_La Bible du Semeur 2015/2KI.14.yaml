document_id: 2KI.14
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Le règne d’Amatsia sur Juda
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: (2 Ch 25.1-4,  11-12)
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'La deuxième année du règne de Joas, fils de Yoahaz, roi d’Israël, Amatsia, fils de Joas, roi de Juda, devint roi. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Il avait vingt-cinq ans à son avènement et régna vingt-neuf ans à Jérusalem
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '14.2 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: De 796 à 767 av. J.-C. Son règne comprend une corégence de 24 ans avec son fils Azaria.
    marker-yv: yv-n
  - type: text
    text: '. Sa mère s’appelait Yehoaddân, elle était de Jérusalem. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Il fit ce que l’Eternel considère comme juste, mais pas autant que David son ancêtre. Il suivit en tout l’exemple de son père Joas. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Les hauts lieux ne furent pas supprimés et le peuple continuait à y offrir des sacrifices et à y brûler des parfums.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Dès qu’Amatsia eut affermi son autorité royale, il fit exécuter les ministres qui avaient assassiné son père
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '14.5 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Voir '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 12.21-22
        metadata:
          usfm: 2KI.12.21+2KI.12.22
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Mais il ne fit pas mourir les fils de ces meurtriers, conformément aux ordres donnés par l’Eternel dans le livre de la Loi de Moïse, lorsqu’il dit : « On ne fera pas mourir les pères pour les fils, ni les fils pour les pères ; mais chacun mourra pour son propre péché'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '14.6 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Voir '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Dt 24.16
        metadata:
          usfm: DEU.24.16
      - type: text
        text: . Cf. Jr 31.29-30 ; Ez 18.20.
    marker-yv: yv-n
  - type: text
    text: . »
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Amatsia battit dix mille Edomites dans la vallée du Sel
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '14.7 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Vallée qui s’étend au sud de la mer Morte (
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 2 S 8.13
        metadata:
          usfm: 2SA.8.13
      - type: text
        text: ). David y avait déjà battu les Edomites (2 S 8.13 ; 1 Ch 18.12) qui ont reconquis leur indépendance sous Yoram (
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 2 R 8.20
        metadata:
          usfm: 2KI.8.20
      - type: text
        text: ).
    marker-yv: yv-n
  - type: text
    text: ' et conquit de haute lutte la ville de Séla'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '14.7 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'C’est-à-dire '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'la Roche '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'ou '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'le Rocher, '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'située dans la même région que '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'Petra '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '(nom grec de même sens), capitale de l’Idumée (voir '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Es 16
        metadata:
          usfm: ISA.16
      - type: text
        text: ') : on ignore si les deux sites sont identiques.'
    marker-yv: yv-n
  - type: text
    text: . Il lui donna le nom de Yoqtéel qu’elle porte encore aujourd’hui.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Juda est battu par Israël
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: (2 Ch 25.17 à 26.2)
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Là-dessus, Amatsia envoya des messagers à Joas, fils de Yoahaz et petit-fils de Jéhu, roi d’Israël, pour lui dire : Allons nous affronter !'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Joas lui fit répondre : Un jour, le chardon du Liban envoya dire au cèdre du Liban : « Donne ta fille en mariage à mon fils ! » Mais les bêtes sauvages du Liban passèrent par là et piétinèrent le chardon. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Certes, tu as vaincu les Edomites, et cela t’est monté à la tête ! Jouis de ta gloire, mais reste chez toi ! Pourquoi veux-tu t’engager dans une entreprise malheureuse et courir au-devant d’un désastre pour toi et pour le royaume de Juda ?
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Mais Amatsia n’écouta pas son avertissement. Alors Joas, roi d’Israël, se mit en campagne. Les deux rois s’affrontèrent à Beth-Shémesh au pays de Juda
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '14.11 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: A 25 kilomètres à l’ouest de Jérusalem.
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'L’armée de Juda fut battue par celle d’Israël, et les soldats de Juda s’enfuirent chacun chez soi. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: A Beth-Shémesh, Joas, roi d’Israël, fit prisonnier Amatsia, roi de Juda, fils de Joas et petit-fils d’Ahazia. Il se rendit à Jérusalem et démolit le rempart de la ville sur une longueur de cent quatre-vingts mètres, depuis la porte d’Ephraïm
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '14.13 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Appelée aujourd’hui porte de Damas, au nord de la ville (Né 8.16 ; 12.39).
    marker-yv: yv-n
  - type: text
    text: ' jusqu’à la porte de l’Angle'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '14.13 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Au nord-ouest de la ville (Jr 31.38 ; Za 14.10). Cette section nord-ouest était la partie la plus vulnérable de la capitale.
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Il prit tout l’or et l’argent et tous les objets précieux qui se trouvaient dans le temple de l’Eternel et dans les trésors du palais royal ; il prit en plus des otages, puis retourna à Samarie.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Les autres faits et gestes de Joas, la vaillance dont il fit preuve dans la guerre contre Amatsia, roi de Juda, sont cités dans le livre des Annales des rois d’Israël
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '14.15 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: L’une des sources (perdue) du rédacteur du livre des Rois (v. 28).
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Joas rejoignit ses ancêtres décédés et fut enterré à Samarie avec les rois d’Israël. Son fils Jéroboam lui succéda sur le trône.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Amatsia, fils de Joas, roi de Juda, vécut encore quinze années après la mort de Joas, fils de Yoahaz, roi d’Israël
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '14.17 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Joas mourut en 782 et Amatsia en 767 av. J.-C.
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Les autres faits et gestes d’Amatsia sont cités dans le livre des Annales des rois de Juda. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: On trama un complot contre lui à Jérusalem et il s’enfuit à Lakish
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '14.19 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Une cité fortifiée dans le sud de Juda, à quelque 45 kilomètres de Jérusalem (18.14 ; 2 Ch 11.9).
    marker-yv: yv-n
  - type: text
    text: '. Mais ses ennemis envoyèrent des gens jusque-là pour le faire assassiner. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Son corps fut ramené à dos de cheval à Jérusalem où il fut enterré aux côtés de ses ancêtres dans la Cité de David.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Tout le peuple de Juda prit son fils Azaria
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '14.21 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: Azaria
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: ', '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: connu aussi sous le nom d’
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'Ozias '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'dans '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '15.13'
        metadata:
          usfm: 2KI.15.13
      - type: text
        text: ', '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '32'
        metadata:
          usfm: 2KI.15.32
      - type: text
        text: ', etc., dans les Chroniques et dans '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Es 6.1
        metadata:
          usfm: ISA.6.1
      - type: text
        text: . Azaria a peut-être été proclamé roi pendant que son père était prisonnier en Israël. Il a été corégent avec son père durant 24 ans.
    marker-yv: yv-n
  - type: text
    text: ' âgé de seize ans pour le proclamer roi à la place de son père Amatsia. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: C’est lui qui ramena Eilath sous la domination de Juda et qui la reconstruisit, après la mort du roi.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Le règne de Jéroboam II sur Israël
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: La quinzième année du règne d’Amatsia, fils de Joas, roi de Juda, Jéroboam, fils de Joas, devint roi d’Israël à Samarie. Il régna quarante et un ans
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '14.23 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: De 793 à 753 av. J.-C., y compris la corégence avec son père Joas de 793 à 782.
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Il fit ce que l’Eternel considère comme mal ; il ne renonça à aucun des péchés dans lesquels Jéroboam, fils de Nebath, avait entraîné le peuple d’Israël. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: C’est lui qui reconquit tous les territoires qui avaient appartenu à Israël depuis Lebo-Hamath
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '14.25 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Autre traduction : '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'depuis les environs de Hamath '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: (voir Nb 13.21 ; 1 R 8.65). Jéroboam libéra la partie du royaume du Nord soumise par Hazaël et Ben-Hadad, rois de Syrie (10.32 ; 12.18 ; 13.3, 22, 25). Il soumit la Syrie de Damas affaiblie par les attaques des rois assyriens Salmanasar IV en 773 et Assour-Dan III en 772 av. J.-C.
    marker-yv: yv-n
  - type: text
    text: ' jusqu’à la mer Morte. Ainsi s’accomplit ce que l’Eternel, le Dieu d’Israël, avait annoncé par l’intermédiaire de son serviteur, le prophète Jonas, fils d’Amittaï'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '14.25 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Voir '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Jon 1.1
        metadata:
          usfm: JON.1.1
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: ', de Gath-Hépher. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: Car l’Eternel avait vu l’extrême misère dans laquelle Israël était tombé
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '14.26 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Sous les coups des Syriens (cf. 10.32-33 ; 13.3-7), des Moabites (
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '13.20'
        metadata:
          usfm: 2KI.13.20
      - type: text
        text: ) et des Ammonites (
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Am 1.13
        metadata:
          usfm: AMO.1.13
      - type: text
        text: ).
    marker-yv: yv-n
  - type: text
    text: '. Il n’y avait plus chez eux ni esclave, ni homme libre : personne pour venir à son secours. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: Or, l’Eternel n’avait pas dit qu’il ferait disparaître le nom d’Israël de dessous le ciel, et il sauva le pays par Jéroboam, fils de Joas.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: Les autres faits et gestes de Jéroboam, toutes ses réalisations, la vaillance dont il fit preuve à la guerre, et la manière dont il ramena sous la domination d’Israël les villes de Damas et de Hamath qui avaient appartenu à Juda
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '14.28 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Voir 2 S 8.6 ; 2 Ch 8.3. Certains pensent que le terme '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'Juda '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'désigne ici, non le royaume davidique, mais celui de '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'Yaudi, '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: situé au nord de la Syrie, auquel certaines inscriptions assyriennes font allusion.
    marker-yv: yv-n
  - type: text
    text: ', tout cela est cité dans le livre des Annales des rois d’Israël'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '14.28 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Voir v. 15.
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: Jéroboam rejoignit ses ancêtres décédés et fut enterré
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '14.29 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: et fut enterré
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: ': '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ces mots manquent dans le texte hébreu traditionnel.
    marker-yv: yv-n
  - type: text
    text: ' avec les rois d’Israël. Son fils Zacharie lui succéda sur le trône.'
