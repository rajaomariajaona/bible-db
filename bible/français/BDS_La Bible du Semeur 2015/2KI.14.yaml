document_id: 2KI.14,21
type_code: fra
verses:
  '1':
  - type: heading
    content: Le règne d’Amatsia sur Juda
  - type: heading
    content: (2 Ch 25.1-4,  11-12)
  - type: text
    content: 'La deuxième année du règne de Joas, fils de Yoahaz, roi d’Israël, Amatsia, fils de Joas, roi de Juda, devint roi. '
  '10':
  - type: text
    content: Certes, tu as vaincu les Edomites, et cela t’est monté à la tête ! Jouis de ta gloire, mais reste chez toi ! Pourquoi veux-tu t’engager dans une entreprise malheureuse et courir au-devant d’un désastre pour toi et pour le royaume de Juda ?
  '11':
  - type: text
    content: Mais Amatsia n’écouta pas son avertissement. Alors Joas, roi d’Israël, se mit en campagne. Les deux rois s’affrontèrent à Beth-Shémesh au pays de Juda
  - type: note
    content: A 25 kilomètres à l’ouest de Jérusalem.
  - type: text
    content: '. '
  '12':
  - type: text
    content: 'L’armée de Juda fut battue par celle d’Israël, et les soldats de Juda s’enfuirent chacun chez soi. '
  '13':
  - type: text
    content: A Beth-Shémesh, Joas, roi d’Israël, fit prisonnier Amatsia, roi de Juda, fils de Joas et petit-fils d’Ahazia. Il se rendit à Jérusalem et démolit le rempart de la ville sur une longueur de cent quatre-vingts mètres, depuis la porte d’Ephraïm
  - type: note
    content: Appelée aujourd’hui porte de Damas, au nord de la ville (Né 8.16 ; 12.39).
  - type: text
    content: ' jusqu’à la porte de l’Angle'
  - type: note
    content: Au nord-ouest de la ville (Jr 31.38 ; Za 14.10). Cette section nord-ouest était la partie la plus vulnérable de la capitale.
  - type: text
    content: '. '
  '14':
  - type: text
    content: Il prit tout l’or et l’argent et tous les objets précieux qui se trouvaient dans le temple de l’Eternel et dans les trésors du palais royal ; il prit en plus des otages, puis retourna à Samarie.
  '15':
  - type: text
    content: Les autres faits et gestes de Joas, la vaillance dont il fit preuve dans la guerre contre Amatsia, roi de Juda, sont cités dans le livre des Annales des rois d’Israël
  - type: note
    content: L’une des sources (perdue) du rédacteur du livre des Rois (v. 28).
  - type: text
    content: '. '
  '16':
  - type: text
    content: Joas rejoignit ses ancêtres décédés et fut enterré à Samarie avec les rois d’Israël. Son fils Jéroboam lui succéda sur le trône.
  '17':
  - type: text
    content: Amatsia, fils de Joas, roi de Juda, vécut encore quinze années après la mort de Joas, fils de Yoahaz, roi d’Israël
  - type: note
    content: Joas mourut en 782 et Amatsia en 767 av. J.-C.
  - type: text
    content: '. '
  '18':
  - type: text
    content: 'Les autres faits et gestes d’Amatsia sont cités dans le livre des Annales des rois de Juda. '
  '19':
  - type: text
    content: On trama un complot contre lui à Jérusalem et il s’enfuit à Lakish
  - type: note
    content: Une cité fortifiée dans le sud de Juda, à quelque 45 kilomètres de Jérusalem (18.14 ; 2 Ch 11.9).
  - type: text
    content: '. Mais ses ennemis envoyèrent des gens jusque-là pour le faire assassiner. '
  '2':
  - type: text
    content: Il avait vingt-cinq ans à son avènement et régna vingt-neuf ans à Jérusalem
  - type: note
    content: De 796 à 767 av. J.-C. Son règne comprend une corégence de 24 ans avec son fils Azaria.
  - type: text
    content: '. Sa mère s’appelait Yehoaddân, elle était de Jérusalem. '
  '20':
  - type: text
    content: Son corps fut ramené à dos de cheval à Jérusalem où il fut enterré aux côtés de ses ancêtres dans la Cité de David.
  '21':
  - type: text
    content: Tout le peuple de Juda prit son fils Azaria
  - type: note
    content: Azaria, connu aussi sous le nom d’Ozias dans 15.13, 32, etc., dans les Chroniques et dans Es 6.1. Azaria a peut-être été proclamé roi pendant que son père était prisonnier en Israël. Il a été corégent avec son père durant 24 ans.
  - type: text
    content: ' âgé de seize ans pour le proclamer roi à la place de son père Amatsia. '
  '22':
  - type: text
    content: C’est lui qui ramena Eilath sous la domination de Juda et qui la reconstruisit, après la mort du roi.
  - type: heading
    content: Le règne de Jéroboam II sur Israël
  '23':
  - type: text
    content: La quinzième année du règne d’Amatsia, fils de Joas, roi de Juda, Jéroboam, fils de Joas, devint roi d’Israël à Samarie. Il régna quarante et un ans
  - type: note
    content: De 793 à 753 av. J.-C., y compris la corégence avec son père Joas de 793 à 782.
  - type: text
    content: '. '
  '24':
  - type: text
    content: 'Il fit ce que l’Eternel considère comme mal ; il ne renonça à aucun des péchés dans lesquels Jéroboam, fils de Nebath, avait entraîné le peuple d’Israël. '
  '25':
  - type: text
    content: C’est lui qui reconquit tous les territoires qui avaient appartenu à Israël depuis Lebo-Hamath
  - type: note
    content: 'Autre traduction : depuis les environs de Hamath (voir Nb 13.21 ; 1 R 8.65). Jéroboam libéra la partie du royaume du Nord soumise par Hazaël et Ben-Hadad, rois de Syrie (10.32 ; 12.18 ; 13.3, 22, 25). Il soumit la Syrie de Damas affaiblie par les attaques des rois assyriens Salmanasar IV en 773 et Assour-Dan III en 772 av. J.-C.'
  - type: text
    content: ' jusqu’à la mer Morte. Ainsi s’accomplit ce que l’Eternel, le Dieu d’Israël, avait annoncé par l’intermédiaire de son serviteur, le prophète Jonas, fils d’Amittaï'
  - type: note
    content: Voir Jon 1.1.
  - type: text
    content: ', de Gath-Hépher. '
  '26':
  - type: text
    content: Car l’Eternel avait vu l’extrême misère dans laquelle Israël était tombé
  - type: note
    content: Sous les coups des Syriens (cf. 10.32-33 ; 13.3-7), des Moabites (13.20) et des Ammonites (Am 1.13).
  - type: text
    content: '. Il n’y avait plus chez eux ni esclave, ni homme libre : personne pour venir à son secours. '
  '27':
  - type: text
    content: Or, l’Eternel n’avait pas dit qu’il ferait disparaître le nom d’Israël de dessous le ciel, et il sauva le pays par Jéroboam, fils de Joas.
  '28':
  - type: text
    content: Les autres faits et gestes de Jéroboam, toutes ses réalisations, la vaillance dont il fit preuve à la guerre, et la manière dont il ramena sous la domination d’Israël les villes de Damas et de Hamath qui avaient appartenu à Juda
  - type: note
    content: Voir 2 S 8.6 ; 2 Ch 8.3. Certains pensent que le terme Juda désigne ici, non le royaume davidique, mais celui de Yaudi, situé au nord de la Syrie, auquel certaines inscriptions assyriennes font allusion.
  - type: text
    content: ', tout cela est cité dans le livre des Annales des rois d’Israël'
  - type: note
    content: Voir v. 15.
  - type: text
    content: '. '
  '29':
  - type: text
    content: Jéroboam rejoignit ses ancêtres décédés et fut enterré
  - type: note
    content: 'et fut enterré: ces mots manquent dans le texte hébreu traditionnel.'
  - type: text
    content: ' avec les rois d’Israël. Son fils Zacharie lui succéda sur le trône.'
  '3':
  - type: text
    content: 'Il fit ce que l’Eternel considère comme juste, mais pas autant que David son ancêtre. Il suivit en tout l’exemple de son père Joas. '
  '4':
  - type: text
    content: Les hauts lieux ne furent pas supprimés et le peuple continuait à y offrir des sacrifices et à y brûler des parfums.
  '5':
  - type: text
    content: Dès qu’Amatsia eut affermi son autorité royale, il fit exécuter les ministres qui avaient assassiné son père
  - type: note
    content: Voir 12.21-22.
  - type: text
    content: '. '
  '6':
  - type: text
    content: 'Mais il ne fit pas mourir les fils de ces meurtriers, conformément aux ordres donnés par l’Eternel dans le livre de la Loi de Moïse, lorsqu’il dit : « On ne fera pas mourir les pères pour les fils, ni les fils pour les pères ; mais chacun mourra pour son propre péché'
  - type: note
    content: Voir Dt 24.16. Cf. Jr 31.29-30 ; Ez 18.20.
  - type: text
    content: . »
  '7':
  - type: text
    content: Amatsia battit dix mille Edomites dans la vallée du Sel
  - type: note
    content: Vallée qui s’étend au sud de la mer Morte (2 S 8.13). David y avait déjà battu les Edomites (2 S 8.13 ; 1 Ch 18.12) qui ont reconquis leur indépendance sous Yoram (2 R 8.20).
  - type: text
    content: ' et conquit de haute lutte la ville de Séla'
  - type: note
    content: 'C’est-à-dire la Roche ou le Rocher, située dans la même région que Petra (nom grec de même sens), capitale de l’Idumée (voir Es 16) : on ignore si les deux sites sont identiques.'
  - type: text
    content: . Il lui donna le nom de Yoqtéel qu’elle porte encore aujourd’hui.
  - type: heading
    content: Juda est battu par Israël
  - type: heading
    content: (2 Ch 25.17 à 26.2)
  '8':
  - type: text
    content: 'Là-dessus, Amatsia envoya des messagers à Joas, fils de Yoahaz et petit-fils de Jéhu, roi d’Israël, pour lui dire : Allons nous affronter !'
  '9':
  - type: text
    content: 'Joas lui fit répondre : Un jour, le chardon du Liban envoya dire au cèdre du Liban : « Donne ta fille en mariage à mon fils ! » Mais les bêtes sauvages du Liban passèrent par là et piétinèrent le chardon. '
