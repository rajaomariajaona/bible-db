document_id: PSA.86,21
type_code: fra
verses:
  '1':
  - type: heading
    content: Viens me sauver
  - type: text
    content: Prière de David.
  - type: text
    content: Tends vers moi ton oreille, ╵Eternel, réponds-moi,
  - type: text
    content: car je suis pauvre et affligé.
  '10':
  - type: text
    content: Car tu es grand, ╵et tu accomplis des prodiges !
  - type: text
    content: C’est toi seul qui es Dieu.
  '11':
  - type: text
    content: Enseigne-moi, ô Eternel, ╵la voie que tu veux que je suive,
  - type: text
    content: et je me conduirai ╵selon ta vérité.
  - type: text
    content: Accorde-moi un cœur ╵tel qu’il te craigne sans partage.
  '12':
  - type: text
    content: De tout mon cœur, ╵je te louerai,
  - type: text
    content: Seigneur mon Dieu, ╵je te rendrai ╵gloire à toujours.
  '13':
  - type: text
    content: Car ton amour ╵pour moi est grand,
  - type: text
    content: et toi, tu me délivres ╵du gouffre du séjour des morts.
  '14':
  - type: text
    content: O Dieu, des hommes arrogants ╵se dressent contre moi,
  - type: text
    content: une bande de violents ╵en veulent à ma vie.
  - type: text
    content: Il n’y a pas de place ╵pour toi dans leurs pensées.
  '15':
  - type: text
    content: Mais toi, Seigneur, ╵tu es un Dieu compatissant ╵et disposé à faire grâce ;
  - type: text
    content: toi, tu es lent à la colère, ╵riche en amour fidèle
  - type: note
    content: Voir Ex 34.6 ; Né 9.17 ; Jr 2.13 ; Ps 103.8 ; 145.8.
  - type: text
    content: .
  '16':
  - type: text
    content: Tourne-toi donc vers moi ╵et fais-moi grâce !
  - type: text
    content: Accorde-moi ta force, ╵à moi qui suis ton serviteur.
  - type: text
    content: Oui, viens sauver ╵le fils de ta servante.
  '17':
  - type: text
    content: Accorde-moi un signe ╵de ta bonté.
  - type: text
    content: Que ceux qui me haïssent ╵le voient et soient couverts de honte !
  - type: text
    content: Car c’est toi, Eternel, ╵qui es mon aide ╵et mon consolateur.
  '2':
  - type: text
    content: Viens protéger ma vie, ╵car je te suis attaché.
  - type: text
    content: 'Toi mon Dieu, sauve-moi : ╵je suis ton serviteur, ╵je me confie en toi.'
  '3':
  - type: text
    content: O Seigneur, fais-moi grâce !
  - type: text
    content: Je crie vers toi sans cesse.
  '4':
  - type: text
    content: Réjouis ton serviteur,
  - type: text
    content: car c’est vers toi, Seigneur, ╵que je me porte.
  '5':
  - type: text
    content: Car tu es bon, Seigneur, ╵et prompt à pardonner,
  - type: text
    content: riche en amour ╵pour tous ceux qui t’invoquent.
  '6':
  - type: text
    content: Ecoute ma prière, ╵ô Eternel !
  - type: text
    content: Sois attentif ╵à mes supplications !
  '7':
  - type: text
    content: Au jour de ma détresse, ╵c’est vers toi que je crie,
  - type: text
    content: car tu me répondras.
  '8':
  - type: text
    content: Parmi les dieux, Seigneur, ╵nul n’est semblable à toi !
  - type: text
    content: Aucun ne pourrait accomplir ╵des œuvres semblables aux tiennes.
  '9':
  - type: text
    content: Tous les peuples que tu as faits
  - type: text
    content: viendront se prosterner ╵devant toi, ô Seigneur,
  - type: text
    content: et ils te rendront gloire
  - type: note
    content: Cité en Ap 15.4.
  - type: text
    content: .
