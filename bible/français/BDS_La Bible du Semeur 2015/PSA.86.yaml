document_id: PSA.86
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Viens me sauver
  marker-yv: yv-h
- type: usfm
  marker: d
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Prière de David.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Tends vers moi ton oreille, ╵Eternel, réponds-moi,
- type: usfm
  marker: q1
  children:
  - type: text
    text: car je suis pauvre et affligé.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Viens protéger ma vie, ╵car je te suis attaché.
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Toi mon Dieu, sauve-moi : ╵je suis ton serviteur, ╵je me confie en toi.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: O Seigneur, fais-moi grâce !
- type: usfm
  marker: q1
  children:
  - type: text
    text: Je crie vers toi sans cesse.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Réjouis ton serviteur,
- type: usfm
  marker: q1
  children:
  - type: text
    text: car c’est vers toi, Seigneur, ╵que je me porte.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Car tu es bon, Seigneur, ╵et prompt à pardonner,
- type: usfm
  marker: q1
  children:
  - type: text
    text: riche en amour ╵pour tous ceux qui t’invoquent.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Ecoute ma prière, ╵ô Eternel !
- type: usfm
  marker: q1
  children:
  - type: text
    text: Sois attentif ╵à mes supplications !
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Au jour de ma détresse, ╵c’est vers toi que je crie,
- type: usfm
  marker: q1
  children:
  - type: text
    text: car tu me répondras.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Parmi les dieux, Seigneur, ╵nul n’est semblable à toi !
- type: usfm
  marker: q1
  children:
  - type: text
    text: Aucun ne pourrait accomplir ╵des œuvres semblables aux tiennes.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Tous les peuples que tu as faits
- type: usfm
  marker: q1
  children:
  - type: text
    text: viendront se prosterner ╵devant toi, ô Seigneur,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et ils te rendront gloire
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '86.9 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Cité en '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ap 15.4
        metadata:
          usfm: REV.15.4
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Car tu es grand, ╵et tu accomplis des prodiges !
- type: usfm
  marker: q1
  children:
  - type: text
    text: C’est toi seul qui es Dieu.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Enseigne-moi, ô Eternel, ╵la voie que tu veux que je suive,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et je me conduirai ╵selon ta vérité.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Accorde-moi un cœur ╵tel qu’il te craigne sans partage.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: De tout mon cœur, ╵je te louerai,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Seigneur mon Dieu, ╵je te rendrai ╵gloire à toujours.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Car ton amour ╵pour moi est grand,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et toi, tu me délivres ╵du gouffre du séjour des morts.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: O Dieu, des hommes arrogants ╵se dressent contre moi,
- type: usfm
  marker: q1
  children:
  - type: text
    text: une bande de violents ╵en veulent à ma vie.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Il n’y a pas de place ╵pour toi dans leurs pensées.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Mais toi, Seigneur, ╵tu es un Dieu compatissant ╵et disposé à faire grâce ;
- type: usfm
  marker: q1
  children:
  - type: text
    text: toi, tu es lent à la colère, ╵riche en amour fidèle
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '86.15 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Voir Ex 34.6 ; Né 9.17 ; Jr 2.13 ; Ps 103.8 ; 145.8.
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Tourne-toi donc vers moi ╵et fais-moi grâce !
- type: usfm
  marker: q1
  children:
  - type: text
    text: Accorde-moi ta force, ╵à moi qui suis ton serviteur.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Oui, viens sauver ╵le fils de ta servante.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Accorde-moi un signe ╵de ta bonté.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Que ceux qui me haïssent ╵le voient et soient couverts de honte !
- type: usfm
  marker: q1
  children:
  - type: text
    text: Car c’est toi, Eternel, ╵qui es mon aide ╵et mon consolateur.
