document_id: PSA.86,21
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Viens me sauver
    marker-yv: yv-h
  - type: usfm
    marker: d
    children:
    - type: text
      text: Prière de David.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tends vers moi ton oreille, ╵Eternel, réponds-moi,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: car je suis pauvre et affligé.
  '10':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Car tu es grand, ╵et tu accomplis des prodiges !
  - type: usfm
    marker: q1
    children:
    - type: text
      text: C’est toi seul qui es Dieu.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Enseigne-moi, ô Eternel, ╵la voie que tu veux que je suive,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et je me conduirai ╵selon ta vérité.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Accorde-moi un cœur ╵tel qu’il te craigne sans partage.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: De tout mon cœur, ╵je te louerai,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Seigneur mon Dieu, ╵je te rendrai ╵gloire à toujours.
  '13':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Car ton amour ╵pour moi est grand,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et toi, tu me délivres ╵du gouffre du séjour des morts.
  '14':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: O Dieu, des hommes arrogants ╵se dressent contre moi,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: une bande de violents ╵en veulent à ma vie.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Il n’y a pas de place ╵pour toi dans leurs pensées.
  '15':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mais toi, Seigneur, ╵tu es un Dieu compatissant ╵et disposé à faire grâce ;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: toi, tu es lent à la colère, ╵riche en amour fidèle
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '86.15 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Voir Ex 34.6 ; Né 9.17 ; Jr 2.13 ; Ps 103.8 ; 145.8.
      marker-yv: yv-n
    - type: text
      text: .
  '16':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tourne-toi donc vers moi ╵et fais-moi grâce !
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Accorde-moi ta force, ╵à moi qui suis ton serviteur.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Oui, viens sauver ╵le fils de ta servante.
  '17':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Accorde-moi un signe ╵de ta bonté.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Que ceux qui me haïssent ╵le voient et soient couverts de honte !
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Car c’est toi, Eternel, ╵qui es mon aide ╵et mon consolateur.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Viens protéger ma vie, ╵car je te suis attaché.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Toi mon Dieu, sauve-moi : ╵je suis ton serviteur, ╵je me confie en toi.'
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: O Seigneur, fais-moi grâce !
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Je crie vers toi sans cesse.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Réjouis ton serviteur,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: car c’est vers toi, Seigneur, ╵que je me porte.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Car tu es bon, Seigneur, ╵et prompt à pardonner,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: riche en amour ╵pour tous ceux qui t’invoquent.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ecoute ma prière, ╵ô Eternel !
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Sois attentif ╵à mes supplications !
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Au jour de ma détresse, ╵c’est vers toi que je crie,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: car tu me répondras.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Parmi les dieux, Seigneur, ╵nul n’est semblable à toi !
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Aucun ne pourrait accomplir ╵des œuvres semblables aux tiennes.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tous les peuples que tu as faits
  - type: usfm
    marker: q1
    children:
    - type: text
      text: viendront se prosterner ╵devant toi, ô Seigneur,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et ils te rendront gloire
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '86.9 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Cité en '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: Ap 15.4
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: .
