document_id: HEB.13
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Autres recommandations
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Que votre amour fraternel demeure vivant. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Ne négligez pas de pratiquer l’hospitalité
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '13.2 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Envers les chrétiens qui voyageaient, comme Abraham l’a fait envers les anges qu’il a accueillis (voir '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Gn 18.1-8
        metadata:
          usfm: GEN.18.1+GEN.18.2+GEN.18.3+GEN.18.4+GEN.18.5+GEN.18.6+GEN.18.7+GEN.18.8
      - type: text
        text: ).
    marker-yv: yv-n
  - type: text
    text: . Car certains, en l’exerçant, ont accueilli des anges sans le savoir.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Ayez le souci de ceux qui sont en prison, comme si vous étiez en prison avec eux, et de ceux qui sont maltraités, puisque vous aussi vous partagez leur condition terrestre.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Que chacun respecte le mariage et que les époux restent fidèles l’un à l’autre, car Dieu jugera les débauchés et les adultères.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Que votre conduite ne soit pas guidée par l’amour de l’argent. Contentez-vous de ce que vous avez présentement. Car Dieu lui-même a dit : '
  - type: usfm
    marker: qt
    children:
    - type: text
      text: 'Je ne te laisserai pas : non, je ne t’abandonnerai jamais'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '13.5 '
    - type: usfm
      marker: ft
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Jos 1.5
        metadata:
          usfm: JOS.1.5
      - type: text
        text: .
    marker-yv: yv-n
  - type: usfm
    marker: qt
    children:
    - type: text
      text: .
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Aussi pouvons-nous dire avec assurance :'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: qt
    children:
    - type: text
      text: Le Seigneur vient à mon secours,
  - type: text
    text: ' ╵'
  - type: usfm
    marker: qt
    children:
    - type: text
      text: je n’aurai pas de crainte,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: qt
    children:
    - type: text
      text: que me feraient les hommes
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '13.6 '
    - type: usfm
      marker: ft
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ps 118.6
        metadata:
          usfm: PSA.118.6
      - type: text
        text: ' cité selon l’ancienne version grecque.'
    marker-yv: yv-n
  - type: usfm
    marker: qt
    children:
    - type: text
      text: '?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Souvenez-vous de vos anciens conducteurs qui vous ont annoncé la Parole de Dieu. Considérez l’aboutissement de toute leur vie
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '13.7 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Autre traduction : '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: la manière dont ils ont vécu et sont morts.
    marker-yv: yv-n
  - type: text
    text: ' et imitez leur foi.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Jésus-Christ est le même hier, aujourd’hui et pour toujours. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Ne vous laissez pas entraîner par toutes sortes de doctrines qui sont étrangères à notre foi. Ce qui est bien, en effet, c’est que notre cœur soit affermi par la grâce divine et non par des aliments qui n’ont jamais profité à ceux qui avaient coutume de les consommer. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Nous avons un autel, mais les prêtres qui servent dans le sanctuaire n’ont pas le droit de manger ce qui y est offert. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'En effet, le sang des animaux offerts en sacrifice pour le péché est apporté dans le sanctuaire par le grand-prêtre, mais leurs corps sont brûlés '
  - type: usfm
    marker: qt
    children:
    - type: text
      text: à l’extérieur du camp
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '13.11 '
    - type: usfm
      marker: ft
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Lv 16.27
        metadata:
          usfm: LEV.16.27
      - type: text
        text: .
    marker-yv: yv-n
  - type: usfm
    marker: qt
    children:
    - type: text
      text: .
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: C’est pourquoi Jésus, lui aussi, est mort à l’extérieur de la ville pour purifier le peuple par son propre sang.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Allons donc à lui en sortant '
  - type: usfm
    marker: qt
    children:
    - type: text
      text: à l’extérieur du camp
  - type: text
    text: ', et acceptons d’être méprisés comme lui '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'car, ici-bas, nous n’avons pas de cité permanente : c’est la cité à venir que nous recherchons. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Par Jésus, offrons donc en tout temps à Dieu un '
  - type: usfm
    marker: qt
    children:
    - type: text
      text: sacrifice de louange
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '13.15 '
    - type: usfm
      marker: ft
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ps 50.14
        metadata:
          usfm: PSA.50.14
      - type: text
        text: ', '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '23'
        metadata:
          usfm: PSA.50.23
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: ' qui consiste à célébrer son nom. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Ne négligez pas de pratiquer la bienfaisance et l’entraide : voilà les '
  - type: usfm
    marker: qt
    children:
    - type: text
      text: sacrifices
  - type: text
    text: ' auxquels Dieu prend plaisir.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Obéissez à vos conducteurs et soumettez-vous à eux, car ils veillent sur vous en sachant qu’ils devront un jour rendre compte à Dieu de leur service. Qu’ils puissent ainsi s’acquitter de leur tâche avec joie et non pas en gémissant, ce qui ne vous serait d’aucun avantage.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Priez pour nous ! Car nous sommes convaincus d’avoir une bonne conscience, puisque nous sommes résolus à bien nous conduire en toute occasion. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Je vous demande tout particulièrement de prier pour que je vous sois bien vite rendu.
- type: usfm
  marker: ms1
  children:
  - type: text
    text: Salutations
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Le Dieu qui donne la paix a ressuscité notre Seigneur Jésus qui est devenu le grand berger des brebis en scellant de son sang une alliance éternelle. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Que ce Dieu vous rende capables de faire le bien sous toutes ses formes, pour que vous accomplissiez sa volonté. Qu’il réalise lui-même en nous, par Jésus-Christ, ce qui lui est agréable. A lui soit la gloire pour l’éternité ! Amen !
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Je vous le demande, frères et sœurs, accueillez avec patience la parole d’encouragement que je vous adresse. Je vous ai d’ailleurs écrit brièvement. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: Sachez que notre frère Timothée a été libéré. S’il arrive assez tôt, j’irai vous voir avec lui.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: Saluez tous vos dirigeants et tous ceux qui font partie du peuple saint. Les frères et sœurs d’Italie
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '13.24 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Il s’agit sans doute de chrétiens originaires d’Italie qui saluent leurs compatriotes au pays. C’est l’un des indices qui ont amené certains à penser que la lettre a été adressée à une partie de l’Eglise de Rome. D’autres pensent que l’auteur se trouve en Italie, probablement à Rome, lorsqu’il écrit la lettre aux Hébreux qui serait alors adressée à des chrétiens d’origine juive vivant en Israël.
    marker-yv: yv-n
  - type: text
    text: ' vous saluent.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: Que la grâce de Dieu vous accompagne tous
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '13.25 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Certains manuscrits ajoutent : '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: Amen !
    marker-yv: yv-n
  - type: text
    text: '  !'
