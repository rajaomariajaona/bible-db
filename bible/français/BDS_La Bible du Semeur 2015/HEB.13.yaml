document_id: HEB.13,21
type_code: fra
verses:
  '1':
  - type: heading
    content: Autres recommandations
  - type: text
    content: 'Que votre amour fraternel demeure vivant. '
  '10':
  - type: text
    content: 'Nous avons un autel, mais les prêtres qui servent dans le sanctuaire n’ont pas le droit de manger ce qui y est offert. '
  '11':
  - type: text
    content: 'En effet, le sang des animaux offerts en sacrifice pour le péché est apporté dans le sanctuaire par le grand-prêtre, mais leurs corps sont brûlés '
  - type: text
    content: à l’extérieur du camp
  - type: note
    content: Lv 16.27.
  - type: text
    content: .
  - type: text
    content: ' '
  '12':
  - type: text
    content: C’est pourquoi Jésus, lui aussi, est mort à l’extérieur de la ville pour purifier le peuple par son propre sang.
  '13':
  - type: text
    content: 'Allons donc à lui en sortant '
  - type: text
    content: à l’extérieur du camp
  - type: text
    content: ', et acceptons d’être méprisés comme lui '
  '14':
  - type: text
    content: 'car, ici-bas, nous n’avons pas de cité permanente : c’est la cité à venir que nous recherchons. '
  '15':
  - type: text
    content: 'Par Jésus, offrons donc en tout temps à Dieu un '
  - type: text
    content: sacrifice de louange
  - type: note
    content: Ps 50.14, 23.
  - type: text
    content: ' qui consiste à célébrer son nom. '
  '16':
  - type: text
    content: 'Ne négligez pas de pratiquer la bienfaisance et l’entraide : voilà les '
  - type: text
    content: sacrifices
  - type: text
    content: ' auxquels Dieu prend plaisir.'
  '17':
  - type: text
    content: Obéissez à vos conducteurs et soumettez-vous à eux, car ils veillent sur vous en sachant qu’ils devront un jour rendre compte à Dieu de leur service. Qu’ils puissent ainsi s’acquitter de leur tâche avec joie et non pas en gémissant, ce qui ne vous serait d’aucun avantage.
  '18':
  - type: text
    content: 'Priez pour nous ! Car nous sommes convaincus d’avoir une bonne conscience, puisque nous sommes résolus à bien nous conduire en toute occasion. '
  '19':
  - type: text
    content: Je vous demande tout particulièrement de prier pour que je vous sois bien vite rendu.
  - type: heading
    content: Salutations
  '2':
  - type: text
    content: Ne négligez pas de pratiquer l’hospitalité
  - type: note
    content: Envers les chrétiens qui voyageaient, comme Abraham l’a fait envers les anges qu’il a accueillis (voir Gn 18.1-8).
  - type: text
    content: . Car certains, en l’exerçant, ont accueilli des anges sans le savoir.
  '20':
  - type: text
    content: 'Le Dieu qui donne la paix a ressuscité notre Seigneur Jésus qui est devenu le grand berger des brebis en scellant de son sang une alliance éternelle. '
  '21':
  - type: text
    content: Que ce Dieu vous rende capables de faire le bien sous toutes ses formes, pour que vous accomplissiez sa volonté. Qu’il réalise lui-même en nous, par Jésus-Christ, ce qui lui est agréable. A lui soit la gloire pour l’éternité ! Amen !
  '22':
  - type: text
    content: 'Je vous le demande, frères et sœurs, accueillez avec patience la parole d’encouragement que je vous adresse. Je vous ai d’ailleurs écrit brièvement. '
  '23':
  - type: text
    content: Sachez que notre frère Timothée a été libéré. S’il arrive assez tôt, j’irai vous voir avec lui.
  '24':
  - type: text
    content: Saluez tous vos dirigeants et tous ceux qui font partie du peuple saint. Les frères et sœurs d’Italie
  - type: note
    content: Il s’agit sans doute de chrétiens originaires d’Italie qui saluent leurs compatriotes au pays. C’est l’un des indices qui ont amené certains à penser que la lettre a été adressée à une partie de l’Eglise de Rome. D’autres pensent que l’auteur se trouve en Italie, probablement à Rome, lorsqu’il écrit la lettre aux Hébreux qui serait alors adressée à des chrétiens d’origine juive vivant en Israël.
  - type: text
    content: ' vous saluent.'
  '25':
  - type: text
    content: Que la grâce de Dieu vous accompagne tous
  - type: note
    content: 'Certains manuscrits ajoutent : Amen !'
  - type: text
    content: '  !'
  '3':
  - type: text
    content: Ayez le souci de ceux qui sont en prison, comme si vous étiez en prison avec eux, et de ceux qui sont maltraités, puisque vous aussi vous partagez leur condition terrestre.
  '4':
  - type: text
    content: Que chacun respecte le mariage et que les époux restent fidèles l’un à l’autre, car Dieu jugera les débauchés et les adultères.
  '5':
  - type: text
    content: 'Que votre conduite ne soit pas guidée par l’amour de l’argent. Contentez-vous de ce que vous avez présentement. Car Dieu lui-même a dit : '
  - type: text
    content: 'Je ne te laisserai pas : non, je ne t’abandonnerai jamais'
  - type: note
    content: Jos 1.5.
  - type: text
    content: .
  - type: text
    content: ' '
  '6':
  - type: text
    content: 'Aussi pouvons-nous dire avec assurance :'
  - type: text
    content: Le Seigneur vient à mon secours,
  - type: text
    content: ' ╵'
  - type: text
    content: je n’aurai pas de crainte,
  - type: text
    content: que me feraient les hommes
  - type: text
    content: ' '
  - type: note
    content: Ps 118.6 cité selon l’ancienne version grecque.
  - type: text
    content: '?'
  '7':
  - type: text
    content: Souvenez-vous de vos anciens conducteurs qui vous ont annoncé la Parole de Dieu. Considérez l’aboutissement de toute leur vie
  - type: note
    content: 'Autre traduction : la manière dont ils ont vécu et sont morts.'
  - type: text
    content: ' et imitez leur foi.'
  '8':
  - type: text
    content: 'Jésus-Christ est le même hier, aujourd’hui et pour toujours. '
  '9':
  - type: text
    content: 'Ne vous laissez pas entraîner par toutes sortes de doctrines qui sont étrangères à notre foi. Ce qui est bien, en effet, c’est que notre cœur soit affermi par la grâce divine et non par des aliments qui n’ont jamais profité à ceux qui avaient coutume de les consommer. '
