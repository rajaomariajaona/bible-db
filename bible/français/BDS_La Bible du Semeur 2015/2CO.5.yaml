document_id: 2CO.5
type_code: fra
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Nous le savons, en effet : si notre demeure, cette tente que nous habitons sur la terre, vient à être détruite, nous avons au ciel une maison que Dieu nous a préparée, une habitation éternelle qui n’est pas l’œuvre de l’homme. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Car, dans cette tente, nous gémissons parce que nous attendons, avec un ardent désir, de revêtir, par-dessus l’autre
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '5.2 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Autre traduction : '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: de revêtir pleinement.
    marker-yv: yv-n
  - type: text
    text: ', notre domicile qui est de nature céleste'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '5.2 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Dans tout ce passage, Paul passe constamment de l’image d’un habit à celle d’une habitation.
    marker-yv: yv-n
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: – si, bien sûr, cela se produit tant que nous sommes encore vêtus de notre corps, et non quand la mort nous en aura dépouillés.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: En effet, nous qui vivons dans cette tente, nous gémissons, accablés, parce que nous voulons, non pas nous dévêtir, mais revêtir un vêtement par-dessus l’autre. Ainsi ce qui est mortel sera absorbé par la vie.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'C’est Dieu lui-même qui nous a destinés à un tel avenir, et qui nous a accordé son Esprit comme acompte des biens à venir. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Nous sommes donc, en tout temps, pleins de courage, et nous savons que, tant que nous séjournons dans ce corps, nous demeurons loin du Seigneur – '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'car nous vivons guidés par la foi, non par la vue. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Nous sommes pleins de courage, mais nous préférerions quitter ce corps pour aller demeurer auprès du Seigneur.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Aussi, que nous restions dans ce corps ou que nous le quittions, notre ambition est de plaire au Seigneur. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Car nous aurons tous à comparaître devant le tribunal de Christ, et chacun recevra ce qui lui revient selon les actes, bons ou mauvais, qu’il aura accomplis par son corps.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Le service de la réconciliation
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: C’est pourquoi, sachant ce qu’est la crainte du Seigneur, nous cherchons à convaincre les hommes, et Dieu sait parfaitement ce que nous sommes. J’espère d’ailleurs que, dans votre conscience, vous le savez, vous aussi.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Nous ne nous recommandons pas à nouveau auprès de vous. Nous voulons seulement vous donner de bonnes raisons d’être fiers de nous. Ainsi vous saurez répondre à ceux qui trouvent des raisons de se vanter dans les apparences et non dans leur cœur. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Quant à nous, s’il nous est arrivé de dépasser la mesure, c’est pour Dieu. Si nous montrons de la modération, c’est pour vous.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'En effet, l’amour de Christ nous étreint, car nous avons acquis la certitude qu’un seul homme est mort pour tous : donc tous sont morts en lui. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Et il est mort pour tous afin que ceux qui vivent ne vivent plus pour eux-mêmes, mais pour celui qui est mort à leur place et ressuscité pour eux.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Ainsi, désormais, nous ne considérons plus personne d’une manière purement humaine. Certes, autrefois, nous avons considéré Christ de cette manière, mais ce n’est plus ainsi que nous le considérons maintenant.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Ainsi, si quelqu’un est uni à Christ, il appartient à une nouvelle création
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '5.17 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Autre traduction : '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: il est une nouvelle créature.
    marker-yv: yv-n
  - type: text
    text: '  : les choses anciennes sont passées : voici, '
  - type: usfm
    marker: qt
    children:
    - type: text
      text: les choses nouvelles
  - type: text
    text: ' sont venues'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '5.17 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Voir '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Es 48.6
        metadata:
          usfm: ISA.48.6
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Tout cela est l’œuvre de Dieu, qui nous a réconciliés avec lui par Christ et qui nous a confié le ministère de la réconciliation. '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'En effet, Dieu était en Christ, réconciliant les hommes avec lui-même, sans tenir compte de leurs fautes, et il a fait de nous les dépositaires du message de la réconciliation. '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Nous faisons donc fonction d’ambassadeurs au nom de Christ, comme si Dieu adressait par nous cette invitation aux hommes : « Au nom de Christ, nous vous en supplions : soyez réconciliés avec Dieu. '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Celui qui était innocent de tout péché, Dieu l’a condamné comme un pécheur à notre place
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '5.21 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'D’autres comprennent : '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: Dieu l’a fait sacrifice pour le péché pour nous.
    marker-yv: yv-n
  - type: text
    text: ' pour que, dans l’union avec Christ, nous recevions la justice que Dieu accorde'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '5.21 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'D’autres comprennent : '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: afin que, par Christ, la justice de Dieu se réalise en nous.
    marker-yv: yv-n
  - type: text
    text: . »
