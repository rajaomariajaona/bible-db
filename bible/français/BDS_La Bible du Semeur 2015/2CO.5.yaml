document_id: 2CO.5,21
type_code: fra
verses:
  '1':
  - type: text
    content: 'Nous le savons, en effet : si notre demeure, cette tente que nous habitons sur la terre, vient à être détruite, nous avons au ciel une maison que Dieu nous a préparée, une habitation éternelle qui n’est pas l’œuvre de l’homme. '
  '10':
  - type: text
    content: Car nous aurons tous à comparaître devant le tribunal de Christ, et chacun recevra ce qui lui revient selon les actes, bons ou mauvais, qu’il aura accomplis par son corps.
  - type: heading
    content: Le service de la réconciliation
  '11':
  - type: text
    content: C’est pourquoi, sachant ce qu’est la crainte du Seigneur, nous cherchons à convaincre les hommes, et Dieu sait parfaitement ce que nous sommes. J’espère d’ailleurs que, dans votre conscience, vous le savez, vous aussi.
  '12':
  - type: text
    content: 'Nous ne nous recommandons pas à nouveau auprès de vous. Nous voulons seulement vous donner de bonnes raisons d’être fiers de nous. Ainsi vous saurez répondre à ceux qui trouvent des raisons de se vanter dans les apparences et non dans leur cœur. '
  '13':
  - type: text
    content: Quant à nous, s’il nous est arrivé de dépasser la mesure, c’est pour Dieu. Si nous montrons de la modération, c’est pour vous.
  '14':
  - type: text
    content: 'En effet, l’amour de Christ nous étreint, car nous avons acquis la certitude qu’un seul homme est mort pour tous : donc tous sont morts en lui. '
  '15':
  - type: text
    content: Et il est mort pour tous afin que ceux qui vivent ne vivent plus pour eux-mêmes, mais pour celui qui est mort à leur place et ressuscité pour eux.
  '16':
  - type: text
    content: Ainsi, désormais, nous ne considérons plus personne d’une manière purement humaine. Certes, autrefois, nous avons considéré Christ de cette manière, mais ce n’est plus ainsi que nous le considérons maintenant.
  '17':
  - type: text
    content: Ainsi, si quelqu’un est uni à Christ, il appartient à une nouvelle création
  - type: note
    content: 'Autre traduction : il est une nouvelle créature.'
  - type: text
    content: '  : les choses anciennes sont passées : voici, '
  - type: text
    content: les choses nouvelles
  - type: text
    content: ' sont venues'
  - type: note
    content: Voir Es 48.6.
  - type: text
    content: '. '
  '18':
  - type: text
    content: 'Tout cela est l’œuvre de Dieu, qui nous a réconciliés avec lui par Christ et qui nous a confié le ministère de la réconciliation. '
  '19':
  - type: text
    content: 'En effet, Dieu était en Christ, réconciliant les hommes avec lui-même, sans tenir compte de leurs fautes, et il a fait de nous les dépositaires du message de la réconciliation. '
  '2':
  - type: text
    content: Car, dans cette tente, nous gémissons parce que nous attendons, avec un ardent désir, de revêtir, par-dessus l’autre
  - type: note
    content: 'Autre traduction : de revêtir pleinement.'
  - type: text
    content: ', notre domicile qui est de nature céleste'
  - type: note
    content: Dans tout ce passage, Paul passe constamment de l’image d’un habit à celle d’une habitation.
  - type: text
    content: ' '
  '20':
  - type: text
    content: 'Nous faisons donc fonction d’ambassadeurs au nom de Christ, comme si Dieu adressait par nous cette invitation aux hommes : « Au nom de Christ, nous vous en supplions : soyez réconciliés avec Dieu. '
  '21':
  - type: text
    content: Celui qui était innocent de tout péché, Dieu l’a condamné comme un pécheur à notre place
  - type: note
    content: 'D’autres comprennent : Dieu l’a fait sacrifice pour le péché pour nous.'
  - type: text
    content: ' pour que, dans l’union avec Christ, nous recevions la justice que Dieu accorde'
  - type: note
    content: 'D’autres comprennent : afin que, par Christ, la justice de Dieu se réalise en nous.'
  - type: text
    content: . »
  '3':
  - type: text
    content: – si, bien sûr, cela se produit tant que nous sommes encore vêtus de notre corps, et non quand la mort nous en aura dépouillés.
  '4':
  - type: text
    content: En effet, nous qui vivons dans cette tente, nous gémissons, accablés, parce que nous voulons, non pas nous dévêtir, mais revêtir un vêtement par-dessus l’autre. Ainsi ce qui est mortel sera absorbé par la vie.
  '5':
  - type: text
    content: 'C’est Dieu lui-même qui nous a destinés à un tel avenir, et qui nous a accordé son Esprit comme acompte des biens à venir. '
  '6':
  - type: text
    content: 'Nous sommes donc, en tout temps, pleins de courage, et nous savons que, tant que nous séjournons dans ce corps, nous demeurons loin du Seigneur – '
  '7':
  - type: text
    content: 'car nous vivons guidés par la foi, non par la vue. '
  '8':
  - type: text
    content: Nous sommes pleins de courage, mais nous préférerions quitter ce corps pour aller demeurer auprès du Seigneur.
  '9':
  - type: text
    content: 'Aussi, que nous restions dans ce corps ou que nous le quittions, notre ambition est de plaire au Seigneur. '
