document_id: JOB.40
type_code: fra
segments:
- type: usfm
  marker: ms1
  children:
  - type: text
    text: Première réponse de Job à Dieu
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'L’Eternel demanda alors à Job :'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Celui qui intente un procès ╵au Tout-Puissant ╵a-t-il à critiquer ?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Celui qui conteste avec Dieu ╵a-t-il quelque chose à répondre ?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Job répondit alors à l’Eternel :'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Je suis trop peu de chose, ╵que te répliquerais-je ?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Je mets donc la main sur la bouche.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: J’ai parlé une fois, ╵je ne répondrai plus.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et j’ai même insisté ╵une deuxième fois, ╵je n’ajouterai rien.
- type: usfm
  marker: ms1
  children:
  - type: text
    text: Second discours de Dieu
  marker-yv: yv-h
- type: usfm
  marker: s1
  children:
  - type: text
    text: Dieu évoque l’hippopotame et le crocodile
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Alors, du sein de la tempête, ╵l’Eternel dit à Job :'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Mets ta ceinture comme un brave,
- type: usfm
  marker: q1
  children:
  - type: text
    text: je vais te poser des questions ╵et tu m’enseigneras.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Veux-tu vraiment prétendre ╵que je ne suis pas juste ?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Veux-tu me condamner ╵pour te justifier ?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: As-tu un bras ╵tel que celui de Dieu ?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ta voix peut-elle ╵égaler mon tonnerre ?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Va te parer ╵d’honneur et de grandeur
- type: usfm
  marker: q1
  children:
  - type: text
    text: et revêts-toi ╵de splendeur et de gloire
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '40.10 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Voir Ps 96.6 ; 104.1 ; 111.3.
    marker-yv: yv-n
  - type: text
    text: '  !'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Répands les flots ╵de ton indignation
- type: usfm
  marker: q1
  children:
  - type: text
    text: et, d’un regard, ╵courbe tous les hautains !
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Que ton regard ╵les fasse plier tous,
- type: usfm
  marker: q1
  children:
  - type: text
    text: les criminels, ╵écrase-les sur place !
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Dans la poussière, ╵va les enfouir ensemble !
- type: usfm
  marker: q1
  children:
  - type: text
    text: Enferme-les ╵dans la nuit du tombeau !
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Alors, moi-même ╵je te rendrai hommage,
- type: usfm
  marker: q1
  children:
  - type: text
    text: car ta victoire ╵sera due à ta main.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Regarde donc l’hippopotame
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '40.15 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: La plupart des interprètes identifient l’animal dont il est question ici à l’
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'hippopotame '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: du Nil, décrit aux v. 16-24 dans un langage poétique et hyperbolique.
    marker-yv: yv-n
  - type: text
    text: '  : ╵je l’ai fait comme toi.'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Comme le bœuf, ╵il se nourrit de l’herbe.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Vois quelle force ╵réside dans sa croupe !
- type: usfm
  marker: q1
  children:
  - type: text
    text: Quelle vigueur ╵dans ses muscles des flancs !
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Sa queue, il la raidit, ╵solide comme un cèdre.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et les tendons ╵sont tressés dans ses cuisses.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Ses os ressemblent ╵à des barreaux de bronze,
- type: usfm
  marker: q1
  children:
  - type: text
    text: son ossature ╵à des barres de fer.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: C’est le chef-d’œuvre ╵de Dieu, son créateur
- type: usfm
  marker: q1
  children:
  - type: text
    text: qui lui impose ╵le respect par le glaive.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Les monts produisent son fourrage,
- type: usfm
  marker: q1
  children:
  - type: text
    text: là où s’ébattent ╵les animaux sauvages.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Il dort sous les lotus,
- type: usfm
  marker: q1
  children:
  - type: text
    text: sous le couvert ╵des roseaux du marais.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: Il est couvert ╵par l’ombre des lotus,
- type: usfm
  marker: q1
  children:
  - type: text
    text: les peupliers l’entourent ╵près des cours d’eau.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: Si la rivière se déchaîne, ╵il ne s’en émeut pas.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Si le Jourdain ╵se jette dans sa gueule, ╵il reste néanmoins serein.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: Va-t-on le prendre ╵à face découverte
- type: usfm
  marker: q1
  children:
  - type: text
    text: et l’entraver ╵en lui perçant le mufle ?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: Iras-tu prendre ╵avec ton hameçon ╵le crocodile
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '40.25 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Voir note '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '3.8'
        metadata:
          usfm: JOB.3.8
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: '  ?'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Vas-tu lier ╵sa langue avec ta ligne ?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: Lui mettras-tu ╵un jonc dans les naseaux ?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Perceras-tu ╵d’un crochet sa mâchoire ?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: Et t’adressera-t-il ╵de nombreuses supplications ?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Te dira-t-il ╵des gentillesses ?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: Conclura-t-il ╵une alliance avec toi ?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Le prendras-tu ╵pour serviteur à vie ?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: Joueras-tu avec lui ╵comme avec un oiseau ?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Le lieras-tu ╵pour amuser tes filles ?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: Des associés ╵le mettront-ils en vente ?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Le partageront-ils ╵entre des commerçants ?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: Vas-tu cribler ╵de dards sa carapace ?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Vas-tu barder ╵sa tête de harpons ?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: Attaque-le
- type: usfm
  marker: q1
  children:
  - type: text
    text: et tu te souviendras ╵de ce combat, ╵tu n’y reviendras plus !
