document_id: JOB.40,21
type_code: fra
verses:
  '1':
  - type: heading
    content: Première réponse de Job à Dieu
  - type: text
    content: 'L’Eternel demanda alors à Job :'
  '10':
  - type: text
    content: Va te parer ╵d’honneur et de grandeur
  - type: text
    content: et revêts-toi ╵de splendeur et de gloire
  - type: note
    content: Voir Ps 96.6 ; 104.1 ; 111.3.
  - type: text
    content: '  !'
  '11':
  - type: text
    content: Répands les flots ╵de ton indignation
  - type: text
    content: et, d’un regard, ╵courbe tous les hautains !
  '12':
  - type: text
    content: Que ton regard ╵les fasse plier tous,
  - type: text
    content: les criminels, ╵écrase-les sur place !
  '13':
  - type: text
    content: Dans la poussière, ╵va les enfouir ensemble !
  - type: text
    content: Enferme-les ╵dans la nuit du tombeau !
  '14':
  - type: text
    content: Alors, moi-même ╵je te rendrai hommage,
  - type: text
    content: car ta victoire ╵sera due à ta main.
  '15':
  - type: text
    content: Regarde donc l’hippopotame
  - type: note
    content: La plupart des interprètes identifient l’animal dont il est question ici à l’hippopotame du Nil, décrit aux v. 16-24 dans un langage poétique et hyperbolique.
  - type: text
    content: '  : ╵je l’ai fait comme toi.'
  - type: text
    content: Comme le bœuf, ╵il se nourrit de l’herbe.
  '16':
  - type: text
    content: Vois quelle force ╵réside dans sa croupe !
  - type: text
    content: Quelle vigueur ╵dans ses muscles des flancs !
  '17':
  - type: text
    content: Sa queue, il la raidit, ╵solide comme un cèdre.
  - type: text
    content: Et les tendons ╵sont tressés dans ses cuisses.
  '18':
  - type: text
    content: Ses os ressemblent ╵à des barreaux de bronze,
  - type: text
    content: son ossature ╵à des barres de fer.
  '19':
  - type: text
    content: C’est le chef-d’œuvre ╵de Dieu, son créateur
  - type: text
    content: qui lui impose ╵le respect par le glaive.
  '2':
  - type: text
    content: Celui qui intente un procès ╵au Tout-Puissant ╵a-t-il à critiquer ?
  - type: text
    content: Celui qui conteste avec Dieu ╵a-t-il quelque chose à répondre ?
  '20':
  - type: text
    content: Les monts produisent son fourrage,
  - type: text
    content: là où s’ébattent ╵les animaux sauvages.
  '21':
  - type: text
    content: Il dort sous les lotus,
  - type: text
    content: sous le couvert ╵des roseaux du marais.
  '22':
  - type: text
    content: Il est couvert ╵par l’ombre des lotus,
  - type: text
    content: les peupliers l’entourent ╵près des cours d’eau.
  '23':
  - type: text
    content: Si la rivière se déchaîne, ╵il ne s’en émeut pas.
  - type: text
    content: Si le Jourdain ╵se jette dans sa gueule, ╵il reste néanmoins serein.
  '24':
  - type: text
    content: Va-t-on le prendre ╵à face découverte
  - type: text
    content: et l’entraver ╵en lui perçant le mufle ?
  '25':
  - type: text
    content: Iras-tu prendre ╵avec ton hameçon ╵le crocodile
  - type: note
    content: Voir note 3.8.
  - type: text
    content: '  ?'
  - type: text
    content: Vas-tu lier ╵sa langue avec ta ligne ?
  '26':
  - type: text
    content: Lui mettras-tu ╵un jonc dans les naseaux ?
  - type: text
    content: Perceras-tu ╵d’un crochet sa mâchoire ?
  '27':
  - type: text
    content: Et t’adressera-t-il ╵de nombreuses supplications ?
  - type: text
    content: Te dira-t-il ╵des gentillesses ?
  '28':
  - type: text
    content: Conclura-t-il ╵une alliance avec toi ?
  - type: text
    content: Le prendras-tu ╵pour serviteur à vie ?
  '29':
  - type: text
    content: Joueras-tu avec lui ╵comme avec un oiseau ?
  - type: text
    content: Le lieras-tu ╵pour amuser tes filles ?
  '3':
  - type: text
    content: 'Job répondit alors à l’Eternel :'
  '30':
  - type: text
    content: Des associés ╵le mettront-ils en vente ?
  - type: text
    content: Le partageront-ils ╵entre des commerçants ?
  '31':
  - type: text
    content: Vas-tu cribler ╵de dards sa carapace ?
  - type: text
    content: Vas-tu barder ╵sa tête de harpons ?
  '32':
  - type: text
    content: Attaque-le
  - type: text
    content: et tu te souviendras ╵de ce combat, ╵tu n’y reviendras plus !
  '4':
  - type: text
    content: Je suis trop peu de chose, ╵que te répliquerais-je ?
  - type: text
    content: Je mets donc la main sur la bouche.
  '5':
  - type: text
    content: J’ai parlé une fois, ╵je ne répondrai plus.
  - type: text
    content: Et j’ai même insisté ╵une deuxième fois, ╵je n’ajouterai rien.
  - type: heading
    content: Second discours de Dieu
  - type: heading
    content: Dieu évoque l’hippopotame et le crocodile
  '6':
  - type: text
    content: 'Alors, du sein de la tempête, ╵l’Eternel dit à Job :'
  '7':
  - type: text
    content: Mets ta ceinture comme un brave,
  - type: text
    content: je vais te poser des questions ╵et tu m’enseigneras.
  '8':
  - type: text
    content: Veux-tu vraiment prétendre ╵que je ne suis pas juste ?
  - type: text
    content: Veux-tu me condamner ╵pour te justifier ?
  '9':
  - type: text
    content: As-tu un bras ╵tel que celui de Dieu ?
  - type: text
    content: Ta voix peut-elle ╵égaler mon tonnerre ?
