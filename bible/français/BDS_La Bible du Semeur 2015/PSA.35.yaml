document_id: PSA.35
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Le Seigneur protège les faibles
  marker-yv: yv-h
- type: usfm
  marker: d
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: De David.
- type: usfm
  marker: q1
  children:
  - type: text
    text: O Eternel, viens accuser ╵ceux qui m’accusent,
- type: usfm
  marker: q1
  children:
  - type: text
    text: combats toi-même ╵qui me combat.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Saisis le petit bouclier ╵et le grand bouclier,
- type: usfm
  marker: q1
  children:
  - type: text
    text: lève-toi pour me secourir !
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Brandis ta lance ╵avec le javelot ╵contre mes poursuivants !
- type: usfm
  marker: q1
  children:
  - type: text
    text: Dis-moi que tu es mon Sauveur.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Qu’ils soient honteux, déshonorés, ╵ceux qui en veulent à ma vie !
- type: usfm
  marker: q1
  children:
  - type: text
    text: Qu’ils reculent couverts d’opprobre, ╵ceux qui projettent mon malheur !
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Qu’ils soient comme la paille ╵emportée par le vent,
- type: usfm
  marker: q1
  children:
  - type: text
    text: quand les repoussera ╵l’ange de l’Eternel
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '35.5 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Voir note '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '34.8'
        metadata:
          usfm: PSA.34.8
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: '  !'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Que leur chemin soit sombre, ╵qu’il soit glissant
- type: usfm
  marker: q1
  children:
  - type: text
    text: lorsque l’ange de l’Eternel ╵viendra les pourchasser !
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Sans cause, ils ont caché ╵des pièges sur ma route,
- type: usfm
  marker: q1
  children:
  - type: text
    text: sans raison, pour me perdre, ╵ils ont creusé des fosses.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Que le malheur s’abatte ╵sur eux à l’improviste !
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et que dans le filet ╵qu’ils ont caché, ╵ils puissent s’empêtrer !
- type: usfm
  marker: q1
  children:
  - type: text
    text: Qu’ils tombent dans la fosse ╵qu’ils ont creusée ╵et qu’elle fasse ╵leur propre ruine
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '35.8 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'La version syriaque a : '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: qu’ils ont creusée pour moi.
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: J’exulterai de joie ╵en l’Eternel,
- type: usfm
  marker: q1
  children:
  - type: text
    text: je me réjouirai ╵pour le salut ╵qu’il aura accompli pour moi.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Je clamerai de tout mon être : ╵« Eternel, qui est comme toi ?'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Le malheureux, tu le délivres ╵d’un ennemi plus fort que lui,
- type: usfm
  marker: q1
  children:
  - type: text
    text: les pauvres et les démunis, ╵tu les libères ╵de ceux qui les oppriment. »
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Des témoins adonnés à la violence se lèvent,
- type: usfm
  marker: q1
  children:
  - type: text
    text: on vient m’interroger ╵sur des faits que j’ignore.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Ils me rendent le mal ╵pour le bien que j’ai fait.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Je suis abandonné.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Et moi, quand ils étaient malades, ╵je revêtais un vêtement de deuil
- type: usfm
  marker: q1
  children:
  - type: text
    text: et je m’humiliais en jeûnant.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Sans cesse, je priais pour eux
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '35.13 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Autre traduction : '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: quand ma prière n’était pas exaucée.
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: comme pour un ami ╵ou pour un frère. ╵J’allais, courbé sous la tristesse,
- type: usfm
  marker: q1
  children:
  - type: text
    text: comme en menant le deuil ╵pour la mort d’une mère.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Je suis tombé dans le malheur : ╵les voilà qui s’attroupent ╵en triomphant à mon sujet ;'
- type: usfm
  marker: q1
  children:
  - type: text
    text: oui, ils s’attroupent contre moi ╵pour m’attaquer à mon insu
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '35.15 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: à mon insu
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: ': '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'autre traduction : '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: ces gens que je ne connais pas.
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: q1
  children:
  - type: text
    text: Sans répit, ils m’outragent.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Avec une ironie mordante, ╵ces hypocrites
- type: usfm
  marker: q1
  children:
  - type: text
    text: grincent des dents à mon sujet.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Seigneur, comment ╵supportes-tu cela ?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Soustrais ma vie à leurs sévices,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ma vie qui m’est précieuse, ╵à ces lions !
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Je te rendrai hommage ╵dans la grande assemblée.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Je te louerai ╵avec la foule immense.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Sans cause, ils sont mes ennemis : ╵qu’ils ne triomphent pas ╵à mon sujet !'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ils me détestent sans raison. ╵Qu’ils n’osent plus cligner de l’œil ╵pour m’insulter !
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Car ce n’est pas la paix ╵qu’apporte leur parole,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ils forgent des mensonges ╵contre les gens paisibles du pays.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: La bouche grande ouverte,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'ils disent : ╵« Eh, eh ! Nous l’avons vu ! »'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: Eternel, toi, tu as tout vu ! ╵Ne reste pas muet !
- type: usfm
  marker: q1
  children:
  - type: text
    text: Seigneur, ne te tiens pas ╵si éloigné de moi !
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: Interviens donc !
- type: usfm
  marker: q1
  children:
  - type: text
    text: Oui, interviens ╵pour défendre mon droit,
- type: usfm
  marker: q1
  children:
  - type: text
    text: toi, mon Dieu, mon Seigneur, ╵pour prendre en main ma cause !
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: Rends-moi justice, ╵toi qui es juste, ╵ô Eternel mon Dieu !
- type: usfm
  marker: q1
  children:
  - type: text
    text: Empêche-les ╵de triompher à mon sujet !
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Qu’ils ne se disent pas : ╵« Ah, ah, c’est ce que nous voulions ! »'
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Non, qu’ils ne disent pas : ╵« Nous n’avons fait de lui ╵qu’une bouchée ! »'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: Que la honte et le déshonneur ╵atteignent tous ceux qui se réjouissent ╵de mon malheur !
- type: usfm
  marker: q1
  children:
  - type: text
    text: Qu’ils soient couverts de honte ╵et revêtus de confusion,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ceux qui, pour se grandir, ╵se tournent contre moi !
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: Alors ceux qui désirent ╵voir mon droit rétabli
- type: usfm
  marker: q1
  children:
  - type: text
    text: pourront se réjouir, ╵et ils crieront de joie
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'en répétant sans cesse : ╵« Que l’Eternel est grand,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: lui qui désire ╵le bonheur de son serviteur ! »
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: Oui, je proclamerai que tu es juste,
- type: usfm
  marker: q1
  children:
  - type: text
    text: je dirai ta louange tout le jour.
