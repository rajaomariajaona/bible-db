document_id: PSA.35,21
type_code: fra
verses:
  '1':
  - type: heading
    content: Le Seigneur protège les faibles
  - type: text
    content: De David.
  - type: text
    content: O Eternel, viens accuser ╵ceux qui m’accusent,
  - type: text
    content: combats toi-même ╵qui me combat.
  '10':
  - type: text
    content: 'Je clamerai de tout mon être : ╵« Eternel, qui est comme toi ?'
  - type: text
    content: Le malheureux, tu le délivres ╵d’un ennemi plus fort que lui,
  - type: text
    content: les pauvres et les démunis, ╵tu les libères ╵de ceux qui les oppriment. »
  '11':
  - type: text
    content: Des témoins adonnés à la violence se lèvent,
  - type: text
    content: on vient m’interroger ╵sur des faits que j’ignore.
  '12':
  - type: text
    content: Ils me rendent le mal ╵pour le bien que j’ai fait.
  - type: text
    content: Je suis abandonné.
  '13':
  - type: text
    content: Et moi, quand ils étaient malades, ╵je revêtais un vêtement de deuil
  - type: text
    content: et je m’humiliais en jeûnant.
  - type: text
    content: Sans cesse, je priais pour eux
  - type: note
    content: 'Autre traduction : quand ma prière n’était pas exaucée.'
  '14':
  - type: text
    content: comme pour un ami ╵ou pour un frère. ╵J’allais, courbé sous la tristesse,
  - type: text
    content: comme en menant le deuil ╵pour la mort d’une mère.
  '15':
  - type: text
    content: 'Je suis tombé dans le malheur : ╵les voilà qui s’attroupent ╵en triomphant à mon sujet ;'
  - type: text
    content: oui, ils s’attroupent contre moi ╵pour m’attaquer à mon insu
  - type: note
    content: 'à mon insu: autre traduction : ces gens que je ne connais pas.'
  - type: text
    content: .
  - type: text
    content: Sans répit, ils m’outragent.
  '16':
  - type: text
    content: Avec une ironie mordante, ╵ces hypocrites
  - type: text
    content: grincent des dents à mon sujet.
  '17':
  - type: text
    content: Seigneur, comment ╵supportes-tu cela ?
  - type: text
    content: Soustrais ma vie à leurs sévices,
  - type: text
    content: ma vie qui m’est précieuse, ╵à ces lions !
  '18':
  - type: text
    content: Je te rendrai hommage ╵dans la grande assemblée.
  - type: text
    content: Je te louerai ╵avec la foule immense.
  '19':
  - type: text
    content: 'Sans cause, ils sont mes ennemis : ╵qu’ils ne triomphent pas ╵à mon sujet !'
  - type: text
    content: Ils me détestent sans raison. ╵Qu’ils n’osent plus cligner de l’œil ╵pour m’insulter !
  '2':
  - type: text
    content: Saisis le petit bouclier ╵et le grand bouclier,
  - type: text
    content: lève-toi pour me secourir !
  '20':
  - type: text
    content: Car ce n’est pas la paix ╵qu’apporte leur parole,
  - type: text
    content: ils forgent des mensonges ╵contre les gens paisibles du pays.
  '21':
  - type: text
    content: La bouche grande ouverte,
  - type: text
    content: 'ils disent : ╵« Eh, eh ! Nous l’avons vu ! »'
  '22':
  - type: text
    content: Eternel, toi, tu as tout vu ! ╵Ne reste pas muet !
  - type: text
    content: Seigneur, ne te tiens pas ╵si éloigné de moi !
  '23':
  - type: text
    content: Interviens donc !
  - type: text
    content: Oui, interviens ╵pour défendre mon droit,
  - type: text
    content: toi, mon Dieu, mon Seigneur, ╵pour prendre en main ma cause !
  '24':
  - type: text
    content: Rends-moi justice, ╵toi qui es juste, ╵ô Eternel mon Dieu !
  - type: text
    content: Empêche-les ╵de triompher à mon sujet !
  '25':
  - type: text
    content: 'Qu’ils ne se disent pas : ╵« Ah, ah, c’est ce que nous voulions ! »'
  - type: text
    content: 'Non, qu’ils ne disent pas : ╵« Nous n’avons fait de lui ╵qu’une bouchée ! »'
  '26':
  - type: text
    content: Que la honte et le déshonneur ╵atteignent tous ceux qui se réjouissent ╵de mon malheur !
  - type: text
    content: Qu’ils soient couverts de honte ╵et revêtus de confusion,
  - type: text
    content: ceux qui, pour se grandir, ╵se tournent contre moi !
  '27':
  - type: text
    content: Alors ceux qui désirent ╵voir mon droit rétabli
  - type: text
    content: pourront se réjouir, ╵et ils crieront de joie
  - type: text
    content: 'en répétant sans cesse : ╵« Que l’Eternel est grand,'
  - type: text
    content: lui qui désire ╵le bonheur de son serviteur ! »
  '28':
  - type: text
    content: Oui, je proclamerai que tu es juste,
  - type: text
    content: je dirai ta louange tout le jour.
  '3':
  - type: text
    content: Brandis ta lance ╵avec le javelot ╵contre mes poursuivants !
  - type: text
    content: Dis-moi que tu es mon Sauveur.
  '4':
  - type: text
    content: Qu’ils soient honteux, déshonorés, ╵ceux qui en veulent à ma vie !
  - type: text
    content: Qu’ils reculent couverts d’opprobre, ╵ceux qui projettent mon malheur !
  '5':
  - type: text
    content: Qu’ils soient comme la paille ╵emportée par le vent,
  - type: text
    content: quand les repoussera ╵l’ange de l’Eternel
  - type: note
    content: Voir note 34.8.
  - type: text
    content: '  !'
  '6':
  - type: text
    content: Que leur chemin soit sombre, ╵qu’il soit glissant
  - type: text
    content: lorsque l’ange de l’Eternel ╵viendra les pourchasser !
  '7':
  - type: text
    content: Sans cause, ils ont caché ╵des pièges sur ma route,
  - type: text
    content: sans raison, pour me perdre, ╵ils ont creusé des fosses.
  '8':
  - type: text
    content: Que le malheur s’abatte ╵sur eux à l’improviste !
  - type: text
    content: Et que dans le filet ╵qu’ils ont caché, ╵ils puissent s’empêtrer !
  - type: text
    content: Qu’ils tombent dans la fosse ╵qu’ils ont creusée ╵et qu’elle fasse ╵leur propre ruine
  - type: note
    content: 'La version syriaque a : qu’ils ont creusée pour moi.'
  - type: text
    content: .
  '9':
  - type: text
    content: J’exulterai de joie ╵en l’Eternel,
  - type: text
    content: je me réjouirai ╵pour le salut ╵qu’il aura accompli pour moi.
