document_id: JER.19,21
type_code: fra
verses:
  '1':
  - type: heading
    content: Le vase brisé
  - type: text
    content: 'Voici ce que l’Eternel m’a dit : Va acheter chez le potier une jarre en terre cuite. Prends avec toi quelques responsables du peuple et des responsables d’entre les prêtres.'
  '10':
  - type: text
    content: 'Ensuite tu briseras la jarre devant ceux qui t’accompagneront '
  '11':
  - type: text
    content: 'et tu leur diras : Voici ce que déclare le Seigneur des armées célestes : Je briserai ainsi ce peuple et cette ville, tout comme on brise un récipient que le potier a fabriqué et qu’on ne pourra plus réparer. On enterrera les morts au Topheth, faute de place ailleurs'
  - type: note
    content: Voir 7.32.
  - type: text
    content: '. '
  '12':
  - type: text
    content: 'C’est ainsi que je traiterai ce lieu avec ses habitants – l’Eternel le déclare – en rendant cette ville comparable au Topheth. '
  '13':
  - type: text
    content: Les maisons de Jérusalem et celles des rois de Juda seront aussi impures que ce lieu du Topheth. Oui, toutes les maisons où ils ont fait brûler des parfums sur les toits en terrasse
  - type: note
    content: Voir 32.29. Les rois de Juda avaient édifié des autels idolâtres sur les terrasses du palais de Jérusalem (2 R 23.12). Beaucoup d’habitants ont dû les imiter.
  - type: text
    content: ' pour tous les astres et fait des libations à des dieux étrangers.'
  '14':
  - type: text
    content: 'Jérémie revint du Topheth, où l’Eternel l’avait envoyé pour prophétiser, et il se plaça dans le parvis du temple de l’Eternel pour dire à tout le peuple : '
  '15':
  - type: text
    content: 'Voici ce que déclare le Seigneur des armées célestes, le Dieu d’Israël : Je vais faire venir sur cette ville et sur toutes les villes qui en dépendent, tous les malheurs que j’ai annoncés contre elle ; car leurs habitants ont refusé obstinément d’obéir à mes paroles.'
  '2':
  - type: text
    content: Ensuite, tu sortiras dans la vallée de Ben-Hinnom
  - type: note
    content: Voir note 7.31.
  - type: text
    content: ', à l’entrée de la porte des Tessons de poterie. Là, tu proclameras les paroles que je te communiquerai.'
  '3':
  - type: text
    content: 'Tu parleras ainsi : Vous les rois de Juda, et vous les habitants de Jérusalem, écoutez ce que dit l’Eternel. Voici ce que déclare le Seigneur des armées célestes, le Dieu d’Israël : Je vais envoyer sur ce lieu un terrible malheur, à faire tinter les oreilles de ceux qui l’apprendront, '
  '4':
  - type: text
    content: 'parce qu’ils m’ont abandonné, et qu’ils ont profané ce lieu en offrant des parfums à des dieux étrangers qu’ils n’avaient pas connus, ni eux ni leurs ancêtres, ni les rois de Juda. Ils ont rempli ce lieu du sang des innocents '
  '5':
  - type: text
    content: et ils ont érigé des hauts lieux à Baal pour brûler leurs enfants en holocauste pour Baal
  - type: note
    content: Voir 3.24 et note.
  - type: text
    content: . C’est bien là quelque chose que je n’ai pas ordonné, dont je n’ai pas parlé et qui ne m’est même pas venu à la pensée
  - type: note
    content: Pour les v. 5-7, voir 7.31-33.
  - type: text
    content: '. '
  '6':
  - type: text
    content: 'C’est pourquoi le temps vient – l’Eternel le déclare – où cet endroit ne sera plus nommé : « le Topheth » ni « la vallée de Ben-Hinnom », mais on l’appellera : « la vallée du Massacre ».'
  '7':
  - type: text
    content: J’anéantirai
  - type: note
    content: En hébreu, le verbe rendu par j’anéantirai fait assonance avec le terme traduit par jarre (v. 1).
  - type: text
    content: ', ici, les plans de Juda et de Jérusalem, et je les ferai succomber par l’épée de leurs ennemis, et par ceux qui en veulent à leur vie. Je livrerai leurs corps en pâture aux rapaces et aux bêtes sauvages. '
  '8':
  - type: text
    content: 'Je transformerai cette ville en un lieu dévasté, et qui suscitera des sifflements horrifiés : tous ceux qui passeront par là en seront atterrés, ils siffleront d’horreur à la vue de ses plaies. '
  '9':
  - type: text
    content: Je leur ferai manger la chair de leurs enfants ; ils mangeront la chair, chacun de son prochain, dans les affres du siège et au sein de l’angoisse auxquels les réduiront leurs ennemis, ceux qui en veulent à leur vie.
