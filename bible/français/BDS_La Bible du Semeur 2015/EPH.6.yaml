document_id: EPH.6,21
type_code: fra
verses:
  '1':
  - type: heading
    content: Parents et enfants
  - type: text
    content: Vous, enfants, obéissez à vos parents à cause du Seigneur
  - type: note
    content: 'L’expression : à cause du Seigneur est absente de certains manuscrits.'
  - type: text
    content: ', car c’est là ce qui est juste. '
  '10':
  - type: text
    content: 'Pour conclure : puisez votre force dans le Seigneur et dans sa grande puissance.'
  '11':
  - type: text
    content: 'Revêtez-vous de l’armure de Dieu afin de pouvoir tenir ferme contre toutes les ruses du diable. '
  '12':
  - type: text
    content: Car nous n’avons pas à lutter contre des êtres de chair et de sang, mais contre les Puissances, contre les Autorités, contre les Pouvoirs de ce monde des ténèbres, et contre les esprits du mal dans le monde céleste.
  '13':
  - type: text
    content: C’est pourquoi, endossez l’armure que Dieu donne afin de pouvoir résister au mauvais jour et tenir jusqu’au bout après avoir fait tout ce qui était possible
  - type: note
    content: 'Autre traduction : après avoir été victorieux en tout.'
  - type: text
    content: '. '
  '14':
  - type: text
    content: 'Tenez donc ferme : ayez autour de la taille la vérité pour ceinture, et revêtez-vous de la droiture en guise de cuirasse. '
  '15':
  - type: text
    content: 'Ayez pour chaussures à vos pieds la disponibilité à servir l’Evangile de la paix. '
  '16':
  - type: text
    content: En toute circonstance, saisissez-vous de la foi comme d’un bouclier avec lequel vous pourrez éteindre toutes les flèches enflammées du diable
  - type: note
    content: 'Autre traduction : du mal. Dans les guerres antiques, on se servait, surtout lors des sièges, de flèches enduites de poix et de résine que l’on enflammait au moment de les lancer. Les légionnaires romains s’en protégeaient avec leurs grands boucliers.'
  - type: text
    content: '. '
  '17':
  - type: text
    content: Prenez le salut pour casque et l’épée de l’Esprit, c’est-à-dire la Parole de Dieu.
  - type: heading
    content: L’appel à la prière
  '18':
  - type: text
    content: 'En toutes circonstances, faites toutes sortes de prières et de requêtes sous la conduite de l’Esprit. Faites-le avec vigilance et constance, et intercédez pour tous les membres du peuple saint, '
  '19':
  - type: text
    content: 'en particulier pour moi. Demandez à Dieu de me donner, quand je parle, les mots que je dois dire pour annoncer avec assurance le secret que révèle l’Evangile. '
  '2':
  - type: text
    content: 'Honore ton père et ta mère :'
  - type: text
    content: ' c’est le premier commandement auquel une promesse est rattachée : '
  '20':
  - type: text
    content: C’est de cet Evangile que je suis l’ambassadeur, un ambassadeur enchaîné. Priez donc pour que je l’annonce avec assurance comme je dois en parler.
  - type: heading
    content: Salutation finale
  '21':
  - type: text
    content: Pour que vous connaissiez vous aussi ma situation et que vous sachiez ce que je fais, Tychique
  - type: note
    content: Tychique (Ac 20.4 ; Col 4.7) a dû porter la lettre circulaire à Ephèse, puis dans les autres villes de la province d’Asie, et donner oralement des nouvelles de l’apôtre.
  - type: text
    content: ', notre cher frère, qui est un serviteur fidèle dans la communion avec Christ, vous mettra au courant de tout ce qui me concerne.'
  '22':
  - type: text
    content: Je l’envoie exprès chez vous pour qu’il vous donne de mes nouvelles et vous encourage ainsi.
  '23':
  - type: text
    content: 'Que Dieu le Père et le Seigneur Jésus-Christ accordent à tous les frères et sœurs la paix et l’amour, avec la foi. '
  '24':
  - type: text
    content: Que Dieu donne sa grâce à tous ceux qui aiment notre Seigneur Jésus-Christ d’un amour inaltérable.
  '3':
  - type: text
    content: pour que tu sois heureux et que tu jouisses d’une longue vie sur la terre
  - type: note
    content: Ex 20.12 ; Dt 5.16.
  - type: text
    content: .
  '4':
  - type: text
    content: Vous, pères, n’exaspérez pas vos enfants, mais élevez-les en les éduquant et en les conseillant d’une manière conforme à la volonté du Seigneur.
  - type: heading
    content: Maîtres et esclaves
  '5':
  - type: text
    content: Vous, esclaves
  - type: note
    content: La population des villes antiques était composée d’une proportion élevée d’esclaves.
  - type: text
    content: ', obéissez à votre maître terrestre avec toute la crainte qui s’impose, avec droiture de cœur, et cela par égard pour Christ. '
  '6':
  - type: text
    content: 'N’accomplissez pas votre tâche seulement quand on vous surveille, comme s’il s’agissait de plaire à des hommes, mais agissez comme des esclaves de Christ, qui accomplissent la volonté de Dieu de tout leur cœur. '
  '7':
  - type: text
    content: 'Accomplissez votre service de bon gré, comme pour le Seigneur et non pour des hommes. '
  '8':
  - type: text
    content: Car vous savez que chacun, qu’il soit esclave ou libre, recevra du Seigneur ce qui lui revient selon le bien qu’il aura fait.
  '9':
  - type: text
    content: Quant à vous, maîtres, agissez suivant les mêmes principes envers vos esclaves, sans user de menaces. Car vous savez que le Seigneur qui est au ciel est votre Maître tout autant que le leur ; et il n’agit jamais par favoritisme.
  - type: heading
    content: Le combat chrétien
  - type: heading
    content: Revêtir l’armure qui vient de Dieu
