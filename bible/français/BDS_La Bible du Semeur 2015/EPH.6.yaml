document_id: EPH.6,21
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Parents et enfants
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: Vous, enfants, obéissez à vos parents à cause du Seigneur
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '6.1 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'L’expression : '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'à cause du Seigneur '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: est absente de certains manuscrits.
      marker-yv: yv-n
    - type: text
      text: ', car c’est là ce qui est juste. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'Pour conclure : puisez votre force dans le Seigneur et dans sa grande puissance.'
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'Revêtez-vous de l’armure de Dieu afin de pouvoir tenir ferme contre toutes les ruses du diable. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: Car nous n’avons pas à lutter contre des êtres de chair et de sang, mais contre les Puissances, contre les Autorités, contre les Pouvoirs de ce monde des ténèbres, et contre les esprits du mal dans le monde céleste.
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: C’est pourquoi, endossez l’armure que Dieu donne afin de pouvoir résister au mauvais jour et tenir jusqu’au bout après avoir fait tout ce qui était possible
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '6.13 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Autre traduction : '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: après avoir été victorieux en tout.
      marker-yv: yv-n
    - type: text
      text: '. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'Tenez donc ferme : ayez autour de la taille la vérité pour ceinture, et revêtez-vous de la droiture en guise de cuirasse. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'Ayez pour chaussures à vos pieds la disponibilité à servir l’Evangile de la paix. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: En toute circonstance, saisissez-vous de la foi comme d’un bouclier avec lequel vous pourrez éteindre toutes les flèches enflammées du diable
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '6.16 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Autre traduction : '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'du mal. '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Dans les guerres antiques, on se servait, surtout lors des sièges, de flèches enduites de poix et de résine que l’on enflammait au moment de les lancer. Les légionnaires romains s’en protégeaient avec leurs grands boucliers.
      marker-yv: yv-n
    - type: text
      text: '. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: Prenez le salut pour casque et l’épée de l’Esprit, c’est-à-dire la Parole de Dieu.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: L’appel à la prière
    marker-yv: yv-h
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'En toutes circonstances, faites toutes sortes de prières et de requêtes sous la conduite de l’Esprit. Faites-le avec vigilance et constance, et intercédez pour tous les membres du peuple saint, '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'en particulier pour moi. Demandez à Dieu de me donner, quand je parle, les mots que je dois dire pour annoncer avec assurance le secret que révèle l’Evangile. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: usfm
      marker: qt
      children:
      - type: text
        text: 'Honore ton père et ta mère :'
    - type: text
      text: ' c’est le premier commandement auquel une promesse est rattachée : '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: C’est de cet Evangile que je suis l’ambassadeur, un ambassadeur enchaîné. Priez donc pour que je l’annonce avec assurance comme je dois en parler.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Salutation finale
    marker-yv: yv-h
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: Pour que vous connaissiez vous aussi ma situation et que vous sachiez ce que je fais, Tychique
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '6.21 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Tychique '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: (Ac 20.4 ; Col 4.7) a dû porter la lettre circulaire à Ephèse, puis dans les autres villes de la province d’Asie, et donner oralement des nouvelles de l’apôtre.
      marker-yv: yv-n
    - type: text
      text: ', notre cher frère, qui est un serviteur fidèle dans la communion avec Christ, vous mettra au courant de tout ce qui me concerne.'
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: Je l’envoie exprès chez vous pour qu’il vous donne de mes nouvelles et vous encourage ainsi.
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: 'Que Dieu le Père et le Seigneur Jésus-Christ accordent à tous les frères et sœurs la paix et l’amour, avec la foi. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: Que Dieu donne sa grâce à tous ceux qui aiment notre Seigneur Jésus-Christ d’un amour inaltérable.
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: usfm
      marker: qt
      children:
      - type: text
        text: pour que tu sois heureux et que tu jouisses d’une longue vie sur la terre
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '6.3 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Ex 20.12 ; Dt 5.16.
      marker-yv: yv-n
    - type: usfm
      marker: qt
      children:
      - type: text
        text: .
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: Vous, pères, n’exaspérez pas vos enfants, mais élevez-les en les éduquant et en les conseillant d’une manière conforme à la volonté du Seigneur.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Maîtres et esclaves
    marker-yv: yv-h
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: Vous, esclaves
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '6.5 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: La population des villes antiques était composée d’une proportion élevée d’esclaves.
      marker-yv: yv-n
    - type: text
      text: ', obéissez à votre maître terrestre avec toute la crainte qui s’impose, avec droiture de cœur, et cela par égard pour Christ. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'N’accomplissez pas votre tâche seulement quand on vous surveille, comme s’il s’agissait de plaire à des hommes, mais agissez comme des esclaves de Christ, qui accomplissent la volonté de Dieu de tout leur cœur. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'Accomplissez votre service de bon gré, comme pour le Seigneur et non pour des hommes. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: Car vous savez que chacun, qu’il soit esclave ou libre, recevra du Seigneur ce qui lui revient selon le bien qu’il aura fait.
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: Quant à vous, maîtres, agissez suivant les mêmes principes envers vos esclaves, sans user de menaces. Car vous savez que le Seigneur qui est au ciel est votre Maître tout autant que le leur ; et il n’agit jamais par favoritisme.
  - type: usfm
    marker: ms1
    children:
    - type: text
      text: Le combat chrétien
    marker-yv: yv-h
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Revêtir l’armure qui vient de Dieu
    marker-yv: yv-h
