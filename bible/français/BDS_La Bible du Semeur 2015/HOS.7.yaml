document_id: HOS.7,21
type_code: fra
verses:
  '1':
  - type: text
    content: et guérir Israël,
  - type: text
    content: les péchés d’Ephraïm ╵et les actes mauvais ╵commis par Samarie ╵ont été révélés.
  - type: text
    content: Car ils ont pratiqué ╵la tromperie.
  - type: text
    content: Le voleur s’introduit ╵jusque dans les maisons,
  - type: text
    content: et, dans les rues, ╵des bandes de brigands ╵dépouillent les passants.
  '10':
  - type: text
    content: 'Mais l’orgueil d’Israël ╵témoigne contre lui :'
  - type: text
    content: malgré tous ces malheurs, ╵eux, ils ne sont pas revenus ╵à l’Eternel leur Dieu,
  - type: text
    content: et ils ne se sont pas tournés vers lui.
  '11':
  - type: text
    content: 'Ephraïm est semblable ╵à un pigeon naïf ╵qui n’a pas de cervelle :'
  - type: text
    content: il appelle l’Egypte à l’aide,
  - type: text
    content: il va en Assyrie
  - type: note
    content: Menahem s’était tourné vers l’Assyrie (2 R 15.19-20), Péqah vers l’Egypte, le roi Osée tantôt vers l’un, tantôt vers l’autre de ces pays pour solliciter leur aide (2 R 17.4).
  - type: text
    content: .
  '12':
  - type: text
    content: Mais pendant qu’il y va,
  - type: text
    content: je lance mon filet sur lui
  - type: text
    content: et je le fais tomber ╵comme un oiseau.
  - type: text
    content: Je le corrigerai ╵lorsque je l’entendrai ╵se rassembler.
  '13':
  - type: text
    content: Malheur à eux, ╵car ils m’ont fui !
  - type: text
    content: Ruine sur eux ╵car ils se sont rebellés contre moi !
  - type: text
    content: Moi, je les délivrerais bien,
  - type: text
    content: mais eux ils tiennent ╵à mon sujet ╵des propos mensongers.
  '14':
  - type: text
    content: Ils ne crient pas vers moi du fond du cœur,
  - type: text
    content: mais ils gémissent sur leur couche.
  - type: text
    content: Quand ils se font des incisions ╵pour du blé et du vin,
  - type: text
    content: de moi, ils se détournent.
  '15':
  - type: text
    content: Moi, je les instruisais,
  - type: text
    content: je fortifiais leurs bras,
  - type: text
    content: mais ils n’ont, envers moi, ╵que de mauvais desseins.
  '16':
  - type: text
    content: Ils ne reviennent pas vers le Très-Haut
  - type: note
    content: 'Autre traduction : vers en haut. Voir 11.7.'
  - type: text
    content: ','
  - type: text
    content: ils sont tous devenus ╵comme un arc qui serait faussé ;
  - type: text
    content: aussi leurs chefs ╵tomberont par l’épée
  - type: text
    content: à cause de leurs propos insolents.
  - type: text
    content: Et l’on rira d’eux en Egypte.
  '2':
  - type: text
    content: Ils ne se disent pas
  - type: text
    content: que moi je tiens des comptes ╵de tout le mal qu’ils font.
  - type: text
    content: Maintenant, leurs méfaits, ╵de partout, les enserrent,
  - type: text
    content: et je les garde présents à l’esprit.
  - type: heading
    content: Les crimes politiques
  '3':
  - type: text
    content: Par leur méchanceté, ╵ils amusent le roi
  - type: text
    content: et, par leurs tromperies, les princes.
  '4':
  - type: text
    content: Tous, ils sont adultères,
  - type: text
    content: brûlant comme le four ╵du boulanger
  - type: text
    content: qu’il n’a nul besoin d’attiser
  - type: text
    content: depuis qu’il a pétri la pâte
  - type: text
    content: jusqu’à ce qu’elle soit ╵entièrement levée
  - type: note
    content: C’est-à-dire qu’on trame des complots, puis on attend que les choses se précisent pour les mettre à exécution.
  - type: text
    content: .
  '5':
  - type: text
    content: Au jour où on fête leur roi,
  - type: text
    content: les princes se rendent malades,
  - type: text
    content: échauffés par le vin,
  - type: text
    content: et le roi tend la main ╵à ces moqueurs.
  '6':
  - type: text
    content: Ils s’approchent de lui, ╵le cœur embrasé comme un four, ╵brûlant pour leur complot.
  - type: text
    content: Toute la nuit, ╵leur fureur sommeillait.
  - type: text
    content: Mais au matin, elle s’embrase ╵comme une flamme ardente
  - type: note
    content: 'leur fureur sommeillait… flamme ardente. Autre traduction : leur boulanger dormait, et au matin, leur four est embrasé comme un feu plein d’ardeur.'
  - type: text
    content: .
  '7':
  - type: text
    content: Tous, ils sont échauffés, ╵tout comme un four,
  - type: text
    content: ils consument leurs chefs.
  - type: text
    content: Et tous leurs rois sont renversés
  - type: note
    content: Quatre rois furent renversés en une vingtaine d’années, Zacharie et Shalloum en l’espace de sept mois (voir 2 R 15.10, 14, 25, 30).
  - type: text
    content: sans qu’aucun, parmi eux, ╵ne fasse appel à moi.
  '8':
  - type: text
    content: Ephraïm se confond ╵avec les autres peuples,
  - type: text
    content: Ephraïm est pareil ╵à la galette ╵qu’on n’a pas retournée au four.
  '9':
  - type: text
    content: Des étrangers ╵ont épuisé sa force
  - type: note
    content: Les tributs payés à Tiglath-Piléser (15, 19-20, 29) et à l’Egypte ont sapé la vie économique du pays.
  - type: text
    content: sans qu’il s’en aperçoive.
  - type: text
    content: Déjà, les cheveux blancs ╵lui garnissent la tête
  - type: text
    content: sans qu’il s’en aperçoive.
