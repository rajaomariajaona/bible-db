document_id: HOS.7,21
type_code: fra
verses:
  '1':
  - type: usfm
    marker: nb
    children:
    - type: text
      text: et guérir Israël,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: les péchés d’Ephraïm ╵et les actes mauvais ╵commis par Samarie ╵ont été révélés.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Car ils ont pratiqué ╵la tromperie.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Le voleur s’introduit ╵jusque dans les maisons,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et, dans les rues, ╵des bandes de brigands ╵dépouillent les passants.
  '10':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Mais l’orgueil d’Israël ╵témoigne contre lui :'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: malgré tous ces malheurs, ╵eux, ils ne sont pas revenus ╵à l’Eternel leur Dieu,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et ils ne se sont pas tournés vers lui.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Ephraïm est semblable ╵à un pigeon naïf ╵qui n’a pas de cervelle :'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: il appelle l’Egypte à l’aide,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: il va en Assyrie
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '7.11 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Menahem s’était tourné vers l’
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'Assyrie '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: (
        - type: usfm
          marker: ref
          children:
          - type: text
            text: 2 R 15.19-20
        - type: text
          text: ), Péqah vers l’Egypte, le roi Osée tantôt vers l’un, tantôt vers l’autre de ces pays pour solliciter leur aide (
        - type: usfm
          marker: ref
          children:
          - type: text
            text: 2 R 17.4
        - type: text
          text: ).
      marker-yv: yv-n
    - type: text
      text: .
  '12':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mais pendant qu’il y va,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: je lance mon filet sur lui
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et je le fais tomber ╵comme un oiseau.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Je le corrigerai ╵lorsque je l’entendrai ╵se rassembler.
  '13':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Malheur à eux, ╵car ils m’ont fui !
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ruine sur eux ╵car ils se sont rebellés contre moi !
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Moi, je les délivrerais bien,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: mais eux ils tiennent ╵à mon sujet ╵des propos mensongers.
  '14':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ils ne crient pas vers moi du fond du cœur,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: mais ils gémissent sur leur couche.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Quand ils se font des incisions ╵pour du blé et du vin,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: de moi, ils se détournent.
  '15':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Moi, je les instruisais,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: je fortifiais leurs bras,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: mais ils n’ont, envers moi, ╵que de mauvais desseins.
  '16':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ils ne reviennent pas vers le Très-Haut
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '7.16 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Autre traduction : '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'vers en haut. '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Voir '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: '11.7'
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: ','
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ils sont tous devenus ╵comme un arc qui serait faussé ;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: aussi leurs chefs ╵tomberont par l’épée
  - type: usfm
    marker: q1
    children:
    - type: text
      text: à cause de leurs propos insolents.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et l’on rira d’eux en Egypte.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ils ne se disent pas
  - type: usfm
    marker: q1
    children:
    - type: text
      text: que moi je tiens des comptes ╵de tout le mal qu’ils font.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Maintenant, leurs méfaits, ╵de partout, les enserrent,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et je les garde présents à l’esprit.
  - type: usfm
    marker: s2
    children:
    - type: text
      text: Les crimes politiques
    marker-yv: yv-h
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Par leur méchanceté, ╵ils amusent le roi
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et, par leurs tromperies, les princes.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tous, ils sont adultères,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: brûlant comme le four ╵du boulanger
  - type: usfm
    marker: q1
    children:
    - type: text
      text: qu’il n’a nul besoin d’attiser
  - type: usfm
    marker: q1
    children:
    - type: text
      text: depuis qu’il a pétri la pâte
  - type: usfm
    marker: q1
    children:
    - type: text
      text: jusqu’à ce qu’elle soit ╵entièrement levée
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '7.4 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: C’est-à-dire qu’on trame des complots, puis on attend que les choses se précisent pour les mettre à exécution.
      marker-yv: yv-n
    - type: text
      text: .
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Au jour où on fête leur roi,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: les princes se rendent malades,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: échauffés par le vin,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et le roi tend la main ╵à ces moqueurs.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ils s’approchent de lui, ╵le cœur embrasé comme un four, ╵brûlant pour leur complot.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Toute la nuit, ╵leur fureur sommeillait.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mais au matin, elle s’embrase ╵comme une flamme ardente
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '7.6 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'leur fureur sommeillait… flamme ardente. '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Autre traduction : '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: leur boulanger dormait, et au matin, leur four est embrasé comme un feu plein d’ardeur.
      marker-yv: yv-n
    - type: text
      text: .
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tous, ils sont échauffés, ╵tout comme un four,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ils consument leurs chefs.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et tous leurs rois sont renversés
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '7.7 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Quatre rois furent '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'renversés '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'en une vingtaine d’années, Zacharie et Shalloum en l’espace de sept mois (voir '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: 2 R 15.10
        - type: text
          text: ', '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: '14'
        - type: text
          text: ', '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: '25'
        - type: text
          text: ', '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: '30'
        - type: text
          text: ).
      marker-yv: yv-n
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sans qu’aucun, parmi eux, ╵ne fasse appel à moi.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ephraïm se confond ╵avec les autres peuples,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ephraïm est pareil ╵à la galette ╵qu’on n’a pas retournée au four.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Des étrangers ╵ont épuisé sa force
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '7.9 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Les tributs payés à Tiglath-Piléser (15, 19-20, 29) et à l’Egypte ont sapé la vie économique du pays.
      marker-yv: yv-n
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sans qu’il s’en aperçoive.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Déjà, les cheveux blancs ╵lui garnissent la tête
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sans qu’il s’en aperçoive.
