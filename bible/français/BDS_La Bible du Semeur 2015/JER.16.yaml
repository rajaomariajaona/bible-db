document_id: JER.16,21
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s2
    children:
    - type: text
      text: La solitude du prophète
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'L’Eternel m’adressa la parole : '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Or, quand tu communiqueras ce message à ce peuple, ils te demanderont : « Pourquoi donc l’Eternel parle-t-il de nous envoyer ce grand malheur ? Quel mal avons-nous fait ? Quel péché avons-nous commis contre l’Eternel notre Dieu ? » '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Alors, tu leur diras : Vos pères m’ont abandonné, l’Eternel le déclare, ils se sont attachés à d’autres dieux, ils leur ont rendu un culte, et ils se sont prosternés devant eux. Ils m’ont abandonné et n’ont pas appliqué ma Loi. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Et vous, vous avez fait pis encore que vos pères, chacun de vous suit les penchants de son cœur obstiné et mauvais, sans m’écouter. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Je vous jetterai donc hors de ce pays-ci jusqu’en un pays inconnu de vous et de vos pères. Là, jour et nuit, vous adorerez d’autres dieux, car je n’aurai plus pitié de vous.
  - type: usfm
    marker: s2
    children:
    - type: text
      text: Lueur d’espoir
    marker-yv: yv-h
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'C’est pourquoi, des jours viennent – l’Eternel le déclare – où l’on ne dira plus : « L’Eternel est vivant, lui qui a fait sortir d’Egypte les Israélites'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '16.14 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Pour les v. 14-15, voir '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: 23.7-8
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: '  » ; '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'mais l’on dira plutôt : « L’Eternel est vivant, lui qui a fait sortir les Israélites du pays du nord et de tous les pays où il les avait chassés. » Je les ramènerai dans leur pays que j’ai donné à leurs ancêtres.'
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Oui, je vais envoyer des pêcheurs en grand nombre, et ils les pêcheront, déclare l’Eternel, et j’enverrai des chasseurs en grand nombre, et ils les chasseront sur toutes les montagnes, sur toutes les collines et dans les fentes des rochers. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'J’observe toutes leurs démarches, aucune ne m’échappe, et leur crime ne peut se dérober à mon regard. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Je leur paierai d’abord
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '16.18 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: C’est-à-dire avant la délivrance promise au v. 14.
      marker-yv: yv-n
    - type: text
      text: ' au double le salaire que méritent leur iniquité et leurs péchés, car ils ont profané mon pays avec leurs idoles qui n’ont pas plus de vie que des cadavres, et ils ont rempli mon domaine de leurs horreurs abominables.'
  - type: usfm
    marker: s2
    children:
    - type: text
      text: Les peuples non israélites se tournent vers l’Eternel
    marker-yv: yv-h
  '19':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Eternel, toi ma force, ╵mon rempart,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: toi, mon refuge, ╵au temps de la détresse,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: les peuples étrangers ╵viendront à toi
  - type: usfm
    marker: q1
    children:
    - type: text
      text: des confins de la terre
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'en proclamant :'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: « Nos pères n’ont eu en partage ╵que des idoles mensongères,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: des divinités inutiles ╵qui ne servent à rien.
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Tu ne te marieras pas, tu n’auras donc ni fils ni filles en ce lieu, '
  '20':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Un homme pourrait-il ╵se fabriquer des dieux ?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ce ne sont pas des dieux ! »
  '21':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: C’est pourquoi, je vais leur faire connaître,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: oui, cette fois,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: je leur ferai connaître ╵comment j’agis avec puissance,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et ils sauront alors ╵que je suis l’Eternel.
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'car voici ce que déclare l’Eternel au sujet des fils et des filles qui naissent en ce lieu et au sujet des mères qui les mettent au monde, et au sujet des pères qui les engendrent ici, dans ce pays : '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Des maladies mortelles les feront périr. Nul ne mènera deuil sur eux et on ne les mettra pas au tombeau. Leurs corps resteront étendus comme du fumier sur le sol. L’épée ou la famine les consumeront et leurs cadavres seront dévorés par les rapaces et les bêtes sauvages.
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Car voici ce que déclare l’Eternel : Tu ne dois pas entrer dans une maison endeuillée ; ne va pas à des funérailles, n’aie pour ces gens aucun geste de sympathie, car j’ai retiré à ce peuple ma paix, ma bonté et ma compassion, l’Eternel le déclare. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Les grands et les petits mourront dans ce pays ; ils ne seront pas enterrés, nul ne mènera deuil sur eux, on ne se fera pas des incisions pour eux
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '16.6 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Coutume païenne interdite par la Loi (Lv 19.28 ; 21.5 ; Dt 14.1) mais adoptée par les Israélites.
      marker-yv: yv-n
    - type: text
      text: ', nul ne se rasera la tête pour eux. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Personne ne fera de repas funéraire pour ceux qui sont en deuil, pour les réconforter du décès d’un des leurs. Nul ne leur offrira la coupe de consolation au sujet du décès d’un père ou d’une mère.
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Tu n’iras pas non plus dans la maison où l’on festoie pour t’asseoir avec eux, pour manger et pour boire. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Car voici ce que dit le Seigneur des armées célestes, Dieu d’Israël : Je vais faire cesser en ce lieu, sous vos yeux et durant votre temps, les cris de réjouissance et d’allégresse, la voix du marié et de la mariée.'
