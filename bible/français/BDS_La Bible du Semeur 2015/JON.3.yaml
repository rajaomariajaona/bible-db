document_id: JON.3,21
type_code: fra
verses:
  '1':
  - type: heading
    content: La conversion de Ninive
  - type: text
    content: L’Eternel adressa la parole une seconde fois à Jonas en ces termes
  - type: note
    content: Pour les v. 1-3, voir 1.1-3.
  - type: text
    content: '  : '
  '10':
  - type: text
    content: 'Lorsque Dieu constata comment les Ninivites réagissaient et abandonnaient leur mauvaise conduite, il renonça à faire venir sur eux le malheur dont il les avait menacés : il s’en abstint.'
  '2':
  - type: text
    content: Mets-toi en route ! Va à Ninive, la grande ville, et proclame là-bas le message que je te communique.
  '3':
  - type: text
    content: Jonas se mit en route et se rendit à Ninive, comme l’Eternel le lui avait demandé. Or, Ninive était une ville extrêmement grande
  - type: note
    content: Selon 4.11, il y vivait 120 000 habitants. La cité de Ninive elle-même était entourée d’un rempart de 13 kilomètres (voir Na 2.6 et note). Il pourrait s’agir de toute l’agglomération ninivite, composée de Ninive, Rehobot-Ir, Kalah et Résen, villes mentionnées en Gn 10.11-12, qui couvraient une zone dont le périmètre faisait près de 100 kilomètres.
  - type: text
    content: '  : il fallait trois jours de marche pour en faire le tour.'
  '4':
  - type: text
    content: 'Jonas entra dans la ville et commença par y marcher toute une journée en proclamant : Dans quarante jours, une catastrophe viendra sur Ninive'
  - type: note
    content: Voir Gn 19.29.
  - type: text
    content: '  !'
  '5':
  - type: text
    content: Les habitants de Ninive crurent en Dieu, ils publièrent un jeûne et, quelle que fût leur condition sociale, ils revêtirent des habits de toile de sac
  - type: note
    content: Allusion en Mt 12.41 ; Lc 11.30, 32.
  - type: text
    content: '. '
  '6':
  - type: text
    content: 'Le roi de Ninive, informé de la chose, se leva de son trône, enleva son manteau royal, se couvrit d’un habit de toile de sac et s’assit sur de la cendre. '
  '7':
  - type: text
    content: 'Puis il fit proclamer ce décret dans Ninive :'
  - type: text
    content: '« Par ordre du roi et de ses ministres, il est interdit aux hommes comme aux bêtes, petit ou gros bétail, de manger quoi que ce soit, de paître et de boire de l’eau ! '
  '8':
  - type: text
    content: 'Hommes et bêtes doivent se couvrir de toiles de sac et crier à Dieu de toutes leurs forces ! Que chacun abandonne sa mauvaise conduite et les actes de violence qu’il commet. '
  '9':
  - type: text
    content: Qui sait ! Peut-être Dieu se ravisera-t-il et décidera-t-il de changer de ligne de conduite en abandonnant son ardente colère, de sorte que nous ne périrons pas
  - type: note
    content: Voir 1.6.
  - type: text
    content: . »
