document_id: JON.3
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: La conversion de Ninive
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: L’Eternel adressa la parole une seconde fois à Jonas en ces termes
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '3.1 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Pour les v. 1-3, voir '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1.1-3
        metadata:
          usfm: JON.1.1+JON.1.2+JON.1.3
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: '  : '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Mets-toi en route ! Va à Ninive, la grande ville, et proclame là-bas le message que je te communique.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Jonas se mit en route et se rendit à Ninive, comme l’Eternel le lui avait demandé. Or, Ninive était une ville extrêmement grande
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '3.3 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Selon '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '4.11'
        metadata:
          usfm: JON.4.11
      - type: text
        text: ', il y vivait 120 000 habitants. La cité de Ninive elle-même était entourée d’un rempart de 13 kilomètres (voir '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Na 2.6
        metadata:
          usfm: NAM.2.6
      - type: text
        text: ' et note). Il pourrait s’agir de toute l’agglomération ninivite, composée de Ninive, Rehobot-Ir, Kalah et Résen, villes mentionnées en '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Gn 10.11-12
        metadata:
          usfm: GEN.10.11+GEN.10.12
      - type: text
        text: ', qui couvraient une zone dont le périmètre faisait près de 100 kilomètres.'
    marker-yv: yv-n
  - type: text
    text: '  : il fallait trois jours de marche pour en faire le tour.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Jonas entra dans la ville et commença par y marcher toute une journée en proclamant : Dans quarante jours, une catastrophe viendra sur Ninive'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '3.4 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Voir '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Gn 19.29
        metadata:
          usfm: GEN.19.29
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: '  !'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Les habitants de Ninive crurent en Dieu, ils publièrent un jeûne et, quelle que fût leur condition sociale, ils revêtirent des habits de toile de sac
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '3.5 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Allusion en Mt 12.41 ; Lc 11.30, 32.
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Le roi de Ninive, informé de la chose, se leva de son trône, enleva son manteau royal, se couvrit d’un habit de toile de sac et s’assit sur de la cendre. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Puis il fit proclamer ce décret dans Ninive :'
- type: usfm
  marker: pm
  children:
  - type: text
    text: '« Par ordre du roi et de ses ministres, il est interdit aux hommes comme aux bêtes, petit ou gros bétail, de manger quoi que ce soit, de paître et de boire de l’eau ! '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Hommes et bêtes doivent se couvrir de toiles de sac et crier à Dieu de toutes leurs forces ! Que chacun abandonne sa mauvaise conduite et les actes de violence qu’il commet. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Qui sait ! Peut-être Dieu se ravisera-t-il et décidera-t-il de changer de ligne de conduite en abandonnant son ardente colère, de sorte que nous ne périrons pas
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '3.9 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Voir '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '1.6'
        metadata:
          usfm: JON.1.6
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: . »
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Lorsque Dieu constata comment les Ninivites réagissaient et abandonnaient leur mauvaise conduite, il renonça à faire venir sur eux le malheur dont il les avait menacés : il s’en abstint.'
