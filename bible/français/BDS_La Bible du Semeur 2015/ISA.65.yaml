document_id: ISA.65,21
type_code: fra
verses:
  '1':
  - type: heading
    content: La nouvelle création
  - type: heading
    content: Le jugement qui vient
  - type: text
    content: Je me suis laissé consulter
  - type: text
    content: par des personnes ╵qui ne demandaient rien,
  - type: text
    content: et je me suis laissé trouver
  - type: text
    content: par des personnes ╵qui ne me cherchaient pas.
  - type: text
    content: 'J’ai dit : « Je suis là, je suis là ! »'
  - type: text
    content: aux gens d’un peuple ╵qui n’était pas appelé par mon nom
  - type: note
    content: 'Autre traduction : qui n’étaient pas appelés par mon nom. Les v. 1-2 sont cités en Rm 10.20-21 d’après l’ancienne version grecque.'
  - type: text
    content: .
  '10':
  - type: text
    content: La plaine du Saron ╵sera un pâturage ╵pour le menu bétail,
  - type: text
    content: et la vallée d’Akor
  - type: note
    content: La plaine du Saron, en bordure de la mer Méditerranée, était réputée pour sa fertilité. La vallée d’Akor se trouve au nord-ouest de la mer Morte.
  - type: text
    content: ' ╵un gîte pour les bœufs'
  - type: text
    content: au profit de mon peuple ╵qui se sera tourné vers moi.
  '11':
  - type: text
    content: Mais quant à vous ╵qui abandonnez l’Eternel,
  - type: text
    content: et qui négligez ma montagne sainte,
  - type: text
    content: qui dressez une table ╵au dieu de la Fortune
  - type: text
    content: et remplissez la coupe ╵pour le dieu du Destin,
  '12':
  - type: text
    content: je vous destine au glaive,
  - type: text
    content: et vous vous courberez ╵pour passer tous à l’abattoir,
  - type: text
    content: puisque j’ai appelé
  - type: text
    content: et que vous ne m’avez pas répondu,
  - type: text
    content: et puisque j’ai parlé
  - type: text
    content: et que vous ne m’avez pas écouté,
  - type: text
    content: puisque vous avez fait ╵ce que je trouve mal,
  - type: text
    content: et que vous vous êtes complu ╵dans ce qui me déplaît.
  '13':
  - type: text
    content: 'C’est pourquoi, voici ce que dit ╵le Seigneur, l’Eternel :'
  - type: text
    content: Mes serviteurs ╵auront de quoi manger,
  - type: text
    content: et vous, vous aurez faim.
  - type: text
    content: Mes serviteurs boiront,
  - type: text
    content: et vous, vous aurez soif.
  - type: text
    content: Mes serviteurs ╵seront dans l’allégresse,
  - type: text
    content: et vous, vous serez dans la honte !
  '14':
  - type: text
    content: Mes serviteurs crieront de joie
  - type: text
    content: car ils connaîtront le bonheur.
  - type: text
    content: Quant à vous, vous crierez
  - type: text
    content: le cœur plein de douleur,
  - type: text
    content: vous vous lamenterez,
  - type: text
    content: l’esprit tout abattu.
  '15':
  - type: text
    content: Votre nom restera ╵dans les imprécations ╵de mes élus ;
  - type: text
    content: le Seigneur, l’Eternel, ╵fera que vous mouriez,
  - type: text
    content: mais à ses serviteurs ╵il donnera un nom nouveau.
  '16':
  - type: text
    content: Et celui qui voudra ╵être béni sur terre
  - type: text
    content: invoquera sur lui ╵une bénédiction ╵au nom du Dieu de vérité,
  - type: text
    content: et sur la terre, ╵qui prêtera serment ╵jurera par le Dieu de vérité.
  - type: heading
    content: Nouveaux cieux, nouvelle terre
  - type: text
    content: En effet, les maux du passé ╵seront tous oubliés,
  - type: text
    content: ils disparaîtront de ma vue.
  '17':
  - type: text
    content: Je vais créer ╵un ciel nouveau,
  - type: text
    content: une nouvelle terre ;
  - type: text
    content: on ne se rappellera plus ╵les choses d’autrefois,
  - type: text
    content: on n’y pensera plus
  - type: note
    content: Voir Es 66.22 ; 2 P 3.13 ; Ap 21.1.
  - type: text
    content: .
  '18':
  - type: text
    content: Réjouissez-vous plutôt
  - type: text
    content: et soyez à toujours ╵tout remplis d’allégresse
  - type: text
    content: à cause de ce que je crée.
  - type: text
    content: Oui, car je vais créer ╵une Jérusalem ╵remplie de joie
  - type: text
    content: et son peuple plein d’allégresse.
  '19':
  - type: text
    content: J’exulterai moi-même ╵à cause de Jérusalem
  - type: text
    content: et je me réjouirai ╵au sujet de mon peuple.
  - type: text
    content: On n’y entendra plus de pleurs
  - type: text
    content: ni de cris de détresse
  - type: note
    content: Voir Ap 21.4.
  - type: text
    content: .
  '2':
  - type: text
    content: Par contre, j’ai tendu les mains, ╵à longueur de journée, ╵vers un peuple rebelle
  - type: text
    content: qui suivait un chemin ╵qui n’est pas bon,
  - type: text
    content: au gré de ses pensées,
  '20':
  - type: text
    content: Là, plus de nourrisson
  - type: text
    content: emporté en bas âge,
  - type: text
    content: ni de vieillard qui meure ╵avant d’avoir atteint ╵le nombre de ses ans.
  - type: text
    content: Ce sera mourir jeune ╵de mourir centenaire ;
  - type: text
    content: si un pécheur ╵ne dépasse pas les cent ans
  - type: note
    content: 'Autre traduction : Si quelqu’un n’atteint pas l’âge de cent ans.'
  - type: text
    content: ', ╵c’est qu’il aura été maudit.'
  '21':
  - type: text
    content: Ils se construiront des maisons
  - type: text
    content: et les habiteront ;
  - type: text
    content: ils planteront des vignes
  - type: text
    content: et ils en mangeront les fruits ;
  '22':
  - type: text
    content: ils ne bâtiront plus ╵des maisons pour qu’un autre ╵y habite à leur place,
  - type: text
    content: ils ne planteront plus de vignes
  - type: text
    content: pour qu’un autre en mange les fruits.
  - type: text
    content: Car les gens de mon peuple ╵vivront aussi longtemps qu’un arbre.
  - type: text
    content: Mes élus jouiront ╵du fruit de leur travail.
  '23':
  - type: text
    content: Ils ne peineront plus pour rien
  - type: text
    content: et les enfants ╵auxquels ils donneront naissance ╵ne seront plus destinés au malheur.
  - type: text
    content: Ils seront une race ╵bénie par l’Eternel,
  - type: text
    content: et leur postérité ╵le sera avec eux.
  '24':
  - type: text
    content: Alors, avant qu’ils ne m’invoquent,
  - type: text
    content: je les exaucerai ;
  - type: text
    content: ils parleront encore,
  - type: text
    content: que j’aurai déjà entendu.
  '25':
  - type: text
    content: Les loups et les agneaux ╵paîtront ensemble,
  - type: text
    content: le lion mangera du fourrage ╵tout comme le bétail ;
  - type: text
    content: le serpent mordra la poussière.
  - type: text
    content: Il ne se fera plus ╵ni mal, ni destruction,
  - type: text
    content: sur toute ma montagne sainte,
  - type: text
    content: dit l’Eternel
  - type: note
    content: Reprend Es 11.6-9.
  - type: text
    content: '  !'
  '3':
  - type: text
    content: un peuple qui, sans cesse, ╵provoque ma colère ╵ouvertement.
  - type: text
    content: Ses habitants offrent des sacrifices ╵dans les jardins sacrés,
  - type: text
    content: et brûlent des parfums ╵sur des autels de briques.
  '4':
  - type: text
    content: Ils s’asseyent parmi les tombeaux ╵pour consulter les morts
  - type: text
    content: et passent la nuit dans les grottes.
  - type: text
    content: Ils consomment du porc
  - type: text
    content: et remplissent leurs plats ╵de mets impurs.
  '5':
  - type: text
    content: 'Ils crient : « Reste où tu es'
  - type: text
    content: et ne m’approche pas,
  - type: text
    content: car je suis trop sacré pour toi
  - type: note
    content: 'Autre traduction : je te rendrais sacré.'
  - type: text
    content: . »
  - type: text
    content: Ces choses sont pour moi ╵comme de la fumée ╵qui me monte aux narines,
  - type: text
    content: un feu qui brûle tout le jour.
  '6':
  - type: text
    content: Mais tout cela ╵reste écrit devant moi ;
  - type: text
    content: je ne me tairai plus, ╵je le leur ferai payer jusqu’au bout.
  '7':
  - type: text
    content: Je leur ferai payer leurs crimes
  - type: text
    content: dit l’Eternel,
  - type: text
    content: en même temps ╵que ceux de leurs ancêtres,
  - type: text
    content: car ils ont brûlé des parfums ╵sur les montagnes
  - type: text
    content: et ils m’ont outragé ╵sur les collines !
  - type: text
    content: Oui, je leur ferai payer jusqu’au bout
  - type: text
    content: ce que mérite ╵leur conduite passée.
  '8':
  - type: text
    content: 'Voici ce que dit l’Eternel :'
  - type: text
    content: 'De même que l’on dit, ╵quand on trouve une grappe bien juteuse ╵sur une vigne :'
  - type: text
    content: « Ne la détruisez pas
  - type: text
    content: car il y a en elle ╵quelque chose de bon »,
  - type: text
    content: moi, je ferai de même ╵à cause de mes serviteurs.
  - type: text
    content: Pour ne pas tout détruire,
  '9':
  - type: text
    content: je ferai sortir de Jacob ╵une postérité,
  - type: text
    content: oui, de Juda, des gens ╵qui prendront possession ╵de mes montagnes.
  - type: text
    content: Mes élus les posséderont,
  - type: text
    content: mes serviteurs ╵y feront leur demeure.
