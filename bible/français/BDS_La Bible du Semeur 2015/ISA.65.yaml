document_id: ISA.65,21
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: La nouvelle création
    marker-yv: yv-h
  - type: usfm
    marker: s2
    children:
    - type: text
      text: Le jugement qui vient
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: Je me suis laissé consulter
  - type: usfm
    marker: q1
    children:
    - type: text
      text: par des personnes ╵qui ne demandaient rien,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et je me suis laissé trouver
  - type: usfm
    marker: q1
    children:
    - type: text
      text: par des personnes ╵qui ne me cherchaient pas.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'J’ai dit : « Je suis là, je suis là ! »'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: aux gens d’un peuple ╵qui n’était pas appelé par mon nom
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '65.1 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Autre traduction : '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'qui n’étaient pas appelés par mon nom. '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Les v. 1-2 sont cités en '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: Rm 10.20-21
        - type: text
          text: ' d’après l’ancienne version grecque.'
      marker-yv: yv-n
    - type: text
      text: .
  '10':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: La plaine du Saron ╵sera un pâturage ╵pour le menu bétail,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et la vallée d’Akor
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '65.10 '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'La plaine du Saron, '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'en bordure de la mer Méditerranée, était réputée pour sa fertilité. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'La vallée d’Akor '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: se trouve au nord-ouest de la mer Morte.
      marker-yv: yv-n
    - type: text
      text: ' ╵un gîte pour les bœufs'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: au profit de mon peuple ╵qui se sera tourné vers moi.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: Mais quant à vous ╵qui abandonnez l’Eternel,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et qui négligez ma montagne sainte,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: qui dressez une table ╵au dieu de la Fortune
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et remplissez la coupe ╵pour le dieu du Destin,
  '12':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: je vous destine au glaive,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et vous vous courberez ╵pour passer tous à l’abattoir,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: puisque j’ai appelé
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et que vous ne m’avez pas répondu,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et puisque j’ai parlé
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et que vous ne m’avez pas écouté,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: puisque vous avez fait ╵ce que je trouve mal,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et que vous vous êtes complu ╵dans ce qui me déplaît.
  '13':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'C’est pourquoi, voici ce que dit ╵le Seigneur, l’Eternel :'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mes serviteurs ╵auront de quoi manger,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et vous, vous aurez faim.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mes serviteurs boiront,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et vous, vous aurez soif.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mes serviteurs ╵seront dans l’allégresse,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et vous, vous serez dans la honte !
  '14':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: Mes serviteurs crieront de joie
  - type: usfm
    marker: q1
    children:
    - type: text
      text: car ils connaîtront le bonheur.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Quant à vous, vous crierez
  - type: usfm
    marker: q1
    children:
    - type: text
      text: le cœur plein de douleur,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: vous vous lamenterez,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: l’esprit tout abattu.
  '15':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: Votre nom restera ╵dans les imprécations ╵de mes élus ;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: le Seigneur, l’Eternel, ╵fera que vous mouriez,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: mais à ses serviteurs ╵il donnera un nom nouveau.
  '16':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: Et celui qui voudra ╵être béni sur terre
  - type: usfm
    marker: q1
    children:
    - type: text
      text: invoquera sur lui ╵une bénédiction ╵au nom du Dieu de vérité,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et sur la terre, ╵qui prêtera serment ╵jurera par le Dieu de vérité.
  - type: usfm
    marker: s2
    children:
    - type: text
      text: Nouveaux cieux, nouvelle terre
    marker-yv: yv-h
  - type: usfm
    marker: q1
    children:
    - type: text
      text: En effet, les maux du passé ╵seront tous oubliés,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ils disparaîtront de ma vue.
  '17':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: Je vais créer ╵un ciel nouveau,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: une nouvelle terre ;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: on ne se rappellera plus ╵les choses d’autrefois,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: on n’y pensera plus
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '65.17 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Voir Es 66.22 ; 2 P 3.13 ; Ap 21.1.
      marker-yv: yv-n
    - type: text
      text: .
  '18':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: Réjouissez-vous plutôt
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et soyez à toujours ╵tout remplis d’allégresse
  - type: usfm
    marker: q1
    children:
    - type: text
      text: à cause de ce que je crée.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Oui, car je vais créer ╵une Jérusalem ╵remplie de joie
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et son peuple plein d’allégresse.
  '19':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: J’exulterai moi-même ╵à cause de Jérusalem
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et je me réjouirai ╵au sujet de mon peuple.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: On n’y entendra plus de pleurs
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ni de cris de détresse
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '65.19 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Voir '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: Ap 21.4
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: .
  '2':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: Par contre, j’ai tendu les mains, ╵à longueur de journée, ╵vers un peuple rebelle
  - type: usfm
    marker: q1
    children:
    - type: text
      text: qui suivait un chemin ╵qui n’est pas bon,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: au gré de ses pensées,
  '20':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: Là, plus de nourrisson
  - type: usfm
    marker: q1
    children:
    - type: text
      text: emporté en bas âge,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ni de vieillard qui meure ╵avant d’avoir atteint ╵le nombre de ses ans.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ce sera mourir jeune ╵de mourir centenaire ;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: si un pécheur ╵ne dépasse pas les cent ans
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '65.20 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Autre traduction : '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: Si quelqu’un n’atteint pas l’âge de cent ans.
      marker-yv: yv-n
    - type: text
      text: ', ╵c’est qu’il aura été maudit.'
  '21':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: Ils se construiront des maisons
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et les habiteront ;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ils planteront des vignes
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et ils en mangeront les fruits ;
  '22':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: ils ne bâtiront plus ╵des maisons pour qu’un autre ╵y habite à leur place,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ils ne planteront plus de vignes
  - type: usfm
    marker: q1
    children:
    - type: text
      text: pour qu’un autre en mange les fruits.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Car les gens de mon peuple ╵vivront aussi longtemps qu’un arbre.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mes élus jouiront ╵du fruit de leur travail.
  '23':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: Ils ne peineront plus pour rien
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et les enfants ╵auxquels ils donneront naissance ╵ne seront plus destinés au malheur.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ils seront une race ╵bénie par l’Eternel,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et leur postérité ╵le sera avec eux.
  '24':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: Alors, avant qu’ils ne m’invoquent,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: je les exaucerai ;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ils parleront encore,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: que j’aurai déjà entendu.
  '25':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: Les loups et les agneaux ╵paîtront ensemble,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: le lion mangera du fourrage ╵tout comme le bétail ;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: le serpent mordra la poussière.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Il ne se fera plus ╵ni mal, ni destruction,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sur toute ma montagne sainte,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dit l’Eternel
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '65.25 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Reprend '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: Es 11.6-9
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: '  !'
  '3':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: un peuple qui, sans cesse, ╵provoque ma colère ╵ouvertement.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ses habitants offrent des sacrifices ╵dans les jardins sacrés,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et brûlent des parfums ╵sur des autels de briques.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: Ils s’asseyent parmi les tombeaux ╵pour consulter les morts
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et passent la nuit dans les grottes.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ils consomment du porc
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et remplissent leurs plats ╵de mets impurs.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'Ils crient : « Reste où tu es'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et ne m’approche pas,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: car je suis trop sacré pour toi
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '65.5 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Autre traduction : '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: je te rendrais sacré.
      marker-yv: yv-n
    - type: text
      text: . »
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ces choses sont pour moi ╵comme de la fumée ╵qui me monte aux narines,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: un feu qui brûle tout le jour.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: Mais tout cela ╵reste écrit devant moi ;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: je ne me tairai plus, ╵je le leur ferai payer jusqu’au bout.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: Je leur ferai payer leurs crimes
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dit l’Eternel,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: en même temps ╵que ceux de leurs ancêtres,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: car ils ont brûlé des parfums ╵sur les montagnes
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et ils m’ont outragé ╵sur les collines !
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Oui, je leur ferai payer jusqu’au bout
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ce que mérite ╵leur conduite passée.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'Voici ce que dit l’Eternel :'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'De même que l’on dit, ╵quand on trouve une grappe bien juteuse ╵sur une vigne :'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: « Ne la détruisez pas
  - type: usfm
    marker: q1
    children:
    - type: text
      text: car il y a en elle ╵quelque chose de bon »,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: moi, je ferai de même ╵à cause de mes serviteurs.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Pour ne pas tout détruire,
  '9':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: je ferai sortir de Jacob ╵une postérité,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: oui, de Juda, des gens ╵qui prendront possession ╵de mes montagnes.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mes élus les posséderont,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: mes serviteurs ╵y feront leur demeure.
