document_id: GEN.34,21
type_code: fra
verses:
  '1':
  - type: heading
    content: Le conflit pour un viol
  - type: text
    content: 'Dina, la fille que Léa avait donnée à Jacob, sortit pour aller voir les filles du pays. '
  '10':
  - type: text
    content: Vous vous établirez chez nous ; le pays sera à votre disposition ; demeurez-y, vous y ferez vos affaires et vous y acquerrez des propriétés.
  '11':
  - type: text
    content: 'Sichem, de son côté, s’adressa au père et aux frères de la jeune fille : Faites-moi cette faveur ! Je vous donnerai ce que vous me demanderez. '
  '12':
  - type: text
    content: Exigez de moi une forte dot et des présents. Je vous donnerai ce que vous me demanderez ; accordez-moi seulement la jeune fille pour épouse.
  '13':
  - type: text
    content: 'Parce qu’on avait déshonoré leur sœur Dina, les fils de Jacob usèrent de ruse en répondant à Sichem et à Hamor, son père, '
  '14':
  - type: text
    content: 'en ces termes : Il ne nous est pas possible de donner notre sœur à un homme incirconcis ; ce serait un déshonneur pour nous. '
  '15':
  - type: text
    content: 'Nous ne vous donnerons notre consentement qu’à la condition que, comme nous, vous fassiez circoncire tous ceux qui sont de sexe masculin parmi vous. '
  '16':
  - type: text
    content: 'Alors nous vous donnerons nos filles en mariage et nous épouserons les vôtres, nous nous établirons chez vous et nous formerons un seul peuple. '
  '17':
  - type: text
    content: Par contre, si vous n’acceptez pas de vous faire circoncire, nous reprendrons notre fille et nous nous en irons.
  '18':
  - type: text
    content: 'Hamor et son fils Sichem acceptèrent cette proposition, '
  '19':
  - type: text
    content: 'et le jeune homme fit sans délai ce qu’on lui demandait, tant il était épris de la fille de Jacob. Or, il était le plus influent dans la famille de son père. '
  '2':
  - type: text
    content: 'Sichem, fils de Hamor le Hévien qui gouvernait la région, la remarqua : il l’enleva et coucha avec elle en lui faisant violence. '
  '20':
  - type: text
    content: Il se rendit donc avec lui à la porte
  - type: note
    content: Où se réunissent les notables de la ville et les juges.
  - type: text
    content: ' de leur ville et ils parlèrent ainsi à leurs concitoyens : '
  '21':
  - type: text
    content: 'Ces gens-là sont bien disposés envers nous ; qu’ils s’établissent dans le pays et qu’ils y fassent des affaires ; voici le pays est assez vaste pour eux dans toute son étendue. Nous épouserons leurs filles et nous leur donnerons les nôtres. '
  '22':
  - type: text
    content: 'Seulement, ces hommes ne consentiront à habiter avec nous pour que nous formions ensemble un seul peuple que si tous les hommes parmi nous sont circoncis comme chez eux. '
  '23':
  - type: text
    content: Ainsi, leurs troupeaux et leurs biens et toutes leurs bêtes de somme nous appartiendront. Consentons donc à ce qu’ils demandent et ils s’établiront chez nous.
  '24':
  - type: text
    content: 'Alors tous ceux qui se trouvaient à la porte de la ville se laissèrent convaincre par Hamor et son fils Sichem, et tous les hommes et les garçons qui se trouvaient dans la ville furent circoncis. '
  '25':
  - type: text
    content: Le troisième jour, alors qu’ils étaient souffrants, deux des fils de Jacob, Siméon et Lévi, les frères de Dina
  - type: note
    content: 'Ces deux fils de Jacob étaient de la même mère que Dina (Léa : 29.33-34).'
  - type: text
    content: ', prirent chacun son épée, et tombèrent sur la ville qui se croyait en sécurité. Ils tuèrent tous les hommes et les garçons. '
  '26':
  - type: text
    content: 'Ils tuèrent aussi Hamor et son fils Sichem, reprirent Dina de la maison de Sichem et partirent. '
  '27':
  - type: text
    content: 'Les autres fils de Jacob vinrent achever les blessés et pillèrent la ville, parce qu’on avait déshonoré leur sœur. '
  '28':
  - type: text
    content: 'Ils prirent le gros et le petit bétail ainsi que les ânes et tout ce qui était dans la ville et dans les champs. '
  '29':
  - type: text
    content: Ils s’emparèrent de tous leurs biens, de leurs enfants et de leurs femmes et raflèrent tout ce qui était dans les maisons.
  '3':
  - type: text
    content: 'Il s’attacha à Dina, la fille de Jacob, en tomba amoureux et toucha le cœur de la jeune fille par ses paroles. '
  '30':
  - type: text
    content: 'Jacob dit à Siméon et à Lévi : Vous me causez des ennuis car vous m’avez rendu odieux aux Cananéens et aux Phéréziens qui habitent le pays. Je ne dispose que d’un petit nombre d’hommes ; s’ils se liguent contre moi, ils me battront et extermineront toute ma famille avec moi'
  - type: note
    content: Voir 49.5-7.
  - type: text
    content: '. '
  '31':
  - type: text
    content: 'Ils lui répliquèrent : Pouvions-nous laisser traiter notre sœur comme une prostituée ?'
  '4':
  - type: text
    content: 'Il dit à son père Hamor : Obtiens-moi cette jeune fille pour femme.'
  '5':
  - type: text
    content: 'Or Jacob avait appris que sa fille Dina avait été déshonorée. Mais comme ses fils étaient aux champs avec son bétail, il n’avait rien dit jusqu’à leur retour. '
  '6':
  - type: text
    content: 'Hamor, le père de Sichem, se rendit chez Jacob pour lui parler. '
  '7':
  - type: text
    content: 'Les fils de Jacob, à cette nouvelle, étaient revenus des champs. Ces hommes, outrés, étaient dans une grande colère parce que Sichem s’était rendu coupable d’une action infâme contre Israël en couchant avec la fille de Jacob, une chose inadmissible. '
  '8':
  - type: text
    content: 'Hamor leur parla ainsi : Sichem, mon fils, s’est épris de votre fille ; s’il vous plaît, donnez-la lui pour femme '
  '9':
  - type: text
    content: 'et alliez-vous par mariage avec nous. Vous nous donnerez vos filles et vous prendrez les nôtres. '
