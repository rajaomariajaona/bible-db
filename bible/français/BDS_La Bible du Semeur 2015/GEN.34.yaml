document_id: GEN.34
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Le conflit pour un viol
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Dina, la fille que Léa avait donnée à Jacob, sortit pour aller voir les filles du pays. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Sichem, fils de Hamor le Hévien qui gouvernait la région, la remarqua : il l’enleva et coucha avec elle en lui faisant violence. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Il s’attacha à Dina, la fille de Jacob, en tomba amoureux et toucha le cœur de la jeune fille par ses paroles. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Il dit à son père Hamor : Obtiens-moi cette jeune fille pour femme.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Or Jacob avait appris que sa fille Dina avait été déshonorée. Mais comme ses fils étaient aux champs avec son bétail, il n’avait rien dit jusqu’à leur retour. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Hamor, le père de Sichem, se rendit chez Jacob pour lui parler. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Les fils de Jacob, à cette nouvelle, étaient revenus des champs. Ces hommes, outrés, étaient dans une grande colère parce que Sichem s’était rendu coupable d’une action infâme contre Israël en couchant avec la fille de Jacob, une chose inadmissible. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Hamor leur parla ainsi : Sichem, mon fils, s’est épris de votre fille ; s’il vous plaît, donnez-la lui pour femme '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'et alliez-vous par mariage avec nous. Vous nous donnerez vos filles et vous prendrez les nôtres. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Vous vous établirez chez nous ; le pays sera à votre disposition ; demeurez-y, vous y ferez vos affaires et vous y acquerrez des propriétés.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Sichem, de son côté, s’adressa au père et aux frères de la jeune fille : Faites-moi cette faveur ! Je vous donnerai ce que vous me demanderez. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Exigez de moi une forte dot et des présents. Je vous donnerai ce que vous me demanderez ; accordez-moi seulement la jeune fille pour épouse.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Parce qu’on avait déshonoré leur sœur Dina, les fils de Jacob usèrent de ruse en répondant à Sichem et à Hamor, son père, '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'en ces termes : Il ne nous est pas possible de donner notre sœur à un homme incirconcis ; ce serait un déshonneur pour nous. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Nous ne vous donnerons notre consentement qu’à la condition que, comme nous, vous fassiez circoncire tous ceux qui sont de sexe masculin parmi vous. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Alors nous vous donnerons nos filles en mariage et nous épouserons les vôtres, nous nous établirons chez vous et nous formerons un seul peuple. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Par contre, si vous n’acceptez pas de vous faire circoncire, nous reprendrons notre fille et nous nous en irons.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Hamor et son fils Sichem acceptèrent cette proposition, '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'et le jeune homme fit sans délai ce qu’on lui demandait, tant il était épris de la fille de Jacob. Or, il était le plus influent dans la famille de son père. '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Il se rendit donc avec lui à la porte
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '34.20 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Où se réunissent les notables de la ville et les juges.
    marker-yv: yv-n
  - type: text
    text: ' de leur ville et ils parlèrent ainsi à leurs concitoyens : '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Ces gens-là sont bien disposés envers nous ; qu’ils s’établissent dans le pays et qu’ils y fassent des affaires ; voici le pays est assez vaste pour eux dans toute son étendue. Nous épouserons leurs filles et nous leur donnerons les nôtres. '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Seulement, ces hommes ne consentiront à habiter avec nous pour que nous formions ensemble un seul peuple que si tous les hommes parmi nous sont circoncis comme chez eux. '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: Ainsi, leurs troupeaux et leurs biens et toutes leurs bêtes de somme nous appartiendront. Consentons donc à ce qu’ils demandent et ils s’établiront chez nous.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Alors tous ceux qui se trouvaient à la porte de la ville se laissèrent convaincre par Hamor et son fils Sichem, et tous les hommes et les garçons qui se trouvaient dans la ville furent circoncis. '
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: Le troisième jour, alors qu’ils étaient souffrants, deux des fils de Jacob, Siméon et Lévi, les frères de Dina
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '34.25 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Ces deux fils de Jacob étaient de la même mère que Dina (Léa : '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 29.33-34
        metadata:
          usfm: GEN.29.33+GEN.29.34
      - type: text
        text: ).
    marker-yv: yv-n
  - type: text
    text: ', prirent chacun son épée, et tombèrent sur la ville qui se croyait en sécurité. Ils tuèrent tous les hommes et les garçons. '
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Ils tuèrent aussi Hamor et son fils Sichem, reprirent Dina de la maison de Sichem et partirent. '
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'Les autres fils de Jacob vinrent achever les blessés et pillèrent la ville, parce qu’on avait déshonoré leur sœur. '
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'Ils prirent le gros et le petit bétail ainsi que les ânes et tout ce qui était dans la ville et dans les champs. '
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: Ils s’emparèrent de tous leurs biens, de leurs enfants et de leurs femmes et raflèrent tout ce qui était dans les maisons.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'Jacob dit à Siméon et à Lévi : Vous me causez des ennuis car vous m’avez rendu odieux aux Cananéens et aux Phéréziens qui habitent le pays. Je ne dispose que d’un petit nombre d’hommes ; s’ils se liguent contre moi, ils me battront et extermineront toute ma famille avec moi'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '34.30 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Voir '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 49.5-7
        metadata:
          usfm: GEN.49.5+GEN.49.6+GEN.49.7
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'Ils lui répliquèrent : Pouvions-nous laisser traiter notre sœur comme une prostituée ?'
