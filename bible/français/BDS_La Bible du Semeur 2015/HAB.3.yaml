document_id: HAB.3,21
type_code: fra
verses:
  '1':
  - type: heading
    content: Psaume
  - type: heading
    content: Dieu interviendra
  - type: text
    content: Prière d’Habaquq le prophète, sur le mode des complaintes
  - type: note
    content: Terme hébreu de sens inconnu.
  - type: text
    content: .
  '10':
  - type: text
    content: Les montagnes t’ont vu, ╵et elles tremblent.
  - type: text
    content: Des trombes d’eau s’abattent,
  - type: text
    content: l’abîme se met à mugir,
  - type: text
    content: lançant bien haut ses vagues.
  '11':
  - type: text
    content: Le soleil et la lune ╵restent dans leur demeure
  - type: text
    content: devant l’éclat ╵de tes flèches qui partent
  - type: text
    content: et la clarté ╵des éclairs de ta lance.
  '12':
  - type: text
    content: Avec colère, tu parcours la terre,
  - type: text
    content: tu foules les peuples aux pieds ╵dans ton indignation.
  '13':
  - type: text
    content: Oui, tu t’es mis en route ╵pour délivrer ton peuple,
  - type: text
    content: et pour sauver ton roi ╵qui a reçu l’onction.
  - type: text
    content: Tu as décapité ╵la maison du méchant,
  - type: text
    content: et tu l’as démolie ╵de fond en comble.
  - type: text
    content: Pause
  '14':
  - type: text
    content: Tu transperces la tête ╵de l’ennemi ╵avec ses propres flèches,
  - type: text
    content: alors qu’il arrivait ╵comme un vent d’ouragan ╵dans le but de nous disperser.
  - type: text
    content: Déjà nos ennemis ╵se réjouissaient,
  - type: text
    content: comptant bien dévorer ╵l’opprimé en secret
  - type: note
    content: 'Sens incertain. Autre traduction : dans sa cachette.'
  - type: text
    content: .
  '15':
  - type: text
    content: Tu as lancé ╵tes chevaux dans la mer,
  - type: text
    content: dans le bouillonnement ╵des eaux puissantes.
  - type: heading
    content: L’Eternel est ma force
  '16':
  - type: text
    content: 'J’ai entendu cette nouvelle :'
  - type: text
    content: j’en suis tout bouleversé.
  - type: text
    content: Mes lèvres balbutient
  - type: text
    content: et mes os se dissolvent,
  - type: text
    content: je reste là, tremblant.
  - type: text
    content: Puisqu’il me faut attendre sans bouger, ╵le jour où la détresse
  - type: text
    content: fondra sur l’ennemi ╵qui doit nous assaillir.
  '17':
  - type: text
    content: Car le figuier ╵ne bourgeonnera plus,
  - type: text
    content: et il n’y aura plus ╵de raisins dans les vignes,
  - type: text
    content: le fruit de l’olivier ╵trompera les espoirs,
  - type: text
    content: les champs ne produiront ╵plus de pain à manger.
  - type: text
    content: Les moutons et les chèvres ╵disparaîtront de leurs enclos,
  - type: text
    content: et les bovins de leurs étables.
  '18':
  - type: text
    content: Mais moi, c’est à cause de l’Eternel ╵que je veux me réjouir,
  - type: text
    content: j’exulterai de joie ╵à cause du Dieu qui me sauve.
  '19':
  - type: text
    content: 'L’Eternel, le Seigneur, ╵c’est lui ma force :'
  - type: text
    content: il rend mes pieds pareils ╵à ceux des biches,
  - type: text
    content: il me fait cheminer ╵sur les lieux élevés.
  - type: text
    content: Pour le chef des musiciens. A chanter avec accompagnement d’instruments à cordes.
  '2':
  - type: text
    content: O Eternel, j’ai entendu ╵ce que tu viens de proclamer,
  - type: text
    content: et je suis effrayé ╵devant ton œuvre, ô Eternel.
  - type: text
    content: Dans le cours des années, ╵accomplis-la
  - type: note
    content: Voir 2.3.
  - type: text
    content: '  !'
  - type: text
    content: Dans le cours des années, ╵fais-la connaître !
  - type: text
    content: Dans ta colère cependant, ╵pense à être clément !
  '3':
  - type: text
    content: Dieu viendra de Témân,
  - type: text
    content: le Saint viendra du mont Parân.
  - type: text
    content: Pause
  - type: text
    content: Sa majesté ╵couvre le ciel,
  - type: text
    content: et sa louange ╵remplit la terre.
  '4':
  - type: text
    content: Il a l’éclat de la lumière,
  - type: text
    content: et, de sa main, ╵jaillissent deux rayons ;
  - type: text
    content: c’est là qu’est le réservoir de sa force.
  '5':
  - type: text
    content: La peste meurtrière ╵chemine devant lui,
  - type: text
    content: et la fièvre brûlante ╵marche à sa suite.
  '6':
  - type: text
    content: S’il vient à s’arrêter, ╵il fait vibrer
  - type: note
    content: 'Autre traduction : il mesure.'
  - type: text
    content: ' la terre.'
  - type: text
    content: Quand il regarde, ╵il ébranle les peuples,
  - type: text
    content: les montagnes antiques ╵sont disloquées,
  - type: text
    content: et les collines ╵des anciens temps s’effondrent.
  - type: text
    content: Il parcourt à nouveau ╵les antiques sentiers.
  '7':
  - type: text
    content: J’ai vu les tentes de Koushân
  - type: note
    content: Probablement une peuplade nomade du désert du Sinaï.
  - type: text
    content: ' ╵réduites à néant ;'
  - type: text
    content: les abris de Madian ╵tremblaient, épouvantés.
  - type: heading
    content: L’Eternel sort pour délivrer son peuple
  '8':
  - type: text
    content: Est-ce contre les fleuves ╵que l’Eternel s’irrite,
  - type: text
    content: est-ce contre les fleuves ╵que ton courroux s’enflamme ?
  - type: text
    content: Est-ce contre la mer ╵que ta fureur s’exerce,
  - type: text
    content: pour que tu viennes ainsi ╵monté sur tes chevaux,
  - type: text
    content: sur tes chars victorieux ?
  '9':
  - type: text
    content: Ton arc est mis à nu,
  - type: text
    content: tes traits sont les serments ╵que tu as prononcés
  - type: note
    content: 'Autre traduction : tes traits sont ceux que tu as juré d’utiliser.'
  - type: text
    content: .
  - type: text
    content: Pause
  - type: text
    content: Tu crevasses la terre, ╵livrant passage aux fleuves.
