document_id: HAB.3
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Psaume
  marker-yv: yv-h
- type: usfm
  marker: s2
  children:
  - type: text
    text: Dieu interviendra
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Prière d’Habaquq le prophète, sur le mode des complaintes
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '3.1 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Terme hébreu de sens inconnu.
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: O Eternel, j’ai entendu ╵ce que tu viens de proclamer,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et je suis effrayé ╵devant ton œuvre, ô Eternel.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Dans le cours des années, ╵accomplis-la
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '3.2 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Voir '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '2.3'
        metadata:
          usfm: HAB.2.3
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: '  !'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Dans le cours des années, ╵fais-la connaître !
- type: usfm
  marker: q1
  children:
  - type: text
    text: Dans ta colère cependant, ╵pense à être clément !
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Dieu viendra de Témân,
- type: usfm
  marker: q1
  children:
  - type: text
    text: le Saint viendra du mont Parân.
- type: usfm
  marker: q4
  children:
  - type: text
    text: Pause
- type: usfm
  marker: q1
  children:
  - type: text
    text: Sa majesté ╵couvre le ciel,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et sa louange ╵remplit la terre.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Il a l’éclat de la lumière,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et, de sa main, ╵jaillissent deux rayons ;
- type: usfm
  marker: q1
  children:
  - type: text
    text: c’est là qu’est le réservoir de sa force.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: La peste meurtrière ╵chemine devant lui,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et la fièvre brûlante ╵marche à sa suite.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: S’il vient à s’arrêter, ╵il fait vibrer
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '3.6 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Autre traduction : '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: il mesure.
    marker-yv: yv-n
  - type: text
    text: ' la terre.'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Quand il regarde, ╵il ébranle les peuples,
- type: usfm
  marker: q1
  children:
  - type: text
    text: les montagnes antiques ╵sont disloquées,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et les collines ╵des anciens temps s’effondrent.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Il parcourt à nouveau ╵les antiques sentiers.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: J’ai vu les tentes de Koushân
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '3.7 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Probablement une peuplade nomade du désert du Sinaï.
    marker-yv: yv-n
  - type: text
    text: ' ╵réduites à néant ;'
- type: usfm
  marker: q1
  children:
  - type: text
    text: les abris de Madian ╵tremblaient, épouvantés.
- type: usfm
  marker: s2
  children:
  - type: text
    text: L’Eternel sort pour délivrer son peuple
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Est-ce contre les fleuves ╵que l’Eternel s’irrite,
- type: usfm
  marker: q1
  children:
  - type: text
    text: est-ce contre les fleuves ╵que ton courroux s’enflamme ?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Est-ce contre la mer ╵que ta fureur s’exerce,
- type: usfm
  marker: q1
  children:
  - type: text
    text: pour que tu viennes ainsi ╵monté sur tes chevaux,
- type: usfm
  marker: q1
  children:
  - type: text
    text: sur tes chars victorieux ?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Ton arc est mis à nu,
- type: usfm
  marker: q1
  children:
  - type: text
    text: tes traits sont les serments ╵que tu as prononcés
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '3.9 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Autre traduction : '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: tes traits sont ceux que tu as juré d’utiliser.
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: q4
  children:
  - type: text
    text: Pause
- type: usfm
  marker: q1
  children:
  - type: text
    text: Tu crevasses la terre, ╵livrant passage aux fleuves.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Les montagnes t’ont vu, ╵et elles tremblent.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Des trombes d’eau s’abattent,
- type: usfm
  marker: q1
  children:
  - type: text
    text: l’abîme se met à mugir,
- type: usfm
  marker: q1
  children:
  - type: text
    text: lançant bien haut ses vagues.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Le soleil et la lune ╵restent dans leur demeure
- type: usfm
  marker: q1
  children:
  - type: text
    text: devant l’éclat ╵de tes flèches qui partent
- type: usfm
  marker: q1
  children:
  - type: text
    text: et la clarté ╵des éclairs de ta lance.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Avec colère, tu parcours la terre,
- type: usfm
  marker: q1
  children:
  - type: text
    text: tu foules les peuples aux pieds ╵dans ton indignation.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Oui, tu t’es mis en route ╵pour délivrer ton peuple,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et pour sauver ton roi ╵qui a reçu l’onction.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Tu as décapité ╵la maison du méchant,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et tu l’as démolie ╵de fond en comble.
- type: usfm
  marker: q4
  children:
  - type: text
    text: Pause
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Tu transperces la tête ╵de l’ennemi ╵avec ses propres flèches,
- type: usfm
  marker: q1
  children:
  - type: text
    text: alors qu’il arrivait ╵comme un vent d’ouragan ╵dans le but de nous disperser.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Déjà nos ennemis ╵se réjouissaient,
- type: usfm
  marker: q1
  children:
  - type: text
    text: comptant bien dévorer ╵l’opprimé en secret
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '3.14 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Sens incertain. Autre traduction : '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: dans sa cachette.
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Tu as lancé ╵tes chevaux dans la mer,
- type: usfm
  marker: q1
  children:
  - type: text
    text: dans le bouillonnement ╵des eaux puissantes.
- type: usfm
  marker: s2
  children:
  - type: text
    text: L’Eternel est ma force
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'J’ai entendu cette nouvelle :'
- type: usfm
  marker: q1
  children:
  - type: text
    text: j’en suis tout bouleversé.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Mes lèvres balbutient
- type: usfm
  marker: q1
  children:
  - type: text
    text: et mes os se dissolvent,
- type: usfm
  marker: q1
  children:
  - type: text
    text: je reste là, tremblant.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Puisqu’il me faut attendre sans bouger, ╵le jour où la détresse
- type: usfm
  marker: q1
  children:
  - type: text
    text: fondra sur l’ennemi ╵qui doit nous assaillir.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Car le figuier ╵ne bourgeonnera plus,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et il n’y aura plus ╵de raisins dans les vignes,
- type: usfm
  marker: q1
  children:
  - type: text
    text: le fruit de l’olivier ╵trompera les espoirs,
- type: usfm
  marker: q1
  children:
  - type: text
    text: les champs ne produiront ╵plus de pain à manger.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Les moutons et les chèvres ╵disparaîtront de leurs enclos,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et les bovins de leurs étables.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Mais moi, c’est à cause de l’Eternel ╵que je veux me réjouir,
- type: usfm
  marker: q1
  children:
  - type: text
    text: j’exulterai de joie ╵à cause du Dieu qui me sauve.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'L’Eternel, le Seigneur, ╵c’est lui ma force :'
- type: usfm
  marker: q1
  children:
  - type: text
    text: il rend mes pieds pareils ╵à ceux des biches,
- type: usfm
  marker: q1
  children:
  - type: text
    text: il me fait cheminer ╵sur les lieux élevés.
- type: usfm
  marker: p
  children:
  - type: text
    text: Pour le chef des musiciens. A chanter avec accompagnement d’instruments à cordes.
