type_code: fra
verses:
  '1':
  - type: text
    content: Introduction
  - type: text
    content: 'Ce livre doit son nom au successeur de Moïse, Josué. Formé aux côtés de Moïse pendant le temps de l’Exode (Ex 24.13-14 ; 33.11), remarqué avec Caleb pour son courage (Nb 14.26-34), il joue un rôle prépondérant lors de la conquête de Canaan par les Israélites : stratège militaire, chef désigné par Dieu et reconnu par le peuple, il saura encourager les douze tribus à la fidélité à l’Eternel. Les événements que relate le livre débutent, selon les spécialistes, soit vers 1400 soit vers 1250 avant Jésus-Christ. Ils couvrent une période d’une trentaine d’années environ (14.10).'
  - type: text
    content: 'Quarante ans après la sortie d’Egypte, le peuple d’Israël va enfin conquérir le pays promis (chap. 1 à 12). La conquête s’organise autour de trois « campagnes » : la première dans le centre de Canaan (chap. 1 à 9), la deuxième vers le sud (chap. 10) et la troisième vers le nord (11.1-15). Ces campagnes sont marquées par des victoires militaires, mais elles n’aboutissent pas toujours à l’occupation définitive des sites conquis. Par ailleurs, certains rois sont défaits sans que leur cité-Etat soit prise. Tel est le cas, par exemple, d’Adoni-Tsédeq, roi de Jérusalem, dont la cité restera aux mains des Yebousiens jusqu’à sa prise par le roi David (10.1ss ; 15.63).'
  - type: text
    content: 'Semblable à bien des égards à toute autre invasion étrangère, la conquête de Canaan s’en distingue pourtant profondément. Avant d’être une conquête israélite, elle constitue un jugement divin sur les populations locales, jugement annoncé quatre cents ans auparavant par l’Eternel à Abraham (Gn 15.16 ; voir Dt 18.9-12). Lorsque la conquête intervient, c’est le Suzerain de l’alliance qui « dirige les opérations » : le peuple traverse le Jourdain de manière miraculeuse, comme lors du passage de la mer des Roseaux (chap. 3 et 4) ; « le chef de l’armée de l’Eternel » vient au-devant de Josué pour prendre possession du pays (5.13-15) ; les murailles de Jéricho tombent sans combat et sa population comme ses biens sont voués à l’Eternel (chap. 6 et 7) ; puis, à Gabaon, la victoire est à nouveau remportée grâce à l’intervention de Dieu (10.11, 13). Le pays promis est la propriété de l’Eternel (Lv 25.23).'
  - type: text
    content: Les campagnes rapportées dans les chapitres 1 à 11 s’étendent sur une période d’au moins sept ans. A la suite de cela, Josué est chargé par l’Eternel de partager le pays entre les tribus d’Israël (chap. 13 à 21). Puis les guerriers des tribus installées à l’est du Jourdain rentrent chez eux, ce qui marque la fin de la conquête par le peuple dans son ensemble (chap. 22). Une grande partie du territoire restait cependant encore à conquérir (13.1). Mais chaque tribu pouvait s’installer dans son territoire, et c’était désormais à chacune d’entre elles de s’assurer la possession de l’ensemble du territoire qui lui avait été alloué (13.6).
  - type: text
    content: 'Les chapitres 23 et 24 rapportent les derniers actes de Josué, quinze ans plus tard et peu avant sa mort : son discours d’adieu, testament spirituel, suivi du renouvellement de l’alliance entre l’Eternel et Israël.'
  - type: text
    content: 'Le livre de Josué souligne la fidélité de Dieu dont les promesses se réalisent. Dans l’accomplissement de la promesse, Dieu attend aussi de l’homme qu’il manifeste sa fidélité à son égard : confiance en lui, obéissance à ses lois, refus de compromis avec la religion cananéenne. La terre donnée est aussi à conquérir.'
