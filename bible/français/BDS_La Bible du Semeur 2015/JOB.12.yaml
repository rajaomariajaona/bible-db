document_id: JOB.12,21
type_code: fra
verses:
  '1':
  - type: heading
    content: Réponse de Job à Tsophar
  - type: heading
    content: Dieu fait ce qu’il veut
  - type: text
    content: 'Job prit la parole et dit :'
  '10':
  - type: text
    content: Il tient en son pouvoir ╵la vie de tous les êtres,
  - type: text
    content: le souffle qui anime ╵le corps de tout humain.
  '11':
  - type: text
    content: L’oreille juge bien ╵les mots que l’on entend,
  - type: text
    content: tout comme le palais discerne ╵le goût des aliments.
  '12':
  - type: text
    content: La sagesse appartient ╵aux personnes âgées,
  - type: text
    content: et une longue vie ╵donne l’intelligence.
  '13':
  - type: text
    content: C’est auprès de lui que se trouvent ╵la sagesse et la force.
  - type: text
    content: C’est à lui qu’appartiennent ╵conseil, intelligence.
  '14':
  - type: text
    content: 'Voici : ce qu’il détruit, ╵nul ne le rebâtit.'
  - type: text
    content: Et s’il enferme un homme, ╵personne n’ouvrira.
  '15':
  - type: text
    content: Il arrête les eaux, ╵et c’est la sécheresse.
  - type: text
    content: Et dès qu’il les déchaîne ╵la terre est dévastée.
  '16':
  - type: text
    content: Auprès de lui résident ╵la force et la sagesse.
  - type: text
    content: Il tient en son pouvoir ╵celui qui se fourvoie ╵et celui qui l’égare.
  '17':
  - type: text
    content: Il emmène en exil ╵les conseillers d’Etat,
  - type: text
    content: et livre à la folie ╵les dirigeants du peuple.
  '18':
  - type: text
    content: Il desserre l’emprise ╵des rois sur leurs sujets
  - type: text
    content: et ceint leurs reins d’un pagne
  - type: note
    content: 'Seul vêtement laissé aux captifs. D’autres comprennent : d’une ceinture, c’est-à-dire la corde des captifs qui les prive de toute liberté de mouvement (voir Jn 21.18) lorsqu’ils sont emmenés en exil.'
  - type: text
    content: .
  '19':
  - type: text
    content: Il emmène en exil les prêtres,
  - type: text
    content: il renverse les pouvoirs établis.
  '2':
  - type: text
    content: En vérité, à vous tout seuls, ╵vous êtes tout le genre humain ;
  - type: text
    content: avec vous mourra la sagesse.
  '20':
  - type: text
    content: Il ôte la parole ╵aux orateurs habiles
  - type: text
    content: et ravit le discernement ╵aux personnes âgées.
  '21':
  - type: text
    content: Il couvre de mépris les nobles,
  - type: text
    content: il fait aussi tomber ╵les armes des puissants.
  '22':
  - type: text
    content: Il met à découvert ╵les profonds secrets des ténèbres,
  - type: text
    content: et il expose au jour ╵les ténèbres les plus épaisses.
  '23':
  - type: text
    content: Il grandit les nations, ╵et il les fait périr,
  - type: text
    content: il étend leur empire, ╵puis les emmène au loin.
  '24':
  - type: text
    content: Il ôte la raison ╵aux chefs des nations de la terre
  - type: text
    content: et il les fait errer ╵dans des déserts sans piste,
  '25':
  - type: text
    content: de sorte qu’ils tâtonnent ╵en pleine obscurité, ╵sans trouver de lumière.
  - type: text
    content: Oui, il les fait errer, ╵tels des ivrognes.
  '3':
  - type: text
    content: Néanmoins, comme vous, ╵j’ai de l’intelligence,
  - type: text
    content: je ne vous cède en rien.
  - type: text
    content: Du reste, qui ignore ╵ce que vous avez dit ?
  '4':
  - type: text
    content: Je suis pour mes amis ╵un objet de risée,
  - type: text
    content: moi qui invoque Dieu ╵afin qu’il me réponde,
  - type: text
    content: un juste, un homme intègre, ╵voilà l’objet des railleries !
  '5':
  - type: text
    content: Au malheur, le mépris ! ╵C’est l’avis des heureux.
  - type: text
    content: Voilà ce qui attend ╵ceux dont le pied chancelle.
  '6':
  - type: text
    content: Mais les brigands jouissent ╵de la paix sous leurs tentes,
  - type: text
    content: ceux qui provoquent Dieu ╵sont en sécurité,
  - type: text
    content: eux qui ne reconnaissent ╵d’autre dieu que leur force
  - type: note
    content: 'Au lieu de eux qui ne reconnaissent… force, on pourrait traduire : ceux qui portent leur dieu dans la main ou ceux qui disposent de Dieu à leur gré.'
  - type: text
    content: .
  '7':
  - type: text
    content: Mais interroge donc ╵les animaux sauvages, ╵ils t’instruiront,
  - type: text
    content: et les oiseaux du ciel, ╵ils te renseigneront.
  '8':
  - type: text
    content: Ou bien parle à la terre, ╵et elle t’instruira,
  - type: text
    content: les poissons de la mer ╵pourront t’en informer.
  '9':
  - type: text
    content: Oui, parmi tous ceux-ci, ╵lequel ignorerait
  - type: text
    content: que c’est Dieu
  - type: note
    content: 'Selon plusieurs manuscrits du texte hébreu. Le texte hébreu traditionnel a : l’Eternel.'
  - type: text
    content: ' qui a fait cela ?'
