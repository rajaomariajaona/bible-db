document_id: JOB.12,21
type_code: fra
verses:
  '1':
  - type: usfm
    marker: ms1
    children:
    - type: text
      text: Réponse de Job à Tsophar
    marker-yv: yv-h
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Dieu fait ce qu’il veut
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Job prit la parole et dit :'
  '10':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Il tient en son pouvoir ╵la vie de tous les êtres,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: le souffle qui anime ╵le corps de tout humain.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: L’oreille juge bien ╵les mots que l’on entend,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: tout comme le palais discerne ╵le goût des aliments.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: La sagesse appartient ╵aux personnes âgées,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et une longue vie ╵donne l’intelligence.
  '13':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: C’est auprès de lui que se trouvent ╵la sagesse et la force.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: C’est à lui qu’appartiennent ╵conseil, intelligence.
  '14':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Voici : ce qu’il détruit, ╵nul ne le rebâtit.'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et s’il enferme un homme, ╵personne n’ouvrira.
  '15':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Il arrête les eaux, ╵et c’est la sécheresse.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et dès qu’il les déchaîne ╵la terre est dévastée.
  '16':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Auprès de lui résident ╵la force et la sagesse.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Il tient en son pouvoir ╵celui qui se fourvoie ╵et celui qui l’égare.
  '17':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Il emmène en exil ╵les conseillers d’Etat,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et livre à la folie ╵les dirigeants du peuple.
  '18':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Il desserre l’emprise ╵des rois sur leurs sujets
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et ceint leurs reins d’un pagne
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '12.18 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Seul vêtement laissé aux captifs. D’autres comprennent : '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'd’une ceinture, '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'c’est-à-dire la corde des captifs qui les prive de toute liberté de mouvement (voir '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: Jn 21.18
        - type: text
          text: ) lorsqu’ils sont emmenés en exil.
      marker-yv: yv-n
    - type: text
      text: .
  '19':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Il emmène en exil les prêtres,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: il renverse les pouvoirs établis.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: En vérité, à vous tout seuls, ╵vous êtes tout le genre humain ;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: avec vous mourra la sagesse.
  '20':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Il ôte la parole ╵aux orateurs habiles
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et ravit le discernement ╵aux personnes âgées.
  '21':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Il couvre de mépris les nobles,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: il fait aussi tomber ╵les armes des puissants.
  '22':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Il met à découvert ╵les profonds secrets des ténèbres,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et il expose au jour ╵les ténèbres les plus épaisses.
  '23':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Il grandit les nations, ╵et il les fait périr,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: il étend leur empire, ╵puis les emmène au loin.
  '24':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Il ôte la raison ╵aux chefs des nations de la terre
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et il les fait errer ╵dans des déserts sans piste,
  '25':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: de sorte qu’ils tâtonnent ╵en pleine obscurité, ╵sans trouver de lumière.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Oui, il les fait errer, ╵tels des ivrognes.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Néanmoins, comme vous, ╵j’ai de l’intelligence,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: je ne vous cède en rien.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Du reste, qui ignore ╵ce que vous avez dit ?
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Je suis pour mes amis ╵un objet de risée,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: moi qui invoque Dieu ╵afin qu’il me réponde,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: un juste, un homme intègre, ╵voilà l’objet des railleries !
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Au malheur, le mépris ! ╵C’est l’avis des heureux.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Voilà ce qui attend ╵ceux dont le pied chancelle.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mais les brigands jouissent ╵de la paix sous leurs tentes,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ceux qui provoquent Dieu ╵sont en sécurité,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: eux qui ne reconnaissent ╵d’autre dieu que leur force
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '12.6 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Au lieu de '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'eux qui ne reconnaissent… force, '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'on pourrait traduire : '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'ceux qui portent leur dieu dans la main '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'ou '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: ceux qui disposent de Dieu à leur gré.
      marker-yv: yv-n
    - type: text
      text: .
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mais interroge donc ╵les animaux sauvages, ╵ils t’instruiront,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et les oiseaux du ciel, ╵ils te renseigneront.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ou bien parle à la terre, ╵et elle t’instruira,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: les poissons de la mer ╵pourront t’en informer.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Oui, parmi tous ceux-ci, ╵lequel ignorerait
  - type: usfm
    marker: q1
    children:
    - type: text
      text: que c’est Dieu
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '12.9 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Selon plusieurs manuscrits du texte hébreu. Le texte hébreu traditionnel a : '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: l’Eternel.
      marker-yv: yv-n
    - type: text
      text: ' qui a fait cela ?'
