document_id: EPH.5
type_code: fra
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Puisque vous êtes les enfants bien-aimés de Dieu, suivez l’exemple de votre Père.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Que votre vie soit dirigée par l’amour, de même que Christ nous
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '5.2 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Certains manuscrits ont : '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: vous.
    marker-yv: yv-n
  - type: text
    text: ' a aimés et a livré lui-même sa vie à Dieu pour nous comme une offrande et un sacrifice dont le parfum plaît à Dieu.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Quant à l’immoralité et aux pratiques dégradantes sous toutes leurs formes, et à la soif de posséder, qu’il n’en soit pas même question entre vous : ce ne sont pas des sujets de conversation qui conviennent aux membres du peuple saint, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'pas plus que les propos grossiers ou stupides, et les plaisanteries équivoques. C’est inconvenant ! Exprimez plutôt votre reconnaissance envers Dieu. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Car, sachez-le bien : aucun homme qui se livre à l’immoralité, à des pratiques dégradantes ou à la soif de posséder – qui est une idolâtrie – n’a d’héritage dans le royaume de Christ et de Dieu'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '5.5 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Autre traduction : '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: le royaume de celui qui est Christ et Dieu.
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: s1
  children:
  - type: text
    text: La vie dans la lumière
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Que personne ne vous trompe par des discours sans valeur : ce sont ces désordres qui attirent la colère de Dieu sur ceux qui refusent de lui obéir.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Ne vous associez pas à ces gens-là. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Autrefois, certes, vous apparteniez aux ténèbres, mais à présent, par votre union avec le Seigneur, vous appartenez à la lumière. Comportez-vous donc comme des enfants de la lumière – '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'car le fruit produit par la lumière c’est tout ce qui est bon, juste et vrai. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Efforcez-vous de discerner ce qui plaît au Seigneur.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Ne participez pas aux pratiques stériles que favorisent les ténèbres, mais démasquez-les plutôt. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Car tout ce que ces gens-là font en cachette est si honteux qu’on n’ose même pas en parler. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Mais quand ces choses sont démasquées, leur véritable nature paraît à la lumière. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Or ce qui paraît à la lumière est lumière. De là viennent ces paroles :'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Réveille-toi,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ô toi qui dors,
- type: usfm
  marker: q1
  children:
  - type: text
    text: relève-toi
- type: usfm
  marker: q1
  children:
  - type: text
    text: d’entre les morts
- type: usfm
  marker: q1
  children:
  - type: text
    text: et Christ fera lever
- type: usfm
  marker: q1
  children:
  - type: text
    text: sa lumière sur toi
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '5.14 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: L’apôtre cite peut-être un cantique de l’Eglise primitive inspiré par Es 26.19 ; 51.17 ; 52.1 ; 60.1.
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Veillez donc avec soin à votre manière de vivre. Ne vous comportez pas comme des insensés, mais comme des gens sensés. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Mettez à profit les occasions qui se présentent à vous
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '5.16 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Autre traduction : '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: Gérez bien votre temps.
    marker-yv: yv-n
  - type: text
    text: ', car nous vivons des jours mauvais.'
- type: usfm
  marker: s1
  children:
  - type: text
    text: La vie par l’Esprit
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: C’est pourquoi ne soyez pas déraisonnables, mais comprenez ce que le Seigneur attend de vous.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Ne vous enivrez pas de vin – cela vous conduirait à une vie de désordre – mais soyez remplis de l’Esprit : '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: ainsi vous vous entretiendrez par le chant de psaumes, d’hymnes et de cantiques inspirés par l’Esprit
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '5.19 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Autre traduction : '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'conformes à la pensée de l’Esprit, '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ce qui revient à dire que leur contenu doit être en accord avec l’Ecriture.
    marker-yv: yv-n
  - type: text
    text: ', vous louerez le Seigneur de tout votre cœur par vos chants et vos psaumes ; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'à tout moment et pour toute chose, vous remercierez Dieu le Père au nom de notre Seigneur Jésus-Christ, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'et parce que vous avez la crainte de Christ, vous vous soumettrez les uns aux autres, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'vous femmes, en particulier, chacune à son mari, et cela par égard pour le Seigneur. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: Le mari, en effet, est le chef de sa femme comme Christ est la tête, le chef
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '5.23 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Le même mot grec désigne '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'la tête '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'et '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: le chef.
    marker-yv: yv-n
  - type: text
    text: ' de l’Eglise qui est son corps et dont il est le Sauveur. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: Mais comme l’Eglise se soumet à Christ, qu’ainsi aussi la femme se soumette en toute circonstance à son mari.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Quant à vous, maris, que chacun de vous aime sa femme comme Christ a aimé l’Eglise : il a donné sa vie pour elle '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: afin de la rendre digne de se tenir devant Dieu après l’avoir purifiée par sa Parole, comme par le bain nuptial
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '5.26 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'En Orient, la fiancée était baignée et parée avant le mariage (comparer '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ez 16.9
        metadata:
          usfm: EZK.16.9
      - type: text
        text: '). Autre traduction : '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: après l’avoir purifiée par l’eau et par la Parole.
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: Il a ainsi voulu se présenter cette Eglise à lui-même, rayonnante de beauté, sans tache, ni ride, ni aucun défaut, mais digne de se tenir devant Dieu et irréprochable.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'Voilà comment chaque mari doit aimer sa femme comme si elle était son propre corps : ainsi celui qui aime sa femme s’aime lui-même. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'Car personne n’a jamais haï sa propre chair ; au contraire, chacun la nourrit et l’entoure de soins, comme Christ le fait pour l’Eglise, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: parce que nous sommes les membres de son corps.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: ' '
  - type: usfm
    marker: qt
    children:
    - type: text
      text: C’est pourquoi l’homme laissera son père et sa mère pour s’attacher à sa femme et les deux ne feront plus qu’un
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '5.31 '
    - type: usfm
      marker: ft
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Gn 2.24
        metadata:
          usfm: GEN.2.24
      - type: text
        text: ' .'
    marker-yv: yv-n
  - type: usfm
    marker: qt
    children:
    - type: text
      text: .
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'Il y a là un grand mystère : je parle de ce que je viens de dire au sujet de Christ et de l’Eglise. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: Quant à vous, que chaque mari aime sa femme comme lui-même, et que chaque femme témoigne un profond respect à son mari.
