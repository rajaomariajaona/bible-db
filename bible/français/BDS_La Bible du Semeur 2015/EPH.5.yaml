document_id: EPH.5,21
type_code: fra
verses:
  '1':
  - type: text
    content: Puisque vous êtes les enfants bien-aimés de Dieu, suivez l’exemple de votre Père.
  '10':
  - type: text
    content: Efforcez-vous de discerner ce qui plaît au Seigneur.
  '11':
  - type: text
    content: 'Ne participez pas aux pratiques stériles que favorisent les ténèbres, mais démasquez-les plutôt. '
  '12':
  - type: text
    content: 'Car tout ce que ces gens-là font en cachette est si honteux qu’on n’ose même pas en parler. '
  '13':
  - type: text
    content: 'Mais quand ces choses sont démasquées, leur véritable nature paraît à la lumière. '
  '14':
  - type: text
    content: 'Or ce qui paraît à la lumière est lumière. De là viennent ces paroles :'
  - type: text
    content: Réveille-toi,
  - type: text
    content: ô toi qui dors,
  - type: text
    content: relève-toi
  - type: text
    content: d’entre les morts
  - type: text
    content: et Christ fera lever
  - type: text
    content: sa lumière sur toi
  - type: note
    content: L’apôtre cite peut-être un cantique de l’Eglise primitive inspiré par Es 26.19 ; 51.17 ; 52.1 ; 60.1.
  - type: text
    content: .
  '15':
  - type: text
    content: 'Veillez donc avec soin à votre manière de vivre. Ne vous comportez pas comme des insensés, mais comme des gens sensés. '
  '16':
  - type: text
    content: Mettez à profit les occasions qui se présentent à vous
  - type: note
    content: 'Autre traduction : Gérez bien votre temps.'
  - type: text
    content: ', car nous vivons des jours mauvais.'
  - type: heading
    content: La vie par l’Esprit
  '17':
  - type: text
    content: C’est pourquoi ne soyez pas déraisonnables, mais comprenez ce que le Seigneur attend de vous.
  '18':
  - type: text
    content: 'Ne vous enivrez pas de vin – cela vous conduirait à une vie de désordre – mais soyez remplis de l’Esprit : '
  '19':
  - type: text
    content: ainsi vous vous entretiendrez par le chant de psaumes, d’hymnes et de cantiques inspirés par l’Esprit
  - type: note
    content: 'Autre traduction : conformes à la pensée de l’Esprit, ce qui revient à dire que leur contenu doit être en accord avec l’Ecriture.'
  - type: text
    content: ', vous louerez le Seigneur de tout votre cœur par vos chants et vos psaumes ; '
  '2':
  - type: text
    content: Que votre vie soit dirigée par l’amour, de même que Christ nous
  - type: note
    content: 'Certains manuscrits ont : vous.'
  - type: text
    content: ' a aimés et a livré lui-même sa vie à Dieu pour nous comme une offrande et un sacrifice dont le parfum plaît à Dieu.'
  '20':
  - type: text
    content: 'à tout moment et pour toute chose, vous remercierez Dieu le Père au nom de notre Seigneur Jésus-Christ, '
  '21':
  - type: text
    content: 'et parce que vous avez la crainte de Christ, vous vous soumettrez les uns aux autres, '
  '22':
  - type: text
    content: 'vous femmes, en particulier, chacune à son mari, et cela par égard pour le Seigneur. '
  '23':
  - type: text
    content: Le mari, en effet, est le chef de sa femme comme Christ est la tête, le chef
  - type: note
    content: Le même mot grec désigne la tête et le chef.
  - type: text
    content: ' de l’Eglise qui est son corps et dont il est le Sauveur. '
  '24':
  - type: text
    content: Mais comme l’Eglise se soumet à Christ, qu’ainsi aussi la femme se soumette en toute circonstance à son mari.
  '25':
  - type: text
    content: 'Quant à vous, maris, que chacun de vous aime sa femme comme Christ a aimé l’Eglise : il a donné sa vie pour elle '
  '26':
  - type: text
    content: afin de la rendre digne de se tenir devant Dieu après l’avoir purifiée par sa Parole, comme par le bain nuptial
  - type: note
    content: 'En Orient, la fiancée était baignée et parée avant le mariage (comparer Ez 16.9). Autre traduction : après l’avoir purifiée par l’eau et par la Parole.'
  - type: text
    content: '. '
  '27':
  - type: text
    content: Il a ainsi voulu se présenter cette Eglise à lui-même, rayonnante de beauté, sans tache, ni ride, ni aucun défaut, mais digne de se tenir devant Dieu et irréprochable.
  '28':
  - type: text
    content: 'Voilà comment chaque mari doit aimer sa femme comme si elle était son propre corps : ainsi celui qui aime sa femme s’aime lui-même. '
  '29':
  - type: text
    content: 'Car personne n’a jamais haï sa propre chair ; au contraire, chacun la nourrit et l’entoure de soins, comme Christ le fait pour l’Eglise, '
  '3':
  - type: text
    content: 'Quant à l’immoralité et aux pratiques dégradantes sous toutes leurs formes, et à la soif de posséder, qu’il n’en soit pas même question entre vous : ce ne sont pas des sujets de conversation qui conviennent aux membres du peuple saint, '
  '30':
  - type: text
    content: parce que nous sommes les membres de son corps.
  '31':
  - type: text
    content: ' '
  - type: text
    content: C’est pourquoi l’homme laissera son père et sa mère pour s’attacher à sa femme et les deux ne feront plus qu’un
  - type: text
    content: ' '
  - type: note
    content: Gn 2.24 .
  - type: text
    content: .
  '32':
  - type: text
    content: 'Il y a là un grand mystère : je parle de ce que je viens de dire au sujet de Christ et de l’Eglise. '
  '33':
  - type: text
    content: Quant à vous, que chaque mari aime sa femme comme lui-même, et que chaque femme témoigne un profond respect à son mari.
  '4':
  - type: text
    content: 'pas plus que les propos grossiers ou stupides, et les plaisanteries équivoques. C’est inconvenant ! Exprimez plutôt votre reconnaissance envers Dieu. '
  '5':
  - type: text
    content: 'Car, sachez-le bien : aucun homme qui se livre à l’immoralité, à des pratiques dégradantes ou à la soif de posséder – qui est une idolâtrie – n’a d’héritage dans le royaume de Christ et de Dieu'
  - type: note
    content: 'Autre traduction : le royaume de celui qui est Christ et Dieu.'
  - type: text
    content: .
  - type: heading
    content: La vie dans la lumière
  '6':
  - type: text
    content: 'Que personne ne vous trompe par des discours sans valeur : ce sont ces désordres qui attirent la colère de Dieu sur ceux qui refusent de lui obéir.'
  '7':
  - type: text
    content: 'Ne vous associez pas à ces gens-là. '
  '8':
  - type: text
    content: 'Autrefois, certes, vous apparteniez aux ténèbres, mais à présent, par votre union avec le Seigneur, vous appartenez à la lumière. Comportez-vous donc comme des enfants de la lumière – '
  '9':
  - type: text
    content: 'car le fruit produit par la lumière c’est tout ce qui est bon, juste et vrai. '
