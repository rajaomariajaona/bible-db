document_id: ISA.32,21
type_code: fra
verses:
  '1':
  - type: heading
    content: Le Roi qui change tout
  - type: text
    content: Voici qu’un roi exercera ╵son règne avec justice,
  - type: text
    content: et ses ministres ╵gouverneront selon le droit,
  '10':
  - type: text
    content: Dans un peu plus d’un an,
  - type: text
    content: vous tremblerez, ╵vous insouciantes,
  - type: text
    content: car la vendange ╵n’aura pas lieu
  - type: text
    content: et il n’y aura pas ╵de fruits à récolter.
  '11':
  - type: text
    content: Vous serez effrayées, ╵vous qui vivez tranquilles.
  - type: text
    content: Tremblez, vous insouciantes,
  - type: text
    content: quittez vos vêtements, ╵et déshabillez-vous,
  - type: text
    content: ceignez vos reins de pagnes
  - type: note
    content: Divers signes de deuil, rites des pleureuses.
  - type: text
    content: ','
  '12':
  - type: text
    content: frappez-vous la poitrine, ╵lamentez-vous
  - type: text
    content: sur les belles campagnes,
  - type: text
    content: sur les vignes fécondes,
  '13':
  - type: text
    content: sur la campagne de mon peuple
  - type: text
    content: où pousseront les ronces ╵et les épines
  - type: text
    content: qui envahiront même ╵les joyeuses maisons
  - type: text
    content: de la cité en liesse.
  '14':
  - type: text
    content: Car le palais est déserté,
  - type: text
    content: et la ville animée ╵abandonnée,
  - type: text
    content: la citadelle ╵avec la tour de guet
  - type: text
    content: servira de caverne ╵à tout jamais.
  - type: text
    content: Et les ânes sauvages ╵y prendront leurs ébats.
  - type: text
    content: Les troupeaux y paîtront.
  - type: heading
    content: Paix et justice
  '15':
  - type: text
    content: Il en sera ainsi ╵jusqu’à ce que l’Esprit ╵soit répandu sur nous d’en haut,
  - type: text
    content: et alors le désert ╵deviendra un verger,
  - type: text
    content: et le verger sera ╵semblable à la forêt.
  '16':
  - type: text
    content: Le droit habitera ╵dans le désert,
  - type: text
    content: et la justice ╵dans le verger.
  '17':
  - type: text
    content: Le fruit de la justice ╵sera la paix.
  - type: text
    content: L’effet de la justice,
  - type: text
    content: ce sera la tranquillité ╵et la sécurité ╵à tout jamais.
  '18':
  - type: text
    content: Mon peuple habitera ╵un domaine de paix
  - type: text
    content: dans des demeures sûres,
  - type: text
    content: dans des maisons tranquilles.
  '19':
  - type: text
    content: La forêt tombera, ╵abattue par la grêle,
  - type: text
    content: et la cité ╵tombera au plus bas.
  '2':
  - type: text
    content: et chacun d’eux sera ╵comme un abri contre le vent,
  - type: text
    content: un refuge contre l’orage,
  - type: text
    content: comme un cours d’eau ╵sur un sol desséché,
  - type: text
    content: ou comme l’ombre d’un rocher massif ╵dans un désert aride.
  '20':
  - type: text
    content: 'Bienheureux serez-vous : ╵vous sèmerez partout ╵le long d’eaux abondantes'
  - type: text
    content: et vous pourrez laisser ╵les bœufs comme les ânes ╵en liberté.
  '3':
  - type: text
    content: Alors les yeux ╵de ceux qui devraient voir ╵ne seront plus aveugles,
  - type: text
    content: les oreilles des auditeurs ╵se feront attentives.
  '4':
  - type: text
    content: Les gens écervelés ╵réfléchiront afin d’apprendre,
  - type: text
    content: et la langue des bègues ╵parlera clairement ╵avec facilité.
  '5':
  - type: text
    content: On ne considérera plus ╵l’insensé comme un noble,
  - type: text
    content: on ne dira plus du trompeur ╵qu’il est quelqu’un de grand.
  '6':
  - type: text
    content: L’insensé, en effet, ╵dit des insanités.
  - type: text
    content: Il est porté, au fond de lui, ╵à commettre le mal,
  - type: text
    content: à agir sans respect pour Dieu,
  - type: text
    content: à tenir des propos blasphématoires ╵pour l’Eternel.
  - type: text
    content: Il laisse l’affamé ╵avec le ventre creux
  - type: text
    content: et prive de boisson ╵celui qui meurt de soif.
  '7':
  - type: text
    content: Les manœuvres du fourbe ╵sont malveillantes,
  - type: text
    content: il projette des mauvais coups
  - type: text
    content: pour opprimer les pauvres ╵par des paroles fausses,
  - type: text
    content: alors que l’indigent ╵réclame son bon droit.
  '8':
  - type: text
    content: Mais l’homme au noble cœur ╵a de nobles desseins
  - type: text
    content: et toute sa conduite ╵reflète sa noblesse.
  - type: heading
    content: Jugement
  '9':
  - type: text
    content: O femmes qui vivez tranquilles,
  - type: text
    content: debout ! écoutez-moi !
  - type: text
    content: Vous, filles insouciantes,
  - type: text
    content: 'écoutez mes paroles :'
