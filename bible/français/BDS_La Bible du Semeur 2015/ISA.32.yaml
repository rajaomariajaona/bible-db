document_id: ISA.32
type_code: fra
segments:
- type: usfm
  marker: s2
  children:
  - type: text
    text: Le Roi qui change tout
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Voici qu’un roi exercera ╵son règne avec justice,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et ses ministres ╵gouverneront selon le droit,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: et chacun d’eux sera ╵comme un abri contre le vent,
- type: usfm
  marker: q1
  children:
  - type: text
    text: un refuge contre l’orage,
- type: usfm
  marker: q1
  children:
  - type: text
    text: comme un cours d’eau ╵sur un sol desséché,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ou comme l’ombre d’un rocher massif ╵dans un désert aride.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Alors les yeux ╵de ceux qui devraient voir ╵ne seront plus aveugles,
- type: usfm
  marker: q1
  children:
  - type: text
    text: les oreilles des auditeurs ╵se feront attentives.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Les gens écervelés ╵réfléchiront afin d’apprendre,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et la langue des bègues ╵parlera clairement ╵avec facilité.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: On ne considérera plus ╵l’insensé comme un noble,
- type: usfm
  marker: q1
  children:
  - type: text
    text: on ne dira plus du trompeur ╵qu’il est quelqu’un de grand.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: L’insensé, en effet, ╵dit des insanités.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Il est porté, au fond de lui, ╵à commettre le mal,
- type: usfm
  marker: q1
  children:
  - type: text
    text: à agir sans respect pour Dieu,
- type: usfm
  marker: q1
  children:
  - type: text
    text: à tenir des propos blasphématoires ╵pour l’Eternel.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Il laisse l’affamé ╵avec le ventre creux
- type: usfm
  marker: q1
  children:
  - type: text
    text: et prive de boisson ╵celui qui meurt de soif.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Les manœuvres du fourbe ╵sont malveillantes,
- type: usfm
  marker: q1
  children:
  - type: text
    text: il projette des mauvais coups
- type: usfm
  marker: q1
  children:
  - type: text
    text: pour opprimer les pauvres ╵par des paroles fausses,
- type: usfm
  marker: q1
  children:
  - type: text
    text: alors que l’indigent ╵réclame son bon droit.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Mais l’homme au noble cœur ╵a de nobles desseins
- type: usfm
  marker: q1
  children:
  - type: text
    text: et toute sa conduite ╵reflète sa noblesse.
- type: usfm
  marker: s2
  children:
  - type: text
    text: Jugement
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: O femmes qui vivez tranquilles,
- type: usfm
  marker: q1
  children:
  - type: text
    text: debout ! écoutez-moi !
- type: usfm
  marker: q1
  children:
  - type: text
    text: Vous, filles insouciantes,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'écoutez mes paroles :'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Dans un peu plus d’un an,
- type: usfm
  marker: q1
  children:
  - type: text
    text: vous tremblerez, ╵vous insouciantes,
- type: usfm
  marker: q1
  children:
  - type: text
    text: car la vendange ╵n’aura pas lieu
- type: usfm
  marker: q1
  children:
  - type: text
    text: et il n’y aura pas ╵de fruits à récolter.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Vous serez effrayées, ╵vous qui vivez tranquilles.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Tremblez, vous insouciantes,
- type: usfm
  marker: q1
  children:
  - type: text
    text: quittez vos vêtements, ╵et déshabillez-vous,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ceignez vos reins de pagnes
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '32.11 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Divers signes de deuil, rites des pleureuses.
    marker-yv: yv-n
  - type: text
    text: ','
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: frappez-vous la poitrine, ╵lamentez-vous
- type: usfm
  marker: q1
  children:
  - type: text
    text: sur les belles campagnes,
- type: usfm
  marker: q1
  children:
  - type: text
    text: sur les vignes fécondes,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: sur la campagne de mon peuple
- type: usfm
  marker: q1
  children:
  - type: text
    text: où pousseront les ronces ╵et les épines
- type: usfm
  marker: q1
  children:
  - type: text
    text: qui envahiront même ╵les joyeuses maisons
- type: usfm
  marker: q1
  children:
  - type: text
    text: de la cité en liesse.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Car le palais est déserté,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et la ville animée ╵abandonnée,
- type: usfm
  marker: q1
  children:
  - type: text
    text: la citadelle ╵avec la tour de guet
- type: usfm
  marker: q1
  children:
  - type: text
    text: servira de caverne ╵à tout jamais.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et les ânes sauvages ╵y prendront leurs ébats.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Les troupeaux y paîtront.
- type: usfm
  marker: s2
  children:
  - type: text
    text: Paix et justice
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Il en sera ainsi ╵jusqu’à ce que l’Esprit ╵soit répandu sur nous d’en haut,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et alors le désert ╵deviendra un verger,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et le verger sera ╵semblable à la forêt.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Le droit habitera ╵dans le désert,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et la justice ╵dans le verger.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Le fruit de la justice ╵sera la paix.
- type: usfm
  marker: q1
  children:
  - type: text
    text: L’effet de la justice,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ce sera la tranquillité ╵et la sécurité ╵à tout jamais.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Mon peuple habitera ╵un domaine de paix
- type: usfm
  marker: q1
  children:
  - type: text
    text: dans des demeures sûres,
- type: usfm
  marker: q1
  children:
  - type: text
    text: dans des maisons tranquilles.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: La forêt tombera, ╵abattue par la grêle,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et la cité ╵tombera au plus bas.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Bienheureux serez-vous : ╵vous sèmerez partout ╵le long d’eaux abondantes'
- type: usfm
  marker: q1
  children:
  - type: text
    text: et vous pourrez laisser ╵les bœufs comme les ânes ╵en liberté.
