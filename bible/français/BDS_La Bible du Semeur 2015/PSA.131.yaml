document_id: PSA.131,21
type_code: fra
verses:
  '1':
  - type: heading
    content: Calme souverain
  - type: text
    content: Cantique pour la route vers la demeure de l’Eternel
  - type: note
    content: Voir note 120.1.
  - type: text
    content: . De David.
  - type: text
    content: O Eternel, ╵mon cœur ne s’enfle pas d’orgueil, ╵mes yeux n’ont pas visé trop haut,
  - type: text
    content: je ne me suis pas engagé ╵dans des projets trop grands,
  - type: text
    content: trop compliqués pour moi.
  '2':
  - type: text
    content: 'Bien au contraire : ╵je suis resté tranquille et calme,'
  - type: text
    content: comme un enfant sevré ╵porté par sa maman.
  - type: text
    content: Oui, je me sens au fond de moi ╵comme l’enfant sevré.
  '3':
  - type: text
    content: Israël, mets ta confiance ╵en l’Eternel,
  - type: text
    content: dès maintenant et pour toujours.
