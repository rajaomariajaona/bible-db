        metadata:
          usfm: PSA.120.1
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: . De David.
- type: usfm
  marker: q1
  children:
  - type: text
    text: O Eternel, ╵mon cœur ne s’enfle pas d’orgueil, ╵mes yeux n’ont pas visé trop haut,
- type: usfm
  marker: q1
  children:
  - type: text
    text: je ne me suis pas engagé ╵dans des projets trop grands,
- type: usfm
  marker: q1
  children:
  - type: text
    text: trop compliqués pour moi.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Bien au contraire : ╵je suis resté tranquille et calme,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: comme un enfant sevré ╵porté par sa maman.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Oui, je me sens au fond de moi ╵comme l’enfant sevré.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Israël, mets ta confiance ╵en l’Eternel,
- type: usfm
  marker: q1
  children:
  - type: text
    text: dès maintenant et pour toujours.
