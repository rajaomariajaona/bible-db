document_id: JHN.2,21
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Le premier miracle
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: Deux jours plus tard, on célébrait des noces à Cana, en Galilée. La mère de Jésus y assistait.
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'et lui dit : En général, on sert d’abord le bon vin, et quand les gens sont ivres, on leur donne de l’ordinaire. Mais toi, tu as réservé le bon jusqu’à maintenant !'
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'C’est là le premier des signes miraculeux que fit Jésus. Cela se passa à Cana en Galilée. Il révéla ainsi sa gloire, et ses disciples crurent en lui. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: Après cela, Jésus descendit à Capernaüm avec sa mère, ses frères et ses disciples ; mais ils n’y restèrent que quelques jours.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Le premier affrontement au Temple
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: (voir Mt 21.12-17 ; Mc 11.15-17 ; Lc 19.45-46)
    marker-yv: yv-h
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'Le jour où les Juifs célèbrent la fête de la Pâque était proche et Jésus se rendit à Jérusalem. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'Il trouva, dans la cour du Temple, des marchands de bœufs, de brebis et de pigeons, ainsi que des changeurs d’argent, installés à leurs comptoirs. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: Alors il prit des cordes, en fit un fouet, et les chassa tous de l’enceinte sacrée avec les brebis et les bœufs
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '2.15 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Autre traduction : '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: et les chassa tous, les brebis comme les bœufs.
      marker-yv: yv-n
    - type: text
      text: '  ; il jeta par terre l’argent des changeurs et renversa leurs comptoirs, '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'puis il dit aux marchands de pigeons : '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Otez cela d’ici ! C’est la maison de mon Père. N’en faites pas une maison de commerce.
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'Les disciples se souvinrent alors de ce passage de l’Ecriture :'
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: qt
      children:
      - type: text
        text: L’amour que j’ai pour ta maison,
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: qt
      children:
      - type: text
        text: ô Dieu, est en moi un feu qui me consume
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '2.17 '
      - type: usfm
        marker: ft
        children:
        - type: usfm
          marker: ref
          children:
          - type: text
            text: Ps 69.10
        - type: text
          text: ' .'
      marker-yv: yv-n
    - type: usfm
      marker: qt
      children:
      - type: text
        text: .
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'Là-dessus, les gens lui dirent : Quel signe miraculeux peux-tu nous montrer pour prouver que tu as le droit d’agir ainsi ?'
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: ' '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: – Démolissez ce temple,
    - type: text
      text: ' leur répondit Jésus, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: et en trois jours, je le relèverai.
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: Jésus avait aussi été invité au mariage avec ses disciples.
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: – Comment ? répondirent-ils. Il a fallu quarante-six ans pour reconstruire le Temple
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '2.20 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: La reconstruction du temple dit « d’Hérode » avait commencé en l’an 20 av. J.-C.
      marker-yv: yv-n
    - type: text
      text: ', et toi, tu serais capable de le relever en trois jours !'
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: Mais en parlant du « temple », Jésus faisait allusion à son propre corps.
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: Plus tard, lorsque Jésus fut ressuscité, ses disciples se souvinrent qu’il avait dit cela, et ils crurent à l’Ecriture et à la parole que Jésus avait dite.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Jésus et Nicodème
    marker-yv: yv-h
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: 'Pendant que Jésus séjournait à Jérusalem pour la fête de la Pâque, beaucoup de gens crurent en lui en voyant les signes miraculeux qu’il accomplissait. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: 'Mais Jésus ne se fiait pas à eux, car il les connaissait tous très bien. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: En effet, il n’avait pas besoin qu’on le renseigne sur les hommes car il connaissait le fond de leur cœur.
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'Or voilà que le vin se mit à manquer. La mère de Jésus lui fit remarquer : Ils n’ont plus de vin.'
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: ' '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: – Ecoute,
    - type: text
      text: ' lui répondit Jésus, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: est-ce toi ou moi que cette affaire concerne
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '2.4 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Autres traductions : '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'que me veux-tu, mère ? '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'ou '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: femme, est-ce à toi de me dire ce que je dois faire ?
      marker-yv: yv-n
    - type: usfm
      marker: wj
      children:
      - type: text
        text: '? Mon heure n’est pas encore venue.'
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'Sa mère dit aux serviteurs : Faites tout ce qu’il vous dira.'
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: Il y avait là six jarres de pierre que les Juifs utilisaient pour leurs ablutions rituelles
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '2.6 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Les Israélites observaient des rites de purification avant, pendant et après les repas. L’eau était placée dans des vases de pierre.
      marker-yv: yv-n
    - type: text
      text: '. Chacune d’elles pouvait contenir entre quatre-vingts et cent vingt litres. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'Jésus dit aux serviteurs : '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Remplissez d’eau ces jarres.
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ils les remplirent jusqu’au bord.
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: ' '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: – Maintenant,
    - type: text
      text: ' leur dit-il, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: prenez-en un peu et allez l’apporter à l’ordonnateur du repas.
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ce qu’ils firent.
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'L’ordonnateur du repas goûta l’eau qui avait été changée en vin. Il ne savait pas d’où venait ce vin, alors que les serviteurs le savaient, puisqu’ils avaient puisé l’eau. Aussitôt il fit appeler le marié '
