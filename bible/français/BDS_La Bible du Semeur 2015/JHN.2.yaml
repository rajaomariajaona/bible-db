document_id: JHN.2,21
type_code: fra
verses:
  '1':
  - type: heading
    content: Le premier miracle
  - type: text
    content: Deux jours plus tard, on célébrait des noces à Cana, en Galilée. La mère de Jésus y assistait.
  '10':
  - type: text
    content: 'et lui dit : En général, on sert d’abord le bon vin, et quand les gens sont ivres, on leur donne de l’ordinaire. Mais toi, tu as réservé le bon jusqu’à maintenant !'
  '11':
  - type: text
    content: 'C’est là le premier des signes miraculeux que fit Jésus. Cela se passa à Cana en Galilée. Il révéla ainsi sa gloire, et ses disciples crurent en lui. '
  '12':
  - type: text
    content: Après cela, Jésus descendit à Capernaüm avec sa mère, ses frères et ses disciples ; mais ils n’y restèrent que quelques jours.
  - type: heading
    content: Le premier affrontement au Temple
  - type: heading
    content: (voir Mt 21.12-17 ; Mc 11.15-17 ; Lc 19.45-46)
  '13':
  - type: text
    content: 'Le jour où les Juifs célèbrent la fête de la Pâque était proche et Jésus se rendit à Jérusalem. '
  '14':
  - type: text
    content: 'Il trouva, dans la cour du Temple, des marchands de bœufs, de brebis et de pigeons, ainsi que des changeurs d’argent, installés à leurs comptoirs. '
  '15':
  - type: text
    content: Alors il prit des cordes, en fit un fouet, et les chassa tous de l’enceinte sacrée avec les brebis et les bœufs
  - type: note
    content: 'Autre traduction : et les chassa tous, les brebis comme les bœufs.'
  - type: text
    content: '  ; il jeta par terre l’argent des changeurs et renversa leurs comptoirs, '
  '16':
  - type: text
    content: 'puis il dit aux marchands de pigeons : '
  - type: text
    content: Otez cela d’ici ! C’est la maison de mon Père. N’en faites pas une maison de commerce.
  '17':
  - type: text
    content: 'Les disciples se souvinrent alors de ce passage de l’Ecriture :'
  - type: text
    content: L’amour que j’ai pour ta maison,
  - type: text
    content: ô Dieu, est en moi un feu qui me consume
  - type: text
    content: ' '
  - type: note
    content: Ps 69.10 .
  - type: text
    content: .
  '18':
  - type: text
    content: 'Là-dessus, les gens lui dirent : Quel signe miraculeux peux-tu nous montrer pour prouver que tu as le droit d’agir ainsi ?'
  '19':
  - type: text
    content: ' '
  - type: text
    content: – Démolissez ce temple,
  - type: text
    content: ' leur répondit Jésus, '
  - type: text
    content: et en trois jours, je le relèverai.
  '2':
  - type: text
    content: Jésus avait aussi été invité au mariage avec ses disciples.
  '20':
  - type: text
    content: – Comment ? répondirent-ils. Il a fallu quarante-six ans pour reconstruire le Temple
  - type: note
    content: La reconstruction du temple dit « d’Hérode » avait commencé en l’an 20 av. J.-C.
  - type: text
    content: ', et toi, tu serais capable de le relever en trois jours !'
  '21':
  - type: text
    content: Mais en parlant du « temple », Jésus faisait allusion à son propre corps.
  '22':
  - type: text
    content: Plus tard, lorsque Jésus fut ressuscité, ses disciples se souvinrent qu’il avait dit cela, et ils crurent à l’Ecriture et à la parole que Jésus avait dite.
  - type: heading
    content: Jésus et Nicodème
  '23':
  - type: text
    content: 'Pendant que Jésus séjournait à Jérusalem pour la fête de la Pâque, beaucoup de gens crurent en lui en voyant les signes miraculeux qu’il accomplissait. '
  '24':
  - type: text
    content: 'Mais Jésus ne se fiait pas à eux, car il les connaissait tous très bien. '
  '25':
  - type: text
    content: En effet, il n’avait pas besoin qu’on le renseigne sur les hommes car il connaissait le fond de leur cœur.
  '3':
  - type: text
    content: 'Or voilà que le vin se mit à manquer. La mère de Jésus lui fit remarquer : Ils n’ont plus de vin.'
  '4':
  - type: text
    content: ' '
  - type: text
    content: – Ecoute,
  - type: text
    content: ' lui répondit Jésus, '
  - type: text
    content: est-ce toi ou moi que cette affaire concerne
  - type: note
    content: 'Autres traductions : que me veux-tu, mère ? ou femme, est-ce à toi de me dire ce que je dois faire ?'
  - type: text
    content: '? Mon heure n’est pas encore venue.'
  '5':
  - type: text
    content: 'Sa mère dit aux serviteurs : Faites tout ce qu’il vous dira.'
  '6':
  - type: text
    content: Il y avait là six jarres de pierre que les Juifs utilisaient pour leurs ablutions rituelles
  - type: note
    content: Les Israélites observaient des rites de purification avant, pendant et après les repas. L’eau était placée dans des vases de pierre.
  - type: text
    content: '. Chacune d’elles pouvait contenir entre quatre-vingts et cent vingt litres. '
  '7':
  - type: text
    content: 'Jésus dit aux serviteurs : '
  - type: text
    content: Remplissez d’eau ces jarres.
  - type: text
    content: Ils les remplirent jusqu’au bord.
  '8':
  - type: text
    content: ' '
  - type: text
    content: – Maintenant,
  - type: text
    content: ' leur dit-il, '
  - type: text
    content: prenez-en un peu et allez l’apporter à l’ordonnateur du repas.
  - type: text
    content: Ce qu’ils firent.
  '9':
  - type: text
    content: 'L’ordonnateur du repas goûta l’eau qui avait été changée en vin. Il ne savait pas d’où venait ce vin, alors que les serviteurs le savaient, puisqu’ils avaient puisé l’eau. Aussitôt il fit appeler le marié '
