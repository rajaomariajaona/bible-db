document_id: EXO.37
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Le coffre de l’alliance et le propitiatoire
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '37.1 titre '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Pour les v. 1-9, voir '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 25.10-22
        metadata:
          usfm: EXO.25.10+EXO.25.11+EXO.25.12+EXO.25.13+EXO.25.14+EXO.25.15+EXO.25.16+EXO.25.17+EXO.25.18+EXO.25.19+EXO.25.20+EXO.25.21+EXO.25.22
      - type: text
        text: '. En hébreu, les mesures sont en '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'coudées, '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'sauf au v. 12, où il s’agit d’un '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'palme. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Au v. 24, le poids est d’un '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: talent.
    marker-yv: yv-n
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Betsaléel fabriqua le coffre en bois d’acacia ; il avait cent vingt-cinq centimètres de long, soixante-quinze centimètres de large et soixante-quinze centimètres de haut. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Il le plaqua d’or pur à l’intérieur et à l’extérieur et le garnit d’une bordure d’or tout autour. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Il coula pour lui quatre anneaux d’or qu’il fixa à ses quatre coins, deux de chaque côté. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Il fit des barres en bois d’acacia qu’il plaqua d’or. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Il les engagea dans les anneaux le long des côtés du coffre pour qu’on puisse le porter.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Il fit le propitiatoire en or pur. Il avait cent vingt-cinq centimètres de long et soixante-quinze centimètres de large. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Il façonna au marteau deux chérubins en or massif qu’il fixa aux deux extrémités du propitiatoire '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'de manière à ce qu’ils fassent corps avec lui. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Les chérubins déployaient leurs ailes vers le haut pour couvrir le propitiatoire et se faisaient face, le regard dirigé vers le propitiatoire.
- type: usfm
  marker: s1
  children:
  - type: text
    text: La table et ses accessoires
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '37.10 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Pour les v. 10-16, voir '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 25.23-30
        metadata:
          usfm: EXO.25.23+EXO.25.24+EXO.25.25+EXO.25.26+EXO.25.27+EXO.25.28+EXO.25.29+EXO.25.30
      - type: text
        text: .
    marker-yv: yv-n
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Betsaléel fabriqua la table en bois d’acacia, d’un mètre de long, de cinquante centimètres de large et de soixante-quinze centimètres de haut. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Il la plaqua d’or pur et garnit son pourtour d’une bordure d’or. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Il lui fit un cadre de huit centimètres qu’il garnit d’une bordure d’or. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Il coula quatre anneaux d’or qu’il fixa aux quatre coins près des quatre pieds de la table. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Il plaça ces anneaux tout près du cadre pour recevoir les barres destinées à porter la table. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Il fit les barres en bois d’acacia et les plaqua d’or. Elles servaient à transporter la table. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Il fit d’or pur les accessoires qu’on devait mettre sur la table, les plats, les coupes, les bols et les carafes qui servaient aux libations.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Le chandelier et ses lampes
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '37.17 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Pour les v. 17-24, voir '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 25.31-40
        metadata:
          usfm: EXO.25.31+EXO.25.32+EXO.25.33+EXO.25.34+EXO.25.35+EXO.25.36+EXO.25.37+EXO.25.38+EXO.25.39+EXO.25.40
      - type: text
        text: .
    marker-yv: yv-n
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Il fabriqua le chandelier en or pur ; le chandelier, son pied et sa tige furent travaillés au marteau ; des coupelles, calices et corolles en étaient issus. '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Six branches en partaient latéralement, trois de chaque côté. '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Chaque branche portait trois coupelles en forme de fleur d’amandier avec un calice et une corolle. Il en était ainsi des six branches du chandelier. '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Le pied portait quatre coupelles en forme de fleur d’amandier avec un calice et une corolle : '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'il y avait un calice sous chacune des trois paires de branches du chandelier, correspondant aux six branches sortant du chandelier. '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Ces calices et ces branches faisaient corps avec lui : le tout était fait d’une seule masse d’or pur martelé.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Il fabriqua aussi les sept lampes avec les pincettes et les mouchettes en or pur. '
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: On employa trente kilogrammes d’or pur pour le chandelier et tous ses accessoires.
- type: usfm
  marker: s1
  children:
  - type: text
    text: L’autel des parfums et le parfum
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Betsaléel fabriqua l’autel des parfums en bois d’acacia, il était carré, de cinquante centimètres de côté, et était relevé aux angles de quatre cornes en saillie. Il avait un mètre de hauteur. '
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Il en plaqua d’or pur le plateau, les parois tout autour et les cornes et le garnit d’une bordure d’or qui en faisait le tour. '
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'Il lui fit deux anneaux d’or qu’il fixa sous la bordure de part et d’autre, sur les deux parois, pour recevoir les barres servant à transporter l’autel. '
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: Il fit ces barres en bois d’acacia plaqué d’or
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '37.28 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Pour les v. 25-28, voir '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 30.1-10
        metadata:
          usfm: EXO.30.1+EXO.30.2+EXO.30.3+EXO.30.4+EXO.30.5+EXO.30.6+EXO.30.7+EXO.30.8+EXO.30.9+EXO.30.10
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: Il fit faire l’huile d’onction sainte et le parfum aromatique pur par un parfumeur
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '37.29 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Voir '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 30.22-28
        metadata:
          usfm: EXO.30.22+EXO.30.23+EXO.30.24+EXO.30.25+EXO.30.26+EXO.30.27+EXO.30.28
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: .
