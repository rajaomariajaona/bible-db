    children:
    - type: text
      text: Le coffre de l’alliance et le propitiatoire
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '37.1 titre '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Pour les v. 1-9, voir '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: 25.10-22
        - type: text
          text: '. En hébreu, les mesures sont en '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'coudées, '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'sauf au v. 12, où il s’agit d’un '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'palme. '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Au v. 24, le poids est d’un '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: talent.
      marker-yv: yv-n
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Betsaléel fabriqua le coffre en bois d’acacia ; il avait cent vingt-cinq centimètres de long, soixante-quinze centimètres de large et soixante-quinze centimètres de haut. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Betsaléel fabriqua la table en bois d’acacia, d’un mètre de long, de cinquante centimètres de large et de soixante-quinze centimètres de haut. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Il la plaqua d’or pur et garnit son pourtour d’une bordure d’or. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Il lui fit un cadre de huit centimètres qu’il garnit d’une bordure d’or. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Il coula quatre anneaux d’or qu’il fixa aux quatre coins près des quatre pieds de la table. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Il plaça ces anneaux tout près du cadre pour recevoir les barres destinées à porter la table. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Il fit les barres en bois d’acacia et les plaqua d’or. Elles servaient à transporter la table. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Il fit d’or pur les accessoires qu’on devait mettre sur la table, les plats, les coupes, les bols et les carafes qui servaient aux libations.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Le chandelier et ses lampes
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '37.17 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Pour les v. 17-24, voir '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: 25.31-40
        - type: text
          text: .
      marker-yv: yv-n
    marker-yv: yv-h
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Il fabriqua le chandelier en or pur ; le chandelier, son pied et sa tige furent travaillés au marteau ; des coupelles, calices et corolles en étaient issus. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Six branches en partaient latéralement, trois de chaque côté. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Chaque branche portait trois coupelles en forme de fleur d’amandier avec un calice et une corolle. Il en était ainsi des six branches du chandelier. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Il le plaqua d’or pur à l’intérieur et à l’extérieur et le garnit d’une bordure d’or tout autour. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Le pied portait quatre coupelles en forme de fleur d’amandier avec un calice et une corolle : '
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'il y avait un calice sous chacune des trois paires de branches du chandelier, correspondant aux six branches sortant du chandelier. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ces calices et ces branches faisaient corps avec lui : le tout était fait d’une seule masse d’or pur martelé.'
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Il fabriqua aussi les sept lampes avec les pincettes et les mouchettes en or pur. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: On employa trente kilogrammes d’or pur pour le chandelier et tous ses accessoires.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: L’autel des parfums et le parfum
    marker-yv: yv-h
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Betsaléel fabriqua l’autel des parfums en bois d’acacia, il était carré, de cinquante centimètres de côté, et était relevé aux angles de quatre cornes en saillie. Il avait un mètre de hauteur. '
  '26':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Il en plaqua d’or pur le plateau, les parois tout autour et les cornes et le garnit d’une bordure d’or qui en faisait le tour. '
  '27':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Il lui fit deux anneaux d’or qu’il fixa sous la bordure de part et d’autre, sur les deux parois, pour recevoir les barres servant à transporter l’autel. '
  '28':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Il fit ces barres en bois d’acacia plaqué d’or
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '37.28 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Pour les v. 25-28, voir '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: 30.1-10
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: '. '
  '29':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Il fit faire l’huile d’onction sainte et le parfum aromatique pur par un parfumeur
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '37.29 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Voir '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: 30.22-28
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: .
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Il coula pour lui quatre anneaux d’or qu’il fixa à ses quatre coins, deux de chaque côté. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Il fit des barres en bois d’acacia qu’il plaqua d’or. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Il les engagea dans les anneaux le long des côtés du coffre pour qu’on puisse le porter.
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Il fit le propitiatoire en or pur. Il avait cent vingt-cinq centimètres de long et soixante-quinze centimètres de large. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Il façonna au marteau deux chérubins en or massif qu’il fixa aux deux extrémités du propitiatoire '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'de manière à ce qu’ils fassent corps avec lui. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Les chérubins déployaient leurs ailes vers le haut pour couvrir le propitiatoire et se faisaient face, le regard dirigé vers le propitiatoire.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: La table et ses accessoires
