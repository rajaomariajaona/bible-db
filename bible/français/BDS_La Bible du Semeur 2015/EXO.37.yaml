document_id: EXO.37,21
type_code: fra
verses:
  '1':
  - type: heading
    content: Le coffre de l’alliance et le propitiatoirePour les v. 1-9, voir 25.10-22. En hébreu, les mesures sont en coudées, sauf au v. 12, où il s’agit d’un palme. Au v. 24, le poids est d’un talent.
  - type: text
    content: 'Betsaléel fabriqua le coffre en bois d’acacia ; il avait cent vingt-cinq centimètres de long, soixante-quinze centimètres de large et soixante-quinze centimètres de haut. '
  '10':
  - type: text
    content: 'Betsaléel fabriqua la table en bois d’acacia, d’un mètre de long, de cinquante centimètres de large et de soixante-quinze centimètres de haut. '
  '11':
  - type: text
    content: 'Il la plaqua d’or pur et garnit son pourtour d’une bordure d’or. '
  '12':
  - type: text
    content: 'Il lui fit un cadre de huit centimètres qu’il garnit d’une bordure d’or. '
  '13':
  - type: text
    content: 'Il coula quatre anneaux d’or qu’il fixa aux quatre coins près des quatre pieds de la table. '
  '14':
  - type: text
    content: 'Il plaça ces anneaux tout près du cadre pour recevoir les barres destinées à porter la table. '
  '15':
  - type: text
    content: 'Il fit les barres en bois d’acacia et les plaqua d’or. Elles servaient à transporter la table. '
  '16':
  - type: text
    content: Il fit d’or pur les accessoires qu’on devait mettre sur la table, les plats, les coupes, les bols et les carafes qui servaient aux libations.
  - type: heading
    content: Le chandelier et ses lampesPour les v. 17-24, voir 25.31-40.
  '17':
  - type: text
    content: 'Il fabriqua le chandelier en or pur ; le chandelier, son pied et sa tige furent travaillés au marteau ; des coupelles, calices et corolles en étaient issus. '
  '18':
  - type: text
    content: 'Six branches en partaient latéralement, trois de chaque côté. '
  '19':
  - type: text
    content: 'Chaque branche portait trois coupelles en forme de fleur d’amandier avec un calice et une corolle. Il en était ainsi des six branches du chandelier. '
  '2':
  - type: text
    content: 'Il le plaqua d’or pur à l’intérieur et à l’extérieur et le garnit d’une bordure d’or tout autour. '
  '20':
  - type: text
    content: 'Le pied portait quatre coupelles en forme de fleur d’amandier avec un calice et une corolle : '
  '21':
  - type: text
    content: 'il y avait un calice sous chacune des trois paires de branches du chandelier, correspondant aux six branches sortant du chandelier. '
  '22':
  - type: text
    content: 'Ces calices et ces branches faisaient corps avec lui : le tout était fait d’une seule masse d’or pur martelé.'
  '23':
  - type: text
    content: 'Il fabriqua aussi les sept lampes avec les pincettes et les mouchettes en or pur. '
  '24':
  - type: text
    content: On employa trente kilogrammes d’or pur pour le chandelier et tous ses accessoires.
  - type: heading
    content: L’autel des parfums et le parfum
  '25':
  - type: text
    content: 'Betsaléel fabriqua l’autel des parfums en bois d’acacia, il était carré, de cinquante centimètres de côté, et était relevé aux angles de quatre cornes en saillie. Il avait un mètre de hauteur. '
  '26':
  - type: text
    content: 'Il en plaqua d’or pur le plateau, les parois tout autour et les cornes et le garnit d’une bordure d’or qui en faisait le tour. '
  '27':
  - type: text
    content: 'Il lui fit deux anneaux d’or qu’il fixa sous la bordure de part et d’autre, sur les deux parois, pour recevoir les barres servant à transporter l’autel. '
  '28':
  - type: text
    content: Il fit ces barres en bois d’acacia plaqué d’or
  - type: note
    content: Pour les v. 25-28, voir 30.1-10.
  - type: text
    content: '. '
  '29':
  - type: text
    content: Il fit faire l’huile d’onction sainte et le parfum aromatique pur par un parfumeur
  - type: note
    content: Voir 30.22-28.
  - type: text
    content: .
  '3':
  - type: text
    content: 'Il coula pour lui quatre anneaux d’or qu’il fixa à ses quatre coins, deux de chaque côté. '
  '4':
  - type: text
    content: 'Il fit des barres en bois d’acacia qu’il plaqua d’or. '
  '5':
  - type: text
    content: Il les engagea dans les anneaux le long des côtés du coffre pour qu’on puisse le porter.
  '6':
  - type: text
    content: 'Il fit le propitiatoire en or pur. Il avait cent vingt-cinq centimètres de long et soixante-quinze centimètres de large. '
  '7':
  - type: text
    content: 'Il façonna au marteau deux chérubins en or massif qu’il fixa aux deux extrémités du propitiatoire '
  '8':
  - type: text
    content: 'de manière à ce qu’ils fassent corps avec lui. '
  '9':
  - type: text
    content: Les chérubins déployaient leurs ailes vers le haut pour couvrir le propitiatoire et se faisaient face, le regard dirigé vers le propitiatoire.
  - type: heading
    content: La table et ses accessoiresPour les v. 10-16, voir 25.23-30.
