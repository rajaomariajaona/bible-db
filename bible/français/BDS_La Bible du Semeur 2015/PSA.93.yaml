document_id: PSA.93,21
type_code: fra
verses:
  '1':
  - type: heading
    content: L’Eternel règne depuis toujours et pour toujours
  - type: text
    content: L’Eternel règne. ╵Il est vêtu de majesté.
  - type: text
    content: Il est revêtu et ceint de puissance.
  - type: text
    content: C’est pourquoi le monde est fermement établi, ╵il ne vacille pas.
  '2':
  - type: text
    content: Dès l’origine, ╵ton trône est ferme,
  - type: text
    content: oui, tu existes ╵depuis toujours
  - type: note
    content: 'La version syriaque a : depuis toujours tu es Dieu (voir 90.2).'
  - type: text
    content: '  !'
  '3':
  - type: text
    content: O Eternel, les fleuves font entendre,
  - type: text
    content: les fleuves font entendre leur grand bruit,
  - type: text
    content: les fleuves font entendre ╵leur grondement.
  '4':
  - type: text
    content: Plus que le bruit des grandes eaux,
  - type: text
    content: plus puissant que les flots des mers,
  - type: text
    content: l’Eternel est puissant ╵dans les hauteurs !
  '5':
  - type: text
    content: Tes stipulations sont tout à fait sûres ;
  - type: text
    content: la sainteté ╵caractérise ta demeure,
  - type: text
    content: ô Eternel, ╵pour tous les temps.
