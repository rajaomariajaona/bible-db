document_id: PSA.93,21
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: L’Eternel règne depuis toujours et pour toujours
    marker-yv: yv-h
  - type: usfm
    marker: q1
    children:
    - type: text
      text: L’Eternel règne. ╵Il est vêtu de majesté.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Il est revêtu et ceint de puissance.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: C’est pourquoi le monde est fermement établi, ╵il ne vacille pas.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Dès l’origine, ╵ton trône est ferme,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: oui, tu existes ╵depuis toujours
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '93.2 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'La version syriaque a : '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'depuis toujours tu es Dieu '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '(voir '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: '90.2'
        - type: text
          text: ).
      marker-yv: yv-n
    - type: text
      text: '  !'
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: O Eternel, les fleuves font entendre,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: les fleuves font entendre leur grand bruit,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: les fleuves font entendre ╵leur grondement.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Plus que le bruit des grandes eaux,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: plus puissant que les flots des mers,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: l’Eternel est puissant ╵dans les hauteurs !
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tes stipulations sont tout à fait sûres ;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: la sainteté ╵caractérise ta demeure,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ô Eternel, ╵pour tous les temps.
