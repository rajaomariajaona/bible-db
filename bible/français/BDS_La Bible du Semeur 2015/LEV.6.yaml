document_id: LEV.6,21
type_code: fra
verses:
  '1':
  - type: heading
    content: Les lois complémentaires destinées aux prêtres
  - type: text
    content: 'L’Eternel parla à Moïse en ces termes :'
  - type: heading
    content: Sur l’holocauste
  '10':
  - type: text
    content: 'On ne le fera pas cuire avec du levain. C’est la part que je leur ai donnée de mes offrandes consumées par le feu. C’est une chose très sainte, comme le sacrifice pour le péché et le sacrifice de réparation. '
  '11':
  - type: text
    content: Tous les hommes descendants d’Aaron
  - type: note
    content: Ces parties énumérées étaient réservées aux hommes (comparer 6.22 ; 7.6), d’autres pouvaient être aussi consommées par les membres féminins de la famille sacerdotale (10.14 ; 22.12-13).
  - type: text
    content: ' pourront en manger. C’est la part qui leur revient pour toujours, de génération en génération, sur les offrandes consumées par le feu qui appartiennent à l’Eternel. Tous ceux qui y toucheront seront sacrés.'
  '12':
  - type: text
    content: 'L’Eternel parla à Moïse en ces termes : '
  '13':
  - type: text
    content: 'Voici ce qu’Aaron et ses fils offriront à l’Eternel le jour où ils recevront l’onction : trois kilogrammes de fleur de farine, à titre d’offrande permanente, la moitié le matin et l’autre moitié le soir. '
  '14':
  - type: text
    content: Cette farine sera pétrie avec de l’huile et la pâte obtenue sera cuite à la poêle. Tu offriras cette galette en morceaux, produisant ainsi une odeur apaisante pour l’Eternel
  - type: note
    content: 'Le prêtre faisait six galettes avec chaque moitié de la farine. Il offrait donc douze galettes chaque jour, selon le nombre des tribus d’Israël présentées ainsi symboliquement en hommage à l’Eternel. En morceaux: terme hébreu de sens incertain.'
  - type: text
    content: .
  '15':
  - type: text
    content: 'Le fils d’Aaron qui aura reçu l’onction pour lui succéder comme prêtre fera aussi cette offrande : c’est la part qui revient pour toujours à l’Eternel ; elle sera entièrement brûlée'
  - type: note
    content: Puisqu’il offrait ce sacrifice pour lui-même.
  - type: text
    content: '. '
  '16':
  - type: text
    content: 'Toute offrande faite par un prêtre sera entièrement brûlée : on n’en mangera rien.'
  - type: heading
    content: Sur le sacrifice pour le péché
  '17':
  - type: text
    content: 'L’Eternel parla à Moïse en ces termes : '
  '18':
  - type: text
    content: 'Dis à Aaron et à ses fils : Voici la loi concernant le sacrifice pour le péché : la victime pour ce sacrifice sera égorgée devant l’Eternel au même endroit que l’holocauste. C’est une chose très sainte.'
  '19':
  - type: text
    content: 'Le prêtre qui officie pour ce sacrifice la mangera ; il le fera dans un lieu saint, dans le parvis de la tente de la Rencontre. '
  '2':
  - type: text
    content: 'Transmets ces commandements à Aaron et à ses fils : Voici la loi concernant l’holocauste'
  - type: note
    content: Il s’agit de l’holocauste public offert tous les matins et tous les soirs pour le peuple.
  - type: text
    content: '  : l’holocauste restera sur le foyer de l’autel toute la nuit jusqu’au matin et le feu y restera allumé. '
  '20':
  - type: text
    content: 'Quiconque entrera en contact avec la viande de ce sacrifice sera sacré. Si du sang gicle sur un vêtement, tu laveras ce qui a été taché dans un lieu saint. '
  '21':
  - type: text
    content: 'Si on a fait cuire la viande du sacrifice dans un récipient de terre, on le brisera, si c’est dans une marmite en bronze qu’on l’a fait cuire, on la nettoiera, puis on la rincera à grande eau. '
  '22':
  - type: text
    content: 'Tous les hommes de la famille du prêtre pourront manger de cette viande ; c’est une chose très sainte. '
  '23':
  - type: text
    content: Toutefois, on ne mangera aucune viande d’un sacrifice pour le péché dont on doit porter du sang dans la tente de la Rencontre pour accomplir le rite d’expiation dans le sanctuaire. Elle sera brûlée au feu
  - type: note
    content: Voir Lv 4.3-21.
  - type: text
    content: .
  '3':
  - type: text
    content: 'Le matin, le prêtre mettra ses caleçons de lin et sa tunique de lin, il enlèvera les cendres grasses provenant de la combustion de l’holocauste sur l’autel et les déposera à côté de l’autel. '
  '4':
  - type: text
    content: Puis il changera de vêtements
  - type: note
    content: Les vêtements des prêtres étaient réservés au sanctuaire (voir Ez 44.17-19).
  - type: text
    content: ' et emportera les cendres hors du camp dans un endroit rituellement pur. '
  '5':
  - type: text
    content: Le feu devra rester allumé sur l’autel et ne jamais s’éteindre
  - type: note
    content: Parce qu’il symbolisait le culte perpétuel que le peuple devait rendre à son Dieu.
  - type: text
    content: '. Le prêtre l’alimentera en bois tous les matins, il disposera l’holocauste dessus et y brûlera les graisses des sacrifices de communion. '
  '6':
  - type: text
    content: Le feu sera perpétuellement allumé sur l’autel, il ne devra jamais s’éteindre.
  - type: heading
    content: Sur l’offrande
  '7':
  - type: text
    content: 'Voici la loi concernant l’offrande : les fils d’Aaron l’apporteront devant l’Eternel, devant l’autel. '
  '8':
  - type: text
    content: 'L’un des prêtres prélèvera une poignée de fleur de farine de l’offrande, avec de l’huile et tout l’encens qui se trouve sur l’offrande, et il les brûlera sur l’autel pour produire une odeur apaisante et que ce soit un mémorial pour l’Eternel. '
  '9':
  - type: text
    content: 'Ce qui restera de l’offrande sera mangé par Aaron et ses fils ; ils le mangeront sans levain dans un lieu saint, dans le parvis de la tente de la Rencontre. '
