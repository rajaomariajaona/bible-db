document_id: LEV.6
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Les lois complémentaires destinées aux prêtres
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'L’Eternel parla à Moïse en ces termes :'
- type: usfm
  marker: s2
  children:
  - type: text
    text: Sur l’holocauste
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Transmets ces commandements à Aaron et à ses fils : Voici la loi concernant l’holocauste'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '6.2 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Il s’agit de l’holocauste public offert tous les matins et tous les soirs pour le peuple.
    marker-yv: yv-n
  - type: text
    text: '  : l’holocauste restera sur le foyer de l’autel toute la nuit jusqu’au matin et le feu y restera allumé. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Le matin, le prêtre mettra ses caleçons de lin et sa tunique de lin, il enlèvera les cendres grasses provenant de la combustion de l’holocauste sur l’autel et les déposera à côté de l’autel. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Puis il changera de vêtements
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '6.4 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Les vêtements des prêtres étaient réservés au sanctuaire (voir '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ez 44.17-19
        metadata:
          usfm: EZK.44.17+EZK.44.18+EZK.44.19
      - type: text
        text: ).
    marker-yv: yv-n
  - type: text
    text: ' et emportera les cendres hors du camp dans un endroit rituellement pur. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Le feu devra rester allumé sur l’autel et ne jamais s’éteindre
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '6.5 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Parce qu’il symbolisait le culte perpétuel que le peuple devait rendre à son Dieu.
    marker-yv: yv-n
  - type: text
    text: '. Le prêtre l’alimentera en bois tous les matins, il disposera l’holocauste dessus et y brûlera les graisses des sacrifices de communion. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Le feu sera perpétuellement allumé sur l’autel, il ne devra jamais s’éteindre.
- type: usfm
  marker: s2
  children:
  - type: text
    text: Sur l’offrande
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Voici la loi concernant l’offrande : les fils d’Aaron l’apporteront devant l’Eternel, devant l’autel. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'L’un des prêtres prélèvera une poignée de fleur de farine de l’offrande, avec de l’huile et tout l’encens qui se trouve sur l’offrande, et il les brûlera sur l’autel pour produire une odeur apaisante et que ce soit un mémorial pour l’Eternel. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Ce qui restera de l’offrande sera mangé par Aaron et ses fils ; ils le mangeront sans levain dans un lieu saint, dans le parvis de la tente de la Rencontre. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'On ne le fera pas cuire avec du levain. C’est la part que je leur ai donnée de mes offrandes consumées par le feu. C’est une chose très sainte, comme le sacrifice pour le péché et le sacrifice de réparation. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Tous les hommes descendants d’Aaron
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '6.11 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Ces parties énumérées étaient réservées aux hommes (comparer 6.22 ; 7.6), d’autres pouvaient être aussi consommées par les membres féminins de la famille sacerdotale (10.14 ; 22.12-13).
    marker-yv: yv-n
  - type: text
    text: ' pourront en manger. C’est la part qui leur revient pour toujours, de génération en génération, sur les offrandes consumées par le feu qui appartiennent à l’Eternel. Tous ceux qui y toucheront seront sacrés.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'L’Eternel parla à Moïse en ces termes : '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Voici ce qu’Aaron et ses fils offriront à l’Eternel le jour où ils recevront l’onction : trois kilogrammes de fleur de farine, à titre d’offrande permanente, la moitié le matin et l’autre moitié le soir. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Cette farine sera pétrie avec de l’huile et la pâte obtenue sera cuite à la poêle. Tu offriras cette galette en morceaux, produisant ainsi une odeur apaisante pour l’Eternel
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '6.14 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Le prêtre faisait six galettes avec chaque moitié de la farine. Il offrait donc douze galettes chaque jour, selon le nombre des tribus d’Israël présentées ainsi symboliquement en hommage à l’Eternel. '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: En morceaux
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: ': '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: terme hébreu de sens incertain.
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Le fils d’Aaron qui aura reçu l’onction pour lui succéder comme prêtre fera aussi cette offrande : c’est la part qui revient pour toujours à l’Eternel ; elle sera entièrement brûlée'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '6.15 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Puisqu’il offrait ce sacrifice pour lui-même.
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Toute offrande faite par un prêtre sera entièrement brûlée : on n’en mangera rien.'
- type: usfm
  marker: s2
  children:
  - type: text
    text: Sur le sacrifice pour le péché
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'L’Eternel parla à Moïse en ces termes : '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Dis à Aaron et à ses fils : Voici la loi concernant le sacrifice pour le péché : la victime pour ce sacrifice sera égorgée devant l’Eternel au même endroit que l’holocauste. C’est une chose très sainte.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Le prêtre qui officie pour ce sacrifice la mangera ; il le fera dans un lieu saint, dans le parvis de la tente de la Rencontre. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Quiconque entrera en contact avec la viande de ce sacrifice sera sacré. Si du sang gicle sur un vêtement, tu laveras ce qui a été taché dans un lieu saint. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Si on a fait cuire la viande du sacrifice dans un récipient de terre, on le brisera, si c’est dans une marmite en bronze qu’on l’a fait cuire, on la nettoiera, puis on la rincera à grande eau. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Tous les hommes de la famille du prêtre pourront manger de cette viande ; c’est une chose très sainte. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: Toutefois, on ne mangera aucune viande d’un sacrifice pour le péché dont on doit porter du sang dans la tente de la Rencontre pour accomplir le rite d’expiation dans le sanctuaire. Elle sera brûlée au feu
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '6.23 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Voir '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Lv 4.3-21
        metadata:
          usfm: LEV.4.3+LEV.4.4+LEV.4.5+LEV.4.6+LEV.4.7+LEV.4.8+LEV.4.9+LEV.4.10+LEV.4.11+LEV.4.12+LEV.4.13+LEV.4.14+LEV.4.15+LEV.4.16+LEV.4.17+LEV.4.18+LEV.4.19+LEV.4.20+LEV.4.21
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: .
