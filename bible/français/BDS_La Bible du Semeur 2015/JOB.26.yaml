document_id: JOB.26,21
type_code: fra
verses:
  '1':
  - type: heading
    content: Réponse de Job à Bildad
  - type: heading
    content: On ne connaît ni ne comprend l’œuvre de Dieu
  - type: text
    content: 'Alors Job prit la parole et dit :'
  '10':
  - type: text
    content: Il a tracé un cercle ╵sur la face des eaux,
  - type: text
    content: au lieu où la lumière ╵rencontre les ténèbres.
  '11':
  - type: text
    content: Les colonnes du ciel ╵sont ébranlées,
  - type: text
    content: épouvantées, ╵à sa menace.
  '12':
  - type: text
    content: Par sa puissance, ╵il agite la mer ;
  - type: text
    content: par son intelligence, ╵il en brise le monstre
  - type: note
    content: 'Voir v. 13 ; 3.8 et note. Autre traduction : il en brise l’orgueil (voir 9.13 et note).'
  - type: text
    content: .
  '13':
  - type: text
    content: Sous l’effet de son souffle, ╵le ciel devient serein.
  - type: text
    content: Quant au serpent fuyard
  - type: note
    content: Voir Es 27.1 et note.
  - type: text
    content: ', ╵sa main l’a transpercé.'
  '14':
  - type: text
    content: Cependant, ce n’est là ╵qu’une infime partie ╵de ce qu’il accomplit,
  - type: text
    content: dont nous ne percevons ╵qu’un murmure léger.
  - type: text
    content: Qui pourra donc comprendre ╵les éclats de tonnerre ╵de sa puissance ?
  '2':
  - type: text
    content: Ah, comme tu sais bien ╵aider l’homme sans force,
  - type: text
    content: et secourir le bras ╵qui n’a plus de vigueur !
  '3':
  - type: text
    content: Quel bon conseil tu donnes ╵à celui qui se trouve ╵dépourvu de sagesse,
  - type: text
    content: et comme tu répands ╵la science à profusion !
  '4':
  - type: text
    content: Mais à qui donc, dis-moi, ╵s’adressent tes discours ?
  - type: text
    content: De quelle inspiration ╵émanent tes paroles ?
  '5':
  - type: text
    content: Tous ceux qui sont morts tremblent
  - type: text
    content: bien au-dessous des mers ╵et des êtres qui les habitent,
  '6':
  - type: text
    content: car le séjour des morts ╵est à nu devant Dieu,
  - type: text
    content: et le royaume des défunts
  - type: note
    content: 'En hébreu : Abaddôn, c’est-à-dire le lieu de destruction. Dans Ap 9.11, c’est le nom de l’ange de l’abîme.'
  - type: text
    content: ' ╵n’a rien pour se couvrir.'
  '7':
  - type: text
    content: Il étend sur le vide ╵la région de l’Arctique
  - type: text
    content: et il suspend la terre ╵au-dessus du néant.
  '8':
  - type: text
    content: Il enserre les eaux ╵dans ses nuées épaisses,
  - type: text
    content: mais jamais, sous leur poids, ╵les nuages n’éclatent.
  '9':
  - type: text
    content: Il a couvert d’un voile ╵la face de son trône
  - type: text
    content: en étendant sur lui ╵son épaisse nuée.
