document_id: JOB.26
type_code: fra
segments:
- type: usfm
  marker: ms1
  children:
  - type: text
    text: Réponse de Job à Bildad
  marker-yv: yv-h
- type: usfm
  marker: s1
  children:
  - type: text
    text: On ne connaît ni ne comprend l’œuvre de Dieu
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Alors Job prit la parole et dit :'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Ah, comme tu sais bien ╵aider l’homme sans force,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et secourir le bras ╵qui n’a plus de vigueur !
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Quel bon conseil tu donnes ╵à celui qui se trouve ╵dépourvu de sagesse,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et comme tu répands ╵la science à profusion !
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Mais à qui donc, dis-moi, ╵s’adressent tes discours ?
- type: usfm
  marker: q1
  children:
  - type: text
    text: De quelle inspiration ╵émanent tes paroles ?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Tous ceux qui sont morts tremblent
- type: usfm
  marker: q1
  children:
  - type: text
    text: bien au-dessous des mers ╵et des êtres qui les habitent,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: car le séjour des morts ╵est à nu devant Dieu,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et le royaume des défunts
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '26.6 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'En hébreu : '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'Abaddôn, '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'c’est-à-dire le lieu de destruction. Dans '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ap 9.11
        metadata:
          usfm: REV.9.11
      - type: text
        text: ', c’est le nom de l’ange de l’abîme.'
    marker-yv: yv-n
  - type: text
    text: ' ╵n’a rien pour se couvrir.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Il étend sur le vide ╵la région de l’Arctique
- type: usfm
  marker: q1
  children:
  - type: text
    text: et il suspend la terre ╵au-dessus du néant.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Il enserre les eaux ╵dans ses nuées épaisses,
- type: usfm
  marker: q1
  children:
  - type: text
    text: mais jamais, sous leur poids, ╵les nuages n’éclatent.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Il a couvert d’un voile ╵la face de son trône
- type: usfm
  marker: q1
  children:
  - type: text
    text: en étendant sur lui ╵son épaisse nuée.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Il a tracé un cercle ╵sur la face des eaux,
- type: usfm
  marker: q1
  children:
  - type: text
    text: au lieu où la lumière ╵rencontre les ténèbres.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Les colonnes du ciel ╵sont ébranlées,
- type: usfm
  marker: q1
  children:
  - type: text
    text: épouvantées, ╵à sa menace.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Par sa puissance, ╵il agite la mer ;
- type: usfm
  marker: q1
  children:
  - type: text
    text: par son intelligence, ╵il en brise le monstre
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '26.12 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Voir v. 13 ; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '3.8'
        metadata:
          usfm: JOB.3.8
      - type: text
        text: ' et note. Autre traduction : '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'il en brise l’orgueil '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '(voir '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '9.13'
        metadata:
          usfm: JOB.9.13
      - type: text
        text: ' et note).'
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Sous l’effet de son souffle, ╵le ciel devient serein.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Quant au serpent fuyard
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '26.13 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Voir '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Es 27.1
        metadata:
          usfm: ISA.27.1
      - type: text
        text: ' et note.'
    marker-yv: yv-n
  - type: text
    text: ', ╵sa main l’a transpercé.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Cependant, ce n’est là ╵qu’une infime partie ╵de ce qu’il accomplit,
- type: usfm
  marker: q1
  children:
  - type: text
    text: dont nous ne percevons ╵qu’un murmure léger.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Qui pourra donc comprendre ╵les éclats de tonnerre ╵de sa puissance ?
