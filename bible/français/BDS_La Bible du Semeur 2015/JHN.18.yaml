document_id: JHN.18,21
type_code: fra
verses:
  '1':
  - type: heading
    content: Du rejet au triomphe
  - type: heading
    content: L’arrestation de Jésus
  - type: heading
    content: (Mt 26.47-56 ; Mc 14.43-50 ; Lc 22.47-53)
  - type: text
    content: Après avoir ainsi parlé, Jésus s’en alla avec ses disciples et traversa le torrent du Cédron. Il y avait là un jardin où il entra avec eux.
  '10':
  - type: text
    content: Simon Pierre, qui avait une épée, la dégaina, en donna un coup au serviteur du grand-prêtre et lui coupa l’oreille droite. Ce serviteur s’appelait Malchus.
  '11':
  - type: text
    content: 'Jésus dit à Pierre : '
  - type: text
    content: Remets ton épée au fourreau. Ne dois-je pas boire la coupe du jugement
  - type: note
    content: Voir Es 51.17, 22 ; Jr 25.15-29.
  - type: text
    content: ' '
  - type: text
    content: que le Père m’a destinée ?
  - type: heading
    content: Jésus est conduit chez Hanne
  - type: heading
    content: (Mt 26.57-58 ; Mc 14.53-54 ; Lc 22.54)
  '12':
  - type: text
    content: 'Alors la cohorte, son commandant et les gardes des Juifs s’emparèrent de Jésus '
  '13':
  - type: text
    content: et le conduisirent enchaîné tout d’abord chez Hanne
  - type: note
    content: Hanne avait été grand-prêtre avant Caïphe. Il avait été déposé par les Romains en l’an 15, mais il continuait à exercer une grande influence sous le ministère de Caïphe, son gendre. Beaucoup de Juifs le considéraient encore comme le grand-prêtre.
  - type: text
    content: ', le beau-père de Caïphe, qui était le grand-prêtre en exercice cette année-là. '
  '14':
  - type: text
    content: Caïphe était celui qui avait suggéré aux Juifs qu’il valait mieux qu’un seul homme meure pour le peuple.
  - type: heading
    content: Le premier reniement de Pierre
  - type: heading
    content: (Mt 26.69-70 ; Mc 14.66-68 ; Lc 22.55-57)
  '15':
  - type: text
    content: 'Simon Pierre et un autre disciple suivirent Jésus. Ce disciple connaissait personnellement le grand-prêtre, et il entra en même temps que Jésus dans la cour du palais du grand-prêtre. '
  '16':
  - type: text
    content: Pierre, lui, resta dehors près du portail. L’autre disciple qui connaissait le grand-prêtre ressortit donc, dit un mot à la concierge, et fit entrer Pierre.
  '17':
  - type: text
    content: 'La servante qui gardait la porte demanda alors à Pierre : Ne fais-tu pas partie, toi aussi, des disciples de cet homme ?'
  - type: text
    content: – Non, lui répondit-il, je n’en suis pas.
  '18':
  - type: text
    content: Les serviteurs et les gardes avaient allumé un feu de braise car il faisait froid, et ils se tenaient tout autour pour se réchauffer. Pierre se joignit à eux et se réchauffa également.
  - type: heading
    content: Jésus devant le grand-prêtre
  - type: heading
    content: (Mt 26.59-66 ; Mc 14.55-64 ; Lc 22.66-71)
  '19':
  - type: text
    content: De son côté, le grand-prêtre commença à interroger Jésus sur ses disciples et sur son enseignement.
  '2':
  - type: text
    content: 'Or Judas, qui le trahissait, connaissait bien cet endroit, car Jésus s’y était souvent rendu avec ses disciples. '
  '20':
  - type: text
    content: 'Jésus lui répondit : '
  - type: text
    content: 'J’ai parlé ouvertement devant tout le monde. J’ai toujours enseigné dans les '
  - type: text
    content: synagogues
  - type: text
    content: ' et dans la cour du '
  - type: text
    content: Temple
  - type: text
    content: ', où tous les Juifs se réunissent. Je n’ai rien dit en secret.'
  - type: text
    content: ' '
  '21':
  - type: text
    content: Pourquoi donc m’interroges-tu ? Demande à ceux qui m’ont écouté ce que j’ai dit. Ils savent fort bien ce que j’ai dit.
  '22':
  - type: text
    content: 'A ces mots, un des gardes qui se tenait à côté de lui le gifla en disant : C’est comme cela que tu réponds au grand-prêtre ?'
  '23':
  - type: text
    content: 'Jésus lui répondit : '
  - type: text
    content: Si j’ai mal parlé, montre en quoi c’est mal. Mais si ce que j’ai dit est vrai, pourquoi me frappes-tu ?
  '24':
  - type: text
    content: Hanne l’envoya enchaîné à Caïphe, le grand-prêtre.
  - type: heading
    content: Les deuxième et troisième reniements de Pierre
  - type: heading
    content: (Mt 26.71-75 ; Mc 14.69-72 ; Lc 22.58-62)
  '25':
  - type: text
    content: 'Pendant ce temps, Simon Pierre se tenait toujours au même endroit et se chauffait. Plusieurs lui dirent : N’es-tu pas, toi aussi, un des disciples de cet homme ?'
  - type: text
    content: 'Mais Pierre le nia en disant : Non, je n’en suis pas.'
  '26':
  - type: text
    content: 'Un des serviteurs du grand-prêtre, parent de celui à qui Pierre avait coupé l’oreille, l’interpella : Voyons, ne t’ai-je pas vu avec lui dans le jardin ?'
  '27':
  - type: text
    content: Mais Pierre le nia de nouveau, et aussitôt, un coq se mit à chanter.
  - type: heading
    content: Jésus condamné à mort par Pilate
  - type: heading
    content: (Mt 27.1-2, 11-31 ; Mc 15.2-15 ; Lc 23.13-25)
  '28':
  - type: text
    content: De chez Caïphe, on amena Jésus au palais du gouverneur. C’était l’aube. Ceux qui l’avaient amené n’entrèrent pas eux-mêmes dans le palais afin de conserver leur pureté rituelle
  - type: note
    content: On considérait qu’entrer chez des non-Juifs rendait rituellement impur. Or il fallait être en état de pureté rituelle pour participer au repas de la Pâque (Nb 9.6).
  - type: text
    content: ' et de pouvoir manger ainsi le repas de la Pâque.'
  '29':
  - type: text
    content: 'C’est pourquoi Pilate sortit du palais pour les voir et leur demanda : De quoi accusez-vous cet homme ?'
  '3':
  - type: text
    content: Il prit donc la tête d’une troupe de soldats et de gardes fournis par les chefs des prêtres et les pharisiens, et il arriva dans ce jardin. Ces hommes étaient munis de lanternes, de torches et d’armes.
  '30':
  - type: text
    content: 'Ils lui répondirent : S’il n’avait rien fait de mal, nous ne te l’aurions pas livré.'
  '31':
  - type: text
    content: – Reprenez-le, répliqua Pilate, et jugez-le vous-mêmes d’après votre Loi.
  - type: text
    content: 'Mais ils lui répondirent : Nous n’avons pas le droit de mettre quelqu’un à mort.'
  '32':
  - type: text
    content: La parole par laquelle Jésus avait annoncé quelle mort il allait subir devait ainsi s’accomplir.
  '33':
  - type: text
    content: 'Pilate rentra donc dans le palais de justice et fit comparaître Jésus :'
  - type: text
    content: – Es-tu le roi des Juifs ? lui demanda-t-il.
  '34':
  - type: text
    content: ' '
  - type: text
    content: – Dis-tu cela de toi-même ou d’autres t’ont-ils dit cela à mon sujet ?
  - type: text
    content: ' répondit Jésus.'
  '35':
  - type: text
    content: – Est-ce que je suis juif, moi ? répliqua Pilate. Ce sont ceux de ton peuple et les chefs des prêtres qui t’ont livré à moi. Qu’as-tu fait ?
  '36':
  - type: text
    content: 'Jésus lui répondit : '
  - type: text
    content: 'Mon '
  - type: text
    content: royaume
  - type: text
    content: ' n’est pas de ce monde. Si mon royaume était de ce monde, mes serviteurs se seraient battus pour que je ne tombe pas aux mains des Juifs. Non, réellement, mon royaume n’est pas d’ici.'
  '37':
  - type: text
    content: – Es-tu donc roi ? reprit Pilate.
  - type: text
    content: '– Tu le dis toi-même : je suis roi ! Si je suis né et si je suis venu dans ce monde, c’est pour rendre témoignage à la vérité. Celui qui appartient à la vérité écoute ce que je dis.'
  '38':
  - type: text
    content: – Qu’est-ce que la vérité ? lui répondit Pilate.
  - type: text
    content: 'Là-dessus, il alla de nouveau trouver les Juifs et leur dit : En ce qui me concerne, je ne trouve chez cet homme aucune raison de le condamner. '
  '39':
  - type: text
    content: Il est d’usage que je vous relâche un prisonnier à l’occasion de la fête de la Pâque. Voulez-vous donc que je vous relâche le roi des Juifs ?
  '4':
  - type: text
    content: 'Jésus, qui savait tout ce qui allait lui arriver, s’avança vers eux et leur demanda : '
  - type: text
    content: Qui cherchez-vous ?
  '40':
  - type: text
    content: 'Ils lui répondirent en criant : Non ! Pas lui ! Barabbas !'
  - type: text
    content: Or, Barabbas était un bandit.
  '5':
  - type: text
    content: 'Ils lui répondirent : Jésus de Nazareth.'
  - type: text
    content: – Je suis Jésus,
  - type: text
    content: ' leur dit-il.'
  - type: text
    content: 'Au milieu d’eux se tenait Judas, celui qui le trahissait. '
  '6':
  - type: text
    content: 'Au moment même où Jésus leur dit : '
  - type: text
    content: « Je suis Jésus »,
  - type: text
    content: ' ils eurent un mouvement de recul et tombèrent par terre.'
  '7':
  - type: text
    content: 'Une seconde fois, il leur demanda : '
  - type: text
    content: Qui cherchez-vous ?
  - type: text
    content: – Jésus de Nazareth, répétèrent-ils.
  '8':
  - type: text
    content: ' '
  - type: text
    content: – Je vous ai dit que je suis Jésus,
  - type: text
    content: ' reprit-il. '
  - type: text
    content: Puisque c’est moi que vous venez chercher, laissez partir les autres.
  '9':
  - type: text
    content: 'Ainsi s’accomplit cette parole qu’il avait prononcée peu avant : '
  - type: text
    content: « Je n’ai perdu aucun de ceux que tu m’as donnés. »
