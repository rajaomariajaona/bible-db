document_id: JHN.18
type_code: fra
segments:
- type: usfm
  marker: ms1
  children:
  - type: text
    text: Du rejet au triomphe
  marker-yv: yv-h
- type: usfm
  marker: s1
  children:
  - type: text
    text: L’arrestation de Jésus
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: (Mt 26.47-56 ; Mc 14.43-50 ; Lc 22.47-53)
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Après avoir ainsi parlé, Jésus s’en alla avec ses disciples et traversa le torrent du Cédron. Il y avait là un jardin où il entra avec eux.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Or Judas, qui le trahissait, connaissait bien cet endroit, car Jésus s’y était souvent rendu avec ses disciples. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Il prit donc la tête d’une troupe de soldats et de gardes fournis par les chefs des prêtres et les pharisiens, et il arriva dans ce jardin. Ces hommes étaient munis de lanternes, de torches et d’armes.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Jésus, qui savait tout ce qui allait lui arriver, s’avança vers eux et leur demanda : '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Qui cherchez-vous ?
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Ils lui répondirent : Jésus de Nazareth.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: wj
    children:
    - type: text
      text: – Je suis Jésus,
  - type: text
    text: ' leur dit-il.'
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Au milieu d’eux se tenait Judas, celui qui le trahissait. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Au moment même où Jésus leur dit : '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: « Je suis Jésus »,
  - type: text
    text: ' ils eurent un mouvement de recul et tombèrent par terre.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Une seconde fois, il leur demanda : '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Qui cherchez-vous ?
- type: usfm
  marker: p
  children:
  - type: text
    text: – Jésus de Nazareth, répétèrent-ils.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: ' '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: – Je vous ai dit que je suis Jésus,
  - type: text
    text: ' reprit-il. '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Puisque c’est moi que vous venez chercher, laissez partir les autres.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Ainsi s’accomplit cette parole qu’il avait prononcée peu avant : '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: « Je n’ai perdu aucun de ceux que tu m’as donnés. »
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Simon Pierre, qui avait une épée, la dégaina, en donna un coup au serviteur du grand-prêtre et lui coupa l’oreille droite. Ce serviteur s’appelait Malchus.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Jésus dit à Pierre : '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Remets ton épée au fourreau. Ne dois-je pas boire la coupe du jugement
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '18.11 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Voir Es 51.17, 22 ; Jr 25.15-29.
    marker-yv: yv-n
  - type: text
    text: ' '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: que le Père m’a destinée ?
- type: usfm
  marker: s1
  children:
  - type: text
    text: Jésus est conduit chez Hanne
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: (Mt 26.57-58 ; Mc 14.53-54 ; Lc 22.54)
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Alors la cohorte, son commandant et les gardes des Juifs s’emparèrent de Jésus '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: et le conduisirent enchaîné tout d’abord chez Hanne
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '18.13 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Hanne '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: avait été grand-prêtre avant Caïphe. Il avait été déposé par les Romains en l’an 15, mais il continuait à exercer une grande influence sous le ministère de Caïphe, son gendre. Beaucoup de Juifs le considéraient encore comme le grand-prêtre.
    marker-yv: yv-n
  - type: text
    text: ', le beau-père de Caïphe, qui était le grand-prêtre en exercice cette année-là. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Caïphe était celui qui avait suggéré aux Juifs qu’il valait mieux qu’un seul homme meure pour le peuple.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Le premier reniement de Pierre
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: (Mt 26.69-70 ; Mc 14.66-68 ; Lc 22.55-57)
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Simon Pierre et un autre disciple suivirent Jésus. Ce disciple connaissait personnellement le grand-prêtre, et il entra en même temps que Jésus dans la cour du palais du grand-prêtre. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Pierre, lui, resta dehors près du portail. L’autre disciple qui connaissait le grand-prêtre ressortit donc, dit un mot à la concierge, et fit entrer Pierre.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'La servante qui gardait la porte demanda alors à Pierre : Ne fais-tu pas partie, toi aussi, des disciples de cet homme ?'
- type: usfm
  marker: p
  children:
  - type: text
    text: – Non, lui répondit-il, je n’en suis pas.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Les serviteurs et les gardes avaient allumé un feu de braise car il faisait froid, et ils se tenaient tout autour pour se réchauffer. Pierre se joignit à eux et se réchauffa également.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Jésus devant le grand-prêtre
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: (Mt 26.59-66 ; Mc 14.55-64 ; Lc 22.66-71)
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: De son côté, le grand-prêtre commença à interroger Jésus sur ses disciples et sur son enseignement.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Jésus lui répondit : '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'J’ai parlé ouvertement devant tout le monde. J’ai toujours enseigné dans les '
    - type: usfm
      marker: w
      children:
      - type: text
        text: synagogues
    - type: text
      text: ' et dans la cour du '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Temple
    - type: text
      text: ', où tous les Juifs se réunissent. Je n’ai rien dit en secret.'
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Pourquoi donc m’interroges-tu ? Demande à ceux qui m’ont écouté ce que j’ai dit. Ils savent fort bien ce que j’ai dit.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'A ces mots, un des gardes qui se tenait à côté de lui le gifla en disant : C’est comme cela que tu réponds au grand-prêtre ?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Jésus lui répondit : '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Si j’ai mal parlé, montre en quoi c’est mal. Mais si ce que j’ai dit est vrai, pourquoi me frappes-tu ?
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: Hanne l’envoya enchaîné à Caïphe, le grand-prêtre.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Les deuxième et troisième reniements de Pierre
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: (Mt 26.71-75 ; Mc 14.69-72 ; Lc 22.58-62)
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Pendant ce temps, Simon Pierre se tenait toujours au même endroit et se chauffait. Plusieurs lui dirent : N’es-tu pas, toi aussi, un des disciples de cet homme ?'
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Mais Pierre le nia en disant : Non, je n’en suis pas.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Un des serviteurs du grand-prêtre, parent de celui à qui Pierre avait coupé l’oreille, l’interpella : Voyons, ne t’ai-je pas vu avec lui dans le jardin ?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: Mais Pierre le nia de nouveau, et aussitôt, un coq se mit à chanter.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Jésus condamné à mort par Pilate
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: (Mt 27.1-2, 11-31 ; Mc 15.2-15 ; Lc 23.13-25)
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: De chez Caïphe, on amena Jésus au palais du gouverneur. C’était l’aube. Ceux qui l’avaient amené n’entrèrent pas eux-mêmes dans le palais afin de conserver leur pureté rituelle
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '18.28 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: On considérait qu’entrer chez des non-Juifs rendait rituellement impur. Or il fallait être en état de pureté rituelle pour participer au repas de la Pâque (
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Nb 9.6
        metadata:
          usfm: NUM.9.6
      - type: text
        text: ).
    marker-yv: yv-n
  - type: text
    text: ' et de pouvoir manger ainsi le repas de la Pâque.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'C’est pourquoi Pilate sortit du palais pour les voir et leur demanda : De quoi accusez-vous cet homme ?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'Ils lui répondirent : S’il n’avait rien fait de mal, nous ne te l’aurions pas livré.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: – Reprenez-le, répliqua Pilate, et jugez-le vous-mêmes d’après votre Loi.
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Mais ils lui répondirent : Nous n’avons pas le droit de mettre quelqu’un à mort.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: La parole par laquelle Jésus avait annoncé quelle mort il allait subir devait ainsi s’accomplir.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: 'Pilate rentra donc dans le palais de justice et fit comparaître Jésus :'
- type: usfm
  marker: p
  children:
  - type: text
    text: – Es-tu le roi des Juifs ? lui demanda-t-il.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: ' '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: – Dis-tu cela de toi-même ou d’autres t’ont-ils dit cela à mon sujet ?
  - type: text
    text: ' répondit Jésus.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: – Est-ce que je suis juif, moi ? répliqua Pilate. Ce sont ceux de ton peuple et les chefs des prêtres qui t’ont livré à moi. Qu’as-tu fait ?
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: 'Jésus lui répondit : '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'Mon '
    - type: usfm
      marker: w
      children:
      - type: text
        text: royaume
    - type: text
      text: ' n’est pas de ce monde. Si mon royaume était de ce monde, mes serviteurs se seraient battus pour que je ne tombe pas aux mains des Juifs. Non, réellement, mon royaume n’est pas d’ici.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: – Es-tu donc roi ? reprit Pilate.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: wj
    children:
    - type: text
      text: '– Tu le dis toi-même : je suis roi ! Si je suis né et si je suis venu dans ce monde, c’est pour rendre témoignage à la vérité. Celui qui appartient à la vérité écoute ce que je dis.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: text
    text: – Qu’est-ce que la vérité ? lui répondit Pilate.
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Là-dessus, il alla de nouveau trouver les Juifs et leur dit : En ce qui me concerne, je ne trouve chez cet homme aucune raison de le condamner. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '39'
  - type: text
    text: Il est d’usage que je vous relâche un prisonnier à l’occasion de la fête de la Pâque. Voulez-vous donc que je vous relâche le roi des Juifs ?
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '40'
  - type: text
    text: 'Ils lui répondirent en criant : Non ! Pas lui ! Barabbas !'
- type: usfm
  marker: p
  children:
  - type: text
    text: Or, Barabbas était un bandit.
