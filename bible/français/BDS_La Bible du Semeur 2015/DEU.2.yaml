document_id: DEU.2,21
type_code: fra
verses:
  '1':
  - type: heading
    content: Vers Canaan
  - type: heading
    content: Le contournement d’Edom, de Moab et d’Ammon
  - type: text
    content: Nous avons fait demi-tour et nous sommes repartis pour le désert en direction de la mer des Roseaux, comme l’Eternel me l’avait demandé. Pendant de longs jours, nous avons tourné autour de la montagne de Séir.
  '10':
  - type: text
    content: Autrefois, les Emim y habitaient
  - type: note
    content: 'Les versets 10-12 constituent une remarque explicative interrompant le discours de Moïse. Voir allusion aux Emim dans Gn 14.5. Pour les Anaqim : Nb 13.22, 33.'
  - type: text
    content: ', c’était un grand peuple, nombreux et de haute taille, comme les Anaqim. '
  '11':
  - type: text
    content: 'Ils passaient, eux aussi, de même que les Anaqim, pour des Rephaïm, et les Moabites les appellaient Emim. '
  '12':
  - type: text
    content: 'Auparavant, le pays de Séir était habité par les Horiens, mais les descendants d’Esaü les ont chassés : ils les ont exterminés et se sont établis à leur place, comme Israël a fait pour le pays que l’Eternel lui a donné en possession.'
  '13':
  - type: text
    content: « Maintenant, dit l’Eternel, en route, traversez le torrent du Zéred. » Nous avons donc traversé le torrent du Zéred
  - type: note
    content: Oued intermittent qui se jette dans la partie sud-est de la mer Morte.
  - type: text
    content: '. '
  '14':
  - type: text
    content: Entre notre départ de Qadesh-Barnéa et notre traversée du torrent du Zéred, il s’est écoulé trente-huit ans, le temps que disparaisse l’ensemble des hommes en âge de combattre, comme l’Eternel le leur avait juré
  - type: note
    content: Voir Nb 14.28-35.
  - type: text
    content: '. '
  '15':
  - type: text
    content: La main de l’Eternel vint même les atteindre à l’intérieur du camp, jusqu’à leur complète disparition.
  '16':
  - type: text
    content: 'Lorsque la mort eut fait disparaître du milieu du peuple tous les hommes en âge de porter les armes jusqu’au dernier, '
  '17':
  - type: text
    content: 'l’Eternel me dit : '
  '18':
  - type: text
    content: '« Aujourd’hui, tu franchiras la frontière de Moab et tu traverseras le pays d’Ar. '
  '19':
  - type: text
    content: Tu te trouveras en face des Ammonites. Ne les attaque pas et ne les provoque pas, car je ne te donne aucun territoire dans le pays des Ammonites ; en effet, c’est aux descendants de Loth que je l’ai donné en possession
  - type: note
    content: Pour l’origine des Ammonites, voir Gn 19.30-38. Ils s’étaient fixés à l’est du Jourdain, au nord des Moabites.
  - type: text
    content: . »
  '2':
  - type: text
    content: 'Alors l’Eternel me dit : '
  '20':
  - type: text
    content: Ce pays
  - type: note
    content: Les v. 20-23 interrompent le discours de Moïse par une nouvelle remarque explicative.
  - type: text
    content: ' aussi passait pour avoir été habité par des Rephaïm. Ceux-ci l’occupaient autrefois, et ils étaient appelés Zamzoummim par les Ammonites. '
  '21':
  - type: text
    content: 'C’était un grand peuple, nombreux et de haute taille comme les Anaqim, mais l’Eternel les avait détruits par les Ammonites, qui avaient pris possession de leur pays pour s’établir à leur place. '
  '22':
  - type: text
    content: 'Il fit pour les Ammonites comme pour les descendants d’Esaü qui demeurent dans le pays de Séir, pour lesquels il a détruit les Horiens et qui ont pris possession de leur pays, où ils ont habité à leur place jusqu’à ce jour. '
  '23':
  - type: text
    content: Il en est de même des Avviens qui habitent dans les villages jusqu’à Gaza ; les Crétois, venus de Crète
  - type: note
    content: Ces Crétois ont envahi cette région au xiie siècle av. J.-C. et furent appelés Philistins.
  - type: text
    content: ', les détruisirent et s’installèrent à leur place.'
  - type: heading
    content: La victoire sur Sihôn et Og
  '24':
  - type: text
    content: '« Allons, mettez-vous en route, dit l’Eternel, et traversez le torrent de l’Arnon. Je vais vous livrer Sihôn l’Amoréen, roi de Heshbôn, avec tout son pays. Commencez à prendre possession de son domaine, engagez le combat contre lui. '
  '25':
  - type: text
    content: Aujourd’hui je vais commencer à faire de vous la terreur de tous les peuples qui habitent sous le ciel, ils vous craindront tellement qu’au seul bruit de votre approche, ils se mettront à trembler et seront pris de panique en face de vous. »
  '26':
  - type: text
    content: 'Alors, depuis le désert de Qedémoth, j’ai envoyé à Sihôn, roi de Heshbôn, des émissaires, avec ce message de paix : '
  '27':
  - type: text
    content: '« Permets-nous de passer par ton pays. Nous suivrons uniquement la route sans nous en écarter ni à droite, ni à gauche. '
  '28':
  - type: text
    content: 'Tu nous fourniras à prix d’argent la nourriture que nous mangerons et tu nous donneras contre paiement l’eau que nous boirons, '
  '29':
  - type: text
    content: 'comme l’ont fait les descendants d’Esaü qui habitent en Séir et les Moabites qui vivent dans le pays d’Ar. Laisse-nous simplement passer à pied jusqu’à ce que nous ayons traversé le Jourdain pour entrer dans le pays que l’Eternel notre Dieu nous donne. » '
  '3':
  - type: text
    content: '« Vous avez fait assez longtemps le tour de ces montagnes, prenez la direction du nord. '
  '30':
  - type: text
    content: Mais Sihôn, roi de Heshbôn, refusa de nous laisser passer chez lui, car l’Eternel votre Dieu l’avait rendu inflexible et entêté, afin de le livrer en votre pouvoir – comme cela est arrivé.
  '31':
  - type: text
    content: 'Puis l’Eternel me dit : « Vois, j’ai commencé de vous livrer Sihôn et son pays. Entreprends la conquête de son pays. » '
  '32':
  - type: text
    content: 'Alors Sihôn se mit en campagne contre nous et nous attaqua à Yahats avec toute son armée. '
  '33':
  - type: text
    content: 'Mais l’Eternel notre Dieu le livra à notre merci, et nous l’avons vaincu, lui, ses fils et toute son armée. '
  '34':
  - type: text
    content: 'Nous nous sommes alors emparés de toutes ses villes et nous en avons exterminé la population pour la vouer à l’Eternel, hommes, femmes et enfants, sans laisser aucun survivant. '
  '35':
  - type: text
    content: 'Nous avons seulement gardé pour nous le bétail ainsi que le butin trouvé dans les villes conquises. '
  '36':
  - type: text
    content: 'Depuis Aroër sur la falaise au-dessus du torrent de l’Arnon, et depuis la ville qui est au fond des gorges du torrent jusqu’à Galaad, il n’y a pas eu de cité imprenable pour nous, car l’Eternel notre Dieu nous les a toutes livrées. '
  '37':
  - type: text
    content: Mais vous ne vous êtes pas approchés du pays des Ammonites, ni d’aucun endroit situé sur la rive du torrent du Yabboq, ni des villes de la montagne, ni d’aucun des lieux que l’Eternel notre Dieu nous avait commandé d’épargner.
  '4':
  - type: text
    content: 'Ordonne au peuple : “Vous allez passer près de la frontière de vos frères, les descendants d’Esaü'
  - type: note
    content: Voir Gn 36.8.
  - type: text
    content: ', qui habitent la région de Séir ; ils auront peur de vous, mais faites bien attention : '
  '5':
  - type: text
    content: n’allez pas les attaquer, car je ne vous donnerai rien dans leur pays, pas même de quoi poser le pied. En effet, j’ai donné la région montagneuse de Séir en possession à Esaü
  - type: note
    content: Edom, Moab et Ammon étaient des parents d’Israël auxquels Dieu avait donné un pays en possession – comme il en donnera un à Israël.
  - type: text
    content: '. '
  '6':
  - type: text
    content: 'Vous achèterez d’eux tout ce que vous mangerez et vous leur paierez même l’eau que vous boirez : '
  '7':
  - type: text
    content: car l’Eternel votre Dieu vous a bénis dans toutes vos entreprises, il a veillé sur vous pendant votre marche à travers ce vaste désert ; voilà quarante années que l’Eternel votre Dieu est avec vous et vous n’avez manqué de rien.” »
  '8':
  - type: text
    content: Nous avons donc passé plus loin, laissant de côté nos frères, les descendants d’Esaü
  - type: note
    content: C’est-à-dire les Edomites. Ils sont qualifiés de frères parce que leur ancêtre Esaü était le frère de Jacob (Gn 25.24-26).
  - type: text
    content: ', qui habitent la région de Séir, et nous avons pris la route de la vallée d’Eilath et d’Etsyôn-Guéber, puis, changeant de direction, nous avons pris la route du désert de Moab.'
  '9':
  - type: text
    content: 'Alors l’Eternel m’avertit : « Ne traitez pas Moab en ennemi et n’engagez pas de combat contre lui, car je ne vous donnerai rien dans son pays ; en effet, j’ai donné le pays d’Ar en possession aux descendants de Loth'
  - type: note
    content: Voir Gn 19.30-38 pour l’origine des Moabites.
  - type: text
    content: . »
