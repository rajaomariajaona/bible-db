document_id: DEU.2
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Vers Canaan
  marker-yv: yv-h
- type: usfm
  marker: s2
  children:
  - type: text
    text: Le contournement d’Edom, de Moab et d’Ammon
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Nous avons fait demi-tour et nous sommes repartis pour le désert en direction de la mer des Roseaux, comme l’Eternel me l’avait demandé. Pendant de longs jours, nous avons tourné autour de la montagne de Séir.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Alors l’Eternel me dit : '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: '« Vous avez fait assez longtemps le tour de ces montagnes, prenez la direction du nord. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Ordonne au peuple : “Vous allez passer près de la frontière de vos frères, les descendants d’Esaü'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '2.4 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Voir '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Gn 36.8
        metadata:
          usfm: GEN.36.8
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: ', qui habitent la région de Séir ; ils auront peur de vous, mais faites bien attention : '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: n’allez pas les attaquer, car je ne vous donnerai rien dans leur pays, pas même de quoi poser le pied. En effet, j’ai donné la région montagneuse de Séir en possession à Esaü
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '2.5 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Edom, Moab et Ammon étaient des parents d’Israël auxquels Dieu avait donné un pays en possession – comme il en donnera un à Israël.
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Vous achèterez d’eux tout ce que vous mangerez et vous leur paierez même l’eau que vous boirez : '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: car l’Eternel votre Dieu vous a bénis dans toutes vos entreprises, il a veillé sur vous pendant votre marche à travers ce vaste désert ; voilà quarante années que l’Eternel votre Dieu est avec vous et vous n’avez manqué de rien.” »
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Nous avons donc passé plus loin, laissant de côté nos frères, les descendants d’Esaü
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '2.8 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: C’est-à-dire les Edomites. Ils sont qualifiés de frères parce que leur ancêtre Esaü était le frère de Jacob (
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Gn 25.24-26
        metadata:
          usfm: GEN.25.24+GEN.25.25+GEN.25.26
      - type: text
        text: ).
    marker-yv: yv-n
  - type: text
    text: ', qui habitent la région de Séir, et nous avons pris la route de la vallée d’Eilath et d’Etsyôn-Guéber, puis, changeant de direction, nous avons pris la route du désert de Moab.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Alors l’Eternel m’avertit : « Ne traitez pas Moab en ennemi et n’engagez pas de combat contre lui, car je ne vous donnerai rien dans son pays ; en effet, j’ai donné le pays d’Ar en possession aux descendants de Loth'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '2.9 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Voir '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Gn 19.30-38
        metadata:
          usfm: GEN.19.30+GEN.19.31+GEN.19.32+GEN.19.33+GEN.19.34+GEN.19.35+GEN.19.36+GEN.19.37+GEN.19.38
      - type: text
        text: ' pour l’origine des Moabites.'
    marker-yv: yv-n
  - type: text
    text: . »
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Autrefois, les Emim y habitaient
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '2.10 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Les versets 10-12 constituent une remarque explicative interrompant le discours de Moïse. Voir allusion aux Emim dans '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Gn 14.5
        metadata:
          usfm: GEN.14.5
      - type: text
        text: '. Pour les Anaqim : '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Nb 13.22
        metadata:
          usfm: NUM.13.22
      - type: text
        text: ', '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '33'
        metadata:
          usfm: NUM.13.33
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: ', c’était un grand peuple, nombreux et de haute taille, comme les Anaqim. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Ils passaient, eux aussi, de même que les Anaqim, pour des Rephaïm, et les Moabites les appellaient Emim. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Auparavant, le pays de Séir était habité par les Horiens, mais les descendants d’Esaü les ont chassés : ils les ont exterminés et se sont établis à leur place, comme Israël a fait pour le pays que l’Eternel lui a donné en possession.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: « Maintenant, dit l’Eternel, en route, traversez le torrent du Zéred. » Nous avons donc traversé le torrent du Zéred
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '2.13 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Oued intermittent qui se jette dans la partie sud-est de la mer Morte.
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Entre notre départ de Qadesh-Barnéa et notre traversée du torrent du Zéred, il s’est écoulé trente-huit ans, le temps que disparaisse l’ensemble des hommes en âge de combattre, comme l’Eternel le leur avait juré
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '2.14 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Voir '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Nb 14.28-35
        metadata:
          usfm: NUM.14.28+NUM.14.29+NUM.14.30+NUM.14.31+NUM.14.32+NUM.14.33+NUM.14.34+NUM.14.35
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: La main de l’Eternel vint même les atteindre à l’intérieur du camp, jusqu’à leur complète disparition.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Lorsque la mort eut fait disparaître du milieu du peuple tous les hommes en âge de porter les armes jusqu’au dernier, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'l’Eternel me dit : '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: '« Aujourd’hui, tu franchiras la frontière de Moab et tu traverseras le pays d’Ar. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Tu te trouveras en face des Ammonites. Ne les attaque pas et ne les provoque pas, car je ne te donne aucun territoire dans le pays des Ammonites ; en effet, c’est aux descendants de Loth que je l’ai donné en possession
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '2.19 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Pour l’origine des Ammonites, voir '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Gn 19.30-38
        metadata:
          usfm: GEN.19.30+GEN.19.31+GEN.19.32+GEN.19.33+GEN.19.34+GEN.19.35+GEN.19.36+GEN.19.37+GEN.19.38
      - type: text
        text: . Ils s’étaient fixés à l’est du Jourdain, au nord des Moabites.
    marker-yv: yv-n
  - type: text
    text: . »
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Ce pays
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '2.20 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Les v. 20-23 interrompent le discours de Moïse par une nouvelle remarque explicative.
    marker-yv: yv-n
  - type: text
    text: ' aussi passait pour avoir été habité par des Rephaïm. Ceux-ci l’occupaient autrefois, et ils étaient appelés Zamzoummim par les Ammonites. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'C’était un grand peuple, nombreux et de haute taille comme les Anaqim, mais l’Eternel les avait détruits par les Ammonites, qui avaient pris possession de leur pays pour s’établir à leur place. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Il fit pour les Ammonites comme pour les descendants d’Esaü qui demeurent dans le pays de Séir, pour lesquels il a détruit les Horiens et qui ont pris possession de leur pays, où ils ont habité à leur place jusqu’à ce jour. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: Il en est de même des Avviens qui habitent dans les villages jusqu’à Gaza ; les Crétois, venus de Crète
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '2.23 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Ces Crétois ont envahi cette région au '
      - type: usfm
        marker: sc
        children:
        - type: text
          text: xii
      - type: usfm
        marker: ord
        children:
        - type: text
          text: e
      - type: text
        text: ' siècle av. J.-C. et furent appelés Philistins.'
    marker-yv: yv-n
  - type: text
    text: ', les détruisirent et s’installèrent à leur place.'
- type: usfm
  marker: s2
  children:
  - type: text
    text: La victoire sur Sihôn et Og
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: '« Allons, mettez-vous en route, dit l’Eternel, et traversez le torrent de l’Arnon. Je vais vous livrer Sihôn l’Amoréen, roi de Heshbôn, avec tout son pays. Commencez à prendre possession de son domaine, engagez le combat contre lui. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: Aujourd’hui je vais commencer à faire de vous la terreur de tous les peuples qui habitent sous le ciel, ils vous craindront tellement qu’au seul bruit de votre approche, ils se mettront à trembler et seront pris de panique en face de vous. »
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Alors, depuis le désert de Qedémoth, j’ai envoyé à Sihôn, roi de Heshbôn, des émissaires, avec ce message de paix : '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: '« Permets-nous de passer par ton pays. Nous suivrons uniquement la route sans nous en écarter ni à droite, ni à gauche. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'Tu nous fourniras à prix d’argent la nourriture que nous mangerons et tu nous donneras contre paiement l’eau que nous boirons, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'comme l’ont fait les descendants d’Esaü qui habitent en Séir et les Moabites qui vivent dans le pays d’Ar. Laisse-nous simplement passer à pied jusqu’à ce que nous ayons traversé le Jourdain pour entrer dans le pays que l’Eternel notre Dieu nous donne. » '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: Mais Sihôn, roi de Heshbôn, refusa de nous laisser passer chez lui, car l’Eternel votre Dieu l’avait rendu inflexible et entêté, afin de le livrer en votre pouvoir – comme cela est arrivé.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'Puis l’Eternel me dit : « Vois, j’ai commencé de vous livrer Sihôn et son pays. Entreprends la conquête de son pays. » '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'Alors Sihôn se mit en campagne contre nous et nous attaqua à Yahats avec toute son armée. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: 'Mais l’Eternel notre Dieu le livra à notre merci, et nous l’avons vaincu, lui, ses fils et toute son armée. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: 'Nous nous sommes alors emparés de toutes ses villes et nous en avons exterminé la population pour la vouer à l’Eternel, hommes, femmes et enfants, sans laisser aucun survivant. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: 'Nous avons seulement gardé pour nous le bétail ainsi que le butin trouvé dans les villes conquises. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: 'Depuis Aroër sur la falaise au-dessus du torrent de l’Arnon, et depuis la ville qui est au fond des gorges du torrent jusqu’à Galaad, il n’y a pas eu de cité imprenable pour nous, car l’Eternel notre Dieu nous les a toutes livrées. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: Mais vous ne vous êtes pas approchés du pays des Ammonites, ni d’aucun endroit situé sur la rive du torrent du Yabboq, ni des villes de la montagne, ni d’aucun des lieux que l’Eternel notre Dieu nous avait commandé d’épargner.
