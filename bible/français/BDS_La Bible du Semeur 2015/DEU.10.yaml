document_id: DEU.10
type_code: fra
segments:
- type: usfm
  marker: s2
  children:
  - type: text
    text: L’Eternel pardonne
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Alors, l’Eternel m’a dit : « Taille-toi deux tablettes de pierre pareilles aux premières et viens me trouver sur la montagne ; tu fabriqueras aussi un coffre en bois. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'J’inscrirai sur les tablettes les paroles qui étaient gravées sur les premières que tu as brisées et tu les déposeras dans le coffre. » '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Je fabriquai donc un coffre en bois d’acacia et je taillai deux tablettes de pierre semblables aux premières. Après quoi, je gravis la montagne, les deux tablettes en main. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'L’Eternel écrivit sur les nouvelles tablettes comme il l’avait fait sur les premières, les dix commandements qu’il vous avait communiqués sur la montagne du milieu du feu, le jour où vous étiez assemblés, et il me les remit. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Je m’en retournai et redescendis de la montagne. Puis je déposai les tablettes dans le coffre que j’avais fabriqué : elles y sont restées comme l’Eternel me l’avait ordonné.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Les Israélites
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '10.6 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Les v. 6-9 se rapportent à des événements postérieurs à ceux du Sinaï.
    marker-yv: yv-n
  - type: text
    text: ' partirent des puits des descendants de Yaaqân pour Moséra. C’est là que mourut Aaron, et qu’il fut enseveli. Eléazar, son fils, lui succéda comme grand-prêtre'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '10.6 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Voir Nb 20.28 ; 33.38.
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: De là, ils partirent pour Goudgoda, puis de là pour Yotbata où abondent les cours d’eau
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '10.7 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Dernière marche dans le désert, la quarantième année de leurs pérégrinations.
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: C’est à cette époque que l’Eternel choisit la tribu de Lévi pour porter le coffre de l’alliance de l’Eternel et se tenir en sa présence, pour être à son service et pour bénir le peuple en son nom – comme elle l’a fait jusqu’à ce jour
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '10.8 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Voir Nb 3.5-8 ; 8.5-19.
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: C’est pour cela que la tribu de Lévi n’a reçu ni part, ni patrimoine foncier comme ses tribus sœurs ; c’est l’Eternel ton Dieu qui est son patrimoine, comme il le lui a promis.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Moi donc, je suis resté sur la montagne pendant quarante jours et quarante nuits, comme la première fois
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '10.10 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Voir '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ex 34.28
        metadata:
          usfm: EXO.34.28
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: '. Et cette fois-ci encore, l’Eternel m’exauça et renonça à vous détruire. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Il me dit : « Lève-toi, va prendre la tête de ce peuple pour qu’ils partent à la conquête du pays que j’ai promis par serment à leurs ancêtres ! »'
- type: usfm
  marker: s2
  children:
  - type: text
    text: L’appel à changer de vie
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Et maintenant, Israël, qu’attend de toi l’Eternel ton Dieu ? Simplement que tu le craignes en suivant toutes les voies qu’il t’a prescrites, en l’aimant et en le servant de tout ton cœur et de tout ton être, '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'en observant ses commandements et ses lois que je te prescris aujourd’hui pour ton bien. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Voici : le ciel, et même les cieux les plus élevés, appartiennent à l’Eternel ton Dieu ainsi que la terre et tout ce qu’elle contient. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Et pourtant, c’est uniquement à tes ancêtres que l’Eternel s’est attaché pour les aimer, et c’est leurs descendants, c’est-à-dire vous, qu’il a choisis parmi tous les peuples, comme vous le constatez aujourd’hui. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Opérez donc aussi une circoncision dans votre cœur et ne vous rebellez plus contre l’Eternel ; '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: car l’Eternel votre Dieu est le Dieu suprême et le Seigneur des seigneurs
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '10.17 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Titre repris en 1 Tm 6.15 ; Ap 17.14 ; 19.16.
    marker-yv: yv-n
  - type: text
    text: ', le grand Dieu, puissant et redoutable, qui ne fait pas de favoritisme'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '10.17 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Voir Ac 10.34 ; Rm 2.11 ; Ep 6.9.
    marker-yv: yv-n
  - type: text
    text: ' et ne se laisse pas corrompre par des présents. '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Il rend justice à l’orphelin et à la veuve et témoigne son amour à l’étranger en lui assurant le pain et le vêtement. '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Vous aussi, vous aimerez l’étranger parmi vous, car vous avez été étrangers en Egypte.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Israël face à un choix
  marker-yv: yv-h
- type: usfm
  marker: s2
  children:
  - type: text
    text: Craindre l’Eternel
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'C’est l’Eternel ton Dieu que tu craindras, c’est à lui que tu rendras un culte, à lui seul que tu t’attacheras, et si tu prêtes serment, c’est par son nom que tu le feras. '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Il est le sujet de tes louanges, il est ton Dieu ; c’est lui qui a accompli pour toi ces œuvres extraordinaires et redoutables dont tu as été témoin
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '10.21 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Voir Ex 7 à 12.
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: Tes ancêtres vinrent en Egypte au nombre de soixante-dix
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '10.22 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Voir Gn 46.27 ; Ex 1.5 ; Ac 7.14.
    marker-yv: yv-n
  - type: text
    text: ', et maintenant l’Eternel ton Dieu t’a rendu aussi nombreux'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '10.22 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Voir Gn 15.5 ; 22.17 ; Hé 11.12.
    marker-yv: yv-n
  - type: text
    text: ' que les étoiles du ciel.'
