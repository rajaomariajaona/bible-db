document_id: DEU.10,21
type_code: fra
verses:
  '1':
  - type: heading
    content: L’Eternel pardonne
  - type: text
    content: 'Alors, l’Eternel m’a dit : « Taille-toi deux tablettes de pierre pareilles aux premières et viens me trouver sur la montagne ; tu fabriqueras aussi un coffre en bois. '
  '10':
  - type: text
    content: Moi donc, je suis resté sur la montagne pendant quarante jours et quarante nuits, comme la première fois
  - type: note
    content: Voir Ex 34.28.
  - type: text
    content: '. Et cette fois-ci encore, l’Eternel m’exauça et renonça à vous détruire. '
  '11':
  - type: text
    content: 'Il me dit : « Lève-toi, va prendre la tête de ce peuple pour qu’ils partent à la conquête du pays que j’ai promis par serment à leurs ancêtres ! »'
  - type: heading
    content: L’appel à changer de vie
  '12':
  - type: text
    content: 'Et maintenant, Israël, qu’attend de toi l’Eternel ton Dieu ? Simplement que tu le craignes en suivant toutes les voies qu’il t’a prescrites, en l’aimant et en le servant de tout ton cœur et de tout ton être, '
  '13':
  - type: text
    content: 'en observant ses commandements et ses lois que je te prescris aujourd’hui pour ton bien. '
  '14':
  - type: text
    content: 'Voici : le ciel, et même les cieux les plus élevés, appartiennent à l’Eternel ton Dieu ainsi que la terre et tout ce qu’elle contient. '
  '15':
  - type: text
    content: 'Et pourtant, c’est uniquement à tes ancêtres que l’Eternel s’est attaché pour les aimer, et c’est leurs descendants, c’est-à-dire vous, qu’il a choisis parmi tous les peuples, comme vous le constatez aujourd’hui. '
  '16':
  - type: text
    content: 'Opérez donc aussi une circoncision dans votre cœur et ne vous rebellez plus contre l’Eternel ; '
  '17':
  - type: text
    content: car l’Eternel votre Dieu est le Dieu suprême et le Seigneur des seigneurs
  - type: note
    content: Titre repris en 1 Tm 6.15 ; Ap 17.14 ; 19.16.
  - type: text
    content: ', le grand Dieu, puissant et redoutable, qui ne fait pas de favoritisme'
  - type: note
    content: Voir Ac 10.34 ; Rm 2.11 ; Ep 6.9.
  - type: text
    content: ' et ne se laisse pas corrompre par des présents. '
  '18':
  - type: text
    content: 'Il rend justice à l’orphelin et à la veuve et témoigne son amour à l’étranger en lui assurant le pain et le vêtement. '
  '19':
  - type: text
    content: Vous aussi, vous aimerez l’étranger parmi vous, car vous avez été étrangers en Egypte.
  - type: heading
    content: Israël face à un choix
  - type: heading
    content: Craindre l’Eternel
  '2':
  - type: text
    content: 'J’inscrirai sur les tablettes les paroles qui étaient gravées sur les premières que tu as brisées et tu les déposeras dans le coffre. » '
  '20':
  - type: text
    content: 'C’est l’Eternel ton Dieu que tu craindras, c’est à lui que tu rendras un culte, à lui seul que tu t’attacheras, et si tu prêtes serment, c’est par son nom que tu le feras. '
  '21':
  - type: text
    content: Il est le sujet de tes louanges, il est ton Dieu ; c’est lui qui a accompli pour toi ces œuvres extraordinaires et redoutables dont tu as été témoin
  - type: note
    content: Voir Ex 7 à 12.
  - type: text
    content: '. '
  '22':
  - type: text
    content: Tes ancêtres vinrent en Egypte au nombre de soixante-dix
  - type: note
    content: Voir Gn 46.27 ; Ex 1.5 ; Ac 7.14.
  - type: text
    content: ', et maintenant l’Eternel ton Dieu t’a rendu aussi nombreux'
  - type: note
    content: Voir Gn 15.5 ; 22.17 ; Hé 11.12.
  - type: text
    content: ' que les étoiles du ciel.'
  '3':
  - type: text
    content: 'Je fabriquai donc un coffre en bois d’acacia et je taillai deux tablettes de pierre semblables aux premières. Après quoi, je gravis la montagne, les deux tablettes en main. '
  '4':
  - type: text
    content: 'L’Eternel écrivit sur les nouvelles tablettes comme il l’avait fait sur les premières, les dix commandements qu’il vous avait communiqués sur la montagne du milieu du feu, le jour où vous étiez assemblés, et il me les remit. '
  '5':
  - type: text
    content: 'Je m’en retournai et redescendis de la montagne. Puis je déposai les tablettes dans le coffre que j’avais fabriqué : elles y sont restées comme l’Eternel me l’avait ordonné.'
  '6':
  - type: text
    content: Les Israélites
  - type: note
    content: Les v. 6-9 se rapportent à des événements postérieurs à ceux du Sinaï.
  - type: text
    content: ' partirent des puits des descendants de Yaaqân pour Moséra. C’est là que mourut Aaron, et qu’il fut enseveli. Eléazar, son fils, lui succéda comme grand-prêtre'
  - type: note
    content: Voir Nb 20.28 ; 33.38.
  - type: text
    content: '. '
  '7':
  - type: text
    content: De là, ils partirent pour Goudgoda, puis de là pour Yotbata où abondent les cours d’eau
  - type: note
    content: Dernière marche dans le désert, la quarantième année de leurs pérégrinations.
  - type: text
    content: '. '
  '8':
  - type: text
    content: C’est à cette époque que l’Eternel choisit la tribu de Lévi pour porter le coffre de l’alliance de l’Eternel et se tenir en sa présence, pour être à son service et pour bénir le peuple en son nom – comme elle l’a fait jusqu’à ce jour
  - type: note
    content: Voir Nb 3.5-8 ; 8.5-19.
  - type: text
    content: '. '
  '9':
  - type: text
    content: C’est pour cela que la tribu de Lévi n’a reçu ni part, ni patrimoine foncier comme ses tribus sœurs ; c’est l’Eternel ton Dieu qui est son patrimoine, comme il le lui a promis.
