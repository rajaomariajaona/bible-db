document_id: JDG.13
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: La naissance de Samson
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Les Israélites recommencèrent à faire ce que l’Eternel considère comme mal, et l’Eternel les livra au pouvoir des Philistins pendant quarante ans.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: A Tsorea
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '13.2 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: Tsorea
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: ', '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: à une vingtaine de kilomètres à l’ouest de Jérusalem, fut d’abord attribuée à la tribu de Juda (
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Jos 15.33
        metadata:
          usfm: JOS.15.33
      - type: text
        text: ), puis à celle de Dan (
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Jos 19.41
        metadata:
          usfm: JOS.19.41
      - type: text
        text: ). C’est de là que les Danites émigrèrent vers le nord (
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Jos 18.2
        metadata:
          usfm: JOS.18.2
      - type: text
        text: ', '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '8'
        metadata:
          usfm: JOS.18.8
      - type: text
        text: ', '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '11'
        metadata:
          usfm: JOS.18.11
      - type: text
        text: ). La ville revint alors à Juda.
    marker-yv: yv-n
  - type: text
    text: ' vivait un homme de la tribu de Dan appelé Manoah. Sa femme était stérile et n’avait jamais pu avoir d’enfant. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Un jour, l’ange de l’Eternel apparut à cette femme et lui dit : Tu es stérile et tu n’as jamais eu d’enfant. Pourtant, tu vas être enceinte et tu donneras le jour à un fils. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'A partir de maintenant, prends bien garde de ne boire ni vin, ni autre boisson alcoolisée et de ne rien manger qui soit rituellement impur. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Car tu vas être enceinte et tu mettras au monde un fils. Ce garçon sera consacré à Dieu dès le sein maternel : jamais il ne devra se couper les cheveux ou la barbe. C’est lui qui commencera à délivrer Israël des Philistins.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'La femme rentra chez elle et dit à son mari : Un homme de Dieu m’a abordée, son aspect était comme celui d’un ange de Dieu ; il était terrifiant. Je ne lui ai pas demandé d’où il venait, et il ne m’a pas dit son nom. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Mais il m’a annoncé que je vais être enceinte et que je mettrai un fils au monde. Il m’a dit de ne boire ni vin, ni boisson alcoolisée et de ne rien manger d’impur, car l’enfant sera consacré à Dieu dès le sein maternel et jusqu’à sa mort.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Alors Manoah adressa cette prière à l’Eternel : Je te prie, Seigneur, fais revenir vers nous l’homme de Dieu que tu as déjà envoyé, pour qu’il nous apprenne ce que nous aurons à faire à l’égard de l’enfant à naître.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Dieu exauça la prière de Manoah. L’ange de Dieu revint se présenter à la femme pendant qu’elle était assise dans un champ. Manoah n’était pas avec elle. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Elle courut aussitôt le lui annoncer : L’homme qui est venu l’autre jour se présenter à moi, m’est de nouveau apparu.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Immédiatement, Manoah se leva et suivit sa femme. Il se rendit auprès de l’homme, et lui demanda : Est-ce toi qui as parlé à cette femme ?'
- type: usfm
  marker: p
  children:
  - type: text
    text: – Oui, c’est moi, lui répondit-il.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Et Manoah lui dit : Maintenant, quand tes paroles se réaliseront, quelles règles devra-t-on suivre à l’égard de ce garçon, et que devra-t-il faire ?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'L’ange de l’Eternel lui répondit : Ta femme devra s’abstenir de tout ce que je lui ai mentionné. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Elle ne mangera aucun fruit de la vigne, ne boira ni vin, ni boisson alcoolisée et ne prendra aucune nourriture qui soit rituellement impure. Qu’elle observe soigneusement tout ce que je lui ai ordonné.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Alors Manoah dit à l’ange de l’Eternel : Permets-nous de te retenir et de te présenter un chevreau.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'L’ange lui répondit : Même si tu me retiens, je ne mangerai pas la nourriture que tu me présenteras ; mais si tu le veux, offre un holocauste à l’Eternel.'
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Manoah ne savait pas que c’était l’ange de l’Eternel. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Il demanda à l’ange : Quel est ton nom ? Ainsi, quand ce que tu as annoncé se réalisera, nous pourrons t’honorer.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'L’ange de l’Eternel répliqua : Pourquoi demandes-tu mon nom ? Il est merveilleux.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Alors Manoah prit un chevreau et l’offrande de céréales qui doit accompagner l’holocauste et il les offrit à l’Eternel sur le rocher. Pendant que Manoah et sa femme regardaient, il se produisit une chose merveilleuse : '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'lorsque la flamme monta de l’autel vers le ciel, l’ange de l’Eternel s’éleva au milieu de la flamme sous leurs yeux. Alors ils se jetèrent la face contre terre. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'L’ange de l’Eternel n’apparut plus à Manoah et à sa femme. Manoah comprit que c’était l’ange de l’Eternel qui leur était apparu, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'et il dit à sa femme : Nous allons sûrement mourir, car nous avons vu Dieu !'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Mais sa femme lui dit : Si l’Eternel avait voulu nous faire mourir, il n’aurait pas accepté notre holocauste et notre offrande, il ne nous aurait pas fait voir toutes ces choses, et il ne nous aurait pas annoncé aujourd’hui tout ce qu’il nous a communiqué.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'La femme donna naissance à un fils et elle l’appela Samson. L’enfant grandit et l’Eternel le bénit. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: L’Esprit de l’Eternel commença à le pousser à l’action lorsqu’il était à Mahané-Dan entre Tsorea et Eshtaol.
