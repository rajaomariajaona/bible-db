document_id: JDG.13,21
type_code: fra
verses:
  '1':
  - type: heading
    content: La naissance de Samson
  - type: text
    content: Les Israélites recommencèrent à faire ce que l’Eternel considère comme mal, et l’Eternel les livra au pouvoir des Philistins pendant quarante ans.
  '10':
  - type: text
    content: 'Elle courut aussitôt le lui annoncer : L’homme qui est venu l’autre jour se présenter à moi, m’est de nouveau apparu.'
  '11':
  - type: text
    content: 'Immédiatement, Manoah se leva et suivit sa femme. Il se rendit auprès de l’homme, et lui demanda : Est-ce toi qui as parlé à cette femme ?'
  - type: text
    content: – Oui, c’est moi, lui répondit-il.
  '12':
  - type: text
    content: 'Et Manoah lui dit : Maintenant, quand tes paroles se réaliseront, quelles règles devra-t-on suivre à l’égard de ce garçon, et que devra-t-il faire ?'
  '13':
  - type: text
    content: 'L’ange de l’Eternel lui répondit : Ta femme devra s’abstenir de tout ce que je lui ai mentionné. '
  '14':
  - type: text
    content: Elle ne mangera aucun fruit de la vigne, ne boira ni vin, ni boisson alcoolisée et ne prendra aucune nourriture qui soit rituellement impure. Qu’elle observe soigneusement tout ce que je lui ai ordonné.
  '15':
  - type: text
    content: 'Alors Manoah dit à l’ange de l’Eternel : Permets-nous de te retenir et de te présenter un chevreau.'
  '16':
  - type: text
    content: 'L’ange lui répondit : Même si tu me retiens, je ne mangerai pas la nourriture que tu me présenteras ; mais si tu le veux, offre un holocauste à l’Eternel.'
  - type: text
    content: 'Manoah ne savait pas que c’était l’ange de l’Eternel. '
  '17':
  - type: text
    content: 'Il demanda à l’ange : Quel est ton nom ? Ainsi, quand ce que tu as annoncé se réalisera, nous pourrons t’honorer.'
  '18':
  - type: text
    content: 'L’ange de l’Eternel répliqua : Pourquoi demandes-tu mon nom ? Il est merveilleux.'
  '19':
  - type: text
    content: 'Alors Manoah prit un chevreau et l’offrande de céréales qui doit accompagner l’holocauste et il les offrit à l’Eternel sur le rocher. Pendant que Manoah et sa femme regardaient, il se produisit une chose merveilleuse : '
  '2':
  - type: text
    content: A Tsorea
  - type: note
    content: Tsorea, à une vingtaine de kilomètres à l’ouest de Jérusalem, fut d’abord attribuée à la tribu de Juda (Jos 15.33), puis à celle de Dan (Jos 19.41). C’est de là que les Danites émigrèrent vers le nord (Jos 18.2, 8, 11). La ville revint alors à Juda.
  - type: text
    content: ' vivait un homme de la tribu de Dan appelé Manoah. Sa femme était stérile et n’avait jamais pu avoir d’enfant. '
  '20':
  - type: text
    content: 'lorsque la flamme monta de l’autel vers le ciel, l’ange de l’Eternel s’éleva au milieu de la flamme sous leurs yeux. Alors ils se jetèrent la face contre terre. '
  '21':
  - type: text
    content: 'L’ange de l’Eternel n’apparut plus à Manoah et à sa femme. Manoah comprit que c’était l’ange de l’Eternel qui leur était apparu, '
  '22':
  - type: text
    content: 'et il dit à sa femme : Nous allons sûrement mourir, car nous avons vu Dieu !'
  '23':
  - type: text
    content: 'Mais sa femme lui dit : Si l’Eternel avait voulu nous faire mourir, il n’aurait pas accepté notre holocauste et notre offrande, il ne nous aurait pas fait voir toutes ces choses, et il ne nous aurait pas annoncé aujourd’hui tout ce qu’il nous a communiqué.'
  '24':
  - type: text
    content: 'La femme donna naissance à un fils et elle l’appela Samson. L’enfant grandit et l’Eternel le bénit. '
  '25':
  - type: text
    content: L’Esprit de l’Eternel commença à le pousser à l’action lorsqu’il était à Mahané-Dan entre Tsorea et Eshtaol.
  '3':
  - type: text
    content: 'Un jour, l’ange de l’Eternel apparut à cette femme et lui dit : Tu es stérile et tu n’as jamais eu d’enfant. Pourtant, tu vas être enceinte et tu donneras le jour à un fils. '
  '4':
  - type: text
    content: 'A partir de maintenant, prends bien garde de ne boire ni vin, ni autre boisson alcoolisée et de ne rien manger qui soit rituellement impur. '
  '5':
  - type: text
    content: 'Car tu vas être enceinte et tu mettras au monde un fils. Ce garçon sera consacré à Dieu dès le sein maternel : jamais il ne devra se couper les cheveux ou la barbe. C’est lui qui commencera à délivrer Israël des Philistins.'
  '6':
  - type: text
    content: 'La femme rentra chez elle et dit à son mari : Un homme de Dieu m’a abordée, son aspect était comme celui d’un ange de Dieu ; il était terrifiant. Je ne lui ai pas demandé d’où il venait, et il ne m’a pas dit son nom. '
  '7':
  - type: text
    content: Mais il m’a annoncé que je vais être enceinte et que je mettrai un fils au monde. Il m’a dit de ne boire ni vin, ni boisson alcoolisée et de ne rien manger d’impur, car l’enfant sera consacré à Dieu dès le sein maternel et jusqu’à sa mort.
  '8':
  - type: text
    content: 'Alors Manoah adressa cette prière à l’Eternel : Je te prie, Seigneur, fais revenir vers nous l’homme de Dieu que tu as déjà envoyé, pour qu’il nous apprenne ce que nous aurons à faire à l’égard de l’enfant à naître.'
  '9':
  - type: text
    content: 'Dieu exauça la prière de Manoah. L’ange de Dieu revint se présenter à la femme pendant qu’elle était assise dans un champ. Manoah n’était pas avec elle. '
