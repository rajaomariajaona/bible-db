document_id: 2SA.13,21
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Le viol de la princesse Tamar
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: Absalom, un fils de David, avait une sœur qui était très belle et qui se nommait Tamar
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '13.1 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Fille de Maaka, princesse de Gueshour (
        - type: usfm
          marker: ref
          children:
          - type: text
            text: '3.3'
        - type: text
          text: '). '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'Amnôn '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: était fils d’Ahinoam, première femme de David ; il était le fils aîné de David, donc l’héritier présomptif du trône (
        - type: usfm
          marker: ref
          children:
          - type: text
            text: '3.2'
        - type: text
          text: ).
      marker-yv: yv-n
    - type: text
      text: '. Amnôn, un autre fils du roi David, en tomba passionnément amoureux. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'Alors il demanda à Tamar : Apporte-moi ces galettes dans ma chambre pour que je les mange de ta main.'
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Tamar prit les galettes qu’elle avait faites et les apporta à son frère Amnôn dans sa chambre. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'Au moment où elle les lui présentait, il l’empoigna et lui dit : Viens, couche avec moi, ma sœur !'
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'Mais elle s’écria : Non, mon frère, ne me fais pas violence ! Cela ne se fait pas en Israël'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '13.12 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Voir '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: Dt 22.23-29
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: '. Ne commets pas une telle infamie ! '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: Après cela, où irais-je porter ma honte ? Et toi, tu serais considéré comme un individu méprisable dans notre peuple. Pourquoi ne parles-tu pas au roi ? Il ne refusera pas de me donner à toi.
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: Mais il ne voulut rien entendre, et comme il était plus fort qu’elle, il lui fit violence et coucha avec elle.
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'Après cela, il conçut pour elle une forte aversion, plus violente que la passion qu’il avait éprouvée pour elle. Tout à coup, il lui ordonna : Lève-toi, va-t’en !'
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: – Non, lui dit-elle, en me chassant, tu commettrais un crime encore pire que le mal que tu m’as déjà fait.
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Mais il ne voulut pas l’écouter. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'Il appela le domestique qui était à son service et lui ordonna : Débarrassez-moi de cette fille ! Jetez-la dehors et verrouillez la porte derrière elle !'
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'Elle portait jusque-là une longue robe multicolore, car c’était autrefois la tenue des princesses aussi longtemps qu’elles étaient vierges. Le domestique la mit dehors et verrouilla la porte derrière elle. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'Alors Tamar répandit de la cendre sur sa tête, elle déchira sa longue robe, se prit à deux mains la tête, puis elle partit en poussant des cris. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: Il se rongeait tant à propos de sa demi-sœur qu’il s’en rendait malade, car elle était vierge et il lui semblait impossible de l’approcher
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '13.2 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Les filles non mariées vivaient dans l’appartement des femmes et ne fréquentaient guère les hommes, pas même leurs demi-frères.
      marker-yv: yv-n
    - type: text
      text: '. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: 'Son frère Absalom lui demanda : Ton frère Amnôn t’a-t-il fait violence ? Maintenant, ma sœur, n’en parle pas, c’est ton frère, et ne prends pas la chose trop à cœur !'
  - type: usfm
    marker: p
    children:
    - type: text
      text: Dès lors Tamar alla demeurer dans la maison d’Absalom, comme une femme abandonnée.
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: Le roi David apprit tout ce qui s’était passé et il en fut très irrité
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '13.21 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Un manuscrit hébreu, l’ancienne version grecque et la Vulgate ajoutent ici : '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: il ne fit cependant aucun reproche à Amnôn, car c’était son fils aîné et il l’aimait beaucoup.
      marker-yv: yv-n
    - type: text
      text: '. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: Quant à Absalom, il n’adressait plus la parole à Amnôn, ni en bien, ni en mal, car il l’avait pris en haine à cause du viol de sa sœur Tamar.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Absalom venge sa sœur et prend la fuite
    marker-yv: yv-h
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: Deux ans plus tard, Absalom avait les tondeurs à Baal-Hatsor, près d’Ephraïm
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '13.23 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Près de Béthel, à 25 kilomètres au nord de Jérusalem (
        - type: usfm
          marker: ref
          children:
          - type: text
            text: Né 11.33
        - type: text
          text: ). La tonte des moutons était une occasion annuelle de réjouissances (
        - type: usfm
          marker: ref
          children:
          - type: text
            text: 1 S 25.2-8
        - type: text
          text: ).
      marker-yv: yv-n
    - type: text
      text: '. Il invita tous les fils du roi. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: 'Il se rendit chez le roi et lui dit : Tu sais que ton serviteur fait tondre ses moutons ; que le roi et ses hauts fonctionnaires veuillent bien venir chez ton serviteur !'
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: 'Mais le roi lui répondit : Non, mon fils, nous n’allons pas tous venir, ce serait une trop lourde charge pour toi !'
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Absalom insista, mais le roi refusa l’invitation et lui donna simplement sa bénédiction. '
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: 'Absalom reprit : Si tu ne veux pas venir, permets au moins à mon frère Amnôn de nous accompagner.'
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Le roi lui dit : Pourquoi t’accompagnerait-il ?'
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: Mais Absalom insista tellement que David laissa partir avec lui Amnôn et tous les autres fils du roi.
  '28':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: 'Absalom donna des ordres à ses serviteurs en disant : Quand vous verrez qu’Amnôn sera égayé par le vin, et que je vous dirai : « Frappez Amnôn ! » vous le tuerez. Ne craignez rien, car c’est moi qui en prends la responsabilité. Ayez du courage et soyez forts !'
  '29':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: 'Les serviteurs d’Absalom exécutèrent les ordres de leur maître et tuèrent Amnôn. Aussitôt, tous les autres fils du roi se levèrent de table, enfourchèrent chacun son mulet et prirent la fuite. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'Amnôn avait un ami nommé Yonadab, un fils de Shimea, le frère de David. C’était un homme très astucieux. '
  '30':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '30'
    - type: text
      text: 'Ils étaient encore en route quand la nouvelle parvint à David qu’Absalom avait tué tous les fils du roi sans qu’aucun d’eux en réchappe. '
  '31':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '31'
    - type: text
      text: Le roi se leva, déchira ses vêtements en signe de deuil et s’étendit à même le sol. Tous ses ministres se tenaient autour de lui avec leurs habits déchirés
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '13.31 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Voir Jos 7.6 ; 1 R 21.27 ; Est 4.1 ; Jb 1.20.
      marker-yv: yv-n
    - type: text
      text: '. '
  '32':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '32'
    - type: text
      text: 'A ce moment-là, Yonadab, fils de Shimea, le frère de David, prit la parole et déclara : Que mon seigneur ne pense pas que tous les fils du roi ont été tués ; Amnôn seul est mort. Depuis le jour où il a violé sa sœur Tamar, Absalom parlait de le tuer. '
  '33':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '33'
    - type: text
      text: Que le roi mon seigneur ne s’imagine donc pas que tous les princes ont péri ! Non, Amnôn seul est mort.
  '34':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '34'
    - type: text
      text: Absalom, quant à lui, avait pris la fuite. Lorsque le guetteur regarda au loin, il aperçut soudain une troupe nombreuse arrivant par la route occidentale
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '13.34 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'L’ancienne version grecque a : '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'par la route de Horonaïm. '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'A la suite du verset, l’ancienne version grecque ajoute : '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'il vint en informer le roi en ces termes : « J’ai vu des hommes arriver par la route de Horonaïm, au flanc de la colline. »'
      marker-yv: yv-n
    - type: text
      text: ', au flanc de la colline. '
  '35':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '35'
    - type: text
      text: 'Alors Yonadab dit au roi : Ce sont les fils du roi qui viennent. Tout s’est passé comme ton serviteur l’a dit.'
  '36':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '36'
    - type: text
      text: 'A peine achevait-il de parler, que les fils du roi entrèrent et se mirent à parler fort et à pleurer. Alors le roi et toute sa cour se répandirent aussi en pleurs et en lamentations. '
  '37':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '37'
    - type: text
      text: Entre-temps, Absalom avait fui jusque chez Talmaï, fils d’Ammihoud, roi de Gueshour. Pendant tout ce temps, David porta le deuil de son fils.
  '38':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '38'
    - type: text
      text: 'Absalom resta pendant trois ans réfugié à Gueshour. '
  '39':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '39'
    - type: text
      text: Le roi David finit par renoncer à poursuivre Absalom
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '13.39 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Autres traductions : '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'le roi David languissait après Absalom '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'ou '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'la colère du roi David contre Absalom s’apaisait. '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Le nom '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'David '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: manque dans le texte hébreu de Qumrân et dans certains manuscrits de l’ancienne version grecque.
      marker-yv: yv-n
    - type: text
      text: ', car il se consolait peu à peu de la mort d’Amnôn.'
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'Il demanda à Amnôn : Fils du roi, pourquoi es-tu si déprimé ? Chaque matin tu parais l’être davantage. Ne veux-tu pas m’en dire la cause ?'
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Amnôn lui répondit : Je suis amoureux de Tamar, la sœur de mon frère Absalom.'
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'Yonadab lui dit alors : Mets-toi au lit et fais comme si tu étais malade. Quand ton père viendra te voir, dis-lui : « Permets à ma sœur Tamar de venir me faire à manger, qu’elle prépare le repas sous mes yeux afin que je la voie faire, puis je mangerai de sa main. »'
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'Amnôn se mit donc au lit et fit semblant d’être malade. Le roi vint le voir et Amnôn lui dit : Fais venir ma sœur Tamar pour qu’elle me prépare deux galettes sous mes yeux, et je les mangerai de sa main.'
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'David envoya dire à Tamar dans son appartement : Va chez ton frère Amnôn et prépare-lui son repas.'
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'Tamar se rendit donc chez son frère Amnôn et le trouva couché. Elle prépara de la pâte et la pétrit, puis confectionna des galettes devant lui et les fit cuire. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'Ensuite elle prit la poêle et lui en servit le contenu devant lui, mais il refusa d’en manger et dit : Faites sortir tout le monde d’ici.'
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Tous se retirèrent. '
