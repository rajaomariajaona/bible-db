document_id: COL.2,21
type_code: fra
verses:
  '1':
  - type: text
    content: 'Je tiens, en effet, à ce que vous sachiez combien rude est le combat que je livre pour vous et pour les frères et sœurs qui sont à Laodicée, comme pour tous ceux qui ne m’ont jamais vu personnellement. '
  '10':
  - type: text
    content: 'Et par votre union avec lui, vous êtes pleinement comblés, car il est le chef de toute Autorité et de toute Puissance. '
  '11':
  - type: text
    content: C’est aussi dans l’union avec lui que vous avez été circoncis, non d’une circoncision opérée par les hommes, mais de la circoncision que demande Christ
  - type: note
    content: 'Autre traduction : qu’opère Christ.'
  - type: text
    content: ' et qui consiste à être dépouillé de ce qui fait l’homme livré à lui-même'
  - type: note
    content: 'Autre traduction : mais de la « circoncision » qu’a subie Christ lorsqu’il a été dépouillé de son corps humain.'
  - type: text
    content: '. '
  '12':
  - type: text
    content: Vous avez été ensevelis avec Christ par le baptême, et c’est aussi dans l’union avec lui que vous êtes ressuscités avec lui, par la foi en la puissance de Dieu qui l’a ressuscité des morts.
  '13':
  - type: text
    content: Et vous, qui étiez morts à cause de vos fautes et parce que vous étiez incirconcis, Dieu vous a donné la vie avec Christ.
  - type: text
    content: Il nous a pardonné
  - type: text
    content: toutes nos fautes.
  '14':
  - type: text
    content: Car il a annulé
  - type: text
    content: l’acte qui établissait
  - type: text
    content: nos manquements
  - type: text
    content: à l’égard des commandements
  - type: note
    content: 'D’autres comprennent : car il a annulé, au détriment des ordonnances légales, l’acte qui nous était contraire ou car il a annulé l’acte qui nous accusait et qui nous était contraire par ses dispositions.'
  - type: text
    content: .
  - type: text
    content: Oui, il l’a effacé,
  - type: text
    content: le clouant sur la croix.
  '15':
  - type: text
    content: Là, il a désarmé
  - type: text
    content: toute Autorité, tout Pouvoir,
  - type: text
    content: les donnant publiquement en spectacle
  - type: text
    content: quand il les a traînés
  - type: text
    content: dans son cortège triomphal
  - type: text
    content: après sa victoire à la croix
  - type: note
    content: Allusion à la cérémonie romaine du triomphe. Derrière le char du général victorieux marchaient, sous les huées de la foule, les rois et les généraux vaincus.
  - type: text
    content: .
  - type: heading
    content: L’erreur des mauvais enseignants
  '16':
  - type: text
    content: 'C’est pourquoi, ne vous laissez juger par personne à propos de ce que vous mangez ou de ce que vous buvez ou au sujet de l’observance des jours de fête, des nouvelles lunes ou des sabbats. '
  '17':
  - type: text
    content: 'Tout cela n’était que l’ombre des choses à venir : la réalité est en Christ. '
  '18':
  - type: text
    content: 'Ne vous laissez pas condamner par ces gens qui prennent plaisir à s’humilier et à s’adonner à un « culte des anges ». Ils se livrent à leurs visions, ils s’enflent d’orgueil sans raison, poussés par leurs pensées tout humaines. '
  '19':
  - type: text
    content: Ils ne s’attachent pas à Christ, qui est le chef, la tête. C’est de lui que le corps tout entier tire sa croissance comme Dieu le veut
  - type: note
    content: 'Autre traduction : qui vient de Dieu.'
  - type: text
    content: ', grâce à la cohésion et à l’unité que lui apportent les articulations et les ligaments.'
  - type: heading
    content: La vie en Christ
  - type: heading
    content: La liberté en Christ
  '2':
  - type: text
    content: Je combats pour eux afin qu’ils soient encouragés et que, unis par l’amour, ils accèdent ensemble, en toute sa richesse, à la certitude que donne la compréhension du secret de Dieu et à la pleine connaissance de ce secret, c’est-à-dire de Christ
  - type: note
    content: 'Les manuscrits divergent. Certains ont, entre autres : le secret de Dieu et de Christ.'
  - type: text
    content: '. '
  '20':
  - type: text
    content: 'Vous êtes morts avec Christ à tous ces principes élémentaires qui régissent la vie des gens de ce monde. Pourquoi alors, comme si votre vie appartenait encore à ce monde, vous laissez-vous imposer des règles du genre : '
  '21':
  - type: text
    content: '« Ne prends pas ceci, ne mange pas de cela, ne touche pas à cela ! … » ? '
  '22':
  - type: text
    content: 'Toutes ces choses ne sont-elles pas destinées à périr après qu’on en a fait usage ? Voilà bien des commandements et des enseignements purement humains ! '
  '23':
  - type: text
    content: Certes, les prescriptions de ce genre paraissent empreintes d’une grande sagesse, car elles demandent une dévotion rigoureuse, des gestes d’humiliation et l’assujettissement du corps à une sévère discipline. En fait, elles n’ont aucune valeur, sinon pour satisfaire des aspirations tout humaines
  - type: note
    content: 'Autre traduction : elles n’ont aucune valeur pour maîtriser les passions de la nature humaine.'
  - type: text
    content: .
  '3':
  - type: text
    content: En lui se trouvent cachés tous les trésors de la sagesse et de la connaissance.
  '4':
  - type: text
    content: 'J’affirme cela afin que personne ne vous égare par des discours trompeurs. '
  '5':
  - type: text
    content: Car même si je suis physiquement absent, je suis avec vous par la pensée, et c’est une joie pour moi de constater l’ordre qui règne parmi vous et la fermeté de votre foi en Christ.
  - type: heading
    content: Tout pleinement en Christ
  '6':
  - type: text
    content: 'Aussi, puisque vous avez reçu Christ, Jésus le Seigneur, comportez-vous comme des gens unis à lui : '
  '7':
  - type: text
    content: enracinez-vous en lui, construisez toute votre vie sur lui et attachez-vous de plus en plus fermement à la foi conforme à ce qu’on vous a enseigné. Agissez ainsi en adressant à Dieu de nombreuses prières de reconnaissance.
  '8':
  - type: text
    content: Veillez à ce que personne ne vous prenne au piège de la recherche d’une « sagesse
  - type: note
    content: La « sagesse » prônée par ces faux docteurs se composait d’un ensemble de spéculations.
  - type: text
    content: '  » qui n’est que tromperie et illusion, qui se fonde sur des traditions tout humaines, sur les principes élémentaires qui régissent la vie des gens de ce monde, mais non sur Christ. '
  '9':
  - type: text
    content: 'Car c’est en lui, c’est dans son corps, qu’habite toute la plénitude de ce qui est en Dieu. '
