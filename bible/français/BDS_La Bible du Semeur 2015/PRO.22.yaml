document_id: PRO.22,21
type_code: fra
verses:
  '1':
  - type: text
    content: Bon renom vaut mieux que grandes richesses,
  - type: text
    content: et l’estime des autres est plus précieuse que l’or et l’argent.
  '10':
  - type: text
    content: 'Chasse le moqueur, et la discorde prendra fin :'
  - type: text
    content: les querelles et les insultes cesseront.
  '11':
  - type: text
    content: Qui aime les intentions pures
  - type: text
    content: et dont les paroles sont bienveillantes
  - type: text
    content: aura le roi pour ami.
  '12':
  - type: text
    content: L’Eternel veille à préserver la connaissance,
  - type: text
    content: mais il subvertit les propos du perfide.
  '13':
  - type: text
    content: 'Le paresseux dit : « Il y a un lion là-dehors,'
  - type: text
    content: je risque d’être déchiré en pleine rue ! »
  '14':
  - type: text
    content: 'La bouche des femmes adultères est comme une fosse profonde :'
  - type: text
    content: celui contre qui l’Eternel est irrité y tombera
  - type: note
    content: Voir 2.16 ; 5.3, 5 ; 6.24 ; 7.5.
  - type: text
    content: .
  '15':
  - type: text
    content: La tendance à faire des actions déraisonnables est ancrée dans le cœur de l’enfant,
  - type: text
    content: le bâton de la correction l’en extirpera.
  '16':
  - type: text
    content: Qui opprime le pauvre pour réaliser un gain,
  - type: text
    content: ou qui fait des cadeaux aux riches, finira dans la pauvreté.
  - type: heading
    content: Les paroles des sages
  '17':
  - type: text
    content: Prête l’oreille et écoute les paroles des sages,
  - type: text
    content: applique ton cœur à mon enseignement,
  '18':
  - type: text
    content: car tu auras du plaisir à garder ces maximes au fond de ton cœur
  - type: text
    content: et à les avoir à la disposition de tes lèvres.
  '19':
  - type: text
    content: Pour que tu mettes ta confiance en l’Eternel,
  - type: text
    content: je vais t’instruire, toi aussi, aujourd’hui ;
  '2':
  - type: text
    content: 'Riche et pauvre ont ceci en commun :'
  - type: text
    content: c’est l’Eternel qui les a faits l’un et l’autre.
  '20':
  - type: text
    content: j’ai consigné par écrit pour toi une trentaine
  - type: note
    content: 'une trentaine: hébreu peu clair. Autres traductions : auparavant ou excellentes.'
  - type: text
    content: ' de maximes comportant'
  - type: text
    content: des conseils et des réflexions,
  '21':
  - type: text
    content: pour t’apporter une connaissance sûre, des paroles vraies.
  - type: text
    content: Ainsi tu pourras donner des réponses vraies à celui qui t’envoie.
  '22':
  - type: text
    content: Ne profite pas de la pauvreté de ton prochain pour le dépouiller,
  - type: text
    content: n’écrase pas en justice celui qui est dans la misère,
  '23':
  - type: text
    content: car l’Eternel prendra leur cause en main
  - type: text
    content: et il ravira la vie à ceux qui auront ravi leurs biens.
  '24':
  - type: text
    content: Ne te lie pas d’amitié avec un homme coléreux
  - type: text
    content: et ne fréquente pas celui qui s’emporte pour un rien
  '25':
  - type: text
    content: de peur d’acquérir le même comportement
  - type: text
    content: et de mettre ainsi ta vie en péril.
  '26':
  - type: text
    content: Ne t’engage pas pour cautionner autrui,
  - type: text
    content: et ne te porte pas garant d’un emprunt
  - type: note
    content: Voir 6.1 et note.
  - type: text
    content: ','
  '27':
  - type: text
    content: car, si tu n’es pas en mesure de payer,
  - type: text
    content: pourquoi t’exposerais-tu à te voir enlever jusqu’au lit où tu reposes ?
  '28':
  - type: text
    content: Ne déplace pas les anciennes bornes
  - type: text
    content: que tes ancêtres ont placées.
  '29':
  - type: text
    content: Connaissez-vous un homme habile dans ce qu’il fait ?
  - type: text
    content: Il ne restera pas au service de gens obscurs,
  - type: text
    content: mais il entrera au service des rois.
  '3':
  - type: text
    content: L’homme avisé voit venir le malheur et se met à l’abri,
  - type: text
    content: l’homme sans expérience poursuit son chemin et en subira les conséquences.
  '4':
  - type: text
    content: Sois humble et crains l’Eternel,
  - type: text
    content: tu seras riche et honoré, et tu recevras la vie.
  '5':
  - type: text
    content: Le chemin des hommes corrompus est parsemé d’épines et de pièges,
  - type: text
    content: qui veut préserver sa vie s’en tiendra éloigné.
  '6':
  - type: text
    content: Apprends à l’enfant le chemin qu’il doit suivre
  - type: note
    content: 'Autres traduction : éduque l’enfant dès le début de sa vie.'
  - type: text
    content: ','
  - type: text
    content: même quand il sera vieux, il n’en déviera pas.
  '7':
  - type: text
    content: Le riche domine le pauvre,
  - type: text
    content: qui emprunte se met sous la coupe de son créancier.
  '8':
  - type: text
    content: Qui sème l’injustice moissonnera l’iniquité
  - type: note
    content: 'Autre traduction : le malheur.'
  - type: text
    content: ','
  - type: text
    content: et son règne de terreur prendra fin.
  '9':
  - type: text
    content: L’homme qui regarde autrui avec bonté sera béni
  - type: text
    content: parce qu’il a partagé son pain avec le pauvre.
