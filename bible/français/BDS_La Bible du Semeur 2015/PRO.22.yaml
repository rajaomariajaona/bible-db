document_id: PRO.22,21
type_code: fra
verses:
  '1':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Bon renom vaut mieux que grandes richesses,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et l’estime des autres est plus précieuse que l’or et l’argent.
  '10':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Chasse le moqueur, et la discorde prendra fin :'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: les querelles et les insultes cesseront.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Qui aime les intentions pures
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et dont les paroles sont bienveillantes
  - type: usfm
    marker: q1
    children:
    - type: text
      text: aura le roi pour ami.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: L’Eternel veille à préserver la connaissance,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: mais il subvertit les propos du perfide.
  '13':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Le paresseux dit : « Il y a un lion là-dehors,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: je risque d’être déchiré en pleine rue ! »
  '14':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'La bouche des femmes adultères est comme une fosse profonde :'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: celui contre qui l’Eternel est irrité y tombera
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '22.14 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Voir 2.16 ; 5.3, 5 ; 6.24 ; 7.5.
      marker-yv: yv-n
    - type: text
      text: .
  '15':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: La tendance à faire des actions déraisonnables est ancrée dans le cœur de l’enfant,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: le bâton de la correction l’en extirpera.
  '16':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Qui opprime le pauvre pour réaliser un gain,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ou qui fait des cadeaux aux riches, finira dans la pauvreté.
  - type: usfm
    marker: ms1
    children:
    - type: text
      text: Les paroles des sages
    marker-yv: yv-h
  '17':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Prête l’oreille et écoute les paroles des sages,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: applique ton cœur à mon enseignement,
  '18':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: car tu auras du plaisir à garder ces maximes au fond de ton cœur
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et à les avoir à la disposition de tes lèvres.
  '19':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Pour que tu mettes ta confiance en l’Eternel,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: je vais t’instruire, toi aussi, aujourd’hui ;
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Riche et pauvre ont ceci en commun :'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: c’est l’Eternel qui les a faits l’un et l’autre.
  '20':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: j’ai consigné par écrit pour toi une trentaine
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '22.20 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: une trentaine
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: ': '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'hébreu peu clair. Autres traductions : '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'auparavant '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'ou '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: excellentes.
      marker-yv: yv-n
    - type: text
      text: ' de maximes comportant'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: des conseils et des réflexions,
  '21':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: pour t’apporter une connaissance sûre, des paroles vraies.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ainsi tu pourras donner des réponses vraies à celui qui t’envoie.
  '22':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ne profite pas de la pauvreté de ton prochain pour le dépouiller,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: n’écrase pas en justice celui qui est dans la misère,
  '23':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: car l’Eternel prendra leur cause en main
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et il ravira la vie à ceux qui auront ravi leurs biens.
  '24':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ne te lie pas d’amitié avec un homme coléreux
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et ne fréquente pas celui qui s’emporte pour un rien
  '25':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: de peur d’acquérir le même comportement
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et de mettre ainsi ta vie en péril.
  '26':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ne t’engage pas pour cautionner autrui,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et ne te porte pas garant d’un emprunt
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '22.26 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Voir '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: '6.1'
        - type: text
          text: ' et note.'
      marker-yv: yv-n
    - type: text
      text: ','
  '27':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: car, si tu n’es pas en mesure de payer,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: pourquoi t’exposerais-tu à te voir enlever jusqu’au lit où tu reposes ?
  '28':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ne déplace pas les anciennes bornes
  - type: usfm
    marker: q1
    children:
    - type: text
      text: que tes ancêtres ont placées.
  '29':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Connaissez-vous un homme habile dans ce qu’il fait ?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Il ne restera pas au service de gens obscurs,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: mais il entrera au service des rois.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: L’homme avisé voit venir le malheur et se met à l’abri,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: l’homme sans expérience poursuit son chemin et en subira les conséquences.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Sois humble et crains l’Eternel,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: tu seras riche et honoré, et tu recevras la vie.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Le chemin des hommes corrompus est parsemé d’épines et de pièges,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: qui veut préserver sa vie s’en tiendra éloigné.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Apprends à l’enfant le chemin qu’il doit suivre
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '22.6 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Autres traduction : '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: éduque l’enfant dès le début de sa vie.
      marker-yv: yv-n
    - type: text
      text: ','
  - type: usfm
    marker: q1
    children:
    - type: text
      text: même quand il sera vieux, il n’en déviera pas.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Le riche domine le pauvre,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: qui emprunte se met sous la coupe de son créancier.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Qui sème l’injustice moissonnera l’iniquité
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '22.8 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Autre traduction : '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: le malheur.
      marker-yv: yv-n
    - type: text
      text: ','
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et son règne de terreur prendra fin.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: L’homme qui regarde autrui avec bonté sera béni
  - type: usfm
    marker: q1
    children:
    - type: text
      text: parce qu’il a partagé son pain avec le pauvre.
