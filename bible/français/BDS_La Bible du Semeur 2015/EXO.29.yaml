document_id: EXO.29,21
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Sur l’investiture d’Aaron et de ses fils
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: Voici comment tu procéderas à l’égard d’Aaron et de ses fils pour les consacrer à mon service comme prêtres.
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Tu prendras un jeune taureau et deux béliers sans défaut, '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'Tu amèneras le taureau devant la tente de la Rencontre ; Aaron et ses fils poseront leurs mains sur la tête du taureau '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'que tu égorgeras ensuite en ma présence à l’entrée de la tente de la Rencontre. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'Tu prendras de son sang et tu en appliqueras avec ton doigt sur les cornes de l’autel. Tu répandras tout le reste du sang sur le socle de l’autel. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'Puis tu prendras toute la graisse qui recouvre les entrailles, ainsi que le dessus du foie et les deux rognons avec la graisse qui les entoure et tu feras brûler le tout sur l’autel. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: Mais tu brûleras la chair du taureau, sa peau et ses excréments à l’extérieur du camp. C’est un sacrifice pour le péché.
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'Ensuite tu prendras le premier bélier, Aaron et ses fils poseront leurs mains sur sa tête. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'Tu l’égorgeras et tu aspergeras de son sang sur tous les côtés de l’autel. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'Puis tu le découperas en morceaux, tu laveras ses entrailles et ses pattes et tu les disposeras sur les quartiers de viande et sur sa tête. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'Tu brûleras tout le bélier sur l’autel : c’est un holocauste'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '29.18 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Le terme français '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'holocauste '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'vient d’un mot grec qui signifie : « entièrement brûlé ». On ignore le sens du mot hébreu correspondant. Voir '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: Lv 1
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: ' offert à l’Eternel, un sacrifice à l’odeur apaisante, consumé par le feu pour l’Eternel.'
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'Enfin, tu prendras le second bélier, Aaron et ses fils poseront leurs mains sur sa tête. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'du pain sans levain, des gâteaux sans levain pétris à l’huile et des galettes sans levain arrosées d’huile, faites de fleur de farine de froment. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: 'Tu l’égorgeras et tu prendras de son sang pour l’appliquer sur le lobe de l’oreille droite d’Aaron et de ses fils, sur le pouce de leur main droite et sur le gros orteil de leur pied droit, puis tu aspergeras de sang les quatre faces de l’autel. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: Tu prendras du sang qui sera sur l’autel, et de l’huile d’onction, et tu en aspergeras Aaron et ses vêtements, ses fils et leurs vêtements. Ainsi, lui et ses fils ainsi que leurs vêtements seront consacrés.
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: 'Tu prendras la graisse du bélier, sa queue, la graisse qui recouvre les entrailles, le dessus du foie, les deux rognons et la graisse qui les entoure, ainsi que le gigot droit – car il s’agit d’un bélier d’investiture. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: 'Tu prendras aussi une miche de pain, un gâteau à l’huile et une galette prélevée dans la corbeille des pains sans levain déposée devant l’Eternel. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: 'Tu placeras le tout dans les mains d’Aaron et de ses fils et tu les leur feras offrir à l’Eternel avec un geste de présentation. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: Ensuite, tu les reprendras de leurs mains et les feras brûler sur l’autel au-dessus de l’holocauste, en sacrifice à l’odeur apaisante, consumé par le feu, pour l’Eternel.
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: 'Tu prendras la poitrine du bélier pour la consécration d’Aaron et tu l’offriras à l’Eternel avec le geste de présentation. Ce morceau te reviendra comme ta part. '
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: 'Tu consacreras la poitrine qui aura été présentée à l’Eternel et le gigot provenant du bélier d’investiture pour Aaron et pour ses fils. '
  '28':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: 'Cette contribution des Israélites appartiendra à Aaron et à ses fils selon une ordonnance en vigueur à perpétuité, car c’est un prélèvement sur les offrandes des Israélites, sur leurs sacrifices de communion pour l’Eternel. '
  '29':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: 'Les vêtements sacrés d’Aaron reviendront après lui à ses descendants, qui les porteront lorsqu’on leur conférera l’onction pour les investir de leur charge. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: Tu les mettras tous dans la même corbeille pour les apporter avec le taureau et les deux béliers.
  '30':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '30'
    - type: text
      text: Celui de ses fils qui lui succédera comme prêtre et qui pénétrera dans la tente de la Rencontre pour officier dans le lieu saint, les portera pendant sept jours.
  '31':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '31'
    - type: text
      text: 'Puis tu prendras le bélier de l’investiture et tu en feras cuire la viande dans un lieu saint. '
  '32':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '32'
    - type: text
      text: 'Aaron et ses fils mangeront la viande du bélier et le pain qui est dans la corbeille à l’entrée de la tente de la Rencontre. '
  '33':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '33'
    - type: text
      text: 'Ils mangeront ces offrandes par lesquelles est accompli le rite d’expiation pour leur donner l’investiture et les rendre saints. Aucun autre membre du peuple n’en mangera, car ce sont des choses saintes. '
  '34':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '34'
    - type: text
      text: S’il reste jusqu’au lendemain de la viande de la victime d’investiture et du pain, tu brûleras ce reste ; on ne le mangera pas, car ce sont des choses saintes.
  '35':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '35'
    - type: text
      text: 'Tu accompliras donc pendant sept jours pour Aaron et ses fils les rites d’investiture, exactement comme je te l’ai ordonné. '
  '36':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '36'
    - type: text
      text: 'Chaque jour, tu offriras un taureau en sacrifice d’expiation pour le péché, et tu purifieras l’autel au moyen de cette expiation que tu accompliras pour lui. Ensuite, tu y répandras de l’huile d’onction pour le consacrer. '
  '37':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '37'
    - type: text
      text: Tu renouvelleras ces rites d’expiation pour l’autel pendant sept jours afin de le consacrer. Après cela, il sera éminemment saint et tout ce qui le touchera sera saint.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Les deux holocaustes quotidiens
    marker-yv: yv-h
  '38':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '38'
    - type: text
      text: 'Voici ce que tu feras : chaque jour, à perpétuité, tu offriras sur l’autel deux agneaux âgés d’un an. '
  '39':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '39'
    - type: text
      text: 'L’un d’eux sera offert le matin, l’autre à la nuit tombante. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'Tu feras approcher Aaron et ses fils de l’entrée de la tente de la Rencontre et tu les laveras à l’eau. '
  '40':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '40'
    - type: text
      text: Avec le premier agneau, tu joindras trois kilogrammes de fleur de farine pétrie avec un litre et demi d’huile fine ; puis tu verseras un litre et demi de vin comme libation
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '29.40 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'En hébreu : '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: un dizième d’épha de fleur de farine, pétrie avec un quart de hîn d’huile fine ; puis tu verseras un quart de hîn de vin…
      marker-yv: yv-n
    - type: text
      text: '. '
  '41':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '41'
    - type: text
      text: 'Tu accompagneras le sacrifice du soir des mêmes offrandes de farine, d’huile et de vin que celui du matin. C’est un sacrifice à l’odeur apaisante consumé par le feu pour l’Eternel. '
  '42':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '42'
    - type: text
      text: C’est un holocauste que vous offrirez à perpétuité de génération en génération, à l’entrée de la tente de la Rencontre devant l’Eternel, à l’endroit où je vous convoquerai pour m’y entretenir avec toi.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: 'L’Eternel : le Dieu des Israélites'
    marker-yv: yv-h
  '43':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '43'
    - type: text
      text: 'C’est là que je rencontrerai les Israélites, et ma gloire rendra ce lieu saint. '
  '44':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '44'
    - type: text
      text: 'Je consacrerai la tente de la Rencontre et l’autel, je consacrerai aussi Aaron et ses fils pour qu’ils soient mes prêtres. '
  '45':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '45'
    - type: text
      text: 'J’habiterai au milieu des Israélites et je serai leur Dieu, '
  '46':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '46'
    - type: text
      text: et ils sauront que c’est moi, l’Eternel, leur Dieu, qui les ai fait sortir d’Egypte pour habiter au milieu d’eux ; oui, je suis l’Eternel, leur Dieu.
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'Puis tu prendras les vêtements sacrés et tu feras endosser à Aaron la tunique, la robe de l’éphod, l’éphod et le pectoral, et tu le ceindras avec la ceinture de l’éphod. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'Tu le coifferas du turban sur lequel tu fixeras le diadème de consécration. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'Ensuite, tu prendras l’huile d’onction et tu la répandras sur sa tête pour l’oindre. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'Tu feras approcher ses fils et tu les revêtiras de leurs tuniques. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: Tu ceindras Aaron et ses fils d’une ceinture et tu les coifferas de turbans. Ainsi tu conféreras l’investiture à Aaron et à ses fils, et le sacerdoce leur appartiendra en vertu d’une ordonnance en vigueur à perpétuité.
