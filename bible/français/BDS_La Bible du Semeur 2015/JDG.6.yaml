document_id: JDG.6,21
type_code: fra
verses:
  '1':
  - type: heading
    content: L’oppression des Madianites
  - type: text
    content: Les Israélites firent de nouveau ce que l’Eternel considère comme mal, de sorte que l’Eternel les livra au pouvoir des Madianites
  - type: note
    content: Les Madianites, issus d’Abraham et de Qetoura (Gn 25.2 ; 1 Ch 1.32), sont connus dans l’Ancien Testament comme un peuple nomade dont on situe le territoire en Arabie du Nord, à l’est du golfe d’Aqaba. Ils faisaient des incursions vers l’ouest. Tantôt alliés d’Israël (Ex 2.15-22 ; 18.1-11 ; Nb 10.29-32), tantôt ennemis (Nb 22.4 ; 25.6-18), ils s’alliaient à d’autres peuplades pour ravager les terres des sédentaires.
  - type: text
    content: ' pendant sept ans. '
  '10':
  - type: text
    content: 'Je vous ai dit : Je suis l’Eternel votre Dieu ; ne craignez pas les dieux des Amoréens dont vous habitez le pays. Mais vous ne m’avez pas écouté. »'
  - type: heading
    content: Gédéon
  '11':
  - type: text
    content: 'L’ange de l’Eternel vint s’asseoir sous le chêne qui se trouvait à Ophra dans la propriété de Joas, un homme de la famille d’Abiézer. Gédéon, un fils de Joas, était en train de battre le blé dans le pressoir à raisin pour le cacher des Madianites. '
  '12':
  - type: text
    content: 'L’ange de l’Eternel lui apparut et dit : L’Eternel est avec toi, guerrier valeureux !'
  '13':
  - type: text
    content: 'Gédéon lui répondit : De grâce, mon seigneur, si l’Eternel est avec nous, pourquoi tant de malheurs s’abattent-ils sur nous ? Où sont donc tous ces prodiges que nos pères nous ont racontés en nous disant que l’Eternel nous a fait sortir d’Egypte ? En réalité, l’Eternel nous a abandonnés et nous a livrés au pouvoir des Madianites.'
  '14':
  - type: text
    content: 'Alors l’Eternel se tourna vers lui et dit : Va avec cette force que tu as, et délivre Israël des Madianites. N’est-ce pas moi qui t’envoie ?'
  '15':
  - type: text
    content: 'Mais Gédéon répliqua : De grâce, mon Seigneur ! Avec quoi pourrais-je délivrer Israël ? Ma famille est peu importante dans la tribu de Manassé, et moi je suis le plus jeune des fils de mon père.'
  '16':
  - type: text
    content: 'L’Eternel lui répondit : Je serai avec toi, c’est pourquoi tu battras les Madianites tous ensemble.'
  '17':
  - type: text
    content: 'Gédéon lui dit : Eh bien, si réellement tu m’accordes ta faveur, prouve-moi par un signe que c’est bien toi qui me parles. '
  '18':
  - type: text
    content: Ne t’éloigne pas d’ici, je te prie, avant que je sois revenu vers toi avec une offrande que je te présenterai.
  - type: text
    content: – J’attendrai ton retour, lui dit-il.
  '19':
  - type: text
    content: 'Gédéon rentra chez lui, apprêta un jeune chevreau et prépara des pains sans levain avec trente kilos de farine. Il mit la viande dans une corbeille et le jus dans un pot, puis il apporta le tout à l’ange de Dieu qui se tenait sous le chêne et le lui offrit. '
  '2':
  - type: text
    content: 'L’oppression des Madianites fut si dure que les Israélites s’aménagèrent des abris dans les cavernes, les grottes et les endroits escarpés des montagnes. '
  '20':
  - type: text
    content: 'L’ange de Dieu lui dit : Prends la viande et les pains sans levain et dépose-les sur ce rocher, puis verse le jus par-dessus.'
  - type: text
    content: 'Gédéon obéit. '
  '21':
  - type: text
    content: 'L’ange de l’Eternel avança le bout du bâton qu’il tenait en main et en toucha la viande et les pains sans levain. Une flamme jaillit du rocher et consuma la viande et les pains sans levain. Puis l’ange de l’Eternel disparut à ses yeux. '
  '22':
  - type: text
    content: 'A ce moment, Gédéon reconnut que c’était l’ange de l’Eternel et il s’écria : Malheur à moi, Seigneur Eternel ! Car j’ai vu l’ange de l’Eternel face à face'
  - type: note
    content: Puisqu’on ne peut voir Dieu et vivre (Gn 16.13 ; 32.31 ; Ex 33.20 ; 19.21 ; Jg 13.22 ; Es 6.5).
  - type: text
    content: .
  '23':
  - type: text
    content: 'Mais l’Eternel lui dit : Rassure-toi, n’aie pas peur, tu ne mourras pas.'
  '24':
  - type: text
    content: Gédéon construisit à cet endroit un autel à l’Eternel et il l’appela « L’Eternel assure la paix ». Cet autel existe encore aujourd’hui à Ophra, un village du groupe familial d’Abiézer.
  - type: heading
    content: Gédéon démolit l’autel de Baal
  '25':
  - type: text
    content: 'La nuit suivante, l’Eternel dit à Gédéon : Prends le jeune taureau de ton père, le second, celui de sept ans. Démolis l’autel de Baal qui est à ton père et abats le poteau sacré voué à la déesse Ashéra qui est dressé à côté. '
  '26':
  - type: text
    content: Puis tu bâtiras un autel bien aménagé à l’Eternel ton Dieu au sommet de cette colline. Tu prendras le second taureau et tu l’offriras en holocauste, en utilisant comme combustible le bois du poteau sacré que tu auras abattu.
  '27':
  - type: text
    content: 'Gédéon prit dix hommes parmi ses serviteurs et fit ce que l’Eternel lui avait demandé, mais comme il n’osait pas agir en plein jour par crainte de sa famille et des habitants du village, il opéra de nuit. '
  '28':
  - type: text
    content: 'Le lendemain matin, les gens du village découvrirent que l’autel de Baal avait été démoli, que le poteau sacré était abattu et qu’un taureau avait été offert en holocauste sur l’autel qui venait d’être construit. '
  '29':
  - type: text
    content: 'Ils se demandèrent les uns aux autres : Qui a fait cela ?'
  - type: text
    content: 'Alors qu’ils cherchaient à se renseigner, on leur dit que c’était Gédéon, le fils de Joas, qui avait fait cela. '
  '3':
  - type: text
    content: 'Chaque fois que les Israélites avaient ensemencé leurs champs, les Madianites venaient les attaquer avec les Amalécites et d’autres tribus nomades de l’Orient. '
  '30':
  - type: text
    content: 'Alors ils dirent à Joas : Fais sortir ton fils et il mourra, car il a démoli l’autel de Baal et abattu le poteau sacré qui se trouvait à côté.'
  '31':
  - type: text
    content: 'Mais Joas répondit à tous ceux qui se tenaient autour de lui : Est-ce à vous de défendre la cause de Baal ? Est-ce à vous de lui venir en aide ? Celui qui prendra parti pour Baal sera mis à mort avant demain matin. Si Baal est dieu, qu’il se défende lui-même, puisqu’on a démoli son autel.'
  '32':
  - type: text
    content: 'A partir de ce jour, on surnomma Gédéon Yeroubbaal (Que Baal se défende) parce qu’on avait dit : Que Baal se défende contre lui puisqu’il a démoli son autel !'
  - type: heading
    content: Gédéon demande un signe
  '33':
  - type: text
    content: 'Les Madianites, les Amalécites et les nomades de l’Orient rassemblèrent leurs troupes, traversèrent le Jourdain et installèrent leur camp dans la vallée de Jizréel. '
  '34':
  - type: text
    content: 'L’Esprit de l’Eternel s’empara de Gédéon qui se mit à sonner du cor. Alors les hommes de la famille d’Abiézer se rassemblèrent pour le suivre. '
  '35':
  - type: text
    content: Gédéon envoya des messagers dans tout le territoire de Manassé. Là aussi, les hommes se rassemblèrent pour marcher avec lui. Il envoya de même des messagers dans les tribus d’Aser, de Zabulon et de Nephtali, et tous vinrent le rejoindre.
  '36':
  - type: text
    content: 'Gédéon dit à Dieu : Si réellement tu veux délivrer Israël par mes soins, comme tu l’as dit, '
  '37':
  - type: text
    content: 'voici ce que je te demande : j’étendrai une toison de laine sur le sol de l’aire où l’on bat le blé. Si la rosée se dépose seulement sur la toison, et si tout le sol autour reste sec, je saurai que c’est par mes soins que tu veux délivrer Israël, comme tu l’as déclaré.'
  '38':
  - type: text
    content: 'C’est exactement ce qui arriva. Le lendemain, il se leva de bon matin, pressa la toison et en fit sortir assez de rosée pour remplir d’eau tout un bol. '
  '39':
  - type: text
    content: 'Alors il dit à Dieu : Ne te fâche pas contre moi si je t’adresse encore une fois une demande, permets-moi seulement une dernière épreuve avec la toison : qu’elle seule reste sèche et que la rosée mouille le sol tout autour.'
  '4':
  - type: text
    content: 'Ils établissaient leur campement dans le pays et détruisaient les récoltes jusqu’aux abords de Gaza. Ils ne laissaient aux Israélites ni vivres, ni moutons, ni bœufs, ni ânes. '
  '40':
  - type: text
    content: 'Et Dieu fit cette nuit-là ce que Gédéon lui avait demandé : seule la toison resta sèche, alors que tout le sol reçut de la rosée.'
  '5':
  - type: text
    content: En effet, ils arrivaient en grand nombre, comme des sauterelles, avec leurs troupeaux et leurs tentes. Eux et leurs chameaux étaient innombrables, et ils envahissaient le pays pour le ravager.
  '6':
  - type: text
    content: 'Les Israélites furent réduits à une grande misère par les Madianites et ils implorèrent l’Eternel. '
  '7':
  - type: text
    content: 'Lorsque les Israélites implorèrent l’Eternel à cause des Madianites, '
  '8':
  - type: text
    content: 'il leur envoya un prophète qui leur dit : Voici ce que déclare l’Eternel, le Dieu d’Israël : « C’est moi qui vous ai fait sortir d’Egypte, de ce pays où vous étiez réduits à l’esclavage. '
  '9':
  - type: text
    content: 'Je vous ai délivrés des Egyptiens et de tous ceux qui vous opprimaient : je les ai chassés devant vous et je vous ai donné leur pays. '
