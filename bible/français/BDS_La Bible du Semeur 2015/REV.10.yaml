document_id: REV.10,21
type_code: fra
verses:
  '1':
  - type: heading
    content: Le petit livre
  - type: text
    content: 'Ensuite je vis un autre ange puissant descendre du ciel, enveloppé d’une nuée. Un arc-en-ciel auréolait sa tête. Son visage rayonnait comme le soleil, et ses jambes ressemblaient à des colonnes de feu. '
  '10':
  - type: text
    content: 'Je pris donc le petit livre de la main de l’ange et je le mangeai. Dans ma bouche, il fut doux comme du miel, mais, après l’avoir mangé, mon estomac fut rempli d’amertume. '
  '11':
  - type: text
    content: 'Alors on me dit : Tu dois encore prophétiser concernant beaucoup de peuples, de nations, de langues et de rois.'
  '2':
  - type: text
    content: 'Dans sa main, il tenait un petit livre ouvert. Il posa son pied droit sur la mer et le gauche sur la terre. '
  '3':
  - type: text
    content: Il se mit à crier d’une voix forte comme rugit un lion. Quand il eut crié, les sept tonnerres firent retentir leur voix.
  '4':
  - type: text
    content: 'Quand ils eurent fini de parler, je me disposais à transcrire leur message, lorsqu’une voix venant du ciel me dit : Garde sous le sceau du secret les déclarations des sept tonnerres, ne les note pas.'
  '5':
  - type: text
    content: 'Alors, l’ange '
  - type: text
    content: que j’avais vu debout sur la mer et sur la terre leva la main droite vers le ciel
  - type: text
    content: ' '
  '6':
  - type: text
    content: et jura solennellement
  - type: note
    content: Voir Dn 12.7.
  - type: text
    content: ' par celui qui vit éternellement, qui a créé le ciel et tout ce qui s’y trouve, la terre et tout ce qui s’y trouve, la mer et tout ce qui s’y trouve : Désormais, il n’y aura plus de délai ! '
  '7':
  - type: text
    content: Au jour où retentira la trompette du septième ange, tout le plan secret de Dieu s’accomplira, comme il l’a annoncé à ses serviteurs, ses prophètes.
  '8':
  - type: text
    content: 'De nouveau, la voix que j’avais entendue venant du ciel m’adressa la parole : Va, me dit-elle, prends le livre ouvert dans la main de l’ange qui se tient debout sur la mer et sur la terre.'
  '9':
  - type: text
    content: Je m’approchai donc de l’ange, en le priant de me remettre le petit livre.
  - type: text
    content: '– Tiens, me dit-il, mange-le. '
  - type: text
    content: Il te remplira l’estomac d’amertume, mais dans ta bouche, il sera doux comme du miel
  - type: note
    content: Voir Ez 3.3.
  - type: text
    content: '!'
  - type: text
    content: ' '
