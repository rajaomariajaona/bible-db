document_id: HOS.1,21
type_code: fra
verses:
  '1':
  - type: usfm
    marker: ms1
    children:
    - type: text
      text: Les actes symboliques
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: L’Eternel adressa la parole à Osée, fils de Beéri, sous les règnes d’Ozias, de Yotam, d’Ahaz et d’Ezéchias, rois de Juda, et sous le règne de Jéroboam, fils de Joas, roi d’Israël
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1.1 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Sur cette période, voir 2 R 15 à 20 ; 2 Ch 27 à 32. '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: roi d’Israël
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: ': '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Jéroboam (793 à 753 av. J.-C.). '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'rois de Juda, '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'en tenant compte des co-régences : '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'Ozias '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '(792 à 740 av. J.-C.), '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'Yotam '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '(750 à 732 av. J.-C.), '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'Ahaz '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '(735 à 715 av. J.-C.) et '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'Ezéchias '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: (727 à 698 ou 686 av. J.-C.).
      marker-yv: yv-n
    - type: text
      text: .
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Le mariage de Dieu avec Israël
    marker-yv: yv-h
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'Première partie des paroles que l’Eternel prononça par Osée :'
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'L’Eternel dit à Osée : Va, prends une femme qui se livre à la prostitution, et des enfants nés de la prostitution, car le pays se vautre dans la prostitution en se détournant de l’Eternel'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1.2 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Le culte de Baal et d’Astarté, avec leurs rites de fécondité, s’accompagnait de la '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'prostitution '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: sacrée (voir v. 10 et note).
      marker-yv: yv-n
    - type: text
      text: .
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'Alors Osée alla prendre Gomer, de Diblaïm. Elle devint enceinte et lui donna un fils. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'L’Eternel lui dit : Appelle-le Jizréel, car d’ici peu de temps, je ferai rendre compte à la dynastie de Jéhu des meurtres commis à Jizréel'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1.4 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Voir '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: '2.2'
        - type: text
          text: ' et note ; '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: 2 R 9
        - type: text
          text: ' et '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: '10'
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: ' et je mettrai fin à la royauté d’Israël. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: En ce jour-là, je briserai l’arc d’Israël dans la vallée de Jizréel.
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'Gomer fut de nouveau enceinte et mit au monde une fille. L’Eternel dit à Osée : Appelle-la Lo-Rouhama (la Non-Aimée), car, à l’avenir, je ne manifesterai plus d’amour à la communauté d’Israël, et je ne lui accorderai plus mon pardon.'
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: Cependant, je manifesterai de l’amour à la communauté de Juda, et moi, l’Eternel son Dieu, je la sauverai. Je la sauverai moi-même – et non pas par l’arc, par l’épée ou la guerre, par les chevaux et les équipages de chars.
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: Après avoir sevré Lo-Rouhama, Gomer fut encore enceinte et elle donna naissance à un fils.
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'L’Eternel dit à Osée : Appelle-le Lo-Ammi (Pas mon peuple) car vous n’êtes pas mon peuple, et moi, Je suis, je ne suis rien pour vous'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1.9 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Reprise du verbe d’
        - type: usfm
          marker: ref
          children:
          - type: text
            text: Ex 3.14
        - type: text
          text: ' où Dieu révèle son nom : '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: Je suis.
      marker-yv: yv-n
    - type: text
      text: .
