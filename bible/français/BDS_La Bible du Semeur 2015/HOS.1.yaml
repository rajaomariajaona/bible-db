document_id: HOS.1,21
type_code: fra
verses:
  '1':
  - type: heading
    content: Les actes symboliques
  - type: text
    content: L’Eternel adressa la parole à Osée, fils de Beéri, sous les règnes d’Ozias, de Yotam, d’Ahaz et d’Ezéchias, rois de Juda, et sous le règne de Jéroboam, fils de Joas, roi d’Israël
  - type: note
    content: 'Sur cette période, voir 2 R 15 à 20 ; 2 Ch 27 à 32. roi d’Israël: Jéroboam (793 à 753 av. J.-C.). rois de Juda, en tenant compte des co-régences : Ozias (792 à 740 av. J.-C.), Yotam (750 à 732 av. J.-C.), Ahaz (735 à 715 av. J.-C.) et Ezéchias (727 à 698 ou 686 av. J.-C.).'
  - type: text
    content: .
  - type: heading
    content: Le mariage de Dieu avec Israël
  '2':
  - type: text
    content: 'Première partie des paroles que l’Eternel prononça par Osée :'
  - type: text
    content: 'L’Eternel dit à Osée : Va, prends une femme qui se livre à la prostitution, et des enfants nés de la prostitution, car le pays se vautre dans la prostitution en se détournant de l’Eternel'
  - type: note
    content: Le culte de Baal et d’Astarté, avec leurs rites de fécondité, s’accompagnait de la prostitution sacrée (voir v. 10 et note).
  - type: text
    content: .
  '3':
  - type: text
    content: 'Alors Osée alla prendre Gomer, de Diblaïm. Elle devint enceinte et lui donna un fils. '
  '4':
  - type: text
    content: 'L’Eternel lui dit : Appelle-le Jizréel, car d’ici peu de temps, je ferai rendre compte à la dynastie de Jéhu des meurtres commis à Jizréel'
  - type: note
    content: Voir 2.2 et note ; 2 R 9 et 10.
  - type: text
    content: ' et je mettrai fin à la royauté d’Israël. '
  '5':
  - type: text
    content: En ce jour-là, je briserai l’arc d’Israël dans la vallée de Jizréel.
  '6':
  - type: text
    content: 'Gomer fut de nouveau enceinte et mit au monde une fille. L’Eternel dit à Osée : Appelle-la Lo-Rouhama (la Non-Aimée), car, à l’avenir, je ne manifesterai plus d’amour à la communauté d’Israël, et je ne lui accorderai plus mon pardon.'
  '7':
  - type: text
    content: Cependant, je manifesterai de l’amour à la communauté de Juda, et moi, l’Eternel son Dieu, je la sauverai. Je la sauverai moi-même – et non pas par l’arc, par l’épée ou la guerre, par les chevaux et les équipages de chars.
  '8':
  - type: text
    content: Après avoir sevré Lo-Rouhama, Gomer fut encore enceinte et elle donna naissance à un fils.
  '9':
  - type: text
    content: 'L’Eternel dit à Osée : Appelle-le Lo-Ammi (Pas mon peuple) car vous n’êtes pas mon peuple, et moi, Je suis, je ne suis rien pour vous'
  - type: note
    content: 'Reprise du verbe d’Ex 3.14 où Dieu révèle son nom : Je suis.'
  - type: text
    content: .
