document_id: EST.9,21
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Le péril des ennemis des Juifs
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Le treizième jour du douzième mois, c’est-à-dire le mois d’Adar, arriva. C’était le jour où le décret impérial devait être appliqué. En ce jour, les ennemis des Juifs avaient espéré se rendre maîtres d’eux, mais la situation se retourna : ce furent les Juifs qui se rendirent maîtres de leurs ennemis. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: les dix fils de Haman, fils de Hammedata, le persécuteur des Juifs. Mais on s’abstint de tout pillage.
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Le jour même, l’empereur fut informé du nombre de victimes dans la citadelle de Suse. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Il dit à l’impératrice Esther : Dans la seule citadelle de Suse, les Juifs ont tué et fait périr cinq cents hommes ainsi que les dix fils de Haman. Qu’ont-ils dû faire dans les autres provinces de l’empire ! Néanmoins, si tu as encore une requête à formuler, elle te sera accordée. Quelle est ta demande ? Tu l’obtiendras.'
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Esther répondit : Si l’empereur le veut bien, qu’il accorde aux Juifs de Suse la permission d’agir demain comme aujourd’hui, et que l’on pende les corps des dix fils de Haman à la potence.'
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'L’empereur donna l’ordre de procéder ainsi. Un nouveau décret fut promulgué à Suse, et les dix fils de Haman furent pendus. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Les Juifs de Suse se rassemblèrent donc encore le quatorzième jour du mois d’Adar et tuèrent trois cents hommes, mais sans piller leurs biens.
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Les autres Juifs disséminés dans les provinces de l’empire se réunirent aussi pour défendre leur vie et garantir leur tranquillité vis-à-vis de leurs ennemis, '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: et le treizième jour du mois d’Adar, ils tuèrent 75 000 de leurs ennemis, mais sans piller leurs biens. Le quatorzième jour du mois, ils cessèrent tout massacre et firent de ce jour un jour de festin et de réjouissances.
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Par contre les Juifs de Suse qui s’étaient regroupés le treizième et le quatorzième jour, se reposèrent le quinzième, et c’est ce jour-là qu’ils firent des festins et se livrèrent à des réjouissances. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: C’est ce qui explique pourquoi les Juifs disséminés dans les campagnes et ceux qui habitent des localités des campagnes font du quatorzième jour du mois d’Adar un jour de fête, de réjouissances et de festin, et s’envoient mutuellement des cadeaux ce jour-là.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: L’institution de la fête de Pourim
    marker-yv: yv-h
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dans les villes de toutes les provinces de l’empereur Xerxès où ils habitaient, ils se regroupèrent pour s’en prendre à ceux qui leur voulaient du mal. Personne ne put leur résister, tant la peur qu’ils inspiraient s’était emparée de tout le monde. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Mardochée consigna par écrit le récit de tous ces événements, puis il envoya des lettres à tous les Juifs de toutes les provinces de l’empereur Xerxès, auprès et au loin. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Il leur demanda de célébrer tous les ans une fête le quatorzième et le quinzième jour du mois d’Adar, '
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'puisqu’en ces jours, les Juifs s’étaient assuré la tranquillité vis-à-vis de leurs ennemis et qu’en ce mois, leur affliction avait été changée en joie et leur deuil en fête. Il les invitait à commémorer ces jours-là par des festins et des réjouissances, et par des échanges mutuels de cadeaux et des dons aux pauvres. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Les Juifs suivirent les consignes de Mardochée et firent de cette fête, qu’ils venaient de célébrer, une tradition à respecter tous les ans.
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Car Haman, fils de Hammedata l’Agaguite, le persécuteur de tous les Juifs, avait résolu de les exterminer. Il avait jeté le Pour – ce qui veut dire « sort » en perse – en vue de leur ruine et de leur extermination. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Mais Esther était allée trouver l’empereur qui avait ordonné par écrit de faire retomber sur lui les méchants plans qu’il avait formés contre les Juifs et de le pendre, lui et ses fils, à la potence. '
  '26':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'C’est pourquoi on a appelé ces jours-là '
    - type: usfm
      marker: tl
      children:
      - type: text
        text: Pourim
    - type: text
      text: ' d’après le mot perse qui signifie « sort ».'
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Selon les instructions de la lettre de Mardochée et à cause des événements dont ils avaient eux-mêmes été les témoins et qu’ils avaient subis, '
  '27':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'les Juifs instituèrent la tradition pour eux, pour leurs descendants et pour ceux qui se joindraient à eux, selon laquelle on ne devait pas omettre de célébrer chaque année ces deux jours à la date fixée et de la manière prescrite par Mardochée. '
  '28':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ainsi le souvenir de ces jours est perpétué de génération en génération dans chaque famille, dans chaque province et dans chaque ville, par cette célébration. Les Juifs ne doivent pas cesser de célébrer ces jours des Pourim et leur souvenir ne doit pas se perdre chez leurs descendants.
  '29':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'L’impératrice Esther, fille d’Abichaïl, écrivit avec le Juif Mardochée en usant de toute son autorité pour confirmer cette seconde lettre au sujet des Pourim. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Tous les ministres des provinces, les satrapes, les gouverneurs et les fonctionnaires impériaux soutinrent les Juifs par crainte de Mardochée. '
  '30':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ils envoyèrent des lettres contenant des vœux pour une paix véritable à tous les Juifs des cent vingt-sept provinces de l’empire de Xerxès. '
  '31':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Elles confirmaient l’institution de ces jours des Pourim à la date fixée, tels que le Juif Mardochée et l’impératrice Esther les avaient institués, et tels que les Juifs les avaient eux-mêmes institués pour eux-mêmes et pour leurs descendants, avec des jeûnes et des supplications. '
  '32':
  - type: usfm
    marker: p
    children:
    - type: text
      text: L’ordre d’Esther institua le rituel de cette fête des Pourim, et cela fut consigné dans un livre.
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: En effet, celui-ci occupait un haut rang au palais impérial, et sa renommée s’était répandue dans toutes les provinces, car il devenait de plus en plus puissant.
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ainsi, les Juifs frappèrent tous leurs ennemis de l’épée, ils les tuèrent et les exterminèrent, ou les traitèrent comme ils le jugèrent bon. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dans la seule citadelle de Suse, les Juifs tuèrent et firent périr cinq cents hommes, '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'ainsi que Parshandatha, Dalphôn et Aspata, '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Porata, Adalia et Aridata, '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Parmashta, Arizaï, Aridaï et Vayezata, '
