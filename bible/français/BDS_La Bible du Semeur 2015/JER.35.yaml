document_id: JER.35,21
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s2
    children:
    - type: text
      text: Un exemple de fidélité
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: Voici le message que l’Eternel adressa à Jérémie au temps de Yehoyaqim, fils de Josias
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '35.1 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Ces événements ont eu lieu lors du premier siège de Jérusalem par Nabuchodonosor (v. 11), en 598 av. J.-C.
      marker-yv: yv-n
    - type: text
      text: ', roi de Juda : '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'nous habitons sous des tentes. Nous obéissons à tous les ordres de Yonadab, notre ancêtre. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'Mais lorsque Nabuchodonosor, roi de Babylone, a envahi ce pays, nous nous sommes dit : « Retirons-nous dans Jérusalem pour fuir les armées des Chaldéens et des Syriens'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '35.11 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Les '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Syriens
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: ': '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: alliés des Chaldéens.
      marker-yv: yv-n
    - type: text
      text: . » Nous nous sommes donc installés dans Jérusalem.
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'Alors l’Eternel adressa la parole à Jérémie en ces termes : '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'Voici ce que déclare le Seigneur des armées célestes, Dieu d’Israël : Va dire aux gens de Juda et aux habitants de Jérusalem : Ne retiendrez-vous pas cette leçon pour écouter mes paroles ? dit l’Eternel. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'Les descendants de Yonadab, fils de Rékab, ont respecté les ordres que leur ancêtre leur a donnés : il leur avait défendu de boire du vin et ils n’en ont jamais bu jusqu’à ce jour, pour se conformer à l’ordre de leur ancêtre. Et moi, je n’ai cessé de vous parler, mais vous ne m’avez pas obéi. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'Je vous ai envoyé sans me lasser, tous mes serviteurs les prophètes pour vous dire : « Abandonnez votre conduite mauvaise, faites le bien, cessez de courir après d’autres dieux pour leur rendre un culte, et vous demeurerez dans le pays que je vous ai donné, à vous comme à vos ancêtres. » Mais vous n’avez pas prêté attention et ne m’avez pas écouté. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: Les descendants de Yonadab, fils de Rékab, ont obéi aux ordres de leur ancêtre, mais ce peuple ne m’a pas écouté.
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'C’est pourquoi voici ce que déclare l’Eternel, le Dieu des armées célestes, Dieu d’Israël : Je vais faire venir sur Juda et sur tous les habitants de Jérusalem tous les malheurs dont je les ai menacés, parce que je leur ai parlé et qu’ils n’ont pas écouté ; je les ai appelés, et ils n’ont pas répondu.'
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'Puis, Jérémie dit aux Rékabites : Voici ce que déclare le Seigneur des armées célestes, Dieu d’Israël : Parce que vous avez obéi aux ordres de Yonadab, votre ancêtre, que vous les avez exécutés et que vous avez fait tout ce qu’il vous a ordonné, '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'à cause de cela, voici ce que déclare le Seigneur des armées célestes, Dieu d’Israël : Yonadab, fils de Rékab, ne manquera jamais de descendants qui se tiennent tous les jours en ma présence.'
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: Va trouver la famille des Rékabites
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '35.2 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Les '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Rékabites
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: ': '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: voir 2 R 10.15-16 ; 1 Ch 2.55. Ils formaient une branche des Qéniens, tribu nomade, dont certains se sont joints aux Israélites lors de la conquête de Canaan (Jg 1.16 ; 4.11 ; 1 S 27.10).
      marker-yv: yv-n
    - type: text
      text: ', parle-leur, et fais-les venir dans l’une des salles du Temple. Là, tu leur donneras du vin à boire.'
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'Je pris donc Yaazania, fils de Jérémie, petit-fils de Habatsinia, les hommes de sa parenté, tous ses fils et tous les Rékabites. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'Je les emmenai au temple de l’Eternel, dans la salle assignée aux disciples de Hanân, fils de Yigdalia, l’homme de Dieu. Cette salle se trouve à côté de la salle des dirigeants, au-dessus de la chambre de Maaséya, fils de Shalloum, le gardien du seuil. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'Je plaçai devant les Rékabites des bols remplis de vin ainsi que des coupes, et je les invitai à boire. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'Mais ils me dirent : Nous ne boirons pas de vin car Yonadab'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '35.6 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Yonadab
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: ': '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: chef des Rékabites au temps de Jéhu, près de 250 ans avant Jérémie, qui a déployé un grand zèle pour la destruction du culte de Baal (
        - type: usfm
          marker: ref
          children:
          - type: text
            text: 2 R 10.15-23
        - type: text
          text: ).
      marker-yv: yv-n
    - type: text
      text: ', fils de Rékab, notre ancêtre, nous a donné ces ordres : « Vous ne boirez jamais de vin, ni vous, ni vos descendants, à perpétuité. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: Vous ne construirez pas de maisons, vous ne cultiverez pas la terre, vous ne planterez pas de vignes et vous n’en posséderez pas ; pendant toute votre vie, vous habiterez sous des tentes, afin que vous viviez longtemps sur la terre où vous n’êtes que des étrangers. »
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'Nous avons donc obéi à tous les ordres de Yonadab, fils de Rékab, notre ancêtre, de sorte que nous ne buvons jamais de vin, nous, nos femmes, nos fils et nos filles. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'Nous ne construisons pas de maisons pour y habiter, nous ne possédons ni vigne, ni champ et nous ne faisons pas de semailles ; '
