document_id: JER.35,21
type_code: fra
verses:
  '1':
  - type: heading
    content: Un exemple de fidélité
  - type: text
    content: Voici le message que l’Eternel adressa à Jérémie au temps de Yehoyaqim, fils de Josias
  - type: note
    content: Ces événements ont eu lieu lors du premier siège de Jérusalem par Nabuchodonosor (v. 11), en 598 av. J.-C.
  - type: text
    content: ', roi de Juda : '
  '10':
  - type: text
    content: 'nous habitons sous des tentes. Nous obéissons à tous les ordres de Yonadab, notre ancêtre. '
  '11':
  - type: text
    content: 'Mais lorsque Nabuchodonosor, roi de Babylone, a envahi ce pays, nous nous sommes dit : « Retirons-nous dans Jérusalem pour fuir les armées des Chaldéens et des Syriens'
  - type: note
    content: 'Les Syriens: alliés des Chaldéens.'
  - type: text
    content: . » Nous nous sommes donc installés dans Jérusalem.
  '12':
  - type: text
    content: 'Alors l’Eternel adressa la parole à Jérémie en ces termes : '
  '13':
  - type: text
    content: 'Voici ce que déclare le Seigneur des armées célestes, Dieu d’Israël : Va dire aux gens de Juda et aux habitants de Jérusalem : Ne retiendrez-vous pas cette leçon pour écouter mes paroles ? dit l’Eternel. '
  '14':
  - type: text
    content: 'Les descendants de Yonadab, fils de Rékab, ont respecté les ordres que leur ancêtre leur a donnés : il leur avait défendu de boire du vin et ils n’en ont jamais bu jusqu’à ce jour, pour se conformer à l’ordre de leur ancêtre. Et moi, je n’ai cessé de vous parler, mais vous ne m’avez pas obéi. '
  '15':
  - type: text
    content: 'Je vous ai envoyé sans me lasser, tous mes serviteurs les prophètes pour vous dire : « Abandonnez votre conduite mauvaise, faites le bien, cessez de courir après d’autres dieux pour leur rendre un culte, et vous demeurerez dans le pays que je vous ai donné, à vous comme à vos ancêtres. » Mais vous n’avez pas prêté attention et ne m’avez pas écouté. '
  '16':
  - type: text
    content: Les descendants de Yonadab, fils de Rékab, ont obéi aux ordres de leur ancêtre, mais ce peuple ne m’a pas écouté.
  '17':
  - type: text
    content: 'C’est pourquoi voici ce que déclare l’Eternel, le Dieu des armées célestes, Dieu d’Israël : Je vais faire venir sur Juda et sur tous les habitants de Jérusalem tous les malheurs dont je les ai menacés, parce que je leur ai parlé et qu’ils n’ont pas écouté ; je les ai appelés, et ils n’ont pas répondu.'
  '18':
  - type: text
    content: 'Puis, Jérémie dit aux Rékabites : Voici ce que déclare le Seigneur des armées célestes, Dieu d’Israël : Parce que vous avez obéi aux ordres de Yonadab, votre ancêtre, que vous les avez exécutés et que vous avez fait tout ce qu’il vous a ordonné, '
  '19':
  - type: text
    content: 'à cause de cela, voici ce que déclare le Seigneur des armées célestes, Dieu d’Israël : Yonadab, fils de Rékab, ne manquera jamais de descendants qui se tiennent tous les jours en ma présence.'
  '2':
  - type: text
    content: Va trouver la famille des Rékabites
  - type: note
    content: 'Les Rékabites: voir 2 R 10.15-16 ; 1 Ch 2.55. Ils formaient une branche des Qéniens, tribu nomade, dont certains se sont joints aux Israélites lors de la conquête de Canaan (Jg 1.16 ; 4.11 ; 1 S 27.10).'
  - type: text
    content: ', parle-leur, et fais-les venir dans l’une des salles du Temple. Là, tu leur donneras du vin à boire.'
  '3':
  - type: text
    content: 'Je pris donc Yaazania, fils de Jérémie, petit-fils de Habatsinia, les hommes de sa parenté, tous ses fils et tous les Rékabites. '
  '4':
  - type: text
    content: 'Je les emmenai au temple de l’Eternel, dans la salle assignée aux disciples de Hanân, fils de Yigdalia, l’homme de Dieu. Cette salle se trouve à côté de la salle des dirigeants, au-dessus de la chambre de Maaséya, fils de Shalloum, le gardien du seuil. '
  '5':
  - type: text
    content: 'Je plaçai devant les Rékabites des bols remplis de vin ainsi que des coupes, et je les invitai à boire. '
  '6':
  - type: text
    content: 'Mais ils me dirent : Nous ne boirons pas de vin car Yonadab'
  - type: note
    content: 'Yonadab: chef des Rékabites au temps de Jéhu, près de 250 ans avant Jérémie, qui a déployé un grand zèle pour la destruction du culte de Baal (2 R 10.15-23).'
  - type: text
    content: ', fils de Rékab, notre ancêtre, nous a donné ces ordres : « Vous ne boirez jamais de vin, ni vous, ni vos descendants, à perpétuité. '
  '7':
  - type: text
    content: Vous ne construirez pas de maisons, vous ne cultiverez pas la terre, vous ne planterez pas de vignes et vous n’en posséderez pas ; pendant toute votre vie, vous habiterez sous des tentes, afin que vous viviez longtemps sur la terre où vous n’êtes que des étrangers. »
  '8':
  - type: text
    content: 'Nous avons donc obéi à tous les ordres de Yonadab, fils de Rékab, notre ancêtre, de sorte que nous ne buvons jamais de vin, nous, nos femmes, nos fils et nos filles. '
  '9':
  - type: text
    content: 'Nous ne construisons pas de maisons pour y habiter, nous ne possédons ni vigne, ni champ et nous ne faisons pas de semailles ; '
