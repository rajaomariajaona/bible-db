document_id: NEH.5,21
type_code: fra
verses:
  '1':
  - type: heading
    content: Néhémie règle le problème des injustices sociales
  - type: text
    content: 'A cette époque, des hommes du peuple et leurs femmes se plaignirent vivement de certains de leurs compatriotes juifs. '
  '10':
  - type: text
    content: 'Moi aussi, mes proches et mes collaborateurs, nous leur avons prêté de l’argent et du blé. Remettons-leur donc cette dette ! '
  '11':
  - type: text
    content: Rendez-leur aujourd’hui même leurs champs, leurs vignes, leurs oliviers et leurs maisons, et remettez-leur la part de l’argent, du blé, du vin et de l’huile que vous avez exigée d’eux comme intérêt.
  '12':
  - type: text
    content: 'Ils répondirent : Nous ferons ce que tu demandes, nous rendrons ce que nous avons pris et nous n’exigerons rien d’eux.'
  - type: text
    content: 'Alors j’appelai les prêtres devant lesquels je fis prêter serment à ces gens d’agir comme ils l’avaient dit. '
  '13':
  - type: text
    content: 'Puis je secouai les pans de mon vêtement en déclarant : Que Dieu secoue de cette manière loin de sa maison et de ses biens celui qui n’aura pas tenu cette promesse et qu’ainsi il soit secoué et laissé sans rien !'
  - type: text
    content: 'Toute l’assemblée répondit : Amen ! et loua l’Eternel. Et le peuple se conforma à la décision prise.'
  '14':
  - type: text
    content: Depuis le jour où j’avais été nommé gouverneur du district de Juda, c’est-à-dire depuis la vingtième année jusqu’à la trente-deuxième année du règne d’Artaxerxès, soit pendant douze ans, ni moi ni mes proches nous n’avons vécu des revenus dus au gouverneur
  - type: note
    content: De 445 à 433 av. J.-C.
  - type: text
    content: '. '
  '15':
  - type: text
    content: Mes prédécesseurs dans cette charge avaient pressuré le peuple, exigeant qu’on leur remette chaque jour, outre le pain et le vin, quarante pièces d’argent.
  - type: text
    content: 'Même leurs fonctionnaires exerçaient leur domination sur le peuple. Pour moi, je n’ai jamais agi de la sorte, car je craignais Dieu. '
  '16':
  - type: text
    content: 'Au contraire, j’ai travaillé personnellement à la réparation de la muraille et mes collaborateurs se sont aussi mis à l’œuvre, et nous n’avons jamais acheté de terres. '
  '17':
  - type: text
    content: 'D’autre part, j’ai reçu régulièrement à ma table cent cinquante chefs juifs, sans compter ceux qui venaient vers nous des peuples des régions environnantes. '
  '18':
  - type: text
    content: Chaque jour, on apprêtait pour cela un taureau, six moutons de choix et des volailles, et tous les dix jours, on me livrait de grandes quantités de vin. Malgré cela, je n’ai pas demandé les revenus alloués au gouverneur car je savais que les travaux pesaient lourdement sur le peuple.
  '19':
  - type: text
    content: Tiens compte de moi, ô mon Dieu, et accorde-moi ta bienveillance à cause de tout ce que j’ai fait pour ce peuple !
  '2':
  - type: text
    content: 'Certains disaient : Nous avons beaucoup de fils et de filles, nous voudrions recevoir du blé pour manger et survivre.'
  '3':
  - type: text
    content: 'D’autres déclaraient : Nous sommes obligés de donner nos champs, nos vignes et même nos maisons en gage pour nous procurer du blé lorsqu’il y a une famine.'
  '4':
  - type: text
    content: 'D’autres encore se plaignaient : Nous devons emprunter de l’argent en hypothéquant nos champs et nos vignes pour payer l’impôt impérial. '
  '5':
  - type: text
    content: 'Et pourtant, nous sommes bien de la même race que nos compatriotes : nos enfants ne sont pas différents des leurs ; et voici que nous en sommes réduits à vendre nos fils et nos filles comme esclaves : certaines de nos filles ont déjà été réduites à l’esclavage et nous sommes impuissants à les défendre, car déjà nos champs et nos vignes appartiennent à d’autres.'
  '6':
  - type: text
    content: 'Lorsque j’entendis leurs plaintes et toutes ces réclamations, je fus saisi d’une violente colère '
  '7':
  - type: text
    content: 'et je pris la décision d’adresser de vifs reproches aux notables et aux chefs du peuple. Je leur dis : Quand vous prêtez de l’argent à vos compatriotes, vous leur demandez des intérêts'
  - type: note
    content: Voir Ex 22.24-26 ; Lv 25.36 ; Dt 23.20.
  - type: text
    content: '  !'
  - type: text
    content: 'Je convoquai une grande assemblée pour traiter leur cas. '
  '8':
  - type: text
    content: 'Je leur déclarai : Dans la mesure de nos moyens, nous avons racheté nos compatriotes juifs vendus comme esclaves à des étrangers'
  - type: note
    content: A Babylone, les Juifs fortunés rachetèrent aux païens ceux de leurs compatriotes qui avaient dû se vendre comme esclaves (ne pouvant pas rembourser leurs dettes) afin qu’ils puissent retourner au pays d’Israël (voir Lv 25.47-48).
  - type: text
    content: . Et maintenant vous vendez vous-mêmes vos compatriotes, et cela à des gens de notre peuple.
  - type: text
    content: 'Ils ne trouvèrent rien à répondre et gardèrent le silence. '
  '9':
  - type: text
    content: 'J’ajoutai : Ce que vous faites là n’est pas bien. Ne devriez-vous pas vivre comme des gens qui craignent notre Dieu pour ne pas donner à nos ennemis des autres peuples, l’occasion de nous couvrir de honte ? '
