document_id: NEH.5
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Néhémie règle le problème des injustices sociales
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'A cette époque, des hommes du peuple et leurs femmes se plaignirent vivement de certains de leurs compatriotes juifs. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Certains disaient : Nous avons beaucoup de fils et de filles, nous voudrions recevoir du blé pour manger et survivre.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'D’autres déclaraient : Nous sommes obligés de donner nos champs, nos vignes et même nos maisons en gage pour nous procurer du blé lorsqu’il y a une famine.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'D’autres encore se plaignaient : Nous devons emprunter de l’argent en hypothéquant nos champs et nos vignes pour payer l’impôt impérial. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Et pourtant, nous sommes bien de la même race que nos compatriotes : nos enfants ne sont pas différents des leurs ; et voici que nous en sommes réduits à vendre nos fils et nos filles comme esclaves : certaines de nos filles ont déjà été réduites à l’esclavage et nous sommes impuissants à les défendre, car déjà nos champs et nos vignes appartiennent à d’autres.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Lorsque j’entendis leurs plaintes et toutes ces réclamations, je fus saisi d’une violente colère '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'et je pris la décision d’adresser de vifs reproches aux notables et aux chefs du peuple. Je leur dis : Quand vous prêtez de l’argent à vos compatriotes, vous leur demandez des intérêts'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '5.7 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Voir Ex 22.24-26 ; Lv 25.36 ; Dt 23.20.
    marker-yv: yv-n
  - type: text
    text: '  !'
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Je convoquai une grande assemblée pour traiter leur cas. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Je leur déclarai : Dans la mesure de nos moyens, nous avons racheté nos compatriotes juifs vendus comme esclaves à des étrangers'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '5.8 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'A Babylone, les Juifs fortunés rachetèrent aux païens ceux de leurs compatriotes qui avaient dû se vendre comme esclaves (ne pouvant pas rembourser leurs dettes) afin qu’ils puissent retourner au pays d’Israël (voir '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Lv 25.47-48
        metadata:
          usfm: LEV.25.47+LEV.25.48
      - type: text
        text: ).
    marker-yv: yv-n
  - type: text
    text: . Et maintenant vous vendez vous-mêmes vos compatriotes, et cela à des gens de notre peuple.
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Ils ne trouvèrent rien à répondre et gardèrent le silence. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'J’ajoutai : Ce que vous faites là n’est pas bien. Ne devriez-vous pas vivre comme des gens qui craignent notre Dieu pour ne pas donner à nos ennemis des autres peuples, l’occasion de nous couvrir de honte ? '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Moi aussi, mes proches et mes collaborateurs, nous leur avons prêté de l’argent et du blé. Remettons-leur donc cette dette ! '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Rendez-leur aujourd’hui même leurs champs, leurs vignes, leurs oliviers et leurs maisons, et remettez-leur la part de l’argent, du blé, du vin et de l’huile que vous avez exigée d’eux comme intérêt.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Ils répondirent : Nous ferons ce que tu demandes, nous rendrons ce que nous avons pris et nous n’exigerons rien d’eux.'
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Alors j’appelai les prêtres devant lesquels je fis prêter serment à ces gens d’agir comme ils l’avaient dit. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Puis je secouai les pans de mon vêtement en déclarant : Que Dieu secoue de cette manière loin de sa maison et de ses biens celui qui n’aura pas tenu cette promesse et qu’ainsi il soit secoué et laissé sans rien !'
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Toute l’assemblée répondit : Amen ! et loua l’Eternel. Et le peuple se conforma à la décision prise.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Depuis le jour où j’avais été nommé gouverneur du district de Juda, c’est-à-dire depuis la vingtième année jusqu’à la trente-deuxième année du règne d’Artaxerxès, soit pendant douze ans, ni moi ni mes proches nous n’avons vécu des revenus dus au gouverneur
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '5.14 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: De 445 à 433 av. J.-C.
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Mes prédécesseurs dans cette charge avaient pressuré le peuple, exigeant qu’on leur remette chaque jour, outre le pain et le vin, quarante pièces d’argent.
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Même leurs fonctionnaires exerçaient leur domination sur le peuple. Pour moi, je n’ai jamais agi de la sorte, car je craignais Dieu. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Au contraire, j’ai travaillé personnellement à la réparation de la muraille et mes collaborateurs se sont aussi mis à l’œuvre, et nous n’avons jamais acheté de terres. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'D’autre part, j’ai reçu régulièrement à ma table cent cinquante chefs juifs, sans compter ceux qui venaient vers nous des peuples des régions environnantes. '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Chaque jour, on apprêtait pour cela un taureau, six moutons de choix et des volailles, et tous les dix jours, on me livrait de grandes quantités de vin. Malgré cela, je n’ai pas demandé les revenus alloués au gouverneur car je savais que les travaux pesaient lourdement sur le peuple.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Tiens compte de moi, ô mon Dieu, et accorde-moi ta bienveillance à cause de tout ce que j’ai fait pour ce peuple !
