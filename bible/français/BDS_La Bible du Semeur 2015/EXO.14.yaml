document_id: EXO.14,21
type_code: fra
verses:
  '1':
  - type: usfm
    marker: ms1
    children:
    - type: text
      text: La pleine délivrance
    marker-yv: yv-h
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Les Egyptiens poursuivent les Israélites
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'L’Eternel transmit ses instructions à Moïse : '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'Le pharaon s’était rapproché. En regardant au loin, les Israélites aperçurent les Egyptiens lancés à leur poursuite. Ils furent saisis d’une grande peur et poussèrent de grands cris vers l’Eternel. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'Puis ils se tournèrent contre Moïse et lui dirent : N’y avait-il pas assez de tombeaux en Egypte pour que tu nous emmènes mourir dans le désert ? Pourquoi as-tu voulu nous faire sortir d’Egypte ? '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'Nous te l’avions bien dit, lorsque nous étions encore là-bas : « Laisse-nous tranquilles, nous voulons être esclaves des Egyptiens ! » Car mieux vaut pour nous cela que de mourir au désert.'
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'Moïse leur répondit : N’ayez pas peur ! Tenez-vous là où vous êtes et regardez ! Vous verrez comment l’Eternel vous délivrera en ce jour ; ces Egyptiens que vous voyez aujourd’hui, vous ne les reverrez plus jamais. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: L’Eternel combattra pour vous, et vous, tenez-vous tranquilles.
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'L’Eternel dit à Moïse : Pourquoi cries-tu vers moi ? Ordonne aux Israélites de se mettre en route. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'Quant à toi, lève ton bâton, tends la main vers la mer, fends-la en deux et les Israélites la traverseront à pied sec. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'De mon côté, je rendrai les Egyptiens obstinés pour qu’ils s’engagent derrière vous. Alors je manifesterai ma gloire aux dépens du pharaon, de toute son armée, de ses chars et de ses hommes d’équipage de chars. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: Et les Egyptiens sauront que je suis l’Eternel quand j’aurai manifesté ma gloire aux dépens du pharaon, de ses chars et de ses hommes d’équipage.
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'L’ange de Dieu qui marchait en tête du camp d’Israël passa derrière eux et la colonne de nuée se déplaça également de devant eux pour aller se tenir sur leurs arrières. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: Parle aux Israélites et dis-leur de revenir camper devant Pi-Hahiroth, entre Migdol et la mer
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '14.2 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'D’après la tradition, il s’agit de la mer Rouge, mais l’hébreu l’appelle : mer des Roseaux (voir '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: '13.18'
        - type: text
          text: ). Cet événement a donc pu se situer dans la partie sud du lac Menzaleh ; d’autres la situent près de l’actuelle Ismaélia, dans la partie centrale du golfe de Suez, où la mer Rouge est la moins large. D’autres identifications ont encore été proposées.
      marker-yv: yv-n
    - type: text
      text: '  ; vous dresserez vos tentes en face de Baal-Tsephôn au bord de la mer. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: Elle vint se placer entre le camp des Egyptiens et celui d’Israël. D’un côté elle était obscure, et de l’autre, elle éclairait la nuit. Durant toute la nuit, aucun des deux camps ne s’approcha de l’autre.
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: 'Moïse étendit sa main sur la mer, et l’Eternel fit souffler sur elle pendant toute la nuit un violent vent d’est, qui refoula la mer de sorte que les eaux se fendirent et que le fond apparut. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: Les Israélites passèrent au milieu de la mer, sur la terre ferme, alors que les eaux se dressaient comme des remparts à leur droite et à leur gauche
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '14.22 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Allusion en 1 Co 10.1-2 ; Hé 11.29.
      marker-yv: yv-n
    - type: text
      text: '. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: 'Les Egyptiens les poursuivirent et tous les chevaux du pharaon, ses chars et ses hommes d’équipage de chars s’engagèrent après eux au milieu de la mer. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: 'Mais vers l’aube, l’Eternel considéra le camp des Egyptiens du haut de la colonne de nuée et de feu, et y sema le désordre. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: Il fit s’enliser
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '14.25 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'D’après le Pentateuque samaritain, l’ancienne version grecque et la version syriaque. Le texte hébreu traditionnel a : '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: il arracha.
      marker-yv: yv-n
    - type: text
      text: ' les roues des chars, de sorte qu’ils n’avançaient plus qu’à grand-peine. Les Egyptiens s’écrièrent : Fuyons devant Israël car l’Eternel combat pour eux contre l’Egypte.'
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: 'L’Eternel dit à Moïse : Etends la main sur la mer et que les eaux refluent sur les Egyptiens, sur leurs chars et sur leurs hommes d’équipage. '
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: 'Moïse étendit la main sur la mer et, au point du jour, la mer revint en place. Les Egyptiens qui battaient en retraite trouvèrent la mer devant eux et l’Eternel les précipita dans la mer. '
  '28':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: 'Les eaux refluèrent et couvrirent les chars et les hommes d’équipage de toute l’armée du pharaon qui s’étaient engagés à travers la mer à la suite des Israélites. Pas un seul d’entre eux n’en réchappa. '
  '29':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: 'Quant aux Israélites, ils avaient traversé la mer à pied sec, pendant que les eaux formaient une muraille à leur droite et une autre à leur gauche. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'Le pharaon pensera : Les Israélites se sont égarés dans le pays, le désert les tient emprisonnés. '
  '30':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '30'
    - type: text
      text: 'En ce jour-là l’Eternel délivra Israël des Egyptiens et ils virent les cadavres des Egyptiens étendus sur le bord de la mer. '
  '31':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '31'
    - type: text
      text: 'Israël vit la grande puissance que l’Eternel avait déployée contre les Egyptiens, et le peuple eut de la crainte envers l’Eternel : il eut confiance en lui et en Moïse son serviteur.'
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: Je rendrai obstiné le cœur du pharaon et il se lancera à votre poursuite, mais je manifesterai ma gloire à ses dépens et aux dépens de toute son armée, et les Egyptiens sauront que je suis l’Eternel.
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Les Israélites se conformèrent à ces instructions. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'On vint informer le pharaon que le peuple d’Israël avait pris la fuite. Alors le pharaon et ses hauts fonctionnaires changèrent d’avis à leur sujet et dirent : Qu’avons-nous fait là ? En laissant partir les Israélites, nous avons perdu notre main-d’œuvre !'
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'Le pharaon fit atteler son char et mobilisa ses troupes. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'Il choisit six cents de ses meilleurs chars qu’il fit suivre de tous les autres chars d’Egypte : chacun d’eux était pourvu d’un équipage de trois hommes. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'L’Eternel rendit obstiné le cœur du pharaon, roi d’Egypte, de sorte qu’il se lança à la poursuite des Israélites qui étaient partis librement. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: Les Egyptiens les poursuivirent donc et les rattrapèrent alors qu’ils étaient campés au bord de la mer ; tous les attelages du pharaon, ses hommes d’équipage de chars et son armée les atteignirent près de Pi-Hahiroth en face de Baal-Tsephôn.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: La traversée de la mer
    marker-yv: yv-h
