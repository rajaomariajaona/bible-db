document_id: ACT.15,21
type_code: fra
verses:
  '1':
  - type: heading
    content: Controverse sur la circoncision des non-Juifs
  - type: text
    content: 'Quelques hommes venus de Judée arrivèrent à Antioche. Ils enseignaient les frères, en disant : Si vous ne vous faites pas circoncire comme Moïse l’a prescrit, vous ne pouvez pas être sauvés.'
  '10':
  - type: text
    content: 'Pourquoi donc maintenant vouloir provoquer Dieu en imposant à ces disciples un joug que ni nos ancêtres ni nous n’avons jamais eu la force de porter ? '
  '11':
  - type: text
    content: 'Non ! Voici au contraire ce que nous croyons : c’est par la grâce du Seigneur Jésus que nous sommes sauvés, nous Juifs, de la même manière qu’eux.'
  '12':
  - type: text
    content: 'Alors tout le monde se tut pour écouter Barnabas et Paul raconter les signes miraculeux et les prodiges que Dieu avait accomplis par eux parmi les non-Juifs. '
  '13':
  - type: text
    content: Quand ils eurent fini de parler, Jacques
  - type: note
    content: 'Jacques: voir note 12.17.'
  - type: text
    content: ' prit la parole et dit :'
  - type: text
    content: 'Maintenant, mes frères, écoutez-moi ! '
  '14':
  - type: text
    content: Simon
  - type: note
    content: 'Simon: premier nom de Pierre (voir Mt 4.18).'
  - type: text
    content: ' vous a rappelé comment, dès le début, Dieu lui-même est intervenu pour se choisir parmi les non-Juifs un peuple qui lui appartienne. '
  '15':
  - type: text
    content: 'Cela concorde avec les paroles des prophètes puisqu’il est écrit :'
  '16':
  - type: text
    content: ' '
  - type: text
    content: Après cela,
  - type: text
    content: ' dit le Seigneur, je reviendrai, ╵'
  - type: text
    content: et je rebâtirai
  - type: text
    content: ' ╵'
  - type: text
    content: 'la hutte de '
  - type: text
    content: David
  - type: text
    content: ' ╵'
  - type: text
    content: qui est tombée en ruine,
  - type: text
    content: et j’en relèverai les ruines,
  - type: text
    content: ' ╵'
  - type: text
    content: je la redresserai.
  '17':
  - type: text
    content: ' '
  - type: text
    content: Alors, le reste des hommes se tournera vers le Seigneur,
  - type: text
    content: des gens de tous les autres peuples
  - type: text
    content: ' ╵'
  - type: text
    content: appelés de mon nom
  - type: text
    content: ' ╵'
  - type: text
    content: comme ma possession.
  '18':
  - type: text
    content: ' '
  - type: text
    content: Le Seigneur le déclare,
  - type: text
    content: ' ╵lui '
  - type: text
    content: qui réalise ces choses
  - type: note
    content: Am 9.11-12.
  - type: text
    content: ' ╵qu’il avait préparées ╵de toute éternité.'
  '19':
  - type: text
    content: 'Voici donc ce que je propose, continua Jacques : ne créons pas de difficultés aux non-Juifs qui se convertissent à Dieu. '
  '2':
  - type: text
    content: Il en résulta un conflit et de vives discussions avec Paul et Barnabas.
  - type: text
    content: 'Finalement, il fut décidé que Paul et Barnabas monteraient à Jérusalem avec quelques autres frères pour parler de ce problème avec les apôtres et les responsables de l’Eglise. '
  '20':
  - type: text
    content: Ecrivons-leur simplement de ne pas manger de viande provenant des sacrifices offerts aux idoles, de se garder de toute inconduite sexuelle, et de ne consommer ni viande d’animaux étouffés ni sang
  - type: note
    content: Voir Ex 34.15-16 ; Lv 17.10-16. Selon certains, l’inconduite sexuelle pourrait désigner ici les unions interdites par la Loi de Moïse (voir Lv 18.6-23).
  - type: text
    content: '. '
  '21':
  - type: text
    content: En effet, depuis les temps anciens, il y a dans chaque ville des prédicateurs qui enseignent la Loi de Moïse, et chaque sabbat, on la lit dans les synagogues.
  '22':
  - type: text
    content: 'Alors les apôtres et les responsables, avec toute l’Eglise, décidèrent de choisir parmi eux quelques délégués et de les envoyer à Antioche avec Paul et Barnabas. Ils choisirent donc Jude, surnommé Barsabbas, et Silas. Tous deux jouissaient d’une grande estime parmi les frères. '
  '23':
  - type: text
    content: 'Voici la lettre qu’ils leur remirent :'
  - type: text
    content: Les apôtres et les responsables de l’Eglise adressent leurs salutations aux frères d’origine païenne qui habitent Antioche, la Syrie et la Cilicie.
  '24':
  - type: text
    content: 'Nous avons appris que certains frères venus de chez nous ont jeté le trouble parmi vous et vous ont désorientés par leurs paroles. Or, ils n’avaient reçu aucun mandat de notre part. '
  '25':
  - type: text
    content: 'C’est pourquoi nous avons décidé à l’unanimité de choisir des délégués et de vous les envoyer avec nos chers frères Barnabas et Paul '
  '26':
  - type: text
    content: 'qui ont risqué leur vie pour la cause de notre Seigneur Jésus-Christ. '
  '27':
  - type: text
    content: Nous vous envoyons donc Jude et Silas, qui vous confirmeront de vive voix ce que nous vous écrivons.
  '28':
  - type: text
    content: 'Car il nous a semblé bon, au Saint-Esprit et à nous-mêmes, de ne pas vous imposer d’autres obligations que celles qui sont strictement nécessaires : '
  '29':
  - type: text
    content: ne consommez pas de viandes provenant des sacrifices aux idoles, du sang, des animaux étouffés, et gardez-vous de toute inconduite sexuelle. Si vous évitez tout cela, vous agirez bien.
  - type: text
    content: Recevez nos salutations les plus fraternelles.
  '3':
  - type: text
    content: L’Eglise
  - type: note
    content: Il s’agit de l’Eglise d’Antioche de Syrie.
  - type: text
    content: ' pourvut à leur voyage'
  - type: note
    content: 'Autre traduction : accompagnés par l’Eglise, ils…'
  - type: text
    content: . Ils traversèrent la Phénicie et la Samarie, racontant comment les non-Juifs se tournaient vers Dieu. Et tous les frères en eurent beaucoup de joie.
  '30':
  - type: text
    content: 'On laissa partir les délégués et ils se rendirent à Antioche. Ils réunirent l’ensemble des croyants et leur remirent la lettre. '
  '31':
  - type: text
    content: On la lut et tous se réjouirent de l’encouragement qu’ils y trouvaient.
  '32':
  - type: text
    content: 'Comme Jude et Silas étaient eux-mêmes prophètes, ils parlèrent longuement aux frères pour les encourager et les affermir dans la foi. '
  '33':
  - type: text
    content: Ils restèrent là un certain temps, puis les frères leur souhaitèrent bon voyage et les laissèrent retourner auprès de ceux qui les avaient envoyés. [
  '34':
  - type: text
    content: Silas cependant trouva bon de rester à Antioche, de sorte que Jude rentra seul à Jérusalem
  - type: note
    content: Ce verset est absent de plusieurs manuscrits.
  - type: text
    content: '.] '
  '35':
  - type: text
    content: Paul et Barnabas restèrent à Antioche, continuant avec beaucoup d’autres à enseigner et à annoncer la Parole du Seigneur.
  - type: heading
    content: Paul et Barnabas se séparent
  '36':
  - type: text
    content: 'Après quelque temps, Paul dit à Barnabas : Partons refaire le tour de toutes les villes où nous avons annoncé la Parole du Seigneur et rendons visite aux frères pour voir ce qu’ils deviennent.'
  '37':
  - type: text
    content: 'Mais Barnabas voulait emmener avec lui Jean, appelé aussi Marc, '
  '38':
  - type: text
    content: et Paul estimait qu’il ne convenait pas de prendre avec eux celui qui les avait abandonnés en Pamphylie et qui ne les avait pas accompagnés dans leur œuvre.
  '39':
  - type: text
    content: 'Leur désaccord fut si profond qu’ils se séparèrent. Barnabas emmena Marc avec lui et s’embarqua pour Chypre. '
  '4':
  - type: text
    content: 'A leur arrivée à Jérusalem, ils furent accueillis par l’Eglise, les apôtres et les responsables ; ils leur rapportèrent tout ce que Dieu avait fait avec eux. '
  '40':
  - type: text
    content: Paul, de son côté, choisit Silas et partit avec lui, après avoir été confié par les frères à la grâce du Seigneur.
  '41':
  - type: text
    content: Il parcourut la Syrie et la Cilicie en fortifiant les Eglises.
  '5':
  - type: text
    content: Mais quelques anciens membres du parti des pharisiens qui étaient devenus des croyants intervinrent pour soutenir qu’il fallait absolument circoncire les non-Juifs et leur ordonner d’observer la Loi de Moïse.
  '6':
  - type: text
    content: 'Les apôtres et les responsables de l’Eglise se réunirent pour examiner la question. '
  '7':
  - type: text
    content: 'Après une longue discussion, Pierre se leva et leur dit :'
  - type: text
    content: Mes frères, comme vous le savez, il y a déjà longtemps que Dieu m’a choisi parmi vous pour que j’annonce l’Evangile aux non-Juifs, pour qu’ils l’entendent et deviennent croyants.
  '8':
  - type: text
    content: 'Dieu, qui lit dans le secret des cœurs, a témoigné qu’il les acceptait, en leur donnant lui-même le Saint-Esprit comme il l’avait fait pour nous. '
  '9':
  - type: text
    content: Entre eux et nous, il n’a fait aucune différence puisque c’est par la foi qu’il a purifié leur cœur.
