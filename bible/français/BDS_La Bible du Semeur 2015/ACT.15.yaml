document_id: ACT.15
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Controverse sur la circoncision des non-Juifs
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Quelques hommes venus de Judée arrivèrent à Antioche. Ils enseignaient les frères, en disant : Si vous ne vous faites pas circoncire comme Moïse l’a prescrit, vous ne pouvez pas être sauvés.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Il en résulta un conflit et de vives discussions avec Paul et Barnabas.
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Finalement, il fut décidé que Paul et Barnabas monteraient à Jérusalem avec quelques autres frères pour parler de ce problème avec les apôtres et les responsables de l’Eglise. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: L’Eglise
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '15.3 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Il s’agit de l’Eglise d’Antioche de Syrie.
    marker-yv: yv-n
  - type: text
    text: ' pourvut à leur voyage'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '15.3 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Autre traduction : '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: accompagnés par l’Eglise, ils…
    marker-yv: yv-n
  - type: text
    text: . Ils traversèrent la Phénicie et la Samarie, racontant comment les non-Juifs se tournaient vers Dieu. Et tous les frères en eurent beaucoup de joie.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'A leur arrivée à Jérusalem, ils furent accueillis par l’Eglise, les apôtres et les responsables ; ils leur rapportèrent tout ce que Dieu avait fait avec eux. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Mais quelques anciens membres du parti des pharisiens qui étaient devenus des croyants intervinrent pour soutenir qu’il fallait absolument circoncire les non-Juifs et leur ordonner d’observer la Loi de Moïse.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Les apôtres et les responsables de l’Eglise se réunirent pour examiner la question. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Après une longue discussion, Pierre se leva et leur dit :'
- type: usfm
  marker: p
  children:
  - type: text
    text: Mes frères, comme vous le savez, il y a déjà longtemps que Dieu m’a choisi parmi vous pour que j’annonce l’Evangile aux non-Juifs, pour qu’ils l’entendent et deviennent croyants.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Dieu, qui lit dans le secret des cœurs, a témoigné qu’il les acceptait, en leur donnant lui-même le Saint-Esprit comme il l’avait fait pour nous. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Entre eux et nous, il n’a fait aucune différence puisque c’est par la foi qu’il a purifié leur cœur.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Pourquoi donc maintenant vouloir provoquer Dieu en imposant à ces disciples un joug que ni nos ancêtres ni nous n’avons jamais eu la force de porter ? '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Non ! Voici au contraire ce que nous croyons : c’est par la grâce du Seigneur Jésus que nous sommes sauvés, nous Juifs, de la même manière qu’eux.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Alors tout le monde se tut pour écouter Barnabas et Paul raconter les signes miraculeux et les prodiges que Dieu avait accomplis par eux parmi les non-Juifs. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Quand ils eurent fini de parler, Jacques
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '15.13 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: Jacques
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: ': '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'voir note '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '12.17'
        metadata:
          usfm: ACT.12.17
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: ' prit la parole et dit :'
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Maintenant, mes frères, écoutez-moi ! '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Simon
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '15.14 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: Simon
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: ': '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'premier nom de Pierre (voir '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Mt 4.18
        metadata:
          usfm: MAT.4.18
      - type: text
        text: ).
    marker-yv: yv-n
  - type: text
    text: ' vous a rappelé comment, dès le début, Dieu lui-même est intervenu pour se choisir parmi les non-Juifs un peuple qui lui appartienne. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Cela concorde avec les paroles des prophètes puisqu’il est écrit :'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: ' '
  - type: usfm
    marker: qt
    children:
    - type: text
      text: Après cela,
  - type: text
    text: ' dit le Seigneur, je reviendrai, ╵'
  - type: usfm
    marker: qt
    children:
    - type: text
      text: et je rebâtirai
  - type: text
    text: ' ╵'
  - type: usfm
    marker: qt
    children:
    - type: text
      text: 'la hutte de '
    - type: usfm
      marker: w
      children:
      - type: text
        text: David
  - type: text
    text: ' ╵'
  - type: usfm
    marker: qt
    children:
    - type: text
      text: qui est tombée en ruine,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: qt
    children:
    - type: text
      text: et j’en relèverai les ruines,
  - type: text
    text: ' ╵'
  - type: usfm
    marker: qt
    children:
    - type: text
      text: je la redresserai.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: ' '
  - type: usfm
    marker: qt
    children:
    - type: text
      text: Alors, le reste des hommes se tournera vers le Seigneur,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: qt
    children:
    - type: text
      text: des gens de tous les autres peuples
  - type: text
    text: ' ╵'
  - type: usfm
    marker: qt
    children:
    - type: text
      text: appelés de mon nom
  - type: text
    text: ' ╵'
  - type: usfm
    marker: qt
    children:
    - type: text
      text: comme ma possession.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: ' '
  - type: usfm
    marker: qt
    children:
    - type: text
      text: Le Seigneur le déclare,
  - type: text
    text: ' ╵lui '
  - type: usfm
    marker: qt
    children:
    - type: text
      text: qui réalise ces choses
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '15.18 '
    - type: usfm
      marker: ft
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Am 9.11-12
        metadata:
          usfm: AMO.9.11+AMO.9.12
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: ' ╵qu’il avait préparées ╵de toute éternité.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Voici donc ce que je propose, continua Jacques : ne créons pas de difficultés aux non-Juifs qui se convertissent à Dieu. '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Ecrivons-leur simplement de ne pas manger de viande provenant des sacrifices offerts aux idoles, de se garder de toute inconduite sexuelle, et de ne consommer ni viande d’animaux étouffés ni sang
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '15.20 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Voir Ex 34.15-16 ; Lv 17.10-16. Selon certains, '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'l’inconduite sexuelle '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'pourrait désigner ici les unions interdites par la Loi de Moïse (voir '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Lv 18.6-23
        metadata:
          usfm: LEV.18.6+LEV.18.7+LEV.18.8+LEV.18.9+LEV.18.10+LEV.18.11+LEV.18.12+LEV.18.13+LEV.18.14+LEV.18.15+LEV.18.16+LEV.18.17+LEV.18.18+LEV.18.19+LEV.18.20+LEV.18.21+LEV.18.22+LEV.18.23
      - type: text
        text: ).
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: En effet, depuis les temps anciens, il y a dans chaque ville des prédicateurs qui enseignent la Loi de Moïse, et chaque sabbat, on la lit dans les synagogues.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Alors les apôtres et les responsables, avec toute l’Eglise, décidèrent de choisir parmi eux quelques délégués et de les envoyer à Antioche avec Paul et Barnabas. Ils choisirent donc Jude, surnommé Barsabbas, et Silas. Tous deux jouissaient d’une grande estime parmi les frères. '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Voici la lettre qu’ils leur remirent :'
- type: usfm
  marker: pm
  children:
  - type: text
    text: Les apôtres et les responsables de l’Eglise adressent leurs salutations aux frères d’origine païenne qui habitent Antioche, la Syrie et la Cilicie.
- type: usfm
  marker: pm
  children:
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Nous avons appris que certains frères venus de chez nous ont jeté le trouble parmi vous et vous ont désorientés par leurs paroles. Or, ils n’avaient reçu aucun mandat de notre part. '
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'C’est pourquoi nous avons décidé à l’unanimité de choisir des délégués et de vous les envoyer avec nos chers frères Barnabas et Paul '
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'qui ont risqué leur vie pour la cause de notre Seigneur Jésus-Christ. '
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: Nous vous envoyons donc Jude et Silas, qui vous confirmeront de vive voix ce que nous vous écrivons.
- type: usfm
  marker: pm
  children:
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'Car il nous a semblé bon, au Saint-Esprit et à nous-mêmes, de ne pas vous imposer d’autres obligations que celles qui sont strictement nécessaires : '
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: ne consommez pas de viandes provenant des sacrifices aux idoles, du sang, des animaux étouffés, et gardez-vous de toute inconduite sexuelle. Si vous évitez tout cela, vous agirez bien.
- type: usfm
  marker: pm
  children:
  - type: text
    text: Recevez nos salutations les plus fraternelles.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'On laissa partir les délégués et ils se rendirent à Antioche. Ils réunirent l’ensemble des croyants et leur remirent la lettre. '
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: On la lut et tous se réjouirent de l’encouragement qu’ils y trouvaient.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '32'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'Comme Jude et Silas étaient eux-mêmes prophètes, ils parlèrent longuement aux frères pour les encourager et les affermir dans la foi. '
  - type: usfm
    marker: v
    metadata:
      v: '33'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: Ils restèrent là un certain temps, puis les frères leur souhaitèrent bon voyage et les laissèrent retourner auprès de ceux qui les avaient envoyés. [
  - type: usfm
    marker: v
    metadata:
      v: '34'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: Silas cependant trouva bon de rester à Antioche, de sorte que Jude rentra seul à Jérusalem
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '15.34 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Ce verset est absent de plusieurs manuscrits.
    marker-yv: yv-n
  - type: text
    text: '.] '
  - type: usfm
    marker: v
    metadata:
      v: '35'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: Paul et Barnabas restèrent à Antioche, continuant avec beaucoup d’autres à enseigner et à annoncer la Parole du Seigneur.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Paul et Barnabas se séparent
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '36'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: 'Après quelque temps, Paul dit à Barnabas : Partons refaire le tour de toutes les villes où nous avons annoncé la Parole du Seigneur et rendons visite aux frères pour voir ce qu’ils deviennent.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '37'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: 'Mais Barnabas voulait emmener avec lui Jean, appelé aussi Marc, '
  - type: usfm
    marker: v
    metadata:
      v: '38'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: text
    text: et Paul estimait qu’il ne convenait pas de prendre avec eux celui qui les avait abandonnés en Pamphylie et qui ne les avait pas accompagnés dans leur œuvre.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '39'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '39'
  - type: text
    text: 'Leur désaccord fut si profond qu’ils se séparèrent. Barnabas emmena Marc avec lui et s’embarqua pour Chypre. '
  - type: usfm
    marker: v
    metadata:
      v: '40'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '40'
  - type: text
    text: Paul, de son côté, choisit Silas et partit avec lui, après avoir été confié par les frères à la grâce du Seigneur.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '41'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '41'
  - type: text
    text: Il parcourut la Syrie et la Cilicie en fortifiant les Eglises.
