  children:
  - type: text
    text: Introduction
- type: usfm
  marker: ip
  children:
  - type: text
    text: Le prophète Michée, originaire de Morésheth en Juda (1.1, 14), au sud-ouest de Jérusalem, a exercé son ministère sous les règnes de Yotam (750 à 732 av. J.-C.), d’Ahaz (735 à 715 ; co-régence de 732 à 735) et d’Ezéchias (715 à 686 ; co-régence à partir de 727​729). Il a donc vu, en 722, la chute de Samarie qu’il avait annoncée (1.2-7). Contemporain d’Esaïe, il a en commun avec lui une prophétie sur le règne universel de l’Eternel à Sion, centre religieux des peuples du monde entier (4.1-4, 5 ; Es 2.2-5). Mais contrairement à Esaïe qui, citadin et membre de l’aristocratie, s’intéresse tout particulièrement aux enjeux de politique nationale et internationale, Michée, d’origine rurale, a surtout le souci du petit peuple (2.1-2, 8-9 ; 3.2-3  ; etc.).
- type: usfm
  marker: ip
  children:
  - type: text
    text: Ainsi, à la manière d’Amos qui l’a précédé, Michée s’élève avec force contre les injustices sociales (2.8-9 ; 3.2-3, 9-10 ; 6.10-12 ; 7.2-3, 5-6) et souligne l’insuffisance de toute pratique religieuse qui ne s’accompagne pas d’une vie droite (6.6-8). Comme Osée, il utilise l’image du procès que l’Eternel intente à son peuple infidèle à l’alliance (1.2 ; 6.1ss). Il est le premier à annoncer la ruine de Jérusalem (3.12), ce dont les contemporains de Jérémie se souviendront un siècle plus tard (Jr 26.18).
- type: usfm
  marker: ip
  children:
  - type: text
    text: Cependant, l’Eternel n’abandonnera pas son peuple. Comme un berger, il rassemblera le petit nombre des brebis de son troupeau qui subsistera, et les conduira en un nouvel exode, comparable à celui de la sortie d’Egypte (7.14-15). Cet exode sera pourtant plus miraculeux encore que le premier. Car l’ennemi que la mer engloutira ne sera plus l’armée égyptienne (Ex 14.27-28) mais le péché même du peuple de Dieu (7.19). Son troupeau, l’Eternel le confiera à un berger-roi qui, comme son représentant, le mènera paître (2.12-13). C’est à cette prophétie que Jésus renvoie dans sa parabole du « Bon Berger » car ce texte est le seul de l’Ancien Testament à unir l’image du berger et celle de la porte de la bergerie (Jn 10.7, 11).
- type: usfm
  marker: ip
  children:
  - type: text
    text: 'Ce berger-roi sera de la lignée de David. Comme celui-ci, en effet, il naîtra à Bethléhem (5.1). Lorsque Hérode demandera aux théologiens de son temps où devait naître le Messie, c’est en citant cette prophétie qu’ils lui répondront (Mt 2.4-6 ; voir Jn 7.41-42). En proclamant la venue de ce roi, Michée s’appuie sur l’ancienne promesse, faite par l’Eternel à David, de la permanence de sa lignée (2 S 7.13-14). Mais en mentionnant « celle qui doit enfanter » (5.2), il se réfère peut-être aussi à la prophétie d’Esaïe, son contemporain, qui a annoncé l’apparition d’un signe miraculeux : la jeune fille deviendra enceinte et elle donnera naissance à un fils, Emmanuel (Es 7.14).'
- type: usfm
  marker: ip
  children:
  - type: text
    text: 'Sous la conduite de ce roi, dont le règne s’étendra à tous les peuples, les hommes vivront dans la paix (4.1-5). Mais auparavant, le peuple de Dieu connaîtra des temps difficiles : les douleurs de l’enfantement (4.9-14). Le salut à venir n’atteindra pas l’ensemble du peuple mais uniquement un faible reste qui aura été purifié (4.6-8 ; 7.18).'
