document_id: DAN.9
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: La prophétie des 70 septaines
  marker-yv: yv-h
- type: usfm
  marker: s2
  children:
  - type: text
    text: Seigneur, pardonne
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Darius, fils de Xerxès, de la race des Mèdes, fut établi sur le trône du royaume des Chaldéens. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: La première année de son règne, moi, Daniel, je considérais dans les livres le nombre des années que l’Eternel avait indiqué au prophète Jérémie, et pendant lesquelles Jérusalem devait rester en ruine, c’est-à-dire soixante-dix ans
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '9.2 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Voir Jr 25.11-12 ; 29.10.
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Alors je me tournai vers le Seigneur Dieu pour le prier et lui adresser des supplications, en jeûnant et en portant un habit de toile de sac et en me couvrant de cendre
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '9.3 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Marques de deuil.
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'J’adressai ma requête à l’Eternel mon Dieu et je lui fis une confession en ces termes : Ah ! Seigneur, Dieu grand et redoutable, toi qui demeures fidèle à ton alliance et qui conserves ton amour envers ceux qui t’aiment et qui obéissent à tes commandements, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'nous avons péché, nous avons mal agi, nous nous sommes rendus coupables et nous nous sommes révoltés contre toi en nous détournant de tes commandements et de tes lois. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Nous n’avons pas écouté tes serviteurs les prophètes, qui ont parlé en ton nom à nos rois, à nos chefs, à nos ancêtres et à tout le peuple du pays. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Toi, Seigneur, tu es juste, et nous, nous rougissons de honte. C’est bien le cas aujourd’hui des Judéens, des habitants de Jérusalem et de tout Israël, de ceux qui sont près et de ceux qui sont loin, dispersés dans tous les pays où tu les as chassés à cause de leurs infidélités à ton égard. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Seigneur, la honte est sur nous, sur nos rois, sur nos chefs et sur nos ancêtres, parce que nous avons péché contre toi.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Mais toi, Seigneur notre Dieu, tu as de la compassion et tu pardonnes, alors que nous nous sommes révoltés contre toi. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Nous ne t’avons pas obéi, Eternel notre Dieu, nous n’avons pas vécu selon les lois que tu nous as données par tes serviteurs les prophètes. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Tout le peuple d’Israël a transgressé ta Loi et s’est détourné pour ne pas entendre ta voix. Alors la malédiction et toutes les imprécations inscrites dans la Loi de Moïse
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '9.11 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Voir Lv 26.14-39 ; Dt 28.15-68.
    marker-yv: yv-n
  - type: text
    text: ', ton serviteur, se sont déversées sur nous, parce que nous avons péché contre Dieu.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Tu as accompli les menaces que tu avais prononcées contre nous et contre les chefs qui nous gouvernaient : tu as fait fondre sur nous un malheur si grand que, dans ce monde, il n’y en a jamais eu de pareil à celui qui a frappé Jérusalem. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Tout ce malheur nous a frappés conformément à ce qui était écrit dans la Loi de Moïse, et nous ne t’avons pas imploré, Eternel notre Dieu, nous ne nous sommes pas détournés de nos fautes et nous n’avons pas été attentifs à ta vérité. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: C’est pourquoi, Eternel notre Dieu, tu as veillé à ce que ce malheur fonde sur nous
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '9.14 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Réminiscence de '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Jr 1.12
        metadata:
          usfm: JER.1.12
      - type: text
        text: ', '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '14'
        metadata:
          usfm: JER.1.14
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: ' car tu es juste dans tout ce que tu fais, tandis que nous, nous ne t’avons pas obéi.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Et maintenant, Seigneur notre Dieu, tu as fait sortir ton peuple d’Egypte par ton intervention puissante, et tu t’es fait une renommée qui subsiste jusqu’à ce jour. Mais nous, nous avons péché, nous avons fait le mal.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Seigneur, puisque tu agis en toute justice, veuille détourner ta colère et ton indignation de Jérusalem, ta ville, ta sainte montagne, car à cause de nos péchés et des fautes de nos ancêtres, Jérusalem et ton peuple sont en butte au mépris de tous ceux qui nous entourent.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Maintenant, ô notre Dieu, écoute la prière et les supplications de ton serviteur et, par égard pour toi-même, considère avec faveur ton sanctuaire dévasté ! '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: O mon Dieu, prête l’oreille et écoute, ouvre tes yeux et considère nos ruines, regarde la ville qui t’appartient
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '9.18 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Autre traduction : '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: la ville en faveur de laquelle on te prie.
    marker-yv: yv-n
  - type: text
    text: '. Certes, ce n’est pas à cause de nos actions justes que nous t’adressons nos supplications, mais à cause de ton immense compassion ! '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Seigneur, écoute-nous ! Seigneur, pardonne ! Seigneur, prête-nous attention et interviens sans tarder, par égard pour toi-même, ô mon Dieu ! Car il s’agit de la ville et du peuple qui t’appartiennent
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '9.19 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Autre traduction : '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: en faveur desquels on te prie.
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: s2
  children:
  - type: text
    text: La vision de Daniel
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Je continuais à parler dans ma prière, en confessant mes péchés et les péchés de mon peuple Israël, et en suppliant l’Eternel mon Dieu en faveur de sa sainte montagne. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'J’étais encore en train de prononcer ma prière, quand Gabriel, ce personnage que j’avais vu dans une vision précédente, s’approcha de moi d’un vol rapide au moment de l’offrande du soir. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Il s’entretint avec moi et me donna des explications en me disant : Daniel, je suis venu maintenant pour t’éclairer. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: Dès que tu as commencé ta supplique, un message a été émis, et je suis venu pour te le communiquer, car tu es bien-aimé de Dieu. Sois donc attentif à ce message et comprends cette vision.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: Une période de soixante-dix septaines
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '9.24 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Il s’agit de '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'septaines '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: de sept ans.
    marker-yv: yv-n
  - type: text
    text: ' a été fixée pour ton peuple et pour ta ville sainte, pour mettre un terme à la révolte contre Dieu, pour en finir avec les péchés, et pour expier, les fautes ainsi que pour instaurer une justice éternelle, pour accomplir vision et prophétie, et pour conférer l’onction à un sanctuaire très saint.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Voici donc ce que tu dois savoir et comprendre : Depuis le moment où le décret ordonnant de restaurer et de rebâtir Jérusalem'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '9.25 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Voir 2 Ch 36.22-23 ; Esd 1.1-3.
    marker-yv: yv-n
  - type: text
    text: ' a été promulgué jusqu’à l’avènement d’un chef ayant reçu l’onction, il s’écoulera sept septaines et soixante-deux septaines. La ville sera rebâtie et rétablie avec ses places et ses fossés, en des temps de détresse.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: A la fin des soixante-deux septaines, un homme ayant reçu l’onction sera mis à mort, bien qu’on ne puisse rien lui reprocher
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '9.26 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: bien qu’on ne puisse… reprocher
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: ': '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'traduction incertaine. Autre traduction : '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'et il n’aura personne pour venir à son secours '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '(voir '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '11.45'
        metadata:
          usfm: DAN.11.45
      - type: text
        text: ).
    marker-yv: yv-n
  - type: text
    text: . Quant à la ville et au sanctuaire, ils seront détruits par le peuple d’un chef qui viendra
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '9.26 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: par le peuple d’un chef qui viendra
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: ': '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'en adoptant une légère modification de la vocalisation du texte hébreu traditionnel, on peut comprendre : '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'avec le chef qui doit venir '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '[le chef du v. 25].'
    marker-yv: yv-n
  - type: text
    text: ', mais sa fin arrivera, provoquée comme par une inondation, et jusqu’à la fin, séviront la guerre et les dévastations qui ont été décrétées. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: L’oint
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '9.27 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'D’autres comprennent qu’il s’agit, non de l’oint des v. 25 et 26 mais du chef dont il vient d’être question dans la seconde partie du v. 26. La structure doit ici orienter l’interprétation : chacun des v. 25, 26 et 27 se compose de deux parties : dans la première, il est question de l’oint et de septaines ; la seconde partie concerne la ville ou le sanctuaire, il y est question d’une épreuve pour le peuple de Dieu.'
    marker-yv: yv-n
  - type: text
    text: ' conclura une alliance ferme avec un grand nombre'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '9.27 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: un grand nombre
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: ': '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: réminiscence d’
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Es 53.12
        metadata:
          usfm: ISA.53.12
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: ' au cours d’une septaine et, à la moitié de la septaine, il fera cesser le sacrifice et l’offrande. Dans le Temple sera établie l’abominable profanation'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '9.27 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: Dans le Temple… profanation
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: ': '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'traduction incertaine. Autres traductions : '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'le dévastateur s’en prendra au Temple abominable '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'ou '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'le dévastateur ira jusqu’au bout des abominations. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'C’est à cette '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'abominable profanation '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'que Jésus fait allusion en '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Mt 24.15
        metadata:
          usfm: MAT.24.15
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: ', et cela durera jusqu’à ce que l’entière destruction qui a été décrétée s’abatte sur le dévastateur.'
