document_id: MAT.5,21
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: La loi du royaume
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: (Mc 3.13 ; Lc 6.12-13, 20)
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Jésus, voyant ces foules, monta sur une colline. Il s’assit, ses disciples se rassemblèrent autour de lui '
  '10':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: ' '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Heureux ceux qui sont opprimés pour la justice,
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: car le royaume des cieux leur appartient.
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: ' '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Heureux serez-vous quand les hommes vous insulteront et vous persécuteront, lorsqu’ils répandront toutes sortes de calomnies sur votre compte à cause de moi.
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: ' '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'Oui, réjouissez-vous alors et soyez heureux, car une magnifique récompense vous attend dans les cieux. Car vous serez ainsi comme les '
      - type: usfm
        marker: w
        children:
        - type: text
          text: prophètes
      - type: text
        text: ' d’autrefois : eux aussi ont été persécutés avant vous de la même manière.'
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Témoins
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: (Mc 9.50 ; 4.21 ; Lc 14.34-35)
    marker-yv: yv-h
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: ' '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Vous êtes le sel
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '5.13 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Le sel utilisé en Israël contenait beaucoup de cristaux n’ayant aucun pouvoir salant. Lorsque ce sel était exposé à l’humidité, le chlorure de sodium fondait et seuls les cristaux non salants restaient.
      marker-yv: yv-n
    - type: usfm
      marker: wj
      children:
      - type: text
        text: de la terre. Si ce sel perd sa saveur, avec quoi la salera-t-on
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '5.13 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Autre traduction : '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: avec quoi le rendra-t-on de nouveau salé ?
      marker-yv: yv-n
    - type: usfm
      marker: wj
      children:
      - type: text
        text: '? Ce sel ne vaut plus rien : il n’est bon qu’à être jeté dehors et piétiné.'
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: ' '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Vous êtes la lumière du monde. Une ville au sommet d’une colline n’échappe pas aux regards.
    - type: text
      text: ' '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'Il en est de même d’une lampe : si on l’allume, ce n’est pas pour la mettre sous une mesure à grains : au contraire, on la fixe sur un pied de lampe pour qu’elle éclaire tous ceux qui sont dans la maison.'
    - type: text
      text: ' '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: usfm
      marker: wj
      children:
      - type: text
        text: C’est ainsi que votre lumière doit briller devant tous les hommes, pour qu’ils voient le bien que vous faites et qu’ils en attribuent la gloire à votre Père céleste.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Jésus et la Loi
    marker-yv: yv-h
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: ' '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'Ne vous imaginez pas que je sois venu pour abolir ce qui est écrit dans la '
      - type: usfm
        marker: w
        children:
        - type: text
          text: Loi
      - type: text
        text: ' ou les prophètes'
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '5.17 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: la Loi ou les prophètes
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: ': '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: expression qui désigne l’ensemble de l’Ancien Testament.
      marker-yv: yv-n
    - type: usfm
      marker: wj
      children:
      - type: text
        text: ; je ne suis pas venu pour abolir, mais pour accomplir.
    - type: text
      text: ' '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'Oui, vraiment, je vous l’assure : tant que le ciel et la terre resteront en place, ni la plus petite lettre de la Loi, ni même un point sur un i n’en sera supprimé jusqu’à ce que tout se réalise.'
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: ' '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'Par conséquent, si quelqu’un n’obéit pas ne serait-ce qu’à un seul de ces commandements – même s’il s’agit du moindre d’entre eux – et s’il apprend aux autres à faire de même, il sera lui-même considéré comme « le moindre » dans le '
      - type: usfm
        marker: w
        children:
        - type: text
          text: royaume des cieux
      - type: text
        text: . Au contraire, celui qui obéira à ces commandements et qui les enseignera aux autres, sera considéré comme grand dans le royaume des cieux.
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'et il se mit à les enseigner. Il leur dit :'
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Les Béatitudes
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: (Lc 6.20-26)
    marker-yv: yv-h
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: ' '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'Je vous le dis : si vous ne vivez pas selon la justice mieux que les '
      - type: usfm
        marker: w
        children:
        - type: text
          text: spécialistes de la Loi
      - type: text
        text: ' et les '
      - type: usfm
        marker: w
        children:
        - type: text
          text: pharisiens
      - type: text
        text: ', vous n’entrerez pas dans le royaume des cieux.'
  - type: usfm
    marker: s1
    children:
    - type: text
      text: La loi de Jésus
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: (Mc 11.25 ; Lc 12.57-59)
    marker-yv: yv-h
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: ' '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'Vous avez appris qu’il a été dit à nos ancêtres : '
      - type: usfm
        marker: qt
        children:
        - type: text
          text: Tu ne commettras pas de meurtre
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '5.21 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Ex 20.13 ; Dt 5.17.
      marker-yv: yv-n
    - type: usfm
      marker: wj
      children:
      - type: usfm
        marker: qt
        children:
        - type: text
          text: .
      - type: text
        text: Si quelqu’un a commis un meurtre, il en répondra devant le tribunal.
    - type: text
      text: ' '
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'Eh bien, moi, je vous dis : Celui qui se met en colère contre son frère en répondra devant le tribunal. Celui qui lui dit « imbécile » passera devant le Grand-Conseil, et celui qui le traite de fou est bon pour le feu de l’enfer.'
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: ' '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Si donc, au moment de présenter ton offrande devant l’autel, tu te souviens que ton frère a quelque chose contre toi,
    - type: text
      text: ' '
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: usfm
      marker: wj
      children:
      - type: text
        text: laisse là ton offrande devant l’autel, et va d’abord te réconcilier avec ton frère ; puis tu reviendras présenter ton offrande.
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: ' '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Si tu es en conflit avec quelqu’un, dépêche-toi de t’entendre avec ton adversaire pendant que tu es encore en chemin avec lui. Sinon, ton adversaire remettra l’affaire entre les mains du juge, qui fera appel aux huissiers de justice, et tu seras mis en prison.
    - type: text
      text: ' '
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'Et là, vraiment, je te l’assure : tu n’en sortiras pas avant d’avoir remboursé jusqu’au dernier centime.'
  - type: usfm
    marker: r
    children:
    - type: text
      text: (Mt 18.8-9 ; Mc 9.43, 47-48)
    marker-yv: yv-h
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: ' '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'Vous avez appris qu’il a été dit : '
      - type: usfm
        marker: qt
        children:
        - type: text
          text: Tu ne commettras pas d’adultère
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '5.27 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Ex 20.14 ; Dt 5.18.
      marker-yv: yv-n
    - type: usfm
      marker: wj
      children:
      - type: text
        text: .
    - type: text
      text: ' '
  '28':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'Eh bien, moi je vous dis : Si quelqu’un jette sur une femme un regard chargé de désir, il a déjà commis adultère avec elle dans son cœur.'
    - type: text
      text: ' '
  '29':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Par conséquent, si ton œil droit te fait tomber dans le péché, arrache-le et jette-le au loin, car il vaut mieux pour toi perdre un de tes organes que de voir ton corps entier précipité en enfer.
    - type: text
      text: ' '
  '3':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: ' '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Heureux ceux qui se reconnaissent spirituellement pauvres
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '5.3 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Autres traductions : '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'pauvres en ce qui concerne l’Esprit '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'ou '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: pauvres en ce qui concerne les choses de l’Esprit.
      marker-yv: yv-n
    - type: usfm
      marker: wj
      children:
      - type: text
        text: ','
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'car le '
      - type: usfm
        marker: w
        children:
        - type: text
          text: royaume des cieux
      - type: text
        text: ' leur appartient.'
  '30':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '30'
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Si ta main droite cause ta chute, coupe-la et jette-la au loin. Il vaut mieux pour toi perdre un de tes membres que de voir tout ton corps jeté en enfer.
  - type: usfm
    marker: r
    children:
    - type: text
      text: (Mt 19.7-9 ; Mc 10.11-12 ; Lc 16.18)
    marker-yv: yv-h
  '31':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '31'
    - type: text
      text: ' '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'Il a aussi été dit : '
      - type: usfm
        marker: qt
        children:
        - type: text
          text: Si quelqu’un divorce d’avec sa femme, il doit le lui signifier par une déclaration écrite
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '5.31 '
      - type: usfm
        marker: ft
        children:
        - type: usfm
          marker: ref
          children:
          - type: text
            text: Dt 24.1
        - type: text
          text: ' .'
      marker-yv: yv-n
    - type: usfm
      marker: wj
      children:
      - type: text
        text: .
    - type: text
      text: ' '
  '32':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '32'
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'Eh bien, moi, je vous dis : Celui qui divorce d’avec sa femme – sauf en cas d’immoralité sexuelle – l’expose à devenir adultère'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '5.32 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: à devenir adultère
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: ': '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'en se remariant du vivant de son mari (voir '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: Rm 7.3
        - type: text
          text: ).
      marker-yv: yv-n
    - type: usfm
      marker: wj
      children:
      - type: text
        text: ', et celui qui épouse une femme divorcée commet lui-même un adultère.'
  '33':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '33'
    - type: text
      text: ' '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'Vous avez encore appris qu’il a été dit à nos ancêtres : '
      - type: usfm
        marker: qt
        children:
        - type: text
          text: Tu ne rompras pas ton serment ; ce que tu as promis par serment devant le Seigneur, tu l’accompliras
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '5.33 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Lv 19.12 ; Nb 30.3.
      marker-yv: yv-n
    - type: usfm
      marker: wj
      children:
      - type: text
        text: .
    - type: text
      text: ' '
  '34':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '34'
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'Eh bien, moi je vous dis de ne pas faire de serment du tout. Ne dites pas : « Je le jure par le ciel », car le ciel, c’est le trône de Dieu.'
    - type: text
      text: ' '
  '35':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '35'
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'Ou : « J’en prends la terre à témoin », car elle est l’escabeau où Dieu pose ses pieds. Ou : « Je le jure par '
      - type: usfm
        marker: w
        children:
        - type: text
          text: Jérusalem
      - type: text
        text: '  ; », car elle est la ville de Dieu, le grand Roi.'
    - type: text
      text: ' '
  '36':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '36'
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'Ne dites pas davantage : « Je le jure sur ma tête », car tu ne peux pas rendre un seul de tes cheveux blanc ou noir.'
  '37':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '37'
    - type: text
      text: ' '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Dites simplement « oui » si c’est oui, « non » si c’est non. Tous les serments qu’on y ajoute viennent du diable
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '5.37 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Autre traduction : '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: du mal.
      marker-yv: yv-n
    - type: usfm
      marker: wj
      children:
      - type: text
        text: .
  - type: usfm
    marker: r
    children:
    - type: text
