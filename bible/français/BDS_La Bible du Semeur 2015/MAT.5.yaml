document_id: MAT.5,21
type_code: fra
verses:
  '1':
  - type: heading
    content: La loi du royaume
  - type: heading
    content: (Mc 3.13 ; Lc 6.12-13, 20)
  - type: text
    content: 'Jésus, voyant ces foules, monta sur une colline. Il s’assit, ses disciples se rassemblèrent autour de lui '
  '10':
  - type: text
    content: ' '
  - type: text
    content: Heureux ceux qui sont opprimés pour la justice,
  - type: text
    content: car le royaume des cieux leur appartient.
  '11':
  - type: text
    content: ' '
  - type: text
    content: Heureux serez-vous quand les hommes vous insulteront et vous persécuteront, lorsqu’ils répandront toutes sortes de calomnies sur votre compte à cause de moi.
  '12':
  - type: text
    content: ' '
  - type: text
    content: 'Oui, réjouissez-vous alors et soyez heureux, car une magnifique récompense vous attend dans les cieux. Car vous serez ainsi comme les '
  - type: text
    content: prophètes
  - type: text
    content: ' d’autrefois : eux aussi ont été persécutés avant vous de la même manière.'
  - type: heading
    content: Témoins
  - type: heading
    content: (Mc 9.50 ; 4.21 ; Lc 14.34-35)
  '13':
  - type: text
    content: ' '
  - type: text
    content: Vous êtes le sel
  - type: text
    content: ' '
  - type: note
    content: Le sel utilisé en Israël contenait beaucoup de cristaux n’ayant aucun pouvoir salant. Lorsque ce sel était exposé à l’humidité, le chlorure de sodium fondait et seuls les cristaux non salants restaient.
  - type: text
    content: de la terre. Si ce sel perd sa saveur, avec quoi la salera-t-on
  - type: note
    content: 'Autre traduction : avec quoi le rendra-t-on de nouveau salé ?'
  - type: text
    content: '? Ce sel ne vaut plus rien : il n’est bon qu’à être jeté dehors et piétiné.'
  '14':
  - type: text
    content: ' '
  - type: text
    content: Vous êtes la lumière du monde. Une ville au sommet d’une colline n’échappe pas aux regards.
  - type: text
    content: ' '
  '15':
  - type: text
    content: 'Il en est de même d’une lampe : si on l’allume, ce n’est pas pour la mettre sous une mesure à grains : au contraire, on la fixe sur un pied de lampe pour qu’elle éclaire tous ceux qui sont dans la maison.'
  - type: text
    content: ' '
  '16':
  - type: text
    content: C’est ainsi que votre lumière doit briller devant tous les hommes, pour qu’ils voient le bien que vous faites et qu’ils en attribuent la gloire à votre Père céleste.
  - type: heading
    content: Jésus et la Loi
  '17':
  - type: text
    content: ' '
  - type: text
    content: 'Ne vous imaginez pas que je sois venu pour abolir ce qui est écrit dans la '
  - type: text
    content: Loi
  - type: text
    content: ' ou les prophètes'
  - type: text
    content: ' '
  - type: note
    content: 'la Loi ou les prophètes : expression qui désigne l’ensemble de l’Ancien Testament.'
  - type: text
    content: ; je ne suis pas venu pour abolir, mais pour accomplir.
  - type: text
    content: ' '
  '18':
  - type: text
    content: 'Oui, vraiment, je vous l’assure : tant que le ciel et la terre resteront en place, ni la plus petite lettre de la Loi, ni même un point sur un i n’en sera supprimé jusqu’à ce que tout se réalise.'
  '19':
  - type: text
    content: ' '
  - type: text
    content: 'Par conséquent, si quelqu’un n’obéit pas ne serait-ce qu’à un seul de ces commandements – même s’il s’agit du moindre d’entre eux – et s’il apprend aux autres à faire de même, il sera lui-même considéré comme « le moindre » dans le '
  - type: text
    content: royaume des cieux
  - type: text
    content: . Au contraire, celui qui obéira à ces commandements et qui les enseignera aux autres, sera considéré comme grand dans le royaume des cieux.
  '2':
  - type: text
    content: 'et il se mit à les enseigner. Il leur dit :'
  - type: heading
    content: Les Béatitudes
  - type: heading
    content: (Lc 6.20-26)
  '20':
  - type: text
    content: ' '
  - type: text
    content: 'Je vous le dis : si vous ne vivez pas selon la justice mieux que les '
  - type: text
    content: spécialistes de la Loi
  - type: text
    content: ' et les '
  - type: text
    content: pharisiens
  - type: text
    content: ', vous n’entrerez pas dans le royaume des cieux.'
  - type: heading
    content: La loi de Jésus
  - type: heading
    content: (Mc 11.25 ; Lc 12.57-59)
  '21':
  - type: text
    content: ' '
  - type: text
    content: 'Vous avez appris qu’il a été dit à nos ancêtres : '
  - type: text
    content: Tu ne commettras pas de meurtre
  - type: text
    content: ' '
  - type: note
    content: Ex 20.13 ; Dt 5.17.
  - type: text
    content: .
  - type: text
    content: Si quelqu’un a commis un meurtre, il en répondra devant le tribunal.
  - type: text
    content: ' '
  '22':
  - type: text
    content: 'Eh bien, moi, je vous dis : Celui qui se met en colère contre son frère en répondra devant le tribunal. Celui qui lui dit « imbécile » passera devant le Grand-Conseil, et celui qui le traite de fou est bon pour le feu de l’enfer.'
  '23':
  - type: text
    content: ' '
  - type: text
    content: Si donc, au moment de présenter ton offrande devant l’autel, tu te souviens que ton frère a quelque chose contre toi,
  - type: text
    content: ' '
  '24':
  - type: text
    content: laisse là ton offrande devant l’autel, et va d’abord te réconcilier avec ton frère ; puis tu reviendras présenter ton offrande.
  '25':
  - type: text
    content: ' '
  - type: text
    content: Si tu es en conflit avec quelqu’un, dépêche-toi de t’entendre avec ton adversaire pendant que tu es encore en chemin avec lui. Sinon, ton adversaire remettra l’affaire entre les mains du juge, qui fera appel aux huissiers de justice, et tu seras mis en prison.
  - type: text
    content: ' '
  '26':
  - type: text
    content: 'Et là, vraiment, je te l’assure : tu n’en sortiras pas avant d’avoir remboursé jusqu’au dernier centime.'
  - type: heading
    content: (Mt 18.8-9 ; Mc 9.43, 47-48)
  '27':
  - type: text
    content: ' '
  - type: text
    content: 'Vous avez appris qu’il a été dit : '
  - type: text
    content: Tu ne commettras pas d’adultère
  - type: text
    content: ' '
  - type: note
    content: Ex 20.14 ; Dt 5.18.
  - type: text
    content: .
  - type: text
    content: ' '
  '28':
  - type: text
    content: 'Eh bien, moi je vous dis : Si quelqu’un jette sur une femme un regard chargé de désir, il a déjà commis adultère avec elle dans son cœur.'
  - type: text
    content: ' '
  '29':
  - type: text
    content: Par conséquent, si ton œil droit te fait tomber dans le péché, arrache-le et jette-le au loin, car il vaut mieux pour toi perdre un de tes organes que de voir ton corps entier précipité en enfer.
  - type: text
    content: ' '
  '3':
  - type: text
    content: ' '
  - type: text
    content: Heureux ceux qui se reconnaissent spirituellement pauvres
  - type: text
    content: ' '
  - type: note
    content: 'Autres traductions : pauvres en ce qui concerne l’Esprit ou pauvres en ce qui concerne les choses de l’Esprit.'
  - type: text
    content: ','
  - type: text
    content: 'car le '
  - type: text
    content: royaume des cieux
  - type: text
    content: ' leur appartient.'
  '30':
  - type: text
    content: Si ta main droite cause ta chute, coupe-la et jette-la au loin. Il vaut mieux pour toi perdre un de tes membres que de voir tout ton corps jeté en enfer.
  - type: heading
    content: (Mt 19.7-9 ; Mc 10.11-12 ; Lc 16.18)
  '31':
  - type: text
    content: ' '
  - type: text
    content: 'Il a aussi été dit : '
  - type: text
    content: Si quelqu’un divorce d’avec sa femme, il doit le lui signifier par une déclaration écrite
  - type: text
    content: ' '
  - type: note
    content: Dt 24.1 .
  - type: text
    content: .
  - type: text
    content: ' '
  '32':
  - type: text
    content: 'Eh bien, moi, je vous dis : Celui qui divorce d’avec sa femme – sauf en cas d’immoralité sexuelle – l’expose à devenir adultère'
  - type: note
    content: 'à devenir adultère: en se remariant du vivant de son mari (voir Rm 7.3).'
  - type: text
    content: ', et celui qui épouse une femme divorcée commet lui-même un adultère.'
  '33':
  - type: text
    content: ' '
  - type: text
    content: 'Vous avez encore appris qu’il a été dit à nos ancêtres : '
  - type: text
    content: Tu ne rompras pas ton serment ; ce que tu as promis par serment devant le Seigneur, tu l’accompliras
  - type: text
    content: ' '
  - type: note
    content: Lv 19.12 ; Nb 30.3.
  - type: text
    content: .
  - type: text
    content: ' '
  '34':
  - type: text
    content: 'Eh bien, moi je vous dis de ne pas faire de serment du tout. Ne dites pas : « Je le jure par le ciel », car le ciel, c’est le trône de Dieu.'
  - type: text
    content: ' '
  '35':
  - type: text
    content: 'Ou : « J’en prends la terre à témoin », car elle est l’escabeau où Dieu pose ses pieds. Ou : « Je le jure par '
  - type: text
    content: Jérusalem
  - type: text
    content: '  ; », car elle est la ville de Dieu, le grand Roi.'
  - type: text
    content: ' '
  '36':
  - type: text
    content: 'Ne dites pas davantage : « Je le jure sur ma tête », car tu ne peux pas rendre un seul de tes cheveux blanc ou noir.'
  '37':
  - type: text
    content: ' '
  - type: text
    content: Dites simplement « oui » si c’est oui, « non » si c’est non. Tous les serments qu’on y ajoute viennent du diable
  - type: text
    content: ' '
  - type: note
    content: 'Autre traduction : du mal.'
  - type: text
    content: .
  - type: heading
    content: (Lc 6.29-30)
  '38':
  - type: text
    content: ' '
  - type: text
    content: 'Vous avez appris qu’il a été dit : '
  - type: text
    content: œil pour œil, dent pour dent
  - type: text
    content: ' '
  - type: note
    content: Ex 21.24 ; Lv 24.20 ; Dt 19.21.
  - type: text
    content: .
  - type: text
    content: ' '
  '39':
  - type: text
    content: 'Eh bien, moi je vous dis : Ne résistez pas à celui qui vous veut du mal ; au contraire, si quelqu’un te gifle sur la joue droite, tends-lui aussi l’autre.'
  - type: text
    content: ' '
  '4':
  - type: text
    content: ' '
  - type: text
    content: Heureux ceux qui pleurent,
  - type: text
    content: car Dieu les consolera.
  '40':
  - type: text
    content: Si quelqu’un veut te faire un procès pour avoir ta chemise, ne l’empêche pas de prendre aussi ton vêtement.
  - type: text
    content: ' '
  '41':
  - type: text
    content: Et si quelqu’un te réquisitionne
  - type: note
    content: Les soldats et les fonctionnaires romains avaient le droit de réquisitionner n’importe qui pour porter leurs fardeaux.
  - type: text
    content: ' '
  - type: text
    content: pour porter un fardeau sur un kilomètre, porte-le sur deux kilomètres avec lui.
  - type: text
    content: ' '
  '42':
  - type: text
    content: Donne à celui qui te demande, ne tourne pas le dos à celui qui veut t’emprunter quelque chose.
  - type: heading
    content: (Lc 6.27-36)
  '43':
  - type: text
    content: ' '
  - type: text
    content: 'Vous avez appris qu’il a été dit : '
  - type: text
    content: Tu aimeras ton prochain
  - type: text
    content: ' '
  - type: note
    content: Lv 19.18 .
  - type: text
    content: et tu haïras ton ennemi.
  - type: text
    content: ' '
  '44':
  - type: text
    content: 'Eh bien, moi je vous dis : Aimez vos ennemis et priez pour ceux qui vous persécutent.'
  - type: text
    content: ' '
  '45':
  - type: text
    content: Ainsi vous vous comporterez vraiment comme des enfants de votre Père céleste, car lui, il fait luire son soleil sur les méchants aussi bien que sur les bons, et il accorde sa pluie aux justes comme aux injustes.
  '46':
  - type: text
    content: ' '
  - type: text
    content: 'Si vous aimez seulement ceux qui vous aiment, allez-vous prétendre à une récompense pour cela ? Les '
  - type: text
    content: collecteurs d’impôts
  - type: text
    content: ' eux-mêmes n’en font-ils pas autant ?'
  - type: text
    content: ' '
  '47':
  - type: text
    content: Si vous ne saluez que vos frères, que faites-vous d’extraordinaire ? Les païens n’agissent-ils pas de même ?
  - type: text
    content: ' '
  '48':
  - type: text
    content: Votre Père céleste est parfait. Soyez donc parfaits comme lui.
  '5':
  - type: text
    content: ' '
  - type: text
    content: 'Heureux '
  - type: text
    content: ceux qui sont doux,
  - type: text
    content: car Dieu leur donnera la terre en héritage
  - type: text
    content: ' '
  - type: note
    content: Ps 37.11 . Certains manuscrits inversent l’ordre des versets 4 et 5.
  - type: text
    content: .
  '6':
  - type: text
    content: ' '
  - type: text
    content: Heureux ceux qui ont faim et soif de justice,
  - type: text
    content: car ils seront rassasiés.
  '7':
  - type: text
    content: ' '
  - type: text
    content: Heureux ceux qui témoignent de la bonté,
  - type: text
    content: car Dieu sera bon pour eux.
  '8':
  - type: text
    content: ' '
  - type: text
    content: 'Heureux ceux dont le cœur est '
  - type: text
    content: pur
  - type: text
    content: ','
  - type: text
    content: car ils verront Dieu.
  '9':
  - type: text
    content: ' '
  - type: text
    content: Heureux ceux qui répandent autour d’eux la paix,
  - type: text
    content: car Dieu les reconnaîtra pour ses fils.
