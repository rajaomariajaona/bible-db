    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'Eh bien, moi je vous dis : Ne résistez pas à celui qui vous veut du mal ; au contraire, si quelqu’un te gifle sur la joue droite, tends-lui aussi l’autre.'
