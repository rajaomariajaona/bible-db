document_id: PRO.30,21
type_code: fra
verses:
  '1':
  - type: usfm
    marker: ms1
    children:
    - type: text
      text: Paroles d’Agour
    marker-yv: yv-h
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Paroles, sentences d’Agour, fils de Yaqé
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '30.1 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Agour '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: était peut-être un sage comme Etân et Hémân (
        - type: usfm
          marker: ref
          children:
          - type: text
            text: 1 R 5.11
        - type: text
          text: '). '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'Paroles, sentences d’Agour, fils de Yaqé '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'pourrait aussi se traduire : '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'Paroles d’Agour, fils de Yaqé de Massa. '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Dans ce cas, Agour serait d’origine ismaélite (comparer '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: Gn 25.13-14
        - type: text
          text: ).
      marker-yv: yv-n
    - type: text
      text: . Cet homme s’est adressé à Itiel, à Itiel et Oukal
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '30.1 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'En répartissant les consonnes du texte hébreu autrement, on obtient : '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'cet homme dit : « Je me suis fatigué, ô Dieu, je me suis fatigué et je suis épuisé. »'
      marker-yv: yv-n
    - type: text
      text: '  :'
  '10':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ne calomnie pas un serviteur auprès de son maître,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: de peur qu’il te maudisse et que tu portes la peine de ta faute.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Il y a des gens qui maudissent leur père
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et qui n’ont pas un mot de reconnaissance pour leur mère.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Il y a des gens qui se croient purs,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: bien qu’ils n’aient pas été lavés de leur souillure.
  '13':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Il y a des gens très hautains
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et qui regardent les autres de haut.
  '14':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Il y a des gens dont les dents sont des épées,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et les mâchoires des couteaux,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: pour dévorer les défavorisés et les faire disparaître de la terre,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: pour retrancher les pauvres du milieu des hommes.
  '15':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'La sangsue a deux filles, elles s’appellent : Donne et Donne.'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Il y a trois choses insatiables,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'et même quatre qui ne disent jamais : « Cela suffit » :'
  '16':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: le séjour des morts, la femme stérile,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: la terre, qui n’est jamais rassasiée d’eau,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'et le feu qui ne dit jamais : « Cela suffit. »'
  '17':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Les yeux qui se moquent d’un père
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et qui dédaignent l’obéissance envers une mère
  - type: usfm
    marker: q1
    children:
    - type: text
      text: seront crevés par les corbeaux de la vallée et dévorés par les petits de l’aigle
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '30.17 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: C’est-à-dire que le corps du fils ingrat sera privé de sépulture et exposé aux rapaces.
      marker-yv: yv-n
    - type: text
      text: .
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Trois et même quatre
    marker-yv: yv-h
  '18':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Il y a trois choses qui sont trop merveilleuses pour moi,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'et même quatre que je ne comprends pas :'
  '19':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: le chemin que suit l’aigle dans le ciel,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: celui du serpent sur le rocher,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: celui du navire en haute mer
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et celui de l’homme chez la jeune fille.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Je suis, certes, le plus bête des hommes
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et je ne possède pas l’intelligence d’un homme.
  '20':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Voici comment agit la femme adultère :'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'elle mange, s’essuie la bouche et dit : « Je n’ai rien fait de mal. »'
  '21':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Il y a trois choses qui font trembler la terre,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'et même quatre qu’elle ne peut supporter :'
  '22':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: un esclave qui devient roi,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: un idiot qui vit dans l’abondance,
  '23':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: une femme odieuse qui trouve à se marier
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et une servante qui parvient à la tête des biens de sa maîtresse.
  '24':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Il y a quatre petits animaux sur la terre,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'qui, pourtant, sont remplis de sagesse :'
  '25':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: les fourmis, qui forment un peuple faible,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: mais qui préparent leur nourriture pendant l’été,
  '26':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: les damans
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '30.26 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Les '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'damans '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: des rochers (comparer Lv 11.5 ; Ps 104.18), petits mammifères herbivores qui vivent en colonies dans les montagnes.
      marker-yv: yv-n
    - type: text
      text: ' qui n’ont guère de force,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: mais qui établissent leur demeure dans les rochers,
  '27':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: les sauterelles qui, sans avoir de roi,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: s’avancent toutes en bataillons rangés,
  '28':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et le lézard qu’on attrape à la main
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et qui pénètre dans les palais des rois.
  '29':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Il y a trois êtres qui ont une belle démarche
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'et même quatre qui ont fière allure :'
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Je n’ai pas appris la sagesse, et je ne connais pas la science des saints
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '30.3 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Autres traductions : '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'mais je connais la science des saints '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'ou '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: je ne connais pas la science du Dieu saint.
      marker-yv: yv-n
    - type: text
      text: .
  '30':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: le lion, le plus brave des animaux,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: qui ne recule devant personne,
  '31':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: le coq
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '30.31 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Autres traductions : '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'le cheval, le lévrier, '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'ou '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'le zèbre. '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'On traduit alors : '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'avec ses reins solides, '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'au lieu de '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: dressé sur ses ergots.
      marker-yv: yv-n
    - type: text
      text: ' dressé sur ses ergots, le bouc,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et le roi qui avance à la tête de ses troupes.
  '32':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Si tu as été assez fou pour te vanter,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ou si tu projettes de le faire
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '30.32 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Autre traduction : '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: si tu t’es mis à réfléchir.
      marker-yv: yv-n
    - type: text
      text: ','
  - type: usfm
    marker: q1
    children:
    - type: text
      text: tais-toi,
  '33':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: car en battant la crème, on produit du beurre,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: en frappant le nez, on fait jaillir du sang,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et en laissant exploser sa colère, on provoque des disputes.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Qui est jamais monté au ciel puis en est redescendu ?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Qui donc a recueilli le vent dans ses mains à poignées ?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Qui a enveloppé les eaux dans son manteau ?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Qui a établi les extrémités de la terre ?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Quel est son nom et quel est le nom de son fils ?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Dis-le, si tu le sais !
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Chaque parole de Dieu est entièrement fiable.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Il défend comme un bouclier ceux qui se confient en lui.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: N’ajoute rien à ses paroles,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sinon il te le reprocherait, et tu serais regardé comme un menteur.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Eternel, je te demande deux choses,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'ne me les refuse pas avant que je meure :'
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: garde-moi de la fausseté et du mensonge,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ne me donne ni pauvreté ni richesse ;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: accorde-moi seulement la nourriture nécessaire,
  '9':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: car dans l’abondance, je pourrais te renier
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'et dire : « Qui est l’Eternel ? »'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ou bien, pressé par la misère, je pourrais me mettre à voler
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et déshonorer ainsi mon Dieu.
