document_id: PRO.30,21
type_code: fra
verses:
  '1':
  - type: heading
    content: Paroles d’Agour
  - type: text
    content: Paroles, sentences d’Agour, fils de Yaqé
  - type: note
    content: 'Agour était peut-être un sage comme Etân et Hémân (1 R 5.11). Paroles, sentences d’Agour, fils de Yaqé pourrait aussi se traduire : Paroles d’Agour, fils de Yaqé de Massa. Dans ce cas, Agour serait d’origine ismaélite (comparer Gn 25.13-14).'
  - type: text
    content: . Cet homme s’est adressé à Itiel, à Itiel et Oukal
  - type: note
    content: 'En répartissant les consonnes du texte hébreu autrement, on obtient : cet homme dit : « Je me suis fatigué, ô Dieu, je me suis fatigué et je suis épuisé. »'
  - type: text
    content: '  :'
  '10':
  - type: text
    content: Ne calomnie pas un serviteur auprès de son maître,
  - type: text
    content: de peur qu’il te maudisse et que tu portes la peine de ta faute.
  '11':
  - type: text
    content: Il y a des gens qui maudissent leur père
  - type: text
    content: et qui n’ont pas un mot de reconnaissance pour leur mère.
  '12':
  - type: text
    content: Il y a des gens qui se croient purs,
  - type: text
    content: bien qu’ils n’aient pas été lavés de leur souillure.
  '13':
  - type: text
    content: Il y a des gens très hautains
  - type: text
    content: et qui regardent les autres de haut.
  '14':
  - type: text
    content: Il y a des gens dont les dents sont des épées,
  - type: text
    content: et les mâchoires des couteaux,
  - type: text
    content: pour dévorer les défavorisés et les faire disparaître de la terre,
  - type: text
    content: pour retrancher les pauvres du milieu des hommes.
  '15':
  - type: text
    content: 'La sangsue a deux filles, elles s’appellent : Donne et Donne.'
  - type: text
    content: Il y a trois choses insatiables,
  - type: text
    content: 'et même quatre qui ne disent jamais : « Cela suffit » :'
  '16':
  - type: text
    content: le séjour des morts, la femme stérile,
  - type: text
    content: la terre, qui n’est jamais rassasiée d’eau,
  - type: text
    content: 'et le feu qui ne dit jamais : « Cela suffit. »'
  '17':
  - type: text
    content: Les yeux qui se moquent d’un père
  - type: text
    content: et qui dédaignent l’obéissance envers une mère
  - type: text
    content: seront crevés par les corbeaux de la vallée et dévorés par les petits de l’aigle
  - type: note
    content: C’est-à-dire que le corps du fils ingrat sera privé de sépulture et exposé aux rapaces.
  - type: text
    content: .
  - type: heading
    content: Trois et même quatre
  '18':
  - type: text
    content: Il y a trois choses qui sont trop merveilleuses pour moi,
  - type: text
    content: 'et même quatre que je ne comprends pas :'
  '19':
  - type: text
    content: le chemin que suit l’aigle dans le ciel,
  - type: text
    content: celui du serpent sur le rocher,
  - type: text
    content: celui du navire en haute mer
  - type: text
    content: et celui de l’homme chez la jeune fille.
  '2':
  - type: text
    content: Je suis, certes, le plus bête des hommes
  - type: text
    content: et je ne possède pas l’intelligence d’un homme.
  '20':
  - type: text
    content: 'Voici comment agit la femme adultère :'
  - type: text
    content: 'elle mange, s’essuie la bouche et dit : « Je n’ai rien fait de mal. »'
  '21':
  - type: text
    content: Il y a trois choses qui font trembler la terre,
  - type: text
    content: 'et même quatre qu’elle ne peut supporter :'
  '22':
  - type: text
    content: un esclave qui devient roi,
  - type: text
    content: un idiot qui vit dans l’abondance,
  '23':
  - type: text
    content: une femme odieuse qui trouve à se marier
  - type: text
    content: et une servante qui parvient à la tête des biens de sa maîtresse.
  '24':
  - type: text
    content: Il y a quatre petits animaux sur la terre,
  - type: text
    content: 'qui, pourtant, sont remplis de sagesse :'
  '25':
  - type: text
    content: les fourmis, qui forment un peuple faible,
  - type: text
    content: mais qui préparent leur nourriture pendant l’été,
  '26':
  - type: text
    content: les damans
  - type: note
    content: Les damans des rochers (comparer Lv 11.5 ; Ps 104.18), petits mammifères herbivores qui vivent en colonies dans les montagnes.
  - type: text
    content: ' qui n’ont guère de force,'
  - type: text
    content: mais qui établissent leur demeure dans les rochers,
  '27':
  - type: text
    content: les sauterelles qui, sans avoir de roi,
  - type: text
    content: s’avancent toutes en bataillons rangés,
  '28':
  - type: text
    content: et le lézard qu’on attrape à la main
  - type: text
    content: et qui pénètre dans les palais des rois.
  '29':
  - type: text
    content: Il y a trois êtres qui ont une belle démarche
  - type: text
    content: 'et même quatre qui ont fière allure :'
  '3':
  - type: text
    content: Je n’ai pas appris la sagesse, et je ne connais pas la science des saints
  - type: note
    content: 'Autres traductions : mais je connais la science des saints ou je ne connais pas la science du Dieu saint.'
  - type: text
    content: .
  '30':
  - type: text
    content: le lion, le plus brave des animaux,
  - type: text
    content: qui ne recule devant personne,
  '31':
  - type: text
    content: le coq
  - type: note
    content: 'Autres traductions : le cheval, le lévrier, ou le zèbre. On traduit alors : avec ses reins solides, au lieu de dressé sur ses ergots.'
  - type: text
    content: ' dressé sur ses ergots, le bouc,'
  - type: text
    content: et le roi qui avance à la tête de ses troupes.
  '32':
  - type: text
    content: Si tu as été assez fou pour te vanter,
  - type: text
    content: ou si tu projettes de le faire
  - type: note
    content: 'Autre traduction : si tu t’es mis à réfléchir.'
  - type: text
    content: ','
  - type: text
    content: tais-toi,
  '33':
  - type: text
    content: car en battant la crème, on produit du beurre,
  - type: text
    content: en frappant le nez, on fait jaillir du sang,
  - type: text
    content: et en laissant exploser sa colère, on provoque des disputes.
  '4':
  - type: text
    content: Qui est jamais monté au ciel puis en est redescendu ?
  - type: text
    content: Qui donc a recueilli le vent dans ses mains à poignées ?
  - type: text
    content: Qui a enveloppé les eaux dans son manteau ?
  - type: text
    content: Qui a établi les extrémités de la terre ?
  - type: text
    content: Quel est son nom et quel est le nom de son fils ?
  - type: text
    content: Dis-le, si tu le sais !
  '5':
  - type: text
    content: Chaque parole de Dieu est entièrement fiable.
  - type: text
    content: Il défend comme un bouclier ceux qui se confient en lui.
  '6':
  - type: text
    content: N’ajoute rien à ses paroles,
  - type: text
    content: sinon il te le reprocherait, et tu serais regardé comme un menteur.
  '7':
  - type: text
    content: Eternel, je te demande deux choses,
  - type: text
    content: 'ne me les refuse pas avant que je meure :'
  '8':
  - type: text
    content: garde-moi de la fausseté et du mensonge,
  - type: text
    content: ne me donne ni pauvreté ni richesse ;
  - type: text
    content: accorde-moi seulement la nourriture nécessaire,
  '9':
  - type: text
    content: car dans l’abondance, je pourrais te renier
  - type: text
    content: 'et dire : « Qui est l’Eternel ? »'
  - type: text
    content: Ou bien, pressé par la misère, je pourrais me mettre à voler
  - type: text
    content: et déshonorer ainsi mon Dieu.
