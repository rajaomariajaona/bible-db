document_id: MAT.22,21
type_code: fra
verses:
  '1':
  - type: heading
    content: La parabole des invités
  - type: heading
    content: (Lc 14.15-24)
  - type: text
    content: 'Jésus leur parla de nouveau au moyen de paraboles. Il leur dit : '
  '10':
  - type: text
    content: ' '
  - type: text
    content: Alors les serviteurs s’en vont par les routes et rassemblent tous ceux qu’ils rencontrent, méchants et bons, de sorte que la salle des noces se remplit de monde.
  - type: text
    content: ' '
  '11':
  - type: text
    content: Le roi entre pour voir l’assistance. Il aperçoit là un homme qui n’a pas d’habit de noces.
  '12':
  - type: text
    content: ' '
  - type: text
    content: « Mon ami, lui demande-t-il, comment as-tu pu entrer ici sans être habillé comme il convient pour un mariage ? »
  - type: text
    content: L’autre ne trouve rien à répondre.
  '13':
  - type: text
    content: ' '
  - type: text
    content: 'Alors le roi dit aux serviteurs : « Prenez-le et jetez-le, pieds et poings liés, dans les ténèbres du dehors où il y a des pleurs et d’amers regrets. »'
  '14':
  - type: text
    content: ' '
  - type: text
    content: Car, beaucoup sont invités, mais les élus sont peu nombreux.
  - type: heading
    content: Controverse sur l’impôt dû à César
  - type: heading
    content: (Mc 12.13-17 ; Lc 20.20-26)
  '15':
  - type: text
    content: 'Alors les pharisiens s’éloignèrent et discutèrent entre eux pour trouver une question à poser à Jésus, afin de le prendre au piège par ses propres paroles. '
  '16':
  - type: text
    content: Ils lui envoyèrent donc quelques-uns de leurs disciples accompagnés de gens du parti d’Hérode
  - type: note
    content: Le parti d’Hérode comprenait les Juifs qui soutenaient le règne d’Hérode Antipas et voulaient qu’un membre de la famille hérodienne remplace le gouverneur romain.
  - type: text
    content: '. Ces émissaires lui dirent : Maître, nous savons que tu dis la vérité et que tu enseignes en toute vérité la voie à suivre selon Dieu. Tu ne te laisses influencer par personne, car tu ne regardes pas à la position sociale des gens. '
  '17':
  - type: text
    content: 'Dis-nous donc ce que tu penses de ceci : A-t-on, oui ou non, le droit de payer des impôts à César ?'
  '18':
  - type: text
    content: 'Mais Jésus, connaissant leurs mauvaises intentions, leur répondit : '
  - type: text
    content: Hypocrites ! Pourquoi me tendez-vous un piège ?
  - type: text
    content: ' '
  '19':
  - type: text
    content: Montrez-moi une pièce qui sert à payer cet impôt !
  - type: text
    content: Ils lui présentèrent une pièce d’argent.
  '2':
  - type: text
    content: 'Il en est du '
  - type: text
    content: royaume des cieux
  - type: text
    content: ' comme d’un roi qui célèbre les noces de son fils.'
  - type: text
    content: ' '
  '20':
  - type: text
    content: 'Alors il leur demanda : '
  - type: text
    content: Cette effigie et cette inscription, de qui sont-elles ?
  '21':
  - type: text
    content: – De César.
  - type: text
    content: 'Jésus leur dit alors : '
  - type: text
    content: Rendez donc à César ce qui revient à César, et à Dieu ce qui revient à Dieu.
  '22':
  - type: text
    content: En entendant cette réponse, ils en restèrent tout déconcertés. Ils le laissèrent donc et se retirèrent.
  - type: heading
    content: Controverse sur la résurrection
  - type: heading
    content: (Mc 12.18-27 ; Lc 20.27-40)
  '23':
  - type: text
    content: 'Ce même jour, des sadducéens vinrent le trouver. Ils prétendent que les morts ne ressuscitent pas. Ils lui posèrent la question suivante : '
  '24':
  - type: text
    content: 'Maître, Moïse a donné cet ordre : '
  - type: text
    content: Si quelqu’un meurt sans avoir d’enfant, son frère devra épouser sa veuve, pour donner une descendance au défunt
  - type: note
    content: Dt 25.5.
  - type: text
    content: .
  - type: text
    content: ' '
  '25':
  - type: text
    content: 'Or, il y avait parmi nous sept frères. L’aîné s’est marié, et il est mort sans avoir de descendant. Il a donc laissé sa veuve à son frère. '
  '26':
  - type: text
    content: 'Il est arrivé la même chose au deuxième frère, puis au troisième, et ainsi de suite jusqu’au septième. '
  '27':
  - type: text
    content: 'En fin de compte, la femme est décédée elle aussi. '
  '28':
  - type: text
    content: A la résurrection, duquel des sept frères sera-t-elle la femme ? Car ils l’ont tous eue pour épouse.
  '29':
  - type: text
    content: 'Jésus leur répondit : '
  - type: text
    content: Vous êtes dans l’erreur, parce que vous ne connaissez pas les Ecritures, ni quelle est la puissance de Dieu.
  - type: text
    content: ' '
  '3':
  - type: text
    content: Il envoie ses serviteurs convier les invités aux noces. Mais ceux-ci refusent de venir.
  - type: text
    content: ' '
  '30':
  - type: text
    content: 'En effet, une fois ressuscités, les hommes et les femmes ne se marieront plus ; ils vivront comme les '
  - type: text
    content: anges
  - type: text
    content: ' qui sont dans le ciel.'
  - type: text
    content: ' '
  '31':
  - type: text
    content: 'Quant à la résurrection des morts, n’avez-vous donc jamais lu ce que Dieu vous a déclaré :'
  - type: text
    content: ' '
  '32':
  - type: text
    content: Je suis le Dieu d’
  - type: text
    content: Abraham
  - type: text
    content: ', le Dieu d’'
  - type: text
    content: Isaac
  - type: text
    content: ', le Dieu de '
  - type: text
    content: Jacob
  - type: note
    content: Ex 3.6, 15.
  - type: text
    content: '? Dieu n’est pas le Dieu des morts, mais le Dieu des vivants.'
  '33':
  - type: text
    content: Les foules qui entendaient ses réponses étaient profondément impressionnées par son enseignement.
  - type: heading
    content: Le plus grand commandement
  - type: heading
    content: (Mc 12.28-34)
  '34':
  - type: text
    content: 'En apprenant que Jésus avait réduit au silence les sadducéens, les pharisiens se réunirent. '
  '35':
  - type: text
    content: 'L’un d’entre eux, un enseignant de la Loi, voulut lui tendre un piège. Il lui demanda : '
  '36':
  - type: text
    content: Maître, quel est, dans la Loi, le commandement le plus grand ?
  '37':
  - type: text
    content: 'Jésus lui répondit : '
  - type: text
    content: Tu aimeras le Seigneur, ton Dieu, de tout ton cœur, de toute ton âme et de toute ta pensée
  - type: note
    content: Dt 6.5.
  - type: text
    content: .
  - type: text
    content: ' '
  '38':
  - type: text
    content: C’est là le commandement le plus grand et le plus important.
  - type: text
    content: ' '
  '39':
  - type: text
    content: 'Et il y en a un second qui lui est semblable : '
  - type: text
    content: Tu aimeras ton prochain comme toi-même
  - type: note
    content: Lv 19.18.
  - type: text
    content: .
  - type: text
    content: ' '
  '4':
  - type: text
    content: 'Alors il envoie d’autres serviteurs pour insister de sa part auprès des invités : « Portez-leur ce message : J’ai préparé mon banquet, j’ai fait tuer mes jeunes taureaux et mes plus belles bêtes, et tout est prêt. Venez donc aux noces. »'
  '40':
  - type: text
    content: 'Tout ce qu’enseignent la Loi et les '
  - type: text
    content: prophètes
  - type: text
    content: ' est contenu dans ces deux commandements.'
  - type: heading
    content: Controverse sur l’identité du Messie
  - type: heading
    content: (Mc 12.35-37 ; Lc 20.41-44)
  '41':
  - type: text
    content: 'Comme les pharisiens se trouvaient rassemblés là, Jésus les interrogea à son tour : '
  '42':
  - type: text
    content: 'Quelle est votre opinion au sujet du '
  - type: text
    content: Messie
  - type: text
    content: '  ? D’après vous, de qui descend-il ?'
  - type: text
    content: – De David, lui répondirent-ils.
  '43':
  - type: text
    content: ' '
  - type: text
    content: '– Alors, comment se fait-il que David, parlant sous l’inspiration de l’Esprit de Dieu, l’appelle '
  - type: text
    content: Seigneur ?
  - type: text
    content: ' En effet, il déclare :'
  '44':
  - type: text
    content: ' '
  - type: text
    content: 'Le Seigneur a dit à mon Seigneur :'
  - type: text
    content: Viens siéger à ma droite
  - type: note
    content: La droite du roi est la place d’honneur (Ps 45.10 ; 1 R 2.19).
  - type: text
    content: jusqu’à ce que j’aie mis
  - type: text
    content: ' ╵'
  - type: text
    content: tes ennemis
  - type: text
    content: ' ╵'
  - type: text
    content: à terre sous tes pieds
  - type: text
    content: ' '
  - type: note
    content: Ps 110.1 .
  - type: text
    content: .
  '45':
  - type: text
    content: ' '
  - type: text
    content: 'Si donc David l’appelle son '
  - type: text
    content: Seigneur
  - type: text
    content: ', comment est-il possible que le Messie soit son descendant ?'
  '46':
  - type: text
    content: Nul ne fut capable de lui donner un mot de réponse et, à partir de ce jour-là, personne n’osa plus lui poser de question.
  '5':
  - type: text
    content: ' '
  - type: text
    content: Mais les invités restent indifférents, et s’en vont, l’un à son champ, l’autre à ses affaires.
  - type: text
    content: ' '
  '6':
  - type: text
    content: Les autres s’emparent des serviteurs, les maltraitent et les tuent.
  '7':
  - type: text
    content: ' '
  - type: text
    content: Alors le roi se met en colère. Il envoie ses troupes exterminer ces assassins et mettre le feu à leur ville.
  - type: text
    content: ' '
  '8':
  - type: text
    content: 'Ensuite, il dit à ses serviteurs : « Le repas de noces est prêt, mais les invités n’en étaient pas dignes.'
  - type: text
    content: ' '
  '9':
  - type: text
    content: Allez donc aux carrefours des chemins et invitez au festin tous ceux que vous trouverez. »
