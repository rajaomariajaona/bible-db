document_id: MAT.22
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: La parabole des invités
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: (Lc 14.15-24)
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Jésus leur parla de nouveau au moyen de paraboles. Il leur dit : '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'Il en est du '
    - type: usfm
      marker: w
      children:
      - type: text
        text: royaume des cieux
    - type: text
      text: ' comme d’un roi qui célèbre les noces de son fils.'
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Il envoie ses serviteurs convier les invités aux noces. Mais ceux-ci refusent de venir.
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'Alors il envoie d’autres serviteurs pour insister de sa part auprès des invités : « Portez-leur ce message : J’ai préparé mon banquet, j’ai fait tuer mes jeunes taureaux et mes plus belles bêtes, et tout est prêt. Venez donc aux noces. »'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: ' '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Mais les invités restent indifférents, et s’en vont, l’un à son champ, l’autre à ses affaires.
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Les autres s’emparent des serviteurs, les maltraitent et les tuent.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: ' '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Alors le roi se met en colère. Il envoie ses troupes exterminer ces assassins et mettre le feu à leur ville.
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'Ensuite, il dit à ses serviteurs : « Le repas de noces est prêt, mais les invités n’en étaient pas dignes.'
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Allez donc aux carrefours des chemins et invitez au festin tous ceux que vous trouverez. »
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: ' '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Alors les serviteurs s’en vont par les routes et rassemblent tous ceux qu’ils rencontrent, méchants et bons, de sorte que la salle des noces se remplit de monde.
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Le roi entre pour voir l’assistance. Il aperçoit là un homme qui n’a pas d’habit de noces.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: ' '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: « Mon ami, lui demande-t-il, comment as-tu pu entrer ici sans être habillé comme il convient pour un mariage ? »
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: wj
    children:
    - type: text
      text: L’autre ne trouve rien à répondre.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: ' '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'Alors le roi dit aux serviteurs : « Prenez-le et jetez-le, pieds et poings liés, dans les ténèbres du dehors où il y a des pleurs et d’amers regrets. »'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: ' '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Car, beaucoup sont invités, mais les élus sont peu nombreux.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Controverse sur l’impôt dû à César
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: (Mc 12.13-17 ; Lc 20.20-26)
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Alors les pharisiens s’éloignèrent et discutèrent entre eux pour trouver une question à poser à Jésus, afin de le prendre au piège par ses propres paroles. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Ils lui envoyèrent donc quelques-uns de leurs disciples accompagnés de gens du parti d’Hérode
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '22.16 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Le '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'parti d’Hérode '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: comprenait les Juifs qui soutenaient le règne d’Hérode Antipas et voulaient qu’un membre de la famille hérodienne remplace le gouverneur romain.
    marker-yv: yv-n
  - type: text
    text: '. Ces émissaires lui dirent : Maître, nous savons que tu dis la vérité et que tu enseignes en toute vérité la voie à suivre selon Dieu. Tu ne te laisses influencer par personne, car tu ne regardes pas à la position sociale des gens. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Dis-nous donc ce que tu penses de ceci : A-t-on, oui ou non, le droit de payer des impôts à César ?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Mais Jésus, connaissant leurs mauvaises intentions, leur répondit : '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Hypocrites ! Pourquoi me tendez-vous un piège ?
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Montrez-moi une pièce qui sert à payer cet impôt !
- type: usfm
  marker: p
  children:
  - type: text
    text: Ils lui présentèrent une pièce d’argent.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Alors il leur demanda : '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Cette effigie et cette inscription, de qui sont-elles ?
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: – De César.
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Jésus leur dit alors : '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Rendez donc à César ce qui revient à César, et à Dieu ce qui revient à Dieu.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: En entendant cette réponse, ils en restèrent tout déconcertés. Ils le laissèrent donc et se retirèrent.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Controverse sur la résurrection
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: (Mc 12.18-27 ; Lc 20.27-40)
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Ce même jour, des sadducéens vinrent le trouver. Ils prétendent que les morts ne ressuscitent pas. Ils lui posèrent la question suivante : '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Maître, Moïse a donné cet ordre : '
  - type: usfm
    marker: qt
    children:
    - type: text
      text: Si quelqu’un meurt sans avoir d’enfant, son frère devra épouser sa veuve, pour donner une descendance au défunt
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '22.24 '
    - type: usfm
      marker: ft
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Dt 25.5
        metadata:
          usfm: DEU.25.5
      - type: text
        text: .
    marker-yv: yv-n
  - type: usfm
    marker: qt
    children:
    - type: text
      text: .
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Or, il y avait parmi nous sept frères. L’aîné s’est marié, et il est mort sans avoir de descendant. Il a donc laissé sa veuve à son frère. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Il est arrivé la même chose au deuxième frère, puis au troisième, et ainsi de suite jusqu’au septième. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'En fin de compte, la femme est décédée elle aussi. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: A la résurrection, duquel des sept frères sera-t-elle la femme ? Car ils l’ont tous eue pour épouse.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'Jésus leur répondit : '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Vous êtes dans l’erreur, parce que vous ne connaissez pas les Ecritures, ni quelle est la puissance de Dieu.
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'En effet, une fois ressuscités, les hommes et les femmes ne se marieront plus ; ils vivront comme les '
    - type: usfm
      marker: w
      children:
      - type: text
        text: anges
    - type: text
      text: ' qui sont dans le ciel.'
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'Quant à la résurrection des morts, n’avez-vous donc jamais lu ce que Dieu vous a déclaré :'
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: usfm
    marker: wj
    children:
    - type: usfm
      marker: qt
      children:
      - type: text
        text: Je suis le Dieu d’
      - type: usfm
        marker: w
        children:
        - type: text
          text: Abraham
      - type: text
        text: ', le Dieu d’'
      - type: usfm
        marker: w
        children:
        - type: text
          text: Isaac
      - type: text
        text: ', le Dieu de '
      - type: usfm
        marker: w
        children:
        - type: text
          text: Jacob
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '22.32 '
    - type: usfm
      marker: ft
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ex 3.6
        metadata:
          usfm: EXO.3.6
      - type: text
        text: ', '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '15'
        metadata:
          usfm: EXO.3.15
      - type: text
        text: .
    marker-yv: yv-n
  - type: usfm
    marker: wj
    children:
    - type: text
      text: '? Dieu n’est pas le Dieu des morts, mais le Dieu des vivants.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: Les foules qui entendaient ses réponses étaient profondément impressionnées par son enseignement.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Le plus grand commandement
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: (Mc 12.28-34)
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: 'En apprenant que Jésus avait réduit au silence les sadducéens, les pharisiens se réunirent. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: 'L’un d’entre eux, un enseignant de la Loi, voulut lui tendre un piège. Il lui demanda : '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: Maître, quel est, dans la Loi, le commandement le plus grand ?
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: 'Jésus lui répondit : '
  - type: usfm
    marker: wj
    children:
    - type: usfm
      marker: qt
      children:
      - type: text
        text: Tu aimeras le Seigneur, ton Dieu, de tout ton cœur, de toute ton âme et de toute ta pensée
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '22.37 '
    - type: usfm
      marker: ft
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Dt 6.5
        metadata:
          usfm: DEU.6.5
      - type: text
        text: .
    marker-yv: yv-n
  - type: usfm
    marker: wj
    children:
    - type: usfm
      marker: qt
      children:
      - type: text
        text: .
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: C’est là le commandement le plus grand et le plus important.
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '39'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'Et il y en a un second qui lui est semblable : '
    - type: usfm
      marker: qt
      children:
      - type: text
        text: Tu aimeras ton prochain comme toi-même
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '22.39 '
    - type: usfm
      marker: ft
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Lv 19.18
        metadata:
          usfm: LEV.19.18
      - type: text
        text: .
    marker-yv: yv-n
  - type: usfm
    marker: wj
    children:
    - type: usfm
      marker: qt
      children:
      - type: text
        text: .
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '40'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'Tout ce qu’enseignent la Loi et les '
    - type: usfm
      marker: w
      children:
      - type: text
        text: prophètes
    - type: text
      text: ' est contenu dans ces deux commandements.'
- type: usfm
  marker: s1
  children:
  - type: text
    text: Controverse sur l’identité du Messie
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: (Mc 12.35-37 ; Lc 20.41-44)
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '41'
  - type: text
    text: 'Comme les pharisiens se trouvaient rassemblés là, Jésus les interrogea à son tour : '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '42'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'Quelle est votre opinion au sujet du '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Messie
    - type: text
      text: '  ? D’après vous, de qui descend-il ?'
- type: usfm
  marker: p
  children:
  - type: text
    text: – De David, lui répondirent-ils.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '43'
  - type: text
    text: ' '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: '– Alors, comment se fait-il que David, parlant sous l’inspiration de l’Esprit de Dieu, l’appelle '
    - type: usfm
      marker: qt
      children:
      - type: text
        text: Seigneur ?
    - type: text
      text: ' En effet, il déclare :'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '44'
  - type: text
    text: ' '
  - type: usfm
    marker: wj
    children:
    - type: usfm
      marker: qt
      children:
      - type: text
        text: 'Le Seigneur a dit à mon Seigneur :'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: wj
    children:
    - type: usfm
      marker: qt
      children:
      - type: text
        text: Viens siéger à ma droite
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '22.44 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: La droite du roi est la place d’honneur (Ps 45.10 ; 1 R 2.19).
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: wj
    children:
    - type: usfm
      marker: qt
      children:
      - type: text
        text: jusqu’à ce que j’aie mis
    - type: text
      text: ' ╵'
    - type: usfm
      marker: qt
      children:
      - type: text
        text: tes ennemis
    - type: text
      text: ' ╵'
    - type: usfm
      marker: qt
      children:
      - type: text
        text: à terre sous tes pieds
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '22.44 '
    - type: usfm
      marker: ft
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ps 110.1
        metadata:
          usfm: PSA.110.1
      - type: text
        text: ' .'
    marker-yv: yv-n
  - type: usfm
    marker: wj
    children:
    - type: usfm
      marker: qt
      children:
      - type: text
        text: .
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '45'
  - type: text
    text: ' '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'Si donc David l’appelle son '
    - type: usfm
      marker: qt
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ', comment est-il possible que le Messie soit son descendant ?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '46'
  - type: text
    text: Nul ne fut capable de lui donner un mot de réponse et, à partir de ce jour-là, personne n’osa plus lui poser de question.
