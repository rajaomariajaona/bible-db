segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Que l’Eternel te bénisse !
  marker-yv: yv-h
- type: usfm
  marker: d
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Cantique pour la route vers la demeure de l’Eternel
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '128.1 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Voir note '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '120.1'
        metadata:
          usfm: PSA.120.1
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: q1
  children:
  - type: text
    text: Heureux es-tu, ╵toi qui crains l’Eternel
- type: usfm
  marker: q1
  children:
  - type: text
    text: et qui suis les chemins ╵qu’il a tracés !
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Tu tireras profit ╵du travail de tes mains,
- type: usfm
  marker: q1
  children:
  - type: text
    text: tout ira bien pour toi ╵et tu seras heureux.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Dans ton foyer, ta femme
- type: usfm
  marker: q1
  children:
  - type: text
    text: sera comme une vigne ╵chargée de nombreux fruits
- type: usfm
  marker: q1
  children:
  - type: text
    text: et, autour de ta table,
- type: usfm
  marker: q1
  children:
  - type: text
    text: tes fils seront tels des plants d’olivier.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: C’est ainsi que sera béni
- type: usfm
  marker: q1
  children:
  - type: text
    text: un homme qui craint l’Eternel.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Oui, l’Eternel te bénira ╵depuis le mont Sion,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et tu contempleras ╵le bonheur de Jérusalem
- type: usfm
  marker: q1
  children:
  - type: text
    text: tous les jours de ta vie,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: tu verras les enfants ╵de tes enfants !
- type: usfm
  marker: q1
  children:
  - type: text
    text: Que la paix soit sur Israël !
