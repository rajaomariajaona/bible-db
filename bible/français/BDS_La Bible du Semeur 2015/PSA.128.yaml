document_id: PSA.128,21
type_code: fra
verses:
  '1':
  - type: heading
    content: Que l’Eternel te bénisse !
  - type: text
    content: Cantique pour la route vers la demeure de l’Eternel
  - type: note
    content: Voir note 120.1.
  - type: text
    content: .
  - type: text
    content: Heureux es-tu, ╵toi qui crains l’Eternel
  - type: text
    content: et qui suis les chemins ╵qu’il a tracés !
  '2':
  - type: text
    content: Tu tireras profit ╵du travail de tes mains,
  - type: text
    content: tout ira bien pour toi ╵et tu seras heureux.
  '3':
  - type: text
    content: Dans ton foyer, ta femme
  - type: text
    content: sera comme une vigne ╵chargée de nombreux fruits
  - type: text
    content: et, autour de ta table,
  - type: text
    content: tes fils seront tels des plants d’olivier.
  '4':
  - type: text
    content: C’est ainsi que sera béni
  - type: text
    content: un homme qui craint l’Eternel.
  '5':
  - type: text
    content: Oui, l’Eternel te bénira ╵depuis le mont Sion,
  - type: text
    content: et tu contempleras ╵le bonheur de Jérusalem
  - type: text
    content: tous les jours de ta vie,
  '6':
  - type: text
    content: tu verras les enfants ╵de tes enfants !
  - type: text
    content: Que la paix soit sur Israël !
