document_id: JOB.30,21
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Job évoque sa condition présente
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: Mais hélas, aujourd’hui ╵me voilà la risée ╵de gamins dont les pères
  - type: usfm
    marker: q1
    children:
    - type: text
      text: étaient si méprisables
  - type: usfm
    marker: q1
    children:
    - type: text
      text: que je n’aurais daigné ╵les mettre avec mes chiens ╵pour garder mon troupeau.
  '10':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: Ils ont horreur de moi, ╵et s’éloignent de moi,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ou bien, sans hésiter, ╵me crachent au visage.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: Car il a détendu ╵la corde de mon arc, ╵et il m’a humilié.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Aussi n’ont-ils plus envers moi ╵la moindre retenue.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: Ils sont nombreux
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '30.12 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Autre traduction : '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: Ces gamins.
      marker-yv: yv-n
    - type: text
      text: ', ╵à ma droite, ils se lèvent'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '30.12 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Pour accuser Job. L’accusateur se place à la droite de l’accusé au tribunal (Ps 109.6 ; Za 3.1).
      marker-yv: yv-n
    - type: text
      text: ' ╵et me font perdre pied,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ils se fraient vers moi des chemins ╵pour précipiter mon malheur.
  '13':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: Ils coupent ma retraite, ╵travaillant à ma ruine,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sans avoir besoin d’aide.
  '14':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: Ils arrivent sur moi ╵par une large brèche,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ils vont et viennent en tous sens ╵comme dans un lieu dévasté.
  '15':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: La terreur m’envahit,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ma dignité s’évanouit ╵comme emportée par la tempête,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: tout secours m’est ôté ╵comme passe un nuage.
  '16':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: Et maintenant, ma vie s’échappe
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '30.16 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Autre traduction : '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: je me lamente sur moi-même.
      marker-yv: yv-n
    - type: text
      text: .
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Des jours d’affliction m’ont étreint.
  '17':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: Dans la nuit il perce mes os
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et mes nerfs n’ont pas de repos
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '30.17 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: mes nerfs
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: ': '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'autre traduction : '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: mes douleurs.
      marker-yv: yv-n
    - type: text
      text: .
  '18':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: Avec toute sa force, ╵il s’agrippe à mon vêtement
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '30.18 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: il s’agrippe à mon vêtement
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: ': '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'd’après l’ancienne version grecque ; le texte hébreu traditionnel a : '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: Dieu devient pour moi comme un vêtement.
      marker-yv: yv-n
    - type: text
      text: ','
  - type: usfm
    marker: q1
    children:
    - type: text
      text: comme un col, il m’enserre.
  '19':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: Il m’a précipité ╵au milieu de la fange,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et je ne vaux pas mieux ╵que poussière et que cendre.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: D’ailleurs, qu’aurais-je fait ╵des efforts de leurs bras ?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Leur vigueur s’en allait :'
  '20':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: De mes cris je t’implore, ╵et tu ne réponds pas.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Je me tiens devant toi ╵et tu ne fais rien d’autre ╵que de me regarder.
  '21':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: Tu as changé ! ╵Tu t’es rendu cruel ╵à mon égard !
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Avec la force de ta main, ╵tu t’acharnes sur moi !
  '22':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: Tu m’as fait enlever ╵sur les chevaux du vent,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et tu me fais tanguer ╵au sein de l’ouragan.
  '23':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: 'Je ne le sais que trop : ╵tu me mènes à la mort,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: au lieu de rendez-vous ╵de tout être vivant.
  '24':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: Mais celui qui périt ╵ne tend-il pas la main ?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Celui qui est dans le malheur ╵ne crie-t-il pas ?
  '25':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: N’ai-je pas autrefois pleuré ╵avec ceux dont la vie est dure,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: n’ai-je pas compati ╵à la peine du pauvre.
  '26':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: J’espérais le bonheur, ╵et le malheur est arrivé,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: j’attendais la lumière ╵et les ténèbres sont venues.
  '27':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: Tout mon être intérieur ╵bouillonne sans relâche.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Des jours d’affliction m’ont atteint.
  '28':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: Je m’avance, l’air sombre, ╵et sans voir le soleil.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Au milieu de la foule ╵je me dresse et je hurle.
  '29':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: C’est comme si j’étais ╵un frère du chacal
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ou un compagnon de l’autruche
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '30.29 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'En faisant entendre des cris qui ressemblent à ceux de ces animaux ; même image en '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: Mi 1.8
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: .
  '3':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: épuisés par la faim ╵et par les privations,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ils rôdaient dans la steppe
  - type: usfm
    marker: q1
    children:
    - type: text
      text: par une nuit ╵de dévastation et désolation.
  '30':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '30'
    - type: text
      text: Ma peau noircit sur moi,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: mes os sont consumés ╵par le feu de la fièvre.
  '31':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '31'
    - type: text
      text: Ma lyre ne sert plus ╵que pour des airs funèbres,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ma flûte n’accompagne ╵que le chant des pleureurs.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: Ils arrachaient l’herbe salée
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '30.4 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Cette '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'herbe salée '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: est parfois identifiée à l’arroche qui pousse sur les rives de la mer Morte.
      marker-yv: yv-n
    - type: text
      text: ' ╵au milieu des buissons,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ils prenaient les racines ╵du genêt comme pain.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: Ils ont été chassés ╵du milieu de leur peuple
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '30.5 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: A cause des méfaits qu’ils ont commis.
      marker-yv: yv-n
    - type: text
      text: ','
  - type: usfm
    marker: q1
    children:
    - type: text
      text: on criait après eux ╵comme après des voleurs.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: Ils hantaient les cavernes ╵au flanc des précipices,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ils logeaient dans des grottes ╵ou des trous de la terre.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: Au milieu des épines ╵retentissaient leurs cris,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ils se couchaient ╵à l’abri des broussailles.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: Ces êtres insensés ╵et innommables
  - type: usfm
    marker: q1
    children:
    - type: text
      text: avaient été chassés ╵hors du pays.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: Me voici devenu ╵l’objet de leurs chansons,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: celui dont tous se moquent.
