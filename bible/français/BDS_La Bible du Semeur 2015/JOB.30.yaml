document_id: JOB.30,21
type_code: fra
verses:
  '1':
  - type: heading
    content: Job évoque sa condition présente
  - type: text
    content: Mais hélas, aujourd’hui ╵me voilà la risée ╵de gamins dont les pères
  - type: text
    content: étaient si méprisables
  - type: text
    content: que je n’aurais daigné ╵les mettre avec mes chiens ╵pour garder mon troupeau.
  '10':
  - type: text
    content: Ils ont horreur de moi, ╵et s’éloignent de moi,
  - type: text
    content: ou bien, sans hésiter, ╵me crachent au visage.
  '11':
  - type: text
    content: Car il a détendu ╵la corde de mon arc, ╵et il m’a humilié.
  - type: text
    content: Aussi n’ont-ils plus envers moi ╵la moindre retenue.
  '12':
  - type: text
    content: Ils sont nombreux
  - type: note
    content: 'Autre traduction : Ces gamins.'
  - type: text
    content: ', ╵à ma droite, ils se lèvent'
  - type: note
    content: Pour accuser Job. L’accusateur se place à la droite de l’accusé au tribunal (Ps 109.6 ; Za 3.1).
  - type: text
    content: ' ╵et me font perdre pied,'
  - type: text
    content: ils se fraient vers moi des chemins ╵pour précipiter mon malheur.
  '13':
  - type: text
    content: Ils coupent ma retraite, ╵travaillant à ma ruine,
  - type: text
    content: sans avoir besoin d’aide.
  '14':
  - type: text
    content: Ils arrivent sur moi ╵par une large brèche,
  - type: text
    content: ils vont et viennent en tous sens ╵comme dans un lieu dévasté.
  '15':
  - type: text
    content: La terreur m’envahit,
  - type: text
    content: ma dignité s’évanouit ╵comme emportée par la tempête,
  - type: text
    content: tout secours m’est ôté ╵comme passe un nuage.
  '16':
  - type: text
    content: Et maintenant, ma vie s’échappe
  - type: note
    content: 'Autre traduction : je me lamente sur moi-même.'
  - type: text
    content: .
  - type: text
    content: Des jours d’affliction m’ont étreint.
  '17':
  - type: text
    content: Dans la nuit il perce mes os
  - type: text
    content: et mes nerfs n’ont pas de repos
  - type: note
    content: 'mes nerfs: autre traduction : mes douleurs.'
  - type: text
    content: .
  '18':
  - type: text
    content: Avec toute sa force, ╵il s’agrippe à mon vêtement
  - type: note
    content: 'il s’agrippe à mon vêtement: d’après l’ancienne version grecque ; le texte hébreu traditionnel a : Dieu devient pour moi comme un vêtement.'
  - type: text
    content: ','
  - type: text
    content: comme un col, il m’enserre.
  '19':
  - type: text
    content: Il m’a précipité ╵au milieu de la fange,
  - type: text
    content: et je ne vaux pas mieux ╵que poussière et que cendre.
  '2':
  - type: text
    content: D’ailleurs, qu’aurais-je fait ╵des efforts de leurs bras ?
  - type: text
    content: 'Leur vigueur s’en allait :'
  '20':
  - type: text
    content: De mes cris je t’implore, ╵et tu ne réponds pas.
  - type: text
    content: Je me tiens devant toi ╵et tu ne fais rien d’autre ╵que de me regarder.
  '21':
  - type: text
    content: Tu as changé ! ╵Tu t’es rendu cruel ╵à mon égard !
  - type: text
    content: Avec la force de ta main, ╵tu t’acharnes sur moi !
  '22':
  - type: text
    content: Tu m’as fait enlever ╵sur les chevaux du vent,
  - type: text
    content: et tu me fais tanguer ╵au sein de l’ouragan.
  '23':
  - type: text
    content: 'Je ne le sais que trop : ╵tu me mènes à la mort,'
  - type: text
    content: au lieu de rendez-vous ╵de tout être vivant.
  '24':
  - type: text
    content: Mais celui qui périt ╵ne tend-il pas la main ?
  - type: text
    content: Celui qui est dans le malheur ╵ne crie-t-il pas ?
  '25':
  - type: text
    content: N’ai-je pas autrefois pleuré ╵avec ceux dont la vie est dure,
  - type: text
    content: n’ai-je pas compati ╵à la peine du pauvre.
  '26':
  - type: text
    content: J’espérais le bonheur, ╵et le malheur est arrivé,
  - type: text
    content: j’attendais la lumière ╵et les ténèbres sont venues.
  '27':
  - type: text
    content: Tout mon être intérieur ╵bouillonne sans relâche.
  - type: text
    content: Des jours d’affliction m’ont atteint.
  '28':
  - type: text
    content: Je m’avance, l’air sombre, ╵et sans voir le soleil.
  - type: text
    content: Au milieu de la foule ╵je me dresse et je hurle.
  '29':
  - type: text
    content: C’est comme si j’étais ╵un frère du chacal
  - type: text
    content: ou un compagnon de l’autruche
  - type: note
    content: En faisant entendre des cris qui ressemblent à ceux de ces animaux ; même image en Mi 1.8.
  - type: text
    content: .
  '3':
  - type: text
    content: épuisés par la faim ╵et par les privations,
  - type: text
    content: ils rôdaient dans la steppe
  - type: text
    content: par une nuit ╵de dévastation et désolation.
  '30':
  - type: text
    content: Ma peau noircit sur moi,
  - type: text
    content: mes os sont consumés ╵par le feu de la fièvre.
  '31':
  - type: text
    content: Ma lyre ne sert plus ╵que pour des airs funèbres,
  - type: text
    content: ma flûte n’accompagne ╵que le chant des pleureurs.
  '4':
  - type: text
    content: Ils arrachaient l’herbe salée
  - type: note
    content: Cette herbe salée est parfois identifiée à l’arroche qui pousse sur les rives de la mer Morte.
  - type: text
    content: ' ╵au milieu des buissons,'
  - type: text
    content: ils prenaient les racines ╵du genêt comme pain.
  '5':
  - type: text
    content: Ils ont été chassés ╵du milieu de leur peuple
  - type: note
    content: A cause des méfaits qu’ils ont commis.
  - type: text
    content: ','
  - type: text
    content: on criait après eux ╵comme après des voleurs.
  '6':
  - type: text
    content: Ils hantaient les cavernes ╵au flanc des précipices,
  - type: text
    content: ils logeaient dans des grottes ╵ou des trous de la terre.
  '7':
  - type: text
    content: Au milieu des épines ╵retentissaient leurs cris,
  - type: text
    content: ils se couchaient ╵à l’abri des broussailles.
  '8':
  - type: text
    content: Ces êtres insensés ╵et innommables
  - type: text
    content: avaient été chassés ╵hors du pays.
  '9':
  - type: text
    content: Me voici devenu ╵l’objet de leurs chansons,
  - type: text
    content: celui dont tous se moquent.
