document_id: 2CO.INTRO1,21
type_code: fra
verses:
  '1':
  - type: text
    content: Introduction
  - type: text
    content: Paul a envoyé sa première lettre aux Corinthiens en l’an 56. Timothée, alors en chemin pour Corinthe, a dû en revenir avec des nouvelles alarmantes de l’Eglise. Paul fait donc, depuis Ephèse, une courte visite aux Corinthiens. Un épisode pénible, dont la nature reste imprécise, a lieu au cours de cette visite.
  - type: text
    content: 'Il retourne à Ephèse et là, écrit à nouveau une lettre aux Corinthiens, « avec bien des larmes » (2.4 ; 7.8). Cette lettre est perdue. Tite en était le porteur. Paul le rencontre en Macédoine : il revient avec de bonnes nouvelles. C’est à cette occasion que Paul rédige 2 Corinthiens.'
  - type: text
    content: Les sept premiers chapitres récapitulent les relations tendues entre Paul et ses détracteurs corinthiens.
  - type: text
    content: 'Puis, aux chapitres 8 et 9, il aborde ce qui le préoccupe actuellement : la collecte organisée par les Eglises de Grèce, de Macédoine et d’Asie Mineure au profit de l’Eglise de Jérusalem.'
  - type: text
    content: 'Enfin, Paul prépare l’avenir immédiat (chap. 10 à 13) : sa prochaine visite, et défend son apostolat.'
  - type: text
    content: 'Le fil conducteur de la lettre est donc un développement plus ou moins chronologique : passé, présent, avenir, dont l’objectif est la visite promise. Dans cette situation difficile, Dieu manifeste sa grâce à l’apôtre : « c’est lorsque je suis faible que je suis réellement fort ! » (12.10).'
