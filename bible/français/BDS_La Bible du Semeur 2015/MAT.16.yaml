document_id: MAT.16,21
type_code: fra
verses:
  '1':
  - type: heading
    content: Jésus et les chefs religieux juifs
  - type: heading
    content: (Mc 8.11-13 ; Lc 12.54-56)
  - type: text
    content: Des pharisiens et des sadducéens abordèrent Jésus pour lui tendre un piège. Ils lui demandèrent de leur montrer un signe miraculeux venant du ciel.
  '10':
  - type: text
    content: Et des sept pains distribués aux quatre mille hommes et du nombre de corbeilles que vous avez emportées ?
  - type: text
    content: ' '
  '11':
  - type: text
    content: 'Comment se fait-il que vous ne compreniez pas que je ne parlais pas de pain quand je vous disais : Gardez-vous du levain des pharisiens et des sadducéens !'
  '12':
  - type: text
    content: Alors ils comprirent qu’il leur avait dit de se garder, non pas du levain que l’on met dans le pain, mais de l’enseignement des pharisiens et des sadducéens.
  - type: heading
    content: Qui est vraiment Jésus ?
  - type: heading
    content: (Mc 8.27-30 ; Lc 9.18-21)
  '13':
  - type: text
    content: 'Jésus se rendit dans la région de Césarée de Philippe. Il interrogea ses disciples : '
  - type: text
    content: 'Que disent les gens au sujet du '
  - type: text
    content: Fils de l’homme
  - type: text
    content: '  ? Qui est-il d’après eux ?'
  '14':
  - type: text
    content: 'Ils répondirent : Pour les uns, c’est Jean-Baptiste ; pour d’autres, Elie ; pour d’autres encore, Jérémie ou un autre prophète.'
  '15':
  - type: text
    content: ' '
  - type: text
    content: – Et vous,
  - type: text
    content: ' leur demanda-t-il, '
  - type: text
    content: qui dites-vous que je suis ?
  '16':
  - type: text
    content: 'Simon Pierre lui répondit : Tu es le Messie, le Fils du Dieu vivant.'
  '17':
  - type: text
    content: 'Jésus lui dit alors : '
  - type: text
    content: 'Tu es heureux, '
  - type: text
    content: Simon
  - type: text
    content: ', fils de Jonas, car ce n’est pas de toi-même que tu as trouvé cela. C’est mon Père céleste qui te l’a révélé.'
  - type: text
    content: ' '
  '18':
  - type: text
    content: 'Et moi, je te déclare : Tu es Pierre, et sur cette pierre je bâtirai mon Eglise, contre laquelle la mort elle-même ne pourra rien.'
  - type: text
    content: ' '
  '19':
  - type: text
    content: 'Je te donnerai les clés du '
  - type: text
    content: royaume des cieux
  - type: text
    content: '  : tout ce que tu interdiras sur la terre sera interdit aux yeux de Dieu et tout ce que tu autoriseras sur la terre sera autorisé aux yeux de Dieu'
  - type: note
    content: 'Autre traduction : tous ceux que tu excluras sur la terre seront exclus aux yeux de Dieu et tous ceux que tu accueilleras sur la terre seront accueillis aux yeux de Dieu (voir 18.18).'
  - type: text
    content: .
  '2':
  - type: text
    content: 'Il leur répondit : ['
  - type: text
    content: 'Au crépuscule, vous dites bien : « Demain, il fera beau, car le ciel est rouge. »'
  - type: text
    content: ' '
  '20':
  - type: text
    content: Puis Jésus interdit à ses disciples de dire à qui que ce soit qu’il était le Messie.
  - type: heading
    content: Comment suivre Jésus
  - type: heading
    content: (Mc 8.31 à 9.1 ; Lc 9.22-27)
  '21':
  - type: text
    content: A partir de ce moment, Jésus commença à exposer à ses disciples qu’il devait se rendre à Jérusalem, y subir de cruelles souffrances de la part des responsables du peuple, des chefs des prêtres et des spécialistes de la Loi, être mis à mort et ressusciter le troisième jour.
  '22':
  - type: text
    content: 'Alors Pierre le prit à part et se mit à lui faire des reproches : Que Dieu t’en préserve, Seigneur ! Cela ne t’arrivera pas !'
  '23':
  - type: text
    content: 'Mais Jésus, se retournant, lui dit : '
  - type: text
    content: 'Arrière, «  '
  - type: text
    content: Satan
  - type: text
    content: '  » ! Eloigne-toi de moi ! Tu es pour moi un obstacle, car tes pensées ne sont pas celles de Dieu ; ce sont des pensées tout humaines.'
  '24':
  - type: text
    content: 'Puis, s’adressant à ses disciples, Jésus dit : '
  - type: text
    content: Si quelqu’un veut marcher à ma suite, qu’il renonce à lui-même, qu’il se charge de sa croix et qu’il me suive.
  - type: text
    content: ' '
  '25':
  - type: text
    content: 'Car celui qui est préoccupé de '
  - type: text
    content: sauver
  - type: text
    content: ' sa vie la perdra ; mais celui qui perdra sa vie à cause de moi, la retrouvera.'
  - type: text
    content: ' '
  '26':
  - type: text
    content: Si un homme parvient à posséder le monde entier, à quoi cela lui sert-il s’il perd sa vie ? Et que peut-on donner pour racheter sa vie ?
  '27':
  - type: text
    content: ' '
  - type: text
    content: 'Le '
  - type: text
    content: Fils de l’homme
  - type: text
    content: ' viendra dans la gloire de son Père, avec ses '
  - type: text
    content: anges
  - type: text
    content: ', et alors il donnera à chacun ce que lui auront valu ses actes.'
  - type: text
    content: ' '
  '28':
  - type: text
    content: Vraiment, je vous l’assure, plusieurs de ceux qui sont ici ne mourront pas avant d’avoir vu le Fils de l’homme venir comme Roi.
  '3':
  - type: text
    content: 'Ou bien, à l’aurore : « Aujourd’hui, on aura de l’orage, car le ciel est rouge sombre. » Ainsi, vous savez reconnaître ce qu’indique l’aspect du ciel ; mais vous êtes incapables de reconnaître les signes de notre temps'
  - type: note
    content: Les versets 2 et 3 sont absents de plusieurs manuscrits.
  - type: text
    content: .
  - type: text
    content: '] '
  '4':
  - type: text
    content: Ces gens de notre temps qui sont mauvais et infidèles à Dieu réclament un signe miraculeux ! Un signe… il ne leur en sera pas accordé d’autre que celui de Jonas.
  - type: text
    content: Là-dessus, il les quitta et partit de là.
  - type: heading
    content: (Mc 8.14-21)
  '5':
  - type: text
    content: 'En passant de l’autre côté du lac, les disciples avaient oublié d’emporter du pain. '
  '6':
  - type: text
    content: 'Jésus leur dit : '
  - type: text
    content: 'Faites bien attention : gardez-vous du '
  - type: text
    content: levain
  - type: text
    content: ' des pharisiens et des sadducéens !'
  '7':
  - type: text
    content: 'Les disciples discutaient entre eux : Il dit cela parce que nous n’avons pas pris de pain !'
  '8':
  - type: text
    content: 'Jésus, sachant ce qui se passait, leur dit : '
  - type: text
    content: Pourquoi discutez-vous entre vous parce que vous n’avez pas de pain ? Ah, votre foi est bien petite !
  - type: text
    content: ' '
  '9':
  - type: text
    content: Vous n’avez donc pas encore compris ? Ne vous souvenez-vous pas des cinq pains distribués aux cinq mille hommes et du nombre de paniers que vous avez remplis avec les restes ?
  - type: text
    content: ' '
