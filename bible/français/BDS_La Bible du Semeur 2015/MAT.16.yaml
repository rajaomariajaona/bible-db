document_id: MAT.16
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Jésus et les chefs religieux juifs
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: (Mc 8.11-13 ; Lc 12.54-56)
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Des pharisiens et des sadducéens abordèrent Jésus pour lui tendre un piège. Ils lui demandèrent de leur montrer un signe miraculeux venant du ciel.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Il leur répondit : ['
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'Au crépuscule, vous dites bien : « Demain, il fera beau, car le ciel est rouge. »'
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'Ou bien, à l’aurore : « Aujourd’hui, on aura de l’orage, car le ciel est rouge sombre. » Ainsi, vous savez reconnaître ce qu’indique l’aspect du ciel ; mais vous êtes incapables de reconnaître les signes de notre temps'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '16.3 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Les versets 2 et 3 sont absents de plusieurs manuscrits.
    marker-yv: yv-n
  - type: usfm
    marker: wj
    children:
    - type: text
      text: .
  - type: text
    text: '] '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Ces gens de notre temps qui sont mauvais et infidèles à Dieu réclament un signe miraculeux ! Un signe… il ne leur en sera pas accordé d’autre que celui de Jonas.
- type: usfm
  marker: p
  children:
  - type: text
    text: Là-dessus, il les quitta et partit de là.
- type: usfm
  marker: r
  children:
  - type: text
    text: (Mc 8.14-21)
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'En passant de l’autre côté du lac, les disciples avaient oublié d’emporter du pain. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Jésus leur dit : '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'Faites bien attention : gardez-vous du '
    - type: usfm
      marker: w
      children:
      - type: text
        text: levain
    - type: text
      text: ' des pharisiens et des sadducéens !'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Les disciples discutaient entre eux : Il dit cela parce que nous n’avons pas pris de pain !'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Jésus, sachant ce qui se passait, leur dit : '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Pourquoi discutez-vous entre vous parce que vous n’avez pas de pain ? Ah, votre foi est bien petite !
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Vous n’avez donc pas encore compris ? Ne vous souvenez-vous pas des cinq pains distribués aux cinq mille hommes et du nombre de paniers que vous avez remplis avec les restes ?
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Et des sept pains distribués aux quatre mille hommes et du nombre de corbeilles que vous avez emportées ?
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'Comment se fait-il que vous ne compreniez pas que je ne parlais pas de pain quand je vous disais : Gardez-vous du levain des pharisiens et des sadducéens !'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Alors ils comprirent qu’il leur avait dit de se garder, non pas du levain que l’on met dans le pain, mais de l’enseignement des pharisiens et des sadducéens.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Qui est vraiment Jésus ?
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: (Mc 8.27-30 ; Lc 9.18-21)
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Jésus se rendit dans la région de Césarée de Philippe. Il interrogea ses disciples : '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'Que disent les gens au sujet du '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Fils de l’homme
    - type: text
      text: '  ? Qui est-il d’après eux ?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Ils répondirent : Pour les uns, c’est Jean-Baptiste ; pour d’autres, Elie ; pour d’autres encore, Jérémie ou un autre prophète.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: ' '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: – Et vous,
  - type: text
    text: ' leur demanda-t-il, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: qui dites-vous que je suis ?
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Simon Pierre lui répondit : Tu es le Messie, le Fils du Dieu vivant.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Jésus lui dit alors : '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'Tu es heureux, '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Simon
    - type: text
      text: ', fils de Jonas, car ce n’est pas de toi-même que tu as trouvé cela. C’est mon Père céleste qui te l’a révélé.'
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'Et moi, je te déclare : Tu es Pierre, et sur cette pierre je bâtirai mon Eglise, contre laquelle la mort elle-même ne pourra rien.'
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'Je te donnerai les clés du '
    - type: usfm
      marker: w
      children:
      - type: text
        text: royaume des cieux
    - type: text
      text: '  : tout ce que tu interdiras sur la terre sera interdit aux yeux de Dieu et tout ce que tu autoriseras sur la terre sera autorisé aux yeux de Dieu'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '16.19 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Autre traduction : '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'tous ceux que tu excluras sur la terre seront exclus aux yeux de Dieu et tous ceux que tu accueilleras sur la terre seront accueillis aux yeux de Dieu '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '(voir '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '18.18'
        metadata:
          usfm: MAT.18.18
      - type: text
        text: ).
    marker-yv: yv-n
  - type: usfm
    marker: wj
    children:
    - type: text
      text: .
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Puis Jésus interdit à ses disciples de dire à qui que ce soit qu’il était le Messie.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Comment suivre Jésus
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: (Mc 8.31 à 9.1 ; Lc 9.22-27)
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: A partir de ce moment, Jésus commença à exposer à ses disciples qu’il devait se rendre à Jérusalem, y subir de cruelles souffrances de la part des responsables du peuple, des chefs des prêtres et des spécialistes de la Loi, être mis à mort et ressusciter le troisième jour.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Alors Pierre le prit à part et se mit à lui faire des reproches : Que Dieu t’en préserve, Seigneur ! Cela ne t’arrivera pas !'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Mais Jésus, se retournant, lui dit : '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'Arrière, «  '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Satan
    - type: text
      text: '  » ! Eloigne-toi de moi ! Tu es pour moi un obstacle, car tes pensées ne sont pas celles de Dieu ; ce sont des pensées tout humaines.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Puis, s’adressant à ses disciples, Jésus dit : '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Si quelqu’un veut marcher à ma suite, qu’il renonce à lui-même, qu’il se charge de sa croix et qu’il me suive.
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'Car celui qui est préoccupé de '
    - type: usfm
      marker: w
      children:
      - type: text
        text: sauver
    - type: text
      text: ' sa vie la perdra ; mais celui qui perdra sa vie à cause de moi, la retrouvera.'
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Si un homme parvient à posséder le monde entier, à quoi cela lui sert-il s’il perd sa vie ? Et que peut-on donner pour racheter sa vie ?
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: ' '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'Le '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Fils de l’homme
    - type: text
      text: ' viendra dans la gloire de son Père, avec ses '
    - type: usfm
      marker: w
      children:
      - type: text
        text: anges
    - type: text
      text: ', et alors il donnera à chacun ce que lui auront valu ses actes.'
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Vraiment, je vous l’assure, plusieurs de ceux qui sont ici ne mourront pas avant d’avoir vu le Fils de l’homme venir comme Roi.
