type_code: fra
verses:
  '1':
  - type: usfm
    marker: imt1
    children:
    - type: text
      text: Introduction
  - type: usfm
    marker: ip
    children:
    - type: text
      text: Né en Babylonie, Zacharie a pris part au retour des exilés en Juda, sous la conduite de Zorobabel et du grand-prêtre Josué, en 538 avant Jésus-Christ. Comme Jérémie (Jr 1.1) et Ezéchiel (Ez 1.3), Zacharie était d’une famille sacerdotal. Son grand-père Iddo (1.1, 7) est en effet mentionné dans la liste des prêtres revenus d’exil (Né 12.4). Lorsque Yoyaqim succédera à Josué comme grand-prêtre, Zacharie succédera à Iddo comme prêtre et chef de sa famille (Né 12.12-16), ce qui semble indiquer que son père Barachie est mort assez jeune (1.1, 7).
  - type: usfm
    marker: ip
    children:
    - type: text
      text: 'Zacharie est contemporain d’Aggée et, comme lui, a encouragé les Judéens à revenir à l’Eternel (1.2-6) et à rouvrir le chantier du Temple, après une quinzaine d’années d’interruption (4.8-10 ; Esd 5.1 ; 6.14). Les premières prophéties (1.7 à 6.15) datent de deux mois après les dernières proclamations d’Aggée, c’est-à-dire de février 519 (1.7), et les chapitres 7 et 8 de décembre 518 (7.1). Les prophéties des chapitres 9 à 14 pourraient dater d’après 480 : la formule qui les introduit ne se retrouve en effet qu’en 12.1 et en Malachie 1.1.'
  - type: usfm
    marker: ip
    children:
    - type: text
      text: 'La première section du livre (1.7 à 6.15) se compose essentiellement de huit visions nocturnes, ayant pour but d’encourager les travaux de reconstruction du Temple, mais qui, de manière symbolique, annoncent l’œuvre future de l’Eternel à partir de réalités connues du prophète : Jérusalem (2.6), le grand-prêtre Josué et le descendant de David, Zorobabel (chap. 3 et 4), et le Temple (6.9-15). La deuxième section (chap. 7 à 8), avec son insistance sur la pratique du bien, a un caractère plus social. Dans la dernière section (chap. 9 à 14), le prophète dresse un tableau majestueux des événements qui marqueront le temps de la fin : le Messie viendra, monté sur un ânon (9.9 ; Mt 21.5 ; Jn 12.15), mais il sera rejeté, vendu pour trente pièces d’argent (11.12-13 ; Mt 26.15) et livré à la mort (13.7 ; Mt 26.31 ; Lc 24.27). Certains parmi le peuple (12.11-14), cependant, le reconnaîtront et tourneront les regards vers celui qui aura été transpercé (12.10 ; Jn 19.37) et dont coulera la source qui purifie du péché (13.1 ; voir Jn 19.34-35). Mais un temps d’épreuve attend encore Jérusalem, qui sera prise d’assaut avant que l’Eternel intervienne pour juger les peuples venus la combattre (14.1-7) et que la ville soit comme transfigurée (14.8-21  ; le v. 11 est cité en Ap 22.3).'
  - type: usfm
    marker: ip
    children:
    - type: text
      text: 'L’un des aspects les plus frappants du livre de Zacharie est la manière dont il fait converger plusieurs lignes prophétiques de l’Ancien Testament. « Mon serviteur le Germe » (Za 3.8) est à la fois le Germe, le descendant du roi David attendu par plusieurs prophètes (Jr 23.5 ; 33.15 ; voir Es 11.1), et le « Serviteur de l’Eternel », nom du personnage annoncé par Esaïe et qui devait mourir en sacrifice pour les péchés du peuple de Dieu (Es 52.13 à 53.12). Le « Messie glorieux » et le « Messie souffrant » ne font qu’un, ce que confirme Zacharie qui prophétise la venue du roi messianique humilié (9.9), trahi (11.12-13) et mis à mort (12.10). Mais ce Germe-Serviteur sera aussi prêtre, comme l’annonçaient déjà les Psaumes (Ps 110.4) : il bâtira le temple de l’Eternel et, en Roi-Prêtre, il y siégera (6.12-13). C’est en Jésus que ces lignes prophétiques convergentes ont trouvé leur accomplissement et que les images ont laissé la place à la réalité qu’elles préfiguraient.'
