document_id: 1CH.1,21
type_code: fra
verses:
  '1':
  - type: usfm
    marker: ms1
    children:
    - type: text
      text: Les généalogies
    marker-yv: yv-h
  - type: usfm
    marker: s1
    children:
    - type: text
      text: D’Adam à Sem
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: Adam
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1.1 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Pour les v. 1-4, voir '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: Gn 5
        - type: text
          text: ' et notes.'
      marker-yv: yv-n
    - type: text
      text: ', Seth, Enosh, '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Koush fut le père
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1.10 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Le terme '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'père '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'pourrait aussi signifier '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'fondateur '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'ou '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'chef '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: (de même, entre autres, aux v. 11, 13, 18 et 20).
      marker-yv: yv-n
    - type: text
      text: ' de Nimrod qui se mit à exercer un grand pouvoir sur la terre.'
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Mitsraïm fut l’ancêtre des Loudim, des Anamim, des Lehabim, des Naphtouim, '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: des Patrousim, des Kaslouhim – dont sont issus les Philistins
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1.12 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Les Philistins, peuple indo-européen, ont tout d’abord émigré en Crète (voir Jr 47.4 ; Am 9.7) puis ont envahi l’Egypte au début du '
        - type: usfm
          marker: sc
          children:
          - type: text
            text: xii
        - type: usfm
          marker: ord
          children:
          - type: text
            text: e
        - type: text
          text: ' siècle av. J.-C. Chassés de cette région, ils se sont installés sur la côte de Canaan pour étendre plus tard leur influence sur presque tout le pays.'
      marker-yv: yv-n
    - type: text
      text: ' – et des Crétois.'
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Canaan eut pour fils Sidon, son aîné, et Heth. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'De lui descendent les Yebousiens, les Amoréens, les Guirgasiens, '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'les Héviens, les Arqiens, les Siniens, '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: les Arvadiens, les Tsemariens et les Hamathiens.
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Les descendants de Sem furent : Elam, Assour, Arpakshad, Loud et Aram.'
  - type: usfm
    marker: p
    children:
    - type: text
      text: Les descendants d’Aram furent
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1.17 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Les descendants d’Aram furent
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: ': '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'd’après un manuscrit hébreu, certains manuscrits de l’ancienne version grecque et '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: Gn 10.23
        - type: text
          text: . Ces mots manquent dans la plupart des manuscrits hébreux.
      marker-yv: yv-n
    - type: text
      text: '  : Outs, Houl, Guéter et Méshek. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Arpakshad eut pour fils Shélah, et Shélah eut pour fils Héber. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Héber eut deux fils : l’un s’appelait Péleg (Partage) parce que de son temps la terre fut partagée, et son frère s’appelait Yoqtân.'
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Qénân, Mahalaléel, Yéred, '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Yoqtân eut pour fils Almodad, Shéleph, Hatsarmaveth, Yérah, '
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Hadoram, Ouzal, Diqla, '
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Obal
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1.22 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'D’après quelques manuscrits hébreux, certains manuscrits de l’ancienne version grecque, la version syriaque et '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: Gn 10.28
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: ', Abimaël, Saba, '
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ophir, Havila et Yobab. Tous ceux-là étaient des descendants de Yoqtân.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: De Sem à Esaü et Jacob
    marker-yv: yv-h
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Sem
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1.24 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Pour les v. 24-27, voir '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: Gn 11.10-26
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: ', Arpakshad'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1.24 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Certains manuscrits de l’ancienne version grecque ajoutent : '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: Caïnan.
      marker-yv: yv-n
    - type: text
      text: ', Shélah, '
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Héber, Péleg, Reou, '
  '26':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Seroug, Nahor, Térah, '
  '27':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Abram, c’est-à-dire Abraham.
  '28':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Abraham eut pour fils : Isaac et Ismaël. '
  '29':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Voici leur postérité : le fils aîné d’Ismaël'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1.29 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Pour les v. 29-31, voir '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: Gn 25.13-16
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: ' s’appelait Nebayoth, puis viennent Qédar, Adbéel, Mibsam, '
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Hénok, Mathusalem, Lémek, '
  '30':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Mishma, Douma, Massa, Hadad, Téma, '
  '31':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Yetour, Naphish et Qedma. Tels sont les fils d’Ismaël. '
  '32':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Qetoura
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1.32 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Pour les v. 32-34, voir '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: Gn 25.1-4
        - type: text
          text: ', '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: 19-26
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: ', épouse de second rang d’Abraham, donna naissance à Zimrân, Yoqshân, Medân, Madian, Yishbaq et Shouah. Fils de Yoqshân : Saba et Dedân. '
  '33':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fils de Madian : Epha, Epher, Hénok, Abida et Eldaa. Tous ceux-là sont les descendants de Qetoura.'
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Les descendants d’Esaü
    marker-yv: yv-h
  '34':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Abraham eut pour fils Isaac qui eut pour fils : Esaü et Israël'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1.34 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Nom donné à Jacob (voir Gn 32.29 ; 35.10).
      marker-yv: yv-n
    - type: text
      text: '. '
  '35':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Fils d’Esaü
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1.35 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Pour les v. 35-42, voir '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: Gn 36.10-28
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: '  : Eliphaz, Reouel, Yeoush, Yaelam et Qorah. '
  '36':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fils d’Eliphaz : Témân, Omar, Tsepho'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1.36 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Avec de nombreux manuscrits hébreux, certains manuscrits de l’ancienne version grecque, la version syriaque et '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: Gn 36.11
        - type: text
          text: '. Le reste des manuscrits hébreux a : '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: Tsephi.
      marker-yv: yv-n
    - type: text
      text: ', Gaetam, Qenaz, Timna et Amalec. '
  '37':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fils de Reouel : Nahath, Zérah, Shamma et Mizza. '
  '38':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Descendants de Séir : Lotân, Shobal, Tsibeôn, Ana, Dishôn, Etser et Dishân. '
  '39':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Descendants de Lotân : Hori et Homam. La sœur de Lotân s’appelait Timna. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Noé, Sem, Cham et Japhet.
  '40':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Descendants de Shobal : Alvân'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1.40 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'D’après de nombreux manuscrits hébreux, certains manuscrits de l’ancienne version grecque, et '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: Gn 36.23
        - type: text
          text: '. Les autres manuscrits hébreux ont : '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: Alyân.
      marker-yv: yv-n
    - type: text
      text: ', Manahath, Ebal, Shepho'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1.40 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'D’après quelques manuscrits hébreux et '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: Gn 36.23
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: ' et Onam. Fils de Tsibeôn : Aya et Ana. '
  '41':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Enfants d’Ana : Dishôn. Fils de Dishôn : Hemdân'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1.41 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'D’après de nombreux manuscrits hébreux, certains manuscrits de l’ancienne version grecque, et '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: Gn 36.26
        - type: text
          text: '. Les autres manuscrits hébreux ont : '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: Hamrân.
      marker-yv: yv-n
    - type: text
      text: ', Eshbân, Yitrân et Kerân. '
  '42':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fils d’Etser : Bilhân, Zaavân et Aqân'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1.42 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'D’après de nombreux manuscrits hébreux, des manuscrits de l’ancienne version grecque et '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: Gn 36.27
        - type: text
          text: '. D’autres manuscrits hébreux et grecs ainsi que d’autres versions anciennes ont : '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'Yaaqân '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'ou '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: et Yaaqân.
      marker-yv: yv-n
    - type: text
      text: '. Fils de Dishân : Outs et Arân.'
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Les rois d’Edom
    marker-yv: yv-h
  '43':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Voici les rois qui ont régné dans le pays d’Edom, avant qu’il y ait un roi en Israël : Béla, fils de Béor ; sa ville s’appelait Dinhaba. '
  '44':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Après sa mort, Yobab, fils de Zérah, de Botsra, régna à sa place. '
  '45':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Yobab mourut et Housham, du pays des Témanites, régna à sa place. '
  '46':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Après la mort de Housham, Hadad, fils de Bedad, régna à sa place. Il battit les Madianites dans la campagne de Moab ; il venait de la ville d’Avith. '
  '47':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Après la mort de Hadad, Samla, de Masréqa, régna à sa place. '
  '48':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Puis après la mort de Samla, Saül, de Rehoboth sur le fleuve, régna à sa place. '
  '49':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Après la mort de Saül, Baal-Hanân, fils d’Akbor, régna à sa place. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Fils de Japhet
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1.5 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Pour les v. 5-23, voir '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: Gn 10
        - type: text
          text: ' et notes.'
      marker-yv: yv-n
    - type: text
      text: '  : Gomer, Magog, Madaï, Yavân, Toubal, Méshek et Tiras.'
  '50':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Après la mort de Baal-Hanân, Hadad régna à sa place. Sa ville s’appelait Paou
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1.50 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'D’après de nombreux manuscrits hébreux, certains manuscrits de l’ancienne version grecque, la version syriaque, la Vulgate et '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: Gn 36.39
        - type: text
          text: '. Les autres manuscrits hébreux ont : '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: Paï.
      marker-yv: yv-n
    - type: text
      text: ', le nom de sa femme était Mehétabéel, fille de Matred, et petite-fille de Mézahab.'
  '51':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Après la mort de Hadad, des chefs de familles gouvernèrent Edom. Ce furent les chefs Timna, Alva, Yeteth, '
  '52':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Oholibama, Ela, Pinôn, '
  '53':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Qenaz, Témân, Mibtsar, '
  '54':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Magdiel et Iram. Tels sont les chefs d’Edom.
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fils de Gomer : Ashkenaz, Diphath'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1.6 '
      - type: usfm
        marker: ft
        children:
        - type: usfm
          marker: ref
          children:
          - type: text
            text: Gn 10.3
        - type: text
          text: '  : '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: Riphath.
      marker-yv: yv-n
    - type: text
      text: ' et Togarma.'
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fils de Yavân : Elisha, Tarsis, Kittim et Dodanim'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1.7 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'D’après plusieurs manuscrits hébreux, la version syriaque et '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: Gn 10.4
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: .
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fils de Cham : Koush, Mitsraïm, Pouth et Canaan.'
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fils de Koush : Seba, Havila, Sabta, Raema et Sabteka. Fils de Raema : Sheba et Dedân. '
