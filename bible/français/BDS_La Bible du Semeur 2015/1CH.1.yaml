document_id: 1CH.1,21
type_code: fra
verses:
  '1':
  - type: heading
    content: Les généalogies
  - type: heading
    content: D’Adam à Sem
  - type: text
    content: Adam
  - type: note
    content: Pour les v. 1-4, voir Gn 5 et notes.
  - type: text
    content: ', Seth, Enosh, '
  '10':
  - type: text
    content: Koush fut le père
  - type: note
    content: Le terme père pourrait aussi signifier fondateur ou chef (de même, entre autres, aux v. 11, 13, 18 et 20).
  - type: text
    content: ' de Nimrod qui se mit à exercer un grand pouvoir sur la terre.'
  '11':
  - type: text
    content: 'Mitsraïm fut l’ancêtre des Loudim, des Anamim, des Lehabim, des Naphtouim, '
  '12':
  - type: text
    content: des Patrousim, des Kaslouhim – dont sont issus les Philistins
  - type: note
    content: Les Philistins, peuple indo-européen, ont tout d’abord émigré en Crète (voir Jr 47.4 ; Am 9.7) puis ont envahi l’Egypte au début du xiie siècle av. J.-C. Chassés de cette région, ils se sont installés sur la côte de Canaan pour étendre plus tard leur influence sur presque tout le pays.
  - type: text
    content: ' – et des Crétois.'
  '13':
  - type: text
    content: 'Canaan eut pour fils Sidon, son aîné, et Heth. '
  '14':
  - type: text
    content: 'De lui descendent les Yebousiens, les Amoréens, les Guirgasiens, '
  '15':
  - type: text
    content: 'les Héviens, les Arqiens, les Siniens, '
  '16':
  - type: text
    content: les Arvadiens, les Tsemariens et les Hamathiens.
  '17':
  - type: text
    content: 'Les descendants de Sem furent : Elam, Assour, Arpakshad, Loud et Aram.'
  - type: text
    content: Les descendants d’Aram furent
  - type: note
    content: 'Les descendants d’Aram furent: d’après un manuscrit hébreu, certains manuscrits de l’ancienne version grecque et Gn 10.23. Ces mots manquent dans la plupart des manuscrits hébreux.'
  - type: text
    content: '  : Outs, Houl, Guéter et Méshek. '
  '18':
  - type: text
    content: 'Arpakshad eut pour fils Shélah, et Shélah eut pour fils Héber. '
  '19':
  - type: text
    content: 'Héber eut deux fils : l’un s’appelait Péleg (Partage) parce que de son temps la terre fut partagée, et son frère s’appelait Yoqtân.'
  '2':
  - type: text
    content: 'Qénân, Mahalaléel, Yéred, '
  '20':
  - type: text
    content: 'Yoqtân eut pour fils Almodad, Shéleph, Hatsarmaveth, Yérah, '
  '21':
  - type: text
    content: 'Hadoram, Ouzal, Diqla, '
  '22':
  - type: text
    content: Obal
  - type: note
    content: D’après quelques manuscrits hébreux, certains manuscrits de l’ancienne version grecque, la version syriaque et Gn 10.28.
  - type: text
    content: ', Abimaël, Saba, '
  '23':
  - type: text
    content: Ophir, Havila et Yobab. Tous ceux-là étaient des descendants de Yoqtân.
  - type: heading
    content: De Sem à Esaü et Jacob
  '24':
  - type: text
    content: Sem
  - type: note
    content: Pour les v. 24-27, voir Gn 11.10-26.
  - type: text
    content: ', Arpakshad'
  - type: note
    content: 'Certains manuscrits de l’ancienne version grecque ajoutent : Caïnan.'
  - type: text
    content: ', Shélah, '
  '25':
  - type: text
    content: 'Héber, Péleg, Reou, '
  '26':
  - type: text
    content: 'Seroug, Nahor, Térah, '
  '27':
  - type: text
    content: Abram, c’est-à-dire Abraham.
  '28':
  - type: text
    content: 'Abraham eut pour fils : Isaac et Ismaël. '
  '29':
  - type: text
    content: 'Voici leur postérité : le fils aîné d’Ismaël'
  - type: note
    content: Pour les v. 29-31, voir Gn 25.13-16.
  - type: text
    content: ' s’appelait Nebayoth, puis viennent Qédar, Adbéel, Mibsam, '
  '3':
  - type: text
    content: 'Hénok, Mathusalem, Lémek, '
  '30':
  - type: text
    content: 'Mishma, Douma, Massa, Hadad, Téma, '
  '31':
  - type: text
    content: 'Yetour, Naphish et Qedma. Tels sont les fils d’Ismaël. '
  '32':
  - type: text
    content: Qetoura
  - type: note
    content: Pour les v. 32-34, voir Gn 25.1-4, 19-26.
  - type: text
    content: ', épouse de second rang d’Abraham, donna naissance à Zimrân, Yoqshân, Medân, Madian, Yishbaq et Shouah. Fils de Yoqshân : Saba et Dedân. '
  '33':
  - type: text
    content: 'Fils de Madian : Epha, Epher, Hénok, Abida et Eldaa. Tous ceux-là sont les descendants de Qetoura.'
  - type: heading
    content: Les descendants d’Esaü
  '34':
  - type: text
    content: 'Abraham eut pour fils Isaac qui eut pour fils : Esaü et Israël'
  - type: note
    content: Nom donné à Jacob (voir Gn 32.29 ; 35.10).
  - type: text
    content: '. '
  '35':
  - type: text
    content: Fils d’Esaü
  - type: note
    content: Pour les v. 35-42, voir Gn 36.10-28.
  - type: text
    content: '  : Eliphaz, Reouel, Yeoush, Yaelam et Qorah. '
  '36':
  - type: text
    content: 'Fils d’Eliphaz : Témân, Omar, Tsepho'
  - type: note
    content: 'Avec de nombreux manuscrits hébreux, certains manuscrits de l’ancienne version grecque, la version syriaque et Gn 36.11. Le reste des manuscrits hébreux a : Tsephi.'
  - type: text
    content: ', Gaetam, Qenaz, Timna et Amalec. '
  '37':
  - type: text
    content: 'Fils de Reouel : Nahath, Zérah, Shamma et Mizza. '
  '38':
  - type: text
    content: 'Descendants de Séir : Lotân, Shobal, Tsibeôn, Ana, Dishôn, Etser et Dishân. '
  '39':
  - type: text
    content: 'Descendants de Lotân : Hori et Homam. La sœur de Lotân s’appelait Timna. '
  '4':
  - type: text
    content: Noé, Sem, Cham et Japhet.
  '40':
  - type: text
    content: 'Descendants de Shobal : Alvân'
  - type: note
    content: 'D’après de nombreux manuscrits hébreux, certains manuscrits de l’ancienne version grecque, et Gn 36.23. Les autres manuscrits hébreux ont : Alyân.'
  - type: text
    content: ', Manahath, Ebal, Shepho'
  - type: note
    content: D’après quelques manuscrits hébreux et Gn 36.23.
  - type: text
    content: ' et Onam. Fils de Tsibeôn : Aya et Ana. '
  '41':
  - type: text
    content: 'Enfants d’Ana : Dishôn. Fils de Dishôn : Hemdân'
  - type: note
    content: 'D’après de nombreux manuscrits hébreux, certains manuscrits de l’ancienne version grecque, et Gn 36.26. Les autres manuscrits hébreux ont : Hamrân.'
  - type: text
    content: ', Eshbân, Yitrân et Kerân. '
  '42':
  - type: text
    content: 'Fils d’Etser : Bilhân, Zaavân et Aqân'
  - type: note
    content: 'D’après de nombreux manuscrits hébreux, des manuscrits de l’ancienne version grecque et Gn 36.27. D’autres manuscrits hébreux et grecs ainsi que d’autres versions anciennes ont : Yaaqân ou et Yaaqân.'
  - type: text
    content: '. Fils de Dishân : Outs et Arân.'
  - type: heading
    content: Les rois d’Edom
  '43':
  - type: text
    content: 'Voici les rois qui ont régné dans le pays d’Edom, avant qu’il y ait un roi en Israël : Béla, fils de Béor ; sa ville s’appelait Dinhaba. '
  '44':
  - type: text
    content: 'Après sa mort, Yobab, fils de Zérah, de Botsra, régna à sa place. '
  '45':
  - type: text
    content: 'Yobab mourut et Housham, du pays des Témanites, régna à sa place. '
  '46':
  - type: text
    content: 'Après la mort de Housham, Hadad, fils de Bedad, régna à sa place. Il battit les Madianites dans la campagne de Moab ; il venait de la ville d’Avith. '
  '47':
  - type: text
    content: 'Après la mort de Hadad, Samla, de Masréqa, régna à sa place. '
  '48':
  - type: text
    content: 'Puis après la mort de Samla, Saül, de Rehoboth sur le fleuve, régna à sa place. '
  '49':
  - type: text
    content: 'Après la mort de Saül, Baal-Hanân, fils d’Akbor, régna à sa place. '
  '5':
  - type: text
    content: Fils de Japhet
  - type: note
    content: Pour les v. 5-23, voir Gn 10 et notes.
  - type: text
    content: '  : Gomer, Magog, Madaï, Yavân, Toubal, Méshek et Tiras.'
  '50':
  - type: text
    content: Après la mort de Baal-Hanân, Hadad régna à sa place. Sa ville s’appelait Paou
  - type: note
    content: 'D’après de nombreux manuscrits hébreux, certains manuscrits de l’ancienne version grecque, la version syriaque, la Vulgate et Gn 36.39. Les autres manuscrits hébreux ont : Paï.'
  - type: text
    content: ', le nom de sa femme était Mehétabéel, fille de Matred, et petite-fille de Mézahab.'
  '51':
  - type: text
    content: 'Après la mort de Hadad, des chefs de familles gouvernèrent Edom. Ce furent les chefs Timna, Alva, Yeteth, '
  '52':
  - type: text
    content: 'Oholibama, Ela, Pinôn, '
  '53':
  - type: text
    content: 'Qenaz, Témân, Mibtsar, '
  '54':
  - type: text
    content: Magdiel et Iram. Tels sont les chefs d’Edom.
  '6':
  - type: text
    content: 'Fils de Gomer : Ashkenaz, Diphath'
  - type: note
    content: 'Gn 10.3  : Riphath.'
  - type: text
    content: ' et Togarma.'
  '7':
  - type: text
    content: 'Fils de Yavân : Elisha, Tarsis, Kittim et Dodanim'
  - type: note
    content: D’après plusieurs manuscrits hébreux, la version syriaque et Gn 10.4.
  - type: text
    content: .
  '8':
  - type: text
    content: 'Fils de Cham : Koush, Mitsraïm, Pouth et Canaan.'
  '9':
  - type: text
    content: 'Fils de Koush : Seba, Havila, Sabta, Raema et Sabteka. Fils de Raema : Sheba et Dedân. '
