document_id: ISA.25
type_code: fra
segments:
- type: usfm
  marker: s2
  children:
  - type: text
    text: Louange à Dieu
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: O Eternel, tu es mon Dieu,
- type: usfm
  marker: q1
  children:
  - type: text
    text: je te glorifierai ╵et je louerai ton nom
- type: usfm
  marker: q1
  children:
  - type: text
    text: car tu as accompli ╵des projets merveilleux,
- type: usfm
  marker: q1
  children:
  - type: text
    text: conçus de longue date, ╵sûrs et fiables.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Tu as réduit la ville ╵en un monceau de pierres,
- type: usfm
  marker: q1
  children:
  - type: text
    text: la cité fortifiée, ╵n’est plus que ruine
- type: usfm
  marker: q1
  children:
  - type: text
    text: la citadelle des barbares
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '25.2 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Les anciennes versions grecque et syriaque ont : '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: des orgueilleux.
    marker-yv: yv-n
  - type: text
    text: ', ╵a cessé d’être une cité'
- type: usfm
  marker: q1
  children:
  - type: text
    text: et jamais plus personne ╵ne la rebâtira.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Aussi, de puissants peuples ╵t’honoreront
- type: usfm
  marker: q1
  children:
  - type: text
    text: et elle te craindra, ╵la cité des nations ╵qui régnaient en tyrans.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Car tu es un refuge ╵pour celui qui est pauvre
- type: usfm
  marker: q1
  children:
  - type: text
    text: et une forteresse ╵pour l’indigent dans sa détresse.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Tu es un sûr abri ╵contre la pluie d’orage
- type: usfm
  marker: q1
  children:
  - type: text
    text: et tu es notre ombrage ╵au temps de la chaleur.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Car la colère ardente des tyrans
- type: usfm
  marker: q1
  children:
  - type: text
    text: ressemble à une pluie d’orage ╵qui bat une muraille
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: ou à de la chaleur ╵dans une terre aride.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Mais toi, tu fais cesser ╵la clameur des barbares ;
- type: usfm
  marker: q1
  children:
  - type: text
    text: comme la chaleur cesse ╵quand un nuage passe,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ainsi tu as mis fin ╵aux chansons des tyrans.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Le Seigneur des armées célestes ╵préparera lui-même
- type: usfm
  marker: q1
  children:
  - type: text
    text: pour tous les peuples ╵là, sur cette montagne
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '25.6 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: C’est-à-dire le mont Sion.
    marker-yv: yv-n
  - type: text
    text: ','
- type: usfm
  marker: q1
  children:
  - type: text
    text: un festin de vins vieux,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et de mets succulents,
- type: usfm
  marker: q1
  children:
  - type: text
    text: des mets tout pleins de moelle,
- type: usfm
  marker: q1
  children:
  - type: text
    text: arrosés de vins vieux ╵et dûment clarifiés.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Et il déchirera ╵là, sur cette montagne,
- type: usfm
  marker: q1
  children:
  - type: text
    text: le voile de tristesse ╵qui couvre tous les peuples,
- type: usfm
  marker: q1
  children:
  - type: text
    text: la couverture ╵recouvrant toutes les nations.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Il fera disparaître ╵la mort à tout jamais.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et de tous les visages ╵le Seigneur, l’Eternel,
- type: usfm
  marker: q1
  children:
  - type: text
    text: effacera les larmes,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et sur toute la terre
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '25.8 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Cité en 1 Co 15.54 ; Ap 7.17 ; 21.4.
    marker-yv: yv-n
  - type: text
    text: ', ╵il fera disparaître'
- type: usfm
  marker: q1
  children:
  - type: text
    text: l’opprobre pesant sur son peuple.
- type: usfm
  marker: q1
  children:
  - type: text
    text: L’Eternel a parlé.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Et l’on dira en ce jour-là :'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Voyez, c’est notre Dieu
- type: usfm
  marker: q1
  children:
  - type: text
    text: en qui nous espérions,
- type: usfm
  marker: q1
  children:
  - type: text
    text: il nous a délivrés.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Oui, c’est en l’Eternel ╵que nous avons placé ╵notre espérance.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Maintenant, jubilons
- type: usfm
  marker: q1
  children:
  - type: text
    text: et réjouissons-nous ╵puisqu’il nous a sauvés.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Car, sur cette montagne, ╵la main de l’Eternel ╵se posera ╵comme une protection.
- type: usfm
  marker: s1
  children:
  - type: text
    text: L’Eternel prend à cœur la cause de son peuple
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: text
    text: Mais Moab sera piétiné sur place
- type: usfm
  marker: q1
  children:
  - type: text
    text: tout comme de la paille ╵qu’on foulerait aux pieds ╵dans la fosse à purin.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Dans cette fosse immonde, ╵il étendra les mains
- type: usfm
  marker: q1
  children:
  - type: text
    text: comme fait le nageur ;
- type: usfm
  marker: q1
  children:
  - type: text
    text: cependant, l’Eternel ╵abattra son orgueil, ╵malgré tous ses efforts
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '25.11 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: ses efforts
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: ': '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: terme de sens incertain.
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: L’Eternel abattra ╵tes murs inaccessibles ╵et fortifiés ;
- type: usfm
  marker: q1
  children:
  - type: text
    text: il les renversera, ╵les jettera à terre ╵jusque dans la poussière.
