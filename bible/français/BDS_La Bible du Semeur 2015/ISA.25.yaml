document_id: ISA.25,21
type_code: fra
verses:
  '1':
  - type: heading
    content: Louange à Dieu
  - type: text
    content: O Eternel, tu es mon Dieu,
  - type: text
    content: je te glorifierai ╵et je louerai ton nom
  - type: text
    content: car tu as accompli ╵des projets merveilleux,
  - type: text
    content: conçus de longue date, ╵sûrs et fiables.
  '10':
  - type: text
    content: Car, sur cette montagne, ╵la main de l’Eternel ╵se posera ╵comme une protection.
  - type: heading
    content: L’Eternel prend à cœur la cause de son peuple
  - type: text
    content: Mais Moab sera piétiné sur place
  - type: text
    content: tout comme de la paille ╵qu’on foulerait aux pieds ╵dans la fosse à purin.
  '11':
  - type: text
    content: Dans cette fosse immonde, ╵il étendra les mains
  - type: text
    content: comme fait le nageur ;
  - type: text
    content: cependant, l’Eternel ╵abattra son orgueil, ╵malgré tous ses efforts
  - type: note
    content: 'ses efforts: terme de sens incertain.'
  - type: text
    content: .
  '12':
  - type: text
    content: L’Eternel abattra ╵tes murs inaccessibles ╵et fortifiés ;
  - type: text
    content: il les renversera, ╵les jettera à terre ╵jusque dans la poussière.
  '2':
  - type: text
    content: Tu as réduit la ville ╵en un monceau de pierres,
  - type: text
    content: la cité fortifiée, ╵n’est plus que ruine
  - type: text
    content: la citadelle des barbares
  - type: note
    content: 'Les anciennes versions grecque et syriaque ont : des orgueilleux.'
  - type: text
    content: ', ╵a cessé d’être une cité'
  - type: text
    content: et jamais plus personne ╵ne la rebâtira.
  '3':
  - type: text
    content: Aussi, de puissants peuples ╵t’honoreront
  - type: text
    content: et elle te craindra, ╵la cité des nations ╵qui régnaient en tyrans.
  '4':
  - type: text
    content: Car tu es un refuge ╵pour celui qui est pauvre
  - type: text
    content: et une forteresse ╵pour l’indigent dans sa détresse.
  - type: text
    content: Tu es un sûr abri ╵contre la pluie d’orage
  - type: text
    content: et tu es notre ombrage ╵au temps de la chaleur.
  - type: text
    content: Car la colère ardente des tyrans
  - type: text
    content: ressemble à une pluie d’orage ╵qui bat une muraille
  '5':
  - type: text
    content: ou à de la chaleur ╵dans une terre aride.
  - type: text
    content: Mais toi, tu fais cesser ╵la clameur des barbares ;
  - type: text
    content: comme la chaleur cesse ╵quand un nuage passe,
  - type: text
    content: ainsi tu as mis fin ╵aux chansons des tyrans.
  '6':
  - type: text
    content: Le Seigneur des armées célestes ╵préparera lui-même
  - type: text
    content: pour tous les peuples ╵là, sur cette montagne
  - type: note
    content: C’est-à-dire le mont Sion.
  - type: text
    content: ','
  - type: text
    content: un festin de vins vieux,
  - type: text
    content: et de mets succulents,
  - type: text
    content: des mets tout pleins de moelle,
  - type: text
    content: arrosés de vins vieux ╵et dûment clarifiés.
  '7':
  - type: text
    content: Et il déchirera ╵là, sur cette montagne,
  - type: text
    content: le voile de tristesse ╵qui couvre tous les peuples,
  - type: text
    content: la couverture ╵recouvrant toutes les nations.
  '8':
  - type: text
    content: Il fera disparaître ╵la mort à tout jamais.
  - type: text
    content: Et de tous les visages ╵le Seigneur, l’Eternel,
  - type: text
    content: effacera les larmes,
  - type: text
    content: et sur toute la terre
  - type: note
    content: Cité en 1 Co 15.54 ; Ap 7.17 ; 21.4.
  - type: text
    content: ', ╵il fera disparaître'
  - type: text
    content: l’opprobre pesant sur son peuple.
  - type: text
    content: L’Eternel a parlé.
  '9':
  - type: text
    content: 'Et l’on dira en ce jour-là :'
  - type: text
    content: Voyez, c’est notre Dieu
  - type: text
    content: en qui nous espérions,
  - type: text
    content: il nous a délivrés.
  - type: text
    content: Oui, c’est en l’Eternel ╵que nous avons placé ╵notre espérance.
  - type: text
    content: Maintenant, jubilons
  - type: text
    content: et réjouissons-nous ╵puisqu’il nous a sauvés.
