document_id: ZEP.3
type_code: fra
segments:
- type: usfm
  marker: s2
  children:
  - type: text
    text: Malheur à Jérusalem
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Malheur à la rebelle, ╵à la ville souillée,
- type: usfm
  marker: q1
  children:
  - type: text
    text: la ville tyrannique
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '3.1 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'C’est-à-dire Jérusalem (voir '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Jr 22.3
        metadata:
          usfm: JER.22.3
      - type: text
        text: '). Chaque mot de ce verset peut avoir deux sens différents, si bien que l’ensemble admet une autre traduction : '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'Hélas, la ville illustre et rachetée, la ville colombe ! '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Le prophète joue sans doute sur le double sens.
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Elle ne m’a pas écouté
- type: usfm
  marker: q1
  children:
  - type: text
    text: et n’a pas accepté ╵les avertissements ;
- type: usfm
  marker: q1
  children:
  - type: text
    text: elle n’a pas mis sa confiance ╵en l’Eternel, son Dieu,
- type: usfm
  marker: q1
  children:
  - type: text
    text: elle ne s’est pas approchée de lui.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Ses grands, au milieu d’elle,
- type: usfm
  marker: q1
  children:
  - type: text
    text: sont des lions rugissants,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ses juges sont des loups du soir
- type: usfm
  marker: q1
  children:
  - type: text
    text: qui, au matin, ╵n’ont plus rien à ronger.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Ses prophètes sont insoumis,
- type: usfm
  marker: q1
  children:
  - type: text
    text: portés aux trahisons.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ses prêtres ont souillé ╵le sanctuaire
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '3.4 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Autre traduction : '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: les objets sacrés.
    marker-yv: yv-n
  - type: text
    text: ','
- type: usfm
  marker: q1
  children:
  - type: text
    text: ils ont violé la Loi.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Cependant, l’Eternel ╵est présent dans la ville ╵et il s’y montre juste,
- type: usfm
  marker: q1
  children:
  - type: text
    text: il ne fait rien de mal.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Matin après matin, ╵il rend ses jugements ;
- type: usfm
  marker: q1
  children:
  - type: text
    text: dès l’aube, il ne fait pas défaut.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Cependant, l’homme inique ╵ne connaît pas la honte.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: J’ai éliminé des nations,
- type: usfm
  marker: q1
  children:
  - type: text
    text: démoli leurs tours fortes,
- type: usfm
  marker: q1
  children:
  - type: text
    text: j’ai dévasté leurs rues,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et nul n’y passe plus.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Voilà leurs villes ravagées,
- type: usfm
  marker: q1
  children:
  - type: text
    text: il n’y a plus personne, ╵plus un seul habitant.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Je m’étais dit alors : ╵« Ainsi tu me craindras'
- type: usfm
  marker: q1
  children:
  - type: text
    text: et tu accepteras ╵les avertissements
- type: usfm
  marker: q1
  children:
  - type: text
    text: et, ainsi, ta demeure ╵ne sera pas détruite. »
- type: usfm
  marker: q1
  children:
  - type: text
    text: Que de fois j’ai sévi contre elle !
- type: usfm
  marker: q1
  children:
  - type: text
    text: Mais eux, dès le matin, ╵ils se sont empressés ╵de commettre le mal
- type: usfm
  marker: q1
  children:
  - type: text
    text: dans tout ce qu’ils faisaient.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: C’est pourquoi, attendez,
- type: usfm
  marker: q1
  children:
  - type: text
    text: l’Eternel le déclare,
- type: usfm
  marker: q1
  children:
  - type: text
    text: oui, attendez le jour ╵où je me lèverai ╵comme témoin à charge
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '3.8 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: comme témoin à charge
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: ': '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'en adoptant une vocalisation différente de celle du texte hébreu traditionnel, selon l’ancienne version grecque et la syriaque. Texte traditionnel : '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: pour le butin.
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'puisque j’ai rendu mon arrêt : ╵j’ai décidé ╵de réunir les peuples,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: et de rassembler les royaumes
- type: usfm
  marker: q1
  children:
  - type: text
    text: pour déverser sur eux ╵toute l’ardeur de ma colère
- type: usfm
  marker: q1
  children:
  - type: text
    text: et mon indignation,
- type: usfm
  marker: q1
  children:
  - type: text
    text: car je consumerai ╵le pays tout entier
- type: usfm
  marker: q1
  children:
  - type: text
    text: par le feu de mon amour bafoué
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '3.8 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Voir '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '1.18'
        metadata:
          usfm: ZEP.1.18
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: s1
  children:
  - type: text
    text: Les fruits du jugement
  marker-yv: yv-h
- type: usfm
  marker: s2
  children:
  - type: text
    text: Sur les peuples non israélites
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Puis je transformerai les lèvres ╵de gens d’autres peuples ╵et je les rendrai pures
- type: usfm
  marker: q1
  children:
  - type: text
    text: pour qu’ils invoquent l’Eternel
- type: usfm
  marker: q1
  children:
  - type: text
    text: et qu’ils le servent ╵tous d’un commun accord.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Et d’au-delà des fleuves ╵de l’Ethiopie,
- type: usfm
  marker: q1
  children:
  - type: text
    text: tous mes adorateurs, ╵les hommes que j’ai dispersés, ╵viendront m’apporter des offrandes
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '3.10 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'tous mes adorateurs… des offrandes. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Autre traduction : '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'ils viendront m’apporter en offrande mes adorateurs : les hommes que j’ai dispersés.'
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: s2
  children:
  - type: text
    text: Sur le reste d’Israël
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: En ce jour-là, mon peuple,
- type: usfm
  marker: q1
  children:
  - type: text
    text: tu ne porteras plus la honte ╵à cause des méfaits
- type: usfm
  marker: q1
  children:
  - type: text
    text: que tu as commis contre moi.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Car alors j’ôterai ╵du milieu de tes rangs
- type: usfm
  marker: q1
  children:
  - type: text
    text: ceux qui exultent dans l’orgueil.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Alors tu cesseras ╵de faire l’arrogante ╵sur ma montagne sainte.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Je laisserai ╵vivre au milieu de toi ╵un peuple pauvre, démuni
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '3.12 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Voir v. 19. Autre traduction : '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: un peuple humilié et faible.
    marker-yv: yv-n
  - type: text
    text: ','
- type: usfm
  marker: q1
  children:
  - type: text
    text: qui cherchera refuge ╵en l’Eternel.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Les restes d’Israël ╵ne commettront plus d’injustice,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ils ne diront plus de mensonges,
- type: usfm
  marker: q1
  children:
  - type: text
    text: on n’entendra plus dans leur bouche ╵de langage trompeur,
- type: usfm
  marker: q1
  children:
  - type: text
    text: quand ils paîtront en paix ╵et se reposeront
- type: usfm
  marker: q1
  children:
  - type: text
    text: sans que nul ne les trouble.
- type: usfm
  marker: s2
  children:
  - type: text
    text: Promesses pour Sion
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Pousse des cris de joie, ╵ô communauté de Sion !
- type: usfm
  marker: q1
  children:
  - type: text
    text: Lance un cri de triomphe, ╵ô Israël !
- type: usfm
  marker: q1
  children:
  - type: text
    text: Réjouis-toi, ╵exulte de tout cœur,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ô communauté de Jérusalem !
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: L’Eternel a levé ╵le verdict de condamnation ╵prononcé contre vous,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et il a refoulé ╵vos ennemis.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Le roi d’Israël, l’Eternel, ╵est au milieu de vous.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Vous ne craindrez
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '3.15 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Selon le texte hébreu traditionnel. L’ancienne version grecque a : '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: verrez.
    marker-yv: yv-n
  - type: text
    text: ' plus de malheur.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'En ce jour-là, ╵on dira à Jérusalem :'
- type: usfm
  marker: q1
  children:
  - type: text
    text: « Sois sans crainte, Sion !
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ne baisse pas les bras,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: car l’Eternel ton Dieu ╵est au milieu de toi ╵un guerrier qui te sauve.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Il sera transporté de joie ╵à ton sujet
- type: usfm
  marker: q1
  children:
  - type: text
    text: et il te renouvellera
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '3.17 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: il te renouvellera
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: ': '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'd’après l’ancienne version grecque. Le texte hébreu traditionnel a : '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'il restera silencieux. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: La différence vient de la confusion entre deux lettres hébraïques qui se ressemblent.
    marker-yv: yv-n
  - type: text
    text: ' ╵dans son amour pour toi.'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Oui, il sera dans l’allégresse ╵à ton sujet
- type: usfm
  marker: q1
  children:
  - type: text
    text: et poussera des cris de joie
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: tout comme aux jours de fête
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '3.18 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'D’après l’ancienne version grecque. Le texte hébreu traditionnel a : '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: loin des jours de fête.
    marker-yv: yv-n
  - type: text
    text: . »
- type: usfm
  marker: q1
  children:
  - type: text
    text: Je t’enlève aujourd’hui ╵la honte que tu portes
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '3.18 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: Je t’enlève… tu portes
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: ': '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: sens obtenu en modifiant le découpage des mots et la vocalisation du texte hébreu traditionnel.
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: En ce temps-là,
- type: usfm
  marker: q1
  children:
  - type: text
    text: j’interviendrai contre tous ceux ╵qui t’auront opprimée,
- type: usfm
  marker: q1
  children:
  - type: text
    text: je sauverai ╵les brebis éclopées,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et je rassemblerai ╵celles qu’on a chassées,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et je rendrai mon peuple ╵glorieux et renommé
- type: usfm
  marker: q1
  children:
  - type: text
    text: partout dans tout pays ╵où vous aurez connu la honte.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: En ce temps-là, ╵je vous ramènerai,
- type: usfm
  marker: q1
  children:
  - type: text
    text: oui, quand je vous rassemblerai,
- type: usfm
  marker: q1
  children:
  - type: text
    text: je vous rendrai ╵renommés et glorieux
- type: usfm
  marker: q1
  children:
  - type: text
    text: chez tous les peuples de la terre.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Je le ferai quand, ╵sous vos yeux, ╵moi, je changerai votre sort
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '3.20 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Autre traduction : '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: je ramènerai sous vos yeux ceux d’entre vous qui auront été emmenés en captivité.
    marker-yv: yv-n
  - type: text
    text: ','
- type: usfm
  marker: q1
  children:
  - type: text
    text: l’Eternel le déclare.
