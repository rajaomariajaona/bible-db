document_id: ZEP.3,21
type_code: fra
verses:
  '1':
  - type: heading
    content: Malheur à Jérusalem
  - type: text
    content: Malheur à la rebelle, ╵à la ville souillée,
  - type: text
    content: la ville tyrannique
  - type: note
    content: 'C’est-à-dire Jérusalem (voir Jr 22.3). Chaque mot de ce verset peut avoir deux sens différents, si bien que l’ensemble admet une autre traduction : Hélas, la ville illustre et rachetée, la ville colombe ! Le prophète joue sans doute sur le double sens.'
  - type: text
    content: .
  '10':
  - type: text
    content: Et d’au-delà des fleuves ╵de l’Ethiopie,
  - type: text
    content: tous mes adorateurs, ╵les hommes que j’ai dispersés, ╵viendront m’apporter des offrandes
  - type: note
    content: 'tous mes adorateurs… des offrandes. Autre traduction : ils viendront m’apporter en offrande mes adorateurs : les hommes que j’ai dispersés.'
  - type: text
    content: .
  - type: heading
    content: Sur le reste d’Israël
  '11':
  - type: text
    content: En ce jour-là, mon peuple,
  - type: text
    content: tu ne porteras plus la honte ╵à cause des méfaits
  - type: text
    content: que tu as commis contre moi.
  - type: text
    content: Car alors j’ôterai ╵du milieu de tes rangs
  - type: text
    content: ceux qui exultent dans l’orgueil.
  - type: text
    content: Alors tu cesseras ╵de faire l’arrogante ╵sur ma montagne sainte.
  '12':
  - type: text
    content: Je laisserai ╵vivre au milieu de toi ╵un peuple pauvre, démuni
  - type: note
    content: 'Voir v. 19. Autre traduction : un peuple humilié et faible.'
  - type: text
    content: ','
  - type: text
    content: qui cherchera refuge ╵en l’Eternel.
  '13':
  - type: text
    content: Les restes d’Israël ╵ne commettront plus d’injustice,
  - type: text
    content: ils ne diront plus de mensonges,
  - type: text
    content: on n’entendra plus dans leur bouche ╵de langage trompeur,
  - type: text
    content: quand ils paîtront en paix ╵et se reposeront
  - type: text
    content: sans que nul ne les trouble.
  - type: heading
    content: Promesses pour Sion
  '14':
  - type: text
    content: Pousse des cris de joie, ╵ô communauté de Sion !
  - type: text
    content: Lance un cri de triomphe, ╵ô Israël !
  - type: text
    content: Réjouis-toi, ╵exulte de tout cœur,
  - type: text
    content: ô communauté de Jérusalem !
  '15':
  - type: text
    content: L’Eternel a levé ╵le verdict de condamnation ╵prononcé contre vous,
  - type: text
    content: et il a refoulé ╵vos ennemis.
  - type: text
    content: Le roi d’Israël, l’Eternel, ╵est au milieu de vous.
  - type: text
    content: Vous ne craindrez
  - type: note
    content: 'Selon le texte hébreu traditionnel. L’ancienne version grecque a : verrez.'
  - type: text
    content: ' plus de malheur.'
  '16':
  - type: text
    content: 'En ce jour-là, ╵on dira à Jérusalem :'
  - type: text
    content: « Sois sans crainte, Sion !
  - type: text
    content: Ne baisse pas les bras,
  '17':
  - type: text
    content: car l’Eternel ton Dieu ╵est au milieu de toi ╵un guerrier qui te sauve.
  - type: text
    content: Il sera transporté de joie ╵à ton sujet
  - type: text
    content: et il te renouvellera
  - type: note
    content: 'il te renouvellera: d’après l’ancienne version grecque. Le texte hébreu traditionnel a : il restera silencieux. La différence vient de la confusion entre deux lettres hébraïques qui se ressemblent.'
  - type: text
    content: ' ╵dans son amour pour toi.'
  - type: text
    content: Oui, il sera dans l’allégresse ╵à ton sujet
  - type: text
    content: et poussera des cris de joie
  '18':
  - type: text
    content: tout comme aux jours de fête
  - type: note
    content: 'D’après l’ancienne version grecque. Le texte hébreu traditionnel a : loin des jours de fête.'
  - type: text
    content: . »
  - type: text
    content: Je t’enlève aujourd’hui ╵la honte que tu portes
  - type: note
    content: 'Je t’enlève… tu portes: sens obtenu en modifiant le découpage des mots et la vocalisation du texte hébreu traditionnel.'
  - type: text
    content: .
  '19':
  - type: text
    content: En ce temps-là,
  - type: text
    content: j’interviendrai contre tous ceux ╵qui t’auront opprimée,
  - type: text
    content: je sauverai ╵les brebis éclopées,
  - type: text
    content: et je rassemblerai ╵celles qu’on a chassées,
  - type: text
    content: et je rendrai mon peuple ╵glorieux et renommé
  - type: text
    content: partout dans tout pays ╵où vous aurez connu la honte.
  '2':
  - type: text
    content: Elle ne m’a pas écouté
  - type: text
    content: et n’a pas accepté ╵les avertissements ;
  - type: text
    content: elle n’a pas mis sa confiance ╵en l’Eternel, son Dieu,
  - type: text
    content: elle ne s’est pas approchée de lui.
  '20':
  - type: text
    content: En ce temps-là, ╵je vous ramènerai,
  - type: text
    content: oui, quand je vous rassemblerai,
  - type: text
    content: je vous rendrai ╵renommés et glorieux
  - type: text
    content: chez tous les peuples de la terre.
  - type: text
    content: Je le ferai quand, ╵sous vos yeux, ╵moi, je changerai votre sort
  - type: note
    content: 'Autre traduction : je ramènerai sous vos yeux ceux d’entre vous qui auront été emmenés en captivité.'
  - type: text
    content: ','
  - type: text
    content: l’Eternel le déclare.
  '3':
  - type: text
    content: Ses grands, au milieu d’elle,
  - type: text
    content: sont des lions rugissants,
  - type: text
    content: ses juges sont des loups du soir
  - type: text
    content: qui, au matin, ╵n’ont plus rien à ronger.
  '4':
  - type: text
    content: Ses prophètes sont insoumis,
  - type: text
    content: portés aux trahisons.
  - type: text
    content: Ses prêtres ont souillé ╵le sanctuaire
  - type: note
    content: 'Autre traduction : les objets sacrés.'
  - type: text
    content: ','
  - type: text
    content: ils ont violé la Loi.
  '5':
  - type: text
    content: Cependant, l’Eternel ╵est présent dans la ville ╵et il s’y montre juste,
  - type: text
    content: il ne fait rien de mal.
  - type: text
    content: Matin après matin, ╵il rend ses jugements ;
  - type: text
    content: dès l’aube, il ne fait pas défaut.
  - type: text
    content: Cependant, l’homme inique ╵ne connaît pas la honte.
  '6':
  - type: text
    content: J’ai éliminé des nations,
  - type: text
    content: démoli leurs tours fortes,
  - type: text
    content: j’ai dévasté leurs rues,
  - type: text
    content: et nul n’y passe plus.
  - type: text
    content: Voilà leurs villes ravagées,
  - type: text
    content: il n’y a plus personne, ╵plus un seul habitant.
  '7':
  - type: text
    content: 'Je m’étais dit alors : ╵« Ainsi tu me craindras'
  - type: text
    content: et tu accepteras ╵les avertissements
  - type: text
    content: et, ainsi, ta demeure ╵ne sera pas détruite. »
  - type: text
    content: Que de fois j’ai sévi contre elle !
  - type: text
    content: Mais eux, dès le matin, ╵ils se sont empressés ╵de commettre le mal
  - type: text
    content: dans tout ce qu’ils faisaient.
  '8':
  - type: text
    content: C’est pourquoi, attendez,
  - type: text
    content: l’Eternel le déclare,
  - type: text
    content: oui, attendez le jour ╵où je me lèverai ╵comme témoin à charge
  - type: note
    content: 'comme témoin à charge: en adoptant une vocalisation différente de celle du texte hébreu traditionnel, selon l’ancienne version grecque et la syriaque. Texte traditionnel : pour le butin.'
  - type: text
    content: 'puisque j’ai rendu mon arrêt : ╵j’ai décidé ╵de réunir les peuples,'
  - type: text
    content: et de rassembler les royaumes
  - type: text
    content: pour déverser sur eux ╵toute l’ardeur de ma colère
  - type: text
    content: et mon indignation,
  - type: text
    content: car je consumerai ╵le pays tout entier
  - type: text
    content: par le feu de mon amour bafoué
  - type: note
    content: Voir 1.18.
  - type: text
    content: .
  - type: heading
    content: Les fruits du jugement
  - type: heading
    content: Sur les peuples non israélites
  '9':
  - type: text
    content: Puis je transformerai les lèvres ╵de gens d’autres peuples ╵et je les rendrai pures
  - type: text
    content: pour qu’ils invoquent l’Eternel
  - type: text
    content: et qu’ils le servent ╵tous d’un commun accord.
