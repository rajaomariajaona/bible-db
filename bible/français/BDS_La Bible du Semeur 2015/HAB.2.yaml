document_id: HAB.2
type_code: fra
segments:
- type: usfm
  marker: s2
  children:
  - type: text
    text: Le juste vivra grâce à sa foi
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Je me tiendrai ╵à mon poste de garde,
- type: usfm
  marker: q1
  children:
  - type: text
    text: je resterai debout ╵sur le fort du guetteur
- type: usfm
  marker: q1
  children:
  - type: text
    text: et je guetterai pour savoir ╵ce que Dieu me dira,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ce que je répondrai ╵à ma protestation.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Et l’Eternel me répondit :'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ecris cette révélation,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et grave-la sur les tablettes,
- type: usfm
  marker: q1
  children:
  - type: text
    text: de sorte que chaque lecteur ╵la lise couramment.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Car c’est une révélation ╵qui porte sur un temps fixé,
- type: usfm
  marker: q1
  children:
  - type: text
    text: qui parle de la fin
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '2.3 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Autre traduction : '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: qui aspire à sa fin.
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: text
    text: et n’est pas mensongère.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Si l’Eternel paraît tarder
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '2.3 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Selon la traduction proposée, c’est l’Eternel qu’il faut attendre et qui viendra (voir 3.3 ; Hé 10.37). Pour d’autres, c’est l’accomplissement de la vision. Cité en '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Hé 10.37
        metadata:
          usfm: HEB.10.37
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: ', ╵attends-le patiemment,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: car il vient sûrement,
- type: usfm
  marker: q1
  children:
  - type: text
    text: il ne tardera pas.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Si quelqu’un flanche,
- type: usfm
  marker: q1
  children:
  - type: text
    text: il
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '2.4 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'D’après l’ancienne version grecque. Le texte hébreu traditionnel a : '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'celui qui est orgueilleux, qui… '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: La différence ne tient qu’à l’inversion de deux lettres en hébreu.
    marker-yv: yv-n
  - type: text
    text: ' n’est pas droit de cœur'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '2.4 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'L’ancienne version grecque a : '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'je ne prends pas plaisir en lui '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '(voir '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Hé 10.38
        metadata:
          usfm: HEB.10.38
      - type: text
        text: ).
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: text
    text: mais le juste vivra ╵grâce à sa foi
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '2.4 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Autre traduction : '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'par sa fidélité. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Il est clair cependant que cette fidélité englobe la foi et en découle (2.3 ; 3.2, 16-18). Cité en Rm 1.17 ; Ga 3.11 ; Hé 10.38.
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: s1
  children:
  - type: text
    text: Les cinq malheurs
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: En effet, la richesse décevra
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '2.5 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'D’après un texte hébreu retrouvé à Qumrân. Le texte hébreu traditionnel a : '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: le vin est traître.
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: text
    text: le guerrier orgueilleux, ╵et il ne subsistera pas,
- type: usfm
  marker: q1
  children:
  - type: text
    text: lui qui, tel le séjour des morts, ╵ouvre une large bouche
- type: usfm
  marker: q1
  children:
  - type: text
    text: et qui, comme la mort, ╵n’est jamais rassasié.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Car il ajoute à ses conquêtes ╵nation après nation,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et il rassemble tous les peuples ╵sous sa domination.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Mais, un jour, tous ces peuples ╵lanceront contre lui ╵des proverbes moqueurs
- type: usfm
  marker: q1
  children:
  - type: text
    text: et des paroles ironiques.
- type: usfm
  marker: s2
  children:
  - type: text
    text: Malheur aux accapareurs
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Et l’on dira :'
- type: usfm
  marker: q1
  children:
  - type: text
    text: « Malheur à lui ╵car il amasse des richesses ╵qui ne sont pas à lui.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Jusques à quand ╵cela va-t-il durer ?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Il accumule ╵un lourd fardeau de dettes. »
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Tes créanciers
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '2.7 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Jeu sur le double sens du terme hébreu qui peut aussi signifier : '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: ceux qui te mordent.
    marker-yv: yv-n
  - type: text
    text: ' ╵ne surgiront-ils pas soudain ?'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ils se réveilleront ╵pour te faire trembler
- type: usfm
  marker: q1
  children:
  - type: text
    text: et ils feront de toi leur proie.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Toi qui as dépouillé ╵des peuples innombrables,
- type: usfm
  marker: q1
  children:
  - type: text
    text: tu seras dépouillé ╵par le reste de tous les peuples.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Pour avoir répandu ╵le sang humain,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et pour avoir commis ╵des actes de violence
- type: usfm
  marker: q1
  children:
  - type: text
    text: contre le pays de Juda, ╵sa ville et tous ses habitants
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '2.8 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Autre traduction : '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: contre bien des pays, des villes et tous leurs habitants.
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: s2
  children:
  - type: text
    text: Malheur aux malhonnêtes
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Malheur à qui amasse ╵un profit malhonnête ╵pour toute sa famille,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et cherche ainsi à établir ╵son nid sur les hauteurs
- type: usfm
  marker: q1
  children:
  - type: text
    text: pour le mettre à l’abri ╵de tout malheur.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Oui, c’est le déshonneur ╵de ton propre royaume ╵que tu as préparé.
- type: usfm
  marker: q1
  children:
  - type: text
    text: En détruisant de nombreux peuples,
- type: usfm
  marker: q1
  children:
  - type: text
    text: tu t’es fait du tort à toi-même.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Car, du sein des murailles, ╵les pierres vont crier ;
- type: usfm
  marker: q1
  children:
  - type: text
    text: de la charpente, ╵les poutres leur feront écho.
- type: usfm
  marker: s2
  children:
  - type: text
    text: Malheur aux violents
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Malheur à qui bâtit la ville ╵en répandant le sang,
- type: usfm
  marker: q1
  children:
  - type: text
    text: à qui fonde la cité sur le crime !
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Quand les peuples travaillent ╵pour ce qui périt par le feu,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et quand les nations s’éreintent pour rien
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '2.13 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Voir '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Jr 51.58
        metadata:
          usfm: JER.51.58
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: ','
- type: usfm
  marker: q1
  children:
  - type: text
    text: cela ne vient-il pas de l’Eternel, ╵du Seigneur des armées célestes ?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Car la terre sera remplie
- type: usfm
  marker: q1
  children:
  - type: text
    text: de connaissance ╵de la gloire de l’Eternel
- type: usfm
  marker: q1
  children:
  - type: text
    text: comme les eaux recouvrent ╵le fond des mers
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '2.14 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Reprise de '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Es 11.9
        metadata:
          usfm: ISA.11.9
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: s2
  children:
  - type: text
    text: Malheur à celui qui enivre son prochain
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Malheur à toi ╵qui forces ton prochain à boire
- type: usfm
  marker: q1
  children:
  - type: text
    text: et qui vides ton outre ╵jusqu’à l’ivresse
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '2.15 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'et qui vides… l’ivresse. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Autre traduction : '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: en mêlant ton poison jusqu’à l’ivresse.
    marker-yv: yv-n
  - type: text
    text: ','
- type: usfm
  marker: q1
  children:
  - type: text
    text: pour pouvoir contempler ╵sa nudité.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Toi aussi, tu seras ╵rassasié d’infamie ╵au lieu de gloire.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Toi aussi, tu boiras ╵et puis l’on te mettra à nu
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '2.16 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: l’on te mettra à nu
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: ': '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'selon le texte hébreu traditionnel. Le texte hébreu retrouvé à Qumrân, la version syriaque, la Vulgate et la version grecque d’Aquila ont : '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: tu tituberas.
    marker-yv: yv-n
  - type: text
    text: ' ╵pour découvrir ╵ton incirconcision ;'
- type: usfm
  marker: q1
  children:
  - type: text
    text: ton tour viendra de boire ╵la coupe de colère
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '2.16 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Voir '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Jr 25.15-29
        metadata:
          usfm: JER.25.15+JER.25.16+JER.25.17+JER.25.18+JER.25.19+JER.25.20+JER.25.21+JER.25.22+JER.25.23+JER.25.24+JER.25.25+JER.25.26+JER.25.27+JER.25.28+JER.25.29
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: ' ╵que l’Eternel ╵te tendra de sa droite.'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Le déshonneur ╵recouvrira ta gloire.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Tu seras submergé ╵par la violence ╵que tu as exercée ╵contre la forêt du Liban
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '2.17 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Voir '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Es 14.8
        metadata:
          usfm: ISA.14.8
      - type: text
        text: '. Autre traduction : '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'contre le palais de la Forêt-du-Liban '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '(voir '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1 R 7.2
        metadata:
          usfm: 1KI.7.2
      - type: text
        text: ', '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '7'
        metadata:
          usfm: 1KI.7.7
      - type: text
        text: ).
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: q1
  children:
  - type: text
    text: Le massacre des animaux ╵retombera sur toi
- type: usfm
  marker: q1
  children:
  - type: text
    text: pour t’écraser ;
- type: usfm
  marker: q1
  children:
  - type: text
    text: car tu as répandu ╵le sang humain,
- type: usfm
  marker: q1
  children:
  - type: text
    text: tu as commis ╵des actes de violence ╵contre le pays de Juda,
- type: usfm
  marker: q1
  children:
  - type: text
    text: sa ville et tous ses habitants
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '2.17 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Voir v. 8 et note.
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: s2
  children:
  - type: text
    text: Malheur aux idolâtres
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: A quoi sert une idole
- type: usfm
  marker: q1
  children:
  - type: text
    text: sculptée par l’artisan ?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ou une statue de métal fondu,
- type: usfm
  marker: q1
  children:
  - type: text
    text: qui n’enseigne que le mensonge ?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Car celui qui l’a faite ╵se confie en son œuvre
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'pour fabriquer ╵une idole muette :'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'oui, malheur à qui dit ╵à un morceau de bois : ╵« Réveille-toi ! »,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'à la pierre muette : ╵« Allons, sors du sommeil ! »'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Peuvent-ils enseigner ?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Voici, ils sont plaqués ╵d’or et d’argent,
- type: usfm
  marker: q1
  children:
  - type: text
    text: mais il n’y a en eux ╵aucun souffle de vie.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: L’Eternel, lui, ╵se tient dans son saint Temple.
- type: usfm
  marker: q1
  children:
  - type: text
