document_id: HAB.2,21
type_code: fra
verses:
  '1':
  - type: heading
    content: Le juste vivra grâce à sa foi
  - type: text
    content: Je me tiendrai ╵à mon poste de garde,
  - type: text
    content: je resterai debout ╵sur le fort du guetteur
  - type: text
    content: et je guetterai pour savoir ╵ce que Dieu me dira,
  - type: text
    content: ce que je répondrai ╵à ma protestation.
  '10':
  - type: text
    content: Oui, c’est le déshonneur ╵de ton propre royaume ╵que tu as préparé.
  - type: text
    content: En détruisant de nombreux peuples,
  - type: text
    content: tu t’es fait du tort à toi-même.
  '11':
  - type: text
    content: Car, du sein des murailles, ╵les pierres vont crier ;
  - type: text
    content: de la charpente, ╵les poutres leur feront écho.
  - type: heading
    content: Malheur aux violents
  '12':
  - type: text
    content: Malheur à qui bâtit la ville ╵en répandant le sang,
  - type: text
    content: à qui fonde la cité sur le crime !
  '13':
  - type: text
    content: Quand les peuples travaillent ╵pour ce qui périt par le feu,
  - type: text
    content: et quand les nations s’éreintent pour rien
  - type: note
    content: Voir Jr 51.58.
  - type: text
    content: ','
  - type: text
    content: cela ne vient-il pas de l’Eternel, ╵du Seigneur des armées célestes ?
  '14':
  - type: text
    content: Car la terre sera remplie
  - type: text
    content: de connaissance ╵de la gloire de l’Eternel
  - type: text
    content: comme les eaux recouvrent ╵le fond des mers
  - type: note
    content: Reprise de Es 11.9.
  - type: text
    content: .
  - type: heading
    content: Malheur à celui qui enivre son prochain
  '15':
  - type: text
    content: Malheur à toi ╵qui forces ton prochain à boire
  - type: text
    content: et qui vides ton outre ╵jusqu’à l’ivresse
  - type: note
    content: 'et qui vides… l’ivresse. Autre traduction : en mêlant ton poison jusqu’à l’ivresse.'
  - type: text
    content: ','
  - type: text
    content: pour pouvoir contempler ╵sa nudité.
  '16':
  - type: text
    content: Toi aussi, tu seras ╵rassasié d’infamie ╵au lieu de gloire.
  - type: text
    content: Toi aussi, tu boiras ╵et puis l’on te mettra à nu
  - type: note
    content: 'l’on te mettra à nu: selon le texte hébreu traditionnel. Le texte hébreu retrouvé à Qumrân, la version syriaque, la Vulgate et la version grecque d’Aquila ont : tu tituberas.'
  - type: text
    content: ' ╵pour découvrir ╵ton incirconcision ;'
  - type: text
    content: ton tour viendra de boire ╵la coupe de colère
  - type: note
    content: Voir Jr 25.15-29.
  - type: text
    content: ' ╵que l’Eternel ╵te tendra de sa droite.'
  - type: text
    content: Le déshonneur ╵recouvrira ta gloire.
  '17':
  - type: text
    content: Tu seras submergé ╵par la violence ╵que tu as exercée ╵contre la forêt du Liban
  - type: note
    content: 'Voir Es 14.8. Autre traduction : contre le palais de la Forêt-du-Liban (voir 1 R 7.2, 7).'
  - type: text
    content: .
  - type: text
    content: Le massacre des animaux ╵retombera sur toi
  - type: text
    content: pour t’écraser ;
  - type: text
    content: car tu as répandu ╵le sang humain,
  - type: text
    content: tu as commis ╵des actes de violence ╵contre le pays de Juda,
  - type: text
    content: sa ville et tous ses habitants
  - type: note
    content: Voir v. 8 et note.
  - type: text
    content: .
  - type: heading
    content: Malheur aux idolâtres
  '18':
  - type: text
    content: A quoi sert une idole
  - type: text
    content: sculptée par l’artisan ?
  - type: text
    content: Ou une statue de métal fondu,
  - type: text
    content: qui n’enseigne que le mensonge ?
  - type: text
    content: Car celui qui l’a faite ╵se confie en son œuvre
  - type: text
    content: 'pour fabriquer ╵une idole muette :'
  '19':
  - type: text
    content: 'oui, malheur à qui dit ╵à un morceau de bois : ╵« Réveille-toi ! »,'
  - type: text
    content: 'à la pierre muette : ╵« Allons, sors du sommeil ! »'
  - type: text
    content: Peuvent-ils enseigner ?
  - type: text
    content: Voici, ils sont plaqués ╵d’or et d’argent,
  - type: text
    content: mais il n’y a en eux ╵aucun souffle de vie.
  '2':
  - type: text
    content: 'Et l’Eternel me répondit :'
  - type: text
    content: Ecris cette révélation,
  - type: text
    content: et grave-la sur les tablettes,
  - type: text
    content: de sorte que chaque lecteur ╵la lise couramment.
  '20':
  - type: text
    content: L’Eternel, lui, ╵se tient dans son saint Temple.
  - type: text
    content: Que le monde entier fasse ╵silence devant lui !
  '3':
  - type: text
    content: Car c’est une révélation ╵qui porte sur un temps fixé,
  - type: text
    content: qui parle de la fin
  - type: note
    content: 'Autre traduction : qui aspire à sa fin.'
  - type: text
    content: et n’est pas mensongère.
  - type: text
    content: Si l’Eternel paraît tarder
  - type: note
    content: Selon la traduction proposée, c’est l’Eternel qu’il faut attendre et qui viendra (voir 3.3 ; Hé 10.37). Pour d’autres, c’est l’accomplissement de la vision. Cité en Hé 10.37.
  - type: text
    content: ', ╵attends-le patiemment,'
  - type: text
    content: car il vient sûrement,
  - type: text
    content: il ne tardera pas.
  '4':
  - type: text
    content: Si quelqu’un flanche,
  - type: text
    content: il
  - type: note
    content: 'D’après l’ancienne version grecque. Le texte hébreu traditionnel a : celui qui est orgueilleux, qui… La différence ne tient qu’à l’inversion de deux lettres en hébreu.'
  - type: text
    content: ' n’est pas droit de cœur'
  - type: note
    content: 'L’ancienne version grecque a : je ne prends pas plaisir en lui (voir Hé 10.38).'
  - type: text
    content: mais le juste vivra ╵grâce à sa foi
  - type: note
    content: 'Autre traduction : par sa fidélité. Il est clair cependant que cette fidélité englobe la foi et en découle (2.3 ; 3.2, 16-18). Cité en Rm 1.17 ; Ga 3.11 ; Hé 10.38.'
  - type: text
    content: .
  - type: heading
    content: Les cinq malheurs
  '5':
  - type: text
    content: En effet, la richesse décevra
  - type: note
    content: 'D’après un texte hébreu retrouvé à Qumrân. Le texte hébreu traditionnel a : le vin est traître.'
  - type: text
    content: le guerrier orgueilleux, ╵et il ne subsistera pas,
  - type: text
    content: lui qui, tel le séjour des morts, ╵ouvre une large bouche
  - type: text
    content: et qui, comme la mort, ╵n’est jamais rassasié.
  - type: text
    content: Car il ajoute à ses conquêtes ╵nation après nation,
  - type: text
    content: et il rassemble tous les peuples ╵sous sa domination.
  '6':
  - type: text
    content: Mais, un jour, tous ces peuples ╵lanceront contre lui ╵des proverbes moqueurs
  - type: text
    content: et des paroles ironiques.
  - type: heading
    content: Malheur aux accapareurs
  - type: text
    content: 'Et l’on dira :'
  - type: text
    content: « Malheur à lui ╵car il amasse des richesses ╵qui ne sont pas à lui.
  - type: text
    content: Jusques à quand ╵cela va-t-il durer ?
  - type: text
    content: Il accumule ╵un lourd fardeau de dettes. »
  '7':
  - type: text
    content: Tes créanciers
  - type: note
    content: 'Jeu sur le double sens du terme hébreu qui peut aussi signifier : ceux qui te mordent.'
  - type: text
    content: ' ╵ne surgiront-ils pas soudain ?'
  - type: text
    content: Ils se réveilleront ╵pour te faire trembler
  - type: text
    content: et ils feront de toi leur proie.
  '8':
  - type: text
    content: Toi qui as dépouillé ╵des peuples innombrables,
  - type: text
    content: tu seras dépouillé ╵par le reste de tous les peuples.
  - type: text
    content: Pour avoir répandu ╵le sang humain,
  - type: text
    content: et pour avoir commis ╵des actes de violence
  - type: text
    content: contre le pays de Juda, ╵sa ville et tous ses habitants
  - type: note
    content: 'Autre traduction : contre bien des pays, des villes et tous leurs habitants.'
  - type: text
    content: .
  - type: heading
    content: Malheur aux malhonnêtes
  '9':
  - type: text
    content: Malheur à qui amasse ╵un profit malhonnête ╵pour toute sa famille,
  - type: text
    content: et cherche ainsi à établir ╵son nid sur les hauteurs
  - type: text
    content: pour le mettre à l’abri ╵de tout malheur.
