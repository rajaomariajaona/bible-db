document_id: 1SA.13,21
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Israël se révolte contre les Philistins
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: Saül était âgé de [trente] ans à son avènement et il régna [quarante-]deux ans sur Israël
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '13.1 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Les mots entre crochets manquent dans le texte hébreu traditionnel. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'Trente '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'est rajouté d’après certains manuscrits de l’ancienne version grecque, et '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'quarante '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'd’après '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: Ac 13.21
        - type: text
          text: '. On pourrait aussi comprendre : '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'quand il eut régné deux ans, '
      - type: usfm
        marker: fv
        children:
        - type: text
          text: '2 '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: il sélectionna…
      marker-yv: yv-n
    - type: text
      text: '. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Au moment où il achevait de l’offrir, Samuel arriva. Saül alla à sa rencontre pour le saluer. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Samuel lui demanda : Qu’as-tu fait ?'
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Saül répondit : Quand j’ai vu que mes soldats se dispersaient loin de moi, que tu n’arrivais pas au rendez-vous fixé et que les Philistins étaient concentrés à Mikmas, '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'je me suis dit : « Les Philistins vont tomber sur moi à Guilgal avant que j’aie pu implorer l’Eternel. » Alors je me suis fait violence et j’ai offert l’holocauste.'
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Samuel dit à Saül : Tu as agi comme un insensé. Tu n’as pas obéi au commandement que l’Eternel ton Dieu t’avait donné. Si tu l’avais fait, l’Eternel aurait affermi ton autorité royale sur Israël et il aurait fait en sorte que tes descendants y gardent pour toujours la royauté. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Mais puisque tu as désobéi aux ordres de l’Eternel, ta royauté ne subsistera pas. L’Eternel a décidé de se chercher un homme qui corresponde à ses désirs et de l’établir chef de son peuple
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '13.14 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Voir '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: Ac 13.22
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: .
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Puis Samuel le quitta et monta de Guilgal à Guibéa de Benjamin. Saül dénombra la troupe qui se trouvait avec lui : il lui restait environ six cents hommes'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '13.15 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'L’ancienne version grecque et deux manuscrits de l’ancienne version latine ont : '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: Samuel s’en alla de Guilgal. Le reste du peuple quitta Guilgal et suivit Saül pour aller rejoindre l’armée, à Guibéa de Benjamin.
      marker-yv: yv-n
    - type: text
      text: .
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Les armées prennent position
    marker-yv: yv-h
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Saül et son fils Jonathan avaient pris position à Guéba de Benjamin avec les gens qui leur restaient, tandis que les Philistins campaient à Mikmas. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Une troupe de destructeurs sortit des camps des Philistins et se divisa en trois compagnies ; l’une d’elles prit la direction d’Ophra dans le pays de Shoual
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '13.17 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: A l’est de Béthel, donc du côté de Mikmas.
      marker-yv: yv-n
    - type: text
      text: ', '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: la deuxième se dirigea vers Beth-Horôn
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '13.18 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'A l’ouest de Mikmas (voir '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: Jos 16.3
        - type: text
          text: ', '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: '5'
        - type: text
          text: ).
      marker-yv: yv-n
    - type: text
      text: ' et la troisième monta sur les hauteurs par le chemin de la frontière qui domine la vallée de Tseboïm'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '13.18 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Au sud-est de Mikmas.
      marker-yv: yv-n
    - type: text
      text: ' du côté du désert.'
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'A cette époque, il n’y avait pas de forgeron dans tout le pays d’Israël, car les Philistins avaient voulu empêcher que les Hébreux fabriquent des épées et des lances. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Il sélectionna trois mille soldats d’Israël, deux mille pour rester avec lui à Mikmas
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '13.2 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Située à 12 kilomètres au nord de Jérusalem, sur une chaîne de collines s’étendant au nord-ouest jusqu’à Béthel, ce qui explique la suite du verset. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'Guibéa '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: se trouvait au sud-ouest.
      marker-yv: yv-n
    - type: text
      text: ' et dans la région montagneuse de Béthel, et mille qu’il plaça sous les ordres de son fils Jonathan à Guibéa de Benjamin. Les autres soldats furent renvoyés dans leurs foyers.'
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Tous les Israélites devaient donc se rendre chez les Philistins pour faire affûter leurs socs de charrue, leurs pioches, leurs haches, leurs bêches '
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'lorsque leurs bêches, leurs pioches, leurs tridents et leurs haches étaient émoussés, ainsi que pour redresser leurs aiguillons. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: C’est pourquoi, le jour de la bataille, les hommes qui étaient avec Saül et Jonathan n’avaient ni épée ni lance ; seuls Saül et son fils Jonathan en possédaient
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '13.22 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Les Israélites combattaient avec des arcs, des flèches et des frondes.
      marker-yv: yv-n
    - type: text
      text: '. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Un avant-poste philistin vint prendre position au défilé de Mikmas
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '13.23 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Un défilé étroit au nord de Guibéa où se trouvaient les rochers escarpés mentionnés en '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: 14.4-5
        - type: text
          text: ' qui formaient des observatoires naturels.'
      marker-yv: yv-n
    - type: text
      text: .
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Jonathan abattit la stèle dressée par les Philistins à Guéba
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '13.3 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'L’ancienne version grecque a : '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: Guibéa.
      marker-yv: yv-n
    - type: text
      text: '. Alors se répandit rapidement parmi les Philistins la nouvelle que les Hébreux s’étaient révoltés. Saül fit annoncer la chose au son du cor dans tout le pays : Que les Hébreux le sachent !'
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Tout Israël apprit que Saül avait abattu la stèle des Philistins, et qu’Israël s’était ainsi rendu odieux aux Philistins.
  - type: usfm
    marker: p
    children:
    - type: text
      text: Tout le peuple se rassembla donc à Guilgal
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '13.4 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Lieu de rassemblement convenu avec Samuel (
        - type: usfm
          marker: ref
          children:
          - type: text
            text: '10.8'
        - type: text
          text: '). Voir '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: Jos 9.6
        - type: text
          text: ' et note '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: 1 S 10.8
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: ' pour aller combattre avec Saül.'
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Les Philistins mobilisèrent leurs troupes pour combattre Israël. Ils avaient trois mille chars
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '13.5 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'D’après certains manuscrits de l’ancienne version grecque et la version syriaque. Le texte hébreu traditionnel a : '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: trente mille chars.
      marker-yv: yv-n
    - type: text
      text: ' de guerre et six mille soldats sur char, ainsi qu’une multitude de fantassins, nombreux comme les grains de sable des mers. Ils allèrent prendre position à Mikmas à l’est de Beth-Aven. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Les hommes d’Israël virent qu’ils étaient dans une situation extrêmement critique, car ils étaient serrés de près par l’ennemi. Ils se cachèrent dans les grottes, les buissons, les cavernes, les souterrains et les citernes. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Certains Hébreux franchirent le Jourdain et se réfugièrent dans le territoire de Gad et de Galaad. Pendant ce temps, Saül était toujours à Guilgal, au milieu de son armée qui tremblait d’épouvante. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Il attendit sept jours le rendez-vous fixé par Samuel
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '13.8 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Voir '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: '10.8'
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: . Celui-ci n’arrivant pas, les soldats commencèrent à abandonner Saül et à se disperser.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: La faute de Saül
    marker-yv: yv-h
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Alors Saül dit : Amenez-moi les bêtes de l’holocauste et des sacrifices de communion.'
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Et il offrit lui-même l’holocauste. '
