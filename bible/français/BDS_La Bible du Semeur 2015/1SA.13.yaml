document_id: 1SA.13,21
type_code: fra
verses:
  '1':
  - type: heading
    content: Israël se révolte contre les Philistins
  - type: text
    content: Saül était âgé de [trente] ans à son avènement et il régna [quarante-]deux ans sur Israël
  - type: note
    content: 'Les mots entre crochets manquent dans le texte hébreu traditionnel. Trente est rajouté d’après certains manuscrits de l’ancienne version grecque, et quarante d’après Ac 13.21. On pourrait aussi comprendre : quand il eut régné deux ans, 2 il sélectionna…'
  - type: text
    content: '. '
  '10':
  - type: text
    content: 'Au moment où il achevait de l’offrir, Samuel arriva. Saül alla à sa rencontre pour le saluer. '
  '11':
  - type: text
    content: 'Samuel lui demanda : Qu’as-tu fait ?'
  - type: text
    content: 'Saül répondit : Quand j’ai vu que mes soldats se dispersaient loin de moi, que tu n’arrivais pas au rendez-vous fixé et que les Philistins étaient concentrés à Mikmas, '
  '12':
  - type: text
    content: 'je me suis dit : « Les Philistins vont tomber sur moi à Guilgal avant que j’aie pu implorer l’Eternel. » Alors je me suis fait violence et j’ai offert l’holocauste.'
  '13':
  - type: text
    content: 'Samuel dit à Saül : Tu as agi comme un insensé. Tu n’as pas obéi au commandement que l’Eternel ton Dieu t’avait donné. Si tu l’avais fait, l’Eternel aurait affermi ton autorité royale sur Israël et il aurait fait en sorte que tes descendants y gardent pour toujours la royauté. '
  '14':
  - type: text
    content: Mais puisque tu as désobéi aux ordres de l’Eternel, ta royauté ne subsistera pas. L’Eternel a décidé de se chercher un homme qui corresponde à ses désirs et de l’établir chef de son peuple
  - type: note
    content: Voir Ac 13.22.
  - type: text
    content: .
  '15':
  - type: text
    content: 'Puis Samuel le quitta et monta de Guilgal à Guibéa de Benjamin. Saül dénombra la troupe qui se trouvait avec lui : il lui restait environ six cents hommes'
  - type: note
    content: 'L’ancienne version grecque et deux manuscrits de l’ancienne version latine ont : Samuel s’en alla de Guilgal. Le reste du peuple quitta Guilgal et suivit Saül pour aller rejoindre l’armée, à Guibéa de Benjamin.'
  - type: text
    content: .
  - type: heading
    content: Les armées prennent position
  '16':
  - type: text
    content: 'Saül et son fils Jonathan avaient pris position à Guéba de Benjamin avec les gens qui leur restaient, tandis que les Philistins campaient à Mikmas. '
  '17':
  - type: text
    content: Une troupe de destructeurs sortit des camps des Philistins et se divisa en trois compagnies ; l’une d’elles prit la direction d’Ophra dans le pays de Shoual
  - type: note
    content: A l’est de Béthel, donc du côté de Mikmas.
  - type: text
    content: ', '
  '18':
  - type: text
    content: la deuxième se dirigea vers Beth-Horôn
  - type: note
    content: A l’ouest de Mikmas (voir Jos 16.3, 5).
  - type: text
    content: ' et la troisième monta sur les hauteurs par le chemin de la frontière qui domine la vallée de Tseboïm'
  - type: note
    content: Au sud-est de Mikmas.
  - type: text
    content: ' du côté du désert.'
  '19':
  - type: text
    content: 'A cette époque, il n’y avait pas de forgeron dans tout le pays d’Israël, car les Philistins avaient voulu empêcher que les Hébreux fabriquent des épées et des lances. '
  '2':
  - type: text
    content: Il sélectionna trois mille soldats d’Israël, deux mille pour rester avec lui à Mikmas
  - type: note
    content: Située à 12 kilomètres au nord de Jérusalem, sur une chaîne de collines s’étendant au nord-ouest jusqu’à Béthel, ce qui explique la suite du verset. Guibéa se trouvait au sud-ouest.
  - type: text
    content: ' et dans la région montagneuse de Béthel, et mille qu’il plaça sous les ordres de son fils Jonathan à Guibéa de Benjamin. Les autres soldats furent renvoyés dans leurs foyers.'
  '20':
  - type: text
    content: 'Tous les Israélites devaient donc se rendre chez les Philistins pour faire affûter leurs socs de charrue, leurs pioches, leurs haches, leurs bêches '
  '21':
  - type: text
    content: 'lorsque leurs bêches, leurs pioches, leurs tridents et leurs haches étaient émoussés, ainsi que pour redresser leurs aiguillons. '
  '22':
  - type: text
    content: C’est pourquoi, le jour de la bataille, les hommes qui étaient avec Saül et Jonathan n’avaient ni épée ni lance ; seuls Saül et son fils Jonathan en possédaient
  - type: note
    content: Les Israélites combattaient avec des arcs, des flèches et des frondes.
  - type: text
    content: '. '
  '23':
  - type: text
    content: Un avant-poste philistin vint prendre position au défilé de Mikmas
  - type: note
    content: Un défilé étroit au nord de Guibéa où se trouvaient les rochers escarpés mentionnés en 14.4-5 qui formaient des observatoires naturels.
  - type: text
    content: .
  '3':
  - type: text
    content: Jonathan abattit la stèle dressée par les Philistins à Guéba
  - type: note
    content: 'L’ancienne version grecque a : Guibéa.'
  - type: text
    content: '. Alors se répandit rapidement parmi les Philistins la nouvelle que les Hébreux s’étaient révoltés. Saül fit annoncer la chose au son du cor dans tout le pays : Que les Hébreux le sachent !'
  '4':
  - type: text
    content: Tout Israël apprit que Saül avait abattu la stèle des Philistins, et qu’Israël s’était ainsi rendu odieux aux Philistins.
  - type: text
    content: Tout le peuple se rassembla donc à Guilgal
  - type: note
    content: Lieu de rassemblement convenu avec Samuel (10.8). Voir Jos 9.6 et note 1 S 10.8.
  - type: text
    content: ' pour aller combattre avec Saül.'
  '5':
  - type: text
    content: Les Philistins mobilisèrent leurs troupes pour combattre Israël. Ils avaient trois mille chars
  - type: note
    content: 'D’après certains manuscrits de l’ancienne version grecque et la version syriaque. Le texte hébreu traditionnel a : trente mille chars.'
  - type: text
    content: ' de guerre et six mille soldats sur char, ainsi qu’une multitude de fantassins, nombreux comme les grains de sable des mers. Ils allèrent prendre position à Mikmas à l’est de Beth-Aven. '
  '6':
  - type: text
    content: 'Les hommes d’Israël virent qu’ils étaient dans une situation extrêmement critique, car ils étaient serrés de près par l’ennemi. Ils se cachèrent dans les grottes, les buissons, les cavernes, les souterrains et les citernes. '
  '7':
  - type: text
    content: 'Certains Hébreux franchirent le Jourdain et se réfugièrent dans le territoire de Gad et de Galaad. Pendant ce temps, Saül était toujours à Guilgal, au milieu de son armée qui tremblait d’épouvante. '
  '8':
  - type: text
    content: Il attendit sept jours le rendez-vous fixé par Samuel
  - type: note
    content: Voir 10.8.
  - type: text
    content: . Celui-ci n’arrivant pas, les soldats commencèrent à abandonner Saül et à se disperser.
  - type: heading
    content: La faute de Saül
  '9':
  - type: text
    content: 'Alors Saül dit : Amenez-moi les bêtes de l’holocauste et des sacrifices de communion.'
  - type: text
    content: 'Et il offrit lui-même l’holocauste. '
