document_id: JER.30
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: La restauration du peuple
  marker-yv: yv-h
- type: usfm
  marker: s2
  children:
  - type: text
    text: L’Eternel délivrera
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Message que l’Eternel communiqua à Jérémie :'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Voici ce que déclare l’Eternel, Dieu d’Israël : Consigne par écrit dans un livre tout ce que je t’ai dit. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Car voici le temps vient, dit l’Eternel, où je ramènerai les captifs
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '30.3 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Autre traduction : '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: je changerai le sort.
    marker-yv: yv-n
  - type: text
    text: ' de mon peuple Israël et Juda – c’est l’Eternel qui le déclare. Je les ramènerai dans le pays que j’ai donné à leurs ancêtres et ils le posséderont.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Voici ce que l’Eternel a dit au sujet d’Israël et de Juda :'
- type: usfm
  marker: s2
  children:
  - type: text
    text: L’Eternel guérira
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Voici ce que déclare l’Eternel :'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Nous avons entendu ╵des cris d’effroi ;
- type: usfm
  marker: q1
  children:
  - type: text
    text: c’est l’épouvante et non la paix.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Demandez et voyez : ╵les hommes peuvent-ils ╵à présent enfanter ?'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Pourquoi voit-on partout ╵des soldats qui se tiennent ╵les mains collées aux reins,
- type: usfm
  marker: q1
  children:
  - type: text
    text: comme des femmes ╵sur le point d’accoucher ?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Pourquoi ces visages défaits, livides ?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Malheur ! Quel jour terrible !
- type: usfm
  marker: q1
  children:
  - type: text
    text: Il n’y en a pas d’autre ╵semblable à celui-là !
- type: usfm
  marker: q1
  children:
  - type: text
    text: C’est un temps de détresse ╵pour les descendants de Jacob,
- type: usfm
  marker: q1
  children:
  - type: text
    text: mais ils en seront délivrés.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Voici ce que déclare l’Eternel, ╵le Seigneur des armées célestes : ╵En ce temps-là,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: je briserai le joug ╵pesant sur leurs épaules,
- type: usfm
  marker: q1
  children:
  - type: text
    text: j’arracherai leurs liens
- type: usfm
  marker: q1
  children:
  - type: text
    text: et ils ne seront plus ╵esclaves d’étrangers.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Ils seront serviteurs ╵de l’Eternel leur Dieu,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et de David, leur roi, ╵que je leur donnerai.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Et toi, Jacob mon serviteur,
- type: usfm
  marker: q1
  children:
  - type: text
    text: sois donc sans crainte,
- type: usfm
  marker: q1
  children:
  - type: text
    text: déclare l’Eternel,
- type: usfm
  marker: q1
  children:
  - type: text
    text: non, n’aie pas peur, ╵ô Israël !
- type: usfm
  marker: q1
  children:
  - type: text
    text: Car moi, je vais te délivrer, ╵de la terre lointaine,
- type: usfm
  marker: q1
  children:
  - type: text
    text: toi et tes descendants, ╵du pays de l’exil.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Oui, Jacob reviendra, ╵il jouira de la tranquillité ╵et d’une vie paisible ;
- type: usfm
  marker: q1
  children:
  - type: text
    text: personne ne l’inquiétera
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '30.10 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Les v. 10-11 ont leur parallèle en '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 46.27-28
        metadata:
          usfm: JER.46.27+JER.46.28
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Car je suis avec toi,
- type: usfm
  marker: q1
  children:
  - type: text
    text: l’Eternel le déclare,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et je te sauverai.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Je ferai table rase ╵de tous les peuples
- type: usfm
  marker: q1
  children:
  - type: text
    text: chez lesquels je t’ai dispersé.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Mais je ne ferai pas ╵table rase de toi.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Cependant, je te châtierai ╵selon ce qui est juste,
- type: usfm
  marker: q1
  children:
  - type: text
    text: je ne te laisserai ╵certainement pas impuni.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Car voici ce que l’Eternel déclare :'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ta plaie est incurable,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ta blessure est très douloureuse,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: et il n’y a personne ╵qui prenne en main ta cause,
- type: usfm
  marker: q1
  children:
  - type: text
    text: il ne se trouve aucun remède ╵pour ton ulcère,
- type: usfm
  marker: q1
  children:
  - type: text
    text: il n’y a pas pour toi ╵de guérison.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Tous tes amants
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '30.14 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'C’est-à-dire les alliés de Jérusalem (voir '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '22.20'
        metadata:
          usfm: JER.22.20
      - type: text
        text: ).
    marker-yv: yv-n
  - type: text
    text: ', Jérusalem, ╵t’ont oubliée :'
- type: usfm
  marker: q1
  children:
  - type: text
    text: ils ne se soucient pas de toi
- type: usfm
  marker: q1
  children:
  - type: text
    text: car je t’ai accablée de coups ╵comme ferait un ennemi.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Je t’ai cruellement châtiée
- type: usfm
  marker: q1
  children:
  - type: text
    text: car ton crime est énorme
- type: usfm
  marker: q1
  children:
  - type: text
    text: et tes fautes nombreuses.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Pourquoi te plains-tu donc ╵de ta blessure,
- type: usfm
  marker: q1
  children:
  - type: text
    text: de ce que ta douleur ╵soit si aiguë ?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Je te l’ai infligée
- type: usfm
  marker: q1
  children:
  - type: text
    text: pour tes crimes énormes
- type: usfm
  marker: q1
  children:
  - type: text
    text: et tes fautes nombreuses.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Mais ceux qui te dévorent ╵seront tous dévorés ;
- type: usfm
  marker: q1
  children:
  - type: text
    text: et tous tes oppresseurs ╵s’en iront en exil.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ceux qui t’auront pillée ╵seront pillés eux-mêmes,
- type: usfm
  marker: q1
  children:
  - type: text
    text: oui, ceux qui t’auront dépouillée ╵seront à leur tour dépouillés.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Car je ferai venir ta guérison,
- type: usfm
  marker: q1
  children:
  - type: text
    text: je soignerai tes plaies,
- type: usfm
  marker: q1
  children:
  - type: text
    text: l’Eternel le déclare,
- type: usfm
  marker: q1
  children:
  - type: text
    text: toi qu’on appelle « Rejetée »,
- type: usfm
  marker: q1
  children:
  - type: text
    text: « Sion dont nul ne se soucie ».
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Voici ce que déclare l’Eternel :'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Moi, je vais restaurer ╵les habitations de Jacob,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et j’aurai compassion ╵de toutes ses demeures ;
- type: usfm
  marker: q1
  children:
  - type: text
    text: la ville sera rebâtie ╵sur ses décombres,
- type: usfm
  marker: q1
  children:
  - type: text
    text: le palais sera restauré ╵sur son emplacement.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Du milieu d’eux s’élèveront ╵des accents de reconnaissance,
- type: usfm
  marker: q1
  children:
  - type: text
    text: on entendra des rires.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Je les multiplierai,
- type: usfm
  marker: q1
  children:
  - type: text
    text: leur nombre ne décroîtra plus ;
- type: usfm
  marker: q1
  children:
  - type: text
    text: je les honorerai,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ils ne seront plus méprisés.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Ceux qui descendent de Jacob ╵seront comme autrefois
- type: usfm
  marker: q1
  children:
  - type: text
    text: et leur communauté ╵devant moi sera stable ;
- type: usfm
  marker: q1
  children:
  - type: text
    text: je punirai ╵tous ceux qui les oppriment.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Leur chef sera l’un d’eux,
- type: usfm
  marker: q1
  children:
  - type: text
    text: leur souverain ╵sortira de leurs rangs.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Je le ferai venir
- type: usfm
  marker: q1
  children:
  - type: text
    text: et il s’approchera de moi ;
- type: usfm
  marker: q1
  children:
  - type: text
    text: autrement, qui aurait l’audace
- type: usfm
  marker: q1
  children:
  - type: text
    text: de s’approcher de moi ?
- type: usfm
  marker: q1
  children:
  - type: text
    text: demande l’Eternel.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: Vous, vous serez mon peuple,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et moi, je serai votre Dieu.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Reconstruction
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: Voici que la tempête ╵de l’Eternel se lève,
- type: usfm
  marker: q1
  children:
  - type: text
    text: sa fureur se déchaîne,
- type: usfm
  marker: q1
  children:
  - type: text
    text: l’orage tourbillonne,
- type: usfm
  marker: q1
  children:
  - type: text
    text: il se déverse sur la tête ╵de ceux qui font le mal
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '30.23 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Les v. 23-24 ont leur parallèle en '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 23.19-20
        metadata:
          usfm: JER.23.19+JER.23.20
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: La colère de l’Eternel ╵ne se calmera pas
- type: usfm
  marker: q1
  children:
  - type: text
    text: avant qu’il ait agi ╵et qu’il ait accompli
- type: usfm
  marker: q1
  children:
  - type: text
    text: les desseins de son cœur.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Dans les jours à venir, ╵vous vous en rendrez compte.
