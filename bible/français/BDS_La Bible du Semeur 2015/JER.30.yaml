document_id: JER.30,21
type_code: fra
verses:
  '1':
  - type: heading
    content: La restauration du peuple
  - type: heading
    content: L’Eternel délivrera
  - type: text
    content: 'Message que l’Eternel communiqua à Jérémie :'
  '10':
  - type: text
    content: Et toi, Jacob mon serviteur,
  - type: text
    content: sois donc sans crainte,
  - type: text
    content: déclare l’Eternel,
  - type: text
    content: non, n’aie pas peur, ╵ô Israël !
  - type: text
    content: Car moi, je vais te délivrer, ╵de la terre lointaine,
  - type: text
    content: toi et tes descendants, ╵du pays de l’exil.
  - type: text
    content: Oui, Jacob reviendra, ╵il jouira de la tranquillité ╵et d’une vie paisible ;
  - type: text
    content: personne ne l’inquiétera
  - type: note
    content: Les v. 10-11 ont leur parallèle en 46.27-28.
  - type: text
    content: .
  '11':
  - type: text
    content: Car je suis avec toi,
  - type: text
    content: l’Eternel le déclare,
  - type: text
    content: et je te sauverai.
  - type: text
    content: Je ferai table rase ╵de tous les peuples
  - type: text
    content: chez lesquels je t’ai dispersé.
  - type: text
    content: Mais je ne ferai pas ╵table rase de toi.
  - type: text
    content: Cependant, je te châtierai ╵selon ce qui est juste,
  - type: text
    content: je ne te laisserai ╵certainement pas impuni.
  '12':
  - type: text
    content: 'Car voici ce que l’Eternel déclare :'
  - type: text
    content: Ta plaie est incurable,
  - type: text
    content: ta blessure est très douloureuse,
  '13':
  - type: text
    content: et il n’y a personne ╵qui prenne en main ta cause,
  - type: text
    content: il ne se trouve aucun remède ╵pour ton ulcère,
  - type: text
    content: il n’y a pas pour toi ╵de guérison.
  '14':
  - type: text
    content: Tous tes amants
  - type: note
    content: C’est-à-dire les alliés de Jérusalem (voir 22.20).
  - type: text
    content: ', Jérusalem, ╵t’ont oubliée :'
  - type: text
    content: ils ne se soucient pas de toi
  - type: text
    content: car je t’ai accablée de coups ╵comme ferait un ennemi.
  - type: text
    content: Je t’ai cruellement châtiée
  - type: text
    content: car ton crime est énorme
  - type: text
    content: et tes fautes nombreuses.
  '15':
  - type: text
    content: Pourquoi te plains-tu donc ╵de ta blessure,
  - type: text
    content: de ce que ta douleur ╵soit si aiguë ?
  - type: text
    content: Je te l’ai infligée
  - type: text
    content: pour tes crimes énormes
  - type: text
    content: et tes fautes nombreuses.
  '16':
  - type: text
    content: Mais ceux qui te dévorent ╵seront tous dévorés ;
  - type: text
    content: et tous tes oppresseurs ╵s’en iront en exil.
  - type: text
    content: Ceux qui t’auront pillée ╵seront pillés eux-mêmes,
  - type: text
    content: oui, ceux qui t’auront dépouillée ╵seront à leur tour dépouillés.
  '17':
  - type: text
    content: Car je ferai venir ta guérison,
  - type: text
    content: je soignerai tes plaies,
  - type: text
    content: l’Eternel le déclare,
  - type: text
    content: toi qu’on appelle « Rejetée »,
  - type: text
    content: « Sion dont nul ne se soucie ».
  '18':
  - type: text
    content: 'Voici ce que déclare l’Eternel :'
  - type: text
    content: Moi, je vais restaurer ╵les habitations de Jacob,
  - type: text
    content: et j’aurai compassion ╵de toutes ses demeures ;
  - type: text
    content: la ville sera rebâtie ╵sur ses décombres,
  - type: text
    content: le palais sera restauré ╵sur son emplacement.
  '19':
  - type: text
    content: Du milieu d’eux s’élèveront ╵des accents de reconnaissance,
  - type: text
    content: on entendra des rires.
  - type: text
    content: Je les multiplierai,
  - type: text
    content: leur nombre ne décroîtra plus ;
  - type: text
    content: je les honorerai,
  - type: text
    content: ils ne seront plus méprisés.
  '2':
  - type: text
    content: 'Voici ce que déclare l’Eternel, Dieu d’Israël : Consigne par écrit dans un livre tout ce que je t’ai dit. '
  '20':
  - type: text
    content: Ceux qui descendent de Jacob ╵seront comme autrefois
  - type: text
    content: et leur communauté ╵devant moi sera stable ;
  - type: text
    content: je punirai ╵tous ceux qui les oppriment.
  '21':
  - type: text
    content: Leur chef sera l’un d’eux,
  - type: text
    content: leur souverain ╵sortira de leurs rangs.
  - type: text
    content: Je le ferai venir
  - type: text
    content: et il s’approchera de moi ;
  - type: text
    content: autrement, qui aurait l’audace
  - type: text
    content: de s’approcher de moi ?
  - type: text
    content: demande l’Eternel.
  '22':
  - type: text
    content: Vous, vous serez mon peuple,
  - type: text
    content: et moi, je serai votre Dieu.
  - type: heading
    content: Reconstruction
  '23':
  - type: text
    content: Voici que la tempête ╵de l’Eternel se lève,
  - type: text
    content: sa fureur se déchaîne,
  - type: text
    content: l’orage tourbillonne,
  - type: text
    content: il se déverse sur la tête ╵de ceux qui font le mal
  - type: note
    content: Les v. 23-24 ont leur parallèle en 23.19-20.
  - type: text
    content: .
  '24':
  - type: text
    content: La colère de l’Eternel ╵ne se calmera pas
  - type: text
    content: avant qu’il ait agi ╵et qu’il ait accompli
  - type: text
    content: les desseins de son cœur.
  - type: text
    content: Dans les jours à venir, ╵vous vous en rendrez compte.
  '3':
  - type: text
    content: Car voici le temps vient, dit l’Eternel, où je ramènerai les captifs
  - type: note
    content: 'Autre traduction : je changerai le sort.'
  - type: text
    content: ' de mon peuple Israël et Juda – c’est l’Eternel qui le déclare. Je les ramènerai dans le pays que j’ai donné à leurs ancêtres et ils le posséderont.'
  '4':
  - type: text
    content: 'Voici ce que l’Eternel a dit au sujet d’Israël et de Juda :'
  - type: heading
    content: L’Eternel guérira
  '5':
  - type: text
    content: 'Voici ce que déclare l’Eternel :'
  - type: text
    content: Nous avons entendu ╵des cris d’effroi ;
  - type: text
    content: c’est l’épouvante et non la paix.
  '6':
  - type: text
    content: 'Demandez et voyez : ╵les hommes peuvent-ils ╵à présent enfanter ?'
  - type: text
    content: Pourquoi voit-on partout ╵des soldats qui se tiennent ╵les mains collées aux reins,
  - type: text
    content: comme des femmes ╵sur le point d’accoucher ?
  - type: text
    content: Pourquoi ces visages défaits, livides ?
  '7':
  - type: text
    content: Malheur ! Quel jour terrible !
  - type: text
    content: Il n’y en a pas d’autre ╵semblable à celui-là !
  - type: text
    content: C’est un temps de détresse ╵pour les descendants de Jacob,
  - type: text
    content: mais ils en seront délivrés.
  '8':
  - type: text
    content: 'Voici ce que déclare l’Eternel, ╵le Seigneur des armées célestes : ╵En ce temps-là,'
  - type: text
    content: je briserai le joug ╵pesant sur leurs épaules,
  - type: text
    content: j’arracherai leurs liens
  - type: text
    content: et ils ne seront plus ╵esclaves d’étrangers.
  '9':
  - type: text
    content: Ils seront serviteurs ╵de l’Eternel leur Dieu,
  - type: text
    content: et de David, leur roi, ╵que je leur donnerai.
