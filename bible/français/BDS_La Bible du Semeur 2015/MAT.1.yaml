document_id: MAT.1,21
type_code: fra
verses:
  '1':
  - type: usfm
    marker: ms1
    children:
    - type: text
      text: Naissance et enfance de Jésus
    marker-yv: yv-h
  - type: usfm
    marker: s1
    children:
    - type: text
      text: La généalogie de Jésus
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: (Lc 3.23-38)
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: Voici la généalogie de Jésus-Christ, de la descendance de David et d’Abraham.
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ezéchias eut pour descendant Manassé. Manassé eut pour descendant Amôn. Amôn eut pour descendant Josias. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: A l’époque de la déportation à Babylone, Josias eut pour descendant Yekonia et ses frères.
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Après la déportation à Babylone, Yekonia eut pour descendant Shealtiel. Shealtiel eut pour descendant Zorobabel. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Zorobabel eut pour descendant Abioud. Abioud eut pour descendant Eliaqim. Eliaqim eut pour descendant Azor. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Azor eut pour descendant Sadoq. Sadoq eut pour descendant Ahim. Ahim eut pour descendant Elioud. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Elioud eut pour descendant Eléazar. Eléazar eut pour descendant Matthan. Matthan eut pour descendant Jacob. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Jacob eut pour descendant Joseph, l’époux de Marie, de laquelle est né Jésus, appelé Christ.
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Il y eut donc en tout quatorze générations d’Abraham à David, quatorze de David jusqu’à la déportation à Babylone, et quatorze de cette déportation jusqu’à Christ.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: L’annonce de la naissance de Jésus
    marker-yv: yv-h
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Voici dans quelles circonstances Jésus-Christ vint au monde : Marie, sa mère, était liée par fiançailles à Joseph ; or elle se trouva enceinte par l’action du Saint-Esprit, avant qu’ils aient vécu ensemble'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1.18 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: En Israël, les fiancés étaient juridiquement mariés mais n’avaient pas encore de vie commune.
      marker-yv: yv-n
    - type: text
      text: '. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Joseph, son futur mari, était un homme juste. Il ne voulait pas la livrer au déshonneur. C’est pourquoi il se proposa de rompre ses fiançailles sans en ébruiter la raison.
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Abraham eut pour descendant Isaac. Isaac eut pour descendant Jacob. Jacob eut pour descendant Juda et ses frères. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Il réfléchissait à ce projet quand un ange du Seigneur lui apparut en rêve et lui dit : Joseph, descendant de David, ne crains pas de prendre Marie pour femme, car l’enfant qu’elle porte vient de l’Esprit Saint. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Elle donnera naissance à un fils, tu l’appelleras Jésus. C’est lui, en effet, qui sauvera son peuple de ses péchés
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1.21 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Jésus signifie : '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: l’Eternel sauve.
      marker-yv: yv-n
    - type: text
      text: .
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Tout cela arriva pour que s’accomplisse cette parole du Seigneur
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1.22 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Traduction adoptée par l’ancienne version grecque de l’Ancien Testament du nom que nous avons rendu par l’Eternel dans l’Ancien Testament.
      marker-yv: yv-n
    - type: text
      text: ' transmise par le prophète :'
  '23':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: qt
      children:
      - type: text
        text: Voici, la jeune fille vierge sera enceinte.
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: qt
      children:
      - type: text
        text: Et elle enfantera un fils
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1.23 '
      - type: usfm
        marker: ft
        children:
        - type: usfm
          marker: ref
          children:
          - type: text
            text: Es 7.14
        - type: text
          text: ' cité selon l’ancienne version grecque.'
      marker-yv: yv-n
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: qt
      children:
      - type: text
        text: que l’on appellera Emmanuel,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'ce qui veut dire : '
    - type: usfm
      marker: qt
      children:
      - type: text
        text: Dieu avec nous
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1.23 '
      - type: usfm
        marker: ft
        children:
        - type: usfm
          marker: ref
          children:
          - type: text
            text: Es 8.8
        - type: text
          text: ', '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: '10'
        - type: text
          text: ' cité selon l’ancienne version grecque.'
      marker-yv: yv-n
    - type: usfm
      marker: qt
      children:
      - type: text
        text: .
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'A son réveil, Joseph fit ce que l’ange du Seigneur lui avait commandé : il prit sa fiancée pour femme. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Mais il n’eut pas de relations conjugales avec elle avant qu’elle ait mis au monde un fils, auquel il donna le nom de Jésus.
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'De Thamar, Juda eut pour descendant Pérets et Zérah. Pérets eut pour descendant Hetsrôn. Hetsrôn eut pour descendant Aram. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Aram eut pour descendant Amminadab. Amminadab eut pour descendant Nahshôn, Nahshôn eut pour descendant Salma. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'De Rahab, Salma eut pour descendant Booz. De Ruth, Booz eut pour descendant Obed. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Obed eut pour descendant Isaï. Isaï eut pour descendant le roi David.
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'De la femme d’Urie, David eut pour descendant Salomon. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Salomon eut pour descendant Roboam. Roboam eut pour descendant Abiya. Abiya eut pour descendant Asa. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Asa eut pour descendant Josaphat. Josaphat eut pour descendant Yoram. Yoram eut pour descendant Ozias. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ozias eut pour descendant Yotam. Yotam eut pour descendant Ahaz. Ahaz eut pour descendant Ezéchias. '
