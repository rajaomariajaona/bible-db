document_id: MAT.1,21
type_code: fra
verses:
  '1':
  - type: heading
    content: Naissance et enfance de Jésus
  - type: heading
    content: La généalogie de Jésus
  - type: heading
    content: (Lc 3.23-38)
  - type: text
    content: Voici la généalogie de Jésus-Christ, de la descendance de David et d’Abraham.
  '10':
  - type: text
    content: 'Ezéchias eut pour descendant Manassé. Manassé eut pour descendant Amôn. Amôn eut pour descendant Josias. '
  '11':
  - type: text
    content: A l’époque de la déportation à Babylone, Josias eut pour descendant Yekonia et ses frères.
  '12':
  - type: text
    content: 'Après la déportation à Babylone, Yekonia eut pour descendant Shealtiel. Shealtiel eut pour descendant Zorobabel. '
  '13':
  - type: text
    content: 'Zorobabel eut pour descendant Abioud. Abioud eut pour descendant Eliaqim. Eliaqim eut pour descendant Azor. '
  '14':
  - type: text
    content: 'Azor eut pour descendant Sadoq. Sadoq eut pour descendant Ahim. Ahim eut pour descendant Elioud. '
  '15':
  - type: text
    content: 'Elioud eut pour descendant Eléazar. Eléazar eut pour descendant Matthan. Matthan eut pour descendant Jacob. '
  '16':
  - type: text
    content: Jacob eut pour descendant Joseph, l’époux de Marie, de laquelle est né Jésus, appelé Christ.
  '17':
  - type: text
    content: Il y eut donc en tout quatorze générations d’Abraham à David, quatorze de David jusqu’à la déportation à Babylone, et quatorze de cette déportation jusqu’à Christ.
  - type: heading
    content: L’annonce de la naissance de Jésus
  '18':
  - type: text
    content: 'Voici dans quelles circonstances Jésus-Christ vint au monde : Marie, sa mère, était liée par fiançailles à Joseph ; or elle se trouva enceinte par l’action du Saint-Esprit, avant qu’ils aient vécu ensemble'
  - type: note
    content: En Israël, les fiancés étaient juridiquement mariés mais n’avaient pas encore de vie commune.
  - type: text
    content: '. '
  '19':
  - type: text
    content: Joseph, son futur mari, était un homme juste. Il ne voulait pas la livrer au déshonneur. C’est pourquoi il se proposa de rompre ses fiançailles sans en ébruiter la raison.
  '2':
  - type: text
    content: 'Abraham eut pour descendant Isaac. Isaac eut pour descendant Jacob. Jacob eut pour descendant Juda et ses frères. '
  '20':
  - type: text
    content: 'Il réfléchissait à ce projet quand un ange du Seigneur lui apparut en rêve et lui dit : Joseph, descendant de David, ne crains pas de prendre Marie pour femme, car l’enfant qu’elle porte vient de l’Esprit Saint. '
  '21':
  - type: text
    content: Elle donnera naissance à un fils, tu l’appelleras Jésus. C’est lui, en effet, qui sauvera son peuple de ses péchés
  - type: note
    content: 'Jésus signifie : l’Eternel sauve.'
  - type: text
    content: .
  '22':
  - type: text
    content: Tout cela arriva pour que s’accomplisse cette parole du Seigneur
  - type: note
    content: Traduction adoptée par l’ancienne version grecque de l’Ancien Testament du nom que nous avons rendu par l’Eternel dans l’Ancien Testament.
  - type: text
    content: ' transmise par le prophète :'
  '23':
  - type: text
    content: ' '
  - type: text
    content: Voici, la jeune fille vierge sera enceinte.
  - type: text
    content: Et elle enfantera un fils
  - type: note
    content: Es 7.14 cité selon l’ancienne version grecque.
  - type: text
    content: que l’on appellera Emmanuel,
  - type: text
    content: 'ce qui veut dire : '
  - type: text
    content: Dieu avec nous
  - type: note
    content: Es 8.8, 10 cité selon l’ancienne version grecque.
  - type: text
    content: .
  '24':
  - type: text
    content: 'A son réveil, Joseph fit ce que l’ange du Seigneur lui avait commandé : il prit sa fiancée pour femme. '
  '25':
  - type: text
    content: Mais il n’eut pas de relations conjugales avec elle avant qu’elle ait mis au monde un fils, auquel il donna le nom de Jésus.
  '3':
  - type: text
    content: 'De Thamar, Juda eut pour descendant Pérets et Zérah. Pérets eut pour descendant Hetsrôn. Hetsrôn eut pour descendant Aram. '
  '4':
  - type: text
    content: 'Aram eut pour descendant Amminadab. Amminadab eut pour descendant Nahshôn, Nahshôn eut pour descendant Salma. '
  '5':
  - type: text
    content: 'De Rahab, Salma eut pour descendant Booz. De Ruth, Booz eut pour descendant Obed. '
  '6':
  - type: text
    content: Obed eut pour descendant Isaï. Isaï eut pour descendant le roi David.
  - type: text
    content: 'De la femme d’Urie, David eut pour descendant Salomon. '
  '7':
  - type: text
    content: 'Salomon eut pour descendant Roboam. Roboam eut pour descendant Abiya. Abiya eut pour descendant Asa. '
  '8':
  - type: text
    content: 'Asa eut pour descendant Josaphat. Josaphat eut pour descendant Yoram. Yoram eut pour descendant Ozias. '
  '9':
  - type: text
    content: 'Ozias eut pour descendant Yotam. Yotam eut pour descendant Ahaz. Ahaz eut pour descendant Ezéchias. '
