document_id: ACT.14,21
type_code: fra
verses:
  '1':
  - type: heading
    content: A Iconium
  - type: text
    content: A Iconium
  - type: note
    content: Iconium, à environ 150 kilomètres à l’est d’Antioche de Pisidie.
  - type: text
    content: ', Paul et Barnabas se rendirent aussi à la synagogue des Juifs et y parlèrent de telle sorte que beaucoup de Juifs et de non-Juifs devinrent croyants. '
  '10':
  - type: text
    content: 'il lui commanda d’une voix forte : Lève-toi et tiens-toi droit sur tes pieds !'
  - type: text
    content: D’un bond, il fut debout et se mit à marcher.
  '11':
  - type: text
    content: 'Quand ils virent ce que Paul avait fait, les nombreux assistants crièrent dans leur langue, le lycaonien : Les dieux ont pris forme humaine et ils sont descendus parmi nous.'
  '12':
  - type: text
    content: Ils appelaient Barnabas Zeus
  - type: note
    content: 'Zeus: dieu suprême dans la mythologie grecque. Hermès: messager des dieux.'
  - type: text
    content: ', et Paul Hermès parce qu’il était le porte-parole.'
  '13':
  - type: text
    content: Le prêtre du dieu Zeus, dont le temple se trouvait à l’entrée de la ville, fit amener devant les portes de la cité des taureaux ornés de guirlandes et de fleurs. Déjà il s’apprêtait, avec la foule, à les offrir en sacrifice.
  '14':
  - type: text
    content: 'Quand les apôtres Barnabas et Paul l’apprirent, ils déchirèrent leurs vêtements en signe de consternation et se précipitèrent au milieu de la foule en s’écriant : '
  '15':
  - type: text
    content: 'Amis, que faites-vous là ? Nous ne sommes que des hommes, nous aussi, semblables à vous. Nous sommes venus vous annoncer une bonne nouvelle : c’est qu’il vous faut abandonner ces idoles inutiles pour vous tourner vers le Dieu vivant, qui a créé le ciel, la terre, la mer et tout ce qui s’y trouve. '
  '16':
  - type: text
    content: 'Dans les siècles passés, ce Dieu a laissé tous les peuples suivre leurs propres chemins. '
  '17':
  - type: text
    content: Pourtant, il n’a jamais cessé de leur donner des témoignages de sa bonté, car il vous envoie du ciel la pluie et des fruits abondants en leur saison. Oui, c’est lui qui vous donne de la nourriture en abondance et comble votre cœur de joie.
  '18':
  - type: text
    content: Même en leur parlant ainsi, ils eurent beaucoup de mal à dissuader la foule de leur offrir un sacrifice.
  '19':
  - type: text
    content: 'Des Juifs arrivèrent d’Antioche et d’Iconium et ils parvinrent à retourner le peuple contre eux : ils lapidèrent Paul, puis ils le traînèrent hors de la ville, croyant qu’il était mort. '
  '2':
  - type: text
    content: 'Mais les Juifs qui avaient refusé de croire suscitèrent chez les non-Juifs de l’hostilité et de la malveillance à l’égard des frères. '
  '20':
  - type: text
    content: Mais quand les disciples se rassemblèrent autour de lui, il se releva et rentra dans la ville. Le lendemain, il partit avec Barnabas pour Derbé.
  - type: heading
    content: Le retour à Antioche
  '21':
  - type: text
    content: 'Après avoir annoncé l’Evangile dans cette ville et y avoir fait de nombreux disciples, ils retournèrent à Lystres, à Iconium et à Antioche. '
  '22':
  - type: text
    content: Ils fortifiaient les disciples et les encourageaient à demeurer fermes dans la foi.
  - type: text
    content: – Car, leur disaient-ils, c’est au travers de beaucoup de souffrances qu’il nous faut entrer dans le royaume de Dieu.
  '23':
  - type: text
    content: Dans chaque Eglise, ils firent nommer pour celles-ci
  - type: note
    content: 'Autre traduction : ils nommèrent pour celles-ci.'
  - type: text
    content: ' des responsables et, en priant et en jeûnant, ils les confièrent au Seigneur en qui ils avaient cru.'
  '24':
  - type: text
    content: 'De là, ils traversèrent la Pisidie et gagnèrent la Pamphylie. '
  '25':
  - type: text
    content: 'Après avoir annoncé la Parole à Pergé, ils descendirent au port d’Attalie. '
  '26':
  - type: text
    content: Là ils s’embarquèrent pour Antioche d’où ils étaient partis et où on les avait confiés à la grâce de Dieu pour l’œuvre qu’ils venaient d’accomplir.
  '27':
  - type: text
    content: A leur arrivée
  - type: note
    content: Après un voyage qui a probablement duré deux ans. Après cela, Paul et Barnabas ont dû rester une année à Antioche pendant laquelle a peut-être eu lieu l’épisode raconté en Ga 2.11.
  - type: text
    content: ', ils réunirent l’Eglise et racontèrent tout ce que Dieu avait fait avec eux ; ils exposèrent, en particulier, comment il avait ouvert aux non-Juifs la porte de la foi. '
  '28':
  - type: text
    content: Ils demeurèrent là assez longtemps parmi les disciples.
  '3':
  - type: text
    content: Néanmoins, Paul et Barnabas prolongèrent leur séjour dans cette ville ; ils parlaient avec assurance, car ils étaient confiants dans le Seigneur et celui-ci confirmait la vérité du message de sa grâce, en leur donnant d’accomplir des signes miraculeux et des prodiges.
  '4':
  - type: text
    content: 'La population de la ville se partagea en deux camps : les uns prenaient parti pour les Juifs, les autres pour les apôtres. '
  '5':
  - type: text
    content: 'Les non-Juifs et les Juifs, avec leurs chefs, s’apprêtaient à maltraiter les apôtres et à les lapider, '
  '6':
  - type: text
    content: 'mais ceux-ci, dès qu’ils en furent informés, cherchèrent refuge dans les villes de la Lycaonie : Lystres, Derbé et les environs'
  - type: note
    content: 'La Lycaonie: district à l’est de la Pisidie, au nord des monts du Taurus. Elle faisait partie de la province de Galatie. Lystres: colonie romaine, lieu d’origine probable de Timothée, à une trentaine de kilomètres d’Iconium. Derbé: à une centaine de kilomètres de Lystres ; patrie de Gaïus (20.4).'
  - type: text
    content: '. '
  '7':
  - type: text
    content: Là aussi, ils annoncèrent l’Evangile.
  - type: heading
    content: A Lystres
  '8':
  - type: text
    content: 'A Lystres se trouvait un homme paralysé des pieds : infirme de naissance, il n’avait jamais pu marcher. '
  '9':
  - type: text
    content: 'Il écoutait les paroles de Paul. L’apôtre fixa les yeux sur lui et, voyant qu’il avait la foi pour être sauvé, '
