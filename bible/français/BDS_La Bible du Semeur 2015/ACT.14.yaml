document_id: ACT.14,21
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: A Iconium
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: A Iconium
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '14.1 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Iconium
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: ', '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: à environ 150 kilomètres à l’est d’Antioche de Pisidie.
      marker-yv: yv-n
    - type: text
      text: ', Paul et Barnabas se rendirent aussi à la synagogue des Juifs et y parlèrent de telle sorte que beaucoup de Juifs et de non-Juifs devinrent croyants. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'il lui commanda d’une voix forte : Lève-toi et tiens-toi droit sur tes pieds !'
  - type: usfm
    marker: p
    children:
    - type: text
      text: D’un bond, il fut debout et se mit à marcher.
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'Quand ils virent ce que Paul avait fait, les nombreux assistants crièrent dans leur langue, le lycaonien : Les dieux ont pris forme humaine et ils sont descendus parmi nous.'
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: Ils appelaient Barnabas Zeus
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '14.12 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Zeus
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: ': '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'dieu suprême dans la mythologie grecque. '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Hermès
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: ': '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: messager des dieux.
      marker-yv: yv-n
    - type: text
      text: ', et Paul Hermès parce qu’il était le porte-parole.'
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: Le prêtre du dieu Zeus, dont le temple se trouvait à l’entrée de la ville, fit amener devant les portes de la cité des taureaux ornés de guirlandes et de fleurs. Déjà il s’apprêtait, avec la foule, à les offrir en sacrifice.
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'Quand les apôtres Barnabas et Paul l’apprirent, ils déchirèrent leurs vêtements en signe de consternation et se précipitèrent au milieu de la foule en s’écriant : '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'Amis, que faites-vous là ? Nous ne sommes que des hommes, nous aussi, semblables à vous. Nous sommes venus vous annoncer une bonne nouvelle : c’est qu’il vous faut abandonner ces idoles inutiles pour vous tourner vers le Dieu vivant, qui a créé le ciel, la terre, la mer et tout ce qui s’y trouve. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'Dans les siècles passés, ce Dieu a laissé tous les peuples suivre leurs propres chemins. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: Pourtant, il n’a jamais cessé de leur donner des témoignages de sa bonté, car il vous envoie du ciel la pluie et des fruits abondants en leur saison. Oui, c’est lui qui vous donne de la nourriture en abondance et comble votre cœur de joie.
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: Même en leur parlant ainsi, ils eurent beaucoup de mal à dissuader la foule de leur offrir un sacrifice.
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'Des Juifs arrivèrent d’Antioche et d’Iconium et ils parvinrent à retourner le peuple contre eux : ils lapidèrent Paul, puis ils le traînèrent hors de la ville, croyant qu’il était mort. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'Mais les Juifs qui avaient refusé de croire suscitèrent chez les non-Juifs de l’hostilité et de la malveillance à l’égard des frères. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: Mais quand les disciples se rassemblèrent autour de lui, il se releva et rentra dans la ville. Le lendemain, il partit avec Barnabas pour Derbé.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Le retour à Antioche
    marker-yv: yv-h
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: 'Après avoir annoncé l’Evangile dans cette ville et y avoir fait de nombreux disciples, ils retournèrent à Lystres, à Iconium et à Antioche. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: Ils fortifiaient les disciples et les encourageaient à demeurer fermes dans la foi.
  - type: usfm
    marker: p
    children:
    - type: text
      text: – Car, leur disaient-ils, c’est au travers de beaucoup de souffrances qu’il nous faut entrer dans le royaume de Dieu.
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: Dans chaque Eglise, ils firent nommer pour celles-ci
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '14.23 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Autre traduction : '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: ils nommèrent pour celles-ci.
      marker-yv: yv-n
    - type: text
      text: ' des responsables et, en priant et en jeûnant, ils les confièrent au Seigneur en qui ils avaient cru.'
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: 'De là, ils traversèrent la Pisidie et gagnèrent la Pamphylie. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: 'Après avoir annoncé la Parole à Pergé, ils descendirent au port d’Attalie. '
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: Là ils s’embarquèrent pour Antioche d’où ils étaient partis et où on les avait confiés à la grâce de Dieu pour l’œuvre qu’ils venaient d’accomplir.
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: A leur arrivée
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '14.27 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Après un voyage qui a probablement duré deux ans. Après cela, Paul et Barnabas ont dû rester une année à Antioche pendant laquelle a peut-être eu lieu l’épisode raconté en '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: Ga 2.11
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: ', ils réunirent l’Eglise et racontèrent tout ce que Dieu avait fait avec eux ; ils exposèrent, en particulier, comment il avait ouvert aux non-Juifs la porte de la foi. '
  '28':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: Ils demeurèrent là assez longtemps parmi les disciples.
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: Néanmoins, Paul et Barnabas prolongèrent leur séjour dans cette ville ; ils parlaient avec assurance, car ils étaient confiants dans le Seigneur et celui-ci confirmait la vérité du message de sa grâce, en leur donnant d’accomplir des signes miraculeux et des prodiges.
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'La population de la ville se partagea en deux camps : les uns prenaient parti pour les Juifs, les autres pour les apôtres. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'Les non-Juifs et les Juifs, avec leurs chefs, s’apprêtaient à maltraiter les apôtres et à les lapider, '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'mais ceux-ci, dès qu’ils en furent informés, cherchèrent refuge dans les villes de la Lycaonie : Lystres, Derbé et les environs'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '14.6 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'La '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Lycaonie
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: ': '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'district à l’est de la Pisidie, au nord des monts du Taurus. Elle faisait partie de la province de Galatie. '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Lystres
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: ': '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'colonie romaine, lieu d’origine probable de Timothée, à une trentaine de kilomètres d’Iconium. '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Derbé
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: ': '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: à une centaine de kilomètres de Lystres ; patrie de Gaïus (
        - type: usfm
          marker: ref
          children:
          - type: text
            text: '20.4'
        - type: text
          text: ).
      marker-yv: yv-n
    - type: text
      text: '. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: Là aussi, ils annoncèrent l’Evangile.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: A Lystres
    marker-yv: yv-h
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'A Lystres se trouvait un homme paralysé des pieds : infirme de naissance, il n’avait jamais pu marcher. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'Il écoutait les paroles de Paul. L’apôtre fixa les yeux sur lui et, voyant qu’il avait la foi pour être sauvé, '
