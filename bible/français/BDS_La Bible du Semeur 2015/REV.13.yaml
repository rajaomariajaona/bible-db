document_id: REV.13,21
type_code: fra
verses:
  '1':
  - type: heading
    content: La bête qui monte de la merLes visions de ce chapitre rappellent celles de Dn 7.
  - type: text
    content: 'Alors je vis monter de la mer une bête qui avait sept têtes et dix cornes. Elle portait sur ses cornes dix diadèmes et sur ses têtes étaient inscrits des titres insultants pour Dieu. '
  '10':
  - type: text
    content: Si quelqu’un doit aller en captivité, il ira certainement en captivité. Si quelqu’un doit périr par l’épée, il périra certainement par l’épée
  - type: note
    content: Les manuscrits contiennent plusieurs variantes pour ce verset.
  - type: text
    content: . C’est là que les membres du peuple saint doivent faire preuve d’endurance et de foi.
  - type: heading
    content: La bête qui monte de la terre
  '11':
  - type: text
    content: 'Ensuite je vis une autre bête monter de la terre. Elle portait deux cornes semblables à celles d’un agneau, mais elle parlait comme un dragon. '
  '12':
  - type: text
    content: 'Cette nouvelle bête exerçait tout le pouvoir de la première bête en sa présence. Elle amenait la terre et ses habitants à adorer la première bête, celle qui avait été guérie de sa blessure mortelle. '
  '13':
  - type: text
    content: 'Elle accomplissait des signes impressionnants, faisant tomber le feu du ciel sur la terre à la vue de tout le monde. '
  '14':
  - type: text
    content: 'Par ces signes qu’il lui fut donné d’accomplir au service de la première bête, elle égarait tous les habitants de la terre. Elle leur demandait de faire une image de la bête qui avait été frappée de l’épée et qui était de nouveau vivante. '
  '15':
  - type: text
    content: Il lui fut même donné d’animer l’image de la bête, et l’image se mit à parler et elle faisait mourir ceux qui refusaient de l’adorer.
  '16':
  - type: text
    content: 'Elle amena tous les hommes, gens du peuple et grands personnages, riches et pauvres, hommes libres et esclaves, à se faire marquer d’un signe sur la main droite ou sur le front. '
  '17':
  - type: text
    content: 'Et personne ne pouvait acheter ou vendre sans porter ce signe : soit le nom de la bête, soit le nombre correspondant à son nom. '
  '18':
  - type: text
    content: C’est ici qu’il faut de la sagesse. Que celui qui a de l’intelligence attribue un nombre à la bête, car c’est un nombre d’homme
  - type: note
    content: 'Autres traductions : car c’est un chiffre humain ou un chiffre à votre portée.'
  - type: text
    content: '. Et son nombre est : six cent soixante-six'
  - type: note
    content: 'Quelques manuscrits ont : six cent seize'
  - type: text
    content: .
  '2':
  - type: text
    content: 'La bête que je vis avait l’allure d’un léopard, ses pattes ressemblaient à celles d’un ours et sa gueule à celle d’un lion. Le dragon lui donna sa puissance, son trône et une grande autorité. '
  '3':
  - type: text
    content: L’une de ses têtes semblait avoir reçu un coup mortel, comme si elle avait été égorgée. Mais la blessure dont elle aurait dû mourir fut guérie. Là-dessus, le monde entier, rempli d’admiration, se rangea derrière la bête.
  '4':
  - type: text
    content: 'Les peuples adorèrent le dragon, parce qu’il avait donné son pouvoir à la bête. Ils adorèrent aussi la bête, en disant : « Qui est semblable à la bête ? Qui peut combattre contre elle ? » '
  '5':
  - type: text
    content: Il lui fut donné une gueule pour proférer des discours arrogants et insultants contre Dieu. Elle reçut le droit d’exercer son autorité pendant quarante-deux mois.
  '6':
  - type: text
    content: 'Elle ouvrit sa gueule pour proférer des blasphèmes et insulter Dieu, la Tente où il demeure et ceux dont la demeure est au ciel. '
  '7':
  - type: text
    content: 'Il lui fut même permis de '
  - type: text
    content: faire la guerre aux membres du peuple saint et de les vaincre
  - type: note
    content: Dn 7.21.
  - type: text
    content: '. Elle reçut autorité sur tout peuple, toute tribu, toute langue et toute nation. '
  '8':
  - type: text
    content: Tous les habitants de la terre l’adoreront, tous ceux dont le nom n’est pas inscrit, depuis l’origine du monde, dans le livre de vie de l’Agneau égorgé.
  '9':
  - type: text
    content: Que celui qui a des oreilles écoute !
