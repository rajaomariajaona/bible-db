document_id: REV.13,21
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: La bête qui monte de la mer
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '13.0 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Les visions de ce chapitre rappellent celles de '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: Dn 7
        - type: text
          text: .
      marker-yv: yv-n
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Alors je vis monter de la mer une bête qui avait sept têtes et dix cornes. Elle portait sur ses cornes dix diadèmes et sur ses têtes étaient inscrits des titres insultants pour Dieu. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Si quelqu’un doit aller en captivité, il ira certainement en captivité. Si quelqu’un doit périr par l’épée, il périra certainement par l’épée
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '13.10 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Les manuscrits contiennent plusieurs variantes pour ce verset.
      marker-yv: yv-n
    - type: text
      text: . C’est là que les membres du peuple saint doivent faire preuve d’endurance et de foi.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: La bête qui monte de la terre
    marker-yv: yv-h
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ensuite je vis une autre bête monter de la terre. Elle portait deux cornes semblables à celles d’un agneau, mais elle parlait comme un dragon. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Cette nouvelle bête exerçait tout le pouvoir de la première bête en sa présence. Elle amenait la terre et ses habitants à adorer la première bête, celle qui avait été guérie de sa blessure mortelle. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Elle accomplissait des signes impressionnants, faisant tomber le feu du ciel sur la terre à la vue de tout le monde. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Par ces signes qu’il lui fut donné d’accomplir au service de la première bête, elle égarait tous les habitants de la terre. Elle leur demandait de faire une image de la bête qui avait été frappée de l’épée et qui était de nouveau vivante. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Il lui fut même donné d’animer l’image de la bête, et l’image se mit à parler et elle faisait mourir ceux qui refusaient de l’adorer.
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Elle amena tous les hommes, gens du peuple et grands personnages, riches et pauvres, hommes libres et esclaves, à se faire marquer d’un signe sur la main droite ou sur le front. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Et personne ne pouvait acheter ou vendre sans porter ce signe : soit le nom de la bête, soit le nombre correspondant à son nom. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: C’est ici qu’il faut de la sagesse. Que celui qui a de l’intelligence attribue un nombre à la bête, car c’est un nombre d’homme
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '13.18 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Autres traductions : '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'car c’est un chiffre humain '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'ou '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: un chiffre à votre portée.
      marker-yv: yv-n
    - type: text
      text: '. Et son nombre est : six cent soixante-six'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '13.18 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Quelques manuscrits ont : '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: six cent seize
      marker-yv: yv-n
    - type: text
      text: .
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'La bête que je vis avait l’allure d’un léopard, ses pattes ressemblaient à celles d’un ours et sa gueule à celle d’un lion. Le dragon lui donna sa puissance, son trône et une grande autorité. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: L’une de ses têtes semblait avoir reçu un coup mortel, comme si elle avait été égorgée. Mais la blessure dont elle aurait dû mourir fut guérie. Là-dessus, le monde entier, rempli d’admiration, se rangea derrière la bête.
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Les peuples adorèrent le dragon, parce qu’il avait donné son pouvoir à la bête. Ils adorèrent aussi la bête, en disant : « Qui est semblable à la bête ? Qui peut combattre contre elle ? » '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Il lui fut donné une gueule pour proférer des discours arrogants et insultants contre Dieu. Elle reçut le droit d’exercer son autorité pendant quarante-deux mois.
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Elle ouvrit sa gueule pour proférer des blasphèmes et insulter Dieu, la Tente où il demeure et ceux dont la demeure est au ciel. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Il lui fut même permis de '
    - type: usfm
      marker: qt
      children:
      - type: text
        text: faire la guerre aux membres du peuple saint et de les vaincre
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '13.7 '
      - type: usfm
        marker: ft
        children:
        - type: usfm
          marker: ref
          children:
          - type: text
            text: Dn 7.21
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: '. Elle reçut autorité sur tout peuple, toute tribu, toute langue et toute nation. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Tous les habitants de la terre l’adoreront, tous ceux dont le nom n’est pas inscrit, depuis l’origine du monde, dans le livre de vie de l’Agneau égorgé.
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Que celui qui a des oreilles écoute !
