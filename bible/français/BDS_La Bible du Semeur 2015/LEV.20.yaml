document_id: LEV.20,21
type_code: fra
verses:
  '1':
  - type: heading
    content: Le salaire du péché
  - type: text
    content: L’Eternel s’adressa à Moïse en ces termes
  - type: note
    content: Ce chapitre précise les peines prévues pour les transgressions mentionnées au chapitre 18.
  - type: text
    content: '  : '
  '10':
  - type: text
    content: Si un homme commet adultère avec une femme mariée, s’il commet adultère avec la femme de son prochain, cet homme adultère et la femme adultère seront mis à mort
  - type: note
    content: Voir 18.20.
  - type: text
    content: .
  '11':
  - type: text
    content: 'Si un homme couche avec la femme de son père, il porte atteinte à son père : les deux coupables seront mis à mort et porteront la responsabilité de leur mort'
  - type: note
    content: Voir 18.8.
  - type: text
    content: .
  '12':
  - type: text
    content: Si quelqu’un couche avec sa belle-fille, ils seront tous deux mis à mort ; ils ont commis une infamie et porteront la responsabilité de leur mort
  - type: note
    content: Voir 18.15.
  - type: text
    content: .
  '13':
  - type: text
    content: Si deux hommes ont des rapports homosexuels, ils ont commis un acte abominable ; ils seront mis à mort et porteront la responsabilité de leur mort
  - type: note
    content: Voir 18.22.
  - type: text
    content: .
  '14':
  - type: text
    content: Si un homme prend pour épouses une femme et sa mère, c’est une infamie ; ils seront tous trois brûlés pour qu’il n’y ait pas d’infamie parmi vous
  - type: note
    content: Voir 18.17.
  - type: text
    content: .
  '15':
  - type: text
    content: 'Si un homme a des rapports sexuels avec une bête, il sera mis à mort et vous tuerez la bête. '
  '16':
  - type: text
    content: De même, si une femme s’accouple à une bête, vous tuerez la femme et la bête ; toutes deux seront mises à mort et elles porteront la responsabilité de leur mort
  - type: note
    content: Voir 18.23.
  - type: text
    content: .
  '17':
  - type: text
    content: Si un homme épouse sa demi-sœur, fille de son père ou de sa mère, et qu’ils se déshonorent ainsi l’un l’autre, c’est une infamie ; ils seront retranchés sous les yeux des membres de leur peuple ; l’homme portera toute la responsabilité de sa faute pour avoir déshonoré sa sœur
  - type: note
    content: Voir 18.9.
  - type: text
    content: .
  '18':
  - type: text
    content: Si un homme couche avec une femme pendant ses règles, ils seront tous deux retranchés de leur peuple, pour avoir l’un et l’autre exposé sa perte de sang
  - type: note
    content: Voir 18.19.
  - type: text
    content: .
  '19':
  - type: text
    content: Tu n’auras pas de relations sexuelles avec la sœur de ta mère ou de ton père. Si quelqu’un a des relations avec une proche parente, ils porteront tous deux la responsabilité de leur faute
  - type: note
    content: Pour les v. 19-20, voir 18.12-14.
  - type: text
    content: .
  '2':
  - type: text
    content: 'Dis aux Israélites : Si un membre du peuple d’Israël ou l’un des étrangers résidant en Israël livre l’un de ses enfants en sacrifice à Molok, il doit être mis à mort ; les habitants du pays le lapideront'
  - type: note
    content: Voir 18.21.
  - type: text
    content: '. '
  '20':
  - type: text
    content: Si un homme couche avec sa tante, il porte atteinte à son oncle, les deux coupables porteront la responsabilité de leur faute, ils mourront sans enfants.
  '21':
  - type: text
    content: Si un homme épouse la femme de son frère, c’est un acte impur ; il a porté atteinte à son frère ; ils resteront sans enfants
  - type: note
    content: Voir 18.16.
  - type: text
    content: .
  '22':
  - type: text
    content: 'Vous obéirez à toutes mes ordonnances et à toutes mes lois et vous les appliquerez. Ainsi le pays où je vous mène pour que vous vous y installiez ne vous vomira pas. '
  '23':
  - type: text
    content: 'Vous ne suivrez pas les coutumes des peuples étrangers que je vais chasser devant vous ; car c’est parce qu’ils ont commis toutes ces actions que je les ai pris en aversion. '
  '24':
  - type: text
    content: 'Aussi, je vous ai dit : C’est vous qui posséderez leur pays ; je vous le donnerai à posséder ; un pays ruisselant de lait et de miel. Je suis l’Eternel, votre Dieu, qui vous ai mis à part des autres peuples'
  - type: note
    content: Voir Ex 3.8.
  - type: text
    content: '. '
  '25':
  - type: text
    content: Faites donc la différence entre les bêtes pures et celles qui sont impures, entre les oiseaux purs et les oiseaux impurs, et ne vous rendez pas vous-mêmes abominables par des bêtes, des oiseaux et tout ce qui se meut à ras de terre, que j’ai mis à part pour vous comme impurs.
  '26':
  - type: text
    content: Vous serez saints pour moi, car moi, l’Eternel, je suis saint et je vous ai mis à part des autres peuples pour que vous m’apparteniez.
  '27':
  - type: text
    content: 'Un homme ou une femme qui évoquent les esprits ou qui pratiquent la divination, doivent être mis à mort : on les lapidera et ils porteront la responsabilité de leur mort.'
  '3':
  - type: text
    content: Et moi, je me retournerai contre cet homme et je le retrancherai du milieu de son peuple, pour avoir livré un de ses enfants à Molok
  - type: note
    content: Voir note Lv 18.21.
  - type: text
    content: ', et avoir ainsi souillé mon sanctuaire et profané ma sainteté. '
  '4':
  - type: text
    content: 'Si les gens du pays se ferment les yeux, ne mettent pas à mort cet homme qui a livré un de ses enfants à Molok, '
  '5':
  - type: text
    content: c’est moi qui me tournerai contre cet homme et contre sa famille, et je le retrancherai de son peuple, avec tous ceux qui se sont laissé entraîner à sa suite pour se prostituer à Molok.
  '6':
  - type: text
    content: 'J’agirai de même envers celui qui consulte les médiums et les devins et se prostitue ainsi à eux : je me retournerai contre lui et je le retrancherai de son peuple.'
  '7':
  - type: text
    content: Vous vous rendrez saints, vous serez saints ; car je suis l’Eternel, votre Dieu.
  '8':
  - type: text
    content: Vous observerez mes ordonnances et vous y obéirez. Je suis l’Eternel qui vous rends saints.
  '9':
  - type: text
    content: 'Tout homme qui maudit son père ou sa mère sera mis à mort : puisqu’il a maudit son père ou sa mère, il porte la responsabilité de sa mort'
  - type: note
    content: Voir 19.3.
  - type: text
    content: .
