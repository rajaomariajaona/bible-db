document_id: EXO.26
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Les tentures du tabernacle
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Tu feras le tabernacle avec dix tentures de fin lin retors
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '26.1 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Tissé de fils de lin formés de plusieurs fils tordus ensemble, ce qui le rendait particulièrement résistant.
    marker-yv: yv-n
  - type: text
    text: ', de pourpre violette et écarlate, de rouge éclatant, ornées de chérubins dans les règles de l’art. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Chaque tenture aura quatorze mètres de long et deux mètres de large
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '26.2 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Dans les chapitres 26 et 27, l’hébreu donne les mesures en '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'coudées. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Une coudée correspond à 50 centimètres. Certains n’attribuent que 44 ou 46 cm à la coudée, d’où les différences entre les versions modernes.
    marker-yv: yv-n
  - type: text
    text: '. Elles seront toutes identiques. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: On coudra d’abord cinq de ces tentures l’une à l’autre, puis on fera de même pour les cinq autres
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '26.3 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: La couverture du tabernacle était composée de dix bandes parallèles de deux mètres de large. Elles étaient cousues cinq par cinq, bord à bord, dans le sens de leur longueur formant ainsi deux grands tapis de quatorze mètres sur dix mètres, l’un pour recouvrir le lieu saint, l’autre le lieu très saint.
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Sur le bord de la dernière tenture de chacun de ces assemblages, tu fixeras des cordons de pourpre violette. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Il y en aura cinquante à l’extrémité de chacun des deux assemblages et les cordons se correspondront l’un à l’autre. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Tu feras cinquante agrafes d’or au moyen desquelles tu assembleras les tentures, de sorte que le tabernacle forme un tout.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Ensuite tu feras onze tentures de poil de chèvre, pour recouvrir le tabernacle comme d’une tente
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '26.7 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Au-dessus de ce tissu précieux venait une tenture faite en poil de chèvre comme en utilisent encore les Bédouins pour leurs tentes. Ces tentures avaient un mètre de plus que le tissu précédent, il y avait une bande de plus, donc elles débordaient de cinquante centimètres de chaque côté et d’un mètre sur l’arrière (voir v. 12-13).
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Chacune d’elles aura quinze mètres de long et deux mètres de large. Elles seront toutes identiques. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Tu les assembleras, cinq d’une part, six de l’autre, et tu rabattras la sixième sur le devant de la tente. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Tu fixeras cinquante cordons sur le bord de la dernière tenture de chaque assemblage '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'et tu feras cinquante agrafes de bronze dans lesquelles tu introduiras les cordons pour assembler la tente, afin qu’elle forme un tout. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Le pan supplémentaire des tentures de la tente – c’est-à-dire la moitié de l’assemblage des tentures qui sera en surplus – retombera librement sur l’arrière du tabernacle. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'De même, le demi-mètre en surplus sur la longueur des tentures de la tente pendra librement de chaque côté du tabernacle pour bien le couvrir. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Tu mettras sur la tente une couverture de peaux de béliers teintes en rouge et une couverture de peaux de dauphins par-dessus.
- type: usfm
  marker: s1
  children:
  - type: text
    text: L’armature du tabernacle
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Tu feras pour le tabernacle des cadres en bois d’acacia qui seront posés debout. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Chaque cadre aura cinq mètres de long et soixante-quinze centimètres de large, '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'et sera muni de deux tenons parallèles. Tu feras ainsi pour tous les cadres du tabernacle. '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Tu feras vingt cadres pour le côté sud du tabernacle. '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Pour chacun d’eux, tu disposeras deux socles d’argent, un pour chaque tenon, soit quarante socles d’argent pour les vingt cadres. '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Tu feras de même pour le second côté du tabernacle, le côté nord : vingt cadres, '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'supportés par quarante socles d’argent, à raison de deux par cadre. '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Pour l’arrière du tabernacle, tourné vers l’ouest, tu prépareras six cadres. '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Tu ajouteras deux cadres comme contreforts des angles arrières du tabernacle : '
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'chacun sera jumelé avec l’un des cadres des extrémités, depuis le bas, et bien lié avec lui jusqu’à son sommet par un seul anneau ; les deux contreforts d’angles seront identiques. '
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: Il y aura donc en tout huit cadres avec leurs seize socles d’argent, deux sous chaque cadre.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Tu feras cinq traverses de bois d’acacia pour les cadres d’un des côtés du tabernacle, '
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'cinq pour l’autre côté et cinq pour le fond à l’ouest. '
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'La traverse médiane, au milieu des cadres, courra d’une extrémité à l’autre du tabernacle. '
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'Tu plaqueras d’or tous les cadres et tu fabriqueras des anneaux d’or pour recevoir les traverses que tu plaqueras également d’or. '
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: Tu dresseras le tabernacle selon la manière qui t’est montrée sur la montagne.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Le voile
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'Tu feras un voile de pourpre violette et écarlate, de rouge éclatant et de fin lin retors, orné de chérubins, dans les règles de l’art. '
  - type: usfm
    marker: v
    metadata:
      v: '32'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'Tu le suspendras à quatre piliers d’acacia plaqués d’or, munis de crochets d’or et posés sur quatre socles d’argent. '
  - type: usfm
    marker: v
    metadata:
      v: '33'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: Tu fixeras le voile sous les agrafes.
- type: usfm
  marker: p
  children:
  - type: text
    text: C’est là, derrière le voile, que tu déposeras le coffre contenant l’acte de l’alliance. Ce voile vous servira de séparation entre le lieu saint et le lieu très saint
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '26.33 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Seul le grand-prêtre avait le droit de franchir ce voile, une fois par an, le jour des Expiations (Lv 16 ; Hé 9.2-14). Au moment de la mort de Christ, c’est probablement ce voile qui s’est déchiré dans le Temple, indiquant qu’à présent tout croyant avait directement accès auprès de Dieu (Mt 27.51 ; Mc 15.38  ; voir Hé 6.19-20 ; 9.3-5 ; 10.19-22).
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '34'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: 'Tu poseras le propitiatoire sur le coffre de l’acte de l’alliance dans le lieu très saint. '
  - type: usfm
    marker: v
    metadata:
      v: '35'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: Tu disposeras la table à l’extérieur
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '26.35 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: C’est-à-dire la table sur laquelle étaient déposés les pains exposés devant l’Eternel (
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 25.23-30
        metadata:
          usfm: EXO.25.23+EXO.25.24+EXO.25.25+EXO.25.26+EXO.25.27+EXO.25.28+EXO.25.29+EXO.25.30
      - type: text
        text: ). Dans le lieu très saint, il n’y avait que le coffre de l’alliance ; dans le lieu saint, cette table, le chandelier d’or et l’autel d’encens.
    marker-yv: yv-n
  - type: text
    text: ', devant le voile, du côté nord du tabernacle, et le chandelier face à la table, du côté sud. '
  - type: usfm
    marker: v
    metadata:
      v: '36'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: 'Tu confectionneras pour l’entrée de la tente un rideau de pourpre violette et écarlate, de rouge éclatant et de fin lin retors, en ouvrage de broderie. '
  - type: usfm
    marker: v
    metadata:
      v: '37'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: Tu feras pour le rideau cinq piliers en acacia et tu les plaqueras d’or, tu les muniras de crochets en or, puis tu couleras pour ces piliers cinq socles de bronze.
