document_id: EXO.26,21
type_code: fra
verses:
  '1':
  - type: heading
    content: Les tentures du tabernacle
  - type: text
    content: Tu feras le tabernacle avec dix tentures de fin lin retors
  - type: note
    content: Tissé de fils de lin formés de plusieurs fils tordus ensemble, ce qui le rendait particulièrement résistant.
  - type: text
    content: ', de pourpre violette et écarlate, de rouge éclatant, ornées de chérubins dans les règles de l’art. '
  '10':
  - type: text
    content: 'Tu fixeras cinquante cordons sur le bord de la dernière tenture de chaque assemblage '
  '11':
  - type: text
    content: 'et tu feras cinquante agrafes de bronze dans lesquelles tu introduiras les cordons pour assembler la tente, afin qu’elle forme un tout. '
  '12':
  - type: text
    content: 'Le pan supplémentaire des tentures de la tente – c’est-à-dire la moitié de l’assemblage des tentures qui sera en surplus – retombera librement sur l’arrière du tabernacle. '
  '13':
  - type: text
    content: 'De même, le demi-mètre en surplus sur la longueur des tentures de la tente pendra librement de chaque côté du tabernacle pour bien le couvrir. '
  '14':
  - type: text
    content: Tu mettras sur la tente une couverture de peaux de béliers teintes en rouge et une couverture de peaux de dauphins par-dessus.
  - type: heading
    content: L’armature du tabernacle
  '15':
  - type: text
    content: 'Tu feras pour le tabernacle des cadres en bois d’acacia qui seront posés debout. '
  '16':
  - type: text
    content: 'Chaque cadre aura cinq mètres de long et soixante-quinze centimètres de large, '
  '17':
  - type: text
    content: 'et sera muni de deux tenons parallèles. Tu feras ainsi pour tous les cadres du tabernacle. '
  '18':
  - type: text
    content: 'Tu feras vingt cadres pour le côté sud du tabernacle. '
  '19':
  - type: text
    content: 'Pour chacun d’eux, tu disposeras deux socles d’argent, un pour chaque tenon, soit quarante socles d’argent pour les vingt cadres. '
  '2':
  - type: text
    content: Chaque tenture aura quatorze mètres de long et deux mètres de large
  - type: note
    content: Dans les chapitres 26 et 27, l’hébreu donne les mesures en coudées. Une coudée correspond à 50 centimètres. Certains n’attribuent que 44 ou 46 cm à la coudée, d’où les différences entre les versions modernes.
  - type: text
    content: '. Elles seront toutes identiques. '
  '20':
  - type: text
    content: 'Tu feras de même pour le second côté du tabernacle, le côté nord : vingt cadres, '
  '21':
  - type: text
    content: 'supportés par quarante socles d’argent, à raison de deux par cadre. '
  '22':
  - type: text
    content: 'Pour l’arrière du tabernacle, tourné vers l’ouest, tu prépareras six cadres. '
  '23':
  - type: text
    content: 'Tu ajouteras deux cadres comme contreforts des angles arrières du tabernacle : '
  '24':
  - type: text
    content: 'chacun sera jumelé avec l’un des cadres des extrémités, depuis le bas, et bien lié avec lui jusqu’à son sommet par un seul anneau ; les deux contreforts d’angles seront identiques. '
  '25':
  - type: text
    content: Il y aura donc en tout huit cadres avec leurs seize socles d’argent, deux sous chaque cadre.
  '26':
  - type: text
    content: 'Tu feras cinq traverses de bois d’acacia pour les cadres d’un des côtés du tabernacle, '
  '27':
  - type: text
    content: 'cinq pour l’autre côté et cinq pour le fond à l’ouest. '
  '28':
  - type: text
    content: 'La traverse médiane, au milieu des cadres, courra d’une extrémité à l’autre du tabernacle. '
  '29':
  - type: text
    content: 'Tu plaqueras d’or tous les cadres et tu fabriqueras des anneaux d’or pour recevoir les traverses que tu plaqueras également d’or. '
  '3':
  - type: text
    content: On coudra d’abord cinq de ces tentures l’une à l’autre, puis on fera de même pour les cinq autres
  - type: note
    content: La couverture du tabernacle était composée de dix bandes parallèles de deux mètres de large. Elles étaient cousues cinq par cinq, bord à bord, dans le sens de leur longueur formant ainsi deux grands tapis de quatorze mètres sur dix mètres, l’un pour recouvrir le lieu saint, l’autre le lieu très saint.
  - type: text
    content: '. '
  '30':
  - type: text
    content: Tu dresseras le tabernacle selon la manière qui t’est montrée sur la montagne.
  - type: heading
    content: Le voile
  '31':
  - type: text
    content: 'Tu feras un voile de pourpre violette et écarlate, de rouge éclatant et de fin lin retors, orné de chérubins, dans les règles de l’art. '
  '32':
  - type: text
    content: 'Tu le suspendras à quatre piliers d’acacia plaqués d’or, munis de crochets d’or et posés sur quatre socles d’argent. '
  '33':
  - type: text
    content: Tu fixeras le voile sous les agrafes.
  - type: text
    content: C’est là, derrière le voile, que tu déposeras le coffre contenant l’acte de l’alliance. Ce voile vous servira de séparation entre le lieu saint et le lieu très saint
  - type: note
    content: Seul le grand-prêtre avait le droit de franchir ce voile, une fois par an, le jour des Expiations (Lv 16 ; Hé 9.2-14). Au moment de la mort de Christ, c’est probablement ce voile qui s’est déchiré dans le Temple, indiquant qu’à présent tout croyant avait directement accès auprès de Dieu (Mt 27.51 ; Mc 15.38  ; voir Hé 6.19-20 ; 9.3-5 ; 10.19-22).
  - type: text
    content: '. '
  '34':
  - type: text
    content: 'Tu poseras le propitiatoire sur le coffre de l’acte de l’alliance dans le lieu très saint. '
  '35':
  - type: text
    content: Tu disposeras la table à l’extérieur
  - type: note
    content: C’est-à-dire la table sur laquelle étaient déposés les pains exposés devant l’Eternel (25.23-30). Dans le lieu très saint, il n’y avait que le coffre de l’alliance ; dans le lieu saint, cette table, le chandelier d’or et l’autel d’encens.
  - type: text
    content: ', devant le voile, du côté nord du tabernacle, et le chandelier face à la table, du côté sud. '
  '36':
  - type: text
    content: 'Tu confectionneras pour l’entrée de la tente un rideau de pourpre violette et écarlate, de rouge éclatant et de fin lin retors, en ouvrage de broderie. '
  '37':
  - type: text
    content: Tu feras pour le rideau cinq piliers en acacia et tu les plaqueras d’or, tu les muniras de crochets en or, puis tu couleras pour ces piliers cinq socles de bronze.
  '4':
  - type: text
    content: 'Sur le bord de la dernière tenture de chacun de ces assemblages, tu fixeras des cordons de pourpre violette. '
  '5':
  - type: text
    content: 'Il y en aura cinquante à l’extrémité de chacun des deux assemblages et les cordons se correspondront l’un à l’autre. '
  '6':
  - type: text
    content: Tu feras cinquante agrafes d’or au moyen desquelles tu assembleras les tentures, de sorte que le tabernacle forme un tout.
  '7':
  - type: text
    content: Ensuite tu feras onze tentures de poil de chèvre, pour recouvrir le tabernacle comme d’une tente
  - type: note
    content: Au-dessus de ce tissu précieux venait une tenture faite en poil de chèvre comme en utilisent encore les Bédouins pour leurs tentes. Ces tentures avaient un mètre de plus que le tissu précédent, il y avait une bande de plus, donc elles débordaient de cinquante centimètres de chaque côté et d’un mètre sur l’arrière (voir v. 12-13).
  - type: text
    content: '. '
  '8':
  - type: text
    content: 'Chacune d’elles aura quinze mètres de long et deux mètres de large. Elles seront toutes identiques. '
  '9':
  - type: text
    content: 'Tu les assembleras, cinq d’une part, six de l’autre, et tu rabattras la sixième sur le devant de la tente. '
