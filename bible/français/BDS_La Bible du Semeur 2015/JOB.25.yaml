document_id: JOB.25,21
type_code: fra
verses:
  '1':
  - type: heading
    content: Troisième discours de Bildad
  - type: heading
    content: L’homme pourrait-il être pur ?
  - type: text
    content: 'Et Bildad de Shouah prit la parole et dit :'
  '2':
  - type: text
    content: Il détient un pouvoir ╵souverain, effrayant.
  - type: text
    content: Il fait régner la paix ╵dans les lieux élevés.
  '3':
  - type: text
    content: Peut-on compter ses troupes
  - type: note
    content: C’est-à-dire les étoiles, les anges, les éléments.
  - type: text
    content: ','
  - type: text
    content: et sur qui sa lumière ╵ne se lève-t-elle pas ?
  '4':
  - type: text
    content: Comment un homme ╵pourrrait-il être justifié ╵par-devers Dieu ?
  - type: text
    content: Et comment l’être ╵né d’une femme ╵pourrait-il être pur ?
  '5':
  - type: text
    content: Si, devant lui, la lune même ╵est sans éclat,
  - type: text
    content: si les étoiles ╵ne sont pas pures à ses yeux,
  '6':
  - type: text
    content: que dire alors de l’homme ╵qui n’est qu’un vermisseau,
  - type: text
    content: de l’être humain ╵qui n’est qu’un ver ?
