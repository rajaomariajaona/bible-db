document_id: JOB.25,21
type_code: fra
verses:
  '1':
  - type: usfm
    marker: ms1
    children:
    - type: text
      text: Troisième discours de Bildad
    marker-yv: yv-h
  - type: usfm
    marker: s1
    children:
    - type: text
      text: L’homme pourrait-il être pur ?
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Et Bildad de Shouah prit la parole et dit :'
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Il détient un pouvoir ╵souverain, effrayant.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Il fait régner la paix ╵dans les lieux élevés.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Peut-on compter ses troupes
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '25.3 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: C’est-à-dire les étoiles, les anges, les éléments.
      marker-yv: yv-n
    - type: text
      text: ','
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et sur qui sa lumière ╵ne se lève-t-elle pas ?
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Comment un homme ╵pourrrait-il être justifié ╵par-devers Dieu ?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et comment l’être ╵né d’une femme ╵pourrait-il être pur ?
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Si, devant lui, la lune même ╵est sans éclat,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: si les étoiles ╵ne sont pas pures à ses yeux,
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: que dire alors de l’homme ╵qui n’est qu’un vermisseau,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: de l’être humain ╵qui n’est qu’un ver ?
