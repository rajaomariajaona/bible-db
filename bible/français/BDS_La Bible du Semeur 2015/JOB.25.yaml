document_id: JOB.25
type_code: fra
segments:
- type: usfm
  marker: ms1
  children:
  - type: text
    text: Troisième discours de Bildad
  marker-yv: yv-h
- type: usfm
  marker: s1
  children:
  - type: text
    text: L’homme pourrait-il être pur ?
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Et Bildad de Shouah prit la parole et dit :'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Il détient un pouvoir ╵souverain, effrayant.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Il fait régner la paix ╵dans les lieux élevés.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Peut-on compter ses troupes
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '25.3 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: C’est-à-dire les étoiles, les anges, les éléments.
    marker-yv: yv-n
  - type: text
    text: ','
- type: usfm
  marker: q1
  children:
  - type: text
    text: et sur qui sa lumière ╵ne se lève-t-elle pas ?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Comment un homme ╵pourrrait-il être justifié ╵par-devers Dieu ?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et comment l’être ╵né d’une femme ╵pourrait-il être pur ?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Si, devant lui, la lune même ╵est sans éclat,
- type: usfm
  marker: q1
  children:
  - type: text
    text: si les étoiles ╵ne sont pas pures à ses yeux,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: que dire alors de l’homme ╵qui n’est qu’un vermisseau,
- type: usfm
  marker: q1
  children:
  - type: text
    text: de l’être humain ╵qui n’est qu’un ver ?
