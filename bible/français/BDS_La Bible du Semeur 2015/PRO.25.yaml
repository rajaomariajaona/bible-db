document_id: PRO.25,21
type_code: fra
verses:
  '1':
  - type: heading
    content: Deuxième recueil des proverbes de Salomon
  - type: text
    content: Voici encore des proverbes de Salomon. Ils ont été recueillis par les fonctionnaires d’Ezéchias, roi de Juda
  - type: note
    content: Voir l’introduction.
  - type: text
    content: .
  '10':
  - type: text
    content: sinon, il pourrait l’apprendre et t’injurier,
  - type: text
    content: sans que tu puisses rattraper tes propos.
  '11':
  - type: text
    content: Des paroles prononcées bien à propos
  - type: text
    content: sont comme des pommes d’or avec des ciselures d’argent.
  '12':
  - type: text
    content: Un avertissement donné par une personne sage et reçu d’une oreille attentive
  - type: text
    content: est comme un anneau d’or et une parure d’or fin.
  '13':
  - type: text
    content: Comme la fraîcheur de la neige au fort de la moisson
  - type: note
    content: Il ne neige pas au temps de la moisson en Israël. Pour les uns, il s’agirait de la neige du mont Hermon dont on se serait servi pour rafraîchir les boissons, pour d’autres d’une simple comparaison entre une boisson en temps chaud aussi fraîche que la neige et le messager fidèle.
  - type: text
    content: ','
  - type: text
    content: 'tel est un messager fidèle pour celui qui l’envoie :'
  - type: text
    content: il réconforte son maître.
  '14':
  - type: text
    content: Qui se vante de sa libéralité sans rien donner
  - type: text
    content: fait penser au nuage amené par le vent et qui n’apporte pas la pluie.
  '15':
  - type: text
    content: Avec de la patience, on persuade un dirigeant,
  - type: text
    content: tout comme une langue douce peut briser un os.
  '16':
  - type: text
    content: Si tu trouves du miel, n’en mange que ce qui te suffit,
  - type: text
    content: car si tu en prends trop, tu le rejetteras.
  '17':
  - type: text
    content: Ne va pas trop souvent chez ton ami,
  - type: text
    content: de peur qu’il se lasse de toi et te prenne en haine.
  '18':
  - type: text
    content: L’homme qui porte un faux témoignage contre son prochain
  - type: text
    content: est comme une massue, une épée et une flèche acérée.
  '19':
  - type: text
    content: Se fier à un homme déloyal au jour du malheur,
  - type: text
    content: c’est comme se fier à une dent branlante ou à un pied chancelant.
  '2':
  - type: text
    content: La gloire de Dieu, c’est de tenir certaines choses cachées,
  - type: text
    content: la gloire du roi, c’est de s’enquérir soigneusement des choses.
  '20':
  - type: text
    content: Entonner des chansons pour une personne affligée,
  - type: text
    content: c’est comme lui enlever son habit par un jour de froid
  - type: text
    content: ou verser du vinaigre sur du salpêtre
  - type: note
    content: 'Selon le texte hébreu traditionnel. L’ancienne version grecque a : sur une plaie.'
  - type: text
    content: .
  '21':
  - type: text
    content: Si ton ennemi a faim, donne-lui à manger,
  - type: text
    content: s’il a soif, donne-lui à boire
  - type: note
    content: Les v. 21-22 sont cités en Rm 12.20.
  - type: text
    content: .
  '22':
  - type: text
    content: Ce sera comme si tu lui mettais des charbons ardents sur sa tête
  - type: note
    content: Pour certains, image du châtiment (Ps 140.11), pour d’autres, du remords cuisant qui pousse à reconnaître son péché.
  - type: text
    content: ','
  - type: text
    content: et l’Eternel te le rendra.
  '23':
  - type: text
    content: Une langue dissimulatrice engendre des visages irrités
  - type: note
    content: Ceux des personnes qui s’aperçoivent que leurs secrets ont été trahis et leur renom terni.
  - type: text
    content: aussi sûrement que le vent du nord enfante la pluie.
  '24':
  - type: text
    content: Mieux vaut habiter dans un coin sur un toit en terrasse
  - type: text
    content: que de partager la maison d’une femme querelleuse.
  '25':
  - type: text
    content: Une bonne nouvelle venant d’un pays lointain fait du bien,
  - type: text
    content: comme de l’eau fraîche à une personne altérée.
  '26':
  - type: text
    content: Un juste qui se laisse ébranler devant le méchant
  - type: text
    content: est comme une source aux eaux troubles ou une fontaine polluée.
  '27':
  - type: text
    content: Il n’est pas bon de manger beaucoup de miel,
  - type: text
    content: mais étudier des choses importantes voilà ce qui est important
  - type: note
    content: 'Autre traduction : ni de rechercher trop d’honneurs.'
  - type: text
    content: .
  '28':
  - type: text
    content: Qui ne sait pas se dominer
  - type: text
    content: est comme une ville démantelée qui n’a plus de remparts.
  '3':
  - type: text
    content: Vous ne pénétrerez pas le cœur d’un roi,
  - type: text
    content: pas plus que vous ne pourrez mesurer la hauteur du ciel ou sonder les profondeurs de la terre.
  '4':
  - type: text
    content: Elimine de l’argent les scories,
  - type: text
    content: l’orfèvre pourra le travailler pour en faire un vase.
  '5':
  - type: text
    content: Elimine de l’entourage du roi les méchants,
  - type: text
    content: son autorité s’affermira par la justice.
  '6':
  - type: text
    content: Ne fais pas l’important devant le roi,
  - type: text
    content: et ne te mets pas à la place des grands
  - type: note
    content: Pour les v. 6-7, voir Lc 14.8-10.
  - type: text
    content: .
  '7':
  - type: text
    content: 'Il vaut mieux qu’on te dise :'
  - type: text
    content: « Viens te mettre à cette place d’honneur »
  - type: text
    content: que de te voir humilié devant les nobles.
  '8':
  - type: text
    content: Ne te hâte pas de t’engager dans un procès,
  - type: text
    content: tu t’exposerais à ne plus savoir quoi faire par la suite
  - type: text
    content: si quelqu’un d’autre te confondait.
  '9':
  - type: text
    content: Plaide ta cause contre ton prochain,
  - type: text
    content: mais ne va pas révéler les confidences d’un autre,
