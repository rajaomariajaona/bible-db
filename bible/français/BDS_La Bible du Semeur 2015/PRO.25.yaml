document_id: PRO.25
type_code: fra
segments:
- type: usfm
  marker: ms1
  children:
  - type: text
    text: Deuxième recueil des proverbes de Salomon
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Voici encore des proverbes de Salomon. Ils ont été recueillis par les fonctionnaires d’Ezéchias, roi de Juda
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '25.1 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Voir l’introduction.
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: La gloire de Dieu, c’est de tenir certaines choses cachées,
- type: usfm
  marker: q1
  children:
  - type: text
    text: la gloire du roi, c’est de s’enquérir soigneusement des choses.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Vous ne pénétrerez pas le cœur d’un roi,
- type: usfm
  marker: q1
  children:
  - type: text
    text: pas plus que vous ne pourrez mesurer la hauteur du ciel ou sonder les profondeurs de la terre.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Elimine de l’argent les scories,
- type: usfm
  marker: q1
  children:
  - type: text
    text: l’orfèvre pourra le travailler pour en faire un vase.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Elimine de l’entourage du roi les méchants,
- type: usfm
  marker: q1
  children:
  - type: text
    text: son autorité s’affermira par la justice.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Ne fais pas l’important devant le roi,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et ne te mets pas à la place des grands
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '25.6 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Pour les v. 6-7, voir '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Lc 14.8-10
        metadata:
          usfm: LUK.14.8+LUK.14.9+LUK.14.10
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Il vaut mieux qu’on te dise :'
- type: usfm
  marker: q1
  children:
  - type: text
    text: « Viens te mettre à cette place d’honneur »
- type: usfm
  marker: q1
  children:
  - type: text
    text: que de te voir humilié devant les nobles.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Ne te hâte pas de t’engager dans un procès,
- type: usfm
  marker: q1
  children:
  - type: text
    text: tu t’exposerais à ne plus savoir quoi faire par la suite
- type: usfm
  marker: q1
  children:
  - type: text
    text: si quelqu’un d’autre te confondait.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Plaide ta cause contre ton prochain,
- type: usfm
  marker: q1
  children:
  - type: text
    text: mais ne va pas révéler les confidences d’un autre,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: sinon, il pourrait l’apprendre et t’injurier,
- type: usfm
  marker: q1
  children:
  - type: text
    text: sans que tu puisses rattraper tes propos.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Des paroles prononcées bien à propos
- type: usfm
  marker: q1
  children:
  - type: text
    text: sont comme des pommes d’or avec des ciselures d’argent.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Un avertissement donné par une personne sage et reçu d’une oreille attentive
- type: usfm
  marker: q1
  children:
  - type: text
    text: est comme un anneau d’or et une parure d’or fin.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Comme la fraîcheur de la neige au fort de la moisson
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '25.13 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Il ne neige pas au temps de la moisson en Israël. Pour les uns, il s’agirait de la neige du mont Hermon dont on se serait servi pour rafraîchir les boissons, pour d’autres d’une simple comparaison entre une boisson en temps chaud aussi fraîche que la neige et le messager fidèle.
    marker-yv: yv-n
  - type: text
    text: ','
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'tel est un messager fidèle pour celui qui l’envoie :'
- type: usfm
  marker: q1
  children:
  - type: text
    text: il réconforte son maître.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Qui se vante de sa libéralité sans rien donner
- type: usfm
  marker: q1
  children:
  - type: text
    text: fait penser au nuage amené par le vent et qui n’apporte pas la pluie.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Avec de la patience, on persuade un dirigeant,
- type: usfm
  marker: q1
  children:
  - type: text
    text: tout comme une langue douce peut briser un os.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Si tu trouves du miel, n’en mange que ce qui te suffit,
- type: usfm
  marker: q1
  children:
  - type: text
    text: car si tu en prends trop, tu le rejetteras.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Ne va pas trop souvent chez ton ami,
- type: usfm
  marker: q1
  children:
  - type: text
    text: de peur qu’il se lasse de toi et te prenne en haine.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: L’homme qui porte un faux témoignage contre son prochain
- type: usfm
  marker: q1
  children:
  - type: text
    text: est comme une massue, une épée et une flèche acérée.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Se fier à un homme déloyal au jour du malheur,
- type: usfm
  marker: q1
  children:
  - type: text
    text: c’est comme se fier à une dent branlante ou à un pied chancelant.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Entonner des chansons pour une personne affligée,
- type: usfm
  marker: q1
  children:
  - type: text
    text: c’est comme lui enlever son habit par un jour de froid
- type: usfm
  marker: q1
  children:
  - type: text
    text: ou verser du vinaigre sur du salpêtre
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '25.20 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Selon le texte hébreu traditionnel. L’ancienne version grecque a : '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: sur une plaie.
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Si ton ennemi a faim, donne-lui à manger,
- type: usfm
  marker: q1
  children:
  - type: text
    text: s’il a soif, donne-lui à boire
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '25.21 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Les v. 21-22 sont cités en '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Rm 12.20
        metadata:
          usfm: ROM.12.20
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: Ce sera comme si tu lui mettais des charbons ardents sur sa tête
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '25.22 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Pour certains, image du châtiment (
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ps 140.11
        metadata:
          usfm: PSA.140.11
      - type: text
        text: ), pour d’autres, du remords cuisant qui pousse à reconnaître son péché.
    marker-yv: yv-n
  - type: text
    text: ','
- type: usfm
  marker: q1
  children:
  - type: text
    text: et l’Eternel te le rendra.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: Une langue dissimulatrice engendre des visages irrités
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '25.23 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Ceux des personnes qui s’aperçoivent que leurs secrets ont été trahis et leur renom terni.
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: text
    text: aussi sûrement que le vent du nord enfante la pluie.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: Mieux vaut habiter dans un coin sur un toit en terrasse
- type: usfm
  marker: q1
  children:
  - type: text
    text: que de partager la maison d’une femme querelleuse.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: Une bonne nouvelle venant d’un pays lointain fait du bien,
- type: usfm
  marker: q1
  children:
  - type: text
    text: comme de l’eau fraîche à une personne altérée.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: Un juste qui se laisse ébranler devant le méchant
- type: usfm
  marker: q1
  children:
  - type: text
    text: est comme une source aux eaux troubles ou une fontaine polluée.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: Il n’est pas bon de manger beaucoup de miel,
- type: usfm
  marker: q1
  children:
  - type: text
    text: mais étudier des choses importantes voilà ce qui est important
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '25.27 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Autre traduction : '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: ni de rechercher trop d’honneurs.
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: Qui ne sait pas se dominer
- type: usfm
  marker: q1
  children:
  - type: text
    text: est comme une ville démantelée qui n’a plus de remparts.
