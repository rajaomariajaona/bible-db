document_id: NUM.20,21
type_code: fra
verses:
  '1':
  - type: heading
    content: De Qadesh aux steppes de Moab
  - type: heading
    content: La contestation contre Moïse et Aaron
  - type: text
    content: Le premier mois de l’année
  - type: note
    content: Le premier mois de l’année juive débute en mars ou avril suivant les années. L’année n’est pas indiquée. En comparant les v. 22-29 avec 33.38, on peut conclure qu’il s’agit de la quarantième année après l’Exode.
  - type: text
    content: ', toute la communauté des Israélites parvint au désert de Tsîn. Le peuple établit son campement à Qadesh. C’est là que mourut Miryam'
  - type: note
    content: Sœur de Moïse et d’Aaron (Ex 2.4 ; 15.20-21 ; Nb 12.1) plus âgée qu’eux (Ex 2.4-8). D’après 33.39, Aaron mourut quatre mois après elle, âgé de cent vingt-trois ans, donc Miryam devait avoir environ cent trente ans.
  - type: text
    content: ' et qu’elle fut enterrée.'
  '10':
  - type: text
    content: 'Moïse et Aaron convoquèrent l’assemblée devant le rocher désigné ; et Moïse leur dit : Ecoutez donc, rebelles que vous êtes ! Croyez-vous que nous pourrons faire jaillir pour vous de l’eau de ce rocher ?'
  '11':
  - type: text
    content: Moïse leva la main et, par deux fois, frappa le rocher avec son bâton. L’eau jaillit en abondance. Hommes et bêtes purent se désaltérer
  - type: note
    content: Au lieu de parler au rocher (v. 8), selon l’ordre de l’Eternel, Moïse frappe le rocher après avoir parlé au peuple (cp. Ex 17.6), et qui plus est à deux reprises. Voir Ps 106.32-33.
  - type: text
    content: .
  '12':
  - type: text
    content: 'Mais l’Eternel dit à Moïse et à Aaron : Vous ne m’avez pas été fidèles et vous n’avez pas honoré ma sainteté aux yeux des Israélites. A cause de cela, vous ne ferez pas entrer cette assemblée dans le pays que je leur destine.'
  '13':
  - type: text
    content: Ce sont là les eaux de Meriba (de la Querelle), où les Israélites avaient cherché querelle à l’Eternel, et où il manifesta sa sainteté devant eux.
  - type: heading
    content: Le roi d’Edom refuse le droit de passage
  '14':
  - type: text
    content: 'De Qadesh, Moïse envoya des messagers au roi d’Edom pour lui faire dire : Ainsi parle ton frère Israël'
  - type: note
    content: Israël est un autre nom de Jacob, frère d’Esaü. Ne pouvant passer par le sud (14.45), Israël essaie de contourner la mer Morte et d’entrer en Canaan par l’est.
  - type: text
    content: '  : Tu connais toutes les difficultés que nous avons rencontrées. '
  '15':
  - type: text
    content: 'Jadis, nos ancêtres se sont rendus en Egypte, où nous avons séjourné de nombreuses années. Mais les Egyptiens nous ont maltraités, après avoir maltraité nos ancêtres. '
  '16':
  - type: text
    content: Alors nous avons crié à l’Eternel, et il nous a entendus. Il a envoyé un ange
  - type: note
    content: Voir Ex 14.19 ; 23.20.
  - type: text
    content: ' et nous a fait sortir d’Egypte. A présent, nous sommes à Qadesh, une ville située aux confins de ton territoire. '
  '17':
  - type: text
    content: Permets-nous de traverser ton pays ! Nous ne passerons ni dans les champs ni dans les vignes, et nous ne boirons pas d’eau de vos puits ; nous suivrons la route royale sans nous en écarter ni à droite ni à gauche, jusqu’à ce que nous ayons traversé ton territoire.
  '18':
  - type: text
    content: 'Le roi d’Edom lui répondit : Vous ne traverserez pas mon pays, sinon je vous attaquerai avec mon armée.'
  '19':
  - type: text
    content: 'Les émissaires d’Israël lui dirent : Nous ne ferons que suivre la grande route ; et si nous buvons de ton eau, nous et nos troupeaux, nous t’en payerons le prix, nous ne demandons rien d’autre que le droit de passer à pied.'
  '2':
  - type: text
    content: 'L’eau vint à manquer. Alors le peuple s’attroupa pour s’en prendre à Moïse et Aaron. '
  '20':
  - type: text
    content: 'Mais le roi répondit : Vous ne passerez pas !'
  - type: text
    content: 'Et les Edomites marchèrent à la rencontre des Israélites avec des forces considérables et une armée puissante. '
  '21':
  - type: text
    content: Devant le refus d’Edom de donner le droit de passage aux Israélites sur son territoire, ces derniers prirent une autre direction
  - type: note
    content: Sans doute longèrent-ils la frontière d’Edom (21.4) pour se rendre vers l’est du pays de Moab.
  - type: text
    content: .
  - type: heading
    content: La mort d’Aaron
  '22':
  - type: text
    content: 'Toute la communauté des Israélites quitta Qadesh. Ils arrivèrent à la montagne de Hor. '
  '23':
  - type: text
    content: 'Là, à la montagne de Hor, sur les confins d’Edom, l’Eternel dit à Moïse et à Aaron : '
  '24':
  - type: text
    content: 'Aaron va bientôt rejoindre ses ancêtres décédés. Il n’entrera pas dans le pays que je vais donner aux Israélites car vous avez désobéi à mes ordres au sujet des eaux de Meriba. '
  '25':
  - type: text
    content: 'Prends donc Aaron et son fils Eléazar, et fais-les monter sur la montagne de Hor. '
  '26':
  - type: text
    content: 'Tu enlèveras à Aaron ses vêtements de prêtre et tu en revêtiras son fils Eléazar. Alors Aaron ira rejoindre les siens : il mourra là'
  - type: note
    content: Voir Ex 29.29-30.
  - type: text
    content: .
  '27':
  - type: text
    content: 'Moïse fit ce que l’Eternel avait ordonné. Les trois hommes gravirent la montagne de Hor sous les yeux de toute la communauté. '
  '28':
  - type: text
    content: 'Moïse ôta les vêtements d’Aaron et en revêtit son fils Eléazar. Aaron mourut là au sommet de la montagne. Moïse et Eléazar redescendirent de la montagne. '
  '29':
  - type: text
    content: Toute la communauté comprit qu’Aaron était mort. Alors tout le peuple d’Israël célébra son deuil pendant trente jours.
  '3':
  - type: text
    content: 'Ils s’en prirent à Moïse et lui dirent : Ah ! Si seulement nous étions morts quand nos compatriotes ont péri devant l’Eternel'
  - type: note
    content: Allusion à l’épisode rapporté en 16.28-35.
  - type: text
    content: '  ! '
  '4':
  - type: text
    content: 'Pourquoi avez-vous mené la communauté de l’Eternel dans ce désert ? Pour nous y faire mourir, nous et notre bétail ? '
  '5':
  - type: text
    content: Pourquoi nous avez-vous fait quitter l’Egypte et venir dans ce lieu de misère ? Ici on ne peut rien semer ! Il n’y a ni figuier, ni vigne, ni grenadier. Il n’y a même pas d’eau à boire !
  '6':
  - type: text
    content: Moïse et Aaron s’éloignèrent de l’assemblée pour se diriger vers l’entrée de la tente de la Rencontre où ils se jetèrent face contre terre. Alors la gloire de l’Eternel leur apparut.
  '7':
  - type: text
    content: 'L’Eternel parla à Moïse et lui dit : '
  '8':
  - type: text
    content: Prends ton bâton et, avec ton frère Aaron, rassemblez la communauté. Devant eux, vous parlerez à ce rocher pour qu’il donne son eau. Ainsi tu feras jaillir pour eux de l’eau du rocher, et tu donneras à boire à la communauté et au bétail.
  '9':
  - type: text
    content: 'Moïse prit le bâton qui se trouvait devant l’Eternel, comme celui-ci le lui avait ordonné. '
