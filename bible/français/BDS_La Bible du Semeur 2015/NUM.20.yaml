document_id: NUM.20
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: De Qadesh aux steppes de Moab
  marker-yv: yv-h
- type: usfm
  marker: s2
  children:
  - type: text
    text: La contestation contre Moïse et Aaron
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Le premier mois de l’année
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '20.1 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Le premier mois de l’année juive débute en mars ou avril suivant les années. L’année n’est pas indiquée. En comparant les v. 22-29 avec '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '33.38'
        metadata:
          usfm: NUM.33.38
      - type: text
        text: ', on peut conclure qu’il s’agit de la quarantième année après l’Exode.'
    marker-yv: yv-n
  - type: text
    text: ', toute la communauté des Israélites parvint au désert de Tsîn. Le peuple établit son campement à Qadesh. C’est là que mourut Miryam'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '20.1 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Sœur de Moïse et d’Aaron (Ex 2.4 ; 15.20-21 ; Nb 12.1) plus âgée qu’eux (
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ex 2.4-8
        metadata:
          usfm: EXO.2.4+EXO.2.5+EXO.2.6+EXO.2.7+EXO.2.8
      - type: text
        text: '). D’après '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '33.39'
        metadata:
          usfm: NUM.33.39
      - type: text
        text: ', Aaron mourut quatre mois après elle, âgé de cent vingt-trois ans, donc Miryam devait avoir environ cent trente ans.'
    marker-yv: yv-n
  - type: text
    text: ' et qu’elle fut enterrée.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'L’eau vint à manquer. Alors le peuple s’attroupa pour s’en prendre à Moïse et Aaron. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Ils s’en prirent à Moïse et lui dirent : Ah ! Si seulement nous étions morts quand nos compatriotes ont péri devant l’Eternel'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '20.3 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Allusion à l’épisode rapporté en '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 16.28-35
        metadata:
          usfm: NUM.16.28+NUM.16.29+NUM.16.30+NUM.16.31+NUM.16.32+NUM.16.33+NUM.16.34+NUM.16.35
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: '  ! '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Pourquoi avez-vous mené la communauté de l’Eternel dans ce désert ? Pour nous y faire mourir, nous et notre bétail ? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Pourquoi nous avez-vous fait quitter l’Egypte et venir dans ce lieu de misère ? Ici on ne peut rien semer ! Il n’y a ni figuier, ni vigne, ni grenadier. Il n’y a même pas d’eau à boire !
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Moïse et Aaron s’éloignèrent de l’assemblée pour se diriger vers l’entrée de la tente de la Rencontre où ils se jetèrent face contre terre. Alors la gloire de l’Eternel leur apparut.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'L’Eternel parla à Moïse et lui dit : '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Prends ton bâton et, avec ton frère Aaron, rassemblez la communauté. Devant eux, vous parlerez à ce rocher pour qu’il donne son eau. Ainsi tu feras jaillir pour eux de l’eau du rocher, et tu donneras à boire à la communauté et au bétail.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Moïse prit le bâton qui se trouvait devant l’Eternel, comme celui-ci le lui avait ordonné. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Moïse et Aaron convoquèrent l’assemblée devant le rocher désigné ; et Moïse leur dit : Ecoutez donc, rebelles que vous êtes ! Croyez-vous que nous pourrons faire jaillir pour vous de l’eau de ce rocher ?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Moïse leva la main et, par deux fois, frappa le rocher avec son bâton. L’eau jaillit en abondance. Hommes et bêtes purent se désaltérer
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '20.11 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Au lieu de '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'parler au rocher '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '(v. 8), selon l’ordre de l’Eternel, Moïse frappe le rocher après avoir parlé au peuple (cp. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ex 17.6
        metadata:
          usfm: EXO.17.6
      - type: text
        text: '), et qui plus est à deux reprises. Voir '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ps 106.32-33
        metadata:
          usfm: PSA.106.32+PSA.106.33
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Mais l’Eternel dit à Moïse et à Aaron : Vous ne m’avez pas été fidèles et vous n’avez pas honoré ma sainteté aux yeux des Israélites. A cause de cela, vous ne ferez pas entrer cette assemblée dans le pays que je leur destine.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Ce sont là les eaux de Meriba (de la Querelle), où les Israélites avaient cherché querelle à l’Eternel, et où il manifesta sa sainteté devant eux.
- type: usfm
  marker: s2
  children:
  - type: text
    text: Le roi d’Edom refuse le droit de passage
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'De Qadesh, Moïse envoya des messagers au roi d’Edom pour lui faire dire : Ainsi parle ton frère Israël'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '20.14 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Israël est un autre nom de Jacob, frère d’Esaü. Ne pouvant passer par le sud (
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '14.45'
        metadata:
          usfm: NUM.14.45
      - type: text
        text: ), Israël essaie de contourner la mer Morte et d’entrer en Canaan par l’est.
    marker-yv: yv-n
  - type: text
    text: '  : Tu connais toutes les difficultés que nous avons rencontrées. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Jadis, nos ancêtres se sont rendus en Egypte, où nous avons séjourné de nombreuses années. Mais les Egyptiens nous ont maltraités, après avoir maltraité nos ancêtres. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Alors nous avons crié à l’Eternel, et il nous a entendus. Il a envoyé un ange
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '20.16 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Voir Ex 14.19 ; 23.20.
    marker-yv: yv-n
  - type: text
    text: ' et nous a fait sortir d’Egypte. A présent, nous sommes à Qadesh, une ville située aux confins de ton territoire. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Permets-nous de traverser ton pays ! Nous ne passerons ni dans les champs ni dans les vignes, et nous ne boirons pas d’eau de vos puits ; nous suivrons la route royale sans nous en écarter ni à droite ni à gauche, jusqu’à ce que nous ayons traversé ton territoire.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Le roi d’Edom lui répondit : Vous ne traverserez pas mon pays, sinon je vous attaquerai avec mon armée.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Les émissaires d’Israël lui dirent : Nous ne ferons que suivre la grande route ; et si nous buvons de ton eau, nous et nos troupeaux, nous t’en payerons le prix, nous ne demandons rien d’autre que le droit de passer à pied.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Mais le roi répondit : Vous ne passerez pas !'
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Et les Edomites marchèrent à la rencontre des Israélites avec des forces considérables et une armée puissante. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Devant le refus d’Edom de donner le droit de passage aux Israélites sur son territoire, ces derniers prirent une autre direction
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '20.21 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Sans doute longèrent-ils la frontière d’Edom (
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '21.4'
        metadata:
          usfm: NUM.21.4
      - type: text
        text: ) pour se rendre vers l’est du pays de Moab.
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: s2
  children:
  - type: text
    text: La mort d’Aaron
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Toute la communauté des Israélites quitta Qadesh. Ils arrivèrent à la montagne de Hor. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Là, à la montagne de Hor, sur les confins d’Edom, l’Eternel dit à Moïse et à Aaron : '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Aaron va bientôt rejoindre ses ancêtres décédés. Il n’entrera pas dans le pays que je vais donner aux Israélites car vous avez désobéi à mes ordres au sujet des eaux de Meriba. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Prends donc Aaron et son fils Eléazar, et fais-les monter sur la montagne de Hor. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Tu enlèveras à Aaron ses vêtements de prêtre et tu en revêtiras son fils Eléazar. Alors Aaron ira rejoindre les siens : il mourra là'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '20.26 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Voir '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ex 29.29-30
        metadata:
          usfm: EXO.29.29+EXO.29.30
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'Moïse fit ce que l’Eternel avait ordonné. Les trois hommes gravirent la montagne de Hor sous les yeux de toute la communauté. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'Moïse ôta les vêtements d’Aaron et en revêtit son fils Eléazar. Aaron mourut là au sommet de la montagne. Moïse et Eléazar redescendirent de la montagne. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: Toute la communauté comprit qu’Aaron était mort. Alors tout le peuple d’Israël célébra son deuil pendant trente jours.
