document_id: JOB.16,21
type_code: fra
verses:
  '1':
  - type: usfm
    marker: ms1
    children:
    - type: text
      text: Réponse de Job à Éliphaz
    marker-yv: yv-h
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Job, blessé par les propos de ses amis
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Alors Job prit la parole et dit :'
  '10':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ils ouvrent contre moi ╵leur bouche toute grande.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Leurs outrages me giflent,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ils se liguent tous contre moi.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Dieu m’a livré ╵au pouvoir des injustes,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: il m’a jeté en proie ╵à des méchants.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Je vivais en repos, ╵et il m’a secoué,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: il m’a pris par la nuque, ╵pour me briser,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: puis il m’a relevé ╵pour me prendre pour cible,
  '13':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ses flèches m’environnent,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: il transperce mes reins, ╵sans aucune pitié
  - type: usfm
    marker: q1
    children:
    - type: text
      text: il répand à terre ma bile.
  '14':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Il m’inflige blessure ╵après blessure.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Il s’est rué sur moi ╵comme un guerrier.
  '15':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: J’ai cousu pour ma peau ╵une toile de sac,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et j’ai traîné ma dignité ╵dans la poussière.
  '16':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mon visage est rougi ╵à force de pleurer,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et l’obscurité la plus noire ╵s’étend sur mes paupières.
  '17':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Pourtant mes mains n’ont pas commis ╵d’actes de violence
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et ma prière ╵est sans hypocrisie.
  '18':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ne couvre pas mon sang, ô terre,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et que mon cri ╵ne soit pas étouffé.
  '19':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Dès à présent : ╵j’ai un témoin au ciel,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: oui j’ai dans les lieux élevés, ╵quelqu’un qui témoigne pour moi.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: J’ai entendu beaucoup ╵de discours de ce genre,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: vous êtes tous ╵des consolateurs bien pénibles !
  '20':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Mes amis se moquent de moi :'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: les yeux baignés de larmes, ╵je me tourne vers Dieu.
  '21':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Qu’il
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '16.21 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: il
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: ': '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'c’est-à-dire le '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'témoin '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '(v. 19), qui n’est sans doute autre que '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'Dieu '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'lui-même (v. 20 ; voir '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: '17.3'
        - type: text
          text: ).
      marker-yv: yv-n
    - type: text
      text: ' prenne la défense ╵d’un homme devant Dieu,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et qu’il arbitre ╵entre l’homme et son compagnon
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '16.21 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Autre traduction : '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: comme le fait un homme pour son ami.
      marker-yv: yv-n
    - type: text
      text: .
  '22':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ma vie touche à sa fin
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et je m’en vais par le chemin ╵d’où l’on ne revient pas.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Cesseras-tu ╵de parler pour du vent ?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Qu’est-ce qui te contraint ╵à répliquer encore
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '16.3 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Réponse à Eliphaz (voir '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: '15.2'
        - type: text
          text: ).
      marker-yv: yv-n
    - type: text
      text: '  ?'
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Si vous étiez vous-mêmes ╵à la place où je suis,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: je pourrais parler comme vous,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: tenir contre vous des discours,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et, à votre sujet, ╵hocher la tête
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '16.4 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Geste de mépris et d’insulte (Ps 22.8 ; Jr 48.27 ; Mt 27.39).
      marker-yv: yv-n
    - type: text
      text: .
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Je vous fortifierais ╵par mes paroles,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: je vous soulagerais ╵par mes lèvres pleines de mots.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Cependant, si je parle, ╵pour autant ma souffrance ╵n’en est pas soulagée,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et si je m’en abstiens, ╵va-t-elle me quitter ?
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Oui, à l’heure présente, ╵Dieu m’a poussé à bout,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: oui, tu as ravagé
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '16.7 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Au milieu de son discours, Job se tourne soudain vers Dieu.
      marker-yv: yv-n
    - type: text
      text: ' ╵toute ma maisonnée.'
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tu m’as creusé des rides, ╵elles témoignent contre moi,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et ma maigreur se lève ╵pour m’accuser
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '16.8 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Comme un faux témoin accusant Job d’être coupable, puisqu’il souffre.
      marker-yv: yv-n
    - type: text
      text: .
  '9':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Dans sa colère, ╵Dieu me déchire ╵et il s’attaque à moi,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: il grince des dents
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '16.9 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Dieu est comparé à un lion (comparer '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: '10.16'
        - type: text
          text: ) qui l’attaque et le déchire.
      marker-yv: yv-n
    - type: text
      text: ' contre moi.'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mon adversaire ╵me transperce de ses regards.
