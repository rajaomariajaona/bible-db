document_id: JOB.16,21
type_code: fra
verses:
  '1':
  - type: heading
    content: Réponse de Job à Éliphaz
  - type: heading
    content: Job, blessé par les propos de ses amis
  - type: text
    content: 'Alors Job prit la parole et dit :'
  '10':
  - type: text
    content: Ils ouvrent contre moi ╵leur bouche toute grande.
  - type: text
    content: Leurs outrages me giflent,
  - type: text
    content: ils se liguent tous contre moi.
  '11':
  - type: text
    content: Dieu m’a livré ╵au pouvoir des injustes,
  - type: text
    content: il m’a jeté en proie ╵à des méchants.
  '12':
  - type: text
    content: Je vivais en repos, ╵et il m’a secoué,
  - type: text
    content: il m’a pris par la nuque, ╵pour me briser,
  - type: text
    content: puis il m’a relevé ╵pour me prendre pour cible,
  '13':
  - type: text
    content: ses flèches m’environnent,
  - type: text
    content: il transperce mes reins, ╵sans aucune pitié
  - type: text
    content: il répand à terre ma bile.
  '14':
  - type: text
    content: Il m’inflige blessure ╵après blessure.
  - type: text
    content: Il s’est rué sur moi ╵comme un guerrier.
  '15':
  - type: text
    content: J’ai cousu pour ma peau ╵une toile de sac,
  - type: text
    content: et j’ai traîné ma dignité ╵dans la poussière.
  '16':
  - type: text
    content: Mon visage est rougi ╵à force de pleurer,
  - type: text
    content: et l’obscurité la plus noire ╵s’étend sur mes paupières.
  '17':
  - type: text
    content: Pourtant mes mains n’ont pas commis ╵d’actes de violence
  - type: text
    content: et ma prière ╵est sans hypocrisie.
  '18':
  - type: text
    content: Ne couvre pas mon sang, ô terre,
  - type: text
    content: et que mon cri ╵ne soit pas étouffé.
  '19':
  - type: text
    content: 'Dès à présent : ╵j’ai un témoin au ciel,'
  - type: text
    content: oui j’ai dans les lieux élevés, ╵quelqu’un qui témoigne pour moi.
  '2':
  - type: text
    content: J’ai entendu beaucoup ╵de discours de ce genre,
  - type: text
    content: vous êtes tous ╵des consolateurs bien pénibles !
  '20':
  - type: text
    content: 'Mes amis se moquent de moi :'
  - type: text
    content: les yeux baignés de larmes, ╵je me tourne vers Dieu.
  '21':
  - type: text
    content: Qu’il
  - type: note
    content: 'il: c’est-à-dire le témoin (v. 19), qui n’est sans doute autre que Dieu lui-même (v. 20 ; voir 17.3).'
  - type: text
    content: ' prenne la défense ╵d’un homme devant Dieu,'
  - type: text
    content: et qu’il arbitre ╵entre l’homme et son compagnon
  - type: note
    content: 'Autre traduction : comme le fait un homme pour son ami.'
  - type: text
    content: .
  '22':
  - type: text
    content: Ma vie touche à sa fin
  - type: text
    content: et je m’en vais par le chemin ╵d’où l’on ne revient pas.
  '3':
  - type: text
    content: Cesseras-tu ╵de parler pour du vent ?
  - type: text
    content: Qu’est-ce qui te contraint ╵à répliquer encore
  - type: note
    content: Réponse à Eliphaz (voir 15.2).
  - type: text
    content: '  ?'
  '4':
  - type: text
    content: Si vous étiez vous-mêmes ╵à la place où je suis,
  - type: text
    content: je pourrais parler comme vous,
  - type: text
    content: tenir contre vous des discours,
  - type: text
    content: et, à votre sujet, ╵hocher la tête
  - type: note
    content: Geste de mépris et d’insulte (Ps 22.8 ; Jr 48.27 ; Mt 27.39).
  - type: text
    content: .
  '5':
  - type: text
    content: Je vous fortifierais ╵par mes paroles,
  - type: text
    content: je vous soulagerais ╵par mes lèvres pleines de mots.
  '6':
  - type: text
    content: Cependant, si je parle, ╵pour autant ma souffrance ╵n’en est pas soulagée,
  - type: text
    content: et si je m’en abstiens, ╵va-t-elle me quitter ?
  '7':
  - type: text
    content: Oui, à l’heure présente, ╵Dieu m’a poussé à bout,
  - type: text
    content: oui, tu as ravagé
  - type: note
    content: Au milieu de son discours, Job se tourne soudain vers Dieu.
  - type: text
    content: ' ╵toute ma maisonnée.'
  '8':
  - type: text
    content: Tu m’as creusé des rides, ╵elles témoignent contre moi,
  - type: text
    content: et ma maigreur se lève ╵pour m’accuser
  - type: note
    content: Comme un faux témoin accusant Job d’être coupable, puisqu’il souffre.
  - type: text
    content: .
  '9':
  - type: text
    content: Dans sa colère, ╵Dieu me déchire ╵et il s’attaque à moi,
  - type: text
    content: il grince des dents
  - type: note
    content: Dieu est comparé à un lion (comparer 10.16) qui l’attaque et le déchire.
  - type: text
    content: ' contre moi.'
  - type: text
    content: Mon adversaire ╵me transperce de ses regards.
