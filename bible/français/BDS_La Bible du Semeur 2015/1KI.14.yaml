document_id: 1KI.14,21
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Le prophète Ahiya annonce le châtiment
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: A la même époque, Abiya, fils de Jéroboam, tomba malade.
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'C’est pourquoi je vais faire venir le malheur sur ta famille : j’en exterminerai tous les hommes, qu’ils soient esclaves ou hommes libres, je balaierai tous tes descendants, comme on balaie les ordures jusqu’à ce qu’il n’en reste plus rien. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'Ceux d’entre eux qui mourront dans la ville seront mangés par les chiens et ceux qui mourront dans la campagne seront déchiquetés par les rapaces. » Voilà ce que l’Eternel a déclaré. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'Quant à toi, va, rentre chez toi. Dès que tu mettras le pied dans la ville, ton enfant mourra. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'Tout Israël prendra le deuil pour lui et on l’enterrera ; c’est le seul descendant de Jéroboam qui sera déposé dans une tombe parce qu’il est le seul membre de sa famille en qui l’Eternel, le Dieu d’Israël, ait trouvé quelque chose de bon. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'Par la suite, l’Eternel établira pour lui-même un nouveau roi sur Israël qui exterminera la famille de Jéroboam. Ce jour viendra. Que dis-je : il est déjà là. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'L’Eternel frappera les gens d’Israël qui ressembleront aux roseaux agités dans les eaux. Il arrachera Israël de ce bon pays qu’il a donné à leurs ancêtres et il les dispersera de l’autre côté de l’Euphrate, parce qu’ils ont provoqué sa colère en fabriquant des poteaux sacrés dédiés à la déesse Ashéra. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: L’Eternel les abandonnera à cause des péchés que Jéroboam a commis et à cause de ceux dans lesquels il a entraîné le peuple.
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: La femme de Jéroboam se mit en route pour regagner Tirtsa
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '14.17 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Cité royale, avec Sichem (15.33 ; 16.8), des souverains d’Israël jusqu’à la construction de Samarie par Omri (
        - type: usfm
          marker: ref
          children:
          - type: text
            text: '16.24'
        - type: text
          text: '). Sa localisation n’est pas sûre : on propose Tell el-Farah à une douzaine de kilomètres au nord de Sichem.'
      marker-yv: yv-n
    - type: text
      text: '. Au moment où elle franchissait le seuil de sa maison, son garçon mourut. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: On l’enterra et tout Israël prit le deuil pour lui, comme l’Eternel l’avait annoncé par l’intermédiaire de son serviteur le prophète Ahiya.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: La fin de Jéroboam
    marker-yv: yv-h
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'Les autres faits et gestes de Jéroboam, ses guerres et les événements de son règne, sont consignés dans le livre des Annales des rois d’Israël. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'Jéroboam ordonna à sa femme : Viens, déguise-toi pour qu’on ne reconnaisse pas que tu es la reine, puis va à Silo. C’est là qu’habite le prophète Ahiya, celui qui a prédit que je deviendrais roi de ce peuple. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: Après vingt-deux ans
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '14.20 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Jéroboam a régné environ de 931 à 913 av. J.-C.
      marker-yv: yv-n
    - type: text
      text: ' de règne, il rejoignit ses ancêtres décédés et son fils Nadab lui succéda sur le trône.'
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Le règne de Roboam sur Juda
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: (2 Ch 12.13-14)
    marker-yv: yv-h
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: Roboam, le fils de Salomon, régna sur Juda ; il avait quarante et un ans à son avènement et il régna dix-sept ans à Jérusalem, la ville que l’Eternel avait choisie parmi toutes les tribus d’Israël pour y établir sa présence. Sa mère était une Ammonite nommée Naama.
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: 'Les gens de Juda firent ce que l’Eternel considère comme mal ; par les péchés qu’ils commirent, ils provoquèrent la colère de son amour bafoué plus que ne l’avaient jamais fait leurs ancêtres. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: Eux aussi, ils se construisirent des hauts lieux et ils dressèrent des stèles et des poteaux pour la déesse Ashéra sur toute colline élevée, sous les arbres verdoyants
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '14.23 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Voir Dt 7.5 ; 12.2-3 ; 2 R 17.9-10. Les cultes païens se célébraient dans des bosquets d’arbres toujours verts offrant un abri aux rites immoraux qui s’y pratiquaient (v. 24).
      marker-yv: yv-n
    - type: text
      text: ' qui y poussaient'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '14.23 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Voir Ex 23.24 ; Lv 26.1 ; Dt 16.21-22.
      marker-yv: yv-n
    - type: text
      text: '. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: Il y eut même, dans le pays, des hommes et des femmes se livrant à la prostitution sacrée
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '14.24 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Voir '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: Dt 23.18
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: . Le peuple reprit toutes les pratiques abominables des peuples que l’Eternel avait dépossédés en faveur des Israélites.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: L’invasion égyptienne
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: (2 Ch 12.2-12)
    marker-yv: yv-h
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: La cinquième année du règne de Roboam, Shishaq
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '14.25 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Voir note '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: '11.40'
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: ', roi d’Egypte, vint attaquer Jérusalem. '
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: Il s’empara des trésors du temple de l’Eternel et de ceux du palais royal. Il prit absolument tout, notamment tous les boucliers d’or que Salomon avait fait faire
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '14.26 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Voir 1 R 10.16-17 ; 2 Ch 9.15-16.
      marker-yv: yv-n
    - type: text
      text: '. '
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: 'Le roi Roboam fit faire des boucliers de bronze pour les remplacer et les confia aux chefs des gardes chargés de surveiller l’entrée du palais royal. '
  '28':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: Chaque fois que le roi se rendait au temple de l’Eternel, les gardes les enlevaient, puis ils les replaçaient dans la salle du corps de garde.
  '29':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: 'Les autres faits et gestes de Roboam et toutes ses réalisations sont cités dans le livre des Annales des rois de Juda. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: Tu emporteras comme cadeaux dix pains, des gâteaux et un pot de miel. Tu iras le trouver et il te fera savoir ce qui arrivera au garçon.
  '30':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '30'
    - type: text
      text: 'Roboam et Jéroboam furent tout le temps en guerre l’un contre l’autre. '
  '31':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '31'
    - type: text
      text: Quand Roboam rejoignit ses ancêtres décédés, il fut enterré dans leur tombeau dans la Cité de David. Sa mère était une Ammonite du nom de Naama. Son fils Abiyam
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '14.31 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Il régna de 913 à 910 av. J.-C. Quelques manuscrits hébreux, plusieurs versions anciennes et '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: 2 Ch 12.16
        - type: text
          text: ' l’appellent : '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: Abiya.
      marker-yv: yv-n
    - type: text
      text: ' lui succéda sur le trône.'
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'La femme de Jéroboam fit comme son mari le lui avait demandé : elle se mit en route pour Silo et se rendit dans la maison d’Ahiya. Ahiya était si âgé que ses yeux s’étaient éteints et qu’il ne voyait plus.'
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'Mais l’Eternel lui avait dit : Voici que la femme de Jéroboam va venir te consulter au sujet de son fils parce qu’il est malade. Tu lui parleras de telle et telle manière. Quand elle entrera chez toi, elle essaiera de se faire passer pour quelqu’un d’autre.'
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'Dès qu’Ahiya entendit le bruit de ses pas devant la porte, il s’écria : Entre, femme de Jéroboam ! Pourquoi essaies-tu de te faire passer pour une autre ? De toute manière, je suis chargé de te transmettre une parole sévère. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'Retourne dire à Jéroboam : « Voici ce que te déclare l’Eternel, le Dieu d’Israël : Je t’ai mis en honneur au sein de ton peuple et je t’ai établi chef de mon peuple Israël. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'J’ai arraché le royaume à la dynastie de David pour te le donner. Mais tu n’as pas imité mon serviteur David qui a obéi à mes commandements et m’a suivi de tout son cœur pour faire uniquement ce que je considère comme juste. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'Tu as agi encore plus mal que tous tes prédécesseurs : tu es allé fabriquer d’autres dieux, des idoles de métal fondu ; tu m’as ainsi irrité et tu m’as tourné le dos. '
