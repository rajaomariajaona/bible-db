document_id: ZEC.13,21
type_code: fra
verses:
  '1':
  - type: text
    content: En ce jour-là, jaillira une source pour purifier de leurs péchés et de leurs impuretés, la famille de David et les habitants de Jérusalem.
  - type: heading
    content: Le jugement des adorateurs d’idoles
  '2':
  - type: text
    content: 'Et il arrivera en ce jour-là, déclare l’Eternel, le Seigneur des armées célestes, que j’extirperai du pays jusqu’au nom des idoles : et l’on ne s’en souviendra plus. J’ôterai aussi du pays les faux prophètes et les dispositions impures. '
  '3':
  - type: text
    content: 'Si quelqu’un prophétise encore, alors son propre père et sa mère elle-même, eux qui l’ont engendré, lui déclareront : « Tu ne resteras pas en vie. Car tu dis des mensonges au nom de l’Eternel. » Et son père et sa mère, eux qui l’ont engendré, transperceront leur fils pendant qu’il prophétisera'
  - type: note
    content: Voir Dt 13.6-9.
  - type: text
    content: '. '
  '4':
  - type: text
    content: Et il arrivera en ce jour-là, que tous les faux prophètes seront remplis de honte alors qu’ils prophétiseront, à cause des révélations qu’ils auront apportées. Ils ne porteront plus de manteau de poil
  - type: note
    content: Signe distinctif de certains prophètes (1 R 19.13, 19 ; 2 R 1.8).
  - type: text
    content: ' pour tromper. '
  '5':
  - type: text
    content: 'Chacun protestera : « Je ne suis pas prophète, moi, je cultive la terre et l’on a loué mes services'
  - type: note
    content: 'l’on a loué mes services. Autre traduction : je possède la terre.'
  - type: text
    content: ' depuis le temps de ma jeunesse. » '
  '6':
  - type: text
    content: 'Et quand on lui dira : « Que sont donc ces blessures que l’on voit sur ton corps ? » alors il répondra : « C’est la trace des coups reçus dans la maison de mes amis'
  - type: note
    content: 'Autre traduction : mes amants. Les faux prophètes se faisaient parfois des incisions pour attirer l’attention de leur divinité sur eux (voir 1 R 18.28). Les faux prophètes auront eux-mêmes honte et n’oseront plus se donner pour prophètes.'
  - type: text
    content: . »
  - type: heading
    content: L’alliance renouvelée
  '7':
  - type: text
    content: Epée, réveille-toi ╵contre mon berger, le chef de mon peuple,
  - type: text
    content: contre mon compagnon
  - type: note
    content: Cité en Mt 26.31 ; Mc 14.27.
  - type: text
    content: ','
  - type: text
    content: demande l’Eternel, ╵le Seigneur des armées célestes.
  - type: text
    content: 'Va, frappe le berger :'
  - type: text
    content: que les brebis soient dispersées !
  - type: text
    content: Je porterai la main ╵sur les petits.
  '8':
  - type: text
    content: Alors dans le pays entier,
  - type: text
    content: l’Eternel le déclare,
  - type: text
    content: les deux tiers des humains ╵seront exterminés, ╵ils périront,
  - type: text
    content: seul un tiers survivra.
  '9':
  - type: text
    content: Et je ferai passer ╵ce tiers-là par le feu,
  - type: text
    content: oui, je l’épurerai
  - type: text
    content: ainsi qu’on épure l’argent.
  - type: text
    content: Et je l’éprouverai
  - type: text
    content: comme on éprouve l’or.
  - type: text
    content: Ce tiers m’invoquera
  - type: text
    content: et je l’exaucerai.
  - type: text
    content: 'Je dirai : « C’est mon peuple. »'
  - type: text
    content: 'Lui, il confessera : ╵« L’Eternel est mon Dieu'
  - type: note
    content: Voir Ex 6.7 ; 19.5-6 ; 20.1 ; Dt 29.12.
  - type: text
    content: . »
