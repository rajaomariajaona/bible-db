document_id: ZEC.13
type_code: fra
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: En ce jour-là, jaillira une source pour purifier de leurs péchés et de leurs impuretés, la famille de David et les habitants de Jérusalem.
- type: usfm
  marker: s2
  children:
  - type: text
    text: Le jugement des adorateurs d’idoles
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Et il arrivera en ce jour-là, déclare l’Eternel, le Seigneur des armées célestes, que j’extirperai du pays jusqu’au nom des idoles : et l’on ne s’en souviendra plus. J’ôterai aussi du pays les faux prophètes et les dispositions impures. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Si quelqu’un prophétise encore, alors son propre père et sa mère elle-même, eux qui l’ont engendré, lui déclareront : « Tu ne resteras pas en vie. Car tu dis des mensonges au nom de l’Eternel. » Et son père et sa mère, eux qui l’ont engendré, transperceront leur fils pendant qu’il prophétisera'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '13.3 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Voir '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Dt 13.6-9
        metadata:
          usfm: DEU.13.6+DEU.13.7+DEU.13.8+DEU.13.9
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Et il arrivera en ce jour-là, que tous les faux prophètes seront remplis de honte alors qu’ils prophétiseront, à cause des révélations qu’ils auront apportées. Ils ne porteront plus de manteau de poil
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '13.4 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Signe distinctif de certains prophètes (1 R 19.13, 19 ; 2 R 1.8).
    marker-yv: yv-n
  - type: text
    text: ' pour tromper. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Chacun protestera : « Je ne suis pas prophète, moi, je cultive la terre et l’on a loué mes services'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '13.5 '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'l’on a loué mes services. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Autre traduction : '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: je possède la terre.
    marker-yv: yv-n
  - type: text
    text: ' depuis le temps de ma jeunesse. » '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Et quand on lui dira : « Que sont donc ces blessures que l’on voit sur ton corps ? » alors il répondra : « C’est la trace des coups reçus dans la maison de mes amis'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '13.6 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Autre traduction : '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'mes amants. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Les faux prophètes se faisaient parfois des incisions pour attirer l’attention de leur divinité sur eux (voir '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1 R 18.28
        metadata:
          usfm: 1KI.18.28
      - type: text
        text: ). Les faux prophètes auront eux-mêmes honte et n’oseront plus se donner pour prophètes.
    marker-yv: yv-n
  - type: text
    text: . »
- type: usfm
  marker: s2
  children:
  - type: text
    text: L’alliance renouvelée
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Epée, réveille-toi ╵contre mon berger, le chef de mon peuple,
- type: usfm
  marker: q1
  children:
  - type: text
    text: contre mon compagnon
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '13.7 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Cité en Mt 26.31 ; Mc 14.27.
    marker-yv: yv-n
  - type: text
    text: ','
- type: usfm
  marker: q1
  children:
  - type: text
    text: demande l’Eternel, ╵le Seigneur des armées célestes.
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Va, frappe le berger :'
- type: usfm
  marker: q1
  children:
  - type: text
    text: que les brebis soient dispersées !
- type: usfm
  marker: q1
  children:
  - type: text
    text: Je porterai la main ╵sur les petits.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Alors dans le pays entier,
- type: usfm
  marker: q1
  children:
  - type: text
    text: l’Eternel le déclare,
- type: usfm
  marker: q1
  children:
  - type: text
    text: les deux tiers des humains ╵seront exterminés, ╵ils périront,
- type: usfm
  marker: q1
  children:
  - type: text
    text: seul un tiers survivra.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Et je ferai passer ╵ce tiers-là par le feu,
- type: usfm
  marker: q1
  children:
  - type: text
    text: oui, je l’épurerai
- type: usfm
  marker: q1
  children:
  - type: text
    text: ainsi qu’on épure l’argent.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et je l’éprouverai
- type: usfm
  marker: q1
  children:
  - type: text
    text: comme on éprouve l’or.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ce tiers m’invoquera
- type: usfm
  marker: q1
  children:
  - type: text
    text: et je l’exaucerai.
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Je dirai : « C’est mon peuple. »'
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Lui, il confessera : ╵« L’Eternel est mon Dieu'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '13.9 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Voir Ex 6.7 ; 19.5-6 ; 20.1 ; Dt 29.12.
    marker-yv: yv-n
  - type: text
    text: . »
