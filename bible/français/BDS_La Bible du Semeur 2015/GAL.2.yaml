document_id: GAL.2,21
type_code: fra
verses:
  '1':
  - type: heading
    content: Paul et les autres apôtres
  - type: text
    content: Ce n’est que quatorze ans plus tard que je suis remonté à Jérusalem en compagnie de Barnabas. J’avais aussi emmené Tite avec moi
  - type: note
    content: 'Selon plusieurs, il s’agirait du voyage mentionné en Ac 11.30 et 12.25 autour de l’an 46. D’autres pensent qu’il s’agirait du voyage mentionné en Ac 15. Barnabas: un lévite converti, originaire de l’île de Chypre (Ac 4.36), qui a accompagné Paul lors de son premier voyage missionnaire. Tite: un chrétien d’origine non juive auquel Paul écrira une lettre vers la fin de sa vie.'
  - type: text
    content: '. '
  '10':
  - type: text
    content: Ils nous ont seulement demandé de nous souvenir des pauvres – ce que j’ai bien pris soin de faire.
  - type: heading
    content: Paul et Pierre à Antioche
  '11':
  - type: text
    content: Mais, lorsque Pierre est venu à Antioche
  - type: note
    content: Antioche de Syrie (voir Ac 11.19-26).
  - type: text
    content: ', je me suis opposé ouvertement à lui, car il avait tort. '
  '12':
  - type: text
    content: En effet, avant l’arrivée de quelques personnes de l’entourage de Jacques, il prenait part aux repas communs avec les croyants non juifs ; mais après leur venue, il s’est esquivé et s’est tenu à l’écart, parce qu’il craignait les croyants d’origine juive
  - type: note
    content: 'Autre traduction : il craignait les Juifs. La Loi interdisait aux Juifs de manger avec des non-Juifs ; or, la cène se prenait au cours d’un repas. Pour ne pas scandaliser les judaïsants, Pierre s’est plié à leurs exigences et n’a donc plus mangé (ni probablement pris la cène) avec des chrétiens issus du paganisme.'
  - type: text
    content: '. '
  '13':
  - type: text
    content: 'Comme lui, les autres chrétiens d’origine juive se sont mis, eux aussi, à cacher leurs véritables convictions, au point que Barnabas lui-même s’est laissé entraîner par leur dissimulation. '
  '14':
  - type: text
    content: 'Mais quand j’ai vu qu’ils ne marchaient pas droit, selon la vérité de l’Evangile, j’ai dit à Pierre devant tous les frères : « Toi qui es juif, tu vis comme un croyant d’origine païenne, et non comme un Juif. Comment peux-tu vouloir obliger les frères et sœurs d’origine païenne à vivre comme des Juifs ? » '
  '15':
  - type: text
    content: Nous qui sommes juifs de naissance, nous ne faisons pas partie de ces « pécheurs » que sont les païens
  - type: note
    content: Les Juifs traitaient tous les païens de pécheurs.
  - type: text
    content: '. '
  '16':
  - type: text
    content: 'Cependant, nous avons compris qu’on est déclaré juste devant Dieu, non parce qu’on accomplit les œuvres que commande la Loi, mais uniquement par la foi en Jésus-Christ. C’est pourquoi nous avons, nous aussi, placé notre confiance en Jésus-Christ pour être déclarés justes par la foi et non parce que nous aurions accompli ce que la Loi ordonne. Car '
  - type: text
    content: personne ne sera déclaré juste devant Dieu
  - type: note
    content: Ps 143.2.
  - type: text
    content: ' parce qu’il aura accompli ce qu’ordonne la Loi. '
  '17':
  - type: text
    content: 'Mais si, en cherchant à être déclarés justes dans l’union avec Christ, nous avons montré par là même que nous étions des pécheurs comme les païens, cela signifie-t-il que Christ est complice du péché ? Loin de là ! '
  '18':
  - type: text
    content: 'Car si je remets en vigueur le régime de la Loi que j’ai abandonné, alors je me place moi-même dans la situation d’un homme qui transgresse la Loi. '
  '19':
  - type: text
    content: 'Car c’est par la Loi que je suis mort au régime de la Loi afin de vivre pour Dieu. En effet, je suis crucifié avec Christ. '
  '2':
  - type: text
    content: 'J’ai fait ce voyage pour obéir à une révélation divine. J’y ai exposé l’Evangile que j’annonce parmi les non-Juifs, je l’ai exposé dans un entretien particulier à ceux qui sont les plus considérés. Car je ne voulais pas que tout mon travail passé et futur soit compromis. '
  '20':
  - type: text
    content: 'Ce n’est plus moi qui vis, c’est Christ qui vit en moi. Ma vie en tant qu’homme, je la vis maintenant dans la foi au Fils de Dieu qui, par amour pour moi, s’est livré à la mort à ma place. '
  '21':
  - type: text
    content: Ainsi, je ne rejette pas la grâce de Dieu car si c’est l’obéissance à la Loi qui permet d’être déclaré juste, alors Christ est mort pour rien !
  '3':
  - type: text
    content: 'Or Tite, mon compagnon, était d’origine païenne. Eh bien, on ne l’a même pas obligé à se soumettre au rite de la circoncision. '
  '4':
  - type: text
    content: 'Et cela, malgré la présence de faux frères, des intrus qui s’étaient infiltrés dans nos rangs pour espionner la liberté dont nous jouissons dans notre union avec Jésus-Christ. Ils voulaient faire de nous des esclaves. '
  '5':
  - type: text
    content: Mais nous ne leur avons pas cédé un seul instant ni fait la moindre concession afin que la vérité de l’Evangile soit maintenue pour vous.
  '6':
  - type: text
    content: 'Quelle a été, à cet égard, l’attitude des personnes les plus considérées ? – En fait, ce qu’elles étaient alors m’importe peu, car Dieu ne fait pas de favoritisme. – Eh bien, ces personnes-là ne m’ont pas imposé d’autres directives. '
  '7':
  - type: text
    content: 'Au contraire ! Ils ont constaté que Dieu m’avait confié la charge d’annoncer l’Evangile aux non-Juifs comme à Pierre celle de l’annoncer aux Juifs. '
  '8':
  - type: text
    content: '– Car celui qui a agi en Pierre pour qu’il soit l’apôtre des Juifs a aussi agi en moi pour que je sois celui des non-Juifs. – '
  '9':
  - type: text
    content: 'Ainsi Jacques, Pierre et Jean, qui sont considérés comme « colonnes » de l’Eglise, ont reconnu que Dieu, dans sa grâce, m’avait confié cette tâche particulière. C’est pourquoi ils nous ont serré la main, à Barnabas et à moi, en signe d’accord et de communion ; et nous avons convenu ensemble que nous irions, nous, vers les peuples païens tandis qu’eux se consacreraient aux Juifs. '
