document_id: EXO.5,21
type_code: fra
verses:
  '1':
  - type: usfm
    marker: ms1
    children:
    - type: text
      text: Face au pharaon
    marker-yv: yv-h
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Moïse et Aaron devant le pharaon
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Après cela, Moïse et Aaron se rendirent auprès du pharaon et lui dirent : Voici ce que dit l’Eternel, le Dieu d’Israël : « Laisse aller mon peuple pour qu’il célèbre une fête en mon honneur dans le désert. »'
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'Les chefs de corvées et les surveillants sortirent et allèrent informer le peuple en disant : Le pharaon a déclaré qu’il ne vous fournira plus de paille. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: Allez donc vous-mêmes vous en procurer là où vous en trouverez ! Et la production qui vous est imposée n’en sera pas réduite pour autant.
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'Le peuple se répandit dans tout le pays pour ramasser du chaume en guise de paille. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'Les chefs de corvées les harcelaient : Finissez la quantité exigée pour chaque jour, comme lorsque la paille vous était fournie !'
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'Et les chefs de corvées du pharaon se mirent à frapper les surveillants des Israélites qu’ils avaient établis sur eux en leur demandant : Pourquoi n’avez-vous pas fourni ces jours-ci la même quantité de briques qu’auparavant ?'
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'Les surveillants des Israélites allèrent se plaindre au pharaon et lui demandèrent : Pourquoi agis-tu ainsi envers tes serviteurs ? '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'On ne fournit plus de paille à tes serviteurs et on nous dit : « Faites des briques ! » A présent, tes serviteurs sont battus. Ce que font tes gens est injuste !'
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'Le pharaon répliqua : Vous êtes des fainéants, oui, des fainéants ! Voilà pourquoi vous dites : « Allons offrir des sacrifices à l’Eternel. » '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'Maintenant : Allez travailler ! On ne vous fournira plus de paille, mais vous livrerez la quantité de briques qui vous a été imposée.'
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'Les surveillants des Israélites se virent dans une très mauvaise situation puisqu’on refusait de leur réduire la quantité de briques à livrer chaque jour. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'Le pharaon répondit : Qui est l’Eternel, pour que je lui obéisse en laissant partir d’ici les Israélites ? Je ne le connais pas, aussi ne les laisserai-je pas partir.'
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: 'En sortant de chez le pharaon, ils s’en prirent à Moïse et Aaron qui les attendaient, '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: 'et ils leur dirent : Que l’Eternel constate ce que vous avez fait et en soit juge ! A cause de vous, le pharaon et ses gens ne peuvent plus nous supporter. Vous leur avez mis l’épée en mains pour nous tuer !'
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: 'Alors Moïse se tourna vers l’Eternel et lui dit : O Seigneur ! Pourquoi fais-tu du mal à ce peuple ? Pourquoi donc m’as-tu envoyé ici ? '
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: Depuis que je suis venu trouver le pharaon pour lui parler en ton nom, il a maltraité ce peuple, et toi tu n’as rien fait pour délivrer ton peuple !
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'Ils reprirent : Le Dieu des Hébreux nous est apparu. Permets-nous donc d’aller à trois journées de marche dans le désert'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '5.3 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Voir '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: '3.18'
        - type: text
          text: '. La raison pour aller sacrifier loin des Egyptiens est donnée en '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: '8.22'
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: ' pour offrir des sacrifices à l’Eternel, notre Dieu, pour qu’il ne nous frappe pas par une épidémie ou par la guerre.'
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'Mais le pharaon leur répliqua : Moïse et Aaron, pourquoi détournez-vous le peuple de ses travaux ? Retournez à vos corvées ! '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'Il ajouta : Ces gens sont maintenant très nombreux dans le pays. Et vous voudriez leur faire interrompre leurs corvées !'
  - type: usfm
    marker: s1
    children:
    - type: text
      text: L’oppression se fait encore plus dure
    marker-yv: yv-h
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: Ce même jour, le pharaon donna aux chefs de corvées et aux surveillants
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '5.6 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Les premiers sont des Egyptiens (même mot qu’
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'oppresseurs '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'en '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: '3.7'
        - type: text
          text: '), les seconds des Israélites (contremaîtres, grec : '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: scribes
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ) chargés de rendre compte du travail fourni.
      marker-yv: yv-n
    - type: text
      text: ' du peuple l’ordre suivant : '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: Vous ne fournirez plus de paille aux gens de ce peuple pour confectionner des briques, comme on l’a fait jusqu’ici ; ils iront eux-mêmes ramasser la paille nécessaire
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '5.7 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Les briques étaient seulement séchées au soleil, la paille augmentait leur solidité. Lors de la moisson, on coupait seulement les épis ; la paille restait sur pied.
      marker-yv: yv-n
    - type: text
      text: '. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'Vous exigerez d’eux la même quantité de briques qu’auparavant, pas une de moins, car ce sont des fainéants ; c’est pour cela qu’ils crient : Allons offrir des sacrifices à notre Dieu. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: Ecrasez-les de travaux, qu’ils aient de quoi s’occuper, et ils ne prêteront plus attention à des paroles mensongères.
