document_id: EXO.5,21
type_code: fra
verses:
  '1':
  - type: heading
    content: Face au pharaon
  - type: heading
    content: Moïse et Aaron devant le pharaon
  - type: text
    content: 'Après cela, Moïse et Aaron se rendirent auprès du pharaon et lui dirent : Voici ce que dit l’Eternel, le Dieu d’Israël : « Laisse aller mon peuple pour qu’il célèbre une fête en mon honneur dans le désert. »'
  '10':
  - type: text
    content: 'Les chefs de corvées et les surveillants sortirent et allèrent informer le peuple en disant : Le pharaon a déclaré qu’il ne vous fournira plus de paille. '
  '11':
  - type: text
    content: Allez donc vous-mêmes vous en procurer là où vous en trouverez ! Et la production qui vous est imposée n’en sera pas réduite pour autant.
  '12':
  - type: text
    content: 'Le peuple se répandit dans tout le pays pour ramasser du chaume en guise de paille. '
  '13':
  - type: text
    content: 'Les chefs de corvées les harcelaient : Finissez la quantité exigée pour chaque jour, comme lorsque la paille vous était fournie !'
  '14':
  - type: text
    content: 'Et les chefs de corvées du pharaon se mirent à frapper les surveillants des Israélites qu’ils avaient établis sur eux en leur demandant : Pourquoi n’avez-vous pas fourni ces jours-ci la même quantité de briques qu’auparavant ?'
  '15':
  - type: text
    content: 'Les surveillants des Israélites allèrent se plaindre au pharaon et lui demandèrent : Pourquoi agis-tu ainsi envers tes serviteurs ? '
  '16':
  - type: text
    content: 'On ne fournit plus de paille à tes serviteurs et on nous dit : « Faites des briques ! » A présent, tes serviteurs sont battus. Ce que font tes gens est injuste !'
  '17':
  - type: text
    content: 'Le pharaon répliqua : Vous êtes des fainéants, oui, des fainéants ! Voilà pourquoi vous dites : « Allons offrir des sacrifices à l’Eternel. » '
  '18':
  - type: text
    content: 'Maintenant : Allez travailler ! On ne vous fournira plus de paille, mais vous livrerez la quantité de briques qui vous a été imposée.'
  '19':
  - type: text
    content: 'Les surveillants des Israélites se virent dans une très mauvaise situation puisqu’on refusait de leur réduire la quantité de briques à livrer chaque jour. '
  '2':
  - type: text
    content: 'Le pharaon répondit : Qui est l’Eternel, pour que je lui obéisse en laissant partir d’ici les Israélites ? Je ne le connais pas, aussi ne les laisserai-je pas partir.'
  '20':
  - type: text
    content: 'En sortant de chez le pharaon, ils s’en prirent à Moïse et Aaron qui les attendaient, '
  '21':
  - type: text
    content: 'et ils leur dirent : Que l’Eternel constate ce que vous avez fait et en soit juge ! A cause de vous, le pharaon et ses gens ne peuvent plus nous supporter. Vous leur avez mis l’épée en mains pour nous tuer !'
  '22':
  - type: text
    content: 'Alors Moïse se tourna vers l’Eternel et lui dit : O Seigneur ! Pourquoi fais-tu du mal à ce peuple ? Pourquoi donc m’as-tu envoyé ici ? '
  '23':
  - type: text
    content: Depuis que je suis venu trouver le pharaon pour lui parler en ton nom, il a maltraité ce peuple, et toi tu n’as rien fait pour délivrer ton peuple !
  '3':
  - type: text
    content: 'Ils reprirent : Le Dieu des Hébreux nous est apparu. Permets-nous donc d’aller à trois journées de marche dans le désert'
  - type: note
    content: Voir 3.18. La raison pour aller sacrifier loin des Egyptiens est donnée en 8.22.
  - type: text
    content: ' pour offrir des sacrifices à l’Eternel, notre Dieu, pour qu’il ne nous frappe pas par une épidémie ou par la guerre.'
  '4':
  - type: text
    content: 'Mais le pharaon leur répliqua : Moïse et Aaron, pourquoi détournez-vous le peuple de ses travaux ? Retournez à vos corvées ! '
  '5':
  - type: text
    content: 'Il ajouta : Ces gens sont maintenant très nombreux dans le pays. Et vous voudriez leur faire interrompre leurs corvées !'
  - type: heading
    content: L’oppression se fait encore plus dure
  '6':
  - type: text
    content: Ce même jour, le pharaon donna aux chefs de corvées et aux surveillants
  - type: note
    content: 'Les premiers sont des Egyptiens (même mot qu’oppresseurs en 3.7), les seconds des Israélites (contremaîtres, grec : scribes) chargés de rendre compte du travail fourni.'
  - type: text
    content: ' du peuple l’ordre suivant : '
  '7':
  - type: text
    content: Vous ne fournirez plus de paille aux gens de ce peuple pour confectionner des briques, comme on l’a fait jusqu’ici ; ils iront eux-mêmes ramasser la paille nécessaire
  - type: note
    content: Les briques étaient seulement séchées au soleil, la paille augmentait leur solidité. Lors de la moisson, on coupait seulement les épis ; la paille restait sur pied.
  - type: text
    content: '. '
  '8':
  - type: text
    content: 'Vous exigerez d’eux la même quantité de briques qu’auparavant, pas une de moins, car ce sont des fainéants ; c’est pour cela qu’ils crient : Allons offrir des sacrifices à notre Dieu. '
  '9':
  - type: text
    content: Ecrasez-les de travaux, qu’ils aient de quoi s’occuper, et ils ne prêteront plus attention à des paroles mensongères.
