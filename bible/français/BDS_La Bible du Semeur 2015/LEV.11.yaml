document_id: LEV.11,21
type_code: fra
verses:
  '1':
  - type: usfm
    marker: ms1
    children:
    - type: text
      text: Lois sur le pur et l’impur
    marker-yv: yv-h
  - type: usfm
    marker: s1
    children:
    - type: text
      text: La loi sur les animaux purs et impurs
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'L’Eternel s’adressa à Moïse et à Aaron, et leur dit : '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Mais vous aurez en abomination tout ce qui n’a pas de nageoires ni d’écailles, parmi tout ce qui grouille et qui vit dans les mers et dans les rivières. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ils seront pour vous une abomination ; vous n’en mangerez pas la chair et leurs cadavres vous seront en abomination. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Tout animal aquatique dépourvu de nageoires et d’écailles sera pour vous une abomination.
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Voici les oiseaux que vous aurez en abomination et que vous ne mangerez pas
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '11.13 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Beaucoup d’oiseaux cités comme impurs étaient des prédateurs qui se nourrissaient de charognes. L’identification de plusieurs des oiseaux et des insectes n’est pas assurée, d’où les divergences entre les versions.
      marker-yv: yv-n
    - type: text
      text: '  : l’aigle, le gypaète et le vautour, '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'le milan et toutes les espèces de faucons, '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'toutes les variétés de corbeaux, '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'l’autruche, la chouette, la mouette et toutes les espèces d’éperviers, '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'le hibou, le cormoran, le chat-huant, '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'l’effraie, le pélican, l’orfraie, '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'la cigogne, les différentes espèces de hérons, la huppe et la chauve-souris. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Parlez aux Israélites et dites-leur : Voici, parmi tous les grands mammifères terrestres, ceux que vous pourrez manger'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '11.2 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Voir '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: Dt 14.3-21
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: '  : '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Vous aurez en abomination toute bestiole ailée marchant à quatre pattes, '
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'sauf celles qui ont, à leurs pattes, des membres qui leur permettent de sauter sur le sol. De celles-là, vous pourrez en manger. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ainsi, vous pourrez manger les différentes espèces de sauterelles, de criquets, de grillons et de locustes. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Mais toutes les autres bestioles ailées marchant à quatre pattes seront une abomination pour vous.
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ces animaux vous rendront impurs et si vous en touchez le cadavre, vous serez impurs jusqu’au soir. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Quiconque prend en main quelque partie de leur cadavre devra nettoyer ses vêtements et restera en état d’impureté jusqu’au soir.
  '26':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Vous tiendrez aussi pour impur tout animal dont le sabot n’est pas fendu ou qui ne remue pas constamment les mâchoires ; quiconque les touchera sera impur. '
  '27':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Tout quadrupède qui marche sur la plante des pieds
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '11.27 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: C’est-à-dire les plantigrades, par exemple les chiens, les chats, les ours.
      marker-yv: yv-n
    - type: text
      text: ' sera impur pour vous. Quiconque touchera leur cadavre sera en état d’impureté jusqu’au soir. '
  '28':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Celui qui transportera leur cadavre nettoiera ses vêtements et restera impur jusqu’au soir. Vous tiendrez ces animaux pour impurs.
  '29':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Voici la liste des petites bêtes qui se meuvent sur le sol et que vous devrez considérer comme impures : la taupe, la souris et les différentes espèces de lézards, '
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'tous ceux qui ont le sabot fendu et qui remuent constamment les mâchoires. '
  '30':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'le gecko, le lézard ocellé, le lézard vert, la limace et le caméléon. '
  '31':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ces bêtes qui grouillent sur le sol seront impures pour vous. Quiconque les touchera quand elles sont mortes sera en état d’impureté jusqu’au soir. '
  '32':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Tout objet sur lequel tombera l’une de ces bêtes mortes sera impur, qu’il s’agisse d’un ustensile en bois, d’un vêtement, d’une peau ou d’un sac, bref, tout objet destiné à un usage quelconque sera passé à l’eau et restera impur jusqu’au soir, puis il redeviendra pur. '
  '33':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Si l’une de ces bestioles mortes tombe dans un récipient de terre cuite, tout son contenu devient impur, et vous briserez le récipient. '
  '34':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Si l’eau contenue dans ce récipient a été versée sur un aliment comestible, celui-ci devient impur, de même que toute boisson, quel que soit le récipient dans lequel elle se trouve. '
  '35':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Tout objet sur lequel tombera le cadavre d’une de ces bêtes sera impur. S’il s’agit d’un four ou d’un foyer, ils seront mis en pièces, car ils sont impurs et vous les tiendrez pour tels. '
  '36':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Toutefois, les sources et les puits constituant une réserve d’eau resteront purs, seul celui qui touche le cadavre sera impur. '
  '37':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Si une partie de leur cadavre tombe sur une semence végétale quelconque, celle-ci restera pure. '
  '38':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Mais si l’on a mis de l’eau sur du grain et qu’il y tombe un de ces cadavres, vous la tiendrez pour impure.
  '39':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Si l’un des animaux qui vous sert normalement de nourriture vient à mourir, celui qui touchera son cadavre sera impur jusqu’au soir. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Mais vous ne mangerez pas ceux qui remuent constamment les mâchoires seulement ou qui ont seulement le sabot fendu : le chameau, '
  '40':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Celui qui aura mangé de sa viande nettoiera ses vêtements et restera en état d’impureté jusqu’au soir ; il en est de même pour celui qui transportera le cadavre de la bête.
  '41':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Toute bestiole qui se meut à ras de terre vous sera en abomination, vous n’en mangerez pas. '
  '42':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Qu’elle rampe sur son ventre, qu’elle se déplace à quatre pattes ou qu’elle ait beaucoup de pattes, de tout ce qui se meut à ras de terre, vous n’en mangerez pas et vous les aurez en abomination. '
  '43':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ne vous faites pas vous-mêmes prendre en abomination à cause de l’une de ces bêtes qui se meuvent à ras du sol, ne vous rendez pas impurs par elles pour vous trouver en état d’impureté à cause d’elles, '
  '44':
  - type: usfm
    marker: p
    children:
    - type: text
      text: car je suis l’Eternel votre Dieu. Comportez-vous en gens saints et soyez saints, car je suis saint, et ne vous rendez pas impurs par l’une de ces bêtes qui se meuvent à ras de terre
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '11.44 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Pour les v. 44-45, voir '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: Lv 19.2
        - type: text
          text: '. Cité en '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: 1 P 1.16
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: '. '
  '45':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Car je suis l’Eternel qui vous ai fait sortir d’Egypte pour être votre Dieu. Soyez donc saints, car je suis saint.
  '46':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Telle est la loi concernant les quadrupèdes, les oiseaux et tout être vivant qui se meut dans les eaux ou qui se meut à ras de terre, '
  '47':
  - type: usfm
    marker: p
    children:
    - type: text
      text: afin qu’on sépare ce qui est impur de ce qui est pur, et qu’on distingue les animaux qui peuvent être mangés de ceux qu’on ne doit pas manger.
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: le daman
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '11.5 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Petit mammifère rongeur de la taille d’un lapin qui vit en bande dans les rochers du Proche-Orient et d’Afrique du Nord.
      marker-yv: yv-n
    - type: text
      text: ', '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ou le lièvre, qui remuent constamment les mâchoires
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '11.6 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Selon la classification antique, fondée sur des critères observables, il ne s’agit pas uniquement de ruminants mais de l’ensemble des bêtes qui remuent constamment au moins une mâchoire, même sans mastiquer de nourriture.
      marker-yv: yv-n
    - type: text
      text: ', mais n’ont pas le sabot fendu ; vous les considérerez comme impurs. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Vous tiendrez aussi pour impur le porc, qui a bien le sabot fendu, mais qui ne remue pas constamment les mâchoires. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Vous ne mangerez pas la viande de ces animaux, vous ne toucherez même pas leurs cadavres ; vous les tiendrez pour impurs.
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Vous pourrez manger tous les poissons qui peuplent les mers et les rivières et qui ont des nageoires et des écailles. '
