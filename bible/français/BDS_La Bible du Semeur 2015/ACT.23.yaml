document_id: ACT.23
type_code: fra
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Paul fixa ses regards sur tous les membres du Grand-Conseil et déclara : Mes frères, j’ai vécu devant Dieu jusqu’à ce jour avec une conscience parfaitement pure.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Mais le grand-prêtre Ananias
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '23.2 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: Ananias
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: ': '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: grand-prêtre juif de 47 à 59.
    marker-yv: yv-n
  - type: text
    text: ' ordonna à ceux qui étaient près de Paul de le frapper sur la bouche.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Paul lui dit alors : Dieu lui-même va te frapper, muraille blanchie'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '23.3 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: En Orient, on blanchissait les murailles pour en cacher les défauts.
    marker-yv: yv-n
  - type: text
    text: '  ! Tu sièges là pour me juger selon la Loi, et voilà que tu violes la Loi en ordonnant de me frapper !'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Les assistants s’écrièrent : Tu oses injurier le grand-prêtre de Dieu !'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: '– Frères, reprit Paul, j’ignorais que c’était le grand-prêtre, car je sais bien qu’il est écrit : '
  - type: usfm
    marker: qt
    children:
    - type: text
      text: Tu n’insulteras pas le chef de ton peuple
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '23.5 '
    - type: usfm
      marker: ft
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ex 22.27
        metadata:
          usfm: EXO.22.27
      - type: text
        text: .
    marker-yv: yv-n
  - type: usfm
    marker: qt
    children:
    - type: text
      text: .
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Paul savait que le Conseil était composé pour une part de sadducéens, pour l’autre de pharisiens, et il s’écria au milieu du Conseil : Frères, je suis pharisien et fils de pharisien. Si je suis mis en accusation, c’est pour notre espérance de la résurrection.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Ces mots provoquèrent une dispute entre pharisiens et sadducéens, et l’assemblée se divisa en deux camps. – '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Les sadducéens, en effet, déclarent qu’il n’y a pas de résurrection, pas plus que d’anges ou d’esprits, et les pharisiens affirment le contraire. – '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Le ton monta considérablement.
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Quelques spécialistes de la Loi qui étaient du parti des pharisiens se levèrent pour protester avec énergie en faveur de l’accusé : Vraiment, nous ne trouvons rien à reprocher à cet homme. Après tout, qui sait ? Peut-être un esprit ou un ange lui a-t-il parlé ?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: La dispute s’envenimait et le commandant craignit que son prisonnier soit tué par ces gens. Alors il fit signe à un détachement de soldats de descendre dans la salle pour tirer Paul du milieu d’eux et le ramener à la citadelle.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'La nuit suivante, le Seigneur apparut à Paul et lui dit : '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Courage ! Tu as été mon témoin à Jérusalem, il faut que tu le sois aussi à Rome.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Le complot contre Paul
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Le lendemain matin, au petit jour, les Juifs formèrent un complot. Ils firent le serment de ne rien manger ni boire avant d’avoir tué Paul. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Plus de quarante hommes participaient à cette conjuration. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Ils allèrent trouver les chefs des prêtres et les responsables du peuple et leur déclarèrent : Nous nous sommes engagés par un serment solennel à ne rien manger ni boire tant que nous n’aurons pas tué Paul. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'A vous d’agir maintenant avec l’appui du Grand-Conseil : intervenez auprès du commandant et proposez-lui de faire comparaître Paul devant vous sous prétexte que vous voulez instruire son cas de plus près. De notre côté, nous avons pris nos dispositions pour le supprimer avant qu’il arrive ici.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Mais le fils de la sœur de Paul entendit parler du guet-apens. Il se rendit à la citadelle, y entra, et prévint Paul de ce qui se tramait.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Alors Paul fit appeler un officier de service et lui dit : Conduis ce jeune homme auprès du commandant, je t’en prie, il a quelque chose à lui dire.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'L’officier l’emmena donc avec lui et l’introduisit auprès du commandant en disant : Le détenu Paul m’a fait appeler et m’a demandé de t’amener ce jeune homme qui a quelque chose à te dire.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Le commandant, prenant le jeune homme par la main, se retira avec lui à l’écart et lui demanda : Qu’as-tu à me dire ?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Alors le neveu de Paul raconta : Les Juifs ont convenu de te demander de leur amener Paul, demain, au Grand-Conseil. Ils disent qu’ils veulent examiner son cas de plus près. '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Mais surtout, ne t’y laisse pas prendre. Ils sont à plus de quarante qui préparent un guet-apens contre lui. Ils ont juré de ne rien manger ni boire avant de l’avoir tué. Tout est prêt. Ils n’attendent plus que ton accord.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Le commandant laissa repartir le jeune homme. Mais il lui fit d’abord cette recommandation : Surtout ne va dire à personne que tu m’as prévenu de cette affaire.'
- type: usfm
  marker: s1
  children:
  - type: text
    text: Paul, prisonnier à Césarée
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Aussitôt après, il appela deux de ses officiers et leur commanda : Rassemblez deux cents légionnaires et tenez-vous prêts à partir pour Césarée. Prenez avec vous soixante-dix cavaliers et deux cents soldats armés de lances. Départ à neuf heures ce soir. '
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: Préparez aussi des montures pour Paul et amenez-le sain et sauf au gouverneur Félix
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '23.24 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: Félix
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: ': '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: gouverneur de la Judée de 52 à 59​60.
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Il rédigea en même temps le billet suivant pour le gouverneur :'
- type: usfm
  marker: pm
  children:
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: Claudius Lysias adresse ses salutations à Son Excellence le gouverneur Félix.
- type: usfm
  marker: pm
  children:
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'Les Juifs s’étaient saisis de l’homme que je t’envoie et ils allaient le tuer quand je suis intervenu avec la troupe. Je l’ai arraché de leurs mains, car je venais d’apprendre qu’il était citoyen romain. '
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'Comme je voulais savoir de quoi ils l’accusaient, je l’ai fait comparaître devant leur Grand-Conseil. '
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'J’ai constaté que leurs accusations portaient sur des questions relatives à leur loi, mais que l’on ne pouvait lui imputer aucune faute entraînant la peine de mort ou même la prison. '
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: Mais je viens d’être informé d’un projet d’attentat contre lui. C’est pourquoi je te l’envoie sans attendre, et je fais savoir à ses accusateurs que c’est devant toi qu’ils auront à porter plainte contre lui
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '23.30 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Quelques manuscrits ajoutent la formule de salutation : '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: adieu.
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: Conformément aux ordres reçus, les soldats emmenèrent Paul et le conduisirent pendant la nuit jusqu’à Antipatris
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '23.31 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: Antipatris
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: ': '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: poste militaire reconstruit par Hérode le Grand à mi-chemin entre Jérusalem et Césarée.
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '32'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: Le lendemain, les légionnaires laissèrent les cavaliers poursuivre seuls le chemin avec lui et ils revinrent à la citadelle.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '33'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: A leur arrivée à Césarée, les cavaliers remirent la lettre au gouverneur et lui présentèrent Paul.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '34'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: 'Le gouverneur lut la lettre et demanda de quelle province il était originaire. Apprenant qu’il était né en Cilicie, il lui dit : '
  - type: usfm
    marker: v
    metadata:
      v: '35'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: Je t’entendrai quand tes accusateurs seront arrivés.
- type: usfm
  marker: p
  children:
  - type: text
    text: Puis il donna ordre de le faire mettre en résidence surveillée dans le palais d’Hérode
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '23.35 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Palais construit par Hérode le Grand à Césarée. Les gouverneurs romains en avaient fait leur résidence habituelle.
    marker-yv: yv-n
  - type: text
    text: .
