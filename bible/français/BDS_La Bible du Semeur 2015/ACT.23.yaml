document_id: ACT.23,21
type_code: fra
verses:
  '1':
  - type: text
    content: 'Paul fixa ses regards sur tous les membres du Grand-Conseil et déclara : Mes frères, j’ai vécu devant Dieu jusqu’à ce jour avec une conscience parfaitement pure.'
  '10':
  - type: text
    content: La dispute s’envenimait et le commandant craignit que son prisonnier soit tué par ces gens. Alors il fit signe à un détachement de soldats de descendre dans la salle pour tirer Paul du milieu d’eux et le ramener à la citadelle.
  '11':
  - type: text
    content: 'La nuit suivante, le Seigneur apparut à Paul et lui dit : '
  - type: text
    content: Courage ! Tu as été mon témoin à Jérusalem, il faut que tu le sois aussi à Rome.
  - type: heading
    content: Le complot contre Paul
  '12':
  - type: text
    content: 'Le lendemain matin, au petit jour, les Juifs formèrent un complot. Ils firent le serment de ne rien manger ni boire avant d’avoir tué Paul. '
  '13':
  - type: text
    content: 'Plus de quarante hommes participaient à cette conjuration. '
  '14':
  - type: text
    content: 'Ils allèrent trouver les chefs des prêtres et les responsables du peuple et leur déclarèrent : Nous nous sommes engagés par un serment solennel à ne rien manger ni boire tant que nous n’aurons pas tué Paul. '
  '15':
  - type: text
    content: 'A vous d’agir maintenant avec l’appui du Grand-Conseil : intervenez auprès du commandant et proposez-lui de faire comparaître Paul devant vous sous prétexte que vous voulez instruire son cas de plus près. De notre côté, nous avons pris nos dispositions pour le supprimer avant qu’il arrive ici.'
  '16':
  - type: text
    content: Mais le fils de la sœur de Paul entendit parler du guet-apens. Il se rendit à la citadelle, y entra, et prévint Paul de ce qui se tramait.
  '17':
  - type: text
    content: 'Alors Paul fit appeler un officier de service et lui dit : Conduis ce jeune homme auprès du commandant, je t’en prie, il a quelque chose à lui dire.'
  '18':
  - type: text
    content: 'L’officier l’emmena donc avec lui et l’introduisit auprès du commandant en disant : Le détenu Paul m’a fait appeler et m’a demandé de t’amener ce jeune homme qui a quelque chose à te dire.'
  '19':
  - type: text
    content: 'Le commandant, prenant le jeune homme par la main, se retira avec lui à l’écart et lui demanda : Qu’as-tu à me dire ?'
  '2':
  - type: text
    content: Mais le grand-prêtre Ananias
  - type: note
    content: 'Ananias: grand-prêtre juif de 47 à 59.'
  - type: text
    content: ' ordonna à ceux qui étaient près de Paul de le frapper sur la bouche.'
  '20':
  - type: text
    content: 'Alors le neveu de Paul raconta : Les Juifs ont convenu de te demander de leur amener Paul, demain, au Grand-Conseil. Ils disent qu’ils veulent examiner son cas de plus près. '
  '21':
  - type: text
    content: Mais surtout, ne t’y laisse pas prendre. Ils sont à plus de quarante qui préparent un guet-apens contre lui. Ils ont juré de ne rien manger ni boire avant de l’avoir tué. Tout est prêt. Ils n’attendent plus que ton accord.
  '22':
  - type: text
    content: 'Le commandant laissa repartir le jeune homme. Mais il lui fit d’abord cette recommandation : Surtout ne va dire à personne que tu m’as prévenu de cette affaire.'
  - type: heading
    content: Paul, prisonnier à Césarée
  '23':
  - type: text
    content: 'Aussitôt après, il appela deux de ses officiers et leur commanda : Rassemblez deux cents légionnaires et tenez-vous prêts à partir pour Césarée. Prenez avec vous soixante-dix cavaliers et deux cents soldats armés de lances. Départ à neuf heures ce soir. '
  '24':
  - type: text
    content: Préparez aussi des montures pour Paul et amenez-le sain et sauf au gouverneur Félix
  - type: note
    content: 'Félix: gouverneur de la Judée de 52 à 59​60.'
  - type: text
    content: .
  '25':
  - type: text
    content: 'Il rédigea en même temps le billet suivant pour le gouverneur :'
  '26':
  - type: text
    content: Claudius Lysias adresse ses salutations à Son Excellence le gouverneur Félix.
  '27':
  - type: text
    content: 'Les Juifs s’étaient saisis de l’homme que je t’envoie et ils allaient le tuer quand je suis intervenu avec la troupe. Je l’ai arraché de leurs mains, car je venais d’apprendre qu’il était citoyen romain. '
  '28':
  - type: text
    content: 'Comme je voulais savoir de quoi ils l’accusaient, je l’ai fait comparaître devant leur Grand-Conseil. '
  '29':
  - type: text
    content: 'J’ai constaté que leurs accusations portaient sur des questions relatives à leur loi, mais que l’on ne pouvait lui imputer aucune faute entraînant la peine de mort ou même la prison. '
  '3':
  - type: text
    content: 'Paul lui dit alors : Dieu lui-même va te frapper, muraille blanchie'
  - type: note
    content: En Orient, on blanchissait les murailles pour en cacher les défauts.
  - type: text
    content: '  ! Tu sièges là pour me juger selon la Loi, et voilà que tu violes la Loi en ordonnant de me frapper !'
  '30':
  - type: text
    content: Mais je viens d’être informé d’un projet d’attentat contre lui. C’est pourquoi je te l’envoie sans attendre, et je fais savoir à ses accusateurs que c’est devant toi qu’ils auront à porter plainte contre lui
  - type: note
    content: 'Quelques manuscrits ajoutent la formule de salutation : adieu.'
  - type: text
    content: .
  '31':
  - type: text
    content: Conformément aux ordres reçus, les soldats emmenèrent Paul et le conduisirent pendant la nuit jusqu’à Antipatris
  - type: note
    content: 'Antipatris: poste militaire reconstruit par Hérode le Grand à mi-chemin entre Jérusalem et Césarée.'
  - type: text
    content: '. '
  '32':
  - type: text
    content: Le lendemain, les légionnaires laissèrent les cavaliers poursuivre seuls le chemin avec lui et ils revinrent à la citadelle.
  '33':
  - type: text
    content: A leur arrivée à Césarée, les cavaliers remirent la lettre au gouverneur et lui présentèrent Paul.
  '34':
  - type: text
    content: 'Le gouverneur lut la lettre et demanda de quelle province il était originaire. Apprenant qu’il était né en Cilicie, il lui dit : '
  '35':
  - type: text
    content: Je t’entendrai quand tes accusateurs seront arrivés.
  - type: text
    content: Puis il donna ordre de le faire mettre en résidence surveillée dans le palais d’Hérode
  - type: note
    content: Palais construit par Hérode le Grand à Césarée. Les gouverneurs romains en avaient fait leur résidence habituelle.
  - type: text
    content: .
  '4':
  - type: text
    content: 'Les assistants s’écrièrent : Tu oses injurier le grand-prêtre de Dieu !'
  '5':
  - type: text
    content: '– Frères, reprit Paul, j’ignorais que c’était le grand-prêtre, car je sais bien qu’il est écrit : '
  - type: text
    content: Tu n’insulteras pas le chef de ton peuple
  - type: note
    content: Ex 22.27.
  - type: text
    content: .
  '6':
  - type: text
    content: 'Paul savait que le Conseil était composé pour une part de sadducéens, pour l’autre de pharisiens, et il s’écria au milieu du Conseil : Frères, je suis pharisien et fils de pharisien. Si je suis mis en accusation, c’est pour notre espérance de la résurrection.'
  '7':
  - type: text
    content: 'Ces mots provoquèrent une dispute entre pharisiens et sadducéens, et l’assemblée se divisa en deux camps. – '
  '8':
  - type: text
    content: 'Les sadducéens, en effet, déclarent qu’il n’y a pas de résurrection, pas plus que d’anges ou d’esprits, et les pharisiens affirment le contraire. – '
  '9':
  - type: text
    content: Le ton monta considérablement.
  - type: text
    content: 'Quelques spécialistes de la Loi qui étaient du parti des pharisiens se levèrent pour protester avec énergie en faveur de l’accusé : Vraiment, nous ne trouvons rien à reprocher à cet homme. Après tout, qui sait ? Peut-être un esprit ou un ange lui a-t-il parlé ?'
