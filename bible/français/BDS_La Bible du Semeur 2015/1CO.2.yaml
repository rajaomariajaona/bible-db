document_id: 1CO.2,21
type_code: fra
verses:
  '1':
  - type: heading
    content: La prédication de Paul à Corinthe
  - type: text
    content: C’est pourquoi, moi aussi, frères et sœurs, lorsque je suis allé chez vous, je ne suis pas venu proclamer le secret de Dieu
  - type: note
    content: 'Certains manuscrits ont : le témoignage au sujet de Dieu.'
  - type: text
    content: ' en utilisant le prestige de l’éloquence ou de la sagesse. '
  '10':
  - type: text
    content: Or, Dieu nous l’a révélé par son Esprit ; l’Esprit, en effet, scrute tout, même les pensées les plus intimes de Dieu.
  '11':
  - type: text
    content: 'Quel être humain peut savoir ce qui se passe dans un autre homme ? Seul l’esprit de cet homme en lui le sait. De même, nul ne peut connaître ce qui est en Dieu si ce n’est l’Esprit de Dieu. '
  '12':
  - type: text
    content: 'Or nous, nous avons reçu, non pas l’esprit du monde, mais l’Esprit même qui vient de Dieu, pour que nous comprenions tous les bienfaits que Dieu nous a accordés par grâce. '
  '13':
  - type: text
    content: Et nous en parlons, non pas avec les termes qu’enseigne la sagesse humaine, mais avec ceux qu’enseigne l’Esprit. Ainsi nous exposons les réalités spirituelles dans des termes inspirés par l’Esprit
  - type: note
    content: 'Autre traduction : à des hommes qui ont l’Esprit.'
  - type: text
    content: .
  '14':
  - type: text
    content: 'Mais l’homme sans Dieu ne reçoit pas ce qui vient de l’Esprit de Dieu ; à ses yeux, c’est pure folie et il est incapable de le comprendre, car seul l’Esprit de Dieu permet d’en juger. '
  '15':
  - type: text
    content: 'Celui qui a cet Esprit peut, lui, juger de tout, sans que personne ne puisse le juger. Car il est écrit :'
  '16':
  - type: text
    content: ' '
  - type: text
    content: Qui donc connaît la pensée du Seigneur et qui pourrait l’instruire
  - type: text
    content: ' '
  - type: note
    content: Es 40.13 cité selon l’ancienne version grecque.
  - type: text
    content: '?'
  - type: text
    content: ' Mais nous, nous avons la pensée de Christ.'
  '2':
  - type: text
    content: 'Car, je n’ai pas estimé devoir vous apporter autre chose que Jésus-Christ, et Jésus-Christ crucifié. '
  '3':
  - type: text
    content: De plus, quand je suis arrivé chez vous, je me sentais bien faible et je tremblais de crainte.
  '4':
  - type: text
    content: 'Mon enseignement et ma prédication ne reposaient pas sur les discours persuasifs de la sagesse, mais sur une action manifeste de l’Esprit et de puissance. '
  '5':
  - type: text
    content: Ainsi votre foi a été fondée, non sur la sagesse humaine, mais sur la puissance de Dieu.
  - type: heading
    content: La vraie sagesse, par l’Esprit
  '6':
  - type: text
    content: 'Cependant nous aussi, nous annonçons une sagesse aux croyants adultes dans la foi, une sagesse qui n’est pas de ce monde, ni celle des grands de ce monde qui sont destinés à disparaître. '
  '7':
  - type: text
    content: 'Non, nous exposons la sagesse de Dieu, secrète et cachée, que Dieu avait préparée avant le commencement du monde en vue de notre gloire. '
  '8':
  - type: text
    content: 'Cette sagesse-là, les grands de ce monde ne la connaissent pas, car s’ils l’avaient connue, ils n’auraient pas crucifié le Seigneur glorieux. '
  '9':
  - type: text
    content: Mais, comme le dit l’Ecriture, il s’agit de
  - type: text
    content: ce que l’œil n’a pas vu
  - type: text
    content: et que l’oreille n’a pas entendu,
  - type: text
    content: ce que l’esprit humain n’a jamais soupçonné,
  - type: text
    content: mais que Dieu tient en réserve pour ceux qui l’aiment
  - type: text
    content: ' '
  - type: note
    content: Es 64.3 .
  - type: text
    content: .
