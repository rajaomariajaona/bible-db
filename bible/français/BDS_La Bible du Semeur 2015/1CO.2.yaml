document_id: 1CO.2,21
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: La prédication de Paul à Corinthe
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: C’est pourquoi, moi aussi, frères et sœurs, lorsque je suis allé chez vous, je ne suis pas venu proclamer le secret de Dieu
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '2.1 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Certains manuscrits ont : '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: le témoignage au sujet de Dieu.
      marker-yv: yv-n
    - type: text
      text: ' en utilisant le prestige de l’éloquence ou de la sagesse. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Or, Dieu nous l’a révélé par son Esprit ; l’Esprit, en effet, scrute tout, même les pensées les plus intimes de Dieu.
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Quel être humain peut savoir ce qui se passe dans un autre homme ? Seul l’esprit de cet homme en lui le sait. De même, nul ne peut connaître ce qui est en Dieu si ce n’est l’Esprit de Dieu. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Or nous, nous avons reçu, non pas l’esprit du monde, mais l’Esprit même qui vient de Dieu, pour que nous comprenions tous les bienfaits que Dieu nous a accordés par grâce. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Et nous en parlons, non pas avec les termes qu’enseigne la sagesse humaine, mais avec ceux qu’enseigne l’Esprit. Ainsi nous exposons les réalités spirituelles dans des termes inspirés par l’Esprit
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '2.13 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Autre traduction : '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: à des hommes qui ont l’Esprit.
      marker-yv: yv-n
    - type: text
      text: .
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Mais l’homme sans Dieu ne reçoit pas ce qui vient de l’Esprit de Dieu ; à ses yeux, c’est pure folie et il est incapable de le comprendre, car seul l’Esprit de Dieu permet d’en juger. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Celui qui a cet Esprit peut, lui, juger de tout, sans que personne ne puisse le juger. Car il est écrit :'
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: qt
      children:
      - type: text
        text: Qui donc connaît la pensée du Seigneur et qui pourrait l’instruire
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '2.16 '
      - type: usfm
        marker: ft
        children:
        - type: usfm
          marker: ref
          children:
          - type: text
            text: Es 40.13
        - type: text
          text: ' cité selon l’ancienne version grecque.'
      marker-yv: yv-n
    - type: usfm
      marker: qt
      children:
      - type: text
        text: '?'
    - type: text
      text: ' Mais nous, nous avons la pensée de Christ.'
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Car, je n’ai pas estimé devoir vous apporter autre chose que Jésus-Christ, et Jésus-Christ crucifié. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: De plus, quand je suis arrivé chez vous, je me sentais bien faible et je tremblais de crainte.
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Mon enseignement et ma prédication ne reposaient pas sur les discours persuasifs de la sagesse, mais sur une action manifeste de l’Esprit et de puissance. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ainsi votre foi a été fondée, non sur la sagesse humaine, mais sur la puissance de Dieu.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: La vraie sagesse, par l’Esprit
    marker-yv: yv-h
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Cependant nous aussi, nous annonçons une sagesse aux croyants adultes dans la foi, une sagesse qui n’est pas de ce monde, ni celle des grands de ce monde qui sont destinés à disparaître. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Non, nous exposons la sagesse de Dieu, secrète et cachée, que Dieu avait préparée avant le commencement du monde en vue de notre gloire. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Cette sagesse-là, les grands de ce monde ne la connaissent pas, car s’ils l’avaient connue, ils n’auraient pas crucifié le Seigneur glorieux. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Mais, comme le dit l’Ecriture, il s’agit de
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: qt
      children:
      - type: text
        text: ce que l’œil n’a pas vu
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: qt
      children:
      - type: text
        text: et que l’oreille n’a pas entendu,
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: qt
      children:
      - type: text
        text: ce que l’esprit humain n’a jamais soupçonné,
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: qt
      children:
      - type: text
        text: mais que Dieu tient en réserve pour ceux qui l’aiment
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '2.9 '
      - type: usfm
        marker: ft
        children:
        - type: usfm
          marker: ref
          children:
          - type: text
            text: Es 64.3
        - type: text
          text: ' .'
      marker-yv: yv-n
    - type: usfm
      marker: qt
      children:
      - type: text
        text: .
