document_id: JER.27,21
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s2
    children:
    - type: text
      text: Sous le joug du roi de Babylone
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: Au commencement du règne de Sédécias
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '27.1 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Sédécias
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: ': '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'd’après quelques manuscrits hébreux, la version syriaque et Jr 27.3, 12, 20 ; 28.1. Le texte hébreu traditionnel a : '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'Yehoyaqim. '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Sur Sédécias (597 à 587 av. J.-C.), voir 2 R 24.18 à 25.7 ; 2 Ch 36.11-13.
      marker-yv: yv-n
    - type: text
      text: ', fils de Josias, roi de Juda, l’Eternel adressa le message suivant à Jérémie :'
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'Leurs prophéties sont des mensonges qui vous feront bannir de votre pays : je vous en chasserai et vous périrez. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: Mais le peuple qui acceptera le joug du roi de Babylone et se soumettra à lui, je le laisserai tranquille dans son pays, pour le cultiver et pour y demeurer – l’Eternel le déclare.
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'Puis j’ai déclaré les mêmes choses à Sédécias, roi de Juda, en lui disant : Acceptez le joug du roi de Babylone et soumettez-vous à lui et à son peuple, et vous aurez la vie sauve. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'Pourquoi devriez-vous mourir, toi et ton peuple, par l’épée, la famine et la peste, comme l’Eternel en menace le peuple qui ne se soumettra pas au roi de Babylone ? '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'N’écoutez donc pas les prophètes qui vous disent : « Vous ne serez pas assujettis au roi de Babylone. » Car leurs prophéties sont des mensonges. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: Je ne les ai pas envoyés – l’Eternel le déclare – et ce sont des mensonges qu’ils prophétisent en mon nom. Je vous disperserai et vous périrez, vous et ces prophètes qui vous adressent leurs oracles.
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'Ensuite, j’ai parlé aux prêtres et à tout ce peuple pour leur dire : Voici ce que déclare l’Eternel : N’écoutez pas vos prophètes qui vous prophétisent en disant : « Voici que les ustensiles du temple de l’Eternel vont être très bientôt rapportés de Babylone'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '27.16 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Sur ces ustensiles, voir 2 R 24.1 ; 2 Ch 36.10.
      marker-yv: yv-n
    - type: text
      text: '. » Car leurs prophéties sont mensongères. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: Ne les écoutez pas ! Soumettez-vous au roi de Babylone et vous aurez la vie sauve ! Pourquoi cette ville devrait-elle être réduite en un monceau de ruines ?
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'Si ce sont de vrais prophètes, et s’ils ont effectivement reçu une parole de l’Eternel, eh bien ! qu’ils intercèdent auprès du Seigneur des armées célestes, pour que les objets précieux qui restent dans le temple de l’Eternel, dans le palais du roi de Juda et dans Jérusalem ne prennent pas aussi le chemin de Babylone ! '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'Car voici ce que déclare le Seigneur des armées célestes au sujet des colonnes et de la cuve de bronze, de ses socles et de tous les autres objets précieux qui se trouvent encore dans cette ville, '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'Voici ce que m’a ordonné l’Eternel : Fais-toi des lanières et des barres de bois pour constituer un joug, et mets-les sur ta nuque. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: 'ces objets que Nabuchodonosor, roi de Babylone, n’a pas emportés quand il a déporté de Jérusalem à Babylone Yekonia, fils de Yehoyaqim, roi de Juda, et tous les grands de Juda et de Jérusalem, '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: 'oui, voici ce que déclare le Seigneur des armées célestes, Dieu d’Israël, au sujet de ces objets précieux restés dans le Temple, dans le palais du roi de Juda et à Jérusalem : '
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: Ils seront emportés à Babylone et ils y resteront jusqu’au jour où je m’occuperai d’eux, pour les faire rapporter et replacer en ce lieu – l’Eternel le déclare.
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: Puis envoie un message
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '27.3 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: envoie un message
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: ': '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'd’après l’ancienne version grecque. Texte hébreu traditionnel : '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: envoie-les.
      marker-yv: yv-n
    - type: text
      text: ' au roi d’Edom, au roi de Moab, au roi des Ammonites, au roi de Tyr et au roi de Sidon par l’intermédiaire des ambassadeurs venus rendre visite à Sédécias, roi de Juda, à Jérusalem'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '27.3 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Ces ambassadeurs étaient sans doute venus à Jérusalem pour tramer un complot de révolte contre Nabuchodonosor.
      marker-yv: yv-n
    - type: text
      text: .
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'Tu leur communiqueras mes ordres à l’intention de leur souverain en ces termes : Voici ce que déclare le Seigneur des armées célestes, le Dieu d’Israël, voici ce que vous direz à votre souverain : '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: C’est moi qui ai fait la terre ainsi que les hommes et les bêtes qui s’y trouvent, avec ma grande force et la puissance que j’ai déployée. Aussi, je la confie à qui il me semble juste.
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'A présent, je livre tous ces pays à Nabuchodonosor, roi de Babylone, mon serviteur ; je lui ai même livré les animaux sauvages pour qu’ils lui soient assujettis. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: Tous ces peuples lui seront assujettis, ainsi qu’à son fils, et à son petit-fils
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '27.7 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'C’est-à-dire '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'Evil-Merodak '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '(562 à 560 av. J.-C.), fils de Nabuchodonosor, et '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'Balthazar, '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'qui était peut-être le petit-fils de Nabuchodonosor, et qui exerça le pouvoir à la place de son père Nabonide pendant les dix dernières années du règne de celui-ci (voir '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: Dn 5.1
        - type: text
          text: ' et note).'
      marker-yv: yv-n
    - type: text
      text: ' après lui, jusqu’à ce que vienne l’heure pour son pays à lui aussi. Alors son pays sera soumis par des peuples puissants et par de grands rois. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: Si un peuple ou un royaume ne se soumet pas à Nabuchodonosor, roi de Babylone, et ne veut pas se plier à son joug, je sévirai contre ce peuple-là par l’épée, la famine et la peste – l’Eternel le déclare – jusqu’à ce que je l’aie fait entièrement disparaître par sa main.
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'Vous donc, n’écoutez pas vos prophètes, vos devins, vos oracles, vos augures et vos magiciens qui affirment que vous ne serez pas assujettis au roi de Babylone. '
