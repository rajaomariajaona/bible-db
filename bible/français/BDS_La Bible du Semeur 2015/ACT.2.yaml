document_id: ACT.2
type_code: fra
segments:
- type: usfm
  marker: ms1
  children:
  - type: text
    text: Témoins à Jérusalem
  marker-yv: yv-h
- type: usfm
  marker: s1
  children:
  - type: text
    text: Le don de l’Esprit
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Quand le jour de la Pentecôte arriva, ils
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '2.1 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Voir 1.14-15, 26 ; 2.14, 32.
    marker-yv: yv-n
  - type: text
    text: ' étaient tous rassemblés au même endroit. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Tout à coup, un grand bruit survint du ciel : c’était comme si un violent coup de vent s’abattait sur eux et remplissait toute la maison où ils se trouvaient assis. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Au même moment, ils virent apparaître des sortes de langues qui ressemblaient à des flammèches. Elles se séparèrent et allèrent se poser sur la tête de chacun d’eux. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Aussitôt, ils furent tous remplis du Saint-Esprit et commencèrent à parler dans différentes langues, chacun s’exprimant comme le Saint-Esprit lui donnait de le faire.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Or, à ce moment-là, des Juifs pieux, venus de chez tous les peuples du monde, séjournaient à Jérusalem. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'En entendant ce bruit, ils accoururent en foule et furent saisis de stupeur. En effet, chacun d’eux les entendait parler dans sa propre langue. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Dans leur étonnement, ils n’en croyaient pas leurs oreilles et disaient : Voyons ! Ces gens qui parlent, ne viennent-ils pas tous de Galilée ? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Comment se fait-il donc que nous les entendions s’exprimer chacun dans notre langue maternelle ? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Nous sommes Parthes, Mèdes ou Elamites, nous habitons la Mésopotamie, la Judée, la Cappadoce, le Pont ou la province d’Asie, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: la Phrygie ou la Pamphylie, l’Egypte ou le territoire de la Libye près de Cyrène
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '2.10 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: Cyrène
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: ': '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: les Juifs étaient nombreux en Egypte et dans la Cyrénaïque (à l’ouest de l’Egypte). Ceux qui étaient revenus de là-bas à Jérusalem avaient leur propre synagogue.
    marker-yv: yv-n
  - type: text
    text: ', ou bien, nous vivons à Rome, nous sommes juifs de naissance ou par conversion, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: nous venons de la Crète ou de l’Arabie, et pourtant chacun de nous les entend parler dans sa propre langue des choses merveilleuses que Dieu a accomplies !
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Ils n’en revenaient pas. Plongés dans la plus grande perplexité, ils se demandaient entre eux : « Qu’est-ce que cela peut bien vouloir dire ? » '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Mais d’autres tournaient la chose en ridicule : « C’est le vin doux, disaient-ils. Ils ont trop bu ! »'
- type: usfm
  marker: s1
  children:
  - type: text
    text: Pierre témoin de Jésus-Christ
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Alors Pierre se leva entouré des Onze et, d’une voix forte, il dit à la foule :'
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Ecoutez-moi bien, vous qui habitez la Judée et vous tous qui séjournez à Jérusalem : comprenez ce qui se passe. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Certains d’entre vous insinuent que ces hommes seraient ivres. Pas du tout ! Il est à peine neuf heures du matin ! '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Mais maintenant se réalise ce qu’avait annoncé le prophète Joël :'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: ' '
  - type: usfm
    marker: qt
    children:
    - type: text
      text: Voici ce qui arrivera, dit Dieu,
  - type: text
    text: ' ╵'
  - type: usfm
    marker: qt
    children:
    - type: text
      text: 'dans les jours de la fin des temps :'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: qt
    children:
    - type: text
      text: Je répandrai de mon Esprit
  - type: text
    text: ' ╵'
  - type: usfm
    marker: qt
    children:
    - type: text
      text: sur tout le monde.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: qt
    children:
    - type: text
      text: Vos fils, vos filles prophétiseront
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '2.17 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Dans l’ensemble du Nouveau Testament, le verbe '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'prophétiser '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'a été traduit par : '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: apporter, transmettre, des messages inspirés par Dieu, ce que Dieu inspire.
    marker-yv: yv-n
  - type: usfm
    marker: qt
    children:
    - type: text
      text: ','
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: qt
    children:
    - type: text
      text: vos jeunes gens, par des visions,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: qt
    children:
    - type: text
      text: vos vieillards, par des songes,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: qt
    children:
    - type: text
      text: recevront des révélations.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: ' '
  - type: usfm
    marker: qt
    children:
    - type: text
      text: Oui, sur mes serviteurs,
  - type: text
    text: ' ╵'
  - type: usfm
    marker: qt
    children:
    - type: text
      text: comme sur mes servantes,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: qt
    children:
    - type: text
      text: je répandrai de mon Esprit,
  - type: text
    text: ' ╵'
  - type: usfm
    marker: qt
    children:
    - type: text
      text: 'en ces jours-là :'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: qt
    children:
    - type: text
      text: ils prophétiseront.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: ' '
  - type: usfm
    marker: qt
    children:
    - type: text
      text: Je ferai des miracles
  - type: text
    text: ' ╵'
  - type: usfm
    marker: qt
    children:
    - type: text
      text: et là-haut, dans le ciel,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: qt
    children:
    - type: text
      text: et ici-bas sur terre,
  - type: text
    text: ' ╵'
  - type: usfm
    marker: qt
    children:
    - type: text
      text: 'des signes prodigieux :'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: qt
    children:
    - type: text
      text: du sang, du feu
  - type: text
    text: ' ╵'
  - type: usfm
    marker: qt
    children:
    - type: text
      text: et des colonnes de fumée.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: ' '
  - type: usfm
    marker: qt
    children:
    - type: text
      text: Et le soleil s’obscurcira,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: qt
    children:
    - type: text
      text: la lune deviendra de sang,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: qt
    children:
    - type: text
      text: avant la venue du jour du Seigneur,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: qt
    children:
    - type: text
      text: ce jour grand et glorieux.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: ' '
  - type: usfm
    marker: qt
    children:
    - type: text
      text: 'Alors seront '
    - type: usfm
      marker: w
      children:
      - type: text
        text: sauvés
  - type: text
    text: ' ╵'
  - type: usfm
    marker: qt
    children:
    - type: text
      text: tous ceux qui invoqueront le Seigneur
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '2.21 '
    - type: usfm
      marker: ft
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Jl 3.1-5
        metadata:
          usfm: JOL.3.1+JOL.3.2+JOL.3.3+JOL.3.4+JOL.3.5
      - type: text
        text: ', cité selon l’ancienne version grecque.'
    marker-yv: yv-n
  - type: usfm
    marker: qt
    children:
    - type: text
      text: .
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Ecoutez bien, Israélites, ce que j’ai à vous dire. Vous le savez tous : Jésus de Nazareth – cet homme dont Dieu vous a montré qu’il l’approuvait en accomplissant, par son moyen, au milieu de vous des miracles, des signes et des actes extraordinaires – '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'a été livré entre vos mains conformément à la décision que Dieu avait prise et au projet qu’il avait établi d’avance. Et vous, vous l’avez tué en le faisant crucifier par des hommes qui ne connaissent pas Dieu. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Mais Dieu a brisé les liens de la mort : il l’a ressuscité, car il était impossible que la mort le retienne captif. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'En effet, David dit de lui :'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: qt
    children:
    - type: text
      text: Je garde constamment
  - type: text
    text: ' ╵'
  - type: usfm
    marker: qt
    children:
    - type: text
      text: les yeux fixés sur le Seigneur,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: qt
    children:
    - type: text
      text: car il est à ma droite,
  - type: text
    text: ' ╵'
  - type: usfm
    marker: qt
    children:
    - type: text
      text: pour que je ne vacille pas.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: ' '
  - type: usfm
    marker: qt
    children:
    - type: text
      text: Voilà pourquoi mon cœur
  - type: text
    text: ' ╵'
  - type: usfm
    marker: qt
    children:
    - type: text
      text: est dans la joie
  - type: text
    text: ' ╵'
  - type: usfm
    marker: qt
    children:
    - type: text
      text: et mes paroles
  - type: text
    text: ' ╵'
  - type: usfm
    marker: qt
    children:
    - type: text
      text: débordent d’allégresse.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: qt
    children:
    - type: text
      text: Même mon corps reposera
  - type: text
    text: ' ╵'
  - type: usfm
    marker: qt
    children:
    - type: text
      text: dans l’espérance ;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: ' '
  - type: usfm
    marker: qt
    children:
    - type: text
      text: tu ne m’abandonneras pas
  - type: text
    text: ' ╵'
  - type: usfm
    marker: qt
    children:
    - type: text
      text: dans le séjour des morts,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: qt
    children:
    - type: text
      text: tu ne laisseras pas
  - type: text
    text: ' ╵'
  - type: usfm
    marker: qt
    children:
    - type: text
      text: un homme qui t’est dévoué
  - type: text
    text: ' ╵'
  - type: usfm
    marker: qt
    children:
    - type: text
      text: se décomposer dans la tombe.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: ' '
  - type: usfm
    marker: qt
    children:
    - type: text
      text: Car tu m’as fait connaître
  - type: text
    text: ' ╵'
  - type: usfm
    marker: qt
    children:
    - type: text
      text: le chemin de la vie,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: qt
    children:
    - type: text
      text: et tu me combleras
  - type: text
    text: ' ╵'
  - type: usfm
    marker: qt
    children:
    - type: text
      text: de joie en ta présence
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '2.28 '
    - type: usfm
      marker: ft
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ps 16.8-11
        metadata:
          usfm: PSA.16.8+PSA.16.9+PSA.16.10+PSA.16.11
      - type: text
        text: ' cité selon l’ancienne version grecque.'
    marker-yv: yv-n
  - type: usfm
    marker: qt
    children:
    - type: text
      text: .
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'Mes frères, permettez-moi de vous parler franchement : le patriarche'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '2.29 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: patriarche
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: ': '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: les ancêtres des Israélites (Abraham, Isaac, Jacob et les douze fils de celui-ci) étaient appelés patriarches. Par extension, ce titre était aussi appliqué à d’autres figures de l’Ancien Testament, comme ici au roi David.
    marker-yv: yv-n
  - type: text
    text: ' David est bel et bien mort et enterré. Son tombeau'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '2.29 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Ce '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'tombeau, '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: bien connu et vénéré, se trouvait sur le mont Sion.
    marker-yv: yv-n
  - type: text
    text: ' existe encore près d’ici aujourd’hui. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'Mais il était prophète et il savait que Dieu lui avait promis, sous la foi du '
  - type: usfm
    marker: qt
    children:
    - type: text
      text: serment
  - type: text
    text: ', de faire asseoir sur son trône un de ses descendants'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '2.30 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Ps 132.11 ; 2 S 7.16 ; 1 Ch 17.12.
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'Ainsi il a entrevu par avance la résurrection du Messie, et c’est d’elle qu’il parle en disant que '
  - type: usfm
    marker: qt
    children:
    - type: text
      text: Dieu ne l’abandonnera pas dans le séjour des morts
  - type: text
    text: ' et qu’il ne laissera pas son corps se décomposer'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '2.31 '
    - type: usfm
      marker: ft
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ps 16.10
        metadata:
          usfm: PSA.16.10
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'Dieu a ressuscité ce Jésus dont je parle : nous en sommes tous témoins. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: Ensuite, il a été élevé pour siéger à la droite de Dieu
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '2.33 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Autre traduction : '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: élevé par la main droite de Dieu.
    marker-yv: yv-n
  - type: text
    text: . Et maintenant, comme Dieu l’a promis, il a reçu du Père l’Esprit Saint et il l’a répandu sur nous. C’est là ce que vous voyez et entendez.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: 'En effet, David, lui, n’est pas monté au ciel, mais il a dit :'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: qt
    children:
    - type: text
      text: 'Le Seigneur a dit à mon Seigneur :'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: qt
    children:
    - type: text
      text: Viens siéger à ma droite
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '2.34 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: La droite du roi est la place d’honneur (Ps 45.10 ; 1 R 2.19).
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: ' '
  - type: usfm
    marker: qt
    children:
    - type: text
      text: jusqu’à ce que j’aie mis
  - type: text
    text: ' ╵'
  - type: usfm
    marker: qt
    children:
    - type: text
      text: tes ennemis
  - type: text
    text: ' ╵'
  - type: usfm
    marker: qt
    children:
    - type: text
      text: à terre sous tes pieds
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '2.35 '
    - type: usfm
      marker: ft
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ps 110.1
        metadata:
          usfm: PSA.110.1
      - type: text
        text: .
    marker-yv: yv-n
  - type: usfm
    marker: qt
    children:
    - type: text
      text: .
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: 'Voici donc ce que tout le peuple d’Israël doit savoir avec une entière certitude : Dieu a fait Seigneur et Messie ce Jésus que vous avez crucifié.'
- type: usfm
  marker: s1
  children:
  - type: text
    text: Les premiers croyants
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: 'Ce discours toucha profondément ceux qui l’avaient entendu. Ils demandèrent à Pierre et aux autres apôtres : Frères, que devons-nous faire ?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: text
    text: 'Pierre leur répondit : Changez'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '2.38 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Autres traductions : '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'repentez-vous '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'ou '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'changez d’attitude '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'ou '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: changez de comportement.
    marker-yv: yv-n
  - type: text
    text: ', et que chacun de vous se fasse baptiser au nom de Jésus-Christ, pour que vos péchés vous soient pardonnés. Alors, vous recevrez le don du Saint-Esprit. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '39'
  - type: text
    text: Car la promesse est pour vous, pour vos enfants, et pour ceux qui vivent dans les pays lointains, tous ceux que le Seigneur notre Dieu fera venir à lui
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '2.39 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Voir '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Jl 3.5
        metadata:
          usfm: JOL.3.5
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '40'
  - type: text
    text: 'Pierre continuait, avec instance, à leur adresser d’autres paroles pour les persuader, et il les encourageait, leur disant : Recevez le salut, séparez-vous de cette génération dévoyée.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '41'
  - type: text
    text: Ceux qui acceptèrent les paroles de Pierre se firent baptiser et, ce jour-là, environ trois mille personnes furent ajoutées au nombre des croyants.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '42'
  - type: text
    text: Dès lors, ils s’attachaient à écouter assidûment l’enseignement des apôtres, à vivre en communion les uns avec les autres, à rompre le pain
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '2.42 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: rompre le pain
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: ': '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: il pourrait s’agir de repas communs où l’on prenait la cène.
    marker-yv: yv-n
  - type: text
    text: ' et à prier ensemble. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '43'
  - type: text
    text: 'Tout le monde était très impressionné, car les apôtres accomplissaient beaucoup de prodiges et de signes miraculeux. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '44'
  - type: text
    text: 'Tous les croyants vivaient unis entre eux et partageaient tout ce qu’ils possédaient. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '45'
  - type: text
    text: Ils vendaient leurs propriétés et leurs biens et répartissaient l’argent entre tous, selon les besoins de chacun.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '46'
  - type: text
    text: 'Tous les jours, d’un commun accord, ils se retrouvaient dans la cour du Temple ; ils rompaient le pain dans les maisons, et prenaient leurs repas dans la joie, avec simplicité de cœur. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '47'
  - type: text
    text: Ils louaient Dieu, et le peuple tout entier leur était favorable.
- type: usfm
  marker: p
  children:
  - type: text
    text: Le Seigneur ajoutait chaque jour à leur communauté ceux qu’il sauvait.
