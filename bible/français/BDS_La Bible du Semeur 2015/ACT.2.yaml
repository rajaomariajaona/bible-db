document_id: ACT.2,21
type_code: fra
verses:
  '1':
  - type: heading
    content: Témoins à Jérusalem
  - type: heading
    content: Le don de l’Esprit
  - type: text
    content: Quand le jour de la Pentecôte arriva, ils
  - type: note
    content: Voir 1.14-15, 26 ; 2.14, 32.
  - type: text
    content: ' étaient tous rassemblés au même endroit. '
  '10':
  - type: text
    content: la Phrygie ou la Pamphylie, l’Egypte ou le territoire de la Libye près de Cyrène
  - type: note
    content: 'Cyrène: les Juifs étaient nombreux en Egypte et dans la Cyrénaïque (à l’ouest de l’Egypte). Ceux qui étaient revenus de là-bas à Jérusalem avaient leur propre synagogue.'
  - type: text
    content: ', ou bien, nous vivons à Rome, nous sommes juifs de naissance ou par conversion, '
  '11':
  - type: text
    content: nous venons de la Crète ou de l’Arabie, et pourtant chacun de nous les entend parler dans sa propre langue des choses merveilleuses que Dieu a accomplies !
  '12':
  - type: text
    content: 'Ils n’en revenaient pas. Plongés dans la plus grande perplexité, ils se demandaient entre eux : « Qu’est-ce que cela peut bien vouloir dire ? » '
  '13':
  - type: text
    content: 'Mais d’autres tournaient la chose en ridicule : « C’est le vin doux, disaient-ils. Ils ont trop bu ! »'
  - type: heading
    content: Pierre témoin de Jésus-Christ
  '14':
  - type: text
    content: 'Alors Pierre se leva entouré des Onze et, d’une voix forte, il dit à la foule :'
  - type: text
    content: 'Ecoutez-moi bien, vous qui habitez la Judée et vous tous qui séjournez à Jérusalem : comprenez ce qui se passe. '
  '15':
  - type: text
    content: 'Certains d’entre vous insinuent que ces hommes seraient ivres. Pas du tout ! Il est à peine neuf heures du matin ! '
  '16':
  - type: text
    content: 'Mais maintenant se réalise ce qu’avait annoncé le prophète Joël :'
  '17':
  - type: text
    content: ' '
  - type: text
    content: Voici ce qui arrivera, dit Dieu,
  - type: text
    content: ' ╵'
  - type: text
    content: 'dans les jours de la fin des temps :'
  - type: text
    content: Je répandrai de mon Esprit
  - type: text
    content: ' ╵'
  - type: text
    content: sur tout le monde.
  - type: text
    content: Vos fils, vos filles prophétiseront
  - type: text
    content: ' '
  - type: note
    content: 'Dans l’ensemble du Nouveau Testament, le verbe prophétiser a été traduit par : apporter, transmettre, des messages inspirés par Dieu, ce que Dieu inspire.'
  - type: text
    content: ','
  - type: text
    content: vos jeunes gens, par des visions,
  - type: text
    content: vos vieillards, par des songes,
  - type: text
    content: recevront des révélations.
  '18':
  - type: text
    content: ' '
  - type: text
    content: Oui, sur mes serviteurs,
  - type: text
    content: ' ╵'
  - type: text
    content: comme sur mes servantes,
  - type: text
    content: je répandrai de mon Esprit,
  - type: text
    content: ' ╵'
  - type: text
    content: 'en ces jours-là :'
  - type: text
    content: ils prophétiseront.
  '19':
  - type: text
    content: ' '
  - type: text
    content: Je ferai des miracles
  - type: text
    content: ' ╵'
  - type: text
    content: et là-haut, dans le ciel,
  - type: text
    content: et ici-bas sur terre,
  - type: text
    content: ' ╵'
  - type: text
    content: 'des signes prodigieux :'
  - type: text
    content: du sang, du feu
  - type: text
    content: ' ╵'
  - type: text
    content: et des colonnes de fumée.
  '2':
  - type: text
    content: 'Tout à coup, un grand bruit survint du ciel : c’était comme si un violent coup de vent s’abattait sur eux et remplissait toute la maison où ils se trouvaient assis. '
  '20':
  - type: text
    content: ' '
  - type: text
    content: Et le soleil s’obscurcira,
  - type: text
    content: la lune deviendra de sang,
  - type: text
    content: avant la venue du jour du Seigneur,
  - type: text
    content: ce jour grand et glorieux.
  '21':
  - type: text
    content: ' '
  - type: text
    content: 'Alors seront '
  - type: text
    content: sauvés
  - type: text
    content: ' ╵'
  - type: text
    content: tous ceux qui invoqueront le Seigneur
  - type: note
    content: Jl 3.1-5, cité selon l’ancienne version grecque.
  - type: text
    content: .
  '22':
  - type: text
    content: 'Ecoutez bien, Israélites, ce que j’ai à vous dire. Vous le savez tous : Jésus de Nazareth – cet homme dont Dieu vous a montré qu’il l’approuvait en accomplissant, par son moyen, au milieu de vous des miracles, des signes et des actes extraordinaires – '
  '23':
  - type: text
    content: 'a été livré entre vos mains conformément à la décision que Dieu avait prise et au projet qu’il avait établi d’avance. Et vous, vous l’avez tué en le faisant crucifier par des hommes qui ne connaissent pas Dieu. '
  '24':
  - type: text
    content: 'Mais Dieu a brisé les liens de la mort : il l’a ressuscité, car il était impossible que la mort le retienne captif. '
  '25':
  - type: text
    content: 'En effet, David dit de lui :'
  - type: text
    content: Je garde constamment
  - type: text
    content: ' ╵'
  - type: text
    content: les yeux fixés sur le Seigneur,
  - type: text
    content: car il est à ma droite,
  - type: text
    content: ' ╵'
  - type: text
    content: pour que je ne vacille pas.
  '26':
  - type: text
    content: ' '
  - type: text
    content: Voilà pourquoi mon cœur
  - type: text
    content: ' ╵'
  - type: text
    content: est dans la joie
  - type: text
    content: ' ╵'
  - type: text
    content: et mes paroles
  - type: text
    content: ' ╵'
  - type: text
    content: débordent d’allégresse.
  - type: text
    content: Même mon corps reposera
  - type: text
    content: ' ╵'
  - type: text
    content: dans l’espérance ;
  '27':
  - type: text
    content: ' '
  - type: text
    content: tu ne m’abandonneras pas
  - type: text
    content: ' ╵'
  - type: text
    content: dans le séjour des morts,
  - type: text
    content: tu ne laisseras pas
  - type: text
    content: ' ╵'
  - type: text
    content: un homme qui t’est dévoué
  - type: text
    content: ' ╵'
  - type: text
    content: se décomposer dans la tombe.
  '28':
  - type: text
    content: ' '
  - type: text
    content: Car tu m’as fait connaître
  - type: text
    content: ' ╵'
  - type: text
    content: le chemin de la vie,
  - type: text
    content: et tu me combleras
  - type: text
    content: ' ╵'
  - type: text
    content: de joie en ta présence
  - type: note
    content: Ps 16.8-11 cité selon l’ancienne version grecque.
  - type: text
    content: .
  '29':
  - type: text
    content: 'Mes frères, permettez-moi de vous parler franchement : le patriarche'
  - type: note
    content: 'patriarche: les ancêtres des Israélites (Abraham, Isaac, Jacob et les douze fils de celui-ci) étaient appelés patriarches. Par extension, ce titre était aussi appliqué à d’autres figures de l’Ancien Testament, comme ici au roi David.'
  - type: text
    content: ' David est bel et bien mort et enterré. Son tombeau'
  - type: note
    content: Ce tombeau, bien connu et vénéré, se trouvait sur le mont Sion.
  - type: text
    content: ' existe encore près d’ici aujourd’hui. '
  '3':
  - type: text
    content: 'Au même moment, ils virent apparaître des sortes de langues qui ressemblaient à des flammèches. Elles se séparèrent et allèrent se poser sur la tête de chacun d’eux. '
  '30':
  - type: text
    content: 'Mais il était prophète et il savait que Dieu lui avait promis, sous la foi du '
  - type: text
    content: serment
  - type: text
    content: ', de faire asseoir sur son trône un de ses descendants'
  - type: note
    content: Ps 132.11 ; 2 S 7.16 ; 1 Ch 17.12.
  - type: text
    content: '. '
  '31':
  - type: text
    content: 'Ainsi il a entrevu par avance la résurrection du Messie, et c’est d’elle qu’il parle en disant que '
  - type: text
    content: Dieu ne l’abandonnera pas dans le séjour des morts
  - type: text
    content: ' et qu’il ne laissera pas son corps se décomposer'
  - type: note
    content: Ps 16.10.
  - type: text
    content: .
  '32':
  - type: text
    content: 'Dieu a ressuscité ce Jésus dont je parle : nous en sommes tous témoins. '
  '33':
  - type: text
    content: Ensuite, il a été élevé pour siéger à la droite de Dieu
  - type: note
    content: 'Autre traduction : élevé par la main droite de Dieu.'
  - type: text
    content: . Et maintenant, comme Dieu l’a promis, il a reçu du Père l’Esprit Saint et il l’a répandu sur nous. C’est là ce que vous voyez et entendez.
  '34':
  - type: text
    content: 'En effet, David, lui, n’est pas monté au ciel, mais il a dit :'
  - type: text
    content: 'Le Seigneur a dit à mon Seigneur :'
  - type: text
    content: Viens siéger à ma droite
  - type: note
    content: La droite du roi est la place d’honneur (Ps 45.10 ; 1 R 2.19).
  '35':
  - type: text
    content: ' '
  - type: text
    content: jusqu’à ce que j’aie mis
  - type: text
    content: ' ╵'
  - type: text
    content: tes ennemis
  - type: text
    content: ' ╵'
  - type: text
    content: à terre sous tes pieds
  - type: note
    content: Ps 110.1.
  - type: text
    content: .
  '36':
  - type: text
    content: 'Voici donc ce que tout le peuple d’Israël doit savoir avec une entière certitude : Dieu a fait Seigneur et Messie ce Jésus que vous avez crucifié.'
  - type: heading
    content: Les premiers croyants
  '37':
  - type: text
    content: 'Ce discours toucha profondément ceux qui l’avaient entendu. Ils demandèrent à Pierre et aux autres apôtres : Frères, que devons-nous faire ?'
  '38':
  - type: text
    content: 'Pierre leur répondit : Changez'
  - type: note
    content: 'Autres traductions : repentez-vous ou changez d’attitude ou changez de comportement.'
  - type: text
    content: ', et que chacun de vous se fasse baptiser au nom de Jésus-Christ, pour que vos péchés vous soient pardonnés. Alors, vous recevrez le don du Saint-Esprit. '
  '39':
  - type: text
    content: Car la promesse est pour vous, pour vos enfants, et pour ceux qui vivent dans les pays lointains, tous ceux que le Seigneur notre Dieu fera venir à lui
  - type: note
    content: Voir Jl 3.5.
  - type: text
    content: .
  '4':
  - type: text
    content: Aussitôt, ils furent tous remplis du Saint-Esprit et commencèrent à parler dans différentes langues, chacun s’exprimant comme le Saint-Esprit lui donnait de le faire.
  '40':
  - type: text
    content: 'Pierre continuait, avec instance, à leur adresser d’autres paroles pour les persuader, et il les encourageait, leur disant : Recevez le salut, séparez-vous de cette génération dévoyée.'
  '41':
  - type: text
    content: Ceux qui acceptèrent les paroles de Pierre se firent baptiser et, ce jour-là, environ trois mille personnes furent ajoutées au nombre des croyants.
  '42':
  - type: text
    content: Dès lors, ils s’attachaient à écouter assidûment l’enseignement des apôtres, à vivre en communion les uns avec les autres, à rompre le pain
  - type: note
    content: 'rompre le pain: il pourrait s’agir de repas communs où l’on prenait la cène.'
  - type: text
    content: ' et à prier ensemble. '
  '43':
  - type: text
    content: 'Tout le monde était très impressionné, car les apôtres accomplissaient beaucoup de prodiges et de signes miraculeux. '
  '44':
  - type: text
    content: 'Tous les croyants vivaient unis entre eux et partageaient tout ce qu’ils possédaient. '
  '45':
  - type: text
    content: Ils vendaient leurs propriétés et leurs biens et répartissaient l’argent entre tous, selon les besoins de chacun.
  '46':
  - type: text
    content: 'Tous les jours, d’un commun accord, ils se retrouvaient dans la cour du Temple ; ils rompaient le pain dans les maisons, et prenaient leurs repas dans la joie, avec simplicité de cœur. '
  '47':
  - type: text
    content: Ils louaient Dieu, et le peuple tout entier leur était favorable.
  - type: text
    content: Le Seigneur ajoutait chaque jour à leur communauté ceux qu’il sauvait.
  '5':
  - type: text
    content: 'Or, à ce moment-là, des Juifs pieux, venus de chez tous les peuples du monde, séjournaient à Jérusalem. '
  '6':
  - type: text
    content: 'En entendant ce bruit, ils accoururent en foule et furent saisis de stupeur. En effet, chacun d’eux les entendait parler dans sa propre langue. '
  '7':
  - type: text
    content: 'Dans leur étonnement, ils n’en croyaient pas leurs oreilles et disaient : Voyons ! Ces gens qui parlent, ne viennent-ils pas tous de Galilée ? '
  '8':
  - type: text
    content: 'Comment se fait-il donc que nous les entendions s’exprimer chacun dans notre langue maternelle ? '
  '9':
  - type: text
    content: 'Nous sommes Parthes, Mèdes ou Elamites, nous habitons la Mésopotamie, la Judée, la Cappadoce, le Pont ou la province d’Asie, '
