document_id: EZR.8,21
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: La liste des Judéens rentrés d’exil avec Esdras
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Voici, avec leurs généalogies, la liste des groupes familiaux qui rentrèrent avec moi de Babylone sous le règne du roi Artaxerxès :'
  '10':
  - type: usfm
    marker: li1
    children:
    - type: text
      text: des descendants de Bani
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '8.10 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'D’après certains manuscrits de l’ancienne version grecque et '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: '3 Esdras '
      - type: usfm
        marker: ft
        children:
        - type: usfm
          marker: ref
          children:
          - type: text
            text: '8.36'
        - type: text
          text: . Ce nom manque dans le texte hébreu traditionnel.
      marker-yv: yv-n
    - type: text
      text: '  : Shelomith, fils de Yosiphia, à la tête de 160 hommes ;'
  '11':
  - type: usfm
    marker: li1
    children:
    - type: text
      text: 'des descendants de Bébaï : Zacharie, fils de Bébaï, à la tête de 28 hommes ;'
  '12':
  - type: usfm
    marker: li1
    children:
    - type: text
      text: 'des descendants d’Azgad : Yohanân, fils de Haqqathan, à la tête de 110 hommes ;'
  '13':
  - type: usfm
    marker: li1
    children:
    - type: text
      text: 'des descendants d’Adoniqam : les derniers qui s’appelaient Eliphéleth, Yeïel et Shemaya, à la tête de 60 hommes ;'
  '14':
  - type: usfm
    marker: li1
    children:
    - type: text
      text: 'des descendants de Bigvaï : Outaï et Zabboud, à la tête de 70 hommes.'
  - type: usfm
    marker: s1
    children:
    - type: text
      text: L’adjonction de lévites
    marker-yv: yv-h
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Je les rassemblai près de la rivière qui coule en direction d’Ahava
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '8.15 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Nom à la fois d’un cours d’eau et d’une localité (non identifiée) traversée par celui-ci. Probablement l’un des nombreux canaux d’irrigation qui se jetait dans le Tigre ou l’Euphrate.
      marker-yv: yv-n
    - type: text
      text: ' et nous y avons campé pendant trois jours. Je passai le peuple et les prêtres en revue, et je constatai qu’il n’y avait parmi eux aucun lévite. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Alors je convoquai les chefs Eliézer, Ariel, Shemaya, Elnathan, Yarib, Elnathan, Nathan, Zacharie et Meshoullam, ainsi que les deux savants Yoyarib et Elnathan. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Je leur demandai de se rendre chez Iddo, le chef de la localité de Kasiphia
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '8.17 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Localité inconnue des environs de Babylone, où se trouvait peut-être un sanctuaire juif.
      marker-yv: yv-n
    - type: text
      text: ', et je leur indiquai ce qu’ils devaient lui dire, à lui et à ses collaborateurs, les desservants du Temple qui se trouvaient à Kasiphia, pour nous envoyer des assistants pour le temple de notre Dieu. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Et comme notre Dieu était avec nous et nous témoignait sa bonté, ils nous amenèrent Shérébia, un homme avisé d’entre les descendants de Mahli, descendant de Lévi, lui-même fils d’Israël, accompagné de dix-huit hommes de sa parenté, dont ses fils, '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'ainsi que Hashabia et Esaïe, descendants de Merari, avec vingt hommes de leur parenté dont leurs fils. '
  '2':
  - type: usfm
    marker: li1
    children:
    - type: text
      text: 'Des descendants de Phinéas : Guershom ;'
  - type: usfm
    marker: li1
    children:
    - type: text
      text: 'des descendants d’Itamar : Daniel ;'
  - type: usfm
    marker: li1
    children:
    - type: text
      text: 'des descendants de David : Hattoush ; '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ils ramenèrent également 220 desservants du Temple, descendants de ceux que David et ses ministres avaient nommés pour assister les lévites. Tous avaient été nommément désignés.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Jeûne et prière en vue du voyage
    marker-yv: yv-h
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Là, au bord du fleuve Ahava, je proclamai un jeûne pour que nous nous humiliions devant notre Dieu afin de lui demander qu’il nous accorde, pour nous, pour nos enfants et pour tous nos biens, de voyager en toute sécurité. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'J’aurais eu honte de demander à l’empereur de nous fournir une escorte de soldats et de cavaliers pour nous protéger contre l’ennemi pendant la route, car nous avions dit à l’empereur que notre Dieu protégeait avec bonté tous ceux qui lui font confiance, tandis que sa colère pèse lourdement sur tous ceux qui l’abandonnent. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: C’est pour cela que nous avons jeûné et demandé cette faveur à notre Dieu, et il a exaucé notre prière.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Les biens destinés au Temple sont confiés à des prêtres
    marker-yv: yv-h
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ensuite, je désignai comme chefs douze des principaux prêtres, Shérébia, Hashabia et dix de leurs compagnons. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Je pesai devant eux l’argent, l’or et les objets de valeur offerts pour le Temple par l’empereur, ses conseillers et ses ministres, ainsi que par tous les Israélites qui se trouvaient à Babylone. '
  '26':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Je leur confiai ainsi vingt tonnes d’argent, trois tonnes d’objets en argent et trois tonnes d’or, '
  '27':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'vingt coupes d’or valant mille pièces d’or, deux magnifiques vases de bronze poli, aussi précieux que de l’or. '
  '28':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Puis je leur dis : Vous êtes consacrés à l’Eternel, ces objets sont sacrés, cet argent et cet or sont des dons volontaires à l’Eternel, le Dieu de vos ancêtres. '
  '29':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Veillez soigneusement sur ces trésors, ils sont sous votre garde jusqu’au jour où vous les pèserez devant les chefs des prêtres et les lévites, ainsi que devant les chefs des groupes familiaux d’Israël à Jérusalem, dans les locaux annexes du temple de l’Eternel
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '8.29 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Pièces annexes du Temple où l’on déposait les offrandes (comparer 1 R 6.5-10 ; Ez 41.5-11 ; 42.1-14).
      marker-yv: yv-n
    - type: text
      text: .
  '3':
  - type: usfm
    marker: li1
    children:
    - type: text
      text: des descendants de Shekania,
  - type: usfm
    marker: li1
    children:
    - type: text
      text: 'de Pareosh : Zacharie, avec qui furent recensés 150 hommes ;'
  '30':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Les prêtres et les lévites prirent l’or, l’argent et les objets de valeur qui avaient été pesés, pour les porter à Jérusalem au temple de notre Dieu.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: L’arrivée à Jérusalem
    marker-yv: yv-h
  '31':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Le douzième jour du premier mois, nous avons quitté le fleuve Ahava pour nous rendre à Jérusalem. Tout au long de la route, notre Dieu a pris soin de nous en nous protégeant des attaques d’ennemis et des embuscades des pillards.
  '32':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'A notre arrivée à Jérusalem, nous avons pris trois jours de repos. '
  '33':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Le quatrième jour, nous avons pesé l’argent, l’or et les objets de valeur dans le Temple, pour les remettre entre les mains de Merémoth, fils d’Urie, le prêtre ; il était accompagné d’Eléazar, fils de Phinéas, et des lévites Yozabad, fils de Josué, et Noadia, fils de Binnouï. '
  '34':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Tout fut compté et pesé et le poids total fut consigné par écrit à ce moment-là. '
  '35':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Les déportés qui revenaient d’exil offrirent alors en holocauste au Dieu d’Israël pour l’ensemble du peuple : 12 taureaux, 96 béliers, 77 agneaux et 12 boucs en sacrifice pour le péché. On offrit tous ces holocaustes à l’Eternel. '
  '36':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Puis ils transmirent le document contenant les décrets impériaux aux satrapes
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '8.36 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Les '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'satrapes '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: étaient chargés de l’administration des provinces de l’empire, les gouverneurs étant sous leurs ordres.
      marker-yv: yv-n
    - type: text
      text: ' de l’empereur et aux gouverneurs de la province à l’ouest de l’Euphrate. Ceux-ci accordèrent alors leur soutien au peuple pour la construction du temple de Dieu.'
  '4':
  - type: usfm
    marker: li1
    children:
    - type: text
      text: 'des descendants de Pahath-Moab : Elyehoénaï, fils de Zerahya, à la tête de 200 hommes ;'
  '5':
  - type: usfm
    marker: li1
    children:
    - type: text
      text: des descendants de Zattou
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '8.5 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'D’après certains manuscrits de l’ancienne version grecque et '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: '3 Esdras '
      - type: usfm
        marker: ft
        children:
        - type: usfm
          marker: ref
          children:
          - type: text
            text: '8.32'
        - type: text
          text: . Ce nom manque dans le texte hébreu traditionnel.
      marker-yv: yv-n
    - type: text
      text: '  : Shekania, fils de Yahaziel, à la tête de 300 hommes ;'
  '6':
  - type: usfm
    marker: li1
    children:
    - type: text
      text: 'des descendants d’Adîn : Ebed, fils de Jonathan, à la tête de 50 hommes ;'
  '7':
  - type: usfm
    marker: li1
    children:
    - type: text
      text: 'des descendants d’Elam : Esaïe, fils d’Atalia, à la tête de 70 hommes ;'
  '8':
  - type: usfm
    marker: li1
    children:
    - type: text
      text: 'des descendants de Shephatia : Zebadia fils de Michaël, à la tête de 80 hommes ;'
  '9':
  - type: usfm
    marker: li1
    children:
    - type: text
      text: 'des descendants de Joab : Abdias, fils de Yehiel, à la tête de 218 hommes ;'
