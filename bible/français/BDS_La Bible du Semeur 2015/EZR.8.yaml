document_id: EZR.8,21
type_code: fra
verses:
  '1':
  - type: heading
    content: La liste des Judéens rentrés d’exil avec Esdras
  - type: text
    content: 'Voici, avec leurs généalogies, la liste des groupes familiaux qui rentrèrent avec moi de Babylone sous le règne du roi Artaxerxès :'
  '10':
  - type: text
    content: des descendants de Bani
  - type: note
    content: D’après certains manuscrits de l’ancienne version grecque et 3 Esdras 8.36. Ce nom manque dans le texte hébreu traditionnel.
  - type: text
    content: '  : Shelomith, fils de Yosiphia, à la tête de 160 hommes ;'
  '11':
  - type: text
    content: 'des descendants de Bébaï : Zacharie, fils de Bébaï, à la tête de 28 hommes ;'
  '12':
  - type: text
    content: 'des descendants d’Azgad : Yohanân, fils de Haqqathan, à la tête de 110 hommes ;'
  '13':
  - type: text
    content: 'des descendants d’Adoniqam : les derniers qui s’appelaient Eliphéleth, Yeïel et Shemaya, à la tête de 60 hommes ;'
  '14':
  - type: text
    content: 'des descendants de Bigvaï : Outaï et Zabboud, à la tête de 70 hommes.'
  - type: heading
    content: L’adjonction de lévites
  '15':
  - type: text
    content: Je les rassemblai près de la rivière qui coule en direction d’Ahava
  - type: note
    content: Nom à la fois d’un cours d’eau et d’une localité (non identifiée) traversée par celui-ci. Probablement l’un des nombreux canaux d’irrigation qui se jetait dans le Tigre ou l’Euphrate.
  - type: text
    content: ' et nous y avons campé pendant trois jours. Je passai le peuple et les prêtres en revue, et je constatai qu’il n’y avait parmi eux aucun lévite. '
  '16':
  - type: text
    content: 'Alors je convoquai les chefs Eliézer, Ariel, Shemaya, Elnathan, Yarib, Elnathan, Nathan, Zacharie et Meshoullam, ainsi que les deux savants Yoyarib et Elnathan. '
  '17':
  - type: text
    content: Je leur demandai de se rendre chez Iddo, le chef de la localité de Kasiphia
  - type: note
    content: Localité inconnue des environs de Babylone, où se trouvait peut-être un sanctuaire juif.
  - type: text
    content: ', et je leur indiquai ce qu’ils devaient lui dire, à lui et à ses collaborateurs, les desservants du Temple qui se trouvaient à Kasiphia, pour nous envoyer des assistants pour le temple de notre Dieu. '
  '18':
  - type: text
    content: 'Et comme notre Dieu était avec nous et nous témoignait sa bonté, ils nous amenèrent Shérébia, un homme avisé d’entre les descendants de Mahli, descendant de Lévi, lui-même fils d’Israël, accompagné de dix-huit hommes de sa parenté, dont ses fils, '
  '19':
  - type: text
    content: 'ainsi que Hashabia et Esaïe, descendants de Merari, avec vingt hommes de leur parenté dont leurs fils. '
  '2':
  - type: text
    content: 'Des descendants de Phinéas : Guershom ;'
  - type: text
    content: 'des descendants d’Itamar : Daniel ;'
  - type: text
    content: 'des descendants de David : Hattoush ; '
  '20':
  - type: text
    content: Ils ramenèrent également 220 desservants du Temple, descendants de ceux que David et ses ministres avaient nommés pour assister les lévites. Tous avaient été nommément désignés.
  - type: heading
    content: Jeûne et prière en vue du voyage
  '21':
  - type: text
    content: 'Là, au bord du fleuve Ahava, je proclamai un jeûne pour que nous nous humiliions devant notre Dieu afin de lui demander qu’il nous accorde, pour nous, pour nos enfants et pour tous nos biens, de voyager en toute sécurité. '
  '22':
  - type: text
    content: 'J’aurais eu honte de demander à l’empereur de nous fournir une escorte de soldats et de cavaliers pour nous protéger contre l’ennemi pendant la route, car nous avions dit à l’empereur que notre Dieu protégeait avec bonté tous ceux qui lui font confiance, tandis que sa colère pèse lourdement sur tous ceux qui l’abandonnent. '
  '23':
  - type: text
    content: C’est pour cela que nous avons jeûné et demandé cette faveur à notre Dieu, et il a exaucé notre prière.
  - type: heading
    content: Les biens destinés au Temple sont confiés à des prêtres
  '24':
  - type: text
    content: 'Ensuite, je désignai comme chefs douze des principaux prêtres, Shérébia, Hashabia et dix de leurs compagnons. '
  '25':
  - type: text
    content: 'Je pesai devant eux l’argent, l’or et les objets de valeur offerts pour le Temple par l’empereur, ses conseillers et ses ministres, ainsi que par tous les Israélites qui se trouvaient à Babylone. '
  '26':
  - type: text
    content: 'Je leur confiai ainsi vingt tonnes d’argent, trois tonnes d’objets en argent et trois tonnes d’or, '
  '27':
  - type: text
    content: 'vingt coupes d’or valant mille pièces d’or, deux magnifiques vases de bronze poli, aussi précieux que de l’or. '
  '28':
  - type: text
    content: 'Puis je leur dis : Vous êtes consacrés à l’Eternel, ces objets sont sacrés, cet argent et cet or sont des dons volontaires à l’Eternel, le Dieu de vos ancêtres. '
  '29':
  - type: text
    content: Veillez soigneusement sur ces trésors, ils sont sous votre garde jusqu’au jour où vous les pèserez devant les chefs des prêtres et les lévites, ainsi que devant les chefs des groupes familiaux d’Israël à Jérusalem, dans les locaux annexes du temple de l’Eternel
  - type: note
    content: Pièces annexes du Temple où l’on déposait les offrandes (comparer 1 R 6.5-10 ; Ez 41.5-11 ; 42.1-14).
  - type: text
    content: .
  '3':
  - type: text
    content: des descendants de Shekania,
  - type: text
    content: 'de Pareosh : Zacharie, avec qui furent recensés 150 hommes ;'
  '30':
  - type: text
    content: Les prêtres et les lévites prirent l’or, l’argent et les objets de valeur qui avaient été pesés, pour les porter à Jérusalem au temple de notre Dieu.
  - type: heading
    content: L’arrivée à Jérusalem
  '31':
  - type: text
    content: Le douzième jour du premier mois, nous avons quitté le fleuve Ahava pour nous rendre à Jérusalem. Tout au long de la route, notre Dieu a pris soin de nous en nous protégeant des attaques d’ennemis et des embuscades des pillards.
  '32':
  - type: text
    content: 'A notre arrivée à Jérusalem, nous avons pris trois jours de repos. '
  '33':
  - type: text
    content: 'Le quatrième jour, nous avons pesé l’argent, l’or et les objets de valeur dans le Temple, pour les remettre entre les mains de Merémoth, fils d’Urie, le prêtre ; il était accompagné d’Eléazar, fils de Phinéas, et des lévites Yozabad, fils de Josué, et Noadia, fils de Binnouï. '
  '34':
  - type: text
    content: 'Tout fut compté et pesé et le poids total fut consigné par écrit à ce moment-là. '
  '35':
  - type: text
    content: 'Les déportés qui revenaient d’exil offrirent alors en holocauste au Dieu d’Israël pour l’ensemble du peuple : 12 taureaux, 96 béliers, 77 agneaux et 12 boucs en sacrifice pour le péché. On offrit tous ces holocaustes à l’Eternel. '
  '36':
  - type: text
    content: Puis ils transmirent le document contenant les décrets impériaux aux satrapes
  - type: note
    content: Les satrapes étaient chargés de l’administration des provinces de l’empire, les gouverneurs étant sous leurs ordres.
  - type: text
    content: ' de l’empereur et aux gouverneurs de la province à l’ouest de l’Euphrate. Ceux-ci accordèrent alors leur soutien au peuple pour la construction du temple de Dieu.'
  '4':
  - type: text
    content: 'des descendants de Pahath-Moab : Elyehoénaï, fils de Zerahya, à la tête de 200 hommes ;'
  '5':
  - type: text
    content: des descendants de Zattou
  - type: note
    content: D’après certains manuscrits de l’ancienne version grecque et 3 Esdras 8.32. Ce nom manque dans le texte hébreu traditionnel.
  - type: text
    content: '  : Shekania, fils de Yahaziel, à la tête de 300 hommes ;'
  '6':
  - type: text
    content: 'des descendants d’Adîn : Ebed, fils de Jonathan, à la tête de 50 hommes ;'
  '7':
  - type: text
    content: 'des descendants d’Elam : Esaïe, fils d’Atalia, à la tête de 70 hommes ;'
  '8':
  - type: text
    content: 'des descendants de Shephatia : Zebadia fils de Michaël, à la tête de 80 hommes ;'
  '9':
  - type: text
    content: 'des descendants de Joab : Abdias, fils de Yehiel, à la tête de 218 hommes ;'
