document_id: COL.INTRO1,21
type_code: fra
verses:
  '1':
  - type: text
    content: Introduction
  - type: text
    content: La lettre aux chrétiens de la ville de Colosses (dans la Turquie actuelle) fut rédigée en prison par Paul en même temps que celle dite « aux Ephésiens ». Cette Eglise ne fut pas fondée par Paul, mais c’est l’un de ses collaborateurs, Epaphras, qui a annoncé l’Evangile à Colosses (Col 1.7).
  - type: text
    content: 'Informé, peut-être par Epaphras (Phm 23), du trouble que jetaient, dans les esprits des chrétiens, des gens qui enseignaient des erreurs, Paul rédige cette lettre pour rappeler les fondements de l’Evangile. Il évoque, par des allusions, l’enseignement erroné qu’il combat : c’est un système philosophique (2.8) d’inspiration grecque, où se mêlent des croyances et des pratiques juives (culte des anges, circoncision) de tendance ascétique (2.20-23). Cette erreur ôtait à Jésus-Christ sa place unique de seul intermédiaire entre Dieu et les hommes, de seul Sauveur. Elle faisait retomber les chrétiens dans le légalisme. Ses développements, au deuxième siècle, sont bien connus sous le nom de gnosticisme.'
  - type: text
    content: 'Après ses habituelles salutations, l’action de grâces et la prière (1.1-11), l’apôtre dépeint la personne et l’œuvre de Christ (1.12-23). Suit une parenthèse sur ses combats personnels pour l’avancement de l’Evangile à Colosses et à Laodicée (1.24 à 2.5). Puis il poursuit sa description de l’œuvre de Christ (2.6-19) : c’est dans l’union avec lui que se trouve la « plénitude » que les enseignants de mensonges promettaient aux Colossiens.'
  - type: text
    content: 'Dans la deuxième partie de sa lettre, il en tire les conséquences pratiques :'
  - type: text
    content: – La vie chrétienne est une vie de liberté (2.20 à 3.5),
  - type: text
    content: – elle se caractérise par l’amour et la paix (3.6-17),
  - type: text
    content: – dont les relations familiales et sociales porteront la marque (3.18 à 4.6).
