document_id: PSA.73,21
type_code: fra
verses:
  '1':
  - type: usfm
    marker: ms1
    children:
    - type: text
      text: Troisième livre
    marker-yv: yv-h
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Pourquoi les méchants réussissent-ils ?
    marker-yv: yv-h
  - type: usfm
    marker: d
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: Psaume d’Asaph
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '73.1 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Voir note '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: '50.1'
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: .
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Oui, Dieu est bon pour Israël,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: pour tous ceux qui ont le cœur pur.
  '10':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: Aussi le peuple les suit-il,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: buvant à longs traits leurs paroles,
  '11':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'tout en disant : « Dieu ? Que sait-il ?'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Celui qui est là-haut ╵connaît-il quelque chose ? »
  '12':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'Voilà comment sont les méchants :'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: toujours tranquilles, ╵ils accumulent les richesses.
  '13':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: Alors, c’est donc en vain ╵que je suis resté pur ╵au fond de moi,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: que j’ai lavé mes mains ╵pour les conserver innocentes !
  '14':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: Tous les jours, je subis des coups,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: je suis châtié chaque matin !
  '15':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'Si je disais : « Parlons comme eux »,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: alors je trahirais tes fils.
  '16':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'Je me suis mis à réfléchir : ╵pour tenter de comprendre ;'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: cela était pour moi ╵un sujet de tourment,
  '17':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: jusqu’à ce que je me rende au sanctuaire de Dieu
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '73.17 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Autres traductions : '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'dans le sanctuaire, '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'ou '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: dans le dessein, les secrets, les mystères de Dieu.
      marker-yv: yv-n
    - type: text
      text: .
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Alors j’ai réfléchi ╵au sort qui les attend.
  '18':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: Car, en fait, tu les mets ╵sur un terrain glissant,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: tu les entraînes vers la ruine.
  '19':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: Comme soudain ╵les voilà dévastés !
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ils sont détruits ╵et emportés par l’épouvante.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: Pourtant, il s’en fallut de peu ╵que mes pieds ne trébuchent,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: un rien de plus, et je tombais.
  '20':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: Comme les images du rêve ╵s’évanouissant au réveil,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Seigneur, quand tu interviendras, ╵tu feras d’eux bien peu de cas.
  '21':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: Oui, quand j’avais le cœur amer
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et que je me tourmentais intérieurement,
  '22':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: j’étais un sot, un ignorant,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: je me comportais avec toi ╵comme une bête.
  '23':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: Mais je suis toujours avec toi,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et tu m’as saisi la main droite,
  '24':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: par ton conseil, tu me conduis,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: puis tu me prendras dans la gloire.
  '25':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: Qui ai-je au ciel, si ce n’est toi ?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et que désirer d’autre ╵sur cette terre ╵car je suis avec toi ?
  '26':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: Mon corps peut s’épuiser ╵et mon cœur défaillir,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Dieu reste mon rocher, ╵et mon bien précieux pour toujours.
  '27':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: Qui t’abandonne se perdra,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et tu anéantiras ╵tous ceux qui te sont infidèles.
  '28':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: Tandis que mon bonheur à moi, ╵c’est d’être près de Dieu.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: J’ai pris le Seigneur, l’Eternel, ╵comme refuge
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et je raconterai toutes ses œuvres.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: J’étais jaloux des arrogants
  - type: usfm
    marker: q1
    children:
    - type: text
      text: en voyant la tranquillité ╵des gens méchants.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: Car ils sont exempts de tourments ; ╵jusqu’à leur mort
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '73.4 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: jusqu’à leur mort
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: ': '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'en coupant autrement les mots hébreux, on comprend : '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: ils ont la santé.
      marker-yv: yv-n
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et ont de l’embonpoint.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: Ils passent à côté des peines ╵qui sont le lot commun des hommes.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ils ne subissent pas les maux ╵qui frappent les humains.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: Aussi s’ornent-ils d’arrogance ╵comme on porte un collier,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ils s’enveloppent de violence ╵comme d’un vêtement,
  '7':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: leurs yeux sont pétillants ╵dans leur visage plein de graisse,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: les mauvais désirs de leur cœur ╵débordent sans mesure.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: Ils sont moqueurs, ╵ils parlent méchamment
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et, sur un ton hautain, ╵menacent d’opprimer.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: Leur bouche s’en prend au ciel même,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: leur langue sévit sur la terre.
