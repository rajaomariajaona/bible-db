document_id: PSA.73,21
type_code: fra
verses:
  '1':
  - type: heading
    content: Troisième livre
  - type: heading
    content: Pourquoi les méchants réussissent-ils ?
  - type: text
    content: Psaume d’Asaph
  - type: note
    content: Voir note 50.1.
  - type: text
    content: .
  - type: text
    content: Oui, Dieu est bon pour Israël,
  - type: text
    content: pour tous ceux qui ont le cœur pur.
  '10':
  - type: text
    content: Aussi le peuple les suit-il,
  - type: text
    content: buvant à longs traits leurs paroles,
  '11':
  - type: text
    content: 'tout en disant : « Dieu ? Que sait-il ?'
  - type: text
    content: Celui qui est là-haut ╵connaît-il quelque chose ? »
  '12':
  - type: text
    content: 'Voilà comment sont les méchants :'
  - type: text
    content: toujours tranquilles, ╵ils accumulent les richesses.
  '13':
  - type: text
    content: Alors, c’est donc en vain ╵que je suis resté pur ╵au fond de moi,
  - type: text
    content: que j’ai lavé mes mains ╵pour les conserver innocentes !
  '14':
  - type: text
    content: Tous les jours, je subis des coups,
  - type: text
    content: je suis châtié chaque matin !
  '15':
  - type: text
    content: 'Si je disais : « Parlons comme eux »,'
  - type: text
    content: alors je trahirais tes fils.
  '16':
  - type: text
    content: 'Je me suis mis à réfléchir : ╵pour tenter de comprendre ;'
  - type: text
    content: cela était pour moi ╵un sujet de tourment,
  '17':
  - type: text
    content: jusqu’à ce que je me rende au sanctuaire de Dieu
  - type: note
    content: 'Autres traductions : dans le sanctuaire, ou dans le dessein, les secrets, les mystères de Dieu.'
  - type: text
    content: .
  - type: text
    content: Alors j’ai réfléchi ╵au sort qui les attend.
  '18':
  - type: text
    content: Car, en fait, tu les mets ╵sur un terrain glissant,
  - type: text
    content: tu les entraînes vers la ruine.
  '19':
  - type: text
    content: Comme soudain ╵les voilà dévastés !
  - type: text
    content: Ils sont détruits ╵et emportés par l’épouvante.
  '2':
  - type: text
    content: Pourtant, il s’en fallut de peu ╵que mes pieds ne trébuchent,
  - type: text
    content: un rien de plus, et je tombais.
  '20':
  - type: text
    content: Comme les images du rêve ╵s’évanouissant au réveil,
  - type: text
    content: Seigneur, quand tu interviendras, ╵tu feras d’eux bien peu de cas.
  '21':
  - type: text
    content: Oui, quand j’avais le cœur amer
  - type: text
    content: et que je me tourmentais intérieurement,
  '22':
  - type: text
    content: j’étais un sot, un ignorant,
  - type: text
    content: je me comportais avec toi ╵comme une bête.
  '23':
  - type: text
    content: Mais je suis toujours avec toi,
  - type: text
    content: et tu m’as saisi la main droite,
  '24':
  - type: text
    content: par ton conseil, tu me conduis,
  - type: text
    content: puis tu me prendras dans la gloire.
  '25':
  - type: text
    content: Qui ai-je au ciel, si ce n’est toi ?
  - type: text
    content: Et que désirer d’autre ╵sur cette terre ╵car je suis avec toi ?
  '26':
  - type: text
    content: Mon corps peut s’épuiser ╵et mon cœur défaillir,
  - type: text
    content: Dieu reste mon rocher, ╵et mon bien précieux pour toujours.
  '27':
  - type: text
    content: Qui t’abandonne se perdra,
  - type: text
    content: et tu anéantiras ╵tous ceux qui te sont infidèles.
  '28':
  - type: text
    content: Tandis que mon bonheur à moi, ╵c’est d’être près de Dieu.
  - type: text
    content: J’ai pris le Seigneur, l’Eternel, ╵comme refuge
  - type: text
    content: et je raconterai toutes ses œuvres.
  '3':
  - type: text
    content: J’étais jaloux des arrogants
  - type: text
    content: en voyant la tranquillité ╵des gens méchants.
  '4':
  - type: text
    content: Car ils sont exempts de tourments ; ╵jusqu’à leur mort
  - type: note
    content: 'jusqu’à leur mort: en coupant autrement les mots hébreux, on comprend : ils ont la santé.'
  - type: text
    content: et ont de l’embonpoint.
  '5':
  - type: text
    content: Ils passent à côté des peines ╵qui sont le lot commun des hommes.
  - type: text
    content: Ils ne subissent pas les maux ╵qui frappent les humains.
  '6':
  - type: text
    content: Aussi s’ornent-ils d’arrogance ╵comme on porte un collier,
  - type: text
    content: ils s’enveloppent de violence ╵comme d’un vêtement,
  '7':
  - type: text
    content: leurs yeux sont pétillants ╵dans leur visage plein de graisse,
  - type: text
    content: les mauvais désirs de leur cœur ╵débordent sans mesure.
  '8':
  - type: text
    content: Ils sont moqueurs, ╵ils parlent méchamment
  - type: text
    content: et, sur un ton hautain, ╵menacent d’opprimer.
  '9':
  - type: text
    content: Leur bouche s’en prend au ciel même,
  - type: text
    content: leur langue sévit sur la terre.
