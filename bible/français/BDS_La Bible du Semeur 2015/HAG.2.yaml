document_id: HAG.2,21
type_code: fra
verses:
  '1':
  - type: heading
    content: La gloire future du nouveau temple
  - type: text
    content: Le vingt et unième jour du septième mois
  - type: note
    content: Le 17 octobre 520 av. J.-C., le dernier jour de la fête des Cabanes. C’était l’époque où l’on fêtait les moissons de l’été (Lv 23.33-43) bien que la moisson ait été maigre (1.11). Salomon avait dédicacé le Temple durant cette même fête (1 R 8.2).
  - type: text
    content: ', l’Eternel fit entendre sa parole par la bouche du prophète Aggée en ces termes :'
  '10':
  - type: text
    content: La deuxième année du règne de Darius, le vingt-quatrième jour du neuvième mois
  - type: note
    content: Le 18 décembre 520 av. J.-C., deux mois après le message précédent.
  - type: text
    content: ', l’Eternel adressa la parole au prophète Aggée en ces termes :'
  '11':
  - type: text
    content: 'Voici ce que déclare le Seigneur des armées célestes : Demande donc aux prêtres'
  - type: note
    content: Voir Lv 10.10-11.
  - type: text
    content: ' leurs instructions. Dis-leur : '
  '12':
  - type: text
    content: « Si un homme porte dans le pan de son vêtement de la viande sainte et que ce pan de vêtement entre en contact avec du pain, avec un mets cuit, avec du vin, de l’huile ou quelque autre aliment, l’aliment touché sera-t-il consacré
  - type: note
    content: C’est-à-dire, apte à servir au culte.
  - type: text
    content: '  ? »'
  - type: text
    content: – Non, répondirent les prêtres.
  '13':
  - type: text
    content: 'Alors Aggée demanda : Si un homme s’est rendu rituellement impur par le contact d’un cadavre et touche à l’un de ces aliments, celui-ci sera-il rendu impur par là ?'
  - type: text
    content: – Oui, répondirent les prêtres, il sera impur
  - type: note
    content: Voir Lv 22.4 ; Nb 19.11-13, 22.
  - type: text
    content: .
  '14':
  - type: text
    content: 'Alors Aggée reprit et dit : Ainsi en est-il de ce peuple. Voilà ce qu’est cette nation à mes yeux – l’Eternel le déclare. Ainsi en est-il aussi de toutes leurs réalisations et de tout ce qu’ils m’offrent là : c’est impur'
  - type: note
    content: Le refus de reconstruire le Temple entraînait une impureté rituelle qui contaminait toutes les réalisations du peuple.
  - type: text
    content: .
  - type: heading
    content: La bénédiction promise
  '15':
  - type: text
    content: 'Et maintenant, considérez bien ce qui se produira à partir d’aujourd’hui. Avant d’avoir commencé à poser pierre sur pierre pour le temple de l’Eternel, '
  '16':
  - type: text
    content: 'vous alliez à un tas de blé supposé contenir deux quintaux, mais il n’y en avait qu’un ; vous vous rendiez au pressoir, en espérant obtenir un hectolitre de vin, et vous ne trouviez que quarante litres. '
  '17':
  - type: text
    content: Je vous ai châtiés en frappant le fruit de votre travail par diverses maladies des céréales
  - type: note
    content: Mentionnées parmi les malédictions de l’alliance en cas de désobéissance (Dt 28.22  ; voir 1 R 8.37 ; Am 4.9).
  - type: text
    content: ' comme la rouille et la nielle, et par la grêle, mais vous n’êtes pas revenus à moi – l’Eternel le déclare.'
  '18':
  - type: text
    content: 'Considérez donc attentivement ce qui va arriver à partir d’aujourd’hui et par la suite, c’est-à-dire à partir du vingt-quatrième jour du neuvième mois, jour où l’on s’est mis à rebâtir le temple de l’Eternel. Oui, faites bien attention à ce qui va se passer ! '
  '19':
  - type: text
    content: Reste-t-il encore de la semence dans vos greniers ? Même la vigne, le figuier, le grenadier et l’olivier n’ont rien produit. Mais à partir de ce jour-ci, je vous accorderai ma bénédiction.
  - type: heading
    content: Les promesses pour Zorobabel
  '2':
  - type: text
    content: 'Parle à Zorobabel, fils de Shealtiel, gouverneur de Juda, à Josué, fils de Yehotsadaq, le grand-prêtre, et au reste du peuple, et dis-leur :'
  '20':
  - type: text
    content: 'L’Eternel adressa la parole à Aggée une seconde fois, le vingt-quatrième jour du mois, en ces termes :'
  '21':
  - type: text
    content: 'Dis à Zorobabel, gouverneur de Juda : J’ébranlerai le ciel, j’ébranlerai le ciel et la terre, '
  '22':
  - type: text
    content: 'et je renverserai les trônes des royaumes. J’anéantirai la puissance des royaumes étrangers, je ferai culbuter les chars de guerre et ceux qui les conduisent, chevaux et cavaliers tomberont à terre, car chacun sera frappé par l’épée de son compatriote. '
  '23':
  - type: text
    content: En ce jour-là, déclare l’Eternel, le Seigneur des armées célestes, je te prendrai, Zorobabel, toi, fils de Shealtiel, mon serviteur, oui, l’Eternel le déclare, et je ferai de toi comme le sceau qu’on porte au doigt
  - type: note
    content: Servant à cacheter les édits pour les authentifier.
  - type: text
    content: . Car moi je t’ai choisi. Voilà ce que déclare le Seigneur des armées célestes.
  '3':
  - type: text
    content: Reste-t-il, parmi vous, quelqu’un qui ait connu ce temple dans son ancienne gloire
  - type: note
    content: Quelques Judéens âgés pouvaient se souvenir du temple de Salomon détruit soixante-sept ans auparavant.
  - type: text
    content: '  ? Et à présent, comment le voyez-vous ? N’est-il pas comme rien aujourd’hui à vos yeux ? '
  '4':
  - type: text
    content: 'Mais maintenant : courage, Zorobabel, dit l’Eternel. Toi aussi, Josué, fils de Yehotsadaq, grand-prêtre, prends courage ! Courage, vous aussi, tous les gens du pays ! dit l’Eternel. Mettez-vous à l’œuvre, car je suis avec vous. Voilà ce que déclare le Seigneur des armées célestes. '
  '5':
  - type: text
    content: Tel est l’engagement que j’ai pris envers vous quand vous avez quitté l’Egypte. Et mon Esprit est présent au milieu de vous. Ne craignez rien !
  '6':
  - type: text
    content: 'Car voici ce que dit l’Eternel, le Seigneur des armées célestes : Une fois encore, et dans peu de temps, j’ébranlerai le ciel et la terre, la mer et la terre ferme'
  - type: note
    content: Voir Jl 4.16  ; cité en Hé 12.26-27.
  - type: text
    content: '. '
  '7':
  - type: text
    content: 'J’ébranlerai les peuples, et les richesses de tous les peuples afflueront en ce lieu. Quant à ce temple, je le remplirai de gloire, voilà ce que déclare le Seigneur des armées célestes. '
  '8':
  - type: text
    content: 'C’est à moi qu’appartient tout l’argent et tout l’or. Voilà ce que déclare le Seigneur des armées célestes. '
  '9':
  - type: text
    content: La gloire de ce nouveau temple surpassera beaucoup la gloire de l’ancien, et je ferai régner la paix en ce lieu-ci. C’est l’Eternel qui le déclare, le Seigneur des armées célestes.
  - type: heading
    content: Impureté et bénédiction
