document_id: HAG.2
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: La gloire future du nouveau temple
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Le vingt et unième jour du septième mois
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '2.1 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Le 17 octobre 520 av. J.-C., le dernier jour de la fête des Cabanes. C’était l’époque où l’on fêtait les moissons de l’été (
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Lv 23.33-43
        metadata:
          usfm: LEV.23.33+LEV.23.34+LEV.23.35+LEV.23.36+LEV.23.37+LEV.23.38+LEV.23.39+LEV.23.40+LEV.23.41+LEV.23.42+LEV.23.43
      - type: text
        text: ) bien que la moisson ait été maigre (
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '1.11'
        metadata:
          usfm: HAG.1.11
      - type: text
        text: ). Salomon avait dédicacé le Temple durant cette même fête (
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1 R 8.2
        metadata:
          usfm: 1KI.8.2
      - type: text
        text: ).
    marker-yv: yv-n
  - type: text
    text: ', l’Eternel fit entendre sa parole par la bouche du prophète Aggée en ces termes :'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Parle à Zorobabel, fils de Shealtiel, gouverneur de Juda, à Josué, fils de Yehotsadaq, le grand-prêtre, et au reste du peuple, et dis-leur :'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Reste-t-il, parmi vous, quelqu’un qui ait connu ce temple dans son ancienne gloire
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '2.3 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Quelques Judéens âgés pouvaient se souvenir du temple de Salomon détruit soixante-sept ans auparavant.
    marker-yv: yv-n
  - type: text
    text: '  ? Et à présent, comment le voyez-vous ? N’est-il pas comme rien aujourd’hui à vos yeux ? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Mais maintenant : courage, Zorobabel, dit l’Eternel. Toi aussi, Josué, fils de Yehotsadaq, grand-prêtre, prends courage ! Courage, vous aussi, tous les gens du pays ! dit l’Eternel. Mettez-vous à l’œuvre, car je suis avec vous. Voilà ce que déclare le Seigneur des armées célestes. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Tel est l’engagement que j’ai pris envers vous quand vous avez quitté l’Egypte. Et mon Esprit est présent au milieu de vous. Ne craignez rien !
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Car voici ce que dit l’Eternel, le Seigneur des armées célestes : Une fois encore, et dans peu de temps, j’ébranlerai le ciel et la terre, la mer et la terre ferme'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '2.6 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Voir '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Jl 4.16
        metadata:
          usfm: JOL.4.16
      - type: text
        text: '  ; cité en '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Hé 12.26-27
        metadata:
          usfm: HEB.12.26+HEB.12.27
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'J’ébranlerai les peuples, et les richesses de tous les peuples afflueront en ce lieu. Quant à ce temple, je le remplirai de gloire, voilà ce que déclare le Seigneur des armées célestes. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'C’est à moi qu’appartient tout l’argent et tout l’or. Voilà ce que déclare le Seigneur des armées célestes. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: La gloire de ce nouveau temple surpassera beaucoup la gloire de l’ancien, et je ferai régner la paix en ce lieu-ci. C’est l’Eternel qui le déclare, le Seigneur des armées célestes.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Impureté et bénédiction
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: La deuxième année du règne de Darius, le vingt-quatrième jour du neuvième mois
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '2.10 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Le 18 décembre 520 av. J.-C., deux mois après le message précédent.
    marker-yv: yv-n
  - type: text
    text: ', l’Eternel adressa la parole au prophète Aggée en ces termes :'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Voici ce que déclare le Seigneur des armées célestes : Demande donc aux prêtres'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '2.11 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Voir '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Lv 10.10-11
        metadata:
          usfm: LEV.10.10+LEV.10.11
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: ' leurs instructions. Dis-leur : '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: « Si un homme porte dans le pan de son vêtement de la viande sainte et que ce pan de vêtement entre en contact avec du pain, avec un mets cuit, avec du vin, de l’huile ou quelque autre aliment, l’aliment touché sera-t-il consacré
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '2.12 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: C’est-à-dire, apte à servir au culte.
    marker-yv: yv-n
  - type: text
    text: '  ? »'
- type: usfm
  marker: p
  children:
  - type: text
    text: – Non, répondirent les prêtres.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Alors Aggée demanda : Si un homme s’est rendu rituellement impur par le contact d’un cadavre et touche à l’un de ces aliments, celui-ci sera-il rendu impur par là ?'
- type: usfm
  marker: p
  children:
  - type: text
    text: – Oui, répondirent les prêtres, il sera impur
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '2.13 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Voir Lv 22.4 ; Nb 19.11-13, 22.
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Alors Aggée reprit et dit : Ainsi en est-il de ce peuple. Voilà ce qu’est cette nation à mes yeux – l’Eternel le déclare. Ainsi en est-il aussi de toutes leurs réalisations et de tout ce qu’ils m’offrent là : c’est impur'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '2.14 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Le refus de reconstruire le Temple entraînait une impureté rituelle qui contaminait toutes les réalisations du peuple.
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: s2
  children:
  - type: text
    text: La bénédiction promise
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Et maintenant, considérez bien ce qui se produira à partir d’aujourd’hui. Avant d’avoir commencé à poser pierre sur pierre pour le temple de l’Eternel, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'vous alliez à un tas de blé supposé contenir deux quintaux, mais il n’y en avait qu’un ; vous vous rendiez au pressoir, en espérant obtenir un hectolitre de vin, et vous ne trouviez que quarante litres. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Je vous ai châtiés en frappant le fruit de votre travail par diverses maladies des céréales
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '2.17 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Mentionnées parmi les malédictions de l’alliance en cas de désobéissance (
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Dt 28.22
        metadata:
          usfm: DEU.28.22
      - type: text
        text: '  ; voir 1 R 8.37 ; Am 4.9).'
    marker-yv: yv-n
  - type: text
    text: ' comme la rouille et la nielle, et par la grêle, mais vous n’êtes pas revenus à moi – l’Eternel le déclare.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Considérez donc attentivement ce qui va arriver à partir d’aujourd’hui et par la suite, c’est-à-dire à partir du vingt-quatrième jour du neuvième mois, jour où l’on s’est mis à rebâtir le temple de l’Eternel. Oui, faites bien attention à ce qui va se passer ! '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Reste-t-il encore de la semence dans vos greniers ? Même la vigne, le figuier, le grenadier et l’olivier n’ont rien produit. Mais à partir de ce jour-ci, je vous accorderai ma bénédiction.
- type: usfm
  marker: s2
  children:
  - type: text
    text: Les promesses pour Zorobabel
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'L’Eternel adressa la parole à Aggée une seconde fois, le vingt-quatrième jour du mois, en ces termes :'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Dis à Zorobabel, gouverneur de Juda : J’ébranlerai le ciel, j’ébranlerai le ciel et la terre, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'et je renverserai les trônes des royaumes. J’anéantirai la puissance des royaumes étrangers, je ferai culbuter les chars de guerre et ceux qui les conduisent, chevaux et cavaliers tomberont à terre, car chacun sera frappé par l’épée de son compatriote. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: En ce jour-là, déclare l’Eternel, le Seigneur des armées célestes, je te prendrai, Zorobabel, toi, fils de Shealtiel, mon serviteur, oui, l’Eternel le déclare, et je ferai de toi comme le sceau qu’on porte au doigt
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '2.23 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Servant à cacheter les édits pour les authentifier.
    marker-yv: yv-n
  - type: text
    text: . Car moi je t’ai choisi. Voilà ce que déclare le Seigneur des armées célestes.
