  - type: text
    text: Introduction
- type: usfm
  marker: ip
  children:
  - type: text
    text: 'Le titre du livre vient de son nom, transcrit en français, dans l’ancienne version grecque. Il désigne des « poèmes chantés avec un accompagnement musical ». Dans le texte hébreu traditionnel, cent seize psaumes sont précédés d’une suscription qui en indique le genre, l’accompagnement musical, l’utilisation cultuelle, l’origine ou les circonstances de rédaction. Ces suscriptions semblent identifier les auteurs par les mentions : « de David », « d’Asaph », « de Salomon », etc. Cependant, d’autres compréhensions de l’hébreu sont possibles. « Pour Salomon », « appartenant au recueil d’Asaph », « au sujet de David » sont des traductions qui pourraient se justifier dans certains cas. Ainsi, dans le Psaume 88, la mention des Qoréites paraît désigner un recueil car la suscription donne le nom de l’auteur du psaume : Hémân l’Ezrahite. Pourtant, il semble indéniable que la suscription indique souvent l’identité de l’auteur. Ainsi, en 18.1, il est précisé que David « adressa à l’Eternel les paroles de ce cantique » et en 7.1 qu’il lui a chanté la complainte qui suit. Très souvent, les circonstances de rédaction de la vie de David sont indiquées (Ps 3 ; 7 ; 18 ; 30  ; etc.) et le Nouveau Testament voit en lui l’auteur, en particulier, des Psaumes 16 et 110 (Ac 2.25-29, 34-35).'
- type: usfm
  marker: ip
  children:
  - type: text
    text: 'Le livre regroupe d’anciennes collections de psaumes : entre autres, « les prières de David » (72.20 ; voir 51 à 65 ; 67 à 71), les psaumes des Qoréites (42 à 49 ; 84 et 85 ; 87 et 88), ceux d’Asaph (50 ; 73 à 83) et les cantiques pour la route vers le Temple (120 à 134). Le psautier ne constitue pourtant pas un ensemble hétéroclite. Sa structure, dont la touche finale date de l’époque du deuxième Temple, après l’exil (126 ; 137), livre la clé de son unité profonde : il se divise en cinq livres à l’image du Pentateuque, document fondamental de l’alliance. Car dans les Psaumes s’exprime, de façon diverse et souvent poignante, le sentiment d’allégeance du peuple envers son Suzerain. Dès le début, le Psaume 1 définit le contexte des prières d’Israël : la Loi de l’alliance, dont le respect est un gage de bonheur (19 ; 119). Les psaumes didactiques rappellent l’histoire des interventions de l’Eternel en faveur de son peuple (74 ; 78) ; Sion, demeure de l’Eternel (76.3), est un « nouveau » Sinaï (68.9, 17-18), et des psaumes s’élève un cri : « Considère ton alliance ! » (74.20).'
- type: usfm
  marker: ip
  children:
  - type: text
    text: 'Nourri de cette vision de sa relation avec Dieu, le peuple prie l’Eternel, de manière communautaire (12 ; 44), liturgique (118) ou individuelle (3 ; 5), quelles que soient les circonstances, comptant sur la seule grâce du Seigneur (32.1-2 ; 115.1). On a ainsi défini plusieurs catégories de psaumes : hymnes, psaumes du règne de Dieu, psaumes de supplication à l’occasion d’un péché, d’une maladie ou de la persécution, psaumes de reconnaissance, psaumes royaux, cantiques de Sion, psaumes pour la montée au Temple, lors des grandes fêtes, etc. Souvent les croyants y proclament leur espérance : l’espérance d’une libération de la mort (49.16), de la conversion de gens des peuples non israélites (117.1 ; Rm 15.1), du jugement des méchants (35 ; 137 ; Ap 6.9-10) et de la venue du Roi attendu (110). Car, d’une certaine manière, les Psaumes annoncent les souffrances, la résurrection, la gloire et le règne du Messie (2 ; 16 ; 22 ; 31 ; 41 ; 110 ; 118.22-23).'
