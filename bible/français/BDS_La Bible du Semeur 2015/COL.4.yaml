document_id: COL.4,21
type_code: fra
verses:
  '1':
  - type: text
    content: Maîtres, traitez vos serviteurs avec justice et d’une manière équitable, car vous savez que vous avez, vous aussi, un Maître dans le ciel.
  - type: heading
    content: Dernières recommandations
  '10':
  - type: text
    content: Vous avez les salutations d’Aristarque
  - type: note
    content: Voir Ac 19.29 ; 27.2.
  - type: text
    content: ', mon compagnon de prison, et du cousin de Barnabas'
  - type: note
    content: Voir Ac 9.27 ; 11.22, 30.
  - type: text
    content: ', Marc'
  - type: note
    content: Ac 12.12, 25 ; 13.13 ; 15.17-39.
  - type: text
    content: ', au sujet duquel vous avez reçu mes instructions : s’il vient vous voir, faites-lui bon accueil. '
  '11':
  - type: text
    content: Jésus, encore appelé Justus, vous salue également. Ces hommes sont les seuls croyants d’origine juive qui travaillent avec moi pour le royaume de Dieu. Ils ont été pour moi un encouragement !
  '12':
  - type: text
    content: Epaphras
  - type: note
    content: Voir 1.7.
  - type: text
    content: ', qui est aussi l’un des vôtres, et un serviteur de Jésus-Christ, vous envoie également ses salutations. Il combat sans cesse pour vous dans ses prières, pour que vous teniez bon, comme des adultes dans la foi, prêts à accomplir pleinement la volonté de Dieu. '
  '13':
  - type: text
    content: 'Je lui rends ce témoignage : il se dépense beaucoup pour vous, ainsi que pour ceux de Laodicée et de Hiérapolis.'
  '14':
  - type: text
    content: Notre cher ami Luc
  - type: note
    content: Voir 2 Tm 4.11 ; Phm 24.
  - type: text
    content: ', le médecin, et Démas'
  - type: note
    content: Voir 2 Tm 4.10 ; Phm 24.
  - type: text
    content: ' vous saluent. '
  '15':
  - type: text
    content: Veuillez saluer de notre part les frères et sœurs de Laodicée, ainsi que Nympha
  - type: note
    content: 'Certains manuscrits portent : Nymphas (prénom masculin).'
  - type: text
    content: ' et l’Eglise qui se réunit dans sa maison.'
  '16':
  - type: text
    content: Lorsque cette lettre aura été lue chez vous, faites en sorte qu’elle soit également lue dans l’Eglise des Laodicéens, et lisez vous-mêmes celle qui vous sera transmise par les Laodicéens
  - type: note
    content: Certains l’identifient avec la lettre dite aux Ephésiens.
  - type: text
    content: .
  '17':
  - type: text
    content: 'Dites à Archippe : veille sur le ministère que tu as reçu dans l’œuvre du Seigneur, pour bien l’accomplir.'
  '18':
  - type: text
    content: Moi, Paul, je vous adresse mes salutations en les écrivant de ma propre main. Ne m’oubliez pas alors que je suis en prison. Que la grâce de Dieu soit avec vous
  - type: note
    content: La lettre elle-même a été écrite par un secrétaire. Paul y ajoute quelques salutations de sa propre main (cf. 1 Co 16.21 ; Ga 6.11 ; 2 Th 3.17).
  - type: text
    content: .
  '2':
  - type: text
    content: 'Persévérez dans la prière. Soyez vigilants dans ce domaine et reconnaissants envers Dieu. '
  '3':
  - type: text
    content: 'Lorsque vous priez, intercédez en même temps pour nous afin que Dieu nous donne des occasions d’annoncer sa Parole, de proclamer le secret de son plan qui concerne Christ. C’est à cause de ce message que je suis en prison. '
  '4':
  - type: text
    content: Demandez donc à Dieu que, par ma prédication, je puisse faire connaître clairement ce message comme il est de mon devoir de le faire.
  '5':
  - type: text
    content: 'Conduisez-vous avec sagesse dans vos relations avec ceux du dehors, en mettant à profit toutes les occasions qui se présentent à vous. '
  '6':
  - type: text
    content: Que votre parole soit toujours empreinte de la grâce de Dieu et pleine de saveur pour savoir comment répondre avec à-propos à chacun.
  - type: heading
    content: Salutations
  '7':
  - type: text
    content: Tychique
  - type: note
    content: Voir Ac 20.4.
  - type: text
    content: ', notre cher frère, qui est un serviteur fidèle et notre collaborateur dans l’œuvre du Seigneur, vous mettra au courant de tout ce qui me concerne. '
  '8':
  - type: text
    content: 'Je l’envoie exprès chez vous pour qu’il vous donne de mes nouvelles et qu’ainsi il vous encourage. '
  '9':
  - type: text
    content: J’envoie avec lui Onésime
  - type: note
    content: Voir Phm 10-15.
  - type: text
    content: ', notre cher et fidèle frère, qui est l’un des vôtres. Ils vous mettront au courant de tout ce qui se passe ici.'
