document_id: COL.4,21
type_code: fra
verses:
  '1':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Maîtres, traitez vos serviteurs avec justice et d’une manière équitable, car vous savez que vous avez, vous aussi, un Maître dans le ciel.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Dernières recommandations
    marker-yv: yv-h
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Vous avez les salutations d’Aristarque
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '4.10 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Voir Ac 19.29 ; 27.2.
      marker-yv: yv-n
    - type: text
      text: ', mon compagnon de prison, et du cousin de Barnabas'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '4.10 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Voir Ac 9.27 ; 11.22, 30.
      marker-yv: yv-n
    - type: text
      text: ', Marc'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '4.10 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Ac 12.12, 25 ; 13.13 ; 15.17-39.
      marker-yv: yv-n
    - type: text
      text: ', au sujet duquel vous avez reçu mes instructions : s’il vient vous voir, faites-lui bon accueil. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Jésus, encore appelé Justus, vous salue également. Ces hommes sont les seuls croyants d’origine juive qui travaillent avec moi pour le royaume de Dieu. Ils ont été pour moi un encouragement !
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Epaphras
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '4.12 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Voir '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: '1.7'
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: ', qui est aussi l’un des vôtres, et un serviteur de Jésus-Christ, vous envoie également ses salutations. Il combat sans cesse pour vous dans ses prières, pour que vous teniez bon, comme des adultes dans la foi, prêts à accomplir pleinement la volonté de Dieu. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Je lui rends ce témoignage : il se dépense beaucoup pour vous, ainsi que pour ceux de Laodicée et de Hiérapolis.'
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Notre cher ami Luc
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '4.14 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Voir 2 Tm 4.11 ; Phm 24.
      marker-yv: yv-n
    - type: text
      text: ', le médecin, et Démas'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '4.14 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Voir 2 Tm 4.10 ; Phm 24.
      marker-yv: yv-n
    - type: text
      text: ' vous saluent. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Veuillez saluer de notre part les frères et sœurs de Laodicée, ainsi que Nympha
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '4.15 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Certains manuscrits portent : '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'Nymphas '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: (prénom masculin).
      marker-yv: yv-n
    - type: text
      text: ' et l’Eglise qui se réunit dans sa maison.'
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Lorsque cette lettre aura été lue chez vous, faites en sorte qu’elle soit également lue dans l’Eglise des Laodicéens, et lisez vous-mêmes celle qui vous sera transmise par les Laodicéens
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '4.16 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Certains l’identifient avec la lettre dite '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: aux Ephésiens.
      marker-yv: yv-n
    - type: text
      text: .
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dites à Archippe : veille sur le ministère que tu as reçu dans l’œuvre du Seigneur, pour bien l’accomplir.'
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Moi, Paul, je vous adresse mes salutations en les écrivant de ma propre main. Ne m’oubliez pas alors que je suis en prison. Que la grâce de Dieu soit avec vous
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '4.18 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: La lettre elle-même a été écrite par un secrétaire. Paul y ajoute quelques salutations de sa propre main (cf. 1 Co 16.21 ; Ga 6.11 ; 2 Th 3.17).
      marker-yv: yv-n
    - type: text
      text: .
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Persévérez dans la prière. Soyez vigilants dans ce domaine et reconnaissants envers Dieu. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Lorsque vous priez, intercédez en même temps pour nous afin que Dieu nous donne des occasions d’annoncer sa Parole, de proclamer le secret de son plan qui concerne Christ. C’est à cause de ce message que je suis en prison. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Demandez donc à Dieu que, par ma prédication, je puisse faire connaître clairement ce message comme il est de mon devoir de le faire.
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Conduisez-vous avec sagesse dans vos relations avec ceux du dehors, en mettant à profit toutes les occasions qui se présentent à vous. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Que votre parole soit toujours empreinte de la grâce de Dieu et pleine de saveur pour savoir comment répondre avec à-propos à chacun.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Salutations
    marker-yv: yv-h
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Tychique
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '4.7 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Voir '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: Ac 20.4
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: ', notre cher frère, qui est un serviteur fidèle et notre collaborateur dans l’œuvre du Seigneur, vous mettra au courant de tout ce qui me concerne. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Je l’envoie exprès chez vous pour qu’il vous donne de mes nouvelles et qu’ainsi il vous encourage. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: J’envoie avec lui Onésime
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '4.9 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Voir '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: Phm 10-15
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: ', notre cher et fidèle frère, qui est l’un des vôtres. Ils vous mettront au courant de tout ce qui se passe ici.'
