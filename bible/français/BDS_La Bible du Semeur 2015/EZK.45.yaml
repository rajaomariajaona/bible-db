document_id: EZK.45,21
type_code: fra
verses:
  '1':
  - type: heading
    content: La part de l’Eternel
  - type: text
    content: Quand vous répartirez le pays en lots, vous en réserverez une partie pour l’offrir à l’Eternel. Cette portion du pays sera sainte. Elle aura vingt-cinq mille coudées de long sur dix mille
  - type: note
    content: 'Selon le texte hébreu traditionnel (voir 48.9). L’ancienne version grecque a : vingt mille.'
  - type: text
    content: ' de large. Elle sera sainte dans toute son étendue. '
  '10':
  - type: text
    content: 'Ayez des balances justes, un épha juste pour les grains et un bath juste pour les liquides ! '
  '11':
  - type: text
    content: L’épha et le bath auront la même contenance, l’un et l’autre contiendront chacun la dixième partie du homer
  - type: note
    content: Le homer contenait 220 litres, l’épha et le bath 22 litres. Toutes ces indications sont approximatives. De plus, les auteurs ne sont pas d’accord sur les valeurs de ces mesures, celles-ci ayant varié suivant les temps et les lieux.
  - type: text
    content: '. C’est d’après le homer que sera jaugée leur capacité. '
  '12':
  - type: text
    content: La pièce d’argent d’un sicle vaudra vingt guéras et la mine soixante sicles.
  - type: heading
    content: Les offrandes pour le culte
  '13':
  - type: text
    content: 'Voici l’offrande que vous prélèverez : pour le blé et l’orge, vous donnerez un soixantième de votre récolte'
  - type: note
    content: 'Littéralement : un sixième d’épha par homer, soit environ 2,5 kg par 150 kg.'
  - type: text
    content: ', '
  '14':
  - type: text
    content: pour l’huile, un centième de votre production
  - type: note
    content: 'Littéralement : un dixième de bath par kor (soit 2,2 litres par 220 litres), lequel équivaut à un homer, c’est-à-dire dix baths.'
  - type: text
    content: '. L’huile sera mesurée avec un bath, qui contient le dixième d’un homer ou d’un kor. '
  '15':
  - type: text
    content: 'Enfin, vous prendrez un mouton et une chèvre sur deux cents dans le troupeau des pâturages d’Israël ; ils serviront pour les offrandes, les holocaustes et les sacrifices de communion, pour expier les péchés de ceux qui les offriront, le Seigneur, l’Eternel, le déclare. '
  '16':
  - type: text
    content: 'Tout le peuple du pays sera tenu d’apporter cette offrande au prince d’Israël, '
  '17':
  - type: text
    content: à qui il incombera de fournir les holocaustes, les offrandes, les libations lors des fêtes, des nouvelles lunes et des sabbats. Dans toutes les fêtes cultuelles de la communauté d’Israël, c’est lui qui pourvoira aux sacrifices pour le péché, à l’offrande, à l’holocauste et aux sacrifices de communion afin de faire l’expiation pour la communauté d’Israël.
  - type: heading
    content: Les fêtes et les sacrifices
  '18':
  - type: text
    content: 'Voici ce que déclare le Seigneur, l’Eternel : Le jour de l’an on prendra un jeune taureau sans défaut et l’on fera l’expiation pour le sanctuaire. '
  '19':
  - type: text
    content: 'Le prêtre prendra du sang de la victime du sacrifice pour le péché et en appliquera sur les montants de la porte du Temple, sur les quatre angles du socle de l’autel et sur les montants de la porte du parvis intérieur. '
  '2':
  - type: text
    content: 'Vous y réserverez un terrain carré de cinq cents coudées de côté pour le sanctuaire, il sera entouré d’un espace libre de cinquante coudées tout autour. '
  '20':
  - type: text
    content: On agira de même le septième jour du mois, pour l’homme qui aura péché par ignorance ou par inadvertance. Vous accomplirez ainsi le rite d’expiation pour le Temple.
  '21':
  - type: text
    content: 'Le quatorzième jour du premier mois, vous célébrerez la fête de la Pâque. Elle durera sept jours pendant lesquels on mangera des pains sans levain. '
  '22':
  - type: text
    content: 'Le prince offrira ce jour-là un taureau en sacrifice pour le péché, pour lui et pour tout le peuple du pays. '
  '23':
  - type: text
    content: 'Pendant les sept jours de la fête, il offrira journellement en holocauste à l’Eternel sept taureaux et sept béliers sans défaut, et un bouc en sacrifice pour le péché. '
  '24':
  - type: text
    content: Il joindra à chaque taureau et à chaque bélier l’offrande de quinze kilogrammes de grains et de trois litres et demi d’huile
  - type: note
    content: 'Littéralement : d’un épha de grains et un hîn d’huile par épha de grains.'
  - type: text
    content: .
  '25':
  - type: text
    content: Le quinzième jour du septième mois, lors de la fête
  - type: note
    content: Il s’agit de la fête des Cabanes (voir Lv 23.34-36).
  - type: text
    content: ', il offrira pendant sept jours les mêmes sacrifices pour le péché, les mêmes holocaustes, les mêmes offrandes et la même quantité d’huile.'
  '3':
  - type: text
    content: 'Sur la partie offerte à l’Eternel, vous délimiterez une terre de vingt-cinq mille coudées de longueur sur dix mille de largeur. C’est là que se situera le sanctuaire, le lieu très saint. '
  '4':
  - type: text
    content: Cette portion sainte du pays appartiendra aux prêtres qui officieront au sanctuaire et s’approcheront de l’Eternel pour son culte. Ils y disposeront de terrains pour bâtir leurs maisons et d’un espace sacré pour le sanctuaire.
  '5':
  - type: text
    content: Un territoire de vingt-cinq mille coudées sur dix mille de large appartiendra aux lévites qui accompliront le service du Temple. Ils y posséderont vingt agglomérations
  - type: note
    content: 'D’après l’ancienne version grecque. Le texte hébreu traditionnel a : salles.'
  - type: text
    content: '. '
  '6':
  - type: text
    content: Pour la ville, vous délimiterez, le long de la portion de territoire sainte, une bande de territoire de cinq mille coudées de large sur vingt-cinq mille de long. Elle appartiendra à toute la communauté d’Israël.
  - type: heading
    content: La part du prince
  '7':
  - type: text
    content: 'Vous réserverez au prince deux zones de part et d’autre de la portion de territoire sainte et du territoire de la ville, l’une du côté ouest, l’autre du côté est ; la longueur de chacun de ces lots correspondra à celle des lots des tribus depuis la frontière occidentale jusqu’à la frontière orientale. '
  '8':
  - type: text
    content: Ce sera son domaine, sa propriété en Israël. Ainsi mes princes n’opprimeront plus mon peuple et ils laisseront le pays à la communauté d’Israël dont chaque tribu aura son territoire.
  '9':
  - type: text
    content: 'Voici ce que déclare le Seigneur, l’Eternel : C’en est assez, princes d’Israël ! Mettez un terme à la violence et au pillage ! Appliquez le droit et la justice ! Cessez d’expulser mon peuple de ses terres, le Seigneur, l’Eternel, le déclare. '
