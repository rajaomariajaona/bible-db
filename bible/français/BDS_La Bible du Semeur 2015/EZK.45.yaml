document_id: EZK.45,21
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s2
    children:
    - type: text
      text: La part de l’Eternel
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: Quand vous répartirez le pays en lots, vous en réserverez une partie pour l’offrir à l’Eternel. Cette portion du pays sera sainte. Elle aura vingt-cinq mille coudées de long sur dix mille
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '45.1 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Selon le texte hébreu traditionnel (voir '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: '48.9'
        - type: text
          text: '). L’ancienne version grecque a : '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: vingt mille.
      marker-yv: yv-n
    - type: text
      text: ' de large. Elle sera sainte dans toute son étendue. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'Ayez des balances justes, un épha juste pour les grains et un bath juste pour les liquides ! '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: L’épha et le bath auront la même contenance, l’un et l’autre contiendront chacun la dixième partie du homer
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '45.11 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Le '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'homer '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: contenait 220 litres, l’
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'épha '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'et le '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'bath '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 22 litres. Toutes ces indications sont approximatives. De plus, les auteurs ne sont pas d’accord sur les valeurs de ces mesures, celles-ci ayant varié suivant les temps et les lieux.
      marker-yv: yv-n
    - type: text
      text: '. C’est d’après le homer que sera jaugée leur capacité. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: La pièce d’argent d’un sicle vaudra vingt guéras et la mine soixante sicles.
  - type: usfm
    marker: s2
    children:
    - type: text
      text: Les offrandes pour le culte
    marker-yv: yv-h
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'Voici l’offrande que vous prélèverez : pour le blé et l’orge, vous donnerez un soixantième de votre récolte'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '45.13 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Littéralement : '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'un sixième d’épha par homer, '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: soit environ 2,5 kg par 150 kg.
      marker-yv: yv-n
    - type: text
      text: ', '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: pour l’huile, un centième de votre production
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '45.14 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Littéralement : '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'un dixième de bath par kor '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '(soit 2,2 litres par 220 litres), '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: lequel équivaut à un homer, c’est-à-dire dix baths.
      marker-yv: yv-n
    - type: text
      text: '. L’huile sera mesurée avec un bath, qui contient le dixième d’un homer ou d’un kor. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'Enfin, vous prendrez un mouton et une chèvre sur deux cents dans le troupeau des pâturages d’Israël ; ils serviront pour les offrandes, les holocaustes et les sacrifices de communion, pour expier les péchés de ceux qui les offriront, le Seigneur, l’Eternel, le déclare. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'Tout le peuple du pays sera tenu d’apporter cette offrande au prince d’Israël, '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: à qui il incombera de fournir les holocaustes, les offrandes, les libations lors des fêtes, des nouvelles lunes et des sabbats. Dans toutes les fêtes cultuelles de la communauté d’Israël, c’est lui qui pourvoira aux sacrifices pour le péché, à l’offrande, à l’holocauste et aux sacrifices de communion afin de faire l’expiation pour la communauté d’Israël.
  - type: usfm
    marker: s2
    children:
    - type: text
      text: Les fêtes et les sacrifices
    marker-yv: yv-h
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'Voici ce que déclare le Seigneur, l’Eternel : Le jour de l’an on prendra un jeune taureau sans défaut et l’on fera l’expiation pour le sanctuaire. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'Le prêtre prendra du sang de la victime du sacrifice pour le péché et en appliquera sur les montants de la porte du Temple, sur les quatre angles du socle de l’autel et sur les montants de la porte du parvis intérieur. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'Vous y réserverez un terrain carré de cinq cents coudées de côté pour le sanctuaire, il sera entouré d’un espace libre de cinquante coudées tout autour. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: On agira de même le septième jour du mois, pour l’homme qui aura péché par ignorance ou par inadvertance. Vous accomplirez ainsi le rite d’expiation pour le Temple.
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: 'Le quatorzième jour du premier mois, vous célébrerez la fête de la Pâque. Elle durera sept jours pendant lesquels on mangera des pains sans levain. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: 'Le prince offrira ce jour-là un taureau en sacrifice pour le péché, pour lui et pour tout le peuple du pays. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: 'Pendant les sept jours de la fête, il offrira journellement en holocauste à l’Eternel sept taureaux et sept béliers sans défaut, et un bouc en sacrifice pour le péché. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: Il joindra à chaque taureau et à chaque bélier l’offrande de quinze kilogrammes de grains et de trois litres et demi d’huile
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '45.24 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Littéralement : '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: d’un épha de grains et un hîn d’huile par épha de grains.
      marker-yv: yv-n
    - type: text
      text: .
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: Le quinzième jour du septième mois, lors de la fête
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '45.25 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Il s’agit de la fête des Cabanes (voir '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: Lv 23.34-36
        - type: text
          text: ).
      marker-yv: yv-n
    - type: text
      text: ', il offrira pendant sept jours les mêmes sacrifices pour le péché, les mêmes holocaustes, les mêmes offrandes et la même quantité d’huile.'
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'Sur la partie offerte à l’Eternel, vous délimiterez une terre de vingt-cinq mille coudées de longueur sur dix mille de largeur. C’est là que se situera le sanctuaire, le lieu très saint. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: Cette portion sainte du pays appartiendra aux prêtres qui officieront au sanctuaire et s’approcheront de l’Eternel pour son culte. Ils y disposeront de terrains pour bâtir leurs maisons et d’un espace sacré pour le sanctuaire.
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: Un territoire de vingt-cinq mille coudées sur dix mille de large appartiendra aux lévites qui accompliront le service du Temple. Ils y posséderont vingt agglomérations
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '45.5 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'D’après l’ancienne version grecque. Le texte hébreu traditionnel a : '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: salles.
      marker-yv: yv-n
    - type: text
      text: '. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: Pour la ville, vous délimiterez, le long de la portion de territoire sainte, une bande de territoire de cinq mille coudées de large sur vingt-cinq mille de long. Elle appartiendra à toute la communauté d’Israël.
  - type: usfm
    marker: s2
    children:
    - type: text
      text: La part du prince
    marker-yv: yv-h
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'Vous réserverez au prince deux zones de part et d’autre de la portion de territoire sainte et du territoire de la ville, l’une du côté ouest, l’autre du côté est ; la longueur de chacun de ces lots correspondra à celle des lots des tribus depuis la frontière occidentale jusqu’à la frontière orientale. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: Ce sera son domaine, sa propriété en Israël. Ainsi mes princes n’opprimeront plus mon peuple et ils laisseront le pays à la communauté d’Israël dont chaque tribu aura son territoire.
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'Voici ce que déclare le Seigneur, l’Eternel : C’en est assez, princes d’Israël ! Mettez un terme à la violence et au pillage ! Appliquez le droit et la justice ! Cessez d’expulser mon peuple de ses terres, le Seigneur, l’Eternel, le déclare. '
