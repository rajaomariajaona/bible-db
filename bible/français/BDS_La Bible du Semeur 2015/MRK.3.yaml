document_id: MRK.3,21
type_code: fra
verses:
  '1':
  - type: heading
    content: (Mt 12.9-14 ; Lc 6.6-11)
  - type: text
    content: 'Jésus entra de nouveau dans la synagogue. Il s’y trouvait un homme avec la main paralysée. '
  '10':
  - type: text
    content: En effet, comme il guérissait beaucoup de gens, tous les malades se précipitaient vers lui pour le toucher.
  '11':
  - type: text
    content: 'Lorsque des gens qui étaient sous l’emprise d’esprits mauvais le voyaient, ils se prosternaient devant lui et s’écriaient : Tu es le Fils de Dieu.'
  '12':
  - type: text
    content: Mais il leur défendait absolument de faire savoir qui il était.
  - type: heading
    content: Le choix des apôtres
  - type: heading
    content: (Mt 10.1-4 ; Lc 6.12-16)
  '13':
  - type: text
    content: 'Plus tard, il monta sur une colline avoisinante et appela ceux qu’il voulait, et ils vinrent à lui. '
  '14':
  - type: text
    content: Il désigna ainsi douze hommes [qu’il nomma apôtres]
  - type: note
    content: 'qu’il nomma apôtres: ces mots sont absents de plusieurs manuscrits.'
  - type: text
    content: ' et qui devaient être constamment avec lui ; '
  '15':
  - type: text
    content: 'il les envoya annoncer l’Evangile avec le pouvoir de chasser les démons. '
  '16':
  - type: text
    content: Voici les noms des Douze qu’il désigna
  - type: note
    content: 'qu’il désigna: ces mots sont absents de plusieurs manuscrits.'
  - type: text
    content: '  : Simon, auquel Jésus donna le nom de Pierre, '
  '17':
  - type: text
    content: 'Jacques, fils de Zébédée et Jean son frère auxquels il donna le nom de Boanergès, ce qui signifie « fils du tonnerre », '
  '18':
  - type: text
    content: André, Philippe, Barthélemy, Matthieu, Thomas, Jacques, fils d’Alphée, Thaddée, Simon le Zélé
  - type: note
    content: Voir note Mt 10.4.
  - type: text
    content: ', '
  '19':
  - type: text
    content: et Judas Iscariot, celui qui le trahit.
  - type: heading
    content: 'Jésus : Dieu ou Satan ?'
  - type: heading
    content: (Mt 12.22-32 ; Lc 11.15-23 ; 12.10)
  '2':
  - type: text
    content: 'On le surveillait attentivement pour voir s’il le guérirait un jour de sabbat : ils voulaient ainsi pouvoir l’accuser.'
  '20':
  - type: text
    content: 'Jésus alla à la maison et, de nouveau, la foule s’y pressa au point que lui et ses disciples n’arrivaient même plus à manger. '
  '21':
  - type: text
    content: 'Quand les membres de sa famille l’apprirent, ils vinrent pour le ramener de force avec eux. Ils disaient en effet : « Il est devenu fou. » '
  '22':
  - type: text
    content: 'Les spécialistes de la Loi qui étaient venus de Jérusalem disaient : Il est sous l’emprise de Béelzébul'
  - type: note
    content: 'Béelzébul: voir note Mt 10.25.'
  - type: text
    content: '  ; c’est par le pouvoir du chef des démons qu’il chasse les démons.'
  '23':
  - type: text
    content: 'Alors Jésus les appela et leur parla en paraboles : '
  - type: text
    content: 'Comment '
  - type: text
    content: Satan
  - type: text
    content: ' peut-il chasser Satan ?'
  - type: text
    content: ' '
  '24':
  - type: text
    content: Un royaume déchiré par la guerre civile ne peut pas subsister.
  - type: text
    content: ' '
  '25':
  - type: text
    content: Si une famille est divisée, cette famille ne peut pas subsister.
  - type: text
    content: ' '
  '26':
  - type: text
    content: Si donc Satan se bat contre lui-même, s’il est en conflit avec lui-même, il ne peut plus subsister, c’en est fini de lui.
  - type: text
    content: ' '
  '27':
  - type: text
    content: 'En fait, personne ne peut pénétrer dans la maison d’un homme fort pour s’emparer de ses biens sans avoir d’abord ligoté cet homme fort : c’est alors qu’il pillera sa maison.'
  '28':
  - type: text
    content: ' '
  - type: text
    content: 'Vraiment, je vous avertis : tout sera pardonné aux hommes, leurs péchés et les '
  - type: text
    content: blasphèmes
  - type: text
    content: ' qu’ils auront prononcés.'
  - type: text
    content: ' '
  '29':
  - type: text
    content: 'Mais si quelqu’un blasphème contre l’Esprit Saint, il ne lui sera jamais pardonné : il portera éternellement la charge de ce péché.'
  '3':
  - type: text
    content: 'Jésus dit à l’homme à la main infirme : '
  - type: text
    content: Lève-toi et mets-toi là, au milieu.
  '30':
  - type: text
    content: 'Jésus leur parla ainsi parce qu’ils disaient : « Il est sous l’emprise d’un esprit mauvais. »'
  - type: heading
    content: La vraie famille de Jésus
  - type: heading
    content: (Mt 12.46-50 ; Lc 8.19-21)
  '31':
  - type: text
    content: La mère et les frères de Jésus arrivèrent. Ils se tinrent dehors et envoyèrent quelqu’un l’appeler.
  '32':
  - type: text
    content: 'Beaucoup de monde était assis autour de lui. On vint lui dire : Ta mère, tes frères et tes sœurs'
  - type: note
    content: Plusieurs manuscrits n’ont pas tes sœurs.
  - type: text
    content: ' sont dehors et te cherchent.'
  '33':
  - type: text
    content: 'Il répondit : '
  - type: text
    content: Qui sont ma mère et mes frères ?
  '34':
  - type: text
    content: 'Et, promenant les regards sur ceux qui étaient assis en cercle autour de lui, il dit : '
  - type: text
    content: Voici ma mère et mes frères,
  - type: text
    content: ' '
  '35':
  - type: text
    content: car celui qui fait la volonté de Dieu, celui-là est pour moi un frère, une sœur, ou une mère.
  '4':
  - type: text
    content: 'Puis il demanda aux autres : '
  - type: text
    content: Est-il permis, le jour du sabbat, de faire du bien, ou de faire du mal ? A-t-on le droit de sauver une vie ou faut-il la laisser se détruire ?
  - type: text
    content: Mais personne ne dit mot.
  '5':
  - type: text
    content: 'Jésus promena sur eux un regard indigné. Profondément attristé par la dureté de leur cœur, il dit à l’homme : '
  - type: text
    content: Etends la main !
  - type: text
    content: 'Il la tendit et elle fut guérie. '
  '6':
  - type: text
    content: Aussitôt, les pharisiens sortirent de la synagogue et allèrent se concerter avec des membres du parti d’Hérode sur les moyens de faire mourir Jésus.
  - type: heading
    content: Jésus parmi la foule
  '7':
  - type: text
    content: 'Jésus se retira du côté du lac avec ses disciples. Une foule immense le suivait : elle était venue de la Galilée, '
  '8':
  - type: text
    content: de la Judée, de Jérusalem, de l’Idumée
  - type: note
    content: 'l’Idumée: région située au sud de la Judée.'
  - type: text
    content: ', des territoires de l’autre côté du Jourdain ainsi que de la région de Tyr et de Sidon. Ces gens venaient à lui car ils avaient appris tout ce qu’il faisait. '
  '9':
  - type: text
    content: 'Il demanda alors à ses disciples de tenir un bateau à sa disposition pour éviter d’être écrasé par la foule. '
