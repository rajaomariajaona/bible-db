document_id: MRK.3,21
type_code: fra
verses:
  '1':
  - type: usfm
    marker: r
    children:
    - type: text
      text: (Mt 12.9-14 ; Lc 6.6-11)
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Jésus entra de nouveau dans la synagogue. Il s’y trouvait un homme avec la main paralysée. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: En effet, comme il guérissait beaucoup de gens, tous les malades se précipitaient vers lui pour le toucher.
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Lorsque des gens qui étaient sous l’emprise d’esprits mauvais le voyaient, ils se prosternaient devant lui et s’écriaient : Tu es le Fils de Dieu.'
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Mais il leur défendait absolument de faire savoir qui il était.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Le choix des apôtres
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: (Mt 10.1-4 ; Lc 6.12-16)
    marker-yv: yv-h
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Plus tard, il monta sur une colline avoisinante et appela ceux qu’il voulait, et ils vinrent à lui. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Il désigna ainsi douze hommes [qu’il nomma apôtres]
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '3.14 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: qu’il nomma apôtres
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: ': '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ces mots sont absents de plusieurs manuscrits.
      marker-yv: yv-n
    - type: text
      text: ' et qui devaient être constamment avec lui ; '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'il les envoya annoncer l’Evangile avec le pouvoir de chasser les démons. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Voici les noms des Douze qu’il désigna
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '3.16 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: qu’il désigna
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: ': '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ces mots sont absents de plusieurs manuscrits.
      marker-yv: yv-n
    - type: text
      text: '  : Simon, auquel Jésus donna le nom de Pierre, '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Jacques, fils de Zébédée et Jean son frère auxquels il donna le nom de Boanergès, ce qui signifie « fils du tonnerre », '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: André, Philippe, Barthélemy, Matthieu, Thomas, Jacques, fils d’Alphée, Thaddée, Simon le Zélé
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '3.18 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Voir note '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: Mt 10.4
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: ', '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: et Judas Iscariot, celui qui le trahit.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: 'Jésus : Dieu ou Satan ?'
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: (Mt 12.22-32 ; Lc 11.15-23 ; 12.10)
    marker-yv: yv-h
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'On le surveillait attentivement pour voir s’il le guérirait un jour de sabbat : ils voulaient ainsi pouvoir l’accuser.'
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Jésus alla à la maison et, de nouveau, la foule s’y pressa au point que lui et ses disciples n’arrivaient même plus à manger. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Quand les membres de sa famille l’apprirent, ils vinrent pour le ramener de force avec eux. Ils disaient en effet : « Il est devenu fou. » '
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Les spécialistes de la Loi qui étaient venus de Jérusalem disaient : Il est sous l’emprise de Béelzébul'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '3.22 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Béelzébul
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: ': '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'voir note '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: Mt 10.25
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: '  ; c’est par le pouvoir du chef des démons qu’il chasse les démons.'
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Alors Jésus les appela et leur parla en paraboles : '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'Comment '
      - type: usfm
        marker: w
        children:
        - type: text
          text: Satan
      - type: text
        text: ' peut-il chasser Satan ?'
    - type: text
      text: ' '
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Un royaume déchiré par la guerre civile ne peut pas subsister.
    - type: text
      text: ' '
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Si une famille est divisée, cette famille ne peut pas subsister.
    - type: text
      text: ' '
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Si donc Satan se bat contre lui-même, s’il est en conflit avec lui-même, il ne peut plus subsister, c’en est fini de lui.
    - type: text
      text: ' '
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'En fait, personne ne peut pénétrer dans la maison d’un homme fort pour s’emparer de ses biens sans avoir d’abord ligoté cet homme fort : c’est alors qu’il pillera sa maison.'
  '28':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'Vraiment, je vous avertis : tout sera pardonné aux hommes, leurs péchés et les '
      - type: usfm
        marker: w
        children:
        - type: text
          text: blasphèmes
      - type: text
        text: ' qu’ils auront prononcés.'
    - type: text
      text: ' '
  '29':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'Mais si quelqu’un blasphème contre l’Esprit Saint, il ne lui sera jamais pardonné : il portera éternellement la charge de ce péché.'
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Jésus dit à l’homme à la main infirme : '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Lève-toi et mets-toi là, au milieu.
  '30':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Jésus leur parla ainsi parce qu’ils disaient : « Il est sous l’emprise d’un esprit mauvais. »'
  - type: usfm
    marker: s1
    children:
    - type: text
      text: La vraie famille de Jésus
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: (Mt 12.46-50 ; Lc 8.19-21)
    marker-yv: yv-h
  '31':
  - type: usfm
    marker: p
    children:
    - type: text
      text: La mère et les frères de Jésus arrivèrent. Ils se tinrent dehors et envoyèrent quelqu’un l’appeler.
  '32':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Beaucoup de monde était assis autour de lui. On vint lui dire : Ta mère, tes frères et tes sœurs'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '3.32 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Plusieurs manuscrits n’ont pas '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: tes sœurs.
      marker-yv: yv-n
    - type: text
      text: ' sont dehors et te cherchent.'
  '33':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Il répondit : '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Qui sont ma mère et mes frères ?
  '34':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Et, promenant les regards sur ceux qui étaient assis en cercle autour de lui, il dit : '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Voici ma mère et mes frères,
    - type: text
      text: ' '
  '35':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: car celui qui fait la volonté de Dieu, celui-là est pour moi un frère, une sœur, ou une mère.
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Puis il demanda aux autres : '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Est-il permis, le jour du sabbat, de faire du bien, ou de faire du mal ? A-t-on le droit de sauver une vie ou faut-il la laisser se détruire ?
  - type: usfm
    marker: p
    children:
    - type: text
      text: Mais personne ne dit mot.
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Jésus promena sur eux un regard indigné. Profondément attristé par la dureté de leur cœur, il dit à l’homme : '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Etends la main !
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Il la tendit et elle fut guérie. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Aussitôt, les pharisiens sortirent de la synagogue et allèrent se concerter avec des membres du parti d’Hérode sur les moyens de faire mourir Jésus.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Jésus parmi la foule
    marker-yv: yv-h
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Jésus se retira du côté du lac avec ses disciples. Une foule immense le suivait : elle était venue de la Galilée, '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: de la Judée, de Jérusalem, de l’Idumée
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '3.8 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: l’Idumée
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: ': '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: région située au sud de la Judée.
      marker-yv: yv-n
    - type: text
      text: ', des territoires de l’autre côté du Jourdain ainsi que de la région de Tyr et de Sidon. Ces gens venaient à lui car ils avaient appris tout ce qu’il faisait. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Il demanda alors à ses disciples de tenir un bateau à sa disposition pour éviter d’être écrasé par la foule. '
