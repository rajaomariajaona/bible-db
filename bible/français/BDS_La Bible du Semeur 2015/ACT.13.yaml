document_id: ACT.13,21
type_code: fra
verses:
  '1':
  - type: usfm
    marker: ms1
    children:
    - type: text
      text: Témoins en Asie mineure et en Grèce
    marker-yv: yv-h
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Saul et Barnabas partent en mission
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Il y avait alors à Antioche, dans l’Eglise qui se trouvait là, des prophètes et des enseignants : Barnabas, Siméon surnommé le Noir, Lucius, originaire de Cyrène, Manaën, qui avait été élevé avec Hérode le gouverneur'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '13.1 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Il s’agit d’Hérode Antipas, gouverneur de Galilée.
      marker-yv: yv-n
    - type: text
      text: ', et Saul.'
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'Charlatan plein de ruse et de méchanceté, fils du diable, ennemi de tout ce qui est bien, quand cesseras-tu de fausser les plans du Seigneur qui sont droits ? '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: Mais maintenant, attention ! La main du Seigneur va te frapper, tu vas devenir aveugle et, pendant un certain temps, tu ne verras plus la lumière du soleil.
  - type: usfm
    marker: p
    children:
    - type: text
      text: Au même instant, les yeux d’Elymas s’obscurcirent ; il se trouva plongé dans une nuit noire et se tournait de tous côtés en cherchant quelqu’un pour le guider par la main.
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: Quand le proconsul vit ce qui venait de se passer, il crut ; car il avait été vivement impressionné par l’enseignement qui lui avait été donné au sujet du Seigneur.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: La prédication de Paul dans la synagogue d’Antioche en Pisidie
    marker-yv: yv-h
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: Paul et ses compagnons reprirent la mer à Paphos et arrivèrent à Pergé en Pamphylie
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '13.13 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Pergé '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'était une ville du sud de l’Asie Mineure. La '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'Pamphylie '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: se trouvait dans la région de l’actuelle Turquie.
      marker-yv: yv-n
    - type: text
      text: . Là, Jean-Marc
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '13.13 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Jean-Marc
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: ': '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: voir 12.12, 25 ; 13.5.
      marker-yv: yv-n
    - type: text
      text: ' les abandonna et retourna à Jérusalem. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: Quant à eux, ils quittèrent Pergé et continuèrent leur route jusqu’à Antioche en Pisidie. Là, ils se rendirent à la synagogue le jour du sabbat et s’assirent.
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'Après qu’on eut fait la lecture dans la Loi et les prophètes, les chefs de la synagogue leur firent dire : Frères, si vous avez quelques mots à adresser à la communauté, vous avez la parole.'
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'Alors Paul se leva ; d’un geste de la main il demanda le silence et dit :'
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Israélites et vous tous qui craignez Dieu, écoutez-moi ! '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'Le Dieu de notre peuple d’Israël a choisi nos ancêtres. Il a fait grandir le peuple pendant son séjour en Egypte. Ensuite, en déployant sa puissance, il l’en a fait sortir. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: Pendant quarante ans environ, il l’a supporté
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '13.18 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Certains manuscrits ont : '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: il a pris soin de lui.
      marker-yv: yv-n
    - type: text
      text: ' dans le désert. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'Après avoir détruit sept peuplades dans le pays de Canaan, il a donné leur territoire à son peuple. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'Un jour qu’ils adoraient ensemble le Seigneur et qu’ils jeûnaient, le Saint-Esprit leur dit : Mettez à part pour moi Barnabas et Saul pour l’œuvre à laquelle je les ai appelés.'
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: Tout cela a duré environ 450 ans.
  - type: usfm
    marker: p
    children:
    - type: text
      text: Après cela, il a donné
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '13.20 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Certains manuscrits ont : '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: après cela, pendant quatre cent cinquante ans environ, il a donné…
      marker-yv: yv-n
    - type: text
      text: ' à nos ancêtres des chefs jusqu’à l’époque du prophète Samuel. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: 'Alors le peuple a demandé un roi et Dieu leur a donné Saül, fils de Qish, de la tribu de Benjamin. Celui-ci a régné sur eux pendant quarante ans. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: 'Mais Dieu l’a rejeté et leur a choisi pour roi David. C’est à lui qu’il a rendu ce témoignage :'
  - type: usfm
    marker: pm
    children:
    - type: usfm
      marker: qt
      children:
      - type: text
        text: En David, fils d’Isaï, j’ai trouvé un homme qui correspond à mes désirs
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '13.22 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 1 S 13.14 ; Ps 89.21.
      marker-yv: yv-n
    - type: text
      text: ', il accomplira toute ma volonté.'
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: 'Or, voici que Dieu vient d’accorder à Israël un Sauveur parmi les descendants de David, comme il l’avait promis, et ce Sauveur, c’est Jésus. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: 'Avant sa venue, Jean avait appelé tous les Israélites à se faire baptiser en signe d’un profond changement. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: 'Arrivé au terme de sa vie, Jean disait encore : « Qui pensez-vous que je suis ? Je ne suis pas celui que vous attendiez ! Non ! il vient après moi, et je ne mérite pas de dénouer ses sandales. »'
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: Mes frères, vous qui êtes les descendants d’Abraham et vous qui craignez Dieu et qui êtes présents parmi nous, c’est à nous
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '13.26 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Selon d’autres manuscrits : '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: c’est à vous.
      marker-yv: yv-n
    - type: text
      text: ' que Dieu a envoyé cette Parole de salut.'
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: 'En effet, les habitants de Jérusalem et leurs chefs n’ont compris ni qui était Jésus, ni les paroles des prophètes qui sont lues chaque jour de sabbat. Et voici qu’en condamnant Jésus, ils ont accompli ces prophéties. '
  '28':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: 'Ils n’ont trouvé chez lui aucune raison de le condamner à mort, et pourtant, ils ont demandé à Pilate de le faire exécuter. '
  '29':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: 'Après avoir réalisé tout ce que les Ecritures avaient prédit à son sujet, ils l’ont descendu de la croix et l’ont déposé dans un tombeau. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'Alors, après avoir jeûné et prié, ils leur imposèrent les mains et les laissèrent partir. '
  '30':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '30'
    - type: text
      text: 'Mais Dieu l’a ressuscité. '
  '31':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '31'
    - type: text
      text: Pendant de nombreux jours, Jésus s’est montré à ceux qui étaient montés avec lui de la Galilée jusqu’à Jérusalem et qui sont maintenant ses témoins devant le peuple.
  '32':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '32'
    - type: text
      text: 'Et nous, nous vous annonçons que la promesse que Dieu avait faite à nos ancêtres, '
  '33':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '33'
    - type: text
      text: 'il l’a pleinement accomplie pour nous, qui sommes leurs descendants, en ressuscitant Jésus, selon ce qui est écrit au Psaume deux :'
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: qt
      children:
      - type: text
        text: Tu es mon Fils ;
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: qt
      children:
      - type: text
        text: aujourd’hui,
    - type: text
      text: ' ╵'
    - type: usfm
      marker: qt
      children:
      - type: text
        text: je fais de toi mon enfant
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '13.33 '
      - type: usfm
        marker: ft
        children:
        - type: usfm
          marker: ref
          children:
          - type: text
            text: Ps 2.7
        - type: text
          text: .
      marker-yv: yv-n
    - type: usfm
      marker: qt
      children:
      - type: text
        text: .
  '34':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '34'
    - type: text
      text: 'Dieu avait annoncé celui qui ne devait pas retourner à la pourriture. C’est ce qu’il avait dit en ces termes :'
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: qt
      children:
      - type: text
        text: Je vous accorderai
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: qt
      children:
      - type: text
        text: les bénédictions saintes et sûres
    - type: text
      text: ' ╵'
    - type: usfm
      marker: qt
      children:
      - type: text
        text: que j’ai promises à David
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '13.34 '
      - type: usfm
        marker: ft
        children:
        - type: usfm
          marker: ref
          children:
          - type: text
            text: Es 55.3
        - type: text
          text: ' cité selon l’ancienne version grecque.'
      marker-yv: yv-n
    - type: usfm
      marker: qt
      children:
      - type: text
        text: .
  '35':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '35'
    - type: text
      text: 'Dans un autre passage, il est dit encore :'
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: qt
      children:
      - type: text
        text: Tu ne laisseras pas
    - type: text
      text: ' ╵'
    - type: usfm
      marker: qt
      children:
      - type: text
        text: un homme qui t’est dévoué
    - type: text
      text: ' ╵'
    - type: usfm
      marker: qt
      children:
      - type: text
        text: se décomposer dans la tombe
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '13.35 '
      - type: usfm
        marker: ft
        children:
        - type: usfm
          marker: ref
          children:
          - type: text
            text: Ps 16.10
        - type: text
          text: ' cité selon l’ancienne version grecque.'
      marker-yv: yv-n
    - type: usfm
      marker: qt
      children:
      - type: text
        text: .
  '36':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '36'
    - type: text
      text: 'Pourtant, David, après avoir en son temps contribué à l’accomplissement du plan de Dieu, est mort et a été enterré aux côtés de ses ancêtres. Il a donc connu la décomposition. '
  '37':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '37'
    - type: text
      text: Mais celui que Dieu a ressuscité ne l’a pas connue.
  '38':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '38'
    - type: text
      text: 'Sachez-le donc, mes frères, c’est grâce à lui que le pardon des péchés vous est annoncé ; '
  '39':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '39'
    - type: text
      text: c’est par lui que tout homme qui croit est acquitté de toutes les fautes dont vous ne pouviez pas être acquittés par la Loi de Moïse.
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: C’est donc envoyés par le Saint-Esprit que Barnabas et Saul descendirent à Séleucie
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '13.4 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Séleucie '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: était le port d’Antioche de Syrie. Il faisait face à l’île de Chypre.
      marker-yv: yv-n
    - type: text
      text: ', où ils s’embarquèrent pour l’île de Chypre. '
  '40':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '40'
    - type: text
      text: Veillez donc à ce qu’il n’arrive pas
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '13.40 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Certains manuscrits ont : '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: qu’il ne vous arrive pas.
      marker-yv: yv-n
    - type: text
      text: ' ce qu’ont dit les prophètes :'
  '41':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '41'
    - type: text
      text: ' '
    - type: usfm
      marker: qt
      children:
      - type: text
        text: Regardez, hommes pleins de mépris,
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: qt
      children:
      - type: text
        text: soyez dans l’étonnement,
    - type: text
      text: ' ╵'
    - type: usfm
      marker: qt
      children:
      - type: text
        text: et disparaissez,
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: qt
      children:
      - type: text
        text: car je vais accomplir
    - type: text
      text: ' ╵'
    - type: usfm
      marker: qt
      children:
      - type: text
        text: en votre temps une œuvre,
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: qt
      children:
      - type: text
        text: une œuvre que vous ne croiriez pas
    - type: text
      text: ' ╵'
    - type: usfm
      marker: qt
      children:
      - type: text
        text: si l’on vous en parlait
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '13.41 '
      - type: usfm
        marker: ft
        children:
        - type: usfm
          marker: ref
          children:
          - type: text
            text: Ha 1.5
        - type: text
          text: ' cité selon l’ancienne version grecque.'
      marker-yv: yv-n
    - type: usfm
      marker: qt
      children:
      - type: text
        text: .
  '42':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '42'
    - type: text
      text: 'A la sortie, on leur demanda de reparler du même sujet le sabbat suivant. '
  '43':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '43'
    - type: text
      text: Quand l’assemblée se fut dispersée, beaucoup de Juifs et de non-Juifs convertis au judaïsme et qui adoraient Dieu suivirent Paul et Barnabas. Ceux-ci s’entretenaient avec eux et les encourageaient à rester attachés à la grâce de Dieu.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Paul et Barnabas s’adressent aux non-Juifs
    marker-yv: yv-h
  '44':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '44'
    - type: text
      text: 'Le sabbat suivant, presque toute la ville se rassembla pour écouter la Parole du Seigneur. '
  '45':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '45'
    - type: text
      text: En voyant tant de monde, les Juifs furent remplis de jalousie et se mirent à contredire Paul et à l’injurier.
  '46':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '46'
    - type: text
      text: 'Paul et Barnabas leur déclarèrent alors avec une pleine assurance : C’est à vous en premier que la Parole de Dieu devait être annoncée. Mais puisque vous la refusez et que vous-mêmes ne vous jugez pas dignes d’avoir part à la vie éternelle, nous nous tournons vers ceux qui ne sont pas Juifs. '
  '47':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '47'
    - type: text
      text: 'Car le Seigneur a bien défini notre mission lorsqu’il a dit :'
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: qt
      children:
      - type: text
        text: Je t’ai établi pour que tu sois
    - type: text
      text: ' ╵'
    - type: usfm
      marker: qt
      children:
      - type: text
        text: la lumière des autres peuples,
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: qt
      children:
      - type: text
        text: et pour que tu portes le salut
    - type: text
      text: ' ╵'
    - type: usfm
      marker: qt
      children:
      - type: text
        text: jusqu’aux extrémités de la terre
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '13.47 '
      - type: usfm
        marker: ft
        children:
        - type: usfm
          marker: ref
          children:
          - type: text
            text: Es 49.6
        - type: text
          text: .
      marker-yv: yv-n
    - type: usfm
      marker: qt
      children:
      - type: text
        text: .
  '48':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '48'
    - type: text
      text: Quand les non-Juifs les entendirent parler ainsi, ils furent remplis de joie, ils se mirent à louer Dieu pour sa Parole et tous ceux qui étaient destinés à la vie éternelle crurent.
  '49':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '49'
    - type: text
      text: 'La Parole du Seigneur se répandait dans toute la contrée avoisinante. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: Une fois arrivés à Salamine, ils annoncèrent la Parole de Dieu dans les synagogues des Juifs. Jean-Marc était avec eux et les secondait.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Elymas le magicien
    marker-yv: yv-h
  '50':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '50'
    - type: text
      text: Mais les Juifs excitèrent les femmes dévotes de la haute société qui s’étaient attachées au judaïsme, ainsi que les notables de la ville. Ils provoquèrent ainsi une persécution contre Paul et Barnabas et les expulsèrent de leur territoire.
  '51':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '51'
    - type: text
      text: 'Ceux-ci secouèrent contre eux la poussière de leurs pieds et allèrent à Iconium. '
  '52':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '52'
    - type: text
      text: Les nouveaux disciples, cependant, étaient remplis de joie et de l’Esprit Saint.
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: Ils traversèrent toute l’île et arrivèrent à Paphos
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '13.6 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Un voyage d’environ 160 kilomètres. Paphos, sur la côte ouest, était la capitale administrative de l’île où résidait le gouverneur.
      marker-yv: yv-n
    - type: text
      text: '. Ils trouvèrent là un magicien juif nommé Bar-Jésus, qui se faisait passer pour un prophète. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'Il faisait partie de l’entourage du proconsul Sergius Paulus, un homme intelligent. Celui-ci invita Barnabas et Saul et leur exprima son désir d’entendre la Parole de Dieu. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'Mais Elymas le magicien (car c’est ainsi que l’on traduit son nom) s’opposait à eux ; il cherchait à détourner le proconsul de la foi. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: Alors Saul, qui s’appelait aussi Paul
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '13.9 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Les Juifs qui étaient citoyens romains (voir '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: 22.27-29
        - type: text
          text: ') portaient généralement deux noms : un nom juif (ici : Saul) et un nom romain (Paul). Lorsqu’il se trouvait en territoire non juif, l’apôtre utilisait ce dernier.'
      marker-yv: yv-n
    - type: text
      text: ', rempli du Saint-Esprit, s’adressa à lui en le regardant droit dans les yeux : '
