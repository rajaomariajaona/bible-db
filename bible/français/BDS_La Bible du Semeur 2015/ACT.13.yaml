document_id: ACT.13,21
type_code: fra
verses:
  '1':
  - type: heading
    content: Témoins en Asie mineure et en Grèce
  - type: heading
    content: Saul et Barnabas partent en mission
  - type: text
    content: 'Il y avait alors à Antioche, dans l’Eglise qui se trouvait là, des prophètes et des enseignants : Barnabas, Siméon surnommé le Noir, Lucius, originaire de Cyrène, Manaën, qui avait été élevé avec Hérode le gouverneur'
  - type: note
    content: Il s’agit d’Hérode Antipas, gouverneur de Galilée.
  - type: text
    content: ', et Saul.'
  '10':
  - type: text
    content: 'Charlatan plein de ruse et de méchanceté, fils du diable, ennemi de tout ce qui est bien, quand cesseras-tu de fausser les plans du Seigneur qui sont droits ? '
  '11':
  - type: text
    content: Mais maintenant, attention ! La main du Seigneur va te frapper, tu vas devenir aveugle et, pendant un certain temps, tu ne verras plus la lumière du soleil.
  - type: text
    content: Au même instant, les yeux d’Elymas s’obscurcirent ; il se trouva plongé dans une nuit noire et se tournait de tous côtés en cherchant quelqu’un pour le guider par la main.
  '12':
  - type: text
    content: Quand le proconsul vit ce qui venait de se passer, il crut ; car il avait été vivement impressionné par l’enseignement qui lui avait été donné au sujet du Seigneur.
  - type: heading
    content: La prédication de Paul dans la synagogue d’Antioche en Pisidie
  '13':
  - type: text
    content: Paul et ses compagnons reprirent la mer à Paphos et arrivèrent à Pergé en Pamphylie
  - type: note
    content: Pergé était une ville du sud de l’Asie Mineure. La Pamphylie se trouvait dans la région de l’actuelle Turquie.
  - type: text
    content: . Là, Jean-Marc
  - type: note
    content: 'Jean-Marc: voir 12.12, 25 ; 13.5.'
  - type: text
    content: ' les abandonna et retourna à Jérusalem. '
  '14':
  - type: text
    content: Quant à eux, ils quittèrent Pergé et continuèrent leur route jusqu’à Antioche en Pisidie. Là, ils se rendirent à la synagogue le jour du sabbat et s’assirent.
  '15':
  - type: text
    content: 'Après qu’on eut fait la lecture dans la Loi et les prophètes, les chefs de la synagogue leur firent dire : Frères, si vous avez quelques mots à adresser à la communauté, vous avez la parole.'
  '16':
  - type: text
    content: 'Alors Paul se leva ; d’un geste de la main il demanda le silence et dit :'
  - type: text
    content: 'Israélites et vous tous qui craignez Dieu, écoutez-moi ! '
  '17':
  - type: text
    content: 'Le Dieu de notre peuple d’Israël a choisi nos ancêtres. Il a fait grandir le peuple pendant son séjour en Egypte. Ensuite, en déployant sa puissance, il l’en a fait sortir. '
  '18':
  - type: text
    content: Pendant quarante ans environ, il l’a supporté
  - type: note
    content: 'Certains manuscrits ont : il a pris soin de lui.'
  - type: text
    content: ' dans le désert. '
  '19':
  - type: text
    content: 'Après avoir détruit sept peuplades dans le pays de Canaan, il a donné leur territoire à son peuple. '
  '2':
  - type: text
    content: 'Un jour qu’ils adoraient ensemble le Seigneur et qu’ils jeûnaient, le Saint-Esprit leur dit : Mettez à part pour moi Barnabas et Saul pour l’œuvre à laquelle je les ai appelés.'
  '20':
  - type: text
    content: Tout cela a duré environ 450 ans.
  - type: text
    content: Après cela, il a donné
  - type: note
    content: 'Certains manuscrits ont : après cela, pendant quatre cent cinquante ans environ, il a donné…'
  - type: text
    content: ' à nos ancêtres des chefs jusqu’à l’époque du prophète Samuel. '
  '21':
  - type: text
    content: 'Alors le peuple a demandé un roi et Dieu leur a donné Saül, fils de Qish, de la tribu de Benjamin. Celui-ci a régné sur eux pendant quarante ans. '
  '22':
  - type: text
    content: 'Mais Dieu l’a rejeté et leur a choisi pour roi David. C’est à lui qu’il a rendu ce témoignage :'
  - type: text
    content: En David, fils d’Isaï, j’ai trouvé un homme qui correspond à mes désirs
  - type: text
    content: ' '
  - type: note
    content: 1 S 13.14 ; Ps 89.21.
  - type: text
    content: ', il accomplira toute ma volonté.'
  '23':
  - type: text
    content: 'Or, voici que Dieu vient d’accorder à Israël un Sauveur parmi les descendants de David, comme il l’avait promis, et ce Sauveur, c’est Jésus. '
  '24':
  - type: text
    content: 'Avant sa venue, Jean avait appelé tous les Israélites à se faire baptiser en signe d’un profond changement. '
  '25':
  - type: text
    content: 'Arrivé au terme de sa vie, Jean disait encore : « Qui pensez-vous que je suis ? Je ne suis pas celui que vous attendiez ! Non ! il vient après moi, et je ne mérite pas de dénouer ses sandales. »'
  '26':
  - type: text
    content: Mes frères, vous qui êtes les descendants d’Abraham et vous qui craignez Dieu et qui êtes présents parmi nous, c’est à nous
  - type: note
    content: 'Selon d’autres manuscrits : c’est à vous.'
  - type: text
    content: ' que Dieu a envoyé cette Parole de salut.'
  '27':
  - type: text
    content: 'En effet, les habitants de Jérusalem et leurs chefs n’ont compris ni qui était Jésus, ni les paroles des prophètes qui sont lues chaque jour de sabbat. Et voici qu’en condamnant Jésus, ils ont accompli ces prophéties. '
  '28':
  - type: text
    content: 'Ils n’ont trouvé chez lui aucune raison de le condamner à mort, et pourtant, ils ont demandé à Pilate de le faire exécuter. '
  '29':
  - type: text
    content: 'Après avoir réalisé tout ce que les Ecritures avaient prédit à son sujet, ils l’ont descendu de la croix et l’ont déposé dans un tombeau. '
  '3':
  - type: text
    content: 'Alors, après avoir jeûné et prié, ils leur imposèrent les mains et les laissèrent partir. '
  '30':
  - type: text
    content: 'Mais Dieu l’a ressuscité. '
  '31':
  - type: text
    content: Pendant de nombreux jours, Jésus s’est montré à ceux qui étaient montés avec lui de la Galilée jusqu’à Jérusalem et qui sont maintenant ses témoins devant le peuple.
  '32':
  - type: text
    content: 'Et nous, nous vous annonçons que la promesse que Dieu avait faite à nos ancêtres, '
  '33':
  - type: text
    content: 'il l’a pleinement accomplie pour nous, qui sommes leurs descendants, en ressuscitant Jésus, selon ce qui est écrit au Psaume deux :'
  - type: text
    content: Tu es mon Fils ;
  - type: text
    content: aujourd’hui,
  - type: text
    content: ' ╵'
  - type: text
    content: je fais de toi mon enfant
  - type: note
    content: Ps 2.7.
  - type: text
    content: .
  '34':
  - type: text
    content: 'Dieu avait annoncé celui qui ne devait pas retourner à la pourriture. C’est ce qu’il avait dit en ces termes :'
  - type: text
    content: Je vous accorderai
  - type: text
    content: les bénédictions saintes et sûres
  - type: text
    content: ' ╵'
  - type: text
    content: que j’ai promises à David
  - type: note
    content: Es 55.3 cité selon l’ancienne version grecque.
  - type: text
    content: .
  '35':
  - type: text
    content: 'Dans un autre passage, il est dit encore :'
  - type: text
    content: Tu ne laisseras pas
  - type: text
    content: ' ╵'
  - type: text
    content: un homme qui t’est dévoué
  - type: text
    content: ' ╵'
  - type: text
    content: se décomposer dans la tombe
  - type: note
    content: Ps 16.10 cité selon l’ancienne version grecque.
  - type: text
    content: .
  '36':
  - type: text
    content: 'Pourtant, David, après avoir en son temps contribué à l’accomplissement du plan de Dieu, est mort et a été enterré aux côtés de ses ancêtres. Il a donc connu la décomposition. '
  '37':
  - type: text
    content: Mais celui que Dieu a ressuscité ne l’a pas connue.
  '38':
  - type: text
    content: 'Sachez-le donc, mes frères, c’est grâce à lui que le pardon des péchés vous est annoncé ; '
  '39':
  - type: text
    content: c’est par lui que tout homme qui croit est acquitté de toutes les fautes dont vous ne pouviez pas être acquittés par la Loi de Moïse.
  '4':
  - type: text
    content: C’est donc envoyés par le Saint-Esprit que Barnabas et Saul descendirent à Séleucie
  - type: note
    content: Séleucie était le port d’Antioche de Syrie. Il faisait face à l’île de Chypre.
  - type: text
    content: ', où ils s’embarquèrent pour l’île de Chypre. '
  '40':
  - type: text
    content: Veillez donc à ce qu’il n’arrive pas
  - type: note
    content: 'Certains manuscrits ont : qu’il ne vous arrive pas.'
  - type: text
    content: ' ce qu’ont dit les prophètes :'
  '41':
  - type: text
    content: ' '
  - type: text
    content: Regardez, hommes pleins de mépris,
  - type: text
    content: soyez dans l’étonnement,
  - type: text
    content: ' ╵'
  - type: text
    content: et disparaissez,
  - type: text
    content: car je vais accomplir
  - type: text
    content: ' ╵'
  - type: text
    content: en votre temps une œuvre,
  - type: text
    content: une œuvre que vous ne croiriez pas
  - type: text
    content: ' ╵'
  - type: text
    content: si l’on vous en parlait
  - type: note
    content: Ha 1.5 cité selon l’ancienne version grecque.
  - type: text
    content: .
  '42':
  - type: text
    content: 'A la sortie, on leur demanda de reparler du même sujet le sabbat suivant. '
  '43':
  - type: text
    content: Quand l’assemblée se fut dispersée, beaucoup de Juifs et de non-Juifs convertis au judaïsme et qui adoraient Dieu suivirent Paul et Barnabas. Ceux-ci s’entretenaient avec eux et les encourageaient à rester attachés à la grâce de Dieu.
  - type: heading
    content: Paul et Barnabas s’adressent aux non-Juifs
  '44':
  - type: text
    content: 'Le sabbat suivant, presque toute la ville se rassembla pour écouter la Parole du Seigneur. '
  '45':
  - type: text
    content: En voyant tant de monde, les Juifs furent remplis de jalousie et se mirent à contredire Paul et à l’injurier.
  '46':
  - type: text
    content: 'Paul et Barnabas leur déclarèrent alors avec une pleine assurance : C’est à vous en premier que la Parole de Dieu devait être annoncée. Mais puisque vous la refusez et que vous-mêmes ne vous jugez pas dignes d’avoir part à la vie éternelle, nous nous tournons vers ceux qui ne sont pas Juifs. '
  '47':
  - type: text
    content: 'Car le Seigneur a bien défini notre mission lorsqu’il a dit :'
  - type: text
    content: Je t’ai établi pour que tu sois
  - type: text
    content: ' ╵'
  - type: text
    content: la lumière des autres peuples,
  - type: text
    content: et pour que tu portes le salut
  - type: text
    content: ' ╵'
  - type: text
    content: jusqu’aux extrémités de la terre
  - type: note
    content: Es 49.6.
  - type: text
    content: .
  '48':
  - type: text
    content: Quand les non-Juifs les entendirent parler ainsi, ils furent remplis de joie, ils se mirent à louer Dieu pour sa Parole et tous ceux qui étaient destinés à la vie éternelle crurent.
  '49':
  - type: text
    content: 'La Parole du Seigneur se répandait dans toute la contrée avoisinante. '
  '5':
  - type: text
    content: Une fois arrivés à Salamine, ils annoncèrent la Parole de Dieu dans les synagogues des Juifs. Jean-Marc était avec eux et les secondait.
  - type: heading
    content: Elymas le magicien
  '50':
  - type: text
    content: Mais les Juifs excitèrent les femmes dévotes de la haute société qui s’étaient attachées au judaïsme, ainsi que les notables de la ville. Ils provoquèrent ainsi une persécution contre Paul et Barnabas et les expulsèrent de leur territoire.
  '51':
  - type: text
    content: 'Ceux-ci secouèrent contre eux la poussière de leurs pieds et allèrent à Iconium. '
  '52':
  - type: text
    content: Les nouveaux disciples, cependant, étaient remplis de joie et de l’Esprit Saint.
  '6':
  - type: text
    content: Ils traversèrent toute l’île et arrivèrent à Paphos
  - type: note
    content: Un voyage d’environ 160 kilomètres. Paphos, sur la côte ouest, était la capitale administrative de l’île où résidait le gouverneur.
  - type: text
    content: '. Ils trouvèrent là un magicien juif nommé Bar-Jésus, qui se faisait passer pour un prophète. '
  '7':
  - type: text
    content: 'Il faisait partie de l’entourage du proconsul Sergius Paulus, un homme intelligent. Celui-ci invita Barnabas et Saul et leur exprima son désir d’entendre la Parole de Dieu. '
  '8':
  - type: text
    content: 'Mais Elymas le magicien (car c’est ainsi que l’on traduit son nom) s’opposait à eux ; il cherchait à détourner le proconsul de la foi. '
  '9':
  - type: text
    content: Alors Saul, qui s’appelait aussi Paul
  - type: note
    content: 'Les Juifs qui étaient citoyens romains (voir 22.27-29) portaient généralement deux noms : un nom juif (ici : Saul) et un nom romain (Paul). Lorsqu’il se trouvait en territoire non juif, l’apôtre utilisait ce dernier.'
  - type: text
    content: ', rempli du Saint-Esprit, s’adressa à lui en le regardant droit dans les yeux : '
