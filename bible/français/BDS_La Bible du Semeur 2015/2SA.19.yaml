document_id: 2SA.19,21
type_code: fra
verses:
  '1':
  - type: heading
    content: David pleure son fils
  - type: text
    content: 'Alors le roi frémit ; il monta dans la chambre supérieure au-dessus de la porte et pleura. Tout en marchant et sanglotant, il ne cessait de répéter : Mon fils Absalom ! Mon fils, mon fils Absalom ! Si seulement j’étais mort à ta place ! Absalom, mon fils, mon fils !'
  '10':
  - type: text
    content: 'et, dans toutes les tribus d’Israël, tout le monde discutait en disant : Le roi nous avait délivrés de nos ennemis : c’est lui en particulier qui nous a délivrés des Philistins, et maintenant il a dû s’enfuir à cause d’Absalom et quitter le pays. '
  '11':
  - type: text
    content: Cet Absalom à qui nous avions conféré l’onction pour en faire notre roi est mort au combat. Qu’attendez-vous donc pour rappeler David et le rétablir comme roi ?
  '12':
  - type: text
    content: Ce qui se disait dans tout Israël était parvenu jusqu’aux oreilles du roi
  - type: note
    content: 'Certains intègrent les mots : ce qui se disait… oreilles du roi aux propos du roi : pourquoi seriez-vous les derniers à faire revenir le roi alors que ce qui se dit dans tout Israël est parvenu jusqu’à ses oreilles ?'
  - type: text
    content: '. Alors il envoya dire aux prêtres Tsadoq et Abiatar : Allez parler aux responsables de Juda et dites-leur : « Pourquoi seriez-vous les derniers à faire revenir le roi chez lui ? '
  '13':
  - type: text
    content: 'Vous êtes les frères du roi, vous êtes sa tribu. Alors pourquoi seriez-vous les derniers à faire revenir le roi ? » '
  '14':
  - type: text
    content: 'Vous direz ensuite à Amasa : « Tu es de ma proche parenté, n’est-ce pas ? A partir d’aujourd’hui, je te nomme chef de l’armée en remplacement de Joab. Que Dieu me punisse très sévèrement si je n’exécute pas cette promesse. »'
  '15':
  - type: text
    content: 'En parlant ainsi, David gagna le cœur de tous les hommes de Juda de façon unanime. Alors ils firent dire au roi : Reviens ici avec tous tes serviteurs !'
  - type: heading
    content: David épargne Shimeï
  '16':
  - type: text
    content: 'Le roi prit donc le chemin du retour et atteignit les bords du Jourdain ; tout Juda était accouru à Guilgal pour l’accueillir et lui faire traverser la rivière. '
  '17':
  - type: text
    content: 'Shimeï, fils de Guéra, le Benjaminite de Bahourim, se hâta de descendre avec les hommes de Juda à la rencontre du roi David. '
  '18':
  - type: text
    content: 'Il était accompagné de mille autres Benjaminites ainsi que de Tsiba, l’intendant de la famille de Saül, de ses quinze fils et ses vingt serviteurs. Ils se précipitèrent vers le Jourdain au-devant du roi, '
  '19':
  - type: text
    content: 'pendant qu’un radeau allait traverser la rivière pour faire passer la famille royale de l’autre côté, et exécuter ce que le roi jugerait bon. Shimeï se jeta aux pieds du roi au moment où il s’apprêtait à passer le Jourdain '
  '2':
  - type: text
    content: 'On vint dire à Joab : Voici que le roi pleure et mène deuil sur Absalom.'
  '20':
  - type: text
    content: 'et lui dit : Que mon seigneur veuille bien ne pas tenir compte de ma faute et ne pas se souvenir du mal que son serviteur a commis le jour où mon seigneur le roi a quitté Jérusalem ! Que le roi ne m’en garde pas rancune ! '
  '21':
  - type: text
    content: Car ton serviteur reconnaît qu’il a péché. Mais aujourd’hui, comme tu peux le voir, je suis le premier de tous les descendants de Joseph à venir accueillir mon seigneur le roi.
  '22':
  - type: text
    content: 'Abishaï, fils de Tserouya, intervint et dit au roi : Shimeï a maudit celui à qui l’Eternel a conféré l’onction. Après cela, ne mérite-t-il pas la mort ?'
  '23':
  - type: text
    content: 'Mais David dit : De quoi vous mêlez-vous, fils de Tserouya, pour vous comporter aujourd’hui comme mes adversaires ? Est-ce vraiment un jour pour mettre quelqu’un à mort en Israël ? Est-ce que je n’ai pas aujourd’hui l’assurance de régner sur Israël ?'
  '24':
  - type: text
    content: 'Puis, se tournant vers Shimeï, le roi lui déclara : Tu ne mourras pas, je te le jure.'
  - type: heading
    content: Mephibosheth s’explique à David
  '25':
  - type: text
    content: Mephibosheth, fils de Saül, vint aussi à la rencontre du roi. Il ne s’était ni lavé les pieds, ni taillé la barbe, ni nettoyé les vêtements
  - type: note
    content: Signes de tristesse et de deuil.
  - type: text
    content: ', depuis le jour où le roi était parti de Jérusalem jusqu’à celui où il revenait en paix. '
  '26':
  - type: text
    content: 'Lorsqu’il se rendit au-devant du roi à Jérusalem, celui-ci lui demanda : Pourquoi n’es-tu pas venu avec moi, Mephibosheth ?'
  '27':
  - type: text
    content: 'Il répondit : O roi mon seigneur, mon intendant m’a trompé, car ton serviteur s’était dit : « Je vais faire seller mon ânesse, je la monterai – puisque ton serviteur est infirme – et je partirai avec le roi. » '
  '28':
  - type: text
    content: 'Mais mon intendant a calomnié ton serviteur auprès de mon seigneur le roi. Heureusement, mon seigneur le roi est comme un ange de Dieu. Fais donc ce que tu jugeras bon. '
  '29':
  - type: text
    content: Car tous les membres de la famille de mon grand-père Saül n’avaient rien d’autre à attendre de mon seigneur le roi que la mort ; malgré cela, tu as accueilli ton serviteur parmi ceux qui mangent à ta table. Quel droit aurais-je encore d’implorer d’autres faveurs de la part du roi ?
  '3':
  - type: text
    content: 'Et ce jour-là, au lieu de chanter la victoire, tout le peuple mena le deuil, car il avait entendu dire que le roi était accablé de douleur à cause de la mort de son fils. '
  '30':
  - type: text
    content: 'Le roi lui répondit : A quoi bon tant de paroles ? Je décide que toi et Tsiba, vous vous partagerez les terres.'
  '31':
  - type: text
    content: 'Alors Mephibosheth dit au roi : Il peut même tout prendre, puisque mon seigneur le roi rentre chez lui en paix.'
  - type: heading
    content: David récompense Barzillaï
  '32':
  - type: text
    content: 'Barzillaï, le Galaadite, était aussi venu de Roguelim pour accompagner le roi lors de la traversée de la rivière, et pour prendre congé de lui sur la rive. '
  '33':
  - type: text
    content: 'Barzillaï était un vieillard de quatre-vingts ans. C’est lui qui avait pourvu à l’entretien du roi pendant son séjour à Mahanaïm, car c’était un homme très riche. '
  '34':
  - type: text
    content: 'Le roi dit à Barzillaï : Viens, passe la rivière avec moi. Je pourvoirai à tout ton entretien auprès de moi à Jérusalem.'
  '35':
  - type: text
    content: 'Mais Barzillaï répondit au roi : Combien d’années me reste-t-il à vivre pour que j’aille avec le roi à Jérusalem ? '
  '36':
  - type: text
    content: 'J’ai maintenant quatre-vingts ans et je ne suis plus capable de distinguer ce qui est bon de ce qui est mauvais. Ton serviteur ne peut même plus apprécier ce qu’il mange et ce qu’il boit, ni entendre la voix des chanteurs et des chanteuses. Alors pourquoi serait-il encore à charge à mon seigneur le roi ? '
  '37':
  - type: text
    content: 'Ton serviteur traversera le Jourdain pour faire un petit bout de chemin avec le roi. D’ailleurs, je ne vois pas pourquoi le roi m’accorderait une telle récompense. '
  '38':
  - type: text
    content: Permets donc à ton serviteur de revenir chez lui pour que je meure dans ma ville, près de la tombe de mon père et de ma mère ! Mais voici mon fils
  - type: note
    content: 'mon fils: rajouté d’après l’ancienne version grecque.'
  - type: text
    content: ', ton serviteur Kimham, il peut accompagner mon seigneur le roi ; fais pour lui ce que tu jugeras bon.'
  '39':
  - type: text
    content: 'Le roi dit : D’accord ! Que Kimham vienne avec moi, et je ferai pour lui ce que tu jugeras bon ; je ferai pour toi tout ce que tu désireras que je fasse.'
  '4':
  - type: text
    content: 'Ce même jour, tous les hommes rentrèrent à la dérobée dans la ville comme une armée honteuse d’avoir pris la fuite dans une bataille. '
  '40':
  - type: text
    content: 'Quand tout le monde eut traversé le Jourdain et que le roi l’eut aussi passé, il embrassa Barzillaï et le bénit, puis Barzillaï s’en retourna chez lui. '
  '41':
  - type: text
    content: Le roi poursuivit sa route en direction de Guilgal, et Kimham l’accompagna.
  - type: heading
    content: Rivalité entre Juda et Israël
  - type: text
    content: 'Toute la troupe de Juda et la moitié des Israélites du Nord étaient présents lorsque le roi avait traversé le Jourdain. '
  '42':
  - type: text
    content: 'Alors les gens du Nord vinrent trouver le roi et lui demandèrent : Pourquoi nos compatriotes, les hommes de Juda, se sont-ils emparés furtivement de toi pour te faire traverser le Jourdain, toi, ta famille et tous tes gens ?'
  '43':
  - type: text
    content: 'Les Judéens répondirent aux hommes d’Israël : C’est que le roi nous est apparenté. Quelle raison y a-t-il là pour vous mettre en colère ? Avons-nous vécu aux dépens du roi ? Nous a-t-il fait des cadeaux ?'
  '44':
  - type: text
    content: 'Les hommes d’Israël répliquèrent aux Judéens : Le roi nous appartient dix fois autant qu’à vous, et même sur David nous avons plus de droits que vous. Pourquoi nous avez-vous traités avec un tel mépris ? N’avons-nous pas été les premiers à proposer de faire revenir notre roi ?'
  - type: text
    content: Mais les hommes de Juda furent encore plus durs dans leurs répliques que les hommes d’Israël.
  '5':
  - type: text
    content: Le roi s’était voilé le visage
  - type: note
    content: En signe de tristesse et de deuil (voir 15.30 ; Jr 14.3-4).
  - type: text
    content: ' et continuait à crier : Mon fils Absalom ! Absalom, mon fils, mon fils !'
  '6':
  - type: text
    content: 'Joab alla le trouver dans la maison et lui dit : Tes soldats viennent de te sauver la vie ainsi que celle de tes fils et de tes filles, de tes femmes et de tes épouses de second rang, et aujourd’hui, toi, tu les couvres de honte. '
  '7':
  - type: text
    content: 'Tu aimes ceux qui te haïssent, et tu hais ceux qui t’aiment, et tu montres aujourd’hui que les chefs de ton armée et les hommes qui te servent ne comptent pour rien à tes yeux. Oui, je vois bien à présent que si Absalom était vivant et si nous étions tous morts, tu trouverais cela bien. '
  '8':
  - type: text
    content: Maintenant ressaisis-toi, sors et adresse à tes soldats des paroles de félicitations et d’encouragements ! Car je te jure par l’Eternel que si tu ne le fais pas, pas un seul homme ne restera cette nuit avec toi. Et ce sera pour toi le pire des malheurs qui te soit arrivé depuis ta jeunesse.
  '9':
  - type: text
    content: Alors le roi se leva et alla s’installer à la porte. On fit annoncer à toute l’armée que le roi siégeait à la porte et tous vinrent se présenter devant lui.
  - type: heading
    content: David prépare son retour à Jérusalem
  - type: text
    content: 'Quant aux soldats d’Israël, ils s’étaient enfuis, chacun chez soi '
