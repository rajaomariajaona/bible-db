document_id: 2SA.19
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: David pleure son fils
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Alors le roi frémit ; il monta dans la chambre supérieure au-dessus de la porte et pleura. Tout en marchant et sanglotant, il ne cessait de répéter : Mon fils Absalom ! Mon fils, mon fils Absalom ! Si seulement j’étais mort à ta place ! Absalom, mon fils, mon fils !'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'On vint dire à Joab : Voici que le roi pleure et mène deuil sur Absalom.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Et ce jour-là, au lieu de chanter la victoire, tout le peuple mena le deuil, car il avait entendu dire que le roi était accablé de douleur à cause de la mort de son fils. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Ce même jour, tous les hommes rentrèrent à la dérobée dans la ville comme une armée honteuse d’avoir pris la fuite dans une bataille. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Le roi s’était voilé le visage
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '19.5 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: En signe de tristesse et de deuil (voir 15.30 ; Jr 14.3-4).
    marker-yv: yv-n
  - type: text
    text: ' et continuait à crier : Mon fils Absalom ! Absalom, mon fils, mon fils !'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Joab alla le trouver dans la maison et lui dit : Tes soldats viennent de te sauver la vie ainsi que celle de tes fils et de tes filles, de tes femmes et de tes épouses de second rang, et aujourd’hui, toi, tu les couvres de honte. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Tu aimes ceux qui te haïssent, et tu hais ceux qui t’aiment, et tu montres aujourd’hui que les chefs de ton armée et les hommes qui te servent ne comptent pour rien à tes yeux. Oui, je vois bien à présent que si Absalom était vivant et si nous étions tous morts, tu trouverais cela bien. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Maintenant ressaisis-toi, sors et adresse à tes soldats des paroles de félicitations et d’encouragements ! Car je te jure par l’Eternel que si tu ne le fais pas, pas un seul homme ne restera cette nuit avec toi. Et ce sera pour toi le pire des malheurs qui te soit arrivé depuis ta jeunesse.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Alors le roi se leva et alla s’installer à la porte. On fit annoncer à toute l’armée que le roi siégeait à la porte et tous vinrent se présenter devant lui.
- type: usfm
  marker: s1
  children:
  - type: text
    text: David prépare son retour à Jérusalem
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Quant aux soldats d’Israël, ils s’étaient enfuis, chacun chez soi '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'et, dans toutes les tribus d’Israël, tout le monde discutait en disant : Le roi nous avait délivrés de nos ennemis : c’est lui en particulier qui nous a délivrés des Philistins, et maintenant il a dû s’enfuir à cause d’Absalom et quitter le pays. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Cet Absalom à qui nous avions conféré l’onction pour en faire notre roi est mort au combat. Qu’attendez-vous donc pour rappeler David et le rétablir comme roi ?
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Ce qui se disait dans tout Israël était parvenu jusqu’aux oreilles du roi
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '19.12 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Certains intègrent les mots : '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'ce qui se disait… oreilles du roi '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'aux propos du roi : '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: pourquoi seriez-vous les derniers à faire revenir le roi alors que ce qui se dit dans tout Israël est parvenu jusqu’à ses oreilles ?
    marker-yv: yv-n
  - type: text
    text: '. Alors il envoya dire aux prêtres Tsadoq et Abiatar : Allez parler aux responsables de Juda et dites-leur : « Pourquoi seriez-vous les derniers à faire revenir le roi chez lui ? '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Vous êtes les frères du roi, vous êtes sa tribu. Alors pourquoi seriez-vous les derniers à faire revenir le roi ? » '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Vous direz ensuite à Amasa : « Tu es de ma proche parenté, n’est-ce pas ? A partir d’aujourd’hui, je te nomme chef de l’armée en remplacement de Joab. Que Dieu me punisse très sévèrement si je n’exécute pas cette promesse. »'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'En parlant ainsi, David gagna le cœur de tous les hommes de Juda de façon unanime. Alors ils firent dire au roi : Reviens ici avec tous tes serviteurs !'
- type: usfm
  marker: s1
  children:
  - type: text
    text: David épargne Shimeï
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Le roi prit donc le chemin du retour et atteignit les bords du Jourdain ; tout Juda était accouru à Guilgal pour l’accueillir et lui faire traverser la rivière. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Shimeï, fils de Guéra, le Benjaminite de Bahourim, se hâta de descendre avec les hommes de Juda à la rencontre du roi David. '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Il était accompagné de mille autres Benjaminites ainsi que de Tsiba, l’intendant de la famille de Saül, de ses quinze fils et ses vingt serviteurs. Ils se précipitèrent vers le Jourdain au-devant du roi, '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'pendant qu’un radeau allait traverser la rivière pour faire passer la famille royale de l’autre côté, et exécuter ce que le roi jugerait bon. Shimeï se jeta aux pieds du roi au moment où il s’apprêtait à passer le Jourdain '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'et lui dit : Que mon seigneur veuille bien ne pas tenir compte de ma faute et ne pas se souvenir du mal que son serviteur a commis le jour où mon seigneur le roi a quitté Jérusalem ! Que le roi ne m’en garde pas rancune ! '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Car ton serviteur reconnaît qu’il a péché. Mais aujourd’hui, comme tu peux le voir, je suis le premier de tous les descendants de Joseph à venir accueillir mon seigneur le roi.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Abishaï, fils de Tserouya, intervint et dit au roi : Shimeï a maudit celui à qui l’Eternel a conféré l’onction. Après cela, ne mérite-t-il pas la mort ?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Mais David dit : De quoi vous mêlez-vous, fils de Tserouya, pour vous comporter aujourd’hui comme mes adversaires ? Est-ce vraiment un jour pour mettre quelqu’un à mort en Israël ? Est-ce que je n’ai pas aujourd’hui l’assurance de régner sur Israël ?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Puis, se tournant vers Shimeï, le roi lui déclara : Tu ne mourras pas, je te le jure.'
- type: usfm
  marker: s1
  children:
  - type: text
    text: Mephibosheth s’explique à David
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: Mephibosheth, fils de Saül, vint aussi à la rencontre du roi. Il ne s’était ni lavé les pieds, ni taillé la barbe, ni nettoyé les vêtements
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '19.25 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Signes de tristesse et de deuil.
    marker-yv: yv-n
  - type: text
    text: ', depuis le jour où le roi était parti de Jérusalem jusqu’à celui où il revenait en paix. '
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Lorsqu’il se rendit au-devant du roi à Jérusalem, celui-ci lui demanda : Pourquoi n’es-tu pas venu avec moi, Mephibosheth ?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'Il répondit : O roi mon seigneur, mon intendant m’a trompé, car ton serviteur s’était dit : « Je vais faire seller mon ânesse, je la monterai – puisque ton serviteur est infirme – et je partirai avec le roi. » '
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'Mais mon intendant a calomnié ton serviteur auprès de mon seigneur le roi. Heureusement, mon seigneur le roi est comme un ange de Dieu. Fais donc ce que tu jugeras bon. '
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: Car tous les membres de la famille de mon grand-père Saül n’avaient rien d’autre à attendre de mon seigneur le roi que la mort ; malgré cela, tu as accueilli ton serviteur parmi ceux qui mangent à ta table. Quel droit aurais-je encore d’implorer d’autres faveurs de la part du roi ?
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'Le roi lui répondit : A quoi bon tant de paroles ? Je décide que toi et Tsiba, vous vous partagerez les terres.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'Alors Mephibosheth dit au roi : Il peut même tout prendre, puisque mon seigneur le roi rentre chez lui en paix.'
- type: usfm
  marker: s1
  children:
  - type: text
    text: David récompense Barzillaï
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '32'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'Barzillaï, le Galaadite, était aussi venu de Roguelim pour accompagner le roi lors de la traversée de la rivière, et pour prendre congé de lui sur la rive. '
  - type: usfm
    marker: v
    metadata:
      v: '33'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: 'Barzillaï était un vieillard de quatre-vingts ans. C’est lui qui avait pourvu à l’entretien du roi pendant son séjour à Mahanaïm, car c’était un homme très riche. '
  - type: usfm
    marker: v
    metadata:
      v: '34'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: 'Le roi dit à Barzillaï : Viens, passe la rivière avec moi. Je pourvoirai à tout ton entretien auprès de moi à Jérusalem.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '35'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: 'Mais Barzillaï répondit au roi : Combien d’années me reste-t-il à vivre pour que j’aille avec le roi à Jérusalem ? '
  - type: usfm
    marker: v
    metadata:
      v: '36'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: 'J’ai maintenant quatre-vingts ans et je ne suis plus capable de distinguer ce qui est bon de ce qui est mauvais. Ton serviteur ne peut même plus apprécier ce qu’il mange et ce qu’il boit, ni entendre la voix des chanteurs et des chanteuses. Alors pourquoi serait-il encore à charge à mon seigneur le roi ? '
  - type: usfm
    marker: v
    metadata:
      v: '37'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: 'Ton serviteur traversera le Jourdain pour faire un petit bout de chemin avec le roi. D’ailleurs, je ne vois pas pourquoi le roi m’accorderait une telle récompense. '
  - type: usfm
    marker: v
    metadata:
      v: '38'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: text
    text: Permets donc à ton serviteur de revenir chez lui pour que je meure dans ma ville, près de la tombe de mon père et de ma mère ! Mais voici mon fils
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '19.38 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: mon fils
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: ': '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: rajouté d’après l’ancienne version grecque.
    marker-yv: yv-n
  - type: text
    text: ', ton serviteur Kimham, il peut accompagner mon seigneur le roi ; fais pour lui ce que tu jugeras bon.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '39'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '39'
  - type: text
    text: 'Le roi dit : D’accord ! Que Kimham vienne avec moi, et je ferai pour lui ce que tu jugeras bon ; je ferai pour toi tout ce que tu désireras que je fasse.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '40'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '40'
  - type: text
    text: 'Quand tout le monde eut traversé le Jourdain et que le roi l’eut aussi passé, il embrassa Barzillaï et le bénit, puis Barzillaï s’en retourna chez lui. '
  - type: usfm
    marker: v
    metadata:
      v: '41'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '41'
  - type: text
    text: Le roi poursuivit sa route en direction de Guilgal, et Kimham l’accompagna.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Rivalité entre Juda et Israël
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Toute la troupe de Juda et la moitié des Israélites du Nord étaient présents lorsque le roi avait traversé le Jourdain. '
  - type: usfm
    marker: v
    metadata:
      v: '42'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '42'
  - type: text
    text: 'Alors les gens du Nord vinrent trouver le roi et lui demandèrent : Pourquoi nos compatriotes, les hommes de Juda, se sont-ils emparés furtivement de toi pour te faire traverser le Jourdain, toi, ta famille et tous tes gens ?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '43'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '43'
  - type: text
    text: 'Les Judéens répondirent aux hommes d’Israël : C’est que le roi nous est apparenté. Quelle raison y a-t-il là pour vous mettre en colère ? Avons-nous vécu aux dépens du roi ? Nous a-t-il fait des cadeaux ?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '44'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '44'
  - type: text
    text: 'Les hommes d’Israël répliquèrent aux Judéens : Le roi nous appartient dix fois autant qu’à vous, et même sur David nous avons plus de droits que vous. Pourquoi nous avez-vous traités avec un tel mépris ? N’avons-nous pas été les premiers à proposer de faire revenir notre roi ?'
- type: usfm
  marker: p
  children:
  - type: text
    text: Mais les hommes de Juda furent encore plus durs dans leurs répliques que les hommes d’Israël.
