document_id: ISA.22,21
type_code: fra
verses:
  '1':
  - type: heading
    content: Contre Jérusalem
  - type: text
    content: Oracle sur la vallée de la Vision
  - type: note
    content: La vallée de la Vision devait se situer près de Jérusalem (v. 7).
  - type: text
    content: '  :'
  - type: text
    content: Qu’as-tu donc, maintenant, ╵pour être tout entière
  - type: text
    content: montée sur les toits en terrasses,
  '10':
  - type: text
    content: vous avez dénombré ╵les maisons de Jérusalem
  - type: text
    content: et vous en avez démoli ╵pour renforcer les murs ╵qui protègent la ville.
  '11':
  - type: text
    content: Vous avez fait un réservoir ╵entre les deux murailles
  - type: text
    content: pour les eaux de l’ancien étang.
  - type: text
    content: Cependant, vous n’avez pas tourné les regards ╵vers celui qui a fait toutes ces choses,
  - type: text
    content: celui qui les a préparées ╵depuis des temps lointains.
  '12':
  - type: text
    content: En ce jour, l’Eternel, ╵le Seigneur des armées célestes, ╵vous appelait
  - type: text
    content: à pleurer, à gémir,
  - type: text
    content: à vous raser la tête ╵et à vous revêtir ╵d’un habit de toile de sac.
  '13':
  - type: text
    content: 'Mais au lieu de cela, ╵c’est la joie et la liesse :'
  - type: text
    content: on égorge des bœufs, ╵on abat des moutons, des chèvres,
  - type: text
    content: on se gorge de viande, ╵on boit du vin
  - type: text
    content: 'et l’on dit : « Mangeons et buvons, ╵car demain nous mourrons'
  - type: note
    content: Cité en 1 Co 15.32.
  - type: text
    content: . »
  '14':
  - type: text
    content: 'Le Seigneur des armées célestes ╵m’a révélé ceci :'
  - type: text
    content: Ce péché ne sera pas expié ╵aussi longtemps que vous vivrez.
  - type: text
    content: L’Eternel le déclare, ╵le Seigneur des armées célestes.
  - type: heading
    content: Contre Shebna
  '15':
  - type: text
    content: 'Voici ce que dit l’Eternel, ╵le Seigneur des armées célestes :'
  - type: text
    content: Va-t’en trouver cet intendant
  - type: text
    content: Shebna, le maître du palais.
  '16':
  - type: text
    content: 'Dis-lui : Qu’as-tu ici, ╵comme propriété'
  - type: text
    content: ou comme parenté,
  - type: text
    content: pour que tu te creuses un tombeau
  - type: text
    content: oui, que tu te creuses un tombeau ╵en ce lieu-ci, sur les hauteurs,
  - type: text
    content: et que dans le roc tu te tailles ╵une demeure ?
  '17':
  - type: text
    content: Voici que l’Eternel ╵va te lancer au loin,
  - type: text
    content: d’un geste de la main
  - type: note
    content: 'Autre traduction : mon beau gaillard.'
  - type: text
    content: ', ╵il va t’empaqueter,'
  '18':
  - type: text
    content: et t’envoyer rouler, ╵rouler comme une balle,
  - type: text
    content: vers une vaste plaine.
  - type: text
    content: C’est là que tu mourras, ╵c’est là que s’en iront ╵les chars qui font ta gloire,
  - type: text
    content: ô toi, qui es la honte ╵du palais de ton maître !
  '19':
  - type: text
    content: Je te renverrai de ton poste,
  - type: text
    content: oui, je t’arracherai ╵à ta situation.
  - type: heading
    content: Le prince de la maison de David
  '2':
  - type: text
    content: ô toi, ville bruyante ╵et pleine de tapage,
  - type: text
    content: cité en liesse ?
  - type: text
    content: Car ceux, parmi les tiens, ╵qui ont été tués ╵ne sont pas tombés par l’épée
  - type: text
    content: et ne sont pas morts au combat.
  '20':
  - type: text
    content: Et il arrivera, en ce jour-là, que je ferai appel à mon serviteur Eliaqim, le fils de Hilqiya
  - type: note
    content: Dès 701 av. J.-C., Eliaqim avait remplacé Shebna comme maître du palais (voir 36.3, 11, 22 ; 37.2).
  - type: text
    content: '. '
  '21':
  - type: text
    content: 'Je le revêtirai de ta tunique, je le ceindrai de ta ceinture et je lui remettrai ton pouvoir politique, et il sera un père pour les habitants de Jérusalem et le royaume de Juda. '
  '22':
  - type: text
    content: Je le chargerai donc de la clé du royaume de David et, quand il ouvrira, nul ne refermera, et quand il fermera, personne n’ouvrira
  - type: note
    content: Cité en Ap 3.7.
  - type: text
    content: '. '
  '23':
  - type: text
    content: 'Oui, je le planterai fermement comme un clou dans un endroit solide, comme un trône glorieux pour la famille de son père. '
  '24':
  - type: text
    content: Toute la gloire de sa parenté y sera suspendue, les rameaux, les brindilles et tous les ustensiles depuis les bols et jusqu’aux jarres.
  '25':
  - type: text
    content: En ce jour-là,
  - type: text
    content: déclare l’Eternel, ╵le Seigneur des armées célestes,
  - type: text
    content: le clou planté ╵dans un endroit solide ╵cédera, cassera, ╵et tombera,
  - type: text
    content: et tout le fardeau qu’il portait ╵se brisera.
  - type: text
    content: L’Eternel a parlé.
  '3':
  - type: text
    content: Tes officiers se sont enfuis ensemble,
  - type: text
    content: ils ont été faits prisonniers ╵par les archers ;
  - type: text
    content: tous ceux qu’on a trouvés ╵ont été pris ensemble
  - type: text
    content: comme ils fuyaient au loin.
  '4':
  - type: text
    content: 'C’est pourquoi je vous dis : ╵Détournez-vous de moi'
  - type: text
    content: et laissez-moi pleurer amèrement ;
  - type: text
    content: ne vous empressez pas ╵de venir me réconforter
  - type: text
    content: au sujet du ravage ╵qui a atteint ╵la communauté de mon peuple.
  '5':
  - type: text
    content: Car c’est un jour de trouble,
  - type: text
    content: de destruction ╵et de désolation
  - type: text
    content: qu’envoie l’Eternel, ╵le Seigneur des armées célestes,
  - type: text
    content: dans la vallée de la Vision.
  - type: text
    content: Des murailles sont abattues,
  - type: text
    content: et des cris de détresse ╵s’élèvent vers les monts.
  '6':
  - type: text
    content: Elam prend son carquois,
  - type: text
    content: il vient avec des chevaux et des chars ╵portant leurs hommes d’équipage ;
  - type: text
    content: et les hommes de Qir
  - type: note
    content: Elam, la Perse, et Qir, peut-être un autre nom des Mèdes (voir 21.2), ont dû fournir des soldats aux armées assyriennes.
  - type: text
    content: ' ╵sortent les boucliers.'
  '7':
  - type: text
    content: Hélas ! Jérusalem, ╵tes plus belles vallées ╵sont encombrées de chars,
  - type: text
    content: les soldats sur les chars ╵viennent se mettre en poste ╵en face de tes portes.
  '8':
  - type: text
    content: Voilà Juda ╵privé de ses défenses.
  - type: text
    content: Ce jour-là, vous avez placé ╵votre espoir dans les armes
  - type: text
    content: qui sont à l’arsenal ╵de la Maison de la Forêt.
  '9':
  - type: text
    content: Vous avez remarqué ╵combien les brèches sont nombreuses ╵dans les murailles de la ville ╵du roi David.
  - type: text
    content: Vous avez collecté de l’eau ╵dans le réservoir inférieur
  - type: note
    content: Bassin régulateur de la source de Guihôn, aménagé par le roi Ahaz pour augmenter les réserves d’eau en cas de siège (voir 2 Ch 32.3-4).
  - type: text
    content: ','
