document_id: ISA.22,21
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Contre Jérusalem
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: Oracle sur la vallée de la Vision
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '22.1 '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'La vallée de la Vision '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: devait se situer près de Jérusalem (v. 7).
      marker-yv: yv-n
    - type: text
      text: '  :'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Qu’as-tu donc, maintenant, ╵pour être tout entière
  - type: usfm
    marker: q1
    children:
    - type: text
      text: montée sur les toits en terrasses,
  '10':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: vous avez dénombré ╵les maisons de Jérusalem
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et vous en avez démoli ╵pour renforcer les murs ╵qui protègent la ville.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: Vous avez fait un réservoir ╵entre les deux murailles
  - type: usfm
    marker: q1
    children:
    - type: text
      text: pour les eaux de l’ancien étang.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Cependant, vous n’avez pas tourné les regards ╵vers celui qui a fait toutes ces choses,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: celui qui les a préparées ╵depuis des temps lointains.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: En ce jour, l’Eternel, ╵le Seigneur des armées célestes, ╵vous appelait
  - type: usfm
    marker: q1
    children:
    - type: text
      text: à pleurer, à gémir,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: à vous raser la tête ╵et à vous revêtir ╵d’un habit de toile de sac.
  '13':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'Mais au lieu de cela, ╵c’est la joie et la liesse :'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: on égorge des bœufs, ╵on abat des moutons, des chèvres,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: on se gorge de viande, ╵on boit du vin
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'et l’on dit : « Mangeons et buvons, ╵car demain nous mourrons'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '22.13 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Cité en '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: 1 Co 15.32
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: . »
  '14':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'Le Seigneur des armées célestes ╵m’a révélé ceci :'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ce péché ne sera pas expié ╵aussi longtemps que vous vivrez.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: L’Eternel le déclare, ╵le Seigneur des armées célestes.
  - type: usfm
    marker: s2
    children:
    - type: text
      text: Contre Shebna
    marker-yv: yv-h
  '15':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'Voici ce que dit l’Eternel, ╵le Seigneur des armées célestes :'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Va-t’en trouver cet intendant
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Shebna, le maître du palais.
  '16':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'Dis-lui : Qu’as-tu ici, ╵comme propriété'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ou comme parenté,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: pour que tu te creuses un tombeau
  - type: usfm
    marker: q1
    children:
    - type: text
      text: oui, que tu te creuses un tombeau ╵en ce lieu-ci, sur les hauteurs,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et que dans le roc tu te tailles ╵une demeure ?
  '17':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: Voici que l’Eternel ╵va te lancer au loin,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: d’un geste de la main
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '22.17 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Autre traduction : '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: mon beau gaillard.
      marker-yv: yv-n
    - type: text
      text: ', ╵il va t’empaqueter,'
  '18':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: et t’envoyer rouler, ╵rouler comme une balle,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: vers une vaste plaine.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: C’est là que tu mourras, ╵c’est là que s’en iront ╵les chars qui font ta gloire,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ô toi, qui es la honte ╵du palais de ton maître !
  '19':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: Je te renverrai de ton poste,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: oui, je t’arracherai ╵à ta situation.
  - type: usfm
    marker: s2
    children:
    - type: text
      text: Le prince de la maison de David
    marker-yv: yv-h
  '2':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: ô toi, ville bruyante ╵et pleine de tapage,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: cité en liesse ?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Car ceux, parmi les tiens, ╵qui ont été tués ╵ne sont pas tombés par l’épée
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et ne sont pas morts au combat.
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: Et il arrivera, en ce jour-là, que je ferai appel à mon serviteur Eliaqim, le fils de Hilqiya
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '22.20 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Dès 701 av. J.-C., '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'Eliaqim '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: avait remplacé Shebna comme maître du palais (voir 36.3, 11, 22 ; 37.2).
      marker-yv: yv-n
    - type: text
      text: '. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: 'Je le revêtirai de ta tunique, je le ceindrai de ta ceinture et je lui remettrai ton pouvoir politique, et il sera un père pour les habitants de Jérusalem et le royaume de Juda. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: Je le chargerai donc de la clé du royaume de David et, quand il ouvrira, nul ne refermera, et quand il fermera, personne n’ouvrira
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '22.22 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Cité en '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: Ap 3.7
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: '. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: 'Oui, je le planterai fermement comme un clou dans un endroit solide, comme un trône glorieux pour la famille de son père. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: Toute la gloire de sa parenté y sera suspendue, les rameaux, les brindilles et tous les ustensiles depuis les bols et jusqu’aux jarres.
  '25':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: En ce jour-là,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: déclare l’Eternel, ╵le Seigneur des armées célestes,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: le clou planté ╵dans un endroit solide ╵cédera, cassera, ╵et tombera,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et tout le fardeau qu’il portait ╵se brisera.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: L’Eternel a parlé.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: Tes officiers se sont enfuis ensemble,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ils ont été faits prisonniers ╵par les archers ;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: tous ceux qu’on a trouvés ╵ont été pris ensemble
  - type: usfm
    marker: q1
    children:
    - type: text
      text: comme ils fuyaient au loin.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'C’est pourquoi je vous dis : ╵Détournez-vous de moi'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et laissez-moi pleurer amèrement ;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ne vous empressez pas ╵de venir me réconforter
  - type: usfm
    marker: q1
    children:
    - type: text
      text: au sujet du ravage ╵qui a atteint ╵la communauté de mon peuple.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: Car c’est un jour de trouble,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: de destruction ╵et de désolation
  - type: usfm
    marker: q1
    children:
    - type: text
      text: qu’envoie l’Eternel, ╵le Seigneur des armées célestes,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dans la vallée de la Vision.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Des murailles sont abattues,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et des cris de détresse ╵s’élèvent vers les monts.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: Elam prend son carquois,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: il vient avec des chevaux et des chars ╵portant leurs hommes d’équipage ;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et les hommes de Qir
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '22.6 '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'Elam, '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'la Perse, et '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'Qir, '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'peut-être un autre nom des Mèdes (voir '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: '21.2'
        - type: text
          text: ), ont dû fournir des soldats aux armées assyriennes.
      marker-yv: yv-n
    - type: text
      text: ' ╵sortent les boucliers.'
  '7':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: Hélas ! Jérusalem, ╵tes plus belles vallées ╵sont encombrées de chars,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: les soldats sur les chars ╵viennent se mettre en poste ╵en face de tes portes.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: Voilà Juda ╵privé de ses défenses.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ce jour-là, vous avez placé ╵votre espoir dans les armes
  - type: usfm
    marker: q1
    children:
    - type: text
      text: qui sont à l’arsenal ╵de la Maison de la Forêt.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: Vous avez remarqué ╵combien les brèches sont nombreuses ╵dans les murailles de la ville ╵du roi David.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Vous avez collecté de l’eau ╵dans le réservoir inférieur
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '22.9 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Bassin régulateur de la source de Guihôn, aménagé par le roi Ahaz pour augmenter les réserves d’eau en cas de siège (voir '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: 2 Ch 32.3-4
        - type: text
          text: ).
      marker-yv: yv-n
    - type: text
      text: ','
