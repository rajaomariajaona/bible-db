type_code: fra
verses:
  '1':
  - type: usfm
    marker: imt1
    children:
    - type: text
      text: Introduction
  - type: usfm
    marker: ip
    children:
    - type: text
      text: 'Comme les livres de Samuel et des Rois, 1 et 2 Chroniques ne formaient à l’origine qu’un seul volume. Le terme « chroniques » traduit une expression hébraïque rendue ailleurs par le mot « annales » (1 R 14.19, 29, par exemple). L’auteur utilise de nombreuses sources écrites. Près de la moitié de son matériel est tiré des livres de Samuel et des Rois, mais il cite plusieurs autres livres de la Bible. Par ailleurs, il renvoie à de nombreuses sources extra-bibliques : des textes officiels concernant les rois (1 Ch 9.1 ; 27.24 ; 2 Ch 16.11 ; 20.34  ; etc.) et des livres prophétiques (1 Ch 29.29 ; 2 Ch 9.29 ; 12.15  ; etc.). La rédaction des Chroniques daterait de la fin du sixième ou celle du cinquième siècle avant Jésus-Christ.'
  - type: usfm
    marker: ip
    children:
    - type: text
      text: 'L’auteur des deux livres des Rois semble s’adresser à la communauté d’Israël exilée à Babylone ; celui des Chroniques écrit pour les Israélites revenus d’exil avec Zorobabel (Esd 2.2). Pour le Chroniste, la question brûlante est celle de la continuité entre la communauté d’Israël présente et celle du passé : Dieu s’intéresse-t-il toujours à elle ? Son alliance demeure-t-elle en vigueur ? Ses promesses envers David et sa descendance sont-elles toujours valables alors que le peuple, membre de l’empire perse, n’a plus de roi ? Qu’en est-il du culte après la destruction du Temple et l’exil en terre païenne ? Et l’Eternel, qu’attend-il de son peuple ? C’est pourquoi, reprenant l’histoire passée d’Israël, le Chroniste la présente aux rapatriés de manière à répondre à leurs interrogations (voir aussi l’introduction à 2 Chroniques).'
  - type: usfm
    marker: ip
    children:
    - type: text
      text: 'Il leur rappelle tout d’abord quelles sont leurs « racines » : par les généalogies qui ouvrent 1 Chroniques (chap. 1 à 9), il lie le présent au passé, remontant à Abraham et même à Adam (1.1). Il donne ainsi une « âme » à la communauté et l’assure de la fidélité de l’Eternel à son alliance.'
  - type: usfm
    marker: ip
    children:
    - type: text
      text: 'La seconde partie du livre (chap. 10 à 29) est entièrement consacrée au règne de David. Car c’est à David que la promesse de la permanence dynastique a été faite (17.1-15) : c’est le trône de son descendant qui « sera inébranlable à perpétuité » (17.14). C’est pourquoi le Chroniste ne mentionne que la généalogie et la mort de Saül (9.35 à 10.14). Il met en évidence le rôle central, emblématique, de David en ne retenant que les aspects positifs de sa vie, passant sous silence l’adultère commis avec Bath-Shéba, le meurtre d’Urie et la révolte d’Absalom. Dans 2 Chroniques, il négligera totalement, après le schisme, l’histoire des rois d’Israël, pour se concentrer sur celle des rois de Juda, héritiers de la promesse. Privés de roi, les Israélites revenus d’exil ont dû être fortifiés dans leur espérance messianique par cette vision de l’histoire.'
  - type: usfm
    marker: ip
    children:
    - type: text
      text: 'Mais la grande œuvre de David est celle qu’il n’a pas faite ! Désireux de construire un temple pour Dieu (17.1), il ne peut qu’organiser les préparatifs de la construction : il choisit l’emplacement (chap. 21), donne à Salomon les instructions nécessaires (chap. 22) et le mandate publiquement pour sa construction (chap. 28). Le second livre des Chroniques en décrit la réalisation et en révèle l’importance.'
