document_id: EST.8
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Le nouvel édit
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Ce même jour, l’empereur Xerxès fit don à l’impératrice Esther de tous les biens de Haman
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '8.1 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Selon la coutume du temps, les biens d’un condamné à mort étaient confisqués par l’empereur.
    marker-yv: yv-n
  - type: text
    text: ', le persécuteur des Juifs, et Mardochée fut introduit en présence de l’empereur, car Esther avait révélé quel était son lien de parenté avec elle. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Alors l’empereur retira de son doigt l’anneau qu’il avait repris à Haman
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '8.2 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Voir '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '3.10'
        metadata:
          usfm: EST.3.10
      - type: text
        text: ' et note.'
    marker-yv: yv-n
  - type: text
    text: ' et il le donna à Mardochée. Esther le chargea de gérer les biens de Haman. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Puis Esther parla de nouveau à l’empereur. Elle se jeta à ses pieds, et le supplia en pleurant de réduire à néant le mal organisé par Haman d’Agag, et les projets qu’il avait formés contre les Juifs. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: L’empereur tendit le sceptre d’or à Esther. Alors elle se releva et se tint debout devant lui.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: '– Si l’empereur le veut bien, dit-elle, et si vraiment j’ai obtenu sa faveur, si ma demande lui paraît convenable et s’il trouve plaisir en moi, qu’il veuille bien révoquer par écrit les lettres conçues par Haman, fils d’Hammedata l’Agaguite, et qu’il avait rédigées dans le but de faire périr les Juifs qui vivent dans toutes les provinces de l’empire. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: En effet, comment pourrais-je supporter de voir le malheur s’abattre sur mon peuple ? Oui, comment pourrais-je supporter la vue de la disparition de ma race ?
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'L’empereur Xerxès répondit à l’impératrice Esther et au Juif Mardochée : En ce qui me concerne, j’ai déjà donné à Esther les biens de Haman, et lui, je l’ai fait pendre à la potence parce qu’il voulait porter la main sur les Juifs. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Vous, maintenant, rédigez des lettres concernant les Juifs, comme vous le jugerez bon. Ecrivez-les au nom de l’empereur et cachetez-les avec le sceau impérial. En effet, un document rédigé au nom de l’empereur et cacheté avec son sceau est irrévocable
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '8.8 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Dans l’administration perse, un décret enregistré en bonne et due forme était irrévocable (
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '1.19'
        metadata:
          usfm: EST.1.19
      - type: text
        text: '  ; voir '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Dn 6.9
        metadata:
          usfm: DAN.6.9
      - type: text
        text: ), mais l’empereur pouvait promulguer un nouveau décret opposé au premier, autorisant les Juifs à se défendre s’ils étaient attaqués.
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'On convoqua les secrétaires impériaux sur-le-champ, le vingt-troisième jour du troisième mois, c’est-à-dire du mois de Sivân. On écrivit aux Juifs, aux satrapes, aux gouverneurs et aux ministres des cent vingt-sept provinces qui s’étendaient de l’Inde à l’Ethiopie, tout ce qu’ordonna Mardochée. On rédigea les lettres avec l’écriture de chaque province et selon la langue de chaque peuple. De même, on écrivit aux Juifs avec leur écriture et dans leur langue. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Les lettres furent écrites au nom de l’empereur Xerxès et cachetées avec son sceau, et on les expédia par des courriers montés sur des pur-sang sélectionnés de l’administration impériale
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '8.10 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Sens le plus probable d’un terme inconnu (de même au v. 14).
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Par cet édit, l’empereur autorisait les Juifs de chaque ville à se regrouper pour défendre leur vie, à massacrer, tuer et exterminer toute bande armée d’un peuple ou d’une province qui les attaquerait, y compris leurs enfants et leurs femmes, et à piller les biens de ces gens. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Cette autorisation était valable pour un jour, le treizième jour du douzième mois qui est le mois d’Adar, dans toutes les provinces de l’empereur Xerxès
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '8.12 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: C’est-à-dire à la date prévue par Haman pour le massacre des Juifs (
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '3.13'
        metadata:
          usfm: EST.3.13
      - type: text
        text: ') : 7 mars 473 av. J.-C.'
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Une copie du texte de la lettre devait être promulguée comme ayant force de loi dans chaque province, et portée à la connaissance de toute sa population, afin que les Juifs se tiennent prêts à se faire justice de leurs ennemis ce jour-là.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Les courriers montés sur les pur-sang de l’administration impériale partirent à bride abattue, par ordre de l’empereur, tandis que l’édit était immédiatement publié dans la citadelle de Suse. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Mardochée sortit de chez l’empereur revêtu d’un habit impérial violet et blanc, et portant une grande couronne d’or et un manteau de byssus et de pourpre. Toute la ville de Suse retentissait de cris de joie et se réjouissait. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Pour les Juifs, ce fut un jour lumineux, un jour de bonheur, de joie et de gloire. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: En chaque province, en chaque ville, et en tout lieu où parvenaient l’ordonnance et l’édit de l’empereur, ce fut pour les Juifs le bonheur et la joie, ainsi qu’une occasion de festin et de fête. Un grand nombre de gens du pays se firent Juifs, tant les Juifs leur inspiraient de crainte.
