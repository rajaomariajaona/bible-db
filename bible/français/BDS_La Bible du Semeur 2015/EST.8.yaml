document_id: EST.8,21
type_code: fra
verses:
  '1':
  - type: heading
    content: Le nouvel édit
  - type: text
    content: Ce même jour, l’empereur Xerxès fit don à l’impératrice Esther de tous les biens de Haman
  - type: note
    content: Selon la coutume du temps, les biens d’un condamné à mort étaient confisqués par l’empereur.
  - type: text
    content: ', le persécuteur des Juifs, et Mardochée fut introduit en présence de l’empereur, car Esther avait révélé quel était son lien de parenté avec elle. '
  '10':
  - type: text
    content: Les lettres furent écrites au nom de l’empereur Xerxès et cachetées avec son sceau, et on les expédia par des courriers montés sur des pur-sang sélectionnés de l’administration impériale
  - type: note
    content: Sens le plus probable d’un terme inconnu (de même au v. 14).
  - type: text
    content: .
  '11':
  - type: text
    content: 'Par cet édit, l’empereur autorisait les Juifs de chaque ville à se regrouper pour défendre leur vie, à massacrer, tuer et exterminer toute bande armée d’un peuple ou d’une province qui les attaquerait, y compris leurs enfants et leurs femmes, et à piller les biens de ces gens. '
  '12':
  - type: text
    content: Cette autorisation était valable pour un jour, le treizième jour du douzième mois qui est le mois d’Adar, dans toutes les provinces de l’empereur Xerxès
  - type: note
    content: 'C’est-à-dire à la date prévue par Haman pour le massacre des Juifs (3.13) : 7 mars 473 av. J.-C.'
  - type: text
    content: '. '
  '13':
  - type: text
    content: Une copie du texte de la lettre devait être promulguée comme ayant force de loi dans chaque province, et portée à la connaissance de toute sa population, afin que les Juifs se tiennent prêts à se faire justice de leurs ennemis ce jour-là.
  '14':
  - type: text
    content: 'Les courriers montés sur les pur-sang de l’administration impériale partirent à bride abattue, par ordre de l’empereur, tandis que l’édit était immédiatement publié dans la citadelle de Suse. '
  '15':
  - type: text
    content: 'Mardochée sortit de chez l’empereur revêtu d’un habit impérial violet et blanc, et portant une grande couronne d’or et un manteau de byssus et de pourpre. Toute la ville de Suse retentissait de cris de joie et se réjouissait. '
  '16':
  - type: text
    content: 'Pour les Juifs, ce fut un jour lumineux, un jour de bonheur, de joie et de gloire. '
  '17':
  - type: text
    content: En chaque province, en chaque ville, et en tout lieu où parvenaient l’ordonnance et l’édit de l’empereur, ce fut pour les Juifs le bonheur et la joie, ainsi qu’une occasion de festin et de fête. Un grand nombre de gens du pays se firent Juifs, tant les Juifs leur inspiraient de crainte.
  '2':
  - type: text
    content: Alors l’empereur retira de son doigt l’anneau qu’il avait repris à Haman
  - type: note
    content: Voir 3.10 et note.
  - type: text
    content: ' et il le donna à Mardochée. Esther le chargea de gérer les biens de Haman. '
  '3':
  - type: text
    content: 'Puis Esther parla de nouveau à l’empereur. Elle se jeta à ses pieds, et le supplia en pleurant de réduire à néant le mal organisé par Haman d’Agag, et les projets qu’il avait formés contre les Juifs. '
  '4':
  - type: text
    content: L’empereur tendit le sceptre d’or à Esther. Alors elle se releva et se tint debout devant lui.
  '5':
  - type: text
    content: '– Si l’empereur le veut bien, dit-elle, et si vraiment j’ai obtenu sa faveur, si ma demande lui paraît convenable et s’il trouve plaisir en moi, qu’il veuille bien révoquer par écrit les lettres conçues par Haman, fils d’Hammedata l’Agaguite, et qu’il avait rédigées dans le but de faire périr les Juifs qui vivent dans toutes les provinces de l’empire. '
  '6':
  - type: text
    content: En effet, comment pourrais-je supporter de voir le malheur s’abattre sur mon peuple ? Oui, comment pourrais-je supporter la vue de la disparition de ma race ?
  '7':
  - type: text
    content: 'L’empereur Xerxès répondit à l’impératrice Esther et au Juif Mardochée : En ce qui me concerne, j’ai déjà donné à Esther les biens de Haman, et lui, je l’ai fait pendre à la potence parce qu’il voulait porter la main sur les Juifs. '
  '8':
  - type: text
    content: Vous, maintenant, rédigez des lettres concernant les Juifs, comme vous le jugerez bon. Ecrivez-les au nom de l’empereur et cachetez-les avec le sceau impérial. En effet, un document rédigé au nom de l’empereur et cacheté avec son sceau est irrévocable
  - type: note
    content: Dans l’administration perse, un décret enregistré en bonne et due forme était irrévocable (1.19  ; voir Dn 6.9), mais l’empereur pouvait promulguer un nouveau décret opposé au premier, autorisant les Juifs à se défendre s’ils étaient attaqués.
  - type: text
    content: .
  '9':
  - type: text
    content: 'On convoqua les secrétaires impériaux sur-le-champ, le vingt-troisième jour du troisième mois, c’est-à-dire du mois de Sivân. On écrivit aux Juifs, aux satrapes, aux gouverneurs et aux ministres des cent vingt-sept provinces qui s’étendaient de l’Inde à l’Ethiopie, tout ce qu’ordonna Mardochée. On rédigea les lettres avec l’écriture de chaque province et selon la langue de chaque peuple. De même, on écrivit aux Juifs avec leur écriture et dans leur langue. '
