document_id: 1JN.2,21
type_code: fra
verses:
  '1':
  - type: text
    content: 'Mes chers enfants, je vous écris ceci afin que vous ne péchiez pas. Si, toutefois, il arrivait à quelqu’un de commettre un péché, nous avons un Défenseur auprès du Père : Jésus-Christ le juste.'
  '10':
  - type: text
    content: 'Celui qui aime son frère demeure dans la lumière, et rien en lui ne risque de causer sa chute. '
  '11':
  - type: text
    content: 'Mais celui qui déteste son frère est dans les ténèbres : il marche dans les ténèbres sans savoir où il va, parce que les ténèbres l’ont rendu aveugle.'
  - type: heading
    content: Enfants, pères et jeunes gens
  '12':
  - type: text
    content: 'Je vous écris ceci, enfants : vos péchés vous sont pardonnés grâce à Jésus-Christ. '
  '13':
  - type: text
    content: 'Je vous écris ceci, pères : vous connaissez celui qui est dès le commencement. Je vous écris ceci, jeunes gens : vous avez vaincu le diable'
  - type: note
    content: 'Autre traduction : le mal.'
  - type: text
    content: .
  '14':
  - type: text
    content: 'Je vous le confirme, enfants : vous connaissez le Père. Je vous le confirme, pères : vous connaissez celui qui est dès le commencement. Je vous le confirme, jeunes gens : vous êtes forts, la Parole de Dieu demeure en vous et vous avez vaincu le diable'
  - type: note
    content: 'Autre traduction : le mal.'
  - type: text
    content: .
  - type: heading
    content: Face au monde mauvais et aux antichrists
  '15':
  - type: text
    content: 'N’aimez pas le monde ni rien de ce qui fait partie de ce monde. Si quelqu’un aime le monde, l’amour pour le Père n’est pas en lui. '
  '16':
  - type: text
    content: 'En effet, tout ce qui fait partie du monde : les mauvais désirs qui animent l’homme livré à lui-même, la soif de posséder ce qui attire les regards, et l’orgueil qu’inspirent les biens matériels, tout cela ne vient pas du Père, mais du monde. '
  '17':
  - type: text
    content: Or le monde passe avec tous ses attraits, mais celui qui accomplit la volonté de Dieu demeure éternellement.
  '18':
  - type: text
    content: 'Mes enfants, c’est la dernière heure. Vous avez appris qu’un « anti-Christ » doit venir. Or, dès à présent, beaucoup d’antichrists sont là. Voilà pourquoi nous savons que nous sommes entrés dans la dernière heure. '
  '19':
  - type: text
    content: Ces adversaires de Christ sont sortis de chez nous mais, en réalité, ils n’étaient pas des nôtres. Car, s’ils avaient été des nôtres, ils seraient restés avec nous. Mais ils nous ont quittés pour qu’il soit parfaitement clair que tous ne sont pas des nôtres.
  '2':
  - type: text
    content: Car il a expié nos péchés
  - type: note
    content: 'Autre traduction : Car il a apaisé la colère de Dieu causée par nos péchés.'
  - type: text
    content: ', et pas seulement les nôtres, mais ceux de gens du monde entier.'
  - type: heading
    content: Le commandement d’aimer
  '20':
  - type: text
    content: Vous, au contraire, vous avez été oints du Saint-Esprit
  - type: note
    content: 'Autre traduction : la Parole.'
  - type: text
    content: ' par celui qui est saint, et vous avez tous la connaissance'
  - type: note
    content: 'Certains manuscrits ont : vous connaissez tout.'
  - type: text
    content: '. '
  '21':
  - type: text
    content: Si je vous écris, ce n’est pas parce que vous ne connaissez pas la vérité, mais parce que vous la connaissez, et qu’aucun mensonge ne vient de la vérité.
  '22':
  - type: text
    content: 'Alors qui est le menteur ? C’est celui qui nie que Jésus est Christ. Et « l’anti-Christ », c’est celui qui refuse de reconnaître le Père et le Fils. '
  '23':
  - type: text
    content: Tout homme qui nie que Jésus est le Fils de Dieu ne connaît pas non plus le Père. Celui qui reconnaît que Jésus est le Fils de Dieu connaît aussi le Père.
  '24':
  - type: text
    content: 'C’est pourquoi, tenez-vous soigneusement à l’enseignement que vous avez reçu dès le commencement. Si ce que vous avez entendu dès le commencement demeure en vous, vous demeurerez aussi unis au Fils et au Père. '
  '25':
  - type: text
    content: 'Et voici la promesse qu’il vous a faite : la vie éternelle.'
  '26':
  - type: text
    content: 'C’est au sujet de ceux qui vous entraînent dans l’erreur que je vous écris ces choses. '
  '27':
  - type: text
    content: Quant à vous, l’Esprit
  - type: note
    content: 'Autre traduction : la Parole.'
  - type: text
    content: ' dont vous avez été oints par Christ demeure en vous. Vous n’avez donc pas besoin que l’on vous instruise'
  - type: note
    content: Allusion aux « instructeurs » des sectes pré-gnostiques qui prétendaient que la connaissance (la gnose) qu’ils transmettaient était indispensable au salut.
  - type: text
    content: ', car cet Esprit dont vous avez été oints'
  - type: note
    content: 'Autre traduction : cette Parole dont vous avez été oints…'
  - type: text
    content: ' vous enseigne tout. Il est véridique, il ne ment pas. Restez donc attachés à cet enseignement tel que vous l’avez reçu de l’Esprit.'
  '28':
  - type: text
    content: Mes enfants, demeurez attachés à Christ pour qu’au moment où il paraîtra, nous soyons remplis d’assurance et que nous ne nous trouvions pas tout honteux loin de lui au moment de sa venue.
  - type: heading
    content: Vivre en enfant de Dieu
  - type: heading
    content: Qui est né de Dieu ne pèche pas
  '29':
  - type: text
    content: Vous savez que Dieu est juste ; reconnaissez, par conséquent, que tout homme qui accomplit ce qui est juste est né de lui.
  '3':
  - type: text
    content: 'Voici comment nous savons que nous connaissons Christ : c’est parce que nous obéissons à ses commandements. '
  '4':
  - type: text
    content: 'Si quelqu’un dit : « Je le connais » sans obéir à ses commandements, c’est un menteur et la vérité n’est pas en lui. '
  '5':
  - type: text
    content: 'Celui qui observe sa Parole a vraiment pour Dieu un amour parvenu à sa pleine maturité. C’est ainsi que nous savons que nous sommes unis à lui. '
  '6':
  - type: text
    content: Celui qui prétend qu’il demeure en Christ doit aussi vivre comme Christ lui-même a vécu.
  '7':
  - type: text
    content: 'Mes chers amis, ce n’est pas un nouveau commandement que je vous écris : il s’agit d’un commandement ancien que vous avez reçu dès le commencement, et ce commandement ancien, c’est le message que vous avez entendu.'
  '8':
  - type: text
    content: 'Mais en même temps, c’est un '
  - type: text
    content: commandement nouveau
  - type: note
    content: Jn 13.34.
  - type: text
    content: ' que je vous écris, et l’on en voit la réalisation en Christ et en vous, car les ténèbres se dissipent et la lumière véritable brille déjà'
  - type: note
    content: Moïse avait déjà ordonné d’aimer son prochain (Lv 19.18). Jésus l’a réalisé dans sa propre vie, nous laissant un exemple à imiter. Son Esprit reproduit sa vie d’amour en nous. Nous pouvons donc donner à l’ancien commandement une dimension nouvelle.
  - type: text
    content: .
  '9':
  - type: text
    content: 'Celui qui prétend être dans la lumière tout en détestant son frère, est encore présentement dans les ténèbres. '
