document_id: 1JN.2
type_code: fra
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Mes chers enfants, je vous écris ceci afin que vous ne péchiez pas. Si, toutefois, il arrivait à quelqu’un de commettre un péché, nous avons un Défenseur auprès du Père : Jésus-Christ le juste.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Car il a expié nos péchés
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '2.2 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Autre traduction : '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: Car il a apaisé la colère de Dieu causée par nos péchés.
    marker-yv: yv-n
  - type: text
    text: ', et pas seulement les nôtres, mais ceux de gens du monde entier.'
- type: usfm
  marker: s2
  children:
  - type: text
    text: Le commandement d’aimer
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Voici comment nous savons que nous connaissons Christ : c’est parce que nous obéissons à ses commandements. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Si quelqu’un dit : « Je le connais » sans obéir à ses commandements, c’est un menteur et la vérité n’est pas en lui. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Celui qui observe sa Parole a vraiment pour Dieu un amour parvenu à sa pleine maturité. C’est ainsi que nous savons que nous sommes unis à lui. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Celui qui prétend qu’il demeure en Christ doit aussi vivre comme Christ lui-même a vécu.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Mes chers amis, ce n’est pas un nouveau commandement que je vous écris : il s’agit d’un commandement ancien que vous avez reçu dès le commencement, et ce commandement ancien, c’est le message que vous avez entendu.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Mais en même temps, c’est un '
  - type: usfm
    marker: qt
    children:
    - type: text
      text: commandement nouveau
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '2.8 '
    - type: usfm
      marker: ft
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Jn 13.34
        metadata:
          usfm: JHN.13.34
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: ' que je vous écris, et l’on en voit la réalisation en Christ et en vous, car les ténèbres se dissipent et la lumière véritable brille déjà'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '2.8 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Moïse avait déjà ordonné d’aimer son prochain (
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Lv 19.18
        metadata:
          usfm: LEV.19.18
      - type: text
        text: ). Jésus l’a réalisé dans sa propre vie, nous laissant un exemple à imiter. Son Esprit reproduit sa vie d’amour en nous. Nous pouvons donc donner à l’ancien commandement une dimension nouvelle.
    marker-yv: yv-n
  - type: usfm
    marker: qt
    children:
    - type: text
      text: .
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Celui qui prétend être dans la lumière tout en détestant son frère, est encore présentement dans les ténèbres. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Celui qui aime son frère demeure dans la lumière, et rien en lui ne risque de causer sa chute. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Mais celui qui déteste son frère est dans les ténèbres : il marche dans les ténèbres sans savoir où il va, parce que les ténèbres l’ont rendu aveugle.'
- type: usfm
  marker: s2
  children:
  - type: text
    text: Enfants, pères et jeunes gens
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Je vous écris ceci, enfants : vos péchés vous sont pardonnés grâce à Jésus-Christ. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Je vous écris ceci, pères : vous connaissez celui qui est dès le commencement. Je vous écris ceci, jeunes gens : vous avez vaincu le diable'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '2.13 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Autre traduction : '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: le mal.
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Je vous le confirme, enfants : vous connaissez le Père. Je vous le confirme, pères : vous connaissez celui qui est dès le commencement. Je vous le confirme, jeunes gens : vous êtes forts, la Parole de Dieu demeure en vous et vous avez vaincu le diable'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '2.14 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Autre traduction : '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: le mal.
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: s2
  children:
  - type: text
    text: Face au monde mauvais et aux antichrists
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'N’aimez pas le monde ni rien de ce qui fait partie de ce monde. Si quelqu’un aime le monde, l’amour pour le Père n’est pas en lui. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'En effet, tout ce qui fait partie du monde : les mauvais désirs qui animent l’homme livré à lui-même, la soif de posséder ce qui attire les regards, et l’orgueil qu’inspirent les biens matériels, tout cela ne vient pas du Père, mais du monde. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Or le monde passe avec tous ses attraits, mais celui qui accomplit la volonté de Dieu demeure éternellement.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Mes enfants, c’est la dernière heure. Vous avez appris qu’un « anti-Christ » doit venir. Or, dès à présent, beaucoup d’antichrists sont là. Voilà pourquoi nous savons que nous sommes entrés dans la dernière heure. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Ces adversaires de Christ sont sortis de chez nous mais, en réalité, ils n’étaient pas des nôtres. Car, s’ils avaient été des nôtres, ils seraient restés avec nous. Mais ils nous ont quittés pour qu’il soit parfaitement clair que tous ne sont pas des nôtres.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Vous, au contraire, vous avez été oints du Saint-Esprit
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '2.20 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Autre traduction : '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: la Parole.
    marker-yv: yv-n
  - type: text
    text: ' par celui qui est saint, et vous avez tous la connaissance'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '2.20 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Certains manuscrits ont : '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: vous connaissez tout.
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Si je vous écris, ce n’est pas parce que vous ne connaissez pas la vérité, mais parce que vous la connaissez, et qu’aucun mensonge ne vient de la vérité.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Alors qui est le menteur ? C’est celui qui nie que Jésus est Christ. Et « l’anti-Christ », c’est celui qui refuse de reconnaître le Père et le Fils. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: Tout homme qui nie que Jésus est le Fils de Dieu ne connaît pas non plus le Père. Celui qui reconnaît que Jésus est le Fils de Dieu connaît aussi le Père.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'C’est pourquoi, tenez-vous soigneusement à l’enseignement que vous avez reçu dès le commencement. Si ce que vous avez entendu dès le commencement demeure en vous, vous demeurerez aussi unis au Fils et au Père. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Et voici la promesse qu’il vous a faite : la vie éternelle.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'C’est au sujet de ceux qui vous entraînent dans l’erreur que je vous écris ces choses. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: Quant à vous, l’Esprit
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '2.27 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Autre traduction : '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: la Parole.
    marker-yv: yv-n
  - type: text
    text: ' dont vous avez été oints par Christ demeure en vous. Vous n’avez donc pas besoin que l’on vous instruise'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '2.27 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Allusion aux « instructeurs » des sectes pré-gnostiques qui prétendaient que la connaissance (la gnose) qu’ils transmettaient était indispensable au salut.
    marker-yv: yv-n
  - type: text
    text: ', car cet Esprit dont vous avez été oints'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '2.27 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Autre traduction : '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: cette Parole dont vous avez été oints…
    marker-yv: yv-n
  - type: text
    text: ' vous enseigne tout. Il est véridique, il ne ment pas. Restez donc attachés à cet enseignement tel que vous l’avez reçu de l’Esprit.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: Mes enfants, demeurez attachés à Christ pour qu’au moment où il paraîtra, nous soyons remplis d’assurance et que nous ne nous trouvions pas tout honteux loin de lui au moment de sa venue.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Vivre en enfant de Dieu
  marker-yv: yv-h
- type: usfm
  marker: s2
  children:
  - type: text
    text: Qui est né de Dieu ne pèche pas
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: Vous savez que Dieu est juste ; reconnaissez, par conséquent, que tout homme qui accomplit ce qui est juste est né de lui.
