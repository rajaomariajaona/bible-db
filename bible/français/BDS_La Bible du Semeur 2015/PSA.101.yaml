document_id: PSA.101,21
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Engagement à lutter contre le mal
    marker-yv: yv-h
  - type: usfm
    marker: d
    children:
    - type: text
      text: Psaume de David.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Je veux chanter l’amour ╵et la justice,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: je te célébrerai ╵par la musique, ╵ô Eternel.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Je ferai attention ╵de suivre le chemin ╵des gens intègres.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Quand viendras-tu vers moi ?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Je veux marcher ╵avec un cœur intègre
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dans ma maison,
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: je ne mettrai ╵rien de mauvais ╵devant mes yeux.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Je hais l’acte tordu,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: il n’aura sur moi pas de prise.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Le cœur corrompu restera ╵bien loin de moi,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: je ne veux pas ╵être impliqué avec le mal.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Celui qui calomnie ╵son prochain en secret,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: je le réduirai au silence.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Je ne supporte pas
  - type: usfm
    marker: q1
    children:
    - type: text
      text: les yeux hautains ╵ni le cœur arrogant.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mes yeux se porteront ╵sur les fidèles du pays,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: je les ferai siéger auprès de moi.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et ceux qui suivent le chemin ╵des gens intègres
  - type: usfm
    marker: q1
    children:
    - type: text
      text: seront à mon service.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Il n’y a pas de place ╵dans ma maison
  - type: usfm
    marker: q1
    children:
    - type: text
      text: pour qui pratique ╵la tromperie,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et le menteur ╵ne subsistera pas ╵en ma présence.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tous les matins
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '101.8 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: La justice se rendait le matin à la porte de la ville (2 S 15.2 ; Jr 21.12).
      marker-yv: yv-n
    - type: text
      text: ' ╵je fermerai la bouche ╵aux méchants du pays,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: pour retrancher ╵de la cité de l’Eternel,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: tous ceux qui font le mal.
