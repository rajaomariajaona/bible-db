document_id: PSA.101,21
type_code: fra
verses:
  '1':
  - type: heading
    content: Engagement à lutter contre le mal
  - type: text
    content: Psaume de David.
  - type: text
    content: Je veux chanter l’amour ╵et la justice,
  - type: text
    content: je te célébrerai ╵par la musique, ╵ô Eternel.
  '2':
  - type: text
    content: Je ferai attention ╵de suivre le chemin ╵des gens intègres.
  - type: text
    content: Quand viendras-tu vers moi ?
  - type: text
    content: Je veux marcher ╵avec un cœur intègre
  - type: text
    content: dans ma maison,
  '3':
  - type: text
    content: je ne mettrai ╵rien de mauvais ╵devant mes yeux.
  - type: text
    content: Je hais l’acte tordu,
  - type: text
    content: il n’aura sur moi pas de prise.
  '4':
  - type: text
    content: Le cœur corrompu restera ╵bien loin de moi,
  - type: text
    content: je ne veux pas ╵être impliqué avec le mal.
  '5':
  - type: text
    content: Celui qui calomnie ╵son prochain en secret,
  - type: text
    content: je le réduirai au silence.
  - type: text
    content: Je ne supporte pas
  - type: text
    content: les yeux hautains ╵ni le cœur arrogant.
  '6':
  - type: text
    content: Mes yeux se porteront ╵sur les fidèles du pays,
  - type: text
    content: je les ferai siéger auprès de moi.
  - type: text
    content: Et ceux qui suivent le chemin ╵des gens intègres
  - type: text
    content: seront à mon service.
  '7':
  - type: text
    content: Il n’y a pas de place ╵dans ma maison
  - type: text
    content: pour qui pratique ╵la tromperie,
  - type: text
    content: et le menteur ╵ne subsistera pas ╵en ma présence.
  '8':
  - type: text
    content: Tous les matins
  - type: note
    content: La justice se rendait le matin à la porte de la ville (2 S 15.2 ; Jr 21.12).
  - type: text
    content: ' ╵je fermerai la bouche ╵aux méchants du pays,'
  - type: text
    content: pour retrancher ╵de la cité de l’Eternel,
  - type: text
    content: tous ceux qui font le mal.
