document_id: AMO.6,21
type_code: fra
verses:
  '1':
  - type: heading
    content: Luxe et insouciance
  - type: text
    content: Malheur à vous ╵qui vivez bien tranquilles dans Sion,
  - type: text
    content: et vous qui vous croyez ╵bien en sécurité ╵sur la montagne ╵de Samarie !
  - type: text
    content: Oui, vous les grands ╵de la première des nations,
  - type: text
    content: vous tous vers qui accourt ╵la communauté d’Israël !
  '10':
  - type: text
    content: 'Quand le parent d’un défunt emportera de la maison le mort pour le brûler, il demandera à celui qui se trouve au fond du logis : Quelqu’un d’autre est-il encore avec toi ?'
  - type: text
    content: 'Celui-ci répondra : Il n’y a plus personne.'
  - type: text
    content: 'Et l’on dira : Silence ! Car il n’y a pas lieu d’invoquer l’Eternel.'
  '11':
  - type: text
    content: 'L’Eternel va donner des ordres :'
  - type: text
    content: les grandes maisons, il les frappera ╵pour en faire un tas de gravats,
  - type: text
    content: puis les petites, ╵pour y ouvrir des brèches.
  '12':
  - type: text
    content: A-t-on vu des chevaux ╵galoper sur le roc ?
  - type: text
    content: Laboure-t-on la mer
  - type: note
    content: 'Laboure-t-on la mer: cette traduction suppose une légère modification du texte hébreu traditionnel qui porte : (Y) laboure-t-on.'
  - type: text
    content: ' avec des bœufs ?'
  - type: text
    content: Mais vous, vous changez le droit en poison,
  - type: text
    content: le fruit de la justice ╵en de l’absinthe amère.
  '13':
  - type: text
    content: Vous vous réjouissez ╵d’avoir pris Lo-Debar,
  - type: text
    content: 'vous dites : N’est-ce pas ╵grâce à notre puissance'
  - type: text
    content: que nous avons pris Qarnaïm
  - type: note
    content: 'Lo-Debar et Qarnaïm: deux villes situées à l’est du Jourdain (Gn 14.5 ; 2 S 9.4), reconquises sur les Syriens par Joas (2 R 10.32-33 ; 13.25) ; elles seront reprises par les Assyriens (v. 14 ; 2 R 15.29). Le prophète joue à nouveau sur le sens des noms de ces deux villes (voir 5.5 et note) qui signifient : néant et puissance.'
  - type: text
    content: '  ?'
  '14':
  - type: text
    content: 'Voici ce que déclare ╵l’Eternel, le Dieu des armées célestes :'
  - type: text
    content: O communauté d’Israël, ╵je vais susciter contre vous
  - type: text
    content: une nation qui vous opprimera ╵depuis Lebo-Hamath
  - type: text
    content: et jusqu’au torrent de la Araba
  - type: note
    content: C’est-à-dire de la limite nord (Jos 13.5) à la frontière sud du royaume d’Israël, près de la mer Morte.
  - type: text
    content: .
  '2':
  - type: text
    content: Rendez-vous à Kalné
  - type: note
    content: Au bord du Tigre.
  - type: text
    content: ', ╵pour voir ce qui s’y est passé.'
  - type: text
    content: Puis, de là, rendez-vous ╵à Hamath, la grande cité
  - type: note
    content: En Syrie, autrefois capitale d’un état puissant, conquise par Jéroboam (2 R 14.25, 28).
  - type: text
    content: .
  - type: text
    content: Puis descendez à Gath
  - type: note
    content: Voir 1.8 et note.
  - type: text
    content: ', ╵la ville philistine.'
  - type: text
    content: Constatez si ces villes ╵sont en meilleur état ╵que ces royaumes-ci
  - type: text
    content: ou si leur territoire ╵est plus grand que le vôtre.
  '3':
  - type: text
    content: Or le jour du malheur, ╵vous pensez l’éloigner,
  - type: text
    content: mais vous vous attirez ╵un règne de violence.
  '4':
  - type: text
    content: Vous voilà allongés ╵sur des lits incrustés d’ivoire,
  - type: text
    content: vous vous vautrez ╵sur des divans.
  - type: text
    content: Vous mangez des béliers ╵choisis dans le troupeau,
  - type: text
    content: des veaux de premier choix ╵pris dans l’étable.
  '5':
  - type: text
    content: Vous qui chantez ╵au son du luth,
  - type: text
    content: qui composez comme David ╵pour vos instruments de musique
  - type: note
    content: 'Autre traduction : qui inventez, comme David, des instruments de musique.'
  - type: text
    content: ','
  '6':
  - type: text
    content: vous buvez votre vin ╵à pleines coupes
  - type: text
    content: et vous oignez vos têtes ╵de parfums raffinés.
  - type: text
    content: Mais la destruction qui menace ╵tout le royaume de Joseph ╵ne vous affecte pas.
  '7':
  - type: text
    content: C’est pourquoi vous irez en tête ╵des déportés,
  - type: text
    content: et c’en sera fini ╵des banquets des fêtards ╵vautrés sur leurs divans.
  - type: heading
    content: Samarie sera détruite
  '8':
  - type: text
    content: Le Seigneur, l’Eternel, ╵l’a juré par lui-même
  - type: text
    content: '– c’est là ce que déclare l’Eternel, ╵Dieu des armées célestes :'
  - type: text
    content: J’ai en horreur ╵ce qui fait l’orgueil de Jacob
  - type: text
    content: et je hais ses palais,
  - type: text
    content: je livrerai la ville ╵et ce qu’elle contient.
  '9':
  - type: text
    content: 'Si, dans une maison, il subsiste dix hommes, eh bien, ils périront. '
