document_id: AMO.6,21
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s2
    children:
    - type: text
      text: Luxe et insouciance
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: Malheur à vous ╵qui vivez bien tranquilles dans Sion,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et vous qui vous croyez ╵bien en sécurité ╵sur la montagne ╵de Samarie !
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Oui, vous les grands ╵de la première des nations,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: vous tous vers qui accourt ╵la communauté d’Israël !
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Quand le parent d’un défunt emportera de la maison le mort pour le brûler, il demandera à celui qui se trouve au fond du logis : Quelqu’un d’autre est-il encore avec toi ?'
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Celui-ci répondra : Il n’y a plus personne.'
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Et l’on dira : Silence ! Car il n’y a pas lieu d’invoquer l’Eternel.'
  '11':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'L’Eternel va donner des ordres :'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: les grandes maisons, il les frappera ╵pour en faire un tas de gravats,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: puis les petites, ╵pour y ouvrir des brèches.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: A-t-on vu des chevaux ╵galoper sur le roc ?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Laboure-t-on la mer
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '6.12 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Laboure-t-on la mer
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: ': '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'cette traduction suppose une légère modification du texte hébreu traditionnel qui porte : '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: (Y) laboure-t-on.
      marker-yv: yv-n
    - type: text
      text: ' avec des bœufs ?'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mais vous, vous changez le droit en poison,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: le fruit de la justice ╵en de l’absinthe amère.
  '13':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Vous vous réjouissez ╵d’avoir pris Lo-Debar,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'vous dites : N’est-ce pas ╵grâce à notre puissance'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: que nous avons pris Qarnaïm
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '6.13 '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'Lo-Debar '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'et '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Qarnaïm
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: ': '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'deux villes situées à l’est du Jourdain (Gn 14.5 ; 2 S 9.4), reconquises sur les Syriens par Joas (2 R 10.32-33 ; 13.25) ; elles seront reprises par les Assyriens (v. 14 ; '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: 2 R 15.29
        - type: text
          text: '). Le prophète joue à nouveau sur le sens des noms de ces deux villes (voir '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: '5.5'
        - type: text
          text: ' et note) qui signifient : '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'néant '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'et '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: puissance.
      marker-yv: yv-n
    - type: text
      text: '  ?'
  '14':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Voici ce que déclare ╵l’Eternel, le Dieu des armées célestes :'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: O communauté d’Israël, ╵je vais susciter contre vous
  - type: usfm
    marker: q1
    children:
    - type: text
      text: une nation qui vous opprimera ╵depuis Lebo-Hamath
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et jusqu’au torrent de la Araba
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '6.14 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: C’est-à-dire de la limite nord (
        - type: usfm
          marker: ref
          children:
          - type: text
            text: Jos 13.5
        - type: text
          text: ) à la frontière sud du royaume d’Israël, près de la mer Morte.
      marker-yv: yv-n
    - type: text
      text: .
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Rendez-vous à Kalné
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '6.2 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Au bord du Tigre.
      marker-yv: yv-n
    - type: text
      text: ', ╵pour voir ce qui s’y est passé.'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Puis, de là, rendez-vous ╵à Hamath, la grande cité
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '6.2 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: En Syrie, autrefois capitale d’un état puissant, conquise par Jéroboam (
        - type: usfm
          marker: ref
          children:
          - type: text
            text: 2 R 14.25
        - type: text
          text: ', '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: '28'
        - type: text
          text: ).
      marker-yv: yv-n
    - type: text
      text: .
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Puis descendez à Gath
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '6.2 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Voir '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: '1.8'
        - type: text
          text: ' et note.'
      marker-yv: yv-n
    - type: text
      text: ', ╵la ville philistine.'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Constatez si ces villes ╵sont en meilleur état ╵que ces royaumes-ci
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ou si leur territoire ╵est plus grand que le vôtre.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Or le jour du malheur, ╵vous pensez l’éloigner,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: mais vous vous attirez ╵un règne de violence.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Vous voilà allongés ╵sur des lits incrustés d’ivoire,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: vous vous vautrez ╵sur des divans.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Vous mangez des béliers ╵choisis dans le troupeau,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: des veaux de premier choix ╵pris dans l’étable.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Vous qui chantez ╵au son du luth,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: qui composez comme David ╵pour vos instruments de musique
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '6.5 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Autre traduction : '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: qui inventez, comme David, des instruments de musique.
      marker-yv: yv-n
    - type: text
      text: ','
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: vous buvez votre vin ╵à pleines coupes
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et vous oignez vos têtes ╵de parfums raffinés.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mais la destruction qui menace ╵tout le royaume de Joseph ╵ne vous affecte pas.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: C’est pourquoi vous irez en tête ╵des déportés,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et c’en sera fini ╵des banquets des fêtards ╵vautrés sur leurs divans.
  - type: usfm
    marker: s2
    children:
    - type: text
      text: Samarie sera détruite
    marker-yv: yv-h
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Le Seigneur, l’Eternel, ╵l’a juré par lui-même
  - type: usfm
    marker: q1
    children:
    - type: text
      text: '– c’est là ce que déclare l’Eternel, ╵Dieu des armées célestes :'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: J’ai en horreur ╵ce qui fait l’orgueil de Jacob
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et je hais ses palais,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: je livrerai la ville ╵et ce qu’elle contient.
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Si, dans une maison, il subsiste dix hommes, eh bien, ils périront. '
