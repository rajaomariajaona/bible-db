document_id: PSA.25,21
type_code: fra
verses:
  '1':
  - type: heading
    content: Montre-moi la voie que tu veux que je suivePsaume alphabétique (cf. note 9.1).  !
  - type: text
    content: De David.
  - type: text
    content: Vers toi, Eternel, je me tourne.
  '10':
  - type: text
    content: Toutes les voies de l’Eternel ╵sont amour et fidélité
  - type: text
    content: pour ceux qui sont fidèles ╵à son alliance ╵et obéissent ╵à ses commandements.
  '11':
  - type: text
    content: Pour l’amour de ton nom, ╵ô Eternel,
  - type: text
    content: pardonne mon péché ╵qui est si grand.
  '12':
  - type: text
    content: A l’homme qui le craint,
  - type: text
    content: l’Eternel montre ╵la voie qu’il doit choisir.
  '13':
  - type: text
    content: Il le fait vivre ╵dans le bonheur
  - type: text
    content: et sa postérité ╵possède le pays
  - type: note
    content: 'Autre traduction : aura la terre en héritage (voir Mt 5.5).'
  - type: text
    content: .
  '14':
  - type: text
    content: L’Eternel confie ses desseins ╵aux hommes qui le craignent,
  - type: text
    content: il les instruit de son alliance.
  '15':
  - type: text
    content: Mes yeux sont constamment ╵tournés vers l’Eternel,
  - type: text
    content: car c’est lui qui dégage ╵mes pieds pris au filet.
  '16':
  - type: text
    content: Regarde-moi, ô Eternel, ╵et fais-moi grâce,
  - type: text
    content: car je suis seul et malheureux.
  '17':
  - type: text
    content: Mon cœur est dans l’angoisse,
  - type: text
    content: délivre-moi de mes tourments !
  '18':
  - type: text
    content: Vois ma misère et ma souffrance,
  - type: text
    content: pardonne-moi tous mes péchés !
  '19':
  - type: text
    content: Oh ! vois combien mes ennemis ╵sont en grand nombre,
  - type: text
    content: et quelle haine violente ╵ils ont pour moi !
  '2':
  - type: text
    content: En toi, mon Dieu, ╵j’ai mis ma confiance. ╵Ne permets pas ╵que je sois dans la honte,
  - type: text
    content: et que mes ennemis ╵se réjouissent de mon sort.
  '20':
  - type: text
    content: Protège-moi, ╵délivre-moi,
  - type: text
    content: 'garde-moi de la honte :'
  - type: text
    content: je cherche en toi ╵un sûr refuge.
  '21':
  - type: text
    content: Que l’innocence et la droiture ╵me sauvegardent
  - type: text
    content: car je compte sur toi.
  '22':
  - type: text
    content: O Dieu, sauve Israël
  - type: text
    content: de toutes ses détresses !
  '3':
  - type: text
    content: Aucun de ceux ╵qui s’attendent à toi ╵ne connaîtra jamais la honte.
  - type: text
    content: Mais honte à ceux ╵qui, sans raison, sont traîtres
  - type: note
    content: 'Autre traduction : à ceux qui ont les mains vides.'
  - type: text
    content: .
  '4':
  - type: text
    content: O Eternel, ╵montre-moi le chemin,
  - type: text
    content: enseigne-moi ╵quelle est la voie ╵que tu veux que je suive.
  '5':
  - type: text
    content: Dirige-moi ╵selon ta vérité ╵et instruis-moi !
  - type: text
    content: Car c’est toi le Dieu qui me sauve,
  - type: text
    content: et je m’attends à toi ╵à longueur de journée.
  '6':
  - type: text
    content: O Eternel, ╵veuille agir en fonction
  - type: note
    content: Un même verbe hébreu est employé aux v. 6 (agir en fonction), 7a (ne tiens plus compte) et 7b (traite-moi). Ce verbe désigne le fait de tenir compte de quelque chose pour agir en fonction de cela.
  - type: text
    content: ' ╵de la compassion ╵et de l’amour,'
  - type: text
    content: qui te caractérisent ╵depuis toujours.
  '7':
  - type: text
    content: Ne tiens plus compte ╵de ces péchés de ma jeunesse, ╵de mes fautes passées,
  - type: text
    content: mais traite-moi ╵selon ta grâce,
  - type: text
    content: car tu es bon ╵ô Eternel !
  '8':
  - type: text
    content: 'Oui, l’Eternel est bon, ╵et il est juste :'
  - type: text
    content: il indique aux pécheurs ╵le chemin qu’il faut suivre.
  '9':
  - type: text
    content: Les humbles, il les guide ╵sur le sentier du droit ;
  - type: text
    content: il leur enseigne ╵le chemin qu’il prescrit.
