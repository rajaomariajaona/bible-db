document_id: PSA.25,21
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Montre-moi la voie que tu veux que je suive
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '25 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Psaume alphabétique (cf. note '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: '9.1'
        - type: text
          text: ).
      marker-yv: yv-n
    - type: text
      text: '  !'
    marker-yv: yv-h
  - type: usfm
    marker: d
    children:
    - type: text
      text: De David.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Vers toi, Eternel, je me tourne.
  '10':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Toutes les voies de l’Eternel ╵sont amour et fidélité
  - type: usfm
    marker: q1
    children:
    - type: text
      text: pour ceux qui sont fidèles ╵à son alliance ╵et obéissent ╵à ses commandements.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Pour l’amour de ton nom, ╵ô Eternel,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: pardonne mon péché ╵qui est si grand.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: A l’homme qui le craint,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: l’Eternel montre ╵la voie qu’il doit choisir.
  '13':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Il le fait vivre ╵dans le bonheur
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et sa postérité ╵possède le pays
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '25.13 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Autre traduction : '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'aura la terre en héritage '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '(voir '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: Mt 5.5
        - type: text
          text: ).
      marker-yv: yv-n
    - type: text
      text: .
  '14':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: L’Eternel confie ses desseins ╵aux hommes qui le craignent,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: il les instruit de son alliance.
  '15':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mes yeux sont constamment ╵tournés vers l’Eternel,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: car c’est lui qui dégage ╵mes pieds pris au filet.
  '16':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Regarde-moi, ô Eternel, ╵et fais-moi grâce,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: car je suis seul et malheureux.
  '17':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mon cœur est dans l’angoisse,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: délivre-moi de mes tourments !
  '18':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Vois ma misère et ma souffrance,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: pardonne-moi tous mes péchés !
  '19':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Oh ! vois combien mes ennemis ╵sont en grand nombre,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et quelle haine violente ╵ils ont pour moi !
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: En toi, mon Dieu, ╵j’ai mis ma confiance. ╵Ne permets pas ╵que je sois dans la honte,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et que mes ennemis ╵se réjouissent de mon sort.
  '20':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Protège-moi, ╵délivre-moi,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'garde-moi de la honte :'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: je cherche en toi ╵un sûr refuge.
  '21':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Que l’innocence et la droiture ╵me sauvegardent
  - type: usfm
    marker: q1
    children:
    - type: text
      text: car je compte sur toi.
  '22':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: O Dieu, sauve Israël
  - type: usfm
    marker: q1
    children:
    - type: text
      text: de toutes ses détresses !
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Aucun de ceux ╵qui s’attendent à toi ╵ne connaîtra jamais la honte.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mais honte à ceux ╵qui, sans raison, sont traîtres
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '25.3 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Autre traduction : '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: à ceux qui ont les mains vides.
      marker-yv: yv-n
    - type: text
      text: .
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: O Eternel, ╵montre-moi le chemin,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: enseigne-moi ╵quelle est la voie ╵que tu veux que je suive.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Dirige-moi ╵selon ta vérité ╵et instruis-moi !
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Car c’est toi le Dieu qui me sauve,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et je m’attends à toi ╵à longueur de journée.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: O Eternel, ╵veuille agir en fonction
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '25.6 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Un même verbe hébreu est employé aux v. 6 (
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: agir en fonction
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ), 7a (
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: ne tiens plus compte
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ) et 7b (
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: traite-moi
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ). Ce verbe désigne le fait de tenir compte de quelque chose pour agir en fonction de cela.
      marker-yv: yv-n
    - type: text
      text: ' ╵de la compassion ╵et de l’amour,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: qui te caractérisent ╵depuis toujours.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ne tiens plus compte ╵de ces péchés de ma jeunesse, ╵de mes fautes passées,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: mais traite-moi ╵selon ta grâce,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: car tu es bon ╵ô Eternel !
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Oui, l’Eternel est bon, ╵et il est juste :'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: il indique aux pécheurs ╵le chemin qu’il faut suivre.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Les humbles, il les guide ╵sur le sentier du droit ;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: il leur enseigne ╵le chemin qu’il prescrit.
