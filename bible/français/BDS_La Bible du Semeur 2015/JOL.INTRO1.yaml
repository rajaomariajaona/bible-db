type_code: fra
verses:
  '1':
  - type: text
    content: Introduction
  - type: text
    content: 'En dehors du livre de Joël (1.1) et de la citation qui en est faite en Actes 2.16, l’Ecriture ne fait nulle part allusion au prophète Joël. Il ne peut, en effet, être identifié à aucun des douze autres personnages de l’Ancien Testament qui portent le même nom. Son père Petouël (1.1) est lui aussi inconnu par ailleurs. L’intérêt du prophète pour Jérusalem et pour Juda (3.5 ; 4.1, 6, 8, 16-20) suggère qu’il a dû exercer son ministère dans le royaume de Juda. L’époque de ce ministère, quant à elle, demeure très discutée : les dates proposées vont du neuvième siècle avant Jésus-Christ, sous Joas (835 à 796), au retour de l’exil, après les ministères d’Aggée et de Zacharie.'
  - type: text
    content: Le thème central du livre est « le jour de l’Eternel », expression qui revient à cinq reprises dans la prophétie (1.15 ; 2.1, 11 ; 3.4 ; 4.14).
  - type: text
    content: 'Dans un premier temps, Joël applique ce thème à une réalité qui lui est contemporaine (1.1-20) : une sécheresse et une invasion de sauterelles (1.4) viennent de ravager le pays et d’anéantir les récoltes. Aux yeux du prophète, ce fléau est un « jour de l’Eternel », c’est-à-dire un jugement de Dieu contre l’infidélité de Juda (1.15).'
  - type: text
    content: Selon certains, le chapitre 2 se rapporte à cette même invasion de sauterelles (2.25), à ce même « jour de l’Eternel » (2.1-2). A cause du châtiment divin, Joël appelle le peuple à revenir de tout son cœur à l’Eternel en manifestant sa décision de changer d’attitude intérieure par un jeûne national (2.12-17). Le prophète semble avoir été entendu. L’Eternel annonce, en effet, qu’il va détruire son armée de sauterelles et compenser par une nouvelle prospérité les dégâts qu’elles ont causés (2.18-27). D’autres, cependant, discernent dans l’invasion de sauterelles du premier chapitre la préfiguration d’une invasion militaire du royaume de Juda, décrite au chapitre 2, et constituée de troupes nombreuses et puissantes (2.4-10) venues du nord (2.10 ; voir Jr 1.14 ; 6.22).
  - type: text
    content: Dans un deuxième temps, passant de la scène contemporaine à celle de la fin des temps, Joël annonce un jour de l’Eternel universel, un jour de jugement pour tous les hommes (4.1-17), dont le peuple de Dieu sera sauvé (3.1-5 ; 4.18-21) et de jugement pour les nations (4.1-17). En ce jour, répondant à l’ancien vœu de Moïse (Nb 11.29), l’Eternel répandra son Esprit sur tous les membres de son peuple pour faire d’eux ses porte-parole, alors qu’un tel don n’était jusque-là réservé qu’à quelques-uns (3.1-5). C’est cette prophétie que l’apôtre Pierre citera le jour de la Pentecôte pour en signaler l’accomplissement et expliquer l’événement (Ac 2.16-21). Mais en ce jour de l’Eternel, les autres peuples se rassembleront aussi pour attaquer le peuple de Dieu en un ultime sursaut de révolte contre l’Eternel qui interviendra pour les juger (4.1-17). Cette vision grandiose de l’épreuve finale sera reprise par Ezéchiel (Ez 38 à 39) puis dans l’Apocalypse. Enfin, dans une dernière prophétie sur le jour de l’Eternel (4.18-21), Joël annonce la prospérité finale du peuple de Dieu et sa purification par une source qui jaillira du Temple. Jésus y fera écho pour annoncer le don de l’Esprit (Jn 7.37-38).
