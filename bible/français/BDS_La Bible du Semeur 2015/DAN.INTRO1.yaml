type_code: fra
verses:
  '1':
  - type: usfm
    marker: imt1
    children:
    - type: text
      text: Introduction
  - type: usfm
    marker: ip
    children:
    - type: text
      text: En 605 avant Jésus-Christ, après sa victoire décisive sur les armées égyptiennes à Karkemish, ville située sur le haut Euphrate, le roi de Babylone Nabuchodonosor (605 à 562) poursuit vers le sud les troupes ennemies en déroute. C’est à cette occasion qu’il assiège pour la première fois Jérusalem (1.1-2 ; 2 R 24.1). Le roi de Juda, Yehoyaqim, doit se soumettre et Nabuchodonosor emmène avec lui en Babylonie quelques membres de l’aristocratie judéenne, dont Daniel (1.3-4). Celui-ci et ses compagnons connaîtront en exil, pour prix de leur fidélité à l’Eternel, les persécutions les plus dures (chap. 3 et 6) et les honneurs les plus grands (1.17-20 ; 2.49 ; 3.30). Daniel lui-même devient haut fonctionnaire de l’empire (2.48-49 ; 4.6). Sans doute écarté à la mort de Nabuchodonosor en 562, il occupe à nouveau une fonction très importante dès la fin de l’Empire babylonien en 539 (5.29), sous la domination des Mèdes et des Perses, au moins jusqu’en 536 (10.1).
  - type: usfm
    marker: ip
    children:
    - type: text
      text: 'Selon les indications de l’ouvrage (12.4), le livre, qui contient de nombreux passages autobiographiques écrits à la première personne (chap. 8 à 12), est l’œuvre de Daniel lui-même. Il est rédigé en hébreu au début et à la fin, et en araméen, la langue parlée dans tout l’empire, dans sa partie centrale, de 2.4 à 7.28. L’alternance entre ces langues s’expliquerait, selon certains, par les centres d’intérêt des deux grandes sections de l’ouvrage : la section en araméen concernerait plus particulièrement l’histoire des royaumes du monde, celles en hébreu l’avenir d’Israël.'
  - type: usfm
    marker: ip
    children:
    - type: text
      text: 'Le livre se compose de récits (surtout aux chap. 1 à 6) et de visions (surtout aux chap. 7 à 12). Celles-ci font entre autres largement appel au symbolisme, ce qui n’en facilite pas l’interprétation. Tel est le cas dans le songe de la statue composite qu’a eu Nabuchodonosor (chap. 2), de la vision des quatre bêtes (chap. 7), ou de celle du bélier et du bouc (chap. 8). Les nombres eux aussi ont une portée symbolique (9.24-27 ; 12.7-13) et demandent à être décryptés. Fort heureusement, le livre lui-même fournit certaines explications : les quatre parties de la statue de Nabuchodonosor représentent les quatre royaumes que reprennent les quatre bêtes de la vision de Daniel (2.37ss ; 7.15ss) ; le bélier et le bouc sont les Mèdes associés aux Perses, et les Grecs (8.20-21). Puis, dans d’autres sections qui concernent par exemple les luttes entre les successeurs d’Alexandre le Grand, les Séleucides et les Ptolémées, et les persécutions d’Antiochus IV Epiphane (chap. 11 et 12), le langage est clair, sans symbolisme, et la précision des prédictions émerveille le lecteur moderne qui peut en vérifier l’accomplissement. Comme le souligne le livre, l’Eternel est bien le maître de l’histoire (5.21).'
  - type: usfm
    marker: ip
    children:
    - type: text
      text: 'Le Nouveau Testament s’appuie à de nombreuses reprises sur les révélations données à Daniel. Jésus y a choisi le titre par lequel il s’est de préférence désigné : le Fils de l’homme (7.13). Il rappelle « l’abominable profanation » dont a parlé le prophète Daniel (Mt 24.15 ; Dn 9.27 ; 12.11) qui, selon lui, annonçait la destruction du Temple par les Romains en 70 après Jésus-Christ. Enfin, l’Apocalypse, dans ses visions, en particulier dans celle de la bête qui monte de la mer et qui représente Rome (chap. 13 et 17), renvoie, elle aussi, aux visions de Daniel pour en livrer la juste interprétation.'
