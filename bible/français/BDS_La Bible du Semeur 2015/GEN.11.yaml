document_id: GEN.11,21
type_code: fra
verses:
  '1':
  - type: heading
    content: La tour de Babel
  - type: text
    content: A cette époque-là
  - type: note
    content: Les v. 1-9 doivent se situer chronologiquement avant le chap. 10.
  - type: text
    content: ', tous les hommes parlaient la même langue et tenaient le même langage. '
  '10':
  - type: text
    content: 'Voici la généalogie de Sem. Deux ans après le déluge, alors qu’il était âgé de cent ans, il eut pour fils Arpakshad. '
  '11':
  - type: text
    content: Après cela, Sem vécut encore 500 ans et eut d’autres enfants.
  '12':
  - type: text
    content: 'Arpakshad, âgé de 35 ans, eut pour fils Shélah. '
  '13':
  - type: text
    content: Après cela, il vécut encore 403 ans et eut d’autres enfants
  - type: note
    content: 'L’ancienne version grecque a, aux v. 12-13 : …35 ans, eut pour fils Caïnan. 13 Après cela… d’autres enfants et il mourut. Caïnan, âgé de 130 ans, eut pour fils Shélah. Après cela, il vécut 330 ans et eut d’autres fils.'
  - type: text
    content: .
  '14':
  - type: text
    content: 'Shélah, âgé de 30 ans, eut pour fils Héber. '
  '15':
  - type: text
    content: Puis il vécut encore 403 ans et eut d’autres enfants.
  '16':
  - type: text
    content: 'Héber, âgé de 34 ans, eut pour fils Péleg. '
  '17':
  - type: text
    content: Après cela, Héber vécut 430 ans et eut d’autres enfants.
  '18':
  - type: text
    content: 'Péleg, âgé de 30 ans, eut pour fils Reou. '
  '19':
  - type: text
    content: Après cela, il vécut 209 ans et eut d’autres enfants.
  '2':
  - type: text
    content: 'Lors de leurs migrations depuis l’est, ils découvrirent une vaste plaine dans le pays de Shinéar et ils s’y établirent. '
  '20':
  - type: text
    content: 'Reou, âgé de 32 ans, eut pour fils Seroug. '
  '21':
  - type: text
    content: Après cela, il vécut 207 ans et eut d’autres enfants.
  '22':
  - type: text
    content: 'Seroug, âgé de 30 ans, eut pour fils Nahor. '
  '23':
  - type: text
    content: Après cela, Seroug vécut 200 ans et eut d’autres enfants.
  '24':
  - type: text
    content: 'Nahor, âgé de 29 ans, eut pour fils Térah. '
  '25':
  - type: text
    content: Après cela, il vécut encore 119 ans et eut d’autres enfants.
  '26':
  - type: text
    content: Térah, âgé de 70 ans, eut pour fils Abram, Nahor et Harân.
  - type: heading
    content: 'L’histoire de la famille de Téra : le cycle d’Abraham'
  - type: heading
    content: D’Our à Harân
  '27':
  - type: text
    content: 'Voici l’histoire de la famille de Térah : il eut pour fils Abram, Nahor et Harân ; ce dernier fut le père de Loth. '
  '28':
  - type: text
    content: 'Harân mourut du vivant de son père Térah, dans son pays natal, à Our des Chaldéens. '
  '29':
  - type: text
    content: 'Abram et Nahor se marièrent. La femme d’Abram s’appelait Saraï et celle de Nahor Milka. Milka était la fille de Harân, qui, outre Milka, avait eu une autre fille du nom de Yiska. '
  '3':
  - type: text
    content: 'Ils se dirent les uns aux autres : Allons, moulons des briques et cuisons-les au four.'
  - type: text
    content: Ainsi ils employèrent les briques comme pierres et le bitume leur servit de mortier.
  '30':
  - type: text
    content: 'Saraï était stérile, elle ne pouvait pas avoir d’enfant. '
  '31':
  - type: text
    content: Térah partit d’Our des Chaldéens, emmenant avec lui son fils Abram, son petit-fils Loth, le fils de Harân, et Saraï, sa belle-fille, la femme d’Abram, pour se rendre au pays de Canaan, mais arrivés à Harân
  - type: note
    content: Ville de la Mésopotamie, centre de culte lunaire (comme Our). En hébreu le nom se distingue de Harân, le fils de Térah.
  - type: text
    content: ', ils s’y établirent. '
  '32':
  - type: text
    content: Térah vécut 205 ans, puis il mourut à Harân.
  '4':
  - type: text
    content: 'Puis ils dirent : Allons, construisons-nous une ville et une tour dont le sommet atteindra le ciel, alors notre nom deviendra célèbre et nous ne serons pas disséminés sur l’ensemble de la terre.'
  '5':
  - type: text
    content: 'L’Eternel descendit pour voir la ville et la tour que les hommes construisaient. '
  '6':
  - type: text
    content: 'Il dit alors : Ils forment un seul peuple parlant tous la même langue, et voilà ce qu’ils ont entrepris de faire ! Maintenant, quels que soient leurs projets, rien ne les empêchera de les réaliser. '
  '7':
  - type: text
    content: Allons, descendons et brouillons là leur langage pour qu’ils ne se comprennent plus entre eux !
  '8':
  - type: text
    content: 'Et l’Eternel les dissémina loin de là sur toute la terre ; ils cessèrent donc la construction de la ville. '
  '9':
  - type: text
    content: C’est pourquoi on l’appela Babel
  - type: note
    content: Le nom Babel évoque en hébreu le verbe Balal qui signifie « confondre, brouiller, troubler ».
  - type: text
    content: ' parce que là, l’Eternel avait confondu le langage des hommes de toute la terre, et c’est de là qu’il les a dispersés sur toute la terre.'
  - type: heading
    content: L’histoire de la famille de Sem
