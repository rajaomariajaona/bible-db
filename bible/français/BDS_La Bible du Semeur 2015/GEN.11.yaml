document_id: GEN.11
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: La tour de Babel
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: A cette époque-là
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '11.1 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Les v. 1-9 doivent se situer chronologiquement avant le chap. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '10'
        metadata:
          usfm: GEN.10
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: ', tous les hommes parlaient la même langue et tenaient le même langage. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Lors de leurs migrations depuis l’est, ils découvrirent une vaste plaine dans le pays de Shinéar et ils s’y établirent. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Ils se dirent les uns aux autres : Allons, moulons des briques et cuisons-les au four.'
- type: usfm
  marker: p
  children:
  - type: text
    text: Ainsi ils employèrent les briques comme pierres et le bitume leur servit de mortier.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Puis ils dirent : Allons, construisons-nous une ville et une tour dont le sommet atteindra le ciel, alors notre nom deviendra célèbre et nous ne serons pas disséminés sur l’ensemble de la terre.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'L’Eternel descendit pour voir la ville et la tour que les hommes construisaient. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Il dit alors : Ils forment un seul peuple parlant tous la même langue, et voilà ce qu’ils ont entrepris de faire ! Maintenant, quels que soient leurs projets, rien ne les empêchera de les réaliser. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Allons, descendons et brouillons là leur langage pour qu’ils ne se comprennent plus entre eux !
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Et l’Eternel les dissémina loin de là sur toute la terre ; ils cessèrent donc la construction de la ville. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: C’est pourquoi on l’appela Babel
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '11.9 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Le nom Babel évoque en hébreu le verbe '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'Balal '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: qui signifie « confondre, brouiller, troubler ».
    marker-yv: yv-n
  - type: text
    text: ' parce que là, l’Eternel avait confondu le langage des hommes de toute la terre, et c’est de là qu’il les a dispersés sur toute la terre.'
- type: usfm
  marker: ms1
  children:
  - type: text
    text: L’histoire de la famille de Sem
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Voici la généalogie de Sem. Deux ans après le déluge, alors qu’il était âgé de cent ans, il eut pour fils Arpakshad. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Après cela, Sem vécut encore 500 ans et eut d’autres enfants.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Arpakshad, âgé de 35 ans, eut pour fils Shélah. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Après cela, il vécut encore 403 ans et eut d’autres enfants
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '11.13 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'L’ancienne version grecque a, aux v. 12-13 : '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: '…35 ans, eut pour fils Caïnan. '
    - type: usfm
      marker: fv
      children:
      - type: text
        text: '13 '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: Après cela… d’autres enfants et il mourut. Caïnan, âgé de 130 ans, eut pour fils Shélah. Après cela, il vécut 330 ans et eut d’autres fils.
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Shélah, âgé de 30 ans, eut pour fils Héber. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Puis il vécut encore 403 ans et eut d’autres enfants.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Héber, âgé de 34 ans, eut pour fils Péleg. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Après cela, Héber vécut 430 ans et eut d’autres enfants.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Péleg, âgé de 30 ans, eut pour fils Reou. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Après cela, il vécut 209 ans et eut d’autres enfants.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Reou, âgé de 32 ans, eut pour fils Seroug. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Après cela, il vécut 207 ans et eut d’autres enfants.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Seroug, âgé de 30 ans, eut pour fils Nahor. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: Après cela, Seroug vécut 200 ans et eut d’autres enfants.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Nahor, âgé de 29 ans, eut pour fils Térah. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: Après cela, il vécut encore 119 ans et eut d’autres enfants.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: Térah, âgé de 70 ans, eut pour fils Abram, Nahor et Harân.
- type: usfm
  marker: ms1
  children:
  - type: text
    text: 'L’histoire de la famille de Téra : le cycle d’Abraham'
  marker-yv: yv-h
- type: usfm
  marker: s1
  children:
  - type: text
    text: D’Our à Harân
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'Voici l’histoire de la famille de Térah : il eut pour fils Abram, Nahor et Harân ; ce dernier fut le père de Loth. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'Harân mourut du vivant de son père Térah, dans son pays natal, à Our des Chaldéens. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'Abram et Nahor se marièrent. La femme d’Abram s’appelait Saraï et celle de Nahor Milka. Milka était la fille de Harân, qui, outre Milka, avait eu une autre fille du nom de Yiska. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'Saraï était stérile, elle ne pouvait pas avoir d’enfant. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: Térah partit d’Our des Chaldéens, emmenant avec lui son fils Abram, son petit-fils Loth, le fils de Harân, et Saraï, sa belle-fille, la femme d’Abram, pour se rendre au pays de Canaan, mais arrivés à Harân
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '11.31 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Ville de la Mésopotamie, centre de culte lunaire (comme Our). En hébreu le nom se distingue de Harân, le fils de Térah.
    marker-yv: yv-n
  - type: text
    text: ', ils s’y établirent. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: Térah vécut 205 ans, puis il mourut à Harân.
