document_id: EXO.13,21
type_code: fra
verses:
  '1':
  - type: heading
    content: Les premiers-nés appartiennent à l’Eternel
  - type: text
    content: 'L’Eternel transmit ses instructions à Moïse en ces termes : '
  '10':
  - type: text
    content: Vous célébrerez ce rite d’année en année au temps fixé.
  - type: heading
    content: L’offrande des premiers-nés
  '11':
  - type: text
    content: 'Quand l’Eternel vous aura fait entrer dans le pays des Cananéens, comme il vous l’a solennellement promis, à vous et à vos ancêtres, et qu’il vous l’aura donné, '
  '12':
  - type: text
    content: 'vous lui offrirez tout garçon premier-né, et les premiers-nés mâles de votre bétail lui appartiendront. '
  '13':
  - type: text
    content: En ce qui concerne les ânes
  - type: note
    content: Animaux impurs (Nb 18.15) qui ne pouvaient être offerts en sacrifice. L’importance économique des ânes justifiait leur rachat par des agneaux.
  - type: text
    content: ', vous pourrez racheter leur premier-né par un agneau ; si vous ne voulez pas le racheter, vous lui briserez la nuque. Mais vous rachèterez tout garçon premier-né parmi vos enfants. '
  '14':
  - type: text
    content: 'Lorsque vos enfants vous questionneront en vous demandant : « Que signifie cela ? » vous leur répondrez : « C’est par sa puissance que l’Eternel nous a fait sortir d’Egypte, où nous étions esclaves. '
  '15':
  - type: text
    content: 'Comme le pharaon refusait de nous laisser partir, l’Eternel a fait mourir tous les premiers-nés en Egypte, les fils aînés des hommes et les premiers-nés des animaux. Voilà pourquoi nous offrons en sacrifice à l’Eternel tous les premiers-nés mâles des animaux et nous rachetons les aînés de nos fils. » '
  '16':
  - type: text
    content: Ce rite sera pour vous comme un signe sur votre main et comme une marque sur votre front, car c’est par sa puissance que l’Eternel nous a fait sortir d’Egypte.
  - type: heading
    content: Les conditions du départ
  '17':
  - type: text
    content: Quand le pharaon eut laissé partir le peuple d’Israël, Dieu ne les conduisit pas par la route du pays des Philistins, bien qu’elle fût la plus directe
  - type: note
    content: Cette route était jalonnée de forteresses surveillées par les Egyptiens.
  - type: text
    content: ', car il s’était dit : « S’ils devaient affronter des combats, ils pourraient regretter leur départ et retourner en Egypte. » '
  '18':
  - type: text
    content: Il leur fit donc faire un détour par le chemin du désert, du côté de la mer des Roseaux
  - type: note
    content: La tradition l’identifie à la mer Rouge (voir note 14.2).
  - type: text
    content: . Les Israélites quittèrent l’Egypte, bien équipés
  - type: note
    content: 'Autre traduction : en bon ordre.'
  - type: text
    content: .
  '19':
  - type: text
    content: 'Moïse emporta les ossements de Joseph, puisque celui-ci en avait solennellement adjuré les Israélites en leur disant : « Dieu ne manquera pas d’intervenir en votre faveur, alors vous emporterez mes ossements avec vous'
  - type: note
    content: Voir Gn 50.25.
  - type: text
    content: . »
  '2':
  - type: text
    content: Consacre-moi tout premier-né qui naîtra parmi les Israélites ; qu’il s’agisse d’un garçon ou d’un animal, il m’appartient.
  - type: heading
    content: La fête des Pains sans levain
  '20':
  - type: text
    content: 'Les Israélites partirent de Soukkoth et campèrent à Etam, en bordure du désert. '
  '21':
  - type: text
    content: 'L’Eternel marchait à leur tête, le jour dans une colonne de nuée pour leur montrer le chemin, et la nuit dans une colonne de feu pour les éclairer, afin qu’ils puissent marcher de jour et de nuit. '
  '22':
  - type: text
    content: La colonne de nuée ou la colonne de feu se trouvait en permanence à la tête du peuple.
  '3':
  - type: text
    content: 'Moïse dit au peuple : Vous garderez le souvenir de ce jour où vous êtes sortis d’Egypte, du pays où vous avez été esclaves, car l’Eternel vous en a retirés par force. Vous ne mangerez pas de pain préparé à l’aide de levain. '
  '4':
  - type: text
    content: 'C’est aujourd’hui, au mois des épis, que vous partez d’Egypte. '
  '5':
  - type: text
    content: 'Lorsque l’Eternel vous aura fait entrer dans le pays des Cananéens, des Hittites, des Amoréens, des Héviens et des Yebousiens qu’il a promis par serment à vos ancêtres de vous donner, une terre ruisselant de lait et de miel, alors vous observerez cette cérémonie, en ce même mois. '
  '6':
  - type: text
    content: 'Pendant sept jours, vous mangerez des pains sans levain, et le septième jour vous célébrerez une fête en l’honneur de l’Eternel. '
  '7':
  - type: text
    content: On se nourrira de pains sans levain pendant ces sept jours et on ne trouvera chez vous ni pain levé ni levain dans tout votre territoire.
  '8':
  - type: text
    content: 'En ce jour-là, vous expliquerez à vos enfants la signification de cette fête en disant : « Tout cela je le fais en mémoire de ce que l’Eternel a fait pour moi quand je suis sorti d’Egypte. » '
  '9':
  - type: text
    content: 'Cette fête sera pour vous comme un signe sur votre main et comme une marque sur votre front pour que la Loi de l’Eternel soit l’objet de vos conversations, car c’est lui qui vous a fait sortir d’Egypte par sa puissance. '
