document_id: EXO.13,21
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Les premiers-nés appartiennent à l’Eternel
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'L’Eternel transmit ses instructions à Moïse en ces termes : '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Vous célébrerez ce rite d’année en année au temps fixé.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: L’offrande des premiers-nés
    marker-yv: yv-h
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Quand l’Eternel vous aura fait entrer dans le pays des Cananéens, comme il vous l’a solennellement promis, à vous et à vos ancêtres, et qu’il vous l’aura donné, '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'vous lui offrirez tout garçon premier-né, et les premiers-nés mâles de votre bétail lui appartiendront. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: En ce qui concerne les ânes
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '13.13 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Animaux impurs (
        - type: usfm
          marker: ref
          children:
          - type: text
            text: Nb 18.15
        - type: text
          text: ) qui ne pouvaient être offerts en sacrifice. L’importance économique des ânes justifiait leur rachat par des agneaux.
      marker-yv: yv-n
    - type: text
      text: ', vous pourrez racheter leur premier-né par un agneau ; si vous ne voulez pas le racheter, vous lui briserez la nuque. Mais vous rachèterez tout garçon premier-né parmi vos enfants. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Lorsque vos enfants vous questionneront en vous demandant : « Que signifie cela ? » vous leur répondrez : « C’est par sa puissance que l’Eternel nous a fait sortir d’Egypte, où nous étions esclaves. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Comme le pharaon refusait de nous laisser partir, l’Eternel a fait mourir tous les premiers-nés en Egypte, les fils aînés des hommes et les premiers-nés des animaux. Voilà pourquoi nous offrons en sacrifice à l’Eternel tous les premiers-nés mâles des animaux et nous rachetons les aînés de nos fils. » '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ce rite sera pour vous comme un signe sur votre main et comme une marque sur votre front, car c’est par sa puissance que l’Eternel nous a fait sortir d’Egypte.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Les conditions du départ
    marker-yv: yv-h
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Quand le pharaon eut laissé partir le peuple d’Israël, Dieu ne les conduisit pas par la route du pays des Philistins, bien qu’elle fût la plus directe
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '13.17 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Cette route était jalonnée de forteresses surveillées par les Egyptiens.
      marker-yv: yv-n
    - type: text
      text: ', car il s’était dit : « S’ils devaient affronter des combats, ils pourraient regretter leur départ et retourner en Egypte. » '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Il leur fit donc faire un détour par le chemin du désert, du côté de la mer des Roseaux
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '13.18 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'La tradition l’identifie à la mer Rouge (voir note '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: '14.2'
        - type: text
          text: ).
      marker-yv: yv-n
    - type: text
      text: . Les Israélites quittèrent l’Egypte, bien équipés
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '13.18 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Autre traduction : '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: en bon ordre.
      marker-yv: yv-n
    - type: text
      text: .
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Moïse emporta les ossements de Joseph, puisque celui-ci en avait solennellement adjuré les Israélites en leur disant : « Dieu ne manquera pas d’intervenir en votre faveur, alors vous emporterez mes ossements avec vous'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '13.19 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Voir '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: Gn 50.25
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: . »
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Consacre-moi tout premier-né qui naîtra parmi les Israélites ; qu’il s’agisse d’un garçon ou d’un animal, il m’appartient.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: La fête des Pains sans levain
    marker-yv: yv-h
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Les Israélites partirent de Soukkoth et campèrent à Etam, en bordure du désert. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'L’Eternel marchait à leur tête, le jour dans une colonne de nuée pour leur montrer le chemin, et la nuit dans une colonne de feu pour les éclairer, afin qu’ils puissent marcher de jour et de nuit. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: La colonne de nuée ou la colonne de feu se trouvait en permanence à la tête du peuple.
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Moïse dit au peuple : Vous garderez le souvenir de ce jour où vous êtes sortis d’Egypte, du pays où vous avez été esclaves, car l’Eternel vous en a retirés par force. Vous ne mangerez pas de pain préparé à l’aide de levain. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'C’est aujourd’hui, au mois des épis, que vous partez d’Egypte. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Lorsque l’Eternel vous aura fait entrer dans le pays des Cananéens, des Hittites, des Amoréens, des Héviens et des Yebousiens qu’il a promis par serment à vos ancêtres de vous donner, une terre ruisselant de lait et de miel, alors vous observerez cette cérémonie, en ce même mois. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Pendant sept jours, vous mangerez des pains sans levain, et le septième jour vous célébrerez une fête en l’honneur de l’Eternel. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: On se nourrira de pains sans levain pendant ces sept jours et on ne trouvera chez vous ni pain levé ni levain dans tout votre territoire.
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'En ce jour-là, vous expliquerez à vos enfants la signification de cette fête en disant : « Tout cela je le fais en mémoire de ce que l’Eternel a fait pour moi quand je suis sorti d’Egypte. » '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Cette fête sera pour vous comme un signe sur votre main et comme une marque sur votre front pour que la Loi de l’Eternel soit l’objet de vos conversations, car c’est lui qui vous a fait sortir d’Egypte par sa puissance. '
