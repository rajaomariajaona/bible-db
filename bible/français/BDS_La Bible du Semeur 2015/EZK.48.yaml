document_id: EZK.48
type_code: fra
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Voici les noms des tribus : Dan recevra une part qui ira de l’extrémité septentrionale le long de la route de Hetlôn à Lebo-Hamath, jusqu’à Hatsar-Enôn, le territoire de Damas étant au nord, près de Hamath, donc de la limite orientale à la limite occidentale. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Sur la frontière de Dan, de la limite orientale à la limite occidentale, Aser aura une part. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Sur la frontière d’Aser, de la limite orientale à la limite occidentale, Nephtali aura une part. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Sur la frontière de Nephtali, de la limite orientale à la limite occidentale, Manassé aura une part. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Sur la frontière de Manassé, de la limite orientale à la limite occidentale, Ephraïm aura une part. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Sur la frontière d’Ephraïm, de la limite orientale à la limite occidentale, Ruben aura une part. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Sur la frontière de Ruben, de la limite orientale à la limite occidentale, Juda aura une part.
- type: usfm
  marker: s2
  children:
  - type: text
    text: La part de Dieu
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Sur la frontière de Juda, de la limite orientale à la limite occidentale, il y aura la part que vous offrirez à l’Eternel : elle aura vingt-cinq mille coudées de large et la même longueur que les autres parts, d’est en ouest. Le sanctuaire sera en son centre. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: La part que vous prélèverez pour l’Eternel aura vingt-cinq mille coudées de long sur dix mille de large
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '48.9 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Voir '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '45.1'
        metadata:
          usfm: EZK.45.1
      - type: text
        text: ' et note.'
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Cette part sainte de territoire appartiendra aux prêtres. Elle aura vingt-cinq mille coudées au nord, dix mille en largeur à l’ouest, dix mille en largeur à l’est et vingt-cinq mille en longueur au sud. Le sanctuaire de l’Eternel s’élèvera au milieu de ce territoire. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Il appartiendra aux prêtres consacrés, descendants de Tsadoq, qui ont assuré fidèlement mon service et qui, contrairement aux lévites, n’ont pas dévié lorsque les Israélites se sont égarés. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Dans la zone prélevée sur le pays, ils auront donc un domaine réservé qui sera un lieu très saint, attenant au territoire des lévites. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Ces derniers occuperont, le long du territoire des prêtres, un territoire de vingt-cinq mille coudées de longueur sur dix mille de largeur : chaque longueur sera de vingt-cinq mille coudées et chaque largeur de dix mille coudées. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Ce domaine constitue les prémices du pays, il est propriété sainte de l’Eternel : il ne pourra donc pas être aliéné. Les lévites n’en vendront rien et n’en échangeront rien.'
- type: usfm
  marker: s2
  children:
  - type: text
    text: La part de la ville et du prince
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Quant à l’espace restant, sur cinq mille coudées en largeur, le long des vingt-cinq mille coudées, il constituera un domaine non consacré destiné à la ville, pour la zone d’habitation et ses abords. La ville elle-même en occupera le centre, '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'dans un carré de quatre mille cinq cents coudées de côté au nord, au sud, à l’est et à l’ouest. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Tout autour de la ville, sur les quatre côtés, une bande de deux cent cinquante coudées restera libre. '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Quant à la terre qui restera parallèlement au territoire consacré, en longueur, c’est-à-dire dix mille coudées à l’est et autant à l’ouest, ses productions agricoles seront destinées à la nourriture des employés de la ville. '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Ce sont les employés travaillant pour la ville, issus de toutes les tribus d’Israël, qui la cultiveront. '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: La surface totale du domaine réservé à l’Eternel sera donc un carré de vingt-cinq mille coudées de côté et vous en prélèverez pour la ville un domaine dont la surface sera égale au quart de celle de la portion de territoire sainte
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '48.20 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Autre traduction : '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'Vous prélèverez la portion de territoire sainte à côté du domaine de la ville. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Dans tous les cas, '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'la portion de territoire sainte '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: désigne l’ensemble constitué par le domaine des prêtres et celui des lévites.
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Ce qui restera de part et d’autre de la portion de territoire sainte et du domaine de la ville, le long des vingt-cinq mille coudées à l’est et à l’ouest, sera pour le prince qui aura ainsi son domaine en bordure des autres parts. Le domaine consacré et le sanctuaire du Temple seront au milieu. '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: Ainsi le prince aura en propriété tout l’espace compris entre la frontière du domaine de Juda et celle de Benjamin, la propriété des lévites et celle de la ville étant au milieu des terres du prince.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Pour ce qui est des autres tribus : Benjamin aura une part allant de la limite orientale à la limite occidentale du pays. '
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Sur la frontière de Benjamin, de la limite orientale à la limite occidentale, Siméon aura une part. '
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Sur la frontière de Siméon, de la limite orientale à la limite occidentale, Issacar aura une part. '
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Sur la frontière d’Issacar, de la limite orientale à la limite occidentale, Zabulon aura une part. '
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'Sur la frontière de Zabulon, de la limite orientale à la limite occidentale, Gad aura une part. '
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: Le territoire de Gad sera délimité du côté du sud, vers le Néguev, par une frontière allant de Tamar jusqu’aux eaux de Meriba de Qadesh, puis elle suivra le torrent d’Egypte jusqu’à la mer Méditerranée.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: Tel est le pays que vous partagerez en patrimoines par le sort pour les tribus d’Israël, telles sont leurs parts respectives, le Seigneur, l’Eternel, le déclare.
- type: usfm
  marker: s2
  children:
  - type: text
    text: Les portes de la ville sainte
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'Et voici quels seront les accès de la ville : sur chacun des murs mesurant quatre mille cinq cents coudées de long'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '48.30 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Pour les v. 30-34, voir '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ap 21.12-13
        metadata:
          usfm: REV.21.12+REV.21.13
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: ', '
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'il y aura trois portes portant le nom de trois tribus d’Israël. Du côté nord se trouveront les portes de Ruben, de Juda et de Lévi. '
  - type: usfm
    marker: v
    metadata:
      v: '32'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'Du côté est, celles de Joseph, de Benjamin et de Dan. '
  - type: usfm
    marker: v
    metadata:
      v: '33'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: 'Du côté sud, les portes de Siméon, d’Issacar et de Zabulon. '
  - type: usfm
    marker: v
    metadata:
      v: '34'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: Et du côté ouest celles de Gad, d’Aser et de Nephtali.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '35'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: 'La ville aura un périmètre total de dix-huit mille coudées. Et le nom de la ville sera désormais : L’Eternel est ici.'
