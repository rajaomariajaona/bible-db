document_id: NUM.32,21
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: L’installation de quelques tribus à l’est du Jourdain
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Les descendants de Ruben et de Gad avaient de très grands troupeaux. Ils constatèrent que les pays de Yaezer et de Galaad convenaient bien à l’élevage. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: L’Eternel s’est mis en colère ce jour-là au point qu’il fit ce serment
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '32.10 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Pour les v. 10-13, voir '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: 14.26-35
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: '  : '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '« Jamais ces hommes qui sont sortis d’Egypte et qui ont aujourd’hui vingt ans et plus ne verront la terre que j’ai promise par serment à Abraham, à Isaac et à Jacob, car ils ne m’ont pas obéi fidèlement, '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: excepté Caleb, fils de Yephounné le Qenizien
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '32.12 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'D’après '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: Gn 15.19
        - type: text
          text: ' et '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: '36.11'
        - type: text
          text: ', les Qeniziens étaient une peuplade cananéenne, descendante d’Esaü. Les ancêtres de Caleb avaient sans doute des affinités avec cette peuplade (voir '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: Jos 14.6
        - type: text
          text: ', '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: '14'
        - type: text
          text: ).
      marker-yv: yv-n
    - type: text
      text: ', et Josué, fils de Noun, qui ont fidèlement obéi à l’Eternel. »'
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'L’Eternel se mit donc en colère contre Israël, et il les fit errer dans le désert durant quarante années jusqu’à l’extinction de toute la génération qui avait mal agi envers l’Eternel. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Et maintenant, voilà que vous prenez le relais de vos pères comme une race de pécheurs, pour attiser encore davantage l’ardente colère de l’Eternel contre Israël. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Car si vous refusez de lui obéir, il vous laissera encore traîner dans ce désert et vous causerez la perte de tout ce peuple.
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '– Non, répondirent-ils à Moïse, nous construirons seulement des enclos ici pour nos troupeaux de moutons et de chèvres et des villes pour nos familles. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Quant à nous, nous nous armerons sans tarder pour marcher à la tête des Israélites, jusqu’à ce que nous les ayons fait entrer dans le territoire qui leur revient. Nos familles seules resteront dans les villes fortifiées où elles seront à l’abri des habitants du pays. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Nous ne rentrerons pas dans nos foyers avant que chacun des Israélites ait pris possession de l’héritage qui lui revient. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Mais nous ne posséderons pas de territoire de l’autre côté du Jourdain et au-delà, puisque nous aurons déjà reçu notre patrimoine foncier de ce côté-ci, à l’est du Jourdain.
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Alors ils vinrent trouver Moïse, le prêtre Eléazar et les chefs de la communauté et leur dirent : '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Moïse leur répondit : Si vous tenez parole, si vous êtes prêts à combattre en présence de l’Eternel, '
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'si tous vos guerriers passent le Jourdain devant l’Eternel jusqu’à ce qu’il ait dépossédé ses ennemis devant lui, '
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'et si vous revenez seulement lorsque le pays sera soumis devant l’Eternel, alors vous aurez satisfait à vos obligations envers lui et envers Israël, et cette région-ci vous appartiendra en pleine propriété avec l’accord de l’Eternel. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Mais si vous n’agissez pas ainsi, vous péchez contre l’Eternel. Sachez alors que les conséquences de votre péché retomberont sur vous ! '
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Construisez-vous donc des villes pour vos familles et des enclos pour vos troupeaux ; puis tenez parole !
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Les descendants de Gad et de Ruben dirent à Moïse : Tes serviteurs obéiront aux ordres de mon seigneur. '
  '26':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Nos enfants, nos femmes, nos troupeaux et tout notre bétail resteront ici dans les villes de Galaad, '
  '27':
  - type: usfm
    marker: p
    children:
    - type: text
      text: tandis que nous, tes serviteurs, tous ceux qui sont aptes à la guerre, nous passerons le Jourdain devant l’Eternel pour aller en guerre, comme mon seigneur l’a ordonné.
  '28':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Moïse donna des ordres à leur sujet au prêtre Eléazar, à Josué fils de Noun et aux chefs de tribus des Israélites
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '32.28 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Pour les v. 28-32, voir '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: Jos 1.12-15
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: '. '
  '29':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Il leur dit : Si parmi les descendants de Gad et ceux de Ruben, tous les hommes aptes à la guerre traversent avec vous le Jourdain pour aller au combat devant l’Eternel, une fois que le pays vous sera soumis, vous leur donnerez la région de Galaad en propriété. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Les villes d’Ataroth, de Dibôn, Yaezer, Nimra, Heshbôn, Elealé, Sebam, Nébo et Beôn
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '32.3 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Ces localités se trouvent toutes entre l’Arnon et le Yabboq et faisaient partie du royaume de Sihôn.
      marker-yv: yv-n
    - type: text
      text: ', '
  '30':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Mais s’ils ne passent pas, prêts à combattre avec vous, ils s’installeront au milieu de vous dans le pays de Canaan.
  '31':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Les Rubénites et les Gadites déclarèrent : Nous ferons ce que l’Eternel a ordonné à tes serviteurs. '
  '32':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Nous passerons équipés pour la bataille devant l’Eternel au pays de Canaan ; mais le territoire que nous posséderons comme patrimoine foncier se trouvera de ce côté-ci du Jourdain.
  '33':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Alors Moïse octroya aux descendants de Gad et de Ruben, ainsi qu’à la moitié de la tribu de Manassé, fils de Joseph, le royaume de Sihôn, roi des Amoréens, et celui d’Og, roi du Basan, c’est-à-dire leur pays avec leurs villes et les terres qui en dépendaient.
  '34':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Les hommes de Gad rebâtirent Dibôn, Ataroth, Aroër, '
  '35':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Atroth-Shophân, Yaezer, Yogbeha, '
  '36':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Beth-Nimra et Beth-Harân : autant de villes fortifiées avec des enclos pour les moutons et les chèvres.'
  '37':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Les Rubénites rebâtirent Heshbôn, Elealé et Qiryataïm, '
  '38':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Nébo et Baal-Meôn, dont les noms furent changés, et Sibma ; ils donnèrent de nouveaux noms aux villes qu’ils rebâtirent.
  '39':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Les descendants de Makir, fils de Manassé, envahirent le pays de Galaad
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '32.39 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Le nord de ce pays, le sud étant déjà occupé par la tribu de Gad.
      marker-yv: yv-n
    - type: text
      text: ', le conquirent et dépossédèrent les Amoréens qui s’y trouvaient. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'c’est-à-dire ce territoire que l’Eternel a soumis aux Israélites, est un pays favorable à l’élevage. Or, tes serviteurs possèdent de nombreux troupeaux. '
  '40':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Moïse leur donna le pays de Galaad et ils s’y établirent. '
  '41':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Yaïr, un autre descendant de Manassé, attaqua plusieurs villages et s’en empara ; il les appela villages de Yaïr
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '32.41 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Les villages de Yaïr se trouvent en Transjordanie, au sud du lac de Tibériade (
        - type: usfm
          marker: ref
          children:
          - type: text
            text: Jg 10.3-5
        - type: text
          text: ).
      marker-yv: yv-n
    - type: text
      text: '. '
  '42':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Nobah attaqua Qenath et s’empara des villes qui en dépendaient ; il leur donna son propre nom.
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Puis ils ajoutèrent : Si tu veux bien nous accorder une faveur, attribue à tes serviteurs la possession de ce pays et ne nous fais pas traverser le Jourdain.'
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Moïse répondit aux membres des deux tribus : Vous voulez rester ici pendant que vos compatriotes vont à la guerre ? '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Pourquoi découragez-vous les Israélites de se rendre dans le pays que l’Eternel leur donne ? '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: C’est exactement ce qu’ont fait vos ancêtres quand je les ai envoyés de Qadesh-Barnéa pour explorer le pays
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '32.8 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Pour les v. 8-9, voir '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: 13.17-33
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: '. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ils sont montés jusqu’à la vallée d’Eshkol, ils ont observé le pays et, à leur retour, ils ont découragé les Israélites d’aller dans le pays que l’Eternel leur destinait. '
