document_id: NUM.32,21
type_code: fra
verses:
  '1':
  - type: heading
    content: L’installation de quelques tribus à l’est du Jourdain
  - type: text
    content: 'Les descendants de Ruben et de Gad avaient de très grands troupeaux. Ils constatèrent que les pays de Yaezer et de Galaad convenaient bien à l’élevage. '
  '10':
  - type: text
    content: L’Eternel s’est mis en colère ce jour-là au point qu’il fit ce serment
  - type: note
    content: Pour les v. 10-13, voir 14.26-35.
  - type: text
    content: '  : '
  '11':
  - type: text
    content: '« Jamais ces hommes qui sont sortis d’Egypte et qui ont aujourd’hui vingt ans et plus ne verront la terre que j’ai promise par serment à Abraham, à Isaac et à Jacob, car ils ne m’ont pas obéi fidèlement, '
  '12':
  - type: text
    content: excepté Caleb, fils de Yephounné le Qenizien
  - type: note
    content: D’après Gn 15.19 et 36.11, les Qeniziens étaient une peuplade cananéenne, descendante d’Esaü. Les ancêtres de Caleb avaient sans doute des affinités avec cette peuplade (voir Jos 14.6, 14).
  - type: text
    content: ', et Josué, fils de Noun, qui ont fidèlement obéi à l’Eternel. »'
  '13':
  - type: text
    content: 'L’Eternel se mit donc en colère contre Israël, et il les fit errer dans le désert durant quarante années jusqu’à l’extinction de toute la génération qui avait mal agi envers l’Eternel. '
  '14':
  - type: text
    content: 'Et maintenant, voilà que vous prenez le relais de vos pères comme une race de pécheurs, pour attiser encore davantage l’ardente colère de l’Eternel contre Israël. '
  '15':
  - type: text
    content: Car si vous refusez de lui obéir, il vous laissera encore traîner dans ce désert et vous causerez la perte de tout ce peuple.
  '16':
  - type: text
    content: '– Non, répondirent-ils à Moïse, nous construirons seulement des enclos ici pour nos troupeaux de moutons et de chèvres et des villes pour nos familles. '
  '17':
  - type: text
    content: 'Quant à nous, nous nous armerons sans tarder pour marcher à la tête des Israélites, jusqu’à ce que nous les ayons fait entrer dans le territoire qui leur revient. Nos familles seules resteront dans les villes fortifiées où elles seront à l’abri des habitants du pays. '
  '18':
  - type: text
    content: 'Nous ne rentrerons pas dans nos foyers avant que chacun des Israélites ait pris possession de l’héritage qui lui revient. '
  '19':
  - type: text
    content: Mais nous ne posséderons pas de territoire de l’autre côté du Jourdain et au-delà, puisque nous aurons déjà reçu notre patrimoine foncier de ce côté-ci, à l’est du Jourdain.
  '2':
  - type: text
    content: 'Alors ils vinrent trouver Moïse, le prêtre Eléazar et les chefs de la communauté et leur dirent : '
  '20':
  - type: text
    content: 'Moïse leur répondit : Si vous tenez parole, si vous êtes prêts à combattre en présence de l’Eternel, '
  '21':
  - type: text
    content: 'si tous vos guerriers passent le Jourdain devant l’Eternel jusqu’à ce qu’il ait dépossédé ses ennemis devant lui, '
  '22':
  - type: text
    content: 'et si vous revenez seulement lorsque le pays sera soumis devant l’Eternel, alors vous aurez satisfait à vos obligations envers lui et envers Israël, et cette région-ci vous appartiendra en pleine propriété avec l’accord de l’Eternel. '
  '23':
  - type: text
    content: 'Mais si vous n’agissez pas ainsi, vous péchez contre l’Eternel. Sachez alors que les conséquences de votre péché retomberont sur vous ! '
  '24':
  - type: text
    content: Construisez-vous donc des villes pour vos familles et des enclos pour vos troupeaux ; puis tenez parole !
  '25':
  - type: text
    content: 'Les descendants de Gad et de Ruben dirent à Moïse : Tes serviteurs obéiront aux ordres de mon seigneur. '
  '26':
  - type: text
    content: 'Nos enfants, nos femmes, nos troupeaux et tout notre bétail resteront ici dans les villes de Galaad, '
  '27':
  - type: text
    content: tandis que nous, tes serviteurs, tous ceux qui sont aptes à la guerre, nous passerons le Jourdain devant l’Eternel pour aller en guerre, comme mon seigneur l’a ordonné.
  '28':
  - type: text
    content: Moïse donna des ordres à leur sujet au prêtre Eléazar, à Josué fils de Noun et aux chefs de tribus des Israélites
  - type: note
    content: Pour les v. 28-32, voir Jos 1.12-15.
  - type: text
    content: '. '
  '29':
  - type: text
    content: 'Il leur dit : Si parmi les descendants de Gad et ceux de Ruben, tous les hommes aptes à la guerre traversent avec vous le Jourdain pour aller au combat devant l’Eternel, une fois que le pays vous sera soumis, vous leur donnerez la région de Galaad en propriété. '
  '3':
  - type: text
    content: Les villes d’Ataroth, de Dibôn, Yaezer, Nimra, Heshbôn, Elealé, Sebam, Nébo et Beôn
  - type: note
    content: Ces localités se trouvent toutes entre l’Arnon et le Yabboq et faisaient partie du royaume de Sihôn.
  - type: text
    content: ', '
  '30':
  - type: text
    content: Mais s’ils ne passent pas, prêts à combattre avec vous, ils s’installeront au milieu de vous dans le pays de Canaan.
  '31':
  - type: text
    content: 'Les Rubénites et les Gadites déclarèrent : Nous ferons ce que l’Eternel a ordonné à tes serviteurs. '
  '32':
  - type: text
    content: Nous passerons équipés pour la bataille devant l’Eternel au pays de Canaan ; mais le territoire que nous posséderons comme patrimoine foncier se trouvera de ce côté-ci du Jourdain.
  '33':
  - type: text
    content: Alors Moïse octroya aux descendants de Gad et de Ruben, ainsi qu’à la moitié de la tribu de Manassé, fils de Joseph, le royaume de Sihôn, roi des Amoréens, et celui d’Og, roi du Basan, c’est-à-dire leur pays avec leurs villes et les terres qui en dépendaient.
  '34':
  - type: text
    content: 'Les hommes de Gad rebâtirent Dibôn, Ataroth, Aroër, '
  '35':
  - type: text
    content: 'Atroth-Shophân, Yaezer, Yogbeha, '
  '36':
  - type: text
    content: 'Beth-Nimra et Beth-Harân : autant de villes fortifiées avec des enclos pour les moutons et les chèvres.'
  '37':
  - type: text
    content: 'Les Rubénites rebâtirent Heshbôn, Elealé et Qiryataïm, '
  '38':
  - type: text
    content: Nébo et Baal-Meôn, dont les noms furent changés, et Sibma ; ils donnèrent de nouveaux noms aux villes qu’ils rebâtirent.
  '39':
  - type: text
    content: Les descendants de Makir, fils de Manassé, envahirent le pays de Galaad
  - type: note
    content: Le nord de ce pays, le sud étant déjà occupé par la tribu de Gad.
  - type: text
    content: ', le conquirent et dépossédèrent les Amoréens qui s’y trouvaient. '
  '4':
  - type: text
    content: 'c’est-à-dire ce territoire que l’Eternel a soumis aux Israélites, est un pays favorable à l’élevage. Or, tes serviteurs possèdent de nombreux troupeaux. '
  '40':
  - type: text
    content: 'Moïse leur donna le pays de Galaad et ils s’y établirent. '
  '41':
  - type: text
    content: Yaïr, un autre descendant de Manassé, attaqua plusieurs villages et s’en empara ; il les appela villages de Yaïr
  - type: note
    content: Les villages de Yaïr se trouvent en Transjordanie, au sud du lac de Tibériade (Jg 10.3-5).
  - type: text
    content: '. '
  '42':
  - type: text
    content: Nobah attaqua Qenath et s’empara des villes qui en dépendaient ; il leur donna son propre nom.
  '5':
  - type: text
    content: 'Puis ils ajoutèrent : Si tu veux bien nous accorder une faveur, attribue à tes serviteurs la possession de ce pays et ne nous fais pas traverser le Jourdain.'
  '6':
  - type: text
    content: 'Moïse répondit aux membres des deux tribus : Vous voulez rester ici pendant que vos compatriotes vont à la guerre ? '
  '7':
  - type: text
    content: 'Pourquoi découragez-vous les Israélites de se rendre dans le pays que l’Eternel leur donne ? '
  '8':
  - type: text
    content: C’est exactement ce qu’ont fait vos ancêtres quand je les ai envoyés de Qadesh-Barnéa pour explorer le pays
  - type: note
    content: Pour les v. 8-9, voir 13.17-33.
  - type: text
    content: '. '
  '9':
  - type: text
    content: 'Ils sont montés jusqu’à la vallée d’Eshkol, ils ont observé le pays et, à leur retour, ils ont découragé les Israélites d’aller dans le pays que l’Eternel leur destinait. '
