document_id: JER.48,21
type_code: fra
verses:
  '1':
  - type: heading
    content: Contre Moab
  - type: text
    content: Prophéties concernant Moab.
  - type: text
    content: 'Voici ce que déclare ╵le Seigneur des armées célestes, ╵Dieu d’Israël :'
  - type: text
    content: Quel malheur pour Nébo
  - type: note
    content: Les différentes villes citées faisaient partie de Moab à l’époque de Jérémie.
  - type: text
    content: ', ╵car elle est dévastée !'
  - type: text
    content: Qiryataïm est dans la honte, ╵car elle est prise.
  - type: text
    content: Recouverte de honte, ╵la citadelle est terrifiée.
  '10':
  - type: text
    content: Maudit celui qui fait ╵l’œuvre de l’Eternel ╵sans y mettre son cœur !
  - type: text
    content: Maudit soit qui refuse ╵le sang à son épée !
  '11':
  - type: text
    content: Moab, dès son jeune âge, ╵vivait dans la quiétude
  - type: text
    content: et il s’est reposé ╵comme un vin sur sa lie,
  - type: text
    content: 'n’ayant jamais été ╵versé d’un vase dans un autre :'
  - type: text
    content: il n’avait jamais pris ╵le chemin de l’exil.
  - type: text
    content: Aussi a-t-il gardé ╵son goût particulier,
  - type: text
    content: et son odeur première ╵n’a-t-elle pas changé.
  '12':
  - type: text
    content: Mais le temps va venir,
  - type: text
    content: l’Eternel le déclare,
  - type: text
    content: 'où je lui enverrai ╵des tonneliers ╵qui le transvaseront :'
  - type: text
    content: ils videront ses cruches
  - type: text
    content: et briseront ses jarres.
  '13':
  - type: text
    content: Alors Moab, honteux, ╵rougira de Kemosh
  - type: text
    content: comme le peuple d’Israël
  - type: text
    content: a rougi de Béthel
  - type: note
    content: Béthel où Jéroboam avait installé un veau d’or (1 R 12.28-30).
  - type: text
    content: ' ╵en qui il se confiait.'
  '14':
  - type: text
    content: 'Comment osez-vous dire :'
  - type: text
    content: « Nous sommes des guerriers,
  - type: text
    content: des soldats aguerris ╵pour le combat » ?
  '15':
  - type: text
    content: Le dévastateur de Moab
  - type: text
    content: vient attaquer ses villes
  - type: note
    content: 'Autre traduction : Moab est détruite, ses villes sont investies.'
  - type: text
    content: ','
  - type: text
    content: la fleur de sa jeunesse ╵va tout droit au massacre,
  - type: text
    content: 'c’est là ce que déclare ╵le Roi qui a pour nom : ╵le Seigneur des armées célestes.'
  '16':
  - type: text
    content: La ruine de Moab ╵est tout près d’arriver,
  - type: text
    content: le malheur fond sur lui, ╵précipitant ses pas.
  '17':
  - type: text
    content: Faites-lui vos condoléances,
  - type: text
    content: vous qui êtes autour de lui,
  - type: text
    content: et vous qui connaissez ╵sa renommée !
  - type: text
    content: 'Dites : « Ah ! Comme il est brisé, ╵ce bâton si puissant,'
  - type: text
    content: ce sceptre si glorieux ! »
  '18':
  - type: text
    content: Descends de ta splendeur,
  - type: text
    content: va habiter un lieu aride
  - type: note
    content: 'un lieu aride: selon le texte hébreu traditionnel. L’ancienne version grecque a : dans les ordures. Dibôn était connu pour ses sources abondantes.'
  - type: text
    content: ','
  - type: text
    content: ô population de Dibôn,
  - type: text
    content: le dévastateur de Moab ╵vient t’attaquer
  - type: text
    content: et il détruit tes forteresses.
  '19':
  - type: text
    content: Tiens-toi sur le chemin, ╵et fais le guet,
  - type: text
    content: habitant d’Aroër,
  - type: text
    content: questionne le fuyard ╵et celle qui se sauve.
  - type: text
    content: 'Dis : « Qu’est-il arrivé ? »'
  '2':
  - type: text
    content: Plus de louange pour Moab !
  - type: text
    content: A Heshbôn
  - type: note
    content: En hébreu, le nom de Heshbôn fait assonance avec le verbe rendu par méditer et le nom Madmen avec le verbe traduit par réduire au silence.
  - type: text
    content: ', on médite ╵des plans pour son malheur :'
  - type: text
    content: « Allons, rayons Moab ╵du nombre des nations ! »
  - type: text
    content: 'Et toi aussi, Madmen, ╵tu seras réduite au silence :'
  - type: text
    content: l’épée te poursuivra.
  '20':
  - type: text
    content: Moab est dans la honte ╵car il est renversé !
  - type: text
    content: Lamentez-vous, criez !
  - type: text
    content: 'Annoncez sur l’Arnon :'
  - type: text
    content: Moab est dévasté !
  '21':
  - type: text
    content: 'Oui, le châtiment frappe ╵le pays du plateau :'
  - type: text
    content: Holôn, Yahats et Méphaath,
  '22':
  - type: text
    content: Dibôn, Nébo, ╵et Beth-Diblataïm,
  '23':
  - type: text
    content: Qiryataïm et Beth-Gamoul, ╵ainsi que Beth-Meôn,
  '24':
  - type: text
    content: Qeriyoth et Botsra
  - type: text
    content: de même que toutes les villes ╵du pays de Moab,
  - type: text
    content: qu’elles soient au près ou au loin.
  '25':
  - type: text
    content: La force de Moab ╵a été abattue,
  - type: text
    content: sa puissance est brisée,
  - type: text
    content: l’Eternel le déclare.
  '26':
  - type: text
    content: Enivrez-le
  - type: note
    content: Voir 25.15-29.
  - type: text
    content: car il s’est fait plus grand ╵que l’Eternel !
  - type: text
    content: Le voilà qui se vautre ╵dans ses vomissements !
  - type: text
    content: A son tour, qu’il devienne ╵un objet de risée !
  '27':
  - type: text
    content: 'Il est vrai : Israël ╵est devenu pour toi ╵objet de raillerie ;'
  - type: text
    content: a-t-il été surpris ╵au milieu des voleurs
  - type: text
    content: pour qu’à chaque occasion ╵où tu parles de lui, ╵tu te moques de lui ?
  '28':
  - type: text
    content: Habitants de Moab,
  - type: text
    content: abandonnez les villes
  - type: text
    content: et allez demeurer ╵au milieu des rochers !
  - type: text
    content: Imitez la colombe
  - type: text
    content: qui va poser son nid ╵au bord des précipices !
  '29':
  - type: text
    content: Nous avons entendu parler ╵de l’orgueil de Moab,
  - type: text
    content: il est orgueilleux à l’extrême ╵et quel esprit de supériorité !
  - type: text
    content: Quelle fierté ! ╵Quelle arrogance !
  - type: text
    content: Quel cœur altier
  - type: note
    content: Les v. 29-33 reprennent Es 16.6-10.
  - type: text
    content: '  !'
  '3':
  - type: text
    content: 'Des cris se font entendre ╵depuis Horonaïm :'
  - type: text
    content: c’est la dévastation ╵et une grande ruine.
  '30':
  - type: text
    content: Je connais bien,
  - type: text
    content: déclare l’Eternel,
  - type: text
    content: toute son arrogance,
  - type: text
    content: et ce dont il se vante ╵il ne l’accomplit pas.
  '31':
  - type: text
    content: Voilà pourquoi je me lamente ╵à cause de Moab,
  - type: text
    content: je crie pour Moab tout entier,
  - type: text
    content: et, pour les gens de Qir-Hérès, ╵je pousse des gémissements.
  '32':
  - type: text
    content: Comme Yaezer pleure, ╵je pleurerai sur toi ╵ô vigne de Sibma ;
  - type: text
    content: tes sarments s’étendaient ╵au-delà de la mer,
  - type: text
    content: et certains atteignaient ╵[la mer de
  - type: note
    content: Les mots entre crochets manquent dans deux manuscrits hébreux (voir Es 16.8).
  - type: text
    content: '] Yaezer.'
  - type: text
    content: Mais le dévastateur ╵s’est jeté sur tes fruits d’été ╵et pille ta vendange.
  '33':
  - type: text
    content: La joie et l’allégresse ╵ont disparu ╵des vergers de Moab
  - type: text
    content: et du pays entier.
  - type: text
    content: Je taris le vin dans les cuves,
  - type: text
    content: on ne foule plus la vendange ╵avec des cris de joie.
  - type: text
    content: C’en est fini ╵des cris de joie !
  '34':
  - type: text
    content: On entend les cris de Heshbôn ╵jusqu’à Elealé,
  - type: text
    content: leur voix s’entend jusqu’à Yahats,
  - type: text
    content: de Tsoar à Horonaïm
  - type: text
    content: et jusqu’à Eglath-Shelishiya.
  - type: text
    content: Les eaux de Nimrim elles-mêmes ╵ont cessé de couler
  - type: note
    content: 'Heshbôn et Elealé: villes à la frontière nord du pays (voir Nb 21.26) à une trentaine de kilomètres au nord de la mer Morte. Yahats: à l’est, aux confins du désert. Tsoar: ville probablement située près de la rive sud de la mer Morte. L’oasis de Nimrim: à une quinzaine de kilomètres au sud-est de la mer Morte.'
  - type: text
    content: .
  '35':
  - type: text
    content: Je ferai disparaître, ╵du pays de Moab,
  - type: text
    content: ceux qui offrent des holocaustes ╵sur les hauts lieux
  - type: text
    content: et ceux qui offrent ╵des parfums à ses dieux,
  - type: text
    content: l’Eternel le déclare.
  '36':
  - type: text
    content: Aussi mon cœur gémit ╵au sujet de Moab ╵comme gémit la flûte,
  - type: text
    content: oh, oui, mon cœur gémit ╵comme gémit la flûte ╵sur ceux de Qir-Hérès,
  - type: text
    content: car ils ont perdu tous les biens ╵qu’ils avaient amassés.
  '37':
  - type: text
    content: Ils ont tous la tête rasée
  - type: text
    content: et la barbe coupée,
  - type: text
    content: et les mains tailladées,
  - type: text
    content: les reins couverts ╵d’un habit de toile de sac
  - type: note
    content: Marques de deuil.
  - type: text
    content: .
  '38':
  - type: text
    content: Et sur tous les toits en terrasse ╵du pays de Moab ╵et sur toutes ses places,
  - type: text
    content: ce ne sont que lamentations,
  - type: text
    content: car j’ai brisé Moab ╵comme l’on brise un vase ╵qui ne plaît pas,
  - type: text
    content: l’Eternel le déclare.
  '39':
  - type: text
    content: Comme il s’est effondré ! ╵Hurlez !
  - type: text
    content: Moab a tourné le dos, tout honteux,
  - type: text
    content: et il est devenu ╵la risée et l’effroi
  - type: text
    content: de tous ceux qui l’entourent.
  '4':
  - type: text
    content: Voilà que Moab est brisé,
  - type: text
    content: et l’on entend les cris ╵de ses petits
  - type: note
    content: 'de ses petits: selon le texte hébreu traditionnel. L’ancienne version grecque a : jusqu’à Tsoar (voir Es 15.5).'
  - type: text
    content: .
  '40':
  - type: text
    content: 'Car voici ce que l’Eternel déclare :'
  - type: text
    content: Ce sera comme un aigle
  - type: text
    content: qui fond vers lui et qui étend ses ailes ╵au-dessus de Moab
  - type: note
    content: Pour les v. 40-41, voir 49.22.
  - type: text
    content: .
  '41':
  - type: text
    content: Qeriyoth est prise,
  - type: text
    content: les lieux forts sont conquis,
  - type: text
    content: et le cœur des guerriers ╵de Moab, ce jour-là,
  - type: text
    content: sera semblable au cœur ╵d’une femme en travail.
  '42':
  - type: text
    content: Voilà Moab exterminé, ╵il cesse d’être un peuple
  - type: text
    content: car il s’est fait plus grand que l’Eternel.
  '43':
  - type: text
    content: L’effroi, la fosse et le filet
  - type: text
    content: vous atteindront, ╵habitants de Moab,
  - type: text
    content: l’Eternel le déclare
  - type: note
    content: Les v. 43-44 reprennent Es 24.17-18.
  - type: text
    content: .
  '44':
  - type: text
    content: Qui s’enfuira devant l’effroi
  - type: text
    content: tombera dans la fosse,
  - type: text
    content: qui remontera de la fosse
  - type: text
    content: sera pris au filet ;
  - type: text
    content: car je ferai venir ╵sur lui, oui, sur Moab,
  - type: text
    content: l’année du châtiment,
  - type: text
    content: l’Eternel le déclare.
  '45':
  - type: text
    content: A l’ombre de Heshbôn,
  - type: text
    content: s’arrêtent des fuyards sans force
  - type: text
    content: parce qu’un feu ╵est sorti de Heshbôn,
  - type: text
    content: une flamme a jailli ╵du milieu de Sihôn
  - type: note
    content: Sur Sihôn, voir Dt 2.26.
  - type: text
    content: et elle a consumé ╵les tempes de Moab
  - type: text
    content: et le crâne des tapageurs
  - type: note
    content: Les v. 45-46 reprennent Nb 21.28-29.
  - type: text
    content: .
  '46':
  - type: text
    content: Malheur à toi, Moab !
  - type: text
    content: Car il périt, ╵le peuple de Kemosh,
  - type: text
    content: ses fils sont emmenés captifs,
  - type: text
    content: ses filles en exil.
  '47':
  - type: text
    content: Mais je ramènerai ╵les captifs de Moab
  - type: text
    content: dans l’avenir,
  - type: text
    content: l’Eternel le déclare.
  - type: text
    content: Ici prend fin le jugement ╵prononcé sur Moab.
  '5':
  - type: text
    content: On gravit en pleurant ╵la montée de Louhith.
  - type: text
    content: En descendant la pente ╵d’Horonaïm,
  - type: text
    content: on entend des cris de détresse, ╵à cause de la destruction.
  '6':
  - type: text
    content: Fuyez ! Sauve qui peut !
  - type: text
    content: Courez comme l’onagre
  - type: note
    content: 'l’onagre: selon l’ancienne version grecque. Le texte hébreu traditionnel a : Aroër.'
  - type: text
    content: ' ╵à travers le désert !'
  '7':
  - type: text
    content: Tu as mis ta confiance,
  - type: text
    content: Moab, dans tes richesses, ╵et dans tes réalisations.
  - type: text
    content: Et bien, toi aussi tu seras conquis.
  - type: text
    content: Le dieu Kemosh
  - type: note
    content: 'Kemosh: divinité principale des Moabites (voir 1 R 11.7, 33 ; 2 R 23.13).'
  - type: text
    content: ' ╵s’en ira en exil,'
  - type: text
    content: avec ses prêtres et ses princes,
  '8':
  - type: text
    content: et le dévastateur ╵fondra sur chaque ville ;
  - type: text
    content: non, aucune cité ╵ne sera épargnée.
  - type: text
    content: La vallée est ruinée, ╵le plateau ravagé
  - type: note
    content: Il s’agit de la vallée de l’Arnon et du plateau de Moab au nord de la vallée constituant la région principale du pays.
  - type: text
    content: ','
  - type: text
    content: c’est ce que l’Eternel a dit.
  '9':
  - type: text
    content: Répandez du sel sur Moab
  - type: note
    content: 'Selon le texte hébreu traditionnel. L’ancienne version grecque a : lancez un signal pour Moab.'
  - type: text
    content: car il sera détruit,
  - type: text
    content: ses villes seront dévastées
  - type: text
    content: et privées d’habitants.
