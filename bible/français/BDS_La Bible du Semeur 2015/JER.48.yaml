document_id: JER.48
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Contre Moab
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Prophéties concernant Moab.
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Voici ce que déclare ╵le Seigneur des armées célestes, ╵Dieu d’Israël :'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Quel malheur pour Nébo
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '48.1 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Les différentes villes citées faisaient partie de Moab à l’époque de Jérémie.
    marker-yv: yv-n
  - type: text
    text: ', ╵car elle est dévastée !'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Qiryataïm est dans la honte, ╵car elle est prise.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Recouverte de honte, ╵la citadelle est terrifiée.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Plus de louange pour Moab !
- type: usfm
  marker: q1
  children:
  - type: text
    text: A Heshbôn
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '48.2 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'En hébreu, le nom de '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'Heshbôn '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'fait assonance avec le verbe rendu par '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'méditer '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'et le nom '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'Madmen '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'avec le verbe traduit par '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: réduire au silence.
    marker-yv: yv-n
  - type: text
    text: ', on médite ╵des plans pour son malheur :'
- type: usfm
  marker: q1
  children:
  - type: text
    text: « Allons, rayons Moab ╵du nombre des nations ! »
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Et toi aussi, Madmen, ╵tu seras réduite au silence :'
- type: usfm
  marker: q1
  children:
  - type: text
    text: l’épée te poursuivra.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Des cris se font entendre ╵depuis Horonaïm :'
- type: usfm
  marker: q1
  children:
  - type: text
    text: c’est la dévastation ╵et une grande ruine.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Voilà que Moab est brisé,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et l’on entend les cris ╵de ses petits
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '48.4 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: de ses petits
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: ': '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'selon le texte hébreu traditionnel. L’ancienne version grecque a : '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'jusqu’à Tsoar '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '(voir '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Es 15.5
        metadata:
          usfm: ISA.15.5
      - type: text
        text: ).
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: On gravit en pleurant ╵la montée de Louhith.
- type: usfm
  marker: q1
  children:
  - type: text
    text: En descendant la pente ╵d’Horonaïm,
- type: usfm
  marker: q1
  children:
  - type: text
    text: on entend des cris de détresse, ╵à cause de la destruction.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Fuyez ! Sauve qui peut !
- type: usfm
  marker: q1
  children:
  - type: text
    text: Courez comme l’onagre
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '48.6 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: l’onagre
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: ': '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'selon l’ancienne version grecque. Le texte hébreu traditionnel a : '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: Aroër.
    marker-yv: yv-n
  - type: text
    text: ' ╵à travers le désert !'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Tu as mis ta confiance,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Moab, dans tes richesses, ╵et dans tes réalisations.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et bien, toi aussi tu seras conquis.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Le dieu Kemosh
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '48.7 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: Kemosh
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: ': '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: divinité principale des Moabites (voir 1 R 11.7, 33 ; 2 R 23.13).
    marker-yv: yv-n
  - type: text
    text: ' ╵s’en ira en exil,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: avec ses prêtres et ses princes,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: et le dévastateur ╵fondra sur chaque ville ;
- type: usfm
  marker: q1
  children:
  - type: text
    text: non, aucune cité ╵ne sera épargnée.
- type: usfm
  marker: q1
  children:
  - type: text
    text: La vallée est ruinée, ╵le plateau ravagé
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '48.8 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Il s’agit de la vallée de l’Arnon et du plateau de Moab au nord de la vallée constituant la région principale du pays.
    marker-yv: yv-n
  - type: text
    text: ','
- type: usfm
  marker: q1
  children:
  - type: text
    text: c’est ce que l’Eternel a dit.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Répandez du sel sur Moab
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '48.9 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Selon le texte hébreu traditionnel. L’ancienne version grecque a : '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: lancez un signal pour Moab.
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: text
    text: car il sera détruit,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ses villes seront dévastées
- type: usfm
  marker: q1
  children:
  - type: text
    text: et privées d’habitants.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Maudit celui qui fait ╵l’œuvre de l’Eternel ╵sans y mettre son cœur !
- type: usfm
  marker: q1
  children:
  - type: text
    text: Maudit soit qui refuse ╵le sang à son épée !
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Moab, dès son jeune âge, ╵vivait dans la quiétude
- type: usfm
  marker: q1
  children:
  - type: text
    text: et il s’est reposé ╵comme un vin sur sa lie,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'n’ayant jamais été ╵versé d’un vase dans un autre :'
- type: usfm
  marker: q1
  children:
  - type: text
    text: il n’avait jamais pris ╵le chemin de l’exil.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Aussi a-t-il gardé ╵son goût particulier,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et son odeur première ╵n’a-t-elle pas changé.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Mais le temps va venir,
- type: usfm
  marker: q1
  children:
  - type: text
    text: l’Eternel le déclare,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'où je lui enverrai ╵des tonneliers ╵qui le transvaseront :'
- type: usfm
  marker: q1
  children:
  - type: text
    text: ils videront ses cruches
- type: usfm
  marker: q1
  children:
  - type: text
    text: et briseront ses jarres.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Alors Moab, honteux, ╵rougira de Kemosh
- type: usfm
  marker: q1
  children:
  - type: text
    text: comme le peuple d’Israël
- type: usfm
  marker: q1
  children:
  - type: text
    text: a rougi de Béthel
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '48.13 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Béthel '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: où Jéroboam avait installé un veau d’or (
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1 R 12.28-30
        metadata:
          usfm: 1KI.12.28+1KI.12.29+1KI.12.30
      - type: text
        text: ).
    marker-yv: yv-n
  - type: text
    text: ' ╵en qui il se confiait.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Comment osez-vous dire :'
- type: usfm
  marker: q1
  children:
  - type: text
    text: « Nous sommes des guerriers,
- type: usfm
  marker: q1
  children:
  - type: text
    text: des soldats aguerris ╵pour le combat » ?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Le dévastateur de Moab
- type: usfm
  marker: q1
  children:
  - type: text
    text: vient attaquer ses villes
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '48.15 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Autre traduction : '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: Moab est détruite, ses villes sont investies.
    marker-yv: yv-n
  - type: text
    text: ','
- type: usfm
  marker: q1
  children:
  - type: text
    text: la fleur de sa jeunesse ╵va tout droit au massacre,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'c’est là ce que déclare ╵le Roi qui a pour nom : ╵le Seigneur des armées célestes.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: La ruine de Moab ╵est tout près d’arriver,
- type: usfm
  marker: q1
  children:
  - type: text
    text: le malheur fond sur lui, ╵précipitant ses pas.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Faites-lui vos condoléances,
- type: usfm
  marker: q1
  children:
  - type: text
    text: vous qui êtes autour de lui,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et vous qui connaissez ╵sa renommée !
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Dites : « Ah ! Comme il est brisé, ╵ce bâton si puissant,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: ce sceptre si glorieux ! »
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Descends de ta splendeur,
- type: usfm
  marker: q1
  children:
  - type: text
    text: va habiter un lieu aride
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '48.18 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: un lieu aride
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: ': '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'selon le texte hébreu traditionnel. L’ancienne version grecque a : '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'dans les ordures. Dibôn '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: était connu pour ses sources abondantes.
    marker-yv: yv-n
  - type: text
    text: ','
- type: usfm
  marker: q1
  children:
  - type: text
    text: ô population de Dibôn,
- type: usfm
  marker: q1
  children:
  - type: text
    text: le dévastateur de Moab ╵vient t’attaquer
- type: usfm
  marker: q1
  children:
  - type: text
    text: et il détruit tes forteresses.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Tiens-toi sur le chemin, ╵et fais le guet,
- type: usfm
  marker: q1
  children:
  - type: text
    text: habitant d’Aroër,
- type: usfm
  marker: q1
  children:
  - type: text
    text: questionne le fuyard ╵et celle qui se sauve.
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Dis : « Qu’est-il arrivé ? »'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Moab est dans la honte ╵car il est renversé !
- type: usfm
  marker: q1
  children:
  - type: text
    text: Lamentez-vous, criez !
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Annoncez sur l’Arnon :'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Moab est dévasté !
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Oui, le châtiment frappe ╵le pays du plateau :'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Holôn, Yahats et Méphaath,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: Dibôn, Nébo, ╵et Beth-Diblataïm,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: Qiryataïm et Beth-Gamoul, ╵ainsi que Beth-Meôn,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: Qeriyoth et Botsra
- type: usfm
  marker: q1
  children:
  - type: text
    text: de même que toutes les villes ╵du pays de Moab,
- type: usfm
  marker: q1
  children:
  - type: text
    text: qu’elles soient au près ou au loin.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: La force de Moab ╵a été abattue,
- type: usfm
  marker: q1
  children:
  - type: text
    text: sa puissance est brisée,
- type: usfm
  marker: q1
  children:
  - type: text
    text: l’Eternel le déclare.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: Enivrez-le
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '48.26 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Voir '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 25.15-29
        metadata:
          usfm: JER.25.15+JER.25.16+JER.25.17+JER.25.18+JER.25.19+JER.25.20+JER.25.21+JER.25.22+JER.25.23+JER.25.24+JER.25.25+JER.25.26+JER.25.27+JER.25.28+JER.25.29
      - type: text
        text: .
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: text
    text: car il s’est fait plus grand ╵que l’Eternel !
- type: usfm
  marker: q1
  children:
  - type: text
    text: Le voilà qui se vautre ╵dans ses vomissements !
- type: usfm
  marker: q1
  children:
  - type: text
    text: A son tour, qu’il devienne ╵un objet de risée !
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'Il est vrai : Israël ╵est devenu pour toi ╵objet de raillerie ;'
- type: usfm
  marker: q1
  children:
  - type: text
    text: a-t-il été surpris ╵au milieu des voleurs
- type: usfm
  marker: q1
  children:
  - type: text
    text: pour qu’à chaque occasion ╵où tu parles de lui, ╵tu te moques de lui ?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: Habitants de Moab,
- type: usfm
  marker: q1
  children:
  - type: text
    text: abandonnez les villes
- type: usfm
  marker: q1
  children:
  - type: text
    text: et allez demeurer ╵au milieu des rochers !
- type: usfm
  marker: q1
  children:
  - type: text
    text: Imitez la colombe
- type: usfm
  marker: q1
  children:
  - type: text
