document_id: DAN.11
type_code: fra
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Moi, de mon côté, je me suis tenu auprès de lui, dans la première année de Darius le Mède
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '11.1 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Voir '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '6.1'
        metadata:
          usfm: DAN.6.1
      - type: text
        text: ' et note.'
    marker-yv: yv-n
  - type: text
    text: ', pour le soutenir et l’appuyer.'
- type: usfm
  marker: s2
  children:
  - type: text
    text: La guerre des rois
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Maintenant donc, je vais te faire connaître la vérité : Voici : il y aura encore trois rois de Perse'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '11.2 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Certainement Cambyse (530 à 522 av. J.-C.), Pseudo-Smerdis, ou Gaumata (522 av. J.-C.) et Darius I
      - type: usfm
        marker: ord
        children:
        - type: text
          text: er
      - type: text
        text: ' (522 à 486 av. J.-C.).'
    marker-yv: yv-n
  - type: text
    text: . Ils seront suivis d’un quatrième qui amassera plus de richesses que tous ses prédécesseurs. Lorsqu’il sera au faîte de sa puissance, grâce à sa richesse, il soulèvera tout le monde contre le royaume de Grèce
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '11.2 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Xerxès I
      - type: usfm
        marker: ord
        children:
        - type: text
          text: er
      - type: text
        text: ' (486 à 465 av. J.-C.) qui a cherché à conquérir la Grèce en 480.'
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Mais là-bas s’élèvera un roi valeureux qui étendra sa domination sur un vaste empire et fera ce qu’il voudra
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '11.3 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Alexandre le Grand.
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Mais à peine aura-t-il assis son pouvoir, que son royaume sera brisé et partagé aux quatre coins de l’horizon ; il ne reviendra pas à ses descendants, mais il lui sera arraché et réparti entre d’autres qu’eux, et il n’aura pas la même puissance
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '11.4 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Voir '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '8.8'
        metadata:
          usfm: DAN.8.8
      - type: text
        text: ' et note.'
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Le roi du Midi s’affermira
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '11.5 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'C’est-à-dire l’Egypte, située au sud du pays d’Israël. Le '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'roi '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: est Ptolémée I
      - type: usfm
        marker: ord
        children:
        - type: text
          text: er
      - type: text
        text: ' (323 à 285 av. J.-C.), fils du fondateur de la dynastie des Ptolémées.'
    marker-yv: yv-n
  - type: text
    text: ', mais l’un des chefs de son royaume deviendra encore plus fort que lui'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '11.5 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Séleucus surnommé Nicator (311 à 280 av. J.-C.), d’abord lieutenant de Ptolémée, qui fondera l’empire des Séleucides en Syrie (au nord du pays d’Israël, v. 6).
    marker-yv: yv-n
  - type: text
    text: '  : il exercera une domination plus grande que la sienne. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Quelques années plus tard, ils s’allieront l’un avec l’autre, et la fille du roi du Midi se rendra auprès du roi du Nord pour établir des accords. Elle ne conservera pas sa force et sa postérité ne subsistera pas. Elle sera livrée à la mort avec ceux qui l’avaient amenée, de même que son père et celui qui l’avait soutenue pendant quelque temps
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '11.6 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Mariage, vers 250 av. J.-C., de Bérénice, fille du roi d’Egypte Ptolémée II Philadelphe (285 à 246 av. J.-C.) avec le roi de Syrie Antiochus II (261 à 246 av. J.-C.) qui dut répudier sa femme Laodicée. A la mort de Ptolémée Philadelphe, Antiochus répudia Bérénice et reprit Laodicée. Celle-ci se vengea de sa disgrâce en empoisonnant son mari et en faisant mourir Bérénice et son fils.
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Mais un membre de sa famille se lèvera et prendra la place de son père. Il marchera contre l’armée du roi du Nord, investira sa forteresse, l’attaquera et remportera la victoire
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '11.7 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Ptolémée III Evergète (246 à 221 av. J.-C.), frère de Bérénice, marcha contre Séleucus II Callinicus (246 à 226 av. J.-C.), fils d’Antiochus II, pour venger sa sœur. Il fit mourir Laodicée et s’empara d’une grande partie de la Syrie et de la Cilicie.
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Il emportera même comme butin en Egypte leurs idoles et leurs statues de métal fondu avec leurs objets précieux d’or et d’argent consacrés à ces divinités.
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Pendant quelques années, il se tiendra loin du roi du Nord. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Par la suite, celui-ci envahira le royaume du roi du Midi, puis il retournera dans son pays.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Ses fils partiront en guerre et mobiliseront une armée très nombreuse qui submergera tout sur son passage, ils inonderont le pays. Sur le chemin du retour, ils attaqueront la forteresse
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '11.10 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Séleucus III (226 à 223 av. J.-C.) et Antiochus III (223 à 187 av. J.-C.), fils de Séleucus II. Après avoir envahi la Phénicie et le pays d’Israël, Antiochus s’avança jusqu’à la forteresse de Raphia sur la frontière de l’Egypte.
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: C’est alors que le roi du Midi, exaspéré, lancera une offensive contre le roi du Nord, il mettra sur pied une grande armée et il aura la victoire sur les troupes adverses
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '11.11 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Victoire de Ptolémée IV Philator (221 à 203 av. J.-C.) sur Antiochus III à la bataille de Raphia (en 217 av. J.-C.).
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Une fois ces troupes vaincues, il s’enorgueillira et fera tomber des milliers d’hommes, mais ses triomphes seront de courte durée. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Car le roi du Nord reviendra en mobilisant de nouveau des troupes, plus nombreuses que les premières, et, après quelques années, il retournera en Egypte avec une immense armée et beaucoup de matériel de guerre
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '11.13 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Quatorze ans après la bataille de Raphia, Antiochus III revint avec des forces considérables et reconquit les provinces perdues.
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: A ce moment-là, beaucoup se soulèveront contre le roi du Midi
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '11.14 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Des soulèvements éclatèrent dans tous les pays soumis à l’Egypte, entre autres en Judée.
    marker-yv: yv-n
  - type: text
    text: ', des hommes violents de ton peuple, Daniel, se soulèveront contre lui pour réaliser la prophétie, mais ils échoueront.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Le roi du Nord viendra donc, il dressera des remblais de siège contre une ville fortifiée
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '11.15 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: La ville de Sidon où s’était réfugié le général égyptien Scopas et qui fut obligée de se rendre.
    marker-yv: yv-n
  - type: text
    text: ' et s’en emparera. Les armées du roi du Midi ne résisteront pas au choc, même sa troupe d’élite n’aura pas la force de tenir devant lui. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: L’envahisseur avancera à sa guise et personne ne pourra lui résister. Il prendra ensuite position dans le Pays magnifique
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '11.16 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: le Pays magnifique
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: ': '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: celui d’Israël (cp. 8.9 ; 11.41).
    marker-yv: yv-n
  - type: text
    text: ' où il sèmera la destruction. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Il entreprendra alors de venir avec toutes les forces de son royaume et il conclura une alliance avec le roi du Midi. Il lui donnera sa fille en mariage dans le but de détruire son royaume, mais ce plan ne réussira pas et ce royaume ne lui appartiendra pas
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '11.17 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: En 194 av. J.-C., Antiochus conclut la paix avec l’Egypte à la condition que le jeune Ptolémée V (203 à 181 av. J.-C.) épouse sa fille Cléopâtre qui lui apporta le pays d’Israël en dot. Il voulait ainsi se rendre maître de l’Egypte par la ruse. Mais Cléopâtre prit parti pour son mari contre son père, faisant ainsi échouer le plan de ce dernier.
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Alors il se tournera du côté des îles et s’emparera de beaucoup d’entre elles
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '11.18 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Il conquit plusieurs îles de la mer Egée (Rhodes, Samos) alliées aux Romains et traversa l’Hellespont sans se laisser arrêter par les avertissements des représentants de Rome qu’il injuria.
    marker-yv: yv-n
  - type: text
    text: ', mais un général mettra un terme à son arrogance injurieuse sans que le roi du Nord puisse le lui rendre. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Ensuite, il reviendra s’occuper des citadelles de son propre pays, mais il trébuchera et tombera, et c’en sera fait de lui
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '11.19 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Victoire du général romain Scipion l’Asiatique sur Antiochus III à Magnésie en 190 av. J.-C.
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Son successeur enverra un exacteur dans le lieu
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '11.20 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: C’est-à-dire le pays d’Israël.
    marker-yv: yv-n
  - type: text
    text: ' qui est la gloire du royaume. Peu de temps après, ce roi sera frappé à son tour, mais ce ne sera pas dans un mouvement de colère ni au cours d’une guerre'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '11.20 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Vers 176 av. J.-C., Séleucus IV Philopator (187 à 175 av. J.-C.) envoie son ministre Héliodore piller les trésors du temple de Jérusalem. Séleucus meurt empoisonné par Héliodore.
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: s2
  children:
  - type: text
    text: Le temps de la souffrance d’Israël
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Un homme méprisable lui succédera sans avoir reçu la dignité royale ; il surviendra en temps de paix et s’emparera de la royauté à force d’intrigues
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '11.21 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Antiochus IV Epiphane (175 à 164 av. J.-C.).
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: Les forces adverses qui débordaient comme une inondation seront submergées et brisées par lui, il tuera aussi un chef du peuple de l’alliance
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '11.22 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Défaite du roi d’Egypte, Ptolémée VI Philométor (181 à 146 av. J.-C.) et mort du grand-prêtre Onias III en 170 av. J.-C.
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'En dépit de l’accord conclu avec lui, il agira avec ruse, il l’attaquera et remportera la victoire avec une poignée d’hommes. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'En temps de paix, il envahira les plus riches régions de la province et accomplira ce qu’aucun de ses ancêtres n’avait fait : il pillera le pays et distribuera largement à ses partisans ce qu’il aura pillé, le butin et les richesses dont il se sera emparé ; il fera des plans d’attaque contre les forteresses, mais tout cela ne durera qu’un temps.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: Rassemblant toutes ses forces et son courage, il lancera une attaque contre le roi du Midi avec une grande armée. Le roi du Midi le combattra avec une armée très puissante et nombreuse, mais il ne parviendra pas à résister à son adversaire, à cause de complots dirigés contre lui
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '11.25 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Campagne contre l’Egypte en 170-169 av. J.-C.
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Ses familiers causeront sa perte ; son armée sera écrasée et beaucoup de ses soldats tomberont, frappés à mort. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: Quant aux deux rois
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '11.27 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: C’est-à-dire Antiochus IV et Ptolémée VI Philométor.
    marker-yv: yv-n
  - type: text
    text: ', ils chercheront secrètement à se nuire mutuellement ; ainsi, ils s’assiéront à la même table, pour se duper l’un l’autre par des mensonges. Mais leurs tractations ne réussiront pas, car la fin doit venir au temps fixé. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: Le roi du Nord retournera dans son pays, chargé de grandes richesses, et avec au cœur des intentions hostiles contre la sainte alliance conclue par Dieu avec son peuple. Il les exécutera avant de rentrer dans son pays
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '11.28 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Sur le chemin du retour de l’Egypte, en 169 av. J.-C., Antiochus IV pille le temple de Jérusalem.
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'Au temps fixé, il se mettra de nouveau en campagne contre le royaume du Midi, mais cette expédition ne se passera pas comme la première. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: Des navires, venant des côtes à l’ouest de la Méditerranée, viendront s’opposer à lui et le décourageront
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '11.30 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Navires romains sous les ordres du légat Popilius Laenas chargé de transmettre à Antiochus le décret du sénat lui enjoignant de quitter l’Egypte.
    marker-yv: yv-n
  - type: text
    text: '. Il s’emportera de nouveau et agira contre l’alliance sainte, et il s’accordera de nouveau avec ceux qui la trahiront. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: Certaines de ses troupes prendront position sur son ordre, elles profaneront le sanctuaire et la citadelle, feront cesser le sacrifice perpétuel
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '11.31 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Voir Ex 29.38-42 ; Nb 28.3-6.
    marker-yv: yv-n
  - type: text
    text: ' et installeront la profanation abominable'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '11.31 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Voir 9.27 ; 12.11. En 168 av. J.-C., le Temple fut consacré à Jupiter Olympien. L’autel de ce dieu fut installé au-dessus de l’autel des holocaustes.
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'Par ses intrigues, il corrompra ceux qui auront trahi l’alliance, mais le peuple de ceux qui connaissent leur Dieu agira avec courage. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: 'Les hommes du peuple qui auront de la sagesse enseigneront un grand nombre, mais ils subiront l’épée, le feu, la prison et le pillage pendant des jours. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: 'Pendant qu’ils seront ainsi livrés à la mort, ils recevront un peu d’aide, mais beaucoup de gens se rallieront hypocritement à eux. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: Certains parmi les hommes qui auront de la sagesse tomberont afin d’être épurés, purifiés et blanchis à travers cette épreuve, en vue du temps de la fin, car la fin viendra au temps fixé.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: Le roi agira à sa guise, il s’enorgueillira et s’élèvera au-dessus de tous les dieux ; il proférera même des blasphèmes inouïs contre le Dieu des dieux et il parviendra à ses fins jusqu’à ce que la colère divine soit parvenue à son comble. Alors ce qui est décrété s’accomplira
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '11.36 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Voir '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 2 Th 2.4
        metadata:
          usfm: 2TH.2.4
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: Il n’aura de considération ni pour les dieux de ses ancêtres, ni pour la divinité chère aux femmes
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '11.37 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Probablement le dieu Tammouz (voir '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ez 8.14
        metadata:
          usfm: EZK.8.14
      - type: text
        text: ).
    marker-yv: yv-n
  - type: text
    text: ', ni pour aucun autre dieu, car il se placera au-dessus de tous. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: text
    text: 'Au lieu de ceux-ci, il vénérera le dieu des forteresses, une divinité que n’auront pas connue ses ancêtres en lui offrant de l’or, de l’argent, des pierres précieuses et d’autres objets de valeur. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '39'
  - type: text
    text: 'Il attaquera des forteresses, avec l’aide d’un dieu étranger : il comblera d’honneurs ceux qui accepteront ce dieu, il leur conférera le pouvoir sur un grand nombre et leur distribuera des terres en récompense.'
- type: usfm
  marker: s2
  children:
  - type: text
    text: La fin du persécuteur
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '40'
  - type: text
    text: 'Au temps de la fin, le roi du Midi se heurtera contre lui. Comme un ouragan, le roi du Nord fondra sur celui du Midi avec ses chars, sa cavalerie et une flotte considérable ; il pénétrera à l’intérieur des terres et, comme une inondation, il les submergera sur son passage. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '41'
  - type: text
    text: Il envahira aussi le Pays magnifique
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '11.41 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: le Pays magnifique
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: ': '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: celui d’Israël (cp. 8.9 ; 11.16).
    marker-yv: yv-n
  - type: text
    text: ' et de nombreux peuples succomberont. Quelques-uns échapperont à ses coups : les Edomites, les Moabites et l’élite des Ammonites. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '42'
  - type: text
    text: 'Il étendra sa domination sur différents pays, et l’Egypte elle-même ne lui échappera pas. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '43'
  - type: text
    text: 'Il s’emparera des trésors d’or et d’argent et de tous les objets précieux de l’Egypte. Les Libyens et les Ethiopiens le suivront. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '44'
  - type: text
    text: 'Mais, alarmé par des nouvelles venues de l’Orient et du Nord, il quittera le pays dans une grande colère, pour détruire et exterminer un grand nombre. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '45'
  - type: text
    text: Il dressera les tentes royales entre les mers, sur la magnifique montagne sainte. Alors sa fin l’atteindra sans que personne vienne à son secours.
