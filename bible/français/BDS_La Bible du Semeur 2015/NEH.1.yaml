document_id: NEH.1,21
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Néhémie reçoit des nouvelles de Jérusalem
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: Histoire de Néhémie, fils de Hakalia. La vingtième année du règne d’Artaxerxès
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1.1 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: En 446 av. J.-C. (Artaxerxès I
        - type: usfm
          marker: ord
          children:
          - type: text
            text: er
        - type: text
          text: ' a régné de 465 à 424 av. J.-C.), 91 ans après le retour des premiers exilés. Les mots : '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'du règne d’Artaxerxès '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'ne se trouvent pas dans l’hébreu. Ils sont rajoutés d’après '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: '2.1'
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: ', au mois de Kislev'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1.1 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: En novembre-décembre.
      marker-yv: yv-n
    - type: text
      text: ', je me trouvais dans la citadelle de Suse'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1.1 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Résidence d’hiver des rois perses, dans la vallée ensoleillée du Tigre (voir '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: Est 1.2
        - type: text
          text: ).
      marker-yv: yv-n
    - type: text
      text: '. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ils sont tes serviteurs et ton peuple, que tu as délivrés par ta grande force et par tes interventions puissantes. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Je t’en prie, Seigneur, veuille prêter attention à la prière de ton serviteur et à celle de tes autres serviteurs qui désirent te craindre ! De grâce, fais réussir aujourd’hui la démarche que je vais entreprendre et que cet homme
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1.11 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'C’est-à-dire le roi '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'Artaxerxès '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: dont Néhémie était l’échanson.
      marker-yv: yv-n
    - type: text
      text: ' m’accueille avec compassion !'
  - type: usfm
    marker: p
    children:
    - type: text
      text: Or, à cette époque, j’étais chargé de servir les boissons à la table de l’empereur.
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Hanani, l’un de mes parents, arriva avec un groupe d’hommes de Juda. Je leur demandai des nouvelles du reste des Juifs revenus d’exil, et de Jérusalem. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ils me répondirent : Ceux qui ont survécu à la captivité et qui vivent dans le district de Juda'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1.3 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Voir note sur '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: Esd 2.1
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: ' se trouvent dans une grande misère et dans une situation très humiliante ; il y a des brèches dans la muraille de Jérusalem et ses portes ont été détruites par le feu.'
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Prière
    marker-yv: yv-h
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Lorsque j’entendis ces nouvelles, je m’assis et me mis à pleurer. Pendant plusieurs jours, je restai abattu. Je jeûnai et je priai constamment devant le Dieu du ciel. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Je suppliai : Ah ! Eternel, Dieu du ciel, Dieu grand et redoutable, toi qui restes fidèle à ton alliance et qui conserves ta bienveillance à ceux qui t’aiment et qui obéissent à tes commandements, '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'prête attention à la prière de ton serviteur ! Que tes yeux soient ouverts pour voir que je suis en prière devant toi en ce moment, jour et nuit, pour intercéder en faveur de tes serviteurs les Israélites et pour confesser leurs péchés. Car nous avons péché contre toi. Oui, moi et mon peuple, nous avons péché. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Nous sommes vraiment coupables envers toi, car nous avons désobéi aux commandements, aux ordonnances et aux lois que tu as donnés à Moïse, ton serviteur.
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Souviens-toi, cependant, je te prie, de ces paroles que tu as ordonné à ton serviteur Moïse de prononcer : « Lorsque vous serez infidèles, je vous disperserai parmi d’autres peuples'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1.8 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Pour les v. 8-9, voir Lv 26.33 ; Dt 4.27 ; 28.64 ; 30.1-5.
      marker-yv: yv-n
    - type: text
      text: '. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Mais si vous revenez à moi pour obéir à mes commandements et les appliquer, alors, même si vous vous trouvez éloignés jusqu’aux extrémités de la terre, je vous rassemblerai, et je vous ramènerai de là au lieu que j’ai choisi pour y établir ma présence. » '
