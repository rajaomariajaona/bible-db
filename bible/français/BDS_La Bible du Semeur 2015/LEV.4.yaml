document_id: LEV.4,21
type_code: fra
verses:
  '1':
  - type: heading
    content: Les sacrifices pour le péché
  - type: text
    content: 'L’Eternel s’adressa à Moïse en ces termes : '
  '10':
  - type: text
    content: 'comme on le fait pour le sacrifice de communion. Le prêtre les brûlera sur l’autel des holocaustes. '
  '11':
  - type: text
    content: 'Quant à la peau du taureau, toute sa viande, sa tête, ses pattes, ses entrailles avec leur contenu, '
  '12':
  - type: text
    content: soit tout le reste du taureau, il l’emportera hors du camp en un lieu rituellement pur, où sont déversées les cendres grasses, et il le brûlera sur un feu de bûches, à l’endroit où l’on déverse les cendres.
  - type: heading
    content: Pour l’ensemble du peuple
  '13':
  - type: text
    content: 'Si c’est l’ensemble de la communauté d’Israël qui s’est rendue coupable d’un péché involontaire – si, sans le savoir, l’assemblée a fait l’une des choses que l’Eternel a défendues dans ses commandements et s’est ainsi rendue coupable – '
  '14':
  - type: text
    content: 'l’assemblée offrira, quand on découvrira la faute, un jeune taureau en sacrifice pour le péché. On l’amènera devant la tente de la Rencontre, '
  '15':
  - type: text
    content: 'les responsables de la communauté poseront leurs mains sur la tête du taureau devant l’Eternel, et on l’égorgera devant lui. '
  '16':
  - type: text
    content: 'Le prêtre ayant reçu l’onction apportera du sang de la victime dans la tente de la Rencontre. '
  '17':
  - type: text
    content: 'Il y trempera son doigt et en aspergera sept fois le voile devant l’Eternel. '
  '18':
  - type: text
    content: 'Il appliquera du sang sur les cornes de l’autel, devant l’Eternel dans la tente de la Rencontre. Il répandra tout le reste du sang sur le socle de l’autel des holocaustes situé à l’entrée de la tente. '
  '19':
  - type: text
    content: 'Ensuite, il enlèvera toute la graisse et la brûlera sur l’autel. '
  '2':
  - type: text
    content: 'Parle aux Israélites et dis-leur : Lorsque quelqu’un aura péché involontairement'
  - type: note
    content: Par mégarde, ou par erreur. Pour les péchés commis délibérément, voir Nb 15.30.
  - type: text
    content: ' en commettant l’une quelconque des choses qui sont interdites par les commandements de l’Eternel, voici comment on procédera :'
  - type: heading
    content: Pour le grand-prêtre
  '20':
  - type: text
    content: 'Il suivra, pour le reste du taureau, la même procédure que pour le taureau sacrifié pour son péché. Le prêtre accomplira ainsi le rite d’expiation pour eux, et il leur sera pardonné. '
  '21':
  - type: text
    content: Il fera transporter le taureau hors du camp et le brûlera comme il a été ordonné pour le taureau précédent. Tel est le sacrifice pour le péché de la communauté.
  - type: heading
    content: Pour un chef
  '22':
  - type: text
    content: 'Si c’est un chef qui a péché en faisant involontairement l’une des choses que l’Eternel son Dieu a défendues dans ses commandements, et s’il prend conscience de sa faute, '
  '23':
  - type: text
    content: 'ou si on lui fait connaître le péché qu’il a commis, il amènera comme sacrifice un bouc mâle sans défaut. '
  '24':
  - type: text
    content: 'Il posera sa main sur la tête de la victime avant de l’égorger à l’endroit où l’on égorge l’holocauste devant l’Eternel. C’est un sacrifice pour le péché. '
  '25':
  - type: text
    content: 'Le prêtre prendra avec son doigt du sang du sacrifice pour le péché et en appliquera sur les cornes de l’autel des holocaustes ; puis il répandra le reste du sang sur le socle de l’autel des holocaustes. '
  '26':
  - type: text
    content: Il brûlera toute la graisse sur l’autel, comme dans le cas du sacrifice de communion. Ainsi le prêtre accomplira pour ce chef le rite d’expiation de son péché, et il lui sera pardonné.
  - type: heading
    content: Pour un simple membre du peuple
  '27':
  - type: text
    content: Si c’est un simple membre du peuple qui a péché en faisant involontairement quelque chose que l’Eternel a défendu dans ses commandements, et s’il prend conscience de sa faute
  - type: note
    content: Pour les v. 27-31, voir Nb 15.27-28.
  - type: text
    content: ', '
  '28':
  - type: text
    content: ou si on lui fait connaître le péché qu’il a commis, il apportera comme sacrifice une chèvre
  - type: note
    content: De moindre valeur que le bouc. Si le coupable était trop pauvre, il pouvait offrir un oiseau (5.7-8 ; 12.6, 8).
  - type: text
    content: ' sans défaut pour le péché qu’il a commis. '
  '29':
  - type: text
    content: 'Il posera sa main sur la tête de la victime sacrifiée pour le péché et l’égorgera dans le lieu où l’on offre l’holocauste. '
  '3':
  - type: text
    content: Si c’est le prêtre qui a reçu l’onction
  - type: note
    content: Il s’agit du grand-prêtre, seul consacré par l’onction (Ex 29.7), les autres prêtres l’étant par aspersion (Ex 29.21).
  - type: text
    content: ' qui a péché et qui par là même a chargé le peuple de culpabilité, il offrira à l’Eternel pour le péché qu’il aura commis, un jeune taureau sans défaut, en sacrifice pour le péché. '
  '30':
  - type: text
    content: 'Puis le prêtre prendra avec son doigt du sang de la victime pour l’appliquer sur les cornes de l’autel des holocaustes, et il répandra tout le reste du sang sur le socle de l’autel. '
  '31':
  - type: text
    content: Il ôtera toute la graisse, comme on le fait pour le sacrifice de communion, et il la brûlera sur l’autel, produisant ainsi une odeur apaisante pour l’Eternel. Le prêtre accomplira ainsi le rite d’expiation pour cet homme, et il lui sera pardonné.
  '32':
  - type: text
    content: 'Si c’est un agneau qu’il présente en sacrifice pour le péché, il amènera une femelle sans défaut. '
  '33':
  - type: text
    content: 'Il posera sa main sur la tête de la victime du sacrifice pour le péché et l’égorgera comme telle à l’endroit où l’on immole l’holocauste. '
  '34':
  - type: text
    content: 'Puis le prêtre prendra avec son doigt du sang de l’animal sacrifié pour le péché et le mettra sur les cornes de l’autel des holocaustes ; puis il répandra le reste du sang sur le socle de l’autel. '
  '35':
  - type: text
    content: Il enlèvera toute la graisse, comme on le fait pour l’agneau offert en sacrifice de communion ; ensuite le prêtre la brûlera sur l’autel, sur les sacrifices et offrandes consumés par le feu qui appartiennent à l’Eternel. Le prêtre accomplira ainsi le rite d’expiation pour le péché commis par cet homme, et il lui sera pardonné.
  '4':
  - type: text
    content: 'Il amènera le taureau à l’entrée de la tente de la Rencontre devant l’Eternel, il posera sa main sur la tête du taureau et l’égorgera devant l’Eternel. '
  '5':
  - type: text
    content: 'Le prêtre qui a reçu l’onction prendra du sang de la victime et l’apportera dans la tente de la Rencontre. '
  '6':
  - type: text
    content: 'Il trempera son doigt dans le sang et en aspergera sept fois le voile du sanctuaire devant l’Eternel. '
  '7':
  - type: text
    content: 'Puis il appliquera de ce sang sur les cornes de l’autel des parfums aromatiques, devant l’Eternel, dans la tente de la Rencontre. Il répandra tout le reste du sang du taureau sur le socle de l’autel des holocaustes situé à l’entrée de la tente de la Rencontre. '
  '8':
  - type: text
    content: 'Ensuite, il enlèvera toute la graisse du taureau du sacrifice pour le péché, celle qui recouvre les entrailles et toute celle qui y est attachée, '
  '9':
  - type: text
    content: 'les deux rognons et la graisse qui les enveloppe et qui couvre le dos, ainsi que le dessus du foie qu’il ôtera avec les rognons, '
