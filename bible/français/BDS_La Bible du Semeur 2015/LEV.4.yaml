document_id: LEV.4,21
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Les sacrifices pour le péché
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'L’Eternel s’adressa à Moïse en ces termes : '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'comme on le fait pour le sacrifice de communion. Le prêtre les brûlera sur l’autel des holocaustes. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Quant à la peau du taureau, toute sa viande, sa tête, ses pattes, ses entrailles avec leur contenu, '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: soit tout le reste du taureau, il l’emportera hors du camp en un lieu rituellement pur, où sont déversées les cendres grasses, et il le brûlera sur un feu de bûches, à l’endroit où l’on déverse les cendres.
  - type: usfm
    marker: s2
    children:
    - type: text
      text: Pour l’ensemble du peuple
    marker-yv: yv-h
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Si c’est l’ensemble de la communauté d’Israël qui s’est rendue coupable d’un péché involontaire – si, sans le savoir, l’assemblée a fait l’une des choses que l’Eternel a défendues dans ses commandements et s’est ainsi rendue coupable – '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'l’assemblée offrira, quand on découvrira la faute, un jeune taureau en sacrifice pour le péché. On l’amènera devant la tente de la Rencontre, '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'les responsables de la communauté poseront leurs mains sur la tête du taureau devant l’Eternel, et on l’égorgera devant lui. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Le prêtre ayant reçu l’onction apportera du sang de la victime dans la tente de la Rencontre. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Il y trempera son doigt et en aspergera sept fois le voile devant l’Eternel. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Il appliquera du sang sur les cornes de l’autel, devant l’Eternel dans la tente de la Rencontre. Il répandra tout le reste du sang sur le socle de l’autel des holocaustes situé à l’entrée de la tente. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ensuite, il enlèvera toute la graisse et la brûlera sur l’autel. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Parle aux Israélites et dis-leur : Lorsque quelqu’un aura péché involontairement'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '4.2 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Par mégarde, ou par erreur. Pour les péchés commis délibérément, voir '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: Nb 15.30
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: ' en commettant l’une quelconque des choses qui sont interdites par les commandements de l’Eternel, voici comment on procédera :'
  - type: usfm
    marker: s2
    children:
    - type: text
      text: Pour le grand-prêtre
    marker-yv: yv-h
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Il suivra, pour le reste du taureau, la même procédure que pour le taureau sacrifié pour son péché. Le prêtre accomplira ainsi le rite d’expiation pour eux, et il leur sera pardonné. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Il fera transporter le taureau hors du camp et le brûlera comme il a été ordonné pour le taureau précédent. Tel est le sacrifice pour le péché de la communauté.
  - type: usfm
    marker: s2
    children:
    - type: text
      text: Pour un chef
    marker-yv: yv-h
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Si c’est un chef qui a péché en faisant involontairement l’une des choses que l’Eternel son Dieu a défendues dans ses commandements, et s’il prend conscience de sa faute, '
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'ou si on lui fait connaître le péché qu’il a commis, il amènera comme sacrifice un bouc mâle sans défaut. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Il posera sa main sur la tête de la victime avant de l’égorger à l’endroit où l’on égorge l’holocauste devant l’Eternel. C’est un sacrifice pour le péché. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Le prêtre prendra avec son doigt du sang du sacrifice pour le péché et en appliquera sur les cornes de l’autel des holocaustes ; puis il répandra le reste du sang sur le socle de l’autel des holocaustes. '
  '26':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Il brûlera toute la graisse sur l’autel, comme dans le cas du sacrifice de communion. Ainsi le prêtre accomplira pour ce chef le rite d’expiation de son péché, et il lui sera pardonné.
  - type: usfm
    marker: s2
    children:
    - type: text
      text: Pour un simple membre du peuple
    marker-yv: yv-h
  '27':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Si c’est un simple membre du peuple qui a péché en faisant involontairement quelque chose que l’Eternel a défendu dans ses commandements, et s’il prend conscience de sa faute
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '4.27 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Pour les v. 27-31, voir '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: Nb 15.27-28
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: ', '
  '28':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ou si on lui fait connaître le péché qu’il a commis, il apportera comme sacrifice une chèvre
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '4.28 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: De moindre valeur que le bouc. Si le coupable était trop pauvre, il pouvait offrir un oiseau (5.7-8 ; 12.6, 8).
      marker-yv: yv-n
    - type: text
      text: ' sans défaut pour le péché qu’il a commis. '
  '29':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Il posera sa main sur la tête de la victime sacrifiée pour le péché et l’égorgera dans le lieu où l’on offre l’holocauste. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Si c’est le prêtre qui a reçu l’onction
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '4.3 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Il s’agit du grand-prêtre, seul consacré par l’onction (
        - type: usfm
          marker: ref
          children:
          - type: text
            text: Ex 29.7
        - type: text
          text: ), les autres prêtres l’étant par aspersion (
        - type: usfm
          marker: ref
          children:
          - type: text
            text: Ex 29.21
        - type: text
          text: ).
      marker-yv: yv-n
    - type: text
      text: ' qui a péché et qui par là même a chargé le peuple de culpabilité, il offrira à l’Eternel pour le péché qu’il aura commis, un jeune taureau sans défaut, en sacrifice pour le péché. '
  '30':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Puis le prêtre prendra avec son doigt du sang de la victime pour l’appliquer sur les cornes de l’autel des holocaustes, et il répandra tout le reste du sang sur le socle de l’autel. '
  '31':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Il ôtera toute la graisse, comme on le fait pour le sacrifice de communion, et il la brûlera sur l’autel, produisant ainsi une odeur apaisante pour l’Eternel. Le prêtre accomplira ainsi le rite d’expiation pour cet homme, et il lui sera pardonné.
  '32':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Si c’est un agneau qu’il présente en sacrifice pour le péché, il amènera une femelle sans défaut. '
  '33':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Il posera sa main sur la tête de la victime du sacrifice pour le péché et l’égorgera comme telle à l’endroit où l’on immole l’holocauste. '
  '34':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Puis le prêtre prendra avec son doigt du sang de l’animal sacrifié pour le péché et le mettra sur les cornes de l’autel des holocaustes ; puis il répandra le reste du sang sur le socle de l’autel. '
  '35':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Il enlèvera toute la graisse, comme on le fait pour l’agneau offert en sacrifice de communion ; ensuite le prêtre la brûlera sur l’autel, sur les sacrifices et offrandes consumés par le feu qui appartiennent à l’Eternel. Le prêtre accomplira ainsi le rite d’expiation pour le péché commis par cet homme, et il lui sera pardonné.
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Il amènera le taureau à l’entrée de la tente de la Rencontre devant l’Eternel, il posera sa main sur la tête du taureau et l’égorgera devant l’Eternel. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Le prêtre qui a reçu l’onction prendra du sang de la victime et l’apportera dans la tente de la Rencontre. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Il trempera son doigt dans le sang et en aspergera sept fois le voile du sanctuaire devant l’Eternel. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Puis il appliquera de ce sang sur les cornes de l’autel des parfums aromatiques, devant l’Eternel, dans la tente de la Rencontre. Il répandra tout le reste du sang du taureau sur le socle de l’autel des holocaustes situé à l’entrée de la tente de la Rencontre. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ensuite, il enlèvera toute la graisse du taureau du sacrifice pour le péché, celle qui recouvre les entrailles et toute celle qui y est attachée, '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'les deux rognons et la graisse qui les enveloppe et qui couvre le dos, ainsi que le dessus du foie qu’il ôtera avec les rognons, '
