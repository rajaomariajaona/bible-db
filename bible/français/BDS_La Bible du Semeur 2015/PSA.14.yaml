document_id: PSA.14,21
type_code: fra
verses:
  '1':
  - type: heading
    content: Un monde corrompuVoir Ps 53.
  - type: text
    content: 'Au chef de chœur : de David.'
  - type: text
    content: 'Les insensés pensent : ╵« Dieu n’existe pas. »'
  - type: text
    content: Ils sont corrompus, ╵leurs agissements sont abominables, ╵et aucun ne fait le bien
  - type: note
    content: Les v. 1-3 sont cités en Rm 3.10-12.
  - type: text
    content: .
  '2':
  - type: text
    content: 'Du ciel, l’Eternel observe ╵tout le genre humain :'
  - type: text
    content: « Reste-t-il un homme sage
  - type: text
    content: qui s’attend à Dieu ?
  '3':
  - type: text
    content: Ils se sont tous égarés, ╵tous sont corrompus,
  - type: text
    content: et aucun ne fait le bien,
  - type: text
    content: même pas un seul.
  '4':
  - type: text
    content: Tous ces gens qui font le mal, ╵n’ont-ils rien compris ?
  - type: text
    content: Car ils dévorent mon peuple, ╵tout comme on mange du pain
  - type: note
    content: 'Autre traduction : ils mangent son pain.'
  - type: text
    content: '  !'
  - type: text
    content: Jamais ils n’invoquent l’Eternel ! »
  '5':
  - type: text
    content: Ils sont saisis d’épouvante,
  - type: text
    content: car Dieu est avec les justes.
  '6':
  - type: text
    content: Pensez-vous pouvoir ruiner ╵les projets des pauvres ?
  - type: text
    content: L’Eternel est leur refuge.
  '7':
  - type: text
    content: Ah, que vienne du mont de Sion ╵le salut pour Israël !
  - type: text
    content: Quand l’Eternel changera ╵le sort de son peuple
  - type: note
    content: 'Autre traduction : fera revenir ceux de son peuple qui sont exilés.'
  - type: text
    content: ','
  - type: text
    content: Jacob criera d’allégresse, ╵Israël, de joie.
