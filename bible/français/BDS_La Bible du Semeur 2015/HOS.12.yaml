document_id: HOS.12,21
type_code: fra
verses:
  '1':
  - type: heading
    content: Le salut par le retour à l’Éternel
  - type: heading
    content: Le procès
  - type: heading
    content: Les fautes d’Israël
  - type: text
    content: Le peuple d’Ephraïm ╵me cerne de mensonges,
  - type: text
    content: la communauté d’Israël ╵de tromperie.
  - type: text
    content: Juda marche encore avec Dieu,
  - type: text
    content: il est fidèle ╵parmi les saints
  - type: note
    content: 'Juda… les saints: sens incertain. Autres traductions : Juda est fidèle au Dieu saint ou Juda erre avec le dieu El, et il est fidèle aux saints (où l’expression les saints désignerait les dieux du panthéon cananéen) ou bien : Juda est en révolte contre Dieu et contre les saints fidèles.'
  - type: text
    content: .
  '10':
  - type: text
    content: « Moi, je suis l’Eternel ton Dieu,
  - type: text
    content: depuis l’Egypte,
  - type: text
    content: et je te ferai de nouveau ╵habiter sous des tentes
  - type: text
    content: tout comme aux jours où l’on célèbre ╵la fête des Cabanes
  - type: note
    content: Voir Lv 23.42-43.
  - type: text
    content: .
  '11':
  - type: text
    content: J’ai parlé aux prophètes
  - type: text
    content: et je leur ai donné ╵des révélations en grand nombre,
  - type: text
    content: je parlerai encore ╵en paraboles
  - type: text
    content: par des prophètes. »
  '12':
  - type: text
    content: Puisque Galaad
  - type: note
    content: Voir 6.8.
  - type: text
    content: ' est inique ╵il ne vaut plus grand-chose'
  - type: note
    content: 'Autre traduction : il n’est plus que fausseté.'
  - type: text
    content: ','
  - type: text
    content: car ils offrent en sacrifice ╵des taureaux à Guilgal
  - type: note
    content: Voir 4.15 et note.
  - type: text
    content: '  ;'
  - type: text
    content: aussi leurs autels seront-ils ╵réduits en des tas de décombres
  - type: text
    content: dans les sillons des champs.
  '13':
  - type: text
    content: Or, Jacob s’est enfui ╵dans la plaine d’Aram,
  - type: text
    content: Israël a servi ╵pour une femme ;
  - type: text
    content: pour une femme, ╵il s’est fait gardien de troupeaux
  - type: note
    content: Jacob a fui à Paddân-Aram (Gn 28.2-5) où il a servi Laban durant sept ans pour chacune de ses deux femmes (Gn 29.20-28) puis a continué à garder les troupeaux de son beau-père (Gn 30.31 ; 31.41).
  - type: text
    content: .
  '14':
  - type: text
    content: Or l’Eternel a fait sortir ╵Israël de l’Egypte
  - type: text
    content: par un prophète
  - type: note
    content: Moïse (voir Nb 12.6-8 ; Dt 18.15 ; 34.10).
  - type: text
    content: .
  - type: text
    content: Par un prophète, ╵Israël a été gardé.
  '15':
  - type: text
    content: Ephraïm a irrité Dieu ╵amèrement,
  - type: text
    content: c’est pourquoi son Seigneur ╵ne lui pardonne pas ╵le sang qu’il a versé,
  - type: text
    content: et il lui revaudra
  - type: text
    content: le mépris dont il a fait preuve.
  '2':
  - type: text
    content: Ephraïm se repaît de vent
  - type: text
    content: et, à longueur de jour, ╵il court après le vent d’orient.
  - type: text
    content: Il multiplie la fraude ╵et la violence.
  - type: text
    content: Il fait alliance avec Assur
  - type: text
    content: et porte de l’huile
  - type: note
    content: On utilisait de l’huile dans certaines cérémonies de conclusion d’alliance.
  - type: text
    content: ' en Egypte.'
  '3':
  - type: text
    content: Contre Juda
  - type: note
    content: Plusieurs indices font penser qu’il peut y avoir ici une erreur de scribe et que l’original portait Israël au lieu de Juda.
  - type: text
    content: ' ╵l’Eternel intente un procès.'
  - type: text
    content: Il va châtier Jacob ╵pour sa conduite,
  - type: text
    content: il le rétribuera ╵selon ses actes.
  '4':
  - type: text
    content: Dans le sein de sa mère,
  - type: text
    content: il supplanta
  - type: note
    content: Ce verbe fait assonance avec le nom Jacob (voir Gn 27.36).
  - type: text
    content: ' son frère'
  - type: text
    content: et dans son âge mûr, ╵il lutta avec Dieu
  - type: note
    content: Voir Gn 32.23-33.
  - type: text
    content: .
  '5':
  - type: text
    content: Il lutta avec l’ange ╵et il sortit vainqueur,
  - type: text
    content: il pleura et le supplia.
  - type: text
    content: Il rencontra Dieu à Béthel,
  - type: text
    content: et là, Dieu nous parla
  - type: note
    content: Voir Gn 35.1-15.
  - type: text
    content: .
  '6':
  - type: text
    content: C’est l’Eternel, ╵Dieu des armées célestes,
  - type: text
    content: oui, l’Eternel. ╵C’est ainsi qu’on parle de lui.
  '7':
  - type: text
    content: Maintenant, ô Jacob, ╵reviens donc à ton Dieu.
  - type: text
    content: Pratique l’amour et le droit
  - type: text
    content: et compte en tout temps sur ton Dieu.
  '8':
  - type: text
    content: Tout comme des Cananéens
  - type: note
    content: Jeu sur les deux sens du terme hébreu traduit par Cananéens, qui signifie aussi marchands.
  - type: text
    content: ', ╵ces gens tiennent en main ╵des balances truquées'
  - type: text
    content: et ils se plaisent à frauder.
  '9':
  - type: text
    content: 'Ephraïm dit :'
  - type: text
    content: « Ah, je me suis bien enrichi !
  - type: text
    content: j’ai acquis de grands biens.
  - type: text
    content: Dans toutes mes affaires
  - type: note
    content: 'Autre traduction : Tout cela n’est que le produit de mon travail.'
  - type: text
    content: ','
  - type: text
    content: on ne pourra trouver de faute ╵qui serait un péché. »
