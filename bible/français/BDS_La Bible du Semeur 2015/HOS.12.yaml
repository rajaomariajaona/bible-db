document_id: HOS.12,21
type_code: fra
verses:
  '1':
  - type: usfm
    marker: ms1
    children:
    - type: text
      text: Le salut par le retour à l’Éternel
    marker-yv: yv-h
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Le procès
    marker-yv: yv-h
  - type: usfm
    marker: s2
    children:
    - type: text
      text: Les fautes d’Israël
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: Le peuple d’Ephraïm ╵me cerne de mensonges,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: la communauté d’Israël ╵de tromperie.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Juda marche encore avec Dieu,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: il est fidèle ╵parmi les saints
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '12.1 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Juda… les saints
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: ': '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'sens incertain. Autres traductions : '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'Juda est fidèle au Dieu saint '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'ou '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'Juda erre avec le dieu El, et il est fidèle aux saints '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '(où l’expression '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'les saints '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'désignerait les dieux du panthéon cananéen) ou bien : '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: Juda est en révolte contre Dieu et contre les saints fidèles.
      marker-yv: yv-n
    - type: text
      text: .
  '10':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: « Moi, je suis l’Eternel ton Dieu,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: depuis l’Egypte,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et je te ferai de nouveau ╵habiter sous des tentes
  - type: usfm
    marker: q1
    children:
    - type: text
      text: tout comme aux jours où l’on célèbre ╵la fête des Cabanes
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '12.10 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Voir '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: Lv 23.42-43
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: .
  '11':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: J’ai parlé aux prophètes
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et je leur ai donné ╵des révélations en grand nombre,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: je parlerai encore ╵en paraboles
  - type: usfm
    marker: q1
    children:
    - type: text
      text: par des prophètes. »
  '12':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Puisque Galaad
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '12.12 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Voir '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: '6.8'
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: ' est inique ╵il ne vaut plus grand-chose'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '12.12 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Autre traduction : '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: il n’est plus que fausseté.
      marker-yv: yv-n
    - type: text
      text: ','
  - type: usfm
    marker: q1
    children:
    - type: text
      text: car ils offrent en sacrifice ╵des taureaux à Guilgal
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '12.12 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Voir '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: '4.15'
        - type: text
          text: ' et note.'
      marker-yv: yv-n
    - type: text
      text: '  ;'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: aussi leurs autels seront-ils ╵réduits en des tas de décombres
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dans les sillons des champs.
  '13':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Or, Jacob s’est enfui ╵dans la plaine d’Aram,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Israël a servi ╵pour une femme ;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: pour une femme, ╵il s’est fait gardien de troupeaux
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '12.13 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Jacob a fui à Paddân-Aram (
        - type: usfm
          marker: ref
          children:
          - type: text
            text: Gn 28.2-5
        - type: text
          text: ) où il a servi Laban durant sept ans pour chacune de ses deux femmes (
        - type: usfm
          marker: ref
          children:
          - type: text
            text: Gn 29.20-28
        - type: text
          text: ) puis a continué à garder les troupeaux de son beau-père (Gn 30.31 ; 31.41).
      marker-yv: yv-n
    - type: text
      text: .
  '14':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Or l’Eternel a fait sortir ╵Israël de l’Egypte
  - type: usfm
    marker: q1
    children:
    - type: text
      text: par un prophète
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '12.14 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Moïse (voir Nb 12.6-8 ; Dt 18.15 ; 34.10).
      marker-yv: yv-n
    - type: text
      text: .
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Par un prophète, ╵Israël a été gardé.
  '15':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ephraïm a irrité Dieu ╵amèrement,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: c’est pourquoi son Seigneur ╵ne lui pardonne pas ╵le sang qu’il a versé,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et il lui revaudra
  - type: usfm
    marker: q1
    children:
    - type: text
      text: le mépris dont il a fait preuve.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ephraïm se repaît de vent
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et, à longueur de jour, ╵il court après le vent d’orient.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Il multiplie la fraude ╵et la violence.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Il fait alliance avec Assur
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et porte de l’huile
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '12.2 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: On utilisait de l’
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'huile '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: dans certaines cérémonies de conclusion d’alliance.
      marker-yv: yv-n
    - type: text
      text: ' en Egypte.'
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Contre Juda
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '12.3 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Plusieurs indices font penser qu’il peut y avoir ici une erreur de scribe et que l’original portait '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'Israël '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'au lieu de '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: Juda.
      marker-yv: yv-n
    - type: text
      text: ' ╵l’Eternel intente un procès.'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Il va châtier Jacob ╵pour sa conduite,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: il le rétribuera ╵selon ses actes.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Dans le sein de sa mère,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: il supplanta
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '12.4 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Ce verbe fait assonance avec le nom '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'Jacob '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '(voir '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: Gn 27.36
        - type: text
          text: ).
      marker-yv: yv-n
    - type: text
      text: ' son frère'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et dans son âge mûr, ╵il lutta avec Dieu
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '12.4 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Voir '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: Gn 32.23-33
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: .
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Il lutta avec l’ange ╵et il sortit vainqueur,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: il pleura et le supplia.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Il rencontra Dieu à Béthel,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et là, Dieu nous parla
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '12.5 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Voir '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: Gn 35.1-15
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: .
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: C’est l’Eternel, ╵Dieu des armées célestes,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: oui, l’Eternel. ╵C’est ainsi qu’on parle de lui.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Maintenant, ô Jacob, ╵reviens donc à ton Dieu.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Pratique l’amour et le droit
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et compte en tout temps sur ton Dieu.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tout comme des Cananéens
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '12.8 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Jeu sur les deux sens du terme hébreu traduit par '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'Cananéens, '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'qui signifie aussi '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: marchands.
      marker-yv: yv-n
    - type: text
      text: ', ╵ces gens tiennent en main ╵des balances truquées'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et ils se plaisent à frauder.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Ephraïm dit :'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: « Ah, je me suis bien enrichi !
  - type: usfm
    marker: q1
    children:
    - type: text
      text: j’ai acquis de grands biens.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Dans toutes mes affaires
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '12.9 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Autre traduction : '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: Tout cela n’est que le produit de mon travail.
      marker-yv: yv-n
    - type: text
      text: ','
  - type: usfm
    marker: q1
    children:
    - type: text
      text: on ne pourra trouver de faute ╵qui serait un péché. »
