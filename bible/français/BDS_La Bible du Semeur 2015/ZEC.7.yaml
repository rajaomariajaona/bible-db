document_id: ZEC.7,21
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Sur le jeûne
    marker-yv: yv-h
  - type: usfm
    marker: s2
    children:
    - type: text
      text: Le sens du jeûne
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: La quatrième année du règne de Darius, le quatrième jour du neuvième mois, le mois de Kislev
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '7.1 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Le 7 décembre 518 av. J.-C. Après l’exil, les Juifs ont aussi utilisé les noms chaldéens des mois.
      marker-yv: yv-n
    - type: text
      text: ', l’Eternel adressa la parole à Zacharie. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: N’exploitez pas la veuve et l’orphelin, ni l’immigré et les démunis, et ne tramez aucun mal les uns contre les autres
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '7.10 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Repris en '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: 1 Co 13.5
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: .
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Mais ils ont refusé d’écouter : ils se sont rebellés et se sont bouché les oreilles pour ne pas entendre. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ils ont rendu leur cœur aussi dur que le diamant pour ne pas entendre la Loi et les paroles que le Seigneur des armées célestes leur avait adressées par l’intermédiaire des prophètes d’autrefois qui parlaient sous l’action de l’Esprit. Alors le Seigneur des armées célestes s’est mis dans une grande colère, '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'et il a dit : Puisque je les ai appelés, et qu’ils ne m’ont pas écouté, à leur tour ils appelleront, et je ne les écouterai pas.'
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Je les ai dispersés parmi toutes sortes de peuples qu’ils ne connaissaient pas, et le pays est resté dévasté derrière eux ; personne n’y passait plus, personne n’y revenait. D’un pays magnifique, ils ont fait une terre désolée.
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Béthel-Sarétser, un haut fonctionnaire impérial, et ses gens avaient envoyé une délégation pour implorer l’Eternel
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '7.2 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Texte hébreu difficile. Certains traduisent : '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: Béthel avait envoyé Sarétser et Réguem-Mélek avec ses gens pour implorer l’Eternel.
      marker-yv: yv-n
    - type: text
      text: ' '
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'et pour demander aux prêtres du Temple du Seigneur des armées célestes, et aux prophètes : Dois-je continuer à pleurer et à jeûner au cinquième mois comme je le fais depuis tant d’années'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '7.3 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: En souvenir de la destruction du Temple (
        - type: usfm
          marker: ref
          children:
          - type: text
            text: 2 R 25.8-9
        - type: text
          text: ). Puisqu’on avait commencé à reconstruire le Temple, on se demandait s’il fallait maintenir ce jeûne.
      marker-yv: yv-n
    - type: text
      text: '  ?'
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Le Seigneur des armées célestes m’adressa la parole en ces termes :'
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Parle à toute la population du pays et aux prêtres et demande-leur : Quand, pendant soixante-dix années, vous avez jeûné et pris le deuil au cinquième et au septième mois'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '7.5 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: En souvenir de l’assassinat de Guedalia (2 R 25.25 ; Jr 41.1-3).
      marker-yv: yv-n
    - type: text
      text: ', est-ce pour moi que vous avez observé ce jeûne ? '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Et quand vous mangez et buvez, n’est-ce pas pour votre propre satisfaction que vous le faites ? '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: N’est-ce pas là ce que l’Eternel a déjà fait proclamer par les prophètes d’autrefois, au temps où Jérusalem était bien établie et jouissait de la tranquillité, entourée de ses villes, et que le Néguev et le pays plat étaient peuplés ?
  - type: usfm
    marker: s2
    children:
    - type: text
      text: Les causes de l’exil
    marker-yv: yv-h
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'L’Eternel adressa la parole à Zacharie en ces termes :'
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Voici ce que déclare le Seigneur des armées célestes : Rendez des jugements conformes à la vérité, agissez les uns envers les autres avec amour et compassion. '
