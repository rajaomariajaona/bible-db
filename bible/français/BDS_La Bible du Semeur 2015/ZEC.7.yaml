document_id: ZEC.7,21
type_code: fra
verses:
  '1':
  - type: heading
    content: Sur le jeûne
  - type: heading
    content: Le sens du jeûne
  - type: text
    content: La quatrième année du règne de Darius, le quatrième jour du neuvième mois, le mois de Kislev
  - type: note
    content: Le 7 décembre 518 av. J.-C. Après l’exil, les Juifs ont aussi utilisé les noms chaldéens des mois.
  - type: text
    content: ', l’Eternel adressa la parole à Zacharie. '
  '10':
  - type: text
    content: N’exploitez pas la veuve et l’orphelin, ni l’immigré et les démunis, et ne tramez aucun mal les uns contre les autres
  - type: note
    content: Repris en 1 Co 13.5.
  - type: text
    content: .
  '11':
  - type: text
    content: 'Mais ils ont refusé d’écouter : ils se sont rebellés et se sont bouché les oreilles pour ne pas entendre. '
  '12':
  - type: text
    content: 'Ils ont rendu leur cœur aussi dur que le diamant pour ne pas entendre la Loi et les paroles que le Seigneur des armées célestes leur avait adressées par l’intermédiaire des prophètes d’autrefois qui parlaient sous l’action de l’Esprit. Alors le Seigneur des armées célestes s’est mis dans une grande colère, '
  '13':
  - type: text
    content: 'et il a dit : Puisque je les ai appelés, et qu’ils ne m’ont pas écouté, à leur tour ils appelleront, et je ne les écouterai pas.'
  '14':
  - type: text
    content: Je les ai dispersés parmi toutes sortes de peuples qu’ils ne connaissaient pas, et le pays est resté dévasté derrière eux ; personne n’y passait plus, personne n’y revenait. D’un pays magnifique, ils ont fait une terre désolée.
  '2':
  - type: text
    content: Béthel-Sarétser, un haut fonctionnaire impérial, et ses gens avaient envoyé une délégation pour implorer l’Eternel
  - type: note
    content: 'Texte hébreu difficile. Certains traduisent : Béthel avait envoyé Sarétser et Réguem-Mélek avec ses gens pour implorer l’Eternel.'
  - type: text
    content: ' '
  '3':
  - type: text
    content: 'et pour demander aux prêtres du Temple du Seigneur des armées célestes, et aux prophètes : Dois-je continuer à pleurer et à jeûner au cinquième mois comme je le fais depuis tant d’années'
  - type: note
    content: En souvenir de la destruction du Temple (2 R 25.8-9). Puisqu’on avait commencé à reconstruire le Temple, on se demandait s’il fallait maintenir ce jeûne.
  - type: text
    content: '  ?'
  '4':
  - type: text
    content: 'Le Seigneur des armées célestes m’adressa la parole en ces termes :'
  '5':
  - type: text
    content: 'Parle à toute la population du pays et aux prêtres et demande-leur : Quand, pendant soixante-dix années, vous avez jeûné et pris le deuil au cinquième et au septième mois'
  - type: note
    content: En souvenir de l’assassinat de Guedalia (2 R 25.25 ; Jr 41.1-3).
  - type: text
    content: ', est-ce pour moi que vous avez observé ce jeûne ? '
  '6':
  - type: text
    content: 'Et quand vous mangez et buvez, n’est-ce pas pour votre propre satisfaction que vous le faites ? '
  '7':
  - type: text
    content: N’est-ce pas là ce que l’Eternel a déjà fait proclamer par les prophètes d’autrefois, au temps où Jérusalem était bien établie et jouissait de la tranquillité, entourée de ses villes, et que le Néguev et le pays plat étaient peuplés ?
  - type: heading
    content: Les causes de l’exil
  '8':
  - type: text
    content: 'L’Eternel adressa la parole à Zacharie en ces termes :'
  '9':
  - type: text
    content: 'Voici ce que déclare le Seigneur des armées célestes : Rendez des jugements conformes à la vérité, agissez les uns envers les autres avec amour et compassion. '
