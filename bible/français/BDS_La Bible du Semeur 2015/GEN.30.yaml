document_id: GEN.30,21
type_code: fra
verses:
  '1':
  - type: text
    content: 'Lorsque Rachel vit qu’elle ne donnait pas d’enfant à Jacob, elle devint jalouse de sa sœur et elle dit à son mari : Donne-moi des enfants, sinon j’en mourrai.'
  '10':
  - type: text
    content: 'Zilpa donna un fils à Jacob. '
  '11':
  - type: text
    content: 'Et Léa dit : Quelle chance !'
  - type: text
    content: 'Et elle le nomma Gad (Chance). '
  '12':
  - type: text
    content: 'Puis Zilpa donna un second fils à Jacob. '
  '13':
  - type: text
    content: 'Léa s’écria : Que je suis heureuse ! Car les femmes me diront bienheureuse.'
  - type: text
    content: Et elle l’appela Aser (Bienheureux).
  '14':
  - type: text
    content: 'Au temps de la moisson des blés, Ruben sortit dans les champs et il trouva des mandragores, il les apporta à sa mère. Rachel dit à Léa : Donne-moi, s’il te plaît, quelques-unes des mandragores'
  - type: note
    content: Fruits auxquels certains attribuent encore aujourd’hui le pouvoir de favoriser la fécondité.
  - type: text
    content: ' que ton fils a apportées.'
  '15':
  - type: text
    content: 'Léa lui répondit : Est-ce qu’il ne te suffit pas de m’avoir pris mon mari ? Il faut que tu prennes encore les mandragores de mon fils ?'
  - type: text
    content: 'Rachel lui dit : Eh bien ! Jacob couchera avec toi cette nuit en échange des mandragores de ton fils.'
  '16':
  - type: text
    content: 'Le soir, quand Jacob revint des champs, Léa sortit à sa rencontre et lui dit : Tu viendras vers moi cette nuit, car je t’ai obtenu au prix des mandragores de mon fils.'
  - type: text
    content: 'Il coucha donc avec elle cette nuit-là. '
  '17':
  - type: text
    content: 'Et Dieu exauça Léa : elle devint enceinte et donna un cinquième fils à Jacob.'
  '18':
  - type: text
    content: 'Elle dit : Dieu m’a payé mon salaire pour avoir donné ma servante à mon mari.'
  - type: text
    content: 'Et elle appela ce fils Issacar (Homme de salaire). '
  '19':
  - type: text
    content: Elle fut de nouveau enceinte et donna un sixième fils à Jacob.
  '2':
  - type: text
    content: 'Jacob se fâcha contre elle et dit : Est-ce que je suis à la place de Dieu, lui qui t’empêche d’avoir des enfants ?'
  '20':
  - type: text
    content: – Dieu m’a accordé un riche présent, s’écria-t-elle, désormais mon mari m’honorera, puisque je lui ai donné six fils.
  - type: text
    content: Et elle appela cet enfant Zabulon (Honneur
  - type: note
    content: Zabulon semble dériver d’un terme hébreu qui signifie prince.
  - type: text
    content: ).
  '21':
  - type: text
    content: Plus tard, elle eut une fille qu’elle nomma Dina.
  '22':
  - type: text
    content: 'Alors Dieu intervint finalement en faveur de Rachel, il l’exauça et lui accorda la possibilité d’avoir des enfants. '
  '23':
  - type: text
    content: 'Elle devint enceinte et donna naissance à un fils en disant : Dieu a enlevé ma honte.'
  '24':
  - type: text
    content: Elle le nomma Joseph (Il ajoute
  - type: note
    content: Le nom Joseph fait également assonance avec le verbe enlever du v. 23.
  - type: text
    content: ') en priant : Que l’Eternel m’ajoute un autre fils !'
  - type: heading
    content: Jacob s’enrichit
  '25':
  - type: text
    content: 'Après la naissance de Joseph, Jacob dit à Laban : Laisse-moi retourner chez moi, dans mon pays. '
  '26':
  - type: text
    content: Donne-moi mes femmes – pour lesquelles j’ai travaillé chez toi – et mes enfants, et je m’en irai ; car tu sais bien comment j’ai travaillé pour toi.
  '27':
  - type: text
    content: 'Laban lui dit : Si tu veux bien me faire une faveur, reste ici. J’ai appris par divination que c’est à cause de toi que l’Eternel m’a béni. '
  '28':
  - type: text
    content: 'Et il ajouta : Fixe-moi ton salaire, et je te le donnerai.'
  '29':
  - type: text
    content: 'Jacob lui dit : Tu sais toi-même comment je t’ai servi, et ce que ton cheptel est devenu grâce à moi. '
  '3':
  - type: text
    content: – Alors, suggéra-t-elle, voici ma servante Bilha, unis-toi à elle pour qu’elle ait un enfant dont elle accouchera sur mes genoux, et j’aurai, moi aussi, un enfant par son intermédiaire
  - type: note
    content: Tradition de l’Orient antique, adoptée dans la famille d’Abraham (16.2).
  - type: text
    content: .
  '30':
  - type: text
    content: Car tu avais bien peu de chose à mon arrivée, mais tes biens se sont considérablement accrus. L’Eternel t’a béni depuis que je suis chez toi. Mais à présent, il est temps que je travaille moi aussi pour ma propre famille.
  '31':
  - type: text
    content: 'Laban lui demanda : Que faut-il te donner ?'
  - type: text
    content: '– Tu n’auras rien à me donner, répondit Jacob. Si tu acceptes ma proposition, je continuerai à paître tes troupeaux et à m’en occuper. '
  '32':
  - type: text
    content: 'Si tu veux, je passerai aujourd’hui tout ton troupeau en revue, je mettrai à part toutes les jeunes bêtes tachetées ou bigarrées : tous les agneaux de couleur foncée, ainsi que toutes les chèvres bigarrées ou tachetées. Ils constitueront mon salaire. '
  '33':
  - type: text
    content: 'Ainsi il te sera facile de contrôler mon honnêteté. Demain, tu viendras inspecter mon salaire : si tu trouves chez moi une chèvre qui ne soit pas tachetée ou bigarrée, ou un agneau qui ne soit pas de couleur foncée, tu pourras les considérer comme volés.'
  '34':
  - type: text
    content: 'Laban dit : D’accord ! Fais comme tu l’as dit.'
  '35':
  - type: text
    content: 'Mais le jour même, Laban retira du troupeau les boucs mouchetés ou bigarrés, toutes les chèvres tachetées ou bigarrées, tout ce qui était mêlé de blanc et tous les agneaux de couleur foncée, et il les remit entre les mains de ses fils. '
  '36':
  - type: text
    content: Puis il mit une distance de trois journées de marche entre lui et Jacob, lequel continua à s’occuper du reste de ses troupeaux.
  '37':
  - type: text
    content: 'Jacob se procura des rameaux verts de peuplier, d’amandier et de platane et en pela l’écorce par endroits, laissant apparaître l’aubier blanc des branches. '
  '38':
  - type: text
    content: 'Il plaça ces rameaux sous les yeux des bêtes dans les auges et les abreuvoirs où elles venaient boire ; celles-ci entraient en chaleur en venant boire. '
  '39':
  - type: text
    content: 'Les bêtes s’accouplaient devant ces rameaux. Lorsqu’elles mettaient bas, leurs petits étaient mouchetés, tachetés ou bigarrés. '
  '4':
  - type: text
    content: 'Elle lui donna donc Bilha, sa servante, pour femme, et Jacob s’unit à elle. '
  '40':
  - type: text
    content: Jacob sépara les agneaux. Dans le troupeau de Laban, il obtint de plus en plus de bêtes mouchetées et foncées
  - type: note
    content: 'Texte obscur en hébreu. Autre traduction : Il mettait les bêtes en face de celles qui étaient mouchetées et foncées dans le troupeau de Laban.'
  - type: text
    content: '. Il se constitua ainsi des troupeaux à lui, qu’il ne mêla pas à ceux de Laban. '
  '41':
  - type: text
    content: 'Chaque fois que des bêtes vigoureuses s’accouplaient, Jacob plaçait les rameaux sous leurs yeux dans les auges pour qu’elles s’accouplent devant les rameaux. '
  '42':
  - type: text
    content: 'Quand les brebis étaient chétives, il ne les mettait pas. Ainsi les bêtes chétives revenaient à Laban et les robustes à Jacob. '
  '43':
  - type: text
    content: De cette manière, ce dernier s’enrichit considérablement, il posséda de nombreux troupeaux, des servantes et des serviteurs, des chameaux et des ânes.
  '5':
  - type: text
    content: 'Bilha devint enceinte et donna un fils à Jacob. '
  '6':
  - type: text
    content: 'Rachel s’écria : Dieu a défendu mon droit. Et même, il m’a exaucée et m’a donné un fils.'
  - type: text
    content: 'C’est pourquoi elle l’appela Dan (Il juge). '
  '7':
  - type: text
    content: 'Puis Bilha, sa servante, devint de nouveau enceinte et donna un second fils à Jacob. '
  '8':
  - type: text
    content: 'Rachel dit : J’ai livré un combat divin contre ma sœur ; et j’ai vaincu.'
  - type: text
    content: Elle nomma ce fils Nephtali (Il lutte).
  '9':
  - type: text
    content: 'Quand Léa vit qu’elle s’était arrêtée d’avoir des enfants, elle prit sa servante Zilpa et la donna à Jacob pour femme. '
