document_id: 2KI.24,21
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: La première invasion babylonienne
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: Sous le règne de Yehoyaqim, Nabuchodonosor, roi de Babylone
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '24.1 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Fils de Nabopolassar, Nabuchodonosor a été le plus grand roi de l’Empire néo-babylonien (612 à 539 av. J.-C.) et a régné de 605 à 562 av. J.-C.
      marker-yv: yv-n
    - type: text
      text: ', l’attaqua'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '24.1 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Après avoir défait les Egyptiens à Karkemish et à Hamath (
        - type: usfm
          marker: ref
          children:
          - type: text
            text: Jr 46.2
        - type: text
          text: '), Nabuchodonosor entreprit de conquérir tout « le pays des Hatti » qui comprenait le royaume de Juda (vers 605 av. J.-C. ; voir '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: Dn 1.1-2
        - type: text
          text: ).
      marker-yv: yv-n
    - type: text
      text: ' et Yehoyaqim fut assujetti à Nabuchodonosor pendant trois ans, puis il se révolta de nouveau contre lui'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '24.1 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Cette révolte a dû avoir lieu en 601 av. J.-C.
      marker-yv: yv-n
    - type: text
      text: '. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Pendant son règne, les officiers de Nabuchodonosor, roi de Babylone, marchèrent avec leurs troupes contre Jérusalem et l’assiégèrent. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Nabuchodonosor lui-même vint sur place pendant le siège. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Alors Yehoyakîn, roi de Juda, se rendit au roi de Babylone, avec sa mère, ses ministres, ses officiers et ses hauts fonctionnaires. Ils furent faits prisonniers par le roi de Babylone la huitième année de son règne
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '24.12 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Voir Jr 22.24-30 ; 24.1 ; 29.2.
      marker-yv: yv-n
    - type: text
      text: '. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Nabuchodonosor emporta tous les trésors du temple de l’Eternel et les trésors du palais royal après avoir mis en pièces tous les ustensiles d’or que Salomon, roi d’Israël, avait fabriqués pour le temple de l’Eternel. Ainsi s’accomplit ce que l’Eternel avait annoncé
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '24.13 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Voir '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: 2 R 20.17
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: '. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Il déporta toute la population de Jérusalem, tous les dirigeants et tous les militaires, tous les artisans et les forgerons : en tout, dix mille personnes prirent le chemin de l’exil ; seule la population la plus pauvre resta dans le pays. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Yehoyakîn fut déporté de Jérusalem à Babylone avec sa mère, ses femmes, ses hauts fonctionnaires et les puissants du pays
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '24.15 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Cf. Jr 22.24-30 ; 24.1-10 ; 29.1-2 ; Ez 17.12.
      marker-yv: yv-n
    - type: text
      text: '. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Le roi de Babylone emmena aussi en exil dans son pays les sept mille militaires, mille artisans et forgerons et tous les guerriers entraînés au combat.
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Il établit comme roi à la place de Yehoyakîn l’oncle de celui-ci, Mattania, dont il changea le nom en Sédécias.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Le règne de Sédécias sur Juda
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: (2 Ch 36.11-16)
    marker-yv: yv-h
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Sédécias avait vingt et un ans à son avènement. Il régna onze ans à Jérusalem
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '24.18 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'De 597 à 587 av. J.-C. Sur le règne de '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'Sédécias, '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'voir '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: Jr 37
        - type: text
          text: ' et '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: '38'
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: '. Sa mère s’appelait Hamoutal, elle était fille de Jérémie, de Libna. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Il fit ce que l’Eternel considère comme mal, tout comme Yehoyaqim. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Alors l’Eternel déchaîna contre lui des bandes de Chaldéens, des bandes de Syriens, de Moabites et d’Ammonites. Il les dressa contre le royaume de Juda pour le faire disparaître comme il l’avait annoncé par l’intermédiaire de ses serviteurs, les prophètes. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Tout cela arriva parce que l’Eternel était en colère contre Jérusalem et Juda, au point de les chasser loin de lui.
  - type: usfm
    marker: p
    children:
    - type: text
      text: Or, Sédécias se révolta contre le roi de Babylone.
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ces malheurs arrivèrent uniquement sur l’ordre de l’Eternel, parce qu’il voulait chasser Juda loin de lui à cause de tous les péchés commis par Manassé, '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: et parce qu’il avait tué beaucoup d’innocents dont le sang avait rempli Jérusalem. Car l’Eternel ne voulait plus pardonner
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '24.4 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Voir '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: 21.10-16
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: .
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Les autres faits et gestes de Yehoyaqim et toutes ses réalisations sont cités dans le livre des Annales des rois de Juda. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Il rejoignit ses ancêtres décédés et son fils Yehoyakîn lui succéda sur le trône.
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: A cette époque, le roi d’Egypte cessa ses expéditions militaires, car le roi de Babylone s’était emparé de tous les territoires qui, depuis le torrent bordant la frontière nord de l’Egypte jusqu’à l’Euphrate, avaient été sous domination égyptienne.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Le règne de Yehoyakîn sur Juda
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: (2 Ch 36.9-10)
    marker-yv: yv-h
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Yehoyakîn était âgé de dix-huit ans à son avènement, et il régna trois mois à Jérusalem
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '24.8 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Yehoyakîn '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'est appelé Yekonia dans '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: 1 Ch 3.16
        - type: text
          text: ' et Konia dans '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: Jr 22.24
        - type: text
          text: . Il ne régna que trois mois comme vassal du roi de Babylone (de décembre 598 à mars 597 av. J.-C.).
      marker-yv: yv-n
    - type: text
      text: '. Sa mère s’appelait Nehoushta, elle était fille d’Elnathan, de Jérusalem. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Il fit ce que l’Eternel considère comme mal, tout comme son père.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Le siège de Jérusalem et la déportation de sa population
    marker-yv: yv-h
