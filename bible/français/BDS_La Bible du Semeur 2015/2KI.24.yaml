document_id: 2KI.24,21
type_code: fra
verses:
  '1':
  - type: heading
    content: La première invasion babylonienne
  - type: text
    content: Sous le règne de Yehoyaqim, Nabuchodonosor, roi de Babylone
  - type: note
    content: Fils de Nabopolassar, Nabuchodonosor a été le plus grand roi de l’Empire néo-babylonien (612 à 539 av. J.-C.) et a régné de 605 à 562 av. J.-C.
  - type: text
    content: ', l’attaqua'
  - type: note
    content: Après avoir défait les Egyptiens à Karkemish et à Hamath (Jr 46.2), Nabuchodonosor entreprit de conquérir tout « le pays des Hatti » qui comprenait le royaume de Juda (vers 605 av. J.-C. ; voir Dn 1.1-2).
  - type: text
    content: ' et Yehoyaqim fut assujetti à Nabuchodonosor pendant trois ans, puis il se révolta de nouveau contre lui'
  - type: note
    content: Cette révolte a dû avoir lieu en 601 av. J.-C.
  - type: text
    content: '. '
  '10':
  - type: text
    content: 'Pendant son règne, les officiers de Nabuchodonosor, roi de Babylone, marchèrent avec leurs troupes contre Jérusalem et l’assiégèrent. '
  '11':
  - type: text
    content: 'Nabuchodonosor lui-même vint sur place pendant le siège. '
  '12':
  - type: text
    content: Alors Yehoyakîn, roi de Juda, se rendit au roi de Babylone, avec sa mère, ses ministres, ses officiers et ses hauts fonctionnaires. Ils furent faits prisonniers par le roi de Babylone la huitième année de son règne
  - type: note
    content: Voir Jr 22.24-30 ; 24.1 ; 29.2.
  - type: text
    content: '. '
  '13':
  - type: text
    content: Nabuchodonosor emporta tous les trésors du temple de l’Eternel et les trésors du palais royal après avoir mis en pièces tous les ustensiles d’or que Salomon, roi d’Israël, avait fabriqués pour le temple de l’Eternel. Ainsi s’accomplit ce que l’Eternel avait annoncé
  - type: note
    content: Voir 2 R 20.17.
  - type: text
    content: '. '
  '14':
  - type: text
    content: 'Il déporta toute la population de Jérusalem, tous les dirigeants et tous les militaires, tous les artisans et les forgerons : en tout, dix mille personnes prirent le chemin de l’exil ; seule la population la plus pauvre resta dans le pays. '
  '15':
  - type: text
    content: Yehoyakîn fut déporté de Jérusalem à Babylone avec sa mère, ses femmes, ses hauts fonctionnaires et les puissants du pays
  - type: note
    content: Cf. Jr 22.24-30 ; 24.1-10 ; 29.1-2 ; Ez 17.12.
  - type: text
    content: '. '
  '16':
  - type: text
    content: Le roi de Babylone emmena aussi en exil dans son pays les sept mille militaires, mille artisans et forgerons et tous les guerriers entraînés au combat.
  '17':
  - type: text
    content: Il établit comme roi à la place de Yehoyakîn l’oncle de celui-ci, Mattania, dont il changea le nom en Sédécias.
  - type: heading
    content: Le règne de Sédécias sur Juda
  - type: heading
    content: (2 Ch 36.11-16)
  '18':
  - type: text
    content: Sédécias avait vingt et un ans à son avènement. Il régna onze ans à Jérusalem
  - type: note
    content: De 597 à 587 av. J.-C. Sur le règne de Sédécias, voir Jr 37 et 38.
  - type: text
    content: '. Sa mère s’appelait Hamoutal, elle était fille de Jérémie, de Libna. '
  '19':
  - type: text
    content: 'Il fit ce que l’Eternel considère comme mal, tout comme Yehoyaqim. '
  '2':
  - type: text
    content: 'Alors l’Eternel déchaîna contre lui des bandes de Chaldéens, des bandes de Syriens, de Moabites et d’Ammonites. Il les dressa contre le royaume de Juda pour le faire disparaître comme il l’avait annoncé par l’intermédiaire de ses serviteurs, les prophètes. '
  '20':
  - type: text
    content: Tout cela arriva parce que l’Eternel était en colère contre Jérusalem et Juda, au point de les chasser loin de lui.
  - type: text
    content: Or, Sédécias se révolta contre le roi de Babylone.
  '3':
  - type: text
    content: 'Ces malheurs arrivèrent uniquement sur l’ordre de l’Eternel, parce qu’il voulait chasser Juda loin de lui à cause de tous les péchés commis par Manassé, '
  '4':
  - type: text
    content: et parce qu’il avait tué beaucoup d’innocents dont le sang avait rempli Jérusalem. Car l’Eternel ne voulait plus pardonner
  - type: note
    content: Voir 21.10-16.
  - type: text
    content: .
  '5':
  - type: text
    content: 'Les autres faits et gestes de Yehoyaqim et toutes ses réalisations sont cités dans le livre des Annales des rois de Juda. '
  '6':
  - type: text
    content: Il rejoignit ses ancêtres décédés et son fils Yehoyakîn lui succéda sur le trône.
  '7':
  - type: text
    content: A cette époque, le roi d’Egypte cessa ses expéditions militaires, car le roi de Babylone s’était emparé de tous les territoires qui, depuis le torrent bordant la frontière nord de l’Egypte jusqu’à l’Euphrate, avaient été sous domination égyptienne.
  - type: heading
    content: Le règne de Yehoyakîn sur Juda
  - type: heading
    content: (2 Ch 36.9-10)
  '8':
  - type: text
    content: Yehoyakîn était âgé de dix-huit ans à son avènement, et il régna trois mois à Jérusalem
  - type: note
    content: Yehoyakîn est appelé Yekonia dans 1 Ch 3.16 et Konia dans Jr 22.24. Il ne régna que trois mois comme vassal du roi de Babylone (de décembre 598 à mars 597 av. J.-C.).
  - type: text
    content: '. Sa mère s’appelait Nehoushta, elle était fille d’Elnathan, de Jérusalem. '
  '9':
  - type: text
    content: Il fit ce que l’Eternel considère comme mal, tout comme son père.
  - type: heading
    content: Le siège de Jérusalem et la déportation de sa population
