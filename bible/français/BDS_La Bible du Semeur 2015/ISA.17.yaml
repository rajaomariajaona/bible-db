document_id: ISA.17,21
type_code: fra
verses:
  '1':
  - type: heading
    content: Contre Damas
  - type: text
    content: Oracle sur Damas
  - type: note
    content: Capitale de la Syrie, au nord-est du mont Hermon.
  - type: text
    content: '  :'
  - type: text
    content: Bientôt Damas ne sera plus ╵comptée parmi les villes,
  - type: text
    content: elle sera réduite ╵à un monceau de ruines.
  '10':
  - type: text
    content: Car tu as oublié ╵le Dieu qui t’a sauvé
  - type: text
    content: et tu ne t’es pas souvenu ╵du rocher qui faisait ta force.
  - type: text
    content: Ainsi tu plantes ╵des jardins de délices ╵pour tes divinités,
  - type: text
    content: tu sèmes ╵des graines étrangères.
  '11':
  - type: text
    content: Le jour où tu les sèmes, ╵les plantes sortent de la terre ;
  - type: text
    content: le lendemain matin, ╵ta semence fleurit.
  - type: text
    content: 'Mais au moment de la moisson, ╵il ne reste plus rien :'
  - type: text
    content: le mal est sans remède.
  '12':
  - type: text
    content: Oh ! Quel mugissement ╵de peuples innombrables ╵et qui mugissent
  - type: text
    content: comme mugit la mer !
  - type: text
    content: Et quel grondement des nations
  - type: text
    content: 'semblable au grondement ╵des eaux impétueuses :'
  '13':
  - type: text
    content: les nations font entendre ╵des grondements ╵pareils à ceux des grandes eaux.
  - type: text
    content: L’Eternel les menace ╵et elles fuient au loin.
  - type: text
    content: Elles sont dispersées ╵comme des brins de paille
  - type: text
    content: sur les collines par le vent,
  - type: text
    content: comme en un tourbillon ╵devant un ouragan.
  '14':
  - type: text
    content: Au soir encore, ╵c’est l’épouvante,
  - type: text
    content: mais avant le matin, ╵ils ont tous disparu.
  - type: text
    content: Tel sera le destin ╵de ceux qui nous dépouillent,
  - type: text
    content: oui, tel sera le sort ╵de tous ceux qui nous pillent.
  '2':
  - type: text
    content: Les villes d’Aroër
  - type: note
    content: 'Aroër: sur l’Arnon (Jos 13.16), à une vingtaine de kilomètres à l’est de la mer Morte, limite de la sphère d’influence de la Syrie (2 R 10.32-33).'
  - type: text
    content: ' ╵seront abandonnées'
  - type: text
    content: et livrées aux troupeaux
  - type: text
    content: qui s’y reposeront, ╵sans que nul ne les inquiète.
  '3':
  - type: text
    content: Les remparts d’Ephraïm ╵disparaîtront alors
  - type: text
    content: et il n’y aura plus ╵de royaume à Damas
  - type: note
    content: En 732 av. J.-C., Tiglath-Piléser III a pris Damas et a fait de la Syrie une province assyrienne. Il s’est aussi emparé de nombreuses villes en Israël dans les territoires de Zabulon et de Nephtali (voir 8.23).
  - type: text
    content: ','
  - type: text
    content: le reste des Syriens ╵aura le même sort ╵que les Israélites,
  - type: text
    content: l’Eternel le déclare, ╵le Seigneur des armées célestes.
  '4':
  - type: text
    content: En ce jour-là, ╵la gloire de Jacob ╵sera bien amoindrie,
  - type: text
    content: Israël perdra l’embonpoint ╵et sera amaigri.
  '5':
  - type: text
    content: Il en sera ╵comme lorsqu’on recueille ╵les blés sur pied à la moisson
  - type: text
    content: et qu’on moissonne ╵par brassées les épis,
  - type: text
    content: oui, comme on glane les épis
  - type: text
    content: dans la vallée des Rephaïm.
  '6':
  - type: text
    content: Il restera un grappillage,
  - type: text
    content: comme après le gaulage ╵des fruits de l’olivier,
  - type: text
    content: ici deux, trois olives ╵tout en haut de la cime,
  - type: text
    content: et quatre ou cinq, ╵sur les meilleures branches.
  - type: text
    content: C’est là ce que déclare ╵l’Eternel, le Dieu d’Israël.
  '7':
  - type: text
    content: En ce jour-là, ╵l’homme se tournera ╵vers celui qui l’a fait,
  - type: text
    content: et ses yeux se dirigeront ╵vers le Saint d’Israël.
  '8':
  - type: text
    content: Il ne tournera plus ╵ses yeux vers les autels
  - type: text
    content: qu’il a faits de ses mains,
  - type: text
    content: et il ne regardera plus ╵les objets que ses doigts ╵ont fabriqués,
  - type: text
    content: ni les poteaux sacrés ╵de même que les encensoirs.
  '9':
  - type: text
    content: En ce jour-là, ses villes fortifiées seront abandonnées comme autrefois les villes peuplées par les Héviens ou par les Amoréens
  - type: note
    content: 'comme autrefois… Amoréens: d’après l’ancienne version grecque. Le texte hébreu traditionnel a : comme les forêts et les sommets des montagnes. Les Amoréens et les Héviens furent combattus par Israël lors de la conquête du pays sous Josué.'
  - type: text
    content: ' furent abandonnées quand les Israélites conquirent le pays : elles seront dévastées.'
