document_id: ISA.17
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Contre Damas
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Oracle sur Damas
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '17.1 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Capitale de la Syrie, au nord-est du mont Hermon.
    marker-yv: yv-n
  - type: text
    text: '  :'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Bientôt Damas ne sera plus ╵comptée parmi les villes,
- type: usfm
  marker: q1
  children:
  - type: text
    text: elle sera réduite ╵à un monceau de ruines.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Les villes d’Aroër
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '17.2 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: Aroër
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: ': '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: sur l’Arnon (
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Jos 13.16
        metadata:
          usfm: JOS.13.16
      - type: text
        text: ), à une vingtaine de kilomètres à l’est de la mer Morte, limite de la sphère d’influence de la Syrie (
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 2 R 10.32-33
        metadata:
          usfm: 2KI.10.32+2KI.10.33
      - type: text
        text: ).
    marker-yv: yv-n
  - type: text
    text: ' ╵seront abandonnées'
- type: usfm
  marker: q1
  children:
  - type: text
    text: et livrées aux troupeaux
- type: usfm
  marker: q1
  children:
  - type: text
    text: qui s’y reposeront, ╵sans que nul ne les inquiète.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Les remparts d’Ephraïm ╵disparaîtront alors
- type: usfm
  marker: q1
  children:
  - type: text
    text: et il n’y aura plus ╵de royaume à Damas
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '17.3 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'En 732 av. J.-C., Tiglath-Piléser III a pris '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'Damas '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'et a fait de la Syrie une province assyrienne. Il s’est aussi emparé de nombreuses villes en Israël dans les territoires de Zabulon et de Nephtali (voir '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '8.23'
        metadata:
          usfm: ISA.8.23
      - type: text
        text: ).
    marker-yv: yv-n
  - type: text
    text: ','
- type: usfm
  marker: q1
  children:
  - type: text
    text: le reste des Syriens ╵aura le même sort ╵que les Israélites,
- type: usfm
  marker: q1
  children:
  - type: text
    text: l’Eternel le déclare, ╵le Seigneur des armées célestes.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: En ce jour-là, ╵la gloire de Jacob ╵sera bien amoindrie,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Israël perdra l’embonpoint ╵et sera amaigri.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Il en sera ╵comme lorsqu’on recueille ╵les blés sur pied à la moisson
- type: usfm
  marker: q1
  children:
  - type: text
    text: et qu’on moissonne ╵par brassées les épis,
- type: usfm
  marker: q1
  children:
  - type: text
    text: oui, comme on glane les épis
- type: usfm
  marker: q1
  children:
  - type: text
    text: dans la vallée des Rephaïm.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Il restera un grappillage,
- type: usfm
  marker: q1
  children:
  - type: text
    text: comme après le gaulage ╵des fruits de l’olivier,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ici deux, trois olives ╵tout en haut de la cime,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et quatre ou cinq, ╵sur les meilleures branches.
- type: usfm
  marker: q1
  children:
  - type: text
    text: C’est là ce que déclare ╵l’Eternel, le Dieu d’Israël.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: En ce jour-là, ╵l’homme se tournera ╵vers celui qui l’a fait,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et ses yeux se dirigeront ╵vers le Saint d’Israël.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Il ne tournera plus ╵ses yeux vers les autels
- type: usfm
  marker: q1
  children:
  - type: text
    text: qu’il a faits de ses mains,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et il ne regardera plus ╵les objets que ses doigts ╵ont fabriqués,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ni les poteaux sacrés ╵de même que les encensoirs.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: En ce jour-là, ses villes fortifiées seront abandonnées comme autrefois les villes peuplées par les Héviens ou par les Amoréens
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '17.9 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: comme autrefois… Amoréens
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: ': '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'd’après l’ancienne version grecque. Le texte hébreu traditionnel a : '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'comme les forêts et les sommets des montagnes. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Les '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'Amoréens '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'et les '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'Héviens '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: furent combattus par Israël lors de la conquête du pays sous Josué.
    marker-yv: yv-n
  - type: text
    text: ' furent abandonnées quand les Israélites conquirent le pays : elles seront dévastées.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Car tu as oublié ╵le Dieu qui t’a sauvé
- type: usfm
  marker: q1
  children:
  - type: text
    text: et tu ne t’es pas souvenu ╵du rocher qui faisait ta force.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ainsi tu plantes ╵des jardins de délices ╵pour tes divinités,
- type: usfm
  marker: q1
  children:
  - type: text
    text: tu sèmes ╵des graines étrangères.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Le jour où tu les sèmes, ╵les plantes sortent de la terre ;
- type: usfm
  marker: q1
  children:
  - type: text
    text: le lendemain matin, ╵ta semence fleurit.
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Mais au moment de la moisson, ╵il ne reste plus rien :'
- type: usfm
  marker: q1
  children:
  - type: text
    text: le mal est sans remède.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Oh ! Quel mugissement ╵de peuples innombrables ╵et qui mugissent
- type: usfm
  marker: q1
  children:
  - type: text
    text: comme mugit la mer !
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et quel grondement des nations
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'semblable au grondement ╵des eaux impétueuses :'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: les nations font entendre ╵des grondements ╵pareils à ceux des grandes eaux.
- type: usfm
  marker: q1
  children:
  - type: text
    text: L’Eternel les menace ╵et elles fuient au loin.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Elles sont dispersées ╵comme des brins de paille
- type: usfm
  marker: q1
  children:
  - type: text
    text: sur les collines par le vent,
- type: usfm
  marker: q1
  children:
  - type: text
    text: comme en un tourbillon ╵devant un ouragan.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Au soir encore, ╵c’est l’épouvante,
- type: usfm
  marker: q1
  children:
  - type: text
    text: mais avant le matin, ╵ils ont tous disparu.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Tel sera le destin ╵de ceux qui nous dépouillent,
- type: usfm
  marker: q1
  children:
  - type: text
    text: oui, tel sera le sort ╵de tous ceux qui nous pillent.
