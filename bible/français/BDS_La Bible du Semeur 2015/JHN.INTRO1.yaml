type_code: fra
segments:
- type: usfm
  marker: imt1
  children:
  - type: text
    text: Introduction
- type: usfm
  marker: ip
  children:
  - type: text
    text: L’auteur de cet évangile est l’apôtre Jean, le disciple et l’ami proche de Jésus. Il a probablement rédigé son évangile vers la fin du premier siècle, à Ephèse, une grande ville de l’Antiquité, située dans la Turquie actuelle.
- type: usfm
  marker: ip
  children:
  - type: text
    text: L’auteur suppose que ses lecteurs connaissent les paroles et les actes de Jésus contenus dans les trois autres évangiles, car il évite la plupart du temps de reprendre ce que Matthieu, Marc et Luc ont écrit. Il est le seul, par contre, à rapporter certains enseignements de Christ et certains événements de sa vie, comme pour compléter l’information de ses lecteurs. Il veut les convaincre que cet homme qui a vécu en Israël est bien le Messie attendu par Israël, le Fils de Dieu venu leur apporter la vie, le Sauveur du monde (4.42).
- type: usfm
  marker: ip
  children:
  - type: text
    text: 'L’originalité de l’Evangile selon Jean tient encore à sa présentation du parcours du Seigneur. Celui-ci s’orchestre autour d’un affrontement de plus en plus intense entre Christ et les hommes qui lui sont hostiles. Dès les premières interventions publiques de Jésus, un tri s’opère parmi ses auditeurs. Les uns l’écoutent ou le suivent, les autres s’étonnent et murmurent contre lui (chap. 1 à 4). Puis on assiste à une sorte de « procès » de Jésus intenté par les « responsables des Juifs » (chap. 5 à 12). Car celui qui dit être envoyé pour témoigner de « ce qu’il a vu et entendu » auprès de Dieu (3.32), proclame être plus qu’un témoin : il affirme être la Vie qui libère, la Lumière qui délivre des ténèbres, la Vérité qui affranchit du mensonge, en un mot : le Seigneur lui-même.'
- type: usfm
  marker: ip
  children:
  - type: text
    text: 'Devant de telles affirmations, on ne pouvait que condamner ou croire. La plupart ont crié au blasphème, mais plusieurs ont fait confiance à cet étonnant Messager : « Seigneur, vers qui irions-nous ? Tu as les paroles de la vie éternelle » (6.68).'
- type: usfm
  marker: ip
  children:
  - type: text
    text: 'L’affrontement qui a marqué les trois années de vie publique de Jésus culmine dans son procès fantoche et dans sa condamnation par les hommes (chap. 13 à 19). Mais celui que les incrédules ont exécuté, Dieu l’a fait revenir à la vie pour toujours. Il a ainsi prouvé son innocence, et montré que ses paroles étaient vraies. C’est pourquoi Thomas, vaincu par l’évidence, a proclamé en l’adorant : « Mon Seigneur et mon Dieu » (20.28). Jean invite ses lecteurs à en faire autant. Ces événements, dit-il, « ont été écrits pour que vous croyiez que Jésus est le Messie, le Fils de Dieu, et qu’en croyant, vous possédiez la vie en son nom » (cf. 20.31).'
