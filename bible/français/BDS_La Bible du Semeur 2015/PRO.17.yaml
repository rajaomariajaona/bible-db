document_id: PRO.17
type_code: fra
segments:
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Mieux vaut n’avoir qu’un croûton de pain sec et vivre dans la tranquillité
- type: usfm
  marker: q1
  children:
  - type: text
    text: que dans une maison où l’on festoie beaucoup tout en se querellant.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Le serviteur intelligent gouvernera le fils indigne
- type: usfm
  marker: q1
  children:
  - type: text
    text: et recevra sa part d’héritage avec les frères.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Le creuset épure l’argent, et le four l’or,
- type: usfm
  marker: q1
  children:
  - type: text
    text: mais les cœurs, c’est l’Eternel qui les éprouve.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Qui fait le mal écoute les propos des gens malfaisants,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et le menteur prête l’oreille aux langues malveillantes.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Se moquer du pauvre c’est outrager son Créateur,
- type: usfm
  marker: q1
  children:
  - type: text
    text: qui se réjouit du malheur d’autrui ne restera pas impuni.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: La couronne des vieillards, ce sont leurs petits-enfants,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et la fierté des fils, ce sont leurs pères.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Un langage distingué ne convient pas à l’insensé,
- type: usfm
  marker: q1
  children:
  - type: text
    text: combien moins le mensonge à un homme de haut rang.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Dans l’esprit de ceux qui l’utilisent, le pot-de-vin agit comme une pierre magique :'
- type: usfm
  marker: q1
  children:
  - type: text
    text: quoi qu’ils entreprennent, il doit leur assurer le succès.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Qui veut se faire aimer, pardonne les torts qu’il a subis :'
- type: usfm
  marker: q1
  children:
  - type: text
    text: les rappeler divise les amis.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Un reproche a plus d’effet sur un homme avisé
- type: usfm
  marker: q1
  children:
  - type: text
    text: que cent coups de bâton administrés à un insensé.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Le méchant ne recherche que la rébellion,
- type: usfm
  marker: q1
  children:
  - type: text
    text: mais c’est un messager sans pitié qui sera envoyé contre lui.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Mieux vaut tomber sur une ourse privée de ses petits
- type: usfm
  marker: q1
  children:
  - type: text
    text: que de rencontrer un insensé en proie à sa folie
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '17.12 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Voir 2 S 17.8 ; Os 13.8.
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Si quelqu’un rend le mal pour le bien,
- type: usfm
  marker: q1
  children:
  - type: text
    text: le malheur ne quittera plus sa demeure.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Commencer une querelle, c’est ouvrir une brèche dans une digue,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'c’est pourquoi : abandonne la partie avant qu’éclate la dispute.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Qui acquitte le coupable, qui condamne le juste,
- type: usfm
  marker: q1
  children:
  - type: text
    text: sont tous deux en horreur à l’Eternel.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: A quoi sert l’argent dans les mains d’un insensé ?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Peut-il acheter la sagesse quand il n’a pas de bon sens ?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Un ami aime en tout temps
- type: usfm
  marker: q1
  children:
  - type: text
    text: et le frère est né pour le jour où l’on se trouve dans l’adversité.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Seul un homme dépourvu d’intelligence s’engage
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '17.18 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Voir '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '6.1'
        metadata:
          usfm: PRO.6.1
      - type: text
        text: ' et note.'
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: text
    text: et se porte garant des dettes d’autrui.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Aimer les querelles, c’est aimer le péché ;
- type: usfm
  marker: q1
  children:
  - type: text
    text: qui fait l’important
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '17.19 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'En hébreu : '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'qui surélève sa porte, '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: par orgueil, soit pour avoir une maison plus grande que les autres, soit, au figuré, pour s’élever au-dessus des autres.
    marker-yv: yv-n
  - type: text
    text: ', cherche sa ruine.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: L’homme au cœur tortueux ne trouvera pas le bonheur,
- type: usfm
  marker: q1
  children:
  - type: text
    text: qui manie une langue perfide tombera dans le malheur.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Qui donne naissance à un fils insensé en aura du chagrin,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et le père d’un sot n’aura pas de quoi se réjouir.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: Un cœur joyeux est un excellent remède,
- type: usfm
  marker: q1
  children:
  - type: text
    text: mais l’esprit déprimé mine la santé.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: L’homme corrompu accepte des cadeaux sous le manteau
- type: usfm
  marker: q1
  children:
  - type: text
    text: pour fausser le cours de la justice.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: L’homme avisé a les yeux fixés sur la sagesse,
- type: usfm
  marker: q1
  children:
  - type: text
    text: mais les regards de l’insensé se portent au bout du monde.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: Un fils insensé fait le chagrin de son père
- type: usfm
  marker: q1
  children:
  - type: text
    text: et rend la vie amère à celle qui l’a enfanté.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: Il n’est pas bon de faire payer au juste une amende
- type: usfm
  marker: q1
  children:
  - type: text
    text: ni de frapper de nobles dirigeants à l’encontre du droit.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: L’homme qui a de bonnes connaissances limite ses paroles,
- type: usfm
  marker: q1
  children:
  - type: text
    text: qui garde son sang-froid est intelligent.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: Le sot lui-même passe pour sage s’il sait se taire ;
- type: usfm
  marker: q1
  children:
  - type: text
    text: qui tient sa bouche close est intelligent.
