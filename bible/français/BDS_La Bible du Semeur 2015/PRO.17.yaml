document_id: PRO.17,21
type_code: fra
verses:
  '1':
  - type: text
    content: Mieux vaut n’avoir qu’un croûton de pain sec et vivre dans la tranquillité
  - type: text
    content: que dans une maison où l’on festoie beaucoup tout en se querellant.
  '10':
  - type: text
    content: Un reproche a plus d’effet sur un homme avisé
  - type: text
    content: que cent coups de bâton administrés à un insensé.
  '11':
  - type: text
    content: Le méchant ne recherche que la rébellion,
  - type: text
    content: mais c’est un messager sans pitié qui sera envoyé contre lui.
  '12':
  - type: text
    content: Mieux vaut tomber sur une ourse privée de ses petits
  - type: text
    content: que de rencontrer un insensé en proie à sa folie
  - type: note
    content: Voir 2 S 17.8 ; Os 13.8.
  - type: text
    content: .
  '13':
  - type: text
    content: Si quelqu’un rend le mal pour le bien,
  - type: text
    content: le malheur ne quittera plus sa demeure.
  '14':
  - type: text
    content: Commencer une querelle, c’est ouvrir une brèche dans une digue,
  - type: text
    content: 'c’est pourquoi : abandonne la partie avant qu’éclate la dispute.'
  '15':
  - type: text
    content: Qui acquitte le coupable, qui condamne le juste,
  - type: text
    content: sont tous deux en horreur à l’Eternel.
  '16':
  - type: text
    content: A quoi sert l’argent dans les mains d’un insensé ?
  - type: text
    content: Peut-il acheter la sagesse quand il n’a pas de bon sens ?
  '17':
  - type: text
    content: Un ami aime en tout temps
  - type: text
    content: et le frère est né pour le jour où l’on se trouve dans l’adversité.
  '18':
  - type: text
    content: Seul un homme dépourvu d’intelligence s’engage
  - type: note
    content: Voir 6.1 et note.
  - type: text
    content: et se porte garant des dettes d’autrui.
  '19':
  - type: text
    content: Aimer les querelles, c’est aimer le péché ;
  - type: text
    content: qui fait l’important
  - type: note
    content: 'En hébreu : qui surélève sa porte, par orgueil, soit pour avoir une maison plus grande que les autres, soit, au figuré, pour s’élever au-dessus des autres.'
  - type: text
    content: ', cherche sa ruine.'
  '2':
  - type: text
    content: Le serviteur intelligent gouvernera le fils indigne
  - type: text
    content: et recevra sa part d’héritage avec les frères.
  '20':
  - type: text
    content: L’homme au cœur tortueux ne trouvera pas le bonheur,
  - type: text
    content: qui manie une langue perfide tombera dans le malheur.
  '21':
  - type: text
    content: Qui donne naissance à un fils insensé en aura du chagrin,
  - type: text
    content: et le père d’un sot n’aura pas de quoi se réjouir.
  '22':
  - type: text
    content: Un cœur joyeux est un excellent remède,
  - type: text
    content: mais l’esprit déprimé mine la santé.
  '23':
  - type: text
    content: L’homme corrompu accepte des cadeaux sous le manteau
  - type: text
    content: pour fausser le cours de la justice.
  '24':
  - type: text
    content: L’homme avisé a les yeux fixés sur la sagesse,
  - type: text
    content: mais les regards de l’insensé se portent au bout du monde.
  '25':
  - type: text
    content: Un fils insensé fait le chagrin de son père
  - type: text
    content: et rend la vie amère à celle qui l’a enfanté.
  '26':
  - type: text
    content: Il n’est pas bon de faire payer au juste une amende
  - type: text
    content: ni de frapper de nobles dirigeants à l’encontre du droit.
  '27':
  - type: text
    content: L’homme qui a de bonnes connaissances limite ses paroles,
  - type: text
    content: qui garde son sang-froid est intelligent.
  '28':
  - type: text
    content: Le sot lui-même passe pour sage s’il sait se taire ;
  - type: text
    content: qui tient sa bouche close est intelligent.
  '3':
  - type: text
    content: Le creuset épure l’argent, et le four l’or,
  - type: text
    content: mais les cœurs, c’est l’Eternel qui les éprouve.
  '4':
  - type: text
    content: Qui fait le mal écoute les propos des gens malfaisants,
  - type: text
    content: et le menteur prête l’oreille aux langues malveillantes.
  '5':
  - type: text
    content: Se moquer du pauvre c’est outrager son Créateur,
  - type: text
    content: qui se réjouit du malheur d’autrui ne restera pas impuni.
  '6':
  - type: text
    content: La couronne des vieillards, ce sont leurs petits-enfants,
  - type: text
    content: et la fierté des fils, ce sont leurs pères.
  '7':
  - type: text
    content: Un langage distingué ne convient pas à l’insensé,
  - type: text
    content: combien moins le mensonge à un homme de haut rang.
  '8':
  - type: text
    content: 'Dans l’esprit de ceux qui l’utilisent, le pot-de-vin agit comme une pierre magique :'
  - type: text
    content: quoi qu’ils entreprennent, il doit leur assurer le succès.
  '9':
  - type: text
    content: 'Qui veut se faire aimer, pardonne les torts qu’il a subis :'
  - type: text
    content: les rappeler divise les amis.
