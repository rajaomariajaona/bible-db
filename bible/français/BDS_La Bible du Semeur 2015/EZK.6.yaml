document_id: EZK.6,21
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: La fin du pays
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'L’Eternel m’adressa la parole en ces termes :'
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'et ils reconnaîtront que je suis l’Eternel : que ce n’est pas en vain que j’ai parlé de leur causer ce malheur.'
  - type: usfm
    marker: s2
    children:
    - type: text
      text: Hélas ! Hélas !
    marker-yv: yv-h
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Voici ce que déclare le Seigneur, l’Eternel : Va, frappe dans ta main, tape du pied et dis : Hélas, pour tout le mal abominable commis par les gens d’Israël qui sont près de tomber dévorés par l’épée, la famine et la peste. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Celui qui sera loin périra de la peste, celui qui sera près tombera par l’épée. Celui qui restera, qui aura été préservé jusque-là, mourra par la famine, et toute ma colère s’assouvira sur eux ; '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'et vous reconnaîtrez que je suis l’Eternel, quand leurs blessés tomberont au beau milieu de leurs idoles, autour de leurs autels, sur toute colline élevée, jusque sur les sommets des montagnes, sous tous les arbres verts et sous tout chêne verdoyant, ces endroits où ils offrent un parfum apaisant à toutes leurs idoles. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Je brandirai ma main contre eux, je dévasterai leur pays pour en faire une solitude, du désert à Ribla
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '6.14 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Ribla
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: ': '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'd’après quelques manuscrits hébreux. La plupart des manuscrits ont : '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'Dibla, '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'localité inconnue. Le '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'd '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'et le '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'r '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'hébreux diffèrent très peu. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'Ribla '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: se situe au nord de Damas, sur l’Oronte.
      marker-yv: yv-n
    - type: text
      text: ', partout où ils habitent, et ils reconnaîtront que je suis l’Eternel.'
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fils d’homme, tourne-toi en direction des montagnes d’Israël, et prophétise contre elles '
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'en disant : Montagnes d’Israël, écoutez la parole du Seigneur l’Eternel ! Car voici ce que dit le Seigneur, l’Eternel, aux monts et aux collines, aux vallées, aux ravins : Je vais faire venir l’épée contre vous et je détruirai vos hauts lieux. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Vos autels seront dévastés, vos encensoirs seront réduits en pièces, et je ferai tomber vos blessés devant vos idoles. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: J’étendrai les cadavres des Israélites devant les statues de vos dieux, et je disperserai vos os autour de vos autels
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '6.5 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Voir 2 R 23.14-16 ; Jr 36.30.
      marker-yv: yv-n
    - type: text
      text: '. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Sur toute l’étendue de votre territoire, les villes seront dévastées et les hauts lieux détruits afin que vos autels soient démolis, que vos idoles soient brisées et anéanties, et que vos encensoirs soient cassés et qu’il ne reste rien de tout ce que vous avez fait. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Au milieu de vous, des blessés tomberont, et vous reconnaîtrez que je suis l’Eternel.
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Mais je vous laisserai un reste d’entre vous : des rescapés de l’épée qui survivront parmi les autres peuples, ils seront dispersés dans différents pays. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Et parmi ces peuples qui les retiendront captifs, vos rescapés se souviendront de moi, car je briserai leur cœur prostitué
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '6.9 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: car je briserai leur cœur prostitué
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: ': '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'd’après certains manuscrits de la version grecque. Le texte hébreu traditionnel a : '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: qui ai été brisé par leur cœur prostitué.
      marker-yv: yv-n
    - type: text
      text: ' qui s’est détourné de moi, et les yeux adultères qui se sont tournés vers leurs idoles. Ils se prendront alors eux-mêmes en dégoût pour le mal qu’ils ont fait et pour toutes leurs abominations '
