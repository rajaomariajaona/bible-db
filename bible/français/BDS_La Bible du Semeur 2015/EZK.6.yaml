document_id: EZK.6,21
type_code: fra
verses:
  '1':
  - type: heading
    content: La fin du pays
  - type: text
    content: 'L’Eternel m’adressa la parole en ces termes :'
  '10':
  - type: text
    content: 'et ils reconnaîtront que je suis l’Eternel : que ce n’est pas en vain que j’ai parlé de leur causer ce malheur.'
  - type: heading
    content: Hélas ! Hélas !
  '11':
  - type: text
    content: 'Voici ce que déclare le Seigneur, l’Eternel : Va, frappe dans ta main, tape du pied et dis : Hélas, pour tout le mal abominable commis par les gens d’Israël qui sont près de tomber dévorés par l’épée, la famine et la peste. '
  '12':
  - type: text
    content: 'Celui qui sera loin périra de la peste, celui qui sera près tombera par l’épée. Celui qui restera, qui aura été préservé jusque-là, mourra par la famine, et toute ma colère s’assouvira sur eux ; '
  '13':
  - type: text
    content: 'et vous reconnaîtrez que je suis l’Eternel, quand leurs blessés tomberont au beau milieu de leurs idoles, autour de leurs autels, sur toute colline élevée, jusque sur les sommets des montagnes, sous tous les arbres verts et sous tout chêne verdoyant, ces endroits où ils offrent un parfum apaisant à toutes leurs idoles. '
  '14':
  - type: text
    content: Je brandirai ma main contre eux, je dévasterai leur pays pour en faire une solitude, du désert à Ribla
  - type: note
    content: 'Ribla: d’après quelques manuscrits hébreux. La plupart des manuscrits ont : Dibla, localité inconnue. Le d et le r hébreux diffèrent très peu. Ribla se situe au nord de Damas, sur l’Oronte.'
  - type: text
    content: ', partout où ils habitent, et ils reconnaîtront que je suis l’Eternel.'
  '2':
  - type: text
    content: 'Fils d’homme, tourne-toi en direction des montagnes d’Israël, et prophétise contre elles '
  '3':
  - type: text
    content: 'en disant : Montagnes d’Israël, écoutez la parole du Seigneur l’Eternel ! Car voici ce que dit le Seigneur, l’Eternel, aux monts et aux collines, aux vallées, aux ravins : Je vais faire venir l’épée contre vous et je détruirai vos hauts lieux. '
  '4':
  - type: text
    content: 'Vos autels seront dévastés, vos encensoirs seront réduits en pièces, et je ferai tomber vos blessés devant vos idoles. '
  '5':
  - type: text
    content: J’étendrai les cadavres des Israélites devant les statues de vos dieux, et je disperserai vos os autour de vos autels
  - type: note
    content: Voir 2 R 23.14-16 ; Jr 36.30.
  - type: text
    content: '. '
  '6':
  - type: text
    content: 'Sur toute l’étendue de votre territoire, les villes seront dévastées et les hauts lieux détruits afin que vos autels soient démolis, que vos idoles soient brisées et anéanties, et que vos encensoirs soient cassés et qu’il ne reste rien de tout ce que vous avez fait. '
  '7':
  - type: text
    content: Au milieu de vous, des blessés tomberont, et vous reconnaîtrez que je suis l’Eternel.
  '8':
  - type: text
    content: 'Mais je vous laisserai un reste d’entre vous : des rescapés de l’épée qui survivront parmi les autres peuples, ils seront dispersés dans différents pays. '
  '9':
  - type: text
    content: Et parmi ces peuples qui les retiendront captifs, vos rescapés se souviendront de moi, car je briserai leur cœur prostitué
  - type: note
    content: 'car je briserai leur cœur prostitué: d’après certains manuscrits de la version grecque. Le texte hébreu traditionnel a : qui ai été brisé par leur cœur prostitué.'
  - type: text
    content: ' qui s’est détourné de moi, et les yeux adultères qui se sont tournés vers leurs idoles. Ils se prendront alors eux-mêmes en dégoût pour le mal qu’ils ont fait et pour toutes leurs abominations '
