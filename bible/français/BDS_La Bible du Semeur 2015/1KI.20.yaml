document_id: 1KI.20,21
type_code: fra
verses:
  '1':
  - type: heading
    content: Les Syriens assiègent Samarie
  - type: text
    content: Ben-Hadad, roi de Syrie
  - type: note
    content: Il s’agit probablement de Ben-Hadad II, fils ou petit-fils de Ben-Hadad Ier (900 à 895 av. J.-C. ; voir 15.9-10, 18-20), père ou ascendant de Ben-Hadad III (2 R 13.3). Les événements de ce chapitre, qui se sont déroulés sur une période de deux ans (v. 21-22), se situent aux environs de l’année 857 et précèdent trois années de paix entre Israël et la Syrie (22.1). Achab mourut à la fin de ces années (22.37).
  - type: text
    content: ', mobilisa toute son armée et, assisté de trente-deux rois alliés'
  - type: note
    content: Des roitelets locaux, vassaux de Ben-Hadad, qui lui devaient le tribut et l’assistance militaire.
  - type: text
    content: ', de chevaux et de chars de guerre, il alla assiéger la ville de Samarie'
  - type: note
    content: Capitale du royaume du Nord depuis Omri (16.24).
  - type: text
    content: ' et se prépara à lui donner l’assaut. '
  '10':
  - type: text
    content: 'Alors Ben-Hadad envoya ce message au roi Achab : Que les dieux me punissent très sévèrement, si je laisse subsister de Samarie assez de poussière pour remplir les mains de tous les guerriers qui me suivent.'
  '11':
  - type: text
    content: 'Mais le roi d’Israël dit aux messagers : Allez donc lui dire : « Que celui qui part au combat ne se vante pas comme celui qui en revient ! »'
  '12':
  - type: text
    content: Lorsque Ben-Hadad entendit cette réponse, il était en train de boire avec les rois alliés sous les tentes
  - type: note
    content: 'Autre traduction : à Soukkot. De même au v. 16.'
  - type: text
    content: '. Il commanda à ses officiers : En position pour l’attaque !'
  - type: text
    content: Et ils disposèrent leurs troupes pour donner l’assaut à la ville.
  - type: heading
    content: L’intervention d’un prophète et victoire d’Israël
  '13':
  - type: text
    content: 'A ce moment, un prophète vint trouver Achab, le roi d’Israël, et lui dit : Voici ce que déclare l’Eternel : « As-tu vu cette immense armée ? Je vais la livrer aujourd’hui en ton pouvoir, ainsi tu sauras que je suis l’Eternel. »'
  '14':
  - type: text
    content: 'Achab demanda : Par qui l’Eternel la livrera-t-il ?'
  - type: text
    content: 'Il répondit : Voici ce que déclare l’Eternel : « Je la livrerai par les jeunes recrues des chefs des provinces. »'
  - type: text
    content: 'Achab demanda encore : Et qui devra engager le combat ?'
  - type: text
    content: 'Le prophète répondit : C’est toi.'
  '15':
  - type: text
    content: Alors Achab passa en revue les jeunes recrues des chefs des provinces, et il s’en trouva 232. Puis il recensa aussi toute l’armée des Israélites, et ils étaient sept mille.
  '16':
  - type: text
    content: 'Ils firent une sortie à midi : Ben-Hadad était en train de s’enivrer sous les tentes avec les trente-deux rois venus à son aide.'
  '17':
  - type: text
    content: 'Les jeunes recrues des chefs des provinces sortirent les premiers. Ben-Hadad envoya des hommes voir ce qui se passait. On lui fit ce rapport : Des hommes sont sortis de Samarie.'
  '18':
  - type: text
    content: – Que ce soit pour demander la paix ou au contraire pour nous attaquer qu’ils sont sortis, amenez-les-moi vivants !
  '19':
  - type: text
    content: 'Les recrues et l’armée qui les suivait sortirent de la ville. '
  '2':
  - type: text
    content: 'Avant cela, il envoya dans la ville des messagers à Achab, le roi d’Israël : '
  '20':
  - type: text
    content: 'Chacun s’acharna contre un adversaire et l’abattit, si bien que les Syriens prirent la fuite. Les Israélites se lancèrent à leur poursuite. Ben-Hadad, le roi de Syrie, se sauva sur un cheval avec d’autres cavaliers. '
  '21':
  - type: text
    content: Le roi d’Israël lança le gros de ses troupes et extermina les chevaux et les chars ennemis. Il fit subir une grande défaite aux Syriens.
  - type: heading
    content: La nouvelle victoire d’Israël
  '22':
  - type: text
    content: 'Alors le prophète vint trouver le roi d’Israël et lui dit : Va de l’avant avec courage, fortifie tes positions, examine et réfléchis à ce que tu dois faire, car l’année prochaine à la même époque, le roi de Syrie reviendra t’attaquer.'
  '23':
  - type: text
    content: 'Les ministres du roi de Syrie lui dirent : Leur Dieu est un Dieu des montagnes, c’est pourquoi ils nous ont vaincus. Attaquons-les en plaine et, sûrement, nous l’emporterons sur eux. '
  '24':
  - type: text
    content: 'Voici donc ce que tu devrais faire. Destitue tous ces rois de leurs postes et remplace-les par des gouverneurs. '
  '25':
  - type: text
    content: Ensuite, recrute une armée aussi nombreuse que celle que tu as perdue, avec autant de chevaux et de chars. Puis nous les combattrons dans la plaine et, certainement, nous les vaincrons.
  - type: text
    content: Ben-Hadad suivit leur conseil et fit tout ce qu’ils lui avaient proposé.
  '26':
  - type: text
    content: L’année suivante, à la même époque, il passa les Syriens en revue et s’avança jusqu’à la ville d’Apheq
  - type: note
    content: Plusieurs villes israélites portent ce nom. Celle dont il est question est probablement située à l’est du lac de Galilée qu’elle domine.
  - type: text
    content: ' pour attaquer Israël. '
  '27':
  - type: text
    content: De leur côté, les Israélites furent aussi passés en revue et, pourvus de ravitaillement, ils se préparèrent à les affronter. Ils établirent leur camp en face d’eux, mais leurs troupes ressemblaient à deux petits troupeaux de chèvres, alors que les Syriens couvraient toute la plaine.
  '28':
  - type: text
    content: 'Alors l’homme de Dieu vint trouver le roi d’Israël et lui dit : Voici ce que déclare l’Eternel : « Les Syriens prétendent que je suis un Dieu des montagnes et non pas un Dieu des plaines. A cause de cela, je livrerai toute cette immense multitude en ton pouvoir. Ainsi vous saurez que je suis l’Eternel. »'
  '29':
  - type: text
    content: 'Pendant sept jours, les deux armées campèrent l’une en face de l’autre. Le septième jour, la bataille s’engagea, et les Israélites tuèrent cent mille fantassins syriens en un seul jour. '
  '3':
  - type: text
    content: 'il lui fit dire : Voici un message de la part de Ben-Hadad : « Livre-moi ton argent et ton or, ainsi que tes femmes et les plus vigoureux de tes fils. »'
  '30':
  - type: text
    content: Les survivants s’enfuirent à la ville d’Apheq où le rempart s’écroula sur vingt-sept mille rescapés.
  - type: heading
    content: Achab fait alliance avec le roi de Syrie
  - type: text
    content: 'Ben-Hadad s’était enfui et réfugié dans la ville et il s’y cachait en passant de chambre en chambre. '
  '31':
  - type: text
    content: 'Les ministres lui dirent : Ecoute, nous avons entendu dire que les rois d’Israël sont des rois pleins de bienveillance. Permets-nous de nous revêtir des habits de toile de sac et d’entourer nos têtes de cordes'
  - type: note
    content: En signe de soumission.
  - type: text
    content: . Nous nous rendrons au roi d’Israël, et peut-être te laissera-t-il la vie sauve.
  '32':
  - type: text
    content: 'Ils revêtirent donc des habits de toile de sac et mirent des cordes autour de leurs têtes, puis ils se rendirent chez le roi d’Israël et lui dirent : Ton serviteur Ben-Hadad te fait dire : « Laisse-moi la vie sauve ! »'
  - type: text
    content: 'Achab leur demanda : Il est donc encore vivant ? Eh bien, il sera mon allié.'
  '33':
  - type: text
    content: Ces hommes prirent cette parole comme un signe favorable et s’empressèrent de prendre Achab au mot.
  - type: text
    content: – Oui, lui dirent-ils, Ben-Hadad sera ton allié !
  - type: text
    content: 'Achab ordonna : Allez le chercher !'
  - type: text
    content: 'Ben-Hadad sortit de sa cachette et vint se présenter à lui. Achab le fit monter sur son char. '
  '34':
  - type: text
    content: 'Ben-Hadad lui dit : Je te restituerai les villes que mon père a prises à ton père, et tu pourras établir des comptoirs à Damas, comme mon père en avait installés à Samarie.'
  - type: text
    content: – Et moi, reprit Achab, je te rendrai la liberté et je conclurai une alliance avec toi.
  - type: text
    content: Il conclut donc une alliance avec lui et le laissa repartir libre.
  - type: heading
    content: Un disciple des prophètes reproche cette alliance à Achab
  '35':
  - type: text
    content: Sur ordre de l’Eternel, l’un des disciples des prophètes demanda à son compagnon de le frapper. Mais cet homme refusa de le frapper.
  '36':
  - type: text
    content: – Eh bien, lui dit le premier, puisque tu n’as pas obéi à l’ordre de l’Eternel, un lion t’attaquera et te frappera lorsque tu m’auras quitté.
  - type: text
    content: En effet, quand il l’eut quitté, un lion se jeta sur lui et le frappa.
  '37':
  - type: text
    content: Le premier alla trouver un autre homme et lui adressa la même demande. Cet homme le frappa et le blessa.
  '38':
  - type: text
    content: Alors le disciple des prophètes, après s’être rendu méconnaissable en se mettant un bandeau sur les yeux, alla se poster sur le chemin que le roi devait prendre.
  '39':
  - type: text
    content: 'Lorsque le roi passa, il lui cria : Ton serviteur a pris part au combat. Pendant la bataille, un homme a quitté les rangs et m’a amené un prisonnier en disant : « Surveille-moi cet homme, si tu le laisses s’échapper, tu prendras sa place, ou bien tu devras me verser trois mille pièces d’argent ! » '
  '4':
  - type: text
    content: 'Le roi d’Israël répondit : A tes ordres, mon seigneur le roi, je me livre à toi avec tout ce qui m’appartient.'
  '40':
  - type: text
    content: Or, pendant que j’étais occupé ça et là, le prisonnier a disparu.
  - type: text
    content: 'Le roi d’Israël lui dit : Tu as prononcé toi-même le verdict !'
  '41':
  - type: text
    content: 'Aussitôt le disciple des prophètes enleva le bandeau qui lui masquait les yeux, et le roi d’Israël reconnut que c’était un des disciples des prophètes. '
  '42':
  - type: text
    content: 'Il dit alors au roi : Voici ce que déclare l’Eternel : Tu as laissé échapper d’entre tes mains l’homme que je m’étais voué. C’est pourquoi tu prendras sa place et ton peuple périra à la place du sien.'
  '43':
  - type: text
    content: Le roi d’Israël s’en retourna chez lui maussade et abattu. C’est ainsi qu’il regagna Samarie.
  '5':
  - type: text
    content: 'Les messagers vinrent de nouveau et dirent : Voici un message de la part de Ben-Hadad : « Je t’ai envoyé l’ordre de me livrer ton argent et ton or, tes femmes et tes fils. '
  '6':
  - type: text
    content: J’enverrai donc demain à cette heure-ci mes officiers chez toi ; ils fouilleront ta maison et celles de tes hauts fonctionnaires, ils prendront tout ce qui a de la valeur à tes yeux et l’emporteront. »
  '7':
  - type: text
    content: 'Alors le roi d’Israël convoqua tous les responsables du pays et leur dit : Vous pouvez constater que cet homme nous veut du mal, car il m’a fait réclamer mes femmes et mes fils, mon argent et mon or, et je ne lui avais rien refusé !'
  '8':
  - type: text
    content: 'Tous les responsables et tout le peuple dirent à Achab : Ne l’écoute pas ! N’accepte pas !'
  '9':
  - type: text
    content: 'Alors Achab répondit aux messagers de Ben-Hadad : Dites à mon seigneur le roi : « Je ferai tout ce que tu as fait demander à ton serviteur la première fois, mais je ne puis céder à tes nouvelles exigences. »'
  - type: text
    content: Les messagers allèrent rapporter cette réponse à leur maître.
