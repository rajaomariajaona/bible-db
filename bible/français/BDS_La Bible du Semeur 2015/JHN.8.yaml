document_id: JHN.8
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: « Va et ne pèche plus »
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Quant à Jésus, il partit pour le mont des Oliviers. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Mais le lendemain, il revint de bonne heure dans la cour du Temple et tout le peuple se pressa autour de lui ; alors il s’assit et se mit à enseigner.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Tout à coup, les spécialistes de la Loi et les pharisiens traînèrent devant lui une femme qui avait été prise en flagrant délit d’adultère. Ils la firent avancer dans la foule et la placèrent, bien en vue, devant Jésus.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: '– Maître, lui dirent-ils, cette femme a commis un adultère ; elle a été prise sur le fait. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Or, dans la Loi, Moïse nous a ordonné de lapider les femmes de ce genre. Toi, quel est ton jugement sur ce cas ?
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: En lui posant cette question, ils voulaient lui tendre un piège, dans l’espoir de trouver quelque prétexte pour l’accuser.
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Mais Jésus se baissa et se mit à écrire du doigt sur le sol. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Eux, ils insistaient, répétant leur question. Alors il se releva et leur dit : '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Que celui d’entre vous qui n’a jamais péché lui jette la première pierre !
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Puis il se baissa de nouveau et se remit à écrire sur le sol. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Après avoir entendu ces paroles, ils s’esquivèrent l’un après l’autre, à commencer par les plus âgés, laissant finalement Jésus seul avec la femme, qui était restée au milieu de la cour du Temple. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Alors Jésus leva la tête et lui dit : '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Eh bien, où sont donc passés tes accusateurs ? Personne ne t’a condamnée ?
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: – Personne, Seigneur, lui répondit-elle.
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Alors Jésus reprit : '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Je ne te condamne pas non plus. Va, mais désormais, ne pèche plus
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '8.11 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Les versets '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '7.53'
        metadata:
          usfm: JHN.7.53
      - type: text
        text: ' à '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '8.11'
        metadata:
          usfm: JHN.8.11
      - type: text
        text: ' sont absents de nombreux manuscrits, parmi lesquels les plus anciens et les meilleurs. Ce passage figure cependant à cet endroit dans un certain nombre de manuscrits. Quelques manuscrits l’incorporent ailleurs dans l’évangile de Jean (après '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '7.36'
        metadata:
          usfm: JHN.7.36
      - type: text
        text: ' ou après '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '21.25'
        metadata:
          usfm: JHN.21.25
      - type: text
        text: '), ou encore dans l’évangile de Luc (après '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Lc 21.38
        metadata:
          usfm: LUK.21.38
      - type: text
        text: ' ou après '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Lc 24.53
        metadata:
          usfm: LUK.24.53
      - type: text
        text: '). Au témoignage concluant des manuscrits, on peut ajouter que ce passage paraît rompre le fil du récit, alors que celui-ci passe naturellement du verset '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '7.52'
        metadata:
          usfm: JHN.7.52
      - type: text
        text: ' à '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '8.12'
        metadata:
          usfm: JHN.8.12
      - type: text
        text: . Le passage reprend sans doute une tradition ancienne et l’épisode relaté peut fort bien être authentique, mais ces versets ne faisaient vraisemblablement pas partie de l’évangile de Jean à l’origine.
    marker-yv: yv-n
  - type: usfm
    marker: wj
    children:
    - type: text
      text: .
  - type: text
    text: ']'
- type: usfm
  marker: s1
  children:
  - type: text
    text: La lumière du monde
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Jésus parla de nouveau en public : '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Moi, je suis la lumière du monde,
  - type: text
    text: ' dit-il. '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'Celui qui me suit ne marchera pas dans les ténèbres : il aura la lumière de la vie.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Là-dessus les pharisiens lui répondirent : Tu te rends témoignage à toi-même : ton témoignage n’est pas vrai.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Jésus leur répondit : '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'Oui, je me rends témoignage à moi-même : mais mon témoignage est vrai, car je sais d’où je suis venu et où je vais ; quant à vous, vous ne savez pas d’où je viens ni où je vais.'
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Vous jugez selon des critères purement humains, moi, je ne juge personne.
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Et à supposer que je porte un jugement, ce jugement est vrai, car je ne suis pas seul pour juger, mais avec moi, il y a aussi le Père qui m’a envoyé.
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'Le témoignage commun de deux personnes n’est-il pas vrai ? C’est ce qui est écrit dans votre '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Loi
    - type: text
      text: '  !'
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Eh bien, moi, je suis mon propre témoin ; et le Père qui m’a envoyé me rend aussi témoignage.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: – Mais, où est-il, ton père ? s’exclamèrent-ils.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: wj
    children:
    - type: text
      text: – Vous ne connaissez ni moi, ni mon Père,
  - type: text
    text: ' répliqua Jésus ; '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: si vous m’aviez connu, vous connaîtriez aussi mon Père.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Jésus parla ainsi pendant qu’il enseignait dans la cour du Temple près des troncs à offrandes, et personne n’essaya de l’arrêter, parce que son heure n’était pas encore venue.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Celui qui est
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Jésus leur dit encore : '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Je vais m’en aller et vous me chercherez ; mais vous mourrez dans votre péché. Vous ne pouvez pas aller là où je vais.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Sur quoi ils se demandèrent entre eux : Aurait-il l’intention de se suicider ? Est-ce là ce qu’il veut dire par ces paroles : '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: « Vous ne pouvez pas aller là où je vais ? »
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: ' '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: – Vous,
  - type: text
    text: ' leur dit-il '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: alors, vous êtes d’ici-bas ; moi, je suis d’en haut. Vous appartenez à ce monde-ci ; moi, je ne lui appartiens pas.
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'C’est pourquoi je vous ai dit : « Vous mourrez dans vos péchés. » En effet, si vous ne croyez pas que '
    - type: usfm
      marker: qt
      children:
      - type: text
        text: moi, je suis
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '8.24 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Allusion à l’épisode du buisson ardent (
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ex 3.14
        metadata:
          usfm: EXO.3.14
      - type: text
        text: ') où Dieu s’est défini en disant : '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'je suis celui qui est, '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'ou : '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'je suis : Je suis. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Voir v. 28, 58.
    marker-yv: yv-n
  - type: usfm
    marker: wj
    children:
    - type: text
      text: ', vous mourrez dans vos péchés.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: – Qui es-tu donc ? lui demandèrent-ils alors.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: wj
    children:
    - type: text
      text: – Je ne cesse de vous le dire depuis le début
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '8.25 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Autres traductions : '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'd’abord, pourquoi vous parlerai-je ? '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'ou '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: précisément ce que je vous dis.
    marker-yv: yv-n
  - type: usfm
    marker: wj
    children:
    - type: text
      text: '!'
  - type: text
    text: ' leur répondit Jésus. '
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: En ce qui vous concerne, j’aurais beaucoup à dire, beaucoup à juger. Mais celui qui m’a envoyé est véridique, et je proclame au monde ce que j’ai appris de lui.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'Comme ils ne comprenaient pas que Jésus leur parlait du Père, il ajouta : '
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'Quand vous aurez élevé le '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Fils de l’homme
    - type: text
      text: ', alors vous comprendrez que moi, je suis'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '8.28 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Voir note v. 24.
    marker-yv: yv-n
  - type: usfm
    marker: wj
    children:
    - type: text
      text: . Vous reconnaîtrez que je ne fais rien de ma propre initiative, mais que je transmets ce que le Père m’a enseigné.
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Oui, celui qui m’a envoyé est avec moi ; il ne m’a pas laissé seul, car je fais toujours ce qui lui est agréable.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: Pendant qu’il parlait ainsi, beaucoup crurent en lui.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Les vrais fils d’Abraham
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'Alors Jésus dit aux Juifs qui avaient mis leur foi en lui : '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'Si vous vous attachez à la Parole que je vous ai annoncée, vous êtes vraiment mes '
    - type: usfm
      marker: w
      children:
      - type: text
        text: disciples
    - type: text
      text: .
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '32'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Vous connaîtrez la vérité, et la vérité fera de vous des hommes libres.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '33'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: – Nous, lui répondirent-ils, nous sommes la postérité d’Abraham
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '8.33 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Le premier des patriarches, dont descendent tous les Israélites.
    marker-yv: yv-n
  - type: text
    text: ', nous n’avons jamais été esclaves de personne. Comment peux-tu dire : « Vous serez des hommes libres ? »'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '34'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: ' '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: – Vraiment, je vous l’assure,
  - type: text
    text: ' leur répondit Jésus, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: tout homme qui commet le péché est esclave du péché.
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '35'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Or, un esclave ne fait pas partie de la famille, un fils, lui, en fait partie pour toujours.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '36'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: ' '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Si donc c’est le Fils qui vous donne la liberté, alors vous serez vraiment libres.
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '37'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Je sais que vous êtes les descendants d’Abraham. Pourtant, vous cherchez à me faire mourir parce que ma parole ne trouve aucun accès dans votre cœur.
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '38'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Moi, je parle de ce que j’ai vu chez mon Père. Quant à vous, vous faites ce que vous avez appris de votre père.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '39'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '39'
  - type: text
    text: – Notre père à nous, répondirent-ils, c’est Abraham.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: wj
    children:
    - type: text
      text: – Eh bien,
  - type: text
    text: ' leur répliqua Jésus, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: si vous étiez vraiment des enfants d’Abraham, vous agiriez comme lui
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '8.39 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Certains manuscrits ont : '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: si vous êtes vraiment des fils d’Abraham, agissez comme lui.
    marker-yv: yv-n
  - type: usfm
    marker: wj
    children:
    - type: text
      text: .
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '40'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '40'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Au lieu de cela, vous cherchez à me faire mourir. Pourquoi ? Parce que je vous dis la vérité telle que je l’ai apprise de Dieu. Jamais Abraham n’a agi comme vous.
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '41'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '41'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Vous agissez exactement comme votre père à vous !
- type: usfm
  marker: p
  children:
  - type: text
    text: '– Mais, répondirent-ils, nous ne sommes pas des enfants illégitimes. Nous n’avons qu’un seul Père : Dieu !'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '42'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '42'
  - type: text
    text: ' '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: – Si vraiment Dieu était votre Père,
  - type: text
    text: ' leur dit Jésus, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: vous m’aimeriez, car c’est de Dieu que je proviens, c’est de Dieu que je suis venu. Je ne suis pas venu de ma propre initiative, c’est lui qui m’a envoyé.
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '43'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '43'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Pourquoi ne comprenez-vous pas ce que je vous dis ? Parce que vous êtes incapables de recevoir mes paroles.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '44'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '44'
  - type: text
    text: ' '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'Votre père, c’est le diable, et vous voulez vous conformer à ses désirs. Depuis le commencement, c’est un meurtrier : il ne se tient pas dans la vérité, parce qu’il n’y a pas de vérité en lui. Lorsqu’il ment, il parle de son propre fond, puisqu’il est menteur, lui le père du mensonge.'
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '45'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '45'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Mais moi, je dis la vérité. C’est précisément pour cela que vous ne me croyez pas.
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '46'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '46'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Qui d’entre vous peut produire la preuve que j’ai commis une seule faute ? Si je dis vrai, pourquoi ne me croyez-vous pas ?
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '47'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '47'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Celui qui appartient à Dieu écoute les paroles de Dieu. Si vous ne les écoutez pas, c’est parce que vous ne lui appartenez pas.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '48'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '48'
  - type: text
    text: 'Ils répliquèrent : Nous avions bien raison de le dire : tu n’es qu’un Samaritain, tu as un démon en toi.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '49'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '49'
  - type: text
    text: ' '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: – Non,
  - type: text
    text: ' répondit Jésus, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: je n’ai pas de démon en moi. Au contraire, j’honore mon Père ; mais vous, vous me méprisez.
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '50'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '50'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'Non, je ne recherche pas la gloire pour moi-même : c’est un autre qui s’en préoccupe et il me rendra justice.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '51'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '51'
  - type: text
    text: ' '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'Vraiment, je vous l’assure : celui qui observe mon enseignement ne verra jamais la mort.'
- type: usfm
  marker: s1
  children:
  - type: text
    text: Le Fils et Abraham
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '52'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '52'
  - type: text
    text: 'Sur quoi les Juifs reprirent : Cette fois, nous sommes sûrs que tu as un démon en toi. Abraham est mort, les prophètes aussi, et toi tu viens nous dire : Celui qui observe mon enseignement ne mourra jamais. '
  - type: usfm
    marker: v
    metadata:
      v: '53'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '53'
  - type: text
    text: Serais-tu plus grand que notre père Abraham, qui est mort – ou que les prophètes, qui sont tous morts ? Pour qui te prends-tu donc ?
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '54'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '54'
  - type: text
    text: 'Jésus répondit : '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Si je m’attribuais moi-même ma gloire, cela n’aurait aucune valeur. Celui qui me glorifie, c’est mon Père, celui-là même que vous appelez votre Dieu.
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '55'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '55'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: En fait, vous ne le connaissez pas, alors que moi, je le connais. Si je disais ne pas le connaître, je serais menteur, comme vous. Mais le fait est que je le connais et que j’obéis à sa Parole.
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '56'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '56'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Abraham votre père a exulté de joie à la pensée de voir mon jour. Il l’a vu et en a été transporté de joie.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '57'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '57'
  - type: text
    text: – Quoi, lui dirent-ils alors, tu n’as même pas cinquante ans et tu prétends avoir vu Abraham
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '8.57 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Certains manuscrits ont : '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: et Abraham t’a vu.
    marker-yv: yv-n
  - type: text
    text: '  !'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '58'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '58'
  - type: text
    text: ' '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: – Vraiment, je vous l’assure,
  - type: text
    text: ' leur répondit Jésus, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'avant qu’Abraham soit venu à l’existence, '
    - type: usfm
      marker: qt
      children:
      - type: text
        text: moi, je suis
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '8.58 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Voir note v. 24.
    marker-yv: yv-n
  - type: usfm
    marker: wj
    children:
    - type: usfm
      marker: qt
      children:
      - type: text
        text: .
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '59'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '59'
  - type: text
    text: A ces mots, ils se mirent à ramasser des pierres pour les lui jeter, mais Jésus disparut dans la foule et sortit de l’enceinte du Temple.
