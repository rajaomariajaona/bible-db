verses:
  '1':
  - type: heading
    content: « Va et ne pèche plus »
  - type: text
    content: 'Quant à Jésus, il partit pour le mont des Oliviers. '
  '10':
  - type: text
    content: 'Alors Jésus leva la tête et lui dit : '
  - type: text
    content: Eh bien, où sont donc passés tes accusateurs ? Personne ne t’a condamnée ?
  '11':
  - type: text
    content: – Personne, Seigneur, lui répondit-elle.
  - type: text
    content: 'Alors Jésus reprit : '
  - type: text
    content: Je ne te condamne pas non plus. Va, mais désormais, ne pèche plus
  - type: note
    content: Les versets 7.53 à 8.11 sont absents de nombreux manuscrits, parmi lesquels les plus anciens et les meilleurs. Ce passage figure cependant à cet endroit dans un certain nombre de manuscrits. Quelques manuscrits l’incorporent ailleurs dans l’évangile de Jean (après 7.36 ou après 21.25), ou encore dans l’évangile de Luc (après Lc 21.38 ou après Lc 24.53). Au témoignage concluant des manuscrits, on peut ajouter que ce passage paraît rompre le fil du récit, alors que celui-ci passe naturellement du verset 7.52 à 8.12. Le passage reprend sans doute une tradition ancienne et l’épisode relaté peut fort bien être authentique, mais ces versets ne faisaient vraisemblablement pas partie de l’évangile de Jean à l’origine.
  - type: text
    content: .
  - type: text
    content: ']'
  - type: heading
    content: La lumière du monde
  '12':
  - type: text
    content: 'Jésus parla de nouveau en public : '
  - type: text
    content: Moi, je suis la lumière du monde,
  - type: text
    content: ' dit-il. '
  - type: text
    content: 'Celui qui me suit ne marchera pas dans les ténèbres : il aura la lumière de la vie.'
  '13':
  - type: text
    content: 'Là-dessus les pharisiens lui répondirent : Tu te rends témoignage à toi-même : ton témoignage n’est pas vrai.'
  '14':
  - type: text
    content: 'Jésus leur répondit : '
  - type: text
    content: 'Oui, je me rends témoignage à moi-même : mais mon témoignage est vrai, car je sais d’où je suis venu et où je vais ; quant à vous, vous ne savez pas d’où je viens ni où je vais.'
  - type: text
    content: ' '
  '15':
  - type: text
    content: Vous jugez selon des critères purement humains, moi, je ne juge personne.
  - type: text
    content: ' '
  '16':
  - type: text
    content: Et à supposer que je porte un jugement, ce jugement est vrai, car je ne suis pas seul pour juger, mais avec moi, il y a aussi le Père qui m’a envoyé.
  - type: text
    content: ' '
  '17':
  - type: text
    content: 'Le témoignage commun de deux personnes n’est-il pas vrai ? C’est ce qui est écrit dans votre '
  - type: text
    content: Loi
  - type: text
    content: '  !'
  - type: text
    content: ' '
  '18':
  - type: text
    content: Eh bien, moi, je suis mon propre témoin ; et le Père qui m’a envoyé me rend aussi témoignage.
  '19':
  - type: text
    content: – Mais, où est-il, ton père ? s’exclamèrent-ils.
  - type: text
    content: – Vous ne connaissez ni moi, ni mon Père,
  - type: text
    content: ' répliqua Jésus ; '
  - type: text
    content: si vous m’aviez connu, vous connaîtriez aussi mon Père.
  '2':
  - type: text
    content: Mais le lendemain, il revint de bonne heure dans la cour du Temple et tout le peuple se pressa autour de lui ; alors il s’assit et se mit à enseigner.
  '20':
  - type: text
    content: Jésus parla ainsi pendant qu’il enseignait dans la cour du Temple près des troncs à offrandes, et personne n’essaya de l’arrêter, parce que son heure n’était pas encore venue.
  - type: heading
    content: Celui qui est
  '21':
  - type: text
    content: 'Jésus leur dit encore : '
  - type: text
    content: Je vais m’en aller et vous me chercherez ; mais vous mourrez dans votre péché. Vous ne pouvez pas aller là où je vais.
  '22':
  - type: text
    content: 'Sur quoi ils se demandèrent entre eux : Aurait-il l’intention de se suicider ? Est-ce là ce qu’il veut dire par ces paroles : '
  - type: text
    content: « Vous ne pouvez pas aller là où je vais ? »
  '23':
  - type: text
    content: ' '
  - type: text
    content: – Vous,
  - type: text
    content: ' leur dit-il '
  - type: text
    content: alors, vous êtes d’ici-bas ; moi, je suis d’en haut. Vous appartenez à ce monde-ci ; moi, je ne lui appartiens pas.
  - type: text
    content: ' '
  '24':
  - type: text
    content: 'C’est pourquoi je vous ai dit : « Vous mourrez dans vos péchés. » En effet, si vous ne croyez pas que '
  - type: text
    content: moi, je suis
  - type: note
    content: 'Allusion à l’épisode du buisson ardent (Ex 3.14) où Dieu s’est défini en disant : je suis celui qui est, ou : je suis : Je suis. Voir v. 28, 58.'
  - type: text
    content: ', vous mourrez dans vos péchés.'
  '25':
  - type: text
    content: – Qui es-tu donc ? lui demandèrent-ils alors.
  - type: text
    content: – Je ne cesse de vous le dire depuis le début
  - type: text
    content: ' '
  - type: note
    content: 'Autres traductions : d’abord, pourquoi vous parlerai-je ? ou précisément ce que je vous dis.'
  - type: text
    content: '!'
  - type: text
    content: ' leur répondit Jésus. '
  '26':
  - type: text
    content: En ce qui vous concerne, j’aurais beaucoup à dire, beaucoup à juger. Mais celui qui m’a envoyé est véridique, et je proclame au monde ce que j’ai appris de lui.
  '27':
  - type: text
    content: 'Comme ils ne comprenaient pas que Jésus leur parlait du Père, il ajouta : '
  '28':
  - type: text
    content: 'Quand vous aurez élevé le '
  - type: text
    content: Fils de l’homme
  - type: text
    content: ', alors vous comprendrez que moi, je suis'
  - type: note
    content: Voir note v. 24.
  - type: text
    content: . Vous reconnaîtrez que je ne fais rien de ma propre initiative, mais que je transmets ce que le Père m’a enseigné.
  - type: text
    content: ' '
  '29':
  - type: text
    content: Oui, celui qui m’a envoyé est avec moi ; il ne m’a pas laissé seul, car je fais toujours ce qui lui est agréable.
  '3':
  - type: text
    content: Tout à coup, les spécialistes de la Loi et les pharisiens traînèrent devant lui une femme qui avait été prise en flagrant délit d’adultère. Ils la firent avancer dans la foule et la placèrent, bien en vue, devant Jésus.
  '30':
  - type: text
    content: Pendant qu’il parlait ainsi, beaucoup crurent en lui.
  - type: heading
    content: Les vrais fils d’Abraham
  '31':
  - type: text
    content: 'Alors Jésus dit aux Juifs qui avaient mis leur foi en lui : '
  - type: text
    content: 'Si vous vous attachez à la Parole que je vous ai annoncée, vous êtes vraiment mes '
  - type: text
    content: disciples
  - type: text
    content: .
  - type: text
    content: ' '
  '32':
  - type: text
    content: Vous connaîtrez la vérité, et la vérité fera de vous des hommes libres.
  '33':
  - type: text
    content: – Nous, lui répondirent-ils, nous sommes la postérité d’Abraham
  - type: note
    content: Le premier des patriarches, dont descendent tous les Israélites.
  - type: text
    content: ', nous n’avons jamais été esclaves de personne. Comment peux-tu dire : « Vous serez des hommes libres ? »'
  '34':
  - type: text
    content: ' '
  - type: text
    content: – Vraiment, je vous l’assure,
  - type: text
    content: ' leur répondit Jésus, '
  - type: text
    content: tout homme qui commet le péché est esclave du péché.
  - type: text
    content: ' '
  '35':
  - type: text
    content: Or, un esclave ne fait pas partie de la famille, un fils, lui, en fait partie pour toujours.
  '36':
  - type: text
    content: ' '
  - type: text
    content: Si donc c’est le Fils qui vous donne la liberté, alors vous serez vraiment libres.
  - type: text
    content: ' '
  '37':
  - type: text
    content: Je sais que vous êtes les descendants d’Abraham. Pourtant, vous cherchez à me faire mourir parce que ma parole ne trouve aucun accès dans votre cœur.
  - type: text
    content: ' '
  '38':
  - type: text
    content: Moi, je parle de ce que j’ai vu chez mon Père. Quant à vous, vous faites ce que vous avez appris de votre père.
  '39':
  - type: text
    content: – Notre père à nous, répondirent-ils, c’est Abraham.
  - type: text
    content: – Eh bien,
  - type: text
    content: ' leur répliqua Jésus, '
  - type: text
    content: si vous étiez vraiment des enfants d’Abraham, vous agiriez comme lui
  - type: note
    content: 'Certains manuscrits ont : si vous êtes vraiment des fils d’Abraham, agissez comme lui.'
  - type: text
    content: .
  - type: text
    content: ' '
  '4':
  - type: text
    content: '– Maître, lui dirent-ils, cette femme a commis un adultère ; elle a été prise sur le fait. '
  '40':
  - type: text
    content: Au lieu de cela, vous cherchez à me faire mourir. Pourquoi ? Parce que je vous dis la vérité telle que je l’ai apprise de Dieu. Jamais Abraham n’a agi comme vous.
  - type: text
    content: ' '
  '41':
  - type: text
    content: Vous agissez exactement comme votre père à vous !
  - type: text
    content: '– Mais, répondirent-ils, nous ne sommes pas des enfants illégitimes. Nous n’avons qu’un seul Père : Dieu !'
  '42':
  - type: text
    content: ' '
  - type: text
    content: – Si vraiment Dieu était votre Père,
  - type: text
    content: ' leur dit Jésus, '
  - type: text
    content: vous m’aimeriez, car c’est de Dieu que je proviens, c’est de Dieu que je suis venu. Je ne suis pas venu de ma propre initiative, c’est lui qui m’a envoyé.
  - type: text
    content: ' '
  '43':
  - type: text
    content: Pourquoi ne comprenez-vous pas ce que je vous dis ? Parce que vous êtes incapables de recevoir mes paroles.
  '44':
  - type: text
    content: ' '
  - type: text
    content: 'Votre père, c’est le diable, et vous voulez vous conformer à ses désirs. Depuis le commencement, c’est un meurtrier : il ne se tient pas dans la vérité, parce qu’il n’y a pas de vérité en lui. Lorsqu’il ment, il parle de son propre fond, puisqu’il est menteur, lui le père du mensonge.'
  - type: text
    content: ' '
  '45':
  - type: text
    content: Mais moi, je dis la vérité. C’est précisément pour cela que vous ne me croyez pas.
  - type: text
    content: ' '
  '46':
  - type: text
    content: Qui d’entre vous peut produire la preuve que j’ai commis une seule faute ? Si je dis vrai, pourquoi ne me croyez-vous pas ?
  - type: text
    content: ' '
  '47':
  - type: text
    content: Celui qui appartient à Dieu écoute les paroles de Dieu. Si vous ne les écoutez pas, c’est parce que vous ne lui appartenez pas.
  '48':
  - type: text
    content: 'Ils répliquèrent : Nous avions bien raison de le dire : tu n’es qu’un Samaritain, tu as un démon en toi.'
  '49':
  - type: text
    content: ' '
  - type: text
    content: – Non,
  - type: text
    content: ' répondit Jésus, '
  - type: text
    content: je n’ai pas de démon en moi. Au contraire, j’honore mon Père ; mais vous, vous me méprisez.
  - type: text
    content: ' '
  '5':
  - type: text
    content: Or, dans la Loi, Moïse nous a ordonné de lapider les femmes de ce genre. Toi, quel est ton jugement sur ce cas ?
  '50':
  - type: text
    content: 'Non, je ne recherche pas la gloire pour moi-même : c’est un autre qui s’en préoccupe et il me rendra justice.'
  '51':
  - type: text
    content: ' '
  - type: text
    content: 'Vraiment, je vous l’assure : celui qui observe mon enseignement ne verra jamais la mort.'
  - type: heading
    content: Le Fils et Abraham
  '52':
  - type: text
    content: 'Sur quoi les Juifs reprirent : Cette fois, nous sommes sûrs que tu as un démon en toi. Abraham est mort, les prophètes aussi, et toi tu viens nous dire : Celui qui observe mon enseignement ne mourra jamais. '
  '53':
  - type: text
    content: Serais-tu plus grand que notre père Abraham, qui est mort – ou que les prophètes, qui sont tous morts ? Pour qui te prends-tu donc ?
  '54':
  - type: text
    content: 'Jésus répondit : '
  - type: text
    content: Si je m’attribuais moi-même ma gloire, cela n’aurait aucune valeur. Celui qui me glorifie, c’est mon Père, celui-là même que vous appelez votre Dieu.
  - type: text
    content: ' '
  '55':
  - type: text
    content: En fait, vous ne le connaissez pas, alors que moi, je le connais. Si je disais ne pas le connaître, je serais menteur, comme vous. Mais le fait est que je le connais et que j’obéis à sa Parole.
  - type: text
    content: ' '
  '56':
  - type: text
    content: Abraham votre père a exulté de joie à la pensée de voir mon jour. Il l’a vu et en a été transporté de joie.
  '57':
  - type: text
    content: – Quoi, lui dirent-ils alors, tu n’as même pas cinquante ans et tu prétends avoir vu Abraham
  - type: note
    content: 'Certains manuscrits ont : et Abraham t’a vu.'
  - type: text
    content: '  !'
  '58':
  - type: text
    content: ' '
  - type: text
    content: – Vraiment, je vous l’assure,
  - type: text
    content: ' leur répondit Jésus, '
  - type: text
    content: 'avant qu’Abraham soit venu à l’existence, '
  - type: text
    content: moi, je suis
  - type: note
    content: Voir note v. 24.
  - type: text
    content: .
  '59':
  - type: text
    content: A ces mots, ils se mirent à ramasser des pierres pour les lui jeter, mais Jésus disparut dans la foule et sortit de l’enceinte du Temple.
  '6':
  - type: text
    content: En lui posant cette question, ils voulaient lui tendre un piège, dans l’espoir de trouver quelque prétexte pour l’accuser.
  - type: text
    content: 'Mais Jésus se baissa et se mit à écrire du doigt sur le sol. '
  '7':
  - type: text
    content: 'Eux, ils insistaient, répétant leur question. Alors il se releva et leur dit : '
  - type: text
    content: Que celui d’entre vous qui n’a jamais péché lui jette la première pierre !
  '8':
  - type: text
    content: 'Puis il se baissa de nouveau et se remit à écrire sur le sol. '
  '9':
  - type: text
    content: 'Après avoir entendu ces paroles, ils s’esquivèrent l’un après l’autre, à commencer par les plus âgés, laissant finalement Jésus seul avec la femme, qui était restée au milieu de la cour du Temple. '
