document_id: ACT.7,21
type_code: fra
verses:
  '1':
  - type: text
    content: 'Le grand-prêtre lui demanda : Reconnais-tu les faits qui te sont reprochés ?'
  '10':
  - type: text
    content: 'Il le délivra de toutes ses épreuves et, dans sa grâce, il lui donna la sagesse nécessaire devant le pharaon, roi d’Egypte, si bien qu’il fut nommé gouverneur du pays et de toute la maison royale. '
  '11':
  - type: text
    content: Alors survint une grande famine dans toute l’Egypte et en Canaan. Ce fut un temps de grande misère. Nos ancêtres ne trouvaient plus de quoi manger.
  '12':
  - type: text
    content: 'Quand Jacob apprit qu’il y avait du blé en Egypte, il y envoya une première fois ses fils, nos ancêtres. '
  '13':
  - type: text
    content: 'Lors de leur second voyage en Egypte, Joseph se fit reconnaître par ses frères, et le pharaon apprit quelle était l’origine de Joseph. '
  '14':
  - type: text
    content: 'Puis Joseph envoya chercher son père Jacob et toute sa parenté qui comprenait soixante-quinze personnes. '
  '15':
  - type: text
    content: 'Jacob descendit en Egypte ; il y finit ses jours, de même que nos ancêtres. '
  '16':
  - type: text
    content: 'Leurs corps furent ramenés à Sichem, et déposés dans le tombeau qu’Abraham avait acheté pour une certaine somme d’argent aux fils d’Hamor à Sichem. '
  '17':
  - type: text
    content: 'Le moment approchait où Dieu allait accomplir la promesse qu’il avait faite à Abraham : notre peuple s’était multiplié et les Israélites étaient devenus de plus en plus nombreux en Egypte. '
  '18':
  - type: text
    content: C’est alors qu’un nouveau roi, qui n’avait pas connu Joseph, monta sur le trône d’Egypte
  - type: note
    content: Ex 1.8.
  - type: text
    content: '. '
  '19':
  - type: text
    content: Il exploita notre peuple de manière perfide et opprima nos ancêtres, jusqu’à les obliger à abandonner leurs nouveau-nés pour qu’ils ne survivent pas.
  '2':
  - type: text
    content: 'Etienne dit alors :'
  - type: text
    content: 'Chers frères et pères de notre peuple, écoutez-moi : le Dieu glorieux apparut jadis à notre ancêtre Abraham, quand il vivait encore en Mésopotamie, avant de s’établir à Harân, '
  '20':
  - type: text
    content: A cette époque naquit Moïse, qui avait la faveur de Dieu
  - type: note
    content: 'Autre traduction : qui était extrêmement beau.'
  - type: text
    content: '. Pendant trois mois, il fut élevé dans la maison de son père. '
  '21':
  - type: text
    content: 'Lorsque finalement ses parents durent l’abandonner, il fut recueilli par la fille du pharaon qui l’éleva comme son propre fils. '
  '22':
  - type: text
    content: C’est ainsi que Moïse fut instruit dans toute la science des Egyptiens et qu’il devint un homme dont la parole et les actions avaient des effets remarquables.
  '23':
  - type: text
    content: 'A l’âge de quarante ans, il voulut venir en aide à ses frères, les Israélites. '
  '24':
  - type: text
    content: 'Voyant que l’on maltraitait l’un d’eux, il prit sa défense, et, pour le venger, tua l’Egyptien qui le maltraitait. '
  '25':
  - type: text
    content: Il pensait que ses frères comprendraient que Dieu voulait se servir de lui pour les libérer. Mais ils ne le comprirent pas.
  '26':
  - type: text
    content: Le lendemain, il vit deux d’entre eux se battre. Il s’interposa et essaya de réconcilier les adversaires.
  - type: text
    content: – Mes amis, leur dit-il, vous êtes des frères ! Pourquoi, alors, vous faites-vous du mal ?
  '27':
  - type: text
    content: 'Mais celui qui maltraitait son compagnon le repoussa en disant : '
  - type: text
    content: Qui t’a établi chef et juge sur nous ?
  - type: text
    content: ' '
  '28':
  - type: text
    content: Voudrais-tu par hasard aussi me tuer, comme tu as tué hier l’Egyptien
  - type: note
    content: Ex 2.14.
  - type: text
    content: '?'
  '29':
  - type: text
    content: Quand Moïse entendit cela, il prit la fuite et alla vivre dans le pays de Madian où il eut deux fils.
  '3':
  - type: text
    content: 'et il lui dit : '
  - type: text
    content: Quitte ton pays et ta parenté, et va dans le pays que je t’indiquerai
  - type: note
    content: Gn 12.1.
  - type: text
    content: .
  - type: text
    content: ' '
  '30':
  - type: text
    content: Quarante années plus tard, un ange lui apparut dans le désert du mont Sinaï, au milieu de la flamme d’un buisson en feu
  - type: note
    content: Ex 3.2.
  - type: text
    content: '. '
  '31':
  - type: text
    content: 'Saisi d’étonnement à cette vision, Moïse s’approchait pour le considérer de plus près, quand la voix du Seigneur se fit entendre : '
  '32':
  - type: text
    content: Je suis le Dieu de tes ancêtres, le Dieu d’Abraham, d’Isaac et de Jacob
  - type: note
    content: Ex 3.6.
  - type: text
    content: .
  - type: text
    content: 'Tout tremblant, Moïse n’osait pas lever les yeux. '
  '33':
  - type: text
    content: 'Le Seigneur lui dit :'
  - type: text
    content: Ote tes sandales, car le lieu où tu te tiens est un lieu saint
  - type: text
    content: ' '
  - type: note
    content: Ex 3.5 .
  - type: text
    content: .
  - type: text
    content: ' '
  '34':
  - type: text
    content: 'J’ai vu la souffrance de mon peuple en Egypte. J’ai entendu ses gémissements et je suis descendu pour le délivrer. Et maintenant, viens : je t’envoie en Egypte'
  - type: note
    content: Ex 3.7, 8, 10.
  - type: text
    content: .
  '35':
  - type: text
    content: 'Ainsi ce Moïse que ses frères avaient repoussé en lui disant : '
  - type: text
    content: Qui t’a établi chef et juge sur nous
  - type: note
    content: Ex 2.14.
  - type: text
    content: '?'
  - type: text
    content: ', c’est lui que Dieu a envoyé comme chef et libérateur du peuple avec l’aide de l’ange qui lui était apparu dans le buisson. '
  '36':
  - type: text
    content: C’est lui qui les fit sortir d’Egypte en accomplissant des prodiges et des signes miraculeux dans ce pays, puis lors de la traversée de la mer Rouge
  - type: note
    content: Expression traduite du grec, désignant la mer des Roseaux.
  - type: text
    content: ' et, pendant quarante ans, dans le désert.'
  '37':
  - type: text
    content: 'Ce fut encore lui qui dit aux Israélites : '
  - type: text
    content: 'Dieu suscitera pour vous, du milieu de vos compatriotes, un '
  - type: text
    content: prophète
  - type: text
    content: ' qui sera comme moi'
  - type: note
    content: Dt 18.15.
  - type: text
    content: .
  '38':
  - type: text
    content: Lorsque le peuple était rassemblé au désert, c’est encore lui qui servit d’intermédiaire entre l’ange qui lui parlait sur le mont Sinaï et nos ancêtres. Il reçut de Dieu des paroles de vie pour nous les transmettre.
  '39':
  - type: text
    content: 'Nos ancêtres refusèrent de lui obéir. Bien plus : ils le repoussèrent et se laissèrent gagner par le désir de retourner en Egypte. '
  '4':
  - type: text
    content: 'C’est ainsi qu’Abraham quitta la Chaldée et vint se fixer à Harân. De là, après la mort de son père, Dieu le fit venir dans le pays où vous habitez actuellement. '
  '40':
  - type: text
    content: 'Ils vinrent demander à Aaron : '
  - type: text
    content: Fais-nous des dieux qui marchent à notre tête, car ce Moïse qui nous a fait sortir d’Egypte, nous ne savons pas ce qui lui est arrivé
  - type: note
    content: Ex 32.1, 23.
  - type: text
    content: .
  '41':
  - type: text
    content: Ils façonnèrent alors un veau, ils offrirent un sacrifice à cette idole, et ils célébrèrent de joyeuses fêtes en l’honneur de ce qu’ils avaient fabriqué de leurs mains.
  '42':
  - type: text
    content: 'Dieu se détourna d’eux et les abandonna à l’idolâtrie et au culte des astres du ciel. C’est bien ce qui est écrit dans le livre des prophètes :'
  - type: text
    content: Est-ce à moi que vous avez présenté
  - type: text
    content: ' ╵'
  - type: text
    content: des sacrifices et des offrandes,
  - type: text
    content: pendant les quarante ans
  - type: text
    content: ' ╵'
  - type: text
    content: de votre séjour au désert,
  - type: text
    content: ' ╵'
  - type: text
    content: vous, peuple d’
  - type: text
    content: Israël
  - type: text
    content: '  ?'
  '43':
  - type: text
    content: ' '
  - type: text
    content: Non, vous avez porté
  - type: text
    content: ' ╵'
  - type: text
    content: la tente de Molok
  - type: note
    content: 'Molok: divinité adorée par les Ammonites. Rompha: ancienne divinité païenne représentant la planète Saturne.'
  - type: text
    content: et l’astre de votre dieu Rompha,
  - type: text
    content: idoles que vous avez fabriquées
  - type: text
    content: ' ╵'
  - type: text
    content: pour vous prosterner devant elles.
  - type: text
    content: C’est pourquoi je vous déporterai
  - type: text
    content: ' ╵'
  - type: text
    content: au-delà de Babylone
  - type: note
    content: Am 5.25-27 cité selon l’ancienne version grecque.
  - type: text
    content: .
  '44':
  - type: text
    content: 'Au désert, nos ancêtres avaient avec eux la tente qui contenait le traité de l’alliance et que Dieu avait ordonné à Moïse de construire d’après le modèle qu’il lui avait montré. '
  '45':
  - type: text
    content: Cette tente a été confiée à la génération suivante de nos ancêtres. Ils l’emmenèrent avec eux quand ils conquirent, sous la conduite de Josué, le pays où se trouvaient les peuplades que Dieu chassa devant eux. Elle y demeura jusqu’au temps de David.
  '46':
  - type: text
    content: 'Celui-ci obtint la faveur de Dieu et demanda de pouvoir donner une demeure au Dieu de Jacob. '
  '47':
  - type: text
    content: 'Mais ce fut Salomon qui bâtit le Temple. '
  '48':
  - type: text
    content: 'Cependant, le Dieu très-haut n’habite pas dans des édifices construits par des mains humaines. C’est ce que dit le prophète :'
  '49':
  - type: text
    content: ' '
  - type: text
    content: Mon trône, c’est le ciel,
  - type: text
    content: et mon marchepied, c’est la terre.
  - type: text
    content: Quelle est donc la maison
  - type: text
    content: ' ╵'
  - type: text
    content: que vous me bâtirez,
  - type: text
    content: ' ╵'
  - type: text
    content: dit le Seigneur,
  - type: text
    content: quelle demeure
  - type: text
    content: ' ╵'
  - type: text
    content: pour mon lieu de repos ?
  '5':
  - type: text
    content: Pourtant, il ne lui donna ici aucune propriété, pas même un mètre carré de terre. Mais il lui promit de lui donner le pays tout entier, à lui et à ses descendants après lui, alors qu’à cette époque il n’avait pas encore d’enfant
  - type: note
    content: Gn 17.8.
  - type: text
    content: .
  '50':
  - type: text
    content: ' '
  - type: text
    content: Toutes ces choses,
  - type: text
    content: ' ╵'
  - type: text
    content: n’est-ce pas moi qui les ai faites
  - type: note
    content: Es 66.1-2.
  - type: text
    content: '?'
  '51':
  - type: text
    content: 'O vous hommes obstinés qui, comme de véritables incirconcis, gardez votre cœur et vos oreilles fermés, vous résistez toujours à l’Esprit Saint ! '
  '52':
  - type: text
    content: 'Vous ressemblez bien à vos ancêtres ! Y a-t-il un seul prophète que vos ancêtres n’aient pas persécuté ? Ils ont tué ceux qui annonçaient la venue du seul Juste. Et vous, maintenant, vous l’avez trahi et assassiné ! '
  '53':
  - type: text
    content: Oui, vous avez bien reçu la Loi de Dieu par l’intermédiaire des anges, mais vous ne l’avez jamais observée…
  - type: heading
    content: L’exécution d’Etienne
  '54':
  - type: text
    content: 'A ces mots, ceux qui siégeaient au Grand-Conseil devinrent fous de rage : ils grinçaient des dents contre Etienne. '
  '55':
  - type: text
    content: 'Mais lui, rempli du Saint-Esprit, leva les yeux au ciel et vit la gloire de Dieu, et Jésus debout à la droite de Dieu. Alors, il s’écria : '
  '56':
  - type: text
    content: 'Ecoutez : je vois le ciel ouvert et le Fils de l’homme debout à la droite de Dieu.'
  '57':
  - type: text
    content: 'A ces mots, ils se mirent à vociférer et à se boucher les oreilles. D’un même élan, ils se ruèrent sur lui, '
  '58':
  - type: text
    content: le traînèrent hors de la ville et le lapidèrent. Les témoins avaient déposé leurs vêtements aux pieds d’un jeune homme nommé Saul.
  '59':
  - type: text
    content: 'Pendant qu’ils jetaient des pierres sur lui, Etienne priait ainsi : Seigneur Jésus, reçois mon esprit !'
  '6':
  - type: text
    content: 'Et Dieu lui parla ainsi :'
  - type: text
    content: Tes descendants séjourneront dans une terre étrangère, ils y seront réduits en esclavage et on les maltraitera pendant quatre cents ans
  - type: text
    content: '. '
  '60':
  - type: text
    content: 'Puis il tomba à genoux et, de toutes ses forces, lança un dernier cri : Seigneur, ne leur demande pas compte de ce péché !'
  - type: text
    content: Après avoir dit ces mots, il expira.
  '7':
  - type: text
    content: Mais
  - type: text
    content: ', ajouta Dieu, '
  - type: text
    content: j’exécuterai mon jugement contre la nation qui en aura fait ses esclaves. Après cela, ils quitteront le pays étranger et viendront ici même, dans ce pays, pour me rendre un culte
  - type: note
    content: Gn 15.13-14.
  - type: text
    content: .
  '8':
  - type: text
    content: Puis Dieu conclut son alliance avec Abraham et lui en donna pour signe la circoncision. Ainsi il eut pour fils Isaac et le circoncit huit jours après sa naissance. Isaac fit de même pour son fils Jacob, et celui-ci, à son tour, pour ses fils, les douze ancêtres de nos tribus
  - type: note
    content: Voir note 2.29.
  - type: text
    content: .
  '9':
  - type: text
    content: 'Or, les fils de Jacob, poussés par la jalousie, vendirent leur frère Joseph, pour qu’il fût emmené comme esclave en Egypte. Mais Dieu était avec lui. '
