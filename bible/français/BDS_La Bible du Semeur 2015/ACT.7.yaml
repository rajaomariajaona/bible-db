document_id: ACT.7
type_code: fra
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Le grand-prêtre lui demanda : Reconnais-tu les faits qui te sont reprochés ?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Etienne dit alors :'
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Chers frères et pères de notre peuple, écoutez-moi : le Dieu glorieux apparut jadis à notre ancêtre Abraham, quand il vivait encore en Mésopotamie, avant de s’établir à Harân, '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'et il lui dit : '
  - type: usfm
    marker: qt
    children:
    - type: text
      text: Quitte ton pays et ta parenté, et va dans le pays que je t’indiquerai
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '7.3 '
    - type: usfm
      marker: ft
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Gn 12.1
        metadata:
          usfm: GEN.12.1
      - type: text
        text: .
    marker-yv: yv-n
  - type: usfm
    marker: qt
    children:
    - type: text
      text: .
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'C’est ainsi qu’Abraham quitta la Chaldée et vint se fixer à Harân. De là, après la mort de son père, Dieu le fit venir dans le pays où vous habitez actuellement. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Pourtant, il ne lui donna ici aucune propriété, pas même un mètre carré de terre. Mais il lui promit de lui donner le pays tout entier, à lui et à ses descendants après lui, alors qu’à cette époque il n’avait pas encore d’enfant
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '7.5 '
    - type: usfm
      marker: ft
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Gn 17.8
        metadata:
          usfm: GEN.17.8
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Et Dieu lui parla ainsi :'
- type: usfm
  marker: pm
  children:
  - type: usfm
    marker: qt
    children:
    - type: text
      text: Tes descendants séjourneront dans une terre étrangère, ils y seront réduits en esclavage et on les maltraitera pendant quatre cents ans
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: usfm
    marker: qt
    children:
    - type: text
      text: Mais
  - type: text
    text: ', ajouta Dieu, '
  - type: usfm
    marker: qt
    children:
    - type: text
      text: j’exécuterai mon jugement contre la nation qui en aura fait ses esclaves. Après cela, ils quitteront le pays étranger et viendront ici même, dans ce pays, pour me rendre un culte
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '7.7 '
    - type: usfm
      marker: ft
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Gn 15.13-14
        metadata:
          usfm: GEN.15.13+GEN.15.14
      - type: text
        text: .
    marker-yv: yv-n
  - type: usfm
    marker: qt
    children:
    - type: text
      text: .
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Puis Dieu conclut son alliance avec Abraham et lui en donna pour signe la circoncision. Ainsi il eut pour fils Isaac et le circoncit huit jours après sa naissance. Isaac fit de même pour son fils Jacob, et celui-ci, à son tour, pour ses fils, les douze ancêtres de nos tribus
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '7.8 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Voir note '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '2.29'
        metadata:
          usfm: ACT.2.29
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Or, les fils de Jacob, poussés par la jalousie, vendirent leur frère Joseph, pour qu’il fût emmené comme esclave en Egypte. Mais Dieu était avec lui. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Il le délivra de toutes ses épreuves et, dans sa grâce, il lui donna la sagesse nécessaire devant le pharaon, roi d’Egypte, si bien qu’il fut nommé gouverneur du pays et de toute la maison royale. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Alors survint une grande famine dans toute l’Egypte et en Canaan. Ce fut un temps de grande misère. Nos ancêtres ne trouvaient plus de quoi manger.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Quand Jacob apprit qu’il y avait du blé en Egypte, il y envoya une première fois ses fils, nos ancêtres. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Lors de leur second voyage en Egypte, Joseph se fit reconnaître par ses frères, et le pharaon apprit quelle était l’origine de Joseph. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Puis Joseph envoya chercher son père Jacob et toute sa parenté qui comprenait soixante-quinze personnes. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Jacob descendit en Egypte ; il y finit ses jours, de même que nos ancêtres. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Leurs corps furent ramenés à Sichem, et déposés dans le tombeau qu’Abraham avait acheté pour une certaine somme d’argent aux fils d’Hamor à Sichem. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Le moment approchait où Dieu allait accomplir la promesse qu’il avait faite à Abraham : notre peuple s’était multiplié et les Israélites étaient devenus de plus en plus nombreux en Egypte. '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: C’est alors qu’un nouveau roi, qui n’avait pas connu Joseph, monta sur le trône d’Egypte
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '7.18 '
    - type: usfm
      marker: ft
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ex 1.8
        metadata:
          usfm: EXO.1.8
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Il exploita notre peuple de manière perfide et opprima nos ancêtres, jusqu’à les obliger à abandonner leurs nouveau-nés pour qu’ils ne survivent pas.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: A cette époque naquit Moïse, qui avait la faveur de Dieu
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '7.20 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Autre traduction : '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: qui était extrêmement beau.
    marker-yv: yv-n
  - type: text
    text: '. Pendant trois mois, il fut élevé dans la maison de son père. '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Lorsque finalement ses parents durent l’abandonner, il fut recueilli par la fille du pharaon qui l’éleva comme son propre fils. '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: C’est ainsi que Moïse fut instruit dans toute la science des Egyptiens et qu’il devint un homme dont la parole et les actions avaient des effets remarquables.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'A l’âge de quarante ans, il voulut venir en aide à ses frères, les Israélites. '
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Voyant que l’on maltraitait l’un d’eux, il prit sa défense, et, pour le venger, tua l’Egyptien qui le maltraitait. '
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: Il pensait que ses frères comprendraient que Dieu voulait se servir de lui pour les libérer. Mais ils ne le comprirent pas.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: Le lendemain, il vit deux d’entre eux se battre. Il s’interposa et essaya de réconcilier les adversaires.
- type: usfm
  marker: p
  children:
  - type: text
    text: – Mes amis, leur dit-il, vous êtes des frères ! Pourquoi, alors, vous faites-vous du mal ?
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'Mais celui qui maltraitait son compagnon le repoussa en disant : '
  - type: usfm
    marker: qt
    children:
    - type: text
      text: Qui t’a établi chef et juge sur nous ?
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: usfm
    marker: qt
    children:
    - type: text
      text: Voudrais-tu par hasard aussi me tuer, comme tu as tué hier l’Egyptien
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '7.28 '
    - type: usfm
      marker: ft
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ex 2.14
        metadata:
          usfm: EXO.2.14
      - type: text
        text: .
    marker-yv: yv-n
  - type: usfm
    marker: qt
    children:
    - type: text
      text: '?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: Quand Moïse entendit cela, il prit la fuite et alla vivre dans le pays de Madian où il eut deux fils.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: Quarante années plus tard, un ange lui apparut dans le désert du mont Sinaï, au milieu de la flamme d’un buisson en feu
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '7.30 '
    - type: usfm
      marker: ft
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ex 3.2
        metadata:
          usfm: EXO.3.2
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'Saisi d’étonnement à cette vision, Moïse s’approchait pour le considérer de plus près, quand la voix du Seigneur se fit entendre : '
  - type: usfm
    marker: v
    metadata:
      v: '32'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: usfm
    marker: qt
    children:
    - type: text
      text: Je suis le Dieu de tes ancêtres, le Dieu d’Abraham, d’Isaac et de Jacob
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '7.32 '
    - type: usfm
      marker: ft
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ex 3.6
        metadata:
          usfm: EXO.3.6
      - type: text
        text: .
    marker-yv: yv-n
  - type: usfm
    marker: qt
    children:
    - type: text
      text: .
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Tout tremblant, Moïse n’osait pas lever les yeux. '
  - type: usfm
    marker: v
    metadata:
      v: '33'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: 'Le Seigneur lui dit :'
- type: usfm
  marker: pm
  children:
  - type: usfm
    marker: qt
    children:
    - type: text
      text: Ote tes sandales, car le lieu où tu te tiens est un lieu saint
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '7.33 '
    - type: usfm
      marker: ft
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ex 3.5
        metadata:
          usfm: EXO.3.5
      - type: text
        text: ' .'
    marker-yv: yv-n
  - type: usfm
    marker: qt
    children:
    - type: text
      text: .
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '34'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: usfm
    marker: qt
    children:
    - type: text
      text: 'J’ai vu la souffrance de mon peuple en Egypte. J’ai entendu ses gémissements et je suis descendu pour le délivrer. Et maintenant, viens : je t’envoie en Egypte'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '7.34 '
    - type: usfm
      marker: ft
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ex 3.7
        metadata:
          usfm: EXO.3.7
      - type: text
        text: ', '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '8'
        metadata:
          usfm: EXO.3.8
      - type: text
        text: ', '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '10'
        metadata:
          usfm: EXO.3.10
      - type: text
        text: .
    marker-yv: yv-n
  - type: usfm
    marker: qt
    children:
    - type: text
      text: .
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '35'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: 'Ainsi ce Moïse que ses frères avaient repoussé en lui disant : '
  - type: usfm
    marker: qt
    children:
    - type: text
      text: Qui t’a établi chef et juge sur nous
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '7.35 '
    - type: usfm
      marker: ft
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ex 2.14
        metadata:
          usfm: EXO.2.14
      - type: text
        text: .
    marker-yv: yv-n
  - type: usfm
    marker: qt
    children:
    - type: text
      text: '?'
  - type: text
    text: ', c’est lui que Dieu a envoyé comme chef et libérateur du peuple avec l’aide de l’ange qui lui était apparu dans le buisson. '
  - type: usfm
    marker: v
    metadata:
      v: '36'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: C’est lui qui les fit sortir d’Egypte en accomplissant des prodiges et des signes miraculeux dans ce pays, puis lors de la traversée de la mer Rouge
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '7.36 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Expression traduite du grec, désignant la mer des Roseaux.
    marker-yv: yv-n
  - type: text
    text: ' et, pendant quarante ans, dans le désert.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '37'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: 'Ce fut encore lui qui dit aux Israélites : '
  - type: usfm
    marker: qt
    children:
    - type: text
      text: 'Dieu suscitera pour vous, du milieu de vos compatriotes, un '
    - type: usfm
      marker: w
      children:
      - type: text
        text: prophète
    - type: text
      text: ' qui sera comme moi'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '7.37 '
    - type: usfm
      marker: ft
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Dt 18.15
        metadata:
          usfm: DEU.18.15
      - type: text
        text: .
    marker-yv: yv-n
  - type: usfm
    marker: qt
    children:
    - type: text
      text: .
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '38'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: text
    text: Lorsque le peuple était rassemblé au désert, c’est encore lui qui servit d’intermédiaire entre l’ange qui lui parlait sur le mont Sinaï et nos ancêtres. Il reçut de Dieu des paroles de vie pour nous les transmettre.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '39'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '39'
  - type: text
    text: 'Nos ancêtres refusèrent de lui obéir. Bien plus : ils le repoussèrent et se laissèrent gagner par le désir de retourner en Egypte. '
  - type: usfm
    marker: v
    metadata:
      v: '40'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '40'
  - type: text
    text: 'Ils vinrent demander à Aaron : '
  - type: usfm
    marker: qt
    children:
    - type: text
      text: Fais-nous des dieux qui marchent à notre tête, car ce Moïse qui nous a fait sortir d’Egypte, nous ne savons pas ce qui lui est arrivé
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '7.40 '
    - type: usfm
      marker: ft
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ex 32.1
        metadata:
          usfm: EXO.32.1
      - type: text
        text: ', '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '23'
        metadata:
          usfm: EXO.32.23
      - type: text
        text: .
    marker-yv: yv-n
  - type: usfm
    marker: qt
    children:
    - type: text
      text: .
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '41'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '41'
  - type: text
    text: Ils façonnèrent alors un veau, ils offrirent un sacrifice à cette idole, et ils célébrèrent de joyeuses fêtes en l’honneur de ce qu’ils avaient fabriqué de leurs mains.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '42'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '42'
  - type: text
    text: 'Dieu se détourna d’eux et les abandonna à l’idolâtrie et au culte des astres du ciel. C’est bien ce qui est écrit dans le livre des prophètes :'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: qt
    children:
    - type: text
      text: Est-ce à moi que vous avez présenté
  - type: text
    text: ' ╵'
  - type: usfm
    marker: qt
    children:
    - type: text
      text: des sacrifices et des offrandes,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: qt
    children:
    - type: text
      text: pendant les quarante ans
  - type: text
    text: ' ╵'
  - type: usfm
    marker: qt
    children:
    - type: text
      text: de votre séjour au désert,
  - type: text
    text: ' ╵'
  - type: usfm
    marker: qt
    children:
    - type: text
      text: vous, peuple d’
    - type: usfm
      marker: w
      children:
      - type: text
        text: Israël
    - type: text
      text: '  ?'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '43'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '43'
  - type: text
    text: ' '
  - type: usfm
    marker: qt
    children:
    - type: text
      text: Non, vous avez porté
  - type: text
    text: ' ╵'
  - type: usfm
    marker: qt
    children:
    - type: text
      text: la tente de Molok
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '7.43 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: Molok
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: ': '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'divinité adorée par les Ammonites. '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: Rompha
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: ': '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ancienne divinité païenne représentant la planète Saturne.
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: qt
    children:
    - type: text
      text: et l’astre de votre dieu Rompha,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: qt
    children:
    - type: text
      text: idoles que vous avez fabriquées
  - type: text
    text: ' ╵'
  - type: usfm
    marker: qt
    children:
    - type: text
      text: pour vous prosterner devant elles.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: qt
    children:
    - type: text
      text: C’est pourquoi je vous déporterai
  - type: text
    text: ' ╵'
  - type: usfm
    marker: qt
    children:
    - type: text
      text: au-delà de Babylone
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '7.43 '
    - type: usfm
      marker: ft
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Am 5.25-27
        metadata:
          usfm: AMO.5.25+AMO.5.26+AMO.5.27
      - type: text
        text: ' cité selon l’ancienne version grecque.'
    marker-yv: yv-n
  - type: usfm
    marker: qt
    children:
    - type: text
      text: .
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '44'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '44'
  - type: text
    text: 'Au désert, nos ancêtres avaient avec eux la tente qui contenait le traité de l’alliance et que Dieu avait ordonné à Moïse de construire d’après le modèle qu’il lui avait montré. '
  - type: usfm
    marker: v
    metadata:
      v: '45'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '45'
  - type: text
    text: Cette tente a été confiée à la génération suivante de nos ancêtres. Ils l’emmenèrent avec eux quand ils conquirent, sous la conduite de Josué, le pays où se trouvaient les peuplades que Dieu chassa devant eux. Elle y demeura jusqu’au temps de David.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '46'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '46'
  - type: text
    text: 'Celui-ci obtint la faveur de Dieu et demanda de pouvoir donner une demeure au Dieu de Jacob. '
  - type: usfm
    marker: v
    metadata:
      v: '47'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '47'
  - type: text
    text: 'Mais ce fut Salomon qui bâtit le Temple. '
  - type: usfm
    marker: v
    metadata:
      v: '48'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '48'
  - type: text
    text: 'Cependant, le Dieu très-haut n’habite pas dans des édifices construits par des mains humaines. C’est ce que dit le prophète :'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '49'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '49'
  - type: text
    text: ' '
  - type: usfm
    marker: qt
    children:
    - type: text
      text: Mon trône, c’est le ciel,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: qt
    children:
    - type: text
      text: et mon marchepied, c’est la terre.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: qt
    children:
    - type: text
      text: Quelle est donc la maison
  - type: text
    text: ' ╵'
  - type: usfm
    marker: qt
    children:
    - type: text
      text: que vous me bâtirez,
  - type: text
    text: ' ╵'
  - type: usfm
    marker: qt
    children:
    - type: text
      text: dit le Seigneur,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: qt
    children:
    - type: text
      text: quelle demeure
  - type: text
    text: ' ╵'
  - type: usfm
    marker: qt
    children:
    - type: text
      text: pour mon lieu de repos ?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '50'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '50'
  - type: text
    text: ' '
  - type: usfm
    marker: qt
    children:
    - type: text
      text: Toutes ces choses,
  - type: text
    text: ' ╵'
  - type: usfm
    marker: qt
    children:
    - type: text
      text: n’est-ce pas moi qui les ai faites
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '7.50 '
    - type: usfm
      marker: ft
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Es 66.1-2
        metadata:
          usfm: ISA.66.1+ISA.66.2
      - type: text
        text: .
    marker-yv: yv-n
  - type: usfm
    marker: qt
    children:
    - type: text
      text: '?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '51'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '51'
  - type: text
    text: 'O vous hommes obstinés qui, comme de véritables incirconcis, gardez votre cœur et vos oreilles fermés, vous résistez toujours à l’Esprit Saint ! '
  - type: usfm
    marker: v
    metadata:
      v: '52'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '52'
  - type: text
    text: 'Vous ressemblez bien à vos ancêtres ! Y a-t-il un seul prophète que vos ancêtres n’aient pas persécuté ? Ils ont tué ceux qui annonçaient la venue du seul Juste. Et vous, maintenant, vous l’avez trahi et assassiné ! '
  - type: usfm
    marker: v
    metadata:
      v: '53'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '53'
  - type: text
    text: Oui, vous avez bien reçu la Loi de Dieu par l’intermédiaire des anges, mais vous ne l’avez jamais observée…
- type: usfm
  marker: s1
  children:
  - type: text
    text: L’exécution d’Etienne
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '54'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '54'
  - type: text
    text: 'A ces mots, ceux qui siégeaient au Grand-Conseil devinrent fous de rage : ils grinçaient des dents contre Etienne. '
  - type: usfm
    marker: v
    metadata:
      v: '55'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '55'
  - type: text
    text: 'Mais lui, rempli du Saint-Esprit, leva les yeux au ciel et vit la gloire de Dieu, et Jésus debout à la droite de Dieu. Alors, il s’écria : '
  - type: usfm
    marker: v
    metadata:
      v: '56'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '56'
  - type: text
    text: 'Ecoutez : je vois le ciel ouvert et le Fils de l’homme debout à la droite de Dieu.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '57'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '57'
  - type: text
    text: 'A ces mots, ils se mirent à vociférer et à se boucher les oreilles. D’un même élan, ils se ruèrent sur lui, '
  - type: usfm
    marker: v
    metadata:
      v: '58'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '58'
  - type: text
    text: le traînèrent hors de la ville et le lapidèrent. Les témoins avaient déposé leurs vêtements aux pieds d’un jeune homme nommé Saul.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '59'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '59'
  - type: text
    text: 'Pendant qu’ils jetaient des pierres sur lui, Etienne priait ainsi : Seigneur Jésus, reçois mon esprit !'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '60'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '60'
  - type: text
    text: 'Puis il tomba à genoux et, de toutes ses forces, lança un dernier cri : Seigneur, ne leur demande pas compte de ce péché !'
- type: usfm
  marker: p
  children:
  - type: text
    text: Après avoir dit ces mots, il expira.
