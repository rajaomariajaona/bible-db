document_id: PSA.53,21
type_code: fra
verses:
  '1':
  - type: heading
    content: Egarement généralVoir Ps 14.
  - type: text
    content: Au chef de chœur, méditation
  - type: note
    content: Signification incertaine.
  - type: text
    content: ' de David, à chanter avec accompagnement de flûtes'
  - type: note
    content: Sens incertain.
  - type: text
    content: .
  '2':
  - type: text
    content: 'Les insensés pensent : ╵« Dieu n’existe pas. »'
  - type: text
    content: Ils sont corrompus, ╵ils commettent ╵des actes iniques ╵et abominables,
  - type: text
    content: et aucun ne fait le bien
  - type: note
    content: Les v. 2-4 sont cités en Rm 3.10-12.
  - type: text
    content: .
  '3':
  - type: text
    content: 'Du haut du ciel, Dieu observe ╵tout le genre humain :'
  - type: text
    content: « Reste-t-il un homme sage
  - type: text
    content: qui s’attend à Dieu ?
  '4':
  - type: text
    content: Ils se sont tous fourvoyés, ╵tous sont corrompus,
  - type: text
    content: et aucun ne fait le bien,
  - type: text
    content: même pas un seul.
  '5':
  - type: text
    content: Ceux qui font le mal ╵n’ont-ils rien compris ?
  - type: text
    content: Car ils dévorent mon peuple, ╵tout comme on mange du pain
  - type: note
    content: 'Autres traductions : pour leur propre profit, ou ils mangent son pain.'
  - type: text
    content: '  !'
  - type: text
    content: Jamais ils n’invoquent Dieu ! »
  '6':
  - type: text
    content: Ils sont saisis d’épouvante,
  - type: text
    content: quand il n’y a rien à craindre,
  - type: text
    content: car Dieu disperse les os ╵de ceux qui t’attaquent,
  - type: text
    content: tu les couvriras de honte, ╵car Dieu les a rejetés.
  '7':
  - type: text
    content: Ah, que vienne du mont de Sion ╵le salut pour Israël !
  - type: text
    content: Quand Dieu changera le sort ╵de son peuple,
  - type: text
    content: Jacob criera d’allégresse, ╵Israël, de joie.
