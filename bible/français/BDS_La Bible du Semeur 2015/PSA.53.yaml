    - type: text
      text: '1'
  - type: text
    text: Au chef de chœur, méditation
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '53.1 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Signification incertaine.
    marker-yv: yv-n
  - type: text
    text: ' de David, à chanter avec accompagnement de flûtes'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '53.1 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Sens incertain.
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Les insensés pensent : ╵« Dieu n’existe pas. »'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ils sont corrompus, ╵ils commettent ╵des actes iniques ╵et abominables,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et aucun ne fait le bien
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '53.2 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Les v. 2-4 sont cités en '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Rm 3.10-12
        metadata:
          usfm: ROM.3.10+ROM.3.11+ROM.3.12
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Du haut du ciel, Dieu observe ╵tout le genre humain :'
- type: usfm
  marker: q1
  children:
  - type: text
    text: « Reste-t-il un homme sage
- type: usfm
  marker: q1
  children:
  - type: text
    text: qui s’attend à Dieu ?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Ils se sont tous fourvoyés, ╵tous sont corrompus,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et aucun ne fait le bien,
- type: usfm
  marker: q1
  children:
  - type: text
    text: même pas un seul.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Ceux qui font le mal ╵n’ont-ils rien compris ?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Car ils dévorent mon peuple, ╵tout comme on mange du pain
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '53.5 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Autres traductions : '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'pour leur propre profit, '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'ou '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: ils mangent son pain.
    marker-yv: yv-n
  - type: text
    text: '  !'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Jamais ils n’invoquent Dieu ! »
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Ils sont saisis d’épouvante,
- type: usfm
  marker: q1
  children:
  - type: text
    text: quand il n’y a rien à craindre,
- type: usfm
  marker: q1
  children:
  - type: text
    text: car Dieu disperse les os ╵de ceux qui t’attaquent,
- type: usfm
  marker: q1
  children:
  - type: text
    text: tu les couvriras de honte, ╵car Dieu les a rejetés.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Ah, que vienne du mont de Sion ╵le salut pour Israël !
- type: usfm
  marker: q1
  children:
  - type: text
    text: Quand Dieu changera le sort ╵de son peuple,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Jacob criera d’allégresse, ╵Israël, de joie.
