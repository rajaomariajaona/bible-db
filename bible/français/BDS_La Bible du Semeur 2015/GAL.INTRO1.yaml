document_id: GAL.INTRO1
type_code: fra
segments:
- type: usfm
  marker: imt1
  children:
  - type: text
    text: Introduction
- type: usfm
  marker: ip
  children:
  - type: text
    text: La lettre aux Galates est une lettre circulaire que Paul écrivit à des Eglises qu’il avait fondées lors de l’un de ses voyages missionnaires décrits dans le livre des Actes.
- type: usfm
  marker: ip
  children:
  - type: text
    text: Pour les uns, ces Eglises se situeraient au centre de l’Asie Mineure (la Turquie actuelle), dans une vaste région que Paul aurait traversée lors de son deuxième et de son troisième voyage missionnaire (Ac 16.6 et 18.3). Pour les autres, il s’agirait plutôt des Eglises de la province romaine de Galatie, au sud de l’Asie Mineure, que Paul a parcourue pendant son premier voyage missionnaire (Ac 13 et 14).
- type: usfm
  marker: ip
  children:
  - type: text
    text: Dans le second cas, la présente lettre pourrait fort bien être la première de Paul. Il l’aurait écrite en 49, peu avant la conférence de Jérusalem (Ac 15).
- type: usfm
  marker: ip
  children:
  - type: text
    text: Les Eglises de Galatie ont été visitées, après le départ de Paul, par des prédicateurs d’origine juive, qui ont dénigré son apostolat et insisté sur le respect de la Loi de Moïse, des fêtes juives et de la circoncision.
- type: usfm
  marker: ip
  children:
  - type: text
    text: Paul commence par répondre aux attaques contre son apostolat, qui sèment le doute sur la valeur de l’Evangile qu’il a proclamé. Il a reçu cet Evangile par révélation, directement de Jésus-Christ ressuscité (chap. 1). Ensuite les autres apôtres l’ont soutenu (2.1-10). Il a même défendu le véritable Evangile en face de Pierre à Antioche (2.11-21).
- type: usfm
  marker: ip
  children:
  - type: text
    text: Puis il répond à ceux qui voudraient imposer les pratiques juives aux chrétiens d’origine païenne (3.1 à 4.12). Le chrétien est déclaré juste par la foi, selon la promesse faite à Abraham (3.1-14).
- type: usfm
  marker: ip
  children:
  - type: text
    text: Il rappelle ensuite le rôle de la Loi, de conduire à Christ, et par contraste, celui de la foi (3.15-29). La foi en Jésus-Christ nous fait changer de statut. Nous ne sommes plus esclaves mais fils et filles (4.1-11).
- type: usfm
  marker: ip
  children:
  - type: text
    text: A partir de 4.12, Paul encourage les Galates à se maintenir dans la liberté que Jésus-Christ leur a acquise en se séparant des adversaires (4.12 à 5.12), puis il décrit ce qu’est la vie par l’Esprit Saint (5.13 à 6.10).
- type: usfm
  marker: ip
  children:
  - type: text
    text: 'Cette lettre dépeint l’un des dangers qui menace l’Eglise de tous les temps : le légalisme. Elle dit ce qu’est la véritable liberté chrétienne, celle des enfants de Dieu.'
