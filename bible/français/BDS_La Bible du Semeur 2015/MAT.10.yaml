document_id: MAT.10,21
type_code: fra
verses:
  '1':
  - type: usfm
    marker: r
    children:
    - type: text
      text: (Mc 3.13-19 ; Lc 6.12-16)
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Jésus appela ses douze disciples et leur donna l’autorité de chasser les esprits mauvais et de guérir toute maladie et toute infirmité. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: N’emportez pour le voyage ni sac, ni tunique de rechange, ni sandales, ni bâton, car « l’ouvrier mérite sa nourriture ».
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Chaque fois que vous arriverez dans une ville ou un village, cherchez quelqu’un qui soit respectable
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '10.11 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Autre traduction : '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'quelqu’un qui soit en mesure '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '(ou '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: désireux
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ') '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: de vous accueillir.
      marker-yv: yv-n
    - type: usfm
      marker: wj
      children:
      - type: text
        text: et restez chez lui jusqu’à votre départ de la localité.
    - type: text
      text: ' '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: En entrant dans la maison, saluez ses occupants.
    - type: text
      text: ' '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: S’ils en sont dignes, que la paix que vous leur souhaitez repose sur eux
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '10.13 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Selon la salutation juive habituelle : « Que la paix soit avec vous ! »'
      marker-yv: yv-n
    - type: usfm
      marker: wj
      children:
      - type: text
        text: . Sinon, qu’elle vous revienne.
    - type: text
      text: ' '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Si, dans une maison ou dans une ville, on ne veut pas vous recevoir, ni écouter vos paroles, quittez la maison ou la ville en secouant la poussière de vos pieds
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '10.14 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Geste marquant la rupture avec cette ville ou cette maison.
      marker-yv: yv-n
    - type: usfm
      marker: wj
      children:
      - type: text
        text: .
    - type: text
      text: ' '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'Vraiment, je vous l’assure : au jour du jugement, les villes de '
      - type: usfm
        marker: w
        children:
        - type: text
          text: Sodome
      - type: text
        text: ' et de '
      - type: usfm
        marker: w
        children:
        - type: text
          text: Gomorrhe
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '10.15 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Deux villes frappées par le jugement de Dieu. Leur histoire est racontée dans Gn 18 à 19.
      marker-yv: yv-n
    - type: text
      text: ' '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: seront traitées avec moins de rigueur que les habitants de ces lieux-là.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Les difficultés de la mission
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: (Mc 13.9-13 ; Lc 21.12-19)
    marker-yv: yv-h
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'Voici : moi, je vous envoie comme des brebis au milieu des loups. Soyez prudents comme des serpents et innocents comme des colombes.'
    - type: text
      text: ' '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'Soyez sur vos gardes ; car on vous traduira devant les tribunaux des '
      - type: usfm
        marker: w
        children:
        - type: text
          text: Juifs
      - type: text
        text: ' et l’on vous fera fouetter dans leurs '
      - type: usfm
        marker: w
        children:
        - type: text
          text: synagogues
      - type: text
        text: .
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: On vous forcera à comparaître devant des gouverneurs et des rois à cause de moi pour leur apporter un témoignage, ainsi qu’aux non-Juifs.
    - type: text
      text: ' '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Lorsqu’on vous livrera aux autorités, ne vous inquiétez ni du contenu ni de la forme de ce que vous direz, car cela vous sera donné au moment même.
    - type: text
      text: ' '
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Voici les noms des douze apôtres : d’abord, Simon appelé Pierre puis André son frère ; Jacques, fils de Zébédée, et Jean son frère ; '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: En effet, ce n’est pas vous qui parlerez, ce sera l’Esprit de votre Père qui parlera par votre bouche.
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Le frère livrera son propre frère pour le faire condamner à mort, et le père livrera son enfant. Des enfants se dresseront contre leurs parents et les feront mettre à mort.
    - type: text
      text: ' '
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'Tout le monde vous haïra à cause de moi. Mais celui qui tiendra bon jusqu’au bout sera '
      - type: usfm
        marker: w
        children:
        - type: text
          text: sauvé
      - type: text
        text: .
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'Si l’on vous persécute dans une ville, fuyez dans une autre ; vraiment, je vous l’assure : vous n’achèverez pas le tour des villes d’Israël avant que le '
      - type: usfm
        marker: w
        children:
        - type: text
          text: Fils de l’homme
      - type: text
        text: ' vienne.'
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'Le '
      - type: usfm
        marker: w
        children:
        - type: text
          text: disciple
      - type: text
        text: ' n’est pas plus grand que celui qui l’enseigne, ni le serviteur supérieur à son maître.'
    - type: text
      text: ' '
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Il suffit au disciple d’être comme celui qui l’enseigne et au serviteur d’être comme son maître. S’ils ont traité le maître de la maison de Béelzébul
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '10.25 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Béelzébul
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: ', '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '« chef des démons », selon '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: '12.24'
        - type: text
          text: ', était l’un des noms du diable.'
      marker-yv: yv-n
    - type: usfm
      marker: wj
      children:
      - type: text
        text: ', que diront-ils de ceux qui font partie de cette maison ?'
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Prendre courage pour la mission
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: (Lc 12.2-9)
    marker-yv: yv-h
  '26':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: N’ayez donc pas peur de ces gens-là ! Car tout ce qui est tenu secret sera dévoilé, et tout ce qui est caché finira par être connu.
    - type: text
      text: ' '
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Ce que je vous dis en secret, répétez-le en plein jour. Ce qu’on vous chuchote dans le creux de l’oreille, criez-le du haut des toits.
  '28':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Ne craignez donc pas ceux qui peuvent tuer le corps, mais qui n’ont pas le pouvoir de faire mourir l’âme. Craignez plutôt celui qui peut vous faire périr corps et âme dans l’enfer.
    - type: text
      text: ' '
  '29':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Ne vend-on pas une paire de moineaux pour un sou ? Et pourtant, pas un seul d’entre eux ne tombe à terre sans le consentement de votre Père.
    - type: text
      text: ' '
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Philippe et Barthélemy ; Thomas et Matthieu, le collecteur d’impôts ; Jacques, fils d’Alphée, et Thaddée ; '
  '30':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Quant à vous, même les cheveux de votre tête sont tous comptés.
    - type: text
      text: ' '
  '31':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: N’ayez donc aucune crainte, car vous, vous avez plus de valeur que toute une volée de moineaux.
  '32':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: C’est pourquoi, celui qui se déclarera pour moi devant les hommes, je me déclarerai moi aussi pour lui devant mon Père céleste.
    - type: text
      text: ' '
  '33':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Mais celui qui aura prétendu ne pas me connaître devant les hommes, je ne le reconnaîtrai pas non plus devant mon Père céleste.
  - type: usfm
    marker: r
    children:
    - type: text
      text: (Lc 12.51-53)
    marker-yv: yv-h
  '34':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'Ne croyez pas que je sois venu apporter la paix sur terre : je ne suis pas venu apporter la paix, mais l’épée.'
    - type: text
      text: ' '
  '35':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'Oui, je suis venu opposer '
      - type: usfm
        marker: qt
        children:
        - type: text
          text: 'le fils à son père, la fille à sa mère, la belle-fille à sa belle-mère :'
    - type: text
      text: ' '
  '36':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: usfm
        marker: qt
        children:
        - type: text
          text: on aura pour ennemis les gens de sa propre famille
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '10.36 '
      - type: usfm
        marker: ft
        children:
        - type: usfm
          marker: ref
          children:
          - type: text
            text: Mi 7.6
        - type: text
          text: .
      marker-yv: yv-n
    - type: usfm
      marker: wj
      children:
      - type: usfm
        marker: qt
        children:
        - type: text
          text: .
  - type: usfm
    marker: r
    children:
    - type: text
      text: (Lc 14.26-27)
    marker-yv: yv-h
  '37':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Celui qui aime son père ou sa mère plus que moi n’est pas digne de moi. Celui qui aime son fils ou sa fille plus que moi n’est pas digne de moi.
    - type: text
      text: ' '
  '38':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Et celui qui ne se charge pas de sa croix et ne me suit pas n’est pas digne de moi.
    - type: text
      text: ' '
  '39':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'Celui qui cherche à '
      - type: usfm
        marker: w
        children:
        - type: text
          text: sauver
      - type: text
        text: ' sa vie la perdra ; et celui qui aura perdu sa vie à cause de moi la retrouvera.'
  - type: usfm
    marker: r
    children:
    - type: text
      text: (Mc 9.41)
    marker-yv: yv-h
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Simon, le Zélé
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '10.4 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Ce surnom peut faire allusion à son zèle pour la Loi, ou, selon certains, à son appartenance au parti nationaliste des zélotes.
      marker-yv: yv-n
    - type: text
      text: ', et Judas Iscariot, celui qui a trahi Jésus.'
  - type: usfm
    marker: s1
    children:
    - type: text
      text: L’envoi des Douze
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: (Mc 6.7-13 ; Lc 9.1-6)
    marker-yv: yv-h
  '40':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Si quelqu’un vous accueille, c’est moi qu’il accueille. Or celui qui m’accueille, accueille celui qui m’a envoyé.
    - type: text
      text: ' '
  '41':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'Celui qui accueille un '
      - type: usfm
        marker: w
        children:
        - type: text
          text: prophète
      - type: text
        text: ' parce qu’il est un prophète recevra la même récompense que le prophète'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '10.41 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Autre traduction : '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: recevra une récompense réservée à un prophète.
      marker-yv: yv-n
    - type: usfm
      marker: wj
      children:
      - type: text
        text: . Et celui qui accueille un juste parce que c’est un juste aura la même récompense que le juste
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '10.41 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Autre traduction : '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: recevra une récompense réservée à un juste.
      marker-yv: yv-n
    - type: usfm
      marker: wj
      children:
      - type: text
        text: .
    - type: text
      text: ' '
  '42':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'Si quelqu’un donne à boire, ne serait-ce qu’un verre d’eau fraîche, au plus petit de mes '
      - type: usfm
        marker: w
        children:
        - type: text
          text: disciples
      - type: text
        text: ' parce qu’il est mon disciple, vraiment, je vous l’assure, il ne perdra pas sa récompense.'
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ce sont ces douze hommes que Jésus envoya, après leur avoir fait les recommandations suivantes : '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: N’allez pas dans les contrées étrangères et n’entrez pas dans les villes de la Samarie.
    - type: text
      text: ' '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Rendez-vous plutôt auprès des brebis perdues du peuple d’
      - type: usfm
        marker: w
        children:
        - type: text
          text: Israël
      - type: text
        text: .
    - type: text
      text: ' '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: En chemin, annoncez que le royaume
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '10.7 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Voir note '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: '3.2'
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: ' '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: des cieux est proche.
    - type: text
      text: ' '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'Guérissez les malades, ressuscitez les morts, rendez '
      - type: usfm
        marker: w
        children:
        - type: text
          text: purs
      - type: text
        text: ' les lépreux, expulsez les démons.'
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Vous avez reçu gratuitement, donnez gratuitement.
    - type: text
      text: ' '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Ne mettez dans vos bourses ni or, ni argent, ni pièce de cuivre.
    - type: text
      text: ' '
