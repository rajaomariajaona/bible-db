document_id: MAT.10,21
type_code: fra
verses:
  '1':
  - type: heading
    content: (Mc 3.13-19 ; Lc 6.12-16)
  - type: text
    content: 'Jésus appela ses douze disciples et leur donna l’autorité de chasser les esprits mauvais et de guérir toute maladie et toute infirmité. '
  '10':
  - type: text
    content: N’emportez pour le voyage ni sac, ni tunique de rechange, ni sandales, ni bâton, car « l’ouvrier mérite sa nourriture ».
  '11':
  - type: text
    content: ' '
  - type: text
    content: Chaque fois que vous arriverez dans une ville ou un village, cherchez quelqu’un qui soit respectable
  - type: text
    content: ' '
  - type: note
    content: 'Autre traduction : quelqu’un qui soit en mesure (ou désireux ) de vous accueillir.'
  - type: text
    content: et restez chez lui jusqu’à votre départ de la localité.
  - type: text
    content: ' '
  '12':
  - type: text
    content: En entrant dans la maison, saluez ses occupants.
  - type: text
    content: ' '
  '13':
  - type: text
    content: S’ils en sont dignes, que la paix que vous leur souhaitez repose sur eux
  - type: note
    content: 'Selon la salutation juive habituelle : « Que la paix soit avec vous ! »'
  - type: text
    content: . Sinon, qu’elle vous revienne.
  - type: text
    content: ' '
  '14':
  - type: text
    content: Si, dans une maison ou dans une ville, on ne veut pas vous recevoir, ni écouter vos paroles, quittez la maison ou la ville en secouant la poussière de vos pieds
  - type: note
    content: Geste marquant la rupture avec cette ville ou cette maison.
  - type: text
    content: .
  - type: text
    content: ' '
  '15':
  - type: text
    content: 'Vraiment, je vous l’assure : au jour du jugement, les villes de '
  - type: text
    content: Sodome
  - type: text
    content: ' et de '
  - type: text
    content: Gomorrhe
  - type: note
    content: Deux villes frappées par le jugement de Dieu. Leur histoire est racontée dans Gn 18 à 19.
  - type: text
    content: ' '
  - type: text
    content: seront traitées avec moins de rigueur que les habitants de ces lieux-là.
  - type: heading
    content: Les difficultés de la mission
  - type: heading
    content: (Mc 13.9-13 ; Lc 21.12-19)
  '16':
  - type: text
    content: ' '
  - type: text
    content: 'Voici : moi, je vous envoie comme des brebis au milieu des loups. Soyez prudents comme des serpents et innocents comme des colombes.'
  - type: text
    content: ' '
  '17':
  - type: text
    content: 'Soyez sur vos gardes ; car on vous traduira devant les tribunaux des '
  - type: text
    content: Juifs
  - type: text
    content: ' et l’on vous fera fouetter dans leurs '
  - type: text
    content: synagogues
  - type: text
    content: .
  '18':
  - type: text
    content: ' '
  - type: text
    content: On vous forcera à comparaître devant des gouverneurs et des rois à cause de moi pour leur apporter un témoignage, ainsi qu’aux non-Juifs.
  - type: text
    content: ' '
  '19':
  - type: text
    content: Lorsqu’on vous livrera aux autorités, ne vous inquiétez ni du contenu ni de la forme de ce que vous direz, car cela vous sera donné au moment même.
  - type: text
    content: ' '
  '2':
  - type: text
    content: 'Voici les noms des douze apôtres : d’abord, Simon appelé Pierre puis André son frère ; Jacques, fils de Zébédée, et Jean son frère ; '
  '20':
  - type: text
    content: En effet, ce n’est pas vous qui parlerez, ce sera l’Esprit de votre Père qui parlera par votre bouche.
  '21':
  - type: text
    content: ' '
  - type: text
    content: Le frère livrera son propre frère pour le faire condamner à mort, et le père livrera son enfant. Des enfants se dresseront contre leurs parents et les feront mettre à mort.
  - type: text
    content: ' '
  '22':
  - type: text
    content: 'Tout le monde vous haïra à cause de moi. Mais celui qui tiendra bon jusqu’au bout sera '
  - type: text
    content: sauvé
  - type: text
    content: .
  '23':
  - type: text
    content: ' '
  - type: text
    content: 'Si l’on vous persécute dans une ville, fuyez dans une autre ; vraiment, je vous l’assure : vous n’achèverez pas le tour des villes d’Israël avant que le '
  - type: text
    content: Fils de l’homme
  - type: text
    content: ' vienne.'
  '24':
  - type: text
    content: ' '
  - type: text
    content: 'Le '
  - type: text
    content: disciple
  - type: text
    content: ' n’est pas plus grand que celui qui l’enseigne, ni le serviteur supérieur à son maître.'
  - type: text
    content: ' '
  '25':
  - type: text
    content: Il suffit au disciple d’être comme celui qui l’enseigne et au serviteur d’être comme son maître. S’ils ont traité le maître de la maison de Béelzébul
  - type: note
    content: Béelzébul, « chef des démons », selon 12.24, était l’un des noms du diable.
  - type: text
    content: ', que diront-ils de ceux qui font partie de cette maison ?'
  - type: heading
    content: Prendre courage pour la mission
  - type: heading
    content: (Lc 12.2-9)
  '26':
  - type: text
    content: ' '
  - type: text
    content: N’ayez donc pas peur de ces gens-là ! Car tout ce qui est tenu secret sera dévoilé, et tout ce qui est caché finira par être connu.
  - type: text
    content: ' '
  '27':
  - type: text
    content: Ce que je vous dis en secret, répétez-le en plein jour. Ce qu’on vous chuchote dans le creux de l’oreille, criez-le du haut des toits.
  '28':
  - type: text
    content: ' '
  - type: text
    content: Ne craignez donc pas ceux qui peuvent tuer le corps, mais qui n’ont pas le pouvoir de faire mourir l’âme. Craignez plutôt celui qui peut vous faire périr corps et âme dans l’enfer.
  - type: text
    content: ' '
  '29':
  - type: text
    content: Ne vend-on pas une paire de moineaux pour un sou ? Et pourtant, pas un seul d’entre eux ne tombe à terre sans le consentement de votre Père.
  - type: text
    content: ' '
  '3':
  - type: text
    content: 'Philippe et Barthélemy ; Thomas et Matthieu, le collecteur d’impôts ; Jacques, fils d’Alphée, et Thaddée ; '
  '30':
  - type: text
    content: Quant à vous, même les cheveux de votre tête sont tous comptés.
  - type: text
    content: ' '
  '31':
  - type: text
    content: N’ayez donc aucune crainte, car vous, vous avez plus de valeur que toute une volée de moineaux.
  '32':
  - type: text
    content: ' '
  - type: text
    content: C’est pourquoi, celui qui se déclarera pour moi devant les hommes, je me déclarerai moi aussi pour lui devant mon Père céleste.
  - type: text
    content: ' '
  '33':
  - type: text
    content: Mais celui qui aura prétendu ne pas me connaître devant les hommes, je ne le reconnaîtrai pas non plus devant mon Père céleste.
  - type: heading
    content: (Lc 12.51-53)
  '34':
  - type: text
    content: ' '
  - type: text
    content: 'Ne croyez pas que je sois venu apporter la paix sur terre : je ne suis pas venu apporter la paix, mais l’épée.'
  - type: text
    content: ' '
  '35':
  - type: text
    content: 'Oui, je suis venu opposer '
  - type: text
    content: 'le fils à son père, la fille à sa mère, la belle-fille à sa belle-mère :'
  - type: text
    content: ' '
  '36':
  - type: text
    content: on aura pour ennemis les gens de sa propre famille
  - type: note
    content: Mi 7.6.
  - type: text
    content: .
  - type: heading
    content: (Lc 14.26-27)
  '37':
  - type: text
    content: ' '
  - type: text
    content: Celui qui aime son père ou sa mère plus que moi n’est pas digne de moi. Celui qui aime son fils ou sa fille plus que moi n’est pas digne de moi.
  - type: text
    content: ' '
  '38':
  - type: text
    content: Et celui qui ne se charge pas de sa croix et ne me suit pas n’est pas digne de moi.
  - type: text
    content: ' '
  '39':
  - type: text
    content: 'Celui qui cherche à '
  - type: text
    content: sauver
  - type: text
    content: ' sa vie la perdra ; et celui qui aura perdu sa vie à cause de moi la retrouvera.'
  - type: heading
    content: (Mc 9.41)
  '4':
  - type: text
    content: Simon, le Zélé
  - type: note
    content: Ce surnom peut faire allusion à son zèle pour la Loi, ou, selon certains, à son appartenance au parti nationaliste des zélotes.
  - type: text
    content: ', et Judas Iscariot, celui qui a trahi Jésus.'
  - type: heading
    content: L’envoi des Douze
  - type: heading
    content: (Mc 6.7-13 ; Lc 9.1-6)
  '40':
  - type: text
    content: ' '
  - type: text
    content: Si quelqu’un vous accueille, c’est moi qu’il accueille. Or celui qui m’accueille, accueille celui qui m’a envoyé.
  - type: text
    content: ' '
  '41':
  - type: text
    content: 'Celui qui accueille un '
  - type: text
    content: prophète
  - type: text
    content: ' parce qu’il est un prophète recevra la même récompense que le prophète'
  - type: note
    content: 'Autre traduction : recevra une récompense réservée à un prophète.'
  - type: text
    content: . Et celui qui accueille un juste parce que c’est un juste aura la même récompense que le juste
  - type: note
    content: 'Autre traduction : recevra une récompense réservée à un juste.'
  - type: text
    content: .
  - type: text
    content: ' '
  '42':
  - type: text
    content: 'Si quelqu’un donne à boire, ne serait-ce qu’un verre d’eau fraîche, au plus petit de mes '
  - type: text
    content: disciples
  - type: text
    content: ' parce qu’il est mon disciple, vraiment, je vous l’assure, il ne perdra pas sa récompense.'
  '5':
  - type: text
    content: 'Ce sont ces douze hommes que Jésus envoya, après leur avoir fait les recommandations suivantes : '
  - type: text
    content: N’allez pas dans les contrées étrangères et n’entrez pas dans les villes de la Samarie.
  - type: text
    content: ' '
  '6':
  - type: text
    content: Rendez-vous plutôt auprès des brebis perdues du peuple d’
  - type: text
    content: Israël
  - type: text
    content: .
  - type: text
    content: ' '
  '7':
  - type: text
    content: En chemin, annoncez que le royaume
  - type: note
    content: Voir note 3.2.
  - type: text
    content: ' '
  - type: text
    content: des cieux est proche.
  - type: text
    content: ' '
  '8':
  - type: text
    content: 'Guérissez les malades, ressuscitez les morts, rendez '
  - type: text
    content: purs
  - type: text
    content: ' les lépreux, expulsez les démons.'
  - type: text
    content: Vous avez reçu gratuitement, donnez gratuitement.
  - type: text
    content: ' '
  '9':
  - type: text
    content: Ne mettez dans vos bourses ni or, ni argent, ni pièce de cuivre.
  - type: text
    content: ' '
