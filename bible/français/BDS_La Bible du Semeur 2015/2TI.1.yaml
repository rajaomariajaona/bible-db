document_id: 2TI.1
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Salutation
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Paul, apôtre de Jésus-Christ par la volonté de Dieu, chargé d’annoncer la vie promise par Dieu et accessible dans l’union avec Jésus-Christ, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'salue Timothée, son cher enfant :'
- type: usfm
  marker: p
  children:
  - type: text
    text: Que Dieu le Père et Jésus-Christ, notre Seigneur, t’accordent grâce, compassion et paix.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Paul remercie Dieu pour Timothée
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Je suis reconnaissant envers Dieu, que je sers avec une conscience pure, à l’exemple de mes ancêtres
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1.3 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Les ancêtres de Paul étaient des Juifs pieux (voir '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ph 3.4-5
        metadata:
          usfm: PHP.3.4+PHP.3.5
      - type: text
        text: ).
    marker-yv: yv-n
  - type: text
    text: ', lorsque continuellement, nuit et jour, je fais mention de toi dans mes prières. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Je me rappelle tes larmes
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1.4 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Au moment du départ de Paul d’Ephèse.
    marker-yv: yv-n
  - type: text
    text: ' et j’éprouve un vif désir de te revoir afin d’être rempli de joie.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Je garde le souvenir de ta foi sincère, cette foi qui se trouvait déjà chez ta grand-mère Loïs et ta mère Eunice. A présent, elle habite aussi en toi, j’en suis pleinement convaincu.
- type: usfm
  marker: ms1
  children:
  - type: text
    text: Invitation au courage et à la fidélité
  marker-yv: yv-h
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ravive la flamme !
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'C’est pourquoi je te le rappelle : ravive le don que Dieu t’a fait dans sa grâce lorsque je t’ai imposé les mains. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Dieu nous a donné un Esprit qui, loin de faire de nous des lâches, nous rend forts, aimants et réfléchis.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: N’aie donc pas honte de rendre témoignage au sujet de notre Seigneur. N’aie pas non plus honte de moi qui suis ici en prison pour sa cause
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1.8 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Paul est prisonnier à Rome parce qu’il a prêché l’Evangile.
    marker-yv: yv-n
  - type: text
    text: '. Au contraire, souffre avec moi pour l’Evangile selon la force que Dieu donne. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: C’est lui qui nous a sauvés et nous a appelés à mener une vie sainte. Et s’il l’a fait, ce n’est pas à cause de ce que nous avons fait, mais bien parce qu’il en avait librement décidé ainsi, à cause de sa grâce.
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Cette grâce, il nous l’a donnée de toute éternité en Jésus-Christ. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Et maintenant elle a été révélée par la venue de notre Sauveur Jésus-Christ. Il a brisé la puissance de la mort et, par l’Evangile, a fait resplendir la lumière de la vie et de l’immortalité.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'C’est pour annoncer cet Evangile que j’ai été établi prédicateur, apôtre et enseignant. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: C’est aussi la raison de mes souffrances présentes. Mais je n’en ai pas honte, car je sais en qui j’ai mis ma confiance et j’ai la ferme conviction qu’il est assez puissant pour garder tout ce qu’il m’a confié jusqu’au jour du jugement.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Tu as entendu de moi des paroles saines : fais-en ton modèle pour l’appliquer dans la foi et l’amour qui se trouvent dans l’union avec Jésus-Christ. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Garde intact, par l’Esprit Saint qui habite en nous, le bien précieux qui t’a été confié.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Le courage d’Onésiphore
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Comme tu le sais, tous ceux qui sont dans la province d’Asie m’ont abandonné, entre autres Phygèle et Hermogène. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Quant à Onésiphore, que le Seigneur manifeste sa compassion à toute sa famille. En effet, il m’a souvent réconforté et il n’a pas eu honte de moi parce que je suis en prison. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Au contraire, dès son arrivée à Rome, il s’est mis activement à ma recherche, et il a fini par me trouver. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Que le Seigneur lui donne d’avoir part à la compassion du Seigneur au jour du jugement. Tu sais aussi mieux que personne combien de services il m’a rendus à Ephèse.
