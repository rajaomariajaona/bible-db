document_id: 2TI.1,21
type_code: fra
verses:
  '1':
  - type: heading
    content: Salutation
  - type: text
    content: 'Paul, apôtre de Jésus-Christ par la volonté de Dieu, chargé d’annoncer la vie promise par Dieu et accessible dans l’union avec Jésus-Christ, '
  '10':
  - type: text
    content: Et maintenant elle a été révélée par la venue de notre Sauveur Jésus-Christ. Il a brisé la puissance de la mort et, par l’Evangile, a fait resplendir la lumière de la vie et de l’immortalité.
  '11':
  - type: text
    content: 'C’est pour annoncer cet Evangile que j’ai été établi prédicateur, apôtre et enseignant. '
  '12':
  - type: text
    content: C’est aussi la raison de mes souffrances présentes. Mais je n’en ai pas honte, car je sais en qui j’ai mis ma confiance et j’ai la ferme conviction qu’il est assez puissant pour garder tout ce qu’il m’a confié jusqu’au jour du jugement.
  '13':
  - type: text
    content: 'Tu as entendu de moi des paroles saines : fais-en ton modèle pour l’appliquer dans la foi et l’amour qui se trouvent dans l’union avec Jésus-Christ. '
  '14':
  - type: text
    content: Garde intact, par l’Esprit Saint qui habite en nous, le bien précieux qui t’a été confié.
  - type: heading
    content: Le courage d’Onésiphore
  '15':
  - type: text
    content: 'Comme tu le sais, tous ceux qui sont dans la province d’Asie m’ont abandonné, entre autres Phygèle et Hermogène. '
  '16':
  - type: text
    content: 'Quant à Onésiphore, que le Seigneur manifeste sa compassion à toute sa famille. En effet, il m’a souvent réconforté et il n’a pas eu honte de moi parce que je suis en prison. '
  '17':
  - type: text
    content: 'Au contraire, dès son arrivée à Rome, il s’est mis activement à ma recherche, et il a fini par me trouver. '
  '18':
  - type: text
    content: Que le Seigneur lui donne d’avoir part à la compassion du Seigneur au jour du jugement. Tu sais aussi mieux que personne combien de services il m’a rendus à Ephèse.
  '2':
  - type: text
    content: 'salue Timothée, son cher enfant :'
  - type: text
    content: Que Dieu le Père et Jésus-Christ, notre Seigneur, t’accordent grâce, compassion et paix.
  - type: heading
    content: Paul remercie Dieu pour Timothée
  '3':
  - type: text
    content: Je suis reconnaissant envers Dieu, que je sers avec une conscience pure, à l’exemple de mes ancêtres
  - type: note
    content: Les ancêtres de Paul étaient des Juifs pieux (voir Ph 3.4-5).
  - type: text
    content: ', lorsque continuellement, nuit et jour, je fais mention de toi dans mes prières. '
  '4':
  - type: text
    content: Je me rappelle tes larmes
  - type: note
    content: Au moment du départ de Paul d’Ephèse.
  - type: text
    content: ' et j’éprouve un vif désir de te revoir afin d’être rempli de joie.'
  '5':
  - type: text
    content: Je garde le souvenir de ta foi sincère, cette foi qui se trouvait déjà chez ta grand-mère Loïs et ta mère Eunice. A présent, elle habite aussi en toi, j’en suis pleinement convaincu.
  - type: heading
    content: Invitation au courage et à la fidélité
  - type: heading
    content: Ravive la flamme !
  '6':
  - type: text
    content: 'C’est pourquoi je te le rappelle : ravive le don que Dieu t’a fait dans sa grâce lorsque je t’ai imposé les mains. '
  '7':
  - type: text
    content: Dieu nous a donné un Esprit qui, loin de faire de nous des lâches, nous rend forts, aimants et réfléchis.
  '8':
  - type: text
    content: N’aie donc pas honte de rendre témoignage au sujet de notre Seigneur. N’aie pas non plus honte de moi qui suis ici en prison pour sa cause
  - type: note
    content: Paul est prisonnier à Rome parce qu’il a prêché l’Evangile.
  - type: text
    content: '. Au contraire, souffre avec moi pour l’Evangile selon la force que Dieu donne. '
  '9':
  - type: text
    content: C’est lui qui nous a sauvés et nous a appelés à mener une vie sainte. Et s’il l’a fait, ce n’est pas à cause de ce que nous avons fait, mais bien parce qu’il en avait librement décidé ainsi, à cause de sa grâce.
  - type: text
    content: 'Cette grâce, il nous l’a donnée de toute éternité en Jésus-Christ. '
