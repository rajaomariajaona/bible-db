document_id: MRK.INTRO1,21
type_code: fra
verses:
  '1':
  - type: usfm
    marker: imt1
    children:
    - type: text
      text: Introduction
  - type: usfm
    marker: ip
    children:
    - type: text
      text: C’est auprès de l’apôtre Pierre, dont il fut le secrétaire (1 P 5.13) après avoir été le collaborateur de Paul (Ac 12.25), que Marc recueillit les informations nécessaires à la rédaction de son évangile. Cet évangile, en effet, contient des détails qui portent la marque du témoin oculaire.
  - type: usfm
    marker: ip
    children:
    - type: text
      text: Les spécialistes, dans leur majorité, pensent que Marc écrit de Rome vers les années 63 à 68. Il s’adresse à des chrétiens issus du paganisme pour lesquels il prend soin de traduire les expressions araméennes et hébraïques et d’expliquer les coutumes juives.
  - type: usfm
    marker: ip
    children:
    - type: text
      text: 'L’intérêt de Marc porte surtout sur les œuvres de Jésus : il le montre en pleine action, guérissant les malades, multipliant le pain pour les foules. Il ne rapporte pas moins de dix-huit miracles.'
  - type: usfm
    marker: ip
    children:
    - type: text
      text: 'Les œuvres de Jésus authentifient sa divinité. En effet, dès le premier verset, Marc nous dit que Jésus est « Fils de Dieu » (1.1) et, vers la fin de l’évangile, au pied de la croix, le centurion romain s’exclame : « Cet homme était vraiment Fils de Dieu ! » (15.39).'
  - type: usfm
    marker: ip
    children:
    - type: text
      text: 'Ces miracles, cependant, ne sont pas le fait d’un homme qui recherche la gloire : Jésus sait qu’il va souffrir. C’est pourquoi Marc présente la vie de Jésus comme une préparation à sa mort : dans les treize premiers chapitres, Jésus annonce, à plusieurs reprises, ses souffrances à venir. Le récit, qui suit ses déplacements géographiques, de Galilée en Judée, peut aussi être lu comme une montée vers Jérusalem où il va mourir.'
  - type: usfm
    marker: ip
    children:
    - type: text
      text: 'Cette mort est néanmoins une bonne nouvelle, car Jésus a accompli la prophétie d’Esaïe (Es 53.12) : il est venu pour « donner sa vie en rançon pour beaucoup » (10.45) et, comme il l’avait annoncé, il est ressuscité. Le Fils de Dieu ne pouvait rester dans la tombe !'
