document_id: PSA.26,21
type_code: fra
verses:
  '1':
  - type: heading
    content: Fais-moi justice
  - type: text
    content: De David.
  - type: text
    content: Fais-moi justice, ô Eternel, ╵car la vie que je mène ╵est sans reproche.
  - type: text
    content: Je me confie en l’Eternel, ╵je ne faiblirai pas
  - type: note
    content: 'Autre traduction : sans faiblir.'
  - type: text
    content: .
  '10':
  - type: text
    content: Ils ont commis ╵des actes criminels,
  - type: text
    content: ils se sont laissé acheter
  - type: note
    content: 'Autre traduction : elles cherchent à soudoyer.'
  - type: text
    content: .
  '11':
  - type: text
    content: Mais moi je veux mener ╵une vie sans reproche.
  - type: text
    content: Délivre-moi ╵et fais-moi grâce !
  '12':
  - type: text
    content: Je marche sur le droit chemin
  - type: note
    content: 'Autre traduction : je me tiens sur un terrain ferme.'
  - type: text
    content: .
  - type: text
    content: Oui, je veux te bénir, ╵ô Eternel, ╵au sein de l’assemblée.
  '2':
  - type: text
    content: Sonde-moi, Eternel, ╵éprouve-moi
  - type: text
    content: et examine ╵mon cœur et mes pensées.
  '3':
  - type: text
    content: Je garde ton amour ╵présent à mon esprit,
  - type: text
    content: et je conduis ma vie ╵selon ta vérité.
  '4':
  - type: text
    content: Je ne vais pas m’asseoir ╵avec les hommes fourbes.
  - type: text
    content: Je ne fréquente pas ╵les hypocrites.
  '5':
  - type: text
    content: Je hais la compagnie ╵de ceux qui font le mal,
  - type: text
    content: je ne vais pas m’asseoir ╵chez les méchants.
  '6':
  - type: text
    content: Je laverai mes mains ╵en signe d’innocence
  - type: note
    content: Se laver les mains en public était un geste symbolique signifiant que l’on se déchargeait de toute responsabilité lorsqu’un crime avait été commis (Dt 21.7 ; Mt 27.24).
  - type: text
    content: avant de m’approcher ╵de ton autel, ô Eternel,
  '7':
  - type: text
    content: pour t’exprimer ╵ma gratitude,
  - type: text
    content: et raconter ╵tes œuvres merveilleuses.
  '8':
  - type: text
    content: O Eternel, ╵j’aime le lieu ╵où tu habites
  - type: text
    content: et où ta gloire
  - type: note
    content: La gloire de Dieu dans le tabernacle (Ex 40.35) et plus tard dans le Temple (1 R 8.11) signalait la présence de l’Eternel lui-même (voir Ex 24.16 ; 32.22  ; cf. Jn 1.14).
  - type: text
    content: ' ╵a sa demeure !'
  '9':
  - type: text
    content: Ne lie donc pas mon sort ╵à celui des pécheurs,
  - type: text
    content: ne m’ôte pas la vie ╵avec les assassins !
