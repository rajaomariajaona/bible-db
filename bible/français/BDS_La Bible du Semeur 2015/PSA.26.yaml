document_id: PSA.26,21
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Fais-moi justice
    marker-yv: yv-h
  - type: usfm
    marker: d
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: De David.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fais-moi justice, ô Eternel, ╵car la vie que je mène ╵est sans reproche.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Je me confie en l’Eternel, ╵je ne faiblirai pas
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '26.1 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Autre traduction : '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: sans faiblir.
      marker-yv: yv-n
    - type: text
      text: .
  '10':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: Ils ont commis ╵des actes criminels,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ils se sont laissé acheter
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '26.10 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Autre traduction : '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: elles cherchent à soudoyer.
      marker-yv: yv-n
    - type: text
      text: .
  '11':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: Mais moi je veux mener ╵une vie sans reproche.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Délivre-moi ╵et fais-moi grâce !
  '12':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: Je marche sur le droit chemin
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '26.12 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Autre traduction : '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: je me tiens sur un terrain ferme.
      marker-yv: yv-n
    - type: text
      text: .
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Oui, je veux te bénir, ╵ô Eternel, ╵au sein de l’assemblée.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: Sonde-moi, Eternel, ╵éprouve-moi
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et examine ╵mon cœur et mes pensées.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: Je garde ton amour ╵présent à mon esprit,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et je conduis ma vie ╵selon ta vérité.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: Je ne vais pas m’asseoir ╵avec les hommes fourbes.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Je ne fréquente pas ╵les hypocrites.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: Je hais la compagnie ╵de ceux qui font le mal,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: je ne vais pas m’asseoir ╵chez les méchants.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: Je laverai mes mains ╵en signe d’innocence
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '26.6 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Se laver les mains en public était un geste symbolique signifiant que l’on se déchargeait de toute responsabilité lorsqu’un crime avait été commis (Dt 21.7 ; Mt 27.24).
      marker-yv: yv-n
  - type: usfm
    marker: q1
    children:
    - type: text
      text: avant de m’approcher ╵de ton autel, ô Eternel,
  '7':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: pour t’exprimer ╵ma gratitude,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et raconter ╵tes œuvres merveilleuses.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: O Eternel, ╵j’aime le lieu ╵où tu habites
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et où ta gloire
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '26.8 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: La gloire de Dieu dans le tabernacle (
        - type: usfm
          marker: ref
          children:
          - type: text
            text: Ex 40.35
        - type: text
          text: ) et plus tard dans le Temple (
        - type: usfm
          marker: ref
          children:
          - type: text
            text: 1 R 8.11
        - type: text
          text: ') signalait la présence de l’Eternel lui-même (voir Ex 24.16 ; 32.22  ; cf. '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: Jn 1.14
        - type: text
          text: ).
      marker-yv: yv-n
    - type: text
      text: ' ╵a sa demeure !'
  '9':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: Ne lie donc pas mon sort ╵à celui des pécheurs,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ne m’ôte pas la vie ╵avec les assassins !
