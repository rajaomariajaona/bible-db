document_id: HOS.13,21
type_code: fra
verses:
  '1':
  - type: heading
    content: Le prix de la révolte
  - type: text
    content: Dès qu’Ephraïm parlait,
  - type: text
    content: tous étaient terrifiés,
  - type: text
    content: il portait la terreur ╵en Israël,
  - type: text
    content: il s’est rendu coupable ╵en adorant Baal.
  - type: text
    content: C’est pourquoi il est mort.
  '10':
  - type: text
    content: Où est-il à présent, ╵votre roi, où est-il ?
  - type: text
    content: Qu’il vienne vous sauver ╵dans toutes vos cités !
  - type: text
    content: 'Où sont-ils à présent, ╵vos chefs ╵auxquels vous demandiez :'
  - type: text
    content: “Donnez-nous donc un roi ╵et des ministres” ?
  '11':
  - type: text
    content: Oui, je te donnerai ╵un roi dans ma colère,
  - type: text
    content: je te le reprendrai ╵dans mon indignation.
  '12':
  - type: text
    content: Le crime d’Ephraïm ╵est bien enregistré,
  - type: text
    content: et son péché ╵est bien noté.
  '13':
  - type: text
    content: Les douleurs de l’enfantement ╵vont survenir pour lui,
  - type: text
    content: 'mais l’enfant est stupide :'
  - type: text
    content: le terme est arrivé, ╵et il ne quitte pas ╵le sein qui l’a porté.
  '14':
  - type: text
    content: Devrais-je donc les affranchir ╵du pouvoir du sépulcre ?
  - type: text
    content: Et, de la mort, ╵devrais-je les sauver ?
  - type: text
    content: O mort, où est ta force ?
  - type: text
    content: Sépulcre, où est ╵ton pouvoir destructeur
  - type: note
    content: 'Les mots ta force rend l’hébreu : tes pestes. Cité en 1 Co 15.55.'
  - type: text
    content: '  ?'
  - type: text
    content: Je ne peux plus les avoir en pitié.
  '15':
  - type: text
    content: Ephraïm a beau prospérer
  - type: note
    content: 'Jeu de mots avec Ephraïm qui signifie : fécond. Le vent d’orient (Jb 1.19 ; Es 27.8 ; Jr 4.11 ; 13.24 ; 18.17) est une image de l’Assyrie, instrument de Dieu (Es 10.5, 15) qui envahira le royaume du Nord en 734 et y mettra fin en 722-721 av. J.-C.'
  - type: text
    content: ' ╵au milieu de l’herbage'
  - type: note
    content: 'au milieu de l’herbage: traduction incertaine. Le texte hébreu traditionnel porte : « fils de frères ». Certains corrigent, en ajoutant une lettre, pour obtenir : parmi des frères. Certains pensent que « fils de frères » pourrait se référer au fait qu’Ephraïm a été adopté par Jacob comme son fils et a reçu une part d’héritage avec ses oncles.'
  - type: text
    content: ','
  - type: text
    content: le vent d’orient viendra,
  - type: text
    content: un vent de l’Eternel ╵montera du désert
  - type: text
    content: et il desséchera ╵la source d’Ephraïm,
  - type: text
    content: il fera tarir sa fontaine.
  - type: text
    content: L’ennemi pillera ╵tout son trésor
  - type: note
    content: 'Autre traduction : le grenier.'
  - type: text
    content: ', ╵tous les objets précieux.'
  '2':
  - type: text
    content: Et maintenant, ╵voilà ces gens ╵qui pèchent davantage,
  - type: text
    content: faisant de leur argent ╵des idoles fondues,
  - type: text
    content: 'des statues façonnées ╵avec habileté :'
  - type: text
    content: ouvrages d’artisans ╵que tout cela !
  - type: text
    content: 'On dit à leur propos :'
  - type: text
    content: ils offrent des humains ╵en sacrifice
  - type: note
    content: 'Les sacrifices humains sont mentionnés, entre autres, en 2 R 17.17 ; 23.10 ; Ez 20.26  : Mi 6.7.'
  - type: text
    content: et ils font des baisers aux veaux
  - type: note
    content: Geste d’hommage à une divinité (1 R 19.18 ; Jb 31.27), adressé aux veaux d’or dressés par Jéroboam (voir 4.15 et note ; 8.5 ; 10.5 ; 1 R 12.28-29).
  - type: text
    content: '  !'
  '3':
  - type: text
    content: C’est pourquoi ils seront semblables ╵aux nuées matinales,
  - type: text
    content: à la rosée de l’aube ╵qui bientôt se dissipe,
  - type: text
    content: à un fétu de paille ╵emporté loin de l’aire ╵en tourbillon,
  - type: text
    content: et à de la fumée ╵sortant d’une ouverture.
  '4':
  - type: text
    content: « Pourtant moi, l’Eternel, ╵je suis ton Dieu
  - type: text
    content: depuis l’Egypte
  - type: text
    content: et, en dehors de moi, ╵tu ne connais pas d’autre Dieu,
  - type: text
    content: il n’y a pas d’autre Sauveur que moi.
  '5':
  - type: text
    content: C’est moi qui suis entré ╵en union avec toi
  - type: note
    content: 'Selon le texte hébreu traditionnel. L’ancienne version grecque et la version syriaque ont : j’ai été ton berger.'
  - type: text
    content: ' ╵dans le désert,'
  - type: text
    content: dans une terre aride.
  '6':
  - type: text
    content: Lorsqu’ils sont arrivés ╵dans de gras pâturages,
  - type: text
    content: ils se sont rassasiés ;
  - type: text
    content: quand ils furent repus,
  - type: text
    content: l’orgueil les a saisis
  - type: text
    content: là-dessus, ils m’ont oublié.
  '7':
  - type: text
    content: Mais je serai pour eux ╵semblable à un lion
  - type: text
    content: et, comme un léopard ╵sur leur chemin,
  - type: text
    content: je serai aux aguets.
  '8':
  - type: text
    content: Et comme une ourse ╵privée de ses petits, ╵je les attaquerai
  - type: text
    content: et leur déchirerai ╵l’enveloppe du cœur.
  - type: text
    content: Je les dévorerai ╵là, comme une lionne ;
  - type: text
    content: ils seront mis en pièces ╵par les bêtes sauvages.
  '9':
  - type: text
    content: Israël, te voilà détruit.
  - type: text
    content: Qui te viendrait en aide
  - type: note
    content: 'Selon l’ancienne version grecque et la syriaque. Texte hébreu traditionnel : parce que tu t’opposes à moi, moi qui pourrais te secourir. La différence tient à une seule lettre en hébreu.'
  - type: text
    content: '  ?'
