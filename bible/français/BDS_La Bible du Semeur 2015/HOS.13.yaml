document_id: HOS.13
type_code: fra
segments:
- type: usfm
  marker: s2
  children:
  - type: text
    text: Le prix de la révolte
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Dès qu’Ephraïm parlait,
- type: usfm
  marker: q1
  children:
  - type: text
    text: tous étaient terrifiés,
- type: usfm
  marker: q1
  children:
  - type: text
    text: il portait la terreur ╵en Israël,
- type: usfm
  marker: q1
  children:
  - type: text
    text: il s’est rendu coupable ╵en adorant Baal.
- type: usfm
  marker: q1
  children:
  - type: text
    text: C’est pourquoi il est mort.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Et maintenant, ╵voilà ces gens ╵qui pèchent davantage,
- type: usfm
  marker: q1
  children:
  - type: text
    text: faisant de leur argent ╵des idoles fondues,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'des statues façonnées ╵avec habileté :'
- type: usfm
  marker: q1
  children:
  - type: text
    text: ouvrages d’artisans ╵que tout cela !
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'On dit à leur propos :'
- type: usfm
  marker: q1
  children:
  - type: text
    text: ils offrent des humains ╵en sacrifice
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '13.2 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Les sacrifices humains sont mentionnés, entre autres, en 2 R 17.17 ; 23.10 ; Ez 20.26  : '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Mi 6.7
        metadata:
          usfm: MIC.6.7
      - type: text
        text: .
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: text
    text: et ils font des baisers aux veaux
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '13.2 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Geste d’hommage à une divinité (1 R 19.18 ; Jb 31.27), adressé aux veaux d’or dressés par Jéroboam (voir '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '4.15'
        metadata:
          usfm: HOS.4.15
      - type: text
        text: ' et note ; 8.5 ; 10.5 ; 1 R 12.28-29).'
    marker-yv: yv-n
  - type: text
    text: '  !'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: C’est pourquoi ils seront semblables ╵aux nuées matinales,
- type: usfm
  marker: q1
  children:
  - type: text
    text: à la rosée de l’aube ╵qui bientôt se dissipe,
- type: usfm
  marker: q1
  children:
  - type: text
    text: à un fétu de paille ╵emporté loin de l’aire ╵en tourbillon,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et à de la fumée ╵sortant d’une ouverture.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: « Pourtant moi, l’Eternel, ╵je suis ton Dieu
- type: usfm
  marker: q1
  children:
  - type: text
    text: depuis l’Egypte
- type: usfm
  marker: q1
  children:
  - type: text
    text: et, en dehors de moi, ╵tu ne connais pas d’autre Dieu,
- type: usfm
  marker: q1
  children:
  - type: text
    text: il n’y a pas d’autre Sauveur que moi.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: C’est moi qui suis entré ╵en union avec toi
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '13.5 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Selon le texte hébreu traditionnel. L’ancienne version grecque et la version syriaque ont : '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: j’ai été ton berger.
    marker-yv: yv-n
  - type: text
    text: ' ╵dans le désert,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: dans une terre aride.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Lorsqu’ils sont arrivés ╵dans de gras pâturages,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ils se sont rassasiés ;
- type: usfm
  marker: q1
  children:
  - type: text
    text: quand ils furent repus,
- type: usfm
  marker: q1
  children:
  - type: text
    text: l’orgueil les a saisis
- type: usfm
  marker: q1
  children:
  - type: text
    text: là-dessus, ils m’ont oublié.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Mais je serai pour eux ╵semblable à un lion
- type: usfm
  marker: q1
  children:
  - type: text
    text: et, comme un léopard ╵sur leur chemin,
- type: usfm
  marker: q1
  children:
  - type: text
    text: je serai aux aguets.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Et comme une ourse ╵privée de ses petits, ╵je les attaquerai
- type: usfm
  marker: q1
  children:
  - type: text
    text: et leur déchirerai ╵l’enveloppe du cœur.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Je les dévorerai ╵là, comme une lionne ;
- type: usfm
  marker: q1
  children:
  - type: text
    text: ils seront mis en pièces ╵par les bêtes sauvages.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Israël, te voilà détruit.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Qui te viendrait en aide
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '13.9 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Selon l’ancienne version grecque et la syriaque. Texte hébreu traditionnel : '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'parce que tu t’opposes à moi, moi qui pourrais te secourir. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: La différence tient à une seule lettre en hébreu.
    marker-yv: yv-n
  - type: text
    text: '  ?'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Où est-il à présent, ╵votre roi, où est-il ?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Qu’il vienne vous sauver ╵dans toutes vos cités !
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Où sont-ils à présent, ╵vos chefs ╵auxquels vous demandiez :'
- type: usfm
  marker: q1
  children:
  - type: text
    text: “Donnez-nous donc un roi ╵et des ministres” ?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Oui, je te donnerai ╵un roi dans ma colère,
- type: usfm
  marker: q1
  children:
  - type: text
    text: je te le reprendrai ╵dans mon indignation.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Le crime d’Ephraïm ╵est bien enregistré,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et son péché ╵est bien noté.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Les douleurs de l’enfantement ╵vont survenir pour lui,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'mais l’enfant est stupide :'
- type: usfm
  marker: q1
  children:
  - type: text
    text: le terme est arrivé, ╵et il ne quitte pas ╵le sein qui l’a porté.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Devrais-je donc les affranchir ╵du pouvoir du sépulcre ?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et, de la mort, ╵devrais-je les sauver ?
- type: usfm
  marker: q1
  children:
  - type: text
    text: O mort, où est ta force ?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Sépulcre, où est ╵ton pouvoir destructeur
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '13.14 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Les mots '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'ta force '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'rend l’hébreu : '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'tes pestes. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Cité en '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1 Co 15.55
        metadata:
          usfm: 1CO.15.55
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: '  ?'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Je ne peux plus les avoir en pitié.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Ephraïm a beau prospérer
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '13.15 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Jeu de mots avec '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'Ephraïm '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'qui signifie : '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'fécond. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Le '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'vent d’orient '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: (Jb 1.19 ; Es 27.8 ; Jr 4.11 ; 13.24 ; 18.17) est une image de l’Assyrie, instrument de Dieu (
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Es 10.5
        metadata:
          usfm: ISA.10.5
      - type: text
        text: ', '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '15'
        metadata:
          usfm: ISA.10.15
      - type: text
        text: ) qui envahira le royaume du Nord en 734 et y mettra fin en 722-721 av. J.-C.
    marker-yv: yv-n
  - type: text
    text: ' ╵au milieu de l’herbage'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '13.15 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: au milieu de l’herbage
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: ': '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'traduction incertaine. Le texte hébreu traditionnel porte : « fils de frères ». Certains corrigent, en ajoutant une lettre, pour obtenir : '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'parmi des frères. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Certains pensent que « fils de frères » pourrait se référer au fait qu’Ephraïm a été adopté par Jacob comme son fils et a reçu une part d’héritage avec ses oncles.
    marker-yv: yv-n
  - type: text
    text: ','
- type: usfm
  marker: q1
  children:
  - type: text
    text: le vent d’orient viendra,
- type: usfm
  marker: q1
  children:
  - type: text
    text: un vent de l’Eternel ╵montera du désert
- type: usfm
  marker: q1
  children:
  - type: text
    text: et il desséchera ╵la source d’Ephraïm,
- type: usfm
  marker: q1
  children:
  - type: text
    text: il fera tarir sa fontaine.
- type: usfm
  marker: q1
  children:
  - type: text
    text: L’ennemi pillera ╵tout son trésor
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '13.15 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Autre traduction : '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: le grenier.
    marker-yv: yv-n
  - type: text
    text: ', ╵tous les objets précieux.'
