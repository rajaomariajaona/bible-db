document_id: ISA.29,21
type_code: fra
verses:
  '1':
  - type: heading
    content: Malheur à la cité de David
  - type: text
    content: Malheur à la cité-Autel
  - type: note
    content: Nom donné à Jérusalem, en hébreu Ariel, mot qui pourrait signifier « lion de Dieu », mais, d’après le v. 2 et Ez 43.15-16, ce terme désigne l’autel des sacrifices ou le foyer de cet autel.
  - type: text
    content: ', ╵à la cité-Autel'
  - type: text
    content: contre laquelle ╵David a installé son campement.
  - type: text
    content: Elle a beau maintenir, ╵année après année,
  - type: text
    content: tout le cycle des fêtes,
  '10':
  - type: text
    content: Car l’Eternel ╵a répandu sur vous
  - type: text
    content: un esprit de torpeur
  - type: note
    content: Voir 6.10. Cité en Rm 11.8.
  - type: text
    content: ','
  - type: text
    content: il a bouché vos yeux, ╵vous, les prophètes ;
  - type: text
    content: il a voilé vos têtes, ╵vous qui recevez des révélations.
  '11':
  - type: text
    content: 'Toute cette révélation est devenue pour vous comme les mots écrits sur un rouleau scellé. Donnez-le à un homme qui a appris à lire en lui disant : « Lis cela, s’il te plaît », et il vous répondra : « Je ne peux pas le lire, le rouleau est scellé. » '
  '12':
  - type: text
    content: 'Donnez-le à quelqu’un qui n’a jamais appris à lire en lui disant : « Lis cela, s’il te plaît », et il vous répondra : « Moi, je ne sais pas lire. »'
  - type: heading
    content: De surprise en surprise
  '13':
  - type: text
    content: 'Le Seigneur dit encore : ╵Ce peuple se tourne vers moi,'
  - type: text
    content: 'mais ce n’est qu’en paroles, ╵et il me rend hommage, ╵mais c’est du bout des lèvres :'
  - type: text
    content: car au fond de son cœur, ╵il est bien loin de moi,
  - type: text
    content: et la crainte ╵qu’il a de moi
  - type: text
    content: n’est faite que de règles ╵que des hommes lui ont enseignées
  - type: note
    content: Cité en Mt 15.8-9 ; Mc 7.6-7.
  - type: text
    content: .
  '14':
  - type: text
    content: A cause de cela, ╵j’étonnerai ce peuple
  - type: text
    content: par de nouveaux prodiges, ╵des actes extraordinaires ;
  - type: text
    content: la sagesse des sages ╵sera anéantie,
  - type: text
    content: l’intelligence ╵fera défaut ╵à ses intelligents
  - type: note
    content: Cité en 1 Co 1.19, d’après l’ancienne version grecque.
  - type: text
    content: .
  - type: heading
    content: Où est Dieu
  '15':
  - type: text
    content: Malheur à ceux ╵qui vont dans les lieux les plus reculés
  - type: text
    content: pour cacher leurs desseins à l’Eternel
  - type: text
    content: et dont les entreprises ╵se font dans les ténèbres,
  - type: text
    content: 'à ceux qui disent : ╵« Qui peut nous voir ? ╵Qui nous remarque ? »'
  '16':
  - type: text
    content: Allez-vous inverser les rôles ?
  - type: text
    content: Allez-vous prendre ╵le potier pour l’argile,
  - type: text
    content: 'pour que l’ouvrage dise ╵à celui qui l’a fait :'
  - type: text
    content: « Je ne suis pas ton œuvre »,
  - type: text
    content: 'et que le pot affirme ╵au potier qui l’a façonné : ╵« Tu ne sais pas ce que tu fais'
  - type: note
    content: Voir Rm 9.20.
  - type: text
    content: '  » ?'
  - type: heading
    content: Tout est changé
  '17':
  - type: text
    content: Encore un peu de temps,
  - type: text
    content: et le Liban ╵sera transformé en verger,
  - type: text
    content: et le verger sera ╵semblable à la forêt.
  '18':
  - type: text
    content: En ce jour-là, ╵les sourds même entendront ╵les paroles du livre
  - type: text
    content: et, sortant des ténèbres ╵et de l’obscurité,
  - type: text
    content: les yeux des aveugles verront.
  '19':
  - type: text
    content: Oui, grâce à l’Eternel, ╵les humbles se réjouiront ╵de plus en plus.
  - type: text
    content: Les plus déshérités des hommes
  - type: text
    content: exulteront de joie ╵grâce au Saint d’Israël.
  '2':
  - type: text
    content: j’assiégerai la ville-Autel,
  - type: text
    content: elle ne sera plus ╵que plaintes et gémissements.
  - type: text
    content: Oui, je ferai de toi ╵comme un autel.
  '20':
  - type: text
    content: Car les tyrans ╵auront tous disparu,
  - type: text
    content: et les moqueurs ne seront plus,
  - type: text
    content: et tous ceux qui sont aux aguets ╵pour commettre le mal
  - type: text
    content: seront éliminés,
  '21':
  - type: text
    content: ceux qui condamnent ╵les gens par leur parole,
  - type: text
    content: ceux qui tendent des pièges ╵aux juges dans les tribunaux,
  - type: text
    content: ceux qui perdent le juste ╵sans aucune raison, ╵oui, tous disparaîtront.
  '22':
  - type: text
    content: C’est pourquoi l’Eternel
  - type: text
    content: qui a délivré Abraham,
  - type: text
    content: 'dit à la communauté de Jacob :'
  - type: text
    content: Jacob n’aura plus honte, désormais,
  - type: text
    content: et son visage ╵n’aura plus à pâlir.
  '23':
  - type: text
    content: Lorsqu’ils verront
  - type: text
    content: tout ce que j’aurai accompli ╵au milieu d’eux,
  - type: text
    content: ils me reconnaîtront pour Dieu,
  - type: text
    content: ils me vénéreront, ╵comme étant le Saint de Jacob,
  - type: text
    content: ils me redouteront, ╵moi, le Dieu d’Israël.
  '24':
  - type: text
    content: Ceux dont l’esprit s’égare ╵apprendront le discernement,
  - type: text
    content: et les contestataires ╵recevront instruction.
  '3':
  - type: text
    content: J’établirai mon campement ╵en cercle autour de toi
  - type: note
    content: 'Deux manuscrits hébreux et l’ancienne version grecque ont : contre toi comme David.'
  - type: text
    content: et je t’assiégerai ╵avec des ouvrages de siège
  - type: note
    content: 'Autre traduction : je t’entourerai de postes militaires.'
  - type: text
    content: ','
  - type: text
    content: élevant contre toi ╵des tours pour t’attaquer.
  '4':
  - type: text
    content: Tu seras abaissée
  - type: text
    content: et c’est depuis la terre ╵que montera ta voix,
  - type: text
    content: oui, c’est de la poussière ╵que sourdra ta parole.
  - type: text
    content: Ta voix sortira de la terre ╵comme celle d’un revenant,
  - type: text
    content: et ta parole montera ╵du sein de la poussière ╵tout comme un sifflement.
  '5':
  - type: text
    content: La foule de tes ennemis ╵sera comme une fine poudre,
  - type: text
    content: la multitude des tyrans ╵comme la paille qui s’envole.
  - type: text
    content: Cela se produira ╵soudain, en un instant.
  '6':
  - type: text
    content: Le Seigneur des armées célestes ╵interviendra pour toi
  - type: text
    content: avec le fracas du tonnerre, ╵des tremblements de terre, ╵et un bruit formidable,
  - type: text
    content: la tempête et le tourbillon,
  - type: text
    content: la flamme d’un feu dévorant.
  '7':
  - type: text
    content: Comme il en est d’un songe, ╵d’une vision nocturne,
  - type: text
    content: ainsi en sera-t-il ╵de tous les nombreux peuples
  - type: text
    content: qui attaquaient la ville-Autel,
  - type: text
    content: qui combattaient contre elle
  - type: text
    content: et contre ses remparts,
  - type: text
    content: qui l’assiégeaient.
  '8':
  - type: text
    content: Il en sera comme d’un homme ╵qui serait affamé ╵et rêverait qu’il mange,
  - type: text
    content: mais lorsqu’il se réveille, ╵il a le ventre creux,
  - type: text
    content: ou comme un assoiffé ╵qui rêverait qu’il boit,
  - type: text
    content: et lorsqu’il se réveille, ╵il se sent épuisé, ╵il a la gorge sèche.
  - type: text
    content: Ainsi en sera-t-il ╵de tous ces nombreux peuples
  - type: text
    content: qui combattent contre le mont Sion.
  - type: heading
    content: Des voyants aveugles et ivres
  '9':
  - type: text
    content: Attendez donc ╵et soyez stupéfaits !
  - type: text
    content: Aveuglez-vous, ╵et restez aveuglés !
  - type: text
    content: Soyez tous ivres, ╵mais pas de vin,
  - type: text
    content: et chancelez, ╵mais non d’avoir trop bu !
