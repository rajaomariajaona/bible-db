document_id: ISA.29
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Malheur à la cité de David
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Malheur à la cité-Autel
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '29.1 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Nom donné à Jérusalem, en hébreu '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'Ariel, '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'mot qui pourrait signifier « lion de Dieu », mais, d’après le v. 2 et '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ez 43.15-16
        metadata:
          usfm: EZK.43.15+EZK.43.16
      - type: text
        text: ', ce terme désigne l’autel des sacrifices ou le foyer de cet autel.'
    marker-yv: yv-n
  - type: text
    text: ', ╵à la cité-Autel'
- type: usfm
  marker: q1
  children:
  - type: text
    text: contre laquelle ╵David a installé son campement.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Elle a beau maintenir, ╵année après année,
- type: usfm
  marker: q1
  children:
  - type: text
    text: tout le cycle des fêtes,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: j’assiégerai la ville-Autel,
- type: usfm
  marker: q1
  children:
  - type: text
    text: elle ne sera plus ╵que plaintes et gémissements.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Oui, je ferai de toi ╵comme un autel.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: J’établirai mon campement ╵en cercle autour de toi
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '29.3 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Deux manuscrits hébreux et l’ancienne version grecque ont : '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: contre toi comme David.
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: text
    text: et je t’assiégerai ╵avec des ouvrages de siège
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '29.3 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Autre traduction : '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: je t’entourerai de postes militaires.
    marker-yv: yv-n
  - type: text
    text: ','
- type: usfm
  marker: q1
  children:
  - type: text
    text: élevant contre toi ╵des tours pour t’attaquer.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Tu seras abaissée
- type: usfm
  marker: q1
  children:
  - type: text
    text: et c’est depuis la terre ╵que montera ta voix,
- type: usfm
  marker: q1
  children:
  - type: text
    text: oui, c’est de la poussière ╵que sourdra ta parole.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ta voix sortira de la terre ╵comme celle d’un revenant,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et ta parole montera ╵du sein de la poussière ╵tout comme un sifflement.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: La foule de tes ennemis ╵sera comme une fine poudre,
- type: usfm
  marker: q1
  children:
  - type: text
    text: la multitude des tyrans ╵comme la paille qui s’envole.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Cela se produira ╵soudain, en un instant.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Le Seigneur des armées célestes ╵interviendra pour toi
- type: usfm
  marker: q1
  children:
  - type: text
    text: avec le fracas du tonnerre, ╵des tremblements de terre, ╵et un bruit formidable,
- type: usfm
  marker: q1
  children:
  - type: text
    text: la tempête et le tourbillon,
- type: usfm
  marker: q1
  children:
  - type: text
    text: la flamme d’un feu dévorant.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Comme il en est d’un songe, ╵d’une vision nocturne,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ainsi en sera-t-il ╵de tous les nombreux peuples
- type: usfm
  marker: q1
  children:
  - type: text
    text: qui attaquaient la ville-Autel,
- type: usfm
  marker: q1
  children:
  - type: text
    text: qui combattaient contre elle
- type: usfm
  marker: q1
  children:
  - type: text
    text: et contre ses remparts,
- type: usfm
  marker: q1
  children:
  - type: text
    text: qui l’assiégeaient.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Il en sera comme d’un homme ╵qui serait affamé ╵et rêverait qu’il mange,
- type: usfm
  marker: q1
  children:
  - type: text
    text: mais lorsqu’il se réveille, ╵il a le ventre creux,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ou comme un assoiffé ╵qui rêverait qu’il boit,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et lorsqu’il se réveille, ╵il se sent épuisé, ╵il a la gorge sèche.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ainsi en sera-t-il ╵de tous ces nombreux peuples
- type: usfm
  marker: q1
  children:
  - type: text
    text: qui combattent contre le mont Sion.
- type: usfm
  marker: s2
  children:
  - type: text
    text: Des voyants aveugles et ivres
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Attendez donc ╵et soyez stupéfaits !
- type: usfm
  marker: q1
  children:
  - type: text
    text: Aveuglez-vous, ╵et restez aveuglés !
- type: usfm
  marker: q1
  children:
  - type: text
    text: Soyez tous ivres, ╵mais pas de vin,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et chancelez, ╵mais non d’avoir trop bu !
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Car l’Eternel ╵a répandu sur vous
- type: usfm
  marker: q1
  children:
  - type: text
    text: un esprit de torpeur
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '29.10 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Voir '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '6.10'
        metadata:
          usfm: ISA.6.10
      - type: text
        text: '. Cité en '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Rm 11.8
        metadata:
          usfm: ROM.11.8
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: ','
- type: usfm
  marker: q1
  children:
  - type: text
    text: il a bouché vos yeux, ╵vous, les prophètes ;
- type: usfm
  marker: q1
  children:
  - type: text
    text: il a voilé vos têtes, ╵vous qui recevez des révélations.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Toute cette révélation est devenue pour vous comme les mots écrits sur un rouleau scellé. Donnez-le à un homme qui a appris à lire en lui disant : « Lis cela, s’il te plaît », et il vous répondra : « Je ne peux pas le lire, le rouleau est scellé. » '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Donnez-le à quelqu’un qui n’a jamais appris à lire en lui disant : « Lis cela, s’il te plaît », et il vous répondra : « Moi, je ne sais pas lire. »'
- type: usfm
  marker: s2
  children:
  - type: text
    text: De surprise en surprise
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Le Seigneur dit encore : ╵Ce peuple se tourne vers moi,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'mais ce n’est qu’en paroles, ╵et il me rend hommage, ╵mais c’est du bout des lèvres :'
- type: usfm
  marker: q1
  children:
  - type: text
    text: car au fond de son cœur, ╵il est bien loin de moi,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et la crainte ╵qu’il a de moi
- type: usfm
  marker: q1
  children:
  - type: text
    text: n’est faite que de règles ╵que des hommes lui ont enseignées
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '29.13 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Cité en Mt 15.8-9 ; Mc 7.6-7.
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: A cause de cela, ╵j’étonnerai ce peuple
- type: usfm
  marker: q1
  children:
  - type: text
    text: par de nouveaux prodiges, ╵des actes extraordinaires ;
- type: usfm
  marker: q1
  children:
  - type: text
    text: la sagesse des sages ╵sera anéantie,
- type: usfm
  marker: q1
  children:
  - type: text
    text: l’intelligence ╵fera défaut ╵à ses intelligents
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '29.14 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Cité en '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1 Co 1.19
        metadata:
          usfm: 1CO.1.19
      - type: text
        text: ', d’après l’ancienne version grecque.'
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: s2
  children:
  - type: text
    text: Où est Dieu
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Malheur à ceux ╵qui vont dans les lieux les plus reculés
- type: usfm
  marker: q1
  children:
  - type: text
    text: pour cacher leurs desseins à l’Eternel
- type: usfm
  marker: q1
  children:
  - type: text
    text: et dont les entreprises ╵se font dans les ténèbres,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'à ceux qui disent : ╵« Qui peut nous voir ? ╵Qui nous remarque ? »'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Allez-vous inverser les rôles ?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Allez-vous prendre ╵le potier pour l’argile,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'pour que l’ouvrage dise ╵à celui qui l’a fait :'
- type: usfm
  marker: q1
  children:
  - type: text
    text: « Je ne suis pas ton œuvre »,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'et que le pot affirme ╵au potier qui l’a façonné : ╵« Tu ne sais pas ce que tu fais'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '29.16 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Voir '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Rm 9.20
        metadata:
          usfm: ROM.9.20
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: '  » ?'
- type: usfm
  marker: s2
  children:
  - type: text
    text: Tout est changé
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Encore un peu de temps,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et le Liban ╵sera transformé en verger,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et le verger sera ╵semblable à la forêt.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: En ce jour-là, ╵les sourds même entendront ╵les paroles du livre
- type: usfm
  marker: q1
  children:
  - type: text
    text: et, sortant des ténèbres ╵et de l’obscurité,
- type: usfm
  marker: q1
  children:
  - type: text
    text: les yeux des aveugles verront.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Oui, grâce à l’Eternel, ╵les humbles se réjouiront ╵de plus en plus.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Les plus déshérités des hommes
- type: usfm
  marker: q1
  children:
  - type: text
    text: exulteront de joie ╵grâce au Saint d’Israël.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Car les tyrans ╵auront tous disparu,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et les moqueurs ne seront plus,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et tous ceux qui sont aux aguets ╵pour commettre le mal
- type: usfm
  marker: q1
  children:
  - type: text
    text: seront éliminés,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: ceux qui condamnent ╵les gens par leur parole,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ceux qui tendent des pièges ╵aux juges dans les tribunaux,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ceux qui perdent le juste ╵sans aucune raison, ╵oui, tous disparaîtront.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: C’est pourquoi l’Eternel
- type: usfm
  marker: q1
  children:
  - type: text
    text: qui a délivré Abraham,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'dit à la communauté de Jacob :'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Jacob n’aura plus honte, désormais,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et son visage ╵n’aura plus à pâlir.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: Lorsqu’ils verront
- type: usfm
  marker: q1
  children:
  - type: text
    text: tout ce que j’aurai accompli ╵au milieu d’eux,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ils me reconnaîtront pour Dieu,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ils me vénéreront, ╵comme étant le Saint de Jacob,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ils me redouteront, ╵moi, le Dieu d’Israël.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: Ceux dont l’esprit s’égare ╵apprendront le discernement,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et les contestataires ╵recevront instruction.
