document_id: PSA.61
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Abrite-moi sous ton aile !
  marker-yv: yv-h
- type: usfm
  marker: d
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Au chef de chœur. Un psaume de David à chanter avec accompagnement d’instruments à cordes.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Entends mon cri, ô Dieu !
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ecoute ma prière !
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Des confins de la terre, ╵je fais appel à toi, ╵car je suis abattu.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Conduis-moi au rocher ╵que je ne puis atteindre !
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Car tu es pour moi un refuge,
- type: usfm
  marker: q1
  children:
  - type: text
    text: une tour forte ╵face à mes ennemis !
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Je voudrais demeurer ╵pour toujours dans ta tente
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '61.5 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Dans le tabernacle, c’est-à-dire là où Dieu manifeste sa présence (voir 15.1 ; 27.4 ; 2 S 6.17 ; 7.2 ; 1 R 1.39 ; 2.28-30).
    marker-yv: yv-n
  - type: text
    text: ','
- type: usfm
  marker: q1
  children:
  - type: text
    text: me réfugier, ╵bien caché, sous tes ailes.
- type: usfm
  marker: q4
  children:
  - type: text
    text: Pause
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Oui, ô Dieu, mes souhaits, ╵tu les as exaucés,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et tu m’as accordé la part ╵que tu réserves à ceux qui te craignent
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '61.6 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Autre traduction : '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: et tu as accordé à ceux qui te craignent la part que tu leur réserves.
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Ajoute de longs jours ╵aux jours de notre roi,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et que ses années couvrent ╵plusieurs générations !
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Qu’il siège pour toujours ╵sous le regard de Dieu !
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ordonne à ton amour, ╵à ta fidélité, ╵de prendre soin de lui !
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Alors je chanterai ╵sans cesse en ton honneur,
- type: usfm
  marker: q1
  children:
  - type: text
    text: j’accomplirai mes vœux ╵jour après jour.
