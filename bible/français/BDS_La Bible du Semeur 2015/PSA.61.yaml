document_id: PSA.61,21
type_code: fra
verses:
  '1':
  - type: heading
    content: Abrite-moi sous ton aile !
  - type: text
    content: Au chef de chœur. Un psaume de David à chanter avec accompagnement d’instruments à cordes.
  '2':
  - type: text
    content: Entends mon cri, ô Dieu !
  - type: text
    content: Ecoute ma prière !
  '3':
  - type: text
    content: Des confins de la terre, ╵je fais appel à toi, ╵car je suis abattu.
  - type: text
    content: Conduis-moi au rocher ╵que je ne puis atteindre !
  '4':
  - type: text
    content: Car tu es pour moi un refuge,
  - type: text
    content: une tour forte ╵face à mes ennemis !
  '5':
  - type: text
    content: Je voudrais demeurer ╵pour toujours dans ta tente
  - type: note
    content: Dans le tabernacle, c’est-à-dire là où Dieu manifeste sa présence (voir 15.1 ; 27.4 ; 2 S 6.17 ; 7.2 ; 1 R 1.39 ; 2.28-30).
  - type: text
    content: ','
  - type: text
    content: me réfugier, ╵bien caché, sous tes ailes.
  - type: text
    content: Pause
  '6':
  - type: text
    content: Oui, ô Dieu, mes souhaits, ╵tu les as exaucés,
  - type: text
    content: et tu m’as accordé la part ╵que tu réserves à ceux qui te craignent
  - type: note
    content: 'Autre traduction : et tu as accordé à ceux qui te craignent la part que tu leur réserves.'
  - type: text
    content: .
  '7':
  - type: text
    content: Ajoute de longs jours ╵aux jours de notre roi,
  - type: text
    content: et que ses années couvrent ╵plusieurs générations !
  '8':
  - type: text
    content: Qu’il siège pour toujours ╵sous le regard de Dieu !
  - type: text
    content: Ordonne à ton amour, ╵à ta fidélité, ╵de prendre soin de lui !
  '9':
  - type: text
    content: Alors je chanterai ╵sans cesse en ton honneur,
  - type: text
    content: j’accomplirai mes vœux ╵jour après jour.
