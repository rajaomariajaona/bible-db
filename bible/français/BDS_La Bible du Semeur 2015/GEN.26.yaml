document_id: GEN.26,21
type_code: fra
verses:
  '1':
  - type: heading
    content: Isaac à Guérar
  - type: text
    content: A cette époque-là, il y eut de nouveau une famine dans le pays, comme naguère au temps d’Abraham. Alors Isaac se rendit à Guérar chez Abimélek
  - type: note
    content: Sans doute, un nom héréditaire (comme pharaon en Egypte) puisqu’un roi du même nom a régné sur cette contrée environ quatre-vingts ans auparavant (20.2).
  - type: text
    content: ', roi des Philistins'
  - type: note
    content: Voir note 10.14.
  - type: text
    content: '. '
  '10':
  - type: text
    content: 'Abimélek rétorqua : Te rends-tu compte de ce que tu nous as fait là ? Il s’en est fallu de peu qu’un homme de ce peuple couche avec ta femme ; dans ce cas, tu nous aurais chargés d’une lourde culpabilité.'
  '11':
  - type: text
    content: 'Alors Abimélek fit publier ce décret à tout le peuple : Quiconque fera du mal à cet homme ou à sa femme sera puni de mort.'
  - type: heading
    content: L’installation à Beer-Sheva
  '12':
  - type: text
    content: Isaac fit des semailles dans le pays et récolta cette année-là le centuple de ce qu’il avait semé. L’Eternel le bénissait.
  '13':
  - type: text
    content: 'Isaac devint un personnage important. Son importance s’accrut encore et il devint même un homme très puissant. '
  '14':
  - type: text
    content: 'Il possédait des troupeaux de moutons, de chèvres et de bovins, et beaucoup de serviteurs, de sorte que les Philistins devinrent jaloux de lui. '
  '15':
  - type: text
    content: 'Ils comblèrent tous les puits que les serviteurs de son père Abraham avaient creusés à son époque en les remplissant de terre. '
  '16':
  - type: text
    content: 'Alors Abimélek dit à Isaac : Va, quitte ce pays, car tu es devenu beaucoup plus puissant que nous.'
  '17':
  - type: text
    content: 'Isaac partit et alla dresser son camp dans la vallée de Guérar où il s’établit. '
  '18':
  - type: text
    content: 'Il s’installa et fit déboucher les puits qu’on avait creusés du temps de son père Abraham et que les Philistins avaient comblés après la mort d’Abraham, et il leur donna les mêmes noms que son père. '
  '19':
  - type: text
    content: 'En creusant dans la vallée, les serviteurs d’Isaac découvrirent une source d’eau vive. '
  '2':
  - type: text
    content: 'En effet, l’Eternel lui était apparu et lui avait dit : Ne descends pas en Egypte'
  - type: note
    content: Où l’on se rendait généralement en cas de famine (12.10 ; 41.57).
  - type: text
    content: '  ! Fixe-toi dans le pays que je te désignerai. '
  '20':
  - type: text
    content: 'Les bergers de Guérar cherchèrent querelle aux bergers d’Isaac en prétendant : « Cette eau est à nous. » Isaac donna à ce puits le nom d’Eseq (Dispute) parce qu’on s’était disputé avec lui à son sujet. '
  '21':
  - type: text
    content: 'Ensuite ils creusèrent un autre puits, pour lequel on lui chercha de nouveau querelle ; il le nomma Sitna (Opposition). '
  '22':
  - type: text
    content: 'Puis il partit de là et creusa un autre puits pour lequel on ne lui chercha pas querelle ; il l’appela donc Rehoboth (Larges espaces), car, dit-il, maintenant l’Eternel nous a mis au large et nous prospérerons dans le pays. '
  '23':
  - type: text
    content: De là, il remonta à Beer-Sheva.
  - type: heading
    content: Isaac fait alliance avec Abimélek
  '24':
  - type: text
    content: 'La nuit de son arrivée, l’Eternel lui apparut et lui dit : Je suis le Dieu de ton père Abraham. Sois sans crainte car je suis avec toi ; je te bénirai et je te donnerai une nombreuse descendance à cause d’Abraham, mon serviteur.'
  '25':
  - type: text
    content: Isaac bâtit un autel à cet endroit, il y invoqua l’Eternel et y dressa sa tente. Les serviteurs d’Isaac y creusèrent un autre puits.
  '26':
  - type: text
    content: 'Abimélek vint le trouver depuis Guérar avec Ahouzath son conseiller, et Pikol, le chef de son armée. '
  '27':
  - type: text
    content: 'Isaac leur demanda : Pourquoi êtes-vous venus me trouver, alors que vous me détestez et que vous m’avez renvoyé de chez vous ?'
  '28':
  - type: text
    content: 'Ils lui répondirent : Nous avons bien vu que l’Eternel est avec toi, et nous nous sommes dit : Nous devrions nous engager, nous et toi, par serment ! Nous voudrions donc faire alliance avec toi. '
  '29':
  - type: text
    content: Promets-nous, en le jurant, de ne pas nous faire de mal, comme nous ne t’avons pas fait de mal, car nous t’avons toujours bien traité et nous t’avons laissé partir sain et sauf. A présent tu es béni par l’Eternel.
  '3':
  - type: text
    content: 'Séjourne dans ce pays-ci. Je serai avec toi et je te bénirai. Car c’est à toi et à ta descendance que je donnerai tous ces territoires. J’accomplirai ainsi le serment que j’ai fait à ton père Abraham. '
  '30':
  - type: text
    content: 'Isaac leur fit préparer un grand festin ; ils mangèrent et burent '
  '31':
  - type: text
    content: et, le lendemain de bon matin, ils s’engagèrent l’un envers l’autre par serment, puis Isaac les reconduisit et ils le quittèrent en bons termes.
  '32':
  - type: text
    content: 'Or, ce même jour, les serviteurs d’Isaac vinrent lui annoncer qu’ils avaient trouvé de l’eau dans le puits qu’ils étaient en train de creuser. '
  '33':
  - type: text
    content: Alors Isaac appela ce puits Shibea (Serment). C’est pour cela que la ville se nomme Beer-Sheva (le Puits du Serment) jusqu’à ce jour.
  - type: heading
    content: Les mariages d’Esaü
  '34':
  - type: text
    content: 'A l’âge de quarante ans, Esaü épousa Judith, fille de Beéri le Hittite, et Basmath, fille d’Elôn le Hittite. '
  '35':
  - type: text
    content: Elles rendirent toutes deux la vie amère à Isaac et à Rébecca.
  '4':
  - type: text
    content: Je rendrai ta descendance aussi nombreuse que les étoiles du ciel et je lui donnerai tous ces territoires-ci, et tous les peuples de la terre seront bénis en ta descendance
  - type: note
    content: 'Autre traduction : se béniront en citant l’exemple de ta descendance.'
  - type: text
    content: '. '
  '5':
  - type: text
    content: 'Je le ferai parce qu’Abraham m’a obéi et qu’il a observé mes prescriptions, mes commandements, mes préceptes et mes lois. '
  '6':
  - type: text
    content: C’est pourquoi Isaac resta à Guérar.
  '7':
  - type: text
    content: 'Lorsque les hommes de l’endroit s’enquéraient au sujet de sa femme, il répondait : C’est ma sœur.'
  - type: text
    content: 'Il ne disait pas qu’elle était sa femme : il avait peur que les gens de l’endroit le tuent à cause d’elle, car elle était belle. '
  '8':
  - type: text
    content: 'Comme il était déjà depuis assez longtemps dans le pays, Abimélek, le roi des Philistins, regardant par la fenêtre, surprit Isaac en train de s’amuser avec Rébecca sa femme. '
  '9':
  - type: text
    content: 'Alors il le fit appeler et lui dit : C’est sûrement ta femme. Pourquoi as-tu dit : « C’est ma sœur » ?'
  - type: text
    content: 'Isaac lui répondit : Je me disais que je risquais de mourir à cause d’elle.'
