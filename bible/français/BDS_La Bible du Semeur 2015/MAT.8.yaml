document_id: MAT.8,21
type_code: fra
verses:
  '1':
  - type: usfm
    marker: ms1
    children:
    - type: text
      text: L’Évangile et l’autorité de Jésus
    marker-yv: yv-h
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Jésus guérit les malades
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: (Mc 1.40-45 ; Lc 5.12-16)
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Quand Jésus descendit de la montagne, une foule nombreuse le suivit. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'En entendant cela, Jésus fut rempli d’admiration et, s’adressant à ceux qui le suivaient, il dit : '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'Vraiment, je vous l’assure : chez personne, en '
      - type: usfm
        marker: w
        children:
        - type: text
          text: Israël
      - type: text
        text: ', je n’ai trouvé une telle foi !'
    - type: text
      text: ' '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'Je vous le déclare : beaucoup viendront de l’Orient et de l’Occident et prendront place à table auprès d’'
      - type: usfm
        marker: w
        children:
        - type: text
          text: Abraham
      - type: text
        text: ', d’'
      - type: usfm
        marker: w
        children:
        - type: text
          text: Isaac
      - type: text
        text: ' et de '
      - type: usfm
        marker: w
        children:
        - type: text
          text: Jacob
      - type: text
        text: ', dans le '
      - type: usfm
        marker: w
        children:
        - type: text
          text: royaume des cieux
      - type: text
        text: .
    - type: text
      text: ' '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Mais ceux qui devaient hériter du royaume, ceux-là seront jetés dans les ténèbres du dehors. Là, il y aura des pleurs et d’amers regrets.
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Puis Jésus dit à l’officier : '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Rentre chez toi et qu’il te soit fait selon ce que tu as cru.
    - type: text
      text: ' Et, à l’heure même, son serviteur fut guéri.'
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Il a porté nos maladies
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: (Mc 1.29-34 ; Lc 4.38-41)
    marker-yv: yv-h
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Jésus se rendit alors à la maison de Pierre. Il trouva la belle-mère de celui-ci alitée, avec une forte fièvre. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Il lui prit la main, et la fièvre la quitta. Alors elle se leva et se mit à le servir.
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Le soir venu, on lui amena beaucoup de gens qui étaient sous l’emprise de démons : par sa parole, il chassa ces esprits mauvais. Il guérit aussi tous les malades. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ainsi s’accomplissait cette parole du prophète Esaïe :'
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: qt
      children:
      - type: text
        text: Il s’est chargé de nos infirmités
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: qt
      children:
      - type: text
        text: et il a porté nos maladies
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '8.17 '
      - type: usfm
        marker: ft
        children:
        - type: usfm
          marker: ref
          children:
          - type: text
            text: Es 53.4
        - type: text
          text: ' .'
      marker-yv: yv-n
    - type: usfm
      marker: qt
      children:
      - type: text
        text: .
  - type: usfm
    marker: s1
    children:
    - type: text
      text: L’engagement total du disciple
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: (Lc 9.57-62)
    marker-yv: yv-h
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Lorsque Jésus se vit entouré d’une foule nombreuse, il donna ordre à ses disciples de passer de l’autre côté du lac. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Un spécialiste de la Loi s’approcha et lui dit : Maître, je te suivrai partout où tu iras.'
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Et voici qu’un lépreux s’approcha et se prosterna devant lui en disant : Seigneur, si tu le veux, tu peux me rendre pur'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '8.2 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'C’est-à-dire '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'tu peux me guérir. '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: La lèpre rendait rituellement impur ; demander à être purifié équivalait à demander la guérison.
      marker-yv: yv-n
    - type: text
      text: .
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Jésus lui répondit : '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'Les renards ont des tanières et les oiseaux du ciel des nids ; mais le '
      - type: usfm
        marker: w
        children:
        - type: text
          text: Fils de l’homme
      - type: text
        text: ' n’a pas d’endroit où reposer sa tête.'
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: – Seigneur, lui dit un autre qui était de ses disciples, permets-moi d’aller d’abord enterrer mon père.
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Mais Jésus lui répondit : '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Suis-moi et laisse à ceux qui sont morts le soin d’enterrer leurs morts.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Plus fort que la tempête
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: (Mc 4.35-41 ; Lc 8.22-25)
    marker-yv: yv-h
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Il monta dans un bateau et ses disciples le suivirent. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Tout à coup, une grande tempête se leva sur le lac et les vagues passaient par-dessus le bateau. Pendant ce temps, Jésus dormait. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Les disciples s’approchèrent de lui et le réveillèrent en criant : Seigneur, sauve-nous, nous sommes perdus !'
  '26':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: – Pourquoi avez-vous si peur ?
    - type: text
      text: ' leur dit-il. '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Votre foi est bien petite !
  - type: usfm
    marker: p
    children:
    - type: text
      text: Alors il se leva, parla sévèrement au vent et au lac, et il se fit un grand calme.
  '27':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Saisis d’étonnement, ceux qui étaient présents disaient : Quel est donc cet homme pour que même les vents et le lac lui obéissent ?'
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Plus fort que les démons
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: (Mc 5.1-20 ; Lc 8.26-39)
    marker-yv: yv-h
  '28':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Quand il fut arrivé de l’autre côté du lac, dans la région de Gadara
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '8.28 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Gadara '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: se trouvait en territoire non juif, à 10 kilomètres au sud-est du lac de Galilée.
      marker-yv: yv-n
    - type: text
      text: ', deux hommes qui étaient sous l’emprise de démons sortirent des tombeaux et vinrent à sa rencontre. Ils étaient si dangereux que personne n’osait plus passer par ce chemin. '
  '29':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Et voici qu’ils se mirent à crier : Que nous veux-tu, Fils de Dieu ? Es-tu venu nous tourmenter avant le temps ?'
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Jésus tendit la main et le toucha en disant : '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Je le veux, sois pur.
  - type: usfm
    marker: p
    children:
    - type: text
      text: Aussitôt, il fut purifié de sa lèpre.
  '30':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Or, il y avait, à quelque distance de là, un grand troupeau de porcs
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '8.30 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Le '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'porc '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: était, selon la Loi de Moïse, un animal impur (
        - type: usfm
          marker: ref
          children:
          - type: text
            text: Lv 11.7
        - type: text
          text: ). Seuls les non-Juifs élevaient des porcs.
      marker-yv: yv-n
    - type: text
      text: ' en train de paître. '
  '31':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Les démons supplièrent Jésus : Si tu veux nous chasser, envoie-nous dans ce troupeau de porcs.'
  '32':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: – Allez !
    - type: text
      text: ' leur dit-il.'
  - type: usfm
    marker: p
    children:
    - type: text
      text: Les démons sortirent de ces deux hommes et entrèrent dans les porcs. Aussitôt, tout le troupeau s’élança du haut de la pente et se précipita dans le lac, et toutes les bêtes périrent noyées.
  '33':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Les gardiens du troupeau s’enfuirent, coururent à la ville et allèrent raconter tout ce qui s’était passé, en particulier ce qui était arrivé aux deux hommes qui étaient sous l’emprise de démons. '
  '34':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Là-dessus, tous les habitants de la ville sortirent à la rencontre de Jésus et, quand ils le virent, le supplièrent de quitter leur territoire.
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: – Attention,
    - type: text
      text: ' lui dit Jésus, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'ne le dis à personne ; mais va te faire examiner par le '
      - type: usfm
        marker: w
        children:
        - type: text
          text: prêtre
      - type: text
        text: ' et apporte l’offrande prescrite par '
      - type: usfm
        marker: w
        children:
        - type: text
          text: Moïse
      - type: text
        text: . Cela leur servira de témoignage
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '8.4 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Autres traductions : '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'cela leur prouvera qui je suis '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'ou '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'cela prouvera à tous que tu es guéri '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'ou '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: cela prouvera à tous mon respect de la Loi.
      marker-yv: yv-n
    - type: usfm
      marker: wj
      children:
      - type: text
        text: .
  - type: usfm
    marker: r
    children:
    - type: text
      text: (Lc 7.1-10)
    marker-yv: yv-h
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Jésus entrait à Capernaüm, quand un officier romain l’aborda. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Il le supplia : Seigneur, mon serviteur est couché chez moi, il est paralysé, il souffre terriblement.'
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: – Je vais chez toi,
    - type: text
      text: ' lui répondit Jésus, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: et je le guérirai.
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: – Seigneur, dit alors l’officier, je ne remplis pas les conditions
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '8.8 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Ou : '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'je ne suis pas digne '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '(voir '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: '3.11'
        - type: text
          text: ). L’officier romain savait sans doute que la tradition ne permettait pas aux Juifs de pénétrer dans la maison d’un non-Juif.
      marker-yv: yv-n
    - type: text
      text: ' pour te recevoir dans ma maison, mais tu n’as qu’un mot à dire et mon serviteur sera guéri. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Car, moi-même, je suis un officier subalterne, mais j’ai des soldats sous mes ordres, et quand je dis à l’un : « Va ! », il va. Quand je dis à un autre : « Viens ! », il vient. Quand je dis à mon esclave : « Fais ceci ! », il le fait.'
