document_id: MAT.8,21
type_code: fra
verses:
  '1':
  - type: heading
    content: L’Évangile et l’autorité de Jésus
  - type: heading
    content: Jésus guérit les malades
  - type: heading
    content: (Mc 1.40-45 ; Lc 5.12-16)
  - type: text
    content: 'Quand Jésus descendit de la montagne, une foule nombreuse le suivit. '
  '10':
  - type: text
    content: 'En entendant cela, Jésus fut rempli d’admiration et, s’adressant à ceux qui le suivaient, il dit : '
  - type: text
    content: 'Vraiment, je vous l’assure : chez personne, en '
  - type: text
    content: Israël
  - type: text
    content: ', je n’ai trouvé une telle foi !'
  - type: text
    content: ' '
  '11':
  - type: text
    content: 'Je vous le déclare : beaucoup viendront de l’Orient et de l’Occident et prendront place à table auprès d’'
  - type: text
    content: Abraham
  - type: text
    content: ', d’'
  - type: text
    content: Isaac
  - type: text
    content: ' et de '
  - type: text
    content: Jacob
  - type: text
    content: ', dans le '
  - type: text
    content: royaume des cieux
  - type: text
    content: .
  - type: text
    content: ' '
  '12':
  - type: text
    content: Mais ceux qui devaient hériter du royaume, ceux-là seront jetés dans les ténèbres du dehors. Là, il y aura des pleurs et d’amers regrets.
  '13':
  - type: text
    content: 'Puis Jésus dit à l’officier : '
  - type: text
    content: Rentre chez toi et qu’il te soit fait selon ce que tu as cru.
  - type: text
    content: ' Et, à l’heure même, son serviteur fut guéri.'
  - type: heading
    content: Il a porté nos maladies
  - type: heading
    content: (Mc 1.29-34 ; Lc 4.38-41)
  '14':
  - type: text
    content: 'Jésus se rendit alors à la maison de Pierre. Il trouva la belle-mère de celui-ci alitée, avec une forte fièvre. '
  '15':
  - type: text
    content: Il lui prit la main, et la fièvre la quitta. Alors elle se leva et se mit à le servir.
  '16':
  - type: text
    content: 'Le soir venu, on lui amena beaucoup de gens qui étaient sous l’emprise de démons : par sa parole, il chassa ces esprits mauvais. Il guérit aussi tous les malades. '
  '17':
  - type: text
    content: 'Ainsi s’accomplissait cette parole du prophète Esaïe :'
  - type: text
    content: Il s’est chargé de nos infirmités
  - type: text
    content: et il a porté nos maladies
  - type: text
    content: ' '
  - type: note
    content: Es 53.4 .
  - type: text
    content: .
  - type: heading
    content: L’engagement total du disciple
  - type: heading
    content: (Lc 9.57-62)
  '18':
  - type: text
    content: 'Lorsque Jésus se vit entouré d’une foule nombreuse, il donna ordre à ses disciples de passer de l’autre côté du lac. '
  '19':
  - type: text
    content: 'Un spécialiste de la Loi s’approcha et lui dit : Maître, je te suivrai partout où tu iras.'
  '2':
  - type: text
    content: 'Et voici qu’un lépreux s’approcha et se prosterna devant lui en disant : Seigneur, si tu le veux, tu peux me rendre pur'
  - type: note
    content: C’est-à-dire tu peux me guérir. La lèpre rendait rituellement impur ; demander à être purifié équivalait à demander la guérison.
  - type: text
    content: .
  '20':
  - type: text
    content: 'Jésus lui répondit : '
  - type: text
    content: 'Les renards ont des tanières et les oiseaux du ciel des nids ; mais le '
  - type: text
    content: Fils de l’homme
  - type: text
    content: ' n’a pas d’endroit où reposer sa tête.'
  '21':
  - type: text
    content: – Seigneur, lui dit un autre qui était de ses disciples, permets-moi d’aller d’abord enterrer mon père.
  '22':
  - type: text
    content: 'Mais Jésus lui répondit : '
  - type: text
    content: Suis-moi et laisse à ceux qui sont morts le soin d’enterrer leurs morts.
  - type: heading
    content: Plus fort que la tempête
  - type: heading
    content: (Mc 4.35-41 ; Lc 8.22-25)
  '23':
  - type: text
    content: 'Il monta dans un bateau et ses disciples le suivirent. '
  '24':
  - type: text
    content: 'Tout à coup, une grande tempête se leva sur le lac et les vagues passaient par-dessus le bateau. Pendant ce temps, Jésus dormait. '
  '25':
  - type: text
    content: 'Les disciples s’approchèrent de lui et le réveillèrent en criant : Seigneur, sauve-nous, nous sommes perdus !'
  '26':
  - type: text
    content: ' '
  - type: text
    content: – Pourquoi avez-vous si peur ?
  - type: text
    content: ' leur dit-il. '
  - type: text
    content: Votre foi est bien petite !
  - type: text
    content: Alors il se leva, parla sévèrement au vent et au lac, et il se fit un grand calme.
  '27':
  - type: text
    content: 'Saisis d’étonnement, ceux qui étaient présents disaient : Quel est donc cet homme pour que même les vents et le lac lui obéissent ?'
  - type: heading
    content: Plus fort que les démons
  - type: heading
    content: (Mc 5.1-20 ; Lc 8.26-39)
  '28':
  - type: text
    content: Quand il fut arrivé de l’autre côté du lac, dans la région de Gadara
  - type: note
    content: Gadara se trouvait en territoire non juif, à 10 kilomètres au sud-est du lac de Galilée.
  - type: text
    content: ', deux hommes qui étaient sous l’emprise de démons sortirent des tombeaux et vinrent à sa rencontre. Ils étaient si dangereux que personne n’osait plus passer par ce chemin. '
  '29':
  - type: text
    content: 'Et voici qu’ils se mirent à crier : Que nous veux-tu, Fils de Dieu ? Es-tu venu nous tourmenter avant le temps ?'
  '3':
  - type: text
    content: 'Jésus tendit la main et le toucha en disant : '
  - type: text
    content: Je le veux, sois pur.
  - type: text
    content: Aussitôt, il fut purifié de sa lèpre.
  '30':
  - type: text
    content: Or, il y avait, à quelque distance de là, un grand troupeau de porcs
  - type: note
    content: Le porc était, selon la Loi de Moïse, un animal impur (Lv 11.7). Seuls les non-Juifs élevaient des porcs.
  - type: text
    content: ' en train de paître. '
  '31':
  - type: text
    content: 'Les démons supplièrent Jésus : Si tu veux nous chasser, envoie-nous dans ce troupeau de porcs.'
  '32':
  - type: text
    content: ' '
  - type: text
    content: – Allez !
  - type: text
    content: ' leur dit-il.'
  - type: text
    content: Les démons sortirent de ces deux hommes et entrèrent dans les porcs. Aussitôt, tout le troupeau s’élança du haut de la pente et se précipita dans le lac, et toutes les bêtes périrent noyées.
  '33':
  - type: text
    content: 'Les gardiens du troupeau s’enfuirent, coururent à la ville et allèrent raconter tout ce qui s’était passé, en particulier ce qui était arrivé aux deux hommes qui étaient sous l’emprise de démons. '
  '34':
  - type: text
    content: Là-dessus, tous les habitants de la ville sortirent à la rencontre de Jésus et, quand ils le virent, le supplièrent de quitter leur territoire.
  '4':
  - type: text
    content: ' '
  - type: text
    content: – Attention,
  - type: text
    content: ' lui dit Jésus, '
  - type: text
    content: 'ne le dis à personne ; mais va te faire examiner par le '
  - type: text
    content: prêtre
  - type: text
    content: ' et apporte l’offrande prescrite par '
  - type: text
    content: Moïse
  - type: text
    content: . Cela leur servira de témoignage
  - type: note
    content: 'Autres traductions : cela leur prouvera qui je suis ou cela prouvera à tous que tu es guéri ou cela prouvera à tous mon respect de la Loi.'
  - type: text
    content: .
  - type: heading
    content: (Lc 7.1-10)
  '5':
  - type: text
    content: 'Jésus entrait à Capernaüm, quand un officier romain l’aborda. '
  '6':
  - type: text
    content: 'Il le supplia : Seigneur, mon serviteur est couché chez moi, il est paralysé, il souffre terriblement.'
  '7':
  - type: text
    content: ' '
  - type: text
    content: – Je vais chez toi,
  - type: text
    content: ' lui répondit Jésus, '
  - type: text
    content: et je le guérirai.
  '8':
  - type: text
    content: – Seigneur, dit alors l’officier, je ne remplis pas les conditions
  - type: note
    content: 'Ou : je ne suis pas digne (voir 3.11). L’officier romain savait sans doute que la tradition ne permettait pas aux Juifs de pénétrer dans la maison d’un non-Juif.'
  - type: text
    content: ' pour te recevoir dans ma maison, mais tu n’as qu’un mot à dire et mon serviteur sera guéri. '
  '9':
  - type: text
    content: 'Car, moi-même, je suis un officier subalterne, mais j’ai des soldats sous mes ordres, et quand je dis à l’un : « Va ! », il va. Quand je dis à un autre : « Viens ! », il vient. Quand je dis à mon esclave : « Fais ceci ! », il le fait.'
