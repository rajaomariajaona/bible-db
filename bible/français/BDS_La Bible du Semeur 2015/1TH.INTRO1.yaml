document_id: 1TH.INTRO1,21
type_code: fra
verses:
  '1':
  - type: usfm
    marker: imt1
    children:
    - type: text
      text: Introduction
  - type: usfm
    marker: ip
    children:
    - type: text
      text: 'La première lettre aux chrétiens de l’Eglise de Thessalonique (port de Macédoine, sur la mer Egée) a été écrite par l’apôtre Paul avec la collaboration de Silvain (Silas) et de Timothée (1.1) : le « nous » prédomine dans le texte.'
  - type: usfm
    marker: ip
    children:
    - type: text
      text: Le livre des Actes (Ac 17.1-4) raconte comment Paul a annoncé l’Evangile aux habitants de cette ville et, parmi eux, aux membres de la colonie juive. Il nous dit comment la colère des Juifs l’a conduit à s’enfuir précipitamment.
  - type: usfm
    marker: ip
    children:
    - type: text
      text: 'Arrivé à Corinthe (vers 51 ou 52), Paul reçoit de Timothée de bonnes nouvelles de cette Eglise : les chrétiens ont tenu ferme dans la persécution et c’est pour Paul l’occasion d’exprimer sa reconnaissance à Dieu (chap. 1).'
  - type: usfm
    marker: ip
    children:
    - type: text
      text: Le plaidoyer de l’apôtre pour défendre son ministère, au chapitre 2.1-12, laisse entendre qu’il a été l’objet de calomnies. Mais il reprend aussitôt son action de grâces (2.13 à 3.13). Après une exhortation à vivre dans la sainteté (4.1-12), il clarifie un point de son enseignement sur la résurrection et le retour du Seigneur (4.13 à 5.11).
  - type: usfm
    marker: ip
    children:
    - type: text
      text: Pour le reste, leur dit-il, « vous n’avez pas besoin qu’on vous en écrive… » (4.9 ; 5.1).
  - type: usfm
    marker: ip
    children:
    - type: text
      text: Cette lettre, à bien des égards extrêmement encourageante, mérite que l’Eglise d’aujourd’hui y puise joie et consolation.
