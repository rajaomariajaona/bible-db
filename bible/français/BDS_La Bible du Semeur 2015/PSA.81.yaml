document_id: PSA.81,21
type_code: fra
verses:
  '1':
  - type: heading
    content: Si mon peuple m’écoutait…
  - type: text
    content: Au chef de chœur. A chanter avec accompagnement de la harpe de Gath
  - type: note
    content: Voir note 8.1.
  - type: text
    content: . Psaume d’Asaph
  - type: note
    content: Voir note 50.1.
  - type: text
    content: .
  '10':
  - type: text
    content: Tu n’auras chez toi ╵aucun autre Dieu,
  - type: text
    content: tu n’adoreras ╵aucun des dieux étrangers !
  '11':
  - type: text
    content: Je suis l’Eternel, ton Dieu,
  - type: text
    content: qui t’ai fait sortir d’Egypte
  - type: note
    content: Rappel d’Ex 20.2-3 ; Dt 5.6-7.
  - type: text
    content: .
  - type: text
    content: Ouvre largement ta bouche, ╵je la remplirai.
  '12':
  - type: text
    content: Mais mon peuple ╵n’a pas écouté ma voix,
  - type: text
    content: Israël n’a pas voulu de moi.
  '13':
  - type: text
    content: Alors je les ai laissé aller ╵selon leur cœur obstiné,
  - type: text
    content: ils n’ont fait que suivre ╵leurs propres idées.
  '14':
  - type: text
    content: Si mon peuple m’écoutait,
  - type: text
    content: et si Israël marchait ╵sur les voies que j’ai prescrites,
  '15':
  - type: text
    content: je ferais en un instant ╵plier tous ses ennemis,
  - type: text
    content: et je tournerais ma main ╵contre ceux qui les oppriment.
  '16':
  - type: text
    content: Et ceux qui haïssent l’Eternel ╵lui seraient assujettis,
  - type: text
    content: le temps de leur soumission ╵durerait toujours.
  '17':
  - type: text
    content: Je nourrirais Israël ╵de fleur de froment,
  - type: text
    content: et je le rassasierais ╵du miel d’abeilles sauvages
  - type: note
    content: Allusion à Dt 32.13-14.
  - type: text
    content: .
  '2':
  - type: text
    content: Lancez des cris d’allégresse ╵vers Dieu notre force !
  - type: text
    content: Acclamez joyeusement ╵le Dieu de Jacob !
  '3':
  - type: text
    content: Entonnez un chant, ╵faites résonner le tambourin,
  - type: text
    content: pincez la lyre harmonieuse, ╵jouez sur le luth !
  '4':
  - type: text
    content: Embouchez le cor ╵au début du mois,
  - type: text
    content: à la pleine lune, ╵au grand jour de fête
  - type: note
    content: 'On devait sonner des trompettes au début de chaque mois, à la nouvelle lune (Nb 10.10), et en particulier au début du 7e mois, pour la fête des Trompettes (Lv 23.24). La fête: au regard des v. 6, 7, 11, il pourrait s’agir de la Pâque, qui célébrait la sortie d’Egypte (Ex 12) et se situait vers la pleine lune, le 14 du premier mois. Certains y voient cependant une référence à la fête des Cabanes (1 R 8.2, 65 ; 12.32 ; 2 Ch 5.3 ; 7.8 ; Né 8.14 ; Ez 45.25), qui commençait à la pleine lune, le 15 du 7e mois, et qui servait aussi de fête de reconnaissance pour les dons de Dieu durant la moisson (Lv 23.39-40 ; Dt 16.13-15).'
  - type: text
    content: '  !'
  '5':
  - type: text
    content: C’est la loi pour Israël,
  - type: text
    content: c’est une ordonnance ╵du Dieu de Jacob,
  '6':
  - type: text
    content: et c’est un décret ╵qu’il établit pour Joseph
  - type: text
    content: quand il attaqua ╵le pays d’Egypte.
  - type: text
    content: 'J’entends un langage ╵que je ne connaissais pas :'
  '7':
  - type: text
    content: « J’ai déchargé ses épaules ╵du fardeau
  - type: text
    content: et ses mains sont libérées ╵de la corvée des corbeilles. »
  '8':
  - type: text
    content: 'Tu étais dans la détresse : ╵tu as appelé, ╵alors je t’ai délivré,'
  - type: text
    content: je t’ai répondu, ╵caché au sein du tonnerre,
  - type: text
    content: et je t’ai mis à l’épreuve ╵près des eaux de Meriba
  - type: note
    content: Voir Ex 17.1-7 ; Nb 20.1-13.
  - type: text
    content: .
  - type: text
    content: Pause
  '9':
  - type: text
    content: Ecoute, ô mon peuple, ╵je t’avertirai.
  - type: text
    content: Ah, si seulement ╵tu m’écoutais, Israël !
