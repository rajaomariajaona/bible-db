document_id: REV.19,21
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Sept paroles de louange
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Après cela, j’entendis dans le ciel comme la voix puissante d’une foule immense qui disait :'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Alléluia !
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Loué soit Dieu !
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Car à lui appartiennent
  - type: usfm
    marker: q1
    children:
    - type: text
      text: le salut et la gloire
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et la puissance.
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Alors je me prosternai à ses pieds pour l’adorer, mais il me dit : Ne fais pas cela ! Je suis ton compagnon de service et celui de tes frères qui sont attachés à la vérité dont Jésus est le témoin. Adore Dieu ! Car le témoignage rendu par Jésus est ce qui inspire la prophétie de ce livre.'
  - type: usfm
    marker: ms1
    children:
    - type: text
      text: L’aboutissement de l’histoire du salut, en sept visions
    marker-yv: yv-h
  - type: usfm
    marker: s1
    children:
    - type: text
      text: 'Première vision : le cavalier sur un cheval blanc'
    marker-yv: yv-h
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Là-dessus, je vis le ciel ouvert et voici, il y avait un cheval blanc. Son cavalier s’appelle « Fidèle et Véritable ». Il juge avec équité, il combat pour la justice. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ses yeux flamboient comme une flamme ardente. Sa tête est couronnée de nombreux diadèmes
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '19.12 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Emblèmes de la domination universelle (comparer v. 16).
      marker-yv: yv-n
    - type: text
      text: '. Il porte un nom gravé qu’il est seul à connaître. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Il est vêtu d’un manteau trempé de sang. Il s’appelle '
    - type: usfm
      marker: qt
      children:
      - type: text
        text: La Parole de Dieu
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '19.13 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Voir '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: Jn 1.1
        - type: text
          text: .
      marker-yv: yv-n
    - type: usfm
      marker: qt
      children:
      - type: text
        text: .
    - type: text
      text: ' '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Les armées célestes, vêtues de lin blanc et pur, le suivent sur des chevaux blancs. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'De sa bouche sort une épée aiguisée pour frapper les peuples et '
    - type: usfm
      marker: qt
      children:
      - type: text
        text: il les dirigera avec un sceptre de fer
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '19.15 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Voir Ap 2.27 ; 12.5.
      marker-yv: yv-n
    - type: text
      text: '. Il va aussi écraser lui-même le raisin dans le pressoir à vin de l’ardente colère du Dieu tout-puissant. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Sur son manteau et sur sa cuisse est inscrit un titre : « Roi des rois et Seigneur des seigneurs ».'
  - type: usfm
    marker: s1
    children:
    - type: text
      text: 'Deuxième vision : le grand festin des charognards'
    marker-yv: yv-h
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Puis je vis un ange, debout dans le soleil, qui cria d’une voix forte à tous les oiseaux qui volent au zénith dans le ciel : Venez, rassemblez-vous pour le grand festin de Dieu '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: afin de dévorer la chair des rois, des chefs d’armées, des guerriers, la chair des chevaux et de leurs cavaliers, la chair de tous les hommes, libres et esclaves, petits et grands.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: 'Troisième vision : la capture de la bête et du faux prophète'
    marker-yv: yv-h
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Je vis la bête et les rois de la terre. Ils avaient rassemblé leurs armées pour combattre le Cavalier et son armée. '
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ses jugements sont vrais et justes
  - type: usfm
    marker: q1
    children:
    - type: text
      text: car il a condamné
  - type: usfm
    marker: q1
    children:
    - type: text
      text: la grande prostituée
  - type: usfm
    marker: q1
    children:
    - type: text
      text: qui corrompait la terre
  - type: usfm
    marker: q1
    children:
    - type: text
      text: par ses débauches,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et il lui a fait rendre compte
  - type: usfm
    marker: q1
    children:
    - type: text
      text: du sang des serviteurs de Dieu
  - type: usfm
    marker: q1
    children:
    - type: text
      text: répandu par sa main.
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'La bête fut capturée et, avec elle, le faux prophète qui avait accompli des signes impressionnants pour le compte de la bête. Par ces signes, il avait trompé les hommes qui portaient la marque de la bête et qui avaient adoré son image. Ils furent tous deux jetés vifs dans l’étang ardent de feu et de soufre. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Les autres hommes furent tués par l’épée qui sort de la bouche du Cavalier. Et tous les oiseaux se rassasièrent de leur chair.
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Une seconde fois, ils dirent :'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Alléluia !
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Loué soit Dieu !
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Car la fumée
  - type: usfm
    marker: q1
    children:
    - type: text
      text: de la ville embrasée
  - type: usfm
    marker: q1
    children:
    - type: text
      text: s’élève pour l’éternité !
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Alors les vingt-quatre représentants du peuple de Dieu et les quatre êtres vivants se prosternèrent devant le Dieu qui siège sur le trône, et l’adorèrent en disant :'
  - type: usfm
    marker: p
    children:
    - type: text
      text: Amen ! Loué soit Dieu !
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Et du trône partit une voix.
  - type: usfm
    marker: p
    children:
    - type: text
      text: Louez notre Dieu, disait-elle, vous tous ses serviteurs et vous qui le craignez, petits et grands.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Les noces de l’Agneau et de sa fiancée
    marker-yv: yv-h
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Et j’entendis comme la voix d’une foule immense, semblable au bruit de grandes eaux et au grondement violent du tonnerre. Elle disait :'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Alléluia !
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Loué soit Dieu !
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Car le Seigneur,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: notre Dieu tout-puissant,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: est entré dans son règne.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Réjouissons-nous,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: exultons d’allégresse
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et apportons-lui notre hommage.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Voici bientôt
  - type: usfm
    marker: q1
    children:
    - type: text
      text: les noces de l’Agneau.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Sa fiancée s’est préparée.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et il lui a été donné
  - type: usfm
    marker: q1
    children:
    - type: text
      text: de s’habiller
  - type: usfm
    marker: q1
    children:
    - type: text
      text: d’un lin pur éclatant.
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ce lin représente le statut des membres du peuple saint déclarés justes
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '19.8 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Autre traduction : '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: les actes justes des membres du peuple saint.
      marker-yv: yv-n
    - type: text
      text: .
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Les paroles authentiques de Dieu
    marker-yv: yv-h
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'L’ange me dit alors : Ecris : Heureux les invités au festin des noces de l’Agneau.'
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Et il ajouta : Ce sont là les paroles authentiques de Dieu.'
