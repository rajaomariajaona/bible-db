document_id: REV.19,21
type_code: fra
verses:
  '1':
  - type: heading
    content: Sept paroles de louange
  - type: text
    content: 'Après cela, j’entendis dans le ciel comme la voix puissante d’une foule immense qui disait :'
  - type: text
    content: Alléluia !
  - type: text
    content: Loué soit Dieu !
  - type: text
    content: Car à lui appartiennent
  - type: text
    content: le salut et la gloire
  - type: text
    content: et la puissance.
  '10':
  - type: text
    content: 'Alors je me prosternai à ses pieds pour l’adorer, mais il me dit : Ne fais pas cela ! Je suis ton compagnon de service et celui de tes frères qui sont attachés à la vérité dont Jésus est le témoin. Adore Dieu ! Car le témoignage rendu par Jésus est ce qui inspire la prophétie de ce livre.'
  - type: heading
    content: L’aboutissement de l’histoire du salut, en sept visions
  - type: heading
    content: 'Première vision : le cavalier sur un cheval blanc'
  '11':
  - type: text
    content: 'Là-dessus, je vis le ciel ouvert et voici, il y avait un cheval blanc. Son cavalier s’appelle « Fidèle et Véritable ». Il juge avec équité, il combat pour la justice. '
  '12':
  - type: text
    content: Ses yeux flamboient comme une flamme ardente. Sa tête est couronnée de nombreux diadèmes
  - type: note
    content: Emblèmes de la domination universelle (comparer v. 16).
  - type: text
    content: '. Il porte un nom gravé qu’il est seul à connaître. '
  '13':
  - type: text
    content: 'Il est vêtu d’un manteau trempé de sang. Il s’appelle '
  - type: text
    content: La Parole de Dieu
  - type: note
    content: Voir Jn 1.1.
  - type: text
    content: .
  - type: text
    content: ' '
  '14':
  - type: text
    content: 'Les armées célestes, vêtues de lin blanc et pur, le suivent sur des chevaux blancs. '
  '15':
  - type: text
    content: 'De sa bouche sort une épée aiguisée pour frapper les peuples et '
  - type: text
    content: il les dirigera avec un sceptre de fer
  - type: note
    content: Voir Ap 2.27 ; 12.5.
  - type: text
    content: '. Il va aussi écraser lui-même le raisin dans le pressoir à vin de l’ardente colère du Dieu tout-puissant. '
  '16':
  - type: text
    content: 'Sur son manteau et sur sa cuisse est inscrit un titre : « Roi des rois et Seigneur des seigneurs ».'
  - type: heading
    content: 'Deuxième vision : le grand festin des charognards'
  '17':
  - type: text
    content: 'Puis je vis un ange, debout dans le soleil, qui cria d’une voix forte à tous les oiseaux qui volent au zénith dans le ciel : Venez, rassemblez-vous pour le grand festin de Dieu '
  '18':
  - type: text
    content: afin de dévorer la chair des rois, des chefs d’armées, des guerriers, la chair des chevaux et de leurs cavaliers, la chair de tous les hommes, libres et esclaves, petits et grands.
  - type: heading
    content: 'Troisième vision : la capture de la bête et du faux prophète'
  '19':
  - type: text
    content: 'Je vis la bête et les rois de la terre. Ils avaient rassemblé leurs armées pour combattre le Cavalier et son armée. '
  '2':
  - type: text
    content: Ses jugements sont vrais et justes
  - type: text
    content: car il a condamné
  - type: text
    content: la grande prostituée
  - type: text
    content: qui corrompait la terre
  - type: text
    content: par ses débauches,
  - type: text
    content: et il lui a fait rendre compte
  - type: text
    content: du sang des serviteurs de Dieu
  - type: text
    content: répandu par sa main.
  '20':
  - type: text
    content: 'La bête fut capturée et, avec elle, le faux prophète qui avait accompli des signes impressionnants pour le compte de la bête. Par ces signes, il avait trompé les hommes qui portaient la marque de la bête et qui avaient adoré son image. Ils furent tous deux jetés vifs dans l’étang ardent de feu et de soufre. '
  '21':
  - type: text
    content: Les autres hommes furent tués par l’épée qui sort de la bouche du Cavalier. Et tous les oiseaux se rassasièrent de leur chair.
  '3':
  - type: text
    content: 'Une seconde fois, ils dirent :'
  - type: text
    content: Alléluia !
  - type: text
    content: Loué soit Dieu !
  - type: text
    content: Car la fumée
  - type: text
    content: de la ville embrasée
  - type: text
    content: s’élève pour l’éternité !
  '4':
  - type: text
    content: 'Alors les vingt-quatre représentants du peuple de Dieu et les quatre êtres vivants se prosternèrent devant le Dieu qui siège sur le trône, et l’adorèrent en disant :'
  - type: text
    content: Amen ! Loué soit Dieu !
  '5':
  - type: text
    content: Et du trône partit une voix.
  - type: text
    content: Louez notre Dieu, disait-elle, vous tous ses serviteurs et vous qui le craignez, petits et grands.
  - type: heading
    content: Les noces de l’Agneau et de sa fiancée
  '6':
  - type: text
    content: 'Et j’entendis comme la voix d’une foule immense, semblable au bruit de grandes eaux et au grondement violent du tonnerre. Elle disait :'
  - type: text
    content: Alléluia !
  - type: text
    content: Loué soit Dieu !
  - type: text
    content: Car le Seigneur,
  - type: text
    content: notre Dieu tout-puissant,
  - type: text
    content: est entré dans son règne.
  '7':
  - type: text
    content: Réjouissons-nous,
  - type: text
    content: exultons d’allégresse
  - type: text
    content: et apportons-lui notre hommage.
  - type: text
    content: Voici bientôt
  - type: text
    content: les noces de l’Agneau.
  - type: text
    content: Sa fiancée s’est préparée.
  '8':
  - type: text
    content: Et il lui a été donné
  - type: text
    content: de s’habiller
  - type: text
    content: d’un lin pur éclatant.
  - type: text
    content: Ce lin représente le statut des membres du peuple saint déclarés justes
  - type: note
    content: 'Autre traduction : les actes justes des membres du peuple saint.'
  - type: text
    content: .
  - type: heading
    content: Les paroles authentiques de Dieu
  '9':
  - type: text
    content: 'L’ange me dit alors : Ecris : Heureux les invités au festin des noces de l’Agneau.'
  - type: text
    content: 'Et il ajouta : Ce sont là les paroles authentiques de Dieu.'
