document_id: REV.1,21
type_code: fra
verses:
  '1':
  - type: heading
    content: Jésus, le témoin digne de foi
  - type: text
    content: Révélation
  - type: note
    content: Traduction du mot apocalypse. Cette révélation a été donnée par le Père au Fils, puis par le Fils à Jean par l’intermédiaire d’un ange.
  - type: text
    content: ' de Jésus-Christ.'
  - type: text
    content: Cette révélation, Dieu l’a confiée à Jésus-Christ pour qu’il montre à ses serviteurs ce qui doit arriver bientôt
  - type: note
    content: 'Ou : d’une manière soudaine, inattendue.'
  - type: text
    content: '  ; et Jésus-Christ, en envoyant son ange, l’a fait connaître à son serviteur Jean. '
  '10':
  - type: text
    content: Le jour du Seigneur
  - type: note
    content: Cette expression (jour dominical) est déjà appliquée au premier jour de la semaine (dimanche) par Ignace d’Antioche, un contemporain de Jean.
  - type: text
    content: ', l’Esprit de Dieu se saisit de moi, et j’entendis derrière moi une voix forte, pareille au son d’une trompette. '
  '11':
  - type: text
    content: 'Elle disait : '
  - type: text
    content: 'Inscris dans un livre ce que tu vois, et envoie-le à ces sept Eglises : Ephèse, Smyrne, Pergame, Thyatire, Sardes, Philadelphie et Laodicée.'
  '12':
  - type: text
    content: 'Je me retournai pour découvrir quelle était cette voix. Et l’ayant fait, voici ce que je vis : il y avait sept chandeliers d’or '
  '13':
  - type: text
    content: 'et, au milieu des chandeliers, quelqu’un qui ressemblait à un homme. Il portait une longue tunique, et une ceinture d’or lui entourait la poitrine. '
  '14':
  - type: text
    content: 'Sa tête et ses cheveux étaient blancs comme de la laine blanche, oui, comme la neige. Ses yeux étaient comme une flamme ardente '
  '15':
  - type: text
    content: 'et ses pieds étincelaient comme du bronze incandescent au sortir d’un creuset. '
  - type: text
    content: Sa voix retentissait comme celle des grandes eaux
  - type: note
    content: 'Cette description renvoie à plusieurs textes de l’Ancien Testament : Dn 7.13 ; 10.5 ; 7.9 ; 10.6.'
  - type: text
    content: .
  - type: text
    content: ' '
  '16':
  - type: text
    content: 'Dans sa main droite, il tenait sept étoiles, et '
  - type: text
    content: de sa bouche sortait une épée aiguisée à double tranchant
  - type: note
    content: Voir Es 49.2.
  - type: text
    content: . Son visage était éblouissant comme le soleil quand il brille de tout son éclat.
  '17':
  - type: text
    content: 'Quand je le vis, je tombai à ses pieds, comme mort. Alors il posa sa main droite sur moi en disant :'
  - type: text
    content: 'N’aie pas peur. '
  - type: text
    content: Moi, je suis le premier et le dernier
  - type: text
    content: ' '
  - type: note
    content: Voir Es 44.6 et 48.12 où il s’agit de Dieu. Ici il est question de Christ (Ap 2 ; 8 ; 22.13).
  - type: text
    content: ','
  - type: text
    content: ' '
  '18':
  - type: text
    content: 'le vivant. J’ai été mort, et voici : je suis vivant pour l’éternité ! Je détiens les clés de la mort et du séjour des morts.'
  - type: text
    content: ' '
  '19':
  - type: text
    content: Ecris donc ce que tu as vu, ce qui est, et ce qui va arriver ensuite.
  - type: text
    content: ' '
  '2':
  - type: text
    content: 'En tant que témoin, celui-ci a annoncé la Parole de Dieu que Jésus-Christ lui a transmise par son propre témoignage : il a annoncé tout ce qu’il a vu. '
  '20':
  - type: text
    content: 'Mais d’abord voici quel est le secret des sept étoiles que tu as vues dans ma main droite et des sept chandeliers d’or : les sept étoiles sont les '
  - type: text
    content: anges
  - type: text
    content: ' des sept Eglises et les sept chandeliers les sept Eglises.'
  '3':
  - type: text
    content: Heureux celui qui donne lecture des paroles de cette prophétie et ceux qui les entendent, et qui obéissent à ce qui est écrit dans ce livre, car le temps est proche.
  '4':
  - type: text
    content: Jean salue les sept Eglises qui sont dans la province d’Asie
  - type: note
    content: Localisées dans un cercle de 80 kilomètres autour d’Ephèse, énumérées aux chapitres 2 et 3. Ces Eglises, selon certains, représentent les Eglises de tous les temps (sept symbolise la totalité).
  - type: text
    content: '  : que la grâce et la paix vous soient données de la part de celui qui est, qui était et qui vient'
  - type: note
    content: Paraphrase du nom de Dieu révélé à Moïse (Ex 3.14-15  ; comparer Hé 13.8). Un écrit juif le désignait comme « Celui qui est, qui était et qui sera » (Targum de Jérusalem).
  - type: text
    content: ', de la part des sept esprits'
  - type: note
    content: Le chiffre sept symbolise la perfection, la totalité.
  - type: text
    content: ' qui se tiennent devant son trône '
  '5':
  - type: text
    content: et de la part de Jésus-Christ, le témoin
  - type: note
    content: Qualification du Messie reprise d’Es 55.4.
  - type: text
    content: ' digne de foi, le premier-né d’entre les morts'
  - type: note
    content: Voir 1 Co 15.20, 23.
  - type: text
    content: ' et le souverain des rois de la terre.'
  - type: text
    content: 'Il nous aime, il nous a délivrés de nos péchés par son sacrifice, '
  '6':
  - type: text
    content: 'il a fait de nous un peuple de rois, '
  - type: text
    content: 'des '
  - type: text
    content: prêtres
  - type: text
    content: ' au service de Dieu'
  - type: note
    content: Voir Ex 19.6.
  - type: text
    content: ','
  - type: text
    content: ' son Père : à lui donc soient la gloire et le pouvoir pour l’éternité ! Amen.'
  '7':
  - type: text
    content: ' '
  - type: text
    content: Voici ! Il vient
  - type: text
    content: au milieu des nuées
  - type: text
    content: ' '
  - type: note
    content: Dn 7.13 . Dans plusieurs manifestations de Dieu, il est question des nuées (Ex 19.16 ; Es 6.4 ; Mc 9.7 ; Ac 1.9  ; comparer Mt 24.30 ; 25.31 ; 26.64).
  - type: text
    content: ','
  - type: text
    content: 'et tout le monde '
  - type: text
    content: le verra,
  - type: text
    content: même ceux qui l’ont transpercé,
  - type: text
    content: et toutes les familles de la terre
  - type: text
    content: se lamenteront à cause de lui
  - type: text
    content: ' '
  - type: note
    content: Za 12.10, 14.
  - type: text
    content: .
  - type: text
    content: Oui, amen !
  '8':
  - type: text
    content: « Moi je suis l’Alpha et l’Oméga
  - type: note
    content: Première et dernière lettres de l’alphabet grec (comparer 21.6 ; 22.13).
  - type: text
    content: '  »,'
  - type: text
    content: dit le Seigneur Dieu,
  - type: text
    content: celui qui est, qui était et qui vient,
  - type: text
    content: le Tout-Puissant
  - type: note
    content: 'Voir Ex 3.14. Le terme : Tout-Puissant est la traduction donnée par la Septante de l’expression : le Seigneur des armées célestes. Ce nom était aussi appliqué à l’empereur.'
  - type: text
    content: .
  - type: heading
    content: La vision du Ressuscité
  '9':
  - type: text
    content: Moi, Jean, votre frère, qui partage avec vous la détresse, le royaume et la persévérance dans l’union avec Jésus, j’étais dans l’île de Patmos
  - type: note
    content: Petite île de la mer Egée à une centaine de kilomètres d’Ephèse. Les autorités romaines y exilaient ceux qu’elles jugeaient indésirables.
  - type: text
    content: ' parce que j’avais proclamé la Parole de Dieu et le témoignage rendu par Jésus. '
