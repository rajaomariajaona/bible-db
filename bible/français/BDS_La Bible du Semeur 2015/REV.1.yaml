document_id: REV.1
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Jésus, le témoin digne de foi
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Révélation
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1.1 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Traduction du mot apocalypse. Cette révélation a été donnée par le Père au Fils, puis par le Fils à Jean par l’intermédiaire d’un ange.
    marker-yv: yv-n
  - type: text
    text: ' de Jésus-Christ.'
- type: usfm
  marker: p
  children:
  - type: text
    text: Cette révélation, Dieu l’a confiée à Jésus-Christ pour qu’il montre à ses serviteurs ce qui doit arriver bientôt
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1.1 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Ou : '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: d’une manière soudaine, inattendue.
    marker-yv: yv-n
  - type: text
    text: '  ; et Jésus-Christ, en envoyant son ange, l’a fait connaître à son serviteur Jean. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'En tant que témoin, celui-ci a annoncé la Parole de Dieu que Jésus-Christ lui a transmise par son propre témoignage : il a annoncé tout ce qu’il a vu. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Heureux celui qui donne lecture des paroles de cette prophétie et ceux qui les entendent, et qui obéissent à ce qui est écrit dans ce livre, car le temps est proche.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Jean salue les sept Eglises qui sont dans la province d’Asie
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1.4 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Localisées dans un cercle de 80 kilomètres autour d’Ephèse, énumérées aux chapitres 2 et 3. Ces Eglises, selon certains, représentent les Eglises de tous les temps (sept symbolise la totalité).
    marker-yv: yv-n
  - type: text
    text: '  : que la grâce et la paix vous soient données de la part de celui qui est, qui était et qui vient'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1.4 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Paraphrase du nom de Dieu révélé à Moïse (
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ex 3.14-15
        metadata:
          usfm: EXO.3.14+EXO.3.15
      - type: text
        text: '  ; comparer '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Hé 13.8
        metadata:
          usfm: HEB.13.8
      - type: text
        text: ). Un écrit juif le désignait comme « Celui qui est, qui était et qui sera » (Targum de Jérusalem).
    marker-yv: yv-n
  - type: text
    text: ', de la part des sept esprits'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1.4 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Le chiffre sept symbolise la perfection, la totalité.
    marker-yv: yv-n
  - type: text
    text: ' qui se tiennent devant son trône '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: et de la part de Jésus-Christ, le témoin
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1.5 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Qualification du Messie reprise d’
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Es 55.4
        metadata:
          usfm: ISA.55.4
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: ' digne de foi, le premier-né d’entre les morts'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1.5 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Voir '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1 Co 15.20
        metadata:
          usfm: 1CO.15.20
      - type: text
        text: ', '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '23'
        metadata:
          usfm: 1CO.15.23
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: ' et le souverain des rois de la terre.'
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Il nous aime, il nous a délivrés de nos péchés par son sacrifice, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'il a fait de nous un peuple de rois, '
  - type: usfm
    marker: qt
    children:
    - type: text
      text: 'des '
    - type: usfm
      marker: w
      children:
      - type: text
        text: prêtres
    - type: text
      text: ' au service de Dieu'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1.6 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Voir '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ex 19.6
        metadata:
          usfm: EXO.19.6
      - type: text
        text: .
    marker-yv: yv-n
  - type: usfm
    marker: qt
    children:
    - type: text
      text: ','
  - type: text
    text: ' son Père : à lui donc soient la gloire et le pouvoir pour l’éternité ! Amen.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: ' '
  - type: usfm
    marker: qt
    children:
    - type: text
      text: Voici ! Il vient
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: qt
    children:
    - type: text
      text: au milieu des nuées
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1.7 '
    - type: usfm
      marker: ft
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Dn 7.13
        metadata:
          usfm: DAN.7.13
      - type: text
        text: ' . Dans plusieurs manifestations de Dieu, il est question des nuées (Ex 19.16 ; Es 6.4 ; Mc 9.7 ; Ac 1.9  ; comparer Mt 24.30 ; 25.31 ; 26.64).'
    marker-yv: yv-n
  - type: usfm
    marker: qt
    children:
    - type: text
      text: ','
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'et tout le monde '
  - type: usfm
    marker: qt
    children:
    - type: text
      text: le verra,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: qt
    children:
    - type: text
      text: même ceux qui l’ont transpercé,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: qt
    children:
    - type: text
      text: et toutes les familles de la terre
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: qt
    children:
    - type: text
      text: se lamenteront à cause de lui
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1.7 '
    - type: usfm
      marker: ft
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Za 12.10
        metadata:
          usfm: ZEC.12.10
      - type: text
        text: ', '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '14'
        metadata:
          usfm: ZEC.12.14
      - type: text
        text: .
    marker-yv: yv-n
  - type: usfm
    marker: qt
    children:
    - type: text
      text: .
- type: usfm
  marker: q1
  children:
  - type: text
    text: Oui, amen !
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: « Moi je suis l’Alpha et l’Oméga
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1.8 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Première et dernière lettres de l’alphabet grec (comparer 21.6 ; 22.13).
    marker-yv: yv-n
  - type: text
    text: '  »,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: dit le Seigneur Dieu,
- type: usfm
  marker: q1
  children:
  - type: text
    text: celui qui est, qui était et qui vient,
- type: usfm
  marker: q1
  children:
  - type: text
    text: le Tout-Puissant
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1.8 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Voir '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ex 3.14
        metadata:
          usfm: EXO.3.14
      - type: text
        text: '. Le terme : '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'Tout-Puissant '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'est la traduction donnée par la Septante de l’expression : le Seigneur des armées célestes. Ce nom était aussi appliqué à l’empereur.'
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: s1
  children:
  - type: text
    text: La vision du Ressuscité
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Moi, Jean, votre frère, qui partage avec vous la détresse, le royaume et la persévérance dans l’union avec Jésus, j’étais dans l’île de Patmos
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1.9 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Petite île de la mer Egée à une centaine de kilomètres d’Ephèse. Les autorités romaines y exilaient ceux qu’elles jugeaient indésirables.
    marker-yv: yv-n
  - type: text
    text: ' parce que j’avais proclamé la Parole de Dieu et le témoignage rendu par Jésus. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Le jour du Seigneur
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1.10 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Cette expression (jour dominical) est déjà appliquée au premier jour de la semaine (dimanche) par Ignace d’Antioche, un contemporain de Jean.
    marker-yv: yv-n
  - type: text
    text: ', l’Esprit de Dieu se saisit de moi, et j’entendis derrière moi une voix forte, pareille au son d’une trompette. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Elle disait : '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'Inscris dans un livre ce que tu vois, et envoie-le à ces sept Eglises : Ephèse, Smyrne, Pergame, Thyatire, Sardes, Philadelphie et Laodicée.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Je me retournai pour découvrir quelle était cette voix. Et l’ayant fait, voici ce que je vis : il y avait sept chandeliers d’or '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'et, au milieu des chandeliers, quelqu’un qui ressemblait à un homme. Il portait une longue tunique, et une ceinture d’or lui entourait la poitrine. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Sa tête et ses cheveux étaient blancs comme de la laine blanche, oui, comme la neige. Ses yeux étaient comme une flamme ardente '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'et ses pieds étincelaient comme du bronze incandescent au sortir d’un creuset. '
  - type: usfm
    marker: qt
    children:
    - type: text
      text: Sa voix retentissait comme celle des grandes eaux
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1.15 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Cette description renvoie à plusieurs textes de l’Ancien Testament : Dn 7.13 ; 10.5 ; 7.9 ; 10.6.'
    marker-yv: yv-n
  - type: usfm
    marker: qt
    children:
    - type: text
      text: .
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Dans sa main droite, il tenait sept étoiles, et '
  - type: usfm
    marker: qt
    children:
    - type: text
      text: de sa bouche sortait une épée aiguisée à double tranchant
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1.16 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Voir '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Es 49.2
        metadata:
          usfm: ISA.49.2
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: . Son visage était éblouissant comme le soleil quand il brille de tout son éclat.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Quand je le vis, je tombai à ses pieds, comme mort. Alors il posa sa main droite sur moi en disant :'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'N’aie pas peur. '
    - type: usfm
      marker: qt
      children:
      - type: text
        text: Moi, je suis le premier et le dernier
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1.17 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Voir '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Es 44.6
        metadata:
          usfm: ISA.44.6
      - type: text
        text: ' et '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '48.12'
        metadata:
          usfm: ISA.48.12
      - type: text
        text: ' où il s’agit de Dieu. Ici il est question de Christ (Ap 2 ; 8 ; 22.13).'
    marker-yv: yv-n
  - type: usfm
    marker: wj
    children:
    - type: usfm
      marker: qt
      children:
      - type: text
        text: ','
    - type: text
      text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'le vivant. J’ai été mort, et voici : je suis vivant pour l’éternité ! Je détiens les clés de la mort et du séjour des morts.'
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Ecris donc ce que tu as vu, ce qui est, et ce qui va arriver ensuite.
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'Mais d’abord voici quel est le secret des sept étoiles que tu as vues dans ma main droite et des sept chandeliers d’or : les sept étoiles sont les '
    - type: usfm
      marker: w
      children:
      - type: text
        text: anges
    - type: text
      text: ' des sept Eglises et les sept chandeliers les sept Eglises.'
