document_id: REV.12,21
type_code: fra
verses:
  '1':
  - type: heading
    content: Le signe de la femme enceinte
  - type: text
    content: 'Alors un signe grandiose apparut dans le ciel : c’était une femme. Elle avait pour vêtement le soleil, la lune sous ses pieds et une couronne de douze étoiles sur sa tête. '
  '10':
  - type: text
    content: 'Puis j’entendis dans le ciel une voix puissante qui disait :'
  - type: text
    content: Maintenant, le temps du salut
  - type: text
    content: est arrivé.
  - type: text
    content: Maintenant, notre Dieu
  - type: text
    content: a manifesté sa puissance,
  - type: text
    content: il a instauré son royaume.
  - type: text
    content: Maintenant, son Messie
  - type: text
    content: a pris l’autorité en main.
  - type: text
    content: Car l’Accusateur
  - type: note
    content: Sens du nom de Satan (voir Jb 1.7-12 ; 2.2-5 ; Za 3.1-5).
  - type: text
    content: ' de nos frères,'
  - type: text
    content: celui qui, jour et nuit,
  - type: text
    content: les a accusés devant Dieu,
  - type: text
    content: a été jeté hors du ciel.
  '11':
  - type: text
    content: Mais eux, ils l’ont vaincu
  - type: text
    content: grâce au sacrifice de l’Agneau
  - type: text
    content: et grâce au témoignage
  - type: text
    content: qu’ils ont rendu pour lui,
  - type: text
    content: car ils n’ont pas aimé leur vie
  - type: text
    content: jusqu’à redouter de mourir.
  '12':
  - type: text
    content: Réjouis-toi donc, ô ciel,
  - type: text
    content: et vous qui habitez au ciel,
  - type: text
    content: réjouissez-vous !
  - type: text
    content: Mais malheur à la terre
  - type: text
    content: 'et à la mer :'
  - type: text
    content: le diable est descendu vers vous
  - type: text
    content: rempli de rage
  - type: text
    content: car il sait qu’il lui reste
  - type: text
    content: très peu de temps.
  '13':
  - type: text
    content: 'Quand le dragon se vit précipité sur la terre, il se lança à la poursuite de la femme qui avait mis au monde le garçon. '
  '14':
  - type: text
    content: 'Mais les deux ailes d’un grand aigle furent données à la femme pour qu’elle s’envole vers le désert jusqu’au lieu qui lui est réservé. Là elle doit être nourrie pendant un temps, deux temps, et la moitié d’un temps, loin du Serpent. '
  '15':
  - type: text
    content: 'Le Serpent vomit de sa gueule, derrière la femme, de l’eau abondante comme un fleuve, pour qu’elle soit emportée dans ses flots. '
  '16':
  - type: text
    content: 'Mais la terre vint au secours de la femme : elle ouvrit sa bouche et absorba le fleuve que le dragon avait vomi de sa gueule. '
  '17':
  - type: text
    content: 'Alors, furieux contre la femme, le dragon s’en alla faire la guerre au reste de ses enfants, c’est-à-dire à ceux qui obéissent aux commandements de Dieu et qui s’attachent au témoignage rendu par Jésus. '
  '18':
  - type: text
    content: Il se posta
  - type: note
    content: 'Certains manuscrits relient ce verset à celui qui suit et ont : et je me tins.'
  - type: text
    content: ' sur le rivage sablonneux de la mer.'
  '2':
  - type: text
    content: Elle était enceinte, sur le point d’accoucher, et ses douleurs lui arrachaient des cris.
  '3':
  - type: text
    content: 'Là-dessus, un autre signe parut dans le ciel, et voici : c’était un grand dragon'
  - type: note
    content: Animal légendaire symbolisant le diable. Voir Es 27.1 et note.
  - type: text
    content: ', couleur de feu. Il avait sept têtes et dix cornes. Chacune de ses sept têtes portait un diadème. '
  '4':
  - type: text
    content: 'Sa queue balaya le tiers des étoiles du ciel et les jeta sur la terre. Le dragon se posta devant la femme qui allait accoucher, pour dévorer son enfant dès qu’elle l’aurait mis au monde. '
  '5':
  - type: text
    content: 'Or, elle enfanta un fils, un garçon qui est destiné à '
  - type: text
    content: diriger tous les peuples avec un sceptre de fer
  - type: note
    content: Ps 2.9.
  - type: text
    content: '. Et son enfant fut enlevé auprès de Dieu et de son trône. '
  '6':
  - type: text
    content: La femme s’enfuit au désert, où Dieu lui avait préparé un refuge pour qu’elle y soit nourrie pendant mille deux cent soixante jours.
  '7':
  - type: text
    content: 'Alors une bataille s’engagea dans le ciel : Michel'
  - type: note
    content: Voir Dn 10.13, 21 ; 12.1.
  - type: text
    content: ' et ses anges combattirent contre le dragon, et celui-ci les combattit avec ses anges ; '
  '8':
  - type: text
    content: 'mais le dragon ne remporta pas la victoire et lui et ses anges ne purent maintenir leur position au ciel. '
  '9':
  - type: text
    content: Il fut précipité, le grand dragon, le Serpent ancien
  - type: note
    content: Voir Gn 3.1ss
  - type: text
    content: ', qu’on appelle le diable et Satan, celui qui égare le monde entier. Il fut précipité sur la terre, et ses anges furent précipités avec lui.'
