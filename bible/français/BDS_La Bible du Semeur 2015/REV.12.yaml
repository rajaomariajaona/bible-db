document_id: REV.12
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Le signe de la femme enceinte
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Alors un signe grandiose apparut dans le ciel : c’était une femme. Elle avait pour vêtement le soleil, la lune sous ses pieds et une couronne de douze étoiles sur sa tête. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Elle était enceinte, sur le point d’accoucher, et ses douleurs lui arrachaient des cris.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Là-dessus, un autre signe parut dans le ciel, et voici : c’était un grand dragon'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '12.3 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Animal légendaire symbolisant le diable. Voir '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Es 27.1
        metadata:
          usfm: ISA.27.1
      - type: text
        text: ' et note.'
    marker-yv: yv-n
  - type: text
    text: ', couleur de feu. Il avait sept têtes et dix cornes. Chacune de ses sept têtes portait un diadème. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Sa queue balaya le tiers des étoiles du ciel et les jeta sur la terre. Le dragon se posta devant la femme qui allait accoucher, pour dévorer son enfant dès qu’elle l’aurait mis au monde. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Or, elle enfanta un fils, un garçon qui est destiné à '
  - type: usfm
    marker: qt
    children:
    - type: text
      text: diriger tous les peuples avec un sceptre de fer
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '12.5 '
    - type: usfm
      marker: ft
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ps 2.9
        metadata:
          usfm: PSA.2.9
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: '. Et son enfant fut enlevé auprès de Dieu et de son trône. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: La femme s’enfuit au désert, où Dieu lui avait préparé un refuge pour qu’elle y soit nourrie pendant mille deux cent soixante jours.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Alors une bataille s’engagea dans le ciel : Michel'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '12.7 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Voir Dn 10.13, 21 ; 12.1.
    marker-yv: yv-n
  - type: text
    text: ' et ses anges combattirent contre le dragon, et celui-ci les combattit avec ses anges ; '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'mais le dragon ne remporta pas la victoire et lui et ses anges ne purent maintenir leur position au ciel. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Il fut précipité, le grand dragon, le Serpent ancien
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '12.9 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Voir '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Gn 3.1
        metadata:
          usfm: GEN.3.1
      - type: text
        text: ss
    marker-yv: yv-n
  - type: text
    text: ', qu’on appelle le diable et Satan, celui qui égare le monde entier. Il fut précipité sur la terre, et ses anges furent précipités avec lui.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Puis j’entendis dans le ciel une voix puissante qui disait :'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Maintenant, le temps du salut
- type: usfm
  marker: q1
  children:
  - type: text
    text: est arrivé.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Maintenant, notre Dieu
- type: usfm
  marker: q1
  children:
  - type: text
    text: a manifesté sa puissance,
- type: usfm
  marker: q1
  children:
  - type: text
    text: il a instauré son royaume.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Maintenant, son Messie
- type: usfm
  marker: q1
  children:
  - type: text
    text: a pris l’autorité en main.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Car l’Accusateur
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '12.10 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Sens du nom de Satan (voir Jb 1.7-12 ; 2.2-5 ; Za 3.1-5).
    marker-yv: yv-n
  - type: text
    text: ' de nos frères,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: celui qui, jour et nuit,
- type: usfm
  marker: q1
  children:
  - type: text
    text: les a accusés devant Dieu,
- type: usfm
  marker: q1
  children:
  - type: text
    text: a été jeté hors du ciel.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Mais eux, ils l’ont vaincu
- type: usfm
  marker: q1
  children:
  - type: text
    text: grâce au sacrifice de l’Agneau
- type: usfm
  marker: q1
  children:
  - type: text
    text: et grâce au témoignage
- type: usfm
  marker: q1
  children:
  - type: text
    text: qu’ils ont rendu pour lui,
- type: usfm
  marker: q1
  children:
  - type: text
    text: car ils n’ont pas aimé leur vie
- type: usfm
  marker: q1
  children:
  - type: text
    text: jusqu’à redouter de mourir.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Réjouis-toi donc, ô ciel,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et vous qui habitez au ciel,
- type: usfm
  marker: q1
  children:
  - type: text
    text: réjouissez-vous !
- type: usfm
  marker: q1
  children:
  - type: text
    text: Mais malheur à la terre
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'et à la mer :'
- type: usfm
  marker: q1
  children:
  - type: text
    text: le diable est descendu vers vous
- type: usfm
  marker: q1
  children:
  - type: text
    text: rempli de rage
- type: usfm
  marker: q1
  children:
  - type: text
    text: car il sait qu’il lui reste
- type: usfm
  marker: q1
  children:
  - type: text
    text: très peu de temps.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Quand le dragon se vit précipité sur la terre, il se lança à la poursuite de la femme qui avait mis au monde le garçon. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Mais les deux ailes d’un grand aigle furent données à la femme pour qu’elle s’envole vers le désert jusqu’au lieu qui lui est réservé. Là elle doit être nourrie pendant un temps, deux temps, et la moitié d’un temps, loin du Serpent. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Le Serpent vomit de sa gueule, derrière la femme, de l’eau abondante comme un fleuve, pour qu’elle soit emportée dans ses flots. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Mais la terre vint au secours de la femme : elle ouvrit sa bouche et absorba le fleuve que le dragon avait vomi de sa gueule. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Alors, furieux contre la femme, le dragon s’en alla faire la guerre au reste de ses enfants, c’est-à-dire à ceux qui obéissent aux commandements de Dieu et qui s’attachent au témoignage rendu par Jésus. '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Il se posta
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '12.18 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Certains manuscrits relient ce verset à celui qui suit et ont : '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: et je me tins.
    marker-yv: yv-n
  - type: text
    text: ' sur le rivage sablonneux de la mer.'
