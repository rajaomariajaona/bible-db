document_id: 1SA.INTRO1,21
type_code: fra
verses:
  '1':
  - type: text
    content: Introduction
  - type: text
    content: 'Ce livre, d’auteur inconnu, qui, primitivement, ne constituait qu’un seul volume avec 2 Samuel, tire son titre de l’un de ses personnages principaux : Samuel, le dernier des « juges », ces « chefs » que l’Eternel suscitait pour diriger son peuple en temps de crise. A l’époque de Samuel, la menace provenait des Philistins, peuple indo-européen un temps installé dans l’île de Chypre, qui avait occupé le littoral de Canaan vers 1200 avant Jésus-Christ.'
  - type: text
    content: 'Les principaux repères chronologiques approximatifs sont pour le premier livre de Samuel les suivants :'
  - type: text
    content: 1105 av. J.-C. Naissance de Samuel (1.20)
  - type: text
    content: 1080 Naissance de Saül
  - type: text
    content: 1050 Saül désigné comme roi (10.1)
  - type: text
    content: 1040 Naissance de David
  - type: text
    content: 1025 David désigné comme successeur de Saül (16.1-13)
  - type: text
    content: 1010 Mort de Saül (chap. 31).
  - type: text
    content: 'Trois grandes figures occupent le livre : Samuel, Saül et David. Samuel est le personnage central de la première partie : dès le début, l’attention se concentre sur lui. C’est Samuel qui notifie son rejet à Eli (3.11-18) à cause de la conduite éhontée des fils de celui-ci (2.27-36) ; c’est lui qui désigne Saül comme roi (chap. 9 à 10) puis lui annonce sa mise à l’écart (chap. 15) et qui, enfin, confère l’onction royale à David (chap. 16).'
  - type: text
    content: David ne régnera pas avant la mort de Saül. Les chapitres 16 à 31 relatent l’histoire tourmentée des dernières années de la vie du premier roi d’Israël, en proie à certains moments à une sorte de démence qui le conduisit à poursuivre David de sa jalousie meurtrière.
  - type: text
    content: 'L’instauration de la royauté en Israël est l’événement principal du livre. Elle ne se réalise pas sans réticences de la part de Samuel. Ces réticences sont confirmées par l’Eternel, qui demande cependant à Samuel d’accéder à la demande du peuple d’avoir un roi (8.6-9). Ces réticences tiennent à l’ambiguïté de la royauté. D’un côté, elle était prévue (Gn 17.6 ; Dt 17.14-20) et avait fait l’objet de promesses (Nb 24.7 ; 1 S 2.10). De l’autre, elle pouvait constituer un danger pour Israël : ne risquait-elle pas de représenter un rejet du Roi-Suzerain de l’alliance ? Dans le Moyen-Orient ancien, le roi était en effet un personnage semi-divin. Et il pouvait aussi devenir despote (8.10-22). Cette ambiguïté se retrouve dans les motifs invoqués par le peuple pour avoir un roi (8.5). La conduite répréhensible des fils de Samuel, qui auraient dû lui succéder, était certes un motif valable, mais le désir de ressembler aux autres peuples était plus inquiétant. L’histoire de la royauté en Israël ne cessera d’illustrer cette ambiguïté.'
