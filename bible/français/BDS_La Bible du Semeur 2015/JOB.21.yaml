document_id: JOB.21
type_code: fra
segments:
- type: usfm
  marker: ms1
  children:
  - type: text
    text: Réponse de Job à Tsophar
  marker-yv: yv-h
- type: usfm
  marker: s1
  children:
  - type: text
    text: Pourquoi les méchants prospèrent-ils ?
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Job prit la parole et dit :'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Ecoutez, je vous prie, ╵écoutez ce que je vous dis,
- type: usfm
  marker: q1
  children:
  - type: text
    text: accordez-moi du moins ╵cette consolation.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Supportez que je parle
- type: usfm
  marker: q1
  children:
  - type: text
    text: et, quand j’aurai parlé, ╵tu pourras te moquer.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Est-ce contre des hommes ╵que se porte ma plainte ?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Comment ne pas perdre patience !
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Tournez-vous donc vers moi, ╵vous serez stupéfaits
- type: usfm
  marker: q1
  children:
  - type: text
    text: au point de perdre la parole.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Moi-même quand j’y songe, ╵j’en suis épouvanté,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et un frisson d’horreur ╵s’empare de mon corps.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Pourquoi les gens qui font le mal ╵demeurent-ils en vie ?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Pourquoi vieillissent-ils, ╵en reprenant des forces ?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Leur descendance s’affermit ╵à leurs côtés,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et leurs petits-enfants ╵prospèrent sous leurs yeux.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Leurs maisons sont paisibles, ╵à l’abri de la crainte,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et le bâton de Dieu ╵ne vient pas les frapper.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Leurs taureaux sont toujours ╵vigoureux et féconds,
- type: usfm
  marker: q1
  children:
  - type: text
    text: leurs vaches mettent bas ╵sans jamais avorter.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Ils laissent courir leurs enfants ╵comme un troupeau d’agneaux,
- type: usfm
  marker: q1
  children:
  - type: text
    text: leurs petits vont s’ébattre.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Accompagnés des tambourins ╵et de la lyre, ils chantent,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et au son de la flûte, ╵ils se réjouissent.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Ainsi leurs jours s’écoulent ╵dans le bonheur
- type: usfm
  marker: q1
  children:
  - type: text
    text: et c’est en un instant ╵qu’ils rejoignent la tombe.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Or, ils disaient à Dieu : ╵« Retire-toi de nous,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: nous n’avons nulle envie ╵de connaître comment tu veux ╵que nous conduisions notre vie.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Qu’est donc le Tout-Puissant ╵pour que nous le servions
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '21.15 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Autre traduction : '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: pour que nous lui rendions un culte.
    marker-yv: yv-n
  - type: text
    text: '  ?'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Qu’y a-t-il à gagner ╵à lui adresser des prières ? »
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Le bonheur de ces gens ╵n’est-il pas dans leurs mains
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '21.16 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Autre traduction : '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: Certes, le bonheur de ces gens n’est pas entre leurs mains.
    marker-yv: yv-n
  - type: text
    text: '  ?'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Mais loin de moi ╵l’idée de suivre leurs conseils !
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Voit-on souvent s’éteindre ╵la lampe des méchants
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '21.17 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: C’est-à-dire mourir sans laisser de descendant (
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Pr 13.9
        metadata:
          usfm: PRO.13.9
      - type: text
        text: ). Job demande à ses amis combien de fois les « lois » qu’ils lui ont rabâchées se vérifient.
    marker-yv: yv-n
  - type: text
    text: ','
- type: usfm
  marker: q1
  children:
  - type: text
    text: ou bien la ruine ╵fondre sur eux ?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Dieu leur assigne-t-il ╵leur part de sa colère ?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Quand sont-ils pourchassés ╵comme une paille au vent
- type: usfm
  marker: q1
  children:
  - type: text
    text: ou comme un brin de chaume ╵qu’emporte la tempête ?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Dieu réserverait-il ╵aux enfants du méchant ╵la peine qu’il mérite ?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ne devrait-il pas au contraire ╵l’infliger au méchant lui-même ╵pour qu’il en tire la leçon ?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Que, de ses propres yeux, ╵il assiste à sa ruine
- type: usfm
  marker: q1
  children:
  - type: text
    text: et qu’il soit abreuvé ╵de la fureur du Tout-Puissant.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Que lui importe donc ╵le sort de sa maison ╵quand il ne sera plus,
- type: usfm
  marker: q1
  children:
  - type: text
    text: quand le fil de ses mois ╵aura été tranché ?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: Pourrait-on enseigner ╵quelque savoir à Dieu,
- type: usfm
  marker: q1
  children:
  - type: text
    text: lui qui gouverne ╵tous les êtres célestes ?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: L’un meurt plein de vigueur, ╵dans la sérénité,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et en toute quiétude.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: Ses flancs sont pleins de graisse
- type: usfm
  marker: q1
  children:
  - type: text
    text: et ses os pleins de moelle.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: Tel autre va s’éteindre ╵l’amertume dans l’âme,
- type: usfm
  marker: q1
  children:
  - type: text
    text: sans avoir goûté au bonheur.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: Et tous deux, ils se couchent ╵dans la poussière
- type: usfm
  marker: q1
  children:
  - type: text
    text: et ils sont recouverts ╵par la vermine.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: Oui, vos pensées, je les connais,
- type: usfm
  marker: q1
  children:
  - type: text
    text: les réflexions blessantes ╵que vous entretenez ╵à mon encontre
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '21.27 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Autre traduction : '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: Les mauvais desseins que vous me prêtez.
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'Vous me demanderez : ╵« Où donc est maintenant ╵la maison du tyran ?'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et la demeure des méchants, ╵qu’est-elle devenue ? »
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: Mais interrogez donc ╵les passants du chemin,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et ne contestez pas ╵les preuves qu’ils apportent.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: Oui, le jour du désastre ╵épargne le méchant,
- type: usfm
  marker: q1
  children:
  - type: text
    text: au jour de la colère, ╵il est mis à l’abri.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: Qui osera lui reprocher ╵en face sa conduite ?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et qui lui paiera de retour ╵tout le mal qu’il a fait ?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '32'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: Il est porté en pompe ╵au lieu de sépulture,
- type: usfm
  marker: q1
  children:
  - type: text
    text: on veille sur sa tombe.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '33'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: Les mottes du vallon ╵qui recouvrent son corps ╵lui sont légères.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Tout un cortège ╵a marché à sa suite,
- type: usfm
  marker: q1
  children:
  - type: text
    text: des gens sans nombre ╵l’ont précédé.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '34'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: Comment donc m’offrez-vous ╵des consolations aussi vaines ?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Car, vraiment ce qui reste ╵de toutes vos réponses, ╵ce n’est que fausseté.
