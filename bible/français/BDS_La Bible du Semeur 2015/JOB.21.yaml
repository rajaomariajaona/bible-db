document_id: JOB.21,21
type_code: fra
verses:
  '1':
  - type: heading
    content: Réponse de Job à Tsophar
  - type: heading
    content: Pourquoi les méchants prospèrent-ils ?
  - type: text
    content: 'Job prit la parole et dit :'
  '10':
  - type: text
    content: Leurs taureaux sont toujours ╵vigoureux et féconds,
  - type: text
    content: leurs vaches mettent bas ╵sans jamais avorter.
  '11':
  - type: text
    content: Ils laissent courir leurs enfants ╵comme un troupeau d’agneaux,
  - type: text
    content: leurs petits vont s’ébattre.
  '12':
  - type: text
    content: Accompagnés des tambourins ╵et de la lyre, ils chantent,
  - type: text
    content: et au son de la flûte, ╵ils se réjouissent.
  '13':
  - type: text
    content: Ainsi leurs jours s’écoulent ╵dans le bonheur
  - type: text
    content: et c’est en un instant ╵qu’ils rejoignent la tombe.
  '14':
  - type: text
    content: 'Or, ils disaient à Dieu : ╵« Retire-toi de nous,'
  - type: text
    content: nous n’avons nulle envie ╵de connaître comment tu veux ╵que nous conduisions notre vie.
  '15':
  - type: text
    content: Qu’est donc le Tout-Puissant ╵pour que nous le servions
  - type: note
    content: 'Autre traduction : pour que nous lui rendions un culte.'
  - type: text
    content: '  ?'
  - type: text
    content: Qu’y a-t-il à gagner ╵à lui adresser des prières ? »
  '16':
  - type: text
    content: Le bonheur de ces gens ╵n’est-il pas dans leurs mains
  - type: note
    content: 'Autre traduction : Certes, le bonheur de ces gens n’est pas entre leurs mains.'
  - type: text
    content: '  ?'
  - type: text
    content: Mais loin de moi ╵l’idée de suivre leurs conseils !
  '17':
  - type: text
    content: Voit-on souvent s’éteindre ╵la lampe des méchants
  - type: note
    content: C’est-à-dire mourir sans laisser de descendant (Pr 13.9). Job demande à ses amis combien de fois les « lois » qu’ils lui ont rabâchées se vérifient.
  - type: text
    content: ','
  - type: text
    content: ou bien la ruine ╵fondre sur eux ?
  - type: text
    content: Dieu leur assigne-t-il ╵leur part de sa colère ?
  '18':
  - type: text
    content: Quand sont-ils pourchassés ╵comme une paille au vent
  - type: text
    content: ou comme un brin de chaume ╵qu’emporte la tempête ?
  '19':
  - type: text
    content: Dieu réserverait-il ╵aux enfants du méchant ╵la peine qu’il mérite ?
  - type: text
    content: Ne devrait-il pas au contraire ╵l’infliger au méchant lui-même ╵pour qu’il en tire la leçon ?
  '2':
  - type: text
    content: Ecoutez, je vous prie, ╵écoutez ce que je vous dis,
  - type: text
    content: accordez-moi du moins ╵cette consolation.
  '20':
  - type: text
    content: Que, de ses propres yeux, ╵il assiste à sa ruine
  - type: text
    content: et qu’il soit abreuvé ╵de la fureur du Tout-Puissant.
  '21':
  - type: text
    content: Que lui importe donc ╵le sort de sa maison ╵quand il ne sera plus,
  - type: text
    content: quand le fil de ses mois ╵aura été tranché ?
  '22':
  - type: text
    content: Pourrait-on enseigner ╵quelque savoir à Dieu,
  - type: text
    content: lui qui gouverne ╵tous les êtres célestes ?
  '23':
  - type: text
    content: L’un meurt plein de vigueur, ╵dans la sérénité,
  - type: text
    content: et en toute quiétude.
  '24':
  - type: text
    content: Ses flancs sont pleins de graisse
  - type: text
    content: et ses os pleins de moelle.
  '25':
  - type: text
    content: Tel autre va s’éteindre ╵l’amertume dans l’âme,
  - type: text
    content: sans avoir goûté au bonheur.
  '26':
  - type: text
    content: Et tous deux, ils se couchent ╵dans la poussière
  - type: text
    content: et ils sont recouverts ╵par la vermine.
  '27':
  - type: text
    content: Oui, vos pensées, je les connais,
  - type: text
    content: les réflexions blessantes ╵que vous entretenez ╵à mon encontre
  - type: note
    content: 'Autre traduction : Les mauvais desseins que vous me prêtez.'
  - type: text
    content: .
  '28':
  - type: text
    content: 'Vous me demanderez : ╵« Où donc est maintenant ╵la maison du tyran ?'
  - type: text
    content: Et la demeure des méchants, ╵qu’est-elle devenue ? »
  '29':
  - type: text
    content: Mais interrogez donc ╵les passants du chemin,
  - type: text
    content: et ne contestez pas ╵les preuves qu’ils apportent.
  '3':
  - type: text
    content: Supportez que je parle
  - type: text
    content: et, quand j’aurai parlé, ╵tu pourras te moquer.
  '30':
  - type: text
    content: Oui, le jour du désastre ╵épargne le méchant,
  - type: text
    content: au jour de la colère, ╵il est mis à l’abri.
  '31':
  - type: text
    content: Qui osera lui reprocher ╵en face sa conduite ?
  - type: text
    content: Et qui lui paiera de retour ╵tout le mal qu’il a fait ?
  '32':
  - type: text
    content: Il est porté en pompe ╵au lieu de sépulture,
  - type: text
    content: on veille sur sa tombe.
  '33':
  - type: text
    content: Les mottes du vallon ╵qui recouvrent son corps ╵lui sont légères.
  - type: text
    content: Tout un cortège ╵a marché à sa suite,
  - type: text
    content: des gens sans nombre ╵l’ont précédé.
  '34':
  - type: text
    content: Comment donc m’offrez-vous ╵des consolations aussi vaines ?
  - type: text
    content: Car, vraiment ce qui reste ╵de toutes vos réponses, ╵ce n’est que fausseté.
  '4':
  - type: text
    content: Est-ce contre des hommes ╵que se porte ma plainte ?
  - type: text
    content: Comment ne pas perdre patience !
  '5':
  - type: text
    content: Tournez-vous donc vers moi, ╵vous serez stupéfaits
  - type: text
    content: au point de perdre la parole.
  '6':
  - type: text
    content: Moi-même quand j’y songe, ╵j’en suis épouvanté,
  - type: text
    content: et un frisson d’horreur ╵s’empare de mon corps.
  '7':
  - type: text
    content: Pourquoi les gens qui font le mal ╵demeurent-ils en vie ?
  - type: text
    content: Pourquoi vieillissent-ils, ╵en reprenant des forces ?
  '8':
  - type: text
    content: Leur descendance s’affermit ╵à leurs côtés,
  - type: text
    content: et leurs petits-enfants ╵prospèrent sous leurs yeux.
  '9':
  - type: text
    content: Leurs maisons sont paisibles, ╵à l’abri de la crainte,
  - type: text
    content: et le bâton de Dieu ╵ne vient pas les frapper.
