document_id: 1JN.INTRO1
type_code: fra
segments:
- type: usfm
  marker: imt1
  children:
  - type: text
    text: Introduction
- type: usfm
  marker: ip
  children:
  - type: text
    text: 'Dans la '
  - type: usfm
    marker: bd
    children:
    - type: text
      text: première lettre
  - type: text
    text: ', l’apôtre Jean s’adresse à des chrétiens troublés par la prédication de gens qui enseignent des erreurs, auxquels il donne le nom d’« antichrists » : ils nient, en effet, l’humanité de Jésus, minimisent la gravité du péché et ses conséquences dans la relation avec Dieu, et méprisent les exigences de la morale chrétienne. Ces traits sont caractéristiques du mouvement philosophico-religieux connu plus tard sous le nom de gnosticisme. Les partisans de ce mouvement prétendaient être initiés à une « connaissance » spéciale, la « gnose ».'
- type: usfm
  marker: ip
  children:
  - type: text
    text: 'La lettre de Jean a donc un double but : polémique et pastoral, redresser et rassurer. Et l’apôtre de dire : « Tenez-vous soigneusement à l’enseignement que vous avez reçu dès le commencement » (2.24). Il leur rappelle donc ce qu’ils savent déjà.'
- type: usfm
  marker: ip
  children:
  - type: text
    text: 'L’apôtre fournit les critères qui permettent de reconnaître un chrétien : la foi que Christ était véritablement incarné (4.2), l’obéissance aux commandements (2.3), l’amour fraternel (3.14).'
- type: usfm
  marker: ip
  children:
  - type: text
    text: 'Il est difficile de discerner dans cette lettre un plan très rigoureux : l’auteur procède par associations d’idées et par contrastes.'
- type: usfm
  marker: ip
  children:
  - type: text
    text: 'Après un prologue – qui n’est pas sans ressemblances avec celui de l’évangile – dans lequel l’apôtre rappelle qu’il « parle en témoin » (1.2), la lettre se poursuit par trois développements sur l’amour :'
- type: usfm
  marker: ili1
  children:
  - type: text
    text: '2.3-11  : ce n’est pas un commandement nouveau ;'
- type: usfm
  marker: ili1
  children:
  - type: text
    text: '3.11-24  : c’est une caractéristique du chrétien ;'
- type: usfm
  marker: ili1
  children:
  - type: text
    text: '4.7-21  : puisque Dieu est amour.'
- type: usfm
  marker: ip
  children:
  - type: text
    text: 'Ces développements sont entrecoupés de recommandations et de rappels au sujet du péché :'
- type: usfm
  marker: ili1
  children:
  - type: text
    text: '1.5 à 2.2  : confessé, il est pardonné par celui qui s’est offert en sacrifice ;'
- type: usfm
  marker: ili1
  children:
  - type: text
    text: '2.12-19  : c’est une caractéristique du monde ;'
- type: usfm
  marker: ili1
  children:
  - type: text
    text: '2.29 à 3.10  : le chrétien ne commet pas le péché ;'
- type: usfm
  marker: ili1
  children:
  - type: text
    text: '5.16-20  : car il appartient au Fils de Dieu.'
- type: usfm
  marker: ip
  children:
  - type: text
    text: 'Cette lettre est d’une grande actualité dans le contexte où nous vivons : les tests d’authenticité chrétienne qu’elle propose restent toujours valables.'
- type: usfm
  marker: ip
  children:
  - type: text
    text: 'La '
  - type: usfm
    marker: bd
    children:
    - type: text
      text: deuxième lettre
  - type: text
    text: ' de Jean est adressée à « celle que Dieu a choisie et à ses enfants » (1.1). Qui se cache derrière cette formule ? Très probablement une Eglise, comme le suggère le passage du « tu » au « vous » aux versets 5 et 6.'
- type: usfm
  marker: ip
  children:
  - type: text
    text: 'La lettre est une sorte de résumé de la première : même accent sur le commandement d’amour (4-6), sur la mise en garde contre les antichrists (7-11) qui ne reconnaissent pas l’incarnation de Jésus-Christ. Son originalité se trouve dans les versets 10 et 11 où Jean donne des précisions sur la conduite à tenir avec eux : il ne faut pas les recevoir de peur d’être « complices de leurs œuvres mauvaises » (11).'
- type: usfm
  marker: ip
  children:
  - type: text
    text: 'La '
  - type: usfm
    marker: bd
    children:
    - type: text
      text: troisième lettre
  - type: text
    text: ' est adressée à un chrétien du nom de Gaïus, et traite de trois personnes : Gaïus, le destinataire (1-8), Diotrèphe (9-11) et Démétrius (12). Elle soulève la question du soutien et de l’aide à apporter aux enseignants itinérants, pratiqués par le premier et refusés par le deuxième. Jean loue le troisième pour son bon témoignage.'
