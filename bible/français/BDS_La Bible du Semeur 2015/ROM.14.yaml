document_id: ROM.14,21
type_code: fra
verses:
  '1':
  - type: heading
    content: Le respect des frères et sœurs en la foi
  - type: text
    content: Accueillez celui qui est mal affermi dans la foi, sans contester sans cesse ses opinions
  - type: note
    content: 'Autre traduction : sans discuter sans cesse de ses opinions.'
  - type: text
    content: '. '
  '10':
  - type: text
    content: 'Et toi, pourquoi condamnes-tu ton frère ? Ou toi, pourquoi méprises-tu ton frère ? Ne devons-nous pas tous comparaître devant le tribunal de Dieu ? '
  '11':
  - type: text
    content: 'Car il est écrit :'
  - type: text
    content: Aussi vrai que je vis, dit le Seigneur,
  - type: text
    content: tout genou ploiera devant moi
  - type: text
    content: et toute langue
  - type: text
    content: me reconnaîtra comme Dieu
  - type: text
    content: ' '
  - type: note
    content: Es 45.23 cité selon l’ancienne version grecque.
  - type: text
    content: .
  '12':
  - type: text
    content: 'Ainsi chacun de nous rendra compte à Dieu pour lui-même. '
  '13':
  - type: text
    content: Cessons donc de nous condamner les uns les autres.
  - type: heading
    content: Se soucier des frères et sœurs en la foi
  - type: text
    content: 'Prenez plutôt la décision de ne rien mettre en travers du chemin d’un frère qui puisse le faire trébucher ou tomber. '
  '14':
  - type: text
    content: 'Pour moi, je sais et je suis pleinement convaincu, en accord avec la pensée du Seigneur Jésus, que rien n’est impur en soi. Cependant, si quelqu’un considère que telle chose est impure, alors elle est impure pour lui. '
  '15':
  - type: text
    content: 'Si donc, à cause d’un aliment, tu fais du tort à ton frère, tu ne te conduis pas selon l’amour. Ne va pas, pour un aliment, causer la perte de celui pour qui Christ est mort. '
  '16':
  - type: text
    content: Que ce qui est bien pour vous ne devienne pas pour d’autres une occasion de dire du mal de vous
  - type: note
    content: 'Certains manuscrits ont : nous.'
  - type: text
    content: '. '
  '17':
  - type: text
    content: 'Dans le royaume de Dieu, ce n’est pas le manger et le boire qui importent, mais une vie juste, la paix et la joie que produit l’Esprit Saint. '
  '18':
  - type: text
    content: Celui qui sert Christ de cette manière est agréable à Dieu et estimé des hommes.
  '19':
  - type: text
    content: Ainsi donc, cherchons
  - type: note
    content: 'Certains manuscrits ont : nous cherchons.'
  - type: text
    content: ' toujours ce qui contribue à favoriser la paix et à nous faire grandir les uns les autres dans la foi. '
  '2':
  - type: text
    content: 'Ainsi la foi de l’un le conduit à manger de tout. L’autre, qui est mal affermi dans la foi, ne mange que des légumes. '
  '20':
  - type: text
    content: 'Ne va pas, pour un aliment, détruire l’œuvre de Dieu. Tout est pur, c’est vrai. Mais il est mal de manger tel aliment si cela risque de causer la chute d’un frère. '
  '21':
  - type: text
    content: 'Ce qui est bien, c’est de s’abstenir de viande, de vin, bref, de tout ce qui peut entraîner la chute de ton frère. '
  '22':
  - type: text
    content: 'Garde devant Dieu cette foi que tu as. Heureux celui qui ne se condamne pas lui-même par ce qu’il approuve. '
  '23':
  - type: text
    content: Mais celui qui mange tout en ayant des doutes à ce sujet est déjà condamné, car son attitude ne découle pas de la foi. Or tout ce qui ne découle pas de la foi est péché.
  '3':
  - type: text
    content: 'Que celui qui mange de tout ne méprise pas celui qui ne fait pas comme lui, et que celui qui ne mange pas de viande ne condamne pas celui qui en mange, car Dieu lui a fait bon accueil. '
  '4':
  - type: text
    content: Qui es-tu, toi, pour juger le serviteur d’un autre ? Qu’il tienne bon ou qu’il tombe, c’est l’affaire de son maître. Mais il tiendra bon car le Seigneur, son maître, a le pouvoir de le faire tenir.
  '5':
  - type: text
    content: Pour celui-ci, tel jour a plus d’importance qu’un autre
  - type: note
    content: Il s’agissait sans doute de chrétiens d’origine juive qui continuaient à respecter le sabbat et les jours de fêtes cultuelles instituées par la Loi mosaïque.
  - type: text
    content: '  ; pour celui-là, ils sont tous égaux : à chacun d’avoir une pleine conviction en lui-même. '
  '6':
  - type: text
    content: Celui qui fait une distinction entre les jours le fait pour le Seigneur. Celui qui mange de tout le fait aussi pour le Seigneur, puisqu’il remercie Dieu pour sa nourriture. Et celui qui s’abstient de certains aliments le fait encore pour le Seigneur, car lui aussi remercie Dieu.
  '7':
  - type: text
    content: 'Aucun de nous ne vit pour lui-même et aucun ne meurt pour lui-même. '
  '8':
  - type: text
    content: 'Si nous vivons, nous vivons pour le Seigneur, et si nous mourons, nous mourons pour le Seigneur. Ainsi, que nous vivions ou que nous mourions, nous appartenons au Seigneur. '
  '9':
  - type: text
    content: 'En effet, Christ est mort et il est revenu à la vie pour être le Seigneur des morts et des vivants. '
