  children:
  - type: text
    text: Quand Israël sortit d’Egypte
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Quand Israël sortit d’Egypte,
- type: usfm
  marker: q1
  children:
  - type: text
    text: quand les descendants de Jacob ╵quittèrent un peuple parlant une langue étrangère,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Juda devint le sanctuaire ╵de l’Eternel,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Israël devint son domaine.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: La mer le vit et prit la fuite,
- type: usfm
  marker: q1
  children:
  - type: text
    text: le Jourdain reflua
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '114.3 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Voir Ex 14.21-29 ; Jos 3.15-16 ; 4.23.
    marker-yv: yv-n
  - type: text
    text: ','
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: et les montagnes ╵se mirent à bondir ╵tout comme des béliers,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et les collines ╵tout comme des cabris.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Qu’avais-tu, mer, ╵pour fuir ainsi ?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et toi, Jourdain, ╵pour refluer ?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Et vous, montagnes, qu’aviez-vous ╵pour bondir comme des béliers,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et vous, collines, ╵tout comme des cabris ?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: O terre, tremble devant le Seigneur,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'oui, devant le Dieu de Jacob :'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: il change le roc en étang,
- type: usfm
  marker: q1
  children:
  - type: text
    text: la pierre en source jaillissante
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '114.8 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Voir Ex 17.1-6 ; Nb 20.1-11.
    marker-yv: yv-n
  - type: text
    text: .
