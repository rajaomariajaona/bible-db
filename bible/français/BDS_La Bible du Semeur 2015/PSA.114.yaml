document_id: PSA.114,21
type_code: fra
verses:
  '1':
  - type: heading
    content: Quand Israël sortit d’Egypte
  - type: text
    content: Quand Israël sortit d’Egypte,
  - type: text
    content: quand les descendants de Jacob ╵quittèrent un peuple parlant une langue étrangère,
  '2':
  - type: text
    content: Juda devint le sanctuaire ╵de l’Eternel,
  - type: text
    content: Israël devint son domaine.
  '3':
  - type: text
    content: La mer le vit et prit la fuite,
  - type: text
    content: le Jourdain reflua
  - type: note
    content: Voir Ex 14.21-29 ; Jos 3.15-16 ; 4.23.
  - type: text
    content: ','
  '4':
  - type: text
    content: et les montagnes ╵se mirent à bondir ╵tout comme des béliers,
  - type: text
    content: et les collines ╵tout comme des cabris.
  '5':
  - type: text
    content: Qu’avais-tu, mer, ╵pour fuir ainsi ?
  - type: text
    content: Et toi, Jourdain, ╵pour refluer ?
  '6':
  - type: text
    content: Et vous, montagnes, qu’aviez-vous ╵pour bondir comme des béliers,
  - type: text
    content: et vous, collines, ╵tout comme des cabris ?
  '7':
  - type: text
    content: O terre, tremble devant le Seigneur,
  - type: text
    content: 'oui, devant le Dieu de Jacob :'
  '8':
  - type: text
    content: il change le roc en étang,
  - type: text
    content: la pierre en source jaillissante
  - type: note
    content: Voir Ex 17.1-6 ; Nb 20.1-11.
  - type: text
    content: .
