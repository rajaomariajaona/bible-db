document_id: GEN.24,21
type_code: fra
verses:
  '1':
  - type: heading
    content: Le mariage d’Isaac
  - type: text
    content: 'Abraham était un vieillard très âgé. L’Eternel l’avait béni en toutes choses. '
  '10':
  - type: text
    content: 'Par la suite, il prit dix chameaux de son maître et partit en emportant toutes sortes de biens excellents appartenant à son maître. Il prit la direction de la Haute-Mésopotamie, du côté de la ville où habitait Nahor. '
  '11':
  - type: text
    content: Arrivé là-bas, il fit s’agenouiller les chameaux près d’un puits, à l’extérieur de la ville. C’était le soir, au moment où les femmes sortent puiser de l’eau.
  '12':
  - type: text
    content: 'Alors il pria : Eternel, Dieu d’Abraham mon maître, veuille témoigner ta bonté à mon maître en me faisant rencontrer aujourd’hui celle que je cherche. '
  '13':
  - type: text
    content: 'Voici, je me tiens près de la source et les filles des habitants de la ville vont venir puiser de l’eau. '
  '14':
  - type: text
    content: 'Que celle à qui je dirai : « S’il te plaît, penche ta cruche pour me donner à boire » et qui me répondra : « Bois, et je vais aussi faire boire tes chameaux », soit celle que tu destines à ton serviteur Isaac. Ainsi je saurai que tu témoignes de la bonté à mon maître.'
  '15':
  - type: text
    content: 'Il n’avait pas encore fini de parler, que Rébecca arriva, la cruche sur l’épaule. C’était la fille de Betouel, fils de Milka et de Nahor, le frère d’Abraham. '
  '16':
  - type: text
    content: 'La jeune fille était très belle ; elle était vierge, aucun homme ne s’était encore uni à elle. Elle descendit à la source, remplit sa cruche et remonta. '
  '17':
  - type: text
    content: 'Alors le serviteur courut à sa rencontre et lui dit : S’il te plaît, laisse-moi boire un peu d’eau de ta cruche.'
  '18':
  - type: text
    content: 'Elle répondit : Bois, mon seigneur !'
  - type: text
    content: 'Et elle s’empressa de descendre la cruche de son épaule pour lui donner à boire. '
  '19':
  - type: text
    content: 'Après quoi, elle lui dit : Je vais aussi puiser de l’eau pour tes chameaux, jusqu’à ce qu’ils aient assez bu.'
  '2':
  - type: text
    content: 'Il dit à son serviteur le plus ancien qui administrait tous ses biens : Place ta main sous ma cuisse'
  - type: note
    content: Geste solennel de serment signifiant que l’on s’engage aussi envers les descendants de celui qui en bénéficie.
  - type: text
    content: ' '
  '20':
  - type: text
    content: 'Elle s’empressa de vider sa cruche dans l’abreuvoir, courut encore au puits et puisa de l’eau pour tous les chameaux ! '
  '21':
  - type: text
    content: Le serviteur, étonné, l’observait sans dire un mot pour voir si, oui ou non, l’Eternel faisait réussir son voyage.
  '22':
  - type: text
    content: 'Quand les chameaux eurent fini de boire, il prit un anneau d’or d’environ six grammes ainsi que deux bracelets d’or pesant chacun plus de cent grammes qu’il passa aux poignets de la jeune fille. '
  '23':
  - type: text
    content: 'Puis il lui demanda : De qui es-tu la fille ? Dis-le-moi, s’il te plaît. Y a-t-il dans la maison de ton père de la place pour que nous puissions y passer la nuit ?'
  '24':
  - type: text
    content: 'Elle lui répondit : Je suis une fille de Betouel, le fils de Milka et de Nahor. '
  '25':
  - type: text
    content: 'Puis elle ajouta : Il y a chez nous de la paille et du fourrage en abondance et toute la place pour vous loger.'
  '26':
  - type: text
    content: 'Alors le serviteur s’inclina pour se prosterner devant l’Eternel. '
  '27':
  - type: text
    content: 'Il dit : Béni soit l’Eternel, le Dieu d’Abraham mon maître, qui n’a cessé de témoigner sa bonté et sa fidélité à mon maître. Il m’a conduit dans mon voyage jusque dans la parenté de mon maître.'
  '28':
  - type: text
    content: 'La jeune fille courut chez sa mère raconter tout ce qui s’était passé. '
  '29':
  - type: text
    content: 'Rébecca avait un frère nommé Laban. Celui-ci se précipita au dehors et courut rejoindre le serviteur près de la source. '
  '3':
  - type: text
    content: 'et jure-moi par l’Eternel, le Dieu du ciel et le Dieu de la terre, que tu ne prendras pas pour mon fils une femme parmi les filles des Cananéens, au milieu desquels j’habite, '
  '30':
  - type: text
    content: 'Car il avait vu l’anneau et les bracelets aux poignets de sa sœur et il avait entendu Rébecca raconter ce que l’homme lui avait dit ; il alla donc trouver le serviteur qui se tenait avec les chameaux près de la source. '
  '31':
  - type: text
    content: 'Il lui dit : Viens chez nous, homme béni de l’Eternel. Pourquoi restes-tu dehors ? J’ai préparé la maison et fait de la place pour tes chameaux.'
  '32':
  - type: text
    content: 'Alors le serviteur entra dans la maison et Laban fit décharger les chameaux et leur fit donner de la paille et du fourrage. Il fit apporter aussi de l’eau pour lui laver les pieds ainsi qu’aux hommes qui l’accompagnaient. '
  '33':
  - type: text
    content: 'Puis il leur servit le repas, mais le serviteur prit la parole : Je ne mangerai pas avant d’avoir dit ce que j’ai à dire.'
  - type: text
    content: – Eh bien, parle ! lui dit Laban.
  '34':
  - type: text
    content: '– Je suis le serviteur d’Abraham, dit-il. '
  '35':
  - type: text
    content: 'L’Eternel a richement béni mon maître et il a fait de lui un homme important. Il lui a donné des moutons, des chèvres et des bovins, de l’argent et de l’or, des serviteurs et des servantes, des chameaux et des ânes. '
  '36':
  - type: text
    content: 'Dans ses vieux jours, Sara, la femme de mon maître, lui a donné un fils à qui il a fait don de tout ce qu’il possède. '
  '37':
  - type: text
    content: 'Or, mon maître m’a fait prêter serment en disant : « Tu ne feras pas épouser à mon fils une Cananéenne du pays où j’habite. '
  '38':
  - type: text
    content: 'Mais tu te rendras dans la famille de mon père, et c’est là que tu prendras une femme pour mon fils. » '
  '39':
  - type: text
    content: 'J’ai répondu à mon maître : « Peut-être la femme ne voudra-t-elle pas me suivre. » '
  '4':
  - type: text
    content: mais que tu iras dans mon pays
  - type: note
    content: C’est-à-dire à Harân où son père s’était fixé.
  - type: text
    content: ', au sein de ma parenté, prendre une femme pour mon fils Isaac.'
  '40':
  - type: text
    content: 'Il m’a dit alors : « J’ai toujours vécu selon la volonté de l’Eternel ; il enverra son ange avec toi et fera réussir ton voyage pour que tu trouves une femme pour mon fils dans ma parenté, dans la famille de mon père. '
  '41':
  - type: text
    content: 'Une fois que tu te seras rendu dans ma parenté, si l’on refuse de laisser partir la jeune fille, alors tu seras dégagé du serment que je t’impose. » '
  '42':
  - type: text
    content: 'Or, aujourd’hui, quand je suis arrivé à la source, j’ai prié : Eternel, Dieu de mon maître Abraham, veuille faire réussir le voyage que j’ai entrepris. '
  '43':
  - type: text
    content: 'Je me tiens près de la source ; la jeune fille qui sortira pour puiser de l’eau, à qui je demanderai de me donner à boire un peu d’eau de sa cruche, '
  '44':
  - type: text
    content: 'et qui me répondra : « Bois, et je puiserai aussi de l’eau pour tes chameaux », qu’elle soit la femme que tu destines au fils de mon maître.'
  '45':
  - type: text
    content: 'Je n’avais pas encore fini de prier en moi-même, que Rébecca est sortie, la cruche sur l’épaule. Elle est descendue à la source et a puisé de l’eau. Je lui ai demandé : « S’il te plaît, donne-moi à boire. » '
  '46':
  - type: text
    content: 'Elle s’est empressée de descendre sa cruche de l’épaule et m’a dit : « Bois, et je donnerai aussi à boire à tes chameaux. » J’ai donc bu, et elle a aussi donné à boire aux chameaux. '
  '47':
  - type: text
    content: 'Puis je lui ai demandé : « De qui es-tu la fille ? » Elle m’a répondu : « Je suis la fille de Betouel, le fils de Nahor et de Milka. » Alors j’ai mis un anneau à son nez et j’ai passé des bracelets à ses poignets. '
  '48':
  - type: text
    content: 'Ensuite, je me suis incliné pour me prosterner devant l’Eternel, et j’ai béni l’Eternel, le Dieu de mon maître Abraham, pour m’avoir conduit sur le bon chemin chez la petite-nièce de mon maître, afin que je la ramène pour son fils. '
  '49':
  - type: text
    content: Et maintenant, si vous voulez témoigner une sincère bienveillance à mon maître, dites-le-moi. Sinon, dites-le aussi pour que je me tourne d’un autre côté.
  '5':
  - type: text
    content: 'Le serviteur lui répondit : Peut-être cette femme ne voudra-t-elle pas me suivre ici au pays. Devrai-je alors ramener ton fils dans le pays d’où tu es parti ?'
  '50':
  - type: text
    content: 'Laban et Betouel répondirent : Tout cela vient de l’Eternel. Que pourrions-nous dire de plus en bien ou en mal ? '
  '51':
  - type: text
    content: 'Voici Rébecca : elle est là, devant toi. Prends-la, emmène-la et donne-la comme épouse au fils de ton maître, comme l’Eternel en a décidé.'
  '52':
  - type: text
    content: 'Lorsque le serviteur d’Abraham entendit ces paroles, il se prosterna jusqu’à terre devant l’Eternel. '
  '53':
  - type: text
    content: 'Puis il sortit des objets d’argent et d’or et des vêtements pour les donner à Rébecca ; il fit aussi de riches présents à son frère et à sa mère. '
  '54':
  - type: text
    content: Après cela, lui et ses compagnons mangèrent et burent, puis ils passèrent la nuit dans la maison.
  - type: text
    content: 'Le lendemain matin tôt, il dit : Laissez-moi retourner chez mon maître.'
  '55':
  - type: text
    content: 'Le frère et la mère de Rébecca répondirent : Que la jeune fille reste encore quelques jours avec nous ; dans une dizaine de jours, tu partiras avec elle.'
  '56':
  - type: text
    content: 'Mais il plaida : Ne me retardez pas, puisque l’Eternel a fait réussir mon voyage. Laissez-moi partir tout de suite pour retourner chez mon maître.'
  '57':
  - type: text
    content: '– Appelons la jeune fille, dirent-ils, et demandons-lui son avis. '
  '58':
  - type: text
    content: 'Ils appelèrent donc Rébecca et lui demandèrent : Veux-tu partir avec cet homme ?'
  - type: text
    content: 'Elle répondit : Oui.'
  '59':
  - type: text
    content: 'Alors ils firent leurs adieux à Rébecca leur sœur, à sa nourrice et au serviteur d’Abraham ainsi qu’à ses gens. '
  '6':
  - type: text
    content: '– Garde-toi bien de ramener mon fils là-bas, lui dit Abraham. '
  '60':
  - type: text
    content: 'Ils bénirent Rébecca et lui dirent :'
  - type: text
    content: Toi, notre sœur, ╵puisses-tu devenir la mère ╵de milliers de milliers
  - type: text
    content: et que ta descendance ╵se rende maître ╵de tous ses ennemis !
  '61':
  - type: text
    content: Alors Rébecca et ses servantes se levèrent et montèrent sur les chameaux pour suivre le serviteur. C’est ainsi que le serviteur emmena Rébecca avec lui.
  '62':
  - type: text
    content: 'Isaac s’était établi dans la région du Néguev et il revenait du puits de Lachaï-Roï. '
  '63':
  - type: text
    content: Le soir, il était sorti seul dans les champs pour se promener
  - type: note
    content: 'Certains traduisent : méditer.'
  - type: text
    content: . Levant les yeux, il aperçut au loin des chameaux qui venaient vers lui.
  '64':
  - type: text
    content: 'Rébecca aussi leva les yeux, elle vit Isaac et sauta à bas du chameau. '
  '65':
  - type: text
    content: 'Elle demanda au serviteur : Qui est cet homme qui vient à notre rencontre dans la campagne ? Le serviteur répondit : C’est mon maître.'
  - type: text
    content: 'Alors elle prit son voile et se couvrit le visage. '
  '66':
  - type: text
    content: 'Le serviteur raconta à Isaac tout ce qu’il avait fait. '
  '67':
  - type: text
    content: Là-dessus, Isaac conduisit Rébecca dans la tente de Sara
  - type: note
    content: Décédée trois ans plus tôt (17.17 ; 23.1 ; 25.20).
  - type: text
    content: ', sa mère ; il la prit pour femme et il l’aima. C’est ainsi qu’il fut consolé de la mort de sa mère.'
  '7':
  - type: text
    content: 'L’Eternel, le Dieu du ciel qui m’a fait quitter ma famille et le pays de ma naissance, qui m’a parlé et m’a promis par serment de donner ce pays-ci à ma descendance, te fera précéder par son ange pour que tu puisses emmener de là-bas une femme pour mon fils. '
  '8':
  - type: text
    content: Si cette femme ne consent pas à te suivre, tu seras dégagé de ton serment ; mais quoi qu’il arrive, tu ne ramèneras pas mon fils là-bas.
  '9':
  - type: text
    content: 'Alors le serviteur mit sa main sous la cuisse d’Abraham son maître et lui jura d’exécuter ses ordres. '
