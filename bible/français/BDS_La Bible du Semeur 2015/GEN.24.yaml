document_id: GEN.24
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Le mariage d’Isaac
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Abraham était un vieillard très âgé. L’Eternel l’avait béni en toutes choses. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Il dit à son serviteur le plus ancien qui administrait tous ses biens : Place ta main sous ma cuisse'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '24.2 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Geste solennel de serment signifiant que l’on s’engage aussi envers les descendants de celui qui en bénéficie.
    marker-yv: yv-n
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'et jure-moi par l’Eternel, le Dieu du ciel et le Dieu de la terre, que tu ne prendras pas pour mon fils une femme parmi les filles des Cananéens, au milieu desquels j’habite, '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: mais que tu iras dans mon pays
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '24.4 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: C’est-à-dire à Harân où son père s’était fixé.
    marker-yv: yv-n
  - type: text
    text: ', au sein de ma parenté, prendre une femme pour mon fils Isaac.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Le serviteur lui répondit : Peut-être cette femme ne voudra-t-elle pas me suivre ici au pays. Devrai-je alors ramener ton fils dans le pays d’où tu es parti ?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: '– Garde-toi bien de ramener mon fils là-bas, lui dit Abraham. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'L’Eternel, le Dieu du ciel qui m’a fait quitter ma famille et le pays de ma naissance, qui m’a parlé et m’a promis par serment de donner ce pays-ci à ma descendance, te fera précéder par son ange pour que tu puisses emmener de là-bas une femme pour mon fils. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Si cette femme ne consent pas à te suivre, tu seras dégagé de ton serment ; mais quoi qu’il arrive, tu ne ramèneras pas mon fils là-bas.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Alors le serviteur mit sa main sous la cuisse d’Abraham son maître et lui jura d’exécuter ses ordres. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Par la suite, il prit dix chameaux de son maître et partit en emportant toutes sortes de biens excellents appartenant à son maître. Il prit la direction de la Haute-Mésopotamie, du côté de la ville où habitait Nahor. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Arrivé là-bas, il fit s’agenouiller les chameaux près d’un puits, à l’extérieur de la ville. C’était le soir, au moment où les femmes sortent puiser de l’eau.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Alors il pria : Eternel, Dieu d’Abraham mon maître, veuille témoigner ta bonté à mon maître en me faisant rencontrer aujourd’hui celle que je cherche. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Voici, je me tiens près de la source et les filles des habitants de la ville vont venir puiser de l’eau. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Que celle à qui je dirai : « S’il te plaît, penche ta cruche pour me donner à boire » et qui me répondra : « Bois, et je vais aussi faire boire tes chameaux », soit celle que tu destines à ton serviteur Isaac. Ainsi je saurai que tu témoignes de la bonté à mon maître.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Il n’avait pas encore fini de parler, que Rébecca arriva, la cruche sur l’épaule. C’était la fille de Betouel, fils de Milka et de Nahor, le frère d’Abraham. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'La jeune fille était très belle ; elle était vierge, aucun homme ne s’était encore uni à elle. Elle descendit à la source, remplit sa cruche et remonta. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Alors le serviteur courut à sa rencontre et lui dit : S’il te plaît, laisse-moi boire un peu d’eau de ta cruche.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Elle répondit : Bois, mon seigneur !'
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Et elle s’empressa de descendre la cruche de son épaule pour lui donner à boire. '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Après quoi, elle lui dit : Je vais aussi puiser de l’eau pour tes chameaux, jusqu’à ce qu’ils aient assez bu.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Elle s’empressa de vider sa cruche dans l’abreuvoir, courut encore au puits et puisa de l’eau pour tous les chameaux ! '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Le serviteur, étonné, l’observait sans dire un mot pour voir si, oui ou non, l’Eternel faisait réussir son voyage.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Quand les chameaux eurent fini de boire, il prit un anneau d’or d’environ six grammes ainsi que deux bracelets d’or pesant chacun plus de cent grammes qu’il passa aux poignets de la jeune fille. '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Puis il lui demanda : De qui es-tu la fille ? Dis-le-moi, s’il te plaît. Y a-t-il dans la maison de ton père de la place pour que nous puissions y passer la nuit ?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Elle lui répondit : Je suis une fille de Betouel, le fils de Milka et de Nahor. '
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Puis elle ajouta : Il y a chez nous de la paille et du fourrage en abondance et toute la place pour vous loger.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Alors le serviteur s’inclina pour se prosterner devant l’Eternel. '
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'Il dit : Béni soit l’Eternel, le Dieu d’Abraham mon maître, qui n’a cessé de témoigner sa bonté et sa fidélité à mon maître. Il m’a conduit dans mon voyage jusque dans la parenté de mon maître.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'La jeune fille courut chez sa mère raconter tout ce qui s’était passé. '
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'Rébecca avait un frère nommé Laban. Celui-ci se précipita au dehors et courut rejoindre le serviteur près de la source. '
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'Car il avait vu l’anneau et les bracelets aux poignets de sa sœur et il avait entendu Rébecca raconter ce que l’homme lui avait dit ; il alla donc trouver le serviteur qui se tenait avec les chameaux près de la source. '
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'Il lui dit : Viens chez nous, homme béni de l’Eternel. Pourquoi restes-tu dehors ? J’ai préparé la maison et fait de la place pour tes chameaux.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '32'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'Alors le serviteur entra dans la maison et Laban fit décharger les chameaux et leur fit donner de la paille et du fourrage. Il fit apporter aussi de l’eau pour lui laver les pieds ainsi qu’aux hommes qui l’accompagnaient. '
  - type: usfm
    marker: v
    metadata:
      v: '33'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: 'Puis il leur servit le repas, mais le serviteur prit la parole : Je ne mangerai pas avant d’avoir dit ce que j’ai à dire.'
- type: usfm
  marker: p
  children:
  - type: text
    text: – Eh bien, parle ! lui dit Laban.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '34'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: '– Je suis le serviteur d’Abraham, dit-il. '
  - type: usfm
    marker: v
    metadata:
      v: '35'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: 'L’Eternel a richement béni mon maître et il a fait de lui un homme important. Il lui a donné des moutons, des chèvres et des bovins, de l’argent et de l’or, des serviteurs et des servantes, des chameaux et des ânes. '
  - type: usfm
    marker: v
    metadata:
      v: '36'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: 'Dans ses vieux jours, Sara, la femme de mon maître, lui a donné un fils à qui il a fait don de tout ce qu’il possède. '
  - type: usfm
    marker: v
    metadata:
      v: '37'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: 'Or, mon maître m’a fait prêter serment en disant : « Tu ne feras pas épouser à mon fils une Cananéenne du pays où j’habite. '
  - type: usfm
    marker: v
    metadata:
      v: '38'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: text
    text: 'Mais tu te rendras dans la famille de mon père, et c’est là que tu prendras une femme pour mon fils. » '
  - type: usfm
    marker: v
    metadata:
      v: '39'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '39'
  - type: text
    text: 'J’ai répondu à mon maître : « Peut-être la femme ne voudra-t-elle pas me suivre. » '
  - type: usfm
    marker: v
    metadata:
      v: '40'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '40'
  - type: text
    text: 'Il m’a dit alors : « J’ai toujours vécu selon la volonté de l’Eternel ; il enverra son ange avec toi et fera réussir ton voyage pour que tu trouves une femme pour mon fils dans ma parenté, dans la famille de mon père. '
  - type: usfm
    marker: v
    metadata:
      v: '41'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '41'
  - type: text
    text: 'Une fois que tu te seras rendu dans ma parenté, si l’on refuse de laisser partir la jeune fille, alors tu seras dégagé du serment que je t’impose. » '
  - type: usfm
    marker: v
    metadata:
      v: '42'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '42'
  - type: text
    text: 'Or, aujourd’hui, quand je suis arrivé à la source, j’ai prié : Eternel, Dieu de mon maître Abraham, veuille faire réussir le voyage que j’ai entrepris. '
  - type: usfm
    marker: v
    metadata:
      v: '43'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '43'
  - type: text
    text: 'Je me tiens près de la source ; la jeune fille qui sortira pour puiser de l’eau, à qui je demanderai de me donner à boire un peu d’eau de sa cruche, '
  - type: usfm
    marker: v
    metadata:
      v: '44'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '44'
  - type: text
    text: 'et qui me répondra : « Bois, et je puiserai aussi de l’eau pour tes chameaux », qu’elle soit la femme que tu destines au fils de mon maître.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '45'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '45'
  - type: text
    text: 'Je n’avais pas encore fini de prier en moi-même, que Rébecca est sortie, la cruche sur l’épaule. Elle est descendue à la source et a puisé de l’eau. Je lui ai demandé : « S’il te plaît, donne-moi à boire. » '
  - type: usfm
    marker: v
    metadata:
      v: '46'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '46'
  - type: text
    text: 'Elle s’est empressée de descendre sa cruche de l’épaule et m’a dit : « Bois, et je donnerai aussi à boire à tes chameaux. » J’ai donc bu, et elle a aussi donné à boire aux chameaux. '
  - type: usfm
    marker: v
    metadata:
      v: '47'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '47'
  - type: text
    text: 'Puis je lui ai demandé : « De qui es-tu la fille ? » Elle m’a répondu : « Je suis la fille de Betouel, le fils de Nahor et de Milka. » Alors j’ai mis un anneau à son nez et j’ai passé des bracelets à ses poignets. '
  - type: usfm
    marker: v
    metadata:
      v: '48'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '48'
  - type: text
    text: 'Ensuite, je me suis incliné pour me prosterner devant l’Eternel, et j’ai béni l’Eternel, le Dieu de mon maître Abraham, pour m’avoir conduit sur le bon chemin chez la petite-nièce de mon maître, afin que je la ramène pour son fils. '
  - type: usfm
    marker: v
    metadata:
      v: '49'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '49'
  - type: text
    text: Et maintenant, si vous voulez témoigner une sincère bienveillance à mon maître, dites-le-moi. Sinon, dites-le aussi pour que je me tourne d’un autre côté.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '50'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '50'
  - type: text
    text: 'Laban et Betouel répondirent : Tout cela vient de l’Eternel. Que pourrions-nous dire de plus en bien ou en mal ? '
  - type: usfm
    marker: v
    metadata:
      v: '51'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '51'
  - type: text
    text: 'Voici Rébecca : elle est là, devant toi. Prends-la, emmène-la et donne-la comme épouse au fils de ton maître, comme l’Eternel en a décidé.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '52'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '52'
  - type: text
    text: 'Lorsque le serviteur d’Abraham entendit ces paroles, il se prosterna jusqu’à terre devant l’Eternel. '
  - type: usfm
    marker: v
    metadata:
      v: '53'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '53'
  - type: text
    text: 'Puis il sortit des objets d’argent et d’or et des vêtements pour les donner à Rébecca ; il fit aussi de riches présents à son frère et à sa mère. '
  - type: usfm
    marker: v
    metadata:
      v: '54'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '54'
  - type: text
    text: Après cela, lui et ses compagnons mangèrent et burent, puis ils passèrent la nuit dans la maison.
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Le lendemain matin tôt, il dit : Laissez-moi retourner chez mon maître.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '55'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '55'
  - type: text
    text: 'Le frère et la mère de Rébecca répondirent : Que la jeune fille reste encore quelques jours avec nous ; dans une dizaine de jours, tu partiras avec elle.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '56'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '56'
  - type: text
    text: 'Mais il plaida : Ne me retardez pas, puisque l’Eternel a fait réussir mon voyage. Laissez-moi partir tout de suite pour retourner chez mon maître.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '57'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '57'
  - type: text
    text: '– Appelons la jeune fille, dirent-ils, et demandons-lui son avis. '
  - type: usfm
    marker: v
    metadata:
      v: '58'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '58'
  - type: text
    text: 'Ils appelèrent donc Rébecca et lui demandèrent : Veux-tu partir avec cet homme ?'
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Elle répondit : Oui.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '59'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '59'
  - type: text
    text: 'Alors ils firent leurs adieux à Rébecca leur sœur, à sa nourrice et au serviteur d’Abraham ainsi qu’à ses gens. '
  - type: usfm
    marker: v
    metadata:
      v: '60'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '60'
  - type: text
    text: 'Ils bénirent Rébecca et lui dirent :'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Toi, notre sœur, ╵puisses-tu devenir la mère ╵de milliers de milliers
- type: usfm
  marker: q1
  children:
  - type: text
    text: et que ta descendance ╵se rende maître ╵de tous ses ennemis !
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '61'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '61'
  - type: text
    text: Alors Rébecca et ses servantes se levèrent et montèrent sur les chameaux pour suivre le serviteur. C’est ainsi que le serviteur emmena Rébecca avec lui.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '62'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '62'
  - type: text
    text: 'Isaac s’était établi dans la région du Néguev et il revenait du puits de Lachaï-Roï. '
  - type: usfm
    marker: v
    metadata:
      v: '63'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '63'
  - type: text
    text: Le soir, il était sorti seul dans les champs pour se promener
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '24.63 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Certains traduisent : '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: méditer.
    marker-yv: yv-n
  - type: text
    text: . Levant les yeux, il aperçut au loin des chameaux qui venaient vers lui.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '64'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '64'
  - type: text
    text: 'Rébecca aussi leva les yeux, elle vit Isaac et sauta à bas du chameau. '
  - type: usfm
    marker: v
    metadata:
      v: '65'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '65'
  - type: text
    text: 'Elle demanda au serviteur : Qui est cet homme qui vient à notre rencontre dans la campagne ? Le serviteur répondit : C’est mon maître.'
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Alors elle prit son voile et se couvrit le visage. '
  - type: usfm
    marker: v
    metadata:
      v: '66'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '66'
  - type: text
    text: 'Le serviteur raconta à Isaac tout ce qu’il avait fait. '
  - type: usfm
    marker: v
    metadata:
      v: '67'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '67'
  - type: text
    text: Là-dessus, Isaac conduisit Rébecca dans la tente de Sara
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '24.67 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Décédée trois ans plus tôt (17.17 ; 23.1 ; 25.20).
    marker-yv: yv-n
  - type: text
    text: ', sa mère ; il la prit pour femme et il l’aima. C’est ainsi qu’il fut consolé de la mort de sa mère.'
