    - type: text
      text: Je triompherai
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '108 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Pour les v. 2-6, voir '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: 57.8-12
        - type: text
          text: '  ; pour les v. 7-14, voir '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: 60.7-14
        - type: text
          text: .
      marker-yv: yv-n
    marker-yv: yv-h
  - type: usfm
    marker: d
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: Psaume de David. Cantique.
  '10':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: et, pour me laver, ╵Moab me sert de bassine,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sur Edom, je jette ╵ma sandale.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et contre la Philistie, ╵je pousse des cris ╵de triomphe. »
  '11':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: Qui me mènera ╵à la ville forte ?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Qui me conduira ╵à Edom ?
  '12':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: Ne nous as-tu pas ╵rejetés, ô Dieu,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: toi qui ne sors plus, ô Dieu, ╵avec nos armées ?
  '13':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: Viens nous secourir ╵contre l’ennemi
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '108.13 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Autre traduction : '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: dans la détresse.
      marker-yv: yv-n
    - type: text
      text: '  !'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Car il est bien illusoire, ╵le secours venant des hommes.
  '14':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: Mais avec Dieu nous ferons ╵des exploits,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: c’est lui qui écrasera ╵tous nos ennemis.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: Mon cœur est tranquille
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '108.2 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Autre traduction : '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: est assuré.
      marker-yv: yv-n
    - type: text
      text: ', ╵ô mon Dieu,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et ma gloire, ╵c’est de te chanter, ╵de te célébrer ╵en musique
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '108.2 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Autres traductions : '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'Je te chanterai et te célébrerai en musique, toi qui est ma gloire ; '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'ou : '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: Je te chanterai… en musique de tout mon cœur.
      marker-yv: yv-n
    - type: text
      text: '  !'
  '3':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: Vite, éveillez-vous, ╵luth et lyre !
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Je veux éveiller l’aurore.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: Je veux te louer, ╵Eternel, ╵au milieu des peuples,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et te célébrer ╵en musique ╵parmi les nations.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: Ton amour s’élève ╵plus haut que les cieux,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ta fidélité ╵jusqu’aux nues.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: O Dieu, manifeste ╵ta grandeur ╵au-dessus des cieux
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et ta gloire ╵sur toute la terre !
  '7':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: Afin que tes bien-aimés ╵voient la délivrance,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: interviens et sauve-nous ! ╵Réponds-moi !
  '8':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: Dieu l’a déclaré ╵dans son sanctuaire
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '108.8 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Autre traduction : '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: dans sa sainteté.
      marker-yv: yv-n
    - type: text
      text: '  : ╵« Je triompherai !'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Je vais partager Sichem. ╵Je vais mesurer ╵au cordeau ╵le val de Soukkoth.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: A moi Galaad ! ╵A moi Manassé !
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ephraïm ╵est un casque pour ma tête.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mon sceptre royal, ╵c’est Juda,
