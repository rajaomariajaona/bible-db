document_id: PSA.108,21
type_code: fra
verses:
  '1':
  - type: heading
    content: Je triompheraiPour les v. 2-6, voir 57.8-12  ; pour les v. 7-14, voir 60.7-14.
  - type: text
    content: Psaume de David. Cantique.
  '10':
  - type: text
    content: et, pour me laver, ╵Moab me sert de bassine,
  - type: text
    content: sur Edom, je jette ╵ma sandale.
  - type: text
    content: Et contre la Philistie, ╵je pousse des cris ╵de triomphe. »
  '11':
  - type: text
    content: Qui me mènera ╵à la ville forte ?
  - type: text
    content: Qui me conduira ╵à Edom ?
  '12':
  - type: text
    content: Ne nous as-tu pas ╵rejetés, ô Dieu,
  - type: text
    content: toi qui ne sors plus, ô Dieu, ╵avec nos armées ?
  '13':
  - type: text
    content: Viens nous secourir ╵contre l’ennemi
  - type: note
    content: 'Autre traduction : dans la détresse.'
  - type: text
    content: '  !'
  - type: text
    content: Car il est bien illusoire, ╵le secours venant des hommes.
  '14':
  - type: text
    content: Mais avec Dieu nous ferons ╵des exploits,
  - type: text
    content: c’est lui qui écrasera ╵tous nos ennemis.
  '2':
  - type: text
    content: Mon cœur est tranquille
  - type: note
    content: 'Autre traduction : est assuré.'
  - type: text
    content: ', ╵ô mon Dieu,'
  - type: text
    content: et ma gloire, ╵c’est de te chanter, ╵de te célébrer ╵en musique
  - type: note
    content: 'Autres traductions : Je te chanterai et te célébrerai en musique, toi qui est ma gloire ; ou : Je te chanterai… en musique de tout mon cœur.'
  - type: text
    content: '  !'
  '3':
  - type: text
    content: Vite, éveillez-vous, ╵luth et lyre !
  - type: text
    content: Je veux éveiller l’aurore.
  '4':
  - type: text
    content: Je veux te louer, ╵Eternel, ╵au milieu des peuples,
  - type: text
    content: et te célébrer ╵en musique ╵parmi les nations.
  '5':
  - type: text
    content: Ton amour s’élève ╵plus haut que les cieux,
  - type: text
    content: ta fidélité ╵jusqu’aux nues.
  '6':
  - type: text
    content: O Dieu, manifeste ╵ta grandeur ╵au-dessus des cieux
  - type: text
    content: et ta gloire ╵sur toute la terre !
  '7':
  - type: text
    content: Afin que tes bien-aimés ╵voient la délivrance,
  - type: text
    content: interviens et sauve-nous ! ╵Réponds-moi !
  '8':
  - type: text
    content: Dieu l’a déclaré ╵dans son sanctuaire
  - type: note
    content: 'Autre traduction : dans sa sainteté.'
  - type: text
    content: '  : ╵« Je triompherai !'
  - type: text
    content: Je vais partager Sichem. ╵Je vais mesurer ╵au cordeau ╵le val de Soukkoth.
  '9':
  - type: text
    content: A moi Galaad ! ╵A moi Manassé !
  - type: text
    content: Ephraïm ╵est un casque pour ma tête.
  - type: text
    content: Mon sceptre royal, ╵c’est Juda,
