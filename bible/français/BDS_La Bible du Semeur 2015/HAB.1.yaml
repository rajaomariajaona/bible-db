document_id: HAB.1,21
type_code: fra
verses:
  '1':
  - type: text
    content: Proclamation dont Habaquq, le prophète, a reçu la révélation.
  - type: heading
    content: Plaintes et questions
  - type: heading
    content: Le prophète discute avec Dieu
  '10':
  - type: text
    content: Partout, ce peuple traite ╵les rois avec mépris,
  - type: text
    content: et il se rit des princes,
  - type: text
    content: il se rit de toutes leurs forteresses ;
  - type: text
    content: il élève contre elles ╵des terrasses de siège
  - type: text
    content: et s’en empare.
  '11':
  - type: text
    content: Puis il change d’avis ╵et il passe plus loin
  - type: note
    content: 'Verset difficile. Autres traductions : il est passé comme le vent et s’en est allé ou le vent est passé et s’en est allé.'
  - type: text
    content: .
  - type: text
    content: Il se charge de crimes,
  - type: text
    content: lui qui voue sa force à son dieu
  - type: note
    content: 'Il se charge de crimes, lui… à son dieu. L’ancienne version grecque a : alors j’exposerai ma remontrance à mon Dieu. La fin du verset a été traduite diversement : lui qui attribue sa force à son Dieu ou lui dont la force est le dieu.'
  - type: text
    content: .
  - type: heading
    content: Pourquoi, ô Dieu ?
  '12':
  - type: text
    content: – N’es-tu pas depuis l’origine, ╵ô Eternel ?
  - type: text
    content: Tu es mon Dieu, mon Saint,
  - type: text
    content: tu ne meurs pas
  - type: note
    content: 'Selon une tradition de copistes juifs. Ce texte, jugé offensant pour Dieu, semble avoir été modifié en : nous ne mourrons pas, que l’on a actuellement dans le texte hébreu traditionnel.'
  - type: text
    content: .
  - type: text
    content: O Eternel, ╵toi le rocher, ╵c’est pour exécuter ╵le jugement ╵que tu as suscité ce peuple,
  - type: text
    content: et tu l’as rendu fort
  - type: note
    content: 'Autre traduction : formé.'
  - type: text
    content: ' ╵pour qu’il soit l’instrument ╵du châtiment.'
  '13':
  - type: text
    content: Tes yeux sont bien trop purs ╵pour supporter la vue du mal,
  - type: text
    content: tu ne peux accepter ╵de voir des méfaits se commettre.
  - type: text
    content: Pourquoi supportes-tu ╵la vue des traîtres ?
  - type: text
    content: Pourquoi gardes-tu le silence ╵quand l’impie engloutit ╵un plus juste que lui ?
  '14':
  - type: text
    content: Tu traites les humains ╵tout comme des poissons
  - type: text
    content: ou comme des bestioles ╵qui sont sans maître.
  '15':
  - type: text
    content: Car le Chaldéen les prend tous ╵à l’hameçon,
  - type: text
    content: il les drague dans son filet
  - type: text
    content: et les entasse dans sa nasse.
  - type: text
    content: Alors il se réjouit ╵et il exulte.
  '16':
  - type: text
    content: Alors il offre ╵à son filet des sacrifices,
  - type: text
    content: il brûle de l’encens ╵en l’honneur de sa nasse,
  - type: text
    content: car il obtient, par eux, ╵une pêche abondante,
  - type: text
    content: des repas plantureux.
  '17':
  - type: text
    content: Continuera-t-il donc toujours ╵à dégainer son glaive
  - type: note
    content: 'D’après le commentaire d’Habaquq retrouvé à Qumrân. Le texte hébreu traditionnel a : à vider son filet.'
  - type: text
    content: pour égorger les autres peuples ╵sans aucune pitié ?
  '2':
  - type: text
    content: Jusques à quand, ô Eternel,
  - type: text
    content: appellerai-je à l’aide
  - type: text
    content: sans que tu ne m’entendes ?
  - type: text
    content: Jusques à quand devrai-je ╵crier vers toi ╵au sujet de la violence
  - type: text
    content: sans que tu sauves ?
  '3':
  - type: text
    content: Pourquoi me fais-tu voir ╵de telles injustices ?
  - type: text
    content: Comment peux-tu te contenter ╵d’observer les méfaits ╵qui se commettent ?
  - type: text
    content: Je ne vois devant moi ╵que ravage et violence,
  - type: text
    content: il y a des querelles,
  - type: text
    content: et des conflits surgissent.
  '4':
  - type: text
    content: A cause de cela, ╵on ne respecte plus la loi,
  - type: text
    content: et le droit ne triomphe pas.
  - type: text
    content: Car les méchants ╵empêchent les justes d’agir
  - type: note
    content: 'Autre traduction : l’emportent sur les justes (dans les tribunaux).'
  - type: text
    content: ','
  - type: text
    content: les jugements qui sont rendus ╵sont corrompus.
  - type: heading
    content: La réponse inattendue de Dieu
  '5':
  - type: text
    content: – Regardez, traîtres
  - type: note
    content: 'traîtres: d’après un texte hébreu retrouvé à Qumrân et l’ancienne version grecque (voir Ac 13.41). Le texte hébreu traditionnel a : les nations.'
  - type: text
    content: ', ╵et observez !'
  - type: text
    content: Vous serez stupéfaits, ╵vous serez ébahis,
  - type: text
    content: car je vais accomplir ╵en votre temps une œuvre ;
  - type: text
    content: vous ne le croiriez pas ╵si on vous en parlait.
  '6':
  - type: text
    content: Je vais faire venir ╵les Chaldéens
  - type: note
    content: Le nom Chaldéens désigne ici les Babyloniens, qui ont reconquis leur indépendance de l’Assyrie vers 630 av. J.-C. et fondé un empire néo-babylonien en 626, pour dominer tout le Proche-Orient de 605 à 539, en particulier durant le règne de Nabuchodonosor (605 à 562 av. J.-C.).
  - type: text
    content: ','
  - type: text
    content: peuple féroce ╵et déchaîné,
  - type: text
    content: qui parcourt les étendues de la terre
  - type: text
    content: pour prendre possession ╵des demeures d’autrui.
  '7':
  - type: text
    content: Il est terrible et redoutable,
  - type: text
    content: il impose lui-même ╵son droit et son pouvoir.
  '8':
  - type: text
    content: Ses chevaux sont agiles, ╵plus que des léopards,
  - type: text
    content: et ils ont du mordant, ╵plus que les loups du soir.
  - type: text
    content: Ses coursiers se déploient,
  - type: text
    content: ils arrivent de loin,
  - type: text
    content: ils volent comme l’aigle
  - type: text
    content: lorsqu’il fond sur sa proie.
  '9':
  - type: text
    content: Oui, les voilà qui viennent ╵tous adonnés à la violence ;
  - type: text
    content: le visage tendu, ╵ils foncent en avant.
  - type: text
    content: Voilà les prisonniers ╵rassemblés, innombrables ╵comme les grains de sable.
