document_id: HAB.1
type_code: fra
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Proclamation dont Habaquq, le prophète, a reçu la révélation.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Plaintes et questions
  marker-yv: yv-h
- type: usfm
  marker: s2
  children:
  - type: text
    text: Le prophète discute avec Dieu
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Jusques à quand, ô Eternel,
- type: usfm
  marker: q1
  children:
  - type: text
    text: appellerai-je à l’aide
- type: usfm
  marker: q1
  children:
  - type: text
    text: sans que tu ne m’entendes ?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Jusques à quand devrai-je ╵crier vers toi ╵au sujet de la violence
- type: usfm
  marker: q1
  children:
  - type: text
    text: sans que tu sauves ?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Pourquoi me fais-tu voir ╵de telles injustices ?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Comment peux-tu te contenter ╵d’observer les méfaits ╵qui se commettent ?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Je ne vois devant moi ╵que ravage et violence,
- type: usfm
  marker: q1
  children:
  - type: text
    text: il y a des querelles,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et des conflits surgissent.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: A cause de cela, ╵on ne respecte plus la loi,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et le droit ne triomphe pas.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Car les méchants ╵empêchent les justes d’agir
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1.4 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Autre traduction : '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'l’emportent sur les justes '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: (dans les tribunaux).
    marker-yv: yv-n
  - type: text
    text: ','
- type: usfm
  marker: q1
  children:
  - type: text
    text: les jugements qui sont rendus ╵sont corrompus.
- type: usfm
  marker: s2
  children:
  - type: text
    text: La réponse inattendue de Dieu
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: – Regardez, traîtres
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1.5 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: traîtres
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: ': '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'd’après un texte hébreu retrouvé à Qumrân et l’ancienne version grecque (voir '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ac 13.41
        metadata:
          usfm: ACT.13.41
      - type: text
        text: '). Le texte hébreu traditionnel a : '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: les nations.
    marker-yv: yv-n
  - type: text
    text: ', ╵et observez !'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Vous serez stupéfaits, ╵vous serez ébahis,
- type: usfm
  marker: q1
  children:
  - type: text
    text: car je vais accomplir ╵en votre temps une œuvre ;
- type: usfm
  marker: q1
  children:
  - type: text
    text: vous ne le croiriez pas ╵si on vous en parlait.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Je vais faire venir ╵les Chaldéens
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1.6 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Le nom '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'Chaldéens '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: désigne ici les Babyloniens, qui ont reconquis leur indépendance de l’Assyrie vers 630 av. J.-C. et fondé un empire néo-babylonien en 626, pour dominer tout le Proche-Orient de 605 à 539, en particulier durant le règne de Nabuchodonosor (605 à 562 av. J.-C.).
    marker-yv: yv-n
  - type: text
    text: ','
- type: usfm
  marker: q1
  children:
  - type: text
    text: peuple féroce ╵et déchaîné,
- type: usfm
  marker: q1
  children:
  - type: text
    text: qui parcourt les étendues de la terre
- type: usfm
  marker: q1
  children:
  - type: text
    text: pour prendre possession ╵des demeures d’autrui.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Il est terrible et redoutable,
- type: usfm
  marker: q1
  children:
  - type: text
    text: il impose lui-même ╵son droit et son pouvoir.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Ses chevaux sont agiles, ╵plus que des léopards,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et ils ont du mordant, ╵plus que les loups du soir.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ses coursiers se déploient,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ils arrivent de loin,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ils volent comme l’aigle
- type: usfm
  marker: q1
  children:
  - type: text
    text: lorsqu’il fond sur sa proie.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Oui, les voilà qui viennent ╵tous adonnés à la violence ;
- type: usfm
  marker: q1
  children:
  - type: text
    text: le visage tendu, ╵ils foncent en avant.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Voilà les prisonniers ╵rassemblés, innombrables ╵comme les grains de sable.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Partout, ce peuple traite ╵les rois avec mépris,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et il se rit des princes,
- type: usfm
  marker: q1
  children:
  - type: text
    text: il se rit de toutes leurs forteresses ;
- type: usfm
  marker: q1
  children:
  - type: text
    text: il élève contre elles ╵des terrasses de siège
- type: usfm
  marker: q1
  children:
  - type: text
    text: et s’en empare.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Puis il change d’avis ╵et il passe plus loin
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1.11 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Verset difficile. Autres traductions : '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'il est passé comme le vent et s’en est allé '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'ou '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: le vent est passé et s’en est allé.
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: q1
  children:
  - type: text
    text: Il se charge de crimes,
- type: usfm
  marker: q1
  children:
  - type: text
    text: lui qui voue sa force à son dieu
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1.11 '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'Il se charge de crimes, lui… à son dieu. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'L’ancienne version grecque a : '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'alors j’exposerai ma remontrance à mon Dieu. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'La fin du verset a été traduite diversement : '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'lui qui attribue sa force à son Dieu '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'ou '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: lui dont la force est le dieu.
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: s2
  children:
  - type: text
    text: Pourquoi, ô Dieu ?
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: – N’es-tu pas depuis l’origine, ╵ô Eternel ?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Tu es mon Dieu, mon Saint,
- type: usfm
  marker: q1
  children:
  - type: text
    text: tu ne meurs pas
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1.12 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Selon une tradition de copistes juifs. Ce texte, jugé offensant pour Dieu, semble avoir été modifié en : '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'nous ne mourrons pas, '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: que l’on a actuellement dans le texte hébreu traditionnel.
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: q1
  children:
  - type: text
    text: O Eternel, ╵toi le rocher, ╵c’est pour exécuter ╵le jugement ╵que tu as suscité ce peuple,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et tu l’as rendu fort
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1.12 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Autre traduction : '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: formé.
    marker-yv: yv-n
  - type: text
    text: ' ╵pour qu’il soit l’instrument ╵du châtiment.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Tes yeux sont bien trop purs ╵pour supporter la vue du mal,
- type: usfm
  marker: q1
  children:
  - type: text
    text: tu ne peux accepter ╵de voir des méfaits se commettre.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Pourquoi supportes-tu ╵la vue des traîtres ?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Pourquoi gardes-tu le silence ╵quand l’impie engloutit ╵un plus juste que lui ?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Tu traites les humains ╵tout comme des poissons
- type: usfm
  marker: q1
  children:
  - type: text
    text: ou comme des bestioles ╵qui sont sans maître.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Car le Chaldéen les prend tous ╵à l’hameçon,
- type: usfm
  marker: q1
  children:
  - type: text
    text: il les drague dans son filet
- type: usfm
  marker: q1
  children:
  - type: text
    text: et les entasse dans sa nasse.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Alors il se réjouit ╵et il exulte.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Alors il offre ╵à son filet des sacrifices,
- type: usfm
  marker: q1
  children:
  - type: text
    text: il brûle de l’encens ╵en l’honneur de sa nasse,
- type: usfm
  marker: q1
  children:
  - type: text
    text: car il obtient, par eux, ╵une pêche abondante,
- type: usfm
  marker: q1
  children:
  - type: text
    text: des repas plantureux.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Continuera-t-il donc toujours ╵à dégainer son glaive
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1.17 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'D’après le commentaire d’Habaquq retrouvé à Qumrân. Le texte hébreu traditionnel a : '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: à vider son filet.
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: text
    text: pour égorger les autres peuples ╵sans aucune pitié ?
