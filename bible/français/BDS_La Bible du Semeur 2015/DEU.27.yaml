document_id: DEU.27,21
type_code: fra
verses:
  '1':
  - type: heading
    content: Les sanctions de l’alliance
  - type: heading
    content: Le renouvellement de l’alliance
  - type: heading
    content: La mise par écrit de la Loi
  - type: text
    content: 'Moïse, accompagné des responsables d’Israël, donna au peuple les ordres suivants : Vous observerez tous les commandements que je vous donne aujourd’hui. '
  '10':
  - type: text
    content: Obéissez donc à la voix de l’Eternel votre Dieu et observez avec soin ses commandements et ses lois que je vous transmets aujourd’hui.
  - type: heading
    content: Les malédictions
  '11':
  - type: text
    content: 'Le même jour, Moïse donna au peuple l’ordre suivant : '
  '12':
  - type: text
    content: Lorsque vous aurez traversé le Jourdain, les tribus de Siméon, Lévi, Juda, Issacar, Joseph et Benjamin se tiendront sur le mont Garizim pour prononcer les bénédictions en faveur du peuple
  - type: note
    content: 'Voir Dt 11.29. Le mont Garizim se trouve au sud de Sichem et fait face au mont Ebal. Les tribus choisies pour prononcer les bénédictions sont celles qui descendent des fils de Jacob et de ses épouses légitimes : Rachel et Léa. Les descendants de Ruben (à cause de sa faute rapportée en Gn 35.22  ?) et de Zabulon, le fils cadet de Léa, rejoignent les descendants des servantes de Jacob pour prononcer les malédictions.'
  - type: text
    content: '. '
  '13':
  - type: text
    content: Les tribus de Ruben, Gad, Aser, Zabulon, Dan et Nephtali se placeront sur le mont Ebal pour prononcer les malédictions.
  '14':
  - type: text
    content: 'Les lévites prendront la parole et diront d’une voix forte à tous les Israélites :'
  '15':
  - type: text
    content: '« Maudit soit l’homme qui fabrique une idole sculptée ou une statue en métal fondu pour l’ériger dans un lieu secret ; l’Eternel a en abomination de tels ouvrages d’artisan. » Et tout le peuple répondra : « Amen'
  - type: note
    content: Voir Ex 20.4 ; Lv 19.4 ; Dt 4.15-18.
  - type: text
    content: '  ! »'
  '16':
  - type: text
    content: '« Maudit soit celui qui traite son père ou sa mère avec mépris. » Et tout le peuple répondra : « Amen'
  - type: note
    content: Voir Ex 20.12.
  - type: text
    content: '  ! »'
  '17':
  - type: text
    content: '« Maudit soit celui qui déplace la borne de la propriété de son voisin. » Et tout le peuple répondra : « Amen'
  - type: note
    content: Voir Dt 19.14.
  - type: text
    content: '  ! »'
  '18':
  - type: text
    content: '« Maudit soit celui qui met un aveugle sur un faux chemin. » Et tout le peuple répondra : « Amen'
  - type: note
    content: Voir Lv 19.14.
  - type: text
    content: '  ! »'
  '19':
  - type: text
    content: '« Maudit soit celui qui fausse le cours de la justice au détriment de l’immigré, de l’orphelin et de la veuve. » Et tout le peuple répondra : « Amen'
  - type: note
    content: Voir Ex 22.21 ; 23.9 ; Lv 19.33-34 ; Dt 24.17-18.
  - type: text
    content: '  ! »'
  '2':
  - type: text
    content: Le jour où vous traverserez le Jourdain pour entrer dans le pays que l’Eternel votre Dieu vous donne, vous érigerez de grandes pierres et vous les enduirez de chaux
  - type: note
    content: Pour les v. 2-8, voir Jos 8.30-32.
  - type: text
    content: '. '
  '20':
  - type: text
    content: '« Maudit soit celui qui couche avec l’une des femmes de son père car il porte ainsi atteinte à son père. » Et tout le peuple répondra : « Amen'
  - type: note
    content: Voir Lv 18.8 ; 20.11 ; Dt 23.1.
  - type: text
    content: '  ! »'
  '21':
  - type: text
    content: '« Maudit soit celui qui s’accouple avec un animal, quel qu’il soit. » Et tout le peuple répondra : « Amen'
  - type: note
    content: Voir Ex 22.18 ; Lv 18.23 ; 20.15-16.
  - type: text
    content: '  ! »'
  '22':
  - type: text
    content: '« Maudit soit celui qui couche avec sa demi-sœur, fille de son père, ou fille de sa mère. » Et tout le peuple répondra : « Amen'
  - type: note
    content: Voir Lv 18.9 ; 20.17.
  - type: text
    content: '  ! »'
  '23':
  - type: text
    content: '« Maudit soit celui qui couche avec la mère de sa femme. » Et tout le peuple répondra : « Amen'
  - type: note
    content: Voir Lv 18.17 ; 20.14.
  - type: text
    content: '  ! »'
  '24':
  - type: text
    content: '« Maudit soit celui qui assassine son prochain en secret. » Et tout le peuple répondra : « Amen ! »'
  '25':
  - type: text
    content: '« Maudit soit celui qui accepte un pot-de-vin pour condamner à mort un innocent. » Et tout le peuple répondra : « Amen ! »'
  '26':
  - type: text
    content: '« Maudit soit quiconque ne respecte pas les paroles de cette Loi et néglige de les appliquer. » Et tout le peuple répondra : « Amen'
  - type: note
    content: Cité en Ga 3.10.
  - type: text
    content: '  ! »'
  '3':
  - type: text
    content: 'Dès que vous aurez traversé le fleuve, vous inscrirez toutes les paroles de cette Loi sur ces pierres. Ainsi vous entrerez dans le pays que l’Eternel votre Dieu vous donne, un pays où ruissellent le lait et le miel, comme l’Eternel, le Dieu de vos pères, vous l’a promis. '
  '4':
  - type: text
    content: Après le passage du Jourdain, vous dresserez ces pierres sur le mont Ebal
  - type: note
    content: 'A une cinquantaine de kilomètres de l’endroit où les Israélites traverseront le Jourdain, au nord de Sichem. Voir Dt 11.29. Le Pentateuque samaritain et une ancienne version latine portent : le mont Garizim.'
  - type: text
    content: ' comme je vous le commande aujourd’hui, et vous les enduirez de chaux. '
  '5':
  - type: text
    content: 'Au même endroit, vous construirez un autel à l’Eternel votre Dieu, avec des pierres qu’aucun ciseau de fer n’aura encore touchées. '
  '6':
  - type: text
    content: C’est en pierres brutes que vous bâtirez l’autel de l’Eternel votre Dieu, et vous lui offrirez sur cet autel des holocaustes
  - type: note
    content: Voir Ex 20.25.
  - type: text
    content: ' '
  '7':
  - type: text
    content: 'ainsi que des sacrifices de communion. Vous mangerez ces derniers sur place, et vous vous réjouirez devant l’Eternel votre Dieu. '
  '8':
  - type: text
    content: Puis vous graverez sur les pierres, en caractères bien lisibles, toutes les paroles de cette Loi.
  '9':
  - type: text
    content: 'Ensuite Moïse, assisté des prêtres-lévites, s’adressa encore à tout Israël en disant : Fais silence, ô Israël, et écoute ! Aujourd’hui, vous êtes devenus le peuple de l’Eternel votre Dieu. '
