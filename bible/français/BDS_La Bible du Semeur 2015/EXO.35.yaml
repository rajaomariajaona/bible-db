document_id: EXO.35
type_code: fra
segments:
- type: usfm
  marker: ms1
  children:
  - type: text
    text: Le tabernacle
  marker-yv: yv-h
- type: usfm
  marker: s1
  children:
  - type: text
    text: Le jour du sabbat
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Moïse réunit toute l’assemblée des Israélites et leur dit : Voici ce que l’Eternel a ordonné de faire : '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Vous ferez votre ouvrage pendant six jours, mais le septième jour sera pour vous un jour de repos complet, consacré à l’Eternel. Quiconque fera un travail ce jour-là sera mis à mort
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '35.2 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Voir Ex 20.8-11 ; 23.12 ; 31.12-17 ; 34.21 ; Lv 23.3 ; Dt 5.12-14.
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Vous n’allumerez de feu dans aucune de vos habitations le jour du sabbat.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Instructions sur les offrandes pour le tabernacle
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Moïse dit à toute l’assemblée des Israélites : Voici ce que l’Eternel a commandé'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '35.4 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Pour les v. 4-29, voir '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 25.1-7
        metadata:
          usfm: EXO.25.1+EXO.25.2+EXO.25.3+EXO.25.4+EXO.25.5+EXO.25.6+EXO.25.7
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: '  : '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Prélevez parmi vous une contribution pour l’Eternel. Toute personne qui le souhaite dans son cœur apportera à l’Eternel une contribution en bronze, en argent ou en or, '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'ou des fils de pourpre violette ou écarlate, de rouge éclatant, du fin lin et du poil de chèvre, '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'des peaux de béliers teintes en rouge, des peaux de dauphins et du bois d’acacia, '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'de l’huile pour le chandelier et des aromates pour l’huile d’onction et le parfum aromatique, '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: des pierres d’onyx et d’autres pierres à enchâsser pour l’éphod et pour le pectoral.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Les instructions sur les artisans du tabernacle
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Tous les gens habiles parmi vous, qu’ils viennent et exécutent tout ce que l’Eternel a prescrit : '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'le tabernacle, sa tente et sa couverture, ses agrafes, ses cadres, ses traverses, ses piliers et ses socles, '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'le coffre sacré avec ses barres et le propitiatoire, le voile de séparation, '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'la table, ses barres et tous ses accessoires, ainsi que les pains destinés à être exposés devant l’Eternel, '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'le chandelier, ses ustensiles, ses lampes et l’huile d’éclairage, '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'l’autel des parfums et ses barres, l’huile d’onction sainte, le parfum aromatique et le rideau pour l’entrée de la Demeure, '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'l’autel des holocaustes, sa grille de bronze, ses barres et tous ses accessoires, la cuve et son socle, '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'les tentures du parvis, ses piliers, ses socles et le rideau pour l’entrée du parvis, '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'les piquets du tabernacle, ceux du parvis et leurs cordages, '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: les vêtements de cérémonie pour faire le service dans le sanctuaire, les vêtements sacrés pour le prêtre Aaron, et ceux de ses fils pour l’exercice du sacerdoce.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Le peuple apporte ses offrandes
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Puis la communauté des Israélites se retira de la présence de Moïse. '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Alors tous ceux dont le cœur les y disposait et qui en avaient la volonté vinrent apporter à l’Eternel leur contribution en vue de la construction de la tente de la Rencontre, de tout l’ouvrage qui s’y rapporte et de la confection des vêtements sacrés. '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Tous ceux qui le souhaitaient de tout leur cœur, les hommes autant que les femmes, vinrent apporter des pendentifs, des boucles, des anneaux, des bracelets et toutes sortes d’ornements en or, et ils les offrirent à l’Eternel avec le geste de présentation. '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Tous ceux qui avaient chez eux des fils de pourpre violette ou écarlate, de rouge éclatant, du fin lin, du poil de chèvre, des peaux de béliers teintes en rouge et des peaux de dauphins les apportèrent. '
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Tous ceux qui avaient mis de côté une offrande en argent et en bronze l’apportèrent à l’Eternel. Tous ceux qui avaient chez eux du bois d’acacia l’apportèrent pour tout l’ouvrage à réaliser. '
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Toutes les femmes habiles filèrent le lin de leurs mains et apportèrent des fils de pourpre violette et écarlate, de rouge éclatant et du fin lin. '
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Toutes les femmes habiles qui le désiraient de tout cœur filèrent les poils de chèvre. '
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'Les chefs du peuple apportèrent les pierres d’onyx et les pierres à enchâsser pour l’éphod et le pectoral, '
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'les aromates et l’huile pour le chandelier, pour l’huile d’onction et pour le parfum aromatique. '
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: Tous les Israélites, hommes et femmes, que leur cœur poussait à apporter quelque chose pour les ouvrages que l’Eternel avait ordonné d’exécuter par l’intermédiaire de Moïse, apportèrent leurs offrandes volontaires à l’Eternel.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Les artisans du tabernacle
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'Moïse dit aux Israélites : Voyez, l’Eternel a désigné Betsaléel, fils d’Ouri, descendant de Hour, de la tribu de Juda'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '35.30 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Pour les v. 30 à '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '36.7'
        metadata:
          usfm: EXO.36.7
      - type: text
        text: ', voir '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 31.1-11
        metadata:
          usfm: EXO.31.1+EXO.31.2+EXO.31.3+EXO.31.4+EXO.31.5+EXO.31.6+EXO.31.7+EXO.31.8+EXO.31.9+EXO.31.10+EXO.31.11
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'Il l’a rempli de l’Esprit de Dieu qui lui confère de l’habileté, de l’intelligence et de la compétence pour exécuter toutes sortes d’ouvrages, '
  - type: usfm
    marker: v
    metadata:
      v: '32'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'pour concevoir des projets, pour travailler l’or, l’argent et le bronze, '
  - type: usfm
    marker: v
    metadata:
      v: '33'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: 'pour tailler des pierres à enchâsser, pour sculpter le bois et pour réaliser toutes sortes d’ouvrages. '
  - type: usfm
    marker: v
    metadata:
      v: '34'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: 'Il lui a aussi accordé, de même qu’à Oholiab, fils d’Ahisamak de la tribu de Dan, le don d’enseigner sa technique à d’autres. '
  - type: usfm
    marker: v
    metadata:
      v: '35'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: Il les a doués d’habileté pour exécuter toutes sortes de travaux de graveur et de concepteur, pour broder la pourpre violette, le rouge éclatant et le fin lin, pour réaliser des travaux de toutes sortes et concevoir des projets.
