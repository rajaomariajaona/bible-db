document_id: 1CH.22,21
type_code: fra
verses:
  '1':
  - type: text
    content: 'David dit donc : C’est ici que se trouvera le sanctuaire de l’Eternel Dieu, et ici sera l’autel pour les holocaustes d’Israël.'
  - type: heading
    content: Les préparatifs pour la construction du Temple
  '10':
  - type: text
    content: Ce sera lui qui bâtira un temple en mon honneur. Il sera pour moi un fils et je serai pour lui un père ; je maintiendrai pour toujours le trône de sa royauté sur Israël. »
  '11':
  - type: text
    content: 'Maintenant, mon fils, que l’Eternel soit avec toi, afin que tu réussisses à bâtir le temple de l’Eternel, ton Dieu, comme il l’a dit à ton sujet. '
  '12':
  - type: text
    content: 'Oh ! que l’Eternel t’accorde de la sagesse et de l’intelligence pour obéir à la Loi de l’Eternel ton Dieu lorsqu’il t’établira sur Israël ! '
  '13':
  - type: text
    content: Oui, tu réussiras, si tu veilles à obéir aux ordonnances et aux lois que l’Eternel a prescrites à Moïse pour Israël. Prends courage et tiens bon, ne crains rien et ne te laisse pas effrayer
  - type: note
    content: Voir Dt 31.7-8 ; Jos 1.6-9.
  - type: text
    content: '  !'
  '14':
  - type: text
    content: 'Vois, à force de peine, j’ai préparé pour le temple de l’Eternel plus de 3 000 tonnes d’or et 30 000 tonnes d’argent, ainsi qu’une quantité incalculable de bronze et de fer. J’ai aussi préparé du bois et des pierres, et tu en ajouteras encore. '
  '15':
  - type: text
    content: 'Tu as auprès de toi suffisamment d’ouvriers, des tailleurs de pierres, des sculpteurs sur bois et sur pierre et des artisans experts pour tous les travaux. '
  '16':
  - type: text
    content: Tu disposes d’une quantité incalculable d’or, d’argent, de bronze et de fer. Mets-toi donc à l’ouvrage et que l’Eternel soit avec toi !
  '17':
  - type: text
    content: Puis David ordonna à tous les chefs d’Israël de prêter leur concours à son fils Salomon.
  '18':
  - type: text
    content: '– L’Eternel, votre Dieu, leur dit-il, est manifestement avec vous : il vous assure la paix sur toutes vos frontières. En effet, il a mis sous ma coupe les anciens habitants du pays, et maintenant le pays est soumis devant l’Eternel et devant son peuple. '
  '19':
  - type: text
    content: A présent, appliquez-vous donc de tout votre cœur et de tout votre être à vous attacher à l’Eternel votre Dieu ! Mettez-vous au travail et bâtissez le sanctuaire de l’Eternel Dieu, afin d’installer le coffre de l’alliance de l’Eternel et les objets du sanctuaire
  - type: note
    content: 'Autre traduction : les objets sacrés.'
  - type: text
    content: ' de Dieu dans le temple qui doit être construit en l’honneur de l’Eternel'
  - type: note
    content: Le coffre de l’alliance se trouvait encore sous une tente sur la colline de Sion (16.1).
  - type: text
    content: '  !'
  '2':
  - type: text
    content: Il ordonna de rassembler tous les étrangers établis en Israël
  - type: note
    content: Ces étrangers étaient les descendants des Cananéens qui avaient habité le pays avant la conquête par les Israélites (voir 2 Ch 2.16-17 ; 8.7-10).
  - type: text
    content: ' et il leur imposa la tâche d’extraire et de tailler des pierres en vue de la construction du temple de Dieu. '
  '3':
  - type: text
    content: 'David prépara aussi une grande quantité de fer destiné à la fabrication des clous et des charnières pour les battants des portes, ainsi qu’une masse incalculable de bronze '
  '4':
  - type: text
    content: 'et de bois de cèdre que les Sidoniens et les Tyriens lui fournissaient en abondance. '
  '5':
  - type: text
    content: 'Il se disait : Mon fils Salomon est encore jeune et inexpérimenté'
  - type: note
    content: Salomon a accédé au pouvoir en 970 av. J.-C. ; il est né vers 991 av. J.-C.
  - type: text
    content: '  ; or, le temple qu’il s’agit de bâtir à l’Eternel devra être d’une grandeur, d’une splendeur et d’une gloire telles que sa renommée s’étendra dans tous les pays. Je vais donc commencer à faire des préparatifs pour lui. Ainsi David prépara beaucoup de matériaux de construction avant sa mort.'
  - type: heading
    content: Salomon construira le Temple
  '6':
  - type: text
    content: Puis il fit venir son fils Salomon et lui ordonna de construire un temple pour l’Eternel, le Dieu d’Israël.
  '7':
  - type: text
    content: Il lui dit
  - type: note
    content: Pour les v. 7-10, voir 1 Ch 17.1-14 ; 2 S 7.1-16.
  - type: text
    content: '  : Mon fils, j’avais à cœur de bâtir moi-même un temple en l’honneur de l’Eternel, mon Dieu. '
  '8':
  - type: text
    content: 'Mais l’Eternel m’a parlé en ces termes : « Tu as fait couler beaucoup de sang, et tu as fait de grandes guerres. A cause de tout le sang que tu as répandu devant moi sur la terre, ce n’est pas toi qui bâtiras un temple en mon honneur. '
  '9':
  - type: text
    content: 'Mais il te naîtra un fils qui sera un homme de paix : je lui assurerai la paix avec tous ses ennemis d’alentour ; il s’appellera Salomon (le Pacifique) et, durant toute sa vie, j’accorderai la paix et la tranquillité à Israël. '
