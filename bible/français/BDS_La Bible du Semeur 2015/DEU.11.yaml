document_id: DEU.11,21
type_code: fra
verses:
  '1':
  - type: heading
    content: Aimer l’Eternel et obéir à ses commandements
  - type: text
    content: 'Tu aimeras donc l’Eternel ton Dieu, et tu obéiras en tout temps à ce qu’il t’a ordonné : à ses lois, ses ordonnances, et ses commandements. '
  '10':
  - type: text
    content: Le pays où tu vas pénétrer pour en prendre possession ne ressemble pas à l’Egypte d’où vous êtes sortis ; là-bas, après avoir fait vos semailles, vous deviez irriguer vos champs en actionnant des norias
  - type: note
    content: L’Egypte était un pays plat et aux rares pluies. L’irrigation devait donc se faire par des moyens artificiels, au moyen de roues mues au pied et des rigoles ouvertes ou fermées au pied.
  - type: text
    content: ' avec vos pieds comme dans un jardin potager. '
  '11':
  - type: text
    content: 'Par contre, le pays où vous vous rendez pour en prendre possession est un pays de montagnes et de vallées arrosé par la pluie du ciel. '
  '12':
  - type: text
    content: C’est un pays dont l’Eternel ton Dieu prend lui-même soin et sur lequel il veille continuellement du début à la fin de l’année.
  '13':
  - type: text
    content: Si vous obéissez aux commandements que je vous donne aujourd’hui, en aimant l’Eternel votre Dieu et en lui rendant un culte de tout votre cœur et de tout votre être
  - type: note
    content: Pour les v. 13-17, voir Lv 26.3-5 ; Dt 7.12-16 ; 28.1-14.
  - type: text
    content: ', '
  '14':
  - type: text
    content: je répandrai
  - type: note
    content: 'Texte hébreu traditionnel. Le Pentateuque samaritain, l’ancienne version grecque et la Vulgate ont : il répandra.'
  - type: text
    content: ' sur votre pays la pluie au temps opportun, la pluie d’automne et la pluie de printemps'
  - type: note
    content: 'Le pays d’Israël connaît deux saisons de pluies : en automne, lorsque la terre est préparée pour les semailles, et au printemps, lorsque le grain commence à mûrir. La fertilité du sol dépend de ces deux saisons de pluies (voir Gn 41.28-30 ; 1 R 17.1).'
  - type: text
    content: ', et vous aurez de belles récoltes de blé, de vin nouveau et d’huile. '
  '15':
  - type: text
    content: Je ferai croître l’herbe dans vos prés pour votre bétail et vous mangerez à satiété.
  - type: heading
    content: Se garder de l’idolâtrie
  '16':
  - type: text
    content: 'Gardez-vous bien de vous laisser séduire et de vous détourner vers des dieux étrangers pour leur rendre un culte et vous prosterner devant eux. '
  '17':
  - type: text
    content: 'L’Eternel se mettrait en colère contre vous, il fermerait le ciel pour qu’il ne pleuve pas, la terre ne produirait plus ses récoltes et vous ne tarderiez pas à disparaître de ce bon pays que l’Eternel vous donne. '
  '18':
  - type: text
    content: Gravez donc bien ces ordres que je vous donne dans votre cœur et au tréfonds de votre être, qu’ils soient attachés comme un signe sur vos mains, et comme une marque sur votre front
  - type: note
    content: Pour les v. 18-20, voir Dt 6.6-9.
  - type: text
    content: '. '
  '19':
  - type: text
    content: 'Vous les enseignerez à vos enfants et vous leur en parlerez, chez vous dans votre maison et quand vous marcherez sur la route, quand vous vous coucherez et quand vous vous lèverez. '
  '2':
  - type: text
    content: 'Contrairement à vos enfants qui n’en savent rien et qui n’ont pas vu tout cela, vous qui êtes là aujourd’hui, vous savez ce que l’Eternel vous a appris : sa grandeur, ses déploiements de puissance, '
  '20':
  - type: text
    content: Vous les inscrirez sur les poteaux de votre maison et sur les montants de vos portes
  - type: note
    content: Voir note 6.9.
  - type: text
    content: '. '
  '21':
  - type: text
    content: Alors vos jours et ceux de vos enfants dans le pays que l’Eternel a promis par serment de donner à vos ancêtres dureront aussi longtemps que le ciel restera au-dessus de la terre.
  - type: heading
    content: Le don du pays
  '22':
  - type: text
    content: 'Car si vraiment vous obéissez à tous ces commandements que je vous ordonne d’appliquer, en aimant l’Eternel votre Dieu, en suivant tous les chemins qu’il vous a prescrits et en vous attachant à lui, '
  '23':
  - type: text
    content: 'il dépossédera en votre faveur tous ces peuples étrangers, et vous prendrez ainsi possession du territoire de peuples plus grands et plus puissants que vous. '
  '24':
  - type: text
    content: Tout endroit sur lequel vous poserez le pied vous appartiendra, votre territoire s’étendra du désert jusqu’au Liban, et de l’Euphrate jusqu’à la mer Méditerranée
  - type: note
    content: Pour les v. 24-25, voir Jos 1.3-5.
  - type: text
    content: '. '
  '25':
  - type: text
    content: 'Personne ne pourra vous résister : comme il vous l’a dit, l’Eternel votre Dieu sèmera devant vous la terreur et la panique dans tout le territoire que vous traverserez.'
  - type: heading
    content: La bénédiction ou la malédiction
  '26':
  - type: text
    content: 'Ecoutez, je propose aujourd’hui à votre choix la bénédiction et la malédiction : '
  '27':
  - type: text
    content: 'la bénédiction si vous obéissez aux commandements de l’Eternel votre Dieu, ceux que je vous donne aujourd’hui ; '
  '28':
  - type: text
    content: ou la malédiction, si vous n’obéissez pas aux commandements de l’Eternel votre Dieu, et si vous vous écartez de la voie que je vous trace moi-même aujourd’hui, pour vous rallier à d’autres dieux que vous ne connaissez pas.
  '29':
  - type: text
    content: Quand l’Eternel votre Dieu vous aura fait entrer dans le pays où vous vous rendez pour en prendre possession, vous prononcerez la bénédiction sur le mont Garizim et la malédiction sur le mont Ebal
  - type: note
    content: Deux montagnes abruptes dominant, au sud et au nord, l’étroite vallée où est construite la ville de Sichem. L’ordre est répété 27.1-13. Jos 8.30-35 en rapporte l’exécution.
  - type: text
    content: '. '
  '3':
  - type: text
    content: 'ainsi que les signes miraculeux et les œuvres qu’il a accomplies en Egypte contre le pharaon, roi d’Egypte, et contre tout son pays. '
  '30':
  - type: text
    content: Ces deux sommets se trouvent au-delà du Jourdain, de l’autre côté de la route de l’occident
  - type: note
    content: A 30 kilomètres à l’ouest du Jourdain.
  - type: text
    content: ', au pays des Cananéens qui habitent dans la plaine de la vallée du Jourdain, face à Guilgal'
  - type: note
    content: Probablement un village à une dizaine de kilomètres au nord-ouest de Béthel (voir 2 R 2.1) et non le Guilgal, mentionné dans Jos 4.19, situé près du Jourdain (voir Gn 12.6).
  - type: text
    content: ', près des chênes de Moré. '
  '31':
  - type: text
    content: 'Car vous allez bientôt franchir le Jourdain pour aller à la conquête du pays que l’Eternel votre Dieu vous donne. Vous en prendrez possession et vous y habiterez. '
  '32':
  - type: text
    content: Vous vous appliquerez à obéir à toutes les ordonnances et toutes les lois que je vous donne aujourd’hui.
  '4':
  - type: text
    content: Vous avez vu comment il a traité l’armée égyptienne, ses chevaux et ses chars, comment il a fait déferler sur eux les eaux de la mer des Roseaux, lorsqu’ils vous poursuivaient, et comment il les a fait disparaître pour toujours
  - type: note
    content: Voir Ex 14.
  - type: text
    content: ', '
  '5':
  - type: text
    content: 'et vous savez tout ce qu’il a fait pour vous dans le désert jusqu’à votre arrivée en ce lieu ; '
  '6':
  - type: text
    content: comment il a traité Datan et Abiram, fils d’Eliab, de la tribu de Ruben, quand la terre s’est fendue sous leurs pieds et les a engloutis avec leurs familles, leurs tentes et tous leurs partisans en Israël
  - type: note
    content: Voir Nb 16.
  - type: text
    content: '. '
  '7':
  - type: text
    content: 'Oui, c’est de vos propres yeux que vous avez vu toutes les œuvres extraordinaires que l’Eternel a accomplies. '
  '8':
  - type: text
    content: 'Obéissez donc à tous les commandements que je vous prescris aujourd’hui, alors vous serez forts et vous pourrez conquérir le pays dans lequel vous êtes sur le point d’entrer, pour en prendre possession, '
  '9':
  - type: text
    content: et vous prolongerez vos jours sur la terre ruisselant de lait et de miel que l’Eternel a promis par serment de donner à vos ancêtres et à toute leur descendance.
  - type: heading
    content: La bénédiction dans le pays
