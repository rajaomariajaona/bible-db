document_id: DEU.11
type_code: fra
segments:
- type: usfm
  marker: s2
  children:
  - type: text
    text: Aimer l’Eternel et obéir à ses commandements
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Tu aimeras donc l’Eternel ton Dieu, et tu obéiras en tout temps à ce qu’il t’a ordonné : à ses lois, ses ordonnances, et ses commandements. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Contrairement à vos enfants qui n’en savent rien et qui n’ont pas vu tout cela, vous qui êtes là aujourd’hui, vous savez ce que l’Eternel vous a appris : sa grandeur, ses déploiements de puissance, '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'ainsi que les signes miraculeux et les œuvres qu’il a accomplies en Egypte contre le pharaon, roi d’Egypte, et contre tout son pays. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Vous avez vu comment il a traité l’armée égyptienne, ses chevaux et ses chars, comment il a fait déferler sur eux les eaux de la mer des Roseaux, lorsqu’ils vous poursuivaient, et comment il les a fait disparaître pour toujours
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '11.4 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Voir '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ex 14
        metadata:
          usfm: EXO.14
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: ', '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'et vous savez tout ce qu’il a fait pour vous dans le désert jusqu’à votre arrivée en ce lieu ; '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: comment il a traité Datan et Abiram, fils d’Eliab, de la tribu de Ruben, quand la terre s’est fendue sous leurs pieds et les a engloutis avec leurs familles, leurs tentes et tous leurs partisans en Israël
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '11.6 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Voir '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Nb 16
        metadata:
          usfm: NUM.16
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Oui, c’est de vos propres yeux que vous avez vu toutes les œuvres extraordinaires que l’Eternel a accomplies. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Obéissez donc à tous les commandements que je vous prescris aujourd’hui, alors vous serez forts et vous pourrez conquérir le pays dans lequel vous êtes sur le point d’entrer, pour en prendre possession, '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: et vous prolongerez vos jours sur la terre ruisselant de lait et de miel que l’Eternel a promis par serment de donner à vos ancêtres et à toute leur descendance.
- type: usfm
  marker: s2
  children:
  - type: text
    text: La bénédiction dans le pays
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Le pays où tu vas pénétrer pour en prendre possession ne ressemble pas à l’Egypte d’où vous êtes sortis ; là-bas, après avoir fait vos semailles, vous deviez irriguer vos champs en actionnant des norias
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '11.10 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: L’Egypte était un pays plat et aux rares pluies. L’irrigation devait donc se faire par des moyens artificiels, au moyen de roues mues au pied et des rigoles ouvertes ou fermées au pied.
    marker-yv: yv-n
  - type: text
    text: ' avec vos pieds comme dans un jardin potager. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Par contre, le pays où vous vous rendez pour en prendre possession est un pays de montagnes et de vallées arrosé par la pluie du ciel. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: C’est un pays dont l’Eternel ton Dieu prend lui-même soin et sur lequel il veille continuellement du début à la fin de l’année.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Si vous obéissez aux commandements que je vous donne aujourd’hui, en aimant l’Eternel votre Dieu et en lui rendant un culte de tout votre cœur et de tout votre être
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '11.13 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Pour les v. 13-17, voir Lv 26.3-5 ; Dt 7.12-16 ; 28.1-14.
    marker-yv: yv-n
  - type: text
    text: ', '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: je répandrai
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '11.14 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Texte hébreu traditionnel. Le Pentateuque samaritain, l’ancienne version grecque et la Vulgate ont : '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: il répandra.
    marker-yv: yv-n
  - type: text
    text: ' sur votre pays la pluie au temps opportun, la pluie d’automne et la pluie de printemps'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '11.14 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Le pays d’Israël connaît deux saisons de pluies : en automne, lorsque la terre est préparée pour les semailles, et au printemps, lorsque le grain commence à mûrir. La fertilité du sol dépend de ces deux saisons de pluies (voir Gn 41.28-30 ; 1 R 17.1).'
    marker-yv: yv-n
  - type: text
    text: ', et vous aurez de belles récoltes de blé, de vin nouveau et d’huile. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Je ferai croître l’herbe dans vos prés pour votre bétail et vous mangerez à satiété.
- type: usfm
  marker: s2
  children:
  - type: text
    text: Se garder de l’idolâtrie
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Gardez-vous bien de vous laisser séduire et de vous détourner vers des dieux étrangers pour leur rendre un culte et vous prosterner devant eux. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'L’Eternel se mettrait en colère contre vous, il fermerait le ciel pour qu’il ne pleuve pas, la terre ne produirait plus ses récoltes et vous ne tarderiez pas à disparaître de ce bon pays que l’Eternel vous donne. '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Gravez donc bien ces ordres que je vous donne dans votre cœur et au tréfonds de votre être, qu’ils soient attachés comme un signe sur vos mains, et comme une marque sur votre front
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '11.18 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Pour les v. 18-20, voir '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Dt 6.6-9
        metadata:
          usfm: DEU.6.6+DEU.6.7+DEU.6.8+DEU.6.9
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Vous les enseignerez à vos enfants et vous leur en parlerez, chez vous dans votre maison et quand vous marcherez sur la route, quand vous vous coucherez et quand vous vous lèverez. '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Vous les inscrirez sur les poteaux de votre maison et sur les montants de vos portes
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '11.20 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Voir note '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '6.9'
        metadata:
          usfm: DEU.6.9
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Alors vos jours et ceux de vos enfants dans le pays que l’Eternel a promis par serment de donner à vos ancêtres dureront aussi longtemps que le ciel restera au-dessus de la terre.
- type: usfm
  marker: s2
  children:
  - type: text
    text: Le don du pays
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Car si vraiment vous obéissez à tous ces commandements que je vous ordonne d’appliquer, en aimant l’Eternel votre Dieu, en suivant tous les chemins qu’il vous a prescrits et en vous attachant à lui, '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'il dépossédera en votre faveur tous ces peuples étrangers, et vous prendrez ainsi possession du territoire de peuples plus grands et plus puissants que vous. '
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: Tout endroit sur lequel vous poserez le pied vous appartiendra, votre territoire s’étendra du désert jusqu’au Liban, et de l’Euphrate jusqu’à la mer Méditerranée
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '11.24 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Pour les v. 24-25, voir '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Jos 1.3-5
        metadata:
          usfm: JOS.1.3+JOS.1.4+JOS.1.5
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Personne ne pourra vous résister : comme il vous l’a dit, l’Eternel votre Dieu sèmera devant vous la terreur et la panique dans tout le territoire que vous traverserez.'
- type: usfm
  marker: s2
  children:
  - type: text
    text: La bénédiction ou la malédiction
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Ecoutez, je propose aujourd’hui à votre choix la bénédiction et la malédiction : '
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'la bénédiction si vous obéissez aux commandements de l’Eternel votre Dieu, ceux que je vous donne aujourd’hui ; '
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: ou la malédiction, si vous n’obéissez pas aux commandements de l’Eternel votre Dieu, et si vous vous écartez de la voie que je vous trace moi-même aujourd’hui, pour vous rallier à d’autres dieux que vous ne connaissez pas.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: Quand l’Eternel votre Dieu vous aura fait entrer dans le pays où vous vous rendez pour en prendre possession, vous prononcerez la bénédiction sur le mont Garizim et la malédiction sur le mont Ebal
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '11.29 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Deux montagnes abruptes dominant, au sud et au nord, l’étroite vallée où est construite la ville de Sichem. L’ordre est répété '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 27.1-13
        metadata:
          usfm: DEU.27.1+DEU.27.2+DEU.27.3+DEU.27.4+DEU.27.5+DEU.27.6+DEU.27.7+DEU.27.8+DEU.27.9+DEU.27.10+DEU.27.11+DEU.27.12+DEU.27.13
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Jos 8.30-35
        metadata:
          usfm: JOS.8.30+JOS.8.31+JOS.8.32+JOS.8.33+JOS.8.34+JOS.8.35
      - type: text
        text: ' en rapporte l’exécution.'
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: Ces deux sommets se trouvent au-delà du Jourdain, de l’autre côté de la route de l’occident
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '11.30 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: A 30 kilomètres à l’ouest du Jourdain.
    marker-yv: yv-n
  - type: text
    text: ', au pays des Cananéens qui habitent dans la plaine de la vallée du Jourdain, face à Guilgal'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '11.30 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Probablement un village à une dizaine de kilomètres au nord-ouest de Béthel (voir '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 2 R 2.1
        metadata:
          usfm: 2KI.2.1
      - type: text
        text: ') et non le Guilgal, mentionné dans '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Jos 4.19
        metadata:
          usfm: JOS.4.19
      - type: text
        text: ', situé près du Jourdain (voir '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Gn 12.6
        metadata:
          usfm: GEN.12.6
      - type: text
        text: ).
    marker-yv: yv-n
  - type: text
    text: ', près des chênes de Moré. '
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'Car vous allez bientôt franchir le Jourdain pour aller à la conquête du pays que l’Eternel votre Dieu vous donne. Vous en prendrez possession et vous y habiterez. '
  - type: usfm
    marker: v
    metadata:
      v: '32'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: Vous vous appliquerez à obéir à toutes les ordonnances et toutes les lois que je vous donne aujourd’hui.
