document_id: MAT.24
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: La suite des temps
  marker-yv: yv-h
- type: usfm
  marker: s2
  children:
  - type: text
    text: De la destruction de Jérusalem à la venue du Fils de l’homme
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: (Mc 13.1-13 ; Lc 21.5-19)
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Là-dessus, Jésus quitta la cour du Temple. Tandis qu’il s’éloignait, ses disciples s’approchèrent pour lui faire remarquer l’architecture du Temple. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Alors il leur dit : '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'Oui, regardez bien tout cela ! Vraiment, je vous l’assure : tout sera démoli : il ne restera pas une pierre sur une autre.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Comme il était assis sur le mont des Oliviers, ses disciples s’approchèrent, le prirent à part, et lui demandèrent : Dis-nous : quand cela se produira-t-il et quel signe annoncera ta venue et la fin du monde ?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Jésus leur répondit : '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Faites bien attention que personne ne vous induise en erreur.
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'Car plusieurs viendront sous mon nom en disant : « Je suis le '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Messie
    - type: text
      text: a ! », et ils tromperont beaucoup de gens.
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Vous entendrez parler de guerres et de menaces de guerres. Attention ! Ne vous laissez pas troubler par ces nouvelles, car cela doit arriver, mais ce ne sera pas encore la fin.
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'En effet, '
    - type: usfm
      marker: qt
      children:
      - type: text
        text: on verra se dresser une nation contre une nation, un royaume contre un autre
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '24.7 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Voir '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Es 19.2
        metadata:
          usfm: ISA.19.2
      - type: text
        text: .
    marker-yv: yv-n
  - type: usfm
    marker: wj
    children:
    - type: usfm
      marker: qt
      children:
      - type: text
        text: ;
    - type: text
      text: ' il y aura des famines et des tremblements de terre en divers lieux.'
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Mais ce ne seront que les premières douleurs de l’enfantement.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: ' '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Alors on vous persécutera et l’on vous mettra à mort. Tous les peuples vous haïront à cause de moi.
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: A cause de cela, beaucoup abandonneront la foi, ils se trahiront et se haïront les uns les autres.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: ' '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: De nombreux faux prophètes surgiront et ils tromperont beaucoup de gens.
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Parce que le mal ne cessera de croître, l’amour du plus grand nombre se refroidira.
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'Mais celui qui tiendra bon jusqu’au bout sera '
    - type: usfm
      marker: w
      children:
      - type: text
        text: sauvé
    - type: text
      text: .
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Cette Bonne Nouvelle du royaume de Dieu sera proclamée dans le monde entier pour que tous les peuples en entendent le témoignage. Alors seulement viendra la fin.
- type: usfm
  marker: r
  children:
  - type: text
    text: (Mc 13.14-20 ; Lc 21.20-24)
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: ' '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'Quand donc vous verrez '
    - type: usfm
      marker: qt
      children:
      - type: text
        text: l’abominable profanation
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '24.15 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Dn 9.27 ; 11.31 ; 12.11.
    marker-yv: yv-n
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'annoncée par le '
    - type: usfm
      marker: w
      children:
      - type: text
        text: prophète
    - type: text
      text: ' Daniel s’établir dans le '
    - type: usfm
      marker: w
      children:
      - type: text
        text: lieu saint
    - type: text
      text: ' – que celui qui lit comprenne ! –'
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'alors, que ceux qui sont en '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Judée
    - type: text
      text: ' s’enfuient dans les montagnes.'
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Si quelqu’un est sur son toit en terrasse, qu’il ne rentre pas dans sa maison pour emporter les biens qui s’y trouvent.
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Que celui qui sera dans les champs ne retourne pas chez lui pour aller chercher son manteau.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: ' '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Malheur, en ces jours-là, aux femmes enceintes et à celles qui allaitent !
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'Priez pour que votre fuite n’ait pas lieu en hiver, ni un jour de '
    - type: usfm
      marker: w
      children:
      - type: text
        text: sabbat
    - type: text
      text: .
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'Car '
    - type: usfm
      marker: qt
      children:
      - type: text
        text: à ce moment-là, la détresse sera plus terrible que tout ce qu’on a connu depuis le commencement du monde
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '24.21 '
    - type: usfm
      marker: ft
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Dn 12.1
        metadata:
          usfm: DAN.12.1
      - type: text
        text: .
    marker-yv: yv-n
  - type: usfm
    marker: wj
    children:
    - type: usfm
      marker: qt
      children:
      - type: text
        text: ;
    - type: text
      text: ' et jamais plus, on ne verra pareille souffrance.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: ' '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Vraiment, si le Seigneur n’avait pas décidé de réduire le nombre de ces jours, personne n’en réchapperait ; mais, à cause de ceux qu’il a choisis, il abrégera ce temps.
- type: usfm
  marker: r
  children:
  - type: text
    text: (Mc 13.21-31 ; Lc 17.23-24 ; 21.25-33)
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: ' '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'Si quelqu’un vous dit alors : « Le Messie est ici ! » ou : « Il est là ! », ne le croyez pas.'
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: De faux messies surgiront, ainsi que de faux prophètes. Ils produiront des signes extraordinaires et des prodiges au point de tromper même, si c’était possible, ceux que Dieu a choisis.
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Voilà, je vous ai prévenus !
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: ' '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'Si l’on vous dit : « Regardez, il est dans le désert ! », n’y allez pas ! Si l’on prétend : « Il se cache en quelque endroit secret ! », n’en croyez rien.'
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'En effet, quand le '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Fils de l’homme
    - type: text
      text: ' viendra, ce sera comme l’éclair qui jaillit du levant et illumine tout jusqu’au couchant.'
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: usfm
    marker: wj
    children:
    - type: usfm
      marker: qt
      children:
      - type: text
        text: Où que soit le cadavre, là s’assembleront les vautours
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '24.28 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: C’est-à-dire que la venue du Fils de l’homme sera évidente pour tous et que nul n’échappera au jugement.
    marker-yv: yv-n
  - type: usfm
    marker: wj
    children:
    - type: usfm
      marker: qt
      children:
      - type: text
        text: .
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: ' '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Aussitôt après ces jours de détresse,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: wj
    children:
    - type: usfm
      marker: qt
      children:
      - type: text
        text: le soleil s’obscurcira,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: wj
    children:
    - type: usfm
      marker: qt
      children:
      - type: text
        text: la lune perdra sa clarté,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: wj
    children:
    - type: usfm
      marker: qt
      children:
      - type: text
        text: les étoiles tomberont du ciel ;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: wj
    children:
    - type: usfm
      marker: qt
      children:
      - type: text
        text: les puissances célestes
    - type: text
      text: ' ╵'
    - type: usfm
      marker: qt
      children:
      - type: text
        text: seront ébranlées
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '24.29 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Voir Es 13.10 ; 34.4 ; Jl 3.4.
    marker-yv: yv-n
  - type: usfm
    marker: wj
    children:
    - type: usfm
      marker: qt
      children:
      - type: text
        text: .
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: ' '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'C’est alors que le signe du Fils de l’homme apparaîtra dans le ciel. Alors '
    - type: usfm
      marker: qt
      children:
      - type: text
        text: tous les peuples de la terre se lamenteront
    - type: text
      text: ', et ils verront '
    - type: usfm
      marker: qt
      children:
      - type: text
        text: le Fils de l’homme venir sur les nuées du ciel
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '24.30 '
    - type: usfm
      marker: ft
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Dn 7.13
        metadata:
          usfm: DAN.7.13
      - type: text
        text: ' .'
    marker-yv: yv-n
  - type: usfm
    marker: wj
    children:
    - type: text
      text: avec beaucoup de puissance et de gloire.
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'Il enverra ses '
    - type: usfm
      marker: w
      children:
      - type: text
        text: anges
    - type: text
      text: ' rassembler, au son des trompettes éclatantes, ses élus des quatre coins du monde, d’un bout à l’autre de l’univers.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '32'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: ' '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'Que l’exemple du figuier vous serve d’enseignement : quand ses rameaux deviennent tendres et que ses feuilles poussent, vous savez que l’été est proche.'
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '33'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: De même, quand vous verrez tous ces événements, sachez que le Fils de l’homme est proche, comme aux portes de la ville.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '34'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: ' '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Vraiment, je vous assure que cette génération-ci ne passera pas jusqu’à ce que tout cela vienne à se réaliser.
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '35'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Le ciel et la terre passeront, mais mes paroles ne passeront jamais.
- type: usfm
  marker: s2
  children:
  - type: text
    text: Se tenir prêt
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: (Mc 13.32-37 ; Lc 17.26-30, 34-35)
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '36'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: ' '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'Quant au jour et à l’heure où cela se produira, personne ne les connaît, ni les '
    - type: usfm
      marker: w
      children:
      - type: text
        text: anges
    - type: text
      text: ' du ciel, ni même le Fils'
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '24.36 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'L’expression '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'ni même le Fils '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ne se trouve pas dans certains manuscrits.
    marker-yv: yv-n
  - type: usfm
    marker: wj
    children:
    - type: text
      text: ; personne, sauf le Père, et lui seul.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '37'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: ' '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'Lors de la venue du Fils de l’homme, les choses se passeront comme au temps de '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Noé
    - type: text
      text: '  ;'
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '38'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: en effet, à l’époque qui précéda le déluge, les gens étaient occupés à manger et à boire, à se marier et à marier leurs enfants, jusqu’au jour où Noé entra dans le bateau.
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '39'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '39'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Ils ne se doutèrent de rien, jusqu’à ce que vienne le déluge qui les emporta tous.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Ce sera la même chose lorsque le Fils de l’homme viendra.
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '40'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '40'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'Alors deux ouvriers travailleront côte à côte dans un champ : l’un sera emmené, l’autre laissé.'
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '41'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '41'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'Deux femmes seront en train de tourner la pierre de meule : l’une sera emmenée, l’autre laissée.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '42'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '42'
  - type: text
    text: ' '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Tenez-vous donc en éveil, puisque vous ignorez quel jour votre Seigneur viendra.
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '43'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '43'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'Vous le savez bien : si le maître de maison savait à quelle heure de la nuit le voleur doit venir, il resterait éveillé pour ne pas le laisser pénétrer dans sa maison.'
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '44'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '44'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Pour cette même raison, vous aussi, tenez-vous prêts, car c’est à un moment que vous n’auriez pas imaginé que le Fils de l’homme viendra.
- type: usfm
  marker: r
  children:
  - type: text
    text: (Lc 12.41-48)
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '45'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '45'
  - type: text
    text: ' '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Quel est le serviteur fidèle et sensé à qui le maître a confié le soin de veiller sur l’ensemble de son personnel pour qu’il distribue à chacun sa nourriture au moment voulu ?
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '46'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '46'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Heureux ce serviteur que le maître, à son retour, trouvera en train d’agir comme il le lui a demandé !
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '47'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '47'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Vraiment, je vous l’assure, son maître lui confiera l’administration de tout ce qu’il possède.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '48'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '48'
  - type: text
    text: ' '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'Mais si c’est un mauvais serviteur, qui se dit : « Mon maître n’est pas près de rentrer »,'
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '49'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '49'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: et se met à maltraiter ses compagnons de service, à manger et à boire avec les ivrognes,
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '50'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '50'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: son maître arrivera un jour où il ne s’y attendra pas et à un moment qu’il ne connaît pas.
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '51'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '51'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Alors le maître le punira très sévèrement, et le traitera comme on traite les hypocrites. C’est là qu’il y aura des pleurs et d’amers regrets.
