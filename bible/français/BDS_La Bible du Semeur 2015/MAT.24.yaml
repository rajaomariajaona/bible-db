document_id: MAT.24,21
type_code: fra
verses:
  '1':
  - type: heading
    content: La suite des temps
  - type: heading
    content: De la destruction de Jérusalem à la venue du Fils de l’homme
  - type: heading
    content: (Mc 13.1-13 ; Lc 21.5-19)
  - type: text
    content: 'Là-dessus, Jésus quitta la cour du Temple. Tandis qu’il s’éloignait, ses disciples s’approchèrent pour lui faire remarquer l’architecture du Temple. '
  '10':
  - type: text
    content: A cause de cela, beaucoup abandonneront la foi, ils se trahiront et se haïront les uns les autres.
  '11':
  - type: text
    content: ' '
  - type: text
    content: De nombreux faux prophètes surgiront et ils tromperont beaucoup de gens.
  - type: text
    content: ' '
  '12':
  - type: text
    content: Parce que le mal ne cessera de croître, l’amour du plus grand nombre se refroidira.
  - type: text
    content: ' '
  '13':
  - type: text
    content: 'Mais celui qui tiendra bon jusqu’au bout sera '
  - type: text
    content: sauvé
  - type: text
    content: .
  - type: text
    content: ' '
  '14':
  - type: text
    content: Cette Bonne Nouvelle du royaume de Dieu sera proclamée dans le monde entier pour que tous les peuples en entendent le témoignage. Alors seulement viendra la fin.
  - type: heading
    content: (Mc 13.14-20 ; Lc 21.20-24)
  '15':
  - type: text
    content: ' '
  - type: text
    content: 'Quand donc vous verrez '
  - type: text
    content: l’abominable profanation
  - type: text
    content: ' '
  - type: note
    content: Dn 9.27 ; 11.31 ; 12.11.
  - type: text
    content: 'annoncée par le '
  - type: text
    content: prophète
  - type: text
    content: ' Daniel s’établir dans le '
  - type: text
    content: lieu saint
  - type: text
    content: ' – que celui qui lit comprenne ! –'
  - type: text
    content: ' '
  '16':
  - type: text
    content: 'alors, que ceux qui sont en '
  - type: text
    content: Judée
  - type: text
    content: ' s’enfuient dans les montagnes.'
  - type: text
    content: ' '
  '17':
  - type: text
    content: Si quelqu’un est sur son toit en terrasse, qu’il ne rentre pas dans sa maison pour emporter les biens qui s’y trouvent.
  - type: text
    content: ' '
  '18':
  - type: text
    content: Que celui qui sera dans les champs ne retourne pas chez lui pour aller chercher son manteau.
  '19':
  - type: text
    content: ' '
  - type: text
    content: Malheur, en ces jours-là, aux femmes enceintes et à celles qui allaitent !
  - type: text
    content: ' '
  '2':
  - type: text
    content: 'Alors il leur dit : '
  - type: text
    content: 'Oui, regardez bien tout cela ! Vraiment, je vous l’assure : tout sera démoli : il ne restera pas une pierre sur une autre.'
  '20':
  - type: text
    content: 'Priez pour que votre fuite n’ait pas lieu en hiver, ni un jour de '
  - type: text
    content: sabbat
  - type: text
    content: .
  - type: text
    content: ' '
  '21':
  - type: text
    content: 'Car '
  - type: text
    content: à ce moment-là, la détresse sera plus terrible que tout ce qu’on a connu depuis le commencement du monde
  - type: note
    content: Dn 12.1.
  - type: text
    content: ;
  - type: text
    content: ' et jamais plus, on ne verra pareille souffrance.'
  '22':
  - type: text
    content: ' '
  - type: text
    content: Vraiment, si le Seigneur n’avait pas décidé de réduire le nombre de ces jours, personne n’en réchapperait ; mais, à cause de ceux qu’il a choisis, il abrégera ce temps.
  - type: heading
    content: (Mc 13.21-31 ; Lc 17.23-24 ; 21.25-33)
  '23':
  - type: text
    content: ' '
  - type: text
    content: 'Si quelqu’un vous dit alors : « Le Messie est ici ! » ou : « Il est là ! », ne le croyez pas.'
  - type: text
    content: ' '
  '24':
  - type: text
    content: De faux messies surgiront, ainsi que de faux prophètes. Ils produiront des signes extraordinaires et des prodiges au point de tromper même, si c’était possible, ceux que Dieu a choisis.
  - type: text
    content: ' '
  '25':
  - type: text
    content: Voilà, je vous ai prévenus !
  '26':
  - type: text
    content: ' '
  - type: text
    content: 'Si l’on vous dit : « Regardez, il est dans le désert ! », n’y allez pas ! Si l’on prétend : « Il se cache en quelque endroit secret ! », n’en croyez rien.'
  - type: text
    content: ' '
  '27':
  - type: text
    content: 'En effet, quand le '
  - type: text
    content: Fils de l’homme
  - type: text
    content: ' viendra, ce sera comme l’éclair qui jaillit du levant et illumine tout jusqu’au couchant.'
  - type: text
    content: ' '
  '28':
  - type: text
    content: Où que soit le cadavre, là s’assembleront les vautours
  - type: note
    content: C’est-à-dire que la venue du Fils de l’homme sera évidente pour tous et que nul n’échappera au jugement.
  - type: text
    content: .
  '29':
  - type: text
    content: ' '
  - type: text
    content: Aussitôt après ces jours de détresse,
  - type: text
    content: le soleil s’obscurcira,
  - type: text
    content: la lune perdra sa clarté,
  - type: text
    content: les étoiles tomberont du ciel ;
  - type: text
    content: les puissances célestes
  - type: text
    content: ' ╵'
  - type: text
    content: seront ébranlées
  - type: text
    content: ' '
  - type: note
    content: Voir Es 13.10 ; 34.4 ; Jl 3.4.
  - type: text
    content: .
  '3':
  - type: text
    content: 'Comme il était assis sur le mont des Oliviers, ses disciples s’approchèrent, le prirent à part, et lui demandèrent : Dis-nous : quand cela se produira-t-il et quel signe annoncera ta venue et la fin du monde ?'
  '30':
  - type: text
    content: ' '
  - type: text
    content: 'C’est alors que le signe du Fils de l’homme apparaîtra dans le ciel. Alors '
  - type: text
    content: tous les peuples de la terre se lamenteront
  - type: text
    content: ', et ils verront '
  - type: text
    content: le Fils de l’homme venir sur les nuées du ciel
  - type: text
    content: ' '
  - type: note
    content: Dn 7.13 .
  - type: text
    content: avec beaucoup de puissance et de gloire.
  - type: text
    content: ' '
  '31':
  - type: text
    content: 'Il enverra ses '
  - type: text
    content: anges
  - type: text
    content: ' rassembler, au son des trompettes éclatantes, ses élus des quatre coins du monde, d’un bout à l’autre de l’univers.'
  '32':
  - type: text
    content: ' '
  - type: text
    content: 'Que l’exemple du figuier vous serve d’enseignement : quand ses rameaux deviennent tendres et que ses feuilles poussent, vous savez que l’été est proche.'
  - type: text
    content: ' '
  '33':
  - type: text
    content: De même, quand vous verrez tous ces événements, sachez que le Fils de l’homme est proche, comme aux portes de la ville.
  '34':
  - type: text
    content: ' '
  - type: text
    content: Vraiment, je vous assure que cette génération-ci ne passera pas jusqu’à ce que tout cela vienne à se réaliser.
  - type: text
    content: ' '
  '35':
  - type: text
    content: Le ciel et la terre passeront, mais mes paroles ne passeront jamais.
  - type: heading
    content: Se tenir prêt
  - type: heading
    content: (Mc 13.32-37 ; Lc 17.26-30, 34-35)
  '36':
  - type: text
    content: ' '
  - type: text
    content: 'Quant au jour et à l’heure où cela se produira, personne ne les connaît, ni les '
  - type: text
    content: anges
  - type: text
    content: ' du ciel, ni même le Fils'
  - type: text
    content: ' '
  - type: note
    content: L’expression ni même le Fils ne se trouve pas dans certains manuscrits.
  - type: text
    content: ; personne, sauf le Père, et lui seul.
  '37':
  - type: text
    content: ' '
  - type: text
    content: 'Lors de la venue du Fils de l’homme, les choses se passeront comme au temps de '
  - type: text
    content: Noé
  - type: text
    content: '  ;'
  - type: text
    content: ' '
  '38':
  - type: text
    content: en effet, à l’époque qui précéda le déluge, les gens étaient occupés à manger et à boire, à se marier et à marier leurs enfants, jusqu’au jour où Noé entra dans le bateau.
  - type: text
    content: ' '
  '39':
  - type: text
    content: Ils ne se doutèrent de rien, jusqu’à ce que vienne le déluge qui les emporta tous.
  - type: text
    content: Ce sera la même chose lorsque le Fils de l’homme viendra.
  - type: text
    content: ' '
  '4':
  - type: text
    content: 'Jésus leur répondit : '
  - type: text
    content: Faites bien attention que personne ne vous induise en erreur.
  - type: text
    content: ' '
  '40':
  - type: text
    content: 'Alors deux ouvriers travailleront côte à côte dans un champ : l’un sera emmené, l’autre laissé.'
  - type: text
    content: ' '
  '41':
  - type: text
    content: 'Deux femmes seront en train de tourner la pierre de meule : l’une sera emmenée, l’autre laissée.'
  '42':
  - type: text
    content: ' '
  - type: text
    content: Tenez-vous donc en éveil, puisque vous ignorez quel jour votre Seigneur viendra.
  - type: text
    content: ' '
  '43':
  - type: text
    content: 'Vous le savez bien : si le maître de maison savait à quelle heure de la nuit le voleur doit venir, il resterait éveillé pour ne pas le laisser pénétrer dans sa maison.'
  - type: text
    content: ' '
  '44':
  - type: text
    content: Pour cette même raison, vous aussi, tenez-vous prêts, car c’est à un moment que vous n’auriez pas imaginé que le Fils de l’homme viendra.
  - type: heading
    content: (Lc 12.41-48)
  '45':
  - type: text
    content: ' '
  - type: text
    content: Quel est le serviteur fidèle et sensé à qui le maître a confié le soin de veiller sur l’ensemble de son personnel pour qu’il distribue à chacun sa nourriture au moment voulu ?
  - type: text
    content: ' '
  '46':
  - type: text
    content: Heureux ce serviteur que le maître, à son retour, trouvera en train d’agir comme il le lui a demandé !
  - type: text
    content: ' '
  '47':
  - type: text
    content: Vraiment, je vous l’assure, son maître lui confiera l’administration de tout ce qu’il possède.
  '48':
  - type: text
    content: ' '
  - type: text
    content: 'Mais si c’est un mauvais serviteur, qui se dit : « Mon maître n’est pas près de rentrer »,'
  - type: text
    content: ' '
  '49':
  - type: text
    content: et se met à maltraiter ses compagnons de service, à manger et à boire avec les ivrognes,
  - type: text
    content: ' '
  '5':
  - type: text
    content: 'Car plusieurs viendront sous mon nom en disant : « Je suis le '
  - type: text
    content: Messie
  - type: text
    content: a ! », et ils tromperont beaucoup de gens.
  - type: text
    content: ' '
  '50':
  - type: text
    content: son maître arrivera un jour où il ne s’y attendra pas et à un moment qu’il ne connaît pas.
  - type: text
    content: ' '
  '51':
  - type: text
    content: Alors le maître le punira très sévèrement, et le traitera comme on traite les hypocrites. C’est là qu’il y aura des pleurs et d’amers regrets.
  '6':
  - type: text
    content: Vous entendrez parler de guerres et de menaces de guerres. Attention ! Ne vous laissez pas troubler par ces nouvelles, car cela doit arriver, mais ce ne sera pas encore la fin.
  - type: text
    content: ' '
  '7':
  - type: text
    content: 'En effet, '
  - type: text
    content: on verra se dresser une nation contre une nation, un royaume contre un autre
  - type: note
    content: Voir Es 19.2.
  - type: text
    content: ;
  - type: text
    content: ' il y aura des famines et des tremblements de terre en divers lieux.'
  - type: text
    content: ' '
  '8':
  - type: text
    content: Mais ce ne seront que les premières douleurs de l’enfantement.
  '9':
  - type: text
    content: ' '
  - type: text
    content: Alors on vous persécutera et l’on vous mettra à mort. Tous les peuples vous haïront à cause de moi.
  - type: text
    content: ' '
