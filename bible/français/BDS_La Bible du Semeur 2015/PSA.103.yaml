document_id: PSA.103,21
type_code: fra
verses:
  '1':
  - type: heading
    content: Que tout mon être loue l’Eternel !
  - type: text
    content: De David.
  - type: text
    content: Que tout mon être ╵bénisse l’Eternel !
  - type: text
    content: Que tout ce que je suis ╵bénisse le Dieu saint !
  '10':
  - type: text
    content: Il ne nous traite pas ╵selon le mal ╵que nous avons commis,
  - type: text
    content: il ne nous punit pas ╵comme le méritent nos fautes.
  '11':
  - type: text
    content: Autant le ciel est élevé ╵au-dessus de la terre,
  - type: text
    content: autant son amour est intense ╵en faveur de ceux qui le craignent.
  '12':
  - type: text
    content: Autant l’Orient ╵est loin de l’Occident,
  - type: text
    content: autant il éloigne de nous ╵nos mauvaises actions.
  '13':
  - type: text
    content: Et, comme un père ╵est rempli de tendresse ╵pour ses enfants,
  - type: text
    content: 'l’Eternel est plein de tendresse ╵en faveur de ceux qui le craignent :'
  '14':
  - type: text
    content: il sait de quelle pâte ╵nous sommes façonnés,
  - type: text
    content: il tient compte du fait ╵que nous sommes poussière.
  '15':
  - type: text
    content: L’homme… ╵sa vie ressemble à l’herbe.
  - type: text
    content: Lui, il fleurit ╵comme une fleur des champs
  - type: note
    content: Voir 90.5-6 ; Es 40.6-7.
  - type: text
    content: .
  '16':
  - type: text
    content: Qu’un vent souffle sur elle, ╵la voilà disparue !
  - type: text
    content: Le lieu qu’elle occupait ╵ne la reconnaît plus.
  '17':
  - type: text
    content: L’amour de l’Eternel ╵est là depuis toujours ╵et durera toujours ╵en faveur de ceux qui le craignent,
  - type: text
    content: il ne cesse d’agir ╵pour la justice ╵en faveur des enfants ╵de leurs enfants,
  '18':
  - type: text
    content: en faveur de ceux qui restent fidèles ╵à son alliance,
  - type: text
    content: de ceux qui tiennent compte ╵de ses commandements ╵pour les mettre en pratique.
  '19':
  - type: text
    content: 'Dans les cieux, l’Eternel ╵a établi son trône :'
  - type: text
    content: et il exerce son pouvoir royal ╵sur l’univers entier.
  '2':
  - type: text
    content: Que tout mon être ╵bénisse l’Eternel,
  - type: text
    content: sans oublier ╵aucun de ses bienfaits.
  '20':
  - type: text
    content: Bénissez l’Eternel, ╵vous tous ses anges
  - type: text
    content: à la force puissante, ╵vous qui exécutez ses ordres, prompts à lui obéir.
  '21':
  - type: text
    content: Bénissez l’Eternel, ╵vous toutes ses armées célestes,
  - type: text
    content: vous qui, à son service, ╵exécutez sa volonté.
  '22':
  - type: text
    content: Bénissez l’Eternel, ╵toutes ses créatures,
  - type: text
    content: partout où il gouverne !
  - type: text
    content: Que tout mon être ╵bénisse l’Eternel !
  '3':
  - type: text
    content: Car c’est lui qui pardonne ╵tous tes péchés,
  - type: text
    content: c’est lui qui te guérit ╵de toute maladie,
  '4':
  - type: text
    content: qui t’arrache à la tombe.
  - type: text
    content: C’est lui qui te couronne ╵d’amour, de compassion
  '5':
  - type: text
    content: et qui te comble de bonheur ╵tout au long de ton existence ;
  - type: text
    content: et ta jeunesse, comme l’aigle, ╵prend un nouvel essor
  - type: note
    content: La longévité des aigles est proverbiale, ils gardent leur vigueur jusque dans un âge avancé ; d’autres pensent à la mue annuelle de leur plumage (cf. Es 40.31).
  - type: text
    content: .
  '6':
  - type: text
    content: L’Eternel œuvre ╵pour la justice
  - type: text
    content: et il défend les droits ╵de tous les opprimés.
  '7':
  - type: text
    content: Il a révélé à Moïse ╵de quelle façon il agit,
  - type: text
    content: et montré ses hauts faits ╵au peuple d’Israël.
  '8':
  - type: text
    content: L’Eternel est compatissant ╵et miséricordieux.
  - type: text
    content: Il est plein de patience ╵et débordant d’amour
  - type: note
    content: Cf. Ex 34.6 ; Ps 86.15 ; 145.8 ; Jl 2.13 ; Né 9.17.
  - type: text
    content: .
  '9':
  - type: text
    content: Il ne tient pas rigueur sans cesse
  - type: text
    content: et son ressentiment ╵ne dure pas toujours.
