document_id: PSA.103
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Que tout mon être loue l’Eternel !
  marker-yv: yv-h
- type: usfm
  marker: d
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: De David.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Que tout mon être ╵bénisse l’Eternel !
- type: usfm
  marker: q1
  children:
  - type: text
    text: Que tout ce que je suis ╵bénisse le Dieu saint !
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Que tout mon être ╵bénisse l’Eternel,
- type: usfm
  marker: q1
  children:
  - type: text
    text: sans oublier ╵aucun de ses bienfaits.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Car c’est lui qui pardonne ╵tous tes péchés,
- type: usfm
  marker: q1
  children:
  - type: text
    text: c’est lui qui te guérit ╵de toute maladie,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: qui t’arrache à la tombe.
- type: usfm
  marker: q1
  children:
  - type: text
    text: C’est lui qui te couronne ╵d’amour, de compassion
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: et qui te comble de bonheur ╵tout au long de ton existence ;
- type: usfm
  marker: q1
  children:
  - type: text
    text: et ta jeunesse, comme l’aigle, ╵prend un nouvel essor
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '103.5 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'La longévité des aigles est proverbiale, ils gardent leur vigueur jusque dans un âge avancé ; d’autres pensent à la mue annuelle de leur plumage (cf. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Es 40.31
        metadata:
          usfm: ISA.40.31
      - type: text
        text: ).
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: L’Eternel œuvre ╵pour la justice
- type: usfm
  marker: q1
  children:
  - type: text
    text: et il défend les droits ╵de tous les opprimés.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Il a révélé à Moïse ╵de quelle façon il agit,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et montré ses hauts faits ╵au peuple d’Israël.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: L’Eternel est compatissant ╵et miséricordieux.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Il est plein de patience ╵et débordant d’amour
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '103.8 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Cf. Ex 34.6 ; Ps 86.15 ; 145.8 ; Jl 2.13 ; Né 9.17.
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Il ne tient pas rigueur sans cesse
- type: usfm
  marker: q1
  children:
  - type: text
    text: et son ressentiment ╵ne dure pas toujours.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Il ne nous traite pas ╵selon le mal ╵que nous avons commis,
- type: usfm
  marker: q1
  children:
  - type: text
    text: il ne nous punit pas ╵comme le méritent nos fautes.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Autant le ciel est élevé ╵au-dessus de la terre,
- type: usfm
  marker: q1
  children:
  - type: text
    text: autant son amour est intense ╵en faveur de ceux qui le craignent.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Autant l’Orient ╵est loin de l’Occident,
- type: usfm
  marker: q1
  children:
  - type: text
    text: autant il éloigne de nous ╵nos mauvaises actions.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Et, comme un père ╵est rempli de tendresse ╵pour ses enfants,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'l’Eternel est plein de tendresse ╵en faveur de ceux qui le craignent :'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: il sait de quelle pâte ╵nous sommes façonnés,
- type: usfm
  marker: q1
  children:
  - type: text
    text: il tient compte du fait ╵que nous sommes poussière.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: L’homme… ╵sa vie ressemble à l’herbe.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Lui, il fleurit ╵comme une fleur des champs
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '103.15 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Voir 90.5-6 ; Es 40.6-7.
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Qu’un vent souffle sur elle, ╵la voilà disparue !
- type: usfm
  marker: q1
  children:
  - type: text
    text: Le lieu qu’elle occupait ╵ne la reconnaît plus.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: L’amour de l’Eternel ╵est là depuis toujours ╵et durera toujours ╵en faveur de ceux qui le craignent,
- type: usfm
  marker: q1
  children:
  - type: text
    text: il ne cesse d’agir ╵pour la justice ╵en faveur des enfants ╵de leurs enfants,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: en faveur de ceux qui restent fidèles ╵à son alliance,
- type: usfm
  marker: q1
  children:
  - type: text
    text: de ceux qui tiennent compte ╵de ses commandements ╵pour les mettre en pratique.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Dans les cieux, l’Eternel ╵a établi son trône :'
- type: usfm
  marker: q1
  children:
  - type: text
    text: et il exerce son pouvoir royal ╵sur l’univers entier.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Bénissez l’Eternel, ╵vous tous ses anges
- type: usfm
  marker: q1
  children:
  - type: text
    text: à la force puissante, ╵vous qui exécutez ses ordres, prompts à lui obéir.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Bénissez l’Eternel, ╵vous toutes ses armées célestes,
- type: usfm
  marker: q1
  children:
  - type: text
    text: vous qui, à son service, ╵exécutez sa volonté.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: Bénissez l’Eternel, ╵toutes ses créatures,
- type: usfm
  marker: q1
  children:
  - type: text
    text: partout où il gouverne !
- type: usfm
  marker: q1
  children:
  - type: text
    text: Que tout mon être ╵bénisse l’Eternel !
