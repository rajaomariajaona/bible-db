document_id: PSA.115
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: A Dieu seul la gloire !
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Non pas à nous, ╵ô Eternel, ╵non pas à nous,
- type: usfm
  marker: q1
  children:
  - type: text
    text: mais à toi seul la gloire,
- type: usfm
  marker: q1
  children:
  - type: text
    text: pour ton amour ╵et ta fidélité !
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Pourquoi les autres peuples diraient-ils :'
- type: usfm
  marker: q1
  children:
  - type: text
    text: « Où est leur Dieu ? »
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Notre Dieu est au ciel,
- type: usfm
  marker: q1
  children:
  - type: text
    text: il fait tout ce qu’il veut.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Mais leurs idoles sont d’argent et d’or,
- type: usfm
  marker: q1
  children:
  - type: text
    text: fabriquées par des hommes.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Elles ont une bouche ╵mais ne peuvent parler !
- type: usfm
  marker: q1
  children:
  - type: text
    text: Elles ont bien des yeux, ╵mais elles ne voient pas.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Elles ont des oreilles, ╵mais qui n’entendent rien ;
- type: usfm
  marker: q1
  children:
  - type: text
    text: elles ont des narines ╵mais qui ne sentent rien.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Elles ont bien des mains, ╵mais ne peuvent toucher ;
- type: usfm
  marker: q1
  children:
  - type: text
    text: elles ont bien des pieds, ╵mais ne peuvent marcher.
- type: usfm
  marker: q1
  children:
  - type: text
    text: De leur gorge, jamais ╵aucun son ne s’échappe.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Ils leur ressemblent, ╵tous ceux qui les fabriquent,
- type: usfm
  marker: q1
  children:
  - type: text
    text: tous ceux qui mettent leur confiance en elles
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '115.8 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Pour les v. 4-8, voir '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 135.15-18
        metadata:
          usfm: PSA.135.15+PSA.135.16+PSA.135.17+PSA.135.18
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Gens d’Israël, ╵mettez votre confiance ╵en l’Eternel !
- type: usfm
  marker: q1
  children:
  - type: text
    text: Il est votre secours ╵et votre bouclier.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Descendants d’Aaron
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '115.10 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'C’est-à-dire les prêtres (voir '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ex 28.1
        metadata:
          usfm: EXO.28.1
      - type: text
        text: ', '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '43'
        metadata:
          usfm: EXO.28.43
      - type: text
        text: ).
    marker-yv: yv-n
  - type: text
    text: ', ╵mettez votre confiance ╵en l’Eternel !'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Il est votre secours ╵et votre bouclier.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Et vous qui craignez l’Eternel, ╵mettez votre confiance ╵en l’Eternel !
- type: usfm
  marker: q1
  children:
  - type: text
    text: Il est votre secours ╵et votre bouclier.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'L’Eternel s’occupe de nous : ╵il bénira ;'
- type: usfm
  marker: q1
  children:
  - type: text
    text: il bénira ╵le peuple d’Israël.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Il bénira ╵la descendance d’Aaron.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Il bénira ╵tous ceux qui craignent l’Eternel,
- type: usfm
  marker: q1
  children:
  - type: text
    text: du plus petit ╵jusqu’au plus grand.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Que l’Eternel ╵vous multiplie,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et vous et vos enfants !
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Soyez bénis par l’Eternel
- type: usfm
  marker: q1
  children:
  - type: text
    text: qui a fait le ciel et la terre !
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Le ciel ? Il appartient à l’Eternel ;
- type: usfm
  marker: q1
  children:
  - type: text
    text: quant à la terre, ╵il l’a donnée aux hommes.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Les morts ne louent pas l’Eternel,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ni aucun de ceux qui descendent ╵au pays du silence.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Quant à nous, nous bénirons l’Eternel,
- type: usfm
  marker: q1
  children:
  - type: text
    text: dès maintenant ╵et à jamais.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Louez l’Eternel !
