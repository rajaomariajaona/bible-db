document_id: PSA.115,21
type_code: fra
verses:
  '1':
  - type: heading
    content: A Dieu seul la gloire !
  - type: text
    content: Non pas à nous, ╵ô Eternel, ╵non pas à nous,
  - type: text
    content: mais à toi seul la gloire,
  - type: text
    content: pour ton amour ╵et ta fidélité !
  '10':
  - type: text
    content: Descendants d’Aaron
  - type: note
    content: C’est-à-dire les prêtres (voir Ex 28.1, 43).
  - type: text
    content: ', ╵mettez votre confiance ╵en l’Eternel !'
  - type: text
    content: Il est votre secours ╵et votre bouclier.
  '11':
  - type: text
    content: Et vous qui craignez l’Eternel, ╵mettez votre confiance ╵en l’Eternel !
  - type: text
    content: Il est votre secours ╵et votre bouclier.
  '12':
  - type: text
    content: 'L’Eternel s’occupe de nous : ╵il bénira ;'
  - type: text
    content: il bénira ╵le peuple d’Israël.
  - type: text
    content: Il bénira ╵la descendance d’Aaron.
  '13':
  - type: text
    content: Il bénira ╵tous ceux qui craignent l’Eternel,
  - type: text
    content: du plus petit ╵jusqu’au plus grand.
  '14':
  - type: text
    content: Que l’Eternel ╵vous multiplie,
  - type: text
    content: et vous et vos enfants !
  '15':
  - type: text
    content: Soyez bénis par l’Eternel
  - type: text
    content: qui a fait le ciel et la terre !
  '16':
  - type: text
    content: Le ciel ? Il appartient à l’Eternel ;
  - type: text
    content: quant à la terre, ╵il l’a donnée aux hommes.
  '17':
  - type: text
    content: Les morts ne louent pas l’Eternel,
  - type: text
    content: ni aucun de ceux qui descendent ╵au pays du silence.
  '18':
  - type: text
    content: Quant à nous, nous bénirons l’Eternel,
  - type: text
    content: dès maintenant ╵et à jamais.
  - type: text
    content: Louez l’Eternel !
  '2':
  - type: text
    content: 'Pourquoi les autres peuples diraient-ils :'
  - type: text
    content: « Où est leur Dieu ? »
  '3':
  - type: text
    content: Notre Dieu est au ciel,
  - type: text
    content: il fait tout ce qu’il veut.
  '4':
  - type: text
    content: Mais leurs idoles sont d’argent et d’or,
  - type: text
    content: fabriquées par des hommes.
  '5':
  - type: text
    content: Elles ont une bouche ╵mais ne peuvent parler !
  - type: text
    content: Elles ont bien des yeux, ╵mais elles ne voient pas.
  '6':
  - type: text
    content: Elles ont des oreilles, ╵mais qui n’entendent rien ;
  - type: text
    content: elles ont des narines ╵mais qui ne sentent rien.
  '7':
  - type: text
    content: Elles ont bien des mains, ╵mais ne peuvent toucher ;
  - type: text
    content: elles ont bien des pieds, ╵mais ne peuvent marcher.
  - type: text
    content: De leur gorge, jamais ╵aucun son ne s’échappe.
  '8':
  - type: text
    content: Ils leur ressemblent, ╵tous ceux qui les fabriquent,
  - type: text
    content: tous ceux qui mettent leur confiance en elles
  - type: note
    content: Pour les v. 4-8, voir 135.15-18.
  - type: text
    content: .
  '9':
  - type: text
    content: Gens d’Israël, ╵mettez votre confiance ╵en l’Eternel !
  - type: text
    content: Il est votre secours ╵et votre bouclier.
