document_id: PHM.1,21
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Salutation
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: Paul, le prisonnier de Jésus-Christ, et Timothée, notre frère, saluent Philémon
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1.1 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Un fils spirituel de Paul (v. 19), chrétien fortuné de Colosses chez qui se réunissait l’Eglise (v. 2).
      marker-yv: yv-n
    - type: text
      text: ', notre cher ami et notre collaborateur, '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'Je t’adresse cette demande au sujet de mon enfant, Onésime, dont je suis devenu le père spirituel ici, en prison. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: Autrefois il t’était inutile, mais maintenant il est utile
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1.11 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Jeu de mots sur le nom d’Onésime (= utile).
      marker-yv: yv-n
    - type: text
      text: ', à toi comme à moi.'
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: Je te le renvoie donc, lui qui est devenu comme une partie de moi-même
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1.12 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Certains manuscrits ont : '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: et toi, reçois-le comme s’il était une partie de moi-même.
      marker-yv: yv-n
    - type: text
      text: '. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'Personnellement, je l’aurais volontiers gardé auprès de moi : il aurait pu ainsi me rendre service à ta place alors que je suis en prison à cause de l’Evangile. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: Je n’ai cependant rien voulu entreprendre sans ton assentiment, pour que le bienfait que tu m’aurais ainsi accordé ne soit pas forcé, même en apparence, mais entièrement volontaire.
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'D’ailleurs, qui sait, peut-être Onésime a-t-il été séparé de toi pour un temps afin que tu le retrouves pour toujours, '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'non plus comme un esclave, mais bien mieux qu’un esclave : comme un frère très cher. Il l’est tellement pour moi ; combien plus le sera-t-il pour toi, en tant qu’homme et en tant que frère dans le Seigneur.'
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'Par solidarité envers moi, accueille-le comme s’il s’agissait de moi-même. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: Si tu as été lésé par lui ou s’il te doit quelque chose, porte cela sur mon compte
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1.18 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Peut-être qu’en s’enfuyant de chez Philémon, Onésime avait commis quelque larcin. Paul propose à Philémon de le rembourser lui-même.
      marker-yv: yv-n
    - type: text
      text: '. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'J’écris ce qui suit de ma propre main : « Moi Paul, je te rembourserai ses dettes » – et je ne veux pas te rappeler ici que toi aussi, tu as une dette à mon égard : c’est ta propre personne.'
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: ainsi qu’Appia
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1.2 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Sans doute la femme de Philémon. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'Archippe, '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: sans doute leur fils, exerçait un ministère dans l’Eglise à Colosses.
      marker-yv: yv-n
    - type: text
      text: ' notre sœur, Archippe notre compagnon d’armes, et l’Eglise qui s’assemble dans ta maison.'
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: 'Oui, frère, fais-moi cette faveur à cause du Seigneur : réconforte mon cœur pour l’amour de Christ. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: Je t’adresse cette lettre avec la certitude que tu répondras à mon attente. Et même, je le sais, tu feras encore plus que je ne demande
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1.21 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: On a vu dans ces mots une invitation discrète à affranchir Onésime ou à le laisser au service de l’apôtre (v. 13). La tradition rapporte que Philémon l’aurait affranchi et que l’ancien esclave serait devenu plus tard l’un des responsables de l’Eglise d’Ephèse.
      marker-yv: yv-n
    - type: text
      text: .
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: En même temps, prépare-moi une chambre ; j’ai bon espoir de vous être rendu bientôt, en réponse à vos prières.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Salutations finales
    marker-yv: yv-h
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: 'Epaphras, qui est en prison avec moi à cause de Jésus-Christ, te fait bien saluer, '
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: de même que Marc, Aristarque, Démas et Luc, mes collaborateurs.
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: Que le Seigneur Jésus-Christ vous accorde sa grâce.
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: Que Dieu notre Père et le Seigneur Jésus-Christ vous accordent la grâce et la paix.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Paul remercie Dieu pour la foi et l’amour de Philémon
    marker-yv: yv-h
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'Je ne cesse d’exprimer ma reconnaissance à Dieu lorsque je fais mention de toi dans mes prières, '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'car j’entends parler de l’amour et de la foi dont tu fais preuve envers le Seigneur Jésus et envers tous les membres du peuple saint. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: Je demande à Dieu que la solidarité qui nous unit à cause de ta foi se traduise en actes et qu’ainsi tout le bien que nous t’aurons amené à faire pour Christ soit rendu manifeste
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1.6 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Autre traduction : '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: que la communion qui t’unit à nous à cause de ta foi produise une meilleure connaissance de tous les biens que nous avons de par notre union avec Christ.
      marker-yv: yv-n
    - type: text
      text: '. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: Car j’ai éprouvé une grande joie et un grand encouragement en apprenant comment tu mets ton amour en pratique. Frère, tu as en effet réconforté le cœur de ceux qui font partie du peuple saint.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Requête
    marker-yv: yv-h
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'C’est pourquoi, malgré toute la liberté que Christ me donne de te prescrire ton devoir, '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'je préfère t’adresser cette demande au nom de l’amour, étant ce que je suis : moi, Paul, un vieillard, et de plus, maintenant, un prisonnier à cause de Jésus-Christ. '
