document_id: PHM.1,21
type_code: fra
verses:
  '1':
  - type: heading
    content: Salutation
  - type: text
    content: Paul, le prisonnier de Jésus-Christ, et Timothée, notre frère, saluent Philémon
  - type: note
    content: Un fils spirituel de Paul (v. 19), chrétien fortuné de Colosses chez qui se réunissait l’Eglise (v. 2).
  - type: text
    content: ', notre cher ami et notre collaborateur, '
  '10':
  - type: text
    content: 'Je t’adresse cette demande au sujet de mon enfant, Onésime, dont je suis devenu le père spirituel ici, en prison. '
  '11':
  - type: text
    content: Autrefois il t’était inutile, mais maintenant il est utile
  - type: note
    content: Jeu de mots sur le nom d’Onésime (= utile).
  - type: text
    content: ', à toi comme à moi.'
  '12':
  - type: text
    content: Je te le renvoie donc, lui qui est devenu comme une partie de moi-même
  - type: note
    content: 'Certains manuscrits ont : et toi, reçois-le comme s’il était une partie de moi-même.'
  - type: text
    content: '. '
  '13':
  - type: text
    content: 'Personnellement, je l’aurais volontiers gardé auprès de moi : il aurait pu ainsi me rendre service à ta place alors que je suis en prison à cause de l’Evangile. '
  '14':
  - type: text
    content: Je n’ai cependant rien voulu entreprendre sans ton assentiment, pour que le bienfait que tu m’aurais ainsi accordé ne soit pas forcé, même en apparence, mais entièrement volontaire.
  '15':
  - type: text
    content: 'D’ailleurs, qui sait, peut-être Onésime a-t-il été séparé de toi pour un temps afin que tu le retrouves pour toujours, '
  '16':
  - type: text
    content: 'non plus comme un esclave, mais bien mieux qu’un esclave : comme un frère très cher. Il l’est tellement pour moi ; combien plus le sera-t-il pour toi, en tant qu’homme et en tant que frère dans le Seigneur.'
  '17':
  - type: text
    content: 'Par solidarité envers moi, accueille-le comme s’il s’agissait de moi-même. '
  '18':
  - type: text
    content: Si tu as été lésé par lui ou s’il te doit quelque chose, porte cela sur mon compte
  - type: note
    content: Peut-être qu’en s’enfuyant de chez Philémon, Onésime avait commis quelque larcin. Paul propose à Philémon de le rembourser lui-même.
  - type: text
    content: '. '
  '19':
  - type: text
    content: 'J’écris ce qui suit de ma propre main : « Moi Paul, je te rembourserai ses dettes » – et je ne veux pas te rappeler ici que toi aussi, tu as une dette à mon égard : c’est ta propre personne.'
  '2':
  - type: text
    content: ainsi qu’Appia
  - type: note
    content: Sans doute la femme de Philémon. Archippe, sans doute leur fils, exerçait un ministère dans l’Eglise à Colosses.
  - type: text
    content: ' notre sœur, Archippe notre compagnon d’armes, et l’Eglise qui s’assemble dans ta maison.'
  '20':
  - type: text
    content: 'Oui, frère, fais-moi cette faveur à cause du Seigneur : réconforte mon cœur pour l’amour de Christ. '
  '21':
  - type: text
    content: Je t’adresse cette lettre avec la certitude que tu répondras à mon attente. Et même, je le sais, tu feras encore plus que je ne demande
  - type: note
    content: On a vu dans ces mots une invitation discrète à affranchir Onésime ou à le laisser au service de l’apôtre (v. 13). La tradition rapporte que Philémon l’aurait affranchi et que l’ancien esclave serait devenu plus tard l’un des responsables de l’Eglise d’Ephèse.
  - type: text
    content: .
  '22':
  - type: text
    content: En même temps, prépare-moi une chambre ; j’ai bon espoir de vous être rendu bientôt, en réponse à vos prières.
  - type: heading
    content: Salutations finales
  '23':
  - type: text
    content: 'Epaphras, qui est en prison avec moi à cause de Jésus-Christ, te fait bien saluer, '
  '24':
  - type: text
    content: de même que Marc, Aristarque, Démas et Luc, mes collaborateurs.
  '25':
  - type: text
    content: Que le Seigneur Jésus-Christ vous accorde sa grâce.
  '3':
  - type: text
    content: Que Dieu notre Père et le Seigneur Jésus-Christ vous accordent la grâce et la paix.
  - type: heading
    content: Paul remercie Dieu pour la foi et l’amour de Philémon
  '4':
  - type: text
    content: 'Je ne cesse d’exprimer ma reconnaissance à Dieu lorsque je fais mention de toi dans mes prières, '
  '5':
  - type: text
    content: 'car j’entends parler de l’amour et de la foi dont tu fais preuve envers le Seigneur Jésus et envers tous les membres du peuple saint. '
  '6':
  - type: text
    content: Je demande à Dieu que la solidarité qui nous unit à cause de ta foi se traduise en actes et qu’ainsi tout le bien que nous t’aurons amené à faire pour Christ soit rendu manifeste
  - type: note
    content: 'Autre traduction : que la communion qui t’unit à nous à cause de ta foi produise une meilleure connaissance de tous les biens que nous avons de par notre union avec Christ.'
  - type: text
    content: '. '
  '7':
  - type: text
    content: Car j’ai éprouvé une grande joie et un grand encouragement en apprenant comment tu mets ton amour en pratique. Frère, tu as en effet réconforté le cœur de ceux qui font partie du peuple saint.
  - type: heading
    content: Requête
  '8':
  - type: text
    content: 'C’est pourquoi, malgré toute la liberté que Christ me donne de te prescrire ton devoir, '
  '9':
  - type: text
    content: 'je préfère t’adresser cette demande au nom de l’amour, étant ce que je suis : moi, Paul, un vieillard, et de plus, maintenant, un prisonnier à cause de Jésus-Christ. '
