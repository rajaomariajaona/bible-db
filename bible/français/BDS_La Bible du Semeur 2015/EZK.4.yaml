document_id: EZK.4,21
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: L’annonce de la fin de Jérusalem et de Juda
    marker-yv: yv-h
  - type: usfm
    marker: s2
    children:
    - type: text
      text: La fin de Jérusalem
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: Et maintenant, fils d’homme, prends une brique
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '4.1 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Les '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'briques '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: servaient aussi de tableau pour dessiner ou pour écrire. On y gravait des signes quand elles étaient molles et on les cuisait pour conserver l’écrit. On a retrouvé des milliers de telles briques gravées à Ninive et à Babylone.
      marker-yv: yv-n
    - type: text
      text: ', pose-la devant toi et grave dessus le dessin d’une ville : Jérusalem. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'Ta ration journalière de nourriture sera de deux cent vingt grammes et tu en consommeras de temps en temps. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'L’eau te sera mesurée à un litre par jour ; tu en boiras de temps en temps. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: Tu prendras ta nourriture sous forme de galettes d’orge que tu cuiras devant tout le monde sur un feu alimenté avec des excréments humains.
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'Et l’Eternel ajouta : C’est ainsi que les Israélites mangeront leur pain impur, au milieu des peuples chez qui je les chasserai.'
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'Je m’écriai : Ah ! Seigneur Eternel, depuis mon enfance jusqu’à ce jour, je ne me suis jamais rendu impur en mangeant d’une bête crevée ou déchirée par un fauve, et aucune viande impure n’a pénétré dans ma bouche'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '4.14 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Voir Lv 17.15 ; Dt 14.21.
      marker-yv: yv-n
    - type: text
      text: .
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'Alors l’Eternel me dit : Je te concède de remplacer les excréments humains par de la bouse de vache pour faire cuire ta nourriture.'
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'Il me dit encore : Fils d’homme, je vais supprimer toute réserve de pain dans Jérusalem. Ses habitants mangeront dans l’angoisse du pain strictement rationné et ils boiront dans la détresse de l’eau en quantité mesurée. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: Ils manqueront de pain et d’eau, ils seront tous ensemble épouvantés et ils dépériront à cause de leur péché.
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'Ensuite, tu mettras le siège devant elle ; tu construiras contre elle des terrassements, tu élèveras contre elle des terrasses de siège, tu placeras des campements en face d’elle, et tu disposeras tout autour d’elle des machines de guerre. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: Puis tu prendras une plaque de cuisson en fer, tu la disposeras comme un mur de fer entre toi et la ville, et tu tourneras ta face contre elle. La ville sera en état de siège, et c’est toi qui l’assiégeras. Tout cela devra servir de signe à la communauté d’Israël.
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: Couche-toi ensuite sur ton côté gauche ; étant sur ce côté, tu prendras sur toi le péché
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '4.4 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Action symbolique du prophète (voir '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: Nb 14.34
        - type: text
          text: ).
      marker-yv: yv-n
    - type: text
      text: ' de la communauté d’Israël. Tu porteras leur péché autant de jours que tu seras couché sur ce côté-là. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: Je te fixe moi-même un nombre de jours équivalent au nombre d’années durant lesquelles le royaume d’Israël a péché, c’est-à-dire trois cent quatre-vingt-dix jours
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '4.5 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Ces '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: '390 jours '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'pourraient représenter la période allant de l’infidélité de Salomon (suivie du schisme du royaume) à la destruction de Jérusalem, chiffre que l’on obtient en additionnant les années de règne indiquées par les livres des Rois. Les '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: '40 jours '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'du v. 6 pourraient représenter le long règne apostat de Manassé. Ces nombres pourraient aussi être symboliques. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: '40 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'représente le temps du jugement, le temps du désert (Nb 14.32-34 ; Ez 20.35-36) ; en additionnant '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: '390 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'et '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: '40'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', on obtient 430, c.-à-d. le temps de l’esclavage en Egypte ('
        - type: usfm
          marker: ref
          children:
          - type: text
            text: Ex 12.40
        - type: text
          text: ') : une façon de dire que l’exil sera un nouveau désert et un nouvel esclavage. L’ancienne version grecque a '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: '190 jours '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: au v. 5. Cette version viserait la période s’écoulant de la déportation sous Tiglath-Piléser en 734 av. J.-C. (
        - type: usfm
          marker: ref
          children:
          - type: text
            text: 2 R 15.29
        - type: text
          text: ) jusqu’à la prise de Jérusalem en 587 (148 ans, environ 150 ans). Les 40 ans en plus pour Juda – ce qui fait 190 en tout – correspondraient en gros à la période de l’exil de Juda à Babylone.
      marker-yv: yv-n
    - type: text
      text: '  ; ainsi, tu porteras le péché de la communauté d’Israël.'
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'Après la fin de cette période, tu te coucheras cette fois sur le côté droit, et tu porteras le péché du royaume de Juda pendant quarante jours. Je t’impose un jour pour chaque année où il a péché. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'Tu tourneras ta face et tu dirigeras ton bras nu contre Jérusalem assiégée et tu prophétiseras contre elle. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: Je vais te lier avec des cordes pour que tu ne puisses pas te tourner d’un côté sur l’autre, jusqu’à ce que tu aies achevé ta période de siège.
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: Et maintenant, prends du blé, de l’orge, des fèves, des lentilles, du millet et de l’épeautre, mets le tout dans un même récipient et fais-en ta nourriture. C’est là ce que tu mangeras tout au long des trois cent quatre-vingt-dix jours
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '4.9 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Voir v. 5 et note.
      marker-yv: yv-n
    - type: text
      text: ' où tu seras couché sur le côté. '
