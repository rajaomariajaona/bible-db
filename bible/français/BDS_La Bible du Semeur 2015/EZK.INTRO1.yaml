type_code: fra
verses:
  '1':
  - type: text
    content: Introduction
  - type: text
    content: Ezéchiel a fait partie du convoi de dix mille déportés (2 R 24.14) emmenés par Nabuchodonosor lors du siège de Jérusalem en 597, destiné à mater la rébellion que le roi de Juda Yehoyaqim avait lancée dès 602 contre le roi de Babylone. Dix ans plus tard, en 587, après une nouvelle révolte, soutenue par l’Egypte, de Sédécias, roi de Juda, Nabuchodonosor détruira la ville et son temple, et en déportera massivement la population.
  - type: text
    content: 'C’est en exil, à Tel-Aviv sur les bords du canal du Kebar où il réside (1.1 ; 3.15), qu’Ezéchiel a exercé le ministère de porte-parole de l’Eternel pendant une vingtaine d’années (1.1 ; 40.1 et notes). Là, les déportés étaient libres et pouvaient mener une vie normale : ils possédaient des maisons et des terres (3.24 ; 8.1), avaient leurs propres responsables (20.1) et ils entretenaient des relations avec le royaume de Juda avant sa disparition en 587 (Jr 29).'
  - type: text
    content: 'L’Eternel appelle Ezéchiel à devenir prophète en 593 (1.1-2), à trente ans, sans doute, âge auquel il aurait dû remplir la fonction de prêtre (1.3). Son ministère se divise en deux périodes que séparent le siège et la prise de Jérusalem (24.1 ; 33.21) et auxquelles correspondent les deux principales parties du livre (chap. 1 à 24 et 33 à 48), qui sont entrecoupées par les prophéties sur les peuples païens (chap. 25 à 32). Avant 587, les Judéens exilés s’imaginaient que Jérusalem serait épargnée et qu’ils rentreraient bientôt au pays. Ezéchiel s’emploie à détruire leurs illusions en annonçant la ruine inéluctable de Jérusalem à cause de sa « prostitution » religieuse (chap. 23). Après 587, les exilés perdent tout espoir et le prophète reçoit un message d’espérance : la nation revivra. Autrefois divisé en deux royaumes, le peuple uni rentrera d’exil et habitera de nouveau son pays (37.15-28). Mais cette résurrection ne sera pas seulement politique et territoriale. Ezéchiel entrevoit un retour à la vie plus profond encore : l’Esprit, ce « vent » qui « souffle où il veut » et dont on entend le « bruit » (37.7, 9), ainsi que le rappellera Jésus (Jn 3.8), renouvellera la nation tout entière. Il sera répandu sur le peuple telle une eau pure qui le fera naître à de nouvelles motivations (36.25-27 ; Jn 3.5).'
  - type: text
    content: La prophétie d’Ezéchiel est comme ponctuée par les déplacements de la gloire de l’Eternel, symbole de la grandeur et de la présence de Dieu. Elle apparaît au prophète lors de son appel. Quand la sentence tombe contre Jérusalem et contre son temple, la gloire de l’Eternel, qui avait envahi le Temple au moment de sa dédicace sous Salomon (1 R 8.10-11), se retire du dessus du coffre de l’alliance (9.3). Elle se dirige alors vers l’entrée du Temple (10.18-19) puis quitte l’édifice et Jérusalem pour se placer sur le mont des Oliviers, à l’est de la ville (11.22-23). Dans sa vision de la nouvelle Jérusalem et du nouveau temple, situés au sein d’une nouvelle création (chap. 40 à 48), le prophète verra la gloire revenir de l’est (43.1-3) pour remplir à nouveau le Temple (44.4). Jésus-Christ, gloire de l’Eternel (Jn 1.14), se retirera lui aussi sur le mont des Oliviers (Mt 21.17 ; Lc 21.37). Mais, un jour, la gloire de Dieu, déjà présente dans l’Eglise (1 Co 3.16), habitera la Nouvelle Jérusalem (Ap 21.10-11).
