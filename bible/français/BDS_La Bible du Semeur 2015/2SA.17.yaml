document_id: 2SA.17,21
type_code: fra
verses:
  '1':
  - type: heading
    content: L’Eternel rend les conseils d’Ahitophel inefficaces
  - type: text
    content: 'Peu après, Ahitophel fit à Absalom la proposition suivante : Permets-moi de lever douze mille hommes et je me lancerai cette nuit même à la poursuite de David. '
  '10':
  - type: text
    content: 'Alors, même les braves au cœur de lion se décourageront ; car tout Israël sait que ton père est aguerri et qu’il a à ses côtés des hommes valeureux. '
  '11':
  - type: text
    content: 'C’est pourquoi je propose autre chose : Que tout Israël depuis Dan jusqu’à Beer-Sheva soit mobilisé autour de toi ; tu auras une armée aussi nombreuse que les grains de sable des plages, tu te mettras à leur tête et tu iras personnellement au combat. '
  '12':
  - type: text
    content: 'Nous traquerons David en quelque lieu qu’il se cache et nous tomberons sur lui comme la rosée tombe sur le sol ; ni lui ni aucun de ses compagnons ne nous échappera. '
  '13':
  - type: text
    content: S’il se réfugie dans une ville, tout Israël apportera des cordes et nous traînerons cette ville dans le torrent voisin jusqu’à ce qu’il n’en reste pas même un caillou.
  '14':
  - type: text
    content: 'Absalom et tous les hommes d’Israël déclarèrent : Le conseil de Houshaï l’Arkien est meilleur que celui d’Ahitophel.'
  - type: text
    content: L’Eternel avait, en effet, décidé de faire échec au bon conseil d’Ahitophel afin d’amener le malheur sur Absalom.
  - type: heading
    content: David passe à l’est du Jourdain
  '15':
  - type: text
    content: Houshaï alla rapporter aux prêtres Tsadoq et Abiatar ce qu’Ahitophel avait conseillé à Absalom et aux responsables d’Israël, et ce que lui-même avait ensuite proposé.
  '16':
  - type: text
    content: – Et maintenant, ajouta-t-il, envoyez prévenir David de toute urgence. Faites-lui dire qu’il ne reste pas cette nuit-là dans les steppes du désert, mais qu’il passe le Jourdain avant le matin, sinon il risque d’être exterminé avec tous ceux qui l’accompagnent.
  '17':
  - type: text
    content: Jonathan et Ahimaats se tenaient à Eyn-Roguel
  - type: note
    content: Source située dans la vallée du Cédron au sud-est de Jérusalem, près des murailles de la ville.
  - type: text
    content: '  ; une servante devait aller leur porter le message, et eux devaient aller le transmettre au roi David. Car ils ne devaient pas entrer dans la ville, pour ne pas se faire voir. '
  '18':
  - type: text
    content: 'Mais un jeune homme les aperçut et signala leur présence à Absalom. Les deux messagers partirent en hâte et se rendirent à la maison d’un homme de Bahourim qui avait une citerne dans sa cour ; ils y descendirent pour se cacher. '
  '19':
  - type: text
    content: 'La maîtresse de maison prit une couverture et l’étendit sur l’ouverture de la citerne puis elle répandit par-dessus du grain concassé pour qu’on ne se doute de rien. '
  '2':
  - type: text
    content: 'Je fondrai sur lui pendant qu’il est exténué et à bout de forces, je provoquerai la panique chez lui, tous ceux qui sont avec lui s’enfuiront ; comme le roi sera isolé, je le tuerai '
  '20':
  - type: text
    content: 'Les envoyés d’Absalom entrèrent chez la femme et demandèrent : Où sont Ahimaats et Jonathan ?'
  - type: text
    content: 'La femme répondit : Ils ont passé l’eau'
  - type: note
    content: 'Phrase ambiguë qui exprime la vérité : ils sont au-dessus de l’eau (du puits) mais qui a été comprise par les envoyés d’Absalom : ils ont passé la rivière.'
  - type: text
    content: .
  - type: text
    content: 'Ils les cherchèrent sans succès puis rentrèrent à Jérusalem. '
  '21':
  - type: text
    content: Après leur départ, les deux messagers sortirent de la citerne et partirent informer le roi David.
  - type: text
    content: – Mettez-vous en route, lui dirent-ils, dépêchez-vous de traverser la rivière, car voici ce qu’Ahitophel a conseillé de faire contre vous !
  '22':
  - type: text
    content: David et tous les gens qui étaient avec lui se mirent en route et traversèrent le Jourdain ; avant que le jour paraisse, ils avaient tous passé.
  '23':
  - type: text
    content: Quand Ahitophel vit qu’on ne suivait pas son conseil, il sella son âne et se mit en route pour retourner chez lui dans sa ville. Il mit ses affaires en ordre, puis se pendit et mourut. Il fut enterré dans le tombeau de son père.
  '24':
  - type: text
    content: David avait gagné Mahanaïm
  - type: note
    content: A une dizaine de kilomètres à l’est du Jourdain (voir 2.8).
  - type: text
    content: '. Pendant ce temps, Absalom franchit le Jourdain avec tous les Israélites qui étaient avec lui. '
  '25':
  - type: text
    content: Il avait nommé Amasa chef de l’armée, en remplacement de Joab. Cet Amasa était fils d’un Israélite
  - type: note
    content: 'Selon le texte hébreu traditionnel et certains manuscrits de l’ancienne version grecque. D’autres manuscrits de cette ancienne version et 1 Ch 2.17 ont : un Ismaélite.'
  - type: text
    content: ' nommé Yitra qui avait eu une relation avec Abigaïl, fille de Nahash, sœur de Tserouya, la mère de Joab. '
  '26':
  - type: text
    content: Absalom et les Israélites établirent leur campement dans le pays de Galaad.
  '27':
  - type: text
    content: Lorsque David arriva à Mahanaïm, il fut accueilli par Shovi, fils de Nahash de Rabba des Ammonites, Makir, fils d’Ammiel de Lo-Debar
  - type: note
    content: Makir qui avait recueilli Mephibosheth (9.4).
  - type: text
    content: ' et Barzillaï, le Galaadite de Roguelim. '
  '28':
  - type: text
    content: 'Ils apportèrent du matériel de couchage, des lainages et de la vaisselle, du blé, de l’orge, de la farine, des épis grillés, des fèves, des lentilles, '
  '29':
  - type: text
    content: 'du miel, du lait caillé et du fromage pour ravitailler David et ses gens, car ils se disaient : Ces gens doivent être exténués par leur marche à travers le désert, ils ont sûrement faim et soif.'
  '3':
  - type: text
    content: et je rallierai tous ses hommes à toi ; le retour de tous vaut bien l’homme que tu recherches ! Et tout le peuple vivra en paix.
  '4':
  - type: text
    content: 'Cette proposition parut juste à Absalom et à tous les responsables d’Israël. '
  '5':
  - type: text
    content: 'Cependant Absalom ordonna : Appelle encore Houshaï l’Arkien pour que nous sachions ce qu’il en pense.'
  '6':
  - type: text
    content: 'Houshaï entra chez Absalom qui lui demanda : Voici ce qu’Ahitophel propose. Devons-nous faire ce qu’il dit ou bien es-tu d’un autre avis ?'
  '7':
  - type: text
    content: 'Houshaï répondit : Pour une fois, le conseil d’Ahitophel n’est pas bon. '
  '8':
  - type: text
    content: 'Tu connais bien ton père, poursuivit-il, ses hommes sont aguerris et ils sont furieux comme une ourse à qui on aurait pris ses petits en pleine campagne. Et puis, n’oublie pas que ton père est un homme qui a l’expérience de la guerre, il ne passera pas la nuit avec ses troupes. '
  '9':
  - type: text
    content: 'A l’heure qu’il est, il doit être caché dans une grotte ou dans quelque autre endroit retiré. Il suffirait que, dès le début, quelques-uns de tes soldats tombent sous leurs coups pour qu’aussitôt le bruit s’en répande et que l’on dise : « Il y a eu un carnage parmi les partisans d’Absalom ! » '
