document_id: 2SA.17
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: L’Eternel rend les conseils d’Ahitophel inefficaces
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Peu après, Ahitophel fit à Absalom la proposition suivante : Permets-moi de lever douze mille hommes et je me lancerai cette nuit même à la poursuite de David. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Je fondrai sur lui pendant qu’il est exténué et à bout de forces, je provoquerai la panique chez lui, tous ceux qui sont avec lui s’enfuiront ; comme le roi sera isolé, je le tuerai '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: et je rallierai tous ses hommes à toi ; le retour de tous vaut bien l’homme que tu recherches ! Et tout le peuple vivra en paix.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Cette proposition parut juste à Absalom et à tous les responsables d’Israël. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Cependant Absalom ordonna : Appelle encore Houshaï l’Arkien pour que nous sachions ce qu’il en pense.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Houshaï entra chez Absalom qui lui demanda : Voici ce qu’Ahitophel propose. Devons-nous faire ce qu’il dit ou bien es-tu d’un autre avis ?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Houshaï répondit : Pour une fois, le conseil d’Ahitophel n’est pas bon. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Tu connais bien ton père, poursuivit-il, ses hommes sont aguerris et ils sont furieux comme une ourse à qui on aurait pris ses petits en pleine campagne. Et puis, n’oublie pas que ton père est un homme qui a l’expérience de la guerre, il ne passera pas la nuit avec ses troupes. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'A l’heure qu’il est, il doit être caché dans une grotte ou dans quelque autre endroit retiré. Il suffirait que, dès le début, quelques-uns de tes soldats tombent sous leurs coups pour qu’aussitôt le bruit s’en répande et que l’on dise : « Il y a eu un carnage parmi les partisans d’Absalom ! » '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Alors, même les braves au cœur de lion se décourageront ; car tout Israël sait que ton père est aguerri et qu’il a à ses côtés des hommes valeureux. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'C’est pourquoi je propose autre chose : Que tout Israël depuis Dan jusqu’à Beer-Sheva soit mobilisé autour de toi ; tu auras une armée aussi nombreuse que les grains de sable des plages, tu te mettras à leur tête et tu iras personnellement au combat. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Nous traquerons David en quelque lieu qu’il se cache et nous tomberons sur lui comme la rosée tombe sur le sol ; ni lui ni aucun de ses compagnons ne nous échappera. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: S’il se réfugie dans une ville, tout Israël apportera des cordes et nous traînerons cette ville dans le torrent voisin jusqu’à ce qu’il n’en reste pas même un caillou.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Absalom et tous les hommes d’Israël déclarèrent : Le conseil de Houshaï l’Arkien est meilleur que celui d’Ahitophel.'
- type: usfm
  marker: p
  children:
  - type: text
    text: L’Eternel avait, en effet, décidé de faire échec au bon conseil d’Ahitophel afin d’amener le malheur sur Absalom.
- type: usfm
  marker: s1
  children:
  - type: text
    text: David passe à l’est du Jourdain
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Houshaï alla rapporter aux prêtres Tsadoq et Abiatar ce qu’Ahitophel avait conseillé à Absalom et aux responsables d’Israël, et ce que lui-même avait ensuite proposé.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: – Et maintenant, ajouta-t-il, envoyez prévenir David de toute urgence. Faites-lui dire qu’il ne reste pas cette nuit-là dans les steppes du désert, mais qu’il passe le Jourdain avant le matin, sinon il risque d’être exterminé avec tous ceux qui l’accompagnent.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Jonathan et Ahimaats se tenaient à Eyn-Roguel
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '17.17 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Source située dans la vallée du Cédron au sud-est de Jérusalem, près des murailles de la ville.
    marker-yv: yv-n
  - type: text
    text: '  ; une servante devait aller leur porter le message, et eux devaient aller le transmettre au roi David. Car ils ne devaient pas entrer dans la ville, pour ne pas se faire voir. '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Mais un jeune homme les aperçut et signala leur présence à Absalom. Les deux messagers partirent en hâte et se rendirent à la maison d’un homme de Bahourim qui avait une citerne dans sa cour ; ils y descendirent pour se cacher. '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'La maîtresse de maison prit une couverture et l’étendit sur l’ouverture de la citerne puis elle répandit par-dessus du grain concassé pour qu’on ne se doute de rien. '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Les envoyés d’Absalom entrèrent chez la femme et demandèrent : Où sont Ahimaats et Jonathan ?'
- type: usfm
  marker: p
  children:
  - type: text
    text: 'La femme répondit : Ils ont passé l’eau'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '17.20 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Phrase ambiguë qui exprime la vérité : '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'ils sont au-dessus de l’eau (du puits) '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'mais qui a été comprise par les envoyés d’Absalom : '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: ils ont passé la rivière.
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Ils les cherchèrent sans succès puis rentrèrent à Jérusalem. '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Après leur départ, les deux messagers sortirent de la citerne et partirent informer le roi David.
- type: usfm
  marker: p
  children:
  - type: text
    text: – Mettez-vous en route, lui dirent-ils, dépêchez-vous de traverser la rivière, car voici ce qu’Ahitophel a conseillé de faire contre vous !
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: David et tous les gens qui étaient avec lui se mirent en route et traversèrent le Jourdain ; avant que le jour paraisse, ils avaient tous passé.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: Quand Ahitophel vit qu’on ne suivait pas son conseil, il sella son âne et se mit en route pour retourner chez lui dans sa ville. Il mit ses affaires en ordre, puis se pendit et mourut. Il fut enterré dans le tombeau de son père.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: David avait gagné Mahanaïm
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '17.24 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'A une dizaine de kilomètres à l’est du Jourdain (voir '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '2.8'
        metadata:
          usfm: 2SA.2.8
      - type: text
        text: ).
    marker-yv: yv-n
  - type: text
    text: '. Pendant ce temps, Absalom franchit le Jourdain avec tous les Israélites qui étaient avec lui. '
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: Il avait nommé Amasa chef de l’armée, en remplacement de Joab. Cet Amasa était fils d’un Israélite
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '17.25 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Selon le texte hébreu traditionnel et certains manuscrits de l’ancienne version grecque. D’autres manuscrits de cette ancienne version et '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1 Ch 2.17
        metadata:
          usfm: 1CH.2.17
      - type: text
        text: ' ont : '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: un Ismaélite.
    marker-yv: yv-n
  - type: text
    text: ' nommé Yitra qui avait eu une relation avec Abigaïl, fille de Nahash, sœur de Tserouya, la mère de Joab. '
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: Absalom et les Israélites établirent leur campement dans le pays de Galaad.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: Lorsque David arriva à Mahanaïm, il fut accueilli par Shovi, fils de Nahash de Rabba des Ammonites, Makir, fils d’Ammiel de Lo-Debar
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '17.27 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Makir '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: qui avait recueilli Mephibosheth (
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '9.4'
        metadata:
          usfm: 2SA.9.4
      - type: text
        text: ).
    marker-yv: yv-n
  - type: text
    text: ' et Barzillaï, le Galaadite de Roguelim. '
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'Ils apportèrent du matériel de couchage, des lainages et de la vaisselle, du blé, de l’orge, de la farine, des épis grillés, des fèves, des lentilles, '
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'du miel, du lait caillé et du fromage pour ravitailler David et ses gens, car ils se disaient : Ces gens doivent être exténués par leur marche à travers le désert, ils ont sûrement faim et soif.'
