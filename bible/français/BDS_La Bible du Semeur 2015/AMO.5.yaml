document_id: AMO.5,21
type_code: fra
verses:
  '1':
  - type: heading
    content: Tournez-vous vers l’Eternel !
  - type: heading
    content: Elégie funèbre
  - type: text
    content: Ecoutez bien cette parole ╵que je profère contre vous,
  - type: text
    content: cette lamentation sur vous,
  - type: text
    content: 'gens d’Israël :'
  '10':
  - type: text
    content: Vous haïssez celui ╵qui défend le droit en justice,
  - type: text
    content: vous détestez celui ╵qui parle avec sincérité.
  '11':
  - type: text
    content: Par conséquent, ╵puisque vous exploitez le pauvre,
  - type: text
    content: et que vous lui prenez ╵du blé de sa récolte,
  - type: text
    content: à cause de cela, ╵les maisons en pierres de taille ╵que vous avez bâties,
  - type: text
    content: vous ne les habiterez pas.
  - type: text
    content: Ces vignes excellentes ╵que vous avez plantées,
  - type: text
    content: vous ne boirez pas de leur vin.
  '12':
  - type: text
    content: Car je connais ╵vos transgressions nombreuses,
  - type: text
    content: 'et vos péchés si graves :'
  - type: text
    content: vous opprimez le juste,
  - type: text
    content: vous acceptez des pots-de-vin
  - type: text
    content: et vous lésez le droit ╵des pauvres en justice.
  '13':
  - type: text
    content: Aussi, l’homme avisé ╵se tait en ce temps-ci,
  - type: text
    content: car ce temps est mauvais.
  '14':
  - type: text
    content: Efforcez-vous de faire ╵ce qui est bien ╵et non ce qui est mal,
  - type: text
    content: et vous vivrez
  - type: text
    content: et qu’ainsi l’Eternel, ╵Dieu des armées célestes, ╵soit vraiment avec vous,
  - type: text
    content: ainsi que vous le prétendez.
  '15':
  - type: text
    content: Haïssez donc le mal, ╵aimez ce qui est bien,
  - type: text
    content: et rétablissez le droit en justice.
  - type: text
    content: Alors, peut-être l’Eternel, ╵Dieu des armées célestes, ╵aura-t-il compassion
  - type: text
    content: du reste des descendants de Joseph.
  '16':
  - type: text
    content: 'Voici donc ce qu’annonce ╵le Seigneur, l’Eternel, ╵Dieu des armées célestes :'
  - type: text
    content: Sur toute place, ╵on se lamentera
  - type: text
    content: 'et, dans toutes les rues, ╵on s’écriera : « Hélas ! Hélas ! »'
  - type: text
    content: On conviera les paysans ╵à prendre part au deuil,
  - type: text
    content: et ceux qui savent des complaintes ╵à se joindre aux lamentations.
  '17':
  - type: text
    content: Et dans tous les vignobles, ╵on se lamentera
  - type: text
    content: car je passerai au milieu de toi,
  - type: text
    content: l’Eternel le déclare.
  - type: heading
    content: Contre l’assurance illusoire
  - type: heading
    content: Un jour de ténèbres
  '18':
  - type: text
    content: Malheur à vous qui désirez ╵que le jour de l’Eternel vienne !
  - type: text
    content: Mais savez-vous ╵ce qu’il sera pour vous, ╵le jour de l’Eternel ?
  - type: text
    content: Ce sera un jour de ténèbres ╵et non pas de lumière.
  '19':
  - type: text
    content: Vous serez comme un homme ╵qui fuit devant un lion
  - type: text
    content: et tombe sur un ours,
  - type: text
    content: ou qui, quand il entre chez lui, ╵appuie la main au mur,
  - type: text
    content: et un serpent le mord.
  '2':
  - type: text
    content: Elle est tombée,
  - type: text
    content: et ne se relèvera plus,
  - type: text
    content: la communauté d’Israël.
  - type: text
    content: Elle est étendue sur sa terre
  - type: text
    content: et nul ne la relève.
  '20':
  - type: text
    content: 'Soyez-en sûr : ╵le jour de l’Eternel ╵sera jour de ténèbres ╵et non pas de lumière ;'
  - type: text
    content: oui, ce sera un jour ╵d’obscurité profonde ╵sans aucune clarté.
  - type: heading
    content: Le culte formaliste
  '21':
  - type: text
    content: Je déteste vos fêtes, ╵je les ai en dégoût,
  - type: text
    content: je ne peux plus sentir ╵vos rassemblements cultuels
  - type: note
    content: Pour les v. 21-22, voir Es 1.11-14.
  - type: text
    content: .
  '22':
  - type: text
    content: Quand vous m’offrez des holocaustes, ╵quand vous m’apportez des offrandes,
  - type: text
    content: je ne les agrée pas
  - type: text
    content: et je ne peux pas voir
  - type: text
    content: ces bêtes engraissées ╵que vous m’offrez en sacrifices ╵de communion.
  '23':
  - type: text
    content: Eloignez donc de moi ╵le bruit de vos cantiques !
  - type: text
    content: Je ne veux plus entendre ╵le bruit que font vos luths.
  '24':
  - type: text
    content: Mais que le droit jaillisse ╵comme une source d’eau,
  - type: text
    content: que la justice coule ╵comme un torrent intarissable !
  '25':
  - type: text
    content: M’avez-vous présenté ╵des sacrifices, des offrandes,
  - type: text
    content: pendant les quarante ans ╵de votre séjour au désert, ╵vous, peuple d’Israël
  - type: note
    content: Les v. 25-27 sont cités en Ac 7.42-43 d’après l’ancienne version grecque.
  - type: text
    content: '  ?'
  '26':
  - type: text
    content: Mais vous avez porté Sikkouth ╵qui était votre roi,
  - type: text
    content: et Kiyoun, votre idole
  - type: note
    content: 'Sikkouth et Kiyoun: deux divinités assyriennes associées à la planète Saturne.'
  - type: text
    content: ','
  - type: text
    content: l’étoile de vos dieux
  - type: text
    content: que vous vous êtes fabriqués.
  '27':
  - type: text
    content: Voilà pourquoi ╵je vous déporterai ╵au-delà de Damas,
  - type: text
    content: 'dit l’Eternel, ╵celui qui a pour nom : ╵Dieu des armées célestes.'
  '3':
  - type: text
    content: 'Car voici ce que dit ╵le Seigneur, l’Eternel :'
  - type: text
    content: La ville qui levait ╵un millier de soldats
  - type: text
    content: n’en aura plus que cent.
  - type: text
    content: Et celle qui en levait cent
  - type: text
    content: n’en aura plus que dix
  - type: text
    content: pour la défense d’Israël.
  - type: heading
    content: Cherchez l’Eternel et vous vivrez
  '4':
  - type: text
    content: 'Voici ce que dit l’Eternel ╵au peuple d’Israël :'
  - type: text
    content: Tournez-vous donc vers moi ╵et vous vivrez.
  '5':
  - type: text
    content: N’allez pas chercher à Béthel,
  - type: text
    content: n’allez pas à Guilgal,
  - type: text
    content: et ne vous rendez pas à Beer-Sheva
  - type: note
    content: Siège d’un sanctuaire au sud du territoire de Juda, devenu un lieu d’idolâtrie.
  - type: text
    content: .
  - type: text
    content: Car Guilgal sera déporté
  - type: text
    content: et Béthel deviendra néant
  - type: note
    content: 'En hébreu : Aven. Voir Os 4.15 et note ; 5.8 ; 10.5, 8.'
  - type: text
    content: .
  '6':
  - type: text
    content: Tournez-vous donc vers l’Eternel ╵et vous vivrez,
  - type: text
    content: autrement, il fondra ╵tout comme un feu
  - type: text
    content: qui les consumera,
  - type: text
    content: sur les descendants de Joseph
  - type: text
    content: sans qu’il y ait à Béthel ╵quiconque pour l’éteindre.
  '7':
  - type: text
    content: Vous changez le droit en poison
  - type: text
    content: et vous renversez la justice.
  '8':
  - type: text
    content: Celui qui a créé ╵Orion et les Pléiades,
  - type: text
    content: qui transforme en aurore ╵les profondes ténèbres
  - type: text
    content: et qui réduit le jour ╵en une nuit obscure,
  - type: text
    content: qui fait venir ╵les eaux de l’océan
  - type: text
    content: pour les répandre ╵sur la surface de la terre.
  - type: text
    content: L’Eternel est son nom.
  '9':
  - type: text
    content: C’est lui qui fait venir ╵la ruine sur les gens puissants
  - type: text
    content: et la ruine fond sur la citadelle.
  - type: heading
    content: Injustices
