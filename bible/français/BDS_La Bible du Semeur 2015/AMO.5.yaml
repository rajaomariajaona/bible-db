document_id: AMO.5,21
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Tournez-vous vers l’Eternel !
    marker-yv: yv-h
  - type: usfm
    marker: s2
    children:
    - type: text
      text: Elégie funèbre
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ecoutez bien cette parole ╵que je profère contre vous,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: cette lamentation sur vous,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'gens d’Israël :'
  '10':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Vous haïssez celui ╵qui défend le droit en justice,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: vous détestez celui ╵qui parle avec sincérité.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Par conséquent, ╵puisque vous exploitez le pauvre,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et que vous lui prenez ╵du blé de sa récolte,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: à cause de cela, ╵les maisons en pierres de taille ╵que vous avez bâties,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: vous ne les habiterez pas.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ces vignes excellentes ╵que vous avez plantées,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: vous ne boirez pas de leur vin.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Car je connais ╵vos transgressions nombreuses,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'et vos péchés si graves :'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: vous opprimez le juste,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: vous acceptez des pots-de-vin
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et vous lésez le droit ╵des pauvres en justice.
  '13':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Aussi, l’homme avisé ╵se tait en ce temps-ci,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: car ce temps est mauvais.
  '14':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Efforcez-vous de faire ╵ce qui est bien ╵et non ce qui est mal,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et vous vivrez
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et qu’ainsi l’Eternel, ╵Dieu des armées célestes, ╵soit vraiment avec vous,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ainsi que vous le prétendez.
  '15':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Haïssez donc le mal, ╵aimez ce qui est bien,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et rétablissez le droit en justice.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Alors, peut-être l’Eternel, ╵Dieu des armées célestes, ╵aura-t-il compassion
  - type: usfm
    marker: q1
    children:
    - type: text
      text: du reste des descendants de Joseph.
  '16':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Voici donc ce qu’annonce ╵le Seigneur, l’Eternel, ╵Dieu des armées célestes :'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Sur toute place, ╵on se lamentera
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'et, dans toutes les rues, ╵on s’écriera : « Hélas ! Hélas ! »'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: On conviera les paysans ╵à prendre part au deuil,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et ceux qui savent des complaintes ╵à se joindre aux lamentations.
  '17':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et dans tous les vignobles, ╵on se lamentera
  - type: usfm
    marker: q1
    children:
    - type: text
      text: car je passerai au milieu de toi,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: l’Eternel le déclare.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Contre l’assurance illusoire
    marker-yv: yv-h
  - type: usfm
    marker: s2
    children:
    - type: text
      text: Un jour de ténèbres
    marker-yv: yv-h
  '18':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Malheur à vous qui désirez ╵que le jour de l’Eternel vienne !
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mais savez-vous ╵ce qu’il sera pour vous, ╵le jour de l’Eternel ?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ce sera un jour de ténèbres ╵et non pas de lumière.
  '19':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Vous serez comme un homme ╵qui fuit devant un lion
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et tombe sur un ours,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ou qui, quand il entre chez lui, ╵appuie la main au mur,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et un serpent le mord.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Elle est tombée,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et ne se relèvera plus,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: la communauté d’Israël.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Elle est étendue sur sa terre
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et nul ne la relève.
  '20':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Soyez-en sûr : ╵le jour de l’Eternel ╵sera jour de ténèbres ╵et non pas de lumière ;'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: oui, ce sera un jour ╵d’obscurité profonde ╵sans aucune clarté.
  - type: usfm
    marker: s2
    children:
    - type: text
      text: Le culte formaliste
    marker-yv: yv-h
  '21':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Je déteste vos fêtes, ╵je les ai en dégoût,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: je ne peux plus sentir ╵vos rassemblements cultuels
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '5.21 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Pour les v. 21-22, voir '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: Es 1.11-14
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: .
  '22':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Quand vous m’offrez des holocaustes, ╵quand vous m’apportez des offrandes,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: je ne les agrée pas
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et je ne peux pas voir
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ces bêtes engraissées ╵que vous m’offrez en sacrifices ╵de communion.
  '23':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Eloignez donc de moi ╵le bruit de vos cantiques !
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Je ne veux plus entendre ╵le bruit que font vos luths.
  '24':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mais que le droit jaillisse ╵comme une source d’eau,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: que la justice coule ╵comme un torrent intarissable !
  '25':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: M’avez-vous présenté ╵des sacrifices, des offrandes,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: pendant les quarante ans ╵de votre séjour au désert, ╵vous, peuple d’Israël
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '5.25 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Les v. 25-27 sont cités en '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: Ac 7.42-43
        - type: text
          text: ' d’après l’ancienne version grecque.'
      marker-yv: yv-n
    - type: text
      text: '  ?'
  '26':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mais vous avez porté Sikkouth ╵qui était votre roi,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et Kiyoun, votre idole
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '5.26 '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'Sikkouth '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'et '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Kiyoun
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: ': '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: deux divinités assyriennes associées à la planète Saturne.
      marker-yv: yv-n
    - type: text
      text: ','
  - type: usfm
    marker: q1
    children:
    - type: text
      text: l’étoile de vos dieux
  - type: usfm
    marker: q1
    children:
    - type: text
      text: que vous vous êtes fabriqués.
  '27':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Voilà pourquoi ╵je vous déporterai ╵au-delà de Damas,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'dit l’Eternel, ╵celui qui a pour nom : ╵Dieu des armées célestes.'
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Car voici ce que dit ╵le Seigneur, l’Eternel :'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: La ville qui levait ╵un millier de soldats
  - type: usfm
    marker: q1
    children:
    - type: text
      text: n’en aura plus que cent.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et celle qui en levait cent
  - type: usfm
    marker: q1
    children:
    - type: text
      text: n’en aura plus que dix
  - type: usfm
    marker: q1
    children:
    - type: text
      text: pour la défense d’Israël.
  - type: usfm
    marker: s2
    children:
    - type: text
      text: Cherchez l’Eternel et vous vivrez
    marker-yv: yv-h
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Voici ce que dit l’Eternel ╵au peuple d’Israël :'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tournez-vous donc vers moi ╵et vous vivrez.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: N’allez pas chercher à Béthel,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: n’allez pas à Guilgal,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et ne vous rendez pas à Beer-Sheva
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '5.5 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Siège d’un sanctuaire au sud du territoire de Juda, devenu un lieu d’idolâtrie.
      marker-yv: yv-n
    - type: text
      text: .
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Car Guilgal sera déporté
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et Béthel deviendra néant
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '5.5 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'En hébreu : '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'Aven. '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Voir Os 4.15 et note ; 5.8 ; 10.5, 8.
      marker-yv: yv-n
    - type: text
      text: .
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tournez-vous donc vers l’Eternel ╵et vous vivrez,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: autrement, il fondra ╵tout comme un feu
  - type: usfm
    marker: q1
    children:
    - type: text
      text: qui les consumera,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sur les descendants de Joseph
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sans qu’il y ait à Béthel ╵quiconque pour l’éteindre.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Vous changez le droit en poison
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et vous renversez la justice.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Celui qui a créé ╵Orion et les Pléiades,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: qui transforme en aurore ╵les profondes ténèbres
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et qui réduit le jour ╵en une nuit obscure,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: qui fait venir ╵les eaux de l’océan
  - type: usfm
    marker: q1
    children:
    - type: text
      text: pour les répandre ╵sur la surface de la terre.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: L’Eternel est son nom.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: C’est lui qui fait venir ╵la ruine sur les gens puissants
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et la ruine fond sur la citadelle.
  - type: usfm
    marker: s2
    children:
    - type: text
      text: Injustices
    marker-yv: yv-h
