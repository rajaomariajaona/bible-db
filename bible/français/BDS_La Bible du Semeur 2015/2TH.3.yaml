document_id: 2TH.3,21
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: L’appel à la prière
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: Finalement, frères et sœurs, priez pour nous afin que la Parole du Seigneur se répande rapidement et qu’elle soit honorée ailleurs comme elle l’est chez vous.
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'En effet, lorsque nous étions chez vous, nous vous avons donné cette recommandation : « Que celui qui refuse de travailler renonce aussi à manger'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '3.10 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Peut-être un dicton populaire que Paul leur avait cité lors de son passage chez eux.
      marker-yv: yv-n
    - type: text
      text: '  » ! '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Or, nous apprenons que certains d’entre vous mènent une vie déréglée : ils ne travaillent pas et se mêlent des affaires des autres. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Nous invitons ces personnes-là à suivre la recommandation suivante : au nom du Seigneur Jésus-Christ, travaillez dans la paix et gagnez vous-mêmes votre pain.'
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Et vous, frères et sœurs, ne vous lassez pas de faire ce qui est bien. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Si quelqu’un ne se conforme pas aux instructions de cette lettre, signalez-le à tous et rompez toute relation avec lui, pour qu’il en éprouve de la honte. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Toutefois, ne le traitez pas en ennemi, reprenez-le comme un frère.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Prière et salutation
    marker-yv: yv-h
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Que le Seigneur qui donne la paix vous accorde lui-même la paix de toute manière et en toutes circonstances. Que le Seigneur soit avec vous tous.
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Cette salutation est de ma propre main, à moi, Paul. C’est ainsi que je signe toutes mes lettres : c’est là mon écriture'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '3.17 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'C’était l’habitude antique : après avoir dicté une lettre à un secrétaire, on l’authentifiait par sa signature et quelques mots autographes (comparer 1 Co 16.21 ; Ga 6.11 ; Col 4.18).'
      marker-yv: yv-n
    - type: text
      text: .
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Que la grâce de notre Seigneur Jésus-Christ soit avec vous tous.
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Priez aussi pour que nous soyons délivrés des hommes insensés et méchants
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '3.2 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'L’apôtre fait sans doute allusion aux Juifs de Corinthe qui se sont opposés à Paul (voir '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: Ac 18.12
        - type: text
          text: ).
      marker-yv: yv-n
    - type: text
      text: '. Car tous n’ont pas la foi. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Mais le Seigneur, lui, est fidèle : il vous rendra forts et vous gardera du diable'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '3.3 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Autre traduction : '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: du mal.
      marker-yv: yv-n
    - type: text
      text: .
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Voici l’assurance que nous avons à cause du Seigneur à votre sujet : vous faites ce que nous vous recommandons et vous continuerez à le faire. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Que le Seigneur dirige votre cœur vers l’amour de Dieu, et vers l’endurance que donne Christ.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: La nécessité de travailler
    marker-yv: yv-h
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Nous vous recommandons, frères et sœurs, au nom de notre Seigneur Jésus-Christ, de vous tenir à l’écart de tout frère ou de toute sœur qui mène une vie déréglée
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '3.6 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Voir 1 Th 2.9 ; 4.11 et note.
      marker-yv: yv-n
    - type: text
      text: ' et contraire à l’enseignement que nous lui avons transmis.'
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Vous savez bien vous-mêmes ce qu’il faut faire pour suivre notre exemple : nous n’avons pas eu une vie déréglée au milieu de vous. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Nous n’avons mangé gratuitement le pain de personne. Mais, de nuit comme de jour, nous avons travaillé, dans la fatigue et la peine, pour n’être à charge à aucun d’entre vous. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Pourtant, ce n’est pas que nous n’en aurions pas eu le droit, mais nous avons voulu vous laisser un exemple à imiter.
