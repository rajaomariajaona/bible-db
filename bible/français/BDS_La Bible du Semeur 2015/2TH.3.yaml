document_id: 2TH.3,21
type_code: fra
verses:
  '1':
  - type: heading
    content: L’appel à la prière
  - type: text
    content: Finalement, frères et sœurs, priez pour nous afin que la Parole du Seigneur se répande rapidement et qu’elle soit honorée ailleurs comme elle l’est chez vous.
  '10':
  - type: text
    content: 'En effet, lorsque nous étions chez vous, nous vous avons donné cette recommandation : « Que celui qui refuse de travailler renonce aussi à manger'
  - type: note
    content: Peut-être un dicton populaire que Paul leur avait cité lors de son passage chez eux.
  - type: text
    content: '  » ! '
  '11':
  - type: text
    content: 'Or, nous apprenons que certains d’entre vous mènent une vie déréglée : ils ne travaillent pas et se mêlent des affaires des autres. '
  '12':
  - type: text
    content: 'Nous invitons ces personnes-là à suivre la recommandation suivante : au nom du Seigneur Jésus-Christ, travaillez dans la paix et gagnez vous-mêmes votre pain.'
  '13':
  - type: text
    content: 'Et vous, frères et sœurs, ne vous lassez pas de faire ce qui est bien. '
  '14':
  - type: text
    content: 'Si quelqu’un ne se conforme pas aux instructions de cette lettre, signalez-le à tous et rompez toute relation avec lui, pour qu’il en éprouve de la honte. '
  '15':
  - type: text
    content: Toutefois, ne le traitez pas en ennemi, reprenez-le comme un frère.
  - type: heading
    content: Prière et salutation
  '16':
  - type: text
    content: Que le Seigneur qui donne la paix vous accorde lui-même la paix de toute manière et en toutes circonstances. Que le Seigneur soit avec vous tous.
  '17':
  - type: text
    content: 'Cette salutation est de ma propre main, à moi, Paul. C’est ainsi que je signe toutes mes lettres : c’est là mon écriture'
  - type: note
    content: 'C’était l’habitude antique : après avoir dicté une lettre à un secrétaire, on l’authentifiait par sa signature et quelques mots autographes (comparer 1 Co 16.21 ; Ga 6.11 ; Col 4.18).'
  - type: text
    content: .
  '18':
  - type: text
    content: Que la grâce de notre Seigneur Jésus-Christ soit avec vous tous.
  '2':
  - type: text
    content: Priez aussi pour que nous soyons délivrés des hommes insensés et méchants
  - type: note
    content: L’apôtre fait sans doute allusion aux Juifs de Corinthe qui se sont opposés à Paul (voir Ac 18.12).
  - type: text
    content: '. Car tous n’ont pas la foi. '
  '3':
  - type: text
    content: 'Mais le Seigneur, lui, est fidèle : il vous rendra forts et vous gardera du diable'
  - type: note
    content: 'Autre traduction : du mal.'
  - type: text
    content: .
  '4':
  - type: text
    content: 'Voici l’assurance que nous avons à cause du Seigneur à votre sujet : vous faites ce que nous vous recommandons et vous continuerez à le faire. '
  '5':
  - type: text
    content: Que le Seigneur dirige votre cœur vers l’amour de Dieu, et vers l’endurance que donne Christ.
  - type: heading
    content: La nécessité de travailler
  '6':
  - type: text
    content: Nous vous recommandons, frères et sœurs, au nom de notre Seigneur Jésus-Christ, de vous tenir à l’écart de tout frère ou de toute sœur qui mène une vie déréglée
  - type: note
    content: Voir 1 Th 2.9 ; 4.11 et note.
  - type: text
    content: ' et contraire à l’enseignement que nous lui avons transmis.'
  '7':
  - type: text
    content: 'Vous savez bien vous-mêmes ce qu’il faut faire pour suivre notre exemple : nous n’avons pas eu une vie déréglée au milieu de vous. '
  '8':
  - type: text
    content: 'Nous n’avons mangé gratuitement le pain de personne. Mais, de nuit comme de jour, nous avons travaillé, dans la fatigue et la peine, pour n’être à charge à aucun d’entre vous. '
  '9':
  - type: text
    content: Pourtant, ce n’est pas que nous n’en aurions pas eu le droit, mais nous avons voulu vous laisser un exemple à imiter.
