document_id: 1KI.10,21
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: La visite de la reine de Saba
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: (2 Ch 9.1-12)
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: La reine de Saba
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '10.1 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Royaume situé au sud-ouest de l’Arabie, par lequel passaient les routes commerçantes allant d’Inde et d’Afrique orientale à Damas et Gaza (Es 60.6 ; Jr 6.20 ; Ps 72.10).
      marker-yv: yv-n
    - type: text
      text: ' entendit parler de la réputation que Salomon avait acquise grâce à l’Eternel. Elle vint donc pour éprouver sa sagesse en lui posant des questions difficiles'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '10.1 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Voir v. 1-9 : allusion en Mt 12.42 ; Lc 11.31.'
      marker-yv: yv-n
    - type: text
      text: '. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ensuite, la reine fit cadeau au roi de trois tonnes et demie d’or, d’une très grande quantité de parfums et d’épices, et de pierres précieuses. En fait, il n’arriva plus jamais une aussi grande quantité de parfums et d’épices que celle que la reine de Saba offrit au roi Salomon.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Les richesses de Salomon
    marker-yv: yv-h
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'De plus, les navires de Hiram, qui rapportaient de l’or d’Ophir, ramenèrent aussi de là-bas une grande quantité de bois de santal, et des pierres précieuses. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Le roi utilisa le bois de santal pour faire une balustrade pour le temple de l’Eternel et pour le palais royal ainsi que des lyres et des luths pour les musiciens. Plus jamais, pareil bois de santal ne fut importé et l’on n’en a plus vu jusqu’à aujourd’hui. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Le roi Salomon donna à la reine de Saba tout ce qu’elle désirait et ce qu’elle demanda ; de plus, il lui fit des présents dignes d’un roi tel que Salomon. Après cela, elle s’en retourna dans son pays, accompagnée de ses serviteurs.
  - type: usfm
    marker: r
    children:
    - type: text
      text: (2 Ch 1.14-17 ; 9.13-28)
    marker-yv: yv-h
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Chaque année, Salomon recevait vingt tonnes d’or, '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: sans compter le produit des taxes payées par les importateurs et les marchands, ainsi que les tributs versés par tous les rois occidentaux et les impôts perçus par les gouverneurs du pays.
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Le roi Salomon fit fabriquer deux cents grands boucliers d’or battu, pour lesquels on employa six kilogrammes d’or par pièce, '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'et trois cents petits boucliers d’or battu pour chacun desquels on employa un kilo et demi d’or. Le roi les fit placer dans le palais de la Forêt-du-Liban. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Il fit aussi fabriquer un grand trône d’ivoire plaqué d’or fin. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Six marches y conduisaient, le dossier était arrondi, et il y avait des accoudoirs de part et d’autre du siège, avec, à côté d’eux, deux lions sculptés. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Elle arriva à Jérusalem avec une suite importante et des chameaux chargés d’épices, de parfums, d’or en très grande quantité et de pierres précieuses. Elle se présenta devant Salomon et lui parla de tout ce qu’elle avait sur le cœur. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Douze lions se tenaient debout de part et d’autre des six marches. Rien de semblable n’existait dans aucun royaume. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Tout le service à boisson du roi Salomon était en or, et toute la vaisselle du palais de la Forêt-du-Liban en or fin. Rien n’était en argent, car, du temps du roi Salomon, l’argent était considéré comme un métal sans grande valeur. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: En effet, le roi disposait d’une flotte de navires au long cours
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '10.22 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'En hébreu, ces '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'navires au long cours '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'sont appelés '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'navires de Tarsis. '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Tarsis était une colonie phénicienne située probablement sur la côte atlantique de l’Espagne, près de l’actuelle Cadix. Les navires qui se rendaient à Tarsis (
        - type: usfm
          marker: ref
          children:
          - type: text
            text: 2 Ch 20.35-37
        - type: text
          text: ) semblent avoir donné leur nom à tout navire partant pour une expédition lointaine.
      marker-yv: yv-n
    - type: text
      text: ' qui naviguaient avec ceux de Hiram et qui, tous les trois ans, revenaient chargés d’or, d’argent, d’ivoire, de singes et de paons.'
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Conclusion
    marker-yv: yv-h
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Le roi Salomon surpassa tous les rois de la terre par sa richesse et sa sagesse. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Tous les gens de la terre cherchaient à le rencontrer pour se mettre à l’écoute de la sagesse que Dieu lui avait donnée. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Et chaque année, ces visiteurs lui apportaient leurs présents : des objets d’argent et d’or, des vêtements, des armes, des épices et des parfums, des chevaux et des mulets.'
  - type: usfm
    marker: s1
    children:
    - type: text
      text: De l’argent en quantité et des chevaux importés d’Egypte
    marker-yv: yv-h
  '26':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Salomon se procura mille quatre cents chars et douze mille hommes d’équipage pour ces chars. Il les cantonna dans les villes de garnison ainsi qu’auprès de lui à Jérusalem
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '10.26 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Voir '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: '5.6'
        - type: text
          text: '. Pour la section '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: '10.26'
        - type: text
          text: ' à '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: '11.3'
        - type: text
          text: ', voir '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: Dt 17.16-17
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: '. '
  '27':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Le roi rendit l’argent aussi commun à Jérusalem que les pierres, et les cèdres aussi nombreux que les sycomores qui croissent dans la plaine côtière le long de la Méditerranée. '
  '28':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Les chevaux de Salomon étaient importés d’Egypte
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '10.28 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Il pourrait s’agir non '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'd’Egypte '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '(en hébreu : '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: mizrim
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ') mais de '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'Muzur, '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: une région de Cilicie. De même au v. 29. Les Mousrites étaient installés en Cilicie et s’adonnaient à l’élevage des chevaux.
      marker-yv: yv-n
    - type: text
      text: ' par convois ; une caravane de marchands du roi allait les acheter par convois'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '10.28 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Autre traduction : '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: à Qevé.
      marker-yv: yv-n
    - type: text
      text: ' contre leur prix. '
  '29':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Chaque char qu’ils importaient d’Egypte revenait à six cents pièces d’argent et chaque cheval à cent cinquante. Ces marchands en importaient dans les mêmes conditions pour tous les rois des Hittites et pour les rois de Syrie.
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Salomon lui expliqua tout ce qu’elle demandait ; rien n’était trop difficile pour lui, il n’y avait aucun sujet sur lequel il ne pouvait lui donner de réponse.
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'La reine de Saba constata combien Salomon était rempli de sagesse, elle vit le palais qu’il avait construit, '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'les mets de sa table, le logement de ses serviteurs, l’organisation de leur service, leur tenue, ceux qui servaient à manger et à boire, et les holocaustes qu’il offrait dans le temple de l’Eternel. Elle en perdit le souffle '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'et elle dit au roi : C’était donc bien vrai ce que j’avais entendu dire dans mon pays au sujet de tes propos et de ta sagesse ! '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Je ne croyais pas ce qu’on en disait avant d’être venue ici et de l’avoir vu de mes propres yeux. Et voici qu’on ne m’en avait pas raconté la moitié de ce qui est. Ta sagesse et ta prospérité surpassent tout ce que j’avais entendu dire. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Qu’ils en ont de la chance, tous ceux qui t’entourent et qui sont toujours en ta présence, de pouvoir profiter sans cesse de ta sagesse ! '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Béni soit l’Eternel, ton Dieu, qui t’a témoigné sa faveur en te plaçant sur le trône d’Israël ! C’est à cause de son amour éternel pour Israël que l’Eternel t’a établi roi pour que tu gouvernes avec justice et équité.
