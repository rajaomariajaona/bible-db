document_id: EZK.37,21
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s2
    children:
    - type: text
      text: Les ossements desséchés reprennent vie
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'La main de l’Eternel se posa sur moi et l’Eternel m’emmena par son Esprit et me déposa au milieu d’une vallée pleine d’ossements. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: Je prophétisai donc comme il me l’avait ordonné. Alors, l’Esprit entra en eux et ils reprirent vie, ils se dressèrent sur leurs pieds et ce fut une immense armée.
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'Il me dit : Fils d’homme, ces ossements-là représentent toute la communauté d’Israël. Voici ce qu’ils disent : « Nos os sont desséchés ! Notre espérance s’est évanouie, la vie nous a été arrachée'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '37.11 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'la vie nous a été arrachée. '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Selon une autre coupure du mot que celle du texte hébreu traditionnel qui a : '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: nous avons été retranchés (de ce monde), nous.
      marker-yv: yv-n
    - type: text
      text: '. » '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'C’est pourquoi prophétise et dis-leur : « Voici ce que dit le Seigneur, l’Eternel : Je vais ouvrir vos sépulcres et je vous ferai remonter de vos tombes, ô mon peuple, et je vous ramènerai dans le pays d’Israël. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'Et vous reconnaîtrez que je suis l’Eternel lorsque j’ouvrirai vos sépulcres et que je vous ferai remonter de vos tombes, ô mon peuple. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: Je mettrai mon Esprit en vous et vous revivrez, et je vous établirai de nouveau dans votre pays ; alors vous reconnaîtrez que moi, l’Eternel, j’ai parlé et agi, l’Eternel le déclare. »
  - type: usfm
    marker: s2
    children:
    - type: text
      text: L’unité retrouvée
    marker-yv: yv-h
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'L’Eternel m’adressa la parole en ces termes :'
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'Fils d’homme, prends un morceau de bois, et grave dessus : « Pour Juda et les Israélites qui en font partie ». Puis tu prendras un autre morceau de bois, un morceau de bois pour Ephraïm, et tu inscriras dessus : « Pour Joseph et pour toute la communauté d’Israël qui en fait partie ». '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: Ensuite, tu joindras les deux morceaux l’un à l’autre pour n’avoir qu’une pièce unique, en sorte que les deux morceaux n’en fassent qu’un dans ta main.
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'Lorsque tes compatriotes te demanderont : « Explique-nous ce que cela signifie pour toi », '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'tu leur répondras : « Voici ce que déclare le Seigneur, l’Eternel : Je vais prendre le bois de Joseph qui est dans la main d’Ephraïm et les tribus d’Israël qui en font partie, je le joindrai au bois de Juda et je ferai des deux un seul morceau : ils seront un dans ma main. »'
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: Il me fit promener près d’eux tout autour et je constatai que ces ossements étaient innombrables sur toute l’étendue de la vallée et qu’ils étaient totalement desséchés.
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: 'Tu garderas en main, bien visibles pour eux, les morceaux de bois sur lesquels tu auras fait ces inscriptions, '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: 'et tu leur diras : « Voici ce que déclare le Seigneur, l’Eternel : Je vais prendre les Israélites du milieu des peuples chez lesquels ils sont allés, je les rassemblerai de tous les pays alentour, je les ramènerai dans leur pays, '
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: 'et je ferai d’eux une seule nation dans le pays, sur les montagnes d’Israël. Un roi unique régnera sur eux tous, ils ne formeront plus deux nations et ne seront plus divisés en deux royaumes. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: Ils ne se rendront plus impurs par le culte rendu à leurs idoles et à leurs divinités abominables, et par toutes leurs transgressions. Je les tirerai de tous leurs lieux d’habitation où ils ont péché
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '37.23 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Je les tirerai de… péché
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: ': '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'd’après le texte hébreu traditionnel. Quelques manuscrits hébreux ont : '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'je les sauverai de tous les péchés qu’ils ont commis '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: (voir l’ancienne version grecque).
      marker-yv: yv-n
    - type: text
      text: ', et je les purifierai ; ils seront mon peuple et je serai leur Dieu.'
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: 'Mon serviteur David sera leur roi, il sera l’unique berger pour eux tous, ils vivront selon mes commandements, et obéiront à mes lois pour les appliquer. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: Ils habiteront dans le pays que j’ai donné à mon serviteur Jacob et dans lequel ont vécu leurs ancêtres ; ils y demeureront, eux, leurs enfants et leurs petits-enfants à perpétuité, et mon serviteur David sera pour toujours prince sur eux.
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: 'Je conclurai avec eux une alliance garantissant la paix ; ce sera une alliance éternelle avec eux ; je les établirai et je les rendrai nombreux, je fixerai pour toujours mon sanctuaire au milieu d’eux. '
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: Ma demeure sera près d’eux, je serai leur Dieu, et ils seront mon peuple
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '37.27 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Réminiscence en '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: 2 Co 6.16
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: '. '
  '28':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: Et les autres peuples reconnaîtront que je suis l’Eternel qui fait d’Israël un peuple saint en plaçant mon sanctuaire pour toujours au milieu d’eux. »
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'Il me demanda : Fils d’homme, crois-tu que ces ossements revivront ?'
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Je répondis : Toi seul, Seigneur Eternel, tu le sais.'
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'Puis il me dit : Prophétise sur ces ossements-là et dis-leur : « Ossements desséchés ! Ecoutez ce que dit l’Eternel ! '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'Voici ce que vous déclare le Seigneur, l’Eternel : Je vais faire venir en vous l’Esprit et vous revivrez. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: Je mettrai sur vous des nerfs, je vous revêtirai de chair, je vous recouvrirai de peau, je mettrai en vous l’Esprit et vous revivrez. Et vous reconnaîtrez que je suis l’Eternel. »
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'Je prophétisai donc comme j’en avais reçu l’ordre. Et tandis que je prophétisais, il y eut soudain un bruit, puis un mouvement se produisit et les os se rapprochèrent les uns des autres. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: Et, pendant que je regardais, voici qu’il se formait sur eux des nerfs et de la chair et que de la peau venait les recouvrir, mais il n’y avait pas d’esprit
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '37.8 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'esprit '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'ou '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'souffle respiratoire. '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: L’hébreu joue peut-être sur les deux sens du mot.
      marker-yv: yv-n
    - type: text
      text: ' en eux.'
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'Alors l’Eternel me dit : Fils d’homme, prophétise à l’adresse de l’Esprit, prophétise et dis à l’Esprit : « Voici ce que déclare le Seigneur, l’Eternel : Esprit, viens des quatre coins du ciel et souffle'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '37.9 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Le même mot hébreu peut désigner tantôt l’Esprit de Dieu, tantôt le vent. Il y a ici un jeu sur les deux sens, l’Esprit se manifestant sous la forme du vent. Voir '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: Jn 3.8
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: ' sur ces morts pour qu’ils revivent. »'
