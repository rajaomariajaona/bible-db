document_id: PSA.66
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Loué soit Dieu qui nous a délivrés
  marker-yv: yv-h
- type: usfm
  marker: d
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Au chef de chœur, cantique, psaume.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Poussez vers Dieu des cris de joie,
- type: usfm
  marker: q1
  children:
  - type: text
    text: vous tous, habitants de la terre !
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Chantez sa gloire !
- type: usfm
  marker: q1
  children:
  - type: text
    text: Honorez-le par vos louanges !
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Parlez ainsi à Dieu : ╵« Que tes actions sont imposantes ! »'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Devant ton immense puissance, ╵tes ennemis s’inclinent
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '66.3 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Autre traduction : '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: tes ennemis te flattent.
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Prosternée devant toi, ╵la terre entière entonne ╵un chant en ton honneur
- type: usfm
  marker: q1
  children:
  - type: text
    text: et te célèbre.
- type: usfm
  marker: q4
  children:
  - type: text
    text: Pause
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Venez voir ce que Dieu a fait,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'car ses actions sont imposantes ╵en faveur des humains :'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: la mer changée en terre ferme !
- type: usfm
  marker: q1
  children:
  - type: text
    text: le fleuve passé à pied sec
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '66.6 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Voir Ex 14.16-22 ; Jos 3.15-16 ; Ps 74.15 ; 78.13 ; 106.9 ; 114.3-5 ; Es 44.27 ; 50.2.
    marker-yv: yv-n
  - type: text
    text: '  !'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Aussi nous exultons en lui.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Car il gouverne pour toujours ╵avec puissance,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et ses yeux surveillent les peuples
- type: usfm
  marker: q1
  children:
  - type: text
    text: afin que les rebelles ╵ne puissent pas ╵se dresser contre lui.
- type: usfm
  marker: q4
  children:
  - type: text
    text: Pause
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Bénissez notre Dieu, ô peuples !
- type: usfm
  marker: q1
  children:
  - type: text
    text: Faites retentir ses louanges !
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'C’est grâce à lui que nous vivons :'
- type: usfm
  marker: q1
  children:
  - type: text
    text: il nous a gardés de la chute.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Tu nous as éprouvés, ô Dieu,
- type: usfm
  marker: q1
  children:
  - type: text
    text: tu nous as jetés au creuset ╵comme on fait pour l’argent.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Tu nous as pris au piège,
- type: usfm
  marker: q1
  children:
  - type: text
    text: tu nous as chargés d’un fardeau,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: tu as permis à l’ennemi ╵de nous réduire sous son joug.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Nous avons traversé le feu, ╵nous avons dû passer par l’eau,
- type: usfm
  marker: q1
  children:
  - type: text
    text: mais tu nous en as fait sortir ╵pour nous conduire à l’abondance.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Je viens dans ta maison ╵avec des holocaustes,
- type: usfm
  marker: q1
  children:
  - type: text
    text: je m’acquitte envers toi ╵des vœux que je t’ai faits.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: J’accomplis les promesses
- type: usfm
  marker: q1
  children:
  - type: text
    text: prononcées par ma bouche ╵au temps de ma détresse.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Je t’offre en holocauste ╵les bêtes les plus grasses,
- type: usfm
  marker: q1
  children:
  - type: text
    text: des béliers avec de l’encens.
- type: usfm
  marker: q1
  children:
  - type: text
    text: J’immolerai ╵des taureaux et des boucs.
- type: usfm
  marker: q4
  children:
  - type: text
    text: Pause
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Venez et écoutez, ╵vous tous qui craignez Dieu, ╵je vous raconterai
- type: usfm
  marker: q1
  children:
  - type: text
    text: ce qu’il a fait pour moi.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Lorsque mes cris montaient vers lui,
- type: usfm
  marker: q1
  children:
  - type: text
    text: sa louange était sur ma langue.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Si j’avais gardé dans mon cœur ╵des intentions coupables,
- type: usfm
  marker: q1
  children:
  - type: text
    text: le Seigneur ne m’aurait pas écouté.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Mais Dieu m’a entendu
- type: usfm
  marker: q1
  children:
  - type: text
    text: et il a été attentif ╵à ma prière.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Béni soit Dieu,
- type: usfm
  marker: q1
  children:
  - type: text
    text: car il n’a pas ╵repoussé ma prière,
- type: usfm
  marker: q1
  children:
  - type: text
    text: il me conserve son amour.
