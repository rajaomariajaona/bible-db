document_id: PSA.66,21
type_code: fra
verses:
  '1':
  - type: heading
    content: Loué soit Dieu qui nous a délivrés
  - type: text
    content: Au chef de chœur, cantique, psaume.
  - type: text
    content: Poussez vers Dieu des cris de joie,
  - type: text
    content: vous tous, habitants de la terre !
  '10':
  - type: text
    content: Tu nous as éprouvés, ô Dieu,
  - type: text
    content: tu nous as jetés au creuset ╵comme on fait pour l’argent.
  '11':
  - type: text
    content: Tu nous as pris au piège,
  - type: text
    content: tu nous as chargés d’un fardeau,
  '12':
  - type: text
    content: tu as permis à l’ennemi ╵de nous réduire sous son joug.
  - type: text
    content: Nous avons traversé le feu, ╵nous avons dû passer par l’eau,
  - type: text
    content: mais tu nous en as fait sortir ╵pour nous conduire à l’abondance.
  '13':
  - type: text
    content: Je viens dans ta maison ╵avec des holocaustes,
  - type: text
    content: je m’acquitte envers toi ╵des vœux que je t’ai faits.
  '14':
  - type: text
    content: J’accomplis les promesses
  - type: text
    content: prononcées par ma bouche ╵au temps de ma détresse.
  '15':
  - type: text
    content: Je t’offre en holocauste ╵les bêtes les plus grasses,
  - type: text
    content: des béliers avec de l’encens.
  - type: text
    content: J’immolerai ╵des taureaux et des boucs.
  - type: text
    content: Pause
  '16':
  - type: text
    content: Venez et écoutez, ╵vous tous qui craignez Dieu, ╵je vous raconterai
  - type: text
    content: ce qu’il a fait pour moi.
  '17':
  - type: text
    content: Lorsque mes cris montaient vers lui,
  - type: text
    content: sa louange était sur ma langue.
  '18':
  - type: text
    content: Si j’avais gardé dans mon cœur ╵des intentions coupables,
  - type: text
    content: le Seigneur ne m’aurait pas écouté.
  '19':
  - type: text
    content: Mais Dieu m’a entendu
  - type: text
    content: et il a été attentif ╵à ma prière.
  '2':
  - type: text
    content: Chantez sa gloire !
  - type: text
    content: Honorez-le par vos louanges !
  '20':
  - type: text
    content: Béni soit Dieu,
  - type: text
    content: car il n’a pas ╵repoussé ma prière,
  - type: text
    content: il me conserve son amour.
  '3':
  - type: text
    content: 'Parlez ainsi à Dieu : ╵« Que tes actions sont imposantes ! »'
  - type: text
    content: Devant ton immense puissance, ╵tes ennemis s’inclinent
  - type: note
    content: 'Autre traduction : tes ennemis te flattent.'
  - type: text
    content: .
  '4':
  - type: text
    content: Prosternée devant toi, ╵la terre entière entonne ╵un chant en ton honneur
  - type: text
    content: et te célèbre.
  - type: text
    content: Pause
  '5':
  - type: text
    content: Venez voir ce que Dieu a fait,
  - type: text
    content: 'car ses actions sont imposantes ╵en faveur des humains :'
  '6':
  - type: text
    content: la mer changée en terre ferme !
  - type: text
    content: le fleuve passé à pied sec
  - type: note
    content: Voir Ex 14.16-22 ; Jos 3.15-16 ; Ps 74.15 ; 78.13 ; 106.9 ; 114.3-5 ; Es 44.27 ; 50.2.
  - type: text
    content: '  !'
  - type: text
    content: Aussi nous exultons en lui.
  '7':
  - type: text
    content: Car il gouverne pour toujours ╵avec puissance,
  - type: text
    content: et ses yeux surveillent les peuples
  - type: text
    content: afin que les rebelles ╵ne puissent pas ╵se dresser contre lui.
  - type: text
    content: Pause
  '8':
  - type: text
    content: Bénissez notre Dieu, ô peuples !
  - type: text
    content: Faites retentir ses louanges !
  '9':
  - type: text
    content: 'C’est grâce à lui que nous vivons :'
  - type: text
    content: il nous a gardés de la chute.
