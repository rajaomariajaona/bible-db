document_id: PSA.67
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Que tous les peuples louent Dieu !
  marker-yv: yv-h
- type: usfm
  marker: d
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Au chef de chœur : psaume à chanter avec accompagnement d’instruments à cordes. Cantique.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Que Dieu nous fasse grâce ! ╵Qu’il nous bénisse !
- type: usfm
  marker: q1
  children:
  - type: text
    text: Qu’il nous regarde ╵avec bonté
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '67.2 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Voir Nb 6.25 ; Ps 4.7 ; 31.17.
    marker-yv: yv-n
  - type: text
    text: ','
- type: usfm
  marker: q4
  children:
  - type: text
    text: Pause
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: afin que sur la terre ╵on reconnaisse ╵comment tu interviens,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et que chez tous les peuples ╵on voie comment tu sauves !
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Que les peuples te louent, ╵ô Dieu,
- type: usfm
  marker: q1
  children:
  - type: text
    text: que tous les peuples ╵t’adressent leurs louanges !
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Que les nations jubilent ╵et qu’elles crient de joie,
- type: usfm
  marker: q1
  children:
  - type: text
    text: car tu gouvernes ╵les peuples selon la droiture
- type: usfm
  marker: q1
  children:
  - type: text
    text: et tu conduis ╵les nations de la terre.
- type: usfm
  marker: q4
  children:
  - type: text
    text: Pause
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Que les peuples te louent, ╵ô Dieu,
- type: usfm
  marker: q1
  children:
  - type: text
    text: que tous les peuples ╵t’adressent leurs louanges !
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: La terre a produit ses récoltes,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Dieu, notre Dieu, nous a bénis.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Oui, que Dieu nous bénisse
- type: usfm
  marker: q1
  children:
  - type: text
    text: et qu’on le craigne ╵jusqu’aux confins du monde !
