document_id: PSA.67,21
type_code: fra
verses:
  '1':
  - type: heading
    content: Que tous les peuples louent Dieu !
  - type: text
    content: 'Au chef de chœur : psaume à chanter avec accompagnement d’instruments à cordes. Cantique.'
  '2':
  - type: text
    content: Que Dieu nous fasse grâce ! ╵Qu’il nous bénisse !
  - type: text
    content: Qu’il nous regarde ╵avec bonté
  - type: note
    content: Voir Nb 6.25 ; Ps 4.7 ; 31.17.
  - type: text
    content: ','
  - type: text
    content: Pause
  '3':
  - type: text
    content: afin que sur la terre ╵on reconnaisse ╵comment tu interviens,
  - type: text
    content: et que chez tous les peuples ╵on voie comment tu sauves !
  '4':
  - type: text
    content: Que les peuples te louent, ╵ô Dieu,
  - type: text
    content: que tous les peuples ╵t’adressent leurs louanges !
  '5':
  - type: text
    content: Que les nations jubilent ╵et qu’elles crient de joie,
  - type: text
    content: car tu gouvernes ╵les peuples selon la droiture
  - type: text
    content: et tu conduis ╵les nations de la terre.
  - type: text
    content: Pause
  '6':
  - type: text
    content: Que les peuples te louent, ╵ô Dieu,
  - type: text
    content: que tous les peuples ╵t’adressent leurs louanges !
  '7':
  - type: text
    content: La terre a produit ses récoltes,
  - type: text
    content: Dieu, notre Dieu, nous a bénis.
  '8':
  - type: text
    content: Oui, que Dieu nous bénisse
  - type: text
    content: et qu’on le craigne ╵jusqu’aux confins du monde !
