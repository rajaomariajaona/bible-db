document_id: 1SA.23
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: David délivre la ville de Qeïla
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: On vint prévenir David que les Philistins avaient attaqué la ville de Qeïla
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '23.1 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Ville de Juda, à 4 ou 5 kilomètres de la grotte d’Adoullam (
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '22.1'
        metadata:
          usfm: 1SA.22.1
      - type: text
        text: ), proche de la frontière de la Philistie.
    marker-yv: yv-n
  - type: text
    text: ' et qu’ils pillaient les céréales sur les aires. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: David consulta l’Eternel pour savoir s’il devait aller attaquer les Philistins et s’il les vaincrait. L’Eternel
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '23.2 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Par Abiatar (v. 6) et par l’ourim et le toummim.
    marker-yv: yv-n
  - type: text
    text: ' lui répondit : Va, tu battras les Philistins et tu délivreras Qeïla.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Mais les hommes de David répondirent : Déjà ici, dans le territoire de Juda, nous vivons constamment dans la crainte, qu’est-ce que ce sera si nous allons à Qeïla nous battre contre les bataillons des Philistins ?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'David consulta une nouvelle fois l’Eternel qui lui répondit : Mets-toi en route, va à Qeïla, car je te donne la victoire sur les Philistins.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'David marcha donc avec ses hommes sur Qeïla et ils attaquèrent les Philistins. Ils s’emparèrent de leurs troupeaux et leur infligèrent une lourde défaite. Ainsi David délivra les habitants de Qeïla. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Il faut dire que quand Abiatar, fils d’Ahimélek, s’était enfui auprès de David à Qeïla, il avait emporté avec lui l’éphod servant à consulter l’Eternel.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'On fit savoir à Saül que David était allé à Qeïla ; alors il s’écria : Dieu l’a livré en mon pouvoir, car il s’est lui-même enfermé dans un piège en entrant dans une ville qui a des portes et des verrous.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Il mobilisa tous ses hommes pour marcher sur Qeïla et assiéger David et sa troupe. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'David apprit quel mauvais dessein Saül méditait contre lui. Aussi demanda-t-il au prêtre Abiatar d’apporter l’éphod. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Il pria : Eternel, Dieu d’Israël, ton serviteur a appris que Saül s’apprête à marcher sur Qeïla pour détruire la ville à cause de moi. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Les autorités de Qeïla me livreront-elles à lui ? Saül viendra-t-il vraiment comme ton serviteur l’a entendu dire ? Eternel, Dieu d’Israël, je t’en prie, informe ton serviteur.
- type: usfm
  marker: p
  children:
  - type: text
    text: 'L’Eternel répondit : Il viendra.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'David ajouta : Les autorités de Qeïla me livreront-elles à Saül, moi et mes hommes ?'
- type: usfm
  marker: p
  children:
  - type: text
    text: 'L’Eternel répondit : Oui, elles vous livreront.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Alors David se mit en route avec sa troupe d’environ six cents hommes et ils quittèrent Qeïla, marchant à l’aventure. On informa Saül que David avait quitté Qeïla et il renonça à son expédition.
- type: usfm
  marker: s1
  children:
  - type: text
    text: La visite de Jonathan
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: David gagna la région désertique de Ziph
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '23.14 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Au centre du désert de Judée, au sud-est d’Hébron (
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Jos 15.55
        metadata:
          usfm: JOS.15.55
      - type: text
        text: ).
    marker-yv: yv-n
  - type: text
    text: ' et s’installa dans des refuges escarpés de la montagne. Saül le cherchait jour après jour ; mais Dieu ne le fit pas tomber entre ses mains.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'David s’aperçut que Saül s’était mis en campagne pour lui ôter la vie, et il resta dans le désert de Ziph du côté de Horsha. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Jonathan, le fils de Saül, se mit en route et se rendit auprès de David à Horsha pour l’encourager en affermissant sa confiance en Dieu. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Il lui dit : Sois sans crainte ! Mon père ne réussira pas à mettre la main sur toi ; tu régneras sur Israël, et moi je serai au second rang près de toi ; mon père lui-même sait bien qu’il en sera ainsi.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Tous deux renouvelèrent leur pacte d’amitié devant l’Eternel. David resta à Horsha et Jonathan rentra chez lui.
- type: usfm
  marker: s1
  children:
  - type: text
    text: David échappe de peu à Saül
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Quelques hommes de Ziph allèrent trouver Saül à Guibéa pour lui dire
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '23.19 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Voir '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ps 54.2
        metadata:
          usfm: PSA.54.2
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: '  : Sais-tu que David se tient caché dans notre région dans des refuges escarpés à Horsha, dans les collines de Hakila au sud des steppes'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '23.19 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Ou : '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'du Yéshimôn, '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'nom désignant une steppe inculte. Il pourrait avoir valeur de nom propre ici (voir v. 24 ; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '26.1'
        metadata:
          usfm: 1SA.26.1
      - type: text
        text: ', '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '3'
        metadata:
          usfm: 1SA.26.3
      - type: text
        text: ).
    marker-yv: yv-n
  - type: text
    text: '  ? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Maintenant, ô roi, quand tu le désireras, viens, et nous nous chargerons de te le livrer.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Saül répondit : Vous êtes bénis par l’Eternel, vous qui avez eu pitié de moi ! '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Allez donc, confirmez vos renseignements, observez et tenez-vous au courant de ses déplacements, sachez qui l’a vu dans ces endroits-là, car on m’a dit qu’il est très rusé. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: Repérez toutes ses cachettes, et revenez me voir avec des informations sûres ; alors j’irai avec vous, et s’il est dans le pays, je fouillerai au besoin chaque recoin du territoire de Juda pour le chercher.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: Les gens de Ziph quittèrent Saül et repartirent chez eux, précédant le roi. David et ses hommes se trouvaient au désert de Maôn
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '23.24 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Au sud du désert de Ziph, près de la localité de Karmel (
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '15.12'
        metadata:
          usfm: 1SA.15.12
      - type: text
        text: ).
    marker-yv: yv-n
  - type: text
    text: ', dans la plaine qui se trouve au sud des steppes.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Saül partit à sa recherche avec ses hommes. On en informa David, et il descendit dans un endroit rocheux du désert de Maôn où il s’installa. Saül l’apprit et se mit à le poursuivre dans cette région. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Saül marchait sur l’un des flancs de la montagne, tandis que David et ses hommes s’enfuyaient sur le flanc opposé. David précipitait sa marche pour échapper à Saül. Mais déjà le roi et ses hommes les cernaient et allaient les capturer. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'Alors un messager vint dire à Saül : Reviens tout de suite, car les Philistins ont fait une incursion dans le pays.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: Aussitôt Saül cessa de poursuivre David pour aller affronter les Philistins. C’est pourquoi on a appelé cet endroit le Rocher des Séparations.
