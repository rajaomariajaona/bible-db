document_id: 1SA.23,21
type_code: fra
verses:
  '1':
  - type: heading
    content: David délivre la ville de Qeïla
  - type: text
    content: On vint prévenir David que les Philistins avaient attaqué la ville de Qeïla
  - type: note
    content: Ville de Juda, à 4 ou 5 kilomètres de la grotte d’Adoullam (22.1), proche de la frontière de la Philistie.
  - type: text
    content: ' et qu’ils pillaient les céréales sur les aires. '
  '10':
  - type: text
    content: 'Il pria : Eternel, Dieu d’Israël, ton serviteur a appris que Saül s’apprête à marcher sur Qeïla pour détruire la ville à cause de moi. '
  '11':
  - type: text
    content: Les autorités de Qeïla me livreront-elles à lui ? Saül viendra-t-il vraiment comme ton serviteur l’a entendu dire ? Eternel, Dieu d’Israël, je t’en prie, informe ton serviteur.
  - type: text
    content: 'L’Eternel répondit : Il viendra.'
  '12':
  - type: text
    content: 'David ajouta : Les autorités de Qeïla me livreront-elles à Saül, moi et mes hommes ?'
  - type: text
    content: 'L’Eternel répondit : Oui, elles vous livreront.'
  '13':
  - type: text
    content: Alors David se mit en route avec sa troupe d’environ six cents hommes et ils quittèrent Qeïla, marchant à l’aventure. On informa Saül que David avait quitté Qeïla et il renonça à son expédition.
  - type: heading
    content: La visite de Jonathan
  '14':
  - type: text
    content: David gagna la région désertique de Ziph
  - type: note
    content: Au centre du désert de Judée, au sud-est d’Hébron (Jos 15.55).
  - type: text
    content: ' et s’installa dans des refuges escarpés de la montagne. Saül le cherchait jour après jour ; mais Dieu ne le fit pas tomber entre ses mains.'
  '15':
  - type: text
    content: 'David s’aperçut que Saül s’était mis en campagne pour lui ôter la vie, et il resta dans le désert de Ziph du côté de Horsha. '
  '16':
  - type: text
    content: 'Jonathan, le fils de Saül, se mit en route et se rendit auprès de David à Horsha pour l’encourager en affermissant sa confiance en Dieu. '
  '17':
  - type: text
    content: 'Il lui dit : Sois sans crainte ! Mon père ne réussira pas à mettre la main sur toi ; tu régneras sur Israël, et moi je serai au second rang près de toi ; mon père lui-même sait bien qu’il en sera ainsi.'
  '18':
  - type: text
    content: Tous deux renouvelèrent leur pacte d’amitié devant l’Eternel. David resta à Horsha et Jonathan rentra chez lui.
  - type: heading
    content: David échappe de peu à Saül
  '19':
  - type: text
    content: Quelques hommes de Ziph allèrent trouver Saül à Guibéa pour lui dire
  - type: note
    content: Voir Ps 54.2.
  - type: text
    content: '  : Sais-tu que David se tient caché dans notre région dans des refuges escarpés à Horsha, dans les collines de Hakila au sud des steppes'
  - type: note
    content: 'Ou : du Yéshimôn, nom désignant une steppe inculte. Il pourrait avoir valeur de nom propre ici (voir v. 24 ; 26.1, 3).'
  - type: text
    content: '  ? '
  '2':
  - type: text
    content: David consulta l’Eternel pour savoir s’il devait aller attaquer les Philistins et s’il les vaincrait. L’Eternel
  - type: note
    content: Par Abiatar (v. 6) et par l’ourim et le toummim.
  - type: text
    content: ' lui répondit : Va, tu battras les Philistins et tu délivreras Qeïla.'
  '20':
  - type: text
    content: Maintenant, ô roi, quand tu le désireras, viens, et nous nous chargerons de te le livrer.
  '21':
  - type: text
    content: 'Saül répondit : Vous êtes bénis par l’Eternel, vous qui avez eu pitié de moi ! '
  '22':
  - type: text
    content: 'Allez donc, confirmez vos renseignements, observez et tenez-vous au courant de ses déplacements, sachez qui l’a vu dans ces endroits-là, car on m’a dit qu’il est très rusé. '
  '23':
  - type: text
    content: Repérez toutes ses cachettes, et revenez me voir avec des informations sûres ; alors j’irai avec vous, et s’il est dans le pays, je fouillerai au besoin chaque recoin du territoire de Juda pour le chercher.
  '24':
  - type: text
    content: Les gens de Ziph quittèrent Saül et repartirent chez eux, précédant le roi. David et ses hommes se trouvaient au désert de Maôn
  - type: note
    content: Au sud du désert de Ziph, près de la localité de Karmel (15.12).
  - type: text
    content: ', dans la plaine qui se trouve au sud des steppes.'
  '25':
  - type: text
    content: 'Saül partit à sa recherche avec ses hommes. On en informa David, et il descendit dans un endroit rocheux du désert de Maôn où il s’installa. Saül l’apprit et se mit à le poursuivre dans cette région. '
  '26':
  - type: text
    content: 'Saül marchait sur l’un des flancs de la montagne, tandis que David et ses hommes s’enfuyaient sur le flanc opposé. David précipitait sa marche pour échapper à Saül. Mais déjà le roi et ses hommes les cernaient et allaient les capturer. '
  '27':
  - type: text
    content: 'Alors un messager vint dire à Saül : Reviens tout de suite, car les Philistins ont fait une incursion dans le pays.'
  '28':
  - type: text
    content: Aussitôt Saül cessa de poursuivre David pour aller affronter les Philistins. C’est pourquoi on a appelé cet endroit le Rocher des Séparations.
  '3':
  - type: text
    content: 'Mais les hommes de David répondirent : Déjà ici, dans le territoire de Juda, nous vivons constamment dans la crainte, qu’est-ce que ce sera si nous allons à Qeïla nous battre contre les bataillons des Philistins ?'
  '4':
  - type: text
    content: 'David consulta une nouvelle fois l’Eternel qui lui répondit : Mets-toi en route, va à Qeïla, car je te donne la victoire sur les Philistins.'
  '5':
  - type: text
    content: 'David marcha donc avec ses hommes sur Qeïla et ils attaquèrent les Philistins. Ils s’emparèrent de leurs troupeaux et leur infligèrent une lourde défaite. Ainsi David délivra les habitants de Qeïla. '
  '6':
  - type: text
    content: Il faut dire que quand Abiatar, fils d’Ahimélek, s’était enfui auprès de David à Qeïla, il avait emporté avec lui l’éphod servant à consulter l’Eternel.
  '7':
  - type: text
    content: 'On fit savoir à Saül que David était allé à Qeïla ; alors il s’écria : Dieu l’a livré en mon pouvoir, car il s’est lui-même enfermé dans un piège en entrant dans une ville qui a des portes et des verrous.'
  '8':
  - type: text
    content: 'Il mobilisa tous ses hommes pour marcher sur Qeïla et assiéger David et sa troupe. '
  '9':
  - type: text
    content: 'David apprit quel mauvais dessein Saül méditait contre lui. Aussi demanda-t-il au prêtre Abiatar d’apporter l’éphod. '
