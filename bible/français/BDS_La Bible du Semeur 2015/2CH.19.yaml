document_id: 2CH.19,21
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Le reproche du prophète Jéhu
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Josaphat, roi de Juda, revint sain et sauf chez lui à Jérusalem. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Chaque fois que vos compatriotes demeurant dans leurs villes respectives porteront un litige devant vous – qu’il s’agisse d’un meurtre ou d’une contestation au sujet de la Loi, d’un commandement, d’ordonnances ou d’articles de droit – vous les avertirez afin qu’ils ne se rendent pas coupables envers l’Eternel et que l’Eternel ne se mette pas en colère contre vous et contre vos compatriotes. Agissez de cette manière et vous serez irréprochables. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Pour toutes les affaires religieuses, vous avez à votre tête le grand-prêtre Amaria, et pour les affaires civiles ou royales, c’est Zebadia, fils d’Ismaël, gouverneur de la tribu de Juda. Des lévites seront à votre disposition comme commissaires. Mettez-vous donc courageusement au travail et que l’Eternel assiste ceux qui agissent bien !
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Jéhu, fils du prophète Hanani
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '19.2 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Voir '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: 16.7-9
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: ', sortit à sa rencontre et lui dit : Penses-tu qu’il soit juste de prêter ton concours à un homme malfaisant et de s’allier avec ceux qui haïssent l’Eternel ? Parce que tu as fait cela, l’Eternel est en colère contre toi. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Cependant, il y a du bon en toi, car tu as brûlé les poteaux d’Ashéra du pays et tu t’es résolument attaché à Dieu.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: L’organisation de la justice
    marker-yv: yv-h
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Après être demeuré quelque temps à Jérusalem, Josaphat fit une nouvelle tournée parmi le peuple, depuis Beer-Sheva jusqu’à la région montagneuse d’Ephraïm
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '19.4 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Au temps de Josaphat, le royaume de Juda était limité au nord par les montagnes d’Ephraïm.
      marker-yv: yv-n
    - type: text
      text: ', pour ramener les Israélites à l’Eternel, le Dieu de leurs ancêtres. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Il établit des juges dans toutes les villes fortifiées du pays de Juda, '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'et leur donna les instructions suivantes : Veillez avec soin à ce que vous faites, car ce n’est pas pour des hommes que vous prononcerez des jugements, mais pour l’Eternel, et il vous assistera lorsque vous rendrez la justice'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '19.6 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Sur le rôle des juges, voir Dt 16.18-20 ; 17.8-13 ; Ps 82.
      marker-yv: yv-n
    - type: text
      text: '. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Maintenant, ayez la plus grande crainte de l’Eternel et soyez bien circonspects dans tout ce que vous faites, car l’Eternel, notre Dieu, ne tolère ni l’injustice, ni la partialité, ni la corruption par des cadeaux.
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'De même à Jérusalem, Josaphat établit quelques-uns des lévites, des prêtres et des chefs de groupe familial d’Israël dans la ville pour rendre la justice au nom de l’Eternel et pour régler les litiges entre les habitants de la ville. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Voici les ordres qu’il leur donna : Vous remplirez vos fonctions dans la crainte de l’Eternel, pour agir consciencieusement et avec une entière intégrité de cœur. '
