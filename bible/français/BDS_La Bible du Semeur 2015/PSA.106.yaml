document_id: PSA.106
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Si nous sommes infidèles, Dieu demeure fidèle
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Louez tous l’Eternel !
- type: usfm
  marker: q1
  children:
  - type: text
    text: Célébrez l’Eternel ╵car il est bon,
- type: usfm
  marker: q1
  children:
  - type: text
    text: car son amour ╵dure à toujours
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '106.1 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Voir 100.5 ; 107.1 ; 118.1, 29 ; 136 ; 1 Ch 16.34 ; 2 Ch 5.13 ; 7.3 ; Esd 3.11 ; Jr 33.11.
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Qui saura dire ╵tous les exploits ╵de l’Eternel ?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Qui saura publier ╵toutes les louanges dont il est digne ?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Heureux tous ceux qui respectent le droit
- type: usfm
  marker: q1
  children:
  - type: text
    text: et qui font en tout temps ce qui est juste.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Pense à moi, Eternel, ╵lorsque tu manifestes ╵ta faveur à ton peuple !
- type: usfm
  marker: q1
  children:
  - type: text
    text: Viens à mon aide ╵pour me sauver !
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Fais-moi voir le bonheur de tes élus !
- type: usfm
  marker: q1
  children:
  - type: text
    text: Viens me réjouir de la joie de ton peuple
- type: usfm
  marker: q1
  children:
  - type: text
    text: pour que je puisse me féliciter, ╵de concert avec ceux qui t’appartiennent !
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Comme nos pères, nous avons péché,
- type: usfm
  marker: q1
  children:
  - type: text
    text: nous avons commis le mal, ╵nous avons été coupables.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Car en Egypte, ╵nos pères n’ont pas considéré tes prodiges,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ils n’ont pas tenu compte ╵de tes nombreuses actions bienveillantes ;
- type: usfm
  marker: q1
  children:
  - type: text
    text: ils se sont révoltés près de la mer, ╵de la mer des Roseaux
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '106.7 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Voir '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ex 14.10-12
        metadata:
          usfm: EXO.14.10+EXO.14.11+EXO.14.12
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Dieu les sauva pour l’honneur de son nom
- type: usfm
  marker: q1
  children:
  - type: text
    text: afin de manifester sa puissance.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Il apostropha la mer des Roseaux ╵qui s’assécha ;
- type: usfm
  marker: q1
  children:
  - type: text
    text: il les conduisit à travers les flots, ╵comme à travers un désert.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Il les délivra de ceux qui les haïssaient,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et les sauva du pouvoir ennemi.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Les flots engloutirent leurs oppresseurs
- type: usfm
  marker: q1
  children:
  - type: text
    text: et pas un seul d’entre eux n’en réchappa
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '106.11 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Pour les v. 9-11, voir '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ex 14.21-29
        metadata:
          usfm: EXO.14.21+EXO.14.22+EXO.14.23+EXO.14.24+EXO.14.25+EXO.14.26+EXO.14.27+EXO.14.28+EXO.14.29
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Alors son peuple a cru en ses paroles
- type: usfm
  marker: q1
  children:
  - type: text
    text: et il s’est mis à chanter ses louanges
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '106.12 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Voir Ex 14.31 ; 15.1-21.
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Mais, bien vite ils ont oublié ses actes,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ils n’ont pas attendu ╵de voir quels étaient ses projets.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Dans le désert, ╵ils ont été remplis de convoitise,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ils ont voulu forcer la main à Dieu ╵dans les terres arides
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '106.14 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Pour les v. 14-15, voir '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Nb 11.4-34
        metadata:
          usfm: NUM.11.4+NUM.11.5+NUM.11.6+NUM.11.7+NUM.11.8+NUM.11.9+NUM.11.10+NUM.11.11+NUM.11.12+NUM.11.13+NUM.11.14+NUM.11.15+NUM.11.16+NUM.11.17+NUM.11.18+NUM.11.19+NUM.11.20+NUM.11.21+NUM.11.22+NUM.11.23+NUM.11.24+NUM.11.25+NUM.11.26+NUM.11.27+NUM.11.28+NUM.11.29+NUM.11.30+NUM.11.31+NUM.11.32+NUM.11.33+NUM.11.34
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Il leur a donné ce qu’ils demandaient,
- type: usfm
  marker: q1
  children:
  - type: text
    text: mais il les a aussi fait dépérir.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Dans le camp, ils ont jalousé Moïse
- type: usfm
  marker: q1
  children:
  - type: text
    text: et Aaron, ╵qui était consacré à l’Eternel
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '106.16 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Pour les v. 16-18, voir '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Nb 16
        metadata:
          usfm: NUM.16
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Alors la terre s’est ouverte ╵et elle a englouti Datan,
- type: usfm
  marker: q1
  children:
  - type: text
    text: elle a recouvert les gens d’Abiram.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Le feu a consumé leur bande,
- type: usfm
  marker: q1
  children:
  - type: text
    text: la flamme a embrasé tous ces méchants.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: A Horeb, ils ont façonné un veau
- type: usfm
  marker: q1
  children:
  - type: text
    text: et se sont prosternés ╵devant une idole en métal fondu
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '106.19 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Pour les v. 19-23, voir '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ex 32.1-14
        metadata:
          usfm: EXO.32.1+EXO.32.2+EXO.32.3+EXO.32.4+EXO.32.5+EXO.32.6+EXO.32.7+EXO.32.8+EXO.32.9+EXO.32.10+EXO.32.11+EXO.32.12+EXO.32.13+EXO.32.14
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Ils ont troqué Dieu, leur sujet de gloire,
- type: usfm
  marker: q1
  children:
  - type: text
    text: contre la représentation d’un bœuf broutant de l’herbe !
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Et ils ont oublié Dieu, leur Sauveur,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et ses exploits accomplis en Egypte,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: ses grands miracles au pays de Cham
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '106.22 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'C’est-à-dire l’Egypte. Voir note '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '78.51'
        metadata:
          usfm: PSA.78.51
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: ','
- type: usfm
  marker: q1
  children:
  - type: text
    text: ses actes redoutables sur la mer des Roseaux.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: Aussi Dieu parla-t-il de les détruire.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Mais celui qu’il avait choisi, Moïse,
- type: usfm
  marker: q1
  children:
  - type: text
    text: se tint devant lui pour intercéder
- type: usfm
  marker: q1
  children:
  - type: text
    text: et détourner son courroux destructeur.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: Ils ont méprisé un pays de rêve
- type: usfm
  marker: q1
  children:
  - type: text
    text: parce qu’ils n’ont pas cru à sa parole
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '106.24 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Pour les v. 24-26, voir '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Nb 14
        metadata:
          usfm: NUM.14
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: Ils ont protesté au fond de leurs tentes,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ils ont désobéi à l’Eternel.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: Alors il agita la main contre eux
- type: usfm
  marker: q1
  children:
  - type: text
    text: pour les faire périr dans le désert,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: pour disperser
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '106.27 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'D’après la version syriaque et un targoum. Texte hébreu traditionnel : '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'faire périr. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: La différence tient à une lettre en hébreu, le texte ayant peut-être été modifié sous l’influence du verset précédent.
    marker-yv: yv-n
  - type: text
    text: ' leurs descendants ╵parmi les autres peuples,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: et les disséminer ╵en tous pays
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '106.27 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Voir '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Lv 26.33
        metadata:
          usfm: LEV.26.33
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: Ils se sont attachés ╵au Baal de Peor,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et ils ont mangé des victimes ╵qu’on avait sacrifiées à des dieux morts
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '106.28 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Voir Lv 26.30 ; Ps 115.4-8 ; 135.15-18. Pour les v. 28-31, voir '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Nb 25.1-13
        metadata:
          usfm: NUM.25.1+NUM.25.2+NUM.25.3+NUM.25.4+NUM.25.5+NUM.25.6+NUM.25.7+NUM.25.8+NUM.25.9+NUM.25.10+NUM.25.11+NUM.25.12+NUM.25.13
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: Ils ont irrité Dieu ╵par leurs agissements
- type: usfm
  marker: q1
  children:
  - type: text
    text: et un fléau éclata parmi eux.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: Phinéas intervint en justicier,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et le fléau s’arrêta aussitôt.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: Cela lui fut compté comme acte juste
- type: usfm
  marker: q1
  children:
  - type: text
    text: pour tous les âges, pour l’éternité.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: Ils ont irrité Dieu à Meriba
- type: usfm
  marker: q1
  children:
  - type: text
    text: et ils ont causé du tort à Moïse.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: Ils l’ont si vivement exaspéré
- type: usfm
  marker: q1
  children:
  - type: text
    text: qu’il s’est mis à parler sans réfléchir
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '106.33 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Voir Ex 17.1-7 ; Nb 20.1-13.
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: Ils n’ont pas exterminé les peuplades
- type: usfm
  marker: q1
  children:
  - type: text
    text: que l’Eternel leur avait désignées
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '106.34 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Voir Dt 7.1-6 ; 20.17-18.
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: Ils se sont mêlés aux populations païennes
- type: usfm
  marker: q1
  children:
  - type: text
    text: et ont imité leurs agissements
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '106.35 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Pour les v. 35-36, voir Jg 2.1-3 ; 3.5-6.
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: Ils ont adoré leurs divinités,
- type: usfm
  marker: q1
  children:
  - type: text
    text: qui sont devenues un piège pour eux.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: Ils ont même offert leurs fils et leurs filles
- type: usfm
  marker: q1
  children:
  - type: text
    text: en sacrifice à des démons
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '106.37 '
    - type: usfm
      marker: ft
      children:
      - type: text
