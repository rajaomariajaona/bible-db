        text: En s’unissant à de faux dieux. L’idolâtrie est souvent qualifiée de prostitution dans l’Ancien Testament (Jr 3.6-9 ; Ez 23.3, 5-8 ; Os 1.2 ; 2.4 ; 4.12-14 ; 5.3 ; 6.10). La pratique de la prostitution sacrée accompagnait souvent aussi les cultes idolâtres.
