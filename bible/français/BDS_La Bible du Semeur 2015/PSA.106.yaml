document_id: PSA.106,21
type_code: fra
verses:
  '1':
  - type: heading
    content: Si nous sommes infidèles, Dieu demeure fidèle
  - type: text
    content: Louez tous l’Eternel !
  - type: text
    content: Célébrez l’Eternel ╵car il est bon,
  - type: text
    content: car son amour ╵dure à toujours
  - type: note
    content: Voir 100.5 ; 107.1 ; 118.1, 29 ; 136 ; 1 Ch 16.34 ; 2 Ch 5.13 ; 7.3 ; Esd 3.11 ; Jr 33.11.
  - type: text
    content: .
  '10':
  - type: text
    content: Il les délivra de ceux qui les haïssaient,
  - type: text
    content: et les sauva du pouvoir ennemi.
  '11':
  - type: text
    content: Les flots engloutirent leurs oppresseurs
  - type: text
    content: et pas un seul d’entre eux n’en réchappa
  - type: note
    content: Pour les v. 9-11, voir Ex 14.21-29.
  - type: text
    content: .
  '12':
  - type: text
    content: Alors son peuple a cru en ses paroles
  - type: text
    content: et il s’est mis à chanter ses louanges
  - type: note
    content: Voir Ex 14.31 ; 15.1-21.
  - type: text
    content: .
  '13':
  - type: text
    content: Mais, bien vite ils ont oublié ses actes,
  - type: text
    content: ils n’ont pas attendu ╵de voir quels étaient ses projets.
  '14':
  - type: text
    content: Dans le désert, ╵ils ont été remplis de convoitise,
  - type: text
    content: ils ont voulu forcer la main à Dieu ╵dans les terres arides
  - type: note
    content: Pour les v. 14-15, voir Nb 11.4-34.
  - type: text
    content: .
  '15':
  - type: text
    content: Il leur a donné ce qu’ils demandaient,
  - type: text
    content: mais il les a aussi fait dépérir.
  '16':
  - type: text
    content: Dans le camp, ils ont jalousé Moïse
  - type: text
    content: et Aaron, ╵qui était consacré à l’Eternel
  - type: note
    content: Pour les v. 16-18, voir Nb 16.
  - type: text
    content: .
  '17':
  - type: text
    content: Alors la terre s’est ouverte ╵et elle a englouti Datan,
  - type: text
    content: elle a recouvert les gens d’Abiram.
  '18':
  - type: text
    content: Le feu a consumé leur bande,
  - type: text
    content: la flamme a embrasé tous ces méchants.
  '19':
  - type: text
    content: A Horeb, ils ont façonné un veau
  - type: text
    content: et se sont prosternés ╵devant une idole en métal fondu
  - type: note
    content: Pour les v. 19-23, voir Ex 32.1-14.
  - type: text
    content: .
  '2':
  - type: text
    content: Qui saura dire ╵tous les exploits ╵de l’Eternel ?
  - type: text
    content: Qui saura publier ╵toutes les louanges dont il est digne ?
  '20':
  - type: text
    content: Ils ont troqué Dieu, leur sujet de gloire,
  - type: text
    content: contre la représentation d’un bœuf broutant de l’herbe !
  '21':
  - type: text
    content: Et ils ont oublié Dieu, leur Sauveur,
  - type: text
    content: et ses exploits accomplis en Egypte,
  '22':
  - type: text
    content: ses grands miracles au pays de Cham
  - type: note
    content: C’est-à-dire l’Egypte. Voir note 78.51.
  - type: text
    content: ','
  - type: text
    content: ses actes redoutables sur la mer des Roseaux.
  '23':
  - type: text
    content: Aussi Dieu parla-t-il de les détruire.
  - type: text
    content: Mais celui qu’il avait choisi, Moïse,
  - type: text
    content: se tint devant lui pour intercéder
  - type: text
    content: et détourner son courroux destructeur.
  '24':
  - type: text
    content: Ils ont méprisé un pays de rêve
  - type: text
    content: parce qu’ils n’ont pas cru à sa parole
  - type: note
    content: Pour les v. 24-26, voir Nb 14.
  - type: text
    content: .
  '25':
  - type: text
    content: Ils ont protesté au fond de leurs tentes,
  - type: text
    content: ils ont désobéi à l’Eternel.
  '26':
  - type: text
    content: Alors il agita la main contre eux
  - type: text
    content: pour les faire périr dans le désert,
  '27':
  - type: text
    content: pour disperser
  - type: note
    content: 'D’après la version syriaque et un targoum. Texte hébreu traditionnel : faire périr. La différence tient à une lettre en hébreu, le texte ayant peut-être été modifié sous l’influence du verset précédent.'
  - type: text
    content: ' leurs descendants ╵parmi les autres peuples,'
  - type: text
    content: et les disséminer ╵en tous pays
  - type: note
    content: Voir Lv 26.33.
  - type: text
    content: .
  '28':
  - type: text
    content: Ils se sont attachés ╵au Baal de Peor,
  - type: text
    content: et ils ont mangé des victimes ╵qu’on avait sacrifiées à des dieux morts
  - type: note
    content: Voir Lv 26.30 ; Ps 115.4-8 ; 135.15-18. Pour les v. 28-31, voir Nb 25.1-13.
  - type: text
    content: .
  '29':
  - type: text
    content: Ils ont irrité Dieu ╵par leurs agissements
  - type: text
    content: et un fléau éclata parmi eux.
  '3':
  - type: text
    content: Heureux tous ceux qui respectent le droit
  - type: text
    content: et qui font en tout temps ce qui est juste.
  '30':
  - type: text
    content: Phinéas intervint en justicier,
  - type: text
    content: et le fléau s’arrêta aussitôt.
  '31':
  - type: text
    content: Cela lui fut compté comme acte juste
  - type: text
    content: pour tous les âges, pour l’éternité.
  '32':
  - type: text
    content: Ils ont irrité Dieu à Meriba
  - type: text
    content: et ils ont causé du tort à Moïse.
  '33':
  - type: text
    content: Ils l’ont si vivement exaspéré
  - type: text
    content: qu’il s’est mis à parler sans réfléchir
  - type: note
    content: Voir Ex 17.1-7 ; Nb 20.1-13.
  - type: text
    content: .
  '34':
  - type: text
    content: Ils n’ont pas exterminé les peuplades
  - type: text
    content: que l’Eternel leur avait désignées
  - type: note
    content: Voir Dt 7.1-6 ; 20.17-18.
  - type: text
    content: .
  '35':
  - type: text
    content: Ils se sont mêlés aux populations païennes
  - type: text
    content: et ont imité leurs agissements
  - type: note
    content: Pour les v. 35-36, voir Jg 2.1-3 ; 3.5-6.
  - type: text
    content: .
  '36':
  - type: text
    content: Ils ont adoré leurs divinités,
  - type: text
    content: qui sont devenues un piège pour eux.
  '37':
  - type: text
    content: Ils ont même offert leurs fils et leurs filles
  - type: text
    content: en sacrifice à des démons
  - type: note
    content: Voir Lv 18.21 ; Dt 12.31 ; 2 R 17.17 ; Jr 7.31 ; 19.5.
  - type: text
    content: ','
  '38':
  - type: text
    content: ils ont répandu le sang innocent,
  - type: text
    content: le sang de leurs fils, le sang de leurs filles
  - type: text
    content: qu’ils ont sacrifiés ╵aux idoles de Canaan.
  - type: text
    content: Et le pays fut souillé
  - type: note
    content: Voir Nb 35.33.
  - type: text
    content: ' par ces meurtres.'
  '39':
  - type: text
    content: Par leurs pratiques, ils se sont rendus impurs,
  - type: text
    content: ils se sont prostitués par leurs actes
  - type: note
    content: En s’unissant à de faux dieux. L’idolâtrie est souvent qualifiée de prostitution dans l’Ancien Testament (Jr 3.6-9 ; Ez 23.3, 5-8 ; Os 1.2 ; 2.4 ; 4.12-14 ; 5.3 ; 6.10). La pratique de la prostitution sacrée accompagnait souvent aussi les cultes idolâtres.
  - type: text
    content: .
  '4':
  - type: text
    content: Pense à moi, Eternel, ╵lorsque tu manifestes ╵ta faveur à ton peuple !
  - type: text
    content: Viens à mon aide ╵pour me sauver !
  '40':
  - type: text
    content: L’Eternel se mit en colère ╵contre son peuple
  - type: text
    content: et il prit en aversion tous les siens.
  '41':
  - type: text
    content: Il les livra à la merci ╵de peuples étrangers,
  - type: text
    content: ceux qui les haïssaient ╵dominèrent sur eux.
  '42':
  - type: text
    content: Leurs ennemis les opprimèrent
  - type: text
    content: et les humilièrent
  - type: note
    content: 'Autre traduction : se les assujettirent.'
  - type: text
    content: .
  '43':
  - type: text
    content: Bien souvent, l’Eternel les délivra,
  - type: text
    content: mais ils ne pensaient qu’à se révolter,
  - type: text
    content: et ils s’obstinaient dans leur faute.
  '44':
  - type: text
    content: Pourtant, il considéra leur détresse
  - type: text
    content: quand il entendit leurs cris suppliants.
  '45':
  - type: text
    content: Il prit en compte en leur faveur ╵son alliance,
  - type: text
    content: et il renonça à les affliger ╵car son amour pour eux était très grand.
  '46':
  - type: text
    content: Il éveilla pour eux la compassion
  - type: text
    content: de tous ceux qui les retenaient captifs
  - type: note
    content: Voir 1 R 8.50 ; Jr 42.12 ; Esd 9.9.
  - type: text
    content: .
  '47':
  - type: text
    content: Délivre-nous, Eternel, notre Dieu !
  - type: text
    content: Rassemble-nous du sein des autres peuples !
  - type: text
    content: Nous te célébrerons, toi qui es saint,
  - type: text
    content: et mettrons notre gloire à te louer.
  '48':
  - type: text
    content: Béni soit l’Eternel, Dieu d’Israël
  - type: note
    content: Voir 1 Ch 16.36.
  - type: text
    content: ','
  - type: text
    content: d’éternité jusqu’en éternité
  - type: text
    content: 'et que le peuple entier réponde : « Amen ! »'
  - type: text
    content: Louez l’Eternel !
  '5':
  - type: text
    content: Fais-moi voir le bonheur de tes élus !
  - type: text
    content: Viens me réjouir de la joie de ton peuple
  - type: text
    content: pour que je puisse me féliciter, ╵de concert avec ceux qui t’appartiennent !
  '6':
  - type: text
    content: Comme nos pères, nous avons péché,
  - type: text
    content: nous avons commis le mal, ╵nous avons été coupables.
  '7':
  - type: text
    content: Car en Egypte, ╵nos pères n’ont pas considéré tes prodiges,
  - type: text
    content: ils n’ont pas tenu compte ╵de tes nombreuses actions bienveillantes ;
  - type: text
    content: ils se sont révoltés près de la mer, ╵de la mer des Roseaux
  - type: note
    content: Voir Ex 14.10-12.
  - type: text
    content: .
  '8':
  - type: text
    content: Dieu les sauva pour l’honneur de son nom
  - type: text
    content: afin de manifester sa puissance.
  '9':
  - type: text
    content: Il apostropha la mer des Roseaux ╵qui s’assécha ;
  - type: text
    content: il les conduisit à travers les flots, ╵comme à travers un désert.
