document_id: TIT.3,21
type_code: fra
verses:
  '1':
  - type: heading
    content: L’Evangile et ses conséquences dans la vie quotidienne
  - type: text
    content: 'Rappelle à tous qu’ils ont à se soumettre aux gouvernants et aux autorités, qu’ils doivent leur obéir et être prêts à accomplir toute œuvre bonne. '
  '10':
  - type: text
    content: 'Si quelqu’un cause des divisions, avertis-le, une fois, deux fois, puis écarte-le de l’Eglise ; '
  '11':
  - type: text
    content: 'car, tu peux en être certain, un tel homme est sorti du droit chemin : il fait le mal et se condamne ainsi lui-même.'
  - type: heading
    content: Dernières recommandations
  '12':
  - type: text
    content: Quand je t’aurai envoyé Artémas ou Tychique, hâte-toi de venir me rejoindre à Nicopolis
  - type: note
    content: Plusieurs villes s’appelaient ainsi. Il s’agit sans doute de celle qui était située sur la côte adriatique de la Grèce (Nicopolis en Epire).
  - type: text
    content: ', car c’est là que j’ai décidé de passer l’hiver.'
  '13':
  - type: text
    content: 'Aie soin de pourvoir au voyage de Zénas, le juriste, et d’Apollos, afin que rien ne leur manque. '
  '14':
  - type: text
    content: Il faut que les nôtres aussi apprennent à accomplir des œuvres bonnes pour faire face à tout besoin et toute nécessité. Ainsi, leur vie ne sera pas improductive.
  - type: heading
    content: Salutations
  '15':
  - type: text
    content: Tous ceux qui sont avec moi te saluent. Salue ceux qui nous aiment dans la foi. Que la grâce de Dieu soit avec vous tous.
  '2':
  - type: text
    content: Qu’ils ne dénigrent personne mais qu’ils soient au contraire conciliants, courtois, et qu’ils fassent preuve d’amabilité envers tous les hommes.
  '3':
  - type: text
    content: 'Car il fut un temps où nous-mêmes, nous vivions en insensés, dans la révolte contre Dieu, égarés, esclaves de toutes sortes de passions et de plaisirs. Nos jours s’écoulaient dans la méchanceté et dans l’envie, nous étions haïssables et nous nous haïssions les uns les autres. '
  '4':
  - type: text
    content: 'Mais quand Dieu notre Sauveur a révélé sa bonté et son amour pour les hommes, il nous a sauvés. '
  '5':
  - type: text
    content: 'S’il l’a fait, ce n’est pas parce que nous avons accompli des actes conformes à ce qui est juste. Non. Il nous a sauvés parce qu’il a eu compassion de nous, en nous faisant passer par le bain purificateur de la nouvelle naissance, c’est-à-dire en nous renouvelant par le Saint-Esprit. '
  '6':
  - type: text
    content: 'Cet Esprit, il l’a répandu sur nous avec abondance par Jésus-Christ notre Sauveur. '
  '7':
  - type: text
    content: Il l’a fait pour que, déclarés justes par sa grâce, nous devenions héritiers, selon notre espérance de la vie éternelle.
  '8':
  - type: text
    content: C’est là une parole certaine ; et je veux que tu insistes fortement sur ces choses, afin que ceux qui ont cru en Dieu s’appliquent à accomplir des œuvres bonnes. Voilà ce qui est bon et utile aux hommes.
  - type: heading
    content: L’attitude à avoir envers ceux qui causent des divisions
  '9':
  - type: text
    content: 'Mais évite les spéculations absurdes, l’étude des généalogies, les disputes et les polémiques au sujet de la Loi, car elles sont inutiles et vides de sens. '
