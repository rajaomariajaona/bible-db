document_id: TIT.3,21
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: L’Evangile et ses conséquences dans la vie quotidienne
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Rappelle à tous qu’ils ont à se soumettre aux gouvernants et aux autorités, qu’ils doivent leur obéir et être prêts à accomplir toute œuvre bonne. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'Si quelqu’un cause des divisions, avertis-le, une fois, deux fois, puis écarte-le de l’Eglise ; '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'car, tu peux en être certain, un tel homme est sorti du droit chemin : il fait le mal et se condamne ainsi lui-même.'
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Dernières recommandations
    marker-yv: yv-h
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: Quand je t’aurai envoyé Artémas ou Tychique, hâte-toi de venir me rejoindre à Nicopolis
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '3.12 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Plusieurs villes s’appelaient ainsi. Il s’agit sans doute de celle qui était située sur la côte adriatique de la Grèce (Nicopolis en Epire).
      marker-yv: yv-n
    - type: text
      text: ', car c’est là que j’ai décidé de passer l’hiver.'
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'Aie soin de pourvoir au voyage de Zénas, le juriste, et d’Apollos, afin que rien ne leur manque. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: Il faut que les nôtres aussi apprennent à accomplir des œuvres bonnes pour faire face à tout besoin et toute nécessité. Ainsi, leur vie ne sera pas improductive.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Salutations
    marker-yv: yv-h
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: Tous ceux qui sont avec moi te saluent. Salue ceux qui nous aiment dans la foi. Que la grâce de Dieu soit avec vous tous.
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: Qu’ils ne dénigrent personne mais qu’ils soient au contraire conciliants, courtois, et qu’ils fassent preuve d’amabilité envers tous les hommes.
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'Car il fut un temps où nous-mêmes, nous vivions en insensés, dans la révolte contre Dieu, égarés, esclaves de toutes sortes de passions et de plaisirs. Nos jours s’écoulaient dans la méchanceté et dans l’envie, nous étions haïssables et nous nous haïssions les uns les autres. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'Mais quand Dieu notre Sauveur a révélé sa bonté et son amour pour les hommes, il nous a sauvés. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'S’il l’a fait, ce n’est pas parce que nous avons accompli des actes conformes à ce qui est juste. Non. Il nous a sauvés parce qu’il a eu compassion de nous, en nous faisant passer par le bain purificateur de la nouvelle naissance, c’est-à-dire en nous renouvelant par le Saint-Esprit. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'Cet Esprit, il l’a répandu sur nous avec abondance par Jésus-Christ notre Sauveur. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: Il l’a fait pour que, déclarés justes par sa grâce, nous devenions héritiers, selon notre espérance de la vie éternelle.
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: C’est là une parole certaine ; et je veux que tu insistes fortement sur ces choses, afin que ceux qui ont cru en Dieu s’appliquent à accomplir des œuvres bonnes. Voilà ce qui est bon et utile aux hommes.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: L’attitude à avoir envers ceux qui causent des divisions
    marker-yv: yv-h
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'Mais évite les spéculations absurdes, l’étude des généalogies, les disputes et les polémiques au sujet de la Loi, car elles sont inutiles et vides de sens. '
