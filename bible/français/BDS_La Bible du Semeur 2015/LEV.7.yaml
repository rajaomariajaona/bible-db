document_id: LEV.7,21
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s2
    children:
    - type: text
      text: Sur le sacrifice de réparation
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Voici la loi concernant le sacrifice de réparation. C’est une chose très sainte. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: Par contre, toute autre offrande, pétrie à l’huile ou sans huile, appartiendra à tous les descendants d’Aaron, sans distinction.
  - type: usfm
    marker: s2
    children:
    - type: text
      text: Sur le sacrifice de communion
    marker-yv: yv-h
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'Voici la loi concernant le sacrifice de communion que l’on offre à l’Eternel. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: Si on l’offre comme expression de sa reconnaissance, on offrira, avec ce sacrifice de reconnaissance, des gâteaux sans levain pétris à l’huile et des galettes sans levain arrosées d’huile, ainsi que des gâteaux faits de fleur de farine pétrie à l’huile
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '7.12 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Voir '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: Nb 15.3
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: '. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: On présentera l’offrande sur des gâteaux de pain levé
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '7.13 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: C’est-à-dire du pain ordinaire qui n’était pas brûlé sur l’autel.
      marker-yv: yv-n
    - type: text
      text: ', pour compléter le sacrifice de communion, offert par reconnaissance. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'On prélèvera sur chacune de ces offrandes une portion pour l’offrir à l’Eternel ; celle-ci reviendra au prêtre qui aura fait l’aspersion du sang pour le sacrifice de communion. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: La viande du sacrifice de communion, offert par reconnaissance, sera mangée le jour où on l’offre. On n’en laissera rien jusqu’au lendemain matin.
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'Si le sacrifice de communion est offert pour accomplir un vœu ou comme don volontaire, une partie de la viande de la victime sera mangée le jour où on l’offre, mais le reste pourra être mangé le lendemain. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'Ce qui restera de la viande du sacrifice le surlendemain sera brûlé. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: Si l’on en mange le surlendemain, celui qui a offert le sacrifice ne sera pas agréé, son sacrifice ne compte pas. Car cette viande est devenue impure, et celui qui en mange se rend coupable d’une faute.
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'Si la viande est entrée en contact avec une personne ou un objet rituellement impur, on ne la mangera pas : il faudra la brûler.'
  - type: usfm
    marker: p
    children:
    - type: text
      text: Toute personne rituellement pure
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '7.19 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Il s’agit d’une pureté rituelle définie ailleurs dans le Lévitique (voir 5.2-3 ; 13.45-46 ; 15.2, 3, 19).
      marker-yv: yv-n
    - type: text
      text: ' pourra manger de la viande du sacrifice de communion, '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'On égorgera la victime du sacrifice de réparation au même endroit que l’holocauste, et l’on aspergera de son sang tous les côtés de l’autel. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: mais si quelqu’un mange de la viande du sacrifice de communion qui appartient à l’Eternel, alors qu’il se trouve en état d’impureté rituelle
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '7.20 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Voir '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: Lv 12.1-8
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: ', il sera retranché de son peuple. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: De même, si quelqu’un mange de la viande du sacrifice de communion qui appartient à l’Eternel, après avoir touché quoi que ce soit de rituellement impur – impureté d’homme, animal impur ou quelque autre impureté abominable – il sera retranché de son peuple.
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: 'L’Eternel parla à Moïse en ces termes : '
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: 'Dis aux Israélites : Vous ne mangerez pas de graisse de bœuf, de mouton, ni de chèvre. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: 'La graisse d’une bête crevée ou déchiquetée par un fauve pourra servir à d’autres usages, mais vous ne devez pas en manger. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: 'En effet, celui qui mange de la graisse des animaux qu’on offre à l’Eternel en la consumant par le feu sera retranché de son peuple. '
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: 'Nulle part où vous habiterez, vous ne consommerez de sang, que ce soit celui d’un oiseau ou d’un quadrupède. '
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: Si une personne consomme du sang, quel qu’il soit, elle sera retranchée de son peuple
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '7.27 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Voir Gn 9.4 ; Lv 17.10-14 ; Dt 12.16, 23 ; 15.23.
      marker-yv: yv-n
    - type: text
      text: .
  '28':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: 'L’Eternel parla à Moïse en ces termes : '
  '29':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: 'Dis aux Israélites : Celui qui offre à l’Eternel un sacrifice de communion en apportera la part qu’il donne à l’Eternel. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'On en offrira toutes les parties grasses, c’est-à-dire la queue, la graisse qui recouvre les entrailles, '
  '30':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '30'
    - type: text
      text: 'Il l’apportera de ses propres mains pour qu’elle soit consumée par le feu pour l’Eternel. Il apportera la graisse avec la poitrine de l’animal et il fera avec la poitrine le geste de présentation devant l’Eternel. '
  '31':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '31'
    - type: text
      text: 'Le prêtre brûlera la graisse sur l’autel ; quant à la poitrine, elle reviendra à Aaron et à ses fils. '
  '32':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '32'
    - type: text
      text: 'Vous donnerez aussi comme offrande au prêtre le gigot droit de vos sacrifices de communion. '
  '33':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '33'
    - type: text
      text: 'Celui des fils d’Aaron qui offrira le sang et les parties grasses des sacrifices de communion aura ainsi comme part le gigot droit. '
  '34':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '34'
    - type: text
      text: Car je reçois des Israélites la poitrine pour laquelle on fait le geste de présentation et le gigot que l’on prélève sur les sacrifices de communion, et je les donne au prêtre Aaron et à ses descendants ; c’est une prescription qui restera en vigueur à perpétuité pour les Israélites.
  '35':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '35'
    - type: text
      text: 'C’est la part qui revient à Aaron et à ses descendants sur les sacrifices consumés par le feu qui appartiennent à l’Eternel, à partir du jour où ils seront installés dans leur fonction de prêtre pour l’Eternel. '
  '36':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '36'
    - type: text
      text: C’est là ce que l’Eternel ordonna aux Israélites de donner aux prêtres à partir du jour où ceux-ci reçoivent l’onction. C’est une règle en vigueur à perpétuité, pour toutes les générations.
  - type: usfm
    marker: s2
    children:
    - type: text
      text: Conclusion
    marker-yv: yv-h
  '37':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '37'
    - type: text
      text: 'Telles sont les lois concernant l’holocauste, l’offrande, le sacrifice pour le péché, le sacrifice de réparation, celui qu’on offre à l’occasion d’une investiture et le sacrifice de communion. '
  '38':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '38'
    - type: text
      text: L’Eternel les a données à Moïse au mont Sinaï, le jour où il commanda aux Israélites de lui offrir leurs sacrifices et leurs offrandes dans le désert du Sinaï.
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'les deux rognons, la graisse qui les enveloppe et celle qui couvre le dos, ainsi que le dessus du foie qu’on enlèvera avec les rognons. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'Le prêtre les brûlera sur l’autel. C’est un sacrifice de réparation consumé par le feu pour l’Eternel. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'Tout homme faisant partie des prêtres pourra en manger ; il le consommera dans un lieu saint, car c’est une chose très sainte. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'La même loi régit le sacrifice de réparation et le sacrifice pour le péché : la viande de la victime revient au prêtre qui fait l’expiation.'
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: Quand un prêtre offre l’holocauste d’une personne, la peau de la victime qu’il a offerte lui revient.
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'Toute offrande, cuite au four, dans une marmite ou une poêle, reviendra au prêtre qui l’a offerte. '
