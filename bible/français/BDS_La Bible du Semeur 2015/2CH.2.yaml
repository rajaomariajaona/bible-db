document_id: 2CH.2,21
type_code: fra
verses:
  '1':
  - type: heading
    content: Salomon enrôle des ouvriers et commande les matériaux pour la construction du Temple
  - type: text
    content: Salomon enrôla 70 000 hommes pour le transport des matériaux, 80 000 hommes pour extraire et tailler les pierres dans la montagne et 3 600 contremaîtres pour surveiller les travaux.
  '10':
  - type: text
    content: 'Hiram, le roi de Tyr, envoya une lettre à Salomon dans laquelle il disait : « C’est parce que l’Eternel aime son peuple qu’il t’a établi roi sur lui. »'
  '11':
  - type: text
    content: 'Par ailleurs, il dit : « Béni soit l’Eternel, le Dieu d’Israël, qui a fait le ciel et la terre, de ce qu’il a donné au roi David un fils plein de sagesse, de bon sens et d’intelligence, qui bâtira un temple à l’Eternel et un palais royal pour lui-même ! '
  '12':
  - type: text
    content: 'Je t’envoie donc aussitôt un spécialiste particulièrement habile, il s’appelle Houram-Abi, '
  '13':
  - type: text
    content: 'et il est fils d’une femme de la tribu de Dan et d’un père tyrien. Il sait travailler l’or, l’argent, le bronze et le fer, la pierre et le bois ; il sait teindre les étoffes en pourpre et en violet, travailler les tissus de fin lin et de carmin. Il connaît tout l’art de la sculpture. Il saura réaliser tout projet qui lui sera confié. Il travaillera avec tes propres artisans et avec ceux de mon seigneur David, ton père. '
  '14':
  - type: text
    content: 'Maintenant, que mon seigneur fasse parvenir à ses serviteurs le blé, l’orge, l’huile et le vin dont il a parlé. '
  '15':
  - type: text
    content: Quant à nous, nous abattrons au Liban tous les arbres dont tu auras besoin, nous te les amènerons en radeaux par mer jusqu’à Jaffa
  - type: note
    content: Le port d’Israël (Jon 1.3), mentionné depuis le partage du pays (Jos 19.46), qui reste le plus grand port du pays d’Israël.
  - type: text
    content: ' d’où tu les feras transporter à Jérusalem. »'
  '16':
  - type: text
    content: Salomon fit le compte de tous les étrangers qui vivaient dans le pays d’Israël, après le recensement fait par son père David. Il y en avait 153 600
  - type: note
    content: Voir 1 Ch 22.2.
  - type: text
    content: '. '
  '17':
  - type: text
    content: Il en affecta 70 000 aux transports, 80 000 comme tailleurs de pierres dans la montagne et 3 600 à la surveillance des travaux de tous ces ouvriers.
  '2':
  - type: text
    content: Salomon envoya des messagers à Hiram
  - type: note
    content: 'Voir 1 Ch 14.1. Hébreu : Houram, une variante du nom Hiram. De même au v. 10 et en 8.2, 18 ; 9.10, 21.'
  - type: text
    content: ', le roi de Tyr, pour lui dire : Veuille faire pour moi ce que tu as fait pour mon père David, à qui tu as fourni des cèdres pour qu’il puisse se construire un palais afin d’y habiter. '
  '3':
  - type: text
    content: A présent, je vais bâtir un temple en l’honneur de l’Eternel, mon Dieu, et qui lui sera consacré. Nous y brûlerons devant lui des parfums aromatiques, nous y disposerons en permanence les rangées de pain qui doivent être exposés devant lui
  - type: note
    content: Voir Lv 24.5-9.
  - type: text
    content: ', et nous lui offrirons des holocaustes matin et soir. Nous y célébrerons les jours de repos, les nouvelles lunes et les fêtes cultuelles de l’Eternel notre Dieu. Ceci sera accompli à perpétuité en Israël. '
  '4':
  - type: text
    content: 'Le temple que je vais bâtir sera grand, car notre Dieu est plus grand que tous les dieux. '
  '5':
  - type: text
    content: 'Mais qui donc serait capable de bâtir un temple à sa mesure, alors que le ciel dans toute son immensité ne peut le contenir ? Et moi-même, qui suis-je pour ériger un temple pour l’Eternel ? Je peux tout au plus construire un lieu où l’on brûlera des sacrifices devant lui. '
  '6':
  - type: text
    content: 'Maintenant, veuille donc m’envoyer un homme expert dans le travail de l’or, de l’argent, du bronze et du fer, dans la teinture des étoffes en pourpre, en carmin et en violet, et qui s’y connaisse dans l’art de la sculpture. Il collaborera avec mes propres spécialistes en Juda et à Jérusalem, ceux que mon père David a préparés. '
  '7':
  - type: text
    content: 'Veuille aussi m’expédier du Liban des bois de cèdre, de cyprès et de santal, car je sais que tes bûcherons savent s’y prendre pour couper le bois. Mes ouvriers travailleront avec les tiens. '
  '8':
  - type: text
    content: 'Que l’on me prépare une grande quantité de bois, car le temple que je vais construire sera très grand et magnifique. '
  '9':
  - type: text
    content: Je donnerai à tes bûcherons 6 000 tonnes de blé, 4 000 tonnes d’orge, 900 000 litres de vin et 900 000 litres d’huile.
