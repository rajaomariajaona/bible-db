document_id: PSA.47,21
type_code: fra
verses:
  '1':
  - type: heading
    content: Applaudissez Dieu
  - type: text
    content: Au chef de chœur. Un psaume des Qoréites
  - type: note
    content: Voir note 42.1.
  - type: text
    content: .
  '10':
  - type: text
    content: 'Les chefs des peuples ╵se réunissent :'
  - type: text
    content: ils sont ton peuple, ╵Dieu d’Abraham
  - type: note
    content: 'Au lieu de peuple l’ancienne traduction grecque et la syriaque ont compris : avec traduisant ainsi : les chefs des peuples se réunissent au Dieu d’Abraham. La confusion entre ces deux mots est facile en hébreu. Il est aussi possible que la préposition signifiant avec ait sauté, à cause de sa ressemblance avec le mot signifiant peuple. Dans ce cas, le sens serait : les chefs des peuples se réunissent avec le peuple du Dieu d’Abraham. Dieu d’Abraham: Voir Gn 12.2-3 ; 17.4-6 ; 22.17-18.'
  - type: text
    content: '  !'
  - type: text
    content: Ils sont à Dieu, ╵tous les puissants
  - type: note
    content: 'Autres traductions : les boucliers ou les protecteurs.'
  - type: text
    content: ' ╵de cette terre,'
  - type: text
    content: car il est élevé ╵au plus haut point.
  '2':
  - type: text
    content: Vous, tous les peuples, ╵battez des mains !
  - type: text
    content: Poussez vers Dieu ╵des cris de joie !
  '3':
  - type: text
    content: Car l’Eternel, ╵lui, le Très-Haut, ╵est redoutable,
  - type: text
    content: c’est le grand Roi ╵du monde entier.
  '4':
  - type: text
    content: Il nous soumet ╵bien des peuplades,
  - type: text
    content: beaucoup de peuples ╵nous sont assujettis.
  '5':
  - type: text
    content: Il a choisi ╵pour notre part ╵un territoire
  - type: text
    content: qui fait la gloire ╵de tout Jacob ╵son bien-aimé.
  - type: text
    content: Pause
  '6':
  - type: text
    content: Dieu est monté
  - type: note
    content: Ce psaume fait peut-être allusion à une cérémonie fêtant l’entrée de Dieu dans son temple, le coffre sacré représentant son « trône » (v. 9).
  - type: text
    content: ' ╵parmi les cris de joie,'
  - type: text
    content: il est monté ╵au son du cor
  - type: note
    content: Il s’agissait du chofar, cor fait d’une corne de bélier.
  - type: text
    content: ', ╵lui, l’Eternel.'
  '7':
  - type: text
    content: Chantez à Dieu ! Chantez !
  - type: text
    content: Chantez pour notre roi !
  - type: text
    content: Oui, chantez-le !
  '8':
  - type: text
    content: Car Dieu est Roi ╵du monde entier.
  - type: text
    content: Chantez pour lui ╵un beau cantique !
  '9':
  - type: text
    content: C’est Dieu qui règne ╵sur tous les peuples.
  - type: text
    content: Sur son saint trône, il siège.
