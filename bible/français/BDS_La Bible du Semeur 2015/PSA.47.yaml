document_id: PSA.47,21
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Applaudissez Dieu
    marker-yv: yv-h
  - type: usfm
    marker: d
    children:
    - type: text
      text: Au chef de chœur. Un psaume des Qoréites
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '47.1 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Voir note '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: '42.1'
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: .
  '10':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Les chefs des peuples ╵se réunissent :'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ils sont ton peuple, ╵Dieu d’Abraham
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '47.10 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Au lieu de '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'peuple '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'l’ancienne traduction grecque et la syriaque ont compris : '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'avec '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'traduisant ainsi : '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'les chefs des peuples se réunissent au Dieu d’Abraham. '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'La confusion entre ces deux mots est facile en hébreu. Il est aussi possible que la préposition signifiant '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'avec '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'ait sauté, à cause de sa ressemblance avec le mot signifiant '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'peuple. '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Dans ce cas, le sens serait : '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'les chefs des peuples se réunissent avec le peuple du Dieu d’Abraham. '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Dieu d’Abraham
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: ': '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Voir Gn 12.2-3 ; 17.4-6 ; 22.17-18.
      marker-yv: yv-n
    - type: text
      text: '  !'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ils sont à Dieu, ╵tous les puissants
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '47.10 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Autres traductions : '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'les boucliers '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'ou '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: les protecteurs.
      marker-yv: yv-n
    - type: text
      text: ' ╵de cette terre,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: car il est élevé ╵au plus haut point.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Vous, tous les peuples, ╵battez des mains !
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Poussez vers Dieu ╵des cris de joie !
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Car l’Eternel, ╵lui, le Très-Haut, ╵est redoutable,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: c’est le grand Roi ╵du monde entier.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Il nous soumet ╵bien des peuplades,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: beaucoup de peuples ╵nous sont assujettis.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Il a choisi ╵pour notre part ╵un territoire
  - type: usfm
    marker: q1
    children:
    - type: text
      text: qui fait la gloire ╵de tout Jacob ╵son bien-aimé.
  - type: usfm
    marker: q4
    children:
    - type: text
      text: Pause
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Dieu est monté
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '47.6 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Ce psaume fait peut-être allusion à une cérémonie fêtant l’entrée de Dieu dans son temple, le coffre sacré représentant son « trône » (v. 9).
      marker-yv: yv-n
    - type: text
      text: ' ╵parmi les cris de joie,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: il est monté ╵au son du cor
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '47.6 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Il s’agissait du chofar, cor fait d’une corne de bélier.
      marker-yv: yv-n
    - type: text
      text: ', ╵lui, l’Eternel.'
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Chantez à Dieu ! Chantez !
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Chantez pour notre roi !
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Oui, chantez-le !
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Car Dieu est Roi ╵du monde entier.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Chantez pour lui ╵un beau cantique !
  '9':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: C’est Dieu qui règne ╵sur tous les peuples.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Sur son saint trône, il siège.
