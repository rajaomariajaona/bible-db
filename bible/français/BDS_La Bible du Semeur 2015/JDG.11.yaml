document_id: JDG.11
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Jephté
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Jephté, originaire de Galaad, était un guerrier valeureux. Il était le fils d’une prostituée et d’un homme appelé Galaad. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Lorsque la femme légitime de cet homme lui eut aussi donné des fils, et que ceux-ci furent devenus adultes, ils chassèrent Jephté du foyer en lui disant : Tu n’auras pas d’héritage chez notre père, car tu es le fils d’une autre femme !'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Et Jephté s’enfuit loin de ses frères. Il se fixa dans la région de Tob. Bientôt, toute une bande d’aventuriers se regroupa autour de lui pour entreprendre des raids avec lui.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: C’est à cette période que les Ammonites
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '11.4 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Voir note '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '3.13'
        metadata:
          usfm: JDG.3.13
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: ' firent la guerre à Israël. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Quand ils attaquèrent les Israélites, les responsables de Galaad allèrent chercher Jephté, dans la région de Tob. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Ils lui dirent : Viens prendre le commandement de nos troupes pour que nous combattions les Ammonites.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Jephté leur répondit : Vous m’avez haï et vous m’avez chassé de chez mon père. Comment osez-vous faire appel à moi maintenant que vous êtes dans la détresse ?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Les responsables reprirent : C’est bien pour cela que nous revenons vers toi maintenant. Si tu viens avec nous et si tu combats les Ammonites, tu deviendras notre chef à tous et tu seras à la tête de toute la population de Galaad.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: – Soit, répliqua Jephté. Mais si vous me faites revenir pour combattre les Ammonites, et que l’Eternel me donne la victoire sur eux, je resterai votre chef.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Alors les responsables de Galaad lui déclarèrent : L’Eternel en est témoin ! Qu’il nous punisse si nous ne faisons pas ce que tu as dit.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Alors Jephté partit avec les responsables de Galaad. Le peuple le nomma chef et le mit à la tête des troupes. Jephté répéta les termes de l’accord conclu avec les responsables devant l’Eternel à Mitspa.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Le message de Jephté aux Ammonites
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Jephté envoya des messagers dire au roi des Ammonites : Qu’est-ce que tu as contre moi pour que tu viennes faire la guerre dans mon pays ?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Le roi des Ammonites répondit aux messagers : C’est parce que les Israélites se sont emparés de mon pays lorsqu’ils sont sortis d’Egypte. Ils m’ont pris tout le territoire situé entre la vallée de l’Arnon, le torrent du Yabboq et la vallée du Jourdain. Rends-les-moi maintenant de bon gré.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Jephté envoya de nouveau une délégation au roi des Ammonites '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'pour lui dire : Ainsi parle Jephté : « Israël ne s’est emparé ni du pays de Moab ni de celui des Ammonites. »'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'En effet, après avoir quitté l’Egypte, les Israélites ont traversé le désert jusqu’à la mer des Roseaux et ils sont arrivés à Qadesh. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Alors ils ont envoyé des messagers au roi d’Edom pour lui demander l’autorisation de traverser son pays. Mais celui-ci refusa. Après cela, ils ont fait la même demande au roi de Moab, qui refusa également. Et Israël est resté à Qadesh. '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Par la suite, ils ont repris leur marche à travers le désert en contournant le pays d’Edom et celui de Moab. Ils sont arrivés à l’est du pays de Moab et ils ont établi leur camp de l’autre côté de l’Arnon, sans pénétrer dans le territoire de Moab dont l’Arnon constitue la frontière. '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Alors Israël a envoyé des messagers à Sihôn, roi des Amoréens à Heshbôn, en lui faisant dire : « Permets-nous, s’il te plaît, de traverser ton pays pour arriver au lieu où nous allons. »'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Mais Sihôn ne fit pas confiance à Israël pour lui permettre de passer sur son territoire. Il mobilisa toutes ses troupes et prit position à Yahats, puis engagea le combat contre Israël. '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Mais l’Eternel, le Dieu d’Israël, a livré Sihôn et toute son armée aux Israélites qui les ont battus. Ainsi les Israélites ont conquis tout le pays des Amoréens qui habitaient dans cette contrée. '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: Ils ont conquis tout le territoire des Amoréens depuis l’Arnon jusqu’au torrent du Yabboq et depuis le désert jusqu’au Jourdain.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Maintenant que l’Eternel, le Dieu d’Israël, a enlevé leur territoire aux Amoréens et l’a donné à son peuple Israël, tu voudrais, toi, les en déposséder ? '
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Tu possèdes bien tout le territoire que ton dieu Kemosh t’a donné. Alors pourquoi ne posséderions-nous pas tout ce que l’Eternel notre Dieu nous a permis de conquérir ? '
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'D’autre part, te crois-tu vraiment plus fort que Balaq, fils de Tsippor, le roi de Moab ? A-t-il jamais osé contester avec Israël ou lui faire la guerre ? '
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Cela fait trois cents ans qu’Israël est installé à Heshbôn et Aroër, et dans les villes qui en dépendent, ainsi que dans toutes les localités qui bordent l’Arnon. Pourquoi ne les leur avez-vous pas reprises pendant tout ce temps-là ? '
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: Moi, je n’ai commis aucune faute contre toi, c’est toi qui agis mal en venant me faire la guerre. Que l’Eternel, le Juge, rende aujourd’hui son jugement entre les descendants d’Israël et ceux d’Ammon !
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: Mais le roi des Ammonites ne tint aucun compte du message que Jephté lui avait fait transmettre.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Le vœu de Jephté et sa victoire sur les Ammonites
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'Alors l’Esprit de l’Eternel descendit sur Jephté. Celui-ci traversa les territoires de Galaad et de Manassé, puis il passa à Mitspé en Galaad, et de là, il s’avança pour attaquer les Ammonites. '
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'Jephté fit un vœu à l’Eternel et dit : Si vraiment tu me donnes la victoire sur les Ammonites, '
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: je te consacrerai et je t’offrirai en holocauste la première personne qui sortira de ma maison pour venir à ma rencontre, quand je reviendrai en vainqueur de la bataille contre les Ammonites.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '32'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'Jephté se lança à l’attaque des Ammonites et l’Eternel lui donna la victoire sur eux. '
  - type: usfm
    marker: v
    metadata:
      v: '33'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: Il leur infligea de lourdes pertes dans vingt bourgs situés entre Aroër et Minnith et jusqu’à la région d’Abel-Qeramim. Ce fut une très grande défaite pour les Ammonites qui furent ainsi affaiblis par les Israélites.
- type: usfm
  marker: s1
  children:
  - type: text
    text: La fille de Jephté
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '34'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: 'Après la bataille, Jephté retourna chez lui à Mitspa. Et voici que sa fille sortit à sa rencontre en dansant au rythme des tambourins. C’était son unique enfant ; à part elle, il n’avait ni fils, ni fille. '
  - type: usfm
    marker: v
    metadata:
      v: '35'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: 'Dès qu’il l’aperçut, il déchira ses vêtements et s’écria : Ah ! ma fille ! Tu m’accables de chagrin ! Faut-il que ce soit toi qui causes mon désespoir ! J’ai donné ma parole à l’Eternel et je ne puis revenir sur ma promesse.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '36'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: 'Elle lui dit : Mon père, si tu as donné ta parole à l’Eternel, agis envers moi comme tu l’as promis, puisque l’Eternel a réglé leur compte aux Ammonites, tes ennemis.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '37'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: 'Puis elle ajouta : Je ne te demande qu’une chose : Accorde-moi un délai de deux mois : j’irai avec mes amies dans les montagnes, pour y pleurer de ce qu’il me faille mourir avant d’avoir été mariée.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '38'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: text
    text: 'Jephté lui dit : « Va ! » et la laissa partir pour deux mois. Elle s’en alla avec ses amies sur les montagnes pour y pleurer de devoir mourir sans être mariée. '
  - type: usfm
    marker: v
    metadata:
      v: '39'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '39'
  - type: text
    text: 'A la fin des deux mois, elle revint auprès de son père, et il accomplit envers sa fille, qui était vierge, le vœu qu’il avait fait. C’est là l’origine de la coutume qui s’établit en Israël : '
  - type: usfm
    marker: v
    metadata:
      v: '40'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '40'
  - type: text
    text: chaque année les jeunes filles s’en vont pendant quatre jours pour célébrer la fille de Jephté, le Galaadite.
