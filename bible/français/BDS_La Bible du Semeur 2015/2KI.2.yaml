document_id: 2KI.2,21
type_code: fra
verses:
  '1':
  - type: heading
    content: L’Eternel enlève Elie au ciel – Elisée lui succède
  - type: text
    content: Le jour où l’Eternel enleva Elie au ciel dans un tourbillon de vent, celui-ci partait de Guilgal
  - type: note
    content: Non pas le Guilgal de la vallée du Jourdain (Jos 4.19 ; 5.9) près de Jéricho, mais un village à 11 kilomètres au nord-ouest de Béthel, à la frontière des deux royaumes. C’est là qu’Elisée reviendra (4.38) ; il s’y trouvait une école de disciples des prophètes.
  - type: text
    content: ' avec Elisée. '
  '10':
  - type: text
    content: 'Elie répondit : Tu as exprimé une demande difficile à satisfaire, mais si tu me vois pendant que je serai enlevé d’auprès de toi, cela te sera accordé ; si tu ne me vois pas, il n’en sera rien.'
  '11':
  - type: text
    content: 'Pendant qu’ils continuaient à marcher tout en parlant, un char de feu tiré par des chevaux de feu vint entre eux et les sépara l’un de l’autre. Elie fut entraîné au ciel dans un tourbillon de vent. '
  '12':
  - type: text
    content: 'A cette vue, Elisée s’écria : Mon père ! Mon père ! Toi qui étais comme les chars d’Israël et ses équipages'
  - type: note
    content: Voir 13.14.
  - type: text
    content: '  !'
  - type: text
    content: 'Puis il le perdit de vue. Saisissant alors ses vêtements, il les déchira en deux, '
  '13':
  - type: text
    content: 'et ramassa le manteau qui était tombé des épaules d’Elie. Puis il revint sur ses pas et s’arrêta sur la rive du Jourdain ; '
  '14':
  - type: text
    content: 'il prit le manteau d’Elie, en frappa les eaux du fleuve et s’écria : Où est l’Eternel, le Dieu d’Elie ?'
  - type: text
    content: Ainsi il frappa lui aussi l’eau du fleuve qui s’écarta de part et d’autre, et il traversa à pied sec.
  '15':
  - type: text
    content: 'Les disciples des prophètes de Jéricho qui le virent d’en face s’exclamèrent : L’esprit d’Elie repose maintenant sur Elisée !'
  - type: text
    content: 'Ils allèrent à sa rencontre et se prosternèrent jusqu’à terre devant lui. '
  '16':
  - type: text
    content: 'Ils lui proposèrent : Vois-tu, nous avons avec nous, tes serviteurs, cinquante hommes robustes. Permets qu’ils aillent à la recherche de ton maître ! Peut-être l’Esprit de l’Eternel n’a-t-il fait que l’emporter et le jeter sur quelque montagne ou dans quelque ravin.'
  - type: text
    content: 'Il répondit : Non, ne les envoyez pas !'
  '17':
  - type: text
    content: 'Mais ils insistèrent tant et plus, si bien qu’il leur dit : Eh bien, envoyez-les.'
  - type: text
    content: 'Ils envoyèrent donc les cinquante hommes qui cherchèrent pendant trois jours en vain. '
  '18':
  - type: text
    content: 'Ils revinrent auprès d’Elisée qui était resté à Jéricho. Il leur dit : Je vous avais bien dit de ne pas y aller !'
  - type: heading
    content: La parole prophétique d’Elisée est suivie d’effet
  '19':
  - type: text
    content: 'Les habitants de la ville vinrent dire à Elisée : Vois-tu, notre ville est bien située, comme mon seigneur peut le voir, mais l’eau est malsaine et la terre est infertile.'
  '2':
  - type: text
    content: 'A un moment donné, il lui dit : Reste ici, je te prie, car l’Eternel m’ordonne d’aller jusqu’à Béthel'
  - type: note
    content: Lieu important depuis l’époque des patriarches (Gn 12.8 ; 28.10-22 ; 35.1-5). Jéroboam y avait édifié un sanctuaire rival du temple de Jérusalem (1 R 12.28-33), mais l’Eternel y avait aussi ses représentants.
  - type: text
    content: .
  - type: text
    content: 'Elisée répondit : Aussi vrai que l’Eternel est vivant et que tu es toi-même en vie, je ne te quitterai pas.'
  - type: text
    content: Ils se rendirent donc ensemble à Béthel.
  '20':
  - type: text
    content: 'Il répondit : Apportez-moi un plat neuf et mettez-y du sel.'
  - type: text
    content: Ils le lui apportèrent.
  '21':
  - type: text
    content: 'Il se rendit à la source des eaux, y jeta du sel et dit : Voici ce que déclare l’Eternel : « J’ai rendu cette eau saine ; elle ne causera plus la mort et ne rendra plus la terre infertile. »'
  '22':
  - type: text
    content: Les eaux devinrent saines et le sont restées jusqu’à ce jour, conformément à la parole qu’Elisée avait prononcée.
  '23':
  - type: text
    content: 'De Jéricho, Elisée se rendit à Béthel. Pendant qu’il montait par la route, des enfants sortirent de la ville et se moquèrent de lui en criant : Monte, chauve ! Monte, chauve !'
  '24':
  - type: text
    content: 'Il se retourna pour les regarder et appela sur eux la malédiction au nom de l’Eternel. Aussitôt, deux ourses sortirent de la forêt et déchirèrent quarante-deux de ces enfants. '
  '25':
  - type: text
    content: De là, Elisée se rendit au mont Carmel, d’où il retourna à Samarie
  - type: note
    content: Où était son domicile (6.32).
  - type: text
    content: .
  '3':
  - type: text
    content: 'Les disciples des prophètes qui habitaient à Béthel sortirent au-devant d’Elisée et lui demandèrent : Sais-tu que l’Eternel va enlever aujourd’hui ton maître au-dessus de toi ?'
  - type: text
    content: 'Il leur répondit : Oui, je le sais, moi aussi, mais ne parlez pas de cela !'
  '4':
  - type: text
    content: 'Elie lui dit de nouveau : Arrête-toi ici, car l’Eternel m’ordonne d’aller à Jéricho.'
  - type: text
    content: 'Il répondit : Aussi vrai que l’Eternel est vivant et que tu es toi-même en vie, je ne te quitterai pas !'
  - type: text
    content: Ils allèrent donc ensemble à Jéricho.
  '5':
  - type: text
    content: 'Les disciples des prophètes qui habitaient Jéricho vinrent au-devant d’Elisée et lui demandèrent : Sais-tu que l’Eternel va enlever aujourd’hui ton maître au-dessus de toi ?'
  - type: text
    content: 'Il répondit : Oui, je le sais, moi aussi, mais ne parlez pas de cela !'
  '6':
  - type: text
    content: 'Elie lui dit : Reste ici, je te prie, car l’Eternel m’ordonne de me rendre jusqu’au Jourdain.'
  - type: text
    content: 'Mais Elisée lui répondit : Aussi vrai que l’Eternel est vivant et que tu es toi-même en vie, je ne te quitterai pas.'
  - type: text
    content: Ils poursuivirent donc tous deux leur chemin.
  '7':
  - type: text
    content: 'Cinquante disciples des prophètes les suivirent et se postèrent en face d’eux à une certaine distance, lorsqu’ils s’arrêtèrent au bord du Jourdain. '
  '8':
  - type: text
    content: 'Alors Elie enleva son manteau, le roula et en frappa l’eau du fleuve qui s’écarta de part et d’autre, de sorte qu’ils purent traverser tous deux à sec. '
  '9':
  - type: text
    content: 'Lorsqu’ils eurent passé, Elie dit à Elisée : Que voudrais-tu que je fasse pour toi ? Demande-le-moi avant que je sois enlevé loin de toi.'
  - type: text
    content: 'Elisée répondit : J’aimerais recevoir une double part de l’Esprit qui réside en toi.'
