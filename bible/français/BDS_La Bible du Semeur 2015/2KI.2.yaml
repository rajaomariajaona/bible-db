document_id: 2KI.2
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: L’Eternel enlève Elie au ciel – Elisée lui succède
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Le jour où l’Eternel enleva Elie au ciel dans un tourbillon de vent, celui-ci partait de Guilgal
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '2.1 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Non pas le Guilgal de la vallée du Jourdain (Jos 4.19 ; 5.9) près de Jéricho, mais un village à 11 kilomètres au nord-ouest de Béthel, à la frontière des deux royaumes. C’est là qu’Elisée reviendra (
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '4.38'
        metadata:
          usfm: 2KI.4.38
      - type: text
        text: ) ; il s’y trouvait une école de disciples des prophètes.
    marker-yv: yv-n
  - type: text
    text: ' avec Elisée. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'A un moment donné, il lui dit : Reste ici, je te prie, car l’Eternel m’ordonne d’aller jusqu’à Béthel'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '2.2 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Lieu important depuis l’époque des patriarches (Gn 12.8 ; 28.10-22 ; 35.1-5). Jéroboam y avait édifié un sanctuaire rival du temple de Jérusalem (
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1 R 12.28-33
        metadata:
          usfm: 1KI.12.28+1KI.12.29+1KI.12.30+1KI.12.31+1KI.12.32+1KI.12.33
      - type: text
        text: ), mais l’Eternel y avait aussi ses représentants.
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Elisée répondit : Aussi vrai que l’Eternel est vivant et que tu es toi-même en vie, je ne te quitterai pas.'
- type: usfm
  marker: p
  children:
  - type: text
    text: Ils se rendirent donc ensemble à Béthel.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Les disciples des prophètes qui habitaient à Béthel sortirent au-devant d’Elisée et lui demandèrent : Sais-tu que l’Eternel va enlever aujourd’hui ton maître au-dessus de toi ?'
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Il leur répondit : Oui, je le sais, moi aussi, mais ne parlez pas de cela !'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Elie lui dit de nouveau : Arrête-toi ici, car l’Eternel m’ordonne d’aller à Jéricho.'
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Il répondit : Aussi vrai que l’Eternel est vivant et que tu es toi-même en vie, je ne te quitterai pas !'
- type: usfm
  marker: p
  children:
  - type: text
    text: Ils allèrent donc ensemble à Jéricho.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Les disciples des prophètes qui habitaient Jéricho vinrent au-devant d’Elisée et lui demandèrent : Sais-tu que l’Eternel va enlever aujourd’hui ton maître au-dessus de toi ?'
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Il répondit : Oui, je le sais, moi aussi, mais ne parlez pas de cela !'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Elie lui dit : Reste ici, je te prie, car l’Eternel m’ordonne de me rendre jusqu’au Jourdain.'
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Mais Elisée lui répondit : Aussi vrai que l’Eternel est vivant et que tu es toi-même en vie, je ne te quitterai pas.'
- type: usfm
  marker: p
  children:
  - type: text
    text: Ils poursuivirent donc tous deux leur chemin.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Cinquante disciples des prophètes les suivirent et se postèrent en face d’eux à une certaine distance, lorsqu’ils s’arrêtèrent au bord du Jourdain. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Alors Elie enleva son manteau, le roula et en frappa l’eau du fleuve qui s’écarta de part et d’autre, de sorte qu’ils purent traverser tous deux à sec. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Lorsqu’ils eurent passé, Elie dit à Elisée : Que voudrais-tu que je fasse pour toi ? Demande-le-moi avant que je sois enlevé loin de toi.'
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Elisée répondit : J’aimerais recevoir une double part de l’Esprit qui réside en toi.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Elie répondit : Tu as exprimé une demande difficile à satisfaire, mais si tu me vois pendant que je serai enlevé d’auprès de toi, cela te sera accordé ; si tu ne me vois pas, il n’en sera rien.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Pendant qu’ils continuaient à marcher tout en parlant, un char de feu tiré par des chevaux de feu vint entre eux et les sépara l’un de l’autre. Elie fut entraîné au ciel dans un tourbillon de vent. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'A cette vue, Elisée s’écria : Mon père ! Mon père ! Toi qui étais comme les chars d’Israël et ses équipages'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '2.12 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Voir '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '13.14'
        metadata:
          usfm: 2KI.13.14
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: '  !'
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Puis il le perdit de vue. Saisissant alors ses vêtements, il les déchira en deux, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'et ramassa le manteau qui était tombé des épaules d’Elie. Puis il revint sur ses pas et s’arrêta sur la rive du Jourdain ; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'il prit le manteau d’Elie, en frappa les eaux du fleuve et s’écria : Où est l’Eternel, le Dieu d’Elie ?'
- type: usfm
  marker: p
  children:
  - type: text
    text: Ainsi il frappa lui aussi l’eau du fleuve qui s’écarta de part et d’autre, et il traversa à pied sec.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Les disciples des prophètes de Jéricho qui le virent d’en face s’exclamèrent : L’esprit d’Elie repose maintenant sur Elisée !'
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Ils allèrent à sa rencontre et se prosternèrent jusqu’à terre devant lui. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Ils lui proposèrent : Vois-tu, nous avons avec nous, tes serviteurs, cinquante hommes robustes. Permets qu’ils aillent à la recherche de ton maître ! Peut-être l’Esprit de l’Eternel n’a-t-il fait que l’emporter et le jeter sur quelque montagne ou dans quelque ravin.'
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Il répondit : Non, ne les envoyez pas !'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Mais ils insistèrent tant et plus, si bien qu’il leur dit : Eh bien, envoyez-les.'
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Ils envoyèrent donc les cinquante hommes qui cherchèrent pendant trois jours en vain. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Ils revinrent auprès d’Elisée qui était resté à Jéricho. Il leur dit : Je vous avais bien dit de ne pas y aller !'
- type: usfm
  marker: s1
  children:
  - type: text
    text: La parole prophétique d’Elisée est suivie d’effet
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Les habitants de la ville vinrent dire à Elisée : Vois-tu, notre ville est bien située, comme mon seigneur peut le voir, mais l’eau est malsaine et la terre est infertile.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Il répondit : Apportez-moi un plat neuf et mettez-y du sel.'
- type: usfm
  marker: p
  children:
  - type: text
    text: Ils le lui apportèrent.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Il se rendit à la source des eaux, y jeta du sel et dit : Voici ce que déclare l’Eternel : « J’ai rendu cette eau saine ; elle ne causera plus la mort et ne rendra plus la terre infertile. »'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: Les eaux devinrent saines et le sont restées jusqu’à ce jour, conformément à la parole qu’Elisée avait prononcée.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'De Jéricho, Elisée se rendit à Béthel. Pendant qu’il montait par la route, des enfants sortirent de la ville et se moquèrent de lui en criant : Monte, chauve ! Monte, chauve !'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Il se retourna pour les regarder et appela sur eux la malédiction au nom de l’Eternel. Aussitôt, deux ourses sortirent de la forêt et déchirèrent quarante-deux de ces enfants. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: De là, Elisée se rendit au mont Carmel, d’où il retourna à Samarie
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '2.25 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Où était son domicile (
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '6.32'
        metadata:
          usfm: 2KI.6.32
      - type: text
        text: ).
    marker-yv: yv-n
  - type: text
    text: .
