document_id: EZK.44,21
type_code: fra
verses:
  '1':
  - type: heading
    content: La porte du prince
  - type: text
    content: 'Le personnage me fit revenir du côté de la porte extérieure orientale du sanctuaire. Elle était fermée. '
  '10':
  - type: text
    content: 'Quant aux fonctions des lévites qui se sont éloignés de moi, lorsque Israël s’est égaré loin de moi pour se tourner vers ses idoles, ils porteront la responsabilité de leur faute. '
  '11':
  - type: text
    content: 'Ils assureront dans mon sanctuaire le service de portiers et le service du Temple. Ce sont eux qui égorgeront pour le peuple les victimes des holocaustes et des sacrifices, et ils se tiendront à la disposition du peuple pour le servir. '
  '12':
  - type: text
    content: 'Je le jure en levant ma main droite contre eux, déclare le Seigneur, l’Eternel : parce qu’ils ont assisté le peuple dans le culte de ses idoles et qu’ils ont entraîné la communauté d’Israël à pécher, ils porteront la responsabilité de leur faute. '
  '13':
  - type: text
    content: 'Ils ne s’approcheront pas de moi pour remplir devant moi les fonctions du sacerdoce. Ils ne toucheront pas aux choses qui me sont consacrées, ni aux choses très saintes. Et ils porteront le poids de leur honte et la sanction des pratiques abominables qu’ils ont commises. '
  '14':
  - type: text
    content: Je leur assignerai la responsabilité du service du Temple où ils effectueront toutes les tâches à accomplir.
  - type: heading
    content: Les fonctions des prêtres
  '15':
  - type: text
    content: Mais les prêtres-lévites, issus de Tsadoq
  - type: note
    content: 'Tsadoq: descendant d’Aaron par le fils de ce dernier : Eléazar (1 Ch 6.50-53), prêtre resté fidèle à Salomon, contrairement à Abiatar qui choisit le camp d’Adoniya, autre fils de David (1 R 1).'
  - type: text
    content: ', qui ont continué à accomplir le service de mon sanctuaire, quand les Israélites s’égaraient loin de moi, eux s’approcheront de moi pour officier pour mon culte et se tiendront devant moi pour m’offrir la graisse et le sang, le Seigneur, l’Eternel, le déclare. '
  '16':
  - type: text
    content: 'Ce sont eux qui entreront dans mon sanctuaire, pour s’approcher de ma table, pour officier pour moi et pour exécuter ce que j’ai prescrit pour mon culte. '
  '17':
  - type: text
    content: Lorsqu’ils entreront par les portes du parvis intérieur, ils se vêtiront d’habits de lin ; ils ne porteront pas de laine sur eux quand ils feront le service au-delà des portes du parvis intérieur et dans le Temple
  - type: note
    content: Voir Ex 28.39-43 ; Lv 16.4.
  - type: text
    content: '. '
  '18':
  - type: text
    content: 'Ils se coifferont de turbans de lin et mettront des caleçons de lin sur les reins, ils ne mettront pas de ceinture, pour éviter la transpiration. '
  '19':
  - type: text
    content: Mais lorsqu’ils sortiront dans le parvis extérieur pour retrouver le peuple, ils quitteront leurs habits de service, ils les déposeront dans les salles du sanctuaire et ils en mettront d’autres pour ne pas rendre sacrés les gens du peuple par contact avec leurs habits sacrés.
  '2':
  - type: text
    content: 'Alors l’Eternel me dit : Cette porte restera fermée, on ne l’ouvrira plus, et personne n’entrera par elle, car l’Eternel, le Dieu d’Israël, est entré par là. Elle restera donc fermée. '
  '20':
  - type: text
    content: 'Ils ne se raseront pas la tête et ne se laisseront pas non plus pousser librement les cheveux, mais ils les couperont soigneusement. '
  '21':
  - type: text
    content: 'Aucun prêtre ne boira de vin avant d’entrer dans le parvis intérieur. '
  '22':
  - type: text
    content: Ils n’épouseront ni veuve, ni femme divorcée, mais seulement des jeunes filles de la communauté d’Israël, ou la veuve d’un prêtre
  - type: note
    content: Voir Lv 21.13s.
  - type: text
    content: .
  '23':
  - type: text
    content: 'Ils apprendront à mon peuple à distinguer entre ce qui est saint et ce qui est profane, ils lui feront connaître la différence entre ce qui est impur et ce qui est pur. '
  '24':
  - type: text
    content: En cas de procès, c’est à eux qu’il appartiendra de juger ; ils jugeront le cas selon le droit que j’ai établi, ils obéiront à mes lois et mes commandements au sujet de toutes mes fêtes cultuelles et ils tiendront mes jours de sabbat pour sacrés.
  '25':
  - type: text
    content: 'Aucun d’eux ne touchera le corps d’un homme mort pour ne pas se rendre impur, sauf lorsqu’il s’agira de leur père ou de leur mère, de leur fils ou de leur fille, de leur frère ou de leur sœur non mariée. '
  '26':
  - type: text
    content: Dans ce cas, le prêtre attendra sept jours après s’être purifié
  - type: note
    content: Voir Nb 19.11s.
  - type: text
    content: '. '
  '27':
  - type: text
    content: Et le jour où il entrera de nouveau dans le sanctuaire, en passant par le parvis intérieur pour aller officier dans le sanctuaire, il offrira un sacrifice pour le péché, le Seigneur, l’Eternel, le déclare.
  '28':
  - type: text
    content: 'Ils auront un patrimoine, et ce patrimoine, ce sera moi. Vous ne leur attribuerez pas de propriété en Israël, c’est moi qui leur tiendrai lieu de propriété. '
  '29':
  - type: text
    content: 'Ils se nourriront des offrandes et des victimes présentées en sacrifice pour le péché et en sacrifice de réparation, et tout ce qui sera voué à Dieu, en Israël, leur reviendra. '
  '3':
  - type: text
    content: Toutefois, le prince, en sa qualité de prince, s’y assiéra pour prendre son repas devant l’Eternel
  - type: note
    content: Sans doute le repas qui suivait certains sacrifices.
  - type: text
    content: '  ; il y entrera par le portique de la porte et sortira par le même chemin.'
  '30':
  - type: text
    content: 'La meilleure part des prémices de toutes choses et toutes les offrandes de quoi que ce soit reviendront aux prêtres. Vous leur donnerez aussi la première fournée de ce que vous cuirez, afin de faire venir la bénédiction sur votre famille. '
  '31':
  - type: text
    content: Les prêtres ne mangeront la chair d’aucune bête crevée ou déchiquetée, qu’il s’agisse d’un oiseau ou d’un autre animal
  - type: note
    content: Voir Lv 17.15 ; Dt 14.21.
  - type: text
    content: .
  '4':
  - type: text
    content: Puis l’homme me conduisit devant le Temple par la porte nord
  - type: note
    content: Voir 8.3.
  - type: text
    content: . Je regardai et je vis la gloire de l’Eternel remplir le temple de l’Eternel ; alors je tombai face contre terre.
  - type: heading
    content: Qui sera admis au Temple ?
  '5':
  - type: text
    content: 'L’Eternel me dit : Fils d’homme, fais bien attention, regarde de tes deux yeux, et écoute de toutes tes oreilles tout ce que je vais t’expliquer au sujet de toutes les ordonnances et de tous les commandements relatifs'
  - type: note
    content: 'Le texte hébreu traditionnel a : le commandement relatif avec, en marge, l’indication qu’il faut lire : les commandements relatifs.'
  - type: text
    content: ' au temple de l’Eternel. Fais particulièrement attention à ceux qui ont trait aux entrées du Temple et à toutes les issues du sanctuaire. '
  '6':
  - type: text
    content: 'Et dis à ces rebelles, à la communauté d’Israël : Voici ce que déclare le Seigneur, l’Eternel : c’en est assez de tous vos actes abominables, communauté d’Israël ! '
  '7':
  - type: text
    content: 'Vous avez fait pénétrer dans mon sanctuaire des étrangers, incirconcis de cœur et incirconcis dans leur corps, afin de profaner mon temple, pendant que vous me présentiez l’offrande de mon pain, de la graisse et du sang ; vous avez ainsi violé mon alliance pour accomplir toutes vos pratiques abominables. '
  '8':
  - type: text
    content: Vous ne vous êtes pas acquittés pour moi du service relatif aux choses saintes, vous avez chargé des étrangers d’accomplir à votre place le service pour moi, dans mon sanctuaire.
  '9':
  - type: text
    content: 'Voici ce que déclare le Seigneur, l’Eternel : Aucun étranger, incirconcis de cœur ou incirconcis dans son corps, n’entrera dans mon sanctuaire ; non, aucun des étrangers qui se trouveront au milieu des Israélites.'
