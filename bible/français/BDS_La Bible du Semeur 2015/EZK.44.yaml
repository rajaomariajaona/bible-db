document_id: EZK.44,21
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s2
    children:
    - type: text
      text: La porte du prince
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Le personnage me fit revenir du côté de la porte extérieure orientale du sanctuaire. Elle était fermée. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Quant aux fonctions des lévites qui se sont éloignés de moi, lorsque Israël s’est égaré loin de moi pour se tourner vers ses idoles, ils porteront la responsabilité de leur faute. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ils assureront dans mon sanctuaire le service de portiers et le service du Temple. Ce sont eux qui égorgeront pour le peuple les victimes des holocaustes et des sacrifices, et ils se tiendront à la disposition du peuple pour le servir. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Je le jure en levant ma main droite contre eux, déclare le Seigneur, l’Eternel : parce qu’ils ont assisté le peuple dans le culte de ses idoles et qu’ils ont entraîné la communauté d’Israël à pécher, ils porteront la responsabilité de leur faute. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ils ne s’approcheront pas de moi pour remplir devant moi les fonctions du sacerdoce. Ils ne toucheront pas aux choses qui me sont consacrées, ni aux choses très saintes. Et ils porteront le poids de leur honte et la sanction des pratiques abominables qu’ils ont commises. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Je leur assignerai la responsabilité du service du Temple où ils effectueront toutes les tâches à accomplir.
  - type: usfm
    marker: s2
    children:
    - type: text
      text: Les fonctions des prêtres
    marker-yv: yv-h
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Mais les prêtres-lévites, issus de Tsadoq
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '44.15 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Tsadoq
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: ': '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'descendant d’Aaron par le fils de ce dernier : Eléazar ('
        - type: usfm
          marker: ref
          children:
          - type: text
            text: 1 Ch 6.50-53
        - type: text
          text: ), prêtre resté fidèle à Salomon, contrairement à Abiatar qui choisit le camp d’Adoniya, autre fils de David (
        - type: usfm
          marker: ref
          children:
          - type: text
            text: 1 R 1
        - type: text
          text: ).
      marker-yv: yv-n
    - type: text
      text: ', qui ont continué à accomplir le service de mon sanctuaire, quand les Israélites s’égaraient loin de moi, eux s’approcheront de moi pour officier pour mon culte et se tiendront devant moi pour m’offrir la graisse et le sang, le Seigneur, l’Eternel, le déclare. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ce sont eux qui entreront dans mon sanctuaire, pour s’approcher de ma table, pour officier pour moi et pour exécuter ce que j’ai prescrit pour mon culte. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Lorsqu’ils entreront par les portes du parvis intérieur, ils se vêtiront d’habits de lin ; ils ne porteront pas de laine sur eux quand ils feront le service au-delà des portes du parvis intérieur et dans le Temple
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '44.17 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Voir Ex 28.39-43 ; Lv 16.4.
      marker-yv: yv-n
    - type: text
      text: '. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ils se coifferont de turbans de lin et mettront des caleçons de lin sur les reins, ils ne mettront pas de ceinture, pour éviter la transpiration. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Mais lorsqu’ils sortiront dans le parvis extérieur pour retrouver le peuple, ils quitteront leurs habits de service, ils les déposeront dans les salles du sanctuaire et ils en mettront d’autres pour ne pas rendre sacrés les gens du peuple par contact avec leurs habits sacrés.
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Alors l’Eternel me dit : Cette porte restera fermée, on ne l’ouvrira plus, et personne n’entrera par elle, car l’Eternel, le Dieu d’Israël, est entré par là. Elle restera donc fermée. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ils ne se raseront pas la tête et ne se laisseront pas non plus pousser librement les cheveux, mais ils les couperont soigneusement. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Aucun prêtre ne boira de vin avant d’entrer dans le parvis intérieur. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ils n’épouseront ni veuve, ni femme divorcée, mais seulement des jeunes filles de la communauté d’Israël, ou la veuve d’un prêtre
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '44.22 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Voir '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: Lv 21.13
        - type: text
          text: s.
      marker-yv: yv-n
    - type: text
      text: .
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ils apprendront à mon peuple à distinguer entre ce qui est saint et ce qui est profane, ils lui feront connaître la différence entre ce qui est impur et ce qui est pur. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: En cas de procès, c’est à eux qu’il appartiendra de juger ; ils jugeront le cas selon le droit que j’ai établi, ils obéiront à mes lois et mes commandements au sujet de toutes mes fêtes cultuelles et ils tiendront mes jours de sabbat pour sacrés.
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Aucun d’eux ne touchera le corps d’un homme mort pour ne pas se rendre impur, sauf lorsqu’il s’agira de leur père ou de leur mère, de leur fils ou de leur fille, de leur frère ou de leur sœur non mariée. '
  '26':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Dans ce cas, le prêtre attendra sept jours après s’être purifié
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '44.26 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Voir '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: Nb 19.11
        - type: text
          text: s.
      marker-yv: yv-n
    - type: text
      text: '. '
  '27':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Et le jour où il entrera de nouveau dans le sanctuaire, en passant par le parvis intérieur pour aller officier dans le sanctuaire, il offrira un sacrifice pour le péché, le Seigneur, l’Eternel, le déclare.
  '28':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ils auront un patrimoine, et ce patrimoine, ce sera moi. Vous ne leur attribuerez pas de propriété en Israël, c’est moi qui leur tiendrai lieu de propriété. '
  '29':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ils se nourriront des offrandes et des victimes présentées en sacrifice pour le péché et en sacrifice de réparation, et tout ce qui sera voué à Dieu, en Israël, leur reviendra. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Toutefois, le prince, en sa qualité de prince, s’y assiéra pour prendre son repas devant l’Eternel
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '44.3 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Sans doute le repas qui suivait certains sacrifices.
      marker-yv: yv-n
    - type: text
      text: '  ; il y entrera par le portique de la porte et sortira par le même chemin.'
  '30':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'La meilleure part des prémices de toutes choses et toutes les offrandes de quoi que ce soit reviendront aux prêtres. Vous leur donnerez aussi la première fournée de ce que vous cuirez, afin de faire venir la bénédiction sur votre famille. '
  '31':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Les prêtres ne mangeront la chair d’aucune bête crevée ou déchiquetée, qu’il s’agisse d’un oiseau ou d’un autre animal
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '44.31 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Voir Lv 17.15 ; Dt 14.21.
      marker-yv: yv-n
    - type: text
      text: .
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Puis l’homme me conduisit devant le Temple par la porte nord
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '44.4 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Voir '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: '8.3'
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: . Je regardai et je vis la gloire de l’Eternel remplir le temple de l’Eternel ; alors je tombai face contre terre.
  - type: usfm
    marker: s2
    children:
    - type: text
      text: Qui sera admis au Temple ?
    marker-yv: yv-h
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'L’Eternel me dit : Fils d’homme, fais bien attention, regarde de tes deux yeux, et écoute de toutes tes oreilles tout ce que je vais t’expliquer au sujet de toutes les ordonnances et de tous les commandements relatifs'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '44.5 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Le texte hébreu traditionnel a : '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'le commandement relatif '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'avec, en marge, l’indication qu’il faut lire : '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: les commandements relatifs.
      marker-yv: yv-n
    - type: text
      text: ' au temple de l’Eternel. Fais particulièrement attention à ceux qui ont trait aux entrées du Temple et à toutes les issues du sanctuaire. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Et dis à ces rebelles, à la communauté d’Israël : Voici ce que déclare le Seigneur, l’Eternel : c’en est assez de tous vos actes abominables, communauté d’Israël ! '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Vous avez fait pénétrer dans mon sanctuaire des étrangers, incirconcis de cœur et incirconcis dans leur corps, afin de profaner mon temple, pendant que vous me présentiez l’offrande de mon pain, de la graisse et du sang ; vous avez ainsi violé mon alliance pour accomplir toutes vos pratiques abominables. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Vous ne vous êtes pas acquittés pour moi du service relatif aux choses saintes, vous avez chargé des étrangers d’accomplir à votre place le service pour moi, dans mon sanctuaire.
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Voici ce que déclare le Seigneur, l’Eternel : Aucun étranger, incirconcis de cœur ou incirconcis dans son corps, n’entrera dans mon sanctuaire ; non, aucun des étrangers qui se trouveront au milieu des Israélites.'
