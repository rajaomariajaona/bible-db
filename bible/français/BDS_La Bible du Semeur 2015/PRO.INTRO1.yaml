document_id: PRO.INTRO1,21
type_code: fra
verses:
  '1':
  - type: text
    content: Introduction
  - type: text
    content: 'Le livre des Proverbes appartient à un genre littéraire florissant dans le Proche-Orient ancien : les écrits de sagesse, dont font aussi partie les livres de Job et de l’Ecclésiaste. Il comporte plusieurs collections de proverbes, dont les deux plus importantes sont l’œuvre de Salomon (1.10 ; 10.1 ; 25.1), le « sage » par excellence d’Israël, doté par l’Eternel d’une sagesse toute particulière (1 R 3 ; 5.9-13 ; 10.1, 8-9, 23). Deux autres collections sont présentées comme les « paroles des sages » (22.17 ; 24.23). Ces « sages », dont la fonction était reconnue dans la société israélite, au même titre que celle des prêtres ou des prophètes (Jr 18.18), ont sans doute recueilli, mis en forme, et parfois composé, ces proverbes. Les sentences d’Agour (chap. 30) et les maximes enseignées par sa mère à un roi nommé Lemouel (chap. 31) ont été incorporées au livre.'
  - type: text
    content: 'L’objet de la réflexion et de l’instruction des sages était la « sagesse », qui englobe la compréhension, l’intelligence, le bon sens, la connaissance, le jugement, le savoir-faire, l’art de bien se conduire (1.1-5). Cette sagesse est un art de vivre et de se comporter dans les diverses situations de l’existence. Mais il serait erroné de lui refuser tout caractère spéculatif ou philosophique : la description de la Sagesse, maître d’œuvre de la Création (8.22-36), ou la réflexion de l’Ecclésiaste, l’interdisent.'
  - type: text
    content: Dans le livre, cette sagesse se présente sous la forme de « proverbes » ou, comme il a été traduit, de « maximes » (1.6), souvent imagées. Celles-ci se composent au minimum de deux affirmations parallèles qui se répètent, se complètent ou s’opposent. Tel est le cas de la plupart des maximes des chapitres 10 à 31. Mais, parfois, elles forment des sections beaucoup plus longues, à l’écriture très travaillée (chap. 1 à 9 ; 31.10-31).
  - type: text
    content: 'Dès le début, le livre indique quel principe fondamental gouverne tout son enseignement : la nécessité de craindre l’Eternel, le Seigneur (1.7). C’est cette vérité qui donne à sa « sagesse » son orientation, et cette sagesse concerne tous les domaines de l’existence – les relations humaines, la politique, l’économie, le mariage, le travail, etc. – car l’Eternel est le Créateur de tout ce qui existe (3.18-20). La nécessité de craindre l’Eternel est rappelée à de nombreuses reprises (3.7 ; 8.13 ; 22.4  ; etc.), mais le livre souligne le rôle « clé » de cette disposition intérieure fondamentale en concluant ses deux grandes parties sur cette « note » (9.10 ; 31.30).'
  - type: text
    content: 'Dans la première partie (chap. 1 à 9), l’auteur livre son enseignement à la manière d’un père qui instruit son fils (1.10 ; 2.1 ; 4.1  ; etc.), car c’est ainsi que l’Eternel instruit ceux qu’il aime (3.12). A la Sagesse, personnifiée (1.20 ; 8.1 ; 9.1), qui proclame le message de la vie (3.16, 18, 22), s’oppose la Folie (9.13), qui cherche à séduire les hommes pour les pousser à pécher, et dont l’exemple type est la prostituée (2.15 ; chap. 5). L’homme n’a pas la sagesse en lui-même : il lui faut la rechercher (2.3-4). C’est Dieu qui la donne (2.6), par l’Esprit (1.23), pour qu’on s’en nourrisse comme de « pain » et de « vin » (9.5). Dans son appel à croire en lui, Jésus, en qui réside la Sagesse même de Dieu (Col 2.9), fera écho à la Sagesse en invitant ses auditeurs à se nourrir de lui-même, par ses paroles (Jn 6.53-63).'
  - type: text
    content: Le livre se termine par un poème anonyme qui fait le portrait de la femme vaillante, rappel de celui de la Sagesse (31.10-31).
