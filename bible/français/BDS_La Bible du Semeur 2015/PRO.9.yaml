document_id: PRO.9,21
type_code: fra
verses:
  '1':
  - type: heading
    content: Le festin de la Sagesse
  - type: text
    content: La Sagesse a bâti une maison,
  - type: text
    content: et elle en a taillé ╵les sept colonnes.
  '10':
  - type: text
    content: La sagesse commence ╵par la crainte de l’Eternel
  - type: note
    content: Voir 1.7 et note.
  - type: text
    content: ','
  - type: text
    content: et la science des saints
  - type: note
    content: 'D’autres comprennent : et connaître le Dieu saint.'
  - type: text
    content: ', ╵c’est le discernement.'
  '11':
  - type: text
    content: Grâce à moi, la Sagesse, ╵tes jours seront multipliés
  - type: text
    content: et des années ╵seront ajoutées à ta vie
  - type: note
    content: Voir 3.18.
  - type: text
    content: .
  '12':
  - type: text
    content: Si tu es sage, ╵c’est toi qui en profiteras,
  - type: text
    content: mais si tu es moqueur, ╵tu en supporteras ╵toi seul les conséquences. »
  - type: heading
    content: Le festin de la Folie
  '13':
  - type: text
    content: Dame Folie est bien bruyante,
  - type: text
    content: elle est sans expérience, ╵elle n’y connaît rien
  - type: note
    content: 'L’ancienne version grecque a lu : elle ne connaît pas la honte.'
  - type: text
    content: .
  '14':
  - type: text
    content: Elle s’assied ╵à la porte de sa maison,
  - type: text
    content: elle place son siège ╵aux points les plus élevés de la ville,
  '15':
  - type: text
    content: pour interpeller les passants
  - type: text
    content: qui vont droit leur chemin.
  '16':
  - type: text
    content: « Approchez donc, ╵vous qui n’avez pas d’expérience ! »
  - type: text
    content: 'A ceux qui manquent de bon sens, ╵elle déclare :'
  '17':
  - type: text
    content: « Les eaux dérobées sont plus douces,
  - type: text
    content: et le pain mangé en secret ╵est savoureux. »
  '18':
  - type: text
    content: Mais ils ne savent pas ╵que chez elle se rassemblent les morts
  - type: text
    content: et que ses invités ╵sont déjà au séjour des morts.
  '2':
  - type: text
    content: Elle a apprêté une bête ╵et elle a préparé son vin
  - type: note
    content: En Orient, on mélangeait diverses épices (cannelle, myrrhe) au vin pour lui donner plus de goût (Es 5.22).
  - type: text
    content: .
  - type: text
    content: Déjà, elle a dressé sa table.
  '3':
  - type: text
    content: Elle a envoyé ses servantes ╵pour lancer ses invitations,
  - type: text
    content: 'elle appelle du haut des lieux ╵les plus élevés de la ville :'
  '4':
  - type: text
    content: « Approchez donc, ╵vous qui n’avez pas d’expérience ! »
  - type: text
    content: 'A ceux qui manquent de bon sens, ╵elle déclare :'
  '5':
  - type: text
    content: « Venez et mangez de mon pain
  - type: text
    content: et buvez du vin que j’ai préparé.
  '6':
  - type: text
    content: Vous qui êtes inexpérimentés ╵détournez-vous de ce chemin ╵et vous vivrez
  - type: note
    content: 'Les versions anciennes ont : Ne restez pas dans l’inexpérience.'
  - type: text
    content: .
  - type: text
    content: Dirigez-vous ╵sur la voie de l’intelligence.
  - type: heading
    content: Le moqueur et le sage
  '7':
  - type: text
    content: Corriger un moqueur, ╵c’est s’attirer la confusion
  - type: text
    content: et reprendre un méchant, ╵s’attirer un affront.
  '8':
  - type: text
    content: Ne reprends donc pas le moqueur, ╵car il te haïra ;
  - type: text
    content: si tu reprends un sage, ╵il t’en aimera davantage.
  '9':
  - type: text
    content: Oui, donne des conseils au sage, ╵et il sera plus sage encore.
  - type: text
    content: Instruis le juste, ╵il enrichira son savoir.
