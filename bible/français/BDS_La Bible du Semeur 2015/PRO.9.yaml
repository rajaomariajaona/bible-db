document_id: PRO.9
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Le festin de la Sagesse
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: La Sagesse a bâti une maison,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et elle en a taillé ╵les sept colonnes.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Elle a apprêté une bête ╵et elle a préparé son vin
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '9.2 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: En Orient, on mélangeait diverses épices (cannelle, myrrhe) au vin pour lui donner plus de goût (
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Es 5.22
        metadata:
          usfm: ISA.5.22
      - type: text
        text: ).
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: q1
  children:
  - type: text
    text: Déjà, elle a dressé sa table.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Elle a envoyé ses servantes ╵pour lancer ses invitations,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'elle appelle du haut des lieux ╵les plus élevés de la ville :'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: « Approchez donc, ╵vous qui n’avez pas d’expérience ! »
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'A ceux qui manquent de bon sens, ╵elle déclare :'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: « Venez et mangez de mon pain
- type: usfm
  marker: q1
  children:
  - type: text
    text: et buvez du vin que j’ai préparé.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Vous qui êtes inexpérimentés ╵détournez-vous de ce chemin ╵et vous vivrez
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '9.6 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Les versions anciennes ont : '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: Ne restez pas dans l’inexpérience.
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: q1
  children:
  - type: text
    text: Dirigez-vous ╵sur la voie de l’intelligence.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Le moqueur et le sage
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Corriger un moqueur, ╵c’est s’attirer la confusion
- type: usfm
  marker: q1
  children:
  - type: text
    text: et reprendre un méchant, ╵s’attirer un affront.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Ne reprends donc pas le moqueur, ╵car il te haïra ;
- type: usfm
  marker: q1
  children:
  - type: text
    text: si tu reprends un sage, ╵il t’en aimera davantage.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Oui, donne des conseils au sage, ╵et il sera plus sage encore.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Instruis le juste, ╵il enrichira son savoir.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: La sagesse commence ╵par la crainte de l’Eternel
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '9.10 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Voir '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '1.7'
        metadata:
          usfm: PRO.1.7
      - type: text
        text: ' et note.'
    marker-yv: yv-n
  - type: text
    text: ','
- type: usfm
  marker: q1
  children:
  - type: text
    text: et la science des saints
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '9.10 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'D’autres comprennent : '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: et connaître le Dieu saint.
    marker-yv: yv-n
  - type: text
    text: ', ╵c’est le discernement.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Grâce à moi, la Sagesse, ╵tes jours seront multipliés
- type: usfm
  marker: q1
  children:
  - type: text
    text: et des années ╵seront ajoutées à ta vie
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '9.11 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Voir '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '3.18'
        metadata:
          usfm: PRO.3.18
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Si tu es sage, ╵c’est toi qui en profiteras,
- type: usfm
  marker: q1
  children:
  - type: text
    text: mais si tu es moqueur, ╵tu en supporteras ╵toi seul les conséquences. »
- type: usfm
  marker: s1
  children:
  - type: text
    text: Le festin de la Folie
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Dame Folie est bien bruyante,
- type: usfm
  marker: q1
  children:
  - type: text
    text: elle est sans expérience, ╵elle n’y connaît rien
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '9.13 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'L’ancienne version grecque a lu : '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: elle ne connaît pas la honte.
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Elle s’assied ╵à la porte de sa maison,
- type: usfm
  marker: q1
  children:
  - type: text
    text: elle place son siège ╵aux points les plus élevés de la ville,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: pour interpeller les passants
- type: usfm
  marker: q1
  children:
  - type: text
    text: qui vont droit leur chemin.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: « Approchez donc, ╵vous qui n’avez pas d’expérience ! »
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'A ceux qui manquent de bon sens, ╵elle déclare :'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: « Les eaux dérobées sont plus douces,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et le pain mangé en secret ╵est savoureux. »
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Mais ils ne savent pas ╵que chez elle se rassemblent les morts
- type: usfm
  marker: q1
  children:
  - type: text
    text: et que ses invités ╵sont déjà au séjour des morts.
