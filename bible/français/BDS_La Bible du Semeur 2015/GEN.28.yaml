document_id: GEN.28
type_code: fra
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Alors Isaac appela Jacob, il le bénit et lui donna cet ordre : Tu n’épouseras pas une Cananéenne. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Mets-toi en route, va à Paddân-Aram chez Betouel, ton grand-père maternel, et prends une femme de là-bas parmi les filles de ton oncle Laban. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Le Dieu tout-puissant te bénira, il te donnera des enfants, il rendra tes descendants nombreux et tu deviendras l’ancêtre d’un grand nombre de peuples. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Il te transmettra la bénédiction d’Abraham à toi et à ta descendance, afin que tu hérites le pays dans lequel tu habites en immigrant et que Dieu a donné à Abraham
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '28.4 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Voir '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Gn 17.4-8
        metadata:
          usfm: GEN.17.4+GEN.17.5+GEN.17.6+GEN.17.7+GEN.17.8
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Jacob, envoyé par son père, partit donc pour Paddân-Aram, et il se rendit chez Laban, fils de Betouel l’Araméen, et frère de Rébecca, sa mère et celle d’Esaü.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Esaü vit qu’Isaac avait béni Jacob et qu’il l’avait envoyé à Paddân-Aram pour y trouver une épouse, et qu’en le bénissant il lui avait ordonné de ne pas épouser une fille du pays de Canaan, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'que Jacob avait obéi à son père et à sa mère et qu’il était parti pour Paddân-Aram. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Il comprit alors que les filles de Canaan étaient mal vues de son père, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Esaü se rendit chez Ismaël, fils d’Abraham, et épousa, en plus de ses autres femmes, sa fille Mahalath, la sœur de Nebayoth.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Béthel, « Maison de Dieu »
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Jacob avait quitté Beer-Sheva et marchait en direction de Harân
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '28.10 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: C’est-à-dire à plus de six cents kilomètres de là.
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Comme le soleil se couchait, il prit une pierre pour s’en faire un oreiller et se coucha pour passer ainsi la nuit dans le lieu qu’il avait atteint. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Dans son rêve, il vit une sorte d’escalier reposant sur la terre, et dont le haut atteignait le ciel. Et voici que des anges de Dieu montaient et descendaient cet escalier
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '28.12 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Voir '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Jn 1.51
        metadata:
          usfm: JHN.1.51
      - type: text
        text: . Il s’agit certainement de l’escalier d’un temple ou d’une tour à étages du type des ziggourats mésopotamiennes.
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'L’Eternel lui-même se tenait tout en haut et lui dit : Je suis l’Eternel, le Dieu d’Abraham ton ancêtre et le Dieu d’Isaac. Cette terre sur laquelle tu reposes, je te la donnerai, à toi et à ta descendance. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Elle sera aussi nombreuse que la poussière de la terre ; elle étendra son territoire dans toutes les directions : vers l’ouest et l’est, vers le nord et le sud. Par toi et par elle, toutes les familles de la terre seront bénies'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '28.14 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Voir 12.3 ; 13.16. Autre traduction : '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: toutes les familles… se béniront en citant votre exemple.
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Et voici : je suis moi-même avec toi, je te garderai partout où tu iras ; et je te ferai revenir vers cette région ; je ne t’abandonnerai pas mais j’accomplirai ce que je t’ai promis.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Jacob s’éveilla et s’écria : Assurément, l’Eternel est en ce lieu, et moi je l’ignorais !'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Il fut saisi de crainte et ajouta : Ce lieu est redoutable ! Ce ne peut être que le sanctuaire de Dieu. C’est ici la porte du ciel.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Le lendemain, de grand matin, il prit la pierre sur laquelle avait reposé sa tête, il la dressa en stèle et répandit de l’huile sur son sommet
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '28.18 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: En signe de consécration.
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Il appela cet endroit Béthel (Maison de Dieu). Auparavant la localité s’appelait Louz. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Puis il fit le vœu suivant : Si Dieu est avec moi, s’il me protège au cours du voyage que je suis en train de faire, s’il me fournit de quoi manger et me vêtir, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'et si je reviens sain et sauf chez mon père, alors l’Eternel sera mon Dieu. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: Cette pierre que j’ai dressée comme stèle deviendra un sanctuaire de Dieu et je t’offrirai le dixième de tous les biens que tu m’accorderas.
