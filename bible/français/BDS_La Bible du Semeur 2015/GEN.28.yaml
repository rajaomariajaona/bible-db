document_id: GEN.28,21
type_code: fra
verses:
  '1':
  - type: text
    content: 'Alors Isaac appela Jacob, il le bénit et lui donna cet ordre : Tu n’épouseras pas une Cananéenne. '
  '10':
  - type: text
    content: Jacob avait quitté Beer-Sheva et marchait en direction de Harân
  - type: note
    content: C’est-à-dire à plus de six cents kilomètres de là.
  - type: text
    content: '. '
  '11':
  - type: text
    content: 'Comme le soleil se couchait, il prit une pierre pour s’en faire un oreiller et se coucha pour passer ainsi la nuit dans le lieu qu’il avait atteint. '
  '12':
  - type: text
    content: Dans son rêve, il vit une sorte d’escalier reposant sur la terre, et dont le haut atteignait le ciel. Et voici que des anges de Dieu montaient et descendaient cet escalier
  - type: note
    content: Voir Jn 1.51. Il s’agit certainement de l’escalier d’un temple ou d’une tour à étages du type des ziggourats mésopotamiennes.
  - type: text
    content: '. '
  '13':
  - type: text
    content: 'L’Eternel lui-même se tenait tout en haut et lui dit : Je suis l’Eternel, le Dieu d’Abraham ton ancêtre et le Dieu d’Isaac. Cette terre sur laquelle tu reposes, je te la donnerai, à toi et à ta descendance. '
  '14':
  - type: text
    content: 'Elle sera aussi nombreuse que la poussière de la terre ; elle étendra son territoire dans toutes les directions : vers l’ouest et l’est, vers le nord et le sud. Par toi et par elle, toutes les familles de la terre seront bénies'
  - type: note
    content: 'Voir 12.3 ; 13.16. Autre traduction : toutes les familles… se béniront en citant votre exemple.'
  - type: text
    content: '. '
  '15':
  - type: text
    content: 'Et voici : je suis moi-même avec toi, je te garderai partout où tu iras ; et je te ferai revenir vers cette région ; je ne t’abandonnerai pas mais j’accomplirai ce que je t’ai promis.'
  '16':
  - type: text
    content: 'Jacob s’éveilla et s’écria : Assurément, l’Eternel est en ce lieu, et moi je l’ignorais !'
  '17':
  - type: text
    content: 'Il fut saisi de crainte et ajouta : Ce lieu est redoutable ! Ce ne peut être que le sanctuaire de Dieu. C’est ici la porte du ciel.'
  '18':
  - type: text
    content: Le lendemain, de grand matin, il prit la pierre sur laquelle avait reposé sa tête, il la dressa en stèle et répandit de l’huile sur son sommet
  - type: note
    content: En signe de consécration.
  - type: text
    content: '. '
  '19':
  - type: text
    content: 'Il appela cet endroit Béthel (Maison de Dieu). Auparavant la localité s’appelait Louz. '
  '2':
  - type: text
    content: 'Mets-toi en route, va à Paddân-Aram chez Betouel, ton grand-père maternel, et prends une femme de là-bas parmi les filles de ton oncle Laban. '
  '20':
  - type: text
    content: 'Puis il fit le vœu suivant : Si Dieu est avec moi, s’il me protège au cours du voyage que je suis en train de faire, s’il me fournit de quoi manger et me vêtir, '
  '21':
  - type: text
    content: 'et si je reviens sain et sauf chez mon père, alors l’Eternel sera mon Dieu. '
  '22':
  - type: text
    content: Cette pierre que j’ai dressée comme stèle deviendra un sanctuaire de Dieu et je t’offrirai le dixième de tous les biens que tu m’accorderas.
  '3':
  - type: text
    content: 'Le Dieu tout-puissant te bénira, il te donnera des enfants, il rendra tes descendants nombreux et tu deviendras l’ancêtre d’un grand nombre de peuples. '
  '4':
  - type: text
    content: Il te transmettra la bénédiction d’Abraham à toi et à ta descendance, afin que tu hérites le pays dans lequel tu habites en immigrant et que Dieu a donné à Abraham
  - type: note
    content: Voir Gn 17.4-8.
  - type: text
    content: .
  '5':
  - type: text
    content: Jacob, envoyé par son père, partit donc pour Paddân-Aram, et il se rendit chez Laban, fils de Betouel l’Araméen, et frère de Rébecca, sa mère et celle d’Esaü.
  '6':
  - type: text
    content: 'Esaü vit qu’Isaac avait béni Jacob et qu’il l’avait envoyé à Paddân-Aram pour y trouver une épouse, et qu’en le bénissant il lui avait ordonné de ne pas épouser une fille du pays de Canaan, '
  '7':
  - type: text
    content: 'que Jacob avait obéi à son père et à sa mère et qu’il était parti pour Paddân-Aram. '
  '8':
  - type: text
    content: 'Il comprit alors que les filles de Canaan étaient mal vues de son père, '
  '9':
  - type: text
    content: Esaü se rendit chez Ismaël, fils d’Abraham, et épousa, en plus de ses autres femmes, sa fille Mahalath, la sœur de Nebayoth.
  - type: heading
    content: Béthel, « Maison de Dieu »
