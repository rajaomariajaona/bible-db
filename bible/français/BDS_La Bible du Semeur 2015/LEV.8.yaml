document_id: LEV.8,21
type_code: fra
verses:
  '1':
  - type: heading
    content: Entrée en fonction des prêtres
  - type: heading
    content: L’investiture d’Aaron et de ses fils
  - type: text
    content: L’Eternel parla à Moïse en ces termes
  - type: note
    content: Voir Ex 29.
  - type: text
    content: '  : '
  '10':
  - type: text
    content: Moïse prit l’huile d’onction et oignit le tabernacle et tout ce qu’il contenait ; c’est ainsi qu’il les consacra
  - type: note
    content: Pour les v. 10-15, voir Ex 40.9-11.
  - type: text
    content: '. '
  '11':
  - type: text
    content: 'Il en fit sept fois aspersion sur l’autel, puis il oignit ce dernier et tous les accessoires, la cuve et son socle, pour les consacrer. '
  '12':
  - type: text
    content: 'Ensuite il versa de l’huile d’onction sur la tête d’Aaron et l’oignit pour le consacrer. '
  '13':
  - type: text
    content: Après cela, il fit avancer les fils d’Aaron, les revêtit de tuniques, leur mit une ceinture et les coiffa de turbans, comme l’Eternel le lui avait ordonné.
  '14':
  - type: text
    content: 'Il fit approcher le taureau du sacrifice pour le péché. Aaron et ses fils posèrent leurs mains sur la tête du taureau. '
  '15':
  - type: text
    content: 'Moïse l’égorgea, prit le sang et en appliqua avec son doigt sur les cornes de l’autel pour purifier l’autel. Ensuite il répandit le reste du sang sur le socle de l’autel et le consacra pour y accomplir le rite d’expiation. '
  '16':
  - type: text
    content: 'Il prit toute la graisse qui recouvrait les entrailles, le dessus du foie et les deux rognons avec leur graisse, et il fit brûler le tout sur l’autel. '
  '17':
  - type: text
    content: Le reste du taureau, avec la peau, la chair et les excréments, il le brûla à l’extérieur du camp, comme l’Eternel le lui avait ordonné.
  '18':
  - type: text
    content: 'Ensuite il fit amener le bélier destiné à l’holocauste ; Aaron et ses fils posèrent leurs mains sur sa tête. '
  '19':
  - type: text
    content: 'Moïse l’égorgea, et aspergea de son sang tous les côtés de l’autel. '
  '2':
  - type: text
    content: 'Prends Aaron et ses fils avec lui, prends les vêtements sacerdotaux et l’huile d’onction, fais amener le taureau pour le sacrifice pour le péché, les deux béliers et la corbeille de pains sans levain '
  '20':
  - type: text
    content: 'On découpa le bélier en quartiers, et Moïse les brûla avec la tête et les parties grasses. '
  '21':
  - type: text
    content: On lava à l’eau les entrailles et les pattes, et Moïse fit brûler tout le bélier sur l’autel ; c’était un holocauste à l’odeur apaisante, un sacrifice consumé par le feu pour l’Eternel, comme il l’avait ordonné à Moïse.
  '22':
  - type: text
    content: 'Après cela, Moïse fit approcher le second bélier, le bélier d’investiture ; Aaron et ses fils posèrent leurs mains sur sa tête. '
  '23':
  - type: text
    content: 'Moïse l’égorgea et prit de son sang qu’il appliqua sur le lobe de l’oreille droite d’Aaron, sur le pouce de sa main droite et sur le gros orteil de son pied droit. '
  '24':
  - type: text
    content: 'Puis il fit avancer les fils d’Aaron et appliqua du sang sur le lobe de leur oreille droite, sur leur pouce droit et sur leur gros orteil droit. Avec le reste du sang, il aspergea tous les côtés de l’autel. '
  '25':
  - type: text
    content: 'Il prit la graisse, la queue, toute la graisse qui recouvrait les entrailles, le dessus du foie, les deux rognons avec leur graisse et le gigot droit. '
  '26':
  - type: text
    content: 'Dans la corbeille des pains sans levain qui se trouvait devant l’Eternel, il prit un gâteau de pain sans levain, un gâteau à l’huile et une galette ; il les posa sur les graisses et le gigot, '
  '27':
  - type: text
    content: 'plaça le tout dans les mains d’Aaron et de ses fils, et leur dit de présenter ces aliments à l’Eternel par le geste de présentation. '
  '28':
  - type: text
    content: Ensuite Moïse reprit ces offrandes de leurs mains et les fit brûler sur l’autel au-dessus de l’holocauste. C’était un sacrifice d’investiture à l’odeur apaisante, consumé par le feu pour l’Eternel.
  '29':
  - type: text
    content: Moïse prit aussi la poitrine du bélier d’investiture pour faire devant l’Eternel le geste de présentation ; ce morceau lui revint comme sa part, comme l’Eternel le lui avait ordonné.
  '3':
  - type: text
    content: et rassemble toute la communauté à l’entrée de la tente de la Rencontre.
  '30':
  - type: text
    content: Moïse prit ensuite de l’huile d’onction et du sang qui était sur l’autel, et il en fit aspersion sur Aaron et sur ses vêtements, sur ses fils et leurs vêtements ; il consacra ainsi Aaron et ses vêtements, ainsi que ses fils et leurs vêtements.
  '31':
  - type: text
    content: 'Moïse dit à Aaron et à ses fils : Faites cuire la viande à l’entrée de la tente de la Rencontre. Vous la mangerez là avec le pain qui est dans la corbeille de l’investiture, comme je vous l’ai ordonné lorsque j’ai dit : « Aaron et ses fils la mangeront'
  - type: note
    content: Voir Ex 29.32.
  - type: text
    content: '. » '
  '32':
  - type: text
    content: 'Ce qui restera de la viande et du pain, vous le brûlerez. '
  '33':
  - type: text
    content: 'Pendant sept jours, c’est-à-dire jusqu’au terme des cérémonies de votre investiture, vous ne quitterez pas l’entrée de la tente de la Rencontre. On prendra en effet sept jours pour vous installer dans votre charge. '
  '34':
  - type: text
    content: 'C’est l’Eternel qui a ordonné de procéder comme on l’a fait aujourd’hui pour accomplir sur vous le rite d’expiation. '
  '35':
  - type: text
    content: 'Vous resterez sept jours, jour et nuit, à l’entrée de la tente de la Rencontre et vous assurerez le service de l’Eternel, et vous ne mourrez pas, car tel est l’ordre que j’ai reçu. '
  '36':
  - type: text
    content: Aaron et ses fils se conformèrent à tout ce que l’Eternel leur avait ordonné par l’intermédiaire de Moïse.
  '4':
  - type: text
    content: 'Moïse fit ce que l’Eternel lui avait ordonné et l’assemblée se réunit à l’entrée de la tente de la Rencontre. '
  '5':
  - type: text
    content: 'Moïse transmit à la communauté ces ordres que l’Eternel lui avait donnés. '
  '6':
  - type: text
    content: Puis il fit avancer Aaron et ses fils, pour les laver avec de l’eau
  - type: note
    content: Pour les v. 6-9, voir Ex 28.4-43 ; 39.1-31.
  - type: text
    content: '. '
  '7':
  - type: text
    content: Ensuite il revêtit Aaron de la tunique, lui noua la ceinture, et lui mit la robe et l’éphod
  - type: note
    content: Voir Ex 28.6-14.
  - type: text
    content: ' par-dessus, il l’entoura avec la ceinture de l’éphod pour l’en revêtir. '
  '8':
  - type: text
    content: Il plaça sur sa poitrine le pectoral
  - type: note
    content: Voir Ex 28.15-30.
  - type: text
    content: ', dans lequel il plaça l’ourim et le toummim'
  - type: note
    content: Voir Ex 28.30.
  - type: text
    content: '. '
  '9':
  - type: text
    content: Il coiffa sa tête du turban sur le devant duquel il ajusta l’insigne d’or, le diadème de consécration, comme l’Eternel le lui avait ordonné.
