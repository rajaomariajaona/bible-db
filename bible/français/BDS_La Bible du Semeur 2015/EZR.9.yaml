document_id: EZR.9
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: L’infidélité des Judéens
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Quand tout cela fut terminé
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '9.1 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Au neuvième mois (
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '10.9'
        metadata:
          usfm: EZR.10.9
      - type: text
        text: ), quatre mois après l’arrivée d’Esdras à Jérusalem qui eut lieu au cinquième mois (
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '7.9'
        metadata:
          usfm: EZR.7.9
      - type: text
        text: ).
    marker-yv: yv-n
  - type: text
    text: ', quelques chefs d’Israël m’abordèrent en disant : Ni le peuple d’Israël, ni les prêtres, ni les lévites ne se sont séparés des gens du pays et n’ont rompu avec leurs pratiques abominables. Ils se sont conduits exactement comme les Cananéens, les Hittites, les Phéréziens, les Yebousiens, les Ammonites, les Moabites, les Egyptiens et les Amoréens, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: car ils ont épousé les filles de ces étrangers et les ont données en mariage à leurs fils. Ainsi la descendance sainte s’est mêlée aux peuples de ces pays. Les chefs et les dirigeants se sont les premiers rendus coupables d’une telle infidélité.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Consternation et prière d’Esdras
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Lorsque j’appris cela, je déchirai mon vêtement et mon manteau, je m’arrachai les cheveux et la barbe
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '9.3 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Signes de deuil ou de consternation (voir Gn 37.29, 34 ; Jos 7.6 ; Jg 11.35 ; 2 S 13.19 ; 2 Ch 34.27 ; Est 4.1 ; Es 36.22 ; Mt 26.65).
    marker-yv: yv-n
  - type: text
    text: ', et je m’assis là, accablé. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Autour de moi se réunirent, à cause de cette infidélité des anciens exilés, tous ceux qui étaient respectueux des paroles du Dieu d’Israël. Je restai ainsi assis, accablé, jusqu’à l’offrande du soir. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Puis, au moment de l’offrande du soir, je sortis de mon abattement et me relevai. Je portais encore mon vêtement et mon manteau déchirés : je tombai à genoux, et je tendis les mains vers l’Eternel mon Dieu. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Je lui dis : Mon Dieu, je suis trop rempli de honte et de confusion pour oser lever les regards vers toi, ô mon Dieu, car nos péchés se sont multipliés jusqu’à nous submerger, et nos fautes se sont accumulées et montent jusqu’au ciel. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Depuis l’époque de nos ancêtres jusqu’à ce jour, nous avons été extrêmement coupables. C’est à cause de nos fautes que nous, nos rois et nos prêtres, nous avons été livrés au pouvoir des rois des nations, pour être tués, déportés ou pillés, et pour que la honte couvre encore aujourd’hui nos visages. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Cependant, Eternel, notre Dieu, tu nous as fait la grâce de laisser quelques survivants de notre peuple subsister et, depuis peu, de nous accorder un endroit pour nous établir dans ton saint pays. Toi, notre Dieu, tu illumines ainsi nos yeux de ta lumière et tu nous redonnes un peu de vie au milieu de notre servitude. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Car nous sommes des esclaves
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '9.9 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Le peuple continue à être sous la domination de souverains étrangers.
    marker-yv: yv-n
  - type: text
    text: ', mais notre Dieu ne nous a pas abandonnés dans notre servitude. Il nous a manifesté de la faveur dans nos rapports avec les empereurs perses, pour ranimer notre énergie afin que nous rebâtissions le temple de notre Dieu et que nous le relevions de ses ruines. Il nous a procuré comme un mur protecteur en Juda et à Jérusalem.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Maintenant, après ce qui est arrivé, que dirons-nous, ô notre Dieu ? Car nous avons désobéi aux commandements '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'que tu nous avais transmis par l’intermédiaire de tes serviteurs les prophètes. Tu nous avais prévenus en disant : « Le pays dans lequel vous entrez pour en prendre possession est souillé par l’impureté des populations de ces contrées qui l’ont rempli d’un bout à l’autre de leurs pratiques abominables et de leurs actions impures'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '9.11 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Allusion à l’idolâtrie cananéenne et aux différents rites immoraux qui l’accompagnaient (voir Lv 18.3 ; 2 Ch 29.5 ; Lm 1.17 ; Ez 7.20 ; 36.17).
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Ne donnez donc pas vos filles en mariage à leurs fils et ne prenez pas leurs filles pour vos fils. Ne vous préoccupez jamais de leur prospérité ou de leur bien-être si vous voulez devenir forts, manger les meilleurs produits du pays et le laisser pour toujours en héritage à vos descendants
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '9.12 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Voir Ex 34.11-16 ; Dt 7.1-5 ; 11.8 ; 23.7.
    marker-yv: yv-n
  - type: text
    text: . »
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Tout ce qui nous est arrivé est la conséquence de nos mauvaises actions et de notre grande culpabilité. Et encore, ô notre Dieu, tu ne nous as pas punis comme le méritaient nos péchés, tu as laissé subsister ce reste de notre peuple. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Alors, après cela, pouvons-nous recommencer à transgresser tes commandements et à nous allier par mariage à des gens de ces peuples qui se livrent à des pratiques si abominables ? Ne vas-tu pas t’enflammer de colère contre nous au point de nous exterminer, sans nous laisser ni reste ni rescapés ? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Eternel, Dieu d’Israël, tu es juste, et tu as laissé subsister un reste de notre peuple jusqu’à ce jour. Nous voici devant toi, avec notre culpabilité, alors que personne ne peut tenir ainsi en ta présence.
