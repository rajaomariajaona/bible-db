document_id: EZK.25
type_code: fra
segments:
- type: usfm
  marker: ms1
  children:
  - type: text
    text: Prophéties contre les autres peuples
  marker-yv: yv-h
- type: usfm
  marker: s1
  children:
  - type: text
    text: Contre les Ammonites
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: L’Eternel m’adressa la parole en ces termes
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '25.1 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Pour les v. 1-7, voir '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 21.33-37
        metadata:
          usfm: EZK.21.33+EZK.21.34+EZK.21.35+EZK.21.36+EZK.21.37
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: '  :'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Fils d’homme, dirige ton regard en direction des Ammonites, prophétise contre eux, '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'dis au sujet des Ammonites : « Ecoutez la parole du Seigneur, l’Eternel : Voici ce que vous dit le Seigneur, l’Eternel : Tu as crié : “Ha, ha… !” lorsque mon sanctuaire a été profané, lorsque le pays d’Israël a été dévasté, lorsque la communauté de Juda est partie en exil. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: A cause de cela, je vais te livrer aux tribus de l’Orient
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '25.4 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Tribus arabes établies à l’est du Jourdain (Jg 6.3 ; Jb 1.1-3 ; Jr 49.28).
    marker-yv: yv-n
  - type: text
    text: ' qui conquerront ton territoire. Ils dresseront chez toi leurs campements et ils établiront leurs demeures chez toi. Ce sont eux qui mangeront tes fruits, eux qui boiront ton lait. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Je ferai de Rabba
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '25.5 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: Rabba
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: ': '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: capitale des Ammonites.
    marker-yv: yv-n
  - type: text
    text: ' un parc pour les chameaux, et du pays des Ammonites un bercail de moutons, et vous reconnaîtrez que je suis l’Eternel.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Car voici ce que dit le Seigneur, l’Eternel : Parce que tu as applaudi et trépigné et que tu t’es réjoui avec tant de mépris au sujet d’Israël, de son pays, '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: à cause de cela, je vais porter la main sur toi, te donner en proie aux nations étrangères, et je te ferai disparaître en tant que peuple, je te supprimerai du nombre des pays. Je t’exterminerai et tu reconnaîtras que je suis l’Eternel. »
- type: usfm
  marker: s1
  children:
  - type: text
    text: Contre les Moabites
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Voici ce que déclare le Seigneur, l’Eternel : Moab et Séir'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '25.8 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Les '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'Moabites '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'habitaient au sud des Ammonites, à l’est de la mer Morte. Les Edomites étaient établis dans les monts de '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'Séir, '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: au sud de la mer Morte.
    marker-yv: yv-n
  - type: text
    text: ' disent : « La communauté de Juda est devenue pareille à tous les autres peuples. » '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'A cause de cela, moi je vais exposer les pentes de Moab en les dégarnissant de villes, je démantèlerai jusque sur ses frontières les villes du pays qui constituent sa gloire : Beth-Hayeshimoth, Baal-Meôn, Qiryataïm, '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'et je les donnerai en pleine possession aux tribus de l’Orient liguées contre les Ammonites pour qu’on ne se souvienne plus des Ammonites parmi les autres peuples. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Et j’exécuterai sur Moab la sentence et ils reconnaîtront que je suis l’Eternel.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Contre les Edomites
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Voici ce que déclare le Seigneur, l’Eternel : A cause des actes d’Edom lorsqu’il s’est vengé de Juda, parce qu’il s’est rendu coupable d’une façon très grave en se vengeant'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '25.12 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Pour les v. 12-14, voir le chapitre 35.
    marker-yv: yv-n
  - type: text
    text: ', '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'à cause de cela, voici ce que déclare le Seigneur, l’Eternel : Moi, je porterai la main sur Edom et j’en retrancherai hommes et bêtes. J’en ferai une ruine depuis Témân jusqu’à Dedân'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '25.13 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Témân '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'était un district au centre d’Edom (Jr 49.7, 20 ; Am 1.12 ; Ab 9 ; Ha 3.3), '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'Dedân, '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: une tribu et un territoire au sud d’Edom (27.20 ; 38.13 ; Es 21.13 ; Jr 49.8).
    marker-yv: yv-n
  - type: text
    text: ', ils tomberont sous les coups de l’épée. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: J’exercerai ma rétribution sur Edom en me servant de mon peuple Israël. Ils se feront les instruments de mon indignation et de ma colère en Edom. Edom saura alors comment je rétribue. C’est là ce que déclare le Seigneur, l’Eternel.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Contre les Philistins
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Voici ce que déclare le Seigneur, l’Eternel : Puisque les Philistins ont agi par vengeance, et qu’ils se sont vengés, le cœur plein de mépris, au point de tout détruire dans leur haine ancestrale, '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'à cause de cela, voici ce que déclare le Seigneur, l’Eternel : Je vais porter la main sur les Philistins. Je détruirai ceux qui sont venus de la Crète, et je ferai périr le reste de ceux qui sont établis sur les bords de la mer. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: J’exercerai sur eux une rétribution terrible, les châtiments dictés par mon indignation, et ils reconnaîtront que je suis l’Eternel lorsque je les rétribuerai.
