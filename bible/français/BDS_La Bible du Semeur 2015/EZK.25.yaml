document_id: EZK.25,21
type_code: fra
verses:
  '1':
  - type: heading
    content: Prophéties contre les autres peuples
  - type: heading
    content: Contre les Ammonites
  - type: text
    content: L’Eternel m’adressa la parole en ces termes
  - type: note
    content: Pour les v. 1-7, voir 21.33-37.
  - type: text
    content: '  :'
  '10':
  - type: text
    content: 'et je les donnerai en pleine possession aux tribus de l’Orient liguées contre les Ammonites pour qu’on ne se souvienne plus des Ammonites parmi les autres peuples. '
  '11':
  - type: text
    content: Et j’exécuterai sur Moab la sentence et ils reconnaîtront que je suis l’Eternel.
  - type: heading
    content: Contre les Edomites
  '12':
  - type: text
    content: 'Voici ce que déclare le Seigneur, l’Eternel : A cause des actes d’Edom lorsqu’il s’est vengé de Juda, parce qu’il s’est rendu coupable d’une façon très grave en se vengeant'
  - type: note
    content: Pour les v. 12-14, voir le chapitre 35.
  - type: text
    content: ', '
  '13':
  - type: text
    content: 'à cause de cela, voici ce que déclare le Seigneur, l’Eternel : Moi, je porterai la main sur Edom et j’en retrancherai hommes et bêtes. J’en ferai une ruine depuis Témân jusqu’à Dedân'
  - type: note
    content: Témân était un district au centre d’Edom (Jr 49.7, 20 ; Am 1.12 ; Ab 9 ; Ha 3.3), Dedân, une tribu et un territoire au sud d’Edom (27.20 ; 38.13 ; Es 21.13 ; Jr 49.8).
  - type: text
    content: ', ils tomberont sous les coups de l’épée. '
  '14':
  - type: text
    content: J’exercerai ma rétribution sur Edom en me servant de mon peuple Israël. Ils se feront les instruments de mon indignation et de ma colère en Edom. Edom saura alors comment je rétribue. C’est là ce que déclare le Seigneur, l’Eternel.
  - type: heading
    content: Contre les Philistins
  '15':
  - type: text
    content: 'Voici ce que déclare le Seigneur, l’Eternel : Puisque les Philistins ont agi par vengeance, et qu’ils se sont vengés, le cœur plein de mépris, au point de tout détruire dans leur haine ancestrale, '
  '16':
  - type: text
    content: 'à cause de cela, voici ce que déclare le Seigneur, l’Eternel : Je vais porter la main sur les Philistins. Je détruirai ceux qui sont venus de la Crète, et je ferai périr le reste de ceux qui sont établis sur les bords de la mer. '
  '17':
  - type: text
    content: J’exercerai sur eux une rétribution terrible, les châtiments dictés par mon indignation, et ils reconnaîtront que je suis l’Eternel lorsque je les rétribuerai.
  '2':
  - type: text
    content: 'Fils d’homme, dirige ton regard en direction des Ammonites, prophétise contre eux, '
  '3':
  - type: text
    content: 'dis au sujet des Ammonites : « Ecoutez la parole du Seigneur, l’Eternel : Voici ce que vous dit le Seigneur, l’Eternel : Tu as crié : “Ha, ha… !” lorsque mon sanctuaire a été profané, lorsque le pays d’Israël a été dévasté, lorsque la communauté de Juda est partie en exil. '
  '4':
  - type: text
    content: A cause de cela, je vais te livrer aux tribus de l’Orient
  - type: note
    content: Tribus arabes établies à l’est du Jourdain (Jg 6.3 ; Jb 1.1-3 ; Jr 49.28).
  - type: text
    content: ' qui conquerront ton territoire. Ils dresseront chez toi leurs campements et ils établiront leurs demeures chez toi. Ce sont eux qui mangeront tes fruits, eux qui boiront ton lait. '
  '5':
  - type: text
    content: Je ferai de Rabba
  - type: note
    content: 'Rabba: capitale des Ammonites.'
  - type: text
    content: ' un parc pour les chameaux, et du pays des Ammonites un bercail de moutons, et vous reconnaîtrez que je suis l’Eternel.'
  '6':
  - type: text
    content: 'Car voici ce que dit le Seigneur, l’Eternel : Parce que tu as applaudi et trépigné et que tu t’es réjoui avec tant de mépris au sujet d’Israël, de son pays, '
  '7':
  - type: text
    content: à cause de cela, je vais porter la main sur toi, te donner en proie aux nations étrangères, et je te ferai disparaître en tant que peuple, je te supprimerai du nombre des pays. Je t’exterminerai et tu reconnaîtras que je suis l’Eternel. »
  - type: heading
    content: Contre les Moabites
  '8':
  - type: text
    content: 'Voici ce que déclare le Seigneur, l’Eternel : Moab et Séir'
  - type: note
    content: Les Moabites habitaient au sud des Ammonites, à l’est de la mer Morte. Les Edomites étaient établis dans les monts de Séir, au sud de la mer Morte.
  - type: text
    content: ' disent : « La communauté de Juda est devenue pareille à tous les autres peuples. » '
  '9':
  - type: text
    content: 'A cause de cela, moi je vais exposer les pentes de Moab en les dégarnissant de villes, je démantèlerai jusque sur ses frontières les villes du pays qui constituent sa gloire : Beth-Hayeshimoth, Baal-Meôn, Qiryataïm, '
