document_id: HAG.1,21
type_code: fra
verses:
  '1':
  - type: text
    content: La deuxième année du règne du roi Darius, le premier jour du sixième mois
  - type: note
    content: Darius Ier Hystaspe, roi des Perses de 522 à 486 av. J.-C. Il s’agit ici du 29 août 520 av. J.-C.
  - type: text
    content: ', l’Eternel adressa la parole à Zorobabel, fils de Shealtiel, gouverneur de Juda, et à Josué, fils de Yehotsadaq'
  - type: note
    content: Sur Zorobabel, voir 1 Ch 3.17-19. Sur Zorobabel et Josué, voir Esd 3.1-9.
  - type: text
    content: ', le grand-prêtre, par l’intermédiaire du prophète Aggée.'
  - type: text
    content: 'Voici les termes de ce message :'
  - type: heading
    content: L’appel à reconstruire le Temple
  '10':
  - type: text
    content: 'Voilà pourquoi le ciel a retenu la pluie, voilà pourquoi la terre a refusé ses produits : c’est à cause de vous. '
  '11':
  - type: text
    content: J’ai appelé la sécheresse sur les champs et les monts, sur le blé, sur le vin, sur l’huile, sur tout produit du sol, ainsi que sur les hommes, sur le bétail, sur tout le fruit de vos travaux.
  '12':
  - type: text
    content: 'Alors Zorobabel, fils de Shealtiel, Josué, fils de Yehotsadaq, le grand-prêtre, et tout le reste du peuple écoutèrent la voix de l’Eternel, leur Dieu, ils écoutèrent les paroles du prophète Aggée, que l’Eternel leur Dieu leur avait envoyé, et le peuple en eut la crainte de l’Eternel. '
  '13':
  - type: text
    content: 'Alors Aggée, le messager de l’Eternel, transmit au peuple le message suivant de la part de l’Eternel :'
  - type: text
    content: « Moi, je suis avec vous,
  - type: text
    content: l’Eternel le déclare. »
  '14':
  - type: text
    content: 'Et l’Eternel anima d’un nouveau zèle Zorobabel, fils de Shealtiel, gouverneur de Juda, Josué, fils de Yehotsadaq, le grand-prêtre, et tout le reste du peuple, de sorte qu’ils vinrent et se mirent à l’ouvrage au temple du Seigneur des armées célestes, leur Dieu, '
  '15':
  - type: text
    content: le vingt-quatrième jour du sixième mois de la deuxième année du règne de Darius.
  '2':
  - type: text
    content: 'Voici ce que déclare le Seigneur des armées célestes : Les gens de ce peuple prétendent : « Le temps n’est pas venu encore, le temps de rebâtir le temple de l’Eternel'
  - type: note
    content: Le Temple avait été pillé et incendié par les Babyloniens en 587 av. J.-C. (Jr 52.12-23). Zorobabel et Josué (Esd 3.1-9) avaient commencé à le rebâtir, mais avaient dû interrompre les travaux devant l’opposition des peuples voisins (Esd 4.4-5).
  - type: text
    content: . »
  '3':
  - type: text
    content: 'Alors la parole de l’Eternel leur fut adressée par l’intermédiaire du prophète Aggée :'
  '4':
  - type: text
    content: 'Est-il temps pour vous-mêmes d’habiter à votre aise des maisons lambrissées, alors que ce temple est en ruine ? '
  '5':
  - type: text
    content: 'Maintenant, voici ce que déclare le Seigneur des armées célestes : Considérez donc bien ce qui vous arrive : '
  '6':
  - type: text
    content: vous semez largement mais vous récoltez peu, vous mangez, sans être rassasiés et vous buvez, sans étancher votre soif. Vous vous couvrez d’habits sans être réchauffés, et le salaire que gagne l’ouvrier va dans une bourse trouée.
  '7':
  - type: text
    content: 'Voici ce que déclare le Seigneur des armées célestes : Réfléchissez donc bien à ce qui vous arrive. '
  '8':
  - type: text
    content: Allez à la montagne, rapportez-en du bois et bâtissez le Temple. J’y trouverai plaisir, j’en serai glorifié
  - type: note
    content: 'J’y trouverai plaisir… glorifié. Autres traductions : J’y trouverai plaisir et j’y manifesterai ma gloire ; ou : Je serai heureux d’y être glorifié.'
  - type: text
    content: ', déclare l’Eternel. '
  '9':
  - type: text
    content: 'Vous comptiez sur beaucoup, mais vous avez obtenu peu ; vous aviez engrangé ce que vous aviez récolté, et j’ai soufflé dessus. Pourquoi donc l’ai-je fait ? demande l’Eternel, le Seigneur des armées célestes. Parce que mon temple est en ruine, tandis que chacun de vous s’affaire pour sa propre maison. '
