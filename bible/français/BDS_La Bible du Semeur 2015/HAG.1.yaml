document_id: HAG.1,21
type_code: fra
verses:
  '1':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: La deuxième année du règne du roi Darius, le premier jour du sixième mois
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1.1 '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: Darius I
        - type: usfm
          marker: ord
          children:
          - type: text
            text: er
        - type: text
          text: ' Hystaspe, '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: roi des Perses de 522 à 486 av. J.-C. Il s’agit ici du 29 août 520 av. J.-C.
      marker-yv: yv-n
    - type: text
      text: ', l’Eternel adressa la parole à Zorobabel, fils de Shealtiel, gouverneur de Juda, et à Josué, fils de Yehotsadaq'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1.1 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Sur '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Zorobabel
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: ', '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'voir '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: 1 Ch 3.17-19
        - type: text
          text: '. Sur '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Zorobabel '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'et '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Josué
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: ', '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'voir '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: Esd 3.1-9
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: ', le grand-prêtre, par l’intermédiaire du prophète Aggée.'
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Voici les termes de ce message :'
  - type: usfm
    marker: s1
    children:
    - type: text
      text: L’appel à reconstruire le Temple
    marker-yv: yv-h
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'Voilà pourquoi le ciel a retenu la pluie, voilà pourquoi la terre a refusé ses produits : c’est à cause de vous. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: J’ai appelé la sécheresse sur les champs et les monts, sur le blé, sur le vin, sur l’huile, sur tout produit du sol, ainsi que sur les hommes, sur le bétail, sur tout le fruit de vos travaux.
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'Alors Zorobabel, fils de Shealtiel, Josué, fils de Yehotsadaq, le grand-prêtre, et tout le reste du peuple écoutèrent la voix de l’Eternel, leur Dieu, ils écoutèrent les paroles du prophète Aggée, que l’Eternel leur Dieu leur avait envoyé, et le peuple en eut la crainte de l’Eternel. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'Alors Aggée, le messager de l’Eternel, transmit au peuple le message suivant de la part de l’Eternel :'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: « Moi, je suis avec vous,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: l’Eternel le déclare. »
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'Et l’Eternel anima d’un nouveau zèle Zorobabel, fils de Shealtiel, gouverneur de Juda, Josué, fils de Yehotsadaq, le grand-prêtre, et tout le reste du peuple, de sorte qu’ils vinrent et se mirent à l’ouvrage au temple du Seigneur des armées célestes, leur Dieu, '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: le vingt-quatrième jour du sixième mois de la deuxième année du règne de Darius.
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'Voici ce que déclare le Seigneur des armées célestes : Les gens de ce peuple prétendent : « Le temps n’est pas venu encore, le temps de rebâtir le temple de l’Eternel'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1.2 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Le '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'Temple '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: avait été pillé et incendié par les Babyloniens en 587 av. J.-C. (
        - type: usfm
          marker: ref
          children:
          - type: text
            text: Jr 52.12-23
        - type: text
          text: ). Zorobabel et Josué (
        - type: usfm
          marker: ref
          children:
          - type: text
            text: Esd 3.1-9
        - type: text
          text: ) avaient commencé à le rebâtir, mais avaient dû interrompre les travaux devant l’opposition des peuples voisins (
        - type: usfm
          marker: ref
          children:
          - type: text
            text: Esd 4.4-5
        - type: text
          text: ).
      marker-yv: yv-n
    - type: text
      text: . »
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'Alors la parole de l’Eternel leur fut adressée par l’intermédiaire du prophète Aggée :'
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'Est-il temps pour vous-mêmes d’habiter à votre aise des maisons lambrissées, alors que ce temple est en ruine ? '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'Maintenant, voici ce que déclare le Seigneur des armées célestes : Considérez donc bien ce qui vous arrive : '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: vous semez largement mais vous récoltez peu, vous mangez, sans être rassasiés et vous buvez, sans étancher votre soif. Vous vous couvrez d’habits sans être réchauffés, et le salaire que gagne l’ouvrier va dans une bourse trouée.
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'Voici ce que déclare le Seigneur des armées célestes : Réfléchissez donc bien à ce qui vous arrive. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: Allez à la montagne, rapportez-en du bois et bâtissez le Temple. J’y trouverai plaisir, j’en serai glorifié
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1.8 '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'J’y trouverai plaisir… glorifié. '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Autres traductions : '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'J’y trouverai plaisir et j’y manifesterai ma gloire ; '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'ou : '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: Je serai heureux d’y être glorifié.
      marker-yv: yv-n
    - type: text
      text: ', déclare l’Eternel. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'Vous comptiez sur beaucoup, mais vous avez obtenu peu ; vous aviez engrangé ce que vous aviez récolté, et j’ai soufflé dessus. Pourquoi donc l’ai-je fait ? demande l’Eternel, le Seigneur des armées célestes. Parce que mon temple est en ruine, tandis que chacun de vous s’affaire pour sa propre maison. '
