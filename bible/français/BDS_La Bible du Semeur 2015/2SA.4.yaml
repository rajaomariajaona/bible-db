document_id: 2SA.4,21
type_code: fra
verses:
  '1':
  - type: heading
    content: L’assassinat d’Ish-Bosheth et la réaction de David
  - type: text
    content: Lorsque Ish-Bosheth, fils de Saül, apprit qu’Abner était mort à Hébron, il en fut consterné et la peur s’empara de tout Israël.
  '10':
  - type: text
    content: 'A Tsiqlag, un homme est venu me dire : « Voici : Saül est mort », croyant m’annoncer une bonne nouvelle. Je l’ai fait saisir et exécuter pour le payer de sa « bonne nouvelle ». '
  '11':
  - type: text
    content: A plus forte raison vais-je payer des misérables qui ont assassiné un homme innocent sur son lit, dans sa maison. Oui, je vous demanderai compte du meurtre que vous avez commis, et je vous ferai disparaître de la surface de la terre.
  '12':
  - type: text
    content: Là-dessus, David donna un ordre à ses hommes qui les tuèrent. Ensuite, ils leur tranchèrent les mains et les pieds qu’ils suspendirent au bord de l’étang d’Hébron. Ils prirent la tête d’Ish-Bosheth et l’enterrèrent dans le tombeau d’Abner à Hébron.
  '2':
  - type: text
    content: Parmi ceux qui étaient sous ses ordres, il y avait deux chefs de bandes appelés Baana et Rékab ; ils étaient fils de Rimmôn de Beéroth
  - type: note
    content: A environ 15 kilomètres de Jérusalem.
  - type: text
    content: ', des Benjaminites, car Beéroth faisait partie de Benjamin '
  '3':
  - type: text
    content: bien que, depuis lors, ses habitants se soient réfugiés à Guittaïm où leurs descendants habitent encore aujourd’hui.
  '4':
  - type: text
    content: Or Jonathan, le fils de Saül, avait un fils qui était infirme des deux pieds. En effet, il avait cinq ans au moment de la bataille de Jizréel, et lorsqu’on avait appris ce qui était arrivé à Saül et Jonathan, sa nourrice l’avait pris pour s’enfuir. Dans sa précipitation, elle l’avait laissé tomber et il en était resté estropié. Son nom était Mephibosheth.
  '5':
  - type: text
    content: 'Rékab et Baana, les deux fils de Rimmôn de Beéroth, se rendirent à l’heure la plus chaude dans la maison d’Ish-Bosheth, celui-ci était couché pour faire la sieste ; il était midi. '
  '6':
  - type: text
    content: 'Ils s’introduisirent dans la maison en apportant du blé, entrèrent dans la chambre à coucher d’Ish-Bosheth pendant qu’il reposait sur son lit, le frappèrent mortellement au ventre et le décapitèrent, puis ils prirent sa tête et s’enfuirent. Après avoir marché toute la nuit le long de la vallée du Jourdain, '
  '8':
  - type: text
    content: 'ils apportèrent la tête d’Ish-Bosheth au roi David à Hébron et lui dirent : Voici la tête d’Ish-Bosheth, fils de Saül, ton ennemi qui cherchait à te tuer. L’Eternel a vengé aujourd’hui le roi, mon seigneur, de Saül et de ses descendants.'
  '9':
  - type: text
    content: 'Mais David répondit à Rékab et à son frère Baana, fils de Rimmôn de Beéroth : L’Eternel qui m’a délivré de toute détresse est vivant ! '
