document_id: 1SA.24,21
type_code: fra
verses:
  '1':
  - type: heading
    content: David épargne et confond Saül
  - type: text
    content: David repartit de là pour s’installer dans les falaises escarpées d’Eyn-Guédi
  - type: note
    content: C’est-à-dire la source du Chevreau, dominant la rive ouest de la mer Morte, région criblée de grottes en bordure du désert de Ziph, renommée pour sa fertilité (Ct 1.14).
  - type: text
    content: '. '
  '10':
  - type: text
    content: 'Puis il dit à Saül : Pourquoi écoutes-tu ceux qui te disent que je cherche à te nuire ? '
  '11':
  - type: text
    content: 'Aujourd’hui même, tu vois de tes yeux que l’Eternel t’avait livré en mon pouvoir dans la grotte. On me disait de te tuer, mais je t’ai épargné et j’ai dit : « Je ne porterai pas la main sur mon seigneur, car il a reçu l’onction de la part de l’Eternel. » '
  '12':
  - type: text
    content: Regarde, ô mon père
  - type: note
    content: Titre de respect. De plus, Saül était le beau-père de David (18.27).
  - type: text
    content: ', oui, regarde ce que je tiens dans ma main : un pan de ton manteau. Puisque j’ai coupé le pan de ton manteau et que je ne t’ai pas tué, reconnais donc qu’il n’y a de ma part ni malveillance ni révolte, et que je n’ai aucun tort envers toi. Alors que toi, tu me traques pour m’ôter la vie. '
  '13':
  - type: text
    content: 'Que l’Eternel juge entre moi et toi et qu’il te fasse payer le mal que tu m’as fait, mais moi je ne porterai pas la main sur toi. '
  '14':
  - type: text
    content: 'Comme le dit le vieux proverbe : « Du méchant vient la méchanceté » ! Mais je ne porterai pas la main sur toi. '
  '15':
  - type: text
    content: 'Contre qui le roi d’Israël est-il parti en guerre ? Qui poursuis-tu ? Un chien mort ! Une misérable puce ! '
  '16':
  - type: text
    content: Oui, l’Eternel sera notre juge et prononcera son verdict entre moi et toi ! Qu’il examine et qu’il défende ma cause ! Qu’il me fasse justice et me délivre de toi !
  '17':
  - type: text
    content: 'Quand David eut fini de parler ainsi à Saül, celui-ci lui dit : Est-ce bien toi qui me parles, mon fils David ?'
  - type: text
    content: 'Et il se mit à pleurer à chaudes larmes. '
  '18':
  - type: text
    content: 'Puis il lui dit : Tu es plus juste que moi, tu m’as traité avec bonté, alors que moi je t’ai fait du mal. '
  '19':
  - type: text
    content: 'Tu viens de montrer aujourd’hui que tu agis avec bonté envers moi, puisque l’Eternel m’avait livré en ton pouvoir et que tu ne m’as pas tué. '
  '2':
  - type: text
    content: 'Lorsque Saül revint de sa campagne contre les Philistins, on l’informa que David se trouvait maintenant dans le désert d’Eyn-Guédi. '
  '20':
  - type: text
    content: 'Si quelqu’un surprend son ennemi, le laisse-t-il avec bienveillance poursuivre sa route ? Que l’Eternel te récompense pour ce que tu as fait pour moi en ce jour ! '
  '21':
  - type: text
    content: 'Maintenant, tu vois, je sais que tu seras certainement roi un jour et que le royaume d’Israël sera stable sous ton autorité. '
  '22':
  - type: text
    content: A présent, jure-moi seulement par l’Eternel que tu n’extermineras pas mes descendants après ma mort et que tu ne chercheras pas à faire disparaître mon nom de mon groupe familial.
  '23':
  - type: text
    content: Alors David le promit par serment à Saül, qui retourna chez lui, tandis que David et ses compagnons regagnèrent leur refuge dans la montagne.
  '3':
  - type: text
    content: 'Alors le roi rassembla trois « milliers » d’hommes d’élite, choisis dans tout Israël, et il se mit à la recherche de David et de ses compagnons jusqu’en face du Rocher des Bouquetins. '
  '4':
  - type: text
    content: En passant près des parcs à moutons en bordure du chemin, il vit une grotte
  - type: note
    content: Voir Ps 57.1 ; 142.1.
  - type: text
    content: ' et y entra pour satisfaire un besoin naturel. Or David et ses hommes se tenaient précisément au fond de cette grotte.'
  '5':
  - type: text
    content: 'Les compagnons de David lui chuchotèrent : Voici le moment annoncé par l’Eternel lorsqu’il t’a promis de te livrer ton ennemi pour que tu le traites comme bon te semble.'
  - type: text
    content: 'Alors David se leva et alla couper un pan du manteau de Saül sans que celui-ci s’en aperçoive. '
  '6':
  - type: text
    content: 'Dès qu’il l’eut fait, son cœur se mit à battre très fort parce qu’il avait coupé un pan du manteau de Saül. '
  '7':
  - type: text
    content: 'Il dit à ses hommes : Que l’Eternel me garde de jamais faire une chose pareille et de porter la main sur mon seigneur à qui Dieu a conféré l’onction, car c’est de la part de l’Eternel qu’il a été oint.'
  '8':
  - type: text
    content: Par ces paroles, David arrêta ses hommes ; il ne les laissa pas se jeter sur Saül. Le roi sortit de la grotte et continua son chemin.
  '9':
  - type: text
    content: 'Alors David sortit de la grotte derrière lui et appela Saül : Mon seigneur le roi !'
  - type: text
    content: 'Saül se retourna et David s’inclina respectueusement, le visage contre terre, et se prosterna. '
