document_id: 1SA.24
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: David épargne et confond Saül
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: David repartit de là pour s’installer dans les falaises escarpées d’Eyn-Guédi
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '24.1 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'C’est-à-dire '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'la source du Chevreau, '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: dominant la rive ouest de la mer Morte, région criblée de grottes en bordure du désert de Ziph, renommée pour sa fertilité (
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ct 1.14
        metadata:
          usfm: SNG.1.14
      - type: text
        text: ).
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Lorsque Saül revint de sa campagne contre les Philistins, on l’informa que David se trouvait maintenant dans le désert d’Eyn-Guédi. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Alors le roi rassembla trois « milliers » d’hommes d’élite, choisis dans tout Israël, et il se mit à la recherche de David et de ses compagnons jusqu’en face du Rocher des Bouquetins. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: En passant près des parcs à moutons en bordure du chemin, il vit une grotte
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '24.4 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Voir Ps 57.1 ; 142.1.
    marker-yv: yv-n
  - type: text
    text: ' et y entra pour satisfaire un besoin naturel. Or David et ses hommes se tenaient précisément au fond de cette grotte.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Les compagnons de David lui chuchotèrent : Voici le moment annoncé par l’Eternel lorsqu’il t’a promis de te livrer ton ennemi pour que tu le traites comme bon te semble.'
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Alors David se leva et alla couper un pan du manteau de Saül sans que celui-ci s’en aperçoive. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Dès qu’il l’eut fait, son cœur se mit à battre très fort parce qu’il avait coupé un pan du manteau de Saül. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Il dit à ses hommes : Que l’Eternel me garde de jamais faire une chose pareille et de porter la main sur mon seigneur à qui Dieu a conféré l’onction, car c’est de la part de l’Eternel qu’il a été oint.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Par ces paroles, David arrêta ses hommes ; il ne les laissa pas se jeter sur Saül. Le roi sortit de la grotte et continua son chemin.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Alors David sortit de la grotte derrière lui et appela Saül : Mon seigneur le roi !'
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Saül se retourna et David s’inclina respectueusement, le visage contre terre, et se prosterna. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Puis il dit à Saül : Pourquoi écoutes-tu ceux qui te disent que je cherche à te nuire ? '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Aujourd’hui même, tu vois de tes yeux que l’Eternel t’avait livré en mon pouvoir dans la grotte. On me disait de te tuer, mais je t’ai épargné et j’ai dit : « Je ne porterai pas la main sur mon seigneur, car il a reçu l’onction de la part de l’Eternel. » '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Regarde, ô mon père
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '24.12 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Titre de respect. De plus, Saül était le beau-père de David (
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '18.27'
        metadata:
          usfm: 1SA.18.27
      - type: text
        text: ).
    marker-yv: yv-n
  - type: text
    text: ', oui, regarde ce que je tiens dans ma main : un pan de ton manteau. Puisque j’ai coupé le pan de ton manteau et que je ne t’ai pas tué, reconnais donc qu’il n’y a de ma part ni malveillance ni révolte, et que je n’ai aucun tort envers toi. Alors que toi, tu me traques pour m’ôter la vie. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Que l’Eternel juge entre moi et toi et qu’il te fasse payer le mal que tu m’as fait, mais moi je ne porterai pas la main sur toi. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Comme le dit le vieux proverbe : « Du méchant vient la méchanceté » ! Mais je ne porterai pas la main sur toi. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Contre qui le roi d’Israël est-il parti en guerre ? Qui poursuis-tu ? Un chien mort ! Une misérable puce ! '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Oui, l’Eternel sera notre juge et prononcera son verdict entre moi et toi ! Qu’il examine et qu’il défende ma cause ! Qu’il me fasse justice et me délivre de toi !
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Quand David eut fini de parler ainsi à Saül, celui-ci lui dit : Est-ce bien toi qui me parles, mon fils David ?'
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Et il se mit à pleurer à chaudes larmes. '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Puis il lui dit : Tu es plus juste que moi, tu m’as traité avec bonté, alors que moi je t’ai fait du mal. '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Tu viens de montrer aujourd’hui que tu agis avec bonté envers moi, puisque l’Eternel m’avait livré en ton pouvoir et que tu ne m’as pas tué. '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Si quelqu’un surprend son ennemi, le laisse-t-il avec bienveillance poursuivre sa route ? Que l’Eternel te récompense pour ce que tu as fait pour moi en ce jour ! '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Maintenant, tu vois, je sais que tu seras certainement roi un jour et que le royaume d’Israël sera stable sous ton autorité. '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: A présent, jure-moi seulement par l’Eternel que tu n’extermineras pas mes descendants après ma mort et que tu ne chercheras pas à faire disparaître mon nom de mon groupe familial.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: Alors David le promit par serment à Saül, qui retourna chez lui, tandis que David et ses compagnons regagnèrent leur refuge dans la montagne.
