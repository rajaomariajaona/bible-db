document_id: EZK.18
type_code: fra
segments:
- type: usfm
  marker: s2
  children:
  - type: text
    text: La responsabilité individuelle
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: L’Eternel m’adressa la parole et me dit
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '18.1 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Pour les v. 1-20, voir 14.12-20 ; Jr 31.29-30 et Dt 7.10 ; 24.16.
    marker-yv: yv-n
  - type: text
    text: '  :'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Qu’avez-vous à répéter ce proverbe dans le pays d’Israël : « Les pères ont mangé des raisins verts, mais ce sont les dents des enfants qui en sont agacées » ? '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Aussi vrai que je suis vivant, le Seigneur, l’Eternel, le déclare, vous n’aurez plus lieu de répéter ce proverbe en Israël. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Voici : toute personne m’appartient, les fils comme les pères m’appartiennent. Eh bien, c’est la personne qui pèche qui mourra.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Soit un homme qui est juste et qui agit avec droiture et selon la justice. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Il ne participe pas aux repas de sacrifice sur les montagnes et ne tourne pas les regards vers les idoles de la communauté d’Israël, il ne déshonore pas la femme d’autrui et n’a pas de relations avec une femme quand elle est indisposée
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '18.6 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Voir '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Lv 18.19
        metadata:
          usfm: LEV.18.19
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Il n’exploite personne, il restitue son gage à celui qui lui a emprunté de l’argent, il ne commet pas de vol, il donne son pain à celui qui a faim et des vêtements à celui qui n’en a pas. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Il ne prête pas à un taux usuraire et ne retient pas d’intérêts
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '18.8 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Voir '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Lv 25.36-37
        metadata:
          usfm: LEV.25.36+LEV.25.37
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: ', il évite de commettre l’injustice et, s’il doit arbitrer entre un homme et un autre, il rend un jugement selon la vérité. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Il vit en accord avec mes lois et obéit à mes commandements pour agir loyalement. Un tel homme est juste et il vivra, le Seigneur, l’Eternel, le déclare.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Mais si cet homme a un fils qui est un brigand, un criminel, et qui est coupable de l’un de ces actes, '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'alors que son père n’en a commis aucun : il participe aux repas sacrificiels sur les montagnes, ou il déshonore la femme d’autrui, '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'ou il exploite les pauvres et les démunis, il commet des vols, ne rend pas les gages reçus, ou il porte les regards sur les idoles et prend part à des rites abominables. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Ou encore, il prête à un taux usuraire et retient des intérêts. Ce fils-là vivrait-il ? Non, vous dis-je, il ne vivra pas. Puisqu’il a commis toutes ces choses abominables, il mourra et il sera seul responsable de sa mort.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Si maintenant cet homme a un fils qui est témoin de toutes les fautes commises par son père. Bien qu’il ait vu ces fautes, ce fils ne les a pas imitées. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Il ne participe pas aux repas de sacrifice sur les montagnes, il ne porte pas ses regards sur les idoles de la communauté d’Israël, il ne déshonore pas la femme d’autrui. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Il n’exploite personne, ne retient pas de gage, ne commet pas de vol, mais il donne son pain à celui qui a faim et des vêtements à celui qui n’en a pas. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Il ne fait pas de tort au pauvre
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '18.17 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'D’après le texte hébreu traditionnel. L’ancienne version grecque a : '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: il ne commet pas d’injustice.
    marker-yv: yv-n
  - type: text
    text: ', ne prête pas à un taux usuraire, ni ne retient des intérêts. Il applique mes lois et vit selon mes commandements. Eh bien, ce fils-là ne mourra pas pour les fautes de son père : il vivra. '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: C’est son père, qui a opprimé autrui, qui a volé son prochain et n’a pas bien agi au milieu de son peuple, c’est lui qui mourra pour ses propres fautes.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Vous demandez : Pourquoi le fils ne paie-t-il pas pour les fautes de son père ? Eh bien : Parce que le fils a agi avec droiture et selon la justice, parce qu’il a obéi à tous mes commandements et les a appliqués, il vivra. '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: C’est la personne qui pèche qui mourra et le fils ne sera pas tenu pour responsable de la faute de son père, ni le père tenu pour responsable de la faute de son fils. A celui qui est juste, sa droiture sera portée à son compte, et l’on portera au compte du méchant sa méchanceté.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Si le méchant se détourne de toutes les fautes qu’il a commises, s’il obéit à tous mes commandements et agit avec droiture et selon la justice, il ne mourra pas, il vivra. '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Parce qu’il mène à présent une vie juste, on ne tiendra plus compte de tous les péchés qu’il a commis, et il vivra. '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Pensez-vous que je prenne le moindre plaisir à voir mourir le méchant ? demande le Seigneur, l’Eternel. Mon désir n’est-il pas plutôt qu’il abandonne sa mauvaise conduite et qu’il vive ? '
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: Mais si le juste abandonne sa droiture et se met à faire le mal, en imitant toutes les pratiques abominables du méchant, pensez-vous qu’il vivra ? On ne tiendra plus compte de tous les actes justes qu’il a accomplis par le passé et il mourra à cause de ses transgressions et de ses fautes.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Vous prétendez : « La manière d’agir du Seigneur n’est pas équitable. » Ecoutez donc, gens d’Israël, est-ce ma manière d’agir qui n’est pas équitable ? N’est-ce pas plutôt la vôtre ? '
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Si le juste abandonne la droiture et se met à faire le mal et s’il meurt pour cela, c’est bien à cause du mal qu’il a commis qu’il perd la vie. '
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'Et si le méchant renonce à la méchanceté avec laquelle il a agi pour vivre désormais dans la droiture et selon la justice, il sauvera sa vie. '
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'S’il considère tous les péchés qu’il a commis et s’en détourne, il vivra, il ne mourra pas. '
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: Et pourtant, les gens d’Israël prétendent que la manière d’agir du Seigneur n’est pas équitable. Est-ce vraiment ma manière d’agir qui n’est pas équitable, gens d’Israël ? N’est-ce pas plutôt la vôtre ?
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'Ainsi donc, je jugerai chacun de vous, gens d’Israël, selon sa conduite, le Seigneur, l’Eternel, le déclare. Changez donc d’attitude et détournez-vous de tous vos péchés, pour que vos fautes ne causent pas votre perte. '
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'Rejetez loin de vous tous les péchés que vous avez commis contre moi. Faites-vous un cœur nouveau et un état d’esprit nouveau, car pourquoi faudrait-il que vous mouriez, gens d’Israël ? '
  - type: usfm
    marker: v
    metadata:
      v: '32'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: Vraiment, moi, je ne prends aucun plaisir à voir mourir qui que ce soit, le Seigneur, l’Eternel, le déclare. Convertissez-vous et vivez !
