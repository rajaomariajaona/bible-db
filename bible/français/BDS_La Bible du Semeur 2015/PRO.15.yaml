document_id: PRO.15,21
type_code: fra
verses:
  '1':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Une réponse douce apaise la colère,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: mais une parole blessante excite l’irritation.
  '10':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Une dure leçon attend celui qui s’écarte du droit chemin ;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: qui déteste être repris périra.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: L’Eternel connaît le séjour des morts, le lieu des disparus,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: combien plus le cœur des humains est-il à découvert devant lui !
  '12':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Le moqueur n’aime pas qu’on le reprenne,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: c’est pourquoi il ne demande pas l’avis des sages.
  '13':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Un cœur joyeux rend le visage aimable,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: mais quand le cœur est triste, l’esprit est abattu.
  '14':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: L’homme intelligent cherche toujours à apprendre,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: alors que les sots se repaissent de sottises.
  '15':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Pour l’affligé, tous les jours sont mauvais,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: mais celui qui a le contentement dans son cœur est toujours en fête.
  '16':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mieux vaut avoir peu et craindre Dieu
  - type: usfm
    marker: q1
    children:
    - type: text
      text: que de posséder une grande fortune avec du tourment.
  '17':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mieux vaut un plat de légumes là où règne l’amour
  - type: usfm
    marker: q1
    children:
    - type: text
      text: qu’un bœuf gras assaisonné de haine.
  '18':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: L’homme irascible suscite des querelles,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: mais celui qui garde son sang-froid apaise les disputes.
  '19':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Le chemin du paresseux est une haie de ronces,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: mais le sentier des hommes droits est une route bien aplanie.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Qui enseigne avec sagesse rend le savoir attrayant,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: mais la bouche des sots ne répand que des sottises.
  '20':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Un fils sage fait la joie de son père ;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: seul un homme insensé a du mépris pour sa mère.
  '21':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: La sottise ravit l’homme dépourvu de sens ;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: un homme intelligent marche droit.
  '22':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Quand on ne consulte personne, les projets échouent,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: mais lorsqu’il y a beaucoup de conseillers, ils se réalisent.
  '23':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Savoir donner la bonne réponse est une source de joie,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et combien est agréable une parole dite à propos.
  '24':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: L’homme avisé suit le sentier qui mène en haut vers la vie
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et qui le fait échapper au séjour des morts en bas.
  '25':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: L’Eternel renverse la maison des orgueilleux,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: mais il protège la propriété de la veuve.
  '26':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Les projets malveillants sont en horreur à l’Eternel,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: mais les paroles aimables sont pures.
  '27':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Qui veut s’enrichir à tout prix entraîne sa famille dans le malheur,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: mais qui déteste les pots-de-vin vivra longtemps.
  '28':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Le juste réfléchit bien avant de répondre,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: mais la bouche des méchants répand le mal.
  '29':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: L’Eternel se tient loin des méchants,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: mais il entend la prière des justes.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: L’Eternel voit ce qui se passe en tout lieu ;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: il observe tous les hommes, méchants et bons.
  '30':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Un regard lumineux met le cœur en joie ;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: une bonne nouvelle fortifie jusqu’aux os.
  '31':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Qui prête une oreille attentive aux critiques constructives
  - type: usfm
    marker: q1
    children:
    - type: text
      text: habitera parmi les sages.
  '32':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Qui refuse d’être repris se méprise lui-même,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: mais qui écoute les avertissements acquiert du bon sens.
  '33':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: La crainte de l’Eternel est une école de la sagesse
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '15.33 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Voir '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: '1.7'
        - type: text
          text: ' et note.'
      marker-yv: yv-n
    - type: text
      text: '  ;'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: avant d’être honoré, il faut savoir être humble
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '15.33 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Voir '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: '18.12'
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: .
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Des paroles réconfortantes sont comme un arbre de vie,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: mais la langue malfaisante démoralise.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Seul un insensé méprise ce que son père lui a enseigné,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: qui tient compte des avertissements est un homme avisé.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Il y a de nombreux trésors dans la maison du juste,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: mais les profits du méchant sont source d’ennuis
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '15.6 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Autre traduction : '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: sont troubles.
      marker-yv: yv-n
    - type: text
      text: .
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Les lèvres des sages répandent le savoir,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: mais il n’en est pas ainsi du cœur des insensés.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: L’Eternel a en horreur les sacrifices offerts par les méchants,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: mais les prières des hommes droits lui sont agréables.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: L’Eternel a en horreur la conduite du méchant,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: mais il aime celui qui recherche ce qui est juste.
