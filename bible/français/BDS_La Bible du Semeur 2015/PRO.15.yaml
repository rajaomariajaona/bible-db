document_id: PRO.15,21
type_code: fra
verses:
  '1':
  - type: text
    content: Une réponse douce apaise la colère,
  - type: text
    content: mais une parole blessante excite l’irritation.
  '10':
  - type: text
    content: Une dure leçon attend celui qui s’écarte du droit chemin ;
  - type: text
    content: qui déteste être repris périra.
  '11':
  - type: text
    content: L’Eternel connaît le séjour des morts, le lieu des disparus,
  - type: text
    content: combien plus le cœur des humains est-il à découvert devant lui !
  '12':
  - type: text
    content: Le moqueur n’aime pas qu’on le reprenne,
  - type: text
    content: c’est pourquoi il ne demande pas l’avis des sages.
  '13':
  - type: text
    content: Un cœur joyeux rend le visage aimable,
  - type: text
    content: mais quand le cœur est triste, l’esprit est abattu.
  '14':
  - type: text
    content: L’homme intelligent cherche toujours à apprendre,
  - type: text
    content: alors que les sots se repaissent de sottises.
  '15':
  - type: text
    content: Pour l’affligé, tous les jours sont mauvais,
  - type: text
    content: mais celui qui a le contentement dans son cœur est toujours en fête.
  '16':
  - type: text
    content: Mieux vaut avoir peu et craindre Dieu
  - type: text
    content: que de posséder une grande fortune avec du tourment.
  '17':
  - type: text
    content: Mieux vaut un plat de légumes là où règne l’amour
  - type: text
    content: qu’un bœuf gras assaisonné de haine.
  '18':
  - type: text
    content: L’homme irascible suscite des querelles,
  - type: text
    content: mais celui qui garde son sang-froid apaise les disputes.
  '19':
  - type: text
    content: Le chemin du paresseux est une haie de ronces,
  - type: text
    content: mais le sentier des hommes droits est une route bien aplanie.
  '2':
  - type: text
    content: Qui enseigne avec sagesse rend le savoir attrayant,
  - type: text
    content: mais la bouche des sots ne répand que des sottises.
  '20':
  - type: text
    content: Un fils sage fait la joie de son père ;
  - type: text
    content: seul un homme insensé a du mépris pour sa mère.
  '21':
  - type: text
    content: La sottise ravit l’homme dépourvu de sens ;
  - type: text
    content: un homme intelligent marche droit.
  '22':
  - type: text
    content: Quand on ne consulte personne, les projets échouent,
  - type: text
    content: mais lorsqu’il y a beaucoup de conseillers, ils se réalisent.
  '23':
  - type: text
    content: Savoir donner la bonne réponse est une source de joie,
  - type: text
    content: et combien est agréable une parole dite à propos.
  '24':
  - type: text
    content: L’homme avisé suit le sentier qui mène en haut vers la vie
  - type: text
    content: et qui le fait échapper au séjour des morts en bas.
  '25':
  - type: text
    content: L’Eternel renverse la maison des orgueilleux,
  - type: text
    content: mais il protège la propriété de la veuve.
  '26':
  - type: text
    content: Les projets malveillants sont en horreur à l’Eternel,
  - type: text
    content: mais les paroles aimables sont pures.
  '27':
  - type: text
    content: Qui veut s’enrichir à tout prix entraîne sa famille dans le malheur,
  - type: text
    content: mais qui déteste les pots-de-vin vivra longtemps.
  '28':
  - type: text
    content: Le juste réfléchit bien avant de répondre,
  - type: text
    content: mais la bouche des méchants répand le mal.
  '29':
  - type: text
    content: L’Eternel se tient loin des méchants,
  - type: text
    content: mais il entend la prière des justes.
  '3':
  - type: text
    content: L’Eternel voit ce qui se passe en tout lieu ;
  - type: text
    content: il observe tous les hommes, méchants et bons.
  '30':
  - type: text
    content: Un regard lumineux met le cœur en joie ;
  - type: text
    content: une bonne nouvelle fortifie jusqu’aux os.
  '31':
  - type: text
    content: Qui prête une oreille attentive aux critiques constructives
  - type: text
    content: habitera parmi les sages.
  '32':
  - type: text
    content: Qui refuse d’être repris se méprise lui-même,
  - type: text
    content: mais qui écoute les avertissements acquiert du bon sens.
  '33':
  - type: text
    content: La crainte de l’Eternel est une école de la sagesse
  - type: note
    content: Voir 1.7 et note.
  - type: text
    content: '  ;'
  - type: text
    content: avant d’être honoré, il faut savoir être humble
  - type: note
    content: Voir 18.12.
  - type: text
    content: .
  '4':
  - type: text
    content: Des paroles réconfortantes sont comme un arbre de vie,
  - type: text
    content: mais la langue malfaisante démoralise.
  '5':
  - type: text
    content: Seul un insensé méprise ce que son père lui a enseigné,
  - type: text
    content: qui tient compte des avertissements est un homme avisé.
  '6':
  - type: text
    content: Il y a de nombreux trésors dans la maison du juste,
  - type: text
    content: mais les profits du méchant sont source d’ennuis
  - type: note
    content: 'Autre traduction : sont troubles.'
  - type: text
    content: .
  '7':
  - type: text
    content: Les lèvres des sages répandent le savoir,
  - type: text
    content: mais il n’en est pas ainsi du cœur des insensés.
  '8':
  - type: text
    content: L’Eternel a en horreur les sacrifices offerts par les méchants,
  - type: text
    content: mais les prières des hommes droits lui sont agréables.
  '9':
  - type: text
    content: L’Eternel a en horreur la conduite du méchant,
  - type: text
    content: mais il aime celui qui recherche ce qui est juste.
