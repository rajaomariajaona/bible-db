document_id: JOB.22,21
type_code: fra
verses:
  '1':
  - type: usfm
    marker: ms1
    children:
    - type: text
      text: Troisième discours d’Éliphaz
    marker-yv: yv-h
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Eliphaz accuse Job de divers crimes
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Eliphaz de Témân prit la parole et dit :'
  '10':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Voilà pourquoi des pièges ╵sont tendus tout autour de toi,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: voilà pourquoi soudain ╵des frayeurs t’épouvantent.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ne vois-tu donc pas ces ténèbres,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: toute cette eau qui te submerge ?
  '12':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Dieu n’habite-t-il pas ╵tout là-haut dans le ciel ?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Vois la voûte étoilée, ╵comme elle est élevée !
  '13':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Mais toi, tu dis : ╵« Dieu, que peut-il savoir ?'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Peut-il exercer la justice ╵à travers les nuées ?
  '14':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Les nuages le cachent ╵et il ne peut pas voir,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: tandis qu’il se promène ╵sur le pourtour du ciel. »
  '15':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tiens-tu donc à rester ╵sur cet ancien sentier,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: suivi depuis toujours ╵par ceux qui font le mal ?
  '16':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Qui, prématurément, ╵sont retranchés
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et dont les fondements ╵sont comme un fleuve qui s’écoule ?
  '17':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Eux qui disaient à Dieu : ╵« Eloigne-toi de nous ! »'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'et : « Que pourrait nous faire ╵le Tout-Puissant'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '22.17 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'D’après l’ancienne version grecque et la version syriaque ; le texte hébreu traditionnel a : '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: lui faire.
      marker-yv: yv-n
    - type: text
      text: '  ? »'
  '18':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et, pourtant, il comblait ╵leurs maisons de bien-être.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mais loin de moi ╵l’idée de suivre leurs conseils
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '22.18 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Eliphaz reprend l’affirmation de Job (
        - type: usfm
          marker: ref
          children:
          - type: text
            text: '21.16'
        - type: text
          text: '). Au lieu de : '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'mais moi, j’écarte leurs conseils, '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'l’ancienne version grecque a : '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: mais ils l’ont tenu en dehors de leurs projets.
      marker-yv: yv-n
    - type: text
      text: .
  '19':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Car les justes verront leur ruine ╵et ils se réjouiront,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'ceux qui sont innocents ╵les railleront, disant :'
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Dieu aurait-il besoin ╵des services d’un homme ?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Le sage n’est utile qu’à lui-même !
  '20':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: '« Voilà nos adversaires : ╵ils sont anéantis'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et ce qui restait d’eux ╵le feu l’a dévoré. »
  '21':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Accorde-toi donc avec lui, ╵fais la paix avec lui.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ainsi tu connaîtras ╵de nouveau le bonheur.
  '22':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Accepte l’instruction ╵émanant de sa bouche,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: prends à cœur ses paroles.
  '23':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Si tu reviens ╵au Tout-Puissant ╵tu seras rétabli,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: tu feras disparaître ╵l’iniquité de ta demeure.
  '24':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Si tu jettes l’or pur ╵dans la poussière
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et l’or d’Ophir
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '22.24 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: C’est-à-dire l’or le plus fin et le plus cher (voir 1 R 9.28 ; 10.11 ; Ps 45.10 ; Es 13.12).
      marker-yv: yv-n
    - type: text
      text: ' ╵aux cailloux du torrent,'
  '25':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: alors le Tout-Puissant ╵sera pour toi de l’or,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et des monceaux d’argent,
  '26':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: car alors tu feras ╵tes délices du Tout-Puissant,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: tu lèveras ╵le visage vers Dieu.
  '27':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Oui, tu l’imploreras, ╵et il t’exaucera,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et tu t’acquitteras ╵des vœux que tu as faits
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '22.27 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: On accompagnait souvent ses prières de vœux.
      marker-yv: yv-n
    - type: text
      text: .
  '28':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Aux décisions que tu prendras ╵répondra le succès,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et, sur tous tes chemins, ╵brillera la lumière.
  '29':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et si quelqu’un est abattu, ╵tu le relèveras,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: car Dieu vient au secours ╵de qui baisse les yeux.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Importe-t-il au Tout-Puissant ╵que tu sois juste ou non ?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Quel intérêt a-t-il ╵à te voir vivre ╵d’une façon intègre ?
  '30':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Il délivrera même ╵celui qui est coupable.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: C’est grâce à tes mains pures ╵que cet homme sera sauvé.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Est-ce parce que tu le crains ╵qu’il te fait des reproches,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et qu’il entre en jugement avec toi
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '22.4 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Autre traduction : '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: Crois-tu que par crainte de toi il va te présenter sa défense et aller en justice avec toi ?
      marker-yv: yv-n
    - type: text
      text: '  ?'
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ne t’es-tu pas rendu coupable ╵de nombreux torts ?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Oui, tes péchés sont innombrables.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tu prenais sans raison ╵des gages de tes frères,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et, de leurs vêtements, ╵tu dépouillais les gens ╵jusqu’à les laisser nus
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '22.6 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Voir Ex 22.25-26 ; Dt 24.6, 12-13.
      marker-yv: yv-n
    - type: text
      text: .
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tu ne donnais pas d’eau ╵à un homme épuisé
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et, à qui avait faim, ╵tu refusais le pain.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tu livrais le pays ╵à l’homme fort
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et tu y installais ╵qui tu voulais favoriser
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '22.8 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Autre traduction : '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: Tu te prenais pour l’homme fort à qui appartient le pays, et pour un habitant privilégié.
      marker-yv: yv-n
    - type: text
      text: .
  '9':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tu renvoyais les veuves ╵sans rien leur accorder
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et tu brisais la force ╵des orphelins.
