document_id: JOB.22,21
type_code: fra
verses:
  '1':
  - type: heading
    content: Troisième discours d’Éliphaz
  - type: heading
    content: Eliphaz accuse Job de divers crimes
  - type: text
    content: 'Eliphaz de Témân prit la parole et dit :'
  '10':
  - type: text
    content: Voilà pourquoi des pièges ╵sont tendus tout autour de toi,
  - type: text
    content: voilà pourquoi soudain ╵des frayeurs t’épouvantent.
  '11':
  - type: text
    content: Ne vois-tu donc pas ces ténèbres,
  - type: text
    content: toute cette eau qui te submerge ?
  '12':
  - type: text
    content: Dieu n’habite-t-il pas ╵tout là-haut dans le ciel ?
  - type: text
    content: Vois la voûte étoilée, ╵comme elle est élevée !
  '13':
  - type: text
    content: 'Mais toi, tu dis : ╵« Dieu, que peut-il savoir ?'
  - type: text
    content: Peut-il exercer la justice ╵à travers les nuées ?
  '14':
  - type: text
    content: Les nuages le cachent ╵et il ne peut pas voir,
  - type: text
    content: tandis qu’il se promène ╵sur le pourtour du ciel. »
  '15':
  - type: text
    content: Tiens-tu donc à rester ╵sur cet ancien sentier,
  - type: text
    content: suivi depuis toujours ╵par ceux qui font le mal ?
  '16':
  - type: text
    content: Qui, prématurément, ╵sont retranchés
  - type: text
    content: et dont les fondements ╵sont comme un fleuve qui s’écoule ?
  '17':
  - type: text
    content: 'Eux qui disaient à Dieu : ╵« Eloigne-toi de nous ! »'
  - type: text
    content: 'et : « Que pourrait nous faire ╵le Tout-Puissant'
  - type: note
    content: 'D’après l’ancienne version grecque et la version syriaque ; le texte hébreu traditionnel a : lui faire.'
  - type: text
    content: '  ? »'
  '18':
  - type: text
    content: Et, pourtant, il comblait ╵leurs maisons de bien-être.
  - type: text
    content: Mais loin de moi ╵l’idée de suivre leurs conseils
  - type: note
    content: 'Eliphaz reprend l’affirmation de Job (21.16). Au lieu de : mais moi, j’écarte leurs conseils, l’ancienne version grecque a : mais ils l’ont tenu en dehors de leurs projets.'
  - type: text
    content: .
  '19':
  - type: text
    content: Car les justes verront leur ruine ╵et ils se réjouiront,
  - type: text
    content: 'ceux qui sont innocents ╵les railleront, disant :'
  '2':
  - type: text
    content: Dieu aurait-il besoin ╵des services d’un homme ?
  - type: text
    content: Le sage n’est utile qu’à lui-même !
  '20':
  - type: text
    content: '« Voilà nos adversaires : ╵ils sont anéantis'
  - type: text
    content: et ce qui restait d’eux ╵le feu l’a dévoré. »
  '21':
  - type: text
    content: Accorde-toi donc avec lui, ╵fais la paix avec lui.
  - type: text
    content: Ainsi tu connaîtras ╵de nouveau le bonheur.
  '22':
  - type: text
    content: Accepte l’instruction ╵émanant de sa bouche,
  - type: text
    content: prends à cœur ses paroles.
  '23':
  - type: text
    content: Si tu reviens ╵au Tout-Puissant ╵tu seras rétabli,
  - type: text
    content: tu feras disparaître ╵l’iniquité de ta demeure.
  '24':
  - type: text
    content: Si tu jettes l’or pur ╵dans la poussière
  - type: text
    content: et l’or d’Ophir
  - type: note
    content: C’est-à-dire l’or le plus fin et le plus cher (voir 1 R 9.28 ; 10.11 ; Ps 45.10 ; Es 13.12).
  - type: text
    content: ' ╵aux cailloux du torrent,'
  '25':
  - type: text
    content: alors le Tout-Puissant ╵sera pour toi de l’or,
  - type: text
    content: et des monceaux d’argent,
  '26':
  - type: text
    content: car alors tu feras ╵tes délices du Tout-Puissant,
  - type: text
    content: tu lèveras ╵le visage vers Dieu.
  '27':
  - type: text
    content: Oui, tu l’imploreras, ╵et il t’exaucera,
  - type: text
    content: et tu t’acquitteras ╵des vœux que tu as faits
  - type: note
    content: On accompagnait souvent ses prières de vœux.
  - type: text
    content: .
  '28':
  - type: text
    content: Aux décisions que tu prendras ╵répondra le succès,
  - type: text
    content: et, sur tous tes chemins, ╵brillera la lumière.
  '29':
  - type: text
    content: Et si quelqu’un est abattu, ╵tu le relèveras,
  - type: text
    content: car Dieu vient au secours ╵de qui baisse les yeux.
  '3':
  - type: text
    content: Importe-t-il au Tout-Puissant ╵que tu sois juste ou non ?
  - type: text
    content: Quel intérêt a-t-il ╵à te voir vivre ╵d’une façon intègre ?
  '30':
  - type: text
    content: Il délivrera même ╵celui qui est coupable.
  - type: text
    content: C’est grâce à tes mains pures ╵que cet homme sera sauvé.
  '4':
  - type: text
    content: Est-ce parce que tu le crains ╵qu’il te fait des reproches,
  - type: text
    content: et qu’il entre en jugement avec toi
  - type: note
    content: 'Autre traduction : Crois-tu que par crainte de toi il va te présenter sa défense et aller en justice avec toi ?'
  - type: text
    content: '  ?'
  '5':
  - type: text
    content: Ne t’es-tu pas rendu coupable ╵de nombreux torts ?
  - type: text
    content: Oui, tes péchés sont innombrables.
  '6':
  - type: text
    content: Tu prenais sans raison ╵des gages de tes frères,
  - type: text
    content: et, de leurs vêtements, ╵tu dépouillais les gens ╵jusqu’à les laisser nus
  - type: note
    content: Voir Ex 22.25-26 ; Dt 24.6, 12-13.
  - type: text
    content: .
  '7':
  - type: text
    content: Tu ne donnais pas d’eau ╵à un homme épuisé
  - type: text
    content: et, à qui avait faim, ╵tu refusais le pain.
  '8':
  - type: text
    content: Tu livrais le pays ╵à l’homme fort
  - type: text
    content: et tu y installais ╵qui tu voulais favoriser
  - type: note
    content: 'Autre traduction : Tu te prenais pour l’homme fort à qui appartient le pays, et pour un habitant privilégié.'
  - type: text
    content: .
  '9':
  - type: text
    content: Tu renvoyais les veuves ╵sans rien leur accorder
  - type: text
    content: et tu brisais la force ╵des orphelins.
