document_id: 2KI.13
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Le règne de Yoahaz sur Israël
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: La vingt-troisième année du règne de Joas, fils d’Ahazia, roi de Juda, Yoahaz, fils de Jéhu, devint roi d’Israël à Samarie. Il régna dix-sept ans
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '13.1 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: De 814 à 798 av. J.-C.
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Il fit ce que l’Eternel considère comme mal et adopta la conduite coupable de Jéroboam, fils de Nebath, qui avait entraîné Israël dans le péché
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '13.2 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Cf. 1 R 12.25-33 ; 13.33-34 ; 14.16.
    marker-yv: yv-n
  - type: text
    text: '. Il ne se détourna pas de cette mauvaise voie. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Alors l’Eternel se mit en colère contre Israël. Il livra ses habitants pendant toute cette période au pouvoir de Hazaël, roi de Syrie, et de Ben-Hadad, fils de Hazaël
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '13.3 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Voir 8.7-15 ; 10.32 ; 1 R 19.15. Le règne de Ben-Hadad (v. 24) a commencé en 806 ou en 796 av. J.-C.
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Mais Yoahaz supplia l’Eternel d’apaiser sa colère. L’Eternel l’exauça, car il avait vu comment le roi de Syrie opprimait Israël. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Il envoya aux Israélites un libérateur pour les délivrer des Syriens
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '13.5 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Le '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'libérateur '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'a été soit le roi assyrien Adadnirari III (810 à 783 av. J.-C.) – qui a attaqué les Syriens de Damas en 806 et 804, ce qui a permis aux Israélites de se soustraire à l’emprise syrienne (v. 25 ; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '14.25'
        metadata:
          usfm: 2KI.14.25
      - type: text
        text: ) – soit Joas, fils de Yoahaz (v. 17, 19, 25), soit encore Jéroboam II qui a étendu les frontières israélites vers le nord (
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '14.25'
        metadata:
          usfm: 2KI.14.25
      - type: text
        text: ', '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '28'
        metadata:
          usfm: 2KI.14.28
      - type: text
        text: ) en tirant profit de la faiblesse des Syriens battus par les Assyriens.
    marker-yv: yv-n
  - type: text
    text: '. Dès lors, ils purent de nouveau vivre tranquilles chez eux comme autrefois. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Mais ils ne se détournèrent pas pour autant des péchés dans lesquels la maison de Jéroboam les avait entraînés. Ils persistèrent dans cette voie ; le pieu sacré d’Ashéra était même dressé à Samarie
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '13.6 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Dressé par Achab (
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1 R 16.33
        metadata:
          usfm: 1KI.16.33
      - type: text
        text: ) ; soit il a été épargné par Jéhu (
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 10.27-28
        metadata:
          usfm: 2KI.10.27+2KI.10.28
      - type: text
        text: ), soit il a été réédifié sous Yoahaz.
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: De toute l’armée du roi, il ne restait à Yoahaz que cinquante hommes d’équipage de chars, dix chars et dix « milliers » de fantassins, car le roi de Syrie avait détruit le reste et l’avait réduit à l’état de poussière que l’on piétine
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '13.7 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Voir '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '10.32'
        metadata:
          usfm: 2KI.10.32
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Les autres faits et gestes de Yoahaz, toutes ses réalisations et sa vaillance sont cités dans le livre des Annales des rois d’Israël. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Yoahaz rejoignit ses ancêtres décédés et fut enterré à Samarie. Son fils Joas lui succéda sur le trône.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Le règne de Joas sur Israël
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: La trente-septième année du règne de Joas, roi de Juda, Joas, fils de Yoahaz, devint roi d’Israël à Samarie. Il régna seize ans
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '13.10 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: De 798 à 782 av. J.-C.
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Il fit ce que l’Eternel considère comme mal ; il n’abandonna pas les péchés dans lesquels Jéroboam, fils de Nebath, avait entraîné Israël, il persista dans cette voie. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Les autres faits et gestes de Joas, toutes ses réalisations, la vaillance dont il a fait preuve dans la guerre contre Amatsia, roi de Juda
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '13.12 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Voir 14.8-14 ; 2 Ch 25.17-24.
    marker-yv: yv-n
  - type: text
    text: ', sont cités dans le livre des Annales des rois d’Israël. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Joas rejoignit ses ancêtres décédés et fut enterré à Samarie avec les rois d’Israël, et Jéroboam son fils accéda à son trône.
- type: usfm
  marker: s1
  children:
  - type: text
    text: La fin de l’histoire d’Elisée
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Elisée était atteint de la maladie dont il mourut, quand Joas, le roi d’Israël, lui rendit visite. Il se pencha sur son visage et pleura en répétant : Mon père ! Mon père ! Mon père ! Toi qui es comme les chars d’Israël et ses équipages'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '13.14 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Voir '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '2.12'
        metadata:
          usfm: 2KI.2.12
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: '  !'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Elisée lui dit : Prends un arc et des flèches !'
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Joas se les fit apporter. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Puis Elisée lui ordonna : Tends l’arc !'
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Quand il l’eut tendu, Elisée posa ses mains sur celles du roi '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'et dit : Ouvre la fenêtre du côté de l’est !'
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Joas l’ouvrit. Puis Elisée commanda : Tire !'
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Il tira. Elisée s’écria : C’est la flèche de la victoire de l’Eternel, la flèche de la victoire contre les Syriens. Oui, tu battras les Syriens à Apheq'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '13.17 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Les Syriens dominaient la Transjordanie (
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 10.32-33
        metadata:
          usfm: 2KI.10.32+2KI.10.33
      - type: text
        text: ).
    marker-yv: yv-n
  - type: text
    text: ' jusqu’à leur extermination. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Elisée ajouta : Prends maintenant d’autres flèches !'
- type: usfm
  marker: p
  children:
  - type: text
    text: Il les prit.
- type: usfm
  marker: p
  children:
  - type: text
    text: – Frappe contre le sol !
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Le roi d’Israël frappa trois coups et s’arrêta. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'L’homme de Dieu se mit en colère contre lui et lui déclara : Il fallait frapper cinq ou six coups, alors tu aurais vaincu les Syriens jusqu’à leur extermination, tandis qu’à présent tu ne les battras que trois fois.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Elisée mourut et fut enterré. L’année suivante, des bandes de pillards moabites
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '13.20 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Les Moabites demeuraient à l’est de la mer Morte.
    marker-yv: yv-n
  - type: text
    text: ' firent une incursion dans le pays. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: On était en train d’enterrer un mort quand, tout à coup, on vit venir une de ces bandes. Alors on jeta le corps en hâte dans la tombe d’Elisée. Au contact des ossements du prophète, le mort reprit vie et se dressa sur ses pieds.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Pendant tout le règne de Yoahaz, Hazaël, roi de Syrie, avait opprimé les Israélites. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Mais l’Eternel leur témoigna sa grâce : il eut de la compassion pour eux et leur vint en aide à cause de son alliance avec Abraham, Isaac et Jacob'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '13.23 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Cf. Ex 2.24 ; 3.6 ; Lv 26.42 ; Dt 1.8 ; 6.10 ; 9.5, 27 ; 29.12 ; 34.4 ; 1 R 18.36.
    marker-yv: yv-n
  - type: text
    text: . A cette époque, il ne voulut pas les détruire et il ne voulut pas encore les exiler loin de sa présence.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Hazaël, roi de Syrie, mourut et son fils Ben-Hadad lui succéda sur le trône. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: Alors Joas, fils de Yoahaz, reprit à Ben-Hadad, fils de Hazaël, les villes enlevées par ce dernier à son père Yoahaz à la suite des guerres
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '13.25 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Il s’agit sans doute de villes à l’ouest du Jourdain puisque celles qui étaient situées à l’est, et qui avaient été perdues au temps de Jéhu (
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 10.32-33
        metadata:
          usfm: 2KI.10.32+2KI.10.33
      - type: text
        text: ), ne furent récupérées que par Jéroboam II (
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '14.25'
        metadata:
          usfm: 2KI.14.25
      - type: text
        text: ).
    marker-yv: yv-n
  - type: text
    text: . Joas le battit à trois reprises et reconquit les villes d’Israël.
