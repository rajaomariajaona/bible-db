document_id: 2KI.13,21
type_code: fra
verses:
  '1':
  - type: heading
    content: Le règne de Yoahaz sur Israël
  - type: text
    content: La vingt-troisième année du règne de Joas, fils d’Ahazia, roi de Juda, Yoahaz, fils de Jéhu, devint roi d’Israël à Samarie. Il régna dix-sept ans
  - type: note
    content: De 814 à 798 av. J.-C.
  - type: text
    content: '. '
  '10':
  - type: text
    content: La trente-septième année du règne de Joas, roi de Juda, Joas, fils de Yoahaz, devint roi d’Israël à Samarie. Il régna seize ans
  - type: note
    content: De 798 à 782 av. J.-C.
  - type: text
    content: '. '
  '11':
  - type: text
    content: 'Il fit ce que l’Eternel considère comme mal ; il n’abandonna pas les péchés dans lesquels Jéroboam, fils de Nebath, avait entraîné Israël, il persista dans cette voie. '
  '12':
  - type: text
    content: Les autres faits et gestes de Joas, toutes ses réalisations, la vaillance dont il a fait preuve dans la guerre contre Amatsia, roi de Juda
  - type: note
    content: Voir 14.8-14 ; 2 Ch 25.17-24.
  - type: text
    content: ', sont cités dans le livre des Annales des rois d’Israël. '
  '13':
  - type: text
    content: Joas rejoignit ses ancêtres décédés et fut enterré à Samarie avec les rois d’Israël, et Jéroboam son fils accéda à son trône.
  - type: heading
    content: La fin de l’histoire d’Elisée
  '14':
  - type: text
    content: 'Elisée était atteint de la maladie dont il mourut, quand Joas, le roi d’Israël, lui rendit visite. Il se pencha sur son visage et pleura en répétant : Mon père ! Mon père ! Mon père ! Toi qui es comme les chars d’Israël et ses équipages'
  - type: note
    content: Voir 2.12.
  - type: text
    content: '  !'
  '15':
  - type: text
    content: 'Elisée lui dit : Prends un arc et des flèches !'
  - type: text
    content: 'Joas se les fit apporter. '
  '16':
  - type: text
    content: 'Puis Elisée lui ordonna : Tends l’arc !'
  - type: text
    content: 'Quand il l’eut tendu, Elisée posa ses mains sur celles du roi '
  '17':
  - type: text
    content: 'et dit : Ouvre la fenêtre du côté de l’est !'
  - type: text
    content: 'Joas l’ouvrit. Puis Elisée commanda : Tire !'
  - type: text
    content: 'Il tira. Elisée s’écria : C’est la flèche de la victoire de l’Eternel, la flèche de la victoire contre les Syriens. Oui, tu battras les Syriens à Apheq'
  - type: note
    content: Les Syriens dominaient la Transjordanie (10.32-33).
  - type: text
    content: ' jusqu’à leur extermination. '
  '18':
  - type: text
    content: 'Elisée ajouta : Prends maintenant d’autres flèches !'
  - type: text
    content: Il les prit.
  - type: text
    content: – Frappe contre le sol !
  - type: text
    content: 'Le roi d’Israël frappa trois coups et s’arrêta. '
  '19':
  - type: text
    content: 'L’homme de Dieu se mit en colère contre lui et lui déclara : Il fallait frapper cinq ou six coups, alors tu aurais vaincu les Syriens jusqu’à leur extermination, tandis qu’à présent tu ne les battras que trois fois.'
  '2':
  - type: text
    content: Il fit ce que l’Eternel considère comme mal et adopta la conduite coupable de Jéroboam, fils de Nebath, qui avait entraîné Israël dans le péché
  - type: note
    content: Cf. 1 R 12.25-33 ; 13.33-34 ; 14.16.
  - type: text
    content: '. Il ne se détourna pas de cette mauvaise voie. '
  '20':
  - type: text
    content: Elisée mourut et fut enterré. L’année suivante, des bandes de pillards moabites
  - type: note
    content: Les Moabites demeuraient à l’est de la mer Morte.
  - type: text
    content: ' firent une incursion dans le pays. '
  '21':
  - type: text
    content: On était en train d’enterrer un mort quand, tout à coup, on vit venir une de ces bandes. Alors on jeta le corps en hâte dans la tombe d’Elisée. Au contact des ossements du prophète, le mort reprit vie et se dressa sur ses pieds.
  '22':
  - type: text
    content: 'Pendant tout le règne de Yoahaz, Hazaël, roi de Syrie, avait opprimé les Israélites. '
  '23':
  - type: text
    content: 'Mais l’Eternel leur témoigna sa grâce : il eut de la compassion pour eux et leur vint en aide à cause de son alliance avec Abraham, Isaac et Jacob'
  - type: note
    content: Cf. Ex 2.24 ; 3.6 ; Lv 26.42 ; Dt 1.8 ; 6.10 ; 9.5, 27 ; 29.12 ; 34.4 ; 1 R 18.36.
  - type: text
    content: . A cette époque, il ne voulut pas les détruire et il ne voulut pas encore les exiler loin de sa présence.
  '24':
  - type: text
    content: 'Hazaël, roi de Syrie, mourut et son fils Ben-Hadad lui succéda sur le trône. '
  '25':
  - type: text
    content: Alors Joas, fils de Yoahaz, reprit à Ben-Hadad, fils de Hazaël, les villes enlevées par ce dernier à son père Yoahaz à la suite des guerres
  - type: note
    content: Il s’agit sans doute de villes à l’ouest du Jourdain puisque celles qui étaient situées à l’est, et qui avaient été perdues au temps de Jéhu (10.32-33), ne furent récupérées que par Jéroboam II (14.25).
  - type: text
    content: . Joas le battit à trois reprises et reconquit les villes d’Israël.
  '3':
  - type: text
    content: Alors l’Eternel se mit en colère contre Israël. Il livra ses habitants pendant toute cette période au pouvoir de Hazaël, roi de Syrie, et de Ben-Hadad, fils de Hazaël
  - type: note
    content: Voir 8.7-15 ; 10.32 ; 1 R 19.15. Le règne de Ben-Hadad (v. 24) a commencé en 806 ou en 796 av. J.-C.
  - type: text
    content: '. '
  '4':
  - type: text
    content: 'Mais Yoahaz supplia l’Eternel d’apaiser sa colère. L’Eternel l’exauça, car il avait vu comment le roi de Syrie opprimait Israël. '
  '5':
  - type: text
    content: Il envoya aux Israélites un libérateur pour les délivrer des Syriens
  - type: note
    content: Le libérateur a été soit le roi assyrien Adadnirari III (810 à 783 av. J.-C.) – qui a attaqué les Syriens de Damas en 806 et 804, ce qui a permis aux Israélites de se soustraire à l’emprise syrienne (v. 25 ; 14.25) – soit Joas, fils de Yoahaz (v. 17, 19, 25), soit encore Jéroboam II qui a étendu les frontières israélites vers le nord (14.25, 28) en tirant profit de la faiblesse des Syriens battus par les Assyriens.
  - type: text
    content: '. Dès lors, ils purent de nouveau vivre tranquilles chez eux comme autrefois. '
  '6':
  - type: text
    content: Mais ils ne se détournèrent pas pour autant des péchés dans lesquels la maison de Jéroboam les avait entraînés. Ils persistèrent dans cette voie ; le pieu sacré d’Ashéra était même dressé à Samarie
  - type: note
    content: Dressé par Achab (1 R 16.33) ; soit il a été épargné par Jéhu (10.27-28), soit il a été réédifié sous Yoahaz.
  - type: text
    content: '. '
  '7':
  - type: text
    content: De toute l’armée du roi, il ne restait à Yoahaz que cinquante hommes d’équipage de chars, dix chars et dix « milliers » de fantassins, car le roi de Syrie avait détruit le reste et l’avait réduit à l’état de poussière que l’on piétine
  - type: note
    content: Voir 10.32.
  - type: text
    content: .
  '8':
  - type: text
    content: 'Les autres faits et gestes de Yoahaz, toutes ses réalisations et sa vaillance sont cités dans le livre des Annales des rois d’Israël. '
  '9':
  - type: text
    content: Yoahaz rejoignit ses ancêtres décédés et fut enterré à Samarie. Son fils Joas lui succéda sur le trône.
  - type: heading
    content: Le règne de Joas sur Israël
