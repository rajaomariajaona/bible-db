document_id: 1PE.5,21
type_code: fra
verses:
  '1':
  - type: heading
    content: Recommandations aux responsables dans l’Eglise et aux croyants
  - type: text
    content: 'C’est pour cela que j’adresse quelques recommandations à ceux parmi vous qui sont responsables de l’Eglise. Je leur parle en tant que responsable comme eux et témoin des souffrances de Christ, moi qui ai aussi part à la gloire qui va être révélée. '
  '10':
  - type: text
    content: Mais quand vous aurez souffert un peu de temps, Dieu, l’auteur de toute grâce, qui vous a appelés à connaître sa gloire éternelle dans l’union à Jésus-Christ, vous rétablira lui-même ; il vous affermira, vous fortifiera et vous rendra inébranlables.
  '11':
  - type: text
    content: A lui appartient la puissance pour toujours. Amen !
  - type: heading
    content: Salutations
  '12':
  - type: text
    content: Je vous ai écrit assez brièvement par la main de Silvain, ce frère fidèle, pour vous encourager et vous assurer que c’est bien à la véritable grâce de Dieu que vous êtes attachés.
  '13':
  - type: text
    content: Recevez les salutations de l’Eglise qui est à Babylone
  - type: note
    content: 'Plusieurs identifications de cette Babylone ont été proposées : l’ancienne capitale du royaume babylonien, une Babylone égyptienne (devenue le Vieux-Caire) qui abritait une importante colonie juive, et plus souvent, comme le fera l’Apocalypse, Rome. Cette désignation du lieu de séjour de l’Eglise souligne que le peuple de Dieu vit en exil parmi les païens, de même que les Juifs l’ont été après leur déportation à Babylone au vie siècle av. J.-C.'
  - type: text
    content: ' et que Dieu a choisie. Mon fils Marc'
  - type: note
    content: 'Jean-Marc, neveu de Barnabas, auteur de l’Evangile selon Marc (voir Ac 12.12, 25 ; 13.13 ; 15.37-39 ; Col 4.10 ; Phm 24). Le mot fils indique des liens très forts entre les deux hommes : Marc devait être un disciple de Pierre et peut-être un proche collaborateur. Cela peut aussi indiquer qu’il avait été amené à la foi par Pierre (comparer 1 Tm 1.2 ; Tt 1.4).'
  - type: text
    content: ' vous envoie aussi ses salutations.'
  '14':
  - type: text
    content: Donnez-vous, les uns aux autres, le baiser fraternel. Paix à vous tous qui êtes unis à Christ.
  '2':
  - type: text
    content: 'Prenez soin du troupeau de Dieu qui vous a été confié. Faites-le, non comme si vous y étiez contraints, mais par dévouement, comme Dieu le désire ; non pas pour de honteuses raisons financières, mais de plein gré ; '
  '3':
  - type: text
    content: 'et n’exercez pas un pouvoir autoritaire sur ceux qui ont été confiés à vos soins, mais soyez les modèles du troupeau. '
  '4':
  - type: text
    content: Alors, quand le Berger en chef paraîtra, vous recevrez la couronne de gloire qui ne perdra jamais sa beauté.
  '5':
  - type: text
    content: 'Vous de même, jeunes gens, soumettez-vous aux responsables de l’Eglise. Et vous tous, dans vos relations mutuelles, revêtez-vous d’humilité, car l’Ecriture déclare : '
  - type: text
    content: Dieu s’oppose aux orgueilleux, mais il accorde sa grâce aux humbles
  - type: note
    content: Pr 3.34 cité selon l’ancienne version grecque.
  - type: text
    content: .
  - type: text
    content: ' '
  '6':
  - type: text
    content: 'Tenez-vous donc humblement sous la main puissante de Dieu, pour qu’il vous élève au moment fixé par lui '
  '7':
  - type: text
    content: et déchargez-vous sur lui de tous vos soucis, car il prend soin de vous.
  - type: heading
    content: Encouragements
  '8':
  - type: text
    content: 'Faites preuve de modération et soyez vigilants. Votre adversaire, le diable, rôde autour de vous comme un lion rugissant, qui cherche quelqu’un à dévorer. '
  '9':
  - type: text
    content: 'Résistez-lui en demeurant fermes dans votre foi, car vous savez que vos frères et sœurs dispersés à travers le monde connaissent les mêmes souffrances. '
