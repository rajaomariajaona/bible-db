document_id: JDG.16,21
type_code: fra
verses:
  '1':
  - type: heading
    content: Samson à Gaza
  - type: text
    content: Samson se rendit à Gaza
  - type: note
    content: Important port de maritime, situé dans le sud de la Philistie.
  - type: text
    content: '. Il y vit une prostituée et entra chez elle. '
  '10':
  - type: text
    content: 'Dalila dit à Samson : Voici : tu t’es moqué de moi, tu m’as raconté des mensonges. Maintenant, dis-moi donc, je te prie, avec quoi l’on pourrait te lier.'
  '11':
  - type: text
    content: 'Il lui répondit : Si on m’attache fortement avec des cordes neuves qui n’ont jamais servi, je perdrai ma force et deviendrai comme n’importe quel autre homme.'
  '12':
  - type: text
    content: 'Alors Dalila prit des cordes neuves dont elle le ligota. Puis elle s’écria : Samson ! Les Philistins t’attaquent !'
  - type: text
    content: Des hommes se tenaient de nouveau cachés dans la chambre. Mais il rompit les cordes comme un fil et les fit tomber de ses bras.
  '13':
  - type: text
    content: 'Dalila dit à Samson : Jusqu’à présent, tu t’es moqué de moi et tu ne m’as raconté que des mensonges. Dis-moi enfin avec quoi il faudrait te lier.'
  - type: text
    content: 'Il lui répondit : Si tu tisses les sept tresses de ma tête dans la chaîne d’un métier à tisser et que tu les fixes au moyen d’une cheville, je perdrai ma force et je deviendrai comme n’importe quel autre homme'
  - type: note
    content: Les v. 13 et 14 sont traduits d’après l’ancienne version grecque. Le texte hébreu traditionnel est plus court ; il semble qu’une partie se soit perdue.
  - type: text
    content: .
  '14':
  - type: text
    content: 'Alors elle l’endormit, tissa les sept tresses de sa chevelure sur la chaîne du métier à tisser et les fixa avec la cheville. Puis elle s’écria : Samson ! Les Philistins t’attaquent !'
  - type: text
    content: 'Il se réveilla de son sommeil et arracha la cheville du métier avec la chaîne. '
  '15':
  - type: text
    content: 'Alors elle lui dit : Comment peux-tu prétendre que tu m’aimes alors que tu ne me fais pas confiance ! Voilà trois fois que tu t’es moqué de moi et que tu as refusé de m’indiquer d’où venait ta force extraordinaire.'
  '16':
  - type: text
    content: 'Tous les jours, elle le harcelait par ses paroles et le poussait à bout par ses instances. Excédé à en mourir, '
  '17':
  - type: text
    content: il finit par lui révéler son secret.
  - type: text
    content: – Jamais encore, lui dit-il, mes cheveux et ma barbe n’ont été coupés, car j’ai été consacré à Dieu dès le sein maternel. Si l’on me rasait la tête, ma force m’abandonnerait et je deviendrais comme n’importe quel autre homme.
  '18':
  - type: text
    content: 'Dalila comprit qu’il lui avait révélé son secret. Elle fit prévenir les princes des Philistins en leur disant : Venez, car cette fois-ci, il m’a dit son secret.'
  - type: text
    content: 'Ils se rendirent chez elle avec l’argent promis. '
  '19':
  - type: text
    content: Elle endormit Samson sur ses genoux, puis appela un homme pour lui couper les sept tresses de sa tête. Ainsi elle commença à le maîtriser, car il perdit sa force
  - type: note
    content: 'Le texte hébreu traditionnel a : et elle coupa, mais les versions anciennes ont : qui coupa.'
  - type: text
    content: '. '
  '2':
  - type: text
    content: 'La nouvelle se répandit parmi les gens de Gaza qu’il se trouvait dans la ville. Pendant toute la nuit, ils gardèrent les issues et firent le guet à la porte de la ville. Cependant, ils se tinrent tranquilles pendant la nuit, se proposant de le tuer au point du jour. '
  '20':
  - type: text
    content: 'Puis elle cria : Samson ! Les Philistins t’attaquent !'
  - type: text
    content: 'Il se réveilla de son sommeil et se dit : Je m’en tirerai comme les autres fois et je me dégagerai !'
  - type: text
    content: 'Mais il ne savait pas que l’Eternel s’était détourné de lui. '
  '21':
  - type: text
    content: Les Philistins se saisirent de lui et lui crevèrent les yeux
  - type: note
    content: Traitement souvent infligé aux prisonniers de guerre (1 S 11.2 ; 2 R 25.7).
  - type: text
    content: ', puis ils l’emmenèrent à Gaza, le ligotèrent avec une double chaîne de bronze, et lui firent tourner la meule à grain dans la prison.'
  - type: heading
    content: L’ultime vengeance de Samson
  '22':
  - type: text
    content: 'Après avoir été rasés, ses cheveux commencèrent à repousser. '
  '23':
  - type: text
    content: Les princes des Philistins s’assemblèrent pour offrir un sacrifice important à Dagôn
  - type: note
    content: Divinité principale des Philistins. Son nom, en hébreu, signifie grain. Dagôn devait donc être un dieu de la végétation. Par la suite, à cause de l’assonance avec le terme hébreu dag, « poisson », Dagôn a été représenté par une statue mi-homme, mi-poisson.
  - type: text
    content: ' leur dieu et pour se livrer aux réjouissances. Ils disaient :'
  - type: text
    content: 'C’est notre Dieu ╵qui a livré ╵entre nos mains ╵notre ennemi : Samson.'
  '24':
  - type: text
    content: 'Quand le peuple le vit, il loua son dieu en disant :'
  - type: text
    content: C’est notre Dieu ╵qui a livré ╵entre nos mains ╵notre ennemi
  - type: text
    content: qui ravageait ╵notre pays
  - type: text
    content: et qui a fait ╵tant de victimes parmi nous.
  '25':
  - type: text
    content: 'Comme ils étaient en joie, ils s’écrièrent : Appelez Samson, qu’il nous divertisse !'
  - type: text
    content: 'Ils firent sortir Samson de la prison et il dut se livrer à des pitreries devant eux, puis ils le placèrent entre les colonnes du bâtiment. '
  '26':
  - type: text
    content: 'Alors Samson demanda au jeune homme qui le conduisait par la main : Guide-moi ! Fais-moi toucher les colonnes qui soutiennent l’édifice pour que je puisse m’y appuyer.'
  '27':
  - type: text
    content: 'Or, le bâtiment était rempli d’hommes et de femmes ; tous les princes des Philistins s’y trouvaient et, sur la terrasse, il y avait trois mille personnes environ, hommes et femmes, qui regardaient Samson les amuser. '
  '28':
  - type: text
    content: 'Samson pria l’Eternel et dit : Seigneur Eternel ! Je te prie, interviens en ma faveur ! Rends-moi ma force, une dernière fois, ô Dieu, pour que je me venge en une fois des Philistins pour la perte de mes deux yeux !'
  '29':
  - type: text
    content: 'Il toucha les deux colonnes centrales qui soutenaient l’édifice et s’arc-bouta contre elles, de la main droite contre l’une et de la main gauche contre l’autre. '
  '3':
  - type: text
    content: Mais Samson resta couché jusqu’au milieu de la nuit seulement ; à minuit, il se leva. Arrivé à la porte de la ville, il empoigna les deux battants avec les deux montants et les arracha avec la traverse, puis il chargea le tout sur ses épaules et le transporta jusqu’au sommet de la colline en face d’Hébron
  - type: note
    content: 'Ou : en direction d’Hébron. Dans ce cas, il s’agirait d’une hauteur située à une demi-heure à l’est de Gaza. Hébron était à 70 kilomètres de Gaza.'
  - type: text
    content: .
  - type: heading
    content: Samson trahi par Dalila
  '30':
  - type: text
    content: 'Puis il dit : Que je meure avec les Philistins !'
  - type: text
    content: 'Puis il poussa de toutes ses forces, et le bâtiment s’écroula sur les princes et sur toute la foule qui s’y trouvait. Ainsi il fit périr plus de monde par sa mort que de son vivant. '
  '31':
  - type: text
    content: Ses frères et tous les siens descendirent pour emporter son corps et pour l’ensevelir entre Tsorea et Eshtaol dans le tombeau de Manoah, son père. Il avait été chef en Israël pendant vingt ans.
  '4':
  - type: text
    content: Plus tard, Samson tomba amoureux d’une femme nommée Dalila qui habitait dans la vallée de Soreq
  - type: note
    content: Petite vallée proche du lieu de naissance de Samson.
  - type: text
    content: '. '
  '5':
  - type: text
    content: Les princes des Philistins
  - type: note
    content: La Philistie était une confédération de cinq villes gouvernées par cinq princes.
  - type: text
    content: ' vinrent la trouver et lui dirent : Enjôle-le, et tâche de découvrir d’où lui vient sa force extraordinaire et comment nous pourrions réussir à le ligoter pour le maîtriser. Chacun de nous te donnera onze cents pièces d’argent'
  - type: note
    content: Il s’agit de sicles d’argent. Somme considérable (82,5 kg d’argent) équivalente au prix de 275 esclaves (d’après le prix offert pour Joseph quelques siècles auparavant).
  - type: text
    content: .
  '6':
  - type: text
    content: 'Dalila demanda à Samson : Dis-moi, je te prie, d’où te vient ta grande force et avec quoi il faudrait te lier pour te maîtriser.'
  '7':
  - type: text
    content: 'Samson lui répondit : Si on me lie avec sept cordes fraîches qui n’ont pas encore séché, je perdrai ma force et je deviendrai comme n’importe quel autre homme.'
  '8':
  - type: text
    content: 'Les princes des Philistins procurèrent à Dalila sept cordes fraîches qui n’étaient pas encore sèches, et elle ligota Samson avec ces cordes, '
  '9':
  - type: text
    content: 'tandis que des hommes se tenaient cachés chez elle, dans la chambre. Tout à coup, elle s’écria : Samson ! Les Philistins t’attaquent !'
  - type: text
    content: Il rompit les cordes comme se rompt une mèche d’étoupe quand elle a pris feu. Ainsi on ne découvrit pas le secret de sa force.
