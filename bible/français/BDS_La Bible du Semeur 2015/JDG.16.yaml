document_id: JDG.16,21
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Samson à Gaza
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: Samson se rendit à Gaza
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '16.1 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Important port de maritime, situé dans le sud de la Philistie.
      marker-yv: yv-n
    - type: text
      text: '. Il y vit une prostituée et entra chez elle. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dalila dit à Samson : Voici : tu t’es moqué de moi, tu m’as raconté des mensonges. Maintenant, dis-moi donc, je te prie, avec quoi l’on pourrait te lier.'
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Il lui répondit : Si on m’attache fortement avec des cordes neuves qui n’ont jamais servi, je perdrai ma force et deviendrai comme n’importe quel autre homme.'
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Alors Dalila prit des cordes neuves dont elle le ligota. Puis elle s’écria : Samson ! Les Philistins t’attaquent !'
  - type: usfm
    marker: p
    children:
    - type: text
      text: Des hommes se tenaient de nouveau cachés dans la chambre. Mais il rompit les cordes comme un fil et les fit tomber de ses bras.
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dalila dit à Samson : Jusqu’à présent, tu t’es moqué de moi et tu ne m’as raconté que des mensonges. Dis-moi enfin avec quoi il faudrait te lier.'
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Il lui répondit : Si tu tisses les sept tresses de ma tête dans la chaîne d’un métier à tisser et que tu les fixes au moyen d’une cheville, je perdrai ma force et je deviendrai comme n’importe quel autre homme'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '16.13 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Les v. 13 et 14 sont traduits d’après l’ancienne version grecque. Le texte hébreu traditionnel est plus court ; il semble qu’une partie se soit perdue.
      marker-yv: yv-n
    - type: text
      text: .
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Alors elle l’endormit, tissa les sept tresses de sa chevelure sur la chaîne du métier à tisser et les fixa avec la cheville. Puis elle s’écria : Samson ! Les Philistins t’attaquent !'
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Il se réveilla de son sommeil et arracha la cheville du métier avec la chaîne. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Alors elle lui dit : Comment peux-tu prétendre que tu m’aimes alors que tu ne me fais pas confiance ! Voilà trois fois que tu t’es moqué de moi et que tu as refusé de m’indiquer d’où venait ta force extraordinaire.'
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Tous les jours, elle le harcelait par ses paroles et le poussait à bout par ses instances. Excédé à en mourir, '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: il finit par lui révéler son secret.
  - type: usfm
    marker: p
    children:
    - type: text
      text: – Jamais encore, lui dit-il, mes cheveux et ma barbe n’ont été coupés, car j’ai été consacré à Dieu dès le sein maternel. Si l’on me rasait la tête, ma force m’abandonnerait et je deviendrais comme n’importe quel autre homme.
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dalila comprit qu’il lui avait révélé son secret. Elle fit prévenir les princes des Philistins en leur disant : Venez, car cette fois-ci, il m’a dit son secret.'
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ils se rendirent chez elle avec l’argent promis. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Elle endormit Samson sur ses genoux, puis appela un homme pour lui couper les sept tresses de sa tête. Ainsi elle commença à le maîtriser, car il perdit sa force
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '16.19 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Le texte hébreu traditionnel a : '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'et elle coupa, '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'mais les versions anciennes ont : '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: qui coupa.
      marker-yv: yv-n
    - type: text
      text: '. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'La nouvelle se répandit parmi les gens de Gaza qu’il se trouvait dans la ville. Pendant toute la nuit, ils gardèrent les issues et firent le guet à la porte de la ville. Cependant, ils se tinrent tranquilles pendant la nuit, se proposant de le tuer au point du jour. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Puis elle cria : Samson ! Les Philistins t’attaquent !'
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Il se réveilla de son sommeil et se dit : Je m’en tirerai comme les autres fois et je me dégagerai !'
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Mais il ne savait pas que l’Eternel s’était détourné de lui. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Les Philistins se saisirent de lui et lui crevèrent les yeux
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '16.21 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Traitement souvent infligé aux prisonniers de guerre (1 S 11.2 ; 2 R 25.7).
      marker-yv: yv-n
    - type: text
      text: ', puis ils l’emmenèrent à Gaza, le ligotèrent avec une double chaîne de bronze, et lui firent tourner la meule à grain dans la prison.'
  - type: usfm
    marker: s1
    children:
    - type: text
      text: L’ultime vengeance de Samson
    marker-yv: yv-h
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Après avoir été rasés, ses cheveux commencèrent à repousser. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Les princes des Philistins s’assemblèrent pour offrir un sacrifice important à Dagôn
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '16.23 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Divinité principale des Philistins. Son nom, en hébreu, signifie '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'grain. '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Dagôn devait donc être un dieu de la végétation. Par la suite, à cause de l’assonance avec le terme hébreu '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'dag, '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: « poisson », Dagôn a été représenté par une statue mi-homme, mi-poisson.
      marker-yv: yv-n
    - type: text
      text: ' leur dieu et pour se livrer aux réjouissances. Ils disaient :'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'C’est notre Dieu ╵qui a livré ╵entre nos mains ╵notre ennemi : Samson.'
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Quand le peuple le vit, il loua son dieu en disant :'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: C’est notre Dieu ╵qui a livré ╵entre nos mains ╵notre ennemi
  - type: usfm
    marker: q1
    children:
    - type: text
      text: qui ravageait ╵notre pays
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et qui a fait ╵tant de victimes parmi nous.
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Comme ils étaient en joie, ils s’écrièrent : Appelez Samson, qu’il nous divertisse !'
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ils firent sortir Samson de la prison et il dut se livrer à des pitreries devant eux, puis ils le placèrent entre les colonnes du bâtiment. '
  '26':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Alors Samson demanda au jeune homme qui le conduisait par la main : Guide-moi ! Fais-moi toucher les colonnes qui soutiennent l’édifice pour que je puisse m’y appuyer.'
  '27':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Or, le bâtiment était rempli d’hommes et de femmes ; tous les princes des Philistins s’y trouvaient et, sur la terrasse, il y avait trois mille personnes environ, hommes et femmes, qui regardaient Samson les amuser. '
  '28':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Samson pria l’Eternel et dit : Seigneur Eternel ! Je te prie, interviens en ma faveur ! Rends-moi ma force, une dernière fois, ô Dieu, pour que je me venge en une fois des Philistins pour la perte de mes deux yeux !'
  '29':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Il toucha les deux colonnes centrales qui soutenaient l’édifice et s’arc-bouta contre elles, de la main droite contre l’une et de la main gauche contre l’autre. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Mais Samson resta couché jusqu’au milieu de la nuit seulement ; à minuit, il se leva. Arrivé à la porte de la ville, il empoigna les deux battants avec les deux montants et les arracha avec la traverse, puis il chargea le tout sur ses épaules et le transporta jusqu’au sommet de la colline en face d’Hébron
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '16.3 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Ou : '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'en direction d’Hébron. '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Dans ce cas, il s’agirait d’une hauteur située à une demi-heure à l’est de Gaza. Hébron était à 70 kilomètres de Gaza.
      marker-yv: yv-n
    - type: text
      text: .
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Samson trahi par Dalila
    marker-yv: yv-h
  '30':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Puis il dit : Que je meure avec les Philistins !'
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Puis il poussa de toutes ses forces, et le bâtiment s’écroula sur les princes et sur toute la foule qui s’y trouvait. Ainsi il fit périr plus de monde par sa mort que de son vivant. '
  '31':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ses frères et tous les siens descendirent pour emporter son corps et pour l’ensevelir entre Tsorea et Eshtaol dans le tombeau de Manoah, son père. Il avait été chef en Israël pendant vingt ans.
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Plus tard, Samson tomba amoureux d’une femme nommée Dalila qui habitait dans la vallée de Soreq
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '16.4 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Petite vallée proche du lieu de naissance de Samson.
      marker-yv: yv-n
    - type: text
      text: '. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Les princes des Philistins
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '16.5 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: La Philistie était une confédération de cinq villes gouvernées par cinq princes.
      marker-yv: yv-n
    - type: text
      text: ' vinrent la trouver et lui dirent : Enjôle-le, et tâche de découvrir d’où lui vient sa force extraordinaire et comment nous pourrions réussir à le ligoter pour le maîtriser. Chacun de nous te donnera onze cents pièces d’argent'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '16.5 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Il s’agit de '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'sicles '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: d’argent. Somme considérable (82,5 kg d’argent) équivalente au prix de 275 esclaves (d’après le prix offert pour Joseph quelques siècles auparavant).
      marker-yv: yv-n
    - type: text
      text: .
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dalila demanda à Samson : Dis-moi, je te prie, d’où te vient ta grande force et avec quoi il faudrait te lier pour te maîtriser.'
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Samson lui répondit : Si on me lie avec sept cordes fraîches qui n’ont pas encore séché, je perdrai ma force et je deviendrai comme n’importe quel autre homme.'
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Les princes des Philistins procurèrent à Dalila sept cordes fraîches qui n’étaient pas encore sèches, et elle ligota Samson avec ces cordes, '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'tandis que des hommes se tenaient cachés chez elle, dans la chambre. Tout à coup, elle s’écria : Samson ! Les Philistins t’attaquent !'
  - type: usfm
    marker: p
    children:
    - type: text
      text: Il rompit les cordes comme se rompt une mèche d’étoupe quand elle a pris feu. Ainsi on ne découvrit pas le secret de sa force.
