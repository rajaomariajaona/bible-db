document_id: ISA.16,21
type_code: fra
verses:
  '1':
  - type: text
    content: Envoyez des agneaux comme tribut
  - type: note
    content: Tribut envoyé au roi qui règne à Jérusalem, à l’exemple de Mésha, roi de Moab, d’après 2 R 3.4-5.
  - type: text
    content: ' ╵au maître du pays'
  - type: text
    content: depuis Séla par le désert
  - type: text
    content: jusqu’au mont de Sion.
  '10':
  - type: text
    content: La joie et l’allégresse ╵ont disparu dans les vergers,
  - type: text
    content: et, dans les vignes, ╵il n’y a plus de cris de joie, ╵plus de réjouissances,
  - type: text
    content: on ne presse plus le raisin ╵dans le pressoir.
  - type: text
    content: Je fais cesser les cris de joie.
  '11':
  - type: text
    content: C’est pourquoi je frémis, ╵comme vibre une lyre, ╵en pensant à Moab,
  - type: text
    content: mon cœur se serre ╵pour Qir-Harès.
  '12':
  - type: text
    content: On voit le peuple de Moab ╵se donner de la peine ╵sur les hauts lieux,
  - type: text
    content: 'et se rendre à son sanctuaire ╵pour prier ses idoles : ╵mais il n’y pourra rien.'
  '13':
  - type: text
    content: 'Voilà ce qu’a dit l’Eternel depuis longtemps sur Moab. '
  '14':
  - type: text
    content: 'Maintenant l’Eternel déclare : Dans trois années, comptées comme l’on compte l’année d’un mercenaire'
  - type: note
    content: C’est-à-dire jour pour jour (voir 21.16).
  - type: text
    content: ', l’élite de Moab, avec sa multitude, si nombreuse soit-elle, sera humiliée et il n’en survivra qu’un reste insignifiant et sans aucune force.'
  '2':
  - type: text
    content: Comme des oiseaux fugitifs ╵chassés hors de leur nid,
  - type: text
    content: seront les filles de Moab ╵près des gués de l’Arnon
  - type: note
    content: Fleuve principal de Moab qui constituait aussi sa frontière nord.
  - type: text
    content: .
  '3':
  - type: text
    content: « Donne-nous un conseil, ╵supplieront-elles
  - type: note
    content: Les filles de Moab s’adressent à Jérusalem.
  - type: text
    content: ', ╵prends une décision !'
  - type: text
    content: En plein midi, ╵étends sur nous ton ombre ╵comme la nuit.
  - type: text
    content: Cache les expulsés,
  - type: text
    content: ne trahis pas les fugitifs !
  '4':
  - type: text
    content: Que les réfugiés de Moab ╵soient accueillis chez toi
  - type: note
    content: 'Autre traduction : que les réfugiés de Dieu trouvent refuge en Moab.'
  - type: text
    content: '  !'
  - type: text
    content: Sois pour eux un refuge ╵contre le destructeur. »
  - type: text
    content: Car, un jour, l’oppression ╵va prendre fin,
  - type: text
    content: la dévastation cessera,
  - type: text
    content: et l’oppresseur ╵aura disparu du pays.
  '5':
  - type: text
    content: Il régnera un roi ╵sur le royaume de David.
  - type: text
    content: Son trône sera stable ╵car il gouvernera ╵le peuple avec bonté
  - type: text
    content: et avec loyauté.
  - type: text
    content: Il poursuivra le droit
  - type: text
    content: et sera prompt ╵à exécuter la justice.
  '6':
  - type: text
    content: Nous avons appris à quel point ╵Moab est orgueilleux,
  - type: text
    content: oui, nous savons son arrogance, ╵son orgueil et sa présomption,
  - type: text
    content: mais ses discours sont vains.
  '7':
  - type: text
    content: Aussi les Moabites ╵auront lieu de gémir ╵sur le sort de Moab.
  - type: text
    content: Tous se lamenteront ;
  - type: text
    content: gémissez, consternés,
  - type: text
    content: car il n’y aura plus ╵de gâteaux de raisin ╵faits à Qir-Haréseth.
  '8':
  - type: text
    content: Les champs de Heshbôn dépérissent,
  - type: text
    content: les maîtres des nations ╵ont brisé tous les ceps ╵des vignes de Sibma
  - type: text
    content: qui s’étendaient ╵jusques à Yaezer
  - type: text
    content: et qui allaient se perdre ╵jusque dans le désert,
  - type: text
    content: et dont les rejetons ╵se répandaient au loin, ╵au-delà de la mer.
  '9':
  - type: text
    content: C’est pourquoi moi, je pleure, ╵oui, je pleure, avec Yaezer, ╵les vignes de Sibma.
  - type: text
    content: Je vous arrose de mes larmes, ╵Heshbôn, Elealé,
  - type: text
    content: car sur votre moisson ╵et sur votre vendange,
  - type: text
    content: les cris de joie se sont éteints.
