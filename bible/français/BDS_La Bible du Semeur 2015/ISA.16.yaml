document_id: ISA.16,21
type_code: fra
verses:
  '1':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Envoyez des agneaux comme tribut
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '16.1 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Tribut envoyé au roi qui règne à Jérusalem, à l’exemple de Mésha, roi de Moab, d’après '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: 2 R 3.4-5
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: ' ╵au maître du pays'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: depuis Séla par le désert
  - type: usfm
    marker: q1
    children:
    - type: text
      text: jusqu’au mont de Sion.
  '10':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: La joie et l’allégresse ╵ont disparu dans les vergers,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et, dans les vignes, ╵il n’y a plus de cris de joie, ╵plus de réjouissances,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: on ne presse plus le raisin ╵dans le pressoir.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Je fais cesser les cris de joie.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: C’est pourquoi je frémis, ╵comme vibre une lyre, ╵en pensant à Moab,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: mon cœur se serre ╵pour Qir-Harès.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: On voit le peuple de Moab ╵se donner de la peine ╵sur les hauts lieux,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'et se rendre à son sanctuaire ╵pour prier ses idoles : ╵mais il n’y pourra rien.'
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Voilà ce qu’a dit l’Eternel depuis longtemps sur Moab. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Maintenant l’Eternel déclare : Dans trois années, comptées comme l’on compte l’année d’un mercenaire'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '16.14 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'C’est-à-dire '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'jour pour jour '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '(voir '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: '21.16'
        - type: text
          text: ).
      marker-yv: yv-n
    - type: text
      text: ', l’élite de Moab, avec sa multitude, si nombreuse soit-elle, sera humiliée et il n’en survivra qu’un reste insignifiant et sans aucune force.'
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Comme des oiseaux fugitifs ╵chassés hors de leur nid,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: seront les filles de Moab ╵près des gués de l’Arnon
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '16.2 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Fleuve principal de Moab qui constituait aussi sa frontière nord.
      marker-yv: yv-n
    - type: text
      text: .
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: « Donne-nous un conseil, ╵supplieront-elles
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '16.3 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Les filles de Moab s’adressent à Jérusalem.
      marker-yv: yv-n
    - type: text
      text: ', ╵prends une décision !'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: En plein midi, ╵étends sur nous ton ombre ╵comme la nuit.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Cache les expulsés,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ne trahis pas les fugitifs !
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Que les réfugiés de Moab ╵soient accueillis chez toi
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '16.4 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Autre traduction : '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: que les réfugiés de Dieu trouvent refuge en Moab.
      marker-yv: yv-n
    - type: text
      text: '  !'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Sois pour eux un refuge ╵contre le destructeur. »
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Car, un jour, l’oppression ╵va prendre fin,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: la dévastation cessera,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et l’oppresseur ╵aura disparu du pays.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Il régnera un roi ╵sur le royaume de David.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Son trône sera stable ╵car il gouvernera ╵le peuple avec bonté
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et avec loyauté.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Il poursuivra le droit
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et sera prompt ╵à exécuter la justice.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Nous avons appris à quel point ╵Moab est orgueilleux,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: oui, nous savons son arrogance, ╵son orgueil et sa présomption,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: mais ses discours sont vains.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Aussi les Moabites ╵auront lieu de gémir ╵sur le sort de Moab.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tous se lamenteront ;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: gémissez, consternés,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: car il n’y aura plus ╵de gâteaux de raisin ╵faits à Qir-Haréseth.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Les champs de Heshbôn dépérissent,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: les maîtres des nations ╵ont brisé tous les ceps ╵des vignes de Sibma
  - type: usfm
    marker: q1
    children:
    - type: text
      text: qui s’étendaient ╵jusques à Yaezer
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et qui allaient se perdre ╵jusque dans le désert,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et dont les rejetons ╵se répandaient au loin, ╵au-delà de la mer.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: C’est pourquoi moi, je pleure, ╵oui, je pleure, avec Yaezer, ╵les vignes de Sibma.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Je vous arrose de mes larmes, ╵Heshbôn, Elealé,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: car sur votre moisson ╵et sur votre vendange,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: les cris de joie se sont éteints.
