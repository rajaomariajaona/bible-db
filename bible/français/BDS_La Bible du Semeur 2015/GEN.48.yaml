document_id: GEN.48
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Jacob adopte les fils de Joseph et les bénit
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Peu après cela, on vint prévenir Joseph que son père était malade. Il prit avec lui ses deux fils Manassé et Ephraïm. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'On annonça à Jacob que son fils Joseph venait le voir. Israël rassembla ses forces et s’assit sur sa couche. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Jacob dit à Joseph : Le Dieu tout-puissant m’est apparu à Louz au pays de Canaan et il m’a béni'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '48.3 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Pour les v. 3-4, voir '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Gn 28.13-14
        metadata:
          usfm: GEN.28.13+GEN.28.14
      - type: text
        text: '. Voir '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ac 7.5
        metadata:
          usfm: ACT.7.5
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Il m’a dit : « Je te rends fécond et te multiplierai, je te ferai devenir une multitude de peuples et, après toi, je donnerai ce pays pour toujours en propriété à ta descendance. » '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Et maintenant, les deux fils qui te sont nés en Egypte, avant mon arrivée ici, je les adopte comme miens. Ephraïm et Manassé seront mes fils au même titre que Ruben et Siméon
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '48.5 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Ephraïm et Manassé deviendront chefs de tribus à la place de Joseph.
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Quant aux enfants qui te naîtront après eux, ils seront à toi. C’est au nom de leurs frères aînés qu’ils recevront leur part d’héritage. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Car lorsque je revenais de Paddân-Aram, j’eus la douleur de voir Rachel mourir au pays de Canaan à peu de distance d’Ephrata. C’est là, sur le chemin d’Ephrata – qui s’appelle Bethléhem – que je l’ai enterrée.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Israël regarda les fils de Joseph et demanda : Qui est-ce ?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Joseph lui répondit : Ce sont les fils que Dieu m’a donnés dans ce pays.'
- type: usfm
  marker: p
  children:
  - type: text
    text: – Fais-les approcher, je te prie, dit Jacob, pour que je les bénisse.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'La vue d’Israël était affaiblie par l’âge de sorte qu’il n’y voyait plus. Il les fit donc approcher de lui et les embrassa. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Israël dit à Joseph : Je ne m’imaginais pas te revoir et voici que Dieu me fait voir même tes descendants.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Joseph reprit ses deux enfants d’entre les genoux
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '48.12 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Jacob avait pris les enfants sur ses genoux (ou entre ses genoux), un geste d’adoption.
    marker-yv: yv-n
  - type: text
    text: ' de son père et se prosterna face contre terre. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Puis il les prit tous les deux, Ephraïm à sa droite – donc à gauche d’Israël – et Manassé à sa gauche – donc à la droite de son père – et les fit approcher de lui. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Mais Israël tendit la main droite et la posa sur la tête d’Ephraïm, qui était le plus jeune, et sa main gauche sur la tête de Manassé. Il croisa donc ses mains, bien que Manassé fût l’aîné.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Il bénit Joseph et dit :'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Que ces garçons ╵soient bénis par le Dieu
- type: usfm
  marker: q1
  children:
  - type: text
    text: devant qui ont vécu mes pères ╵Abraham et Isaac,
- type: usfm
  marker: q1
  children:
  - type: text
    text: le Dieu qui a pris soin de moi ╵comme un berger ╵depuis que j’existe et jusqu’à ce jour,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: l’ange qui m’a délivré de tout mal.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Qu’ils perpétuent mon nom ╵et celui de mes pères ╵Abraham et Isaac !
- type: usfm
  marker: q1
  children:
  - type: text
    text: Qu’ils aient beaucoup d’enfants ╵partout dans le pays.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Joseph remarqua que son père avait posé sa main droite sur la tête d’Ephraïm. Cela lui déplut et il prit la main de son père pour la faire passer de la tête d’Ephraïm sur celle de Manassé. '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Il dit à son père : Pas ainsi, mon père, c’est celui-là l’aîné ; mets donc ta main droite sur sa tête.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Mais son père refusa et dit : Je sais, mon fils, je sais. Celui-là aussi deviendra un peuple ! Lui aussi sera grand. Pourtant son frère cadet sera plus grand que lui et sa descendance formera plusieurs peuples.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Ce jour-là, il les bénit ainsi :'
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Le peuple d’Israël vous nommera dans ses bénédictions en disant : « Que Dieu te rende semblable à Ephraïm et à Manassé ! »'
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Ainsi il plaça Ephraïm avant Manassé. '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Puis Israël dit à Joseph : Je vais bientôt mourir. Dieu sera avec vous et vous fera retourner au pays de vos ancêtres. '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Quant à moi, je te donne une part de plus qu’à tes frères : Sichem'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '48.22 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'En hébreu, un seul terme a été rendu deux fois, par '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'part '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'et par '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: Sichem
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: ', '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: à cause d’un jeu sur les deux sens de ce terme.
    marker-yv: yv-n
  - type: text
    text: ', que j’ai conquise sur les Amoréens avec mon épée et mon arc.'
