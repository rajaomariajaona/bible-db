document_id: GEN.48,21
type_code: fra
verses:
  '1':
  - type: heading
    content: Jacob adopte les fils de Joseph et les bénit
  - type: text
    content: 'Peu après cela, on vint prévenir Joseph que son père était malade. Il prit avec lui ses deux fils Manassé et Ephraïm. '
  '10':
  - type: text
    content: 'La vue d’Israël était affaiblie par l’âge de sorte qu’il n’y voyait plus. Il les fit donc approcher de lui et les embrassa. '
  '11':
  - type: text
    content: 'Israël dit à Joseph : Je ne m’imaginais pas te revoir et voici que Dieu me fait voir même tes descendants.'
  '12':
  - type: text
    content: Joseph reprit ses deux enfants d’entre les genoux
  - type: note
    content: Jacob avait pris les enfants sur ses genoux (ou entre ses genoux), un geste d’adoption.
  - type: text
    content: ' de son père et se prosterna face contre terre. '
  '13':
  - type: text
    content: 'Puis il les prit tous les deux, Ephraïm à sa droite – donc à gauche d’Israël – et Manassé à sa gauche – donc à la droite de son père – et les fit approcher de lui. '
  '14':
  - type: text
    content: Mais Israël tendit la main droite et la posa sur la tête d’Ephraïm, qui était le plus jeune, et sa main gauche sur la tête de Manassé. Il croisa donc ses mains, bien que Manassé fût l’aîné.
  '15':
  - type: text
    content: 'Il bénit Joseph et dit :'
  - type: text
    content: Que ces garçons ╵soient bénis par le Dieu
  - type: text
    content: devant qui ont vécu mes pères ╵Abraham et Isaac,
  - type: text
    content: le Dieu qui a pris soin de moi ╵comme un berger ╵depuis que j’existe et jusqu’à ce jour,
  '16':
  - type: text
    content: l’ange qui m’a délivré de tout mal.
  - type: text
    content: Qu’ils perpétuent mon nom ╵et celui de mes pères ╵Abraham et Isaac !
  - type: text
    content: Qu’ils aient beaucoup d’enfants ╵partout dans le pays.
  '17':
  - type: text
    content: 'Joseph remarqua que son père avait posé sa main droite sur la tête d’Ephraïm. Cela lui déplut et il prit la main de son père pour la faire passer de la tête d’Ephraïm sur celle de Manassé. '
  '18':
  - type: text
    content: 'Il dit à son père : Pas ainsi, mon père, c’est celui-là l’aîné ; mets donc ta main droite sur sa tête.'
  '19':
  - type: text
    content: 'Mais son père refusa et dit : Je sais, mon fils, je sais. Celui-là aussi deviendra un peuple ! Lui aussi sera grand. Pourtant son frère cadet sera plus grand que lui et sa descendance formera plusieurs peuples.'
  '2':
  - type: text
    content: 'On annonça à Jacob que son fils Joseph venait le voir. Israël rassembla ses forces et s’assit sur sa couche. '
  '20':
  - type: text
    content: 'Ce jour-là, il les bénit ainsi :'
  - type: text
    content: 'Le peuple d’Israël vous nommera dans ses bénédictions en disant : « Que Dieu te rende semblable à Ephraïm et à Manassé ! »'
  - type: text
    content: 'Ainsi il plaça Ephraïm avant Manassé. '
  '21':
  - type: text
    content: 'Puis Israël dit à Joseph : Je vais bientôt mourir. Dieu sera avec vous et vous fera retourner au pays de vos ancêtres. '
  '22':
  - type: text
    content: 'Quant à moi, je te donne une part de plus qu’à tes frères : Sichem'
  - type: note
    content: En hébreu, un seul terme a été rendu deux fois, par part et par Sichem, à cause d’un jeu sur les deux sens de ce terme.
  - type: text
    content: ', que j’ai conquise sur les Amoréens avec mon épée et mon arc.'
  '3':
  - type: text
    content: 'Jacob dit à Joseph : Le Dieu tout-puissant m’est apparu à Louz au pays de Canaan et il m’a béni'
  - type: note
    content: Pour les v. 3-4, voir Gn 28.13-14. Voir Ac 7.5.
  - type: text
    content: '. '
  '4':
  - type: text
    content: 'Il m’a dit : « Je te rends fécond et te multiplierai, je te ferai devenir une multitude de peuples et, après toi, je donnerai ce pays pour toujours en propriété à ta descendance. » '
  '5':
  - type: text
    content: Et maintenant, les deux fils qui te sont nés en Egypte, avant mon arrivée ici, je les adopte comme miens. Ephraïm et Manassé seront mes fils au même titre que Ruben et Siméon
  - type: note
    content: Ephraïm et Manassé deviendront chefs de tribus à la place de Joseph.
  - type: text
    content: '. '
  '6':
  - type: text
    content: 'Quant aux enfants qui te naîtront après eux, ils seront à toi. C’est au nom de leurs frères aînés qu’ils recevront leur part d’héritage. '
  '7':
  - type: text
    content: Car lorsque je revenais de Paddân-Aram, j’eus la douleur de voir Rachel mourir au pays de Canaan à peu de distance d’Ephrata. C’est là, sur le chemin d’Ephrata – qui s’appelle Bethléhem – que je l’ai enterrée.
  '8':
  - type: text
    content: 'Israël regarda les fils de Joseph et demanda : Qui est-ce ?'
  '9':
  - type: text
    content: 'Joseph lui répondit : Ce sont les fils que Dieu m’a donnés dans ce pays.'
  - type: text
    content: – Fais-les approcher, je te prie, dit Jacob, pour que je les bénisse.
