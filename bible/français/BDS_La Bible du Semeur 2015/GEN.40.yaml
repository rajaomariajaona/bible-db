document_id: GEN.40,21
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Les rêves de deux hauts fonctionnaires
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Quelque temps après, deux hauts fonctionnaires du pharaon, le chef des échansons et le chef des panetiers, commirent une faute envers leur maître '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'portant trois sarments. Il se mit à bourgeonner, à fleurir, puis ses grappes donnèrent des raisins mûrs. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: Je tenais en main la coupe du pharaon, je cueillis les raisins, j’en pressai le jus dans la coupe du pharaon et je la présentai à mon maître.
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'Joseph lui dit : Voici ce que signifie ce rêve : Les trois sarments représentent trois jours. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'Dans trois jours, le pharaon te permettra de relever la tête et te rétablira dans tes fonctions. Tu lui présenteras sa coupe comme le veut la charge que tu occupais auparavant en qualité d’échanson. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'Mais, s’il te plaît, pense à moi quand tout ira de nouveau bien pour toi et aie la bonté de parler en ma faveur au pharaon pour me faire sortir de cette prison. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: En effet, j’ai été amené de force du pays des Hébreux, et ici même je n’ai rien fait qui mérite le cachot.
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'Lorsque le chef des panetiers vit que Joseph avait donné une interprétation favorable du songe, il lui dit : Pour ma part, dans mon rêve, je portais trois corbeilles de pain blanc sur la tête. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: Dans celle du dessus, il y avait de la nourriture préparée par un panetier et destinée au pharaon ; et les oiseaux venaient les picorer dans la corbeille qui reposait sur ma tête.
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'Joseph lui dit : Voici ce que signifie ce rêve : Les trois corbeilles représentent trois jours. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: Dans trois jours, le pharaon élèvera ta tête au-dessus de toi, il te pendra à un arbre et les oiseaux viendront se repaître de ta chair.
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'qui fut très irrité contre eux '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: 'Trois jours plus tard, à l’occasion de son anniversaire, le pharaon offrit un festin à tous ses grands. Il « éleva la tête » du chef des échansons et du chef des panetiers en présence de ses grands. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: 'Il rétablit dans sa fonction le chef des échansons, qui lui présenta de nouveau sa coupe, '
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: 'et il fit pendre le chef des panetiers. Les choses se passèrent conformément à l’interprétation que Joseph avait donnée de leurs rêves. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: 'Mais le chef des échansons ne pensa plus à Joseph : il l’oublia.'
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'et les fit jeter dans la prison du commandant de la garde où Joseph était incarcéré. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: Celui-ci les confia aux soins de Joseph qui s’occupa d’eux. Ils passèrent un certain temps en prison.
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'Une nuit, l’échanson et le panetier du pharaon détenus dans la prison firent tous deux un rêve, chacun le sien, ayant sa signification propre. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'Le lendemain matin, quand Joseph se rendit auprès d’eux, il remarqua qu’ils étaient soucieux. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'Joseph demanda donc aux hauts fonctionnaires du pharaon qui se trouvaient en prison avec lui dans la maison de son maître : Pourquoi avez-vous cet air sombre aujourd’hui ?'
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'Ils lui répondirent : Nous avons fait un rêve et il n’y a ici personne pour nous l’interpréter.'
  - type: usfm
    marker: p
    children:
    - type: text
      text: – N’appartient-il pas à Dieu de donner l’interprétation des rêves ? leur dit Joseph. Racontez-les moi donc, je vous prie.
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: Alors le chef des échansons lui raconta ce qu’il avait rêvé.
  - type: usfm
    marker: p
    children:
    - type: text
      text: '– Dans mon rêve, lui dit-il, j’avais devant moi un cep de vigne '
