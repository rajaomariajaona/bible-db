document_id: ROM.16
type_code: fra
segments:
- type: usfm
  marker: ms1
  children:
  - type: text
    text: Salutations
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Je vous recommande notre sœur Phœbé, diaconesse
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '16.1 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Le terme grec désigne la fonction dont il est question dans '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1 Tm 3.11
        metadata:
          usfm: 1TI.3.11
      - type: text
        text: '. Autres traductions : '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'qui est au service de l’Eglise qui est à Cenchrées, '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'ou : '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: qui exerce un ministère au service de l’Eglise qui est à Cenchrées.
    marker-yv: yv-n
  - type: text
    text: ' de l’Eglise qui est à Cenchrées'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '16.1 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Voir '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ac 18.18
        metadata:
          usfm: ACT.18.18
      - type: text
        text: ' et note.'
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Réservez-lui, en vertu de votre union commune au Seigneur, l’accueil que lui doivent des membres du peuple saint. Mettez-vous à sa disposition pour toute affaire où elle aurait besoin de vous. Car elle est intervenue en faveur de beaucoup et, en particulier, pour moi.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Saluez Prisca et Aquilas
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '16.3 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Voir '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ac 18.2
        metadata:
          usfm: ACT.18.2
      - type: text
        text: ' et note.'
    marker-yv: yv-n
  - type: text
    text: ', mes collaborateurs dans le service de Jésus-Christ. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Ils ont risqué leur vie pour sauver la mienne. Je ne suis pas seul à leur en devoir gratitude. C’est aussi le cas de toutes les Eglises des pays païens. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Saluez aussi l’Eglise qui se réunit dans leur maison
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '16.5 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Au premier siècle, les communautés chrétiennes se réunissaient dans des maisons particulières. Ce chapitre en nomme quatre situées à Rome (v. 5, 10, 15).
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Saluez mon cher Epaïnète : il est le premier à s’être tourné vers Christ dans la province d’Asie. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Saluez Marie, qui s’est beaucoup dépensée pour vous. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Saluez Andronicus et Junia
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '16.7 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Certains manuscrits ont : '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: Julia.
    marker-yv: yv-n
  - type: text
    text: ', qui sont du même peuple que moi : ils ont été mes compagnons de captivité ; ils sont très estimés en tant qu’apôtres'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '16.7 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Certains comprennent : '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: ils sont très estimés par les apôtres.
    marker-yv: yv-n
  - type: text
    text: ', eux qui se sont même convertis à Christ avant moi. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Saluez Ampliatus qui m’est très cher dans le Seigneur. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Saluez Urbain, notre collaborateur dans le service de Christ ainsi que mon cher Stachys. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Saluez Apellès, qui a prouvé son attachement à Christ. Saluez aussi les gens de la maison d’Aristobule
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '16.10 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Neveu d’Hérode le Grand qui vivait à Rome et fréquentait la cour impériale du temps de Claude. Certains de ses esclaves étaient chrétiens.
    marker-yv: yv-n
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: et Hérodion qui fait partie du même peuple que moi. Saluez les gens de la maison de Narcisse
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '16.11 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Affranchi de Claude.
    marker-yv: yv-n
  - type: text
    text: ' qui appartiennent au Seigneur.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Saluez Tryphène et Tryphose qui toutes deux travaillent dur pour le Seigneur, ainsi que ma chère Perside qui a travaillé dur pour le Seigneur. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Saluez Rufus
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '16.13 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Probablement le fils de Simon de Cyrène qui a porté la croix de Jésus (
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Mc 15.21
        metadata:
          usfm: MRK.15.21
      - type: text
        text: ). Son frère Alexandre et lui s’étaient convertis.
    marker-yv: yv-n
  - type: text
    text: ', cet homme que le Seigneur a choisi, et sa mère, qui est aussi une mère pour moi.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Saluez Asyncrite, Phlégon, Hermès, Patrobas, Hermas et tous les frères et sœurs qui sont avec eux. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Saluez Philologue et Julie, Nérée et sa sœur, Olympas et tous les membres du peuple saint qui sont avec eux. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Saluez-vous les uns les autres en vous donnant le baiser fraternel. Toutes les Eglises de Christ vous adressent leurs salutations.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Je vous engage instamment, chers frères et sœurs, à prendre garde à ceux qui sèment la division et égarent les autres en s’opposant à l’enseignement que vous avez reçu. Eloignez-vous d’eux, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'car les gens de cette sorte ne servent pas Christ, notre Seigneur, mais leur ventre. Avec leurs belles paroles et leurs discours flatteurs, ils séduisent ceux qui ne discernent pas le mal. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Votre obéissance est connue de tous et cela me remplit de joie, mais je désire que vous sachiez discerner le bien
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '16.19 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Autre traduction : '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: que vous ayez de la sagesse pour faire le bien.
    marker-yv: yv-n
  - type: text
    text: ' et que vous soyez incorruptibles à l’égard du mal. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Le Dieu qui donne la paix ne tardera pas à écraser Satan sous vos pieds. Que la grâce de notre Seigneur Jésus soit avec vous
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '16.20 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Les mots : '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'que la grâce… avec vous '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: sont absents de certains manuscrits.
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Timothée, mon collaborateur, ainsi que Lucius, Jason et Sosipater, qui appartiennent au même peuple que moi, vous saluent. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: Moi, Tertius
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '16.22 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Secrétaire de Paul.
    marker-yv: yv-n
  - type: text
    text: ' qui écris cette lettre, j’ajoute mes salutations dans le Seigneur qui nous unit. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Vous saluent encore : Gaïus qui m’offre l’hospitalité et chez qui se réunit toute l’Eglise, Eraste'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '16.23 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Dans une place pavée de Corinthe, des archéologues ont découvert un bloc de pierre portant l’inscription : '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'Eraste, chef des travaux publics, a payé les frais de ce pavage. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Peut-être s’agit-il du même personnage qu’ici et dans '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ac 19.22
        metadata:
          usfm: ACT.19.22
      - type: text
        text: ' et '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 2 Tm 4.20
        metadata:
          usfm: 2TI.4.20
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: ', le trésorier de la ville, ainsi que le frère Quartus'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '16.23 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Certains manuscrits ajoutent : '
    - type: usfm
      marker: fv
      children:
      - type: text
        text: '24 '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: que la grâce du Seigneur Jésus-Christ soit avec vous tous. Amen.
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Béni soit Dieu ! Il a le pouvoir de vous rendre forts dans la foi, conformément à l’Evangile que je prêche en annonçant Jésus-Christ, selon la révélation du plan de Dieu, tenu secret pendant les siècles passés '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'et qui s’accomplit de façon manifeste de nos jours. Comme l’a ordonné le Dieu éternel, il est porté, par les écrits des prophètes, à la connaissance de tous les peuples pour qu’ils soient amenés à lui obéir en croyant. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: A ce Dieu qui seul possède la sagesse soit la gloire, de siècle en siècle, par Jésus-Christ. Amen
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '16.27 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'La place des v. 25-27 varie selon les manuscrits qui les insèrent parfois après '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '14.23'
        metadata:
          usfm: ROM.14.23
      - type: text
        text: ' ou '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '15.33'
        metadata:
          usfm: ROM.15.33
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: .
