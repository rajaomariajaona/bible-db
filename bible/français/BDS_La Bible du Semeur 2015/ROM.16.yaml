document_id: ROM.16,21
type_code: fra
verses:
  '1':
  - type: heading
    content: Salutations
  - type: text
    content: Je vous recommande notre sœur Phœbé, diaconesse
  - type: note
    content: 'Le terme grec désigne la fonction dont il est question dans 1 Tm 3.11. Autres traductions : qui est au service de l’Eglise qui est à Cenchrées, ou : qui exerce un ministère au service de l’Eglise qui est à Cenchrées.'
  - type: text
    content: ' de l’Eglise qui est à Cenchrées'
  - type: note
    content: Voir Ac 18.18 et note.
  - type: text
    content: '. '
  '10':
  - type: text
    content: Saluez Apellès, qui a prouvé son attachement à Christ. Saluez aussi les gens de la maison d’Aristobule
  - type: note
    content: Neveu d’Hérode le Grand qui vivait à Rome et fréquentait la cour impériale du temps de Claude. Certains de ses esclaves étaient chrétiens.
  - type: text
    content: ' '
  '11':
  - type: text
    content: et Hérodion qui fait partie du même peuple que moi. Saluez les gens de la maison de Narcisse
  - type: note
    content: Affranchi de Claude.
  - type: text
    content: ' qui appartiennent au Seigneur.'
  '12':
  - type: text
    content: 'Saluez Tryphène et Tryphose qui toutes deux travaillent dur pour le Seigneur, ainsi que ma chère Perside qui a travaillé dur pour le Seigneur. '
  '13':
  - type: text
    content: Saluez Rufus
  - type: note
    content: Probablement le fils de Simon de Cyrène qui a porté la croix de Jésus (Mc 15.21). Son frère Alexandre et lui s’étaient convertis.
  - type: text
    content: ', cet homme que le Seigneur a choisi, et sa mère, qui est aussi une mère pour moi.'
  '14':
  - type: text
    content: 'Saluez Asyncrite, Phlégon, Hermès, Patrobas, Hermas et tous les frères et sœurs qui sont avec eux. '
  '15':
  - type: text
    content: 'Saluez Philologue et Julie, Nérée et sa sœur, Olympas et tous les membres du peuple saint qui sont avec eux. '
  '16':
  - type: text
    content: Saluez-vous les uns les autres en vous donnant le baiser fraternel. Toutes les Eglises de Christ vous adressent leurs salutations.
  '17':
  - type: text
    content: 'Je vous engage instamment, chers frères et sœurs, à prendre garde à ceux qui sèment la division et égarent les autres en s’opposant à l’enseignement que vous avez reçu. Eloignez-vous d’eux, '
  '18':
  - type: text
    content: 'car les gens de cette sorte ne servent pas Christ, notre Seigneur, mais leur ventre. Avec leurs belles paroles et leurs discours flatteurs, ils séduisent ceux qui ne discernent pas le mal. '
  '19':
  - type: text
    content: Votre obéissance est connue de tous et cela me remplit de joie, mais je désire que vous sachiez discerner le bien
  - type: note
    content: 'Autre traduction : que vous ayez de la sagesse pour faire le bien.'
  - type: text
    content: ' et que vous soyez incorruptibles à l’égard du mal. '
  '2':
  - type: text
    content: Réservez-lui, en vertu de votre union commune au Seigneur, l’accueil que lui doivent des membres du peuple saint. Mettez-vous à sa disposition pour toute affaire où elle aurait besoin de vous. Car elle est intervenue en faveur de beaucoup et, en particulier, pour moi.
  '20':
  - type: text
    content: Le Dieu qui donne la paix ne tardera pas à écraser Satan sous vos pieds. Que la grâce de notre Seigneur Jésus soit avec vous
  - type: note
    content: 'Les mots : que la grâce… avec vous sont absents de certains manuscrits.'
  - type: text
    content: .
  '21':
  - type: text
    content: 'Timothée, mon collaborateur, ainsi que Lucius, Jason et Sosipater, qui appartiennent au même peuple que moi, vous saluent. '
  '22':
  - type: text
    content: Moi, Tertius
  - type: note
    content: Secrétaire de Paul.
  - type: text
    content: ' qui écris cette lettre, j’ajoute mes salutations dans le Seigneur qui nous unit. '
  '23':
  - type: text
    content: 'Vous saluent encore : Gaïus qui m’offre l’hospitalité et chez qui se réunit toute l’Eglise, Eraste'
  - type: note
    content: 'Dans une place pavée de Corinthe, des archéologues ont découvert un bloc de pierre portant l’inscription : Eraste, chef des travaux publics, a payé les frais de ce pavage. Peut-être s’agit-il du même personnage qu’ici et dans Ac 19.22 et 2 Tm 4.20.'
  - type: text
    content: ', le trésorier de la ville, ainsi que le frère Quartus'
  - type: note
    content: 'Certains manuscrits ajoutent : 24 que la grâce du Seigneur Jésus-Christ soit avec vous tous. Amen.'
  - type: text
    content: .
  '25':
  - type: text
    content: 'Béni soit Dieu ! Il a le pouvoir de vous rendre forts dans la foi, conformément à l’Evangile que je prêche en annonçant Jésus-Christ, selon la révélation du plan de Dieu, tenu secret pendant les siècles passés '
  '26':
  - type: text
    content: 'et qui s’accomplit de façon manifeste de nos jours. Comme l’a ordonné le Dieu éternel, il est porté, par les écrits des prophètes, à la connaissance de tous les peuples pour qu’ils soient amenés à lui obéir en croyant. '
  '27':
  - type: text
    content: A ce Dieu qui seul possède la sagesse soit la gloire, de siècle en siècle, par Jésus-Christ. Amen
  - type: note
    content: La place des v. 25-27 varie selon les manuscrits qui les insèrent parfois après 14.23 ou 15.33.
  - type: text
    content: .
  '3':
  - type: text
    content: Saluez Prisca et Aquilas
  - type: note
    content: Voir Ac 18.2 et note.
  - type: text
    content: ', mes collaborateurs dans le service de Jésus-Christ. '
  '4':
  - type: text
    content: 'Ils ont risqué leur vie pour sauver la mienne. Je ne suis pas seul à leur en devoir gratitude. C’est aussi le cas de toutes les Eglises des pays païens. '
  '5':
  - type: text
    content: Saluez aussi l’Eglise qui se réunit dans leur maison
  - type: note
    content: Au premier siècle, les communautés chrétiennes se réunissaient dans des maisons particulières. Ce chapitre en nomme quatre situées à Rome (v. 5, 10, 15).
  - type: text
    content: .
  - type: text
    content: 'Saluez mon cher Epaïnète : il est le premier à s’être tourné vers Christ dans la province d’Asie. '
  '6':
  - type: text
    content: 'Saluez Marie, qui s’est beaucoup dépensée pour vous. '
  '7':
  - type: text
    content: Saluez Andronicus et Junia
  - type: note
    content: 'Certains manuscrits ont : Julia.'
  - type: text
    content: ', qui sont du même peuple que moi : ils ont été mes compagnons de captivité ; ils sont très estimés en tant qu’apôtres'
  - type: note
    content: 'Certains comprennent : ils sont très estimés par les apôtres.'
  - type: text
    content: ', eux qui se sont même convertis à Christ avant moi. '
  '8':
  - type: text
    content: 'Saluez Ampliatus qui m’est très cher dans le Seigneur. '
  '9':
  - type: text
    content: 'Saluez Urbain, notre collaborateur dans le service de Christ ainsi que mon cher Stachys. '
