document_id: NUM.11,21
type_code: fra
verses:
  '1':
  - type: heading
    content: Les premières crises
  - type: heading
    content: Les Israélites se plaignent
  - type: text
    content: Un jour, le peuple adressa d’amères plaintes à l’Eternel. Lorsqu’il les entendit, il se mit en colère et déchaîna la foudre contre eux. Déjà, le feu dévorait une extrémité du camp.
  '10':
  - type: text
    content: 'Chaque famille se lamentait à l’entrée de sa tente. Moïse entendit le peuple pleurer, et l’Eternel entra dans une grande colère. Moïse en fut très affecté. '
  '11':
  - type: text
    content: 'Il dit à l’Eternel : Pourquoi fais-tu du mal à ton serviteur ? Pourquoi ne m’accordes-tu pas ta faveur ? Comment peux-tu m’imposer la charge de tout ce peuple ? '
  '12':
  - type: text
    content: 'Est-ce moi qui ai conçu tout ce peuple ? Est-ce moi qui l’ai mis au monde pour que tu me dises : « Porte-le sur ton cœur comme une nourrice porte le bébé qu’elle allaite, et cela jusqu’au pays que tu as promis à ses ancêtres » ? '
  '13':
  - type: text
    content: 'Où trouverai-je de la viande pour la distribuer à tous ces gens qui pleurent autour de moi en disant : « Donne-nous de la viande à manger ! » '
  '14':
  - type: text
    content: 'Je ne suis pas capable de porter, à moi seul, la responsabilité de tout ce peuple. C’est trop lourd pour moi ! '
  '15':
  - type: text
    content: Si tu veux bien m’accorder une faveur, prends ma vie plutôt que de me traiter ainsi, et que je n’aie plus à contempler mon malheur.
  - type: heading
    content: Les soixante-dix responsables du peuple adjoints à Moïse
  '16':
  - type: text
    content: 'L’Eternel répondit à Moïse : Rassemble-moi soixante-dix hommes choisis parmi les responsables d’Israël, des hommes que tu sais être des responsables et des chefs du peuple, et amène-les devant la tente de la Rencontre. Qu’ils se tiennent là avec toi. '
  '17':
  - type: text
    content: 'Alors je descendrai m’entretenir là avec toi, je prendrai de l’Esprit qui est sur toi et je le leur donnerai, pour qu’ils portent avec toi la charge de ce peuple, de sorte que tu n’auras plus à la porter seul. '
  '18':
  - type: text
    content: 'Tu diras au peuple : « Purifiez-vous pour demain, et vous mangerez de la viande, puisque vous avez pleuré aux oreilles de l’Eternel en disant : “Ah ! Si seulement nous pouvions manger de la viande ! Nous étions si bien en Egypte !” Eh bien, l’Eternel va vous donner de la viande à manger. '
  '19':
  - type: text
    content: 'Pas un seul jour, ni deux jours, ni cinq jours, ni dix jours, ni même vingt jours, '
  '2':
  - type: text
    content: 'Le peuple implora Moïse à grands cris ; celui-ci pria l’Eternel, et le feu s’arrêta. '
  '20':
  - type: text
    content: 'mais durant tout un mois vous en mangerez, jusqu’à ce qu’elle vous sorte par les narines et que vous en ayez la nausée. Car vous avez méprisé l’Eternel qui est au milieu de vous, et vous avez pleuré devant lui, en disant : “Pourquoi donc avons-nous quitté l’Egypte ?” »'
  '21':
  - type: text
    content: 'Moïse répondit : Ce peuple dont je fais partie compte six cent mille hommes de pied, et toi tu leur promets, pour un mois entier, de la viande à manger ! '
  '22':
  - type: text
    content: Abattra-t-on pour eux des brebis et des bœufs pour qu’ils en aient suffisamment ? Et même si on leur pêchait tous les poissons de la mer, en auraient-ils assez ?
  '23':
  - type: text
    content: 'L’Eternel lui répondit : Le bras de l’Eternel serait-il trop court ? Tu verras sans tarder si, oui ou non, ma parole se réalise devant toi.'
  - type: heading
    content: L’Esprit de Dieu se pose sur les soixante-dix responsables du peuple
  '24':
  - type: text
    content: 'Moïse sortit et rapporta au peuple les paroles de l’Eternel, puis il rassembla soixante-dix hommes choisis parmi leurs responsables, et les plaça autour de la tente. '
  '25':
  - type: text
    content: L’Eternel descendit dans la nuée et lui parla ; il prit de l’Esprit qui reposait sur lui et le donna à ces soixante-dix responsables. Quand l’Esprit se fut posé sur eux, ils se mirent à parler sous son inspiration, comme des prophètes – c’est l’unique fois que cela leur arriva.
  '26':
  - type: text
    content: 'L’Esprit vint également demeurer sur deux hommes qui se trouvaient dans le camp, et qui s’appelaient Eldad et Médad. L’Esprit vint reposer sur eux car ils figuraient parmi les inscrits, bien qu’ils ne se soient pas rendus à la tente, et, dans le camp, ils se mirent à parler sous l’inspiration de Dieu. '
  '27':
  - type: text
    content: 'Un jeune homme courut avertir Moïse : Eldad et Médad sont en train de parler sous l’inspiration de Dieu dans le camp !'
  '28':
  - type: text
    content: 'Alors Josué, fils de Noun, qui était l’assistant de Moïse depuis sa jeunesse, intervint en disant : Moïse, mon maître, empêche-les de faire cela !'
  '29':
  - type: text
    content: 'Moïse lui répondit : Serais-tu jaloux pour moi ? Que l’Eternel, au contraire, accorde son Esprit à tous les membres de son peuple pour qu’ils deviennent tous des prophètes !'
  '3':
  - type: text
    content: On appela ce lieu Tabeéra, parce que le feu de l’Eternel s’était embrasé contre le peuple.
  '30':
  - type: text
    content: Puis Moïse regagna le camp avec les responsables d’Israël.
  '31':
  - type: text
    content: 'Un vent envoyé par l’Eternel entraîna des cailles par-dessus la mer et les fit s’abattre autour du camp, sur un rayon d’une journée de marche. Elles recouvraient le sol jusqu’à un mètre de hauteur. '
  '32':
  - type: text
    content: Le peuple fut debout toute cette journée et toute la nuit, et encore tout le lendemain, pour ramasser les cailles. Personne n’en prit moins d’une tonne
  - type: note
    content: En hébreu, il s’agit de dix homers. Le homer contenait environ 360 litres.
  - type: text
    content: . Ils les étalèrent tout autour du camp.
  '33':
  - type: text
    content: 'Ils avaient encore la viande à la bouche quand la colère de l’Eternel éclata contre le peuple, et il le frappa d’une grave épidémie. '
  '34':
  - type: text
    content: On appela cet endroit Qibroth-Hattaava (Tombeaux de la convoitise), car c’est là qu’on enterra beaucoup de gens, qui avaient cédé à la convoitise
  - type: note
    content: L’apôtre Paul fait allusion à cet épisode dans 1 Co 10.6.
  - type: text
    content: '. '
  '35':
  - type: text
    content: De Qibroth-Hattaava le peuple se mit en marche pour Hatséroth, où il s’installa.
  '4':
  - type: text
    content: 'Il y avait parmi le peuple un ramassis d’individus qui furent saisis de toutes sortes de désirs. Alors les Israélites, à leur tour, recommencèrent à pleurer en disant : Ah ! Si seulement nous pouvions manger de la viande ! '
  '5':
  - type: text
    content: 'Nous regrettons le poisson qu’on mangeait pour rien en Egypte ! Et les concombres ! Et les melons ! Et les poireaux ! Et les oignons ! Et l’ail ! '
  '6':
  - type: text
    content: A présent, nous dépérissons. Nous sommes privés de tout, rien que de la manne, toujours de la manne !
  '7':
  - type: text
    content: La manne ressemblait à de la graine de coriandre, elle était transparente comme de la résine de bdellium
  - type: note
    content: Voir Ex 16.31.
  - type: text
    content: '. '
  '8':
  - type: text
    content: 'Le peuple se dispersait pour la ramasser ; puis on la broyait à la meule ou la pilait au mortier, et on la faisait cuire dans des pots pour en faire des galettes qui avaient un goût de gâteau à l’huile. '
  '9':
  - type: text
    content: Elle se déposait la nuit sur le camp avec la rosée
  - type: note
    content: Voir Ex 16.13-15.
  - type: text
    content: .
