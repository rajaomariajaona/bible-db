document_id: NUM.11
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Les premières crises
  marker-yv: yv-h
- type: usfm
  marker: s2
  children:
  - type: text
    text: Les Israélites se plaignent
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Un jour, le peuple adressa d’amères plaintes à l’Eternel. Lorsqu’il les entendit, il se mit en colère et déchaîna la foudre contre eux. Déjà, le feu dévorait une extrémité du camp.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Le peuple implora Moïse à grands cris ; celui-ci pria l’Eternel, et le feu s’arrêta. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: On appela ce lieu Tabeéra, parce que le feu de l’Eternel s’était embrasé contre le peuple.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Il y avait parmi le peuple un ramassis d’individus qui furent saisis de toutes sortes de désirs. Alors les Israélites, à leur tour, recommencèrent à pleurer en disant : Ah ! Si seulement nous pouvions manger de la viande ! '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Nous regrettons le poisson qu’on mangeait pour rien en Egypte ! Et les concombres ! Et les melons ! Et les poireaux ! Et les oignons ! Et l’ail ! '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: A présent, nous dépérissons. Nous sommes privés de tout, rien que de la manne, toujours de la manne !
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: La manne ressemblait à de la graine de coriandre, elle était transparente comme de la résine de bdellium
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '11.7 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Voir '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ex 16.31
        metadata:
          usfm: EXO.16.31
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Le peuple se dispersait pour la ramasser ; puis on la broyait à la meule ou la pilait au mortier, et on la faisait cuire dans des pots pour en faire des galettes qui avaient un goût de gâteau à l’huile. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Elle se déposait la nuit sur le camp avec la rosée
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '11.9 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Voir '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ex 16.13-15
        metadata:
          usfm: EXO.16.13+EXO.16.14+EXO.16.15
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Chaque famille se lamentait à l’entrée de sa tente. Moïse entendit le peuple pleurer, et l’Eternel entra dans une grande colère. Moïse en fut très affecté. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Il dit à l’Eternel : Pourquoi fais-tu du mal à ton serviteur ? Pourquoi ne m’accordes-tu pas ta faveur ? Comment peux-tu m’imposer la charge de tout ce peuple ? '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Est-ce moi qui ai conçu tout ce peuple ? Est-ce moi qui l’ai mis au monde pour que tu me dises : « Porte-le sur ton cœur comme une nourrice porte le bébé qu’elle allaite, et cela jusqu’au pays que tu as promis à ses ancêtres » ? '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Où trouverai-je de la viande pour la distribuer à tous ces gens qui pleurent autour de moi en disant : « Donne-nous de la viande à manger ! » '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Je ne suis pas capable de porter, à moi seul, la responsabilité de tout ce peuple. C’est trop lourd pour moi ! '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Si tu veux bien m’accorder une faveur, prends ma vie plutôt que de me traiter ainsi, et que je n’aie plus à contempler mon malheur.
- type: usfm
  marker: s2
  children:
  - type: text
    text: Les soixante-dix responsables du peuple adjoints à Moïse
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'L’Eternel répondit à Moïse : Rassemble-moi soixante-dix hommes choisis parmi les responsables d’Israël, des hommes que tu sais être des responsables et des chefs du peuple, et amène-les devant la tente de la Rencontre. Qu’ils se tiennent là avec toi. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Alors je descendrai m’entretenir là avec toi, je prendrai de l’Esprit qui est sur toi et je le leur donnerai, pour qu’ils portent avec toi la charge de ce peuple, de sorte que tu n’auras plus à la porter seul. '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Tu diras au peuple : « Purifiez-vous pour demain, et vous mangerez de la viande, puisque vous avez pleuré aux oreilles de l’Eternel en disant : “Ah ! Si seulement nous pouvions manger de la viande ! Nous étions si bien en Egypte !” Eh bien, l’Eternel va vous donner de la viande à manger. '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Pas un seul jour, ni deux jours, ni cinq jours, ni dix jours, ni même vingt jours, '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'mais durant tout un mois vous en mangerez, jusqu’à ce qu’elle vous sorte par les narines et que vous en ayez la nausée. Car vous avez méprisé l’Eternel qui est au milieu de vous, et vous avez pleuré devant lui, en disant : “Pourquoi donc avons-nous quitté l’Egypte ?” »'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Moïse répondit : Ce peuple dont je fais partie compte six cent mille hommes de pied, et toi tu leur promets, pour un mois entier, de la viande à manger ! '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: Abattra-t-on pour eux des brebis et des bœufs pour qu’ils en aient suffisamment ? Et même si on leur pêchait tous les poissons de la mer, en auraient-ils assez ?
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'L’Eternel lui répondit : Le bras de l’Eternel serait-il trop court ? Tu verras sans tarder si, oui ou non, ma parole se réalise devant toi.'
- type: usfm
  marker: s2
  children:
  - type: text
    text: L’Esprit de Dieu se pose sur les soixante-dix responsables du peuple
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Moïse sortit et rapporta au peuple les paroles de l’Eternel, puis il rassembla soixante-dix hommes choisis parmi leurs responsables, et les plaça autour de la tente. '
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: L’Eternel descendit dans la nuée et lui parla ; il prit de l’Esprit qui reposait sur lui et le donna à ces soixante-dix responsables. Quand l’Esprit se fut posé sur eux, ils se mirent à parler sous son inspiration, comme des prophètes – c’est l’unique fois que cela leur arriva.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'L’Esprit vint également demeurer sur deux hommes qui se trouvaient dans le camp, et qui s’appelaient Eldad et Médad. L’Esprit vint reposer sur eux car ils figuraient parmi les inscrits, bien qu’ils ne se soient pas rendus à la tente, et, dans le camp, ils se mirent à parler sous l’inspiration de Dieu. '
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'Un jeune homme courut avertir Moïse : Eldad et Médad sont en train de parler sous l’inspiration de Dieu dans le camp !'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'Alors Josué, fils de Noun, qui était l’assistant de Moïse depuis sa jeunesse, intervint en disant : Moïse, mon maître, empêche-les de faire cela !'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'Moïse lui répondit : Serais-tu jaloux pour moi ? Que l’Eternel, au contraire, accorde son Esprit à tous les membres de son peuple pour qu’ils deviennent tous des prophètes !'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: Puis Moïse regagna le camp avec les responsables d’Israël.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'Un vent envoyé par l’Eternel entraîna des cailles par-dessus la mer et les fit s’abattre autour du camp, sur un rayon d’une journée de marche. Elles recouvraient le sol jusqu’à un mètre de hauteur. '
  - type: usfm
    marker: v
    metadata:
      v: '32'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: Le peuple fut debout toute cette journée et toute la nuit, et encore tout le lendemain, pour ramasser les cailles. Personne n’en prit moins d’une tonne
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '11.32 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'En hébreu, il s’agit de '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'dix homers. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Le homer contenait environ 360 litres.
    marker-yv: yv-n
  - type: text
    text: . Ils les étalèrent tout autour du camp.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '33'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: 'Ils avaient encore la viande à la bouche quand la colère de l’Eternel éclata contre le peuple, et il le frappa d’une grave épidémie. '
  - type: usfm
    marker: v
    metadata:
      v: '34'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: On appela cet endroit Qibroth-Hattaava (Tombeaux de la convoitise), car c’est là qu’on enterra beaucoup de gens, qui avaient cédé à la convoitise
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '11.34 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'L’apôtre Paul fait allusion à cet épisode dans '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1 Co 10.6
        metadata:
          usfm: 1CO.10.6
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '35'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: De Qibroth-Hattaava le peuple se mit en marche pour Hatséroth, où il s’installa.
