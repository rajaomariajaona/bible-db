document_id: JHN.15
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: La vigne et les sarments
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: ' '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Moi, je suis le vrai plant de vigne et mon Père est le vigneron.
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Tous les sarments, en moi, qui ne portent pas de fruit, il les coupe, et tous ceux qui en portent, il les purifie
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '15.2 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'D’autres comprennent : '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: il les taille.
    marker-yv: yv-n
  - type: text
    text: ' '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: afin qu’ils produisent un fruit encore plus abondant.
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'Vous aussi, vous avez déjà été '
    - type: usfm
      marker: w
      children:
      - type: text
        text: purifiés
    - type: text
      text: ' grâce à la parole que je vous ai enseignée.'
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'Demeurez en moi, et moi je demeurerai en vous. Un sarment ne saurait porter du fruit tout seul, sans demeurer attaché au cep. Il en est de même pour vous : si vous ne demeurez pas en moi, vous ne pouvez porter aucun fruit.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: ' '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Je suis le cep de la vigne, vous en êtes les sarments. Celui qui demeure en moi et en qui je demeure, portera du fruit en abondance, car sans moi, vous ne pouvez rien faire.
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'Si quelqu’un ne demeure pas en moi, on le jette hors du vignoble, comme les sarments coupés : ils se dessèchent, puis on les ramasse, on y met le feu et ils brûlent.'
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Mais si vous demeurez en moi, et que mes paroles demeurent en vous, demandez ce que vous voudrez, vous l’obtiendrez.
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'Si vous produisez du fruit en abondance et que vous prouvez ainsi que vous êtes vraiment mes '
    - type: usfm
      marker: w
      children:
      - type: text
        text: disciples
    - type: text
      text: ', mon Père sera glorifié aux yeux de tous.'
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Comme le Père m’a toujours aimé, moi aussi je vous ai aimés ; maintenez-vous donc dans mon amour.
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Si vous obéissez à mes commandements, vous demeurerez dans mon amour, tout comme moi-même j’ai obéi aux commandements de mon Père et je demeure dans son amour.
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Tout cela, je vous le dis pour que la joie qui est la mienne vous remplisse vous aussi, et qu’ainsi votre joie soit complète.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: ' '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'Voici quel est mon commandement : aimez-vous les uns les autres comme moi-même je vous ai aimés.'
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Il n’y a pas de plus grand amour que de donner sa vie pour ses amis.
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Vous êtes mes amis, si vous faites ce que je vous commande.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: ' '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Je ne vous appelle plus serviteurs, parce qu’un serviteur n’est pas mis au courant des affaires de son maître. Je vous appelle mes amis, parce que je vous ai fait part de tout ce que j’ai appris de mon Père.
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Ce n’est pas vous qui m’avez choisi. Non, c’est moi qui vous ai choisis ; je vous ai donné mission d’aller, de porter du fruit, du fruit qui soit durable. Alors le Père vous accordera tout ce que vous lui demanderez en mon nom.
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'Voici donc ce que je vous commande : aimez-vous les uns les autres.'
- type: usfm
  marker: s1
  children:
  - type: text
    text: La haine du monde à l’égard des disciples
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: ' '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Si le monde a de la haine pour vous, sachez qu’il m’a haï avant vous.
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Si vous faisiez partie du monde, il vous aimerait parce que vous lui appartiendriez. Mais vous n’appartenez pas au monde parce que je vous ai choisis du milieu du monde ; c’est pourquoi il vous poursuit de sa haine.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: ' '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'Souvenez-vous de ce que je vous ai déjà dit : Le serviteur n’est jamais plus grand que son maître. S’ils m’ont persécuté, ils vous persécuteront vous aussi ; s’ils ont gardé mes paroles, ils garderont aussi les vôtres.'
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Mais c’est à cause de moi qu’ils agiront ainsi, parce qu’ils ne connaissent pas celui qui m’a envoyé.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: ' '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Si je n’étais pas venu et si je ne leur avais pas parlé, ils ne seraient pas coupables, mais maintenant, leur péché est sans excuse.
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Celui qui a de la haine pour moi en a aussi pour mon Père.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: ' '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Si je n’avais pas accompli au milieu d’eux des œuvres que jamais personne d’autre n’a faites, ils ne seraient pas coupables. Mais maintenant, bien qu’ils les aient vues, ils continuent à nous haïr, et moi, et mon Père.
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'Mais il fallait bien que s’accomplisse cette parole écrite dans leur '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Loi
    - type: text
      text: '  : '
    - type: usfm
      marker: qt
      children:
      - type: text
        text: Ils m’ont haï sans raison
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '15.25 '
    - type: usfm
      marker: ft
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ps 35.19
        metadata:
          usfm: PSA.35.19
      - type: text
        text: ' et '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '69.5'
        metadata:
          usfm: PSA.69.5
      - type: text
        text: .
    marker-yv: yv-n
  - type: usfm
    marker: wj
    children:
    - type: usfm
      marker: qt
      children:
      - type: text
        text: .
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: ' '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Quand le Défenseur en justice
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '15.26 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Voir note à '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '14.16'
        metadata:
          usfm: JHN.14.16
      - type: text
        text: .
    marker-yv: yv-n
  - type: usfm
    marker: wj
    children:
    - type: text
      text: sera venu, celui que je vous enverrai d’auprès du Père, l’Esprit de vérité qui vient du Père, il rendra lui-même témoignage de moi.
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Et vous, à votre tour, vous serez mes témoins, parce que depuis le commencement vous avez été à mes côtés.
