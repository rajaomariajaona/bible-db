document_id: JHN.15,21
type_code: fra
verses:
  '1':
  - type: heading
    content: La vigne et les sarments
  - type: text
    content: ' '
  - type: text
    content: Moi, je suis le vrai plant de vigne et mon Père est le vigneron.
  - type: text
    content: ' '
  '10':
  - type: text
    content: Si vous obéissez à mes commandements, vous demeurerez dans mon amour, tout comme moi-même j’ai obéi aux commandements de mon Père et je demeure dans son amour.
  - type: text
    content: ' '
  '11':
  - type: text
    content: Tout cela, je vous le dis pour que la joie qui est la mienne vous remplisse vous aussi, et qu’ainsi votre joie soit complète.
  '12':
  - type: text
    content: ' '
  - type: text
    content: 'Voici quel est mon commandement : aimez-vous les uns les autres comme moi-même je vous ai aimés.'
  - type: text
    content: ' '
  '13':
  - type: text
    content: Il n’y a pas de plus grand amour que de donner sa vie pour ses amis.
  - type: text
    content: ' '
  '14':
  - type: text
    content: Vous êtes mes amis, si vous faites ce que je vous commande.
  '15':
  - type: text
    content: ' '
  - type: text
    content: Je ne vous appelle plus serviteurs, parce qu’un serviteur n’est pas mis au courant des affaires de son maître. Je vous appelle mes amis, parce que je vous ai fait part de tout ce que j’ai appris de mon Père.
  - type: text
    content: ' '
  '16':
  - type: text
    content: Ce n’est pas vous qui m’avez choisi. Non, c’est moi qui vous ai choisis ; je vous ai donné mission d’aller, de porter du fruit, du fruit qui soit durable. Alors le Père vous accordera tout ce que vous lui demanderez en mon nom.
  - type: text
    content: ' '
  '17':
  - type: text
    content: 'Voici donc ce que je vous commande : aimez-vous les uns les autres.'
  - type: heading
    content: La haine du monde à l’égard des disciples
  '18':
  - type: text
    content: ' '
  - type: text
    content: Si le monde a de la haine pour vous, sachez qu’il m’a haï avant vous.
  - type: text
    content: ' '
  '19':
  - type: text
    content: Si vous faisiez partie du monde, il vous aimerait parce que vous lui appartiendriez. Mais vous n’appartenez pas au monde parce que je vous ai choisis du milieu du monde ; c’est pourquoi il vous poursuit de sa haine.
  '2':
  - type: text
    content: Tous les sarments, en moi, qui ne portent pas de fruit, il les coupe, et tous ceux qui en portent, il les purifie
  - type: note
    content: 'D’autres comprennent : il les taille.'
  - type: text
    content: ' '
  - type: text
    content: afin qu’ils produisent un fruit encore plus abondant.
  - type: text
    content: ' '
  '20':
  - type: text
    content: ' '
  - type: text
    content: 'Souvenez-vous de ce que je vous ai déjà dit : Le serviteur n’est jamais plus grand que son maître. S’ils m’ont persécuté, ils vous persécuteront vous aussi ; s’ils ont gardé mes paroles, ils garderont aussi les vôtres.'
  - type: text
    content: ' '
  '21':
  - type: text
    content: Mais c’est à cause de moi qu’ils agiront ainsi, parce qu’ils ne connaissent pas celui qui m’a envoyé.
  '22':
  - type: text
    content: ' '
  - type: text
    content: Si je n’étais pas venu et si je ne leur avais pas parlé, ils ne seraient pas coupables, mais maintenant, leur péché est sans excuse.
  - type: text
    content: ' '
  '23':
  - type: text
    content: Celui qui a de la haine pour moi en a aussi pour mon Père.
  '24':
  - type: text
    content: ' '
  - type: text
    content: Si je n’avais pas accompli au milieu d’eux des œuvres que jamais personne d’autre n’a faites, ils ne seraient pas coupables. Mais maintenant, bien qu’ils les aient vues, ils continuent à nous haïr, et moi, et mon Père.
  - type: text
    content: ' '
  '25':
  - type: text
    content: 'Mais il fallait bien que s’accomplisse cette parole écrite dans leur '
  - type: text
    content: Loi
  - type: text
    content: '  : '
  - type: text
    content: Ils m’ont haï sans raison
  - type: note
    content: Ps 35.19 et 69.5.
  - type: text
    content: .
  '26':
  - type: text
    content: ' '
  - type: text
    content: Quand le Défenseur en justice
  - type: text
    content: ' '
  - type: note
    content: Voir note à 14.16.
  - type: text
    content: sera venu, celui que je vous enverrai d’auprès du Père, l’Esprit de vérité qui vient du Père, il rendra lui-même témoignage de moi.
  - type: text
    content: ' '
  '27':
  - type: text
    content: Et vous, à votre tour, vous serez mes témoins, parce que depuis le commencement vous avez été à mes côtés.
  '3':
  - type: text
    content: 'Vous aussi, vous avez déjà été '
  - type: text
    content: purifiés
  - type: text
    content: ' grâce à la parole que je vous ai enseignée.'
  - type: text
    content: ' '
  '4':
  - type: text
    content: 'Demeurez en moi, et moi je demeurerai en vous. Un sarment ne saurait porter du fruit tout seul, sans demeurer attaché au cep. Il en est de même pour vous : si vous ne demeurez pas en moi, vous ne pouvez porter aucun fruit.'
  '5':
  - type: text
    content: ' '
  - type: text
    content: Je suis le cep de la vigne, vous en êtes les sarments. Celui qui demeure en moi et en qui je demeure, portera du fruit en abondance, car sans moi, vous ne pouvez rien faire.
  - type: text
    content: ' '
  '6':
  - type: text
    content: 'Si quelqu’un ne demeure pas en moi, on le jette hors du vignoble, comme les sarments coupés : ils se dessèchent, puis on les ramasse, on y met le feu et ils brûlent.'
  - type: text
    content: ' '
  '7':
  - type: text
    content: Mais si vous demeurez en moi, et que mes paroles demeurent en vous, demandez ce que vous voudrez, vous l’obtiendrez.
  - type: text
    content: ' '
  '8':
  - type: text
    content: 'Si vous produisez du fruit en abondance et que vous prouvez ainsi que vous êtes vraiment mes '
  - type: text
    content: disciples
  - type: text
    content: ', mon Père sera glorifié aux yeux de tous.'
  - type: text
    content: ' '
  '9':
  - type: text
    content: Comme le Père m’a toujours aimé, moi aussi je vous ai aimés ; maintenez-vous donc dans mon amour.
  - type: text
    content: ' '
