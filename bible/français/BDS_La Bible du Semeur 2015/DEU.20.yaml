document_id: DEU.20,21
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s2
    children:
    - type: text
      text: Les lois sur la guerre
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Lorsque vous partirez en guerre contre vos ennemis et que vous verrez des chevaux, des chars de combat et une armée plus nombreuse que la vôtre, n’en ayez pas peur, car l’Eternel votre Dieu, qui vous a fait sortir d’Egypte, est avec vous. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'Quand vous marcherez sur une ville pour l’attaquer, vous proposerez d’abord à ses habitants de se rendre sans combat. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'S’ils acceptent vos propositions et vous ouvrent la porte de la ville, toute la population sera soumise à des corvées et vous servira comme esclave. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'S’ils refusent votre proposition et engagent le combat contre vous, vous assiégerez la ville. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'L’Eternel votre Dieu la livrera entre vos mains, et vous y ferez périr tous les hommes par l’épée. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'Mais vous pourrez vous réserver les femmes, les enfants, le bétail et tout le butin que vous trouverez dans la ville. Vous disposerez du butin pris sur vos ennemis que l’Eternel votre Dieu vous aura livrés. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'Vous agirez ainsi à l’égard de toutes les villes situées loin de chez vous et qui ne font pas partie du pays où vous allez vous installer. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'Quant aux villes de ces peuples que l’Eternel votre Dieu vous donne en possession, vous n’y laisserez pas subsister âme qui vive. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'Vous exterminerez totalement pour les vouer à l’Eternel les Hittites, les Amoréens, les Cananéens, les Phéréziens, les Héviens et les Yebousiens, comme l’Eternel votre Dieu vous l’a ordonné, '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: afin qu’ils ne vous apprennent pas à imiter les pratiques abominables auxquelles ils se livrent en l’honneur de leurs dieux, et par lesquelles vous pécheriez contre l’Eternel votre Dieu.
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'Lorsque vous attaquerez une ville et que vous serez obligés de prolonger le siège avant de pouvoir vous en emparer, vous ne porterez pas la hache sur les arbres fruitiers des alentours ; vous pourrez en manger les fruits, mais vous ne les abattrez pas, car l’arbre des champs n’est pas un homme pour que vous le traitiez comme un assiégé. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'Quand vous serez sur le point d’engager le combat, le prêtre s’avancera et s’adressera aux armées. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: Vous pourrez seulement détruire et abattre les arbres dont vous savez qu’ils ne portent pas de fruits comestibles. Vous pourrez en utiliser le bois pour des ouvrages de siège contre la ville qui est en guerre contre vous, jusqu’à ce qu’elle succombe.
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'Il leur dira : « Soldats d’Israël, écoutez ! Vous êtes aujourd’hui sur le point de combattre vos ennemis. Ne perdez pas courage ! N’ayez pas peur ! Ne tremblez pas et ne cédez pas à la panique devant vos ennemis ! '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'Car l’Eternel votre Dieu marche lui-même avec vous : il combattra pour vous contre vos ennemis et il vous sauvera. »'
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'Ensuite les officiers s’adresseront aux soldats en ces termes : « Y a-t-il parmi vous quelqu’un qui vient de bâtir une maison et n’y a pas encore habité ? Qu’il rentre chez lui, pour qu’il ne meure pas au combat et qu’un autre n’y habite pas le premier. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'L’un d’entre vous a-t-il planté une vigne et n’en a pas encore cueilli les premiers fruits ? Qu’il rentre chez lui, pour qu’il ne meure pas au combat et qu’un autre ne recueille pas les premiers fruits de sa vigne. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'Y a-t-il quelqu’un qui se soit fiancé et qui n’ait pas encore épousé sa fiancée ? Qu’il rentre chez lui, pour qu’il ne meure pas au combat et qu’un autre n’épouse pas sa fiancée. » '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'Puis les officiers diront encore aux soldats : « Quelqu’un parmi vous a-t-il peur et manque-t-il de courage ? Qu’il rentre chez lui, pour ne pas démoraliser ses compagnons d’armes ! » '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: Quand les officiers auront fini de parler aux soldats, on désignera les chefs des armées pour commander les troupes.
  - type: usfm
    marker: s2
    children:
    - type: text
      text: Le sort des ennemis lors d’un conflit
    marker-yv: yv-h
