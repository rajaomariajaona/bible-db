document_id: JER.13,21
type_code: fra
verses:
  '1':
  - type: heading
    content: La ceinture de lin
  - type: text
    content: 'L’Eternel me parla ainsi : Va t’acheter une ceinture de lin et mets-la autour de la taille, mais ne la mouille pas.'
  '10':
  - type: text
    content: 'Ce peuple mauvais qui refuse de m’écouter, qui suit les penchants de son cœur obstiné, qui s’attache aux dieux étrangers pour leur vouer un culte et se prosterner devant eux, deviendra semblable à cette ceinture qui n’est plus bonne à rien. '
  '11':
  - type: text
    content: Car, comme la ceinture est attachée à la taille d’un homme, ainsi je m’étais attaché toute la communauté d’Israël et toute celle de Juda – l’Eternel le déclare – pour qu’elles deviennent pour moi mon peuple et mon honneur, un sujet de louange, une parure. Mais ils ne m’ont pas écouté.
  - type: heading
    content: La perdition irréversible
  - type: heading
    content: Le vin de la colère
  '12':
  - type: text
    content: 'Tu leur diras ceci : Voici ce que déclare l’Eternel, le Dieu d’Israël : Toutes les cruches seront remplies de vin. Et ils te répondront : « Ne savons-nous pas que toutes les cruches seront remplies de vin ? » '
  '13':
  - type: text
    content: 'Tu leur diras alors : Voici ce que déclare l’Eternel : Je vais remplir d’ivresse'
  - type: note
    content: La colère de Dieu qui se déchaîne contre son peuple est souvent comparée à un vin qui enivre (voir 25.15-16 ; 48.26 ; 49.12 ; 51.39, 57 ; Es 29.9-10 ; 51.17 ; Ez 23.22-24 ; Ps 60.5 ; 75.9).
  - type: text
    content: ' tous les habitants de ce pays-ci et les rois qui occupent le trône de David, ainsi que les prêtres et les prophètes, et tous les habitants de Jérusalem. '
  '14':
  - type: text
    content: Puis je les briserai les uns contre les autres, les pères avec les fils, l’Eternel le déclare. Ni pitié, ni compassion, ni mansuétude, rien ne m’empêchera de les détruire.
  - type: heading
    content: Dernier avertissement
  '15':
  - type: text
    content: Ecoutez et prêtez l’oreille
  - type: text
    content: et ne soyez pas orgueilleux !
  - type: text
    content: C’est l’Eternel qui parle.
  '16':
  - type: text
    content: Rendez gloire à l’Eternel, votre Dieu,
  - type: text
    content: avant qu’il fasse venir les ténèbres
  - type: text
    content: et que vos pieds trébuchent
  - type: text
    content: sur les montagnes ╵où la nuit est tombée.
  - type: text
    content: 'Vous, vous attendez la lumière :'
  - type: text
    content: il la transformera ╵en une obscurité profonde ;
  - type: text
    content: oui, il la changera ╵en épaisses ténèbres.
  '17':
  - type: text
    content: Si vous n’écoutez pas,
  - type: text
    content: je pleurerai ╵secrètement sur votre orgueil,
  - type: text
    content: je pleurerai à chaudes larmes,
  - type: text
    content: mes yeux ruisselleront de larmes,
  - type: text
    content: car le troupeau de l’Eternel ╵va être emmené en captivité.
  - type: heading
    content: Message au roi
  '18':
  - type: text
    content: Déclare au roi ╵et à la reine mère
  - type: note
    content: L’influence de la reine mère était très grande dans toutes les cours orientales (voir 1 R 15.13). Il s’agit sans doute du roi Yehoyakîn et de sa mère Nehoushta (2 R 24.8-15 ; 2 Ch 36.5).
  - type: text
    content: '  :'
  - type: text
    content: « Asseyez-vous bien bas
  - type: text
    content: car le voilà tombé ╵de votre tête,
  - type: text
    content: votre superbe diadème. »
  '19':
  - type: text
    content: Les villes du Néguev ╵à présent sont fermées
  - type: text
    content: et plus personne ╵n’ouvre leurs portes,
  - type: text
    content: car tout Juda est déporté,
  - type: text
    content: il est déporté tout entier.
  - type: heading
    content: O Jérusalem !
  '2':
  - type: text
    content: Je m’achetai donc la ceinture, comme l’Eternel me l’avait demandé, et me la mis autour de la taille.
  '20':
  - type: text
    content: Lève les yeux, Jérusalem, regarde
  - type: text
    content: ceux qui viennent du nord.
  - type: text
    content: Où donc est le troupeau ╵qui t’a été confié,
  - type: text
    content: et où sont les brebis ╵qui faisaient ta fierté ?
  '21':
  - type: text
    content: Qu’auras-tu à redire ╵quand s’imposeront
  - type: note
    content: 'Autre traduction : quand l’Eternel t’imposera.'
  - type: text
    content: ' comme maîtres'
  - type: text
    content: ceux même à qui tu as appris ╵à te traiter ainsi ?
  - type: text
    content: Les douleurs te prendront
  - type: text
    content: comme une femme qui enfante.
  '22':
  - type: text
    content: 'Et si tu te demandes :'
  - type: text
    content: « Pourquoi tout cela m’est-il arrivé ? »
  - type: text
    content: sache que c’est à cause ╵de tes nombreuses fautes
  - type: text
    content: que les pans de ta robe ╵ont été relevés
  - type: note
    content: Voir v. 26-27. Traitement honteux infligé aux captives, même à celles du plus haut rang (voir Na 3.5 ; Es 47.3).
  - type: text
    content: et qu’on s’en prend à toi ╵avec violence.
  '23':
  - type: text
    content: Un Ethiopien peut-il changer ╵la couleur de sa peau,
  - type: text
    content: un léopard les taches ╵de son pelage ?
  - type: text
    content: De même, comment pourriez-vous ╵vous mettre à bien agir,
  - type: text
    content: vous qui êtes bien entraînés ╵à commettre le mal ?
  '24':
  - type: text
    content: Aussi, moi, l’Eternel, ╵je vous disperserai
  - type: text
    content: comme des brins de paille ╵dans le vent du désert.
  '25':
  - type: text
    content: Tel est ton lot, ╵le sort que je te fixe,
  - type: text
    content: déclare l’Eternel,
  - type: text
    content: car tu m’as oublié
  - type: text
    content: pour placer ta confiance ╵dans de faux dieux.
  '26':
  - type: text
    content: C’est pourquoi moi aussi ╵je relève ta robe ╵jusque sur ton visage,
  - type: text
    content: et l’on verra ta honte.
  '27':
  - type: text
    content: J’ai vu tes adultères ╵et tes hennissements,
  - type: text
    content: tes prostitutions exécrables,
  - type: text
    content: tes idoles abominables
  - type: text
    content: sur toutes les hauteurs, ╵dans la campagne.
  - type: text
    content: Malheur à toi, Jérusalem, ╵tu es impure !
  - type: text
    content: Jusques à quand ╵cela va-t-il durer ?
  '3':
  - type: text
    content: 'L’Eternel me parla une seconde fois pour me dire : '
  '4':
  - type: text
    content: 'Prends la ceinture que tu as achetée et que tu portes à la taille, et mets-toi en route : va jusqu’au Perath'
  - type: note
    content: Le Perath, en hébreu, même mot que l’Euphrate. Il s’agit peut-être du même lieu que Para (Jos 18.23), près de l’actuel Wadi Fara, à environ 5 kilomètres, au nord-est d’Anatoth. Ce torrent représente peut-être symboliquement l’Euphrate.
  - type: text
    content: ' et là, enfouis-la dans une fente de rocher.'
  '5':
  - type: text
    content: Je partis donc et je cachai la ceinture près du Perath, comme l’Eternel me l’avait ordonné.
  '6':
  - type: text
    content: 'Après bien des jours, l’Eternel me dit : Mets-toi en route, retourne sur les bords du Perath et reprends la ceinture que je t’ai ordonné de cacher là-bas.'
  '7':
  - type: text
    content: Je me rendis donc près du Perath, je fouillai, et je pris la ceinture à l’endroit où je l’avais cachée, mais elle était tellement abîmée qu’elle ne pouvait plus servir à rien.
  '8':
  - type: text
    content: 'Alors l’Eternel me parla en ces termes : '
  '9':
  - type: text
    content: 'Voici ce que déclare l’Eternel : C’est de cette manière que je vais abîmer ce qui fait la fierté des Judéens, la grande fierté de Jérusalem. '
