document_id: JER.13,21
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s2
    children:
    - type: text
      text: La ceinture de lin
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'L’Eternel me parla ainsi : Va t’acheter une ceinture de lin et mets-la autour de la taille, mais ne la mouille pas.'
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'Ce peuple mauvais qui refuse de m’écouter, qui suit les penchants de son cœur obstiné, qui s’attache aux dieux étrangers pour leur vouer un culte et se prosterner devant eux, deviendra semblable à cette ceinture qui n’est plus bonne à rien. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: Car, comme la ceinture est attachée à la taille d’un homme, ainsi je m’étais attaché toute la communauté d’Israël et toute celle de Juda – l’Eternel le déclare – pour qu’elles deviennent pour moi mon peuple et mon honneur, un sujet de louange, une parure. Mais ils ne m’ont pas écouté.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: La perdition irréversible
    marker-yv: yv-h
  - type: usfm
    marker: s2
    children:
    - type: text
      text: Le vin de la colère
    marker-yv: yv-h
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'Tu leur diras ceci : Voici ce que déclare l’Eternel, le Dieu d’Israël : Toutes les cruches seront remplies de vin. Et ils te répondront : « Ne savons-nous pas que toutes les cruches seront remplies de vin ? » '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'Tu leur diras alors : Voici ce que déclare l’Eternel : Je vais remplir d’ivresse'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '13.13 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: La colère de Dieu qui se déchaîne contre son peuple est souvent comparée à un vin qui enivre (voir 25.15-16 ; 48.26 ; 49.12 ; 51.39, 57 ; Es 29.9-10 ; 51.17 ; Ez 23.22-24 ; Ps 60.5 ; 75.9).
      marker-yv: yv-n
    - type: text
      text: ' tous les habitants de ce pays-ci et les rois qui occupent le trône de David, ainsi que les prêtres et les prophètes, et tous les habitants de Jérusalem. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: Puis je les briserai les uns contre les autres, les pères avec les fils, l’Eternel le déclare. Ni pitié, ni compassion, ni mansuétude, rien ne m’empêchera de les détruire.
  - type: usfm
    marker: s2
    children:
    - type: text
      text: Dernier avertissement
    marker-yv: yv-h
  '15':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: Ecoutez et prêtez l’oreille
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et ne soyez pas orgueilleux !
  - type: usfm
    marker: q1
    children:
    - type: text
      text: C’est l’Eternel qui parle.
  '16':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: Rendez gloire à l’Eternel, votre Dieu,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: avant qu’il fasse venir les ténèbres
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et que vos pieds trébuchent
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sur les montagnes ╵où la nuit est tombée.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Vous, vous attendez la lumière :'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: il la transformera ╵en une obscurité profonde ;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: oui, il la changera ╵en épaisses ténèbres.
  '17':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: Si vous n’écoutez pas,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: je pleurerai ╵secrètement sur votre orgueil,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: je pleurerai à chaudes larmes,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: mes yeux ruisselleront de larmes,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: car le troupeau de l’Eternel ╵va être emmené en captivité.
  - type: usfm
    marker: s2
    children:
    - type: text
      text: Message au roi
    marker-yv: yv-h
  '18':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: Déclare au roi ╵et à la reine mère
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '13.18 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'L’influence de la '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'reine mère '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'était très grande dans toutes les cours orientales (voir '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: 1 R 15.13
        - type: text
          text: ). Il s’agit sans doute du roi Yehoyakîn et de sa mère Nehoushta (2 R 24.8-15 ; 2 Ch 36.5).
      marker-yv: yv-n
    - type: text
      text: '  :'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: « Asseyez-vous bien bas
  - type: usfm
    marker: q1
    children:
    - type: text
      text: car le voilà tombé ╵de votre tête,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: votre superbe diadème. »
  '19':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: Les villes du Néguev ╵à présent sont fermées
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et plus personne ╵n’ouvre leurs portes,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: car tout Juda est déporté,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: il est déporté tout entier.
  - type: usfm
    marker: s2
    children:
    - type: text
      text: O Jérusalem !
    marker-yv: yv-h
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: Je m’achetai donc la ceinture, comme l’Eternel me l’avait demandé, et me la mis autour de la taille.
  '20':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: Lève les yeux, Jérusalem, regarde
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ceux qui viennent du nord.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Où donc est le troupeau ╵qui t’a été confié,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et où sont les brebis ╵qui faisaient ta fierté ?
  '21':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: Qu’auras-tu à redire ╵quand s’imposeront
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '13.21 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Autre traduction : '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: quand l’Eternel t’imposera.
      marker-yv: yv-n
    - type: text
      text: ' comme maîtres'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ceux même à qui tu as appris ╵à te traiter ainsi ?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Les douleurs te prendront
  - type: usfm
    marker: q1
    children:
    - type: text
      text: comme une femme qui enfante.
  '22':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: 'Et si tu te demandes :'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: « Pourquoi tout cela m’est-il arrivé ? »
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sache que c’est à cause ╵de tes nombreuses fautes
  - type: usfm
    marker: q1
    children:
    - type: text
      text: que les pans de ta robe ╵ont été relevés
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '13.22 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Voir v. 26-27. Traitement honteux infligé aux captives, même à celles du plus haut rang (voir Na 3.5 ; Es 47.3).
      marker-yv: yv-n
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et qu’on s’en prend à toi ╵avec violence.
  '23':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: Un Ethiopien peut-il changer ╵la couleur de sa peau,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: un léopard les taches ╵de son pelage ?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: De même, comment pourriez-vous ╵vous mettre à bien agir,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: vous qui êtes bien entraînés ╵à commettre le mal ?
  '24':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: Aussi, moi, l’Eternel, ╵je vous disperserai
  - type: usfm
    marker: q1
    children:
    - type: text
      text: comme des brins de paille ╵dans le vent du désert.
  '25':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: Tel est ton lot, ╵le sort que je te fixe,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: déclare l’Eternel,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: car tu m’as oublié
  - type: usfm
    marker: q1
    children:
    - type: text
      text: pour placer ta confiance ╵dans de faux dieux.
  '26':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: C’est pourquoi moi aussi ╵je relève ta robe ╵jusque sur ton visage,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et l’on verra ta honte.
  '27':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: J’ai vu tes adultères ╵et tes hennissements,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: tes prostitutions exécrables,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: tes idoles abominables
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sur toutes les hauteurs, ╵dans la campagne.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Malheur à toi, Jérusalem, ╵tu es impure !
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Jusques à quand ╵cela va-t-il durer ?
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'L’Eternel me parla une seconde fois pour me dire : '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'Prends la ceinture que tu as achetée et que tu portes à la taille, et mets-toi en route : va jusqu’au Perath'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '13.4 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Le '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'Perath, '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: en hébreu, même mot que l’Euphrate. Il s’agit peut-être du même lieu que Para (
        - type: usfm
          marker: ref
          children:
          - type: text
            text: Jos 18.23
        - type: text
          text: ), près de l’actuel Wadi Fara, à environ 5 kilomètres, au nord-est d’Anatoth. Ce torrent représente peut-être symboliquement l’Euphrate.
      marker-yv: yv-n
    - type: text
      text: ' et là, enfouis-la dans une fente de rocher.'
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: Je partis donc et je cachai la ceinture près du Perath, comme l’Eternel me l’avait ordonné.
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'Après bien des jours, l’Eternel me dit : Mets-toi en route, retourne sur les bords du Perath et reprends la ceinture que je t’ai ordonné de cacher là-bas.'
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: Je me rendis donc près du Perath, je fouillai, et je pris la ceinture à l’endroit où je l’avais cachée, mais elle était tellement abîmée qu’elle ne pouvait plus servir à rien.
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'Alors l’Eternel me parla en ces termes : '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'Voici ce que déclare l’Eternel : C’est de cette manière que je vais abîmer ce qui fait la fierté des Judéens, la grande fierté de Jérusalem. '
