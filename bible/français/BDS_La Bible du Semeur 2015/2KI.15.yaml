        marker: ref
        children:
        - type: text
          text: Es 7.8
        metadata:
          usfm: ISA.7.8
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '38'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: text
    text: Yotam rejoignit ses ancêtres décédés et fut enterré à leurs côtés dans la Cité de David, son ancêtre. Son fils Ahaz lui succéda sur le trône.
