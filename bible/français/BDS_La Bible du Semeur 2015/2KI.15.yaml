document_id: 2KI.15
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Le règne d’Azaria sur Juda
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: (2 Ch 26.3-4,  21-23)
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Au cours de la vingt-septième année du règne de Jéroboam, roi d’Israël, Azaria, fils d’Amatsia, devint roi de Juda
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '15.1 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'C’est-à-dire en 767 av. J.-C. (en datant le début de la corégence de Jéroboam II avec Joas en 793 ; voir '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '14.23'
        metadata:
          usfm: 2KI.14.23
      - type: text
        text: ).
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Il était âgé de seize ans à son avènement et il régna cinquante-deux ans
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '15.2 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: De 792 à 740 av. J.-C. (avec une corégence de 792 à 767 avec Amatsia).
    marker-yv: yv-n
  - type: text
    text: ' à Jérusalem. Sa mère se nommait Yekolia. Elle était de Jérusalem. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Il fit ce que l’Eternel considère comme juste, imitant en tout point son père Amatsia. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Toutefois, il ne supprima pas les hauts lieux, et le peuple continuait à y offrir des sacrifices et à y brûler des parfums. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: L’Eternel frappa le roi d’une maladie de peau le rendant impur ; celui-ci en resta affecté jusqu’au jour de sa mort
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '15.5 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Selon '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 2 Ch 26.16-21
        metadata:
          usfm: 2CH.26.16+2CH.26.17+2CH.26.18+2CH.26.19+2CH.26.20+2CH.26.21
      - type: text
        text: ', Dieu a infligé cette affection de la peau au roi parce qu’il a usurpé les fonctions du prêtre.'
    marker-yv: yv-n
  - type: text
    text: ' et vécut dans une maison d’isolement'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '15.5 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Voir '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Lv 13.46
        metadata:
          usfm: LEV.13.46
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: . Yotam, le fils du roi, avait la charge du palais royal et gouvernait le peuple du pays
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '15.5 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Yotam a gouverné pendant le reste de la vie d’Azaria (de 750 à 740 av. J.-C.).
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Les autres faits et gestes d’Azaria et toutes ses réalisations sont cités dans le livre des Annales des rois de Juda. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Azaria rejoignit ses ancêtres décédés et fut enterré auprès d’eux dans la Cité de David, et son fils Yotam lui succéda sur le trône.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Le règne de Zacharie sur Israël
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: La trente-huitième année du règne d’Azaria, roi de Juda, Zacharie, fils de Jéroboam, devint roi d’Israël à Samarie. Il régna six mois
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '15.8 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: En 753 av. J.-C.
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Il fit ce que l’Eternel considère comme mal, comme ses ancêtres. Il n’abandonna pas les péchés dans lesquels Jéroboam, fils de Nebath, avait entraîné le peuple d’Israël. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Shalloum, fils de Yabesh, complota contre lui, il le frappa en présence du peuple
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '15.10 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: en présence du peuple
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: ': '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'certains manuscrits de l’ancienne version grecque ont : '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: à Yibleam.
    marker-yv: yv-n
  - type: text
    text: ' et le mit à mort, puis il lui succéda sur le trône. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Les autres faits et gestes de Zacharie sont cités dans le livre des Annales des rois d’Israël.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Ainsi s’accomplit ce que l’Eternel avait annoncé à Jéhu lorsqu’il lui avait dit : « Tes descendants te succéderont comme rois d’Israël jusqu’à la quatrième génération ! » C’est donc bien ce qui arriva'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '15.12 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Voir '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 2 R 10.30
        metadata:
          usfm: 2KI.10.30
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: s1
  children:
  - type: text
    text: Le règne de Shalloum sur Israël
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: La trente-neuvième année d’Ozias, roi de Juda, Shalloum, fils de Yabesh, devint roi. Il régna un mois à Samarie
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '15.13 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: En 752 av. J.-C.
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Un certain Menahem, fils de Gadi, venant de Tirtsa
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '15.14 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: L’ancienne capitale des rois d’Israël (1 R 14.17 ; 15.21, 33) où Menahem dirigeait probablement la garnison de l’armée.
    marker-yv: yv-n
  - type: text
    text: ', se rendit à Samarie. Il assassina Shalloum, fils de Yabesh, et lui succéda sur le trône. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Les autres faits et gestes de Shalloum, et le complot qu’il fomenta, sont cités dans le livre des Annales des rois d’Israël.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Après s’être emparé du pouvoir, Menahem attaqua la ville de Tiphsah
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '15.16 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Localité inconnue (il ne peut s’agir de Tiphsah sur l’Euphrate : '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1 R 5.4
        metadata:
          usfm: 1KI.5.4
      - type: text
        text: '). Certains suivent l’ancienne version grecque qui a : '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'Tappouah, '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: une ville située à la frontière entre Ephraïm et Manassé (Jos 16.8 ; 17.7-8).
    marker-yv: yv-n
  - type: text
    text: ', tua tous ses habitants et ravagea le territoire environnant depuis Tirtsa, parce que la ville avait refusé de lui ouvrir ses portes. Il éventra toutes les femmes enceintes.'
- type: usfm
  marker: s1
  children:
  - type: text
    text: Le règne de Menahem sur Israël
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: La trente-neuvième année du règne d’Azaria, roi de Juda, Menahem, fils de Gadi, devint roi d’Israël. Il régna dix ans à Samarie
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '15.17 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: De 752 à 742 av. J.-C.
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Il fit ce que l’Eternel considère comme mal. Pendant toute la durée de son règne, il n’abandonna pas les péchés dans lesquels Jéroboam, fils de Nebath, avait entraîné le peuple d’Israël
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '15.18 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Cf. 1 R 12.28-31 ; 15.26.
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: De son temps, Poul
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '15.19 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Poul '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'était le nom babylonien du roi assyrien Tiglath-Piléser III (v. 29 ; voir '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1 Ch 5.26
        metadata:
          usfm: 1CH.5.26
      - type: text
        text: ) qui a régné de 745 à 727 av. J.-C.
    marker-yv: yv-n
  - type: text
    text: ', roi d’Assyrie, envahit le pays ; mais Menahem lui donna trente-quatre tonnes d’argent pour qu’il l’aide à se maintenir sur le trône et à renforcer son pouvoir. '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Menahem se procura cet argent en prélevant un impôt sur tous les Israélites fortunés, à raison de cinquante pièces d’argent par personne, et il le versa au roi d’Assyrie. Celui-ci accepta de se retirer du pays et retourna chez lui.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Les autres faits et gestes de Menahem et toutes ses réalisations sont cités dans le livre des Annales des rois d’Israël. '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: Menahem rejoignit ses ancêtres décédés et son fils Peqahya lui succéda sur le trône.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Le règne de Peqahya sur Israël
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: La cinquantième année du règne d’Azaria, roi de Juda, Peqahya, fils de Menahem, devint roi d’Israël à Samarie où il régna deux ans
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '15.23 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: De 742 à 740 av. J.-C.
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Il fit ce que l’Eternel considère comme mal ; il n’abandonna pas les péchés dans lesquels Jéroboam, fils de Nebath, avait entraîné le peuple d’Israël. '
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'L’un de ses aides de camp nommé Péqah, fils de Remalia, conspira contre lui. Il l’assassina dans la forteresse intérieure du palais royal avec l’aide d’Argob et d’Arié et avec le concours de cinquante hommes de Galaad. Après l’avoir mis à mort, il lui succéda sur le trône. '
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: Les autres faits et gestes de Peqahya et toutes ses réalisations sont cités dans le livre des Annales des rois d’Israël.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Le règne de Péqah sur Israël
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: La cinquante-deuxième année du règne d’Azaria, roi de Juda, Péqah, fils de Remalia, devint roi sur Israël à Samarie. Il régna vingt ans
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '15.27 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: De 752 à 732 av. J.-C. Les données historiques suggèrent que Péqah a exercé, de 752 à 740 av. J.-C., un contre-pouvoir face à Menahem puis à Peqahya sur la rive est du Jourdain après l’assassinat de Shalloum par Menahem. Lors de son accession au pouvoir, ces années ont été comptabilisées dans la durée de son règne.
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'Il fit ce que l’Eternel considère comme mal : il n’abandonna pas les péchés dans lesquels Jéroboam, fils de Nebath, avait entraîné le peuple d’Israël. '
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'Sous le règne de Péqah, roi d’Israël, Tiglath-Piléser, roi d’Assyrie, fit une invasion et s’empara des villes de Iyôn, Abel-Beth-Maaka, Yanoah, Qédesh, Hatsor et Galaad ; il occupa aussi la Galilée et tout le territoire de Nephtali. Il en déporta les habitants en Assyrie. '
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'Osée, fils d’Ela, forma une conspiration contre Péqah, fils de Remalia, il l’assassina et lui succéda sur le trône au cours de la vingtième année du règne de Yotam, fils d’Ozias. '
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: Les autres faits et gestes de Péqah et toutes ses réalisations sont cités dans le livre des Annales des rois d’Israël.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Le règne de Yotam sur Juda
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '32'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: La deuxième année du règne de Péqah, fils de Remalia, roi d’Israël, Yotam, fils d’Ozias, devint roi de Juda.
- type: usfm
  marker: r
  children:
  - type: text
    text: (2 Ch 27.1-4,  7-9)
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '33'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: Il avait vingt-cinq ans à son avènement et il régna seize ans à Jérusalem
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '15.33 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'De 750 à 732 av. J.-C. (voir '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 2 Ch 27.1-6
        metadata:
          usfm: 2CH.27.1+2CH.27.2+2CH.27.3+2CH.27.4+2CH.27.5+2CH.27.6
      - type: text
        text: ). Yotam a exercé la corégence avec son père de 750 à 740. Son règne effectif a cessé en 735 lorsque son fils Ahaz a pris le gouvernement en main. Yotam a continué à vivre (avec le titre de roi) au moins jusqu’en 732.
    marker-yv: yv-n
  - type: text
    text: '. Le nom de sa mère était Yerousha, fille de Tsadoq. '
  - type: usfm
    marker: v
    metadata:
      v: '34'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: 'Il fit ce que l’Eternel considère comme juste et suivit en tout l’exemple de son père Ozias. '
  - type: usfm
    marker: v
    metadata:
      v: '35'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: 'Toutefois, les hauts lieux ne furent pas supprimés et le peuple continuait à y offrir des sacrifices et à y brûler des parfums. Yotam bâtit la porte supérieure du temple de l’Eternel. '
  - type: usfm
    marker: v
    metadata:
      v: '36'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: Les autres faits et gestes de Yotam sont cités dans le livre des Annales des rois de Juda.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '37'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: Pendant son règne, l’Eternel commença à envoyer contre Juda Retsîn, roi de Syrie, et Péqah, fils de Remalia
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
