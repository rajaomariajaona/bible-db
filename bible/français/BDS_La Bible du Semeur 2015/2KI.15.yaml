document_id: 2KI.15,21
type_code: fra
verses:
  '1':
  - type: heading
    content: Le règne d’Azaria sur Juda
  - type: heading
    content: (2 Ch 26.3-4,  21-23)
  - type: text
    content: Au cours de la vingt-septième année du règne de Jéroboam, roi d’Israël, Azaria, fils d’Amatsia, devint roi de Juda
  - type: note
    content: C’est-à-dire en 767 av. J.-C. (en datant le début de la corégence de Jéroboam II avec Joas en 793 ; voir 14.23).
  - type: text
    content: '. '
  '10':
  - type: text
    content: Shalloum, fils de Yabesh, complota contre lui, il le frappa en présence du peuple
  - type: note
    content: 'en présence du peuple: certains manuscrits de l’ancienne version grecque ont : à Yibleam.'
  - type: text
    content: ' et le mit à mort, puis il lui succéda sur le trône. '
  '11':
  - type: text
    content: Les autres faits et gestes de Zacharie sont cités dans le livre des Annales des rois d’Israël.
  '12':
  - type: text
    content: 'Ainsi s’accomplit ce que l’Eternel avait annoncé à Jéhu lorsqu’il lui avait dit : « Tes descendants te succéderont comme rois d’Israël jusqu’à la quatrième génération ! » C’est donc bien ce qui arriva'
  - type: note
    content: Voir 2 R 10.30.
  - type: text
    content: .
  - type: heading
    content: Le règne de Shalloum sur Israël
  '13':
  - type: text
    content: La trente-neuvième année d’Ozias, roi de Juda, Shalloum, fils de Yabesh, devint roi. Il régna un mois à Samarie
  - type: note
    content: En 752 av. J.-C.
  - type: text
    content: '. '
  '14':
  - type: text
    content: Un certain Menahem, fils de Gadi, venant de Tirtsa
  - type: note
    content: L’ancienne capitale des rois d’Israël (1 R 14.17 ; 15.21, 33) où Menahem dirigeait probablement la garnison de l’armée.
  - type: text
    content: ', se rendit à Samarie. Il assassina Shalloum, fils de Yabesh, et lui succéda sur le trône. '
  '15':
  - type: text
    content: Les autres faits et gestes de Shalloum, et le complot qu’il fomenta, sont cités dans le livre des Annales des rois d’Israël.
  '16':
  - type: text
    content: Après s’être emparé du pouvoir, Menahem attaqua la ville de Tiphsah
  - type: note
    content: 'Localité inconnue (il ne peut s’agir de Tiphsah sur l’Euphrate : 1 R 5.4). Certains suivent l’ancienne version grecque qui a : Tappouah, une ville située à la frontière entre Ephraïm et Manassé (Jos 16.8 ; 17.7-8).'
  - type: text
    content: ', tua tous ses habitants et ravagea le territoire environnant depuis Tirtsa, parce que la ville avait refusé de lui ouvrir ses portes. Il éventra toutes les femmes enceintes.'
  - type: heading
    content: Le règne de Menahem sur Israël
  '17':
  - type: text
    content: La trente-neuvième année du règne d’Azaria, roi de Juda, Menahem, fils de Gadi, devint roi d’Israël. Il régna dix ans à Samarie
  - type: note
    content: De 752 à 742 av. J.-C.
  - type: text
    content: '. '
  '18':
  - type: text
    content: Il fit ce que l’Eternel considère comme mal. Pendant toute la durée de son règne, il n’abandonna pas les péchés dans lesquels Jéroboam, fils de Nebath, avait entraîné le peuple d’Israël
  - type: note
    content: Cf. 1 R 12.28-31 ; 15.26.
  - type: text
    content: '. '
  '19':
  - type: text
    content: De son temps, Poul
  - type: note
    content: Poul était le nom babylonien du roi assyrien Tiglath-Piléser III (v. 29 ; voir 1 Ch 5.26) qui a régné de 745 à 727 av. J.-C.
  - type: text
    content: ', roi d’Assyrie, envahit le pays ; mais Menahem lui donna trente-quatre tonnes d’argent pour qu’il l’aide à se maintenir sur le trône et à renforcer son pouvoir. '
  '2':
  - type: text
    content: Il était âgé de seize ans à son avènement et il régna cinquante-deux ans
  - type: note
    content: De 792 à 740 av. J.-C. (avec une corégence de 792 à 767 avec Amatsia).
  - type: text
    content: ' à Jérusalem. Sa mère se nommait Yekolia. Elle était de Jérusalem. '
  '20':
  - type: text
    content: Menahem se procura cet argent en prélevant un impôt sur tous les Israélites fortunés, à raison de cinquante pièces d’argent par personne, et il le versa au roi d’Assyrie. Celui-ci accepta de se retirer du pays et retourna chez lui.
  '21':
  - type: text
    content: 'Les autres faits et gestes de Menahem et toutes ses réalisations sont cités dans le livre des Annales des rois d’Israël. '
  '22':
  - type: text
    content: Menahem rejoignit ses ancêtres décédés et son fils Peqahya lui succéda sur le trône.
  - type: heading
    content: Le règne de Peqahya sur Israël
  '23':
  - type: text
    content: La cinquantième année du règne d’Azaria, roi de Juda, Peqahya, fils de Menahem, devint roi d’Israël à Samarie où il régna deux ans
  - type: note
    content: De 742 à 740 av. J.-C.
  - type: text
    content: '. '
  '24':
  - type: text
    content: 'Il fit ce que l’Eternel considère comme mal ; il n’abandonna pas les péchés dans lesquels Jéroboam, fils de Nebath, avait entraîné le peuple d’Israël. '
  '25':
  - type: text
    content: 'L’un de ses aides de camp nommé Péqah, fils de Remalia, conspira contre lui. Il l’assassina dans la forteresse intérieure du palais royal avec l’aide d’Argob et d’Arié et avec le concours de cinquante hommes de Galaad. Après l’avoir mis à mort, il lui succéda sur le trône. '
  '26':
  - type: text
    content: Les autres faits et gestes de Peqahya et toutes ses réalisations sont cités dans le livre des Annales des rois d’Israël.
  - type: heading
    content: Le règne de Péqah sur Israël
  '27':
  - type: text
    content: La cinquante-deuxième année du règne d’Azaria, roi de Juda, Péqah, fils de Remalia, devint roi sur Israël à Samarie. Il régna vingt ans
  - type: note
    content: De 752 à 732 av. J.-C. Les données historiques suggèrent que Péqah a exercé, de 752 à 740 av. J.-C., un contre-pouvoir face à Menahem puis à Peqahya sur la rive est du Jourdain après l’assassinat de Shalloum par Menahem. Lors de son accession au pouvoir, ces années ont été comptabilisées dans la durée de son règne.
  - type: text
    content: '. '
  '28':
  - type: text
    content: 'Il fit ce que l’Eternel considère comme mal : il n’abandonna pas les péchés dans lesquels Jéroboam, fils de Nebath, avait entraîné le peuple d’Israël. '
  '29':
  - type: text
    content: 'Sous le règne de Péqah, roi d’Israël, Tiglath-Piléser, roi d’Assyrie, fit une invasion et s’empara des villes de Iyôn, Abel-Beth-Maaka, Yanoah, Qédesh, Hatsor et Galaad ; il occupa aussi la Galilée et tout le territoire de Nephtali. Il en déporta les habitants en Assyrie. '
  '3':
  - type: text
    content: 'Il fit ce que l’Eternel considère comme juste, imitant en tout point son père Amatsia. '
  '30':
  - type: text
    content: 'Osée, fils d’Ela, forma une conspiration contre Péqah, fils de Remalia, il l’assassina et lui succéda sur le trône au cours de la vingtième année du règne de Yotam, fils d’Ozias. '
  '31':
  - type: text
    content: Les autres faits et gestes de Péqah et toutes ses réalisations sont cités dans le livre des Annales des rois d’Israël.
  - type: heading
    content: Le règne de Yotam sur Juda
  '32':
  - type: text
    content: La deuxième année du règne de Péqah, fils de Remalia, roi d’Israël, Yotam, fils d’Ozias, devint roi de Juda.
  - type: heading
    content: (2 Ch 27.1-4,  7-9)
  '33':
  - type: text
    content: Il avait vingt-cinq ans à son avènement et il régna seize ans à Jérusalem
  - type: note
    content: De 750 à 732 av. J.-C. (voir 2 Ch 27.1-6). Yotam a exercé la corégence avec son père de 750 à 740. Son règne effectif a cessé en 735 lorsque son fils Ahaz a pris le gouvernement en main. Yotam a continué à vivre (avec le titre de roi) au moins jusqu’en 732.
  - type: text
    content: '. Le nom de sa mère était Yerousha, fille de Tsadoq. '
  '34':
  - type: text
    content: 'Il fit ce que l’Eternel considère comme juste et suivit en tout l’exemple de son père Ozias. '
  '35':
  - type: text
    content: 'Toutefois, les hauts lieux ne furent pas supprimés et le peuple continuait à y offrir des sacrifices et à y brûler des parfums. Yotam bâtit la porte supérieure du temple de l’Eternel. '
  '36':
  - type: text
    content: Les autres faits et gestes de Yotam sont cités dans le livre des Annales des rois de Juda.
  '37':
  - type: text
    content: Pendant son règne, l’Eternel commença à envoyer contre Juda Retsîn, roi de Syrie, et Péqah, fils de Remalia
  - type: note
    content: Voir Es 7.8.
  - type: text
    content: '. '
  '38':
  - type: text
    content: Yotam rejoignit ses ancêtres décédés et fut enterré à leurs côtés dans la Cité de David, son ancêtre. Son fils Ahaz lui succéda sur le trône.
  '4':
  - type: text
    content: 'Toutefois, il ne supprima pas les hauts lieux, et le peuple continuait à y offrir des sacrifices et à y brûler des parfums. '
  '5':
  - type: text
    content: L’Eternel frappa le roi d’une maladie de peau le rendant impur ; celui-ci en resta affecté jusqu’au jour de sa mort
  - type: note
    content: Selon 2 Ch 26.16-21, Dieu a infligé cette affection de la peau au roi parce qu’il a usurpé les fonctions du prêtre.
  - type: text
    content: ' et vécut dans une maison d’isolement'
  - type: note
    content: Voir Lv 13.46.
  - type: text
    content: . Yotam, le fils du roi, avait la charge du palais royal et gouvernait le peuple du pays
  - type: note
    content: Yotam a gouverné pendant le reste de la vie d’Azaria (de 750 à 740 av. J.-C.).
  - type: text
    content: .
  '6':
  - type: text
    content: 'Les autres faits et gestes d’Azaria et toutes ses réalisations sont cités dans le livre des Annales des rois de Juda. '
  '7':
  - type: text
    content: Azaria rejoignit ses ancêtres décédés et fut enterré auprès d’eux dans la Cité de David, et son fils Yotam lui succéda sur le trône.
  - type: heading
    content: Le règne de Zacharie sur Israël
  '8':
  - type: text
    content: La trente-huitième année du règne d’Azaria, roi de Juda, Zacharie, fils de Jéroboam, devint roi d’Israël à Samarie. Il régna six mois
  - type: note
    content: En 753 av. J.-C.
  - type: text
    content: '. '
  '9':
  - type: text
    content: 'Il fit ce que l’Eternel considère comme mal, comme ses ancêtres. Il n’abandonna pas les péchés dans lesquels Jéroboam, fils de Nebath, avait entraîné le peuple d’Israël. '
