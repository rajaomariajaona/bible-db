document_id: PSA.125,21
type_code: fra
verses:
  '1':
  - type: heading
    content: Sécurité inébranlable
  - type: text
    content: Cantique pour la route vers la demeure de l’Eternel
  - type: note
    content: Voir note 120.1.
  - type: text
    content: .
  - type: text
    content: Ceux qui ont placé leur confiance ╵en l’Eternel
  - type: text
    content: 'sont comme le mont de Sion : ╵il n’est pas ébranlé'
  - type: text
    content: et subsiste à jamais.
  '2':
  - type: text
    content: Comme Jérusalem ╵est entourée par des montagnes,
  - type: text
    content: l’Eternel entoure son peuple
  - type: text
    content: dès maintenant ╵et à jamais.
  '3':
  - type: text
    content: Un pouvoir criminel ╵ne pourra dominer
  - type: text
    content: sur le territoire échu en partage aux justes,
  - type: text
    content: afin que les justes n’en viennent pas ╵à prêter eux aussi la main ╵à des actes coupables.
  '4':
  - type: text
    content: Fais du bien, Eternel, ╵à celui qui est bon,
  - type: text
    content: à celui qui a le cœur droit !
  '5':
  - type: text
    content: Mais ceux qui se détournent ╵vers des voies tortueuses,
  - type: text
    content: que l’Eternel les chasse
  - type: text
    content: avec tous ceux qui font le mal !
  - type: text
    content: Que la paix soit sur Israël !
