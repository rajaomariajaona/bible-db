document_id: PSA.125
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Sécurité inébranlable
  marker-yv: yv-h
- type: usfm
  marker: d
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Cantique pour la route vers la demeure de l’Eternel
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '125.1 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Voir note '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '120.1'
        metadata:
          usfm: PSA.120.1
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ceux qui ont placé leur confiance ╵en l’Eternel
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'sont comme le mont de Sion : ╵il n’est pas ébranlé'
- type: usfm
  marker: q1
  children:
  - type: text
    text: et subsiste à jamais.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Comme Jérusalem ╵est entourée par des montagnes,
- type: usfm
  marker: q1
  children:
  - type: text
    text: l’Eternel entoure son peuple
- type: usfm
  marker: q1
  children:
  - type: text
    text: dès maintenant ╵et à jamais.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Un pouvoir criminel ╵ne pourra dominer
- type: usfm
  marker: q1
  children:
  - type: text
    text: sur le territoire échu en partage aux justes,
- type: usfm
  marker: q1
  children:
  - type: text
    text: afin que les justes n’en viennent pas ╵à prêter eux aussi la main ╵à des actes coupables.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Fais du bien, Eternel, ╵à celui qui est bon,
- type: usfm
  marker: q1
  children:
  - type: text
    text: à celui qui a le cœur droit !
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Mais ceux qui se détournent ╵vers des voies tortueuses,
- type: usfm
  marker: q1
  children:
  - type: text
    text: que l’Eternel les chasse
- type: usfm
  marker: q1
  children:
  - type: text
    text: avec tous ceux qui font le mal !
- type: usfm
  marker: q1
  children:
  - type: text
    text: Que la paix soit sur Israël !
