document_id: 1SA.3,21
type_code: fra
verses:
  '1':
  - type: heading
    content: Dieu parle à Samuel
  - type: text
    content: 'Le jeune Samuel accomplissait le service de l’Eternel auprès d’Eli. A cette époque, l’Eternel parlait rarement aux hommes et les révélations que Dieu leur montrait n’étaient pas fréquentes. '
  '10':
  - type: text
    content: 'L’Eternel vint se placer près de lui et il l’appela comme les autres fois : Samuel ! Samuel !'
  - type: text
    content: 'Celui-ci répondit : Parle, car ton serviteur écoute.'
  '11':
  - type: text
    content: 'Alors l’Eternel dit à Samuel : Voici, je vais faire quelque chose en Israël qui abasourdira tous ceux qui l’apprendront. '
  '12':
  - type: text
    content: 'J’accomplirai à l’égard d’Eli toutes les menaces que j’ai prononcées contre sa famille, du début à la fin. '
  '13':
  - type: text
    content: Je l’ai averti que j’exerce mon jugement sur sa famille pour toujours parce qu’il a su la faute de ses fils qui se rendent méprisables
  - type: note
    content: 'L’ancienne version grecque a : qui blasphémaient Dieu.'
  - type: text
    content: ', et il ne les a pas châtiés. '
  '14':
  - type: text
    content: C’est pourquoi je déclare solennellement à la famille d’Eli qu’aucun sacrifice, aucune offrande n’expiera jamais leur faute.
  '15':
  - type: text
    content: 'Samuel resta couché jusqu’au matin, puis il se leva pour ouvrir les portes du sanctuaire de l’Eternel. Il redoutait de devoir rapporter à Eli ce qui venait de lui être révélé. '
  '16':
  - type: text
    content: 'Mais Eli l’appela et lui dit : Samuel, mon fils !'
  - type: text
    content: – Oui, je suis là, répondit l’enfant.
  '17':
  - type: text
    content: – Qu’est-ce qu’il t’a dit ? lui demanda Eli. Ne me cache rien. Que Dieu te punisse sévèrement si tu me caches un seul mot de tout ce qu’il t’a dit.
  '18':
  - type: text
    content: 'Alors Samuel lui rapporta toutes les paroles de l’Eternel sans rien lui cacher. Eli déclara : C’est l’Eternel. Qu’il fasse ce qu’il jugera bon !'
  '19':
  - type: text
    content: 'Samuel grandissait, et l’Eternel était avec lui et ne laissait aucune de ses paroles rester sans effet. '
  '2':
  - type: text
    content: 'Une nuit, le prêtre Eli, dont la vue s’était très affaiblie et qui était presque aveugle, était couché dans sa chambre. '
  '20':
  - type: text
    content: Si bien que tout Israël, depuis Dan jusqu’à Beer-Sheva
  - type: note
    content: Formule consacrée pour désigner tout le pays d’Israël, du nord (Dan) au sud (Beer-Sheva) (voir Jg 20.1).
  - type: text
    content: ', reconnut que Samuel était vraiment un prophète de l’Eternel. '
  '21':
  - type: text
    content: L’Eternel continua de se manifester à Silo. Là, il se révélait à Samuel et lui communiquait sa parole. [Eli devint très vieux et ses fils se conduisaient de plus en plus mal aux yeux de l’Eternel
  - type: note
    content: Les mots entre crochets ne se trouvent que dans l’ancienne version grecque.
  - type: text
    content: .]
  '3':
  - type: text
    content: La lampe sacrée
  - type: note
    content: La lampe du chandelier d’or dans le lieu saint devait brûler toute la nuit (Ex 27.20-21 ; 30.7-8 ; Lv 24.3-4 ; 2 Ch 13.11). C’était donc vers le matin, mais avant l’aube.
  - type: text
    content: ' brûlait encore et Samuel dormait dans le sanctuaire de l’Eternel, là où était déposé le coffre de Dieu. '
  '4':
  - type: text
    content: 'L’Eternel appela Samuel ; celui-ci répondit : Oui, je suis là !'
  '5':
  - type: text
    content: 'Il courut vers Eli et lui dit : Tu m’as appelé, je suis là.'
  - type: text
    content: – Je n’ai pas appelé, lui dit Eli, retourne te coucher.
  - type: text
    content: 'Et Samuel alla se recoucher. '
  '6':
  - type: text
    content: 'L’Eternel appela encore : Samuel !'
  - type: text
    content: Samuel se leva et retourna auprès d’Eli.
  - type: text
    content: – Tu m’as appelé, je suis là, lui dit-il.
  - type: text
    content: – Je n’ai pas appelé, mon fils, lui dit Eli, va te recoucher.
  '7':
  - type: text
    content: Or Samuel ne connaissait pas encore l’Eternel et celui-ci ne lui avait encore jamais parlé directement.
  '8':
  - type: text
    content: 'L’Eternel appela Samuel pour la troisième fois ; celui-ci se leva, se rendit auprès d’Eli et lui répéta : Me voici, car tu m’as appelé.'
  - type: text
    content: 'Alors Eli comprit que c’était l’Eternel qui appelait le jeune garçon '
  '9':
  - type: text
    content: 'et il dit à Samuel : Va, couche-toi, et si on t’appelle, tu diras : « Parle, Eternel, car ton serviteur écoute. »'
  - type: text
    content: Samuel alla donc se coucher à sa place.
