document_id: 1SA.3,21
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Dieu parle à Samuel
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Le jeune Samuel accomplissait le service de l’Eternel auprès d’Eli. A cette époque, l’Eternel parlait rarement aux hommes et les révélations que Dieu leur montrait n’étaient pas fréquentes. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'L’Eternel vint se placer près de lui et il l’appela comme les autres fois : Samuel ! Samuel !'
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Celui-ci répondit : Parle, car ton serviteur écoute.'
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'Alors l’Eternel dit à Samuel : Voici, je vais faire quelque chose en Israël qui abasourdira tous ceux qui l’apprendront. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'J’accomplirai à l’égard d’Eli toutes les menaces que j’ai prononcées contre sa famille, du début à la fin. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: Je l’ai averti que j’exerce mon jugement sur sa famille pour toujours parce qu’il a su la faute de ses fils qui se rendent méprisables
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '3.13 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'L’ancienne version grecque a : '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: qui blasphémaient Dieu.
      marker-yv: yv-n
    - type: text
      text: ', et il ne les a pas châtiés. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: C’est pourquoi je déclare solennellement à la famille d’Eli qu’aucun sacrifice, aucune offrande n’expiera jamais leur faute.
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'Samuel resta couché jusqu’au matin, puis il se leva pour ouvrir les portes du sanctuaire de l’Eternel. Il redoutait de devoir rapporter à Eli ce qui venait de lui être révélé. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'Mais Eli l’appela et lui dit : Samuel, mon fils !'
  - type: usfm
    marker: p
    children:
    - type: text
      text: – Oui, je suis là, répondit l’enfant.
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: – Qu’est-ce qu’il t’a dit ? lui demanda Eli. Ne me cache rien. Que Dieu te punisse sévèrement si tu me caches un seul mot de tout ce qu’il t’a dit.
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'Alors Samuel lui rapporta toutes les paroles de l’Eternel sans rien lui cacher. Eli déclara : C’est l’Eternel. Qu’il fasse ce qu’il jugera bon !'
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'Samuel grandissait, et l’Eternel était avec lui et ne laissait aucune de ses paroles rester sans effet. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'Une nuit, le prêtre Eli, dont la vue s’était très affaiblie et qui était presque aveugle, était couché dans sa chambre. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: Si bien que tout Israël, depuis Dan jusqu’à Beer-Sheva
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '3.20 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Formule consacrée pour désigner tout le pays d’Israël, du nord (Dan) au sud (Beer-Sheva) (voir '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: Jg 20.1
        - type: text
          text: ).
      marker-yv: yv-n
    - type: text
      text: ', reconnut que Samuel était vraiment un prophète de l’Eternel. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: L’Eternel continua de se manifester à Silo. Là, il se révélait à Samuel et lui communiquait sa parole. [Eli devint très vieux et ses fils se conduisaient de plus en plus mal aux yeux de l’Eternel
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '3.21 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Les mots entre crochets ne se trouvent que dans l’ancienne version grecque.
      marker-yv: yv-n
    - type: text
      text: .]
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: La lampe sacrée
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '3.3 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: La lampe du chandelier d’or dans le lieu saint devait brûler toute la nuit (Ex 27.20-21 ; 30.7-8 ; Lv 24.3-4 ; 2 Ch 13.11). C’était donc vers le matin, mais avant l’aube.
      marker-yv: yv-n
    - type: text
      text: ' brûlait encore et Samuel dormait dans le sanctuaire de l’Eternel, là où était déposé le coffre de Dieu. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'L’Eternel appela Samuel ; celui-ci répondit : Oui, je suis là !'
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'Il courut vers Eli et lui dit : Tu m’as appelé, je suis là.'
  - type: usfm
    marker: p
    children:
    - type: text
      text: – Je n’ai pas appelé, lui dit Eli, retourne te coucher.
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Et Samuel alla se recoucher. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'L’Eternel appela encore : Samuel !'
  - type: usfm
    marker: p
    children:
    - type: text
      text: Samuel se leva et retourna auprès d’Eli.
  - type: usfm
    marker: p
    children:
    - type: text
      text: – Tu m’as appelé, je suis là, lui dit-il.
  - type: usfm
    marker: p
    children:
    - type: text
      text: – Je n’ai pas appelé, mon fils, lui dit Eli, va te recoucher.
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: Or Samuel ne connaissait pas encore l’Eternel et celui-ci ne lui avait encore jamais parlé directement.
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'L’Eternel appela Samuel pour la troisième fois ; celui-ci se leva, se rendit auprès d’Eli et lui répéta : Me voici, car tu m’as appelé.'
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Alors Eli comprit que c’était l’Eternel qui appelait le jeune garçon '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'et il dit à Samuel : Va, couche-toi, et si on t’appelle, tu diras : « Parle, Eternel, car ton serviteur écoute. »'
  - type: usfm
    marker: p
    children:
    - type: text
      text: Samuel alla donc se coucher à sa place.
