document_id: ISA.50,21
type_code: fra
verses:
  '1':
  - type: heading
    content: L’Eternel veut vous délivrer
  - type: text
    content: 'Voici ce que dit l’Eternel :'
  - type: text
    content: Où est la lettre de divorce
  - type: text
    content: en vertu de laquelle ╵j’aurais répudié votre mère ?
  - type: text
    content: Ou auquel de mes créanciers ╵vous ai-je donc vendus ?
  - type: text
    content: Non, vous avez été vendus
  - type: text
    content: à cause de vos fautes,
  - type: text
    content: et ce sont vos révoltes
  - type: text
    content: qui ont été la cause ╵de la répudiation de votre mère.
  '10':
  - type: text
    content: Qui parmi vous ╵craint l’Eternel ?
  - type: text
    content: qu’il écoute
  - type: note
    content: 'Selon l’ancienne version grecque et la version syriaque. Le texte hébreu traditionnel porte : en écoutant.'
  - type: text
    content: ' son serviteur !'
  - type: text
    content: Si quelqu’un marche ╵dans les ténèbres
  - type: text
    content: sans avoir de lumière,
  - type: text
    content: qu’il place sa confiance ╵en l’Eternel,
  - type: text
    content: qu’il s’appuie sur son Dieu !
  '11':
  - type: text
    content: Mais vous qui allumez un feu,
  - type: text
    content: qui vous armez ╵de flèches embrasées,
  - type: text
    content: allez donc dans les flammes ╵de votre propre feu
  - type: text
    content: et au milieu des flèches ╵embrasées par vous-mêmes.
  - type: text
    content: C’est de par moi ╵que cela vous arrivera,
  - type: text
    content: et c’est dans la douleur ╵que vous vous coucherez.
  '2':
  - type: text
    content: Lorsque je suis venu, ╵pourquoi n’y avait-il personne ?
  - type: text
    content: Lorsque j’ai appelé, ╵pourquoi nul n’a-t-il répondu ?
  - type: text
    content: Croyez-vous que ma main ╵soit devenue trop courte ╵pour délivrer ?
  - type: text
    content: Que, pour vous libérer, ╵je n’aurais pas la force ?
  - type: text
    content: Pourtant, par ma menace, ╵je mets la mer à sec,
  - type: text
    content: et je réduis les fleuves ╵en un désert.
  - type: text
    content: Leurs poissons pourrissent alors ╵par manque d’eau,
  - type: text
    content: ils périssent de soif.
  '3':
  - type: text
    content: J’habillerai le ciel de noir
  - type: text
    content: et je le couvrirai ╵d’un habit de toile de sac.
  - type: heading
    content: Le troisième chant du Serviteur
  '4':
  - type: text
    content: Le Seigneur, l’Eternel,
  - type: text
    content: m’a donné une langue ╵de disciple attentif
  - type: text
    content: pour que, par ma parole, ╵je sache fortifier
  - type: text
    content: ceux qui sont fatigués.
  - type: text
    content: Et il me fait tendre l’oreille
  - type: text
    content: matin après matin,
  - type: text
    content: afin que je l’écoute
  - type: text
    content: comme un disciple.
  '5':
  - type: text
    content: Le Seigneur, l’Eternel, ╵a ouvert mon oreille,
  - type: text
    content: et moi, de mon côté, ╵je n’ai pas résisté,
  - type: text
    content: je ne me suis pas éclipsé.
  '6':
  - type: text
    content: J’ai présenté mon dos ╵à ceux qui me frappaient
  - type: text
    content: et j’ai tendu mes joues ╵à ceux qui m’arrachaient la barbe.
  - type: text
    content: Je n’ai pas caché mon visage
  - type: text
    content: à ceux qui m’insultaient ╵et qui crachaient sur moi
  - type: note
    content: Voir Mt 26.67 ; Mc 14.65.
  - type: text
    content: .
  '7':
  - type: text
    content: Le Seigneur, l’Eternel, ╵viendra à mon secours ;
  - type: text
    content: voilà pourquoi je ne suis pas confus ;
  - type: text
    content: c’est pourquoi j’ai rendu ma face ╵dure comme un caillou,
  - type: text
    content: 'car je le sais : ╵je ne serai pas dans la honte.'
  '8':
  - type: text
    content: Il est tout proche, ╵celui qui me justifiera.
  - type: text
    content: Qui veut m’intenter un procès ?
  - type: text
    content: Comparaissons ensemble !
  - type: text
    content: Qui conteste mon droit ?
  - type: text
    content: Qu’il s’approche de moi !
  '9':
  - type: text
    content: Le Seigneur, l’Eternel, ╵viendra à mon secours,
  - type: text
    content: qui me condamnera ?
  - type: text
    content: 'Mes adversaires ╵tomberont tous en loques, ╵comme de vieux habits :'
  - type: text
    content: les mites les dévoreront.
