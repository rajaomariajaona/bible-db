document_id: ISA.50,21
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: L’Eternel veut vous délivrer
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Voici ce que dit l’Eternel :'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Où est la lettre de divorce
  - type: usfm
    marker: q1
    children:
    - type: text
      text: en vertu de laquelle ╵j’aurais répudié votre mère ?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ou auquel de mes créanciers ╵vous ai-je donc vendus ?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Non, vous avez été vendus
  - type: usfm
    marker: q1
    children:
    - type: text
      text: à cause de vos fautes,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et ce sont vos révoltes
  - type: usfm
    marker: q1
    children:
    - type: text
      text: qui ont été la cause ╵de la répudiation de votre mère.
  '10':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: Qui parmi vous ╵craint l’Eternel ?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: qu’il écoute
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '50.10 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Selon l’ancienne version grecque et la version syriaque. Le texte hébreu traditionnel porte : '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: en écoutant.
      marker-yv: yv-n
    - type: text
      text: ' son serviteur !'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Si quelqu’un marche ╵dans les ténèbres
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sans avoir de lumière,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: qu’il place sa confiance ╵en l’Eternel,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: qu’il s’appuie sur son Dieu !
  '11':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: Mais vous qui allumez un feu,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: qui vous armez ╵de flèches embrasées,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: allez donc dans les flammes ╵de votre propre feu
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et au milieu des flèches ╵embrasées par vous-mêmes.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: C’est de par moi ╵que cela vous arrivera,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et c’est dans la douleur ╵que vous vous coucherez.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: Lorsque je suis venu, ╵pourquoi n’y avait-il personne ?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Lorsque j’ai appelé, ╵pourquoi nul n’a-t-il répondu ?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Croyez-vous que ma main ╵soit devenue trop courte ╵pour délivrer ?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Que, pour vous libérer, ╵je n’aurais pas la force ?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Pourtant, par ma menace, ╵je mets la mer à sec,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et je réduis les fleuves ╵en un désert.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Leurs poissons pourrissent alors ╵par manque d’eau,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ils périssent de soif.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: J’habillerai le ciel de noir
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et je le couvrirai ╵d’un habit de toile de sac.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Le troisième chant du Serviteur
    marker-yv: yv-h
  '4':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: Le Seigneur, l’Eternel,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: m’a donné une langue ╵de disciple attentif
  - type: usfm
    marker: q1
    children:
    - type: text
      text: pour que, par ma parole, ╵je sache fortifier
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ceux qui sont fatigués.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et il me fait tendre l’oreille
  - type: usfm
    marker: q1
    children:
    - type: text
      text: matin après matin,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: afin que je l’écoute
  - type: usfm
    marker: q1
    children:
    - type: text
      text: comme un disciple.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: Le Seigneur, l’Eternel, ╵a ouvert mon oreille,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et moi, de mon côté, ╵je n’ai pas résisté,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: je ne me suis pas éclipsé.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: J’ai présenté mon dos ╵à ceux qui me frappaient
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et j’ai tendu mes joues ╵à ceux qui m’arrachaient la barbe.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Je n’ai pas caché mon visage
  - type: usfm
    marker: q1
    children:
    - type: text
      text: à ceux qui m’insultaient ╵et qui crachaient sur moi
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '50.6 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Voir Mt 26.67 ; Mc 14.65.
      marker-yv: yv-n
    - type: text
      text: .
  '7':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: Le Seigneur, l’Eternel, ╵viendra à mon secours ;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: voilà pourquoi je ne suis pas confus ;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: c’est pourquoi j’ai rendu ma face ╵dure comme un caillou,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'car je le sais : ╵je ne serai pas dans la honte.'
  '8':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: Il est tout proche, ╵celui qui me justifiera.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Qui veut m’intenter un procès ?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Comparaissons ensemble !
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Qui conteste mon droit ?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Qu’il s’approche de moi !
  '9':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: Le Seigneur, l’Eternel, ╵viendra à mon secours,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: qui me condamnera ?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Mes adversaires ╵tomberont tous en loques, ╵comme de vieux habits :'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: les mites les dévoreront.
