document_id: NUM.16,21
type_code: fra
verses:
  '1':
  - type: heading
    content: Les nouvelles révoltes
  - type: heading
    content: La révolte de QoréJd 11 fait allusion au récit contenu dans ce chapitre.
  - type: text
    content: 'Qoré, un lévite, fils de Yitsehar, de la famille des Qehatites, conspira avec trois Rubénites : Datan, Abiram, fils d’Eliab, et On, fils de Péleth. '
  '10':
  - type: text
    content: 'Il vous permet, à toi et à tous tes frères lévites, de vous approcher de lui, et vous réclamez en plus le sacerdoce ! '
  '11':
  - type: text
    content: C’est pour cela que toi et toute ta troupe, vous vous liguez contre l’Eternel ! Car en fait, qu’est Aaron pour que vous protestiez contre lui ?
  '12':
  - type: text
    content: 'Puis Moïse envoya chercher Datan et Abiram, fils d’Eliab. Mais ceux-ci lui répondirent : Nous n’irons pas ! '
  '13':
  - type: text
    content: 'Ne te suffit-il pas de nous avoir fait quitter un pays ruisselant de lait et de miel pour nous faire mourir au désert ? Faut-il encore que tu t’ériges en dictateur au-dessus de nous ? '
  '14':
  - type: text
    content: Ce n’est pas dans un pays ruisselant de lait et de miel que tu nous as conduits ! Ce ne sont pas des champs et des vignes que tu nous as donnés en possession ! Prends-tu tous ces gens-là pour des aveugles ? Non, nous n’irons pas !
  '15':
  - type: text
    content: 'Moïse entra dans une violente colère et il dit à l’Eternel : N’accepte pas leur offrande ! Je n’ai jamais rien pris de ce qui leur appartenait, pas même un âne, et je n’ai fait de tort à aucun d’eux.'
  - type: heading
    content: Le châtiment des révoltés
  '16':
  - type: text
    content: 'Moïse dit à Qoré : Toi et toute ta troupe, présentez-vous demain avec Aaron devant l’Eternel. '
  '17':
  - type: text
    content: Prenez chacun votre encensoir, mettez-y de l’encens et présentez-vous devant l’Eternel avec vos deux cent cinquante encensoirs ; toi aussi et Aaron vous tiendrez chacun le vôtre.
  '18':
  - type: text
    content: 'Chacun prit donc son encensoir et y mit des charbons ardents qu’il couvrit d’encens. Ils se placèrent tous à l’entrée de la tente de la Rencontre, de même que Moïse et Aaron. '
  '19':
  - type: text
    content: Qoré avait rassemblé toute la communauté à l’entrée de la tente de la Rencontre en l’excitant contre eux.
  - type: text
    content: 'Soudain, la gloire de l’Eternel apparut à toute l’assemblée. '
  '2':
  - type: text
    content: 'Ils se soulevèrent contre Moïse avec deux cent cinquante autres Israélites, des chefs de la communauté, des membres du conseil, des hommes considérés. '
  '20':
  - type: text
    content: 'L’Eternel parla à Moïse et à Aaron en ces termes : '
  '21':
  - type: text
    content: Séparez-vous du milieu de cette communauté, et je les consumerai en un seul instant !
  '22':
  - type: text
    content: 'Mais ils se jetèrent face contre terre et prièrent : O Dieu ! Dieu qui disposes du souffle de vie de toutes les créatures, t’emporteras-tu contre toute la communauté alors qu’un seul homme a péché ?'
  '23':
  - type: text
    content: 'L’Eternel répondit à Moïse : '
  '24':
  - type: text
    content: Parle à la communauté et ordonne-leur de s’écarter des abords des tentes de Qoré, de Datan et d’Abiram.
  '25':
  - type: text
    content: 'Moïse se releva et, suivi des responsables d’Israël, il marcha vers Datan et Abiram, '
  '26':
  - type: text
    content: 'et il dit à la communauté : Eloignez-vous des tentes de ces hommes méchants et ne touchez à rien de ce qui leur appartient, si vous ne voulez pas périr, vous aussi, à cause de toutes leurs fautes !'
  '27':
  - type: text
    content: Aussitôt, on s’éloigna des tentes de Qoré, de Datan et d’Abiram. Datan et Abiram sortirent et se postèrent à l’entrée de leurs tentes avec leurs femmes, leurs fils et leurs enfants.
  '28':
  - type: text
    content: 'Moïse déclara : Voici comment vous reconnaîtrez que l’Eternel m’a confié la mission d’accomplir tout ce que je fais et que je n’agis pas de mon propre chef : '
  '29':
  - type: text
    content: 'Si ces gens-là meurent de mort naturelle, et s’ils subissent seulement le sort commun à tous les hommes, alors ce n’est pas l’Eternel qui m’a confié ma mission. '
  '3':
  - type: text
    content: 'Ils s’attroupèrent autour de Moïse et d’Aaron et leur lancèrent : C’en est assez ! C’est la communauté tout entière qui est sainte et l’Eternel est au milieu de nous tous. De quel droit vous mettez-vous au-dessus de la communauté de l’Eternel ?'
  '30':
  - type: text
    content: Mais si l’Eternel accomplit quelque chose d’extraordinaire, si la terre s’ouvre pour les engloutir avec tout ce qui leur appartient et qu’ils descendent vivants dans le séjour des morts, alors vous reconnaîtrez que ces gens ont outragé l’Eternel.
  '31':
  - type: text
    content: 'A peine eut-il achevé de prononcer ces paroles, que le sol se fendit sous les pieds de Datan et d’Abiram. '
  '32':
  - type: text
    content: La terre s’ouvrit et les engloutit, eux et les leurs, ainsi que tous les partisans de Qoré et tous leurs biens
  - type: note
    content: Certains membres de la famille n’ont pas dû suivre Qoré dans sa révolte et furent épargnés (voir 26.11). Samuel et les chantres, auteurs de psaumes, furent parmi ses descendants (1 Ch 6.33-38 ; Ps 84.1).
  - type: text
    content: '. '
  '33':
  - type: text
    content: 'Ces hommes descendirent vivants dans le séjour des morts avec tous les leurs, et la terre se referma sur eux. C’est ainsi qu’ils disparurent du milieu de l’assemblée. '
  '34':
  - type: text
    content: 'A leurs cris, tous les Israélites, qui se tenaient autour, s’enfuirent en criant : Fuyons, de peur que la terre ne nous engloutisse, nous aussi !'
  '35':
  - type: text
    content: Un feu jaillit d’auprès de l’Eternel et consuma les deux cent cinquante hommes qui présentaient l’encens.
  '4':
  - type: text
    content: 'En entendant ces reproches, Moïse se jeta face contre terre. '
  '5':
  - type: text
    content: 'Puis il s’adressa à Qoré et à toute sa troupe en disant : Demain matin, l’Eternel fera connaître celui qui lui appartient'
  - type: note
    content: Allusion en 2 Tm 2.19.
  - type: text
    content: ' et qui est saint et peut venir en sa présence : il fera approcher de lui celui qu’il choisira. '
  '6':
  - type: text
    content: 'Voilà donc ce que vous ferez : Que Qoré et tous ses partisans prennent des encensoirs'
  - type: note
    content: Sans doute les pelles à braise en bronze (voir 4.14 ; 17.3) ; souvent traduit cassolettes. Faire fumer de l’encens était la tâche des prêtres (Ex 30.7-8 ; Lv 10.1).
  - type: text
    content: ', '
  '7':
  - type: text
    content: qu’ils les remplissent demain de charbons embrasés, et y répandent de l’encens devant l’Eternel. C’est celui que l’Eternel choisira, qui est saint. C’en est assez, descendants de Lévi !
  '8':
  - type: text
    content: 'Puis Moïse ajouta à l’adresse de Qoré : Ecoutez-moi bien, vous les lévites ! '
  '9':
  - type: text
    content: 'Ne vous suffit-il pas d’avoir été mis à part du reste de la communauté d’Israël par le Dieu d’Israël qui vous permet de l’approcher pour faire le service du tabernacle de l’Eternel et pour vous tenir devant la communauté en accomplissant un ministère en sa faveur ? '
