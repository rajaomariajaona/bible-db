document_id: LUK.3
type_code: fra
segments:
- type: usfm
  marker: ms1
  children:
  - type: text
    text: Préparation du ministère de Jésus
  marker-yv: yv-h
- type: usfm
  marker: s1
  children:
  - type: text
    text: Jean-Baptiste, messager de Dieu
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: (Mt 3.1-10 ; Mc 1.1-6)
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: La quinzième année du règne de l’empereur Tibère
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '3.1 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Successeur d’Auguste, empereur à Rome de 14 à 37 apr. J.-C. Jean a donc commencé son ministère aux environs de l’année 28.
    marker-yv: yv-n
  - type: text
    text: ', Ponce Pilate'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '3.1 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Ponce Pilate '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: fut gouverneur du territoire israélite de 26 à 36 apr. J.-C.
    marker-yv: yv-n
  - type: text
    text: ' était gouverneur de la Judée, Hérode régnait sur la Galilée comme tétrarque, son frère Philippe sur l’Iturée et la Trachonitide, Lysanias sur l’Abilène'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '3.1 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: L’
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'Iturée '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'et la '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'Trachonitide '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'sont deux régions situées au sud-est du Liban. '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: l’Abilène
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: ': '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: district situé à 27 kilomètres au nord-ouest de Damas.
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Hanne et Caïphe étaient grands-prêtres
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '3.2 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Hanne '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: avait été grand-prêtre avant l’an 15. Il continuait à exercer son influence sous Caïphe, son successeur (qui était son gendre), titulaire de l’office de 18 à 36.
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Cette année-là, Dieu adressa la parole à Jean, fils de Zacharie, dans le désert. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Jean se mit à parcourir toute la région du Jourdain. Il appelait les gens à se faire baptiser en signe d’un profond changement
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '3.3 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Autres traductions : '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'se faire baptiser en signe de repentance, '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'ou '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: pour indiquer qu’ils changeaient de comportement.
    marker-yv: yv-n
  - type: text
    text: ', afin de recevoir le pardon de leurs péchés. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Ainsi s’accomplit ce que le prophète Esaïe avait écrit dans son livre :'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: qt
    children:
    - type: text
      text: On entend la voix de quelqu’un
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: qt
    children:
    - type: text
      text: 'qui crie dans le désert :'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: qt
    children:
    - type: text
      text: Préparez le chemin pour le Seigneur,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: qt
    children:
    - type: text
      text: faites-lui des sentiers droits.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: ' '
  - type: usfm
    marker: qt
    children:
    - type: text
      text: Toute vallée sera comblée,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: qt
    children:
    - type: text
      text: toute montagne et toute colline seront abaissées,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: qt
    children:
    - type: text
      text: les voies tortueuses deviendront droites,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: qt
    children:
    - type: text
      text: les chemins rocailleux seront nivelés,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: ' '
  - type: usfm
    marker: qt
    children:
    - type: text
      text: et tous les hommes verront
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: qt
    children:
    - type: text
      text: le salut de Dieu
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '3.6 '
    - type: usfm
      marker: ft
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Es 40.3-5
        metadata:
          usfm: ISA.40.3+ISA.40.4+ISA.40.5
      - type: text
        text: ' cité selon l’ancienne version grecque.'
    marker-yv: yv-n
  - type: usfm
    marker: qt
    children:
    - type: text
      text: .
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Jean disait à ceux qui venaient en foule se faire baptiser par lui : Espèces de vipères ! Qui vous a enseigné à fuir la colère de Dieu qui va se manifester ? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Produisez plutôt pour fruits des actes qui montrent que vous avez changé
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '3.8 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Autre traduction : '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: que vous vous repentez.
    marker-yv: yv-n
  - type: text
    text: '. Ne vous contentez pas de répéter en vous-mêmes : « Nous sommes les descendants d’Abraham ! » Car, regardez ces pierres : je vous déclare que Dieu peut en faire des enfants d’Abraham.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: La hache est déjà sur le point d’attaquer les arbres à la racine. Tout arbre qui ne produit pas de bon fruit sera coupé et jeté au feu.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Les foules lui demandèrent alors : Que devons-nous faire ?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Il leur répondit : Si quelqu’un a deux chemises, qu’il en donne une à celui qui n’en a pas. Si quelqu’un a de quoi manger, qu’il partage avec celui qui n’a rien.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Il y avait des collecteurs d’impôts qui venaient se faire baptiser. Ils demandèrent à Jean : Maître, que devons-nous faire ?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: – N’exigez rien de plus que ce qui a été fixé, leur répondit-il.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Des soldats le questionnèrent aussi : Et nous, que devons-nous faire ?'
- type: usfm
  marker: p
  children:
  - type: text
    text: '– N’extorquez d’argent à personne et ne dénoncez personne à tort : contentez-vous de votre solde.'
- type: usfm
  marker: r
  children:
  - type: text
    text: (Mt 3.11-12 ; Mc 1.7-8 ; Jn 1.19-28)
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Le peuple était plein d’espoir et chacun se demandait si Jean n’était pas le Messie.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Il répondit à tous : Moi je vous baptise dans l’eau. Mais quelqu’un va venir, qui est plus puissant que moi. Je ne suis même pas digne de dénouer la lanière de ses sandales. Lui, il vous baptisera dans le Saint-Esprit et le feu. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Il tient en main sa pelle à vanner, pour nettoyer son aire de battage, et il amassera le blé dans son grenier. Quant à la bale, il la brûlera dans un feu qui ne s’éteindra pas.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Jean adressait encore beaucoup d’autres recommandations au peuple et lui annonçait la Bonne Nouvelle de l’Evangile.
- type: usfm
  marker: r
  children:
  - type: text
    text: (Mt 14.3-4 ; Mc 6.17-18)
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Mais il reprocha au gouverneur Hérode d’avoir épousé Hérodiade, la femme de son demi-frère
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '3.19 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Hérode vivait avec sa belle-sœur abandonnée par Philippe, son mari.
    marker-yv: yv-n
  - type: text
    text: ', et d’avoir commis beaucoup d’autres méfaits. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Hérode ajouta encore à tous ses crimes celui de faire emprisonner Jean.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Le baptême de Jésus
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: (Mt 3.13-17 ; Mc 1.9-11)
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Tout le peuple venait se faire baptiser, et Jésus fut aussi baptisé. Or, pendant qu’il priait, le ciel s’ouvrit '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: et le Saint-Esprit descendit sur lui, sous une forme corporelle, comme une colombe.
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Une voix retentit alors du ciel : Tu es mon Fils bien-aimé, tu fais toute ma joie.'
- type: usfm
  marker: s1
  children:
  - type: text
    text: La généalogie de Jésus
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: (Mt 1.1-17)
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Jésus avait environ trente ans quand il commença à exercer son ministère. Il était, comme on le pensait, le fils de Joseph, dont voici les ancêtres : Héli, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Matthath, Lévi, Melki, Yannaï, Joseph, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Mattathias, Amos, Nahoum, Esli, Naggaï, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Maath, Mattathias, Sémeïn, Yoseh, Yoda, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'Yoanan, Rhésa, Zorobabel, Shealtiel, Néri, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'Melki, Addi, Kosam, Elmadam, Er, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'Jésus, Eliézer, Yorim, Matthath, Lévi, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'Siméon, Juda, Joseph, Yonam, Eliaqim, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'Méléa, Menna, Mattata, Nathan, David, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'Isaï, Obed, Booz, Salma, Nahshôn, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: 'Amminadab, Admîn, Arni, Hetsrôn, Pérets, Juda, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: 'Jacob, Isaac, Abraham, Térah, Nahor, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: 'Seroug, Reou, Péleg, Héber, Shélah, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: 'Qaïnam, Arpakshad, Sem, Noé, Lémek, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: 'Mathusalem, Hénok, Yéred, Maléléel, Qénân, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: text
    text: Enosh, Seth, Adam, qui était lui-même fils de Dieu.
