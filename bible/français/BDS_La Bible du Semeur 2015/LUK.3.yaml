document_id: LUK.3,21
type_code: fra
verses:
  '1':
  - type: heading
    content: Préparation du ministère de Jésus
  - type: heading
    content: Jean-Baptiste, messager de Dieu
  - type: heading
    content: (Mt 3.1-10 ; Mc 1.1-6)
  - type: text
    content: La quinzième année du règne de l’empereur Tibère
  - type: note
    content: Successeur d’Auguste, empereur à Rome de 14 à 37 apr. J.-C. Jean a donc commencé son ministère aux environs de l’année 28.
  - type: text
    content: ', Ponce Pilate'
  - type: note
    content: Ponce Pilate fut gouverneur du territoire israélite de 26 à 36 apr. J.-C.
  - type: text
    content: ' était gouverneur de la Judée, Hérode régnait sur la Galilée comme tétrarque, son frère Philippe sur l’Iturée et la Trachonitide, Lysanias sur l’Abilène'
  - type: note
    content: 'L’Iturée et la Trachonitide sont deux régions situées au sud-est du Liban. l’Abilène: district situé à 27 kilomètres au nord-ouest de Damas.'
  - type: text
    content: '. '
  '10':
  - type: text
    content: 'Les foules lui demandèrent alors : Que devons-nous faire ?'
  '11':
  - type: text
    content: 'Il leur répondit : Si quelqu’un a deux chemises, qu’il en donne une à celui qui n’en a pas. Si quelqu’un a de quoi manger, qu’il partage avec celui qui n’a rien.'
  '12':
  - type: text
    content: 'Il y avait des collecteurs d’impôts qui venaient se faire baptiser. Ils demandèrent à Jean : Maître, que devons-nous faire ?'
  '13':
  - type: text
    content: – N’exigez rien de plus que ce qui a été fixé, leur répondit-il.
  '14':
  - type: text
    content: 'Des soldats le questionnèrent aussi : Et nous, que devons-nous faire ?'
  - type: text
    content: '– N’extorquez d’argent à personne et ne dénoncez personne à tort : contentez-vous de votre solde.'
  - type: heading
    content: (Mt 3.11-12 ; Mc 1.7-8 ; Jn 1.19-28)
  '15':
  - type: text
    content: Le peuple était plein d’espoir et chacun se demandait si Jean n’était pas le Messie.
  '16':
  - type: text
    content: 'Il répondit à tous : Moi je vous baptise dans l’eau. Mais quelqu’un va venir, qui est plus puissant que moi. Je ne suis même pas digne de dénouer la lanière de ses sandales. Lui, il vous baptisera dans le Saint-Esprit et le feu. '
  '17':
  - type: text
    content: Il tient en main sa pelle à vanner, pour nettoyer son aire de battage, et il amassera le blé dans son grenier. Quant à la bale, il la brûlera dans un feu qui ne s’éteindra pas.
  '18':
  - type: text
    content: Jean adressait encore beaucoup d’autres recommandations au peuple et lui annonçait la Bonne Nouvelle de l’Evangile.
  - type: heading
    content: (Mt 14.3-4 ; Mc 6.17-18)
  '19':
  - type: text
    content: Mais il reprocha au gouverneur Hérode d’avoir épousé Hérodiade, la femme de son demi-frère
  - type: note
    content: Hérode vivait avec sa belle-sœur abandonnée par Philippe, son mari.
  - type: text
    content: ', et d’avoir commis beaucoup d’autres méfaits. '
  '2':
  - type: text
    content: Hanne et Caïphe étaient grands-prêtres
  - type: note
    content: Hanne avait été grand-prêtre avant l’an 15. Il continuait à exercer son influence sous Caïphe, son successeur (qui était son gendre), titulaire de l’office de 18 à 36.
  - type: text
    content: .
  - type: text
    content: 'Cette année-là, Dieu adressa la parole à Jean, fils de Zacharie, dans le désert. '
  '20':
  - type: text
    content: Hérode ajouta encore à tous ses crimes celui de faire emprisonner Jean.
  - type: heading
    content: Le baptême de Jésus
  - type: heading
    content: (Mt 3.13-17 ; Mc 1.9-11)
  '21':
  - type: text
    content: 'Tout le peuple venait se faire baptiser, et Jésus fut aussi baptisé. Or, pendant qu’il priait, le ciel s’ouvrit '
  '22':
  - type: text
    content: et le Saint-Esprit descendit sur lui, sous une forme corporelle, comme une colombe.
  - type: text
    content: 'Une voix retentit alors du ciel : Tu es mon Fils bien-aimé, tu fais toute ma joie.'
  - type: heading
    content: La généalogie de Jésus
  - type: heading
    content: (Mt 1.1-17)
  '23':
  - type: text
    content: 'Jésus avait environ trente ans quand il commença à exercer son ministère. Il était, comme on le pensait, le fils de Joseph, dont voici les ancêtres : Héli, '
  '24':
  - type: text
    content: 'Matthath, Lévi, Melki, Yannaï, Joseph, '
  '25':
  - type: text
    content: 'Mattathias, Amos, Nahoum, Esli, Naggaï, '
  '26':
  - type: text
    content: 'Maath, Mattathias, Sémeïn, Yoseh, Yoda, '
  '27':
  - type: text
    content: 'Yoanan, Rhésa, Zorobabel, Shealtiel, Néri, '
  '28':
  - type: text
    content: 'Melki, Addi, Kosam, Elmadam, Er, '
  '29':
  - type: text
    content: 'Jésus, Eliézer, Yorim, Matthath, Lévi, '
  '3':
  - type: text
    content: Jean se mit à parcourir toute la région du Jourdain. Il appelait les gens à se faire baptiser en signe d’un profond changement
  - type: note
    content: 'Autres traductions : se faire baptiser en signe de repentance, ou pour indiquer qu’ils changeaient de comportement.'
  - type: text
    content: ', afin de recevoir le pardon de leurs péchés. '
  '30':
  - type: text
    content: 'Siméon, Juda, Joseph, Yonam, Eliaqim, '
  '31':
  - type: text
    content: 'Méléa, Menna, Mattata, Nathan, David, '
  '32':
  - type: text
    content: 'Isaï, Obed, Booz, Salma, Nahshôn, '
  '33':
  - type: text
    content: 'Amminadab, Admîn, Arni, Hetsrôn, Pérets, Juda, '
  '34':
  - type: text
    content: 'Jacob, Isaac, Abraham, Térah, Nahor, '
  '35':
  - type: text
    content: 'Seroug, Reou, Péleg, Héber, Shélah, '
  '36':
  - type: text
    content: 'Qaïnam, Arpakshad, Sem, Noé, Lémek, '
  '37':
  - type: text
    content: 'Mathusalem, Hénok, Yéred, Maléléel, Qénân, '
  '38':
  - type: text
    content: Enosh, Seth, Adam, qui était lui-même fils de Dieu.
  '4':
  - type: text
    content: 'Ainsi s’accomplit ce que le prophète Esaïe avait écrit dans son livre :'
  - type: text
    content: On entend la voix de quelqu’un
  - type: text
    content: 'qui crie dans le désert :'
  - type: text
    content: Préparez le chemin pour le Seigneur,
  - type: text
    content: faites-lui des sentiers droits.
  '5':
  - type: text
    content: ' '
  - type: text
    content: Toute vallée sera comblée,
  - type: text
    content: toute montagne et toute colline seront abaissées,
  - type: text
    content: les voies tortueuses deviendront droites,
  - type: text
    content: les chemins rocailleux seront nivelés,
  '6':
  - type: text
    content: ' '
  - type: text
    content: et tous les hommes verront
  - type: text
    content: le salut de Dieu
  - type: text
    content: ' '
  - type: note
    content: Es 40.3-5 cité selon l’ancienne version grecque.
  - type: text
    content: .
  '7':
  - type: text
    content: 'Jean disait à ceux qui venaient en foule se faire baptiser par lui : Espèces de vipères ! Qui vous a enseigné à fuir la colère de Dieu qui va se manifester ? '
  '8':
  - type: text
    content: Produisez plutôt pour fruits des actes qui montrent que vous avez changé
  - type: note
    content: 'Autre traduction : que vous vous repentez.'
  - type: text
    content: '. Ne vous contentez pas de répéter en vous-mêmes : « Nous sommes les descendants d’Abraham ! » Car, regardez ces pierres : je vous déclare que Dieu peut en faire des enfants d’Abraham.'
  '9':
  - type: text
    content: La hache est déjà sur le point d’attaquer les arbres à la racine. Tout arbre qui ne produit pas de bon fruit sera coupé et jeté au feu.
