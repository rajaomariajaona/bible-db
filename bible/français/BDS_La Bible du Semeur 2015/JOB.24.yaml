document_id: JOB.24,21
type_code: fra
verses:
  '1':
  - type: heading
    content: Pourquoi Dieu ne juge-t-il pas les méchants ?
  - type: text
    content: Pourquoi le Tout-Puissant ╵n’a-t-il pas réservé des temps ╵pour exercer son jugement ?
  - type: text
    content: Et pourquoi ceux qui le connaissent ╵ne voient-ils pas les jours ╵de son intervention ?
  '10':
  - type: text
    content: On les fait marcher nus, ╵privés de vêtements,
  - type: text
    content: et on leur fait porter des gerbes ╵tout en les laissant affamés.
  '11':
  - type: text
    content: Ils pressent les olives ╵dans les enclos d’autrui,
  - type: text
    content: et foulent les vendanges ╵tout en mourant de soif.
  '12':
  - type: text
    content: On entend dans la ville ╵les gens
  - type: note
    content: 'Certains comprennent, en changeant une voyelle de l’hébreu et conformément à la version syriaque : les mourants.'
  - type: text
    content: ' se lamenter'
  - type: text
    content: et les blessés se plaignent.
  - type: text
    content: Mais Dieu ne prend pas garde ╵à ces atrocités !
  '13':
  - type: text
    content: Or, contre la lumière ╵les méchants se révoltent,
  - type: text
    content: ils ignorent ses voies
  - type: text
    content: et quittent ses sentiers.
  '14':
  - type: text
    content: Au point du jour, ╵le meurtrier se lève,
  - type: text
    content: afin d’assassiner ╵le pauvre et l’indigent
  - type: text
    content: et, quand la nuit arrive, ╵il devient un voleur.
  '15':
  - type: text
    content: 'Les yeux de l’adultère ╵guettent le crépuscule :'
  - type: text
    content: « Nul œil ne me verra », ╵se dit-il,
  - type: text
    content: et il couvre ╵son visage d’un voile.
  '16':
  - type: text
    content: Quand il fait sombre ╵on force les maisons
  - type: note
    content: En Orient, les maisons étaient souvent faites en pisé (argile séchée mélangée à la paille) ou en briques non cuites. Elles étaient donc faciles à forcer ou à percer (Mt 6.19-20).
  - type: text
    content: ','
  - type: text
    content: mais, de jour, on s’enferme,
  - type: text
    content: refusant la lumière.
  '17':
  - type: text
    content: L’aube pour tous ces gens ╵est un sombre moment,
  - type: text
    content: car c’est là qu’ils éprouvent ╵les frayeurs des nuits noires.
  '18':
  - type: text
    content: Oui le méchant est emporté
  - type: note
    content: 'Job reconnaît ici (v. 18-24) que pour certains méchants – mais certains seulement – il arrive ce qu’affirment ses amis. D’autres voient dans ces versets des malédictions prononcées par Job contre les méchants : Que le méchant soit emporté…'
  - type: text
    content: ', ╵léger sur la face de l’eau !'
  - type: text
    content: Et il n’a sur la terre ╵qu’un domaine maudit,
  - type: text
    content: il ne prend pas ╵le chemin de ses vignes.
  '19':
  - type: text
    content: Comme un sol altéré ╵absorbe l’eau des neiges ╵dans la chaleur du jour,
  - type: text
    content: voilà le pécheur englouti ╵par le séjour des morts.
  '2':
  - type: text
    content: On déplace les bornes
  - type: note
    content: Voir Dt 19.14 ; Pr 22.28.
  - type: text
    content: ','
  - type: text
    content: on vole des troupeaux ╵et on les mène paître,
  '20':
  - type: text
    content: Le sein qui le porta ╵ne se souviendra plus de lui
  - type: text
    content: tandis que la vermine ╵en fera ses délices,
  - type: text
    content: il tombe dans l’oubli.
  - type: text
    content: Le péché est abattu comme un arbre.
  '21':
  - type: text
    content: Ces gens ont exploité ╵la femme sans enfant,
  - type: text
    content: et n’ont pas été bons ╵envers la veuve…
  '22':
  - type: text
    content: Oui il emporte les tyrans ╵par sa puissance.
  - type: text
    content: Le voilà qui se dresse ╵et ils perdent l’espoir ╵de demeurer en vie
  - type: note
    content: 'Autre traduction : Non ! Dieu, par sa puissance, prolonge les jours des tyrans. Ils n’imaginaient pas rester en vie, et les voilà debout.'
  - type: text
    content: .
  '23':
  - type: text
    content: S’il leur a accordé ╵d’être en sécurité ╵et de gagner en assurance,
  - type: text
    content: c’est en gardant les yeux ╵fixés sur leur conduite.
  '24':
  - type: text
    content: Eux, pour un peu de temps, ╵ils s’étaient élevés, ╵puis ils ont disparu.
  - type: text
    content: Ils sont tombés ╵comme tous ceux que l’on moissonne,
  - type: text
    content: ils ont été coupés ╵comme des épis mûrs.
  '25':
  - type: text
    content: Qui me démentira ╵en prétendant ╵qu’il n’en est pas ainsi ?
  - type: text
    content: Et qui réfutera ╵le discours que je tiens ?
  '3':
  - type: text
    content: on s’empare de l’âne ╵appartenant à l’orphelin,
  - type: text
    content: c’est le bœuf de la veuve ╵que l’on retient en gage.
  '4':
  - type: text
    content: On empêche les pauvres ╵de se déplacer librement
  - type: note
    content: 'Autre traduction : on bouscule les pauvres hors du chemin.'
  - type: text
    content: .
  - type: text
    content: Et les malheureux du pays ╵n’ont plus qu’à se cacher.
  '5':
  - type: text
    content: Tels des ânes sauvages ╵vivant dans le désert,
  - type: text
    content: les malheureux s’en vont ╵dès l’aube à leur travail, ╵cherchant leur nourriture.
  - type: text
    content: La steppe doit fournir ╵du pain pour leurs enfants,
  '6':
  - type: text
    content: ils doivent moissonner ╵le fourrage des champs
  - type: text
    content: et grappiller ╵les vignes du méchant.
  '7':
  - type: text
    content: Ils se couchent tout nus, ╵faute de vêtement,
  - type: text
    content: sans rien pour se couvrir, ╵quand il fait froid.
  '8':
  - type: text
    content: L’averse des montagnes ╵les laisse tout transis
  - type: text
    content: et, n’ayant pas d’abris, ╵ils doivent se serrer ╵tout contre le rocher.
  '9':
  - type: text
    content: On arrache de force ╵l’orphelin au sein de sa mère,
  - type: text
    content: on exige des gages ╵des indigents
  - type: note
    content: Voir Ex 22.25-26 ; Dt 24.6, 12-13.
  - type: text
    content: .
