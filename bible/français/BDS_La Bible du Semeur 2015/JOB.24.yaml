document_id: JOB.24,21
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Pourquoi Dieu ne juge-t-il pas les méchants ?
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: Pourquoi le Tout-Puissant ╵n’a-t-il pas réservé des temps ╵pour exercer son jugement ?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et pourquoi ceux qui le connaissent ╵ne voient-ils pas les jours ╵de son intervention ?
  '10':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: On les fait marcher nus, ╵privés de vêtements,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et on leur fait porter des gerbes ╵tout en les laissant affamés.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ils pressent les olives ╵dans les enclos d’autrui,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et foulent les vendanges ╵tout en mourant de soif.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: On entend dans la ville ╵les gens
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '24.12 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Certains comprennent, en changeant une voyelle de l’hébreu et conformément à la version syriaque : '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: les mourants.
      marker-yv: yv-n
    - type: text
      text: ' se lamenter'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et les blessés se plaignent.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mais Dieu ne prend pas garde ╵à ces atrocités !
  '13':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Or, contre la lumière ╵les méchants se révoltent,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ils ignorent ses voies
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et quittent ses sentiers.
  '14':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Au point du jour, ╵le meurtrier se lève,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: afin d’assassiner ╵le pauvre et l’indigent
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et, quand la nuit arrive, ╵il devient un voleur.
  '15':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Les yeux de l’adultère ╵guettent le crépuscule :'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: « Nul œil ne me verra », ╵se dit-il,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et il couvre ╵son visage d’un voile.
  '16':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Quand il fait sombre ╵on force les maisons
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '24.16 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'En Orient, les maisons étaient souvent faites en pisé (argile séchée mélangée à la paille) ou en briques non cuites. Elles étaient donc faciles à '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'forcer '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'ou à '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'percer '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: (
        - type: usfm
          marker: ref
          children:
          - type: text
            text: Mt 6.19-20
        - type: text
          text: ).
      marker-yv: yv-n
    - type: text
      text: ','
  - type: usfm
    marker: q1
    children:
    - type: text
      text: mais, de jour, on s’enferme,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: refusant la lumière.
  '17':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: L’aube pour tous ces gens ╵est un sombre moment,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: car c’est là qu’ils éprouvent ╵les frayeurs des nuits noires.
  '18':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Oui le méchant est emporté
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '24.18 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Job reconnaît ici (v. 18-24) que pour certains méchants – mais certains seulement – il arrive ce qu’affirment ses amis. D’autres voient dans ces versets des malédictions prononcées par Job contre les méchants : '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: Que le méchant soit emporté…
      marker-yv: yv-n
    - type: text
      text: ', ╵léger sur la face de l’eau !'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et il n’a sur la terre ╵qu’un domaine maudit,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: il ne prend pas ╵le chemin de ses vignes.
  '19':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Comme un sol altéré ╵absorbe l’eau des neiges ╵dans la chaleur du jour,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: voilà le pécheur englouti ╵par le séjour des morts.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: On déplace les bornes
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '24.2 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Voir Dt 19.14 ; Pr 22.28.
      marker-yv: yv-n
    - type: text
      text: ','
  - type: usfm
    marker: q1
    children:
    - type: text
      text: on vole des troupeaux ╵et on les mène paître,
  '20':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Le sein qui le porta ╵ne se souviendra plus de lui
  - type: usfm
    marker: q1
    children:
    - type: text
      text: tandis que la vermine ╵en fera ses délices,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: il tombe dans l’oubli.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Le péché est abattu comme un arbre.
  '21':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ces gens ont exploité ╵la femme sans enfant,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et n’ont pas été bons ╵envers la veuve…
  '22':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Oui il emporte les tyrans ╵par sa puissance.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Le voilà qui se dresse ╵et ils perdent l’espoir ╵de demeurer en vie
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '24.22 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Autre traduction : '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: Non ! Dieu, par sa puissance, prolonge les jours des tyrans. Ils n’imaginaient pas rester en vie, et les voilà debout.
      marker-yv: yv-n
    - type: text
      text: .
  '23':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: S’il leur a accordé ╵d’être en sécurité ╵et de gagner en assurance,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: c’est en gardant les yeux ╵fixés sur leur conduite.
  '24':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Eux, pour un peu de temps, ╵ils s’étaient élevés, ╵puis ils ont disparu.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ils sont tombés ╵comme tous ceux que l’on moissonne,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ils ont été coupés ╵comme des épis mûrs.
  '25':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Qui me démentira ╵en prétendant ╵qu’il n’en est pas ainsi ?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et qui réfutera ╵le discours que je tiens ?
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: on s’empare de l’âne ╵appartenant à l’orphelin,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: c’est le bœuf de la veuve ╵que l’on retient en gage.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: On empêche les pauvres ╵de se déplacer librement
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '24.4 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Autre traduction : '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: on bouscule les pauvres hors du chemin.
      marker-yv: yv-n
    - type: text
      text: .
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et les malheureux du pays ╵n’ont plus qu’à se cacher.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tels des ânes sauvages ╵vivant dans le désert,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: les malheureux s’en vont ╵dès l’aube à leur travail, ╵cherchant leur nourriture.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: La steppe doit fournir ╵du pain pour leurs enfants,
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ils doivent moissonner ╵le fourrage des champs
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et grappiller ╵les vignes du méchant.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ils se couchent tout nus, ╵faute de vêtement,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sans rien pour se couvrir, ╵quand il fait froid.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: L’averse des montagnes ╵les laisse tout transis
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et, n’ayant pas d’abris, ╵ils doivent se serrer ╵tout contre le rocher.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: On arrache de force ╵l’orphelin au sein de sa mère,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: on exige des gages ╵des indigents
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '24.9 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Voir Ex 22.25-26 ; Dt 24.6, 12-13.
      marker-yv: yv-n
    - type: text
      text: .
