document_id: LUK.7,21
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: La victoire sur la mort
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: (Mt 8.5-13)
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: Après avoir dit au peuple tout ce qu’il avait à lui dire, Jésus se rendit à Capernaüm.
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Les envoyés de l’officier s’en retournèrent alors à la maison où ils trouvèrent l’esclave en bonne santé.
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ensuite
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '7.11 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Certains manuscrits ont : '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: le lendemain.
      marker-yv: yv-n
    - type: text
      text: ', Jésus se rendit dans une ville appelée Naïn'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '7.11 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Ville du sud-est de la Galilée, à une douzaine de kilomètres de Nazareth.
      marker-yv: yv-n
    - type: text
      text: '. Ses disciples et une grande foule l’accompagnaient. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Comme il arrivait à la porte de la ville, il rencontra un convoi funèbre : on enterrait le fils unique d’une veuve. Beaucoup d’habitants de la ville suivaient le cortège. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Le Seigneur vit la veuve et il fut pris de pitié pour elle ; il lui dit : '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Ne pleure pas !
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Puis il s’approcha de la civière et posa sa main sur elle. Les porteurs s’arrêtèrent.
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: – Jeune homme,
    - type: text
      text: ' dit-il, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: je te l’ordonne, lève-toi !
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Le mort se redressa, s’assit et se mit à parler. Jésus le rendit à sa mère. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Saisis d’une profonde crainte, tous les assistants louaient Dieu et disaient : Un grand prophète est apparu parmi nous !'
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Et ils ajoutaient : Dieu est venu prendre soin de son peuple !'
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Cette déclaration concernant Jésus se répandit dans toute la Judée et dans les régions environnantes.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Jésus et Jean-Baptiste
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: (Mt 11.2-11)
    marker-yv: yv-h
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Jean fut informé par ses disciples de tout ce qui se passait. Il appela alors deux d’entre eux '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'et les envoya auprès du Seigneur pour demander : Es-tu celui qui devait venir'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '7.19 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Voir '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: Mt 11.3
        - type: text
          text: ' et la note.'
      marker-yv: yv-n
    - type: text
      text: ', ou bien devons-nous en attendre un autre ?'
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Un officier romain avait un esclave malade, qui était sur le point de mourir. Or, son maître tenait beaucoup à lui. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ces hommes se présentèrent à Jésus et lui dirent : C’est Jean-Baptiste qui nous envoie. Voici ce qu’il te fait demander : « Es-tu celui qui devait venir, ou bien devons-nous en attendre un autre ? »'
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Or, au moment où ils arrivaient, Jésus guérit plusieurs personnes de diverses maladies et infirmités. Il délivra des gens qui étaient sous l’emprise d’esprits mauvais et rendit la vue à plusieurs aveugles. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Il répondit alors aux envoyés : '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'Retournez auprès de Jean et racontez-lui ce que vous avez vu et entendu : '
      - type: usfm
        marker: qt
        children:
        - type: text
          text: les aveugles voient, les paralysés marchent normalement, les lépreux sont purifiés, les sourds entendent, les morts ressuscitent, la Bonne Nouvelle est annoncée aux pauvres
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '7.22 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Es 35.5 ; 61.1.
      marker-yv: yv-n
    - type: usfm
      marker: wj
      children:
      - type: usfm
        marker: qt
        children:
        - type: text
          text: .
    - type: text
      text: ' '
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Heureux celui qui ne perdra pas la foi à cause de moi !
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Après le départ des messagers de Jean, Jésus saisit cette occasion pour parler de Jean à la foule : '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Qu’êtes-vous allés voir au désert ? Un roseau agité çà et là par le vent ?
    - type: text
      text: ' '
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Qui donc êtes-vous allés voir ? Un homme habillé avec élégance ? Ceux qui portent des habits somptueux et qui vivent dans le luxe habitent les palais royaux.
    - type: text
      text: ' '
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'Mais qu’êtes-vous donc allés voir au désert ? Un '
      - type: usfm
        marker: w
        children:
        - type: text
          text: prophète
      - type: text
        text: '  ? Oui, assurément, et même bien plus qu’un prophète, c’est moi qui vous le dis.'
    - type: text
      text: ' '
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'Car c’est celui dont il est écrit :'
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: wj
      children:
      - type: usfm
        marker: qt
        children:
        - type: text
          text: J’enverrai mon messager devant toi,
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: wj
      children:
      - type: usfm
        marker: qt
        children:
        - type: text
          text: il te préparera le chemin
      - type: text
        text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '7.27 '
      - type: usfm
        marker: ft
        children:
        - type: usfm
          marker: ref
          children:
          - type: text
            text: Ml 3.1
        - type: text
          text: ' .'
      marker-yv: yv-n
    - type: usfm
      marker: wj
      children:
      - type: usfm
        marker: qt
        children:
        - type: text
          text: .
  '28':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'Je vous l’assure : parmi tous les hommes qui sont nés d’une femme, il n’y en a pas de plus grand que Jean. Et pourtant, le plus petit dans le '
      - type: usfm
        marker: w
        children:
        - type: text
          text: royaume de Dieu
      - type: text
        text: ' est plus grand que lui.'
  - type: usfm
    marker: r
    children:
    - type: text
      text: (Mt 11.16-19)
    marker-yv: yv-h
  '29':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Tous les gens du peuple et tous les collecteurs d’impôts qui ont écouté le message de Jean et se sont fait baptiser par lui ont reconnu que Dieu est juste. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Quand il entendit parler de Jésus, l’officier envoya auprès de lui quelques responsables juifs pour le supplier de venir guérir son esclave. '
  '30':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Mais les pharisiens et les enseignants de la Loi, qui ont refusé de se faire baptiser par lui, ont rejeté la volonté de Dieu à leur égard.
  '31':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: A qui donc pourrais-je comparer les gens de notre temps ? A qui ressemblent-ils ?
    - type: text
      text: ' '
  '32':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'Ils sont comme des enfants assis sur la place du marché qui se crient les uns aux autres :'
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Quand nous avons joué de la flûte,
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: vous n’avez pas dansé !
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Et quand nous avons chanté des airs de deuil,
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: vous ne vous êtes pas mis à pleurer !
  '33':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: En effet, Jean-Baptiste est venu, il ne mangeait pas de pain, il ne buvait pas de vin. Qu’avez-vous dit alors ? « Il a un démon en lui ! ».
  '34':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'Le '
      - type: usfm
        marker: w
        children:
        - type: text
          text: Fils de l’homme
      - type: text
        text: ' est venu, il mange et boit, et vous vous écriez : « Cet homme ne pense qu’à faire bonne chère et à boire du vin, il est l’ami des collecteurs d’impôts et des pécheurs notoires. »'
  '35':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Cependant, la sagesse de Dieu est reconnue comme telle par ceux qui la reçoivent.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: L’amour, fruit du pardon
    marker-yv: yv-h
  '36':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Un pharisien invita Jésus à manger. Jésus se rendit chez lui et se mit à table. '
  '37':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Survint une femme connue dans la ville pour sa vie dissolue. Comme elle avait appris que Jésus mangeait chez le pharisien, elle avait apporté un flacon d’albâtre
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '7.37 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Pierre blanchâtre dans laquelle on taillait des vases à parfum.
      marker-yv: yv-n
    - type: text
      text: ' rempli de parfum. '
  '38':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Elle se tint derrière lui, à ses pieds
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '7.38 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Comme dans toute l’Antiquité, les invités étaient allongés sur des sortes de divans, les pieds vers l’extérieur du cercle.
      marker-yv: yv-n
    - type: text
      text: . Elle pleurait ; elle se mit à mouiller de ses larmes les pieds de Jésus ; alors elle les essuya avec ses cheveux et, en les embrassant, elle versait le parfum sur eux.
  '39':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'En voyant cela, le pharisien qui l’avait invité se dit : Si cet homme était vraiment un prophète, il saurait quelle est cette femme qui le touche, que c’est quelqu’un qui mène une vie dissolue.'
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ils vinrent trouver Jésus et ils le prièrent instamment : Cet homme, disaient-ils, mérite vraiment que tu lui accordes cette faveur. '
  '40':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Jésus lui répondit à haute voix : '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Simon, j’ai quelque chose à te dire.
  - type: usfm
    marker: p
    children:
    - type: text
      text: – Oui, Maître, parle, répondit le pharisien.
  '41':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: – Il était une fois un prêteur à qui deux hommes devaient de l’argent. Le premier devait cinq cents pièces d’argent ; le second cinquante
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '7.41 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Il s’agit de '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'deniers. '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Le denier représentait le salaire journalier d’un ouvrier agricole.
      marker-yv: yv-n
    - type: usfm
      marker: wj
      children:
      - type: text
        text: .
    - type: text
      text: ' '
  '42':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Comme ni l’un ni l’autre n’avaient de quoi rembourser leur dette, il fit cadeau à tous deux de ce qu’ils lui devaient. A ton avis, lequel des deux l’aimera le plus ?
  '43':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'Simon répondit : Celui, je suppose, auquel il aura remis la plus grosse dette.'
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: – Voilà qui est bien jugé,
    - type: text
      text: ' lui dit Jésus.'
  '44':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Puis, se tournant vers la femme, il reprit : '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Tu vois cette femme ? Eh bien, quand je suis entré dans ta maison, tu ne m’as pas apporté d’eau pour me laver les pieds
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '7.44 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Ce que les règles de l’hospitalité lui suggéraient.
      marker-yv: yv-n
    - type: usfm
      marker: wj
      children:
      - type: text
        text: ; mais elle, elle me les a arrosés de ses larmes et les a essuyés avec ses cheveux.
    - type: text
      text: ' '
  '45':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Tu ne m’as pas accueilli en m’embrassant, mais elle, depuis que je suis entré, elle n’a cessé de couvrir mes pieds de baisers.
    - type: text
      text: ' '
  '46':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Tu n’as pas versé d’huile parfumée sur ma tête, mais elle, elle a versé du parfum sur mes pieds.
    - type: text
      text: ' '
  '47':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'C’est pourquoi je te le dis : ses nombreux péchés lui ont été pardonnés, c’est pour cela qu’elle m’a témoigné tant d’amour. Mais celui qui a eu peu de choses à se faire pardonner ne manifeste que peu d’amour !'
  '48':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Puis il dit à la femme : '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Tes péchés te sont pardonnés.
  '49':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Les autres invités se dirent en eux-mêmes : « Qui est donc cet homme qui ose pardonner les péchés ? »'
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'En effet, il aime notre peuple : il a même fait bâtir notre synagogue à ses frais.'
  '50':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Mais Jésus dit à la femme : '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'Parce que tu as cru en moi, tu es '
      - type: usfm
        marker: w
        children:
        - type: text
          text: sauvée
      - type: text
        text: '  ; va en paix.'
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Jésus partit avec eux. Il n’était plus qu’à une faible distance de la maison quand l’officier envoya des amis pour lui dire : Seigneur, ne te donne pas tant de peine, car je ne remplis pas les conditions'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '7.6 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Ou : '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'je ne suis pas digne. '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Voir '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: Mt 8.8
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: ' pour te recevoir dans ma maison. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'C’est la raison pour laquelle je n’ai pas osé venir en personne te trouver. Mais, dis un mot et mon serviteur sera guéri. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Car, moi-même, je suis un officier subalterne, mais j’ai des soldats sous mes ordres, et quand je dis à l’un : « Va ! », il va. Quand je dis à un autre : « Viens ! », il vient. Quand je dis à mon esclave : « Fais ceci ! », il le fait.'
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'En entendant ces paroles, Jésus fut rempli d’admiration pour cet officier : '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'il se tourna vers la foule qui le suivait et dit : Je vous l’assure, nulle part en '
      - type: usfm
        marker: w
        children:
        - type: text
          text: Israël
      - type: text
        text: ', je n’ai trouvé une telle foi !'
