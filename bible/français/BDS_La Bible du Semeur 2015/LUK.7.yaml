document_id: LUK.7,21
type_code: fra
verses:
  '1':
  - type: heading
    content: La victoire sur la mort
  - type: heading
    content: (Mt 8.5-13)
  - type: text
    content: Après avoir dit au peuple tout ce qu’il avait à lui dire, Jésus se rendit à Capernaüm.
  '10':
  - type: text
    content: Les envoyés de l’officier s’en retournèrent alors à la maison où ils trouvèrent l’esclave en bonne santé.
  '11':
  - type: text
    content: Ensuite
  - type: note
    content: 'Certains manuscrits ont : le lendemain.'
  - type: text
    content: ', Jésus se rendit dans une ville appelée Naïn'
  - type: note
    content: Ville du sud-est de la Galilée, à une douzaine de kilomètres de Nazareth.
  - type: text
    content: '. Ses disciples et une grande foule l’accompagnaient. '
  '12':
  - type: text
    content: 'Comme il arrivait à la porte de la ville, il rencontra un convoi funèbre : on enterrait le fils unique d’une veuve. Beaucoup d’habitants de la ville suivaient le cortège. '
  '13':
  - type: text
    content: 'Le Seigneur vit la veuve et il fut pris de pitié pour elle ; il lui dit : '
  - type: text
    content: Ne pleure pas !
  '14':
  - type: text
    content: Puis il s’approcha de la civière et posa sa main sur elle. Les porteurs s’arrêtèrent.
  - type: text
    content: – Jeune homme,
  - type: text
    content: ' dit-il, '
  - type: text
    content: je te l’ordonne, lève-toi !
  '15':
  - type: text
    content: 'Le mort se redressa, s’assit et se mit à parler. Jésus le rendit à sa mère. '
  '16':
  - type: text
    content: 'Saisis d’une profonde crainte, tous les assistants louaient Dieu et disaient : Un grand prophète est apparu parmi nous !'
  - type: text
    content: 'Et ils ajoutaient : Dieu est venu prendre soin de son peuple !'
  '17':
  - type: text
    content: Cette déclaration concernant Jésus se répandit dans toute la Judée et dans les régions environnantes.
  - type: heading
    content: Jésus et Jean-Baptiste
  - type: heading
    content: (Mt 11.2-11)
  '18':
  - type: text
    content: 'Jean fut informé par ses disciples de tout ce qui se passait. Il appela alors deux d’entre eux '
  '19':
  - type: text
    content: 'et les envoya auprès du Seigneur pour demander : Es-tu celui qui devait venir'
  - type: note
    content: Voir Mt 11.3 et la note.
  - type: text
    content: ', ou bien devons-nous en attendre un autre ?'
  '2':
  - type: text
    content: 'Un officier romain avait un esclave malade, qui était sur le point de mourir. Or, son maître tenait beaucoup à lui. '
  '20':
  - type: text
    content: 'Ces hommes se présentèrent à Jésus et lui dirent : C’est Jean-Baptiste qui nous envoie. Voici ce qu’il te fait demander : « Es-tu celui qui devait venir, ou bien devons-nous en attendre un autre ? »'
  '21':
  - type: text
    content: 'Or, au moment où ils arrivaient, Jésus guérit plusieurs personnes de diverses maladies et infirmités. Il délivra des gens qui étaient sous l’emprise d’esprits mauvais et rendit la vue à plusieurs aveugles. '
  '22':
  - type: text
    content: 'Il répondit alors aux envoyés : '
  - type: text
    content: 'Retournez auprès de Jean et racontez-lui ce que vous avez vu et entendu : '
  - type: text
    content: les aveugles voient, les paralysés marchent normalement, les lépreux sont purifiés, les sourds entendent, les morts ressuscitent, la Bonne Nouvelle est annoncée aux pauvres
  - type: note
    content: Es 35.5 ; 61.1.
  - type: text
    content: .
  - type: text
    content: ' '
  '23':
  - type: text
    content: Heureux celui qui ne perdra pas la foi à cause de moi !
  '24':
  - type: text
    content: 'Après le départ des messagers de Jean, Jésus saisit cette occasion pour parler de Jean à la foule : '
  - type: text
    content: Qu’êtes-vous allés voir au désert ? Un roseau agité çà et là par le vent ?
  - type: text
    content: ' '
  '25':
  - type: text
    content: Qui donc êtes-vous allés voir ? Un homme habillé avec élégance ? Ceux qui portent des habits somptueux et qui vivent dans le luxe habitent les palais royaux.
  - type: text
    content: ' '
  '26':
  - type: text
    content: 'Mais qu’êtes-vous donc allés voir au désert ? Un '
  - type: text
    content: prophète
  - type: text
    content: '  ? Oui, assurément, et même bien plus qu’un prophète, c’est moi qui vous le dis.'
  - type: text
    content: ' '
  '27':
  - type: text
    content: 'Car c’est celui dont il est écrit :'
  - type: text
    content: J’enverrai mon messager devant toi,
  - type: text
    content: il te préparera le chemin
  - type: text
    content: ' '
  - type: note
    content: Ml 3.1 .
  - type: text
    content: .
  '28':
  - type: text
    content: ' '
  - type: text
    content: 'Je vous l’assure : parmi tous les hommes qui sont nés d’une femme, il n’y en a pas de plus grand que Jean. Et pourtant, le plus petit dans le '
  - type: text
    content: royaume de Dieu
  - type: text
    content: ' est plus grand que lui.'
  - type: heading
    content: (Mt 11.16-19)
  '29':
  - type: text
    content: 'Tous les gens du peuple et tous les collecteurs d’impôts qui ont écouté le message de Jean et se sont fait baptiser par lui ont reconnu que Dieu est juste. '
  '3':
  - type: text
    content: 'Quand il entendit parler de Jésus, l’officier envoya auprès de lui quelques responsables juifs pour le supplier de venir guérir son esclave. '
  '30':
  - type: text
    content: Mais les pharisiens et les enseignants de la Loi, qui ont refusé de se faire baptiser par lui, ont rejeté la volonté de Dieu à leur égard.
  '31':
  - type: text
    content: ' '
  - type: text
    content: A qui donc pourrais-je comparer les gens de notre temps ? A qui ressemblent-ils ?
  - type: text
    content: ' '
  '32':
  - type: text
    content: 'Ils sont comme des enfants assis sur la place du marché qui se crient les uns aux autres :'
  - type: text
    content: Quand nous avons joué de la flûte,
  - type: text
    content: vous n’avez pas dansé !
  - type: text
    content: Et quand nous avons chanté des airs de deuil,
  - type: text
    content: vous ne vous êtes pas mis à pleurer !
  '33':
  - type: text
    content: ' '
  - type: text
    content: En effet, Jean-Baptiste est venu, il ne mangeait pas de pain, il ne buvait pas de vin. Qu’avez-vous dit alors ? « Il a un démon en lui ! ».
  '34':
  - type: text
    content: ' '
  - type: text
    content: 'Le '
  - type: text
    content: Fils de l’homme
  - type: text
    content: ' est venu, il mange et boit, et vous vous écriez : « Cet homme ne pense qu’à faire bonne chère et à boire du vin, il est l’ami des collecteurs d’impôts et des pécheurs notoires. »'
  '35':
  - type: text
    content: ' '
  - type: text
    content: Cependant, la sagesse de Dieu est reconnue comme telle par ceux qui la reçoivent.
  - type: heading
    content: L’amour, fruit du pardon
  '36':
  - type: text
    content: 'Un pharisien invita Jésus à manger. Jésus se rendit chez lui et se mit à table. '
  '37':
  - type: text
    content: Survint une femme connue dans la ville pour sa vie dissolue. Comme elle avait appris que Jésus mangeait chez le pharisien, elle avait apporté un flacon d’albâtre
  - type: note
    content: Pierre blanchâtre dans laquelle on taillait des vases à parfum.
  - type: text
    content: ' rempli de parfum. '
  '38':
  - type: text
    content: Elle se tint derrière lui, à ses pieds
  - type: note
    content: Comme dans toute l’Antiquité, les invités étaient allongés sur des sortes de divans, les pieds vers l’extérieur du cercle.
  - type: text
    content: . Elle pleurait ; elle se mit à mouiller de ses larmes les pieds de Jésus ; alors elle les essuya avec ses cheveux et, en les embrassant, elle versait le parfum sur eux.
  '39':
  - type: text
    content: 'En voyant cela, le pharisien qui l’avait invité se dit : Si cet homme était vraiment un prophète, il saurait quelle est cette femme qui le touche, que c’est quelqu’un qui mène une vie dissolue.'
  '4':
  - type: text
    content: 'Ils vinrent trouver Jésus et ils le prièrent instamment : Cet homme, disaient-ils, mérite vraiment que tu lui accordes cette faveur. '
  '40':
  - type: text
    content: 'Jésus lui répondit à haute voix : '
  - type: text
    content: Simon, j’ai quelque chose à te dire.
  - type: text
    content: – Oui, Maître, parle, répondit le pharisien.
  '41':
  - type: text
    content: ' '
  - type: text
    content: – Il était une fois un prêteur à qui deux hommes devaient de l’argent. Le premier devait cinq cents pièces d’argent ; le second cinquante
  - type: text
    content: ' '
  - type: note
    content: Il s’agit de deniers. Le denier représentait le salaire journalier d’un ouvrier agricole.
  - type: text
    content: .
  - type: text
    content: ' '
  '42':
  - type: text
    content: Comme ni l’un ni l’autre n’avaient de quoi rembourser leur dette, il fit cadeau à tous deux de ce qu’ils lui devaient. A ton avis, lequel des deux l’aimera le plus ?
  '43':
  - type: text
    content: ' '
  - type: text
    content: 'Simon répondit : Celui, je suppose, auquel il aura remis la plus grosse dette.'
  - type: text
    content: – Voilà qui est bien jugé,
  - type: text
    content: ' lui dit Jésus.'
  '44':
  - type: text
    content: 'Puis, se tournant vers la femme, il reprit : '
  - type: text
    content: Tu vois cette femme ? Eh bien, quand je suis entré dans ta maison, tu ne m’as pas apporté d’eau pour me laver les pieds
  - type: note
    content: Ce que les règles de l’hospitalité lui suggéraient.
  - type: text
    content: ; mais elle, elle me les a arrosés de ses larmes et les a essuyés avec ses cheveux.
  - type: text
    content: ' '
  '45':
  - type: text
    content: Tu ne m’as pas accueilli en m’embrassant, mais elle, depuis que je suis entré, elle n’a cessé de couvrir mes pieds de baisers.
  - type: text
    content: ' '
  '46':
  - type: text
    content: Tu n’as pas versé d’huile parfumée sur ma tête, mais elle, elle a versé du parfum sur mes pieds.
  - type: text
    content: ' '
  '47':
  - type: text
    content: 'C’est pourquoi je te le dis : ses nombreux péchés lui ont été pardonnés, c’est pour cela qu’elle m’a témoigné tant d’amour. Mais celui qui a eu peu de choses à se faire pardonner ne manifeste que peu d’amour !'
  '48':
  - type: text
    content: 'Puis il dit à la femme : '
  - type: text
    content: Tes péchés te sont pardonnés.
  '49':
  - type: text
    content: 'Les autres invités se dirent en eux-mêmes : « Qui est donc cet homme qui ose pardonner les péchés ? »'
  '5':
  - type: text
    content: 'En effet, il aime notre peuple : il a même fait bâtir notre synagogue à ses frais.'
  '50':
  - type: text
    content: 'Mais Jésus dit à la femme : '
  - type: text
    content: 'Parce que tu as cru en moi, tu es '
  - type: text
    content: sauvée
  - type: text
    content: '  ; va en paix.'
  '6':
  - type: text
    content: 'Jésus partit avec eux. Il n’était plus qu’à une faible distance de la maison quand l’officier envoya des amis pour lui dire : Seigneur, ne te donne pas tant de peine, car je ne remplis pas les conditions'
  - type: note
    content: 'Ou : je ne suis pas digne. Voir Mt 8.8.'
  - type: text
    content: ' pour te recevoir dans ma maison. '
  '7':
  - type: text
    content: 'C’est la raison pour laquelle je n’ai pas osé venir en personne te trouver. Mais, dis un mot et mon serviteur sera guéri. '
  '8':
  - type: text
    content: 'Car, moi-même, je suis un officier subalterne, mais j’ai des soldats sous mes ordres, et quand je dis à l’un : « Va ! », il va. Quand je dis à un autre : « Viens ! », il vient. Quand je dis à mon esclave : « Fais ceci ! », il le fait.'
  '9':
  - type: text
    content: 'En entendant ces paroles, Jésus fut rempli d’admiration pour cet officier : '
  - type: text
    content: 'il se tourna vers la foule qui le suivait et dit : Je vous l’assure, nulle part en '
  - type: text
    content: Israël
  - type: text
    content: ', je n’ai trouvé une telle foi !'
