document_id: EST.3,21
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Mardochée met Haman en colère
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Quelque temps après ces événements, l’empereur Xerxès éleva en dignité Haman, fils de Hammedata du pays d’Agag : il le promut au rang de premier ministre et lui donna ainsi la prééminence sur tous les ministres de son gouvernement. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: Alors l’empereur ôta son anneau du doigt et le remit à Haman, fils de Hammedata d’Agag, l’ennemi des Juifs
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '3.10 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'L’anneau royal portait le sceau qui validait les décrets (voir v. 12 ; '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: Gn 41.42
        - type: text
          text: ).
      marker-yv: yv-n
    - type: text
      text: '. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'Puis l’empereur dit à Haman : Je te laisse l’argent et je te livre ce peuple. Fais-en ce que tu voudras.'
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: Le treizième jour du premier mois
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '3.12 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: La veille de la Pâque pour les Juifs.
      marker-yv: yv-n
    - type: text
      text: ', on convoqua les secrétaires impériaux et, sur l’ordre de Haman, ils écrivirent aux satrapes de l’empereur'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '3.12 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: L’Empire perse était divisé en 20 satrapies et 127 districts administratifs régies par des gouverneurs. Les satrapes sont aussi mentionnés en 8.9 ; 9.3.
      marker-yv: yv-n
    - type: text
      text: ', aux gouverneurs de chaque district et aux ministres de chaque peuple. Les documents furent rédigés selon le système d’écriture des différentes provinces et dans la langue de chaque peuple. Les messages furent écrits au nom de l’empereur Xerxès et scellés du sceau impérial. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'Les lettres furent portées par les coureurs dans toutes les provinces de l’empire, pour ordonner de massacrer, de tuer et d’exterminer les Juifs, jeunes et vieux, enfants et femmes, en un seul jour, à savoir le treizième jour du douzième mois, qui est le mois d’Adar, et de piller leurs biens. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: Le texte de l’édit devait être promulgué comme loi dans chaque province et porté à la connaissance de tous les peuples pour que chacun se tienne prêt pour le jour fixé.
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: Les coureurs partirent en hâte, par ordre de l’empereur. Le décret fut aussi publié dans la citadelle de Suse. L’empereur et Haman s’installèrent pour boire tandis que dans la ville de Suse régnait la consternation.
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'Par ordre de l’empereur, tous les fonctionnaires impériaux en poste au palais devaient s’agenouiller et se prosterner sur son passage. Mais Mardochée ne s’agenouillait pas et ne se prosternait pas devant lui. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'Ses collègues lui demandèrent : Pourquoi désobéis-tu à l’ordre de l’empereur ?'
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: Tous les jours, ils lui disaient cela, mais Mardochée ne les écoutait pas.
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Finalement, ils signalèrent la chose à Haman pour voir si Mardochée s’en tiendrait à ses paroles, car il leur avait dit qu’il était Juif. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'Quand Haman eut constaté que Mardochée ne s’agenouillait pas et ne se prosternait pas devant lui, il devint furieux. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'On lui avait appris à quel peuple Mardochée appartenait, et il jugea trop insuffisant de porter la main sur Mardochée seulement. Il résolut donc d’exterminer tous les Juifs, compatriotes de Mardochée, qui se trouvaient dans tout l’empire de Xerxès. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: Le premier mois, c’est-à-dire le mois de Nisân de la douzième année du règne de Xerxès
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '3.7 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'C’est-à-dire, le mois de la Pâque, en avril ou mai 474 av. J.-C., cinq ans après l’élévation d’Esther au titre d’impératrice (voir '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: 2.16-17
        - type: text
          text: ).
      marker-yv: yv-n
    - type: text
      text: ', Haman fit tirer au sort – ce qui se dit « Pour » – en passant en revue un jour après l’autre et un mois après l’autre. Le sort tomba sur le douzième mois qui est le mois d’Adar'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '3.7 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Mars-avril.
      marker-yv: yv-n
    - type: text
      text: .
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Haman veut exterminer les Juifs
    marker-yv: yv-h
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'Puis Haman alla dire à l’empereur Xerxès : Il y a, répandu parmi les peuples dans toutes les provinces de ton empire, un peuple qui est inassimilable. Leurs lois sont différentes de celles de tous les autres peuples, et ils n’obéissent pas aux lois impériales. L’empereur n’a aucun intérêt à les laisser en paix. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: Si l’empereur le veut bien, que l’on rédige un édit ordonnant leur extermination et je pèserai dix mille pièces d’argent que je remettrai aux fonctionnaires impériaux pour qu’ils les versent dans les caisses de l’empereur.
