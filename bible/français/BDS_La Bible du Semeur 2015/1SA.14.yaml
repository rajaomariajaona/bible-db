document_id: 1SA.14,21
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: L’exploit de Jonathan
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Un jour, Jonathan, le fils de Saül, dit à son écuyer : Viens, allons attaquer ce poste des Philistins qui est en face, de l’autre côté de la gorge.'
  - type: usfm
    marker: p
    children:
    - type: text
      text: Mais il ne prévint pas son père.
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Mais s’ils nous disent de monter jusqu’à eux, nous irons ; ce sera pour nous le signe que l’Eternel nous donne la victoire sur eux.
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Lorsqu’ils se montrèrent tous deux aux hommes du poste des Philistins, ceux-ci s’écrièrent : Tiens ! Voici des Hébreux qui sortent des trous où ils s’étaient cachés.'
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Et s’adressant à Jonathan et au jeune homme qui portait ses armes, ils leur crièrent : Montez jusqu’à nous, nous avons quelque chose à vous apprendre.'
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Alors Jonathan dit à son serviteur : Suis-moi là-haut, car l’Eternel donne à Israël la victoire sur eux.'
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Jonathan grimpa en s’aidant des mains et des pieds, et le jeune homme qui portait ses armes le suivait. Ils attaquèrent les Philistins qui tombèrent sous les coups de Jonathan, tandis que le jeune homme les achevait derrière lui. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ils massacrèrent ainsi une vingtaine d’hommes sur un espace de quelques mètres carrés.
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: La panique se répandit dans le camp philistin, elle gagna toute la région et toute l’armée ; les avant-postes et la troupe de choc furent terrifiés à leur tour, de plus, la terre se mit à trembler. Dieu lui-même sema la panique parmi eux.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: La délivrance
    marker-yv: yv-h
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Les guetteurs postés par Saül autour de Guibéa de Benjamin virent les soldats du camp ennemi courir en tous sens et se disperser çà et là. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Alors Saül ordonna à ses soldats : Faites l’appel et voyez qui nous a quittés.'
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'On fit l’appel et l’on s’aperçut que Jonathan et le jeune homme qui portait ses armes manquaient. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Saül dit à Ahiya : Apportez l’éphod'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '14.18 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'D’après l’ancienne version grecque ; le texte hébreu traditionnel parle du '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'coffre de Dieu. '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: L’expression de la fin du v. 19 montre qu’il s’agit bien de l’éphod.
      marker-yv: yv-n
    - type: text
      text: '  !'
  - type: usfm
    marker: p
    children:
    - type: text
      text: Car le prêtre portait en ce temps-là l’éphod devant les Israélites.
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Pendant que Saül parlait au prêtre, le désordre augmentait dans le camp des Philistins. Alors Saül dit au prêtre : Cela suffit ! Retire ta main.'
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Saül se trouvait alors à la sortie de Guibéa avec ses quelque six cents hommes sous le grenadier de Migrôn. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Saül et ses hommes se rassemblèrent et s’avancèrent sur le champ de bataille. Et que virent-ils ? Leurs ennemis étaient en train de s’entretuer à coups d’épée dans une mêlée indescriptible. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Les Hébreux qui, depuis longtemps, étaient au service des Philistins et qui participaient à leurs expéditions, firent volte-face et passèrent du côté des Israélites qui étaient avec Saül et Jonathan. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'De même, tous les Israélites qui s’étaient cachés dans la région montagneuse d’Ephraïm apprirent la défaite des Philistins et se mirent, eux aussi, à les talonner pour les combattre. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ainsi, ce jour-là, l’Eternel accorda la délivrance à Israël et le combat se poursuivit jusqu’au-delà de Beth-Aven.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Le serment insensé
    marker-yv: yv-h
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Les hommes d’Israël étaient exténués car Saül les avait placés sous cette imprécation : Maudit soit l’homme qui prendra de la nourriture avant le soir, avant que je me sois vengé de mes ennemis !'
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Personne n’avait donc rien mangé. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Toute l’armée avait atteint un bois où du miel coulait jusque sur le sol. '
  '26':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'En arrivant, les hommes virent bien ce miel qui ruisselait des rayons, mais aucun d’eux n’osa y toucher et en porter à sa bouche par respect du serment. '
  '27':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Toutefois Jonathan, qui ignorait que son père avait fait prêter serment à tout le peuple, tendit le bâton qu’il tenait en main et en trempa le bout dans le rayon de miel, puis il le porta à sa bouche. Immédiatement, ses yeux s’éclaircirent. '
  '28':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'A ce moment, l’un des soldats l’avertit en disant : Ton père a adjuré le peuple par un serment en disant : « Maudit soit l’homme qui prendra aujourd’hui de la nourriture ! » C’est pour cela que tous sont épuisés.'
  '29':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Jonathan déclara : Mon père fait le malheur du pays. Voyez donc comme ma vue s’est éclaircie depuis que j’ai mangé un peu de ce miel. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Il y avait aussi comme prêtre portant l’éphod
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '14.3 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Qui contenait l’ourim et le toummim servant à consulter Dieu (v. 18 et 36-42).
      marker-yv: yv-n
    - type: text
      text: ' Ahiya, fils d’Ahitoub, frère d’I-Kabod, le fils de Phinéas et petit-fils d’Eli qui avait été prêtre de l’Eternel à Silo. Personne n’avait remarqué que Jonathan était parti.'
  '30':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ah ! si nos hommes avaient mangé aujourd’hui de la nourriture qu’ils ont trouvée chez nos ennemis, la défaite des Philistins serait bien plus grande !
  '31':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Les Israélites battirent ce jour-là les Philistins depuis Mikmas jusqu’à Ayalôn
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '14.31 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: A quelque 25 kilomètres à l’ouest de Mikmas.
      marker-yv: yv-n
    - type: text
      text: ', ensuite les hommes étaient si épuisés '
  '32':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'qu’ils se ruèrent sur le butin, ils prirent des moutons, des bœufs et des veaux, les égorgèrent sur place et les mangèrent avec le sang. '
  '33':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'On vint dire à Saül que les hommes étaient en train de commettre une faute contre l’Eternel en mangeant des bêtes avec le sang. Alors le roi s’écria : Vous êtes des infidèles ! Roulez immédiatement vers moi une grande pierre'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '14.33 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Voir Lv 17.10-14 ; 19.26.
      marker-yv: yv-n
    - type: text
      text: '  ! '
  '34':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Puis il ajouta : Répandez-vous dans l’armée et dites à chacun de venir m’amener son bœuf ou son mouton et de l’égorger ici. Ensuite vous en mangerez et vous ne commettrez plus de faute contre l’Eternel en mangeant ces bêtes avec le sang !'
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Chacun amena donc pendant la nuit le bétail qu’il avait sous la main et on l’égorgea en cet endroit. '
  '35':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Saül bâtit un autel à l’Eternel. Ce fut le premier qu’il édifia en son honneur.
  '36':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Saül proposa : Descendons cette nuit derrière les Philistins et pillons-les jusqu’à l’aube. Nous ne laisserons pas de survivants.'
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Les soldats lui dirent : Fais comme tu le juges bon.'
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Alors le prêtre intervint en disant : Consultons d’abord Dieu ici.'
  '37':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Saül interrogea Dieu : Descendrai-je à la poursuite des Philistins ? Les livreras-tu en notre pouvoir ?'
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Mais Dieu ne lui répondit pas ce jour-là. '
  '38':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Alors Saül convoqua tous les chefs du peuple auprès de lui et leur dit : Faites des recherches et tâchez de savoir quelle faute a été commise aujourd’hui ! '
  '39':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Aussi vrai que l’Eternel qui vient de délivrer Israël est vivant, je jure que le coupable mourra, même s’il s’agissait de mon fils Jonathan.
  - type: usfm
    marker: p
    children:
    - type: text
      text: Mais personne dans tout le peuple ne lui répondit mot.
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dans le défilé que Jonathan cherchait à franchir pour atteindre le poste des Philistins se dressaient de part et d’autre deux pointes rocheuses appelées Botsets et Séné. '
  '40':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Alors il dit : Mettez-vous tous d’un côté, et mon fils Jonathan et moi-même, nous nous mettrons de l’autre.'
  - type: usfm
    marker: p
    children:
    - type: text
      text: – Fais comme tu le juges bon, lui répondirent ses soldats.
  '41':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Saül dit à l’Eternel : Dieu d’Israël, [pourquoi n’as-tu pas répondu à ton serviteur aujourd’hui ? Si la faute se trouve en moi-même ou en mon fils Jonathan, réponds par l’ourim ; si elle se trouve dans l’armée, réponds par le toummim'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '14.41 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Les mots entre crochets se trouvent seulement dans l’ancienne version grecque et la Vulgate. Le texte hébreu traditionnel dit simplement : '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'fais connaître la vérité. '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Sur l’ourim et le toummim, voir '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: Ex 28.30
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: .]
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dans sa réponse, Dieu désigna Saül et Jonathan. Ainsi le peuple fut mis hors de cause. '
  '42':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Alors Saül ordonna : Jetez le sort pour déterminer s’il s’agit de moi ou de mon fils Jonathan'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '14.42 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'L’ancienne version grecque ajoute : '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'Celui que l’Eternel désignera mourra. » Le peuple protesta en disant à Saül : « Jamais ! Cela ne se fera pas ! » Mais Saül s’obstina et fit prévaloir sa volonté sur celle de ses hommes et l’on tira au sort entre lui et son fils Jonathan.'
      marker-yv: yv-n
    - type: text
      text: '  !'
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Et le sort tomba sur Jonathan. '
  '43':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Alors Saül lui demanda : Qu’as-tu fait ? Avoue-le-moi !'
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Et Jonathan lui déclara : J’ai goûté un peu de miel avec le bâton que j’avais en main. Me voici prêt à mourir.'
  '44':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Saül s’écria : Oui, certainement, tu seras puni de mort, Jonathan ! Que Dieu me punisse très sévèrement si je te laisse en vie.'
  '45':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Mais les soldats intervinrent et dirent : Comment ! Jonathan mourrait alors que c’est lui qui est à l’origine de cette grande victoire pour Israël ! Sûrement pas ! Aussi vrai que l’Eternel est vivant, nous ne permettrons pas qu’un seul cheveu tombe de sa tête, car ce qu’il a fait aujourd’hui, c’est avec l’aide de Dieu qu’il l’a réalisé.'
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ainsi, l’intervention du peuple sauva Jonathan et il ne fut pas mis à mort. '
  '46':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Saül abandonna la poursuite des Philistins, et ceux-ci regagnèrent leur pays.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Les victoires militaires de Saül
    marker-yv: yv-h
  '47':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Une fois que Saül eut reçu la royauté sur Israël, il fit la guerre à tous les ennemis d’alentour : aux Moabites, aux Ammonites, aux Edomites, aux rois'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '14.47 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Selon le texte hébreu traditionnel. Le texte hébreu de Qumrân et l’ancienne version grecque ont le singulier.
      marker-yv: yv-n
    - type: text
      text: ' de Tsoba'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '14.47 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Sans doute une région de Syrie (voir '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: 2 S 10.6
        - type: text
          text: ).
      marker-yv: yv-n
    - type: text
      text: ' et aux Philistins ; partout où il se tournait, il les malmenait. '
  '48':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Il signala sa bravoure en battant les Amalécites et en délivrant Israël de ceux qui le pillaient.
  '49':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Saül avait des fils : Jonathan, Yishvi et Malkishoua'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '14.49 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Voir 2 S 2.8, 10 ; 1 Ch 8.33 ; 9.39 ; 10.2.
      marker-yv: yv-n
    - type: text
      text: ', ainsi que deux filles : Mérab, l’aînée, et Mikal, la cadette'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '14.49 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Voir 18.17, 20, 27 ; 19.11-17 ; 25.44 ; 2 S 6.16-23.
      marker-yv: yv-n
    - type: text
      text: '. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: L’une d’elles s’élève au nord en face de Mikmas et l’autre au sud en face de Guéba.
  '50':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Sa femme s’appelait Ahinoam, elle était fille d’Ahimaats. Le général en chef de son armée était Abner, le fils de son oncle Ner. '
  '51':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ner, comme Qish le père de Saül, était fils d’Abiel. '
  '52':
  - type: usfm
    marker: p
    children:
    - type: text
      text: La guerre contre les Philistins se poursuivit avec acharnement pendant toute la vie de Saül. Dès que celui-ci remarquait un homme fort et courageux, il l’enrôlait dans son armée.
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Jonathan dit au jeune homme qui portait ses armes : Viens et attaquons le poste de ces incirconcis. Peut-être l’Eternel agira-t-il en notre faveur, car rien ne l’empêche de sauver par un petit nombre aussi bien que par un grand.'
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Son serviteur lui répondit : Fais tout ce que tu as à cœur. Allons-y ! Je suis prêt à te suivre où tu voudras.'
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Jonathan lui expliqua : Ecoute, nous allons nous faufiler jusqu’à ces hommes, puis nous nous découvrirons brusquement à eux. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'S’ils nous disent : « Halte ! Ne bougez pas jusqu’à ce que nous vous ayons rejoints », nous resterons sur place et nous ne monterons pas jusqu’à eux. '
