document_id: NUM.34,21
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Les frontières du pays promis
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'L’Eternel parla à Moïse, en disant : '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'A l’est, vous ferez aller votre frontière de Hatsar-Enân à Shepham, '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: d’où elle descendra vers Ribla à l’est d’Aïn et suivra les pentes qui bordent la rive orientale du lac de Kinnéreth
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '34.11 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Ribla sur l’Oronte (2 R 23.33 ; 25.21) est à 80 kilomètres au sud du Hamath. Le lac mentionné (appelé ici '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: lac de Kinnéreth
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ) est celui de Tibériade, souvent mentionné dans les évangiles.
      marker-yv: yv-n
    - type: text
      text: ' '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: jusqu’au Jourdain pour aboutir à la mer Morte. Voilà ce que sera votre pays avec les frontières qui l’entourent.
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'Moïse donna les instructions suivantes aux Israélites : C’est là le territoire que vous partagerez par tirage au sort et que l’Eternel a ordonné d’attribuer aux neuf tribus et demie'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '34.13 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Voir Nb 26.52-56 ; 33.54 ; Jos 14.1-2.
      marker-yv: yv-n
    - type: text
      text: '. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'Car la tribu de Ruben et celle de Gad ont déjà reçu leur propriété pour leur tribu, de même que la demi-tribu de Manassé. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: Ces deux tribus et demie ont reçu leur patrimoine foncier de ce côté-ci du Jourdain, en face de Jéricho, à l’est.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Les responsables du partage du pays
    marker-yv: yv-h
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'L’Eternel parla encore à Moïse : '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'Voici les noms des hommes qui procéderont au partage du pays entre vous : le prêtre Eléazar et Josué, fils de Noun. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'De plus, vous prendrez un chef par tribu pour répartir le pays. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'Voici les noms de ces hommes : Pour la tribu de Juda : Caleb, fils de Yephounné ; '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'Ordonne aux Israélites : Quand vous serez entrés dans le pays de Canaan, voici quel territoire vous reviendra en possession : ses frontières sont les suivantes'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '34.2 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: En approchant du moment d’entrer en Canaan, Israël reçoit des indications précises sur les limites du pays. Celles-ci ne furent atteintes qu’au temps de Salomon (voir Jos 15 ; Ez 47.13-20).
      marker-yv: yv-n
    - type: text
      text: '  : '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: 'pour celle de Siméon : Samuel, fils d’Ammihoud ; '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: 'pour celle de Benjamin : Elidad, fils de Kislôn ; '
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: 'pour celle de Dan : le chef Bouqqi, fils de Yogli ; '
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: 'pour les descendants de Joseph, pour la tribu de Manassé : le chef Hanniel, fils d’Ephod ; '
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: 'pour celle d’Ephraïm : le chef Qemouel, fils de Shiphtân ; '
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: 'pour celle de Zabulon ; le prince Elitsaphân, fils de Parnak ; '
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: 'pour celle d’Issacar : le prince Paltiel, fils d’Azzân ; '
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: 'pour celle d’Aser : le chef Ahihoud, fils de Shelomi ; '
  '28':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: 'pour celle de Nephtali : le chef Pedahel, fils d’Ammihoud. '
  '29':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: Tels sont ceux à qui l’Eternel ordonna de répartir le pays de Canaan entre les Israélites.
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'la limite méridionale de votre pays partira du désert de Tsîn et longera le pays d’Edom. A l’est, votre frontière sud partira de la mer Morte ; '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'elle obliquera au sud vers la montée des Scorpions et passera par Tsîn pour aboutir au sud de Qadesh-Barnéa. Elle ira ensuite vers Hatsar-Addar, et passera à Atsmôn. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'De là, elle se dirigera vers le torrent d’Egypte pour aboutir à la mer. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: La mer Méditerranée
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '34.6 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'En hébreu, la '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: Grande Mer.
      marker-yv: yv-n
    - type: text
      text: ' constituera votre frontière à l’ouest. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: Au nord, vous ferez aller votre frontière de la mer Méditerranée jusqu’à la montagne de Hor
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '34.7 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Une montagne au nord du pays d’Israël, sans doute un sommet du Liban, à ne pas confondre avec la montagne de même nom où mourut Aaron (Nb 20.22 ; 33.37-41) au sud du pays.
      marker-yv: yv-n
    - type: text
      text: '. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: De là, vous la ferez aller en direction de Lebo-Hamath
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '34.8 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Certains traduisent : '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: l’entrée de Hamath.
      marker-yv: yv-n
    - type: text
      text: ' pour aboutir à Tsedad. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'De là, elle repartira en direction de Ziphrôn et atteindra Hatsar-Enân. Ce sera là votre frontière nord. '
