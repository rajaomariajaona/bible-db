document_id: NUM.34,21
type_code: fra
verses:
  '1':
  - type: heading
    content: Les frontières du pays promis
  - type: text
    content: 'L’Eternel parla à Moïse, en disant : '
  '10':
  - type: text
    content: 'A l’est, vous ferez aller votre frontière de Hatsar-Enân à Shepham, '
  '11':
  - type: text
    content: d’où elle descendra vers Ribla à l’est d’Aïn et suivra les pentes qui bordent la rive orientale du lac de Kinnéreth
  - type: note
    content: Ribla sur l’Oronte (2 R 23.33 ; 25.21) est à 80 kilomètres au sud du Hamath. Le lac mentionné (appelé ici lac de Kinnéreth) est celui de Tibériade, souvent mentionné dans les évangiles.
  - type: text
    content: ' '
  '12':
  - type: text
    content: jusqu’au Jourdain pour aboutir à la mer Morte. Voilà ce que sera votre pays avec les frontières qui l’entourent.
  '13':
  - type: text
    content: 'Moïse donna les instructions suivantes aux Israélites : C’est là le territoire que vous partagerez par tirage au sort et que l’Eternel a ordonné d’attribuer aux neuf tribus et demie'
  - type: note
    content: Voir Nb 26.52-56 ; 33.54 ; Jos 14.1-2.
  - type: text
    content: '. '
  '14':
  - type: text
    content: 'Car la tribu de Ruben et celle de Gad ont déjà reçu leur propriété pour leur tribu, de même que la demi-tribu de Manassé. '
  '15':
  - type: text
    content: Ces deux tribus et demie ont reçu leur patrimoine foncier de ce côté-ci du Jourdain, en face de Jéricho, à l’est.
  - type: heading
    content: Les responsables du partage du pays
  '16':
  - type: text
    content: 'L’Eternel parla encore à Moïse : '
  '17':
  - type: text
    content: 'Voici les noms des hommes qui procéderont au partage du pays entre vous : le prêtre Eléazar et Josué, fils de Noun. '
  '18':
  - type: text
    content: 'De plus, vous prendrez un chef par tribu pour répartir le pays. '
  '19':
  - type: text
    content: 'Voici les noms de ces hommes : Pour la tribu de Juda : Caleb, fils de Yephounné ; '
  '2':
  - type: text
    content: 'Ordonne aux Israélites : Quand vous serez entrés dans le pays de Canaan, voici quel territoire vous reviendra en possession : ses frontières sont les suivantes'
  - type: note
    content: En approchant du moment d’entrer en Canaan, Israël reçoit des indications précises sur les limites du pays. Celles-ci ne furent atteintes qu’au temps de Salomon (voir Jos 15 ; Ez 47.13-20).
  - type: text
    content: '  : '
  '20':
  - type: text
    content: 'pour celle de Siméon : Samuel, fils d’Ammihoud ; '
  '21':
  - type: text
    content: 'pour celle de Benjamin : Elidad, fils de Kislôn ; '
  '22':
  - type: text
    content: 'pour celle de Dan : le chef Bouqqi, fils de Yogli ; '
  '23':
  - type: text
    content: 'pour les descendants de Joseph, pour la tribu de Manassé : le chef Hanniel, fils d’Ephod ; '
  '24':
  - type: text
    content: 'pour celle d’Ephraïm : le chef Qemouel, fils de Shiphtân ; '
  '25':
  - type: text
    content: 'pour celle de Zabulon ; le prince Elitsaphân, fils de Parnak ; '
  '26':
  - type: text
    content: 'pour celle d’Issacar : le prince Paltiel, fils d’Azzân ; '
  '27':
  - type: text
    content: 'pour celle d’Aser : le chef Ahihoud, fils de Shelomi ; '
  '28':
  - type: text
    content: 'pour celle de Nephtali : le chef Pedahel, fils d’Ammihoud. '
  '29':
  - type: text
    content: Tels sont ceux à qui l’Eternel ordonna de répartir le pays de Canaan entre les Israélites.
  '3':
  - type: text
    content: 'la limite méridionale de votre pays partira du désert de Tsîn et longera le pays d’Edom. A l’est, votre frontière sud partira de la mer Morte ; '
  '4':
  - type: text
    content: 'elle obliquera au sud vers la montée des Scorpions et passera par Tsîn pour aboutir au sud de Qadesh-Barnéa. Elle ira ensuite vers Hatsar-Addar, et passera à Atsmôn. '
  '5':
  - type: text
    content: 'De là, elle se dirigera vers le torrent d’Egypte pour aboutir à la mer. '
  '6':
  - type: text
    content: La mer Méditerranée
  - type: note
    content: En hébreu, la Grande Mer.
  - type: text
    content: ' constituera votre frontière à l’ouest. '
  '7':
  - type: text
    content: Au nord, vous ferez aller votre frontière de la mer Méditerranée jusqu’à la montagne de Hor
  - type: note
    content: Une montagne au nord du pays d’Israël, sans doute un sommet du Liban, à ne pas confondre avec la montagne de même nom où mourut Aaron (Nb 20.22 ; 33.37-41) au sud du pays.
  - type: text
    content: '. '
  '8':
  - type: text
    content: De là, vous la ferez aller en direction de Lebo-Hamath
  - type: note
    content: 'Certains traduisent : l’entrée de Hamath.'
  - type: text
    content: ' pour aboutir à Tsedad. '
  '9':
  - type: text
    content: 'De là, elle repartira en direction de Ziphrôn et atteindra Hatsar-Enân. Ce sera là votre frontière nord. '
