document_id: 2PE.INTRO1
type_code: fra
segments:
- type: usfm
  marker: imt1
  children:
  - type: text
    text: Introduction
- type: usfm
  marker: ip
  children:
  - type: text
    text: L’auteur de cette lettre se présente comme étant « Simon Pierre, apôtre de Jésus-Christ » (1.1). Il a été témoin de la transfiguration et a entendu la voix de Dieu venue du ciel (1.16-18). Il rappelle enfin que Jésus avait prophétisé que lui, Pierre, mourrait martyr (1.14).
- type: usfm
  marker: ip
  children:
  - type: text
    text: Pierre ne nomme ni ses destinataires ni le lieu de destination de sa lettre. La mention d’une première lettre (3.1) ne se réfère pas nécessairement à 1 Pierre, car il paraît probable que Pierre a écrit plus de deux lettres dans sa vie. Les différences de style entre les deux lettres de Pierre peuvent s’expliquer par le changement de secrétaire entre la première et la seconde lettre.
- type: usfm
  marker: ip
  children:
  - type: text
    text: 'La lettre doit dater de la fin de la vie de Pierre. De fait, le genre littéraire de la lettre s’apparente, à bien des égards, à celui du discours d’adieu : l’auteur prévient de son « départ », rappelle ses enseignements passés (1.12-15), annonce la venue d’« enseignants de mensonges » qui tenteront de détruire son œuvre (chap. 2), et prend des mesures pour aider ses correspondants à se mettre à l’abri de leur influence (1.15).'
- type: usfm
  marker: ip
  children:
  - type: text
    text: 'Après une invitation à joindre à la foi les qualités chrétiennes (maîtrise de soi, persévérance, amour) (1.3-11), Pierre précise le but de sa lettre : « vous tenir en éveil par mes rappels » (1.13). Le premier de ces rappels concerne la vérité de l’Evangile, fondé sur le témoignage oculaire et sur la parole prophétique inspirée par le Saint-Esprit (1.16-21). Le chapitre 2 est consacré tout entier à la menace des « enseignants de mensonges ». Au chapitre 3, Pierre replace le sort de ces prédicateurs d’erreurs dans l’histoire du salut : il y a déjà eu un jugement par l’eau (le Déluge), il y aura un jugement par le feu. Mais Pierre rappelle que Dieu est patient : « Il ne veut pas qu’un seul périsse. Il voudrait, au contraire, que tous parviennent à se convertir » (3.9).'
- type: usfm
  marker: ip
  children:
  - type: text
    text: Pierre termine par une mise en garde contre ceux qui tordent le sens des Ecritures (3.16).
