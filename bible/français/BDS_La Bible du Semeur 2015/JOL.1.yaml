document_id: JOL.1,21
type_code: fra
verses:
  '1':
  - type: heading
    content: Fléau de sauterelles
  - type: text
    content: Parole que l’Eternel a adressée à Joël, fils de Petouël.
  - type: heading
    content: Sur la désolation du pays
  '10':
  - type: text
    content: Les champs sont ravagés,
  - type: text
    content: la terre est dans le deuil,
  - type: text
    content: car le blé est détruit,
  - type: text
    content: le vin nouveau est dans la honte,
  - type: text
    content: l’huile fraîche a tari.
  '11':
  - type: text
    content: Les laboureurs sont dans la honte,
  - type: text
    content: les cultivateurs des vergers ╵et les vignerons hurlent,
  - type: text
    content: à cause du blé et de l’orge,
  - type: text
    content: car il ne reste rien ╵de la moisson des champs.
  '12':
  - type: text
    content: Les vignes sont honteuses
  - type: text
    content: et les figuiers s’étiolent,
  - type: text
    content: le grenadier et le palmier, ╵ainsi que le pommier,
  - type: text
    content: tous les arbres des champs ╵sont desséchés.
  - type: text
    content: La joie est dans la honte ╵parmi les hommes.
  - type: heading
    content: Jeûne et lamentation nationaux
  '13':
  - type: text
    content: Ceignez-vous, vous, les prêtres, ╵d’une toile de sac,
  - type: text
    content: lamentez-vous ! ╵Hurlez, vous tous qui officiez ╵devant l’autel !
  - type: text
    content: Venez passer la nuit ╵vêtus d’un habit de toile de sac
  - type: note
    content: Marque de deuil.
  - type: text
    content: ','
  - type: text
    content: vous qui servez mon Dieu,
  - type: text
    content: parce qu’il n’y a plus d’offrandes, ╵ni de libations qui arrivent ╵dans le temple de votre Dieu.
  '14':
  - type: text
    content: Publiez donc un jeûne, ╵et convoquez ╵une réunion cultuelle,
  - type: text
    content: rassemblez les responsables du peuple ╵avec tous les habitants du pays
  - type: text
    content: au temple ╵de l’Eternel, de votre Dieu.
  - type: text
    content: Suppliez l’Eternel !
  - type: heading
    content: La sécheresse
  '15':
  - type: text
    content: Hélas, quel jour !
  - type: text
    content: Le jour de l’Eternel
  - type: note
    content: Voir Es 13.6-9 ; Ez 30.2-3 ; Am 5.18 ; Ab 15 ; So 1.7.
  - type: text
    content: ' approche !'
  - type: text
    content: Comme un fléau dévastateur ╵déchaîné par le Tout-Puissant, ╵il va venir.
  '16':
  - type: text
    content: Car ne nous a-t-on pas ôté ╵la nourriture sous nos yeux ?
  - type: text
    content: Et du temple de notre Dieu
  - type: text
    content: n’a-t-on pas retiré ╵la joie et l’allégresse ?
  '17':
  - type: text
    content: Les graines répandues ╵pourrissent sous les mottes,
  - type: text
    content: les greniers sont en ruine,
  - type: text
    content: les silos démolis,
  - type: text
    content: car le blé fait défaut
  - type: note
    content: Ce verset contient plusieurs termes que l’on ne rencontre qu’ici et dont le sens n’est pas connu. La traduction de ce verset est donc incertaine.
  - type: text
    content: .
  '18':
  - type: text
    content: Ecoutez le bétail, ╵comme il gémit !
  - type: text
    content: Les troupeaux de bovins ╵ne savent où aller
  - type: note
    content: 'Autre traduction : sont consternés.'
  - type: text
    content: ','
  - type: text
    content: car ils ne trouvent plus ╵de pâturages
  - type: text
    content: et les troupeaux de moutons et de chèvres ╵sont atteints eux aussi.
  '19':
  - type: text
    content: C’est vers toi, Eternel, ╵que je pousse des cris.
  - type: text
    content: Oui, car le feu dévore ╵les pâturages de la steppe,
  - type: text
    content: et la flamme consume ╵tous les arbres des champs.
  '2':
  - type: text
    content: Ecoutez ceci, vous, ╵responsables du peuple
  - type: note
    content: 'Ou : vieillards (v. 14 ; 2.16 ; 3.1 où le mot reparaît avec l’un ou l’autre sens).'
  - type: text
    content: ','
  - type: text
    content: vous tous, habitants du pays, ╵prêtez l’oreille.
  - type: text
    content: Est-il, de votre temps,
  - type: text
    content: ou bien du temps de vos ancêtres, ╵survenu rien de tel ?
  '20':
  - type: text
    content: Et même les bêtes sauvages ╵vers toi se tournent,
  - type: text
    content: car les cours d’eau se sont taris
  - type: note
    content: Réminiscence du Ps 42.2.
  - type: text
    content: ','
  - type: text
    content: le feu dévore ╵les pâturages de la steppe.
  '3':
  - type: text
    content: Racontez-le à vos enfants,
  - type: text
    content: qu’eux-mêmes le racontent ╵à leurs propres enfants,
  - type: text
    content: qui, eux, le transmettront ╵à leurs propres enfants.
  '4':
  - type: text
    content: Ce qu’a laissé le vol de sauterelles,
  - type: text
    content: d’autres sauterelles l’ont dévoré ;
  - type: text
    content: ce que les sauterelles ont laissé,
  - type: text
    content: les criquets l’ont mangé ;
  - type: text
    content: ce que les criquets ont laissé,
  - type: text
    content: les grillons l’ont mangé
  - type: note
    content: Dans ce verset, l’hébreu semble employer quatre mots synonymes qui désignent la sauterelle. D’autres pensent à quatre sortes de sauterelles ou d’insectes, ou à quatre stades du développement du même animal, de la larve à l’insecte adulte.
  - type: text
    content: .
  '5':
  - type: text
    content: Réveillez-vous, ivrognes, ╵pleurez !
  - type: text
    content: Hurlez, tous les buveurs de vin,
  - type: text
    content: oui, car le vin nouveau ╵est ôté de vos bouches.
  '6':
  - type: text
    content: Un peuple attaque mon pays,
  - type: text
    content: il est puissant, ╵on ne peut le compter.
  - type: text
    content: Il a des crocs de lion,
  - type: text
    content: il a des dents de lion.
  '7':
  - type: text
    content: Il a fait de mes vignes ╵une dévastation,
  - type: text
    content: et mes figuiers, ╵il les a mis en pièces,
  - type: text
    content: il a complètement ╵pelé leurs troncs ╵et jonché le sol de débris,
  - type: text
    content: leurs rameaux sont tout blancs.
  '8':
  - type: text
    content: Lamente-toi, mon peuple, ╵comme une jeune femme ╵qui aurait revêtu ╵le vêtement de deuil
  - type: text
    content: pour pleurer le mari ╵de sa jeunesse.
  '9':
  - type: text
    content: Quant au temple de l’Eternel, ╵libations et offrandes ╵lui font défaut
  - type: note
    content: Sur les libations, voir Ex 30.9 ; Lv 23.18 ; Nb 15.1-16. Comme tous les produits du sol ont été détruits, on ne peut plus faire d’offrande au Temple.
  - type: text
    content: '  ;'
  - type: text
    content: les prêtres qui font le service ╵de l’Eternel, ╵sont dans le deuil.
