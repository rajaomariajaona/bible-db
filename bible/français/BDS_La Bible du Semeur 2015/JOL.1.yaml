document_id: JOL.1
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Fléau de sauterelles
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Parole que l’Eternel a adressée à Joël, fils de Petouël.
- type: usfm
  marker: s2
  children:
  - type: text
    text: Sur la désolation du pays
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Ecoutez ceci, vous, ╵responsables du peuple
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1.2 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Ou : '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'vieillards '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: (v. 14 ; 2.16 ; 3.1 où le mot reparaît avec l’un ou l’autre sens).
    marker-yv: yv-n
  - type: text
    text: ','
- type: usfm
  marker: q1
  children:
  - type: text
    text: vous tous, habitants du pays, ╵prêtez l’oreille.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Est-il, de votre temps,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ou bien du temps de vos ancêtres, ╵survenu rien de tel ?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Racontez-le à vos enfants,
- type: usfm
  marker: q1
  children:
  - type: text
    text: qu’eux-mêmes le racontent ╵à leurs propres enfants,
- type: usfm
  marker: q1
  children:
  - type: text
    text: qui, eux, le transmettront ╵à leurs propres enfants.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Ce qu’a laissé le vol de sauterelles,
- type: usfm
  marker: q1
  children:
  - type: text
    text: d’autres sauterelles l’ont dévoré ;
- type: usfm
  marker: q1
  children:
  - type: text
    text: ce que les sauterelles ont laissé,
- type: usfm
  marker: q1
  children:
  - type: text
    text: les criquets l’ont mangé ;
- type: usfm
  marker: q1
  children:
  - type: text
    text: ce que les criquets ont laissé,
- type: usfm
  marker: q1
  children:
  - type: text
    text: les grillons l’ont mangé
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1.4 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Dans ce verset, l’hébreu semble employer quatre mots synonymes qui désignent la sauterelle. D’autres pensent à quatre sortes de sauterelles ou d’insectes, ou à quatre stades du développement du même animal, de la larve à l’insecte adulte.
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Réveillez-vous, ivrognes, ╵pleurez !
- type: usfm
  marker: q1
  children:
  - type: text
    text: Hurlez, tous les buveurs de vin,
- type: usfm
  marker: q1
  children:
  - type: text
    text: oui, car le vin nouveau ╵est ôté de vos bouches.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Un peuple attaque mon pays,
- type: usfm
  marker: q1
  children:
  - type: text
    text: il est puissant, ╵on ne peut le compter.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Il a des crocs de lion,
- type: usfm
  marker: q1
  children:
  - type: text
    text: il a des dents de lion.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Il a fait de mes vignes ╵une dévastation,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et mes figuiers, ╵il les a mis en pièces,
- type: usfm
  marker: q1
  children:
  - type: text
    text: il a complètement ╵pelé leurs troncs ╵et jonché le sol de débris,
- type: usfm
  marker: q1
  children:
  - type: text
    text: leurs rameaux sont tout blancs.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Lamente-toi, mon peuple, ╵comme une jeune femme ╵qui aurait revêtu ╵le vêtement de deuil
- type: usfm
  marker: q1
  children:
  - type: text
    text: pour pleurer le mari ╵de sa jeunesse.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Quant au temple de l’Eternel, ╵libations et offrandes ╵lui font défaut
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1.9 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Sur les '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'libations, '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: voir Ex 30.9 ; Lv 23.18 ; Nb 15.1-16. Comme tous les produits du sol ont été détruits, on ne peut plus faire d’offrande au Temple.
    marker-yv: yv-n
  - type: text
    text: '  ;'
- type: usfm
  marker: q1
  children:
  - type: text
    text: les prêtres qui font le service ╵de l’Eternel, ╵sont dans le deuil.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Les champs sont ravagés,
- type: usfm
  marker: q1
  children:
  - type: text
    text: la terre est dans le deuil,
- type: usfm
  marker: q1
  children:
  - type: text
    text: car le blé est détruit,
- type: usfm
  marker: q1
  children:
  - type: text
    text: le vin nouveau est dans la honte,
- type: usfm
  marker: q1
  children:
  - type: text
    text: l’huile fraîche a tari.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Les laboureurs sont dans la honte,
- type: usfm
  marker: q1
  children:
  - type: text
    text: les cultivateurs des vergers ╵et les vignerons hurlent,
- type: usfm
  marker: q1
  children:
  - type: text
    text: à cause du blé et de l’orge,
- type: usfm
  marker: q1
  children:
  - type: text
    text: car il ne reste rien ╵de la moisson des champs.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Les vignes sont honteuses
- type: usfm
  marker: q1
  children:
  - type: text
    text: et les figuiers s’étiolent,
- type: usfm
  marker: q1
  children:
  - type: text
    text: le grenadier et le palmier, ╵ainsi que le pommier,
- type: usfm
  marker: q1
  children:
  - type: text
    text: tous les arbres des champs ╵sont desséchés.
- type: usfm
  marker: q1
  children:
  - type: text
    text: La joie est dans la honte ╵parmi les hommes.
- type: usfm
  marker: s2
  children:
  - type: text
    text: Jeûne et lamentation nationaux
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Ceignez-vous, vous, les prêtres, ╵d’une toile de sac,
- type: usfm
  marker: q1
  children:
  - type: text
    text: lamentez-vous ! ╵Hurlez, vous tous qui officiez ╵devant l’autel !
- type: usfm
  marker: q1
  children:
  - type: text
    text: Venez passer la nuit ╵vêtus d’un habit de toile de sac
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1.13 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Marque de deuil.
    marker-yv: yv-n
  - type: text
    text: ','
- type: usfm
  marker: q1
  children:
  - type: text
    text: vous qui servez mon Dieu,
- type: usfm
  marker: q1
  children:
  - type: text
    text: parce qu’il n’y a plus d’offrandes, ╵ni de libations qui arrivent ╵dans le temple de votre Dieu.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Publiez donc un jeûne, ╵et convoquez ╵une réunion cultuelle,
- type: usfm
  marker: q1
  children:
  - type: text
    text: rassemblez les responsables du peuple ╵avec tous les habitants du pays
- type: usfm
  marker: q1
  children:
  - type: text
    text: au temple ╵de l’Eternel, de votre Dieu.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Suppliez l’Eternel !
- type: usfm
  marker: s2
  children:
  - type: text
    text: La sécheresse
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Hélas, quel jour !
- type: usfm
  marker: q1
  children:
  - type: text
    text: Le jour de l’Eternel
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1.15 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Voir Es 13.6-9 ; Ez 30.2-3 ; Am 5.18 ; Ab 15 ; So 1.7.
    marker-yv: yv-n
  - type: text
    text: ' approche !'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Comme un fléau dévastateur ╵déchaîné par le Tout-Puissant, ╵il va venir.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Car ne nous a-t-on pas ôté ╵la nourriture sous nos yeux ?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et du temple de notre Dieu
- type: usfm
  marker: q1
  children:
  - type: text
    text: n’a-t-on pas retiré ╵la joie et l’allégresse ?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Les graines répandues ╵pourrissent sous les mottes,
- type: usfm
  marker: q1
  children:
  - type: text
    text: les greniers sont en ruine,
- type: usfm
  marker: q1
  children:
  - type: text
    text: les silos démolis,
- type: usfm
  marker: q1
  children:
  - type: text
    text: car le blé fait défaut
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1.17 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Ce verset contient plusieurs termes que l’on ne rencontre qu’ici et dont le sens n’est pas connu. La traduction de ce verset est donc incertaine.
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Ecoutez le bétail, ╵comme il gémit !
- type: usfm
  marker: q1
  children:
  - type: text
    text: Les troupeaux de bovins ╵ne savent où aller
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1.18 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Autre traduction : '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: sont consternés.
    marker-yv: yv-n
  - type: text
    text: ','
- type: usfm
  marker: q1
  children:
  - type: text
    text: car ils ne trouvent plus ╵de pâturages
- type: usfm
  marker: q1
  children:
  - type: text
    text: et les troupeaux de moutons et de chèvres ╵sont atteints eux aussi.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: C’est vers toi, Eternel, ╵que je pousse des cris.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Oui, car le feu dévore ╵les pâturages de la steppe,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et la flamme consume ╵tous les arbres des champs.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Et même les bêtes sauvages ╵vers toi se tournent,
- type: usfm
  marker: q1
  children:
  - type: text
    text: car les cours d’eau se sont taris
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1.20 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Réminiscence du '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ps 42.2
        metadata:
          usfm: PSA.42.2
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: ','
- type: usfm
  marker: q1
  children:
  - type: text
    text: le feu dévore ╵les pâturages de la steppe.
