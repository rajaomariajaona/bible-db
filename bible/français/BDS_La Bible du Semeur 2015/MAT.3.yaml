document_id: MAT.3,21
type_code: fra
verses:
  '1':
  - type: heading
    content: L’Évangile du royaume
  - type: heading
    content: Jean-Baptiste, messager de Dieu
  - type: heading
    content: (Mc 1.2-6 ; Lc 3.1-6 ; Jn 1.19-23)
  - type: text
    content: En ce temps-là, parut Jean-Baptiste. Il se mit à prêcher dans le désert de Judée
  - type: note
    content: 'désert de Judée: région aride et presque inhabitée située entre Jérusalem et le cours inférieur du Jourdain ou la mer Morte.'
  - type: text
    content: '. '
  '10':
  - type: text
    content: La hache est déjà sur le point d’attaquer les arbres à la racine. Tout arbre qui ne produit pas de bon fruit sera coupé et jeté au feu.
  - type: heading
    content: (Mc 1.7-8 ; Lc 3.15-18 ; voir Jn 1.24-28)
  '11':
  - type: text
    content: 'Moi, je vous baptise dans l’eau, en signe d’un profond changement. Mais quelqu’un vient après moi : il est bien plus puissant que moi et je ne suis même pas digne de lui enlever les sandales. C’est lui qui vous baptisera dans le Saint-Esprit et le feu. '
  '12':
  - type: text
    content: Il tient en main sa pelle à vanner
  - type: note
    content: 'pelle à vanner: instrument servant à lancer le blé en l’air pour que le vent emporte la bale (la paille) qui enveloppe le grain. D’autres y voient une pelle servant à nettoyer l’aire de battage après le vannage.'
  - type: text
    content: . Il va nettoyer son aire de battage et amasser le blé dans son grenier. Quant à la bale, il la brûlera dans un feu qui ne s’éteindra pas.
  - type: heading
    content: Le baptême de Jésus
  - type: heading
    content: (Mc 1.9-11 ; Lc 3.21-22 ; voir Jn 1.29-34)
  '13':
  - type: text
    content: 'C’est à cette époque que parut Jésus. Il se rendit de la Galilée au Jourdain, auprès de Jean, pour être baptisé par lui. '
  '14':
  - type: text
    content: 'Mais Jean essaya de l’en dissuader. Il lui disait : C’est moi qui ai besoin d’être baptisé par toi, et c’est toi qui viens à moi !'
  '15':
  - type: text
    content: 'Jésus lui répondit : '
  - type: text
    content: Accepte, pour le moment, qu’il en soit ainsi ! Car c’est de cette manière qu’il nous convient d’accomplir tout ce que Dieu considère comme juste.
  - type: text
    content: Là-dessus, Jean accepta de le baptiser.
  '16':
  - type: text
    content: Aussitôt après avoir été baptisé, Jésus sortit de l’eau. Alors le ciel s’ouvrit pour lui
  - type: note
    content: L’expression pour lui est absente de plusieurs manuscrits.
  - type: text
    content: ' et il vit l’Esprit de Dieu descendre sous la forme d’une colombe et venir sur lui. '
  '17':
  - type: text
    content: 'Une voix venant du ciel déclara : Celui-ci est mon Fils bien-aimé, celui qui fait toute ma joie'
  - type: note
    content: Allusion à Es 42.1.
  - type: text
    content: .
  '2':
  - type: text
    content: 'Il disait : Changez'
  - type: note
    content: 'Autres traductions : repentez-vous ou changez d’attitude ou changez de comportement.'
  - type: text
    content: ', car le royaume'
  - type: note
    content: 'D’autres comprennent : le règne.'
  - type: text
    content: ' des cieux est proche.'
  '3':
  - type: text
    content: 'C’est Jean que le prophète Esaïe a annoncé lorsqu’il a dit :'
  - type: text
    content: On entend la voix de quelqu’un
  - type: text
    content: ' ╵'
  - type: text
    content: 'qui crie dans le désert :'
  - type: text
    content: Préparez le chemin pour le Seigneur,
  - type: text
    content: faites-lui des sentiers droits
  - type: text
    content: ' '
  - type: note
    content: Es 40.3 cité selon l’ancienne version grecque.
  - type: text
    content: .
  '4':
  - type: text
    content: 'Jean portait un vêtement de poils de chameau maintenu autour de la taille par une ceinture de cuir. Il se nourrissait de sauterelles et de miel sauvage. '
  '5':
  - type: text
    content: 'On venait à lui de Jérusalem, de la Judée entière et de toutes les contrées riveraines du Jourdain. '
  '6':
  - type: text
    content: Tous se faisaient baptiser par lui dans le Jourdain, en reconnaissant publiquement leurs péchés.
  - type: heading
    content: (Lc 3.7-9)
  '7':
  - type: text
    content: 'Beaucoup de pharisiens et de sadducéens venaient se faire baptiser par lui. Il leur dit : Espèces de vipères ! Qui vous a enseigné à fuir la colère de Dieu qui va se manifester ? '
  '8':
  - type: text
    content: 'Produisez plutôt pour fruits des actes qui montrent que vous avez changé. '
  '9':
  - type: text
    content: 'Ne vous imaginez pas qu’il vous suffit de répéter en vous-mêmes : « Nous sommes les descendants d’Abraham ! » Car, regardez ces pierres : je vous déclare que Dieu peut en faire des enfants d’Abraham.'
