document_id: MAT.3
type_code: fra
segments:
- type: usfm
  marker: ms1
  children:
  - type: text
    text: L’Évangile du royaume
  marker-yv: yv-h
- type: usfm
  marker: s1
  children:
  - type: text
    text: Jean-Baptiste, messager de Dieu
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: (Mc 1.2-6 ; Lc 3.1-6 ; Jn 1.19-23)
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: En ce temps-là, parut Jean-Baptiste. Il se mit à prêcher dans le désert de Judée
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '3.1 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: désert de Judée
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: ': '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: région aride et presque inhabitée située entre Jérusalem et le cours inférieur du Jourdain ou la mer Morte.
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Il disait : Changez'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '3.2 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Autres traductions : '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'repentez-vous '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'ou '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'changez d’attitude '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'ou '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: changez de comportement.
    marker-yv: yv-n
  - type: text
    text: ', car le royaume'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '3.2 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'D’autres comprennent : '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: le règne.
    marker-yv: yv-n
  - type: text
    text: ' des cieux est proche.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'C’est Jean que le prophète Esaïe a annoncé lorsqu’il a dit :'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: qt
    children:
    - type: text
      text: On entend la voix de quelqu’un
  - type: text
    text: ' ╵'
  - type: usfm
    marker: qt
    children:
    - type: text
      text: 'qui crie dans le désert :'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: qt
    children:
    - type: text
      text: Préparez le chemin pour le Seigneur,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: qt
    children:
    - type: text
      text: faites-lui des sentiers droits
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '3.3 '
    - type: usfm
      marker: ft
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Es 40.3
        metadata:
          usfm: ISA.40.3
      - type: text
        text: ' cité selon l’ancienne version grecque.'
    marker-yv: yv-n
  - type: usfm
    marker: qt
    children:
    - type: text
      text: .
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Jean portait un vêtement de poils de chameau maintenu autour de la taille par une ceinture de cuir. Il se nourrissait de sauterelles et de miel sauvage. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'On venait à lui de Jérusalem, de la Judée entière et de toutes les contrées riveraines du Jourdain. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Tous se faisaient baptiser par lui dans le Jourdain, en reconnaissant publiquement leurs péchés.
- type: usfm
  marker: r
  children:
  - type: text
    text: (Lc 3.7-9)
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Beaucoup de pharisiens et de sadducéens venaient se faire baptiser par lui. Il leur dit : Espèces de vipères ! Qui vous a enseigné à fuir la colère de Dieu qui va se manifester ? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Produisez plutôt pour fruits des actes qui montrent que vous avez changé. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Ne vous imaginez pas qu’il vous suffit de répéter en vous-mêmes : « Nous sommes les descendants d’Abraham ! » Car, regardez ces pierres : je vous déclare que Dieu peut en faire des enfants d’Abraham.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: La hache est déjà sur le point d’attaquer les arbres à la racine. Tout arbre qui ne produit pas de bon fruit sera coupé et jeté au feu.
- type: usfm
  marker: r
  children:
  - type: text
    text: (Mc 1.7-8 ; Lc 3.15-18 ; voir Jn 1.24-28)
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Moi, je vous baptise dans l’eau, en signe d’un profond changement. Mais quelqu’un vient après moi : il est bien plus puissant que moi et je ne suis même pas digne de lui enlever les sandales. C’est lui qui vous baptisera dans le Saint-Esprit et le feu. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Il tient en main sa pelle à vanner
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '3.12 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: pelle à vanner
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: ': '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: instrument servant à lancer le blé en l’air pour que le vent emporte la bale (la paille) qui enveloppe le grain. D’autres y voient une pelle servant à nettoyer l’aire de battage après le vannage.
    marker-yv: yv-n
  - type: text
    text: . Il va nettoyer son aire de battage et amasser le blé dans son grenier. Quant à la bale, il la brûlera dans un feu qui ne s’éteindra pas.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Le baptême de Jésus
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: (Mc 1.9-11 ; Lc 3.21-22 ; voir Jn 1.29-34)
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'C’est à cette époque que parut Jésus. Il se rendit de la Galilée au Jourdain, auprès de Jean, pour être baptisé par lui. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Mais Jean essaya de l’en dissuader. Il lui disait : C’est moi qui ai besoin d’être baptisé par toi, et c’est toi qui viens à moi !'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Jésus lui répondit : '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Accepte, pour le moment, qu’il en soit ainsi ! Car c’est de cette manière qu’il nous convient d’accomplir tout ce que Dieu considère comme juste.
- type: usfm
  marker: p
  children:
  - type: text
    text: Là-dessus, Jean accepta de le baptiser.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Aussitôt après avoir été baptisé, Jésus sortit de l’eau. Alors le ciel s’ouvrit pour lui
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '3.16 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'L’expression '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'pour lui '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: est absente de plusieurs manuscrits.
    marker-yv: yv-n
  - type: text
    text: ' et il vit l’Esprit de Dieu descendre sous la forme d’une colombe et venir sur lui. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Une voix venant du ciel déclara : Celui-ci est mon Fils bien-aimé, celui qui fait toute ma joie'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '3.17 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Allusion à '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Es 42.1
        metadata:
          usfm: ISA.42.1
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: .
