document_id: EZR.7,21
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Le voyage d’Esdras à Jérusalem
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: Plus tard, sous le règne d’Artaxerxès, empereur de Perse
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '7.1 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Plusieurs rois perses ont porté ce nom. Il s’agit certainement d’
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'Artaxerxès Ier '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '(voir note '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: '4.7'
        - type: text
          text: ). La venue d’Esdras daterait donc de 458 av. J.-C. (voir v. 7). Les événements relatés dans ce chapitre se sont donc passés environ 60 ans après les précédents.
      marker-yv: yv-n
    - type: text
      text: ', vivait un homme nommé Esdras. Ses ancêtres en ligne directe étaient Seraya, Azaria, Hilqiya, '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: En effet, Esdras prenait grand soin d’étudier la Loi de l’Eternel et de l’appliquer, ainsi que d’enseigner les lois et le droit aux Israélites.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Le document d’Artaxerxès remis à Esdras
    marker-yv: yv-h
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Voici la copie du document que l’empereur Artaxerxès remit à Esdras, le prêtre et spécialiste de la Loi, qui était versé dans la connaissance des lois et des commandements de l’Eternel, pour Israël :'
  '12':
  - type: usfm
    marker: pm
    children:
    - type: text
      text: « Artaxerxès
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '7.12 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Les v. 12-26 sont de nouveau en araméen : ils reproduisent le document royal rédigé dans la langue diplomatique de l’époque.'
      marker-yv: yv-n
    - type: text
      text: ', le roi des rois, au prêtre Esdras, spécialiste de la Loi du Dieu du ciel, etc. '
  '13':
  - type: usfm
    marker: pm
    children:
    - type: text
      text: 'J’ai donné ordre que tous les Israélites, les prêtres et les lévites qui résident dans mon royaume et qui désirent aller à Jérusalem aillent avec toi. '
  '14':
  - type: usfm
    marker: pm
    children:
    - type: text
      text: 'Moi, le roi et mes sept conseillers, nous t’envoyons faire une enquête dans le territoire de Juda et à Jérusalem, pour voir comment y est observée la Loi de ton Dieu qui est entre tes mains. '
  '15':
  - type: usfm
    marker: pm
    children:
    - type: text
      text: 'Tu es également chargé d’y apporter l’argent et l’or que le roi et ses conseillers ont offerts au Dieu d’Israël qui a sa demeure à Jérusalem. '
  '16':
  - type: usfm
    marker: pm
    children:
    - type: text
      text: 'Tu emporteras aussi tout l’argent et l’or que tu auras collecté dans toute la province de Babylone et les dons volontaires faits par le peuple et les prêtres pour le temple de leur Dieu qui est à Jérusalem. '
  '17':
  - type: usfm
    marker: pm
    children:
    - type: text
      text: 'Avec cet argent, tu auras soin d’acheter là-bas des taureaux, des béliers, des agneaux, avec les offrandes de céréales et de vin qui doivent les accompagner, et tu les offriras sur l’autel du temple de votre Dieu à Jérusalem. '
  '18':
  - type: usfm
    marker: pm
    children:
    - type: text
      text: Quant au reste de l’argent et de l’or, vous en ferez ce que toi et tes compatriotes jugerez bon de faire, conformément à la volonté de votre Dieu.
  '19':
  - type: usfm
    marker: pm
    children:
    - type: text
      text: 'Tu déposeras devant le Dieu de Jérusalem les ustensiles du culte qui te seront remis pour le service du temple de ton Dieu. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Shalloum, Tsadoq, Ahitoub, '
  '20':
  - type: usfm
    marker: pm
    children:
    - type: text
      text: Concernant les autres dépenses qu’il te sera nécessaire d’effectuer pour le temple de ton Dieu, tu les feras payer par la trésorerie royale
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '7.20 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'C’est-à-dire, dans ce cas, par les impôts perçus dans les provinces à l’ouest de l’Euphrate (voir '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: '6.8'
        - type: text
          text: ).
      marker-yv: yv-n
    - type: text
      text: '. '
  '21':
  - type: usfm
    marker: pm
    children:
    - type: text
      text: 'Moi, l’empereur Artaxerxès, je donne l’ordre à tous les trésoriers de la province à l’ouest de l’Euphrate de faire exactement tout ce que le prêtre Esdras, spécialiste de la Loi du Dieu du ciel, vous demandera, '
  '22':
  - type: usfm
    marker: pm
    children:
    - type: text
      text: 'jusqu’à concurrence de 3 500 kilogrammes d’argent, 45 000 litres de blé, 4 500 litres de vin, 4 500 litres d’huile et du sel à volonté. '
  '23':
  - type: usfm
    marker: pm
    children:
    - type: text
      text: On se conformera scrupuleusement à tout ce qui est ordonné par le Dieu du ciel pour qu’il ne se mette pas en colère contre mon empire et contre mes descendants.
  '24':
  - type: usfm
    marker: pm
    children:
    - type: text
      text: 'Enfin, nous vous notifions qu’il n’est permis de prélever ni taxe, ni impôt, ni droit de péage sur aucun des prêtres, des lévites, des musiciens, des portiers, des desservants et des serviteurs de ce temple. '
  '25':
  - type: usfm
    marker: pm
    children:
    - type: text
      text: Quant à toi, Esdras, nomme, conformément aux sages instructions de la Loi de ton Dieu que tu possèdes, des juges et des magistrats chargés de rendre la justice à tous ceux qui, dans la province à l’ouest de l’Euphrate, connaissent les lois de ton Dieu. Quant à ceux qui ne les connaissent pas, tu les leur feras connaître.
  '26':
  - type: usfm
    marker: pm
    children:
    - type: text
      text: Tous ceux qui n’observent pas exactement la Loi de ton Dieu et la loi de l’empereur, seront condamnés soit à la peine capitale, soit à l’exil, soit à la confiscation de leurs biens, soit à l’emprisonnement. »
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Louange
    marker-yv: yv-h
  '27':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Béni soit l’Eternel, le Dieu de nos ancêtres, qui a disposé l’empereur à donner une telle splendeur au temple de l’Eternel à Jérusalem, '
  '28':
  - type: usfm
    marker: p
    children:
    - type: text
      text: et qui m’a témoigné sa bonté dans mes rapports avec l’empereur, ses conseillers, et tous les plus hauts fonctionnaires impériaux. Ainsi fortifié parce que l’Eternel mon Dieu était avec moi, j’ai pu rassembler des chefs d’Israël pour qu’ils partent avec moi.
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Amaria, Azaria, Merayoth, '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Zerahya, Ouzzi, Bouqqi, '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Abishoua, Phinéas, Eléazar, fils d’Aaron le grand-prêtre.
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Cet Esdras vint de Babylone. C’était un spécialiste de la Loi possédant une connaissance approfondie de la Loi de Moïse, que l’Eternel, le Dieu d’Israël, avait donnée à son peuple. L’Eternel son Dieu était avec Esdras, si bien que l’empereur lui accorda tout ce qu’il demandait.
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: La septième année
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '7.7 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Voir note v. 1.
      marker-yv: yv-n
    - type: text
      text: ' du règne d’Artaxerxès, un certain nombre d’Israélites : des prêtres et des lévites, des musiciens, des portiers et des desservants du Temple partirent pour Jérusalem. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Esdras vint avec eux à Jérusalem au cinquième mois de la septième année du règne de l’empereur. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Il avait fixé le départ de Babylone au premier jour du premier mois et il arriva à Jérusalem le premier jour du cinquième mois grâce à la protection bienveillante de son Dieu. '
