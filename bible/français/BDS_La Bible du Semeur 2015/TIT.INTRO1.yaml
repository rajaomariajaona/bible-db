type_code: fra
verses:
  '1':
  - type: text
    content: Introduction
  - type: text
    content: Après une libération de sa première captivité romaine (Ac 28), Paul a annoncé l’Evangile en Crète, la plus grande des îles grecques. Auparavant, il n’y avait séjourné que peu de temps, comme prisonnier, lors de son voyage à Rome pour comparaître devant l’empereur (Ac 27.7-8).
  - type: text
    content: Lors de son départ de l’île, l’apôtre y laisse Tite, l’un de ses proches collaborateurs, d’origine non juive (Ga 2.3), chargé à plusieurs reprises de missions délicates, en particulier à Corinthe (2 Co 2.12-13 ; 7.6-7). Il lui confie comme tâche de parachever, dans une situation assez difficile (1.12-13), l’organisation de l’Eglise qui y avait été fondée (Tt 1.5).
  - type: text
    content: Paul donne rendez-vous à Tite avant l’hiver à Nicopolis, sur la côte ouest de la Grèce (3.12). Il écrit donc très certainement de Macédoine où il a aussi rédigé, à cette même époque, 1 Timothée. Il existe d’ailleurs une grande parenté dans le vocabulaire, le style et le souci « pastoral » de ces deux lettres de l’apôtre à ses collaborateurs.
  - type: text
    content: Après avoir rappelé les qualités nécessaires aux responsables dans les Eglises, l’apôtre dénonce les erreurs et les « spéculations juives » qui s’opposent à « l’enseignement véritable » (chap. 1). Puis il adresse des recommandations aux différents groupes qui composent l’Eglise (chap. 2) et termine la lettre en rappelant l’œuvre de la grâce divine qui conduit le croyant à vivre de manière conforme à l’Evangile (chap. 3).
