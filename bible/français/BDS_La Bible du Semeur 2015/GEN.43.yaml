document_id: GEN.43,21
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Benjamin part avec ses frères en Egypte
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'La famine sévissait de plus en plus durement dans le pays. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: Si nous n’avions pas tant tardé, nous serions déjà deux fois de retour.
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'Leur père Israël leur dit : Eh bien ! Si c’est ainsi, faites ceci : Mettez dans vos bagages les meilleurs produits du pays et offrez-les à cet homme : un peu de baume et un peu de miel, de l’astragale, du laudanum, des pistaches et des amandes. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'Prenez avec vous le double de la somme voulue et restituez l’argent qui a été remis à l’entrée de vos sacs. Peut-être s’agissait-il d’une erreur. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'Emmenez votre frère et partez, retournez chez cet homme. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: Que le Dieu tout-puissant rende cet homme compatissant à votre égard. Qu’il vous rende votre autre frère ainsi que Benjamin. Quant à moi, comme je dois être privé d’enfants, que j’en sois privé !
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: Alors ils se chargèrent du présent, prirent avec eux une double somme d’argent et emmenèrent Benjamin. Ainsi ils se mirent en route, se rendirent en Egypte et se présentèrent devant Joseph.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Le repas chez Joseph
    marker-yv: yv-h
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'Joseph vit avec eux Benjamin, il dit alors à l’intendant qui gérait sa maison : Conduis ces gens chez moi, fais abattre une bête et qu’on l’apprête, car ces hommes mangeront avec moi à midi.'
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'L’intendant exécuta les ordres de son maître et conduisit ces gens à la maison de Joseph. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'Ceux-ci furent effrayés d’être introduits dans la maison de Joseph et dirent : C’est à cause de l’argent remis la dernière fois dans nos sacs qu’on nous fait venir. Ils vont débouler sur nous, tomber sur nous pour nous prendre comme esclaves et s’emparer de nos ânes.'
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'Ils s’approchèrent de l’intendant de la maison de Joseph et lui parlèrent à l’entrée de la maison : '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: Quand la famille de Jacob eut mangé tout le blé rapporté d’Egypte
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '43.2 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Sans doute après une année (voir '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: '45.6'
        - type: text
          text: ).
      marker-yv: yv-n
    - type: text
      text: ', Jacob dit à ses fils : Retournez là-bas nous acheter un peu de vivres.'
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: 'Excuse-nous, mon seigneur : en fait nous sommes déjà venus une première fois pour acheter des vivres. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: 'Quand nous sommes arrivés à l’étape où nous avons passé la nuit, nous avons ouvert nos sacs et chacun de nous a retrouvé son argent à l’ouverture de son sac, c’était exactement la somme que nous avions payée. Alors nous l’avons rapportée, '
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: et nous avons emporté avec nous une autre somme d’argent pour acheter des vivres. Nous ne savons pas qui a remis notre argent dans nos sacs !
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: 'L’intendant répondit : Tout va bien ; ne craignez rien. C’est votre Dieu, le Dieu de votre père, qui a mis un trésor dans vos sacs. Votre argent m’a bien été remis.'
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Puis il relâcha Siméon et le leur fit amener. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: 'Il les introduisit ensuite dans la maison de Joseph. Il leur apporta de l’eau pour qu’ils se lavent les pieds et fit porter du fourrage pour leurs ânes. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: 'Ils préparèrent leur présent en attendant l’arrivée de Joseph pour midi ; ils avaient, en effet, appris qu’ils mangeraient là. '
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: 'Joseph rentra chez lui. Ils lui offrirent le présent qu’ils avaient apporté et se prosternèrent à terre devant lui. '
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: 'Il prit de leurs nouvelles et leur demanda : Votre père âgé dont vous m’avez parlé, se porte-t-il bien ? Vit-il encore ?'
  '28':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: 'Ils répondirent en s’inclinant et en se prosternant jusqu’à terre : Ton serviteur, notre père, est encore en vie et il va bien.'
  '29':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: 'En apercevant son frère Benjamin, fils de sa mère, il demanda : Est-ce là votre frère cadet dont vous m’avez parlé ? Et il ajouta : Que Dieu te témoigne sa grâce, mon fils !'
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'Juda lui répondit : Cet homme nous a solennellement avertis que nous ne pourrons plus nous présenter devant lui si notre frère ne nous accompagne pas. '
  '30':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '30'
    - type: text
      text: 'Joseph sortit en hâte car la vue de son frère l’avait profondément ému, et il chercha un endroit pour laisser couler ses larmes ; il se retira dans sa chambre et pleura. '
  '31':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '31'
    - type: text
      text: 'Puis il se lava le visage et ressortit. Il contint son émotion et ordonna de servir le repas. '
  '32':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '32'
    - type: text
      text: 'On les servit séparément, lui à une table, ses frères à une autre, et les Egyptiens qui mangeaient avec lui à une troisième table. En effet, les Egyptiens ne peuvent pas prendre leurs repas avec les Hébreux : ils considèrent cela comme une chose abominable. '
  '33':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '33'
    - type: text
      text: 'On fit asseoir les frères en face de Joseph, par ordre d’âge, de l’aîné au plus jeune, de sorte qu’ils se regardaient l’un l’autre avec stupéfaction. '
  '34':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '34'
    - type: text
      text: Joseph leur fit servir des mets de sa propre table ; Benjamin reçut une part cinq fois plus copieuse que celle des autres. Ainsi ils burent tout leur saoûl avec lui.
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'Si tu laisses notre frère partir avec nous, nous irons en Egypte et nous t’achèterons des vivres. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'Mais si tu ne le laisses pas venir, nous ne partirons pas ; car cet homme nous a bien dit : « Vous ne serez pas admis en ma présence si votre frère n’est pas avec vous. »'
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'Israël reprit : Pourquoi m’avez-vous causé ce tort ? Aviez-vous besoin de raconter à cet homme que vous avez encore un frère ?'
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'Ils lui répondirent : Cet homme nous a questionnés en détail sur nous et sur notre parenté. Il nous a demandé : « Votre père vit-il encore ? Avez-vous un autre frère ? » Et nous avons répondu à ces questions. Pouvions-nous savoir qu’il nous ordonnerait de lui amener notre frère ?'
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'Alors Juda dit à Israël, son père : Laisse partir le jeune homme avec moi. Nous nous mettrons en route et nous irons là-bas pour pouvoir survivre. Sinon, nous mourrons tous, et nous, et toi et nos jeunes enfants. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'Je le prends sous ma responsabilité, tu m’en demanderas compte. Si je ne te le ramène pas, si je ne le fais pas revenir là, devant toi, je serai pour toujours coupable envers toi. '
