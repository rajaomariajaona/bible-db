    marker-yv: yv-n
  - type: text
    text: ' ╵partira en exil,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: ses prêtres, ses ministres ╵s’en iront avec lui
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '49.3 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Voir '
