document_id: JER.49,21
type_code: fra
verses:
  '1':
  - type: heading
    content: Contre Ammon
  - type: text
    content: Prophéties sur les Ammonites.
  - type: text
    content: 'Voici ce que déclare l’Eternel :'
  - type: text
    content: Israël n’a-t-il plus de fils ?
  - type: text
    content: N’a-t-il pas d’héritiers ?
  - type: text
    content: Alors pourquoi le roi
  - type: note
    content: 'Autre traduction : Milkom, nom d’un dieu des Ammonites.'
  - type: text
    content: ' ╵des Ammonites ╵a-t-il pris possession de Gad ?'
  - type: text
    content: Pourquoi les Ammonites ╵se sont-ils installés ╵dans les villes de Gad ?
  '10':
  - type: text
    content: Moi, je fouille Esaü,
  - type: text
    content: je mets à découvert ╵ses lieux secrets,
  - type: text
    content: il ne pourra pas se cacher ;
  - type: text
    content: 'tout est détruit : sa race, ╵sa parenté et ses voisins ;'
  - type: text
    content: 'plus personne pour dire :'
  '11':
  - type: text
    content: « Laisse tes orphelins,
  - type: text
    content: je les élèverai,
  - type: text
    content: et que tes veuves ╵se confient à mes soins. »
  '12':
  - type: text
    content: 'Car voici ce que déclare l’Eternel : Ceux qui n’étaient pas condamnés à boire cette coupe la boiront tout de même, et toi, tu serais acquitté ? Non, certainement pas ; tu ne seras pas acquitté et tu devras boire la coupe. '
  '13':
  - type: text
    content: 'J’en fais le serment par moi-même – l’Eternel le déclare : dévastation et destruction vont fondre sur Botsra'
  - type: note
    content: Non la Botsra de 48.24, mais la Botsra édomite (voir Gn 36.33 ; Es 34.6).
  - type: text
    content: . Elle sera en proie à l’opprobre et à la malédiction, et toutes ses villes seront, à tout jamais, un tas de ruines.
  '14':
  - type: text
    content: J’ai entendu une nouvelle
  - type: text
    content: venant de l’Eternel
  - type: text
    content: 'et un héraut a été envoyé ╵parmi les autres peuples :'
  - type: text
    content: « Rassemblez-vous ╵et marchez contre lui !
  - type: text
    content: Levez-vous pour la guerre
  - type: note
    content: Les v. 14-16 sont parallèles à Ab 1-4.
  - type: text
    content: '  ! »'
  '15':
  - type: text
    content: Voici, je vais te rendre ╵petit parmi les peuples,
  - type: text
    content: méprisé par les hommes.
  '16':
  - type: text
    content: La peur que tu inspires ╵et ton orgueil t’égarent,
  - type: text
    content: toi qui as ta demeure ╵dans les creux des rochers
  - type: note
    content: Séla, la capitale d’Edom, peut-être identique à la Pétra des Nabatéens, et en tout cas située dans la même région, construite sur les rochers, était presque inaccessible (cf. 2 R 14.7 ; Ps 108.10-11 ; Ez 35.7 ; Ab 3).
  - type: text
    content: et qui occupes ╵le sommet des collines.
  - type: text
    content: Oui, comme l’aigle, ╵tu élèves ton nid ;
  - type: text
    content: je t’en ferai descendre !
  - type: text
    content: l’Eternel le déclare.
  '17':
  - type: text
    content: Oui, Edom sera dévasté,
  - type: text
    content: tous ceux qui passeront par là ╵en seront effarés ╵et siffleront d’horreur ╵à la vue de ses plaies.
  '18':
  - type: text
    content: Il en sera ╵comme lors de la catastrophe ╵de Sodome et Gomorrhe ╵et des villes voisines
  - type: note
    content: Voir Gn 18.20 à 19.29.
  - type: text
    content: ','
  - type: text
    content: 'l’Eternel le déclare :'
  - type: text
    content: il n’y aura personne ╵qui y habitera,
  - type: text
    content: et aucun être humain ╵n’y séjournera plus.
  '19':
  - type: text
    content: Voici, comme un lion ╵monte des forêts luxuriantes du Jourdain
  - type: text
    content: vers des enclos solides,
  - type: text
    content: moi, je viendrai ╵les faire déguerpir de là, ╵en un clin d’œil,
  - type: text
    content: et je me choisirai ╵quelqu’un pour dominer sur lui
  - type: note
    content: 'quelqu’un pour dominer sur lui. Autre traduction : de ces meilleurs béliers.'
  - type: text
    content: .
  - type: text
    content: Car qui est mon égal ?
  - type: text
    content: Qui me demandera des comptes ?
  - type: text
    content: Et quel est le berger ╵qui pourrait tenir contre moi
  - type: note
    content: Les v. 19-21 ont leur parallèle en 50.44-46.
  - type: text
    content: '  ?'
  '2':
  - type: text
    content: C’est pourquoi le temps vient,
  - type: text
    content: l’Eternel le déclare,
  - type: text
    content: où je ferai entendre ╵les cris de guerre ╵contre Rabba
  - type: note
    content: 'Rabba: capitale des Ammonites.'
  - type: text
    content: ' des Ammonites ;'
  - type: text
    content: elle sera changée ╵en un tertre de ruines,
  - type: text
    content: et toutes ses bourgades ╵seront livrées au feu.
  - type: text
    content: Israël spoliera
  - type: text
    content: ceux qui l’auront spolié
  - type: note
    content: Cette expression se retrouve en Ab 17.
  - type: text
    content: ','
  - type: text
    content: l’Eternel le déclare.
  '20':
  - type: text
    content: Ecoutez donc le plan ╵que l’Eternel a fait ╵contre les Edomites,
  - type: text
    content: 'et les projets qu’il a formés ╵contre la population de Témân :'
  - type: text
    content: on les entraînera ╵comme les plus chétives ╵des bêtes du troupeau
  - type: text
    content: et l’on ravagera ╵après eux leurs enclos.
  '21':
  - type: text
    content: Au fracas de leur chute,
  - type: text
    content: la terre tremblera,
  - type: text
    content: un cri s’élèvera, ╵on l’entendra ╵jusque sur la mer des Roseaux.
  '22':
  - type: text
    content: Ce sera comme un aigle ╵qui monte et plane,
  - type: text
    content: et qui étend ses ailes ╵au-dessus de Botsra ;
  - type: text
    content: et le cœur des guerriers ╵d’Edom, en ce jour-là,
  - type: text
    content: sera semblable au cœur ╵d’une femme en travail
  - type: note
    content: Voir 48.40-41.
  - type: text
    content: .
  - type: heading
    content: Contre Damas
  '23':
  - type: text
    content: 'Prophétie sur Damas :'
  - type: text
    content: Hamath ainsi qu’Arpad
  - type: note
    content: 'Hamath: ville syrienne sur l’Oronte ; Arpad se trouve au nord d’Alep. Damas, ville principale de Syrie.'
  - type: text
    content: ' ╵sont couvertes de honte.'
  - type: text
    content: Car elles ont appris ╵de mauvaises nouvelles.
  - type: text
    content: 'Elles sont démoralisées :'
  - type: text
    content: c’est la mer en tourmente
  - type: text
    content: qui ne peut s’apaiser.
  '24':
  - type: text
    content: Damas est affaiblie
  - type: text
    content: et se tourne pour fuir,
  - type: text
    content: un tremblement s’empare d’elle,
  - type: text
    content: l’angoisse et les douleurs ╵l’ont soudainement prise
  - type: text
    content: comme une femme en couches.
  '25':
  - type: text
    content: Comment donc se fait-il ╵qu’on l’ait abandonnée,
  - type: text
    content: la ville si célèbre,
  - type: text
    content: la cité qui faisait ma joie
  - type: note
    content: 'Certains manuscrits de l’ancienne version grecque, la version syriaque, la Vulgate et le targoum ont : la cité joyeuse.'
  - type: text
    content: '  ?'
  '26':
  - type: text
    content: Ainsi, ses jeunes gens ╵tomberont sur ses places,
  - type: text
    content: et tous ses combattants
  - type: text
    content: périront ce jour-là,
  - type: text
    content: l’Eternel le déclare, ╵le Seigneur des armées célestes.
  '27':
  - type: text
    content: Et je mettrai le feu ╵à la muraille de Damas,
  - type: text
    content: et il consumera ╵les palais du roi Ben-Hadad
  - type: note
    content: Plusieurs rois de Damas ont porté ce nom. Ce verset reprend Am 1.4, avec un autre verbe en hébreu, au début du verset.
  - type: text
    content: .
  - type: heading
    content: Contre les tribus arabes
  '28':
  - type: text
    content: Prophéties sur Qédar et sur les royaumes de Hatsor vaincus par Nabuchodonosor, roi de Babylone
  - type: note
    content: En 599 à 598 av. J.-C., Nabuchodonosor ravagera les tribus arabes, qu’elles soient nomades (Qédar) ou semi-sédentaires (Hatsor).
  - type: text
    content: .
  - type: text
    content: 'Voici ce que déclare l’Eternel :'
  - type: text
    content: Debout ! A l’assaut de Qédar !
  - type: text
    content: Dévastez tout ╵chez les tribus nomades ╵à l’orient du Jourdain !
  '29':
  - type: text
    content: Qu’on saisisse leurs tentes ╵et leur petit bétail !
  - type: text
    content: Qu’on prenne leurs tapis, ╵tous leurs effets et leurs chameaux !
  - type: text
    content: 'Qu’on proclame contre eux : ╵« De toutes parts, c’est la terreur'
  - type: note
    content: Voir 6.25 ; 20.3, 10 ; 46.5.
  - type: text
    content: '  ! »'
  '3':
  - type: text
    content: Lamente-toi, Heshbôn ! ╵Car Aï est dévastée
  - type: note
    content: 'Heshbôn: voir 48.34. Ville contrôlée apparemment par les Ammonites à cette époque. Aï: ville ammonite différente de celle de Jos 7.2.'
  - type: text
    content: .
  - type: text
    content: Poussez des cris, ╵villages de Rabba !
  - type: text
    content: Revêtez-vous ╵d’un habit de toile de sac,
  - type: text
    content: lamentez-vous,
  - type: text
    content: errez le long des haies,
  - type: text
    content: car le roi ammonite
  - type: note
    content: 'Autre traduction : Milkom (voir v. 1).'
  - type: text
    content: ' ╵partira en exil,'
  - type: text
    content: ses prêtres, ses ministres ╵s’en iront avec lui
  - type: note
    content: Voir Am 1.15.
  - type: text
    content: .
  '30':
  - type: text
    content: Sauvez-vous, fuyez vite, ╵cachez-vous dans des trous profonds, ╵et restez-y,
  - type: text
    content: habitants de Hatsor,
  - type: text
    content: l’Eternel le déclare.
  - type: text
    content: Nabuchodonosor, ╵le roi de Babylone, ╵fait des plans contre vous,
  - type: text
    content: il a formé ╵des projets contre vous.
  '31':
  - type: text
    content: Debout ! déclare l’Eternel,
  - type: text
    content: marchez contre ce peuple ╵qui vit dans l’insouciance,
  - type: text
    content: dans la sécurité,
  - type: text
    content: sans avoir ni verrous ni portes !
  - type: text
    content: Il demeure à l’écart.
  '32':
  - type: text
    content: Emparez-vous de leurs chameaux,
  - type: text
    content: faites de leurs nombreux troupeaux ╵votre butin !
  - type: text
    content: Je disperse à tous vents
  - type: text
    content: ces hommes qui se rasent ╵le haut des joues
  - type: note
    content: Voir 9.25.
  - type: text
    content: ','
  - type: text
    content: je fais venir leur ruine ╵de tous côtés,
  - type: text
    content: l’Eternel le déclare.
  '33':
  - type: text
    content: Et Hatsor deviendra ╵un repaire pour les chacals,
  - type: text
    content: et, pour toujours, ╵un endroit dévasté ;
  - type: text
    content: il n’y aura personne ╵qui y habite,
  - type: text
    content: et aucun être humain ╵n’y séjournera plus.
  - type: heading
    content: Contre Elam
  '34':
  - type: text
    content: Voici le message que l’Eternel adressa au prophète Jérémie au sujet d’Elam, au commencement du règne de Sédécias, roi de Juda
  - type: note
    content: Sédécias a régné de 598 à 587 av. J.-C.
  - type: text
    content: '  :'
  '35':
  - type: text
    content: 'Voici ce que déclare ╵le Seigneur des armées célestes :'
  - type: text
    content: Moi, je vais briser l’arc d’Elam,
  - type: text
    content: principale arme ╵de sa puissance
  - type: note
    content: Les archers élamites étaient célèbres dans l’Antiquité (voir Es 22.6).
  - type: text
    content: .
  '36':
  - type: text
    content: Je ferai venir sur lui quatre vents
  - type: text
    content: des quatre coins de l’horizon,
  - type: text
    content: et je le disperserai à tous vents.
  - type: text
    content: Chez tous les peuples,
  - type: text
    content: on verra arriver ╵des fugitifs d’Elam.
  '37':
  - type: text
    content: Je remplirai d’effroi ╵le cœur des Elamites
  - type: text
    content: devant leurs ennemis ╵qui veulent les tuer,
  - type: text
    content: je leur enverrai le malheur
  - type: text
    content: dans ma colère ardente,
  - type: text
    content: l’Eternel le déclare.
  - type: text
    content: Je lancerai l’épée ╵à leur poursuite
  - type: text
    content: jusqu’à leur extermination.
  '38':
  - type: text
    content: J’érigerai mon trône ╵parmi les Elamites,
  - type: text
    content: j’en ferai disparaître ╵le roi et les ministres,
  - type: text
    content: l’Eternel le déclare.
  '39':
  - type: text
    content: Mais par la suite,
  - type: text
    content: je ferai revenir ╵les captifs élamites,
  - type: text
    content: l’Eternel le déclare.
  '4':
  - type: text
    content: Pourquoi te glorifier ╵de tes vallées,
  - type: text
    content: oui, de tes vallées ruisselantes, ╵peuple rebelle ?
  - type: text
    content: Tu places ta confiance ╵dans tes trésors,
  - type: text
    content: 'disant : « Qui viendra m’attaquer ? »'
  '5':
  - type: text
    content: Je fais venir ╵l’épouvante sur toi,
  - type: text
    content: de tous tes alentours,
  - type: text
    content: l’Eternel le déclare, ╵le Seigneur des armées célestes,
  - type: text
    content: et vous serez chassés, ╵chacun droit devant soi,
  - type: text
    content: il n’y aura personne ╵qui rassemblera les fuyards.
  '6':
  - type: text
    content: Mais plus tard, cependant, ╵moi, je ramènerai ╵les captifs ammonites,
  - type: text
    content: l’Eternel le déclare.
  - type: heading
    content: Contre Edom
  '7':
  - type: text
    content: Prophétie sur Edom.
  - type: text
    content: 'Voici ce que déclare ╵le Seigneur des armées célestes :'
  - type: text
    content: Ne trouve-t-on plus de sagesse ╵au sein du peuple de Témân
  - type: note
    content: Témân, ville ou région d’Edom qui représente souvent tout le pays.
  - type: text
    content: '  ?'
  - type: text
    content: Et les gens clairvoyants ╵n’ont-ils plus de conseils ?
  - type: text
    content: Leur sagesse est-elle perdue ?
  '8':
  - type: text
    content: Fuyez, tournez le dos,
  - type: text
    content: cachez-vous dans des trous profonds ╵et restez-y,
  - type: text
    content: habitants de Dedân
  - type: note
    content: 'Dedân: au nord-ouest de l’Arabie.'
  - type: text
    content: ','
  - type: text
    content: 'car, voici, je fais fondre ╵sur Esaü la ruine :'
  - type: text
    content: le moment est venu ╵où il doit rendre compte.
  '9':
  - type: text
    content: Si des vendangeurs pénètrent chez toi,
  - type: text
    content: ils ne laisseront rien ╵que ce qui se grappille.
  - type: text
    content: S’il s’agit de voleurs ╵pendant la nuit,
  - type: text
    content: ils détruiront ╵jusqu’à ce qu’ils en aient assez
  - type: note
    content: Les v. 9-10 sont parallèles à Ab 5-6.
  - type: text
    content: .
