- type: usfm
  marker: q1
  children:
  - type: text
    text: Poussez des cris, ╵villages de Rabba !
- type: usfm
  marker: q1
  children:
  - type: text
    text: Revêtez-vous ╵d’un habit de toile de sac,
- type: usfm
  marker: q1
  children:
  - type: text
    text: lamentez-vous,
- type: usfm
  marker: q1
  children:
  - type: text
    text: errez le long des haies,
- type: usfm
  marker: q1
  children:
  - type: text
    text: car le roi ammonite
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '49.3 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Autre traduction : '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'Milkom '
    - type: usfm
      marker: ft
      children:
      - type: text
