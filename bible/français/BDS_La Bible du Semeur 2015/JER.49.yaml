  - type: text
    text: Prophéties sur les Ammonites.
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Voici ce que déclare l’Eternel :'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Israël n’a-t-il plus de fils ?
- type: usfm
  marker: q1
  children:
  - type: text
    text: N’a-t-il pas d’héritiers ?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Alors pourquoi le roi
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '49.1 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Autre traduction : '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'Milkom, '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: nom d’un dieu des Ammonites.
    marker-yv: yv-n
  - type: text
    text: ' ╵des Ammonites ╵a-t-il pris possession de Gad ?'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Pourquoi les Ammonites ╵se sont-ils installés ╵dans les villes de Gad ?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: C’est pourquoi le temps vient,
- type: usfm
  marker: q1
  children:
  - type: text
    text: l’Eternel le déclare,
- type: usfm
  marker: q1
  children:
  - type: text
    text: où je ferai entendre ╵les cris de guerre ╵contre Rabba
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '49.2 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: Rabba
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: ': '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: capitale des Ammonites.
    marker-yv: yv-n
  - type: text
    text: ' des Ammonites ;'
- type: usfm
  marker: q1
  children:
  - type: text
    text: elle sera changée ╵en un tertre de ruines,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et toutes ses bourgades ╵seront livrées au feu.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Israël spoliera
- type: usfm
  marker: q1
  children:
  - type: text
    text: ceux qui l’auront spolié
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '49.2 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Cette expression se retrouve en '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ab 17
        metadata:
          usfm: OBA.1.17
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: ','
- type: usfm
  marker: q1
  children:
  - type: text
    text: l’Eternel le déclare.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Lamente-toi, Heshbôn ! ╵Car Aï est dévastée
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '49.3 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: Heshbôn
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: ': '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'voir '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '48.34'
        metadata:
          usfm: JER.48.34
      - type: text
        text: '. Ville contrôlée apparemment par les Ammonites à cette époque. '
    - type: usfm
      marker: fq
