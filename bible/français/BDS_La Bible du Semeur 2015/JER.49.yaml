  - type: text
    text: .
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Pourquoi te glorifier ╵de tes vallées,
- type: usfm
  marker: q1
  children:
  - type: text
    text: oui, de tes vallées ruisselantes, ╵peuple rebelle ?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Tu places ta confiance ╵dans tes trésors,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'disant : « Qui viendra m’attaquer ? »'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Je fais venir ╵l’épouvante sur toi,
- type: usfm
  marker: q1
  children:
  - type: text
    text: de tous tes alentours,
- type: usfm
  marker: q1
  children:
  - type: text
    text: l’Eternel le déclare, ╵le Seigneur des armées célestes,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et vous serez chassés, ╵chacun droit devant soi,
- type: usfm
  marker: q1
  children:
  - type: text
    text: il n’y aura personne ╵qui rassemblera les fuyards.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Mais plus tard, cependant, ╵moi, je ramènerai ╵les captifs ammonites,
- type: usfm
  marker: q1
  children:
  - type: text
    text: l’Eternel le déclare.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Contre Edom
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Prophétie sur Edom.
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Voici ce que déclare ╵le Seigneur des armées célestes :'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ne trouve-t-on plus de sagesse ╵au sein du peuple de Témân
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '49.7 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: Témân
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: ', '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ville ou région d’Edom qui représente souvent tout le pays.
    marker-yv: yv-n
  - type: text
    text: '  ?'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et les gens clairvoyants ╵n’ont-ils plus de conseils ?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Leur sagesse est-elle perdue ?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Fuyez, tournez le dos,
- type: usfm
  marker: q1
  children:
  - type: text
    text: cachez-vous dans des trous profonds ╵et restez-y,
- type: usfm
  marker: q1
  children:
  - type: text
    text: habitants de Dedân
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '49.8 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: Dedân
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: ': '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: au nord-ouest de l’Arabie.
    marker-yv: yv-n
  - type: text
    text: ','
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'car, voici, je fais fondre ╵sur Esaü la ruine :'
- type: usfm
  marker: q1
  children:
  - type: text
    text: le moment est venu ╵où il doit rendre compte.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Si des vendangeurs pénètrent chez toi,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ils ne laisseront rien ╵que ce qui se grappille.
- type: usfm
  marker: q1
  children:
  - type: text
    text: S’il s’agit de voleurs ╵pendant la nuit,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ils détruiront ╵jusqu’à ce qu’ils en aient assez
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '49.9 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Les v. 9-10 sont parallèles à '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ab 5-6
        metadata:
          usfm: OBA.1.5+OBA.1.6
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Moi, je fouille Esaü,
- type: usfm
  marker: q1
  children:
  - type: text
    text: je mets à découvert ╵ses lieux secrets,
- type: usfm
  marker: q1
  children:
  - type: text
    text: il ne pourra pas se cacher ;
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'tout est détruit : sa race, ╵sa parenté et ses voisins ;'
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'plus personne pour dire :'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: « Laisse tes orphelins,
- type: usfm
  marker: q1
  children:
  - type: text
    text: je les élèverai,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et que tes veuves ╵se confient à mes soins. »
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Car voici ce que déclare l’Eternel : Ceux qui n’étaient pas condamnés à boire cette coupe la boiront tout de même, et toi, tu serais acquitté ? Non, certainement pas ; tu ne seras pas acquitté et tu devras boire la coupe. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'J’en fais le serment par moi-même – l’Eternel le déclare : dévastation et destruction vont fondre sur Botsra'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '49.13 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Non la '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'Botsra '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'de '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '48.24'
        metadata:
          usfm: JER.48.24
      - type: text
        text: ', mais la Botsra édomite (voir Gn 36.33 ; Es 34.6).'
    marker-yv: yv-n
  - type: text
    text: . Elle sera en proie à l’opprobre et à la malédiction, et toutes ses villes seront, à tout jamais, un tas de ruines.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: J’ai entendu une nouvelle
- type: usfm
  marker: q1
  children:
  - type: text
    text: venant de l’Eternel
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'et un héraut a été envoyé ╵parmi les autres peuples :'
- type: usfm
  marker: q1
  children:
  - type: text
    text: « Rassemblez-vous ╵et marchez contre lui !
- type: usfm
  marker: q1
  children:
  - type: text
    text: Levez-vous pour la guerre
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '49.14 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Les v. 14-16 sont parallèles à '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ab 1-4
        metadata:
          usfm: OBA.1.1+OBA.1.2+OBA.1.3+OBA.1.4
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: '  ! »'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Voici, je vais te rendre ╵petit parmi les peuples,
- type: usfm
  marker: q1
  children:
  - type: text
    text: méprisé par les hommes.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: La peur que tu inspires ╵et ton orgueil t’égarent,
- type: usfm
  marker: q1
  children:
  - type: text
    text: toi qui as ta demeure ╵dans les creux des rochers
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '49.16 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Séla, la capitale d’Edom, peut-être identique à la Pétra des Nabatéens, et en tout cas située dans la même région, construite sur les rochers, était presque inaccessible (cf. 2 R 14.7 ; Ps 108.10-11 ; Ez 35.7 ; Ab 3).
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: text
    text: et qui occupes ╵le sommet des collines.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Oui, comme l’aigle, ╵tu élèves ton nid ;
- type: usfm
  marker: q1
  children:
  - type: text
    text: je t’en ferai descendre !
- type: usfm
  marker: q1
  children:
  - type: text
    text: l’Eternel le déclare.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Oui, Edom sera dévasté,
- type: usfm
  marker: q1
  children:
  - type: text
    text: tous ceux qui passeront par là ╵en seront effarés ╵et siffleront d’horreur ╵à la vue de ses plaies.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Il en sera ╵comme lors de la catastrophe ╵de Sodome et Gomorrhe ╵et des villes voisines
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '49.18 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Voir Gn 18.20 à 19.29.
    marker-yv: yv-n
  - type: text
    text: ','
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'l’Eternel le déclare :'
- type: usfm
  marker: q1
  children:
  - type: text
    text: il n’y aura personne ╵qui y habitera,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et aucun être humain ╵n’y séjournera plus.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Voici, comme un lion ╵monte des forêts luxuriantes du Jourdain
- type: usfm
  marker: q1
  children:
  - type: text
    text: vers des enclos solides,
- type: usfm
  marker: q1
  children:
  - type: text
    text: moi, je viendrai ╵les faire déguerpir de là, ╵en un clin d’œil,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et je me choisirai ╵quelqu’un pour dominer sur lui
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '49.19 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'quelqu’un pour dominer sur lui. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Autre traduction : '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: de ces meilleurs béliers.
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: q1
  children:
  - type: text
    text: Car qui est mon égal ?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Qui me demandera des comptes ?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et quel est le berger ╵qui pourrait tenir contre moi
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '49.19 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Les v. 19-21 ont leur parallèle en '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 50.44-46
        metadata:
          usfm: JER.50.44+JER.50.45+JER.50.46
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: '  ?'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Ecoutez donc le plan ╵que l’Eternel a fait ╵contre les Edomites,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'et les projets qu’il a formés ╵contre la population de Témân :'
- type: usfm
  marker: q1
  children:
  - type: text
    text: on les entraînera ╵comme les plus chétives ╵des bêtes du troupeau
- type: usfm
  marker: q1
  children:
  - type: text
    text: et l’on ravagera ╵après eux leurs enclos.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Au fracas de leur chute,
- type: usfm
  marker: q1
  children:
  - type: text
    text: la terre tremblera,
- type: usfm
  marker: q1
  children:
  - type: text
    text: un cri s’élèvera, ╵on l’entendra ╵jusque sur la mer des Roseaux.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: Ce sera comme un aigle ╵qui monte et plane,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et qui étend ses ailes ╵au-dessus de Botsra ;
- type: usfm
  marker: q1
  children:
  - type: text
    text: et le cœur des guerriers ╵d’Edom, en ce jour-là,
- type: usfm
  marker: q1
  children:
  - type: text
    text: sera semblable au cœur ╵d’une femme en travail
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '49.22 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Voir '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 48.40-41
        metadata:
          usfm: JER.48.40+JER.48.41
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: s1
  children:
  - type: text
    text: Contre Damas
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Prophétie sur Damas :'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Hamath ainsi qu’Arpad
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '49.23 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: Hamath
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: ': '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'ville syrienne sur l’Oronte ; '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'Arpad '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'se trouve au nord d’Alep. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'Damas, '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ville principale de Syrie.
    marker-yv: yv-n
  - type: text
    text: ' ╵sont couvertes de honte.'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Car elles ont appris ╵de mauvaises nouvelles.
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Elles sont démoralisées :'
- type: usfm
  marker: q1
  children:
  - type: text
    text: c’est la mer en tourmente
- type: usfm
  marker: q1
  children:
  - type: text
    text: qui ne peut s’apaiser.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: Damas est affaiblie
- type: usfm
  marker: q1
  children:
  - type: text
    text: et se tourne pour fuir,
- type: usfm
  marker: q1
  children:
  - type: text
    text: un tremblement s’empare d’elle,
- type: usfm
  marker: q1
  children:
  - type: text
    text: l’angoisse et les douleurs ╵l’ont soudainement prise
- type: usfm
  marker: q1
  children:
  - type: text
    text: comme une femme en couches.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: Comment donc se fait-il ╵qu’on l’ait abandonnée,
- type: usfm
  marker: q1
  children:
  - type: text
    text: la ville si célèbre,
- type: usfm
  marker: q1
  children:
  - type: text
    text: la cité qui faisait ma joie
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '49.25 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Certains manuscrits de l’ancienne version grecque, la version syriaque, la Vulgate et le targoum ont : '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: la cité joyeuse.
    marker-yv: yv-n
  - type: text
    text: '  ?'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: Ainsi, ses jeunes gens ╵tomberont sur ses places,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et tous ses combattants
- type: usfm
  marker: q1
  children:
  - type: text
    text: périront ce jour-là,
- type: usfm
  marker: q1
  children:
  - type: text
    text: l’Eternel le déclare, ╵le Seigneur des armées célestes.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: Et je mettrai le feu ╵à la muraille de Damas,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et il consumera ╵les palais du roi Ben-Hadad
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '49.27 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Plusieurs rois de Damas ont porté ce nom. Ce verset reprend '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Am 1.4
        metadata:
          usfm: AMO.1.4
      - type: text
        text: ', avec un autre verbe en hébreu, au début du verset.'
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: s1
  children:
  - type: text
    text: Contre les tribus arabes
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: Prophéties sur Qédar et sur les royaumes de Hatsor vaincus par Nabuchodonosor, roi de Babylone
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '49.28 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: En 599 à 598 av. J.-C., Nabuchodonosor ravagera les tribus arabes, qu’elles soient nomades (
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: Qédar
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ) ou semi-sédentaires (
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: Hatsor
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ).
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Voici ce que déclare l’Eternel :'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Debout ! A l’assaut de Qédar !
- type: usfm
  marker: q1
  children:
  - type: text
    text: Dévastez tout ╵chez les tribus nomades ╵à l’orient du Jourdain !
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: Qu’on saisisse leurs tentes ╵et leur petit bétail !
- type: usfm
  marker: q1
  children:
  - type: text
    text: Qu’on prenne leurs tapis, ╵tous leurs effets et leurs chameaux !
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Qu’on proclame contre eux : ╵« De toutes parts, c’est la terreur'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '49.29 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Voir 6.25 ; 20.3, 10 ; 46.5.
    marker-yv: yv-n
  - type: text
    text: '  ! »'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: Sauvez-vous, fuyez vite, ╵cachez-vous dans des trous profonds, ╵et restez-y,
- type: usfm
  marker: q1
  children:
  - type: text
    text: habitants de Hatsor,
- type: usfm
  marker: q1
  children:
  - type: text
    text: l’Eternel le déclare.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Nabuchodonosor, ╵le roi de Babylone, ╵fait des plans contre vous,
- type: usfm
  marker: q1
  children:
  - type: text
    text: il a formé ╵des projets contre vous.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: Debout ! déclare l’Eternel,
- type: usfm
  marker: q1
  children:
  - type: text
    text: marchez contre ce peuple ╵qui vit dans l’insouciance,
- type: usfm
  marker: q1
  children:
  - type: text
    text: dans la sécurité,
- type: usfm
  marker: q1
  children:
  - type: text
    text: sans avoir ni verrous ni portes !
- type: usfm
  marker: q1
  children:
  - type: text
    text: Il demeure à l’écart.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: Emparez-vous de leurs chameaux,
- type: usfm
  marker: q1
  children:
  - type: text
    text: faites de leurs nombreux troupeaux ╵votre butin !
- type: usfm
  marker: q1
  children:
  - type: text
    text: Je disperse à tous vents
- type: usfm
  marker: q1
  children:
  - type: text
    text: ces hommes qui se rasent ╵le haut des joues
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '49.32 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Voir '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '9.25'
        metadata:
          usfm: JER.9.25
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: ','
- type: usfm
  marker: q1
  children:
  - type: text
    text: je fais venir leur ruine ╵de tous côtés,
- type: usfm
  marker: q1
  children:
  - type: text
    text: l’Eternel le déclare.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: Et Hatsor deviendra ╵un repaire pour les chacals,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et, pour toujours, ╵un endroit dévasté ;
- type: usfm
  marker: q1
  children:
  - type: text
    text: il n’y aura personne ╵qui y habite,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et aucun être humain ╵n’y séjournera plus.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Contre Elam
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: Voici le message que l’Eternel adressa au prophète Jérémie au sujet d’Elam, au commencement du règne de Sédécias, roi de Juda
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '49.34 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Sédécias '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: a régné de 598 à 587 av. J.-C.
    marker-yv: yv-n
  - type: text
    text: '  :'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: 'Voici ce que déclare ╵le Seigneur des armées célestes :'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Moi, je vais briser l’arc d’Elam,
- type: usfm
  marker: q1
  children:
  - type: text
    text: principale arme ╵de sa puissance
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '49.35 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Les archers élamites étaient célèbres dans l’Antiquité (voir '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Es 22.6
        metadata:
          usfm: ISA.22.6
      - type: text
        text: ).
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: Je ferai venir sur lui quatre vents
- type: usfm
  marker: q1
  children:
  - type: text
    text: des quatre coins de l’horizon,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et je le disperserai à tous vents.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Chez tous les peuples,
- type: usfm
  marker: q1
  children:
  - type: text
    text: on verra arriver ╵des fugitifs d’Elam.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: Je remplirai d’effroi ╵le cœur des Elamites
- type: usfm
  marker: q1
  children:
  - type: text
    text: devant leurs ennemis ╵qui veulent les tuer,
- type: usfm
  marker: q1
  children:
  - type: text
    text: je leur enverrai le malheur
- type: usfm
  marker: q1
  children:
  - type: text
    text: dans ma colère ardente,
- type: usfm
  marker: q1
  children:
  - type: text
    text: l’Eternel le déclare.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Je lancerai l’épée ╵à leur poursuite
- type: usfm
  marker: q1
  children:
  - type: text
    text: jusqu’à leur extermination.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: text
    text: J’érigerai mon trône ╵parmi les Elamites,
- type: usfm
  marker: q1
  children:
  - type: text
    text: j’en ferai disparaître ╵le roi et les ministres,
- type: usfm
  marker: q1
  children:
  - type: text
    text: l’Eternel le déclare.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '39'
  - type: text
    text: Mais par la suite,
- type: usfm
  marker: q1
  children:
  - type: text
    text: je ferai revenir ╵les captifs élamites,
- type: usfm
  marker: q1
  children:
  - type: text
    text: l’Eternel le déclare.
