document_id: GEN.8,21
type_code: fra
verses:
  '1':
  - type: heading
    content: Le retour à l’ordre
  - type: text
    content: 'Mais Dieu n’avait pas oublié Noé et toutes les bêtes sauvages et les bestiaux qui étaient avec lui dans le bateau. Il fit souffler un vent sur la terre ; alors les eaux se mirent à baisser. '
  '10':
  - type: text
    content: 'Il attendit encore sept autres jours et lâcha de nouveau la colombe hors du bateau ; '
  '11':
  - type: text
    content: 'elle revint vers lui sur le soir, tenant dans son bec une feuille d’olivier toute fraîche ; Noé sut ainsi que les eaux s’étaient résorbées sur la terre. '
  '12':
  - type: text
    content: Il attendit encore sept autres jours et relâcha la colombe ; cette fois, elle ne revint plus vers lui.
  '13':
  - type: text
    content: 'L’an 601 de la vie de Noé, le premier jour du premier mois, les eaux s’étaient retirées sur la terre, Noé enleva la couverture du bateau ; il regarda dehors et constata que la surface du sol avait séché. '
  '14':
  - type: text
    content: 'Le vingt-septième jour du deuxième mois, la terre était sèche. '
  '15':
  - type: text
    content: 'Alors Dieu dit à Noé : '
  '16':
  - type: text
    content: 'Sors du bateau avec ta femme, tes fils et tes belles-filles. '
  '17':
  - type: text
    content: 'Fais sortir aussi tous les animaux de toutes sortes qui sont avec toi : les oiseaux, les bestiaux et toutes les bêtes qui se meuvent à ras de terre : qu’ils prolifèrent sur la terre, et qu’ils s’y reproduisent et s’y multiplient.'
  '18':
  - type: text
    content: 'Noé sortit avec ses fils, sa femme et ses belles-filles. '
  '19':
  - type: text
    content: Tous les animaux, les bêtes qui se meuvent à ras de terre et les oiseaux, tous les êtres qui remuent sur la terre sortirent du bateau par familles.
  '2':
  - type: text
    content: 'Les sources des eaux souterraines et les écluses du ciel se refermèrent. La pluie cessa de tomber. '
  '20':
  - type: text
    content: Noé érigea un autel pour l’Eternel, il prit de tous les animaux purs et de tous les oiseaux purs, et les offrit en holocauste
  - type: note
    content: Dans l’holocauste, l’animal est brûlé presque entièrement sur l’autel (voir Lv 1). C’est le premier sacrifice de ce genre mentionné dans la Bible.
  - type: text
    content: ' sur l’autel. '
  '21':
  - type: text
    content: L’Eternel sentit le parfum apaisant du sacrifice
  - type: note
    content: Expression indiquant que le sacrifice est accepté par Dieu.
  - type: text
    content: ' et se dit en lui-même : Jamais plus je ne maudirai la terre à cause de l’homme, puisque le cœur de l’homme est porté au mal dès son enfance, et je ne détruirai plus tous les êtres vivants comme je viens de le faire.'
  '22':
  - type: text
    content: Aussi longtemps ╵que durera la terre,
  - type: text
    content: semailles et moissons,
  - type: text
    content: froid et chaleur,
  - type: text
    content: été, hiver,
  - type: text
    content: et jour et nuit
  - type: text
    content: jamais ne cesseront.
  '3':
  - type: text
    content: Peu à peu, les eaux se retirèrent de dessus la terre. Au bout des cent cinquante jours, elles commencèrent à baisser.
  '4':
  - type: text
    content: 'Le dix-septième jour du septième mois, le bateau s’échoua dans le massif montagneux d’Ararat. '
  '5':
  - type: text
    content: 'Les eaux continuèrent à baisser jusqu’au dixième mois ; le premier jour de ce mois, les sommets des montagnes apparurent. '
  '6':
  - type: text
    content: 'Quarante jours après, Noé ouvrit la fenêtre qu’il avait ménagée dans le bateau '
  '7':
  - type: text
    content: 'et lâcha un corbeau ; celui-ci s’envola, il revint et repartit à plusieurs reprises jusqu’à ce que les eaux se soient résorbées sur la terre. '
  '8':
  - type: text
    content: 'Puis Noé lâcha une colombe pour voir si les eaux avaient baissé sur la terre ; '
  '9':
  - type: text
    content: 'mais n’ayant pas trouvé où se poser, celle-ci revint vers lui dans le bateau, car toute la terre était encore inondée. Noé tendit la main, prit la colombe et la ramena auprès de lui dans le bateau. '
