document_id: GEN.8
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Le retour à l’ordre
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Mais Dieu n’avait pas oublié Noé et toutes les bêtes sauvages et les bestiaux qui étaient avec lui dans le bateau. Il fit souffler un vent sur la terre ; alors les eaux se mirent à baisser. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Les sources des eaux souterraines et les écluses du ciel se refermèrent. La pluie cessa de tomber. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Peu à peu, les eaux se retirèrent de dessus la terre. Au bout des cent cinquante jours, elles commencèrent à baisser.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Le dix-septième jour du septième mois, le bateau s’échoua dans le massif montagneux d’Ararat. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Les eaux continuèrent à baisser jusqu’au dixième mois ; le premier jour de ce mois, les sommets des montagnes apparurent. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Quarante jours après, Noé ouvrit la fenêtre qu’il avait ménagée dans le bateau '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'et lâcha un corbeau ; celui-ci s’envola, il revint et repartit à plusieurs reprises jusqu’à ce que les eaux se soient résorbées sur la terre. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Puis Noé lâcha une colombe pour voir si les eaux avaient baissé sur la terre ; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'mais n’ayant pas trouvé où se poser, celle-ci revint vers lui dans le bateau, car toute la terre était encore inondée. Noé tendit la main, prit la colombe et la ramena auprès de lui dans le bateau. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Il attendit encore sept autres jours et lâcha de nouveau la colombe hors du bateau ; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'elle revint vers lui sur le soir, tenant dans son bec une feuille d’olivier toute fraîche ; Noé sut ainsi que les eaux s’étaient résorbées sur la terre. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Il attendit encore sept autres jours et relâcha la colombe ; cette fois, elle ne revint plus vers lui.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'L’an 601 de la vie de Noé, le premier jour du premier mois, les eaux s’étaient retirées sur la terre, Noé enleva la couverture du bateau ; il regarda dehors et constata que la surface du sol avait séché. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Le vingt-septième jour du deuxième mois, la terre était sèche. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Alors Dieu dit à Noé : '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Sors du bateau avec ta femme, tes fils et tes belles-filles. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Fais sortir aussi tous les animaux de toutes sortes qui sont avec toi : les oiseaux, les bestiaux et toutes les bêtes qui se meuvent à ras de terre : qu’ils prolifèrent sur la terre, et qu’ils s’y reproduisent et s’y multiplient.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Noé sortit avec ses fils, sa femme et ses belles-filles. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Tous les animaux, les bêtes qui se meuvent à ras de terre et les oiseaux, tous les êtres qui remuent sur la terre sortirent du bateau par familles.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Noé érigea un autel pour l’Eternel, il prit de tous les animaux purs et de tous les oiseaux purs, et les offrit en holocauste
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '8.20 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Dans l’holocauste, l’animal est brûlé presque entièrement sur l’autel (voir '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Lv 1
        metadata:
          usfm: LEV.1
      - type: text
        text: ). C’est le premier sacrifice de ce genre mentionné dans la Bible.
    marker-yv: yv-n
  - type: text
    text: ' sur l’autel. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: L’Eternel sentit le parfum apaisant du sacrifice
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '8.21 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Expression indiquant que le sacrifice est accepté par Dieu.
    marker-yv: yv-n
  - type: text
    text: ' et se dit en lui-même : Jamais plus je ne maudirai la terre à cause de l’homme, puisque le cœur de l’homme est porté au mal dès son enfance, et je ne détruirai plus tous les êtres vivants comme je viens de le faire.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: Aussi longtemps ╵que durera la terre,
- type: usfm
  marker: q1
  children:
  - type: text
    text: semailles et moissons,
- type: usfm
  marker: q1
  children:
  - type: text
    text: froid et chaleur,
- type: usfm
  marker: q1
  children:
  - type: text
    text: été, hiver,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et jour et nuit
- type: usfm
  marker: q1
  children:
  - type: text
    text: jamais ne cesseront.
