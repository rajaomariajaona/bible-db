document_id: PSA.5,21
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Conduis-moi sur le chemin
    marker-yv: yv-h
  - type: usfm
    marker: d
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: Dédié au chef de chœur. A chanter avec accompagnement d’instruments à vent. Un psaume de David.
  '10':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: Dans leurs propos, ╵il n’y a aucune sincérité,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et ils ne pensent qu’à détruire.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Dès qu’ils se mettent à parler, ╵on dirait un tombeau qui s’ouvre ;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: leur langue se fait enjôleuse
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '5.10 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Cité en '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: Rm 3.13
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: .
  '11':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: O Dieu, fais-leur payer leurs crimes
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et que, par leurs machinations, ╵ils provoquent leur propre ruine,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et, pour leurs méfaits répétés, ╵ô Dieu, qu’ils soient chassés
  - type: usfm
    marker: q1
    children:
    - type: text
      text: car ils te sont rebelles.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: Mais que tous ceux ╵qui trouvent un refuge en toi ╵soient à jamais dans l’allégresse
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et poussent de grands cris de joie, ╵car ils sont sous ta protection ;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et que tous ceux qui t’aiment
  - type: usfm
    marker: q1
    children:
    - type: text
      text: se réjouissent grâce à toi.
  '13':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: Eternel, tu bénis le juste
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et tu le couvres de ta grâce, ╵comme d’un bouclier.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: O Eternel, ╵écoute mes paroles
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et entends mes soupirs !
  '3':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: O toi, mon Roi, mon Dieu, ╵sois attentif à mon appel,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: car c’est toi que je prie.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: Eternel, au matin, ╵ma voix se fait entendre,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: car, dès le point du jour, ╵je me présente à toi, ╵et puis j’attends…
  '5':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: Car tu n’es pas un Dieu ╵qui prend plaisir au mal.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Auprès de toi, ╵le mal n’a pas de place.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: Les insolents ne peuvent pas ╵subsister devant toi.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tu hais tous ceux qui font le mal.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: Tu fais périr tous les menteurs.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Les assassins et les trompeurs ╵sont en horreur à l’Eternel.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: En vertu de ta grâce immense ╵je peux venir à ta maison,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et avec crainte ╵me prosterner pour t’adorer ╵devant ton sanctuaire.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: Eternel, conduis-moi, ╵toi qui es juste, ╵car j’ai des ennemis.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Aplanis le sentier ╵que tu veux que j’emprunte.
