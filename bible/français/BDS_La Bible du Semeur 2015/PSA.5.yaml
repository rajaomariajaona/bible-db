document_id: PSA.5,21
type_code: fra
verses:
  '1':
  - type: heading
    content: Conduis-moi sur le chemin
  - type: text
    content: Dédié au chef de chœur. A chanter avec accompagnement d’instruments à vent. Un psaume de David.
  '10':
  - type: text
    content: Dans leurs propos, ╵il n’y a aucune sincérité,
  - type: text
    content: et ils ne pensent qu’à détruire.
  - type: text
    content: Dès qu’ils se mettent à parler, ╵on dirait un tombeau qui s’ouvre ;
  - type: text
    content: leur langue se fait enjôleuse
  - type: note
    content: Cité en Rm 3.13.
  - type: text
    content: .
  '11':
  - type: text
    content: O Dieu, fais-leur payer leurs crimes
  - type: text
    content: et que, par leurs machinations, ╵ils provoquent leur propre ruine,
  - type: text
    content: et, pour leurs méfaits répétés, ╵ô Dieu, qu’ils soient chassés
  - type: text
    content: car ils te sont rebelles.
  '12':
  - type: text
    content: Mais que tous ceux ╵qui trouvent un refuge en toi ╵soient à jamais dans l’allégresse
  - type: text
    content: et poussent de grands cris de joie, ╵car ils sont sous ta protection ;
  - type: text
    content: et que tous ceux qui t’aiment
  - type: text
    content: se réjouissent grâce à toi.
  '13':
  - type: text
    content: Eternel, tu bénis le juste
  - type: text
    content: et tu le couvres de ta grâce, ╵comme d’un bouclier.
  '2':
  - type: text
    content: O Eternel, ╵écoute mes paroles
  - type: text
    content: et entends mes soupirs !
  '3':
  - type: text
    content: O toi, mon Roi, mon Dieu, ╵sois attentif à mon appel,
  - type: text
    content: car c’est toi que je prie.
  '4':
  - type: text
    content: Eternel, au matin, ╵ma voix se fait entendre,
  - type: text
    content: car, dès le point du jour, ╵je me présente à toi, ╵et puis j’attends…
  '5':
  - type: text
    content: Car tu n’es pas un Dieu ╵qui prend plaisir au mal.
  - type: text
    content: Auprès de toi, ╵le mal n’a pas de place.
  '6':
  - type: text
    content: Les insolents ne peuvent pas ╵subsister devant toi.
  - type: text
    content: Tu hais tous ceux qui font le mal.
  '7':
  - type: text
    content: Tu fais périr tous les menteurs.
  - type: text
    content: Les assassins et les trompeurs ╵sont en horreur à l’Eternel.
  '8':
  - type: text
    content: En vertu de ta grâce immense ╵je peux venir à ta maison,
  - type: text
    content: et avec crainte ╵me prosterner pour t’adorer ╵devant ton sanctuaire.
  '9':
  - type: text
    content: Eternel, conduis-moi, ╵toi qui es juste, ╵car j’ai des ennemis.
  - type: text
    content: Aplanis le sentier ╵que tu veux que j’emprunte.
