document_id: JER.9,21
type_code: fra
verses:
  '1':
  - type: heading
    content: Un peuple de menteurs
  - type: text
    content: Oh ! que n’ai-je, au désert, ╵un gîte de nomades !
  - type: text
    content: Je quitterais mon peuple ╵et je m’en irais loin de lui,
  - type: text
    content: car ce sont tous des adultères,
  - type: text
    content: une bande de traîtres !
  '10':
  - type: text
    content: Je ferai de Jérusalem ╵un monceau de décombres,
  - type: text
    content: un gîte de chacals ;
  - type: text
    content: des villes de Juda, ╵je ferai une terre dévastée,
  - type: text
    content: sans habitants.
  '11':
  - type: text
    content: Quel est l’homme assez sage ╵pour comprendre cela ?
  - type: text
    content: Si l’Eternel lui a parlé, ╵qu’il nous répète ses propos !
  - type: text
    content: Et qu’il nous dise ╵pourquoi ce pays est détruit,
  - type: text
    content: brûlé comme un désert ╵où personne ne passe ?
  '12':
  - type: text
    content: 'L’Eternel déclare : Tout cela leur arrive parce qu’ils ont abandonné ma Loi que j’avais placée devant eux, et ils ne m’ont pas écouté ; ils n’ont pas obéi à ma loi. '
  '13':
  - type: text
    content: 'Mais ils se sont conduits selon les penchants de leur cœur obstiné et ils se sont attachés aux Baals que leurs pères leur ont fait connaître. '
  '14':
  - type: text
    content: 'Voilà pourquoi le Seigneur des armées célestes, le Dieu d’Israël, le déclare : Je vais faire avaler de l’absinthe à ce peuple et je lui ferai boire des eaux empoisonnées ; '
  '15':
  - type: text
    content: je les disperserai au milieu de peuples étrangers qu’ils n’ont pas connus, ni eux, ni leurs ancêtres, et j’enverrai contre eux l’épée pour les frapper et les exterminer.
  - type: heading
    content: Pleurs sur Jérusalem
  '16':
  - type: text
    content: 'Voici ce que déclare ╵le Seigneur des armées célestes :'
  - type: text
    content: Considérez ces choses,
  - type: text
    content: convoquez les pleureuses
  - type: note
    content: Femmes spécialisées dans l’art de pleurer, de se lamenter et d’exécuter des chants funèbres lors des cérémonies de deuil (voir v.  19 ; Ez 32.16 ; Am 5.16). C’est pour leurs propres funérailles que les Israélites doivent convoquer les pleureuses.
  - type: text
    content: et faites-les venir,
  - type: text
    content: envoyez appeler ╵celles qui sont habiles ╵à la lamentation
  - type: text
    content: et qu’elles viennent !
  '17':
  - type: text
    content: Oui, qu’elles se dépêchent ╵pour prononcer sur nous ╵leurs cris plaintifs
  - type: text
    content: et que nos yeux fondent en larmes
  - type: text
    content: et que les pleurs ruissellent ╵de nos paupières.
  '18':
  - type: text
    content: 'Car une voix plaintive ╵s’élève de Sion :'
  - type: text
    content: Nous sommes dévastés !
  - type: text
    content: Nous sommes dans la honte
  - type: text
    content: car nous avons quitté notre pays,
  - type: text
    content: et nos maisons ╵ont été abattues.
  '19':
  - type: text
    content: O femmes, écoutez ╵la parole de l’Eternel !
  - type: text
    content: Et ouvrez vos oreilles pour entendre ╵ce que sa bouche a dit.
  - type: text
    content: Enseignez à vos filles ╵une complainte
  - type: text
    content: et que chacune apprenne ╵à sa meilleure amie ╵une lamentation.
  '2':
  - type: text
    content: Leur langue est comme un arc tendu
  - type: text
    content: décochant le mensonge,
  - type: text
    content: ce n’est pas pour la vérité
  - type: note
    content: 'Autre traduction : par la vérité.'
  - type: text
    content: qu’ils dominent dans le pays,
  - type: text
    content: ils font méfait après méfait
  - type: text
    content: et ils ne me connaissent pas,
  - type: text
    content: l’Eternel le déclare.
  '20':
  - type: text
    content: « Oh ! la mort a surgi, ╵grimpant par nos fenêtres,
  - type: text
    content: pour pénétrer ╵dans nos belles maisons
  - type: text
    content: et faire disparaître ╵les enfants de la rue
  - type: text
    content: et les jeunes des places. »
  '21':
  - type: text
    content: 'Proclame-le : ╵Voici ce que déclare l’Eternel :'
  - type: text
    content: Les cadavres des hommes ╵tomberont sur le sol
  - type: text
    content: et resteront par terre ╵comme du fumier dans les champs,
  - type: text
    content: comme des gerbes ╵que les moissonneurs laissent
  - type: text
    content: et que personne ne ramasse.
  - type: heading
    content: Vraie et fausse sagesse
  '22':
  - type: text
    content: 'L’Eternel dit ceci :'
  - type: text
    content: Que celui qui est sage ╵ne se glorifie pas ╵de sa sagesse ;
  - type: text
    content: que celui qui est fort ╵ne se glorifie pas ╵de sa vigueur ;
  - type: text
    content: que celui qui est riche ╵ne se glorifie pas ╵de sa richesse.
  '23':
  - type: text
    content: 'Celui qui veut se glorifier, ╵qu’il se glorifie de ceci :'
  - type: text
    content: d’avoir l’intelligence ╵de me connaître,
  - type: text
    content: moi qui suis l’Eternel
  - type: note
    content: Repris en 1 Co 1.31 ; 2 Co 10.17.
  - type: text
    content: ','
  - type: text
    content: qui agis avec bienveillance, ╵qui exerce le droit ╵et la justice sur la terre ;
  - type: text
    content: car ce sont là ╵les choses qui me font plaisir,
  - type: text
    content: l’Eternel le déclare.
  '24':
  - type: text
    content: 'Or le temps vient, déclare l’Eternel, où moi j’interviendrai contre ceux qui sont circoncis seulement dans leur corps, '
  '25':
  - type: text
    content: contre les Egyptiens, les Judéens, les Edomites, les Ammonites, les Moabites et tous les habitants des abords du désert qui se rasent le haut des joues
  - type: note
    content: Pratique liée à l’idolâtrie, interdite aux Israélites (Lv 19.27 ; 21.5).
  - type: text
    content: ', car tous ces peuples ne sont pas vraiment circoncis, et tout le peuple d’Israël a le cœur incirconcis.'
  '3':
  - type: text
    content: Que chacun se méfie ╵de son prochain
  - type: text
    content: et ne vous fiez pas ╵à votre parenté ;
  - type: text
    content: car chacun s’applique à tromper ╵les membres de sa parenté.
  - type: text
    content: Chacun s’en va ╵en répandant des calomnies, ╵au sujet de son compagnon.
  '4':
  - type: text
    content: Chacun se joue de son prochain.
  - type: text
    content: Plus de paroles vraies !
  - type: text
    content: Ils exercent leur langue ╵à dire des mensonges.
  - type: text
    content: Ils s’épuisent par leurs péchés.
  '5':
  - type: text
    content: Tu vis au milieu de la tromperie.
  - type: text
    content: Parce qu’ils sont trompeurs, ╵ils refusent de me connaître,
  - type: text
    content: l’Eternel le déclare.
  '6':
  - type: text
    content: 'C’est pourquoi, ainsi parle ╵le Seigneur des armées célestes :'
  - type: text
    content: 'Voici : je vais les fondre ╵au creuset de l’épreuve'
  - type: text
    content: car que ferais-je d’autre ╵avec la communauté de mon peuple
  - type: note
    content: 'avec la communauté de mon peuple. L’ancienne version grecque et la version syriaque ont ici un mot en plus : devant la méchanceté de la communauté de mon peuple.'
  - type: text
    content: '  ?'
  '7':
  - type: text
    content: Leur langue est une flèche ╵semant la mort,
  - type: text
    content: ils ont le mensonge à la bouche,
  - type: text
    content: et l’on parle de paix ╵à son prochain,
  - type: text
    content: alors que, dans le cœur, ╵on lui prépare un piège.
  '8':
  - type: text
    content: N’interviendrais-je pas ╵contre ces gens pour tout cela ?
  - type: text
    content: demande l’Eternel.
  - type: text
    content: Et ne ferais-je pas payer ╵un pareil peuple ?
  - type: heading
    content: Pleurs et gémissements
  '9':
  - type: text
    content: Je ferai retentir ╵pleurs et gémissements
  - type: text
    content: à cause des montagnes,
  - type: text
    content: et des lamentations
  - type: text
    content: pour les prés de la steppe,
  - type: text
    content: 'car ils sont tous brûlés :'
  - type: text
    content: plus personne n’y passe
  - type: text
    content: 'et l’on n’y entend plus ╵les cris des animaux :'
  - type: text
    content: ni des oiseaux, ni du bétail.
  - type: text
    content: Tous, ils ont pris la fuite, ╵ils sont partis.
