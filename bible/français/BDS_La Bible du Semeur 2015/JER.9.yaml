document_id: JER.9
type_code: fra
segments:
- type: usfm
  marker: s2
  children:
  - type: text
    text: Un peuple de menteurs
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Oh ! que n’ai-je, au désert, ╵un gîte de nomades !
- type: usfm
  marker: q1
  children:
  - type: text
    text: Je quitterais mon peuple ╵et je m’en irais loin de lui,
- type: usfm
  marker: q1
  children:
  - type: text
    text: car ce sont tous des adultères,
- type: usfm
  marker: q1
  children:
  - type: text
    text: une bande de traîtres !
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Leur langue est comme un arc tendu
- type: usfm
  marker: q1
  children:
  - type: text
    text: décochant le mensonge,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ce n’est pas pour la vérité
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '9.2 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Autre traduction : '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: par la vérité.
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: text
    text: qu’ils dominent dans le pays,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ils font méfait après méfait
- type: usfm
  marker: q1
  children:
  - type: text
    text: et ils ne me connaissent pas,
- type: usfm
  marker: q1
  children:
  - type: text
    text: l’Eternel le déclare.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Que chacun se méfie ╵de son prochain
- type: usfm
  marker: q1
  children:
  - type: text
    text: et ne vous fiez pas ╵à votre parenté ;
- type: usfm
  marker: q1
  children:
  - type: text
    text: car chacun s’applique à tromper ╵les membres de sa parenté.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Chacun s’en va ╵en répandant des calomnies, ╵au sujet de son compagnon.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Chacun se joue de son prochain.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Plus de paroles vraies !
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ils exercent leur langue ╵à dire des mensonges.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ils s’épuisent par leurs péchés.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Tu vis au milieu de la tromperie.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Parce qu’ils sont trompeurs, ╵ils refusent de me connaître,
- type: usfm
  marker: q1
  children:
  - type: text
    text: l’Eternel le déclare.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'C’est pourquoi, ainsi parle ╵le Seigneur des armées célestes :'
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Voici : je vais les fondre ╵au creuset de l’épreuve'
- type: usfm
  marker: q1
  children:
  - type: text
    text: car que ferais-je d’autre ╵avec la communauté de mon peuple
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '9.6 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'avec la communauté de mon peuple. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'L’ancienne version grecque et la version syriaque ont ici un mot en plus : '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: devant la méchanceté de la communauté de mon peuple.
    marker-yv: yv-n
  - type: text
    text: '  ?'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Leur langue est une flèche ╵semant la mort,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ils ont le mensonge à la bouche,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et l’on parle de paix ╵à son prochain,
- type: usfm
  marker: q1
  children:
  - type: text
    text: alors que, dans le cœur, ╵on lui prépare un piège.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: N’interviendrais-je pas ╵contre ces gens pour tout cela ?
- type: usfm
  marker: q1
  children:
  - type: text
    text: demande l’Eternel.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et ne ferais-je pas payer ╵un pareil peuple ?
- type: usfm
  marker: s1
  children:
  - type: text
    text: Pleurs et gémissements
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Je ferai retentir ╵pleurs et gémissements
- type: usfm
  marker: q1
  children:
  - type: text
    text: à cause des montagnes,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et des lamentations
- type: usfm
  marker: q1
  children:
  - type: text
    text: pour les prés de la steppe,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'car ils sont tous brûlés :'
- type: usfm
  marker: q1
  children:
  - type: text
    text: plus personne n’y passe
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'et l’on n’y entend plus ╵les cris des animaux :'
- type: usfm
  marker: q1
  children:
  - type: text
    text: ni des oiseaux, ni du bétail.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Tous, ils ont pris la fuite, ╵ils sont partis.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Je ferai de Jérusalem ╵un monceau de décombres,
- type: usfm
  marker: q1
  children:
  - type: text
    text: un gîte de chacals ;
- type: usfm
  marker: q1
  children:
  - type: text
    text: des villes de Juda, ╵je ferai une terre dévastée,
- type: usfm
  marker: q1
  children:
  - type: text
    text: sans habitants.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Quel est l’homme assez sage ╵pour comprendre cela ?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Si l’Eternel lui a parlé, ╵qu’il nous répète ses propos !
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et qu’il nous dise ╵pourquoi ce pays est détruit,
- type: usfm
  marker: q1
  children:
  - type: text
    text: brûlé comme un désert ╵où personne ne passe ?
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'L’Eternel déclare : Tout cela leur arrive parce qu’ils ont abandonné ma Loi que j’avais placée devant eux, et ils ne m’ont pas écouté ; ils n’ont pas obéi à ma loi. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Mais ils se sont conduits selon les penchants de leur cœur obstiné et ils se sont attachés aux Baals que leurs pères leur ont fait connaître. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Voilà pourquoi le Seigneur des armées célestes, le Dieu d’Israël, le déclare : Je vais faire avaler de l’absinthe à ce peuple et je lui ferai boire des eaux empoisonnées ; '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: je les disperserai au milieu de peuples étrangers qu’ils n’ont pas connus, ni eux, ni leurs ancêtres, et j’enverrai contre eux l’épée pour les frapper et les exterminer.
- type: usfm
  marker: s2
  children:
  - type: text
    text: Pleurs sur Jérusalem
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Voici ce que déclare ╵le Seigneur des armées célestes :'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Considérez ces choses,
- type: usfm
  marker: q1
  children:
  - type: text
    text: convoquez les pleureuses
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '9.16 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Femmes spécialisées dans l’art de pleurer, de se lamenter et d’exécuter des chants funèbres lors des cérémonies de deuil (voir v.  19 ; Ez 32.16 ; Am 5.16). C’est pour leurs propres funérailles que les Israélites doivent convoquer les pleureuses.
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: text
    text: et faites-les venir,
- type: usfm
  marker: q1
  children:
  - type: text
    text: envoyez appeler ╵celles qui sont habiles ╵à la lamentation
- type: usfm
  marker: q1
  children:
  - type: text
    text: et qu’elles viennent !
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Oui, qu’elles se dépêchent ╵pour prononcer sur nous ╵leurs cris plaintifs
- type: usfm
  marker: q1
  children:
  - type: text
    text: et que nos yeux fondent en larmes
- type: usfm
  marker: q1
  children:
  - type: text
    text: et que les pleurs ruissellent ╵de nos paupières.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Car une voix plaintive ╵s’élève de Sion :'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Nous sommes dévastés !
- type: usfm
  marker: q1
  children:
  - type: text
    text: Nous sommes dans la honte
- type: usfm
  marker: q1
  children:
  - type: text
    text: car nous avons quitté notre pays,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et nos maisons ╵ont été abattues.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: O femmes, écoutez ╵la parole de l’Eternel !
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et ouvrez vos oreilles pour entendre ╵ce que sa bouche a dit.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Enseignez à vos filles ╵une complainte
- type: usfm
  marker: q1
  children:
  - type: text
    text: et que chacune apprenne ╵à sa meilleure amie ╵une lamentation.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: « Oh ! la mort a surgi, ╵grimpant par nos fenêtres,
- type: usfm
  marker: q1
  children:
  - type: text
    text: pour pénétrer ╵dans nos belles maisons
- type: usfm
  marker: q1
  children:
  - type: text
    text: et faire disparaître ╵les enfants de la rue
- type: usfm
  marker: q1
  children:
  - type: text
    text: et les jeunes des places. »
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Proclame-le : ╵Voici ce que déclare l’Eternel :'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Les cadavres des hommes ╵tomberont sur le sol
- type: usfm
  marker: q1
  children:
  - type: text
    text: et resteront par terre ╵comme du fumier dans les champs,
- type: usfm
  marker: q1
  children:
  - type: text
    text: comme des gerbes ╵que les moissonneurs laissent
- type: usfm
  marker: q1
  children:
  - type: text
    text: et que personne ne ramasse.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Vraie et fausse sagesse
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'L’Eternel dit ceci :'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Que celui qui est sage ╵ne se glorifie pas ╵de sa sagesse ;
- type: usfm
  marker: q1
  children:
  - type: text
    text: que celui qui est fort ╵ne se glorifie pas ╵de sa vigueur ;
- type: usfm
  marker: q1
  children:
  - type: text
    text: que celui qui est riche ╵ne se glorifie pas ╵de sa richesse.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Celui qui veut se glorifier, ╵qu’il se glorifie de ceci :'
- type: usfm
  marker: q1
  children:
  - type: text
    text: d’avoir l’intelligence ╵de me connaître,
- type: usfm
  marker: q1
  children:
  - type: text
    text: moi qui suis l’Eternel
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '9.23 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Repris en 1 Co 1.31 ; 2 Co 10.17.
    marker-yv: yv-n
  - type: text
    text: ','
- type: usfm
  marker: q1
  children:
  - type: text
    text: qui agis avec bienveillance, ╵qui exerce le droit ╵et la justice sur la terre ;
- type: usfm
  marker: q1
  children:
  - type: text
    text: car ce sont là ╵les choses qui me font plaisir,
- type: usfm
  marker: q1
  children:
  - type: text
    text: l’Eternel le déclare.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Or le temps vient, déclare l’Eternel, où moi j’interviendrai contre ceux qui sont circoncis seulement dans leur corps, '
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: contre les Egyptiens, les Judéens, les Edomites, les Ammonites, les Moabites et tous les habitants des abords du désert qui se rasent le haut des joues
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '9.25 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Pratique liée à l’idolâtrie, interdite aux Israélites (Lv 19.27 ; 21.5).
    marker-yv: yv-n
  - type: text
    text: ', car tous ces peuples ne sont pas vraiment circoncis, et tout le peuple d’Israël a le cœur incirconcis.'
