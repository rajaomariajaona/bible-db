document_id: JER.47,21
type_code: fra
verses:
  '1':
  - type: heading
    content: Contre les Philistins
  - type: text
    content: Voici les paroles que l’Eternel adressa au prophète Jérémie au sujet des Philistins, avant que le pharaon
  - type: note
    content: Soit le pharaon Néko (voir 46.2), soit le pharaon Hophra (voir 37.5 ; 44.30).
  - type: text
    content: ' inflige une défaite à Gaza'
  - type: note
    content: L’une des cinq villes principales de la Philistie. Ashkelôn (v. 5, 7) en est une autre.
  - type: text
    content: '  :'
  '2':
  - type: text
    content: 'Voici ce que déclare l’Eternel :'
  - type: text
    content: Des eaux vont s’élever ╵dans le pays du nord
  - type: note
    content: Comme dans 46.7, l’invasion est comparée au débordement d’une source ou d’un fleuve.
  - type: text
    content: ','
  - type: text
    content: bientôt elles seront ╵un torrent qui déborde,
  - type: text
    content: 'submergeant le pays ╵et tout ce qui s’y trouve :'
  - type: text
    content: les villes avec leurs habitants.
  - type: text
    content: Les gens se mettent à crier,
  - type: text
    content: et tous les habitants ╵du pays se lamentent
  '3':
  - type: text
    content: au fracas des sabots ╵des coursiers au galop,
  - type: text
    content: au grondement des chars
  - type: note
    content: Annonce d’une invasion chaldéenne qui eut effectivement lieu sous Nabuchodonosor en 604 av. J.-C.
  - type: text
    content: et au vacarme de leurs roues.
  - type: text
    content: Les pères ne s’occupent plus ╵de leurs enfants,
  - type: text
    content: tant ils sont abattus.
  '4':
  - type: text
    content: Car le jour est venu
  - type: text
    content: où tous les Philistins ╵vont être exterminés,
  - type: text
    content: où l’on supprimera ╵de Tyr et de Sidon ╵tous les survivants qui pourraient ╵venir à leur secours,
  - type: text
    content: parce que l’Eternel ╵anéantit les Philistins,
  - type: text
    content: tout ce qui reste de ces gens ╵originaires de l’île de Crète.
  '5':
  - type: text
    content: La population de Gaza ╵se rasera la tête
  - type: text
    content: et Ashkelôn sera rendue muette.
  - type: text
    content: Vous qui restez ╵sur cette plaine
  - type: note
    content: 'sur cette plaine: selon le texte hébreu traditionnel dont la traduction est incertaine. L’ancienne version grecque a : le reste des géants.'
  - type: text
    content: ','
  - type: text
    content: jusques à quand ╵vous ferez-vous des incisions
  - type: note
    content: Marques de deuil ; les incisions étaient interdites par la Loi (Lv 19.28 ; Dt 14.1).
  - type: text
    content: '  ?'
  '6':
  - type: text
    content: « Malheur ! Epée de l’Eternel,
  - type: text
    content: jusques à quand ╵cela va-t-il durer ╵avant que tu t’arrêtes ?
  - type: text
    content: Rentre dans ton fourreau !
  - type: text
    content: Calme-toi, et reste au repos ! »
  '7':
  - type: text
    content: Mais comment pourrait-elle ╵se tenir en repos
  - type: text
    content: quand l’Eternel lui a donné pour ordre
  - type: text
    content: d’attaquer Ashkelôn ╵et les bords de la mer ?
  - type: text
    content: Tels sont les buts ╵fixés par lui.
