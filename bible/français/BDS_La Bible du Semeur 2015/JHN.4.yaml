document_id: JHN.4
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Le Messie se révèle en Samarie
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Les pharisiens avaient entendu dire que Jésus faisait et baptisait plus de disciples que Jean. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: '(A vrai dire, Jésus lui-même ne baptisait personne, il laissait ce soin à ses disciples.) Lorsque Jésus l’apprit, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'il quitta la Judée et retourna en Galilée. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Il lui fallait donc traverser la Samarie. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'C’est ainsi qu’il arriva près d’une bourgade de Samarie nommée Sychar, non loin du champ que Jacob avait jadis donné à son fils Joseph. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'C’est là que se trouvait le puits de Jacob. Jésus, fatigué du voyage, s’assit au bord du puits. Il était environ midi. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Une femme samaritaine vint pour puiser de l’eau. Jésus s’adressa à elle : '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: S’il te plaît, donne-moi à boire un peu d’eau.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: (Ses disciples étaient allés à la ville pour acheter de quoi manger.)
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'La Samaritaine s’exclama : Comment ? Tu es Juif et tu me demandes à boire, à moi qui suis Samaritaine ? (Les Juifs, en effet, évitaient toutes relations avec les Samaritains'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '4.9 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Autre traduction : '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: Les Juifs, en effet, ne buvaient pas à la même coupe que les Samaritains.
    marker-yv: yv-n
  - type: text
    text: .)
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Jésus lui répondit : '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Si tu savais quel don Dieu veut te faire et qui est celui qui te demande à boire, c’est toi qui lui aurais demandé à boire et il t’aurait donné de l’eau vive
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '4.10 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: vive
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: ': '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'c’est-à-dire de l’eau courante, jeu de mots avec : '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'eau qui donne la vie '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: (voir v. 14).
    marker-yv: yv-n
  - type: usfm
    marker: wj
    children:
    - type: text
      text: .
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: '– Mais, Maître, répondit la femme, non seulement tu n’as pas de seau, mais le puits est profond ! D’où la tires-tu donc, cette eau vive ? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Tu ne vas pas te prétendre plus grand que notre ancêtre Jacob, auquel nous devons ce puits, et qui a bu lui-même de son eau ainsi que ses enfants et ses troupeaux ?
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: ' '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: – Celui qui boit de cette eau,
  - type: text
    text: ' reprit Jésus, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: aura de nouveau soif.
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'Mais celui qui boira de l’eau que je lui donnerai n’aura plus jamais soif. Bien plus : l’eau que je lui donnerai deviendra en lui une source intarissable qui jaillira jusque dans la vie éternelle.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: – Maître, lui dit alors la femme, donne-moi de cette eau-là, pour que je n’aie plus soif et que je n’aie plus besoin de revenir puiser de l’eau ici.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: ' '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: – Va donc chercher ton mari,
  - type: text
    text: ' lui dit Jésus, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: et reviens ici.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: – Je ne suis pas mariée, lui répondit-elle.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: wj
    children:
    - type: text
      text: '– Tu as raison de dire : Je ne suis pas mariée.'
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: En fait tu l’as été cinq fois, et l’homme avec lequel tu vis actuellement n’est pas ton mari. Ce que tu as dit là est vrai
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '4.18 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'On pourrait traduire en plaçant les paroles : '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'ce que tu as dit là est vrai '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: dans la bouche de la Samaritaine.
    marker-yv: yv-n
  - type: usfm
    marker: wj
    children:
    - type: text
      text: .
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: '– Maître, répondit la femme, je le vois, tu es un prophète. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Dis-moi : qui a raison ? Nos ancêtres ont adoré Dieu sur cette montagne-ci'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '4.20 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Les Samaritains ne venaient pas célébrer le culte au temple de Jérusalem, mais ils avaient bâti un sanctuaire, détruit depuis lors, près de l’ancienne Sichem, sur le mont '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'Garizim '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: que l’on pouvait voir depuis l’endroit où se trouvait Jésus.
    marker-yv: yv-n
  - type: text
    text: . Vous autres, vous affirmez que l’endroit où l’on doit adorer, c’est Jérusalem.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: ' '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: – Crois-moi,
  - type: text
    text: ' lui dit Jésus, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: l’heure vient où il ne sera plus question de cette montagne ni de Jérusalem pour adorer le Père.
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Vous adorez ce que vous ne connaissez pas ; nous, nous adorons ce que nous connaissons, car le salut vient du peuple juif.
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Mais l’heure vient, et elle est déjà là, où les vrais adorateurs adoreront le Père par l’Esprit et en vérité ; car le Père recherche des hommes qui l’adorent ainsi.
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Dieu est Esprit et il faut que ceux qui l’adorent l’adorent par l’Esprit et en vérité.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'La femme lui dit : Je sais qu’un jour le Messie doit venir (celui qu’on appelle Christ). Quand il sera venu, il nous expliquera tout.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: ' '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: – Je suis le Messie, moi qui te parle,
  - type: text
    text: ' lui dit Jésus.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'Sur ces entrefaites, les disciples revinrent. Ils furent très étonnés de voir Jésus parler avec une femme. Aucun d’eux, cependant, ne lui demanda : « Que lui veux-tu ? » ou : « Pourquoi parles-tu avec elle ? »'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'Alors, la femme laissa là sa cruche, se rendit à la ville, et la voilà qui se mit à dire autour d’elle : '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: Venez voir un homme qui m’a dit tout ce que j’ai fait. Et si c’était le Messie ?
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: Les gens sortirent de la ville pour se rendre auprès de Jésus.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'Entre-temps, les disciples pressaient Jésus en disant : Maître, mange donc !'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'Mais il leur dit : '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: J’ai, pour me nourrir, un aliment que vous ne connaissez pas.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: 'Les disciples se demandèrent donc entre eux : Est-ce que quelqu’un lui aurait apporté à manger ?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: ' '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: – Ce qui me nourrit,
  - type: text
    text: ' leur expliqua Jésus, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: c’est d’accomplir la volonté de celui qui m’a envoyé et de mener à bien l’œuvre qu’il m’a confiée.
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'Vous dites en ce moment : Encore quatre mois, et c’est la moisson ! N’est-ce pas ? Eh bien, moi je vous dis : Ouvrez vos yeux et regardez les champs ; déjà les épis sont blonds, prêts à être moissonnés'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '4.35 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'La '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'moisson '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: figure l’ensemble de ceux qui sont prêts à accepter le message de Christ. Dans ce cas, les moissonneurs sont les disciples. Jean-Baptiste fut un des semeurs.
    marker-yv: yv-n
  - type: usfm
    marker: wj
    children:
    - type: text
      text: .
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Celui qui les fauche reçoit maintenant son salaire et récolte une moisson pour la vie éternelle, si bien que semeur et moissonneur partagent la même joie.
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'Ici se vérifie le proverbe : « Autre est celui qui sème, autre celui qui moissonne. »'
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Je vous ai envoyés récolter une moisson qui ne vous a coûté aucune peine. D’autres ont travaillé, et vous avez recueilli le fruit de leur labeur.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '39'
  - type: text
    text: 'Il y eut, dans cette bourgade, beaucoup de Samaritains qui crurent en Jésus grâce au témoignage qu’avait rendu cette femme en déclarant : « Il m’a dit tout ce que j’ai fait. » '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '40'
  - type: text
    text: 'Lorsque les Samaritains furent venus auprès de Jésus, ils le prièrent de rester, et il passa deux jours chez eux. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '41'
  - type: text
    text: 'Ils furent encore bien plus nombreux à croire en lui à cause de ses paroles, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '42'
  - type: text
    text: 'et ils disaient à la femme : Nous croyons en lui, non seulement à cause de ce que tu nous as rapporté, mais parce que nous l’avons nous-mêmes entendu ; et nous savons qu’il est vraiment le Sauveur du monde.'
- type: usfm
  marker: s1
  children:
  - type: text
    text: Le deuxième miracle en Galilée
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '43'
  - type: text
    text: 'Après ces deux jours, Jésus repartit de là pour la Galilée, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '44'
  - type: text
    text: 'car il avait déclaré qu’un prophète ne reçoit pas dans son pays l’honneur qui lui est dû. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '45'
  - type: text
    text: Or, quand il arriva en Galilée, les gens lui firent assez bon accueil, car ils étaient, eux aussi, allés à Jérusalem pendant la fête, et ils avaient vu tous les miracles qu’il y avait faits.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '46'
  - type: text
    text: Il repassa par Cana en Galilée, où il avait changé l’eau en vin. Or, à Capernaüm vivait un haut fonctionnaire
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '4.46 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Attaché au service du roi Hérode Antipas.
    marker-yv: yv-n
  - type: text
    text: ' dont le fils était très malade. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '47'
  - type: text
    text: Quand il apprit que Jésus était revenu de Judée en Galilée, il alla le trouver et le supplia de venir guérir son fils qui était sur le point de mourir.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '48'
  - type: text
    text: 'Jésus lui dit : '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: A moins de voir des signes miraculeux et des choses extraordinaires, vous ne croirez donc pas ?
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '49'
  - type: text
    text: 'Mais le fonctionnaire insistait : Seigneur, viens vite avant que mon petit garçon meure.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '50'
  - type: text
    text: ' '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: – Va,
  - type: text
    text: ' lui dit Jésus, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: rentre chez toi, ton fils vit.
- type: usfm
  marker: p
  children:
  - type: text
    text: Cet homme crut Jésus sur parole et il repartit chez lui.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '51'
  - type: text
    text: 'Sur le chemin du retour, plusieurs de ses serviteurs vinrent à sa rencontre et lui annoncèrent : Ton fils vit !'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '52'
  - type: text
    text: Il leur demanda à quelle heure son état s’était amélioré.
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Ils lui répondirent : C’est hier, vers une heure de l’après-midi, que la fièvre l’a quitté.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '53'
  - type: text
    text: 'Le père constata que c’était l’heure même où Jésus lui avait dit : '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: « Ton fils vit. »
  - type: text
    text: ' Dès lors il crut, lui et toute sa maison.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '54'
  - type: text
    text: Tel est le deuxième signe miraculeux que Jésus accomplit en Galilée, après son retour de Judée.
