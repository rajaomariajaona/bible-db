document_id: JHN.4,21
type_code: fra
verses:
  '1':
  - type: heading
    content: Le Messie se révèle en Samarie
  - type: text
    content: 'Les pharisiens avaient entendu dire que Jésus faisait et baptisait plus de disciples que Jean. '
  '10':
  - type: text
    content: 'Jésus lui répondit : '
  - type: text
    content: Si tu savais quel don Dieu veut te faire et qui est celui qui te demande à boire, c’est toi qui lui aurais demandé à boire et il t’aurait donné de l’eau vive
  - type: note
    content: 'vive: c’est-à-dire de l’eau courante, jeu de mots avec : eau qui donne la vie (voir v. 14).'
  - type: text
    content: .
  '11':
  - type: text
    content: '– Mais, Maître, répondit la femme, non seulement tu n’as pas de seau, mais le puits est profond ! D’où la tires-tu donc, cette eau vive ? '
  '12':
  - type: text
    content: Tu ne vas pas te prétendre plus grand que notre ancêtre Jacob, auquel nous devons ce puits, et qui a bu lui-même de son eau ainsi que ses enfants et ses troupeaux ?
  '13':
  - type: text
    content: ' '
  - type: text
    content: – Celui qui boit de cette eau,
  - type: text
    content: ' reprit Jésus, '
  - type: text
    content: aura de nouveau soif.
  - type: text
    content: ' '
  '14':
  - type: text
    content: 'Mais celui qui boira de l’eau que je lui donnerai n’aura plus jamais soif. Bien plus : l’eau que je lui donnerai deviendra en lui une source intarissable qui jaillira jusque dans la vie éternelle.'
  '15':
  - type: text
    content: – Maître, lui dit alors la femme, donne-moi de cette eau-là, pour que je n’aie plus soif et que je n’aie plus besoin de revenir puiser de l’eau ici.
  '16':
  - type: text
    content: ' '
  - type: text
    content: – Va donc chercher ton mari,
  - type: text
    content: ' lui dit Jésus, '
  - type: text
    content: et reviens ici.
  '17':
  - type: text
    content: – Je ne suis pas mariée, lui répondit-elle.
  - type: text
    content: '– Tu as raison de dire : Je ne suis pas mariée.'
  - type: text
    content: ' '
  '18':
  - type: text
    content: En fait tu l’as été cinq fois, et l’homme avec lequel tu vis actuellement n’est pas ton mari. Ce que tu as dit là est vrai
  - type: note
    content: 'On pourrait traduire en plaçant les paroles : ce que tu as dit là est vrai dans la bouche de la Samaritaine.'
  - type: text
    content: .
  '19':
  - type: text
    content: '– Maître, répondit la femme, je le vois, tu es un prophète. '
  '2':
  - type: text
    content: '(A vrai dire, Jésus lui-même ne baptisait personne, il laissait ce soin à ses disciples.) Lorsque Jésus l’apprit, '
  '20':
  - type: text
    content: 'Dis-moi : qui a raison ? Nos ancêtres ont adoré Dieu sur cette montagne-ci'
  - type: note
    content: Les Samaritains ne venaient pas célébrer le culte au temple de Jérusalem, mais ils avaient bâti un sanctuaire, détruit depuis lors, près de l’ancienne Sichem, sur le mont Garizim que l’on pouvait voir depuis l’endroit où se trouvait Jésus.
  - type: text
    content: . Vous autres, vous affirmez que l’endroit où l’on doit adorer, c’est Jérusalem.
  '21':
  - type: text
    content: ' '
  - type: text
    content: – Crois-moi,
  - type: text
    content: ' lui dit Jésus, '
  - type: text
    content: l’heure vient où il ne sera plus question de cette montagne ni de Jérusalem pour adorer le Père.
  - type: text
    content: ' '
  '22':
  - type: text
    content: Vous adorez ce que vous ne connaissez pas ; nous, nous adorons ce que nous connaissons, car le salut vient du peuple juif.
  - type: text
    content: ' '
  '23':
  - type: text
    content: Mais l’heure vient, et elle est déjà là, où les vrais adorateurs adoreront le Père par l’Esprit et en vérité ; car le Père recherche des hommes qui l’adorent ainsi.
  - type: text
    content: ' '
  '24':
  - type: text
    content: Dieu est Esprit et il faut que ceux qui l’adorent l’adorent par l’Esprit et en vérité.
  '25':
  - type: text
    content: 'La femme lui dit : Je sais qu’un jour le Messie doit venir (celui qu’on appelle Christ). Quand il sera venu, il nous expliquera tout.'
  '26':
  - type: text
    content: ' '
  - type: text
    content: – Je suis le Messie, moi qui te parle,
  - type: text
    content: ' lui dit Jésus.'
  '27':
  - type: text
    content: 'Sur ces entrefaites, les disciples revinrent. Ils furent très étonnés de voir Jésus parler avec une femme. Aucun d’eux, cependant, ne lui demanda : « Que lui veux-tu ? » ou : « Pourquoi parles-tu avec elle ? »'
  '28':
  - type: text
    content: 'Alors, la femme laissa là sa cruche, se rendit à la ville, et la voilà qui se mit à dire autour d’elle : '
  '29':
  - type: text
    content: Venez voir un homme qui m’a dit tout ce que j’ai fait. Et si c’était le Messie ?
  '3':
  - type: text
    content: 'il quitta la Judée et retourna en Galilée. '
  '30':
  - type: text
    content: Les gens sortirent de la ville pour se rendre auprès de Jésus.
  '31':
  - type: text
    content: 'Entre-temps, les disciples pressaient Jésus en disant : Maître, mange donc !'
  '32':
  - type: text
    content: 'Mais il leur dit : '
  - type: text
    content: J’ai, pour me nourrir, un aliment que vous ne connaissez pas.
  '33':
  - type: text
    content: 'Les disciples se demandèrent donc entre eux : Est-ce que quelqu’un lui aurait apporté à manger ?'
  '34':
  - type: text
    content: ' '
  - type: text
    content: – Ce qui me nourrit,
  - type: text
    content: ' leur expliqua Jésus, '
  - type: text
    content: c’est d’accomplir la volonté de celui qui m’a envoyé et de mener à bien l’œuvre qu’il m’a confiée.
  - type: text
    content: ' '
  '35':
  - type: text
    content: 'Vous dites en ce moment : Encore quatre mois, et c’est la moisson ! N’est-ce pas ? Eh bien, moi je vous dis : Ouvrez vos yeux et regardez les champs ; déjà les épis sont blonds, prêts à être moissonnés'
  - type: note
    content: La moisson figure l’ensemble de ceux qui sont prêts à accepter le message de Christ. Dans ce cas, les moissonneurs sont les disciples. Jean-Baptiste fut un des semeurs.
  - type: text
    content: .
  - type: text
    content: ' '
  '36':
  - type: text
    content: Celui qui les fauche reçoit maintenant son salaire et récolte une moisson pour la vie éternelle, si bien que semeur et moissonneur partagent la même joie.
  - type: text
    content: ' '
  '37':
  - type: text
    content: 'Ici se vérifie le proverbe : « Autre est celui qui sème, autre celui qui moissonne. »'
  - type: text
    content: ' '
  '38':
  - type: text
    content: Je vous ai envoyés récolter une moisson qui ne vous a coûté aucune peine. D’autres ont travaillé, et vous avez recueilli le fruit de leur labeur.
  '39':
  - type: text
    content: 'Il y eut, dans cette bourgade, beaucoup de Samaritains qui crurent en Jésus grâce au témoignage qu’avait rendu cette femme en déclarant : « Il m’a dit tout ce que j’ai fait. » '
  '4':
  - type: text
    content: 'Il lui fallait donc traverser la Samarie. '
  '40':
  - type: text
    content: 'Lorsque les Samaritains furent venus auprès de Jésus, ils le prièrent de rester, et il passa deux jours chez eux. '
  '41':
  - type: text
    content: 'Ils furent encore bien plus nombreux à croire en lui à cause de ses paroles, '
  '42':
  - type: text
    content: 'et ils disaient à la femme : Nous croyons en lui, non seulement à cause de ce que tu nous as rapporté, mais parce que nous l’avons nous-mêmes entendu ; et nous savons qu’il est vraiment le Sauveur du monde.'
  - type: heading
    content: Le deuxième miracle en Galilée
  '43':
  - type: text
    content: 'Après ces deux jours, Jésus repartit de là pour la Galilée, '
  '44':
  - type: text
    content: 'car il avait déclaré qu’un prophète ne reçoit pas dans son pays l’honneur qui lui est dû. '
  '45':
  - type: text
    content: Or, quand il arriva en Galilée, les gens lui firent assez bon accueil, car ils étaient, eux aussi, allés à Jérusalem pendant la fête, et ils avaient vu tous les miracles qu’il y avait faits.
  '46':
  - type: text
    content: Il repassa par Cana en Galilée, où il avait changé l’eau en vin. Or, à Capernaüm vivait un haut fonctionnaire
  - type: note
    content: Attaché au service du roi Hérode Antipas.
  - type: text
    content: ' dont le fils était très malade. '
  '47':
  - type: text
    content: Quand il apprit que Jésus était revenu de Judée en Galilée, il alla le trouver et le supplia de venir guérir son fils qui était sur le point de mourir.
  '48':
  - type: text
    content: 'Jésus lui dit : '
  - type: text
    content: A moins de voir des signes miraculeux et des choses extraordinaires, vous ne croirez donc pas ?
  '49':
  - type: text
    content: 'Mais le fonctionnaire insistait : Seigneur, viens vite avant que mon petit garçon meure.'
  '5':
  - type: text
    content: 'C’est ainsi qu’il arriva près d’une bourgade de Samarie nommée Sychar, non loin du champ que Jacob avait jadis donné à son fils Joseph. '
  '50':
  - type: text
    content: ' '
  - type: text
    content: – Va,
  - type: text
    content: ' lui dit Jésus, '
  - type: text
    content: rentre chez toi, ton fils vit.
  - type: text
    content: Cet homme crut Jésus sur parole et il repartit chez lui.
  '51':
  - type: text
    content: 'Sur le chemin du retour, plusieurs de ses serviteurs vinrent à sa rencontre et lui annoncèrent : Ton fils vit !'
  '52':
  - type: text
    content: Il leur demanda à quelle heure son état s’était amélioré.
  - type: text
    content: 'Ils lui répondirent : C’est hier, vers une heure de l’après-midi, que la fièvre l’a quitté.'
  '53':
  - type: text
    content: 'Le père constata que c’était l’heure même où Jésus lui avait dit : '
  - type: text
    content: « Ton fils vit. »
  - type: text
    content: ' Dès lors il crut, lui et toute sa maison.'
  '54':
  - type: text
    content: Tel est le deuxième signe miraculeux que Jésus accomplit en Galilée, après son retour de Judée.
  '6':
  - type: text
    content: 'C’est là que se trouvait le puits de Jacob. Jésus, fatigué du voyage, s’assit au bord du puits. Il était environ midi. '
  '7':
  - type: text
    content: 'Une femme samaritaine vint pour puiser de l’eau. Jésus s’adressa à elle : '
  - type: text
    content: S’il te plaît, donne-moi à boire un peu d’eau.
  '8':
  - type: text
    content: (Ses disciples étaient allés à la ville pour acheter de quoi manger.)
  '9':
  - type: text
    content: 'La Samaritaine s’exclama : Comment ? Tu es Juif et tu me demandes à boire, à moi qui suis Samaritaine ? (Les Juifs, en effet, évitaient toutes relations avec les Samaritains'
  - type: note
    content: 'Autre traduction : Les Juifs, en effet, ne buvaient pas à la même coupe que les Samaritains.'
  - type: text
    content: .)
