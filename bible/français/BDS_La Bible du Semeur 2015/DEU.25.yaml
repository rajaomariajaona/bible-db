document_id: DEU.25,21
type_code: fra
verses:
  '1':
  - type: heading
    content: Protection des coupables
  - type: text
    content: 'Si deux hommes sont en litige, ils se présenteront devant le tribunal, on les jugera, l’innocent sera acquitté et le coupable condamné. '
  '10':
  - type: text
    content: Dès lors, on surnommera la famille de cet homme en Israël « la famille du Déchaussé ».
  - type: heading
    content: Les gestes déplacés
  '11':
  - type: text
    content: 'Supposons que deux Israélites se battent ensemble et que la femme de l’un d’eux intervienne pour délivrer son mari des coups de son adversaire. Si elle empoigne ce dernier par les organes sexuels, '
  '12':
  - type: text
    content: vous lui couperez la main sans vous laisser apitoyer.
  - type: heading
    content: Les poids et les mesures
  '13':
  - type: text
    content: 'Tu n’auras pas dans ton sac deux sortes de poids différents : l’un plus lourd, l’autre plus léger'
  - type: note
    content: Pour les v. 13-16, voir Lv 19.35-36.
  - type: text
    content: '. '
  '14':
  - type: text
    content: 'Tu n’auras pas dans ta maison deux mesures de capacité : l’une plus grande et l’autre plus petite. '
  '15':
  - type: text
    content: 'Tu auras des poids exacts et justes, des mesures exactes et justes afin que tu vives longtemps dans le pays que l’Eternel ton Dieu te donne. '
  '16':
  - type: text
    content: Car l’Eternel ton Dieu a en abomination ceux qui commettent de telles fraudes.
  - type: heading
    content: Contre les Amalécites
  '17':
  - type: text
    content: Rappelez-vous comment les Amalécites vous ont traités quand vous étiez en chemin après votre sortie d’Egypte
  - type: note
    content: Pour les v. 17-19, voir Ex 17.8-14 ; 1 S 15.2-9.
  - type: text
    content: '  ; '
  '18':
  - type: text
    content: 'sans aucune crainte de Dieu, ils vous ont rejoints sur votre route et ont attaqué par-derrière les éclopés qui fermaient votre marche, alors que vous étiez épuisés et à bout de forces. '
  '19':
  - type: text
    content: Lorsque l’Eternel votre Dieu vous aura assuré une existence paisible en vous délivrant de tous vos ennemis d’alentour, dans le pays qu’il vous donne comme patrimoine pour que vous le possédiez, vous détruirez les Amalécites de dessous le ciel pour effacer leur souvenir. N’oubliez pas de faire cela.
  '2':
  - type: text
    content: 'Si ce dernier a mérité d’être battu, le juge le fera étendre par terre et le fera battre en sa présence d’un nombre de coups proportionnel à la gravité de son délit. '
  '3':
  - type: text
    content: Mais on ne lui infligera pas plus de quarante coups, car dépasser ce nombre de coups serait dégrader votre compatriote.
  - type: heading
    content: Protection des animaux
  '4':
  - type: text
    content: Tu ne mettras pas de muselière à un bœuf pendant qu’il foule le blé
  - type: note
    content: Cité en 1 Co 9.9 ; 1 Tm 5.18. Le blé était foulé par un bœuf (ou un âne) qui tirait une sorte de herse et piétinait les épis.
  - type: text
    content: .
  - type: heading
    content: Le cas du frère décédé sans laisser d’enfants
  '5':
  - type: text
    content: Si deux frères demeurent ensemble et que l’un d’eux vienne à mourir sans avoir d’enfant
  - type: note
    content: 'Fils ou fille (voir Nb 36). Selon d’autres : de fils.'
  - type: text
    content: ', sa veuve ne se remariera pas en dehors de la famille ; son beau-frère l’épousera pour accomplir son devoir de beau-frère envers elle. '
  '6':
  - type: text
    content: Le premier fils qu’elle mettra au monde perpétuera le nom du frère défunt pour que ce nom ne s’éteigne pas en Israël
  - type: note
    content: Cité en Mt 22.24 ; Mc 12.19 ; Lc 20.28.
  - type: text
    content: '. '
  '7':
  - type: text
    content: 'Si cet homme n’a pas envie d’épouser sa belle-sœur, elle se rendra à la porte de la ville vers les responsables et leur dira : « Mon beau-frère refuse de perpétuer le nom de son frère en Israël, il ne veut pas remplir son devoir de beau-frère. » '
  '8':
  - type: text
    content: 'Alors les responsables de la ville le convoqueront et lui parleront. S’il persiste dans son refus d’épouser sa belle-sœur, '
  '9':
  - type: text
    content: celle-ci s’approchera de lui en présence des responsables, elle lui ôtera sa sandale
  - type: note
    content: Voir Rt 4.7.
  - type: text
    content: ' et lui crachera au visage ; puis elle déclarera à haute voix : « Voilà comment doit être traité l’homme qui ne veut pas constituer une famille pour son frère ! » '
