document_id: DEU.25,21
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s2
    children:
    - type: text
      text: Protection des coupables
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Si deux hommes sont en litige, ils se présenteront devant le tribunal, on les jugera, l’innocent sera acquitté et le coupable condamné. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: Dès lors, on surnommera la famille de cet homme en Israël « la famille du Déchaussé ».
  - type: usfm
    marker: s2
    children:
    - type: text
      text: Les gestes déplacés
    marker-yv: yv-h
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'Supposons que deux Israélites se battent ensemble et que la femme de l’un d’eux intervienne pour délivrer son mari des coups de son adversaire. Si elle empoigne ce dernier par les organes sexuels, '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: vous lui couperez la main sans vous laisser apitoyer.
  - type: usfm
    marker: s2
    children:
    - type: text
      text: Les poids et les mesures
    marker-yv: yv-h
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'Tu n’auras pas dans ton sac deux sortes de poids différents : l’un plus lourd, l’autre plus léger'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '25.13 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Pour les v. 13-16, voir '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: Lv 19.35-36
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: '. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'Tu n’auras pas dans ta maison deux mesures de capacité : l’une plus grande et l’autre plus petite. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'Tu auras des poids exacts et justes, des mesures exactes et justes afin que tu vives longtemps dans le pays que l’Eternel ton Dieu te donne. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: Car l’Eternel ton Dieu a en abomination ceux qui commettent de telles fraudes.
  - type: usfm
    marker: s2
    children:
    - type: text
      text: Contre les Amalécites
    marker-yv: yv-h
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: Rappelez-vous comment les Amalécites vous ont traités quand vous étiez en chemin après votre sortie d’Egypte
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '25.17 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Pour les v. 17-19, voir Ex 17.8-14 ; 1 S 15.2-9.
      marker-yv: yv-n
    - type: text
      text: '  ; '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'sans aucune crainte de Dieu, ils vous ont rejoints sur votre route et ont attaqué par-derrière les éclopés qui fermaient votre marche, alors que vous étiez épuisés et à bout de forces. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: Lorsque l’Eternel votre Dieu vous aura assuré une existence paisible en vous délivrant de tous vos ennemis d’alentour, dans le pays qu’il vous donne comme patrimoine pour que vous le possédiez, vous détruirez les Amalécites de dessous le ciel pour effacer leur souvenir. N’oubliez pas de faire cela.
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'Si ce dernier a mérité d’être battu, le juge le fera étendre par terre et le fera battre en sa présence d’un nombre de coups proportionnel à la gravité de son délit. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: Mais on ne lui infligera pas plus de quarante coups, car dépasser ce nombre de coups serait dégrader votre compatriote.
  - type: usfm
    marker: s2
    children:
    - type: text
      text: Protection des animaux
    marker-yv: yv-h
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: Tu ne mettras pas de muselière à un bœuf pendant qu’il foule le blé
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '25.4 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Cité en 1 Co 9.9 ; 1 Tm 5.18. Le blé était foulé par un bœuf (ou un âne) qui tirait une sorte de herse et piétinait les épis.
      marker-yv: yv-n
    - type: text
      text: .
  - type: usfm
    marker: s2
    children:
    - type: text
      text: Le cas du frère décédé sans laisser d’enfants
    marker-yv: yv-h
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: Si deux frères demeurent ensemble et que l’un d’eux vienne à mourir sans avoir d’enfant
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '25.5 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Fils ou fille (voir '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: Nb 36
        - type: text
          text: '). Selon d’autres : '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: de fils.
      marker-yv: yv-n
    - type: text
      text: ', sa veuve ne se remariera pas en dehors de la famille ; son beau-frère l’épousera pour accomplir son devoir de beau-frère envers elle. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: Le premier fils qu’elle mettra au monde perpétuera le nom du frère défunt pour que ce nom ne s’éteigne pas en Israël
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '25.6 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Cité en Mt 22.24 ; Mc 12.19 ; Lc 20.28.
      marker-yv: yv-n
    - type: text
      text: '. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'Si cet homme n’a pas envie d’épouser sa belle-sœur, elle se rendra à la porte de la ville vers les responsables et leur dira : « Mon beau-frère refuse de perpétuer le nom de son frère en Israël, il ne veut pas remplir son devoir de beau-frère. » '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'Alors les responsables de la ville le convoqueront et lui parleront. S’il persiste dans son refus d’épouser sa belle-sœur, '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: celle-ci s’approchera de lui en présence des responsables, elle lui ôtera sa sandale
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '25.9 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Voir '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: Rt 4.7
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: ' et lui crachera au visage ; puis elle déclarera à haute voix : « Voilà comment doit être traité l’homme qui ne veut pas constituer une famille pour son frère ! » '
