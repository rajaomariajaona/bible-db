document_id: PSA.85,21
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: L’Eternel nous rend le bonheur
    marker-yv: yv-h
  - type: usfm
    marker: d
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: Au chef de chœur. Psaume des Qoréites
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '85.1 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Voir note '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: '42.1'
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: .
  '10':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: Oui, il va bientôt ╵œuvrer au salut ╵de ceux qui le craignent,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: afin que sa gloire ╵puisse demeurer ╵dans notre pays.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: L’amour, la fidélité ╵vont se rencontrer,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et la justice et la paix ╵se donneront l’accolade.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: La vérité germera ╵du sein de la terre,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et la justice regardera ╵depuis les hauteurs célestes.
  '13':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: L’Eternel lui-même ╵nous donnera le bonheur
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et notre pays ╵produira ses fruits.
  '14':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: La justice le précédera,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: elle tracera ╵un chemin devant ses pas
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '85.14 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Autre traduction : '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: et elle imprimera ses traces de pas sur le chemin.
      marker-yv: yv-n
    - type: text
      text: .
  '2':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: Eternel, tu as montré ╵ta faveur à ton pays.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tu as rétabli Jacob
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '85.2 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Autre traduction : '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: tu as ramené ceux de Jacob qui étaient en captivité.
      marker-yv: yv-n
    - type: text
      text: .
  '3':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: Tu as pardonné ╵les fautes commises par ton peuple,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: tu as effacé tous ses péchés.
  - type: usfm
    marker: q4
    children:
    - type: text
      text: Pause
  '4':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: Tu as retenu ╵toute ta fureur,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: tu es revenu ╵de ton ardente colère.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: Oh, rétablis-nous
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '85.5 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Autre traduction : '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'reviens à nous, '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'ou bien, en répartissant les consonnes du verbe hébreu en deux mots : '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: change donc de dispositions.
      marker-yv: yv-n
    - type: text
      text: ', ╵Dieu, notre Sauveur !'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mets un terme ╵à ta colère envers nous !
  '6':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: Vas-tu, éternellement, ╵être irrité contre nous ?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ton ressentiment ╵durera-t-il d’âge en âge ?
  '7':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: Ne voudrais-tu pas ╵nous rendre à la vie
  - type: usfm
    marker: q1
    children:
    - type: text
      text: afin que ton peuple ╵se réjouisse en toi ?
  '8':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: Fais-nous contempler, ╵ton amour, ô Eternel !
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Accorde-nous ton salut !
  '9':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'Je veux écouter ╵ce que dit Dieu, l’Eternel :'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: c’est de bien-être qu’il parle ╵à son peuple ╵et à ceux qui lui sont attachés.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mais qu’ils ne retournent pas ╵à leur fol égarement.
