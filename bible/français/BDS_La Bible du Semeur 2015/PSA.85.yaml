document_id: PSA.85,21
type_code: fra
verses:
  '1':
  - type: heading
    content: L’Eternel nous rend le bonheur
  - type: text
    content: Au chef de chœur. Psaume des Qoréites
  - type: note
    content: Voir note 42.1.
  - type: text
    content: .
  '10':
  - type: text
    content: Oui, il va bientôt ╵œuvrer au salut ╵de ceux qui le craignent,
  - type: text
    content: afin que sa gloire ╵puisse demeurer ╵dans notre pays.
  '11':
  - type: text
    content: L’amour, la fidélité ╵vont se rencontrer,
  - type: text
    content: et la justice et la paix ╵se donneront l’accolade.
  '12':
  - type: text
    content: La vérité germera ╵du sein de la terre,
  - type: text
    content: et la justice regardera ╵depuis les hauteurs célestes.
  '13':
  - type: text
    content: L’Eternel lui-même ╵nous donnera le bonheur
  - type: text
    content: et notre pays ╵produira ses fruits.
  '14':
  - type: text
    content: La justice le précédera,
  - type: text
    content: elle tracera ╵un chemin devant ses pas
  - type: note
    content: 'Autre traduction : et elle imprimera ses traces de pas sur le chemin.'
  - type: text
    content: .
  '2':
  - type: text
    content: Eternel, tu as montré ╵ta faveur à ton pays.
  - type: text
    content: Tu as rétabli Jacob
  - type: note
    content: 'Autre traduction : tu as ramené ceux de Jacob qui étaient en captivité.'
  - type: text
    content: .
  '3':
  - type: text
    content: Tu as pardonné ╵les fautes commises par ton peuple,
  - type: text
    content: tu as effacé tous ses péchés.
  - type: text
    content: Pause
  '4':
  - type: text
    content: Tu as retenu ╵toute ta fureur,
  - type: text
    content: tu es revenu ╵de ton ardente colère.
  '5':
  - type: text
    content: Oh, rétablis-nous
  - type: note
    content: 'Autre traduction : reviens à nous, ou bien, en répartissant les consonnes du verbe hébreu en deux mots : change donc de dispositions.'
  - type: text
    content: ', ╵Dieu, notre Sauveur !'
  - type: text
    content: Mets un terme ╵à ta colère envers nous !
  '6':
  - type: text
    content: Vas-tu, éternellement, ╵être irrité contre nous ?
  - type: text
    content: Ton ressentiment ╵durera-t-il d’âge en âge ?
  '7':
  - type: text
    content: Ne voudrais-tu pas ╵nous rendre à la vie
  - type: text
    content: afin que ton peuple ╵se réjouisse en toi ?
  '8':
  - type: text
    content: Fais-nous contempler, ╵ton amour, ô Eternel !
  - type: text
    content: Accorde-nous ton salut !
  '9':
  - type: text
    content: 'Je veux écouter ╵ce que dit Dieu, l’Eternel :'
  - type: text
    content: c’est de bien-être qu’il parle ╵à son peuple ╵et à ceux qui lui sont attachés.
  - type: text
    content: Mais qu’ils ne retournent pas ╵à leur fol égarement.
