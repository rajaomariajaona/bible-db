document_id: DEU.34,21
type_code: fra
verses:
  '1':
  - type: heading
    content: La mort de Moïse
  - type: text
    content: Des plaines de Moab, Moïse monta sur le mont Nébo, au sommet du Pisga, qui se trouve en face de Jéricho
  - type: note
    content: Comme l’Eternel le lui avait ordonné (32.48-52). Le mont Nébo fait partie de la chaîne du Pisga dans les monts Abarim qui dominent l’est de la mer Morte et tout le territoire décrit aux v. 1-3.
  - type: text
    content: '. L’Eternel lui fit contempler tout le pays, de la région de Galaad jusqu’à Dan, '
  '10':
  - type: text
    content: Au sein du peuple d’Israël, il n’a plus jamais paru de prophète comme Moïse avec qui l’Eternel s’entretenait directement
  - type: note
    content: Voir Ex 33.11.
  - type: text
    content: ', '
  '11':
  - type: text
    content: 'aucun ne fut son égal pour tous les signes miraculeux et les prodiges que l’Eternel l’avait envoyé accomplir en Egypte devant le pharaon, devant ses ministres et tout son peuple, '
  '12':
  - type: text
    content: et pour tous les actes puissants et redoutables que Moïse a accomplis aux yeux des Israélites.
  '2':
  - type: text
    content: 'tout le territoire de Nephtali, d’Ephraïm et de Manassé, tout le pays de Juda jusqu’à la mer Méditerranée, '
  '3':
  - type: text
    content: puis la région du Néguev et la région qui comprend la vallée de Jéricho – la ville des palmiers – jusqu’à Tsoar
  - type: note
    content: Le regard passe des territoires les plus éloignés aux plus proches, Tsoar se trouvant sur la rive sud-ouest de la mer Morte (Gn 13.10 ; 14.2 ; 19.22).
  - type: text
    content: '. '
  '4':
  - type: text
    content: 'Alors l’Eternel lui dit : Voilà le pays que j’ai promis par serment à Abraham, à Isaac et à Jacob, lorsque je leur ai dit : « Je donnerai ce pays à vos descendants. » Je te l’ai fait voir de tes propres yeux, mais tu n’y entreras pas'
  - type: note
    content: Voir Gn 12.7 ; 26.3 ; 28.13.
  - type: text
    content: .
  '5':
  - type: text
    content: 'Moïse, serviteur de l’Eternel, mourut là, dans le pays de Moab, comme l’Eternel l’avait déclaré. '
  '6':
  - type: text
    content: Dieu lui-même l’enterra dans la vallée de Moab, en face de Beth-Peor, et jusqu’à ce jour personne n’a jamais su où était son tombeau.
  '7':
  - type: text
    content: 'Moïse était âgé de cent vingt ans quand il mourut ; sa vue n’avait pas baissé, il n’avait pas perdu sa vitalité. '
  '8':
  - type: text
    content: Les Israélites le pleurèrent dans les steppes de Moab pendant trente jours, puis le temps du deuil de Moïse prit fin.
  '9':
  - type: text
    content: Josué, fils de Noun, était rempli d’un Esprit de sagesse, car Moïse lui avait imposé les mains. Dès lors, les Israélites lui obéirent et se conformèrent aux ordres que l’Eternel avait donnés à Moïse
  - type: note
    content: Voir Nb 27.18-23.
  - type: text
    content: .
