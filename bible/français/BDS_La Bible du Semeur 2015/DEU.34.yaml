document_id: DEU.34,21
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: La mort de Moïse
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: Des plaines de Moab, Moïse monta sur le mont Nébo, au sommet du Pisga, qui se trouve en face de Jéricho
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '34.1 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Comme l’Eternel le lui avait ordonné (
        - type: usfm
          marker: ref
          children:
          - type: text
            text: 32.48-52
        - type: text
          text: ). Le mont Nébo fait partie de la chaîne du Pisga dans les monts Abarim qui dominent l’est de la mer Morte et tout le territoire décrit aux v. 1-3.
      marker-yv: yv-n
    - type: text
      text: '. L’Eternel lui fit contempler tout le pays, de la région de Galaad jusqu’à Dan, '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: Au sein du peuple d’Israël, il n’a plus jamais paru de prophète comme Moïse avec qui l’Eternel s’entretenait directement
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '34.10 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Voir '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: Ex 33.11
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: ', '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'aucun ne fut son égal pour tous les signes miraculeux et les prodiges que l’Eternel l’avait envoyé accomplir en Egypte devant le pharaon, devant ses ministres et tout son peuple, '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: et pour tous les actes puissants et redoutables que Moïse a accomplis aux yeux des Israélites.
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'tout le territoire de Nephtali, d’Ephraïm et de Manassé, tout le pays de Juda jusqu’à la mer Méditerranée, '
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: puis la région du Néguev et la région qui comprend la vallée de Jéricho – la ville des palmiers – jusqu’à Tsoar
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '34.3 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Le regard passe des territoires les plus éloignés aux plus proches, Tsoar se trouvant sur la rive sud-ouest de la mer Morte (Gn 13.10 ; 14.2 ; 19.22).
      marker-yv: yv-n
    - type: text
      text: '. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'Alors l’Eternel lui dit : Voilà le pays que j’ai promis par serment à Abraham, à Isaac et à Jacob, lorsque je leur ai dit : « Je donnerai ce pays à vos descendants. » Je te l’ai fait voir de tes propres yeux, mais tu n’y entreras pas'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '34.4 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Voir Gn 12.7 ; 26.3 ; 28.13.
      marker-yv: yv-n
    - type: text
      text: .
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'Moïse, serviteur de l’Eternel, mourut là, dans le pays de Moab, comme l’Eternel l’avait déclaré. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: Dieu lui-même l’enterra dans la vallée de Moab, en face de Beth-Peor, et jusqu’à ce jour personne n’a jamais su où était son tombeau.
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'Moïse était âgé de cent vingt ans quand il mourut ; sa vue n’avait pas baissé, il n’avait pas perdu sa vitalité. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: Les Israélites le pleurèrent dans les steppes de Moab pendant trente jours, puis le temps du deuil de Moïse prit fin.
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: Josué, fils de Noun, était rempli d’un Esprit de sagesse, car Moïse lui avait imposé les mains. Dès lors, les Israélites lui obéirent et se conformèrent aux ordres que l’Eternel avait donnés à Moïse
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '34.9 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Voir '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: Nb 27.18-23
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: .
