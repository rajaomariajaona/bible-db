document_id: JER.39,21
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s2
    children:
    - type: text
      text: La prise de Jérusalem
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: La neuvième année du règne de Sédécias, roi de Juda, au dixième mois
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '39.1 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: En janvier 588 av. J.-C.
      marker-yv: yv-n
    - type: text
      text: ', Nabuchodonosor, roi de Babylone, vint avec son armée à Jérusalem et il en fit le siège'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '39.1 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Pour les v. 1-10, voir 2 R 25.1-12 ; Jr 52.4-16.
      marker-yv: yv-n
    - type: text
      text: '. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Mais il laissa dans le pays de Juda une partie des pauvres de la population, des gens qui ne possédaient pas de biens, et il leur donna alors des vignes et des champs.
  - type: usfm
    marker: s2
    children:
    - type: text
      text: Jérémie libéré
    marker-yv: yv-h
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Nabuchodonosor, roi de Babylone, confia Jérémie à Nebouzaradân, chef de la garde royale, en lui ordonnant : '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Prends-le en charge, veille sur lui, ne lui fais aucun mal, mais au contraire, agis à son égard comme il te le dira.
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Alors Nebouzaradân, le chef de la garde, Neboushazbân, le chef des officiers de la cour, Nergal-Saretser, le général en chef, et tous les généraux du roi de Babylone '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: firent prendre Jérémie dans la cour du corps de garde ; ils le confièrent à Guedalia, fils d’Ahiqam, petit-fils de Shaphân, qui le laissa rentrer chez lui ; Jérémie demeura donc au milieu du peuple
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '39.14 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Guedalia
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: ': '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: fils d’Ahiqam qui avait protégé Jérémie pour qu’il ne soit pas livré au peuple qui voulait le tuer (
        - type: usfm
          marker: ref
          children:
          - type: text
            text: '26.24'
        - type: text
          text: ).
      marker-yv: yv-n
    - type: text
      text: .
  - type: usfm
    marker: s2
    children:
    - type: text
      text: Dieu se souvient de ceux qui ont eu pitié
    marker-yv: yv-h
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: L’Eternel adressa la parole à Jérémie pendant qu’il était encore emprisonné dans la cour du corps de garde.
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Va parler à Ebed-Mélek, l’Ethiopien
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '39.16 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Voir '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: 38.7-13
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: ', et dis-lui : Voici ce que déclare le Seigneur des armées célestes, Dieu d’Israël : Je vais accomplir ce que j’ai annoncé pour cette ville : des malheurs, et non des choses heureuses, et cela se produira sous tes yeux lorsque cela arrivera. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Mais ce jour-là, je t’épargnerai – l’Eternel le déclare – et tu ne seras pas livré aux hommes que tu redoutes. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Oui, je te ferai échapper et tu ne mourras pas par l’épée. Tu auras la vie sauve, telle sera ta part pour avoir mis ta confiance en moi – l’Eternel le déclare.
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: La onzième année de Sédécias, le neuvième jour du quatrième mois
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '39.2 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Juillet 587 av. J.-C.
      marker-yv: yv-n
    - type: text
      text: ', une brèche fut ouverte dans le rempart de la ville. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Tout l’état-major du roi de Babylone entra dans la ville et s’installa à la porte Centrale
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '39.3 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Probablement une porte menant de la ville basse à la forteresse de Sion. Sédécias s’enfuit par une porte opposée, au sud, menant aux jardins du roi près du confluent du Cédron et de la vallée de Hinnom.
      marker-yv: yv-n
    - type: text
      text: . C’étaient Nergal-Saretser, Samgar-Nebou, Sarsekim, le chef des officiers de la cour, Nergal-Saretser, le général en chef, et tous les autres officiers supérieurs du roi de Babylone
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '39.3 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: La traduction des titres de ces officiers ou fonctionnaires est incertaine.
      marker-yv: yv-n
    - type: text
      text: .
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Lorsque Sédécias, roi de Juda, et tous les soldats virent cela, ils s’enfuirent et s’échappèrent de la ville de nuit par le chemin du jardin du roi, par la porte entre les deux remparts, et sortirent sur le chemin de la vallée du Jourdain. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Mais l’armée des Chaldéens se lança à leur poursuite et rattrapa Sédécias dans la plaine de Jéricho ; ils le firent prisonnier et l’amenèrent à Nabuchodonosor, roi de Babylone, à Ribla dans le pays de Hamath
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '39.5 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Ribla '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: est situé sur l’Oronte, un fleuve de Syrie passant au nord du Liban. Le pays de Hamath correspondait à la Syrie actuelle.
      marker-yv: yv-n
    - type: text
      text: '. Celui-ci prononça son jugement contre lui. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Le roi de Babylone fit égorger à Ribla les fils de Sédécias sous les yeux de leur père. Il fit aussi égorger tous les notables de Juda. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Puis il fit crever les yeux à Sédécias et le fit lier avec une double chaîne de bronze, pour le déporter à Babylone.
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Les Chaldéens mirent le feu au palais royal et aux maisons des particuliers et ils démantelèrent les remparts de la ville. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Nebouzaradân, chef de la garde royale, déporta à Babylone le reste de la population qui était demeurée dans la ville, ceux qui s’étaient déjà rendus à Nabuchodonosor et ce qui restait du peuple. '
