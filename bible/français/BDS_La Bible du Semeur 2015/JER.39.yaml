document_id: JER.39,21
type_code: fra
verses:
  '1':
  - type: heading
    content: La prise de Jérusalem
  - type: text
    content: La neuvième année du règne de Sédécias, roi de Juda, au dixième mois
  - type: note
    content: En janvier 588 av. J.-C.
  - type: text
    content: ', Nabuchodonosor, roi de Babylone, vint avec son armée à Jérusalem et il en fit le siège'
  - type: note
    content: Pour les v. 1-10, voir 2 R 25.1-12 ; Jr 52.4-16.
  - type: text
    content: '. '
  '10':
  - type: text
    content: Mais il laissa dans le pays de Juda une partie des pauvres de la population, des gens qui ne possédaient pas de biens, et il leur donna alors des vignes et des champs.
  - type: heading
    content: Jérémie libéré
  '11':
  - type: text
    content: 'Nabuchodonosor, roi de Babylone, confia Jérémie à Nebouzaradân, chef de la garde royale, en lui ordonnant : '
  '12':
  - type: text
    content: Prends-le en charge, veille sur lui, ne lui fais aucun mal, mais au contraire, agis à son égard comme il te le dira.
  '13':
  - type: text
    content: 'Alors Nebouzaradân, le chef de la garde, Neboushazbân, le chef des officiers de la cour, Nergal-Saretser, le général en chef, et tous les généraux du roi de Babylone '
  '14':
  - type: text
    content: firent prendre Jérémie dans la cour du corps de garde ; ils le confièrent à Guedalia, fils d’Ahiqam, petit-fils de Shaphân, qui le laissa rentrer chez lui ; Jérémie demeura donc au milieu du peuple
  - type: note
    content: 'Guedalia: fils d’Ahiqam qui avait protégé Jérémie pour qu’il ne soit pas livré au peuple qui voulait le tuer (26.24).'
  - type: text
    content: .
  - type: heading
    content: Dieu se souvient de ceux qui ont eu pitié
  '15':
  - type: text
    content: L’Eternel adressa la parole à Jérémie pendant qu’il était encore emprisonné dans la cour du corps de garde.
  '16':
  - type: text
    content: Va parler à Ebed-Mélek, l’Ethiopien
  - type: note
    content: Voir 38.7-13.
  - type: text
    content: ', et dis-lui : Voici ce que déclare le Seigneur des armées célestes, Dieu d’Israël : Je vais accomplir ce que j’ai annoncé pour cette ville : des malheurs, et non des choses heureuses, et cela se produira sous tes yeux lorsque cela arrivera. '
  '17':
  - type: text
    content: 'Mais ce jour-là, je t’épargnerai – l’Eternel le déclare – et tu ne seras pas livré aux hommes que tu redoutes. '
  '18':
  - type: text
    content: Oui, je te ferai échapper et tu ne mourras pas par l’épée. Tu auras la vie sauve, telle sera ta part pour avoir mis ta confiance en moi – l’Eternel le déclare.
  '2':
  - type: text
    content: La onzième année de Sédécias, le neuvième jour du quatrième mois
  - type: note
    content: Juillet 587 av. J.-C.
  - type: text
    content: ', une brèche fut ouverte dans le rempart de la ville. '
  '3':
  - type: text
    content: Tout l’état-major du roi de Babylone entra dans la ville et s’installa à la porte Centrale
  - type: note
    content: Probablement une porte menant de la ville basse à la forteresse de Sion. Sédécias s’enfuit par une porte opposée, au sud, menant aux jardins du roi près du confluent du Cédron et de la vallée de Hinnom.
  - type: text
    content: . C’étaient Nergal-Saretser, Samgar-Nebou, Sarsekim, le chef des officiers de la cour, Nergal-Saretser, le général en chef, et tous les autres officiers supérieurs du roi de Babylone
  - type: note
    content: La traduction des titres de ces officiers ou fonctionnaires est incertaine.
  - type: text
    content: .
  '4':
  - type: text
    content: 'Lorsque Sédécias, roi de Juda, et tous les soldats virent cela, ils s’enfuirent et s’échappèrent de la ville de nuit par le chemin du jardin du roi, par la porte entre les deux remparts, et sortirent sur le chemin de la vallée du Jourdain. '
  '5':
  - type: text
    content: Mais l’armée des Chaldéens se lança à leur poursuite et rattrapa Sédécias dans la plaine de Jéricho ; ils le firent prisonnier et l’amenèrent à Nabuchodonosor, roi de Babylone, à Ribla dans le pays de Hamath
  - type: note
    content: Ribla est situé sur l’Oronte, un fleuve de Syrie passant au nord du Liban. Le pays de Hamath correspondait à la Syrie actuelle.
  - type: text
    content: '. Celui-ci prononça son jugement contre lui. '
  '6':
  - type: text
    content: 'Le roi de Babylone fit égorger à Ribla les fils de Sédécias sous les yeux de leur père. Il fit aussi égorger tous les notables de Juda. '
  '7':
  - type: text
    content: Puis il fit crever les yeux à Sédécias et le fit lier avec une double chaîne de bronze, pour le déporter à Babylone.
  '8':
  - type: text
    content: 'Les Chaldéens mirent le feu au palais royal et aux maisons des particuliers et ils démantelèrent les remparts de la ville. '
  '9':
  - type: text
    content: 'Nebouzaradân, chef de la garde royale, déporta à Babylone le reste de la population qui était demeurée dans la ville, ceux qui s’étaient déjà rendus à Nabuchodonosor et ce qui restait du peuple. '
