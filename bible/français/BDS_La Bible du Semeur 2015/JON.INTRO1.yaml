  - type: text
    text: Introduction
- type: usfm
  marker: ip
  children:
  - type: text
    text: Jonas, fils d’Amittaï (1.1), originaire de Gath-Hépher en Zabulon (2 R 14.25 ; Jos 19.10, 13), a été le porte-parole de l’Eternel dans le royaume du Nord sous le règne de Jéroboam II (793 à 753 av. J.-C.). A cette époque, on assiste à l’affaiblissement de la Syrie sous la pression des Assyriens, puis à une éclipse de la puissance de l’Assyrie, due à des troubles internes au royaume. Selon le livre des Rois, Jonas a encouragé Jéroboam II à profiter de ce répit pour reconquérir les territoires du nord du pays occupés par les Syriens (2 R 14.25-27).
- type: usfm
  marker: ip
  children:
  - type: text
    text: Contrairement aux autres écrits prophétiques de l’Ancien Testament, le livre de Jonas rapporte l’histoire de l’accomplissement d’une seule mission confiée par l’Eternel à un prophète. Dans sa forme, cet écrit rappelle le récit des ministères d’Elie et d’Elisée dans 1 et 2 Rois ainsi que les sections narratives des livres d’Esaïe, de Jérémie et d’Ezéchiel.
- type: usfm
  marker: ip
  children:
  - type: text
    text: 'Le livre raconte comment Jonas, chargé par l’Eternel d’aller à Ninive, la capitale assyrienne, pour y dénoncer le mal qui s’y commet, se rebelle contre l’ordre du Seigneur et s’enfuit par mer dans la direction opposée (1.2-3). Mais contraint et forcé (1.4 à 2.11), le prophète se rend finalement à Ninive pour y annoncer le jugement de Dieu, et, à l’écoute de sa prédication, les habitants de la ville décident de changer de manière de vivre. En réponse à ce changement d’attitude, l’Eternel renonce à l’exécution de la peine (3.1-10). Furieux, Jonas désire alors mourir (4.3) et dévoile les raisons profondes de sa rébellion contre Dieu : connaissant l’amour et la bienveillance de l’Eternel (4.2), le prophète ne voulait pas offrir une « chance » de salut aux Assyriens, peuple belliqueux à la cruauté proverbiale, qui, selon Amos, contemporain de Jonas, allait ruiner Israël. Le manque de pitié du prophète, qui se voulait plus « juste » que Dieu (4.4-11), était donc peut-être teinté d’un nationalisme étroit qui s’opposait à la volonté de Dieu de bénir par Israël des gens de tous les peuples (Gn 12.3 ; Ex 19.5-6 ; 1 R 17.8ss ; 2 R 5 ; Ps 96 ; 98 ; 117 ; Am 9.12).'
- type: usfm
  marker: ip
  children:
  - type: text
    text: 'Lorsque les responsables juifs viendront demander à Jésus de produire un signe miraculeux prouvant l’origine divine de sa mission, le Seigneur leur répondra par celui de Jonas : de même que Jonas a été trois jours et trois nuits dans le ventre d’un grand poisson, le Messie attendu restera trois jours et trois nuits dans le tombeau (Mt 12.38-40 ; 16.4 ; Lc 11.29). Mais aveuglés par leur nationalisme religieux, les Juifs du temps de Jésus ne le reconnaîtront pas (Jn 12.41 ; Lc 11.30).'
