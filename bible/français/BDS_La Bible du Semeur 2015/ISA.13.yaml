document_id: ISA.13
type_code: fra
segments:
- type: usfm
  marker: ms1
  children:
  - type: text
    text: Prophéties sur les peuples étrangers
  marker-yv: yv-h
- type: usfm
  marker: s1
  children:
  - type: text
    text: Contre Babylone
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Menace sur Babylone, révélée à Esaïe, fils d’Amots.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Sur un mont dénudé, ╵dressez un étendard,
- type: usfm
  marker: q1
  children:
  - type: text
    text: poussez des cris
- type: usfm
  marker: q1
  children:
  - type: text
    text: et agitez la main !
- type: usfm
  marker: q1
  children:
  - type: text
    text: Que l’on franchisse ╵les portes des seigneurs !
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Moi, j’ai donné mes ordres ╵à des milices ╵à qui j’ai fait appel,
- type: usfm
  marker: q1
  children:
  - type: text
    text: j’ai convoqué mes braves, ╵agents de ma colère,
- type: usfm
  marker: q1
  children:
  - type: text
    text: qui se réjouissent de ma gloire.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'C’est le bruit d’une foule ╵sur les montagnes :'
- type: usfm
  marker: q1
  children:
  - type: text
    text: on dirait un grand peuple.
- type: usfm
  marker: q1
  children:
  - type: text
    text: On entend le tumulte de royaumes, ╵de nations rassemblées.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Le Seigneur des armées célestes ╵passe en revue
- type: usfm
  marker: q1
  children:
  - type: text
    text: ses troupes de combat.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Ils viennent de très loin,
- type: usfm
  marker: q1
  children:
  - type: text
    text: du bout de l’horizon,
- type: usfm
  marker: q1
  children:
  - type: text
    text: l’Eternel et les troupes ╵dont il se servira ╵dans son indignation
- type: usfm
  marker: q1
  children:
  - type: text
    text: pour dévaster tout le pays.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Poussez donc des cris de détresse, ╵car il se rapproche à grands pas, ╵le jour de l’Eternel,
- type: usfm
  marker: q1
  children:
  - type: text
    text: comme un fléau dévastateur ╵déchaîné par le Tout-Puissant
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '13.6 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Voir '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Jl 1.15
        metadata:
          usfm: JOL.1.15
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: C’est pourquoi tous les bras s’affaibliront
- type: usfm
  marker: q1
  children:
  - type: text
    text: et tout le monde ╵perdra courage.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Ils seront frappés d’épouvante,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ils seront saisis de douleurs, ╵accablés de souffrances ╵comme une femme qui enfante.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ils se regarderont ╵avec stupeur les uns les autres,
- type: usfm
  marker: q1
  children:
  - type: text
    text: le visage embrasé.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Voici venir ╵le jour de l’Eternel,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ce jour impitoyable, ╵jour de fureur ╵et d’ardente colère
- type: usfm
  marker: q1
  children:
  - type: text
    text: qui réduira la terre ╵en un désert,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et en exterminera les pécheurs
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '13.9 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Pour les v. 9-10,13, voir Jl 2.10-11 ; 3.4-5 ; 4.14-16.
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Alors les étoiles du ciel ╵et toutes leurs constellations
- type: usfm
  marker: q1
  children:
  - type: text
    text: cesseront de briller,
- type: usfm
  marker: q1
  children:
  - type: text
    text: le soleil sera obscurci ╵dès son lever,
- type: usfm
  marker: q1
  children:
  - type: text
    text: il n’y aura plus de clarté ╵répandue par la lune.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: J’interviendrai contre le monde ╵pour le punir ╵de sa méchanceté
- type: usfm
  marker: q1
  children:
  - type: text
    text: et contre ceux qui font le mal ╵à cause de leurs fautes.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Je mettrai fin à l’arrogance ╵des insolents,
- type: usfm
  marker: q1
  children:
  - type: text
    text: je ferai tomber l’orgueil des tyrans.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Je rendrai les humains plus rares ╵que de l’or fin,
- type: usfm
  marker: q1
  children:
  - type: text
    text: plus rares que de l’or d’Ophir.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: J’ébranlerai le ciel,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et cette terre ╵sera secouée sur ses bases
- type: usfm
  marker: q1
  children:
  - type: text
    text: par la fureur de l’Eternel, ╵le Seigneur des armées célestes,
- type: usfm
  marker: q1
  children:
  - type: text
    text: au jour où il déchaînera ╵son ardente colère.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Les gens seront, en ce jour-là, ╵pareils à des gazelles ╵que l’on poursuit,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ou comme des brebis perdues.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Chacun s’en retournera chez les siens,
- type: usfm
  marker: q1
  children:
  - type: text
    text: chacun fuira vers son pays.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Tous ceux que l’on rencontrera ╵seront percés de flèches,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et tous ceux que l’on saisira ╵tomberont par l’épée.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Leurs petits enfants seront écrasés ╵sous leurs regards,
- type: usfm
  marker: q1
  children:
  - type: text
    text: leurs maisons seront mises à sac
- type: usfm
  marker: q1
  children:
  - type: text
    text: et leurs femmes violées.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Car je vais susciter ╵contre eux les Mèdes
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '13.17 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Peuple voisin des Perses qui, au temps d’Esaïe, commençait à harasser les Assyriens. Il participa à la prise de Ninive en 612 av. J.-C.
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: text
    text: qui ne font pas cas de l’argent
- type: usfm
  marker: q1
  children:
  - type: text
    text: et qui font fi de l’or.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Avec leurs arcs, ╵ils abattront les jeunes gens,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ils n’épargneront pas ╵les nouveau-nés
- type: usfm
  marker: q1
  children:
  - type: text
    text: et seront sans pitié ╵pour les enfants.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Et Babylone, ╵le joyau des royaumes,
- type: usfm
  marker: q1
  children:
  - type: text
    text: cité splendide ╵qui faisait la fierté des Chaldéens,
- type: usfm
  marker: q1
  children:
  - type: text
    text: deviendra semblable à Sodome ╵et à Gomorrhe
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '13.19 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Voir Gn 18.20 ; 19.
    marker-yv: yv-n
  - type: text
    text: ' ╵que Dieu a renversées.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Car Babylone ne sera ╵plus jamais habitée
- type: usfm
  marker: q1
  children:
  - type: text
    text: et plus jamais peuplée
- type: usfm
  marker: q1
  children:
  - type: text
    text: dans toutes les générations.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et même les nomades ╵n’y dresseront jamais leur tente,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et nul berger ╵n’y fera reposer ses bêtes.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Les chats sauvages ╵chercheront abri dans ses ruines ;
- type: usfm
  marker: q1
  children:
  - type: text
    text: ses maisons ╵seront hantées par les hiboux,
- type: usfm
  marker: q1
  children:
  - type: text
    text: les autruches ╵y établiront leur demeure
- type: usfm
  marker: q1
  children:
  - type: text
    text: et les boucs viendront ╵y prendre leurs ébats
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '13.21 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Voir Es 34.14 ; So 2.14 ; Ap 18.2.
    marker-yv: yv-n
  - type: text
    text: ','
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: les chats sauvages ╵s’appelleront dans ses châteaux,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et les chacals ╵viendront hurler dans ses palais.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Son heure approche,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et ses jours ne seront pas prolongés.
