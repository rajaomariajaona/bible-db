document_id: ISA.13,21
type_code: fra
verses:
  '1':
  - type: heading
    content: Prophéties sur les peuples étrangers
  - type: heading
    content: Contre Babylone
  - type: text
    content: Menace sur Babylone, révélée à Esaïe, fils d’Amots.
  '10':
  - type: text
    content: Alors les étoiles du ciel ╵et toutes leurs constellations
  - type: text
    content: cesseront de briller,
  - type: text
    content: le soleil sera obscurci ╵dès son lever,
  - type: text
    content: il n’y aura plus de clarté ╵répandue par la lune.
  '11':
  - type: text
    content: J’interviendrai contre le monde ╵pour le punir ╵de sa méchanceté
  - type: text
    content: et contre ceux qui font le mal ╵à cause de leurs fautes.
  - type: text
    content: Je mettrai fin à l’arrogance ╵des insolents,
  - type: text
    content: je ferai tomber l’orgueil des tyrans.
  '12':
  - type: text
    content: Je rendrai les humains plus rares ╵que de l’or fin,
  - type: text
    content: plus rares que de l’or d’Ophir.
  '13':
  - type: text
    content: J’ébranlerai le ciel,
  - type: text
    content: et cette terre ╵sera secouée sur ses bases
  - type: text
    content: par la fureur de l’Eternel, ╵le Seigneur des armées célestes,
  - type: text
    content: au jour où il déchaînera ╵son ardente colère.
  '14':
  - type: text
    content: Les gens seront, en ce jour-là, ╵pareils à des gazelles ╵que l’on poursuit,
  - type: text
    content: ou comme des brebis perdues.
  - type: text
    content: Chacun s’en retournera chez les siens,
  - type: text
    content: chacun fuira vers son pays.
  '15':
  - type: text
    content: Tous ceux que l’on rencontrera ╵seront percés de flèches,
  - type: text
    content: et tous ceux que l’on saisira ╵tomberont par l’épée.
  '16':
  - type: text
    content: Leurs petits enfants seront écrasés ╵sous leurs regards,
  - type: text
    content: leurs maisons seront mises à sac
  - type: text
    content: et leurs femmes violées.
  '17':
  - type: text
    content: Car je vais susciter ╵contre eux les Mèdes
  - type: note
    content: Peuple voisin des Perses qui, au temps d’Esaïe, commençait à harasser les Assyriens. Il participa à la prise de Ninive en 612 av. J.-C.
  - type: text
    content: qui ne font pas cas de l’argent
  - type: text
    content: et qui font fi de l’or.
  '18':
  - type: text
    content: Avec leurs arcs, ╵ils abattront les jeunes gens,
  - type: text
    content: ils n’épargneront pas ╵les nouveau-nés
  - type: text
    content: et seront sans pitié ╵pour les enfants.
  '19':
  - type: text
    content: Et Babylone, ╵le joyau des royaumes,
  - type: text
    content: cité splendide ╵qui faisait la fierté des Chaldéens,
  - type: text
    content: deviendra semblable à Sodome ╵et à Gomorrhe
  - type: note
    content: Voir Gn 18.20 ; 19.
  - type: text
    content: ' ╵que Dieu a renversées.'
  '2':
  - type: text
    content: Sur un mont dénudé, ╵dressez un étendard,
  - type: text
    content: poussez des cris
  - type: text
    content: et agitez la main !
  - type: text
    content: Que l’on franchisse ╵les portes des seigneurs !
  '20':
  - type: text
    content: Car Babylone ne sera ╵plus jamais habitée
  - type: text
    content: et plus jamais peuplée
  - type: text
    content: dans toutes les générations.
  - type: text
    content: Et même les nomades ╵n’y dresseront jamais leur tente,
  - type: text
    content: et nul berger ╵n’y fera reposer ses bêtes.
  '21':
  - type: text
    content: Les chats sauvages ╵chercheront abri dans ses ruines ;
  - type: text
    content: ses maisons ╵seront hantées par les hiboux,
  - type: text
    content: les autruches ╵y établiront leur demeure
  - type: text
    content: et les boucs viendront ╵y prendre leurs ébats
  - type: note
    content: Voir Es 34.14 ; So 2.14 ; Ap 18.2.
  - type: text
    content: ','
  '22':
  - type: text
    content: les chats sauvages ╵s’appelleront dans ses châteaux,
  - type: text
    content: et les chacals ╵viendront hurler dans ses palais.
  - type: text
    content: Son heure approche,
  - type: text
    content: et ses jours ne seront pas prolongés.
  '3':
  - type: text
    content: Moi, j’ai donné mes ordres ╵à des milices ╵à qui j’ai fait appel,
  - type: text
    content: j’ai convoqué mes braves, ╵agents de ma colère,
  - type: text
    content: qui se réjouissent de ma gloire.
  '4':
  - type: text
    content: 'C’est le bruit d’une foule ╵sur les montagnes :'
  - type: text
    content: on dirait un grand peuple.
  - type: text
    content: On entend le tumulte de royaumes, ╵de nations rassemblées.
  - type: text
    content: Le Seigneur des armées célestes ╵passe en revue
  - type: text
    content: ses troupes de combat.
  '5':
  - type: text
    content: Ils viennent de très loin,
  - type: text
    content: du bout de l’horizon,
  - type: text
    content: l’Eternel et les troupes ╵dont il se servira ╵dans son indignation
  - type: text
    content: pour dévaster tout le pays.
  '6':
  - type: text
    content: Poussez donc des cris de détresse, ╵car il se rapproche à grands pas, ╵le jour de l’Eternel,
  - type: text
    content: comme un fléau dévastateur ╵déchaîné par le Tout-Puissant
  - type: note
    content: Voir Jl 1.15.
  - type: text
    content: .
  '7':
  - type: text
    content: C’est pourquoi tous les bras s’affaibliront
  - type: text
    content: et tout le monde ╵perdra courage.
  '8':
  - type: text
    content: Ils seront frappés d’épouvante,
  - type: text
    content: ils seront saisis de douleurs, ╵accablés de souffrances ╵comme une femme qui enfante.
  - type: text
    content: Ils se regarderont ╵avec stupeur les uns les autres,
  - type: text
    content: le visage embrasé.
  '9':
  - type: text
    content: Voici venir ╵le jour de l’Eternel,
  - type: text
    content: ce jour impitoyable, ╵jour de fureur ╵et d’ardente colère
  - type: text
    content: qui réduira la terre ╵en un désert,
  - type: text
    content: et en exterminera les pécheurs
  - type: note
    content: Pour les v. 9-10,13, voir Jl 2.10-11 ; 3.4-5 ; 4.14-16.
  - type: text
    content: .
