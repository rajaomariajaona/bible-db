document_id: JOB.9
type_code: fra
segments:
- type: usfm
  marker: ms1
  children:
  - type: text
    text: Réponse de Job à Bildad
  marker-yv: yv-h
- type: usfm
  marker: s1
  children:
  - type: text
    text: Dieu est le plus fort
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Alors Job prit la parole et dit :'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Oui, certes, je le sais, ╵il en est bien ainsi :'
- type: usfm
  marker: q1
  children:
  - type: text
    text: comment un homme ╵serait-il juste devant Dieu
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '9.2 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Autre traduction : '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: aurait-il gain de cause dans un contentieux avec Dieu ?
    marker-yv: yv-n
  - type: text
    text: '  ?'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Qui donc s’aviserait ╵de plaider contre lui ?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Même une fois sur mille, ╵il ne pourra répondre
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '9.3 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Autre traduction : '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: Dieu ne lui répondra pas.
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Dieu est riche en sagesse, ╵et puissante est sa force.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Qui pourrait le braver ╵et s’en sortir indemne ?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Lui qui déplace les montagnes ╵sans qu’elles ne s’en doutent
- type: usfm
  marker: q1
  children:
  - type: text
    text: et les renverse en sa colère,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'il fait trembler la terre ╵jusqu’en ses fondations :'
- type: usfm
  marker: q1
  children:
  - type: text
    text: ses colonnes chancellent.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Il ordonne au soleil ╵de ne pas se lever
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '9.7 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Eclipse ou obscurcissement par des nuages.
    marker-yv: yv-n
  - type: text
    text: ','
- type: usfm
  marker: q1
  children:
  - type: text
    text: et met sous scellés les étoiles.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Lui seul déploie le ciel
- type: usfm
  marker: q1
  children:
  - type: text
    text: et marche sur la mer, ╵sur ses plus hautes vagues.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Il a fait la Grande Ourse, ╵Orion et les Pléiades
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '9.9 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Constellations mentionnées aussi en '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 38.31-32
        metadata:
          usfm: JOB.38.31+JOB.38.32
      - type: text
        text: ', les deux dernières dans '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Am 5.8
        metadata:
          usfm: AMO.5.8
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: ','
- type: usfm
  marker: q1
  children:
  - type: text
    text: et les constellations australes.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Il accomplit des œuvres ╵grandioses, insondables,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et des prodiges innombrables
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '9.10 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Reprise de l’affirmation d’Eliphaz en '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '5.9'
        metadata:
          usfm: JOB.5.9
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: S’il passait près de moi, ╵je ne le verrais pas,
- type: usfm
  marker: q1
  children:
  - type: text
    text: puis il s’éloignerait, ╵je ne m’en apercevrais pas.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Qui peut lui retirer ╵la proie qu’il prend de force ?
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Qui osera lui dire : ╵« Que fais-tu là ? »'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Dieu ne retient pas sa colère.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et devant lui s’effondrent ╵tous les appuis de l’orgueilleux
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '9.13 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'D’autres comprennent : '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: les alliés du monstre des mers.
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Combien moins oserais-je ╵lui donner la réplique,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et quels mots choisirais-je ╵pour plaider avec lui ?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Même si je suis juste, ╵je ne peux rien répondre.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Je ne puis qu’implorer ╵la pitié de mon juge.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Si même, à mon appel, ╵il daignait me répondre,
- type: usfm
  marker: q1
  children:
  - type: text
    text: je ne pourrais quand même ╵pas croire qu’il m’écoute,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: car il m’a assailli ╵par un vent de tempête,
- type: usfm
  marker: q1
  children:
  - type: text
    text: il a multiplié ╵mes blessures sans cause.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Il ne me permet pas ╵de reprendre mon souffle,
- type: usfm
  marker: q1
  children:
  - type: text
    text: tant il me rassasie de fiel.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Recourir à la force ? ╵Mais il est le plus fort.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ou faire appel au droit ? ╵Qui donc l’assignera
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '9.19 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'D’après l’ancienne version grecque ; le texte hébreu traditionnel a : '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: me fera comparaître.
    marker-yv: yv-n
  - type: text
    text: '  ?'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Si j’étais juste, ╵ma bouche même me condamnerait.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Si j’étais innocent, ╵ma bouche me donnerait tort.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Suis-je vraiment intègre ? ╵Je ne sais où j’en suis :'
- type: usfm
  marker: q1
  children:
  - type: text
    text: je méprise ma vie.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Que m’importe, après tout ! ╵C’est pourquoi j’ose dire :'
- type: usfm
  marker: q1
  children:
  - type: text
    text: « Il détruit aussi bien ╵l’innocent que l’impie. »
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: Quand survient un fléau ╵qui tue soudainement,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Dieu se rit des épreuves ╵qui atteignent les justes.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: Quand il livre un pays ╵au pouvoir des méchants,
- type: usfm
  marker: q1
  children:
  - type: text
    text: il en aveugle tous les juges.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et si ce n’est pas lui, ╵alors, qui est-ce donc ?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: Mes jours ont fui plus vite ╵qu’un agile coureur,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ils se sont écoulés, ╵mais sans voir le bonheur,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: ils ont glissé, rapides ╵comme un esquif de jonc
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '9.26 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Allusion aux embarcations égyptiennes faites de tiges de papyrus ou de jonc tressées (
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ex 2.3
        metadata:
          usfm: EXO.2.3
      - type: text
        text: ).
    marker-yv: yv-n
  - type: text
    text: ','
- type: usfm
  marker: q1
  children:
  - type: text
    text: comme le vol d’un aigle ╵qui fonce sur sa proie.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'Si même je me dis : ╵« Laisse donc de côté ta plainte,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: va, change de visage, ╵ressaisis-toi ! »,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: je redoute tous mes tourments
- type: usfm
  marker: q1
  children:
  - type: text
    text: car je sais bien ╵que tu ne me traiteras pas ╵en innocent.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: Je serai tenu pour coupable !
- type: usfm
  marker: q1
  children:
  - type: text
    text: Alors, pourquoi devrais-je ╵me donner tant de peine en vain ?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: J’aurais beau me laver ╵avec de l’eau de neige,
- type: usfm
  marker: q1
  children:
  - type: text
    text: oui, j’aurais beau me nettoyer ╵les mains avec de la potasse
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '9.30 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Ou : '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'de la soude. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Ou bien il pourrait encore s’agir d’une plante utilisée pour nettoyer.
    marker-yv: yv-n
  - type: text
    text: ','
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: toi tu me plongerais ╵dans un bourbier fangeux
- type: usfm
  marker: q1
  children:
  - type: text
    text: pour que mes habits mêmes ╵me prennent en horreur.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: Car il n’est pas ╵un homme comme moi, ╵pour que je lui réplique
- type: usfm
  marker: q1
  children:
  - type: text
    text: ou pour que nous comparaissions ╵ensemble au tribunal.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: Il n’y a pas
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '9.33 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Certains manuscrits hébreux, l’ancienne version grecque et la version syriaque ont compris : '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: au moins s’il y avait.
    marker-yv: yv-n
  - type: text
    text: ' d’arbitre ╵pouvant s’interposer'
- type: usfm
  marker: q1
  children:
  - type: text
    text: et trancher entre nous,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: qui détournerait de moi son bâton
- type: usfm
  marker: q1
  children:
  - type: text
    text: pour que les terreurs qu’il me cause ╵ne m’épouvantent plus !
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: Alors je parlerai ╵sans avoir peur de lui.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Mais ce n’est pas le cas, ╵je suis tout seul avec moi-même !
