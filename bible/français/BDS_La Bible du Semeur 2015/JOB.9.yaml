document_id: JOB.9,21
type_code: fra
verses:
  '1':
  - type: heading
    content: Réponse de Job à Bildad
  - type: heading
    content: Dieu est le plus fort
  - type: text
    content: 'Alors Job prit la parole et dit :'
  '10':
  - type: text
    content: Il accomplit des œuvres ╵grandioses, insondables,
  - type: text
    content: et des prodiges innombrables
  - type: note
    content: Reprise de l’affirmation d’Eliphaz en 5.9.
  - type: text
    content: .
  '11':
  - type: text
    content: S’il passait près de moi, ╵je ne le verrais pas,
  - type: text
    content: puis il s’éloignerait, ╵je ne m’en apercevrais pas.
  '12':
  - type: text
    content: Qui peut lui retirer ╵la proie qu’il prend de force ?
  - type: text
    content: 'Qui osera lui dire : ╵« Que fais-tu là ? »'
  '13':
  - type: text
    content: Dieu ne retient pas sa colère.
  - type: text
    content: Et devant lui s’effondrent ╵tous les appuis de l’orgueilleux
  - type: note
    content: 'D’autres comprennent : les alliés du monstre des mers.'
  - type: text
    content: .
  '14':
  - type: text
    content: Combien moins oserais-je ╵lui donner la réplique,
  - type: text
    content: et quels mots choisirais-je ╵pour plaider avec lui ?
  '15':
  - type: text
    content: Même si je suis juste, ╵je ne peux rien répondre.
  - type: text
    content: Je ne puis qu’implorer ╵la pitié de mon juge.
  '16':
  - type: text
    content: Si même, à mon appel, ╵il daignait me répondre,
  - type: text
    content: je ne pourrais quand même ╵pas croire qu’il m’écoute,
  '17':
  - type: text
    content: car il m’a assailli ╵par un vent de tempête,
  - type: text
    content: il a multiplié ╵mes blessures sans cause.
  '18':
  - type: text
    content: Il ne me permet pas ╵de reprendre mon souffle,
  - type: text
    content: tant il me rassasie de fiel.
  '19':
  - type: text
    content: Recourir à la force ? ╵Mais il est le plus fort.
  - type: text
    content: Ou faire appel au droit ? ╵Qui donc l’assignera
  - type: note
    content: 'D’après l’ancienne version grecque ; le texte hébreu traditionnel a : me fera comparaître.'
  - type: text
    content: '  ?'
  '2':
  - type: text
    content: 'Oui, certes, je le sais, ╵il en est bien ainsi :'
  - type: text
    content: comment un homme ╵serait-il juste devant Dieu
  - type: note
    content: 'Autre traduction : aurait-il gain de cause dans un contentieux avec Dieu ?'
  - type: text
    content: '  ?'
  '20':
  - type: text
    content: Si j’étais juste, ╵ma bouche même me condamnerait.
  - type: text
    content: Si j’étais innocent, ╵ma bouche me donnerait tort.
  '21':
  - type: text
    content: 'Suis-je vraiment intègre ? ╵Je ne sais où j’en suis :'
  - type: text
    content: je méprise ma vie.
  '22':
  - type: text
    content: 'Que m’importe, après tout ! ╵C’est pourquoi j’ose dire :'
  - type: text
    content: « Il détruit aussi bien ╵l’innocent que l’impie. »
  '23':
  - type: text
    content: Quand survient un fléau ╵qui tue soudainement,
  - type: text
    content: Dieu se rit des épreuves ╵qui atteignent les justes.
  '24':
  - type: text
    content: Quand il livre un pays ╵au pouvoir des méchants,
  - type: text
    content: il en aveugle tous les juges.
  - type: text
    content: Et si ce n’est pas lui, ╵alors, qui est-ce donc ?
  '25':
  - type: text
    content: Mes jours ont fui plus vite ╵qu’un agile coureur,
  - type: text
    content: ils se sont écoulés, ╵mais sans voir le bonheur,
  '26':
  - type: text
    content: ils ont glissé, rapides ╵comme un esquif de jonc
  - type: note
    content: Allusion aux embarcations égyptiennes faites de tiges de papyrus ou de jonc tressées (Ex 2.3).
  - type: text
    content: ','
  - type: text
    content: comme le vol d’un aigle ╵qui fonce sur sa proie.
  '27':
  - type: text
    content: 'Si même je me dis : ╵« Laisse donc de côté ta plainte,'
  - type: text
    content: va, change de visage, ╵ressaisis-toi ! »,
  '28':
  - type: text
    content: je redoute tous mes tourments
  - type: text
    content: car je sais bien ╵que tu ne me traiteras pas ╵en innocent.
  '29':
  - type: text
    content: Je serai tenu pour coupable !
  - type: text
    content: Alors, pourquoi devrais-je ╵me donner tant de peine en vain ?
  '3':
  - type: text
    content: Qui donc s’aviserait ╵de plaider contre lui ?
  - type: text
    content: Même une fois sur mille, ╵il ne pourra répondre
  - type: note
    content: 'Autre traduction : Dieu ne lui répondra pas.'
  - type: text
    content: .
  '30':
  - type: text
    content: J’aurais beau me laver ╵avec de l’eau de neige,
  - type: text
    content: oui, j’aurais beau me nettoyer ╵les mains avec de la potasse
  - type: note
    content: 'Ou : de la soude. Ou bien il pourrait encore s’agir d’une plante utilisée pour nettoyer.'
  - type: text
    content: ','
  '31':
  - type: text
    content: toi tu me plongerais ╵dans un bourbier fangeux
  - type: text
    content: pour que mes habits mêmes ╵me prennent en horreur.
  '32':
  - type: text
    content: Car il n’est pas ╵un homme comme moi, ╵pour que je lui réplique
  - type: text
    content: ou pour que nous comparaissions ╵ensemble au tribunal.
  '33':
  - type: text
    content: Il n’y a pas
  - type: note
    content: 'Certains manuscrits hébreux, l’ancienne version grecque et la version syriaque ont compris : au moins s’il y avait.'
  - type: text
    content: ' d’arbitre ╵pouvant s’interposer'
  - type: text
    content: et trancher entre nous,
  '34':
  - type: text
    content: qui détournerait de moi son bâton
  - type: text
    content: pour que les terreurs qu’il me cause ╵ne m’épouvantent plus !
  '35':
  - type: text
    content: Alors je parlerai ╵sans avoir peur de lui.
  - type: text
    content: Mais ce n’est pas le cas, ╵je suis tout seul avec moi-même !
  '4':
  - type: text
    content: Dieu est riche en sagesse, ╵et puissante est sa force.
  - type: text
    content: Qui pourrait le braver ╵et s’en sortir indemne ?
  '5':
  - type: text
    content: Lui qui déplace les montagnes ╵sans qu’elles ne s’en doutent
  - type: text
    content: et les renverse en sa colère,
  '6':
  - type: text
    content: 'il fait trembler la terre ╵jusqu’en ses fondations :'
  - type: text
    content: ses colonnes chancellent.
  '7':
  - type: text
    content: Il ordonne au soleil ╵de ne pas se lever
  - type: note
    content: Eclipse ou obscurcissement par des nuages.
  - type: text
    content: ','
  - type: text
    content: et met sous scellés les étoiles.
  '8':
  - type: text
    content: Lui seul déploie le ciel
  - type: text
    content: et marche sur la mer, ╵sur ses plus hautes vagues.
  '9':
  - type: text
    content: Il a fait la Grande Ourse, ╵Orion et les Pléiades
  - type: note
    content: Constellations mentionnées aussi en 38.31-32, les deux dernières dans Am 5.8.
  - type: text
    content: ','
  - type: text
    content: et les constellations australes.
