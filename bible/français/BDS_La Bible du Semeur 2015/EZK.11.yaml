document_id: EZK.11,21
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s2
    children:
    - type: text
      text: 'Jérusalem : une marmite'
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Alors l’Esprit me souleva et me transporta à la porte orientale du temple de l’Eternel, c’est-à-dire à celle qui fait face au soleil levant. A l’entrée de la porte, je vis vingt-cinq hommes qui se tenaient là, et au milieu d’eux, deux chefs du peuple : Yaazania, fils d’Azzour, et Pelatia, fils de Benaya. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'Vous tomberez victimes de l’épée. C’est sur le territoire du pays d’Israël que je vous jugerai, et vous reconnaîtrez que je suis l’Eternel. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'La ville ne sera pas une marmite pour vous et vous ne serez pas la viande au-dedans d’elle. Et je vous jugerai à l’intérieur du territoire d’Israël. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: Et vous reconnaîtrez que je suis l’Eternel, moi, dont vous n’avez pas suivi les lois ni appliqué le droit, tandis que vous avez adopté les coutumes des peuples d’alentour.
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: Pendant que je prophétisais, Pelatia
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '11.13 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Pelatia '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'signifie : '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'les rescapés appartenant à Dieu. '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Il représente les Israélites qui ont échappé à la déportation. Sa mort subite est le gage de l’accomplissement des menaces de Dieu.
      marker-yv: yv-n
    - type: text
      text: ', fils de Benaya, mourut. Alors, je tombai sur ma face, et je m’écriai d’une voix forte : Ah ! Seigneur Eternel, vas-tu exterminer ce qui reste d’Israël ?'
  - type: usfm
    marker: s2
    children:
    - type: text
      text: Promesse d’une nouvelle alliance
    marker-yv: yv-h
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'L’Eternel m’adressa la parole et me dit :'
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'Fils d’homme, c’est à tes compatriotes, et aux gens de ton peuple, et à tous ceux qui font partie de la communauté d’Israël, que les gens de Jérusalem déclarent : « Restez loin de l’Eternel, car c’est à nous que le pays est accordé en possession. » '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'C’est pourquoi tu diras : « Voici ce que déclare le Seigneur, l’Eternel : Je les ai éloignés au milieu de peuples étrangers, je les ai dispersés dans des pays étrangers. Cependant, je serai pour eux pendant quelque temps un sanctuaire dans ces pays où ils se sont rendus. » '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'Dis-leur donc : « Le Seigneur, l’Eternel, vous déclare : Je vous rassemblerai du milieu des peuples, je vous recueillerai des pays étrangers dans lesquels vous avez été dispersés, et je vous donnerai le pays d’Israël. » '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'Alors ils y viendront et ils en ôteront tous les objets abominables et toutes les idoles abjectes. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: Je leur donnerai un cœur qui me sera entièrement dévoué et je mettrai en eux un esprit nouveau, j’ôterai de leur être leur cœur dur comme la pierre, et je leur donnerai un cœur de chair
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '11.19 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: un cœur qui me sera entièrement dévoué
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: ': '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'l’ancienne version grecque porte : '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'un autre cœur. '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'La différence provient de la confusion entre deux lettres de l’hébreu très ressemblantes. Les v. 19-20 sont repris en '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: 36.26-28
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: ', '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'L’Esprit de Dieu me dit : Fils d’homme, voilà les gens qui trament le mal et qui donnent de mauvais conseils dans cette ville. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: afin qu’ils vivent selon mes ordonnances, qu’ils obéissent à mes lois, et les appliquent. Ils seront mon peuple, et je serai leur Dieu
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '11.20 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Formule de l’alliance (voir Ex 19.5-6 ; 20.2).
      marker-yv: yv-n
    - type: text
      text: '. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: Quant à ceux dont le cœur s’attache à leurs idoles, qui continuent à suivre leurs abominations, je ferai retomber sur eux ce que mérite leur conduite. C’est là ce que déclare le Seigneur, l’Eternel.
  - type: usfm
    marker: s2
    children:
    - type: text
      text: La gloire quitte la ville
    marker-yv: yv-h
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: 'A ce moment, les chérubins déployèrent leurs ailes et les roues se mirent en mouvement avec eux. La gloire de Dieu était au-dessus d’eux, tout en haut. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: Ensuite, la gloire de Dieu s’éleva du milieu de la ville et se tint sur le mont qui se trouve à l’est de Jérusalem
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '11.23 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Voir '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: '8.4'
        - type: text
          text: ' et note. Il s’agit du mont des Oliviers. Pour le retour de la gloire, voir '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: '43.2'
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: '. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: 'Alors l’Esprit me souleva et me ramena en Chaldée auprès des exilés. Cela se passait dans la vision donnée par l’Esprit de Dieu, et la vision qui m’avait été accordée s’éleva au-dessus de moi… '
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: Je racontai aux déportés tout ce que l’Eternel m’avait fait voir.
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'Ils disent : « Le malheur n’est pas si proche ! Bâtissons des maisons'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '11.3 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Le malheur n’est pas… maisons
      - type: usfm
        marker: fq
        children:
        - type: text
          text: '! '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Autres traductions : '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'le moment de bâtir des maisons n’est-il pas bientôt arrivé ? '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'ou '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: ce n’est pas le moment de bâtir des maisons !
      marker-yv: yv-n
    - type: text
      text: '  ! Cette ville est comme une marmite et nous sommes comme de la viande. » '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: C’est pourquoi prophétise contre eux, prophétise, fils d’homme !
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'L’Esprit de l’Eternel tomba sur moi et me dit d’apporter le message suivant :'
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ainsi parle l’Eternel : Je sais ce que vous dites, vous, communauté d’Israël, je connais les pensées que nourrit votre esprit. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'Vous avez commis tant de meurtres que les rues de la ville sont remplies de cadavres. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'C’est pourquoi le Seigneur, l’Eternel, parle ainsi : La ville est bien une marmite, mais quelle en est la viande ? Ce sont les corps de vos victimes étendus dans la ville ! Mais vous, on vous en fera sortir. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'Vous redoutez l’épée, eh bien, moi, je ferai venir l’épée contre vous, c’est là ce que déclare le Seigneur, l’Eternel. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'Je vous ferai sortir de la ville et je vous livrerai à des étrangers et j’exécuterai ainsi mes jugements contre vous. '
