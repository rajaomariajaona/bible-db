document_id: 2SA.8,21
type_code: fra
verses:
  '1':
  - type: heading
    content: David soumet les peuples voisins
  - type: heading
    content: (1 Ch 18.1-13)
  - type: text
    content: 'Par la suite, David vainquit les Philistins et les humilia ; il leur arracha leur capitale. '
  '10':
  - type: text
    content: 'il lui envoya son fils Yoram pour lui transmettre ses salutations et ses félicitations d’avoir attaqué et vaincu Hadadézer avec lequel Toï avait été continuellement en guerre. Yoram apporta avec lui toutes sortes d’objets d’argent, d’or et de bronze. '
  '11':
  - type: text
    content: 'Le roi David les consacra à l’Eternel, comme il avait consacré l’argent et l’or des peuples qu’il avait vaincus, '
  '12':
  - type: text
    content: c’est-à-dire des Edomites
  - type: note
    content: 'D’après certains manuscrits hébreux, l’ancienne version grecque, la version syriaque et 1 Ch 18.11. La plupart des manuscrits hébreux ont : Syriens.'
  - type: text
    content: ', des Moabites, des Ammonites, des Philistins et des Amalécites, ainsi que tout le butin enlevé à Hadadézer, fils de Rehob et roi de Tsoba.'
  '13':
  - type: text
    content: David devint encore plus célèbre après son retour d’une campagne où il avait battu dix-huit mille Edomites
  - type: note
    content: 'D’après certains manuscrits hébreux, l’ancienne version grecque, la version syriaque et 1 Ch 18.12. La plupart des manuscrits hébreux ont : Syriens.'
  - type: text
    content: ' dans la vallée du Sel'
  - type: note
    content: Au sud de la mer Morte, vers le golfe d’Aqaba.
  - type: text
    content: '. '
  '14':
  - type: text
    content: Après cela, il établit des garnisons
  - type: note
    content: 'Autre traduction : préfets.'
  - type: text
    content: ' en Edom, dans tout le pays, et tous les Edomites lui furent assujettis. L’Eternel donnait la victoire à David dans toutes ses campagnes militaires.'
  - type: heading
    content: Les hauts fonctionnaires de David
  - type: heading
    content: (1 Ch 18.14-17)
  '15':
  - type: text
    content: 'David régna sur tout Israël ; il administrait le droit et rendait la justice pour tout son peuple. '
  '16':
  - type: text
    content: Joab, fils de Tserouya
  - type: note
    content: Neveu de David (voir 2.13 et note).
  - type: text
    content: ', était à la tête de l’armée ; Josaphat, fils d’Ahiloud, était archiviste ; '
  '17':
  - type: text
    content: Tsadoq, fils d’Ahitoub
  - type: note
    content: Descendant d’Eléazar, fils d’Aaron (voir 1 Ch 6.35-38 ; 24.1-3). Tsadoq restera fidèle à David durant tout son règne (15.24-29 ; 17.15-16 ; 19.12) et donnera l’onction à Salomon comme successeur du roi (1 R 1.8, 45 ; 2.35 ; 4.4).
  - type: text
    content: ', et Abiatar, fils d’Ahimélek'
  - type: note
    content: 'Selon la version syriaque (voir 1 S 22.20 ; 23.6 ; 30.7), le texte hébreu traditionnel a : Ahimélek, fils d’Abiatar.'
  - type: text
    content: ', étaient prêtres ; Seraya était secrétaire. '
  '18':
  - type: text
    content: Benaya, fils de Yehoyada, commandait les Kérétiens et les Pélétiens
  - type: note
    content: Les Kérétiens et les Pélétiens étaient des mercenaires étrangers, les premiers originaires de Crète, les seconds probablement de Philistie. Ils sont souvent mentionnés comme gardes royaux (15.18 ; 20.7 ; 1 R 1.38, 44  ; voir 1 S 30.14).
  - type: text
    content: ', tandis que les fils de David étaient ses administrateurs'
  - type: note
    content: 'Le texte hébreu traditionnel a : prêtres. Les deux mots se ressemblent en hébreu. Les fils de David, n’étant pas des descendants d’Aaron, ne pouvaient être prêtres.'
  - type: text
    content: .
  '2':
  - type: text
    content: Il battit aussi les Moabites
  - type: note
    content: Descendants de Loth (Gn 19.37) qui occupaient le territoire à l’est de la mer Morte. Saül les avait déjà combattus (1 S 14.47). David y avait placé ses parents (1 S 22.3-4) pendant son exil, étant lui-même descendant d’une Moabite (voir Rt 1.22 ; 4.22).
  - type: text
    content: '. Il fit coucher les prisonniers par terre et les mesura au cordeau. Il fit mettre à mort deux longueurs de cordeau d’hommes sur trois et accorda la vie sauve aux autres. Ainsi, les Moabites furent assujettis à David et lui payèrent un tribut. '
  '3':
  - type: text
    content: Puis David battit Hadadézer, fils de Rehob et roi de Tsoba
  - type: note
    content: Royaume syrien situé au nord de Damas entre le Liban et l’Anti-Liban, sur la frontière nord d’Israël. Saül l’avait déjà combattu (1 S 14.47).
  - type: text
    content: ', pendant qu’il était en campagne pour rétablir sa domination sur le Haut-Euphrate. '
  '4':
  - type: text
    content: David lui captura un « millier »
  - type: note
    content: Voir note 2 S 6.1.
  - type: text
    content: ' de chars, sept « milliers »'
  - type: note
    content: 'D’après le manuscrit hébreu de Qumrân et 1 Ch 18.4  ; le texte hébreu traditionnel a : mille sept cents.'
  - type: text
    content: ' de soldats sur char et vingt « milliers » de fantassins. Il conserva une centaine de chevaux d’attelage et fit couper les jarrets à tous les autres.'
  '5':
  - type: text
    content: 'Les Syriens de Damas envoyèrent du secours à Hadadézer, roi de Tsoba, mais David battit également les Syriens au nombre de vingt-deux mille hommes. '
  '6':
  - type: text
    content: Puis il installa des garnisons
  - type: note
    content: 'Autre traduction : préfets.'
  - type: text
    content: ' sur le territoire syrien de Damas, et les Syriens lui furent assujettis et durent lui payer un tribut. Ainsi l’Eternel accorda la victoire à David dans toutes ses campagnes militaires. '
  '7':
  - type: text
    content: 'David s’empara des boucliers d’or que portaient les soldats de Hadadézer et il les fit porter à Jérusalem. '
  '8':
  - type: text
    content: A Bétah
  - type: note
    content: 'Certains manuscrits de l’ancienne version grecque et 1 Ch 18.8 ont : Tébah.'
  - type: text
    content: ' et à Bérotaï, villes du roi Hadadézer, il enleva une énorme quantité de bronze.'
  '9':
  - type: text
    content: Lorsque Toï, le roi de Hamath
  - type: note
    content: Grande ville sur l’Oronte (Es 10.9 ; Za 9.2), appelée Epiphania par les Grecs.
  - type: text
    content: ', apprit que David avait défait toute l’armée de Hadadézer, '
