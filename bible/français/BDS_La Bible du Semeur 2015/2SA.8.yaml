document_id: 2SA.8
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: David soumet les peuples voisins
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: (1 Ch 18.1-13)
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Par la suite, David vainquit les Philistins et les humilia ; il leur arracha leur capitale. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Il battit aussi les Moabites
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '8.2 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Descendants de Loth (
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Gn 19.37
        metadata:
          usfm: GEN.19.37
      - type: text
        text: ) qui occupaient le territoire à l’est de la mer Morte. Saül les avait déjà combattus (
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1 S 14.47
        metadata:
          usfm: 1SA.14.47
      - type: text
        text: ). David y avait placé ses parents (
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1 S 22.3-4
        metadata:
          usfm: 1SA.22.3+1SA.22.4
      - type: text
        text: ) pendant son exil, étant lui-même descendant d’une Moabite (voir Rt 1.22 ; 4.22).
    marker-yv: yv-n
  - type: text
    text: '. Il fit coucher les prisonniers par terre et les mesura au cordeau. Il fit mettre à mort deux longueurs de cordeau d’hommes sur trois et accorda la vie sauve aux autres. Ainsi, les Moabites furent assujettis à David et lui payèrent un tribut. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Puis David battit Hadadézer, fils de Rehob et roi de Tsoba
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '8.3 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Royaume syrien situé au nord de Damas entre le Liban et l’Anti-Liban, sur la frontière nord d’Israël. Saül l’avait déjà combattu (
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1 S 14.47
        metadata:
          usfm: 1SA.14.47
      - type: text
        text: ).
    marker-yv: yv-n
  - type: text
    text: ', pendant qu’il était en campagne pour rétablir sa domination sur le Haut-Euphrate. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: David lui captura un « millier »
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '8.4 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Voir note '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 2 S 6.1
        metadata:
          usfm: 2SA.6.1
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: ' de chars, sept « milliers »'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '8.4 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'D’après le manuscrit hébreu de Qumrân et '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1 Ch 18.4
        metadata:
          usfm: 1CH.18.4
      - type: text
        text: '  ; le texte hébreu traditionnel a : '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: mille sept cents.
    marker-yv: yv-n
  - type: text
    text: ' de soldats sur char et vingt « milliers » de fantassins. Il conserva une centaine de chevaux d’attelage et fit couper les jarrets à tous les autres.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Les Syriens de Damas envoyèrent du secours à Hadadézer, roi de Tsoba, mais David battit également les Syriens au nombre de vingt-deux mille hommes. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Puis il installa des garnisons
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '8.6 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Autre traduction : '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: préfets.
    marker-yv: yv-n
  - type: text
    text: ' sur le territoire syrien de Damas, et les Syriens lui furent assujettis et durent lui payer un tribut. Ainsi l’Eternel accorda la victoire à David dans toutes ses campagnes militaires. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'David s’empara des boucliers d’or que portaient les soldats de Hadadézer et il les fit porter à Jérusalem. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: A Bétah
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '8.8 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Certains manuscrits de l’ancienne version grecque et '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1 Ch 18.8
        metadata:
          usfm: 1CH.18.8
      - type: text
        text: ' ont : '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: Tébah.
    marker-yv: yv-n
  - type: text
    text: ' et à Bérotaï, villes du roi Hadadézer, il enleva une énorme quantité de bronze.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Lorsque Toï, le roi de Hamath
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '8.9 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Grande ville sur l’Oronte (Es 10.9 ; Za 9.2), appelée Epiphania par les Grecs.
    marker-yv: yv-n
  - type: text
    text: ', apprit que David avait défait toute l’armée de Hadadézer, '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'il lui envoya son fils Yoram pour lui transmettre ses salutations et ses félicitations d’avoir attaqué et vaincu Hadadézer avec lequel Toï avait été continuellement en guerre. Yoram apporta avec lui toutes sortes d’objets d’argent, d’or et de bronze. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Le roi David les consacra à l’Eternel, comme il avait consacré l’argent et l’or des peuples qu’il avait vaincus, '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: c’est-à-dire des Edomites
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '8.12 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'D’après certains manuscrits hébreux, l’ancienne version grecque, la version syriaque et '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1 Ch 18.11
        metadata:
          usfm: 1CH.18.11
      - type: text
        text: '. La plupart des manuscrits hébreux ont : '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: Syriens.
    marker-yv: yv-n
  - type: text
    text: ', des Moabites, des Ammonites, des Philistins et des Amalécites, ainsi que tout le butin enlevé à Hadadézer, fils de Rehob et roi de Tsoba.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: David devint encore plus célèbre après son retour d’une campagne où il avait battu dix-huit mille Edomites
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '8.13 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'D’après certains manuscrits hébreux, l’ancienne version grecque, la version syriaque et '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1 Ch 18.12
        metadata:
          usfm: 1CH.18.12
      - type: text
        text: '. La plupart des manuscrits hébreux ont : '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: Syriens.
    marker-yv: yv-n
  - type: text
    text: ' dans la vallée du Sel'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '8.13 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Au sud de la mer Morte, vers le golfe d’Aqaba.
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Après cela, il établit des garnisons
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '8.14 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Autre traduction : '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: préfets.
    marker-yv: yv-n
  - type: text
    text: ' en Edom, dans tout le pays, et tous les Edomites lui furent assujettis. L’Eternel donnait la victoire à David dans toutes ses campagnes militaires.'
- type: usfm
  marker: s1
  children:
  - type: text
    text: Les hauts fonctionnaires de David
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: (1 Ch 18.14-17)
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'David régna sur tout Israël ; il administrait le droit et rendait la justice pour tout son peuple. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Joab, fils de Tserouya
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '8.16 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Neveu de David (voir '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '2.13'
        metadata:
          usfm: 2SA.2.13
      - type: text
        text: ' et note).'
    marker-yv: yv-n
  - type: text
    text: ', était à la tête de l’armée ; Josaphat, fils d’Ahiloud, était archiviste ; '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Tsadoq, fils d’Ahitoub
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '8.17 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Descendant d’Eléazar, fils d’Aaron (voir 1 Ch 6.35-38 ; 24.1-3). Tsadoq restera fidèle à David durant tout son règne (15.24-29 ; 17.15-16 ; 19.12) et donnera l’onction à Salomon comme successeur du roi (1 R 1.8, 45 ; 2.35 ; 4.4).
    marker-yv: yv-n
  - type: text
    text: ', et Abiatar, fils d’Ahimélek'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '8.17 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Selon la version syriaque (voir 1 S 22.20 ; 23.6 ; 30.7), le texte hébreu traditionnel a : '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: Ahimélek, fils d’Abiatar.
    marker-yv: yv-n
  - type: text
    text: ', étaient prêtres ; Seraya était secrétaire. '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Benaya, fils de Yehoyada, commandait les Kérétiens et les Pélétiens
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '8.18 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Les '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'Kérétiens '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'et les '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'Pélétiens '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'étaient des mercenaires étrangers, les premiers originaires de Crète, les seconds probablement de Philistie. Ils sont souvent mentionnés comme gardes royaux (15.18 ; 20.7 ; 1 R 1.38, 44  ; voir '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1 S 30.14
        metadata:
          usfm: 1SA.30.14
      - type: text
        text: ).
    marker-yv: yv-n
  - type: text
    text: ', tandis que les fils de David étaient ses administrateurs'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '8.18 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Le texte hébreu traditionnel a : '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'prêtres. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Les deux mots se ressemblent en hébreu. Les fils de David, n’étant pas des descendants d’Aaron, ne pouvaient être prêtres.
    marker-yv: yv-n
  - type: text
    text: .
