document_id: EXO.23,21
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: La loi sur l’exercice de la justice
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: Tu ne colporteras pas de rumeur sans fondement. Ne te rends pas complice d’un méchant par un faux témoignage
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '23.1 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Voir Ex 20.16 ; Lv 19.11-12 ; Dt 5.20.
      marker-yv: yv-n
    - type: text
      text: '. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Pendant six années tu ensemenceras ta terre et tu en récolteras les produits
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '23.10 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Pour les v. 10-11, voir '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: Lv 25.1-7
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: '  ; '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: mais la septième année, tu la laisseras en jachère. Les pauvres de ton peuple mangeront ce qu’ils y trouveront et ce qu’ils laisseront nourrira les bêtes sauvages. Tu feras de même pour tes vignes et tes oliviers.
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Pendant six jours, tu feras tout ton travail, mais le septième jour, tu l’interrompras pour que ton bœuf et ton âne jouissent du repos, et que le fils de ta servante et l’étranger puissent reprendre leur souffle
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '23.12 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Voir Ex 16.23-30 ; 20.8-11 ; 31.12-17 ; 34.21 ; 35.2 ; Lv 23.3 ; Dt 5.13-14.
      marker-yv: yv-n
    - type: text
      text: .
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Vous veillerez à observer tout ce que je vous ai prescrit. Vous n’invoquerez jamais des dieux étrangers ; qu’ils ne soient même pas nommés par vous.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: La loi sur les trois grandes fêtes
    marker-yv: yv-h
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Trois fois par an, tu célébreras une fête en mon honneur. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Tu célébreras la fête des Pains sans levain. Pendant sept jours, tu mangeras des pains sans levain au temps fixé, au mois des épis
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '23.15 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Mois d’Abib ou de l’Epi, appelé plus tard Nisân, premier mois de l’année juive (
        - type: usfm
          marker: ref
          children:
          - type: text
            text: '13.4'
        - type: text
          text: ), correspondant à la première pleine lune de printemps (mars-avril).
      marker-yv: yv-n
    - type: text
      text: ', comme je te l’ai ordonné, car c’est au cours de ce mois que tu es sorti d’Egypte. Tu ne te présenteras pas devant moi les mains vides'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '23.15 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Pour les v. 15-16, voir Ex 12.14-20 ; 34.18 ; Lv 23.6-8, 15-21 ; Nb 28.17-31 ; 29.12 ; Dt 16.1-17.
      marker-yv: yv-n
    - type: text
      text: '. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Tu célébreras aussi la fête de la Moisson
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '23.16 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Appelée aussi fête des Semaines (
        - type: usfm
          marker: ref
          children:
          - type: text
            text: '34.22'
        - type: text
          text: ) – parce qu’elle était célébrée sept semaines après la Pâque – ou Pentecôte (qui signifie « cinquante jours »). Elle coïncidait avec la fin de la moisson.
      marker-yv: yv-n
    - type: text
      text: ' et des Premiers Fruits de ton travail, de ce que tu auras semé dans les champs. A la fin de l’année, tu célébreras aussi la fête de la Récolte'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '23.16 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Fête d’Automne appelée plus tard fête des Cabanes. Elle se célébrait au quinzième jour du septième mois et marquait la fin des récoltes (Dt 16.13 ; Lv 23.24).
      marker-yv: yv-n
    - type: text
      text: ', quand tu rentreras des champs le fruit de ton travail. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Trois fois l’an, tous les hommes viendront se présenter devant moi le Seigneur, l’Eternel.
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Tu ne verseras pas le sang des sacrifices qui me sont offerts sur du pain levé, et tu ne conserveras pas jusqu’au matin la graisse des animaux offerts au cours des fêtes célébrées en mon honneur. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Tu apporteras au sanctuaire de l’Eternel ton Dieu les tout premiers produits de tes récoltes
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '23.19 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Voir '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: Dt 26.2
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: . Tu ne feras pas cuire un chevreau dans le lait de sa mère
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '23.19 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Voir Ex 34.26 ; Dt 14.21. Il s’agit peut-être d’un rituel païen cananéen que les Israélites devaient se garder d’imiter (v. 33 ; '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: '34.15'
        - type: text
          text: ), ou d’une prescription symbolisant l’interdiction de mélanger la vie (lait provenant d’une femelle vivante) et la mort (chevreau), ou encore d’une manière de marquer le souci de la préservation de la vie animale (cp. Lv 22.28 ; Dt 22.6-7).
      marker-yv: yv-n
    - type: text
      text: .
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Les perspectives en vue de la conquête
    marker-yv: yv-h
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ne suis pas la majorité pour faire le mal et, si tu es appelé à témoigner dans un procès, ne te conforme pas au grand nombre pour fausser le droit. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Je vais envoyer un ange devant vous pour vous protéger en chemin et vous conduire au lieu que j’ai préparé pour vous. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Respectez-le et obéissez-lui. Ne lui résistez pas, il ne tolérerait pas votre rébellion, car il est mon représentant. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Mais si vous lui obéissez pleinement et si vous faites tout ce que je vous ai ordonné, je serai l’ennemi de vos ennemis et l’adversaire de vos adversaires. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Car mon ange marchera devant vous et vous fera entrer dans le pays des Amoréens, des Hittites, des Phéréziens, des Cananéens, des Héviens et des Yebousiens, et je les exterminerai. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Vous n’adorerez pas leurs dieux et vous ne leur rendrez pas de culte, vous n’adopterez pas leurs pratiques religieuses. Au contraire, vous renverserez leurs statues et vous mettrez en pièces leurs stèles sacrées. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Vous rendrez votre culte à l’Eternel votre Dieu. Alors je vous bénirai en vous donnant une nourriture excellente et de l’eau en abondance, et je vous préserverai des maladies. '
  '26':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Il n’y aura pas dans votre pays de femme qui avorte ou qui soit stérile. Je vous ferai parvenir à un âge avancé.
  '27':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Je sèmerai la panique devant vous, je mettrai en déroute tous les peuples chez lesquels vous entrerez, et je ferai s’enfuir tous vos ennemis devant vous. '
  '28':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'J’enverrai devant vous les frelons pour chasser les Héviens, les Cananéens et les Hittites devant vous. '
  '29':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Cependant, je ne les chasserai pas en une seule année, pour que les terres ne soient pas abandonnées et que les bêtes sauvages ne s’y multiplient pas à vos dépens. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ne favorise pas un pauvre dans un procès
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '23.3 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Voir Lv 19.15 ; Dt 16.19.
      marker-yv: yv-n
    - type: text
      text: .
  '30':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'C’est petit à petit que je les déposséderai en votre faveur, au fur et à mesure que vous deviendrez assez nombreux pour occuper le pays. '
  '31':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Je fixerai vos frontières, et votre territoire s’étendra de la mer des Roseaux à la Méditerranée qui borde le pays des Philistins
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '23.31 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Appelée en hébreu : '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: la mer des Philistins.
      marker-yv: yv-n
    - type: text
      text: ', et du désert du Sinaï à l’Euphrate, car je livrerai les habitants de cette région en votre pouvoir et vous les chasserez devant vous. '
  '32':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Vous ne contracterez pas d’alliance avec eux, ni avec leurs dieux. '
  '33':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ils ne demeureront pas dans votre pays, afin qu’ils ne vous incitent pas à pécher contre moi en vous faisant rendre un culte à leurs dieux, car vous seriez alors pris à leur piège.
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Si tu rencontres le bœuf de ton ennemi ou son âne égaré, tu ne manqueras pas de les lui ramener
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '23.4 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Pour les v. 4-5, voir '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: Dt 22.1-4
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: '. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Lorsque tu verras l’âne de celui qui te déteste succomber sous sa charge, et que tu n’auras pas envie d’aider cet homme, aide-le quand même à délester son âne.
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ne fausse pas le cours de la justice aux dépens du pauvre dans un procès
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '23.6 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Pour les v. 6-8, voir Lv 19.15 ; Dt 16.19.
      marker-yv: yv-n
    - type: text
      text: '. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ne te mêle pas d’une cause mensongère et ne cause pas la mort de l’innocent et du juste, car je ne tiendrai pas le coupable pour innocent. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Tu n’accepteras pas de pot-de-vin, car les présents aveuglent même des hommes lucides et compromettent la cause des justes.
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Tu n’opprimeras pas l’étranger qui réside dans ton pays ; vous savez vous-mêmes ce qu’éprouve un étranger, puisque vous l’avez été en Egypte
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '23.9 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Voir Ex 22.20-21 ; Lv 19.33-34 ; Dt 24.17-18 ; 27.19.
      marker-yv: yv-n
    - type: text
      text: .
  - type: usfm
    marker: s1
    children:
    - type: text
      text: La loi sur les divers sabbats
    marker-yv: yv-h
