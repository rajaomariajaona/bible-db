document_id: EZK.46,21
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s2
    children:
    - type: text
      text: Les sabbats et les nouvelles lunes
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Voici ce que déclare le Seigneur, l’Eternel : La porte orientale du parvis intérieur restera fermée les six jours de travail. Mais le sabbat et le jour de la nouvelle lune, elle sera ouverte. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Le prince sera au milieu de son peuple, entrant et sortant en même temps qu’eux.
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Lors des fêtes et des solennités, l’offrande sera de quinze kilogrammes de grains par taureau et par bélier, et, pour les agneaux, ce qu’il voudra donner ; avec chaque mesure de quinze kilogrammes de grains, on offrira trois litres et demi d’huile
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '46.11 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Littéralement : '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: un épha par taureau et par bélier… avec chaque épha de grains, on offrira un hîn d’huile.
      marker-yv: yv-n
    - type: text
      text: .
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Quand le prince offrira à l’Eternel un holocauste ou un sacrifice de communion en offrande volontaire, on lui ouvrira la porte orientale, et il offrira son holocauste et son sacrifice de communion comme il le fait le jour du sabbat. Puis il sortira, et on refermera la porte derrière lui.
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'On offrira chaque jour en holocauste à l’Eternel un agneau d’un an sans défaut. On l’offrira chaque matin. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: On y ajoutera chaque matin comme offrande deux kilogrammes et demi de fine farine que l’on pétrira avec un bon litre d’huile
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '46.14 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Littéralement : '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: un sixième d’épha de fine farine et le tiers d’un hîn d’huile pour la mouiller.
      marker-yv: yv-n
    - type: text
      text: '. C’est une offrande pour l’Eternel. Ce sont les lois fixées pour toujours pour le sacrifice perpétuel. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: On offrira chaque matin l’agneau, l’offrande et l’huile, c’est l’holocauste perpétuel.
  - type: usfm
    marker: s2
    children:
    - type: text
      text: Les droits du prince sur son patrimoine
    marker-yv: yv-h
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Voici ce que déclare le Seigneur, l’Eternel : Quand le prince fera une donation à l’un de ses fils, elle appartiendra à ce fils et passera comme patrimoine héréditaire à ses enfants. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Mais lorsqu’il fera à l’un de ses serviteurs un don pris sur son patrimoine, ce don appartiendra au serviteur jusqu’à l’année de la libération
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '46.17 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Voir '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: Lv 25.8-55
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: ' puis il reviendra au prince. Ainsi son patrimoine restera la propriété de ses fils. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Le prince ne prendra rien sur le patrimoine du peuple en le dépouillant de ses propriétés ; c’est seulement de son propre domaine qu’il donnera des parts à ses fils, afin que personne de mon peuple ne soit dispersé loin de sa propriété
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '46.18 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Comme ce fut le cas pour Achab qui déposséda Naboth de sa vigne (
        - type: usfm
          marker: ref
          children:
          - type: text
            text: 1 R 21.3-16
        - type: text
          text: ).
      marker-yv: yv-n
    - type: text
      text: .
  - type: usfm
    marker: s2
    children:
    - type: text
      text: Les cuisines du Temple
    marker-yv: yv-h
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Après cela, le personnage me fit pénétrer, par l’entrée qui est à côté de la porte nord, dans les salles saintes réservées aux prêtres. Tout au fond, du côté ouest, il y avait un emplacement '
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Le prince, venant de l’extérieur, entrera par le portique de la porte
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '46.2 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Rituellement purifiée (
        - type: usfm
          marker: ref
          children:
          - type: text
            text: '45.19'
        - type: text
          text: ). De là, le prince pouvait suivre les sacrifices offerts sur le grand autel du parvis intérieur, mais il ne lui était pas permis de pénétrer dans ce parvis.
      marker-yv: yv-n
    - type: text
      text: ' et se tiendra près du montant de la porte. Les prêtres offriront son holocauste et ses sacrifices de communion. Il se prosternera sur le seuil de la porte, puis se retirera, et la porte ne sera plus refermée avant le soir. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: et le personnage me dit que les prêtres y feraient cuire la viande des sacrifices de culpabilité et des sacrifices pour le péché, ainsi que les offrandes, afin de ne pas emporter ces aliments sur le parvis extérieur où leur contact pourrait rendre saints des membres du peuple.
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Puis il me fit sortir vers le parvis extérieur et me fit passer auprès des quatre coins du parvis, et je vis que dans chaque angle du parvis, il y avait une courette '
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: fermée
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '46.22 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: fermée
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: ': '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: terme hébreu de sens incertain.
      marker-yv: yv-n
    - type: text
      text: ', de quarante coudées de long sur trente coudées de large. Les quatre courettes avaient les mêmes dimensions. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Chacune était entourée d’une enceinte, à la base de laquelle on avait aménagé des fourneaux tout autour. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'L’homme me dit : Voici les cuisines où les serviteurs du Temple feront cuire la viande des sacrifices offerts par le peuple.'
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Les gens du peuple se prosterneront devant l’Eternel à l’entrée de cette porte, les jours de sabbat et lors des nouvelles lunes.
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Le sabbat, le prince offrira à l’Eternel en holocauste six agneaux sans défaut et un bélier sans défaut. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Il présentera comme offrande quinze kilogrammes de grains avec le bélier, et ce qu’il voudra donner comme offrande accompagnant les agneaux. L’offrande d’huile sera de trois litres et demi par quinze kilogrammes de grains
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '46.5 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Littéralement : '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: un épha de grains avec le bélier… un hîn d’huile par épha de grains.
      marker-yv: yv-n
    - type: text
      text: '. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Le jour de la nouvelle lune, il offrira un jeune taureau sans défaut, six agneaux et un bélier sans défaut. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Il joindra comme offrande quinze kilogrammes de grains pour le taureau et autant pour le bélier et, pour les agneaux, ce qu’il aura à disposition, plus trois litres et demi d’huile par quinze kilogrammes de grains
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '46.7 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Littéralement : '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: un épha de grains pour le taureau et un épha pour le bélier… plus un hîn d’huile par épha de grains.
      marker-yv: yv-n
    - type: text
      text: .
  - type: usfm
    marker: s2
    children:
    - type: text
      text: Les règles pour le prince
    marker-yv: yv-h
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Quand le prince viendra, il entrera par le portique de la porte et sortira par le même chemin. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Et quand les gens du peuple viendront devant l’Eternel lors des fêtes cultuelles, ceux qui entreront par la porte nord pour se prosterner, sortiront par la porte sud, et ceux qui entreront par la porte sud, sortiront par la porte nord. On ne repassera pas la porte par laquelle on sera entré, on sortira par la porte opposée. '
