document_id: PSA.56,21
type_code: fra
verses:
  '1':
  - type: heading
    content: Avec Dieu, plus de peur
  - type: text
    content: Au maître de chant. Sur la mélodie de « Colombe silencieuse des pays lointains
  - type: note
    content: 'Autres traductions (en changeant la ponctuation des lettres d’un des mots hébreux) : colombe des chênes lointains ou des dieux lointains. Il s’agit d’un chant dont David a utilisé la mélodie pour composer les paroles de son cantique.'
  - type: text
    content: '  ». Cantique'
  - type: note
    content: Signification incertaine.
  - type: text
    content: ' composé par David lorsqu’il fut pris par les Philistins à Gath'
  - type: note
    content: Voir 1 S 21.11-16.
  - type: text
    content: .
  '10':
  - type: text
    content: Je t’appellerai, ╵et mes ennemis ╵battront en retraite,
  - type: text
    content: alors je saurai ╵que Dieu est pour moi.
  '11':
  - type: text
    content: Je loue Dieu pour sa parole.
  - type: text
    content: Oui, pour sa parole, ╵je loue l’Eternel
  - type: note
    content: 'Autre traduction : Avec l’aide de Dieu, je le loue pour sa parole. Oui, avec l’aide de l’Eternel, je le loue pour sa parole.'
  - type: text
    content: .
  '12':
  - type: text
    content: Je mets ma confiance en lui ╵et je n’ai pas peur.
  - type: text
    content: Que pourraient me faire ╵des humains ?
  '13':
  - type: text
    content: O Dieu, je veux accomplir ╵les vœux que j’ai faits,
  - type: text
    content: et je veux t’offrir ╵ma reconnaissance
  - type: note
    content: 'ma reconnaissance: autre traduction : des sacrifices de reconnaissance.'
  - type: text
    content: .
  '14':
  - type: text
    content: Car tu m’as délivré de la mort,
  - type: text
    content: tu as préservé ╵mes pieds de la chute
  - type: text
    content: afin que je marche ╵devant toi, ô Dieu, ╵et dans la lumière ╵de la vie.
  '2':
  - type: text
    content: Aie pitié de moi, ô Dieu, ╵car on me harcèle.
  - type: text
    content: A longueur de jour, ╵on m’assaille, ╵on me persécute.
  '3':
  - type: text
    content: Oui, mes adversaires, ╵à longueur de jour, ╵me harcèlent !
  - type: text
    content: Car ils sont nombreux ╵ceux qui me combattent ╵avec arrogance
  - type: note
    content: 'Autres traductions : me combattent, ô Très-Haut ou mais beaucoup luttent pour moi, les anges dans le ciel.'
  - type: text
    content: .
  '4':
  - type: text
    content: Le jour où j’ai peur,
  - type: text
    content: je mets ma confiance en toi.
  '5':
  - type: text
    content: Je loue Dieu pour sa parole
  - type: note
    content: 'Autre traduction : Avec l’aide de Dieu, je le loue pour sa parole.'
  - type: text
    content: ','
  - type: text
    content: je mets ma confiance en lui, ╵et je n’ai pas peur.
  - type: text
    content: Que pourraient me faire ╵de simples créatures terrestres ?
  '6':
  - type: text
    content: A longueur de jour, ╵ils tordent ce que je dis,
  - type: text
    content: ils ne pensent qu’à me nuire
  - type: note
    content: 'Obscur en hébreu. Autre traduction : ils me font souffrir.'
  - type: text
    content: .
  '7':
  - type: text
    content: Postés à l’affût, ╵ils m’épient
  - type: text
    content: et ils sont sur mes talons,
  - type: text
    content: pour attenter à ma vie.
  '8':
  - type: text
    content: Après ce méfait, ╵échapperaient-ils ?
  - type: text
    content: Dieu, que ta colère ╵abatte ces gens !
  '9':
  - type: text
    content: Toi, tu tiens le compte ╵de chacun des pas ╵de ma vie errante,
  - type: text
    content: et mes larmes même ╵tu les gardes dans ton outre.
  - type: text
    content: Leur compte est inscrit ╵dans ton livre.
