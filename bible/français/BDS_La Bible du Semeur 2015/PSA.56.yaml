document_id: PSA.56,21
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Avec Dieu, plus de peur
    marker-yv: yv-h
  - type: usfm
    marker: d
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: Au maître de chant. Sur la mélodie de « Colombe silencieuse des pays lointains
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '56.1 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Autres traductions (en changeant la ponctuation des lettres d’un des mots hébreux) : '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'colombe des chênes lointains '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'ou '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'des dieux lointains. '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Il s’agit d’un chant dont David a utilisé la mélodie pour composer les paroles de son cantique.
      marker-yv: yv-n
    - type: text
      text: '  ». Cantique'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '56.1 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Signification incertaine.
      marker-yv: yv-n
    - type: text
      text: ' composé par David lorsqu’il fut pris par les Philistins à Gath'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '56.1 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Voir '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: 1 S 21.11-16
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: .
  '10':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: Je t’appellerai, ╵et mes ennemis ╵battront en retraite,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: alors je saurai ╵que Dieu est pour moi.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: Je loue Dieu pour sa parole.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Oui, pour sa parole, ╵je loue l’Eternel
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '56.11 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Autre traduction : '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: Avec l’aide de Dieu, je le loue pour sa parole. Oui, avec l’aide de l’Eternel, je le loue pour sa parole.
      marker-yv: yv-n
    - type: text
      text: .
  '12':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: Je mets ma confiance en lui ╵et je n’ai pas peur.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Que pourraient me faire ╵des humains ?
  '13':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: O Dieu, je veux accomplir ╵les vœux que j’ai faits,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et je veux t’offrir ╵ma reconnaissance
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '56.13 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: ma reconnaissance
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: ': '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'autre traduction : '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: des sacrifices de reconnaissance.
      marker-yv: yv-n
    - type: text
      text: .
  '14':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: Car tu m’as délivré de la mort,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: tu as préservé ╵mes pieds de la chute
  - type: usfm
    marker: q1
    children:
    - type: text
      text: afin que je marche ╵devant toi, ô Dieu, ╵et dans la lumière ╵de la vie.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: Aie pitié de moi, ô Dieu, ╵car on me harcèle.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: A longueur de jour, ╵on m’assaille, ╵on me persécute.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: Oui, mes adversaires, ╵à longueur de jour, ╵me harcèlent !
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Car ils sont nombreux ╵ceux qui me combattent ╵avec arrogance
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '56.3 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Autres traductions : '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'me combattent, ô Très-Haut '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'ou '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: mais beaucoup luttent pour moi, les anges dans le ciel.
      marker-yv: yv-n
    - type: text
      text: .
  '4':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: Le jour où j’ai peur,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: je mets ma confiance en toi.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: Je loue Dieu pour sa parole
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '56.5 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Autre traduction : '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: Avec l’aide de Dieu, je le loue pour sa parole.
      marker-yv: yv-n
    - type: text
      text: ','
  - type: usfm
    marker: q1
    children:
    - type: text
      text: je mets ma confiance en lui, ╵et je n’ai pas peur.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Que pourraient me faire ╵de simples créatures terrestres ?
  '6':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: A longueur de jour, ╵ils tordent ce que je dis,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ils ne pensent qu’à me nuire
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '56.6 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Obscur en hébreu. Autre traduction : '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: ils me font souffrir.
      marker-yv: yv-n
    - type: text
      text: .
  '7':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: Postés à l’affût, ╵ils m’épient
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et ils sont sur mes talons,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: pour attenter à ma vie.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: Après ce méfait, ╵échapperaient-ils ?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Dieu, que ta colère ╵abatte ces gens !
  '9':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: Toi, tu tiens le compte ╵de chacun des pas ╵de ma vie errante,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et mes larmes même ╵tu les gardes dans ton outre.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Leur compte est inscrit ╵dans ton livre.
