    children:
    - type: text
      text: Introduction
  - type: usfm
    marker: ip
    children:
    - type: text
      text: L’action du livre de Ruth se situe au temps des « juges », « à l’époque où les chefs gouvernaient Israël » (1.1), vers la fin du douzième siècle avant Jésus-Christ (4.17, 21-22  ; David est né vers 1040 av. J.-C.). L’auteur est anonyme, mais le livre semble avoir été écrit au début de la monarchie, bien que certains aient proposé une date de rédaction plus tardive.
  - type: usfm
    marker: ip
    children:
    - type: text
      text: 'L’histoire raconte comment Ruth – une femme moabite, épouse d’un Israélite réfugié en Moab à cause d’une famine et devenue veuve – vient s’installer avec sa belle-mère Noémi dans la patrie de son mari : Bethléhem en Juda. Cette expression d’attachement filial s’accompagne d’une démarche spirituelle : « Ton peuple sera mon peuple et ton Dieu sera mon Dieu » (1.16). L’Eternel vient récompenser cette loyauté. Dans son malheur, Ruth vient glaner dans le champ de Booz, qui l’épouse et lui assure, ainsi qu’à Noémi, une descendance et la sécurité.'
  - type: usfm
    marker: ip
    children:
    - type: text
      text: 'Ce petit chef-d’œuvre littéraire nous fait entrer dans l’intimité d’une famille qui révère l’Eternel. Il montre comment Dieu récompense la fidélité des croyants, même étrangers au peuple d’Israël : Ruth, la Moabite, manifeste un bel exemple de loyauté envers sa belle-mère et le Dieu de son mari, le Dieu d’Israël.'
  - type: usfm
    marker: ip
    children:
    - type: text
      text: 'Construit en quatre tableaux, le récit culmine dans la généalogie finale : Ruth met au monde un fils qui sera le grand-père du roi David. C’est ainsi qu’une païenne figure parmi les ancêtres de Jésus, le Messie, « fils » de David (Mt 1.15). Le Nouveau Testament dira encore plus clairement que l’Eternel, le Dieu d’Israël, est le Dieu de tous ceux qui placent leur confiance en lui.'
