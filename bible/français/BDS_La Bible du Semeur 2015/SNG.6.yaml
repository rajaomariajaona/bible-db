document_id: SNG.6,21
type_code: fra
verses:
  '1':
  - type: heading
    content: Le chœur
  - type: text
    content: « Où est allé ton bien-aimé,
  - type: text
    content: ô toi la plus belle des femmes ?
  - type: text
    content: De quel côté s’est-il tourné, ╵ton bien-aimé ?
  - type: text
    content: Nous t’aiderons à le chercher. »
  - type: heading
    content: Le lien de l’amour
  '10':
  - type: text
    content: « Qui donc est celle ╵qui apparaît ╵comme l’aurore
  - type: text
    content: et qui est belle ╵comme la lune, ╵brillante comme le soleil
  - type: text
    content: et redoutable comme des soldats
  - type: text
    content: rangés sous leur bannière
  - type: note
    content: 'D’autres comprennent : comme ces astres admirables.'
  - type: text
    content: '  ? »'
  - type: heading
    content: Poussée par le désir
  '11':
  - type: text
    content: « Je venais de descendre ╵au jardin des noyers
  - type: text
    content: pour regarder les pousses ╵dans le vallon
  - type: text
    content: et pour voir si la vigne ╵avait déjà fleuri,
  - type: text
    content: et si les grenadiers ╵étaient déjà en fleurs.
  '12':
  - type: text
    content: Je ne sais pas comment ╵je me suis retrouvée, ╵poussée par mon désir,
  - type: text
    content: au beau milieu des chars ╵des hommes de mon prince
  - type: note
    content: 'La traduction de ce verset est difficile. En adoptant un autre découpage et une autre vocalisation de certains mots hébreux que ceux du texte hébreu traditionnel, on obtient : mais je ne me reconnais plus ! Il m’intimide bien que je sois la fille de nobles gens (voir 7.2 où se retrouve la même expression, traduite : fille de prince).'
  - type: text
    content: . »
  '2':
  - type: text
    content: « Mon bien-aimé ╵est descendu dans son jardin,
  - type: text
    content: vers ses parterres d’aromates,
  - type: text
    content: afin de paître ╵dans les jardins
  - type: text
    content: et d’y cueillir des lis.
  '3':
  - type: text
    content: Moi, je suis à mon bien-aimé ╵et mon bien-aimé est à moi,
  - type: text
    content: il paît parmi les lis
  - type: note
    content: Voir 2.16 ; 7.11.
  - type: text
    content: . »
  - type: heading
    content: La plus belle de toutesDans 6.4-10, le rythme de la traduction accentue les 1re, 4e et 7e syllabes.
  '4':
  - type: text
    content: « Que tu es belle, ╵ô mon amie, ╵comme Tirtsa
  - type: note
    content: 'Tirtsa: ancienne ville cananéenne du centre du pays (Jos 12.24), choisie par Jéroboam Ier (930 à 909 av. J.-C.) comme la première capitale du royaume du Nord (1 R 14.17). Son nom signifie « plaisir, beauté ».'
  - type: text
    content: .
  - type: text
    content: Tu es superbe ╵comme Jérusalem,
  - type: text
    content: et redoutable comme des soldats
  - type: text
    content: rangés sous leur bannière.
  '5':
  - type: text
    content: Détourne de moi tes yeux, ╵car ils me troublent,
  - type: text
    content: ta chevelure ╵est comme un troupeau de chèvres
  - type: text
    content: dévalant le mont Galaad.
  '6':
  - type: text
    content: Tes dents ressemblent ╵à un troupeau de brebis
  - type: text
    content: qui reviendrait du lavoir.
  - type: text
    content: Chacune d’elles ╵a sa jumelle,
  - type: text
    content: aucune n’est solitaire.
  '7':
  - type: text
    content: Et tes tempes ressemblent ╵à des moitiés de grenades
  - type: text
    content: dessous ton voile.
  '8':
  - type: text
    content: Les reines sont soixante
  - type: text
    content: et quatre-vingts ╵les épouses de second rang,
  - type: text
    content: les jeunes filles sont sans nombre.
  '9':
  - type: text
    content: Mais elle, ma colombe, ╵ma parfaite est unique.
  - type: text
    content: Elle est unique pour sa mère, la préférée ╵de celle qui l’a enfantée.
  - type: text
    content: Les jeunes filles, ╵en la voyant, ╵la disent bienheureuse.
  - type: text
    content: Toutes les reines, ╵et les épouses ╵de second rang ╵font son éloge. »
  - type: heading
    content: Le chœur
