document_id: SNG.6,21
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Le chœur
    marker-yv: yv-h
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: « Où est allé ton bien-aimé,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ô toi la plus belle des femmes ?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: De quel côté s’est-il tourné, ╵ton bien-aimé ?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Nous t’aiderons à le chercher. »
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Le lien de l’amour
    marker-yv: yv-h
  '10':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: « Qui donc est celle ╵qui apparaît ╵comme l’aurore
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et qui est belle ╵comme la lune, ╵brillante comme le soleil
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et redoutable comme des soldats
  - type: usfm
    marker: q1
    children:
    - type: text
      text: rangés sous leur bannière
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '6.10 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'D’autres comprennent : '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: comme ces astres admirables.
      marker-yv: yv-n
    - type: text
      text: '  ? »'
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Poussée par le désir
    marker-yv: yv-h
  '11':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: « Je venais de descendre ╵au jardin des noyers
  - type: usfm
    marker: q1
    children:
    - type: text
      text: pour regarder les pousses ╵dans le vallon
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et pour voir si la vigne ╵avait déjà fleuri,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et si les grenadiers ╵étaient déjà en fleurs.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: Je ne sais pas comment ╵je me suis retrouvée, ╵poussée par mon désir,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: au beau milieu des chars ╵des hommes de mon prince
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '6.12 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'La traduction de ce verset est difficile. En adoptant un autre découpage et une autre vocalisation de certains mots hébreux que ceux du texte hébreu traditionnel, on obtient : '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'mais je ne me reconnais plus ! Il m’intimide bien que je sois la fille de nobles gens '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '(voir '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: '7.2'
        - type: text
          text: ' où se retrouve la même expression, traduite : '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: fille de prince
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ).
      marker-yv: yv-n
    - type: text
      text: . »
  '2':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: « Mon bien-aimé ╵est descendu dans son jardin,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: vers ses parterres d’aromates,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: afin de paître ╵dans les jardins
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et d’y cueillir des lis.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: Moi, je suis à mon bien-aimé ╵et mon bien-aimé est à moi,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: il paît parmi les lis
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '6.3 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Voir 2.16 ; 7.11.
      marker-yv: yv-n
    - type: text
      text: . »
  - type: usfm
    marker: s1
    children:
    - type: text
      text: La plus belle de toutes
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '6.4 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Dans '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: 6.4-10
        - type: text
          text: ', le rythme de la traduction accentue les 1'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: re
        - type: text
          text: ', 4'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: e
        - type: text
          text: ' et 7'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: e
        - type: text
          text: ' syllabes.'
      marker-yv: yv-n
    marker-yv: yv-h
  '4':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: « Que tu es belle, ╵ô mon amie, ╵comme Tirtsa
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '6.4 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Tirtsa
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: ': '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ancienne ville cananéenne du centre du pays (
        - type: usfm
          marker: ref
          children:
          - type: text
            text: Jos 12.24
        - type: text
          text: ), choisie par Jéroboam I
        - type: usfm
          marker: ord
          children:
          - type: text
            text: er
        - type: text
          text: ' (930 à 909 av. J.-C.) comme la première capitale du royaume du Nord ('
        - type: usfm
          marker: ref
          children:
          - type: text
            text: 1 R 14.17
        - type: text
          text: ). Son nom signifie « plaisir, beauté ».
      marker-yv: yv-n
    - type: text
      text: .
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tu es superbe ╵comme Jérusalem,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et redoutable comme des soldats
  - type: usfm
    marker: q1
    children:
    - type: text
      text: rangés sous leur bannière.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: Détourne de moi tes yeux, ╵car ils me troublent,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ta chevelure ╵est comme un troupeau de chèvres
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dévalant le mont Galaad.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: Tes dents ressemblent ╵à un troupeau de brebis
  - type: usfm
    marker: q1
    children:
    - type: text
      text: qui reviendrait du lavoir.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Chacune d’elles ╵a sa jumelle,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: aucune n’est solitaire.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: Et tes tempes ressemblent ╵à des moitiés de grenades
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dessous ton voile.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: Les reines sont soixante
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et quatre-vingts ╵les épouses de second rang,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: les jeunes filles sont sans nombre.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: Mais elle, ma colombe, ╵ma parfaite est unique.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Elle est unique pour sa mère, la préférée ╵de celle qui l’a enfantée.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Les jeunes filles, ╵en la voyant, ╵la disent bienheureuse.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Toutes les reines, ╵et les épouses ╵de second rang ╵font son éloge. »
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Le chœur
    marker-yv: yv-h
