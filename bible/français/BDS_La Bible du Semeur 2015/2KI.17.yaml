document_id: 2KI.17
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Le règne d’Osée sur Israël et l’exil des Israélites du Nord
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Pendant la douzième année du règne d’Ahaz, roi de Juda, Osée, fils d’Ela, devint roi d’Israël à Samarie. Il régna neuf ans
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '17.1 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'De 732 à 722 av. J.-C. La mention de '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'la douzième année du règne d’Ahaz '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'pose des problèmes. Certains l’expliquent par une corégence d’Ahaz avec Azaria dès 744 à 743 mais cela reste peu probable (voir note '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '16.1'
        metadata:
          usfm: 2KI.16.1
      - type: text
        text: '). D’autres y voient une confusion scribale entre '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'douzième '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'et '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'quatrième '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: (735 av. J.-C.).
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Il fit ce que l’Eternel considère comme mal, moins cependant que ses prédécesseurs.
- type: usfm
  marker: r
  children:
  - type: text
    text: (2 R 18.9-12)
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Salmanasar, roi d’Assyrie
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '17.3 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Fils et successeur de Tiglath-Piléser III qui gouverna l’Assyrie de 727 à 722 av. J.-C.
    marker-yv: yv-n
  - type: text
    text: ', vint l’attaquer et Osée lui fut assujetti et lui paya un tribut. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Osée conspira contre le roi d’Assyrie : il envoya des messagers à So, roi d’Egypte'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '17.4 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Ce personnage est mal identifié. On a proposé le pharaon Shabako, mais d’autres suggèrent de lire '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'Sewé, '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'c’est-à-dire Sibé’é, généralissime de l’armée égyptienne. Certains comprennent : '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: à la ville de Saïs, au roi d’Egypte.
    marker-yv: yv-n
  - type: text
    text: ', pour demander son aide, et cessa de payer son tribut annuel. Après avoir découvert le complot, le souverain assyrien le fit arrêter et enchaîner dans une prison. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Puis il envahit tout le pays et arriva à Samarie qu’il assiégea pendant trois ans
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '17.5 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Salmanasar V commença le siège de Samarie en 725 av. J.-C., mais, en décembre 722, il fut renversé et assassiné, et Sargon II (722 à 705 av. J.-C.) s’empara du pouvoir. C’est ce dernier qui prit Samarie et s’en vanta dans ses Annales.
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: La neuvième année du règne d’Osée, le roi d’Assyrie s’empara de Samarie et déporta les Israélites en Assyrie. Il les établit à Halah et sur les rives du Habor, dans la région de Gozân, ainsi que dans les villes de la Médie
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '17.6 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Seconde captivité des Israélites du Nord (voir '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '15.29'
        metadata:
          usfm: 2KI.15.29
      - type: text
        text: ). Les localités citées se trouvent en Mésopotamie, au sud de la mer Caspienne. Le Habor est un affluent de l’Euphrate.
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: s1
  children:
  - type: text
    text: Les causes de l’exil des Israélites
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Ce malheur frappa les Israélites parce qu’ils avaient péché contre l’Eternel leur Dieu qui les avait fait sortir d’Egypte et les avait délivrés de l’oppression du pharaon, roi d’Egypte, et parce qu’ils avaient craint d’autres dieux.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Ils avaient adopté les coutumes des peuples étrangers que l’Eternel avait dépossédés en faveur des Israélites, ainsi que les coutumes introduites par les rois d’Israël. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Les Israélites avaient commis en secret des actes inadmissibles offensant l’Eternel leur Dieu. Ils avaient édifié des hauts lieux dans toutes leurs localités, depuis les postes d’observation jusqu’aux villes fortifiées
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '17.9 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Pour les v. 9-10, voir '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1 R 14.23
        metadata:
          usfm: 1KI.14.23
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Ils avaient dressé des stèles et des poteaux sacrés pour la déesse Ashéra sur chaque colline élevée et sous chaque arbre verdoyant. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Et là, sur ces hauts lieux, ils avaient fait brûler des parfums, comme les peuples étrangers que l’Eternel avait chassés devant eux. Ils s’étaient adonnés à des pratiques coupables par lesquelles ils avaient irrité l’Eternel. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Ils avaient rendu un culte aux idoles alors que l’Eternel leur avait ordonné de ne pas le faire
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '17.12 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Voir '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ex 20.4
        metadata:
          usfm: EXO.20.4
      - type: text
        text: ', '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '5'
        metadata:
          usfm: EXO.20.5
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'L’Eternel avait averti Israël et Juda par l’intermédiaire de tous ses prophètes, de tous ceux qui reçoivent des révélations. Il leur avait fait dire : Abandonnez votre mauvaise conduite et obéissez à mes commandements et à mes ordonnances contenus dans toute la Loi que j’ai donnée à vos ancêtres et que je vous ai communiquée par l’intermédiaire de mes serviteurs les prophètes'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '17.13 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Voir Jr 18.11 ; Ez 33.11.
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Mais ils n’avaient rien voulu entendre ; ils s’étaient obstinés, comme leurs ancêtres qui n’avaient pas fait confiance à l’Eternel leur Dieu. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Ils avaient rejeté ses ordonnances, violé l’alliance que Dieu avait conclue avec leurs ancêtres, et n’avaient pas tenu compte des avertissements qu’il leur avait adressés. Ils avaient couru après des dieux qui ne sont que du vent pour n’être plus eux-mêmes que du vent. Ils avaient suivi les coutumes des peuples étrangers qui les entouraient, alors que l’Eternel leur avait défendu de les imiter. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Ils avaient délaissé tous les commandements de l’Eternel, leur Dieu. Ils s’étaient fabriqué deux veaux en métal fondu
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '17.16 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Voir '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1 R 12.28
        metadata:
          usfm: 1KI.12.28
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: ', ils avaient dressé des poteaux représentant la déesse Ashéra. Ils s’étaient prosternés devant tous les astres du ciel et ils avaient rendu un culte au dieu Baal. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Ils avaient fait brûler leurs fils et leurs filles pour les offrir en sacrifice à des idoles
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '17.17 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Voir '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 2 R 16.3
        metadata:
          usfm: 2KI.16.3
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: ', ils avaient consulté les augures et pratiqué la divination ; ils s’étaient adonnés à toutes sortes de mauvaises actions, faisant ce que l’Eternel considère comme mal, de sorte qu’ils l’avaient irrité. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Aussi l’Eternel fut-il très en colère contre Israël et les a-t-il rejetés loin de lui. Seule la tribu de Juda subsista
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '17.18 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Le royaume du Sud contenait aussi des éléments des tribus de Siméon et de Benjamin, mais Juda fut la seule tribu à conserver son intégrité (voir '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1 R 11.31-32
        metadata:
          usfm: 1KI.11.31+1KI.11.32
      - type: text
        text: ).
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Mais elle non plus n’a pas observé les commandements de l’Eternel leur Dieu. Les Judéens ont plutôt suivi les mêmes coutumes qu’Israël. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Voilà pourquoi l’Eternel a rejeté tous les descendants d’Israël et les a humiliés, il les a livrés au pouvoir des pillards et il a fini par les chasser loin de lui.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: En effet, il avait arraché Israël à la dynastie de David, et les Israélites s’étaient donné pour roi Jéroboam, fils de Nebath. Celui-ci les avait incités à se détourner de l’Eternel et les avait entraînés dans un grave péché
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '17.21 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Voir '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1 R 12
        metadata:
          usfm: 1KI.12
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Dès lors, les Israélites n’avaient cessé de se livrer à tous les péchés que Jéroboam lui-même avait commis ; ils ne les abandonnèrent pas '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: jusqu’au jour où l’Eternel les bannit loin de lui comme il l’avait annoncé par tous ses serviteurs, les prophètes. Israël a été déporté loin de son pays, en Assyrie où il est resté jusqu’à ce jour.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Le repeuplement de la Samarie par des païens
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: Le roi d’Assyrie
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '17.24 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'D’abord Sargon II (722 à 705 av. J.-C.), puis Esar-Haddôn (681 à 669 av. J.-C.) et Assourbanipal (669 à 627 av. J.-C.) transplantèrent des païens en Samarie (voir '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Esd 4.2
        metadata:
          usfm: EZR.4.2
      - type: text
        text: ', '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 9-10
        metadata:
          usfm: EZR.4.9+EZR.4.10
      - type: text
        text: ).
    marker-yv: yv-n
  - type: text
    text: ' fit venir des gens de Babylone, de Kouta, de Avva, de Hamath et de Sepharvaïm'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '17.24 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Kouta '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: (à une dizaine de kilomètres de Babylone) fut soumise avec Babylone par Sargon II en 709, les trois villes suivantes sont en Syrie. En 720, Sargon fit de la Syrie de Hamath une province assyrienne.
    marker-yv: yv-n
  - type: text
    text: ' et les obligea à s’établir dans les localités de Samarie, à la place des Israélites déportés. Ils occupèrent la Samarie et s’installèrent dans ses villes. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: Lorsqu’ils commencèrent à y habiter, ces gens ne craignaient pas l’Eternel. L’Eternel envoya contre eux des lions qui tuèrent plusieurs d’entre eux
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '17.25 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Les lions, qui avaient toujours existé dans le pays (Jg 14.5 ; 1 S 17.34 ; 1 R 13.24) se multiplièrent à cause de la dépopulation (voir '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Lv 26.21-22
        metadata:
          usfm: LEV.26.21+LEV.26.22
      - type: text
        text: ).
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Alors ils s’adressèrent au roi d’Assyrie en lui faisant dire : Les populations que tu as déportées et que tu as fait habiter dans les villes de la Samarie ne connaissent pas les règles à suivre pour adorer le dieu du pays. Alors ce dieu a envoyé contre elles des lions qui les tuent parce qu’elles ne connaissent pas les règles à suivre pour adorer le dieu du pays'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '17.26 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Selon les idées religieuses païennes du temps, chaque divinité régionale régissait son territoire et exigeait d’être adorée selon certains rites.
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'Au reçu de cette nouvelle, le roi d’Assyrie édicta l’ordre suivant : Qu’on renvoie là-bas l’un des prêtres que vous avez exilés de ce pays'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '17.27 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: L’un des prêtres des veaux d’or établis par Jéroboam (
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1 R 12.31
        metadata:
          usfm: 1KI.12.31
      - type: text
        text: ).
    marker-yv: yv-n
  - type: text
    text: '  ; qu’il aille s’y établir et qu’il leur enseigne les règles à suivre pour adorer le dieu du pays.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: Ainsi l’un des prêtres qui avaient été déportés de Samarie vint s’installer à Béthel et enseigna aux déportés comment craindre l’Eternel.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'En fait, chacun de ces peuples se fabriqua des statues de ses propres divinités. Dans chaque ville où ces gens habitèrent, ils érigèrent ces idoles dans les sanctuaires des hauts lieux bâtis par le peuple de la Samarie. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'Les gens venus de Babylone firent une statue de Soukkoth-Benoth, ceux de Kouth firent une idole de Nergal, ceux de Hamath en firent une d’Ashima, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'ceux d’Avva en firent de Nibhaz et de Tartaq ; ceux de Sepharvaïm continuaient à brûler leurs enfants pour les offrir à leurs dieux Adrammélek et Anammélek. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'Avec cela, ils craignaient l’Eternel et ils instituèrent un peu partout des prêtres choisis parmi eux pour officier en leur nom dans les sanctuaires des hauts lieux. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: D’un côté donc, ils craignaient l’Eternel, mais en même temps, ils continuaient à rendre un culte à leurs propres dieux selon les coutumes des gens de leurs pays d’origine.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: Jusqu’à aujourd’hui, ils continuent à suivre leurs anciennes coutumes. Ils ne craignent pas vraiment l’Eternel et n’observent pas les ordonnances et les articles de droit, ni la Loi et les commandements donnés par l’Eternel aux descendants de Jacob, auquel il avait donné le nom d’Israël
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '17.34 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Voir Gn 32.29 ; 35.10.
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: 'L’Eternel avait conclu une alliance avec les descendants de Jacob et leur avait ordonné : Vous ne craindrez pas d’autres dieux, vous ne vous prosternerez pas devant eux, vous ne leur rendrez pas de culte et vous ne leur offrirez aucun sacrifice'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '17.35 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Les v. 35 à 39 contiennent des formules qui réapparaissent souvent dans le Deutéronome.
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: 'C’est l’Eternel, lui qui vous a fait sortir d’Egypte par sa grande force et en déployant sa puissance, c’est lui seul que vous craindrez ; c’est devant lui que vous vous prosternerez, c’est à lui que vous offrirez des sacrifices. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: 'Vous aurez soin d’observer et d’appliquer chaque jour les ordonnances, les articles de droit, la Loi et les commandements qu’il vous a donnés par écrit, et vous ne craindrez pas d’autres dieux. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: text
    text: 'Vous ne serez pas infidèles à l’alliance que j’ai conclue avec vous et, je le répète, vous ne craindrez pas d’autres dieux. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '39'
  - type: text
    text: Mais vous craindrez l’Eternel, votre Dieu, et il vous délivrera de tous vos ennemis.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '40'
  - type: text
    text: Mais ces gens n’ont pas écouté ; ils restent attachés à leurs anciennes coutumes.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '41'
  - type: text
    text: Ainsi donc les gens de ces peuples étrangers craignaient l’Eternel tout en continuant à rendre un culte à leurs idoles. Jusqu’à ce jour, leurs enfants et leurs descendants ont maintenu les pratiques de leurs ancêtres.
