type_code: fra
segments:
- type: usfm
  marker: imt1
  children:
  - type: text
    text: Introduction
- type: usfm
  marker: ip
  children:
  - type: text
    text: C’est en 627 avant Jésus-Christ que Jérémie, encore jeune (1.6), est appelé par le Seigneur à être prophète (1.2). Il est originaire d’Anatoth, un village situé à quelques kilomètres au nord de Jérusalem, où Salomon avait exilé autrefois le grand-prêtre Abiatar qu’il avait destitué. Il est possible que Jérémie soit l’un de ses descendants (1.1). Provincial, privé de la prêtrise, Jérémie a bénéficié du recul nécessaire pour sa prédication très dure contre Jérusalem et le culte pratiqué au Temple (chap. 7 ; 26). Il sera contemporain de Sophonie et d’Habaquq, puis d’Ezéchiel.
- type: usfm
  marker: ip
  children:
  - type: text
    text: 'Le règne de Josias (640 à 609) constitue la période heureuse du ministère de Jérémie (chap. 1 à 6). Dès 628, le roi entreprend une réforme religieuse de grande envergure qui se fonde sur une politique d’indépendance à l’égard de l’Egypte et de l’Assyrie (2 Ch 34.6ss). Jérémie soutient la réforme (2.1 à 4.4) et condamne ceux qui cherchent leur appui, non en l’Eternel, mais en des alliances avec des peuples étrangers (2.18, 36). En 622, on découvre dans le Temple un rouleau de la Loi, probablement le Deutéronome. Jérémie participe à la ferveur suscitée par cette découverte : il insiste en particulier sur la nécessité d’une circoncision du cœur (4.4 ; 9.25 ; Dt 10.16 ; 30.6). Il discerne, lucide, que la réforme demeure superficielle : elle ne parvient pas à changer les motivations profondes de ses compatriotes (3.10).'
- type: usfm
  marker: ip
  children:
  - type: text
    text: 'Josias meurt en 609 et la suite révèle combien le discernement de Jérémie était juste. Dès les premières années de Yehoyaqim (609 à 598), Jérémie doit s’opposer au pouvoir royal, pro-égyptien, et dénoncer l’idolâtrie (chap. 10) et les fausses sécurités que sont pour le peuple la présence du Temple à Jérusalem (7.4) et la possession de la Loi (8.8). Le ton monte, les prédications de Jérémie alternent avec ses plaintes (chap. 7 à 20). 605 est l’année décisive, qui structure le livre (25.3 ; 36.1 ; 45.1 ; 46.2) : Nabuchodonosor intervient une première fois contre Jérusalem, mais Yehoyaqim déchire et brûle le rouleau des déclarations de Jérémie (chap. 36). La rupture est décidée : le peuple partira en exil pendant soixante-dix ans (chap. 25).'
- type: usfm
  marker: ip
  children:
  - type: text
    text: 'Sous le règne de Sédécias (597 à 587), qui intrigue avec l’Egypte contre Babylone, le drame éclate (chap. 37 à 45). Le prophète est consulté à plusieurs reprises, sans doute dans l’espoir de le faire changer de discours, mais son message ne varie pas : il faut se soumettre aux Babyloniens (38.17-18). Passant pour un traître (37.13), il est plusieurs fois emprisonné et manque même de perdre la vie (chap. 38). Après la chute de Jérusalem, en 587, et la déportation de la majorité de sa population, Nabuchodonosor nomme Guedalia comme gouverneur. Celui-ci est assassiné et, contre l’avis de Jérémie, les Judéens s’enfuient en Egypte. Emmené de force, le prophète y dénoncera l’idolâtrie persistante de ses compatriotes (chap. 44).'
- type: usfm
  marker: ip
  children:
  - type: text
    text: 'Cependant, il y a une espérance (31.17) : le cœur de l’homme, « tortueux et incurable » (17.9), sera guéri. Dieu conclura une nouvelle alliance avec le peuple : lors de cette « réforme », il inscrira la Loi même dans le cœur de ses fidèles (31.31-34), et cette création nouvelle (31.22) s’opérera au moyen du pardon des péchés (31.34), grâce à celui qui dira un jour : « Cette coupe est la nouvelle alliance scellée de mon sang » (1 Co 11.25).'
