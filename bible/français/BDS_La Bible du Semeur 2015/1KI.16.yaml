document_id: 1KI.16,21
type_code: fra
verses:
  '1':
  - type: text
    content: 'L’Eternel s’adressa au prophète Jéhu, fils de Hanani, avec le message suivant pour Baésha : '
  '10':
  - type: text
    content: 'Zimri survint et le frappa à mort. Cela se passa la vingt-septième année du règne d’Asa, roi de Juda. Zimri lui succéda sur le trône. '
  '11':
  - type: text
    content: 'A peine était-il devenu roi, qu’il fit périr toute la famille de Baésha, sans épargner un seul homme, enfant ou adulte, dans sa parenté ou parmi ses partisans. '
  '12':
  - type: text
    content: 'Zimri détruisit ainsi toute la maison de Baésha, comme l’Eternel l’avait annoncé contre lui par l’intermédiaire du prophète Jéhu. '
  '13':
  - type: text
    content: Tout cela arriva à cause de tous les péchés que Baésha et son fils Ela avaient commis, ainsi que ceux dans lesquels ils avaient entraîné Israël, irritant ainsi l’Eternel, le Dieu d’Israël, par leurs vaines idoles.
  '14':
  - type: text
    content: Les autres faits et gestes d’Ela et toutes ses réalisations sont cités dans le livre des Annales des rois d’Israël.
  - type: heading
    content: Le règne de Zimri sur Israël
  '15':
  - type: text
    content: La vingt-septième année du règne d’Asa sur Juda, Zimri devint roi pour sept jours à Tirtsa
  - type: note
    content: Au cours de l’année 885 av. J.-C.
  - type: text
    content: .
  - type: text
    content: 'L’armée d’Israël était alors en train d’assiéger la ville philistine de Guibbetôn. '
  '16':
  - type: text
    content: 'Quand les soldats apprirent que Zimri avait comploté contre le roi et l’avait assassiné, ils proclamèrent aussitôt leur général Omri roi d’Israël dans le camp. '
  '17':
  - type: text
    content: 'Alors celui-ci et toute son armée quittèrent Guibbetôn et partirent assiéger Tirtsa. '
  '18':
  - type: text
    content: 'Lorsque Zimri vit que la ville était sur le point d’être prise, il se retira dans le donjon du palais royal, mit le feu au palais et périt dans l’incendie. '
  '19':
  - type: text
    content: Il mourut à cause des péchés dont il s’était rendu coupable en faisant ce que l’Eternel considère comme mal, en imitant l’exemple de Jéroboam et en entraînant le peuple d’Israël dans le même péché que lui.
  '2':
  - type: text
    content: 'Je t’ai tiré de la poussière pour t’établir chef de mon peuple Israël, mais tu as imité l’exemple de Jéroboam, tu as entraîné mon peuple Israël dans le péché, et tu m’as ainsi irrité. '
  '20':
  - type: text
    content: Les autres faits et gestes de Zimri, ainsi que les détails du complot qu’il avait organisé, sont cités dans le livre des Annales des rois d’Israël.
  '21':
  - type: text
    content: 'Alors les tribus du Nord se partagèrent en deux partis : une moitié du peuple se rallia à Tibni, fils de Guinath, pour le faire régner, l’autre moitié se déclara pour Omri. '
  '22':
  - type: text
    content: Les partisans de ce dernier l’emportèrent sur ceux de Tibni, fils de Guinath. Tibni mourut et Omri devint roi.
  - type: heading
    content: Le règne d’Omri sur Israël
  '23':
  - type: text
    content: La trente et unième année du règne d’Asa, roi de Juda, Omri devint roi sur Israël. Il régna douze ans
  - type: note
    content: De 885 à 874 av. J.-C. Les 12 ans du règne d’Omri incluent les trois années de rivalité qui ont opposé Omri à Tibni. Ils vont donc de la 27e à la 38e année du règne d’Asa (v. 15 et 29), tandis que le règne d’Omri sur l’ensemble d’Israël débute la 31e année du règne d’Asa (v. 23).
  - type: text
    content: '. Il régna d’abord six ans à Tirtsa, '
  '24':
  - type: text
    content: puis il acheta à Shémer la colline de Samarie pour 6 000 pièces d’argent ; il la fortifia et y construisit une ville, qu’il appela Samarie, d’après le nom de Shémer, l’ancien propriétaire de la colline.
  '25':
  - type: text
    content: 'Omri fit ce que l’Eternel considère comme mal ; il agit encore plus mal que tous ses prédécesseurs. '
  '26':
  - type: text
    content: Il imita en tout l’exemple de Jéroboam, fils de Nebath, il entraîna le peuple d’Israël dans le péché, en sorte qu’ils irritèrent l’Eternel leur Dieu par leur idolâtrie.
  '27':
  - type: text
    content: 'Les autres faits et gestes d’Omri, ainsi que la vaillance dont il fit preuve, tout cela est cité dans le livre des Annales des rois d’Israël. '
  '28':
  - type: text
    content: Lorsqu’il rejoignit ses ancêtres décédés il fut enseveli à Samarie et son fils Achab lui succéda sur le trône.
  - type: heading
    content: Le règne d’Achab sur Israël
  '29':
  - type: text
    content: La trente-huitième année du règne d’Asa, roi de Juda, Achab, fils d’Omri, devint roi d’Israël. Il régna sur Israël à Samarie pendant vingt-deux ans
  - type: note
    content: De 874 à 853 av. J.-C.
  - type: text
    content: '. '
  '3':
  - type: text
    content: 'C’est pourquoi je vais te balayer, toi et ta famille, je vous traiterai comme la famille de Jéroboam, fils de Nebath. '
  '30':
  - type: text
    content: 'Achab, fils d’Omri, fit ce que l’Eternel considère comme mal et fut pire que tous ses prédécesseurs. '
  '31':
  - type: text
    content: Non content d’imiter les péchés de Jéroboam
  - type: note
    content: Voir 1 R 12.29-30.
  - type: text
    content: ', fils de Nebath, il épousa encore Jézabel, fille d’Ethbaal, le roi des Sidoniens'
  - type: note
    content: C’est-à-dire des Phéniciens (5.20).
  - type: text
    content: ', et alla jusqu’à rendre un culte au dieu Baal et à se prosterner devant lui. '
  '32':
  - type: text
    content: 'Il construisit un temple en l’honneur de Baal à Samarie et y dressa un autel. '
  '33':
  - type: text
    content: Il érigea aussi un poteau sacré à la déesse Ashéra. Par tous ses actes, il irrita l’Eternel, le Dieu d’Israël, plus que tous les rois d’Israël qui l’avaient précédé.
  '34':
  - type: text
    content: C’est sous son règne qu’un certain Hiel de Béthel rebâtit Jéricho. La pose des fondations coûta la vie à son fils aîné Abiram et lorsqu’on en posa les portes, son cadet Segoub mourut. Cela arriva conformément à la parole que l’Eternel avait prononcée par l’intermédiaire de Josué, fils de Noun
  - type: note
    content: Voir Jos 6.26.
  - type: text
    content: .
  '4':
  - type: text
    content: Ceux de la maison de Baésha qui mourront dans la ville seront dévorés par les chiens, et ceux qui mourront dans la campagne seront déchiquetés par les rapaces.
  '5':
  - type: text
    content: 'Les autres faits et gestes de Baésha, ses réalisations et ses exploits, sont cités dans le livre des Annales des rois d’Israël. '
  '6':
  - type: text
    content: 'Quand il rejoignit ses ancêtres décédés, il fut enterré à Tirtsa et son fils Ela lui succéda sur le trône. '
  '7':
  - type: text
    content: 'La parole de l’Eternel lui avait été adressée, à lui et à sa maison, par l’intermédiaire du prophète Jéhu, fils de Hanani, pour deux raisons : d’une part à cause de tout ce qu’il avait fait de mal aux yeux de l’Eternel, l’irritant ainsi par ses actions, exactement comme la famille de Jéroboam, et d’autre part parce qu’il avait exterminé les membres de cette famille.'
  - type: heading
    content: Le règne d’Ela sur Israël et la fin de la dynastie de Baésha
  '8':
  - type: text
    content: La vingt-sixième année du règne d’Asa, roi de Juda, Ela, fils de Baésha, devint roi d’Israël à Tirtsa. Il régna deux ans
  - type: note
    content: De 886 à 885 av. J.-C.
  - type: text
    content: .
  '9':
  - type: text
    content: 'Son officier Zimri, qui commandait la moitié des chars de guerre, complota contre lui. Pendant qu’Ela était à Tirtsa, buvant comme un ivrogne dans la maison d’Artsa, l’intendant du palais royal à Tirtsa, '
