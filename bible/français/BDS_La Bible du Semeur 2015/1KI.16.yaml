document_id: 1KI.16
type_code: fra
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'L’Eternel s’adressa au prophète Jéhu, fils de Hanani, avec le message suivant pour Baésha : '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Je t’ai tiré de la poussière pour t’établir chef de mon peuple Israël, mais tu as imité l’exemple de Jéroboam, tu as entraîné mon peuple Israël dans le péché, et tu m’as ainsi irrité. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'C’est pourquoi je vais te balayer, toi et ta famille, je vous traiterai comme la famille de Jéroboam, fils de Nebath. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Ceux de la maison de Baésha qui mourront dans la ville seront dévorés par les chiens, et ceux qui mourront dans la campagne seront déchiquetés par les rapaces.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Les autres faits et gestes de Baésha, ses réalisations et ses exploits, sont cités dans le livre des Annales des rois d’Israël. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Quand il rejoignit ses ancêtres décédés, il fut enterré à Tirtsa et son fils Ela lui succéda sur le trône. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'La parole de l’Eternel lui avait été adressée, à lui et à sa maison, par l’intermédiaire du prophète Jéhu, fils de Hanani, pour deux raisons : d’une part à cause de tout ce qu’il avait fait de mal aux yeux de l’Eternel, l’irritant ainsi par ses actions, exactement comme la famille de Jéroboam, et d’autre part parce qu’il avait exterminé les membres de cette famille.'
- type: usfm
  marker: s1
  children:
  - type: text
    text: Le règne d’Ela sur Israël et la fin de la dynastie de Baésha
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: La vingt-sixième année du règne d’Asa, roi de Juda, Ela, fils de Baésha, devint roi d’Israël à Tirtsa. Il régna deux ans
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '16.8 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: De 886 à 885 av. J.-C.
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Son officier Zimri, qui commandait la moitié des chars de guerre, complota contre lui. Pendant qu’Ela était à Tirtsa, buvant comme un ivrogne dans la maison d’Artsa, l’intendant du palais royal à Tirtsa, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Zimri survint et le frappa à mort. Cela se passa la vingt-septième année du règne d’Asa, roi de Juda. Zimri lui succéda sur le trône. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'A peine était-il devenu roi, qu’il fit périr toute la famille de Baésha, sans épargner un seul homme, enfant ou adulte, dans sa parenté ou parmi ses partisans. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Zimri détruisit ainsi toute la maison de Baésha, comme l’Eternel l’avait annoncé contre lui par l’intermédiaire du prophète Jéhu. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Tout cela arriva à cause de tous les péchés que Baésha et son fils Ela avaient commis, ainsi que ceux dans lesquels ils avaient entraîné Israël, irritant ainsi l’Eternel, le Dieu d’Israël, par leurs vaines idoles.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Les autres faits et gestes d’Ela et toutes ses réalisations sont cités dans le livre des Annales des rois d’Israël.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Le règne de Zimri sur Israël
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: La vingt-septième année du règne d’Asa sur Juda, Zimri devint roi pour sept jours à Tirtsa
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '16.15 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Au cours de l’année 885 av. J.-C.
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: p
  children:
  - type: text
    text: 'L’armée d’Israël était alors en train d’assiéger la ville philistine de Guibbetôn. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Quand les soldats apprirent que Zimri avait comploté contre le roi et l’avait assassiné, ils proclamèrent aussitôt leur général Omri roi d’Israël dans le camp. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Alors celui-ci et toute son armée quittèrent Guibbetôn et partirent assiéger Tirtsa. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Lorsque Zimri vit que la ville était sur le point d’être prise, il se retira dans le donjon du palais royal, mit le feu au palais et périt dans l’incendie. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Il mourut à cause des péchés dont il s’était rendu coupable en faisant ce que l’Eternel considère comme mal, en imitant l’exemple de Jéroboam et en entraînant le peuple d’Israël dans le même péché que lui.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Les autres faits et gestes de Zimri, ainsi que les détails du complot qu’il avait organisé, sont cités dans le livre des Annales des rois d’Israël.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Alors les tribus du Nord se partagèrent en deux partis : une moitié du peuple se rallia à Tibni, fils de Guinath, pour le faire régner, l’autre moitié se déclara pour Omri. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: Les partisans de ce dernier l’emportèrent sur ceux de Tibni, fils de Guinath. Tibni mourut et Omri devint roi.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Le règne d’Omri sur Israël
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: La trente et unième année du règne d’Asa, roi de Juda, Omri devint roi sur Israël. Il régna douze ans
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '16.23 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: De 885 à 874 av. J.-C. Les 12 ans du règne d’Omri incluent les trois années de rivalité qui ont opposé Omri à Tibni. Ils vont donc de la 27
      - type: usfm
        marker: ord
        children:
        - type: text
          text: e
      - type: text
        text: ' à la 38'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: e
      - type: text
        text: ' année du règne d’Asa (v. 15 et 29), tandis que le règne d’Omri sur l’ensemble d’Israël débute la 31'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: e
      - type: text
        text: ' année du règne d’Asa (v. 23).'
    marker-yv: yv-n
  - type: text
    text: '. Il régna d’abord six ans à Tirtsa, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: puis il acheta à Shémer la colline de Samarie pour 6 000 pièces d’argent ; il la fortifia et y construisit une ville, qu’il appela Samarie, d’après le nom de Shémer, l’ancien propriétaire de la colline.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Omri fit ce que l’Eternel considère comme mal ; il agit encore plus mal que tous ses prédécesseurs. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: Il imita en tout l’exemple de Jéroboam, fils de Nebath, il entraîna le peuple d’Israël dans le péché, en sorte qu’ils irritèrent l’Eternel leur Dieu par leur idolâtrie.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'Les autres faits et gestes d’Omri, ainsi que la vaillance dont il fit preuve, tout cela est cité dans le livre des Annales des rois d’Israël. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: Lorsqu’il rejoignit ses ancêtres décédés il fut enseveli à Samarie et son fils Achab lui succéda sur le trône.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Le règne d’Achab sur Israël
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: La trente-huitième année du règne d’Asa, roi de Juda, Achab, fils d’Omri, devint roi d’Israël. Il régna sur Israël à Samarie pendant vingt-deux ans
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '16.29 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: De 874 à 853 av. J.-C.
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'Achab, fils d’Omri, fit ce que l’Eternel considère comme mal et fut pire que tous ses prédécesseurs. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: Non content d’imiter les péchés de Jéroboam
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '16.31 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Voir '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1 R 12.29-30
        metadata:
          usfm: 1KI.12.29+1KI.12.30
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: ', fils de Nebath, il épousa encore Jézabel, fille d’Ethbaal, le roi des Sidoniens'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '16.31 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: C’est-à-dire des Phéniciens (
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '5.20'
        metadata:
          usfm: 1KI.5.20
      - type: text
        text: ).
    marker-yv: yv-n
  - type: text
    text: ', et alla jusqu’à rendre un culte au dieu Baal et à se prosterner devant lui. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'Il construisit un temple en l’honneur de Baal à Samarie et y dressa un autel. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: Il érigea aussi un poteau sacré à la déesse Ashéra. Par tous ses actes, il irrita l’Eternel, le Dieu d’Israël, plus que tous les rois d’Israël qui l’avaient précédé.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: C’est sous son règne qu’un certain Hiel de Béthel rebâtit Jéricho. La pose des fondations coûta la vie à son fils aîné Abiram et lorsqu’on en posa les portes, son cadet Segoub mourut. Cela arriva conformément à la parole que l’Eternel avait prononcée par l’intermédiaire de Josué, fils de Noun
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '16.34 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Voir '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Jos 6.26
        metadata:
          usfm: JOS.6.26
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: .
