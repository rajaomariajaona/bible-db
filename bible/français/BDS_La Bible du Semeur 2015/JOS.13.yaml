document_id: JOS.13,21
type_code: fra
verses:
  '1':
  - type: usfm
    marker: ms1
    children:
    - type: text
      text: Le partage du pays
    marker-yv: yv-h
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Les territoires restant à conquérir
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: Josué était devenu vieux
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '13.1 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Il avait entre 90 et 100 ans. Caleb en avait 85 (
        - type: usfm
          marker: ref
          children:
          - type: text
            text: '14.10'
        - type: text
          text: ).
      marker-yv: yv-n
    - type: text
      text: '. L’Eternel lui dit : Te voilà âgé à présent, et il reste encore un grand pays à conquérir. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: et toutes les villes de Sihôn, roi des Amoréens qui avait régné à Heshbôn, jusqu’à la frontière des Ammonites
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '13.10 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Nb 21.21-32 ; Dt 2.26-37 ; Nb 32.3.
      marker-yv: yv-n
    - type: text
      text: '. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'Il comprend aussi le pays de Galaad et le territoire des Gueshouriens et des Maakathiens, le mont Hermon et tout le Basan jusqu’à Salka : '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'dans le Basan, c’est l’ensemble du royaume de Og, le dernier des Rephaïm qui a régné à Ashtaroth et à Edréi. Moïse a vaincu ces rois et les a dépossédés de leurs territoires. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'Toutefois les Israélites n’ont pas dépossédé les Gueshouriens et les Maakathiens, si bien qu’ils ont habité jusqu’à aujourd’hui au milieu d’Israël. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: A la tribu de Lévi, et à elle seule, il ne donna pas de patrimoine. En effet, ce sont les sacrifices consumés par le feu qui appartiennent à l’Eternel, le Dieu d’Israël, qui constituent son bien comme Dieu le lui a déclaré
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '13.14 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Voir '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: Dt 18.1-8
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: .
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Le territoire de la tribu de Ruben
    marker-yv: yv-h
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'Le territoire que Moïse avait attribué aux familles de la tribu de Ruben '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 's’étend depuis la ville d’Aroër au bord du torrent de l’Arnon et la ville située au milieu de cette vallée. Il comprenait tout le plateau autour de Médeba, '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'Heshbôn et toutes les bourgades du plateau qui en dépendaient, c’est-à-dire Dibôn, Bamoth-Baal, Beth-Baal-Meôn, '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'Yahats, Qedémoth, Méphaath, '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'Qiryataïm, Sibma, Tséreth-Hashahar sur la montagne qui domine la vallée, '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'Voici le territoire qui reste : tous les districts des Philistins et le territoire des Gueshouriens'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '13.2 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Peuplade habitant le sud de la Philistie du côté de l’Egypte. David les combattit pendant son séjour à Tsiqlag (
        - type: usfm
          marker: ref
          children:
          - type: text
            text: 1 S 27.8
        - type: text
          text: ).
      marker-yv: yv-n
    - type: text
      text: ', '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: 'Beth-Peor, les pentes du Pisga et Beth-Hayeshimoth. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: 'En outre, il comprenait toutes les villes du plateau et tout le royaume de Sihôn, roi des Amoréens, qui avait régné à Heshbôn, que Moïse avait vaincu en même temps que les chefs de Madian, vassaux de Sihôn qui habitaient le pays : Evi, Réqem, Tsour, Hour et Réba. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: Parmi les victimes des Israélites il y avait aussi le devin Balaam, fils de Béor, qu’ils tuèrent par l’épée à ce moment-là
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '13.22 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Voir Nb 22 à 24. Balaam fut tué avec les Madianites qui tentèrent de séduire Israël par l’idolâtrie et la débauche (Nb 25 ; 31.8).
      marker-yv: yv-n
    - type: text
      text: '. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: La frontière des descendants de Ruben était constituée par le Jourdain et le territoire limitrophe. Tel était le patrimoine réparti entre les familles de Ruben, avec les villes qu’il comprenait et les villages qui en dépendaient.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Le territoire de la tribu de Gad
    marker-yv: yv-h
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: 'Moïse avait aussi donné sa part aux familles de la tribu de Gad. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: 'Leur territoire comprenait Yaezer, toutes les villes de Galaad et la moitié du pays des Ammonites jusqu’à Aroër près de Rabba. '
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: 'Il s’étendait depuis Heshbôn jusqu’à Ramath-Mitspé et Betonim, et depuis Mahanaïm jusqu’à la frontière de Debir. '
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: 'Enfin, dans la vallée du Jourdain, il comprenait Beth-Haram, Beth-Nimra, Soukkoth et Tsaphôn, qui formaient le reste du royaume de Sihôn, roi de Heshbôn, et toute la rive est du Jourdain qui constituait la frontière jusqu’au lac de Génézareth. '
  '28':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: Tel était le patrimoine réparti entre les familles de Gad avec les villes qu’il comprenait et les villages qui en dépendaient.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Le territoire de la demi-tribu de Manassé (domaine oriental)
    marker-yv: yv-h
  '29':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: 'Enfin Moïse avait donné sa part à la demi-tribu de Manassé, répartie selon ses familles. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: c’est-à-dire la région qui s’étend depuis le torrent du Shihor
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '13.3 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Le Wadi el-Arish qui coule à la limite est du Sinaï.
      marker-yv: yv-n
    - type: text
      text: ' qui coule en face de l’Egypte jusqu’au territoire d’Eqrôn au nord, toute cette contrée doit être considérée comme cananéenne. Elle comprend les cinq principautés philistines de Gaza, d’Ashdod, d’Ashkelôn, de Gath et d’Eqrôn, ainsi que le domaine des Avviens'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '13.3 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Sur les Avviens, voir '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: Dt 2.23
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: ' au sud. '
  '30':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '30'
    - type: text
      text: 'Leur territoire comprenait, à partir de Mahanaïm, le Basan, tout le royaume de Og, le roi du Basan, ainsi que les soixante bourgs de Yaïr en Basan. '
  '31':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '31'
    - type: text
      text: 'La moitié du pays de Galaad, Ashtaroth et Edréi, les anciennes capitales du royaume de Og en Basan, échurent aux descendants de Makir, fils de Manassé, à la moitié d’entre eux, réparties entre leurs familles. '
  '32':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '32'
    - type: text
      text: 'Telle fut la répartition faite par Moïse, lorsqu’il se trouvait dans les plaines de Moab, du côté oriental du Jourdain, en face de Jéricho. '
  '33':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '33'
    - type: text
      text: Il n’attribua pas de patrimoine à la tribu de Lévi. L’Eternel, le Dieu d’Israël, est lui-même leur patrimoine, comme il le leur a dit
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '13.33 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Voir Nb 18.20 ; Dt 18.2.
      marker-yv: yv-n
    - type: text
      text: .
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'Il reste également à conquérir tout le pays des Cananéens depuis Meara qui appartient aux Sidoniens jusqu’à Apheq à la frontière des Amoréens, '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: celui des Guibliens
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '13.5 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Habitants de l’ancienne Byblos (au nord de l’actuelle Beyrouth), des Phéniciens.
      marker-yv: yv-n
    - type: text
      text: ' et tout le Liban oriental, depuis Baal-Gad au pied du mont Hermon jusqu’à Lebo-Hamath, '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: ainsi que toute la région montagneuse située entre le Liban et Misrephoth-Maïm habitée par les Sidoniens
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '13.6 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Originaires de la ville phénicienne de Sidon.
      marker-yv: yv-n
    - type: text
      text: . Je déposséderai les populations de ce pays au fur et à mesure de l’avance des Israélites. En attendant, partage-leur déjà ce pays par le sort pour qu’ils le possèdent, comme je te l’ai ordonné.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Le territoire des tribus restées à l’est du Jourdain
    marker-yv: yv-h
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: Maintenant, procède au partage pour attribuer le pays en possession aux neuf tribus et à la demi-tribu de Manassé.
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: L’autre moitié de la tribu de Manassé, et les tribus de Ruben et de Gad, ont déjà reçu leur patrimoine. Moïse, serviteur de l’Eternel, le leur a attribué à l’est du Jourdain
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '13.8 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Voir Nb 32.28, 32 ; Dt 3.18-20. Cf. '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: Jos 1.12-15
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: '. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'Il s’étend jusqu’à Aroër, sur le bord du torrent de l’Arnon et jusqu’à la ville située au milieu de la vallée et comprend tout le plateau de Médeba jusqu’à Dibôn '
