document_id: JOB.39,21
type_code: fra
verses:
  '1':
  - type: text
    content: Connais-tu le moment ╵où les chamois enfantent ?
  - type: text
    content: Et as-tu observé ╵les biches en travail ?
  '10':
  - type: text
    content: Lui feras-tu suivre un sillon ╵en l’attachant avec des cordes ?
  - type: text
    content: Va-t-il traîner la herse ╵derrière toi dans les vallons ?
  '11':
  - type: text
    content: Mettras-tu ta confiance ╵dans sa force extraordinaire ?
  - type: text
    content: Et lui remettras-tu ╵le soin de tes travaux ?
  '12':
  - type: text
    content: Compteras-tu sur lui ╵pour rapporter ton grain
  - type: text
    content: et l’amasser ╵sur l’aire de battage ?
  '13':
  - type: text
    content: Les ailes de l’autruche ╵se déploient avec joie,
  - type: text
    content: mais son aile et ses plumes ╵ne sont pas comparables ╵à celles des cigognes.
  '14':
  - type: text
    content: Or l’autruche abandonne ╵ses œufs dans la poussière,
  - type: text
    content: et laisse au sable chaud ╵le soin de les couver,
  '15':
  - type: text
    content: ne pensant pas à ceux ╵qui marcheraient dessus,
  - type: text
    content: aux animaux sauvages ╵qui les piétineraient.
  '16':
  - type: text
    content: Elle est dure pour ses petits ╵comme s’ils n’étaient pas les siens,
  - type: text
    content: et elle ne s’inquiète pas ╵d’avoir peiné en vain.
  '17':
  - type: text
    content: Pourquoi ? Parce que Dieu ╵l’a privée de sagesse,
  - type: text
    content: et qu’il ne lui a pas donné ╵l’intelligence.
  '18':
  - type: text
    content: Mais qu’elle se redresse ╵et prenne son élan,
  - type: text
    content: pour elle c’est un jeu ╵de laisser derrière elle ╵cheval et cavalier.
  '19':
  - type: text
    content: Serait-ce toi qui donnes ╵la puissance au cheval ?
  - type: text
    content: Ou est-ce toi qui pares ╵son cou d’une crinière ?
  '2':
  - type: text
    content: As-tu compté combien de mois ╵dure leur gestation ?
  - type: text
    content: Et connais-tu l’époque ╵où elles mettent bas,
  '20':
  - type: text
    content: Ou le fais-tu bondir ╵comme la sauterelle ?
  - type: text
    content: Son fier hennissement ╵inspire la frayeur !
  '21':
  - type: text
    content: Dans le vallon, il piaffe, ╵tout joyeux de sa force.
  - type: text
    content: Le voilà qui s’élance ╵en plein dans la mêlée.
  '22':
  - type: text
    content: Il se rit de la peur ╵et ne s’effraie de rien.
  - type: text
    content: Il ne recule pas ╵en face de l’épée,
  '23':
  - type: text
    content: lorsqu’au-dessus de lui ╵cliquette le carquois,
  - type: text
    content: la lance étincelante ╵ou bien le javelot.
  '24':
  - type: text
    content: Tout frémissant d’ardeur, ╵il dévore l’espace,
  - type: text
    content: il ne tient plus en place ╵dès qu’il a entendu ╵le son du cor.
  '25':
  - type: text
    content: 'Dès qu’il entend la charge, ╵il hennit : « En avant »,'
  - type: text
    content: lorsqu’il est loin encore, ╵il flaire la bataille,
  - type: text
    content: la voix tonitruante ╵des commandants de troupes ╵et les cris des guerriers.
  '26':
  - type: text
    content: Serait-ce grâce ╵à ton intelligence ╵que l’épervier prend son essor
  - type: text
    content: et qu’il déploie ses ailes ╵en direction du sud
  - type: note
    content: L’épervier migrateur s’arrête dans cette région au cours de son vol vers le sud au début de l’hiver.
  - type: text
    content: '  ?'
  '27':
  - type: text
    content: Serait-ce à ton commandement ╵que l’aigle monte dans les airs
  - type: text
    content: et qu’il bâtit son nid ╵sur les sommets ?
  '28':
  - type: text
    content: Il fait du rocher sa demeure ╵et y passe la nuit,
  - type: text
    content: il établit sa forteresse ╵sur une dent rocheuse.
  '29':
  - type: text
    content: De là-haut, il épie sa proie,
  - type: text
    content: de loin, il l’aperçoit.
  '3':
  - type: text
    content: quand elles s’accroupissent, ╵déposent leurs petits
  - type: text
    content: et sont délivrées des douleurs ?
  '30':
  - type: text
    content: Ses petits s’abreuvent de sang.
  - type: text
    content: Où que soient les cadavres, ╵il est présent
  - type: note
    content: Voir Mt 24.28 ; Lc 17.37.
  - type: text
    content: .
  '4':
  - type: text
    content: Leurs faons se fortifient, ╵grandissant en plein air
  - type: text
    content: et ils s’en vont loin d’elles ╵pour ne plus revenir.
  '5':
  - type: text
    content: Qui a laissé l’onagre ╵courir en liberté ?
  - type: text
    content: Qui a rompu les liens ╵qui retenaient l’âne sauvage ?
  '6':
  - type: text
    content: Moi je lui ai donné ╵le désert pour demeure
  - type: text
    content: et des plateaux salés
  - type: note
    content: Les terres salées sont opposées aux terres à fruits (Ps 107.34). L’âne sauvage se nourrit des herbes salées croissant dans les steppes d’Arabie et de Syrie.
  - type: text
    content: ' ╵pour résidence.'
  '7':
  - type: text
    content: Il ne veut rien savoir ╵des villes populeuses,
  - type: text
    content: et il n’entend pas les cris ╵du conducteur de l’âne.
  '8':
  - type: text
    content: Il parcourt les montagnes ╵pour trouver sa pâture,
  - type: text
    content: à la recherche de toute verdure.
  '9':
  - type: text
    content: L’aurochs
  - type: note
    content: L’urus ou l’aurochs, variété éteinte aujourd’hui, était un animal grand et puissant, souvent pris comme symbole de la force (Nb 23.22 ; 24.8 ; Dt 33.17).
  - type: text
    content: ' daignera-t-il ╵se mettre à ton service ?'
  - type: text
    content: Passera-t-il ses nuits ╵auprès de ta mangeoire ?
