document_id: JOB.39
type_code: fra
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Connais-tu le moment ╵où les chamois enfantent ?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et as-tu observé ╵les biches en travail ?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: As-tu compté combien de mois ╵dure leur gestation ?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et connais-tu l’époque ╵où elles mettent bas,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: quand elles s’accroupissent, ╵déposent leurs petits
- type: usfm
  marker: q1
  children:
  - type: text
    text: et sont délivrées des douleurs ?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Leurs faons se fortifient, ╵grandissant en plein air
- type: usfm
  marker: q1
  children:
  - type: text
    text: et ils s’en vont loin d’elles ╵pour ne plus revenir.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Qui a laissé l’onagre ╵courir en liberté ?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Qui a rompu les liens ╵qui retenaient l’âne sauvage ?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Moi je lui ai donné ╵le désert pour demeure
- type: usfm
  marker: q1
  children:
  - type: text
    text: et des plateaux salés
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '39.6 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Les terres salées sont opposées aux terres à fruits (
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ps 107.34
        metadata:
          usfm: PSA.107.34
      - type: text
        text: ). L’âne sauvage se nourrit des herbes salées croissant dans les steppes d’Arabie et de Syrie.
    marker-yv: yv-n
  - type: text
    text: ' ╵pour résidence.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Il ne veut rien savoir ╵des villes populeuses,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et il n’entend pas les cris ╵du conducteur de l’âne.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Il parcourt les montagnes ╵pour trouver sa pâture,
- type: usfm
  marker: q1
  children:
  - type: text
    text: à la recherche de toute verdure.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: L’aurochs
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '39.9 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: L’
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'urus '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ou l’
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'aurochs, '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: variété éteinte aujourd’hui, était un animal grand et puissant, souvent pris comme symbole de la force (Nb 23.22 ; 24.8 ; Dt 33.17).
    marker-yv: yv-n
  - type: text
    text: ' daignera-t-il ╵se mettre à ton service ?'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Passera-t-il ses nuits ╵auprès de ta mangeoire ?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Lui feras-tu suivre un sillon ╵en l’attachant avec des cordes ?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Va-t-il traîner la herse ╵derrière toi dans les vallons ?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Mettras-tu ta confiance ╵dans sa force extraordinaire ?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et lui remettras-tu ╵le soin de tes travaux ?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Compteras-tu sur lui ╵pour rapporter ton grain
- type: usfm
  marker: q1
  children:
  - type: text
    text: et l’amasser ╵sur l’aire de battage ?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Les ailes de l’autruche ╵se déploient avec joie,
- type: usfm
  marker: q1
  children:
  - type: text
    text: mais son aile et ses plumes ╵ne sont pas comparables ╵à celles des cigognes.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Or l’autruche abandonne ╵ses œufs dans la poussière,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et laisse au sable chaud ╵le soin de les couver,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: ne pensant pas à ceux ╵qui marcheraient dessus,
- type: usfm
  marker: q1
  children:
  - type: text
    text: aux animaux sauvages ╵qui les piétineraient.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Elle est dure pour ses petits ╵comme s’ils n’étaient pas les siens,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et elle ne s’inquiète pas ╵d’avoir peiné en vain.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Pourquoi ? Parce que Dieu ╵l’a privée de sagesse,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et qu’il ne lui a pas donné ╵l’intelligence.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Mais qu’elle se redresse ╵et prenne son élan,
- type: usfm
  marker: q1
  children:
  - type: text
    text: pour elle c’est un jeu ╵de laisser derrière elle ╵cheval et cavalier.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Serait-ce toi qui donnes ╵la puissance au cheval ?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ou est-ce toi qui pares ╵son cou d’une crinière ?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Ou le fais-tu bondir ╵comme la sauterelle ?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Son fier hennissement ╵inspire la frayeur !
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Dans le vallon, il piaffe, ╵tout joyeux de sa force.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Le voilà qui s’élance ╵en plein dans la mêlée.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: Il se rit de la peur ╵et ne s’effraie de rien.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Il ne recule pas ╵en face de l’épée,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: lorsqu’au-dessus de lui ╵cliquette le carquois,
- type: usfm
  marker: q1
  children:
  - type: text
    text: la lance étincelante ╵ou bien le javelot.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: Tout frémissant d’ardeur, ╵il dévore l’espace,
- type: usfm
  marker: q1
  children:
  - type: text
    text: il ne tient plus en place ╵dès qu’il a entendu ╵le son du cor.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Dès qu’il entend la charge, ╵il hennit : « En avant »,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: lorsqu’il est loin encore, ╵il flaire la bataille,
- type: usfm
  marker: q1
  children:
  - type: text
    text: la voix tonitruante ╵des commandants de troupes ╵et les cris des guerriers.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: Serait-ce grâce ╵à ton intelligence ╵que l’épervier prend son essor
- type: usfm
  marker: q1
  children:
  - type: text
    text: et qu’il déploie ses ailes ╵en direction du sud
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '39.26 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: L’épervier migrateur s’arrête dans cette région au cours de son vol vers le sud au début de l’hiver.
    marker-yv: yv-n
  - type: text
    text: '  ?'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: Serait-ce à ton commandement ╵que l’aigle monte dans les airs
- type: usfm
  marker: q1
  children:
  - type: text
    text: et qu’il bâtit son nid ╵sur les sommets ?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: Il fait du rocher sa demeure ╵et y passe la nuit,
- type: usfm
  marker: q1
  children:
  - type: text
    text: il établit sa forteresse ╵sur une dent rocheuse.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: De là-haut, il épie sa proie,
- type: usfm
  marker: q1
  children:
  - type: text
    text: de loin, il l’aperçoit.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: Ses petits s’abreuvent de sang.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Où que soient les cadavres, ╵il est présent
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '39.30 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Voir Mt 24.28 ; Lc 17.37.
    marker-yv: yv-n
  - type: text
    text: .
