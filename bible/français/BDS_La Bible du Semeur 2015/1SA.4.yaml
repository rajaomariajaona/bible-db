document_id: 1SA.4,21
type_code: fra
verses:
  '1':
  - type: text
    content: Samuel transmettait à tout Israël la parole que l’Eternel lui adressait.
  - type: heading
    content: Le coffre de l’alliance aux mains des Philistins
  - type: text
    content: '[En ce temps-là, les Philistins se rassemblèrent pour faire la guerre à Israël et'
  - type: note
    content: Les mots entre crochets ne se trouvent que dans l’ancienne version grecque.
  - type: text
    content: '] les Israélites se mirent en campagne pour les affronter. Ils dressèrent leur camp près d’Eben-Ezer et les Philistins établirent le leur à Apheq'
  - type: note
    content: Eben-Ezer et Apheq, deux lieux situés à quelque 40 kilomètres au nord-ouest de Jérusalem et distants de quelques kilomètres.
  - type: text
    content: '. '
  '10':
  - type: text
    content: 'Les Philistins livrèrent bataille et Israël fut vaincu. Chacun s’enfuit sous sa tente et ce fut une très lourde défaite : Israël perdit trente mille hommes. '
  '11':
  - type: text
    content: Le coffre de Dieu fut pris par les Philistins et les deux fils d’Eli, Hophni et Phinéas, moururent.
  - type: heading
    content: La mort d’Eli et de sa belle-fille
  '12':
  - type: text
    content: 'Un homme de Benjamin s’échappa du champ de bataille et courut jusqu’à Silo le jour même ; il avait déchiré ses vêtements et couvert sa tête de poussière en signe de deuil. '
  '13':
  - type: text
    content: 'Au moment où il arriva, Eli était assis sur son siège, aux aguets près de la route, car il était très inquiet au sujet du coffre de Dieu. L’homme vint annoncer la nouvelle dans la ville, et tous les habitants se mirent à pousser de grands cris. '
  '14':
  - type: text
    content: 'Quand Eli entendit ces cris, il demanda : Que signifie ce tumulte de la foule ?'
  - type: text
    content: 'L’homme se dépêcha de venir lui annoncer la nouvelle. '
  '15':
  - type: text
    content: 'Or Eli était âgé de quatre-vingt-dix-huit ans, il avait les yeux éteints, il était complètement aveugle. '
  '16':
  - type: text
    content: 'L’homme dit à Eli : J’arrive du champ de bataille. Je m’en suis enfui aujourd’hui même.'
  - type: text
    content: – Et que s’est-il passé, mon fils ? lui demanda Eli.
  '17':
  - type: text
    content: 'Le messager lui répondit : Israël a pris la fuite devant les Philistins ; nous avons subi une terrible défaite ; même tes deux fils Hophni et Phinéas sont morts, et le coffre de Dieu a été pris.'
  '18':
  - type: text
    content: Lorsque le messager fit mention du coffre de Dieu, Eli tomba de son siège à la renverse, à côté de la porte du sanctuaire, il se brisa la nuque et mourut, car il était âgé et lourd. Il avait dirigé Israël pendant quarante ans.
  '19':
  - type: text
    content: Quand sa belle-fille, la femme de Phinéas qui arrivait au terme de sa grossesse, entendit que le coffre de Dieu avait été pris et que son beau-père ainsi que son mari étaient morts, elle chancela
  - type: note
    content: 'Autre traduction : elle s’accroupit.'
  - type: text
    content: ' et, brusquement prise de contractions, elle accoucha. '
  '2':
  - type: text
    content: 'Les Philistins se rangèrent en ordre de bataille pour affronter les Israélites. Le combat s’amplifia, les Philistins défirent les Israélites et tuèrent dans leurs rangs environ quatre mille hommes sur le champ de bataille. '
  '20':
  - type: text
    content: 'Comme elle était près de mourir, les femmes qui l’entouraient lui dirent : Rassure-toi : c’est un garçon.'
  - type: text
    content: 'Mais elle y fut indifférente et ne répondit rien. '
  '21':
  - type: text
    content: 'Elle donna à l’enfant le nom d’I-Kabod (Plus de gloire), en expliquant : La gloire divine a quitté Israël.'
  - type: text
    content: Elle pensait au coffre de Dieu qui avait été pris, à son beau-père et à son mari.
  '22':
  - type: text
    content: 'Elle s’écria encore : Oui, la gloire a quitté Israël, car le coffre de Dieu a été pris.'
  '3':
  - type: text
    content: 'Lorsque le peuple regagna le camp, les responsables d’Israël se demandèrent : Pourquoi l’Eternel nous a-t-il fait battre aujourd’hui par les Philistins ? Allons chercher le coffre de l’alliance de l’Eternel à Silo et ramenons-le au milieu de nous pour qu’il nous délivre de nos ennemis.'
  '4':
  - type: text
    content: On envoya donc des gens à Silo et ils en ramenèrent le coffre de l’alliance de l’Eternel, le Seigneur des armées célestes qui trône entre les chérubins
  - type: note
    content: Voir Ex 25.22.
  - type: text
    content: . Les deux fils d’Eli, Hophni et Phinéas, accompagnèrent le coffre de l’alliance de Dieu.
  '5':
  - type: text
    content: 'Dès que le coffre arriva au camp, tous les Israélites poussèrent de si grands cris de joie que la terre en fut ébranlée. '
  '6':
  - type: text
    content: 'En entendant ces acclamations, les Philistins se demandèrent ce que signifiaient ces grands cris dans le camp des Hébreux. Ils apprirent que le coffre de l’Eternel était arrivé au camp. '
  '7':
  - type: text
    content: 'Alors ils prirent peur car ils se disaient : Dieu est venu dans le camp des Hébreux ! Et ils ajoutaient : Malheur à nous ! Il n’en était pas ainsi auparavant. '
  '8':
  - type: text
    content: Malheur à nous ! Qui nous délivrera de ces dieux puissants ? Ce sont ces dieux-là
  - type: note
    content: Les Philistins ne croyaient pas en un Dieu unique.
  - type: text
    content: ' qui ont infligé toutes sortes de coups aux Egyptiens dans le désert'
  - type: note
    content: Allusion aux fléaux infligés à l’Egypte (Ex 7 à 11) et à l’anéantissement de l’armée égyptienne (Ex 14) dont la nouvelle s’était répandue en Canaan (Jos 2.10).
  - type: text
    content: '. '
  '9':
  - type: text
    content: Philistins, soyez forts, soyez des hommes, sinon vous deviendrez les esclaves des Hébreux comme ils ont été les vôtres. Soyez donc des hommes et combattez !
