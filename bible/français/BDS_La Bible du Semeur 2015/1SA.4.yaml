document_id: 1SA.4
type_code: fra
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Samuel transmettait à tout Israël la parole que l’Eternel lui adressait.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Le coffre de l’alliance aux mains des Philistins
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: text
    text: '[En ce temps-là, les Philistins se rassemblèrent pour faire la guerre à Israël et'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '4.1 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Les mots entre crochets ne se trouvent que dans l’ancienne version grecque.
    marker-yv: yv-n
  - type: text
    text: '] les Israélites se mirent en campagne pour les affronter. Ils dressèrent leur camp près d’Eben-Ezer et les Philistins établirent le leur à Apheq'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '4.1 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Eben-Ezer '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'et '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'Apheq, '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: deux lieux situés à quelque 40 kilomètres au nord-ouest de Jérusalem et distants de quelques kilomètres.
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Les Philistins se rangèrent en ordre de bataille pour affronter les Israélites. Le combat s’amplifia, les Philistins défirent les Israélites et tuèrent dans leurs rangs environ quatre mille hommes sur le champ de bataille. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Lorsque le peuple regagna le camp, les responsables d’Israël se demandèrent : Pourquoi l’Eternel nous a-t-il fait battre aujourd’hui par les Philistins ? Allons chercher le coffre de l’alliance de l’Eternel à Silo et ramenons-le au milieu de nous pour qu’il nous délivre de nos ennemis.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: On envoya donc des gens à Silo et ils en ramenèrent le coffre de l’alliance de l’Eternel, le Seigneur des armées célestes qui trône entre les chérubins
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '4.4 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Voir '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ex 25.22
        metadata:
          usfm: EXO.25.22
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: . Les deux fils d’Eli, Hophni et Phinéas, accompagnèrent le coffre de l’alliance de Dieu.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Dès que le coffre arriva au camp, tous les Israélites poussèrent de si grands cris de joie que la terre en fut ébranlée. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'En entendant ces acclamations, les Philistins se demandèrent ce que signifiaient ces grands cris dans le camp des Hébreux. Ils apprirent que le coffre de l’Eternel était arrivé au camp. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Alors ils prirent peur car ils se disaient : Dieu est venu dans le camp des Hébreux ! Et ils ajoutaient : Malheur à nous ! Il n’en était pas ainsi auparavant. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Malheur à nous ! Qui nous délivrera de ces dieux puissants ? Ce sont ces dieux-là
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '4.8 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Les Philistins ne croyaient pas en un Dieu unique.
    marker-yv: yv-n
  - type: text
    text: ' qui ont infligé toutes sortes de coups aux Egyptiens dans le désert'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '4.8 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Allusion aux fléaux infligés à l’Egypte (Ex 7 à 11) et à l’anéantissement de l’armée égyptienne (
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ex 14
        metadata:
          usfm: EXO.14
      - type: text
        text: ) dont la nouvelle s’était répandue en Canaan (
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Jos 2.10
        metadata:
          usfm: JOS.2.10
      - type: text
        text: ).
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Philistins, soyez forts, soyez des hommes, sinon vous deviendrez les esclaves des Hébreux comme ils ont été les vôtres. Soyez donc des hommes et combattez !
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Les Philistins livrèrent bataille et Israël fut vaincu. Chacun s’enfuit sous sa tente et ce fut une très lourde défaite : Israël perdit trente mille hommes. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Le coffre de Dieu fut pris par les Philistins et les deux fils d’Eli, Hophni et Phinéas, moururent.
- type: usfm
  marker: s1
  children:
  - type: text
    text: La mort d’Eli et de sa belle-fille
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Un homme de Benjamin s’échappa du champ de bataille et courut jusqu’à Silo le jour même ; il avait déchiré ses vêtements et couvert sa tête de poussière en signe de deuil. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Au moment où il arriva, Eli était assis sur son siège, aux aguets près de la route, car il était très inquiet au sujet du coffre de Dieu. L’homme vint annoncer la nouvelle dans la ville, et tous les habitants se mirent à pousser de grands cris. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Quand Eli entendit ces cris, il demanda : Que signifie ce tumulte de la foule ?'
- type: usfm
  marker: p
  children:
  - type: text
    text: 'L’homme se dépêcha de venir lui annoncer la nouvelle. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Or Eli était âgé de quatre-vingt-dix-huit ans, il avait les yeux éteints, il était complètement aveugle. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'L’homme dit à Eli : J’arrive du champ de bataille. Je m’en suis enfui aujourd’hui même.'
- type: usfm
  marker: p
  children:
  - type: text
    text: – Et que s’est-il passé, mon fils ? lui demanda Eli.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Le messager lui répondit : Israël a pris la fuite devant les Philistins ; nous avons subi une terrible défaite ; même tes deux fils Hophni et Phinéas sont morts, et le coffre de Dieu a été pris.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Lorsque le messager fit mention du coffre de Dieu, Eli tomba de son siège à la renverse, à côté de la porte du sanctuaire, il se brisa la nuque et mourut, car il était âgé et lourd. Il avait dirigé Israël pendant quarante ans.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Quand sa belle-fille, la femme de Phinéas qui arrivait au terme de sa grossesse, entendit que le coffre de Dieu avait été pris et que son beau-père ainsi que son mari étaient morts, elle chancela
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '4.19 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Autre traduction : '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: elle s’accroupit.
    marker-yv: yv-n
  - type: text
    text: ' et, brusquement prise de contractions, elle accoucha. '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Comme elle était près de mourir, les femmes qui l’entouraient lui dirent : Rassure-toi : c’est un garçon.'
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Mais elle y fut indifférente et ne répondit rien. '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Elle donna à l’enfant le nom d’I-Kabod (Plus de gloire), en expliquant : La gloire divine a quitté Israël.'
- type: usfm
  marker: p
  children:
  - type: text
    text: Elle pensait au coffre de Dieu qui avait été pris, à son beau-père et à son mari.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Elle s’écria encore : Oui, la gloire a quitté Israël, car le coffre de Dieu a été pris.'
