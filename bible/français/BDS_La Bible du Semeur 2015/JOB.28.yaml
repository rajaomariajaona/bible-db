document_id: JOB.28,21
type_code: fra
verses:
  '1':
  - type: heading
    content: Qui peut avoir la sagesse ?
  - type: text
    content: Il existe des lieux ╵d’où l’on extrait l’argent,
  - type: text
    content: il y a des endroits ╵où l’on affine l’or.
  '10':
  - type: text
    content: 'Au milieu des rochers, ╵l’homme ouvre des tranchées :'
  - type: text
    content: rien de précieux ╵n’échappe à son regard.
  '11':
  - type: text
    content: Il arrête le cours des eaux
  - type: note
    content: Pour éviter que les cours d’eau souterrains ne minent les murs des galeries ou les inondent. Les documents anciens révèlent l’existence de mines dès l’époque de Joseph. Le fer était travaillé déjà au temps de Gn 4.22.
  - type: text
    content: et amène au grand jour ╵les richesses cachées.
  '12':
  - type: text
    content: Mais, quant à la sagesse, ╵où peut-on la trouver ?
  - type: text
    content: Où donc l’intelligence ╵a-t-elle sa demeure ?
  '13':
  - type: text
    content: L’homme ne connaît pas ╵quelle en est la valeur,
  - type: text
    content: et elle est introuvable ╵au pays des vivants.
  '14':
  - type: text
    content: 'L’abîme affirme : ╵« Elle n’est pas ici. »'
  - type: text
    content: 'La mer déclare : ╵« Elle n’est point chez moi. »'
  '15':
  - type: text
    content: On ne peut l’acquérir ╵avec de l’or massif,
  - type: text
    content: on ne peut l’acheter ╵en pesant de l’argent
  - type: note
    content: On pesait l’argent au moment du paiement (Gn 23.16).
  - type: text
    content: .
  '16':
  - type: text
    content: Elle ne se compare pas ╵avec de l’or d’Ophir,
  - type: text
    content: ni avec le précieux onyx, ╵ou le saphir.
  '17':
  - type: text
    content: Ni le verre, ni l’or, ni le cristal ╵n’ont autant de valeur,
  - type: text
    content: on ne l’échange pas ╵contre un vase d’or fin.
  '18':
  - type: text
    content: Le corail et l’albâtre
  - type: note
    content: 'Autre traduction : le cristal.'
  - type: text
    content: ' ╵ne sont rien auprès d’elle.'
  - type: text
    content: La sagesse vaut plus ╵que des perles précieuses.
  '19':
  - type: text
    content: La topaze éthiopienne ╵n’égale pas son prix,
  - type: text
    content: et l’or le plus fin même ╵n’atteint pas sa valeur.
  '2':
  - type: text
    content: On sait comment extraire ╵le fer de la poussière,
  - type: text
    content: fondre le minerai ╵pour en tirer le cuivre.
  '20':
  - type: text
    content: Mais alors, la sagesse, ╵d’où provient-elle ?
  - type: text
    content: Et où l’intelligence ╵a-t-elle sa demeure ?
  '21':
  - type: text
    content: Elle se cache aux yeux ╵de tout être vivant,
  - type: text
    content: elle se dissimule ╵à l’œil vif des oiseaux.
  '22':
  - type: text
    content: 'L’abîme et la mort disent :'
  - type: text
    content: « Nous avons seulement ╵entendu parler d’elle. »
  '23':
  - type: text
    content: Car c’est Dieu seul qui sait ╵le chemin qu’elle emprunte.
  - type: text
    content: Oui, il en connaît la demeure.
  '24':
  - type: text
    content: Car son regard parcourt ╵le monde entier,
  - type: text
    content: et tout ce qui se passe ╵sous le ciel, il le voit.
  '25':
  - type: text
    content: C’est lui qui a fixé ╵la pesanteur du vent,
  - type: text
    content: et donné leur mesure ╵aux eaux des mers.
  '26':
  - type: text
    content: Lorsqu’il a établi ╵une loi pour la pluie,
  - type: text
    content: et tracé un chemin ╵aux éclairs, au tonnerre,
  '27':
  - type: text
    content: c’est alors qu’il l’a vue ╵et l’a décrite.
  - type: text
    content: Il a établi la sagesse
  - type: note
    content: 'Quelques manuscrits hébreux ont : il a examiné la sagesse.'
  - type: text
    content: ' ╵et l’a sondée.'
  '28':
  - type: text
    content: 'Puis il a dit à l’homme :'
  - type: text
    content: « La crainte du Seigneur, ╵voilà la vraie sagesse !
  - type: text
    content: Se détourner du mal, ╵voilà l’intelligence
  - type: note
    content: Voir Ps 111.10 ; Pr 1.7 ; 9.10.
  - type: text
    content: '  ! »'
  '3':
  - type: text
    content: On fait reculer les frontières ╵des ténèbres sous terre,
  - type: text
    content: on explore les mines,
  - type: text
    content: on va chercher les pierres ╵dans les plus opaques ténèbres.
  '4':
  - type: text
    content: Dans les galeries que l’on perce, ╵loin des lieux habités,
  - type: text
    content: à l’endroit où le pied ╵a perdu tout appui,
  - type: text
    content: les mineurs se balancent, ╵suspendus dans le vide, ╵loin des autres humains
  - type: note
    content: Autrefois, les mineurs travaillaient assis sur un siège suspendu à une corde.
  - type: text
    content: .
  '5':
  - type: text
    content: La terre qui nous donne ╵le pain qui nous nourrit
  - type: text
    content: se voit bouleversée ╵jusqu’en ses profondeurs, ╵tout comme par un feu
  - type: note
    content: L’activité des mineurs est comparée aux ravages d’un incendie.
  - type: text
    content: .
  '6':
  - type: text
    content: C’est dans ses roches ╵qu’on trouve les saphirs
  - type: text
    content: et la poussière d’or.
  '7':
  - type: text
    content: L’oiseau de proie ignore ╵quel en est le sentier,
  - type: text
    content: et l’œil de l’épervier ╵ne l’a pas repéré.
  '8':
  - type: text
    content: Les plus fiers animaux ╵ne l’ont jamais foulé,
  - type: text
    content: le lion n’y passe pas.
  '9':
  - type: text
    content: On s’attaque au granit,
  - type: text
    content: on remue les montagnes ╵jusqu’en leurs fondements.
