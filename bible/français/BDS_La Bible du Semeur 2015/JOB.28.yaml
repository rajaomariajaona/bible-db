document_id: JOB.28,21
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Qui peut avoir la sagesse ?
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: Il existe des lieux ╵d’où l’on extrait l’argent,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: il y a des endroits ╵où l’on affine l’or.
  '10':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Au milieu des rochers, ╵l’homme ouvre des tranchées :'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: rien de précieux ╵n’échappe à son regard.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Il arrête le cours des eaux
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '28.11 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Pour éviter que les cours d’eau souterrains ne minent les murs des galeries ou les inondent. Les documents anciens révèlent l’existence de mines dès l’époque de Joseph. Le fer était travaillé déjà au temps de '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: Gn 4.22
        - type: text
          text: .
      marker-yv: yv-n
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et amène au grand jour ╵les richesses cachées.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mais, quant à la sagesse, ╵où peut-on la trouver ?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Où donc l’intelligence ╵a-t-elle sa demeure ?
  '13':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: L’homme ne connaît pas ╵quelle en est la valeur,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et elle est introuvable ╵au pays des vivants.
  '14':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'L’abîme affirme : ╵« Elle n’est pas ici. »'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'La mer déclare : ╵« Elle n’est point chez moi. »'
  '15':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: On ne peut l’acquérir ╵avec de l’or massif,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: on ne peut l’acheter ╵en pesant de l’argent
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '28.15 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: On pesait l’argent au moment du paiement (
        - type: usfm
          marker: ref
          children:
          - type: text
            text: Gn 23.16
        - type: text
          text: ).
      marker-yv: yv-n
    - type: text
      text: .
  '16':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Elle ne se compare pas ╵avec de l’or d’Ophir,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ni avec le précieux onyx, ╵ou le saphir.
  '17':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ni le verre, ni l’or, ni le cristal ╵n’ont autant de valeur,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: on ne l’échange pas ╵contre un vase d’or fin.
  '18':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Le corail et l’albâtre
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '28.18 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Autre traduction : '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: le cristal.
      marker-yv: yv-n
    - type: text
      text: ' ╵ne sont rien auprès d’elle.'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: La sagesse vaut plus ╵que des perles précieuses.
  '19':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: La topaze éthiopienne ╵n’égale pas son prix,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et l’or le plus fin même ╵n’atteint pas sa valeur.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: On sait comment extraire ╵le fer de la poussière,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: fondre le minerai ╵pour en tirer le cuivre.
  '20':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mais alors, la sagesse, ╵d’où provient-elle ?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et où l’intelligence ╵a-t-elle sa demeure ?
  '21':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Elle se cache aux yeux ╵de tout être vivant,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: elle se dissimule ╵à l’œil vif des oiseaux.
  '22':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'L’abîme et la mort disent :'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: « Nous avons seulement ╵entendu parler d’elle. »
  '23':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Car c’est Dieu seul qui sait ╵le chemin qu’elle emprunte.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Oui, il en connaît la demeure.
  '24':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Car son regard parcourt ╵le monde entier,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et tout ce qui se passe ╵sous le ciel, il le voit.
  '25':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: C’est lui qui a fixé ╵la pesanteur du vent,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et donné leur mesure ╵aux eaux des mers.
  '26':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Lorsqu’il a établi ╵une loi pour la pluie,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et tracé un chemin ╵aux éclairs, au tonnerre,
  '27':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: c’est alors qu’il l’a vue ╵et l’a décrite.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Il a établi la sagesse
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '28.27 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Quelques manuscrits hébreux ont : '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: il a examiné la sagesse.
      marker-yv: yv-n
    - type: text
      text: ' ╵et l’a sondée.'
  '28':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Puis il a dit à l’homme :'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: « La crainte du Seigneur, ╵voilà la vraie sagesse !
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Se détourner du mal, ╵voilà l’intelligence
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '28.28 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Voir Ps 111.10 ; Pr 1.7 ; 9.10.
      marker-yv: yv-n
    - type: text
      text: '  ! »'
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: On fait reculer les frontières ╵des ténèbres sous terre,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: on explore les mines,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: on va chercher les pierres ╵dans les plus opaques ténèbres.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Dans les galeries que l’on perce, ╵loin des lieux habités,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: à l’endroit où le pied ╵a perdu tout appui,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: les mineurs se balancent, ╵suspendus dans le vide, ╵loin des autres humains
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '28.4 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Autrefois, les mineurs travaillaient assis sur un siège suspendu à une corde.
      marker-yv: yv-n
    - type: text
      text: .
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: La terre qui nous donne ╵le pain qui nous nourrit
  - type: usfm
    marker: q1
    children:
    - type: text
      text: se voit bouleversée ╵jusqu’en ses profondeurs, ╵tout comme par un feu
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '28.5 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: L’activité des mineurs est comparée aux ravages d’un incendie.
      marker-yv: yv-n
    - type: text
      text: .
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: C’est dans ses roches ╵qu’on trouve les saphirs
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et la poussière d’or.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: L’oiseau de proie ignore ╵quel en est le sentier,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et l’œil de l’épervier ╵ne l’a pas repéré.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Les plus fiers animaux ╵ne l’ont jamais foulé,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: le lion n’y passe pas.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: On s’attaque au granit,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: on remue les montagnes ╵jusqu’en leurs fondements.
