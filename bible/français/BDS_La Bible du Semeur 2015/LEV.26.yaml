document_id: LEV.26,21
type_code: fra
verses:
  '1':
  - type: usfm
    marker: ms1
    children:
    - type: text
      text: Les sanctions de l’alliance
    marker-yv: yv-h
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Les bénédictions
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: Vous ne vous fabriquerez pas d’idoles, vous ne vous dresserez ni statue ni stèle, et vous ne mettrez pas dans votre pays de pierre sculptée avec des figures pour vous prosterner devant elle ; car je suis l’Eternel, votre Dieu
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '26.1 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Voir '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: '19.4'
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: .
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'Vous pourrez vivre longtemps de la récolte précédente, et vous devrez sortir l’ancienne pour engranger la nouvelle. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'Je mettrai ma demeure au milieu de vous, et je ne vous rejetterai pas. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'Je marcherai au milieu de vous : je serai votre Dieu et vous serez mon peuple'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '26.12 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Cité en 2 Co 6.16 ; Ap 21.3.
      marker-yv: yv-n
    - type: text
      text: '. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: Je suis l’Eternel votre Dieu, qui vous ai fait sortir d’Egypte et vous ai libérés de l’esclavage. J’ai brisé les barres de votre joug et je vous ai fait marcher la tête haute.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Les malédictions
    marker-yv: yv-h
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'Mais si vous ne m’écoutez pas, et si vous n’appliquez pas tous ces commandements, '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'si vous méprisez mes ordonnances et si vous rejetez mes lois, pour ne plus appliquer tous mes commandements, si vous violez ainsi mon alliance, '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'voici comment j’agirai envers vous : j’interviendrai contre vous pour vous plonger dans l’épouvante et vous envoyer le dépérissement et la fièvre qui consumeront vos yeux et vous mineront. Vous répandrez en vain vos semences, car vos ennemis s’empareront de vos récoltes. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'Je me retournerai contre vous : vous serez battus par vos ennemis ; ceux qui vous haïssent domineront sur vous ; vous fuirez même sans que personne ne vous poursuive.'
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'Si malgré cela vous ne m’écoutez pas encore, je vous infligerai, pour vos péchés, une correction sept fois plus sévère. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'Je briserai la force dont vous vous enorgueillissez ; je rendrai le ciel au-dessus de vous dur comme du fer, et votre terre comme du bronze. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: Vous observerez les jours de repos que je vous ai prescrits et vous révérerez mon sanctuaire. Je suis l’Eternel.
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: Vous épuiserez vos forces en vains efforts ; vos terres ne produiront plus rien et les vergers ne porteront plus de fruit.
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: 'Si vous continuez à me résister en refusant de m’écouter, je vous infligerai sept fois plus de coups pour vous punir de vos péchés. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: Je lâcherai contre vous les bêtes sauvages qui vous raviront vos enfants, déchireront vos bêtes et vous réduiront à un petit nombre, en sorte que vos chemins deviendront déserts
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '26.22 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Les fauves se multiplient dans les campagnes dépeuplées (2 R 17.26 ; Ez 5.17).
      marker-yv: yv-n
    - type: text
      text: .
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: 'Et si, malgré ces châtiments, vous ne vous laissez pas corriger par moi, si vous vous opposez à moi, '
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: 'moi aussi, je m’opposerai à vous et je vous frapperai moi aussi sept fois plus à cause de vos péchés. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: 'Je déclencherai des guerres contre vous pour vous punir d’avoir transgressé l’alliance. Si vous vous réfugiez dans vos villes, je déchaînerai la peste au milieu de vous, et vous serez livrés à la merci de l’ennemi. '
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: Je vous couperai les vivres, de sorte que dix femmes pourront cuire tout votre pain dans un seul four, elles vous le distribueront par rations pesées, et il n’apaisera pas votre faim.
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: 'Si malgré cela vous ne m’écoutez pas, si vous continuez à vous opposer à moi, '
  '28':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: 'je m’opposerai à vous avec fureur et je vous corrigerai encore sept fois plus à cause de vos péchés. '
  '29':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: 'Vous mangerez vos propres enfants. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: Si vous suivez mes ordonnances, si vous obéissez à mes commandements et si vous les appliquez
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '26.3 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Pour les v. 3-5, voir '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: Dt 11.13-15
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: ', '
  '30':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '30'
    - type: text
      text: 'Je dévasterai vos lieux de culte sur les hauteurs, j’abattrai vos autels à parfum, j’entasserai vos cadavres sur les cadavres de vos idoles, et je vous prendrai en aversion. '
  '31':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '31'
    - type: text
      text: 'Je réduirai vos villes en ruine, je ravagerai vos sanctuaires, je ne me laisserai pas apaiser par l’odeur de vos sacrifices. '
  '32':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '32'
    - type: text
      text: 'Je dévasterai moi-même le pays, de sorte que vos ennemis venus l’occuper en seront stupéfaits. '
  '33':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '33'
    - type: text
      text: Quant à vous, je vous disperserai parmi des peuples étrangers et je vous poursuivrai avec l’épée, votre pays sera dévasté et vos villes deviendront des monceaux de ruines.
  '34':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '34'
    - type: text
      text: Alors la terre jouira d’années de repos durant tout le temps qu’elle sera désolée et que vous serez dans le pays de vos ennemis ; enfin elle chômera et jouira de son repos
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '26.34 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Voir '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: 2 Ch 36.21
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: '. '
  '35':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '35'
    - type: text
      text: Durant toute cette période où elle demeurera dévastée, elle se reposera pour les années de repos dont vous l’aurez frustrée le temps que vous l’aurez habitée.
  '36':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '36'
    - type: text
      text: 'Quant à ceux d’entre vous qui survivront, je plongerai leur cœur dans l’angoisse en exil, chez leurs ennemis ; au seul bruit d’une feuille, ils fuiront comme on fuit devant l’épée de l’ennemi et ils tomberont sans que personne les poursuive. '
  '37':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '37'
    - type: text
      text: 'Ils trébucheront l’un sur l’autre comme lorsqu’on fuit devant l’épée sans que personne ne les poursuive, et ils seront incapables de résister à leurs ennemis. '
  '38':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '38'
    - type: text
      text: 'Vous périrez chez des peuples étrangers et le pays de vos ennemis vous dévorera. '
  '39':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '39'
    - type: text
      text: Ceux d’entre vous qui survivront dépériront dans le pays de vos ennemis à cause de leurs péchés et aussi à cause de ceux de leurs ancêtres.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: L’Eternel maintiendra son alliance
    marker-yv: yv-h
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: je vous donnerai vos pluies en leur saison
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '26.4 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Les deux saisons de pluies nécessaires à la fertilité du sol : celles d’automne (octobre-décembre) pour ameublir le sol avant les semailles, celles de printemps pour faire grossir les grains et les fruits.'
      marker-yv: yv-n
    - type: text
      text: ', la terre livrera ses produits et les vergers donneront leurs fruits. '
  '40':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '40'
    - type: text
      text: 'Alors ils reconnaîtront leur faute et celle de leurs ancêtres, qu’ils ont commises en se rebellant contre moi et en s’opposant à moi. '
  '41':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '41'
    - type: text
      text: C’est à cause de cela qu’à mon tour je m’opposerai à eux et que je les enverrai dans le pays de leurs ennemis. Si alors leur cœur incirconcis s’humilie et qu’ils reconnaissent que leur châtiment est juste
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '26.41 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Autres traductions : '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'qu’ils reconnaissent leurs fautes, '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'ou : '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: qu’ils fassent amende honorable pour leurs fautes.
      marker-yv: yv-n
    - type: text
      text: ', '
  '42':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '42'
    - type: text
      text: j’agirai en fonction de mon alliance avec Jacob, de mon alliance avec Isaac, et de mon alliance avec Abraham, et j’interviendrai en faveur du pays
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '26.42 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Voir Gn 12.7 ; 17.7-8 ; 26.3-4 ; 28.13-14.
      marker-yv: yv-n
    - type: text
      text: '. '
  '43':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '43'
    - type: text
      text: 'Car le pays sera abandonné par eux et il jouira du repos, après sa dévastation, pendant leur absence. Ils reconnaîtront la justice de leur châtiment, parce qu’ils auront méprisé mes commandements et rejeté mes lois. '
  '44':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '44'
    - type: text
      text: 'Et pourtant, même alors, lorsqu’ils seront dans le pays de leurs ennemis, je ne les rejetterai pas et je ne les prendrai pas en aversion au point de les exterminer et de rompre mon alliance avec eux ; car je suis l’Eternel leur Dieu. '
  '45':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '45'
    - type: text
      text: 'J’agirai en leur faveur conformément à l’alliance conclue avec leurs ancêtres que j’ai fait sortir d’Egypte aux yeux des autres peuples pour être leur Dieu : je suis l’Eternel.'
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Conclusion
    marker-yv: yv-h
  '46':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '46'
    - type: text
      text: Telles sont les ordonnances, les articles de droit et les lois que l’Eternel établit entre lui et les Israélites au mont Sinaï, par l’intermédiaire de Moïse.
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: Vous serez encore en train de battre le blé quand viendra le temps de la vendange et celle-ci durera jusqu’aux semailles
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '26.5 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'La moisson sera si abondante que le battage du blé se prolongera jusqu’en septembre, et la vendange si productive qu’elle durera jusqu’à fin octobre (voir '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: Am 9.13
        - type: text
          text: ).
      marker-yv: yv-n
    - type: text
      text: '  ; vous mangerez du pain à satiété, et vous habiterez en sécurité dans votre pays. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'Je ferai régner la paix dans le pays ; quand vous vous coucherez, rien ne viendra troubler votre sommeil. Je ferai disparaître du pays les animaux nuisibles, et l’épée ne traversera pas votre territoire. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'Vous poursuivrez vos ennemis, et ils succomberont devant vous sous les coups de l’épée. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'Cinq d’entre vous en poursuivront cent, et cent d’entre vous en mettront dix mille en fuite, et vos ennemis tomberont devant vous sous les coups de l’épée. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'Je prendrai soin de vous, je vous rendrai féconds et vous multiplierai, et je maintiendrai mon alliance avec vous. '
