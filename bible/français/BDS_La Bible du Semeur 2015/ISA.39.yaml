document_id: ISA.39
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: L’ambassade babylonienne
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: (2 R 20.12-19)
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Vers cette même époque, Merodak-Baladân, fils de Baladân, roi de Babylone, fit parvenir des lettres et des présents à Ezéchias, car il avait appris sa maladie et son rétablissement
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '39.1 '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'Merodak-Baladân '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: a gouverné Babylone de 721 à 710 et de 705 à 703 av. J.-C. C’est sans doute vers 713 (selon d’autres vers 703) qu’il faut situer cette ambassade qui avait pour but de se faire de Juda un allié contre l’Assyrie.
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Enchanté de la venue de ses envoyés, Ezéchias leur fit visiter le bâtiment où l’on conservait les objets précieux, l’argent et l’or, les aromates et les huiles parfumées. Il leur montra aussi tout son arsenal militaire et tout ce que contenaient ses trésors ; il n’y eut rien dans son palais ni dans tout son domaine qu’Ezéchias ne leur fasse voir.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Alors le prophète Esaïe se rendit auprès du roi Ezéchias et lui demanda : Qu’ont dit ces gens et d’où sont-ils venus te rendre visite ?'
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Ezéchias lui répondit : Ils sont venus de très loin, de Babylone, pour me voir.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Esaïe reprit : Qu’ont-ils vu dans ton palais ?'
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Ezéchias répondit : Ils ont vu tout ce qui se trouve dans mon palais. Je ne leur ai rien caché de mes trésors.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Alors Esaïe dit à Ezéchias : Ecoute ce que dit le Seigneur des armées célestes : '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Un jour viendra où tout ce qui est dans ton palais et tout ce que tes ancêtres ont amassé jusqu’à ce jour sera emporté à Babylone ; il n’en restera rien ici, déclare l’Eternel. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Plusieurs de tes propres descendants, issus de toi, seront emmenés et deviendront serviteurs dans le palais du roi de Babylone
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '39.7 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Voir Dn 1.1-7 ; 2 R 24.10-16 ; 2 Ch 36.10.
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Ezéchias répondit à Esaïe : La parole de l’Eternel que tu viens de me transmettre est bonne. Car, ajouta-t-il, nous aurons au moins la paix et la sécurité tant que je vivrai.'
