document_id: JHN.19
type_code: fra
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Alors Pilate donna l’ordre d’emmener Jésus et de le faire fouetter. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Les soldats lui mirent sur la tête une couronne tressée de rameaux épineux et ils l’affublèrent d’un manteau de couleur pourpre
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '19.2 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Voir note '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Mc 15.17
        metadata:
          usfm: MRK.15.17
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'et, s’avançant au-devant de lui, ils s’écriaient : Salut, roi des Juifs !'
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Et ils lui donnaient des gifles. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Pilate sortit de nouveau du palais et dit aux Juifs : Voilà ! je vous le fais amener ici dehors pour que vous sachiez que je ne trouve en lui aucune raison de le condamner.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Jésus parut donc dehors, portant la couronne d’épines et le manteau de couleur pourpre.
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Pilate leur dit : Voici l’homme.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'En le voyant, les chefs des prêtres et les gardes se mirent à crier : Crucifie-le ! Crucifie-le !'
- type: usfm
  marker: p
  children:
  - type: text
    text: – Vous n’avez qu’à le prendre, leur lança Pilate, et le crucifier vous-mêmes. Moi, je ne trouve aucune raison de le condamner.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Les Juifs répliquèrent : Nous, nous avons une Loi, et d’après cette Loi, il doit mourir, car il a prétendu être le Fils de Dieu.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Ces propos effrayèrent vivement Pilate. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Il rentra au palais de justice et demanda à Jésus : D’où viens-tu ?'
- type: usfm
  marker: p
  children:
  - type: text
    text: Mais Jésus ne lui donna aucune réponse.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Alors Pilate lui dit : Comment ! C’est à moi que tu refuses de parler ? Tu ne sais donc pas que j’ai le pouvoir de te relâcher et celui de te crucifier ?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Jésus lui répondit : '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Tu n’aurais aucun pouvoir sur moi, s’il ne t’avait été donné d’en haut. Voilà pourquoi celui qui me livre entre tes mains est plus coupable que toi.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'A partir de ce moment, Pilate cherchait à le relâcher. Mais les Juifs redoublèrent leurs cris : Si tu relâches cet homme, tu n’es pas l’ami de César'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '19.12 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: « Ami de César » était un titre honorifique officiel décerné à certains fonctionnaires impériaux, particulièrement méritants, qui impliquait certains avantages.
    marker-yv: yv-n
  - type: text
    text: . Si quelqu’un se fait roi, il s’oppose à César.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Quand il eut entendu ces mots, Pilate fit amener Jésus dehors et s’assit à son tribunal, au lieu appelé « la place Pavée » (en hébreu « Gabbatha »). '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: C’était le vendredi de la semaine de fête pascale, vers midi
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '19.14 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Certains comprennent 6 h du matin. C’est-à-dire le moment où l’on commençait à immoler, au Temple, les agneaux pour le repas pascal.
    marker-yv: yv-n
  - type: text
    text: '. Pilate dit aux Juifs : Voici votre roi !'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Mais ils se mirent à crier : A mort ! A mort ! Crucifie-le !'
- type: usfm
  marker: p
  children:
  - type: text
    text: '– C’est votre roi : est-ce que je dois le crucifier ? répondit Pilate.'
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Les chefs des prêtres répliquèrent : Nous n’avons pas d’autre roi que César.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Alors Pilate le leur livra pour qu’il soit crucifié.
- type: usfm
  marker: s1
  children:
  - type: text
    text: La mort de Jésus
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: (Mt 27.32-56 ; Mc 15.21-41 ; Lc 23.26-49)
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Ils s’emparèrent donc de Jésus. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Celui-ci, portant lui-même sa croix, sortit de la ville pour se rendre à l’endroit appelé « le lieu du crâne » (en hébreu : « Golgotha »). '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: C’est là qu’ils le crucifièrent, lui et deux autres. On plaça une croix de chaque côté de la sienne. Celle de Jésus était au milieu.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Pilate fit placer un écriteau que l’on fixa au-dessus de la croix. Il portait cette inscription : « Jésus de Nazareth, le roi des Juifs ». '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Comme l’endroit où Jésus avait été crucifié se trouvait près de la ville, beaucoup de Juifs lurent l’inscription écrite en hébreu, en latin et en grec.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Les chefs des prêtres protestèrent auprès de Pilate : Il ne fallait pas mettre « le roi des Juifs », mais « Cet homme a dit : Je suis le roi des Juifs ».'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Pilate répliqua : Ce que j’ai écrit restera écrit.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: Lorsque les soldats eurent crucifié Jésus, ils prirent ses vêtements et en firent quatre parts, une pour chacun d’eux. Restait la tunique qui était sans couture, tissée tout d’une seule pièce de haut en bas.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Les soldats se dirent entre eux : Au lieu de la déchirer, tirons au sort pour savoir qui l’aura'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '19.24 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: D’après la loi romaine, les soldats chargés de l’exécution avaient le droit de se partager les vêtements du condamné.
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: p
  children:
  - type: text
    text: 'C’est ainsi que s’accomplit cette prophétie de l’Ecriture :'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: qt
    children:
    - type: text
      text: Ils se sont partagé mes habits
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: qt
    children:
    - type: text
      text: et ils ont tiré au sort ma tunique
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '19.24 '
    - type: usfm
      marker: ft
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ps 22.19
        metadata:
          usfm: PSA.22.19
      - type: text
        text: ' .'
    marker-yv: yv-n
  - type: usfm
    marker: qt
    children:
    - type: text
      text: .
- type: usfm
  marker: p
  children:
  - type: text
    text: C’est exactement ce que firent les soldats.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: Près de la croix de Jésus se tenaient sa mère, la sœur de sa mère, Marie, femme de Clopas, et Marie de Magdala.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'En voyant sa mère et, à côté d’elle, le disciple qu’il aimait, Jésus dit à sa mère : '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Voici ton fils.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'Puis il dit au disciple : '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Voici ta mère.
- type: usfm
  marker: p
  children:
  - type: text
    text: A partir de ce moment-là, le disciple la prit chez lui.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'Après cela, Jésus, sachant que désormais tout était achevé, dit, pour que l’Ecriture soit accomplie : '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: J’ai soif.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: Près de là se trouvait un vase rempli de vinaigre. On attacha donc une éponge imbibée de ce vinaigre au bout d’une branche d’hysope, et on l’approcha de la bouche de Jésus.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'Quand il eut goûté le vinaigre, Jésus dit : '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Tout est accompli.
- type: usfm
  marker: p
  children:
  - type: text
    text: Il pencha la tête et rendit l’esprit.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: Comme on était à la veille du sabbat, et de plus, d’un sabbat particulièrement solennel, les Juifs voulaient éviter que les cadavres restent en croix durant la fête. Ils allèrent trouver Pilate pour lui demander de faire briser les jambes
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '19.31 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Afin d’accélérer la mort, puisque les condamnés prenaient appui sur les jambes pour pouvoir respirer.
    marker-yv: yv-n
  - type: text
    text: ' des suppliciés et de faire enlever les corps. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'Les soldats vinrent donc et brisèrent les jambes au premier des criminels crucifiés avec Jésus, puis à l’autre. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: 'Quand ils arrivèrent à Jésus, ils constatèrent qu’il était déjà mort et ils ne lui brisèrent pas les jambes. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: L’un des soldats lui enfonça sa lance dans le côté, et aussitôt il en sortit du sang et de l’eau.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: 'Celui qui rapporte ces faits, les a vus de ses propres yeux et son témoignage est vrai. Il sait parfaitement qu’il dit la vérité pour que, vous aussi, vous croyiez. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: 'En effet, tout cela est arrivé pour que se réalise cette parole de l’Ecriture : '
  - type: usfm
    marker: qt
    children:
    - type: text
      text: Aucun de ses os ne sera brisé
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '19.36 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Ex 12.46 ; Nb 9.12.
    marker-yv: yv-n
  - type: usfm
    marker: qt
    children:
    - type: text
      text: .
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: 'De plus, un autre texte déclare : '
  - type: usfm
    marker: qt
    children:
    - type: text
      text: Ils tourneront leurs regards vers celui qu’ils ont transpercé
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '19.37 '
    - type: usfm
      marker: ft
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Za 12.10
        metadata:
          usfm: ZEC.12.10
      - type: text
        text: .
    marker-yv: yv-n
  - type: usfm
    marker: qt
    children:
    - type: text
      text: .
- type: usfm
  marker: s1
  children:
  - type: text
    text: Jésus mis au tombeau
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: (Mt 27.57-61 ; Mc 15.42-47 ; Lc 23.50-56)
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: text
    text: 'Après ces événements, Joseph, de la ville d’Arimathée, alla demander à Pilate la permission d’enlever le corps de Jésus. Il était aussi disciple du Seigneur, mais il s’en cachait par peur des Juifs. Pilate y consentit. Joseph alla donc prendre le corps de Jésus. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '39'
  - type: text
    text: Nicodème vint également. C’était lui qui, auparavant, était allé trouver Jésus de nuit. Il apporta environ trente kilogrammes d’un mélange de myrrhe et d’aloès
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '19.39 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Parfums, tirés de plantes, que l’on répandait sur les bandes de lin entourant le corps afin de l’embaumer.
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '40'
  - type: text
    text: 'Tous deux prirent donc le corps de Jésus et l’enveloppèrent de linges funéraires en y mettant des aromates, selon les usages funéraires des Juifs. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '41'
  - type: text
    text: 'Non loin de l’endroit où Jésus avait été crucifié, il y avait un jardin dans lequel se trouvait un tombeau neuf où personne n’avait encore été enseveli. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '42'
  - type: text
    text: Comme c’était, pour les Juifs, le soir de la préparation du sabbat, ils déposèrent Jésus dans cette tombe parce qu’elle était toute proche.
