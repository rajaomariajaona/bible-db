document_id: JHN.19,21
type_code: fra
verses:
  '1':
  - type: text
    content: 'Alors Pilate donna l’ordre d’emmener Jésus et de le faire fouetter. '
  '10':
  - type: text
    content: 'Alors Pilate lui dit : Comment ! C’est à moi que tu refuses de parler ? Tu ne sais donc pas que j’ai le pouvoir de te relâcher et celui de te crucifier ?'
  '11':
  - type: text
    content: 'Jésus lui répondit : '
  - type: text
    content: Tu n’aurais aucun pouvoir sur moi, s’il ne t’avait été donné d’en haut. Voilà pourquoi celui qui me livre entre tes mains est plus coupable que toi.
  '12':
  - type: text
    content: 'A partir de ce moment, Pilate cherchait à le relâcher. Mais les Juifs redoublèrent leurs cris : Si tu relâches cet homme, tu n’es pas l’ami de César'
  - type: note
    content: « Ami de César » était un titre honorifique officiel décerné à certains fonctionnaires impériaux, particulièrement méritants, qui impliquait certains avantages.
  - type: text
    content: . Si quelqu’un se fait roi, il s’oppose à César.
  '13':
  - type: text
    content: 'Quand il eut entendu ces mots, Pilate fit amener Jésus dehors et s’assit à son tribunal, au lieu appelé « la place Pavée » (en hébreu « Gabbatha »). '
  '14':
  - type: text
    content: C’était le vendredi de la semaine de fête pascale, vers midi
  - type: note
    content: Certains comprennent 6 h du matin. C’est-à-dire le moment où l’on commençait à immoler, au Temple, les agneaux pour le repas pascal.
  - type: text
    content: '. Pilate dit aux Juifs : Voici votre roi !'
  '15':
  - type: text
    content: 'Mais ils se mirent à crier : A mort ! A mort ! Crucifie-le !'
  - type: text
    content: '– C’est votre roi : est-ce que je dois le crucifier ? répondit Pilate.'
  - type: text
    content: 'Les chefs des prêtres répliquèrent : Nous n’avons pas d’autre roi que César.'
  '16':
  - type: text
    content: Alors Pilate le leur livra pour qu’il soit crucifié.
  - type: heading
    content: La mort de Jésus
  - type: heading
    content: (Mt 27.32-56 ; Mc 15.21-41 ; Lc 23.26-49)
  - type: text
    content: 'Ils s’emparèrent donc de Jésus. '
  '17':
  - type: text
    content: 'Celui-ci, portant lui-même sa croix, sortit de la ville pour se rendre à l’endroit appelé « le lieu du crâne » (en hébreu : « Golgotha »). '
  '18':
  - type: text
    content: C’est là qu’ils le crucifièrent, lui et deux autres. On plaça une croix de chaque côté de la sienne. Celle de Jésus était au milieu.
  '19':
  - type: text
    content: 'Pilate fit placer un écriteau que l’on fixa au-dessus de la croix. Il portait cette inscription : « Jésus de Nazareth, le roi des Juifs ». '
  '2':
  - type: text
    content: Les soldats lui mirent sur la tête une couronne tressée de rameaux épineux et ils l’affublèrent d’un manteau de couleur pourpre
  - type: note
    content: Voir note Mc 15.17.
  - type: text
    content: ' '
  '20':
  - type: text
    content: Comme l’endroit où Jésus avait été crucifié se trouvait près de la ville, beaucoup de Juifs lurent l’inscription écrite en hébreu, en latin et en grec.
  '21':
  - type: text
    content: 'Les chefs des prêtres protestèrent auprès de Pilate : Il ne fallait pas mettre « le roi des Juifs », mais « Cet homme a dit : Je suis le roi des Juifs ».'
  '22':
  - type: text
    content: 'Pilate répliqua : Ce que j’ai écrit restera écrit.'
  '23':
  - type: text
    content: Lorsque les soldats eurent crucifié Jésus, ils prirent ses vêtements et en firent quatre parts, une pour chacun d’eux. Restait la tunique qui était sans couture, tissée tout d’une seule pièce de haut en bas.
  '24':
  - type: text
    content: 'Les soldats se dirent entre eux : Au lieu de la déchirer, tirons au sort pour savoir qui l’aura'
  - type: note
    content: D’après la loi romaine, les soldats chargés de l’exécution avaient le droit de se partager les vêtements du condamné.
  - type: text
    content: .
  - type: text
    content: 'C’est ainsi que s’accomplit cette prophétie de l’Ecriture :'
  - type: text
    content: Ils se sont partagé mes habits
  - type: text
    content: et ils ont tiré au sort ma tunique
  - type: text
    content: ' '
  - type: note
    content: Ps 22.19 .
  - type: text
    content: .
  - type: text
    content: C’est exactement ce que firent les soldats.
  '25':
  - type: text
    content: Près de la croix de Jésus se tenaient sa mère, la sœur de sa mère, Marie, femme de Clopas, et Marie de Magdala.
  '26':
  - type: text
    content: 'En voyant sa mère et, à côté d’elle, le disciple qu’il aimait, Jésus dit à sa mère : '
  - type: text
    content: Voici ton fils.
  '27':
  - type: text
    content: 'Puis il dit au disciple : '
  - type: text
    content: Voici ta mère.
  - type: text
    content: A partir de ce moment-là, le disciple la prit chez lui.
  '28':
  - type: text
    content: 'Après cela, Jésus, sachant que désormais tout était achevé, dit, pour que l’Ecriture soit accomplie : '
  - type: text
    content: J’ai soif.
  '29':
  - type: text
    content: Près de là se trouvait un vase rempli de vinaigre. On attacha donc une éponge imbibée de ce vinaigre au bout d’une branche d’hysope, et on l’approcha de la bouche de Jésus.
  '3':
  - type: text
    content: 'et, s’avançant au-devant de lui, ils s’écriaient : Salut, roi des Juifs !'
  - type: text
    content: 'Et ils lui donnaient des gifles. '
  '30':
  - type: text
    content: 'Quand il eut goûté le vinaigre, Jésus dit : '
  - type: text
    content: Tout est accompli.
  - type: text
    content: Il pencha la tête et rendit l’esprit.
  '31':
  - type: text
    content: Comme on était à la veille du sabbat, et de plus, d’un sabbat particulièrement solennel, les Juifs voulaient éviter que les cadavres restent en croix durant la fête. Ils allèrent trouver Pilate pour lui demander de faire briser les jambes
  - type: note
    content: Afin d’accélérer la mort, puisque les condamnés prenaient appui sur les jambes pour pouvoir respirer.
  - type: text
    content: ' des suppliciés et de faire enlever les corps. '
  '32':
  - type: text
    content: 'Les soldats vinrent donc et brisèrent les jambes au premier des criminels crucifiés avec Jésus, puis à l’autre. '
  '33':
  - type: text
    content: 'Quand ils arrivèrent à Jésus, ils constatèrent qu’il était déjà mort et ils ne lui brisèrent pas les jambes. '
  '34':
  - type: text
    content: L’un des soldats lui enfonça sa lance dans le côté, et aussitôt il en sortit du sang et de l’eau.
  '35':
  - type: text
    content: 'Celui qui rapporte ces faits, les a vus de ses propres yeux et son témoignage est vrai. Il sait parfaitement qu’il dit la vérité pour que, vous aussi, vous croyiez. '
  '36':
  - type: text
    content: 'En effet, tout cela est arrivé pour que se réalise cette parole de l’Ecriture : '
  - type: text
    content: Aucun de ses os ne sera brisé
  - type: note
    content: Ex 12.46 ; Nb 9.12.
  - type: text
    content: .
  - type: text
    content: ' '
  '37':
  - type: text
    content: 'De plus, un autre texte déclare : '
  - type: text
    content: Ils tourneront leurs regards vers celui qu’ils ont transpercé
  - type: note
    content: Za 12.10.
  - type: text
    content: .
  - type: heading
    content: Jésus mis au tombeau
  - type: heading
    content: (Mt 27.57-61 ; Mc 15.42-47 ; Lc 23.50-56)
  '38':
  - type: text
    content: 'Après ces événements, Joseph, de la ville d’Arimathée, alla demander à Pilate la permission d’enlever le corps de Jésus. Il était aussi disciple du Seigneur, mais il s’en cachait par peur des Juifs. Pilate y consentit. Joseph alla donc prendre le corps de Jésus. '
  '39':
  - type: text
    content: Nicodème vint également. C’était lui qui, auparavant, était allé trouver Jésus de nuit. Il apporta environ trente kilogrammes d’un mélange de myrrhe et d’aloès
  - type: note
    content: Parfums, tirés de plantes, que l’on répandait sur les bandes de lin entourant le corps afin de l’embaumer.
  - type: text
    content: '. '
  '4':
  - type: text
    content: 'Pilate sortit de nouveau du palais et dit aux Juifs : Voilà ! je vous le fais amener ici dehors pour que vous sachiez que je ne trouve en lui aucune raison de le condamner.'
  '40':
  - type: text
    content: 'Tous deux prirent donc le corps de Jésus et l’enveloppèrent de linges funéraires en y mettant des aromates, selon les usages funéraires des Juifs. '
  '41':
  - type: text
    content: 'Non loin de l’endroit où Jésus avait été crucifié, il y avait un jardin dans lequel se trouvait un tombeau neuf où personne n’avait encore été enseveli. '
  '42':
  - type: text
    content: Comme c’était, pour les Juifs, le soir de la préparation du sabbat, ils déposèrent Jésus dans cette tombe parce qu’elle était toute proche.
  '5':
  - type: text
    content: Jésus parut donc dehors, portant la couronne d’épines et le manteau de couleur pourpre.
  - type: text
    content: 'Pilate leur dit : Voici l’homme.'
  '6':
  - type: text
    content: 'En le voyant, les chefs des prêtres et les gardes se mirent à crier : Crucifie-le ! Crucifie-le !'
  - type: text
    content: – Vous n’avez qu’à le prendre, leur lança Pilate, et le crucifier vous-mêmes. Moi, je ne trouve aucune raison de le condamner.
  '7':
  - type: text
    content: 'Les Juifs répliquèrent : Nous, nous avons une Loi, et d’après cette Loi, il doit mourir, car il a prétendu être le Fils de Dieu.'
  '8':
  - type: text
    content: 'Ces propos effrayèrent vivement Pilate. '
  '9':
  - type: text
    content: 'Il rentra au palais de justice et demanda à Jésus : D’où viens-tu ?'
  - type: text
    content: Mais Jésus ne lui donna aucune réponse.
