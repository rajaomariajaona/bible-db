document_id: JER.50
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Contre Babylone
  marker-yv: yv-h
- type: usfm
  marker: s2
  children:
  - type: text
    text: La chute de Babylone et le retour des exilés
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Voici le message que l’Eternel communiqua par le prophète Jérémie au sujet de Babylone et du pays des Chaldéens :'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Proclamez la nouvelle ╵parmi les peuples !
- type: usfm
  marker: q1
  children:
  - type: text
    text: Publiez-la !
- type: usfm
  marker: q1
  children:
  - type: text
    text: Elevez l’étendard !
- type: usfm
  marker: q1
  children:
  - type: text
    text: Oui, faites-la savoir ╵et ne la cachez pas !
- type: usfm
  marker: q1
  children:
  - type: text
    text: Dites que Babylone est prise,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Bel est couvert de honte,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Mardouk est tout épouvanté
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '50.2 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: Bel… Mardouk
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: ': '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'voir '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Es 46.1
        metadata:
          usfm: ISA.46.1
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ses statues sont honteuses,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et ses idoles sont dans l’épouvante.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Car un peuple ennemi, ╵du nord, vient t’attaquer
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '50.3 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Il s’agit certainement des Mèdes dont le royaume se trouvait au sud-est de Babylone. Le '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'septentrion '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: est peut-être une désignation symbolique de la direction d’où vient le malheur.
    marker-yv: yv-n
  - type: text
    text: '  ;'
- type: usfm
  marker: q1
  children:
  - type: text
    text: il transformera ton pays ╵en une terre dévastée
- type: usfm
  marker: q1
  children:
  - type: text
    text: où nul n’habitera.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Des hommes jusqu’aux bêtes, ╵tous partiront, ils s’en iront.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: En ce temps-là, ╵à cette époque,
- type: usfm
  marker: q1
  children:
  - type: text
    text: l’Eternel le déclare,
- type: usfm
  marker: q1
  children:
  - type: text
    text: les Israélites viendront ╵avec les Judéens,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ils marcheront en larmes
- type: usfm
  marker: q1
  children:
  - type: text
    text: et ils se tourneront ╵vers l’Eternel, leur Dieu.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Et ils s’informeront ╵du chemin qui mène à Sion,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ils tourneront ╵vers elle leurs regards.
- type: usfm
  marker: q1
  children:
  - type: text
    text: « Venez, se diront-ils, ╵attachons-nous à l’Eternel
- type: usfm
  marker: q1
  children:
  - type: text
    text: par une alliance éternelle ╵qu’on n’oubliera jamais. »
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Mon peuple était semblable ╵à des moutons perdus.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Leurs bergers les ont égarés,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ils les ont détournés ╵sur les montagnes.
- type: usfm
  marker: q1
  children:
  - type: text
    text: De montagne en colline,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ils allaient en oubliant leur bercail.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Ceux qui les rencontraient ╵en faisaient leur pâture.
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Leurs ennemis disaient :'
- type: usfm
  marker: q1
  children:
  - type: text
    text: « Nous ne nous mettrons pas en tort,
- type: usfm
  marker: q1
  children:
  - type: text
    text: puisqu’ils ont péché contre l’Eternel,
- type: usfm
  marker: q1
  children:
  - type: text
    text: lui qui avait été pour eux ╵comme un enclos où régnait la justice
- type: usfm
  marker: q1
  children:
  - type: text
    text: et en qui leurs ancêtres ╵avaient placé leur espérance. »
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Partez de Babylone
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '50.8 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Voir Es 48.20 ; 52.11. Repris en '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ap 18.4
        metadata:
          usfm: REV.18.4
      - type: text
        text: .
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: text
    text: et du pays des Chaldéens !
- type: usfm
  marker: q1
  children:
  - type: text
    text: Oui, sortez-en comme des boucs ╵en tête du troupeau !
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Car je vais susciter
- type: usfm
  marker: q1
  children:
  - type: text
    text: une coalition ╵de grandes nations
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '50.9 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Les Médo-Perses et leurs alliés (voir '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 51.27-28
        metadata:
          usfm: JER.51.27+JER.51.28
      - type: text
        text: ).
    marker-yv: yv-n
  - type: text
    text: ' des pays du nord'
- type: usfm
  marker: q1
  children:
  - type: text
    text: pour qu’elles viennent ╵attaquer Babylone.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Elles se rangeront ╵en bataille contre elle
- type: usfm
  marker: q1
  children:
  - type: text
    text: et s’en empareront.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Leurs flèches sont semblables ╵à d’habiles guerriers
- type: usfm
  marker: q1
  children:
  - type: text
    text: et elles ne reviennent pas à vide.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Et la Chaldée sera mise au pillage ;
- type: usfm
  marker: q1
  children:
  - type: text
    text: ceux qui la pilleront ╵se rassasieront bien,
- type: usfm
  marker: q1
  children:
  - type: text
    text: l’Eternel le déclare.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Ah ! vous pouvez bien vous réjouir, ╵exulter d’allégresse,
- type: usfm
  marker: q1
  children:
  - type: text
    text: vous qui avez pillé ╵mon patrimoine !
- type: usfm
  marker: q1
  children:
  - type: text
    text: Vous pouvez vous ébattre ╵comme une génisse foulant le blé
- type: usfm
  marker: q1
  children:
  - type: text
    text: et vous pouvez hennir ╵comme des étalons ;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: votre mère-patrie ╵est toute couverte de honte,
- type: usfm
  marker: q1
  children:
  - type: text
    text: celle qui vous a enfantés ╵connaît le déshonneur.
- type: usfm
  marker: q1
  children:
  - type: text
    text: La voici mise au dernier rang ╵de toutes les nations,
- type: usfm
  marker: q1
  children:
  - type: text
    text: devenue un désert, ╵une terre aride, une steppe.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: L’indignation de l’Eternel
- type: usfm
  marker: q1
  children:
  - type: text
    text: en a fait une terre ╵où tout est dévasté
- type: usfm
  marker: q1
  children:
  - type: text
    text: et où personne n’habite.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Tous ceux qui passeront ╵tout près de Babylone
- type: usfm
  marker: q1
  children:
  - type: text
    text: en seront effarés ╵et siffleront d’horreur ╵à la vue de toutes ses plaies.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Oui, vous tous les archers,
- type: usfm
  marker: q1
  children:
  - type: text
    text: rangez-vous en bataille ╵autour de Babylone,
- type: usfm
  marker: q1
  children:
  - type: text
    text: tirez contre elle,
- type: usfm
  marker: q1
  children:
  - type: text
    text: n’épargnez pas les flèches,
- type: usfm
  marker: q1
  children:
  - type: text
    text: car elle a péché contre l’Eternel.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Poussez des cris de guerre ╵de tous côtés contre elle !
- type: usfm
  marker: q1
  children:
  - type: text
    text: Elle se rend,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ses remparts sont tombés,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'ses murailles sont démolies :'
- type: usfm
  marker: q1
  children:
  - type: text
    text: c’est ici la rétribution ╵de l’Eternel contre elle.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Oui, rétribuez-la,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et faites-lui comme elle a fait !
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Eliminez de Babylone ╵à la fois le semeur
- type: usfm
  marker: q1
  children:
  - type: text
    text: et celui qui tient la faucille ╵au temps de la moisson !
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et devant l’épée meurtrière,
- type: usfm
  marker: q1
  children:
  - type: text
    text: chacun s’en retournera chez les siens,
- type: usfm
  marker: q1
  children:
  - type: text
    text: chacun fuira dans son pays
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '50.16 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Reprend '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Es 13.14
        metadata:
          usfm: ISA.13.14
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: '  !'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Israël est semblable ╵à une brebis isolée
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'pourchassée par des lions :'
- type: usfm
  marker: q1
  children:
  - type: text
    text: le premier l’a mangée, ╵ – c’est le roi d’Assyrie –
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'et le suivant ╵lui a broyé les os :'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Nabuchodonosor, ╵le roi de Babylone
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '50.17 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Les Assyriens ont détruit le royaume du Nord (prise de Samarie en 722 av. J.-C.) et les Babyloniens Juda (chute de Jérusalem en 587 av. J.-C.).
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Et c’est pourquoi ╵voici ce que déclare ╵le Seigneur des armées célestes, ╵Dieu d’Israël :'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Je vais rétribuer ╵le roi de Babylone ╵et son pays,
- type: usfm
  marker: q1
  children:
  - type: text
    text: tout comme j’ai rétribué ╵le roi de l’Assyrie
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '50.18 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Ninive, la capitale de l’Assyrie, est tombée en 612 av. J.-C. et l’Assyrie elle-même fut vaincue par une coalition des Mèdes et des Babyloniens en 609. Babylone sera vaincue par les Médo-Perses.
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Je ramènerai Israël ╵dans son enclos ;
- type: usfm
  marker: q1
  children:
  - type: text
    text: il paîtra de nouveau ╵sur le Carmel et au Basan,
- type: usfm
  marker: q1
  children:
  - type: text
    text: il se rassasiera
- type: usfm
  marker: q1
  children:
  - type: text
    text: sur les monts d’Ephraïm ╵et ceux de Galaad
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '50.19 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Territoire à l’est du Jourdain.
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: En ce temps-là, ╵à cette époque,
- type: usfm
  marker: q1
  children:
  - type: text
    text: l’Eternel le déclare,
- type: usfm
  marker: q1
  children:
  - type: text
    text: on aura beau chercher ╵la faute d’Israël,
- type: usfm
  marker: q1
  children:
  - type: text
    text: elle aura disparu,
- type: usfm
  marker: q1
  children:
  - type: text
    text: le péché de Juda,
- type: usfm
  marker: q1
  children:
  - type: text
    text: on ne le retrouvera plus ;
- type: usfm
  marker: q1
  children:
  - type: text
    text: car je pardonnerai au reste ╵que j’aurai épargné.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Lancez-vous à l’attaque ╵du pays de Merataïm
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '50.21 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: Merataïm
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: ': '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'en hébreu, ce nom peut avoir le sens de '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'double rébellion. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Il s’agit sans doute d’un jeu de mots avec le nom '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'marratu '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'qui désigne une région au sud de Babylone. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'Peqod, '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'qui signifie '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'punition, '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'est un jeu de mots avec le nom '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'Puqudu '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: qui désigne une tribu vivant près de l’embouchure du Tigre.
    marker-yv: yv-n
  - type: text
    text: '  !'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Sus aux habitants de Peqod,
- type: usfm
  marker: q1
  children:
  - type: text
    text: poursuis-les et massacre-les, ╵extermine-les tous ╵pour me les consacrer,
- type: usfm
  marker: q1
  children:
  - type: text
    text: déclare l’Eternel,
- type: usfm
  marker: q1
  children:
  - type: text
    text: oui, fais tout ce que je t’ai ordonné.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: On entend le bruit du combat ╵dans le pays ;
- type: usfm
  marker: q1
  children:
  - type: text
    text: immense est le désastre.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: Comment est-ce possible ? ╵il est brisé, mis en pièces,
- type: usfm
  marker: q1
  children:
  - type: text
    text: le marteau qui frappait toute la terre.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Babylone a été réduite ╵à une terre dévastée ╵au milieu des nations !
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: Je t’ai tendu un piège,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et tu as été prise, ╵ô Babylone,
- type: usfm
  marker: q1
  children:
  - type: text
    text: sans t’en apercevoir.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Oui, tu as été découverte ╵et l’on s’est emparé de toi,
- type: usfm
  marker: q1
  children:
  - type: text
    text: car tu t’es attaquée ╵à l’Eternel lui-même.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: L’Eternel a ouvert son arsenal
- type: usfm
  marker: q1
  children:
  - type: text
    text: et il en a tiré les armes ╵de sa colère ;
- type: usfm
  marker: q1
  children:
  - type: text
    text: car c’est là l’œuvre
- type: usfm
  marker: q1
  children:
  - type: text
    text: que l’Eternel, ╵le Seigneur des armées célestes, ╵va accomplir
- type: usfm
  marker: q1
  children:
  - type: text
    text: dans le pays des Chaldéens.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: Venez vers elle ╵du bout du monde,
- type: usfm
  marker: q1
  children:
  - type: text
    text: défoncez ses greniers,
- type: usfm
  marker: q1
  children:
  - type: text
    text: entassez le butin ╵comme des tas de gerbes,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'et exterminez-la totalement :'
- type: usfm
  marker: q1
  children:
  - type: text
    text: qu’il n’en reste plus rien !
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'Massacrez ses guerriers, ╵tous ses jeunes taureaux :'
- type: usfm
  marker: q1
  children:
  - type: text
    text: qu’on les mène au carnage !
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ah ! quel malheur pour eux, ╵le temps est arrivé,
- type: usfm
  marker: q1
  children:
  - type: text
    text: c’est le jour de leur châtiment !
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: Ecoutez ! on entend ╵la voix de ceux qui fuient ╵et des rescapés de Babylonie.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ils viennent apprendre à Sion ╵quelle rétribution ╵l’Eternel notre Dieu ╵a exercé sur Babylone
- type: usfm
  marker: q1
  children:
  - type: text
    text: et comment il a fait payer ╵ce qu’elle a fait contre son temple.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: Appelez les archers contre elle,
- type: usfm
  marker: q1
  children:
  - type: text
    text: tous ceux qui bandent l’arc,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et dressez tout autour ╵un camp pour l’attaquer,
- type: usfm
  marker: q1
  children:
  - type: text
    text: qu’il n’y ait pas de rescapés,
- type: usfm
  marker: q1
  children:
  - type: text
    text: oui, faites-lui payer ╵selon ce qu’elle a fait
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '50.29 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Repris en '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ap 18.6
        metadata:
          usfm: REV.18.6
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: '  :'
- type: usfm
  marker: q1
  children:
  - type: text
    text: faites-lui tout ce qu’elle a fait !
- type: usfm
  marker: q1
  children:
  - type: text
    text: Car, envers l’Eternel, ╵elle s’est montrée insolente
- type: usfm
  marker: q1
  children:
  - type: text
    text: envers le Dieu saint d’Israël.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: Aussi ses jeunes gens ╵tomberont sur ses places
- type: usfm
  marker: q1
  children:
  - type: text
    text: et tous ses combattants,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ce jour-là, seront réduits au silence,
- type: usfm
  marker: q1
  children:
  - type: text
    text: l’Eternel le déclare.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: Je vais m’en prendre à toi, ╵toi l’orgueilleuse,
- type: usfm
  marker: q1
  children:
  - type: text
    text: déclare l’Eternel, ╵le Seigneur des armées célestes,
- type: usfm
  marker: q1
  children:
  - type: text
    text: car le temps est venu pour toi,
- type: usfm
  marker: q1
  children:
  - type: text
    text: c’est le jour de rendre des comptes.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '32'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: La voilà qui chancelle, ╵l’insolente, et qui tombe,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et nul ne la relève.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Je vais mettre le feu à ses cités
- type: usfm
  marker: q1
  children:
  - type: text
    text: et il consumera ╵tout ce qui est autour.
- type: usfm
  marker: s2
  children:
  - type: text
    text: L’Eternel défend la cause de son peuple
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '33'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: 'Voici ce que déclare ╵le Seigneur des armées célestes :'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Les gens d’Israël et ceux de Juda ╵sont opprimés, ╵les uns comme les autres.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Tous ceux qui les ont déportés ╵les retiennent chez eux
- type: usfm
  marker: q1
  children:
  - type: text
    text: et ils refusent ╵de les laisser aller.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '34'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: 'Pourtant, leur libérateur est puissant :'
- type: usfm
  marker: q1
  children:
  - type: text
    text: oui il se nomme ╵le Seigneur des armées célestes.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Il prend en main leur cause ╵et il la défendra.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Il donnera ╵la tranquillité au pays
- type: usfm
  marker: q1
  children:
  - type: text
    text: et il ébranlera ╵les habitants de Babylone.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '35'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: Epée, fonds sur les Chaldéens,
- type: usfm
  marker: q1
  children:
  - type: text
    text: demande l’Eternel,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et sur les habitants de Babylone,
- type: usfm
  marker: q1
  children:
  - type: text
    text: sur ses ministres et ses sages !
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '36'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: Epée, fonds sur ses magiciens
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '50.36 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Autre traduction : '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: ses vantards.
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: text
    text: et qu’ils perdent le sens !
- type: usfm
  marker: q1
  children:
  - type: text
    text: Epée ! Sus aux guerriers,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et qu’ils soient terrifiés !
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '37'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: Epée, fonds sur ses chevaux et ses chars
- type: usfm
  marker: q1
  children:
  - type: text
    text: et sur tout ce ramassis de gens ╵qui sont chez elle.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et qu’ils ne soient plus que des femmelettes !
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Epée ! Fonds sur tous ses trésors :'
- type: usfm
  marker: q1
  children:
  - type: text
    text: qu’ils soient pillés !
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '38'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: text
    text: Sécheresse
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '50.38 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Sécheresse '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'et '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'épée '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: s’écrivent avec les mêmes consonnes en hébreu.
    marker-yv: yv-n
  - type: text
    text: ', fonds sur tous ses canaux'
- type: usfm
  marker: q1
  children:
  - type: text
    text: et qu’ils soient asséchés !
- type: usfm
  marker: q1
  children:
  - type: text
    text: Car ce pays est plein d’idoles,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et ces épouvantails ╵les font déraisonner.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '39'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '39'
  - type: text
    text: C’est pourquoi les chacals ╵y auront leur demeure ╵avec les chats sauvages,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et les autruches ╵en feront leur séjour.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Personne, plus jamais, ╵ne s’y établira,
- type: usfm
  marker: q1
  children:
  - type: text
    text: elle restera dépeuplée ╵à perpétuité
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '50.39 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Voir '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ap 18.2
        metadata:
          usfm: REV.18.2
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '40'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '40'
  - type: text
    text: Il en sera ╵comme lors de la catastrophe ╵de Sodome et Gomorrhe ╵et des cités voisines
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '50.40 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Voir Gn 18.20 à 19.29 (Jr 49.18 ; Es 13.19).
    marker-yv: yv-n
  - type: text
    text: ', ╵que Dieu a renversées,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'l’Eternel le déclare :'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Personne n’y habitera,
- type: usfm
  marker: q1
  children:
  - type: text
    text: non, aucun être humain ╵n’y séjournera plus.
- type: usfm
  marker: s2
  children:
  - type: text
    text: L’ennemi viendra du nord
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '41'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '41'
  - type: text
    text: Un peuple va venir du nord,
- type: usfm
  marker: q1
  children:
  - type: text
    text: une grande nation ; ╵des rois nombreux
- type: usfm
  marker: q1
  children:
  - type: text
    text: se mettent en campagne ╵des confins de la terre
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '50.41 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Les v. 41-43 ont leur parallèle en '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 6.22-24
        metadata:
          usfm: JER.6.22+JER.6.23+JER.6.24
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '42'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '42'
  - type: text
    text: Ils empoignent l’arc et la lance,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ils sont cruels et sans pitié,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et ils mugissent ╵comme la mer.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ils sont montés sur des chevaux,
- type: usfm
  marker: q1
  children:
  - type: text
    text: rangés en ordre de bataille ╵tout comme des soldats
- type: usfm
  marker: q1
  children:
  - type: text
    text: pour te combattre, ╵communauté de Babylone !
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '43'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '43'
  - type: text
    text: Lorsque le roi de Babylone ╵a appris la nouvelle,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ses bras ont défailli,
- type: usfm
  marker: q1
  children:
  - type: text
    text: l’angoisse l’a étreint,
- type: usfm
  marker: q1
  children:
  - type: text
    text: des douleurs l’ont saisi ╵comme une femme en couches.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '44'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '44'
  - type: text
    text: Voici, comme un lion ╵monte des forêts luxuriantes du Jourdain
- type: usfm
  marker: q1
  children:
  - type: text
    text: vers des enclos solides,
- type: usfm
  marker: q1
  children:
  - type: text
    text: moi je viendrai ╵les faire déguerpir de là ╵en un clin d’œil,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et je me choisirai ╵quelqu’un pour dominer sur lui
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '50.44 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'quelqu’un pour dominer sur lui. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Autre traduction : '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: de ses meilleurs béliers.
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: q1
  children:
  - type: text
    text: Car qui est mon égal ?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Qui me demandera des comptes ?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et quel est le berger ╵qui pourrait tenir contre moi
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '50.44 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Les v. 44-46 ont leur parallèle en '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 49.19-21
        metadata:
          usfm: JER.49.19+JER.49.20+JER.49.21
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: '  ?'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '45'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '45'
  - type: text
    text: Ecoutez donc le plan ╵que l’Eternel ╵a formé contre Babylone,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'et les projets qu’il a formés ╵au sujet du pays des Chaldéens :'
- type: usfm
  marker: q1
  children:
  - type: text
    text: on les entraînera ╵comme les plus chétives ╵des bêtes du troupeau
- type: usfm
  marker: q1
