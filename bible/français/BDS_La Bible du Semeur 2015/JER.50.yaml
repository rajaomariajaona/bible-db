document_id: JER.50,21
type_code: fra
verses:
  '1':
  - type: heading
    content: Contre Babylone
  - type: heading
    content: La chute de Babylone et le retour des exilés
  - type: text
    content: 'Voici le message que l’Eternel communiqua par le prophète Jérémie au sujet de Babylone et du pays des Chaldéens :'
  '10':
  - type: text
    content: Et la Chaldée sera mise au pillage ;
  - type: text
    content: ceux qui la pilleront ╵se rassasieront bien,
  - type: text
    content: l’Eternel le déclare.
  '11':
  - type: text
    content: Ah ! vous pouvez bien vous réjouir, ╵exulter d’allégresse,
  - type: text
    content: vous qui avez pillé ╵mon patrimoine !
  - type: text
    content: Vous pouvez vous ébattre ╵comme une génisse foulant le blé
  - type: text
    content: et vous pouvez hennir ╵comme des étalons ;
  '12':
  - type: text
    content: votre mère-patrie ╵est toute couverte de honte,
  - type: text
    content: celle qui vous a enfantés ╵connaît le déshonneur.
  - type: text
    content: La voici mise au dernier rang ╵de toutes les nations,
  - type: text
    content: devenue un désert, ╵une terre aride, une steppe.
  '13':
  - type: text
    content: L’indignation de l’Eternel
  - type: text
    content: en a fait une terre ╵où tout est dévasté
  - type: text
    content: et où personne n’habite.
  - type: text
    content: Tous ceux qui passeront ╵tout près de Babylone
  - type: text
    content: en seront effarés ╵et siffleront d’horreur ╵à la vue de toutes ses plaies.
  '14':
  - type: text
    content: Oui, vous tous les archers,
  - type: text
    content: rangez-vous en bataille ╵autour de Babylone,
  - type: text
    content: tirez contre elle,
  - type: text
    content: n’épargnez pas les flèches,
  - type: text
    content: car elle a péché contre l’Eternel.
  '15':
  - type: text
    content: Poussez des cris de guerre ╵de tous côtés contre elle !
  - type: text
    content: Elle se rend,
  - type: text
    content: ses remparts sont tombés,
  - type: text
    content: 'ses murailles sont démolies :'
  - type: text
    content: c’est ici la rétribution ╵de l’Eternel contre elle.
  - type: text
    content: Oui, rétribuez-la,
  - type: text
    content: et faites-lui comme elle a fait !
  '16':
  - type: text
    content: Eliminez de Babylone ╵à la fois le semeur
  - type: text
    content: et celui qui tient la faucille ╵au temps de la moisson !
  - type: text
    content: Et devant l’épée meurtrière,
  - type: text
    content: chacun s’en retournera chez les siens,
  - type: text
    content: chacun fuira dans son pays
  - type: note
    content: Reprend Es 13.14.
  - type: text
    content: '  !'
  '17':
  - type: text
    content: Israël est semblable ╵à une brebis isolée
  - type: text
    content: 'pourchassée par des lions :'
  - type: text
    content: le premier l’a mangée, ╵ – c’est le roi d’Assyrie –
  - type: text
    content: 'et le suivant ╵lui a broyé les os :'
  - type: text
    content: Nabuchodonosor, ╵le roi de Babylone
  - type: note
    content: Les Assyriens ont détruit le royaume du Nord (prise de Samarie en 722 av. J.-C.) et les Babyloniens Juda (chute de Jérusalem en 587 av. J.-C.).
  - type: text
    content: .
  '18':
  - type: text
    content: 'Et c’est pourquoi ╵voici ce que déclare ╵le Seigneur des armées célestes, ╵Dieu d’Israël :'
  - type: text
    content: Je vais rétribuer ╵le roi de Babylone ╵et son pays,
  - type: text
    content: tout comme j’ai rétribué ╵le roi de l’Assyrie
  - type: note
    content: Ninive, la capitale de l’Assyrie, est tombée en 612 av. J.-C. et l’Assyrie elle-même fut vaincue par une coalition des Mèdes et des Babyloniens en 609. Babylone sera vaincue par les Médo-Perses.
  - type: text
    content: .
  '19':
  - type: text
    content: Je ramènerai Israël ╵dans son enclos ;
  - type: text
    content: il paîtra de nouveau ╵sur le Carmel et au Basan,
  - type: text
    content: il se rassasiera
  - type: text
    content: sur les monts d’Ephraïm ╵et ceux de Galaad
  - type: note
    content: Territoire à l’est du Jourdain.
  - type: text
    content: .
  '2':
  - type: text
    content: Proclamez la nouvelle ╵parmi les peuples !
  - type: text
    content: Publiez-la !
  - type: text
    content: Elevez l’étendard !
  - type: text
    content: Oui, faites-la savoir ╵et ne la cachez pas !
  - type: text
    content: Dites que Babylone est prise,
  - type: text
    content: Bel est couvert de honte,
  - type: text
    content: Mardouk est tout épouvanté
  - type: note
    content: 'Bel… Mardouk: voir Es 46.1.'
  - type: text
    content: .
  - type: text
    content: Ses statues sont honteuses,
  - type: text
    content: et ses idoles sont dans l’épouvante.
  '20':
  - type: text
    content: En ce temps-là, ╵à cette époque,
  - type: text
    content: l’Eternel le déclare,
  - type: text
    content: on aura beau chercher ╵la faute d’Israël,
  - type: text
    content: elle aura disparu,
  - type: text
    content: le péché de Juda,
  - type: text
    content: on ne le retrouvera plus ;
  - type: text
    content: car je pardonnerai au reste ╵que j’aurai épargné.
  '21':
  - type: text
    content: Lancez-vous à l’attaque ╵du pays de Merataïm
  - type: note
    content: 'Merataïm: en hébreu, ce nom peut avoir le sens de double rébellion. Il s’agit sans doute d’un jeu de mots avec le nom marratu qui désigne une région au sud de Babylone. Peqod, qui signifie punition, est un jeu de mots avec le nom Puqudu qui désigne une tribu vivant près de l’embouchure du Tigre.'
  - type: text
    content: '  !'
  - type: text
    content: Sus aux habitants de Peqod,
  - type: text
    content: poursuis-les et massacre-les, ╵extermine-les tous ╵pour me les consacrer,
  - type: text
    content: déclare l’Eternel,
  - type: text
    content: oui, fais tout ce que je t’ai ordonné.
  '22':
  - type: text
    content: On entend le bruit du combat ╵dans le pays ;
  - type: text
    content: immense est le désastre.
  '23':
  - type: text
    content: Comment est-ce possible ? ╵il est brisé, mis en pièces,
  - type: text
    content: le marteau qui frappait toute la terre.
  - type: text
    content: Babylone a été réduite ╵à une terre dévastée ╵au milieu des nations !
  '24':
  - type: text
    content: Je t’ai tendu un piège,
  - type: text
    content: et tu as été prise, ╵ô Babylone,
  - type: text
    content: sans t’en apercevoir.
  - type: text
    content: Oui, tu as été découverte ╵et l’on s’est emparé de toi,
  - type: text
    content: car tu t’es attaquée ╵à l’Eternel lui-même.
  '25':
  - type: text
    content: L’Eternel a ouvert son arsenal
  - type: text
    content: et il en a tiré les armes ╵de sa colère ;
  - type: text
    content: car c’est là l’œuvre
  - type: text
    content: que l’Eternel, ╵le Seigneur des armées célestes, ╵va accomplir
  - type: text
    content: dans le pays des Chaldéens.
  '26':
  - type: text
    content: Venez vers elle ╵du bout du monde,
  - type: text
    content: défoncez ses greniers,
  - type: text
    content: entassez le butin ╵comme des tas de gerbes,
  - type: text
    content: 'et exterminez-la totalement :'
  - type: text
    content: qu’il n’en reste plus rien !
  '27':
  - type: text
    content: 'Massacrez ses guerriers, ╵tous ses jeunes taureaux :'
  - type: text
    content: qu’on les mène au carnage !
  - type: text
    content: Ah ! quel malheur pour eux, ╵le temps est arrivé,
  - type: text
    content: c’est le jour de leur châtiment !
  '28':
  - type: text
    content: Ecoutez ! on entend ╵la voix de ceux qui fuient ╵et des rescapés de Babylonie.
  - type: text
    content: Ils viennent apprendre à Sion ╵quelle rétribution ╵l’Eternel notre Dieu ╵a exercé sur Babylone
  - type: text
    content: et comment il a fait payer ╵ce qu’elle a fait contre son temple.
  '29':
  - type: text
    content: Appelez les archers contre elle,
  - type: text
    content: tous ceux qui bandent l’arc,
  - type: text
    content: et dressez tout autour ╵un camp pour l’attaquer,
  - type: text
    content: qu’il n’y ait pas de rescapés,
  - type: text
    content: oui, faites-lui payer ╵selon ce qu’elle a fait
  - type: note
    content: Repris en Ap 18.6.
  - type: text
    content: '  :'
  - type: text
    content: faites-lui tout ce qu’elle a fait !
  - type: text
    content: Car, envers l’Eternel, ╵elle s’est montrée insolente
  - type: text
    content: envers le Dieu saint d’Israël.
  '3':
  - type: text
    content: Car un peuple ennemi, ╵du nord, vient t’attaquer
  - type: note
    content: Il s’agit certainement des Mèdes dont le royaume se trouvait au sud-est de Babylone. Le septentrion est peut-être une désignation symbolique de la direction d’où vient le malheur.
  - type: text
    content: '  ;'
  - type: text
    content: il transformera ton pays ╵en une terre dévastée
  - type: text
    content: où nul n’habitera.
  - type: text
    content: Des hommes jusqu’aux bêtes, ╵tous partiront, ils s’en iront.
  '30':
  - type: text
    content: Aussi ses jeunes gens ╵tomberont sur ses places
  - type: text
    content: et tous ses combattants,
  - type: text
    content: ce jour-là, seront réduits au silence,
  - type: text
    content: l’Eternel le déclare.
  '31':
  - type: text
    content: Je vais m’en prendre à toi, ╵toi l’orgueilleuse,
  - type: text
    content: déclare l’Eternel, ╵le Seigneur des armées célestes,
  - type: text
    content: car le temps est venu pour toi,
  - type: text
    content: c’est le jour de rendre des comptes.
  '32':
  - type: text
    content: La voilà qui chancelle, ╵l’insolente, et qui tombe,
  - type: text
    content: et nul ne la relève.
  - type: text
    content: Je vais mettre le feu à ses cités
  - type: text
    content: et il consumera ╵tout ce qui est autour.
  - type: heading
    content: L’Eternel défend la cause de son peuple
  '33':
  - type: text
    content: 'Voici ce que déclare ╵le Seigneur des armées célestes :'
  - type: text
    content: Les gens d’Israël et ceux de Juda ╵sont opprimés, ╵les uns comme les autres.
  - type: text
    content: Tous ceux qui les ont déportés ╵les retiennent chez eux
  - type: text
    content: et ils refusent ╵de les laisser aller.
  '34':
  - type: text
    content: 'Pourtant, leur libérateur est puissant :'
  - type: text
    content: oui il se nomme ╵le Seigneur des armées célestes.
  - type: text
    content: Il prend en main leur cause ╵et il la défendra.
  - type: text
    content: Il donnera ╵la tranquillité au pays
  - type: text
    content: et il ébranlera ╵les habitants de Babylone.
  '35':
  - type: text
    content: Epée, fonds sur les Chaldéens,
  - type: text
    content: demande l’Eternel,
  - type: text
    content: et sur les habitants de Babylone,
  - type: text
    content: sur ses ministres et ses sages !
  '36':
  - type: text
    content: Epée, fonds sur ses magiciens
  - type: note
    content: 'Autre traduction : ses vantards.'
  - type: text
    content: et qu’ils perdent le sens !
  - type: text
    content: Epée ! Sus aux guerriers,
  - type: text
    content: et qu’ils soient terrifiés !
  '37':
  - type: text
    content: Epée, fonds sur ses chevaux et ses chars
  - type: text
    content: et sur tout ce ramassis de gens ╵qui sont chez elle.
  - type: text
    content: Et qu’ils ne soient plus que des femmelettes !
  - type: text
    content: 'Epée ! Fonds sur tous ses trésors :'
  - type: text
    content: qu’ils soient pillés !
  '38':
  - type: text
    content: Sécheresse
  - type: note
    content: Sécheresse et épée s’écrivent avec les mêmes consonnes en hébreu.
  - type: text
    content: ', fonds sur tous ses canaux'
  - type: text
    content: et qu’ils soient asséchés !
  - type: text
    content: Car ce pays est plein d’idoles,
  - type: text
    content: et ces épouvantails ╵les font déraisonner.
  '39':
  - type: text
    content: C’est pourquoi les chacals ╵y auront leur demeure ╵avec les chats sauvages,
  - type: text
    content: et les autruches ╵en feront leur séjour.
  - type: text
    content: Personne, plus jamais, ╵ne s’y établira,
  - type: text
    content: elle restera dépeuplée ╵à perpétuité
  - type: note
    content: Voir Ap 18.2.
  - type: text
    content: .
  '4':
  - type: text
    content: En ce temps-là, ╵à cette époque,
  - type: text
    content: l’Eternel le déclare,
  - type: text
    content: les Israélites viendront ╵avec les Judéens,
  - type: text
    content: ils marcheront en larmes
  - type: text
    content: et ils se tourneront ╵vers l’Eternel, leur Dieu.
  '40':
  - type: text
    content: Il en sera ╵comme lors de la catastrophe ╵de Sodome et Gomorrhe ╵et des cités voisines
  - type: note
    content: Voir Gn 18.20 à 19.29 (Jr 49.18 ; Es 13.19).
  - type: text
    content: ', ╵que Dieu a renversées,'
  - type: text
    content: 'l’Eternel le déclare :'
  - type: text
    content: Personne n’y habitera,
  - type: text
    content: non, aucun être humain ╵n’y séjournera plus.
  - type: heading
    content: L’ennemi viendra du nord
  '41':
  - type: text
    content: Un peuple va venir du nord,
  - type: text
    content: une grande nation ; ╵des rois nombreux
  - type: text
    content: se mettent en campagne ╵des confins de la terre
  - type: note
    content: Les v. 41-43 ont leur parallèle en 6.22-24.
  - type: text
    content: .
  '42':
  - type: text
    content: Ils empoignent l’arc et la lance,
  - type: text
    content: ils sont cruels et sans pitié,
  - type: text
    content: et ils mugissent ╵comme la mer.
  - type: text
    content: Ils sont montés sur des chevaux,
  - type: text
    content: rangés en ordre de bataille ╵tout comme des soldats
  - type: text
    content: pour te combattre, ╵communauté de Babylone !
  '43':
  - type: text
    content: Lorsque le roi de Babylone ╵a appris la nouvelle,
  - type: text
    content: ses bras ont défailli,
  - type: text
    content: l’angoisse l’a étreint,
  - type: text
    content: des douleurs l’ont saisi ╵comme une femme en couches.
  '44':
  - type: text
    content: Voici, comme un lion ╵monte des forêts luxuriantes du Jourdain
  - type: text
    content: vers des enclos solides,
  - type: text
    content: moi je viendrai ╵les faire déguerpir de là ╵en un clin d’œil,
  - type: text
    content: et je me choisirai ╵quelqu’un pour dominer sur lui
  - type: note
    content: 'quelqu’un pour dominer sur lui. Autre traduction : de ses meilleurs béliers.'
  - type: text
    content: .
  - type: text
    content: Car qui est mon égal ?
  - type: text
    content: Qui me demandera des comptes ?
  - type: text
    content: Et quel est le berger ╵qui pourrait tenir contre moi
  - type: note
    content: Les v. 44-46 ont leur parallèle en 49.19-21.
  - type: text
    content: '  ?'
  '45':
  - type: text
    content: Ecoutez donc le plan ╵que l’Eternel ╵a formé contre Babylone,
  - type: text
    content: 'et les projets qu’il a formés ╵au sujet du pays des Chaldéens :'
  - type: text
    content: on les entraînera ╵comme les plus chétives ╵des bêtes du troupeau
  - type: text
    content: et l’on ravagera ╵après eux leur enclos.
  '46':
  - type: text
    content: Au bruit de la prise de Babylone,
  - type: text
    content: la terre tremblera,
  - type: text
    content: et chez les peuples étrangers, ╵on entendra un cri.
  '5':
  - type: text
    content: Et ils s’informeront ╵du chemin qui mène à Sion,
  - type: text
    content: ils tourneront ╵vers elle leurs regards.
  - type: text
    content: « Venez, se diront-ils, ╵attachons-nous à l’Eternel
  - type: text
    content: par une alliance éternelle ╵qu’on n’oubliera jamais. »
  '6':
  - type: text
    content: Mon peuple était semblable ╵à des moutons perdus.
  - type: text
    content: Leurs bergers les ont égarés,
  - type: text
    content: ils les ont détournés ╵sur les montagnes.
  - type: text
    content: De montagne en colline,
  - type: text
    content: ils allaient en oubliant leur bercail.
  '7':
  - type: text
    content: Ceux qui les rencontraient ╵en faisaient leur pâture.
  - type: text
    content: 'Leurs ennemis disaient :'
  - type: text
    content: « Nous ne nous mettrons pas en tort,
  - type: text
    content: puisqu’ils ont péché contre l’Eternel,
  - type: text
    content: lui qui avait été pour eux ╵comme un enclos où régnait la justice
  - type: text
    content: et en qui leurs ancêtres ╵avaient placé leur espérance. »
  '8':
  - type: text
    content: Partez de Babylone
  - type: note
    content: Voir Es 48.20 ; 52.11. Repris en Ap 18.4.
  - type: text
    content: et du pays des Chaldéens !
  - type: text
    content: Oui, sortez-en comme des boucs ╵en tête du troupeau !
  '9':
  - type: text
    content: Car je vais susciter
  - type: text
    content: une coalition ╵de grandes nations
  - type: note
    content: Les Médo-Perses et leurs alliés (voir 51.27-28).
  - type: text
    content: ' des pays du nord'
  - type: text
    content: pour qu’elles viennent ╵attaquer Babylone.
  - type: text
    content: Elles se rangeront ╵en bataille contre elle
  - type: text
    content: et s’en empareront.
  - type: text
    content: Leurs flèches sont semblables ╵à d’habiles guerriers
  - type: text
    content: et elles ne reviennent pas à vide.
