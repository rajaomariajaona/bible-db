document_id: ISA.61,21
type_code: fra
verses:
  '1':
  - type: heading
    content: Messager d’une bonne nouvelle
  - type: text
    content: L’Esprit de l’Eternel, ╵du Seigneur, est sur moi
  - type: text
    content: car l’Eternel m’a oint
  - type: text
    content: pour annoncer aux humiliés ╵une bonne nouvelle.
  - type: text
    content: Oui, il m’a envoyé ╵afin de panser ceux ╵qui ont le cœur brisé,
  - type: text
    content: d’annoncer aux captifs ╵leur délivrance
  - type: text
    content: et à ceux qui sont prisonniers
  - type: note
    content: 'L’ancienne version grecque a : aveugles.'
  - type: text
    content: ' ╵leur mise en liberté'
  - type: note
    content: Allusion en Mt 11.5 ; Lc 7.22. Les v. 1-2 sont cités en Lc 4.18-19.
  - type: text
    content: ','
  '10':
  - type: text
    content: Je serai plein de joie, ╵l’Eternel en sera la source
  - type: note
    content: En réponse à cet avenir radieux annoncé par le prophète, le peuple de Dieu exprime sa joie et sa reconnaissance envers l’Eternel.
  - type: text
    content: .
  - type: text
    content: J’exulterai ╵à cause de mon Dieu,
  - type: text
    content: parce qu’il m’aura revêtu ╵des habits du salut
  - type: text
    content: et qu’il m’aura enveloppé ╵du manteau de justice,
  - type: text
    content: tout comme le marié ╵se pare d’un turban ╵tout comme un prêtre,
  - type: text
    content: et comme la mariée ╵s’orne de ses bijoux
  - type: note
    content: Voir Ap 21.2.
  - type: text
    content: .
  '11':
  - type: text
    content: Comme la terre ╵fait pousser les graines germées
  - type: text
    content: et comme le jardin ╵fait germer ses semences,
  - type: text
    content: ainsi le Seigneur, l’Eternel, ╵va faire germer la justice ╵et la louange
  - type: text
    content: aux yeux de tous les peuples.
  '2':
  - type: text
    content: afin de proclamer, ╵pour l’Eternel ╵une année de faveur
  - type: text
    content: et un jour de rétribution ╵pour notre Dieu,
  - type: text
    content: afin de consoler ╵tous ceux qui mènent deuil,
  '3':
  - type: text
    content: et d’apporter à ceux ╵qui, dans Sion, sont endeuillés,
  - type: text
    content: la splendeur au lieu de la cendre,
  - type: text
    content: pour mettre sur leur tête ╵l’huile de l’allégresse ╵au lieu du deuil,
  - type: text
    content: et pour les vêtir d’habits de louange ╵au lieu d’un esprit abattu,
  - type: text
    content: afin qu’on les appelle ╵« Les chênes de justice,
  - type: text
    content: la plantation de l’Eternel
  - type: text
    content: qui manifestent sa splendeur ».
  '4':
  - type: text
    content: Car ils rebâtiront ╵les ruines d’autrefois
  - type: text
    content: et ils relèveront ╵ce qui a été dévasté ╵par le passé.
  - type: text
    content: Oui, ils restaureront ╵les villes ravagées,
  - type: text
    content: les habitats détruits ╵depuis bien des générations.
  '5':
  - type: text
    content: Des étrangers ╵viendront s’y établir,
  - type: text
    content: ils feront paître vos troupeaux.
  - type: text
    content: Ces gens seront vos laboureurs
  - type: text
    content: et ils cultiveront ╵vos vergers et vos vignes.
  '6':
  - type: text
    content: Mais vous, on vous appellera ╵« Prêtres de l’Eternel » ;
  - type: text
    content: on dira que vous êtes ╵servants de notre Dieu.
  - type: text
    content: Vous jouirez ╵des trésors des nations
  - type: text
    content: et vous mettrez votre fierté
  - type: note
    content: 'Autre traduction : vous vous parerez.'
  - type: text
    content: ' ╵dans ce qui fait leur gloire.'
  '7':
  - type: text
    content: Au lieu de votre honte,
  - type: text
    content: vous aurez double honneur,
  - type: text
    content: et au lieu de l’opprobre,
  - type: text
    content: vous pousserez des cris de joie ╵à cause de la part ╵que vous aurez.
  - type: text
    content: Car, dans votre pays, ╵vous recevrez ╵un patrimoine double.
  - type: text
    content: Il y aura pour vous ╵une joie éternelle.
  '8':
  - type: text
    content: Moi, l’Eternel, ╵moi, j’aime la droiture.
  - type: text
    content: Je déteste le vol ╵avec sa perfidie.
  - type: text
    content: Je les rétribuerai ╵avec fidélité
  - type: note
    content: 'Autre traduction : selon la vérité.'
  - type: text
    content: et je conclurai avec eux ╵une alliance éternelle.
  '9':
  - type: text
    content: Leurs descendants seront connus ╵chez les nations,
  - type: text
    content: et leur progéniture ╵parmi les peuples.
  - type: text
    content: Tous ceux qui les verront ╵reconnaîtront en eux
  - type: text
    content: une postérité ╵bénie par l’Eternel.
