document_id: ISA.61,21
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s2
    children:
    - type: text
      text: Messager d’une bonne nouvelle
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: L’Esprit de l’Eternel, ╵du Seigneur, est sur moi
  - type: usfm
    marker: q1
    children:
    - type: text
      text: car l’Eternel m’a oint
  - type: usfm
    marker: q1
    children:
    - type: text
      text: pour annoncer aux humiliés ╵une bonne nouvelle.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Oui, il m’a envoyé ╵afin de panser ceux ╵qui ont le cœur brisé,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: d’annoncer aux captifs ╵leur délivrance
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et à ceux qui sont prisonniers
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '61.1 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'L’ancienne version grecque a : '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: aveugles.
      marker-yv: yv-n
    - type: text
      text: ' ╵leur mise en liberté'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '61.1 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Allusion en Mt 11.5 ; Lc 7.22. Les v. 1-2 sont cités en '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: Lc 4.18-19
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: ','
  '10':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: Je serai plein de joie, ╵l’Eternel en sera la source
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '61.10 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: En réponse à cet avenir radieux annoncé par le prophète, le peuple de Dieu exprime sa joie et sa reconnaissance envers l’Eternel.
      marker-yv: yv-n
    - type: text
      text: .
  - type: usfm
    marker: q1
    children:
    - type: text
      text: J’exulterai ╵à cause de mon Dieu,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: parce qu’il m’aura revêtu ╵des habits du salut
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et qu’il m’aura enveloppé ╵du manteau de justice,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: tout comme le marié ╵se pare d’un turban ╵tout comme un prêtre,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et comme la mariée ╵s’orne de ses bijoux
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '61.10 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Voir '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: Ap 21.2
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: .
  '11':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: Comme la terre ╵fait pousser les graines germées
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et comme le jardin ╵fait germer ses semences,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ainsi le Seigneur, l’Eternel, ╵va faire germer la justice ╵et la louange
  - type: usfm
    marker: q1
    children:
    - type: text
      text: aux yeux de tous les peuples.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: afin de proclamer, ╵pour l’Eternel ╵une année de faveur
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et un jour de rétribution ╵pour notre Dieu,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: afin de consoler ╵tous ceux qui mènent deuil,
  '3':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: et d’apporter à ceux ╵qui, dans Sion, sont endeuillés,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: la splendeur au lieu de la cendre,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: pour mettre sur leur tête ╵l’huile de l’allégresse ╵au lieu du deuil,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et pour les vêtir d’habits de louange ╵au lieu d’un esprit abattu,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: afin qu’on les appelle ╵« Les chênes de justice,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: la plantation de l’Eternel
  - type: usfm
    marker: q1
    children:
    - type: text
      text: qui manifestent sa splendeur ».
  '4':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: Car ils rebâtiront ╵les ruines d’autrefois
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et ils relèveront ╵ce qui a été dévasté ╵par le passé.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Oui, ils restaureront ╵les villes ravagées,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: les habitats détruits ╵depuis bien des générations.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: Des étrangers ╵viendront s’y établir,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ils feront paître vos troupeaux.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ces gens seront vos laboureurs
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et ils cultiveront ╵vos vergers et vos vignes.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: Mais vous, on vous appellera ╵« Prêtres de l’Eternel » ;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: on dira que vous êtes ╵servants de notre Dieu.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Vous jouirez ╵des trésors des nations
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et vous mettrez votre fierté
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '61.6 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Autre traduction : '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: vous vous parerez.
      marker-yv: yv-n
    - type: text
      text: ' ╵dans ce qui fait leur gloire.'
  '7':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: Au lieu de votre honte,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: vous aurez double honneur,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et au lieu de l’opprobre,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: vous pousserez des cris de joie ╵à cause de la part ╵que vous aurez.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Car, dans votre pays, ╵vous recevrez ╵un patrimoine double.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Il y aura pour vous ╵une joie éternelle.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: Moi, l’Eternel, ╵moi, j’aime la droiture.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Je déteste le vol ╵avec sa perfidie.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Je les rétribuerai ╵avec fidélité
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '61.8 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Autre traduction : '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: selon la vérité.
      marker-yv: yv-n
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et je conclurai avec eux ╵une alliance éternelle.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: Leurs descendants seront connus ╵chez les nations,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et leur progéniture ╵parmi les peuples.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tous ceux qui les verront ╵reconnaîtront en eux
  - type: usfm
    marker: q1
    children:
    - type: text
      text: une postérité ╵bénie par l’Eternel.
