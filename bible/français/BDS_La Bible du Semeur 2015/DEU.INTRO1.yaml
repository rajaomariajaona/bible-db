    children:
    - type: text
      text: Introduction
  - type: usfm
    marker: ip
    children:
    - type: text
      text: 'Moïse a conduit les Israélites sur la rive est du Jourdain, dans les plaines de Moab, aux portes de Canaan. C’est là, dans les deux derniers mois de sa vie, qu’a lieu, entre l’Eternel et la génération nouvelle des Israélites nés dans le désert, le renouvellement de l’alliance du Sinaï conclue trente-huit ans auparavant (28.69). C’est à cette « répétition de la Loi » que l’on pourrait appliquer le titre du livre : « le Deutéronome » ou « la seconde Loi ». Celui-ci provient en fait d’une traduction erronée de l’expression de 17.18 « une copie de la Loi », dans l’ancienne version grecque.'
  - type: usfm
    marker: ip
    children:
    - type: text
      text: La structure du Deutéronome, cinquième et dernier livre du Pentateuque ou des « Ecrits de Moïse » (2 Co 3.15), est en effet très proche de celle des traités entre suzerains et vassaux du Proche-Orient ancien. Avant d’introduire son peuple dans le pays qu’il lui destine, l’Eternel rappelle à celui-ci les clauses de l’alliance qu’il a établie avec lui.
  - type: usfm
    marker: ip
    children:
    - type: text
      text: 'Après le préambule (1.1-5) vient le prologue historique (1.6 à 4.43). Moïse y retrace les événements essentiels des quarante années passées dans le désert. Il rappelle en particulier la révolte du peuple lors du refus d’entrer en Canaan après l’envoi des espions, la conquête des territoires à l’est du Jourdain et la révélation de l’Eternel sur le mont Sinaï. Puis viennent les dispositions fondamentales de l’alliance (4.44 à 11.32) qui soulignent qu’Israël doit s’attacher à l’Eternel et à lui seul. Les dix commandements sont répétés (5.6-21), puis le célèbre « Ecoute, Israël » retentit (6.4). Jésus reprendra cette parole pour résumer la Loi : « Tu aimeras l’Eternel ton Dieu de tout ton cœur, de toute ton âme et de toute ta force » (6.5). Le Suzerain promet à son peuple de lui donner le pays de Canaan pour patrimoine. Les dispositions particulières de l’alliance (chap. 12 à 26) recouvrent des lois cultuelles (chap. 12 à 18), des lois civiles (chap. 19 à 25) et des lois concernant les premiers fruits du pays promis ainsi que les dîmes (chap. 26). Ces lois répètent en partie celles du Lévitique mais comportent les accommodations nécessaires aux nouvelles conditions auxquelles les Israélites seront soumis en Canaan. Comme dans les anciens traités du Proche-Orient, le « traité » d’alliance du Deutéronome se conclut par les sanctions de l’alliance (chap. 27 à 30). Elles précisent quelles seront les bénédictions et les malédictions que l’Eternel fera venir sur son peuple en fonction de son obéissance à ses lois ou de ses désobéissances, et se terminent par un appel à choisir entre la vie et la mort (30.15-20). Viennent enfin les derniers actes de la vie de Moïse, qui meurt sans avoir pu pénétrer dans le pays promis (chap. 31 à 34).'
  - type: usfm
    marker: ip
    children:
    - type: text
      text: Le Deutéronome faisait certainement partie de ce « livre de la Loi » (2 R 22.11) qui a été retrouvé sous Josias lors de la réfection du Temple. Son contenu a inspiré la réforme religieuse et politique entreprise par le roi. Jérémie, contemporain de Josias, y a puisé son insistance sur l’intériorisation de la Loi, à laquelle l’adorateur de Dieu obéit par un mouvement du cœur (Dt 30.2, 6, 14 ; Jr 4.4 ; 31.33 ; 32.39). Et Jésus, le Prophète, nouveau Moïse annoncé par le Deutéronome (18.18), devait méditer sur ce livre lorsqu’au désert, par trois fois, il y a puisé les paroles qu’il a opposées au tentateur (Mt 4.1-11).
