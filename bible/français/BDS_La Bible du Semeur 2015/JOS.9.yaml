document_id: JOS.9
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: La ruse des Gabaonites
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'La nouvelle de ces événements parvint à tous les rois des pays situés à l’ouest du Jourdain, dans la région des montagnes, dans la plaine côtière et sur tout le littoral de la Méditerranée jusqu’en face du Liban : les rois des Hittites, des Amoréens, des Cananéens, des Phéréziens, des Héviens et des Yebousiens. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Alors ils s’assemblèrent pour combattre Josué et les Israélites sous un commandement unique.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Par contre, les habitants de Gabaon
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '9.3 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'A une dizaine de kilomètres au nord de Jérusalem (Jos 10.2 ; 18.25 ; 21.17). Ville importante en ce temps-là, avec des villages vassaux (v. 17), habitée par des Héviens (v. 7 ; voir '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Gn 10.17
        metadata:
          usfm: GEN.10.17
      - type: text
        text: ).
    marker-yv: yv-n
  - type: text
    text: ', en apprenant comment Josué avait traité Jéricho et Aï, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'décidèrent de recourir à la ruse : ils partirent déguisés'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '9.4 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Certains traduisent : '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'ils partirent en délégation. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Certains manuscrits hébreux et les versions anciennes portent : '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: ils prirent des provisions.
    marker-yv: yv-n
  - type: text
    text: ' et chargèrent leurs ânes de sacs usés et d’outres à vin usées, trouées et rapiécées. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Ils chaussèrent de vieilles sandales raccommodées et endossèrent des vêtements en lambeaux ; ils prirent en guise de provision du pain dur et tout moisi. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Ils se rendirent ainsi au camp de Guilgal et vinrent trouver Josué auquel ils dirent en présence des hommes d’Israël : Nous arrivons d’un pays lointain pour vous prier de conclure une alliance avec nous.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Les Israélites répondirent à ces Héviens
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '9.7 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Groupe ethnique originaire de Mésopotamie (11.19 ; Gn 10.17 ; Ex 23.23 ; Jg 3.3). Désigné sous le nom plus général d’Amoréens en '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 2 S 21.2
        metadata:
          usfm: 2SA.21.2
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: '  : Qui sait si vous n’êtes pas des habitants du voisinage ? Dans ce cas, nous ne pouvons pas conclure une alliance avec vous'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '9.7 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Dt 7.2 ; 20.16-18 interdisait de conclure une telle alliance avec les habitants du pays pour que les Israélites ne se laissent pas contaminer par leur religion.
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Ils déclarèrent à Josué : Nous voulons être tes serviteurs.'
- type: usfm
  marker: p
  children:
  - type: text
    text: – Mais qui êtes-vous, leur demanda Josué, et d’où venez-vous ?
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Ils lui répondirent : Tes serviteurs viennent d’un pays très éloigné à cause du renom de l’Eternel ton Dieu : nous avons entendu parler de lui et de tout ce qu’il a fait en Egypte, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: et comment il a traité les deux rois des Amoréens qui régnaient de l’autre côté du Jourdain, Sihôn, roi de Heshbôn, et Og, roi du Basan, qui résidait à Ashtaroth
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '9.10 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Voir Nb 21.21-35 ; Dt 2.26 à 3.11.
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Alors nos responsables et tous les habitants de notre pays nous ont dit : « Emportez des provisions pour le voyage, allez trouver les Israélites et dites-leur : Nous voulons être vos serviteurs, concluez une alliance avec nous. » '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Regardez notre pain, il était encore tout chaud quand nous l’avons pris pour nos provisions dans nos maisons, quand nous nous sommes mis en route pour venir vous trouver et le voilà maintenant dur et tout moisi ! '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Regardez nos outres de vin : elles étaient neuves quand nous les avons remplies, les voilà maintenant déchirées ; voyez comme nos vêtements et nos sandales se sont usés à cause du long voyage que nous avons fait.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Les hommes d’Israël prirent de leurs provisions, mais ils ne consultèrent pas l’Eternel à ce sujet. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Josué fit la paix avec eux et conclut une alliance leur garantissant la vie sauve par un serment des responsables de la communauté
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '9.15 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Sur les serments, voir Ex 20.7 ; Lv 19.12 ; 1 S 14.24.
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: s1
  children:
  - type: text
    text: L’alliance avec les Gabaonites
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Trois jours après avoir conclu cette alliance avec eux, les Israélites apprirent qu’ils avaient eu affaire à de proches voisins qui demeuraient dans la région même. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'En effet, après avoir quitté leur camp, ils parvinrent à leurs villes le troisième jour de marche, c’est-à-dire à Gabaon, Kephira, Beéroth et Qiryath-Yearim. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'A cause du serment que les responsables du peuple leur avaient prêté au nom de l’Eternel, le Dieu d’Israël, ils ne les tuèrent pas. Tout le peuple se mit à critiquer les responsables, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'mais ceux-ci répondirent : Nous avons prêté serment par l’Eternel, le Dieu d’Israël, nous ne pouvons donc pas faire de mal à ces gens. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Mais voici comment nous les traiterons : nous allons leur laisser la vie sauve, pour ne pas nous attirer la colère divine en violant le serment que nous leur avons fait.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: – Donc ils vivront ! leur dirent les responsables. Mais ils seront astreints à couper du bois et à puiser l’eau pour toute la communauté
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '9.21 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Travaux inférieurs, souvent réservés aux esclaves.
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Telle fut la décision des responsables. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Josué convoqua les Gabaonites et leur demanda : Pourquoi nous avez-vous trompés en prétendant que vous habitiez très loin de nous, alors que vous demeurez tout près ? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: Maintenant, vous êtes sous une malédiction et vous ne cesserez pas d’être esclaves, à couper du bois et à puiser de l’eau pour le sanctuaire de mon Dieu.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Les Gabaonites lui répondirent : Nous avons agi de la sorte parce qu’on nous a bien informés que l’Eternel ton Dieu a ordonné à son serviteur Moïse de vous donner tout le pays et de vous demander d’exterminer tous ses habitants au fur et à mesure de votre avance. Alors nous avons eu très peur pour notre vie à votre arrivée ; c’est pourquoi nous avons agi de la sorte. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: Nous voici maintenant en ton pouvoir, traite-nous comme il te semblera bon et juste.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'C’est ce que fit Josué : il les protégea des Israélites pour qu’ils ne les mettent pas à mort, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: et il les chargea des corvées de bois et d’eau pour la communauté et pour l’autel de l’Eternel, au lieu que celui-ci désignerait, fonctions qu’ils exercent encore aujourd’hui.
