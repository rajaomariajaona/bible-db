document_id: PRO.20,21
type_code: fra
verses:
  '1':
  - type: text
    content: Le vin est plein d’insolence et l’alcool rempli de tapage,
  - type: text
    content: qui s’en laisse griser ne pourra être sage.
  '10':
  - type: text
    content: Ceux qui ont deux poids différents, et ceux qui utilisent deux mesures différentes
  - type: text
    content: sont l’un et l’autre en horreur à l’Eternel
  - type: note
    content: Voir 11.1 et note.
  - type: text
    content: .
  '11':
  - type: text
    content: Le jeune enfant manifeste qui il est par ses actes,
  - type: text
    content: on voit si sa conduite sera pure et droite.
  '12':
  - type: text
    content: L’Eternel nous a donné des oreilles pour entendre
  - type: text
    content: et aussi des yeux pour voir.
  '13':
  - type: text
    content: 'N’aime pas trop le sommeil, pour ne pas finir dans la pauvreté :'
  - type: text
    content: garde tes yeux ouverts, et tu auras de quoi te rassasier.
  '14':
  - type: text
    content: 'L’acheteur dit toujours :'
  - type: text
    content: « C’est une bien mauvaise affaire »,
  - type: text
    content: mais dès qu’il est parti, il se félicite de ce qu’il a obtenu.
  '15':
  - type: text
    content: Si l’or et les perles précieuses abondent,
  - type: text
    content: les joyaux les plus précieux sont des lèvres qui dispensent la connaissance.
  '16':
  - type: text
    content: Si quelqu’un s’est porté garant des dettes d’un étranger, prends-lui son vêtement,
  - type: text
    content: et s’il a cautionné des inconnus, exige qu’il te donne des gages.
  '17':
  - type: text
    content: Au premier abord, le pain mal acquis est savoureux,
  - type: text
    content: mais, par la suite, ta bouche se trouvera pleine de cailloux.
  '18':
  - type: text
    content: Lorsque tu fais des projets, prends conseil,
  - type: text
    content: et ne te lance pas dans une bataille sans une stratégie bien conçue.
  '19':
  - type: text
    content: Qui divulgue des secrets finit par se répandre en calomnies ;
  - type: text
    content: n’aie donc pas de relations avec un bavard.
  '2':
  - type: text
    content: 'Tel le rugissement d’un jeune lion, le roi inspire la terreur :'
  - type: text
    content: qui le met en colère se nuit à lui-même.
  '20':
  - type: text
    content: Si quelqu’un maudit son père ou sa mère,
  - type: text
    content: sa vie s’éteindra en pleines ténèbres
  - type: note
    content: Crime puni de mort par la Loi (Ex 21.17 ; Lv 20.9 ; Dt 27.16).
  - type: text
    content: .
  '21':
  - type: text
    content: Il n’y a pas de bénédiction durable
  - type: text
    content: pour un patrimoine vite obtenu au début.
  '22':
  - type: text
    content: 'Ne dis pas : « Je me vengerai ! »'
  - type: text
    content: Confie-toi en l’Eternel et il te délivrera.
  '23':
  - type: text
    content: L’Eternel a horreur de l’usage de deux poids différents,
  - type: text
    content: et il n’est pas bien d’employer des balances truquées
  - type: note
    content: Voir v. 10, et 11.1 et note.
  - type: text
    content: .
  '24':
  - type: text
    content: C’est l’Eternel qui trace la voie d’un homme ;
  - type: text
    content: comment un humain pourrait-il comprendre par quel chemin il passe ?
  '25':
  - type: text
    content: Il est dangereux pour l’homme de consacrer précipitamment quelque chose à l’Eternel
  - type: text
    content: et de ne se mettre à réfléchir qu’après avoir fait son vœu
  - type: note
    content: Voir Ec 5.3-5.
  - type: text
    content: .
  '26':
  - type: text
    content: Un roi sage chasse au loin les méchants
  - type: text
    content: et fait passer sur eux la roue.
  '27':
  - type: text
    content: L’esprit de l’homme est une lampe que l’Eternel a donnée
  - type: text
    content: et qui sonde les profondeurs de l’être.
  '28':
  - type: text
    content: La bonté et la fidélité du roi assurent sa protection ;
  - type: text
    content: oui, par sa bonté
  - type: note
    content: 'L’ancienne version grecque a : par sa justice.'
  - type: text
    content: ', il affermit son autorité.'
  '29':
  - type: text
    content: La fierté des jeunes gens, c’est leur force,
  - type: text
    content: mais l’honneur des vieillards, ce sont leurs cheveux blancs.
  '3':
  - type: text
    content: Se tenir à l’écart des querelles fait honneur à l’homme,
  - type: text
    content: mais tout insensé s’y jette à corps perdu.
  '30':
  - type: text
    content: Les plaies d’une blessure sont un remède contre le mal,
  - type: text
    content: et les coups que l’on reçoit purgent l’être intérieur.
  '4':
  - type: text
    content: A la saison froide
  - type: note
    content: Automne et hiver, l’époque des pluies et des semailles en Israël.
  - type: text
    content: ', le paresseux ne laboure pas,'
  - type: text
    content: au temps de la moisson, il cherche à récolter, mais ne trouve rien.
  '5':
  - type: text
    content: Les projets que forme l’homme dans son cœur sont comme des eaux profondes,
  - type: text
    content: mais l’homme intelligent sait y puiser.
  '6':
  - type: text
    content: Beaucoup de gens font état de leur bonté,
  - type: text
    content: mais où trouver un homme sincère ?
  '7':
  - type: text
    content: Le juste vit de façon intègre ;
  - type: text
    content: heureux sont ses enfants après lui !
  '8':
  - type: text
    content: Lorsque le roi siège pour juger,
  - type: text
    content: d’un coup d’œil, il dissipe tout ce qui est mal.
  '9':
  - type: text
    content: 'Qui osera dire : « J’ai purifié mon cœur,'
  - type: text
    content: je suis pur de toute faute » ?
