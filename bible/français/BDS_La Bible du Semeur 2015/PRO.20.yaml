document_id: PRO.20
type_code: fra
segments:
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Le vin est plein d’insolence et l’alcool rempli de tapage,
- type: usfm
  marker: q1
  children:
  - type: text
    text: qui s’en laisse griser ne pourra être sage.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Tel le rugissement d’un jeune lion, le roi inspire la terreur :'
- type: usfm
  marker: q1
  children:
  - type: text
    text: qui le met en colère se nuit à lui-même.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Se tenir à l’écart des querelles fait honneur à l’homme,
- type: usfm
  marker: q1
  children:
  - type: text
    text: mais tout insensé s’y jette à corps perdu.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: A la saison froide
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '20.4 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Automne et hiver, l’époque des pluies et des semailles en Israël.
    marker-yv: yv-n
  - type: text
    text: ', le paresseux ne laboure pas,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: au temps de la moisson, il cherche à récolter, mais ne trouve rien.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Les projets que forme l’homme dans son cœur sont comme des eaux profondes,
- type: usfm
  marker: q1
  children:
  - type: text
    text: mais l’homme intelligent sait y puiser.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Beaucoup de gens font état de leur bonté,
- type: usfm
  marker: q1
  children:
  - type: text
    text: mais où trouver un homme sincère ?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Le juste vit de façon intègre ;
- type: usfm
  marker: q1
  children:
  - type: text
    text: heureux sont ses enfants après lui !
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Lorsque le roi siège pour juger,
- type: usfm
  marker: q1
  children:
  - type: text
    text: d’un coup d’œil, il dissipe tout ce qui est mal.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Qui osera dire : « J’ai purifié mon cœur,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: je suis pur de toute faute » ?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Ceux qui ont deux poids différents, et ceux qui utilisent deux mesures différentes
- type: usfm
  marker: q1
  children:
  - type: text
    text: sont l’un et l’autre en horreur à l’Eternel
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '20.10 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Voir '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '11.1'
        metadata:
          usfm: PRO.11.1
      - type: text
        text: ' et note.'
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Le jeune enfant manifeste qui il est par ses actes,
- type: usfm
  marker: q1
  children:
  - type: text
    text: on voit si sa conduite sera pure et droite.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: L’Eternel nous a donné des oreilles pour entendre
- type: usfm
  marker: q1
  children:
  - type: text
    text: et aussi des yeux pour voir.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'N’aime pas trop le sommeil, pour ne pas finir dans la pauvreté :'
- type: usfm
  marker: q1
  children:
  - type: text
    text: garde tes yeux ouverts, et tu auras de quoi te rassasier.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'L’acheteur dit toujours :'
- type: usfm
  marker: q1
  children:
  - type: text
    text: « C’est une bien mauvaise affaire »,
- type: usfm
  marker: q1
  children:
  - type: text
    text: mais dès qu’il est parti, il se félicite de ce qu’il a obtenu.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Si l’or et les perles précieuses abondent,
- type: usfm
  marker: q1
  children:
  - type: text
    text: les joyaux les plus précieux sont des lèvres qui dispensent la connaissance.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Si quelqu’un s’est porté garant des dettes d’un étranger, prends-lui son vêtement,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et s’il a cautionné des inconnus, exige qu’il te donne des gages.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Au premier abord, le pain mal acquis est savoureux,
- type: usfm
  marker: q1
  children:
  - type: text
    text: mais, par la suite, ta bouche se trouvera pleine de cailloux.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Lorsque tu fais des projets, prends conseil,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et ne te lance pas dans une bataille sans une stratégie bien conçue.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Qui divulgue des secrets finit par se répandre en calomnies ;
- type: usfm
  marker: q1
  children:
  - type: text
    text: n’aie donc pas de relations avec un bavard.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Si quelqu’un maudit son père ou sa mère,
- type: usfm
  marker: q1
  children:
  - type: text
    text: sa vie s’éteindra en pleines ténèbres
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '20.20 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Crime puni de mort par la Loi (Ex 21.17 ; Lv 20.9 ; Dt 27.16).
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Il n’y a pas de bénédiction durable
- type: usfm
  marker: q1
  children:
  - type: text
    text: pour un patrimoine vite obtenu au début.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Ne dis pas : « Je me vengerai ! »'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Confie-toi en l’Eternel et il te délivrera.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: L’Eternel a horreur de l’usage de deux poids différents,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et il n’est pas bien d’employer des balances truquées
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '20.23 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Voir v. 10, et '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '11.1'
        metadata:
          usfm: PRO.11.1
      - type: text
        text: ' et note.'
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: C’est l’Eternel qui trace la voie d’un homme ;
- type: usfm
  marker: q1
  children:
  - type: text
    text: comment un humain pourrait-il comprendre par quel chemin il passe ?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: Il est dangereux pour l’homme de consacrer précipitamment quelque chose à l’Eternel
- type: usfm
  marker: q1
  children:
  - type: text
    text: et de ne se mettre à réfléchir qu’après avoir fait son vœu
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '20.25 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Voir '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ec 5.3-5
        metadata:
          usfm: ECC.5.3+ECC.5.4+ECC.5.5
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: Un roi sage chasse au loin les méchants
- type: usfm
  marker: q1
  children:
  - type: text
    text: et fait passer sur eux la roue.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: L’esprit de l’homme est une lampe que l’Eternel a donnée
- type: usfm
  marker: q1
  children:
  - type: text
    text: et qui sonde les profondeurs de l’être.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: La bonté et la fidélité du roi assurent sa protection ;
- type: usfm
  marker: q1
  children:
  - type: text
    text: oui, par sa bonté
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '20.28 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'L’ancienne version grecque a : '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: par sa justice.
    marker-yv: yv-n
  - type: text
    text: ', il affermit son autorité.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: La fierté des jeunes gens, c’est leur force,
- type: usfm
  marker: q1
  children:
  - type: text
    text: mais l’honneur des vieillards, ce sont leurs cheveux blancs.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: Les plaies d’une blessure sont un remède contre le mal,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et les coups que l’on reçoit purgent l’être intérieur.
