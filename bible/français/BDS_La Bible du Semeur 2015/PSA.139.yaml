document_id: PSA.139
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Seigneur, tu sais tout de moi
  marker-yv: yv-h
- type: usfm
  marker: d
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Au chef de chœur. Psaume de David.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Eternel, ╵tu me sondes ╵et tu me connais.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Toi, tu sais quand je m’assieds ╵et quand je me lève.
- type: usfm
  marker: q1
  children:
  - type: text
    text: De loin, tu discernes ╵tout ce que je pense.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Tu sais quand je marche ╵et quand je me couche,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et tous mes chemins ╵te sont familiers.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Bien avant qu’un mot ╵vienne sur mes lèvres,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Eternel, ╵tu sais déjà tout ╵ce que je vais dire.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Tu m’entoures ╵par-derrière et par-devant,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et tu mets ta main sur moi.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Merveilleux savoir ╵hors de ma portée,
- type: usfm
  marker: q1
  children:
  - type: text
    text: savoir trop sublime ╵pour que je l’atteigne.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Où pourrais-je aller ╵loin de ton Esprit ?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Où pourrais-je fuir ╵hors de ta présence ?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Si je monte au ciel ╵tu es là,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et si je descends ╵au séjour des morts, ╵t’y voilà !
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Si j’emprunte ╵les ailes de l’aube
- type: usfm
  marker: q1
  children:
  - type: text
    text: et que j’aille demeurer ╵aux confins des mers,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: là aussi ta main ╵me dirigera,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ton bras droit ╵me tiendra.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Et si je me dis : ╵« Du moins les ténèbres ╵m’envelopperont »,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: alors la nuit même ╵se change en lumière ╵tout autour de moi.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Pour toi, même les ténèbres ╵ne sont pas obscures
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'et la nuit est claire ╵comme le plein jour :'
- type: usfm
  marker: q1
  children:
  - type: text
    text: lumière ou ténèbres ╵pour toi sont pareilles.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Tu m’as fait ce que je suis,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et tu m’as tissé ╵dans le ventre de ma mère.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Je te loue ╵d’avoir fait de moi ╵une créature ╵aussi merveilleuse :'
- type: usfm
  marker: q1
  children:
  - type: text
    text: tu fais des merveilles,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et je le reconnais bien.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Mon corps n’était pas caché ╵à tes yeux
- type: usfm
  marker: q1
  children:
  - type: text
    text: quand, dans le secret, ╵je fus façonné
- type: usfm
  marker: q1
  children:
  - type: text
    text: et tissé ╵comme dans les profondeurs ╵de la terre.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Je n’étais encore ╵qu’une masse informe, ╵mais tu me voyais
- type: usfm
  marker: q1
  children:
  - type: text
    text: et, dans ton registre, ╵se trouvaient déjà inscrits
- type: usfm
  marker: q1
  children:
  - type: text
    text: tous les jours ╵que tu m’avais destinés
- type: usfm
  marker: q1
  children:
  - type: text
    text: alors qu’aucun d’eux ╵n’existait encore.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Combien tes desseins, ô Dieu, ╵sont, pour moi, impénétrables,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et comme ils sont innombrables !
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Si je les comptais,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ils seraient bien plus nombreux ╵que les grains de sable ╵sur les bords des mers.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Voici, je m’éveille, ╵je suis encore avec toi.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Puisses-tu, ô Dieu, ╵faire mourir le méchant !
- type: usfm
  marker: q1
  children:
  - type: text
    text: Que les hommes sanguinaires ╵partent loin de moi !
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Ils se servent de ton nom ╵pour leurs desseins criminels,
- type: usfm
  marker: q1
  children:
  - type: text
    text: eux, tes adversaires, ╵l’utilisent pour tromper.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Eternel, ╵comment donc ne pas haïr ╵ceux qui te haïssent,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et ne pas prendre en dégoût ╵ceux qui te combattent ?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: Eh bien, je leur voue ╵une haine extrême,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et les considère ╵comme mes ennemis mêmes.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: Sonde-moi, ô Dieu, ╵pénètre mon cœur,
- type: usfm
  marker: q1
  children:
  - type: text
    text: examine-moi, ╵et pénètre les pensées ╵qui me bouleversent !
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: Considère si je suis ╵le chemin du mal
- type: usfm
  marker: q1
  children:
  - type: text
    text: et dirige-moi ╵sur la voie ╵prescrite depuis toujours !
