document_id: PSA.139,21
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Seigneur, tu sais tout de moi
    marker-yv: yv-h
  - type: usfm
    marker: d
    children:
    - type: text
      text: Au chef de chœur. Psaume de David.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Eternel, ╵tu me sondes ╵et tu me connais.
  '10':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: là aussi ta main ╵me dirigera,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ton bras droit ╵me tiendra.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Et si je me dis : ╵« Du moins les ténèbres ╵m’envelopperont »,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: alors la nuit même ╵se change en lumière ╵tout autour de moi.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Pour toi, même les ténèbres ╵ne sont pas obscures
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'et la nuit est claire ╵comme le plein jour :'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: lumière ou ténèbres ╵pour toi sont pareilles.
  '13':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tu m’as fait ce que je suis,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et tu m’as tissé ╵dans le ventre de ma mère.
  '14':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Je te loue ╵d’avoir fait de moi ╵une créature ╵aussi merveilleuse :'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: tu fais des merveilles,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et je le reconnais bien.
  '15':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mon corps n’était pas caché ╵à tes yeux
  - type: usfm
    marker: q1
    children:
    - type: text
      text: quand, dans le secret, ╵je fus façonné
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et tissé ╵comme dans les profondeurs ╵de la terre.
  '16':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Je n’étais encore ╵qu’une masse informe, ╵mais tu me voyais
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et, dans ton registre, ╵se trouvaient déjà inscrits
  - type: usfm
    marker: q1
    children:
    - type: text
      text: tous les jours ╵que tu m’avais destinés
  - type: usfm
    marker: q1
    children:
    - type: text
      text: alors qu’aucun d’eux ╵n’existait encore.
  '17':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Combien tes desseins, ô Dieu, ╵sont, pour moi, impénétrables,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et comme ils sont innombrables !
  '18':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Si je les comptais,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ils seraient bien plus nombreux ╵que les grains de sable ╵sur les bords des mers.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Voici, je m’éveille, ╵je suis encore avec toi.
  '19':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Puisses-tu, ô Dieu, ╵faire mourir le méchant !
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Que les hommes sanguinaires ╵partent loin de moi !
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Toi, tu sais quand je m’assieds ╵et quand je me lève.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: De loin, tu discernes ╵tout ce que je pense.
  '20':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ils se servent de ton nom ╵pour leurs desseins criminels,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: eux, tes adversaires, ╵l’utilisent pour tromper.
  '21':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Eternel, ╵comment donc ne pas haïr ╵ceux qui te haïssent,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et ne pas prendre en dégoût ╵ceux qui te combattent ?
  '22':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Eh bien, je leur voue ╵une haine extrême,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et les considère ╵comme mes ennemis mêmes.
  '23':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Sonde-moi, ô Dieu, ╵pénètre mon cœur,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: examine-moi, ╵et pénètre les pensées ╵qui me bouleversent !
  '24':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Considère si je suis ╵le chemin du mal
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et dirige-moi ╵sur la voie ╵prescrite depuis toujours !
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tu sais quand je marche ╵et quand je me couche,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et tous mes chemins ╵te sont familiers.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Bien avant qu’un mot ╵vienne sur mes lèvres,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Eternel, ╵tu sais déjà tout ╵ce que je vais dire.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tu m’entoures ╵par-derrière et par-devant,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et tu mets ta main sur moi.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Merveilleux savoir ╵hors de ma portée,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: savoir trop sublime ╵pour que je l’atteigne.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Où pourrais-je aller ╵loin de ton Esprit ?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Où pourrais-je fuir ╵hors de ta présence ?
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Si je monte au ciel ╵tu es là,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et si je descends ╵au séjour des morts, ╵t’y voilà !
  '9':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Si j’emprunte ╵les ailes de l’aube
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et que j’aille demeurer ╵aux confins des mers,
