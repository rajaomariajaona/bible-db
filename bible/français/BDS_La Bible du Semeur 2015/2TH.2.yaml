document_id: 2TH.2
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ce qui précédera la venue du Seigneur
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Au sujet de la venue de notre Seigneur Jésus-Christ et de notre rassemblement auprès de lui, nous vous le demandons, frères et sœurs : '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: ne vous laissez pas si facilement ébranler dans votre bon sens, ni troubler par une révélation, un message ou une lettre qu’on nous attribuerait, et qui prétendrait que le jour du Seigneur serait déjà là.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Que personne ne vous égare d’aucune façon. Car ce jour n’arrivera pas avant qu’éclate le grand Rejet de Dieu, et que soit révélé l’homme de la révolte
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '2.3 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'C’est-à-dire l’homme sans foi ni loi, qui rejette tout attachement à Dieu et toute norme. De nombreux manuscrits ont : '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'l’homme du péché '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '(voir '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1 Jn 2.18
        metadata:
          usfm: 1JN.2.18
      - type: text
        text: ).
    marker-yv: yv-n
  - type: text
    text: ' qui est destiné à la perdition, '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'l’adversaire qui '
  - type: usfm
    marker: qt
    children:
    - type: text
      text: s’élève au-dessus
  - type: text
    text: ' de tout ce qui porte le nom '
  - type: usfm
    marker: qt
    children:
    - type: text
      text: de dieu
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '2.4 '
    - type: usfm
      marker: ft
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Dn 11.36
        metadata:
          usfm: DAN.11.36
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: ', et de tout ce qui est l’objet d’une vénération religieuse. Il ira jusqu’à s’asseoir dans le temple de Dieu'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '2.4 '
    - type: usfm
      marker: ft
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ez 28.2
        metadata:
          usfm: EZK.28.2
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: ' en se proclamant lui-même dieu. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Je vous disais déjà cela lorsque j’étais encore chez vous : ne vous en souvenez-vous pas ?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Vous savez ce qui le retient pour l’instant afin qu’il ne soit révélé que lorsque son heure sera venue. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Car la puissance mystérieuse de la révolte contre Dieu est déjà à l’œuvre ; mais il suffira que celui qui le retient jusqu’à présent soit écarté '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'pour qu’alors soit révélé l’homme de la révolte. Le Seigneur Jésus '
  - type: usfm
    marker: qt
    children:
    - type: text
      text: le fera périr par le souffle de sa bouche
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '2.8 '
    - type: usfm
      marker: ft
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Es 11.4
        metadata:
          usfm: ISA.11.4
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: ', et le réduira à l’impuissance au moment même de sa venue. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'La venue de cet homme se fera grâce à la puissance de Satan, avec toutes sortes d’actes extraordinaires, de signes impressionnants et de prodiges trompeurs. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Il usera de toutes les formes du mal pour tromper ceux qui se perdent, parce qu’ils sont restés fermés à l’amour de la vérité qui les aurait sauvés. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Voilà pourquoi Dieu leur envoie une puissance d’égarement pour qu’ils croient au mensonge.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Il agit ainsi pour que soient condamnés tous ceux qui n’auront pas cru à la vérité et qui auront pris plaisir au mal.
- type: usfm
  marker: s1
  children:
  - type: text
    text: L’appel à la fermeté dans la foi
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Mais nous, nous devons sans cesse remercier Dieu à votre sujet, frères et sœurs, vous que le Seigneur aime. En effet, Dieu vous a choisis pour que vous soyez les premiers
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '2.13 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Au lieu de : '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'pour que vous soyez les premiers, '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'certains manuscrits ont : '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'dès l’origine. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Les deux expressions diffèrent peu en grec.
    marker-yv: yv-n
  - type: text
    text: ' à être sauvés par l’action de l’Esprit qui vous a purifiés et par le moyen de votre foi en la vérité. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: C’est à cela que Dieu vous a appelés par l’Evangile que nous vous avons annoncé ; il vous a appelés, pour que vous possédiez la gloire de notre Seigneur Jésus-Christ.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Demeurez donc fermes, frères et sœurs, et attachez-vous aux enseignements que nous vous avons transmis, soit de vive voix, soit par nos lettres. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Notre Seigneur Jésus-Christ lui-même, et Dieu, notre Père, nous ont témoigné tant d’amour, et, par grâce, nous ont donné une source éternelle de réconfort et une bonne espérance. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Qu’ils vous remplissent de courage et vous accordent la force de pratiquer toujours le bien, en actes et en paroles.
