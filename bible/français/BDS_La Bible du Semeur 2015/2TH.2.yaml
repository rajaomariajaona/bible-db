document_id: 2TH.2,21
type_code: fra
verses:
  '1':
  - type: heading
    content: Ce qui précédera la venue du Seigneur
  - type: text
    content: 'Au sujet de la venue de notre Seigneur Jésus-Christ et de notre rassemblement auprès de lui, nous vous le demandons, frères et sœurs : '
  '10':
  - type: text
    content: 'Il usera de toutes les formes du mal pour tromper ceux qui se perdent, parce qu’ils sont restés fermés à l’amour de la vérité qui les aurait sauvés. '
  '11':
  - type: text
    content: Voilà pourquoi Dieu leur envoie une puissance d’égarement pour qu’ils croient au mensonge.
  '12':
  - type: text
    content: Il agit ainsi pour que soient condamnés tous ceux qui n’auront pas cru à la vérité et qui auront pris plaisir au mal.
  - type: heading
    content: L’appel à la fermeté dans la foi
  '13':
  - type: text
    content: Mais nous, nous devons sans cesse remercier Dieu à votre sujet, frères et sœurs, vous que le Seigneur aime. En effet, Dieu vous a choisis pour que vous soyez les premiers
  - type: note
    content: 'Au lieu de : pour que vous soyez les premiers, certains manuscrits ont : dès l’origine. Les deux expressions diffèrent peu en grec.'
  - type: text
    content: ' à être sauvés par l’action de l’Esprit qui vous a purifiés et par le moyen de votre foi en la vérité. '
  '14':
  - type: text
    content: C’est à cela que Dieu vous a appelés par l’Evangile que nous vous avons annoncé ; il vous a appelés, pour que vous possédiez la gloire de notre Seigneur Jésus-Christ.
  '15':
  - type: text
    content: 'Demeurez donc fermes, frères et sœurs, et attachez-vous aux enseignements que nous vous avons transmis, soit de vive voix, soit par nos lettres. '
  '16':
  - type: text
    content: 'Notre Seigneur Jésus-Christ lui-même, et Dieu, notre Père, nous ont témoigné tant d’amour, et, par grâce, nous ont donné une source éternelle de réconfort et une bonne espérance. '
  '17':
  - type: text
    content: Qu’ils vous remplissent de courage et vous accordent la force de pratiquer toujours le bien, en actes et en paroles.
  '2':
  - type: text
    content: ne vous laissez pas si facilement ébranler dans votre bon sens, ni troubler par une révélation, un message ou une lettre qu’on nous attribuerait, et qui prétendrait que le jour du Seigneur serait déjà là.
  '3':
  - type: text
    content: Que personne ne vous égare d’aucune façon. Car ce jour n’arrivera pas avant qu’éclate le grand Rejet de Dieu, et que soit révélé l’homme de la révolte
  - type: note
    content: 'C’est-à-dire l’homme sans foi ni loi, qui rejette tout attachement à Dieu et toute norme. De nombreux manuscrits ont : l’homme du péché (voir 1 Jn 2.18).'
  - type: text
    content: ' qui est destiné à la perdition, '
  '4':
  - type: text
    content: 'l’adversaire qui '
  - type: text
    content: s’élève au-dessus
  - type: text
    content: ' de tout ce qui porte le nom '
  - type: text
    content: de dieu
  - type: note
    content: Dn 11.36.
  - type: text
    content: ', et de tout ce qui est l’objet d’une vénération religieuse. Il ira jusqu’à s’asseoir dans le temple de Dieu'
  - type: note
    content: Ez 28.2.
  - type: text
    content: ' en se proclamant lui-même dieu. '
  '5':
  - type: text
    content: 'Je vous disais déjà cela lorsque j’étais encore chez vous : ne vous en souvenez-vous pas ?'
  '6':
  - type: text
    content: 'Vous savez ce qui le retient pour l’instant afin qu’il ne soit révélé que lorsque son heure sera venue. '
  '7':
  - type: text
    content: 'Car la puissance mystérieuse de la révolte contre Dieu est déjà à l’œuvre ; mais il suffira que celui qui le retient jusqu’à présent soit écarté '
  '8':
  - type: text
    content: 'pour qu’alors soit révélé l’homme de la révolte. Le Seigneur Jésus '
  - type: text
    content: le fera périr par le souffle de sa bouche
  - type: note
    content: Es 11.4.
  - type: text
    content: ', et le réduira à l’impuissance au moment même de sa venue. '
  '9':
  - type: text
    content: 'La venue de cet homme se fera grâce à la puissance de Satan, avec toutes sortes d’actes extraordinaires, de signes impressionnants et de prodiges trompeurs. '
