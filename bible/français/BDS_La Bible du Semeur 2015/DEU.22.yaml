document_id: DEU.22,21
type_code: fra
verses:
  '1':
  - type: heading
    content: Les lois diverses
  - type: heading
    content: L’entraide
  - type: text
    content: Si tu vois errer à l’aventure le bœuf de ton compatriote ou son mouton, ne t’en désintéresse pas ; au contraire, tu ne manqueras pas de le ramener à son propriétaire
  - type: note
    content: Pour les v. 1-4, voir Ex 23.4-5.
  - type: text
    content: '. '
  '10':
  - type: text
    content: Tu ne laboureras pas en attelant un bœuf et un âne ensemble à la même charrue.
  '11':
  - type: text
    content: Tu ne porteras pas de vêtement coupé dans un tissu de laine et de lin mélangés.
  '12':
  - type: text
    content: Tu mettras des cordons aux quatre coins du vêtement dont tu t’envelopperas
  - type: note
    content: Voir Nb 15.38-40. Ce texte est à l’origine de la pratique juive de porter une écharpe de prière à franges. Les Juifs pieux portent aussi en permanence un vêtement avec des franges. Voir Mt 23.5.
  - type: text
    content: .
  - type: heading
    content: L’épouse accusée à tort
  '13':
  - type: text
    content: 'Supposons qu’un homme ait épousé une femme, qu’il se soit uni à elle et que, par la suite, il la prenne en aversion '
  '14':
  - type: text
    content: 'et invente contre elle une fausse accusation et lui fasse une mauvaise réputation, en disant qu’il ne l’a pas trouvée vierge quand il l’a épousée et s’est approché d’elle. '
  '15':
  - type: text
    content: 'Dans ce cas, les parents de la jeune femme apporteront aux responsables de la ville qui siègent aux portes de la cité les preuves de sa virginité. '
  '16':
  - type: text
    content: 'Le père leur déclarera : « J’ai donné ma fille en mariage à cet homme, mais il l’a prise en aversion, '
  '17':
  - type: text
    content: 'et maintenant, il invente contre elle une fausse accusation, prétextant ne pas l’avoir trouvée vierge. Or, voici les preuves de sa virginité. » Alors ils déplieront devant les responsables le drap de la nuit de noce. '
  '18':
  - type: text
    content: 'Les responsables de cette ville prendront l’homme et lui infligeront un châtiment, '
  '19':
  - type: text
    content: parce qu’il a porté atteinte à la réputation d’une vierge d’Israël, ils le condamneront à une amende de cent pièces d’argent qu’ils remettront au père de la jeune femme
  - type: note
    content: Amende sévère, double de celle imposée à celui qui séduit une vierge (voir v. 29).
  - type: text
    content: '  ; elle restera sa femme tant qu’il vivra : il n’aura plus le droit de la renvoyer.'
  '2':
  - type: text
    content: 'Si celui-ci habite trop loin de toi ou si tu ne sais qui est le propriétaire, tu prendras l’animal chez toi, et tu le garderas dans ta maison jusqu’à ce que son propriétaire vienne le réclamer, et alors tu le lui rendras. '
  '20':
  - type: text
    content: 'Si, au contraire, l’accusation s’avère fondée et si la virginité de la jeune femme n’est pas prouvée, '
  '21':
  - type: text
    content: on l’amènera à l’entrée de la maison de son père, ses concitoyens la feront mourir par lapidation parce qu’elle a commis une chose infâme en Israël en se déshonorant lorsqu’elle vivait encore dans la maison de son père. Ainsi vous ferez disparaître du milieu de vous la souillure qu’entraîne le mal.
  - type: heading
    content: Les relations sexuelles illicites
  '22':
  - type: text
    content: Si l’on surprend un homme en train de coucher avec une femme mariée, tous les deux, l’homme et la femme, seront mis à mort. Ainsi vous ferez disparaître du milieu d’Israël la souillure qu’entraîne le mal
  - type: note
    content: Voir 1 Co 5.13.
  - type: text
    content: .
  '23':
  - type: text
    content: 'Si une jeune fille vierge est fiancée à quelqu’un et qu’un autre homme la rencontre dans la ville et couche avec elle, '
  '24':
  - type: text
    content: vous les amènerez tous les deux à la porte de la ville
  - type: note
    content: Voir 17.5.
  - type: text
    content: ' et vous les lapiderez pour les faire mourir. La jeune fille mourra parce qu’elle n’a pas appelé au secours, bien que cela se soit passé en ville, et l’homme parce qu’il a déshonoré la femme de son prochain. Ainsi vous ferez disparaître du milieu de vous la souillure qu’entraîne le mal'
  - type: note
    content: Voir 1 Co 5.13.
  - type: text
    content: '. '
  '25':
  - type: text
    content: 'Mais si c’est en pleine campagne que l’homme trouve la jeune fille fiancée et qu’il la viole, lui seul sera mis à mort. '
  '26':
  - type: text
    content: 'Vous ne ferez rien à la jeune fille, car elle n’a pas commis de faute qui mérite la mort. En effet, elle s’est trouvée dans le même cas que lorsqu’un homme attaque son prochain et le tue. '
  '27':
  - type: text
    content: Puisque c’est en plein champ que l’homme l’a rencontrée, elle aura eu beau crier, personne n’est venu à son secours.
  '28':
  - type: text
    content: 'Si un homme rencontre une jeune fille non fiancée, qu’il s’empare d’elle et couche avec elle et qu’on les prenne sur le fait, '
  '29':
  - type: text
    content: l’homme qui a couché avec elle versera au père de la jeune fille cinquante pièces d’argent et devra l’épouser puisqu’il l’a violée. De plus, il ne pourra jamais la renvoyer tant qu’il vivra
  - type: note
    content: Voir Ex 22.15-16.
  - type: text
    content: .
  '3':
  - type: text
    content: 'Tu agiras de même si tu trouves son âne, son manteau ou tout autre objet que ton compatriote aura perdu et que tu trouveras : tu n’as pas le droit de t’en désintéresser.'
  '4':
  - type: text
    content: Si tu vois l’âne de ton compatriote ou son bœuf tomber sur un chemin, ne t’en désintéresse pas, va aider son propriétaire à relever l’animal.
  - type: heading
    content: Contre les mélanges et autres lois
  '5':
  - type: text
    content: 'Une femme ne portera pas des habits d’homme, ni un homme des vêtements féminins, car l’Eternel a en abomination ceux qui agissent ainsi. '
  '6':
  - type: text
    content: 'Si tu trouves en chemin un nid d’oiseau sur un arbre ou par terre, un nid avec une mère couvant des œufs ou abritant des oisillons, tu ne prendras pas la mère avec sa couvée ; '
  '7':
  - type: text
    content: laisse s’envoler la mère, et tu pourras prendre les petits. Si tu agis ainsi, tu seras heureux et tu vivras longtemps.
  '8':
  - type: text
    content: Si tu construis une nouvelle maison, tu installeras une balustrade autour de ton toit en terrasse, pour que tu ne sois pas responsable de la mort de quelqu’un qui tomberait du toit
  - type: note
    content: Les toits d’Orient étaient des terrasses sur lesquelles on se promenait et où l’on dormait quand la nuit était trop chaude.
  - type: text
    content: .
  '9':
  - type: text
    content: Tu ne sèmeras pas d’autres plantes dans ta vigne, sinon tout ce qu’elle produira – les raisins comme la récolte des autres graines – deviendra sacré
  - type: note
    content: Pour les v. 9-11, voir Lv 19.19.
  - type: text
    content: '. '
