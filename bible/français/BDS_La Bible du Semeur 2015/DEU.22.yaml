document_id: DEU.22
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Les lois diverses
  marker-yv: yv-h
- type: usfm
  marker: s2
  children:
  - type: text
    text: L’entraide
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Si tu vois errer à l’aventure le bœuf de ton compatriote ou son mouton, ne t’en désintéresse pas ; au contraire, tu ne manqueras pas de le ramener à son propriétaire
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '22.1 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Pour les v. 1-4, voir '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ex 23.4-5
        metadata:
          usfm: EXO.23.4+EXO.23.5
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Si celui-ci habite trop loin de toi ou si tu ne sais qui est le propriétaire, tu prendras l’animal chez toi, et tu le garderas dans ta maison jusqu’à ce que son propriétaire vienne le réclamer, et alors tu le lui rendras. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Tu agiras de même si tu trouves son âne, son manteau ou tout autre objet que ton compatriote aura perdu et que tu trouveras : tu n’as pas le droit de t’en désintéresser.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Si tu vois l’âne de ton compatriote ou son bœuf tomber sur un chemin, ne t’en désintéresse pas, va aider son propriétaire à relever l’animal.
- type: usfm
  marker: s2
  children:
  - type: text
    text: Contre les mélanges et autres lois
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Une femme ne portera pas des habits d’homme, ni un homme des vêtements féminins, car l’Eternel a en abomination ceux qui agissent ainsi. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Si tu trouves en chemin un nid d’oiseau sur un arbre ou par terre, un nid avec une mère couvant des œufs ou abritant des oisillons, tu ne prendras pas la mère avec sa couvée ; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: laisse s’envoler la mère, et tu pourras prendre les petits. Si tu agis ainsi, tu seras heureux et tu vivras longtemps.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Si tu construis une nouvelle maison, tu installeras une balustrade autour de ton toit en terrasse, pour que tu ne sois pas responsable de la mort de quelqu’un qui tomberait du toit
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '22.8 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Les toits d’Orient étaient des terrasses sur lesquelles on se promenait et où l’on dormait quand la nuit était trop chaude.
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Tu ne sèmeras pas d’autres plantes dans ta vigne, sinon tout ce qu’elle produira – les raisins comme la récolte des autres graines – deviendra sacré
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '22.9 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Pour les v. 9-11, voir '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Lv 19.19
        metadata:
          usfm: LEV.19.19
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Tu ne laboureras pas en attelant un bœuf et un âne ensemble à la même charrue.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Tu ne porteras pas de vêtement coupé dans un tissu de laine et de lin mélangés.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Tu mettras des cordons aux quatre coins du vêtement dont tu t’envelopperas
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '22.12 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Voir '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Nb 15.38-40
        metadata:
          usfm: NUM.15.38+NUM.15.39+NUM.15.40
      - type: text
        text: '. Ce texte est à l’origine de la pratique juive de porter une écharpe de prière à franges. Les Juifs pieux portent aussi en permanence un vêtement avec des franges. Voir '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Mt 23.5
        metadata:
          usfm: MAT.23.5
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: s2
  children:
  - type: text
    text: L’épouse accusée à tort
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Supposons qu’un homme ait épousé une femme, qu’il se soit uni à elle et que, par la suite, il la prenne en aversion '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'et invente contre elle une fausse accusation et lui fasse une mauvaise réputation, en disant qu’il ne l’a pas trouvée vierge quand il l’a épousée et s’est approché d’elle. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Dans ce cas, les parents de la jeune femme apporteront aux responsables de la ville qui siègent aux portes de la cité les preuves de sa virginité. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Le père leur déclarera : « J’ai donné ma fille en mariage à cet homme, mais il l’a prise en aversion, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'et maintenant, il invente contre elle une fausse accusation, prétextant ne pas l’avoir trouvée vierge. Or, voici les preuves de sa virginité. » Alors ils déplieront devant les responsables le drap de la nuit de noce. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Les responsables de cette ville prendront l’homme et lui infligeront un châtiment, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: parce qu’il a porté atteinte à la réputation d’une vierge d’Israël, ils le condamneront à une amende de cent pièces d’argent qu’ils remettront au père de la jeune femme
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '22.19 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Amende sévère, double de celle imposée à celui qui séduit une vierge (voir v. 29).
    marker-yv: yv-n
  - type: text
    text: '  ; elle restera sa femme tant qu’il vivra : il n’aura plus le droit de la renvoyer.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Si, au contraire, l’accusation s’avère fondée et si la virginité de la jeune femme n’est pas prouvée, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: on l’amènera à l’entrée de la maison de son père, ses concitoyens la feront mourir par lapidation parce qu’elle a commis une chose infâme en Israël en se déshonorant lorsqu’elle vivait encore dans la maison de son père. Ainsi vous ferez disparaître du milieu de vous la souillure qu’entraîne le mal.
- type: usfm
  marker: s2
  children:
  - type: text
    text: Les relations sexuelles illicites
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: Si l’on surprend un homme en train de coucher avec une femme mariée, tous les deux, l’homme et la femme, seront mis à mort. Ainsi vous ferez disparaître du milieu d’Israël la souillure qu’entraîne le mal
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '22.22 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Voir '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1 Co 5.13
        metadata:
          usfm: 1CO.5.13
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Si une jeune fille vierge est fiancée à quelqu’un et qu’un autre homme la rencontre dans la ville et couche avec elle, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: vous les amènerez tous les deux à la porte de la ville
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '22.24 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Voir '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '17.5'
        metadata:
          usfm: DEU.17.5
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: ' et vous les lapiderez pour les faire mourir. La jeune fille mourra parce qu’elle n’a pas appelé au secours, bien que cela se soit passé en ville, et l’homme parce qu’il a déshonoré la femme de son prochain. Ainsi vous ferez disparaître du milieu de vous la souillure qu’entraîne le mal'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '22.24 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Voir '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1 Co 5.13
        metadata:
          usfm: 1CO.5.13
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Mais si c’est en pleine campagne que l’homme trouve la jeune fille fiancée et qu’il la viole, lui seul sera mis à mort. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Vous ne ferez rien à la jeune fille, car elle n’a pas commis de faute qui mérite la mort. En effet, elle s’est trouvée dans le même cas que lorsqu’un homme attaque son prochain et le tue. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: Puisque c’est en plein champ que l’homme l’a rencontrée, elle aura eu beau crier, personne n’est venu à son secours.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'Si un homme rencontre une jeune fille non fiancée, qu’il s’empare d’elle et couche avec elle et qu’on les prenne sur le fait, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: l’homme qui a couché avec elle versera au père de la jeune fille cinquante pièces d’argent et devra l’épouser puisqu’il l’a violée. De plus, il ne pourra jamais la renvoyer tant qu’il vivra
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '22.29 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Voir '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ex 22.15-16
        metadata:
          usfm: EXO.22.15+EXO.22.16
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: .
