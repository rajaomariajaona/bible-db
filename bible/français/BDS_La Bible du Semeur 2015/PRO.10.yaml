document_id: PRO.10,21
type_code: fra
verses:
  '1':
  - type: usfm
    marker: ms1
    children:
    - type: text
      text: Proverbes de Salomon
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '10 titre '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Voir '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: '1.1'
        - type: text
          text: ' et l’introduction.'
      marker-yv: yv-n
    marker-yv: yv-h
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Un fils sensé réjouit son père,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: mais un fils insensé cause du chagrin à sa mère.
  '10':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Qui cligne de l’œil cause du tourment,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: mais celui qui critique en toute franchise travaille pour la paix
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '10.10 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: mais celui qui critique… paix
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: ': '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: d’après l’ancienne version grecque. Le texte hébreu traditionnel répète ici la seconde partie du v. 8.
      marker-yv: yv-n
    - type: text
      text: .
  '11':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Les paroles du juste sont une source de vie
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '10.11 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Voir '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: '3.18'
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: ','
  - type: usfm
    marker: q1
    children:
    - type: text
      text: mais celles du méchant cachent la violence.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: La haine allume des querelles,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: mais l’amour couvre toutes les fautes
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '10.12 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Cité en Jc 5.20 ; 1 P 4.8.
      marker-yv: yv-n
    - type: text
      text: .
  '13':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: La sagesse se trouve sur les lèvres de l’homme sensé,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et les coups de bâton sur le dos de celui qui est déraisonnable.
  '14':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Les sages amassent le savoir,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: mais lorsqu’un insensé parle, le malheur n’est pas loin.
  '15':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: La fortune du riche lui tient lieu de place forte,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: alors que la pauvreté des petites gens fait leur ruine.
  '16':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Le travail du juste le fait vivre ;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ce que le méchant gagne sert à faire le mal.
  '17':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Qui tient compte des critiques qu’on lui fait est sur la voie de la vie,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: mais celui qui fait fi des reproches se fourvoie.
  '18':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Qui cache sa haine a des lèvres menteuses,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et qui répand des calomnies est insensé.
  '19':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Qui parle beaucoup ne saurait éviter de pécher,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: mais l’homme avisé met un frein à ses lèvres.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Les biens des méchants ne leur profitent pas,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: mais mener une vie juste sauve de la mort.
  '20':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: La langue du juste est un argent de choix ;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ce que pensent les méchants n’a pas grande valeur.
  '21':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Les paroles du juste orientent beaucoup de gens,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: mais les insensés périssent faute de bon sens.
  '22':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: C’est la bénédiction de l’Eternel qui enrichit,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et toute la peine qu’on se donne n’y ajoute rien
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '10.22 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Autre traduction : '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: et il n’y ajoute aucune peine.
      marker-yv: yv-n
    - type: text
      text: .
  '23':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Commettre des actions infâmes est un jeu pour l’insensé ;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: de même, la sagesse l’est pour l’homme intelligent.
  '24':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ce que le méchant redoute lui arrive,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: mais ce que le juste désire lui sera accordé.
  '25':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Quand la tempête a passé, le méchant n’est plus,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: alors que le juste est établi sur un fondement éternel.
  '26':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Comme du vinaigre sur les dents ou de la fumée dans les yeux,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: tel est le paresseux pour celui qui l’envoie.
  '27':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Craindre l’Eternel prolonge la vie,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: mais les années du méchant seront abrégées
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '10.27 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Voir 11.31 ; 13.21 ; 14.26-27 ; 19.23.
      marker-yv: yv-n
    - type: text
      text: .
  '28':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: L’attente du juste débouche sur la joie,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: mais les espérances des méchants seront déçues.
  '29':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: La manière d’agir de l’Eternel est une forteresse pour l’homme intègre,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: mais elle cause la ruine de ceux qui font le mal.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: L’Eternel ne permet pas que l’homme droit souffre de la faim,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: mais il frustre les désirs des méchants.
  '30':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Le juste ne sera jamais ébranlé,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: mais les méchants ne demeureront pas sur la terre.
  '31':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: La bouche du juste est féconde en sagesse,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: mais la langue perverse sera coupée.
  '32':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Les lèvres du juste connaissent la bienveillance,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: mais la bouche des méchants est perverse.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: La main nonchalante appauvrit,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: mais la main active enrichit.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Celui qui amasse des provisions en été est un fils intelligent,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: mais celui qui dort pendant la moisson est un fils qui fait honte.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Des bénédictions reposent sur la tête du juste,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: mais les paroles des méchants cachent la violence.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Le souvenir du juste continue à être en bénédiction aux autres,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: mais le nom des méchants tombe dans l’oubli.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Un esprit sage prend à cœur les préceptes,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: mais le bavard insensé est l’artisan de sa propre perte.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Qui vit dans l’intégrité marche en sécurité.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Qui suit des voies tortueuses sera vite démasqué.
