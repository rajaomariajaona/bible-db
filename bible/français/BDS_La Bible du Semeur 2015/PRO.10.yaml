document_id: PRO.10,21
type_code: fra
verses:
  '1':
  - type: heading
    content: Proverbes de SalomonVoir 1.1 et l’introduction.
  - type: text
    content: Un fils sensé réjouit son père,
  - type: text
    content: mais un fils insensé cause du chagrin à sa mère.
  '10':
  - type: text
    content: Qui cligne de l’œil cause du tourment,
  - type: text
    content: mais celui qui critique en toute franchise travaille pour la paix
  - type: note
    content: 'mais celui qui critique… paix: d’après l’ancienne version grecque. Le texte hébreu traditionnel répète ici la seconde partie du v. 8.'
  - type: text
    content: .
  '11':
  - type: text
    content: Les paroles du juste sont une source de vie
  - type: note
    content: Voir 3.18.
  - type: text
    content: ','
  - type: text
    content: mais celles du méchant cachent la violence.
  '12':
  - type: text
    content: La haine allume des querelles,
  - type: text
    content: mais l’amour couvre toutes les fautes
  - type: note
    content: Cité en Jc 5.20 ; 1 P 4.8.
  - type: text
    content: .
  '13':
  - type: text
    content: La sagesse se trouve sur les lèvres de l’homme sensé,
  - type: text
    content: et les coups de bâton sur le dos de celui qui est déraisonnable.
  '14':
  - type: text
    content: Les sages amassent le savoir,
  - type: text
    content: mais lorsqu’un insensé parle, le malheur n’est pas loin.
  '15':
  - type: text
    content: La fortune du riche lui tient lieu de place forte,
  - type: text
    content: alors que la pauvreté des petites gens fait leur ruine.
  '16':
  - type: text
    content: Le travail du juste le fait vivre ;
  - type: text
    content: ce que le méchant gagne sert à faire le mal.
  '17':
  - type: text
    content: Qui tient compte des critiques qu’on lui fait est sur la voie de la vie,
  - type: text
    content: mais celui qui fait fi des reproches se fourvoie.
  '18':
  - type: text
    content: Qui cache sa haine a des lèvres menteuses,
  - type: text
    content: et qui répand des calomnies est insensé.
  '19':
  - type: text
    content: Qui parle beaucoup ne saurait éviter de pécher,
  - type: text
    content: mais l’homme avisé met un frein à ses lèvres.
  '2':
  - type: text
    content: Les biens des méchants ne leur profitent pas,
  - type: text
    content: mais mener une vie juste sauve de la mort.
  '20':
  - type: text
    content: La langue du juste est un argent de choix ;
  - type: text
    content: ce que pensent les méchants n’a pas grande valeur.
  '21':
  - type: text
    content: Les paroles du juste orientent beaucoup de gens,
  - type: text
    content: mais les insensés périssent faute de bon sens.
  '22':
  - type: text
    content: C’est la bénédiction de l’Eternel qui enrichit,
  - type: text
    content: et toute la peine qu’on se donne n’y ajoute rien
  - type: note
    content: 'Autre traduction : et il n’y ajoute aucune peine.'
  - type: text
    content: .
  '23':
  - type: text
    content: Commettre des actions infâmes est un jeu pour l’insensé ;
  - type: text
    content: de même, la sagesse l’est pour l’homme intelligent.
  '24':
  - type: text
    content: Ce que le méchant redoute lui arrive,
  - type: text
    content: mais ce que le juste désire lui sera accordé.
  '25':
  - type: text
    content: Quand la tempête a passé, le méchant n’est plus,
  - type: text
    content: alors que le juste est établi sur un fondement éternel.
  '26':
  - type: text
    content: Comme du vinaigre sur les dents ou de la fumée dans les yeux,
  - type: text
    content: tel est le paresseux pour celui qui l’envoie.
  '27':
  - type: text
    content: Craindre l’Eternel prolonge la vie,
  - type: text
    content: mais les années du méchant seront abrégées
  - type: note
    content: Voir 11.31 ; 13.21 ; 14.26-27 ; 19.23.
  - type: text
    content: .
  '28':
  - type: text
    content: L’attente du juste débouche sur la joie,
  - type: text
    content: mais les espérances des méchants seront déçues.
  '29':
  - type: text
    content: La manière d’agir de l’Eternel est une forteresse pour l’homme intègre,
  - type: text
    content: mais elle cause la ruine de ceux qui font le mal.
  '3':
  - type: text
    content: L’Eternel ne permet pas que l’homme droit souffre de la faim,
  - type: text
    content: mais il frustre les désirs des méchants.
  '30':
  - type: text
    content: Le juste ne sera jamais ébranlé,
  - type: text
    content: mais les méchants ne demeureront pas sur la terre.
  '31':
  - type: text
    content: La bouche du juste est féconde en sagesse,
  - type: text
    content: mais la langue perverse sera coupée.
  '32':
  - type: text
    content: Les lèvres du juste connaissent la bienveillance,
  - type: text
    content: mais la bouche des méchants est perverse.
  '4':
  - type: text
    content: La main nonchalante appauvrit,
  - type: text
    content: mais la main active enrichit.
  '5':
  - type: text
    content: Celui qui amasse des provisions en été est un fils intelligent,
  - type: text
    content: mais celui qui dort pendant la moisson est un fils qui fait honte.
  '6':
  - type: text
    content: Des bénédictions reposent sur la tête du juste,
  - type: text
    content: mais les paroles des méchants cachent la violence.
  '7':
  - type: text
    content: Le souvenir du juste continue à être en bénédiction aux autres,
  - type: text
    content: mais le nom des méchants tombe dans l’oubli.
  '8':
  - type: text
    content: Un esprit sage prend à cœur les préceptes,
  - type: text
    content: mais le bavard insensé est l’artisan de sa propre perte.
  '9':
  - type: text
    content: Qui vit dans l’intégrité marche en sécurité.
  - type: text
    content: Qui suit des voies tortueuses sera vite démasqué.
