  '1':
  - type: usfm
    marker: imt1
    children:
    - type: text
      text: Introduction
  - type: usfm
    marker: ip
    children:
    - type: text
      text: Paul est à nouveau en prison à Rome (1.8) mais les conditions de sa détention sont beaucoup plus rigoureuses que lors de sa première captivité dans cette ville (2.9). Il se sent abandonné des hommes (1.15 ; 4.10). Seul Luc est resté avec lui (4.11).
  - type: usfm
    marker: ip
    children:
    - type: text
      text: On peut situer la rédaction de cette lettre entre 64 et 67.
  - type: usfm
    marker: ip
    children:
    - type: text
      text: 'Paul demande à Timothée de venir « au plus tôt » (4.9), avant l’hiver (4.21), avec le manteau et les parchemins qu’il a laissés à Troas (4.13). Mais il n’est pas sûr de le revoir : il sait que « le moment de son départ est arrivé » (4.6). Aussi ce texte a-t-il des allures de testament : le regard de Paul se pose à la fois sur son passé (ses souvenirs : 1.5-6, 11 ; 3.10-11), son présent (son procès : 4.16) et son avenir proche (son « départ » imminent).'
  - type: usfm
    marker: ip
    children:
    - type: text
      text: 'La lettre contient donc de nombreuses directives sur ce que Timothée devra faire pour rester fidèle à l’enseignement reçu. Dans la situation de persécution qui a amené Paul en prison, et en raison des enseignements erronés qui menacent les Eglises, Paul donne à Timothée des encouragements (chap. 1) pour supporter la souffrance (2.1-13) et pour défendre la vérité (2.14 à 4.15) : il devra éviter les discussions inutiles (2.14-26), s’éloigner des gens qui enseignent des erreurs (3.1-9), rester attaché à ce qu’il a appris (3.10-17) et prêcher la Parole (4.1-5). Car « toute l’Ecriture est inspirée de Dieu et utile pour enseigner, réfuter, redresser et apprendre à mener une vie conforme à la volonté de Dieu » (3.16).'
