document_id: 1SA.26,21
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: David épargne encore Saül
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Les gens de Ziph se rendirent encore auprès de Saül à Guibéa pour lui dire : Sais-tu que David est caché dans les collines de Hakila, à la lisière du désert ?'
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'Aussi vrai que l’Eternel est vivant, ajouta-t-il, c’est l’Eternel qui le frappera, soit en le faisant mourir de mort naturelle, soit en le faisant périr à la guerre. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: Que l’Eternel me garde de porter la main sur celui qui a reçu l’onction de la part de l’Eternel ! Prenons seulement la lance qui est à son chevet et la cruche d’eau, et allons-nous-en.
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: David enleva la lance et la cruche d’eau qui étaient au chevet de Saül, et ils partirent. Personne ne les vit, personne ne s’aperçut de rien, personne ne se réveilla, tous dormaient, car l’Eternel avait fait tomber sur eux un profond sommeil.
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'David franchit la vallée et grimpa au sommet de la montagne au loin, à une bonne distance du camp de Saül. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'Puis il se mit à crier en direction de l’armée d’Abner, fils de Ner : Eh, Abner ! répondras-tu ?'
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Abner dit : Qui es-tu, toi qui oses interpeller le roi ?'
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'David reprit : Tu es un homme, toi, un vrai ! Tu n’as pas ton pareil en Israël, n’est-ce pas ? Alors pourquoi n’as-tu pas veillé sur le roi ton maître ? Quelqu’un du peuple est venu pour tuer le roi, ton maître. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: Ce n’est pas bien, ce que tu as fait là ! Aussi vrai que l’Eternel est vivant, vous méritez tous la mort pour n’avoir pas veillé sur votre maître, sur celui qui a reçu l’onction de la part de l’Eternel ! Regarde maintenant où sont la lance du roi et la cruche d’eau qui étaient à son chevet !
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'Saül reconnut la voix de David et dit : Est-ce bien toi que j’entends, mon fils David ?'
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'David répondit : C’est bien ma voix, mon seigneur le roi !'
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'Et il ajouta : Pourquoi mon seigneur poursuit-il ainsi son serviteur ? Qu’ai-je fait ? Quel crime ai-je commis ? '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'Maintenant, que mon seigneur daigne écouter les paroles de son serviteur : Si c’est l’Eternel qui t’incite à agir ainsi contre moi, qu’il se laisse apaiser par mon offrande ! Mais si ce sont des hommes qui t’excitent, qu’ils soient maudits devant l’Eternel, puisqu’ils m’ont banni pour m’empêcher de rester dans le pays accordé par l’Eternel comme possession à son peuple. Au fond, c’est comme s’ils disaient : « Va adorer des dieux étrangers » ! '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'Saül partit et se rendit au désert de Ziph avec trois mille hommes d’élite d’Israël pour y traquer David. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: Mais maintenant, que mon sang ne soit pas versé loin de l’Eternel, car le roi d’Israël s’est mis en campagne pour chercher une misérable puce, comme on pourchasserait une perdrix dans les montagnes.
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: 'Alors Saül s’écria : J’ai commis une faute, reviens, mon fils David, je ne te ferai plus de mal, puisque cette nuit tu as épargné ma vie. J’ai agi comme un insensé et j’ai commis une grave erreur.'
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: 'David répondit : Voici ta lance, ô roi ! Envoie l’un de tes jeunes gens pour venir la prendre. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: 'Que chacun de nous soit traité selon sa justice et sa fidélité par l’Eternel, car il t’avait livré aujourd’hui en mon pouvoir, mais je n’ai pas voulu porter la main sur celui qui a reçu l’onction de sa part. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: Comme ta vie a été pour moi d’un grand prix aujourd’hui, ainsi ma vie sera d’un grand prix pour l’Eternel, et il me délivrera de toute détresse.
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: 'Alors Saül reprit : Sois béni, mon fils David ! Certainement tu accompliras beaucoup de choses et tu réussiras tout ce que tu entreprendras.'
  - type: usfm
    marker: p
    children:
    - type: text
      text: Puis David reprit son chemin, tandis que Saül retournait chez lui.
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'Il établit son camp dans les collines de Hakila, à la lisière du désert, près de la route. David séjournait au désert et il s’aperçut que Saül était venu le poursuivre là. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'Il envoya des éclaireurs en reconnaissance et apprit que Saül était effectivement arrivé. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: Il se mit en route et parvint à l’endroit où Saül campait. Il repéra l’endroit précis où dormaient Saül et Abner, fils de Ner, son général. Saül était couché au milieu du camp et ses hommes campaient autour de lui.
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: David appela Ahimélek le Hittite et Abishaï, fils de Tserouya
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '26.6 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Tserouya '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: était une sœur aînée de David (
        - type: usfm
          marker: ref
          children:
          - type: text
            text: 1 Ch 2.16
        - type: text
          text: '), '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'Abishaï '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'était donc son neveu comme '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'Joab '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '(qui deviendra son général en chef) et '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'Asaël '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: (
        - type: usfm
          marker: ref
          children:
          - type: text
            text: 2 S 2.18
        - type: text
          text: ).
      marker-yv: yv-n
    - type: text
      text: ' et frère de Joab, et leur demanda : Qui de vous viendrait avec moi jusqu’à Saül dans le camp ?'
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Abishaï répondit : Je suis prêt à y aller avec toi.'
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'David et Abishaï se glissèrent donc de nuit au milieu de la troupe. Ils trouvèrent Saül dormant au centre du camp, sa lance fichée en terre à son chevet. Abner et les soldats dormaient autour de lui. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'Alors Abishaï dit à David : Cette nuit, Dieu livre ton ennemi en ton pouvoir. Permets-moi de le clouer au sol d’un seul coup de lance, je n’aurai pas à y revenir à deux fois.'
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: '– Non, lui dit David, ne le tue pas. Car qui resterait impuni après avoir porté la main sur celui à qui l’Eternel a conféré l’onction ? '
