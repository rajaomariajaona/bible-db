document_id: REV.22,21
type_code: fra
verses:
  '1':
  - type: text
    content: Finalement, l’ange me montra le fleuve d’eau de la vie, limpide comme du cristal, qui jaillissait du trône de Dieu et de l’Agneau.
  '10':
  - type: text
    content: 'Et il ajouta : Ne tiens pas secrètes les paroles prophétiques de ce livre, car le temps de leur accomplissement est proche. '
  '11':
  - type: text
    content: Que celui qui commet le mal continue à mal agir. Que celui qui est impur continue à s’adonner à l’impureté ; mais que celui qui est juste continue à faire ce qui est juste, et que celui qui est saint continue à se purifier.
  '12':
  - type: text
    content: ' '
  - type: text
    content: – Oui,
  - type: text
    content: ' dit Jésus, '
  - type: text
    content: je viens bientôt. J’apporte avec moi mes récompenses pour rendre à chacun selon ses actes.
  - type: text
    content: ' '
  '13':
  - type: text
    content: Je suis l’Alpha et l’Oméga, le premier et le dernier, le commencement et la fin.
  - type: text
    content: ' '
  '14':
  - type: text
    content: Heureux ceux qui lavent leurs vêtements. Ils auront le droit de manger du fruit de l’arbre de vie et de franchir les portes de la ville.
  - type: text
    content: ' '
  '15':
  - type: text
    content: Mais dehors les hommes ignobles, ceux qui pratiquent la magie, les débauchés, les meurtriers, ceux qui adorent des idoles et tous ceux qui aiment et pratiquent le mensonge.
  '16':
  - type: text
    content: ' '
  - type: text
    content: 'Moi, Jésus, j’ai envoyé mon ange pour rendre témoignage à ces vérités destinées aux Eglises. Je suis le rejeton de la racine de '
  - type: text
    content: David
  - type: text
    content: ', son descendant. C’est moi, l’étoile brillante du matin.'
  '17':
  - type: text
    content: 'Et l’Esprit et l’Epouse disent : Viens ! Que celui qui entend ces paroles dise : Viens ! Que celui qui a soif vienne. Que celui qui veut de l’eau de la vie la reçoive gratuitement.'
  '18':
  - type: text
    content: 'Moi, je le déclare solennellement à tous ceux qui entendent les paroles prophétiques de ce livre : si quelqu’un y ajoute quoi que ce soit, Dieu ajoutera à son sort les fléaux décrits dans ce livre. '
  '19':
  - type: text
    content: Si quelqu’un retranche quelque chose des paroles prophétiques de ce livre, Dieu lui ôtera tout droit à l’arbre de vie et à la ville sainte décrits dans ce livre.
  '2':
  - type: text
    content: Au milieu de l’avenue de la ville, entre deux bras du fleuve, se trouve l’arbre de vie. Il produit douze récoltes, chaque mois il porte son fruit. Ses feuilles servent à guérir les peuples.
  '20':
  - type: text
    content: 'Le témoin qui affirme ces choses déclare : '
  - type: text
    content: Oui, je viens bientôt !
  - type: text
    content: 'Oh oui, qu’il en soit ainsi : Viens Seigneur Jésus'
  - type: note
    content: 'Voir l’acclamation araméenne : Marana tha (Notre Seigneur, viens) utilisée dans les cultes de l’Eglise primitive (1 Co 16.22).'
  - type: text
    content: '  !'
  '21':
  - type: text
    content: Que le Seigneur Jésus accorde sa grâce à tous.
  '3':
  - type: text
    content: 'Il n’y aura plus aucune malédiction. Le trône de Dieu et de l’Agneau sera dans la ville. Ses serviteurs lui rendront un culte : '
  '4':
  - type: text
    content: 'ils verront sa face et porteront son nom sur leurs fronts. '
  '5':
  - type: text
    content: Il n’y aura plus jamais de nuit. On n’aura donc plus besoin ni de la lumière d’une lampe, ni de celle du soleil, car le Seigneur Dieu répandra sur eux sa lumière. Et ils régneront éternellement.
  - type: heading
    content: Conclusion
  '6':
  - type: text
    content: 'L’ange me dit : Ces paroles sont vraies et entièrement dignes de foi. Dieu le Seigneur qui a inspiré ses prophètes, a envoyé son ange, pour montrer à ses serviteurs ce qui doit arriver bientôt.'
  '7':
  - type: text
    content: ' '
  - type: text
    content: – Voici,
  - type: text
    content: ' dit Jésus, '
  - type: text
    content: je viens bientôt ! Heureux celui qui obéit aux paroles prophétiques de ce livre.
  '8':
  - type: text
    content: Moi, Jean, j’ai entendu et vu tout cela. Après avoir entendu et vu ces choses, je me prosternai aux pieds de l’ange qui me les avait montrées, et j’allais l’adorer.
  '9':
  - type: text
    content: – Non, me dit-il, ne fais pas cela ! Je suis ton compagnon de service et celui de tes frères, les prophètes, et de ceux qui obéissent aux paroles de ce livre. Adore Dieu !
