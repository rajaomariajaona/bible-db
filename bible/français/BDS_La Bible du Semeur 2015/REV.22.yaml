document_id: REV.22
type_code: fra
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Finalement, l’ange me montra le fleuve d’eau de la vie, limpide comme du cristal, qui jaillissait du trône de Dieu et de l’Agneau.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Au milieu de l’avenue de la ville, entre deux bras du fleuve, se trouve l’arbre de vie. Il produit douze récoltes, chaque mois il porte son fruit. Ses feuilles servent à guérir les peuples.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Il n’y aura plus aucune malédiction. Le trône de Dieu et de l’Agneau sera dans la ville. Ses serviteurs lui rendront un culte : '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'ils verront sa face et porteront son nom sur leurs fronts. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Il n’y aura plus jamais de nuit. On n’aura donc plus besoin ni de la lumière d’une lampe, ni de celle du soleil, car le Seigneur Dieu répandra sur eux sa lumière. Et ils régneront éternellement.
- type: usfm
  marker: ms1
  children:
  - type: text
    text: Conclusion
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'L’ange me dit : Ces paroles sont vraies et entièrement dignes de foi. Dieu le Seigneur qui a inspiré ses prophètes, a envoyé son ange, pour montrer à ses serviteurs ce qui doit arriver bientôt.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: ' '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: – Voici,
  - type: text
    text: ' dit Jésus, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: je viens bientôt ! Heureux celui qui obéit aux paroles prophétiques de ce livre.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Moi, Jean, j’ai entendu et vu tout cela. Après avoir entendu et vu ces choses, je me prosternai aux pieds de l’ange qui me les avait montrées, et j’allais l’adorer.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: – Non, me dit-il, ne fais pas cela ! Je suis ton compagnon de service et celui de tes frères, les prophètes, et de ceux qui obéissent aux paroles de ce livre. Adore Dieu !
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Et il ajouta : Ne tiens pas secrètes les paroles prophétiques de ce livre, car le temps de leur accomplissement est proche. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Que celui qui commet le mal continue à mal agir. Que celui qui est impur continue à s’adonner à l’impureté ; mais que celui qui est juste continue à faire ce qui est juste, et que celui qui est saint continue à se purifier.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: ' '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: – Oui,
  - type: text
    text: ' dit Jésus, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: je viens bientôt. J’apporte avec moi mes récompenses pour rendre à chacun selon ses actes.
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Je suis l’Alpha et l’Oméga, le premier et le dernier, le commencement et la fin.
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Heureux ceux qui lavent leurs vêtements. Ils auront le droit de manger du fruit de l’arbre de vie et de franchir les portes de la ville.
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Mais dehors les hommes ignobles, ceux qui pratiquent la magie, les débauchés, les meurtriers, ceux qui adorent des idoles et tous ceux qui aiment et pratiquent le mensonge.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: ' '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'Moi, Jésus, j’ai envoyé mon ange pour rendre témoignage à ces vérités destinées aux Eglises. Je suis le rejeton de la racine de '
    - type: usfm
      marker: w
      children:
      - type: text
        text: David
    - type: text
      text: ', son descendant. C’est moi, l’étoile brillante du matin.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Et l’Esprit et l’Epouse disent : Viens ! Que celui qui entend ces paroles dise : Viens ! Que celui qui a soif vienne. Que celui qui veut de l’eau de la vie la reçoive gratuitement.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Moi, je le déclare solennellement à tous ceux qui entendent les paroles prophétiques de ce livre : si quelqu’un y ajoute quoi que ce soit, Dieu ajoutera à son sort les fléaux décrits dans ce livre. '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Si quelqu’un retranche quelque chose des paroles prophétiques de ce livre, Dieu lui ôtera tout droit à l’arbre de vie et à la ville sainte décrits dans ce livre.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Le témoin qui affirme ces choses déclare : '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Oui, je viens bientôt !
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Oh oui, qu’il en soit ainsi : Viens Seigneur Jésus'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '22.20 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Voir l’acclamation araméenne : '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'Marana tha '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: (Notre Seigneur, viens) utilisée dans les cultes de l’Eglise primitive (
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1 Co 16.22
        metadata:
          usfm: 1CO.16.22
      - type: text
        text: ).
    marker-yv: yv-n
  - type: text
    text: '  !'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Que le Seigneur Jésus accorde sa grâce à tous.
