document_id: PSA.55,21
type_code: fra
verses:
  '1':
  - type: heading
    content: Trahi
  - type: text
    content: Au chef de chœur. Une méditation
  - type: note
    content: Signification incertaine.
  - type: text
    content: ' de David, à chanter avec accompagnement d’instruments à cordes.'
  '10':
  - type: text
    content: O Seigneur, réduis à néant ╵et brouille leur langage,
  - type: text
    content: car je ne vois ╵dans la cité ╵que violences ╵et dissensions
  '11':
  - type: text
    content: qui rôdent, nuit et jour, ╵sur ses remparts
  - type: note
    content: Le sujet du verbe n’est pas précisé en hébreu. Ce pourrait être les ennemis, mais, plus probablement, ce sont les violences et dissensions qui, au lieu de protéger la ville de Jérusalem, y imposent un règne de malheur et de destruction.
  - type: text
    content: .
  - type: text
    content: Des malheurs, des misères ╵sont dans son sein ;
  '12':
  - type: text
    content: des forces destructrices ╵agissent dans ses murs,
  - type: text
    content: l’oppression et la tromperie ╵ne quittent pas ses grandes places.
  '13':
  - type: text
    content: Si c’était l’ennemi
  - type: note
    content: 'Autre traduction (selon la ponctuation en hébreu) : ce n’est pas un ennemi.'
  - type: text
    content: ' ╵qui venait m’insulter,'
  - type: text
    content: je le supporterais.
  - type: text
    content: Si celui qui me hait
  - type: note
    content: 'Autre traduction (selon la ponctuation en hébreu) : ce n’est pas celui qui me hait qui…'
  - type: text
    content: ' ╵s’élevait contre moi,'
  - type: text
    content: je pourrais me cacher de lui.
  '14':
  - type: text
    content: Mais c’est toi, toi qui es ╵un homme de mon rang,
  - type: text
    content: toi mon intime ╵qui m’es si familier,
  '15':
  - type: text
    content: avec qui je prenais plaisir ╵à échanger des confidences,
  - type: text
    content: quand nous allions ensemble ╵avec la foule
  - type: note
    content: 'D’autres comprennent : d’un commun accord.'
  - type: text
    content: ' ╵dans la maison de Dieu…'
  '16':
  - type: text
    content: Que la mort les surprenne !
  - type: text
    content: Que, vivants, ils descendent ╵dans le séjour des morts !
  - type: text
    content: Car la méchanceté ╵habite leur demeure, ╵jusqu’au fond de leur cœur !
  '17':
  - type: text
    content: Moi, j’en appelle à Dieu,
  - type: text
    content: et l’Eternel me sauvera.
  '18':
  - type: text
    content: Le soir, le matin, à midi
  - type: note
    content: Voir Dn 6.11. La journée israélite commençait le soir, au coucher du soleil.
  - type: text
    content: ', ╵je me répands en plaintes ╵et en gémissements.'
  - type: text
    content: Il m’entendra,
  '19':
  - type: text
    content: et me rendra la paix, ╵il me délivrera
  - type: text
    content: du combat qu’on me livre.
  - type: text
    content: Car ils sont très nombreux ╵à s’opposer à moi.
  '2':
  - type: text
    content: O Dieu, ╵écoute ma prière !
  - type: text
    content: Ne te dérobe pas ╵lorsque je te supplie !
  '20':
  - type: text
    content: Oui, Dieu entend, ╵il les humiliera
  - type: note
    content: 'D’après l’ancienne version grecque et la syriaque. Texte hébreu traditionnel : et il leur répondra.'
  - type: text
    content: .
  - type: text
    content: Depuis toujours, il règne.
  - type: text
    content: Pause
  - type: text
    content: Eux ne s’amendent pas ;
  - type: text
    content: ils ne craignent pas Dieu.
  '21':
  - type: text
    content: Cet homme, lui, ╵s’en prend à ses alliés,
  - type: text
    content: il viole ses engagements ╵scellés par une alliance.
  '22':
  - type: text
    content: Sa bouche est pleine de douceur, ╵plus onctueuse que la crème,
  - type: text
    content: mais la guerre est tapie ╵tout au fond de son cœur !
  - type: text
    content: Ses propos sont plus doux que l’huile,
  - type: text
    content: pourtant, ce sont des épées nues !
  '23':
  - type: text
    content: 'Rejette ton fardeau ╵sur l’Eternel : ╵il prendra soin de toi,'
  - type: text
    content: il ne laissera pas le juste ╵s’écrouler pour toujours.
  '24':
  - type: text
    content: Et toi, ô Dieu, ╵tu les feras descendre ╵dans le puits de la destruction.
  - type: text
    content: Ces hommes fourbes ╵et sanguinaires
  - type: text
    content: n’atteindront pas ╵la moitié de leurs jours.
  - type: text
    content: Mais moi, je me confie en toi.
  '3':
  - type: text
    content: Prête-moi attention ╵et réponds-moi !
  - type: text
    content: Abattu
  - type: note
    content: 'Sens incertain. Autre traduction : j’erre çà et là.'
  - type: text
    content: ', je gémis ; ╵le trouble m’envahit.'
  '4':
  - type: text
    content: Je suis troublé ╵quand j’entends les propos ╵de l’ennemi,
  - type: text
    content: quand je vois l’oppression ╵qu’imposent les méchants.
  - type: text
    content: Les gens m’accablent ╵de leurs méfaits ;
  - type: text
    content: avec colère, ╵ils me pourchassent.
  '5':
  - type: text
    content: Mon cœur se serre ╵dans ma poitrine,
  - type: text
    content: la terreur de la mort ╵vient m’assaillir.
  '6':
  - type: text
    content: Des craintes et des tremblements ╵m’ont envahi,
  - type: text
    content: je suis saisi d’horreur.
  '7':
  - type: text
    content: 'Alors je dis : ╵« Ah ! si j’avais les ailes ╵de la colombe !'
  - type: text
    content: Je prendrais mon envol ╵pour trouver un refuge.
  '8':
  - type: text
    content: Je m’enfuirais ╵bien loin d’ici,
  - type: text
    content: pour demeurer ╵dans le désert.
  - type: text
    content: Pause
  '9':
  - type: text
    content: Je gagnerais en hâte ╵un sûr abri
  - type: text
    content: contre le vent impétueux ╵de la tempête. »
