document_id: PSA.55,21
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Trahi
    marker-yv: yv-h
  - type: usfm
    marker: d
    children:
    - type: text
      text: Au chef de chœur. Une méditation
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '55.1 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Signification incertaine.
      marker-yv: yv-n
    - type: text
      text: ' de David, à chanter avec accompagnement d’instruments à cordes.'
  '10':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: O Seigneur, réduis à néant ╵et brouille leur langage,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: car je ne vois ╵dans la cité ╵que violences ╵et dissensions
  '11':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: qui rôdent, nuit et jour, ╵sur ses remparts
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '55.11 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Le sujet du verbe n’est pas précisé en hébreu. Ce pourrait être les ennemis, mais, plus probablement, ce sont les violences et dissensions qui, au lieu de protéger la ville de Jérusalem, y imposent un règne de malheur et de destruction.
      marker-yv: yv-n
    - type: text
      text: .
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Des malheurs, des misères ╵sont dans son sein ;
  '12':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: des forces destructrices ╵agissent dans ses murs,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: l’oppression et la tromperie ╵ne quittent pas ses grandes places.
  '13':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Si c’était l’ennemi
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '55.13 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Autre traduction (selon la ponctuation en hébreu) : '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: ce n’est pas un ennemi.
      marker-yv: yv-n
    - type: text
      text: ' ╵qui venait m’insulter,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: je le supporterais.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Si celui qui me hait
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '55.13 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Autre traduction (selon la ponctuation en hébreu) : '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: ce n’est pas celui qui me hait qui…
      marker-yv: yv-n
    - type: text
      text: ' ╵s’élevait contre moi,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: je pourrais me cacher de lui.
  '14':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mais c’est toi, toi qui es ╵un homme de mon rang,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: toi mon intime ╵qui m’es si familier,
  '15':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: avec qui je prenais plaisir ╵à échanger des confidences,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: quand nous allions ensemble ╵avec la foule
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '55.15 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'D’autres comprennent : '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: d’un commun accord.
      marker-yv: yv-n
    - type: text
      text: ' ╵dans la maison de Dieu…'
  '16':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Que la mort les surprenne !
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Que, vivants, ils descendent ╵dans le séjour des morts !
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Car la méchanceté ╵habite leur demeure, ╵jusqu’au fond de leur cœur !
  '17':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Moi, j’en appelle à Dieu,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et l’Eternel me sauvera.
  '18':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Le soir, le matin, à midi
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '55.18 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Voir '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: Dn 6.11
        - type: text
          text: . La journée israélite commençait le soir, au coucher du soleil.
      marker-yv: yv-n
    - type: text
      text: ', ╵je me répands en plaintes ╵et en gémissements.'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Il m’entendra,
  '19':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et me rendra la paix, ╵il me délivrera
  - type: usfm
    marker: q1
    children:
    - type: text
      text: du combat qu’on me livre.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Car ils sont très nombreux ╵à s’opposer à moi.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: O Dieu, ╵écoute ma prière !
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ne te dérobe pas ╵lorsque je te supplie !
  '20':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Oui, Dieu entend, ╵il les humiliera
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '55.20 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'D’après l’ancienne version grecque et la syriaque. Texte hébreu traditionnel : '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: et il leur répondra.
      marker-yv: yv-n
    - type: text
      text: .
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Depuis toujours, il règne.
  - type: usfm
    marker: q4
    children:
    - type: text
      text: Pause
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Eux ne s’amendent pas ;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ils ne craignent pas Dieu.
  '21':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Cet homme, lui, ╵s’en prend à ses alliés,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: il viole ses engagements ╵scellés par une alliance.
  '22':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Sa bouche est pleine de douceur, ╵plus onctueuse que la crème,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: mais la guerre est tapie ╵tout au fond de son cœur !
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ses propos sont plus doux que l’huile,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: pourtant, ce sont des épées nues !
  '23':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Rejette ton fardeau ╵sur l’Eternel : ╵il prendra soin de toi,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: il ne laissera pas le juste ╵s’écrouler pour toujours.
  '24':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et toi, ô Dieu, ╵tu les feras descendre ╵dans le puits de la destruction.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ces hommes fourbes ╵et sanguinaires
  - type: usfm
    marker: q1
    children:
    - type: text
      text: n’atteindront pas ╵la moitié de leurs jours.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mais moi, je me confie en toi.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Prête-moi attention ╵et réponds-moi !
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Abattu
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '55.3 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Sens incertain. Autre traduction : '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: j’erre çà et là.
      marker-yv: yv-n
    - type: text
      text: ', je gémis ; ╵le trouble m’envahit.'
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Je suis troublé ╵quand j’entends les propos ╵de l’ennemi,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: quand je vois l’oppression ╵qu’imposent les méchants.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Les gens m’accablent ╵de leurs méfaits ;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: avec colère, ╵ils me pourchassent.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mon cœur se serre ╵dans ma poitrine,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: la terreur de la mort ╵vient m’assaillir.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Des craintes et des tremblements ╵m’ont envahi,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: je suis saisi d’horreur.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Alors je dis : ╵« Ah ! si j’avais les ailes ╵de la colombe !'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Je prendrais mon envol ╵pour trouver un refuge.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Je m’enfuirais ╵bien loin d’ici,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: pour demeurer ╵dans le désert.
  - type: usfm
    marker: q4
    children:
    - type: text
      text: Pause
  '9':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Je gagnerais en hâte ╵un sûr abri
  - type: usfm
    marker: q1
    children:
    - type: text
      text: contre le vent impétueux ╵de la tempête. »
