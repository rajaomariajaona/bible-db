document_id: MRK.14
type_code: fra
segments:
- type: usfm
  marker: ms1
  children:
  - type: text
    text: Mort et résurrection de Jésus
  marker-yv: yv-h
- type: usfm
  marker: s1
  children:
  - type: text
    text: Le complot
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: (Mt 26.1-5 ; Lc 22.1-2 ; Jn 11.45-53)
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'On était à deux jours de la Pâque et de la fête des Pains sans levain. Les chefs des prêtres et les spécialistes de la Loi cherchaient un moyen de s’emparer de Jésus par ruse et de le faire mourir. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Car ils se disaient : Il ne faut pas agir pendant la fête, pour ne pas provoquer d’émeute parmi le peuple.'
- type: usfm
  marker: s1
  children:
  - type: text
    text: L’onction à Béthanie
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: (Mt 26.6-13 ; Jn 12.1-8)
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Jésus était à Béthanie, dans la maison de Simon, le lépreux. Pendant le repas, une femme s’approcha de lui, tenant un flacon d’albâtre rempli d’un parfum de nard pur de grande valeur. Elle cassa le col du flacon et répandit le parfum sur la tête de Jésus.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Quelques-uns s’en indignèrent et murmurèrent entre eux : Pourquoi gaspiller ainsi ce parfum ? '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: On aurait pu le vendre et en tirer plus de trois cents pièces d’argent
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '14.5 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Il s’agit de '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'deniers. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Cette somme représente le salaire d’une année de travail d’un ouvrier agricole.
    marker-yv: yv-n
  - type: text
    text: ', qu’on aurait données aux pauvres !'
- type: usfm
  marker: p
  children:
  - type: text
    text: Et ils ne ménagèrent pas leurs reproches à cette femme.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Mais Jésus dit : '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Laissez-la donc tranquille ! Pourquoi lui faites-vous de la peine ? Ce qu’elle vient d’accomplir pour moi est une belle action.
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Des pauvres, vous en aurez toujours autour de vous, et vous pourrez leur faire du bien quand vous le voudrez ; mais moi, vous ne m’aurez pas toujours.
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Cette femme a fait ce qu’elle pouvait. Elle a d’avance embaumé mon corps pour préparer mon enterrement
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '14.8 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Les Juifs embaumaient sommairement les morts avec des onguents et des parfums.
    marker-yv: yv-n
  - type: usfm
    marker: wj
    children:
    - type: text
      text: .
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Vraiment, je vous l’assure, dans le monde entier, partout où l’Evangile sera annoncé, on racontera aussi, en souvenir de cette femme, ce qu’elle vient de faire.
- type: usfm
  marker: s1
  children:
  - type: text
    text: La trahison
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: (Mt 26.14-16 ; Lc 22.3-6)
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Judas Iscariot, l’un des Douze, alla trouver les chefs des prêtres pour leur proposer de leur livrer Jésus. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Sa proposition les réjouit et ils promirent de lui donner de l’argent. Dès lors, il chercha une occasion favorable pour leur livrer Jésus.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Jésus célèbre la Pâque avec ses disciples
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: (Mt 26.17-19 ; Lc 22.7-13)
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Le premier jour de la fête des Pains sans levain, celui où l’on tue l’agneau de la Pâque, ses disciples lui demandèrent : Où veux-tu que nous fassions les préparatifs pour le repas de la Pâque ?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Alors il envoya deux d’entre eux en leur donnant les instructions suivantes : '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Allez à la ville. Vous y rencontrerez un homme portant une cruche d’eau. Suivez-le.
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'Lorsqu’il entrera dans une maison, parlez ainsi au propriétaire : « Le Maître te fait demander : Où est la pièce où je prendrai le repas de la Pâque avec mes disciples ? »'
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Alors il vous montrera, à l’étage supérieur, une grande pièce aménagée, déjà prête. C’est là que vous ferez les préparatifs pour nous.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Les disciples partirent. Ils arrivèrent à la ville, trouvèrent tout comme Jésus le leur avait dit et préparèrent le repas de la Pâque.
- type: usfm
  marker: r
  children:
  - type: text
    text: (Mt 26.20-25 ; Lc 22.14 ; Jn 13.21-30)
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Le soir, Jésus arriva avec les Douze. '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Pendant qu’ils étaient à table et qu’ils mangeaient, il leur dit : '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'Vraiment, je vous l’assure : l’un de vous, qui mange avec moi, me trahira.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'A ces mots, ils devinrent tout tristes, et, l’un après l’autre, ils lui dirent : Ce n’est pas moi, n’est-ce pas ?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Alors il reprit : '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: C’est l’un des Douze, un qui trempe son morceau dans le plat avec moi
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '14.20 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Chacun des convives trempait son morceau de pain dans le plat commun qui contenait la sauce.
    marker-yv: yv-n
  - type: usfm
    marker: wj
    children:
    - type: text
      text: .
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'Certes, le '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Fils de l’homme
    - type: text
      text: ' s’en va conformément à ce que les Ecritures annoncent à son sujet. Mais malheur à celui qui le trahit ! Il aurait mieux valu pour lui n’être jamais né !'
- type: usfm
  marker: r
  children:
  - type: text
    text: (Mt 26.26-30 ; Lc 22.15-20 ; voir 1 Co 11.23-25)
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Au cours du repas, Jésus prit du pain puis, après avoir prononcé la prière de reconnaissance, il le partagea en morceaux qu’il donna à ses disciples en disant : '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Prenez, ceci est mon corps.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Ensuite il prit une coupe, remercia Dieu et la leur donna. Ils en burent tous. '
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Alors il leur dit : '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'Ceci est mon sang, par lequel est '
    - type: usfm
      marker: w
      children:
      - type: text
        text: scellée
    - type: text
      text: ' l’'
    - type: usfm
      marker: w
      children:
      - type: text
        text: alliance
    - type: text
      text: '  : il va être versé pour beaucoup d’hommes.'
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'Vraiment, je vous le déclare : je ne boirai plus du fruit de la vigne jusqu’au jour où je boirai le vin nouveau dans le '
    - type: usfm
      marker: w
      children:
      - type: text
        text: royaume de Dieu
    - type: text
      text: .
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: Après cela, ils chantèrent les psaumes de la Pâque. Ensuite, ils sortirent pour se rendre au mont des Oliviers.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Jésus annonce le reniement de Pierre
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: (Mt 26.31-35 ; Lc 22.31-34 ; Jn 13.36-38)
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'Jésus leur dit : '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'Vous allez tous être ébranlés dans votre foi, car il est écrit :'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: wj
    children:
    - type: usfm
      marker: qt
      children:
      - type: text
        text: Je frapperai le berger,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: wj
    children:
    - type: usfm
      marker: qt
      children:
      - type: text
        text: et les brebis seront dispersées
    - type: text
      text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '14.27 '
    - type: usfm
      marker: ft
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Za 13.7
        metadata:
          usfm: ZEC.13.7
      - type: text
        text: ' .'
    marker-yv: yv-n
  - type: usfm
    marker: wj
    children:
    - type: usfm
      marker: qt
      children:
      - type: text
        text: .
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: ' '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'Mais, quand je serai ressuscité, je vous précéderai en '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Galilée
    - type: text
      text: .
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'Alors Pierre lui déclara : Même si tous les autres étaient ébranlés, moi, pas !'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'Jésus lui répondit : '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'Vraiment, je te l’assure : aujourd’hui, oui, cette nuit même, avant que le coq ait chanté deux fois, tu m’auras renié trois fois.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'Mais Pierre protesta avec véhémence : Même s’il me fallait mourir avec toi, je ne te renierai pas.'
- type: usfm
  marker: p
  children:
  - type: text
    text: Et tous disaient la même chose.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Sur le mont des Oliviers
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: (Mt 26.36-46 ; Lc 22.40-46)
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '32'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'Ils arrivèrent en un lieu appelé Gethsémané. Jésus dit à ses disciples : '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Asseyez-vous ici pendant que je vais prier.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '33'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: 'Il prit avec lui Pierre, Jacques et Jean. Il commença à être envahi par la crainte, et l’angoisse le saisit. '
  - type: usfm
    marker: v
    metadata:
      v: '34'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: 'Il leur dit : '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Je suis accablé de tristesse, à en mourir. Restez ici et veillez !
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '35'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: 'Il fit quelques pas, se laissa tomber à terre et pria Dieu que cette heure s’éloigne de lui, si c’était possible : '
  - type: usfm
    marker: v
    metadata:
      v: '36'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: usfm
    marker: wj
    children:
    - type: usfm
      marker: tl
      children:
      - type: text
        text: Abba
    - type: text
      text: ', Père, pour toi, tout est possible. Eloigne de moi cette coupe'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '14.36 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Voir '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '10.39'
        metadata:
          usfm: MRK.10.39
      - type: text
        text: ' et note sur '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Mt 26.39
        metadata:
          usfm: MAT.26.39
      - type: text
        text: '. Autre traduction : '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: la coupe du jugement.
    marker-yv: yv-n
  - type: usfm
    marker: wj
    children:
    - type: text
      text: ; cependant, qu’il arrive non pas ce que moi, je veux, mais ce que toi, tu veux.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '37'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: Il revint vers ses disciples et les trouva endormis.
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Il dit à Pierre : '
  - type: usfm
    marker: wj
    children:
    - type: usfm
      marker: w
      children:
      - type: text
        text: Simon
    - type: text
      text: ', tu dors ? Tu n’as pas été capable de veiller une heure !'
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '38'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Veillez et priez pour ne pas céder à la tentation
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '14.38 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Autre traduction : '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: pour ne pas entrer en tentation.
    marker-yv: yv-n
  - type: usfm
    marker: wj
    children:
    - type: text
      text: . L’esprit de l’homme est plein de bonne volonté, mais la nature humaine est bien faible.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '39'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '39'
  - type: text
    text: 'Il s’éloigna de nouveau pour prier, en répétant les mêmes paroles. '
  - type: usfm
    marker: v
    metadata:
      v: '40'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '40'
  - type: text
    text: Puis il revint encore vers les disciples et les trouva de nouveau endormis, car ils avaient tellement sommeil qu’ils n’arrivaient pas à garder les yeux ouverts, et ils ne surent que lui répondre.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '41'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '41'
  - type: text
    text: 'Lorsqu’il revint pour la troisième fois, il leur dit : '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Vous dormez encore et vous vous reposez
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '14.41 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Autre traduction : '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: dormez maintenant et reposez-vous !
    marker-yv: yv-n
  - type: usfm
    marker: wj
    children:
    - type: text
      text: '! C’en est fait ! L’heure est venue. Le '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Fils de l’homme
    - type: text
      text: ' est livré entre les mains des pécheurs.'
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '42'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '42'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Levez-vous et allons-y. Car celui qui me trahit est là.
- type: usfm
  marker: s1
  children:
  - type: text
    text: L’arrestation de Jésus
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: (Mt 26.47-56 ; Lc 22.47-53 ; Jn 18.2-11)
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '43'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '43'
  - type: text
    text: 'Il n’avait pas fini de parler que soudain survint Judas, l’un des Douze, accompagné d’une troupe armée d’épées et de gourdins. C’étaient les chefs des prêtres, les spécialistes de la Loi et les responsables du peuple qui les envoyaient. '
  - type: usfm
    marker: v
    metadata:
      v: '44'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '44'
  - type: text
    text: 'Le traître avait convenu avec eux d’un signal : Celui que j’embrasserai, c’est lui. Saisissez-vous de lui et emmenez-le sous bonne garde.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '45'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '45'
  - type: text
    text: 'En arrivant, Judas se dirigea droit sur Jésus ; il lui dit : « Maître ! » et l’embrassa.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '46'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '46'
  - type: text
    text: 'Aussitôt, les autres mirent la main sur Jésus et l’arrêtèrent. '
  - type: usfm
    marker: v
    metadata:
      v: '47'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '47'
  - type: text
    text: Mais l’un de ceux qui étaient là dégaina son épée, en donna un coup au serviteur du grand-prêtre et lui emporta l’oreille.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '48'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '48'
  - type: text
    text: 'Jésus leur dit : '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Me prenez-vous pour un bandit, pour que vous soyez venus en force avec des épées et des gourdins pour vous emparer de moi ?
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '49'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '49'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'J’étais parmi vous chaque jour dans la cour du '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Temple
    - type: text
      text: ' pour donner mon enseignement et vous ne m’avez pas arrêté. Mais il en est ainsi pour que les Ecritures s’accomplissent.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '50'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '50'
  - type: text
    text: Alors tous ses compagnons l’abandonnèrent et prirent la fuite.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '51'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '51'
  - type: text
    text: 'Un jeune homme le suivait, couvert seulement d’un drap. On le saisit, '
  - type: usfm
    marker: v
    metadata:
      v: '52'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '52'
  - type: text
    text: mais il abandonna le drap et s’enfuit, tout nu.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Jésus devant le Grand-Conseil
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: (Mt 26.57-68 ; Lc 22.54-55, 63-71 ; Jn 18.12-14, 19-24)
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '53'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '53'
  - type: text
    text: 'Jésus fut conduit devant le grand-prêtre chez qui se rassemblèrent les chefs des prêtres, les responsables du peuple et les spécialistes de la Loi. '
  - type: usfm
    marker: v
    metadata:
      v: '54'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '54'
  - type: text
    text: 'Pierre l’avait suivi à distance, jusqu’à l’intérieur de la cour du palais du grand-prêtre. Il était assis avec les gardes, près du feu, pour se réchauffer. '
  - type: usfm
    marker: v
    metadata:
      v: '55'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '55'
  - type: text
    text: 'Les chefs des prêtres et le Grand-Conseil au complet cherchaient un témoignage contre Jésus pour pouvoir le condamner à mort. Mais ils n’en trouvaient pas. '
  - type: usfm
    marker: v
    metadata:
      v: '56'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '56'
  - type: text
    text: Car il y avait beaucoup de gens pour apporter des faux témoignages contre lui, mais ces témoignages ne concordaient pas.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '57'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '57'
  - type: text
    text: 'Finalement, quelques-uns se levèrent pour porter contre lui ce faux témoignage : '
  - type: usfm
    marker: v
    metadata:
      v: '58'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '58'
  - type: text
    text: 'Nous l’avons entendu dire : « Je démolirai ce temple fait de main d’homme et, en trois jours, j’en reconstruirai un autre, qui ne sera pas fait par des mains humaines. »'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '59'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '59'
  - type: text
    text: Mais même là-dessus, leurs dépositions ne s’accordaient pas.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '60'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '60'
  - type: text
    text: Alors le grand-prêtre se leva au milieu de l’assemblée et interrogea Jésus.
- type: usfm
  marker: p
  children:
  - type: text
    text: – Eh bien, demanda-t-il, tu n’as rien à répondre aux témoignages qu’on vient de porter contre toi ?
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '61'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '61'
  - type: text
    text: Mais Jésus garda le silence et ne répondit pas.
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Le grand-prêtre l’interrogea de nouveau et lui demanda : Es-tu le Messie, le Fils du Dieu béni ?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '62'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '62'
  - type: text
    text: 'Et Jésus lui répondit : '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'Oui, je le suis ! Et vous verrez '
    - type: usfm
      marker: qt
      children:
      - type: text
        text: 'le '
      - type: usfm
        marker: w
        children:
        - type: text
          text: Fils de l’homme
      - type: text
        text: ' siéger à la droite du Tout-Puissant'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '14.62 '
    - type: usfm
      marker: ft
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ps 110.1
        metadata:
          usfm: PSA.110.1
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: ' '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: et venir en gloire avec les nuées du ciel
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '14.62 '
    - type: usfm
      marker: ft
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Dn 7.13
        metadata:
          usfm: DAN.7.13
      - type: text
        text: .
    marker-yv: yv-n
  - type: usfm
    marker: wj
    children:
    - type: text
      text: .
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '63'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '63'
  - type: text
    text: 'Alors, le grand-prêtre déchira ses vêtements en signe de consternation et s’écria : Qu’avons-nous encore besoin de témoins ! '
  - type: usfm
    marker: v
    metadata:
      v: '64'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '64'
  - type: text
    text: Vous avez entendu le blasphème ! Qu’en concluez-vous ?
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Tous, alors, le condamnèrent en le déclarant passible de mort. '
  - type: usfm
    marker: v
    metadata:
      v: '65'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '65'
  - type: text
    text: 'Quelques-uns se mirent à cracher sur lui, ils lui recouvrirent le visage et le frappèrent en lui disant : Hé ! Fais le prophète ! Qui c’est ?'
- type: usfm
  marker: p
  children:
  - type: text
    text: Les gardes saisirent Jésus et lui donnèrent des gifles.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Pierre renie son Maître
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: (Mt 26.69-75 ; Lc 22.56-62 ; Jn 18.15-18, 25-27)
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '66'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '66'
  - type: text
    text: 'Pendant ce temps, Pierre était en bas dans la cour intérieure. Une des servantes du grand-prêtre arriva ; '
  - type: usfm
    marker: v
    metadata:
      v: '67'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '67'
  - type: text
    text: 'elle vit Pierre qui se chauffait et le dévisagea ; elle lui dit : Toi aussi, tu étais avec ce Jésus, ce Nazaréen !'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '68'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '68'
  - type: text
    text: 'Mais Pierre le nia en disant : Je ne vois pas, je ne comprends pas ce que tu veux dire.'
- type: usfm
  marker: p
  children:
  - type: text
    text: Puis il sortit de la cour et entra dans le vestibule. Alors un coq chanta
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '14.68 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Les mots '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'un coq chanta '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: sont absents dans certains manuscrits.
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '69'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '69'
  - type: text
    text: 'Mais la servante le vit et recommença à dire à ceux qui se trouvaient là : Il fait aussi partie de ces gens-là.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '70'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '70'
  - type: text
    text: Il le nia de nouveau.
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Peu après, ceux qui se trouvaient là redirent à Pierre : C’est sûr : tu fais partie de ces gens ! D’ailleurs, tu es galiléen !'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '71'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '71'
  - type: text
    text: 'Alors il déclara : Je le jure, et que Dieu me condamne si ce n’est pas vrai, je ne connais pas l’homme dont vous parlez'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '14.71 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Ou : '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: Que Dieu condamne cet homme. Je jure que je ne connais pas celui dont vous parlez.
    marker-yv: yv-n
  - type: text
    text: '  !'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '72'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '72'
  - type: text
    text: 'Aussitôt, pour la seconde fois, un coq chanta. Alors, Pierre se souvint de ce que Jésus lui avait dit : '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: « Avant que le coq chante deux fois, tu m’auras renié trois fois. » Et il fondit en larmes
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '14.72 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Autres traductions : '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'il songea à tout ceci et pleura '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'ou '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'il se couvrit la tête et pleura '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: (signe de deuil)
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: '. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'D’autres traduisent : '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: il sortit précipitamment et il pleura.
    marker-yv: yv-n
  - type: usfm
    marker: wj
    children:
    - type: text
      text: .
