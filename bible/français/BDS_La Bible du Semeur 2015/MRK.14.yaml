document_id: MRK.14,21
type_code: fra
verses:
  '1':
  - type: heading
    content: Mort et résurrection de Jésus
  - type: heading
    content: Le complot
  - type: heading
    content: (Mt 26.1-5 ; Lc 22.1-2 ; Jn 11.45-53)
  - type: text
    content: 'On était à deux jours de la Pâque et de la fête des Pains sans levain. Les chefs des prêtres et les spécialistes de la Loi cherchaient un moyen de s’emparer de Jésus par ruse et de le faire mourir. '
  '10':
  - type: text
    content: 'Judas Iscariot, l’un des Douze, alla trouver les chefs des prêtres pour leur proposer de leur livrer Jésus. '
  '11':
  - type: text
    content: Sa proposition les réjouit et ils promirent de lui donner de l’argent. Dès lors, il chercha une occasion favorable pour leur livrer Jésus.
  - type: heading
    content: Jésus célèbre la Pâque avec ses disciples
  - type: heading
    content: (Mt 26.17-19 ; Lc 22.7-13)
  '12':
  - type: text
    content: 'Le premier jour de la fête des Pains sans levain, celui où l’on tue l’agneau de la Pâque, ses disciples lui demandèrent : Où veux-tu que nous fassions les préparatifs pour le repas de la Pâque ?'
  '13':
  - type: text
    content: 'Alors il envoya deux d’entre eux en leur donnant les instructions suivantes : '
  - type: text
    content: Allez à la ville. Vous y rencontrerez un homme portant une cruche d’eau. Suivez-le.
  - type: text
    content: ' '
  '14':
  - type: text
    content: 'Lorsqu’il entrera dans une maison, parlez ainsi au propriétaire : « Le Maître te fait demander : Où est la pièce où je prendrai le repas de la Pâque avec mes disciples ? »'
  - type: text
    content: ' '
  '15':
  - type: text
    content: Alors il vous montrera, à l’étage supérieur, une grande pièce aménagée, déjà prête. C’est là que vous ferez les préparatifs pour nous.
  '16':
  - type: text
    content: Les disciples partirent. Ils arrivèrent à la ville, trouvèrent tout comme Jésus le leur avait dit et préparèrent le repas de la Pâque.
  - type: heading
    content: (Mt 26.20-25 ; Lc 22.14 ; Jn 13.21-30)
  '17':
  - type: text
    content: 'Le soir, Jésus arriva avec les Douze. '
  '18':
  - type: text
    content: 'Pendant qu’ils étaient à table et qu’ils mangeaient, il leur dit : '
  - type: text
    content: 'Vraiment, je vous l’assure : l’un de vous, qui mange avec moi, me trahira.'
  '19':
  - type: text
    content: 'A ces mots, ils devinrent tout tristes, et, l’un après l’autre, ils lui dirent : Ce n’est pas moi, n’est-ce pas ?'
  '2':
  - type: text
    content: 'Car ils se disaient : Il ne faut pas agir pendant la fête, pour ne pas provoquer d’émeute parmi le peuple.'
  - type: heading
    content: L’onction à Béthanie
  - type: heading
    content: (Mt 26.6-13 ; Jn 12.1-8)
  '20':
  - type: text
    content: 'Alors il reprit : '
  - type: text
    content: C’est l’un des Douze, un qui trempe son morceau dans le plat avec moi
  - type: note
    content: Chacun des convives trempait son morceau de pain dans le plat commun qui contenait la sauce.
  - type: text
    content: .
  - type: text
    content: ' '
  '21':
  - type: text
    content: 'Certes, le '
  - type: text
    content: Fils de l’homme
  - type: text
    content: ' s’en va conformément à ce que les Ecritures annoncent à son sujet. Mais malheur à celui qui le trahit ! Il aurait mieux valu pour lui n’être jamais né !'
  - type: heading
    content: (Mt 26.26-30 ; Lc 22.15-20 ; voir 1 Co 11.23-25)
  '22':
  - type: text
    content: 'Au cours du repas, Jésus prit du pain puis, après avoir prononcé la prière de reconnaissance, il le partagea en morceaux qu’il donna à ses disciples en disant : '
  - type: text
    content: Prenez, ceci est mon corps.
  '23':
  - type: text
    content: 'Ensuite il prit une coupe, remercia Dieu et la leur donna. Ils en burent tous. '
  '24':
  - type: text
    content: 'Alors il leur dit : '
  - type: text
    content: 'Ceci est mon sang, par lequel est '
  - type: text
    content: scellée
  - type: text
    content: ' l’'
  - type: text
    content: alliance
  - type: text
    content: '  : il va être versé pour beaucoup d’hommes.'
  - type: text
    content: ' '
  '25':
  - type: text
    content: 'Vraiment, je vous le déclare : je ne boirai plus du fruit de la vigne jusqu’au jour où je boirai le vin nouveau dans le '
  - type: text
    content: royaume de Dieu
  - type: text
    content: .
  '26':
  - type: text
    content: Après cela, ils chantèrent les psaumes de la Pâque. Ensuite, ils sortirent pour se rendre au mont des Oliviers.
  - type: heading
    content: Jésus annonce le reniement de Pierre
  - type: heading
    content: (Mt 26.31-35 ; Lc 22.31-34 ; Jn 13.36-38)
  '27':
  - type: text
    content: 'Jésus leur dit : '
  - type: text
    content: 'Vous allez tous être ébranlés dans votre foi, car il est écrit :'
  - type: text
    content: Je frapperai le berger,
  - type: text
    content: et les brebis seront dispersées
  - type: text
    content: ' '
  - type: note
    content: Za 13.7 .
  - type: text
    content: .
  '28':
  - type: text
    content: ' '
  - type: text
    content: 'Mais, quand je serai ressuscité, je vous précéderai en '
  - type: text
    content: Galilée
  - type: text
    content: .
  '29':
  - type: text
    content: 'Alors Pierre lui déclara : Même si tous les autres étaient ébranlés, moi, pas !'
  '3':
  - type: text
    content: Jésus était à Béthanie, dans la maison de Simon, le lépreux. Pendant le repas, une femme s’approcha de lui, tenant un flacon d’albâtre rempli d’un parfum de nard pur de grande valeur. Elle cassa le col du flacon et répandit le parfum sur la tête de Jésus.
  '30':
  - type: text
    content: 'Jésus lui répondit : '
  - type: text
    content: 'Vraiment, je te l’assure : aujourd’hui, oui, cette nuit même, avant que le coq ait chanté deux fois, tu m’auras renié trois fois.'
  '31':
  - type: text
    content: 'Mais Pierre protesta avec véhémence : Même s’il me fallait mourir avec toi, je ne te renierai pas.'
  - type: text
    content: Et tous disaient la même chose.
  - type: heading
    content: Sur le mont des Oliviers
  - type: heading
    content: (Mt 26.36-46 ; Lc 22.40-46)
  '32':
  - type: text
    content: 'Ils arrivèrent en un lieu appelé Gethsémané. Jésus dit à ses disciples : '
  - type: text
    content: Asseyez-vous ici pendant que je vais prier.
  '33':
  - type: text
    content: 'Il prit avec lui Pierre, Jacques et Jean. Il commença à être envahi par la crainte, et l’angoisse le saisit. '
  '34':
  - type: text
    content: 'Il leur dit : '
  - type: text
    content: Je suis accablé de tristesse, à en mourir. Restez ici et veillez !
  '35':
  - type: text
    content: 'Il fit quelques pas, se laissa tomber à terre et pria Dieu que cette heure s’éloigne de lui, si c’était possible : '
  '36':
  - type: text
    content: Abba
  - type: text
    content: ', Père, pour toi, tout est possible. Eloigne de moi cette coupe'
  - type: note
    content: 'Voir 10.39 et note sur Mt 26.39. Autre traduction : la coupe du jugement.'
  - type: text
    content: ; cependant, qu’il arrive non pas ce que moi, je veux, mais ce que toi, tu veux.
  '37':
  - type: text
    content: Il revint vers ses disciples et les trouva endormis.
  - type: text
    content: 'Il dit à Pierre : '
  - type: text
    content: Simon
  - type: text
    content: ', tu dors ? Tu n’as pas été capable de veiller une heure !'
  - type: text
    content: ' '
  '38':
  - type: text
    content: Veillez et priez pour ne pas céder à la tentation
  - type: note
    content: 'Autre traduction : pour ne pas entrer en tentation.'
  - type: text
    content: . L’esprit de l’homme est plein de bonne volonté, mais la nature humaine est bien faible.
  '39':
  - type: text
    content: 'Il s’éloigna de nouveau pour prier, en répétant les mêmes paroles. '
  '4':
  - type: text
    content: 'Quelques-uns s’en indignèrent et murmurèrent entre eux : Pourquoi gaspiller ainsi ce parfum ? '
  '40':
  - type: text
    content: Puis il revint encore vers les disciples et les trouva de nouveau endormis, car ils avaient tellement sommeil qu’ils n’arrivaient pas à garder les yeux ouverts, et ils ne surent que lui répondre.
  '41':
  - type: text
    content: 'Lorsqu’il revint pour la troisième fois, il leur dit : '
  - type: text
    content: Vous dormez encore et vous vous reposez
  - type: note
    content: 'Autre traduction : dormez maintenant et reposez-vous !'
  - type: text
    content: '! C’en est fait ! L’heure est venue. Le '
  - type: text
    content: Fils de l’homme
  - type: text
    content: ' est livré entre les mains des pécheurs.'
  - type: text
    content: ' '
  '42':
  - type: text
    content: Levez-vous et allons-y. Car celui qui me trahit est là.
  - type: heading
    content: L’arrestation de Jésus
  - type: heading
    content: (Mt 26.47-56 ; Lc 22.47-53 ; Jn 18.2-11)
  '43':
  - type: text
    content: 'Il n’avait pas fini de parler que soudain survint Judas, l’un des Douze, accompagné d’une troupe armée d’épées et de gourdins. C’étaient les chefs des prêtres, les spécialistes de la Loi et les responsables du peuple qui les envoyaient. '
  '44':
  - type: text
    content: 'Le traître avait convenu avec eux d’un signal : Celui que j’embrasserai, c’est lui. Saisissez-vous de lui et emmenez-le sous bonne garde.'
  '45':
  - type: text
    content: 'En arrivant, Judas se dirigea droit sur Jésus ; il lui dit : « Maître ! » et l’embrassa.'
  '46':
  - type: text
    content: 'Aussitôt, les autres mirent la main sur Jésus et l’arrêtèrent. '
  '47':
  - type: text
    content: Mais l’un de ceux qui étaient là dégaina son épée, en donna un coup au serviteur du grand-prêtre et lui emporta l’oreille.
  '48':
  - type: text
    content: 'Jésus leur dit : '
  - type: text
    content: Me prenez-vous pour un bandit, pour que vous soyez venus en force avec des épées et des gourdins pour vous emparer de moi ?
  - type: text
    content: ' '
  '49':
  - type: text
    content: 'J’étais parmi vous chaque jour dans la cour du '
  - type: text
    content: Temple
  - type: text
    content: ' pour donner mon enseignement et vous ne m’avez pas arrêté. Mais il en est ainsi pour que les Ecritures s’accomplissent.'
  '5':
  - type: text
    content: On aurait pu le vendre et en tirer plus de trois cents pièces d’argent
  - type: note
    content: Il s’agit de deniers. Cette somme représente le salaire d’une année de travail d’un ouvrier agricole.
  - type: text
    content: ', qu’on aurait données aux pauvres !'
  - type: text
    content: Et ils ne ménagèrent pas leurs reproches à cette femme.
  '50':
  - type: text
    content: Alors tous ses compagnons l’abandonnèrent et prirent la fuite.
  '51':
  - type: text
    content: 'Un jeune homme le suivait, couvert seulement d’un drap. On le saisit, '
  '52':
  - type: text
    content: mais il abandonna le drap et s’enfuit, tout nu.
  - type: heading
    content: Jésus devant le Grand-Conseil
  - type: heading
    content: (Mt 26.57-68 ; Lc 22.54-55, 63-71 ; Jn 18.12-14, 19-24)
  '53':
  - type: text
    content: 'Jésus fut conduit devant le grand-prêtre chez qui se rassemblèrent les chefs des prêtres, les responsables du peuple et les spécialistes de la Loi. '
  '54':
  - type: text
    content: 'Pierre l’avait suivi à distance, jusqu’à l’intérieur de la cour du palais du grand-prêtre. Il était assis avec les gardes, près du feu, pour se réchauffer. '
  '55':
  - type: text
    content: 'Les chefs des prêtres et le Grand-Conseil au complet cherchaient un témoignage contre Jésus pour pouvoir le condamner à mort. Mais ils n’en trouvaient pas. '
  '56':
  - type: text
    content: Car il y avait beaucoup de gens pour apporter des faux témoignages contre lui, mais ces témoignages ne concordaient pas.
  '57':
  - type: text
    content: 'Finalement, quelques-uns se levèrent pour porter contre lui ce faux témoignage : '
  '58':
  - type: text
    content: 'Nous l’avons entendu dire : « Je démolirai ce temple fait de main d’homme et, en trois jours, j’en reconstruirai un autre, qui ne sera pas fait par des mains humaines. »'
  '59':
  - type: text
    content: Mais même là-dessus, leurs dépositions ne s’accordaient pas.
  '6':
  - type: text
    content: 'Mais Jésus dit : '
  - type: text
    content: Laissez-la donc tranquille ! Pourquoi lui faites-vous de la peine ? Ce qu’elle vient d’accomplir pour moi est une belle action.
  - type: text
    content: ' '
  '60':
  - type: text
    content: Alors le grand-prêtre se leva au milieu de l’assemblée et interrogea Jésus.
  - type: text
    content: – Eh bien, demanda-t-il, tu n’as rien à répondre aux témoignages qu’on vient de porter contre toi ?
  '61':
  - type: text
    content: Mais Jésus garda le silence et ne répondit pas.
  - type: text
    content: 'Le grand-prêtre l’interrogea de nouveau et lui demanda : Es-tu le Messie, le Fils du Dieu béni ?'
  '62':
  - type: text
    content: 'Et Jésus lui répondit : '
  - type: text
    content: 'Oui, je le suis ! Et vous verrez '
  - type: text
    content: 'le '
  - type: text
    content: Fils de l’homme
  - type: text
    content: ' siéger à la droite du Tout-Puissant'
  - type: note
    content: Ps 110.1.
  - type: text
    content: ' '
  - type: text
    content: et venir en gloire avec les nuées du ciel
  - type: note
    content: Dn 7.13.
  - type: text
    content: .
  '63':
  - type: text
    content: 'Alors, le grand-prêtre déchira ses vêtements en signe de consternation et s’écria : Qu’avons-nous encore besoin de témoins ! '
  '64':
  - type: text
    content: Vous avez entendu le blasphème ! Qu’en concluez-vous ?
  - type: text
    content: 'Tous, alors, le condamnèrent en le déclarant passible de mort. '
  '65':
  - type: text
    content: 'Quelques-uns se mirent à cracher sur lui, ils lui recouvrirent le visage et le frappèrent en lui disant : Hé ! Fais le prophète ! Qui c’est ?'
  - type: text
    content: Les gardes saisirent Jésus et lui donnèrent des gifles.
  - type: heading
    content: Pierre renie son Maître
  - type: heading
    content: (Mt 26.69-75 ; Lc 22.56-62 ; Jn 18.15-18, 25-27)
  '66':
  - type: text
    content: 'Pendant ce temps, Pierre était en bas dans la cour intérieure. Une des servantes du grand-prêtre arriva ; '
  '67':
  - type: text
    content: 'elle vit Pierre qui se chauffait et le dévisagea ; elle lui dit : Toi aussi, tu étais avec ce Jésus, ce Nazaréen !'
  '68':
  - type: text
    content: 'Mais Pierre le nia en disant : Je ne vois pas, je ne comprends pas ce que tu veux dire.'
  - type: text
    content: Puis il sortit de la cour et entra dans le vestibule. Alors un coq chanta
  - type: note
    content: Les mots un coq chanta sont absents dans certains manuscrits.
  - type: text
    content: .
  '69':
  - type: text
    content: 'Mais la servante le vit et recommença à dire à ceux qui se trouvaient là : Il fait aussi partie de ces gens-là.'
  '7':
  - type: text
    content: Des pauvres, vous en aurez toujours autour de vous, et vous pourrez leur faire du bien quand vous le voudrez ; mais moi, vous ne m’aurez pas toujours.
  - type: text
    content: ' '
  '70':
  - type: text
    content: Il le nia de nouveau.
  - type: text
    content: 'Peu après, ceux qui se trouvaient là redirent à Pierre : C’est sûr : tu fais partie de ces gens ! D’ailleurs, tu es galiléen !'
  '71':
  - type: text
    content: 'Alors il déclara : Je le jure, et que Dieu me condamne si ce n’est pas vrai, je ne connais pas l’homme dont vous parlez'
  - type: note
    content: 'Ou : Que Dieu condamne cet homme. Je jure que je ne connais pas celui dont vous parlez.'
  - type: text
    content: '  !'
  '72':
  - type: text
    content: 'Aussitôt, pour la seconde fois, un coq chanta. Alors, Pierre se souvint de ce que Jésus lui avait dit : '
  - type: text
    content: « Avant que le coq chante deux fois, tu m’auras renié trois fois. » Et il fondit en larmes
  - type: note
    content: 'Autres traductions : il songea à tout ceci et pleura ou il se couvrit la tête et pleura (signe de deuil). D’autres traduisent : il sortit précipitamment et il pleura.'
  - type: text
    content: .
  '8':
  - type: text
    content: Cette femme a fait ce qu’elle pouvait. Elle a d’avance embaumé mon corps pour préparer mon enterrement
  - type: note
    content: Les Juifs embaumaient sommairement les morts avec des onguents et des parfums.
  - type: text
    content: .
  - type: text
    content: ' '
  '9':
  - type: text
    content: Vraiment, je vous l’assure, dans le monde entier, partout où l’Evangile sera annoncé, on racontera aussi, en souvenir de cette femme, ce qu’elle vient de faire.
  - type: heading
    content: La trahison
  - type: heading
    content: (Mt 26.14-16 ; Lc 22.3-6)
