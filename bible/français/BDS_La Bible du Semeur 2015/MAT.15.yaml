document_id: MAT.15
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Jésus et la tradition religieuse juive
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: (Mc 7.1-23)
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'A cette époque, des pharisiens et des spécialistes de la Loi vinrent de Jérusalem ; ils abordèrent Jésus pour lui demander : '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Pourquoi tes disciples ne respectent-ils pas la tradition des ancêtres ? Car ils ne se lavent pas les mains selon le rite usuel avant chaque repas.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: ' '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: – Et vous,
  - type: text
    text: ' répliqua-t-il, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: pourquoi désobéissez-vous au commandement de Dieu pour suivre votre tradition ?
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'En effet, Dieu a dit : '
    - type: usfm
      marker: qt
      children:
      - type: text
        text: Honore ton père et ta mère
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '15.4 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Ex 20.12 ; Dt 5.16.
    marker-yv: yv-n
  - type: text
    text: ' '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'et '
    - type: usfm
      marker: qt
      children:
      - type: text
        text: Que celui qui maudit son père ou sa mère soit puni de mort
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '15.4 '
    - type: usfm
      marker: ft
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ex 21.17
        metadata:
          usfm: EXO.21.17
      - type: text
        text: .
    marker-yv: yv-n
  - type: usfm
    marker: wj
    children:
    - type: usfm
      marker: qt
      children:
      - type: text
        text: .
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'Mais vous, qu’enseignez-vous ? Qu’il suffit de dire à son père ou à sa mère : « Je fais offrande à Dieu d’une part de mes biens avec laquelle j’aurais pu t’assister »,'
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: pour ne plus rien devoir à son père ou à sa mère. Ainsi vous annulez la Parole de Dieu par votre tradition.
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'Hypocrites ! '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Esaïe
    - type: text
      text: ' a fort bien prophétisé à votre sujet :'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: ' '
  - type: usfm
    marker: wj
    children:
    - type: usfm
      marker: qt
      children:
      - type: text
        text: Ce peuple m’honore des lèvres,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: wj
    children:
    - type: usfm
      marker: qt
      children:
      - type: text
        text: mais, au fond de son cœur, il est bien loin de moi !
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: ' '
  - type: usfm
    marker: wj
    children:
    - type: usfm
      marker: qt
      children:
      - type: text
        text: Le culte qu’il me rend n’a aucune valeur,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: wj
    children:
    - type: usfm
      marker: qt
      children:
      - type: text
        text: car les enseignements qu’il donne
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: wj
    children:
    - type: usfm
      marker: qt
      children:
      - type: text
        text: ne sont que des règles inventées par les hommes
    - type: text
      text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '15.9 '
    - type: usfm
      marker: ft
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Es 29.13
        metadata:
          usfm: ISA.29.13
      - type: text
        text: ' cité selon l’ancienne version grecque.'
    marker-yv: yv-n
  - type: usfm
    marker: wj
    children:
    - type: usfm
      marker: qt
      children:
      - type: text
        text: .
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Alors Jésus appela la foule et lui dit : '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'Ecoutez-moi et comprenez-moi bien :'
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Ce qui rend un homme impur, ce n’est pas ce qui entre dans sa bouche, mais c’est ce qui en sort.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Alors les disciples s’approchèrent de lui pour lui dire : Sais-tu que les pharisiens ont été très choqués par tes paroles ?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Il leur répondit : '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Toute plante que mon Père céleste n’a pas lui-même plantée sera arrachée.
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'Laissez-les : ce sont des aveugles qui conduisent d’autres aveugles ! Or, si un aveugle en conduit un autre, ils tomberont tous deux dans le fossé.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Pierre intervint en disant : Explique-nous cette parabole.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: ' '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: – Eh quoi !
  - type: text
    text: ' répondit Jésus, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: vous ne comprenez toujours pas, vous aussi ?
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Ne saisissez-vous pas que tout ce qui entre par la bouche va dans le ventre, puis est évacué par voie naturelle ?
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Mais ce qui sort de la bouche vient du cœur, et c’est cela qui rend l’homme impur.
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'Car, c’est du cœur que proviennent les mauvaises pensées, les meurtres, les adultères, l’immoralité, le vol, les faux témoignages, les '
    - type: usfm
      marker: w
      children:
      - type: text
        text: blasphèmes
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '15.19 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Autre traduction : '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: injures.
    marker-yv: yv-n
  - type: text
    text: ' '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: .
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Voilà ce qui rend l’homme impur. Mais manger sans s’être lavé les mains ne rend pas l’homme impur.
- type: usfm
  marker: s1
  children:
  - type: text
    text: La foi d’une non-Juive
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: (Mc 7.24-30)
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: En quittant cet endroit, Jésus se rendit dans la région de Tyr et de Sidon.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: Et voilà qu’une femme cananéenne
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '15.22 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Cette femme, appelée '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'cananéenne, '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: faisait partie de la population non juive qui vivait dans cette partie de la Phénicie.
    marker-yv: yv-n
  - type: text
    text: ', qui habitait là, vint vers lui et se mit à crier : Seigneur, Fils de David, aie pitié de moi ! Ma fille est sous l’emprise d’un démon qui la tourmente cruellement.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: Mais Jésus ne lui répondit pas un mot.
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Ses disciples s’approchèrent de lui et lui dirent : Renvoie-la'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '15.23 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Autre traduction : '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'délivre-la, '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'c’est-à-dire '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: donne-lui ce qu’elle demande.
    marker-yv: yv-n
  - type: text
    text: ', car elle ne cesse de nous suivre en criant.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Ce à quoi il répondit : '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Je n’ai été envoyé qu’aux brebis perdues du peuple d’
    - type: usfm
      marker: w
      children:
      - type: text
        text: Israël
    - type: text
      text: .
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Mais la femme vint se prosterner devant lui en disant : Seigneur, viens à mon secours !'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Il lui répondit : '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Il n’est pas bien de prendre le pain des enfants pour le jeter aux petits chiens.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: – C’est vrai, Seigneur, reprit-elle, et pourtant les petits chiens mangent les miettes qui tombent de la table de leurs maîtres.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'Alors Jésus dit : '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: O femme, ta foi est grande ! Qu’il en soit donc comme tu le veux !
- type: usfm
  marker: p
  children:
  - type: text
    text: Et, sur l’heure, sa fille fut guérie.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Nombreuses guérisons
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: (Mc 7.31)
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'Jésus partit de cette région et retourna au bord du lac de Galilée. Il monta sur une colline où il s’assit. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'Des foules nombreuses vinrent auprès de lui et, avec elles, des paralysés, des aveugles, des sourds-muets, des estropiés et beaucoup d’autres malades. On les amena aux pieds de Jésus, et il les guérit. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: La foule s’émerveillait de voir les sourds-muets parler, les estropiés reprendre l’usage de leurs membres, les paralysés marcher, les aveugles recouvrer la vue, et tous se mirent à chanter la gloire du Dieu d’Israël.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Avec sept pains et des poissons
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: (Mc 8.1-10)
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'Jésus appela ses disciples et leur dit : '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: J’ai pitié de cette foule. Voilà déjà trois jours qu’ils sont restés là, avec moi, et ils n’ont rien à manger. Je ne veux pas les renvoyer à jeun, de peur que les forces leur manquent sur le chemin du retour.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: 'Ses disciples lui dirent : Où pourrions-nous trouver, dans ce lieu désert, assez de pains pour nourrir une telle foule ?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: ' '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: – Combien de pains avez-vous ?
- type: usfm
  marker: p
  children:
  - type: text
    text: – Sept, répondirent-ils, et quelques petits poissons.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: 'Alors il invita tout le monde à s’asseoir par terre. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: 'Il prit ensuite les sept pains et les poissons et, après avoir remercié Dieu, il les partagea et les donna aux disciples, qui les distribuèrent à la foule. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: 'Tous mangèrent à satiété. On ramassa sept corbeilles pleines des morceaux qui restaient. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: text
    text: Ceux qui furent ainsi nourris étaient au nombre de quatre mille hommes, sans compter les femmes et les enfants.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '39'
  - type: text
    text: Après avoir congédié la foule, Jésus monta dans un bateau et se rendit dans la région de Magadan.
