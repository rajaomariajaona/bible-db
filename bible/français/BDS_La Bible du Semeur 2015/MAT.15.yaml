document_id: MAT.15,21
type_code: fra
verses:
  '1':
  - type: heading
    content: Jésus et la tradition religieuse juive
  - type: heading
    content: (Mc 7.1-23)
  - type: text
    content: 'A cette époque, des pharisiens et des spécialistes de la Loi vinrent de Jérusalem ; ils abordèrent Jésus pour lui demander : '
  '10':
  - type: text
    content: 'Alors Jésus appela la foule et lui dit : '
  - type: text
    content: 'Ecoutez-moi et comprenez-moi bien :'
  - type: text
    content: ' '
  '11':
  - type: text
    content: Ce qui rend un homme impur, ce n’est pas ce qui entre dans sa bouche, mais c’est ce qui en sort.
  '12':
  - type: text
    content: 'Alors les disciples s’approchèrent de lui pour lui dire : Sais-tu que les pharisiens ont été très choqués par tes paroles ?'
  '13':
  - type: text
    content: 'Il leur répondit : '
  - type: text
    content: Toute plante que mon Père céleste n’a pas lui-même plantée sera arrachée.
  - type: text
    content: ' '
  '14':
  - type: text
    content: 'Laissez-les : ce sont des aveugles qui conduisent d’autres aveugles ! Or, si un aveugle en conduit un autre, ils tomberont tous deux dans le fossé.'
  '15':
  - type: text
    content: 'Pierre intervint en disant : Explique-nous cette parabole.'
  '16':
  - type: text
    content: ' '
  - type: text
    content: – Eh quoi !
  - type: text
    content: ' répondit Jésus, '
  - type: text
    content: vous ne comprenez toujours pas, vous aussi ?
  - type: text
    content: ' '
  '17':
  - type: text
    content: Ne saisissez-vous pas que tout ce qui entre par la bouche va dans le ventre, puis est évacué par voie naturelle ?
  - type: text
    content: ' '
  '18':
  - type: text
    content: Mais ce qui sort de la bouche vient du cœur, et c’est cela qui rend l’homme impur.
  - type: text
    content: ' '
  '19':
  - type: text
    content: 'Car, c’est du cœur que proviennent les mauvaises pensées, les meurtres, les adultères, l’immoralité, le vol, les faux témoignages, les '
  - type: text
    content: blasphèmes
  - type: note
    content: 'Autre traduction : injures.'
  - type: text
    content: ' '
  - type: text
    content: .
  - type: text
    content: ' '
  '2':
  - type: text
    content: Pourquoi tes disciples ne respectent-ils pas la tradition des ancêtres ? Car ils ne se lavent pas les mains selon le rite usuel avant chaque repas.
  '20':
  - type: text
    content: Voilà ce qui rend l’homme impur. Mais manger sans s’être lavé les mains ne rend pas l’homme impur.
  - type: heading
    content: La foi d’une non-Juive
  - type: heading
    content: (Mc 7.24-30)
  '21':
  - type: text
    content: En quittant cet endroit, Jésus se rendit dans la région de Tyr et de Sidon.
  '22':
  - type: text
    content: Et voilà qu’une femme cananéenne
  - type: note
    content: Cette femme, appelée cananéenne, faisait partie de la population non juive qui vivait dans cette partie de la Phénicie.
  - type: text
    content: ', qui habitait là, vint vers lui et se mit à crier : Seigneur, Fils de David, aie pitié de moi ! Ma fille est sous l’emprise d’un démon qui la tourmente cruellement.'
  '23':
  - type: text
    content: Mais Jésus ne lui répondit pas un mot.
  - type: text
    content: 'Ses disciples s’approchèrent de lui et lui dirent : Renvoie-la'
  - type: note
    content: 'Autre traduction : délivre-la, c’est-à-dire donne-lui ce qu’elle demande.'
  - type: text
    content: ', car elle ne cesse de nous suivre en criant.'
  '24':
  - type: text
    content: 'Ce à quoi il répondit : '
  - type: text
    content: Je n’ai été envoyé qu’aux brebis perdues du peuple d’
  - type: text
    content: Israël
  - type: text
    content: .
  '25':
  - type: text
    content: 'Mais la femme vint se prosterner devant lui en disant : Seigneur, viens à mon secours !'
  '26':
  - type: text
    content: 'Il lui répondit : '
  - type: text
    content: Il n’est pas bien de prendre le pain des enfants pour le jeter aux petits chiens.
  '27':
  - type: text
    content: – C’est vrai, Seigneur, reprit-elle, et pourtant les petits chiens mangent les miettes qui tombent de la table de leurs maîtres.
  '28':
  - type: text
    content: 'Alors Jésus dit : '
  - type: text
    content: O femme, ta foi est grande ! Qu’il en soit donc comme tu le veux !
  - type: text
    content: Et, sur l’heure, sa fille fut guérie.
  - type: heading
    content: Nombreuses guérisons
  - type: heading
    content: (Mc 7.31)
  '29':
  - type: text
    content: 'Jésus partit de cette région et retourna au bord du lac de Galilée. Il monta sur une colline où il s’assit. '
  '3':
  - type: text
    content: ' '
  - type: text
    content: – Et vous,
  - type: text
    content: ' répliqua-t-il, '
  - type: text
    content: pourquoi désobéissez-vous au commandement de Dieu pour suivre votre tradition ?
  - type: text
    content: ' '
  '30':
  - type: text
    content: 'Des foules nombreuses vinrent auprès de lui et, avec elles, des paralysés, des aveugles, des sourds-muets, des estropiés et beaucoup d’autres malades. On les amena aux pieds de Jésus, et il les guérit. '
  '31':
  - type: text
    content: La foule s’émerveillait de voir les sourds-muets parler, les estropiés reprendre l’usage de leurs membres, les paralysés marcher, les aveugles recouvrer la vue, et tous se mirent à chanter la gloire du Dieu d’Israël.
  - type: heading
    content: Avec sept pains et des poissons
  - type: heading
    content: (Mc 8.1-10)
  '32':
  - type: text
    content: 'Jésus appela ses disciples et leur dit : '
  - type: text
    content: J’ai pitié de cette foule. Voilà déjà trois jours qu’ils sont restés là, avec moi, et ils n’ont rien à manger. Je ne veux pas les renvoyer à jeun, de peur que les forces leur manquent sur le chemin du retour.
  '33':
  - type: text
    content: 'Ses disciples lui dirent : Où pourrions-nous trouver, dans ce lieu désert, assez de pains pour nourrir une telle foule ?'
  '34':
  - type: text
    content: ' '
  - type: text
    content: – Combien de pains avez-vous ?
  - type: text
    content: – Sept, répondirent-ils, et quelques petits poissons.
  '35':
  - type: text
    content: 'Alors il invita tout le monde à s’asseoir par terre. '
  '36':
  - type: text
    content: 'Il prit ensuite les sept pains et les poissons et, après avoir remercié Dieu, il les partagea et les donna aux disciples, qui les distribuèrent à la foule. '
  '37':
  - type: text
    content: 'Tous mangèrent à satiété. On ramassa sept corbeilles pleines des morceaux qui restaient. '
  '38':
  - type: text
    content: Ceux qui furent ainsi nourris étaient au nombre de quatre mille hommes, sans compter les femmes et les enfants.
  '39':
  - type: text
    content: Après avoir congédié la foule, Jésus monta dans un bateau et se rendit dans la région de Magadan.
  '4':
  - type: text
    content: 'En effet, Dieu a dit : '
  - type: text
    content: Honore ton père et ta mère
  - type: note
    content: Ex 20.12 ; Dt 5.16.
  - type: text
    content: ' '
  - type: text
    content: 'et '
  - type: text
    content: Que celui qui maudit son père ou sa mère soit puni de mort
  - type: note
    content: Ex 21.17.
  - type: text
    content: .
  - type: text
    content: ' '
  '5':
  - type: text
    content: 'Mais vous, qu’enseignez-vous ? Qu’il suffit de dire à son père ou à sa mère : « Je fais offrande à Dieu d’une part de mes biens avec laquelle j’aurais pu t’assister »,'
  - type: text
    content: ' '
  '6':
  - type: text
    content: pour ne plus rien devoir à son père ou à sa mère. Ainsi vous annulez la Parole de Dieu par votre tradition.
  - type: text
    content: ' '
  '7':
  - type: text
    content: 'Hypocrites ! '
  - type: text
    content: Esaïe
  - type: text
    content: ' a fort bien prophétisé à votre sujet :'
  '8':
  - type: text
    content: ' '
  - type: text
    content: Ce peuple m’honore des lèvres,
  - type: text
    content: mais, au fond de son cœur, il est bien loin de moi !
  '9':
  - type: text
    content: ' '
  - type: text
    content: Le culte qu’il me rend n’a aucune valeur,
  - type: text
    content: car les enseignements qu’il donne
  - type: text
    content: ne sont que des règles inventées par les hommes
  - type: text
    content: ' '
  - type: note
    content: Es 29.13 cité selon l’ancienne version grecque.
  - type: text
    content: .
