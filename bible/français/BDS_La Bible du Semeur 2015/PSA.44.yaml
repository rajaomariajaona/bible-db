document_id: PSA.44,21
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Rejetés par l’Eternel
    marker-yv: yv-h
  - type: usfm
    marker: d
    children:
    - type: text
      text: Au chef de chœur. Méditation
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '44.1 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Signification incertaine.
      marker-yv: yv-n
    - type: text
      text: ' des Qoréites'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '44.1 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Voir note '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: '42.1'
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: .
  '10':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Pourtant tu nous as rejetés
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et livrés à la honte.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tu as cessé d’accompagner ╵nos armées au combat !
  '11':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Tu nous fais reculer ╵devant nos ennemis :'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: nos adversaires ╵se sont emparés de nos biens.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Oui, tu nous as livrés à eux, ╵ainsi qu’un troupeau de brebis ╵destinées à la boucherie,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et tu nous as éparpillés ╵parmi les peuples étrangers.
  '13':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tu as vendu ton peuple ╵à un bas prix
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sans en tirer aucun profit,
  '14':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et tu nous as livrés ╵aux railleries de nos voisins.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tous ceux qui nous entourent ╵se rient et se moquent de nous.
  '15':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tu fais de nous ╵la risée d’autres peuples.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: En nous voyant, les étrangers ╵secouent la tête en ricanant.
  '16':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tout le jour je vois mon humiliation,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et mon visage ╵est marqué par la honte
  '17':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: quand j’entends les outrages ╵et les propos blessants
  - type: usfm
    marker: q1
    children:
    - type: text
      text: d’un ennemi vindicatif.
  '18':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tout cela nous est arrivé ╵sans que nous t’ayons délaissé
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et sans que nous ayons trahi ╵ton alliance avec nous.
  '19':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Nous n’avons pas renié ╵nos engagements envers toi,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: nous n’avons pas quitté la voie ╵que tu nous as prescrite.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: O Dieu, nous l’avons entendu ╵de nos propres oreilles,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: nos pères nous ont raconté
  - type: usfm
    marker: q1
    children:
    - type: text
      text: tout ce que tu as accompli
  - type: usfm
    marker: q1
    children:
    - type: text
      text: de leur temps, autrefois.
  '20':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Pourtant, tu nous as écrasés ╵dans le domaine des chacals
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '44.20 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Lieu désert et inhabité (voir Es 13.22 ; Jr 9.11).
      marker-yv: yv-n
    - type: text
      text: ','
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et tu nous as couverts ╵de ténèbres épaisses.
  '21':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Si nous avions délaissé notre Dieu,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: si nous avions tendu les mains ╵vers un dieu étranger,
  '22':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Dieu ne l’aurait-il pas appris,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: lui qui connaît tous les secrets ╵qui sont au fond des cœurs ?
  '23':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: A cause de toi, chaque jour, ╵nous sommes massacrés
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et l’on nous considère ╵comme étant des moutons ╵destinés à la boucherie
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '44.23 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Cité en '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: Rm 8.36
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: .
  '24':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Interviens donc, Seigneur ! ╵Pourquoi ne réagis-tu pas ?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Veuille te réveiller ! ╵Ne nous rejette pas toujours !
  '25':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Pourquoi te détourner ?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Pourquoi ignores-tu nos maux ╵et nos détresses ?
  '26':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Car nous voilà prostrés dans la poussière,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: plaqués au sol.
  '27':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Agis, viens à notre aide !
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Libère-nous dans ton amour !
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Par ton intervention, ╵tu as dépossédé des peuples ╵pour établir nos pères ;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et tu as frappé des peuplades ╵pour donner à nos pères ╵assez de place.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ce n’est pas grâce à leur épée ╵qu’ils ont occupé cette terre,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'ni par leur propre force ╵qu’ils ont remporté la victoire :'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: mais c’est par ton action puissante,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: car tu leur étais favorable ╵et les avais en affection.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: C’est toi, ô Dieu, qui es mon roi
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et qui décides ╵le salut de Jacob
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '44.5 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Autre traduction : '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'et qui fais triompher Jacob. '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Les anciennes versions grecque et syriaque ont lu : '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'tu es mon roi, ô Dieu : ordonne le salut pour Jacob.'
      marker-yv: yv-n
    - type: text
      text: .
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Oui, avec toi ╵nous repoussons nos ennemis,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et grâce à toi ╵nous piétinons nos adversaires
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '44.6 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Voir 18.39 ; Jos 10.24 ; Es 51.23.
      marker-yv: yv-n
    - type: text
      text: .
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Je ne compte pas sur mon arc,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: mon épée ne me sauve pas,
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: c’est toi, ô Dieu, ╵qui nous délivres ╵de tous nos ennemis
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et qui couvres de honte ╵les gens qui nous haïssent.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tout au long de ce jour, ╵nous nous félicitons de Dieu ;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: nous le louerons ╵jusqu’en l’éternité.
  - type: usfm
    marker: q4
    children:
    - type: text
      text: Pause
