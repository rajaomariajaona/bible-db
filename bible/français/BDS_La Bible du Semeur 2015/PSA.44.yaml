document_id: PSA.44,21
type_code: fra
verses:
  '1':
  - type: heading
    content: Rejetés par l’Eternel
  - type: text
    content: Au chef de chœur. Méditation
  - type: note
    content: Signification incertaine.
  - type: text
    content: ' des Qoréites'
  - type: note
    content: Voir note 42.1.
  - type: text
    content: .
  '10':
  - type: text
    content: Pourtant tu nous as rejetés
  - type: text
    content: et livrés à la honte.
  - type: text
    content: Tu as cessé d’accompagner ╵nos armées au combat !
  '11':
  - type: text
    content: 'Tu nous fais reculer ╵devant nos ennemis :'
  - type: text
    content: nos adversaires ╵se sont emparés de nos biens.
  '12':
  - type: text
    content: Oui, tu nous as livrés à eux, ╵ainsi qu’un troupeau de brebis ╵destinées à la boucherie,
  - type: text
    content: et tu nous as éparpillés ╵parmi les peuples étrangers.
  '13':
  - type: text
    content: Tu as vendu ton peuple ╵à un bas prix
  - type: text
    content: sans en tirer aucun profit,
  '14':
  - type: text
    content: et tu nous as livrés ╵aux railleries de nos voisins.
  - type: text
    content: Tous ceux qui nous entourent ╵se rient et se moquent de nous.
  '15':
  - type: text
    content: Tu fais de nous ╵la risée d’autres peuples.
  - type: text
    content: En nous voyant, les étrangers ╵secouent la tête en ricanant.
  '16':
  - type: text
    content: Tout le jour je vois mon humiliation,
  - type: text
    content: et mon visage ╵est marqué par la honte
  '17':
  - type: text
    content: quand j’entends les outrages ╵et les propos blessants
  - type: text
    content: d’un ennemi vindicatif.
  '18':
  - type: text
    content: Tout cela nous est arrivé ╵sans que nous t’ayons délaissé
  - type: text
    content: et sans que nous ayons trahi ╵ton alliance avec nous.
  '19':
  - type: text
    content: Nous n’avons pas renié ╵nos engagements envers toi,
  - type: text
    content: nous n’avons pas quitté la voie ╵que tu nous as prescrite.
  '2':
  - type: text
    content: O Dieu, nous l’avons entendu ╵de nos propres oreilles,
  - type: text
    content: nos pères nous ont raconté
  - type: text
    content: tout ce que tu as accompli
  - type: text
    content: de leur temps, autrefois.
  '20':
  - type: text
    content: Pourtant, tu nous as écrasés ╵dans le domaine des chacals
  - type: note
    content: Lieu désert et inhabité (voir Es 13.22 ; Jr 9.11).
  - type: text
    content: ','
  - type: text
    content: et tu nous as couverts ╵de ténèbres épaisses.
  '21':
  - type: text
    content: Si nous avions délaissé notre Dieu,
  - type: text
    content: si nous avions tendu les mains ╵vers un dieu étranger,
  '22':
  - type: text
    content: Dieu ne l’aurait-il pas appris,
  - type: text
    content: lui qui connaît tous les secrets ╵qui sont au fond des cœurs ?
  '23':
  - type: text
    content: A cause de toi, chaque jour, ╵nous sommes massacrés
  - type: text
    content: et l’on nous considère ╵comme étant des moutons ╵destinés à la boucherie
  - type: note
    content: Cité en Rm 8.36.
  - type: text
    content: .
  '24':
  - type: text
    content: Interviens donc, Seigneur ! ╵Pourquoi ne réagis-tu pas ?
  - type: text
    content: Veuille te réveiller ! ╵Ne nous rejette pas toujours !
  '25':
  - type: text
    content: Pourquoi te détourner ?
  - type: text
    content: Pourquoi ignores-tu nos maux ╵et nos détresses ?
  '26':
  - type: text
    content: Car nous voilà prostrés dans la poussière,
  - type: text
    content: plaqués au sol.
  '27':
  - type: text
    content: Agis, viens à notre aide !
  - type: text
    content: Libère-nous dans ton amour !
  '3':
  - type: text
    content: Par ton intervention, ╵tu as dépossédé des peuples ╵pour établir nos pères ;
  - type: text
    content: et tu as frappé des peuplades ╵pour donner à nos pères ╵assez de place.
  '4':
  - type: text
    content: Ce n’est pas grâce à leur épée ╵qu’ils ont occupé cette terre,
  - type: text
    content: 'ni par leur propre force ╵qu’ils ont remporté la victoire :'
  - type: text
    content: mais c’est par ton action puissante,
  - type: text
    content: car tu leur étais favorable ╵et les avais en affection.
  '5':
  - type: text
    content: C’est toi, ô Dieu, qui es mon roi
  - type: text
    content: et qui décides ╵le salut de Jacob
  - type: note
    content: 'Autre traduction : et qui fais triompher Jacob. Les anciennes versions grecque et syriaque ont lu : tu es mon roi, ô Dieu : ordonne le salut pour Jacob.'
  - type: text
    content: .
  '6':
  - type: text
    content: Oui, avec toi ╵nous repoussons nos ennemis,
  - type: text
    content: et grâce à toi ╵nous piétinons nos adversaires
  - type: note
    content: Voir 18.39 ; Jos 10.24 ; Es 51.23.
  - type: text
    content: .
  '7':
  - type: text
    content: Je ne compte pas sur mon arc,
  - type: text
    content: mon épée ne me sauve pas,
  '8':
  - type: text
    content: c’est toi, ô Dieu, ╵qui nous délivres ╵de tous nos ennemis
  - type: text
    content: et qui couvres de honte ╵les gens qui nous haïssent.
  '9':
  - type: text
    content: Tout au long de ce jour, ╵nous nous félicitons de Dieu ;
  - type: text
    content: nous le louerons ╵jusqu’en l’éternité.
  - type: text
    content: Pause
