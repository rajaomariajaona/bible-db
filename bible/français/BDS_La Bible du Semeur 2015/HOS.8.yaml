document_id: HOS.8,21
type_code: fra
verses:
  '1':
  - type: heading
    content: Le châtiment
  - type: heading
    content: La colère de Dieu
  - type: text
    content: Embouche donc le cor !
  - type: text
    content: C’est comme un aigle
  - type: text
    content: fondant sur le pays ╵de l’Eternel,
  - type: text
    content: car ils ont violé mon alliance,
  - type: text
    content: et se sont révoltés ╵contre ma Loi.
  '10':
  - type: text
    content: Mais ils auront beau faire ╵des présents à des peuples étrangers,
  - type: text
    content: je vais les rassembler,
  - type: text
    content: et ils dépériront
  - type: text
    content: très bientôt sous le joug
  - type: text
    content: du roi des princes
  - type: note
    content: C’est-à-dire du roi d’Assyrie.
  - type: text
    content: .
  '11':
  - type: text
    content: Le peuple d’Ephraïm ╵multiplie les autels ╵pour y offrir des sacrifices ╵pour le péché.
  - type: text
    content: Ils ne lui ont servi ╵qu’à pécher davantage.
  '12':
  - type: text
    content: Et si j’écris pour lui ╵de nombreux articles de loi,
  - type: text
    content: il les regarde ╵comme si cette loi ╵lui était étrangère.
  '13':
  - type: text
    content: Pour me faire une offrande ╵ils sacrifient des bêtes,
  - type: text
    content: et la viande, ils la mangent ;
  - type: text
    content: l’Eternel ne les agrée pas.
  - type: text
    content: Désormais, il prendra ╵en considération leurs fautes
  - type: text
    content: et il les châtiera ╵pour leurs péchés,
  - type: text
    content: ils retourneront en Egypte.
  '14':
  - type: text
    content: Oui, Israël a oublié ╵celui qui l’a créé,
  - type: text
    content: et il s’est construit des palais,
  - type: text
    content: Juda a fortifié ╵des quantités de villes,
  - type: text
    content: mais j’y mettrai le feu
  - type: text
    content: qui consumera leurs palais. »
  '2':
  - type: text
    content: 'Ils crient vers moi :'
  - type: text
    content: “O toi, notre Dieu, nous te connaissons, nous, Israël !”
  '3':
  - type: text
    content: Mais Israël a rejeté le bien,
  - type: text
    content: c’est pourquoi l’ennemi ╵le poursuivra.
  '4':
  - type: text
    content: Ils se sont établis des rois, ╵sans mon accord,
  - type: text
    content: se sont donné des chefs ╵sans mon approbation
  - type: note
    content: Voir 7.7 et note.
  - type: text
    content: .
  - type: text
    content: Ils ont utilisé ╵leur or et leur argent
  - type: text
    content: pour se fabriquer des idoles
  - type: text
    content: et cela causera leur perte
  - type: note
    content: 'Autre traduction : pour que leur argent et leur or leur soient ôtés.'
  - type: text
    content: .
  '5':
  - type: text
    content: Ton veau
  - type: note
    content: Voir 4.15 et note ; 10.5 ; 1 R 12.28-29.
  - type: text
    content: ', ô Samarie, ╵je le rejette.'
  - type: text
    content: Oui, contre toi, ╵ma colère s’est enflammée.
  - type: text
    content: Combien de temps encore ╵seras-tu incapable ╵de pureté ?
  '6':
  - type: text
    content: Car ton veau, il vient d’Israël,
  - type: text
    content: un artisan l’a fait,
  - type: text
    content: il n’est pas Dieu.
  - type: text
    content: Il sera mis en pièces, ╵le veau de Samarie.
  - type: heading
    content: Le vent et la tempête
  '7':
  - type: text
    content: Ils ont semé le vent,
  - type: text
    content: 'ils moissonneront la tempête :'
  - type: text
    content: “Blé sans épi ╵ne produira pas de farine.”
  - type: text
    content: Et même s’il en produisait,
  - type: text
    content: ce sont des étrangers ╵qui la dévoreraient.
  '8':
  - type: text
    content: Oui, Israël ╵est dévoré.
  - type: text
    content: Le voici, désormais, ╵parmi les autres peuples,
  - type: text
    content: comme un objet indésirable.
  '9':
  - type: text
    content: Car lui, il est allé ╵s’adresser à Assur.
  - type: text
    content: Un onagre sauvage ╵garde sa liberté
  - type: note
    content: 'Autre traduction : Ephraïm est comme un onagre qui se tient à l’écart.'
  - type: text
    content: ','
  - type: text
    content: mais les gens d’Ephraïm ╵se sont acheté des amants
  - type: note
    content: 'Autre traduction : ont payé des amants. Osée, dernier roi d’Israël, a acheté l’alliance du roi d’Assyrie (voir 2 R 17.3).'
  - type: text
    content: .
