document_id: HOS.8,21
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Le châtiment
    marker-yv: yv-h
  - type: usfm
    marker: s2
    children:
    - type: text
      text: La colère de Dieu
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: Embouche donc le cor !
  - type: usfm
    marker: q1
    children:
    - type: text
      text: C’est comme un aigle
  - type: usfm
    marker: q1
    children:
    - type: text
      text: fondant sur le pays ╵de l’Eternel,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: car ils ont violé mon alliance,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et se sont révoltés ╵contre ma Loi.
  '10':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: Mais ils auront beau faire ╵des présents à des peuples étrangers,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: je vais les rassembler,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et ils dépériront
  - type: usfm
    marker: q1
    children:
    - type: text
      text: très bientôt sous le joug
  - type: usfm
    marker: q1
    children:
    - type: text
      text: du roi des princes
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '8.10 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: C’est-à-dire du roi d’Assyrie.
      marker-yv: yv-n
    - type: text
      text: .
  '11':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: Le peuple d’Ephraïm ╵multiplie les autels ╵pour y offrir des sacrifices ╵pour le péché.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ils ne lui ont servi ╵qu’à pécher davantage.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: Et si j’écris pour lui ╵de nombreux articles de loi,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: il les regarde ╵comme si cette loi ╵lui était étrangère.
  '13':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: Pour me faire une offrande ╵ils sacrifient des bêtes,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et la viande, ils la mangent ;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: l’Eternel ne les agrée pas.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Désormais, il prendra ╵en considération leurs fautes
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et il les châtiera ╵pour leurs péchés,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ils retourneront en Egypte.
  '14':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: Oui, Israël a oublié ╵celui qui l’a créé,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et il s’est construit des palais,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Juda a fortifié ╵des quantités de villes,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: mais j’y mettrai le feu
  - type: usfm
    marker: q1
    children:
    - type: text
      text: qui consumera leurs palais. »
  '2':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'Ils crient vers moi :'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “O toi, notre Dieu, nous te connaissons, nous, Israël !”
  '3':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: Mais Israël a rejeté le bien,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: c’est pourquoi l’ennemi ╵le poursuivra.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: Ils se sont établis des rois, ╵sans mon accord,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: se sont donné des chefs ╵sans mon approbation
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '8.4 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Voir '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: '7.7'
        - type: text
          text: ' et note.'
      marker-yv: yv-n
    - type: text
      text: .
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ils ont utilisé ╵leur or et leur argent
  - type: usfm
    marker: q1
    children:
    - type: text
      text: pour se fabriquer des idoles
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et cela causera leur perte
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '8.4 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Autre traduction : '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: pour que leur argent et leur or leur soient ôtés.
      marker-yv: yv-n
    - type: text
      text: .
  '5':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: Ton veau
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '8.5 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Voir '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: '4.15'
        - type: text
          text: ' et note ; 10.5 ; 1 R 12.28-29.'
      marker-yv: yv-n
    - type: text
      text: ', ô Samarie, ╵je le rejette.'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Oui, contre toi, ╵ma colère s’est enflammée.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Combien de temps encore ╵seras-tu incapable ╵de pureté ?
  '6':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: Car ton veau, il vient d’Israël,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: un artisan l’a fait,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: il n’est pas Dieu.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Il sera mis en pièces, ╵le veau de Samarie.
  - type: usfm
    marker: s2
    children:
    - type: text
      text: Le vent et la tempête
    marker-yv: yv-h
  '7':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: Ils ont semé le vent,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'ils moissonneront la tempête :'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “Blé sans épi ╵ne produira pas de farine.”
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et même s’il en produisait,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ce sont des étrangers ╵qui la dévoreraient.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: Oui, Israël ╵est dévoré.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Le voici, désormais, ╵parmi les autres peuples,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: comme un objet indésirable.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: Car lui, il est allé ╵s’adresser à Assur.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Un onagre sauvage ╵garde sa liberté
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '8.9 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Autre traduction : '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: Ephraïm est comme un onagre qui se tient à l’écart.
      marker-yv: yv-n
    - type: text
      text: ','
  - type: usfm
    marker: q1
    children:
    - type: text
      text: mais les gens d’Ephraïm ╵se sont acheté des amants
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '8.9 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Autre traduction : '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'ont payé des amants. '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Osée, dernier roi d’Israël, a acheté l’alliance du roi d’Assyrie (voir '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: 2 R 17.3
        - type: text
          text: ).
      marker-yv: yv-n
    - type: text
      text: .
