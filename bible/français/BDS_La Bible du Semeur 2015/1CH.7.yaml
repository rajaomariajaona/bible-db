document_id: 1CH.7,21
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Les descendants d’Issacar
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: Issacar eut quatre fils
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '7.1 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Pour les v. 1-5, voir Gn 46.13 ; Nb 1.28 ; 26.23-25.
      marker-yv: yv-n
    - type: text
      text: '  : Tola, Poua, Yashoub et Shimrôn. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Descendants de Yediaël : Bilhân, qui eut pour fils : Yeoush, Benjamin, Ehoud, Kenaana, Zétân, Tarsis et Ahishahar. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Tous ces descendants de Yediaël furent des chefs de leurs groupes familiaux qui comptaient 17 200 guerriers valeureux pouvant sortir pour le combat. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Shouppim et Houppim étaient fils d’Ir : Houshim était fils d’Ahèr.'
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Les descendants de Nephtali
    marker-yv: yv-h
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Fils de Nephtali
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '7.13 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Voir Gn 46.24 ; Nb 26.48-50.
      marker-yv: yv-n
    - type: text
      text: '  : Yahtséel, Gouni, Yétser et Shalloum'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '7.13 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Certains manuscrits hébreux et certains manuscrits de l’ancienne version grecque ont : '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: Shillem.
      marker-yv: yv-n
    - type: text
      text: ', descendants de Bilha.'
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Les descendants de Manassé
    marker-yv: yv-h
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Descendants de Manassé
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '7.14 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Pour les v. 14-19, voir Nb 26.29-34 ; Jos 17.1-18.
      marker-yv: yv-n
    - type: text
      text: '  : Asriel, enfanté par son épouse syrienne de second rang. Elle lui donna aussi Makir, le père de Galaad. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Makir prit une femme pour Houppim et une pour Shouppim. Le nom de sa sœur était Maaka. Le nom du second fils était Tselophhad qui n’eut que des filles. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Maaka, femme de Makir, lui donna encore un fils qu’elle appela Péresh, dont le frère fut Shéresh ; ce dernier eut pour fils Oulam et Réqem. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Oulam eut pour fils Bedân. Tels sont les descendants de Galaad, fils de Makir, et petit-fils de Manassé. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Sa sœur Hammoléketh donna naissance à Ishhod, Abiézer et Mahla. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Les fils de Shemida étaient : Ahyân, Sichem, Liqhi et Aniam.'
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Les descendants d’Ephraïm
    marker-yv: yv-h
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Descendants de Tola : Ouzzi, Rephaya, Yeriel, Yahmaï, Yibsam et Samuel ; tous ceux-là furent les chefs des groupes familiaux de Tola, des guerriers valeureux dans leurs lignées ; à l’époque de David, ils étaient au nombre de 22 600. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Les descendants d’Ephraïm
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '7.20 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Pour les v. 20-29, voir Nb 26.35 ; Jos 16 et '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: '17'
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: ' en ligne directe de père en fils furent : Shoutélah, Béred, Tahath, Eleada, Tahath, '
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Zabad, Shoutélah. Quant à Ezer et Elead, ils furent tués par les habitants de Gath natifs du pays, parce qu’ils avaient tenté de s’emparer de leurs troupeaux. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ephraïm, leur père, porta longtemps leur deuil. Les gens de sa parenté vinrent le consoler. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Plus tard, Ephraïm s’unit à sa femme, elle devint enceinte et lui donna un fils qu’il appela Beria (Dans le malheur) car sa famille avait été dans le malheur
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '7.23 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Il y a en hébreu un jeu de mots avec le nom '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Beria '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'et le terme rendu par '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: malheur.
      marker-yv: yv-n
    - type: text
      text: '. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ephraïm eut aussi une fille, Shééra, qui fortifia Beth-Horôn-la-Basse, Beth-Horôn-la-Haute, et Ouzzèn-Shééra. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Puis, en ligne directe de père en fils : Réphah, Résheph, Télah, Tahân, '
  '26':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Laedân, Ammihoud, Elishama, '
  '27':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Noun et Josué. '
  '28':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Les descendants d’Ephraïm avaient en propriété pour y habiter Béthel et les localités qui en dépendaient, à l’est, Naarân ; à l’ouest, Guézer et Sichem, et les localités qui dépendaient de ces deux villes ; leur territoire s’étendait jusqu’à Ayya et les localités qui en dépendaient. '
  '29':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Les descendants de Manassé possédaient les villes de Beth-Sheân, Taanak, Meguiddo, Dor et les localités qui dépendaient de celles-ci. C’est dans ces villes qu’habitèrent les descendants de Joseph, fils d’Israël.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Les descendants d’Aser
    marker-yv: yv-h
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Descendants d’Ouzzi : Yizrahya qui eut pour fils : Michaël, Abdias, Joël, Yishiya. Ils furent chefs tous les cinq. '
  '30':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Fils d’Aser
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '7.30 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Pour les v. 30-40, voir Gn 46.17 ; Nb 26.44-46.
      marker-yv: yv-n
    - type: text
      text: '  : Yimna, Yishva, Yishvi et Beria ; leur sœur était Sérah. '
  '31':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fils de Beria : Héber et Malkiel. Ce dernier fut le fondateur de Birzavith. '
  '32':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Héber eut pour fils Yaphleth, Shomer, Hotam et leur sœur Shoua. '
  '33':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fils de Yaphleth : Pasak, Bimhal et Ashvath. Tels étaient les fils de Yaphleth. '
  '34':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fils de Shémer : Ahi, Rohega, Yehoubba et Aram. '
  '35':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fils de Hélem, son frère : Tsophah, Yimna, Shélesh et Amal. '
  '36':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fils de Tsophah : Souah, Harnépher, Shoual, Béri, Yimra, '
  '37':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Bétser, Hod, Shamma, Shilsha, Yitrân et Beéra. '
  '38':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fils de Yéter : Yephounné, Pispa et Ara. '
  '39':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fils de Oulla : Arah, Hanniel et Ritsya. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Leurs groupes familiaux comptaient des corps d’armées totalisant 36 000 soldats, tant leurs femmes et leurs enfants étaient nombreux. '
  '40':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Voici donc les descendants d’Aser, chefs de leurs groupes familiaux, hommes d’élite et guerriers valeureux, à la tête des chefs de famille
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '7.40 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Autre traduction : '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: des chefs éminents.
      marker-yv: yv-n
    - type: text
      text: . Le nombre des hommes recensés dans leur armée pour le combat était de 26 000 hommes.
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: L’ensemble des membres de toutes les familles d’Issacar recensées se montait à 87 000 guerriers valeureux.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Les descendants de Benjamin
    marker-yv: yv-h
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Benjamin eut trois fils
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '7.6 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Pour les v. 6-12, voir Gn 46.21 ; Nb 26.38-39 ; 1 Ch 8.1-2.
      marker-yv: yv-n
    - type: text
      text: '  : Béla, Béker et Yediaël. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Béla eut cinq fils : Etsbôn, Ouzzi, Ouzziel, Yerimoth et Iri qui furent des chefs de leurs groupes familiaux et de valeureux guerriers, qu’on recensa au nombre de 22 034 hommes. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Descendants de Béker : Zemira, Joas, Eliézer, Elyoénaï ; Omri, Yerémoth, Abiya, Anatoth et Alameth. Tels étaient les descendants de Béker. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Le recensement selon les descendants des chefs de groupes familiaux donnait 20 200 guerriers valeureux. '
