document_id: ISA.44,21
type_code: fra
verses:
  '1':
  - type: heading
    content: Quand Dieu répandra son Esprit
  - type: text
    content: Et maintenant, écoute, ╵Jacob, mon serviteur,
  - type: text
    content: Israël, toi que j’ai choisi,
  '10':
  - type: text
    content: A quoi bon faire un dieu,
  - type: text
    content: couler une statue,
  - type: text
    content: qui ne procure aucun profit ?
  '11':
  - type: text
    content: 'Voici : tous leurs fidèles ╵seront couverts de honte,'
  - type: text
    content: car ceux qui les ont fabriqués ╵ne sont que des humains !
  - type: text
    content: Qu’ils se rassemblent tous
  - type: text
    content: et qu’ils se tiennent là !
  - type: text
    content: Ils seront effrayés ╵et confus tous ensemble.
  '12':
  - type: text
    content: L’artisan ferronnier ╵appointe son burin,
  - type: text
    content: le passe dans les braises
  - type: text
    content: et, à coups de marteau, ╵façonne son idole,
  - type: text
    content: avec la force de son bras.
  - type: text
    content: Mais, sitôt qu’il a faim,
  - type: text
    content: il n’a plus d’énergie,
  - type: text
    content: et s’il ne boit pas d’eau,
  - type: text
    content: le voilà qui faiblit
  - type: note
    content: Dans le v. 12, Esaïe décrit la fabrication d’une idole en métal ; dans les v. 13-20, d’une idole en bois, plus répandue (voir 40.20) que la première.
  - type: text
    content: '  !'
  '13':
  - type: text
    content: 'Et voici le sculpteur : ╵il a tendu sa corde,'
  - type: text
    content: trace l’œuvre à la craie
  - type: text
    content: puis, avec le ciseau, ╵il l’exécute,
  - type: text
    content: et il la dessine au compas.
  - type: text
    content: Il la façonne ainsi ╵d’après la forme humaine,
  - type: text
    content: et à la ressemblance ╵d’un homme magnifique
  - type: text
    content: pour qu’elle habite un sanctuaire.
  '14':
  - type: text
    content: Il a coupé des cèdres,
  - type: text
    content: ou bien il s’est choisi ╵du cyprès ou du chêne
  - type: text
    content: qu’il a laissé ╵devenir bien robuste
  - type: text
    content: parmi les arbres des forêts,
  - type: text
    content: ou bien il prend un pin ╵qu’il a planté lui-même,
  - type: text
    content: que la pluie a fait croître.
  '15':
  - type: text
    content: Or, l’homme se sert de ces bois ╵pour les brûler,
  - type: text
    content: il en prend une part ╵pour se chauffer,
  - type: text
    content: il allume le feu ╵pour y cuire son pain.
  - type: text
    content: Avec le même bois, ╵il fait un dieu,
  - type: text
    content: et il l’adore ;
  - type: text
    content: il fabrique une idole
  - type: text
    content: et se prosterne devant elle.
  '16':
  - type: text
    content: La moitié de ce bois, ╵il l’a livrée au feu ;
  - type: text
    content: grâce à cette moitié, ╵il mange de la viande,
  - type: text
    content: il fait cuire un rôti, ╵et il s’en rassasie.
  - type: text
    content: 'De ce bois il se chauffe et dit :'
  - type: text
    content: « Qu’il fait bon avoir chaud
  - type: text
    content: et voir la belle flamme ! »
  '17':
  - type: text
    content: Quant au reste du bois, ╵il en fait une idole, ╵il la prend pour son dieu,
  - type: text
    content: il se prosterne devant elle ╵et il l’adore.
  - type: text
    content: 'Il l’invoque et lui dit : ╵« Délivre-moi'
  - type: text
    content: car toi, tu es mon dieu ! »
  '18':
  - type: text
    content: Ils sont sans connaissance, ╵ils ne comprennent rien.
  - type: text
    content: On a bouché leurs yeux
  - type: text
    content: afin qu’ils ne voient pas,
  - type: text
    content: on a fermé leur cœur ╵afin qu’ils ne saisissent pas.
  '19':
  - type: text
    content: Aucun ne réfléchit,
  - type: text
    content: aucun n’a de savoir
  - type: text
    content: 'ni assez de raison ╵pour se dire en lui-même :'
  - type: text
    content: « J’ai brûlé la moitié ╵de mon bois dans le feu,
  - type: text
    content: j’ai aussi cuit du pain ╵sur les braises du bois,
  - type: text
    content: j’ai rôti de la viande ╵dont je me suis nourri,
  - type: text
    content: et de ce qui restait, ╵j’ai fait une abomination,
  - type: text
    content: je me suis prosterné ╵devant un bout de bois ! »
  '2':
  - type: text
    content: voici ce que déclare l’Eternel, ╵lui qui t’a fait,
  - type: text
    content: qui t’a formé ╵dès le sein de ta mère
  - type: text
    content: 'et qui est ton soutien :'
  - type: text
    content: Ne sois pas effrayé,
  - type: text
    content: Jacob, mon serviteur,
  - type: text
    content: toi, Yeshouroun
  - type: note
    content: 'Nom donné à Israël en Dt 32.15 ; 33.5, 26, signifiant : honnête, droit (par opposition à Jacob : trompeur).'
  - type: text
    content: ', ╵que j’ai choisi.'
  '20':
  - type: text
    content: Il se repaît de cendres,
  - type: text
    content: car son cœur abusé ╵l’a mené dans l’erreur,
  - type: text
    content: il ne sauvera pas sa vie
  - type: text
    content: 'et ne dira jamais :'
  - type: text
    content: « Ce que je tiens en main, ╵n’est-ce pas une tromperie ? »
  - type: heading
    content: L’Eternel rachète son peuple
  '21':
  - type: text
    content: Souviens-toi de cela, ╵ô peuple de Jacob !
  - type: text
    content: 'Souviens-toi, Israël : ╵tu es mon serviteur,'
  - type: text
    content: c’est moi qui t’ai formé, ╵tu es mon serviteur,
  - type: text
    content: ô Israël, ╵je ne t’oublierai pas
  - type: note
    content: 'Selon le texte hébreu traditionnel. Le principal manuscrit hébreu de Qumrân et certaines versions anciennes ont : tu ne me décevras pas.'
  - type: text
    content: .
  '22':
  - type: text
    content: J’ai effacé tes crimes ╵comme un épais nuage
  - type: text
    content: et tes péchés comme un brouillard.
  - type: text
    content: Reviens à moi,
  - type: text
    content: car je t’ai délivré.
  '23':
  - type: text
    content: Exulte d’allégresse, ô ciel,
  - type: text
    content: car l’Eternel ╵est entré en action.
  - type: text
    content: Poussez des cris de joie, ╵profondeurs de la terre !
  - type: text
    content: Criez de joie, montagnes,
  - type: text
    content: et vous aussi, forêts, ╵ainsi que tous vos arbres,
  - type: text
    content: car l’Eternel a délivré Jacob,
  - type: text
    content: il a manifesté sa gloire ╵en Israël.
  - type: heading
    content: Le retour de l’exil
  '24':
  - type: text
    content: Voici ce que déclare ╵l’Eternel, ton libérateur,
  - type: text
    content: 'celui qui t’a formé ╵dès le sein maternel :'
  - type: text
    content: Oui, c’est moi, l’Eternel, ╵qui ai fait toutes choses.
  - type: text
    content: Moi seul j’ai déployé le ciel,
  - type: text
    content: j’ai étendu la terre, ╵sans aucune aide.
  '25':
  - type: text
    content: Je rends vains les présages ╵des diseurs de mensonges,
  - type: text
    content: j’ôte la raison aux devins,
  - type: text
    content: je repousse les sages,
  - type: text
    content: je fais tourner leur science ╵en déraison
  - type: note
    content: Voir 1 Co 1.20.
  - type: text
    content: .
  '26':
  - type: text
    content: J’accomplis la parole ╵prononcée par mon serviteur
  - type: text
    content: et je fais réussir les plans ╵annoncés par mes messagers.
  - type: text
    content: 'C’est moi, moi qui ai dit ╵au sujet de Jérusalem :'
  - type: text
    content: « Qu’elle soit habitée ! »
  - type: text
    content: 'et concernant les villes de Juda :'
  - type: text
    content: « Qu’elles soient rebâties ! »
  - type: text
    content: Oui, j’en relèverai les ruines.
  '27':
  - type: text
    content: 'J’ordonne aux eaux profondes :'
  - type: text
    content: « Asséchez-vous,
  - type: text
    content: je vais tarir vos fleuves. »
  '28':
  - type: text
    content: Et je dis de Cyrus
  - type: note
    content: Le décret de Cyrus, en 538 av. J.-C., (Esd 1.2-4 ; 6.3-5) autorisant la reconstruction du Temple, donnera le signal de la reconstruction de Jérusalem.
  - type: text
    content: '  : ╵« C’est mon berger,'
  - type: text
    content: et il accomplira ╵tout ce que je désire. »
  - type: text
    content: 'Il dira de Jérusalem :'
  - type: text
    content: « Qu’elle soit rebâtie »,
  - type: text
    content: 'et il dira du Temple :'
  - type: text
    content: « Posez ses fondations ! »
  '3':
  - type: text
    content: Je répandrai des eaux ╵sur le sol altéré,
  - type: text
    content: j’en ferai ruisseler ╵sur une terre aride,
  - type: text
    content: oui, je répandrai mon Esprit ╵sur ta postérité
  - type: text
    content: et ma bénédiction ╵sur ta progéniture.
  '4':
  - type: text
    content: Ils germeront ╵au milieu de l’herbage
  - type: text
    content: comme les peupliers ╵près des cours d’eau.
  '5':
  - type: text
    content: 'Un tel confessera : ╵« Je suis à l’Eternel »,'
  - type: text
    content: tel autre se dira ╵un enfant de Jacob,
  - type: text
    content: 'un autre encore ╵écrira sur sa main : ╵« Je suis à l’Eternel »'
  - type: text
    content: et il se parera ╵de ce nom d’Israël.
  - type: heading
    content: Le Premier et le Dernier
  '6':
  - type: text
    content: Ainsi dit l’Eternel, ╵lui, le Roi d’Israël,
  - type: text
    content: le Seigneur des armées célestes,
  - type: text
    content: 'et qui l’a délivré :'
  - type: text
    content: Moi, je suis le premier ╵et je suis le dernier,
  - type: text
    content: et en dehors de moi, ╵il n’y a pas de dieu
  - type: note
    content: Voir 48.12 ; Ap 1.17 ; 22.13.
  - type: text
    content: .
  '7':
  - type: text
    content: Qui est semblable à moi ?
  - type: text
    content: Qu’il le déclare donc !
  - type: text
    content: Qu’il fasse donc savoir ╵et qu’il m’expose
  - type: text
    content: les événements du passé ╵depuis que j’ai fondé ╵il y a bien longtemps ce peuple.
  - type: text
    content: Qu’il annonce d’avance ╵ce qui doit arriver !
  '8':
  - type: text
    content: Ne vous effrayez pas ╵et n’ayez pas de crainte !
  - type: text
    content: Depuis longtemps déjà, ╵je vous ai informés, ╵je vous l’ai fait savoir.
  - type: text
    content: Vous êtes mes témoins.
  - type: text
    content: Existe-t-il un autre Dieu que moi ?
  - type: text
    content: Il n’y a pas d’autre Rocher !
  - type: text
    content: Je n’en connais aucun !
  - type: heading
    content: Comment on fabrique des dieux
  '9':
  - type: text
    content: Ceux qui fabriquent des idoles ╵ne sont tous que néant,
  - type: text
    content: et ces œuvres qui leur sont chères ╵ne sont d’aucun profit.
  - type: text
    content: Leurs témoins ne voient rien
  - type: text
    content: et ils ne savent rien ;
  - type: text
    content: ils connaîtront la honte.
