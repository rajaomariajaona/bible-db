document_id: ISA.44
type_code: fra
segments:
- type: usfm
  marker: s2
  children:
  - type: text
    text: Quand Dieu répandra son Esprit
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Et maintenant, écoute, ╵Jacob, mon serviteur,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Israël, toi que j’ai choisi,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: voici ce que déclare l’Eternel, ╵lui qui t’a fait,
- type: usfm
  marker: q1
  children:
  - type: text
    text: qui t’a formé ╵dès le sein de ta mère
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'et qui est ton soutien :'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ne sois pas effrayé,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Jacob, mon serviteur,
- type: usfm
  marker: q1
  children:
  - type: text
    text: toi, Yeshouroun
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '44.2 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Nom donné à Israël en Dt 32.15 ; 33.5, 26, signifiant : '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'honnête, droit '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '(par opposition à Jacob : '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: trompeur
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ).
    marker-yv: yv-n
  - type: text
    text: ', ╵que j’ai choisi.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Je répandrai des eaux ╵sur le sol altéré,
- type: usfm
  marker: q1
  children:
  - type: text
    text: j’en ferai ruisseler ╵sur une terre aride,
- type: usfm
  marker: q1
  children:
  - type: text
    text: oui, je répandrai mon Esprit ╵sur ta postérité
- type: usfm
  marker: q1
  children:
  - type: text
    text: et ma bénédiction ╵sur ta progéniture.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Ils germeront ╵au milieu de l’herbage
- type: usfm
  marker: q1
  children:
  - type: text
    text: comme les peupliers ╵près des cours d’eau.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Un tel confessera : ╵« Je suis à l’Eternel »,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: tel autre se dira ╵un enfant de Jacob,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'un autre encore ╵écrira sur sa main : ╵« Je suis à l’Eternel »'
- type: usfm
  marker: q1
  children:
  - type: text
    text: et il se parera ╵de ce nom d’Israël.
- type: usfm
  marker: s2
  children:
  - type: text
    text: Le Premier et le Dernier
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Ainsi dit l’Eternel, ╵lui, le Roi d’Israël,
- type: usfm
  marker: q1
  children:
  - type: text
    text: le Seigneur des armées célestes,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'et qui l’a délivré :'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Moi, je suis le premier ╵et je suis le dernier,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et en dehors de moi, ╵il n’y a pas de dieu
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '44.6 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Voir 48.12 ; Ap 1.17 ; 22.13.
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Qui est semblable à moi ?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Qu’il le déclare donc !
- type: usfm
  marker: q1
  children:
  - type: text
    text: Qu’il fasse donc savoir ╵et qu’il m’expose
- type: usfm
  marker: q1
  children:
  - type: text
    text: les événements du passé ╵depuis que j’ai fondé ╵il y a bien longtemps ce peuple.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Qu’il annonce d’avance ╵ce qui doit arriver !
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Ne vous effrayez pas ╵et n’ayez pas de crainte !
- type: usfm
  marker: q1
  children:
  - type: text
    text: Depuis longtemps déjà, ╵je vous ai informés, ╵je vous l’ai fait savoir.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Vous êtes mes témoins.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Existe-t-il un autre Dieu que moi ?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Il n’y a pas d’autre Rocher !
- type: usfm
  marker: q1
  children:
  - type: text
    text: Je n’en connais aucun !
- type: usfm
  marker: s2
  children:
  - type: text
    text: Comment on fabrique des dieux
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Ceux qui fabriquent des idoles ╵ne sont tous que néant,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et ces œuvres qui leur sont chères ╵ne sont d’aucun profit.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Leurs témoins ne voient rien
- type: usfm
  marker: q1
  children:
  - type: text
    text: et ils ne savent rien ;
- type: usfm
  marker: q1
  children:
  - type: text
    text: ils connaîtront la honte.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: A quoi bon faire un dieu,
- type: usfm
  marker: q1
  children:
  - type: text
    text: couler une statue,
- type: usfm
  marker: q1
  children:
  - type: text
    text: qui ne procure aucun profit ?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Voici : tous leurs fidèles ╵seront couverts de honte,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: car ceux qui les ont fabriqués ╵ne sont que des humains !
- type: usfm
  marker: q1
  children:
  - type: text
    text: Qu’ils se rassemblent tous
- type: usfm
  marker: q1
  children:
  - type: text
    text: et qu’ils se tiennent là !
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ils seront effrayés ╵et confus tous ensemble.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: L’artisan ferronnier ╵appointe son burin,
- type: usfm
  marker: q1
  children:
  - type: text
    text: le passe dans les braises
- type: usfm
  marker: q1
  children:
  - type: text
    text: et, à coups de marteau, ╵façonne son idole,
- type: usfm
  marker: q1
  children:
  - type: text
    text: avec la force de son bras.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Mais, sitôt qu’il a faim,
- type: usfm
  marker: q1
  children:
  - type: text
    text: il n’a plus d’énergie,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et s’il ne boit pas d’eau,
- type: usfm
  marker: q1
  children:
  - type: text
    text: le voilà qui faiblit
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '44.12 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Dans le v. 12, Esaïe décrit la fabrication d’une idole en métal ; dans les v. 13-20, d’une idole en bois, plus répandue (voir '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '40.20'
        metadata:
          usfm: ISA.40.20
      - type: text
        text: ) que la première.
    marker-yv: yv-n
  - type: text
    text: '  !'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Et voici le sculpteur : ╵il a tendu sa corde,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: trace l’œuvre à la craie
- type: usfm
  marker: q1
  children:
  - type: text
    text: puis, avec le ciseau, ╵il l’exécute,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et il la dessine au compas.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Il la façonne ainsi ╵d’après la forme humaine,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et à la ressemblance ╵d’un homme magnifique
- type: usfm
  marker: q1
  children:
  - type: text
    text: pour qu’elle habite un sanctuaire.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Il a coupé des cèdres,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ou bien il s’est choisi ╵du cyprès ou du chêne
- type: usfm
  marker: q1
  children:
  - type: text
    text: qu’il a laissé ╵devenir bien robuste
- type: usfm
  marker: q1
  children:
  - type: text
    text: parmi les arbres des forêts,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ou bien il prend un pin ╵qu’il a planté lui-même,
- type: usfm
  marker: q1
  children:
  - type: text
    text: que la pluie a fait croître.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Or, l’homme se sert de ces bois ╵pour les brûler,
- type: usfm
  marker: q1
  children:
  - type: text
    text: il en prend une part ╵pour se chauffer,
- type: usfm
  marker: q1
  children:
  - type: text
    text: il allume le feu ╵pour y cuire son pain.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Avec le même bois, ╵il fait un dieu,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et il l’adore ;
- type: usfm
  marker: q1
  children:
  - type: text
    text: il fabrique une idole
- type: usfm
  marker: q1
  children:
  - type: text
    text: et se prosterne devant elle.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: La moitié de ce bois, ╵il l’a livrée au feu ;
- type: usfm
  marker: q1
  children:
  - type: text
    text: grâce à cette moitié, ╵il mange de la viande,
- type: usfm
  marker: q1
  children:
  - type: text
    text: il fait cuire un rôti, ╵et il s’en rassasie.
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'De ce bois il se chauffe et dit :'
- type: usfm
  marker: q1
  children:
  - type: text
    text: « Qu’il fait bon avoir chaud
- type: usfm
  marker: q1
  children:
  - type: text
    text: et voir la belle flamme ! »
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Quant au reste du bois, ╵il en fait une idole, ╵il la prend pour son dieu,
- type: usfm
  marker: q1
  children:
  - type: text
    text: il se prosterne devant elle ╵et il l’adore.
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Il l’invoque et lui dit : ╵« Délivre-moi'
- type: usfm
  marker: q1
  children:
  - type: text
    text: car toi, tu es mon dieu ! »
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Ils sont sans connaissance, ╵ils ne comprennent rien.
- type: usfm
  marker: q1
  children:
  - type: text
    text: On a bouché leurs yeux
- type: usfm
  marker: q1
  children:
  - type: text
    text: afin qu’ils ne voient pas,
- type: usfm
  marker: q1
  children:
  - type: text
    text: on a fermé leur cœur ╵afin qu’ils ne saisissent pas.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Aucun ne réfléchit,
- type: usfm
  marker: q1
  children:
  - type: text
    text: aucun n’a de savoir
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'ni assez de raison ╵pour se dire en lui-même :'
- type: usfm
  marker: q1
  children:
  - type: text
    text: « J’ai brûlé la moitié ╵de mon bois dans le feu,
- type: usfm
  marker: q1
  children:
  - type: text
    text: j’ai aussi cuit du pain ╵sur les braises du bois,
- type: usfm
  marker: q1
  children:
  - type: text
    text: j’ai rôti de la viande ╵dont je me suis nourri,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et de ce qui restait, ╵j’ai fait une abomination,
- type: usfm
  marker: q1
  children:
  - type: text
    text: je me suis prosterné ╵devant un bout de bois ! »
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Il se repaît de cendres,
- type: usfm
  marker: q1
  children:
  - type: text
    text: car son cœur abusé ╵l’a mené dans l’erreur,
- type: usfm
  marker: q1
  children:
  - type: text
    text: il ne sauvera pas sa vie
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'et ne dira jamais :'
- type: usfm
  marker: q1
  children:
  - type: text
    text: « Ce que je tiens en main, ╵n’est-ce pas une tromperie ? »
- type: usfm
  marker: s2
  children:
  - type: text
    text: L’Eternel rachète son peuple
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Souviens-toi de cela, ╵ô peuple de Jacob !
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Souviens-toi, Israël : ╵tu es mon serviteur,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: c’est moi qui t’ai formé, ╵tu es mon serviteur,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ô Israël, ╵je ne t’oublierai pas
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '44.21 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Selon le texte hébreu traditionnel. Le principal manuscrit hébreu de Qumrân et certaines versions anciennes ont : '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: tu ne me décevras pas.
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: J’ai effacé tes crimes ╵comme un épais nuage
- type: usfm
  marker: q1
  children:
  - type: text
    text: et tes péchés comme un brouillard.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Reviens à moi,
- type: usfm
  marker: q1
  children:
  - type: text
    text: car je t’ai délivré.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: Exulte d’allégresse, ô ciel,
- type: usfm
  marker: q1
  children:
  - type: text
    text: car l’Eternel ╵est entré en action.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Poussez des cris de joie, ╵profondeurs de la terre !
- type: usfm
  marker: q1
  children:
  - type: text
    text: Criez de joie, montagnes,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et vous aussi, forêts, ╵ainsi que tous vos arbres,
- type: usfm
  marker: q1
  children:
  - type: text
    text: car l’Eternel a délivré Jacob,
- type: usfm
  marker: q1
  children:
  - type: text
    text: il a manifesté sa gloire ╵en Israël.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Le retour de l’exil
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: Voici ce que déclare ╵l’Eternel, ton libérateur,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'celui qui t’a formé ╵dès le sein maternel :'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Oui, c’est moi, l’Eternel, ╵qui ai fait toutes choses.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Moi seul j’ai déployé le ciel,
- type: usfm
  marker: q1
  children:
  - type: text
    text: j’ai étendu la terre, ╵sans aucune aide.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: Je rends vains les présages ╵des diseurs de mensonges,
- type: usfm
  marker: q1
  children:
  - type: text
    text: j’ôte la raison aux devins,
- type: usfm
  marker: q1
  children:
  - type: text
    text: je repousse les sages,
- type: usfm
  marker: q1
  children:
  - type: text
    text: je fais tourner leur science ╵en déraison
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '44.25 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Voir '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1 Co 1.20
        metadata:
          usfm: 1CO.1.20
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: J’accomplis la parole ╵prononcée par mon serviteur
- type: usfm
  marker: q1
