document_id: DAN.8,21
type_code: fra
verses:
  '1':
  - type: heading
    content: Le bélier et le bouc
  - type: heading
    content: Vision du bélier et du bouc
  - type: text
    content: La troisième année du règne du roi Balthazar
  - type: note
    content: A partir de ce verset, le texte est de nouveau en hébreu. Pour Balthazar, voir notes 5.1 et 7.1. Cette nouvelle vision précise l’identité des deuxième et troisième royaumes des visions des chapitres 2 et 7.
  - type: text
    content: ', moi, Daniel, j’eus une nouvelle vision après celle que j’avais eue précédemment. '
  '10':
  - type: text
    content: Elle grandit jusqu’à s’attaquer à l’armée céleste ; elle fit tomber à terre une partie de cette armée et une partie des étoiles, et elle les piétina
  - type: note
    content: Voir Ap 12.4.
  - type: text
    content: '. '
  '11':
  - type: text
    content: 'Elle s’exalta au point de défier le Prince de l’armée céleste, elle mit fin au sacrifice perpétuel et bouleversa son sanctuaire jusqu’en ses fondations. '
  '12':
  - type: text
    content: A cause de la révolte du peuple contre Dieu
  - type: note
    content: 'A cause… contre Dieu. Autre traduction : par perversité ou à cause d’une injustice. Ce problème de traduction se pose aussi aux v. 13 et 23.'
  - type: text
    content: ', l’armée fut livrée au pouvoir de la corne et le sacrifice perpétuel lui fut abandonné. La corne jeta la vérité par terre et réussit dans tout ce qu’elle entreprit'
  - type: note
    content: Les v. 11 et 12, difficiles en hébreu, ont donné lieu à des interprétations diverses.
  - type: text
    content: .
  '13':
  - type: text
    content: 'J’entendis alors l’un des saints anges parler. Puis un autre saint ange lui demanda : Jusques à quand dureront les événements annoncés par cette vision ? Jusqu’à quand le sacrifice perpétuel sera-t-il supprimé, et la révolte qui cause la dévastation sévira-t-elle ? Pendant combien de temps le sanctuaire et l’armée seront-ils livrés au pouvoir de la corne et foulés aux pieds ?'
  '14':
  - type: text
    content: 'L’autre ange me dit : Pendant 1 150 soirs et 1 150 matins, puis le sanctuaire sera de nouveau consacré au culte.'
  - type: heading
    content: L’ange Gabriel explique la vision
  '15':
  - type: text
    content: 'Pendant que moi, Daniel, je contemplais cette vision et que je cherchais à la comprendre, je vis debout, devant moi, un être ayant l’aspect d’un homme. '
  '16':
  - type: text
    content: 'Et j’entendis une voix d’homme venant de l’Oulaï, qui appelait et disait : Gabriel'
  - type: note
    content: Sur Gabriel, voir 9.21 ; Lc 1.19, 26.
  - type: text
    content: ', explique-lui la vision.'
  '17':
  - type: text
    content: 'Celui-ci s’avança vers l’endroit où je me tenais. A son approche, je fus pris de frayeur et je tombai face contre terre. Il me dit : Fils d’homme, comprends bien que cette vision concerne le temps de la fin.'
  '18':
  - type: text
    content: 'Pendant qu’il me parlait, je perdis connaissance et tombai face contre terre ; mais il me toucha et me fit tenir debout sur place. '
  '19':
  - type: text
    content: 'Puis il me dit : Je vais te révéler ce qui arrivera à la fin du temps de la colère divine, car un terme lui a été assigné.'
  '2':
  - type: text
    content: Je regardais et je me voyais dans la cité fortifiée de Suse, dans la province d’Elam et, dans ma vision, je me tenais près du fleuve Oulaï
  - type: note
    content: 'Suse: capitale de la province babylonienne d’Elam, située sur le golfe Persique. Le fleuve Oulaï: selon certains, une rivière intermédiaire entre les deux fleuves qui passaient près de la ville, d’où la traduction canal Oulaï.'
  - type: text
    content: .
  '20':
  - type: text
    content: 'Le bélier à deux cornes que tu as vu, représente les rois de Médie et de Perse. '
  '21':
  - type: text
    content: 'Le bouc velu, c’est le roi de Grèce, et la grande corne entre ses yeux représente le premier roi de cet empire. '
  '22':
  - type: text
    content: 'Puis elle s’est brisée et quatre cornes ont poussé à sa place : celles-ci représentent quatre royaumes issus de cette nation, qui, cependant, n’auront pas la même puissance.'
  '23':
  - type: text
    content: A la fin de leur règne, quand les méchants auront mis le comble à leur révolte contre Dieu, s’élèvera un roi dur et expert en intrigues
  - type: note
    content: Durant les dernières années de son règne (168 à 164 av. J.-C.), Antiochus IV Epiphane cherchera à détruire la foi juive. Il fera cesser le sacrifice quotidien et, en 169, pénétrera pour la première fois dans le Temple où il fera introduire sa statue.
  - type: text
    content: '. '
  '24':
  - type: text
    content: 'Sa puissance ira en croissant, mais non par sa propre force. Il causera d’incroyables ravages et réussira dans ce qu’il entreprendra ; il exterminera de puissants adversaires et décimera les membres du peuple saint. '
  '25':
  - type: text
    content: Grâce à son habileté, il réussira à tromper beaucoup de gens, l’orgueil remplira son cœur, il fera périr bien des hommes qui vivaient en paix ; il s’insurgera même contre le Prince des princes, mais il sera brisé sans aucune intervention humaine
  - type: note
    content: Antiochus périra en 164 av. J.-C. de maladie ou frappé de folie.
  - type: text
    content: '. '
  '26':
  - type: text
    content: Ce qui t’a été annoncé dans la vision des soirs et des matins est parfaitement vrai, mais tiens-en le sens caché, car elle concerne une époque très lointaine.
  '27':
  - type: text
    content: Là-dessus, moi, Daniel, je fus complètement épuisé et malade pendant plusieurs jours. Après cela, je me relevai et je retournai m’occuper des affaires du roi. Je demeurais frappé de stupeur par cette vision que je ne parvenais pas à comprendre.
  '3':
  - type: text
    content: Je levai les yeux et je vis un bélier qui se tenait devant le fleuve. Il avait deux très hautes cornes
  - type: note
    content: Les deux cornes symbolisent les Mèdes et les Perses (v. 20). C’est Cyrus qui, en 549 av. J.-C., a assuré la prééminence des Perses sur les Mèdes.
  - type: text
    content: '  ; l’une d’elles, celle qui avait poussé la dernière, était plus grande que l’autre. '
  '4':
  - type: text
    content: Puis je vis le bélier frapper en direction de l’ouest, du nord et du sud, et aucune bête ne pouvait lui résister et personne ne pouvait délivrer de son pouvoir. Il agissait à sa guise et il grandissait.
  '5':
  - type: text
    content: Tandis que je réfléchissais, je vis un bouc
  - type: note
    content: Le bouc représente le royaume grec d’Alexandre le Grand, la corne proéminente (v. 21).
  - type: text
    content: ' arriver de l’occident ; il parcourait toute l’étendue de la terre, sans toucher le sol. Il avait une corne proéminente entre les yeux. '
  '6':
  - type: text
    content: 'Il parvint jusqu’au bélier à deux cornes que j’avais vu devant le fleuve, et se précipita sur lui avec violence. '
  '7':
  - type: text
    content: 'Je le vis arriver à sa hauteur, et s’enrager contre lui. Il le frappa et brisa ses deux cornes ; le bélier n’eut pas la force de lui résister : le bouc le jeta à terre et le piétina. Personne ne vint délivrer le bélier du bouc.'
  '8':
  - type: text
    content: Le bouc devint très grand, mais lorsqu’il était encore en pleine vigueur, sa grande corne fut soudain brisée. Quatre cornes proéminentes poussèrent à sa place vers les quatre coins de l’horizon
  - type: note
    content: Annonce de la mort subite d’Alexandre le Grand à 33 ans, en 323 av. J.-C., et du partage du royaume entre ses quatre généraux (v. 22 ; voir 7.6).
  - type: text
    content: '. '
  '9':
  - type: text
    content: De l’une d’elles sortit une très petite corne qui grandit démesurément vers le sud, vers l’est et vers le Pays magnifique
  - type: note
    content: 'La petite corne: Antiochus Epiphane qui a régné de 175 à 164 av. J.-C. (v. 23-25 et note v. 23). le Pays magnifique: le pays d’Israël (voir 11.16, 41).'
  - type: text
    content: '. '
