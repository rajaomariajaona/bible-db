document_id: 1CH.17
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Les deux maisons
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: (2 S 7.1-17)
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Lorsque David se fut installé dans son palais, il dit au prophète Nathan : Qu’en penses-tu ? J’habite dans un palais de cèdre, alors que le coffre de l’alliance de l’Eternel est logé sous une tente de toile.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Nathan lui répondit : Réalise les projets qui te tiennent à cœur, car Dieu est avec toi.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Cependant, la nuit suivante, Dieu adressa la parole à Nathan en ces termes : '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Va dire à mon serviteur David : « Voici ce que déclare l’Eternel : Ce n’est pas toi qui me bâtiras un temple pour que j’y habite. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Je n’ai jamais résidé dans un temple depuis le jour où j’ai fait sortir d’Egypte Israël, mon peuple, jusqu’à ce jour-ci. Au contraire, j’étais dans le tabernacle, allant d’un emplacement à un autre. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Pendant tout ce temps où j’ai accompagné tout Israël, ai-je jamais dit à un seul des chefs d’Israël que j’avais établis pour diriger mon peuple : “Pourquoi ne me bâtissez-vous pas un temple en bois de cèdre ?” »'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Voici maintenant ce que tu diras à mon serviteur David : « Ainsi parle l’Eternel, le Seigneur des armées célestes : Je suis allé te chercher dans les pâturages où tu gardais les moutons pour faire de toi le chef de mon peuple Israël'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '17.7 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Voir '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1 S 16.11
        metadata:
          usfm: 1SA.16.11
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Je t’ai soutenu dans toutes tes entreprises et je t’ai débarrassé de tous tes ennemis. Je te ferai un nom glorieux comme celui des grands de la terre. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'J’attribuerai un territoire à mon peuple Israël où je l’implanterai pour qu’il puisse habiter chez lui et qu’il ne soit plus inquiété et maltraité comme auparavant par des hommes méchants, '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: comme à l’époque où j’avais établi des chefs pour mon peuple Israël. Je soumettrai tous tes ennemis. Enfin, je t’annonce que je te bâtirai une dynastie
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '17.10 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'En hébreu, c’est le même terme qui signifie généralement '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'maison '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'et qui est rendu ici tantôt par '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'temple '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '(v. 4, 5, 6), tantôt par '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'dynastie. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Il y a là un jeu de mots sur ce terme : ce n’est pas David qui bâtira une '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'maison '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'à l’Eternel, mais l’Eternel qui bâtira une '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'maison '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: à David.
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Quand le moment sera venu pour toi d’aller rejoindre tes ancêtres, j’établirai après toi l’un de tes descendants, l’un de tes fils, pour te succéder comme roi, et j’affermirai son autorité royale
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '17.11 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Voir '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1 Ch 22.9
        metadata:
          usfm: 1CH.22.9
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: C’est lui qui me construira un temple
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '17.12 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Voir 2 Ch 2 à 4.
    marker-yv: yv-n
  - type: text
    text: ' et je maintiendrai toujours son trône. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Je serai pour lui un père, et il sera pour moi un fils
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '17.13 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Cité en 2 Co 6.18 ; Hé 1.5.
    marker-yv: yv-n
  - type: text
    text: '  ; je ne lui retirerai jamais ma faveur, comme je l’ai retirée à celui qui t’a précédé. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Je le maintiendrai pour toujours dans ma maison et dans mon royaume, et son trône sera inébranlable à perpétuité. »
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Nathan rapporta fidèlement à David toutes ces paroles et toute cette révélation.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Prière de reconnaissance de David
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: (2 S 7.18-29)
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Alors le roi David alla se placer devant l’Eternel et lui adressa cette prière : Eternel Dieu, qui suis-je et qu’est donc ma famille, pour que tu m’aies fait parvenir où je suis ? '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Et comme si ce n’était pas suffisant à tes yeux, ô Dieu, voilà que tu fais à ton serviteur des promesses pour l’avenir lointain de sa dynastie. Eternel Dieu, toi tu me traites comme si j’étais un homme de haut rang. '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Que pourrais-je encore ajouter au sujet de la gloire que tu accordes à ton serviteur ? Tu connais toi-même ton serviteur, '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Eternel. C’est parce que tu aimes ton serviteur et que tu en as décidé ainsi, que tu as accompli ces grandes choses pour révéler ta grandeur. '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Eternel ! Il n’y a personne comme toi, il n’existe pas d’autre Dieu que toi ! C’est vraiment comme tout ce que nous avons entendu dire. '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Y a-t-il un seul peuple sur terre qui soit comme Israël ton peuple, que Dieu soit allé libérer pour en faire son peuple ? Ainsi tu t’es rendu célèbre en accomplissant des choses grandes et redoutables pour chasser des peuples étrangers devant ton peuple que tu as libéré de l’Egypte. '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: Tu as fait de ton peuple Israël ton peuple pour toujours ; et toi, Eternel, tu es devenu son Dieu.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Maintenant donc, ô Eternel, que soit toujours vraie la promesse que tu as faite à ton serviteur et à sa dynastie ! Oui, veuille l’accomplir ! '
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Et que cette promesse se confirme. Ainsi tu seras éternellement exalté et l’on proclamera que l’Eternel, le Seigneur des armées célestes, le Dieu d’Israël, est vraiment Dieu pour Israël ! Et que la dynastie de ton serviteur David demeure stable devant toi ! '
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: En effet, ô mon Dieu, tu as révélé à ton serviteur que tu lui bâtirais une dynastie. C’est pourquoi ton serviteur a osé prier devant toi.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Maintenant, ô Eternel, c’est toi qui es Dieu, et tu as promis ce bonheur au sujet de ton serviteur. '
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: Et à présent, tu as bien voulu bénir ma dynastie pour qu’elle subsiste à jamais devant toi ! Car ce que tu bénis, Eternel, est béni à jamais.
