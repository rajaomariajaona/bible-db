document_id: LUK.16,21
type_code: fra
verses:
  '1':
  - type: heading
    content: Dieu et l’argent
  - type: text
    content: 'Jésus dit encore à ses disciples : '
  - type: text
    content: Un grand propriétaire avait un gérant. On vint lui dénoncer sa conduite car il gaspillait ses biens.
  - type: text
    content: ' '
  '10':
  - type: text
    content: Si quelqu’un est fidèle dans les petites choses, on peut aussi lui faire confiance pour ce qui est important. Mais celui qui n’est pas fidèle dans les petites choses ne l’est pas non plus pour ce qui est important.
  - type: text
    content: ' '
  '11':
  - type: text
    content: Si donc vous n’avez pas été fidèles dans la gestion des richesses injustes, qui vous confiera les véritables ?
  - type: text
    content: ' '
  '12':
  - type: text
    content: Si vous n’avez pas été fidèles dans la gestion du bien d’autrui, qui vous donnera celui qui vous est personnellement destiné ?
  - type: heading
    content: (Mt 6.24)
  '13':
  - type: text
    content: ' '
  - type: text
    content: Aucun serviteur ne peut être en même temps au service de deux maîtres. En effet, ou bien il détestera l’un et aimera l’autre ; ou bien il sera dévoué au premier et méprisera le second. Vous ne pouvez pas servir en même temps Dieu et l’Argent.
  '14':
  - type: text
    content: En entendant toutes ces recommandations, les pharisiens, qui étaient très attachés à l’argent, se moquaient de Jésus.
  '15':
  - type: text
    content: 'Mais il leur dit : '
  - type: text
    content: Vous, vous vous faites passer vous-mêmes pour justes aux yeux de tout le monde, mais Dieu connaît le fond de votre cœur. Ce qui est en haute estime parmi les hommes, Dieu l’a en horreur.
  - type: heading
    content: La Loi et le royaume
  - type: heading
    content: (Mt 11.12-13)
  '16':
  - type: text
    content: ' '
  - type: text
    content: 'L’époque de la '
  - type: text
    content: Loi
  - type: text
    content: ' et des '
  - type: text
    content: prophètes
  - type: text
    content: ' va jusqu’à Jean-Baptiste ; depuis qu’il est venu, le '
  - type: text
    content: royaume de Dieu
  - type: text
    content: ' est annoncé, et chacun use de violence pour y entrer.'
  - type: heading
    content: (Mt 5.18)
  '17':
  - type: text
    content: ' '
  - type: text
    content: Il serait plus facile au ciel et à la terre de disparaître qu’à un trait de lettre de la Loi.
  - type: heading
    content: (Mt 5.32)
  '18':
  - type: text
    content: ' '
  - type: text
    content: Celui qui divorce d’avec sa femme et se remarie commet un adultère, et celui qui épouse une femme divorcée d’avec son mari commet un adultère.
  - type: heading
    content: L’homme riche et le pauvre Lazare
  '19':
  - type: text
    content: ' '
  - type: text
    content: Il y avait un homme riche, toujours vêtu d’habits coûteux et raffinés
  - type: text
    content: ' '
  - type: note
    content: 'Littéralement : vêtu de pourpre et de fin lin.'
  - type: text
    content: . Sa vie n’était chaque jour que festins et plaisirs.
  - type: text
    content: ' '
  '2':
  - type: text
    content: 'Le maître le fit appeler et lui dit : « Qu’est-ce que j’apprends à ton sujet ? Remets-moi les comptes de ta gestion, car tu ne continueras pas à gérer mes affaires. »'
  '20':
  - type: text
    content: Un pauvre, nommé Lazare, se tenait couché devant le portail de sa villa, le corps couvert de plaies purulentes.
  - type: text
    content: ' '
  '21':
  - type: text
    content: Il aurait bien voulu calmer sa faim avec les miettes qui tombaient de la table du riche. Les chiens mêmes venaient lécher ses plaies.
  '22':
  - type: text
    content: ' '
  - type: text
    content: 'Le pauvre mourut, et les '
  - type: text
    content: anges
  - type: text
    content: ' l’emportèrent auprès d’'
  - type: text
    content: Abraham
  - type: text
    content: . Le riche mourut à son tour, et on l’enterra.
  - type: text
    content: ' '
  '23':
  - type: text
    content: Du séjour des morts, où il souffrait cruellement, il leva les yeux et aperçut, très loin, Abraham, et Lazare à côté de lui.
  '24':
  - type: text
    content: ' '
  - type: text
    content: 'Alors il s’écria : « Abraham, mon père, aie pitié de moi ! Envoie donc Lazare, qu’il trempe le bout de son doigt dans l’eau et me rafraîchisse la langue, car je souffre horriblement dans ces flammes. »'
  '25':
  - type: text
    content: ' '
  - type: text
    content: 'Mais Abraham lui répondit : « Mon fils, souviens-toi de combien de bonnes choses tu as joui pendant ta vie, tandis que Lazare n’a connu que des malheurs. A présent, ici, c’est lui qui est consolé, tandis que toi, tu es dans les tourments.'
  - type: text
    content: ' '
  '26':
  - type: text
    content: De plus, il y a maintenant un immense abîme entre nous et vous et, même si on le voulait, on ne pourrait ni le franchir pour aller d’ici vers vous, ni le traverser pour venir de chez vous ici.
  '27':
  - type: text
    content: ' '
  - type: text
    content: – Dans ce cas, dit alors le riche, je t’en conjure, père, envoie au moins Lazare dans la maison de mon père,
  - type: text
    content: ' '
  '28':
  - type: text
    content: car j’ai cinq frères ; qu’il les avertisse pour qu’ils n’aboutissent pas, eux aussi, dans ce lieu de tourments.
  '29':
  - type: text
    content: ' '
  - type: text
    content: '– Tes frères ont les écrits de '
  - type: text
    content: Moïse
  - type: text
    content: ' et des '
  - type: text
    content: prophètes
  - type: text
    content: ', lui répondit Abraham ; qu’ils les écoutent !'
  '3':
  - type: text
    content: ' '
  - type: text
    content: 'Le gérant se dit : « Que vais-je faire, puisque mon maître m’enlève la gestion de ses biens ? Travailler comme ouvrier agricole ? Je n’en ai pas la force. Me mettre à mendier ? J’en aurais honte.'
  - type: text
    content: ' '
  '30':
  - type: text
    content: ' '
  - type: text
    content: '– Non, père Abraham, reprit l’autre. Mais si quelqu’un revient du séjour des morts et va les trouver, ils '
  - type: text
    content: changeront
  - type: text
    content: . »
  '31':
  - type: text
    content: ' '
  - type: text
    content: 'Mais Abraham répliqua : « S’ils n’écoutent ni Moïse ni les prophètes, ils ne se laisseront pas davantage convaincre par un mort revenant à la vie ! »'
  '4':
  - type: text
    content: Ah ! je sais ce que je vais faire pour que des gens me reçoivent chez eux lorsque j’aurai perdu ma place. »
  '5':
  - type: text
    content: ' '
  - type: text
    content: 'Là-dessus, il fait venir un à un tous les débiteurs de son maître. Il dit au premier : « Combien dois-tu à mon maître ?'
  '6':
  - type: text
    content: ' '
  - type: text
    content: – Quarante hectolitres d’huile d’olive, lui répond celui-ci.
  - type: text
    content: – Voici ta reconnaissance de dette, lui dit le gérant, assieds-toi là, dépêche-toi et inscris vingt hectolitres. »
  '7':
  - type: text
    content: ' '
  - type: text
    content: 'Ensuite il dit à un autre : « Et toi, combien dois-tu ?'
  - type: text
    content: – Cinq cents sacs de blé.
  - type: text
    content: – Prends ta reconnaissance de dette, reprend le gérant, et inscris-en quatre cents. »
  '8':
  - type: text
    content: ' '
  - type: text
    content: Le maître admira l’habileté avec laquelle ce gérant malhonnête s’y était pris
  - type: text
    content: ' '
  - type: note
    content: 'Autre traduction : donna son « vu et approuvé » au filou d’intendant car le malin s’y était bien pris.'
  - type: text
    content: . En effet, ceux qui vivent pour ce monde sont plus avisés dans leurs affaires avec leurs semblables que les enfants de la lumière.
  '9':
  - type: text
    content: ' '
  - type: text
    content: 'Et moi je vous déclare : Si vous avez de ces richesses entachées d’injustice, utilisez-les pour vous faire des amis. Ainsi, le jour où elles vous échapperont, ils vous accueilleront dans les demeures éternelles.'
  - type: text
    content: ' '
