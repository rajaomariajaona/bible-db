document_id: LUK.16,21
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Dieu et l’argent
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Jésus dit encore à ses disciples : '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Un grand propriétaire avait un gérant. On vint lui dénoncer sa conduite car il gaspillait ses biens.
    - type: text
      text: ' '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Si quelqu’un est fidèle dans les petites choses, on peut aussi lui faire confiance pour ce qui est important. Mais celui qui n’est pas fidèle dans les petites choses ne l’est pas non plus pour ce qui est important.
    - type: text
      text: ' '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Si donc vous n’avez pas été fidèles dans la gestion des richesses injustes, qui vous confiera les véritables ?
    - type: text
      text: ' '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Si vous n’avez pas été fidèles dans la gestion du bien d’autrui, qui vous donnera celui qui vous est personnellement destiné ?
  - type: usfm
    marker: r
    children:
    - type: text
      text: (Mt 6.24)
    marker-yv: yv-h
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Aucun serviteur ne peut être en même temps au service de deux maîtres. En effet, ou bien il détestera l’un et aimera l’autre ; ou bien il sera dévoué au premier et méprisera le second. Vous ne pouvez pas servir en même temps Dieu et l’Argent.
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: En entendant toutes ces recommandations, les pharisiens, qui étaient très attachés à l’argent, se moquaient de Jésus.
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Mais il leur dit : '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Vous, vous vous faites passer vous-mêmes pour justes aux yeux de tout le monde, mais Dieu connaît le fond de votre cœur. Ce qui est en haute estime parmi les hommes, Dieu l’a en horreur.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: La Loi et le royaume
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: (Mt 11.12-13)
    marker-yv: yv-h
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'L’époque de la '
      - type: usfm
        marker: w
        children:
        - type: text
          text: Loi
      - type: text
        text: ' et des '
      - type: usfm
        marker: w
        children:
        - type: text
          text: prophètes
      - type: text
        text: ' va jusqu’à Jean-Baptiste ; depuis qu’il est venu, le '
      - type: usfm
        marker: w
        children:
        - type: text
          text: royaume de Dieu
      - type: text
        text: ' est annoncé, et chacun use de violence pour y entrer.'
  - type: usfm
    marker: r
    children:
    - type: text
      text: (Mt 5.18)
    marker-yv: yv-h
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Il serait plus facile au ciel et à la terre de disparaître qu’à un trait de lettre de la Loi.
  - type: usfm
    marker: r
    children:
    - type: text
      text: (Mt 5.32)
    marker-yv: yv-h
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Celui qui divorce d’avec sa femme et se remarie commet un adultère, et celui qui épouse une femme divorcée d’avec son mari commet un adultère.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: L’homme riche et le pauvre Lazare
    marker-yv: yv-h
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Il y avait un homme riche, toujours vêtu d’habits coûteux et raffinés
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '16.19 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Littéralement : '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: vêtu de pourpre et de fin lin.
      marker-yv: yv-n
    - type: usfm
      marker: wj
      children:
      - type: text
        text: . Sa vie n’était chaque jour que festins et plaisirs.
    - type: text
      text: ' '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'Le maître le fit appeler et lui dit : « Qu’est-ce que j’apprends à ton sujet ? Remets-moi les comptes de ta gestion, car tu ne continueras pas à gérer mes affaires. »'
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Un pauvre, nommé Lazare, se tenait couché devant le portail de sa villa, le corps couvert de plaies purulentes.
    - type: text
      text: ' '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Il aurait bien voulu calmer sa faim avec les miettes qui tombaient de la table du riche. Les chiens mêmes venaient lécher ses plaies.
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'Le pauvre mourut, et les '
      - type: usfm
        marker: w
        children:
        - type: text
          text: anges
      - type: text
        text: ' l’emportèrent auprès d’'
      - type: usfm
        marker: w
        children:
        - type: text
          text: Abraham
      - type: text
        text: . Le riche mourut à son tour, et on l’enterra.
    - type: text
      text: ' '
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Du séjour des morts, où il souffrait cruellement, il leva les yeux et aperçut, très loin, Abraham, et Lazare à côté de lui.
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'Alors il s’écria : « Abraham, mon père, aie pitié de moi ! Envoie donc Lazare, qu’il trempe le bout de son doigt dans l’eau et me rafraîchisse la langue, car je souffre horriblement dans ces flammes. »'
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'Mais Abraham lui répondit : « Mon fils, souviens-toi de combien de bonnes choses tu as joui pendant ta vie, tandis que Lazare n’a connu que des malheurs. A présent, ici, c’est lui qui est consolé, tandis que toi, tu es dans les tourments.'
    - type: text
      text: ' '
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: De plus, il y a maintenant un immense abîme entre nous et vous et, même si on le voulait, on ne pourrait ni le franchir pour aller d’ici vers vous, ni le traverser pour venir de chez vous ici.
  '27':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: – Dans ce cas, dit alors le riche, je t’en conjure, père, envoie au moins Lazare dans la maison de mon père,
    - type: text
      text: ' '
  '28':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: car j’ai cinq frères ; qu’il les avertisse pour qu’ils n’aboutissent pas, eux aussi, dans ce lieu de tourments.
  '29':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: '– Tes frères ont les écrits de '
      - type: usfm
        marker: w
        children:
        - type: text
          text: Moïse
      - type: text
        text: ' et des '
      - type: usfm
        marker: w
        children:
        - type: text
          text: prophètes
      - type: text
        text: ', lui répondit Abraham ; qu’ils les écoutent !'
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'Le gérant se dit : « Que vais-je faire, puisque mon maître m’enlève la gestion de ses biens ? Travailler comme ouvrier agricole ? Je n’en ai pas la force. Me mettre à mendier ? J’en aurais honte.'
    - type: text
      text: ' '
  '30':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: '– Non, père Abraham, reprit l’autre. Mais si quelqu’un revient du séjour des morts et va les trouver, ils '
      - type: usfm
        marker: w
        children:
        - type: text
          text: changeront
      - type: text
        text: . »
  '31':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'Mais Abraham répliqua : « S’ils n’écoutent ni Moïse ni les prophètes, ils ne se laisseront pas davantage convaincre par un mort revenant à la vie ! »'
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Ah ! je sais ce que je vais faire pour que des gens me reçoivent chez eux lorsque j’aurai perdu ma place. »
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'Là-dessus, il fait venir un à un tous les débiteurs de son maître. Il dit au premier : « Combien dois-tu à mon maître ?'
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: – Quarante hectolitres d’huile d’olive, lui répond celui-ci.
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: – Voici ta reconnaissance de dette, lui dit le gérant, assieds-toi là, dépêche-toi et inscris vingt hectolitres. »
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'Ensuite il dit à un autre : « Et toi, combien dois-tu ?'
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: – Cinq cents sacs de blé.
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: – Prends ta reconnaissance de dette, reprend le gérant, et inscris-en quatre cents. »
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Le maître admira l’habileté avec laquelle ce gérant malhonnête s’y était pris
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '16.8 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Autre traduction : '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: donna son « vu et approuvé » au filou d’intendant car le malin s’y était bien pris.
      marker-yv: yv-n
    - type: usfm
      marker: wj
      children:
      - type: text
        text: . En effet, ceux qui vivent pour ce monde sont plus avisés dans leurs affaires avec leurs semblables que les enfants de la lumière.
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'Et moi je vous déclare : Si vous avez de ces richesses entachées d’injustice, utilisez-les pour vous faire des amis. Ainsi, le jour où elles vous échapperont, ils vous accueilleront dans les demeures éternelles.'
    - type: text
      text: ' '
