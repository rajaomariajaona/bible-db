document_id: 1SA.21,21
type_code: fra
verses:
  '1':
  - type: text
    content: Là-dessus, David se mit en route et s’en alla, tandis que Jonathan retourna en ville.
  - type: heading
    content: David chez le prêtre Ahimélek
  '10':
  - type: text
    content: 'Le prêtre répondit : Il y a l’épée de Goliath, le Philistin que tu as vaincu dans la vallée du Chêne. La voilà, enveloppée dans un drap derrière l’éphod. Si tu veux, tu peux la prendre, car c’est la seule arme que nous ayons ici.'
  - type: text
    content: – Oui, donne-la moi, dit David, elle est sans pareille.
  - type: heading
    content: David chez les Philistins
  '11':
  - type: text
    content: Puis David partit ce même jour pour s’enfuir loin de Saül. Il se rendit chez Akish, le roi de Gath
  - type: note
    content: L’une des cinq principales villes de la Philistie.
  - type: text
    content: .
  '12':
  - type: text
    content: 'Les hauts fonctionnaires d’Akish dirent au roi : N’est-ce pas David, le roi du pays ? N’est-ce pas celui pour qui l’on chantait en dansant : « Saül a vaincu ses milliers et David ses dizaines de milliers'
  - type: note
    content: Voir 18.7.
  - type: text
    content: '  » ?'
  '13':
  - type: text
    content: David prit ces paroles très au sérieux. Il eut une grande peur d’Akish, le roi de Gath
  - type: note
    content: Voir Ps 56.1.
  - type: text
    content: '. '
  '14':
  - type: text
    content: 'Alors il fit semblant devant eux d’avoir perdu la raison : il se comportait de manière extravagante et faisait des marques sur les battants des portes et laissait la bave couler sur sa barbe'
  - type: note
    content: Voir Ps 34.1.
  - type: text
    content: '. '
  '15':
  - type: text
    content: 'Akish dit à ses familiers : Vous voyez bien que cet homme est fou. Pourquoi me l’avez-vous amené ? '
  '16':
  - type: text
    content: Est-ce que je n’ai pas assez de fous ici que vous m’ameniez encore celui-là pour se livrer à des extravagances devant moi ? Il n’est pas question qu’il mette les pieds dans ma maison !
  '2':
  - type: text
    content: David se rendit à Nob
  - type: note
    content: Ville des environs de Jérusalem où la tente de la Rencontre fut installée après la destruction de Silo (4.3-4 ; Jr 7.12). D’après 22.10, 15, il semble que David y soit venu pour consulter l’Eternel par l’ourim et le toummim.
  - type: text
    content: ', auprès du prêtre Ahimélek. Celui-ci accourut tout tremblant au-devant de lui et lui demanda : Comment se fait-il que tu sois seul ? Pourquoi n’y a-t-il personne avec toi ?'
  '3':
  - type: text
    content: '– Le roi m’a chargé d’une mission, lui répondit David, et il m’a dit : « Que personne ne sache rien de l’affaire pour laquelle je t’envoie et de l’ordre que je t’ai donné. » C’est pourquoi j’ai donné rendez-vous à mes hommes à un certain endroit. '
  '4':
  - type: text
    content: Maintenant, qu’as-tu à manger sous la main ? Peux-tu me donner cinq pains ou quelque chose d’autre ?
  '5':
  - type: text
    content: 'Le prêtre lui répondit : Je n’ai pas de pain ordinaire sous la main, mais seulement des pains consacrés'
  - type: note
    content: Voir Lv 24.5-9.
  - type: text
    content: . Tu peux les prendre pour tes hommes s’ils n’ont pas eu de relations sexuelles récemment.
  '6':
  - type: text
    content: 'David répondit au prêtre : Ils n’en ont certainement pas eues, tout comme par le passé quand je suis parti en campagne. Si l’équipement de mes hommes est consacré pour une expédition profane, à plus forte raison aujourd’hui sont-ils tous consacrés avec leur équipement.'
  '7':
  - type: text
    content: Alors le prêtre lui remit des pains consacrés, car il n’en avait pas d’autres sous la main. C’étaient des pains qui avaient été exposés devant l’Eternel et qui venaient d’être retirés de la table de l’Eternel pour être remplacés par du pain frais
  - type: note
    content: Allusion à cet épisode en Mt 12.3-4 ; Mc 2.25-26 ; Lc 6.3-4.
  - type: text
    content: '. '
  '8':
  - type: text
    content: Or, ce même jour, un haut fonctionnaire de Saül se trouvait là pour accomplir un devoir religieux devant l’Eternel. Il s’appelait Doëg l’Edomite. C’était le chef des bergers de Saül.
  '9':
  - type: text
    content: 'David demanda ensuite à Ahimélek : N’aurais-tu pas une lance ou une épée sous la main ? La mission du roi était si urgente que je n’ai pas même eu le temps d’emporter mon épée ou d’autres armes.'
