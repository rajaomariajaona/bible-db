document_id: 1SA.21
type_code: fra
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Là-dessus, David se mit en route et s’en alla, tandis que Jonathan retourna en ville.
- type: usfm
  marker: s1
  children:
  - type: text
    text: David chez le prêtre Ahimélek
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: David se rendit à Nob
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '21.2 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Ville des environs de Jérusalem où la tente de la Rencontre fut installée après la destruction de Silo (4.3-4 ; Jr 7.12). D’après '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '22.10'
        metadata:
          usfm: 1SA.22.10
      - type: text
        text: ', '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '15'
        metadata:
          usfm: 1SA.22.15
      - type: text
        text: ', il semble que David y soit venu pour consulter l’Eternel par l’ourim et le toummim.'
    marker-yv: yv-n
  - type: text
    text: ', auprès du prêtre Ahimélek. Celui-ci accourut tout tremblant au-devant de lui et lui demanda : Comment se fait-il que tu sois seul ? Pourquoi n’y a-t-il personne avec toi ?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: '– Le roi m’a chargé d’une mission, lui répondit David, et il m’a dit : « Que personne ne sache rien de l’affaire pour laquelle je t’envoie et de l’ordre que je t’ai donné. » C’est pourquoi j’ai donné rendez-vous à mes hommes à un certain endroit. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Maintenant, qu’as-tu à manger sous la main ? Peux-tu me donner cinq pains ou quelque chose d’autre ?
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Le prêtre lui répondit : Je n’ai pas de pain ordinaire sous la main, mais seulement des pains consacrés'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '21.5 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Voir '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Lv 24.5-9
        metadata:
          usfm: LEV.24.5+LEV.24.6+LEV.24.7+LEV.24.8+LEV.24.9
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: . Tu peux les prendre pour tes hommes s’ils n’ont pas eu de relations sexuelles récemment.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'David répondit au prêtre : Ils n’en ont certainement pas eues, tout comme par le passé quand je suis parti en campagne. Si l’équipement de mes hommes est consacré pour une expédition profane, à plus forte raison aujourd’hui sont-ils tous consacrés avec leur équipement.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Alors le prêtre lui remit des pains consacrés, car il n’en avait pas d’autres sous la main. C’étaient des pains qui avaient été exposés devant l’Eternel et qui venaient d’être retirés de la table de l’Eternel pour être remplacés par du pain frais
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '21.7 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Allusion à cet épisode en Mt 12.3-4 ; Mc 2.25-26 ; Lc 6.3-4.
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Or, ce même jour, un haut fonctionnaire de Saül se trouvait là pour accomplir un devoir religieux devant l’Eternel. Il s’appelait Doëg l’Edomite. C’était le chef des bergers de Saül.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'David demanda ensuite à Ahimélek : N’aurais-tu pas une lance ou une épée sous la main ? La mission du roi était si urgente que je n’ai pas même eu le temps d’emporter mon épée ou d’autres armes.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Le prêtre répondit : Il y a l’épée de Goliath, le Philistin que tu as vaincu dans la vallée du Chêne. La voilà, enveloppée dans un drap derrière l’éphod. Si tu veux, tu peux la prendre, car c’est la seule arme que nous ayons ici.'
- type: usfm
  marker: p
  children:
  - type: text
    text: – Oui, donne-la moi, dit David, elle est sans pareille.
- type: usfm
  marker: s1
  children:
  - type: text
    text: David chez les Philistins
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Puis David partit ce même jour pour s’enfuir loin de Saül. Il se rendit chez Akish, le roi de Gath
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '21.11 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: L’une des cinq principales villes de la Philistie.
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Les hauts fonctionnaires d’Akish dirent au roi : N’est-ce pas David, le roi du pays ? N’est-ce pas celui pour qui l’on chantait en dansant : « Saül a vaincu ses milliers et David ses dizaines de milliers'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '21.12 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Voir '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '18.7'
        metadata:
          usfm: 1SA.18.7
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: '  » ?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: David prit ces paroles très au sérieux. Il eut une grande peur d’Akish, le roi de Gath
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '21.13 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Voir '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ps 56.1
        metadata:
          usfm: PSA.56.1
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Alors il fit semblant devant eux d’avoir perdu la raison : il se comportait de manière extravagante et faisait des marques sur les battants des portes et laissait la bave couler sur sa barbe'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '21.14 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Voir '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ps 34.1
        metadata:
          usfm: PSA.34.1
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Akish dit à ses familiers : Vous voyez bien que cet homme est fou. Pourquoi me l’avez-vous amené ? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Est-ce que je n’ai pas assez de fous ici que vous m’ameniez encore celui-là pour se livrer à des extravagances devant moi ? Il n’est pas question qu’il mette les pieds dans ma maison !
