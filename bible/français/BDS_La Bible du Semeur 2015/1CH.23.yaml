document_id: 1CH.23,21
type_code: fra
verses:
  '1':
  - type: heading
    content: L’organisation des lévites
  - type: text
    content: Lorsque David fut âgé et rassasié de jours, il désigna son fils Salomon pour régner sur Israël
  - type: note
    content: Voir 1 R 1.1-40.
  - type: text
    content: '. '
  '10':
  - type: text
    content: 'Shimeï eut quatre autres fils : Yahath, Ziza, Yeoush et Beria. '
  '11':
  - type: text
    content: Yahath était l’aîné et Ziza le second. Yeoush et Beria n’eurent pas beaucoup de descendants et furent comptés ensemble comme un seul groupe familial dans le dénombrement.
  '12':
  - type: text
    content: 'Qehath eut quatre fils : Amram, Yitsehar, Hébron et Ouzziel. '
  '13':
  - type: text
    content: 'Fils d’Amram : Aaron et Moïse. Aaron fut mis à part, avec ses descendants à perpétuité, pour toujours se consacrer au service du lieu très saint, pour brûler les parfums devant l’Eternel, pour le servir et pour prononcer à perpétuité les bénédictions en son nom'
  - type: note
    content: Voir Ex 28.1.
  - type: text
    content: .
  '14':
  - type: text
    content: 'Les descendants de Moïse, l’homme de Dieu, furent comptés, dans la tribu de Lévi. '
  '15':
  - type: text
    content: 'Fils de Moïse : Guershom, Eliézer. '
  '16':
  - type: text
    content: 'Le fils aîné de Guershom fut Shebouel. '
  '17':
  - type: text
    content: 'Eliézer n’eut qu’un fils, le chef Rehabia, mais les descendants de Rehabia furent très nombreux. '
  '18':
  - type: text
    content: 'Shelomith fut le premier des fils de Yitsehar. '
  '19':
  - type: text
    content: 'Fils de Hébron : Yeriya, l’aîné, Amaria, le deuxième, Yahaziel, le troisième, et Yeqameam, le quatrième. '
  '2':
  - type: text
    content: 'Il réunit tous les chefs d’Israël, ainsi que les prêtres et les lévites. '
  '20':
  - type: text
    content: Les fils d’Ouzziel furent Michée, l’aîné, et Yishiya, le second.
  '21':
  - type: text
    content: 'Fils de Merari : Mahli et Moushi. Fils de Mahli : Eléazar et Qish. '
  '22':
  - type: text
    content: 'Eléazar mourut sans avoir de fils ; il n’eut que des filles qui épousèrent des hommes qui leur étaient apparentés, les fils de Qish. '
  '23':
  - type: text
    content: 'Moushi eut trois fils : Mahli, Eder et Yerémoth.'
  '24':
  - type: text
    content: 'Tels furent les descendants de Lévi, selon leurs groupes familiaux et les chefs des groupes familiaux enregistrés un à un dans les listes nominatives lors du recensement. Ils étaient affectés au service du temple de l’Eternel depuis l’âge de vingt ans. '
  '25':
  - type: text
    content: 'David dit en effet : L’Eternel, le Dieu d’Israël, a assuré une existence paisible à son peuple et il a établi pour toujours sa demeure à Jérusalem. '
  '26':
  - type: text
    content: Aussi, les lévites n’auront plus à transporter le tabernacle et tous les ustensiles destinés à son service.
  '27':
  - type: text
    content: 'Ce fut d’après les dernières instructions de David qu’eut lieu le dénombrement des descendants de Lévi âgés d’au moins vingt ans. '
  '28':
  - type: text
    content: Leurs fonctions
  - type: note
    content: Pour les v. 28-32, voir Nb 3.5-9.
  - type: text
    content: ' consistaient en effet à assister les descendants d’Aaron dans le service du temple de l’Eternel. Ils avaient à surveiller l’entretien des parvis et des salles annexes, la purification de toutes les choses saintes et tout travail relatif au service du Temple. '
  '29':
  - type: text
    content: Ils devaient s’occuper des pains exposés devant l’Eternel
  - type: note
    content: Voir Lv 24.6-9. Ces pains devaient être disposés par rangées chaque sabbat.
  - type: text
    content: ', de la farine destinée aux offrandes végétales, des galettes sans levain et des gâteaux frits à la poêle ou bouillis, et de toutes les mesures de capacité et de longueur. '
  '3':
  - type: text
    content: 'A cette occasion, on dénombra les lévites âgés d’au moins trente ans : il y avait 38 000 hommes.'
  '30':
  - type: text
    content: 'D’autre part, ils étaient chargés de se présenter chaque matin et chaque soir pour célébrer et louer l’Eternel '
  '31':
  - type: text
    content: 'et pour offrir à l’Eternel tous les holocaustes les jours de repos, aux nouvelles lunes et aux fêtes cultuelles, devant l’Eternel, selon le nombre qui leur a été prescrit. '
  '32':
  - type: text
    content: Ils devaient assurer la garde de la tente de la Rencontre et celle du sanctuaire et assister leurs frères, les descendants d’Aaron, dans le service du temple de l’Eternel.
  '4':
  - type: text
    content: '– 24 000 d’entre eux auront la responsabilité des travaux du temple de l’Eternel, dit le roi, 6 000 seront administrateurs et juges, '
  '5':
  - type: text
    content: 4 000 seront portiers et 4 000 auront pour tâche de louer l’Eternel avec les instruments de musique que j’ai fait faire pour cet usage.
  '6':
  - type: text
    content: 'David les répartit en trois classes selon les trois fils de Lévi : Guershôn, Qehath et Merari.'
  '7':
  - type: text
    content: 'Pour les Guershonites : Laedân et Shimeï. '
  '8':
  - type: text
    content: 'Laedân avait trois fils : le chef Yehiel, Zétam et Joël. '
  '9':
  - type: text
    content: 'Shimeï en avait aussi trois : Shelomith, Haziel et Harân. Ce sont là les chefs des groupes familiaux issus de Laedân.'
