document_id: 1CH.23
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: L’organisation des lévites
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Lorsque David fut âgé et rassasié de jours, il désigna son fils Salomon pour régner sur Israël
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '23.1 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Voir '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1 R 1.1-40
        metadata:
          usfm: 1KI.1.1+1KI.1.2+1KI.1.3+1KI.1.4+1KI.1.5+1KI.1.6+1KI.1.7+1KI.1.8+1KI.1.9+1KI.1.10+1KI.1.11+1KI.1.12+1KI.1.13+1KI.1.14+1KI.1.15+1KI.1.16+1KI.1.17+1KI.1.18+1KI.1.19+1KI.1.20+1KI.1.21+1KI.1.22+1KI.1.23+1KI.1.24+1KI.1.25+1KI.1.26+1KI.1.27+1KI.1.28+1KI.1.29+1KI.1.30+1KI.1.31+1KI.1.32+1KI.1.33+1KI.1.34+1KI.1.35+1KI.1.36+1KI.1.37+1KI.1.38+1KI.1.39+1KI.1.40
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Il réunit tous les chefs d’Israël, ainsi que les prêtres et les lévites. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'A cette occasion, on dénombra les lévites âgés d’au moins trente ans : il y avait 38 000 hommes.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: '– 24 000 d’entre eux auront la responsabilité des travaux du temple de l’Eternel, dit le roi, 6 000 seront administrateurs et juges, '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 4 000 seront portiers et 4 000 auront pour tâche de louer l’Eternel avec les instruments de musique que j’ai fait faire pour cet usage.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'David les répartit en trois classes selon les trois fils de Lévi : Guershôn, Qehath et Merari.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Pour les Guershonites : Laedân et Shimeï. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Laedân avait trois fils : le chef Yehiel, Zétam et Joël. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Shimeï en avait aussi trois : Shelomith, Haziel et Harân. Ce sont là les chefs des groupes familiaux issus de Laedân.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Shimeï eut quatre autres fils : Yahath, Ziza, Yeoush et Beria. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Yahath était l’aîné et Ziza le second. Yeoush et Beria n’eurent pas beaucoup de descendants et furent comptés ensemble comme un seul groupe familial dans le dénombrement.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Qehath eut quatre fils : Amram, Yitsehar, Hébron et Ouzziel. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Fils d’Amram : Aaron et Moïse. Aaron fut mis à part, avec ses descendants à perpétuité, pour toujours se consacrer au service du lieu très saint, pour brûler les parfums devant l’Eternel, pour le servir et pour prononcer à perpétuité les bénédictions en son nom'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '23.13 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Voir '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ex 28.1
        metadata:
          usfm: EXO.28.1
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Les descendants de Moïse, l’homme de Dieu, furent comptés, dans la tribu de Lévi. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Fils de Moïse : Guershom, Eliézer. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Le fils aîné de Guershom fut Shebouel. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Eliézer n’eut qu’un fils, le chef Rehabia, mais les descendants de Rehabia furent très nombreux. '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Shelomith fut le premier des fils de Yitsehar. '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Fils de Hébron : Yeriya, l’aîné, Amaria, le deuxième, Yahaziel, le troisième, et Yeqameam, le quatrième. '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Les fils d’Ouzziel furent Michée, l’aîné, et Yishiya, le second.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Fils de Merari : Mahli et Moushi. Fils de Mahli : Eléazar et Qish. '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Eléazar mourut sans avoir de fils ; il n’eut que des filles qui épousèrent des hommes qui leur étaient apparentés, les fils de Qish. '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Moushi eut trois fils : Mahli, Eder et Yerémoth.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Tels furent les descendants de Lévi, selon leurs groupes familiaux et les chefs des groupes familiaux enregistrés un à un dans les listes nominatives lors du recensement. Ils étaient affectés au service du temple de l’Eternel depuis l’âge de vingt ans. '
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'David dit en effet : L’Eternel, le Dieu d’Israël, a assuré une existence paisible à son peuple et il a établi pour toujours sa demeure à Jérusalem. '
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: Aussi, les lévites n’auront plus à transporter le tabernacle et tous les ustensiles destinés à son service.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'Ce fut d’après les dernières instructions de David qu’eut lieu le dénombrement des descendants de Lévi âgés d’au moins vingt ans. '
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: Leurs fonctions
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '23.28 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Pour les v. 28-32, voir '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Nb 3.5-9
        metadata:
          usfm: NUM.3.5+NUM.3.6+NUM.3.7+NUM.3.8+NUM.3.9
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: ' consistaient en effet à assister les descendants d’Aaron dans le service du temple de l’Eternel. Ils avaient à surveiller l’entretien des parvis et des salles annexes, la purification de toutes les choses saintes et tout travail relatif au service du Temple. '
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: Ils devaient s’occuper des pains exposés devant l’Eternel
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '23.29 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Voir '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Lv 24.6-9
        metadata:
          usfm: LEV.24.6+LEV.24.7+LEV.24.8+LEV.24.9
      - type: text
        text: . Ces pains devaient être disposés par rangées chaque sabbat.
    marker-yv: yv-n
  - type: text
    text: ', de la farine destinée aux offrandes végétales, des galettes sans levain et des gâteaux frits à la poêle ou bouillis, et de toutes les mesures de capacité et de longueur. '
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'D’autre part, ils étaient chargés de se présenter chaque matin et chaque soir pour célébrer et louer l’Eternel '
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'et pour offrir à l’Eternel tous les holocaustes les jours de repos, aux nouvelles lunes et aux fêtes cultuelles, devant l’Eternel, selon le nombre qui leur a été prescrit. '
  - type: usfm
    marker: v
    metadata:
      v: '32'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: Ils devaient assurer la garde de la tente de la Rencontre et celle du sanctuaire et assister leurs frères, les descendants d’Aaron, dans le service du temple de l’Eternel.
