document_id: NEH.4,21
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Les Judéens se préparent à se défendre
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Lorsque Sanballat, Tobiya, les Arabes, les Ammonites et les Ashdodiens apprirent que la restauration des murailles de Jérusalem progressait et que les brèches commençaient à être obturées, ils se mirent très en colère. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'Mais à partir de ce jour, la moitié des hommes seulement faisaient le travail et ceux de l’autre moitié, vêtus de cuirasses, étaient armés des lances, des boucliers et des arcs. Et les chefs se tenaient derrière tous les gens de Juda. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'Ceux qui étaient occupés à rebâtir la muraille et ceux qui portaient ou chargeaient les fardeaux travaillaient d’une main et tenaient une arme de l’autre. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'Chacun des bâtisseurs avait son épée attachée à sa hanche. C’est ainsi qu’ils bâtissaient. Un homme se tenait à mes côtés prêt à sonner du cor. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'Je dis alors aux notables, aux chefs et au reste du peuple : Le travail est considérable et s’étend sur une grande distance, nous sommes dispersés loin les uns des autres le long de la muraille. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: Rassemblez-vous autour de nous, à l’endroit où vous entendrez le son du cor, et notre Dieu combattra pour nous.
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'C’est ainsi que, chaque jour, nous poursuivions notre entreprise, la moitié d’entre nous tenant la lance à la main depuis l’aurore jusqu’à l’apparition des étoiles. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'Durant cette période, je dis encore au peuple : Que chacun passe la nuit dans Jérusalem avec son subalterne'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '4.16 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Autre traduction : '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: son serviteur.
      marker-yv: yv-n
    - type: text
      text: . Ainsi, nous pourrons monter la garde pendant la nuit et poursuivre le travail pendant le jour.
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: Ni moi, ni mes proches, ni mes collaborateurs, ni les gardes de mon escorte, nous ne quittions nos vêtements, chacun gardait ses armes à portée de main
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '4.17 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Texte difficile. Autres traductions : '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: '…ses armes, même pour aller se laver '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'ou '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: chacun n’avait que ses armes et de l’eau.
      marker-yv: yv-n
    - type: text
      text: .
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'Ils se liguèrent tous ensemble pour aller attaquer Jérusalem et y semer le désordre. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'Alors nous avons prié notre Dieu et nous avons posté des gens pour monter la garde, de jour et de nuit, pour nous défendre contre eux. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'Cependant, déjà le peuple de Juda murmurait : Ceux qui portent les fardeaux sont à bout de forces et les tas de décombres restent énormes. Jamais nous n’arriverons à rebâtir cette muraille !'
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'Quant à nos adversaires, ils disaient : Ils ne sauront rien et ne verront rien jusqu’au moment où nous surgirons au milieu d’eux pour les massacrer et mettre fin à ce travail.'
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'Les Juifs qui habitaient parmi eux vinrent dix fois nous avertir de ce qu’ils préparaient : De tous les lieux où vous vous tournerez, disaient-ils, ils viendront contre nous.'
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'C’est pourquoi je mis des gens en place en contrebas derrière la muraille, aux endroits découverts ; je les postai groupés par familles et armés d’épées, de lances et d’arcs. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'Après avoir tout inspecté, je m’adressai aux notables, aux chefs et au reste du peuple : N’ayez pas peur d’eux ! Pensez au Seigneur qui est grand et redoutable, et combattez pour vos frères, vos fils et vos filles, vos femmes et vos maisons !'
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'Lorsque nos ennemis apprirent que nous étions informés et que Dieu avait ainsi déjoué leur projet, nous sommes tous retournés à la muraille, chacun à son travail. '
