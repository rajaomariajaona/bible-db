document_id: ACT.11,21
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Le rapport de Pierre aux croyants de Jérusalem
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Les apôtres et les frères qui habitaient la Judée apprirent que les non-Juifs venaient d’accepter la Parole de Dieu. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Cela est arrivé trois fois, puis tout a disparu dans le ciel.
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Et voilà qu’au même moment trois hommes sont arrivés à la maison où nous nous trouvions
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '11.11 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Certains manuscrits ont : '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: je me trouvais.
      marker-yv: yv-n
    - type: text
      text: '. Ils venaient de Césarée et avaient été envoyés vers moi. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Alors l’Esprit me dit d’aller avec eux sans hésiter. Je pris donc avec moi les six frères que voici et nous nous sommes rendus chez cet homme.
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Celui-ci nous a raconté qu’un ange lui était apparu dans sa maison et lui avait dit : « Envoie quelqu’un à Jaffa pour faire venir chez toi Simon, surnommé Pierre. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Il te dira comment toi et tous les tiens vous serez sauvés. »
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'J’ai donc commencé à leur parler, quand l’Esprit Saint est descendu sur eux, de la même manière qu’il était descendu sur nous au commencement. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Aussitôt, je me suis souvenu de cette parole du Seigneur :'
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Jean a baptisé dans de l’eau, mais vous,
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: vous serez baptisés dans le Saint-Esprit.
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Puisque Dieu leur a accordé le même don qu’à nous quand nous avons cru, qui étais-je, moi, pour pouvoir m’opposer à Dieu ?
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ce récit les apaisa et ils louèrent Dieu et dirent : Dieu a aussi donné aux non-Juifs de changer pour recevoir la vie.'
  - type: usfm
    marker: s1
    children:
    - type: text
      text: La Parole annoncée aux non-Juifs à Antioche
    marker-yv: yv-h
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Les disciples s’étaient dispersés lors de la persécution survenue après la mort d’Etienne. Ils allèrent jusqu’en Phénicie, dans l’île de Chypre et à Antioche
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '11.19 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Antioche
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: ': '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'capitale de la province romaine de Syrie. Troisième ville de l’Empire romain (après Rome et Alexandrie). Appelée souvent Antioche de Syrie pour la distinguer d’Antioche de Pisidie (voir '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: '13.14'
        - type: text
          text: ).
      marker-yv: yv-n
    - type: text
      text: ', mais ils n’annonçaient la Parole qu’aux Juifs. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Et dès que Pierre fut de retour à Jérusalem, les croyants d’origine juive lui firent des reproches : '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Toutefois, quelques-uns d’entre eux, qui étaient originaires de Chypre et de Cyrène, se rendirent à Antioche et s’adressèrent aussi aux non-Juifs
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '11.20 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Certains manuscrits ont : '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: des Juifs de culture grecque.
      marker-yv: yv-n
    - type: text
      text: ' en leur annonçant le Seigneur Jésus. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Or le Seigneur était avec eux ; un grand nombre de personnes crurent et se convertirent au Seigneur.
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Bientôt l’Eglise qui était à Jérusalem apprit la nouvelle. Elle envoya Barnabas à Antioche. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'A son arrivée, il constata ce que la grâce de Dieu avait accompli et il en fut rempli de joie. Il encouragea donc tous les croyants à rester fidèles au Seigneur avec une ferme assurance. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Barnabas était en effet un homme bienveillant, rempli d’Esprit Saint et de foi. Et un grand nombre de personnes s’attachèrent au Seigneur. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Barnabas se rendit alors à Tarse pour y chercher Saul. Quand il l’eut trouvé, il l’amena avec lui à Antioche. '
  '26':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ils passèrent toute une année à travailler ensemble dans l’Eglise et enseignèrent beaucoup de gens. C’est à Antioche que, pour la première fois, les disciples de Jésus furent appelés « chrétiens ».
  '27':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'A cette même époque, des prophètes se rendirent de Jérusalem à Antioche. '
  '28':
  - type: usfm
    marker: p
    children:
    - type: text
      text: L’un d’eux, nommé Agabus, se leva et prédit sous l’inspiration de l’Esprit qu’une grande famine sévirait bientôt dans le monde entier
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '11.28 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Le monde entier
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: ': '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'expression qui désigne souvent l’Empire romain (voir '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: Lc 2.1-2
        - type: text
          text: ).
      marker-yv: yv-n
    - type: text
      text: . Elle eut lieu, en effet, sous le règne de l’empereur Claude
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '11.28 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Claude
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: ': '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: empereur romain qui a régné de 41 à 54 apr. J.-C. La famine a sévi dans diverses provinces romaines entre 46 et 48.
      marker-yv: yv-n
    - type: text
      text: '. '
  '29':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Les disciples d’Antioche décidèrent alors de donner, chacun selon ses moyens, et d’envoyer des secours aux frères qui habitaient la Judée. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Comment ! lui dirent-ils, tu es entré chez des incirconcis et tu as mangé avec eux !
  '30':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'C’est ce qu’ils firent : ils envoyèrent leurs dons aux responsables de l’Eglise par l’intermédiaire de Barnabas et de Saul'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '11.30 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Deuxième visite de Paul à Jérusalem, qui coïncide selon certains avec celle qu’il mentionne en '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: Ga 2.1-10
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: .
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Mais Pierre se mit à leur exposer, point par point, ce qui s’était passé.
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '– Pendant mon séjour à Jaffa, dit-il, j’étais en train de prier, quand je suis tombé en extase et j’ai eu une vision : une sorte de grande toile, tenue aux quatre coins, est descendue du ciel et elle est venue tout près de moi. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'J’ai regardé attentivement ce qu’il y avait dedans et j’ai vu des quadrupèdes, des bêtes sauvages, des reptiles et des oiseaux. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'J’ai entendu alors une voix qui me disait : '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: « Lève-toi, Pierre, tue ces bêtes et mange-les. »
    - type: text
      text: ' '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Mais j’ai répondu : « Oh ! non, Seigneur, car jamais de ma vie je n’ai rien mangé de souillé ou d’impur. » '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'La voix céleste s’est fait entendre une deuxième fois : '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: « Ce que Dieu a déclaré pur, ce n’est pas à toi de le considérer comme impur. »
