document_id: ACT.11,21
type_code: fra
verses:
  '1':
  - type: heading
    content: Le rapport de Pierre aux croyants de Jérusalem
  - type: text
    content: 'Les apôtres et les frères qui habitaient la Judée apprirent que les non-Juifs venaient d’accepter la Parole de Dieu. '
  '10':
  - type: text
    content: Cela est arrivé trois fois, puis tout a disparu dans le ciel.
  '11':
  - type: text
    content: Et voilà qu’au même moment trois hommes sont arrivés à la maison où nous nous trouvions
  - type: note
    content: 'Certains manuscrits ont : je me trouvais.'
  - type: text
    content: '. Ils venaient de Césarée et avaient été envoyés vers moi. '
  '12':
  - type: text
    content: Alors l’Esprit me dit d’aller avec eux sans hésiter. Je pris donc avec moi les six frères que voici et nous nous sommes rendus chez cet homme.
  '13':
  - type: text
    content: 'Celui-ci nous a raconté qu’un ange lui était apparu dans sa maison et lui avait dit : « Envoie quelqu’un à Jaffa pour faire venir chez toi Simon, surnommé Pierre. '
  '14':
  - type: text
    content: Il te dira comment toi et tous les tiens vous serez sauvés. »
  '15':
  - type: text
    content: 'J’ai donc commencé à leur parler, quand l’Esprit Saint est descendu sur eux, de la même manière qu’il était descendu sur nous au commencement. '
  '16':
  - type: text
    content: 'Aussitôt, je me suis souvenu de cette parole du Seigneur :'
  - type: text
    content: Jean a baptisé dans de l’eau, mais vous,
  - type: text
    content: vous serez baptisés dans le Saint-Esprit.
  '17':
  - type: text
    content: Puisque Dieu leur a accordé le même don qu’à nous quand nous avons cru, qui étais-je, moi, pour pouvoir m’opposer à Dieu ?
  '18':
  - type: text
    content: 'Ce récit les apaisa et ils louèrent Dieu et dirent : Dieu a aussi donné aux non-Juifs de changer pour recevoir la vie.'
  - type: heading
    content: La Parole annoncée aux non-Juifs à Antioche
  '19':
  - type: text
    content: Les disciples s’étaient dispersés lors de la persécution survenue après la mort d’Etienne. Ils allèrent jusqu’en Phénicie, dans l’île de Chypre et à Antioche
  - type: note
    content: 'Antioche: capitale de la province romaine de Syrie. Troisième ville de l’Empire romain (après Rome et Alexandrie). Appelée souvent Antioche de Syrie pour la distinguer d’Antioche de Pisidie (voir 13.14).'
  - type: text
    content: ', mais ils n’annonçaient la Parole qu’aux Juifs. '
  '2':
  - type: text
    content: 'Et dès que Pierre fut de retour à Jérusalem, les croyants d’origine juive lui firent des reproches : '
  '20':
  - type: text
    content: Toutefois, quelques-uns d’entre eux, qui étaient originaires de Chypre et de Cyrène, se rendirent à Antioche et s’adressèrent aussi aux non-Juifs
  - type: note
    content: 'Certains manuscrits ont : des Juifs de culture grecque.'
  - type: text
    content: ' en leur annonçant le Seigneur Jésus. '
  '21':
  - type: text
    content: Or le Seigneur était avec eux ; un grand nombre de personnes crurent et se convertirent au Seigneur.
  '22':
  - type: text
    content: 'Bientôt l’Eglise qui était à Jérusalem apprit la nouvelle. Elle envoya Barnabas à Antioche. '
  '23':
  - type: text
    content: 'A son arrivée, il constata ce que la grâce de Dieu avait accompli et il en fut rempli de joie. Il encouragea donc tous les croyants à rester fidèles au Seigneur avec une ferme assurance. '
  '24':
  - type: text
    content: 'Barnabas était en effet un homme bienveillant, rempli d’Esprit Saint et de foi. Et un grand nombre de personnes s’attachèrent au Seigneur. '
  '25':
  - type: text
    content: 'Barnabas se rendit alors à Tarse pour y chercher Saul. Quand il l’eut trouvé, il l’amena avec lui à Antioche. '
  '26':
  - type: text
    content: Ils passèrent toute une année à travailler ensemble dans l’Eglise et enseignèrent beaucoup de gens. C’est à Antioche que, pour la première fois, les disciples de Jésus furent appelés « chrétiens ».
  '27':
  - type: text
    content: 'A cette même époque, des prophètes se rendirent de Jérusalem à Antioche. '
  '28':
  - type: text
    content: L’un d’eux, nommé Agabus, se leva et prédit sous l’inspiration de l’Esprit qu’une grande famine sévirait bientôt dans le monde entier
  - type: note
    content: 'Le monde entier: expression qui désigne souvent l’Empire romain (voir Lc 2.1-2).'
  - type: text
    content: . Elle eut lieu, en effet, sous le règne de l’empereur Claude
  - type: note
    content: 'Claude: empereur romain qui a régné de 41 à 54 apr. J.-C. La famine a sévi dans diverses provinces romaines entre 46 et 48.'
  - type: text
    content: '. '
  '29':
  - type: text
    content: 'Les disciples d’Antioche décidèrent alors de donner, chacun selon ses moyens, et d’envoyer des secours aux frères qui habitaient la Judée. '
  '3':
  - type: text
    content: Comment ! lui dirent-ils, tu es entré chez des incirconcis et tu as mangé avec eux !
  '30':
  - type: text
    content: 'C’est ce qu’ils firent : ils envoyèrent leurs dons aux responsables de l’Eglise par l’intermédiaire de Barnabas et de Saul'
  - type: note
    content: Deuxième visite de Paul à Jérusalem, qui coïncide selon certains avec celle qu’il mentionne en Ga 2.1-10.
  - type: text
    content: .
  '4':
  - type: text
    content: Mais Pierre se mit à leur exposer, point par point, ce qui s’était passé.
  '5':
  - type: text
    content: '– Pendant mon séjour à Jaffa, dit-il, j’étais en train de prier, quand je suis tombé en extase et j’ai eu une vision : une sorte de grande toile, tenue aux quatre coins, est descendue du ciel et elle est venue tout près de moi. '
  '6':
  - type: text
    content: 'J’ai regardé attentivement ce qu’il y avait dedans et j’ai vu des quadrupèdes, des bêtes sauvages, des reptiles et des oiseaux. '
  '7':
  - type: text
    content: 'J’ai entendu alors une voix qui me disait : '
  - type: text
    content: « Lève-toi, Pierre, tue ces bêtes et mange-les. »
  - type: text
    content: ' '
  '8':
  - type: text
    content: 'Mais j’ai répondu : « Oh ! non, Seigneur, car jamais de ma vie je n’ai rien mangé de souillé ou d’impur. » '
  '9':
  - type: text
    content: 'La voix céleste s’est fait entendre une deuxième fois : '
  - type: text
    content: « Ce que Dieu a déclaré pur, ce n’est pas à toi de le considérer comme impur. »
