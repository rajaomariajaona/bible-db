document_id: MAT.21,21
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: L’entrée du Roi à Jérusalem
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: (Mc 11.1-11 ; Lc 19.28-38 ; Jn 12.12-19)
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'En approchant de Jérusalem, ils arrivèrent près du village de Bethphagé, sur le mont des Oliviers. Jésus envoya deux de ses disciples '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Quand Jésus entra dans Jérusalem, toute la ville fut en émoi. Partout on demandait : Qui est-ce ?'
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Et la foule qui l’accompagnait répondait : C’est Jésus le prophète, de Nazareth en Galilée.'
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Jésus dans le Temple
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: (Mc 11.15-19 ; Lc 19.45-48 ; voir Jn 2.13-16)
    marker-yv: yv-h
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Jésus entra dans la cour du Temple. Il en chassa tous les marchands, ainsi que leurs clients. Il renversa les comptoirs des changeurs d’argent
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '21.12 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Les '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'changeurs '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: échangeaient des monnaies de provenances diverses contre la monnaie du Temple qui seule avait cours dans l’enceinte sacrée.
      marker-yv: yv-n
    - type: text
      text: ', ainsi que les chaises des marchands de pigeons, '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'et il leur dit : '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'Il est écrit : '
      - type: usfm
        marker: qt
        children:
        - type: text
          text: On appellera ma maison une maison de prière
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '21.13 '
      - type: usfm
        marker: ft
        children:
        - type: usfm
          marker: ref
          children:
          - type: text
            text: Es 56.7
        - type: text
          text: .
      marker-yv: yv-n
    - type: usfm
      marker: wj
      children:
      - type: text
        text: ', mais vous, vous en faites '
      - type: usfm
        marker: qt
        children:
        - type: text
          text: une caverne de brigands
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '21.13 '
      - type: usfm
        marker: ft
        children:
        - type: usfm
          marker: ref
          children:
          - type: text
            text: Jr 7.11
        - type: text
          text: .
      marker-yv: yv-n
    - type: usfm
      marker: wj
      children:
      - type: usfm
        marker: qt
        children:
        - type: text
          text: '!'
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Des aveugles et des paralysés s’approchèrent de lui dans la cour du Temple et il les guérit. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Quand les chefs des prêtres et les spécialistes de la Loi virent les miracles extraordinaires qu’il venait d’accomplir, quand ils entendirent les cris des enfants dans la cour du Temple : «  '
    - type: usfm
      marker: qt
      children:
      - type: text
        text: Hosanna
    - type: text
      text: ' au Fils de David ! », ils se mirent en colère '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'et lui dirent : Tu entends ce qu’ils crient ?'
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: – Oui,
    - type: text
      text: ' leur répondit Jésus. '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'Et vous, n’avez-vous donc jamais lu cette parole :'
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: wj
      children:
      - type: usfm
        marker: qt
        children:
        - type: text
          text: De la bouche des petits enfants
      - type: text
        text: ' '
    - type: text
      text: ╵
    - type: usfm
      marker: wj
      children:
      - type: usfm
        marker: qt
        children:
        - type: text
          text: et des nourrissons,
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: wj
      children:
      - type: usfm
        marker: qt
        children:
        - type: text
          text: tu as tiré la louange
      - type: text
        text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '21.16 '
      - type: usfm
        marker: ft
        children:
        - type: usfm
          marker: ref
          children:
          - type: text
            text: Ps 8.3
        - type: text
          text: ' cité selon l’ancienne version grecque.'
      marker-yv: yv-n
    - type: usfm
      marker: wj
      children:
      - type: usfm
        marker: qt
        children:
        - type: text
          text: .
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Puis il les laissa et quitta la ville pour se rendre à Béthanie, où il passa la nuit.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: La malédiction du figuier
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: (Mc 11.12-14,  20-25)
    marker-yv: yv-h
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Tôt le lendemain matin, en revenant vers la ville, il eut faim. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Il aperçut un figuier sur le bord de la route et s’en approcha ; mais il n’y trouva que des feuilles. Alors, il dit à l’arbre : '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Tu ne porteras plus jamais de fruit !
  - type: usfm
    marker: p
    children:
    - type: text
      text: A l’instant même, le figuier devint tout sec.
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'en leur disant : '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Allez dans le village qui se trouve là devant vous. Dès que vous y serez, vous trouverez une ânesse attachée et, près d’elle, son petit. Détachez-les et amenez-les moi.
    - type: text
      text: ' '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'En voyant cela, les disciples furent très étonnés et s’écrièrent : Comment ce figuier est-il devenu sec en un instant ?'
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: – Vraiment, je vous l’assure,
    - type: text
      text: ' répondit Jésus, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'si vous avez la foi, si vous ne doutez pas, non seulement vous pourrez accomplir ce que j’ai fait à ce figuier, mais même si vous dites à cette colline : « Soulève-toi de là et jette-toi dans la mer », cela se fera.'
    - type: text
      text: ' '
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Si vous priez avec foi, tout ce que vous demanderez, vous l’obtiendrez.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: L’autorité de Jésus contestée
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: (Mc 11.27-33 ; Lc 20.1-8)
    marker-yv: yv-h
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Jésus se rendit au Temple et se mit à enseigner.
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Alors, les chefs des prêtres et les responsables du peuple vinrent le trouver et l’interpellèrent : Par quelle autorité agis-tu ainsi ? Qui t’a donné l’autorité de faire cela ?'
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Jésus leur répondit : '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Moi aussi, j’ai une question à vous poser, une seule. Si vous me répondez, je vous dirai à mon tour de quel droit je fais cela.
    - type: text
      text: ' '
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: De qui Jean tenait-il son mandat pour baptiser ? De Dieu ou des hommes ?
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Alors ils se mirent à raisonner intérieurement : Si nous disons : « De Dieu », il va nous demander : « Pourquoi alors n’avez-vous pas cru en lui ? » '
  '26':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Mais si nous répondons : « Des hommes », nous avons bien lieu de craindre la réaction de la foule, car tout le monde tient Jean pour un prophète.'
  '27':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ils répondirent donc à Jésus : Nous ne savons pas.'
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Et lui de leur répliquer : '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Eh bien, moi non plus, je ne vous dirai pas par quelle autorité j’agis comme je le fais.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: La parabole des deux fils
    marker-yv: yv-h
  '28':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Que pensez-vous de l’histoire que voici ?
    - type: text
      text: ' ajouta Jésus. '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'Un homme avait deux fils. Il alla trouver le premier et lui dit : « Mon fils, va aujourd’hui travailler dans notre vigne.'
  '29':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: – Je n’en ai pas envie », lui répondit celui-ci.
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Mais, plus tard, il regretta d’avoir répondu ainsi et se rendit dans la vigne
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '21.29 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Certains manuscrits changent l’ordre des réponses des v. 29 et 30.
      marker-yv: yv-n
    - type: usfm
      marker: wj
      children:
      - type: text
        text: .
    - type: text
      text: ' '
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'Si quelqu’un vous fait une observation, vous n’aurez qu’à lui dire : « Le Seigneur en a besoin », et on vous laissera les prendre immédiatement.'
  '30':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'Le père alla trouver le second fils et lui fit la même demande. Celui-ci lui répondit : « Oui, mon Seigneur, j’y vais ! »'
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Mais il n’y alla pas.
  '31':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Lequel des deux a fait la volonté de son père ?
  - type: usfm
    marker: p
    children:
    - type: text
      text: – C’est le premier, répondirent-ils.
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Et Jésus ajouta : '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'Vraiment, je vous l’assure : les '
      - type: usfm
        marker: w
        children:
        - type: text
          text: collecteurs d’impôts
      - type: text
        text: ' et les prostituées vous précéderont dans le '
      - type: usfm
        marker: w
        children:
        - type: text
          text: royaume de Dieu
      - type: text
        text: .
    - type: text
      text: ' '
  '32':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: En effet, Jean est venu, il vous a montré ce qu’est une vie juste, et vous n’avez pas cru en lui – tandis que les collecteurs d’impôts et les prostituées ont cru en lui. Et, bien que vous ayez eu leur exemple sous vos yeux, vous n’avez pas éprouvé les regrets qui auraient pu vous amener enfin à croire en lui.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: La culpabilité des chefs religieux juifs
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: (Mc 12.1-12 ; Lc 20.9-19)
    marker-yv: yv-h
  '33':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'Ecoutez encore une '
      - type: usfm
        marker: w
        children:
        - type: text
          text: parabole
      - type: text
        text: '  : Un homme avait une propriété. Il y planta '
      - type: usfm
        marker: qt
        children:
        - type: text
          text: une vigne
      - type: text
        text: ', l’entoura d’une haie, '
      - type: usfm
        marker: qt
        children:
        - type: text
          text: y creusa un pressoir et y bâtit une tour de guet
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '21.33 '
      - type: usfm
        marker: ft
        children:
        - type: usfm
          marker: ref
          children:
          - type: text
            text: Es 5.1-2
        - type: text
          text: ' .'
      marker-yv: yv-n
    - type: usfm
      marker: wj
      children:
      - type: text
        text: . Après cela, il la loua à des vignerons et partit en voyage.
  '34':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: A l’approche des vendanges, il envoya ses serviteurs auprès de ces vignerons pour recevoir le produit qui lui revenait.
    - type: text
      text: ' '
  '35':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'Mais les vignerons se précipitèrent sur ces serviteurs : l’un d’eux fut roué de coups, un autre fut tué, un troisième assommé à coups de pierres.'
  '36':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Le propriétaire envoya alors d’autres serviteurs, plus nombreux que les premiers. Mais ils furent reçus de la même manière par les vignerons.
  '37':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'Finalement, il leur envoya son propre fils en se disant : « Pour mon fils au moins, ils auront du respect. »'
  '38':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'Mais dès que les vignerons aperçurent le fils, ils se dirent entre eux : « Voilà l’héritier ! Venez ! Tuons-le ! Et récupérons son héritage ! »'
  '39':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Ils se jetèrent donc sur lui, le traînèrent hors du vignoble et le tuèrent.
    - type: text
      text: ' '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Tout cela arriva pour que s’accomplisse la prédiction du prophète :'
  '40':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Quand le propriétaire de la vigne viendra, comment agira-t-il envers ces vignerons ?
  '41':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ils lui répondirent : Il fera exécuter sans pitié ces misérables, puis il confiera le soin de sa vigne à d’autres vignerons qui lui donneront sa part de récolte en temps voulu.'
  '42':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Et Jésus ajouta : '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'N’avez-vous jamais lu dans les Ecritures :'
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: wj
      children:
      - type: usfm
        marker: qt
        children:
        - type: text
          text: La pierre que les constructeurs
      - type: text
        text: ' ╵'
      - type: usfm
        marker: qt
        children:
        - type: text
          text: ont rejetée
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: wj
      children:
      - type: usfm
        marker: qt
        children:
        - type: text
          text: est devenue la pierre principale,
      - type: text
        text: ' ╵'
      - type: usfm
        marker: qt
        children:
        - type: text
          text: la pierre d’angle.
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: wj
      children:
      - type: usfm
        marker: qt
        children:
        - type: text
          text: C’est du Seigneur
      - type: text
        text: ' ╵'
      - type: usfm
        marker: qt
        children:
        - type: text
          text: que cela est venu
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: wj
      children:
      - type: usfm
        marker: qt
        children:
        - type: text
          text: et c’est un prodige à nos yeux
      - type: text
        text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '21.42 '
      - type: usfm
        marker: ft
        children:
        - type: usfm
          marker: ref
          children:
          - type: text
            text: Ps 118.22-23
        - type: text
          text: ' .'
      marker-yv: yv-n
    - type: usfm
      marker: wj
      children:
      - type: text
        text: .
  '43':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'Voilà pourquoi je vous déclare que le '
      - type: usfm
        marker: w
        children:
        - type: text
          text: royaume de Dieu
      - type: text
        text: ' vous sera enlevé et sera donné à un peuple qui en produira les fruits.'
    - type: text
      text: ' [ '
  '44':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Mais :'
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: wj
      children:
      - type: usfm
        marker: qt
        children:
        - type: text
          text: Celui qui tombera sur cette pierre-là,
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: wj
      children:
      - type: usfm
        marker: qt
        children:
        - type: text
          text: se brisera la nuque,
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: wj
      children:
      - type: usfm
        marker: qt
        children:
        - type: text
          text: et si elle tombe sur quelqu’un,
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: wj
      children:
      - type: usfm
        marker: qt
        children:
        - type: text
          text: elle l’écrasera
      - type: text
        text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
