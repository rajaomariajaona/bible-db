document_id: MAT.21,21
type_code: fra
verses:
  '1':
  - type: heading
    content: L’entrée du Roi à Jérusalem
  - type: heading
    content: (Mc 11.1-11 ; Lc 19.28-38 ; Jn 12.12-19)
  - type: text
    content: 'En approchant de Jérusalem, ils arrivèrent près du village de Bethphagé, sur le mont des Oliviers. Jésus envoya deux de ses disciples '
  '10':
  - type: text
    content: 'Quand Jésus entra dans Jérusalem, toute la ville fut en émoi. Partout on demandait : Qui est-ce ?'
  '11':
  - type: text
    content: 'Et la foule qui l’accompagnait répondait : C’est Jésus le prophète, de Nazareth en Galilée.'
  - type: heading
    content: Jésus dans le Temple
  - type: heading
    content: (Mc 11.15-19 ; Lc 19.45-48 ; voir Jn 2.13-16)
  '12':
  - type: text
    content: Jésus entra dans la cour du Temple. Il en chassa tous les marchands, ainsi que leurs clients. Il renversa les comptoirs des changeurs d’argent
  - type: note
    content: Les changeurs échangeaient des monnaies de provenances diverses contre la monnaie du Temple qui seule avait cours dans l’enceinte sacrée.
  - type: text
    content: ', ainsi que les chaises des marchands de pigeons, '
  '13':
  - type: text
    content: 'et il leur dit : '
  - type: text
    content: 'Il est écrit : '
  - type: text
    content: On appellera ma maison une maison de prière
  - type: note
    content: Es 56.7.
  - type: text
    content: ', mais vous, vous en faites '
  - type: text
    content: une caverne de brigands
  - type: note
    content: Jr 7.11.
  - type: text
    content: '!'
  '14':
  - type: text
    content: 'Des aveugles et des paralysés s’approchèrent de lui dans la cour du Temple et il les guérit. '
  '15':
  - type: text
    content: 'Quand les chefs des prêtres et les spécialistes de la Loi virent les miracles extraordinaires qu’il venait d’accomplir, quand ils entendirent les cris des enfants dans la cour du Temple : «  '
  - type: text
    content: Hosanna
  - type: text
    content: ' au Fils de David ! », ils se mirent en colère '
  '16':
  - type: text
    content: 'et lui dirent : Tu entends ce qu’ils crient ?'
  - type: text
    content: – Oui,
  - type: text
    content: ' leur répondit Jésus. '
  - type: text
    content: 'Et vous, n’avez-vous donc jamais lu cette parole :'
  - type: text
    content: De la bouche des petits enfants
  - type: text
    content: ' '
  - type: text
    content: ╵
  - type: text
    content: et des nourrissons,
  - type: text
    content: tu as tiré la louange
  - type: text
    content: ' '
  - type: note
    content: Ps 8.3 cité selon l’ancienne version grecque.
  - type: text
    content: .
  '17':
  - type: text
    content: Puis il les laissa et quitta la ville pour se rendre à Béthanie, où il passa la nuit.
  - type: heading
    content: La malédiction du figuier
  - type: heading
    content: (Mc 11.12-14,  20-25)
  '18':
  - type: text
    content: 'Tôt le lendemain matin, en revenant vers la ville, il eut faim. '
  '19':
  - type: text
    content: 'Il aperçut un figuier sur le bord de la route et s’en approcha ; mais il n’y trouva que des feuilles. Alors, il dit à l’arbre : '
  - type: text
    content: Tu ne porteras plus jamais de fruit !
  - type: text
    content: A l’instant même, le figuier devint tout sec.
  '2':
  - type: text
    content: 'en leur disant : '
  - type: text
    content: Allez dans le village qui se trouve là devant vous. Dès que vous y serez, vous trouverez une ânesse attachée et, près d’elle, son petit. Détachez-les et amenez-les moi.
  - type: text
    content: ' '
  '20':
  - type: text
    content: 'En voyant cela, les disciples furent très étonnés et s’écrièrent : Comment ce figuier est-il devenu sec en un instant ?'
  '21':
  - type: text
    content: ' '
  - type: text
    content: – Vraiment, je vous l’assure,
  - type: text
    content: ' répondit Jésus, '
  - type: text
    content: 'si vous avez la foi, si vous ne doutez pas, non seulement vous pourrez accomplir ce que j’ai fait à ce figuier, mais même si vous dites à cette colline : « Soulève-toi de là et jette-toi dans la mer », cela se fera.'
  - type: text
    content: ' '
  '22':
  - type: text
    content: Si vous priez avec foi, tout ce que vous demanderez, vous l’obtiendrez.
  - type: heading
    content: L’autorité de Jésus contestée
  - type: heading
    content: (Mc 11.27-33 ; Lc 20.1-8)
  '23':
  - type: text
    content: Jésus se rendit au Temple et se mit à enseigner.
  - type: text
    content: 'Alors, les chefs des prêtres et les responsables du peuple vinrent le trouver et l’interpellèrent : Par quelle autorité agis-tu ainsi ? Qui t’a donné l’autorité de faire cela ?'
  '24':
  - type: text
    content: 'Jésus leur répondit : '
  - type: text
    content: Moi aussi, j’ai une question à vous poser, une seule. Si vous me répondez, je vous dirai à mon tour de quel droit je fais cela.
  - type: text
    content: ' '
  '25':
  - type: text
    content: De qui Jean tenait-il son mandat pour baptiser ? De Dieu ou des hommes ?
  - type: text
    content: 'Alors ils se mirent à raisonner intérieurement : Si nous disons : « De Dieu », il va nous demander : « Pourquoi alors n’avez-vous pas cru en lui ? » '
  '26':
  - type: text
    content: 'Mais si nous répondons : « Des hommes », nous avons bien lieu de craindre la réaction de la foule, car tout le monde tient Jean pour un prophète.'
  '27':
  - type: text
    content: 'Ils répondirent donc à Jésus : Nous ne savons pas.'
  - type: text
    content: 'Et lui de leur répliquer : '
  - type: text
    content: Eh bien, moi non plus, je ne vous dirai pas par quelle autorité j’agis comme je le fais.
  - type: heading
    content: La parabole des deux fils
  '28':
  - type: text
    content: ' '
  - type: text
    content: Que pensez-vous de l’histoire que voici ?
  - type: text
    content: ' ajouta Jésus. '
  - type: text
    content: 'Un homme avait deux fils. Il alla trouver le premier et lui dit : « Mon fils, va aujourd’hui travailler dans notre vigne.'
  '29':
  - type: text
    content: ' '
  - type: text
    content: – Je n’en ai pas envie », lui répondit celui-ci.
  - type: text
    content: Mais, plus tard, il regretta d’avoir répondu ainsi et se rendit dans la vigne
  - type: text
    content: ' '
  - type: note
    content: Certains manuscrits changent l’ordre des réponses des v. 29 et 30.
  - type: text
    content: .
  - type: text
    content: ' '
  '3':
  - type: text
    content: 'Si quelqu’un vous fait une observation, vous n’aurez qu’à lui dire : « Le Seigneur en a besoin », et on vous laissera les prendre immédiatement.'
  '30':
  - type: text
    content: 'Le père alla trouver le second fils et lui fit la même demande. Celui-ci lui répondit : « Oui, mon Seigneur, j’y vais ! »'
  - type: text
    content: Mais il n’y alla pas.
  '31':
  - type: text
    content: ' '
  - type: text
    content: Lequel des deux a fait la volonté de son père ?
  - type: text
    content: – C’est le premier, répondirent-ils.
  - type: text
    content: 'Et Jésus ajouta : '
  - type: text
    content: 'Vraiment, je vous l’assure : les '
  - type: text
    content: collecteurs d’impôts
  - type: text
    content: ' et les prostituées vous précéderont dans le '
  - type: text
    content: royaume de Dieu
  - type: text
    content: .
  - type: text
    content: ' '
  '32':
  - type: text
    content: En effet, Jean est venu, il vous a montré ce qu’est une vie juste, et vous n’avez pas cru en lui – tandis que les collecteurs d’impôts et les prostituées ont cru en lui. Et, bien que vous ayez eu leur exemple sous vos yeux, vous n’avez pas éprouvé les regrets qui auraient pu vous amener enfin à croire en lui.
  - type: heading
    content: La culpabilité des chefs religieux juifs
  - type: heading
    content: (Mc 12.1-12 ; Lc 20.9-19)
  '33':
  - type: text
    content: ' '
  - type: text
    content: 'Ecoutez encore une '
  - type: text
    content: parabole
  - type: text
    content: '  : Un homme avait une propriété. Il y planta '
  - type: text
    content: une vigne
  - type: text
    content: ', l’entoura d’une haie, '
  - type: text
    content: y creusa un pressoir et y bâtit une tour de guet
  - type: text
    content: ' '
  - type: note
    content: Es 5.1-2 .
  - type: text
    content: . Après cela, il la loua à des vignerons et partit en voyage.
  '34':
  - type: text
    content: ' '
  - type: text
    content: A l’approche des vendanges, il envoya ses serviteurs auprès de ces vignerons pour recevoir le produit qui lui revenait.
  - type: text
    content: ' '
  '35':
  - type: text
    content: 'Mais les vignerons se précipitèrent sur ces serviteurs : l’un d’eux fut roué de coups, un autre fut tué, un troisième assommé à coups de pierres.'
  '36':
  - type: text
    content: ' '
  - type: text
    content: Le propriétaire envoya alors d’autres serviteurs, plus nombreux que les premiers. Mais ils furent reçus de la même manière par les vignerons.
  '37':
  - type: text
    content: ' '
  - type: text
    content: 'Finalement, il leur envoya son propre fils en se disant : « Pour mon fils au moins, ils auront du respect. »'
  '38':
  - type: text
    content: ' '
  - type: text
    content: 'Mais dès que les vignerons aperçurent le fils, ils se dirent entre eux : « Voilà l’héritier ! Venez ! Tuons-le ! Et récupérons son héritage ! »'
  '39':
  - type: text
    content: ' '
  - type: text
    content: Ils se jetèrent donc sur lui, le traînèrent hors du vignoble et le tuèrent.
  - type: text
    content: ' '
  '4':
  - type: text
    content: 'Tout cela arriva pour que s’accomplisse la prédiction du prophète :'
  '40':
  - type: text
    content: Quand le propriétaire de la vigne viendra, comment agira-t-il envers ces vignerons ?
  '41':
  - type: text
    content: 'Ils lui répondirent : Il fera exécuter sans pitié ces misérables, puis il confiera le soin de sa vigne à d’autres vignerons qui lui donneront sa part de récolte en temps voulu.'
  '42':
  - type: text
    content: 'Et Jésus ajouta : '
  - type: text
    content: 'N’avez-vous jamais lu dans les Ecritures :'
  - type: text
    content: La pierre que les constructeurs
  - type: text
    content: ' ╵'
  - type: text
    content: ont rejetée
  - type: text
    content: est devenue la pierre principale,
  - type: text
    content: ' ╵'
  - type: text
    content: la pierre d’angle.
  - type: text
    content: C’est du Seigneur
  - type: text
    content: ' ╵'
  - type: text
    content: que cela est venu
  - type: text
    content: et c’est un prodige à nos yeux
  - type: text
    content: ' '
  - type: note
    content: Ps 118.22-23 .
  - type: text
    content: .
  '43':
  - type: text
    content: ' '
  - type: text
    content: 'Voilà pourquoi je vous déclare que le '
  - type: text
    content: royaume de Dieu
  - type: text
    content: ' vous sera enlevé et sera donné à un peuple qui en produira les fruits.'
  - type: text
    content: ' [ '
  '44':
  - type: text
    content: 'Mais :'
  - type: text
    content: Celui qui tombera sur cette pierre-là,
  - type: text
    content: se brisera la nuque,
  - type: text
    content: et si elle tombe sur quelqu’un,
  - type: text
    content: elle l’écrasera
  - type: text
    content: ' '
  - type: note
    content: Cf. Es 8.14. Ce verset est absent de plusieurs manuscrits (voir Lc 20.18).
  - type: text
    content: .
  - type: text
    content: ']'
  '45':
  - type: text
    content: 'Après avoir entendu ces paraboles, les chefs des prêtres et les pharisiens comprirent que c’était eux que Jésus visait. '
  '46':
  - type: text
    content: Ils cherchaient un moyen de l’arrêter, mais ils avaient peur des réactions de la foule, car tous considéraient Jésus comme un prophète.
  '5':
  - type: text
    content: ' '
  - type: text
    content: 'Dites à la communauté de Sion :'
  - type: text
    content: Voici, ton roi vient vers toi ;
  - type: text
    content: plein de douceur, monté sur une ânesse,
  - type: text
    content: sur un ânon,
  - type: text
    content: le petit d’une bête de somme
  - type: text
    content: ' '
  - type: note
    content: Es 62.11 ; Za 9.9.
  - type: text
    content: .
  '6':
  - type: text
    content: 'Les disciples partirent donc et suivirent les instructions de Jésus. '
  '7':
  - type: text
    content: 'Ils amenèrent l’ânesse et son petit et posèrent sur eux leurs manteaux, et Jésus s’assit dessus. '
  '8':
  - type: text
    content: 'Une grande foule de gens étendirent leurs manteaux sur le chemin. D’autres coupèrent des branches aux arbres et en jonchèrent le chemin. '
  '9':
  - type: text
    content: 'Et toute la foule, de la tête à la fin du cortège, criait :'
  - type: text
    content: Hosanna
  - type: text
    content: ' au Fils de David !'
  - type: text
    content: Béni soit celui qui vient
  - type: text
    content: ' ╵'
  - type: text
    content: au nom du Seigneur !
  - type: text
    content: Hosanna
  - type: text
    content: ' à Dieu au plus haut des cieux'
  - type: note
    content: 'Ps 118.25-26. Hosanna au Fils de David: primitivement, hosanna signifiait « viens à notre secours », mais avec le temps, l’expression avait pris le sens de « gloire, louange à ».'
  - type: text
    content: '  !'
