          text: Es 8.14
        metadata:
          usfm: ISA.8.14
      - type: text
        text: '. Ce verset est absent de plusieurs manuscrits (voir '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Lc 20.18
        metadata:
          usfm: LUK.20.18
      - type: text
        text: ).
    marker-yv: yv-n
