          text: Ps 118.22-23
        metadata:
          usfm: PSA.118.22+PSA.118.23
      - type: text
        text: ' .'
    marker-yv: yv-n
  - type: usfm
    marker: wj
    children:
    - type: text
      text: .
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '43'
  - type: text
    text: ' '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'Voilà pourquoi je vous déclare que le '
    - type: usfm
      marker: w
      children:
      - type: text
        text: royaume de Dieu
    - type: text
      text: ' vous sera enlevé et sera donné à un peuple qui en produira les fruits.'
  - type: text
    text: ' [ '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '44'
  - type: text
    text: 'Mais :'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: wj
    children:
    - type: usfm
      marker: qt
      children:
      - type: text
        text: Celui qui tombera sur cette pierre-là,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: wj
    children:
    - type: usfm
      marker: qt
      children:
      - type: text
        text: se brisera la nuque,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: wj
    children:
    - type: usfm
      marker: qt
      children:
      - type: text
        text: et si elle tombe sur quelqu’un,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: wj
    children:
    - type: usfm
      marker: qt
      children:
      - type: text
        text: elle l’écrasera
    - type: text
      text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '21.44 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Cf. '
      - type: usfm
        marker: ref
