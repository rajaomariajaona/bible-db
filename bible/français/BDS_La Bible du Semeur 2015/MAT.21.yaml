- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '45'
  - type: text
    text: 'Après avoir entendu ces paraboles, les chefs des prêtres et les pharisiens comprirent que c’était eux que Jésus visait. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '46'
  - type: text
    text: Ils cherchaient un moyen de l’arrêter, mais ils avaient peur des réactions de la foule, car tous considéraient Jésus comme un prophète.
