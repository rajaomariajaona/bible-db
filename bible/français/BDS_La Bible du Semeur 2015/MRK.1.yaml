document_id: MRK.1
type_code: fra
segments:
- type: usfm
  marker: ms1
  children:
  - type: text
    text: Préparation du ministère de Jésus
  marker-yv: yv-h
- type: usfm
  marker: s1
  children:
  - type: text
    text: Jean-Baptiste, messager de Dieu
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: (Mt 3.1-12 ; Lc 3.1-6, 15-18 ; voir Jn 1.19-28)
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Ici commence l’Evangile de Jésus-Christ, le Fils de Dieu
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1.1 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'L’expression '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'le Fils de Dieu '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: est absente de certains manuscrits.
    marker-yv: yv-n
  - type: text
    text: ', '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'selon ce qui est écrit dans le livre du prophète Esaïe :'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: qt
    children:
    - type: text
      text: J’enverrai mon messager devant toi,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: qt
    children:
    - type: text
      text: il te préparera le chemin
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1.2 '
    - type: usfm
      marker: ft
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ml 3.1
        metadata:
          usfm: MAL.3.1
      - type: text
        text: ' .'
    marker-yv: yv-n
  - type: usfm
    marker: qt
    children:
    - type: text
      text: .
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: ' '
  - type: usfm
    marker: qt
    children:
    - type: text
      text: On entend la voix de quelqu’un
  - type: text
    text: ' ╵'
  - type: usfm
    marker: qt
    children:
    - type: text
      text: 'qui crie dans le désert :'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: qt
    children:
    - type: text
      text: Préparez le chemin pour le Seigneur,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: qt
    children:
    - type: text
      text: faites-lui des sentiers droits
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1.3 '
    - type: usfm
      marker: ft
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Es 40.3
        metadata:
          usfm: ISA.40.3
      - type: text
        text: ' cité selon l’ancienne version grecque.'
    marker-yv: yv-n
  - type: usfm
    marker: qt
    children:
    - type: text
      text: .
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Jean parut. Il baptisait dans le désert. Il appelait les gens à se faire baptiser en signe d’un profond changement
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1.4 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Autres traductions : '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'se faire baptiser en signe de repentance, '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'ou '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: pour indiquer qu’ils changeaient de comportement.
    marker-yv: yv-n
  - type: text
    text: ', afin de recevoir le pardon de leurs péchés.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Tous les habitants de la Judée et de Jérusalem se rendaient auprès de lui. Ils se faisaient baptiser par lui dans le Jourdain, en reconnaissant publiquement leurs péchés. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Jean était vêtu d’un vêtement de poils de chameau maintenu autour de la taille par une ceinture de cuir. Il se nourrissait de sauterelles et de miel sauvage. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Et voici le message qu’il proclamait : Après moi va venir quelqu’un qui est plus puissant que moi. Je ne suis pas digne de me baisser devant lui pour dénouer la lanière de ses sandales. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Moi, je vous ai baptisés dans l’eau, mais lui, il vous baptisera dans le Saint-Esprit.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Le baptême et la tentation de Jésus
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: (Mt 3.13-17 ; Lc 3.21-22)
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Or, en ce temps-là, Jésus vint de Nazareth, un village de Galilée. Il fut baptisé par Jean dans le Jourdain. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Au moment où il sortait de l’eau, il vit le ciel se déchirer et l’Esprit descendre sur lui comme une colombe. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Une voix retentit alors du ciel : Tu es mon Fils bien-aimé, tu fais toute ma joie.'
- type: usfm
  marker: r
  children:
  - type: text
    text: (Mt 4.1-11 ; Lc 4.1-13)
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Aussitôt, l’Esprit poussa Jésus dans le désert. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Il y resta quarante jours et y fut tenté par Satan. Il était avec les bêtes sauvages, et les anges le servaient.
- type: usfm
  marker: ms1
  children:
  - type: text
    text: Ministère de Jésus en Galilée
  marker-yv: yv-h
- type: usfm
  marker: s1
  children:
  - type: text
    text: Les premiers disciples
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: (Mt 4.12-17 ; Lc 4.14-15)
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Lorsque Jean eut été arrêté, Jésus se rendit en Galilée. Il y prêcha la Bonne Nouvelle de l’Evangile qui vient de Dieu. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Il disait : '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Le temps est accompli. Le royaume de Dieu
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1.15 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'D’autres comprennent : '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: le règne de Dieu.
    marker-yv: yv-n
  - type: text
    text: ' '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: est proche. Changez
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1.15 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Autres traductions : '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'repentez-vous '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'ou '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'changez d’attitude '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'ou '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: changez de comportement.
    marker-yv: yv-n
  - type: text
    text: ' '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: et croyez à l’Evangile.
- type: usfm
  marker: r
  children:
  - type: text
    text: (Mt 4.18-22 ; Lc 5.1-3, 10-11)
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Un jour, comme il longeait le lac de Galilée, il vit Simon et André, son frère. Ils lançaient un filet dans le lac, car ils étaient pêcheurs.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Jésus leur dit : '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Suivez-moi et je ferai de vous des pêcheurs d’hommes.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Ils abandonnèrent aussitôt leurs filets et le suivirent. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Poursuivant son chemin, il vit, un peu plus loin, Jacques, fils de Zébédée, et Jean son frère. Eux aussi étaient dans leur bateau et réparaient les filets. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Aussitôt, il les appela. Ils laissèrent Zébédée, leur père, dans le bateau, avec ses ouvriers, et suivirent Jésus.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Exorcismes, guérisons et prédication
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: (Lc 4.31-37)
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Ils se rendirent à Capernaüm. Le jour du sabbat, Jésus entra dans la synagogue et se mit à enseigner
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1.21 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Chaque Juif avait le droit de prendre la parole dans la synagogue pour expliquer les Ecritures.
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: Ses auditeurs étaient profondément impressionnés par son enseignement, car il parlait avec une autorité que n’avaient pas les spécialistes de la Loi.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Or, il se trouvait juste à ce moment-là, dans leur synagogue, un homme qui était sous l’emprise d’un esprit mauvais. Il se mit à crier : '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: Que nous veux-tu, Jésus de Nazareth ? Es-tu venu pour nous détruire
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1.24 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Autre traduction : '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: tu es venu pour nous détruire.
    marker-yv: yv-n
  - type: text
    text: '  ? Je sais qui tu es ! Tu es le Saint envoyé par Dieu !'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Mais, d’un ton sévère, Jésus lui ordonna : '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Tais-toi, et sors de cet homme !
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: Alors l’esprit mauvais secoua l’homme de convulsions et sortit de lui en poussant un grand cri.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'Tous furent saisis de stupeur ; ils se demandaient entre eux : Que se passe-t-il ? Voilà un enseignement nouveau, et donné avec autorité ! Il commande même aux esprits mauvais, et ils lui obéissent !'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: Aussitôt, sa réputation se répandit dans toute la Galilée.
- type: usfm
  marker: r
  children:
  - type: text
    text: (Mt 8.14-15 ; Lc 4.38-39)
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'Sortant de la synagogue, Jésus se rendit avec Jacques et Jean à la maison de Simon et d’André. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'La belle-mère de Simon était couchée, avec une forte fièvre. Aussitôt, ils lui parlèrent d’elle. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: Il s’approcha, lui prit la main, la fit lever. La fièvre la quitta, et elle se mit à les servir.
- type: usfm
  marker: r
  children:
  - type: text
    text: (Mt 4.24 ; 8.16-17 ; Lc 4.40-41)
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: Le soir, après le coucher du soleil, on lui amena tous les malades
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1.32 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Car le sabbat se terminait après le coucher du soleil. On pouvait alors de nouveau transporter des malades.
    marker-yv: yv-n
  - type: text
    text: ' et tous ceux qui étaient sous l’emprise de démons. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: 'La ville entière se pressait devant la porte de la maison. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: Il guérit beaucoup de personnes atteintes de diverses maladies. Il chassa aussi beaucoup de démons et leur défendit de parler, car ceux-ci savaient qui il était.
- type: usfm
  marker: r
  children:
  - type: text
    text: (Lc 4.42-44)
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: Le lendemain, bien avant l’aube, en pleine nuit, il se leva et sortit. Il alla dans un lieu désert pour y prier.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: 'Simon et ses compagnons partirent à sa recherche. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: 'Quand ils l’eurent trouvé, ils lui dirent : Tout le monde te cherche.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: text
    text: ' '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: – Allons ailleurs,
  - type: text
    text: ' leur répondit-il, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: dans les villages voisins ! Il faut que j’y annonce aussi mon message. Car c’est pour cela que je suis venuj.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '39'
  - type: text
    text: 'Et il partit à travers toute la Galilée : il prêchait dans leurs synagogues et chassait les démons.'
- type: usfm
  marker: r
  children:
  - type: text
    text: (Mt 8.1-4 ; Lc 5.12-16)
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '40'
  - type: text
    text: Un lépreux s’approcha de lui. Il le supplia, tomba à genoux
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1.40 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'L’expression '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'tomba à genoux '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: est absente de certains manuscrits.
    marker-yv: yv-n
  - type: text
    text: ' devant lui et lui dit : Si tu le veux, tu peux me rendre pur.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '41'
  - type: text
    text: Jésus, pris de compassion pour lui
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1.41 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'A la place de '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'pris de compassion pour lui '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'certains manuscrits ont : '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'en colère contre lui. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'C’est pourquoi d’autres traduisent : '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'Jésus irrité de son attitude le renvoya. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: En effet, le lépreux n’aurait pas dû pénétrer dans le village.
    marker-yv: yv-n
  - type: text
    text: ', tendit la main, le toucha et lui dit : '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Je le veux, sois pur.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '42'
  - type: text
    text: Aussitôt, la lèpre le quitta et il fut pur.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '43'
  - type: text
    text: 'Jésus lui fit de sévères recommandations et le renvoya aussitôt : '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '44'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'Attention, ne dis rien à personne, mais va te faire examiner par le '
    - type: usfm
      marker: w
      children:
      - type: text
        text: prêtre
    - type: text
      text: ' et apporte l’offrande prescrite par '
    - type: usfm
      marker: w
      children:
