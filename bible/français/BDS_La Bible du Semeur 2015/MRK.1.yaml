  - type: text
    text: Mais lui, à peine sorti, se mit à proclamer à tout le monde ce qui lui était arrivé et il répandit la nouvelle partout. A cause de cela, Jésus ne pouvait plus aller ouvertement dans une localité ; il se tenait en dehors, dans des lieux déserts ; et on venait à lui de toutes parts.
