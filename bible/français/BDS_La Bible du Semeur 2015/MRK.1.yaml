document_id: MRK.1,21
type_code: fra
verses:
  '1':
  - type: heading
    content: Préparation du ministère de Jésus
  - type: heading
    content: Jean-Baptiste, messager de Dieu
  - type: heading
    content: (Mt 3.1-12 ; Lc 3.1-6, 15-18 ; voir Jn 1.19-28)
  - type: text
    content: Ici commence l’Evangile de Jésus-Christ, le Fils de Dieu
  - type: note
    content: L’expression le Fils de Dieu est absente de certains manuscrits.
  - type: text
    content: ', '
  '10':
  - type: text
    content: 'Au moment où il sortait de l’eau, il vit le ciel se déchirer et l’Esprit descendre sur lui comme une colombe. '
  '11':
  - type: text
    content: 'Une voix retentit alors du ciel : Tu es mon Fils bien-aimé, tu fais toute ma joie.'
  - type: heading
    content: (Mt 4.1-11 ; Lc 4.1-13)
  '12':
  - type: text
    content: 'Aussitôt, l’Esprit poussa Jésus dans le désert. '
  '13':
  - type: text
    content: Il y resta quarante jours et y fut tenté par Satan. Il était avec les bêtes sauvages, et les anges le servaient.
  - type: heading
    content: Ministère de Jésus en Galilée
  - type: heading
    content: Les premiers disciples
  - type: heading
    content: (Mt 4.12-17 ; Lc 4.14-15)
  '14':
  - type: text
    content: 'Lorsque Jean eut été arrêté, Jésus se rendit en Galilée. Il y prêcha la Bonne Nouvelle de l’Evangile qui vient de Dieu. '
  '15':
  - type: text
    content: 'Il disait : '
  - type: text
    content: Le temps est accompli. Le royaume de Dieu
  - type: note
    content: 'D’autres comprennent : le règne de Dieu.'
  - type: text
    content: ' '
  - type: text
    content: est proche. Changez
  - type: note
    content: 'Autres traductions : repentez-vous ou changez d’attitude ou changez de comportement.'
  - type: text
    content: ' '
  - type: text
    content: et croyez à l’Evangile.
  - type: heading
    content: (Mt 4.18-22 ; Lc 5.1-3, 10-11)
  '16':
  - type: text
    content: Un jour, comme il longeait le lac de Galilée, il vit Simon et André, son frère. Ils lançaient un filet dans le lac, car ils étaient pêcheurs.
  '17':
  - type: text
    content: 'Jésus leur dit : '
  - type: text
    content: Suivez-moi et je ferai de vous des pêcheurs d’hommes.
  '18':
  - type: text
    content: 'Ils abandonnèrent aussitôt leurs filets et le suivirent. '
  '19':
  - type: text
    content: 'Poursuivant son chemin, il vit, un peu plus loin, Jacques, fils de Zébédée, et Jean son frère. Eux aussi étaient dans leur bateau et réparaient les filets. '
  '2':
  - type: text
    content: 'selon ce qui est écrit dans le livre du prophète Esaïe :'
  - type: text
    content: J’enverrai mon messager devant toi,
  - type: text
    content: il te préparera le chemin
  - type: text
    content: ' '
  - type: note
    content: Ml 3.1 .
  - type: text
    content: .
  '20':
  - type: text
    content: Aussitôt, il les appela. Ils laissèrent Zébédée, leur père, dans le bateau, avec ses ouvriers, et suivirent Jésus.
  - type: heading
    content: Exorcismes, guérisons et prédication
  - type: heading
    content: (Lc 4.31-37)
  '21':
  - type: text
    content: Ils se rendirent à Capernaüm. Le jour du sabbat, Jésus entra dans la synagogue et se mit à enseigner
  - type: note
    content: Chaque Juif avait le droit de prendre la parole dans la synagogue pour expliquer les Ecritures.
  - type: text
    content: '. '
  '22':
  - type: text
    content: Ses auditeurs étaient profondément impressionnés par son enseignement, car il parlait avec une autorité que n’avaient pas les spécialistes de la Loi.
  '23':
  - type: text
    content: 'Or, il se trouvait juste à ce moment-là, dans leur synagogue, un homme qui était sous l’emprise d’un esprit mauvais. Il se mit à crier : '
  '24':
  - type: text
    content: Que nous veux-tu, Jésus de Nazareth ? Es-tu venu pour nous détruire
  - type: note
    content: 'Autre traduction : tu es venu pour nous détruire.'
  - type: text
    content: '  ? Je sais qui tu es ! Tu es le Saint envoyé par Dieu !'
  '25':
  - type: text
    content: 'Mais, d’un ton sévère, Jésus lui ordonna : '
  - type: text
    content: Tais-toi, et sors de cet homme !
  '26':
  - type: text
    content: Alors l’esprit mauvais secoua l’homme de convulsions et sortit de lui en poussant un grand cri.
  '27':
  - type: text
    content: 'Tous furent saisis de stupeur ; ils se demandaient entre eux : Que se passe-t-il ? Voilà un enseignement nouveau, et donné avec autorité ! Il commande même aux esprits mauvais, et ils lui obéissent !'
  '28':
  - type: text
    content: Aussitôt, sa réputation se répandit dans toute la Galilée.
  - type: heading
    content: (Mt 8.14-15 ; Lc 4.38-39)
  '29':
  - type: text
    content: 'Sortant de la synagogue, Jésus se rendit avec Jacques et Jean à la maison de Simon et d’André. '
  '3':
  - type: text
    content: ' '
  - type: text
    content: On entend la voix de quelqu’un
  - type: text
    content: ' ╵'
  - type: text
    content: 'qui crie dans le désert :'
  - type: text
    content: Préparez le chemin pour le Seigneur,
  - type: text
    content: faites-lui des sentiers droits
  - type: text
    content: ' '
  - type: note
    content: Es 40.3 cité selon l’ancienne version grecque.
  - type: text
    content: .
  '30':
  - type: text
    content: 'La belle-mère de Simon était couchée, avec une forte fièvre. Aussitôt, ils lui parlèrent d’elle. '
  '31':
  - type: text
    content: Il s’approcha, lui prit la main, la fit lever. La fièvre la quitta, et elle se mit à les servir.
  - type: heading
    content: (Mt 4.24 ; 8.16-17 ; Lc 4.40-41)
  '32':
  - type: text
    content: Le soir, après le coucher du soleil, on lui amena tous les malades
  - type: note
    content: Car le sabbat se terminait après le coucher du soleil. On pouvait alors de nouveau transporter des malades.
  - type: text
    content: ' et tous ceux qui étaient sous l’emprise de démons. '
  '33':
  - type: text
    content: 'La ville entière se pressait devant la porte de la maison. '
  '34':
  - type: text
    content: Il guérit beaucoup de personnes atteintes de diverses maladies. Il chassa aussi beaucoup de démons et leur défendit de parler, car ceux-ci savaient qui il était.
  - type: heading
    content: (Lc 4.42-44)
  '35':
  - type: text
    content: Le lendemain, bien avant l’aube, en pleine nuit, il se leva et sortit. Il alla dans un lieu désert pour y prier.
  '36':
  - type: text
    content: 'Simon et ses compagnons partirent à sa recherche. '
  '37':
  - type: text
    content: 'Quand ils l’eurent trouvé, ils lui dirent : Tout le monde te cherche.'
  '38':
  - type: text
    content: ' '
  - type: text
    content: – Allons ailleurs,
  - type: text
    content: ' leur répondit-il, '
  - type: text
    content: dans les villages voisins ! Il faut que j’y annonce aussi mon message. Car c’est pour cela que je suis venuj.
  '39':
  - type: text
    content: 'Et il partit à travers toute la Galilée : il prêchait dans leurs synagogues et chassait les démons.'
  - type: heading
    content: (Mt 8.1-4 ; Lc 5.12-16)
  '4':
  - type: text
    content: Jean parut. Il baptisait dans le désert. Il appelait les gens à se faire baptiser en signe d’un profond changement
  - type: note
    content: 'Autres traductions : se faire baptiser en signe de repentance, ou pour indiquer qu’ils changeaient de comportement.'
  - type: text
    content: ', afin de recevoir le pardon de leurs péchés.'
  '40':
  - type: text
    content: Un lépreux s’approcha de lui. Il le supplia, tomba à genoux
  - type: note
    content: L’expression tomba à genoux est absente de certains manuscrits.
  - type: text
    content: ' devant lui et lui dit : Si tu le veux, tu peux me rendre pur.'
  '41':
  - type: text
    content: Jésus, pris de compassion pour lui
  - type: note
    content: 'A la place de pris de compassion pour lui certains manuscrits ont : en colère contre lui. C’est pourquoi d’autres traduisent : Jésus irrité de son attitude le renvoya. En effet, le lépreux n’aurait pas dû pénétrer dans le village.'
  - type: text
    content: ', tendit la main, le toucha et lui dit : '
  - type: text
    content: Je le veux, sois pur.
  '42':
  - type: text
    content: Aussitôt, la lèpre le quitta et il fut pur.
  '43':
  - type: text
    content: 'Jésus lui fit de sévères recommandations et le renvoya aussitôt : '
  '44':
  - type: text
    content: 'Attention, ne dis rien à personne, mais va te faire examiner par le '
  - type: text
    content: prêtre
  - type: text
    content: ' et apporte l’offrande prescrite par '
  - type: text
    content: Moïse
  - type: text
    content: ' pour ta '
  - type: text
    content: purification
  - type: text
    content: . Cela leur servira de témoignagel.
  '45':
  - type: text
    content: Mais lui, à peine sorti, se mit à proclamer à tout le monde ce qui lui était arrivé et il répandit la nouvelle partout. A cause de cela, Jésus ne pouvait plus aller ouvertement dans une localité ; il se tenait en dehors, dans des lieux déserts ; et on venait à lui de toutes parts.
  '5':
  - type: text
    content: 'Tous les habitants de la Judée et de Jérusalem se rendaient auprès de lui. Ils se faisaient baptiser par lui dans le Jourdain, en reconnaissant publiquement leurs péchés. '
  '6':
  - type: text
    content: 'Jean était vêtu d’un vêtement de poils de chameau maintenu autour de la taille par une ceinture de cuir. Il se nourrissait de sauterelles et de miel sauvage. '
  '7':
  - type: text
    content: 'Et voici le message qu’il proclamait : Après moi va venir quelqu’un qui est plus puissant que moi. Je ne suis pas digne de me baisser devant lui pour dénouer la lanière de ses sandales. '
  '8':
  - type: text
    content: Moi, je vous ai baptisés dans l’eau, mais lui, il vous baptisera dans le Saint-Esprit.
  - type: heading
    content: Le baptême et la tentation de Jésus
  - type: heading
    content: (Mt 3.13-17 ; Lc 3.21-22)
  '9':
  - type: text
    content: 'Or, en ce temps-là, Jésus vint de Nazareth, un village de Galilée. Il fut baptisé par Jean dans le Jourdain. '
