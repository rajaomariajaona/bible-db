document_id: MAT.13
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Les paraboles du royaume
  marker-yv: yv-h
- type: usfm
  marker: s2
  children:
  - type: text
    text: La parabole du semeur
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: (Mc 4.1-9 ; Lc 8.4-8)
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Ce jour-là, Jésus sortit de la maison où il se trouvait et alla s’asseoir au bord du lac. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Autour de lui la foule se rassembla si nombreuse qu’il dut monter dans un bateau. Il s’y assit. La foule se tenait sur le rivage.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Il prit la parole et leur exposa bien des choses sous forme de paraboles. Il leur dit : '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Un semeur sortit pour semer.
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Alors qu’il répandait sa semence, des grains tombèrent au bord du chemin ; les oiseaux vinrent et les mangèrent.
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: D’autres tombèrent sur un sol rocailleux et, ne trouvant qu’une mince couche de terre, ils levèrent rapidement parce que la terre n’était pas profonde.
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Mais quand le soleil fut monté haut dans le ciel, les petits plants furent vite brûlés et, comme ils n’avaient pas vraiment pris racine, ils séchèrent.
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: D’autres grains tombèrent parmi les ronces. Celles-ci grandirent et étouffèrent les jeunes pousses.
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: D’autres grains enfin tombèrent sur la bonne terre et donnèrent du fruit avec un rendement de cent, soixante, ou trente pour un.
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Celui qui a des oreilles, qu’il entende !
- type: usfm
  marker: r
  children:
  - type: text
    text: (Mc 4.10-12 ; Lc 8.9-10)
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Alors ses disciples s’approchèrent et lui demandèrent : Pourquoi te sers-tu de paraboles pour leur parler ?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Il leur répondit : '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'Vous avez reçu le privilège de connaître les secrets du '
    - type: usfm
      marker: w
      children:
      - type: text
        text: royaume des cieux
    - type: text
      text: ', mais eux ne l’ont pas reçu.'
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Car à celui qui a, on donnera encore, jusqu’à ce qu’il soit dans l’abondance ; mais à celui qui n’a pas, on ôtera même ce qu’il a.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: ' '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'Voici pourquoi je me sers de paraboles, pour leur parler : c’est que, bien qu’ils regardent, ils ne voient pas, et bien qu’ils écoutent, ils n’entendent pas et ne comprennent pas.'
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Pour eux s’accomplit cette prophétie d’
    - type: usfm
      marker: w
      children:
      - type: text
        text: Esaïe
    - type: text
      text: '  :'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: wj
    children:
    - type: usfm
      marker: qt
      children:
      - type: text
        text: Vous aurez beau entendre,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: wj
    children:
    - type: usfm
      marker: qt
      children:
      - type: text
        text: vous ne comprendrez pas.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: wj
    children:
    - type: usfm
      marker: qt
      children:
      - type: text
        text: Vous aurez beau voir de vos propres yeux,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: wj
    children:
    - type: usfm
      marker: qt
      children:
      - type: text
        text: vous ne saisirez pas.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: ' '
  - type: usfm
    marker: wj
    children:
    - type: usfm
      marker: qt
      children:
      - type: text
        text: Car ce peuple est devenu insensible,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: wj
    children:
    - type: usfm
      marker: qt
      children:
      - type: text
        text: ils ont fait la sourde oreille
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: wj
    children:
    - type: usfm
      marker: qt
      children:
      - type: text
        text: et ils se sont bouché les yeux,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: wj
    children:
    - type: usfm
      marker: qt
      children:
      - type: text
        text: de peur qu’ils voient de leurs yeux,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: wj
    children:
    - type: usfm
      marker: qt
      children:
      - type: text
        text: et qu’ils entendent de leurs oreilles,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: wj
    children:
    - type: usfm
      marker: qt
      children:
      - type: text
        text: de peur qu’ils comprennent,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: wj
    children:
    - type: usfm
      marker: qt
      children:
      - type: text
        text: qu’ils reviennent à moi
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: wj
    children:
    - type: usfm
      marker: qt
      children:
      - type: text
        text: et que je les guérisse
    - type: text
      text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '13.15 '
    - type: usfm
      marker: ft
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Es 6.9-10
        metadata:
          usfm: ISA.6.9+ISA.6.10
      - type: text
        text: ' cité selon l’ancienne version grecque.'
    marker-yv: yv-n
  - type: usfm
    marker: wj
    children:
    - type: usfm
      marker: qt
      children:
      - type: text
        text: .
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: ' '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Vous, au contraire, vous êtes heureux, vos yeux voient et vos oreilles entendent !
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'Vraiment, je vous l’assure : beaucoup de '
    - type: usfm
      marker: w
      children:
      - type: text
        text: prophètes
    - type: text
      text: ' et de justes ont désiré voir ce que vous voyez, mais ne l’ont pas vu ; ils ont désiré entendre ce que vous entendez, mais ne l’ont pas entendu.'
- type: usfm
  marker: r
  children:
  - type: text
    text: (Mc 4.13-20 ; Lc 8.11-15)
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: ' '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'Vous donc, écoutez ce que signifie la parabole du semeur :'
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Chaque fois que quelqu’un entend le message qui concerne le royaume et ne le comprend pas, le diable
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '13.19 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Autre traduction : '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: le mal.
    marker-yv: yv-n
  - type: text
    text: ' '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: vient arracher ce qui a été semé dans son cœur. Tel est celui qui a reçu la semence « au bord du chemin ».
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'Puis il y a celui qui reçoit la semence « sur le sol rocailleux » : quand il entend la Parole, il l’accepte aussitôt avec joie.'
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Mais il ne la laisse pas prendre racine en lui, car il est inconstant. Que surviennent des difficultés ou la persécution à cause de la Parole, le voilà qui abandonne tout.
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Un autre encore a reçu la semence « parmi les ronces ». C’est celui qui écoute la Parole, mais en qui elle ne porte pas de fruit
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '13.22 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Autre traduction : '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: mais qui ne porte pas de fruit.
    marker-yv: yv-n
  - type: text
    text: ' '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: parce qu’elle est étouffée par les soucis de ce monde et par l’attrait trompeur des richesses.
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'Un autre enfin a reçu la semence « sur la bonne terre ». C’est celui qui écoute la Parole et la comprend. Alors il porte du fruit : chez l’un, un grain en rapporte cent, chez un autre soixante, chez un autre trente.'
- type: usfm
  marker: s2
  children:
  - type: text
    text: La parabole de la mauvaise herbe
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Il leur proposa une autre parabole : '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'Il en est du '
    - type: usfm
      marker: w
      children:
      - type: text
        text: royaume des cieux
    - type: text
      text: ' comme d’un homme qui avait semé du bon grain dans son champ.'
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Pendant que tout le monde dormait, son ennemi sema une mauvaise herbe au milieu du blé, puis s’en alla.
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Quand le blé eut poussé et produit des épis, on vit aussi apparaître la mauvaise herbe.
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'Les serviteurs du propriétaire de ce champ vinrent lui demander : Maître, n’est-ce pas du bon grain que tu as semé dans ton champ ? D’où vient donc cette mauvaise herbe ?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: ' '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'Il leur répondit : C’est un ennemi qui a fait cela !'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'Alors les serviteurs demandèrent : Veux-tu donc que nous arrachions cette mauvaise herbe ?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: ' '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: – Non, répondit le maître, car en enlevant la mauvaise herbe, vous risqueriez d’arracher le blé en même temps.
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'Laissez pousser les deux ensemble jusqu’à la moisson. A ce moment-là, je dirai aux moissonneurs : « Enlevez d’abord la mauvaise herbe et liez-la en bottes pour la brûler : ensuite vous couperez le blé et vous le rentrerez dans mon grenier. »'
- type: usfm
  marker: s2
  children:
  - type: text
    text: Les paraboles de la graine de moutarde et du levain
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: (Mc 4.30-32 ; Lc 13.18-19)
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'Jésus leur raconta une autre parabole : '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'Le '
    - type: usfm
      marker: w
      children:
      - type: text
        text: royaume des cieux
    - type: text
      text: ' ressemble à une graine de moutarde qu’un homme a prise pour la semer dans son champ.'
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '32'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: C’est la plus petite de toutes les semences ; mais quand elle a poussé, elle dépasse les autres plantes du potager et devient un arbuste, si bien que les oiseaux du ciel viennent nicher dans ses branches.
- type: usfm
  marker: r
  children:
  - type: text
    text: (Lc 13.20-21)
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '33'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: 'Il leur raconta une autre parabole : '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'Le royaume des cieux ressemble à du '
    - type: usfm
      marker: w
      children:
      - type: text
        text: levain
    - type: text
      text: ' qu’une femme a pris pour le mélanger à une vingtaine de kilogrammes de farine. Et à la fin, toute la pâte a levé.'
- type: usfm
  marker: r
  children:
  - type: text
    text: (Mc 4.33-34)
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '34'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: 'Jésus enseigna toutes ces choses aux foules en employant des paraboles, et il ne leur parlait pas sans paraboles. '
  - type: usfm
    marker: v
    metadata:
      v: '35'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: 'Ainsi s’accomplissait la parole du prophète :'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: qt
    children:
    - type: text
      text: J’énoncerai des paraboles,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: qt
    children:
    - type: text
      text: je dirai des secrets
  - type: text
    text: ' ╵'
  - type: usfm
    marker: qt
    children:
    - type: text
      text: cachés depuis la création du monde
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '13.35 '
    - type: usfm
      marker: ft
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ps 78.2
        metadata:
          usfm: PSA.78.2
      - type: text
        text: .
    marker-yv: yv-n
  - type: usfm
    marker: qt
    children:
    - type: text
      text: .
- type: usfm
  marker: s2
  children:
  - type: text
    text: La parabole de la mauvaise herbe expliquée
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '36'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: 'Alors Jésus laissa la foule et il rentra dans la maison. Ses disciples vinrent auprès de lui et lui demandèrent : Explique-nous la parabole de la mauvaise herbe dans le champ.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '37'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: 'Il leur répondit : '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'Celui qui sème la bonne semence, c’est le '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Fils de l’homme
    - type: text
      text: '  ;'
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '38'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'le champ, c’est le monde ; la bonne semence, ce sont ceux qui font partie du '
    - type: usfm
      marker: w
      children:
      - type: text
        text: royaume
    - type: text
      text: . La mauvaise herbe, ce sont ceux qui suivent le diable
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '13.38 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Autre traduction : '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: le mal.
    marker-yv: yv-n
  - type: usfm
    marker: wj
    children:
    - type: text
      text: .
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '39'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '39'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'L’ennemi qui a semé les mauvaises graines, c’est le diable ; la moisson, c’est la fin du monde ; les moissonneurs, ce sont les '
    - type: usfm
      marker: w
      children:
      - type: text
        text: anges
    - type: text
      text: .
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '40'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '40'
  - type: text
    text: ' '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'Comme on arrache la mauvaise herbe et qu’on la ramasse pour la jeter au feu, ainsi en sera-t-il à la fin du monde :'
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '41'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '41'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: le Fils de l’homme enverra ses anges et ils élimineront de son royaume tous ceux qui font tomber les autres dans le péché
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '13.41 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Autre traduction : '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: qui détournent les autres de la foi.
    marker-yv: yv-n
  - type: text
    text: ' '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: et ceux qui font le mal.
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '42'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '42'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Ils les précipiteront dans la fournaise ardente où il y aura des pleurs et d’amers regrets.
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '43'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '43'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Alors les justes resplendiront comme le soleil dans le royaume de leur Père. Celui qui a des oreilles, qu’il entende !
- type: usfm
  marker: s2
  children:
  - type: text
    text: Les paraboles du trésor et de la perle
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '44'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '44'
  - type: text
    text: ' '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'Le '
    - type: usfm
      marker: w
      children:
      - type: text
        text: royaume des cieux
    - type: text
      text: ' ressemble à un trésor enfoui dans un champ. Un homme le découvre : il le cache de nouveau, s’en va, débordant de joie, vend tout ce qu’il possède et achète ce champ.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '45'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '45'
  - type: text
    text: ' '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'Voici à quoi ressemble encore le royaume des cieux : un marchand cherche de belles perles.'
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '46'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '46'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Quand il en a trouvé une de grande valeur, il s’en va vendre tout ce qu’il possède et achète cette perle précieuse.
- type: usfm
  marker: s2
  children:
  - type: text
    text: La parabole du filet
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '47'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '47'
  - type: text
    text: ' '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'Voici encore à quoi ressemble le royaume des cieux : des pêcheurs ont jeté en mer un filet qui ramasse toutes sortes de poissons.'
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '48'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '48'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'Une fois qu’il est rempli, les pêcheurs le tirent sur le rivage, puis ils s’assoient autour et trient leur prise : ce qui est bon, ils le mettent dans des paniers et ce qui ne vaut rien, ils le rejettent.'
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '49'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '49'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'C’est ainsi que les choses se passeront à la fin du monde : les '
    - type: usfm
      marker: w
      children:
      - type: text
        text: anges
    - type: text
      text: ' viendront et sépareront les méchants d’avec les justes'
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '50'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '50'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: et ils les précipiteront dans la fournaise ardente où il y aura des pleurs et d’amers regrets.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '51'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '51'
  - type: text
    text: ' '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: – Avez-vous compris tout cela ?
- type: usfm
  marker: p
  children:
  - type: text
    text: – Oui, répondirent-ils.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '52'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '52'
  - type: text
    text: 'Alors Jésus conclut : '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'Ainsi donc, tout '
    - type: usfm
      marker: w
      children:
      - type: text
        text: spécialiste de la Loi
    - type: text
      text: ' qui a été instruit des choses qui concernent le royaume des cieux est semblable à un père de famille qui tire de son trésor des choses nouvelles et des choses anciennes.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '53'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '53'
  - type: text
    text: Quand Jésus eut fini de raconter ces paraboles, il partit de là.
- type: usfm
  marker: ms1
  children:
  - type: text
    text: 'L’Évangile : le rejet et la foi'
  marker-yv: yv-h
- type: usfm
  marker: s1
  children:
  - type: text
    text: Jésus rejeté à Nazareth
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: (Mc 6.1-6 ; Lc 4.16-30)
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '54'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '54'
  - type: text
    text: Il retourna dans la ville où il avait vécu
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '13.54 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: C’est-à-dire à Nazareth (voir 2.23 ; Lc 4.16).
    marker-yv: yv-n
  - type: text
    text: '. Il enseignait ses concitoyens dans leur synagogue. Son enseignement les impressionnait, si bien qu’ils disaient : D’où tient-il cette sagesse et le pouvoir d’accomplir ces miracles ? '
  - type: usfm
    marker: v
    metadata:
      v: '55'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '55'
  - type: text
    text: 'N’est-il pas le fils du charpentier ? N’est-il pas le fils de Marie, et le frère de Jacques, de Joseph, de Simon et de Jude ! '
  - type: usfm
    marker: v
    metadata:
      v: '56'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '56'
  - type: text
    text: Ses sœurs ne vivent-elles pas toutes parmi nous ? D’où a-t-il reçu tout cela ?
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '57'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '57'
  - type: text
    text: Et voilà pourquoi ils trouvaient en lui un obstacle à la foi.
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Alors Jésus leur dit : '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'C’est seulement dans sa patrie et dans sa propre famille que l’on refuse d’honorer un '
    - type: usfm
      marker: w
      children:
      - type: text
        text: prophète
    - type: text
      text: .
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '58'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '58'
  - type: text
    text: Aussi ne fit-il là que peu de miracles, à cause de leur incrédulité.
