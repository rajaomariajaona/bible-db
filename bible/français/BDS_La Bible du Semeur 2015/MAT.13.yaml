document_id: MAT.13,21
type_code: fra
verses:
  '1':
  - type: heading
    content: Les paraboles du royaume
  - type: heading
    content: La parabole du semeur
  - type: heading
    content: (Mc 4.1-9 ; Lc 8.4-8)
  - type: text
    content: 'Ce jour-là, Jésus sortit de la maison où il se trouvait et alla s’asseoir au bord du lac. '
  '10':
  - type: text
    content: 'Alors ses disciples s’approchèrent et lui demandèrent : Pourquoi te sers-tu de paraboles pour leur parler ?'
  '11':
  - type: text
    content: 'Il leur répondit : '
  - type: text
    content: 'Vous avez reçu le privilège de connaître les secrets du '
  - type: text
    content: royaume des cieux
  - type: text
    content: ', mais eux ne l’ont pas reçu.'
  - type: text
    content: ' '
  '12':
  - type: text
    content: Car à celui qui a, on donnera encore, jusqu’à ce qu’il soit dans l’abondance ; mais à celui qui n’a pas, on ôtera même ce qu’il a.
  '13':
  - type: text
    content: ' '
  - type: text
    content: 'Voici pourquoi je me sers de paraboles, pour leur parler : c’est que, bien qu’ils regardent, ils ne voient pas, et bien qu’ils écoutent, ils n’entendent pas et ne comprennent pas.'
  - type: text
    content: ' '
  '14':
  - type: text
    content: Pour eux s’accomplit cette prophétie d’
  - type: text
    content: Esaïe
  - type: text
    content: '  :'
  - type: text
    content: Vous aurez beau entendre,
  - type: text
    content: vous ne comprendrez pas.
  - type: text
    content: Vous aurez beau voir de vos propres yeux,
  - type: text
    content: vous ne saisirez pas.
  '15':
  - type: text
    content: ' '
  - type: text
    content: Car ce peuple est devenu insensible,
  - type: text
    content: ils ont fait la sourde oreille
  - type: text
    content: et ils se sont bouché les yeux,
  - type: text
    content: de peur qu’ils voient de leurs yeux,
  - type: text
    content: et qu’ils entendent de leurs oreilles,
  - type: text
    content: de peur qu’ils comprennent,
  - type: text
    content: qu’ils reviennent à moi
  - type: text
    content: et que je les guérisse
  - type: text
    content: ' '
  - type: note
    content: Es 6.9-10 cité selon l’ancienne version grecque.
  - type: text
    content: .
  '16':
  - type: text
    content: ' '
  - type: text
    content: Vous, au contraire, vous êtes heureux, vos yeux voient et vos oreilles entendent !
  - type: text
    content: ' '
  '17':
  - type: text
    content: 'Vraiment, je vous l’assure : beaucoup de '
  - type: text
    content: prophètes
  - type: text
    content: ' et de justes ont désiré voir ce que vous voyez, mais ne l’ont pas vu ; ils ont désiré entendre ce que vous entendez, mais ne l’ont pas entendu.'
  - type: heading
    content: (Mc 4.13-20 ; Lc 8.11-15)
  '18':
  - type: text
    content: ' '
  - type: text
    content: 'Vous donc, écoutez ce que signifie la parabole du semeur :'
  - type: text
    content: ' '
  '19':
  - type: text
    content: Chaque fois que quelqu’un entend le message qui concerne le royaume et ne le comprend pas, le diable
  - type: note
    content: 'Autre traduction : le mal.'
  - type: text
    content: ' '
  - type: text
    content: vient arracher ce qui a été semé dans son cœur. Tel est celui qui a reçu la semence « au bord du chemin ».
  - type: text
    content: ' '
  '2':
  - type: text
    content: Autour de lui la foule se rassembla si nombreuse qu’il dut monter dans un bateau. Il s’y assit. La foule se tenait sur le rivage.
  '20':
  - type: text
    content: 'Puis il y a celui qui reçoit la semence « sur le sol rocailleux » : quand il entend la Parole, il l’accepte aussitôt avec joie.'
  - type: text
    content: ' '
  '21':
  - type: text
    content: Mais il ne la laisse pas prendre racine en lui, car il est inconstant. Que surviennent des difficultés ou la persécution à cause de la Parole, le voilà qui abandonne tout.
  - type: text
    content: ' '
  '22':
  - type: text
    content: Un autre encore a reçu la semence « parmi les ronces ». C’est celui qui écoute la Parole, mais en qui elle ne porte pas de fruit
  - type: note
    content: 'Autre traduction : mais qui ne porte pas de fruit.'
  - type: text
    content: ' '
  - type: text
    content: parce qu’elle est étouffée par les soucis de ce monde et par l’attrait trompeur des richesses.
  - type: text
    content: ' '
  '23':
  - type: text
    content: 'Un autre enfin a reçu la semence « sur la bonne terre ». C’est celui qui écoute la Parole et la comprend. Alors il porte du fruit : chez l’un, un grain en rapporte cent, chez un autre soixante, chez un autre trente.'
  - type: heading
    content: La parabole de la mauvaise herbe
  '24':
  - type: text
    content: 'Il leur proposa une autre parabole : '
  - type: text
    content: 'Il en est du '
  - type: text
    content: royaume des cieux
  - type: text
    content: ' comme d’un homme qui avait semé du bon grain dans son champ.'
  - type: text
    content: ' '
  '25':
  - type: text
    content: Pendant que tout le monde dormait, son ennemi sema une mauvaise herbe au milieu du blé, puis s’en alla.
  - type: text
    content: ' '
  '26':
  - type: text
    content: Quand le blé eut poussé et produit des épis, on vit aussi apparaître la mauvaise herbe.
  - type: text
    content: ' '
  '27':
  - type: text
    content: 'Les serviteurs du propriétaire de ce champ vinrent lui demander : Maître, n’est-ce pas du bon grain que tu as semé dans ton champ ? D’où vient donc cette mauvaise herbe ?'
  '28':
  - type: text
    content: ' '
  - type: text
    content: 'Il leur répondit : C’est un ennemi qui a fait cela !'
  - type: text
    content: 'Alors les serviteurs demandèrent : Veux-tu donc que nous arrachions cette mauvaise herbe ?'
  '29':
  - type: text
    content: ' '
  - type: text
    content: – Non, répondit le maître, car en enlevant la mauvaise herbe, vous risqueriez d’arracher le blé en même temps.
  - type: text
    content: ' '
  '3':
  - type: text
    content: 'Il prit la parole et leur exposa bien des choses sous forme de paraboles. Il leur dit : '
  - type: text
    content: Un semeur sortit pour semer.
  - type: text
    content: ' '
  '30':
  - type: text
    content: 'Laissez pousser les deux ensemble jusqu’à la moisson. A ce moment-là, je dirai aux moissonneurs : « Enlevez d’abord la mauvaise herbe et liez-la en bottes pour la brûler : ensuite vous couperez le blé et vous le rentrerez dans mon grenier. »'
  - type: heading
    content: Les paraboles de la graine de moutarde et du levain
  - type: heading
    content: (Mc 4.30-32 ; Lc 13.18-19)
  '31':
  - type: text
    content: 'Jésus leur raconta une autre parabole : '
  - type: text
    content: 'Le '
  - type: text
    content: royaume des cieux
  - type: text
    content: ' ressemble à une graine de moutarde qu’un homme a prise pour la semer dans son champ.'
  - type: text
    content: ' '
  '32':
  - type: text
    content: C’est la plus petite de toutes les semences ; mais quand elle a poussé, elle dépasse les autres plantes du potager et devient un arbuste, si bien que les oiseaux du ciel viennent nicher dans ses branches.
  - type: heading
    content: (Lc 13.20-21)
  '33':
  - type: text
    content: 'Il leur raconta une autre parabole : '
  - type: text
    content: 'Le royaume des cieux ressemble à du '
  - type: text
    content: levain
  - type: text
    content: ' qu’une femme a pris pour le mélanger à une vingtaine de kilogrammes de farine. Et à la fin, toute la pâte a levé.'
  - type: heading
    content: (Mc 4.33-34)
  '34':
  - type: text
    content: 'Jésus enseigna toutes ces choses aux foules en employant des paraboles, et il ne leur parlait pas sans paraboles. '
  '35':
  - type: text
    content: 'Ainsi s’accomplissait la parole du prophète :'
  - type: text
    content: J’énoncerai des paraboles,
  - type: text
    content: je dirai des secrets
  - type: text
    content: ' ╵'
  - type: text
    content: cachés depuis la création du monde
  - type: note
    content: Ps 78.2.
  - type: text
    content: .
  - type: heading
    content: La parabole de la mauvaise herbe expliquée
  '36':
  - type: text
    content: 'Alors Jésus laissa la foule et il rentra dans la maison. Ses disciples vinrent auprès de lui et lui demandèrent : Explique-nous la parabole de la mauvaise herbe dans le champ.'
  '37':
  - type: text
    content: 'Il leur répondit : '
  - type: text
    content: 'Celui qui sème la bonne semence, c’est le '
  - type: text
    content: Fils de l’homme
  - type: text
    content: '  ;'
  - type: text
    content: ' '
  '38':
  - type: text
    content: 'le champ, c’est le monde ; la bonne semence, ce sont ceux qui font partie du '
  - type: text
    content: royaume
  - type: text
    content: . La mauvaise herbe, ce sont ceux qui suivent le diable
  - type: note
    content: 'Autre traduction : le mal.'
  - type: text
    content: .
  - type: text
    content: ' '
  '39':
  - type: text
    content: 'L’ennemi qui a semé les mauvaises graines, c’est le diable ; la moisson, c’est la fin du monde ; les moissonneurs, ce sont les '
  - type: text
    content: anges
  - type: text
    content: .
  '4':
  - type: text
    content: Alors qu’il répandait sa semence, des grains tombèrent au bord du chemin ; les oiseaux vinrent et les mangèrent.
  - type: text
    content: ' '
  '40':
  - type: text
    content: ' '
  - type: text
    content: 'Comme on arrache la mauvaise herbe et qu’on la ramasse pour la jeter au feu, ainsi en sera-t-il à la fin du monde :'
  - type: text
    content: ' '
  '41':
  - type: text
    content: le Fils de l’homme enverra ses anges et ils élimineront de son royaume tous ceux qui font tomber les autres dans le péché
  - type: note
    content: 'Autre traduction : qui détournent les autres de la foi.'
  - type: text
    content: ' '
  - type: text
    content: et ceux qui font le mal.
  - type: text
    content: ' '
  '42':
  - type: text
    content: Ils les précipiteront dans la fournaise ardente où il y aura des pleurs et d’amers regrets.
  - type: text
    content: ' '
  '43':
  - type: text
    content: Alors les justes resplendiront comme le soleil dans le royaume de leur Père. Celui qui a des oreilles, qu’il entende !
  - type: heading
    content: Les paraboles du trésor et de la perle
  '44':
  - type: text
    content: ' '
  - type: text
    content: 'Le '
  - type: text
    content: royaume des cieux
  - type: text
    content: ' ressemble à un trésor enfoui dans un champ. Un homme le découvre : il le cache de nouveau, s’en va, débordant de joie, vend tout ce qu’il possède et achète ce champ.'
  '45':
  - type: text
    content: ' '
  - type: text
    content: 'Voici à quoi ressemble encore le royaume des cieux : un marchand cherche de belles perles.'
  - type: text
    content: ' '
  '46':
  - type: text
    content: Quand il en a trouvé une de grande valeur, il s’en va vendre tout ce qu’il possède et achète cette perle précieuse.
  - type: heading
    content: La parabole du filet
  '47':
  - type: text
    content: ' '
  - type: text
    content: 'Voici encore à quoi ressemble le royaume des cieux : des pêcheurs ont jeté en mer un filet qui ramasse toutes sortes de poissons.'
  - type: text
    content: ' '
  '48':
  - type: text
    content: 'Une fois qu’il est rempli, les pêcheurs le tirent sur le rivage, puis ils s’assoient autour et trient leur prise : ce qui est bon, ils le mettent dans des paniers et ce qui ne vaut rien, ils le rejettent.'
  - type: text
    content: ' '
  '49':
  - type: text
    content: 'C’est ainsi que les choses se passeront à la fin du monde : les '
  - type: text
    content: anges
  - type: text
    content: ' viendront et sépareront les méchants d’avec les justes'
  - type: text
    content: ' '
  '5':
  - type: text
    content: D’autres tombèrent sur un sol rocailleux et, ne trouvant qu’une mince couche de terre, ils levèrent rapidement parce que la terre n’était pas profonde.
  - type: text
    content: ' '
  '50':
  - type: text
    content: et ils les précipiteront dans la fournaise ardente où il y aura des pleurs et d’amers regrets.
  '51':
  - type: text
    content: ' '
  - type: text
    content: – Avez-vous compris tout cela ?
  - type: text
    content: – Oui, répondirent-ils.
  '52':
  - type: text
    content: 'Alors Jésus conclut : '
  - type: text
    content: 'Ainsi donc, tout '
  - type: text
    content: spécialiste de la Loi
  - type: text
    content: ' qui a été instruit des choses qui concernent le royaume des cieux est semblable à un père de famille qui tire de son trésor des choses nouvelles et des choses anciennes.'
  '53':
  - type: text
    content: Quand Jésus eut fini de raconter ces paraboles, il partit de là.
  - type: heading
    content: 'L’Évangile : le rejet et la foi'
  - type: heading
    content: Jésus rejeté à Nazareth
  - type: heading
    content: (Mc 6.1-6 ; Lc 4.16-30)
  '54':
  - type: text
    content: Il retourna dans la ville où il avait vécu
  - type: note
    content: C’est-à-dire à Nazareth (voir 2.23 ; Lc 4.16).
  - type: text
    content: '. Il enseignait ses concitoyens dans leur synagogue. Son enseignement les impressionnait, si bien qu’ils disaient : D’où tient-il cette sagesse et le pouvoir d’accomplir ces miracles ? '
  '55':
  - type: text
    content: 'N’est-il pas le fils du charpentier ? N’est-il pas le fils de Marie, et le frère de Jacques, de Joseph, de Simon et de Jude ! '
  '56':
  - type: text
    content: Ses sœurs ne vivent-elles pas toutes parmi nous ? D’où a-t-il reçu tout cela ?
  '57':
  - type: text
    content: Et voilà pourquoi ils trouvaient en lui un obstacle à la foi.
  - type: text
    content: 'Alors Jésus leur dit : '
  - type: text
    content: 'C’est seulement dans sa patrie et dans sa propre famille que l’on refuse d’honorer un '
  - type: text
    content: prophète
  - type: text
    content: .
  '58':
  - type: text
    content: Aussi ne fit-il là que peu de miracles, à cause de leur incrédulité.
  '6':
  - type: text
    content: Mais quand le soleil fut monté haut dans le ciel, les petits plants furent vite brûlés et, comme ils n’avaient pas vraiment pris racine, ils séchèrent.
  - type: text
    content: ' '
  '7':
  - type: text
    content: D’autres grains tombèrent parmi les ronces. Celles-ci grandirent et étouffèrent les jeunes pousses.
  - type: text
    content: ' '
  '8':
  - type: text
    content: D’autres grains enfin tombèrent sur la bonne terre et donnèrent du fruit avec un rendement de cent, soixante, ou trente pour un.
  - type: text
    content: ' '
  '9':
  - type: text
    content: Celui qui a des oreilles, qu’il entende !
  - type: heading
    content: (Mc 4.10-12 ; Lc 8.9-10)
