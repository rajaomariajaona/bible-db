document_id: COL.3,21
type_code: fra
verses:
  '1':
  - type: text
    content: 'Mais vous êtes aussi ressuscités avec Christ : recherchez donc les réalités d’en haut, là où se trouve Christ, qui siège à la droite de Dieu. '
  '10':
  - type: text
    content: 'et vous vous êtes revêtus de l’homme nouveau. Celui-ci se renouvelle '
  - type: text
    content: pour être l’image
  - type: text
    content: ' de son Créateur'
  - type: note
    content: 'Voir Gn 1.26-27. Autres traductions : qui se renouvelle à la ressemblance de l’image de son Créateur ou qui se renouvelle selon l’image de son Créateur.'
  - type: text
    content: ' afin de parvenir à la pleine connaissance. '
  '11':
  - type: text
    content: 'Pour ce qui le concerne, il n’y a plus de différence entre Juifs et non-Juifs, entre circoncis et incirconcis, étrangers, barbares, esclaves, hommes libres : il n’y a plus que Christ, lui qui est tout et en tous.'
  '12':
  - type: text
    content: 'Ainsi, puisque Dieu vous a choisis pour faire partie du peuple saint et qu’il vous aime, revêtez-vous d’ardente bonté, de bienveillance, d’humilité, de douceur, de patience – '
  '13':
  - type: text
    content: 'supportez-vous les uns les autres, et si l’un de vous a quelque chose à reprocher à un autre, pardonnez-vous mutuellement ; le Seigneur vous a pardonné : vous aussi, pardonnez-vous de la même manière. '
  '14':
  - type: text
    content: 'Et, par-dessus tout cela, revêtez-vous de l’amour qui est le lien par excellence. '
  '15':
  - type: text
    content: Que la paix instaurée par Christ gouverne vos décisions. Car c’est à cette paix que Dieu vous a appelés pour former un seul corps. Soyez reconnaissants.
  '16':
  - type: text
    content: 'Que la Parole de Christ réside au milieu de vous dans toute sa richesse : qu’elle vous inspire une pleine sagesse, pour vous instruire et vous avertir les uns les autres ou pour chanter à Dieu de tout votre cœur des psaumes, des hymnes et des cantiques inspirés par l’Esprit'
  - type: note
    content: 'Autre traduction : conformes à la pensée de l’Esprit, ce qui revient à dire que leur contenu doit être en accord avec l’Ecriture.'
  - type: text
    content: ' afin d’exprimer votre reconnaissance à Dieu'
  - type: note
    content: 'Autre traduction : l’Esprit, sous l’action de la grâce.'
  - type: text
    content: '. '
  '17':
  - type: text
    content: Dans tout ce que vous pouvez dire ou faire, agissez au nom du Seigneur Jésus, en remerciant Dieu le Père par lui.
  - type: heading
    content: Les relations dans la famille
  '18':
  - type: text
    content: 'Femmes, soyez soumises chacune à son mari, comme il convient à des femmes qui appartiennent au Seigneur. '
  '19':
  - type: text
    content: 'Maris, aimez chacun votre femme et ne nourrissez pas d’aigreur contre elles. '
  '2':
  - type: text
    content: 'De toute votre pensée, tendez vers les réalités d’en haut, et non vers celles qui appartiennent à la terre. '
  '20':
  - type: text
    content: 'Enfants, obéissez à vos parents en toutes choses, c’est ainsi que vous ferez plaisir au Seigneur. '
  '21':
  - type: text
    content: Mais vous, pères, n’exaspérez pas vos enfants, pour ne pas les décourager.
  - type: heading
    content: Les relations entre maîtres et esclaves
  '22':
  - type: text
    content: 'Esclaves, obéissez en tous points à vos maîtres terrestres, et pas seulement quand on vous surveille, comme s’il s’agissait de plaire à des hommes, mais de bon gré, dans la crainte du Seigneur. '
  '23':
  - type: text
    content: 'Quel que soit votre travail, faites-le de tout votre cœur, et cela comme pour le Seigneur et non pour des hommes. '
  '24':
  - type: text
    content: 'Car vous savez que vous recevrez du Seigneur, comme récompense, l’héritage qu’il réserve au peuple de Dieu. Le Maître que vous servez, c’est Christ. '
  '25':
  - type: text
    content: Celui qui agit mal recevra, quant à lui, le salaire que méritent ses mauvaises actions, car Dieu ne fait pas de favoritisme.
  '3':
  - type: text
    content: 'Car vous êtes morts, et votre vie est cachée avec Christ en Dieu. '
  '4':
  - type: text
    content: Lorsque Christ apparaîtra, lui qui est votre vie, alors vous paraîtrez, vous aussi, avec lui, dans la gloire.
  - type: heading
    content: La vie nouvelle
  '5':
  - type: text
    content: 'Faites donc mourir tout ce qui, dans votre vie, appartient à la terre, c’est-à-dire : l’inconduite, l’impureté, les passions incontrôlées, les désirs mauvais et la soif de posséder – qui est une idolâtrie. '
  '6':
  - type: text
    content: Ce sont de tels comportements qui attirent la colère de Dieu sur ceux qui refusent de lui obéir
  - type: note
    content: 'Les termes : sur ceux qui refusent de lui obéir sont absents de certains manuscrits.'
  - type: text
    content: '. '
  '7':
  - type: text
    content: Et vous-mêmes aussi, vous commettiez ces péchés autrefois lorsqu’ils faisaient votre vie
  - type: note
    content: L’Eglise à Colosses était surtout composée de non-Juifs.
  - type: text
    content: .
  '8':
  - type: text
    content: 'Mais à présent, débarrassez-vous de tout cela : colère, irritation, méchanceté, insultes ou propos grossiers qui sortiraient de votre bouche ! '
  '9':
  - type: text
    content: 'Ne vous mentez pas les uns aux autres, car vous vous êtes dépouillés de l’homme que vous étiez autrefois avec tous ses agissements, '
