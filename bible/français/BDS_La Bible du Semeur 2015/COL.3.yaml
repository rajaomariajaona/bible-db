document_id: COL.3,21
type_code: fra
verses:
  '1':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Mais vous êtes aussi ressuscités avec Christ : recherchez donc les réalités d’en haut, là où se trouve Christ, qui siège à la droite de Dieu. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'et vous vous êtes revêtus de l’homme nouveau. Celui-ci se renouvelle '
    - type: usfm
      marker: qt
      children:
      - type: text
        text: pour être l’image
    - type: text
      text: ' de son Créateur'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '3.10 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Voir '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: Gn 1.26-27
        - type: text
          text: '. Autres traductions : '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'qui se renouvelle à la ressemblance de l’image de son Créateur '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'ou '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: qui se renouvelle selon l’image de son Créateur.
      marker-yv: yv-n
    - type: text
      text: ' afin de parvenir à la pleine connaissance. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Pour ce qui le concerne, il n’y a plus de différence entre Juifs et non-Juifs, entre circoncis et incirconcis, étrangers, barbares, esclaves, hommes libres : il n’y a plus que Christ, lui qui est tout et en tous.'
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ainsi, puisque Dieu vous a choisis pour faire partie du peuple saint et qu’il vous aime, revêtez-vous d’ardente bonté, de bienveillance, d’humilité, de douceur, de patience – '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'supportez-vous les uns les autres, et si l’un de vous a quelque chose à reprocher à un autre, pardonnez-vous mutuellement ; le Seigneur vous a pardonné : vous aussi, pardonnez-vous de la même manière. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Et, par-dessus tout cela, revêtez-vous de l’amour qui est le lien par excellence. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Que la paix instaurée par Christ gouverne vos décisions. Car c’est à cette paix que Dieu vous a appelés pour former un seul corps. Soyez reconnaissants.
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Que la Parole de Christ réside au milieu de vous dans toute sa richesse : qu’elle vous inspire une pleine sagesse, pour vous instruire et vous avertir les uns les autres ou pour chanter à Dieu de tout votre cœur des psaumes, des hymnes et des cantiques inspirés par l’Esprit'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '3.16 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Autre traduction : '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'conformes à la pensée de l’Esprit, '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ce qui revient à dire que leur contenu doit être en accord avec l’Ecriture.
      marker-yv: yv-n
    - type: text
      text: ' afin d’exprimer votre reconnaissance à Dieu'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '3.16 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Autre traduction : '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: l’Esprit, sous l’action de la grâce.
      marker-yv: yv-n
    - type: text
      text: '. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Dans tout ce que vous pouvez dire ou faire, agissez au nom du Seigneur Jésus, en remerciant Dieu le Père par lui.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Les relations dans la famille
    marker-yv: yv-h
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Femmes, soyez soumises chacune à son mari, comme il convient à des femmes qui appartiennent au Seigneur. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Maris, aimez chacun votre femme et ne nourrissez pas d’aigreur contre elles. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'De toute votre pensée, tendez vers les réalités d’en haut, et non vers celles qui appartiennent à la terre. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Enfants, obéissez à vos parents en toutes choses, c’est ainsi que vous ferez plaisir au Seigneur. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Mais vous, pères, n’exaspérez pas vos enfants, pour ne pas les décourager.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Les relations entre maîtres et esclaves
    marker-yv: yv-h
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Esclaves, obéissez en tous points à vos maîtres terrestres, et pas seulement quand on vous surveille, comme s’il s’agissait de plaire à des hommes, mais de bon gré, dans la crainte du Seigneur. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Quel que soit votre travail, faites-le de tout votre cœur, et cela comme pour le Seigneur et non pour des hommes. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Car vous savez que vous recevrez du Seigneur, comme récompense, l’héritage qu’il réserve au peuple de Dieu. Le Maître que vous servez, c’est Christ. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Celui qui agit mal recevra, quant à lui, le salaire que méritent ses mauvaises actions, car Dieu ne fait pas de favoritisme.
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Car vous êtes morts, et votre vie est cachée avec Christ en Dieu. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Lorsque Christ apparaîtra, lui qui est votre vie, alors vous paraîtrez, vous aussi, avec lui, dans la gloire.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: La vie nouvelle
    marker-yv: yv-h
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Faites donc mourir tout ce qui, dans votre vie, appartient à la terre, c’est-à-dire : l’inconduite, l’impureté, les passions incontrôlées, les désirs mauvais et la soif de posséder – qui est une idolâtrie. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ce sont de tels comportements qui attirent la colère de Dieu sur ceux qui refusent de lui obéir
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '3.6 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Les termes : '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'sur ceux qui refusent de lui obéir '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: sont absents de certains manuscrits.
      marker-yv: yv-n
    - type: text
      text: '. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Et vous-mêmes aussi, vous commettiez ces péchés autrefois lorsqu’ils faisaient votre vie
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '3.7 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: L’Eglise à Colosses était surtout composée de non-Juifs.
      marker-yv: yv-n
    - type: text
      text: .
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Mais à présent, débarrassez-vous de tout cela : colère, irritation, méchanceté, insultes ou propos grossiers qui sortiraient de votre bouche ! '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ne vous mentez pas les uns aux autres, car vous vous êtes dépouillés de l’homme que vous étiez autrefois avec tous ses agissements, '
