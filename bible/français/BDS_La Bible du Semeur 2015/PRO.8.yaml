document_id: PRO.8,21
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Le poème de la Sagesse
    marker-yv: yv-h
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Ecoutez : la Sagesse appelle,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: la raison élève la voix
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '8.1 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Voir '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: '1.20'
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: .
  '10':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: Recherchez mon éducation ╵plutôt que de l’argent,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et choisissez la connaissance ╵plutôt que l’or, l’or le plus pur.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: Car la sagesse est préférable ╵aux perles précieuses,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et les biens les plus désirables ╵ne sauraient l’égaler
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '8.11 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Voir '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: '2.4'
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: .
  '12':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: Moi, je suis la Sagesse, ╵j’habite à côté de la réflexion,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: j’ai découvert l’art de penser.
  '13':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: Lorsqu’on craint l’Eternel, ╵on déteste le mal.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Je déteste l’orgueil, ╵la suffisance, ╵la conduite mauvaise
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et la bouche menteuse.
  '14':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: C’est à moi qu’appartiennent ╵le conseil et la réflexion.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Je suis l’intelligence ╵et possède la force.
  '15':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: C’est par moi que règnent les rois,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et que les dirigeants ╵décrètent des lois justes.
  '16':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: Par moi gouvernent tous les chefs,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: tous les hommes d’Etat ╵et tous les magistrats sur terre.
  '17':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: Moi, j’aime ceux qui m’aiment,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et ceux qui me recherchent ╵ne manquent pas de me trouver.
  '18':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: Je suis accompagnée ╵de la richesse et de l’honneur,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: de biens durables, de la justice.
  '19':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: Mon fruit est plus précieux que l’or,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: oui, même que l’or le plus fin,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et les profits que je rapporte ╵valent mieux qu’un argent de choix.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: Elle est postée sur les hauteurs, ╵le long des routes,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: aux carrefours.
  '20':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: Je marche sur la voie de la justice
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et je suis les sentiers ╵de l’équité,
  '21':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: pour combler de biens ceux qui m’aiment
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et remplir leurs trésors.
  '22':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: L’Eternel m’a donné naissance
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '8.22 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Autres traductions : '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'me possédait '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'ou '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'm’a établie. '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'D’autres comprennent : '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'm’a acquise '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'ou '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: m’a créée.
      marker-yv: yv-n
    - type: text
      text: ' ╵tout au début de son activité'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et avant d’entreprendre ╵les plus anciennes de ses œuvres.
  '23':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: Oui j’ai été formée ╵dès les temps éternels,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: bien avant que la terre fût créée.
  '24':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: J’ai été enfantée ╵avant que l’océan existe
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et avant que les sources ╵aient fait jaillir ╵leurs eaux surabondantes.
  '25':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: Avant que les montagnes ╵aient été établies,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: avant que les collines ╵soient apparues, ╵j’ai été enfantée.
  '26':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: Dieu n’avait pas encore ╵formé la terre et les campagnes
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ni le premier grain de poussière ╵de l’univers.
  '27':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: Moi, j’étais déjà là ╵quand il fixa le ciel
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et qu’il traça un cercle ╵autour de la surface ╵du grand abîme.
  '28':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: Et quand il condensa ╵les nuages d’en haut,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: quand il fit jaillir avec force ╵les sources de l’abîme,
  '29':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: et quand il assigna ╵à la mer des limites
  - type: usfm
    marker: q1
    children:
    - type: text
      text: pour que ses eaux ╵ne les franchissent pas,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: quand il détermina ╵les fondements du monde,
  '3':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: Tout près des portes de la ville,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'là où l’on passe pour entrer, ╵elle fait retentir sa voix :'
  '30':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '30'
    - type: text
      text: je me tenais ╵bien fermement à ses côtés
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '8.30 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Autre traduction : '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: Je me tenais à ses côtés comme son maître d’œuvre.
      marker-yv: yv-n
    - type: text
      text: ','
  - type: usfm
    marker: q1
    children:
    - type: text
      text: me livrant sans cesse aux délices
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '8.30 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Autre traduction : '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: faisant sans cesse ses délices.
      marker-yv: yv-n
    - type: text
      text: ','
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et jouant en tout temps ╵en sa présence.
  '31':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '31'
    - type: text
      text: Je jouais sur sa terre ╵dans le monde habité,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et trouvais mes délices ╵dans les êtres humains.
  '32':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '32'
    - type: text
      text: 'Maintenant donc, mes fils, ╵écoutez-moi :'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: heureux tous ceux qui suivent ╵les voies que je prescris !
  '33':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '33'
    - type: text
      text: Ecoutez mes leçons, ╵et vous deviendrez sages.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ne les négligez pas !
  '34':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '34'
    - type: text
      text: 'Car : heureux l’homme qui m’écoute,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: qui vient veiller à mes portes ╵jour après jour,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et qui monte la garde ╵devant l’entrée de ma maison.
  '35':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '35'
    - type: text
      text: Car celui qui me trouve ╵a découvert la vie,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: il obtient la faveur ╵de l’Eternel.
  '36':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '36'
    - type: text
      text: Mais il se fait tort à lui-même, ╵celui qui me désobéit
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '8.36 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Autre traduction : '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: me rate.
      marker-yv: yv-n
    - type: text
      text: '  :'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: tous ceux qui me haïssent ╵aiment la mort. »
  '4':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: « C’est chacun de vous que j’appelle,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: c’est pour vous, les humains, que ma voix se fait entendre,
  '5':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'à vous, qui manquez d’expérience : ╵apprenez donc à réfléchir ;'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'et à vous, insensés : ╵devenez donc intelligents !'
  '6':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: Ecoutez-moi, car j’ai à dire ╵des choses capitales,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et ce sont des paroles justes ╵qui franchiront mes lèvres.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: Oui, ma bouche proférera ╵la vérité,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: le mal fait horreur à mes lèvres,
  '8':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: et mon palais proclamera ╵uniquement ce qui est juste.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Il n’y a pas de fourberie, ╵rien de retors dans mes paroles,
  '9':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: elles sont toutes justes ╵pour qui comprend les choses,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: elles sont droites ╵pour qui trouve la connaissance.
