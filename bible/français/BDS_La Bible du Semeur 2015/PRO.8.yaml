document_id: PRO.8,21
type_code: fra
verses:
  '1':
  - type: heading
    content: Le poème de la Sagesse
  - type: text
    content: 'Ecoutez : la Sagesse appelle,'
  - type: text
    content: la raison élève la voix
  - type: note
    content: Voir 1.20.
  - type: text
    content: .
  '10':
  - type: text
    content: Recherchez mon éducation ╵plutôt que de l’argent,
  - type: text
    content: et choisissez la connaissance ╵plutôt que l’or, l’or le plus pur.
  '11':
  - type: text
    content: Car la sagesse est préférable ╵aux perles précieuses,
  - type: text
    content: et les biens les plus désirables ╵ne sauraient l’égaler
  - type: note
    content: Voir 2.4.
  - type: text
    content: .
  '12':
  - type: text
    content: Moi, je suis la Sagesse, ╵j’habite à côté de la réflexion,
  - type: text
    content: j’ai découvert l’art de penser.
  '13':
  - type: text
    content: Lorsqu’on craint l’Eternel, ╵on déteste le mal.
  - type: text
    content: Je déteste l’orgueil, ╵la suffisance, ╵la conduite mauvaise
  - type: text
    content: et la bouche menteuse.
  '14':
  - type: text
    content: C’est à moi qu’appartiennent ╵le conseil et la réflexion.
  - type: text
    content: Je suis l’intelligence ╵et possède la force.
  '15':
  - type: text
    content: C’est par moi que règnent les rois,
  - type: text
    content: et que les dirigeants ╵décrètent des lois justes.
  '16':
  - type: text
    content: Par moi gouvernent tous les chefs,
  - type: text
    content: tous les hommes d’Etat ╵et tous les magistrats sur terre.
  '17':
  - type: text
    content: Moi, j’aime ceux qui m’aiment,
  - type: text
    content: et ceux qui me recherchent ╵ne manquent pas de me trouver.
  '18':
  - type: text
    content: Je suis accompagnée ╵de la richesse et de l’honneur,
  - type: text
    content: de biens durables, de la justice.
  '19':
  - type: text
    content: Mon fruit est plus précieux que l’or,
  - type: text
    content: oui, même que l’or le plus fin,
  - type: text
    content: et les profits que je rapporte ╵valent mieux qu’un argent de choix.
  '2':
  - type: text
    content: Elle est postée sur les hauteurs, ╵le long des routes,
  - type: text
    content: aux carrefours.
  '20':
  - type: text
    content: Je marche sur la voie de la justice
  - type: text
    content: et je suis les sentiers ╵de l’équité,
  '21':
  - type: text
    content: pour combler de biens ceux qui m’aiment
  - type: text
    content: et remplir leurs trésors.
  '22':
  - type: text
    content: L’Eternel m’a donné naissance
  - type: note
    content: 'Autres traductions : me possédait ou m’a établie. D’autres comprennent : m’a acquise ou m’a créée.'
  - type: text
    content: ' ╵tout au début de son activité'
  - type: text
    content: et avant d’entreprendre ╵les plus anciennes de ses œuvres.
  '23':
  - type: text
    content: Oui j’ai été formée ╵dès les temps éternels,
  - type: text
    content: bien avant que la terre fût créée.
  '24':
  - type: text
    content: J’ai été enfantée ╵avant que l’océan existe
  - type: text
    content: et avant que les sources ╵aient fait jaillir ╵leurs eaux surabondantes.
  '25':
  - type: text
    content: Avant que les montagnes ╵aient été établies,
  - type: text
    content: avant que les collines ╵soient apparues, ╵j’ai été enfantée.
  '26':
  - type: text
    content: Dieu n’avait pas encore ╵formé la terre et les campagnes
  - type: text
    content: ni le premier grain de poussière ╵de l’univers.
  '27':
  - type: text
    content: Moi, j’étais déjà là ╵quand il fixa le ciel
  - type: text
    content: et qu’il traça un cercle ╵autour de la surface ╵du grand abîme.
  '28':
  - type: text
    content: Et quand il condensa ╵les nuages d’en haut,
  - type: text
    content: quand il fit jaillir avec force ╵les sources de l’abîme,
  '29':
  - type: text
    content: et quand il assigna ╵à la mer des limites
  - type: text
    content: pour que ses eaux ╵ne les franchissent pas,
  - type: text
    content: quand il détermina ╵les fondements du monde,
  '3':
  - type: text
    content: Tout près des portes de la ville,
  - type: text
    content: 'là où l’on passe pour entrer, ╵elle fait retentir sa voix :'
  '30':
  - type: text
    content: je me tenais ╵bien fermement à ses côtés
  - type: note
    content: 'Autre traduction : Je me tenais à ses côtés comme son maître d’œuvre.'
  - type: text
    content: ','
  - type: text
    content: me livrant sans cesse aux délices
  - type: note
    content: 'Autre traduction : faisant sans cesse ses délices.'
  - type: text
    content: ','
  - type: text
    content: et jouant en tout temps ╵en sa présence.
  '31':
  - type: text
    content: Je jouais sur sa terre ╵dans le monde habité,
  - type: text
    content: et trouvais mes délices ╵dans les êtres humains.
  '32':
  - type: text
    content: 'Maintenant donc, mes fils, ╵écoutez-moi :'
  - type: text
    content: heureux tous ceux qui suivent ╵les voies que je prescris !
  '33':
  - type: text
    content: Ecoutez mes leçons, ╵et vous deviendrez sages.
  - type: text
    content: Ne les négligez pas !
  '34':
  - type: text
    content: 'Car : heureux l’homme qui m’écoute,'
  - type: text
    content: qui vient veiller à mes portes ╵jour après jour,
  - type: text
    content: et qui monte la garde ╵devant l’entrée de ma maison.
  '35':
  - type: text
    content: Car celui qui me trouve ╵a découvert la vie,
  - type: text
    content: il obtient la faveur ╵de l’Eternel.
  '36':
  - type: text
    content: Mais il se fait tort à lui-même, ╵celui qui me désobéit
  - type: note
    content: 'Autre traduction : me rate.'
  - type: text
    content: '  :'
  - type: text
    content: tous ceux qui me haïssent ╵aiment la mort. »
  '4':
  - type: text
    content: « C’est chacun de vous que j’appelle,
  - type: text
    content: c’est pour vous, les humains, que ma voix se fait entendre,
  '5':
  - type: text
    content: 'à vous, qui manquez d’expérience : ╵apprenez donc à réfléchir ;'
  - type: text
    content: 'et à vous, insensés : ╵devenez donc intelligents !'
  '6':
  - type: text
    content: Ecoutez-moi, car j’ai à dire ╵des choses capitales,
  - type: text
    content: et ce sont des paroles justes ╵qui franchiront mes lèvres.
  '7':
  - type: text
    content: Oui, ma bouche proférera ╵la vérité,
  - type: text
    content: le mal fait horreur à mes lèvres,
  '8':
  - type: text
    content: et mon palais proclamera ╵uniquement ce qui est juste.
  - type: text
    content: Il n’y a pas de fourberie, ╵rien de retors dans mes paroles,
  '9':
  - type: text
    content: elles sont toutes justes ╵pour qui comprend les choses,
  - type: text
    content: elles sont droites ╵pour qui trouve la connaissance.
