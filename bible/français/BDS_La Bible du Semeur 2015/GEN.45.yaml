document_id: GEN.45,21
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Joseph révèle son identité à ses frères
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Alors Joseph, ne pouvant plus dominer son émotion devant tous ceux qui étaient présents, s’écria : Faites sortir tout le monde !'
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ainsi personne de son entourage n’était en sa présence lorsqu’il fit connaître son identité à ses frères
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '45.1 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Voir '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: Ac 7.13
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: '. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Tu habiteras dans la région de Goshen
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '45.10 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Près de la frontière nord-est de l’Egypte, dans le delta du Nil, une région très fertile (v. 18) et propre à l’élevage.
      marker-yv: yv-n
    - type: text
      text: ', pour être proche de moi, toi, tes enfants et tes petits-enfants, tes moutons, tes chèvres et tes bovins, tout ce qui t’appartient. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Et là, je pourvoirai à tes besoins pour que tu ne restes pas sans ressources, toi, ta famille et tout ce qui t’appartient. Car il y aura encore cinq ans de famine
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '45.11 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Voir '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: Ac 7.14
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: '. » '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Vous voyez de vos yeux, et mon frère Benjamin également, que c’est bien moi qui vous parle. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Informez mon père de tous les honneurs dont je suis comblé en Egypte, racontez-lui tout ce que vous avez vu et dépêchez-vous de le faire venir ici.
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Puis il se jeta au cou de Benjamin, son frère, et tous deux pleurèrent sur les épaules l’un de l’autre. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ensuite, il embrassa tous ses frères en pleurant. Après quoi, ses frères s’entretinrent avec lui.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Le pharaon invite Jacob en Egypte
    marker-yv: yv-h
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'La nouvelle de l’arrivée des frères de Joseph se répandit aussitôt au palais du pharaon. Elle fit plaisir au pharaon et à ses hauts fonctionnaires. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Le pharaon dit à Joseph : Tu diras à tes frères : « Voilà ce que vous allez faire : Chargez vos bêtes et retournez au pays de Canaan, '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'pour aller y chercher votre père ainsi que vos familles. Puis vous reviendrez chez moi et je vous donnerai les bonnes terres d’Egypte et vous mangerez les meilleurs produits du pays. » '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Quant à toi, transmets-leur l’ordre suivant : « Emmenez avec vous d’Egypte des chariots pour vos enfants et vos femmes, faites-y monter aussi votre père et revenez. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Mais il sanglotait si fort en parlant que les Egyptiens l’entendirent, et la nouvelle parvint jusqu’au palais du pharaon. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: N’ayez pas de regret pour ce que vous laisserez, car ce qu’il y a de meilleur dans toute l’Egypte sera à votre disposition. »
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Les fils d’Israël firent ce qu’on leur avait dit. Joseph leur procura des chariots, selon ce qu’avait déclaré le pharaon, et il leur donna des provisions pour le voyage. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Il offrit un habit de rechange à chacun de ses frères ; quant à Benjamin, il lui donna trois cents pièces d’argent et cinq habits de rechange. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Il envoya à son père dix ânes chargés des meilleurs produits de l’Egypte, et dix ânesses chargées de blé, de pain et de vivres pour son voyage. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Il prit congé de ses frères en leur recommandant de ne pas se disputer
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '45.24 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Autre traduction : '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'de ne pas se presser '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'ou '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: de se faire du souci.
      marker-yv: yv-n
    - type: text
      text: ' en chemin. Et ils s’en allèrent.'
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Les frères de Joseph reviennent auprès de Jacob
    marker-yv: yv-h
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ils retournèrent donc d’Egypte au pays de Canaan auprès de Jacob, leur père. '
  '26':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ils lui annoncèrent la nouvelle : « Joseph vit encore, et c’est même lui qui gouverne toute l’Egypte. » Mais il ne réagit pas parce qu’il ne les croyait pas. '
  '27':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ils lui répétèrent tout ce que Joseph avait dit. Puis Jacob vit les chariots que Joseph avait envoyés pour le transporter. Alors il reprit vie. '
  '28':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Israël déclara : Assez parlé : Joseph mon fils est encore en vie, j’irai le voir avant de mourir.'
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Il dit à ses frères : Je suis Joseph ! Mon père est-il encore en vie ?'
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Mais ses frères étaient incapables de lui répondre tant ils avaient peur de lui. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Alors Joseph leur dit : Venez près de moi !'
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ils s’approchèrent.
  - type: usfm
    marker: p
    children:
    - type: text
      text: '– Je suis Joseph, leur dit-il, votre frère, que vous avez vendu pour être emmené en Egypte. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Et maintenant, ne vous tourmentez pas et ne soyez pas fâchés de m’avoir vendu comme esclave. C’est pour vous sauver la vie que Dieu m’a envoyé devant vous. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Car voici deux ans que la famine sévit dans ce pays et pendant cinq ans encore, il n’y aura ni labour ni moisson. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dieu m’a envoyé devant vous pour vous faire subsister sur la terre, pour préserver votre vie par une très grande délivrance. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: C’est pourquoi ce n’est pas vous qui m’avez envoyé ici, c’est Dieu. Et il m’a élevé au rang de « Père pour le pharaon
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '45.8 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Titre officiel des vizirs et des ministres. Certains pensent que Joseph était devenu le conseiller du pharaon. Voir '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: '41.42'
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: '  », faisant de moi le maître de toute sa cour et le dirigeant de toute l’Egypte. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Retournez donc au plus vite auprès de mon père et dites-lui : « Ton fils Joseph te fait dire ceci : Dieu m’a établi maître de toute l’Egypte ; viens auprès de moi sans tarder. '
