document_id: ECC.3,21
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Un temps pour toute chose
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Il y a un temps pour tout et un moment pour toute chose sous le ciel. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'J’ai considéré les occupations auxquelles Dieu impose aux hommes de s’appliquer. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Dieu fait toute chose belle en son temps.
  - type: usfm
    marker: p
    children:
    - type: text
      text: Il a implanté au tréfonds de l’être humain le sens de l’éternité, sans toutefois que l’homme puisse appréhender l’œuvre que Dieu accomplit du commencement à la fin.
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Je sais qu’il n’y a rien de bon pour l’homme hormis se réjouir et se donner du bon temps durant sa vie. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Et aussi que si quelqu’un peut manger et boire et jouir du bonheur au milieu de son dur labeur, c’est un don de Dieu.
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Je sais que tout ce que Dieu fait durera toujours : il n’y a rien à y ajouter, et rien à en retrancher. Et Dieu agit en sorte qu’on le craigne. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ce qui est aujourd’hui a déjà été dans le passé, et ce qui sera dans l’avenir a déjà été dans le passé. Oui, Dieu fait se reproduire ce qui appartient au passé.
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'J’ai encore constaté autre chose sous le soleil : au tribunal règne l’iniquité et au lieu où l’on administre la justice, on rencontre l’iniquité. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Je me suis dit en moi-même : « Dieu jugera le juste et le méchant, car pour chaque chose et pour chaque acte, il y a un temps pour le jugement. »'
  - type: usfm
    marker: s1
    children:
    - type: text
      text: La mort
    marker-yv: yv-h
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Je me suis dit en moi-même, au sujet des humains, que Dieu veut les purger du mal
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '3.18 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Autre traduction : '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: que Dieu veut éprouver les humains.
      marker-yv: yv-n
    - type: text
      text: ' et leur montrer qu’en eux-mêmes, ils ne sont pas plus que des bêtes. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Car le sort des humains est identique au sort des bêtes : ils meurent les uns comme les autres. Un même souffle les anime tous. L’avantage de l’homme sur l’animal est donc nul. Ainsi tout est dérisoire. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Il y a un temps pour enfanter
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '3.2 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'D’autres comprennent : '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: naître.
      marker-yv: yv-n
    - type: text
      text: ' et un temps pour mourir, un temps pour planter, et un temps pour arracher le plant, '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Tout va vers une même destination : tout a été tiré de la poussière et tout retourne à l’état de poussière'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '3.20 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Voir '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: Gn 3.19
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: '. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Qui connaît l’esprit humain qui monte quant à lui vers le haut, tandis que, de son côté, le souffle de la bête descend vers le bas, à la terre
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '3.21 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'D’autres comprennent : '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'qui sait si l’esprit de l’homme monte vers en haut et si le souffle de la bête descend en dessous de la terre ? '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Les mots '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'souffle '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'et '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'esprit '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: traduisent le même terme hébreu.
      marker-yv: yv-n
    - type: text
      text: '  ? '
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: J’en ai conclu qu’il n’y a pour l’homme rien de bon sinon de se réjouir au milieu de ses activités, car telle est la part qui lui revient. En effet, qui donc le fera revenir pour qu’il voie ce qui sera après lui ?
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: un temps pour abattre
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '3.3 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Il s’agit peut-être de l’abattage d’animaux. Autre traduction : '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: tuer.
      marker-yv: yv-n
    - type: text
      text: ' et un temps pour soigner, un temps pour démolir et un temps pour construire. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Il y a aussi un temps pour pleurer et un temps pour rire, un temps pour se lamenter et un temps pour danser, '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: un temps pour jeter des pierres et un temps pour en ramasser, un temps pour prendre dans ses bras et un temps pour s’éloigner de ceux que l’on prend dans ses bras.
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Il y a un temps pour chercher et un temps pour perdre, un temps pour conserver et un temps pour jeter, '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'un temps pour déchirer et un temps pour coudre, un temps pour garder le silence et un temps pour parler, '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: un temps pour aimer et un temps pour haïr, un temps de guerre et un temps de paix.
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Quel avantage celui qui travaille retire-t-il de la peine qu’il se donne ? '
