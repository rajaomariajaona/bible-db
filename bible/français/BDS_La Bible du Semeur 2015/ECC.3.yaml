document_id: ECC.3,21
type_code: fra
verses:
  '1':
  - type: heading
    content: Un temps pour toute chose
  - type: text
    content: 'Il y a un temps pour tout et un moment pour toute chose sous le ciel. '
  '10':
  - type: text
    content: 'J’ai considéré les occupations auxquelles Dieu impose aux hommes de s’appliquer. '
  '11':
  - type: text
    content: Dieu fait toute chose belle en son temps.
  - type: text
    content: Il a implanté au tréfonds de l’être humain le sens de l’éternité, sans toutefois que l’homme puisse appréhender l’œuvre que Dieu accomplit du commencement à la fin.
  '12':
  - type: text
    content: 'Je sais qu’il n’y a rien de bon pour l’homme hormis se réjouir et se donner du bon temps durant sa vie. '
  '13':
  - type: text
    content: Et aussi que si quelqu’un peut manger et boire et jouir du bonheur au milieu de son dur labeur, c’est un don de Dieu.
  '14':
  - type: text
    content: 'Je sais que tout ce que Dieu fait durera toujours : il n’y a rien à y ajouter, et rien à en retrancher. Et Dieu agit en sorte qu’on le craigne. '
  '15':
  - type: text
    content: Ce qui est aujourd’hui a déjà été dans le passé, et ce qui sera dans l’avenir a déjà été dans le passé. Oui, Dieu fait se reproduire ce qui appartient au passé.
  '16':
  - type: text
    content: 'J’ai encore constaté autre chose sous le soleil : au tribunal règne l’iniquité et au lieu où l’on administre la justice, on rencontre l’iniquité. '
  '17':
  - type: text
    content: 'Je me suis dit en moi-même : « Dieu jugera le juste et le méchant, car pour chaque chose et pour chaque acte, il y a un temps pour le jugement. »'
  - type: heading
    content: La mort
  '18':
  - type: text
    content: Je me suis dit en moi-même, au sujet des humains, que Dieu veut les purger du mal
  - type: note
    content: 'Autre traduction : que Dieu veut éprouver les humains.'
  - type: text
    content: ' et leur montrer qu’en eux-mêmes, ils ne sont pas plus que des bêtes. '
  '19':
  - type: text
    content: 'Car le sort des humains est identique au sort des bêtes : ils meurent les uns comme les autres. Un même souffle les anime tous. L’avantage de l’homme sur l’animal est donc nul. Ainsi tout est dérisoire. '
  '2':
  - type: text
    content: Il y a un temps pour enfanter
  - type: note
    content: 'D’autres comprennent : naître.'
  - type: text
    content: ' et un temps pour mourir, un temps pour planter, et un temps pour arracher le plant, '
  '20':
  - type: text
    content: 'Tout va vers une même destination : tout a été tiré de la poussière et tout retourne à l’état de poussière'
  - type: note
    content: Voir Gn 3.19.
  - type: text
    content: '. '
  '21':
  - type: text
    content: Qui connaît l’esprit humain qui monte quant à lui vers le haut, tandis que, de son côté, le souffle de la bête descend vers le bas, à la terre
  - type: note
    content: 'D’autres comprennent : qui sait si l’esprit de l’homme monte vers en haut et si le souffle de la bête descend en dessous de la terre ? Les mots souffle et esprit traduisent le même terme hébreu.'
  - type: text
    content: '  ? '
  '22':
  - type: text
    content: J’en ai conclu qu’il n’y a pour l’homme rien de bon sinon de se réjouir au milieu de ses activités, car telle est la part qui lui revient. En effet, qui donc le fera revenir pour qu’il voie ce qui sera après lui ?
  '3':
  - type: text
    content: un temps pour abattre
  - type: note
    content: 'Il s’agit peut-être de l’abattage d’animaux. Autre traduction : tuer.'
  - type: text
    content: ' et un temps pour soigner, un temps pour démolir et un temps pour construire. '
  '4':
  - type: text
    content: 'Il y a aussi un temps pour pleurer et un temps pour rire, un temps pour se lamenter et un temps pour danser, '
  '5':
  - type: text
    content: un temps pour jeter des pierres et un temps pour en ramasser, un temps pour prendre dans ses bras et un temps pour s’éloigner de ceux que l’on prend dans ses bras.
  '6':
  - type: text
    content: 'Il y a un temps pour chercher et un temps pour perdre, un temps pour conserver et un temps pour jeter, '
  '7':
  - type: text
    content: 'un temps pour déchirer et un temps pour coudre, un temps pour garder le silence et un temps pour parler, '
  '8':
  - type: text
    content: un temps pour aimer et un temps pour haïr, un temps de guerre et un temps de paix.
  '9':
  - type: text
    content: 'Quel avantage celui qui travaille retire-t-il de la peine qu’il se donne ? '
