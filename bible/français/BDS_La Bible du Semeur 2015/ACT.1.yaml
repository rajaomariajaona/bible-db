document_id: ACT.1,21
type_code: fra
verses:
  '1':
  - type: heading
    content: Introduction
  - type: text
    content: Cher Théophile,
  - type: text
    content: Dans mon premier livre
  - type: note
    content: Voir Lc 1.1-4. Les Actes sont la suite de l’Evangile selon Luc.
  - type: text
    content: ', j’ai exposé tout ce que Jésus a commencé de faire et d’enseigner '
  '10':
  - type: text
    content: 'Ils gardaient encore les yeux fixés au ciel pendant qu’il s’éloignait, quand deux hommes vêtus de blanc se présentèrent devant eux et leur dirent : '
  '11':
  - type: text
    content: Hommes de Galilée, pourquoi restez-vous ainsi à regarder le ciel ? Ce Jésus qui a été enlevé au ciel du milieu de vous, en redescendra un jour de la même manière que vous l’avez vu y monter.
  '12':
  - type: text
    content: Alors les apôtres quittèrent la colline qu’on appelle mont des Oliviers, située à environ un kilomètre
  - type: note
    content: C’était la distance de marche autorisée le jour du sabbat par la tradition rabbinique.
  - type: text
    content: ' de Jérusalem, et rentrèrent en ville. '
  '13':
  - type: text
    content: Dès leur arrivée, ils montèrent à l’étage supérieur de la maison où ils se tenaient d’habitude
  - type: note
    content: Les apôtres se tenaient dans une pièce aménagée sur le toit en terrasse, comme il y en avait souvent dans les maisons israélites.
  - type: text
    content: . C’étaient Pierre, Jean, Jacques et André, Philippe et Thomas, Barthélemy et Matthieu, Jacques, fils d’Alphée, Simon le Zélé
  - type: note
    content: Voir note Mt 10.4.
  - type: text
    content: ', et Jude, fils de Jacques. '
  '14':
  - type: text
    content: Eux tous, d’un commun accord, se retrouvaient souvent pour prier, avec quelques femmes, avec Marie la mère de Jésus, et avec les frères de Jésus.
  - type: heading
    content: Le choix d’un douzième apôtre
  '15':
  - type: text
    content: Un de ces jours-là, Pierre se leva au milieu des frères. Ils étaient là environ cent vingt.
  '16':
  - type: text
    content: '– Mes frères, dit-il, il fallait que les prophéties de l’Ecriture s’accomplissent : car le Saint-Esprit, par l’intermédiaire de David, a parlé à l’avance de Judas, qui a servi de guide à ceux qui ont arrêté Jésus. '
  '17':
  - type: text
    content: 'Cet homme était l’un des nôtres et il a eu sa part dans le service qui nous avait été confié. '
  '18':
  - type: text
    content: 'Avec l’argent qu’il a reçu en paiement de son crime, il a acheté un champ ; il y est tombé la tête la première, il s’est éventré, et ses intestins se sont répandus sur le sol. '
  '19':
  - type: text
    content: 'Tous les habitants de Jérusalem l’ont appris : c’est pourquoi ils ont appelé ce champ : '
  - type: text
    content: Akeldama
  - type: text
    content: ', ce qui, dans leur langue, signifie : « le champ du sang ».'
  '2':
  - type: text
    content: jusqu’au jour où il fut enlevé au ciel après avoir donné, par le Saint-Esprit
  - type: note
    content: 'Autres traductions : à ceux qu’il avait choisis comme apôtres par le Saint-Esprit, ou : il fut enlevé au ciel par le Saint-Esprit.'
  - type: text
    content: ', ses instructions à ceux qu’il s’était choisis comme apôtres.'
  '20':
  - type: text
    content: 'Or, il est écrit dans le livre des Psaumes :'
  - type: text
    content: Que sa maison reste vide
  - type: text
    content: et qu’elle soit privée d’habitants
  - type: text
    content: ' '
  - type: note
    content: Ps 69.26 .
  - type: text
    content: .
  - type: text
    content: 'Et plus loin :'
  - type: text
    content: Qu’un autre prenne sa charge
  - type: text
    content: ' '
  - type: note
    content: Ps 109.8 .
  - type: text
    content: '!'
  '21':
  - type: text
    content: 'Nous devons donc choisir l’un de ceux qui nous ont accompagnés durant tout le temps où le Seigneur Jésus sillonnait le pays avec nous, '
  '22':
  - type: text
    content: depuis le moment où Jean l’a baptisé jusqu’au jour où il a été enlevé du milieu de nous. Cet homme sera ainsi, avec nous, un témoin de sa résurrection.
  '23':
  - type: text
    content: 'On présenta deux hommes : Joseph, appelé Barsabbas, surnommé le Juste, et Matthias. '
  '24':
  - type: text
    content: 'Et l’on fit alors cette prière :'
  - type: text
    content: 'Toi, Seigneur, tu connais le cœur de tous les hommes. Désigne toi-même celui de ces deux frères que tu as choisi '
  '25':
  - type: text
    content: pour occuper, dans cette charge d’apôtre, la place que Judas a désertée afin d’aller à celle qui lui revenait.
  '26':
  - type: text
    content: Puis ils tirèrent au sort. Matthias fut désigné. C’est lui qui fut adjoint aux onze apôtres.
  '3':
  - type: text
    content: Après sa mort, il se présenta à eux vivant et leur donna des preuves nombreuses de sa résurrection. Il leur apparut pendant quarante jours et leur parla du royaume de Dieu.
  - type: heading
    content: Dans l’attente de l’Esprit
  - type: heading
    content: La promesse de l’Esprit
  '4':
  - type: text
    content: Or, un jour qu’il prenait un repas avec eux
  - type: note
    content: 'Autre traduction : un jour qu’il était avec eux.'
  - type: text
    content: ', il leur recommanda de ne pas quitter Jérusalem, mais d’y attendre que son Père leur accorde le don qu’il leur avait promis.'
  - type: text
    content: – C’est le don que je vous ai annoncé,
  - type: text
    content: ' leur dit-il. '
  '5':
  - type: text
    content: Car Jean a baptisé dans l’eau, mais vous, c’est dans le Saint-Esprit que vous serez baptisés dans peu de jours.
  '6':
  - type: text
    content: 'Comme ils étaient réunis autour de lui, ils lui demandèrent : Seigneur, est-ce à ce moment-là que tu rendras le royaume à Israël'
  - type: note
    content: 'Autre traduction : tu rétabliras le royaume au profit d’Israël ?'
  - type: text
    content: '  ?'
  '7':
  - type: text
    content: 'Il leur répondit : '
  - type: text
    content: Il ne vous appartient pas de connaître les temps et les moments que le Père a fixés de sa propre autorité.
  - type: text
    content: ' '
  '8':
  - type: text
    content: 'Mais le Saint-Esprit descendra sur vous : vous recevrez sa puissance et vous serez mes témoins à Jérusalem, dans toute la '
  - type: text
    content: Judée
  - type: text
    content: ' et la Samarie, et jusqu’au bout du monde'
  - type: note
    content: 'Luc annonce ici le plan de son livre : témoins à Jérusalem (chap. 1 à 7), en Judée et dans la Samarie (chap. 8 à 9) puis jusqu’au bout du monde (chap. 10 à 28).'
  - type: text
    content: .
  - type: heading
    content: Le retour à Jérusalem
  '9':
  - type: text
    content: 'Après ces mots, ils le virent s’élever dans les airs et un nuage le cacha à leur vue. '
