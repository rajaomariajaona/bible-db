document_id: ZEP.1,21
type_code: fra
verses:
  '1':
  - type: text
    content: Parole que l’Eternel adressa sous le règne de Josias, fils d’Amôn, roi de Juda, à Sophonie, fils de Koushi, fils de Guedalia, descendant d’Amaria et d’Ezéchias
  - type: note
    content: Josias a régné de 640 à 609 av. J.-C. (2 R 22.1 à 23.30 ; 2 Ch 34 et 35).
  - type: text
    content: .
  - type: heading
    content: L’annonce du jugement
  - type: heading
    content: Le jugement universel
  '10':
  - type: text
    content: On entendra, en ce jour-là,
  - type: text
    content: l’Eternel le déclare,
  - type: text
    content: près de la porte des Poissons
  - type: note
    content: Porte de l’ancienne Jérusalem, au nord-ouest.
  - type: text
    content: ', ╵des cris retentissants,'
  - type: text
    content: des hurlements ╵dans le nouveau quartier
  - type: note
    content: Au nord-ouest de l’ancienne ville.
  - type: text
    content: et, venant des collines, ╵un fracas formidable.
  '11':
  - type: text
    content: Habitants de la ville basse
  - type: note
    content: 'Autre traduction : du quartier du Mortier. Ce quartier se trouvait dans la vallée du Tyropéon, juste au sud du mont Morija ; des marchands y vivaient.'
  - type: text
    content: ', ╵hurlez,'
  - type: text
    content: parce qu’il est anéanti ╵le peuple des marchands,
  - type: text
    content: tous ceux qui croulent sous l’argent
  - type: note
    content: 'Autre traduction : tous les peseurs d’argent.'
  - type: text
    content: ' ╵vont être exterminés.'
  - type: heading
    content: Contre les parvenus
  '12':
  - type: text
    content: En ce temps-là,
  - type: text
    content: je fouillerai Jérusalem ╵avec des torches
  - type: text
    content: et je châtierai tous les hommes
  - type: text
    content: qui croupissent tel un vin sur sa lie,
  - type: text
    content: se disant en eux-mêmes
  - type: text
    content: que l’Eternel ne fait ╵ni du bien ni du mal.
  '13':
  - type: text
    content: Leurs richesses seront pillées,
  - type: text
    content: leurs maisons dévastées.
  - type: text
    content: Ils auront bâti des demeures
  - type: text
    content: mais ils n’y habiteront pas ;
  - type: text
    content: ils auront planté des vignobles
  - type: text
    content: mais ils n’en boiront pas le vin.
  - type: heading
    content: Le jour de l’Eternel
  '14':
  - type: text
    content: Car voici qu’il est proche, ╵le jour de l’Eternel,
  - type: text
    content: oui, ce grand jour est proche, ╵il arrive à grands pas,
  - type: text
    content: on entendra des cris amers ╵au jour de l’Eternel.
  - type: text
    content: Le guerrier le plus brave ╵poussera de grands cris.
  '15':
  - type: text
    content: En effet, ce jour-là ╵est un jour de colère,
  - type: text
    content: c’est un jour de détresse ╵et de malheur,
  - type: text
    content: un jour de destruction ╵et de désolation,
  - type: text
    content: un jour d’obscurité ╵et d’épaisses ténèbres,
  - type: text
    content: c’est un jour de nuages ╵et de brouillards épais,
  '16':
  - type: text
    content: jour où retentiront ╵la sonnerie du cor ╵et des clameurs de guerre
  - type: text
    content: contre les villes fortes
  - type: text
    content: et les hautes tours d’angle.
  '17':
  - type: text
    content: Je plongerai les hommes ╵dans la détresse,
  - type: text
    content: et, comme des aveugles, ╵ils marcheront en tâtonnant
  - type: text
    content: parce qu’ils ont péché ╵contre moi, l’Eternel.
  - type: text
    content: Leur sang sera versé ╵comme de la poussière
  - type: text
    content: et, comme des ordures, ╵leurs corps seront jetés
  - type: note
    content: 'Autre traduction : leurs entrailles seront répandues.'
  - type: text
    content: .
  '18':
  - type: text
    content: Leur argent et leur or ╵ne pourront les sauver
  - type: text
    content: au jour de la colère ╵de l’Eternel,
  - type: text
    content: lorsqu’il consumera ╵la terre tout entière
  - type: note
    content: 'Autre traduction : le pays tout entier.'
  - type: text
    content: par le feu de son amour bafoué
  - type: note
    content: Voir 3.8.
  - type: text
    content: .
  - type: text
    content: Car il provoquera, ╵ – et ce sera épouvantable –
  - type: text
    content: la destruction totale ╵de tous ceux qui habitent sur la terre
  - type: note
    content: 'Autre traduction : dans le pays.'
  - type: text
    content: .
  '2':
  - type: text
    content: Je vais tout balayer ╵de la surface de la terre,
  - type: text
    content: l’Eternel le déclare.
  '3':
  - type: text
    content: Je balaierai les hommes ╵de même que les bêtes,
  - type: text
    content: je balaierai aussi ╵les oiseaux dans le ciel ╵et les poissons des mers,
  - type: text
    content: tout ce qui fait ╵trébucher les méchants ;
  - type: text
    content: je retrancherai les humains ╵de la surface de la terre,
  - type: text
    content: l’Eternel le déclare.
  - type: heading
    content: Contre les idolâtres
  '4':
  - type: text
    content: Je vais lever la main ╵contre le peuple de Juda
  - type: text
    content: et contre tous ceux qui habitent ╵Jérusalem,
  - type: text
    content: je supprimerai de ce lieu ╵ce qui subsiste de Baal.
  - type: text
    content: Je ferai disparaître ╵le souvenir ╵de ses desservants effrénés
  - type: note
    content: Le terme hébreu correspondant désigne toujours des prêtres cananéens ou idolâtres (voir 2 R 23.5 ; Os 10.5).
  - type: text
    content: avec ses prêtres,
  '5':
  - type: text
    content: je ferai disparaître ╵tous ceux qui se prosternent ╵devant l’armée du ciel
  - type: note
    content: Les astres auxquels certains Juifs rendaient un culte (2 R 21.3-5, 21-22).
  - type: text
    content: ' ╵sur les toits des maisons,'
  - type: text
    content: et ceux qui se prosternent ╵devant l’Eternel et jurent par lui
  - type: text
    content: tout en prêtant serment ╵au nom du dieu Molok
  - type: note
    content: 'Autre traduction : de leur roi. Les versions ont : Milkom, dieu des Ammonites, divinité à caractère politique (1 R 11.5, 33).'
  - type: text
    content: ','
  '6':
  - type: text
    content: et ceux qui se détournent ╵de l’Eternel,
  - type: text
    content: qui ne se soucient pas de lui
  - type: text
    content: et qui ne le consultent pas.
  - type: heading
    content: Contre les grands
  '7':
  - type: text
    content: Que l’on fasse silence ╵devant le Seigneur, l’Eternel !
  - type: text
    content: Car il est proche, ╵le jour de l’Eternel
  - type: note
    content: Voir Es 13.6-9 ; Ez 20.2-3 ; Am 5.18 ; Ab 15 ; Jl 1.15 ; 2.1-2, 10-11 ; 3.3-4 ; 4.14-16.
  - type: text
    content: .
  - type: text
    content: L’Eternel a prévu ╵un sacrifice
  - type: text
    content: et il a convoqué ╵ceux qui sont invités.
  '8':
  - type: text
    content: Au jour du sacrifice ╵de l’Eternel,
  - type: text
    content: j’interviendrai moi-même ╵contre les ministres du roi, ╵contre la cour
  - type: text
    content: et contre tous ceux qui s’habillent ╵à la mode étrangère.
  '9':
  - type: text
    content: En ce jour-là, j’interviendrai
  - type: text
    content: contre ceux qui sautillent ╵sur les marches du trône,
  - type: text
    content: contre ceux qui remplissent ╵de violence et de fraude ╵la maison de leur maître
  - type: note
    content: 'Allusion à l’empressement des courtisans. Certains traduisent sur les marches du trône par : par-dessus le seuil, ce qui renverrait à une pratique païenne (voir 1 S 5.5). maître: autre traduction : le temple de leur dieu.'
  - type: text
    content: .
  - type: heading
    content: Contre les trafiquants
