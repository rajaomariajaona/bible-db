document_id: ZEP.1,21
type_code: fra
verses:
  '1':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Parole que l’Eternel adressa sous le règne de Josias, fils d’Amôn, roi de Juda, à Sophonie, fils de Koushi, fils de Guedalia, descendant d’Amaria et d’Ezéchias
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1.1 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Josias a régné de 640 à 609 av. J.-C. (2 R 22.1 à 23.30 ; 2 Ch 34 et 35).
      marker-yv: yv-n
    - type: text
      text: .
  - type: usfm
    marker: s1
    children:
    - type: text
      text: L’annonce du jugement
    marker-yv: yv-h
  - type: usfm
    marker: s2
    children:
    - type: text
      text: Le jugement universel
    marker-yv: yv-h
  '10':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: On entendra, en ce jour-là,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: l’Eternel le déclare,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: près de la porte des Poissons
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1.10 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Porte de l’ancienne Jérusalem, au nord-ouest.
      marker-yv: yv-n
    - type: text
      text: ', ╵des cris retentissants,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: des hurlements ╵dans le nouveau quartier
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1.10 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Au nord-ouest de l’ancienne ville.
      marker-yv: yv-n
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et, venant des collines, ╵un fracas formidable.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Habitants de la ville basse
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1.11 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Autre traduction : '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'du quartier du Mortier. '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Ce quartier se trouvait dans la vallée du Tyropéon, juste au sud du mont Morija ; des marchands y vivaient.
      marker-yv: yv-n
    - type: text
      text: ', ╵hurlez,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: parce qu’il est anéanti ╵le peuple des marchands,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: tous ceux qui croulent sous l’argent
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1.11 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Autre traduction : '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: tous les peseurs d’argent.
      marker-yv: yv-n
    - type: text
      text: ' ╵vont être exterminés.'
  - type: usfm
    marker: s2
    children:
    - type: text
      text: Contre les parvenus
    marker-yv: yv-h
  '12':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: En ce temps-là,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: je fouillerai Jérusalem ╵avec des torches
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et je châtierai tous les hommes
  - type: usfm
    marker: q1
    children:
    - type: text
      text: qui croupissent tel un vin sur sa lie,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: se disant en eux-mêmes
  - type: usfm
    marker: q1
    children:
    - type: text
      text: que l’Eternel ne fait ╵ni du bien ni du mal.
  '13':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Leurs richesses seront pillées,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: leurs maisons dévastées.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ils auront bâti des demeures
  - type: usfm
    marker: q1
    children:
    - type: text
      text: mais ils n’y habiteront pas ;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ils auront planté des vignobles
  - type: usfm
    marker: q1
    children:
    - type: text
      text: mais ils n’en boiront pas le vin.
  - type: usfm
    marker: s2
    children:
    - type: text
      text: Le jour de l’Eternel
    marker-yv: yv-h
  '14':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Car voici qu’il est proche, ╵le jour de l’Eternel,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: oui, ce grand jour est proche, ╵il arrive à grands pas,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: on entendra des cris amers ╵au jour de l’Eternel.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Le guerrier le plus brave ╵poussera de grands cris.
  '15':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: En effet, ce jour-là ╵est un jour de colère,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: c’est un jour de détresse ╵et de malheur,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: un jour de destruction ╵et de désolation,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: un jour d’obscurité ╵et d’épaisses ténèbres,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: c’est un jour de nuages ╵et de brouillards épais,
  '16':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: jour où retentiront ╵la sonnerie du cor ╵et des clameurs de guerre
  - type: usfm
    marker: q1
    children:
    - type: text
      text: contre les villes fortes
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et les hautes tours d’angle.
  '17':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Je plongerai les hommes ╵dans la détresse,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et, comme des aveugles, ╵ils marcheront en tâtonnant
  - type: usfm
    marker: q1
    children:
    - type: text
      text: parce qu’ils ont péché ╵contre moi, l’Eternel.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Leur sang sera versé ╵comme de la poussière
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et, comme des ordures, ╵leurs corps seront jetés
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1.17 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Autre traduction : '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: leurs entrailles seront répandues.
      marker-yv: yv-n
    - type: text
      text: .
  '18':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Leur argent et leur or ╵ne pourront les sauver
  - type: usfm
    marker: q1
    children:
    - type: text
      text: au jour de la colère ╵de l’Eternel,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: lorsqu’il consumera ╵la terre tout entière
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1.18 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Autre traduction : '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: le pays tout entier.
      marker-yv: yv-n
  - type: usfm
    marker: q1
    children:
    - type: text
      text: par le feu de son amour bafoué
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1.18 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Voir '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: '3.8'
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: .
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Car il provoquera, ╵ – et ce sera épouvantable –
  - type: usfm
    marker: q1
    children:
    - type: text
      text: la destruction totale ╵de tous ceux qui habitent sur la terre
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1.18 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Autre traduction : '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: dans le pays.
      marker-yv: yv-n
    - type: text
      text: .
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Je vais tout balayer ╵de la surface de la terre,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: l’Eternel le déclare.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Je balaierai les hommes ╵de même que les bêtes,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: je balaierai aussi ╵les oiseaux dans le ciel ╵et les poissons des mers,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: tout ce qui fait ╵trébucher les méchants ;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: je retrancherai les humains ╵de la surface de la terre,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: l’Eternel le déclare.
  - type: usfm
    marker: s2
    children:
    - type: text
      text: Contre les idolâtres
    marker-yv: yv-h
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Je vais lever la main ╵contre le peuple de Juda
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et contre tous ceux qui habitent ╵Jérusalem,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: je supprimerai de ce lieu ╵ce qui subsiste de Baal.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Je ferai disparaître ╵le souvenir ╵de ses desservants effrénés
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1.4 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Le terme hébreu correspondant désigne toujours des prêtres cananéens ou idolâtres (voir 2 R 23.5 ; Os 10.5).
      marker-yv: yv-n
  - type: usfm
    marker: q1
    children:
    - type: text
      text: avec ses prêtres,
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: je ferai disparaître ╵tous ceux qui se prosternent ╵devant l’armée du ciel
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1.5 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Les astres auxquels certains Juifs rendaient un culte (
        - type: usfm
          marker: ref
          children:
          - type: text
            text: 2 R 21.3-5
        - type: text
          text: ', '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: 21-22
        - type: text
          text: ).
      marker-yv: yv-n
    - type: text
      text: ' ╵sur les toits des maisons,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et ceux qui se prosternent ╵devant l’Eternel et jurent par lui
  - type: usfm
    marker: q1
    children:
    - type: text
      text: tout en prêtant serment ╵au nom du dieu Molok
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1.5 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Autre traduction : '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'de leur roi. '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Les versions ont : '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'Milkom, '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: dieu des Ammonites, divinité à caractère politique (
        - type: usfm
          marker: ref
          children:
          - type: text
            text: 1 R 11.5
        - type: text
          text: ', '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: '33'
        - type: text
          text: ).
      marker-yv: yv-n
    - type: text
      text: ','
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et ceux qui se détournent ╵de l’Eternel,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: qui ne se soucient pas de lui
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et qui ne le consultent pas.
  - type: usfm
    marker: s2
    children:
    - type: text
      text: Contre les grands
    marker-yv: yv-h
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Que l’on fasse silence ╵devant le Seigneur, l’Eternel !
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Car il est proche, ╵le jour de l’Eternel
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1.7 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Voir Es 13.6-9 ; Ez 20.2-3 ; Am 5.18 ; Ab 15 ; Jl 1.15 ; 2.1-2, 10-11 ; 3.3-4 ; 4.14-16.
      marker-yv: yv-n
    - type: text
      text: .
  - type: usfm
    marker: q1
    children:
    - type: text
      text: L’Eternel a prévu ╵un sacrifice
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et il a convoqué ╵ceux qui sont invités.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Au jour du sacrifice ╵de l’Eternel,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: j’interviendrai moi-même ╵contre les ministres du roi, ╵contre la cour
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et contre tous ceux qui s’habillent ╵à la mode étrangère.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: En ce jour-là, j’interviendrai
  - type: usfm
    marker: q1
    children:
    - type: text
      text: contre ceux qui sautillent ╵sur les marches du trône,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: contre ceux qui remplissent ╵de violence et de fraude ╵la maison de leur maître
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1.9 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Allusion à l’empressement des courtisans. Certains traduisent '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'sur les marches du trône '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'par : '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'par-dessus le seuil, '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'ce qui renverrait à une pratique païenne (voir '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: 1 S 5.5
        - type: text
          text: '). '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: maître
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: ': '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'autre traduction : '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: le temple de leur dieu.
      marker-yv: yv-n
    - type: text
      text: .
  - type: usfm
    marker: s2
    children:
    - type: text
      text: Contre les trafiquants
    marker-yv: yv-h
