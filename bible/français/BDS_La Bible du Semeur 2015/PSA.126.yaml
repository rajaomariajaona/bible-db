  children:
  - type: text
    text: Semailles et moisson
  marker-yv: yv-h
- type: usfm
  marker: d
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Cantique pour la route vers la demeure de l’Eternel
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '126.1 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Voir note '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '120.1'
        metadata:
          usfm: PSA.120.1
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: q1
  children:
  - type: text
    text: Quand l’Eternel a ramené ╵les captifs de Sion
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '126.1 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Autre traduction : '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: a changé le sort de Sion.
    marker-yv: yv-n
  - type: text
    text: ','
- type: usfm
  marker: q1
  children:
  - type: text
    text: nous étions comme dans un rêve.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Alors nous ne cessions de rire
- type: usfm
  marker: q1
  children:
  - type: text
    text: et de pousser des cris de joie.
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Alors on disait chez les autres peuples :'
- type: usfm
  marker: q1
  children:
  - type: text
    text: « Oh, l’Eternel a fait pour eux ╵de grandes choses ! »
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Oui, l’Eternel a fait pour nous
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'de grandes choses :'
- type: usfm
  marker: q1
  children:
  - type: text
    text: nous sommes dans la joie.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Viens changer notre sort
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '126.4 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Autre traduction : '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: ramène nos captifs.
    marker-yv: yv-n
  - type: text
    text: ', ╵ô Eternel,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: comme quand l’eau coule à nouveau ╵dans les lits des rivières du Néguev.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Qui sème dans les larmes
- type: usfm
  marker: q1
  children:
  - type: text
    text: moissonnera avec des cris de joie !
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Qui s’en va en pleurant ╵alors qu’il porte sa semence
- type: usfm
  marker: q1
  children:
  - type: text
    text: reviendra en poussant des cris de joie, ╵alors qu’il portera ses gerbes.
