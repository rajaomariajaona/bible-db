document_id: PSA.126,21
type_code: fra
verses:
  '1':
  - type: heading
    content: Semailles et moisson
  - type: text
    content: Cantique pour la route vers la demeure de l’Eternel
  - type: note
    content: Voir note 120.1.
  - type: text
    content: .
  - type: text
    content: Quand l’Eternel a ramené ╵les captifs de Sion
  - type: note
    content: 'Autre traduction : a changé le sort de Sion.'
  - type: text
    content: ','
  - type: text
    content: nous étions comme dans un rêve.
  '2':
  - type: text
    content: Alors nous ne cessions de rire
  - type: text
    content: et de pousser des cris de joie.
  - type: text
    content: 'Alors on disait chez les autres peuples :'
  - type: text
    content: « Oh, l’Eternel a fait pour eux ╵de grandes choses ! »
  '3':
  - type: text
    content: Oui, l’Eternel a fait pour nous
  - type: text
    content: 'de grandes choses :'
  - type: text
    content: nous sommes dans la joie.
  '4':
  - type: text
    content: Viens changer notre sort
  - type: note
    content: 'Autre traduction : ramène nos captifs.'
  - type: text
    content: ', ╵ô Eternel,'
  - type: text
    content: comme quand l’eau coule à nouveau ╵dans les lits des rivières du Néguev.
  '5':
  - type: text
    content: Qui sème dans les larmes
  - type: text
    content: moissonnera avec des cris de joie !
  '6':
  - type: text
    content: Qui s’en va en pleurant ╵alors qu’il porte sa semence
  - type: text
    content: reviendra en poussant des cris de joie, ╵alors qu’il portera ses gerbes.
