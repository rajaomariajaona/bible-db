document_id: 1CH.19,21
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: L’affront des Ammonites
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: (2 S 10.1-19)
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Quelque temps après, Nahash, le roi des Ammonites, mourut et son fils régna à sa place. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Voyant qu’il aurait à faire face sur deux fronts à la fois, devant et derrière lui, Joab sélectionna ses meilleurs soldats et les fit ranger en ordre de bataille, face aux Syriens ; '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'il confia le commandement du reste de l’armée à son frère Abishaï et ils le rangèrent en ordre de bataille pour affronter les Ammonites. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Joab dit à son frère : Si tu vois que les Syriens l’emportent sur moi, tu viendras à ma rescousse ; si les Ammonites sont plus forts que toi, c’est moi qui te porterai secours. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Bon courage, et luttons vaillamment pour défendre notre peuple et les villes de notre Dieu ! Et que l’Eternel fasse ce qu’il jugera bon !
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Alors Joab et sa troupe s’avancèrent devant les Syriens pour le combat. Ceux-ci s’enfuirent devant lui. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Quand les Ammonites virent que les Syriens avaient pris la fuite, ils s’enfuirent eux aussi devant Abishaï, le frère de Joab, et se retirèrent dans la ville ; et Joab rentra à Jérusalem.
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Les Syriens, voyant qu’ils avaient été mis en fuite par les Israélites, envoyèrent des messagers pour mobiliser les Syriens établis de l’autre côté de l’Euphrate. Shophak, chef de l’armée de Hadadézer, était à leur tête. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Quand David en fut informé, il mobilisa tout Israël, traversa le Jourdain, marcha contre les Syriens et prit position en face d’eux. Il se rangea en ordre de bataille pour les affronter et ceux-ci engagèrent le combat, '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: mais ils furent mis en fuite par les Israélites. David leur tua les soldats de sept mille chars et quarante mille fantassins
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '19.18 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Voir '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: 2 S 10.18
        - type: text
          text: ' et la note.'
      marker-yv: yv-n
    - type: text
      text: '  ; il fit aussi mourir Shophak, leur général en chef. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Quand les vassaux de Hadadézer virent qu’ils avaient été battus par Israël, ils firent la paix avec David et lui furent assujettis. Après cela, les Syriens ne voulurent plus venir au secours des Ammonites.
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'David se dit : Je veux témoigner de la bonté au jeune roi, car son père m’en a témoigné.'
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'David lui envoya donc des messagers, pour lui présenter ses condoléances à l’occasion de la mort de son père. Lorsque les hauts fonctionnaires de David arrivèrent au pays des Ammonites auprès de Hanoun pour lui présenter des condoléances, '
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'les dirigeants de ce peuple dirent à Hanoun : Crois-tu que ce soit pour honorer la mémoire de ton père que David t’envoie des gens pour t’adresser des condoléances ? N’est-ce pas plutôt pour reconnaître et espionner le pays afin de le détruire que ces gens sont venus ?'
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Alors Hanoun fit arrêter les ambassadeurs de David, les fit raser et leur fit couper les habits jusqu’en haut des cuisses, puis il les renvoya. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ils s’en allèrent, mais ils étaient si honteux que lorsqu’on informa David de ce qui s’était passé, il envoya des messagers à leur rencontre pour leur faire dire : Restez à Jéricho, jusqu’à ce que votre barbe ait repoussé ; vous reviendrez ensuite.'
  - type: usfm
    marker: s1
    children:
    - type: text
      text: La victoire sur les Ammonites et les Syriens
    marker-yv: yv-h
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Les Ammonites comprirent qu’ils s’étaient rendus odieux à David. Alors Hanoun et les Ammonites envoyèrent trente tonnes d’argent aux Syriens de Mésopotamie, de Maaka et de Tsoba
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '19.6 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Maaka
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: ': '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'voir Dt 3.14 ; Jos 12.5 ; 13.13. '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Tsoba
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: ': '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: royaume syrien situé au nord de Damas entre le Liban et l’Anti-Liban sur la frontière nord d’Israël. Saül l’avait déjà combattu (
        - type: usfm
          marker: ref
          children:
          - type: text
            text: 1 S 14.47
        - type: text
          text: ).
      marker-yv: yv-n
    - type: text
      text: ', pour enrôler des soldats sur char et se procurer '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: trente-deux mille chars de guerre. Ils parvinrent aussi à mobiliser le roi de Maaka avec son armée qui vinrent établir leur camp devant Médeba
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '19.7 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Une ville moabite apparemment aux mains des Ammonites.
      marker-yv: yv-n
    - type: text
      text: '. De leur côté, les Ammonites sortirent de leurs villes, se rassemblèrent et vinrent pour le combat. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Quand David l’apprit, il envoya contre eux Joab avec toute l’armée des soldats de métier.
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Les Ammonites firent une sortie et se rangèrent en ordre de bataille à l’entrée de leur capitale, tandis que les rois qui étaient venus restaient à part, en rase campagne. '
