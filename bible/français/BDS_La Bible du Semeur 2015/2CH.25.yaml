document_id: 2CH.25,21
type_code: fra
verses:
  '1':
  - type: heading
    content: Les actes d’obéissance et la victoire militaire
  - type: heading
    content: (2 R 14.1-6)
  - type: text
    content: Amatsia avait vingt-cinq ans lorsqu’il devint roi et il régna vingt-neuf ans à Jérusalem
  - type: note
    content: De 796 à 767 av. J.-C.
  - type: text
    content: '. Sa mère s’appelait Yehoaddân, elle était de Jérusalem. '
  '10':
  - type: text
    content: Alors Amatsia renvoya chez eux les soldats qui étaient venus d’Ephraïm. Mais ceux-ci furent très en colère contre Juda et ils rentrèrent chez eux furieux.
  - type: heading
    content: (2 R 14.7)
  '11':
  - type: text
    content: Amatsia rassembla son courage, prit la tête de son armée et se dirigea vers la vallée du Sel où il battit dix mille habitants de Séir
  - type: note
    content: Des Edomites (2 R 14.7) du désert situé au sud de la mer Morte.
  - type: text
    content: '. '
  '12':
  - type: text
    content: Les Judéens capturèrent vivants dix mille hommes qu’ils emmenèrent au sommet d’une falaise
  - type: note
    content: 'falaise: (en hébreu : séla) peut-être de la ville de Séla, capitale des Edomites (2 R 14.7).'
  - type: text
    content: ' d’où ils les précipitèrent tous dans le vide, de sorte qu’ils se rompirent les os.'
  - type: heading
    content: L’idolâtrie et le refus d’écouter un prophète
  '13':
  - type: text
    content: Mais, pendant ce temps, les soldats de la troupe qu’Amatsia avait renvoyés, pour qu’ils ne participent pas à son expédition, envahirent les villes de Juda depuis Samarie jusqu’à Beth-Horôn. Ils massacrèrent trois mille habitants et emportèrent un butin considérable.
  '14':
  - type: text
    content: 'Lorsque Amatsia fut de retour après sa victoire sur les Edomites, il rapporta les statues de leurs dieux et en fit ses propres dieux ; il se prosterna devant elles et leur offrit des parfums. '
  '15':
  - type: text
    content: 'Alors l’Eternel se mit en colère contre lui et il lui envoya un prophète qui lui demanda : Pourquoi t’es-tu tourné vers les dieux de ce peuple qui n’ont même pas été capables de délivrer leur propre peuple de ton pouvoir ?'
  '16':
  - type: text
    content: 'Mais le roi l’interrompit en lui répliquant : Est-ce qu’on t’a nommé conseiller du roi ? Tais-toi ! Inutile de te faire tuer !'
  - type: text
    content: 'Le prophète n’insista pas, mais avant de se retirer, il dit cependant : Parce que tu as agi comme tu l’as fait et que tu as refusé d’écouter mes conseils, je reconnais que Dieu a décidé dans son conseil de te détruire.'
  - type: heading
    content: La défaite devant Israël
  - type: heading
    content: (2 R 14.8-20)
  '17':
  - type: text
    content: 'Amatsia, roi de Juda, prit l’avis de ses conseillers, puis il envoya des messagers à Joas, fils de Yoahaz et petit-fils de Jéhu, roi d’Israël, pour lui faire dire : Allons nous affronter !'
  '18':
  - type: text
    content: 'Joas lui fit répondre : Un jour, le chardon du Liban envoya dire au cèdre du Liban : « Donne ta fille en mariage à mon fils ! » Mais les bêtes sauvages du Liban passèrent par là et piétinèrent le chardon. '
  '19':
  - type: text
    content: 'Tu te dis que tu as vaincu les Edomites, alors l’orgueil t’est monté à la tête et tu te glorifies ! Maintenant, tu ferais mieux de rester chez toi : pourquoi veux-tu t’engager dans une entreprise malheureuse et courir au-devant d’un désastre pour toi et pour le royaume de Juda ?'
  '2':
  - type: text
    content: Il fit ce que l’Eternel considère comme juste, mais non pas d’un cœur sans partage
  - type: note
    content: Il a maintenu les hauts lieux (2 R 14.4) et adopté des dieux édomites (voir v. 14).
  - type: text
    content: '. '
  '20':
  - type: text
    content: 'Mais Amatsia n’écouta pas son avertissement, car Dieu faisait en sorte que lui et son peuple subissent la défaite parce qu’ils s’étaient tournés vers les dieux d’Edom. '
  '21':
  - type: text
    content: 'Alors Joas, roi d’Israël, se mit en campagne. Les deux rois s’affrontèrent à Beth-Shémesh au pays de Juda. '
  '22':
  - type: text
    content: 'L’armée de Juda fut battue par celle d’Israël, et les soldats de Juda s’enfuirent chacun chez soi. '
  '23':
  - type: text
    content: 'A Beth-Shémesh, Joas, roi d’Israël, fit prisonnier Amatsia, roi de Juda, fils de Joas et petit-fils de Yoahaz. Il l’emmena à Jérusalem et démolit le rempart de la ville sur une longueur de cent quatre-vingts mètres, depuis la porte d’Ephraïm jusqu’à la porte de l’Angle. '
  '24':
  - type: text
    content: Il prit tout l’or et l’argent et tous les objets précieux qui se trouvaient dans le temple de Dieu, sous la garde d’Obed-Edom
  - type: note
    content: Famille à laquelle avait été confiée la garde du sanctuaire et de l’argent de l’alliance (voir 1 Ch 13.13-14 ; 26.4-15).
  - type: text
    content: ', ainsi que les trésors du palais royal. Il prit en plus des otages, puis retourna à Samarie.'
  - type: heading
    content: L’assassinat d’Amatsia
  '25':
  - type: text
    content: 'Amatsia, fils de Joas, roi de Juda, vécut encore quinze années après la mort de Joas, fils de Yoahaz, roi d’Israël. '
  '26':
  - type: text
    content: 'Les autres faits et gestes d’Amatsia, des premiers aux derniers, sont cités dans le livre des rois de Juda et d’Israël. '
  '27':
  - type: text
    content: 'A partir du moment où Amatsia se détourna de l’Eternel, on trama contre lui un complot à Jérusalem. Il s’enfuit à Lakish. Mais ses ennemis envoyèrent des gens jusque-là pour le faire assassiner. '
  '28':
  - type: text
    content: On ramena son corps à dos de cheval à Jérusalem et on l’enterra aux côtés de ses ancêtres dans la cité de Juda.
  '3':
  - type: text
    content: 'Dès qu’Amatsia eut affermi son autorité royale, il fit exécuter les ministres qui avaient assassiné son père. '
  '4':
  - type: text
    content: 'Mais il ne fit pas mourir leurs fils, conformément aux ordres donnés par l’Eternel dans la Loi, dans le livre de Moïse, lorsqu’il dit : « Les pères ne seront pas mis à mort pour les fils et les fils ne seront pas mis à mort pour les pères ; mais chacun sera mis à mort pour son propre péché'
  - type: note
    content: Cité en Dt 24.16.
  - type: text
    content: . »
  - type: heading
    content: La guerre contre les Edomites
  '5':
  - type: text
    content: 'Amatsia rassembla Juda et établit, pour chaque groupe familial, des chefs de « milliers » et de « centaines » pour tout Juda et Benjamin. Il recensa ceux qui avaient au moins vingt ans ; il trouva trois cent mille hommes aptes à la guerre, et sachant manier la lance et le grand bouclier. '
  '6':
  - type: text
    content: 'Il enrôla encore pour trois tonnes et demie d’argent, cent mille mercenaires dans le royaume d’Israël du Nord. '
  '7':
  - type: text
    content: 'Un homme de Dieu vint lui dire : O roi, qu’une armée d’Israël n’aille pas combattre avec toi, car l’Eternel n’est pas avec le royaume du Nord, avec tous ces Ephraïmites. '
  '8':
  - type: text
    content: Si tu vas au combat avec eux, tu auras beau te battre vaillamment, Dieu te fera succomber devant l’ennemi, car Dieu a le pouvoir de secourir ou de faire succomber.
  '9':
  - type: text
    content: 'Amatsia demanda à l’homme de Dieu : Mais qu’adviendra-t-il de ces trois tonnes et demie d’argent que j’ai donné aux troupes d’Israël ?'
  - type: text
    content: 'L’homme de Dieu répondit : L’Eternel peut te donner bien plus que cela.'
