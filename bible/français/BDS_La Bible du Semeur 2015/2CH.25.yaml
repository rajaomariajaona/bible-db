document_id: 2CH.25
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Les actes d’obéissance et la victoire militaire
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: (2 R 14.1-6)
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Amatsia avait vingt-cinq ans lorsqu’il devint roi et il régna vingt-neuf ans à Jérusalem
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '25.1 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: De 796 à 767 av. J.-C.
    marker-yv: yv-n
  - type: text
    text: '. Sa mère s’appelait Yehoaddân, elle était de Jérusalem. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Il fit ce que l’Eternel considère comme juste, mais non pas d’un cœur sans partage
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '25.2 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Il a maintenu les hauts lieux (
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 2 R 14.4
        metadata:
          usfm: 2KI.14.4
      - type: text
        text: ) et adopté des dieux édomites (voir v. 14).
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Dès qu’Amatsia eut affermi son autorité royale, il fit exécuter les ministres qui avaient assassiné son père. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Mais il ne fit pas mourir leurs fils, conformément aux ordres donnés par l’Eternel dans la Loi, dans le livre de Moïse, lorsqu’il dit : « Les pères ne seront pas mis à mort pour les fils et les fils ne seront pas mis à mort pour les pères ; mais chacun sera mis à mort pour son propre péché'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '25.4 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Cité en '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Dt 24.16
        metadata:
          usfm: DEU.24.16
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: . »
- type: usfm
  marker: s1
  children:
  - type: text
    text: La guerre contre les Edomites
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Amatsia rassembla Juda et établit, pour chaque groupe familial, des chefs de « milliers » et de « centaines » pour tout Juda et Benjamin. Il recensa ceux qui avaient au moins vingt ans ; il trouva trois cent mille hommes aptes à la guerre, et sachant manier la lance et le grand bouclier. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Il enrôla encore pour trois tonnes et demie d’argent, cent mille mercenaires dans le royaume d’Israël du Nord. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Un homme de Dieu vint lui dire : O roi, qu’une armée d’Israël n’aille pas combattre avec toi, car l’Eternel n’est pas avec le royaume du Nord, avec tous ces Ephraïmites. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Si tu vas au combat avec eux, tu auras beau te battre vaillamment, Dieu te fera succomber devant l’ennemi, car Dieu a le pouvoir de secourir ou de faire succomber.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Amatsia demanda à l’homme de Dieu : Mais qu’adviendra-t-il de ces trois tonnes et demie d’argent que j’ai donné aux troupes d’Israël ?'
- type: usfm
  marker: p
  children:
  - type: text
    text: 'L’homme de Dieu répondit : L’Eternel peut te donner bien plus que cela.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Alors Amatsia renvoya chez eux les soldats qui étaient venus d’Ephraïm. Mais ceux-ci furent très en colère contre Juda et ils rentrèrent chez eux furieux.
- type: usfm
  marker: r
  children:
  - type: text
    text: (2 R 14.7)
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Amatsia rassembla son courage, prit la tête de son armée et se dirigea vers la vallée du Sel où il battit dix mille habitants de Séir
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '25.11 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Des Edomites (
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 2 R 14.7
        metadata:
          usfm: 2KI.14.7
      - type: text
        text: ) du désert situé au sud de la mer Morte.
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Les Judéens capturèrent vivants dix mille hommes qu’ils emmenèrent au sommet d’une falaise
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '25.12 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: falaise
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: ': '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '(en hébreu : '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: séla
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ') peut-être de la ville de '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'Séla, '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: capitale des Edomites (
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 2 R 14.7
        metadata:
          usfm: 2KI.14.7
      - type: text
        text: ).
    marker-yv: yv-n
  - type: text
    text: ' d’où ils les précipitèrent tous dans le vide, de sorte qu’ils se rompirent les os.'
- type: usfm
  marker: s1
  children:
  - type: text
    text: L’idolâtrie et le refus d’écouter un prophète
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Mais, pendant ce temps, les soldats de la troupe qu’Amatsia avait renvoyés, pour qu’ils ne participent pas à son expédition, envahirent les villes de Juda depuis Samarie jusqu’à Beth-Horôn. Ils massacrèrent trois mille habitants et emportèrent un butin considérable.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Lorsque Amatsia fut de retour après sa victoire sur les Edomites, il rapporta les statues de leurs dieux et en fit ses propres dieux ; il se prosterna devant elles et leur offrit des parfums. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Alors l’Eternel se mit en colère contre lui et il lui envoya un prophète qui lui demanda : Pourquoi t’es-tu tourné vers les dieux de ce peuple qui n’ont même pas été capables de délivrer leur propre peuple de ton pouvoir ?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Mais le roi l’interrompit en lui répliquant : Est-ce qu’on t’a nommé conseiller du roi ? Tais-toi ! Inutile de te faire tuer !'
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Le prophète n’insista pas, mais avant de se retirer, il dit cependant : Parce que tu as agi comme tu l’as fait et que tu as refusé d’écouter mes conseils, je reconnais que Dieu a décidé dans son conseil de te détruire.'
- type: usfm
  marker: s1
  children:
  - type: text
    text: La défaite devant Israël
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: (2 R 14.8-20)
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Amatsia, roi de Juda, prit l’avis de ses conseillers, puis il envoya des messagers à Joas, fils de Yoahaz et petit-fils de Jéhu, roi d’Israël, pour lui faire dire : Allons nous affronter !'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Joas lui fit répondre : Un jour, le chardon du Liban envoya dire au cèdre du Liban : « Donne ta fille en mariage à mon fils ! » Mais les bêtes sauvages du Liban passèrent par là et piétinèrent le chardon. '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Tu te dis que tu as vaincu les Edomites, alors l’orgueil t’est monté à la tête et tu te glorifies ! Maintenant, tu ferais mieux de rester chez toi : pourquoi veux-tu t’engager dans une entreprise malheureuse et courir au-devant d’un désastre pour toi et pour le royaume de Juda ?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Mais Amatsia n’écouta pas son avertissement, car Dieu faisait en sorte que lui et son peuple subissent la défaite parce qu’ils s’étaient tournés vers les dieux d’Edom. '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Alors Joas, roi d’Israël, se mit en campagne. Les deux rois s’affrontèrent à Beth-Shémesh au pays de Juda. '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'L’armée de Juda fut battue par celle d’Israël, et les soldats de Juda s’enfuirent chacun chez soi. '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'A Beth-Shémesh, Joas, roi d’Israël, fit prisonnier Amatsia, roi de Juda, fils de Joas et petit-fils de Yoahaz. Il l’emmena à Jérusalem et démolit le rempart de la ville sur une longueur de cent quatre-vingts mètres, depuis la porte d’Ephraïm jusqu’à la porte de l’Angle. '
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: Il prit tout l’or et l’argent et tous les objets précieux qui se trouvaient dans le temple de Dieu, sous la garde d’Obed-Edom
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '25.24 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Famille à laquelle avait été confiée la garde du sanctuaire et de l’argent de l’alliance (voir 1 Ch 13.13-14 ; 26.4-15).
    marker-yv: yv-n
  - type: text
    text: ', ainsi que les trésors du palais royal. Il prit en plus des otages, puis retourna à Samarie.'
- type: usfm
  marker: s1
  children:
  - type: text
    text: L’assassinat d’Amatsia
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Amatsia, fils de Joas, roi de Juda, vécut encore quinze années après la mort de Joas, fils de Yoahaz, roi d’Israël. '
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Les autres faits et gestes d’Amatsia, des premiers aux derniers, sont cités dans le livre des rois de Juda et d’Israël. '
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'A partir du moment où Amatsia se détourna de l’Eternel, on trama contre lui un complot à Jérusalem. Il s’enfuit à Lakish. Mais ses ennemis envoyèrent des gens jusque-là pour le faire assassiner. '
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: On ramena son corps à dos de cheval à Jérusalem et on l’enterra aux côtés de ses ancêtres dans la cité de Juda.
