document_id: 1JN.5,21
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s2
    children:
    - type: text
      text: Croire au Fils de Dieu
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: Celui qui croit que Jésus est Christ est né de Dieu. Et celui qui aime le Père, qui fait naître à la vie, aime aussi les enfants nés de lui.
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'Celui qui croit au Fils de Dieu possède ce témoignage en lui-même. Celui qui ne croit pas Dieu fait de lui un menteur, puisqu’il ne croit pas le témoignage que Dieu a rendu à son Fils. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: Et qu’affirme ce témoignage ? Il dit que Dieu nous a donné la vie éternelle et que cette vie est en son Fils.
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: Celui qui a le Fils a la vie. Celui qui n’a pas le Fils de Dieu n’a pas la vie.
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'Je vous ai écrit cela, pour que vous sachiez que vous avez la vie éternelle, vous qui croyez au Fils de Dieu. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'Et voici quelle assurance nous avons devant Dieu : si nous demandons quelque chose qui est conforme à sa volonté, il nous écoute. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: Et si nous savons qu’il nous écoute, nous savons aussi que l’objet de nos demandes nous est acquis.
  - type: usfm
    marker: s2
    children:
    - type: text
      text: Le chrétien et le péché
    marker-yv: yv-h
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: Si quelqu’un voit son frère commettre un péché qui ne mène pas à la mort, qu’il prie pour ce frère et Dieu lui donnera la vie. Il s’agit de ceux qui commettent des péchés qui ne mènent pas à la mort. Mais il existe un péché qui mène à la mort. Ce n’est pas au sujet de ce péché-là que je vous demande de prier.
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'Toute désobéissance à la Loi est un péché, certes, mais tous les péchés ne mènent pas à la mort. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: Nous savons que celui qui est né de Dieu ne commet pas le péché qui mène à la mort
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '5.18 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Voir '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: '3.9'
        - type: text
          text: ' et note.'
      marker-yv: yv-n
    - type: text
      text: ', car le Fils né de Dieu le protège'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '5.18 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Certains manuscrits ont : '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'celui qui est né de Dieu se garde lui-même. '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Variante : '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: et il se tient lui-même sur ses gardes.
      marker-yv: yv-n
    - type: text
      text: . Aussi le diable
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '5.18 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Autre traduction : '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: le mal.
      marker-yv: yv-n
    - type: text
      text: ' ne peut pas le dominer. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: Nous savons que nous sommes de Dieu, alors que le monde entier est sous la coupe du diable
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '5.19 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Autre traduction : '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: du mal.
      marker-yv: yv-n
    - type: text
      text: '. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'Voici comment nous savons que nous aimons les enfants de Dieu : c’est lorsque nous aimons Dieu lui-même et que nous obéissons à ses commandements. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: Mais nous savons aussi que le Fils de Dieu est venu et qu’il nous a donné l’intelligence pour que nous connaissions le Dieu véritable. Ainsi, nous sommes unis au Dieu véritable, de par notre union à son Fils Jésus-Christ. Ce Fils est lui-même le Dieu véritable et la vie éternelle.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Recommandation finale
    marker-yv: yv-h
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: Mes chers enfants, gardez-vous des idoles.
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'Car aimer Dieu, c’est accomplir ses commandements. Ceux-ci, d’ailleurs, ne sont pas pénibles, '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'car tout ce qui est né de Dieu triomphe du monde, et la victoire qui triomphe du monde, c’est notre foi. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: Qui, en effet, triomphe du monde ? Celui-là seul qui croit que Jésus est le Fils de Dieu.
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'Celui qui est venu par l’eau et par le sang, c’est bien Jésus-Christ : il n’est pas passé seulement par l’eau du baptême, mais outre le baptême, il est passé par la mort en versant son sang'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '5.6 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Le baptême a inauguré le ministère de Christ, qui s’est achevé par sa mort. C’est le même Jésus-Christ, Fils de Dieu, qui a été baptisé et qui est mort. Certains voient dans l’eau et le sang une allusion à '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: Jn 19.34
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: '. Et c’est l’Esprit qui lui rend témoignage, car l’Esprit est la vérité. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'Ainsi il y a trois témoins : '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: l’Esprit, l’eau et le sang ; et les trois sont d’accord.
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'Nous acceptons le témoignage des hommes ; mais le témoignage de Dieu est bien supérieur, et ce témoignage, c’est celui que Dieu a rendu à son Fils. '
