document_id: 1JN.5,21
type_code: fra
verses:
  '1':
  - type: heading
    content: Croire au Fils de Dieu
  - type: text
    content: Celui qui croit que Jésus est Christ est né de Dieu. Et celui qui aime le Père, qui fait naître à la vie, aime aussi les enfants nés de lui.
  '10':
  - type: text
    content: 'Celui qui croit au Fils de Dieu possède ce témoignage en lui-même. Celui qui ne croit pas Dieu fait de lui un menteur, puisqu’il ne croit pas le témoignage que Dieu a rendu à son Fils. '
  '11':
  - type: text
    content: Et qu’affirme ce témoignage ? Il dit que Dieu nous a donné la vie éternelle et que cette vie est en son Fils.
  '12':
  - type: text
    content: Celui qui a le Fils a la vie. Celui qui n’a pas le Fils de Dieu n’a pas la vie.
  '13':
  - type: text
    content: 'Je vous ai écrit cela, pour que vous sachiez que vous avez la vie éternelle, vous qui croyez au Fils de Dieu. '
  '14':
  - type: text
    content: 'Et voici quelle assurance nous avons devant Dieu : si nous demandons quelque chose qui est conforme à sa volonté, il nous écoute. '
  '15':
  - type: text
    content: Et si nous savons qu’il nous écoute, nous savons aussi que l’objet de nos demandes nous est acquis.
  - type: heading
    content: Le chrétien et le péché
  '16':
  - type: text
    content: Si quelqu’un voit son frère commettre un péché qui ne mène pas à la mort, qu’il prie pour ce frère et Dieu lui donnera la vie. Il s’agit de ceux qui commettent des péchés qui ne mènent pas à la mort. Mais il existe un péché qui mène à la mort. Ce n’est pas au sujet de ce péché-là que je vous demande de prier.
  '17':
  - type: text
    content: 'Toute désobéissance à la Loi est un péché, certes, mais tous les péchés ne mènent pas à la mort. '
  '18':
  - type: text
    content: Nous savons que celui qui est né de Dieu ne commet pas le péché qui mène à la mort
  - type: note
    content: Voir 3.9 et note.
  - type: text
    content: ', car le Fils né de Dieu le protège'
  - type: note
    content: 'Certains manuscrits ont : celui qui est né de Dieu se garde lui-même. Variante : et il se tient lui-même sur ses gardes.'
  - type: text
    content: . Aussi le diable
  - type: note
    content: 'Autre traduction : le mal.'
  - type: text
    content: ' ne peut pas le dominer. '
  '19':
  - type: text
    content: Nous savons que nous sommes de Dieu, alors que le monde entier est sous la coupe du diable
  - type: note
    content: 'Autre traduction : du mal.'
  - type: text
    content: '. '
  '2':
  - type: text
    content: 'Voici comment nous savons que nous aimons les enfants de Dieu : c’est lorsque nous aimons Dieu lui-même et que nous obéissons à ses commandements. '
  '20':
  - type: text
    content: Mais nous savons aussi que le Fils de Dieu est venu et qu’il nous a donné l’intelligence pour que nous connaissions le Dieu véritable. Ainsi, nous sommes unis au Dieu véritable, de par notre union à son Fils Jésus-Christ. Ce Fils est lui-même le Dieu véritable et la vie éternelle.
  - type: heading
    content: Recommandation finale
  '21':
  - type: text
    content: Mes chers enfants, gardez-vous des idoles.
  '3':
  - type: text
    content: 'Car aimer Dieu, c’est accomplir ses commandements. Ceux-ci, d’ailleurs, ne sont pas pénibles, '
  '4':
  - type: text
    content: 'car tout ce qui est né de Dieu triomphe du monde, et la victoire qui triomphe du monde, c’est notre foi. '
  '5':
  - type: text
    content: Qui, en effet, triomphe du monde ? Celui-là seul qui croit que Jésus est le Fils de Dieu.
  '6':
  - type: text
    content: 'Celui qui est venu par l’eau et par le sang, c’est bien Jésus-Christ : il n’est pas passé seulement par l’eau du baptême, mais outre le baptême, il est passé par la mort en versant son sang'
  - type: note
    content: Le baptême a inauguré le ministère de Christ, qui s’est achevé par sa mort. C’est le même Jésus-Christ, Fils de Dieu, qui a été baptisé et qui est mort. Certains voient dans l’eau et le sang une allusion à Jn 19.34.
  - type: text
    content: '. Et c’est l’Esprit qui lui rend témoignage, car l’Esprit est la vérité. '
  '7':
  - type: text
    content: 'Ainsi il y a trois témoins : '
  '8':
  - type: text
    content: l’Esprit, l’eau et le sang ; et les trois sont d’accord.
  '9':
  - type: text
    content: 'Nous acceptons le témoignage des hommes ; mais le témoignage de Dieu est bien supérieur, et ce témoignage, c’est celui que Dieu a rendu à son Fils. '
