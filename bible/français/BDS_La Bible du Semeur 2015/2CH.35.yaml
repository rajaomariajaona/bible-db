document_id: 2CH.35,21
type_code: fra
verses:
  '1':
  - type: heading
    content: Josias célèbre la Pâque
  - type: text
    content: Josias célébra la Pâque à Jérusalem en l’honneur de l’Eternel, et l’on immola les agneaux pour cette fête le quatorzième jour du premier mois
  - type: note
    content: La fête est célébrée à la date réglementaire (Lv 23.5).
  - type: text
    content: '. '
  '10':
  - type: text
    content: 'Voici comment la cérémonie fut organisée : les prêtres se tinrent à leur poste et les lévites étaient répartis selon leur classe conformément aux ordres du roi. '
  '11':
  - type: text
    content: 'Ils immolèrent les agneaux de la Pâque. Les lévites remettaient aux prêtres le sang des animaux pour qu’ils le répandent sur l’autel, puis ils ôtaient la peau des victimes. '
  '12':
  - type: text
    content: 'Ils mettaient de côté les parties des bêtes qui devaient être offertes en holocaustes pour les donner aux différentes subdivisions des groupes familiaux afin qu’ils les offrent à l’Eternel comme cela est prescrit dans le livre de Moïse. On fit de même pour le gros bétail. '
  '13':
  - type: text
    content: Ils firent rôtir les agneaux de la Pâque au feu, selon le rituel prescrit
  - type: note
    content: Voir Ex 12.8-9.
  - type: text
    content: ', tandis que les offrandes consacrées furent cuites dans des chaudières, des chaudrons et des poêles pour être ensuite rapidement distribuées à tous les gens du peuple. '
  '14':
  - type: text
    content: Enfin, les lévites préparèrent la Pâque pour eux-mêmes et pour les prêtres, car les prêtres descendants d’Aaron furent occupés jusqu’à la nuit à offrir les holocaustes et les graisses. C’est pourquoi les lévites préparèrent la Pâque pour eux-mêmes et pour les prêtres descendants d’Aaron.
  '15':
  - type: text
    content: 'Les musiciens descendants d’Asaph étaient à leur poste selon les directives de David, d’Asaph, d’Hémân et de Yedoutoun, le prophète du roi. Les portiers aussi étaient à chaque porte ; ils n’eurent pas à interrompre leur service, car leurs collègues lévites firent les préparatifs pour eux. '
  '16':
  - type: text
    content: Ainsi furent organisées ce jour-là toutes les cérémonies en l’honneur de l’Eternel pour célébrer la Pâque et pour offrir les holocaustes sur l’autel de l’Eternel, conformément aux ordres du roi Josias.
  '17':
  - type: text
    content: Les Israélites qui se trouvaient là célébrèrent la Pâque à ce moment-là et la fête des Pains sans levain pendant sept jours
  - type: note
    content: Voir Ex 12.1-20.
  - type: text
    content: .
  - type: heading
    content: (2 R 23.22-23)
  '18':
  - type: text
    content: 'Aucune Pâque semblable n’avait été célébrée en Israël depuis l’époque du prophète Samuel. Aucun des rois d’Israël n’avait organisé de célébration de la Pâque comparable à la Pâque célébrée par Josias avec l’aide des prêtres et des lévites, avec tout Juda et ceux d’Israël qui se trouvaient là, ainsi que les habitants de Jérusalem. '
  '19':
  - type: text
    content: Ce fut dans la dix-huitième année du règne de Josias que cette Pâque fut célébrée
  - type: note
    content: L’année même où le livre de la Loi fut découvert (voir v. 8).
  - type: text
    content: .
  - type: heading
    content: La fin de Josias
  - type: heading
    content: (2 R 23.28-30)
  '2':
  - type: text
    content: 'Il rétablit les prêtres dans leurs fonctions et il les encouragea dans leur service du temple de l’Eternel. '
  '20':
  - type: text
    content: Après tous ces événements, après que Josias eut remis le Temple en état, Néko
  - type: note
    content: En 609 av. J.-C., le pharaon Néko est parti combattre les Babyloniens pour secourir les Assyriens, ses alliés.
  - type: text
    content: ', roi d’Egypte, partit en guerre à Karkemish sur l’Euphrate'
  - type: note
    content: Une grande ville sur la rive ouest de l’Euphrate, une capitale hittite, centre du commerce d’Asie occidentale.
  - type: text
    content: '. Josias se mit en campagne pour lui barrer la route. '
  '21':
  - type: text
    content: 'Mais Néko lui envoya des messagers pour lui dire : Roi de Juda, qu’avons-nous à faire ensemble ? Ce n’est pas contre toi que je me suis mis en campagne aujourd’hui. C’est contre une autre dynastie que je suis en guerre. Dieu m’a ordonné de me dépêcher. Garde-toi de t’opposer à Dieu qui est avec moi, sinon il te détruira.'
  '22':
  - type: text
    content: Mais Josias ne voulut pas se retirer, et il se déguisa pour aller l’affronter sans tenir compte de l’avertissement de Néko, qui était pourtant inspiré par Dieu. Il vint livrer bataille dans la vallée de Meguiddo
  - type: note
    content: Antique et classique champ de bataille dans la plaine d’Esdrelon (voir Jg 5.19 ; 1 R 9.15-19 ; 2 R 9.27).
  - type: text
    content: '. '
  '23':
  - type: text
    content: 'Au cours du combat, les archers l’atteignirent. Le roi dit à ses serviteurs : Emmenez-moi, car je suis grièvement blessé.'
  '24':
  - type: text
    content: 'Ses officiers le descendirent de son char de combat, le mirent sur son second char et le conduisirent à Jérusalem. Il mourut et fut enterré dans les tombeaux de ses ancêtres. Tout Juda et Jérusalem prirent le deuil pour Josias. '
  '25':
  - type: text
    content: Jérémie composa une complainte funèbre sur lui. Tous les chanteurs et toutes les chanteuses célèbrent Josias dans leurs complaintes jusqu’à ce jour, car c’est devenu une tradition en Israël. Ces chants sont consignés dans le recueil des complaintes.
  '26':
  - type: text
    content: 'Les autres faits et gestes de Josias et ses actes de piété qu’il a accomplis conformément à ce qui est écrit dans la Loi de l’Eternel, '
  '27':
  - type: text
    content: ses actes, des premiers aux derniers, tout cela est cité dans le livre des rois d’Israël et de Juda.
  '3':
  - type: text
    content: 'Puis il s’adressa aux lévites chargés d’enseigner tout le peuple d’Israël et qui étaient consacrés à l’Eternel. Il leur dit : Déposez le coffre sacré dans le temple que Salomon, fils de David, roi d’Israël, a construit. Maintenant vous n’avez plus à le transporter sur vos épaules. Servez l’Eternel votre Dieu et son peuple Israël. '
  '4':
  - type: text
    content: Organisez-vous en vous répartissant par groupes familiaux et selon vos classes, d’après les instructions écrites de David, le roi d’Israël, et de son fils Salomon
  - type: note
    content: Voir 1 Ch 23 à 26 ; 2 Ch 8.14.
  - type: text
    content: '. '
  '5':
  - type: text
    content: 'Occupez vos postes dans le sanctuaire de façon à faire correspondre une classe de groupe familial lévitique à chaque subdivision des groupes familiaux de vos compatriotes, les gens du peuple. '
  '6':
  - type: text
    content: Immolez les agneaux de la Pâque. Purifiez-vous rituellement et préparez la Pâque pour vos compatriotes
  - type: note
    content: 'Autre traduction : et aidez vos compatriotes à agir.'
  - type: text
    content: ' selon la parole de l’Eternel, transmise par l’intermédiaire de Moïse.'
  '7':
  - type: text
    content: 'Josias préleva pour la Pâque trente mille agneaux et chevreaux ainsi que trois mille bœufs sur ses propres troupeaux pour tous les gens du peuple qui se trouvaient à Jérusalem. '
  '8':
  - type: text
    content: 'Ses grands firent aussi volontairement des dons au peuple, aux prêtres et aux lévites. Hilqiya, Zacharie et Yehiel, les responsables du Temple, donnèrent aux prêtres deux mille six cents agneaux et chevreaux pour la Pâque ainsi que trois cents bœufs. '
  '9':
  - type: text
    content: Konania et ses frères Shemaya et Netanéel, Hashabia, Yeïel et Yozabad, chefs des lévites, fournirent aux lévites cinq mille agneaux et chevreaux pour la Pâque et cinq cents bœufs.
