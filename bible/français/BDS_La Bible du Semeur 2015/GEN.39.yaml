document_id: GEN.39,21
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Joseph en Egypte
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: Joseph, arrivé en Egypte, avait donc été acheté aux Ismaélites qui l’avaient conduit là-bas, par Potiphar, haut fonctionnaire du pharaon, chef de la garde royale.
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Jour après jour, elle revenait à la charge ; mais Joseph ne voulait pas l’écouter, refusant de coucher à côté d’elle et d’être avec elle.
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Un certain jour, Joseph était entré dans la maison pour faire son travail. Aucun domestique ne se trouvait là. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Alors elle l’agrippa par son vêtement en disant : Couche avec moi !'
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Mais il lui abandonna son vêtement entre les mains, et s’enfuit dehors. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Quand elle vit qu’il s’était enfui dehors en lui laissant son vêtement entre les mains, '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'elle se mit à crier pour appeler ses domestiques, puis elle leur dit : Voyez cela ! Il nous a amené un Hébreu pour se jouer de nous. Il est venu vers moi pour coucher avec moi. Mais j’ai crié très fort. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Quand il a entendu que je poussais des cris pour appeler à l’aide, il a abandonné son vêtement à côté de moi et s’est enfui dehors.
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Elle garda le vêtement de Joseph à côté d’elle jusqu’au retour de son mari à la maison. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Alors elle lui raconta la même histoire : L’esclave hébreu que tu nous as amené, dit-elle, est venu vers moi pour se jouer de moi. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Mais quand je me suis mise à crier pour appeler au secours, il a abandonné son vêtement à côté de moi et s’est enfui dehors.
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Quand le maître de Joseph entendit le récit de sa femme qui lui disait : « Voilà comment ton serviteur s’est comporté envers moi », il se mit dans une grande colère.'
  - type: usfm
    marker: s1
    children:
    - type: text
      text: En prison
    marker-yv: yv-h
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: L’Eternel fut avec Joseph
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '39.2 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Voir '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: Ac 7.9
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: ', de sorte qu’il réussissait ce qu’il entreprenait. Il demeurait dans la maison de son maître égyptien. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Il fit saisir Joseph pour le jeter dans la maison d’arrêt où étaient détenus les prisonniers du roi. Ainsi Joseph demeura dans la prison. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Mais l’Eternel fut avec lui et lui témoigna sa bonté : il lui fit gagner la faveur du commandant de la prison. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Celui-ci lui confia le soin de tous les détenus qui se trouvaient dans la prison et la direction de tout ce qu’on y faisait. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Il ne s’occupait plus de rien de ce qui passait par la main de Joseph, parce que l’Eternel était avec lui et faisait réussir ce qu’il entreprenait.
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Celui-ci remarqua que l’Eternel était avec Joseph et faisait prospérer tout ce qu’il entreprenait. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ainsi Joseph obtint la faveur de son maître qui l’attacha à son service personnel : il l’établit comme intendant sur sa maison et lui confia la gérance de tous ses biens. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'A partir de ce moment-là, l’Eternel bénit la maison de l’Egyptien à cause de Joseph. Sa bénédiction reposait sur tout ce qu’il possédait, dans sa maison comme aux champs. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Alors Potiphar laissa tout ce qui lui appartenait entre les mains de Joseph – ne s’occupant plus de rien – sauf de ses repas.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Victime de la femme de Potiphar
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Joseph était un bel homme ayant un beau visage. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Après ces événements, la femme de son maître porta les yeux sur lui et lui dit : Couche avec moi !'
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Mais il refusa et dit à la femme de son maître : Mon maître ne me demande compte de rien dans la maison, il m’a confié tous ses biens. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Lui-même n’a pas plus d’autorité que moi ici et il ne m’a rien interdit – excepté toi, parce que tu es sa femme. Comment commettrais-je un acte aussi mauvais et pécherais-je contre Dieu ?
