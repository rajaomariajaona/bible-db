document_id: LEV.27,21
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Les personnes et les biens voués à l’Eternel
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'L’Eternel s’adressa à Moïse en disant : '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: On ne le remplacera pas par un autre, on ne substituera pas une bête bonne à une mauvaise, ni inversement, car si l’on remplace une bête par une autre, toutes les deux, celle qui est remplacée et celle qui la remplace, seront tenues pour sacrées.
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Si l’on a dédié par vœu à l’Eternel un animal impur qu’on ne peut donc pas offrir en sacrifice
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '27.11 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Comme le cheval, l’âne ou le chameau (voir '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: Lv 11.2-8
        - type: text
          text: ).
      marker-yv: yv-n
    - type: text
      text: ' à l’Eternel, on le présentera au prêtre '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'qui en estimera la valeur en fonction de ses qualités et de ses défauts ; et l’on s’en tiendra à son estimation. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Si l’offrant veut racheter la bête, il majorera cette estimation d’un cinquième.
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Lorsque quelqu’un consacre sa maison à l’Eternel, le prêtre en fera l’estimation en tenant compte de son état, et l’on s’en tiendra à la valeur qu’il aura fixée. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Si celui qui l’a consacrée veut la racheter, il ajoutera un cinquième au prix estimé, et elle lui appartiendra à nouveau.
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Si c’est un terrain faisant partie de son patrimoine que quelqu’un consacre à l’Eternel, la valeur en sera estimée en fonction de ce qu’on peut y semer à raison de 600 grammes d’argent pour quatre hectolitres d’orge. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: S’il consacre son champ dès l’année du jubilé
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '27.17 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Voir '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: Lv 25.8-22
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: ', c’est à ce taux qu’il sera estimé. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Mais s’il le consacre à l’Eternel après le jubilé, le prêtre en calculera la valeur en fonction du nombre d’années qui restent jusqu’au jubilé suivant, et il réduira le prix en conséquence.
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Si celui qui a consacré son champ veut le racheter, il ajoutera un cinquième au prix estimé et pourra en reprendre possession. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Parle aux Israélites, et dis-leur : Quand quelqu’un dédie une personne à l’Eternel par un vœu, il s’en acquittera d’après l’estimation suivante. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'S’il ne rachète pas le champ et qu’on le vende à un tiers, il perd son droit de rachat, '
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'de sorte que cette terre, au moment du jubilé, sera consacrée à l’Eternel tout comme un champ voué à l’Eternel ; elle deviendra la propriété du prêtre. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Si quelqu’un consacre à l’Eternel un champ qu’il a acquis pour lui, et qui ne fait donc pas partie de son patrimoine, '
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'le prêtre en estimera la valeur en fonction du nombre d’années qui restent jusqu’au jubilé. L’homme paiera ce prix le jour même puisque le champ est consacré à l’Eternel. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'L’année du jubilé, le champ reviendra à la personne à qui on l’avait acheté et qui le comptait dans son patrimoine. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Toute estimation sera faite selon l’unité de poids en vigueur au sanctuaire ; cette unité (le sicle) vaut douze grammes (vingt guéras)
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '27.25 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Voir '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: Ex 30.13
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: .
  '26':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Cependant, personne ne pourra consacrer les premiers-nés de son bétail à l’Eternel car, comme premiers-nés, qu’il s’agisse de gros ou de petit bétail, ils appartiennent à l’Eternel. '
  '27':
  - type: usfm
    marker: p
    children:
    - type: text
      text: S’il s’agit du premier-né d’un animal impur, son propriétaire pourra le racheter au prix estimé majoré d’un cinquième ; s’il n’est pas racheté, il sera vendu au prix estimé.
  '28':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Par contre, rien de ce que quelqu’un a voué à l’Eternel – homme, animal ou champ de son patrimoine – ne pourra se vendre ou se racheter : car tout ce qui a été voué est très saint et appartient à l’Eternel. '
  '29':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Si une personne a été vouée à l’Eternel, elle ne pourra pas être rachetée ; elle sera mise à mort
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '27.29 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Il ne s’agit pas d’un sacrifice, mais d’une forme de jugement.
      marker-yv: yv-n
    - type: text
      text: .
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'S’il s’agit d’un homme entre vingt et soixante ans, sa valeur s’estime à 600 grammes d’argent, selon l’unité de poids en vigueur au sanctuaire. '
  '30':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Toute dîme prélevée sur les produits de la terre et sur les fruits des arbres appartient à l’Eternel : c’est une chose sacrée qui est à lui'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '27.30 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Pour les v. 30-33, voir Nb 18.21 ; Dt 14.22-23.
      marker-yv: yv-n
    - type: text
      text: '. '
  '31':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Si quelqu’un tient à racheter une partie de sa dîme, il en majorera le prix d’un cinquième de sa valeur
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '27.31 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: La dîme était généralement payée en nature. Elle pouvait aussi être acquittée en argent à condition d’être majorée de vingt pour cent de la valeur du produit (v. 13).
      marker-yv: yv-n
    - type: text
      text: .
  '32':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Toute dîme de gros et de menu bétail, c’est-à-dire chaque dixième bête qui passe sous la houlette, sera consacrée à l’Eternel. '
  '33':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Le propriétaire ne choisira pas entre celles qui sont bonnes et celles qui sont mauvaises, et on ne fera pas d’échange ; si on procède quand même à un échange, les deux bêtes, celle qui est remplacée et celle qui la remplace, seront tenues pour sacrées et ne pourront pas être rachetées.
  '34':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Tels sont les commandements que l’Eternel a donnés à Moïse pour les Israélites au mont Sinaï.
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Si c’est une femme, sa valeur sera de 360 grammes d’argent. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Un garçon entre cinq et vingt ans s’estime à 240 grammes d’argent, et une fille à 120 grammes d’argent. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Depuis l’âge d’un mois jusqu’à cinq ans, un garçon s’estime à 60 grammes d’argent et une fille à 36 grammes. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: A soixante ans et au-dessus, un homme s’estime à 180 grammes d’argent, et une femme à 120 grammes.
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Si la personne qui a fait le vœu est trop pauvre pour payer la valeur fixée, on la présentera au prêtre pour qu’il fasse une estimation en fonction de ses ressources.
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Si c’est un animal qu’on peut offrir à l’Eternel, tout ce qui en a été donné à l’Eternel sera tenu pour sacré. '
