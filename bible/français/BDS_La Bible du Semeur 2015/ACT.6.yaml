document_id: ACT.6,21
type_code: fra
verses:
  '1':
  - type: heading
    content: L’élection des Sept
  - type: text
    content: 'A cette époque-là, comme le nombre des disciples ne cessait d’augmenter, des tensions surgirent entre les disciples juifs de culture grecque et ceux qui étaient nés en Israël : les premiers se plaignaient de ce que leurs veuves étaient défavorisées lors des distributions quotidiennes'
  - type: note
    content: 'Selon les interprétations : distributions quotidiennes de nourriture ou d’aide financière.'
  - type: text
    content: .
  '10':
  - type: text
    content: mais ils se montraient incapables de résister à la sagesse de ses paroles, que lui donnait l’Esprit.
  '11':
  - type: text
    content: 'Là-dessus, ils payèrent des gens pour dire : Nous l’avons entendu prononcer des paroles blasphématoires contre Moïse et contre Dieu.'
  '12':
  - type: text
    content: 'Ils ameutèrent ainsi le peuple, les responsables du peuple et les spécialistes de la Loi. Survenant à l’improviste, ils s’emparèrent d’Etienne et l’amenèrent au Grand-Conseil. '
  '13':
  - type: text
    content: 'Là, ils firent comparaître de faux témoins qui déposèrent contre lui :'
  - type: text
    content: 'Cet homme que voici, dirent-ils, ne cesse de discourir contre ce lieu saint et contre la Loi de Moïse. '
  '14':
  - type: text
    content: En effet, nous l’avons entendu dire que ce Jésus de Nazareth détruirait ce lieu et changerait les coutumes que Moïse nous a transmises.
  '15':
  - type: text
    content: Tous ceux qui siégeaient au Grand-Conseil avaient les yeux fixés sur Etienne et son visage leur apparut comme celui d’un ange.
  '2':
  - type: text
    content: 'Alors les douze apôtres réunirent l’ensemble des disciples et leur dirent : Il ne serait pas légitime que nous arrêtions de proclamer la Parole de Dieu pour nous occuper des distributions. '
  '3':
  - type: text
    content: 'C’est pourquoi, frères, choisissez parmi vous sept hommes réputés dignes de confiance, remplis du Saint-Esprit et de sagesse. Nous les chargerons de ce travail. '
  '4':
  - type: text
    content: Cela nous permettra de nous consacrer à la prière et au service de l’enseignement.
  '5':
  - type: text
    content: Cette proposition convint à tous les disciples ; ils élurent Etienne, un homme plein de foi et d’Esprit Saint, ainsi que Philippe, Prochore, Nicanor, Timon, Parménas et Nicolas
  - type: note
    content: Tous ces noms sont grecs. L’assemblée semble avoir choisi uniquement des hommes émanant de la partie lésée.
  - type: text
    content: ', un non-Juif originaire d’Antioche qui s’était converti au judaïsme. '
  '6':
  - type: text
    content: Ils les présentèrent aux apôtres qui prièrent pour eux et leur imposèrent les mains.
  '7':
  - type: text
    content: La Parole de Dieu se répandait toujours plus. Le nombre des disciples s’accroissait beaucoup à Jérusalem. Et même de nombreux prêtres obéissaient à la foi.
  - type: heading
    content: Etienne témoin de Jésus-Christ
  '8':
  - type: text
    content: 'Etienne était rempli de la grâce et de la puissance divines et accomplissait de grands prodiges et des signes miraculeux au milieu du peuple. '
  '9':
  - type: text
    content: Alors des membres de la synagogue dite des Affranchis
  - type: note
    content: La synagogue des Affranchis (esclaves libérés) était surtout fréquentée par des descendants de Juifs emmenés comme esclaves en 63 av. J.-C. par le général romain Pompée.
  - type: text
    content: ', composée de Juifs de Cyrène, d’Alexandrie, de Cilicie et de la province d’Asie, se mirent à discuter avec lui, '
