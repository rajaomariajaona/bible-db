document_id: ACT.6,21
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: L’élection des Sept
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'A cette époque-là, comme le nombre des disciples ne cessait d’augmenter, des tensions surgirent entre les disciples juifs de culture grecque et ceux qui étaient nés en Israël : les premiers se plaignaient de ce que leurs veuves étaient défavorisées lors des distributions quotidiennes'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '6.1 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Selon les interprétations : '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'distributions quotidiennes '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: de nourriture ou d’aide financière.
      marker-yv: yv-n
    - type: text
      text: .
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: mais ils se montraient incapables de résister à la sagesse de ses paroles, que lui donnait l’Esprit.
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'Là-dessus, ils payèrent des gens pour dire : Nous l’avons entendu prononcer des paroles blasphématoires contre Moïse et contre Dieu.'
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'Ils ameutèrent ainsi le peuple, les responsables du peuple et les spécialistes de la Loi. Survenant à l’improviste, ils s’emparèrent d’Etienne et l’amenèrent au Grand-Conseil. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'Là, ils firent comparaître de faux témoins qui déposèrent contre lui :'
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Cet homme que voici, dirent-ils, ne cesse de discourir contre ce lieu saint et contre la Loi de Moïse. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: En effet, nous l’avons entendu dire que ce Jésus de Nazareth détruirait ce lieu et changerait les coutumes que Moïse nous a transmises.
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: Tous ceux qui siégeaient au Grand-Conseil avaient les yeux fixés sur Etienne et son visage leur apparut comme celui d’un ange.
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'Alors les douze apôtres réunirent l’ensemble des disciples et leur dirent : Il ne serait pas légitime que nous arrêtions de proclamer la Parole de Dieu pour nous occuper des distributions. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'C’est pourquoi, frères, choisissez parmi vous sept hommes réputés dignes de confiance, remplis du Saint-Esprit et de sagesse. Nous les chargerons de ce travail. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: Cela nous permettra de nous consacrer à la prière et au service de l’enseignement.
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: Cette proposition convint à tous les disciples ; ils élurent Etienne, un homme plein de foi et d’Esprit Saint, ainsi que Philippe, Prochore, Nicanor, Timon, Parménas et Nicolas
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '6.5 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Tous ces noms sont grecs. L’assemblée semble avoir choisi uniquement des hommes émanant de la partie lésée.
      marker-yv: yv-n
    - type: text
      text: ', un non-Juif originaire d’Antioche qui s’était converti au judaïsme. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: Ils les présentèrent aux apôtres qui prièrent pour eux et leur imposèrent les mains.
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: La Parole de Dieu se répandait toujours plus. Le nombre des disciples s’accroissait beaucoup à Jérusalem. Et même de nombreux prêtres obéissaient à la foi.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Etienne témoin de Jésus-Christ
    marker-yv: yv-h
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'Etienne était rempli de la grâce et de la puissance divines et accomplissait de grands prodiges et des signes miraculeux au milieu du peuple. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: Alors des membres de la synagogue dite des Affranchis
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '6.9 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'La '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'synagogue des Affranchis '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: (esclaves libérés) était surtout fréquentée par des descendants de Juifs emmenés comme esclaves en 63 av. J.-C. par le général romain Pompée.
      marker-yv: yv-n
    - type: text
      text: ', composée de Juifs de Cyrène, d’Alexandrie, de Cilicie et de la province d’Asie, se mirent à discuter avec lui, '
