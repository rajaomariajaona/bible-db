document_id: ZEP.2
type_code: fra
segments:
- type: usfm
  marker: s2
  children:
  - type: text
    text: L’appel à la conversion
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Rassemblez-vous, ╵regroupez-vous
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '2.1 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Autre traduction : '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: Réfléchissez, rentrez en vous-mêmes.
    marker-yv: yv-n
  - type: text
    text: ','
- type: usfm
  marker: q1
  children:
  - type: text
    text: ô vous, gens sans vergogne,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: avant que le décret ╵soit publié,
- type: usfm
  marker: q1
  children:
  - type: text
    text: que le jour passe ╵comme la bale au vent !
- type: usfm
  marker: q1
  children:
  - type: text
    text: N’attendez pas ╵que se fasse sentir sur vous ╵l’ardeur de la colère ╵de l’Eternel,
- type: usfm
  marker: q1
  children:
  - type: text
    text: que vous atteigne
- type: usfm
  marker: q1
  children:
  - type: text
    text: le jour de la colère ╵de l’Eternel.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Tournez-vous donc vers l’Eternel, ╵vous tous les humbles du pays,
- type: usfm
  marker: q1
  children:
  - type: text
    text: vous qui faites ce qui est droit,
- type: usfm
  marker: q1
  children:
  - type: text
    text: cherchez à accomplir ╵ce qui est juste. ╵Efforcez-vous d’être humbles ;
- type: usfm
  marker: q1
  children:
  - type: text
    text: peut-être serez-vous ╵mis à l’abri
- type: usfm
  marker: q1
  children:
  - type: text
    text: au jour de la colère ╵de l’Eternel.
- type: usfm
  marker: s2
  children:
  - type: text
    text: Malheur aux Philistins
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Gaza sera abandonnée,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ashkelôn sera dévastée,
- type: usfm
  marker: q1
  children:
  - type: text
    text: les habitants d’Ashdod ╵seront chassés au loin ╵à l’heure de midi.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Eqrôn sera déracinée.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Malheur aux habitants ╵des côtes de la mer,
- type: usfm
  marker: q1
  children:
  - type: text
    text: au peuple venu de la Crète
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '2.5 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Les Philistins.
    marker-yv: yv-n
  - type: text
    text: '  !'
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Car contre vous se fait entendre ╵la parole de l’Eternel :'
- type: usfm
  marker: q1
  children:
  - type: text
    text: « Malheur à Canaan, ╵pays des Philistins !
- type: usfm
  marker: q1
  children:
  - type: text
    text: Je te dévasterai ╵et je te viderai ╵de tous tes habitants. »
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: La région de la mer ╵servira de pacages,
- type: usfm
  marker: q1
  children:
  - type: text
    text: de citernes
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '2.6 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Texte incertain.
    marker-yv: yv-n
  - type: text
    text: ' pour les bergers'
- type: usfm
  marker: q1
  children:
  - type: text
    text: et de parcs à moutons.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Ce district va échoir au reste ╵du peuple de Juda.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ils y mèneront paître leurs troupeaux
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '2.7 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Autre traduction : '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: ils y trouveront leur pâture.
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: q1
  children:
  - type: text
    text: Le soir, ils se reposeront ╵dans les maisons à Ashkelôn,
- type: usfm
  marker: q1
  children:
  - type: text
    text: car l’Eternel, leur Dieu, ╵interviendra pour eux
- type: usfm
  marker: q1
  children:
  - type: text
    text: et changera leur sort
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '2.7 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Autre traduction : '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: et ramènera ceux d’entre eux qui auront été emmenés en captivité.
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: s2
  children:
  - type: text
    text: Malheur aux faux frères
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: J’ai entendu ╵les propos insultants ╵des Moabites,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et les outrages ╵des Ammonites
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '2.8 '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'Moab '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'et '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: Ammon
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: ': '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: peuplades installées à l’est du Jourdain et de la mer Morte, qui faisaient partie, avec les Edomites, des ennemis traditionnels d’Israël.
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: text
    text: qui insultaient mon peuple
- type: usfm
  marker: q1
  children:
  - type: text
    text: et qui s’agrandissaient ╵aux dépens de son territoire.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Aussi vrai que je vis,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'déclare l’Eternel, ╵le Seigneur des armées célestes, ╵Dieu d’Israël :'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Moab sera comme Sodome,
- type: usfm
  marker: q1
  children:
  - type: text
    text: les Ammonites ╵seront comme Gomorrhe
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '2.9 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Voir '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Gn 19.24-25
        metadata:
          usfm: GEN.19.24+GEN.19.25
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: ','
- type: usfm
  marker: q1
  children:
  - type: text
    text: leur pays deviendra ╵un lieu couvert d’orties,
- type: usfm
  marker: q1
  children:
  - type: text
    text: une mine de sel,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et une terre dévastée ╵à perpétuité.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Le reste de mon peuple ╵les pillera,
- type: usfm
  marker: q1
  children:
  - type: text
    text: oui, ce qui restera de ma nation ╵en prendra possession.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Cela leur adviendra ╵pour prix de leur orgueil,
- type: usfm
  marker: q1
  children:
  - type: text
    text: car ils ont insulté le peuple ╵de l’Eternel, ╵le Seigneur des armées célestes,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et se sont agrandis ╵à ses dépens.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Avec eux, l’Eternel ╵se montrera terrible,
- type: usfm
  marker: q1
  children:
  - type: text
    text: car il anéantit ╵tous les dieux de la terre ;
- type: usfm
  marker: q1
  children:
  - type: text
    text: alors tous les peuples, ╵jusques aux plus lointains, ╵se prosterneront devant lui,
- type: usfm
  marker: q1
  children:
  - type: text
    text: chacun dans sa contrée.
- type: usfm
  marker: s2
  children:
  - type: text
    text: Malheur aux Ethiopiens
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Vous aussi, Ethiopiens
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '2.12 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: De 715 à 663 av. J.-C., l’Egypte avait été gouvernée par une dynastie éthiopienne.
    marker-yv: yv-n
  - type: text
    text: ','
- type: usfm
  marker: q1
  children:
  - type: text
    text: vous serez transpercés ╵par mon épée.
- type: usfm
  marker: s2
  children:
  - type: text
    text: Malheur à Ninive l’orgueilleuse
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: L’Eternel étendra ╵la main contre le nord,
- type: usfm
  marker: q1
  children:
  - type: text
    text: il fera périr l’Assyrie
- type: usfm
  marker: q1
  children:
  - type: text
    text: et il dévastera Ninive
- type: usfm
  marker: q1
  children:
  - type: text
    text: pour en faire un désert aride.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Au milieu de la ville ╵se reposeront des troupeaux,
- type: usfm
  marker: q1
  children:
  - type: text
    text: des animaux de toute espèce,
- type: usfm
  marker: q1
  children:
  - type: text
    text: le hibou et le hérisson
- type: usfm
  marker: q1
  children:
  - type: text
    text: y passeront la nuit ╵parmi ses chapiteaux.
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'On entendra ╵hululer aux fenêtres :'
- type: usfm
  marker: q1
  children:
  - type: text
    text: dès le seuil des maisons, ╵ce ne sera que ruines,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et les poutres de cèdres ╵seront à nu.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: La voilà donc, ╵cette cité joyeuse,
- type: usfm
  marker: q1
  children:
  - type: text
    text: installée en toute sécurité,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'et qui se dit :'
- type: usfm
  marker: q1
  children:
  - type: text
    text: « C’est moi, et rien que moi ! »
- type: usfm
  marker: q1
  children:
  - type: text
    text: Comment est-elle devenue ╵une terre ainsi désolée,
- type: usfm
  marker: q1
  children:
  - type: text
    text: un gîte pour les bêtes ?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Quiconque passera ╵dans sa proximité
- type: usfm
  marker: q1
  children:
  - type: text
    text: se moquera d’elle en sifflant ╵et en faisant des gestes de la main.
