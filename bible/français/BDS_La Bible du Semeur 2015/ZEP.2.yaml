document_id: ZEP.2,21
type_code: fra
verses:
  '1':
  - type: heading
    content: L’appel à la conversion
  - type: text
    content: Rassemblez-vous, ╵regroupez-vous
  - type: note
    content: 'Autre traduction : Réfléchissez, rentrez en vous-mêmes.'
  - type: text
    content: ','
  - type: text
    content: ô vous, gens sans vergogne,
  '10':
  - type: text
    content: Cela leur adviendra ╵pour prix de leur orgueil,
  - type: text
    content: car ils ont insulté le peuple ╵de l’Eternel, ╵le Seigneur des armées célestes,
  - type: text
    content: et se sont agrandis ╵à ses dépens.
  '11':
  - type: text
    content: Avec eux, l’Eternel ╵se montrera terrible,
  - type: text
    content: car il anéantit ╵tous les dieux de la terre ;
  - type: text
    content: alors tous les peuples, ╵jusques aux plus lointains, ╵se prosterneront devant lui,
  - type: text
    content: chacun dans sa contrée.
  - type: heading
    content: Malheur aux Ethiopiens
  '12':
  - type: text
    content: Vous aussi, Ethiopiens
  - type: note
    content: De 715 à 663 av. J.-C., l’Egypte avait été gouvernée par une dynastie éthiopienne.
  - type: text
    content: ','
  - type: text
    content: vous serez transpercés ╵par mon épée.
  - type: heading
    content: Malheur à Ninive l’orgueilleuse
  '13':
  - type: text
    content: L’Eternel étendra ╵la main contre le nord,
  - type: text
    content: il fera périr l’Assyrie
  - type: text
    content: et il dévastera Ninive
  - type: text
    content: pour en faire un désert aride.
  '14':
  - type: text
    content: Au milieu de la ville ╵se reposeront des troupeaux,
  - type: text
    content: des animaux de toute espèce,
  - type: text
    content: le hibou et le hérisson
  - type: text
    content: y passeront la nuit ╵parmi ses chapiteaux.
  - type: text
    content: 'On entendra ╵hululer aux fenêtres :'
  - type: text
    content: dès le seuil des maisons, ╵ce ne sera que ruines,
  - type: text
    content: et les poutres de cèdres ╵seront à nu.
  '15':
  - type: text
    content: La voilà donc, ╵cette cité joyeuse,
  - type: text
    content: installée en toute sécurité,
  - type: text
    content: 'et qui se dit :'
  - type: text
    content: « C’est moi, et rien que moi ! »
  - type: text
    content: Comment est-elle devenue ╵une terre ainsi désolée,
  - type: text
    content: un gîte pour les bêtes ?
  - type: text
    content: Quiconque passera ╵dans sa proximité
  - type: text
    content: se moquera d’elle en sifflant ╵et en faisant des gestes de la main.
  '2':
  - type: text
    content: avant que le décret ╵soit publié,
  - type: text
    content: que le jour passe ╵comme la bale au vent !
  - type: text
    content: N’attendez pas ╵que se fasse sentir sur vous ╵l’ardeur de la colère ╵de l’Eternel,
  - type: text
    content: que vous atteigne
  - type: text
    content: le jour de la colère ╵de l’Eternel.
  '3':
  - type: text
    content: Tournez-vous donc vers l’Eternel, ╵vous tous les humbles du pays,
  - type: text
    content: vous qui faites ce qui est droit,
  - type: text
    content: cherchez à accomplir ╵ce qui est juste. ╵Efforcez-vous d’être humbles ;
  - type: text
    content: peut-être serez-vous ╵mis à l’abri
  - type: text
    content: au jour de la colère ╵de l’Eternel.
  - type: heading
    content: Malheur aux Philistins
  '4':
  - type: text
    content: Gaza sera abandonnée,
  - type: text
    content: Ashkelôn sera dévastée,
  - type: text
    content: les habitants d’Ashdod ╵seront chassés au loin ╵à l’heure de midi.
  - type: text
    content: Eqrôn sera déracinée.
  '5':
  - type: text
    content: Malheur aux habitants ╵des côtes de la mer,
  - type: text
    content: au peuple venu de la Crète
  - type: note
    content: Les Philistins.
  - type: text
    content: '  !'
  - type: text
    content: 'Car contre vous se fait entendre ╵la parole de l’Eternel :'
  - type: text
    content: « Malheur à Canaan, ╵pays des Philistins !
  - type: text
    content: Je te dévasterai ╵et je te viderai ╵de tous tes habitants. »
  '6':
  - type: text
    content: La région de la mer ╵servira de pacages,
  - type: text
    content: de citernes
  - type: note
    content: Texte incertain.
  - type: text
    content: ' pour les bergers'
  - type: text
    content: et de parcs à moutons.
  '7':
  - type: text
    content: Ce district va échoir au reste ╵du peuple de Juda.
  - type: text
    content: Ils y mèneront paître leurs troupeaux
  - type: note
    content: 'Autre traduction : ils y trouveront leur pâture.'
  - type: text
    content: .
  - type: text
    content: Le soir, ils se reposeront ╵dans les maisons à Ashkelôn,
  - type: text
    content: car l’Eternel, leur Dieu, ╵interviendra pour eux
  - type: text
    content: et changera leur sort
  - type: note
    content: 'Autre traduction : et ramènera ceux d’entre eux qui auront été emmenés en captivité.'
  - type: text
    content: .
  - type: heading
    content: Malheur aux faux frères
  '8':
  - type: text
    content: J’ai entendu ╵les propos insultants ╵des Moabites,
  - type: text
    content: et les outrages ╵des Ammonites
  - type: note
    content: 'Moab et Ammon: peuplades installées à l’est du Jourdain et de la mer Morte, qui faisaient partie, avec les Edomites, des ennemis traditionnels d’Israël.'
  - type: text
    content: qui insultaient mon peuple
  - type: text
    content: et qui s’agrandissaient ╵aux dépens de son territoire.
  '9':
  - type: text
    content: Aussi vrai que je vis,
  - type: text
    content: 'déclare l’Eternel, ╵le Seigneur des armées célestes, ╵Dieu d’Israël :'
  - type: text
    content: Moab sera comme Sodome,
  - type: text
    content: les Ammonites ╵seront comme Gomorrhe
  - type: note
    content: Voir Gn 19.24-25.
  - type: text
    content: ','
  - type: text
    content: leur pays deviendra ╵un lieu couvert d’orties,
  - type: text
    content: une mine de sel,
  - type: text
    content: et une terre dévastée ╵à perpétuité.
  - type: text
    content: Le reste de mon peuple ╵les pillera,
  - type: text
    content: oui, ce qui restera de ma nation ╵en prendra possession.
