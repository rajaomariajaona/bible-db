document_id: JER.22,21
type_code: fra
verses:
  '1':
  - type: heading
    content: La dernière chance
  - type: text
    content: 'L’Eternel me dit : Rends-toi au palais du roi de Juda, et là tu prononceras ces paroles : '
  '10':
  - type: text
    content: Ne pleurez pas ╵sur le roi qui est mort
  - type: note
    content: Il s’agit du roi Josias tué à Meguiddo en 609 av. J.-C. (2 R 23.29, 30 ; 2 Ch 35.24-25).
  - type: text
    content: ','
  - type: text
    content: ne vous lamentez pas sur lui !
  - type: text
    content: Pleurez, pleurez plutôt ╵sur celui qui s’en va
  - type: text
    content: 'parce qu’il ne reviendra pas :'
  - type: text
    content: il ne reverra plus ╵la terre où il est né
  - type: note
    content: Il s’agit de Yoahaz ou Shalloum qui n’a régné que trois mois (609 av. J.-C.). Il a été déporté par le pharaon Néko en Egypte où il est mort (2 R 23.31-34).
  - type: text
    content: .
  '11':
  - type: text
    content: 'Car voici ce que dit l’Eternel au sujet de Shalloum, fils de Josias, roi de Juda, qui a succédé sur le trône à son père Josias et qui vient de quitter ce lieu : Il n’y reviendra plus. '
  '12':
  - type: text
    content: Il mourra à l’endroit où on l’a déporté, et ne verra plus ce pays.
  - type: heading
    content: Sur Yehoyaqim
  '13':
  - type: text
    content: Malheur à l’homme ╵qui bâtit sa maison ╵au détriment de la justice
  - type: text
    content: et qui ajoute ╵des pièces à l’étage ╵en violant l’équité,
  - type: text
    content: qui fait travailler son prochain pour rien,
  - type: text
    content: sans lui donner ╵ce que vaut son travail
  - type: note
    content: Il s’agit de Yehoyaqim (609 à 598 av. J.-C. ; voir 2 R 24.1-7 ; 2 Ch 36.5-8). Jérémie le décrit d’abord (v. 13-14), puis l’apostrophe (v. 15-17), puis le nomme (v. 18).
  - type: text
    content: .
  '14':
  - type: text
    content: 'Et qui dit en lui-même : ╵Je vais bâtir pour moi ╵un palais imposant'
  - type: text
    content: avec de larges pièces à l’étage.
  - type: text
    content: J’y ménagerai des fenêtres,
  - type: text
    content: je le lambrisserai ╵avec du bois de cèdre,
  - type: text
    content: je l’enduirai de rouge !
  '15':
  - type: text
    content: Penses-tu qu’exercer la royauté ╵consiste à surpasser les autres ╵par les palais de cèdre ?
  - type: text
    content: Souviens-toi de ton père
  - type: note
    content: Josias, père de Yehoyaqim, roi fidèle à l’Eternel (voir 2 R 22.1 à 23.28).
  - type: text
    content: '  : ╵il a mangé et bu,'
  - type: text
    content: mais il a exercé ╵le droit et la justice
  - type: text
    content: et s’en est bien trouvé.
  '16':
  - type: text
    content: Il faisait droit aux pauvres, ╵aux défavorisés,
  - type: text
    content: et s’en est bien trouvé.
  - type: text
    content: C’est par là que quelqu’un ╵montre qu’il me connaît,
  - type: text
    content: l’Eternel le déclare.
  '17':
  - type: text
    content: Mais toi, tu n’as d’yeux, de pensées,
  - type: text
    content: que pour t’assurer des profits
  - type: text
    content: et pour tuer des innocents,
  - type: text
    content: pour opprimer les gens ╵et les traiter ╵avec brutalité.
  '18':
  - type: text
    content: 'Voilà pourquoi l’Eternel déclare ceci au sujet de Yehoyaqim, fils de Josias, roi de Juda :'
  - type: text
    content: 'Personne ne le pleurera ╵en disant : « Quel malheur, mon frère ! » ╵et « Quel malheur, ma sœur ! »'
  - type: text
    content: 'On ne mènera pas le deuil pour lui ╵en disant : « Hélas ! mon seigneur ! ╵Hélas sa majesté ! »'
  '19':
  - type: text
    content: Il sera enterré ╵comme on enterre un âne,
  - type: text
    content: on traînera son corps ╵et on le jettera ╵à l’extérieur ╵des portes de Jérusalem.
  - type: heading
    content: Sur Jérusalem
  '2':
  - type: text
    content: Ecoute ce que dit l’Eternel, roi de Juda, toi qui sièges sur le trône de David ! Ecoutez, toi, tes fonctionnaires et ton peuple qui passez par ces portes.
  '20':
  - type: text
    content: Monte au Liban et crie !
  - type: text
    content: Fais retentir ta voix ╵sur les monts du Basan !
  - type: text
    content: Va, pousse des clameurs ╵des plateaux d’Abarim
  - type: note
    content: Région située au nord de Moab.
  - type: text
    content: ','
  - type: text
    content: parce que tes amants
  - type: note
    content: 'C’est-à-dire : tes alliés (voir 4.30 et note ; 30.14).'
  - type: text
    content: ' ╵sont tous brisés.'
  '21':
  - type: text
    content: Je t’avais avertie ╵au temps de ta prospérité
  - type: text
    content: 'mais tu as déclaré : ╵« Je n’écouterai pas. »'
  - type: text
    content: 'C’est ainsi que tu t’es conduite ╵dès ta prime jeunesse :'
  - type: text
    content: et tu ne m’as pas écouté !
  '22':
  - type: text
    content: Le vent emportera ╵tes dirigeants,
  - type: text
    content: et tes amants
  - type: note
    content: Voir v. 20 et note.
  - type: text
    content: ' ╵s’en iront en exil ;'
  - type: text
    content: et tu seras, alors, ╵dans la honte et l’ignominie
  - type: text
    content: pour toute ta méchanceté !
  '23':
  - type: text
    content: Toi, qui habites le Liban,
  - type: text
    content: qui as placé ton nid ╵au sein des cèdres,
  - type: text
    content: comme tu vas gémir ╵lorsque tu seras prise ╵de douleurs, de souffrances
  - type: text
    content: comme une femme en couches
  - type: note
    content: Voir 21.14 et note.
  - type: text
    content: '  !'
  - type: heading
    content: Message à Konia (Yehoyakîn)
  '24':
  - type: text
    content: Aussi vrai que je vis, déclare l’Eternel, même si Konia, fils de Yehoyaqim, roi de Juda
  - type: note
    content: 'Konia: autre nom du roi Yehoyakîn, fils de Yehoyaqim. Après 3 mois de règne (598 à 597 av. J.-C.), il a été déporté à Babylone par Nabuchodonosor (voir 2 R 24.8-16 ; 2 Ch 36.8-10).'
  - type: text
    content: ', était comme l’anneau à ma main droite, qui sert de sceau, je l’en arracherais. '
  '25':
  - type: text
    content: 'Oui, je te livrerai à ceux qui veulent te tuer, à ceux devant lesquels tu trembles, à Nabuchodonosor, le roi de Babylone, ainsi qu’aux Chaldéens. '
  '26':
  - type: text
    content: 'Et je t’expédierai, toi ainsi que ta mère qui t’a donné le jour, dans un autre pays, où vous n’êtes pas nés. C’est là que vous mourrez. '
  '27':
  - type: text
    content: Quant au pays où ils voudraient tant revenir, ils n’y reviendront pas.
  '28':
  - type: text
    content: Cet homme, Konia, ╵est-il donc un pantin ╵méprisé et brisé,
  - type: text
    content: un objet de rebut,
  - type: text
    content: pour qu’on les ait jetés, ╵lui et sa descendance,
  - type: text
    content: et expédiés dans un pays ╵qu’ils ne connaissaient pas ?
  '29':
  - type: text
    content: O pays, pays, oui pays,
  - type: text
    content: écoute la parole ╵que l’Eternel t’adresse !
  '3':
  - type: text
    content: 'Voici ce que dit l’Eternel : Exercez le droit et la justice ; délivrez celui que l’on exploite de l’oppresseur ! Ne maltraitez pas l’étranger, l’orphelin et la veuve ; ne commettez pas de violences envers eux ; ne tuez pas des innocents dans ce lieu.'
  '30':
  - type: text
    content: 'Voici ce que déclare l’Eternel :'
  - type: text
    content: « Inscrivez que cet homme ╵sera privé d’enfants
  - type: text
    content: et qu’il ne réussira rien, ╵pendant toute sa vie.
  - type: text
    content: Parmi ses descendants, ╵aucun n’accédera
  - type: text
    content: au trône de David
  - type: text
    content: pour régner sur Juda. »
  '4':
  - type: text
    content: Car, si vous agissez vraiment selon ce que je vous dis, alors, des rois siégeant sur le trône de David continueront à passer par les portes de ce palais, montés sur des chars et des chevaux, avec leurs fonctionnaires et leurs sujets.
  '5':
  - type: text
    content: Mais si vous ne tenez pas compte de ces paroles, je le jure par moi-même – l’Eternel le déclare – ce palais ne sera plus que ruines
  - type: note
    content: Voir Mt 23.38 ; Lc 13.35.
  - type: text
    content: .
  '6':
  - type: text
    content: 'Car voici ce que déclare l’Eternel concernant le palais du roi de Juda :'
  - type: text
    content: Bien que tu sois pour moi ╵semblable à Galaad,
  - type: text
    content: aux cimes du Liban
  - type: note
    content: 'C’est-à-dire : bien que le palais du roi soit aussi beau, aussi élevé que les montagnes citées, bien qu’il paraisse aussi solide qu’elles, il sera dévasté par les envahisseurs (voir 2 R 10.32).'
  - type: text
    content: ','
  - type: text
    content: oui, je l’affirme, ╵je ferai de toi un désert,
  - type: text
    content: 'une cité inhabitée :'
  '7':
  - type: text
    content: je vais faire appel contre toi ╵à des démolisseurs
  - type: text
    content: armés de leurs outils ;
  - type: text
    content: ils abattront tes plus beaux cèdres
  - type: text
    content: et ils les jetteront au feu.
  '8':
  - type: text
    content: 'Des gens de nombreux peuples passeront près de cette ville et se demanderont les uns aux autres : « Pourquoi donc l’Eternel a-t-il traité ainsi cette grande cité ? » '
  '9':
  - type: text
    content: 'Et l’on répondra : « C’est parce qu’ils ont abandonné l’alliance conclue avec eux par l’Eternel leur Dieu, que, devant d’autres dieux, ils se sont prosternés et qu’ils leur ont rendu un culte. »'
  - type: heading
    content: Sur Shalloum (Yoahaz)
