document_id: JER.22
type_code: fra
segments:
- type: usfm
  marker: s2
  children:
  - type: text
    text: La dernière chance
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'L’Eternel me dit : Rends-toi au palais du roi de Juda, et là tu prononceras ces paroles : '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Ecoute ce que dit l’Eternel, roi de Juda, toi qui sièges sur le trône de David ! Ecoutez, toi, tes fonctionnaires et ton peuple qui passez par ces portes.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Voici ce que dit l’Eternel : Exercez le droit et la justice ; délivrez celui que l’on exploite de l’oppresseur ! Ne maltraitez pas l’étranger, l’orphelin et la veuve ; ne commettez pas de violences envers eux ; ne tuez pas des innocents dans ce lieu.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Car, si vous agissez vraiment selon ce que je vous dis, alors, des rois siégeant sur le trône de David continueront à passer par les portes de ce palais, montés sur des chars et des chevaux, avec leurs fonctionnaires et leurs sujets.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Mais si vous ne tenez pas compte de ces paroles, je le jure par moi-même – l’Eternel le déclare – ce palais ne sera plus que ruines
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '22.5 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Voir Mt 23.38 ; Lc 13.35.
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Car voici ce que déclare l’Eternel concernant le palais du roi de Juda :'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Bien que tu sois pour moi ╵semblable à Galaad,
- type: usfm
  marker: q1
  children:
  - type: text
    text: aux cimes du Liban
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '22.6 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'C’est-à-dire : bien que le palais du roi soit aussi beau, aussi élevé que les montagnes citées, bien qu’il paraisse aussi solide qu’elles, il sera dévasté par les envahisseurs (voir '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 2 R 10.32
        metadata:
          usfm: 2KI.10.32
      - type: text
        text: ).
    marker-yv: yv-n
  - type: text
    text: ','
- type: usfm
  marker: q1
  children:
  - type: text
    text: oui, je l’affirme, ╵je ferai de toi un désert,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'une cité inhabitée :'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: je vais faire appel contre toi ╵à des démolisseurs
- type: usfm
  marker: q1
  children:
  - type: text
    text: armés de leurs outils ;
- type: usfm
  marker: q1
  children:
  - type: text
    text: ils abattront tes plus beaux cèdres
- type: usfm
  marker: q1
  children:
  - type: text
    text: et ils les jetteront au feu.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Des gens de nombreux peuples passeront près de cette ville et se demanderont les uns aux autres : « Pourquoi donc l’Eternel a-t-il traité ainsi cette grande cité ? » '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Et l’on répondra : « C’est parce qu’ils ont abandonné l’alliance conclue avec eux par l’Eternel leur Dieu, que, devant d’autres dieux, ils se sont prosternés et qu’ils leur ont rendu un culte. »'
- type: usfm
  marker: s2
  children:
  - type: text
    text: Sur Shalloum (Yoahaz)
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Ne pleurez pas ╵sur le roi qui est mort
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '22.10 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Il s’agit du roi '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'Josias '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: tué à Meguiddo en 609 av. J.-C. (2 R 23.29, 30 ; 2 Ch 35.24-25).
    marker-yv: yv-n
  - type: text
    text: ','
- type: usfm
  marker: q1
  children:
  - type: text
    text: ne vous lamentez pas sur lui !
- type: usfm
  marker: q1
  children:
  - type: text
    text: Pleurez, pleurez plutôt ╵sur celui qui s’en va
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'parce qu’il ne reviendra pas :'
- type: usfm
  marker: q1
  children:
  - type: text
    text: il ne reverra plus ╵la terre où il est né
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '22.10 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Il s’agit de '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'Yoahaz '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'ou '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'Shalloum '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: qui n’a régné que trois mois (609 av. J.-C.). Il a été déporté par le pharaon Néko en Egypte où il est mort (
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 2 R 23.31-34
        metadata:
          usfm: 2KI.23.31+2KI.23.32+2KI.23.33+2KI.23.34
      - type: text
        text: ).
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Car voici ce que dit l’Eternel au sujet de Shalloum, fils de Josias, roi de Juda, qui a succédé sur le trône à son père Josias et qui vient de quitter ce lieu : Il n’y reviendra plus. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Il mourra à l’endroit où on l’a déporté, et ne verra plus ce pays.
- type: usfm
  marker: s2
  children:
  - type: text
    text: Sur Yehoyaqim
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Malheur à l’homme ╵qui bâtit sa maison ╵au détriment de la justice
- type: usfm
  marker: q1
  children:
  - type: text
    text: et qui ajoute ╵des pièces à l’étage ╵en violant l’équité,
- type: usfm
  marker: q1
  children:
  - type: text
    text: qui fait travailler son prochain pour rien,
- type: usfm
  marker: q1
  children:
  - type: text
    text: sans lui donner ╵ce que vaut son travail
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '22.13 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Il s’agit de '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'Yehoyaqim '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: (609 à 598 av. J.-C. ; voir 2 R 24.1-7 ; 2 Ch 36.5-8). Jérémie le décrit d’abord (v. 13-14), puis l’apostrophe (v. 15-17), puis le nomme (v. 18).
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Et qui dit en lui-même : ╵Je vais bâtir pour moi ╵un palais imposant'
- type: usfm
  marker: q1
  children:
  - type: text
    text: avec de larges pièces à l’étage.
- type: usfm
  marker: q1
  children:
  - type: text
    text: J’y ménagerai des fenêtres,
- type: usfm
  marker: q1
  children:
  - type: text
    text: je le lambrisserai ╵avec du bois de cèdre,
- type: usfm
  marker: q1
  children:
  - type: text
    text: je l’enduirai de rouge !
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Penses-tu qu’exercer la royauté ╵consiste à surpasser les autres ╵par les palais de cèdre ?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Souviens-toi de ton père
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '22.15 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Josias, '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'père '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: de Yehoyaqim, roi fidèle à l’Eternel (voir 2 R 22.1 à 23.28).
    marker-yv: yv-n
  - type: text
    text: '  : ╵il a mangé et bu,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: mais il a exercé ╵le droit et la justice
- type: usfm
  marker: q1
  children:
  - type: text
    text: et s’en est bien trouvé.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Il faisait droit aux pauvres, ╵aux défavorisés,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et s’en est bien trouvé.
- type: usfm
  marker: q1
  children:
  - type: text
    text: C’est par là que quelqu’un ╵montre qu’il me connaît,
- type: usfm
  marker: q1
  children:
  - type: text
    text: l’Eternel le déclare.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Mais toi, tu n’as d’yeux, de pensées,
- type: usfm
  marker: q1
  children:
  - type: text
    text: que pour t’assurer des profits
- type: usfm
  marker: q1
  children:
  - type: text
    text: et pour tuer des innocents,
- type: usfm
  marker: q1
  children:
  - type: text
    text: pour opprimer les gens ╵et les traiter ╵avec brutalité.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Voilà pourquoi l’Eternel déclare ceci au sujet de Yehoyaqim, fils de Josias, roi de Juda :'
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Personne ne le pleurera ╵en disant : « Quel malheur, mon frère ! » ╵et « Quel malheur, ma sœur ! »'
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'On ne mènera pas le deuil pour lui ╵en disant : « Hélas ! mon seigneur ! ╵Hélas sa majesté ! »'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Il sera enterré ╵comme on enterre un âne,
- type: usfm
  marker: q1
  children:
  - type: text
    text: on traînera son corps ╵et on le jettera ╵à l’extérieur ╵des portes de Jérusalem.
- type: usfm
  marker: s2
  children:
  - type: text
    text: Sur Jérusalem
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Monte au Liban et crie !
- type: usfm
  marker: q1
  children:
  - type: text
    text: Fais retentir ta voix ╵sur les monts du Basan !
- type: usfm
  marker: q1
  children:
  - type: text
    text: Va, pousse des clameurs ╵des plateaux d’Abarim
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '22.20 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Région située au nord de Moab.
    marker-yv: yv-n
  - type: text
    text: ','
- type: usfm
  marker: q1
  children:
  - type: text
    text: parce que tes amants
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '22.20 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'C’est-à-dire : tes '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'alliés '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: (voir 4.30 et note ; 30.14).
    marker-yv: yv-n
  - type: text
    text: ' ╵sont tous brisés.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Je t’avais avertie ╵au temps de ta prospérité
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'mais tu as déclaré : ╵« Je n’écouterai pas. »'
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'C’est ainsi que tu t’es conduite ╵dès ta prime jeunesse :'
- type: usfm
  marker: q1
  children:
  - type: text
    text: et tu ne m’as pas écouté !
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: Le vent emportera ╵tes dirigeants,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et tes amants
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '22.22 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Voir v. 20 et note.
    marker-yv: yv-n
  - type: text
    text: ' ╵s’en iront en exil ;'
- type: usfm
  marker: q1
  children:
  - type: text
    text: et tu seras, alors, ╵dans la honte et l’ignominie
- type: usfm
  marker: q1
  children:
  - type: text
    text: pour toute ta méchanceté !
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: Toi, qui habites le Liban,
- type: usfm
  marker: q1
  children:
  - type: text
    text: qui as placé ton nid ╵au sein des cèdres,
- type: usfm
  marker: q1
  children:
  - type: text
    text: comme tu vas gémir ╵lorsque tu seras prise ╵de douleurs, de souffrances
- type: usfm
  marker: q1
  children:
  - type: text
    text: comme une femme en couches
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '22.23 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Voir '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '21.14'
        metadata:
          usfm: JER.21.14
      - type: text
        text: ' et note.'
    marker-yv: yv-n
  - type: text
    text: '  !'
- type: usfm
  marker: s2
  children:
  - type: text
    text: Message à Konia (Yehoyakîn)
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: Aussi vrai que je vis, déclare l’Eternel, même si Konia, fils de Yehoyaqim, roi de Juda
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '22.24 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: Konia
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: ': '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: autre nom du roi Yehoyakîn, fils de Yehoyaqim. Après 3 mois de règne (598 à 597 av. J.-C.), il a été déporté à Babylone par Nabuchodonosor (voir 2 R 24.8-16 ; 2 Ch 36.8-10).
    marker-yv: yv-n
  - type: text
    text: ', était comme l’anneau à ma main droite, qui sert de sceau, je l’en arracherais. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Oui, je te livrerai à ceux qui veulent te tuer, à ceux devant lesquels tu trembles, à Nabuchodonosor, le roi de Babylone, ainsi qu’aux Chaldéens. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Et je t’expédierai, toi ainsi que ta mère qui t’a donné le jour, dans un autre pays, où vous n’êtes pas nés. C’est là que vous mourrez. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: Quant au pays où ils voudraient tant revenir, ils n’y reviendront pas.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: Cet homme, Konia, ╵est-il donc un pantin ╵méprisé et brisé,
- type: usfm
  marker: q1
  children:
  - type: text
    text: un objet de rebut,
- type: usfm
  marker: q1
  children:
  - type: text
    text: pour qu’on les ait jetés, ╵lui et sa descendance,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et expédiés dans un pays ╵qu’ils ne connaissaient pas ?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: O pays, pays, oui pays,
- type: usfm
  marker: q1
  children:
  - type: text
    text: écoute la parole ╵que l’Eternel t’adresse !
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'Voici ce que déclare l’Eternel :'
- type: usfm
  marker: q1
  children:
  - type: text
    text: « Inscrivez que cet homme ╵sera privé d’enfants
- type: usfm
  marker: q1
  children:
  - type: text
    text: et qu’il ne réussira rien, ╵pendant toute sa vie.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Parmi ses descendants, ╵aucun n’accédera
- type: usfm
  marker: q1
  children:
  - type: text
    text: au trône de David
- type: usfm
  marker: q1
  children:
  - type: text
    text: pour régner sur Juda. »
