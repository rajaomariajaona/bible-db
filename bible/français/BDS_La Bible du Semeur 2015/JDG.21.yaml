document_id: JDG.21,21
type_code: fra
verses:
  '1':
  - type: heading
    content: La tribu de Benjamin rétablie
  - type: text
    content: 'A Mitspa, les hommes avaient fait le serment qu’aucun d’entre eux ne donnerait sa fille en mariage à un Benjaminite. '
  '10':
  - type: text
    content: 'L’assemblée envoya contre eux douze mille soldats en leur donnant les ordres suivants : Allez massacrer tous les habitants de Yabesh en Galaad, y compris les femmes et les enfants. '
  '11':
  - type: text
    content: 'Voilà comment vous procéderez : Vous tuerez tout homme et toute femme qui a déjà vécu avec un homme.'
  '12':
  - type: text
    content: Ces soldats trouvèrent parmi les habitants de Yabesh en Galaad quatre cents jeunes filles vierges qui n’avaient pas été touchées par un homme. Ils les amenèrent au camp de Silo dans le pays de Canaan.
  '13':
  - type: text
    content: 'Toute l’assemblée envoya des messagers auprès des Benjaminites réfugiés au rocher de Rimmôn pour faire la paix avec eux. '
  '14':
  - type: text
    content: Ceux-ci retournèrent aussitôt chez eux. On leur donna les filles qui avaient été épargnées à Yabesh en Galaad, mais il ne s’en trouva pas assez pour eux tous.
  '15':
  - type: text
    content: 'Le peuple était pris de pitié pour Benjamin, parce que l’Eternel avait creusé un vide parmi les tribus d’Israël. '
  '16':
  - type: text
    content: 'Les responsables de l’assemblée dirent : Comment ferons-nous pour trouver des femmes à ceux qui restent encore, puisque celles de Benjamin ont été exterminées ? '
  '17':
  - type: text
    content: 'Ils ajoutèrent : Il faut assurer une descendance aux rescapés de Benjamin, afin qu’une tribu ne disparaisse pas d’Israël. '
  '18':
  - type: text
    content: 'Mais nous, nous ne pouvons pas leur donner nos filles en mariage, puisque nous avons juré : « Maudit soit celui qui donnera sa fille en mariage à un Benjaminite ! »'
  '19':
  - type: text
    content: 'Ils dirent alors qu’on allait bientôt célébrer comme chaque année la fête de l’Eternel à Silo, située au nord de Béthel, à l’est de la route de Béthel à Sichem, et au sud de Lebona. '
  '2':
  - type: text
    content: Le peuple vint à Béthel
  - type: note
    content: Voir 20.18, 26-27.
  - type: text
    content: ' et y resta assis jusqu’au soir devant Dieu. Ils se lamentèrent à haute voix et pleurèrent amèrement '
  '20':
  - type: text
    content: 'Alors ils ordonnèrent aux Benjaminites : Allez vous mettre en embuscade dans les vignes. '
  '21':
  - type: text
    content: 'Lorsque vous verrez les filles de Silo sortir de la ville pour danser leurs rondes, vous surgirez des vignes, chacun de vous enlèvera une fille et l’emmènera dans le pays de Benjamin pour en faire sa femme. '
  '22':
  - type: text
    content: 'Si leurs pères ou leurs frères viennent se plaindre à nous, nous leur répondrons : « Soyez compréhensifs envers eux, puisque nous n’avons pas pris une femme pour chacun d’eux lors de l’expédition contre Yabesh. D’ailleurs vous n’êtes pas coupables de parjure, puisque ce n’est pas vous qui les leur avez données. »'
  '23':
  - type: text
    content: 'Les Benjaminites suivirent ce conseil, ils prirent le nombre de femmes voulues parmi les jeunes filles qui dansaient. Ils les enlevèrent et partirent avec elles dans leur territoire. Ils rebâtirent leurs villes et s’y établirent. '
  '24':
  - type: text
    content: Les autres Israélites quittèrent ces lieux pour regagner leurs tribus et leurs familles ; de là, chacun rentra dans son territoire.
  '25':
  - type: text
    content: En ces temps-là, il n’y avait pas de roi en Israël. Chacun faisait ce qu’il jugeait bon.
  '3':
  - type: text
    content: 'en disant : Pourquoi, ô Eternel, Dieu d’Israël, ce malheur est-il arrivé en Israël ? Pourquoi une tribu d’Israël manque-t-elle aujourd’hui ?'
  '4':
  - type: text
    content: 'Le lendemain, le peuple se leva de bonne heure et ils bâtirent là un autel. Ils y offrirent des holocaustes et des sacrifices de communion. '
  '5':
  - type: text
    content: 'Puis les Israélites se demandèrent les uns aux autres quel groupe, parmi toutes les tribus d’Israël, n’était pas venu à l’assemblée tenue devant l’Eternel. Car on s’était solennellement engagé par serment à mettre à mort quiconque ne viendrait pas à Mitspa devant l’Eternel. '
  '6':
  - type: text
    content: 'Les Israélites furent pris de pitié pour les Benjaminites, leurs frères. Ils disaient : Aujourd’hui, une tribu a été retranchée d’Israël. '
  '7':
  - type: text
    content: Que ferons-nous pour que les survivants d’entre eux aient des femmes ? Car nous avons juré par l’Eternel de ne pas leur donner nos filles en mariage.
  '8':
  - type: text
    content: 'C’est pourquoi ils demandaient : Quel est parmi les tribus d’Israël le groupe qui n’est pas venu devant l’Eternel à Mitspa ?'
  - type: text
    content: Ils découvrirent que personne de Yabesh en Galaad
  - type: note
    content: Une des principales villes israélites, à l’est du Jourdain (voir 1 S 11 ; 31.11-13 ; 2 S 2.5-7 ; 21.12).
  - type: text
    content: ' n’était venu au camp et à l’assemblée.'
  '9':
  - type: text
    content: 'En effet, lorsqu’on fit le recensement du peuple, on ne trouva aucun habitant de Yabesh en Galaad. '
