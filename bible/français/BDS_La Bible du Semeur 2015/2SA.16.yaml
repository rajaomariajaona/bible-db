document_id: 2SA.16,21
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: David et Tsiba
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Quand David eut un peu dépassé le sommet de la colline, Tsiba, l’intendant de Mephibosheth, vint à sa rencontre avec deux ânes bâtés portant deux cents pains, cent paquets de raisins secs, cent autres de fruits d’été et une outre de vin. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: – Cela vous regarde-t-il, fils de Tserouya ? lui répondit le roi. Qu’il prononce ses malédictions, car si l’Eternel lui a dit de me maudire, qui peut le lui reprocher ?
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'Puis David déclara à Abishaï et à tous ses fonctionnaires : Si mon propre fils que j’ai engendré cherche à me faire mourir, à plus forte raison ce Benjaminite agira-t-il ainsi ! Laissez-le tranquille et qu’il maudisse, car l’Eternel le lui a dit. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: Peut-être l’Eternel considérera-t-il ma situation misérable et changera-t-il la malédiction d’aujourd’hui en bien.
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'David et ses gens poursuivirent leur route, mais Shimeï avançait parallèlement à lui sur le flanc de la montagne, continuant à maudire, à lancer des pierres et de la terre. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: Finalement, le roi et toute sa suite arrivèrent exténués à Bahourim. Là, ils purent prendre quelque repos.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Absalom arrive à Jérusalem
    marker-yv: yv-h
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'Entre-temps, Absalom et toute la troupe des hommes d’Israël étaient entrés dans Jérusalem ; Ahitophel était avec lui. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'Lorsque Houshaï l’Arkien, l’ami de David, arriva auprès d’Absalom, il s’écria : Vive le roi, vive le roi !'
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'Absalom lui dit : C’est là toute l’affection que tu as pour ton ami ? Pourquoi n’es-tu pas allé avec lui ?'
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'Houshaï lui répondit : Non, je me rallie à celui qui a été choisi par l’Eternel, par ce peuple et par tous les soldats d’Israël, et je veux rester de son côté. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: D’ailleurs, qui est-ce que je vais servir ? N’est-ce pas son fils ? Comme j’ai été le serviteur de ton père, ainsi je serai le tien.
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'Le roi lui demanda : Que veux-tu faire de tout cela ?'
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Tsiba lui répondit : Les ânes sont destinés à la famille du roi pour être montés ; les pains et les fruits serviront de nourriture aux jeunes gens et le vin rafraîchira ceux qui seront fatigués dans le désert.'
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: 'Alors Absalom dit à Ahitophel : Tenez conseil ensemble. Que dois-je faire ?'
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: 'Ahitophel lui répondit : Va vers les épouses de second rang de ton père qu’il a laissées pour garder le palais, couche avec elles, et tout Israël saura que tu as outragé ton père. Ainsi le courage de tous tes partisans en sera affermi.'
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: On dressa donc une tente sur le toit en terrasse du palais, et Absalom y alla coucher avec les épouses de second rang de son père sous les yeux de tout Israël
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '16.22 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Voir '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: 2 S 12.11-12
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: '. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: En ce temps-là, les conseils d’Ahitophel avaient autant d’autorité, pour David comme pour Absalom, qu’une parole de Dieu lui-même.
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'Le roi reprit : Mais où est donc le fils de ton maître ?'
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Tsiba répondit : Il est resté à Jérusalem, car il s’est dit : « Maintenant le peuple d’Israël me restituera la royauté de mon père. »'
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'Le roi déclara alors à Tsiba : Dans ce cas, je te donne tout ce qui appartient à Mephibosheth.'
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Tsiba répondit : Je me prosterne devant toi, mon seigneur le roi ! Puissé-je conserver toujours ta faveur.'
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Shimeï maudit David
    marker-yv: yv-h
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: Alors que David s’approchait de Bahourim
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '16.5 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Sur le flanc oriental du mont des Oliviers, vers le Jourdain.
      marker-yv: yv-n
    - type: text
      text: ', un homme sortit de ce village. Il appartenait au même groupe familial que Saül et s’appelait Shimeï ; c’était un fils de Guéra. Il s’avançait en prononçant des malédictions contre David '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'et lançait des pierres sur lui et tous ses hauts fonctionnaires, malgré la foule et les soldats qui entouraient le roi à sa droite et à sa gauche. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'Shimeï criait en le maudissant : Va-t’en, va-t’en, assassin, vaurien ! '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: La mort des membres de la famille de Saül, à la place duquel tu as régné, te retombe dessus. L’Eternel a fait passer la royauté à ton fils Absalom. Te voilà dans le malheur parce que tu as versé le sang.
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: Alors Abishaï, fils de Tserouya
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '16.9 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Tserouya
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: ': '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'sœur de David. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'Abishaï '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: était donc son neveu (comme Joab).
      marker-yv: yv-n
    - type: text
      text: ', dit au roi : Pourquoi laisse-t-on ce chien crevé insulter mon seigneur le roi ? Permets-moi d’aller lui couper la tête !'
