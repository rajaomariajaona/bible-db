document_id: 2SA.16,21
type_code: fra
verses:
  '1':
  - type: heading
    content: David et Tsiba
  - type: text
    content: 'Quand David eut un peu dépassé le sommet de la colline, Tsiba, l’intendant de Mephibosheth, vint à sa rencontre avec deux ânes bâtés portant deux cents pains, cent paquets de raisins secs, cent autres de fruits d’été et une outre de vin. '
  '10':
  - type: text
    content: – Cela vous regarde-t-il, fils de Tserouya ? lui répondit le roi. Qu’il prononce ses malédictions, car si l’Eternel lui a dit de me maudire, qui peut le lui reprocher ?
  '11':
  - type: text
    content: 'Puis David déclara à Abishaï et à tous ses fonctionnaires : Si mon propre fils que j’ai engendré cherche à me faire mourir, à plus forte raison ce Benjaminite agira-t-il ainsi ! Laissez-le tranquille et qu’il maudisse, car l’Eternel le lui a dit. '
  '12':
  - type: text
    content: Peut-être l’Eternel considérera-t-il ma situation misérable et changera-t-il la malédiction d’aujourd’hui en bien.
  '13':
  - type: text
    content: 'David et ses gens poursuivirent leur route, mais Shimeï avançait parallèlement à lui sur le flanc de la montagne, continuant à maudire, à lancer des pierres et de la terre. '
  '14':
  - type: text
    content: Finalement, le roi et toute sa suite arrivèrent exténués à Bahourim. Là, ils purent prendre quelque repos.
  - type: heading
    content: Absalom arrive à Jérusalem
  '15':
  - type: text
    content: 'Entre-temps, Absalom et toute la troupe des hommes d’Israël étaient entrés dans Jérusalem ; Ahitophel était avec lui. '
  '16':
  - type: text
    content: 'Lorsque Houshaï l’Arkien, l’ami de David, arriva auprès d’Absalom, il s’écria : Vive le roi, vive le roi !'
  '17':
  - type: text
    content: 'Absalom lui dit : C’est là toute l’affection que tu as pour ton ami ? Pourquoi n’es-tu pas allé avec lui ?'
  '18':
  - type: text
    content: 'Houshaï lui répondit : Non, je me rallie à celui qui a été choisi par l’Eternel, par ce peuple et par tous les soldats d’Israël, et je veux rester de son côté. '
  '19':
  - type: text
    content: D’ailleurs, qui est-ce que je vais servir ? N’est-ce pas son fils ? Comme j’ai été le serviteur de ton père, ainsi je serai le tien.
  '2':
  - type: text
    content: 'Le roi lui demanda : Que veux-tu faire de tout cela ?'
  - type: text
    content: 'Tsiba lui répondit : Les ânes sont destinés à la famille du roi pour être montés ; les pains et les fruits serviront de nourriture aux jeunes gens et le vin rafraîchira ceux qui seront fatigués dans le désert.'
  '20':
  - type: text
    content: 'Alors Absalom dit à Ahitophel : Tenez conseil ensemble. Que dois-je faire ?'
  '21':
  - type: text
    content: 'Ahitophel lui répondit : Va vers les épouses de second rang de ton père qu’il a laissées pour garder le palais, couche avec elles, et tout Israël saura que tu as outragé ton père. Ainsi le courage de tous tes partisans en sera affermi.'
  '22':
  - type: text
    content: On dressa donc une tente sur le toit en terrasse du palais, et Absalom y alla coucher avec les épouses de second rang de son père sous les yeux de tout Israël
  - type: note
    content: Voir 2 S 12.11-12.
  - type: text
    content: '. '
  '23':
  - type: text
    content: En ce temps-là, les conseils d’Ahitophel avaient autant d’autorité, pour David comme pour Absalom, qu’une parole de Dieu lui-même.
  '3':
  - type: text
    content: 'Le roi reprit : Mais où est donc le fils de ton maître ?'
  - type: text
    content: 'Tsiba répondit : Il est resté à Jérusalem, car il s’est dit : « Maintenant le peuple d’Israël me restituera la royauté de mon père. »'
  '4':
  - type: text
    content: 'Le roi déclara alors à Tsiba : Dans ce cas, je te donne tout ce qui appartient à Mephibosheth.'
  - type: text
    content: 'Tsiba répondit : Je me prosterne devant toi, mon seigneur le roi ! Puissé-je conserver toujours ta faveur.'
  - type: heading
    content: Shimeï maudit David
  '5':
  - type: text
    content: Alors que David s’approchait de Bahourim
  - type: note
    content: Sur le flanc oriental du mont des Oliviers, vers le Jourdain.
  - type: text
    content: ', un homme sortit de ce village. Il appartenait au même groupe familial que Saül et s’appelait Shimeï ; c’était un fils de Guéra. Il s’avançait en prononçant des malédictions contre David '
  '6':
  - type: text
    content: 'et lançait des pierres sur lui et tous ses hauts fonctionnaires, malgré la foule et les soldats qui entouraient le roi à sa droite et à sa gauche. '
  '7':
  - type: text
    content: 'Shimeï criait en le maudissant : Va-t’en, va-t’en, assassin, vaurien ! '
  '8':
  - type: text
    content: La mort des membres de la famille de Saül, à la place duquel tu as régné, te retombe dessus. L’Eternel a fait passer la royauté à ton fils Absalom. Te voilà dans le malheur parce que tu as versé le sang.
  '9':
  - type: text
    content: Alors Abishaï, fils de Tserouya
  - type: note
    content: 'Tserouya: sœur de David. Abishaï était donc son neveu (comme Joab).'
  - type: text
    content: ', dit au roi : Pourquoi laisse-t-on ce chien crevé insulter mon seigneur le roi ? Permets-moi d’aller lui couper la tête !'
