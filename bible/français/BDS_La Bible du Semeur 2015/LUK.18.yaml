document_id: LUK.18
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Prier avec insistance
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Pour montrer qu’il est nécessaire de prier constamment, sans jamais se décourager, Jésus raconta à ses disciples la parabole suivante : '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Il y avait dans une ville un juge qui ne craignait pas Dieu et qui n’avait d’égards pour personne.
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'Il y avait aussi, dans cette même ville, une veuve qui venait constamment le trouver pour lui dire : « Défends mon droit contre mon adversaire. »'
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'Pendant longtemps, il refusa. Mais il finit par se dire : « J’ai beau ne pas craindre Dieu et ne pas me préoccuper des hommes,'
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: cette veuve m’ennuie ; je vais donc lui donner gain de cause pour qu’elle ne vienne plus sans cesse me casser la tête. »
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Le Seigneur ajouta : '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Notez bien comment ce mauvais juge réagit.
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Alors, pouvez-vous supposer que Dieu ne défendra pas le droit de ceux qu’il a choisis et qui crient à lui jour et nuit, et qu’il tardera à leur venir en aide ?
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'Moi je vous dis qu’il défendra leur droit promptement. Seulement, lorsque le '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Fils de l’homme
    - type: text
      text: ' viendra, trouvera-t-il encore la foi sur la terre ?'
- type: usfm
  marker: s1
  children:
  - type: text
    text: Qui sera déclaré juste ?
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Il raconta aussi une parabole pour ceux qui étaient convaincus d’être justes et méprisaient les autres : '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'Deux hommes montèrent au '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Temple
    - type: text
      text: ' pour prier : un '
    - type: usfm
      marker: w
      children:
      - type: text
        text: pharisien
    - type: text
      text: ' et un '
    - type: usfm
      marker: w
      children:
      - type: text
        text: collecteur d’impôts
    - type: text
      text: .
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Le pharisien, debout, faisait intérieurement cette prière
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '18.11 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Certains manuscrits ont : '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: se tenait à part et priait ainsi.
    marker-yv: yv-n
  - type: usfm
    marker: wj
    children:
    - type: text
      text: ': « O Dieu, je te remercie de ne pas être avare, malhonnête et adultère comme les autres hommes, et en particulier comme ce collecteur d’impôts là-bas.'
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Moi, je jeûne deux jours par semaine, je donne dix pour cent de tous mes revenus. »
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: ' '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'Le collecteur d’impôts se tenait dans un coin retiré, et n’osait même pas lever les yeux au ciel. Mais il se frappait la poitrine et murmurait : « O Dieu, aie pitié du pécheur que je suis ! »'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: ' '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Je vous l’assure, c’est ce dernier et non pas l’autre qui est rentré chez lui déclaré juste par Dieu. Car celui qui s’élève sera abaissé ; celui qui s’abaisse sera élevé.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Jésus accueille des enfants
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: (Mt 19.13-15 ; Mc 10.13-16)
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Des gens amenèrent à Jésus de tout petits enfants pour qu’il pose les mains sur eux. Mais, quand les disciples virent cela, ils leur firent des reproches. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Jésus les fit venir et leur dit : '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'Laissez les petits enfants venir à moi et ne les en empêchez pas, car le '
    - type: usfm
      marker: w
      children:
      - type: text
        text: royaume de Dieu
    - type: text
      text: ' appartient à ceux qui leur ressemblent.'
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'Vraiment, je vous l’assure : celui qui ne reçoit pas le royaume de Dieu comme un petit enfant, n’y entrera pas.'
- type: usfm
  marker: s1
  children:
  - type: text
    text: Les riches et le royaume
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: (Mt 19.16-30 ; Mc 10.17-31)
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Alors un notable lui demanda : Bon Maître, que dois-je faire pour obtenir la vie éternelle ?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: ' '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: – Pourquoi m’appelles-tu bon ?
  - type: text
    text: ' lui répondit Jésus. '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Personne n’est bon, sinon Dieu seul.
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'Tu connais les commandements : '
    - type: usfm
      marker: qt
      children:
      - type: text
        text: Ne commets pas d’adultère ; ne commets pas de meurtre ; ne commets pas de vol ; ne porte pas de faux témoignage ; honore ton père et ta mère
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '18.20 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Ex 20.12-16 ; Dt 5.16-20.
    marker-yv: yv-n
  - type: usfm
    marker: wj
    children:
    - type: usfm
      marker: qt
      children:
      - type: text
        text: .
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: – Tout cela, lui répondit l’homme, je l’ai appliqué depuis ma jeunesse.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'A ces mots, Jésus lui dit : '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'Il te reste encore une chose à faire : vends tout ce que tu possèdes, distribue le produit de la vente aux pauvres, et tu auras un trésor au ciel. Puis viens et suis-moi !'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: Quand l’autre entendit cela, il fut profondément attristé, car il était très riche.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'En le voyant ainsi abattu, Jésus dit : '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Qu’il est difficile à ceux qui ont des richesses d’entrer dans le royaume de Dieu !
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Il est plus facile à un chameau de passer par le trou d’une aiguille qu’à un riche d’entrer dans le royaume de Dieu.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Les auditeurs s’écrièrent : Mais alors, qui peut être sauvé ?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'Jésus leur répondit : '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Ce qui est impossible aux hommes est possible à Dieu.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'Pierre lui dit alors : Nous, nous avons laissé tout ce que nous avions pour te suivre.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'Jésus leur dit : '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Vraiment, je vous l’assure, si quelqu’un quitte, à cause du royaume de Dieu, sa maison, sa femme, ses frères, ses parents ou ses enfants,
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: il recevra beaucoup plus en retour dès à présent, et, dans le monde à venir, la vie éternelle.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ce qui attend Jésus à Jérusalem
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: (Mt 20.17-19 ; Mc 10.32-34)
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'Jésus prit les Douze à part et leur dit : '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'Voici, nous montons à '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Jérusalem
    - type: text
      text: ' et tout ce que les '
    - type: usfm
      marker: w
      children:
      - type: text
        text: prophètes
    - type: text
      text: ' ont écrit au sujet du '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Fils de l’homme
    - type: text
      text: ' va s’accomplir.'
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: En effet, il sera remis entre les mains des païens, on se moquera de lui, on l’insultera, on crachera sur lui.
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Et après l’avoir battu à coups de fouet, on le mettra à mort. Puis, le troisième jour, il ressuscitera.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: Les disciples ne comprirent rien à tout cela, c’était pour eux un langage énigmatique et ils ne savaient pas ce que Jésus voulait dire.
- type: usfm
  marker: s1
  children:
  - type: text
    text: La guérison d’un aveugle
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: (Mt 20.29-34 ; Mc 10.46-52)
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: Comme Jésus approchait de Jéricho
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '18.35 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Jéricho '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: se trouve dans la vallée du Jourdain, près de la mer Morte.
    marker-yv: yv-n
  - type: text
    text: ', un aveugle était assis au bord du chemin, en train de mendier. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: En entendant le bruit de la foule qui passait, il demanda ce que c’était.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: On lui répondit que c’était Jésus de Nazareth qui passait.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: text
    text: 'Alors il se mit à crier très fort : Jésus, Fils de David, aie pitié de moi !'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '39'
  - type: text
    text: 'Ceux qui marchaient en tête du cortège le rabrouèrent pour le faire taire, mais lui criait de plus belle : Fils de David, aie pitié de moi !'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '40'
  - type: text
    text: 'Jésus s’arrêta et ordonna qu’on lui amène l’aveugle. Quand il fut près de lui, Jésus lui demanda : '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '41'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Que veux-tu que je fasse pour toi ?
- type: usfm
  marker: p
  children:
  - type: text
    text: 'L’aveugle lui répondit : Seigneur, fais que je puisse voir.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '42'
  - type: text
    text: ' '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: – Tu peux voir,
  - type: text
    text: ' lui dit Jésus. '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Parce que tu as eu foi en moi, tu es guéri
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '18.42 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Ce qui veut dire aussi : '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: tu es sauvé.
    marker-yv: yv-n
  - type: usfm
    marker: wj
    children:
    - type: text
      text: .
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '43'
  - type: text
    text: Aussitôt, il recouvra la vue et suivit Jésus en louant Dieu. En voyant ce qui s’était passé, toute la foule se mit aussi à louer Dieu.
