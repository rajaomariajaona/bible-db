document_id: LUK.18,21
type_code: fra
verses:
  '1':
  - type: heading
    content: Prier avec insistance
  - type: text
    content: 'Pour montrer qu’il est nécessaire de prier constamment, sans jamais se décourager, Jésus raconta à ses disciples la parabole suivante : '
  '10':
  - type: text
    content: 'Deux hommes montèrent au '
  - type: text
    content: Temple
  - type: text
    content: ' pour prier : un '
  - type: text
    content: pharisien
  - type: text
    content: ' et un '
  - type: text
    content: collecteur d’impôts
  - type: text
    content: .
  - type: text
    content: ' '
  '11':
  - type: text
    content: Le pharisien, debout, faisait intérieurement cette prière
  - type: note
    content: 'Certains manuscrits ont : se tenait à part et priait ainsi.'
  - type: text
    content: ': « O Dieu, je te remercie de ne pas être avare, malhonnête et adultère comme les autres hommes, et en particulier comme ce collecteur d’impôts là-bas.'
  - type: text
    content: ' '
  '12':
  - type: text
    content: Moi, je jeûne deux jours par semaine, je donne dix pour cent de tous mes revenus. »
  '13':
  - type: text
    content: ' '
  - type: text
    content: 'Le collecteur d’impôts se tenait dans un coin retiré, et n’osait même pas lever les yeux au ciel. Mais il se frappait la poitrine et murmurait : « O Dieu, aie pitié du pécheur que je suis ! »'
  '14':
  - type: text
    content: ' '
  - type: text
    content: Je vous l’assure, c’est ce dernier et non pas l’autre qui est rentré chez lui déclaré juste par Dieu. Car celui qui s’élève sera abaissé ; celui qui s’abaisse sera élevé.
  - type: heading
    content: Jésus accueille des enfants
  - type: heading
    content: (Mt 19.13-15 ; Mc 10.13-16)
  '15':
  - type: text
    content: 'Des gens amenèrent à Jésus de tout petits enfants pour qu’il pose les mains sur eux. Mais, quand les disciples virent cela, ils leur firent des reproches. '
  '16':
  - type: text
    content: 'Jésus les fit venir et leur dit : '
  - type: text
    content: 'Laissez les petits enfants venir à moi et ne les en empêchez pas, car le '
  - type: text
    content: royaume de Dieu
  - type: text
    content: ' appartient à ceux qui leur ressemblent.'
  - type: text
    content: ' '
  '17':
  - type: text
    content: 'Vraiment, je vous l’assure : celui qui ne reçoit pas le royaume de Dieu comme un petit enfant, n’y entrera pas.'
  - type: heading
    content: Les riches et le royaume
  - type: heading
    content: (Mt 19.16-30 ; Mc 10.17-31)
  '18':
  - type: text
    content: 'Alors un notable lui demanda : Bon Maître, que dois-je faire pour obtenir la vie éternelle ?'
  '19':
  - type: text
    content: ' '
  - type: text
    content: – Pourquoi m’appelles-tu bon ?
  - type: text
    content: ' lui répondit Jésus. '
  - type: text
    content: Personne n’est bon, sinon Dieu seul.
  - type: text
    content: ' '
  '2':
  - type: text
    content: Il y avait dans une ville un juge qui ne craignait pas Dieu et qui n’avait d’égards pour personne.
  - type: text
    content: ' '
  '20':
  - type: text
    content: 'Tu connais les commandements : '
  - type: text
    content: Ne commets pas d’adultère ; ne commets pas de meurtre ; ne commets pas de vol ; ne porte pas de faux témoignage ; honore ton père et ta mère
  - type: note
    content: Ex 20.12-16 ; Dt 5.16-20.
  - type: text
    content: .
  '21':
  - type: text
    content: – Tout cela, lui répondit l’homme, je l’ai appliqué depuis ma jeunesse.
  '22':
  - type: text
    content: 'A ces mots, Jésus lui dit : '
  - type: text
    content: 'Il te reste encore une chose à faire : vends tout ce que tu possèdes, distribue le produit de la vente aux pauvres, et tu auras un trésor au ciel. Puis viens et suis-moi !'
  '23':
  - type: text
    content: Quand l’autre entendit cela, il fut profondément attristé, car il était très riche.
  '24':
  - type: text
    content: 'En le voyant ainsi abattu, Jésus dit : '
  - type: text
    content: Qu’il est difficile à ceux qui ont des richesses d’entrer dans le royaume de Dieu !
  - type: text
    content: ' '
  '25':
  - type: text
    content: Il est plus facile à un chameau de passer par le trou d’une aiguille qu’à un riche d’entrer dans le royaume de Dieu.
  '26':
  - type: text
    content: 'Les auditeurs s’écrièrent : Mais alors, qui peut être sauvé ?'
  '27':
  - type: text
    content: 'Jésus leur répondit : '
  - type: text
    content: Ce qui est impossible aux hommes est possible à Dieu.
  '28':
  - type: text
    content: 'Pierre lui dit alors : Nous, nous avons laissé tout ce que nous avions pour te suivre.'
  '29':
  - type: text
    content: 'Jésus leur dit : '
  - type: text
    content: Vraiment, je vous l’assure, si quelqu’un quitte, à cause du royaume de Dieu, sa maison, sa femme, ses frères, ses parents ou ses enfants,
  - type: text
    content: ' '
  '3':
  - type: text
    content: 'Il y avait aussi, dans cette même ville, une veuve qui venait constamment le trouver pour lui dire : « Défends mon droit contre mon adversaire. »'
  - type: text
    content: ' '
  '30':
  - type: text
    content: il recevra beaucoup plus en retour dès à présent, et, dans le monde à venir, la vie éternelle.
  - type: heading
    content: Ce qui attend Jésus à Jérusalem
  - type: heading
    content: (Mt 20.17-19 ; Mc 10.32-34)
  '31':
  - type: text
    content: 'Jésus prit les Douze à part et leur dit : '
  - type: text
    content: 'Voici, nous montons à '
  - type: text
    content: Jérusalem
  - type: text
    content: ' et tout ce que les '
  - type: text
    content: prophètes
  - type: text
    content: ' ont écrit au sujet du '
  - type: text
    content: Fils de l’homme
  - type: text
    content: ' va s’accomplir.'
  - type: text
    content: ' '
  '32':
  - type: text
    content: En effet, il sera remis entre les mains des païens, on se moquera de lui, on l’insultera, on crachera sur lui.
  - type: text
    content: ' '
  '33':
  - type: text
    content: Et après l’avoir battu à coups de fouet, on le mettra à mort. Puis, le troisième jour, il ressuscitera.
  '34':
  - type: text
    content: Les disciples ne comprirent rien à tout cela, c’était pour eux un langage énigmatique et ils ne savaient pas ce que Jésus voulait dire.
  - type: heading
    content: La guérison d’un aveugle
  - type: heading
    content: (Mt 20.29-34 ; Mc 10.46-52)
  '35':
  - type: text
    content: Comme Jésus approchait de Jéricho
  - type: note
    content: Jéricho se trouve dans la vallée du Jourdain, près de la mer Morte.
  - type: text
    content: ', un aveugle était assis au bord du chemin, en train de mendier. '
  '36':
  - type: text
    content: En entendant le bruit de la foule qui passait, il demanda ce que c’était.
  '37':
  - type: text
    content: On lui répondit que c’était Jésus de Nazareth qui passait.
  '38':
  - type: text
    content: 'Alors il se mit à crier très fort : Jésus, Fils de David, aie pitié de moi !'
  '39':
  - type: text
    content: 'Ceux qui marchaient en tête du cortège le rabrouèrent pour le faire taire, mais lui criait de plus belle : Fils de David, aie pitié de moi !'
  '4':
  - type: text
    content: 'Pendant longtemps, il refusa. Mais il finit par se dire : « J’ai beau ne pas craindre Dieu et ne pas me préoccuper des hommes,'
  - type: text
    content: ' '
  '40':
  - type: text
    content: 'Jésus s’arrêta et ordonna qu’on lui amène l’aveugle. Quand il fut près de lui, Jésus lui demanda : '
  '41':
  - type: text
    content: Que veux-tu que je fasse pour toi ?
  - type: text
    content: 'L’aveugle lui répondit : Seigneur, fais que je puisse voir.'
  '42':
  - type: text
    content: ' '
  - type: text
    content: – Tu peux voir,
  - type: text
    content: ' lui dit Jésus. '
  - type: text
    content: Parce que tu as eu foi en moi, tu es guéri
  - type: note
    content: 'Ce qui veut dire aussi : tu es sauvé.'
  - type: text
    content: .
  '43':
  - type: text
    content: Aussitôt, il recouvra la vue et suivit Jésus en louant Dieu. En voyant ce qui s’était passé, toute la foule se mit aussi à louer Dieu.
  '5':
  - type: text
    content: cette veuve m’ennuie ; je vais donc lui donner gain de cause pour qu’elle ne vienne plus sans cesse me casser la tête. »
  '6':
  - type: text
    content: 'Le Seigneur ajouta : '
  - type: text
    content: Notez bien comment ce mauvais juge réagit.
  - type: text
    content: ' '
  '7':
  - type: text
    content: Alors, pouvez-vous supposer que Dieu ne défendra pas le droit de ceux qu’il a choisis et qui crient à lui jour et nuit, et qu’il tardera à leur venir en aide ?
  - type: text
    content: ' '
  '8':
  - type: text
    content: 'Moi je vous dis qu’il défendra leur droit promptement. Seulement, lorsque le '
  - type: text
    content: Fils de l’homme
  - type: text
    content: ' viendra, trouvera-t-il encore la foi sur la terre ?'
  - type: heading
    content: Qui sera déclaré juste ?
  '9':
  - type: text
    content: 'Il raconta aussi une parabole pour ceux qui étaient convaincus d’être justes et méprisaient les autres : '
