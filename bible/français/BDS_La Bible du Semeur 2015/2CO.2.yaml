document_id: 2CO.2
type_code: fra
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: C’est pourquoi j’ai décidé de ne pas retourner chez vous pour ne pas vous attrister
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '2.1 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Allusion à une visite rapide de l’apôtre après l’envoi de 1 Corinthiens et à l’échec de la mission de Timothée (voir note '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '13.1'
        metadata:
          usfm: 2CO.13.1
      - type: text
        text: ). Paul fut reçu froidement et humilié par un membre de l’Eglise sans que celle-ci intervienne (v. 5-11).
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Car si je vous plonge dans la tristesse, qui pourra encore réjouir mon cœur si ce n’est ceux que j’aurais moi-même attristés
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '2.2 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Autre traduction : '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'si ce n’est celui que j’aurais moi-même attristé, '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: c’est-à-dire celui qui a offensé Paul, selon les v. 5-11.
    marker-yv: yv-n
  - type: text
    text: '  ?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Si je vous ai écrit comme je l’ai fait dans ma précédente lettre
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '2.3 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Allusion à une lettre qui ne nous est pas parvenue (sa troisième lettre aux Corinthiens, 2 Corinthiens étant la quatrième). Certains cependant pensent que la lettre à laquelle Paul fait ici allusion pourrait être 1 Corinthiens, auquel cas 2 Corinthiens serait la troisième qu’il a écrite à cette Eglise.
    marker-yv: yv-n
  - type: text
    text: ', c’était précisément pour qu’en venant chez vous je ne sois pas attristé par ceux-là mêmes qui devaient faire ma joie. J’ai, en effet, la conviction en ce qui vous concerne que ce qui fait ma joie fait aussi la vôtre à vous tous.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Aussi est-ce dans une profonde détresse, le cœur serré et avec bien des larmes que je vous ai écrit cette lettre, non pour vous attrister, mais pour que vous sachiez combien je vous aime.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Le pardon du coupable
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Si l’un de vous a été une cause de tristesse, ce n’est pas moi qu’il a attristé, mais vous tous, ou du moins une partie d’entre vous, pour ne rien exagérer. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Le blâme que lui a infligé la majorité d’entre vous est suffisant pour cet homme. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Aussi devriez-vous à présent lui accorder votre pardon et le réconforter, afin qu’il ne soit pas accablé par une tristesse excessive.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Je vous engage donc à lui témoigner de l’amour. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Car je vous ai aussi écrit pour vous mettre à l’épreuve et voir si vous obéissez en toutes choses. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Celui à qui vous accordez le pardon, je lui pardonne moi aussi. Et si j’ai pardonné – pour autant que j’aie eu quelque chose à pardonner – je l’ai fait à cause de vous, devant Christ, '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'pour ne pas laisser Satan prendre l’avantage sur nous : nous ne connaissons en effet que trop bien ses intentions.'
- type: usfm
  marker: s1
  children:
  - type: text
    text: L’inquiétude de Paul
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Je suis allé à Troas pour y annoncer l’Evangile de Christ. J’y ai trouvé, grâce au Seigneur, des portes largement ouvertes à mon activité. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Cependant, je n’ai pas eu l’esprit tranquille parce que je n’y avais pas retrouvé mon frère Tite. C’est pourquoi j’ai pris congé des croyants et je suis parti pour la Macédoine.
- type: usfm
  marker: ms1
  children:
  - type: text
    text: Défense du ministère apostolique
  marker-yv: yv-h
- type: usfm
  marker: s1
  children:
  - type: text
    text: Le triomphe de Christ
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Je ne puis que remercier Dieu : il nous traîne toujours dans son cortège triomphal, par notre union avec Christ'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '2.14 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: L’image est celle du cortège triomphal du général romain (Dieu) qui entrait à Rome, traînant avec lui ses prisonniers (les apôtres) (cf. 4.7-10 ; 6.3-10).
    marker-yv: yv-n
  - type: text
    text: ', et il se sert de nous pour répandre en tout lieu, comme un parfum, la connaissance de Christ. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Oui, nous sommes, pour Dieu, comme le parfum de Christ parmi ceux qui sont sur la voie du salut et parmi ceux qui sont sur la voie de la perdition. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Pour les uns, c’est une odeur de mort qui les mène à la mort, pour les autres, c’est une odeur de vie qui les conduit à la vie.
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Et qui donc est à la hauteur d’une telle tâche ? '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: En tout cas nous, nous ne sommes pas comme tant d’autres qui accommodent la Parole de Dieu pour en tirer profit. C’est avec des intentions pures, de la part de Dieu, dans l’union avec Christ que nous annonçons la Parole.
