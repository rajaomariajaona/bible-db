document_id: 2CO.2,21
type_code: fra
verses:
  '1':
  - type: text
    content: C’est pourquoi j’ai décidé de ne pas retourner chez vous pour ne pas vous attrister
  - type: note
    content: Allusion à une visite rapide de l’apôtre après l’envoi de 1 Corinthiens et à l’échec de la mission de Timothée (voir note 13.1). Paul fut reçu froidement et humilié par un membre de l’Eglise sans que celle-ci intervienne (v. 5-11).
  - type: text
    content: '. '
  '10':
  - type: text
    content: 'Celui à qui vous accordez le pardon, je lui pardonne moi aussi. Et si j’ai pardonné – pour autant que j’aie eu quelque chose à pardonner – je l’ai fait à cause de vous, devant Christ, '
  '11':
  - type: text
    content: 'pour ne pas laisser Satan prendre l’avantage sur nous : nous ne connaissons en effet que trop bien ses intentions.'
  - type: heading
    content: L’inquiétude de Paul
  '12':
  - type: text
    content: 'Je suis allé à Troas pour y annoncer l’Evangile de Christ. J’y ai trouvé, grâce au Seigneur, des portes largement ouvertes à mon activité. '
  '13':
  - type: text
    content: Cependant, je n’ai pas eu l’esprit tranquille parce que je n’y avais pas retrouvé mon frère Tite. C’est pourquoi j’ai pris congé des croyants et je suis parti pour la Macédoine.
  - type: heading
    content: Défense du ministère apostolique
  - type: heading
    content: Le triomphe de Christ
  '14':
  - type: text
    content: 'Je ne puis que remercier Dieu : il nous traîne toujours dans son cortège triomphal, par notre union avec Christ'
  - type: note
    content: L’image est celle du cortège triomphal du général romain (Dieu) qui entrait à Rome, traînant avec lui ses prisonniers (les apôtres) (cf. 4.7-10 ; 6.3-10).
  - type: text
    content: ', et il se sert de nous pour répandre en tout lieu, comme un parfum, la connaissance de Christ. '
  '15':
  - type: text
    content: 'Oui, nous sommes, pour Dieu, comme le parfum de Christ parmi ceux qui sont sur la voie du salut et parmi ceux qui sont sur la voie de la perdition. '
  '16':
  - type: text
    content: Pour les uns, c’est une odeur de mort qui les mène à la mort, pour les autres, c’est une odeur de vie qui les conduit à la vie.
  - type: text
    content: 'Et qui donc est à la hauteur d’une telle tâche ? '
  '17':
  - type: text
    content: En tout cas nous, nous ne sommes pas comme tant d’autres qui accommodent la Parole de Dieu pour en tirer profit. C’est avec des intentions pures, de la part de Dieu, dans l’union avec Christ que nous annonçons la Parole.
  '2':
  - type: text
    content: Car si je vous plonge dans la tristesse, qui pourra encore réjouir mon cœur si ce n’est ceux que j’aurais moi-même attristés
  - type: note
    content: 'Autre traduction : si ce n’est celui que j’aurais moi-même attristé, c’est-à-dire celui qui a offensé Paul, selon les v. 5-11.'
  - type: text
    content: '  ?'
  '3':
  - type: text
    content: Si je vous ai écrit comme je l’ai fait dans ma précédente lettre
  - type: note
    content: Allusion à une lettre qui ne nous est pas parvenue (sa troisième lettre aux Corinthiens, 2 Corinthiens étant la quatrième). Certains cependant pensent que la lettre à laquelle Paul fait ici allusion pourrait être 1 Corinthiens, auquel cas 2 Corinthiens serait la troisième qu’il a écrite à cette Eglise.
  - type: text
    content: ', c’était précisément pour qu’en venant chez vous je ne sois pas attristé par ceux-là mêmes qui devaient faire ma joie. J’ai, en effet, la conviction en ce qui vous concerne que ce qui fait ma joie fait aussi la vôtre à vous tous.'
  '4':
  - type: text
    content: Aussi est-ce dans une profonde détresse, le cœur serré et avec bien des larmes que je vous ai écrit cette lettre, non pour vous attrister, mais pour que vous sachiez combien je vous aime.
  - type: heading
    content: Le pardon du coupable
  '5':
  - type: text
    content: 'Si l’un de vous a été une cause de tristesse, ce n’est pas moi qu’il a attristé, mais vous tous, ou du moins une partie d’entre vous, pour ne rien exagérer. '
  '6':
  - type: text
    content: 'Le blâme que lui a infligé la majorité d’entre vous est suffisant pour cet homme. '
  '7':
  - type: text
    content: Aussi devriez-vous à présent lui accorder votre pardon et le réconforter, afin qu’il ne soit pas accablé par une tristesse excessive.
  '8':
  - type: text
    content: 'Je vous engage donc à lui témoigner de l’amour. '
  '9':
  - type: text
    content: 'Car je vous ai aussi écrit pour vous mettre à l’épreuve et voir si vous obéissez en toutes choses. '
