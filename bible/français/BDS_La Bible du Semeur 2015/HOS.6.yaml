document_id: HOS.6
type_code: fra
segments:
- type: usfm
  marker: s2
  children:
  - type: text
    text: Vrai et faux repentir
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: – Venez, et retournons à l’Eternel,
- type: usfm
  marker: q1
  children:
  - type: text
    text: car il a déchiré, ╵mais il nous guérira.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Il a frappé, ╵mais il pansera nos blessures.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Après deux jours, ╵il nous aura rendu la vie,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et le troisième jour, ╵il nous relèvera,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et nous vivrons sous son regard.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Oui, cherchons à connaître l’Eternel, ╵efforçons-nous de le connaître.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Sa venue est aussi certaine ╵que celle de l’aurore,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et il viendra vers nous ╵comme la pluie,
- type: usfm
  marker: q1
  children:
  - type: text
    text: comme les ondées du printemps ╵qui arrosent la terre.
- type: usfm
  marker: s2
  children:
  - type: text
    text: La réponse de Dieu
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: – Comment te traiterai-je, ╵toi, Ephraïm,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et toi, Juda, ╵comment te traiterai-je ?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Votre amour pour moi est semblable ╵aux nuées matinales,
- type: usfm
  marker: q1
  children:
  - type: text
    text: à la rosée de l’aube ╵qui se dissipe vite.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: C’est pourquoi, je vous frappe ╵par les prophètes,
- type: usfm
  marker: q1
  children:
  - type: text
    text: je vous massacre ╵par mes paroles
- type: usfm
  marker: q1
  children:
  - type: text
    text: et le jugement fond sur vous ╵comme l’éclair.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Car je prends plaisir à l’amour ╵bien plus qu’aux sacrifices
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '6.6 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Cité en Mt 9.13 ; 12.7.
    marker-yv: yv-n
  - type: text
    text: ','
- type: usfm
  marker: q1
  children:
  - type: text
    text: à la connaissance de Dieu ╵bien plus qu’aux holocaustes.
- type: usfm
  marker: s2
  children:
  - type: text
    text: L’état moral réel
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Mais vous, tout comme Adam
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '6.7 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'tout comme Adam. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'D’autres comprennent : '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'tout comme un homme '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'ou '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'à Adam, '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'nom d’une localité située près du Jourdain (voir '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Jos 3.16
        metadata:
          usfm: JOS.3.16
      - type: text
        text: ).
    marker-yv: yv-n
  - type: text
    text: ', ╵vous avez transgressé l’alliance,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: là, vous m’avez trahi.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Galaad est une cité ╵de malfaiteurs
- type: usfm
  marker: q1
  children:
  - type: text
    text: maculée de traces de sang
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '6.8 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Autre traduction : '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: avides de sang.
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Comme une bande de brigands ╵postés en embuscade,
- type: usfm
  marker: q1
  children:
  - type: text
    text: la confrérie des prêtres
- type: usfm
  marker: q1
  children:
  - type: text
    text: s’en va assassiner ╵les passants sur la route ╵qui mène vers Sichem
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '6.9 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Voir '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Jos 24.1
        metadata:
          usfm: JOS.24.1
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: q1
  children:
  - type: text
    text: Leur conduite est infâme !
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: J’ai vu d’horribles choses
- type: usfm
  marker: q1
  children:
  - type: text
    text: en Israël,
- type: usfm
  marker: q1
  children:
  - type: text
    text: car la prostitution ╵d’Ephraïm s’y étale,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et Israël s’en est souillé.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Pour toi aussi, Juda, ╵une moisson est préparée.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Au moment même ╵où je veux changer le sort de mon peuple
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '6.11 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'On pourrait aussi traduire : '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'où j’ai voulu opérer la restauration. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Certains rattachent la fin du verset 11 à ce qui précède, au lieu d’en faire le début de la partie suivante. Il faut alors traduire : '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'lorsque je produirai la restauration de mon peuple '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'ou bien : '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: quand je ramènerai les captifs de mon peuple.
    marker-yv: yv-n
  - type: text
    text: ','
