document_id: HOS.6,21
type_code: fra
verses:
  '1':
  - type: heading
    content: Vrai et faux repentir
  - type: text
    content: – Venez, et retournons à l’Eternel,
  - type: text
    content: car il a déchiré, ╵mais il nous guérira.
  - type: text
    content: Il a frappé, ╵mais il pansera nos blessures.
  '10':
  - type: text
    content: J’ai vu d’horribles choses
  - type: text
    content: en Israël,
  - type: text
    content: car la prostitution ╵d’Ephraïm s’y étale,
  - type: text
    content: et Israël s’en est souillé.
  '11':
  - type: text
    content: Pour toi aussi, Juda, ╵une moisson est préparée.
  - type: text
    content: Au moment même ╵où je veux changer le sort de mon peuple
  - type: note
    content: 'On pourrait aussi traduire : où j’ai voulu opérer la restauration. Certains rattachent la fin du verset 11 à ce qui précède, au lieu d’en faire le début de la partie suivante. Il faut alors traduire : lorsque je produirai la restauration de mon peuple ou bien : quand je ramènerai les captifs de mon peuple.'
  - type: text
    content: ','
  '2':
  - type: text
    content: Après deux jours, ╵il nous aura rendu la vie,
  - type: text
    content: et le troisième jour, ╵il nous relèvera,
  - type: text
    content: et nous vivrons sous son regard.
  '3':
  - type: text
    content: Oui, cherchons à connaître l’Eternel, ╵efforçons-nous de le connaître.
  - type: text
    content: Sa venue est aussi certaine ╵que celle de l’aurore,
  - type: text
    content: et il viendra vers nous ╵comme la pluie,
  - type: text
    content: comme les ondées du printemps ╵qui arrosent la terre.
  - type: heading
    content: La réponse de Dieu
  '4':
  - type: text
    content: – Comment te traiterai-je, ╵toi, Ephraïm,
  - type: text
    content: et toi, Juda, ╵comment te traiterai-je ?
  - type: text
    content: Votre amour pour moi est semblable ╵aux nuées matinales,
  - type: text
    content: à la rosée de l’aube ╵qui se dissipe vite.
  '5':
  - type: text
    content: C’est pourquoi, je vous frappe ╵par les prophètes,
  - type: text
    content: je vous massacre ╵par mes paroles
  - type: text
    content: et le jugement fond sur vous ╵comme l’éclair.
  '6':
  - type: text
    content: Car je prends plaisir à l’amour ╵bien plus qu’aux sacrifices
  - type: note
    content: Cité en Mt 9.13 ; 12.7.
  - type: text
    content: ','
  - type: text
    content: à la connaissance de Dieu ╵bien plus qu’aux holocaustes.
  - type: heading
    content: L’état moral réel
  '7':
  - type: text
    content: Mais vous, tout comme Adam
  - type: note
    content: 'tout comme Adam. D’autres comprennent : tout comme un homme ou à Adam, nom d’une localité située près du Jourdain (voir Jos 3.16).'
  - type: text
    content: ', ╵vous avez transgressé l’alliance,'
  - type: text
    content: là, vous m’avez trahi.
  '8':
  - type: text
    content: Galaad est une cité ╵de malfaiteurs
  - type: text
    content: maculée de traces de sang
  - type: note
    content: 'Autre traduction : avides de sang.'
  - type: text
    content: .
  '9':
  - type: text
    content: Comme une bande de brigands ╵postés en embuscade,
  - type: text
    content: la confrérie des prêtres
  - type: text
    content: s’en va assassiner ╵les passants sur la route ╵qui mène vers Sichem
  - type: note
    content: Voir Jos 24.1.
  - type: text
    content: .
  - type: text
    content: Leur conduite est infâme !
