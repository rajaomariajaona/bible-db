document_id: HOS.4,21
type_code: fra
verses:
  '1':
  - type: heading
    content: La corruption engendre la ruine
  - type: heading
    content: Le procès des crimes du peuple
  - type: heading
    content: Les crimes religieux
  - type: text
    content: Vous, les Israélites, ╵écoutez la parole ╵que vous adresse l’Eternel,
  - type: text
    content: 'car l’Eternel est en procès ╵avec les habitants de ce pays :'
  - type: text
    content: « La vérité a disparu ╵dans le pays,
  - type: text
    content: il n’y a plus d’amour
  - type: text
    content: on n’y connaît pas Dieu.
  '10':
  - type: text
    content: Ils mangeront ╵sans être rassasiés,
  - type: text
    content: ils se prostitueront
  - type: note
    content: Voir 1.2 et note.
  - type: text
    content: ' ╵mais n’auront pas d’enfants,'
  - type: text
    content: car ils ont abandonné l’Eternel
  '11':
  - type: text
    content: pour s’adonner ╵à la prostitution ╵ainsi qu’au vin.
  - type: text
    content: Alors le vin nouveau ╵leur a fait perdre la raison.
  - type: heading
    content: Idolâtrie et débauche
  '12':
  - type: text
    content: Ce sont ses dieux de bois ╵que mon peuple consulte,
  - type: text
    content: et voilà que c’est son bâton
  - type: note
    content: Idoles en bois (Jr 2.27 ; 10.8 ; Ha 2.19) ou bâton pour la divination (Ez 21.21).
  - type: text
    content: ' ╵qui lui répond.'
  - type: text
    content: Car un vent de prostitution ╵les fait errer,
  - type: text
    content: ils s’égarent loin de leur Dieu ╵en se prostituant
  - type: note
    content: 'ils s’égarent… en se prostituant. Autre traduction : ils se prostituent sous leurs dieux.'
  - type: text
    content: .
  '13':
  - type: text
    content: Ils vont offrir des sacrifices ╵au sommet des montagnes
  - type: text
    content: et brûler des parfums ╵sur les collines,
  - type: text
    content: sous le chêne et le peuplier ╵et sous le térébinthe
  - type: text
    content: dont l’ombrage est si doux.
  - type: text
    content: Voilà pourquoi vos filles ╵vont se prostituer,
  - type: text
    content: pourquoi vos belles-filles ╵commettent l’adultère.
  '14':
  - type: text
    content: Je ne punirai pas vos filles ╵pour leurs prostitutions,
  - type: text
    content: vos belles-filles
  - type: text
    content: à cause de leurs adultères,
  - type: text
    content: car les prêtres eux-mêmes ╵vont à l’écart ╵avec des courtisanes,
  - type: text
    content: et, avec des prostituées sacrées, ╵les voilà qui offrent leurs sacrifices.
  - type: text
    content: Ainsi court à sa ruine ╵un peuple sans intelligence.
  '15':
  - type: text
    content: Si tu te prostitues, ╵ô Israël,
  - type: text
    content: que Juda ne se rende pas coupable !
  - type: text
    content: N’allez pas à Guilgal
  - type: note
    content: Localité située près de Jéricho (Jos 4.19-20) où les Israélites avaient édifié un sanctuaire (9.15 ; 12.12 ; 1 S 11.13-15 ; Am 4.4 ; 5.5).
  - type: text
    content: ','
  - type: text
    content: ne montez pas à Beth-Aven
  - type: note
    content: 'Jéroboam Ier avait fait construire à Béthel un sanctuaire idolâtre (v. 17 et note ; 1 R 12.29). A cette ville dont le nom signifie : « sanctuaire de Dieu », Osée donne, après Amos (5.5), le nom Beth-Aven qui signifie : « maison du mal » (voir 5.8 ; 10.5, 8).'
  - type: text
    content: ','
  - type: text
    content: 'et ne jurez pas en disant :'
  - type: text
    content: “L’Eternel est vivant.”
  '16':
  - type: text
    content: Car comme une vache rétive, ╵Israël est rétif.
  - type: text
    content: Croyez-vous maintenant ╵que l’Eternel les fera paître
  - type: text
    content: comme un troupeau d’agneaux ╵dans de vastes prairies ?
  '17':
  - type: text
    content: Le peuple d’Ephraïm
  - type: note
    content: C’est-à-dire Israël, le royaume du Nord.
  - type: text
    content: ' ╵s’est lié aux idoles'
  - type: note
    content: Le veau d’or de Béthel (8.5 ; 13.2 ; 1 R 12.28) et les idoles de Baal (2.10-15).
  - type: text
    content: .
  - type: text
    content: Qu’il aille son chemin !
  '18':
  - type: text
    content: A-t-il cuvé son vin,
  - type: text
    content: le voilà qui se vautre ╵dans la prostitution,
  - type: text
    content: et ses chefs sont épris ╵de ce qui fait leur honte.
  '19':
  - type: text
    content: Un ouragan ╵les emportera tous,
  - type: text
    content: ils connaîtront la honte ╵à cause de leurs sacrifices
  - type: note
    content: 'sacrifices: selon le texte hébreu traditionnel. L’ancienne version grecque a : autels, ce qui correspond à une autre vocalisation de l’hébreu.'
  - type: text
    content: .
  '2':
  - type: text
    content: On n’y voit que parjure, ╵et tromperies.
  - type: text
    content: Le crime, le vol et l’adultère ╵se multiplient.
  - type: text
    content: La violence s’étend,
  - type: text
    content: les meurtres s’ajoutent aux meurtres.
  '3':
  - type: text
    content: C’est pourquoi le pays ╵passera par le deuil,
  - type: text
    content: et tous ses habitants dépériront,
  - type: text
    content: jusqu’aux bêtes sauvages ╵et aux oiseaux du ciel ;
  - type: text
    content: les poissons de la mer ╵disparaîtront aussi.
  - type: heading
    content: La trahison des prêtres
  '4':
  - type: text
    content: Mais que nul ne conteste,
  - type: text
    content: que nul ne fasse de reproche,
  - type: text
    content: car c’est contre vous, prêtres, ╵que je suis en procès
  - type: note
    content: 'car c’est contre vous… procès: traduction obtenue par un changement de la vocalisation de l’hébreu. Le texte hébreu traditionnel a : les membres de ton peuple sont pareils à ceux qui contestent avec les prêtres.'
  - type: text
    content: .
  '5':
  - type: text
    content: En plein jour, vous trébucherez,
  - type: text
    content: les prophètes eux-mêmes ╵trébucheront de nuit ╵en votre compagnie,
  - type: text
    content: et je réduirai au silence ╵Israël, votre mère
  - type: note
    content: Voir 2.4, 7.
  - type: text
    content: .
  '6':
  - type: text
    content: Oui, mon peuple périt
  - type: text
    content: faute de connaissance
  - type: text
    content: parce que vous, les prêtres, ╵vous avez rejeté ╵la connaissance.
  - type: text
    content: Je vous rejetterai ╵et vous ne serez plus mes prêtres.
  - type: text
    content: Vous avez oublié ╵la Loi de votre Dieu ;
  - type: text
    content: moi aussi, à mon tour, ╵j’oublierai vos enfants.
  '7':
  - type: text
    content: Tous, tant qu’ils sont,
  - type: text
    content: ils ont commis des fautes contre moi.
  - type: text
    content: Je transformerai donc ╵leur gloire en infamie
  - type: note
    content: 'Je transformerai donc leur gloire…: selon le texte hébreu traditionnel. Une ancienne tradition de copistes et la version syriaque ont : ils m’ont échangé, moi qui suis leur gloire, pour une idole infâme.'
  - type: text
    content: .
  '8':
  - type: text
    content: Les prêtres se repaissent ╵du péché de mon peuple,
  - type: text
    content: et leurs désirs se portent ╵vers ses iniquités.
  '9':
  - type: text
    content: Aussi il en sera des prêtres ╵comme des gens du peuple,
  - type: text
    content: je les ferai payer
  - type: text
    content: pour leur conduite,
  - type: text
    content: je rendrai à chacun ╵selon ce qu’il a fait.
