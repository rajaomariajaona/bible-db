- type: usfm
  marker: q1
  children:
  - type: text
    text: Je vous rejetterai ╵et vous ne serez plus mes prêtres.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Vous avez oublié ╵la Loi de votre Dieu ;
- type: usfm
  marker: q1
  children:
  - type: text
    text: moi aussi, à mon tour, ╵j’oublierai vos enfants.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Tous, tant qu’ils sont,
