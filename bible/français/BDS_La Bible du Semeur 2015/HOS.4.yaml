  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Aussi il en sera des prêtres ╵comme des gens du peuple,
- type: usfm
  marker: q1
  children:
  - type: text
    text: je les ferai payer
- type: usfm
  marker: q1
  children:
  - type: text
