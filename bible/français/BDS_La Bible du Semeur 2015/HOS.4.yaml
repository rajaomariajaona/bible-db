      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: En plein jour, vous trébucherez,
- type: usfm
  marker: q1
  children:
  - type: text
    text: les prophètes eux-mêmes ╵trébucheront de nuit ╵en votre compagnie,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et je réduirai au silence ╵Israël, votre mère
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '4.5 '
    - type: usfm
      marker: ft
      children:
      - type: text
