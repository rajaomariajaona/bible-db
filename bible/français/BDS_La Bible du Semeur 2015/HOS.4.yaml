  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Vous, les Israélites, ╵écoutez la parole ╵que vous adresse l’Eternel,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'car l’Eternel est en procès ╵avec les habitants de ce pays :'
- type: usfm
  marker: q1
  children:
  - type: text
    text: « La vérité a disparu ╵dans le pays,
- type: usfm
  marker: q1
  children:
  - type: text
    text: il n’y a plus d’amour
- type: usfm
  marker: q1
  children:
  - type: text
    text: on n’y connaît pas Dieu.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: On n’y voit que parjure, ╵et tromperies.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Le crime, le vol et l’adultère ╵se multiplient.
- type: usfm
  marker: q1
  children:
  - type: text
    text: La violence s’étend,
- type: usfm
  marker: q1
  children:
  - type: text
    text: les meurtres s’ajoutent aux meurtres.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: C’est pourquoi le pays ╵passera par le deuil,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et tous ses habitants dépériront,
- type: usfm
  marker: q1
  children:
  - type: text
    text: jusqu’aux bêtes sauvages ╵et aux oiseaux du ciel ;
- type: usfm
  marker: q1
  children:
  - type: text
    text: les poissons de la mer ╵disparaîtront aussi.
- type: usfm
  marker: s2
  children:
  - type: text
    text: La trahison des prêtres
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Mais que nul ne conteste,
- type: usfm
  marker: q1
  children:
  - type: text
    text: que nul ne fasse de reproche,
- type: usfm
  marker: q1
  children:
  - type: text
    text: car c’est contre vous, prêtres, ╵que je suis en procès
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '4.4 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: car c’est contre vous… procès
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: ': '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'traduction obtenue par un changement de la vocalisation de l’hébreu. Le texte hébreu traditionnel a : '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: les membres de ton peuple sont pareils à ceux qui contestent avec les prêtres.
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
