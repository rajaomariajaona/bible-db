document_id: 1SA.11,21
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: La première victoire de Saül
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: Environ un mois plus tard
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '11.1 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Ces mots se trouvent dans le manuscrit hébreu de Qumrân, mais pas dans le texte hébreu traditionnel.
      marker-yv: yv-n
    - type: text
      text: ', Nahash l’Ammonite'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '11.1 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Les Ammonites étaient des descendants de Loth (Gn 19.38 ; Dt 2.19) établis à l’est du Jourdain près du cours supérieur du Yabboq (Dt 2.37 ; Jos 12.2). Ils avaient déjà tenté d’envahir le territoire d’Israël au temps des « juges » (Jg 3.13 ; 11.4-33).
      marker-yv: yv-n
    - type: text
      text: ' vint mettre le siège devant Yabesh en Galaad'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '11.1 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Situé à l’est du Jourdain dans le territoire attribué à la demi-tribu de Manassé.
      marker-yv: yv-n
    - type: text
      text: '. Les habitants de la ville dirent à Nahash : Conclus une alliance avec nous et nous te serons assujettis.'
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'Les gens de Yabesh firent transmettre aux Ammonites : Demain nous nous rendrons à vous et vous nous traiterez comme il vous plaira.'
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: Le lendemain matin, Saül répartit ses hommes en trois compagnies qui investirent le camp ennemi à la dernière veille de la nuit. Ils battirent les Ammonites jusqu’au moment de la plus grande chaleur. Les rescapés furent si bien dispersés qu’il n’en resta pas deux ensemble.
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'Alors le peuple dit à Samuel : Où sont donc ces hommes qui disaient : « Ce Saül va-t-il régner sur nous ? » Qu’on nous les livre et nous les mettrons à mort.'
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'Mais Saül dit : On ne mettra personne à mort en un jour pareil, car aujourd’hui l’Eternel a délivré Israël.'
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'Samuel ajouta : Venez et allons à Guilgal'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '11.14 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Voir note '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: '10.8'
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: ' pour y confirmer la royauté !'
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: Tout le peuple se rendit à Guilgal, ils y établirent Saül pour roi devant l’Eternel et ils offrirent des sacrifices de communion devant l’Eternel. Ensuite Saül et tous les gens d’Israël se livrèrent là à de grandes réjouissances.
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'Nahash leur répondit : Voilà à quelle condition je traiterai avec vous : je vous crèverai à tous l’œil droit'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '11.2 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Voir note '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: Jg 1.6
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: . Ainsi je couvrirai de honte tout le peuple d’Israël.
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'Les responsables de Yabesh lui dirent : Accorde-nous un délai de sept jours. Nous enverrons des messagers dans tout le territoire d’Israël, et si personne ne vient à notre secours, nous nous rendrons à toi.'
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: Les messagers arrivèrent à Guibéa, la ville de Saül, et exposèrent aux gens ce qui se passait. Tous les habitants se mirent à se lamenter et à pleurer.
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'Juste à ce moment, Saül revenait des champs derrière ses bœufs. Il demanda : Qu’a donc le peuple à pleurer ainsi ?'
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'On lui raconta ce qu’avaient dit les messagers de Yabesh. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'Lorsqu’il eut entendu cela, l’Esprit de Dieu tomba sur lui et il entra dans une violente colère. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'Il prit une paire de bœufs et les découpa en morceaux qu’il envoya dans tout le territoire d’Israël par des messagers chargés de proclamer : Celui qui ne suivra pas Saül et Samuel au combat verra ses bœufs traités de la même manière.'
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Alors une frayeur venant de l’Eternel s’empara du peuple, qui se mit en marche comme un seul homme. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: Saül les recensa à Bézeq
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '11.8 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Au nord de Sichem, à 70 kilomètres au nord de Jérusalem, à l’ouest du Jourdain, mais relativement près de Yabesh en Galaad.
      marker-yv: yv-n
    - type: text
      text: '  ; il en compta 300 000 des tribus du Nord et 30 000 de la tribu de Juda. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'Les messagers venus de Yabesh furent chargés de dire à leurs compatriotes : Demain, quand le soleil donnera toute sa chaleur, vous serez délivrés.'
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Les messagers rentrèrent chez eux et rapportèrent ces paroles aux leurs, qui en furent remplis de joie. '
