document_id: PSA.39,21
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Face à la mort
    marker-yv: yv-h
  - type: usfm
    marker: d
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: Au chef de chœur, à Yedoutoun
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '39.1 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'L’un des trois chefs de chœur de David (1 Ch 16.41-42 ; 25.1, 3, 6 ; 2 Ch 5.12 ; 35.15). Il est aussi nommé aux '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: Ps 62
        - type: text
          text: ', '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: '77'
        - type: text
          text: ' et '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: '89'
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: '  ; psaume de David.'
  '10':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'Voici : je veux rester muet, ╵ne plus ouvrir la bouche,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: car c’est toi qui agis.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: Détourne donc de moi tes coups,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: car je succombe ╵sous les attaques de ta main.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: Pour corriger les hommes, ╵tu les punis de leurs péchés,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et tu détruis comme une teigne ╵ce qu’ils ont de plus cher.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tout homme n’est qu’un souffle.
  - type: usfm
    marker: q4
    children:
    - type: text
      text: Pause
  '13':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: O Eternel, écoute ma prière ╵et sois attentif à mon cri !
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ne reste pas sourd à mes pleurs,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: car je ne suis, chez toi, ╵qu’un étranger,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: qu’un hôte temporaire, ╵tout comme mes ancêtres.
  '14':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: Détourne de moi ton regard ╵pour que je puisse respirer
  - type: usfm
    marker: q1
    children:
    - type: text
      text: avant que je m’en aille ╵et que je ne sois plus. »
  '2':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'Je m’étais dit : ╵« Je vais me surveiller'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: pour ne pas pécher en paroles.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Je serai comme bâillonné
  - type: usfm
    marker: q1
    children:
    - type: text
      text: aussi longtemps que des méchants ╵se tiendront devant moi. »
  '3':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: Je me suis renfermé ╵dans un complet silence,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sans prononcer une parole, tenu à l’écart du bonheur
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '39.3 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Autre traduction : '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: je n’ai même pas prononcé une bonne parole.
      marker-yv: yv-n
    - type: text
      text: '  ;'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ma douleur s’est exaspérée.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: Mon cœur brûlait dans ma poitrine,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: mes pensées s’embrasaient en moi,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'alors j’ai fini par parler :'
  '5':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: « O Eternel, fais-moi savoir ╵quand finira ma vie,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: quel est le nombre de mes jours,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: afin que je sache à quel point ╵ma vie est éphémère.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'Voici : mes jours sont limités, ╵car tu leur as donné ╵la largeur d’une main.'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Oui, devant toi, ╵la durée de ma vie ╵n’est vraiment presque rien,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'même s’il est debout, ╵tout homme n’est qu’un souffle :'
  - type: usfm
    marker: q4
    children:
    - type: text
      text: Pause
  '7':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: il va, il vient, ce n’est qu’une ombre.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Son agitation, c’est du vent,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et les biens qu’il amasse, ╵sait-il qui les recueillera ?
  '8':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: Dès lors, Seigneur, que puis-je attendre ?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mon espérance est toute en toi,
  '9':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: de tous mes péchés, sauve-moi !
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ne permets pas aux insensés ╵de m’exposer au déshonneur !
