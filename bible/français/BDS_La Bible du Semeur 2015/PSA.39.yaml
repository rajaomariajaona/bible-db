document_id: PSA.39,21
type_code: fra
verses:
  '1':
  - type: heading
    content: Face à la mort
  - type: text
    content: Au chef de chœur, à Yedoutoun
  - type: note
    content: L’un des trois chefs de chœur de David (1 Ch 16.41-42 ; 25.1, 3, 6 ; 2 Ch 5.12 ; 35.15). Il est aussi nommé aux Ps 62, 77 et 89.
  - type: text
    content: '  ; psaume de David.'
  '10':
  - type: text
    content: 'Voici : je veux rester muet, ╵ne plus ouvrir la bouche,'
  - type: text
    content: car c’est toi qui agis.
  '11':
  - type: text
    content: Détourne donc de moi tes coups,
  - type: text
    content: car je succombe ╵sous les attaques de ta main.
  '12':
  - type: text
    content: Pour corriger les hommes, ╵tu les punis de leurs péchés,
  - type: text
    content: et tu détruis comme une teigne ╵ce qu’ils ont de plus cher.
  - type: text
    content: Tout homme n’est qu’un souffle.
  - type: text
    content: Pause
  '13':
  - type: text
    content: O Eternel, écoute ma prière ╵et sois attentif à mon cri !
  - type: text
    content: Ne reste pas sourd à mes pleurs,
  - type: text
    content: car je ne suis, chez toi, ╵qu’un étranger,
  - type: text
    content: qu’un hôte temporaire, ╵tout comme mes ancêtres.
  '14':
  - type: text
    content: Détourne de moi ton regard ╵pour que je puisse respirer
  - type: text
    content: avant que je m’en aille ╵et que je ne sois plus. »
  '2':
  - type: text
    content: 'Je m’étais dit : ╵« Je vais me surveiller'
  - type: text
    content: pour ne pas pécher en paroles.
  - type: text
    content: Je serai comme bâillonné
  - type: text
    content: aussi longtemps que des méchants ╵se tiendront devant moi. »
  '3':
  - type: text
    content: Je me suis renfermé ╵dans un complet silence,
  - type: text
    content: sans prononcer une parole, tenu à l’écart du bonheur
  - type: note
    content: 'Autre traduction : je n’ai même pas prononcé une bonne parole.'
  - type: text
    content: '  ;'
  - type: text
    content: ma douleur s’est exaspérée.
  '4':
  - type: text
    content: Mon cœur brûlait dans ma poitrine,
  - type: text
    content: mes pensées s’embrasaient en moi,
  - type: text
    content: 'alors j’ai fini par parler :'
  '5':
  - type: text
    content: « O Eternel, fais-moi savoir ╵quand finira ma vie,
  - type: text
    content: quel est le nombre de mes jours,
  - type: text
    content: afin que je sache à quel point ╵ma vie est éphémère.
  '6':
  - type: text
    content: 'Voici : mes jours sont limités, ╵car tu leur as donné ╵la largeur d’une main.'
  - type: text
    content: Oui, devant toi, ╵la durée de ma vie ╵n’est vraiment presque rien,
  - type: text
    content: 'même s’il est debout, ╵tout homme n’est qu’un souffle :'
  - type: text
    content: Pause
  '7':
  - type: text
    content: il va, il vient, ce n’est qu’une ombre.
  - type: text
    content: Son agitation, c’est du vent,
  - type: text
    content: et les biens qu’il amasse, ╵sait-il qui les recueillera ?
  '8':
  - type: text
    content: Dès lors, Seigneur, que puis-je attendre ?
  - type: text
    content: Mon espérance est toute en toi,
  '9':
  - type: text
    content: de tous mes péchés, sauve-moi !
  - type: text
    content: Ne permets pas aux insensés ╵de m’exposer au déshonneur !
