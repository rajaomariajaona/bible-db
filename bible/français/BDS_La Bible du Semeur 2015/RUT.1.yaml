document_id: RUT.1,21
type_code: fra
verses:
  '1':
  - type: heading
    content: La famille d’Elimélek en Moab
  - type: text
    content: A l’époque où les chefs gouvernaient Israël, une famine survint dans le pays
  - type: note
    content: L’époque des chefs d’Israël – les juges – s’étend du xive ou du xiie siècle au xie siècle av. J.-C.
  - type: text
    content: . Un homme de Bethléhem en Juda
  - type: note
    content: A une douzaine de kilomètres au sud-est de Jérusalem. La précision en Juda distingue cette ville de la Bethléhem de Zabulon (Jos 19.15).
  - type: text
    content: ' partit séjourner avec sa femme et ses deux fils dans la campagne du pays de Moab'
  - type: note
    content: Plateau fertile situé à l’est de la mer Morte.
  - type: text
    content: '. '
  '10':
  - type: text
    content: 'et lui dirent : Non ! nous t’accompagnerons dans ta patrie.'
  '11':
  - type: text
    content: 'Noémi leur répondit : Retournez chez vous, mes filles ! Pourquoi viendriez-vous avec moi ? Je ne peux plus avoir des fils qui pourraient vous épouser'
  - type: note
    content: Voir Dt 25.5-10. Allusion à la coutume du lévirat stipulant que la veuve sans enfant devait être épousée par le frère du mari défunt (Gn 38.6-8 ; Dt 25.5-10 ; Mc 12.18-23).
  - type: text
    content: '. '
  '12':
  - type: text
    content: 'Retournez chez vous, mes filles, allez ! Je suis trop âgée pour me remarier. Et même si je disais : « J’ai de quoi espérer des enfants, je me donnerai à un mari cette nuit même et j’en aurai des fils, '
  '13':
  - type: text
    content: attendriez-vous qu’ils aient grandi et renonceriez-vous pour cela à vous remarier ? Bien sûr que non, mes filles ! Je suis bien plus affligée que vous, car l’Eternel est intervenu contre moi. »
  '14':
  - type: text
    content: Alors les deux belles-filles se remirent à sangloter. Finalement, Orpa embrassa sa belle-mère, mais Ruth resta avec elle.
  '15':
  - type: text
    content: 'Noémi lui dit : Regarde : ta belle-sœur est partie rejoindre son peuple et ses dieux, fais comme elle : retourne chez les tiens !'
  '16':
  - type: text
    content: 'Mais Ruth lui répondit : N’insiste pas pour que je te quitte et que je me détourne de ta route ; partout où tu iras, j’irai ; où tu t’installeras, je m’installerai ; ton peuple sera mon peuple et ton Dieu sera mon Dieu. '
  '17':
  - type: text
    content: Là où tu mourras, je mourrai aussi et j’y serai enterrée. Que l’Eternel me punisse avec la plus grande sévérité, si autre chose que la mort me sépare de toi !
  '18':
  - type: text
    content: 'Devant une telle résolution à la suivre, Noémi cessa d’insister '
  '19':
  - type: text
    content: et elles s’en allèrent toutes deux ensemble jusqu’à Bethléhem. Leur arrivée là-bas mit toute la localité en émoi.
  - type: text
    content: – Est-ce bien là Noémi ? demandèrent les femmes.
  '2':
  - type: text
    content: Cet homme s’appelait Elimélek, sa femme Noémi et ses deux fils Mahlôn et Kilyôn. Ils faisaient partie des Ephratiens
  - type: note
    content: Ephrata était le nom du groupe familial auquel appartenait Elimélek. Il a donné son nom au territoire environnant Bethléhem qui est parfois appelée Bethléhem Ephrata (voir 4.11 ; Gn 35.19 ; 1 S 17.12 ; Mi 5.1).
  - type: text
    content: ', de Bethléhem en Juda. Ils parvinrent en Moab, dans la campagne, et s’y établirent. '
  '20':
  - type: text
    content: 'Elle leur répondit : Ne m’appelez plus Noémi (L’heureuse), appelez-moi Mara (L’affligée), car le Tout-Puissant m’a beaucoup affligée. '
  '21':
  - type: text
    content: Je suis partie d’ici comblée, et l’Eternel m’y fait revenir les mains vides. Alors pourquoi m’appeler encore Noémi quand l’Eternel s’est prononcé contre moi et que le Tout-Puissant m’a plongée dans l’affliction ?
  '22':
  - type: text
    content: C’est ainsi que Noémi et sa belle-fille, Ruth, la Moabite, revinrent des plaines de Moab. Lorsqu’elles arrivèrent à Bethléhem, c’était le début de la moisson de l’orge
  - type: note
    content: C’est-à-dire avril-mai. C’était la première moisson, le blé se moissonnait quelques semaines plus tard (voir 2.23).
  - type: text
    content: .
  '3':
  - type: text
    content: 'Elimélek, le mari de Noémi, mourut là et elle resta seule avec ses deux fils. '
  '4':
  - type: text
    content: 'Ils épousèrent des femmes moabites, dont l’une s’appelait Orpa et l’autre Ruth. Ils demeurèrent là une dizaine d’années, '
  '5':
  - type: text
    content: puis Mahlôn et Kilyôn moururent à leur tour, et Noémi resta seule, privée à la fois de ses deux fils et de son mari.
  - type: heading
    content: Noémi et Ruth à Bethléhem
  '6':
  - type: text
    content: 'Lorsqu’elle apprit que l’Eternel était intervenu en faveur de son peuple et qu’il lui avait donné de quoi se nourrir, Noémi se mit en route avec ses deux belles-filles pour rentrer du pays de Moab. '
  '7':
  - type: text
    content: Elles quittèrent donc ensemble l’endroit où elles s’étaient établies et prirent le chemin du pays de Juda.
  '8':
  - type: text
    content: 'Alors Noémi dit à ses deux belles-filles : Allez et rentrez chacune dans la famille de votre mère'
  - type: note
    content: Les filles et les veuves habitaient avec leur mère (Gn 24.28, 67). Le père de Ruth était encore en vie (2.11).
  - type: text
    content: '  ! Que l’Eternel soit bon pour vous, comme vous l’avez été pour ceux qui sont morts et pour moi-même. '
  '9':
  - type: text
    content: Qu’il vous donne à chacune de trouver le bonheur dans un nouveau foyer.
  - type: text
    content: 'Puis elle les embrassa pour prendre congé. Les deux jeunes femmes pleurèrent à gros sanglots '
