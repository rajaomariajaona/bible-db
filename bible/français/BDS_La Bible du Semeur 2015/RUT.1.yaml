document_id: RUT.1
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: La famille d’Elimélek en Moab
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: A l’époque où les chefs gouvernaient Israël, une famine survint dans le pays
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1.1 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'L’époque des chefs d’Israël – les juges – s’étend du '
      - type: usfm
        marker: sc
        children:
        - type: text
          text: xiv
      - type: usfm
        marker: ord
        children:
        - type: text
          text: e
      - type: text
        text: ' ou du '
      - type: usfm
        marker: sc
        children:
        - type: text
          text: xii
      - type: usfm
        marker: ord
        children:
        - type: text
          text: e
      - type: text
        text: ' siècle au '
      - type: usfm
        marker: sc
        children:
        - type: text
          text: xi
      - type: usfm
        marker: ord
        children:
        - type: text
          text: e
      - type: text
        text: ' siècle av. J.-C.'
    marker-yv: yv-n
  - type: text
    text: . Un homme de Bethléhem en Juda
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1.1 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'A une douzaine de kilomètres au sud-est de Jérusalem. La précision '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'en Juda '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: distingue cette ville de la Bethléhem de Zabulon (
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Jos 19.15
        metadata:
          usfm: JOS.19.15
      - type: text
        text: ).
    marker-yv: yv-n
  - type: text
    text: ' partit séjourner avec sa femme et ses deux fils dans la campagne du pays de Moab'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1.1 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Plateau fertile situé à l’est de la mer Morte.
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Cet homme s’appelait Elimélek, sa femme Noémi et ses deux fils Mahlôn et Kilyôn. Ils faisaient partie des Ephratiens
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1.2 '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'Ephrata '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: était le nom du groupe familial auquel appartenait Elimélek. Il a donné son nom au territoire environnant Bethléhem qui est parfois appelée Bethléhem Ephrata (voir 4.11 ; Gn 35.19 ; 1 S 17.12 ; Mi 5.1).
    marker-yv: yv-n
  - type: text
    text: ', de Bethléhem en Juda. Ils parvinrent en Moab, dans la campagne, et s’y établirent. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Elimélek, le mari de Noémi, mourut là et elle resta seule avec ses deux fils. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Ils épousèrent des femmes moabites, dont l’une s’appelait Orpa et l’autre Ruth. Ils demeurèrent là une dizaine d’années, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: puis Mahlôn et Kilyôn moururent à leur tour, et Noémi resta seule, privée à la fois de ses deux fils et de son mari.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Noémi et Ruth à Bethléhem
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Lorsqu’elle apprit que l’Eternel était intervenu en faveur de son peuple et qu’il lui avait donné de quoi se nourrir, Noémi se mit en route avec ses deux belles-filles pour rentrer du pays de Moab. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Elles quittèrent donc ensemble l’endroit où elles s’étaient établies et prirent le chemin du pays de Juda.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Alors Noémi dit à ses deux belles-filles : Allez et rentrez chacune dans la famille de votre mère'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1.8 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Les filles et les veuves habitaient avec leur mère (
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Gn 24.28
        metadata:
          usfm: GEN.24.28
      - type: text
        text: ', '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '67'
        metadata:
          usfm: GEN.24.67
      - type: text
        text: ). Le père de Ruth était encore en vie (
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '2.11'
        metadata:
          usfm: RUT.2.11
      - type: text
        text: ).
    marker-yv: yv-n
  - type: text
    text: '  ! Que l’Eternel soit bon pour vous, comme vous l’avez été pour ceux qui sont morts et pour moi-même. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Qu’il vous donne à chacune de trouver le bonheur dans un nouveau foyer.
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Puis elle les embrassa pour prendre congé. Les deux jeunes femmes pleurèrent à gros sanglots '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'et lui dirent : Non ! nous t’accompagnerons dans ta patrie.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Noémi leur répondit : Retournez chez vous, mes filles ! Pourquoi viendriez-vous avec moi ? Je ne peux plus avoir des fils qui pourraient vous épouser'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1.11 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Voir '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Dt 25.5-10
        metadata:
          usfm: DEU.25.5+DEU.25.6+DEU.25.7+DEU.25.8+DEU.25.9+DEU.25.10
      - type: text
        text: . Allusion à la coutume du lévirat stipulant que la veuve sans enfant devait être épousée par le frère du mari défunt (Gn 38.6-8 ; Dt 25.5-10 ; Mc 12.18-23).
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Retournez chez vous, mes filles, allez ! Je suis trop âgée pour me remarier. Et même si je disais : « J’ai de quoi espérer des enfants, je me donnerai à un mari cette nuit même et j’en aurai des fils, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: attendriez-vous qu’ils aient grandi et renonceriez-vous pour cela à vous remarier ? Bien sûr que non, mes filles ! Je suis bien plus affligée que vous, car l’Eternel est intervenu contre moi. »
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Alors les deux belles-filles se remirent à sangloter. Finalement, Orpa embrassa sa belle-mère, mais Ruth resta avec elle.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Noémi lui dit : Regarde : ta belle-sœur est partie rejoindre son peuple et ses dieux, fais comme elle : retourne chez les tiens !'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Mais Ruth lui répondit : N’insiste pas pour que je te quitte et que je me détourne de ta route ; partout où tu iras, j’irai ; où tu t’installeras, je m’installerai ; ton peuple sera mon peuple et ton Dieu sera mon Dieu. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Là où tu mourras, je mourrai aussi et j’y serai enterrée. Que l’Eternel me punisse avec la plus grande sévérité, si autre chose que la mort me sépare de toi !
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Devant une telle résolution à la suivre, Noémi cessa d’insister '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: et elles s’en allèrent toutes deux ensemble jusqu’à Bethléhem. Leur arrivée là-bas mit toute la localité en émoi.
- type: usfm
  marker: p
  children:
  - type: text
    text: – Est-ce bien là Noémi ? demandèrent les femmes.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Elle leur répondit : Ne m’appelez plus Noémi (L’heureuse), appelez-moi Mara (L’affligée), car le Tout-Puissant m’a beaucoup affligée. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Je suis partie d’ici comblée, et l’Eternel m’y fait revenir les mains vides. Alors pourquoi m’appeler encore Noémi quand l’Eternel s’est prononcé contre moi et que le Tout-Puissant m’a plongée dans l’affliction ?
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: C’est ainsi que Noémi et sa belle-fille, Ruth, la Moabite, revinrent des plaines de Moab. Lorsqu’elles arrivèrent à Bethléhem, c’était le début de la moisson de l’orge
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1.22 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'C’est-à-dire avril-mai. C’était la première moisson, le blé se moissonnait quelques semaines plus tard (voir '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '2.23'
        metadata:
          usfm: RUT.2.23
      - type: text
        text: ).
    marker-yv: yv-n
  - type: text
    text: .
