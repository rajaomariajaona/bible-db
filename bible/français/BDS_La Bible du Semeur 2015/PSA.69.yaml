document_id: PSA.69
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Je suis submergé, sauve-moi !
  marker-yv: yv-h
- type: usfm
  marker: d
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Au chef de chœur, un psaume de David, à chanter sur la mélodie des « Lis »
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '69.1 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Terme de sens incertain. Autre traduction : '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: avec accompagnement sur instrument à six cordes.
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: O mon Dieu, sauve-moi,
- type: usfm
  marker: q1
  children:
  - type: text
    text: j’ai de l’eau jusqu’au cou.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Dans une boue profonde, je m’enlise, ╵sans point d’appui.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Me voici descendu ╵au plus profond des eaux ; ╵un fort courant m’emporte.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Je m’épuise à crier, ╵mon gosier est brûlant,
- type: usfm
  marker: q1
  children:
  - type: text
    text: mes yeux se sont usés ╵à attendre mon Dieu.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Car ceux qui me haïssent ╵sans la moindre raison
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '69.5 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Voir '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Jn 15.25
        metadata:
          usfm: JHN.15.25
      - type: text
        text: .
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: text
    text: ont dépassé le nombre ╵des cheveux de ma tête.
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Ils sont puissants, ╵mes ennemis menteurs : ╵qui veulent me détruire.'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Je dois restituer ╵ce que je n’ai pas extorqué.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: O Dieu, tu sais ╵comme j’ai été insensé,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et mes actes coupables ╵ne te sont pas cachés.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Qu’ils ne soient pas dans la honte à cause de moi, ╵ceux qui ont mis leur espérance en toi,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ô Eternel, ╵ô Seigneur des armées célestes !
- type: usfm
  marker: q1
  children:
  - type: text
    text: Que ceux qui se tournent vers toi ╵ne soient pas à cause de moi ╵remplis de confusion,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Dieu d’Israël !
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Car c’est pour toi ╵que je porte l’opprobre
- type: usfm
  marker: q1
  children:
  - type: text
    text: et que la confusion ╵me couvre le visage.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Me voilà devenu ╵étranger pour mes frères
- type: usfm
  marker: q1
  children:
  - type: text
    text: et comme un inconnu ╵pour les fils de ma mère !
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: L’amour que j’ai pour ta maison ╵est en moi comme un feu ╵qui me consume
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '69.10 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Cité en '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Jn 2.17
        metadata:
          usfm: JHN.2.17
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: ','
- type: usfm
  marker: q1
  children:
  - type: text
    text: et les insultes ╵des hommes qui t’insultent ╵sont retombées sur moi
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '69.10 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Cité en '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Rm 15.3
        metadata:
          usfm: ROM.15.3
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Quand je pleure et je jeûne,
- type: usfm
  marker: q1
  children:
  - type: text
    text: je reçois des insultes.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Je me revêts ╵d’une toile de sac,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et je deviens pour eux ╵un objet de risée.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Les gens qui sont assis ╵sur la place publique ╵aux portes de la ville,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et les buveurs d’alcool ╵font de moi leur chanson.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Quant à moi, je t’exprime ma prière :'
- type: usfm
  marker: q1
  children:
  - type: text
    text: ô Eternel, ╵n’est-ce pas le moment ╵de montrer ta faveur ?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Exauce-moi, ô Dieu, ╵dans ton immense amour
- type: usfm
  marker: q1
  children:
  - type: text
    text: et sauve-moi ╵dans ta fidélité !
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Tire-moi de la boue ! ╵Que je n’enfonce pas !
- type: usfm
  marker: q1
  children:
  - type: text
    text: Viens donc me délivrer ╵de ceux qui me haïssent,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et des profondes eaux !
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Que je ne sois pas emporté ╵par le fort courant d’eau
- type: usfm
  marker: q1
  children:
  - type: text
    text: et que l’abîme ╵ne m’engloutisse pas !
- type: usfm
  marker: q1
  children:
  - type: text
    text: Que le gouffre béant ╵ne se referme pas sur moi !
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Réponds-moi, Eternel, ╵ton amour est si bon !
- type: usfm
  marker: q1
  children:
  - type: text
    text: Dans ta grande compassion, ╵occupe-toi de moi !
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Ne te détourne plus ╵de moi, ton serviteur !
- type: usfm
  marker: q1
  children:
  - type: text
    text: Je suis dans la détresse, ╵réponds-moi sans tarder !
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Approche-toi de moi, ╵viens me sauver la vie.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Oui, viens me libérer, ╵car j’ai des ennemis.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Toi, tu sais comme je subis l’opprobre, ╵quelle est ma honte, ╵et mon ignominie.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ils sont là, devant toi, ╵tous mes persécuteurs.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: L’opprobre me brise le cœur, ╵je ne m’en remets pas ;
- type: usfm
  marker: q1
  children:
  - type: text
    text: j’espère un geste ╵de sympathie en ma faveur, ╵mais mon attente est vaine,
- type: usfm
  marker: q1
  children:
  - type: text
    text: quelqu’un qui me console, ╵mais je n’en trouve pas.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: Ils ont mis du poison
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '69.22 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Voir '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Mt 27.34
        metadata:
          usfm: MAT.27.34
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: ' ╵dans le pain que je mange.'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Pour étancher ma soif, ╵ils m’offrent du vinaigre
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '69.22 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Voir Mt 27.48 ; Mc 15.36 ; Jn 19.28-29.
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: Que leurs banquets deviennent ╵un piège devant eux,
- type: usfm
  marker: q1
  children:
  - type: text
    text: que leur tranquillité
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '69.23 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'La version grecque a : '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'un châtiment. '
    - type: usfm
      marker: ft
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Rm 11.9
        metadata:
          usfm: ROM.11.9
      - type: text
        text: ' cite cette version.'
    marker-yv: yv-n
  - type: text
    text: ' ╵soit comme un traquenard'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '69.23 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Les v. 23-24 sont cités en '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Rm 11.9-10
        metadata:
          usfm: ROM.11.9+ROM.11.10
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: '  !'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: Que leurs yeux s’obscurcissent ╵au point de ne plus voir,
- type: usfm
  marker: q1
  children:
  - type: text
    text: fais-leur courber le dos ╵continuellement !
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: Que ton indignation ╵se déverse sur eux !
- type: usfm
  marker: q1
  children:
  - type: text
    text: Que ta colère ardente les atteigne !
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: Que les lieux où ils campent ╵soient dévastés,
- type: usfm
  marker: q1
  children:
  - type: text
    text: que leurs demeures ╵soient privées d’habitants
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '69.26 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Cité en '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ac 1.20
        metadata:
          usfm: ACT.1.20
      - type: text
        text: ' à propos de la mort de Judas.'
    marker-yv: yv-n
  - type: text
    text: '  !'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: Ils se sont acharnés ╵sur celui que tu as frappé,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ils se sont répandus ╵en commérages ╵sur les malheurs de ceux ╵que tu avais blessés.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: Charge-les donc ╵de tous leurs crimes,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et qu’ils ne soient pas mis ╵au bénéfice ╵de ta justice !
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: Que leurs noms soient rayés ╵du livre des vivants
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '69.29 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Voir Ex 32.32-33 ; Dn 12.1 ; Lc 10.20 ; Ph 4.3 ; Ap 13.8 ; 17.8 ; 20.12, 15 ; 21.27.
    marker-yv: yv-n
  - type: text
    text: '  !'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Qu’ils ne soient pas inscrits ╵parmi les justes !
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: Je suis affligé et je souffre,
- type: usfm
  marker: q1
  children:
  - type: text
    text: mais ton secours, ô Dieu, ╵me mettra à l’abri.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: Alors je te louerai, ╵ô Dieu, dans mes cantiques,
- type: usfm
  marker: q1
  children:
  - type: text
    text: je dirai ta grandeur ╵avec reconnaissance.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '32'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: Voilà, ô Eternel, ╵qui te plaît plus qu’un bœuf ╵ou qu’un taureau
- type: usfm
  marker: q1
  children:
  - type: text
    text: ayant sabots et cornes
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '69.32 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Voir 50.10-14 ; 51.18-19.
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '33'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: O vous, les affligés, ╵voyez, réjouissez-vous !
- type: usfm
  marker: q1
  children:
  - type: text
    text: Oui, vous qui vous tournez vers Dieu, ╵que votre cœur soit vivifié !
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '34'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: Car l’Eternel entend ╵les cris des défavorisés,
- type: usfm
  marker: q1
  children:
  - type: text
    text: il ne méprise pas ╵ceux qui lui appartiennent ╵quand ils sont en prison.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '35'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: Que le ciel et la terre ╵entonnent ses louanges
- type: usfm
