document_id: PSA.69,21
type_code: fra
verses:
  '1':
  - type: heading
    content: Je suis submergé, sauve-moi !
  - type: text
    content: Au chef de chœur, un psaume de David, à chanter sur la mélodie des « Lis »
  - type: note
    content: 'Terme de sens incertain. Autre traduction : avec accompagnement sur instrument à six cordes.'
  - type: text
    content: .
  '10':
  - type: text
    content: L’amour que j’ai pour ta maison ╵est en moi comme un feu ╵qui me consume
  - type: note
    content: Cité en Jn 2.17.
  - type: text
    content: ','
  - type: text
    content: et les insultes ╵des hommes qui t’insultent ╵sont retombées sur moi
  - type: note
    content: Cité en Rm 15.3.
  - type: text
    content: .
  '11':
  - type: text
    content: Quand je pleure et je jeûne,
  - type: text
    content: je reçois des insultes.
  '12':
  - type: text
    content: Je me revêts ╵d’une toile de sac,
  - type: text
    content: et je deviens pour eux ╵un objet de risée.
  '13':
  - type: text
    content: Les gens qui sont assis ╵sur la place publique ╵aux portes de la ville,
  - type: text
    content: et les buveurs d’alcool ╵font de moi leur chanson.
  '14':
  - type: text
    content: 'Quant à moi, je t’exprime ma prière :'
  - type: text
    content: ô Eternel, ╵n’est-ce pas le moment ╵de montrer ta faveur ?
  - type: text
    content: Exauce-moi, ô Dieu, ╵dans ton immense amour
  - type: text
    content: et sauve-moi ╵dans ta fidélité !
  '15':
  - type: text
    content: Tire-moi de la boue ! ╵Que je n’enfonce pas !
  - type: text
    content: Viens donc me délivrer ╵de ceux qui me haïssent,
  - type: text
    content: et des profondes eaux !
  '16':
  - type: text
    content: Que je ne sois pas emporté ╵par le fort courant d’eau
  - type: text
    content: et que l’abîme ╵ne m’engloutisse pas !
  - type: text
    content: Que le gouffre béant ╵ne se referme pas sur moi !
  '17':
  - type: text
    content: Réponds-moi, Eternel, ╵ton amour est si bon !
  - type: text
    content: Dans ta grande compassion, ╵occupe-toi de moi !
  '18':
  - type: text
    content: Ne te détourne plus ╵de moi, ton serviteur !
  - type: text
    content: Je suis dans la détresse, ╵réponds-moi sans tarder !
  '19':
  - type: text
    content: Approche-toi de moi, ╵viens me sauver la vie.
  - type: text
    content: Oui, viens me libérer, ╵car j’ai des ennemis.
  '2':
  - type: text
    content: O mon Dieu, sauve-moi,
  - type: text
    content: j’ai de l’eau jusqu’au cou.
  '20':
  - type: text
    content: Toi, tu sais comme je subis l’opprobre, ╵quelle est ma honte, ╵et mon ignominie.
  - type: text
    content: Ils sont là, devant toi, ╵tous mes persécuteurs.
  '21':
  - type: text
    content: L’opprobre me brise le cœur, ╵je ne m’en remets pas ;
  - type: text
    content: j’espère un geste ╵de sympathie en ma faveur, ╵mais mon attente est vaine,
  - type: text
    content: quelqu’un qui me console, ╵mais je n’en trouve pas.
  '22':
  - type: text
    content: Ils ont mis du poison
  - type: note
    content: Voir Mt 27.34.
  - type: text
    content: ' ╵dans le pain que je mange.'
  - type: text
    content: Pour étancher ma soif, ╵ils m’offrent du vinaigre
  - type: note
    content: Voir Mt 27.48 ; Mc 15.36 ; Jn 19.28-29.
  - type: text
    content: .
  '23':
  - type: text
    content: Que leurs banquets deviennent ╵un piège devant eux,
  - type: text
    content: que leur tranquillité
  - type: note
    content: 'La version grecque a : un châtiment. Rm 11.9 cite cette version.'
  - type: text
    content: ' ╵soit comme un traquenard'
  - type: note
    content: Les v. 23-24 sont cités en Rm 11.9-10.
  - type: text
    content: '  !'
  '24':
  - type: text
    content: Que leurs yeux s’obscurcissent ╵au point de ne plus voir,
  - type: text
    content: fais-leur courber le dos ╵continuellement !
  '25':
  - type: text
    content: Que ton indignation ╵se déverse sur eux !
  - type: text
    content: Que ta colère ardente les atteigne !
  '26':
  - type: text
    content: Que les lieux où ils campent ╵soient dévastés,
  - type: text
    content: que leurs demeures ╵soient privées d’habitants
  - type: note
    content: Cité en Ac 1.20 à propos de la mort de Judas.
  - type: text
    content: '  !'
  '27':
  - type: text
    content: Ils se sont acharnés ╵sur celui que tu as frappé,
  - type: text
    content: ils se sont répandus ╵en commérages ╵sur les malheurs de ceux ╵que tu avais blessés.
  '28':
  - type: text
    content: Charge-les donc ╵de tous leurs crimes,
  - type: text
    content: et qu’ils ne soient pas mis ╵au bénéfice ╵de ta justice !
  '29':
  - type: text
    content: Que leurs noms soient rayés ╵du livre des vivants
  - type: note
    content: Voir Ex 32.32-33 ; Dn 12.1 ; Lc 10.20 ; Ph 4.3 ; Ap 13.8 ; 17.8 ; 20.12, 15 ; 21.27.
  - type: text
    content: '  !'
  - type: text
    content: Qu’ils ne soient pas inscrits ╵parmi les justes !
  '3':
  - type: text
    content: Dans une boue profonde, je m’enlise, ╵sans point d’appui.
  - type: text
    content: Me voici descendu ╵au plus profond des eaux ; ╵un fort courant m’emporte.
  '30':
  - type: text
    content: Je suis affligé et je souffre,
  - type: text
    content: mais ton secours, ô Dieu, ╵me mettra à l’abri.
  '31':
  - type: text
    content: Alors je te louerai, ╵ô Dieu, dans mes cantiques,
  - type: text
    content: je dirai ta grandeur ╵avec reconnaissance.
  '32':
  - type: text
    content: Voilà, ô Eternel, ╵qui te plaît plus qu’un bœuf ╵ou qu’un taureau
  - type: text
    content: ayant sabots et cornes
  - type: note
    content: Voir 50.10-14 ; 51.18-19.
  - type: text
    content: .
  '33':
  - type: text
    content: O vous, les affligés, ╵voyez, réjouissez-vous !
  - type: text
    content: Oui, vous qui vous tournez vers Dieu, ╵que votre cœur soit vivifié !
  '34':
  - type: text
    content: Car l’Eternel entend ╵les cris des défavorisés,
  - type: text
    content: il ne méprise pas ╵ceux qui lui appartiennent ╵quand ils sont en prison.
  '35':
  - type: text
    content: Que le ciel et la terre ╵entonnent ses louanges
  - type: text
    content: et que les mers l’acclament ╵avec tout être qui s’y meut !
  '36':
  - type: text
    content: Car Dieu viendra sauver ╵la ville de Sion ╵et il rebâtira ╵les cités de Juda.
  - type: text
    content: On y habitera, ╵on les possédera.
  '37':
  - type: text
    content: Quant à la descendance ╵des serviteurs de l’Eternel, ╵elle en héritera,
  - type: text
    content: et ceux qui l’aiment ╵y feront leur demeure.
  '4':
  - type: text
    content: Je m’épuise à crier, ╵mon gosier est brûlant,
  - type: text
    content: mes yeux se sont usés ╵à attendre mon Dieu.
  '5':
  - type: text
    content: Car ceux qui me haïssent ╵sans la moindre raison
  - type: note
    content: Voir Jn 15.25.
  - type: text
    content: ont dépassé le nombre ╵des cheveux de ma tête.
  - type: text
    content: 'Ils sont puissants, ╵mes ennemis menteurs : ╵qui veulent me détruire.'
  - type: text
    content: Je dois restituer ╵ce que je n’ai pas extorqué.
  '6':
  - type: text
    content: O Dieu, tu sais ╵comme j’ai été insensé,
  - type: text
    content: et mes actes coupables ╵ne te sont pas cachés.
  '7':
  - type: text
    content: Qu’ils ne soient pas dans la honte à cause de moi, ╵ceux qui ont mis leur espérance en toi,
  - type: text
    content: ô Eternel, ╵ô Seigneur des armées célestes !
  - type: text
    content: Que ceux qui se tournent vers toi ╵ne soient pas à cause de moi ╵remplis de confusion,
  - type: text
    content: Dieu d’Israël !
  '8':
  - type: text
    content: Car c’est pour toi ╵que je porte l’opprobre
  - type: text
    content: et que la confusion ╵me couvre le visage.
  '9':
  - type: text
    content: Me voilà devenu ╵étranger pour mes frères
  - type: text
    content: et comme un inconnu ╵pour les fils de ma mère !
