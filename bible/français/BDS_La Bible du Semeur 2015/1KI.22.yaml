document_id: 1KI.22,21
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Achab veut reprendre une ville israélite
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: (2 Ch 18.1-27)
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Trois années s’écoulèrent sans qu’il y ait de guerre entre la Syrie et Israël. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'Le roi d’Israël et Josaphat, roi de Juda, revêtus de leurs costumes royaux, siégeaient chacun sur un trône, sur l’esplanade qui s’étend devant la porte de Samarie, tandis que tous les prophètes étaient devant eux dans un état d’exaltation. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'L’un d’eux, Sédécias, fils de Kenaana, s’était fabriqué des cornes de fer et affirmait : Voici ce que déclare l’Eternel : « Avec ces cornes, tu frapperas les Syriens jusqu’à leur extermination. »'
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'Tous les autres prophètes confirmaient ce message et disaient : Va attaquer Ramoth en Galaad ! Tu seras vainqueur, et l’Eternel livrera la ville au roi.'
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'Pendant ce temps, le messager qui était allé chercher Michée lui dit : Les prophètes sont unanimes pour prédire du bien au roi. Tu ferais bien de parler comme eux et de lui prédire aussi le succès !'
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'Michée lui répondit : Aussi vrai que l’Eternel est vivant, je transmettrai ce que l’Eternel me dira.'
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'Lorsqu’il fut arrivé devant le roi, celui-ci lui demanda : Michée, devons-nous aller attaquer Ramoth en Galaad ou devons-nous y renoncer ?'
  - type: usfm
    marker: p
    children:
    - type: text
      text: – Bien sûr, vas-y, lui répondit Michée, tu seras vainqueur, et l’Eternel livrera la ville au roi !
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'Mais le roi lui rétorqua : Combien de fois faudra-t-il que je t’adjure de me dire seulement la vérité de la part de l’Eternel ?'
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'Alors Michée déclara :'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: J’ai vu tous les Israélites
  - type: usfm
    marker: q1
    children:
    - type: text
      text: disséminés sur les montagnes ;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ils ressemblaient à des brebis ╵qui n’ont pas de berger
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '22.17 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Voir Nb 27.17 ; Ez 34.5 ; Mt 9.36 ; Mc 6.34.
      marker-yv: yv-n
    - type: text
      text: .
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Et l’Eternel a dit :'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: « Ces gens n’ont plus de souverain.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Que chacun d’eux retourne ╵tranquillement chez soi ! »
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'Le roi d’Israël dit alors à Josaphat : Je te l’avais bien dit : « Cet homme-là ne me prophétise jamais rien de bon, c’est toujours du mal. »'
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'Mais Michée continua : Eh bien, oui. Ecoute ce que dit l’Eternel ! J’ai vu l’Eternel siégeant sur son trône, tandis que toute l’armée des êtres célestes se tenait près de lui, à sa droite et à sa gauche. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: Dans le courant de la troisième année, Josaphat, le roi de Juda, rendit visite à Achab, le roi d’Israël.
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: 'L’Eternel demanda : « Qui trompera Achab pour qu’il aille attaquer Ramoth en Galaad et qu’il tombe sur le champ de bataille ? » L’un proposait ceci, l’autre cela. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: 'Finalement, un esprit s’avança, se plaça devant l’Eternel et dit : « Moi, je le tromperai. » L’Eternel lui demanda : « Et comment t’y prendras-tu ? » '
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: '« J’irai, répondit-il, inspirer des mensonges à tous ses prophètes. » L’Eternel dit : « Pour sûr, tu le tromperas, tu y réussiras. Va donc et fais comme tu l’as dit ! » '
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: 'Et maintenant, conclut Michée, c’est ce qui est arrivé : l’Eternel a fait qu’un esprit de mensonge inspire tous tes prophètes ici présents, car l’Eternel a résolu ta perte.'
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: 'Alors Sédécias, fils de Kenaana, l’un des prophètes, s’approcha, gifla Michée et lui demanda : Par où l’esprit qui vient de l’Eternel'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '22.24 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Autre traduction : '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: l’Esprit de l’Eternel.
      marker-yv: yv-n
    - type: text
      text: ' est-il sorti de moi pour te parler ?'
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: 'Michée répondit : Tu le sauras le jour où tu fuiras en passant de chambre en chambre pour te cacher.'
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: 'Aussitôt le roi d’Israël ordonna à l’un de ses officiers : Arrête Michée et emmène-le à Amôn, le gouverneur de la ville, et à Joas, le fils du roi'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '22.26 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'L’expression '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'fils du roi '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: désigne peut-être ici un haut fonctionnaire du roi.
      marker-yv: yv-n
    - type: text
      text: '. '
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: Tu leur ordonneras de ma part de jeter cet individu en prison et de ne lui donner qu’une ration réduite de pain et d’eau jusqu’à ce que je revienne sain et sauf de cette expédition.
  '28':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: 'Michée s’écria : Si vraiment tu reviens sain et sauf, ce sera la preuve que l’Eternel n’a pas parlé par moi.'
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Puis il ajouta : Ecoutez, vous tous les peuples !'
  - type: usfm
    marker: s1
    children:
    - type: text
      text: La mort d’Achab
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: (2 Ch 18.28-34)
    marker-yv: yv-h
  '29':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: 'Alors le roi d’Israël et Josaphat, le roi de Juda, partirent pour Ramoth en Galaad. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'Or, celui-ci avait dit à ses ministres : Savez-vous que Ramoth en Galaad'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '22.3 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Ville à l’est du lac de Galilée en Transjordanie. Elle appartenait aux Israélites depuis l’époque de Moïse (voir 4.13 ; Dt 4.43 ; Jos 20.8). Les Syriens s’en étaient emparés, mais Ben-Hadad avait promis de la rendre (
        - type: usfm
          marker: ref
          children:
          - type: text
            text: '20.34'
        - type: text
          text: ). Il n’a apparemment pas tenu parole.
      marker-yv: yv-n
    - type: text
      text: ' est à nous ? Et pourtant nous ne faisons rien pour la reprendre au roi de Syrie !'
  '30':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '30'
    - type: text
      text: 'En chemin, Achab dit à Josaphat : Je vais me déguiser pour aller au combat ; mais toi, garde tes habits royaux.'
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Le roi d’Israël se déguisa donc pour la bataille. '
  '31':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '31'
    - type: text
      text: 'Le roi de Syrie avait donné cet ordre aux trente-deux chefs de ses chars : Vous ne vous occuperez ni des simples soldats ni des officiers, vous concentrerez votre attaque sur le roi d’Israël uniquement.'
  '32':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '32'
    - type: text
      text: 'Quand les chefs des chars aperçurent Josaphat, ils se dirent : « C’est certainement lui le roi d’Israël », et ils se dirigèrent sur lui pour l’attaquer. Mais Josaphat poussa un cri. '
  '33':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '33'
    - type: text
      text: 'Quand les chefs des chars se rendirent compte que ce n’était pas le roi d’Israël, ils se détournèrent de lui. '
  '34':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '34'
    - type: text
      text: 'Un soldat syrien tira une flèche de son arc, au hasard ; elle atteignit le roi d’Israël à la jointure entre les pièces de la cuirasse. Alors le roi cria au conducteur de son char : Fais demi-tour et conduis-moi hors du champ de bataille, car je suis blessé.'
  '35':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '35'
    - type: text
      text: 'Mais, ce jour-là, le combat devint si rude que le roi dut être maintenu debout dans son char face aux Syriens. Finalement, il expira dans la soirée. Le sang de sa blessure s’était répandu à l’intérieur de son char. '
  '36':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '36'
    - type: text
      text: 'Au coucher du soleil, un cri se répandit dans toute l’armée : Que chacun retourne dans sa ville et dans ses terres !'
  '37':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '37'
    - type: text
      text: Le roi étant mort, on le ramena à Samarie où on l’enterra.
  '38':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '38'
    - type: text
      text: Lorsqu’on lava son char à l’étang de la ville, les chiens lapèrent le sang d’Achab, et les prostituées s’y lavèrent. Ainsi s’accomplit ce que l’Eternel avait annoncé
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '22.38 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Voir '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: 1 R 21.19
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: .
  '39':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '39'
    - type: text
      text: 'Les autres faits et gestes d’Achab, toutes ses entreprises, le palais d’ivoire qu’il fit construire et toutes les villes qu’il fortifia, sont cités dans le livre des Annales des rois d’Israël. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'Quand Josaphat vint le voir, Achab lui demanda donc : Viendras-tu attaquer avec moi Ramoth en Galaad ?'
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Josaphat lui répondit : J’irai avec toi, mes troupes iront avec les tiennes, et mes chevaux avec les tiens.'
  '40':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '40'
    - type: text
      text: Quand Achab eut rejoint ses ancêtres décédés, son fils Ahazia lui succéda sur le trône.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Le règne de Josaphat sur Juda
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: (2 Ch 20.31 à 21.1)
    marker-yv: yv-h
  '41':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '41'
    - type: text
      text: 'Josaphat, fils d’Asa, devint roi de Juda la quatrième année du règne d’Achab sur Israël. '
  '42':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '42'
    - type: text
      text: Il était âgé de trente-cinq ans à son avènement et il régna vingt-cinq ans à Jérusalem
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '22.42 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: De 872 à 848 av. J.-C., y compris les trois années de corégence avec son père, de 872 à 869, lorsque celui-ci était malade (15.10, 23 ; 2 Ch 16.12-13).
      marker-yv: yv-n
    - type: text
      text: '. Sa mère s’appelait Azouba, elle était fille de Shilhi. '
  '43':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '43'
    - type: text
      text: 'Josaphat suivit en tout l’exemple de son père Asa sans en dévier, faisant ce que l’Eternel considère comme juste. '
  '44':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '44'
    - type: text
      text: 'Cependant, les hauts lieux ne disparurent pas : le peuple continuait à y offrir des sacrifices et à faire brûler des parfums. '
  '45':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '45'
    - type: text
      text: Josaphat vécut en paix avec le roi d’Israël.
  '46':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '46'
    - type: text
      text: 'Ses autres faits et gestes, ses exploits au cours des batailles sont cités dans le livre des Annales des rois de Juda. '
  '47':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '47'
    - type: text
      text: C’est lui qui débarrassa le pays des derniers hommes qui s’adonnaient à la prostitution sacrée et qui avaient subsisté dans les hauts lieux du temps de son père.
  '48':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '48'
    - type: text
      text: A cette époque, il n’y avait pas de roi dans le pays d’Edom, mais seulement un gouverneur nommé par le roi de Juda.
  '49':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '49'
    - type: text
      text: 'Josaphat fit construire des navires au long cours pour aller à Ophir chercher de l’or ; mais l’expédition n’y parvint jamais, car les navires se brisèrent à Etsyôn-Guéber. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'Mais il ajouta : Consulte d’abord l’Eternel, je te prie.'
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Le prophète Michée face aux faux prophètes
    marker-yv: yv-h
  '50':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '50'
    - type: text
      text: 'Alors Ahazia, fils d’Achab, proposa à Josaphat : Faisons une expédition commune : mes serviteurs iront avec les tiens sur des navires.'
  - type: usfm
    marker: p
    children:
    - type: text
      text: Mais Josaphat refusa.
  '51':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '51'
    - type: text
      text: Josaphat rejoignit ses ancêtres décédés et il fut enseveli auprès d’eux dans la Cité de David, son ancêtre, et son fils Yoram lui succéda sur le trône.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Le règne d’Ahazia sur Israël
    marker-yv: yv-h
  '52':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '52'
    - type: text
      text: La dix-septième année du règne de Josaphat, roi de Juda, Ahazia
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '22.52 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: De 853 à 852 av. J.-C.
      marker-yv: yv-n
    - type: text
      text: ', fils d’Achab, devint roi sur Israël à Samarie. Il régna deux ans. '
  '53':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '53'
    - type: text
      text: Il fit ce que l’Eternel considère comme mal et imita l’exemple de son père, de sa mère
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '22.53 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: C’est-à-dire d’Achab et de Jézabel.
      marker-yv: yv-n
    - type: text
      text: ' et de Jéroboam, fils de Nebath, qui avait entraîné le peuple d’Israël dans le péché.'
  '54':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '54'
    - type: text
      text: Il rendit un culte à Baal et se prosterna devant lui, irritant ainsi l’Eternel, le Dieu d’Israël, tout comme l’avait fait son père.
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'Le roi d’Israël rassembla les prophètes, qui étaient environ quatre cents, et leur demanda : Dois-je aller combattre pour reprendre Ramoth en Galaad, ou dois-je y renoncer ?'
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ils répondirent : Vas-y ! Le Seigneur la livrera au roi.'
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'Mais Josaphat insista : N’y a-t-il plus ici aucun prophète de l’Eternel, par qui nous puissions le consulter ?'
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'Le roi d’Israël lui répondit : Il y a encore un homme par qui l’on pourrait consulter l’Eternel ; mais je le déteste, car il ne m’annonce jamais rien de bon ; il ne m’annonce que du mal. Il s’agit de Michée'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '22.8 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: A ne pas confondre avec le prophète qui est l’auteur du livre de Michée et qui a vécu un siècle et demi plus tard.
      marker-yv: yv-n
    - type: text
      text: ', fils de Yimla.'
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Josaphat s’écria : Que le roi ne parle pas ainsi !'
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'Alors le roi d’Israël appela un chambellan et lui ordonna de faire venir au plus vite Michée, fils de Yimla. '
