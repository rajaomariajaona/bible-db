document_id: JER.33,21
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Dieu révèle des choses merveilleuses
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: L’Eternel adressa la parole une seconde fois à Jérémie alors qu’il était encore emprisonné dans la cour du corps de garde.
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'Voici ce que déclare l’Eternel au sujet de ce lieu qui est, selon vos dires, un pays dévasté où il ne reste plus ni être humain ni bête : Les villes de Juda et les rues de Jérusalem sont désolées, privées d’habitants, sans être humain ni bête. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'On y entendra encore les cris de réjouissance et d’allégresse, la voix du marié et de la mariée, la voix de ceux qui diront, lorsqu’ils viendront offrir leur sacrifice de reconnaissance dans le temple de l’Eternel :'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: « Célébrez l’Eternel, ╵le Seigneur des armées célestes
  - type: usfm
    marker: q1
    children:
    - type: text
      text: car l’Eternel est bon
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et son amour ╵dure à toujours. »
  - type: usfm
    marker: p
    children:
    - type: text
      text: Car je restaurerai le pays pour qu’il soit comme autrefois, l’Eternel le déclare
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '33.11 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Voir Ps 100.5 ; 106.1 ; 107.1 ; 118.1, 29 ; 136 ; 1 Ch 16.34 ; 2 Ch 5.13 ; 7.3 ; Esd 3.11.
      marker-yv: yv-n
    - type: text
      text: '. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'Voici ce que déclare le Seigneur des armées célestes : Dans ce pays en ruine et où il n’y a plus ni être humain ni bête, et dans toutes ses villes, il y aura encore des enclos de bergers qui y feront reposer les troupeaux, '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: tant dans les villes des montagnes que dans les villes de la plaine et dans les villes du Néguev, et dans le territoire de Benjamin, et aux alentours de Jérusalem et dans les villes de Juda. Brebis et chèvres passeront de nouveau sous la main de celui qui les compte, l’Eternel le déclare.
  - type: usfm
    marker: s2
    children:
    - type: text
      text: Le Fils de David
    marker-yv: yv-h
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: Le temps vient, l’Eternel le déclare, où je vais accomplir cette promesse de bienfait
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '33.14 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Voir 2 S 7.12-16 ; 1 Ch 17.11-14.
      marker-yv: yv-n
    - type: text
      text: ' que j’avais prononcée pour le royaume d’Israël et celui de Juda'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '33.14 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Pour les v. 14-16, voir '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: 23.5-6
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: .
  '15':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: En ce temps-là, ╵à cette époque,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: je ferai naître ╵un germe juste ╵dans la dynastie de David,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et il exercera le droit ╵et la justice ╵dans le pays.
  '16':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: En ce temps-là, ╵Juda sera sauvé,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Jérusalem vivra ╵dans la sécurité.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Voici quel est le nom ╵dont on l’appellera :'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: « L’Eternel est notre justice. »
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'Car voici ce que l’Eternel déclare : David aura toujours l’un de ses descendants sur le trône du peuple d’Israël. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: Il y aura toujours des prêtres-lévites se tenant devant moi pour m’offrir l’holocauste, faire brûler l’offrande et faire les sacrifices tous les jours.
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'L’Eternel adressa la parole à Jérémie en ces termes : '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: Voici ce que déclare l’Eternel, lui qui a fait la terre
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '33.2 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: la terre
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: ': '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'd’après l’ancienne version grecque. Le texte hébreu traditionnel a : '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: l’Eternel.
      marker-yv: yv-n
    - type: text
      text: ' et qui l’a façonnée pour la rendre stable, lui dont le nom est l’Eternel : '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: 'Voici ce que dit l’Eternel : Si vous réussissez à rompre mon alliance avec le jour et mon alliance avec la nuit, de sorte que le jour et la nuit ne paraissent plus en leur temps, '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: 'alors sera aussi rompue l’alliance que j’ai conclue avec mon serviteur David, de sorte qu’il n’ait plus de fils qui règne sur son trône, ainsi que mon alliance avec les prêtres-lévites qui sont à mon service. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: Tout comme les astres du ciel ne peuvent se compter et le sable des mers ne peut se mesurer, je rendrai innombrable la descendance de David, mon serviteur, ainsi que les lévites qui sont à mon service.
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: 'L’Eternel adressa la parole à Jérémie en ces termes : '
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: 'N’as-tu pas entendu ce que ce peuple dit : « Les deux familles'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '33.24 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Israël et Juda. Selon d’autres, les familles de Lévi et de David (v. 21) ou de Jacob et de David (v. 26).
      marker-yv: yv-n
    - type: text
      text: ' que l’Eternel avait choisies, il les a rejetées » ? Ainsi ils méprisent mon peuple qui, à leurs yeux, n’est plus une nation.'
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: 'Voici ce que dit l’Eternel : Si je n’ai pas conclu d’alliance avec le jour, et si je n’ai pas fait d’alliance avec la nuit, si je n’ai pas instauré des lois pour le ciel et pour la terre, '
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: alors, je pourrai rejeter la descendance de Jacob et celle de mon serviteur David, et renoncer à prendre l’un de ses descendants pour gouverner les descendants d’Abraham, d’Isaac, de Jacob. Mais j’accomplirai leur restauration et je leur manifesterai ma compassion.
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'Invoque-moi, et je te répondrai, je te révélerai de grandes choses et des choses secrètes que tu ne connais pas. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'Car voici ce que l’Eternel, Dieu d’Israël, déclare au sujet des maisons de cette ville, des palais des rois de Juda que l’on a démolis afin de faire face aux terrasses de siège et à l’épée de l’ennemi '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'dans la bataille engagée contre les Chaldéens : cela n’aboutira qu’à remplir ces maisons des cadavres des hommes que je m’en vais frapper dans ma colère et mon indignation. Je me suis détourné de cette ville à cause du mal qui s’y fait.'
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'Mais je ferai venir sa guérison et je lui rendrai la santé, oui, je les guérirai. Je leur accorderai un bien-être véritable dans toute sa richesse. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'Et je restaurerai Juda et Israël. Je les rebâtirai comme ils étaient jadis, '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'je les purifierai de toute faute qu’ils ont commise contre moi. Je leur pardonnerai toutes les fautes par lesquelles ils ont péché contre moi et se sont révoltés contre moi. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: La ville de Jérusalem fera ma renommée, ma joie, elle sera une source de louange et de gloire parmi tous les peuples de la terre qui apprendront tous les bienfaits dont je la comblerai ; ils trembleront de peur et seront terrifiés en voyant le bonheur et la prospérité que je lui donnerai.
