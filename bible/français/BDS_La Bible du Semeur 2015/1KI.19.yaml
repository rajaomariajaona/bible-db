document_id: 1KI.19
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: La fuite d’Elie
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Achab raconta à la reine Jézabel tout ce qu’avait fait Elie et comment il avait fait périr par l’épée tous les prophètes de Baal. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Alors Jézabel envoya un messager à Elie pour lui dire : Que les dieux me punissent très sévèrement si demain, à la même heure, je ne t’ai pas fait subir le sort que tu as infligé à chacun de ces prophètes !'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Elie prit peur
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '19.3 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Sens obtenu en modifiant la vocalisation du texte hébreu traditionnel, selon l’ancienne version grecque, la version syriaque et la Vulgate. La vocalisation du texte hébreu traditionnel donne le sens : '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: Elie vit.
    marker-yv: yv-n
  - type: text
    text: ' et s’enfuit pour sauver sa vie. Il se rendit d’abord à Beer-Sheva, dans le territoire de Juda, où il laissa son jeune serviteur. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Puis il s’enfonça dans le désert. Après avoir marché toute une journée, il s’assit à l’ombre d’un genêt isolé et demanda la mort : C’en est trop, dit-il ! Maintenant Eternel, prends-moi la vie, car je ne vaux pas mieux que mes ancêtres !'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Il se coucha et s’endormit sous le genêt. Soudain, un ange le toucha et lui dit : Lève-toi et mange !'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Il regarda et aperçut près de sa tête un de ces gâteaux que l’on cuit sur des pierres chauffées et une cruche pleine d’eau. Il mangea et but, puis se recoucha. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'L’ange de l’Eternel revint une seconde fois, le toucha et dit : Lève-toi, mange, car autrement le chemin serait trop long pour toi.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Il se leva, mangea et but ; puis, fortifié par cette nourriture, il marcha quarante jours et quarante nuits jusqu’à la montagne de Dieu, à Horeb
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '19.8 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Autre nom pour le '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'Sinaï '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: où Dieu s’est révélé à Moïse (Ex 3.1 ; 19.1-3). Entre Beer-Sheva et le Sinaï, il y avait près de 400 kilomètres.
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: s1
  children:
  - type: text
    text: A Horeb, l’Eternel se révèle à Elie
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Là-bas, il entra dans la grotte
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '19.9 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Peut-être la caverne où Dieu s’était révélé à Moïse (
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ex 33.18-23
        metadata:
          usfm: EXO.33.18+EXO.33.19+EXO.33.20+EXO.33.21+EXO.33.22+EXO.33.23
      - type: text
        text: ).
    marker-yv: yv-n
  - type: text
    text: ' et y passa la nuit. Soudain, l’Eternel lui adressa la parole en ces termes : Que viens-tu faire ici, Elie ?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Il répondit : J’ai ardemment défendu la cause de l’Eternel, le Dieu des armées célestes, car les Israélites ont abandonné ton alliance et ils ont renversé tes autels, ils ont massacré tes prophètes ; je suis le seul qui reste, et les voilà qui cherchent à me prendre la vie'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '19.10 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Cité en '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Rm 11.3
        metadata:
          usfm: ROM.11.3
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'L’Eternel dit : Sors et tiens-toi sur la montagne, devant l’Eternel.'
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Et voici que l’Eternel passa. Devant lui soufflait un vent si violent qu’il fendait les montagnes et fracassait les rochers. Mais l’Eternel n’était pas dans l’ouragan. Après l’ouragan, il y eut un tremblement de terre. Mais l’Eternel n’était pas dans ce tremblement de terre. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Après cela, il y eut un feu ; l’Eternel n’était pas dans ce feu. Enfin, après le feu, ce fut un bruissement doux et léger. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Dès qu’Elie l’entendit, il se couvrit le visage d’un pan de son manteau
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '19.13 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Parce que nulle créature ne peut voir Dieu et vivre (voir Ex 33.20-23 ; Es 6.2, 5).
    marker-yv: yv-n
  - type: text
    text: ' et sortit se placer à l’entrée de la grotte. Et voici que quelqu’un s’adressa à lui : Que fais-tu ici, Elie ?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Il répondit : J’ai ardemment défendu la cause de l’Eternel, le Dieu des armées célestes, car les Israélites ont abandonné ton alliance, ils ont renversé tes autels, ils ont massacré tes prophètes ; je suis le seul qui reste et les voilà qui cherchent à me prendre la vie.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'L’Eternel lui dit : Va, retourne sur tes pas, à travers le désert, jusqu’à Damas'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '19.15 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Capitale du royaume de Syrie (Aram), au nord d’Israël ; un trajet de plus de 500 kilomètres.
    marker-yv: yv-n
  - type: text
    text: '  ; quand tu seras arrivé, tu oindras Hazaël comme roi de Syrie'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '19.15 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Voir '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 2 R 8.7-13
        metadata:
          usfm: 2KI.8.7+2KI.8.8+2KI.8.9+2KI.8.10+2KI.8.11+2KI.8.12+2KI.8.13
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Puis tu iras oindre Jéhu, fils de Nimshi, comme roi d’Israël
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '19.16 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Voir '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 2 R 9.1-6
        metadata:
          usfm: 2KI.9.1+2KI.9.2+2KI.9.3+2KI.9.4+2KI.9.5+2KI.9.6
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: '  ; tu oindras aussi Elisée, fils de Shaphath, d’Abel-Mehola'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '19.16 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Dans la vallée du Jourdain, au sud du lac de Galilée (voir Jg 7.22 ; 1 R 4.12).
    marker-yv: yv-n
  - type: text
    text: ', comme prophète pour te remplacer. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Tout homme qui échappera à l’épée de Hazaël sera mis à mort par Jéhu, et tous ceux qui échapperont à l’épée de Jéhu seront mis à mort par Elisée. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Toutefois, j’épargnerai en Israël les sept mille hommes qui ne se sont jamais agenouillés devant Baal
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '19.18 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Cité en '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Rm 11.4
        metadata:
          usfm: ROM.11.4
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: ' et qui ne l’ont jamais baisé de leurs lèvres'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '19.18 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Geste d’adoration d’une idole (voir 1 R 8.54 ; Jb 31.27 ; Es 45.23 ; Os 13.2).
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: s1
  children:
  - type: text
    text: Elie appelle Elisée à lui succéder
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Elie partit de là et rencontra Elisée, fils de Shaphath, qui était en train de labourer un champ avec douze paires de bœufs. Lui-même conduisait le douzième attelage
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '19.19 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Autre traduction : '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: un champ de douze arpents. Il en était au douzième.
    marker-yv: yv-n
  - type: text
    text: '. Elie s’approcha de lui et jeta son manteau sur lui. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Elisée abandonna ses bœufs, courut derrière Elie et dit : Je vais aller embrasser mon père et ma mère pour prendre congé d’eux, puis je te suivrai.'
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Elie lui répondit : Va et reviens à cause de ce que je t’ai fait.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Elisée quitta Elie, prit une paire de bœufs et l’offrit en sacrifice. Il se servit du bois de l’attelage pour faire cuire la viande et la distribua aux siens qui la mangèrent. Puis il se mit en route pour suivre Elie et être à son service.
