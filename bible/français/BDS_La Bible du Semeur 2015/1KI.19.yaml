document_id: 1KI.19,21
type_code: fra
verses:
  '1':
  - type: heading
    content: La fuite d’Elie
  - type: text
    content: 'Achab raconta à la reine Jézabel tout ce qu’avait fait Elie et comment il avait fait périr par l’épée tous les prophètes de Baal. '
  '10':
  - type: text
    content: 'Il répondit : J’ai ardemment défendu la cause de l’Eternel, le Dieu des armées célestes, car les Israélites ont abandonné ton alliance et ils ont renversé tes autels, ils ont massacré tes prophètes ; je suis le seul qui reste, et les voilà qui cherchent à me prendre la vie'
  - type: note
    content: Cité en Rm 11.3.
  - type: text
    content: .
  '11':
  - type: text
    content: 'L’Eternel dit : Sors et tiens-toi sur la montagne, devant l’Eternel.'
  - type: text
    content: 'Et voici que l’Eternel passa. Devant lui soufflait un vent si violent qu’il fendait les montagnes et fracassait les rochers. Mais l’Eternel n’était pas dans l’ouragan. Après l’ouragan, il y eut un tremblement de terre. Mais l’Eternel n’était pas dans ce tremblement de terre. '
  '12':
  - type: text
    content: 'Après cela, il y eut un feu ; l’Eternel n’était pas dans ce feu. Enfin, après le feu, ce fut un bruissement doux et léger. '
  '13':
  - type: text
    content: Dès qu’Elie l’entendit, il se couvrit le visage d’un pan de son manteau
  - type: note
    content: Parce que nulle créature ne peut voir Dieu et vivre (voir Ex 33.20-23 ; Es 6.2, 5).
  - type: text
    content: ' et sortit se placer à l’entrée de la grotte. Et voici que quelqu’un s’adressa à lui : Que fais-tu ici, Elie ?'
  '14':
  - type: text
    content: 'Il répondit : J’ai ardemment défendu la cause de l’Eternel, le Dieu des armées célestes, car les Israélites ont abandonné ton alliance, ils ont renversé tes autels, ils ont massacré tes prophètes ; je suis le seul qui reste et les voilà qui cherchent à me prendre la vie.'
  '15':
  - type: text
    content: 'L’Eternel lui dit : Va, retourne sur tes pas, à travers le désert, jusqu’à Damas'
  - type: note
    content: Capitale du royaume de Syrie (Aram), au nord d’Israël ; un trajet de plus de 500 kilomètres.
  - type: text
    content: '  ; quand tu seras arrivé, tu oindras Hazaël comme roi de Syrie'
  - type: note
    content: Voir 2 R 8.7-13.
  - type: text
    content: '. '
  '16':
  - type: text
    content: Puis tu iras oindre Jéhu, fils de Nimshi, comme roi d’Israël
  - type: note
    content: Voir 2 R 9.1-6.
  - type: text
    content: '  ; tu oindras aussi Elisée, fils de Shaphath, d’Abel-Mehola'
  - type: note
    content: Dans la vallée du Jourdain, au sud du lac de Galilée (voir Jg 7.22 ; 1 R 4.12).
  - type: text
    content: ', comme prophète pour te remplacer. '
  '17':
  - type: text
    content: 'Tout homme qui échappera à l’épée de Hazaël sera mis à mort par Jéhu, et tous ceux qui échapperont à l’épée de Jéhu seront mis à mort par Elisée. '
  '18':
  - type: text
    content: Toutefois, j’épargnerai en Israël les sept mille hommes qui ne se sont jamais agenouillés devant Baal
  - type: note
    content: Cité en Rm 11.4.
  - type: text
    content: ' et qui ne l’ont jamais baisé de leurs lèvres'
  - type: note
    content: Geste d’adoration d’une idole (voir 1 R 8.54 ; Jb 31.27 ; Es 45.23 ; Os 13.2).
  - type: text
    content: .
  - type: heading
    content: Elie appelle Elisée à lui succéder
  '19':
  - type: text
    content: Elie partit de là et rencontra Elisée, fils de Shaphath, qui était en train de labourer un champ avec douze paires de bœufs. Lui-même conduisait le douzième attelage
  - type: note
    content: 'Autre traduction : un champ de douze arpents. Il en était au douzième.'
  - type: text
    content: '. Elie s’approcha de lui et jeta son manteau sur lui. '
  '2':
  - type: text
    content: 'Alors Jézabel envoya un messager à Elie pour lui dire : Que les dieux me punissent très sévèrement si demain, à la même heure, je ne t’ai pas fait subir le sort que tu as infligé à chacun de ces prophètes !'
  '20':
  - type: text
    content: 'Elisée abandonna ses bœufs, courut derrière Elie et dit : Je vais aller embrasser mon père et ma mère pour prendre congé d’eux, puis je te suivrai.'
  - type: text
    content: 'Elie lui répondit : Va et reviens à cause de ce que je t’ai fait.'
  '21':
  - type: text
    content: Elisée quitta Elie, prit une paire de bœufs et l’offrit en sacrifice. Il se servit du bois de l’attelage pour faire cuire la viande et la distribua aux siens qui la mangèrent. Puis il se mit en route pour suivre Elie et être à son service.
  '3':
  - type: text
    content: Elie prit peur
  - type: note
    content: 'Sens obtenu en modifiant la vocalisation du texte hébreu traditionnel, selon l’ancienne version grecque, la version syriaque et la Vulgate. La vocalisation du texte hébreu traditionnel donne le sens : Elie vit.'
  - type: text
    content: ' et s’enfuit pour sauver sa vie. Il se rendit d’abord à Beer-Sheva, dans le territoire de Juda, où il laissa son jeune serviteur. '
  '4':
  - type: text
    content: 'Puis il s’enfonça dans le désert. Après avoir marché toute une journée, il s’assit à l’ombre d’un genêt isolé et demanda la mort : C’en est trop, dit-il ! Maintenant Eternel, prends-moi la vie, car je ne vaux pas mieux que mes ancêtres !'
  '5':
  - type: text
    content: 'Il se coucha et s’endormit sous le genêt. Soudain, un ange le toucha et lui dit : Lève-toi et mange !'
  '6':
  - type: text
    content: 'Il regarda et aperçut près de sa tête un de ces gâteaux que l’on cuit sur des pierres chauffées et une cruche pleine d’eau. Il mangea et but, puis se recoucha. '
  '7':
  - type: text
    content: 'L’ange de l’Eternel revint une seconde fois, le toucha et dit : Lève-toi, mange, car autrement le chemin serait trop long pour toi.'
  '8':
  - type: text
    content: Il se leva, mangea et but ; puis, fortifié par cette nourriture, il marcha quarante jours et quarante nuits jusqu’à la montagne de Dieu, à Horeb
  - type: note
    content: Autre nom pour le Sinaï où Dieu s’est révélé à Moïse (Ex 3.1 ; 19.1-3). Entre Beer-Sheva et le Sinaï, il y avait près de 400 kilomètres.
  - type: text
    content: .
  - type: heading
    content: A Horeb, l’Eternel se révèle à Elie
  '9':
  - type: text
    content: Là-bas, il entra dans la grotte
  - type: note
    content: Peut-être la caverne où Dieu s’était révélé à Moïse (Ex 33.18-23).
  - type: text
    content: ' et y passa la nuit. Soudain, l’Eternel lui adressa la parole en ces termes : Que viens-tu faire ici, Elie ?'
