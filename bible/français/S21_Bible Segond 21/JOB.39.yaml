document_id: JOB.39
type_code: fra
segments:
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: »Sais-tu quand les bouquetins font leurs petits?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Observes-tu les biches quand elles mettent bas?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Comptes-tu les mois pendant lesquels elles portent
- type: usfm
  marker: q1
  children:
  - type: text
    text: et connais-tu l'époque où elles mettent bas?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Elles se courbent, libèrent leurs petits
- type: usfm
  marker: q1
  children:
  - type: text
    text: et sont délivrées de leurs douleurs.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Leurs petits prennent des forces et grandissent en plein air,
- type: usfm
  marker: q1
  children:
  - type: text
    text: puis ils s'éloignent et ne reviennent plus vers elles.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: »Qui a rendu l'âne sauvage indépendant
- type: usfm
  marker: q1
  children:
  - type: text
    text: et l'a libéré de tout lien?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: J'ai fait de la steppe son domicile,
- type: usfm
  marker: q1
  children:
  - type: text
    text: de la terre salée son habitation.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Il se moque du grondement des villes,
- type: usfm
  marker: q1
  children:
  - type: text
    text: il n'entend pas les cris d'un maître.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Il parcourt les montagnes pour trouver sa nourriture,
- type: usfm
  marker: q1
  children:
  - type: text
    text: il est à la recherche de tout ce qui est vert.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: »Le buffle désire-t-il être à ton service?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Passe-t-il la nuit près de ta mangeoire?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: L'attaches-tu avec une corde pour qu'il trace un sillon?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Traînera-t-il la herse derrière toi dans les vallées?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Pourras-tu t'appuyer sur lui parce que sa force est grande?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Lui laisseras-tu ton travail?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Peux-tu te fier à lui pour rentrer ta récolte?
- type: usfm
  marker: q1
  children:
  - type: text
    text: La rassemblera-t-il dans ton aire de battage?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: »L'aile des autruches se déploie joyeusement.
- type: usfm
  marker: q1
  children:
  - type: text
    text: On dirait l'aile, le plumage de la cigogne.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Cependant, l'autruche abandonne ses œufs à la terre
- type: usfm
  marker: q1
  children:
  - type: text
    text: et les laisse chauffer sur la poussière.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Elle oublie qu'un pied peut les écraser,
- type: usfm
  marker: q1
  children:
  - type: text
    text: qu'une bête sauvage peut les piétiner.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Elle traite durement ses petits, comme s'ils n'étaient pas à elle.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Elle n'est pas inquiète à l'idée d'avoir travaillé pour rien.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: En effet, Dieu lui a refusé la sagesse,
- type: usfm
  marker: q1
  children:
  - type: text
    text: il ne lui a pas attribué l'intelligence.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Quand elle se dresse et prend sa course,
- type: usfm
  marker: q1
  children:
  - type: text
    text: elle se moque du cheval et de son cavalier.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: »Est-ce toi qui donnes la puissance au cheval
- type: usfm
  marker: q1
  children:
  - type: text
    text: et qui habilles son cou d'une crinière flottante?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Le fais-tu bondir comme la sauterelle?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Son fier hennissement est source de terreur.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Il trépigne dans la vallée et se réjouit de sa force,
- type: usfm
  marker: q1
  children:
  - type: text
    text: il s'élance au-devant des armes.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: Il se moque de la peur, il n'est pas effrayé,
- type: usfm
  marker: q1
  children:
  - type: text
    text: il ne recule pas devant l'épée.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: Sur lui résonnent le carquois,
- type: usfm
  marker: q1
  children:
  - type: text
    text: la lance étincelante et le javelot.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: Bouillonnant d'ardeur, il dévore l'espace.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Il ne tient pas en place quand le son de la trompette retentit.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Chaque fois que la trompette sonne, il dit:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: ‘En avant!’ De loin il flaire la bataille,
- type: usfm
  marker: q1
  children:
  - type: text
    text: la voix retentissante des chefs et les cris de guerre.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: »Est-ce grâce à ton intelligence que l'épervier prend son vol
- type: usfm
  marker: q1
  children:
  - type: text
    text: et déploie ses ailes en direction du sud?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: Est-ce sur ton ordre que l'aigle royal prend de la hauteur
- type: usfm
  marker: q1
  children:
  - type: text
    text: et place son nid sur les sommets?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: C'est dans les rochers qu'il réside et passe les nuits,
- type: usfm
  marker: q1
  children:
  - type: text
    text: c'est sur une dent de rocher qu'il a sa forteresse.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: De là il cherche sa proie.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ses yeux l'aperçoivent de loin.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: Ses petits boivent le sang
- type: usfm
  marker: q1
  children:
  - type: text
    text: et *là où sont des cadavres, là il se trouve
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '39.30 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Là… se trouve: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'renvoi à ce texte en '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Matthieu 24.28
      metadata:
        usfm: MAT.24.28
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Luc 17.37
      metadata:
        usfm: LUK.17.37
    - type: usfm
      marker: ft
      children:
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: .»
