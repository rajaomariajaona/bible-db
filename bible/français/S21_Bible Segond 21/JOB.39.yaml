document_id: JOB.39,152
type_code: fra
verses:
  '1':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: »Sais-tu quand les bouquetins font leurs petits?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Observes-tu les biches quand elles mettent bas?
  '10':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: L'attaches-tu avec une corde pour qu'il trace un sillon?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Traînera-t-il la herse derrière toi dans les vallées?
  '11':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Pourras-tu t'appuyer sur lui parce que sa force est grande?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Lui laisseras-tu ton travail?
  '12':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Peux-tu te fier à lui pour rentrer ta récolte?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: La rassemblera-t-il dans ton aire de battage?
  '13':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: »L'aile des autruches se déploie joyeusement.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: On dirait l'aile, le plumage de la cigogne.
  '14':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Cependant, l'autruche abandonne ses œufs à la terre
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et les laisse chauffer sur la poussière.
  '15':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Elle oublie qu'un pied peut les écraser,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: qu'une bête sauvage peut les piétiner.
  '16':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Elle traite durement ses petits, comme s'ils n'étaient pas à elle.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Elle n'est pas inquiète à l'idée d'avoir travaillé pour rien.
  '17':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: En effet, Dieu lui a refusé la sagesse,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: il ne lui a pas attribué l'intelligence.
  '18':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Quand elle se dresse et prend sa course,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: elle se moque du cheval et de son cavalier.
  '19':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: »Est-ce toi qui donnes la puissance au cheval
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et qui habilles son cou d'une crinière flottante?
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Comptes-tu les mois pendant lesquels elles portent
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et connais-tu l'époque où elles mettent bas?
  '20':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Le fais-tu bondir comme la sauterelle?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Son fier hennissement est source de terreur.
  '21':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Il trépigne dans la vallée et se réjouit de sa force,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: il s'élance au-devant des armes.
  '22':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Il se moque de la peur, il n'est pas effrayé,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: il ne recule pas devant l'épée.
  '23':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Sur lui résonnent le carquois,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: la lance étincelante et le javelot.
  '24':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Bouillonnant d'ardeur, il dévore l'espace.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Il ne tient pas en place quand le son de la trompette retentit.
  '25':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Chaque fois que la trompette sonne, il dit:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ‘En avant!’ De loin il flaire la bataille,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: la voix retentissante des chefs et les cris de guerre.
  '26':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: »Est-ce grâce à ton intelligence que l'épervier prend son vol
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et déploie ses ailes en direction du sud?
  '27':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Est-ce sur ton ordre que l'aigle royal prend de la hauteur
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et place son nid sur les sommets?
  '28':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: C'est dans les rochers qu'il réside et passe les nuits,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: c'est sur une dent de rocher qu'il a sa forteresse.
  '29':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: De là il cherche sa proie.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ses yeux l'aperçoivent de loin.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Elles se courbent, libèrent leurs petits
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et sont délivrées de leurs douleurs.
  '30':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ses petits boivent le sang
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et *là où sont des cadavres, là il se trouve
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '39.30 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Là… se trouve: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'renvoi à ce texte en '
      - type: usfm
        marker: ref
