document_id: JOB.39,152
type_code: fra
verses:
  '1':
  - type: text
    content: »Sais-tu quand les bouquetins font leurs petits?
  - type: text
    content: Observes-tu les biches quand elles mettent bas?
  '10':
  - type: text
    content: L'attaches-tu avec une corde pour qu'il trace un sillon?
  - type: text
    content: Traînera-t-il la herse derrière toi dans les vallées?
  '11':
  - type: text
    content: Pourras-tu t'appuyer sur lui parce que sa force est grande?
  - type: text
    content: Lui laisseras-tu ton travail?
  '12':
  - type: text
    content: Peux-tu te fier à lui pour rentrer ta récolte?
  - type: text
    content: La rassemblera-t-il dans ton aire de battage?
  '13':
  - type: text
    content: »L'aile des autruches se déploie joyeusement.
  - type: text
    content: On dirait l'aile, le plumage de la cigogne.
  '14':
  - type: text
    content: Cependant, l'autruche abandonne ses œufs à la terre
  - type: text
    content: et les laisse chauffer sur la poussière.
  '15':
  - type: text
    content: Elle oublie qu'un pied peut les écraser,
  - type: text
    content: qu'une bête sauvage peut les piétiner.
  '16':
  - type: text
    content: Elle traite durement ses petits, comme s'ils n'étaient pas à elle.
  - type: text
    content: Elle n'est pas inquiète à l'idée d'avoir travaillé pour rien.
  '17':
  - type: text
    content: En effet, Dieu lui a refusé la sagesse,
  - type: text
    content: il ne lui a pas attribué l'intelligence.
  '18':
  - type: text
    content: Quand elle se dresse et prend sa course,
  - type: text
    content: elle se moque du cheval et de son cavalier.
  '19':
  - type: text
    content: »Est-ce toi qui donnes la puissance au cheval
  - type: text
    content: et qui habilles son cou d'une crinière flottante?
  '2':
  - type: text
    content: Comptes-tu les mois pendant lesquels elles portent
  - type: text
    content: et connais-tu l'époque où elles mettent bas?
  '20':
  - type: text
    content: Le fais-tu bondir comme la sauterelle?
  - type: text
    content: Son fier hennissement est source de terreur.
  '21':
  - type: text
    content: Il trépigne dans la vallée et se réjouit de sa force,
  - type: text
    content: il s'élance au-devant des armes.
  '22':
  - type: text
    content: Il se moque de la peur, il n'est pas effrayé,
  - type: text
    content: il ne recule pas devant l'épée.
  '23':
  - type: text
    content: Sur lui résonnent le carquois,
  - type: text
    content: la lance étincelante et le javelot.
  '24':
  - type: text
    content: Bouillonnant d'ardeur, il dévore l'espace.
  - type: text
    content: Il ne tient pas en place quand le son de la trompette retentit.
  '25':
  - type: text
    content: 'Chaque fois que la trompette sonne, il dit:'
  - type: text
    content: ‘En avant!’ De loin il flaire la bataille,
  - type: text
    content: la voix retentissante des chefs et les cris de guerre.
  '26':
  - type: text
    content: »Est-ce grâce à ton intelligence que l'épervier prend son vol
  - type: text
    content: et déploie ses ailes en direction du sud?
  '27':
  - type: text
    content: Est-ce sur ton ordre que l'aigle royal prend de la hauteur
  - type: text
    content: et place son nid sur les sommets?
  '28':
  - type: text
    content: C'est dans les rochers qu'il réside et passe les nuits,
  - type: text
    content: c'est sur une dent de rocher qu'il a sa forteresse.
  '29':
  - type: text
    content: De là il cherche sa proie.
  - type: text
    content: Ses yeux l'aperçoivent de loin.
  '3':
  - type: text
    content: Elles se courbent, libèrent leurs petits
  - type: text
    content: et sont délivrées de leurs douleurs.
  '30':
  - type: text
    content: Ses petits boivent le sang
  - type: text
    content: et *là où sont des cadavres, là il se trouve
  - type: note
    content: 'Là… se trouve: renvoi à ce texte en Matthieu 24.28; Luc 17.37.'
  - type: text
    content: .»
  '4':
  - type: text
    content: Leurs petits prennent des forces et grandissent en plein air,
  - type: text
    content: puis ils s'éloignent et ne reviennent plus vers elles.
  '5':
  - type: text
    content: »Qui a rendu l'âne sauvage indépendant
  - type: text
    content: et l'a libéré de tout lien?
  '6':
  - type: text
    content: J'ai fait de la steppe son domicile,
  - type: text
    content: de la terre salée son habitation.
  '7':
  - type: text
    content: Il se moque du grondement des villes,
  - type: text
    content: il n'entend pas les cris d'un maître.
  '8':
  - type: text
    content: Il parcourt les montagnes pour trouver sa nourriture,
  - type: text
    content: il est à la recherche de tout ce qui est vert.
  '9':
  - type: text
    content: »Le buffle désire-t-il être à ton service?
  - type: text
    content: Passe-t-il la nuit près de ta mangeoire?
