document_id: REV.7,152
type_code: fra
verses:
  '1':
  - type: heading
    content: Le peuple de Dieu et le septième sceau
  - type: text
    content: 'Après cela, je vis quatre anges debout aux quatre coins de la terre. Ils retenaient les quatre vents de la terre afin qu''il ne souffle pas de vent, ni sur la terre, ni sur la mer, ni sur aucun arbre. '
  '10':
  - type: text
    content: 'et ils criaient d''une voix forte: «Le salut est à notre Dieu qui est assis sur le trône et à l''Agneau.» '
  '11':
  - type: text
    content: 'Tous les anges qui se tenaient autour du trône, des anciens et des quatre êtres vivants se prosternèrent, le visage contre terre, devant le trône et ils adorèrent Dieu '
  '12':
  - type: text
    content: 'en disant: «Amen! La louange, la gloire, la sagesse, la reconnaissance, l''honneur, la puissance et la force sont à notre Dieu, aux siècles des siècles! Amen!»'
  '13':
  - type: text
    content: 'L''un des anciens prit la parole et me dit: «Ceux qui sont habillés d''une robe blanche, qui sont-ils et d''où sont-ils venus?» '
  '14':
  - type: text
    content: 'Je lui répondis: «[Mon] seigneur, tu le sais.» Il me dit alors: «Ce sont ceux qui viennent de la grande tribulation. Ils ont lavé leur robe, ils l''ont blanchie dans le sang de l''Agneau. '
  '15':
  - type: text
    content: 'C''est pourquoi ils se tiennent devant le trône de Dieu et le servent jour et nuit dans son temple. Celui qui est assis sur le trône les abritera sous sa tente. '
  '16':
  - type: text
    content: Ils n'auront plus faim, ils n'auront plus soif, le soleil ne les frappera plus, ni aucune chaleur brûlante.
  - type: note
    content: 'Ils n''auront… brûlante: renvoi à Esaïe 49.10.'
  - type: text
    content: ' '
  '17':
  - type: text
    content: En effet, l'Agneau qui est au milieu du trône prendra soin d'eux et les conduira aux sources des eaux de la vie, et Dieu essuiera toute larme de leurs yeux.»
  '2':
  - type: text
    content: 'Et je vis un autre ange qui montait du côté du soleil levant et qui tenait le sceau du Dieu vivant. Il cria d''une voix forte aux quatre anges qui avaient reçu le pouvoir de faire du mal à la terre et à la mer: '
  '3':
  - type: text
    content: «Ne faites pas de mal à la terre, ni à la mer, ni aux arbres, avant que nous ayons marqué d'une empreinte le front des serviteurs de notre Dieu.»
  '4':
  - type: text
    content: 'Puis j''entendis le nombre de ceux qui avaient été marqués de cette empreinte. Ils étaient 144''000, de toutes les tribus d''Israël: '
  '5':
  - type: text
    content: 'de la tribu de Juda, 12''000 marqués de cette empreinte; de la tribu de Ruben, 12''000; de la tribu de Gad, 12''000; '
  '6':
  - type: text
    content: 'de la tribu d''Aser, 12''000; de la tribu de Nephthali, 12''000; de la tribu de Manassé, 12''000; '
  '7':
  - type: text
    content: 'de la tribu de Siméon, 12''000; de la tribu de Lévi, 12''000; de la tribu d''Issacar, 12''000; '
  '8':
  - type: text
    content: de la tribu de Zabulon, 12'000; de la tribu de Joseph, 12'000; de la tribu de Benjamin, 12'000, tous marqués de cette empreinte.
  '9':
  - type: text
    content: 'Après cela, je regardai et je vis une foule immense que personne ne pouvait compter. C''étaient des hommes de toute nation, de toute tribu, de tout peuple et de toute langue. Ils se tenaient debout devant le trône et devant l''Agneau, habillés de robes blanches, des feuilles de palmiers à la main, '
