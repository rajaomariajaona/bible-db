document_id: MIC.3,152
type_code: fra
verses:
  '1':
  - type: heading
    content: Reproches aux responsables et aux prophètes
  - type: text
    content: 'Je dis: «Ecoutez, chefs de Jacob'
  - type: text
    content: et princes de la communauté d'Israël!
  - type: text
    content: N'est-ce pas à vous de connaître le droit?
  '10':
  - type: text
    content: vous qui construisez Sion avec le sang
  - type: text
    content: et Jérusalem avec le crime
  - type: note
    content: 'Construisez… crime: probable renvoi en Habakuk 2.12.'
  - type: text
    content: '!'
  '11':
  - type: text
    content: Ses chefs jugent pour des cadeaux,
  - type: text
    content: ses prêtres enseignent pour un salaire,
  - type: text
    content: ses prophètes prédisent l'avenir pour de l'argent,
  - type: text
    content: 'et ils osent s''appuyer sur l''Eternel en disant:'
  - type: text
    content: «L'Eternel n'est-il pas au milieu de nous?
  - type: text
    content: Le malheur ne nous atteindra pas.»
  '12':
  - type: text
    content: C'est pourquoi, à cause de vous,
  - type: text
    content: '*Sion sera labourée comme un champ,'
  - type: text
    content: Jérusalem deviendra un tas de ruines,
  - type: text
    content: et le mont du temple une hauteur couverte de buissons
  - type: note
    content: 'Sion… buissons: cité en Jérémie 26.18.'
  - type: text
    content: .
  '2':
  - type: text
    content: Vous détestez le bien et vous aimez le mal;
  - type: text
    content: vous arrachez leur peau et la chair qui couvre leurs os.»
  '3':
  - type: text
    content: Ils mangent la chair de mon peuple,
  - type: text
    content: lui arrachent la peau
  - type: text
    content: et lui brisent les os.
  - type: text
    content: Ils le mettent en pièces comme ce qu'on cuit dans un pot,
  - type: text
    content: comme de la viande dans une marmite.
  '4':
  - type: text
    content: Alors ils crieront vers l'Eternel,
  - type: text
    content: mais il ne leur répondra pas;
  - type: text
    content: il se cachera à eux à ce moment-là,
  - type: text
    content: parce qu'ils ont perverti leurs agissements.
  '5':
  - type: text
    content: Voici ce que dit l'Eternel à propos des prophètes qui égarent mon peuple,
  - type: text
    content: qui annoncent la paix si leurs dents trouvent quelque chose à mordre
  - type: text
    content: 'et qui proclament la guerre si l''on ne met rien dans leur bouche:'
  '6':
  - type: text
    content: A cause de cela, la nuit tombera sur vous, et finies les visions!
  - type: text
    content: Ce seront les ténèbres, et finis les oracles!
  - type: text
    content: Le soleil se couchera sur ces prophètes,
  - type: text
    content: le jour s'obscurcira sur eux.
  '7':
  - type: text
    content: Les voyants seront dans la honte, les devins rougiront,
  - type: text
    content: ils se couvriront tous la barbe,
  - type: text
    content: car Dieu ne répondra pas.
  '8':
  - type: text
    content: Mais moi, je suis rempli de force, grâce à l'Esprit de l'Eternel,
  - type: text
    content: je suis rempli de justice et de courage
  - type: text
    content: pour faire connaître à Jacob sa révolte
  - type: text
    content: et à Israël son péché.
  '9':
  - type: text
    content: Ecoutez donc ceci, chefs de la famille de Jacob
  - type: text
    content: et princes de la communauté d'Israël,
  - type: text
    content: vous qui avez en horreur la justice
  - type: text
    content: et qui tordez tout ce qui est droit,
