document_id: MIC.3,152
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Reproches aux responsables et aux prophètes
    marker-yv: yv-h
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Je dis: «Ecoutez, chefs de Jacob'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et princes de la communauté d'Israël!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: N'est-ce pas à vous de connaître le droit?
  '10':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: vous qui construisez Sion avec le sang
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et Jérusalem avec le crime
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '3.10 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Construisez… crime: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'probable renvoi en '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Habakuk 2.12
      - type: usfm
        marker: ft
        children:
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: '!'
  '11':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ses chefs jugent pour des cadeaux,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ses prêtres enseignent pour un salaire,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ses prophètes prédisent l'avenir pour de l'argent,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'et ils osent s''appuyer sur l''Eternel en disant:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: «L'Eternel n'est-il pas au milieu de nous?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Le malheur ne nous atteindra pas.»
  '12':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: C'est pourquoi, à cause de vous,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: '*Sion sera labourée comme un champ,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Jérusalem deviendra un tas de ruines,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et le mont du temple une hauteur couverte de buissons
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '3.12 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Sion… buissons: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'cité en '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Jérémie 26.18
      - type: usfm
        marker: ft
        children:
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: .
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Vous détestez le bien et vous aimez le mal;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: vous arrachez leur peau et la chair qui couvre leurs os.»
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ils mangent la chair de mon peuple,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: lui arrachent la peau
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et lui brisent les os.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ils le mettent en pièces comme ce qu'on cuit dans un pot,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: comme de la viande dans une marmite.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Alors ils crieront vers l'Eternel,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: mais il ne leur répondra pas;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: il se cachera à eux à ce moment-là,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: parce qu'ils ont perverti leurs agissements.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Voici ce que dit l'Eternel à propos des prophètes qui égarent mon peuple,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: qui annoncent la paix si leurs dents trouvent quelque chose à mordre
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'et qui proclament la guerre si l''on ne met rien dans leur bouche:'
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: A cause de cela, la nuit tombera sur vous, et finies les visions!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ce seront les ténèbres, et finis les oracles!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Le soleil se couchera sur ces prophètes,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: le jour s'obscurcira sur eux.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Les voyants seront dans la honte, les devins rougiront,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ils se couvriront tous la barbe,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: car Dieu ne répondra pas.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mais moi, je suis rempli de force, grâce à l'Esprit de l'Eternel,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: je suis rempli de justice et de courage
  - type: usfm
    marker: q1
    children:
    - type: text
      text: pour faire connaître à Jacob sa révolte
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et à Israël son péché.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ecoutez donc ceci, chefs de la famille de Jacob
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et princes de la communauté d'Israël,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: vous qui avez en horreur la justice
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et qui tordez tout ce qui est droit,
