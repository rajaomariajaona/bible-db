document_id: 2SA.13
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Viol de Tamar par Amnon
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Après cela, voici ce qui arriva. Absalom, le fils de David, avait une sœur qui était belle et qui s''appelait Tamar. Or Amnon, le fils de David, tomba amoureux d''elle. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Amnon était anxieux jusqu''à se rendre malade à cause de sa sœur Tamar. En effet, elle était vierge et il lui paraissait difficile de faire la moindre tentative auprès d''elle. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Amnon avait un ami du nom de Jonadab. C''était un fils de Shimea, le frère de David, et un homme très rusé. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Il lui demanda: «Pourquoi deviens-tu donc chaque matin plus abattu, toi qui es un fils de roi? Ne veux-tu pas me le dire?» Amnon lui répondit: «J''aime Tamar, la sœur de mon frère Absalom.» '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Jonadab lui dit: «Mets-toi au lit et fais le malade. Quand ton père viendra te voir, tu lui diras: ‘Permets à ma sœur Tamar de venir me donner à manger. Qu''elle prépare un plat sous mes yeux, afin que je le voie, et qu''elle me serve elle-même à manger.’» '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Amnon se coucha et fit le malade. Le roi vint le voir et Amnon lui dit: «Que ma sœur Tamar vienne donc faire deux gâteaux sous mes yeux et qu''elle me les serve elle-même.»'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'David fit dire à Tamar dans ses appartements: «Va donc chez ton frère Amnon et prépare-lui un plat.» '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Tamar alla chez son frère Amnon, qui était couché. Elle prit de la pâte, la pétrit, prépara des gâteaux devant lui et les fit cuire. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Elle prit ensuite la poêle et les déposa devant lui, mais Amnon refusa de manger. Il ordonna de faire sortir tout le monde, et tout le monde sortit de chez lui. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Alors Amnon dit à Tamar: «Apporte le plat dans la chambre et sers-moi.» Tamar prit les gâteaux qu''elle avait faits et les porta à son frère Amnon dans la chambre. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Comme elle les lui présentait à manger, il l''attrapa et lui dit: «Viens, couche avec moi, ma sœur.» '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Elle lui répondit: «Non, mon frère, ne me déshonore pas, car on n''agit pas de cette manière en Israël. Ne commets pas cet acte odieux! '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Où irais-je, moi, traîner ma honte? Et toi, tu serais comme l''un des plus ignobles en Israël. Maintenant, parle donc au roi et il ne m''empêchera pas d''être à toi.» '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Mais il ne voulut pas l''écouter. Il se montra plus fort qu''elle et il la viola, il coucha avec elle. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Puis Amnon éprouva de la haine envers elle, une haine plus forte encore que ne l''avait été son amour, et il lui dit: «Lève-toi, va-t''en!» '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Elle lui répondit: «Non! N''augmente pas, en me chassant, le mal que tu m''as déjà fait.» '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Il refusa de l''écouter. Appelant le garçon qui était à son service, il dit: «Qu''on fasse partir cette femme de chez moi, qu''on la mette dehors! Et ferme la porte derrière elle!» '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Elle portait une robe de plusieurs couleurs. C''était en effet la tenue que portaient les filles du roi aussi longtemps qu''elles étaient vierges. Le serviteur d''Amnon la fit sortir et ferma la porte derrière elle. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Tamar déversa de la cendre sur sa tête et déchira sa robe multicolore. Elle mit la main sur sa tête et s'en alla en poussant des cris.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Son frère Absalom lui dit: «Est-ce que ton frère Amnon a couché avec toi? Maintenant, ma sœur, garde le silence, car c''est ton frère. Ne prends pas cette affaire trop à cœur.» Et Tamar s''installa, accablée, chez son frère Absalom. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Le roi David apprit tout ce qui s''était passé et il en fut très irrité. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: Quant à Absalom, il ne parla ni en bien ni en mal à Amnon, mais il éprouva de la haine pour lui parce qu'il avait déshonoré sa sœur Tamar.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Meurtre d'Amnon et fuite d'Absalom
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Deux ans après, comme il avait les tondeurs de moutons chez lui à Baal-Hatsor, près d''Ephraïm, Absalom invita tous les fils du roi. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Il alla trouver le roi et dit: «Ton serviteur a les tondeurs de moutons chez lui. Que le roi et ses serviteurs viennent chez ton serviteur.» '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Le roi dit à Absalom: «Non, mon fils! Nous n''irons pas tous chez toi, nous risquerions d''être une charge pour toi.» Absalom insista auprès de lui, mais le roi ne voulut pas y aller. Toutefois, il le bénit. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Absalom dit: «Permets du moins à mon frère Amnon de venir avec nous.» Le roi lui répondit: «Pourquoi irait-il chez toi?» '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: Sur l'insistance d'Absalom, le roi laissa Amnon et tous ses fils partir avec lui.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'Absalom donna cet ordre à ses serviteurs: «Faites bien attention au moment où le cœur d''Amnon sera réjoui par le vin et où je vous dirai de le frapper! Alors faites-le mourir sans crainte! N''est-ce pas moi qui vous l''ordonne? Montrez-vous forts et pleins de courage!» '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: Les serviteurs d'Absalom traitèrent Amnon comme Absalom l'avait ordonné. Tous les fils du roi se levèrent alors, montèrent chacun sur son mulet et s'enfuirent.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'Ils étaient encore en chemin quand le bruit parvint à David qu''Absalom avait tué tous les fils du roi et qu''il n''y avait pas un seul survivant. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'Le roi se leva, déchira ses habits et se coucha par terre. Tous ses serviteurs se tenaient là, les habits déchirés. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'Jonadab, fils de Shimea, le frère de David, prit la parole. Il dit: «Que mon seigneur ne pense pas que ce sont tous les jeunes gens, tous les fils du roi, qu''on a fait mourir. En effet, seul Amnon est mort. Absalom avait pris cette décision le jour où Amnon avait violé sa sœur Tamar. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: Que le roi mon seigneur ne se tourmente donc pas à l'idée que tous ses fils seraient morts. En effet, seul Amnon est mort.»
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: 'Absalom prit la fuite. Or le jeune homme placé en sentinelle leva les yeux et regarda. Il vit une grande troupe venir par le chemin qui était derrière lui, du côté de la montagne. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: 'Jonadab dit au roi: «Voici les fils du roi qui arrivent! Cela confirme ce que disait ton serviteur.» '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: 'Il finissait de parler quand les fils du roi arrivèrent. Ils se mirent à pleurer tout haut; le roi et tous ses serviteurs pleurèrent eux aussi abondamment. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: Absalom avait pris la fuite et il se rendit chez Talmaï, fils d'Ammihur et roi de Gueshur. Quant à David, il menait tous les jours deuil sur son fils.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: text
    text: 'Absalom resta 3 ans à Gueshur, où il s''était rendu après avoir pris la fuite. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '39'
  - type: text
    text: Le roi David cessa de poursuivre Absalom lorsqu'il fut consolé de la mort d'Amnon.
