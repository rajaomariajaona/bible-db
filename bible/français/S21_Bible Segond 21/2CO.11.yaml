document_id: 2CO.11,152
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Comparaison entre Paul et les prétendus apôtres
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Si seulement vous pouviez supporter de ma part un peu de folie! Mais oui, supportez-moi! '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'Par la vérité de Christ qui est en moi, j''affirme que personne ne m''enlèvera ce sujet de fierté dans les régions de l''Achaïe. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'Pourquoi? Parce que je ne vous aime pas? Dieu le sait! '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'Mais j''agis ainsi, et je le ferai encore, pour enlever toute occasion à ceux qui en cherchent une de se montrer nos égaux sur un point dont ils se vantent. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'Ces hommes-là sont de prétendus apôtres, des ouvriers trompeurs déguisés en apôtres de Christ. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'Et ce n''est pas étonnant, puisque Satan lui-même se déguise en ange de lumière. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: Il n'est donc pas étrange que ses serviteurs aussi se déguisent en serviteurs de la justice. Leur fin sera conforme à leurs actes.
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'Je le répète, que personne ne me prenne pour un homme dépourvu de bon sens. Ou alors, acceptez-moi comme fou afin que moi aussi, je puisse me vanter un peu. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'Ce que je vais dire, je ne le dirai pas selon le Seigneur, mais comme par folie, avec l''assurance d''avoir des raisons de me vanter. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'Puisque beaucoup se vantent selon des critères purement humains, je me vanterai aussi. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'En effet, vous supportez volontiers les hommes dépourvus de bon sens, vous qui êtes raisonnables: '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'En effet, je suis jaloux de vous, de la jalousie de Dieu, parce que je vous ai fiancés à un seul époux pour vous présenter à Christ comme une vierge pure. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: 'vous supportez qu''on fasse de vous des esclaves, qu''on vous exploite, qu''on vous dépouille, qu''on vous traite avec arrogance, qu''on vous frappe au visage. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: 'J''ai honte de le dire, nous avons montré de la faiblesse pour cela. Cependant, tout ce qu''on peut oser dire – je parle comme un fou – moi aussi, j''ose le dire! '
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: Sont-ils
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '11.22 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Ils: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: c'est-à-dire «les super-apôtres» mentionnés au verset 5.
      marker-yv: yv-n
    - type: text
      text: ' hébreux? Moi aussi. Sont-ils israélites? Moi aussi. Ils sont de la descendance d''Abraham? Moi aussi. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: 'Ils sont serviteurs de Christ? – Je parle comme un fou. – Je le suis plus encore: j''ai bien plus connu les travaux pénibles, infiniment plus les coups, bien plus encore les emprisonnements, et j''ai souvent été en danger de mort. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: 'Cinq fois j''ai reçu des Juifs les quarante coups moins un, '
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: 'trois fois j''ai été fouetté, une fois j''ai été lapidé, trois fois j''ai fait naufrage, j''ai passé un jour et une nuit dans la mer. '
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: 'Fréquemment en voyage, j''ai été en danger sur les fleuves, en danger de la part des brigands, en danger de la part de mes compatriotes, en danger de la part des non-Juifs, en danger dans les villes, en danger dans les déserts, en danger sur la mer, en danger parmi les prétendus frères. '
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: 'J''ai connu le travail et la peine, j''ai été exposé à de nombreuses privations de sommeil, à la faim et à la soif, à de nombreux jeûnes, au froid et au dénuement. '
  '28':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: 'Et, sans parler du reste, je suis assailli chaque jour par le souci que j''ai de toutes les Eglises. '
  '29':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: Qui est faible sans que je sois faible? Qui vient à tomber sans que je brûle?
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'Cependant, de même que le serpent a trompé Eve par sa ruse, j''ai peur que vos pensées ne se corrompent et ne se détournent de la simplicité [et de la pureté] vis-à-vis de Christ. '
  '30':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '30'
    - type: text
      text: 'S''il faut se vanter, c''est de ma faiblesse que je me vanterai! '
  '31':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '31'
    - type: text
      text: 'Dieu, qui est le Père du Seigneur Jésus[-Christ] et qui est béni éternellement, sait que je ne mens pas. '
  '32':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '32'
    - type: text
      text: 'A Damas, le gouverneur du roi Arétas faisait garder la ville des Damascéniens parce qu''il voulait m''arrêter. '
  '33':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '33'
    - type: text
      text: Cependant, on m'a fait descendre par une fenêtre dans une corbeille le long de la muraille et je lui ai échappé.
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'En effet, si quelqu''un vient vous prêcher un autre Jésus que celui que nous avons prêché, ou si vous recevez un autre esprit que celui que vous avez reçu ou un autre évangile que celui que vous avez accepté, vous le supportez très bien. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'Or j''estime n''avoir été en rien inférieur à ces super-apôtres. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: Si je suis incompétent du point de vue de l'éloquence, je ne le suis pas pour ce qui est de la connaissance, et nous l'avons clairement démontré parmi vous à tout point de vue et en toute occasion.
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'Ou bien ai-je commis un péché en m''abaissant moi-même pour que vous soyez élevés quand je vous ai annoncé gratuitement l''Evangile de Dieu? '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'J''ai dépouillé d''autres Eglises en recevant d''elles un salaire pour vous servir. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'Et lorsque j''étais chez vous et que je me suis trouvé dans le besoin, je n''ai été à la charge de personne, car les frères venus de Macédoine ont pourvu à ce qui me manquait. En tout, je me suis bien gardé d''être à votre charge, et je m''en garderai encore. '
