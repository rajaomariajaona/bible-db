document_id: 2CO.11,152
type_code: fra
verses:
  '1':
  - type: heading
    content: Comparaison entre Paul et les prétendus apôtres
  - type: text
    content: 'Si seulement vous pouviez supporter de ma part un peu de folie! Mais oui, supportez-moi! '
  '10':
  - type: text
    content: 'Par la vérité de Christ qui est en moi, j''affirme que personne ne m''enlèvera ce sujet de fierté dans les régions de l''Achaïe. '
  '11':
  - type: text
    content: 'Pourquoi? Parce que je ne vous aime pas? Dieu le sait! '
  '12':
  - type: text
    content: 'Mais j''agis ainsi, et je le ferai encore, pour enlever toute occasion à ceux qui en cherchent une de se montrer nos égaux sur un point dont ils se vantent. '
  '13':
  - type: text
    content: 'Ces hommes-là sont de prétendus apôtres, des ouvriers trompeurs déguisés en apôtres de Christ. '
  '14':
  - type: text
    content: 'Et ce n''est pas étonnant, puisque Satan lui-même se déguise en ange de lumière. '
  '15':
  - type: text
    content: Il n'est donc pas étrange que ses serviteurs aussi se déguisent en serviteurs de la justice. Leur fin sera conforme à leurs actes.
  '16':
  - type: text
    content: 'Je le répète, que personne ne me prenne pour un homme dépourvu de bon sens. Ou alors, acceptez-moi comme fou afin que moi aussi, je puisse me vanter un peu. '
  '17':
  - type: text
    content: 'Ce que je vais dire, je ne le dirai pas selon le Seigneur, mais comme par folie, avec l''assurance d''avoir des raisons de me vanter. '
  '18':
  - type: text
    content: 'Puisque beaucoup se vantent selon des critères purement humains, je me vanterai aussi. '
  '19':
  - type: text
    content: 'En effet, vous supportez volontiers les hommes dépourvus de bon sens, vous qui êtes raisonnables: '
  '2':
  - type: text
    content: 'En effet, je suis jaloux de vous, de la jalousie de Dieu, parce que je vous ai fiancés à un seul époux pour vous présenter à Christ comme une vierge pure. '
  '20':
  - type: text
    content: 'vous supportez qu''on fasse de vous des esclaves, qu''on vous exploite, qu''on vous dépouille, qu''on vous traite avec arrogance, qu''on vous frappe au visage. '
  '21':
  - type: text
    content: 'J''ai honte de le dire, nous avons montré de la faiblesse pour cela. Cependant, tout ce qu''on peut oser dire – je parle comme un fou – moi aussi, j''ose le dire! '
  '22':
  - type: text
    content: Sont-ils
  - type: note
    content: 'Ils: c''est-à-dire «les super-apôtres» mentionnés au verset 5.'
  - type: text
    content: ' hébreux? Moi aussi. Sont-ils israélites? Moi aussi. Ils sont de la descendance d''Abraham? Moi aussi. '
  '23':
  - type: text
    content: 'Ils sont serviteurs de Christ? – Je parle comme un fou. – Je le suis plus encore: j''ai bien plus connu les travaux pénibles, infiniment plus les coups, bien plus encore les emprisonnements, et j''ai souvent été en danger de mort. '
  '24':
  - type: text
    content: 'Cinq fois j''ai reçu des Juifs les quarante coups moins un, '
  '25':
  - type: text
    content: 'trois fois j''ai été fouetté, une fois j''ai été lapidé, trois fois j''ai fait naufrage, j''ai passé un jour et une nuit dans la mer. '
  '26':
  - type: text
    content: 'Fréquemment en voyage, j''ai été en danger sur les fleuves, en danger de la part des brigands, en danger de la part de mes compatriotes, en danger de la part des non-Juifs, en danger dans les villes, en danger dans les déserts, en danger sur la mer, en danger parmi les prétendus frères. '
  '27':
  - type: text
    content: 'J''ai connu le travail et la peine, j''ai été exposé à de nombreuses privations de sommeil, à la faim et à la soif, à de nombreux jeûnes, au froid et au dénuement. '
  '28':
  - type: text
    content: 'Et, sans parler du reste, je suis assailli chaque jour par le souci que j''ai de toutes les Eglises. '
  '29':
  - type: text
    content: Qui est faible sans que je sois faible? Qui vient à tomber sans que je brûle?
  '3':
  - type: text
    content: 'Cependant, de même que le serpent a trompé Eve par sa ruse, j''ai peur que vos pensées ne se corrompent et ne se détournent de la simplicité [et de la pureté] vis-à-vis de Christ. '
  '30':
  - type: text
    content: 'S''il faut se vanter, c''est de ma faiblesse que je me vanterai! '
  '31':
  - type: text
    content: 'Dieu, qui est le Père du Seigneur Jésus[-Christ] et qui est béni éternellement, sait que je ne mens pas. '
  '32':
  - type: text
    content: 'A Damas, le gouverneur du roi Arétas faisait garder la ville des Damascéniens parce qu''il voulait m''arrêter. '
  '33':
  - type: text
    content: Cependant, on m'a fait descendre par une fenêtre dans une corbeille le long de la muraille et je lui ai échappé.
  '4':
  - type: text
    content: 'En effet, si quelqu''un vient vous prêcher un autre Jésus que celui que nous avons prêché, ou si vous recevez un autre esprit que celui que vous avez reçu ou un autre évangile que celui que vous avez accepté, vous le supportez très bien. '
  '5':
  - type: text
    content: 'Or j''estime n''avoir été en rien inférieur à ces super-apôtres. '
  '6':
  - type: text
    content: Si je suis incompétent du point de vue de l'éloquence, je ne le suis pas pour ce qui est de la connaissance, et nous l'avons clairement démontré parmi vous à tout point de vue et en toute occasion.
  '7':
  - type: text
    content: 'Ou bien ai-je commis un péché en m''abaissant moi-même pour que vous soyez élevés quand je vous ai annoncé gratuitement l''Evangile de Dieu? '
  '8':
  - type: text
    content: 'J''ai dépouillé d''autres Eglises en recevant d''elles un salaire pour vous servir. '
  '9':
  - type: text
    content: 'Et lorsque j''étais chez vous et que je me suis trouvé dans le besoin, je n''ai été à la charge de personne, car les frères venus de Macédoine ont pourvu à ce qui me manquait. En tout, je me suis bien gardé d''être à votre charge, et je m''en garderai encore. '
