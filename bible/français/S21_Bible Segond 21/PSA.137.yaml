document_id: PSA.137,152
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Souffrance des exilés
    marker-yv: yv-h
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Sur les bords des fleuves de Babylone,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: nous étions assis et nous pleurions en nous souvenant de Sion.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Nous avions suspendu nos harpes
  - type: usfm
    marker: q1
    children:
    - type: text
      text: aux saules du voisinage.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Là, ceux qui nous avaient déportés nous demandaient des chants,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'nos oppresseurs nous demandaient de la joie:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: «Chantez-nous quelques-uns des chants de Sion!»
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Comment chanterions-nous les chants de l'Eternel
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sur une terre étrangère?
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Si je t'oublie, Jérusalem,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: que ma main droite m'oublie!
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Que ma langue reste collée à mon palais,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: si je ne me souviens plus de toi,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: si je ne place pas Jérusalem
  - type: usfm
    marker: q1
    children:
    - type: text
      text: au-dessus de toutes mes joies!
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Eternel, souviens-toi des Edomites!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Le jour de la prise de Jérusalem,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'ils disaient: «Rasez-la, rasez-la'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: jusqu'aux fondations!»
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Toi, ville de Babylone, tu seras dévastée.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Heureux celui qui te rendra
  - type: usfm
    marker: q1
    children:
    - type: text
      text: le mal que tu nous as fait!
  '9':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Heureux celui qui prendra tes enfants
  - type: usfm
    marker: q1
    children:
    - type: text
      text: pour les écraser contre un rocher!
