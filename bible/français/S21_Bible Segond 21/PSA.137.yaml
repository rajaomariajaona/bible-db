document_id: PSA.137,152
type_code: fra
verses:
  '1':
  - type: heading
    content: Souffrance des exilés
  - type: text
    content: Sur les bords des fleuves de Babylone,
  - type: text
    content: nous étions assis et nous pleurions en nous souvenant de Sion.
  '2':
  - type: text
    content: Nous avions suspendu nos harpes
  - type: text
    content: aux saules du voisinage.
  '3':
  - type: text
    content: Là, ceux qui nous avaient déportés nous demandaient des chants,
  - type: text
    content: 'nos oppresseurs nous demandaient de la joie:'
  - type: text
    content: «Chantez-nous quelques-uns des chants de Sion!»
  '4':
  - type: text
    content: Comment chanterions-nous les chants de l'Eternel
  - type: text
    content: sur une terre étrangère?
  '5':
  - type: text
    content: Si je t'oublie, Jérusalem,
  - type: text
    content: que ma main droite m'oublie!
  '6':
  - type: text
    content: Que ma langue reste collée à mon palais,
  - type: text
    content: si je ne me souviens plus de toi,
  - type: text
    content: si je ne place pas Jérusalem
  - type: text
    content: au-dessus de toutes mes joies!
  '7':
  - type: text
    content: Eternel, souviens-toi des Edomites!
  - type: text
    content: Le jour de la prise de Jérusalem,
  - type: text
    content: 'ils disaient: «Rasez-la, rasez-la'
  - type: text
    content: jusqu'aux fondations!»
  '8':
  - type: text
    content: Toi, ville de Babylone, tu seras dévastée.
  - type: text
    content: Heureux celui qui te rendra
  - type: text
    content: le mal que tu nous as fait!
  '9':
  - type: text
    content: Heureux celui qui prendra tes enfants
  - type: text
    content: pour les écraser contre un rocher!
