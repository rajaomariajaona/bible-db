document_id: 1KI.9,152
type_code: fra
verses:
  '1':
  - type: heading
    content: Nouvelle apparition de Dieu à Salomon
  - type: text
    content: 'Lorsque Salomon eut fini de construire la maison de l''Eternel, le palais royal et tout ce qu''il avait désiré faire, '
  '10':
  - type: text
    content: 'Au bout de 20 ans, Salomon avait construit les deux maisons: la maison de l''Eternel et le palais royal. '
  '11':
  - type: text
    content: 'Alors, comme Hiram, le roi de Tyr, lui avait fourni autant de bois de cèdre et de cyprès, ainsi que d''or, qu''il l''avait voulu, le roi Salomon lui donna 20 villes situées en Galilée. '
  '12':
  - type: text
    content: 'Hiram sortit de Tyr pour voir les villes que lui donnait Salomon, mais elles ne lui plurent pas. '
  '13':
  - type: text
    content: 'Il dit: «Quelles villes m''as-tu données là, mon frère?» et il les appela pays de Cabul, nom qu''elles ont conservé jusqu''à aujourd''hui. '
  '14':
  - type: text
    content: Hiram avait envoyé au roi plus de 3 tonnes et demie d'or.
  '15':
  - type: text
    content: 'Voici ce qui concerne les hommes de corvée que le roi Salomon enrôla pour construire la maison de l''Eternel et sa propre maison, ainsi que Millo, la muraille de Jérusalem, Hatsor, Meguiddo et Guézer. '
  '16':
  - type: text
    content: 'Le pharaon, le roi d''Egypte, était venu s''emparer de la ville de Guézer, l''avait incendiée et avait tué les Cananéens qui y habitaient. Puis il l''avait donnée pour dot à sa fille, la femme de Salomon. '
  '17':
  - type: text
    content: 'Salomon reconstruisit alors Guézer, Beth-Horon-la-basse, '
  '18':
  - type: text
    content: 'Baalath et Thadmor, dans la région désertique du pays. '
  '19':
  - type: text
    content: 'Il construisit aussi toutes les villes qui lui servaient d''entrepôts, les villes destinées à accueillir les chars, celles réservées à la cavalerie, ainsi que tout ce qu''il lui plut de construire à Jérusalem, au Liban et sur tout le territoire dont il était le souverain. '
  '2':
  - type: text
    content: 'l''Eternel lui apparut une deuxième fois, comme il lui était apparu à Gabaon. '
  '20':
  - type: text
    content: 'Il y avait toute une population, issue des Amoréens, des Hittites, des Phéréziens, des Héviens et des Jébusiens, qui avait survécu et qui ne faisait pas partie des Israélites. '
  '21':
  - type: text
    content: 'Leurs descendants étaient restés après eux dans le pays, parce que les Israélites n''avaient pu les vouer à la destruction. Salomon les enrôla comme esclaves pour la corvée, statut qui leur est resté jusqu''à aujourd''hui. '
  '22':
  - type: text
    content: 'En revanche, Salomon n''employa pas les Israélites comme esclaves: ils étaient des hommes de guerre, ses serviteurs, ses chefs, ses écuyers, les commandants de ses chars et de sa cavalerie. '
  '23':
  - type: text
    content: Les chefs des officiers désignés comme responsables des travaux pour Salomon étaient au nombre de 550; ils avaient autorité sur les ouvriers.
  '24':
  - type: text
    content: La fille du pharaon monta de la ville de David jusque dans sa propre maison, celle que Salomon lui avait construite. Ce fut alors qu'il construisit Millo.
  '25':
  - type: text
    content: Salomon offrit trois fois par année des holocaustes et des sacrifices de communion sur l'autel qu'il avait construit en l'honneur de l'Eternel, et il brûla des parfums sur celui qui se trouvait devant l'Eternel. C'est ainsi que le temple fut terminé.
  '26':
  - type: text
    content: 'Le roi Salomon construisit des bateaux à Etsjon-Guéber, près d''Elath, sur les bords de la mer des Roseaux, dans le pays d''Edom. '
  '27':
  - type: text
    content: 'Hiram envoya sur ces bateaux, aux côtés des serviteurs de Salomon, ses propres serviteurs, des marins expérimentés. '
  '28':
  - type: text
    content: Ils allèrent à Ophir et ils en rapportèrent près de 13 tonnes d'or qu'ils remirent au roi Salomon.
  '3':
  - type: text
    content: 'L''Eternel lui dit: «J''exauce la prière et la supplication que tu m''as adressées, je consacre cette maison que tu as construite pour y établir éternellement mon nom, et j''y aurai toujours mes yeux et mon cœur. '
  '4':
  - type: text
    content: 'Quant à toi, si tu marches devant moi comme l''a fait ton père David, avec un cœur intègre et avec droiture, en accomplissant tout ce que je t''ai commandé, si tu respectes mes prescriptions et mes règles, '
  '5':
  - type: text
    content: 'j''affermirai pour toujours ton autorité royale en Israël, comme je l''ai déclaré à ton père David lorsque j''ai dit: ‘*Tu ne manqueras jamais d''un successeur sur le trône d''Israël.’'
  - type: note
    content: 'Tu ne manqueras… Israël: renvoi à 2.4.'
  '6':
  - type: text
    content: '»Si en revanche vous vous détournez de moi, vous et vos descendants, si vous ne respectez pas les commandements et les prescriptions que je vous ai donnés, mais que vous allez servir d''autres dieux et vous prosterner devant eux, '
  '7':
  - type: text
    content: 'j''éliminerai Israël du territoire que je lui ai donné, je rejetterai loin de moi la maison que j''ai consacrée en l''honneur de mon nom, et Israël sera un sujet de proverbe et de raillerie parmi tous les peuples. '
  '8':
  - type: text
    content: 'Si important qu''ait été ce temple, toute personne qui passera près de lui sera dans l''étonnement et sifflera. On dira: ‘Pourquoi l''Eternel a-t-il traité de cette manière ce pays et ce temple?’ '
  '9':
  - type: text
    content: 'Et l''on répondra: ‘C''est parce qu''ils ont abandonné l''Eternel, leur Dieu, qui avait fait sortir leurs ancêtres d''Egypte, parce qu''ils se sont attachés à d''autres dieux, se sont prosternés devant eux et les ont servis. Voilà pourquoi l''Eternel a fait venir tous ces malheurs sur eux.’»'
  - type: heading
    content: Travaux de construction de Salomon
