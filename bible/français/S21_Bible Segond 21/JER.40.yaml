document_id: JER.40
type_code: fra
segments:
- type: usfm
  marker: nb
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'La parole fut adressée à Jérémie de la part de l''Eternel après que Nebuzaradan, chef des gardes, l''eut laissé partir de Rama. Quand il le prit en charge, Jérémie était enchaîné au milieu de tous les prisonniers de Jérusalem et de Juda qu''on emmenait en exil à Babylone. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Le chef des gardes prit Jérémie à part et lui dit: «L''Eternel, ton Dieu, avait annoncé que ce malheur frapperait cet endroit. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Il a fait venir et mis à exécution ce qu''il avait annoncé. Tout cela vous est arrivé parce que vous avez péché contre l''Eternel et ne l''avez pas écouté. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Regarde, je te libère aujourd''hui des chaînes que tu as aux mains. Si tu juges bon de venir avec moi à Babylone, viens! Je veillerai sur toi. Mais si cela ne te convient pas, ne t''en fais pas! Regarde: tout le pays est devant toi. Va là où il te semblera bon et approprié d''aller!»'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Comme Jérémie tardait à répondre, il ajouta: «Retourne vers Guedalia, fils d''Achikam et petit-fils de Shaphan, que le roi de Babylone a désigné responsable des villes de Juda, et installe-toi avec lui au milieu de la population, ou alors va partout où il te semblera approprié d''aller!» Le chef des gardes lui donna ensuite des provisions et un cadeau, puis il le laissa partir. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Jérémie alla rejoindre Guedalia, fils d'Achikam, à Mitspa et s'installa avec lui au milieu de la population restée dans le pays.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Assassinat du gouverneur Guedalia
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Tous les chefs de troupes dispersés dans la campagne et leurs hommes apprirent que le roi de Babylone avait désigné Guedalia, fils d''Achikam, comme gouverneur du pays et lui avait confié hommes, femmes et enfants, les pauvres du pays qu''on n''avait pas emmenés en exil à Babylone. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Ils allèrent alors, avec leurs hommes, trouver Guedalia à Mitspa. Il y avait Ismaël, fils de Nethania, Jochanan et Jonathan, fils de Karéach, Seraja, fils de Thanhumeth, les fils d''Ephaï de Nethopha et Jezania, fils du Maacatite. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Guedalia, fils d''Achikam et petit-fils de Shaphan, leur affirma avec serment, à eux et à leurs hommes: «N''ayez pas peur de devenir les serviteurs des Babyloniens! Installez-vous dans le pays, servez le roi de Babylone et tout se passera bien pour vous. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Pour ma part, je vais m'installer à Mitspa pour assurer le contact avec les Babyloniens qui viendront vers nous. Quant à vous, veillez à la production du vin, des fruits d'été et de l'huile, conservez-les dans vos récipients et installez-vous dans les villes que vous occupez.»
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Tous les Juifs qui se trouvaient dans le pays de Moab, chez les Ammonites, dans le pays d''Edom et dans tous les autres pays apprirent aussi que le roi de Babylone avait laissé des habitants en Juda, sous la responsabilité de Guedalia, fils d''Achikam et petit-fils de Shaphan. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Ils revinrent alors de tous les endroits où ils avaient été chassés et allèrent rejoindre Guedalia à Mitspa, dans le pays de Juda. Leur production de vin et de fruits d'été fut très importante.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Jochanan, fils de Karéach, et tous les chefs de troupes présents dans la campagne vinrent trouver Guedalia à Mitspa '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'et lui dirent: «Ne sais-tu donc pas que Baalis, le roi des Ammonites, a chargé Ismaël, fils de Nethania, de t''enlever la vie?» Cependant, Guedalia, fils d''Achikam, ne les crut pas. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Alors Jochanan, fils de Karéach, dit secrètement à Guedalia à Mitspa: «Permets que j''aille tuer Ismaël, fils de Nethania! Personne ne le saura. Pourquoi t''enlèverait-il la vie? Pourquoi tous les Judéens rassemblés auprès de toi devraient-ils être dispersés et ce qui reste de Juda devrait-il disparaître?» '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Guedalia, fils d''Achikam, répondit à Jochanan, fils de Karéach: «Ne fais pas cela, car ce que tu dis à propos d''Ismaël est faux.»'
