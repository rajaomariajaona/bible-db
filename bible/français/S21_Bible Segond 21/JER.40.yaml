document_id: JER.40,152
type_code: fra
verses:
  '1':
  - type: text
    content: 'La parole fut adressée à Jérémie de la part de l''Eternel après que Nebuzaradan, chef des gardes, l''eut laissé partir de Rama. Quand il le prit en charge, Jérémie était enchaîné au milieu de tous les prisonniers de Jérusalem et de Juda qu''on emmenait en exil à Babylone. '
  '10':
  - type: text
    content: Pour ma part, je vais m'installer à Mitspa pour assurer le contact avec les Babyloniens qui viendront vers nous. Quant à vous, veillez à la production du vin, des fruits d'été et de l'huile, conservez-les dans vos récipients et installez-vous dans les villes que vous occupez.»
  '11':
  - type: text
    content: 'Tous les Juifs qui se trouvaient dans le pays de Moab, chez les Ammonites, dans le pays d''Edom et dans tous les autres pays apprirent aussi que le roi de Babylone avait laissé des habitants en Juda, sous la responsabilité de Guedalia, fils d''Achikam et petit-fils de Shaphan. '
  '12':
  - type: text
    content: Ils revinrent alors de tous les endroits où ils avaient été chassés et allèrent rejoindre Guedalia à Mitspa, dans le pays de Juda. Leur production de vin et de fruits d'été fut très importante.
  '13':
  - type: text
    content: 'Jochanan, fils de Karéach, et tous les chefs de troupes présents dans la campagne vinrent trouver Guedalia à Mitspa '
  '14':
  - type: text
    content: 'et lui dirent: «Ne sais-tu donc pas que Baalis, le roi des Ammonites, a chargé Ismaël, fils de Nethania, de t''enlever la vie?» Cependant, Guedalia, fils d''Achikam, ne les crut pas. '
  '15':
  - type: text
    content: 'Alors Jochanan, fils de Karéach, dit secrètement à Guedalia à Mitspa: «Permets que j''aille tuer Ismaël, fils de Nethania! Personne ne le saura. Pourquoi t''enlèverait-il la vie? Pourquoi tous les Judéens rassemblés auprès de toi devraient-ils être dispersés et ce qui reste de Juda devrait-il disparaître?» '
  '16':
  - type: text
    content: 'Guedalia, fils d''Achikam, répondit à Jochanan, fils de Karéach: «Ne fais pas cela, car ce que tu dis à propos d''Ismaël est faux.»'
  '2':
  - type: text
    content: 'Le chef des gardes prit Jérémie à part et lui dit: «L''Eternel, ton Dieu, avait annoncé que ce malheur frapperait cet endroit. '
  '3':
  - type: text
    content: 'Il a fait venir et mis à exécution ce qu''il avait annoncé. Tout cela vous est arrivé parce que vous avez péché contre l''Eternel et ne l''avez pas écouté. '
  '4':
  - type: text
    content: 'Regarde, je te libère aujourd''hui des chaînes que tu as aux mains. Si tu juges bon de venir avec moi à Babylone, viens! Je veillerai sur toi. Mais si cela ne te convient pas, ne t''en fais pas! Regarde: tout le pays est devant toi. Va là où il te semblera bon et approprié d''aller!»'
  '5':
  - type: text
    content: 'Comme Jérémie tardait à répondre, il ajouta: «Retourne vers Guedalia, fils d''Achikam et petit-fils de Shaphan, que le roi de Babylone a désigné responsable des villes de Juda, et installe-toi avec lui au milieu de la population, ou alors va partout où il te semblera approprié d''aller!» Le chef des gardes lui donna ensuite des provisions et un cadeau, puis il le laissa partir. '
  '6':
  - type: text
    content: Jérémie alla rejoindre Guedalia, fils d'Achikam, à Mitspa et s'installa avec lui au milieu de la population restée dans le pays.
  - type: heading
    content: Assassinat du gouverneur Guedalia
  '7':
  - type: text
    content: 'Tous les chefs de troupes dispersés dans la campagne et leurs hommes apprirent que le roi de Babylone avait désigné Guedalia, fils d''Achikam, comme gouverneur du pays et lui avait confié hommes, femmes et enfants, les pauvres du pays qu''on n''avait pas emmenés en exil à Babylone. '
  '8':
  - type: text
    content: 'Ils allèrent alors, avec leurs hommes, trouver Guedalia à Mitspa. Il y avait Ismaël, fils de Nethania, Jochanan et Jonathan, fils de Karéach, Seraja, fils de Thanhumeth, les fils d''Ephaï de Nethopha et Jezania, fils du Maacatite. '
  '9':
  - type: text
    content: 'Guedalia, fils d''Achikam et petit-fils de Shaphan, leur affirma avec serment, à eux et à leurs hommes: «N''ayez pas peur de devenir les serviteurs des Babyloniens! Installez-vous dans le pays, servez le roi de Babylone et tout se passera bien pour vous. '
