document_id: MRK.15
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Jésus devant le gouverneur romain
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Dès le matin, les chefs des prêtres tinrent conseil avec les anciens, les spécialistes de la loi et tout le sanhédrin. Après avoir attaché Jésus, ils l''emmenèrent et le livrèrent à Pilate. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Pilate l''interrogea: «Es-tu le roi des Juifs?» Jésus lui répondit: «Tu le dis.» '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Les chefs des prêtres portaient contre lui beaucoup d''accusations. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Pilate l''interrogea de nouveau: «Ne réponds-tu rien? Vois tous les témoignages qu''ils portent contre toi.» '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Mais Jésus ne répondit plus rien, ce qui étonna Pilate.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'A chaque fête, il relâchait un prisonnier, celui que le peuple réclamait. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Il y avait en prison le dénommé Barabbas avec ses complices, pour un meurtre qu''ils avaient commis lors d''une émeute. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'La foule se mit à demander à grands cris ce qu''il avait l''habitude de leur accorder. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Pilate leur répondit: «Voulez-vous que je vous relâche le roi des Juifs?» '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'En effet, il savait que c''était par jalousie que les chefs des prêtres avaient fait arrêter Jésus. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Cependant, les chefs des prêtres excitèrent la foule afin que Pilate leur relâche plutôt Barabbas. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Pilate reprit la parole et leur dit: «Que voulez-vous donc que je fasse de celui que vous appelez le roi des Juifs?» '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Ils crièrent de nouveau: «Crucifie-le!» '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: '«Quel mal a-t-il fait?» leur dit Pilate. Ils crièrent encore plus fort: «Crucifie-le!» '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Voulant satisfaire la foule, Pilate leur relâcha Barabbas et, après avoir fait fouetter Jésus, il le livra à la crucifixion.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Les soldats conduisirent Jésus à l''intérieur de la cour, c''est-à-dire dans le prétoire, et ils rassemblèrent toute la troupe. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Ils lui mirent un habit pourpre et posèrent sur sa tête une couronne d''épines qu''ils avaient tressée. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Puis ils se mirent à le saluer: «Salut, roi des Juifs!» '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Ils lui frappaient la tête avec un roseau, crachaient sur lui et se mettaient à genoux pour se prosterner devant lui. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Après s'être ainsi moqués de lui, ils lui enlevèrent l'habit pourpre, lui remirent ses vêtements et l'emmenèrent pour le crucifier.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Crucifixion et mort de Jésus
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Ils forcèrent un passant qui revenait des champs à porter la croix de Jésus. C''était Simon de Cyrène, le père d''Alexandre et de Rufus. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Ils conduisirent Jésus à l''endroit appelé Golgotha, ce qui signifie «lieu du crâne». '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: Ils lui donnèrent [à boire] du vin mêlé de myrrhe, mais il ne le prit pas.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Ils le crucifièrent, puis ils se partagèrent ses vêtements en tirant au sort pour savoir ce que chacun aurait. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'C''était neuf heures du matin quand ils le crucifièrent. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'L''inscription indiquant le motif de sa condamnation portait ces mots: «Le roi des Juifs». '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'Ils crucifièrent avec lui deux brigands, l''un à sa droite et l''autre à sa gauche. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: '[Ainsi fut accompli ce que dit l''Ecriture: '
  - type: usfm
    marker: qt
    children:
    - type: text
      text: Il a été compté parmi les criminels
  - type: text
    text: .
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '15.28 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Il a… criminels: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: citation d'
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Esaïe 53.12
      metadata:
        usfm: ISA.53.12
    - type: usfm
      marker: ft
      children:
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: ']'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'Les passants l''insultaient et secouaient la tête en disant: «Hé! toi qui détruis le temple et qui le reconstruis en trois jours, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'sauve-toi toi-même, descends de la croix!» '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'Les chefs des prêtres, avec les spécialistes de la loi, se moquaient aussi entre eux et disaient: «Il en a sauvé d''autres et il ne peut pas se sauver lui-même! '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: Que le Messie, le roi d'Israël, descende maintenant de la croix, afin que nous voyions et que nous croyions!» Ceux qui étaient crucifiés avec lui l'insultaient aussi.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: 'A midi, il y eut des ténèbres sur tout le pays, jusqu''à trois heures de l''après-midi. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: 'Et à trois heures de l''après-midi, Jésus s''écria d''une voix forte: «'
  - type: usfm
    marker: qt
    children:
    - type: text
      text: Eloï, Eloï, lama sabachthani?
  - type: text
    text: '» – ce qui signifie: '
  - type: usfm
    marker: qt
    children:
    - type: text
      text: Mon Dieu, mon Dieu, pourquoi m'as-tu abandonné?
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '15.34 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Mon Dieu… abandonné: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'citation du '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Psaume 22.2
      metadata:
        usfm: PSA.22.2
    - type: usfm
      marker: ft
      children:
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: 'Quelques-uns de ceux qui étaient là, après l''avoir entendu, disaient: «Voici qu''il appelle Elie.» '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: 'Et l''un d''eux courut remplir une éponge de vinaigre; il la fixa à un roseau et lui donna à boire en disant: «Laissez donc, voyons si Elie viendra le descendre de là.»'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: 'Cependant, Jésus poussa un grand cri et expira. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: text
    text: Le voile du temple
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '15.38 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Voile du temple: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: celui qui séparait le lieu saint du lieu très saint, accessible au grand-prêtre seulement, et ce une fois par an.
    marker-yv: yv-n
  - type: text
    text: ' se déchira en deux, depuis le haut jusqu''en bas. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '39'
  - type: text
    text: 'Quand l''officier romain qui se tenait en face de Jésus [entendit son cri et] le vit expirer de cette manière, il dit: «Cet homme était vraiment le Fils de Dieu.»'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '40'
  - type: text
    text: 'Il y avait aussi des femmes qui regardaient de loin. Parmi elles étaient Marie de Magdala, Marie, mère de Jacques le jeune et de Joses, ainsi que Salomé, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '41'
  - type: text
    text: qui le suivaient et le servaient lorsqu'il était en Galilée, et beaucoup d'autres femmes qui étaient aussi montées avec lui à Jérusalem.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Mise au tombeau du corps de Jésus
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '42'
  - type: text
    text: 'Le soir venu, comme c''était le jour de la préparation, c''est-à-dire la veille du sabbat, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '43'
  - type: text
    text: 'Joseph d''Arimathée arriva. C''était un membre éminent du conseil, qui attendait lui aussi le royaume de Dieu. Il osa se rendre vers Pilate pour demander le corps de Jésus. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '44'
  - type: text
    text: 'Pilate s''étonna qu''il soit déjà mort; il fit venir l''officier et lui demanda si Jésus était mort depuis longtemps. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '45'
  - type: text
    text: 'Une fois renseigné par l''officier, il fit remettre le corps à Joseph. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '46'
  - type: text
    text: 'Joseph acheta un drap de lin, descendit Jésus de la croix, l''enveloppa dans le drap de lin et le déposa dans un tombeau taillé dans la roche. Puis il roula une pierre à l''entrée du tombeau. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '47'
  - type: text
    text: Marie de Magdala et Marie la mère de Joses regardaient où l'on déposait Jésus.
