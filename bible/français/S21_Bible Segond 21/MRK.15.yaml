document_id: MRK.15,152
type_code: fra
verses:
  '1':
  - type: heading
    content: Jésus devant le gouverneur romain
  - type: text
    content: 'Dès le matin, les chefs des prêtres tinrent conseil avec les anciens, les spécialistes de la loi et tout le sanhédrin. Après avoir attaché Jésus, ils l''emmenèrent et le livrèrent à Pilate. '
  '10':
  - type: text
    content: 'En effet, il savait que c''était par jalousie que les chefs des prêtres avaient fait arrêter Jésus. '
  '11':
  - type: text
    content: 'Cependant, les chefs des prêtres excitèrent la foule afin que Pilate leur relâche plutôt Barabbas. '
  '12':
  - type: text
    content: 'Pilate reprit la parole et leur dit: «Que voulez-vous donc que je fasse de celui que vous appelez le roi des Juifs?» '
  '13':
  - type: text
    content: 'Ils crièrent de nouveau: «Crucifie-le!» '
  '14':
  - type: text
    content: '«Quel mal a-t-il fait?» leur dit Pilate. Ils crièrent encore plus fort: «Crucifie-le!» '
  '15':
  - type: text
    content: Voulant satisfaire la foule, Pilate leur relâcha Barabbas et, après avoir fait fouetter Jésus, il le livra à la crucifixion.
  '16':
  - type: text
    content: 'Les soldats conduisirent Jésus à l''intérieur de la cour, c''est-à-dire dans le prétoire, et ils rassemblèrent toute la troupe. '
  '17':
  - type: text
    content: 'Ils lui mirent un habit pourpre et posèrent sur sa tête une couronne d''épines qu''ils avaient tressée. '
  '18':
  - type: text
    content: 'Puis ils se mirent à le saluer: «Salut, roi des Juifs!» '
  '19':
  - type: text
    content: 'Ils lui frappaient la tête avec un roseau, crachaient sur lui et se mettaient à genoux pour se prosterner devant lui. '
  '2':
  - type: text
    content: 'Pilate l''interrogea: «Es-tu le roi des Juifs?» Jésus lui répondit: «Tu le dis.» '
  '20':
  - type: text
    content: Après s'être ainsi moqués de lui, ils lui enlevèrent l'habit pourpre, lui remirent ses vêtements et l'emmenèrent pour le crucifier.
  - type: heading
    content: Crucifixion et mort de Jésus
  '21':
  - type: text
    content: 'Ils forcèrent un passant qui revenait des champs à porter la croix de Jésus. C''était Simon de Cyrène, le père d''Alexandre et de Rufus. '
  '22':
  - type: text
    content: 'Ils conduisirent Jésus à l''endroit appelé Golgotha, ce qui signifie «lieu du crâne». '
  '23':
  - type: text
    content: Ils lui donnèrent [à boire] du vin mêlé de myrrhe, mais il ne le prit pas.
  '24':
  - type: text
    content: 'Ils le crucifièrent, puis ils se partagèrent ses vêtements en tirant au sort pour savoir ce que chacun aurait. '
  '25':
  - type: text
    content: 'C''était neuf heures du matin quand ils le crucifièrent. '
  '26':
  - type: text
    content: 'L''inscription indiquant le motif de sa condamnation portait ces mots: «Le roi des Juifs». '
  '27':
  - type: text
    content: 'Ils crucifièrent avec lui deux brigands, l''un à sa droite et l''autre à sa gauche. '
  '28':
  - type: text
    content: '[Ainsi fut accompli ce que dit l''Ecriture: '
  - type: text
    content: Il a été compté parmi les criminels
  - type: text
    content: .
  - type: note
    content: 'Il a… criminels: citation d''Esaïe 53.12.'
  - type: text
    content: ']'
  '29':
  - type: text
    content: 'Les passants l''insultaient et secouaient la tête en disant: «Hé! toi qui détruis le temple et qui le reconstruis en trois jours, '
  '3':
  - type: text
    content: 'Les chefs des prêtres portaient contre lui beaucoup d''accusations. '
  '30':
  - type: text
    content: 'sauve-toi toi-même, descends de la croix!» '
  '31':
  - type: text
    content: 'Les chefs des prêtres, avec les spécialistes de la loi, se moquaient aussi entre eux et disaient: «Il en a sauvé d''autres et il ne peut pas se sauver lui-même! '
  '32':
  - type: text
    content: Que le Messie, le roi d'Israël, descende maintenant de la croix, afin que nous voyions et que nous croyions!» Ceux qui étaient crucifiés avec lui l'insultaient aussi.
  '33':
  - type: text
    content: 'A midi, il y eut des ténèbres sur tout le pays, jusqu''à trois heures de l''après-midi. '
  '34':
  - type: text
    content: 'Et à trois heures de l''après-midi, Jésus s''écria d''une voix forte: «'
  - type: text
    content: Eloï, Eloï, lama sabachthani?
  - type: text
    content: '» – ce qui signifie: '
  - type: text
    content: Mon Dieu, mon Dieu, pourquoi m'as-tu abandonné?
  - type: note
    content: 'Mon Dieu… abandonné: citation du Psaume 22.2.'
  - type: text
    content: ' '
  '35':
  - type: text
    content: 'Quelques-uns de ceux qui étaient là, après l''avoir entendu, disaient: «Voici qu''il appelle Elie.» '
  '36':
  - type: text
    content: 'Et l''un d''eux courut remplir une éponge de vinaigre; il la fixa à un roseau et lui donna à boire en disant: «Laissez donc, voyons si Elie viendra le descendre de là.»'
  '37':
  - type: text
    content: 'Cependant, Jésus poussa un grand cri et expira. '
  '38':
  - type: text
    content: Le voile du temple
  - type: note
    content: 'Voile du temple: celui qui séparait le lieu saint du lieu très saint, accessible au grand-prêtre seulement, et ce une fois par an.'
  - type: text
    content: ' se déchira en deux, depuis le haut jusqu''en bas. '
  '39':
  - type: text
    content: 'Quand l''officier romain qui se tenait en face de Jésus [entendit son cri et] le vit expirer de cette manière, il dit: «Cet homme était vraiment le Fils de Dieu.»'
  '4':
  - type: text
    content: 'Pilate l''interrogea de nouveau: «Ne réponds-tu rien? Vois tous les témoignages qu''ils portent contre toi.» '
  '40':
  - type: text
    content: 'Il y avait aussi des femmes qui regardaient de loin. Parmi elles étaient Marie de Magdala, Marie, mère de Jacques le jeune et de Joses, ainsi que Salomé, '
  '41':
  - type: text
    content: qui le suivaient et le servaient lorsqu'il était en Galilée, et beaucoup d'autres femmes qui étaient aussi montées avec lui à Jérusalem.
  - type: heading
    content: Mise au tombeau du corps de Jésus
  '42':
  - type: text
    content: 'Le soir venu, comme c''était le jour de la préparation, c''est-à-dire la veille du sabbat, '
  '43':
  - type: text
    content: 'Joseph d''Arimathée arriva. C''était un membre éminent du conseil, qui attendait lui aussi le royaume de Dieu. Il osa se rendre vers Pilate pour demander le corps de Jésus. '
  '44':
  - type: text
    content: 'Pilate s''étonna qu''il soit déjà mort; il fit venir l''officier et lui demanda si Jésus était mort depuis longtemps. '
  '45':
  - type: text
    content: 'Une fois renseigné par l''officier, il fit remettre le corps à Joseph. '
  '46':
  - type: text
    content: 'Joseph acheta un drap de lin, descendit Jésus de la croix, l''enveloppa dans le drap de lin et le déposa dans un tombeau taillé dans la roche. Puis il roula une pierre à l''entrée du tombeau. '
  '47':
  - type: text
    content: Marie de Magdala et Marie la mère de Joses regardaient où l'on déposait Jésus.
  '5':
  - type: text
    content: Mais Jésus ne répondit plus rien, ce qui étonna Pilate.
  '6':
  - type: text
    content: 'A chaque fête, il relâchait un prisonnier, celui que le peuple réclamait. '
  '7':
  - type: text
    content: 'Il y avait en prison le dénommé Barabbas avec ses complices, pour un meurtre qu''ils avaient commis lors d''une émeute. '
  '8':
  - type: text
    content: 'La foule se mit à demander à grands cris ce qu''il avait l''habitude de leur accorder. '
  '9':
  - type: text
    content: 'Pilate leur répondit: «Voulez-vous que je vous relâche le roi des Juifs?» '
