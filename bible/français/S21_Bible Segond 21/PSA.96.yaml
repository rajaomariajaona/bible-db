document_id: PSA.96,152
type_code: fra
verses:
  '1':
  - type: heading
    content: Hymne à la grandeur et à la gloire de Dieu
  - type: text
    content: Chantez en l'honneur de l'Eternel un cantique nouveau,
  - type: text
    content: chantez en l'honneur de l'Eternel, habitants de toute la terre!
  '10':
  - type: text
    content: 'Dites parmi les nations: «L''Eternel règne.'
  - type: text
    content: Aussi, le monde est ferme, il n'est pas ébranlé.
  - type: text
    content: L'Eternel juge les peuples avec droiture.»
  '11':
  - type: text
    content: Que le ciel se réjouisse, que la terre soit dans l'allégresse,
  - type: text
    content: que la mer retentisse avec tout ce qu'elle contient,
  '12':
  - type: text
    content: que la campagne et tout ce qui s'y trouve soient en fête,
  - type: text
    content: que tous les arbres des forêts poussent des cris de joie
  '13':
  - type: text
    content: devant l'Eternel, car il vient.
  - type: text
    content: Oui, il vient pour juger la terre.
  - type: text
    content: Il jugera le monde avec justice,
  - type: text
    content: et les peuples suivant sa fidélité.
  '2':
  - type: text
    content: Chantez en l'honneur de l'Eternel, bénissez son nom,
  - type: text
    content: annoncez de jour en jour son salut!
  '3':
  - type: text
    content: Racontez sa gloire parmi les nations,
  - type: text
    content: ses merveilles parmi tous les peuples!
  '4':
  - type: text
    content: Oui, l'Eternel est grand et digne de recevoir toute louange;
  - type: text
    content: il est redoutable, plus que tous les dieux.
  '5':
  - type: text
    content: En effet, tous les dieux des peuples ne sont que des faux dieux,
  - type: text
    content: alors que l'Eternel a fait le ciel.
  '6':
  - type: text
    content: La splendeur et la magnificence sont devant lui,
  - type: text
    content: la force et la gloire remplissent son sanctuaire.
  '7':
  - type: text
    content: Familles des peuples, rendez à l'Eternel,
  - type: text
    content: rendez à l'Eternel gloire et honneur!
  '8':
  - type: text
    content: Rendez à l'Eternel la gloire due à son nom,
  - type: text
    content: apportez-lui des offrandes et entrez dans ses parvis!
  '9':
  - type: text
    content: Prosternez-vous devant l'Eternel avec des ornements sacrés,
  - type: text
    content: tremblez devant lui, habitants de toute la terre!
