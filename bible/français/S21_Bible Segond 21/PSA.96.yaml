document_id: PSA.96
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Hymne à la grandeur et à la gloire de Dieu
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Chantez en l'honneur de l'Eternel un cantique nouveau,
- type: usfm
  marker: q1
  children:
  - type: text
    text: chantez en l'honneur de l'Eternel, habitants de toute la terre!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Chantez en l'honneur de l'Eternel, bénissez son nom,
- type: usfm
  marker: q1
  children:
  - type: text
    text: annoncez de jour en jour son salut!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Racontez sa gloire parmi les nations,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ses merveilles parmi tous les peuples!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Oui, l'Eternel est grand et digne de recevoir toute louange;
- type: usfm
  marker: q1
  children:
  - type: text
    text: il est redoutable, plus que tous les dieux.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: En effet, tous les dieux des peuples ne sont que des faux dieux,
- type: usfm
  marker: q1
  children:
  - type: text
    text: alors que l'Eternel a fait le ciel.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: La splendeur et la magnificence sont devant lui,
- type: usfm
  marker: q1
  children:
  - type: text
    text: la force et la gloire remplissent son sanctuaire.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Familles des peuples, rendez à l'Eternel,
- type: usfm
  marker: q1
  children:
  - type: text
    text: rendez à l'Eternel gloire et honneur!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Rendez à l'Eternel la gloire due à son nom,
- type: usfm
  marker: q1
  children:
  - type: text
    text: apportez-lui des offrandes et entrez dans ses parvis!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Prosternez-vous devant l'Eternel avec des ornements sacrés,
- type: usfm
  marker: q1
  children:
  - type: text
    text: tremblez devant lui, habitants de toute la terre!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Dites parmi les nations: «L''Eternel règne.'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Aussi, le monde est ferme, il n'est pas ébranlé.
- type: usfm
  marker: q1
  children:
  - type: text
    text: L'Eternel juge les peuples avec droiture.»
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Que le ciel se réjouisse, que la terre soit dans l'allégresse,
- type: usfm
  marker: q1
  children:
  - type: text
    text: que la mer retentisse avec tout ce qu'elle contient,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: que la campagne et tout ce qui s'y trouve soient en fête,
- type: usfm
  marker: q1
  children:
  - type: text
    text: que tous les arbres des forêts poussent des cris de joie
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: devant l'Eternel, car il vient.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Oui, il vient pour juger la terre.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Il jugera le monde avec justice,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et les peuples suivant sa fidélité.
