document_id: EZK.7,152
type_code: fra
verses:
  '1':
  - type: heading
    content: Imminence de la punition
  - type: text
    content: 'La parole de l''Eternel m''a été adressée: '
  '10':
  - type: text
    content: »Voici le jour! Le voici qui vient!
  - type: text
    content: Ton tour arrive!
  - type: text
    content: Le bâton a fleuri!
  - type: text
    content: L'arrogance s'est épanouie!
  '11':
  - type: text
    content: 'La violence a grandi pour servir de bâton à la méchanceté:'
  - type: text
    content: il ne reste plus rien d'eux, de leur foule bruyante et de leur abondance.
  - type: text
    content: On ne trouve plus rien de valeur chez eux.
  '12':
  - type: text
    content: »Le moment vient, le jour approche.
  - type: text
    content: Que l'acheteur ne se réjouisse pas,
  - type: text
    content: que le vendeur ne se lamente pas,
  - type: text
    content: car ma colère ardente éclate contre toute leur foule bruyante.
  '13':
  - type: text
    content: En effet, le vendeur ne récupérera pas ce qu'il a vendu,
  - type: text
    content: même s'il reste encore en vie,
  - type: text
    content: car la vision concernant toute cette foule bruyante ne sera pas révoquée.
  - type: text
    content: Chacun mène une vie marquée par les fautes; ils ne retrouveront pas des forces.
  '14':
  - type: text
    content: On sonne de la trompette, tout est prêt,
  - type: text
    content: mais personne n'ira au combat,
  - type: text
    content: car ma colère ardente éclate contre toute leur foule bruyante.
  '15':
  - type: text
    content: »L'épée est à l'extérieur, la peste et la famine à l'intérieur!
  - type: text
    content: Celui qui est aux champs mourra par l'épée
  - type: text
    content: et celui qui est dans la ville sera dévoré par la famine et par la peste.
  '16':
  - type: text
    content: Leurs rescapés s'échapperont
  - type: text
    content: 'et se retrouveront, sur les montagnes, pareils aux colombes des vallées:'
  - type: text
    content: ils seront tous en train de gémir,
  - type: text
    content: chacun sur sa faute.
  '17':
  - type: text
    content: Tous baisseront les bras,
  - type: text
    content: tous auront les genoux qui flanchent.
  '18':
  - type: text
    content: Ils se couvriront de sacs
  - type: text
    content: et un tremblement s'emparera d'eux.
  - type: text
    content: La honte se lira sur tous les visages,
  - type: text
    content: et toutes les têtes seront rasées.
  '19':
  - type: text
    content: »Ils jetteront leur argent dans les rues
  - type: text
    content: et leur or sera un objet d'horreur.
  - type: text
    content: Leur argent et leur or seront incapables de les délivrer,
  - type: text
    content: le jour de la fureur de l'Eternel;
  - type: text
    content: ils ne pourront plus les rassasier
  - type: text
    content: ni remplir leurs intestins,
  - type: text
    content: car c'est ce qui les pousse à la faute.
  '2':
  - type: text
    content: '«Sois attentif, fils de l''homme! Voici ce que dit le Seigneur, l''Eternel, au sujet du territoire d''Israël:'
  - type: text
    content: C'est la fin!
  - type: text
    content: La fin vient sur les quatre extrémités du pays!
  '20':
  - type: text
    content: Ils ont fait de la beauté de leurs bijoux un sujet de fierté
  - type: text
    content: et ils les ont utilisés pour fabriquer leurs abominables statues, leurs monstruosités.
  - type: text
    content: Voilà pourquoi j'en fais pour eux un objet d'horreur.
  '21':
  - type: text
    content: Je les donnerai en pillage à des étrangers,
  - type: text
    content: et comme butin aux méchants de la terre,
  - type: text
    content: afin qu'ils les profanent.
  '22':
  - type: text
    content: Je me détournerai d'eux
  - type: text
    content: et l'on profanera mon lieu secret.
  - type: text
    content: Des hommes violents y pénétreront et le profaneront.
  '23':
  - type: text
    content: »Prépare les chaînes,
  - type: text
    content: car le pays est rempli de meurtres,
  - type: text
    content: et la ville de violence.
  '24':
  - type: text
    content: Je ferai venir les plus méchantes des nations
  - type: text
    content: et elles prendront possession de leurs maisons.
  - type: text
    content: Je mettrai fin à l'orgueil des puissants
  - type: text
    content: et leurs sanctuaires seront profanés.
  '25':
  - type: text
    content: »L'angoisse vient. Ils chercheront la paix, mais ils ne la trouveront pas.
  '26':
  - type: text
    content: Il arrivera malheur sur malheur,
  - type: text
    content: une rumeur succédera à une autre rumeur.
  - type: text
    content: Ils réclameront sans succès une vision aux prophètes,
  - type: text
    content: les prêtres ne connaîtront plus la loi,
  - type: text
    content: les anciens n'auront plus de conseils à donner.
  '27':
  - type: text
    content: Le roi prendra le deuil, le prince aura la consternation pour habit,
  - type: text
    content: les mains de la population du pays seront tremblantes.
  - type: text
    content: Je les traiterai en fonction de leur conduite,
  - type: text
    content: je les jugerai d'après leurs jugements,
  - type: text
    content: et ils reconnaîtront que je suis l'Eternel.»
  '3':
  - type: text
    content: Maintenant la fin vient sur toi.
  - type: text
    content: J'enverrai ma colère contre toi,
  - type: text
    content: je te jugerai conformément à ta conduite,
  - type: text
    content: je ferai retomber toutes tes pratiques abominables sur toi.
  '4':
  - type: text
    content: Mon regard sera sans pitié pour toi
  - type: text
    content: et je n'aurai aucune compassion.
  - type: text
    content: Au contraire, je ferai retomber ta conduite sur toi
  - type: text
    content: et tes pratiques abominables se manifesteront au milieu de toi.
  - type: text
    content: Vous reconnaîtrez alors que je suis l'Eternel.
  '5':
  - type: text
    content: '»Voici ce que dit le Seigneur, l''Eternel:'
  - type: text
    content: C'est un malheur, un malheur unique! Le voici qui vient!
  '6':
  - type: text
    content: La fin vient, la fin vient, elle se réveille contre toi!
  - type: text
    content: La voici qui vient!
  '7':
  - type: text
    content: Ton tour arrive, habitant du pays!
  - type: text
    content: Le moment vient, le jour approche!
  - type: text
    content: C'est la panique, il n'y a plus de cris de joie dans les montagnes!
  '8':
  - type: text
    content: »Maintenant, très bientôt, je vais déverser ma fureur sur toi,
  - type: text
    content: je vais aller jusqu'au bout de ma colère contre toi.
  - type: text
    content: Je te jugerai conformément à ta conduite,
  - type: text
    content: je ferai retomber toutes tes pratiques abominables sur toi.
  '9':
  - type: text
    content: Mon regard sera sans pitié
  - type: text
    content: et je n'aurai aucune compassion.
  - type: text
    content: Je ferai retomber ta conduite sur toi,
  - type: text
    content: et tes pratiques abominables se manifesteront au milieu de toi.
  - type: text
    content: Vous reconnaîtrez alors que je suis l'Eternel, celui qui frappe.
