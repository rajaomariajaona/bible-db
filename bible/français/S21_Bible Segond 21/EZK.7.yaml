document_id: EZK.7
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Imminence de la punition
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'La parole de l''Eternel m''a été adressée: '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: '«Sois attentif, fils de l''homme! Voici ce que dit le Seigneur, l''Eternel, au sujet du territoire d''Israël:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: C'est la fin!
- type: usfm
  marker: q1
  children:
  - type: text
    text: La fin vient sur les quatre extrémités du pays!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Maintenant la fin vient sur toi.
- type: usfm
  marker: q1
  children:
  - type: text
    text: J'enverrai ma colère contre toi,
- type: usfm
  marker: q1
  children:
  - type: text
    text: je te jugerai conformément à ta conduite,
- type: usfm
  marker: q1
  children:
  - type: text
    text: je ferai retomber toutes tes pratiques abominables sur toi.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Mon regard sera sans pitié pour toi
- type: usfm
  marker: q1
  children:
  - type: text
    text: et je n'aurai aucune compassion.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Au contraire, je ferai retomber ta conduite sur toi
- type: usfm
  marker: q1
  children:
  - type: text
    text: et tes pratiques abominables se manifesteront au milieu de toi.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Vous reconnaîtrez alors que je suis l'Eternel.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: '»Voici ce que dit le Seigneur, l''Eternel:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: C'est un malheur, un malheur unique! Le voici qui vient!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: La fin vient, la fin vient, elle se réveille contre toi!
- type: usfm
  marker: q1
  children:
  - type: text
    text: La voici qui vient!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Ton tour arrive, habitant du pays!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Le moment vient, le jour approche!
- type: usfm
  marker: q1
  children:
  - type: text
    text: C'est la panique, il n'y a plus de cris de joie dans les montagnes!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: »Maintenant, très bientôt, je vais déverser ma fureur sur toi,
- type: usfm
  marker: q1
  children:
  - type: text
    text: je vais aller jusqu'au bout de ma colère contre toi.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Je te jugerai conformément à ta conduite,
- type: usfm
  marker: q1
  children:
  - type: text
    text: je ferai retomber toutes tes pratiques abominables sur toi.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Mon regard sera sans pitié
- type: usfm
  marker: q1
  children:
  - type: text
    text: et je n'aurai aucune compassion.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Je ferai retomber ta conduite sur toi,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et tes pratiques abominables se manifesteront au milieu de toi.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Vous reconnaîtrez alors que je suis l'Eternel, celui qui frappe.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: »Voici le jour! Le voici qui vient!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ton tour arrive!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Le bâton a fleuri!
- type: usfm
  marker: q1
  children:
  - type: text
    text: L'arrogance s'est épanouie!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'La violence a grandi pour servir de bâton à la méchanceté:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: il ne reste plus rien d'eux, de leur foule bruyante et de leur abondance.
- type: usfm
  marker: q1
  children:
  - type: text
    text: On ne trouve plus rien de valeur chez eux.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: »Le moment vient, le jour approche.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Que l'acheteur ne se réjouisse pas,
- type: usfm
  marker: q1
  children:
  - type: text
    text: que le vendeur ne se lamente pas,
- type: usfm
  marker: q1
  children:
  - type: text
    text: car ma colère ardente éclate contre toute leur foule bruyante.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: En effet, le vendeur ne récupérera pas ce qu'il a vendu,
- type: usfm
  marker: q1
  children:
  - type: text
    text: même s'il reste encore en vie,
- type: usfm
  marker: q1
  children:
  - type: text
    text: car la vision concernant toute cette foule bruyante ne sera pas révoquée.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Chacun mène une vie marquée par les fautes; ils ne retrouveront pas des forces.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: On sonne de la trompette, tout est prêt,
- type: usfm
  marker: q1
  children:
  - type: text
    text: mais personne n'ira au combat,
- type: usfm
  marker: q1
  children:
  - type: text
    text: car ma colère ardente éclate contre toute leur foule bruyante.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: »L'épée est à l'extérieur, la peste et la famine à l'intérieur!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Celui qui est aux champs mourra par l'épée
- type: usfm
  marker: q1
  children:
  - type: text
    text: et celui qui est dans la ville sera dévoré par la famine et par la peste.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Leurs rescapés s'échapperont
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'et se retrouveront, sur les montagnes, pareils aux colombes des vallées:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: ils seront tous en train de gémir,
- type: usfm
  marker: q1
  children:
  - type: text
    text: chacun sur sa faute.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Tous baisseront les bras,
- type: usfm
  marker: q1
  children:
  - type: text
    text: tous auront les genoux qui flanchent.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Ils se couvriront de sacs
- type: usfm
  marker: q1
  children:
  - type: text
    text: et un tremblement s'emparera d'eux.
- type: usfm
  marker: q1
  children:
  - type: text
    text: La honte se lira sur tous les visages,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et toutes les têtes seront rasées.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: »Ils jetteront leur argent dans les rues
- type: usfm
  marker: q1
  children:
  - type: text
    text: et leur or sera un objet d'horreur.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Leur argent et leur or seront incapables de les délivrer,
- type: usfm
  marker: q1
  children:
  - type: text
    text: le jour de la fureur de l'Eternel;
- type: usfm
  marker: q1
  children:
  - type: text
    text: ils ne pourront plus les rassasier
- type: usfm
  marker: q1
  children:
  - type: text
    text: ni remplir leurs intestins,
- type: usfm
  marker: q1
  children:
  - type: text
    text: car c'est ce qui les pousse à la faute.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Ils ont fait de la beauté de leurs bijoux un sujet de fierté
- type: usfm
  marker: q1
  children:
  - type: text
    text: et ils les ont utilisés pour fabriquer leurs abominables statues, leurs monstruosités.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Voilà pourquoi j'en fais pour eux un objet d'horreur.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Je les donnerai en pillage à des étrangers,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et comme butin aux méchants de la terre,
- type: usfm
  marker: q1
  children:
  - type: text
    text: afin qu'ils les profanent.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: Je me détournerai d'eux
- type: usfm
  marker: q1
  children:
  - type: text
    text: et l'on profanera mon lieu secret.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Des hommes violents y pénétreront et le profaneront.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: »Prépare les chaînes,
- type: usfm
  marker: q1
  children:
  - type: text
    text: car le pays est rempli de meurtres,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et la ville de violence.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: Je ferai venir les plus méchantes des nations
- type: usfm
  marker: q1
  children:
  - type: text
    text: et elles prendront possession de leurs maisons.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Je mettrai fin à l'orgueil des puissants
- type: usfm
  marker: q1
  children:
  - type: text
    text: et leurs sanctuaires seront profanés.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: »L'angoisse vient. Ils chercheront la paix, mais ils ne la trouveront pas.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: Il arrivera malheur sur malheur,
- type: usfm
  marker: q1
  children:
  - type: text
    text: une rumeur succédera à une autre rumeur.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ils réclameront sans succès une vision aux prophètes,
- type: usfm
  marker: q1
  children:
  - type: text
    text: les prêtres ne connaîtront plus la loi,
- type: usfm
  marker: q1
  children:
  - type: text
    text: les anciens n'auront plus de conseils à donner.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: Le roi prendra le deuil, le prince aura la consternation pour habit,
- type: usfm
  marker: q1
  children:
  - type: text
    text: les mains de la population du pays seront tremblantes.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Je les traiterai en fonction de leur conduite,
- type: usfm
  marker: q1
  children:
  - type: text
    text: je les jugerai d'après leurs jugements,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et ils reconnaîtront que je suis l'Eternel.»
