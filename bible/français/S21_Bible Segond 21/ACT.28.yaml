document_id: ACT.28,152
type_code: fra
verses:
  '1':
  - type: heading
    content: Sur l'île de Malte
  - type: text
    content: 'Une fois hors de danger, nous avons appris que l''île s''appelait Malte. '
  '10':
  - type: text
    content: Ils nous ont rendu de grands honneurs et, à notre départ, nous ont fourni ce dont nous avions besoin.
  - type: heading
    content: L'Evangile à Rome
  '11':
  - type: text
    content: 'Après un séjour de 3 mois, nous avons embarqué sur un bateau d''Alexandrie qui avait passé l''hiver dans l''île et qui portait pour enseigne les Dioscures. '
  '12':
  - type: text
    content: 'Nous avons abordé à Syracuse où nous sommes restés 3 jours. '
  '13':
  - type: text
    content: 'De là, en suivant la côte, nous avons atteint Reggio. Le lendemain, le vent du sud s''est levé et en 2 jours nous avons fait le trajet jusqu''à Pouzzoles. '
  '14':
  - type: text
    content: 'Là, nous avons trouvé des frères qui nous ont invités à passer 7 jours avec eux. Et c''est ainsi que nous sommes allés jusqu''à Rome. '
  '15':
  - type: text
    content: Les frères de Rome, qui avaient reçu de nos nouvelles, sont venus à notre rencontre jusqu'au Forum d'Appius et aux Trois-Tavernes. En les voyant, Paul a remercié Dieu et pris courage.
  '16':
  - type: text
    content: A notre arrivée à Rome, [l'officier a remis les prisonniers au chef de la garde, mais] on a permis à Paul d'habiter dans un logement particulier avec le soldat qui le gardait.
  '17':
  - type: text
    content: 'Au bout de 3 jours, Paul a convoqué les chefs des Juifs. Quand ils ont été réunis, il leur a adressé ces paroles: «Mes frères, bien que n''ayant rien fait contre notre peuple ni contre les coutumes de nos ancêtres, j''ai été mis en prison à Jérusalem et livré entre les mains des Romains. '
  '18':
  - type: text
    content: 'Après m''avoir interrogé, ils voulaient me relâcher, parce qu''il n''y avait chez moi rien qui mérite la mort, '
  '19':
  - type: text
    content: 'mais les Juifs s''y sont opposés et j''ai été forcé d''en appeler à l''empereur, sans aucune intention d''accuser ma nation. '
  '2':
  - type: text
    content: 'Ses habitants nous ont témoigné une bienveillance peu courante; ils nous ont tous accueillis près d''un grand feu qu''ils avaient allumé, car la pluie tombait et il faisait très froid. '
  '20':
  - type: text
    content: Voilà pourquoi j'ai demandé à vous voir et à vous parler. En effet, c'est à cause de l'espérance d'Israël que je porte cette chaîne.»
  '21':
  - type: text
    content: 'Ils lui ont répondu: «Nous n''avons reçu de Judée aucune lettre à ton sujet et aucun frère n''est venu rapporter ou dire du mal de toi. '
  '22':
  - type: text
    content: Cependant, nous voudrions t'entendre dire toi-même ce que tu penses, car nous savons que cette secte rencontre de l'opposition partout.»
  '23':
  - type: text
    content: 'Ils lui ont fixé un jour et sont venus en plus grand nombre le trouver dans son logement. Paul leur a fait un exposé: il a rendu témoignage du royaume de Dieu et a cherché, à partir de la loi de Moïse et des prophètes, à les persuader de ce qui concerne Jésus. L''entretien a duré depuis le matin jusqu''au soir. '
  '24':
  - type: text
    content: 'Les uns ont été convaincus par ce qu''il disait, les autres n''ont pas cru. '
  '25':
  - type: text
    content: 'Comme ils se retiraient en désaccord, Paul n''a ajouté que ces mots: «C''est avec raison que le Saint-Esprit a dit à nos ancêtres par l''intermédiaire du prophète Esaïe: '
  '26':
  - type: text
    content: 'Va vers ce peuple et dis: ‘Vous aurez beau entendre, vous ne comprendrez pas; vous aurez beau regarder, vous ne verrez pas.’'
  - type: text
    content: ' '
  '27':
  - type: text
    content: En effet, le cœur de ce peuple est devenu insensible; ils se sont bouché les oreilles et ils ont fermé les yeux de peur que leurs yeux ne voient, que leurs oreilles n'entendent, que leur cœur ne comprenne, de peur qu'ils ne se convertissent et que je ne les guérisse.
  - type: note
    content: 'Va… guérisse: citation d''Esaïe 6.9-10.'
  - type: text
    content: ' '
  '28':
  - type: text
    content: Sachez donc que le salut de Dieu a été envoyé aux non-Juifs, et eux, ils l'écouteront.»
  '29':
  - type: text
    content: '[Lorsqu''il a dit cela, les Juifs sont partis en discutant vivement entre eux.] '
  '3':
  - type: text
    content: 'Paul avait ramassé un tas de broussailles et il était en train de les mettre sur le feu quand, sous l''effet de la chaleur, une vipère en est sortie et s''est accrochée à sa main. '
  '30':
  - type: text
    content: 'Paul est resté deux années entières dans une maison qu''il avait louée. Il accueillait tous ceux qui venaient le voir. '
  '31':
  - type: text
    content: Il prêchait le royaume de Dieu et enseignait ce qui concerne le Seigneur Jésus-Christ avec une pleine assurance et sans obstacle.
  '4':
  - type: text
    content: 'Lorsque les habitants de l’île ont vu l''animal suspendu à sa main, ils se sont dit les uns aux autres: «Cet homme est certainement un meurtrier, puisque la justice n''a pas voulu le laisser vivre bien qu''il ait été sauvé de la mer.» '
  '5':
  - type: text
    content: 'Mais Paul a secoué l''animal dans le feu et n''a ressenti aucun mal. '
  '6':
  - type: text
    content: Ces gens s'attendaient à le voir enfler ou tomber mort subitement. Après avoir longtemps attendu, voyant qu'il ne lui arrivait aucun mal, ils ont changé d'avis et ont déclaré que c'était un dieu.
  '7':
  - type: text
    content: 'Il y avait dans les environs des terres qui appartenaient à un dénommé Publius, principale personnalité de l''île. Il nous a accueillis et nous a logés de manière très amicale pendant trois jours. '
  '8':
  - type: text
    content: 'Le père de Publius était alors retenu au lit par la fièvre et la dysenterie. Paul s''est rendu vers lui, a prié, posé les mains sur lui et l''a guéri. '
  '9':
  - type: text
    content: 'Là-dessus, les autres malades de l''île sont venus, et ils ont été guéris. '
