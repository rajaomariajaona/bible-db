document_id: MAT.6,152
type_code: fra
verses:
  '1':
  - type: heading
    content: Les pratiques religieuses
  - type: text
    content: '»Gardez-vous bien de faire des dons devant les hommes pour qu''ils vous regardent; sinon, vous n''aurez pas de récompense auprès de votre Père céleste. '
  '10':
  - type: text
    content: 'que ton règne vienne, que ta volonté soit faite sur la terre comme au ciel. '
  '11':
  - type: text
    content: 'Donne-nous aujourd''hui notre pain quotidien; '
  '12':
  - type: text
    content: 'pardonne-nous nos offenses, comme nous aussi nous pardonnons à ceux qui nous ont offensés; '
  '13':
  - type: text
    content: ne nous expose pas à la tentation, mais délivre-nous du mal
  - type: note
    content: 'Du mal: ou du mauvais, c''est-à-dire du diable.'
  - type: text
    content: ', [car c''est à toi qu''appartiennent, dans tous les siècles, le règne, la puissance et la gloire. Amen!]’'
  '14':
  - type: text
    content: '»Si vous pardonnez aux hommes leurs fautes, votre Père céleste vous pardonnera aussi; '
  '15':
  - type: text
    content: mais si vous ne pardonnez pas aux hommes, votre Père ne vous pardonnera pas non plus vos fautes.
  '16':
  - type: text
    content: '»Lorsque vous jeûnez, ne prenez pas un air triste comme les hypocrites. En effet, ils présentent un visage tout défait pour montrer aux hommes qu''ils jeûnent. Je vous le dis en vérité, ils ont leur récompense. '
  '17':
  - type: text
    content: 'Mais toi, quand tu jeûnes, parfume ta tête et lave ton visage '
  '18':
  - type: text
    content: afin de ne pas montrer que tu jeûnes aux hommes, mais à ton Père qui est là dans le lieu secret; et ton Père, qui voit dans le secret, te le rendra.
  - type: heading
    content: Les biens matériels
  '19':
  - type: text
    content: '»Ne vous amassez pas des trésors sur la terre, où les mites et la rouille détruisent et où les voleurs percent les murs pour voler, '
  '2':
  - type: text
    content: 'Donc, lorsque tu fais un don à quelqu''un, ne sonne pas de la trompette devant toi, comme le font les hypocrites dans les synagogues et dans les rues afin de recevoir la gloire qui vient des hommes. Je vous le dis en vérité, ils ont leur récompense. '
  '20':
  - type: text
    content: 'mais amassez-vous des trésors dans le ciel, où les mites et la rouille ne détruisent pas et où les voleurs ne peuvent pas percer les murs ni voler! '
  '21':
  - type: text
    content: En effet, là où est ton trésor, là aussi sera ton cœur.
  '22':
  - type: text
    content: '»L''œil est la lampe du corps. Si ton œil est en bon état, tout ton corps sera éclairé; '
  '23':
  - type: text
    content: mais si ton œil est en mauvais état, tout ton corps sera dans les ténèbres. Si donc la lumière qui est en toi est ténèbres, combien ces ténèbres seront grandes!
  '24':
  - type: text
    content: »Personne ne peut servir deux maîtres, car ou il détestera le premier et aimera le second, ou il s'attachera au premier et méprisera le second. Vous ne pouvez pas servir Dieu et l'argent
  - type: note
    content: 'L''argent: littéralement mamon, transcription d''un mot araméen désignant la richesse, personnifiée comme une divinité.'
  - type: text
    content: .
  '25':
  - type: text
    content: '»C''est pourquoi je vous dis: Ne vous inquiétez pas de ce que vous mangerez [et boirez] pour vivre, ni de ce dont vous habillerez votre corps. La vie n''est-elle pas plus que la nourriture et le corps plus que le vêtement? '
  '26':
  - type: text
    content: 'Regardez les oiseaux du ciel: ils ne sèment pas et ne moissonnent pas, ils n''amassent rien dans des greniers, et votre Père céleste les nourrit. Ne valez-vous pas beaucoup plus qu''eux? '
  '27':
  - type: text
    content: 'Qui de vous, par ses inquiétudes, peut ajouter un instant à la durée de sa vie? '
  '28':
  - type: text
    content: 'Et pourquoi vous inquiéter au sujet du vêtement? Etudiez comment poussent les plus belles fleurs des champs: elles ne travaillent pas et ne tissent pas; '
  '29':
  - type: text
    content: cependant je vous dis que Salomon
  - type: note
    content: 'Salomon: l''un des plus grands rois d''Israël, fils de David.'
  - type: text
    content: ' lui-même, dans toute sa gloire, n''a pas eu d''aussi belles tenues que l''une d''elles. '
  '3':
  - type: text
    content: 'Mais toi, quand tu fais un don, que ta main gauche ne sache pas ce que fait ta droite, '
  '30':
  - type: text
    content: 'Si Dieu habille ainsi l''herbe des champs, qui existe aujourd''hui et qui demain sera jetée au feu, ne le fera-t-il pas bien plus volontiers pour vous, gens de peu de foi? '
  '31':
  - type: text
    content: 'Ne vous inquiétez donc pas et ne dites pas: ‘Que mangerons-nous? Que boirons-nous? Avec quoi nous habillerons-nous?’ '
  '32':
  - type: text
    content: 'En effet, tout cela, ce sont les membres des autres peuples qui le recherchent. Or, votre Père céleste sait que vous en avez besoin. '
  '33':
  - type: text
    content: 'Recherchez d''abord le royaume et la justice de Dieu, et tout cela vous sera donné en plus. '
  '34':
  - type: text
    content: Ne vous inquiétez donc pas du lendemain, car le lendemain prendra soin de lui-même. A chaque jour suffit sa peine.
  '4':
  - type: text
    content: afin que ton don se fasse en secret; et ton Père, qui voit dans le secret, te le rendra [lui-même ouvertement].
  '5':
  - type: text
    content: '»Lorsque tu pries, ne sois pas comme les hypocrites: ils aiment prier debout dans les synagogues et aux coins des rues pour être vus des hommes. Je vous le dis en vérité, ils ont leur récompense. '
  '6':
  - type: text
    content: Mais toi, quand tu pries, entre dans ta chambre, ferme ta porte et prie ton Père qui est là dans le lieu secret; et ton Père, qui voit dans le secret, te le rendra [ouvertement].
  '7':
  - type: text
    content: '»En priant, ne multipliez pas les paroles comme les membres des autres peuples: ils s''imaginent en effet qu''à force de paroles ils seront exaucés. '
  '8':
  - type: text
    content: Ne les imitez pas, car votre Père sait de quoi vous avez besoin avant que vous le lui demandiez.
  '9':
  - type: text
    content: '»Voici donc comment vous devez prier: ‘Notre Père céleste! Que la sainteté de ton nom soit respectée, '
