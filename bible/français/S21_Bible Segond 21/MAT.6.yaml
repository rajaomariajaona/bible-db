document_id: MAT.6
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Les pratiques religieuses
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: '»Gardez-vous bien de faire des dons devant les hommes pour qu''ils vous regardent; sinon, vous n''aurez pas de récompense auprès de votre Père céleste. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Donc, lorsque tu fais un don à quelqu''un, ne sonne pas de la trompette devant toi, comme le font les hypocrites dans les synagogues et dans les rues afin de recevoir la gloire qui vient des hommes. Je vous le dis en vérité, ils ont leur récompense. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Mais toi, quand tu fais un don, que ta main gauche ne sache pas ce que fait ta droite, '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: afin que ton don se fasse en secret; et ton Père, qui voit dans le secret, te le rendra [lui-même ouvertement].
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: '»Lorsque tu pries, ne sois pas comme les hypocrites: ils aiment prier debout dans les synagogues et aux coins des rues pour être vus des hommes. Je vous le dis en vérité, ils ont leur récompense. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Mais toi, quand tu pries, entre dans ta chambre, ferme ta porte et prie ton Père qui est là dans le lieu secret; et ton Père, qui voit dans le secret, te le rendra [ouvertement].
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: '»En priant, ne multipliez pas les paroles comme les membres des autres peuples: ils s''imaginent en effet qu''à force de paroles ils seront exaucés. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Ne les imitez pas, car votre Père sait de quoi vous avez besoin avant que vous le lui demandiez.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: '»Voici donc comment vous devez prier: ‘Notre Père céleste! Que la sainteté de ton nom soit respectée, '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'que ton règne vienne, que ta volonté soit faite sur la terre comme au ciel. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Donne-nous aujourd''hui notre pain quotidien; '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'pardonne-nous nos offenses, comme nous aussi nous pardonnons à ceux qui nous ont offensés; '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: ne nous expose pas à la tentation, mais délivre-nous du mal
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '6.13 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Du mal: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ou du mauvais, c'est-à-dire du diable.
    marker-yv: yv-n
  - type: text
    text: ', [car c''est à toi qu''appartiennent, dans tous les siècles, le règne, la puissance et la gloire. Amen!]’'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: '»Si vous pardonnez aux hommes leurs fautes, votre Père céleste vous pardonnera aussi; '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: mais si vous ne pardonnez pas aux hommes, votre Père ne vous pardonnera pas non plus vos fautes.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: '»Lorsque vous jeûnez, ne prenez pas un air triste comme les hypocrites. En effet, ils présentent un visage tout défait pour montrer aux hommes qu''ils jeûnent. Je vous le dis en vérité, ils ont leur récompense. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Mais toi, quand tu jeûnes, parfume ta tête et lave ton visage '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: afin de ne pas montrer que tu jeûnes aux hommes, mais à ton Père qui est là dans le lieu secret; et ton Père, qui voit dans le secret, te le rendra.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Les biens matériels
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: '»Ne vous amassez pas des trésors sur la terre, où les mites et la rouille détruisent et où les voleurs percent les murs pour voler, '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'mais amassez-vous des trésors dans le ciel, où les mites et la rouille ne détruisent pas et où les voleurs ne peuvent pas percer les murs ni voler! '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: En effet, là où est ton trésor, là aussi sera ton cœur.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: '»L''œil est la lampe du corps. Si ton œil est en bon état, tout ton corps sera éclairé; '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: mais si ton œil est en mauvais état, tout ton corps sera dans les ténèbres. Si donc la lumière qui est en toi est ténèbres, combien ces ténèbres seront grandes!
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: »Personne ne peut servir deux maîtres, car ou il détestera le premier et aimera le second, ou il s'attachera au premier et méprisera le second. Vous ne pouvez pas servir Dieu et l'argent
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '6.24 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'L''argent: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: littéralement mamon, transcription d'un mot araméen désignant la richesse, personnifiée comme une divinité.
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: '»C''est pourquoi je vous dis: Ne vous inquiétez pas de ce que vous mangerez [et boirez] pour vivre, ni de ce dont vous habillerez votre corps. La vie n''est-elle pas plus que la nourriture et le corps plus que le vêtement? '
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Regardez les oiseaux du ciel: ils ne sèment pas et ne moissonnent pas, ils n''amassent rien dans des greniers, et votre Père céleste les nourrit. Ne valez-vous pas beaucoup plus qu''eux? '
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'Qui de vous, par ses inquiétudes, peut ajouter un instant à la durée de sa vie? '
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'Et pourquoi vous inquiéter au sujet du vêtement? Etudiez comment poussent les plus belles fleurs des champs: elles ne travaillent pas et ne tissent pas; '
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: cependant je vous dis que Salomon
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '6.29 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Salomon: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: l'un des plus grands rois d'Israël, fils de David.
    marker-yv: yv-n
  - type: text
    text: ' lui-même, dans toute sa gloire, n''a pas eu d''aussi belles tenues que l''une d''elles. '
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'Si Dieu habille ainsi l''herbe des champs, qui existe aujourd''hui et qui demain sera jetée au feu, ne le fera-t-il pas bien plus volontiers pour vous, gens de peu de foi? '
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'Ne vous inquiétez donc pas et ne dites pas: ‘Que mangerons-nous? Que boirons-nous? Avec quoi nous habillerons-nous?’ '
  - type: usfm
    marker: v
    metadata:
      v: '32'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'En effet, tout cela, ce sont les membres des autres peuples qui le recherchent. Or, votre Père céleste sait que vous en avez besoin. '
  - type: usfm
    marker: v
    metadata:
      v: '33'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: 'Recherchez d''abord le royaume et la justice de Dieu, et tout cela vous sera donné en plus. '
  - type: usfm
    marker: v
    metadata:
      v: '34'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: Ne vous inquiétez donc pas du lendemain, car le lendemain prendra soin de lui-même. A chaque jour suffit sa peine.
