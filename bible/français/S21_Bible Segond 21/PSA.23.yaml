document_id: PSA.23,152
type_code: fra
verses:
  '1':
  - type: heading
    content: Le divin berger
  - type: text
    content: Psaume de David.
  - type: text
    content: 'L''Eternel est mon berger: je ne manquerai de rien.'
  '2':
  - type: text
    content: Il me fait prendre du repos dans des pâturages bien verts,
  - type: text
    content: il me dirige près d'une eau paisible.
  '3':
  - type: text
    content: Il me redonne des forces,
  - type: text
    content: il me conduit dans les sentiers de la justice
  - type: text
    content: à cause de son nom.
  '4':
  - type: text
    content: Même quand je marche dans la sombre vallée de la mort,
  - type: text
    content: je ne redoute aucun mal car tu es avec moi.
  - type: text
    content: 'Ta conduite et ton appui: voilà ce qui me réconforte.'
  '5':
  - type: text
    content: Tu dresses une table devant moi,
  - type: text
    content: en face de mes adversaires;
  - type: text
    content: tu verses de l'huile sur ma tête
  - type: text
    content: et tu fais déborder ma coupe.
  '6':
  - type: text
    content: Oui, le bonheur et la grâce m'accompagneront
  - type: text
    content: tous les jours de ma vie
  - type: text
    content: et je reviendrai dans la maison de l'Eternel
  - type: text
    content: jusqu'à la fin de mes jours.
