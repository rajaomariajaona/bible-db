document_id: PSA.23,152
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Le divin berger
    marker-yv: yv-h
  - type: usfm
    marker: d
    children:
    - type: text
      text: Psaume de David.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'L''Eternel est mon berger: je ne manquerai de rien.'
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Il me fait prendre du repos dans des pâturages bien verts,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: il me dirige près d'une eau paisible.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Il me redonne des forces,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: il me conduit dans les sentiers de la justice
  - type: usfm
    marker: q1
    children:
    - type: text
      text: à cause de son nom.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Même quand je marche dans la sombre vallée de la mort,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: je ne redoute aucun mal car tu es avec moi.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Ta conduite et ton appui: voilà ce qui me réconforte.'
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tu dresses une table devant moi,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: en face de mes adversaires;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: tu verses de l'huile sur ma tête
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et tu fais déborder ma coupe.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Oui, le bonheur et la grâce m'accompagneront
  - type: usfm
    marker: q1
    children:
    - type: text
      text: tous les jours de ma vie
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et je reviendrai dans la maison de l'Eternel
  - type: usfm
    marker: q1
    children:
    - type: text
      text: jusqu'à la fin de mes jours.
