document_id: PSA.23
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Le divin berger
  marker-yv: yv-h
- type: usfm
  marker: d
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Psaume de David.
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'L''Eternel est mon berger: je ne manquerai de rien.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Il me fait prendre du repos dans des pâturages bien verts,
- type: usfm
  marker: q1
  children:
  - type: text
    text: il me dirige près d'une eau paisible.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Il me redonne des forces,
- type: usfm
  marker: q1
  children:
  - type: text
    text: il me conduit dans les sentiers de la justice
- type: usfm
  marker: q1
  children:
  - type: text
    text: à cause de son nom.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Même quand je marche dans la sombre vallée de la mort,
- type: usfm
  marker: q1
  children:
  - type: text
    text: je ne redoute aucun mal car tu es avec moi.
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Ta conduite et ton appui: voilà ce qui me réconforte.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Tu dresses une table devant moi,
- type: usfm
  marker: q1
  children:
  - type: text
    text: en face de mes adversaires;
- type: usfm
  marker: q1
  children:
  - type: text
    text: tu verses de l'huile sur ma tête
- type: usfm
  marker: q1
  children:
  - type: text
    text: et tu fais déborder ma coupe.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Oui, le bonheur et la grâce m'accompagneront
- type: usfm
  marker: q1
  children:
  - type: text
    text: tous les jours de ma vie
- type: usfm
  marker: q1
  children:
  - type: text
    text: et je reviendrai dans la maison de l'Eternel
- type: usfm
  marker: q1
  children:
  - type: text
    text: jusqu'à la fin de mes jours.
