document_id: HOS.9,152
type_code: fra
verses:
  '1':
  - type: text
    content: Israël, ne te livre pas à la joie, à l'allégresse, comme les peuples!
  - type: text
    content: En effet, tu t'es prostitué en abandonnant ton Dieu,
  - type: text
    content: tu as aimé un salaire impur dans toutes les aires à blé!
  '10':
  - type: text
    content: J'ai trouvé Israël comme des raisins dans le désert,
  - type: text
    content: j'ai vu vos ancêtres comme les premiers fruits d'un figuier,
  - type: text
    content: mais ils sont allés vers Baal-Peor,
  - type: text
    content: ils se sont consacrés à l'infâme idole
  - type: text
    content: et ils sont devenus aussi détestables que l'objet de leur amour.
  '11':
  - type: text
    content: 'La gloire d''Ephraïm s''envolera comme un oiseau:'
  - type: text
    content: plus de naissance, plus de grossesse, plus de conception.
  '12':
  - type: text
    content: S'ils élèvent des enfants,
  - type: text
    content: je les en priverai avant qu'ils ne soient des hommes,
  - type: text
    content: et malheur à eux, quand je les abandonnerai!
  '13':
  - type: text
    content: Aussi loin que portent mes regards du côté de Tyr,
  - type: text
    content: Ephraïm est planté dans un pâturage;
  - type: text
    content: mais Ephraïm conduira ses enfants vers celui qui les tuera.
  '14':
  - type: text
    content: «Donne-leur, Eternel…
  - type: text
    content: Que leur donneras-tu?
  - type: text
    content: Donne-leur un ventre qui avorte et des seins desséchés!»
  '15':
  - type: text
    content: 'Toute leur méchanceté s''est montrée à Guilgal:'
  - type: text
    content: c'est là que je les ai pris en haine.
  - type: text
    content: A cause de la méchanceté de leurs agissements,
  - type: text
    content: je les chasserai de ma maison.
  - type: text
    content: Je ne continuerai pas à les aimer;
  - type: text
    content: tous leurs chefs sont des rebelles.
  '16':
  - type: text
    content: Ephraïm est frappé, sa racine est devenue sèche;
  - type: text
    content: ils ne porteront plus de fruit
  - type: text
    content: et, s'ils ont des enfants,
  - type: text
    content: je ferai mourir ces objets de leur tendresse.
  '17':
  - type: text
    content: Mon Dieu les rejettera parce qu'ils ne l'ont pas écouté,
  - type: text
    content: et ils seront errants parmi les nations.
  '2':
  - type: text
    content: L'aire de battage et le pressoir ne les nourriront pas,
  - type: text
    content: et le vin nouveau leur fera défaut.
  '3':
  - type: text
    content: 'Ils ne resteront pas dans le pays de l''Eternel:'
  - type: text
    content: Ephraïm retournera en Egypte,
  - type: text
    content: et ils mangeront en Assyrie des aliments impurs.
  '4':
  - type: text
    content: 'Ils ne verseront pas de vin en l''honneur de l''Eternel:'
  - type: text
    content: leurs sacrifices ne lui seront pas agréables.
  - type: text
    content: 'Ce sera comme un repas de deuil pour eux:'
  - type: text
    content: tous ceux qui en mangeront se rendront impurs.
  - type: text
    content: Oui, leur pain ne sera que pour eux,
  - type: text
    content: il n'entrera pas dans la maison de l'Eternel.
  '5':
  - type: text
    content: Que ferez-vous lors des jours solennels,
  - type: text
    content: lors des fêtes de l'Eternel?
  '6':
  - type: text
    content: Les voici qui partent, car le pays est dévasté.
  - type: text
    content: L'Egypte les accueillera,
  - type: text
    content: Memphis leur donnera des tombeaux.
  - type: text
    content: Ce qu'ils ont de précieux, leur argent, sera pris par les orties,
  - type: text
    content: et les ronces pousseront dans leurs tentes.
  '7':
  - type: text
    content: Ils arrivent, les jours de l'intervention,
  - type: text
    content: ils arrivent, les jours de la rétribution,
  - type: text
    content: Israël va le savoir!
  - type: text
    content: 'Le prophète est fou, l''homme inspiré délire:'
  - type: text
    content: c'est à cause de la grandeur de tes fautes et de ta haine.
  '8':
  - type: text
    content: 'Ephraïm est un guetteur contre mon Dieu:'
  - type: text
    content: un prophète est un filet d'oiseleur sur toutes ses voies;
  - type: text
    content: il y a de la haine dans la maison de son Dieu.
  '9':
  - type: text
    content: Ils sont plongés dans la corruption comme à l'époque de Guibea.
  - type: text
    content: L'Eternel se souviendra de leur faute,
  - type: text
    content: il punira leurs péchés.
  - type: heading
    content: Passé et avenir d'Israël
