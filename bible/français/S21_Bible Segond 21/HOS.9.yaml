document_id: HOS.9
type_code: fra
segments:
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Israël, ne te livre pas à la joie, à l'allégresse, comme les peuples!
- type: usfm
  marker: q1
  children:
  - type: text
    text: En effet, tu t'es prostitué en abandonnant ton Dieu,
- type: usfm
  marker: q1
  children:
  - type: text
    text: tu as aimé un salaire impur dans toutes les aires à blé!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: L'aire de battage et le pressoir ne les nourriront pas,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et le vin nouveau leur fera défaut.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Ils ne resteront pas dans le pays de l''Eternel:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ephraïm retournera en Egypte,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et ils mangeront en Assyrie des aliments impurs.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Ils ne verseront pas de vin en l''honneur de l''Eternel:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: leurs sacrifices ne lui seront pas agréables.
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Ce sera comme un repas de deuil pour eux:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: tous ceux qui en mangeront se rendront impurs.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Oui, leur pain ne sera que pour eux,
- type: usfm
  marker: q1
  children:
  - type: text
    text: il n'entrera pas dans la maison de l'Eternel.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Que ferez-vous lors des jours solennels,
- type: usfm
  marker: q1
  children:
  - type: text
    text: lors des fêtes de l'Eternel?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Les voici qui partent, car le pays est dévasté.
- type: usfm
  marker: q1
  children:
  - type: text
    text: L'Egypte les accueillera,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Memphis leur donnera des tombeaux.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ce qu'ils ont de précieux, leur argent, sera pris par les orties,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et les ronces pousseront dans leurs tentes.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Ils arrivent, les jours de l'intervention,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ils arrivent, les jours de la rétribution,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Israël va le savoir!
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Le prophète est fou, l''homme inspiré délire:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: c'est à cause de la grandeur de tes fautes et de ta haine.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Ephraïm est un guetteur contre mon Dieu:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: un prophète est un filet d'oiseleur sur toutes ses voies;
- type: usfm
  marker: q1
  children:
  - type: text
    text: il y a de la haine dans la maison de son Dieu.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Ils sont plongés dans la corruption comme à l'époque de Guibea.
- type: usfm
  marker: q1
  children:
  - type: text
    text: L'Eternel se souviendra de leur faute,
- type: usfm
  marker: q1
  children:
  - type: text
    text: il punira leurs péchés.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Passé et avenir d'Israël
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: J'ai trouvé Israël comme des raisins dans le désert,
- type: usfm
  marker: q1
  children:
  - type: text
    text: j'ai vu vos ancêtres comme les premiers fruits d'un figuier,
- type: usfm
  marker: q1
  children:
  - type: text
    text: mais ils sont allés vers Baal-Peor,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ils se sont consacrés à l'infâme idole
- type: usfm
  marker: q1
  children:
  - type: text
    text: et ils sont devenus aussi détestables que l'objet de leur amour.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'La gloire d''Ephraïm s''envolera comme un oiseau:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: plus de naissance, plus de grossesse, plus de conception.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: S'ils élèvent des enfants,
- type: usfm
  marker: q1
  children:
  - type: text
    text: je les en priverai avant qu'ils ne soient des hommes,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et malheur à eux, quand je les abandonnerai!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Aussi loin que portent mes regards du côté de Tyr,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ephraïm est planté dans un pâturage;
- type: usfm
  marker: q1
  children:
  - type: text
    text: mais Ephraïm conduira ses enfants vers celui qui les tuera.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: «Donne-leur, Eternel…
- type: usfm
  marker: q1
  children:
  - type: text
    text: Que leur donneras-tu?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Donne-leur un ventre qui avorte et des seins desséchés!»
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Toute leur méchanceté s''est montrée à Guilgal:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: c'est là que je les ai pris en haine.
- type: usfm
  marker: q1
  children:
  - type: text
    text: A cause de la méchanceté de leurs agissements,
- type: usfm
  marker: q1
  children:
  - type: text
    text: je les chasserai de ma maison.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Je ne continuerai pas à les aimer;
- type: usfm
  marker: q1
  children:
  - type: text
    text: tous leurs chefs sont des rebelles.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Ephraïm est frappé, sa racine est devenue sèche;
- type: usfm
  marker: q1
  children:
  - type: text
    text: ils ne porteront plus de fruit
- type: usfm
  marker: q1
  children:
  - type: text
    text: et, s'ils ont des enfants,
- type: usfm
  marker: q1
  children:
  - type: text
    text: je ferai mourir ces objets de leur tendresse.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Mon Dieu les rejettera parce qu'ils ne l'ont pas écouté,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et ils seront errants parmi les nations.
