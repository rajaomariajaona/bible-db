document_id: PSA.80,152
type_code: fra
verses:
  '1':
  - type: heading
    content: Plaidoyer pour la restauration d'Israël
  - type: text
    content: Au chef de chœur, sur la mélodie «Les lis du témoignage». Psaume d'Asaph.
  '10':
  - type: text
    content: 'Tu as déblayé le sol devant elle:'
  - type: text
    content: elle a pris racine et rempli la terre.
  '11':
  - type: text
    content: Les montagnes étaient couvertes de son ombre,
  - type: text
    content: et ses rameaux étaient comme des cèdres de Dieu.
  '12':
  - type: text
    content: Elle étendait ses branches jusqu'à la mer,
  - type: text
    content: et ses rejets jusqu'au fleuve.
  '13':
  - type: text
    content: Pourquoi as-tu renversé ses clôtures?
  - type: text
    content: Voilà que tous les passants la dépouillent.
  '14':
  - type: text
    content: Le sanglier de la forêt y sème la dévastation,
  - type: text
    content: et les bêtes des champs s'en nourrissent.
  '15':
  - type: text
    content: Dieu de l'univers, reviens donc,
  - type: text
    content: regarde du haut du ciel et constate la situation, interviens pour cette vigne!
  '16':
  - type: text
    content: Protège ce que ta main droite a planté,
  - type: text
    content: le fils que tu t'es choisi!
  '17':
  - type: text
    content: Ta vigne est brûlée par le feu, elle est saccagée;
  - type: text
    content: ton visage menaçant provoque leur perte.
  '18':
  - type: text
    content: Que ta main soit sur l'homme qui est à ta droite,
  - type: text
    content: sur le fils de l'homme que tu as toi-même fortifié!
  '19':
  - type: text
    content: Alors nous ne nous éloignerons plus de toi.
  - type: text
    content: Fais-nous revivre et nous ferons appel à ton nom!
  '2':
  - type: text
    content: Prête l'oreille, berger d'Israël,
  - type: text
    content: toi qui conduis Joseph comme un troupeau!
  - type: text
    content: Interviens dans ta splendeur,
  - type: text
    content: toi qui sièges entre les chérubins
  - type: note
    content: Des chérubins étaient façonnés sur l'arche de l'alliance.
  - type: text
    content: '!'
  '20':
  - type: text
    content: Eternel, Dieu de l'univers, relève-nous!
  - type: text
    content: Fais briller ton visage, et nous serons sauvés!
  '3':
  - type: text
    content: Devant Ephraïm, Benjamin et Manassé, déploie ta force
  - type: text
    content: et viens à notre secours!
  '4':
  - type: text
    content: O Dieu, relève-nous!
  - type: text
    content: Fais briller ton visage, et nous serons sauvés!
  '5':
  - type: text
    content: Eternel, Dieu de l'univers,
  - type: text
    content: jusqu'à quand t'irriteras-tu contre la prière de ton peuple?
  '6':
  - type: text
    content: Tu les as nourris d'un pain trempé de larmes,
  - type: text
    content: tu leur as fait boire des larmes à pleine mesure.
  '7':
  - type: text
    content: Tu fais de nous une source de conflits pour nos voisins
  - type: text
    content: et nos ennemis se moquent de nous.
  '8':
  - type: text
    content: Dieu de l'univers, relève-nous!
  - type: text
    content: Fais briller ton visage, et nous serons sauvés!
  '9':
  - type: text
    content: 'Tu avais arraché de l''Egypte une vigne:'
  - type: text
    content: tu as chassé des nations et tu l'as plantée.
