document_id: PSA.80
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Plaidoyer pour la restauration d'Israël
  marker-yv: yv-h
- type: usfm
  marker: d
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Au chef de chœur, sur la mélodie «Les lis du témoignage». Psaume d'Asaph.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Prête l'oreille, berger d'Israël,
- type: usfm
  marker: q1
  children:
  - type: text
    text: toi qui conduis Joseph comme un troupeau!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Interviens dans ta splendeur,
- type: usfm
  marker: q1
  children:
  - type: text
    text: toi qui sièges entre les chérubins
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '80.2 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Des chérubins étaient façonnés sur l'arche de l'alliance.
    marker-yv: yv-n
  - type: text
    text: '!'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Devant Ephraïm, Benjamin et Manassé, déploie ta force
- type: usfm
  marker: q1
  children:
  - type: text
    text: et viens à notre secours!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: O Dieu, relève-nous!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Fais briller ton visage, et nous serons sauvés!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Eternel, Dieu de l'univers,
- type: usfm
  marker: q1
  children:
  - type: text
    text: jusqu'à quand t'irriteras-tu contre la prière de ton peuple?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Tu les as nourris d'un pain trempé de larmes,
- type: usfm
  marker: q1
  children:
  - type: text
    text: tu leur as fait boire des larmes à pleine mesure.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Tu fais de nous une source de conflits pour nos voisins
- type: usfm
  marker: q1
  children:
  - type: text
    text: et nos ennemis se moquent de nous.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Dieu de l'univers, relève-nous!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Fais briller ton visage, et nous serons sauvés!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Tu avais arraché de l''Egypte une vigne:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: tu as chassé des nations et tu l'as plantée.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Tu as déblayé le sol devant elle:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: elle a pris racine et rempli la terre.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Les montagnes étaient couvertes de son ombre,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et ses rameaux étaient comme des cèdres de Dieu.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Elle étendait ses branches jusqu'à la mer,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et ses rejets jusqu'au fleuve.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Pourquoi as-tu renversé ses clôtures?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Voilà que tous les passants la dépouillent.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Le sanglier de la forêt y sème la dévastation,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et les bêtes des champs s'en nourrissent.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Dieu de l'univers, reviens donc,
- type: usfm
  marker: q1
  children:
  - type: text
    text: regarde du haut du ciel et constate la situation, interviens pour cette vigne!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Protège ce que ta main droite a planté,
- type: usfm
  marker: q1
  children:
  - type: text
    text: le fils que tu t'es choisi!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Ta vigne est brûlée par le feu, elle est saccagée;
- type: usfm
  marker: q1
  children:
  - type: text
    text: ton visage menaçant provoque leur perte.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Que ta main soit sur l'homme qui est à ta droite,
- type: usfm
  marker: q1
  children:
  - type: text
    text: sur le fils de l'homme que tu as toi-même fortifié!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Alors nous ne nous éloignerons plus de toi.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Fais-nous revivre et nous ferons appel à ton nom!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Eternel, Dieu de l'univers, relève-nous!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Fais briller ton visage, et nous serons sauvés!
