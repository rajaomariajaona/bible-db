document_id: DAN.9,152
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Prière et confession de Daniel
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'La première année de règne de Darius, fils d''Assuérus, de la dynastie des Mèdes, sur le royaume des Babyloniens, '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Nous n''avons pas écouté l''Eternel, notre Dieu, pour suivre ses lois alors qu''il les avait placées devant nous par ses serviteurs les prophètes. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Tout Israël a transgressé ta loi et s''est détourné pour ne pas t''écouter. Alors se sont déversées sur nous les malédictions et les imprécations qui sont écrites dans la loi de Moïse, serviteur de Dieu, parce que nous avons péché contre Dieu. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Il a accompli les paroles qu'il avait prononcées contre nous et contre les magistrats qui nous ont gouvernés. Il a fait venir sur nous un malheur si grand qu'il ne s'est jamais rien produit, sous tout le ciel, de pareil à ce qui s'est produit à Jérusalem.
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '»C''est en conformité avec ce qui est écrit dans la loi de Moïse que tout ce malheur nous a frappés, et nous n''avons pas imploré l''Eternel, notre Dieu, nous ne nous sommes pas détournés de nos fautes, nous n''avons pas prêté attention à ta vérité. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: L'Eternel a veillé sur ce malheur et l'a fait venir sur nous parce que l'Eternel, notre Dieu, est juste dans tout ce qu'il fait, mais nous n'avons pas écouté sa voix.
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '»Et maintenant, Seigneur, notre Dieu, toi qui as fait sortir ton peuple d''Egypte par une main puissante et qui t''es ainsi fait la réputation qui est la tienne aujourd''hui, nous avons péché, nous avons agi avec méchanceté. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Seigneur, en conformité avec tes actes de justice, que ta colère et ta fureur s'écartent de ta ville, Jérusalem, de ta montagne sainte! En effet, à cause de nos péchés et des fautes de nos ancêtres, Jérusalem et ton peuple sont un objet d'insulte pour tous ceux qui nous entourent.
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '»Maintenant donc, notre Dieu, écoute la prière et les supplications de ton serviteur et fais briller ton visage au-dessus de ton sanctuaire dévasté, pour l''amour du Seigneur! '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Mon Dieu, tends l''oreille et écoute! Ouvre les yeux et regarde nos ruines, regarde la ville à laquelle ton nom est associé! En effet, ce n''est pas en nous appuyant sur nos actes de justice que nous te présentons nos supplications, mais en nous appuyant sur ta grande compassion. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Seigneur, écoute! Seigneur, pardonne! Seigneur, sois attentif et agis sans tarder par amour pour toi, mon Dieu! En effet, ton nom est associé à ta ville et à ton peuple.»
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Les 70 semaines
    marker-yv: yv-h
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'la première année de son règne, moi, Daniel, je me suis aperçu dans les livres que le nombre d''années indiqué par l''Eternel au prophète Jérémie pour la durée de la dévastation de Jérusalem était de 70. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Je parlais encore, je priais, je reconnaissais mon péché et celui de mon peuple, d''Israël, et je présentais ma supplication à l''Eternel, mon Dieu, en faveur de la montagne sainte de mon Dieu, '
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'je parlais encore dans ma prière quand l''homme, Gabriel, celui que j''avais vu dans ma précédente vision, s''est approché de moi d''un vol rapide, au moment de l''offrande du soir. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Il m''a enseigné et a parlé avec moi. Il m''a dit:'
  - type: usfm
    marker: p
    children:
    - type: text
      text: '«Daniel, je suis venu maintenant pour ouvrir ta compréhension. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Lorsque tu as commencé à prier, une parole est sortie et je viens pour te l''annoncer, car tu es considéré comme précieux. Sois attentif à la parole et comprends la vision! '
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ce sont 70 semaines qui ont été fixées pour ton peuple et pour ta ville sainte pour faire cesser la révolte et mettre un terme aux péchés, pour expier la faute et amener la justice éternelle, pour marquer d'un sceau la vision et le prophète et pour consacrer par onction le lieu très saint.
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '»Sache-le donc et sois attentif! Depuis le moment où la parole a annoncé que Jérusalem serait restaurée et reconstruite jusqu''au Messie, au conducteur, il y a 7 semaines et 62 semaines. Les places et les fossés seront restaurés et reconstruits, mais ce sera une période de détresse. '
  '26':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Après les 62 semaines, le Messie sera exclu et il n''y aura personne pour lui venir en aide. Le peuple d''un prince qui viendra détruira la ville et le sanctuaire, puis sa fin arrivera comme par une inondation. Il est décidé que les dévastations dureront jusqu''au terme de la guerre. '
  '27':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Il imposera une alliance d'une semaine à beaucoup, et au milieu de la semaine il fera cesser le sacrifice et l'offrande. Le dévastateur commettra les pires monstruosités jusqu'à ce que l'anéantissement et ce qui a été décidé se déversent sur lui.»
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Je me suis tourné vers le Seigneur Dieu en le recherchant avec des prières et des supplications, en jeûnant et en me couvrant d''un sac et de cendre. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'J''ai prié l''Eternel, mon Dieu, et je lui ai fait cette confession:'
  - type: usfm
    marker: p
    children:
    - type: text
      text: '«Seigneur, Dieu grand et redoutable, toi qui gardes ton alliance et qui traites avec bonté ceux qui t''aiment et qui obéissent à tes commandements! '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Nous avons péché, nous avons agi en hommes pervertis, nous avons été méchants et rebelles, nous nous sommes détournés de tes commandements et de tes règles. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Nous n'avons pas écouté tes serviteurs, les prophètes, lorsqu'ils ont parlé en ton nom à nos rois, à nos chefs, à nos ancêtres et à tout le peuple du pays.
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '»Seigneur, tu es juste. Quant à nous, nous ne pouvons que rougir de honte, comme c''est le cas aujourd''hui pour les Judéens, les habitants de Jérusalem et tout Israël, pour ceux qui sont près et ceux qui sont loin, dans tous les pays où tu les as chassés à cause des infidélités dont ils se sont rendus coupables envers toi. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Eternel, nous ne pouvons que rougir de honte, tout comme nos rois, nos chefs et nos ancêtres, parce que nous avons péché contre toi.
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '»Le Seigneur, notre Dieu, est rempli de compassion et de pardon. Pourtant, nous nous sommes révoltés contre lui. '
