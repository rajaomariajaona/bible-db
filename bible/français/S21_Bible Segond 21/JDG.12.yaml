document_id: JDG.12,152
type_code: fra
verses:
  '1':
  - type: usfm
    marker: nb
    children:
    - type: text
      text: 'Les hommes d''Ephraïm se rassemblèrent, partirent pour le nord et dirent à Jephthé: «Pourquoi es-tu allé combattre les Ammonites sans nous avoir appelés à marcher avec toi? Nous voulons incendier ta maison et te brûler avec elle.» '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Puis Ibtsan mourut, et il fut enterré à Bethléhem.
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Après lui, Elon de Zabulon fut juge en Israël. Il fut juge en Israël pendant 10 ans. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Puis Elon de Zabulon mourut, et il fut enterré à Ajalon, dans le pays de Zabulon. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Après lui, Abdon, fils d''Hillel, le Pirathonite, fut juge en Israël. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Il eut 40 fils et 30 petits-fils, qui montaient sur 70 ânons. Il fut juge en Israël pendant 8 ans. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Puis Abdon, fils d'Hillel, le Pirathonite, mourut, et il fut enterré à Pirathon, dans le pays d'Ephraïm, sur la montagne des Amalécites.
  '2':
  - type: usfm
    marker: nb
    children:
    - type: text
      text: 'Jephthé leur répondit: «Nous avons eu de grands sujets de querelle, mon peuple et moi, avec les Ammonites et, quand je vous ai appelés à l''aide, vous ne m''avez pas délivré d''eux. '
  '3':
  - type: usfm
    marker: nb
    children:
    - type: text
      text: Voyant que vous ne veniez pas à mon secours, j'ai risqué ma vie et j'ai marché contre les Ammonites. L'Eternel les a livrés entre mes mains. Pourquoi donc aujourd'hui montez-vous contre moi pour me faire la guerre?»
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Jephthé rassembla tous les hommes de Galaad et livra bataille à Ephraïm. Les Galaadites battirent Ephraïm parce que les Ephraïmites disaient: «Vous n''êtes que des fuyards d''Ephraïm! Galaad fait partie d''Ephraïm et est passé à Manassé!» '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Galaad s''empara des gués du Jourdain du côté d''Ephraïm. Quand l''un des fuyards d''Ephraïm disait: «Laissez-moi passer!» les hommes de Galaad lui demandaient: «Es-tu éphraïmite?» Il répondait: «Non.» '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ils lui disaient alors: «Eh bien, dis ‘Shibboleth’» et il disait «Sibboleth», car il ne pouvait pas bien prononcer. Sur quoi les hommes de Galaad s''emparaient de lui et l''égorgeaient près des gués du Jourdain. Il y eut 42''000 hommes d''Ephraïm qui furent tués à cette occasion-là.'
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Jephthé fut juge en Israël pendant 6 ans. Puis Jephthé le Galaadite mourut, et il fut enterré dans l'une des villes de Galaad.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ibtsan, Elon et Abdon juges en Israël
    marker-yv: yv-h
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Après lui, Ibtsan de Bethléhem fut juge en Israël. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Il eut 30 fils, il maria 30 filles à l''extérieur de sa tribu et il fit venir pour ses fils 30 filles d''autres tribus. Il fut juge en Israël pendant 7 ans. '
