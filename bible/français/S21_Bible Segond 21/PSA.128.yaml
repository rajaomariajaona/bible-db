document_id: PSA.128,152
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Bénédiction du foyer de l'homme fidèle
    marker-yv: yv-h
  - type: usfm
    marker: d
    children:
    - type: text
      text: Chant des montées.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Heureux tout homme qui craint l'Eternel,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: qui marche dans ses voies!
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tu profites alors du travail de tes mains,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: tu es heureux, tu prospères.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ta femme est comme une vigne porteuse de fruits
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dans ton foyer,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: tes fils sont comme des plants d'olivier
  - type: usfm
    marker: q1
    children:
    - type: text
      text: autour de ta table.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: C'est ainsi qu'est béni
  - type: usfm
    marker: q1
    children:
    - type: text
      text: l'homme qui craint l'Eternel.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: L'Eternel te bénira de Sion,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et tu verras le bonheur de Jérusalem
  - type: usfm
    marker: q1
    children:
    - type: text
      text: tous les jours de ta vie,
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: tu verras les fils de tes fils.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Que la paix soit sur Israël!
