document_id: PSA.128
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Bénédiction du foyer de l'homme fidèle
  marker-yv: yv-h
- type: usfm
  marker: d
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Chant des montées.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Heureux tout homme qui craint l'Eternel,
- type: usfm
  marker: q1
  children:
  - type: text
    text: qui marche dans ses voies!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Tu profites alors du travail de tes mains,
- type: usfm
  marker: q1
  children:
  - type: text
    text: tu es heureux, tu prospères.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Ta femme est comme une vigne porteuse de fruits
- type: usfm
  marker: q1
  children:
  - type: text
    text: dans ton foyer,
- type: usfm
  marker: q1
  children:
  - type: text
    text: tes fils sont comme des plants d'olivier
- type: usfm
  marker: q1
  children:
  - type: text
    text: autour de ta table.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: C'est ainsi qu'est béni
- type: usfm
  marker: q1
  children:
  - type: text
    text: l'homme qui craint l'Eternel.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: L'Eternel te bénira de Sion,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et tu verras le bonheur de Jérusalem
- type: usfm
  marker: q1
  children:
  - type: text
    text: tous les jours de ta vie,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: tu verras les fils de tes fils.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Que la paix soit sur Israël!
