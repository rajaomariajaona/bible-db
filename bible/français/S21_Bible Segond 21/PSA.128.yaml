document_id: PSA.128,152
type_code: fra
verses:
  '1':
  - type: heading
    content: Bénédiction du foyer de l'homme fidèle
  - type: text
    content: Chant des montées.
  - type: text
    content: Heureux tout homme qui craint l'Eternel,
  - type: text
    content: qui marche dans ses voies!
  '2':
  - type: text
    content: Tu profites alors du travail de tes mains,
  - type: text
    content: tu es heureux, tu prospères.
  '3':
  - type: text
    content: Ta femme est comme une vigne porteuse de fruits
  - type: text
    content: dans ton foyer,
  - type: text
    content: tes fils sont comme des plants d'olivier
  - type: text
    content: autour de ta table.
  '4':
  - type: text
    content: C'est ainsi qu'est béni
  - type: text
    content: l'homme qui craint l'Eternel.
  '5':
  - type: text
    content: L'Eternel te bénira de Sion,
  - type: text
    content: et tu verras le bonheur de Jérusalem
  - type: text
    content: tous les jours de ta vie,
  '6':
  - type: text
    content: tu verras les fils de tes fils.
  - type: text
    content: Que la paix soit sur Israël!
