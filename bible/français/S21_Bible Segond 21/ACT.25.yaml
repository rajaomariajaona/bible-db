document_id: ACT.25,152
type_code: fra
verses:
  '1':
  - type: heading
    content: Paul devant le gouverneur Festus
  - type: text
    content: 'Trois jours après son arrivée dans la province, Festus monta de Césarée à Jérusalem. '
  '10':
  - type: text
    content: 'Paul dit: «C''est devant le tribunal de l''empereur que je comparais, et c''est là que je dois être jugé. Je n''ai fait aucun tort aux Juifs, comme tu le sais très bien. '
  '11':
  - type: text
    content: 'Si j''ai commis une injustice ou un crime digne de mort, je ne refuse pas de mourir, mais si leurs accusations contre moi sont fausses, personne n''a le droit de me livrer à eux. J''en appelle à l''empereur.» '
  '12':
  - type: text
    content: 'Alors Festus répondit, après délibération avec le conseil: «Tu en as appelé à l''empereur, tu iras devant l''empereur.»'
  '13':
  - type: text
    content: 'Quelques jours plus tard, le roi Agrippa et Bérénice arrivèrent à Césarée pour saluer Festus. '
  '14':
  - type: text
    content: 'Comme ils passaient là plusieurs jours, Festus exposa le cas de Paul au roi et dit: «Il y a ici un homme que Félix a laissé en prison. '
  '15':
  - type: text
    content: 'Lorsque j''étais à Jérusalem, les chefs des prêtres et les anciens des Juifs ont porté plainte contre lui en demandant sa condamnation. '
  '16':
  - type: text
    content: 'Je leur ai répondu que ce n''est pas la coutume des Romains de livrer un homme [à la mort] avant que l''accusé n''ait été confronté avec ses accusateurs et qu''il n''ait eu l''occasion de se défendre contre leurs accusations. '
  '17':
  - type: text
    content: 'Ils sont donc venus ici et, sans plus attendre, j''ai siégé le lendemain au tribunal en donnant l''ordre d''amener cet homme. '
  '18':
  - type: text
    content: 'Les accusateurs se sont alors présentés, mais ils ne l''ont chargé d''aucun des délits que je supposais: '
  '19':
  - type: text
    content: 'ils avaient avec lui des discussions relatives à leur religion particulière et à un certain Jésus qui est mort et que Paul affirmait être vivant. '
  '2':
  - type: text
    content: 'Les chefs des prêtres et les personnalités juives portèrent plainte contre Paul devant lui. Ils lui demandèrent avec insistance '
  '20':
  - type: text
    content: 'Ne sachant quel parti prendre dans ce débat, je lui ai demandé s''il voulait aller à Jérusalem pour y être jugé sur cette affaire, '
  '21':
  - type: text
    content: 'mais Paul a fait appel pour que sa cause soit portée à la connaissance d''Auguste; j''ai donc donné l''ordre de le garder jusqu''à ce que je l''envoie à l''empereur.» '
  '22':
  - type: text
    content: 'Agrippa dit à Festus: «Je voudrais entendre moi-même cet homme.» «Demain tu l''entendras», répondit-il.'
  '23':
  - type: text
    content: 'Le lendemain donc, Agrippa et Bérénice vinrent en grande pompe et entrèrent dans la salle d''audience avec les commandants romains et les hommes importants de la ville. Sur l''ordre de Festus, Paul fut amené. '
  '24':
  - type: text
    content: 'Alors Festus dit: «Roi Agrippa, et vous tous qui êtes présents avec nous, vous voyez cet homme au sujet duquel toute la foule des Juifs s''est adressée à moi, tant à Jérusalem qu''ici, en criant qu''il ne devait plus vivre. '
  '25':
  - type: text
    content: 'Or, pour ma part, j''ai constaté qu''il n''a rien fait qui mérite la mort; mais comme il en a appelé lui-même à Auguste, j''ai décidé de le faire partir. '
  '26':
  - type: text
    content: 'Cependant, je n''ai rien de précis à écrire à l''empereur sur son compte; c''est pourquoi je l''ai fait comparaître devant vous et surtout devant toi, roi Agrippa, afin d''avoir quelque chose à écrire après cet interrogatoire. '
  '27':
  - type: text
    content: En effet, il me semble absurde d'envoyer un prisonnier sans indiquer de quoi on l'accuse.»
  '3':
  - type: text
    content: 'la faveur de le faire venir à Jérusalem. Ils préparaient un guet-apens pour le tuer en chemin. '
  '4':
  - type: text
    content: 'Festus répondit alors que Paul était gardé à Césarée et que lui-même devait bientôt repartir. '
  '5':
  - type: text
    content: «Que ceux parmi vous qui sont compétents descendent avec moi, dit-il, et si cet homme a commis une faute, qu'ils l'accusent.»
  '6':
  - type: text
    content: 'Festus ne passa que huit à dix jours parmi eux, puis il redescendit à Césarée. Le lendemain, il prit place au tribunal et donna l''ordre d''amener Paul. '
  '7':
  - type: text
    content: 'Quand celui-ci fut arrivé, les Juifs venus de Jérusalem l''entourèrent et portèrent contre lui de nombreuses et graves accusations qu''ils n''étaient pas en mesure de prouver. '
  '8':
  - type: text
    content: 'Paul présenta sa défense en disant: «Je n''ai commis aucune faute, ni contre la loi des Juifs, ni contre le temple, ni contre l''empereur.» '
  '9':
  - type: text
    content: 'Dans le désir de plaire aux Juifs, Festus répondit à Paul: «Acceptes-tu de monter à Jérusalem pour y être jugé sur cette affaire en ma présence?» '
