document_id: ACT.25
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Paul devant le gouverneur Festus
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Trois jours après son arrivée dans la province, Festus monta de Césarée à Jérusalem. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Les chefs des prêtres et les personnalités juives portèrent plainte contre Paul devant lui. Ils lui demandèrent avec insistance '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'la faveur de le faire venir à Jérusalem. Ils préparaient un guet-apens pour le tuer en chemin. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Festus répondit alors que Paul était gardé à Césarée et que lui-même devait bientôt repartir. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: «Que ceux parmi vous qui sont compétents descendent avec moi, dit-il, et si cet homme a commis une faute, qu'ils l'accusent.»
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Festus ne passa que huit à dix jours parmi eux, puis il redescendit à Césarée. Le lendemain, il prit place au tribunal et donna l''ordre d''amener Paul. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Quand celui-ci fut arrivé, les Juifs venus de Jérusalem l''entourèrent et portèrent contre lui de nombreuses et graves accusations qu''ils n''étaient pas en mesure de prouver. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Paul présenta sa défense en disant: «Je n''ai commis aucune faute, ni contre la loi des Juifs, ni contre le temple, ni contre l''empereur.» '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Dans le désir de plaire aux Juifs, Festus répondit à Paul: «Acceptes-tu de monter à Jérusalem pour y être jugé sur cette affaire en ma présence?» '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Paul dit: «C''est devant le tribunal de l''empereur que je comparais, et c''est là que je dois être jugé. Je n''ai fait aucun tort aux Juifs, comme tu le sais très bien. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Si j''ai commis une injustice ou un crime digne de mort, je ne refuse pas de mourir, mais si leurs accusations contre moi sont fausses, personne n''a le droit de me livrer à eux. J''en appelle à l''empereur.» '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Alors Festus répondit, après délibération avec le conseil: «Tu en as appelé à l''empereur, tu iras devant l''empereur.»'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Quelques jours plus tard, le roi Agrippa et Bérénice arrivèrent à Césarée pour saluer Festus. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Comme ils passaient là plusieurs jours, Festus exposa le cas de Paul au roi et dit: «Il y a ici un homme que Félix a laissé en prison. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Lorsque j''étais à Jérusalem, les chefs des prêtres et les anciens des Juifs ont porté plainte contre lui en demandant sa condamnation. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Je leur ai répondu que ce n''est pas la coutume des Romains de livrer un homme [à la mort] avant que l''accusé n''ait été confronté avec ses accusateurs et qu''il n''ait eu l''occasion de se défendre contre leurs accusations. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Ils sont donc venus ici et, sans plus attendre, j''ai siégé le lendemain au tribunal en donnant l''ordre d''amener cet homme. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Les accusateurs se sont alors présentés, mais ils ne l''ont chargé d''aucun des délits que je supposais: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'ils avaient avec lui des discussions relatives à leur religion particulière et à un certain Jésus qui est mort et que Paul affirmait être vivant. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Ne sachant quel parti prendre dans ce débat, je lui ai demandé s''il voulait aller à Jérusalem pour y être jugé sur cette affaire, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'mais Paul a fait appel pour que sa cause soit portée à la connaissance d''Auguste; j''ai donc donné l''ordre de le garder jusqu''à ce que je l''envoie à l''empereur.» '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Agrippa dit à Festus: «Je voudrais entendre moi-même cet homme.» «Demain tu l''entendras», répondit-il.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Le lendemain donc, Agrippa et Bérénice vinrent en grande pompe et entrèrent dans la salle d''audience avec les commandants romains et les hommes importants de la ville. Sur l''ordre de Festus, Paul fut amené. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Alors Festus dit: «Roi Agrippa, et vous tous qui êtes présents avec nous, vous voyez cet homme au sujet duquel toute la foule des Juifs s''est adressée à moi, tant à Jérusalem qu''ici, en criant qu''il ne devait plus vivre. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Or, pour ma part, j''ai constaté qu''il n''a rien fait qui mérite la mort; mais comme il en a appelé lui-même à Auguste, j''ai décidé de le faire partir. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Cependant, je n''ai rien de précis à écrire à l''empereur sur son compte; c''est pourquoi je l''ai fait comparaître devant vous et surtout devant toi, roi Agrippa, afin d''avoir quelque chose à écrire après cet interrogatoire. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: En effet, il me semble absurde d'envoyer un prisonnier sans indiquer de quoi on l'accuse.»
