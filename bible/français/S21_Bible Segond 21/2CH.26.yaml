document_id: 2CH.26
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Règne d'Ozias (Azaria)
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Tout le peuple de Juda prit Ozias, âgé de 16 ans, et le proclama roi à la place de son père Amatsia. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: C'est lui qui reconstruisit Elath et la ramena sous l'autorité de Juda, une fois le roi couché avec ses ancêtres.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Ozias avait 16 ans lorsqu'il devint roi et il régna 52 ans à Jérusalem. Sa mère s'appelait Jecolia et elle était de Jérusalem.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Il fit ce qui est droit aux yeux de l''Eternel, entièrement comme l''avait fait son père Amatsia. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Il s'appliqua à rechercher Dieu pendant la vie de Zacharie, qui savait comprendre les visions de Dieu, et tant qu'il rechercha l'Eternel, Dieu lui fit connaître le succès.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Il entra en guerre contre les Philistins et il démolit les murailles de Gath, de Jabné et d''Asdod. Il construisit des villes dans le territoire d''Asdod et chez les Philistins. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Dieu l''aida contre les Philistins, contre les Arabes qui habitaient à Gur-Baal et contre les Maonites. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Les Ammonites payaient un tribut à Ozias et son nom fut connu jusqu''en Egypte, tant il devint puissant. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Ozias construisit des tours à Jérusalem sur la porte de l''angle, sur la porte de la vallée et sur l''angle, et il les fortifia. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Il en construisit aussi dans le désert et il creusa beaucoup de citernes, parce qu''il avait de nombreux troupeaux dans les vallées et dans la plaine, ainsi que des cultivateurs et des vignerons dans les montagnes et au Carmel. En effet, il aimait l''agriculture. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Ozias disposait d''une armée de soldats qui allaient au combat par bandes. Leur dénombrement avait été effectué par Jeïel, le secrétaire, et par le commissaire Maaséja, et ils étaient sous les ordres de Hanania, l''un des chefs du roi. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Le nombre total des chefs de famille pour ces vaillants guerriers était de 2600. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Ils commandaient une armée de 307''500 soldats capables de venir en aide au roi contre l''ennemi. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Ozias leur procura, pour toute l''armée, des boucliers, des lances, des casques, des cuirasses, des arcs et des frondes. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Il fit faire à Jérusalem des machines inventées par un ingénieur et destinées à être placées sur les tours et sur les angles, pour lancer des flèches et de grosses pierres. Sa réputation s'étendit au loin, car il fut merveilleusement aidé jusqu'à ce qu'il soit devenu puissant.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Mais lorsqu''il fut puissant, son cœur fut si hautain qu''il provoqua sa perte. Il fit preuve d''infidélité envers l''Eternel, son Dieu, en pénétrant dans le temple de l''Eternel pour brûler des parfums sur l''autel des parfums. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Le prêtre Azaria le suivit avec 80 prêtres de l''Eternel, des hommes courageux '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'qui s''opposèrent au roi Ozias et lui dirent: «Tu n''as pas le droit, Ozias, d''offrir des parfums à l''Eternel! Ce droit appartient aux prêtres, aux descendants d''Aaron qui ont été consacrés pour les offrir. Sors du sanctuaire, car tu commets un acte d''infidélité et cela ne tournera pas à ton honneur devant l''Eternel Dieu.» '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'L''irritation s''empara d''Ozias, qui tenait déjà un encensoir, et comme il s''irritait contre les prêtres, la lèpre éclata sur son front, sous les yeux des prêtres, dans la maison de l''Eternel, près de l''autel des parfums. '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Le grand-prêtre Azaria et tous les prêtres le regardèrent et virent qu''il avait la lèpre au front. Ils le poussèrent précipitamment dehors et lui-même s''empressa de sortir, parce que l''Eternel l''avait frappé. '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Le roi Ozias fut lépreux jusqu'au jour de sa mort. Il habitait dans une maison isolée en raison de sa lèpre, car il fut exclu de la maison de l'Eternel. C'était Jotham, son fils, qui était responsable du palais royal et jugeait le peuple du pays.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: Le reste des actes d'Ozias, des premiers aux derniers, a été décrit par le prophète Esaïe, fils d'Amots.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Ozias se coucha avec ses ancêtres et on l''enterra à leurs côtés dans le cimetière réservé aux rois, car on disait: «Il est lépreux.» Son fils Jotham devint roi à sa place.'
