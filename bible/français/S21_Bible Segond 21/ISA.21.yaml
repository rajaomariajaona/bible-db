document_id: ISA.21
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Prophétie sur la prise de Babylone
  marker-yv: yv-h
- type: usfm
  marker: d
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Message sur le désert maritime.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Pareil à l'ouragan qui progresse dans le Néguev,
- type: usfm
  marker: q1
  children:
  - type: text
    text: il vient du désert, du pays redoutable.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Une vision terrible m'a été révélée.
- type: usfm
  marker: q1
  children:
  - type: text
    text: «Le traître trahit, le dévastateur dévaste.
- type: usfm
  marker: q1
  children:
  - type: text
    text: A l'attaque, Elam! A l'assaut, Médie!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Je mets fin à tous les gémissements.»
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: C'est pourquoi je suis rempli d'angoisses;
- type: usfm
  marker: q1
  children:
  - type: text
    text: des douleurs s'emparent de moi,
- type: usfm
  marker: q1
  children:
  - type: text
    text: pareilles aux douleurs d'une femme en train d'accoucher.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Les spasmes m'empêchent d'écouter,
- type: usfm
  marker: q1
  children:
  - type: text
    text: le tremblement de voir.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Mon cœur est troublé,
- type: usfm
  marker: q1
  children:
  - type: text
    text: la terreur s'empare de moi.
- type: usfm
  marker: q1
  children:
  - type: text
    text: La nuit qui me faisait tant plaisir est devenue pour moi une source d'anxiété.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: On dresse la table, on dispose des coussins, on mange, on boit…
- type: usfm
  marker: q1
  children:
  - type: text
    text: Debout, princes! Graissez le bouclier!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'En effet, voici ce que m''a dit le Seigneur:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: «Va faire poster un guetteur!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Qu'il annonce ce qu'il verra!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Il verra un char, un attelage à deux chevaux,
- type: usfm
  marker: q1
  children:
  - type: text
    text: des cavaliers montés sur des ânes, d'autres sur des chameaux.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Qu'il soit attentif, très attentif.»
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Le guetteur s''écria, pareil à un lion:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: «Seigneur, je me tiens sur mon poste de guet toute la journée
- type: usfm
  marker: q1
  children:
  - type: text
    text: et je suis debout à ma tour de garde toutes les nuits,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: et voici qu'arrive un char, un homme sur un attelage à deux chevaux!»
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Il prit encore la parole et dit:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: «Elle est tombée, elle est tombée, Babylone,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et toutes les sculptures sacrées de ses dieux sont en pièces par terre!»
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Mon peuple, toi que j'ai battu comme pour extraire du grain dans mon aire,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ce que j'ai appris de l'Eternel, le maître de l'univers, du Dieu d'Israël,
- type: usfm
  marker: q1
  children:
  - type: text
    text: je vous l'ai annoncé.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Prophétie contre Edom et l'Arabie
  marker-yv: yv-h
- type: usfm
  marker: d
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Message sur Douma.
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'On me crie de Séir: «Sentinelle, quelle nouvelle de la nuit?'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Sentinelle, quelle nouvelle de la nuit?»
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'La sentinelle répond:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: «Le matin arrive, mais aussi la nuit.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Si vous voulez poser des questions, posez-les!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Convertissez-vous et venez!»
- type: usfm
  marker: d
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Message sur l'Arabie.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Vous passerez la nuit dans les forêts de l'Arabie,
- type: usfm
  marker: q1
  children:
  - type: text
    text: caravanes de Dedan!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Allez à la rencontre de l'assoiffé, apportez-lui de l'eau!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Habitants du pays de Théma,
- type: usfm
  marker: q1
  children:
  - type: text
    text: allez à la rencontre du fugitif avec du pain!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: C'est qu'ils fuient devant les épées,
- type: usfm
  marker: q1
  children:
  - type: text
    text: devant l'épée dégainée, devant l'arc tendu,
- type: usfm
  marker: q1
  children:
  - type: text
    text: devant la férocité des combats.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'En effet, voici ce que m''a dit le Seigneur:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: «Encore un an, compté aussi précisément que les années d'un travailleur salarié,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et toute la gloire de Kédar aura disparu.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Il ne restera qu'un petit nombre d'archers parmi les guerriers de Kédar.»
- type: usfm
  marker: q1
  children:
  - type: text
    text: C'est l'Eternel, le Dieu d'Israël, qui l'annonce.
