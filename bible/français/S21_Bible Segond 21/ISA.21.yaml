document_id: ISA.21,152
type_code: fra
verses:
  '1':
  - type: heading
    content: Prophétie sur la prise de Babylone
  - type: text
    content: Message sur le désert maritime.
  - type: text
    content: Pareil à l'ouragan qui progresse dans le Néguev,
  - type: text
    content: il vient du désert, du pays redoutable.
  '10':
  - type: text
    content: Mon peuple, toi que j'ai battu comme pour extraire du grain dans mon aire,
  - type: text
    content: ce que j'ai appris de l'Eternel, le maître de l'univers, du Dieu d'Israël,
  - type: text
    content: je vous l'ai annoncé.
  - type: heading
    content: Prophétie contre Edom et l'Arabie
  '11':
  - type: text
    content: Message sur Douma.
  - type: text
    content: 'On me crie de Séir: «Sentinelle, quelle nouvelle de la nuit?'
  - type: text
    content: Sentinelle, quelle nouvelle de la nuit?»
  '12':
  - type: text
    content: 'La sentinelle répond:'
  - type: text
    content: «Le matin arrive, mais aussi la nuit.
  - type: text
    content: Si vous voulez poser des questions, posez-les!
  - type: text
    content: Convertissez-vous et venez!»
  '13':
  - type: text
    content: Message sur l'Arabie.
  - type: text
    content: Vous passerez la nuit dans les forêts de l'Arabie,
  - type: text
    content: caravanes de Dedan!
  '14':
  - type: text
    content: Allez à la rencontre de l'assoiffé, apportez-lui de l'eau!
  - type: text
    content: Habitants du pays de Théma,
  - type: text
    content: allez à la rencontre du fugitif avec du pain!
  '15':
  - type: text
    content: C'est qu'ils fuient devant les épées,
  - type: text
    content: devant l'épée dégainée, devant l'arc tendu,
  - type: text
    content: devant la férocité des combats.
  '16':
  - type: text
    content: 'En effet, voici ce que m''a dit le Seigneur:'
  - type: text
    content: «Encore un an, compté aussi précisément que les années d'un travailleur salarié,
  - type: text
    content: et toute la gloire de Kédar aura disparu.
  '17':
  - type: text
    content: Il ne restera qu'un petit nombre d'archers parmi les guerriers de Kédar.»
  - type: text
    content: C'est l'Eternel, le Dieu d'Israël, qui l'annonce.
  '2':
  - type: text
    content: Une vision terrible m'a été révélée.
  - type: text
    content: «Le traître trahit, le dévastateur dévaste.
  - type: text
    content: A l'attaque, Elam! A l'assaut, Médie!
  - type: text
    content: Je mets fin à tous les gémissements.»
  '3':
  - type: text
    content: C'est pourquoi je suis rempli d'angoisses;
  - type: text
    content: des douleurs s'emparent de moi,
  - type: text
    content: pareilles aux douleurs d'une femme en train d'accoucher.
  - type: text
    content: Les spasmes m'empêchent d'écouter,
  - type: text
    content: le tremblement de voir.
  '4':
  - type: text
    content: Mon cœur est troublé,
  - type: text
    content: la terreur s'empare de moi.
  - type: text
    content: La nuit qui me faisait tant plaisir est devenue pour moi une source d'anxiété.
  '5':
  - type: text
    content: On dresse la table, on dispose des coussins, on mange, on boit…
  - type: text
    content: Debout, princes! Graissez le bouclier!
  '6':
  - type: text
    content: 'En effet, voici ce que m''a dit le Seigneur:'
  - type: text
    content: «Va faire poster un guetteur!
  - type: text
    content: Qu'il annonce ce qu'il verra!
  '7':
  - type: text
    content: Il verra un char, un attelage à deux chevaux,
  - type: text
    content: des cavaliers montés sur des ânes, d'autres sur des chameaux.
  - type: text
    content: Qu'il soit attentif, très attentif.»
  '8':
  - type: text
    content: 'Le guetteur s''écria, pareil à un lion:'
  - type: text
    content: «Seigneur, je me tiens sur mon poste de guet toute la journée
  - type: text
    content: et je suis debout à ma tour de garde toutes les nuits,
  '9':
  - type: text
    content: et voici qu'arrive un char, un homme sur un attelage à deux chevaux!»
  - type: text
    content: 'Il prit encore la parole et dit:'
  - type: text
    content: «Elle est tombée, elle est tombée, Babylone,
  - type: text
    content: et toutes les sculptures sacrées de ses dieux sont en pièces par terre!»
