document_id: 1CO.3,152
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Le rôle de Paul et des serviteurs de Dieu
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Pour ma part, frères et sœurs, je n''ai pas pu vous parler comme à des personnes dirigées par l''Esprit, mais comme à des personnes dirigées par leur nature propre, comme à de petits enfants en Christ. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'Conformément à la grâce que Dieu m''a donnée, j''ai posé le fondement comme un sage architecte, et un autre construit dessus. Cependant, que chacun fasse attention à la manière dont il construit dessus, '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'car personne ne peut poser un autre fondement que celui qui a été posé, à savoir Jésus-Christ. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'Que l''on construise sur ce fondement avec de l''or, de l''argent, des pierres précieuses, du bois, du foin ou de la paille, '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'l''œuvre de chacun sera dévoilée: le jour du jugement la fera connaître, car elle se révélera dans le feu et l''épreuve du feu indiquera ce que vaut l''œuvre de chacun. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'Si l''œuvre que quelqu''un a construite sur le fondement subsiste, il recevra une récompense. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: Si son œuvre brûle, il perdra sa récompense; lui-même sera sauvé, mais comme au travers d'un feu.
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'Ne savez-vous pas que vous êtes le temple de Dieu et que l''Esprit de Dieu habite en vous? '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: Si quelqu'un détruit le temple de Dieu, Dieu le détruira, car le temple de Dieu est saint, et c'est ce que vous êtes.
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'Que personne ne se trompe lui-même: si quelqu''un parmi vous pense être sage selon les critères de l''ère actuelle, qu''il devienne fou afin de devenir sage, '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'car la sagesse de ce monde est une folie devant Dieu. En effet, il est écrit: '
    - type: usfm
      marker: qt
      children:
      - type: text
        text: Il prend les sages à leur propre ruse.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '3.19 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Il prend… ruse: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'citation de '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Job 5.13
      - type: usfm
        marker: ft
        children:
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: ' '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'Je vous ai donné du lait, non de la nourriture solide, car vous ne pouviez pas la supporter. D''ailleurs, même maintenant vous ne le pouvez pas '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: 'Et encore: '
    - type: usfm
      marker: qt
      children:
      - type: text
        text: Le Seigneur connaît les pensées des sages, il sait qu'elles sont sans valeur.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '3.20 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Le Seigneur… valeur: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'citation du '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Psaume 94.11
      - type: usfm
        marker: ft
        children:
        - type: text
          text: .
      marker-yv: yv-n
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: 'Que personne ne mette donc sa fierté dans des hommes, car tout vous appartient, '
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: 'que ce soit Paul, Apollos, Céphas, le monde, la vie, la mort, le présent ou l''avenir. Tout est à vous, '
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: et vous êtes à Christ, et Christ est à Dieu.
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'parce que vous êtes encore animés par votre nature. En effet, puisqu''il y a parmi vous de la jalousie, des disputes [et des divisions], n''êtes-vous pas dirigés par votre nature propre et ne vous conduisez-vous pas d''une manière tout humaine? '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'Quand l''un dit: «Moi, je me rattache à Paul» et un autre: «Moi, à Apollos», n''êtes-vous pas animés par votre nature?'
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'Qui est donc Apollos et qui est Paul? Ce sont des serviteurs par le moyen desquels vous avez cru, conformément à ce que le Seigneur a accordé à chacun. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: J'ai planté, Apollos a arrosé
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '3.6 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Planté… arrosé: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: allusion au fait que Paul était l'un des fondateurs de l'Eglise de Corinthe et qu'Apollos y avait exercé par la suite un ministère d'enseignement (
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Actes 18
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ).
      marker-yv: yv-n
    - type: text
      text: ', mais c''est Dieu qui a fait grandir. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'Ainsi, ce n''est pas celui qui plante ni celui qui arrose qui compte, mais Dieu, qui donne la croissance. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: Celui qui plante et celui qui arrose sont égaux, et chacun recevra sa propre récompense en fonction de son propre travail.
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'En effet, nous sommes ouvriers avec Dieu. Vous êtes le champ de Dieu, la construction de Dieu. '
