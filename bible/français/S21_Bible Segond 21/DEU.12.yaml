document_id: DEU.12,152
type_code: fra
verses:
  '1':
  - type: usfm
    marker: ms1
    children:
    - type: text
      text: Répétition des prescriptions et règles
    marker-yv: yv-h
  - type: usfm
    marker: mr
    children:
    - type: text
      text: 12.1–26.19
    marker-yv: yv-h
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ordre de servir l'Eternel à l'endroit choisi par lui
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: »Voici les prescriptions et les règles que vous respecterez et mettrez en pratique, aussi longtemps que vous y vivrez, dans le pays dont l'Eternel, le Dieu de vos ancêtres, vous donne la possession.
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'Mais vous allez passer le Jourdain et vous habiterez dans le pays dont l''Eternel, votre Dieu, vous accordera la possession. Il vous donnera du repos après vous avoir délivrés de tous vos ennemis qui vous entourent et vous vous établirez en sécurité. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'Alors il y aura un endroit que l''Eternel, votre Dieu, choisira pour y faire résider son nom. C''est là que vous présenterez tout ce que je vous ordonne: vos holocaustes, vos sacrifices, vos dîmes, vos prélèvements et tout ce que vous aurez choisi d''offrir à l''Eternel pour accomplir vos vœux. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'C''est là que vous vous réjouirez devant l''Eternel, votre Dieu, vous, vos fils et vos filles, vos esclaves et vos servantes, ainsi que le Lévite qui habitera dans ta ville. En effet, il n''a ni part ni héritage avec vous. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'Veille bien à ne pas offrir tes holocaustes dans tous les endroits que tu verras. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: Au contraire, c'est à l'endroit que l'Eternel choisira dans le territoire de l'une de tes tribus que tu offriras tes holocaustes et c'est là que tu feras tout ce que je t'ordonne.
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: '»Néanmoins, chaque fois que tu en auras le désir, tu pourras tuer du bétail et manger de la viande dans toutes tes villes, en fonction des bénédictions que t''accordera l''Eternel, ton Dieu. La personne impure et la personne pure pourront en manger, tout comme on mange de la gazelle et du cerf. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'Seulement, vous ne mangerez pas le sang: tu le verseras sur la terre comme de l''eau.'
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: '»Tu ne pourras pas manger dans tes villes la dîme de ton blé, de ton vin nouveau et de ton huile, ni les premiers-nés de ton gros et de ton petit bétail, ni aucune de tes offrandes faites en accomplissement d''un vœu, ni tes offrandes volontaires, ni tes prélèvements. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'C''est devant l''Eternel, ton Dieu, que tu les mangeras, à l''endroit que l''Eternel, ton Dieu, choisira, toi, ton fils et ta fille, ton serviteur et ta servante, ainsi que le Lévite qui habitera dans ta ville, et c''est devant l''Eternel, ton Dieu, que tu feras servir à ta joie tous les biens que tu posséderas. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: Aussi longtemps que tu vivras dans ton pays, fais bien attention de ne pas délaisser le Lévite.
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: '»Vous détruirez tous les endroits où les nations que vous allez chasser servent leurs dieux, sur les hautes montagnes, sur les collines et sous tout arbre vert. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: '»Lorsque l''Eternel, ton Dieu, aura élargi tes frontières, comme il te l''a promis, et que le désir de manger de la viande te fera dire: ‘Je voudrais manger de la viande!’ tu pourras en manger selon ton désir. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: 'Si l''endroit que l''Eternel, ton Dieu, aura choisi pour y placer son nom est loin de toi, tu pourras tuer du gros et du petit bétail, comme je te l''ai prescrit, et tu pourras en manger chez toi selon ton désir. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: 'Tu en mangeras comme on mange de la gazelle et du cerf. La personne impure et la personne pure en mangeront l''une et l''autre. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: 'Seulement, veille bien à ne pas manger le sang, car le sang, c''est la vie. Tu ne mangeras pas la vie avec la viande. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: 'Tu ne mangeras pas le sang: tu le verseras sur la terre comme de l''eau. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: Tu ne le mangeras pas, afin d'être heureux, toi et tes enfants après toi, en faisant ce qui est droit aux yeux de l'Eternel.
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: '»Quant à ce que tu voudras consacrer et aux offrandes que tu feras en accomplissement d''un vœu, tu iras les présenter à l''endroit qu''aura choisi l''Eternel. '
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: 'Tu offriras tes holocaustes, la viande et le sang, sur l''autel de l''Eternel, ton Dieu. Dans tes autres sacrifices, le sang sera versé sur l''autel de l''Eternel, ton Dieu, et tu mangeras la viande. '
  '28':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: Retiens et écoute tout ce que je t'ordonne, afin d'être heureux, toi et tes enfants après toi, à toujours, en faisant ce qui est bien et ce qui est droit aux yeux de l'Eternel, ton Dieu.
  '29':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: '»Lorsque l''Eternel, ton Dieu, aura exterminé les nations que tu vas chasser devant toi, lorsque tu les auras chassées et que tu te seras établi dans leur pays, '
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: Vous démolirez leurs autels, vous briserez leurs statues, vous livrerez aux flammes leurs poteaux sacrés, vous abattrez les sculptures sacrées de leurs dieux et vous ferez disparaître leur nom de ces endroits-là.
  '30':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '30'
    - type: text
      text: 'fais bien attention: ne te laisse pas prendre au piège de les imiter une fois qu''elles auront été détruites devant toi. Ne t''informe pas sur leurs dieux en disant: ‘Comment ces nations servaient-elles leurs dieux? Moi aussi, je veux faire de même.’ '
  '31':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '31'
    - type: text
      text: Tu n'agiras pas ainsi envers l'Eternel, ton Dieu. En effet, elles servaient leurs dieux en accomplissant toutes les pratiques abominables que l'Eternel déteste. Elles passaient même leurs fils et leurs filles au feu en l'honneur de leurs dieux.
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: '»Ce n''est pas ainsi que vous agirez envers l''Eternel, votre Dieu. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'Au contraire, c''est à l''endroit que l''Eternel, votre Dieu, choisira parmi toutes vos tribus pour y placer son nom, pour y habiter, que vous le chercherez et que vous vous rendrez. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'C''est là que vous présenterez vos holocaustes, vos sacrifices, vos dîmes, vos prélèvements, vos offrandes faites en accomplissement d''un vœu, vos offrandes volontaires et les premiers-nés de votre gros et de votre petit bétail. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'C''est là que vous mangerez devant l''Eternel, votre Dieu, et qu''avec vos familles vous ferez servir à votre joie tous les biens par lesquels l''Eternel, votre Dieu, vous aura bénis. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'Vous n''agirez donc pas comme nous le faisons maintenant ici: chacun y fait ce qui lui semble bon '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'parce que vous n''êtes pas encore arrivés dans le lieu de repos et l''héritage que l''Eternel, votre Dieu, vous donne. '
