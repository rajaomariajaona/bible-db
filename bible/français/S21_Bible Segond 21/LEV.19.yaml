document_id: LEV.19,152
type_code: fra
verses:
  '1':
  - type: heading
    content: La sainteté du peuple de l'Eternel
  - type: text
    content: 'L''Eternel dit à Moïse: '
  '10':
  - type: text
    content: Tu ne cueilleras pas non plus les grappes restées dans ta vigne et tu ne ramasseras pas les grains qui en seront tombés. Tu le laisseras au pauvre et à l'étranger. Je suis l'Eternel, votre Dieu.
  '11':
  - type: text
    content: '»Vous ne commettrez pas de vol et vous ne recourrez ni au mensonge ni à la tromperie les uns envers les autres. '
  '12':
  - type: text
    content: Vous ne jurerez pas faussement par mon nom, car ce serait déshonorer le nom de ton Dieu. Je suis l'Eternel.
  '13':
  - type: text
    content: '»Tu n''exploiteras pas ton prochain et tu ne prendras rien par violence. Tu ne garderas pas chez toi jusqu''au lendemain la paie d''un salarié. '
  '14':
  - type: text
    content: Tu ne maudiras pas un sourd et tu ne mettras devant un aveugle rien qui puisse le faire tomber, mais tu craindras ton Dieu. Je suis l'Eternel.
  '15':
  - type: text
    content: '»Tu ne commettras pas d''injustice dans tes jugements: tu n''avantageras pas le faible et tu ne favoriseras pas non plus le grand, mais tu jugeras ton prochain avec justice.'
  '16':
  - type: text
    content: '»Tu ne propageras pas de calomnies parmi ton peuple et tu ne t''attaqueras pas à la vie de ton prochain. Je suis l''Eternel. '
  '17':
  - type: text
    content: 'Tu ne détesteras pas ton frère dans ton cœur, mais tu veilleras à reprendre ton prochain, ainsi tu ne te chargeras pas d''un péché à cause de lui. '
  '18':
  - type: text
    content: Tu ne te vengeras pas et tu ne garderas pas de rancune contre les membres de ton peuple. *Tu aimeras ton prochain comme toi-même.
  - type: note
    content: 'Tu aimeras… toi-même: cité en Matthieu 5.43; 19.19; 22.39; Marc 12.31, 33; Luc 10.27; Romains 13.9; Galates 5.14; Jacques 2.8 et présenté comme l''un des deux plus importants commandements (l''autre invitant à aimer Dieu sans réserve).'
  - type: text
    content: ' Je suis l''Eternel.'
  '19':
  - type: text
    content: »Vous respecterez mes prescriptions. Tu n'accoupleras pas deux bêtes d'espèces différentes. Tu n'ensemenceras pas ton champ de deux espèces de semences. Et tu ne porteras pas un vêtement tissé de deux espèces de fils.
  '2':
  - type: text
    content: '«Transmets ces instructions à toute l''assemblée des Israélites: *Vous serez saints, car je suis saint'
  - type: note
    content: 'Vous serez… saint: reprise de 11.44 (voir la note).'
  - type: text
    content: ', moi, l''Eternel, votre Dieu. '
  '20':
  - type: text
    content: '»Lorsqu''un homme couchera avec une femme, si c''est une esclave fiancée à un autre homme et qui n''a pas été rachetée ou affranchie, ils seront punis, mais non de mort, parce qu''elle n''a pas été affranchie. '
  '21':
  - type: text
    content: 'L''homme amènera un bélier à l''Eternel, à l''entrée de la tente de la rencontre, en sacrifice de culpabilité pour sa faute. '
  '22':
  - type: text
    content: Le prêtre fera l'expiation pour lui devant l'Eternel avec le bélier offert en sacrifice de culpabilité pour le péché qu'il a commis, et le péché qu'il a commis lui sera pardonné.
  '23':
  - type: text
    content: '»Quand vous serez entrés dans le pays et que vous y aurez planté toutes sortes d''arbres fruitiers, vous rejetterez leurs fruits comme étant impurs; pendant trois ans vous les considérerez comme impurs, on n''en mangera pas. '
  '24':
  - type: text
    content: 'La quatrième année, tous leurs fruits seront consacrés à l''Eternel au milieu des réjouissances. '
  '25':
  - type: text
    content: La cinquième année, vous mangerez leurs fruits et vous continuerez à les récolter. Je suis l'Eternel, votre Dieu.
  '26':
  - type: text
    content: '»Vous ne mangerez rien avec du sang. Vous n''observerez ni les serpents ni les nuages pour en tirer des pronostics. '
  '27':
  - type: text
    content: 'Vous ne couperez pas en rond les coins de votre chevelure et tu ne raseras pas les coins de ta barbe. '
  '28':
  - type: text
    content: Vous ne ferez pas d'incisions sur votre corps pour un mort et vous ne vous ferez pas de tatouages. Je suis l'Eternel.
  '29':
  - type: text
    content: »Tu ne déshonoreras pas ta fille en la livrant à la prostitution, de peur que le pays ne se prostitue et ne se remplisse de crimes.
  '3':
  - type: text
    content: 'Chacun de vous traitera sa mère et son père avec déférence et respectera mes sabbats. Je suis l''Eternel, votre Dieu. '
  '30':
  - type: text
    content: '»Vous respecterez mes sabbats et vous traiterez mon sanctuaire avec déférence. Je suis l''Eternel. '
  '31':
  - type: text
    content: Ne vous adressez pas à ceux qui invoquent les esprits et aux spirites, ne les recherchez pas, de peur de vous rendre impurs par eux. Je suis l'Eternel, votre Dieu.
  '32':
  - type: text
    content: '»Tu te lèveras devant la personne aux cheveux blancs et tu traiteras le vieillard avec honneur. Tu craindras ton Dieu. Je suis l''Eternel. '
  '33':
  - type: text
    content: 'Si un étranger vient séjourner avec vous dans votre pays, vous ne le maltraiterez pas. '
  '34':
  - type: text
    content: Vous traiterez l'étranger en séjour parmi vous comme un Israélite, comme l'un de vous; vous l'aimerez comme vous-mêmes, car vous avez été étrangers en Egypte. Je suis l'Eternel, votre Dieu.
  '35':
  - type: text
    content: '»Vous ne commettrez pas d''injustice ni dans les jugements, ni dans les mesures de dimension, ni dans les poids, ni dans les mesures de capacité. '
  '36':
  - type: text
    content: 'Vous aurez des balances justes, des poids justes, des mesures de solides justes et des mesures de liquides justes. Je suis l''Eternel, votre Dieu, qui vous ai fait sortir d''Egypte. '
  '37':
  - type: text
    content: Vous respecterez toutes mes prescriptions et toutes mes règles, vous les mettrez en pratique. Je suis l'Eternel.»
  '4':
  - type: text
    content: Vous ne vous tournerez pas vers les faux dieux, vous ne vous ferez pas des dieux en métal fondu. Je suis l'Eternel, votre Dieu.
  '5':
  - type: text
    content: '»Quand vous offrirez à l''Eternel un sacrifice de communion, vous l''offrirez de sorte qu''il soit accepté. '
  '6':
  - type: text
    content: 'On mangera la victime le jour où vous la sacrifierez ou le lendemain. On brûlera au feu ce qui restera jusqu''au troisième jour. '
  '7':
  - type: text
    content: 'Si l''on en mange le troisième jour, ce sera une chose infecte: le sacrifice ne sera pas accepté. '
  '8':
  - type: text
    content: 'Celui qui en mangera supportera les conséquences de sa faute, car il profane ce qui est consacré à l''Eternel: cette personne-là sera exclue de son peuple.'
  '9':
  - type: text
    content: '»Quand vous ferez la moisson dans votre pays, tu ne moissonneras pas ton champ jusqu''aux bords et tu ne ramasseras pas ce qui reste à glaner. '
