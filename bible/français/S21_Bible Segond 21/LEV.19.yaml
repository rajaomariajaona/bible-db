document_id: LEV.19,152
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: La sainteté du peuple de l'Eternel
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'L''Eternel dit à Moïse: '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: Tu ne cueilleras pas non plus les grappes restées dans ta vigne et tu ne ramasseras pas les grains qui en seront tombés. Tu le laisseras au pauvre et à l'étranger. Je suis l'Eternel, votre Dieu.
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: '»Vous ne commettrez pas de vol et vous ne recourrez ni au mensonge ni à la tromperie les uns envers les autres. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: Vous ne jurerez pas faussement par mon nom, car ce serait déshonorer le nom de ton Dieu. Je suis l'Eternel.
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: '»Tu n''exploiteras pas ton prochain et tu ne prendras rien par violence. Tu ne garderas pas chez toi jusqu''au lendemain la paie d''un salarié. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: Tu ne maudiras pas un sourd et tu ne mettras devant un aveugle rien qui puisse le faire tomber, mais tu craindras ton Dieu. Je suis l'Eternel.
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: '»Tu ne commettras pas d''injustice dans tes jugements: tu n''avantageras pas le faible et tu ne favoriseras pas non plus le grand, mais tu jugeras ton prochain avec justice.'
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: '»Tu ne propageras pas de calomnies parmi ton peuple et tu ne t''attaqueras pas à la vie de ton prochain. Je suis l''Eternel. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'Tu ne détesteras pas ton frère dans ton cœur, mais tu veilleras à reprendre ton prochain, ainsi tu ne te chargeras pas d''un péché à cause de lui. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: Tu ne te vengeras pas et tu ne garderas pas de rancune contre les membres de ton peuple. *Tu aimeras ton prochain comme toi-même.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '19.18 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Tu aimeras… toi-même: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'cité en '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Matthieu 5.43
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '19.19'
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '22.39'
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Marc 12.31
      - type: text
        text: ', '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '33'
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Luc 10.27
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Romains 13.9
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Galates 5.14
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Jacques 2.8
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' et présenté comme l''un des deux plus importants commandements (l''autre invitant à aimer Dieu sans réserve).'
      marker-yv: yv-n
    - type: text
      text: ' Je suis l''Eternel.'
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: »Vous respecterez mes prescriptions. Tu n'accoupleras pas deux bêtes d'espèces différentes. Tu n'ensemenceras pas ton champ de deux espèces de semences. Et tu ne porteras pas un vêtement tissé de deux espèces de fils.
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: '«Transmets ces instructions à toute l''assemblée des Israélites: *Vous serez saints, car je suis saint'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '19.2 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Vous serez… saint: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'reprise de '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '11.44'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' (voir la note).'
      marker-yv: yv-n
    - type: text
      text: ', moi, l''Eternel, votre Dieu. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: '»Lorsqu''un homme couchera avec une femme, si c''est une esclave fiancée à un autre homme et qui n''a pas été rachetée ou affranchie, ils seront punis, mais non de mort, parce qu''elle n''a pas été affranchie. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: 'L''homme amènera un bélier à l''Eternel, à l''entrée de la tente de la rencontre, en sacrifice de culpabilité pour sa faute. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: Le prêtre fera l'expiation pour lui devant l'Eternel avec le bélier offert en sacrifice de culpabilité pour le péché qu'il a commis, et le péché qu'il a commis lui sera pardonné.
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: '»Quand vous serez entrés dans le pays et que vous y aurez planté toutes sortes d''arbres fruitiers, vous rejetterez leurs fruits comme étant impurs; pendant trois ans vous les considérerez comme impurs, on n''en mangera pas. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: 'La quatrième année, tous leurs fruits seront consacrés à l''Eternel au milieu des réjouissances. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: La cinquième année, vous mangerez leurs fruits et vous continuerez à les récolter. Je suis l'Eternel, votre Dieu.
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: '»Vous ne mangerez rien avec du sang. Vous n''observerez ni les serpents ni les nuages pour en tirer des pronostics. '
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: 'Vous ne couperez pas en rond les coins de votre chevelure et tu ne raseras pas les coins de ta barbe. '
  '28':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: Vous ne ferez pas d'incisions sur votre corps pour un mort et vous ne vous ferez pas de tatouages. Je suis l'Eternel.
  '29':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: »Tu ne déshonoreras pas ta fille en la livrant à la prostitution, de peur que le pays ne se prostitue et ne se remplisse de crimes.
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'Chacun de vous traitera sa mère et son père avec déférence et respectera mes sabbats. Je suis l''Eternel, votre Dieu. '
  '30':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '30'
    - type: text
      text: '»Vous respecterez mes sabbats et vous traiterez mon sanctuaire avec déférence. Je suis l''Eternel. '
  '31':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '31'
    - type: text
      text: Ne vous adressez pas à ceux qui invoquent les esprits et aux spirites, ne les recherchez pas, de peur de vous rendre impurs par eux. Je suis l'Eternel, votre Dieu.
  '32':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '32'
    - type: text
      text: '»Tu te lèveras devant la personne aux cheveux blancs et tu traiteras le vieillard avec honneur. Tu craindras ton Dieu. Je suis l''Eternel. '
  '33':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '33'
    - type: text
      text: 'Si un étranger vient séjourner avec vous dans votre pays, vous ne le maltraiterez pas. '
  '34':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '34'
    - type: text
      text: Vous traiterez l'étranger en séjour parmi vous comme un Israélite, comme l'un de vous; vous l'aimerez comme vous-mêmes, car vous avez été étrangers en Egypte. Je suis l'Eternel, votre Dieu.
  '35':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '35'
    - type: text
      text: '»Vous ne commettrez pas d''injustice ni dans les jugements, ni dans les mesures de dimension, ni dans les poids, ni dans les mesures de capacité. '
  '36':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '36'
    - type: text
      text: 'Vous aurez des balances justes, des poids justes, des mesures de solides justes et des mesures de liquides justes. Je suis l''Eternel, votre Dieu, qui vous ai fait sortir d''Egypte. '
  '37':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '37'
    - type: text
      text: Vous respecterez toutes mes prescriptions et toutes mes règles, vous les mettrez en pratique. Je suis l'Eternel.»
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: Vous ne vous tournerez pas vers les faux dieux, vous ne vous ferez pas des dieux en métal fondu. Je suis l'Eternel, votre Dieu.
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: '»Quand vous offrirez à l''Eternel un sacrifice de communion, vous l''offrirez de sorte qu''il soit accepté. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'On mangera la victime le jour où vous la sacrifierez ou le lendemain. On brûlera au feu ce qui restera jusqu''au troisième jour. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'Si l''on en mange le troisième jour, ce sera une chose infecte: le sacrifice ne sera pas accepté. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'Celui qui en mangera supportera les conséquences de sa faute, car il profane ce qui est consacré à l''Eternel: cette personne-là sera exclue de son peuple.'
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: '»Quand vous ferez la moisson dans votre pays, tu ne moissonneras pas ton champ jusqu''aux bords et tu ne ramasseras pas ce qui reste à glaner. '
