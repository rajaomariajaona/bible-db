document_id: REV.22
type_code: fra
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Puis il me montra le fleuve d''eau de la vie, limpide comme du cristal, qui sortait du trône de Dieu et de l''Agneau. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Au milieu de la place de la ville et entre les deux bras du fleuve se trouvait l''arbre de vie qui produit douze récoltes; il donne son fruit chaque mois et ses feuilles servent à la guérison des nations. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Il n''y aura plus de malédiction. Le trône de Dieu et de l''Agneau sera dans la ville; ses serviteurs lui rendront un culte. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Ils verront son visage et son nom sera sur leur front. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Il n'y aura plus de nuit et ils n'auront besoin ni de la lumière d'une lampe ni de celle du soleil, parce que le Seigneur Dieu les éclairera. Et ils régneront aux siècles des siècles.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Conclusion
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Il me dit: «Ces paroles sont dignes de confiance et vraies; et le Seigneur, le Dieu de l''esprit des prophètes, a envoyé son ange pour montrer à ses serviteurs ce qui doit arriver bientôt.»'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: «Voici, je viens bientôt. Heureux celui qui garde les paroles de la prophétie de ce livre!»
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Moi, Jean, j''ai entendu et vu ces choses. Après les avoir entendues et vues, je tombai aux pieds de l''ange qui me les montrait pour l''adorer. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Mais il me dit: «Garde-toi bien de le faire! Je suis ton compagnon de service, celui de tes frères les prophètes et de ceux qui gardent les paroles de ce livre. Adore Dieu.»'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Puis il ajouta: «Ne marque pas du sceau du secret les paroles de la prophétie de ce livre, car le temps est proche. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Que celui qui est injuste commette encore des injustices et que celui qui est sale se salisse encore, mais que le juste pratique encore la justice et que celui qui est saint progresse encore dans la sainteté.»
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: '«Voici, je viens bientôt et j''apporte avec moi ma récompense pour traiter chacun conformément à son œuvre. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Je suis l''Alpha et l''Oméga, le premier et le dernier, le commencement et la fin. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Heureux ceux qui lavent leur robe: ils auront droit à l''arbre de vie et pourront entrer par les portes dans la ville! '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Dehors les chiens, les sorciers, ceux qui vivent dans l''immoralité sexuelle, les meurtriers, les idolâtres et tous ceux qui aiment et pratiquent le mensonge! '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Moi Jésus, j'ai envoyé mon ange pour vous attester ces choses dans les Eglises. Je suis le rejeton de la racine de David et son descendant, l'étoile brillante du matin.»
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'L''Esprit et l''épouse disent: «Viens!» Que celui qui entend dise: «Viens!» Que celui qui a soif vienne! Que celui qui veut de l''eau de la vie la prenne gratuitement!'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Je le déclare à toute personne qui écoute les paroles de prophétie de ce livre: si quelqu''un y ajoute quelque chose, Dieu lui ajoutera les fléaux décrits dans ce livre; '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: et si quelqu'un enlève quelque chose aux paroles du livre de cette prophétie, Dieu enlèvera sa part de l'arbre de la vie et de la ville sainte décrits dans ce livre.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Celui qui atteste ces choses dit: «Oui, je viens bientôt.»'
- type: usfm
  marker: p
  children:
  - type: text
    text: Amen! Viens, Seigneur Jésus!
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Que la grâce du Seigneur Jésus[-Christ] soit avec tous les saints!
