document_id: 1SA.14
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Exploit de Jonathan
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Un jour, Jonathan, fils de Saül, dit au jeune homme qui portait ses armes: «Viens, poussons jusqu''au poste des Philistins qui se trouve là, de l''autre côté.» Il n''en dit rien à son père.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Saül se tenait à la limite de Guibea sous le grenadier de Migron, et la troupe qui était avec lui comptait environ 600 hommes. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'C''était Achija, fils d''Achithub – lui-même frère d''I-Kabod, le fils de Phinées et le petit-fils d''Eli, prêtre de l''Eternel à Silo – qui portait l''éphod. Le peuple ne savait pas que Jonathan était parti. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Dans le passage par lequel Jonathan cherchait à arriver au poste des Philistins, il y avait une dent de rocher de chaque côté; l''une s''appelait Botsets et l''autre Séné. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: L'une de ces dents se trouvait au nord, en face de Micmash, et l'autre au sud, en face de Guéba.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Jonathan dit au jeune homme qui portait ses armes: «Viens, poussons jusqu''au poste de ces incirconcis. Peut-être l''Eternel agira-t-il pour nous. En effet, rien ne peut empêcher l''Eternel de sauver, que ce soit au moyen d''un petit ou d''un grand nombre.» '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Celui qui portait ses armes lui répondit: «Fais tout ce que tu as dans le cœur, suis ta pensée. Me voici avec toi, prêt à te suivre.» '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: '«Eh bien! dit Jonathan, allons vers ces hommes et montrons-nous à eux. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'S''ils nous disent: ‘Arrêtez-vous jusqu''à ce que nous arrivions vers vous’, nous resterons à notre place et nous ne monterons pas vers eux. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Mais s''ils disent: ‘Montez vers nous’, nous monterons, car l''Eternel les livre entre nos mains. C''est ce qui nous servira de signe.»'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Ils se montrèrent tous les deux au poste des Philistins, et les Philistins dirent: «Voilà que les Hébreux sortent des trous où ils se sont cachés.» '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Les hommes du poste s''adressèrent ainsi à Jonathan et à son porteur d''armes: «Montez vers nous et nous vous ferons savoir quelque chose.» Jonathan dit à son porteur d''armes: «Monte après moi, car l''Eternel les livre entre les mains d''Israël.» '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Jonathan monta en s''aidant des mains et des pieds, et son porteur d''armes le suivit. Les Philistins tombaient devant Jonathan et son porteur d''armes donnait la mort derrière lui. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Dans ce premier combat, Jonathan et son porteur d''armes tuèrent une vingtaine d''hommes, sur un espace limité. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: La terreur gagna le camp, la région et tout le peuple; le poste et ceux qui semaient la dévastation furent eux aussi terrifiés. La terre se mit de plus à trembler. Cela devint une terreur divine.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Les sentinelles de Saül qui se trouvaient à Guibea de Benjamin virent que c''était la débandade générale parmi la foule des Philistins. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Alors Saül dit au peuple qui était avec lui: «Faites donc l''appel et voyez qui nous a quittés.» Ils firent l''appel et l''on vit qu''il manquait Jonathan et son porteur d''armes. '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Saül dit à Achija: «Fais approcher l''arche de Dieu!» En effet, ce jour-là, l''arche de Dieu était avec les Israélites. '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Pendant que Saül parlait au prêtre, l''agitation allait toujours en augmentant dans le camp des Philistins. Saül dit au prêtre: «Retire ta main!» '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Puis Saül et tout le peuple qui était avec lui se rassemblèrent et s''avancèrent jusqu''au lieu du combat. Alors les Philistins tournèrent l''épée les uns contre les autres, dans un très grand trouble. '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Il y avait des Hébreux parmi les Philistins, comme c''était le cas depuis longtemps. Ils étaient montés avec eux dans le camp, où ils se trouvaient dispersés. Ils se joignirent aux Israélites qui étaient avec Saül et Jonathan. '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Tous les hommes d''Israël qui s''étaient cachés dans la région montagneuse d''Ephraïm apprirent que les Philistins prenaient la fuite et se mirent aussi à les poursuivre dans la bataille. '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: L'Eternel délivra Israël ce jour-là, et le combat se prolongea plus loin encore que Beth-Aven.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'La journée fut fatigante pour les Israélites. Saül avait lié le peuple par serment en disant: «Maudit soit l''homme qui prendra de la nourriture avant le soir, avant que je me sois vengé de mes ennemis!» et personne n''avait pris de nourriture. '
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Tout le peuple était arrivé dans une forêt où il y avait du miel à la surface du sol. '
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Lorsque le peuple entra dans la forêt, il vit le miel qui coulait, mais personne ne porta la main à la bouche, car le peuple respectait le serment. '
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'Quant à Jonathan, il ignorait le serment que son père avait fait faire au peuple. Il avança le bout du bâton qu''il avait à la main, le plongea dans un rayon de miel et ramena la main à la bouche; et sa vue devint claire. '
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'Alors quelqu''un du peuple lui adressa la parole et dit: «Ton père a fait jurer le peuple en disant: ‘Maudit soit l''homme qui prendra de la nourriture aujourd''hui!’ et le peuple est épuisé.» '
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'Jonathan dit: «Mon père fait du tort au peuple. Regardez donc comme ma vue est devenue claire du fait que j''ai goûté un peu de ce miel. '
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: Si aujourd'hui le peuple avait mangé du butin qu'il a trouvé chez ses ennemis, la défaite des Philistins n'aurait-elle pas été plus grande?»
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'Ce jour-là, ils portèrent des coups aux Philistins depuis Micmash jusqu''à Ajalon. Le peuple était très fatigué, '
  - type: usfm
    marker: v
    metadata:
      v: '32'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'et il se jeta sur le butin. Il prit des brebis, des bœufs et des veaux, les égorgea à même le sol et en mangea avec le sang. '
  - type: usfm
    marker: v
    metadata:
      v: '33'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: 'On le rapporta à Saül en disant: «Le peuple pèche contre l''Eternel en mangeant de la viande avec le sang.» Saül dit: «Vous commettez un acte d''infidélité. Roulez immédiatement une grande pierre vers moi.» '
  - type: usfm
    marker: v
    metadata:
      v: '34'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: 'Puis il ajouta: «Dispersez-vous parmi le peuple et ordonnez à chacun de m''amener son bœuf ou sa brebis et de l''égorger ici. Ensuite vous pourrez manger et vous ne pécherez pas contre l''Eternel en mangeant la viande avec le sang.» Pendant la nuit, chaque membre de la troupe amena son bœuf afin de l''égorger sur la pierre. '
  - type: usfm
    marker: v
    metadata:
      v: '35'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: Saül construisit un autel pour l'Eternel. Ce fut le premier autel qu'il construisit en l'honneur de l'Eternel.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '36'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: 'Saül dit: «Descendons cette nuit à la poursuite des Philistins! Pillons-les jusqu''au matin, sans laisser de survivant.» Les Israélites répondirent: «Fais tout ce qui te semblera bon.» Alors le prêtre dit: «Approchons-nous ici de Dieu.» '
  - type: usfm
    marker: v
    metadata:
      v: '37'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: 'Saül consulta Dieu: «Dois-je descendre à la poursuite des Philistins? Les livreras-tu entre les mains d''Israël?» Mais l''Eternel ne lui donna aucune réponse ce jour-là. '
  - type: usfm
    marker: v
    metadata:
      v: '38'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: text
    text: 'Saül dit: «Approchez-vous ici, vous tous, les chefs du peuple. Faites des recherches et voyez quel péché a été commis aujourd''hui. '
  - type: usfm
    marker: v
    metadata:
      v: '39'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '39'
  - type: text
    text: 'En effet, l''Eternel, le libérateur d''Israël, est vivant, même si mon fils Jonathan en est l''auteur, il mourra.» Dans tout le peuple, personne ne lui répondit. '
  - type: usfm
    marker: v
    metadata:
      v: '40'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '40'
  - type: text
    text: 'Saül dit à tout Israël: «Mettez-vous d''un côté, et mon fils Jonathan et moi, nous serons de l''autre.» Le peuple dit à Saül: «Fais ce qui te semblera bon.» '
  - type: usfm
    marker: v
    metadata:
      v: '41'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '41'
  - type: text
    text: 'Saül dit à l''Eternel: «Dieu d''Israël, fais connaître la vérité.» Jonathan et Saül furent désignés, et le peuple fut libéré. '
  - type: usfm
    marker: v
    metadata:
      v: '42'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '42'
  - type: text
    text: 'Saül dit: «Procédez à un tirage au sort entre mon fils Jonathan et moi.» Jonathan fut désigné. '
  - type: usfm
    marker: v
    metadata:
      v: '43'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '43'
  - type: text
    text: 'Saül lui dit: «Raconte-moi ce que tu as fait.» Jonathan le lui raconta. Il dit: «J''ai goûté un peu de miel avec le bout du bâton que j''avais à la main. Me voici, prêt à mourir.» '
  - type: usfm
    marker: v
    metadata:
      v: '44'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '44'
  - type: text
    text: 'Saül dit: «Que Dieu me traite avec la plus grande sévérité si tu ne meurs pas, Jonathan!» '
  - type: usfm
    marker: v
    metadata:
      v: '45'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '45'
  - type: text
    text: 'Le peuple dit à Saül: «Quoi! Jonathan mourrait, lui qui a accompli cette grande délivrance en Israël! Certainement pas! L''Eternel est vivant! Pas un cheveu de sa tête ne tombera à terre, car c''est avec Dieu qu''il a agi aujourd''hui.» Ainsi, le peuple sauva Jonathan et il ne mourut pas. '
  - type: usfm
    marker: v
    metadata:
      v: '46'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '46'
  - type: text
    text: Saül cessa de poursuivre les Philistins et ceux-ci partirent chez eux.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Guerres menées par Saül
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '47'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '47'
  - type: text
    text: 'Après avoir pris possession de la royauté sur Israël, Saül fit de tous côtés la guerre à tous ses ennemis: aux Moabites, aux Ammonites, aux Edomites, aux rois de Tsoba et aux Philistins; et partout où il se tournait, il était vainqueur. '
  - type: usfm
    marker: v
    metadata:
      v: '48'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '48'
  - type: text
    text: Il montra sa force, battit Amalek et délivra Israël de l'oppression de ceux qui le pillaient.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '49'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '49'
  - type: text
    text: 'Les fils de Saül étaient Jonathan, Jishvi et Malkishua. L''aînée de ses deux filles s''appelait Mérab, et la plus jeune Mical. '
  - type: usfm
    marker: v
    metadata:
      v: '50'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '50'
  - type: text
    text: 'La femme de Saül s''appelait Achinoam; elle était la fille d''Achimaats. Le chef de son armée avait pour nom Abner; il était le fils de Ner, l''oncle de Saül. '
  - type: usfm
    marker: v
    metadata:
      v: '51'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '51'
  - type: text
    text: Kis, le père de Saül, et Ner, le père d'Abner, étaient les fils d'Abiel.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '52'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '52'
  - type: text
    text: Pendant toute la vie de Saül, il y eut une guerre acharnée contre les Philistins. Dès que Saül apercevait un homme fort et vaillant, il le prenait à son service.
