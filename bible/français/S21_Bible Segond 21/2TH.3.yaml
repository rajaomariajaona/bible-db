document_id: 2TH.3
type_code: fra
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Maintenant donc, frères et sœurs, priez pour nous afin que la parole du Seigneur se propage et soit honorée comme elle l''est chez vous, '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'et que nous soyons délivrés des hommes méchants et pervers, car tous n''ont pas la foi. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Le Seigneur est fidèle, il vous affermira et vous protégera du mal
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '3.3 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Du mal: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: autres traductions du méchant (voir verset 2) ou du mauvais (c'est-à-dire du diable).
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Nous avons confiance dans le Seigneur à votre sujet, car vous faites et vous ferez ce que nous [vous] recommandons. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Que le Seigneur dirige votre cœur vers l'amour de Dieu et vers la patience de Christ!
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Nous vous recommandons, frères et sœurs, au nom de notre Seigneur Jésus-Christ, de vous éloigner de tout frère qui mène une vie désordonnée et ne suit pas les instructions reçues de nous. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Vous savez vous-mêmes comment il faut nous imiter, car nous ne nous sommes pas livrés au désordre parmi vous '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'et nous n''avons mangé gratuitement le pain de personne; au contraire, nuit et jour, dans la fatigue et dans la peine, nous avons travaillé pour n''être à la charge d''aucun de vous. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Non que nous n''en ayons pas le droit, mais nous avons voulu vous donner en nous-mêmes un modèle à imiter. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'En effet, lorsque nous étions chez vous, nous vous recommandions ceci: si quelqu''un ne veut pas travailler, qu''il ne mange pas non plus. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Nous apprenons cependant que quelques-uns parmi vous mènent une vie désordonnée: ils ne travaillent pas mais se mêlent des affaires des autres. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Nous invitons ces gens-là, et nous les encourageons par notre Seigneur Jésus-Christ, à travailler paisiblement pour manger leur propre pain.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Quant à vous, frères et sœurs, ne négligez pas de faire le bien. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Si quelqu''un n''obéit pas à ce que nous disons par cette lettre, notez-le et n''ayez pas de relations avec lui, afin qu''il en éprouve de la honte. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Ne le considérez pas comme un ennemi, mais avertissez-le comme un frère.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Bénédiction et salutation
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Que le Seigneur de la paix vous donne lui-même la paix en tout temps et de toute manière! Que le Seigneur soit avec vous tous!
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Moi Paul, je vous salue de ma propre main. C'est là ma signature dans toutes mes lettres, c'est ainsi que j'écris.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Que la grâce de notre Seigneur Jésus-Christ soit avec vous tous!
