document_id: 2TH.3,152
type_code: fra
verses:
  '1':
  - type: text
    content: 'Maintenant donc, frères et sœurs, priez pour nous afin que la parole du Seigneur se propage et soit honorée comme elle l''est chez vous, '
  '10':
  - type: text
    content: 'En effet, lorsque nous étions chez vous, nous vous recommandions ceci: si quelqu''un ne veut pas travailler, qu''il ne mange pas non plus. '
  '11':
  - type: text
    content: 'Nous apprenons cependant que quelques-uns parmi vous mènent une vie désordonnée: ils ne travaillent pas mais se mêlent des affaires des autres. '
  '12':
  - type: text
    content: Nous invitons ces gens-là, et nous les encourageons par notre Seigneur Jésus-Christ, à travailler paisiblement pour manger leur propre pain.
  '13':
  - type: text
    content: 'Quant à vous, frères et sœurs, ne négligez pas de faire le bien. '
  '14':
  - type: text
    content: 'Si quelqu''un n''obéit pas à ce que nous disons par cette lettre, notez-le et n''ayez pas de relations avec lui, afin qu''il en éprouve de la honte. '
  '15':
  - type: text
    content: Ne le considérez pas comme un ennemi, mais avertissez-le comme un frère.
  - type: heading
    content: Bénédiction et salutation
  '16':
  - type: text
    content: Que le Seigneur de la paix vous donne lui-même la paix en tout temps et de toute manière! Que le Seigneur soit avec vous tous!
  '17':
  - type: text
    content: Moi Paul, je vous salue de ma propre main. C'est là ma signature dans toutes mes lettres, c'est ainsi que j'écris.
  '18':
  - type: text
    content: Que la grâce de notre Seigneur Jésus-Christ soit avec vous tous!
  '2':
  - type: text
    content: 'et que nous soyons délivrés des hommes méchants et pervers, car tous n''ont pas la foi. '
  '3':
  - type: text
    content: Le Seigneur est fidèle, il vous affermira et vous protégera du mal
  - type: note
    content: 'Du mal: autres traductions du méchant (voir verset 2) ou du mauvais (c''est-à-dire du diable).'
  - type: text
    content: '. '
  '4':
  - type: text
    content: 'Nous avons confiance dans le Seigneur à votre sujet, car vous faites et vous ferez ce que nous [vous] recommandons. '
  '5':
  - type: text
    content: Que le Seigneur dirige votre cœur vers l'amour de Dieu et vers la patience de Christ!
  '6':
  - type: text
    content: 'Nous vous recommandons, frères et sœurs, au nom de notre Seigneur Jésus-Christ, de vous éloigner de tout frère qui mène une vie désordonnée et ne suit pas les instructions reçues de nous. '
  '7':
  - type: text
    content: 'Vous savez vous-mêmes comment il faut nous imiter, car nous ne nous sommes pas livrés au désordre parmi vous '
  '8':
  - type: text
    content: 'et nous n''avons mangé gratuitement le pain de personne; au contraire, nuit et jour, dans la fatigue et dans la peine, nous avons travaillé pour n''être à la charge d''aucun de vous. '
  '9':
  - type: text
    content: 'Non que nous n''en ayons pas le droit, mais nous avons voulu vous donner en nous-mêmes un modèle à imiter. '
