document_id: 2SA.6,152
type_code: fra
verses:
  '1':
  - type: heading
    content: Transport de l'arche jusqu'à Jérusalem
  - type: text
    content: 'David rassembla encore toute l''élite d''Israël, qui comptait 30''000 hommes. '
  '10':
  - type: text
    content: 'Il ne voulut pas prendre l''arche de l''Eternel chez lui, dans la ville de David, et il la fit conduire dans la maison d''Obed-Edom, un homme de Gath. '
  '11':
  - type: text
    content: L'arche de l'Eternel resta 3 mois dans la maison d'Obed-Edom de Gath et l'Eternel le bénit, ainsi que toute sa famille.
  '12':
  - type: text
    content: 'On vint dire au roi David: «L''Eternel a béni la famille d''Obed-Edom et tout ce qui lui appartient à cause de l''arche de Dieu.» David se mit alors en route et il fit monter l''arche de Dieu depuis la maison d''Obed-Edom jusqu''à la ville de David au milieu des réjouissances. '
  '13':
  - type: text
    content: 'Quand ceux qui portaient l''arche de l''Eternel eurent fait six pas, on sacrifia un bœuf et un veau gras. '
  '14':
  - type: text
    content: 'David dansait de toute sa force devant l''Eternel et il était habillé d''un éphod en lin. '
  '15':
  - type: text
    content: David et toute la communauté d'Israël firent monter l'arche de l'Eternel avec des cris de joie et au son des trompettes.
  '16':
  - type: text
    content: Mical, fille de Saül, regardait par la fenêtre lorsque l'arche de l'Eternel entra dans la ville de David et, en voyant le roi David sauter et danser devant l'Eternel, elle éprouva du mépris pour lui dans son cœur.
  '17':
  - type: text
    content: 'Une fois qu''on eut amené l''arche de l''Eternel, on la mit à sa place au milieu de la tente que David avait dressée pour elle, et David offrit des holocaustes et des sacrifices de communion devant l''Eternel. '
  '18':
  - type: text
    content: 'Quand il eut fini d''offrir les holocaustes et les sacrifices de communion, David bénit le peuple au nom de l''Eternel, le maître de l''univers. '
  '19':
  - type: text
    content: Puis il distribua à tout le peuple, à toute la foule d'Israël, hommes et femmes confondus, un pain, une portion de viande et un gâteau aux raisins. Et tout le peuple repartit, chacun chez soi.
  '2':
  - type: text
    content: 'Puis, avec tout le peuple qui était à ses côtés, il partit de Baalé-Juda pour faire monter de là l''arche de Dieu, à laquelle est associé le nom de l''Eternel, le maître de l''univers, qui siège au-dessus d''elle entre les chérubins. '
  '20':
  - type: text
    content: 'David retourna chez lui pour bénir sa famille et Mical, fille de Saül, sortit à sa rencontre. Elle dit: «Quel honneur aujourd''hui pour le roi d''Israël! Il s''est dénudé aux yeux des servantes de ses serviteurs comme le ferait un homme sans valeur!» '
  '21':
  - type: text
    content: 'David répondit à Mical: «C''est devant l''Eternel, qui m''a choisi de préférence à ton père et à toute sa famille pour m''établir comme chef sur son peuple, sur Israël, c''est devant l''Eternel que j''ai dansé. '
  '22':
  - type: text
    content: 'Je veux paraître encore plus petit que cela et m''abaisser à mes propres yeux. Toutefois je serai honoré auprès des servantes dont tu parles.» '
  '23':
  - type: text
    content: Mical, fille de Saül, n'eut pas d'enfants jusqu'au jour de sa mort.
  '3':
  - type: text
    content: 'Ils mirent ce coffre de Dieu sur un char neuf et l''emportèrent depuis la maison d''Abinadab qui se trouve sur la colline; c''étaient Uzza et Achjo, les fils d''Abinadab, qui conduisaient le char neuf. '
  '4':
  - type: text
    content: 'Ils l''emportèrent donc depuis la maison d''Abinadab qui se trouve sur la colline. Uzza marchait à côté de l''arche de Dieu, et Achjo devant. '
  '5':
  - type: text
    content: David et toute la communauté d'Israël jouaient devant l'Eternel de toutes sortes d'instruments en bois de cyprès, de la harpe, du luth, du tambourin, du sistre et des cymbales.
  '6':
  - type: text
    content: 'Lorsqu''ils furent arrivés à l''aire de battage de Nacon, Uzza tendit la main vers l''arche de Dieu et la retint, parce que les bœufs la faisaient pencher. '
  '7':
  - type: text
    content: 'La colère de l''Eternel s''enflamma contre lui et Dieu le frappa sur place à cause de sa faute. Uzza mourut là, près de l''arche de Dieu. '
  '8':
  - type: text
    content: 'David fut troublé de ce que l''Eternel avait infligé une telle punition à Uzza, et cet endroit a été appelé jusqu''à aujourd''hui Pérets-Uzza. '
  '9':
  - type: text
    content: 'David eut peur de l''Eternel, ce jour-là, et il se dit: «Comment l''arche de l''Eternel pourrait-elle entrer chez moi?» '
