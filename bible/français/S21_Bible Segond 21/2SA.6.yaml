document_id: 2SA.6
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Transport de l'arche jusqu'à Jérusalem
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'David rassembla encore toute l''élite d''Israël, qui comptait 30''000 hommes. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Puis, avec tout le peuple qui était à ses côtés, il partit de Baalé-Juda pour faire monter de là l''arche de Dieu, à laquelle est associé le nom de l''Eternel, le maître de l''univers, qui siège au-dessus d''elle entre les chérubins. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Ils mirent ce coffre de Dieu sur un char neuf et l''emportèrent depuis la maison d''Abinadab qui se trouve sur la colline; c''étaient Uzza et Achjo, les fils d''Abinadab, qui conduisaient le char neuf. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Ils l''emportèrent donc depuis la maison d''Abinadab qui se trouve sur la colline. Uzza marchait à côté de l''arche de Dieu, et Achjo devant. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: David et toute la communauté d'Israël jouaient devant l'Eternel de toutes sortes d'instruments en bois de cyprès, de la harpe, du luth, du tambourin, du sistre et des cymbales.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Lorsqu''ils furent arrivés à l''aire de battage de Nacon, Uzza tendit la main vers l''arche de Dieu et la retint, parce que les bœufs la faisaient pencher. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'La colère de l''Eternel s''enflamma contre lui et Dieu le frappa sur place à cause de sa faute. Uzza mourut là, près de l''arche de Dieu. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'David fut troublé de ce que l''Eternel avait infligé une telle punition à Uzza, et cet endroit a été appelé jusqu''à aujourd''hui Pérets-Uzza. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'David eut peur de l''Eternel, ce jour-là, et il se dit: «Comment l''arche de l''Eternel pourrait-elle entrer chez moi?» '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Il ne voulut pas prendre l''arche de l''Eternel chez lui, dans la ville de David, et il la fit conduire dans la maison d''Obed-Edom, un homme de Gath. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: L'arche de l'Eternel resta 3 mois dans la maison d'Obed-Edom de Gath et l'Eternel le bénit, ainsi que toute sa famille.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'On vint dire au roi David: «L''Eternel a béni la famille d''Obed-Edom et tout ce qui lui appartient à cause de l''arche de Dieu.» David se mit alors en route et il fit monter l''arche de Dieu depuis la maison d''Obed-Edom jusqu''à la ville de David au milieu des réjouissances. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Quand ceux qui portaient l''arche de l''Eternel eurent fait six pas, on sacrifia un bœuf et un veau gras. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'David dansait de toute sa force devant l''Eternel et il était habillé d''un éphod en lin. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: David et toute la communauté d'Israël firent monter l'arche de l'Eternel avec des cris de joie et au son des trompettes.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Mical, fille de Saül, regardait par la fenêtre lorsque l'arche de l'Eternel entra dans la ville de David et, en voyant le roi David sauter et danser devant l'Eternel, elle éprouva du mépris pour lui dans son cœur.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Une fois qu''on eut amené l''arche de l''Eternel, on la mit à sa place au milieu de la tente que David avait dressée pour elle, et David offrit des holocaustes et des sacrifices de communion devant l''Eternel. '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Quand il eut fini d''offrir les holocaustes et les sacrifices de communion, David bénit le peuple au nom de l''Eternel, le maître de l''univers. '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Puis il distribua à tout le peuple, à toute la foule d'Israël, hommes et femmes confondus, un pain, une portion de viande et un gâteau aux raisins. Et tout le peuple repartit, chacun chez soi.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'David retourna chez lui pour bénir sa famille et Mical, fille de Saül, sortit à sa rencontre. Elle dit: «Quel honneur aujourd''hui pour le roi d''Israël! Il s''est dénudé aux yeux des servantes de ses serviteurs comme le ferait un homme sans valeur!» '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'David répondit à Mical: «C''est devant l''Eternel, qui m''a choisi de préférence à ton père et à toute sa famille pour m''établir comme chef sur son peuple, sur Israël, c''est devant l''Eternel que j''ai dansé. '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Je veux paraître encore plus petit que cela et m''abaisser à mes propres yeux. Toutefois je serai honoré auprès des servantes dont tu parles.» '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: Mical, fille de Saül, n'eut pas d'enfants jusqu'au jour de sa mort.
