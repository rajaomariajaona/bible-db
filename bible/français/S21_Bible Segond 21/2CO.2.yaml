document_id: 2CO.2
type_code: fra
segments:
- type: usfm
  marker: nb
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'J''ai donc décidé en moi-même de ne pas retourner chez vous dans la tristesse. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'En effet, si je vous attriste, qui peut me réjouir, sinon celui que j''ai attristé? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'J''ai écrit comme je l''ai fait pour ne pas être attristé, à mon arrivée, par ceux qui devaient me donner de la joie; car en ce qui vous concerne, je suis convaincu que ma joie est aussi la vôtre, à vous tous. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: C'est dans une grande souffrance, le cœur angoissé et avec beaucoup de larmes que je vous ai écrit, non pas afin de vous attrister, mais afin que vous sachiez quel amour débordant j'ai pour vous.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Si quelqu''un a été une cause de tristesse, ce n''est pas moi qu''il a attristé, c''est vous tous, du moins dans une certaine mesure, pour ne rien exagérer. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Le blâme qui lui a été infligé par la majorité d''entre vous est suffisant pour cet homme. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Maintenant, au contraire, vous devez plutôt lui pardonner et l''encourager, de peur qu''il ne soit accablé par une tristesse excessive. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Je vous engage donc à faire preuve d''amour envers lui, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'car je vous ai aussi écrit dans le but de savoir, en vous mettant à l''épreuve, si vous êtes obéissants à tout point de vue. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Or à qui vous pardonnez, je pardonne aussi; et si j''ai pardonné quelque chose à quelqu''un, je l''ai fait à cause de vous, en présence de Christ, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: afin de ne pas laisser à Satan l'avantage sur nous, car nous n'ignorons pas ses intentions.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Quand je suis arrivé à Troas pour annoncer l''Evangile de Christ, bien que le Seigneur m''y ait ouvert une porte, je n''avais pas l''esprit en repos parce que je n''avais pas trouvé mon frère Tite. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: C'est pourquoi j'ai pris congé d'eux et je suis parti pour la Macédoine.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Le ministère de la nouvelle alliance
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Que Dieu soit remercié, lui qui nous fait toujours triompher en Christ et qui propage partout, à travers nous, le parfum de sa connaissance! '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Nous sommes en effet pour Dieu la bonne odeur de Christ parmi ceux qui sont sauvés et parmi ceux qui périssent: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'pour les uns, un parfum de mort qui donne la mort, pour les autres, un parfum de vie qui donne la vie. – Et pour cette mission, qui donc est qualifié? – '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: En effet, nous ne falsifions pas la parole de Dieu, comme le font les autres, mais c'est avec pureté, c'est de la part de Dieu, en Christ et devant Dieu que nous parlons.
