document_id: 2CO.2,152
type_code: fra
verses:
  '1':
  - type: text
    content: 'J''ai donc décidé en moi-même de ne pas retourner chez vous dans la tristesse. '
  '10':
  - type: text
    content: 'Or à qui vous pardonnez, je pardonne aussi; et si j''ai pardonné quelque chose à quelqu''un, je l''ai fait à cause de vous, en présence de Christ, '
  '11':
  - type: text
    content: afin de ne pas laisser à Satan l'avantage sur nous, car nous n'ignorons pas ses intentions.
  '12':
  - type: text
    content: 'Quand je suis arrivé à Troas pour annoncer l''Evangile de Christ, bien que le Seigneur m''y ait ouvert une porte, je n''avais pas l''esprit en repos parce que je n''avais pas trouvé mon frère Tite. '
  '13':
  - type: text
    content: C'est pourquoi j'ai pris congé d'eux et je suis parti pour la Macédoine.
  - type: heading
    content: Le ministère de la nouvelle alliance
  '14':
  - type: text
    content: 'Que Dieu soit remercié, lui qui nous fait toujours triompher en Christ et qui propage partout, à travers nous, le parfum de sa connaissance! '
  '15':
  - type: text
    content: 'Nous sommes en effet pour Dieu la bonne odeur de Christ parmi ceux qui sont sauvés et parmi ceux qui périssent: '
  '16':
  - type: text
    content: 'pour les uns, un parfum de mort qui donne la mort, pour les autres, un parfum de vie qui donne la vie. – Et pour cette mission, qui donc est qualifié? – '
  '17':
  - type: text
    content: En effet, nous ne falsifions pas la parole de Dieu, comme le font les autres, mais c'est avec pureté, c'est de la part de Dieu, en Christ et devant Dieu que nous parlons.
  '2':
  - type: text
    content: 'En effet, si je vous attriste, qui peut me réjouir, sinon celui que j''ai attristé? '
  '3':
  - type: text
    content: 'J''ai écrit comme je l''ai fait pour ne pas être attristé, à mon arrivée, par ceux qui devaient me donner de la joie; car en ce qui vous concerne, je suis convaincu que ma joie est aussi la vôtre, à vous tous. '
  '4':
  - type: text
    content: C'est dans une grande souffrance, le cœur angoissé et avec beaucoup de larmes que je vous ai écrit, non pas afin de vous attrister, mais afin que vous sachiez quel amour débordant j'ai pour vous.
  '5':
  - type: text
    content: 'Si quelqu''un a été une cause de tristesse, ce n''est pas moi qu''il a attristé, c''est vous tous, du moins dans une certaine mesure, pour ne rien exagérer. '
  '6':
  - type: text
    content: 'Le blâme qui lui a été infligé par la majorité d''entre vous est suffisant pour cet homme. '
  '7':
  - type: text
    content: 'Maintenant, au contraire, vous devez plutôt lui pardonner et l''encourager, de peur qu''il ne soit accablé par une tristesse excessive. '
  '8':
  - type: text
    content: 'Je vous engage donc à faire preuve d''amour envers lui, '
  '9':
  - type: text
    content: 'car je vous ai aussi écrit dans le but de savoir, en vous mettant à l''épreuve, si vous êtes obéissants à tout point de vue. '
