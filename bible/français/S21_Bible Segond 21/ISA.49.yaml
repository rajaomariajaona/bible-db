document_id: ISA.49
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Le Sauveur d'Israël et des nations
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Iles, écoutez-moi! Peuples lointains, soyez attentifs!
- type: usfm
  marker: q1
  children:
  - type: text
    text: L'Eternel m'a appelé dès le ventre de ma mère,
- type: usfm
  marker: q1
  children:
  - type: text
    text: il a mentionné mon nom dès avant ma naissance.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Il a rendu ma bouche pareille à une épée tranchante,
- type: usfm
  marker: q1
  children:
  - type: text
    text: il m'a couvert de l'ombre de sa main.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Il a fait de moi une flèche aiguë,
- type: usfm
  marker: q1
  children:
  - type: text
    text: il m'a caché dans son carquois.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Il m''a dit: «Tu es mon serviteur, Israël.'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Par toi je montrerai ma splendeur.»
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Quant à moi, je disais: «C''est pour rien que je me suis fatigué,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: c'est pour le vide, c'est en pure perte que j'ai épuisé mes forces.»
- type: usfm
  marker: q1
  children:
  - type: text
    text: Pourtant, mon droit est auprès de l'Eternel
- type: usfm
  marker: q1
  children:
  - type: text
    text: et ma récompense auprès de mon Dieu.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Maintenant l'Eternel parle,
- type: usfm
  marker: q1
  children:
  - type: text
    text: lui qui m'a formé dès le ventre de ma mère
- type: usfm
  marker: q1
  children:
  - type: text
    text: pour que je sois son serviteur, pour que je ramène Jacob vers lui,
- type: usfm
  marker: q1
  children:
  - type: text
    text: pour qu'Israël soit rassemblé près de lui.
- type: usfm
  marker: q1
  children:
  - type: text
    text: J'ai de l'importance aux yeux de l'Eternel
- type: usfm
  marker: q1
  children:
  - type: text
    text: et mon Dieu est ma force.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Il dit: «C''est trop peu que tu sois mon serviteur'
- type: usfm
  marker: q1
  children:
  - type: text
    text: pour relever les tribus de Jacob
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'et pour ramener les restes d''Israël:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: '*je t''établis pour être la lumière des nations,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: pour apporter mon salut jusqu'aux extrémités de la terre
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '49.6 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Je t''établis… terre: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'appliqué à lui-même par Paul en '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Actes 13.47
      metadata:
        usfm: ACT.13.47
    - type: usfm
      marker: ft
      children:
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: .»
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Voici ce que dit l'Eternel, le Saint d'Israël, celui qui le rachète,
- type: usfm
  marker: q1
  children:
  - type: text
    text: à l'homme qu'on méprise, qui fait horreur à la nation,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'à l''esclave des tyrans:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: «A ta vue, des rois se lèveront,
- type: usfm
  marker: q1
  children:
  - type: text
    text: des princes se prosterneront
- type: usfm
  marker: q1
  children:
  - type: text
    text: à cause de l'Eternel, qui est fidèle,
- type: usfm
  marker: q1
  children:
  - type: text
    text: du Saint d'Israël, qui t'a choisi.»
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Voici ce que dit l''Eternel:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: '*Au moment favorable je t''ai répondu,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: le jour du salut je t'ai secouru.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '49.8 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Au moment… secouru: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'cité par l''apôtre Paul en '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 2 Corinthiens 6.2
      metadata:
        usfm: 2CO.6.2
    - type: usfm
      marker: ft
      children:
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: ' Je te protégerai et je t''établirai pour faire alliance avec le peuple,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: pour relever le pays
- type: usfm
  marker: q1
  children:
  - type: text
    text: et distribuer les héritages aujourd'hui dévastés,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'pour dire aux prisonniers: «Sortez!»'
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'et à ceux qui sont dans les ténèbres: «Montrez-vous!»'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ils trouveront leur nourriture sur les chemins
- type: usfm
  marker: q1
  children:
  - type: text
    text: et des pâturages sur tous les sommets.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: '*Ils n''auront plus faim, ils n''auront plus soif,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: la chaleur brûlante et le soleil ne les frapperont plus.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '49.10 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Ils n''auront… plus: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'cité en '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Apocalypse 7.16
      metadata:
        usfm: REV.7.16
    - type: usfm
      marker: ft
      children:
      - type: text
        text: .
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: text
    text: En effet, celui qui a compassion d'eux sera leur guide,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et il les conduira vers des sources d'eau.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Je transformerai toutes mes montagnes en chemins
- type: usfm
  marker: q1
  children:
  - type: text
    text: et mes routes seront refaites.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Les voici, ils viennent de loin:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: les uns du nord, les autres de l'ouest,
- type: usfm
  marker: q1
  children:
  - type: text
    text: d'autres encore du pays de Sinim.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Ciel, réjouis-toi!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Terre, crie d'allégresse!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Montagnes, éclatez en cris de joie!
- type: usfm
  marker: q1
  children:
  - type: text
    text: En effet, l'Eternel console son peuple,
- type: usfm
  marker: q1
  children:
  - type: text
    text: il a compassion des plus humbles de ses membres.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Sion disait: «L''Eternel m''a abandonnée,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: le Seigneur m'a oubliée!»
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Une femme oublie-t-elle l'enfant qu'elle allaite?
- type: usfm
  marker: q1
  children:
  - type: text
    text: N'a-t-elle pas compassion du fils qui est sorti de son ventre?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Même si elle l'oubliait,
- type: usfm
  marker: q1
  children:
  - type: text
    text: moi je ne t'oublierai jamais.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Vois! Je t'ai gravée sur mes mains.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Tes murailles sont constamment devant moi.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Tes fils accourent,
- type: usfm
  marker: q1
  children:
  - type: text
    text: tandis que ceux qui t'avaient détruite et dévastée
- type: usfm
  marker: q1
  children:
  - type: text
    text: partent de chez toi.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Lève les yeux et regarde tout autour:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: tous ils se rassemblent, ils viennent vers toi.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Aussi vrai que je suis vivant, déclare l'Eternel,
- type: usfm
  marker: q1
  children:
  - type: text
    text: tu les enfileras tous comme des bijoux,
- type: usfm
  marker: q1
  children:
  - type: text
    text: tu t'en pareras à la manière d'une fiancée.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Oui, dans tes places dévastées et désertes,
- type: usfm
  marker: q1
  children:
  - type: text
    text: dans ton pays ruiné,
- type: usfm
  marker: q1
  children:
  - type: text
    text: tes habitants seront désormais à l'étroit,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et ceux qui te dévoraient s'éloigneront.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Ils te répéteront, ces fils dont tu avais été privée:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: «L'espace est trop étroit pour moi.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Fais-moi de la place, pour que je puisse m'installer!»
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'et tu diras dans ton cœur:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: «Qui m'a donné ces fils?
- type: usfm
  marker: q1
  children:
  - type: text
    text: J'étais privée d'enfants, j'étais stérile.
- type: usfm
  marker: q1
  children:
  - type: text
    text: J'étais en exil, mise à l'écart. Qui les a élevés?
- type: usfm
  marker: q1
  children:
  - type: text
    text: J'étais restée seule. Ceux-ci, où étaient-ils?»
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Voici ce qu''a dit le Seigneur, l''Eternel:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Je lèverai ma main en direction des nations,
- type: usfm
  marker: q1
  children:
  - type: text
    text: je dresserai mon étendard pour les peuples,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et ils amèneront tes fils en les tenant dans les bras,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ils porteront tes filles sur leurs épaules.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: Des rois seront tes pères adoptifs et leurs princesses tes nourrices.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ils se prosterneront devant toi, le visage contre terre,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et lécheront la poussière de tes pieds.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ainsi, tu reconnaîtras que je suis l'Eternel
- type: usfm
  marker: q1
  children:
  - type: text
    text: et que ceux qui comptent sur moi ne seront pas couverts de honte.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: Arrachera-t-on à un homme fort sa capture?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Les prisonniers justes s'échapperont-ils?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Voici ce que dit l''Eternel: Les prisonniers de l''homme fort lui seront arrachés'
- type: usfm
  marker: q1
  children:
  - type: text
    text: et la capture de l'homme violent s'échappera. J'accuserai moi-même tes accusateurs
- type: usfm
  marker: q1
  children:
  - type: text
    text: et je sauverai moi-même tes fils.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: Je ferai manger leur propre chair à tes oppresseurs,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ils s'enivreront avec leur propre sang comme si c'était du vin nouveau
- type: usfm
  marker: q1
  children:
  - type: text
    text: et tous reconnaîtront que je suis l'Eternel, ton sauveur,
- type: usfm
  marker: q1
  children:
  - type: text
    text: celui qui te rachète, le Dieu puissant de Jacob.
