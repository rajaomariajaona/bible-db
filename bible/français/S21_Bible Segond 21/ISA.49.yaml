document_id: ISA.49,152
type_code: fra
verses:
  '1':
  - type: heading
    content: Le Sauveur d'Israël et des nations
  - type: text
    content: Iles, écoutez-moi! Peuples lointains, soyez attentifs!
  - type: text
    content: L'Eternel m'a appelé dès le ventre de ma mère,
  - type: text
    content: il a mentionné mon nom dès avant ma naissance.
  '10':
  - type: text
    content: '*Ils n''auront plus faim, ils n''auront plus soif,'
  - type: text
    content: la chaleur brûlante et le soleil ne les frapperont plus.
  - type: note
    content: 'Ils n''auront… plus: cité en Apocalypse 7.16.'
  - type: text
    content: En effet, celui qui a compassion d'eux sera leur guide,
  - type: text
    content: et il les conduira vers des sources d'eau.
  '11':
  - type: text
    content: Je transformerai toutes mes montagnes en chemins
  - type: text
    content: et mes routes seront refaites.
  '12':
  - type: text
    content: 'Les voici, ils viennent de loin:'
  - type: text
    content: les uns du nord, les autres de l'ouest,
  - type: text
    content: d'autres encore du pays de Sinim.
  '13':
  - type: text
    content: Ciel, réjouis-toi!
  - type: text
    content: Terre, crie d'allégresse!
  - type: text
    content: Montagnes, éclatez en cris de joie!
  - type: text
    content: En effet, l'Eternel console son peuple,
  - type: text
    content: il a compassion des plus humbles de ses membres.
  '14':
  - type: text
    content: 'Sion disait: «L''Eternel m''a abandonnée,'
  - type: text
    content: le Seigneur m'a oubliée!»
  '15':
  - type: text
    content: Une femme oublie-t-elle l'enfant qu'elle allaite?
  - type: text
    content: N'a-t-elle pas compassion du fils qui est sorti de son ventre?
  - type: text
    content: Même si elle l'oubliait,
  - type: text
    content: moi je ne t'oublierai jamais.
  '16':
  - type: text
    content: Vois! Je t'ai gravée sur mes mains.
  - type: text
    content: Tes murailles sont constamment devant moi.
  '17':
  - type: text
    content: Tes fils accourent,
  - type: text
    content: tandis que ceux qui t'avaient détruite et dévastée
  - type: text
    content: partent de chez toi.
  '18':
  - type: text
    content: 'Lève les yeux et regarde tout autour:'
  - type: text
    content: tous ils se rassemblent, ils viennent vers toi.
  - type: text
    content: Aussi vrai que je suis vivant, déclare l'Eternel,
  - type: text
    content: tu les enfileras tous comme des bijoux,
  - type: text
    content: tu t'en pareras à la manière d'une fiancée.
  '19':
  - type: text
    content: Oui, dans tes places dévastées et désertes,
  - type: text
    content: dans ton pays ruiné,
  - type: text
    content: tes habitants seront désormais à l'étroit,
  - type: text
    content: et ceux qui te dévoraient s'éloigneront.
  '2':
  - type: text
    content: Il a rendu ma bouche pareille à une épée tranchante,
  - type: text
    content: il m'a couvert de l'ombre de sa main.
  - type: text
    content: Il a fait de moi une flèche aiguë,
  - type: text
    content: il m'a caché dans son carquois.
  '20':
  - type: text
    content: 'Ils te répéteront, ces fils dont tu avais été privée:'
  - type: text
    content: «L'espace est trop étroit pour moi.
  - type: text
    content: Fais-moi de la place, pour que je puisse m'installer!»
  '21':
  - type: text
    content: 'et tu diras dans ton cœur:'
  - type: text
    content: «Qui m'a donné ces fils?
  - type: text
    content: J'étais privée d'enfants, j'étais stérile.
  - type: text
    content: J'étais en exil, mise à l'écart. Qui les a élevés?
  - type: text
    content: J'étais restée seule. Ceux-ci, où étaient-ils?»
  '22':
  - type: text
    content: 'Voici ce qu''a dit le Seigneur, l''Eternel:'
  - type: text
    content: Je lèverai ma main en direction des nations,
  - type: text
    content: je dresserai mon étendard pour les peuples,
  - type: text
    content: et ils amèneront tes fils en les tenant dans les bras,
  - type: text
    content: ils porteront tes filles sur leurs épaules.
  '23':
  - type: text
    content: Des rois seront tes pères adoptifs et leurs princesses tes nourrices.
  - type: text
    content: Ils se prosterneront devant toi, le visage contre terre,
  - type: text
    content: et lécheront la poussière de tes pieds.
  - type: text
    content: Ainsi, tu reconnaîtras que je suis l'Eternel
  - type: text
    content: et que ceux qui comptent sur moi ne seront pas couverts de honte.
  '24':
  - type: text
    content: Arrachera-t-on à un homme fort sa capture?
  - type: text
    content: Les prisonniers justes s'échapperont-ils?
  '25':
  - type: text
    content: 'Voici ce que dit l''Eternel: Les prisonniers de l''homme fort lui seront arrachés'
  - type: text
    content: et la capture de l'homme violent s'échappera. J'accuserai moi-même tes accusateurs
  - type: text
    content: et je sauverai moi-même tes fils.
  '26':
  - type: text
    content: Je ferai manger leur propre chair à tes oppresseurs,
  - type: text
    content: ils s'enivreront avec leur propre sang comme si c'était du vin nouveau
  - type: text
    content: et tous reconnaîtront que je suis l'Eternel, ton sauveur,
  - type: text
    content: celui qui te rachète, le Dieu puissant de Jacob.
  '3':
  - type: text
    content: 'Il m''a dit: «Tu es mon serviteur, Israël.'
  - type: text
    content: Par toi je montrerai ma splendeur.»
  '4':
  - type: text
    content: 'Quant à moi, je disais: «C''est pour rien que je me suis fatigué,'
  - type: text
    content: c'est pour le vide, c'est en pure perte que j'ai épuisé mes forces.»
  - type: text
    content: Pourtant, mon droit est auprès de l'Eternel
  - type: text
    content: et ma récompense auprès de mon Dieu.
  '5':
  - type: text
    content: Maintenant l'Eternel parle,
  - type: text
    content: lui qui m'a formé dès le ventre de ma mère
  - type: text
    content: pour que je sois son serviteur, pour que je ramène Jacob vers lui,
  - type: text
    content: pour qu'Israël soit rassemblé près de lui.
  - type: text
    content: J'ai de l'importance aux yeux de l'Eternel
  - type: text
    content: et mon Dieu est ma force.
  '6':
  - type: text
    content: 'Il dit: «C''est trop peu que tu sois mon serviteur'
  - type: text
    content: pour relever les tribus de Jacob
  - type: text
    content: 'et pour ramener les restes d''Israël:'
  - type: text
    content: '*je t''établis pour être la lumière des nations,'
  - type: text
    content: pour apporter mon salut jusqu'aux extrémités de la terre
  - type: note
    content: 'Je t''établis… terre: appliqué à lui-même par Paul en Actes 13.47.'
  - type: text
    content: .»
  '7':
  - type: text
    content: Voici ce que dit l'Eternel, le Saint d'Israël, celui qui le rachète,
  - type: text
    content: à l'homme qu'on méprise, qui fait horreur à la nation,
  - type: text
    content: 'à l''esclave des tyrans:'
  - type: text
    content: «A ta vue, des rois se lèveront,
  - type: text
    content: des princes se prosterneront
  - type: text
    content: à cause de l'Eternel, qui est fidèle,
  - type: text
    content: du Saint d'Israël, qui t'a choisi.»
  '8':
  - type: text
    content: 'Voici ce que dit l''Eternel:'
  - type: text
    content: '*Au moment favorable je t''ai répondu,'
  - type: text
    content: le jour du salut je t'ai secouru.
  - type: note
    content: 'Au moment… secouru: cité par l''apôtre Paul en 2 Corinthiens 6.2.'
  - type: text
    content: ' Je te protégerai et je t''établirai pour faire alliance avec le peuple,'
  - type: text
    content: pour relever le pays
  - type: text
    content: et distribuer les héritages aujourd'hui dévastés,
  '9':
  - type: text
    content: 'pour dire aux prisonniers: «Sortez!»'
  - type: text
    content: 'et à ceux qui sont dans les ténèbres: «Montrez-vous!»'
  - type: text
    content: Ils trouveront leur nourriture sur les chemins
  - type: text
    content: et des pâturages sur tous les sommets.
