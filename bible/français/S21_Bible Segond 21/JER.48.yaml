document_id: JER.48,152
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Prophétie sur Moab
    marker-yv: yv-h
  - type: usfm
    marker: d
    children:
    - type: text
      text: Sur Moab.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Voici ce que dit l''Eternel, le maître de l''univers, le Dieu d''Israël:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Malheur à Nebo, car elle est dévastée!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Kirjathaïm est couverte de honte car elle est prise,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Misgab est couverte de honte, elle est brisée.
  '10':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Maudit soit celui qui accomplit l'œuvre de l'Eternel avec négligence,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: maudit soit celui qui éloigne son épée du sang!
  '11':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Moab vivait en paix depuis sa jeunesse,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: il était en repos comme un vin sur sa lie.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Il n'a pas été vidé d'un récipient dans un autre,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: il n'est pas parti en exil.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: C'est pourquoi son goût lui est resté
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et son parfum ne s'est pas altéré.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Cependant voici que les jours viennent, déclare l'Eternel,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: où je lui enverrai des hommes pour le transvaser.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ils videront ses récipients
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et feront éclater ses outres.
  '13':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Moab aura honte de Kemosh,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: tout comme la communauté d'Israël a eu honte
  - type: usfm
    marker: q1
    children:
    - type: text
      text: de Béthel, de l'objet de sa confiance.
  '14':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Comment pouvez-vous dire:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: «Nous sommes des guerriers,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: des soldats redoutables prêts à combattre?»
  '15':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Moab est dévasté, ses villes partent en fumée,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: l'élite de ses jeunes gens descend au massacre,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: déclare le roi, celui dont le nom est l'Eternel, le maître de l'univers.
  '16':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: La ruine de Moab va bientôt arriver,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: son malheur va survenir très rapidement.
  '17':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Plaignez-le, vous tous ses voisins,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: vous tous qui connaissez son nom!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Dites: «Comment a-t-il pu être brisé, ce sceptre puissant,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ce bâton majestueux?»
  '18':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Descends du haut de ta gloire, assieds-toi dans la soif,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: habitante de Dibon!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: En effet, le dévastateur de Moab s'en prend à toi,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: il démolit tes forteresses.
  '19':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tiens-toi sur le chemin et fais le guet, habitante d'Aroër!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Interroge le fuyard, le rescapé
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'en demandant: «Qu''est-il arrivé?»'
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: On ne chante plus les louanges de Moab.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'A Hesbon, on a de mauvaises intentions envers lui:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: «Allons-y, supprimons-le du milieu des nations!»
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Toi aussi, Madmen, tu seras réduite au silence,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: car l'épée est sur tes traces.
  '20':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: «Moab est couvert de honte, car il est terrorisé.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Hurlez et criez!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Annoncez sur l'Arnon
  - type: usfm
    marker: q1
    children:
    - type: text
      text: que Moab est dévasté!»
  '21':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Le jugement a atteint le pays de la plaine,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Holon, Jahats, Méphaath,
  '22':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Dibon, Nebo, Beth-Diblathaïm,
  '23':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Kirjathaïm, Beth-Gamul, Beth-Meon,
  '24':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Kerijoth et Botsra, toutes les villes du pays de Moab,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: qu'elles soient près ou loin.
  '25':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: La force de Moab a été abattue,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: son bras est brisé,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: déclare l'Eternel.
  '26':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Enivrez-le, car c'est à l'Eternel qu'il s'est attaqué!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Moab se roule dans son vomi,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: il provoque lui aussi la moquerie.
  '27':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Israël n'était-il pas devenu l'objet de tes moqueries?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Avait-il donc été surpris parmi des voleurs,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: pour que tu ne parles de lui qu'en secouant la tête?
  '28':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Abandonnez les villes et installez-vous dans les rochers,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: habitants de Moab!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Imitez la colombe
  - type: usfm
    marker: q1
    children:
    - type: text
      text: qui construit son nid dans la fente d'un ravin!
  '29':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: '*Nous avons entendu s''exprimer l''orgueil du très arrogant Moab,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sa fierté, son orgueil, son arrogance et son cœur vaniteux.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: On entend des cris à Choronaïm.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: C'est la dévastation, un grand désastre.
  '30':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Pour ma part, je connais bien ses excès, déclare l'Eternel.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Son bavardage ne vaut rien,
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '48.29-30 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Nous avons… rien: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'renvoi à '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Esaïe 16.6
      - type: usfm
        marker: ft
        children:
        - type: text
          text: .
      marker-yv: yv-n
  - type: usfm
    marker: q1
    children:
    - type: text
      text: pas plus que ce qu'il fait.
  '31':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: C'est pourquoi je me lamente à propos de Moab,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: je crie à cause de tout ce peuple.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: On soupire sur les habitants de Kir-Hérès.
  '32':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Vigne de Sibma, je pleure sur toi plus encore que sur Jaezer.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tes sarments traversaient la mer,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ils atteignaient la mer de Jaezer.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Le dévastateur s'est jeté sur ta récolte de fruits et sur ta vendange.
  '33':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: La joie et l'allégresse ont disparu des vergers
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et du pays de Moab.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'J''ai fait disparaître le vin dans les cuves:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: on ne l'y pressera plus avec des cris de joie.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ces cris ne seront plus des cris de joie.
  '34':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Les cris de détresse venant de Hesbon retentissent jusqu'à Elealé,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ils se font entendre jusqu'à Jahats,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: de Tsoar jusqu'à Choronaïm,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et jusqu'à Eglath-Shelishija,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: car même l'eau de Nimrim a entièrement disparu.
  '35':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Je supprimerai de Moab, déclare l'Eternel,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: celui qui monte sur les hauts lieux
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et qui fait brûler de l'encens en l'honneur de son dieu.
  '36':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Aussi mon cœur émet-il un son plaintif sur Moab, comme le font des flûtes.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mon cœur émet un son plaintif comme celui des flûtes sur les habitants de Kir-Hérès,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: parce que les biens qu'ils avaient entassés sont perdus.
  '37':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: En effet, toutes les têtes sont tondues
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et toutes les barbes sont rasées.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Sur toutes les mains il y a des incisions,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et autour de la taille des sacs.
  '38':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Sur tous les toits et sur les places de Moab,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ce ne sont que lamentations,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: parce que j'ai brisé Moab comme on brise un vase qu'on n'aime plus,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: déclare l'Eternel.
  '39':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Comment! Il est brisé! Lamentez-vous!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Comment! Moab tourne honteusement le dos!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Moab provoque la moquerie et la terreur
  - type: usfm
    marker: q1
    children:
    - type: text
      text: chez tous ses voisins.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Moab est brisé. Ses plus petits font entendre leurs cris.
  '40':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'En effet, voici ce que dit l''Eternel:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Il plane comme l'aigle,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: il déploie ses ailes sur Moab.
  '41':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Kerijoth est prise,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: les forteresses sont occupées
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et, ce jour-là, le cœur des guerriers de Moab
  - type: usfm
    marker: q1
    children:
    - type: text
      text: est pareil à celui d'une femme prête à accoucher.
  '42':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Moab sera exterminé. Il cessera d'être un peuple,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: car c'est à l'Eternel qu'il s'est attaqué.
  '43':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: '*La terreur, le trou et le piège'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: te menacent, habitant de Moab,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: déclare l'Eternel.
  '44':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Celui qui prendra la fuite devant la terreur tombera dans le trou
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et celui qui remontera du trou sera pris dans le piège,
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '48.43-44 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'La terreur… dans le piège: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: citation d'
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Esaïe 24.17-18
      - type: usfm
        marker: ft
        children:
        - type: text
          text: .
      marker-yv: yv-n
  - type: usfm
    marker: q1
    children:
    - type: text
      text: car je fais venir sur lui, sur Moab,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: l'année de mon intervention contre lui, déclare l'Eternel.
  '45':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: A l'ombre de Hesbon les fuyards s'arrêtent, épuisés,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: mais *un feu sort de Hesbon,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: une flamme sort du milieu de Sihon.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Elle dévore les tempes de Moab
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et le crâne de ces hommes tapageurs.
  '46':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Malheur à toi, Moab!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Le peuple de Kemosh est perdu!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Oui, tes fils et tes filles sont faits prisonniers.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '48.45-46 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Un feu… prisonniers: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: citation avec quelques omissions de Nombres 21.28-29.
      marker-yv: yv-n
  '47':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Cependant, dans l'avenir, je ramènerai les déportés de Moab, déclare l'Eternel.
  - type: usfm
    marker: d
    children:
    - type: text
      text: Fin du jugement de Moab.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: C'est avec un torrent de larmes qu'ils gravissent la montée de Luchith
  - type: usfm
    marker: q1
    children:
    - type: text
      text: parce qu'ils ont entendu avec angoisse les cris provenant du désastre dans la descente de Choronaïm.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fuyez, sauvez votre vie,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: devenez pareils au genévrier dans le désert!
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Oui, parce que tu as placé ta confiance dans tes réalisations et dans tes trésors,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: toi aussi, tu seras pris.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Kemosh partira en exil
  - type: usfm
    marker: q1
    children:
    - type: text
      text: avec ses prêtres et ses chefs.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Le dévastateur pénétrera dans chaque ville,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: aucune ne lui échappera.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: La vallée connaîtra la ruine et la plaine sera détruite,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: comme l'Eternel l'a dit.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Donnez des ailes à Moab,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: qu'il s'envole!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ses villes deviendront des déserts inhabités.
