document_id: JER.48,152
type_code: fra
verses:
  '1':
  - type: heading
    content: Prophétie sur Moab
  - type: text
    content: Sur Moab.
  - type: text
    content: 'Voici ce que dit l''Eternel, le maître de l''univers, le Dieu d''Israël:'
  - type: text
    content: Malheur à Nebo, car elle est dévastée!
  - type: text
    content: Kirjathaïm est couverte de honte car elle est prise,
  - type: text
    content: Misgab est couverte de honte, elle est brisée.
  '10':
  - type: text
    content: Maudit soit celui qui accomplit l'œuvre de l'Eternel avec négligence,
  - type: text
    content: maudit soit celui qui éloigne son épée du sang!
  '11':
  - type: text
    content: Moab vivait en paix depuis sa jeunesse,
  - type: text
    content: il était en repos comme un vin sur sa lie.
  - type: text
    content: Il n'a pas été vidé d'un récipient dans un autre,
  - type: text
    content: il n'est pas parti en exil.
  - type: text
    content: C'est pourquoi son goût lui est resté
  - type: text
    content: et son parfum ne s'est pas altéré.
  '12':
  - type: text
    content: Cependant voici que les jours viennent, déclare l'Eternel,
  - type: text
    content: où je lui enverrai des hommes pour le transvaser.
  - type: text
    content: Ils videront ses récipients
  - type: text
    content: et feront éclater ses outres.
  '13':
  - type: text
    content: Moab aura honte de Kemosh,
  - type: text
    content: tout comme la communauté d'Israël a eu honte
  - type: text
    content: de Béthel, de l'objet de sa confiance.
  '14':
  - type: text
    content: 'Comment pouvez-vous dire:'
  - type: text
    content: «Nous sommes des guerriers,
  - type: text
    content: des soldats redoutables prêts à combattre?»
  '15':
  - type: text
    content: Moab est dévasté, ses villes partent en fumée,
  - type: text
    content: l'élite de ses jeunes gens descend au massacre,
  - type: text
    content: déclare le roi, celui dont le nom est l'Eternel, le maître de l'univers.
  '16':
  - type: text
    content: La ruine de Moab va bientôt arriver,
  - type: text
    content: son malheur va survenir très rapidement.
  '17':
  - type: text
    content: Plaignez-le, vous tous ses voisins,
  - type: text
    content: vous tous qui connaissez son nom!
  - type: text
    content: 'Dites: «Comment a-t-il pu être brisé, ce sceptre puissant,'
  - type: text
    content: ce bâton majestueux?»
  '18':
  - type: text
    content: Descends du haut de ta gloire, assieds-toi dans la soif,
  - type: text
    content: habitante de Dibon!
  - type: text
    content: En effet, le dévastateur de Moab s'en prend à toi,
  - type: text
    content: il démolit tes forteresses.
  '19':
  - type: text
    content: Tiens-toi sur le chemin et fais le guet, habitante d'Aroër!
  - type: text
    content: Interroge le fuyard, le rescapé
  - type: text
    content: 'en demandant: «Qu''est-il arrivé?»'
  '2':
  - type: text
    content: On ne chante plus les louanges de Moab.
  - type: text
    content: 'A Hesbon, on a de mauvaises intentions envers lui:'
  - type: text
    content: «Allons-y, supprimons-le du milieu des nations!»
  - type: text
    content: Toi aussi, Madmen, tu seras réduite au silence,
  - type: text
    content: car l'épée est sur tes traces.
  '20':
  - type: text
    content: «Moab est couvert de honte, car il est terrorisé.
  - type: text
    content: Hurlez et criez!
  - type: text
    content: Annoncez sur l'Arnon
  - type: text
    content: que Moab est dévasté!»
  '21':
  - type: text
    content: Le jugement a atteint le pays de la plaine,
  - type: text
    content: Holon, Jahats, Méphaath,
  '22':
  - type: text
    content: Dibon, Nebo, Beth-Diblathaïm,
  '23':
  - type: text
    content: Kirjathaïm, Beth-Gamul, Beth-Meon,
  '24':
  - type: text
    content: Kerijoth et Botsra, toutes les villes du pays de Moab,
  - type: text
    content: qu'elles soient près ou loin.
  '25':
  - type: text
    content: La force de Moab a été abattue,
  - type: text
    content: son bras est brisé,
  - type: text
    content: déclare l'Eternel.
  '26':
  - type: text
    content: Enivrez-le, car c'est à l'Eternel qu'il s'est attaqué!
  - type: text
    content: Moab se roule dans son vomi,
  - type: text
    content: il provoque lui aussi la moquerie.
  '27':
  - type: text
    content: Israël n'était-il pas devenu l'objet de tes moqueries?
  - type: text
    content: Avait-il donc été surpris parmi des voleurs,
  - type: text
    content: pour que tu ne parles de lui qu'en secouant la tête?
  '28':
  - type: text
    content: Abandonnez les villes et installez-vous dans les rochers,
  - type: text
    content: habitants de Moab!
  - type: text
    content: Imitez la colombe
  - type: text
    content: qui construit son nid dans la fente d'un ravin!
  '29':
  - type: text
    content: '*Nous avons entendu s''exprimer l''orgueil du très arrogant Moab,'
  - type: text
    content: sa fierté, son orgueil, son arrogance et son cœur vaniteux.
  '3':
  - type: text
    content: On entend des cris à Choronaïm.
  - type: text
    content: C'est la dévastation, un grand désastre.
  '30':
  - type: text
    content: Pour ma part, je connais bien ses excès, déclare l'Eternel.
  - type: text
    content: Son bavardage ne vaut rien,
  - type: note
    content: 'Nous avons… rien: renvoi à Esaïe 16.6.'
  - type: text
    content: pas plus que ce qu'il fait.
  '31':
  - type: text
    content: C'est pourquoi je me lamente à propos de Moab,
  - type: text
    content: je crie à cause de tout ce peuple.
  - type: text
    content: On soupire sur les habitants de Kir-Hérès.
  '32':
  - type: text
    content: Vigne de Sibma, je pleure sur toi plus encore que sur Jaezer.
  - type: text
    content: Tes sarments traversaient la mer,
  - type: text
    content: ils atteignaient la mer de Jaezer.
  - type: text
    content: Le dévastateur s'est jeté sur ta récolte de fruits et sur ta vendange.
  '33':
  - type: text
    content: La joie et l'allégresse ont disparu des vergers
  - type: text
    content: et du pays de Moab.
  - type: text
    content: 'J''ai fait disparaître le vin dans les cuves:'
  - type: text
    content: on ne l'y pressera plus avec des cris de joie.
  - type: text
    content: Ces cris ne seront plus des cris de joie.
  '34':
  - type: text
    content: Les cris de détresse venant de Hesbon retentissent jusqu'à Elealé,
  - type: text
    content: ils se font entendre jusqu'à Jahats,
  - type: text
    content: de Tsoar jusqu'à Choronaïm,
  - type: text
    content: et jusqu'à Eglath-Shelishija,
  - type: text
    content: car même l'eau de Nimrim a entièrement disparu.
  '35':
  - type: text
    content: Je supprimerai de Moab, déclare l'Eternel,
  - type: text
    content: celui qui monte sur les hauts lieux
  - type: text
    content: et qui fait brûler de l'encens en l'honneur de son dieu.
  '36':
  - type: text
    content: Aussi mon cœur émet-il un son plaintif sur Moab, comme le font des flûtes.
  - type: text
    content: Mon cœur émet un son plaintif comme celui des flûtes sur les habitants de Kir-Hérès,
  - type: text
    content: parce que les biens qu'ils avaient entassés sont perdus.
  '37':
  - type: text
    content: En effet, toutes les têtes sont tondues
  - type: text
    content: et toutes les barbes sont rasées.
  - type: text
    content: Sur toutes les mains il y a des incisions,
  - type: text
    content: et autour de la taille des sacs.
  '38':
  - type: text
    content: Sur tous les toits et sur les places de Moab,
  - type: text
    content: ce ne sont que lamentations,
  - type: text
    content: parce que j'ai brisé Moab comme on brise un vase qu'on n'aime plus,
  - type: text
    content: déclare l'Eternel.
  '39':
  - type: text
    content: Comment! Il est brisé! Lamentez-vous!
  - type: text
    content: Comment! Moab tourne honteusement le dos!
  - type: text
    content: Moab provoque la moquerie et la terreur
  - type: text
    content: chez tous ses voisins.
  '4':
  - type: text
    content: Moab est brisé. Ses plus petits font entendre leurs cris.
  '40':
  - type: text
    content: 'En effet, voici ce que dit l''Eternel:'
  - type: text
    content: Il plane comme l'aigle,
  - type: text
    content: il déploie ses ailes sur Moab.
  '41':
  - type: text
    content: Kerijoth est prise,
  - type: text
    content: les forteresses sont occupées
  - type: text
    content: et, ce jour-là, le cœur des guerriers de Moab
  - type: text
    content: est pareil à celui d'une femme prête à accoucher.
  '42':
  - type: text
    content: Moab sera exterminé. Il cessera d'être un peuple,
  - type: text
    content: car c'est à l'Eternel qu'il s'est attaqué.
  '43':
  - type: text
    content: '*La terreur, le trou et le piège'
  - type: text
    content: te menacent, habitant de Moab,
  - type: text
    content: déclare l'Eternel.
  '44':
  - type: text
    content: Celui qui prendra la fuite devant la terreur tombera dans le trou
  - type: text
    content: et celui qui remontera du trou sera pris dans le piège,
  - type: note
    content: 'La terreur… dans le piège: citation d''Esaïe 24.17-18.'
  - type: text
    content: car je fais venir sur lui, sur Moab,
  - type: text
    content: l'année de mon intervention contre lui, déclare l'Eternel.
  '45':
  - type: text
    content: A l'ombre de Hesbon les fuyards s'arrêtent, épuisés,
  - type: text
    content: mais *un feu sort de Hesbon,
  - type: text
    content: une flamme sort du milieu de Sihon.
  - type: text
    content: Elle dévore les tempes de Moab
  - type: text
    content: et le crâne de ces hommes tapageurs.
  '46':
  - type: text
    content: Malheur à toi, Moab!
  - type: text
    content: Le peuple de Kemosh est perdu!
  - type: text
    content: Oui, tes fils et tes filles sont faits prisonniers.
  - type: note
    content: 'Un feu… prisonniers: citation avec quelques omissions de Nombres 21.28-29.'
  '47':
  - type: text
    content: Cependant, dans l'avenir, je ramènerai les déportés de Moab, déclare l'Eternel.
  - type: text
    content: Fin du jugement de Moab.
  '5':
  - type: text
    content: C'est avec un torrent de larmes qu'ils gravissent la montée de Luchith
  - type: text
    content: parce qu'ils ont entendu avec angoisse les cris provenant du désastre dans la descente de Choronaïm.
  '6':
  - type: text
    content: Fuyez, sauvez votre vie,
  - type: text
    content: devenez pareils au genévrier dans le désert!
  '7':
  - type: text
    content: Oui, parce que tu as placé ta confiance dans tes réalisations et dans tes trésors,
  - type: text
    content: toi aussi, tu seras pris.
  - type: text
    content: Kemosh partira en exil
  - type: text
    content: avec ses prêtres et ses chefs.
  '8':
  - type: text
    content: Le dévastateur pénétrera dans chaque ville,
  - type: text
    content: aucune ne lui échappera.
  - type: text
    content: La vallée connaîtra la ruine et la plaine sera détruite,
  - type: text
    content: comme l'Eternel l'a dit.
  '9':
  - type: text
    content: Donnez des ailes à Moab,
  - type: text
    content: qu'il s'envole!
  - type: text
    content: Ses villes deviendront des déserts inhabités.
