document_id: PSA.42,152
type_code: fra
verses:
  '1':
  - type: usfm
    marker: ms1
    children:
    - type: text
      text: Deuxième livre
    marker-yv: yv-h
  - type: usfm
    marker: mr
    children:
    - type: text
      text: 42–72
    marker-yv: yv-h
  - type: usfm
    marker: s1
    children:
    - type: text
      text: L'espérance en Dieu
    marker-yv: yv-h
  - type: usfm
    marker: d
    children:
    - type: text
      text: Au chef de chœur. Cantique des descendants de Koré.
  '10':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Je dis à Dieu, mon rocher: «Pourquoi m''as-tu oublié?'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Pourquoi dois-je marcher dans la tristesse,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sous l'oppression de l'ennemi?»
  '11':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mes os se brisent quand mes persécuteurs m'insultent
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'et me disent sans cesse: «Où est ton Dieu?»'
  '12':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Pourquoi être abattue, mon âme, et pourquoi gémir en moi?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Espère en Dieu, car je le louerai encore!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Il est mon salut et mon Dieu.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Comme une biche soupire après des cours d'eau,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ainsi mon âme soupire après toi, ô Dieu!
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mon âme a soif de Dieu, du Dieu vivant.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Quand donc pourrai-je me présenter devant Dieu?
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mes larmes sont ma nourriture jour et nuit,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'car on me dit sans cesse: «Où est ton Dieu?»'
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Je me rappelle avec émotion
  - type: usfm
    marker: q1
    children:
    - type: text
      text: l'époque où je marchais entouré de la foule,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: où j'avançais à sa tête vers la maison de Dieu,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: au milieu des cris de joie et de reconnaissance
  - type: usfm
    marker: q1
    children:
    - type: text
      text: d'une multitude en fête.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Pourquoi être abattue, mon âme, et gémir en moi?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Espère en Dieu, car je le louerai encore!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Il est mon salut et mon Dieu.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mon âme est abattue en moi;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: aussi, c'est à toi que je pense
  - type: usfm
    marker: q1
    children:
    - type: text
      text: depuis le pays du Jourdain, depuis l'Hermon, depuis le mont Mitsear.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: L'abîme appelle un autre abîme au fracas de tes cascades,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: toutes tes vagues et tous tes flots passent sur moi.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Le jour, l'Eternel m'accordait sa grâce;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: la nuit, je chantais ses louanges,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: j'adressais ma prière au Dieu de ma vie.
