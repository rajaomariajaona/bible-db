document_id: PSA.42
type_code: fra
segments:
- type: usfm
  marker: ms1
  children:
  - type: text
    text: Deuxième livre
  marker-yv: yv-h
- type: usfm
  marker: mr
  children:
  - type: text
    text: 42–72
  marker-yv: yv-h
- type: usfm
  marker: s1
  children:
  - type: text
    text: L'espérance en Dieu
  marker-yv: yv-h
- type: usfm
  marker: d
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Au chef de chœur. Cantique des descendants de Koré.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Comme une biche soupire après des cours d'eau,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ainsi mon âme soupire après toi, ô Dieu!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Mon âme a soif de Dieu, du Dieu vivant.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Quand donc pourrai-je me présenter devant Dieu?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Mes larmes sont ma nourriture jour et nuit,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'car on me dit sans cesse: «Où est ton Dieu?»'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Je me rappelle avec émotion
- type: usfm
  marker: q1
  children:
  - type: text
    text: l'époque où je marchais entouré de la foule,
- type: usfm
  marker: q1
  children:
  - type: text
    text: où j'avançais à sa tête vers la maison de Dieu,
- type: usfm
  marker: q1
  children:
  - type: text
    text: au milieu des cris de joie et de reconnaissance
- type: usfm
  marker: q1
  children:
  - type: text
    text: d'une multitude en fête.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Pourquoi être abattue, mon âme, et gémir en moi?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Espère en Dieu, car je le louerai encore!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Il est mon salut et mon Dieu.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Mon âme est abattue en moi;
- type: usfm
  marker: q1
  children:
  - type: text
    text: aussi, c'est à toi que je pense
- type: usfm
  marker: q1
  children:
  - type: text
    text: depuis le pays du Jourdain, depuis l'Hermon, depuis le mont Mitsear.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: L'abîme appelle un autre abîme au fracas de tes cascades,
- type: usfm
  marker: q1
  children:
  - type: text
    text: toutes tes vagues et tous tes flots passent sur moi.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Le jour, l'Eternel m'accordait sa grâce;
- type: usfm
  marker: q1
  children:
  - type: text
    text: la nuit, je chantais ses louanges,
- type: usfm
  marker: q1
  children:
  - type: text
    text: j'adressais ma prière au Dieu de ma vie.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Je dis à Dieu, mon rocher: «Pourquoi m''as-tu oublié?'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Pourquoi dois-je marcher dans la tristesse,
- type: usfm
  marker: q1
  children:
  - type: text
    text: sous l'oppression de l'ennemi?»
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Mes os se brisent quand mes persécuteurs m'insultent
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'et me disent sans cesse: «Où est ton Dieu?»'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Pourquoi être abattue, mon âme, et pourquoi gémir en moi?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Espère en Dieu, car je le louerai encore!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Il est mon salut et mon Dieu.
