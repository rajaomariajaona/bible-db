document_id: PSA.42,152
type_code: fra
verses:
  '1':
  - type: heading
    content: Deuxième livre
  - type: heading
    content: 42–72
  - type: heading
    content: L'espérance en Dieu
  - type: text
    content: Au chef de chœur. Cantique des descendants de Koré.
  '10':
  - type: text
    content: 'Je dis à Dieu, mon rocher: «Pourquoi m''as-tu oublié?'
  - type: text
    content: Pourquoi dois-je marcher dans la tristesse,
  - type: text
    content: sous l'oppression de l'ennemi?»
  '11':
  - type: text
    content: Mes os se brisent quand mes persécuteurs m'insultent
  - type: text
    content: 'et me disent sans cesse: «Où est ton Dieu?»'
  '12':
  - type: text
    content: Pourquoi être abattue, mon âme, et pourquoi gémir en moi?
  - type: text
    content: Espère en Dieu, car je le louerai encore!
  - type: text
    content: Il est mon salut et mon Dieu.
  '2':
  - type: text
    content: Comme une biche soupire après des cours d'eau,
  - type: text
    content: ainsi mon âme soupire après toi, ô Dieu!
  '3':
  - type: text
    content: Mon âme a soif de Dieu, du Dieu vivant.
  - type: text
    content: Quand donc pourrai-je me présenter devant Dieu?
  '4':
  - type: text
    content: Mes larmes sont ma nourriture jour et nuit,
  - type: text
    content: 'car on me dit sans cesse: «Où est ton Dieu?»'
  '5':
  - type: text
    content: Je me rappelle avec émotion
  - type: text
    content: l'époque où je marchais entouré de la foule,
  - type: text
    content: où j'avançais à sa tête vers la maison de Dieu,
  - type: text
    content: au milieu des cris de joie et de reconnaissance
  - type: text
    content: d'une multitude en fête.
  '6':
  - type: text
    content: Pourquoi être abattue, mon âme, et gémir en moi?
  - type: text
    content: Espère en Dieu, car je le louerai encore!
  - type: text
    content: Il est mon salut et mon Dieu.
  '7':
  - type: text
    content: Mon âme est abattue en moi;
  - type: text
    content: aussi, c'est à toi que je pense
  - type: text
    content: depuis le pays du Jourdain, depuis l'Hermon, depuis le mont Mitsear.
  '8':
  - type: text
    content: L'abîme appelle un autre abîme au fracas de tes cascades,
  - type: text
    content: toutes tes vagues et tous tes flots passent sur moi.
  '9':
  - type: text
    content: Le jour, l'Eternel m'accordait sa grâce;
  - type: text
    content: la nuit, je chantais ses louanges,
  - type: text
    content: j'adressais ma prière au Dieu de ma vie.
