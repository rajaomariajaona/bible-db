document_id: ISA.10,152
type_code: fra
verses:
  '1':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: Malheur à ceux qui promulguent des règles injustes
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et à ceux qui transcrivent des décrets oppressifs
  '10':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: Puisque je me suis emparé des royaumes des faux dieux,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: alors que leurs sculptures sacrées étaient plus nombreuses qu'à Jérusalem et à Samarie,
  '11':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: ce que j'ai fait à Samarie et à ses faux dieux,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: je le ferai à Jérusalem et à ses statues.»
  '12':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: Cependant, lorsque moi, le Seigneur, j'aurai mis un terme à toute mon œuvre
  - type: usfm
    marker: q1
    children:
    - type: text
      text: contre le mont Sion et contre Jérusalem,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: j'interviendrai contre le roi d'Assyrie à cause du fruit de son orgueil
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et de l'arrogance de son regard.
  '13':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'En effet, il se dit: «C''est par la force de ma main que j''ai agi,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: c'est par ma sagesse, car je suis intelligent.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: J'ai supprimé les frontières des peuples et pillé leurs trésors.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Pareil à un héros, j'ai fait descendre de leur trône ceux qui y siégeaient.
  '14':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: J'ai fait main basse sur les richesses des peuples aussi facilement que sur un nid
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et j'ai ramassé toute la terre,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'comme on le fait pour des œufs abandonnés:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: il n'y a eu personne pour remuer l'aile,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ouvrir le bec ou pousser un cri.»
  '15':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: La hache se vante-t-elle aux dépens de celui qui se sert d'elle?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: La scie se montre-t-elle arrogante vis-à-vis de celui qui la manie?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: C'est comme si le gourdin faisait bouger celui qui le brandit,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: comme si le bâton soulevait celui qui n'est pas un simple morceau de bois!
  '16':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: C'est pourquoi le Seigneur, l'Eternel, le maître de l'univers, enverra
  - type: usfm
    marker: q1
    children:
    - type: text
      text: le dépérissement parmi ses robustes guerriers;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: parmi ses dignitaires éclatera un incendie
  - type: usfm
    marker: q1
    children:
    - type: text
      text: pareil à celui d'un feu.
  '17':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: La lumière d'Israël deviendra un feu
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et son Saint sera une flamme
  - type: usfm
    marker: q1
    children:
    - type: text
      text: qui brûlera et dévastera ses buissons épineux et ses ronces
  - type: usfm
    marker: q1
    children:
    - type: text
      text: en un seul jour,
  '18':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: qui fera entièrement disparaître
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'la gloire de sa forêt et de son verger:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: elle ressemblera à un malade qui dépérit.
  '19':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: On pourra compter ce qui restera des arbres de sa forêt
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et un enfant sera capable d'écrire leur nombre.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: pour écarter les plus faibles des tribunaux
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et priver les plus humbles de mon peuple de leurs droits,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: pour faire des veuves leur proie
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et dépouiller les orphelins!
  '20':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: Ce jour-là,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: le reste d'Israël et les rescapés de la famille de Jacob
  - type: usfm
    marker: q1
    children:
    - type: text
      text: cesseront de s'appuyer sur celui qui les frappait;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ils s'appuieront vraiment sur l'Eternel, le Saint d'Israël.
  '21':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: Un reste, le reste de Jacob,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: reviendra vers le Dieu puissant.
  '22':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: '*Même si ton peuple, Israël, était pareil au sable de la mer,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: un reste seulement reviendra.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: La destruction est décidée, elle déborde de justice.
  '23':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: Et cette destruction qui a été décidée,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: le Seigneur, l'Eternel, le maître de l'univers, l'accomplira dans tout le pays.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '10.22-23 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Même si… pays: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'cité en '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Romains 9.27-28
      - type: usfm
        marker: ft
        children:
        - type: text
          text: .
      marker-yv: yv-n
  '24':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: 'Cependant, voici ce que dit le Seigneur, l''Eternel, le maître de l''univers:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: «Toi, mon peuple qui habites en Sion, n'aie pas peur de l'Assyrien!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Il te frappe à coups de bâton,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: il lève son gourdin contre toi comme le faisaient les Egyptiens,
  '25':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: mais encore un peu, très peu de temps,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'et ma fureur contre toi prendra fin:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ma colère se dirigera contre lui pour le détruire.»
  '26':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: L'Eternel, le maître de l'univers, brandira le fouet contre lui
  - type: usfm
    marker: q1
    children:
    - type: text
      text: tout comme il a frappé Madian au rocher d'Oreb,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et il lèvera encore son bâton sur la mer
  - type: usfm
    marker: q1
    children:
    - type: text
      text: comme il l'a fait en Egypte.
  '27':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: Ce jour-là, le fardeau qu'il faisait peser sur toi sera retiré,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: la domination qu'il exerçait sera écartée;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: brisée, elle laissera place à la bénédiction.
  '28':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: Il marche sur Ajjath, traverse Migron,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: laisse ses bagages à Micmash.
  '29':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: Ils passent le défilé,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ils couchent à Guéba.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Rama tremble,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Guibea, la ville de Saül, prend la fuite.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: Que ferez-vous le jour où il interviendra,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: lorsque la dévastation arrivera de loin?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Vers qui fuirez-vous pour trouver de l'aide
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et où laisserez-vous votre gloire?
  '30':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '30'
    - type: text
      text: Pousse des cris d'angoisse, fille de Gallim!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fais attention, Laïsha! Malheur à toi, Anathoth!
  '31':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '31'
    - type: text
      text: Madména se disperse,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: les habitants de Guébim cherchent un refuge.
  '32':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '32'
    - type: text
      text: Le même jour, il fait halte à Nob
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et menace la montagne de la fille de Sion,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: la colline de Jérusalem.
  '33':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '33'
    - type: text
      text: Voici que le Seigneur, l'Eternel, le maître de l'univers,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'brise les branches avec violence:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: les plus hauts arbres sont abattus,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: les plus élevés sont jetés par terre.
  '34':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '34'
    - type: text
      text: Il taille avec le fer les buissons de la forêt
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et le Liban s'effondre sous les coups du Dieu puissant.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: Les uns seront courbés parmi les prisonniers,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: les autres tomberont parmi les condamnés à mort.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mais malgré tout cela, sa colère ne se détourne pas
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et sa puissance est encore déployée.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Jugement de l'Assyrie
    marker-yv: yv-h
  '5':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: Malheur à l'Assyrien, bâton de ma colère!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Le gourdin dans sa main, c'est l'instrument de ma colère.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: Je l'ai lâché contre une nation impie,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: je l'ai
  - type: usfm
    marker: q1
    children:
    - type: text
      text: fait marcher contre le peuple qui déclenche ma fureur,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: pour qu'il s'y livre au pillage et qu'il y fasse du butin,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: pour qu'il le piétine comme la boue des rues.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: Cependant, le roi d'Assyrie ne voit pas la situation de cette manière
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et ce n'est pas le projet que forme son cœur;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: il ne pense qu'à détruire,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: qu'à éliminer des nations, et pas en petit nombre!
  '8':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'En effet, il se dit:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: «Mes officiers ne sont-ils pas autant de rois?
  '9':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: Le sort de Calno n'a-t-il pas été identique à celui de Karkemish,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: le sort de Hamath à celui d'Arpad,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: le sort de Samarie à celui de Damas?
