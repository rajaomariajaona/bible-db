document_id: ISA.10,152
type_code: fra
verses:
  '1':
  - type: text
    content: Malheur à ceux qui promulguent des règles injustes
  - type: text
    content: et à ceux qui transcrivent des décrets oppressifs
  '10':
  - type: text
    content: Puisque je me suis emparé des royaumes des faux dieux,
  - type: text
    content: alors que leurs sculptures sacrées étaient plus nombreuses qu'à Jérusalem et à Samarie,
  '11':
  - type: text
    content: ce que j'ai fait à Samarie et à ses faux dieux,
  - type: text
    content: je le ferai à Jérusalem et à ses statues.»
  '12':
  - type: text
    content: Cependant, lorsque moi, le Seigneur, j'aurai mis un terme à toute mon œuvre
  - type: text
    content: contre le mont Sion et contre Jérusalem,
  - type: text
    content: j'interviendrai contre le roi d'Assyrie à cause du fruit de son orgueil
  - type: text
    content: et de l'arrogance de son regard.
  '13':
  - type: text
    content: 'En effet, il se dit: «C''est par la force de ma main que j''ai agi,'
  - type: text
    content: c'est par ma sagesse, car je suis intelligent.
  - type: text
    content: J'ai supprimé les frontières des peuples et pillé leurs trésors.
  - type: text
    content: Pareil à un héros, j'ai fait descendre de leur trône ceux qui y siégeaient.
  '14':
  - type: text
    content: J'ai fait main basse sur les richesses des peuples aussi facilement que sur un nid
  - type: text
    content: et j'ai ramassé toute la terre,
  - type: text
    content: 'comme on le fait pour des œufs abandonnés:'
  - type: text
    content: il n'y a eu personne pour remuer l'aile,
  - type: text
    content: ouvrir le bec ou pousser un cri.»
  '15':
  - type: text
    content: La hache se vante-t-elle aux dépens de celui qui se sert d'elle?
  - type: text
    content: La scie se montre-t-elle arrogante vis-à-vis de celui qui la manie?
  - type: text
    content: C'est comme si le gourdin faisait bouger celui qui le brandit,
  - type: text
    content: comme si le bâton soulevait celui qui n'est pas un simple morceau de bois!
  '16':
  - type: text
    content: C'est pourquoi le Seigneur, l'Eternel, le maître de l'univers, enverra
  - type: text
    content: le dépérissement parmi ses robustes guerriers;
  - type: text
    content: parmi ses dignitaires éclatera un incendie
  - type: text
    content: pareil à celui d'un feu.
  '17':
  - type: text
    content: La lumière d'Israël deviendra un feu
  - type: text
    content: et son Saint sera une flamme
  - type: text
    content: qui brûlera et dévastera ses buissons épineux et ses ronces
  - type: text
    content: en un seul jour,
  '18':
  - type: text
    content: qui fera entièrement disparaître
  - type: text
    content: 'la gloire de sa forêt et de son verger:'
  - type: text
    content: elle ressemblera à un malade qui dépérit.
  '19':
  - type: text
    content: On pourra compter ce qui restera des arbres de sa forêt
  - type: text
    content: et un enfant sera capable d'écrire leur nombre.
  '2':
  - type: text
    content: pour écarter les plus faibles des tribunaux
  - type: text
    content: et priver les plus humbles de mon peuple de leurs droits,
  - type: text
    content: pour faire des veuves leur proie
  - type: text
    content: et dépouiller les orphelins!
  '20':
  - type: text
    content: Ce jour-là,
  - type: text
    content: le reste d'Israël et les rescapés de la famille de Jacob
  - type: text
    content: cesseront de s'appuyer sur celui qui les frappait;
  - type: text
    content: ils s'appuieront vraiment sur l'Eternel, le Saint d'Israël.
  '21':
  - type: text
    content: Un reste, le reste de Jacob,
  - type: text
    content: reviendra vers le Dieu puissant.
  '22':
  - type: text
    content: '*Même si ton peuple, Israël, était pareil au sable de la mer,'
  - type: text
    content: un reste seulement reviendra.
  - type: text
    content: La destruction est décidée, elle déborde de justice.
  '23':
  - type: text
    content: Et cette destruction qui a été décidée,
  - type: text
    content: le Seigneur, l'Eternel, le maître de l'univers, l'accomplira dans tout le pays.
  - type: note
    content: 'Même si… pays: cité en Romains 9.27-28.'
  '24':
  - type: text
    content: 'Cependant, voici ce que dit le Seigneur, l''Eternel, le maître de l''univers:'
  - type: text
    content: «Toi, mon peuple qui habites en Sion, n'aie pas peur de l'Assyrien!
  - type: text
    content: Il te frappe à coups de bâton,
  - type: text
    content: il lève son gourdin contre toi comme le faisaient les Egyptiens,
  '25':
  - type: text
    content: mais encore un peu, très peu de temps,
  - type: text
    content: 'et ma fureur contre toi prendra fin:'
  - type: text
    content: ma colère se dirigera contre lui pour le détruire.»
  '26':
  - type: text
    content: L'Eternel, le maître de l'univers, brandira le fouet contre lui
  - type: text
    content: tout comme il a frappé Madian au rocher d'Oreb,
  - type: text
    content: et il lèvera encore son bâton sur la mer
  - type: text
    content: comme il l'a fait en Egypte.
  '27':
  - type: text
    content: Ce jour-là, le fardeau qu'il faisait peser sur toi sera retiré,
  - type: text
    content: la domination qu'il exerçait sera écartée;
  - type: text
    content: brisée, elle laissera place à la bénédiction.
  '28':
  - type: text
    content: Il marche sur Ajjath, traverse Migron,
  - type: text
    content: laisse ses bagages à Micmash.
  '29':
  - type: text
    content: Ils passent le défilé,
  - type: text
    content: ils couchent à Guéba.
  - type: text
    content: Rama tremble,
  - type: text
    content: Guibea, la ville de Saül, prend la fuite.
  '3':
  - type: text
    content: Que ferez-vous le jour où il interviendra,
  - type: text
    content: lorsque la dévastation arrivera de loin?
  - type: text
    content: Vers qui fuirez-vous pour trouver de l'aide
  - type: text
    content: et où laisserez-vous votre gloire?
  '30':
  - type: text
    content: Pousse des cris d'angoisse, fille de Gallim!
  - type: text
    content: Fais attention, Laïsha! Malheur à toi, Anathoth!
  '31':
  - type: text
    content: Madména se disperse,
  - type: text
    content: les habitants de Guébim cherchent un refuge.
  '32':
  - type: text
    content: Le même jour, il fait halte à Nob
  - type: text
    content: et menace la montagne de la fille de Sion,
  - type: text
    content: la colline de Jérusalem.
  '33':
  - type: text
    content: Voici que le Seigneur, l'Eternel, le maître de l'univers,
  - type: text
    content: 'brise les branches avec violence:'
  - type: text
    content: les plus hauts arbres sont abattus,
  - type: text
    content: les plus élevés sont jetés par terre.
  '34':
  - type: text
    content: Il taille avec le fer les buissons de la forêt
  - type: text
    content: et le Liban s'effondre sous les coups du Dieu puissant.
  '4':
  - type: text
    content: Les uns seront courbés parmi les prisonniers,
  - type: text
    content: les autres tomberont parmi les condamnés à mort.
  - type: text
    content: Mais malgré tout cela, sa colère ne se détourne pas
  - type: text
    content: et sa puissance est encore déployée.
  - type: heading
    content: Jugement de l'Assyrie
  '5':
  - type: text
    content: Malheur à l'Assyrien, bâton de ma colère!
  - type: text
    content: Le gourdin dans sa main, c'est l'instrument de ma colère.
  '6':
  - type: text
    content: Je l'ai lâché contre une nation impie,
  - type: text
    content: je l'ai
  - type: text
    content: fait marcher contre le peuple qui déclenche ma fureur,
  - type: text
    content: pour qu'il s'y livre au pillage et qu'il y fasse du butin,
  - type: text
    content: pour qu'il le piétine comme la boue des rues.
  '7':
  - type: text
    content: Cependant, le roi d'Assyrie ne voit pas la situation de cette manière
  - type: text
    content: et ce n'est pas le projet que forme son cœur;
  - type: text
    content: il ne pense qu'à détruire,
  - type: text
    content: qu'à éliminer des nations, et pas en petit nombre!
  '8':
  - type: text
    content: 'En effet, il se dit:'
  - type: text
    content: «Mes officiers ne sont-ils pas autant de rois?
  '9':
  - type: text
    content: Le sort de Calno n'a-t-il pas été identique à celui de Karkemish,
  - type: text
    content: le sort de Hamath à celui d'Arpad,
  - type: text
    content: le sort de Samarie à celui de Damas?
