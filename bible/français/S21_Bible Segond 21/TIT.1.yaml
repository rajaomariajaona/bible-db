document_id: TIT.1,152
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Adresse et salutation
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'De la part de Paul, serviteur de Dieu et apôtre de Jésus-Christ. – J''ai été chargé d''amener ceux que Dieu a choisis à la foi et à la connaissance de la vérité qui est conforme à la piété, '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: Il y a en effet beaucoup d'hommes insoumis, des discoureurs creux et trompeurs, surtout parmi les circoncis
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1.10 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Les circoncis: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: c'est-à-dire les personnes issues du judaïsme.
      marker-yv: yv-n
    - type: text
      text: '. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'Il faut leur fermer la bouche, car ils bouleversent des familles entières en enseignant ce qu''il ne faut pas pour un gain honteux. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'L''un d''eux, leur propre prophète, a dit: «Les Crétois? Toujours menteurs, de méchantes bêtes, des goinfres paresseux.» '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'Ce témoignage est bien vrai. C''est pourquoi reprends-les sévèrement afin qu''ils aient une foi saine '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'et qu''ils ne s''attachent pas à des fables juives et à des commandements émis par des hommes qui se détournent de la vérité. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'Tout est pur pour ceux qui sont purs, mais rien n''est pur pour ceux qui sont souillés et incrédules; bien plus, leur intelligence et leur conscience sont souillées. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: Ils prétendent connaître Dieu, mais ils le renient par leur manière d'agir. Ils sont abominables, rebelles et incompétents pour la moindre œuvre bonne.
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'afin qu''ils aient l''espérance de la vie éternelle. Le Dieu qui ne ment pas l''avait promise avant tous les temps, '
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'et au moment voulu il a révélé sa parole par la prédication qui m''a été confiée sur ordre de Dieu notre Sauveur. – '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'A Tite, mon véritable enfant dans la foi qui nous est commune: que la grâce, [la compassion] et la paix te soient données de la part de Dieu le Père et [du Seigneur] Jésus-Christ notre Sauveur!'
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Mission de Tite
    marker-yv: yv-h
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'Je t''ai laissé en Crète afin que tu mettes en ordre ce qui reste à régler et que tu établisses des anciens dans chaque ville en suivant mes instructions: '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'des hommes irréprochables, fidèles à leur femme, dont les enfants soient croyants et ne soient pas accusés de débauche ou insoumis. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'En effet, en tant qu''intendant de Dieu, il faut que le responsable soit irréprochable. Il ne doit pas être arrogant, colérique, buveur, violent ni attiré par le gain. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'Il doit au contraire être hospitalier, ami du bien, réfléchi, juste, saint, maître de lui, '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: attaché à la parole digne de confiance telle qu'elle a été enseignée, afin d'être capable à la fois d'encourager les autres par la saine doctrine et de réfuter les contradicteurs.
