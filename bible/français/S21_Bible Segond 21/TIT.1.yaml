document_id: TIT.1,152
type_code: fra
verses:
  '1':
  - type: heading
    content: Adresse et salutation
  - type: text
    content: 'De la part de Paul, serviteur de Dieu et apôtre de Jésus-Christ. – J''ai été chargé d''amener ceux que Dieu a choisis à la foi et à la connaissance de la vérité qui est conforme à la piété, '
  '10':
  - type: text
    content: Il y a en effet beaucoup d'hommes insoumis, des discoureurs creux et trompeurs, surtout parmi les circoncis
  - type: note
    content: 'Les circoncis: c''est-à-dire les personnes issues du judaïsme.'
  - type: text
    content: '. '
  '11':
  - type: text
    content: 'Il faut leur fermer la bouche, car ils bouleversent des familles entières en enseignant ce qu''il ne faut pas pour un gain honteux. '
  '12':
  - type: text
    content: 'L''un d''eux, leur propre prophète, a dit: «Les Crétois? Toujours menteurs, de méchantes bêtes, des goinfres paresseux.» '
  '13':
  - type: text
    content: 'Ce témoignage est bien vrai. C''est pourquoi reprends-les sévèrement afin qu''ils aient une foi saine '
  '14':
  - type: text
    content: 'et qu''ils ne s''attachent pas à des fables juives et à des commandements émis par des hommes qui se détournent de la vérité. '
  '15':
  - type: text
    content: 'Tout est pur pour ceux qui sont purs, mais rien n''est pur pour ceux qui sont souillés et incrédules; bien plus, leur intelligence et leur conscience sont souillées. '
  '16':
  - type: text
    content: Ils prétendent connaître Dieu, mais ils le renient par leur manière d'agir. Ils sont abominables, rebelles et incompétents pour la moindre œuvre bonne.
  '2':
  - type: text
    content: 'afin qu''ils aient l''espérance de la vie éternelle. Le Dieu qui ne ment pas l''avait promise avant tous les temps, '
  '3':
  - type: text
    content: 'et au moment voulu il a révélé sa parole par la prédication qui m''a été confiée sur ordre de Dieu notre Sauveur. – '
  '4':
  - type: text
    content: 'A Tite, mon véritable enfant dans la foi qui nous est commune: que la grâce, [la compassion] et la paix te soient données de la part de Dieu le Père et [du Seigneur] Jésus-Christ notre Sauveur!'
  - type: heading
    content: Mission de Tite
  '5':
  - type: text
    content: 'Je t''ai laissé en Crète afin que tu mettes en ordre ce qui reste à régler et que tu établisses des anciens dans chaque ville en suivant mes instructions: '
  '6':
  - type: text
    content: 'des hommes irréprochables, fidèles à leur femme, dont les enfants soient croyants et ne soient pas accusés de débauche ou insoumis. '
  '7':
  - type: text
    content: 'En effet, en tant qu''intendant de Dieu, il faut que le responsable soit irréprochable. Il ne doit pas être arrogant, colérique, buveur, violent ni attiré par le gain. '
  '8':
  - type: text
    content: 'Il doit au contraire être hospitalier, ami du bien, réfléchi, juste, saint, maître de lui, '
  '9':
  - type: text
    content: attaché à la parole digne de confiance telle qu'elle a été enseignée, afin d'être capable à la fois d'encourager les autres par la saine doctrine et de réfuter les contradicteurs.
