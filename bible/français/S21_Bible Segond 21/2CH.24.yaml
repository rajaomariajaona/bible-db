document_id: 2CH.24
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Règne de Joas
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Joas avait 7 ans lorsqu'il devint roi et il régna 40 ans à Jérusalem. Sa mère s'appelait Tsibja et elle était de Beer-Shéba.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Joas fit ce qui est droit aux yeux de l''Eternel pendant toute la vie du prêtre Jehojada. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Ce dernier prit deux femmes pour Joas, et il eut des fils et des filles.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Après cela, Joas eut le désir de restaurer la maison de l''Eternel. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Il rassembla les prêtres et les Lévites et leur dit: «Parcourez les villes de Juda et récoltez dans tout Israël, chaque année, de l''argent pour réparer la maison de votre Dieu. Menez cette affaire avec empressement!» Mais les Lévites ne montrèrent aucun empressement. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Le roi appela le grand-prêtre Jehojada et lui dit: «Pourquoi n''as-tu pas veillé à ce que les Lévites apportent de Juda et de Jérusalem la contribution prescrite par Moïse, serviteur de l''Eternel, à l''assemblée d''Israël pour la tente du témoignage? '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: En effet, l'impie Athalie et ses fils ont dévasté la maison de Dieu; ils ont même employé pour les Baals tous les objets consacrés de la maison de l'Eternel.»
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Alors le roi ordonna qu''on fabrique un coffre et qu''on le place à la porte de la maison de l''Eternel, à l''extérieur. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'On proclama alors dans Juda et dans Jérusalem qu''il fallait apporter à l''Eternel la contribution prescrite par Moïse, serviteur de l''Eternel, à Israël dans le désert. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Tous les chefs et tout le peuple s''en réjouirent, et ils apportèrent et jetèrent leur contribution dans le coffre jusqu''à ce qu''il soit plein. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Quand ce fut le moment pour les Lévites d''apporter le coffre aux inspecteurs royaux, quand ils virent qu''il contenait beaucoup d''argent, le secrétaire du roi et le commissaire du grand-prêtre vinrent vider le coffre. Ils le prirent, puis ils le remirent à sa place. Ils agissaient de cette manière chaque jour et ils récoltèrent beaucoup d''argent. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Le roi et Jehojada le donnaient à ceux qui étaient chargés des travaux dans la maison de l''Eternel. Ceux-ci engageaient des tailleurs de pierres et des charpentiers pour restaurer la maison de l''Eternel, et même des ouvriers aptes à travailler le fer ou le bronze pour la réparer. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Ceux qui étaient chargés des travaux se mirent à l''œuvre et la restauration progressa entre leurs mains. Ils remirent la maison de Dieu en état et la consolidèrent. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Lorsqu''ils eurent terminé, ils rapportèrent le reste de l''argent au roi et à Jehojada, et l''on en fit des ustensiles pour la maison de l''Eternel: des ustensiles pour le service et pour les holocaustes, des coupes et d''autres ustensiles en or et en argent. Pendant toute la vie de Jehojada, on offrit constamment des holocaustes dans la maison de l''Eternel.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Jehojada mourut âgé et rassasié de jours; il avait 130 ans à sa mort. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: On l'enterra dans la ville de David avec les rois, parce qu'il avait fait du bien en Israël, en rapport avec Dieu et avec son temple.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Après la mort de Jehojada, les chefs de Juda vinrent se prosterner devant le roi. Celui-ci les écouta alors, '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'et ils abandonnèrent la maison de l''Eternel, le Dieu de leurs ancêtres, pour servir les Astartés et les idoles. L''Eternel fut en colère contre Juda et Jérusalem parce qu''ils s''étaient ainsi rendus coupables. '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'L''Eternel envoya parmi eux des prophètes pour les ramener à lui, mais ils n''écoutèrent pas les avertissements qu''ils reçurent d''eux. '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Alors l''Esprit de Dieu revêtit Zacharie, le fils du prêtre Jehojada. Il se présenta devant le peuple et lui annonça: «Voici ce que dit Dieu: Pourquoi transgressez-vous les commandements de l''Eternel? Vous ne rencontrerez aucun succès, car vous avez abandonné l''Eternel, de sorte qu''il vous abandonnera.» '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Mais ils conspirèrent contre lui et le lapidèrent, sur l''ordre du roi, dans le parvis de la maison de l''Eternel. '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Le roi Joas ne se souvint pas de la bonté dont Jehojada, le père de Zacharie, avait fait preuve envers lui et il assassina son fils. Zacharie dit en mourant: «Que l''Eternel voie cela et fasse justice!»'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Quand l''année fut terminée, l''armée des Syriens monta contre Joas et pénétra dans Juda et à Jérusalem. Elle tua parmi la population tous les chefs du peuple et envoya tout son butin au roi de Damas. '
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'L''armée des Syriens arriva avec un faible nombre d''hommes et cependant l''Eternel livra entre ses mains une armée très nombreuse, parce que les Judéens avaient abandonné l''Eternel, le Dieu de leurs ancêtres. Ainsi, les Syriens exercèrent les jugements contre Joas. '
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Lorsqu''ils se furent éloignés de lui en le laissant dans de grandes souffrances, ses serviteurs conspirèrent contre lui à cause de l''assassinat du fils du prêtre Jehojada. Ils le tuèrent sur son lit et il mourut. On l''enterra dans la ville de David, mais pas dans les tombeaux des rois. '
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Voici ceux qui conspirèrent contre lui: Zabad, fils de Shimeath, une Ammonite, et Jozabad, fils de Shimrith, une Moabite.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: En ce qui concerne ses fils, le grand nombre de messages dont il fut l'objet et les réparations faites à la maison de Dieu, cela est décrit dans le commentaire des annales des rois. Son fils Amatsia devint roi à sa place.
