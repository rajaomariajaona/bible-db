document_id: EXO.33,152
type_code: fra
verses:
  '1':
  - type: text
    content: 'L''Eternel dit à Moïse: «Vas-y, pars d''ici avec le peuple que tu as fait sortir d''Egypte. Monte vers le pays que j''ai juré de donner à Abraham, à Isaac et à Jacob en disant: ‘Je le donnerai à ta descendance.’ '
  '10':
  - type: text
    content: 'Tout le peuple voyait la colonne de nuée s''arrêter à l''entrée de la tente, et tout le peuple se levait et adorait, chacun à l''entrée de sa tente. '
  '11':
  - type: text
    content: L'Eternel parlait avec Moïse face à face, comme un homme parle à son ami. Puis Moïse retournait au camp, tandis que son jeune assistant, Josué, fils de Nun, ne sortait pas de la tente.
  '12':
  - type: text
    content: 'Moïse dit à l''Eternel: «Voici que tu me dis: ‘Fais monter ce peuple!’ et tu ne me fais pas connaître qui tu enverras avec moi. Cependant, tu as dit: ‘Je te connais par ton nom et tu as trouvé grâce à mes yeux.’ '
  '13':
  - type: text
    content: 'Maintenant, si j''ai trouvé grâce à tes yeux, fais-moi connaître tes voies. Alors je te connaîtrai et je pourrai encore trouver grâce à tes yeux. Regarde: cette nation est ton peuple.» '
  '14':
  - type: text
    content: 'L''Eternel répondit: «Je marcherai moi-même avec toi et je te donnerai du repos.» '
  '15':
  - type: text
    content: 'Moïse lui dit: «Si tu ne marches pas toi-même avec nous, ne nous fais pas partir d''ici. '
  '16':
  - type: text
    content: 'Comment sera-t-il donc certain que j''ai trouvé grâce à tes yeux, ainsi que ton peuple? Ne sera-ce pas quand tu marcheras avec nous et quand nous serons différents, moi et ton peuple, de tous les peuples qui sont à la surface de la terre?» '
  '17':
  - type: text
    content: 'L''Eternel dit à Moïse: «Je ferai aussi ce que tu me demandes là parce que tu as trouvé grâce à mes yeux et que je te connais par ton nom.»'
  '18':
  - type: text
    content: 'Moïse dit: «Fais-moi donc voir ta gloire!» '
  '19':
  - type: text
    content: 'L''Eternel répondit: «Je ferai passer devant toi toute ma bonté et je proclamerai devant toi le nom de l''Eternel. *Je fais grâce à qui je veux faire grâce, et j''ai compassion de qui je veux avoir compassion.'
  - type: note
    content: 'Je fais grâce… compassion: cité par l''apôtre Paul en Romains 9.15.'
  - type: text
    content: '» '
  '2':
  - type: text
    content: 'J''enverrai un ange devant toi et je chasserai les Cananéens, les Amoréens, les Hittites, les Phéréziens, les Héviens et les Jébusiens. '
  '20':
  - type: text
    content: 'Il ajouta: «Tu ne pourras pas voir mon visage, car l''homme ne peut me voir et vivre.» '
  '21':
  - type: text
    content: 'L''Eternel dit: «Voici un endroit près de moi. Tu te tiendras sur le rocher. '
  '22':
  - type: text
    content: 'Quand ma gloire passera, je te mettrai dans un creux du rocher et je te couvrirai de ma main jusqu''à ce que je sois passé. '
  '23':
  - type: text
    content: Lorsque j'écarterai ma main, tu me verras par-derrière, mais mon visage ne pourra pas être vu.»
  '3':
  - type: text
    content: Monte vers ce pays où coulent le lait et le miel. En revanche, je ne monterai pas au milieu de toi, car tu es un peuple réfractaire et je risquerais de te faire disparaître en chemin.»
  '4':
  - type: text
    content: 'Lorsque le peuple entendit cette parole de malheur, il prit le deuil et personne ne mit ses ornements. '
  '5':
  - type: text
    content: 'L''Eternel dit à Moïse: «Dis aux Israélites: ‘Vous êtes un peuple réfractaire. Si je montais un seul instant au milieu de toi, je te détruirais. Retire maintenant les ornements que tu portes et je verrai ce que je te ferai.’» '
  '6':
  - type: text
    content: Les Israélites se dépouillèrent de leurs ornements en s'éloignant du mont Horeb.
  - type: heading
    content: Les rencontres de Moïse avec l'Eternel
  '7':
  - type: text
    content: 'Moïse prit la tente et la dressa à l''extérieur du camp, à une certaine distance. Il l''appela «tente de la rencontre». Tous ceux qui consultaient l''Eternel allaient vers la tente de la rencontre, à l''extérieur du camp. '
  '8':
  - type: text
    content: 'Lorsque Moïse se rendait à cette tente, tout le peuple se levait; chacun se tenait à l''entrée de sa tente et le suivait des yeux jusqu''à ce qu''il ait pénétré dans la tente. '
  '9':
  - type: text
    content: 'Lorsque Moïse avait pénétré dans la tente, la colonne de nuée descendait et s''arrêtait à l''entrée de la tente, et l''Eternel parlait avec Moïse. '
