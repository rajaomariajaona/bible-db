document_id: 2CO.12
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Une nécessaire humilité
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Faut-il se vanter? Cela ne [m'']est pas utile. J''en viendrai cependant à des visions et à des révélations du Seigneur. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Je connais un homme en Christ qui, il y a 14 ans, a été enlevé jusqu''au troisième ciel. Etait-ce dans son corps ou à l''extérieur de son corps, je l''ignore, mais Dieu le sait. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Et je sais que cet homme – était-ce dans son corps ou à l''extérieur de son corps, je l''ignore, mais Dieu le sait – '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'a été enlevé au paradis et a entendu des paroles inexprimables qu''il n''est pas permis à un homme de redire. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Je me vanterai d''un tel homme, mais de moi-même je ne me vanterai pas, sinon de mes faiblesses. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Si je voulais me vanter, je ne serais pas déraisonnable, car je dirais la vérité, mais je m'en abstiens afin que personne n'ait à mon sujet une opinion supérieure à ce qu'il voit en moi ou à ce qu'il entend de moi.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Et pour que je ne sois pas rempli d'orgueil à cause de ces révélations extraordinaires, j'ai reçu une écharde
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '12.7 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Echarde: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Paul parle probablement d''une infirmité corporelle douloureuse, mais on ignore sa nature précise; peut-être s''agissait-il d''un problème relatif aux yeux (voir '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Galates 4.14-15
      metadata:
        usfm: GAL.4.14+GAL.4.15
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ).
    marker-yv: yv-n
  - type: text
    text: ' dans le corps, un ange de Satan pour me frapper et m''empêcher de m''enorgueillir. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Trois fois j''ai supplié le Seigneur de l''éloigner de moi, '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'et il m''a dit: «Ma grâce te suffit, car ma puissance s''accomplit dans la faiblesse.» Aussi, je me montrerai bien plus volontiers fier de mes faiblesses afin que la puissance de Christ repose sur moi. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: C'est pourquoi je me plais dans les faiblesses, dans les insultes, dans les détresses, dans les persécutions, dans les angoisses pour Christ, car quand je suis faible, c'est alors que je suis fort.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'J''ai été fou [en me vantant ainsi], mais vous m''y avez contraint. C''est par vous que j''aurais dû être recommandé, car je n''ai en rien été inférieur à ces super-apôtres, bien que je ne sois rien. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Les marques de mon ministère d''apôtre ont été produites au milieu de vous par une persévérance à toute épreuve, par des signes, des prodiges et des miracles. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: En quoi avez-vous été moins bien traités que les autres Eglises, sinon en ce que je n'ai pas été à votre charge? Pardonnez-moi cette injustice!
- type: usfm
  marker: s1
  children:
  - type: text
    text: Projets de visite et salutations
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Voici que pour la troisième fois je suis prêt à aller chez vous, et je ne serai pas à votre charge, car ce ne sont pas vos biens que je recherche, c''est vous-mêmes. En effet, ce n''est pas aux enfants de faire des réserves pour leurs parents, mais aux parents pour leurs enfants. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Quant à moi, je ferai très volontiers des dépenses et je me dépenserai moi-même pour vous même si plus je vous aime, moins je suis aimé de vous.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Soit! Je n'ai pas été à votre charge, mais, fourbe comme je suis, je vous aurais pris par ruse
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '12.16 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Ruse: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: d'après les adversaires de Paul.
    marker-yv: yv-n
  - type: text
    text: '! '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Vous ai-je exploités par l''un de ceux que je vous ai envoyés? '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'J''ai encouragé Tite à aller chez vous et avec lui j''ai envoyé le frère: est-ce que Tite a exigé quelque chose de vous? N''avons-nous pas marché dans le même esprit, sur les mêmes traces?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Vous vous imaginez depuis longtemps que nous cherchons à nous justifier devant vous. C''est devant Dieu, en Christ, que nous parlons, et tout cela, bien-aimés, pour votre édification. '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'J''ai peur, en effet, qu''à mon arrivée je ne vous trouve pas tels que je le voudrais et que vous ne me trouviez pas tel que vous le voudriez. J''ai peur de trouver des querelles, de la jalousie, de la colère, des rivalités, des médisances, des calomnies, de l''orgueil, des troubles. '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: J'ai peur qu'à mon arrivée mon Dieu ne m'humilie de nouveau à votre sujet et que je n'aie à pleurer sur plusieurs de ceux qui ont péché précédemment et qui ne se sont pas détournés de l'impureté, l'immoralité sexuelle et la débauche auxquelles ils se sont livrés.
