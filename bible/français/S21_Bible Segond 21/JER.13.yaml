document_id: JER.13
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: La ceinture de lin
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Voici ce que m''a dit l''Eternel: «Va t''acheter une ceinture de lin et mets-la autour de ta taille, mais ne la trempe pas dans l''eau.» '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: J'ai acheté la ceinture, conformément à la parole de l'Eternel, et je l'ai mise autour de ma taille.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'La parole de l''Eternel m''a été adressée une deuxième fois: '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: '«Prends la ceinture que tu as achetée, qui est autour de ta taille, puis lève-toi, va vers l''Euphrate et là-bas cache-la dans la fente d''un rocher.» '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: J'y suis allé et l'ai cachée près de l'Euphrate, comme l'Eternel me l'avait ordonné.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Après bien des jours, l''Eternel m''a dit: «Lève-toi, va vers l''Euphrate et là-bas reprends la ceinture que je t''avais ordonné de cacher.» '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Je suis retourné vers l'Euphrate, j'ai fouillé et j'ai repris la ceinture à l'endroit où je l'avais cachée, mais voici que la ceinture était abîmée, elle n'était plus bonne à rien.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Alors la parole de l''Eternel m''a été adressée:'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: '«Voici ce que dit l''Eternel:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: C'est ainsi que je détruirai l'orgueil de Juda
- type: usfm
  marker: q1
  children:
  - type: text
    text: et l'orgueil immense de Jérusalem.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Ce méchant peuple refuse d'écouter mes paroles,
- type: usfm
  marker: q1
  children:
  - type: text
    text: il persévère dans les penchants de son cœur
- type: usfm
  marker: q1
  children:
  - type: text
    text: et suit d'autres dieux
- type: usfm
  marker: q1
  children:
  - type: text
    text: pour les servir et se prosterner devant eux.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Il deviendra pareil à cette ceinture,
- type: usfm
  marker: q1
  children:
  - type: text
    text: qui n'est plus bonne à rien.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: En effet, de même qu'une ceinture est attachée à la taille d'un homme,
- type: usfm
  marker: q1
  children:
  - type: text
    text: de même je m'étais attaché toute la communauté d'Israël
- type: usfm
  marker: q1
  children:
  - type: text
    text: et toute celle de Juda, déclare l'Eternel,
- type: usfm
  marker: q1
  children:
  - type: text
    text: afin qu'elles soient mon peuple,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ma réputation, ma gloire et mon honneur,
- type: usfm
  marker: q1
  children:
  - type: text
    text: mais elles ne m'ont pas écouté.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: '»Tu leur diras cette parole:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: '‘Voici ce que dit l''Eternel, le Dieu d''Israël:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Toutes les outres seront remplies de vin.’
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Et ils te diront: ‘Nous savons bien'
- type: usfm
  marker: q1
  children:
  - type: text
    text: que toutes les outres seront remplies de vin!’
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Alors tu leur diras: ‘Voici ce que dit l''Eternel:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Je vais remplir d'ivresse tous les habitants de ce pays,
- type: usfm
  marker: q1
  children:
  - type: text
    text: les rois qui sont assis sur le trône de David
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '13.13 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'David: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: deuxième roi d'Israël (de 1010 à 970 av. J.-C.), dont les descendants occupaient le trône du royaume de Juda, celui du sud, après le schisme du royaume d'Israël (survenu à l'époque de son petit-fils).
    marker-yv: yv-n
  - type: text
    text: ','
- type: usfm
  marker: q1
  children:
  - type: text
    text: les prêtres, les prophètes et tous les habitants de Jérusalem.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Je les fracasserai les uns contre les autres,
- type: usfm
  marker: q1
  children:
  - type: text
    text: les pères et les fils ensemble, déclare l'Eternel.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Je ne les épargnerai pas, je n'aurai aucune pitié, aucune compassion,
- type: usfm
  marker: q1
  children:
  - type: text
    text: rien ne m'empêchera de les détruire.’
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: »Ecoutez et prêtez l'oreille,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ne soyez pas orgueilleux,
- type: usfm
  marker: q1
  children:
  - type: text
    text: car c'est l'Eternel qui a parlé.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Rendez gloire à l'Eternel, votre Dieu,
- type: usfm
  marker: q1
  children:
  - type: text
    text: avant qu'il ne fasse venir les ténèbres,
- type: usfm
  marker: q1
  children:
  - type: text
    text: avant que vos pieds ne se blessent sur les montagnes, la nuit tombée.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Vous attendrez la lumière,
- type: usfm
  marker: q1
  children:
  - type: text
    text: mais il l'aura changée en ombre de la mort,
- type: usfm
  marker: q1
  children:
  - type: text
    text: il instaurera d'épaisses ténèbres.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Si vous n'écoutez pas cela,
- type: usfm
  marker: q1
  children:
  - type: text
    text: je pleurerai en secret, à cause de votre orgueil.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Mes yeux pleureront abondamment,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ils verseront des larmes,
- type: usfm
  marker: q1
  children:
  - type: text
    text: parce que le troupeau de l'Eternel sera emmené prisonnier.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: '»Dis au roi et à la reine: ‘Humiliez-vous, asseyez-vous,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: car il est tombé de vos têtes,
- type: usfm
  marker: q1
  children:
  - type: text
    text: le diadème qui faisait votre gloire.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Les villes du sud sont fermées,
- type: usfm
  marker: q1
  children:
  - type: text
    text: il n'y a plus personne pour les ouvrir.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Tout Juda a été exilé, il a été totalement exilé.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Levez vos yeux et regardez
- type: usfm
  marker: q1
  children:
  - type: text
    text: ceux qui arrivent du nord!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Où est le troupeau qui t'avait été donné,
- type: usfm
  marker: q1
  children:
  - type: text
    text: le petit bétail qui faisait ta gloire?’
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: »Que diras-tu quand ils interviendront contre toi?
- type: usfm
  marker: q1
  children:
  - type: text
    text: C'est toi-même qui leur as appris à agir en maîtres à tes dépens!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Les souffrances ne s'empareront-elles pas de toi,
- type: usfm
  marker: q1
  children:
  - type: text
    text: pareilles à celles d'une femme prête à accoucher?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Peut-être te demandes-tu:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: ‘Pourquoi cela m'est-il arrivé?’
- type: usfm
  marker: q1
  children:
  - type: text
    text: C'est à cause du grand nombre de tes fautes
- type: usfm
  marker: q1
  children:
  - type: text
    text: que les pans de ton habit sont relevés
- type: usfm
  marker: q1
  children:
  - type: text
    text: et que tes talons sont traités avec violence.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: Un Ethiopien peut-il changer sa peau,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et un léopard ses taches?
- type: usfm
  marker: q1
  children:
  - type: text
    text: De même, pourriez-vous faire le bien,
- type: usfm
  marker: q1
  children:
  - type: text
    text: vous qui êtes habitués à faire le mal?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: »Je les disperserai, tout comme de la paille emportée
- type: usfm
  marker: q1
  children:
  - type: text
    text: par le vent du désert.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: C'est ce qui te revient, l'issue que je t'ai réservée,
- type: usfm
  marker: q1
  children:
  - type: text
    text: déclare l'Eternel,
- type: usfm
  marker: q1
  children:
  - type: text
    text: parce que tu m'as oublié
- type: usfm
  marker: q1
  children:
  - type: text
    text: et que tu as mis ta confiance dans des faussetés.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: Moi aussi, je retrousse les pans de ton habit jusqu'à ton visage,
- type: usfm
  marker: q1
  children:
  - type: text
    text: afin que ton déshonneur soit flagrant.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: J'ai vu tes adultères et tes hennissements de plaisir,
- type: usfm
  marker: q1
  children:
  - type: text
    text: tes scandaleuses prostitutions sur les collines et dans les champs,
- type: usfm
  marker: q1
  children:
  - type: text
    text: j'ai vu tes monstruosités.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Malheur à toi, Jérusalem!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Combien de temps encore resteras-tu impure?»
