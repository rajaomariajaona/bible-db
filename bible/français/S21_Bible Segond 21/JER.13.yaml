document_id: JER.13,152
type_code: fra
verses:
  '1':
  - type: heading
    content: La ceinture de lin
  - type: text
    content: 'Voici ce que m''a dit l''Eternel: «Va t''acheter une ceinture de lin et mets-la autour de ta taille, mais ne la trempe pas dans l''eau.» '
  '10':
  - type: text
    content: Ce méchant peuple refuse d'écouter mes paroles,
  - type: text
    content: il persévère dans les penchants de son cœur
  - type: text
    content: et suit d'autres dieux
  - type: text
    content: pour les servir et se prosterner devant eux.
  - type: text
    content: Il deviendra pareil à cette ceinture,
  - type: text
    content: qui n'est plus bonne à rien.
  '11':
  - type: text
    content: En effet, de même qu'une ceinture est attachée à la taille d'un homme,
  - type: text
    content: de même je m'étais attaché toute la communauté d'Israël
  - type: text
    content: et toute celle de Juda, déclare l'Eternel,
  - type: text
    content: afin qu'elles soient mon peuple,
  - type: text
    content: ma réputation, ma gloire et mon honneur,
  - type: text
    content: mais elles ne m'ont pas écouté.
  '12':
  - type: text
    content: '»Tu leur diras cette parole:'
  - type: text
    content: '‘Voici ce que dit l''Eternel, le Dieu d''Israël:'
  - type: text
    content: Toutes les outres seront remplies de vin.’
  - type: text
    content: 'Et ils te diront: ‘Nous savons bien'
  - type: text
    content: que toutes les outres seront remplies de vin!’
  '13':
  - type: text
    content: 'Alors tu leur diras: ‘Voici ce que dit l''Eternel:'
  - type: text
    content: Je vais remplir d'ivresse tous les habitants de ce pays,
  - type: text
    content: les rois qui sont assis sur le trône de David
  - type: note
    content: 'David: deuxième roi d''Israël (de 1010 à 970 av. J.-C.), dont les descendants occupaient le trône du royaume de Juda, celui du sud, après le schisme du royaume d''Israël (survenu à l''époque de son petit-fils).'
  - type: text
    content: ','
  - type: text
    content: les prêtres, les prophètes et tous les habitants de Jérusalem.
  '14':
  - type: text
    content: Je les fracasserai les uns contre les autres,
  - type: text
    content: les pères et les fils ensemble, déclare l'Eternel.
  - type: text
    content: Je ne les épargnerai pas, je n'aurai aucune pitié, aucune compassion,
  - type: text
    content: rien ne m'empêchera de les détruire.’
  '15':
  - type: text
    content: »Ecoutez et prêtez l'oreille,
  - type: text
    content: ne soyez pas orgueilleux,
  - type: text
    content: car c'est l'Eternel qui a parlé.
  '16':
  - type: text
    content: Rendez gloire à l'Eternel, votre Dieu,
  - type: text
    content: avant qu'il ne fasse venir les ténèbres,
  - type: text
    content: avant que vos pieds ne se blessent sur les montagnes, la nuit tombée.
  - type: text
    content: Vous attendrez la lumière,
  - type: text
    content: mais il l'aura changée en ombre de la mort,
  - type: text
    content: il instaurera d'épaisses ténèbres.
  '17':
  - type: text
    content: Si vous n'écoutez pas cela,
  - type: text
    content: je pleurerai en secret, à cause de votre orgueil.
  - type: text
    content: Mes yeux pleureront abondamment,
  - type: text
    content: ils verseront des larmes,
  - type: text
    content: parce que le troupeau de l'Eternel sera emmené prisonnier.
  '18':
  - type: text
    content: '»Dis au roi et à la reine: ‘Humiliez-vous, asseyez-vous,'
  - type: text
    content: car il est tombé de vos têtes,
  - type: text
    content: le diadème qui faisait votre gloire.
  '19':
  - type: text
    content: Les villes du sud sont fermées,
  - type: text
    content: il n'y a plus personne pour les ouvrir.
  - type: text
    content: Tout Juda a été exilé, il a été totalement exilé.
  '2':
  - type: text
    content: J'ai acheté la ceinture, conformément à la parole de l'Eternel, et je l'ai mise autour de ma taille.
  '20':
  - type: text
    content: Levez vos yeux et regardez
  - type: text
    content: ceux qui arrivent du nord!
  - type: text
    content: Où est le troupeau qui t'avait été donné,
  - type: text
    content: le petit bétail qui faisait ta gloire?’
  '21':
  - type: text
    content: »Que diras-tu quand ils interviendront contre toi?
  - type: text
    content: C'est toi-même qui leur as appris à agir en maîtres à tes dépens!
  - type: text
    content: Les souffrances ne s'empareront-elles pas de toi,
  - type: text
    content: pareilles à celles d'une femme prête à accoucher?
  '22':
  - type: text
    content: 'Peut-être te demandes-tu:'
  - type: text
    content: ‘Pourquoi cela m'est-il arrivé?’
  - type: text
    content: C'est à cause du grand nombre de tes fautes
  - type: text
    content: que les pans de ton habit sont relevés
  - type: text
    content: et que tes talons sont traités avec violence.
  '23':
  - type: text
    content: Un Ethiopien peut-il changer sa peau,
  - type: text
    content: et un léopard ses taches?
  - type: text
    content: De même, pourriez-vous faire le bien,
  - type: text
    content: vous qui êtes habitués à faire le mal?
  '24':
  - type: text
    content: »Je les disperserai, tout comme de la paille emportée
  - type: text
    content: par le vent du désert.
  '25':
  - type: text
    content: C'est ce qui te revient, l'issue que je t'ai réservée,
  - type: text
    content: déclare l'Eternel,
  - type: text
    content: parce que tu m'as oublié
  - type: text
    content: et que tu as mis ta confiance dans des faussetés.
  '26':
  - type: text
    content: Moi aussi, je retrousse les pans de ton habit jusqu'à ton visage,
  - type: text
    content: afin que ton déshonneur soit flagrant.
  '27':
  - type: text
    content: J'ai vu tes adultères et tes hennissements de plaisir,
  - type: text
    content: tes scandaleuses prostitutions sur les collines et dans les champs,
  - type: text
    content: j'ai vu tes monstruosités.
  - type: text
    content: Malheur à toi, Jérusalem!
  - type: text
    content: Combien de temps encore resteras-tu impure?»
  '3':
  - type: text
    content: 'La parole de l''Eternel m''a été adressée une deuxième fois: '
  '4':
  - type: text
    content: '«Prends la ceinture que tu as achetée, qui est autour de ta taille, puis lève-toi, va vers l''Euphrate et là-bas cache-la dans la fente d''un rocher.» '
  '5':
  - type: text
    content: J'y suis allé et l'ai cachée près de l'Euphrate, comme l'Eternel me l'avait ordonné.
  '6':
  - type: text
    content: 'Après bien des jours, l''Eternel m''a dit: «Lève-toi, va vers l''Euphrate et là-bas reprends la ceinture que je t''avais ordonné de cacher.» '
  '7':
  - type: text
    content: Je suis retourné vers l'Euphrate, j'ai fouillé et j'ai repris la ceinture à l'endroit où je l'avais cachée, mais voici que la ceinture était abîmée, elle n'était plus bonne à rien.
  '8':
  - type: text
    content: 'Alors la parole de l''Eternel m''a été adressée:'
  '9':
  - type: text
    content: '«Voici ce que dit l''Eternel:'
  - type: text
    content: C'est ainsi que je détruirai l'orgueil de Juda
  - type: text
    content: et l'orgueil immense de Jérusalem.
