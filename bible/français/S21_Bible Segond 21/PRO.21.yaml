document_id: PRO.21
type_code: fra
segments:
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Le cœur du roi est un simple courant d''eau dans la main de l''Eternel:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: il l'oriente comme il le désire.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Toutes les voies d'un homme sont droites à ses yeux,
- type: usfm
  marker: q1
  children:
  - type: text
    text: mais celui qui évalue les cœurs, c'est l'Eternel.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: La pratique de la justice et de l'équité,
- type: usfm
  marker: q1
  children:
  - type: text
    text: voilà ce que l'Eternel préfère aux sacrifices.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Des regards hautains, un cœur orgueilleux:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: l'éclat des méchants n'est que péché.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Les projets de l'homme actif sont tout profit,
- type: usfm
  marker: q1
  children:
  - type: text
    text: mais celui qui agit avec précipitation n'arrive qu'à la misère.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Des trésors amassés par une langue mensongère,
- type: usfm
  marker: q1
  children:
  - type: text
    text: c'est un souffle qui s'évanouit, une recherche de la mort.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: La violence des méchants les emporte
- type: usfm
  marker: q1
  children:
  - type: text
    text: parce qu'ils refusent de pratiquer l'équité.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: L'homme malhonnête emprunte une voie tortueuse,
- type: usfm
  marker: q1
  children:
  - type: text
    text: tandis que celui qui est pur agit avec droiture.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Mieux vaut habiter à l'angle d'un toit
- type: usfm
  marker: q1
  children:
  - type: text
    text: que faire maison commune avec une femme querelleuse.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Le méchant désire le mal;
- type: usfm
  marker: q1
  children:
  - type: text
    text: même son ami ne trouve pas grâce à ses yeux.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Quand on punit le moqueur, celui qui manque d'expérience devient sage,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et quand on instruit le sage, il fait bon accueil à la connaissance.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Le juste examine la maison du méchant
- type: usfm
  marker: q1
  children:
  - type: text
    text: et il précipite les méchants dans le malheur.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Celui qui ferme son oreille au cri du plus faible
- type: usfm
  marker: q1
  children:
  - type: text
    text: criera lui aussi, et il n'aura pas de réponse.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Un cadeau fait en secret apaise la colère,
- type: usfm
  marker: q1
  children:
  - type: text
    text: un pot-de-vin donné sous le manteau calme une fureur violente.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: C'est une joie pour le juste de pratiquer l'équité,
- type: usfm
  marker: q1
  children:
  - type: text
    text: mais la ruine est réservée à celui qui commet l'injustice.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: L'homme qui s'égare loin de la voie de la prudence
- type: usfm
  marker: q1
  children:
  - type: text
    text: reposera dans l'assemblée des défunts.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Celui qui aime la joie connaîtra la misère,
- type: usfm
  marker: q1
  children:
  - type: text
    text: celui qui aime le vin et l'huile
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '21.17 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Le vin et l''huile: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: signes d'une vie d'abondance et de luxe.
    marker-yv: yv-n
  - type: text
    text: ' ne s''enrichira pas.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Le méchant sert de rançon pour le juste,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et le traître pour les hommes droits.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Mieux vaut habiter dans une terre déserte
- type: usfm
  marker: q1
  children:
  - type: text
    text: qu'avec une femme querelleuse et irritable.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: On trouve de précieux trésors et de l'huile dans le domaine du sage;
- type: usfm
  marker: q1
  children:
  - type: text
    text: l'homme stupide, lui, les engloutit.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Celui qui poursuit la justice et la bonté
- type: usfm
  marker: q1
  children:
  - type: text
    text: trouvera la vie, la justice et la gloire.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: Le sage monte contre une ville de héros
- type: usfm
  marker: q1
  children:
  - type: text
    text: et abat la force dans laquelle elle plaçait sa confiance.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: Celui qui veille sur sa bouche et sa langue
- type: usfm
  marker: q1
  children:
  - type: text
    text: se préserve de bien des angoisses.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: L'orgueilleux, l'insolent, voilà ce qu'on appelle un moqueur;
- type: usfm
  marker: q1
  children:
  - type: text
    text: il agit avec une arrogance débordante.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: Les désirs du paresseux le tuent parce que ses mains se refusent à l'action;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: toute la journée il éprouve des désirs;
- type: usfm
  marker: q1
  children:
  - type: text
    text: le juste, en revanche, donne sans retenue.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: Le sacrifice qu'offrent les méchants fait horreur,
- type: usfm
  marker: q1
  children:
  - type: text
    text: car ils l'offrent avec des pensées criminelles.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: Le témoin menteur va à sa perte,
- type: usfm
  marker: q1
  children:
  - type: text
    text: mais l'homme qui sait écouter pourra parler indéfiniment.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: Le méchant prend des airs effrontés,
- type: usfm
  marker: q1
  children:
  - type: text
    text: tandis que l'homme droit affermit sa voie.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: Il n'y a ni sagesse, ni intelligence,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ni conseil qui tienne contre l'Eternel.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: On prépare le cheval pour le jour du combat,
- type: usfm
  marker: q1
  children:
  - type: text
    text: mais c'est à l'Eternel qu'appartient la victoire.
