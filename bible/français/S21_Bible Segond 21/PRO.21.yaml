document_id: PRO.21,152
type_code: fra
verses:
  '1':
  - type: text
    content: 'Le cœur du roi est un simple courant d''eau dans la main de l''Eternel:'
  - type: text
    content: il l'oriente comme il le désire.
  '10':
  - type: text
    content: Le méchant désire le mal;
  - type: text
    content: même son ami ne trouve pas grâce à ses yeux.
  '11':
  - type: text
    content: Quand on punit le moqueur, celui qui manque d'expérience devient sage,
  - type: text
    content: et quand on instruit le sage, il fait bon accueil à la connaissance.
  '12':
  - type: text
    content: Le juste examine la maison du méchant
  - type: text
    content: et il précipite les méchants dans le malheur.
  '13':
  - type: text
    content: Celui qui ferme son oreille au cri du plus faible
  - type: text
    content: criera lui aussi, et il n'aura pas de réponse.
  '14':
  - type: text
    content: Un cadeau fait en secret apaise la colère,
  - type: text
    content: un pot-de-vin donné sous le manteau calme une fureur violente.
  '15':
  - type: text
    content: C'est une joie pour le juste de pratiquer l'équité,
  - type: text
    content: mais la ruine est réservée à celui qui commet l'injustice.
  '16':
  - type: text
    content: L'homme qui s'égare loin de la voie de la prudence
  - type: text
    content: reposera dans l'assemblée des défunts.
  '17':
  - type: text
    content: Celui qui aime la joie connaîtra la misère,
  - type: text
    content: celui qui aime le vin et l'huile
  - type: note
    content: 'Le vin et l''huile: signes d''une vie d''abondance et de luxe.'
  - type: text
    content: ' ne s''enrichira pas.'
  '18':
  - type: text
    content: Le méchant sert de rançon pour le juste,
  - type: text
    content: et le traître pour les hommes droits.
  '19':
  - type: text
    content: Mieux vaut habiter dans une terre déserte
  - type: text
    content: qu'avec une femme querelleuse et irritable.
  '2':
  - type: text
    content: Toutes les voies d'un homme sont droites à ses yeux,
  - type: text
    content: mais celui qui évalue les cœurs, c'est l'Eternel.
  '20':
  - type: text
    content: On trouve de précieux trésors et de l'huile dans le domaine du sage;
  - type: text
    content: l'homme stupide, lui, les engloutit.
  '21':
  - type: text
    content: Celui qui poursuit la justice et la bonté
  - type: text
    content: trouvera la vie, la justice et la gloire.
  '22':
  - type: text
    content: Le sage monte contre une ville de héros
  - type: text
    content: et abat la force dans laquelle elle plaçait sa confiance.
  '23':
  - type: text
    content: Celui qui veille sur sa bouche et sa langue
  - type: text
    content: se préserve de bien des angoisses.
  '24':
  - type: text
    content: L'orgueilleux, l'insolent, voilà ce qu'on appelle un moqueur;
  - type: text
    content: il agit avec une arrogance débordante.
  '25':
  - type: text
    content: Les désirs du paresseux le tuent parce que ses mains se refusent à l'action;
  '26':
  - type: text
    content: toute la journée il éprouve des désirs;
  - type: text
    content: le juste, en revanche, donne sans retenue.
  '27':
  - type: text
    content: Le sacrifice qu'offrent les méchants fait horreur,
  - type: text
    content: car ils l'offrent avec des pensées criminelles.
  '28':
  - type: text
    content: Le témoin menteur va à sa perte,
  - type: text
    content: mais l'homme qui sait écouter pourra parler indéfiniment.
  '29':
  - type: text
    content: Le méchant prend des airs effrontés,
  - type: text
    content: tandis que l'homme droit affermit sa voie.
  '3':
  - type: text
    content: La pratique de la justice et de l'équité,
  - type: text
    content: voilà ce que l'Eternel préfère aux sacrifices.
  '30':
  - type: text
    content: Il n'y a ni sagesse, ni intelligence,
  - type: text
    content: ni conseil qui tienne contre l'Eternel.
  '31':
  - type: text
    content: On prépare le cheval pour le jour du combat,
  - type: text
    content: mais c'est à l'Eternel qu'appartient la victoire.
  '4':
  - type: text
    content: 'Des regards hautains, un cœur orgueilleux:'
  - type: text
    content: l'éclat des méchants n'est que péché.
  '5':
  - type: text
    content: Les projets de l'homme actif sont tout profit,
  - type: text
    content: mais celui qui agit avec précipitation n'arrive qu'à la misère.
  '6':
  - type: text
    content: Des trésors amassés par une langue mensongère,
  - type: text
    content: c'est un souffle qui s'évanouit, une recherche de la mort.
  '7':
  - type: text
    content: La violence des méchants les emporte
  - type: text
    content: parce qu'ils refusent de pratiquer l'équité.
  '8':
  - type: text
    content: L'homme malhonnête emprunte une voie tortueuse,
  - type: text
    content: tandis que celui qui est pur agit avec droiture.
  '9':
  - type: text
    content: Mieux vaut habiter à l'angle d'un toit
  - type: text
    content: que faire maison commune avec une femme querelleuse.
