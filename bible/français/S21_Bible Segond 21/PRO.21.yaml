document_id: PRO.21,152
type_code: fra
verses:
  '1':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Le cœur du roi est un simple courant d''eau dans la main de l''Eternel:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: il l'oriente comme il le désire.
  '10':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Le méchant désire le mal;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: même son ami ne trouve pas grâce à ses yeux.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Quand on punit le moqueur, celui qui manque d'expérience devient sage,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et quand on instruit le sage, il fait bon accueil à la connaissance.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Le juste examine la maison du méchant
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et il précipite les méchants dans le malheur.
  '13':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Celui qui ferme son oreille au cri du plus faible
  - type: usfm
    marker: q1
    children:
    - type: text
      text: criera lui aussi, et il n'aura pas de réponse.
  '14':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Un cadeau fait en secret apaise la colère,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: un pot-de-vin donné sous le manteau calme une fureur violente.
  '15':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: C'est une joie pour le juste de pratiquer l'équité,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: mais la ruine est réservée à celui qui commet l'injustice.
  '16':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: L'homme qui s'égare loin de la voie de la prudence
  - type: usfm
    marker: q1
    children:
    - type: text
      text: reposera dans l'assemblée des défunts.
  '17':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Celui qui aime la joie connaîtra la misère,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: celui qui aime le vin et l'huile
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '21.17 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Le vin et l''huile: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: signes d'une vie d'abondance et de luxe.
      marker-yv: yv-n
    - type: text
      text: ' ne s''enrichira pas.'
  '18':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Le méchant sert de rançon pour le juste,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et le traître pour les hommes droits.
  '19':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mieux vaut habiter dans une terre déserte
  - type: usfm
    marker: q1
    children:
    - type: text
      text: qu'avec une femme querelleuse et irritable.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Toutes les voies d'un homme sont droites à ses yeux,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: mais celui qui évalue les cœurs, c'est l'Eternel.
  '20':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: On trouve de précieux trésors et de l'huile dans le domaine du sage;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: l'homme stupide, lui, les engloutit.
  '21':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Celui qui poursuit la justice et la bonté
  - type: usfm
    marker: q1
    children:
    - type: text
      text: trouvera la vie, la justice et la gloire.
  '22':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Le sage monte contre une ville de héros
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et abat la force dans laquelle elle plaçait sa confiance.
  '23':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Celui qui veille sur sa bouche et sa langue
  - type: usfm
    marker: q1
    children:
    - type: text
      text: se préserve de bien des angoisses.
  '24':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: L'orgueilleux, l'insolent, voilà ce qu'on appelle un moqueur;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: il agit avec une arrogance débordante.
  '25':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Les désirs du paresseux le tuent parce que ses mains se refusent à l'action;
  '26':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: toute la journée il éprouve des désirs;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: le juste, en revanche, donne sans retenue.
  '27':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Le sacrifice qu'offrent les méchants fait horreur,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: car ils l'offrent avec des pensées criminelles.
  '28':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Le témoin menteur va à sa perte,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: mais l'homme qui sait écouter pourra parler indéfiniment.
  '29':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Le méchant prend des airs effrontés,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: tandis que l'homme droit affermit sa voie.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: La pratique de la justice et de l'équité,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: voilà ce que l'Eternel préfère aux sacrifices.
  '30':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Il n'y a ni sagesse, ni intelligence,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ni conseil qui tienne contre l'Eternel.
  '31':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: On prépare le cheval pour le jour du combat,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: mais c'est à l'Eternel qu'appartient la victoire.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Des regards hautains, un cœur orgueilleux:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: l'éclat des méchants n'est que péché.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Les projets de l'homme actif sont tout profit,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: mais celui qui agit avec précipitation n'arrive qu'à la misère.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Des trésors amassés par une langue mensongère,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: c'est un souffle qui s'évanouit, une recherche de la mort.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: La violence des méchants les emporte
  - type: usfm
    marker: q1
    children:
    - type: text
      text: parce qu'ils refusent de pratiquer l'équité.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: L'homme malhonnête emprunte une voie tortueuse,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: tandis que celui qui est pur agit avec droiture.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mieux vaut habiter à l'angle d'un toit
  - type: usfm
    marker: q1
    children:
    - type: text
      text: que faire maison commune avec une femme querelleuse.
