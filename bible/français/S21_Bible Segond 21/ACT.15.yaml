document_id: ACT.15,152
type_code: fra
verses:
  '1':
  - type: heading
    content: La question des non-Juifs et de la loi
  - type: text
    content: 'Quelques hommes venus de Judée enseignaient les frères en disant: «Si vous n''êtes pas circoncis selon la coutume de Moïse, vous ne pouvez pas être sauvés.» '
  '10':
  - type: text
    content: 'Maintenant donc, pourquoi provoquer Dieu en imposant aux disciples des exigences que ni nos ancêtres ni nous n''avons été capables de remplir? '
  '11':
  - type: text
    content: Nous croyons au contraire que c'est par la grâce du Seigneur Jésus que nous sommes sauvés, tout comme eux.»
  '12':
  - type: text
    content: Toute l'assemblée garda le silence et l'on écouta Barnabas et Paul raconter tous les signes miraculeux et les prodiges que Dieu avait accomplis par leur intermédiaire au milieu des non-Juifs.
  '13':
  - type: text
    content: 'Lorsqu''ils eurent fini de parler, Jacques prit la parole et dit: «Mes frères, écoutez-moi! '
  '14':
  - type: text
    content: 'Simon a raconté comment dès le début Dieu est intervenu pour choisir parmi les nations un peuple qui porte son nom. '
  '15':
  - type: text
    content: 'Cela s''accorde avec les paroles des prophètes, puisqu''il est écrit: '
  '16':
  - type: text
    content: Après cela, je reviendrai, je relèverai de sa chute la tente de David, je réparerai ses ruines et je la redresserai;
  - type: text
    content: ' '
  '17':
  - type: text
    content: alors le reste des hommes cherchera le Seigneur, ainsi que toutes les nations appelées de mon nom, dit le Seigneur qui fait [tout] cela
  - type: note
    content: 'Après cela… tout cela: citation d''Amos 9.11-12.'
  - type: text
    content: ' '
  '18':
  - type: text
    content: et de qui cela est connu de toute éternité.
  '19':
  - type: text
    content: '»C''est pourquoi, je pense qu''on ne doit pas créer de difficultés aux non-Juifs qui se tournent vers Dieu, '
  '2':
  - type: text
    content: 'Paul et Barnabas eurent un vif débat et une vive discussion avec eux. Les frères décidèrent alors que Paul, Barnabas et quelques-uns d''entre eux monteraient à Jérusalem vers les apôtres et les anciens pour traiter cette question. '
  '20':
  - type: text
    content: 'mais qu''il faut leur écrire d''éviter les souillures des idoles, l''immoralité sexuelle, les animaux étouffés et le sang. '
  '21':
  - type: text
    content: En effet, depuis bien des générations, dans chaque ville des hommes prêchent la loi de Moïse, puisqu'on la lit chaque sabbat dans les synagogues.»
  '22':
  - type: text
    content: 'Alors il parut bon aux apôtres et aux anciens, ainsi qu''à toute l''Eglise, de choisir parmi eux Jude, appelé Barsabas, et Silas, des hommes estimés parmi les frères, et de les envoyer à Antioche avec Paul et Barnabas. '
  '23':
  - type: text
    content: 'Ils les chargèrent du message que voici:'
  - type: text
    content: '«Les apôtres, les anciens et les frères aux frères et sœurs d''origine non juive qui sont à Antioche, en Syrie et en Cilicie, salut! '
  '24':
  - type: text
    content: 'Nous avons appris que des hommes partis de chez nous, mais sans aucun ordre de notre part, vous ont troublés par leurs discours et vous ont ébranlés [en vous disant de vous faire circoncire et de respecter la loi]. '
  '25':
  - type: text
    content: 'C''est pourquoi nous avons décidé, d''un commun accord, de choisir des délégués et de vous les envoyer avec nos bien-aimés Barnabas et Paul, '
  '26':
  - type: text
    content: 'ces hommes qui ont livré leur vie pour le nom de notre Seigneur Jésus-Christ. '
  '27':
  - type: text
    content: 'Nous avons donc envoyé Jude et Silas qui vous annonceront de vive voix les mêmes choses. '
  '28':
  - type: text
    content: 'En effet, il a paru bon au Saint-Esprit et à nous de ne pas vous imposer d''autre charge que ce qui est nécessaire: '
  '29':
  - type: text
    content: vous abstenir des viandes sacrifiées aux idoles, du sang, des animaux étouffés et de l'immoralité sexuelle. Vous agirez bien en évitant tout cela. Adieu.»
  '3':
  - type: text
    content: 'Envoyés donc par l''Eglise, ils traversèrent la Phénicie et la Samarie en racontant la conversion des non-Juifs, et ils causèrent une grande joie à tous les frères et sœurs. '
  '30':
  - type: text
    content: 'Ils prirent donc congé de l''Eglise et allèrent à Antioche, où ils réunirent l''assemblée et lui remirent la lettre. '
  '31':
  - type: text
    content: 'On en fit la lecture et tous se réjouirent de l''encouragement qu''elle leur apportait. '
  '32':
  - type: text
    content: 'Jude et Silas, qui étaient eux-mêmes prophètes, encouragèrent les frères et les fortifièrent en leur parlant longuement. '
  '33':
  - type: text
    content: 'Au bout de quelque temps, ceux-ci les laissèrent retourner en paix vers ceux qui les avaient envoyés. '
  '34':
  - type: text
    content: '[Toutefois Silas trouva bon de rester.]'
  '35':
  - type: text
    content: Paul et Barnabas restèrent à Antioche; ils enseignaient et annonçaient avec beaucoup d'autres la bonne nouvelle de la parole du Seigneur.
  - type: heading
    content: Deuxième voyage missionnaire
  - type: heading
    content: 15.36–18.22
  - type: heading
    content: De nouvelles équipes
  '36':
  - type: text
    content: 'Quelques jours plus tard, Paul dit à Barnabas: «Retournons visiter nos frères et sœurs dans toutes les villes où nous avons annoncé la parole du Seigneur, pour voir comment ils vont.» '
  '37':
  - type: text
    content: 'Barnabas voulait emmener aussi Jean, surnommé Marc, '
  '38':
  - type: text
    content: 'mais Paul estimait qu''il ne fallait pas prendre avec eux celui qui les avait quittés depuis la Pamphylie et ne les avait pas accompagnés dans leur tâche. '
  '39':
  - type: text
    content: 'Ce désaccord fut assez vif pour qu''ils se séparent l''un de l''autre. Barnabas prit Marc avec lui et embarqua pour l''île de Chypre. '
  '4':
  - type: text
    content: 'Arrivés à Jérusalem, ils furent accueillis par l''Eglise, les apôtres et les anciens, et ils rapportèrent tout ce que Dieu avait fait avec eux. '
  '40':
  - type: text
    content: 'Paul choisit Silas et partit, confié par les frères à la grâce du Seigneur. '
  '41':
  - type: text
    content: Il traversa la Syrie et la Cilicie en fortifiant les Eglises.
  '5':
  - type: text
    content: Alors quelques croyants issus du parti des pharisiens se levèrent en disant qu'il fallait circoncire les non-Juifs et leur ordonner de respecter la loi de Moïse.
  '6':
  - type: text
    content: 'Les apôtres et les anciens se réunirent pour examiner cette question. '
  '7':
  - type: text
    content: 'Il y eut une longue discussion. Pierre se leva alors et leur dit: «Mes frères, vous savez que, dès les premiers jours, Dieu a fait un choix parmi nous: il a décidé que les non-Juifs entendraient par ma bouche la parole de l''Evangile et croiraient. '
  '8':
  - type: text
    content: 'Et Dieu, qui connaît les cœurs, leur a rendu témoignage en leur donnant le Saint-Esprit comme à nous. '
  '9':
  - type: text
    content: 'Il n''a fait aucune différence entre eux et nous, puisqu''il a purifié leur cœur par la foi. '
