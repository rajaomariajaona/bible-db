document_id: 1KI.20
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Attaques syriennes contre Samarie
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Ben-Hadad, le roi de Syrie, rassembla toute son armée. Il avait avec lui 32 rois, ainsi que des chevaux et des chars. Il monta, installa le siège devant Samarie et l''attaqua. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Il envoya dans la ville des messagers à Achab, le roi d''Israël, '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'pour lui annoncer: «Voici ce que dit Ben-Hadad: ‘Ton argent et ton or sont ma propriété, tes femmes et tes plus beaux enfants m''appartiennent.’» '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Le roi d''Israël répondit: «Comme tu le dis, mon seigneur le roi, je t''appartiens avec tout ce que j''ai.» '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Les messagers revinrent annoncer: «Voici ce que dit Ben-Hadad: ‘Je t''ai fait ordonner de me livrer ton argent et ton or, tes femmes et tes enfants. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: J'enverrai donc demain, à la même heure, mes serviteurs chez toi. Ils fouilleront ta maison et celles de tes serviteurs, ils mettront la main sur tout ce que tu as de précieux et l'emporteront.’»
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Le roi d''Israël appela tous les anciens du pays et leur dit: «Sachez bien et comprenez que cet homme nous veut du mal. En effet, il m''a déjà réclamé mes femmes et mes enfants, mon argent et mon or, et je ne lui ai rien refusé!» '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Tous les anciens et tout le peuple dirent à Achab: «Ne l''écoute pas et ne cède pas.» '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Achab dit alors aux messagers de Ben-Hadad: «Dites à mon seigneur le roi: ‘Je ferai tout ce que tu as réclamé à ton serviteur la première fois. Toutefois, cela, je ne peux pas le faire.’» Les messagers s''en allèrent et rapportèrent cette réponse.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Ben-Hadad envoya dire à Achab: «Que les dieux me traitent avec la plus grande sévérité, si la poussière des décombres de Samarie suffit pour remplir le creux de la main de toute l''armée qui me suit!» '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Le roi d''Israël répondit: «Celui qui endosse une armure pour aller au combat ne doit pas se vanter comme s''il la déposait après avoir combattu!»'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Lorsque Ben-Hadad reçut cette réponse, il était en train de boire avec les rois sous les tentes et il dit à ses serviteurs: «Faites vos préparatifs!» Ils firent alors leurs préparatifs contre la ville. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Mais voici qu''un prophète s''approcha d''Achab, le roi d''Israël, et annonça: «Voici ce que dit l''Eternel: Vois-tu toute cette grande foule? Je vais la livrer aujourd''hui entre tes mains et tu sauras que je suis l''Eternel.» '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Achab dit: «Grâce à qui?» Il répondit: «Voici ce que dit l''Eternel: Ce sera grâce aux serviteurs des chefs de district.» Achab demanda: «Qui doit engager le combat?» Il répondit: «Toi.» '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Alors Achab passa en revue les serviteurs des chefs de district et il en trouva 232. Après eux, il passa en revue tout le peuple, l'ensemble des Israélites, et ils étaient 7000.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Ils firent une sortie à midi, alors que Ben-Hadad buvait et s''enivrait sous les tentes avec les 32 rois qui étaient venus à son aide. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Les serviteurs des chefs de district sortirent les premiers. Ben-Hadad envoya des espions et on lui rapporta: «Des hommes sont sortis de Samarie.» '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Il dit: «Qu''ils sortent pour demander la paix ou pour combattre, capturez-les vivants!» '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Lorsque les serviteurs des chefs de district et l''armée qui les suivait furent sortis de la ville, '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'ils combattirent au corps à corps et les Syriens prirent la fuite. Israël les poursuivit et Ben-Hadad, le roi de Syrie, se sauva sur un cheval avec des cavaliers. '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Le roi d'Israël sortit, frappa les chevaux et les chars et infligea une grande défaite aux Syriens.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Alors le prophète s''approcha du roi d''Israël et lui dit: «Vas-y, fortifie-toi, examine la situation et vois ce que tu as à faire. En effet, l''année prochaine, le roi de Syrie montera t''attaquer.»'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Les serviteurs du roi de Syrie dirent à leur seigneur: «Le dieu des Israélites est un dieu des montagnes. Voilà pourquoi ils ont été plus forts que nous. Mais combattons-les dans la plaine, et l''on verra si nous ne serons pas plus forts qu''eux. '
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Fais encore ceci: retire chacun des rois de son poste et remplace-les par des gouverneurs. '
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: Forme-toi une armée pareille à celle que tu as perdue, avec autant de chevaux et de chars. Ensuite, nous les combattrons dans la plaine et l'on verra si nous ne serons pas plus forts qu'eux.» Le roi les écouta et agit de cette manière.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'L''année suivante, Ben-Hadad passa les Syriens en revue et monta vers Aphek pour combattre Israël. '
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: Les Israélites furent aussi passés en revue. Ils reçurent des vivres et marchèrent à la rencontre des Syriens. Ils campèrent vis-à-vis d'eux, pareils à deux petits troupeaux de chèvres, alors que les Syriens remplissaient le pays.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'L''homme de Dieu s''approcha et annonça au roi d''Israël: «Voici ce que dit l''Eternel: Parce que les Syriens ont dit: ‘L''Eternel est un dieu des montagnes et non un dieu des vallées’, je vais livrer toute cette grande foule entre tes mains et vous saurez que je suis l''Eternel.»'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'Ils campèrent 7 jours en face les uns des autres. Le septième jour, on engagea le combat et les Israélites tuèrent 100''000 fantassins syriens en un jour. '
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: Le reste se réfugia dans la ville d'Aphek et la muraille tomba sur ces 27'000 hommes qui restaient.
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Ben-Hadad s''était réfugié dans la ville d''Aphek, où il allait de chambre en chambre. '
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'Ses serviteurs lui dirent: «Nous avons appris que les rois de la communauté d''Israël sont des rois pleins de bienveillance. Nous allons mettre des sacs autour de la taille et des cordes autour de notre tête, et nous sortirons vers le roi d''Israël. Peut-être qu''il te laissera la vie sauve.» '
  - type: usfm
    marker: v
    metadata:
      v: '32'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'Ils se mirent des sacs autour de la taille et des cordes autour de la tête, et ils allèrent trouver le roi d''Israël. Ils dirent: «Ton serviteur Ben-Hadad te demande de lui laisser la vie sauve.» Achab répondit: «Est-il encore en vie? Il est mon frère.» '
  - type: usfm
    marker: v
    metadata:
      v: '33'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: 'Ces hommes y virent un bon présage et ils s''empressèrent de le prendre au mot et de dire: «Ben-Hadad est ton frère!» Il dit: «Allez-y, amenez-le.» Ben-Hadad vint vers lui et Achab le fit monter sur son char. '
  - type: usfm
    marker: v
    metadata:
      v: '34'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: 'Ben-Hadad lui dit: «Je te rendrai les villes que mon père avait prises au tien et tu pourras faire du commerce à Damas, comme mon père l''avait fait à Samarie.» «Quant à moi, reprit Achab, je vais te laisser partir après avoir conclu une alliance avec toi.» Il fit alliance avec lui et le laissa partir.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '35'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: 'L''un des membres de la communauté de prophètes dit à son compagnon, sur l''ordre de l''Eternel: «Frappe-moi, je t''en prie!» Mais cet homme refusa de le frapper. '
  - type: usfm
    marker: v
    metadata:
      v: '36'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: 'Alors il lui dit: «Parce que tu n''as pas obéi à l''Eternel, quand tu m''auras quitté, le lion te tuera.» Quand l''homme l''eut quitté, il rencontra un lion qui le tua. '
  - type: usfm
    marker: v
    metadata:
      v: '37'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: 'Le prophète trouva un autre homme et dit: «Frappe-moi, je t''en prie!» Cet homme le frappa et le blessa. '
  - type: usfm
    marker: v
    metadata:
      v: '38'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: text
    text: 'Le prophète alla alors se poster sur la route empruntée par le roi et il se masqua les yeux avec un bandeau. '
  - type: usfm
    marker: v
    metadata:
      v: '39'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '39'
  - type: text
    text: 'Lorsque le roi passa, il cria vers lui et dit: «Ton serviteur était au milieu du combat. Voici qu''un homme s''est approché et m''a amené un autre homme en disant: ‘Garde cet homme. S''il vient à disparaître, ta vie sera échangée contre la sienne ou bien tu devras payer 30 kilos d''argent.’ '
  - type: usfm
    marker: v
    metadata:
      v: '40'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '40'
  - type: text
    text: 'Or, pendant que ton serviteur était occupé çà et là, l''homme a disparu.» Le roi d''Israël lui dit: «C''est là ta sentence, tu l''as prononcée toi-même.» '
  - type: usfm
    marker: v
    metadata:
      v: '41'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '41'
  - type: text
    text: 'Aussitôt le prophète retira le bandeau qui couvrait ses yeux, et le roi d''Israël reconnut qu''il était l''un des prophètes. '
  - type: usfm
    marker: v
    metadata:
      v: '42'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '42'
  - type: text
    text: 'Il dit alors au roi: «Voici ce que dit l''Eternel: Parce que tu as laissé échapper l''homme que j''avais voué à la destruction, ta vie sera échangée contre la sienne, et ton peuple contre le sien.» '
  - type: usfm
    marker: v
    metadata:
      v: '43'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '43'
  - type: text
    text: Le roi d'Israël repartit chez lui, triste et irrité, et il arriva ainsi à Samarie.
