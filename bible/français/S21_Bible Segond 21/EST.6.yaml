document_id: EST.6
type_code: fra
segments:
- type: usfm
  marker: nb
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Cette nuit-là, le roi ne parvint pas à trouver le sommeil. Il se fit donc apporter le registre des événements marquants, les annales, et l''on en fit la lecture devant lui. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'On y trouva mentionnées les révélations faites par Mardochée à propos de Bigthan et de Théresh, les deux eunuques du roi qui avaient la garde de l''entrée et qui avaient voulu porter la main contre le roi Assuérus. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Le roi demanda: «Quelle marque d''honneur et de grandeur a-t-on accordée à Mardochée pour cela?» «On ne lui a absolument rien accordé», répondirent les jeunes serviteurs du roi. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Le roi demanda alors: «Qui donc est dans la cour?» – Haman avait fait son apparition dans la cour extérieure du palais pour demander au roi de faire pendre Mardochée à la potence qu''il avait préparée à son intention. – '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Les serviteurs du roi lui répondirent: «C''est Haman qui se tient dans la cour.» «Qu''il entre!» ordonna le roi.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Dès qu''Haman fut entré, le roi lui demanda: «Comment faut-il traiter un homme que le roi veut honorer?» Haman se dit: «Qui d''autre, à part moi, le roi voudrait-il honorer?» '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'et il lui répondit: «Si le roi veut honorer un homme, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'il faut prendre un vêtement royal que le roi a déjà porté, ainsi qu''un cheval que le roi a déjà monté et sur la tête duquel on ait posé une couronne royale. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Il faut confier le vêtement et le cheval à l''un des plus illustres princes du roi, mettre cette tenue à l''homme que le roi veut honorer, le conduire, monté sur le cheval, sur la place de la ville et crier devant lui: ‘Voici comment l''on agit pour l''homme que le roi veut honorer!’»'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Le roi dit à Haman: «Dépêche-toi de prendre le vêtement et le cheval, comme tu l''as dit, et fais tout cela pour le Juif Mardochée qui est assis à la porte du roi, sans rien négliger de tout ce que tu as mentionné!» '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Haman prit donc le vêtement et le cheval, mit cette tenue à Mardochée et le conduisit, monté sur le cheval, sur la place de la ville en criant devant lui: «Voici comment l''on agit pour l''homme que le roi veut honorer!»'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Mardochée retourna ensuite à la porte du roi, tandis qu''Haman s''empressait de rentrer chez lui, dans une attitude de deuil et la tête couverte. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Lorsqu''il exposa point par point à sa femme Zéresh et à tous ses amis tout ce qui lui était arrivé, ses conseillers et sa femme Zéresh lui dirent: «Si ce Mardochée devant lequel tu as entamé ta déchéance est un Juif, tu ne pourras rien faire contre lui: tu ne pourras que perdre la partie contre lui.» '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Ils parlaient encore avec lui quand les eunuques du roi arrivèrent. Ils s'empressèrent de conduire Haman au banquet qu'Esther avait préparé.
