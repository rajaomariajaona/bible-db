document_id: JER.25,152
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: 70 ans d'exil
    marker-yv: yv-h
  - type: usfm
    marker: d
    children:
    - type: text
      text: 'Voici la parole adressée à Jérémie au sujet de toute la population de Juda, la quatrième année du règne de Jojakim, fils de Josias, sur Juda, qui était aussi la première année de règne de Nebucadnetsar sur Babylone. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Je ferai disparaître de chez eux les cris de réjouissance et de joie, les chants du fiancé et de la fiancée, le bruit de la meule et la lumière de la lampe. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Tout ce pays deviendra une ruine, un endroit dévasté, et ces nations seront esclaves du roi de Babylone pendant 70 ans.
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '»Cependant, lorsque ces 70 ans seront passés, j''interviendrai contre le roi de Babylone et contre son peuple à cause de leurs fautes, déclare l''Eternel, j''interviendrai contre le pays des Babyloniens et j''en ferai un désert pour toujours. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Je ferai venir sur ce pays tout ce que j''ai annoncé sur lui, tout ce qui est écrit dans ce livre, ce que Jérémie a prophétisé sur toutes les nations. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: En effet, des nations puissantes et de grands rois feront d'eux aussi leurs esclaves et je les traiterai conformément à leurs actes et à leur manière d'agir.»
  '15':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Oui, voici ce que m''a dit l''Eternel, le Dieu d''Israël: «Prends dans ma main cette coupe, remplie du vin de ma colère, et donne-la à boire à toutes les nations vers lesquelles je vais t''envoyer.'
  '16':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Elles boiront, elles tituberont et elles perdront la tête devant l'épée que j'envoie parmi elles.»
  '17':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'J''ai pris la coupe de la main de l''Eternel et je l''ai donnée à boire à toutes les nations vers lesquelles il m''avait envoyé:'
  '18':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: à Jérusalem et aux villes de Juda, à ses rois et à ses chefs, pour en faire des ruines, un sujet de consternation, de moquerie et de malédiction, comme on peut le constater aujourd'hui;
  '19':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: au pharaon, roi d'Egypte, à ses serviteurs, ses chefs et tout son peuple;
  '2':
  - type: usfm
    marker: d
    children:
    - type: text
      text: Le prophète Jérémie la proclama à tous les habitants de Jérusalem et elle concernait toute la population de Juda.
  '20':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: aux peuples de toutes sortes, à tous les rois du pays d'Uts, à tous ceux du pays des Philistins, à Askalon, à Gaza, à Ekron et à ce qui reste d'Asdod;
  '21':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: aux Edomites, aux Moabites et aux Ammonites;
  '22':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: à tous les rois de Tyr, à tous ceux de Sidon et à ceux de la côte située de l'autre côté de la mer;
  '23':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: à Dedan, à Théma, à Buz et à tous ceux qui se rasent les coins de la barbe;
  '24':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: à tous les rois d'Arabie et à tous ceux des populations diverses qui habitent le désert;
  '25':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: à tous les rois de Zimri, à tous ceux d'Elam et à tous ceux de Médie;
  '26':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: à tous les rois du nord, qu'ils soient près ou loin, les uns après les autres, et à tous les royaumes du monde qui vivent à la surface de la terre. Enfin, le roi de Shéshac a dû boire après eux.
  '27':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'L''Eternel m''a ordonné: «Annonce-leur: ‘Voici ce que dit l''Eternel, le maître de l''univers, le Dieu d''Israël: Buvez, enivrez-vous, vomissez et tombez sans plus vous relever devant l''épée que j''envoie parmi vous!’'
  '28':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Et s''ils refusent de prendre la coupe de ta main pour la boire, dis-leur: ‘Voici ce que dit l''Eternel, le maître de l''univers: Vous en boirez, c''est certain!'
  '29':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: En effet, je commence à propager le malheur dans la ville à laquelle mon nom est associé, et vous, vous resteriez impunis? Vous ne resterez pas impunis, car j'appelle l'épée sur tous les habitants de la terre, déclare l'Eternel, le maître de l'univers.’
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '«Depuis la treizième année du règne de Josias, fils d''Amon, sur Juda et jusqu''à aujourd''hui, il y a 23 ans que la parole de l''Eternel m''est adressée. Je vous ai parlé et reparlé, inlassablement, mais vous n''avez pas écouté. '
  '30':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: '»Quant à toi, tu leur transmettras toutes ces prophéties et tu leur diras: ‘L''Eternel rugit d''en haut, de son saint refuge il fait retentir sa voix. Il rugit contre son domaine, il répond à tous les habitants de la terre d''un cri semblable à celui des hommes qui écrasent le raisin.'
  '31':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ce tapage se propage jusqu'aux extrémités de la terre, parce que l'Eternel est en conflit avec les nations. Il poursuit toute créature en justice, il livre les méchants à l'épée’, déclare l'Eternel.
  '32':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: '»Voici ce que dit l''Eternel, le maître de l''univers: Le malheur se propage de nation en nation et une grande tempête se lève depuis les extrémités de la terre.'
  '33':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Ce jour-là, ceux que l''Eternel aura tués seront étendus d''un bout à l''autre de la terre. Ils ne seront ni pleurés, ni ramassés, ni enterrés: ils seront pareils à du fumier sur la terre.»'
  '34':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Hurlez, bergers, criez! Et vous, les puissants du troupeau, roulez-vous dans la cendre! En effet, le moment où vous allez être massacrés est arrivé. Je vous briserai et vous tomberez comme un vase précieux.
  '35':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Plus de refuge pour les bergers! Plus d'échappatoire pour les puissants du troupeau!
  '36':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: On entend les cris des bergers, les hurlements des puissants du troupeau, car l'Eternel dévaste leur pâturage.
  '37':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Les plaines prospères sont réduites au silence à cause de la colère ardente de l'Eternel.
  '38':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Il a abandonné son refuge comme un jeune lion sa tanière. Oui, leur pays n'est plus que dévastation à cause de la fureur du destructeur, à cause de son ardente colère.
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'L''Eternel vous a envoyé tous ses serviteurs, les prophètes. Il les a envoyés, inlassablement, mais vous n''avez pas écouté, vous n''avez pas tendu l''oreille pour écouter. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ils disaient: ‘Que chacun renonce donc à sa mauvaise conduite et à la méchanceté de ses agissements! Ainsi vous pourrez habiter sur la terre que l''Eternel vous a donnée, à vous et à vos ancêtres, depuis toujours et pour toujours. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ne suivez pas d''autres dieux pour les servir et pour vous prosterner devant eux, ne m''irritez pas par votre manière d''agir, et je ne vous ferai aucun mal.’ '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Mais vous ne m'avez pas écouté, déclare l'Eternel, de sorte que vous m'avez irrité par votre manière d'agir, et ce pour votre malheur.
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '»C''est pourquoi, voici ce que dit l''Eternel, le maître de l''univers: Puisque vous n''avez pas écouté mes paroles, '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'je vais prendre et envoyer tous les peuples du nord, déclare l''Eternel, ainsi que mon serviteur Nebucadnetsar, roi de Babylone; je vais les faire venir contre ce pays, contre ses habitants et contre toutes les nations qui l''entourent. Je vais les vouer à la destruction et faire d''eux un sujet de consternation et de moquerie; il n''en restera que des ruines, et ce pour toujours. '
