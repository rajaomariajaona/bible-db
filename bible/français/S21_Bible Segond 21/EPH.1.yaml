document_id: EPH.1,152
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Adresse et salutation
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: De la part de Paul, apôtre de Jésus-Christ par la volonté de Dieu, aux saints
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1.1 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Saints: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: manière de désigner les chrétiens en tant que personnes consacrées à Dieu et appelées à avoir le comportement qui découle de leur appartenance à ce Dieu.
      marker-yv: yv-n
    - type: text
      text: 'qui sont [à Ephèse] et qui sont fidèles en Jésus-Christ: '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: pour le mettre à exécution lorsque le moment serait vraiment venu, à savoir de tout réunir sous l'autorité du Messie
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1.10 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Messie: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ou Christ, en grec Christos, oint, équivalent de l'hébreu mashiach (Messie), terme qui pouvait s'appliquer à un roi, un prêtre ou un prophète désigné par Dieu. L'Ancien Testament annonçait la venue de l'oint de Dieu qui apporterait la délivrance et exercerait une autorité universelle.
      marker-yv: yv-n
    - type: text
      text: ', aussi bien ce qui est dans le ciel que ce qui est sur la terre.'
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'En lui nous avons été désignés comme héritiers, ayant été prédestinés suivant le plan de celui qui met tout en œuvre conformément aux décisions de sa volonté '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: pour servir à célébrer sa gloire, nous qui avons par avance espéré dans le Messie.
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'En lui vous aussi, après avoir entendu la parole de la vérité, l''Evangile qui vous sauve, en lui vous avez cru et vous avez été marqués de l''empreinte du Saint-Esprit qui avait été promis. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: Il est le gage de notre héritage en attendant la libération de ceux que Dieu s'est acquis pour célébrer sa gloire.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Prière de Paul pour les Ephésiens
    marker-yv: yv-h
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'C''est pourquoi moi aussi, après avoir entendu parler de votre foi dans le Seigneur Jésus [et de votre amour] pour tous les saints, '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'je ne cesse de dire toute ma reconnaissance pour vous lorsque je fais mention de vous dans mes prières. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'Je prie que le Dieu de notre Seigneur Jésus-Christ, le Père de gloire, vous donne un esprit de sagesse et de révélation qui vous le fasse connaître. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'Je prie qu''il illumine les yeux de votre cœur pour que vous sachiez quelle est l''espérance qui s''attache à son appel, quelle est la richesse de son glorieux héritage au milieu des saints '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'et quelle est l''infinie grandeur de sa puissance, qui se manifeste avec efficacité par le pouvoir de sa force envers nous qui croyons. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: que la grâce et la paix vous soient données de la part de Dieu notre Père et du Seigneur Jésus-Christ!
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Les merveilleuses bénédictions du salut en Christ
    marker-yv: yv-h
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: 'Cette puissance, il l''a déployée en Christ quand il l''a ressuscité et l''a fait asseoir à sa droite dans les lieux célestes, '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: 'au-dessus de toute domination, de toute autorité, de toute puissance, de toute souveraineté et de tout nom qui peut être nommé, non seulement dans le monde présent, mais encore dans le monde à venir. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: usfm
      marker: qt
      children:
      - type: text
        text: Il a tout mis sous ses pieds
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1.22 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Il a… pieds: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'citation du '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Psaume 8.7
      - type: usfm
        marker: ft
        children:
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: ' et il l''a donné pour chef suprême à l''Eglise '
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: qui est son corps, la plénitude de celui qui remplit tout en tous.
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: Béni soit le Dieu et Père de notre Seigneur Jésus-Christ, qui nous a bénis de toute bénédiction spirituelle dans les lieux célestes en Christ!
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'En lui, Dieu nous a choisis avant la création du monde pour que nous soyons saints et sans défaut devant lui. Dans son amour, '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'il nous a prédestinés à être ses enfants adoptifs par Jésus-Christ. C''est ce qu''il a voulu, dans sa bienveillance, '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: pour que nous célébrions la gloire de sa grâce, dont il nous a comblés dans le bien-aimé
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1.6 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Le bien-aimé: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: c'est-à-dire Jésus-Christ.
      marker-yv: yv-n
    - type: text
      text: .
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'En lui, par son sang, nous sommes rachetés, pardonnés de nos fautes, conformément à la richesse de sa grâce. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'Dieu nous l''a accordée avec abondance, en toute sagesse et intelligence. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'Il nous a fait connaître le mystère de sa volonté, conformément au projet bienveillant qu''il avait formé en Christ '
