document_id: EPH.1,152
type_code: fra
verses:
  '1':
  - type: heading
    content: Adresse et salutation
  - type: text
    content: De la part de Paul, apôtre de Jésus-Christ par la volonté de Dieu, aux saints
  - type: note
    content: 'Saints: manière de désigner les chrétiens en tant que personnes consacrées à Dieu et appelées à avoir le comportement qui découle de leur appartenance à ce Dieu.'
  - type: text
    content: 'qui sont [à Ephèse] et qui sont fidèles en Jésus-Christ: '
  '10':
  - type: text
    content: pour le mettre à exécution lorsque le moment serait vraiment venu, à savoir de tout réunir sous l'autorité du Messie
  - type: note
    content: 'Messie: ou Christ, en grec Christos, oint, équivalent de l''hébreu mashiach (Messie), terme qui pouvait s''appliquer à un roi, un prêtre ou un prophète désigné par Dieu. L''Ancien Testament annonçait la venue de l''oint de Dieu qui apporterait la délivrance et exercerait une autorité universelle.'
  - type: text
    content: ', aussi bien ce qui est dans le ciel que ce qui est sur la terre.'
  '11':
  - type: text
    content: 'En lui nous avons été désignés comme héritiers, ayant été prédestinés suivant le plan de celui qui met tout en œuvre conformément aux décisions de sa volonté '
  '12':
  - type: text
    content: pour servir à célébrer sa gloire, nous qui avons par avance espéré dans le Messie.
  '13':
  - type: text
    content: 'En lui vous aussi, après avoir entendu la parole de la vérité, l''Evangile qui vous sauve, en lui vous avez cru et vous avez été marqués de l''empreinte du Saint-Esprit qui avait été promis. '
  '14':
  - type: text
    content: Il est le gage de notre héritage en attendant la libération de ceux que Dieu s'est acquis pour célébrer sa gloire.
  - type: heading
    content: Prière de Paul pour les Ephésiens
  '15':
  - type: text
    content: 'C''est pourquoi moi aussi, après avoir entendu parler de votre foi dans le Seigneur Jésus [et de votre amour] pour tous les saints, '
  '16':
  - type: text
    content: 'je ne cesse de dire toute ma reconnaissance pour vous lorsque je fais mention de vous dans mes prières. '
  '17':
  - type: text
    content: 'Je prie que le Dieu de notre Seigneur Jésus-Christ, le Père de gloire, vous donne un esprit de sagesse et de révélation qui vous le fasse connaître. '
  '18':
  - type: text
    content: 'Je prie qu''il illumine les yeux de votre cœur pour que vous sachiez quelle est l''espérance qui s''attache à son appel, quelle est la richesse de son glorieux héritage au milieu des saints '
  '19':
  - type: text
    content: 'et quelle est l''infinie grandeur de sa puissance, qui se manifeste avec efficacité par le pouvoir de sa force envers nous qui croyons. '
  '2':
  - type: text
    content: que la grâce et la paix vous soient données de la part de Dieu notre Père et du Seigneur Jésus-Christ!
  - type: heading
    content: Les merveilleuses bénédictions du salut en Christ
  '20':
  - type: text
    content: 'Cette puissance, il l''a déployée en Christ quand il l''a ressuscité et l''a fait asseoir à sa droite dans les lieux célestes, '
  '21':
  - type: text
    content: 'au-dessus de toute domination, de toute autorité, de toute puissance, de toute souveraineté et de tout nom qui peut être nommé, non seulement dans le monde présent, mais encore dans le monde à venir. '
  '22':
  - type: text
    content: Il a tout mis sous ses pieds
  - type: note
    content: 'Il a… pieds: citation du Psaume 8.7.'
  - type: text
    content: ' et il l''a donné pour chef suprême à l''Eglise '
  '23':
  - type: text
    content: qui est son corps, la plénitude de celui qui remplit tout en tous.
  '3':
  - type: text
    content: Béni soit le Dieu et Père de notre Seigneur Jésus-Christ, qui nous a bénis de toute bénédiction spirituelle dans les lieux célestes en Christ!
  '4':
  - type: text
    content: 'En lui, Dieu nous a choisis avant la création du monde pour que nous soyons saints et sans défaut devant lui. Dans son amour, '
  '5':
  - type: text
    content: 'il nous a prédestinés à être ses enfants adoptifs par Jésus-Christ. C''est ce qu''il a voulu, dans sa bienveillance, '
  '6':
  - type: text
    content: pour que nous célébrions la gloire de sa grâce, dont il nous a comblés dans le bien-aimé
  - type: note
    content: 'Le bien-aimé: c''est-à-dire Jésus-Christ.'
  - type: text
    content: .
  '7':
  - type: text
    content: 'En lui, par son sang, nous sommes rachetés, pardonnés de nos fautes, conformément à la richesse de sa grâce. '
  '8':
  - type: text
    content: 'Dieu nous l''a accordée avec abondance, en toute sagesse et intelligence. '
  '9':
  - type: text
    content: 'Il nous a fait connaître le mystère de sa volonté, conformément au projet bienveillant qu''il avait formé en Christ '
