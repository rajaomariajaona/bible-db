document_id: JOB.28
type_code: fra
segments:
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: »L'argent sort de quelque part
- type: usfm
  marker: q1
  children:
  - type: text
    text: et il existe un endroit pour affiner l'or;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: le fer est tiré de la poussière
- type: usfm
  marker: q1
  children:
  - type: text
    text: et on coule le bronze à partir d'une pierre.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: L'homme met fin aux ténèbres;
- type: usfm
  marker: q1
  children:
  - type: text
    text: il explore jusqu'à l'extrême limite
- type: usfm
  marker: q1
  children:
  - type: text
    text: les pierres cachées dans l'obscurité et dans l'ombre de la mort.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Il creuse un puits loin des endroits habités,
- type: usfm
  marker: q1
  children:
  - type: text
    text: là où les pieds ne sont d'aucune aide.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Il est suspendu, balancé
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '28.4 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Il est suspendu, balancé: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: description de la position des mineurs suspendus par des cordes.
    marker-yv: yv-n
  - type: text
    text: ', loin des humains.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: La terre qui fournit le pain
- type: usfm
  marker: q1
  children:
  - type: text
    text: est profondément bouleversée, comme par un feu.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Ses pierres contiennent du saphir
- type: usfm
  marker: q1
  children:
  - type: text
    text: et l'on y trouve de la poussière d'or.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: L'oiseau de proie n'en connaît pas le sentier,
- type: usfm
  marker: q1
  children:
  - type: text
    text: l'œil du faucon ne peut l'apercevoir;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: les plus fiers animaux n'y ont jamais marché,
- type: usfm
  marker: q1
  children:
  - type: text
    text: le lion n'y est jamais passé.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: L'homme porte sa main sur la roche,
- type: usfm
  marker: q1
  children:
  - type: text
    text: il bouleverse les montagnes depuis la racine,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: il ouvre des galeries dans les rochers,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et son œil peut contempler tout ce qu'il y a de précieux.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Il arrête l'écoulement de l'eau
- type: usfm
  marker: q1
  children:
  - type: text
    text: et il amène à la lumière ce qui est caché.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: »Mais la sagesse, où peut-on la trouver?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Où est l'emplacement de l'intelligence?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: L'homme ne connaît pas sa valeur.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Elle ne se trouve pas sur la terre des vivants.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'L''abîme dit: ‘Elle n''est pas en moi’'
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'et la mer dit: ‘Elle n''est pas avec moi.’'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Elle n'est pas donnée en échange d'or pur,
- type: usfm
  marker: q1
  children:
  - type: text
    text: on ne l'achète pas avec de l'argent.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: L'or d'Ophir ne fait pas le poids contre elle,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ni le précieux onyx ou le saphir.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: On ne peut la comparer ni à l'or ni au verre,
- type: usfm
  marker: q1
  children:
  - type: text
    text: on ne peut l'échanger contre un vase en or fin.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Oubliés, le corail et le cristal!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Posséder la sagesse, c'est avoir plus que des perles.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: La topaze d'Ethiopie ne peut être comparée à elle
- type: usfm
  marker: q1
  children:
  - type: text
    text: et l'or pur ne fait pas le poids contre elle.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: »D'où vient donc la sagesse?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Où est l'emplacement de l'intelligence?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Elle est cachée aux yeux de tout être vivant,
- type: usfm
  marker: q1
  children:
  - type: text
    text: elle est cachée aux oiseaux.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Le gouffre de perdition et la mort disent:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: ‘Nous en avons entendu parler.’
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: C'est Dieu qui sait comment parvenir jusqu'à elle,
- type: usfm
  marker: q1
  children:
  - type: text
    text: c'est lui qui connaît son emplacement,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: car il voit jusqu'aux extrémités de la terre,
- type: usfm
  marker: q1
  children:
  - type: text
    text: il aperçoit tout sous le ciel.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: »Quand il a déterminé le poids du vent
- type: usfm
  marker: q1
  children:
  - type: text
    text: et fixé la mesure de l'eau,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: quand il a donné des règles à la pluie
- type: usfm
  marker: q1
  children:
  - type: text
    text: et tracé un chemin pour l'éclair et le tonnerre,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: c'est alors que Dieu a vu la sagesse et l'a mise en évidence;
- type: usfm
  marker: q1
  children:
  - type: text
    text: il en a posé les fondations et l'a examinée.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'Puis il a dit à l''homme:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: ‘La crainte du Seigneur, voilà en quoi consiste la sagesse.
- type: usfm
  marker: q1
  children:
  - type: text
    text: S'éloigner du mal, voilà en quoi consiste l'intelligence.’»
