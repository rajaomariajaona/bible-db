document_id: JOB.28,152
type_code: fra
verses:
  '1':
  - type: text
    content: »L'argent sort de quelque part
  - type: text
    content: et il existe un endroit pour affiner l'or;
  '10':
  - type: text
    content: il ouvre des galeries dans les rochers,
  - type: text
    content: et son œil peut contempler tout ce qu'il y a de précieux.
  '11':
  - type: text
    content: Il arrête l'écoulement de l'eau
  - type: text
    content: et il amène à la lumière ce qui est caché.
  '12':
  - type: text
    content: »Mais la sagesse, où peut-on la trouver?
  - type: text
    content: Où est l'emplacement de l'intelligence?
  '13':
  - type: text
    content: L'homme ne connaît pas sa valeur.
  - type: text
    content: Elle ne se trouve pas sur la terre des vivants.
  '14':
  - type: text
    content: 'L''abîme dit: ‘Elle n''est pas en moi’'
  - type: text
    content: 'et la mer dit: ‘Elle n''est pas avec moi.’'
  '15':
  - type: text
    content: Elle n'est pas donnée en échange d'or pur,
  - type: text
    content: on ne l'achète pas avec de l'argent.
  '16':
  - type: text
    content: L'or d'Ophir ne fait pas le poids contre elle,
  - type: text
    content: ni le précieux onyx ou le saphir.
  '17':
  - type: text
    content: On ne peut la comparer ni à l'or ni au verre,
  - type: text
    content: on ne peut l'échanger contre un vase en or fin.
  '18':
  - type: text
    content: Oubliés, le corail et le cristal!
  - type: text
    content: Posséder la sagesse, c'est avoir plus que des perles.
  '19':
  - type: text
    content: La topaze d'Ethiopie ne peut être comparée à elle
  - type: text
    content: et l'or pur ne fait pas le poids contre elle.
  '2':
  - type: text
    content: le fer est tiré de la poussière
  - type: text
    content: et on coule le bronze à partir d'une pierre.
  '20':
  - type: text
    content: »D'où vient donc la sagesse?
  - type: text
    content: Où est l'emplacement de l'intelligence?
  '21':
  - type: text
    content: Elle est cachée aux yeux de tout être vivant,
  - type: text
    content: elle est cachée aux oiseaux.
  '22':
  - type: text
    content: 'Le gouffre de perdition et la mort disent:'
  - type: text
    content: ‘Nous en avons entendu parler.’
  '23':
  - type: text
    content: C'est Dieu qui sait comment parvenir jusqu'à elle,
  - type: text
    content: c'est lui qui connaît son emplacement,
  '24':
  - type: text
    content: car il voit jusqu'aux extrémités de la terre,
  - type: text
    content: il aperçoit tout sous le ciel.
  '25':
  - type: text
    content: »Quand il a déterminé le poids du vent
  - type: text
    content: et fixé la mesure de l'eau,
  '26':
  - type: text
    content: quand il a donné des règles à la pluie
  - type: text
    content: et tracé un chemin pour l'éclair et le tonnerre,
  '27':
  - type: text
    content: c'est alors que Dieu a vu la sagesse et l'a mise en évidence;
  - type: text
    content: il en a posé les fondations et l'a examinée.
  '28':
  - type: text
    content: 'Puis il a dit à l''homme:'
  - type: text
    content: ‘La crainte du Seigneur, voilà en quoi consiste la sagesse.
  - type: text
    content: S'éloigner du mal, voilà en quoi consiste l'intelligence.’»
  '3':
  - type: text
    content: L'homme met fin aux ténèbres;
  - type: text
    content: il explore jusqu'à l'extrême limite
  - type: text
    content: les pierres cachées dans l'obscurité et dans l'ombre de la mort.
  '4':
  - type: text
    content: Il creuse un puits loin des endroits habités,
  - type: text
    content: là où les pieds ne sont d'aucune aide.
  - type: text
    content: Il est suspendu, balancé
  - type: note
    content: 'Il est suspendu, balancé: description de la position des mineurs suspendus par des cordes.'
  - type: text
    content: ', loin des humains.'
  '5':
  - type: text
    content: La terre qui fournit le pain
  - type: text
    content: est profondément bouleversée, comme par un feu.
  '6':
  - type: text
    content: Ses pierres contiennent du saphir
  - type: text
    content: et l'on y trouve de la poussière d'or.
  '7':
  - type: text
    content: L'oiseau de proie n'en connaît pas le sentier,
  - type: text
    content: l'œil du faucon ne peut l'apercevoir;
  '8':
  - type: text
    content: les plus fiers animaux n'y ont jamais marché,
  - type: text
    content: le lion n'y est jamais passé.
  '9':
  - type: text
    content: L'homme porte sa main sur la roche,
  - type: text
    content: il bouleverse les montagnes depuis la racine,
