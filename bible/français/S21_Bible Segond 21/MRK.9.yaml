document_id: MRK.9,152
type_code: fra
verses:
  '1':
  - type: usfm
    marker: nb
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Il leur dit encore: «Je vous le dis en vérité, quelques-uns de ceux qui sont ici ne mourront pas avant d''avoir vu le royaume de Dieu venir avec puissance.»'
  - type: usfm
    marker: s1
    children:
    - type: text
      text: La transfiguration
    marker-yv: yv-h
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'Ils retinrent cette parole, se demandant entre eux ce que signifiait ressusciter. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'Puis ils lui posèrent cette question: «Pourquoi les spécialistes de la loi disent-ils qu''Elie doit venir d''abord?» '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'Il leur répondit: «Elie doit venir d''abord pour rétablir toutes choses. Et pourquoi est-il écrit, à propos du Fils de l''homme, qu''il doit souffrir beaucoup et être méprisé? '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'Mais je vous le dis: Elie est déjà venu et ils l''ont traité comme ils ont voulu, conformément à ce qui est écrit à son sujet.»'
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Guérison d'un démoniaque
    marker-yv: yv-h
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'Lorsqu''ils revinrent vers les disciples, ils virent autour d''eux une grande foule et des spécialistes de la loi qui discutaient avec eux. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'Dès que les gens virent Jésus, ils furent surpris et accoururent pour le saluer. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'Il leur demanda: «De quoi discutez-vous avec eux?» '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'Un homme de la foule lui répondit: «Maître, je t''ai amené mon fils qui a un esprit muet. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'Partout où l''esprit s''empare de lui, il le jette par terre; l''enfant écume, grince des dents et devient tout raide. J''ai prié tes disciples de chasser l''esprit et ils n''ont pas pu.» '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: '«Génération incrédule, leur dit Jésus, jusqu''à quand serai-je avec vous? Jusqu''à quand devrai-je vous supporter? Amenez-le-moi.» On le lui amena. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'Six jours après, Jésus prit avec lui Pierre, Jacques et Jean, et il les conduisit seuls à l''écart sur une haute montagne. Il fut transfiguré devant eux; '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: 'Dès que l''enfant vit Jésus, l''esprit l''agita avec violence; il tomba, et il se roulait par terre en écumant. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: 'Jésus demanda au père: «Depuis combien de temps cela lui arrive-t-il?» «Depuis son enfance, répondit-il, '
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: 'et souvent l''esprit l''a jeté dans le feu et dans l''eau pour le faire mourir. Mais si tu peux faire quelque chose, viens à notre secours, aie compassion de nous.» '
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: 'Jésus lui dit: «Si tu peux! Tout est possible à celui qui croit.» '
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: 'Aussitôt le père de l''enfant, [en larmes,] s''écria: «Je crois, [Seigneur,] viens au secours de mon incrédulité!» '
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: 'Voyant accourir la foule, Jésus menaça l''esprit impur en lui disant: «Esprit muet et sourd, je te l''ordonne, sors de cet enfant et n''y rentre plus.» '
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: 'L''esprit sortit de l''enfant en poussant des cris et en le secouant très violemment. L''enfant devint comme mort, de sorte que beaucoup disaient qu''il était mort, '
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: mais Jésus le prit par la main, le fit lever, et il se tint debout.
  '28':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: 'Quand Jésus entra dans la maison, ses disciples lui demandèrent en privé: «Pourquoi n''avons-nous pas pu chasser cet esprit?» '
  '29':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: 'Il leur dit: «Cette espèce-là ne peut sortir que par la prière [et par le jeûne].»'
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'ses vêtements devinrent resplendissants et d''une telle blancheur que personne sur la terre ne peut blanchir ainsi. '
  '30':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '30'
    - type: text
      text: 'Ils partirent de là et traversèrent la Galilée. Jésus ne voulait pas qu''on le sache, '
  '31':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '31'
    - type: text
      text: 'car il enseignait ses disciples et il leur disait: «Le Fils de l''homme sera livré entre les mains des hommes; ils le feront mourir et, trois jours après avoir été mis à mort, il ressuscitera.» '
  '32':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '32'
    - type: text
      text: Cependant, les disciples ne comprenaient pas cette parole et ils avaient peur de l'interroger.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Petits et grands dans le royaume de Dieu
    marker-yv: yv-h
  '33':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '33'
    - type: text
      text: 'Ils arrivèrent à Capernaüm. Lorsqu''il fut dans la maison, Jésus leur demanda: «De quoi discutiez-vous en chemin?» '
  '34':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '34'
    - type: text
      text: 'Mais ils gardèrent le silence, car en chemin ils avaient discuté entre eux pour savoir qui était le plus grand. '
  '35':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '35'
    - type: text
      text: 'Alors il s''assit, appela les douze et leur dit: «Si quelqu''un veut être le premier, il sera le dernier de tous et le serviteur de tous.» '
  '36':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '36'
    - type: text
      text: 'Il prit un petit enfant, le plaça au milieu d''eux et, après l''avoir pris dans ses bras, il leur dit: '
  '37':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '37'
    - type: text
      text: «Celui qui accueille en mon nom un de ces petits enfants, c'est moi-même qu'il accueille, et celui qui m'accueille, ce n'est pas moi qu'il accueille, mais celui qui m'a envoyé.»
  '38':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '38'
    - type: text
      text: 'Jean lui dit: «Maître, nous avons vu quelqu''un chasser des démons en ton nom, et nous l''en avons empêché parce qu''il ne nous suit pas.» '
  '39':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '39'
    - type: text
      text: '«Ne l''en empêchez pas, répondit Jésus, car personne ne peut faire un miracle en mon nom et aussitôt après dire du mal de moi. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'Elie et Moïse leur apparurent; ils s''entretenaient avec Jésus. '
  '40':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '40'
    - type: text
      text: 'En effet, qui n''est pas contre nous est pour nous. '
  '41':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '41'
    - type: text
      text: 'Et celui qui vous donnera à boire un verre d''eau en mon nom, parce que vous appartenez à Christ, je vous le dis en vérité, il ne perdra pas sa récompense. '
  '42':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '42'
    - type: text
      text: Mais si quelqu'un fait trébucher un seul de ces petits qui croient en moi, il vaudrait mieux pour lui qu'on attache à son cou une grosse meule de moulin et qu'on le jette à la mer.
  '43':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '43'
    - type: text
      text: '»Si ta main te pousse à mal agir, coupe-la. Mieux vaut pour toi entrer manchot dans la vie que d''avoir les deux mains et d''aller en enfer, dans le feu qui ne s''éteint pas, '
  '44':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '44'
    - type: text
      text: '[là où '
    - type: usfm
      marker: qt
      children:
      - type: text
        text: le ver ne meurt pas et où le feu ne s'éteint pas
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '9.44, 46, 48 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Le ver… s''éteint pas: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: citation d'
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Esaïe 66.24
      - type: usfm
        marker: ft
        children:
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: ']. '
  '45':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '45'
    - type: text
      text: 'Si ton pied te pousse à mal agir, coupe-le. Mieux vaut pour toi entrer boiteux dans la vie que d''avoir les deux pieds et d''être jeté en enfer, [dans le feu qui ne s''éteint pas, '
  '46':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '46'
    - type: text
      text: 'là où '
    - type: usfm
      marker: qt
      children:
      - type: text
        text: le ver ne meurt pas et où le feu ne s'éteint pas
    - type: text
      text: ']. '
  '47':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '47'
    - type: text
      text: 'Et si ton œil te pousse à mal agir, arrache-le. Mieux vaut pour toi entrer dans le royaume de Dieu avec un seul œil que d''avoir deux yeux et d''être jeté dans l''enfer [de feu], '
  '48':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '48'
    - type: text
      text: 'là où '
    - type: usfm
      marker: qt
      children:
      - type: text
        text: le ver ne meurt pas et où le feu ne s'éteint pas
    - type: text
      text: '. '
  '49':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '49'
    - type: text
      text: 'En effet, tout homme sera salé de feu [et tout sacrifice sera salé de sel]. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'Pierre prit la parole et dit à Jésus: «Maître, il est bon que nous soyons ici. Faisons trois abris: un pour toi, un pour Moïse et un pour Elie.» '
  '50':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '50'
    - type: text
      text: Le sel est une bonne chose, mais s'il perd sa saveur, avec quoi la lui rendrez-vous? Ayez du sel en vous-mêmes et soyez en paix les uns avec les autres.»
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'Il ne savait que dire, car ils étaient effrayés. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'Une nuée vint les couvrir, et de la nuée sortit une voix: «Celui-ci est mon Fils bien-aimé: écoutez-le!» '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: Aussitôt les disciples regardèrent tout autour et ils ne virent plus que Jésus seul avec eux.
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'Comme ils descendaient de la montagne, Jésus leur recommanda de ne dire ce qu''ils avaient vu à personne jusqu''à ce que le Fils de l''homme soit ressuscité. '
