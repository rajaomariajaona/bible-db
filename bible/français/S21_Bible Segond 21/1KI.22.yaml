document_id: 1KI.22
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Mort d'Achab
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'On resta 3 ans sans qu''il y ait guerre entre la Syrie et Israël. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'La troisième année, Josaphat, le roi de Juda, descendit trouver le roi d''Israël. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Ce dernier dit à ses serviteurs: «Savez-vous que Ramoth en Galaad nous appartient? Et nous, nous ne faisons rien pour la reprendre au roi de Syrie!» '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Puis il demanda à Josaphat: «Veux-tu venir avec moi attaquer Ramoth en Galaad?» Josaphat répondit au roi d''Israël: «Toi et moi, ton peuple et le mien, tes chevaux et les miens, il n''y aura aucune différence.»'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Puis Josaphat dit au roi d''Israël: «Consulte donc maintenant la parole de l''Eternel.» '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Le roi d''Israël rassembla les prophètes, au nombre d''environ 400, et leur demanda: «Dois-je aller attaquer Ramoth en Galaad ou dois-je y renoncer?» Ils répondirent: «Montes-y et le Seigneur la livrera entre les mains du roi.» '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Mais Josaphat dit: «N''y a-t-il plus ici aucun prophète de l''Eternel, pour que nous puissions le consulter?» '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Le roi d''Israël répondit à Josaphat: «Il reste un seul homme par qui l''on puisse consulter l''Eternel, mais je le déteste, car il ne prophétise rien de bon sur moi, il ne prophétise que du mal: c''est Michée, fils de Jimla.» Josaphat répliqua: «Que le roi ne parle pas de cette manière!» '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Alors le roi d''Israël appela un eunuque et lui dit: «Fais venir tout de suite Michée, fils de Jimla.»'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Le roi d''Israël et Josaphat, le roi de Juda, étaient assis chacun sur son trône, habillés de leur tenue royale, sur la place qui se trouve à l''entrée de Samarie, et tous les prophètes prophétisaient devant eux. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Sédécias, fils de Kenaana, s''était fabriqué des cornes en fer et il affirma: «Voici ce que dit l''Eternel: Avec ces cornes tu frapperas les Syriens jusqu''à leur destruction.» '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Tous les prophètes renchérissaient: «Monte à Ramoth en Galaad! Tu connaîtras le succès et l''Eternel la livrera entre les mains du roi.»'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Le messager qui était allé appeler Michée lui dit: «Les prophètes sont unanimes pour prédire du bien au roi. Que ta parole soit donc pareille à celle de chacun d''eux! Annonce du bien!» '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Michée répondit: «L''Eternel est vivant! Je communiquerai ce que l''Eternel me dira.»'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Lorsqu''il fut arrivé vers le roi, celui-ci lui dit: «Michée, devons-nous aller attaquer Ramoth en Galaad ou devons-nous y renoncer?» Il lui répondit: «Montes-y! Tu connaîtras le succès et l''Eternel la livrera entre les mains du roi.» '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Le roi lui dit: «Combien de fois me faudra-t-il te faire jurer de ne me dire que la vérité au nom de l''Eternel?» '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Michée répondit: «Je vois tout Israël dispersé sur les montagnes, *comme des brebis qui n''ont pas de berger'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '22.17 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Comme… berger: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'comparaison reprise de '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Nombres 27.17
      metadata:
        usfm: NUM.27.17
    - type: usfm
      marker: ft
      children:
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: '. Et l''Eternel a dit: ‘Ils n''ont pas de seigneur. Que chacun retourne en paix chez lui!’»'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Le roi d''Israël dit à Josaphat: «Ne te l''avais-je pas dit? Il ne prophétise rien de bon sur moi, il ne prophétise que du mal.»'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Michée ajouta: «Eh bien, écoute donc la parole de l''Eternel! J''ai vu l''Eternel assis sur son trône, et tous les corps célestes debout près de lui, à sa droite et à sa gauche. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'L''Eternel a dit: ‘Qui va persuader Achab de monter à Ramoth en Galaad afin qu''il y meure?’ Ils ont répondu l''un d''une manière, l''autre d''une autre. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Mais un esprit est venu se présenter devant l''Eternel et a dit: ‘Moi, je vais le persuader.’ L''Eternel lui a dit: ‘Comment?’ '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: '‘Je vais sortir, a-t-il répondu, et je vais être un esprit de mensonge dans la bouche de tous ses prophètes.’ L''Eternel a dit: ‘Tu le persuaderas, tu vas y parvenir. Sors et agis de cette manière!’ '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: Maintenant, l'Eternel a mis un esprit de mensonge dans la bouche de tous tes prophètes que voici, mais lui, il a prononcé le malheur contre toi.»
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Alors Sédécias, fils de Kenaana, s''approcha, frappa Michée sur la joue et dit: «Par où l''esprit de l''Eternel est-il sorti de moi pour te parler?» '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Michée répondit: «Tu le verras le jour où tu iras de chambre en chambre pour te cacher.» '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Le roi d''Israël dit: «Arrête Michée et amène-le à Amon, le chef de la ville, et à mon fils Joas. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'Tu leur ordonneras: ‘Voici ce que dit le roi: Mettez cet homme en prison et nourrissez-le du pain et de l''eau de misère jusqu''à ce que je revienne en paix.’» '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'Michée dit: «Si tu reviens en paix, c''est que l''Eternel n''a pas parlé par moi.» Il ajouta: «Ecoutez, vous, tous les peuples!»'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'Le roi d''Israël et Josaphat, le roi de Juda, montèrent à Ramoth en Galaad. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'Le roi d''Israël dit à Josaphat: «Je vais me déguiser pour aller au combat; mais toi, mets tes habits.» Le roi d''Israël se déguisa donc, puis il partit au combat.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'Le roi de Syrie avait donné cet ordre aux 32 chefs de ses chars: «Vous n''attaquerez ni soldats ni officiers, mais seulement le roi d''Israël.» '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'Quand les chefs des chars aperçurent Josaphat, ils se dirent: «C''est sûrement le roi d''Israël», et ils s''approchèrent de lui pour l''attaquer. Josaphat poussa alors un cri. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: 'Voyant que ce n''était pas le roi d''Israël, les chefs des chars s''éloignèrent de lui. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: 'Alors un homme tira au hasard avec son arc et il frappa le roi d''Israël entre les deux parties de la cuirasse. Le roi dit à celui qui conduisait son char: «Fais demi-tour et fais-moi sortir du champ de bataille, car je suis blessé.» '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: 'Le combat fut si violent, ce jour-là, que le roi fut retenu dans son char face aux Syriens, et il mourut le soir. Le sang de sa blessure coula à l''intérieur du char. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: 'Au coucher du soleil, on cria dans tout le camp: «Chacun dans sa ville et dans son pays!»'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: 'C''est ainsi que le roi mourut. Il fut ramené à Samarie et on y enterra le roi. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: text
    text: Lorsqu'on lava son char dans l'étang de Samarie, les chiens léchèrent le sang d'Achab et les prostituées s'y baignèrent, conformément à la parole que l'Eternel avait prononcée.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '39'
  - type: text
    text: Le reste des actes d'Achab, tout ce qu'il a accompli, le palais d'ivoire qu'il a construit et toutes les villes qu'il a fortifiées, cela est décrit dans les annales des rois d'Israël.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '40'
  - type: text
    text: Achab se coucha avec ses ancêtres. Son fils Achazia devint roi à sa place.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Règne de Josaphat sur Juda
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '41'
  - type: text
    text: 'Josaphat, le fils d''Asa, devint roi de Juda la quatrième année du règne d''Achab sur Israël. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '42'
  - type: text
    text: Josaphat avait 35 ans lorsqu'il devint roi et il régna 25 ans à Jérusalem. Sa mère s'appelait Azuba et c'était la fille de Shilchi.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '43'
  - type: text
    text: 'Il marcha entièrement sur la voie de son père Asa. Il ne s''en écarta pas, faisant ce qui est droit aux yeux de l''Eternel. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '44'
  - type: text
    text: 'Toutefois, les hauts lieux ne disparurent pas; le peuple y offrait encore des sacrifices et des parfums. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '45'
  - type: text
    text: Josaphat fut en paix avec le roi d'Israël.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '46'
  - type: text
    text: Le reste des actes de Josaphat, ses exploits et ses guerres, cela est décrit dans les annales des rois de Juda.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '47'
  - type: text
    text: 'Il débarrassa le pays du reste des prostitués, de ceux qui avaient survécu au règne de son père Asa. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '48'
  - type: text
    text: 'Il n''y avait pas de roi en Edom, mais un intendant du roi. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '49'
  - type: text
    text: 'Josaphat construisit des bateaux long-courriers pour aller à Ophir chercher de l''or, mais il ne parvint pas jusque-là, parce que les bateaux se brisèrent à Etsjon-Guéber. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '50'
  - type: text
    text: 'Alors Achazia, le fils d''Achab, demanda à Josaphat: «Veux-tu que mes serviteurs aillent avec les tiens sur des bateaux?» Mais Josaphat refusa.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '51'
  - type: text
    text: Josaphat se coucha avec ses ancêtres et il fut enterré à leurs côtés dans la ville de son ancêtre David. Son fils Joram devint roi à sa place.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Règne d'Achazia sur Israël
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '52'
  - type: text
    text: Achazia, le fils d'Achab, devint roi d'Israël à Samarie, la dix-septième année du règne de Josaphat sur Juda. Il régna 2 ans sur Israël.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '53'
  - type: text
    text: 'Il fit ce qui est mal aux yeux de l''Eternel; il marcha sur la voie de son père et de sa mère, et sur la voie de Jéroboam, fils de Nebath, qui avait fait pécher Israël. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '54'
  - type: text
    text: Il servit Baal et se prosterna devant lui, et il irrita l'Eternel, le Dieu d'Israël, tout comme l'avait fait son père.
