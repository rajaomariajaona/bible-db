document_id: EXO.25
type_code: fra
segments:
- type: usfm
  marker: ms1
  children:
  - type: text
    text: Instructions pour la construction du tabernacle
  marker-yv: yv-h
- type: usfm
  marker: mr
  children:
  - type: text
    text: 25.1–31.18
  marker-yv: yv-h
- type: usfm
  marker: s1
  children:
  - type: text
    text: Les offrandes
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'L''Eternel dit à Moïse: '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: '«Ordonne aux Israélites de m''apporter une offrande. Vous la recevrez pour moi de tout homme qui la fera de bon cœur. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Voici ce que vous recevrez d''eux en offrande: de l''or, de l''argent et du bronze; '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'des étoffes teintes en bleu, en pourpre, en cramoisi, du fin lin et du poil de chèvre; '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'des peaux de béliers teintes en rouge et des peaux de dauphins; du bois d''acacia; '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'de l''huile pour le chandelier, des aromates pour l''huile d''onction et pour le parfum odoriférant; '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'des pierres d''onyx et d''autres pierres pour la garniture de l''éphod et du pectoral. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Ils me feront un sanctuaire et j''habiterai au milieu d''eux. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Vous ferez ce tabernacle
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '25.9 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Ce tabernacle: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'ou mon habitation (même racine que habiter au verset 8 et en '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: '29.45'
      metadata:
        usfm: EXO.29.45
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ).
    marker-yv: yv-n
  - type: text
    text: ' et tous ses ustensiles d''après le modèle que je vais te montrer.'
- type: usfm
  marker: s1
  children:
  - type: text
    text: L'arche de l'alliance
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: '»Ils feront un coffre en bois d''acacia. Sa longueur sera de 125 centimètres, sa largeur et sa hauteur de 75 centimètres. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Tu le couvriras d''or pur, à l''intérieur et à l''extérieur, et tu lui feras une bordure d''or tout autour. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Tu fondras pour lui 4 anneaux en or et tu les mettras à ses 4 coins, 2 d''un côté et 2 de l''autre. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Tu feras des barres en bois d''acacia, que tu couvriras d''or. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Tu passeras les barres dans les anneaux sur les côtés du coffre, pour qu''elles servent à son transport. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Les barres resteront dans les anneaux du coffre et n''en seront pas retirées. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Tu mettras dans cette arche le témoignage
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '25.16 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Le témoignage: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'c''est-à-dire la charte de l''alliance, les deux tables de la loi avec les dix commandements (voir '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 20.1-17
      metadata:
        usfm: EXO.20.1+EXO.20.2+EXO.20.3+EXO.20.4+EXO.20.5+EXO.20.6+EXO.20.7+EXO.20.8+EXO.20.9+EXO.20.10+EXO.20.11+EXO.20.12+EXO.20.13+EXO.20.14+EXO.20.15+EXO.20.16+EXO.20.17
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: '31.18'
      metadata:
        usfm: EXO.31.18
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ).
    marker-yv: yv-n
  - type: text
    text: ' que je te donnerai. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Tu feras un couvercle en or pur. Sa longueur sera de 125 centimètres, et sa largeur de 75 centimètres. '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Tu feras 2 chérubins en or, en or battu, aux 2 extrémités de ce propitiatoire
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '25.18 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Propitiatoire: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: même mot que couvercle. La racine hébraïque peut signifier couvrir physiquement ou expier.
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Fais un chérubin à l''une des extrémités et un chérubin à l''autre extrémité. Vous les ferez sortir du propitiatoire à ses deux extrémités. '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Les chérubins étendront les ailes par-dessus le propitiatoire, ils le couvriront de leurs ailes et se feront face l''un à l''autre; ils auront le visage tourné vers ce couvercle. '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Tu mettras le propitiatoire sur le coffre et tu mettras dans cette arche le témoignage que je te donnerai. '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: C'est là que je te rencontrerai; du haut du propitiatoire, entre les deux chérubins placés sur l'arche du témoignage, je te donnerai tous mes ordres pour les Israélites.
- type: usfm
  marker: s1
  children:
  - type: text
    text: La table des pains consacrés
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: '»Tu feras une table en bois d''acacia. Sa longueur sera d''un mètre, sa largeur de 50 centimètres et sa hauteur de 75 centimètres. '
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Tu la couvriras d''or pur et tu lui feras une bordure d''or tout autour. '
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Tu feras tout autour un cadre de 8 centimètres de large sur lequel tu mettras une bordure d''or, tout autour. '
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Tu feras 4 anneaux en or pour la table et tu les mettras aux 4 coins, à ses 4 pieds. '
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'Les anneaux seront situés près du cadre et recevront les barres destinées au transport de la table. '
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'Tu feras ces barres en bois d''acacia et tu les couvriras d''or. Elles serviront à porter la table. '
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'Tu feras ses plats, ses coupes, ses gobelets et ses tasses destinés aux offrandes de produits liquides. Tu les feras en or pur. '
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: Tu mettras constamment les pains consacrés sur la table devant moi.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Le chandelier en or
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: '»Tu feras un chandelier en or pur. Ce chandelier sera fait d''or battu; son pied, sa tige, ses coupes, ses pommes et ses fleurs seront d''une seule pièce. '
  - type: usfm
    marker: v
    metadata:
      v: '32'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'Il y aura 6 branches qui sortiront de ses côtés, 3 branches du chandelier de l''un des côtés et 3 de l''autre. '
  - type: usfm
    marker: v
    metadata:
      v: '33'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: 'Il y aura sur une branche 3 coupes en forme d''amande, avec pommes et fleurs, et sur une autre branche 3 coupes en forme d''amande, avec pommes et fleurs; il en ira de même pour les 6 branches sortant du chandelier. '
  - type: usfm
    marker: v
    metadata:
      v: '34'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: 'Sur la tige du chandelier seront fixées 4 coupes en forme d''amande, avec leurs pommes et leurs fleurs. '
  - type: usfm
    marker: v
    metadata:
      v: '35'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: 'Il y aura une pomme sous 2 des branches qui sortent de la tige du chandelier, une pomme sous 2 autres branches et une pomme sous 2 autres branches; il en ira de même pour les 6 branches sortant du chandelier. '
  - type: usfm
    marker: v
    metadata:
      v: '36'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: 'Les pommes et les branches du chandelier seront d''une seule pièce. Il sera tout entier en or battu, en or pur. '
  - type: usfm
    marker: v
    metadata:
      v: '37'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: 'Tu feras ses 7 lampes. Elles seront placées sur le chandelier de manière à éclairer en face. '
  - type: usfm
    marker: v
    metadata:
      v: '38'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: text
    text: 'Ses mouchettes et ses vases à cendre seront en or pur. '
  - type: usfm
    marker: v
    metadata:
      v: '39'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '39'
  - type: text
    text: 'On emploiera 30 kilos d''or pur pour faire le chandelier avec tous ses ustensiles. '
  - type: usfm
    marker: v
    metadata:
      v: '40'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '40'
  - type: text
    text: '*Regarde et fais tout d''après le modèle qui t''est montré sur la montagne.'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '25.40 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Regarde… montagne: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'ordre évoqué par Etienne en '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Actes 7.44
      metadata:
        usfm: ACT.7.44
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' et cité en '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Hébreux 8.5
      metadata:
        usfm: HEB.8.5
    - type: usfm
      marker: ft
      children:
      - type: text
        text: .
    marker-yv: yv-n
