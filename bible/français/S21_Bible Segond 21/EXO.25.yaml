document_id: EXO.25,152
type_code: fra
verses:
  '1':
  - type: heading
    content: Instructions pour la construction du tabernacle
  - type: heading
    content: 25.1–31.18
  - type: heading
    content: Les offrandes
  - type: text
    content: 'L''Eternel dit à Moïse: '
  '10':
  - type: text
    content: '»Ils feront un coffre en bois d''acacia. Sa longueur sera de 125 centimètres, sa largeur et sa hauteur de 75 centimètres. '
  '11':
  - type: text
    content: 'Tu le couvriras d''or pur, à l''intérieur et à l''extérieur, et tu lui feras une bordure d''or tout autour. '
  '12':
  - type: text
    content: 'Tu fondras pour lui 4 anneaux en or et tu les mettras à ses 4 coins, 2 d''un côté et 2 de l''autre. '
  '13':
  - type: text
    content: 'Tu feras des barres en bois d''acacia, que tu couvriras d''or. '
  '14':
  - type: text
    content: 'Tu passeras les barres dans les anneaux sur les côtés du coffre, pour qu''elles servent à son transport. '
  '15':
  - type: text
    content: 'Les barres resteront dans les anneaux du coffre et n''en seront pas retirées. '
  '16':
  - type: text
    content: Tu mettras dans cette arche le témoignage
  - type: note
    content: 'Le témoignage: c''est-à-dire la charte de l''alliance, les deux tables de la loi avec les dix commandements (voir 20.1-17; 31.18).'
  - type: text
    content: ' que je te donnerai. '
  '17':
  - type: text
    content: 'Tu feras un couvercle en or pur. Sa longueur sera de 125 centimètres, et sa largeur de 75 centimètres. '
  '18':
  - type: text
    content: Tu feras 2 chérubins en or, en or battu, aux 2 extrémités de ce propitiatoire
  - type: note
    content: 'Propitiatoire: même mot que couvercle. La racine hébraïque peut signifier couvrir physiquement ou expier.'
  - type: text
    content: '. '
  '19':
  - type: text
    content: 'Fais un chérubin à l''une des extrémités et un chérubin à l''autre extrémité. Vous les ferez sortir du propitiatoire à ses deux extrémités. '
  '2':
  - type: text
    content: '«Ordonne aux Israélites de m''apporter une offrande. Vous la recevrez pour moi de tout homme qui la fera de bon cœur. '
  '20':
  - type: text
    content: 'Les chérubins étendront les ailes par-dessus le propitiatoire, ils le couvriront de leurs ailes et se feront face l''un à l''autre; ils auront le visage tourné vers ce couvercle. '
  '21':
  - type: text
    content: 'Tu mettras le propitiatoire sur le coffre et tu mettras dans cette arche le témoignage que je te donnerai. '
  '22':
  - type: text
    content: C'est là que je te rencontrerai; du haut du propitiatoire, entre les deux chérubins placés sur l'arche du témoignage, je te donnerai tous mes ordres pour les Israélites.
  - type: heading
    content: La table des pains consacrés
  '23':
  - type: text
    content: '»Tu feras une table en bois d''acacia. Sa longueur sera d''un mètre, sa largeur de 50 centimètres et sa hauteur de 75 centimètres. '
  '24':
  - type: text
    content: 'Tu la couvriras d''or pur et tu lui feras une bordure d''or tout autour. '
  '25':
  - type: text
    content: 'Tu feras tout autour un cadre de 8 centimètres de large sur lequel tu mettras une bordure d''or, tout autour. '
  '26':
  - type: text
    content: 'Tu feras 4 anneaux en or pour la table et tu les mettras aux 4 coins, à ses 4 pieds. '
  '27':
  - type: text
    content: 'Les anneaux seront situés près du cadre et recevront les barres destinées au transport de la table. '
  '28':
  - type: text
    content: 'Tu feras ces barres en bois d''acacia et tu les couvriras d''or. Elles serviront à porter la table. '
  '29':
  - type: text
    content: 'Tu feras ses plats, ses coupes, ses gobelets et ses tasses destinés aux offrandes de produits liquides. Tu les feras en or pur. '
  '3':
  - type: text
    content: 'Voici ce que vous recevrez d''eux en offrande: de l''or, de l''argent et du bronze; '
  '30':
  - type: text
    content: Tu mettras constamment les pains consacrés sur la table devant moi.
  - type: heading
    content: Le chandelier en or
  '31':
  - type: text
    content: '»Tu feras un chandelier en or pur. Ce chandelier sera fait d''or battu; son pied, sa tige, ses coupes, ses pommes et ses fleurs seront d''une seule pièce. '
  '32':
  - type: text
    content: 'Il y aura 6 branches qui sortiront de ses côtés, 3 branches du chandelier de l''un des côtés et 3 de l''autre. '
  '33':
  - type: text
    content: 'Il y aura sur une branche 3 coupes en forme d''amande, avec pommes et fleurs, et sur une autre branche 3 coupes en forme d''amande, avec pommes et fleurs; il en ira de même pour les 6 branches sortant du chandelier. '
  '34':
  - type: text
    content: 'Sur la tige du chandelier seront fixées 4 coupes en forme d''amande, avec leurs pommes et leurs fleurs. '
  '35':
  - type: text
    content: 'Il y aura une pomme sous 2 des branches qui sortent de la tige du chandelier, une pomme sous 2 autres branches et une pomme sous 2 autres branches; il en ira de même pour les 6 branches sortant du chandelier. '
  '36':
  - type: text
    content: 'Les pommes et les branches du chandelier seront d''une seule pièce. Il sera tout entier en or battu, en or pur. '
  '37':
  - type: text
    content: 'Tu feras ses 7 lampes. Elles seront placées sur le chandelier de manière à éclairer en face. '
  '38':
  - type: text
    content: 'Ses mouchettes et ses vases à cendre seront en or pur. '
  '39':
  - type: text
    content: 'On emploiera 30 kilos d''or pur pour faire le chandelier avec tous ses ustensiles. '
  '4':
  - type: text
    content: 'des étoffes teintes en bleu, en pourpre, en cramoisi, du fin lin et du poil de chèvre; '
  '40':
  - type: text
    content: '*Regarde et fais tout d''après le modèle qui t''est montré sur la montagne.'
  - type: note
    content: 'Regarde… montagne: ordre évoqué par Etienne en Actes 7.44 et cité en Hébreux 8.5.'
  '5':
  - type: text
    content: 'des peaux de béliers teintes en rouge et des peaux de dauphins; du bois d''acacia; '
  '6':
  - type: text
    content: 'de l''huile pour le chandelier, des aromates pour l''huile d''onction et pour le parfum odoriférant; '
  '7':
  - type: text
    content: 'des pierres d''onyx et d''autres pierres pour la garniture de l''éphod et du pectoral. '
  '8':
  - type: text
    content: 'Ils me feront un sanctuaire et j''habiterai au milieu d''eux. '
  '9':
  - type: text
    content: Vous ferez ce tabernacle
  - type: note
    content: 'Ce tabernacle: ou mon habitation (même racine que habiter au verset 8 et en 29.45).'
  - type: text
    content: ' et tous ses ustensiles d''après le modèle que je vais te montrer.'
  - type: heading
    content: L'arche de l'alliance
