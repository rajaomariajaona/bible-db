document_id: JOB.18,152
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Intervention n° 2 de Bildad
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Bildad de Shuach prit la parole et dit:'
  '10':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: le cordage qui le prend au piège est caché dans la terre
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et la trappe l'attend sur son sentier.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Des terreurs l'assiègent de tous côtés,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: elles le poursuivent pas à pas.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: La faim anéantit ses forces,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: la misère est présente à ses côtés.
  '13':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Elle dévore des parties de sa peau,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ses membres sont dévorés par le fils aîné de la mort
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '18.13 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Le fils aîné de la mort: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: probable désignation d'une maladie inguérissable.
      marker-yv: yv-n
    - type: text
      text: .
  '14':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Il est arraché de sa tente, où il se croyait en sécurité,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: il se traîne vers le roi des terreurs
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '18.14 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Le roi des terreurs: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: c'est-à-dire la mort.
      marker-yv: yv-n
    - type: text
      text: .
  '15':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Tu peux habiter dans sa tente: elle n''est plus à lui.'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Le soufre est déversé sur son domaine.
  '16':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: En bas, ses racines se dessèchent;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: en haut, ses branches sont coupées.
  '17':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Son souvenir disparaît de la terre,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: on ne parle plus de lui dans la rue.
  '18':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Il est poussé de la lumière dans les ténèbres,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: il est expulsé du monde.
  '19':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Il ne laisse ni enfants ni petits-enfants parmi son peuple,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ni survivants dans les endroits qu'il habitait.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: «Quand mettrez-vous un terme à ces discours?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Faites preuve de discernement, puis nous parlerons.
  '20':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Les générations à venir seront étonnées de son sort
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et la génération présente sera saisie d'horreur.
  '21':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Telle est la destinée de l'impie,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: telle est la situation de celui qui ne connaît pas Dieu!»
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Pourquoi serions-nous considérés comme des bêtes?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Pourquoi ne serions-nous à vos yeux que des brutes?
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Toi qui t'épuises dans ta colère,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: faudrait-il, à cause de toi, que la terre soit vidée de ses habitants?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Faudrait-il que le rocher bouge de son emplacement?
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: »Oui, la lumière du méchant s'éteindra
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et la flamme qui en jaillit cessera de briller.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: La lumière s'obscurcira sous sa tente
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et sa lampe au-dessus de lui s'éteindra.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ses pas, si assurés soient-ils, se feront petits
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et ses propres plans le feront trébucher.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: En effet, il a été pris, les pieds dans un filet,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: il marche sur les mailles,
  '9':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: il est pris au piège par le talon
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et les lacets se resserrent sur lui;
