document_id: JOB.18,152
type_code: fra
verses:
  '1':
  - type: heading
    content: Intervention n° 2 de Bildad
  - type: text
    content: 'Bildad de Shuach prit la parole et dit:'
  '10':
  - type: text
    content: le cordage qui le prend au piège est caché dans la terre
  - type: text
    content: et la trappe l'attend sur son sentier.
  '11':
  - type: text
    content: Des terreurs l'assiègent de tous côtés,
  - type: text
    content: elles le poursuivent pas à pas.
  '12':
  - type: text
    content: La faim anéantit ses forces,
  - type: text
    content: la misère est présente à ses côtés.
  '13':
  - type: text
    content: Elle dévore des parties de sa peau,
  - type: text
    content: ses membres sont dévorés par le fils aîné de la mort
  - type: note
    content: 'Le fils aîné de la mort: probable désignation d''une maladie inguérissable.'
  - type: text
    content: .
  '14':
  - type: text
    content: Il est arraché de sa tente, où il se croyait en sécurité,
  - type: text
    content: il se traîne vers le roi des terreurs
  - type: note
    content: 'Le roi des terreurs: c''est-à-dire la mort.'
  - type: text
    content: .
  '15':
  - type: text
    content: 'Tu peux habiter dans sa tente: elle n''est plus à lui.'
  - type: text
    content: Le soufre est déversé sur son domaine.
  '16':
  - type: text
    content: En bas, ses racines se dessèchent;
  - type: text
    content: en haut, ses branches sont coupées.
  '17':
  - type: text
    content: Son souvenir disparaît de la terre,
  - type: text
    content: on ne parle plus de lui dans la rue.
  '18':
  - type: text
    content: Il est poussé de la lumière dans les ténèbres,
  - type: text
    content: il est expulsé du monde.
  '19':
  - type: text
    content: Il ne laisse ni enfants ni petits-enfants parmi son peuple,
  - type: text
    content: ni survivants dans les endroits qu'il habitait.
  '2':
  - type: text
    content: «Quand mettrez-vous un terme à ces discours?
  - type: text
    content: Faites preuve de discernement, puis nous parlerons.
  '20':
  - type: text
    content: Les générations à venir seront étonnées de son sort
  - type: text
    content: et la génération présente sera saisie d'horreur.
  '21':
  - type: text
    content: Telle est la destinée de l'impie,
  - type: text
    content: telle est la situation de celui qui ne connaît pas Dieu!»
  '3':
  - type: text
    content: Pourquoi serions-nous considérés comme des bêtes?
  - type: text
    content: Pourquoi ne serions-nous à vos yeux que des brutes?
  '4':
  - type: text
    content: Toi qui t'épuises dans ta colère,
  - type: text
    content: faudrait-il, à cause de toi, que la terre soit vidée de ses habitants?
  - type: text
    content: Faudrait-il que le rocher bouge de son emplacement?
  '5':
  - type: text
    content: »Oui, la lumière du méchant s'éteindra
  - type: text
    content: et la flamme qui en jaillit cessera de briller.
  '6':
  - type: text
    content: La lumière s'obscurcira sous sa tente
  - type: text
    content: et sa lampe au-dessus de lui s'éteindra.
  '7':
  - type: text
    content: Ses pas, si assurés soient-ils, se feront petits
  - type: text
    content: et ses propres plans le feront trébucher.
  '8':
  - type: text
    content: En effet, il a été pris, les pieds dans un filet,
  - type: text
    content: il marche sur les mailles,
  '9':
  - type: text
    content: il est pris au piège par le talon
  - type: text
    content: et les lacets se resserrent sur lui;
