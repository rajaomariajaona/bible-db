document_id: JOB.34,152
type_code: fra
verses:
  '1':
  - type: heading
    content: La justice souveraine
  - type: text
    content: 'Elihu reprit:'
  '10':
  - type: text
    content: »Ecoutez-moi donc, hommes de bon sens!
  - type: text
    content: Dieu n'a rien à voir avec la méchanceté,
  - type: text
    content: le Tout-Puissant n'a rien à voir avec l'injustice.
  '11':
  - type: text
    content: Il paie à l'homme le salaire de ses actes,
  - type: text
    content: il traite chacun en fonction de sa conduite.
  '12':
  - type: text
    content: En vérité, Dieu ne commet pas le mal,
  - type: text
    content: le Tout-Puissant ne fausse pas le droit.
  '13':
  - type: text
    content: »Qui l'a chargé de gouverner la terre?
  - type: text
    content: Qui a confié le monde entier à ses soins?
  '14':
  - type: text
    content: S'il ne pensait qu'à lui-même,
  - type: text
    content: s'il reprenait son esprit et son souffle,
  '15':
  - type: text
    content: toute créature expirerait d'un seul coup
  - type: text
    content: et l'homme retournerait à la poussière.
  '16':
  - type: text
    content: »Si tu as de l'intelligence, écoute ceci,
  - type: text
    content: prête l'oreille au son de mes paroles!
  '17':
  - type: text
    content: Celui qui déteste le droit pourrait-il vraiment régner?
  - type: text
    content: Condamnerais-tu le juste, le puissant?
  '18':
  - type: text
    content: 'Dit-on aux rois: ‘Vous êtes des vauriens’'
  - type: text
    content: 'et aux princes: ‘Vous êtes des crapules’?'
  '19':
  - type: text
    content: Lui, il ne favorise pas les chefs
  - type: text
    content: et ne privilégie pas le riche face au pauvre,
  - type: text
    content: parce que tous sont l'œuvre de ses mains.
  '2':
  - type: text
    content: «Sages, écoutez mes propos!
  - type: text
    content: Vous qui êtes des connaisseurs, prêtez l'oreille à ce que je vais dire!
  '20':
  - type: text
    content: En un instant, ils meurent.
  - type: text
    content: Au milieu de la nuit, un peuple est ébranlé et disparaît,
  - type: text
    content: le tyran est écarté sans aucune intervention humaine.
  '21':
  - type: text
    content: »En effet, Dieu est attentif à la conduite de l'homme,
  - type: text
    content: il voit tous ses pas.
  '22':
  - type: text
    content: Il n'y a ni ténèbres ni ombre de la mort
  - type: text
    content: assez obscures pour cacher ceux qui commettent l'injustice.
  '23':
  - type: text
    content: Dieu n'a pas besoin d'observer longtemps un homme
  - type: text
    content: pour le faire entrer en jugement avec lui.
  '24':
  - type: text
    content: Il brise les grands sans avoir à faire d'enquête
  - type: text
    content: et il les remplace par d'autres,
  '25':
  - type: text
    content: car il connaît leur manière d'agir.
  - type: text
    content: En une nuit il les renverse et ils sont écrasés,
  '26':
  - type: text
    content: il les frappe comme des criminels, en public.
  '27':
  - type: text
    content: C'est parce qu'ils se sont détournés de lui,
  - type: text
    content: parce qu'ils n'ont pas prêté attention à toutes ses voies.
  '28':
  - type: text
    content: Ils ont fait monter vers lui le cri du faible,
  - type: text
    content: or il entend le cri des plus humbles.
  '29':
  - type: text
    content: »S'il choisit la tranquillité, qui prononcera une condamnation?
  - type: text
    content: S'il cache son visage, qui pourra le voir?
  - type: text
    content: Il domine sur les nations aussi bien que sur les individus
  '3':
  - type: text
    content: En effet, l'oreille jauge les propos
  - type: text
    content: tout comme le palais goûte les aliments.
  '30':
  - type: text
    content: pour empêcher l'homme impie de régner
  - type: text
    content: et d'être un piège pour le peuple.
  '31':
  - type: text
    content: 'En effet, a-t-il déjà dit à Dieu:'
  - type: text
    content: ‘J'ai supporté les conséquences de ma faute, je cesserai de faire le mal.
  '32':
  - type: text
    content: 'Montre-moi toi-même ce que je ne vois pas encore: si j''ai commis des injustices, je n''en commettrai plus’?'
  '33':
  - type: text
    content: »Est-ce d'après toi que Dieu rendra justice,
  - type: text
    content: alors que tu fais preuve de mépris? C'est à toi de choisir, pas à moi.
  - type: text
    content: Ce que tu sais, dis-le donc!
  '34':
  - type: text
    content: Les hommes de bon sens
  - type: text
    content: 'ainsi que les sages qui m''écoutent me diront:'
  '35':
  - type: text
    content: ‘Job parle sans rien savoir
  - type: text
    content: et ses paroles manquent de discernement.
  '36':
  - type: text
    content: Que Job soit donc mis à l'épreuve jusqu'au bout,
  - type: text
    content: puisqu'il répond comme le feraient des hommes adonnés au mal!
  '37':
  - type: text
    content: En effet, il ajoute la révolte à son péché;
  - type: text
    content: il sème le doute au milieu de nous
  - type: text
    content: et il multiplie ses paroles contre Dieu.’»
  '4':
  - type: text
    content: Choisissons pour nous ce qui est juste,
  - type: text
    content: sachons reconnaître entre nous ce qui est bon!
  '5':
  - type: text
    content: '»Job dit en effet: ‘Je suis juste'
  - type: text
    content: et Dieu me refuse justice.
  '6':
  - type: text
    content: Alors que j'ai raison, je passe pour un menteur.
  - type: text
    content: Ma blessure est incurable alors que je n'ai pas commis de transgression.’
  '7':
  - type: text
    content: »Y a-t-il un homme tel que Job,
  - type: text
    content: qui boive l'insolence comme l'eau,
  '8':
  - type: text
    content: qui marche en compagnie de ceux qui commettent l'injustice,
  - type: text
    content: qui fasse route avec les hommes méchants?
  '9':
  - type: text
    content: 'En effet, il a dit: ‘L''homme ne gagne rien'
  - type: text
    content: à mettre son plaisir en Dieu.’
