document_id: JOB.34
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: La justice souveraine
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Elihu reprit:'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: «Sages, écoutez mes propos!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Vous qui êtes des connaisseurs, prêtez l'oreille à ce que je vais dire!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: En effet, l'oreille jauge les propos
- type: usfm
  marker: q1
  children:
  - type: text
    text: tout comme le palais goûte les aliments.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Choisissons pour nous ce qui est juste,
- type: usfm
  marker: q1
  children:
  - type: text
    text: sachons reconnaître entre nous ce qui est bon!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: '»Job dit en effet: ‘Je suis juste'
- type: usfm
  marker: q1
  children:
  - type: text
    text: et Dieu me refuse justice.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Alors que j'ai raison, je passe pour un menteur.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ma blessure est incurable alors que je n'ai pas commis de transgression.’
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: »Y a-t-il un homme tel que Job,
- type: usfm
  marker: q1
  children:
  - type: text
    text: qui boive l'insolence comme l'eau,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: qui marche en compagnie de ceux qui commettent l'injustice,
- type: usfm
  marker: q1
  children:
  - type: text
    text: qui fasse route avec les hommes méchants?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'En effet, il a dit: ‘L''homme ne gagne rien'
- type: usfm
  marker: q1
  children:
  - type: text
    text: à mettre son plaisir en Dieu.’
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: »Ecoutez-moi donc, hommes de bon sens!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Dieu n'a rien à voir avec la méchanceté,
- type: usfm
  marker: q1
  children:
  - type: text
    text: le Tout-Puissant n'a rien à voir avec l'injustice.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Il paie à l'homme le salaire de ses actes,
- type: usfm
  marker: q1
  children:
  - type: text
    text: il traite chacun en fonction de sa conduite.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: En vérité, Dieu ne commet pas le mal,
- type: usfm
  marker: q1
  children:
  - type: text
    text: le Tout-Puissant ne fausse pas le droit.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: »Qui l'a chargé de gouverner la terre?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Qui a confié le monde entier à ses soins?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: S'il ne pensait qu'à lui-même,
- type: usfm
  marker: q1
  children:
  - type: text
    text: s'il reprenait son esprit et son souffle,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: toute créature expirerait d'un seul coup
- type: usfm
  marker: q1
  children:
  - type: text
    text: et l'homme retournerait à la poussière.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: »Si tu as de l'intelligence, écoute ceci,
- type: usfm
  marker: q1
  children:
  - type: text
    text: prête l'oreille au son de mes paroles!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Celui qui déteste le droit pourrait-il vraiment régner?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Condamnerais-tu le juste, le puissant?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Dit-on aux rois: ‘Vous êtes des vauriens’'
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'et aux princes: ‘Vous êtes des crapules’?'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Lui, il ne favorise pas les chefs
- type: usfm
  marker: q1
  children:
  - type: text
    text: et ne privilégie pas le riche face au pauvre,
- type: usfm
  marker: q1
  children:
  - type: text
    text: parce que tous sont l'œuvre de ses mains.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: En un instant, ils meurent.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Au milieu de la nuit, un peuple est ébranlé et disparaît,
- type: usfm
  marker: q1
  children:
  - type: text
    text: le tyran est écarté sans aucune intervention humaine.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: »En effet, Dieu est attentif à la conduite de l'homme,
- type: usfm
  marker: q1
  children:
  - type: text
    text: il voit tous ses pas.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: Il n'y a ni ténèbres ni ombre de la mort
- type: usfm
  marker: q1
  children:
  - type: text
    text: assez obscures pour cacher ceux qui commettent l'injustice.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: Dieu n'a pas besoin d'observer longtemps un homme
- type: usfm
  marker: q1
  children:
  - type: text
    text: pour le faire entrer en jugement avec lui.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: Il brise les grands sans avoir à faire d'enquête
- type: usfm
  marker: q1
  children:
  - type: text
    text: et il les remplace par d'autres,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: car il connaît leur manière d'agir.
- type: usfm
  marker: q1
  children:
  - type: text
    text: En une nuit il les renverse et ils sont écrasés,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: il les frappe comme des criminels, en public.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: C'est parce qu'ils se sont détournés de lui,
- type: usfm
  marker: q1
  children:
  - type: text
    text: parce qu'ils n'ont pas prêté attention à toutes ses voies.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: Ils ont fait monter vers lui le cri du faible,
- type: usfm
  marker: q1
  children:
  - type: text
    text: or il entend le cri des plus humbles.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: »S'il choisit la tranquillité, qui prononcera une condamnation?
- type: usfm
  marker: q1
  children:
  - type: text
    text: S'il cache son visage, qui pourra le voir?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Il domine sur les nations aussi bien que sur les individus
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: pour empêcher l'homme impie de régner
- type: usfm
  marker: q1
  children:
  - type: text
    text: et d'être un piège pour le peuple.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'En effet, a-t-il déjà dit à Dieu:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: ‘J'ai supporté les conséquences de ma faute, je cesserai de faire le mal.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'Montre-moi toi-même ce que je ne vois pas encore: si j''ai commis des injustices, je n''en commettrai plus’?'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: »Est-ce d'après toi que Dieu rendra justice,
- type: usfm
  marker: q1
  children:
  - type: text
    text: alors que tu fais preuve de mépris? C'est à toi de choisir, pas à moi.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ce que tu sais, dis-le donc!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: Les hommes de bon sens
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'ainsi que les sages qui m''écoutent me diront:'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: ‘Job parle sans rien savoir
- type: usfm
  marker: q1
  children:
  - type: text
    text: et ses paroles manquent de discernement.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: Que Job soit donc mis à l'épreuve jusqu'au bout,
- type: usfm
  marker: q1
  children:
  - type: text
    text: puisqu'il répond comme le feraient des hommes adonnés au mal!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: En effet, il ajoute la révolte à son péché;
- type: usfm
  marker: q1
  children:
  - type: text
    text: il sème le doute au milieu de nous
- type: usfm
  marker: q1
  children:
  - type: text
    text: et il multiplie ses paroles contre Dieu.’»
