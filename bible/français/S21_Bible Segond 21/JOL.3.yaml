document_id: JOL.3,152
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Annonce de la venue de l'Esprit
    marker-yv: yv-h
  - type: usfm
    marker: q1
    children:
    - type: text
      text: »*Après cela, je déverserai mon Esprit sur tout être humain;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: vos fils et vos filles prophétiseront,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: vos vieillards auront des rêves,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et vos jeunes gens des visions.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Même sur les serviteurs et sur les servantes,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dans ces jours-là, je déverserai mon Esprit.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: »Je ferai des prodiges dans le ciel et sur la terre,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: du sang, du feu et des colonnes de fumée.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Le soleil se changera en ténèbres
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et la lune en sang
  - type: usfm
    marker: q1
    children:
    - type: text
      text: avant l'arrivée du jour de l'Eternel,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: de ce jour grand et terrible.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: »Alors *toute personne qui fera appel au nom de l'Eternel sera sauvée
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '3.1-5 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Après cela… sauvée: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'cité par l''apôtre Pierre en '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Actes 2.17-21
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' comme accompli lors de la Pentecôte. Le verset 5 seulement est cité en '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Romains 10.13
      - type: usfm
        marker: ft
        children:
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: ;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: '*il y aura des rescapés sur le mont Sion'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '3.5 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Il y aura… Sion: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'même texte en '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Abdias 17
      - type: usfm
        marker: ft
        children:
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: ' et à Jérusalem,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: comme l'a dit l'Eternel,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et parmi les survivants que l'Eternel appellera.
