document_id: JOL.3,152
type_code: fra
verses:
  '1':
  - type: heading
    content: Annonce de la venue de l'Esprit
  - type: text
    content: »*Après cela, je déverserai mon Esprit sur tout être humain;
  - type: text
    content: vos fils et vos filles prophétiseront,
  - type: text
    content: vos vieillards auront des rêves,
  - type: text
    content: et vos jeunes gens des visions.
  '2':
  - type: text
    content: Même sur les serviteurs et sur les servantes,
  - type: text
    content: dans ces jours-là, je déverserai mon Esprit.
  '3':
  - type: text
    content: »Je ferai des prodiges dans le ciel et sur la terre,
  - type: text
    content: du sang, du feu et des colonnes de fumée.
  '4':
  - type: text
    content: Le soleil se changera en ténèbres
  - type: text
    content: et la lune en sang
  - type: text
    content: avant l'arrivée du jour de l'Eternel,
  - type: text
    content: de ce jour grand et terrible.
  '5':
  - type: text
    content: »Alors *toute personne qui fera appel au nom de l'Eternel sera sauvée
  - type: note
    content: 'Après cela… sauvée: cité par l''apôtre Pierre en Actes 2.17-21 comme accompli lors de la Pentecôte. Le verset 5 seulement est cité en Romains 10.13.'
  - type: text
    content: ;
  - type: text
    content: '*il y aura des rescapés sur le mont Sion'
  - type: note
    content: 'Il y aura… Sion: même texte en Abdias 17.'
  - type: text
    content: ' et à Jérusalem,'
  - type: text
    content: comme l'a dit l'Eternel,
  - type: text
    content: et parmi les survivants que l'Eternel appellera.
