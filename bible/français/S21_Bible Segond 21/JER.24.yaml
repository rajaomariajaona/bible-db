document_id: JER.24,152
type_code: fra
verses:
  '1':
  - type: heading
    content: Les deux paniers de figues
  - type: text
    content: 'L''Eternel m''a fait voir deux paniers de figues déposés devant son temple. C''était après que Nebucadnetsar, roi de Babylone, avait emmené en exil loin de Jérusalem et conduit jusqu''à Babylone Jéconia, fils de Jojakim, roi de Juda, les chefs de Juda, les charpentiers et les serruriers. '
  '10':
  - type: text
    content: J'enverrai contre eux l'épée, la famine et la peste jusqu'à ce qu'ils aient disparu de la terre que je leur avais donnée, à eux et à leurs ancêtres.»
  '2':
  - type: text
    content: 'L''un des paniers contenait de très bonnes figues, comme celles de la première récolte, et l''autre panier de très mauvaises figues, immangeables en raison de leur mauvaise qualité. '
  '3':
  - type: text
    content: 'L''Eternel m''a dit: «Que vois-tu, Jérémie?» J''ai répondu: «Des figues. Les bonnes figues sont très bonnes, et les mauvaises sont très mauvaises au point d''être immangeables en raison de leur mauvaise qualité.»'
  '4':
  - type: text
    content: 'Alors la parole de l''Eternel m''a été adressée: '
  '5':
  - type: text
    content: '«Voici ce que dit l''Eternel, le Dieu d''Israël: De même que tu as su reconnaître ces bonnes figues, de même je saurai reconnaître, pour leur faire du bien, les exilés de Juda que j''ai expédiés de cet endroit au pays des Babyloniens. '
  '6':
  - type: text
    content: 'Je veillerai sur eux pour leur faire du bien et je les ramènerai dans ce pays, je les restaurerai pour ne plus les détruire, je les planterai pour ne plus les arracher. '
  '7':
  - type: text
    content: 'Je leur donnerai un cœur apte à reconnaître que moi, je suis l''Eternel. Ils seront mon peuple et moi, je serai leur Dieu, car ils reviendront à moi de tout leur cœur. '
  '8':
  - type: text
    content: 'Je rendrai Sédécias, roi de Juda, ses chefs et le reste de Jérusalem, ceux qui sont restés dans ce pays et ceux qui sont allés habiter en Egypte, pareils aux mauvaises figues, immangeables en raison de leur mauvaise qualité, dit l''Eternel. '
  '9':
  - type: text
    content: 'Je ferai d''eux une source de terreur, de malheur pour tous les royaumes de la terre, l''objet d''insultes, de proverbes, de moqueries et de malédictions partout où je les aurai chassés. '
