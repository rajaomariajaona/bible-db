document_id: JER.23
type_code: fra
segments:
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: »Malheur aux bergers qui détruisent et dispersent
- type: usfm
  marker: q1
  children:
  - type: text
    text: le troupeau dont je suis le berger! déclare l'Eternel.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: C'est pourquoi, voici ce que dit l'Eternel, le Dieu d'Israël,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'sur les bergers chargés de prendre soin de mon peuple:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Puisque vous avez dispersé mes brebis, que vous les avez chassées
- type: usfm
  marker: q1
  children:
  - type: text
    text: et n'êtes pas intervenus en leur faveur,
- type: usfm
  marker: q1
  children:
  - type: text
    text: je vais intervenir contre vous à cause de la méchanceté de vos agissements, déclare l'Eternel.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Je rassemblerai moi-même le reste de mes brebis
- type: usfm
  marker: q1
  children:
  - type: text
    text: de tous les pays où je les ai chassées.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Je les ramènerai dans leur domaine.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Elles se reproduiront et deviendront nombreuses.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Je placerai à leur tête des bergers qui prendront soin d'elles.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Elles ne connaîtront plus la peur, elles ne seront plus effrayées
- type: usfm
  marker: q1
  children:
  - type: text
    text: et plus aucune d'elles ne sera manquante, déclare l'Eternel.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: »Voici que les jours viennent, déclare l'Eternel,
- type: usfm
  marker: q1
  children:
  - type: text
    text: où je donnerai à David un germe juste.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Il régnera avec compétence,
- type: usfm
  marker: q1
  children:
  - type: text
    text: il exercera le droit et la justice dans le pays.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: A son époque, Juda sera sauvé
- type: usfm
  marker: q1
  children:
  - type: text
    text: et Israël habitera en sécurité.
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Voici le nom dont on l''appellera:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: ‘L'Eternel notre justice’.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: »Voilà pourquoi les jours viennent, déclare l'Eternel,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'où l''on ne dira plus: ‘L''Eternel est vivant,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: lui qui a fait sortir les Israélites d'Egypte’,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'mais où l''on dira: ‘L''Eternel est vivant,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: lui qui a fait sortir et qui a ramené
- type: usfm
  marker: q1
  children:
  - type: text
    text: les descendants d'Israël du pays du nord
- type: usfm
  marker: q1
  children:
  - type: text
    text: et de tous les pays où il les avait chassés.’
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ils habiteront alors sur leur territoire.»
- type: usfm
  marker: s1
  children:
  - type: text
    text: Les prétendus prophètes
  marker-yv: yv-h
- type: usfm
  marker: d
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Message concernant les prophètes.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Mon cœur est brisé à l'intérieur de moi,
- type: usfm
  marker: q1
  children:
  - type: text
    text: tous mes os tremblent.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Je suis pareil à un homme ivre,
- type: usfm
  marker: q1
  children:
  - type: text
    text: à un homme fort emporté par le vin,
- type: usfm
  marker: q1
  children:
  - type: text
    text: à cause de l'Eternel et à cause de ses paroles saintes.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: En effet, le pays est rempli de personnes qui commettent l'adultère.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Le pays est en deuil à cause de la malédiction dont il est l'objet,
- type: usfm
  marker: q1
  children:
  - type: text
    text: les plaines du désert sont desséchées.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ils courent après le mal,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ils n'ont du courage que pour ce qui est injuste.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: «Oui, même les prophètes, même les prêtres, sont souillés.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Même dans mon temple, j'ai trouvé les marques de leur perversité,
- type: usfm
  marker: q1
  children:
  - type: text
    text: déclare l'Eternel.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: C'est pourquoi, leur voie les conduira comme une pente glissante dans l'obscurité.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ils y seront poussés et y tomberont.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Oui, je ferai venir le malheur sur eux,
- type: usfm
  marker: q1
  children:
  - type: text
    text: l'année où j'interviendrai contre eux, déclare l'Eternel.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: '»Chez les prophètes de Samarie, j''ai vu une attitude écœurante:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: ils ont prophétisé par le dieu Baal
- type: usfm
  marker: q1
  children:
  - type: text
    text: et ils ont égaré Israël, mon peuple.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Mais chez les prophètes de Jérusalem, j''ai vu des comportements horribles:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: ils commettent l'adultère, ils vivent dans le mensonge
- type: usfm
  marker: q1
  children:
  - type: text
    text: et ils encouragent ceux qui font le mal,
- type: usfm
  marker: q1
  children:
  - type: text
    text: de sorte que personne ne renonce à sa méchanceté.
- type: usfm
  marker: q1
  children:
  - type: text
    text: A mes yeux, ils sont tous pareils à Sodome,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et les habitants de Jérusalem à Gomorrhe.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: '»C''est pourquoi, voici ce que dit l''Eternel, le maître de l''univers, sur les prophètes:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Je vais leur faire avaler de l'absinthe,
- type: usfm
  marker: q1
  children:
  - type: text
    text: je vais leur faire boire de l'eau empoisonnée.
- type: usfm
  marker: q1
  children:
  - type: text
    text: En effet, c'est à travers les prophètes de Jérusalem
- type: usfm
  marker: q1
  children:
  - type: text
    text: que la souillure a contaminé tout le pays.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: '»Voici ce que dit l''Eternel, le maître de l''univers:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: N'écoutez pas les paroles des prophètes qui vous font leurs prédictions!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ils vous entraînent dans l'illusion.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ils transmettent les visions de leur invention,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et non ce qui vient de la bouche de l'Eternel.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Ils répètent à ceux qui me méprisent:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: '‘L''Eternel a dit: Vous aurez la paix’,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'à tous ceux qui persévèrent dans les penchants de leur cœur ils disent:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: ‘Il ne vous arrivera aucun mal.’
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Qui donc a assisté au conseil de l'Eternel,
- type: usfm
  marker: q1
  children:
  - type: text
    text: de sorte qu'il aurait vu et entendu sa parole?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Qui s'est montré attentif à sa parole et l'a entendue?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: »La tempête de l'Eternel, sa colère, éclate.
- type: usfm
  marker: q1
  children:
  - type: text
    text: C'est une tempête tourbillonnante
- type: usfm
  marker: q1
  children:
  - type: text
    text: qui fond sur la tête des méchants.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: La colère de l'Eternel ne se calmera pas
- type: usfm
  marker: q1
  children:
  - type: text
    text: tant qu'il n'aura pas agi et mis à exécution les projets de son cœur.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Dans l'avenir, vous en comprendrez le sens.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: »Je n'ai pas envoyé ces prophètes,
- type: usfm
  marker: q1
  children:
  - type: text
    text: pourtant ils se sont précipités.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Je ne leur ai pas parlé,
- type: usfm
  marker: q1
  children:
  - type: text
    text: pourtant ils ont prophétisé.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: S'ils avaient assisté à mon conseil,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ils auraient pu transmettre mes paroles à mon peuple,
- type: usfm
  marker: q1
  children:
  - type: text
    text: le faire renoncer à sa mauvaise conduite,
- type: usfm
  marker: q1
  children:
  - type: text
    text: à la méchanceté de ses agissements.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: »Suis-je un Dieu qui ne considère que les réalités proches, déclare l'Eternel,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ne suis-je pas un Dieu qui voit aussi de plus loin?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: Quelqu'un pourrait-il se dissimuler dans des cachettes
- type: usfm
  marker: q1
  children:
  - type: text
    text: sans que moi, je ne le voie? déclare l'Eternel.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Est-ce que je ne remplis pas le ciel et la terre? déclare l'Eternel.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: J'ai entendu ce que disent les prophètes
- type: usfm
  marker: q1
  children:
  - type: text
    text: qui annoncent des faussetés comme si cela venait de moi
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'en disant: ‘J''ai eu un rêve! J''ai eu un rêve!’'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: Jusqu'à quand ces prophètes auront-ils à cœur de prophétiser des faussetés,
- type: usfm
  marker: q1
  children:
  - type: text
    text: de prophétiser des supercheries de leur invention?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: Ils veulent faire oublier mon nom à mon peuple
- type: usfm
  marker: q1
  children:
  - type: text
    text: par les rêves qu'ils se racontent les uns aux autres,
- type: usfm
  marker: q1
  children:
  - type: text
    text: tout comme leurs ancêtres ont oublié mon nom au profit de Baal.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: Que le prophète qui a reçu un rêve le raconte
- type: usfm
  marker: q1
  children:
  - type: text
    text: et que celui qui a reçu ma parole la rapporte fidèlement!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Pourquoi ajouter de la paille au blé? déclare l'Eternel.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: Ma parole n'est-elle pas comme un feu, déclare l'Eternel,
- type: usfm
  marker: q1
  children:
  - type: text
    text: comme un marteau qui pulvérise la roche?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: »Voilà pourquoi j'en veux aux prophètes
- type: usfm
  marker: q1
  children:
  - type: text
    text: qui se volent mutuellement mes paroles, déclare l'Eternel.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: J'en veux aux prophètes
- type: usfm
  marker: q1
  children:
  - type: text
    text: qui remuent leur langue pour imiter une déclaration solennelle de ma part, déclare l'Eternel.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '32'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: J'en veux à ceux qui prophétisent à partir de rêves pleins de fausseté, déclare l'Eternel.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ils les répètent et ils égarent mon peuple
- type: usfm
  marker: q1
  children:
  - type: text
    text: par leurs mensonges et par leur vantardise.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Moi, je ne les ai pas envoyés et je ne leur ai pas donné d'ordre.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ils ne sont vraiment d'aucune utilité à ce peuple, déclare l'Eternel.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '33'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: '»Si ce peuple, un prophète ou encore un prêtre te demande:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: ‘Quel est le message de l'Eternel?’
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'tu leur diras quel est ce message:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: ‘Je vous abandonnerai, déclare l'Eternel.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '34'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: Et le prophète, le prêtre ou le membre du peuple
- type: usfm
  marker: q1
  children:
  - type: text
    text: qui prétendra avoir reçu un message de l'Eternel,
- type: usfm
  marker: q1
  children:
  - type: text
    text: j'interviendrai contre lui et contre sa famille.’
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '35'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: 'Vous demanderez chacun à son prochain, chacun à son frère:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: ‘Qu'a répondu l'Eternel? Qu'a dit l'Eternel?’
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '36'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: mais de message de l'Eternel, vous n'en mentionnerez plus.
- type: usfm
  marker: q1
  children:
  - type: text
    text: En effet, la parole de chacun sera un fardeau pour lui,
- type: usfm
  marker: q1
  children:
  - type: text
    text: puisque vous avez changé les paroles du Dieu vivant,
- type: usfm
  marker: q1
  children:
  - type: text
    text: de l'Eternel, le maître de l'univers, notre Dieu.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '37'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: '»Voici ce que tu diras au prophète: ‘Que t''a répondu l''Eternel?'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Qu'a dit l'Eternel?’
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '38'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: text
    text: Et si vous prétendez encore avoir reçu un message de l'Eternel,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'alors voici ce que dit l''Eternel:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Puisque vous présentez telle parole comme un message de l'Eternel
- type: usfm
  marker: q1
  children:
  - type: text
    text: alors que j'ai envoyé quelqu'un vous interdire de le faire,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '39'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '39'
  - type: text
    text: à cause de cela, je vous oublierai
- type: usfm
  marker: q1
  children:
  - type: text
    text: et je vous abandonnerai, vous et la ville
- type: usfm
  marker: q1
  children:
  - type: text
    text: que je vous ai donnée, à vous et à vos ancêtres.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '40'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '40'
  - type: text
    text: Je ferai naître en vous un sentiment continuel
- type: usfm
  marker: q1
  children:
  - type: text
    text: de honte et de regret qui ne s'oubliera pas.»
