document_id: JER.23,152
type_code: fra
verses:
  '1':
  - type: text
    content: »Malheur aux bergers qui détruisent et dispersent
  - type: text
    content: le troupeau dont je suis le berger! déclare l'Eternel.
  '10':
  - type: text
    content: En effet, le pays est rempli de personnes qui commettent l'adultère.
  - type: text
    content: Le pays est en deuil à cause de la malédiction dont il est l'objet,
  - type: text
    content: les plaines du désert sont desséchées.
  - type: text
    content: Ils courent après le mal,
  - type: text
    content: ils n'ont du courage que pour ce qui est injuste.
  '11':
  - type: text
    content: «Oui, même les prophètes, même les prêtres, sont souillés.
  - type: text
    content: Même dans mon temple, j'ai trouvé les marques de leur perversité,
  - type: text
    content: déclare l'Eternel.
  '12':
  - type: text
    content: C'est pourquoi, leur voie les conduira comme une pente glissante dans l'obscurité.
  - type: text
    content: Ils y seront poussés et y tomberont.
  - type: text
    content: Oui, je ferai venir le malheur sur eux,
  - type: text
    content: l'année où j'interviendrai contre eux, déclare l'Eternel.
  '13':
  - type: text
    content: '»Chez les prophètes de Samarie, j''ai vu une attitude écœurante:'
  - type: text
    content: ils ont prophétisé par le dieu Baal
  - type: text
    content: et ils ont égaré Israël, mon peuple.
  '14':
  - type: text
    content: 'Mais chez les prophètes de Jérusalem, j''ai vu des comportements horribles:'
  - type: text
    content: ils commettent l'adultère, ils vivent dans le mensonge
  - type: text
    content: et ils encouragent ceux qui font le mal,
  - type: text
    content: de sorte que personne ne renonce à sa méchanceté.
  - type: text
    content: A mes yeux, ils sont tous pareils à Sodome,
  - type: text
    content: et les habitants de Jérusalem à Gomorrhe.
  '15':
  - type: text
    content: '»C''est pourquoi, voici ce que dit l''Eternel, le maître de l''univers, sur les prophètes:'
  - type: text
    content: Je vais leur faire avaler de l'absinthe,
  - type: text
    content: je vais leur faire boire de l'eau empoisonnée.
  - type: text
    content: En effet, c'est à travers les prophètes de Jérusalem
  - type: text
    content: que la souillure a contaminé tout le pays.
  '16':
  - type: text
    content: '»Voici ce que dit l''Eternel, le maître de l''univers:'
  - type: text
    content: N'écoutez pas les paroles des prophètes qui vous font leurs prédictions!
  - type: text
    content: Ils vous entraînent dans l'illusion.
  - type: text
    content: Ils transmettent les visions de leur invention,
  - type: text
    content: et non ce qui vient de la bouche de l'Eternel.
  '17':
  - type: text
    content: 'Ils répètent à ceux qui me méprisent:'
  - type: text
    content: '‘L''Eternel a dit: Vous aurez la paix’,'
  - type: text
    content: 'à tous ceux qui persévèrent dans les penchants de leur cœur ils disent:'
  - type: text
    content: ‘Il ne vous arrivera aucun mal.’
  '18':
  - type: text
    content: Qui donc a assisté au conseil de l'Eternel,
  - type: text
    content: de sorte qu'il aurait vu et entendu sa parole?
  - type: text
    content: Qui s'est montré attentif à sa parole et l'a entendue?
  '19':
  - type: text
    content: »La tempête de l'Eternel, sa colère, éclate.
  - type: text
    content: C'est une tempête tourbillonnante
  - type: text
    content: qui fond sur la tête des méchants.
  '2':
  - type: text
    content: C'est pourquoi, voici ce que dit l'Eternel, le Dieu d'Israël,
  - type: text
    content: 'sur les bergers chargés de prendre soin de mon peuple:'
  - type: text
    content: Puisque vous avez dispersé mes brebis, que vous les avez chassées
  - type: text
    content: et n'êtes pas intervenus en leur faveur,
  - type: text
    content: je vais intervenir contre vous à cause de la méchanceté de vos agissements, déclare l'Eternel.
  '20':
  - type: text
    content: La colère de l'Eternel ne se calmera pas
  - type: text
    content: tant qu'il n'aura pas agi et mis à exécution les projets de son cœur.
  - type: text
    content: Dans l'avenir, vous en comprendrez le sens.
  '21':
  - type: text
    content: »Je n'ai pas envoyé ces prophètes,
  - type: text
    content: pourtant ils se sont précipités.
  - type: text
    content: Je ne leur ai pas parlé,
  - type: text
    content: pourtant ils ont prophétisé.
  '22':
  - type: text
    content: S'ils avaient assisté à mon conseil,
  - type: text
    content: ils auraient pu transmettre mes paroles à mon peuple,
  - type: text
    content: le faire renoncer à sa mauvaise conduite,
  - type: text
    content: à la méchanceté de ses agissements.
  '23':
  - type: text
    content: »Suis-je un Dieu qui ne considère que les réalités proches, déclare l'Eternel,
  - type: text
    content: ne suis-je pas un Dieu qui voit aussi de plus loin?
  '24':
  - type: text
    content: Quelqu'un pourrait-il se dissimuler dans des cachettes
  - type: text
    content: sans que moi, je ne le voie? déclare l'Eternel.
  - type: text
    content: Est-ce que je ne remplis pas le ciel et la terre? déclare l'Eternel.
  '25':
  - type: text
    content: J'ai entendu ce que disent les prophètes
  - type: text
    content: qui annoncent des faussetés comme si cela venait de moi
  - type: text
    content: 'en disant: ‘J''ai eu un rêve! J''ai eu un rêve!’'
  '26':
  - type: text
    content: Jusqu'à quand ces prophètes auront-ils à cœur de prophétiser des faussetés,
  - type: text
    content: de prophétiser des supercheries de leur invention?
  '27':
  - type: text
    content: Ils veulent faire oublier mon nom à mon peuple
  - type: text
    content: par les rêves qu'ils se racontent les uns aux autres,
  - type: text
    content: tout comme leurs ancêtres ont oublié mon nom au profit de Baal.
  '28':
  - type: text
    content: Que le prophète qui a reçu un rêve le raconte
  - type: text
    content: et que celui qui a reçu ma parole la rapporte fidèlement!
  - type: text
    content: Pourquoi ajouter de la paille au blé? déclare l'Eternel.
  '29':
  - type: text
    content: Ma parole n'est-elle pas comme un feu, déclare l'Eternel,
  - type: text
    content: comme un marteau qui pulvérise la roche?
  '3':
  - type: text
    content: Je rassemblerai moi-même le reste de mes brebis
  - type: text
    content: de tous les pays où je les ai chassées.
  - type: text
    content: Je les ramènerai dans leur domaine.
  - type: text
    content: Elles se reproduiront et deviendront nombreuses.
  '30':
  - type: text
    content: »Voilà pourquoi j'en veux aux prophètes
  - type: text
    content: qui se volent mutuellement mes paroles, déclare l'Eternel.
  '31':
  - type: text
    content: J'en veux aux prophètes
  - type: text
    content: qui remuent leur langue pour imiter une déclaration solennelle de ma part, déclare l'Eternel.
  '32':
  - type: text
    content: J'en veux à ceux qui prophétisent à partir de rêves pleins de fausseté, déclare l'Eternel.
  - type: text
    content: Ils les répètent et ils égarent mon peuple
  - type: text
    content: par leurs mensonges et par leur vantardise.
  - type: text
    content: Moi, je ne les ai pas envoyés et je ne leur ai pas donné d'ordre.
  - type: text
    content: Ils ne sont vraiment d'aucune utilité à ce peuple, déclare l'Eternel.
  '33':
  - type: text
    content: '»Si ce peuple, un prophète ou encore un prêtre te demande:'
  - type: text
    content: ‘Quel est le message de l'Eternel?’
  - type: text
    content: 'tu leur diras quel est ce message:'
  - type: text
    content: ‘Je vous abandonnerai, déclare l'Eternel.
  '34':
  - type: text
    content: Et le prophète, le prêtre ou le membre du peuple
  - type: text
    content: qui prétendra avoir reçu un message de l'Eternel,
  - type: text
    content: j'interviendrai contre lui et contre sa famille.’
  '35':
  - type: text
    content: 'Vous demanderez chacun à son prochain, chacun à son frère:'
  - type: text
    content: ‘Qu'a répondu l'Eternel? Qu'a dit l'Eternel?’
  '36':
  - type: text
    content: mais de message de l'Eternel, vous n'en mentionnerez plus.
  - type: text
    content: En effet, la parole de chacun sera un fardeau pour lui,
  - type: text
    content: puisque vous avez changé les paroles du Dieu vivant,
  - type: text
    content: de l'Eternel, le maître de l'univers, notre Dieu.
  '37':
  - type: text
    content: '»Voici ce que tu diras au prophète: ‘Que t''a répondu l''Eternel?'
  - type: text
    content: Qu'a dit l'Eternel?’
  '38':
  - type: text
    content: Et si vous prétendez encore avoir reçu un message de l'Eternel,
  - type: text
    content: 'alors voici ce que dit l''Eternel:'
  - type: text
    content: Puisque vous présentez telle parole comme un message de l'Eternel
  - type: text
    content: alors que j'ai envoyé quelqu'un vous interdire de le faire,
  '39':
  - type: text
    content: à cause de cela, je vous oublierai
  - type: text
    content: et je vous abandonnerai, vous et la ville
  - type: text
    content: que je vous ai donnée, à vous et à vos ancêtres.
  '4':
  - type: text
    content: Je placerai à leur tête des bergers qui prendront soin d'elles.
  - type: text
    content: Elles ne connaîtront plus la peur, elles ne seront plus effrayées
  - type: text
    content: et plus aucune d'elles ne sera manquante, déclare l'Eternel.
  '40':
  - type: text
    content: Je ferai naître en vous un sentiment continuel
  - type: text
    content: de honte et de regret qui ne s'oubliera pas.»
  '5':
  - type: text
    content: »Voici que les jours viennent, déclare l'Eternel,
  - type: text
    content: où je donnerai à David un germe juste.
  - type: text
    content: Il régnera avec compétence,
  - type: text
    content: il exercera le droit et la justice dans le pays.
  '6':
  - type: text
    content: A son époque, Juda sera sauvé
  - type: text
    content: et Israël habitera en sécurité.
  - type: text
    content: 'Voici le nom dont on l''appellera:'
  - type: text
    content: ‘L'Eternel notre justice’.
  '7':
  - type: text
    content: »Voilà pourquoi les jours viennent, déclare l'Eternel,
  - type: text
    content: 'où l''on ne dira plus: ‘L''Eternel est vivant,'
  - type: text
    content: lui qui a fait sortir les Israélites d'Egypte’,
  '8':
  - type: text
    content: 'mais où l''on dira: ‘L''Eternel est vivant,'
  - type: text
    content: lui qui a fait sortir et qui a ramené
  - type: text
    content: les descendants d'Israël du pays du nord
  - type: text
    content: et de tous les pays où il les avait chassés.’
  - type: text
    content: Ils habiteront alors sur leur territoire.»
  - type: heading
    content: Les prétendus prophètes
  '9':
  - type: text
    content: Message concernant les prophètes.
  - type: text
    content: Mon cœur est brisé à l'intérieur de moi,
  - type: text
    content: tous mes os tremblent.
  - type: text
    content: Je suis pareil à un homme ivre,
  - type: text
    content: à un homme fort emporté par le vin,
  - type: text
    content: à cause de l'Eternel et à cause de ses paroles saintes.
