document_id: PRO.8,152
type_code: fra
verses:
  '1':
  - type: heading
    content: L'activité de la sagesse
  - type: text
    content: La sagesse ne crie-t-elle pas?
  - type: text
    content: L'intelligence ne parle-t-elle pas tout haut?
  '10':
  - type: text
    content: Préférez mes instructions à l'argent,
  - type: text
    content: et la connaissance à l'or le plus précieux!
  '11':
  - type: text
    content: En effet, la sagesse vaut mieux que les perles,
  - type: text
    content: elle a plus de valeur que tout ce qu'on pourrait désirer.
  '12':
  - type: text
    content: »Moi, la sagesse, j'habite le discernement
  - type: text
    content: et je possède l'art de la réflexion.
  '13':
  - type: text
    content: Craindre l'Eternel, c'est détester le mal.
  - type: text
    content: L'arrogance, l'orgueil, la voie du mal
  - type: text
    content: et la bouche perverse, voilà ce que je déteste.
  '14':
  - type: text
    content: »C'est à moi qu'appartiennent le conseil et le succès.
  - type: text
    content: Je suis l'intelligence, la puissance m'appartient.
  '15':
  - type: text
    content: Par moi les rois règnent
  - type: text
    content: et les dirigeants ordonnent ce qui est juste,
  '16':
  - type: text
    content: par moi gouvernent les chefs,
  - type: text
    content: les grands, tous les juges de la terre.
  '17':
  - type: text
    content: »J'aime ceux qui m'aiment,
  - type: text
    content: et ceux qui me cherchent me trouvent.
  '18':
  - type: text
    content: Avec moi sont la richesse et la gloire,
  - type: text
    content: les valeurs élevées et la justice.
  '19':
  - type: text
    content: Mon fruit est meilleur que l'or, que l'or pur,
  - type: text
    content: et le profit qu'on tire de moi est préférable à l'argent.
  '2':
  - type: text
    content: C'est au sommet des hauteurs dominant la route,
  - type: text
    content: c'est à la croisée des chemins qu'elle se place.
  '20':
  - type: text
    content: Je marche sur le chemin de la justice,
  - type: text
    content: au milieu des sentiers du droit,
  '21':
  - type: text
    content: pour donner des biens en héritage à ceux qui m'aiment
  - type: text
    content: et pour remplir leurs trésors.
  '22':
  - type: text
    content: »L'Eternel me possédait au commencement
  - type: note
    content: 'Au commencement: ou comme commencement.'
  - type: text
    content: ' de son activité,'
  - type: text
    content: avant ses œuvres les plus anciennes.
  '23':
  - type: text
    content: J'ai été établie depuis l'éternité, dès le début,
  - type: text
    content: avant même que la terre existe.
  '24':
  - type: text
    content: »J'ai été mise au monde quand il n'y avait pas de mer,
  - type: text
    content: pas de source chargée d'eau.
  '25':
  - type: text
    content: Avant que les montagnes ne soient formées,
  - type: text
    content: avant que les collines n'existent, j'ai été mise au monde.
  '26':
  - type: text
    content: Il n'avait encore fait ni la terre, ni les campagnes,
  - type: text
    content: ni le premier grain de poussière du monde.
  '27':
  - type: text
    content: »Lorsqu'il a disposé le ciel, j'étais là;
  - type: text
    content: lorsqu'il a tracé un cercle à la surface de l'abîme,
  '28':
  - type: text
    content: lorsqu'il a placé les nuages en haut
  - type: text
    content: et que les sources de l'abîme ont jailli avec force,
  '29':
  - type: text
    content: lorsqu'il a fixé une limite à la mer
  - type: text
    content: pour que l'eau n'en franchisse pas les bords,
  - type: text
    content: lorsqu'il a tracé les fondations de la terre,
  '3':
  - type: text
    content: A côté des portes, à l'entrée de la ville,
  - type: text
    content: 'à l''intérieur des portes, elle crie:'
  '30':
  - type: text
    content: j'étais à l'œuvre à ses côtés.
  - type: text
    content: Je faisais tous les jours son plaisir,
  - type: text
    content: jouant constamment devant lui,
  '31':
  - type: text
    content: jouant dans le monde, sur sa terre,
  - type: text
    content: et trouvant mon plaisir parmi les hommes.
  '32':
  - type: text
    content: »Et maintenant, mes fils, écoutez-moi!
  - type: text
    content: Heureux ceux qui persévèrent dans mes voies!
  '33':
  - type: text
    content: Ecoutez l'instruction pour devenir sages,
  - type: text
    content: ne la négligez pas!
  '34':
  - type: text
    content: Heureux l'homme qui m'écoute,
  - type: text
    content: qui veille chaque jour sur mes portes
  - type: text
    content: et qui garde l'entrée de ma maison!
  '35':
  - type: text
    content: »En effet, celui qui me trouve a trouvé la vie,
  - type: text
    content: il a obtenu la faveur de l'Eternel.
  '36':
  - type: text
    content: En revanche, celui qui pèche contre moi se fait du tort à lui-même.
  - type: text
    content: Tous ceux qui me détestent aiment la mort.»
  '4':
  - type: text
    content: «Hommes, c'est vous que j'appelle,
  - type: text
    content: et ma voix s'adresse aux êtres humains.
  '5':
  - type: text
    content: Vous qui manquez d'expérience, apprenez le discernement!
  - type: text
    content: Vous qui êtes stupides, apprenez le bon sens!
  '6':
  - type: text
    content: Ecoutez, car ce que je dis est capital
  - type: text
    content: et j'ouvre mes lèvres avec droiture.
  '7':
  - type: text
    content: Oui, c'est la vérité que ma bouche proclame
  - type: text
    content: et mes lèvres ont horreur de la méchanceté.
  '8':
  - type: text
    content: Toutes les paroles de ma bouche sont justes,
  - type: text
    content: elles ne contiennent rien qui soit faux ou perverti.
  '9':
  - type: text
    content: Toutes sont exactes pour celui qui est intelligent,
  - type: text
    content: et droites pour ceux qui ont trouvé la connaissance.
