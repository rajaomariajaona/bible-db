document_id: PRO.8,152
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: L'activité de la sagesse
    marker-yv: yv-h
  - type: usfm
    marker: q1
    children:
    - type: text
      text: La sagesse ne crie-t-elle pas?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: L'intelligence ne parle-t-elle pas tout haut?
  '10':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Préférez mes instructions à l'argent,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et la connaissance à l'or le plus précieux!
  '11':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: En effet, la sagesse vaut mieux que les perles,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: elle a plus de valeur que tout ce qu'on pourrait désirer.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: »Moi, la sagesse, j'habite le discernement
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et je possède l'art de la réflexion.
  '13':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Craindre l'Eternel, c'est détester le mal.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: L'arrogance, l'orgueil, la voie du mal
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et la bouche perverse, voilà ce que je déteste.
  '14':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: »C'est à moi qu'appartiennent le conseil et le succès.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Je suis l'intelligence, la puissance m'appartient.
  '15':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Par moi les rois règnent
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et les dirigeants ordonnent ce qui est juste,
  '16':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: par moi gouvernent les chefs,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: les grands, tous les juges de la terre.
  '17':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: »J'aime ceux qui m'aiment,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et ceux qui me cherchent me trouvent.
  '18':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Avec moi sont la richesse et la gloire,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: les valeurs élevées et la justice.
  '19':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mon fruit est meilleur que l'or, que l'or pur,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et le profit qu'on tire de moi est préférable à l'argent.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: C'est au sommet des hauteurs dominant la route,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: c'est à la croisée des chemins qu'elle se place.
  '20':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Je marche sur le chemin de la justice,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: au milieu des sentiers du droit,
  '21':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: pour donner des biens en héritage à ceux qui m'aiment
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et pour remplir leurs trésors.
  '22':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: »L'Eternel me possédait au commencement
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '8.22 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Au commencement: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ou comme commencement.
      marker-yv: yv-n
    - type: text
      text: ' de son activité,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: avant ses œuvres les plus anciennes.
  '23':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: J'ai été établie depuis l'éternité, dès le début,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: avant même que la terre existe.
  '24':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: »J'ai été mise au monde quand il n'y avait pas de mer,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: pas de source chargée d'eau.
  '25':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Avant que les montagnes ne soient formées,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: avant que les collines n'existent, j'ai été mise au monde.
  '26':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Il n'avait encore fait ni la terre, ni les campagnes,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ni le premier grain de poussière du monde.
  '27':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: »Lorsqu'il a disposé le ciel, j'étais là;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: lorsqu'il a tracé un cercle à la surface de l'abîme,
  '28':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: lorsqu'il a placé les nuages en haut
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et que les sources de l'abîme ont jailli avec force,
  '29':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: lorsqu'il a fixé une limite à la mer
  - type: usfm
    marker: q1
    children:
    - type: text
      text: pour que l'eau n'en franchisse pas les bords,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: lorsqu'il a tracé les fondations de la terre,
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: A côté des portes, à l'entrée de la ville,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'à l''intérieur des portes, elle crie:'
  '30':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: j'étais à l'œuvre à ses côtés.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Je faisais tous les jours son plaisir,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: jouant constamment devant lui,
  '31':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: jouant dans le monde, sur sa terre,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et trouvant mon plaisir parmi les hommes.
  '32':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: »Et maintenant, mes fils, écoutez-moi!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Heureux ceux qui persévèrent dans mes voies!
  '33':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ecoutez l'instruction pour devenir sages,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ne la négligez pas!
  '34':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Heureux l'homme qui m'écoute,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: qui veille chaque jour sur mes portes
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et qui garde l'entrée de ma maison!
  '35':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: »En effet, celui qui me trouve a trouvé la vie,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: il a obtenu la faveur de l'Eternel.
  '36':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: En revanche, celui qui pèche contre moi se fait du tort à lui-même.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tous ceux qui me détestent aiment la mort.»
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: «Hommes, c'est vous que j'appelle,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et ma voix s'adresse aux êtres humains.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Vous qui manquez d'expérience, apprenez le discernement!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Vous qui êtes stupides, apprenez le bon sens!
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ecoutez, car ce que je dis est capital
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et j'ouvre mes lèvres avec droiture.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Oui, c'est la vérité que ma bouche proclame
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et mes lèvres ont horreur de la méchanceté.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Toutes les paroles de ma bouche sont justes,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: elles ne contiennent rien qui soit faux ou perverti.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Toutes sont exactes pour celui qui est intelligent,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et droites pour ceux qui ont trouvé la connaissance.
