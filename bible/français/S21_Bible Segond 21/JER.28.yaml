document_id: JER.28
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Jérémie et Hanania
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'La même année, le cinquième mois de la quatrième année, au début du règne de Sédécias sur Juda, Hanania, fils d''Azzur, le prophète originaire de Gabaon, m''a affirmé dans la maison de l''Eternel, en présence des prêtres et de tout le peuple: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: '«Voici ce que dit l''Eternel, le maître de l''univers, le Dieu d''Israël: Je brise la domination du roi de Babylone. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Dans deux ans je ferai revenir ici tous les ustensiles de la maison de l''Eternel que Nebucadnetsar, roi de Babylone, a pris d''ici pour les amener à Babylone. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Je ferai revenir ici Jéconia, fils de Jojakim, roi de Juda, et tous les exilés de Juda partis à Babylone, déclare l'Eternel, car je briserai la domination du roi de Babylone.»
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Le prophète Jérémie répondit au prophète Hanania en présence des prêtres et de tout le peuple, alors qu''ils se tenaient dans la maison de l''Eternel. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Il dit: «Oui! Que l''Eternel agisse de cette manière! Qu''il accomplisse les prophéties que tu as communiquées en faisant revenir de Babylone jusqu''ici les ustensiles de la maison de l''Eternel et tous les exilés! '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Seulement écoute, je t''en prie, la parole que je vais te dire, à toi et à tout le peuple: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: '‘Les prophètes qui ont existé avant toi et moi ont, depuis toujours, annoncé la guerre, le malheur et la peste en rapport avec de nombreux pays et de grands royaumes. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Quant au prophète qui annonce la paix, c'est lorsque sa prophétie s'accomplit qu'il est reconnu comme vraiment envoyé par l'Eternel.’»
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Alors le prophète Hanania enleva la barre qui se trouvait sur le cou du prophète Jérémie et la brisa. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Puis il dit en présence de tout le peuple: «Voici ce que dit l''Eternel: C''est de cette façon que, dans deux ans, je briserai la domination exercée par Nebucadnetsar, roi de Babylone, sur toutes les nations.» Le prophète Jérémie poursuivit alors son chemin.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'La parole de l''Eternel fut adressée à Jérémie après que le prophète Hanania eut brisé la barre qui se trouvait sur son cou: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: '«Va annoncer à Hanania: ‘Voici ce que dit l''Eternel: Tu as brisé des barres en bois? Pour les remplacer, tu devras faire des barres en fer. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'En effet, voici ce que dit l''Eternel, le maître de l''univers, le Dieu d''Israël: C''est une domination inflexible que j''ai imposée à toutes ces nations pour qu''elles soient asservies à Nebucadnetsar, roi de Babylone, et elles seront effectivement ses esclaves; je lui ai même donné les animaux sauvages.’»'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Le prophète Jérémie dit alors au prophète Hanania: «Ecoute donc, Hanania! L''Eternel ne t''a pas envoyé et tu as donné un sentiment de confiance trompeur à ce peuple. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'C''est pourquoi, voici ce que dit l''Eternel: ‘Je vais te chasser de cette terre; tu mourras cette année, car par tes paroles tu as appelé les autres à se détourner de l''Eternel.’»'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Le prophète Hanania mourut le septième mois de cette année-là.
