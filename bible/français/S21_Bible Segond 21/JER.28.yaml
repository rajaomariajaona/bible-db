document_id: JER.28,152
type_code: fra
verses:
  '1':
  - type: heading
    content: Jérémie et Hanania
  - type: text
    content: 'La même année, le cinquième mois de la quatrième année, au début du règne de Sédécias sur Juda, Hanania, fils d''Azzur, le prophète originaire de Gabaon, m''a affirmé dans la maison de l''Eternel, en présence des prêtres et de tout le peuple: '
  '10':
  - type: text
    content: 'Alors le prophète Hanania enleva la barre qui se trouvait sur le cou du prophète Jérémie et la brisa. '
  '11':
  - type: text
    content: 'Puis il dit en présence de tout le peuple: «Voici ce que dit l''Eternel: C''est de cette façon que, dans deux ans, je briserai la domination exercée par Nebucadnetsar, roi de Babylone, sur toutes les nations.» Le prophète Jérémie poursuivit alors son chemin.'
  '12':
  - type: text
    content: 'La parole de l''Eternel fut adressée à Jérémie après que le prophète Hanania eut brisé la barre qui se trouvait sur son cou: '
  '13':
  - type: text
    content: '«Va annoncer à Hanania: ‘Voici ce que dit l''Eternel: Tu as brisé des barres en bois? Pour les remplacer, tu devras faire des barres en fer. '
  '14':
  - type: text
    content: 'En effet, voici ce que dit l''Eternel, le maître de l''univers, le Dieu d''Israël: C''est une domination inflexible que j''ai imposée à toutes ces nations pour qu''elles soient asservies à Nebucadnetsar, roi de Babylone, et elles seront effectivement ses esclaves; je lui ai même donné les animaux sauvages.’»'
  '15':
  - type: text
    content: 'Le prophète Jérémie dit alors au prophète Hanania: «Ecoute donc, Hanania! L''Eternel ne t''a pas envoyé et tu as donné un sentiment de confiance trompeur à ce peuple. '
  '16':
  - type: text
    content: 'C''est pourquoi, voici ce que dit l''Eternel: ‘Je vais te chasser de cette terre; tu mourras cette année, car par tes paroles tu as appelé les autres à se détourner de l''Eternel.’»'
  '17':
  - type: text
    content: Le prophète Hanania mourut le septième mois de cette année-là.
  '2':
  - type: text
    content: '«Voici ce que dit l''Eternel, le maître de l''univers, le Dieu d''Israël: Je brise la domination du roi de Babylone. '
  '3':
  - type: text
    content: 'Dans deux ans je ferai revenir ici tous les ustensiles de la maison de l''Eternel que Nebucadnetsar, roi de Babylone, a pris d''ici pour les amener à Babylone. '
  '4':
  - type: text
    content: Je ferai revenir ici Jéconia, fils de Jojakim, roi de Juda, et tous les exilés de Juda partis à Babylone, déclare l'Eternel, car je briserai la domination du roi de Babylone.»
  '5':
  - type: text
    content: 'Le prophète Jérémie répondit au prophète Hanania en présence des prêtres et de tout le peuple, alors qu''ils se tenaient dans la maison de l''Eternel. '
  '6':
  - type: text
    content: 'Il dit: «Oui! Que l''Eternel agisse de cette manière! Qu''il accomplisse les prophéties que tu as communiquées en faisant revenir de Babylone jusqu''ici les ustensiles de la maison de l''Eternel et tous les exilés! '
  '7':
  - type: text
    content: 'Seulement écoute, je t''en prie, la parole que je vais te dire, à toi et à tout le peuple: '
  '8':
  - type: text
    content: '‘Les prophètes qui ont existé avant toi et moi ont, depuis toujours, annoncé la guerre, le malheur et la peste en rapport avec de nombreux pays et de grands royaumes. '
  '9':
  - type: text
    content: Quant au prophète qui annonce la paix, c'est lorsque sa prophétie s'accomplit qu'il est reconnu comme vraiment envoyé par l'Eternel.’»
