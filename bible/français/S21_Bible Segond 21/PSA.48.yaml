document_id: PSA.48,152
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: La beauté de Sion
    marker-yv: yv-h
  - type: usfm
    marker: d
    children:
    - type: text
      text: Chant, psaume des descendants de Koré.
  '10':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: O Dieu, nous pensons à ta bonté
  - type: usfm
    marker: q1
    children:
    - type: text
      text: au milieu de ton temple.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ton nom, ô Dieu, et ta louange
  - type: usfm
    marker: q1
    children:
    - type: text
      text: retentissent jusqu'aux extrémités de la terre;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ta main droite est pleine de justice.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Le mont Sion se réjouit,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: les villes de Juda sont dans l'allégresse,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: à cause de tes jugements.
  '13':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Parcourez Sion, parcourez son enceinte,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: comptez ses tours,
  '14':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: observez son rempart,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: examinez ses palais,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'pour annoncer à la génération future:'
  '15':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: «Voilà le Dieu qui est notre Dieu pour toujours et à perpétuité;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: il sera notre guide jusqu'à la mort.»
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: L'Eternel est grand, il est l'objet de toutes les louanges
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dans la ville de notre Dieu, sur sa montagne sainte.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Elle est belle, la colline qui fait la joie de toute la terre, le mont Sion;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: du côté nord, c'est la ville du grand roi.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Dieu, dans ses palais, est connu comme une forteresse.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Les rois s'étaient ligués,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ensemble ils se sont avancés.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ils ont regardé, tout stupéfaits,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: saisis de peur ils ont pris la fuite.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Un tremblement s'est emparé d'eux sur place,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: comme la douleur s'empare d'une femme qui accouche.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ils ont été chassés comme par le vent d'est
  - type: usfm
    marker: q1
    children:
    - type: text
      text: qui brise les bateaux long-courriers.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ce que nous avions entendu dire, nous l'avons vu
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dans la ville de l'Eternel, le maître de l'univers,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'dans la ville de notre Dieu:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Dieu l''affermira pour toujours. '
    - type: usfm
      marker: qs
      children:
      - type: text
        text: – Pause.
