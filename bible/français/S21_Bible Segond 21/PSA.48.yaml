document_id: PSA.48,152
type_code: fra
verses:
  '1':
  - type: heading
    content: La beauté de Sion
  - type: text
    content: Chant, psaume des descendants de Koré.
  '10':
  - type: text
    content: O Dieu, nous pensons à ta bonté
  - type: text
    content: au milieu de ton temple.
  '11':
  - type: text
    content: Ton nom, ô Dieu, et ta louange
  - type: text
    content: retentissent jusqu'aux extrémités de la terre;
  - type: text
    content: ta main droite est pleine de justice.
  '12':
  - type: text
    content: Le mont Sion se réjouit,
  - type: text
    content: les villes de Juda sont dans l'allégresse,
  - type: text
    content: à cause de tes jugements.
  '13':
  - type: text
    content: Parcourez Sion, parcourez son enceinte,
  - type: text
    content: comptez ses tours,
  '14':
  - type: text
    content: observez son rempart,
  - type: text
    content: examinez ses palais,
  - type: text
    content: 'pour annoncer à la génération future:'
  '15':
  - type: text
    content: «Voilà le Dieu qui est notre Dieu pour toujours et à perpétuité;
  - type: text
    content: il sera notre guide jusqu'à la mort.»
  '2':
  - type: text
    content: L'Eternel est grand, il est l'objet de toutes les louanges
  - type: text
    content: dans la ville de notre Dieu, sur sa montagne sainte.
  '3':
  - type: text
    content: Elle est belle, la colline qui fait la joie de toute la terre, le mont Sion;
  - type: text
    content: du côté nord, c'est la ville du grand roi.
  '4':
  - type: text
    content: Dieu, dans ses palais, est connu comme une forteresse.
  '5':
  - type: text
    content: Les rois s'étaient ligués,
  - type: text
    content: ensemble ils se sont avancés.
  '6':
  - type: text
    content: Ils ont regardé, tout stupéfaits,
  - type: text
    content: saisis de peur ils ont pris la fuite.
  '7':
  - type: text
    content: Un tremblement s'est emparé d'eux sur place,
  - type: text
    content: comme la douleur s'empare d'une femme qui accouche.
  '8':
  - type: text
    content: Ils ont été chassés comme par le vent d'est
  - type: text
    content: qui brise les bateaux long-courriers.
  '9':
  - type: text
    content: Ce que nous avions entendu dire, nous l'avons vu
  - type: text
    content: dans la ville de l'Eternel, le maître de l'univers,
  - type: text
    content: 'dans la ville de notre Dieu:'
  - type: text
    content: 'Dieu l''affermira pour toujours. '
  - type: text
    content: – Pause.
