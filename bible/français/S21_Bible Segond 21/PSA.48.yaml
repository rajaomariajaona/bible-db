document_id: PSA.48
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: La beauté de Sion
  marker-yv: yv-h
- type: usfm
  marker: d
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Chant, psaume des descendants de Koré.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: L'Eternel est grand, il est l'objet de toutes les louanges
- type: usfm
  marker: q1
  children:
  - type: text
    text: dans la ville de notre Dieu, sur sa montagne sainte.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Elle est belle, la colline qui fait la joie de toute la terre, le mont Sion;
- type: usfm
  marker: q1
  children:
  - type: text
    text: du côté nord, c'est la ville du grand roi.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Dieu, dans ses palais, est connu comme une forteresse.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Les rois s'étaient ligués,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ensemble ils se sont avancés.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Ils ont regardé, tout stupéfaits,
- type: usfm
  marker: q1
  children:
  - type: text
    text: saisis de peur ils ont pris la fuite.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Un tremblement s'est emparé d'eux sur place,
- type: usfm
  marker: q1
  children:
  - type: text
    text: comme la douleur s'empare d'une femme qui accouche.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Ils ont été chassés comme par le vent d'est
- type: usfm
  marker: q1
  children:
  - type: text
    text: qui brise les bateaux long-courriers.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Ce que nous avions entendu dire, nous l'avons vu
- type: usfm
  marker: q1
  children:
  - type: text
    text: dans la ville de l'Eternel, le maître de l'univers,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'dans la ville de notre Dieu:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Dieu l''affermira pour toujours. '
  - type: usfm
    marker: qs
    children:
    - type: text
      text: – Pause.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: O Dieu, nous pensons à ta bonté
- type: usfm
  marker: q1
  children:
  - type: text
    text: au milieu de ton temple.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Ton nom, ô Dieu, et ta louange
- type: usfm
  marker: q1
  children:
  - type: text
    text: retentissent jusqu'aux extrémités de la terre;
- type: usfm
  marker: q1
  children:
  - type: text
    text: ta main droite est pleine de justice.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Le mont Sion se réjouit,
- type: usfm
  marker: q1
  children:
  - type: text
    text: les villes de Juda sont dans l'allégresse,
- type: usfm
  marker: q1
  children:
  - type: text
    text: à cause de tes jugements.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Parcourez Sion, parcourez son enceinte,
- type: usfm
  marker: q1
  children:
  - type: text
    text: comptez ses tours,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: observez son rempart,
- type: usfm
  marker: q1
  children:
  - type: text
    text: examinez ses palais,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'pour annoncer à la génération future:'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: «Voilà le Dieu qui est notre Dieu pour toujours et à perpétuité;
- type: usfm
  marker: q1
  children:
  - type: text
    text: il sera notre guide jusqu'à la mort.»
