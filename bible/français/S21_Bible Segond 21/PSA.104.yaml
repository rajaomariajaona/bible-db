document_id: PSA.104,152
type_code: fra
verses:
  '1':
  - type: heading
    content: Louange au Dieu de la création
  - type: text
    content: Bénis l'Eternel, mon âme!
  - type: text
    content: Eternel, mon Dieu, tu es infiniment grand,
  - type: text
    content: tu es revêtu de splendeur et de magnificence.
  '10':
  - type: text
    content: Il conduit les sources vers des torrents
  - type: text
    content: qui parcourent les montagnes.
  '11':
  - type: text
    content: Tous les animaux sauvages y boivent,
  - type: text
    content: les ânes y étanchent leur soif.
  '12':
  - type: text
    content: Les oiseaux du ciel nichent sur leurs rives
  - type: text
    content: et chantent dans les feuillages.
  '13':
  - type: text
    content: Du haut de sa demeure, Dieu arrose les montagnes.
  - type: text
    content: La terre est rassasiée du fruit de ton travail.
  '14':
  - type: text
    content: Il fait pousser l'herbe pour le bétail
  - type: text
    content: 'et les plantes pour les besoins de l''homme afin que la terre produise de la nourriture:'
  '15':
  - type: text
    content: le vin qui réjouit le cœur de l'homme
  - type: text
    content: et fait plus que l'huile resplendir son visage,
  - type: text
    content: et le pain qui fortifie le cœur de l'homme.
  '16':
  - type: text
    content: Ils sont bien nourris, les arbres de l'Eternel,
  - type: text
    content: les cèdres du Liban, qu'il a plantés.
  '17':
  - type: text
    content: C'est là que les oiseaux font leurs nids.
  - type: text
    content: La cigogne a sa demeure dans les cyprès,
  '18':
  - type: text
    content: les hautes montagnes sont pour les bouquetins,
  - type: text
    content: les rochers sont le refuge des damans.
  '19':
  - type: text
    content: Il a fait la lune pour marquer les temps;
  - type: text
    content: le soleil sait quand il doit se coucher.
  '2':
  - type: text
    content: L'Eternel s'enveloppe de lumière comme d'un manteau,
  - type: text
    content: il étend le ciel comme une tente.
  '20':
  - type: text
    content: Tu fais venir les ténèbres, et c'est la nuit.
  - type: text
    content: Tous les animaux des forêts se mettent alors en mouvement;
  '21':
  - type: text
    content: les lionceaux rugissent après leur proie,
  - type: text
    content: ils demandent leur nourriture à Dieu.
  '22':
  - type: text
    content: 'Le soleil se lève: ils se retirent'
  - type: text
    content: et se couchent dans leurs tanières.
  '23':
  - type: text
    content: Quant à l'homme, il sort pour se rendre à son activité
  - type: text
    content: et à son travail jusqu'au soir.
  '24':
  - type: text
    content: Que tes œuvres sont nombreuses, Eternel!
  - type: text
    content: Tu les as toutes faites avec sagesse.
  - type: text
    content: La terre est remplie de tes biens.
  '25':
  - type: text
    content: 'Voici la mer, immense et vaste: là vivent,'
  - type: text
    content: innombrables, des animaux, petits et grands.
  '26':
  - type: text
    content: Les bateaux la sillonnent, tout comme le léviathan
  - type: note
    content: 'Le léviathan: monstre marin.'
  - type: text
    content: ','
  - type: text
    content: que tu as formé pour qu'il y joue.
  '27':
  - type: text
    content: Tous ces animaux espèrent en toi
  - type: text
    content: pour que tu leur donnes la nourriture au moment voulu.
  '28':
  - type: text
    content: Tu la leur donnes, et ils la prennent;
  - type: text
    content: tu ouvres ta main, et ils sont rassasiés de biens.
  '29':
  - type: text
    content: Tu te caches, et ils sont épouvantés;
  - type: text
    content: tu leur retires le souffle, et ils expirent,
  - type: text
    content: ils retournent à la poussière.
  '3':
  - type: text
    content: Il construit sa demeure au-dessus de l'eau,
  - type: text
    content: il fait des nuages son char,
  - type: text
    content: il s'avance sur les ailes du vent.
  '30':
  - type: text
    content: Tu envoies ton souffle, et ils sont créés;
  - type: text
    content: tu renouvelles ainsi la surface de la terre.
  '31':
  - type: text
    content: Que la gloire de l'Eternel dure éternellement!
  - type: text
    content: Que l'Eternel se réjouisse de ses œuvres!
  '32':
  - type: text
    content: Il regarde la terre, et elle tremble;
  - type: text
    content: il touche les montagnes, et elles fument.
  '33':
  - type: text
    content: Je veux chanter en l'honneur de l'Eternel tant que je vivrai,
  - type: text
    content: je veux célébrer mon Dieu tant que j'existerai.
  '34':
  - type: text
    content: Que ma louange lui soit agréable!
  - type: text
    content: Je veux me réjouir en l'Eternel.
  '35':
  - type: text
    content: Que les pécheurs disparaissent de la terre
  - type: text
    content: et qu'il n'y ait plus de méchants!
  - type: text
    content: Bénis l'Eternel, mon âme!
  - type: text
    content: Louez l'Eternel!
  '4':
  - type: text
    content: '*Il fait des vents ses messagers, des éclairs ses serviteurs.'
  - type: note
    content: 'Il fait… serviteurs: ou (choix de la traduction des Septante) il fait de ses anges des esprits, et de ses serviteurs une flamme de feu; cité sous cette dernière forme en Hébreux 1.7.'
  '5':
  - type: text
    content: 'Il a établi la terre sur ses fondements:'
  - type: text
    content: elle ne sera jamais ébranlée.
  '6':
  - type: text
    content: Tu l'avais couverte de l'océan comme d'un vêtement,
  - type: text
    content: l'eau recouvrait les montagnes;
  '7':
  - type: text
    content: elle a fui à ta menace,
  - type: text
    content: elle s'est sauvée au son de ton tonnerre.
  '8':
  - type: text
    content: Des montagnes se sont élevées, des vallées se sont abaissées,
  - type: text
    content: à la place que tu leur avais fixée.
  '9':
  - type: text
    content: Tu as posé une limite que l'eau ne doit pas franchir,
  - type: text
    content: afin qu'elle ne revienne plus couvrir la terre.
