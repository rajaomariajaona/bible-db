document_id: PSA.104,152
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Louange au Dieu de la création
    marker-yv: yv-h
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: Bénis l'Eternel, mon âme!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Eternel, mon Dieu, tu es infiniment grand,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: tu es revêtu de splendeur et de magnificence.
  '10':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: Il conduit les sources vers des torrents
  - type: usfm
    marker: q1
    children:
    - type: text
      text: qui parcourent les montagnes.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: Tous les animaux sauvages y boivent,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: les ânes y étanchent leur soif.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: Les oiseaux du ciel nichent sur leurs rives
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et chantent dans les feuillages.
  '13':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: Du haut de sa demeure, Dieu arrose les montagnes.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: La terre est rassasiée du fruit de ton travail.
  '14':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: Il fait pousser l'herbe pour le bétail
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'et les plantes pour les besoins de l''homme afin que la terre produise de la nourriture:'
  '15':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: le vin qui réjouit le cœur de l'homme
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et fait plus que l'huile resplendir son visage,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et le pain qui fortifie le cœur de l'homme.
  '16':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: Ils sont bien nourris, les arbres de l'Eternel,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: les cèdres du Liban, qu'il a plantés.
  '17':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: C'est là que les oiseaux font leurs nids.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: La cigogne a sa demeure dans les cyprès,
  '18':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: les hautes montagnes sont pour les bouquetins,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: les rochers sont le refuge des damans.
  '19':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: Il a fait la lune pour marquer les temps;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: le soleil sait quand il doit se coucher.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: L'Eternel s'enveloppe de lumière comme d'un manteau,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: il étend le ciel comme une tente.
  '20':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: Tu fais venir les ténèbres, et c'est la nuit.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tous les animaux des forêts se mettent alors en mouvement;
  '21':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: les lionceaux rugissent après leur proie,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ils demandent leur nourriture à Dieu.
  '22':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: 'Le soleil se lève: ils se retirent'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et se couchent dans leurs tanières.
  '23':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: Quant à l'homme, il sort pour se rendre à son activité
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et à son travail jusqu'au soir.
  '24':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: Que tes œuvres sont nombreuses, Eternel!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tu les as toutes faites avec sagesse.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: La terre est remplie de tes biens.
  '25':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: 'Voici la mer, immense et vaste: là vivent,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: innombrables, des animaux, petits et grands.
  '26':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: Les bateaux la sillonnent, tout comme le léviathan
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '104.26 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Le léviathan: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: monstre marin.
      marker-yv: yv-n
    - type: text
      text: ','
  - type: usfm
    marker: q1
    children:
    - type: text
      text: que tu as formé pour qu'il y joue.
  '27':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: Tous ces animaux espèrent en toi
  - type: usfm
    marker: q1
    children:
    - type: text
      text: pour que tu leur donnes la nourriture au moment voulu.
  '28':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: Tu la leur donnes, et ils la prennent;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: tu ouvres ta main, et ils sont rassasiés de biens.
  '29':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: Tu te caches, et ils sont épouvantés;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: tu leur retires le souffle, et ils expirent,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ils retournent à la poussière.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: Il construit sa demeure au-dessus de l'eau,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: il fait des nuages son char,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: il s'avance sur les ailes du vent.
  '30':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '30'
    - type: text
      text: Tu envoies ton souffle, et ils sont créés;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: tu renouvelles ainsi la surface de la terre.
  '31':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '31'
    - type: text
      text: Que la gloire de l'Eternel dure éternellement!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Que l'Eternel se réjouisse de ses œuvres!
  '32':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '32'
    - type: text
      text: Il regarde la terre, et elle tremble;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: il touche les montagnes, et elles fument.
  '33':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '33'
    - type: text
      text: Je veux chanter en l'honneur de l'Eternel tant que je vivrai,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: je veux célébrer mon Dieu tant que j'existerai.
  '34':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '34'
    - type: text
      text: Que ma louange lui soit agréable!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Je veux me réjouir en l'Eternel.
  '35':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '35'
    - type: text
      text: Que les pécheurs disparaissent de la terre
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et qu'il n'y ait plus de méchants!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Bénis l'Eternel, mon âme!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Louez l'Eternel!
  '4':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: '*Il fait des vents ses messagers, des éclairs ses serviteurs.'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '104.4 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Il fait… serviteurs: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'ou (choix de la traduction des Septante) il fait de ses anges des esprits, et de ses serviteurs une flamme de feu; cité sous cette dernière forme en '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Hébreux 1.7
      - type: usfm
        marker: ft
        children:
        - type: text
          text: .
      marker-yv: yv-n
  '5':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'Il a établi la terre sur ses fondements:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: elle ne sera jamais ébranlée.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: Tu l'avais couverte de l'océan comme d'un vêtement,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: l'eau recouvrait les montagnes;
  '7':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: elle a fui à ta menace,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: elle s'est sauvée au son de ton tonnerre.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: Des montagnes se sont élevées, des vallées se sont abaissées,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: à la place que tu leur avais fixée.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: Tu as posé une limite que l'eau ne doit pas franchir,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: afin qu'elle ne revienne plus couvrir la terre.
