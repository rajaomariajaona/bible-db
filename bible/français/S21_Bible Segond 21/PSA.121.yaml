document_id: PSA.121,152
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Secours et protection de Dieu
    marker-yv: yv-h
  - type: usfm
    marker: d
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: Chant des montées.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Je lève mes yeux vers les montagnes:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: d'où me viendra le secours?
  '2':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: Le secours me vient de l'Eternel,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: qui a fait le ciel et la terre.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: Qu'il ne permette pas à ton pied de trébucher, qu'il ne somnole pas,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: celui qui te garde!
  '4':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: Non, il ne somnole pas, il ne dort pas,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: celui qui garde Israël.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: L'Eternel est celui qui te garde,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: l'Eternel est ton ombre protectrice, il se tient à ta droite.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: Pendant le jour le soleil ne te fera pas de mal,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ni la lune pendant la nuit.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: L'Eternel te gardera de tout mal,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: il gardera ta vie.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: L'Eternel gardera ton départ et ton arrivée
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dès maintenant et pour toujours.
