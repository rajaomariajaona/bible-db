document_id: PSA.121,152
type_code: fra
verses:
  '1':
  - type: heading
    content: Secours et protection de Dieu
  - type: text
    content: Chant des montées.
  - type: text
    content: 'Je lève mes yeux vers les montagnes:'
  - type: text
    content: d'où me viendra le secours?
  '2':
  - type: text
    content: Le secours me vient de l'Eternel,
  - type: text
    content: qui a fait le ciel et la terre.
  '3':
  - type: text
    content: Qu'il ne permette pas à ton pied de trébucher, qu'il ne somnole pas,
  - type: text
    content: celui qui te garde!
  '4':
  - type: text
    content: Non, il ne somnole pas, il ne dort pas,
  - type: text
    content: celui qui garde Israël.
  '5':
  - type: text
    content: L'Eternel est celui qui te garde,
  - type: text
    content: l'Eternel est ton ombre protectrice, il se tient à ta droite.
  '6':
  - type: text
    content: Pendant le jour le soleil ne te fera pas de mal,
  - type: text
    content: ni la lune pendant la nuit.
  '7':
  - type: text
    content: L'Eternel te gardera de tout mal,
  - type: text
    content: il gardera ta vie.
  '8':
  - type: text
    content: L'Eternel gardera ton départ et ton arrivée
  - type: text
    content: dès maintenant et pour toujours.
