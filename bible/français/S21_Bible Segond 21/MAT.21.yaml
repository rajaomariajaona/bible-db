document_id: MAT.21
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Entrée triomphale de Jésus à Jérusalem
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Lorsqu''ils approchèrent de Jérusalem et qu''ils furent arrivés à Bethphagé, vers le mont des Oliviers, Jésus envoya deux disciples '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'en leur disant: «Allez au village qui est devant vous; vous y trouverez tout de suite une ânesse attachée et un ânon avec elle; détachez-les et amenez-les-moi. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Si quelqu''un vous dit quelque chose, vous répondrez: ‘Le Seigneur en a besoin.’ Et à l''instant il les laissera aller.»'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Or [tout] ceci arriva afin que s''accomplisse ce que le prophète avait annoncé: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: usfm
    marker: qt
    children:
    - type: text
      text: 'Dites à la fille de Sion: ‘Voici ton roi qui vient à toi, plein de douceur et monté sur un âne, sur un ânon, le petit d''une ânesse.’'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '21.5 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Dites… ânesse: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'citation de '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Zacharie 9.9
      metadata:
        usfm: ZEC.9.9
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' introduite par '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Esaïe 62.11
      metadata:
        usfm: ISA.62.11
    - type: usfm
      marker: ft
      children:
      - type: text
        text: .
    marker-yv: yv-n
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Les disciples allèrent faire ce que Jésus leur avait ordonné. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Ils amenèrent l''ânesse et l''ânon, mirent leurs vêtements sur eux, et Jésus s''assit dessus. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Une grande foule de gens étendirent leurs vêtements sur le chemin; d''autres coupèrent des branches aux arbres et en jonchèrent la route. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Ceux qui précédaient et ceux qui suivaient Jésus criaient: «'
  - type: usfm
    marker: qt
    children:
    - type: text
      text: Hosanna
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '21.9 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Hosanna: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'transcription d''une expression signifiant sauve donc! et reprise du '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Psaume 118.25
      metadata:
        usfm: PSA.118.25
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ; c'était devenu une exclamation de joie ou un cri de bienvenue.
    marker-yv: yv-n
  - type: text
    text: ' au Fils de David'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '21.9 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Fils de David: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: titre du Messie.
    marker-yv: yv-n
  - type: text
    text: '! '
  - type: usfm
    marker: qt
    children:
    - type: text
      text: Béni soit celui qui vient au nom du Seigneur!
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '21.9 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Béni… Seigneur: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'citation du '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Psaume 118.26
      metadata:
        usfm: PSA.118.26
    - type: usfm
      marker: ft
      children:
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: ' Hosanna dans les lieux très hauts!»'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Lorsqu''il entra dans Jérusalem, toute la ville fut troublée. On disait: «Qui est cet homme?» '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'La foule répondait: «C''est Jésus, le prophète de Nazareth en Galilée.»'
- type: usfm
  marker: s1
  children:
  - type: text
    text: Jésus dans le temple
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Jésus entra dans le temple [de Dieu]. Il chassa tous ceux qui vendaient et qui achetaient dans le temple, et il renversa les tables des changeurs de monnaie et les sièges des vendeurs de pigeons. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Il leur dit: «Il est écrit: '
  - type: usfm
    marker: qt
    children:
    - type: text
      text: Mon temple sera appelé une maison de prière
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '21.13 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Mon temple… prière: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: citation d'
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Esaïe 56.7
      metadata:
        usfm: ISA.56.7
    - type: usfm
      marker: ft
      children:
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: ', mais vous, vous en avez fait '
  - type: usfm
    marker: qt
    children:
    - type: text
      text: une caverne de voleurs
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '21.13 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Une caverne de voleurs: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'repris de '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Jérémie 7.11
      metadata:
        usfm: JER.7.11
    - type: usfm
      marker: ft
      children:
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: .»
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Des aveugles et des boiteux s''approchèrent de lui dans le temple, et il les guérit. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Mais les chefs des prêtres et les spécialistes de la loi furent indignés à la vue des choses merveilleuses qu''il avait faites et des enfants qui criaient dans le temple: «Hosanna au Fils de David!» '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Ils lui dirent: «Entends-tu ce qu''ils disent?» «Oui, leur répondit Jésus. N''avez-vous jamais lu ces paroles: '
  - type: usfm
    marker: qt
    children:
    - type: text
      text: Tu as tiré des louanges de la bouche des enfants et des nourrissons
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '21.16 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Tu as tiré… nourrissons: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'citation du '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Psaume 8.3
      metadata:
        usfm: PSA.8.3
    - type: usfm
      marker: ft
      children:
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: '?» '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Puis il les laissa et sortit de la ville pour aller à Béthanie où il passa la nuit.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Le lendemain matin, en retournant à la ville, il eut faim. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Il vit un figuier sur le bord du chemin et s''en approcha, mais il n''y trouva que des feuilles. Il lui dit: «Que jamais plus tu ne portes de fruit!» Le figuier sécha immédiatement. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Voyant cela, les disciples furent étonnés et dirent: «Comment ce figuier a-t-il pu devenir immédiatement sec?» '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Jésus leur dit alors: «Je vous le dis en vérité, si vous avez de la foi et que vous ne doutez pas, non seulement vous ferez ce qui a été fait à ce figuier, mais même si vous dites à cette montagne: ‘Retire-toi de là et jette-toi dans la mer’, cela arrivera. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: Tout ce que vous demanderez avec foi par la prière, vous le recevrez.»
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Jésus se rendit dans le temple et, pendant qu''il enseignait, les chefs des prêtres et les anciens du peuple vinrent lui dire: «Par quelle autorité fais-tu ces choses, et qui t''a donné cette autorité?» '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Jésus leur répondit: «Je vous poserai moi aussi une question et, si vous m''y répondez, je vous dirai par quelle autorité je fais ces choses. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Le baptême de Jean, d''où venait-il? Du ciel ou des hommes?» Mais ils raisonnèrent ainsi entre eux: «Si nous répondons: ‘Du ciel’, il nous dira: ‘Pourquoi donc n''avez-vous pas cru en lui?’ '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Et si nous répondons: ‘Des hommes’, nous avons à redouter les réactions de la foule, car tous considèrent Jean comme un prophète.» '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'Alors ils répondirent à Jésus: «Nous ne savons pas.» Il leur dit à son tour: «Moi non plus, je ne vous dirai pas par quelle autorité je fais ces choses.'
- type: usfm
  marker: s1
  children:
  - type: text
    text: Parabole des deux fils
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: '»Qu''en pensez-vous? Un homme avait deux fils. Il s''adressa au premier et lui dit: ‘Mon enfant, va travailler aujourd''hui dans ma vigne.’ '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'Il répondit: ‘Je ne veux pas’ mais, plus tard, il montra du regret et y alla. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'Le père s''adressa à l''autre et lui dit la même chose. Ce fils répondit: ‘Je veux bien, seigneur’, mais il n''y alla pas. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'Lequel des deux a fait la volonté du père?» Ils répondirent: «Le premier.» Et Jésus leur dit: «Je vous le dis en vérité, les collecteurs d''impôts et les prostituées vous précéderont dans le royaume de Dieu, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: car Jean est venu à vous dans la voie de la justice et vous n'avez pas cru en lui. En revanche, les collecteurs d'impôts et les prostituées ont cru en lui et vous, qui avez vu cela, vous n'avez pas ensuite montré de regret pour croire en lui.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Parabole des vignerons
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: '»Ecoutez une autre parabole. Il y avait un propriétaire, qui planta une vigne. Il l''entoura d''une haie, y creusa un pressoir et construisit une tour; puis il la loua à des vignerons et partit en voyage. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: 'Lorsque le temps de la récolte fut arrivé, il envoya ses serviteurs vers les vignerons pour recevoir sa part de récolte. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: 'Mais les vignerons s''emparèrent de ses serviteurs; ils battirent l''un, tuèrent l''autre et lapidèrent le troisième. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: 'Il envoya encore d''autres serviteurs, en plus grand nombre que les premiers, et les vignerons les traitèrent de la même manière. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: 'Enfin, il envoya vers eux son fils en se disant: ‘Ils auront du respect pour mon fils.’ '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: text
    text: 'Mais, quand les vignerons virent le fils, ils se dirent entre eux: ‘Voilà l''héritier. Venez, tuons-le et emparons-nous de son héritage!’ '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '39'
  - type: text
    text: 'Et ils s''emparèrent de lui, le jetèrent hors de la vigne et le tuèrent. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '40'
  - type: text
    text: 'Maintenant, lorsque le maître de la vigne viendra, que fera-t-il à ces vignerons?» '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '41'
  - type: text
    text: 'Ils lui répondirent: «Il fera mourir misérablement ces misérables et il louera la vigne à d''autres vignerons qui lui donneront sa part de récolte au moment voulu.»'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '42'
  - type: text
    text: 'Jésus leur dit: «N''avez-vous jamais lu dans les Ecritures: '
  - type: usfm
    marker: qt
    children:
    - type: text
      text: La pierre qu'ont rejetée ceux qui construisaient est devenue la pierre angulaire; c'est l'œuvre du Seigneur, et c'est un prodige à nos yeux
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '21.42 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'La pierre… yeux: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'citation du '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Psaume 118.22-23
      metadata:
        usfm: PSA.118.22+PSA.118.23
    - type: usfm
      marker: ft
      children:
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: '? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '43'
  - type: text
    text: 'C''est pourquoi, je vous le dis, le royaume de Dieu vous sera enlevé et sera donné à un peuple qui en produira les fruits. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '44'
  - type: text
    text: Celui qui tombera sur cette pierre s'y brisera et celui sur qui elle tombera sera écrasé.»
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '45'
  - type: text
    text: 'Après avoir entendu ses paraboles, les chefs des prêtres et les pharisiens comprirent que c''était d''eux que Jésus parlait. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '46'
  - type: text
    text: Ils cherchaient à l'arrêter, mais ils redoutaient les réactions de la foule, parce qu'elle considérait Jésus comme un prophète.
