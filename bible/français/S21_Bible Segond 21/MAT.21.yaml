document_id: MAT.21,152
type_code: fra
verses:
  '1':
  - type: heading
    content: Entrée triomphale de Jésus à Jérusalem
  - type: text
    content: 'Lorsqu''ils approchèrent de Jérusalem et qu''ils furent arrivés à Bethphagé, vers le mont des Oliviers, Jésus envoya deux disciples '
  '10':
  - type: text
    content: 'Lorsqu''il entra dans Jérusalem, toute la ville fut troublée. On disait: «Qui est cet homme?» '
  '11':
  - type: text
    content: 'La foule répondait: «C''est Jésus, le prophète de Nazareth en Galilée.»'
  - type: heading
    content: Jésus dans le temple
  '12':
  - type: text
    content: 'Jésus entra dans le temple [de Dieu]. Il chassa tous ceux qui vendaient et qui achetaient dans le temple, et il renversa les tables des changeurs de monnaie et les sièges des vendeurs de pigeons. '
  '13':
  - type: text
    content: 'Il leur dit: «Il est écrit: '
  - type: text
    content: Mon temple sera appelé une maison de prière
  - type: note
    content: 'Mon temple… prière: citation d''Esaïe 56.7.'
  - type: text
    content: ', mais vous, vous en avez fait '
  - type: text
    content: une caverne de voleurs
  - type: note
    content: 'Une caverne de voleurs: repris de Jérémie 7.11.'
  - type: text
    content: .»
  '14':
  - type: text
    content: 'Des aveugles et des boiteux s''approchèrent de lui dans le temple, et il les guérit. '
  '15':
  - type: text
    content: 'Mais les chefs des prêtres et les spécialistes de la loi furent indignés à la vue des choses merveilleuses qu''il avait faites et des enfants qui criaient dans le temple: «Hosanna au Fils de David!» '
  '16':
  - type: text
    content: 'Ils lui dirent: «Entends-tu ce qu''ils disent?» «Oui, leur répondit Jésus. N''avez-vous jamais lu ces paroles: '
  - type: text
    content: Tu as tiré des louanges de la bouche des enfants et des nourrissons
  - type: note
    content: 'Tu as tiré… nourrissons: citation du Psaume 8.3.'
  - type: text
    content: '?» '
  '17':
  - type: text
    content: Puis il les laissa et sortit de la ville pour aller à Béthanie où il passa la nuit.
  '18':
  - type: text
    content: 'Le lendemain matin, en retournant à la ville, il eut faim. '
  '19':
  - type: text
    content: 'Il vit un figuier sur le bord du chemin et s''en approcha, mais il n''y trouva que des feuilles. Il lui dit: «Que jamais plus tu ne portes de fruit!» Le figuier sécha immédiatement. '
  '2':
  - type: text
    content: 'en leur disant: «Allez au village qui est devant vous; vous y trouverez tout de suite une ânesse attachée et un ânon avec elle; détachez-les et amenez-les-moi. '
  '20':
  - type: text
    content: 'Voyant cela, les disciples furent étonnés et dirent: «Comment ce figuier a-t-il pu devenir immédiatement sec?» '
  '21':
  - type: text
    content: 'Jésus leur dit alors: «Je vous le dis en vérité, si vous avez de la foi et que vous ne doutez pas, non seulement vous ferez ce qui a été fait à ce figuier, mais même si vous dites à cette montagne: ‘Retire-toi de là et jette-toi dans la mer’, cela arrivera. '
  '22':
  - type: text
    content: Tout ce que vous demanderez avec foi par la prière, vous le recevrez.»
  '23':
  - type: text
    content: 'Jésus se rendit dans le temple et, pendant qu''il enseignait, les chefs des prêtres et les anciens du peuple vinrent lui dire: «Par quelle autorité fais-tu ces choses, et qui t''a donné cette autorité?» '
  '24':
  - type: text
    content: 'Jésus leur répondit: «Je vous poserai moi aussi une question et, si vous m''y répondez, je vous dirai par quelle autorité je fais ces choses. '
  '25':
  - type: text
    content: 'Le baptême de Jean, d''où venait-il? Du ciel ou des hommes?» Mais ils raisonnèrent ainsi entre eux: «Si nous répondons: ‘Du ciel’, il nous dira: ‘Pourquoi donc n''avez-vous pas cru en lui?’ '
  '26':
  - type: text
    content: 'Et si nous répondons: ‘Des hommes’, nous avons à redouter les réactions de la foule, car tous considèrent Jean comme un prophète.» '
  '27':
  - type: text
    content: 'Alors ils répondirent à Jésus: «Nous ne savons pas.» Il leur dit à son tour: «Moi non plus, je ne vous dirai pas par quelle autorité je fais ces choses.'
  - type: heading
    content: Parabole des deux fils
  '28':
  - type: text
    content: '»Qu''en pensez-vous? Un homme avait deux fils. Il s''adressa au premier et lui dit: ‘Mon enfant, va travailler aujourd''hui dans ma vigne.’ '
  '29':
  - type: text
    content: 'Il répondit: ‘Je ne veux pas’ mais, plus tard, il montra du regret et y alla. '
  '3':
  - type: text
    content: 'Si quelqu''un vous dit quelque chose, vous répondrez: ‘Le Seigneur en a besoin.’ Et à l''instant il les laissera aller.»'
  '30':
  - type: text
    content: 'Le père s''adressa à l''autre et lui dit la même chose. Ce fils répondit: ‘Je veux bien, seigneur’, mais il n''y alla pas. '
  '31':
  - type: text
    content: 'Lequel des deux a fait la volonté du père?» Ils répondirent: «Le premier.» Et Jésus leur dit: «Je vous le dis en vérité, les collecteurs d''impôts et les prostituées vous précéderont dans le royaume de Dieu, '
  '32':
  - type: text
    content: car Jean est venu à vous dans la voie de la justice et vous n'avez pas cru en lui. En revanche, les collecteurs d'impôts et les prostituées ont cru en lui et vous, qui avez vu cela, vous n'avez pas ensuite montré de regret pour croire en lui.
  - type: heading
    content: Parabole des vignerons
  '33':
  - type: text
    content: '»Ecoutez une autre parabole. Il y avait un propriétaire, qui planta une vigne. Il l''entoura d''une haie, y creusa un pressoir et construisit une tour; puis il la loua à des vignerons et partit en voyage. '
  '34':
  - type: text
    content: 'Lorsque le temps de la récolte fut arrivé, il envoya ses serviteurs vers les vignerons pour recevoir sa part de récolte. '
  '35':
  - type: text
    content: 'Mais les vignerons s''emparèrent de ses serviteurs; ils battirent l''un, tuèrent l''autre et lapidèrent le troisième. '
  '36':
  - type: text
    content: 'Il envoya encore d''autres serviteurs, en plus grand nombre que les premiers, et les vignerons les traitèrent de la même manière. '
  '37':
  - type: text
    content: 'Enfin, il envoya vers eux son fils en se disant: ‘Ils auront du respect pour mon fils.’ '
  '38':
  - type: text
    content: 'Mais, quand les vignerons virent le fils, ils se dirent entre eux: ‘Voilà l''héritier. Venez, tuons-le et emparons-nous de son héritage!’ '
  '39':
  - type: text
    content: 'Et ils s''emparèrent de lui, le jetèrent hors de la vigne et le tuèrent. '
  '4':
  - type: text
    content: 'Or [tout] ceci arriva afin que s''accomplisse ce que le prophète avait annoncé: '
  '40':
  - type: text
    content: 'Maintenant, lorsque le maître de la vigne viendra, que fera-t-il à ces vignerons?» '
  '41':
  - type: text
    content: 'Ils lui répondirent: «Il fera mourir misérablement ces misérables et il louera la vigne à d''autres vignerons qui lui donneront sa part de récolte au moment voulu.»'
  '42':
  - type: text
    content: 'Jésus leur dit: «N''avez-vous jamais lu dans les Ecritures: '
  - type: text
    content: La pierre qu'ont rejetée ceux qui construisaient est devenue la pierre angulaire; c'est l'œuvre du Seigneur, et c'est un prodige à nos yeux
  - type: note
    content: 'La pierre… yeux: citation du Psaume 118.22-23.'
  - type: text
    content: '? '
  '43':
  - type: text
    content: 'C''est pourquoi, je vous le dis, le royaume de Dieu vous sera enlevé et sera donné à un peuple qui en produira les fruits. '
  '44':
  - type: text
    content: Celui qui tombera sur cette pierre s'y brisera et celui sur qui elle tombera sera écrasé.»
  '45':
  - type: text
    content: 'Après avoir entendu ses paraboles, les chefs des prêtres et les pharisiens comprirent que c''était d''eux que Jésus parlait. '
  '46':
  - type: text
    content: Ils cherchaient à l'arrêter, mais ils redoutaient les réactions de la foule, parce qu'elle considérait Jésus comme un prophète.
  '5':
  - type: text
    content: 'Dites à la fille de Sion: ‘Voici ton roi qui vient à toi, plein de douceur et monté sur un âne, sur un ânon, le petit d''une ânesse.’'
  - type: note
    content: 'Dites… ânesse: citation de Zacharie 9.9 introduite par Esaïe 62.11.'
  '6':
  - type: text
    content: 'Les disciples allèrent faire ce que Jésus leur avait ordonné. '
  '7':
  - type: text
    content: 'Ils amenèrent l''ânesse et l''ânon, mirent leurs vêtements sur eux, et Jésus s''assit dessus. '
  '8':
  - type: text
    content: 'Une grande foule de gens étendirent leurs vêtements sur le chemin; d''autres coupèrent des branches aux arbres et en jonchèrent la route. '
  '9':
  - type: text
    content: 'Ceux qui précédaient et ceux qui suivaient Jésus criaient: «'
  - type: text
    content: Hosanna
  - type: note
    content: 'Hosanna: transcription d''une expression signifiant sauve donc! et reprise du Psaume 118.25; c''était devenu une exclamation de joie ou un cri de bienvenue.'
  - type: text
    content: ' au Fils de David'
  - type: note
    content: 'Fils de David: titre du Messie.'
  - type: text
    content: '! '
  - type: text
    content: Béni soit celui qui vient au nom du Seigneur!
  - type: note
    content: 'Béni… Seigneur: citation du Psaume 118.26.'
  - type: text
    content: ' Hosanna dans les lieux très hauts!»'
