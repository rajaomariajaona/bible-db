document_id: JOL.4,152
type_code: fra
verses:
  '1':
  - type: heading
    content: Jugement des nations
  - type: text
    content: »En effet, durant ces jours-là, à ce moment-là,
  - type: text
    content: quand je ramènerai les déportés de Juda et de Jérusalem,
  '10':
  - type: text
    content: De vos socs de charrue forgez des épées,
  - type: text
    content: et de vos serpes des lances!
  - type: text
    content: 'Que le faible dise: ‘Je suis fort!’'
  '11':
  - type: text
    content: Dépêchez-vous de venir, vous, toutes les nations environnantes,
  - type: text
    content: et rassemblez-vous!»
  - type: text
    content: Là, Eternel, fais descendre tes guerriers!
  '12':
  - type: text
    content: «Que les nations se réveillent et montent
  - type: text
    content: vers la vallée de Josaphat,
  - type: text
    content: car c'est là que je siégerai pour juger toutes les nations environnantes.
  '13':
  - type: text
    content: Prenez la faucille,
  - type: text
    content: car la moisson est mûre!
  - type: text
    content: Venez les écraser,
  - type: text
    content: car le pressoir est plein,
  - type: text
    content: les cuves regorgent.
  - type: text
    content: Oui, leur méchanceté est grande.»
  '14':
  - type: text
    content: Ce sont des foules, des foules
  - type: text
    content: dans la vallée du jugement,
  - type: text
    content: car le jour de l'Eternel est proche
  - type: text
    content: dans la vallée du jugement.
  '15':
  - type: text
    content: Le soleil et la lune s'obscurcissent,
  - type: text
    content: et les étoiles perdent leur éclat.
  '16':
  - type: text
    content: '*De Sion l''Eternel rugit,'
  - type: text
    content: de Jérusalem il fait entendre sa voix.
  - type: note
    content: 'De Sion… voix: même texte en Amos 1.2.'
  - type: text
    content: Le ciel et la terre sont ébranlés,
  - type: text
    content: mais l'Eternel est un refuge pour son peuple,
  - type: text
    content: un abri pour les Israélites.
  '17':
  - type: text
    content: «Et vous saurez que je suis l'Eternel, votre Dieu,
  - type: text
    content: qui habite à Sion, ma sainte montagne.
  - type: text
    content: Jérusalem sera sainte,
  - type: text
    content: et les étrangers n'y passeront plus.
  '18':
  - type: text
    content: A ce moment-là, le vin nouveau ruissellera des montagnes,
  - type: text
    content: le lait coulera des collines
  - type: text
    content: et il y aura de l'eau dans tous les torrents de Juda.
  - type: text
    content: Une source sortira aussi de la maison de l'Eternel
  - type: text
    content: et arrosera la vallée de Sittim.
  '19':
  - type: text
    content: »L'Egypte sera dévastée, Edom deviendra un désert,
  - type: text
    content: à cause de leurs violences contre les Judéens
  - type: text
    content: dont ils ont versé le sang innocent dans leur pays.
  '2':
  - type: text
    content: je rassemblerai toutes les nations
  - type: text
    content: et je les ferai descendre dans la vallée de Josaphat
  - type: note
    content: 'Josaphat: littéralement l''Eternel juge.'
  - type: text
    content: .
  - type: text
    content: Là, j'entrerai en jugement avec elles
  - type: text
    content: au sujet de mon peuple, d'Israël, mon héritage
  - type: text
    content: qu'elles ont dispersé parmi les nations,
  - type: text
    content: et au sujet de mon pays qu'elles se sont partagé.
  '20':
  - type: text
    content: Mais Juda sera toujours habité,
  - type: text
    content: et Jérusalem le sera de génération en génération.
  '21':
  - type: text
    content: Je vengerai leur sang que je n'ai pas encore vengé,
  - type: text
    content: et l'Eternel habitera dans Sion.»
  '3':
  - type: text
    content: Ils ont tiré mon peuple au sort,
  - type: text
    content: ils ont donné le jeune garçon pour une prostituée,
  - type: text
    content: ils ont vendu la jeune fille pour du vin, et ils ont bu.
  '4':
  - type: text
    content: »Que me voulez-vous, Tyr et Sidon
  - type: note
    content: 'Tyr et Sidon: villes phéniciennes au nord d''Israël.'
  - type: text
    content: ','
  - type: text
    content: et vous tous, districts des Philistins?
  - type: text
    content: Voulez-vous vous venger de moi?
  - type: text
    content: Si vous voulez vous venger,
  - type: text
    content: je ferai bien vite retomber votre vengeance sur vos têtes.
  '5':
  - type: text
    content: Vous avez pris mon argent et mon or.
  - type: text
    content: Ce que j'avais de plus précieux et de plus beau,
  - type: text
    content: vous l'avez emporté dans vos temples.
  '6':
  - type: text
    content: Vous avez vendu les Judéens et les habitants de Jérusalem aux Grecs
  - type: text
    content: afin de les éloigner de leur territoire.
  '7':
  - type: text
    content: »Je les ferai revenir de l'endroit où vous les avez vendus
  - type: text
    content: et je ferai retomber votre vengeance sur vos têtes.
  '8':
  - type: text
    content: Je vendrai vos fils et vos filles aux Judéens,
  - type: text
    content: et ils les vendront aux Sabéens
  - type: note
    content: 'Sabéens: commerçants nomades de Séba ou Saba, au sud-ouest de l''Arabie.'
  - type: text
    content: ', nation lointaine.»'
  - type: text
    content: L'Eternel a parlé.
  '9':
  - type: text
    content: 'Proclamez ceci parmi les nations:'
  - type: text
    content: «Préparez la guerre,
  - type: text
    content: réveillez les guerriers!
  - type: text
    content: Qu'ils s'approchent, qu'ils montent,
  - type: text
    content: tous les hommes de guerre!
