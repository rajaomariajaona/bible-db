document_id: JOL.4
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Jugement des nations
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: »En effet, durant ces jours-là, à ce moment-là,
- type: usfm
  marker: q1
  children:
  - type: text
    text: quand je ramènerai les déportés de Juda et de Jérusalem,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: je rassemblerai toutes les nations
- type: usfm
  marker: q1
  children:
  - type: text
    text: et je les ferai descendre dans la vallée de Josaphat
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '4.2 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Josaphat: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: littéralement l'Eternel juge.
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: q1
  children:
  - type: text
    text: Là, j'entrerai en jugement avec elles
- type: usfm
  marker: q1
  children:
  - type: text
    text: au sujet de mon peuple, d'Israël, mon héritage
- type: usfm
  marker: q1
  children:
  - type: text
    text: qu'elles ont dispersé parmi les nations,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et au sujet de mon pays qu'elles se sont partagé.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Ils ont tiré mon peuple au sort,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ils ont donné le jeune garçon pour une prostituée,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ils ont vendu la jeune fille pour du vin, et ils ont bu.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: »Que me voulez-vous, Tyr et Sidon
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '4.4 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Tyr et Sidon: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: villes phéniciennes au nord d'Israël.
    marker-yv: yv-n
  - type: text
    text: ','
- type: usfm
  marker: q1
  children:
  - type: text
    text: et vous tous, districts des Philistins?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Voulez-vous vous venger de moi?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Si vous voulez vous venger,
- type: usfm
  marker: q1
  children:
  - type: text
    text: je ferai bien vite retomber votre vengeance sur vos têtes.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Vous avez pris mon argent et mon or.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ce que j'avais de plus précieux et de plus beau,
- type: usfm
  marker: q1
  children:
  - type: text
    text: vous l'avez emporté dans vos temples.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Vous avez vendu les Judéens et les habitants de Jérusalem aux Grecs
- type: usfm
  marker: q1
  children:
  - type: text
    text: afin de les éloigner de leur territoire.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: »Je les ferai revenir de l'endroit où vous les avez vendus
- type: usfm
  marker: q1
  children:
  - type: text
    text: et je ferai retomber votre vengeance sur vos têtes.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Je vendrai vos fils et vos filles aux Judéens,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et ils les vendront aux Sabéens
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '4.8 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Sabéens: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: commerçants nomades de Séba ou Saba, au sud-ouest de l'Arabie.
    marker-yv: yv-n
  - type: text
    text: ', nation lointaine.»'
- type: usfm
  marker: q1
  children:
  - type: text
    text: L'Eternel a parlé.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Proclamez ceci parmi les nations:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: «Préparez la guerre,
- type: usfm
  marker: q1
  children:
  - type: text
    text: réveillez les guerriers!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Qu'ils s'approchent, qu'ils montent,
- type: usfm
  marker: q1
  children:
  - type: text
    text: tous les hommes de guerre!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: De vos socs de charrue forgez des épées,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et de vos serpes des lances!
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Que le faible dise: ‘Je suis fort!’'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Dépêchez-vous de venir, vous, toutes les nations environnantes,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et rassemblez-vous!»
- type: usfm
  marker: q1
  children:
  - type: text
    text: Là, Eternel, fais descendre tes guerriers!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: «Que les nations se réveillent et montent
- type: usfm
  marker: q1
  children:
  - type: text
    text: vers la vallée de Josaphat,
- type: usfm
  marker: q1
  children:
  - type: text
    text: car c'est là que je siégerai pour juger toutes les nations environnantes.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Prenez la faucille,
- type: usfm
  marker: q1
  children:
  - type: text
    text: car la moisson est mûre!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Venez les écraser,
- type: usfm
  marker: q1
  children:
  - type: text
    text: car le pressoir est plein,
- type: usfm
  marker: q1
  children:
  - type: text
    text: les cuves regorgent.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Oui, leur méchanceté est grande.»
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Ce sont des foules, des foules
- type: usfm
  marker: q1
  children:
  - type: text
    text: dans la vallée du jugement,
- type: usfm
  marker: q1
  children:
  - type: text
    text: car le jour de l'Eternel est proche
- type: usfm
  marker: q1
  children:
  - type: text
    text: dans la vallée du jugement.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Le soleil et la lune s'obscurcissent,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et les étoiles perdent leur éclat.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: '*De Sion l''Eternel rugit,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: de Jérusalem il fait entendre sa voix.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '4.16 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'De Sion… voix: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'même texte en '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Amos 1.2
      metadata:
        usfm: AMO.1.2
    - type: usfm
      marker: ft
      children:
      - type: text
        text: .
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: text
    text: Le ciel et la terre sont ébranlés,
- type: usfm
  marker: q1
  children:
  - type: text
    text: mais l'Eternel est un refuge pour son peuple,
- type: usfm
  marker: q1
  children:
  - type: text
    text: un abri pour les Israélites.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: «Et vous saurez que je suis l'Eternel, votre Dieu,
- type: usfm
  marker: q1
  children:
  - type: text
    text: qui habite à Sion, ma sainte montagne.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Jérusalem sera sainte,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et les étrangers n'y passeront plus.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: A ce moment-là, le vin nouveau ruissellera des montagnes,
- type: usfm
  marker: q1
  children:
  - type: text
    text: le lait coulera des collines
- type: usfm
  marker: q1
  children:
  - type: text
    text: et il y aura de l'eau dans tous les torrents de Juda.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Une source sortira aussi de la maison de l'Eternel
- type: usfm
  marker: q1
  children:
  - type: text
    text: et arrosera la vallée de Sittim.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: »L'Egypte sera dévastée, Edom deviendra un désert,
- type: usfm
  marker: q1
  children:
  - type: text
    text: à cause de leurs violences contre les Judéens
- type: usfm
  marker: q1
  children:
  - type: text
    text: dont ils ont versé le sang innocent dans leur pays.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Mais Juda sera toujours habité,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et Jérusalem le sera de génération en génération.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Je vengerai leur sang que je n'ai pas encore vengé,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et l'Eternel habitera dans Sion.»
