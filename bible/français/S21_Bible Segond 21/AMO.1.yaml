document_id: AMO.1,152
type_code: fra
verses:
  '1':
  - type: heading
    content: Prophéties contre les nations
  - type: heading
    content: 1.1–2.16
  - type: heading
    content: Introduction
  - type: text
    content: Paroles d'Amos, l'un des bergers de Tekoa, visions qu'il a eues sur Israël durant les règnes d'Ozias sur Juda et de Jéroboam, fils de Joas, sur Israël, deux ans avant le tremblement de terre.
  '10':
  - type: text
    content: j'enverrai le feu dans les murs de Tyr,
  - type: text
    content: et il en dévorera les palais.
  - type: heading
    content: Sur Edom
  '11':
  - type: text
    content: 'Voici ce que dit l''Eternel:'
  - type: text
    content: A cause de trois crimes d'Edom,
  - type: text
    content: même de quatre, je ne reviens pas sur ma décision.
  - type: text
    content: Parce qu'il a poursuivi ses frères avec l'épée
  - type: text
    content: en étouffant sa compassion,
  - type: text
    content: parce que sa colère déchire toujours
  - type: text
    content: et qu'il garde éternellement sa fureur,
  '12':
  - type: text
    content: j'enverrai le feu dans Théman
  - type: text
    content: et il dévorera les palais de Botsra.
  - type: heading
    content: Sur Ammon
  '13':
  - type: text
    content: 'Voici ce que dit l''Eternel:'
  - type: text
    content: A cause de trois crimes des Ammonites,
  - type: text
    content: même de quatre, je ne reviens pas sur ma décision.
  - type: text
    content: Parce qu'ils ont fendu le ventre des femmes enceintes de Galaad
  - type: text
    content: afin d'agrandir leur territoire,
  '14':
  - type: text
    content: j'allumerai le feu dans les murs de Rabba,
  - type: text
    content: et il en dévorera les palais
  - type: text
    content: au milieu des cris de guerre le jour du combat,
  - type: text
    content: au milieu de l'ouragan le jour de la tempête.
  '15':
  - type: text
    content: Et leur roi partira en exil,
  - type: text
    content: lui et ses chefs avec lui, dit l'Eternel.
  '2':
  - type: text
    content: 'Il dit: «*De Sion l''Eternel rugit,'
  - type: text
    content: de Jérusalem il fait entendre sa voix.
  - type: note
    content: 'De Sion… voix: même texte en Joël 4.16.'
  - type: text
    content: Les pâturages des bergers sont dans le deuil,
  - type: text
    content: et le sommet du Carmel est desséché.»
  - type: heading
    content: Sur Damas
  '3':
  - type: text
    content: 'Voici ce que dit l''Eternel:'
  - type: text
    content: A cause de trois crimes de Damas,
  - type: text
    content: même de quatre, je ne reviens pas sur ma décision.
  - type: text
    content: Parce qu'ils ont écrasé Galaad sous des traîneaux de fer,
  '4':
  - type: text
    content: j'enverrai le feu dans la maison de Hazaël,
  - type: text
    content: et il dévorera les palais de Ben-Hadad.
  '5':
  - type: text
    content: Je briserai les verrous de Damas,
  - type: text
    content: j'exterminerai de Bikath-Aven les habitants
  - type: text
    content: et de Beth-Eden celui qui tient le sceptre,
  - type: text
    content: et le peuple de Syrie sera exilé à Kir, dit l'Eternel.
  - type: heading
    content: Sur Gaza
  '6':
  - type: text
    content: 'Voici ce que dit l''Eternel:'
  - type: text
    content: A cause de trois crimes de Gaza,
  - type: text
    content: même de quatre, je ne reviens pas sur ma décision.
  - type: text
    content: Parce qu'ils ont fait une foule de prisonniers pour les livrer à Edom,
  '7':
  - type: text
    content: j'enverrai le feu dans les murs de Gaza,
  - type: text
    content: et il en dévorera les palais.
  '8':
  - type: text
    content: J'exterminerai d'Asdod les habitants
  - type: text
    content: et d'Askalon celui qui tient le sceptre,
  - type: text
    content: je tournerai ma main contre Ekron,
  - type: text
    content: et le reste des Philistins disparaîtra, dit le Seigneur, l'Eternel.
  - type: heading
    content: Sur Tyr
  '9':
  - type: text
    content: 'Voici ce que dit l''Eternel:'
  - type: text
    content: A cause de trois crimes de Tyr,
  - type: text
    content: même de quatre, je ne reviens pas sur ma décision.
  - type: text
    content: Parce qu'ils ont livré à Edom une foule de prisonniers,
  - type: text
    content: sans se souvenir de l'alliance fraternelle,
