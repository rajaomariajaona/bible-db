document_id: AMO.1,152
type_code: fra
verses:
  '1':
  - type: usfm
    marker: ms1
    children:
    - type: text
      text: Prophéties contre les nations
    marker-yv: yv-h
  - type: usfm
    marker: mr
    children:
    - type: text
      text: 1.1–2.16
    marker-yv: yv-h
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Introduction
    marker-yv: yv-h
  - type: usfm
    marker: d
    children:
    - type: text
      text: Paroles d'Amos, l'un des bergers de Tekoa, visions qu'il a eues sur Israël durant les règnes d'Ozias sur Juda et de Jéroboam, fils de Joas, sur Israël, deux ans avant le tremblement de terre.
  '10':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: j'enverrai le feu dans les murs de Tyr,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et il en dévorera les palais.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Sur Edom
    marker-yv: yv-h
  '11':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Voici ce que dit l''Eternel:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: A cause de trois crimes d'Edom,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: même de quatre, je ne reviens pas sur ma décision.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Parce qu'il a poursuivi ses frères avec l'épée
  - type: usfm
    marker: q1
    children:
    - type: text
      text: en étouffant sa compassion,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: parce que sa colère déchire toujours
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et qu'il garde éternellement sa fureur,
  '12':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: j'enverrai le feu dans Théman
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et il dévorera les palais de Botsra.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Sur Ammon
    marker-yv: yv-h
  '13':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Voici ce que dit l''Eternel:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: A cause de trois crimes des Ammonites,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: même de quatre, je ne reviens pas sur ma décision.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Parce qu'ils ont fendu le ventre des femmes enceintes de Galaad
  - type: usfm
    marker: q1
    children:
    - type: text
      text: afin d'agrandir leur territoire,
  '14':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: j'allumerai le feu dans les murs de Rabba,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et il en dévorera les palais
  - type: usfm
    marker: q1
    children:
    - type: text
      text: au milieu des cris de guerre le jour du combat,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: au milieu de l'ouragan le jour de la tempête.
  '15':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et leur roi partira en exil,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: lui et ses chefs avec lui, dit l'Eternel.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Il dit: «*De Sion l''Eternel rugit,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: de Jérusalem il fait entendre sa voix.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1.2 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'De Sion… voix: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'même texte en '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Joël 4.16
      - type: usfm
        marker: ft
        children:
        - type: text
          text: .
      marker-yv: yv-n
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Les pâturages des bergers sont dans le deuil,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et le sommet du Carmel est desséché.»
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Sur Damas
    marker-yv: yv-h
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Voici ce que dit l''Eternel:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: A cause de trois crimes de Damas,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: même de quatre, je ne reviens pas sur ma décision.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Parce qu'ils ont écrasé Galaad sous des traîneaux de fer,
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: j'enverrai le feu dans la maison de Hazaël,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et il dévorera les palais de Ben-Hadad.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Je briserai les verrous de Damas,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: j'exterminerai de Bikath-Aven les habitants
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et de Beth-Eden celui qui tient le sceptre,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et le peuple de Syrie sera exilé à Kir, dit l'Eternel.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Sur Gaza
    marker-yv: yv-h
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Voici ce que dit l''Eternel:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: A cause de trois crimes de Gaza,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: même de quatre, je ne reviens pas sur ma décision.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Parce qu'ils ont fait une foule de prisonniers pour les livrer à Edom,
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: j'enverrai le feu dans les murs de Gaza,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et il en dévorera les palais.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: J'exterminerai d'Asdod les habitants
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et d'Askalon celui qui tient le sceptre,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: je tournerai ma main contre Ekron,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et le reste des Philistins disparaîtra, dit le Seigneur, l'Eternel.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Sur Tyr
    marker-yv: yv-h
  '9':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Voici ce que dit l''Eternel:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: A cause de trois crimes de Tyr,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: même de quatre, je ne reviens pas sur ma décision.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Parce qu'ils ont livré à Edom une foule de prisonniers,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sans se souvenir de l'alliance fraternelle,
