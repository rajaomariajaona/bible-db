document_id: 1SA.17,152
type_code: fra
verses:
  '1':
  - type: heading
    content: Victoire de David contre Goliath
  - type: text
    content: 'Les Philistins réunirent leurs troupes pour faire la guerre et ils se rassemblèrent à Soco, ville qui appartient à Juda. Ils installèrent leur camp entre Soco et Azéka, à Ephès-Dammim. '
  '10':
  - type: text
    content: 'Le Philistin dit encore: «Je jette aujourd''hui un défi à l''armée d''Israël: donnez-moi un homme, pour que nous nous battions ensemble!» '
  '11':
  - type: text
    content: En entendant ces paroles du Philistin, Saül et tout Israël furent effrayés et remplis de peur.
  '12':
  - type: text
    content: 'Or David était le fils de l''Ephratien de Bethléhem en Juda nommé Isaï qui avait huit fils. A l''époque de Saül, cet homme était vieux, d''un âge avancé. '
  '13':
  - type: text
    content: 'Les trois fils aînés d''Isaï avaient suivi Saül à la guerre. Voici le nom de ses trois fils partis pour la guerre: Eliab, l''aîné, Abinadab le deuxième et Shamma, le troisième. '
  '14':
  - type: text
    content: 'David était le plus jeune, et les trois aînés avaient suivi Saül. '
  '15':
  - type: text
    content: Quant à David, il faisait le va-et-vient, quittant Saül pour garder les brebis de son père à Bethléhem.
  '16':
  - type: text
    content: 'Le Philistin s''avançait matin et soir, et il se présenta ainsi pendant 40 jours. '
  '17':
  - type: text
    content: 'Isaï dit à son fils David: «Prends pour tes frères cette mesure de grain rôti et ces 10 pains, et cours au camp vers tes frères. '
  '18':
  - type: text
    content: 'Porte aussi ces 10 fromages au chef de leur millier. Tu verras si tes frères se portent bien et tu m''en apporteras une preuve de leur part. '
  '19':
  - type: text
    content: 'Ils sont avec Saül et tous les hommes d''Israël dans la vallée d''Ela, et ils font la guerre aux Philistins.» '
  '2':
  - type: text
    content: Saül et les hommes d'Israël se rassemblèrent aussi. Ils installèrent leur camp dans la vallée d'Ela et ils se rangèrent en ordre de bataille contre les Philistins.
  '20':
  - type: text
    content: 'David se leva de bon matin. Il laissa les brebis à un gardien, prit ses affaires et partit, comme Isaï le lui avait ordonné. Lorsqu''il arriva au camp, l''armée était en marche pour se ranger en ordre de bataille et poussait des cris de guerre. '
  '21':
  - type: text
    content: 'Les Israélites et les Philistins se mirent en ordre de bataille, armée contre armée. '
  '22':
  - type: text
    content: 'David confia les affaires qu''il transportait au gardien du matériel et courut vers les rangs de l''armée. Aussitôt arrivé, il demanda à ses frères comment ils allaient. '
  '23':
  - type: text
    content: 'Il était en train de parler avec eux lorsque le Philistin de Gath appelé Goliath s''avança entre les deux armées, hors des rangs des Philistins. Il tint les mêmes discours que les autres fois et David les entendit. '
  '24':
  - type: text
    content: 'A la vue de cet homme, tous les Israélites prirent la fuite et furent remplis de peur. '
  '25':
  - type: text
    content: 'Chacun disait: «Avez-vous vu s''avancer cet homme? C''est pour jeter un défi à Israël qu''il s''est avancé! Si quelqu''un le tue, le roi le comblera de richesses, il lui donnera sa fille et libérera sa famille de tout impôt en Israël.»'
  '26':
  - type: text
    content: 'David demanda aux hommes qui se trouvaient près de lui: «Que fera-t-on pour celui qui tuera ce Philistin et qui écartera la honte d''Israël? Qui est donc ce Philistin, cet incirconcis, pour insulter l''armée du Dieu vivant?» '
  '27':
  - type: text
    content: 'Le peuple répéta les mêmes choses en précisant: «Voilà comment l''on agira pour celui qui le tuera.» '
  '28':
  - type: text
    content: 'Eliab, le frère aîné de David, l''avait entendu parler à ces hommes, et il fut enflammé de colère contre lui. Il dit: «Pourquoi es-tu descendu ici et à qui as-tu laissé ton petit troupeau dans le désert? Je connais ton orgueil et la méchanceté de ton cœur. C''est pour voir la bataille que tu es descendu.» '
  '29':
  - type: text
    content: 'David répondit: «Qu''ai-je donc fait? N''ai-je pas le droit de m''exprimer?» '
  '3':
  - type: text
    content: 'Les Philistins se tenaient sur une montagne, et Israël sur celle d''en face: la vallée les séparait. '
  '30':
  - type: text
    content: Il se détourna de lui pour s'adresser à un autre et posa les mêmes questions. Le peuple lui répondit comme la première fois.
  '31':
  - type: text
    content: 'Après avoir entendu les paroles prononcées par David, on les répéta à Saül, qui le fit venir. '
  '32':
  - type: text
    content: 'David dit à Saül: «Que personne ne se décourage à cause de ce Philistin! Moi, ton serviteur, j''irai me battre contre lui.» '
  '33':
  - type: text
    content: 'Saül dit à David: «Tu ne peux pas aller te battre contre ce Philistin. Tu n''es qu''un enfant, alors que lui, il est un homme de guerre depuis sa jeunesse.» '
  '34':
  - type: text
    content: 'David dit à Saül: «Ton serviteur gardait les brebis de son père. Quand un lion ou un ours venait pour en enlever une du troupeau, '
  '35':
  - type: text
    content: 'je courais après lui, je le frappais et j''arrachais la brebis de sa gueule. S''il m''attaquait, je l''attrapais par la gorge, je le frappais et je le tuais. '
  '36':
  - type: text
    content: 'C''est ainsi que ton serviteur a frappé le lion et l''ours, et ce sera aussi le sort du Philistin, de cet incirconcis, car il a insulté l''armée du Dieu vivant.» '
  '37':
  - type: text
    content: 'David ajouta: «L''Eternel m''a délivré de la griffe du lion et de la patte de l''ours, et il me délivrera aussi de ce Philistin.» Saül dit à David: «Vas-y donc et que l''Eternel soit avec toi!»'
  '38':
  - type: text
    content: 'Saül fit enfiler sa tenue à David. Il plaça sur sa tête un casque en bronze et le revêtit d''une cuirasse. '
  '39':
  - type: text
    content: 'David mit l''épée de Saül par-dessus ses habits et voulut marcher, car il n''avait encore jamais essayé, mais il dit à Saül: «Je ne peux pas marcher avec cette armure, je n''y suis pas habitué.» Et il s''en débarrassa. '
  '4':
  - type: text
    content: 'Un homme sortit alors du camp des Philistins et s''avança entre les deux armées. Il s''appelait Goliath, venait de Gath et mesurait environ 3 mètres. '
  '40':
  - type: text
    content: Il prit en main son bâton, puis il choisit dans le torrent cinq pierres lisses et les mit dans sa gibecière de berger et dans sa poche. Enfin, sa fronde à la main, il s'avança contre le Philistin.
  '41':
  - type: text
    content: 'Le Philistin s''approcha peu à peu de David, et l''homme qui portait son bouclier marchait devant lui. '
  '42':
  - type: text
    content: 'Le Philistin regarda David et, lorsqu''il l''aperçut, il le méprisa, car il ne vit en lui qu''un enfant roux à la belle apparence. '
  '43':
  - type: text
    content: 'Le Philistin dit à David: «Suis-je un chien, pour que tu viennes à moi avec des bâtons?» Après l''avoir maudit par ses dieux, '
  '44':
  - type: text
    content: 'il ajouta: «Viens vers moi, que je donne ta chair à manger aux oiseaux du ciel et aux bêtes des champs!» '
  '45':
  - type: text
    content: 'David dit au Philistin: «Tu marches contre moi avec l''épée, la lance et le javelot; moi, je marche contre toi au nom de l''Eternel, le maître de l''univers, au nom du Dieu de l''armée d''Israël que tu as insultée. '
  '46':
  - type: text
    content: 'Aujourd''hui l''Eternel va te livrer entre mes mains. Je t''abattrai et je te couperai la tête. Aujourd''hui je vais donner les cadavres du camp des Philistins aux oiseaux du ciel et aux bêtes sauvages. Toute la terre saura alors qu''Israël a un Dieu, '
  '47':
  - type: text
    content: et toute cette assemblée saura que ce n'est ni par l'épée ni par la lance que l'Eternel sauve. En effet, la victoire appartient à l'Eternel et il vous livre entre nos mains.»
  '48':
  - type: text
    content: 'Dès que le Philistin se mit à marcher vers lui, David courut sur le champ de bataille à sa rencontre. '
  '49':
  - type: text
    content: 'Il porta la main à sa gibecière, y prit une pierre et la lança avec sa fronde. Il frappa le Philistin au front et la pierre s''y enfonça. Le Philistin tomba le visage contre terre. '
  '5':
  - type: text
    content: 'Il avait sur la tête un casque en bronze et il portait une cuirasse à écailles en bronze qui pesait près de 60 kilos. '
  '50':
  - type: text
    content: 'Ainsi, avec une fronde et une pierre, David fut plus fort que le Philistin; il le frappa et le mit à mort sans avoir d''épée à la main. '
  '51':
  - type: text
    content: 'Il courut, s''arrêta près du Philistin et prit son épée en la tirant du fourreau. Il l''acheva et lui coupa la tête. Voyant que leur héros était mort, les Philistins prirent la fuite. '
  '52':
  - type: text
    content: 'Les hommes d''Israël et de Juda se levèrent, poussèrent des cris et les poursuivirent jusque dans la vallée et jusqu''aux portes d''Ekron. Les Philistins blessés à mort tombèrent sur le chemin de Shaaraïm jusqu''à Gath et Ekron. '
  '53':
  - type: text
    content: 'Les Israélites mirent fin à leur poursuite et revinrent piller le camp. '
  '54':
  - type: text
    content: David prit la tête du Philistin et l'amena à Jérusalem, et il déposa dans sa tente les armes du Philistin.
  '55':
  - type: text
    content: 'Lorsque Saül avait vu David marcher à la rencontre du Philistin, il avait dit à Abner, le chef de l''armée: «De qui ce jeune homme est-il le fils, Abner?» Abner avait répondu: «Aussi vrai que ton âme est vivante, roi, je l''ignore.» '
  '56':
  - type: text
    content: '«Informe-toi donc pour savoir de qui ce jeune homme est le fils», avait dit le roi. '
  '57':
  - type: text
    content: 'Quand David fut de retour après avoir tué le Philistin, Abner le prit et le conduisit devant Saül. David tenait à la main la tête du Philistin. '
  '58':
  - type: text
    content: 'Saül lui dit: «De qui es-tu le fils, jeune homme?» Et David répondit: «Je suis le fils de ton serviteur Isaï, le Bethléhémite.»'
  '6':
  - type: text
    content: 'Il avait des jambières en bronze et tenait un javelot en bronze en bandoulière. '
  '7':
  - type: text
    content: 'Le bois de sa lance avait la grosseur d''un cylindre de métier à tisser, et la lance, en fer, pesait 7 kilos. Celui qui portait son bouclier marchait devant lui. '
  '8':
  - type: text
    content: 'Le Philistin s''arrêta et s''adressa aux troupes d''Israël rangées en ordre de bataille. Il leur cria: «Pourquoi sortez-vous pour vous ranger en ordre de bataille? Ne suis-je pas le Philistin et n''êtes-vous pas des esclaves de Saül? Choisissez un homme qui descende contre moi! '
  '9':
  - type: text
    content: 'S''il peut me battre et qu''il me tue, nous serons vos esclaves. Mais si je l''emporte sur lui et que je le tue, vous serez nos esclaves et vous nous servirez.» '
