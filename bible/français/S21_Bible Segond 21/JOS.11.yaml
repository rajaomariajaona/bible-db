document_id: JOS.11
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Conquêtes dans le nord
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'A la nouvelle de ces événements, Jabin, le roi de Hatsor, envoya des messagers à Jobab, le roi de Madon, au roi de Shimron, au roi d''Acshaph, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'aux rois qui se trouvaient au nord dans la montagne, dans la plaine au sud de Génésareth, dans la vallée et sur les hauteurs de Dor à l''ouest. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Il en envoya aussi aux Cananéens de l''est et de l''ouest, aux Amoréens, aux Hittites, aux Phéréziens, aux Jébusiens dans la montagne et aux Héviens au pied de l''Hermon dans le pays de Mitspa. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Ils sortirent avec toutes leurs troupes. Ils formaient un peuple innombrable, comme le sable qui est au bord de la mer, et avaient des chevaux et des chars en très grande quantité. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Tous ces rois fixèrent un rendez-vous et vinrent ensemble installer leur camp près des eaux de Mérom, pour combattre contre Israël.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'L''Eternel dit à Josué: «N''aie pas peur d''eux, car demain, à ce moment-ci, je les livrerai tous, blessés à mort, à Israël. Tu mutileras les jarrets de leurs chevaux et tu brûleras leurs chars.» '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Josué arriva par surprise sur eux avec tous ses hommes de guerre près des eaux de Mérom, et ils se précipitèrent au milieu d''eux. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'L''Eternel les livra entre les mains d''Israël. Ils les battirent et les poursuivirent jusqu''à Sidon la grande, jusqu''à Misrephoth-Maïm et jusqu''à la vallée de Mitspa vers l''est. Ils les battirent sans laisser un seul survivant. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Josué les traita comme l''Eternel le lui avait dit: il mutila les jarrets de leurs chevaux et brûla leurs chars.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'A la même époque, sur le chemin du retour, Josué s''empara de Hatsor et frappa son roi avec l''épée. Hatsor était autrefois la principale ville de tous ces royaumes. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: On frappa du tranchant de l'épée et l'on extermina tous ceux qui s'y trouvaient. Il ne resta rien de ce qui respirait et l'on mit le feu à Hatsor.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Josué s''empara aussi de toutes les villes de ces rois et de tous leurs rois. Il les frappa du tranchant de l''épée et les voua à la destruction, comme l''avait ordonné Moïse, le serviteur de l''Eternel. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Toutefois, Israël ne brûla aucune des villes situées sur des collines, à l''exception seulement de Hatsor, qui fut brûlée par Josué. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Les Israélites gardèrent pour eux tout le butin de ces villes et le bétail, mais ils frappèrent du tranchant de l''épée tous les hommes jusqu''à leur complète extermination, sans rien laisser de ce qui respirait. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Josué se conforma aux ordres donnés par l'Eternel à son serviteur Moïse et par ce dernier à lui-même. Il ne négligea rien de tout ce que l'Eternel avait ordonné à Moïse.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'C''est ainsi que Josué s''empara de tout ce pays, de la montagne, de tout le Néguev, de toute la région de Gosen, de la vallée, de la plaine, de la montagne d''Israël et de ses vallées, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'depuis la montagne pelée qui s''élève vers Séir jusqu''à Baal-Gad, dans la vallée du Liban, au pied du mont Hermon. Il s''empara de tous leurs rois, les frappa et les fit mourir. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'La guerre que Josué mena contre tous ces rois fut de longue durée. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Aucune ville ne fit la paix avec les Israélites, à l''exception de Gabaon, qui était habitée par les Héviens. Ils les prirent toutes en combattant. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: En effet, l'Eternel permit que ces peuples s'obstinent à faire la guerre contre Israël afin qu'Israël les extermine sans leur faire grâce et qu'il les détruise comme il l'avait lui-même ordonné à Moïse.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'A la même époque, Josué alla exterminer les Anakim des montagnes d''Hébron, de Debir, d''Anab, de toutes les régions montagneuses de Juda et d''Israël. Josué les voua à la destruction, avec leurs villes. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: Il ne resta pas d'Anakim dans le pays des Israélites. Il n'en resta qu'à Gaza, à Gath et à Asdod.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: Josué s'empara donc de tout le pays, conformément à tout ce que l'Eternel avait dit à Moïse, et le donna en héritage à Israël, à chacun sa portion, d'après leurs tribus. Puis le pays fut en paix, sans guerre.
