document_id: EXO.21,152
type_code: fra
verses:
  '1':
  - type: heading
    content: Relations entre maîtres et esclaves
  - type: text
    content: '»Voici les règles que tu leur présenteras. '
  '10':
  - type: text
    content: 'S''il prend une autre femme, il ne supprimera rien à la nourriture, aux vêtements et au droit conjugal de la première. '
  '11':
  - type: text
    content: Et s'il ne fait pas pour elle ces trois choses, elle pourra sortir sans rien payer, sans donner d'argent.
  - type: heading
    content: Dommages corporels et sanctions
  '12':
  - type: text
    content: '»Celui qui frappera un homme mortellement sera puni de mort. '
  '13':
  - type: text
    content: 'S''il ne lui a pas tendu de piège et que Dieu l''ait fait tomber entre ses mains, je te désignerai un endroit où il pourra se réfugier. '
  '14':
  - type: text
    content: Mais si quelqu'un agit méchamment contre son prochain en employant la ruse pour le tuer, tu iras jusqu'à l'arracher de mon autel pour le faire mourir.
  '15':
  - type: text
    content: »Celui qui frappera son père ou sa mère sera puni de mort.
  '16':
  - type: text
    content: »Celui qui enlèvera un homme, qu'il l'ait vendu ou qu'on l'ait trouvé entre ses mains, sera puni de mort.
  '17':
  - type: text
    content: '*»Celui qui maudira son père ou sa mère sera puni de mort.'
  - type: note
    content: 'Celui qui… mort: repris en Lévitique 20.9 et cité en Matthieu 15.4; Marc 7.10.'
  '18':
  - type: text
    content: '»Si des hommes se battent et que l''un d''eux frappe l''autre avec une pierre ou avec le poing, sans causer sa mort mais en l''obligeant à garder le lit, '
  '19':
  - type: text
    content: celui qui a frappé ne sera pas puni dans le cas où l'autre viendrait à se lever et à se promener dehors avec son bâton. Seulement, il le dédommagera de son interruption de travail et le fera soigner jusqu'à sa guérison.
  '2':
  - type: text
    content: 'Si tu achètes un esclave hébreu, il servira six années, mais la septième il sortira libre, sans rien payer. '
  '20':
  - type: text
    content: '»Si un maître frappe son esclave, homme ou femme, avec un bâton et que l''esclave meure sous ses coups, il sera puni. '
  '21':
  - type: text
    content: Mais si l'esclave survit un jour ou deux, le maître ne sera pas puni, car c'est son argent.
  '22':
  - type: text
    content: '»Si des hommes se battent, heurtent une femme enceinte et la font accoucher sans qu''il n''y ait de conséquence malheureuse, ils seront punis d''une amende imposée par le mari de la femme, qu''ils paieront devant les juges. '
  '23':
  - type: text
    content: 'Mais s''il y a une conséquence malheureuse, tu donneras vie pour vie, '
  '24':
  - type: text
    content: '*œil pour œil, dent pour dent'
  - type: note
    content: 'Œil pour œil, dent pour dent: principe appelé «loi du talion», repris en Lévitique 24.20; Deutéronome 19.21 et commenté par Jésus en Matthieu 5.38.'
  - type: text
    content: ', main pour main, pied pour pied, '
  '25':
  - type: text
    content: brûlure pour brûlure, blessure pour blessure, plaie pour plaie.
  '26':
  - type: text
    content: '»Si un homme frappe l''œil de son esclave, homme ou femme, et qu''il lui fasse perdre l''œil, il le laissera partir libre pour prix de son œil. '
  '27':
  - type: text
    content: Et s'il fait tomber une dent à son esclave, homme ou femme, il le laissera partir libre pour prix de sa dent.
  '28':
  - type: text
    content: '»Si un bœuf frappe de ses cornes un homme ou une femme et que la mort en résulte, le bœuf sera lapidé. On ne mangera pas sa viande et le maître du bœuf ne sera pas puni. '
  '29':
  - type: text
    content: 'Mais si le bœuf avait déjà tendance à frapper et si on en avait averti son maître, qui ne l''a pas surveillé, dans le cas où il tuerait un homme ou une femme, le bœuf sera lapidé et son maître sera puni de mort. '
  '3':
  - type: text
    content: 'S''il est entré seul, il sortira seul; s''il avait une femme, sa femme sortira avec lui. '
  '30':
  - type: text
    content: 'Si on impose au maître un prix pour le rachat de sa vie, il paiera tout ce qui lui sera imposé. '
  '31':
  - type: text
    content: 'Si c''est un fils ou une fille que le bœuf frappe, on lui appliquera cette règle; '
  '32':
  - type: text
    content: mais si c'est un esclave, homme ou femme, on donnera 30 pièces d'argent au maître de l'esclave et le bœuf sera lapidé.
  '33':
  - type: text
    content: '»Si un homme retire le couvercle d''une citerne, ou bien si un homme en creuse une sans la couvrir, et qu''il y tombe un bœuf ou un âne, '
  '34':
  - type: text
    content: le possesseur de la citerne paiera au maître la valeur de l'animal en argent et gardera l'animal mort.
  '35':
  - type: text
    content: '»Si le bœuf d''un homme frappe de ses cornes le bœuf d''un autre homme et que la mort en résulte, ils vendront le bœuf vivant et en partageront le prix; ils partageront aussi le bœuf mort. '
  '36':
  - type: text
    content: Mais s'il est connu que le bœuf avait déjà tendance à frapper et si son maître ne l'a pas surveillé, ce maître rendra bœuf pour bœuf et gardera le bœuf mort.
  - type: heading
    content: Préjudices et réparations
  '37':
  - type: text
    content: »Si un homme vole un bœuf ou un agneau et qu'il l'égorge ou le vende, il restituera 5 bœufs pour le bœuf et 4 agneaux pour l'agneau.
  '4':
  - type: text
    content: 'Si c''est son maître qui lui a donné une femme et qu''il en ait eu des fils ou des filles, la femme et ses enfants appartiendront à son maître et il sortira seul. '
  '5':
  - type: text
    content: 'Supposons que l''esclave dise: ‘J''aime mon maître, ma femme et mes enfants, je ne veux pas sortir libre.’ '
  '6':
  - type: text
    content: Alors son maître le conduira devant Dieu, le fera approcher de la porte ou de son montant et lui percera l'oreille avec un poinçon. Ainsi l'esclave sera pour toujours à son service.
  '7':
  - type: text
    content: '»Si un homme vend sa fille comme esclave, elle ne sortira pas libre comme le font les esclaves de sexe masculin. '
  '8':
  - type: text
    content: 'Si elle déplaît à son maître alors qu''il avait pensé la prendre pour femme, celui-ci facilitera son rachat; mais il n''aura pas le droit de la vendre à des étrangers, ce serait la trahir. '
  '9':
  - type: text
    content: 'S''il la destine à son fils, il agira envers elle conformément au droit en vigueur pour les filles. '
