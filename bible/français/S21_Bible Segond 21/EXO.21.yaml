document_id: EXO.21,152
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Relations entre maîtres et esclaves
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: '»Voici les règles que tu leur présenteras. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'S''il prend une autre femme, il ne supprimera rien à la nourriture, aux vêtements et au droit conjugal de la première. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Et s'il ne fait pas pour elle ces trois choses, elle pourra sortir sans rien payer, sans donner d'argent.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Dommages corporels et sanctions
    marker-yv: yv-h
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '»Celui qui frappera un homme mortellement sera puni de mort. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'S''il ne lui a pas tendu de piège et que Dieu l''ait fait tomber entre ses mains, je te désignerai un endroit où il pourra se réfugier. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Mais si quelqu'un agit méchamment contre son prochain en employant la ruse pour le tuer, tu iras jusqu'à l'arracher de mon autel pour le faire mourir.
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: »Celui qui frappera son père ou sa mère sera puni de mort.
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: »Celui qui enlèvera un homme, qu'il l'ait vendu ou qu'on l'ait trouvé entre ses mains, sera puni de mort.
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '*»Celui qui maudira son père ou sa mère sera puni de mort.'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '21.17 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Celui qui… mort: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'repris en '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Lévitique 20.9
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' et cité en '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Matthieu 15.4
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Marc 7.10
      - type: usfm
        marker: ft
        children:
        - type: text
          text: .
      marker-yv: yv-n
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '»Si des hommes se battent et que l''un d''eux frappe l''autre avec une pierre ou avec le poing, sans causer sa mort mais en l''obligeant à garder le lit, '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: celui qui a frappé ne sera pas puni dans le cas où l'autre viendrait à se lever et à se promener dehors avec son bâton. Seulement, il le dédommagera de son interruption de travail et le fera soigner jusqu'à sa guérison.
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Si tu achètes un esclave hébreu, il servira six années, mais la septième il sortira libre, sans rien payer. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '»Si un maître frappe son esclave, homme ou femme, avec un bâton et que l''esclave meure sous ses coups, il sera puni. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Mais si l'esclave survit un jour ou deux, le maître ne sera pas puni, car c'est son argent.
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '»Si des hommes se battent, heurtent une femme enceinte et la font accoucher sans qu''il n''y ait de conséquence malheureuse, ils seront punis d''une amende imposée par le mari de la femme, qu''ils paieront devant les juges. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Mais s''il y a une conséquence malheureuse, tu donneras vie pour vie, '
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '*œil pour œil, dent pour dent'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '21.24 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Œil pour œil, dent pour dent: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'principe appelé «loi du talion», repris en '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Lévitique 24.20
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ; Deutéronome 19.21 et commenté par Jésus en Matthieu 5.38.
      marker-yv: yv-n
    - type: text
      text: ', main pour main, pied pour pied, '
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: brûlure pour brûlure, blessure pour blessure, plaie pour plaie.
  '26':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '»Si un homme frappe l''œil de son esclave, homme ou femme, et qu''il lui fasse perdre l''œil, il le laissera partir libre pour prix de son œil. '
  '27':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Et s'il fait tomber une dent à son esclave, homme ou femme, il le laissera partir libre pour prix de sa dent.
  '28':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '»Si un bœuf frappe de ses cornes un homme ou une femme et que la mort en résulte, le bœuf sera lapidé. On ne mangera pas sa viande et le maître du bœuf ne sera pas puni. '
  '29':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Mais si le bœuf avait déjà tendance à frapper et si on en avait averti son maître, qui ne l''a pas surveillé, dans le cas où il tuerait un homme ou une femme, le bœuf sera lapidé et son maître sera puni de mort. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'S''il est entré seul, il sortira seul; s''il avait une femme, sa femme sortira avec lui. '
  '30':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Si on impose au maître un prix pour le rachat de sa vie, il paiera tout ce qui lui sera imposé. '
  '31':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Si c''est un fils ou une fille que le bœuf frappe, on lui appliquera cette règle; '
  '32':
  - type: usfm
    marker: p
    children:
    - type: text
      text: mais si c'est un esclave, homme ou femme, on donnera 30 pièces d'argent au maître de l'esclave et le bœuf sera lapidé.
  '33':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '»Si un homme retire le couvercle d''une citerne, ou bien si un homme en creuse une sans la couvrir, et qu''il y tombe un bœuf ou un âne, '
  '34':
  - type: usfm
    marker: p
    children:
    - type: text
      text: le possesseur de la citerne paiera au maître la valeur de l'animal en argent et gardera l'animal mort.
  '35':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '»Si le bœuf d''un homme frappe de ses cornes le bœuf d''un autre homme et que la mort en résulte, ils vendront le bœuf vivant et en partageront le prix; ils partageront aussi le bœuf mort. '
  '36':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Mais s'il est connu que le bœuf avait déjà tendance à frapper et si son maître ne l'a pas surveillé, ce maître rendra bœuf pour bœuf et gardera le bœuf mort.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Préjudices et réparations
    marker-yv: yv-h
  '37':
  - type: usfm
    marker: p
    children:
    - type: text
      text: »Si un homme vole un bœuf ou un agneau et qu'il l'égorge ou le vende, il restituera 5 bœufs pour le bœuf et 4 agneaux pour l'agneau.
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Si c''est son maître qui lui a donné une femme et qu''il en ait eu des fils ou des filles, la femme et ses enfants appartiendront à son maître et il sortira seul. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Supposons que l''esclave dise: ‘J''aime mon maître, ma femme et mes enfants, je ne veux pas sortir libre.’ '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Alors son maître le conduira devant Dieu, le fera approcher de la porte ou de son montant et lui percera l'oreille avec un poinçon. Ainsi l'esclave sera pour toujours à son service.
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '»Si un homme vend sa fille comme esclave, elle ne sortira pas libre comme le font les esclaves de sexe masculin. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Si elle déplaît à son maître alors qu''il avait pensé la prendre pour femme, celui-ci facilitera son rachat; mais il n''aura pas le droit de la vendre à des étrangers, ce serait la trahir. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'S''il la destine à son fils, il agira envers elle conformément au droit en vigueur pour les filles. '
