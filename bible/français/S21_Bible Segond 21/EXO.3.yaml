document_id: EXO.3
type_code: fra
segments:
- type: usfm
  marker: nb
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Moïse était devenu berger du troupeau de son beau-père Jéthro, le prêtre de Madian. Il conduisit le troupeau derrière le désert et vint à la montagne de Dieu, à Horeb. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: '*L''ange de l''Eternel lui apparut dans une flamme de feu, au milieu d''un buisson.'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '3.2 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'L''ange… buisson: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'cité en '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Actes 7.30
      metadata:
        usfm: ACT.7.30
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' par Etienne.'
    marker-yv: yv-n
  - type: text
    text: ' Moïse regarda et vit que le buisson était tout en feu sans être consumé.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Moïse dit: «Je veux faire un détour pour voir quelle est cette grande vision et pourquoi le buisson ne brûle pas.» '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'L''Eternel vit qu''il faisait un détour pour regarder. Dieu l''appela du milieu du buisson en disant: «Moïse! Moïse!» Il répondit: «Me voici!» '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Dieu dit: «Ne t''approche pas d''ici, *retire tes sandales, car l''endroit où tu te tiens est une terre sainte'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '3.5 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Retire… sainte: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: cité par Etienne en Actes 7.33.
    marker-yv: yv-n
  - type: text
    text: '.» '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Il ajouta: *«Je suis le Dieu de ton père, le Dieu d''Abraham, le Dieu d''Isaac et le Dieu de Jacob.»'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '3.6 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Je suis… Jacob: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'cité par Pierre en '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Actes 3.13
      metadata:
        usfm: ACT.3.13
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ', par Etienne en '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Actes 7.32
      metadata:
        usfm: ACT.7.32
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' et par Jésus en '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Matthieu 22.32
      metadata:
        usfm: MAT.22.32
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Marc 12.26
      metadata:
        usfm: MRK.12.26
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Luc 20.37
      metadata:
        usfm: LUK.20.37
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' pour prouver la réalité de la résurrection des morts.'
    marker-yv: yv-n
  - type: text
    text: ' Moïse se cacha le visage, car il avait peur de regarder Dieu.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'L''Eternel dit: *«J''ai vu la souffrance de mon peuple qui est en Egypte et j''ai entendu les cris qu''il pousse devant ses oppresseurs. Oui, je connais ses douleurs. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Je suis descendu pour le délivrer de la domination des Egyptiens et pour le faire monter de ce pays jusque dans un bon et vaste pays, un pays où coulent le lait et le miel
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '3.8 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Le lait et le miel: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: aliments appréciés en Orient, images de la fertilité et de la richesse naturelle du pays.
    marker-yv: yv-n
  - type: text
    text: '; c''est l''endroit qu''habitent les Cananéens, les Hittites, les Amoréens, les Phéréziens, les Héviens et les Jébusiens. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Maintenant, les cris des Israélites sont venus jusqu''à moi, j''ai aussi vu l''oppression que leur font subir les Egyptiens. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Maintenant, vas-y, je t'enverrai vers le pharaon et tu feras sortir d'Egypte
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '3.7-8, 10 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'J''ai vu… d''Egypte: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'cité de façon partielle par Etienne en '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Actes 7.34
      metadata:
        usfm: ACT.7.34
    - type: usfm
      marker: ft
      children:
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: ' mon peuple, les Israélites.»'
- type: usfm
  marker: s1
  children:
  - type: text
    text: Objections de Moïse
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Moïse dit à Dieu: «Qui suis-je, moi, pour aller trouver le pharaon et pour faire sortir les Israélites d''Egypte?» '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Dieu dit: «Je serai avec toi. Voici pour toi le signe que c''est moi qui t''envoie: quand tu auras fait sortir le peuple d''Egypte, vous servirez Dieu sur cette montagne.»'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Moïse dit à Dieu: «J''irai donc trouver les Israélites et je leur dirai: ‘Le Dieu de vos ancêtres m''envoie vers vous.’ Mais s''ils me demandent quel est son nom, que leur répondrai-je?» '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Dieu dit à Moïse: «Je suis celui qui suis.» Et il ajouta: «Voici ce que tu diras aux Israélites: ‘Je suis m''a envoyé vers vous.’» '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Dieu dit encore à Moïse: «Voici ce que tu diras aux Israélites: ‘L''Eternel, le Dieu de vos ancêtres, le Dieu d''Abraham, le Dieu d''Isaac et le Dieu de Jacob, m''envoie vers vous.’ Tel est mon nom pour toujours, tel est le nom sous lequel on fera appel à moi de génération en génération. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Va rassembler les anciens d''Israël et dis-leur: ‘L''Eternel, le Dieu de vos ancêtres, m''est apparu, le Dieu d''Abraham, d''Isaac et de Jacob. Il a dit: Je m''occupe de vous et de ce qu''on vous fait en Egypte. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'J''ai dit: Je vous ferai monter de l''Egypte, où vous souffrez, dans le pays des Cananéens, des Hittites, des Amoréens, des Phéréziens, des Héviens et des Jébusiens, un pays où coulent le lait et le miel.’ '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Ils t''écouteront. Tu iras avec les anciens d''Israël trouver le roi d''Egypte et vous lui direz: ‘L''Eternel, le Dieu des Hébreux, s''est présenté à nous. Permets-nous maintenant de faire trois journées de marche dans le désert pour offrir des sacrifices à l''Eternel, notre Dieu.’ '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Je sais que le roi d''Egypte ne vous laissera pas partir à moins d''y être contraint par une forte intervention. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'J''interviendrai et je frapperai l''Egypte par toutes sortes de prodiges que j''accomplirai au milieu d''elle. Après cela, il vous laissera partir. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Je gagnerai même la faveur des Egyptiens à ce peuple et, quand vous partirez, vous ne partirez pas les mains vides. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: Chaque femme demandera à sa voisine et à celle qui séjourne chez elle des vases d'argent, des vases d'or et des vêtements. Vous les ferez porter par vos fils et vos filles et vous dépouillerez les Egyptiens.»
