document_id: EXO.3,152
type_code: fra
verses:
  '1':
  - type: text
    content: 'Moïse était devenu berger du troupeau de son beau-père Jéthro, le prêtre de Madian. Il conduisit le troupeau derrière le désert et vint à la montagne de Dieu, à Horeb. '
  '10':
  - type: text
    content: Maintenant, vas-y, je t'enverrai vers le pharaon et tu feras sortir d'Egypte
  - type: note
    content: 'J''ai vu… d''Egypte: cité de façon partielle par Etienne en Actes 7.34.'
  - type: text
    content: ' mon peuple, les Israélites.»'
  - type: heading
    content: Objections de Moïse
  '11':
  - type: text
    content: 'Moïse dit à Dieu: «Qui suis-je, moi, pour aller trouver le pharaon et pour faire sortir les Israélites d''Egypte?» '
  '12':
  - type: text
    content: 'Dieu dit: «Je serai avec toi. Voici pour toi le signe que c''est moi qui t''envoie: quand tu auras fait sortir le peuple d''Egypte, vous servirez Dieu sur cette montagne.»'
  '13':
  - type: text
    content: 'Moïse dit à Dieu: «J''irai donc trouver les Israélites et je leur dirai: ‘Le Dieu de vos ancêtres m''envoie vers vous.’ Mais s''ils me demandent quel est son nom, que leur répondrai-je?» '
  '14':
  - type: text
    content: 'Dieu dit à Moïse: «Je suis celui qui suis.» Et il ajouta: «Voici ce que tu diras aux Israélites: ‘Je suis m''a envoyé vers vous.’» '
  '15':
  - type: text
    content: 'Dieu dit encore à Moïse: «Voici ce que tu diras aux Israélites: ‘L''Eternel, le Dieu de vos ancêtres, le Dieu d''Abraham, le Dieu d''Isaac et le Dieu de Jacob, m''envoie vers vous.’ Tel est mon nom pour toujours, tel est le nom sous lequel on fera appel à moi de génération en génération. '
  '16':
  - type: text
    content: 'Va rassembler les anciens d''Israël et dis-leur: ‘L''Eternel, le Dieu de vos ancêtres, m''est apparu, le Dieu d''Abraham, d''Isaac et de Jacob. Il a dit: Je m''occupe de vous et de ce qu''on vous fait en Egypte. '
  '17':
  - type: text
    content: 'J''ai dit: Je vous ferai monter de l''Egypte, où vous souffrez, dans le pays des Cananéens, des Hittites, des Amoréens, des Phéréziens, des Héviens et des Jébusiens, un pays où coulent le lait et le miel.’ '
  '18':
  - type: text
    content: 'Ils t''écouteront. Tu iras avec les anciens d''Israël trouver le roi d''Egypte et vous lui direz: ‘L''Eternel, le Dieu des Hébreux, s''est présenté à nous. Permets-nous maintenant de faire trois journées de marche dans le désert pour offrir des sacrifices à l''Eternel, notre Dieu.’ '
  '19':
  - type: text
    content: 'Je sais que le roi d''Egypte ne vous laissera pas partir à moins d''y être contraint par une forte intervention. '
  '2':
  - type: text
    content: '*L''ange de l''Eternel lui apparut dans une flamme de feu, au milieu d''un buisson.'
  - type: note
    content: 'L''ange… buisson: cité en Actes 7.30 par Etienne.'
  - type: text
    content: ' Moïse regarda et vit que le buisson était tout en feu sans être consumé.'
  '20':
  - type: text
    content: 'J''interviendrai et je frapperai l''Egypte par toutes sortes de prodiges que j''accomplirai au milieu d''elle. Après cela, il vous laissera partir. '
  '21':
  - type: text
    content: 'Je gagnerai même la faveur des Egyptiens à ce peuple et, quand vous partirez, vous ne partirez pas les mains vides. '
  '22':
  - type: text
    content: Chaque femme demandera à sa voisine et à celle qui séjourne chez elle des vases d'argent, des vases d'or et des vêtements. Vous les ferez porter par vos fils et vos filles et vous dépouillerez les Egyptiens.»
  '3':
  - type: text
    content: 'Moïse dit: «Je veux faire un détour pour voir quelle est cette grande vision et pourquoi le buisson ne brûle pas.» '
  '4':
  - type: text
    content: 'L''Eternel vit qu''il faisait un détour pour regarder. Dieu l''appela du milieu du buisson en disant: «Moïse! Moïse!» Il répondit: «Me voici!» '
  '5':
  - type: text
    content: 'Dieu dit: «Ne t''approche pas d''ici, *retire tes sandales, car l''endroit où tu te tiens est une terre sainte'
  - type: note
    content: 'Retire… sainte: cité par Etienne en Actes 7.33.'
  - type: text
    content: '.» '
  '6':
  - type: text
    content: 'Il ajouta: *«Je suis le Dieu de ton père, le Dieu d''Abraham, le Dieu d''Isaac et le Dieu de Jacob.»'
  - type: note
    content: 'Je suis… Jacob: cité par Pierre en Actes 3.13, par Etienne en Actes 7.32 et par Jésus en Matthieu 22.32; Marc 12.26; Luc 20.37 pour prouver la réalité de la résurrection des morts.'
  - type: text
    content: ' Moïse se cacha le visage, car il avait peur de regarder Dieu.'
  '7':
  - type: text
    content: 'L''Eternel dit: *«J''ai vu la souffrance de mon peuple qui est en Egypte et j''ai entendu les cris qu''il pousse devant ses oppresseurs. Oui, je connais ses douleurs. '
  '8':
  - type: text
    content: Je suis descendu pour le délivrer de la domination des Egyptiens et pour le faire monter de ce pays jusque dans un bon et vaste pays, un pays où coulent le lait et le miel
  - type: note
    content: 'Le lait et le miel: aliments appréciés en Orient, images de la fertilité et de la richesse naturelle du pays.'
  - type: text
    content: '; c''est l''endroit qu''habitent les Cananéens, les Hittites, les Amoréens, les Phéréziens, les Héviens et les Jébusiens. '
  '9':
  - type: text
    content: 'Maintenant, les cris des Israélites sont venus jusqu''à moi, j''ai aussi vu l''oppression que leur font subir les Egyptiens. '
