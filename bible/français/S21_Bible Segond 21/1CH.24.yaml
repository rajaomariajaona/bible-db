document_id: 1CH.24
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Répartition des prêtres en classes
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Voici les classes des descendants d''Aaron. Les fils d''Aaron étaient Nadab, Abihu, Eléazar et Ithamar. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Nadab et Abihu moururent avant leur père, sans avoir de fils. Quant à Eléazar et Ithamar, ils exercèrent la fonction de prêtre.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'David répartit les descendants d''Aaron en les classant d''après le service qu''ils avaient à faire. Il fut aidé dans cette tâche par Tsadok, un des descendants d''Eléazar, et par Achimélec, un des descendants d''Ithamar. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'On trouva parmi les fils d''Eléazar plus de chefs que parmi les fils d''Ithamar, et on les répartit en classes: les fils d''Eléazar eurent 16 chefs de famille, et les fils d''Ithamar 8. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'On eut recours au tirage au sort pour les répartir les uns avec les autres, car les responsables du sanctuaire et les serviteurs de Dieu étaient aussi bien des descendants d''Eléazar que d''Ithamar. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Shemaeja, fils de Nathanaël, le secrétaire membre de la tribu de Lévi, les inscrivit en présence du roi et des princes, du prêtre Tsadok et d'Achimélec, fils d'Abiathar, ainsi que des chefs de famille des prêtres et des Lévites. On tira au sort à tour de rôle une famille pour Eléazar et une pour Ithamar.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Le premier sort tomba sur Jehojarib; le deuxième, sur Jedaeja; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'le troisième, sur Harim; le quatrième, sur Seorim; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'le cinquième, sur Malkija; le sixième, sur Mijamin; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'le septième, sur Hakkots; le huitième, sur Abija; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'le neuvième, sur Josué; le dixième, sur Shecania; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'le onzième, sur Eliashib; le douzième, sur Jakim; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'le treizième, sur Huppa; le quatorzième, sur Jeshébeab; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'le quinzième, sur Bilga; le seizième, sur Immer; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'le dix-septième, sur Hézir; le dix-huitième, sur Happitsets; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'le dix-neuvième, sur Pethachja; le vingtième, sur Ezéchiel; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'le vingt et unième, sur Jakin; le vingt-deuxième, sur Gamul; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: le vingt-troisième, sur Delaja; le vingt-quatrième, sur Maazia.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: C'est ainsi qu'ils furent répartis en classes pour leur service, pour entrer dans la maison de l'Eternel en se conformant à la règle suivie par leur ancêtre Aaron d'après les ordres que lui avait donnés l'Eternel, le Dieu d'Israël.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Chefs des Lévites
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Voici les chefs du reste des Lévites. Pour les descendants d''Amram: Shubaël; pour les descendants de Shubaël: Jechdia; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'pour Rechabia, pour ses descendants: le chef Jishija. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Pour les Jitseharites: Shelomoth; pour les descendants de Shelomoth: Jachath. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Les descendants d''Hébron étaient Jerija, Amaria le deuxième, Jachaziel le troisième, Jekameam le quatrième. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Fils d''Uziel: Michée, dont les descendants avaient pour chef Shamir, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'et le frère de Michée, Jishija, dont les descendants avaient pour chef Zacharie. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Descendants de Merari: Machli et Mushi, ainsi que les descendants de Jaazija, son fils. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'Descendants de Merari par son fils Jaazija: Shoham, Zaccur et Ibri. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'Pour Machli: Eléazar, qui n''eut pas de fils; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'pour Kis et ses descendants, Jerachmeel. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'Fils de Mushi: Machli, Eder et Jerimoth.'
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Voilà les Lévites en fonction de leurs familles. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: Tout comme les fils d'Aaron, leurs frères, ils eurent eux aussi recours au tirage au sort en présence du roi David, de Tsadok et d'Achimélec ainsi que des chefs de famille des prêtres et des Lévites. Il en alla de même pour chaque chef de maison comme pour le plus petit de ses frères.
