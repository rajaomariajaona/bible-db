document_id: 1CH.24,152
type_code: fra
verses:
  '1':
  - type: heading
    content: Répartition des prêtres en classes
  - type: text
    content: 'Voici les classes des descendants d''Aaron. Les fils d''Aaron étaient Nadab, Abihu, Eléazar et Ithamar. '
  '10':
  - type: text
    content: 'le septième, sur Hakkots; le huitième, sur Abija; '
  '11':
  - type: text
    content: 'le neuvième, sur Josué; le dixième, sur Shecania; '
  '12':
  - type: text
    content: 'le onzième, sur Eliashib; le douzième, sur Jakim; '
  '13':
  - type: text
    content: 'le treizième, sur Huppa; le quatorzième, sur Jeshébeab; '
  '14':
  - type: text
    content: 'le quinzième, sur Bilga; le seizième, sur Immer; '
  '15':
  - type: text
    content: 'le dix-septième, sur Hézir; le dix-huitième, sur Happitsets; '
  '16':
  - type: text
    content: 'le dix-neuvième, sur Pethachja; le vingtième, sur Ezéchiel; '
  '17':
  - type: text
    content: 'le vingt et unième, sur Jakin; le vingt-deuxième, sur Gamul; '
  '18':
  - type: text
    content: le vingt-troisième, sur Delaja; le vingt-quatrième, sur Maazia.
  '19':
  - type: text
    content: C'est ainsi qu'ils furent répartis en classes pour leur service, pour entrer dans la maison de l'Eternel en se conformant à la règle suivie par leur ancêtre Aaron d'après les ordres que lui avait donnés l'Eternel, le Dieu d'Israël.
  - type: heading
    content: Chefs des Lévites
  '2':
  - type: text
    content: Nadab et Abihu moururent avant leur père, sans avoir de fils. Quant à Eléazar et Ithamar, ils exercèrent la fonction de prêtre.
  '20':
  - type: text
    content: 'Voici les chefs du reste des Lévites. Pour les descendants d''Amram: Shubaël; pour les descendants de Shubaël: Jechdia; '
  '21':
  - type: text
    content: 'pour Rechabia, pour ses descendants: le chef Jishija. '
  '22':
  - type: text
    content: 'Pour les Jitseharites: Shelomoth; pour les descendants de Shelomoth: Jachath. '
  '23':
  - type: text
    content: 'Les descendants d''Hébron étaient Jerija, Amaria le deuxième, Jachaziel le troisième, Jekameam le quatrième. '
  '24':
  - type: text
    content: 'Fils d''Uziel: Michée, dont les descendants avaient pour chef Shamir, '
  '25':
  - type: text
    content: 'et le frère de Michée, Jishija, dont les descendants avaient pour chef Zacharie. '
  '26':
  - type: text
    content: 'Descendants de Merari: Machli et Mushi, ainsi que les descendants de Jaazija, son fils. '
  '27':
  - type: text
    content: 'Descendants de Merari par son fils Jaazija: Shoham, Zaccur et Ibri. '
  '28':
  - type: text
    content: 'Pour Machli: Eléazar, qui n''eut pas de fils; '
  '29':
  - type: text
    content: 'pour Kis et ses descendants, Jerachmeel. '
  '3':
  - type: text
    content: 'David répartit les descendants d''Aaron en les classant d''après le service qu''ils avaient à faire. Il fut aidé dans cette tâche par Tsadok, un des descendants d''Eléazar, et par Achimélec, un des descendants d''Ithamar. '
  '30':
  - type: text
    content: 'Fils de Mushi: Machli, Eder et Jerimoth.'
  - type: text
    content: 'Voilà les Lévites en fonction de leurs familles. '
  '31':
  - type: text
    content: Tout comme les fils d'Aaron, leurs frères, ils eurent eux aussi recours au tirage au sort en présence du roi David, de Tsadok et d'Achimélec ainsi que des chefs de famille des prêtres et des Lévites. Il en alla de même pour chaque chef de maison comme pour le plus petit de ses frères.
  '4':
  - type: text
    content: 'On trouva parmi les fils d''Eléazar plus de chefs que parmi les fils d''Ithamar, et on les répartit en classes: les fils d''Eléazar eurent 16 chefs de famille, et les fils d''Ithamar 8. '
  '5':
  - type: text
    content: 'On eut recours au tirage au sort pour les répartir les uns avec les autres, car les responsables du sanctuaire et les serviteurs de Dieu étaient aussi bien des descendants d''Eléazar que d''Ithamar. '
  '6':
  - type: text
    content: Shemaeja, fils de Nathanaël, le secrétaire membre de la tribu de Lévi, les inscrivit en présence du roi et des princes, du prêtre Tsadok et d'Achimélec, fils d'Abiathar, ainsi que des chefs de famille des prêtres et des Lévites. On tira au sort à tour de rôle une famille pour Eléazar et une pour Ithamar.
  '7':
  - type: text
    content: 'Le premier sort tomba sur Jehojarib; le deuxième, sur Jedaeja; '
  '8':
  - type: text
    content: 'le troisième, sur Harim; le quatrième, sur Seorim; '
  '9':
  - type: text
    content: 'le cinquième, sur Malkija; le sixième, sur Mijamin; '
