document_id: ZEP.1,152
type_code: fra
verses:
  '1':
  - type: heading
    content: Jugement imminent de Juda
  - type: text
    content: Parole de l'Eternel adressée à Sophonie, fils de Cushi et descendant de Guedalia, d'Amaria et d'Ezéchias, durant le règne de Josias, fils d'Amon, sur Juda.
  '10':
  - type: text
    content: Ce jour-là, déclare l'Eternel,
  - type: text
    content: il y aura des cris à la porte des poissons,
  - type: text
    content: des lamentations dans la ville neuve
  - type: text
    content: et un grand désastre sur les collines.
  '11':
  - type: text
    content: Gémissez, habitants de Macthesh,
  - type: text
    content: car le peuple des marchands est détruit,
  - type: text
    content: tous les peseurs d'argent sont supprimés.
  '12':
  - type: text
    content: A ce moment-là, je fouillerai Jérusalem avec des lampes
  - type: text
    content: et j'interviendrai contre les hommes immobiles sur leur lie,
  - type: text
    content: 'ceux qui disent dans leur cœur:'
  - type: text
    content: «L'Eternel ne fait ni bien ni mal.»
  '13':
  - type: text
    content: Leurs richesses seront pillées,
  - type: text
    content: et leurs maisons seront détruites;
  - type: text
    content: ils ont construit des maisons, mais ils ne les habiteront plus,
  - type: text
    content: ils ont planté des vignes, mais ils n'en boiront pas le vin.
  '14':
  - type: text
    content: Le grand jour de l'Eternel est proche,
  - type: text
    content: il est proche, il arrive très vite;
  - type: text
    content: le jour de l'Eternel fait entendre sa voix,
  - type: text
    content: et le héros pousse des cris amers.
  '15':
  - type: text
    content: Ce jour est un jour de fureur,
  - type: text
    content: un jour de détresse et d'angoisse,
  - type: text
    content: un jour de ruine et de destruction,
  - type: text
    content: un jour de ténèbres et d'obscurité,
  - type: text
    content: un jour de nuages et de brouillard,
  '16':
  - type: text
    content: un jour où retentiront la trompette et les cris de guerre
  - type: text
    content: contre les villes fortifiées et les hautes tours.
  '17':
  - type: text
    content: Je plongerai les hommes dans la détresse
  - type: text
    content: et ils marcheront comme des aveugles,
  - type: text
    content: parce qu'ils ont péché contre l'Eternel.
  - type: text
    content: Leur sang sera versé comme de la poussière,
  - type: text
    content: et leurs intestins comme du fumier.
  '18':
  - type: text
    content: Ni leur argent ni leur or ne pourront les délivrer,
  - type: text
    content: le jour de la fureur de l'Eternel.
  - type: text
    content: Toute la terre sera dévorée par le feu de sa jalousie,
  - type: text
    content: car il détruira – et ce sera terrifiant – tous les habitants de la terre.
  '2':
  - type: text
    content: Je ferai tout disparaître de la surface de la terre,
  - type: text
    content: déclare l'Eternel.
  '3':
  - type: text
    content: Je ferai disparaître les hommes et les bêtes,
  - type: text
    content: les oiseaux du ciel et les poissons de la mer,
  - type: text
    content: et tout ce qui fait trébucher les méchants;
  - type: text
    content: j'exterminerai les hommes de la surface de la terre,
  - type: text
    content: déclare l'Eternel.
  '4':
  - type: text
    content: Je déploierai ma puissance contre Juda
  - type: text
    content: et contre tous les habitants de Jérusalem.
  - type: text
    content: Je supprimerai de cet endroit ce qui reste de Baal
  - type: note
    content: 'Baal: nom de la principale divinité des Phéniciens et des Cananéens ainsi que des Moabites.'
  - type: text
    content: ','
  - type: text
    content: le nom de ses ministres et les prêtres avec eux,
  '5':
  - type: text
    content: ceux qui se prosternent sur les toits devant les corps célestes,
  - type: text
    content: ceux qui se prosternent en jurant par l'Eternel
  - type: text
    content: tout en jurant par leur roi.
  '6':
  - type: text
    content: Je supprimerai ceux qui se sont détournés de l'Eternel,
  - type: text
    content: ceux qui ne cherchent pas l'Eternel et qui ne le consultent pas.
  '7':
  - type: text
    content: Silence devant le Seigneur, l'Eternel!
  - type: text
    content: En effet, le jour de l'Eternel est proche,
  - type: text
    content: car l'Eternel a préparé un sacrifice,
  - type: text
    content: il a consacré ses invités.
  '8':
  - type: text
    content: Le jour du sacrifice de l'Eternel,
  - type: text
    content: j'interviendrai contre les princes et les fils du roi
  - type: text
    content: et contre tous ceux qui portent des habits étrangers.
  '9':
  - type: text
    content: Ce jour-là, j'interviendrai contre tous ceux qui sautent par-dessus le seuil
  - type: text
    content: pour remplir de violence et de fraude la maison de leur Seigneur.
