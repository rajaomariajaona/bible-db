document_id: ZEP.1,152
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Jugement imminent de Juda
    marker-yv: yv-h
  - type: usfm
    marker: d
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: Parole de l'Eternel adressée à Sophonie, fils de Cushi et descendant de Guedalia, d'Amaria et d'Ezéchias, durant le règne de Josias, fils d'Amon, sur Juda.
  '10':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: Ce jour-là, déclare l'Eternel,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: il y aura des cris à la porte des poissons,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: des lamentations dans la ville neuve
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et un grand désastre sur les collines.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: Gémissez, habitants de Macthesh,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: car le peuple des marchands est détruit,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: tous les peseurs d'argent sont supprimés.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: A ce moment-là, je fouillerai Jérusalem avec des lampes
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et j'interviendrai contre les hommes immobiles sur leur lie,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'ceux qui disent dans leur cœur:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: «L'Eternel ne fait ni bien ni mal.»
  '13':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: Leurs richesses seront pillées,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et leurs maisons seront détruites;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ils ont construit des maisons, mais ils ne les habiteront plus,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ils ont planté des vignes, mais ils n'en boiront pas le vin.
  '14':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: Le grand jour de l'Eternel est proche,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: il est proche, il arrive très vite;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: le jour de l'Eternel fait entendre sa voix,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et le héros pousse des cris amers.
  '15':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: Ce jour est un jour de fureur,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: un jour de détresse et d'angoisse,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: un jour de ruine et de destruction,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: un jour de ténèbres et d'obscurité,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: un jour de nuages et de brouillard,
  '16':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: un jour où retentiront la trompette et les cris de guerre
  - type: usfm
    marker: q1
    children:
    - type: text
      text: contre les villes fortifiées et les hautes tours.
  '17':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: Je plongerai les hommes dans la détresse
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et ils marcheront comme des aveugles,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: parce qu'ils ont péché contre l'Eternel.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Leur sang sera versé comme de la poussière,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et leurs intestins comme du fumier.
  '18':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: Ni leur argent ni leur or ne pourront les délivrer,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: le jour de la fureur de l'Eternel.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Toute la terre sera dévorée par le feu de sa jalousie,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: car il détruira – et ce sera terrifiant – tous les habitants de la terre.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: Je ferai tout disparaître de la surface de la terre,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: déclare l'Eternel.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: Je ferai disparaître les hommes et les bêtes,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: les oiseaux du ciel et les poissons de la mer,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et tout ce qui fait trébucher les méchants;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: j'exterminerai les hommes de la surface de la terre,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: déclare l'Eternel.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: Je déploierai ma puissance contre Juda
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et contre tous les habitants de Jérusalem.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Je supprimerai de cet endroit ce qui reste de Baal
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1.4 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Baal: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: nom de la principale divinité des Phéniciens et des Cananéens ainsi que des Moabites.
      marker-yv: yv-n
    - type: text
      text: ','
  - type: usfm
    marker: q1
    children:
    - type: text
      text: le nom de ses ministres et les prêtres avec eux,
  '5':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: ceux qui se prosternent sur les toits devant les corps célestes,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ceux qui se prosternent en jurant par l'Eternel
  - type: usfm
    marker: q1
    children:
    - type: text
      text: tout en jurant par leur roi.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: Je supprimerai ceux qui se sont détournés de l'Eternel,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ceux qui ne cherchent pas l'Eternel et qui ne le consultent pas.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: Silence devant le Seigneur, l'Eternel!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: En effet, le jour de l'Eternel est proche,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: car l'Eternel a préparé un sacrifice,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: il a consacré ses invités.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: Le jour du sacrifice de l'Eternel,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: j'interviendrai contre les princes et les fils du roi
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et contre tous ceux qui portent des habits étrangers.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: Ce jour-là, j'interviendrai contre tous ceux qui sautent par-dessus le seuil
  - type: usfm
    marker: q1
    children:
    - type: text
      text: pour remplir de violence et de fraude la maison de leur Seigneur.
