document_id: PSA.33,152
type_code: fra
verses:
  '1':
  - type: heading
    content: La joie de ceux qui se confient en Dieu
  - type: text
    content: Justes, réjouissez-vous en l'Eternel!
  - type: text
    content: La louange convient aux hommes droits.
  '10':
  - type: text
    content: L'Eternel renverse les plans des nations,
  - type: text
    content: il anéantit les projets des peuples,
  '11':
  - type: text
    content: mais les plans de l'Eternel subsistent éternellement,
  - type: text
    content: et les projets de son cœur de génération en génération.
  '12':
  - type: text
    content: Heureuse la nation dont l'Eternel est le Dieu,
  - type: text
    content: heureux le peuple qu'il choisit comme son héritage!
  '13':
  - type: text
    content: L'Eternel regarde du haut du ciel,
  - type: text
    content: il voit tous les hommes.
  '14':
  - type: text
    content: Du lieu où il habite, il observe
  - type: text
    content: tous les habitants de la terre.
  '15':
  - type: text
    content: Lui qui a façonné leur cœur à tous,
  - type: text
    content: il est attentif à toutes leurs actions.
  '16':
  - type: text
    content: Ce n'est pas une grande armée qui sauve le roi,
  - type: text
    content: ce n'est pas sa grande force qui délivre le guerrier.
  '17':
  - type: text
    content: Le cheval est impuissant pour assurer le salut,
  - type: text
    content: et toute sa vigueur est incapable de procurer la délivrance,
  '18':
  - type: text
    content: mais le regard de l'Eternel est sur ceux qui le craignent,
  - type: text
    content: sur ceux qui espèrent en sa bonté,
  '19':
  - type: text
    content: afin de les délivrer de la mort
  - type: text
    content: et de les faire vivre, même en temps de famine.
  '2':
  - type: text
    content: Célébrez l'Eternel avec la harpe,
  - type: text
    content: louez-le sur le luth à dix cordes!
  '20':
  - type: text
    content: 'Nous espérons en l''Eternel:'
  - type: text
    content: notre secours et notre bouclier, c'est lui.
  '21':
  - type: text
    content: Oui, c'est en lui que notre cœur se réjouit,
  - type: text
    content: c'est en son saint nom que nous avons confiance.
  '22':
  - type: text
    content: Eternel, que ta grâce soit sur nous
  - type: text
    content: lorsque nous espérons en toi!
  '3':
  - type: text
    content: Chantez-lui un cantique nouveau,
  - type: text
    content: faites retentir vos instruments et vos voix,
  '4':
  - type: text
    content: car la parole de l'Eternel est droite
  - type: text
    content: et toute son œuvre s'accomplit avec fidélité!
  '5':
  - type: text
    content: Il aime la justice et le droit;
  - type: text
    content: la bonté de l'Eternel remplit la terre.
  '6':
  - type: text
    content: Le ciel a été fait par la parole de l'Eternel,
  - type: text
    content: et toute son armée par le souffle de sa bouche.
  '7':
  - type: text
    content: Il amoncelle les eaux de la mer,
  - type: text
    content: il garde les océans dans des réservoirs.
  '8':
  - type: text
    content: Que toute la terre craigne l'Eternel,
  - type: text
    content: que tous les habitants du monde tremblent devant lui,
  '9':
  - type: text
    content: car il parle, et la chose arrive,
  - type: text
    content: il ordonne, et elle existe.
