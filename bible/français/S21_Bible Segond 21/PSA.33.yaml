document_id: PSA.33,152
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: La joie de ceux qui se confient en Dieu
    marker-yv: yv-h
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: Justes, réjouissez-vous en l'Eternel!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: La louange convient aux hommes droits.
  '10':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: L'Eternel renverse les plans des nations,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: il anéantit les projets des peuples,
  '11':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: mais les plans de l'Eternel subsistent éternellement,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et les projets de son cœur de génération en génération.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: Heureuse la nation dont l'Eternel est le Dieu,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: heureux le peuple qu'il choisit comme son héritage!
  '13':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: L'Eternel regarde du haut du ciel,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: il voit tous les hommes.
  '14':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: Du lieu où il habite, il observe
  - type: usfm
    marker: q1
    children:
    - type: text
      text: tous les habitants de la terre.
  '15':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: Lui qui a façonné leur cœur à tous,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: il est attentif à toutes leurs actions.
  '16':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: Ce n'est pas une grande armée qui sauve le roi,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ce n'est pas sa grande force qui délivre le guerrier.
  '17':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: Le cheval est impuissant pour assurer le salut,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et toute sa vigueur est incapable de procurer la délivrance,
  '18':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: mais le regard de l'Eternel est sur ceux qui le craignent,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sur ceux qui espèrent en sa bonté,
  '19':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: afin de les délivrer de la mort
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et de les faire vivre, même en temps de famine.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: Célébrez l'Eternel avec la harpe,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: louez-le sur le luth à dix cordes!
  '20':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: 'Nous espérons en l''Eternel:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: notre secours et notre bouclier, c'est lui.
  '21':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: Oui, c'est en lui que notre cœur se réjouit,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: c'est en son saint nom que nous avons confiance.
  '22':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: Eternel, que ta grâce soit sur nous
  - type: usfm
    marker: q1
    children:
    - type: text
      text: lorsque nous espérons en toi!
  '3':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: Chantez-lui un cantique nouveau,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: faites retentir vos instruments et vos voix,
  '4':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: car la parole de l'Eternel est droite
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et toute son œuvre s'accomplit avec fidélité!
  '5':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: Il aime la justice et le droit;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: la bonté de l'Eternel remplit la terre.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: Le ciel a été fait par la parole de l'Eternel,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et toute son armée par le souffle de sa bouche.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: Il amoncelle les eaux de la mer,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: il garde les océans dans des réservoirs.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: Que toute la terre craigne l'Eternel,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: que tous les habitants du monde tremblent devant lui,
  '9':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: car il parle, et la chose arrive,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: il ordonne, et elle existe.
