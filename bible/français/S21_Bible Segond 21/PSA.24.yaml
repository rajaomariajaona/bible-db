document_id: PSA.24,152
type_code: fra
verses:
  '1':
  - type: heading
    content: Le roi de gloire dans son temple
  - type: text
    content: Psaume de David.
  - type: text
    content: '*C''est à l''Eternel qu''appartient la terre avec tout ce qu''elle contient'
  - type: note
    content: 'C''est à l''Eternel… contient: même idée au Psaume 50.12; cité en 1 Corinthiens 10.26 comme argument pour inviter les chrétiens à tout considérer comme pur.'
  - type: text
    content: ','
  - type: text
    content: le monde avec tous ceux qui l'habitent,
  '10':
  - type: text
    content: Qui donc est ce roi de gloire?
  - type: text
    content: 'L''Eternel, le maître de l''univers:'
  - type: text
    content: 'c''est lui le roi de gloire! '
  - type: text
    content: – Pause.
  '2':
  - type: text
    content: car il l'a fondée sur les mers
  - type: text
    content: et affermie sur les fleuves.
  '3':
  - type: text
    content: Qui pourra monter à la montagne de l'Eternel?
  - type: text
    content: Qui pourra se tenir dans son lieu saint?
  '4':
  - type: text
    content: Celui qui a les mains innocentes et le cœur pur,
  - type: text
    content: celui qui ne se livre pas au mensonge
  - type: text
    content: et qui ne fait pas de serments trompeurs.
  '5':
  - type: text
    content: Il obtiendra la bénédiction de l'Eternel,
  - type: text
    content: la justice du Dieu de son salut.
  '6':
  - type: text
    content: Telle est la génération de ceux qui te cherchent,
  - type: text
    content: 'qui aspirent après toi, Dieu de Jacob! '
  - type: text
    content: – Pause.
  '7':
  - type: text
    content: Portes, élevez vos linteaux!
  - type: text
    content: Elevez-vous, portes éternelles!
  - type: text
    content: Que le roi de gloire fasse son entrée!
  '8':
  - type: text
    content: Qui est ce roi de gloire?
  - type: text
    content: L'Eternel, si fort et si puissant,
  - type: text
    content: l'Eternel puissant dans les combats!
  '9':
  - type: text
    content: Portes, élevez vos linteaux!
  - type: text
    content: Elevez-les, portes éternelles!
  - type: text
    content: Que le roi de gloire fasse son entrée!
