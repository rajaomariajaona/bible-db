document_id: PSA.24,152
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Le roi de gloire dans son temple
    marker-yv: yv-h
  - type: usfm
    marker: d
    children:
    - type: text
      text: Psaume de David.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: '*C''est à l''Eternel qu''appartient la terre avec tout ce qu''elle contient'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '24.1 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'C''est à l''Eternel… contient: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'même idée au '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Psaume 50.12
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '; cité en '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1 Corinthiens 10.26
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' comme argument pour inviter les chrétiens à tout considérer comme pur.'
      marker-yv: yv-n
    - type: text
      text: ','
  - type: usfm
    marker: q1
    children:
    - type: text
      text: le monde avec tous ceux qui l'habitent,
  '10':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Qui donc est ce roi de gloire?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'L''Eternel, le maître de l''univers:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'c''est lui le roi de gloire! '
    - type: usfm
      marker: qs
      children:
      - type: text
        text: – Pause.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: car il l'a fondée sur les mers
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et affermie sur les fleuves.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Qui pourra monter à la montagne de l'Eternel?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Qui pourra se tenir dans son lieu saint?
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Celui qui a les mains innocentes et le cœur pur,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: celui qui ne se livre pas au mensonge
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et qui ne fait pas de serments trompeurs.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Il obtiendra la bénédiction de l'Eternel,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: la justice du Dieu de son salut.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Telle est la génération de ceux qui te cherchent,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'qui aspirent après toi, Dieu de Jacob! '
    - type: usfm
      marker: qs
      children:
      - type: text
        text: – Pause.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Portes, élevez vos linteaux!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Elevez-vous, portes éternelles!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Que le roi de gloire fasse son entrée!
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Qui est ce roi de gloire?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: L'Eternel, si fort et si puissant,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: l'Eternel puissant dans les combats!
  '9':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Portes, élevez vos linteaux!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Elevez-les, portes éternelles!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Que le roi de gloire fasse son entrée!
