document_id: JOS.17,152
type_code: fra
verses:
  '1':
  - type: heading
    content: Territoire accordé à la demi-tribu de Manassé
  - type: text
    content: 'Une part fut aussi attribuée par tirage au sort à la tribu de Manassé, car il était le fils aîné de Joseph. Makir, fils aîné de Manassé et père de Galaad, avait eu Galaad et le Basan parce qu''il était un homme de guerre. '
  '10':
  - type: text
    content: 'Le territoire du sud appartenait à Ephraïm, celui du nord à Manassé, et la mer leur servait de limite. Ils touchaient Aser au nord et Issacar à l''est. '
  '11':
  - type: text
    content: 'Manassé possédait, dans le territoire d''Issacar et dans celui d''Aser, Beth-Shean et les villes qui en dépendent, Jibleam et les villes qui en dépendent, les habitants de Dor et les villes qui en dépendent, les habitants d''En-Dor et les villes qui en dépendent, les habitants de Thaanac et les villes qui en dépendent, ainsi que les habitants de Meguiddo et les villes qui en dépendent. Cela correspondait à trois régions. '
  '12':
  - type: text
    content: 'Les Manassites furent incapables de prendre possession de ces villes et les Cananéens voulurent rester dans la région. '
  '13':
  - type: text
    content: Lorsque les Israélites furent plus forts, ils imposèrent des corvées aux Cananéens, mais ils ne les chassèrent pas.
  '14':
  - type: text
    content: 'Les descendants de Joseph dirent à Josué: «Pourquoi nous as-tu donné en héritage un seul lot, une seule part, alors que nous formons un peuple nombreux et que l''Eternel nous a bénis jusqu''à présent?» '
  '15':
  - type: text
    content: 'Josué leur dit: «Si vous êtes un peuple nombreux, montez à la forêt et défrichez-la pour vous y faire de la place dans le pays des Phéréziens et des Rephaïm, puisque la région montagneuse d''Ephraïm est trop exiguë pour vous.» '
  '16':
  - type: text
    content: 'Les fils de Joseph dirent: «La montagne ne nous suffira pas et il y a des chars en fer chez tous les Cananéens qui habitent la vallée, aussi bien chez ceux qui sont à Beth-Shean et dans les villes qui en dépendent que chez ceux qui se trouvent dans la vallée de Jizreel.» '
  '17':
  - type: text
    content: 'Josué dit à la famille de Joseph, à Ephraïm et à Manassé: «Vous êtes un peuple nombreux et doté d''une grande force. Vous n''aurez donc pas un lot unique. '
  '18':
  - type: text
    content: Mais vous aurez une région montagneuse. Certes, c'est une forêt, mais vous la défricherez et elle sera à vous jusque dans ses extrémités car vous chasserez les Cananéens, malgré leurs chars en fer et malgré leur force.»
  '2':
  - type: text
    content: 'On donna par tirage au sort une part aux clans des autres descendants de Manassé: aux fils d''Abiézer, de Hélek, d''Asriel, de Sichem, de Hépher, de Shemida. Voilà quels sont les clans des descendants de Manassé, le fils de Joseph. '
  '3':
  - type: text
    content: 'Tselophchad, fils de Hépher, petit-fils de Galaad, descendant de Makir, le fils de Manassé, n''eut pas de fils. Il eut en revanche des filles dont voici les noms: Machla, Noa, Hogla, Milca et Thirtsa. '
  '4':
  - type: text
    content: 'Elles se présentèrent devant le prêtre Eléazar, devant Josué, fils de Nun, et devant les princes en disant: «L''Eternel a ordonné à Moïse de nous donner un héritage parmi nos frères.» On leur donna, conformément à l''ordre de l''Eternel, un héritage parmi les frères de leur père. '
  '5':
  - type: text
    content: 'On attribua dix portions à Manassé, en plus du pays de Galaad et du Basan, qui est de l''autre côté du Jourdain. '
  '6':
  - type: text
    content: En effet, les descendantes de Manassé eurent un héritage parmi ses descendants, et le pays de Galaad fut pour les autres Manassites.
  '7':
  - type: text
    content: 'Le territoire de Manassé s''étendait d''Aser à Micmethath, qui se trouve près de Sichem. Leur frontière partait vers Jamin, vers les habitants d''En-Tappuach. '
  '8':
  - type: text
    content: 'La région de Tappuach appartenait à Manassé, mais Tappuach elle-même, située sur la frontière avec Manassé, appartenait aux Ephraïmites. '
  '9':
  - type: text
    content: 'La frontière descendait au torrent de Kana, elle passait au sud du torrent. Les villes qui se trouvaient là appartenaient à Ephraïm, même si elles étaient au milieu des villes de Manassé. La frontière de Manassé au nord du torrent débouchait sur la mer. '
