document_id: DAN.10,152
type_code: fra
verses:
  '1':
  - type: heading
    content: Une apparition terrifiante
  - type: text
    content: La troisième année de règne de Cyrus, le roi de Perse, une parole fut révélée à Daniel, appelé Beltshatsar. Cette parole est vraie et annonce un grand combat. Daniel fut attentif à cette parole et en eut la compréhension à travers ce qu'il voyait.
  '10':
  - type: text
    content: 'Mais une main m''a touché et m''a mis, tout tremblant, sur mes genoux et les paumes de mes mains. '
  '11':
  - type: text
    content: 'Puis l''homme m''a dit: «Daniel, homme considéré comme précieux, sois attentif aux paroles que je vais te dire et tiens-toi debout là où tu es! En effet, j''ai été maintenant envoyé vers toi.» Lorsqu''il m''a dit cela, je me suis tenu debout, tout tremblant.'
  '12':
  - type: text
    content: 'Il m''a dit: «Daniel, n''aie pas peur, car dès le premier jour où tu as eu à cœur de comprendre et de t''humilier devant ton Dieu, tes paroles ont été entendues, et c''est à cause d''elles que je suis venu. '
  '13':
  - type: text
    content: 'Le chef du royaume de Perse m''a résisté 21 jours, mais Michel, l''un des principaux chefs, est venu à mon aide et je suis resté là, près des rois de Perse. '
  '14':
  - type: text
    content: Je viens maintenant pour te faire comprendre ce qui doit arriver à ton peuple dans l'avenir, car la vision concerne encore cette époque-là.»
  '15':
  - type: text
    content: 'Pendant qu''il m''adressait ces paroles, je regardais par terre et restais silencieux. '
  '16':
  - type: text
    content: 'Quelqu''un qui avait une apparence humaine a touché mes lèvres. J''ai ouvert la bouche et me suis mis à parler; j''ai dit à celui qui se tenait en face de moi: «Mon seigneur, j''ai été bouleversé de douleur par cette apparition et j''ai perdu toute force. '
  '17':
  - type: text
    content: 'Comment pourrais-je, moi ton serviteur, te parler à toi, mon seigneur? Désormais je n''ai plus de force et il ne me reste plus de souffle.» '
  '18':
  - type: text
    content: 'Alors celui qui avait apparence humaine m''a de nouveau touché et m''a fortifié; '
  '19':
  - type: text
    content: 'il m''a dit: «N''aie pas peur, homme considéré comme précieux! Que la paix soit avec toi! Fortifie-toi! Fortifie-toi!» Pendant qu''il me parlait, j''ai repris des forces. J''ai alors dit: «Que mon seigneur parle, car tu m''as fortifié.»'
  '2':
  - type: text
    content: 'A cette époque-là, moi, Daniel, j''ai été trois semaines dans le deuil. '
  '20':
  - type: text
    content: 'Il m''a dit: «Sais-tu pourquoi je suis venu vers toi? Maintenant je retourne combattre le chef de la Perse et, quand je partirai, le chef de la Grèce viendra. '
  '21':
  - type: text
    content: Cependant, je veux t'annoncer ce qui est écrit dans le livre de vérité. Personne ne me soutient contre ceux-là, excepté Michel, votre chef.
  '3':
  - type: text
    content: Je n'ai mangé aucune nourriture raffinée, il n'est entré ni viande ni vin dans ma bouche et je ne me suis pas parfumé jusqu'à la fin des trois semaines.
  '4':
  - type: text
    content: 'Le vingt-quatrième jour du premier mois, j''étais au bord du grand fleuve, c''est-à-dire le Tigre. '
  '5':
  - type: text
    content: 'J''ai levé les yeux et j''ai vu un homme habillé de lin. Il avait autour de la taille une ceinture en or d''Uphaz. '
  '6':
  - type: text
    content: Son corps était comme de chrysolithe, son visage brillait comme l'éclair, ses yeux étaient pareils à des flammes de feu, ses bras et ses pieds ressemblaient à du bronze poli et le son de sa voix était pareil au bruit d'une grande foule.
  '7':
  - type: text
    content: 'Moi, Daniel, j''ai été le seul à voir cette apparition: les hommes qui étaient avec moi ne l''ont pas vue, mais une grande frayeur s''est emparée d''eux et ils ont pris la fuite pour se cacher. '
  '8':
  - type: text
    content: 'Resté seul, j''ai vu cette grande apparition et me suis retrouvé sans force. Mes traits se sont décomposés et j''ai perdu toute force. '
  '9':
  - type: text
    content: 'J''ai entendu le son de ses paroles et en l''entendant je suis tombé, dans une profonde torpeur, le visage contre terre. '
