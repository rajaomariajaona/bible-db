document_id: 1KI.7,152
type_code: fra
verses:
  '1':
  - type: heading
    content: Construction du palais
  - type: text
    content: Salomon construisit encore son palais. Cela prit 13 ans jusqu'à ce qu'il l'ait entièrement terminé.
  '10':
  - type: text
    content: 'Les fondations étaient en pierres magnifiques et de grande dimension, en pierres de 5 et de 4 mètres. '
  '11':
  - type: text
    content: 'Au-dessus il y avait encore de magnifiques pierres, taillées sur mesure, et du cèdre. '
  '12':
  - type: text
    content: Tout autour de la grande cour, il y avait trois rangées de pierres de taille et une rangée de poutres de cèdre, comme pour le parvis intérieur et le portique de la maison de l'Eternel.
  - type: heading
    content: Travaux pour le mobilier du temple
  '13':
  - type: text
    content: 'Le roi Salomon fit venir de Tyr un certain Hiram. '
  '14':
  - type: text
    content: C'était le fils d'une veuve membre de la tribu de Nephthali et d'un père tyrien, et il travaillait le bronze. Hiram était rempli de sagesse, d'intelligence et de savoir-faire pour fabriquer toutes sortes d'objets en bronze. Il arriva auprès du roi Salomon et il réalisa tous ses travaux.
  '15':
  - type: text
    content: 'Il fit les deux colonnes de bronze. La première faisait 9 mètres de haut, et on pouvait mesurer la circonférence de la seconde avec un fil de 6 mètres. '
  '16':
  - type: text
    content: 'Il fondit deux chapiteaux de bronze, pour les mettre sur les sommets des colonnes. Le premier faisait 2 mètres et demi de haut, tout comme le second. '
  '17':
  - type: text
    content: 'Il fit des treillis en forme de réseaux, des festons façonnés en chaînettes, pour les chapiteaux qui étaient sur le sommet des colonnes: 7 pour le premier chapiteau, et 7 pour le second. '
  '18':
  - type: text
    content: 'Il fit deux rangées de grenades autour de l''un des treillis, pour couvrir le chapiteau qui était sur le sommet d''une des colonnes. Il fit de même pour le second. '
  '19':
  - type: text
    content: 'Les chapiteaux qui étaient sur le sommet des colonnes placées dans le portique représentaient des lis et faisaient 2 mètres. '
  '2':
  - type: text
    content: 'Il construisit d''abord le bâtiment appelé «maison de la forêt du Liban». Il était long de 50 mètres, large de 25 et haut de 15. Il était construit sur quatre rangées de colonnes en cèdre et il y avait des poutres de cèdre sur les colonnes. '
  '20':
  - type: text
    content: 'Les chapiteaux placés sur les deux colonnes étaient entourés de 200 grenades, en haut, près du renflement qui dépassait le treillis. Il y avait aussi 200 grenades rangées autour du second chapiteau. '
  '21':
  - type: text
    content: 'Il dressa les colonnes dans le portique du temple. Il dressa la colonne de droite et l''appela Jakin, puis il dressa la colonne de gauche et l''appela Boaz. '
  '22':
  - type: text
    content: Il y avait sur le sommet des colonnes une sculpture qui représentait des lis. Ainsi fut terminée la fabrication des colonnes.
  '23':
  - type: text
    content: 'Il fit la cuve en métal fondu. Elle faisait 5 mètres d''un bord à l''autre et était entièrement ronde. Elle faisait 2 mètres et demi de haut et l''on pouvait mesurer sa circonférence avec un cordon de 15 mètres. '
  '24':
  - type: text
    content: 'Des coloquintes en faisaient le tour, sous le rebord, 20 par mètre, sur tout le pourtour de la cuve; disposées sur deux rangs, les coloquintes avaient été fondues avec elle d''une seule pièce. '
  '25':
  - type: text
    content: 'Elle était posée sur 12 bœufs, 3 tournés vers le nord, 3 vers l''ouest, 3 vers le sud et 3 vers l''est; la cuve reposait sur eux et toute la partie postérieure de leur corps était à l''intérieur. '
  '26':
  - type: text
    content: Elle était épaisse de 8 centimètres et son bord, pareil à celui d'une coupe, avait la forme d'une fleur de lis. Elle pouvait contenir 44'000 litres.
  '27':
  - type: text
    content: 'Il fit les dix bases en bronze. Chacune faisait 2 mètres de long, 2 de large et un et demi de haut. '
  '28':
  - type: text
    content: 'Voici en quoi consistaient ces bases: elles étaient formées de panneaux attachés aux coins par des montants. '
  '29':
  - type: text
    content: 'Sur les panneaux qui étaient entre les montants figuraient des lions, des bœufs et des chérubins. Sur les montants, au-dessus comme au-dessous des lions et des bœufs, il y avait des ornements qui pendaient en festons. '
  '3':
  - type: text
    content: 'On couvrit de cèdre les chambres supportées par les colonnes. Il y en avait 45, soit 15 par étage. '
  '30':
  - type: text
    content: 'Chaque base avait quatre roues en bronze avec des essieux en bronze. Aux quatre angles se trouvaient des épaulements en métal fondu, au-dessous du bassin et plus bas que les festons. '
  '31':
  - type: text
    content: 'Le couronnement d''une base présentait à l''intérieur une ouverture qui se prolongeait de 50 centimètres vers le haut. Cette ouverture était ronde, comme pour les objets de ce genre, et elle faisait 75 centimètres de large; il s''y trouvait aussi des sculptures. Les panneaux étaient carrés, et non arrondis. '
  '32':
  - type: text
    content: 'Les quatre roues se trouvaient sous les panneaux, et les essieux des roues étaient fixés à la base: chacune faisait 75 centimètres de haut. '
  '33':
  - type: text
    content: 'Les roues étaient faites comme celles d''un char. Leurs essieux, leurs jantes, leurs rayons et leurs moyeux, tout était en métal fondu. '
  '34':
  - type: text
    content: 'Il y avait aux quatre angles de chaque base quatre épaulements de la même pièce que la base. '
  '35':
  - type: text
    content: 'La partie supérieure de la base se terminait par un cercle de 25 centimètres de hauteur, et ses appuis et ses panneaux étaient faits de la même pièce. '
  '36':
  - type: text
    content: 'Sur les plaques des appuis et sur les panneaux, il grava des chérubins, des lions et des palmes, en fonction de la place disponible, ainsi que des guirlandes tout autour. '
  '37':
  - type: text
    content: 'C''est ainsi qu''il fit les dix bases: le métal fondu, la mesure et la forme étaient les mêmes pour toutes.'
  '38':
  - type: text
    content: 'Il fit 10 bassins en bronze. Chaque bassin pouvait contenir 880 litres, faisait 2 mètres et reposait sur l''une des dix bases. '
  '39':
  - type: text
    content: Il plaça 5 bases sur le côté droit du temple, et 5 sur le côté gauche. Quant à la cuve, il la plaça du côté droit du temple, au sud-est.
  '4':
  - type: text
    content: 'Il y avait trois étages, et à chaque étage se trouvaient des fenêtres, les unes vis-à-vis des autres. '
  '40':
  - type: text
    content: Hiram fabriqua encore les cendriers, les pelles et les coupes.
  - type: text
    content: 'C''est ainsi qu''Hiram termina tout le travail que le roi Salomon lui fit faire pour la maison de l''Eternel: '
  '41':
  - type: text
    content: 'deux colonnes, avec les deux chapiteaux et leurs bourrelets sur le sommet des colonnes; les deux treillis, pour couvrir les deux bourrelets des chapiteaux sur le sommet des colonnes; '
  '42':
  - type: text
    content: 'les 400 grenades pour les deux treillis, deux rangées de grenades par treillis, pour couvrir les deux bourrelets des chapiteaux sur le sommet des colonnes; '
  '43':
  - type: text
    content: 'les 10 bases avec les 10 bassins qui vont dessus; '
  '44':
  - type: text
    content: 'la cuve et les 12 bœufs qui vont sous la cuve; '
  '45':
  - type: text
    content: 'les cendriers, les pelles et les coupes. Tous ces ustensiles que le roi Salomon fit faire à Hiram pour la maison de l''Eternel étaient en bronze poli. '
  '46':
  - type: text
    content: 'Le roi les fit fondre dans la plaine du Jourdain dans un sol argileux, entre Succoth et Tsarthan. '
  '47':
  - type: text
    content: Salomon laissa faire tous ces ustensiles sans vérifier le poids du bronze, tant il y en avait.
  '48':
  - type: text
    content: 'Salomon fit encore tous les autres ustensiles pour la maison de l''Eternel: l''autel en or; la table en or sur laquelle on mettait les pains consacrés; '
  '49':
  - type: text
    content: 'les chandeliers en or pur, cinq à droite et cinq à gauche, devant le sanctuaire, avec les fleurs, les lampes et les mouchettes d''or; '
  '5':
  - type: text
    content: Toutes les portes et tous les poteaux étaient faits de poutres, de forme rectangulaire. A chacun des trois étages, les ouvertures se trouvaient les unes vis-à-vis des autres.
  '50':
  - type: text
    content: les bassins, les couteaux, les coupes, les tasses et les brûle-parfums en or pur; les gonds en or pour la porte située à l'intérieur du temple, à l'entrée du lieu très saint, et pour la porte de la salle située à l'entrée du temple.
  '51':
  - type: text
    content: Ainsi fut terminé tout le travail que le roi Salomon fit pour la maison de l'Eternel. Puis il apporta l'argent, l'or et les ustensiles que son père David avait consacrés et il les mit parmi les trésors de la maison de l'Eternel.
  '6':
  - type: text
    content: 'Il fit le «portique des colonnes», long de 25 mètres et large de 15, ainsi qu''un autre portique par-devant, avec des colonnes et un auvent sur la façade. '
  '7':
  - type: text
    content: Il fit le «portique du trône», ou «portique du jugement», où il rendait la justice, et il le couvrit de cèdre, depuis le sol jusqu'au plafond.
  '8':
  - type: text
    content: Son bâtiment d'habitation fut construit de la même manière, dans une autre cour, derrière le portique. Il fit aussi un bâtiment du même genre que ce portique pour la fille du pharaon, qu'il avait prise pour femme.
  '9':
  - type: text
    content: 'Pour toutes ces constructions, on employa de magnifiques pierres, taillées sur mesure, sciées avec la scie sur leur face intérieure et extérieure. On employa ces pierres depuis les fondations jusqu''aux corniches, et à l''extérieur jusqu''à la grande cour. '
