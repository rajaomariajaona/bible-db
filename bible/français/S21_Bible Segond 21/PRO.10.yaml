document_id: PRO.10,152
type_code: fra
verses:
  '1':
  - type: heading
    content: Proverbes de Salomon
  - type: heading
    content: 10.1–22.16
  - type: heading
    content: Le méchant et le juste
  - type: text
    content: Proverbes de Salomon.
  - type: text
    content: Un fils sage fait la joie d'un père,
  - type: text
    content: et un fils stupide le chagrin de sa mère.
  '10':
  - type: text
    content: Celui qui cligne de l'œil est cause de souffrance,
  - type: text
    content: et celui qui parle comme un fou court à sa perte.
  '11':
  - type: text
    content: La bouche du juste est une source de vie,
  - type: text
    content: mais la violence accompagne tout ce que disent les méchants.
  '12':
  - type: text
    content: La haine fait surgir des conflits,
  - type: text
    content: alors que *l'amour couvre toutes les fautes
  - type: note
    content: 'L''amour… fautes: cité en 1 Pierre 4.8; renvoi à ce principe en Jacques 5.20.'
  - type: text
    content: .
  '13':
  - type: text
    content: On trouve la sagesse sur les lèvres de l'homme intelligent,
  - type: text
    content: mais le bâton sur le dos de celui qui est dépourvu de bon sens.
  '14':
  - type: text
    content: Les sages retiennent la connaissance,
  - type: text
    content: mais quand un fou parle, la ruine est proche.
  '15':
  - type: text
    content: La fortune du riche est sa ville fortifiée,
  - type: text
    content: mais ce qui fait la ruine des faibles, c'est leur pauvreté.
  '16':
  - type: text
    content: Le salaire du juste sert à la vie,
  - type: text
    content: le revenu du méchant sert au péché.
  '17':
  - type: text
    content: Celui qui garde l'instruction prend le chemin de la vie,
  - type: text
    content: mais celui qui délaisse l'avertissement s'égare.
  '18':
  - type: text
    content: Celui qui dissimule de la haine a des lèvres menteuses,
  - type: text
    content: et celui qui propage des racontars est stupide.
  '19':
  - type: text
    content: Celui qui parle beaucoup ne manque pas de pécher,
  - type: text
    content: mais celui qui met un frein à ses lèvres est un homme avisé.
  '2':
  - type: text
    content: Les trésors acquis par la méchanceté ne sont d'aucun profit,
  - type: text
    content: mais la justice délivre de la mort.
  '20':
  - type: text
    content: La langue du juste est un argent affiné,
  - type: text
    content: mais le cœur des méchants ne vaut pas grand-chose.
  '21':
  - type: text
    content: Par ses lèvres, le juste est le berger d'un grand nombre,
  - type: text
    content: tandis que les fous meurent par manque de bon sens.
  '22':
  - type: text
    content: C'est la bénédiction de l'Eternel qui enrichit,
  - type: text
    content: et il ne la fait suivre d'aucun chagrin
  - type: note
    content: 'Il ne la fait suivre d''aucun chagrin: ou l''effort n''y ajoutera rien.'
  - type: text
    content: .
  '23':
  - type: text
    content: Commettre le crime paraît un jeu à l'homme stupide,
  - type: text
    content: mais la sagesse appartient à l'homme intelligent.
  '24':
  - type: text
    content: Ce que redoute le méchant, c'est ce qui lui arrive,
  - type: text
    content: tandis que les justes reçoivent ce qu'ils désirent.
  '25':
  - type: text
    content: Quand la tempête passe, le méchant disparaît,
  - type: text
    content: tandis que le juste a un fondement éternel.
  '26':
  - type: text
    content: Ce que le vinaigre est pour les dents et la fumée pour les yeux,
  - type: text
    content: le paresseux l'est pour celui qui l'envoie.
  '27':
  - type: text
    content: La crainte de l'Eternel prolonge la vie,
  - type: text
    content: tandis que les années des méchants sont abrégées.
  '28':
  - type: text
    content: L'espérance des justes, c'est la joie,
  - type: text
    content: tandis que l'attente des méchants meurt avec eux.
  '29':
  - type: text
    content: La voie de l'Eternel est un rempart pour l'intégrité,
  - type: text
    content: mais elle provoque la ruine de ceux qui commettent l'injustice.
  '3':
  - type: text
    content: L'Eternel ne laisse pas le juste souffrir de la faim,
  - type: text
    content: mais il repousse l'avidité des méchants.
  '30':
  - type: text
    content: Le juste ne sera jamais ébranlé,
  - type: text
    content: tandis que les méchants n'habiteront pas le pays.
  '31':
  - type: text
    content: La bouche du juste a pour fruit la sagesse,
  - type: text
    content: mais la langue perverse sera coupée.
  '32':
  - type: text
    content: Les lèvres du juste connaissent la grâce,
  - type: text
    content: et la bouche des méchants la perversité.
  '4':
  - type: text
    content: Celui qui agit avec nonchalance s'appauvrit,
  - type: text
    content: mais la main des personnes actives est source de richesse.
  '5':
  - type: text
    content: Celui qui moissonne pendant l'été est un fils avisé,
  - type: text
    content: celui qui dort pendant la moisson est un fils qui fait honte.
  '6':
  - type: text
    content: Les bénédictions reposent sur la tête du juste,
  - type: text
    content: mais la violence accompagne tout ce que disent les méchants.
  '7':
  - type: text
    content: Le souvenir du juste est en bénédiction,
  - type: text
    content: tandis que le nom des méchants tombe en pourriture.
  '8':
  - type: text
    content: L'homme au cœur sage fait bon accueil aux commandements,
  - type: text
    content: mais celui qui parle comme un fou court à sa perte.
  '9':
  - type: text
    content: Celui qui marche dans l'intégrité marche en sécurité,
  - type: text
    content: mais celui qui emprunte des voies tortueuses sera découvert.
