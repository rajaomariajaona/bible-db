document_id: PRO.10
type_code: fra
segments:
- type: usfm
  marker: ms1
  children:
  - type: text
    text: Proverbes de Salomon
  marker-yv: yv-h
- type: usfm
  marker: mr
  children:
  - type: text
    text: 10.1–22.16
  marker-yv: yv-h
- type: usfm
  marker: s1
  children:
  - type: text
    text: Le méchant et le juste
  marker-yv: yv-h
- type: usfm
  marker: d
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Proverbes de Salomon.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Un fils sage fait la joie d'un père,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et un fils stupide le chagrin de sa mère.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Les trésors acquis par la méchanceté ne sont d'aucun profit,
- type: usfm
  marker: q1
  children:
  - type: text
    text: mais la justice délivre de la mort.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: L'Eternel ne laisse pas le juste souffrir de la faim,
- type: usfm
  marker: q1
  children:
  - type: text
    text: mais il repousse l'avidité des méchants.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Celui qui agit avec nonchalance s'appauvrit,
- type: usfm
  marker: q1
  children:
  - type: text
    text: mais la main des personnes actives est source de richesse.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Celui qui moissonne pendant l'été est un fils avisé,
- type: usfm
  marker: q1
  children:
  - type: text
    text: celui qui dort pendant la moisson est un fils qui fait honte.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Les bénédictions reposent sur la tête du juste,
- type: usfm
  marker: q1
  children:
  - type: text
    text: mais la violence accompagne tout ce que disent les méchants.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Le souvenir du juste est en bénédiction,
- type: usfm
  marker: q1
  children:
  - type: text
    text: tandis que le nom des méchants tombe en pourriture.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: L'homme au cœur sage fait bon accueil aux commandements,
- type: usfm
  marker: q1
  children:
  - type: text
    text: mais celui qui parle comme un fou court à sa perte.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Celui qui marche dans l'intégrité marche en sécurité,
- type: usfm
  marker: q1
  children:
  - type: text
    text: mais celui qui emprunte des voies tortueuses sera découvert.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Celui qui cligne de l'œil est cause de souffrance,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et celui qui parle comme un fou court à sa perte.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: La bouche du juste est une source de vie,
- type: usfm
  marker: q1
  children:
  - type: text
    text: mais la violence accompagne tout ce que disent les méchants.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: La haine fait surgir des conflits,
- type: usfm
  marker: q1
  children:
  - type: text
    text: alors que *l'amour couvre toutes les fautes
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '10.12 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'L''amour… fautes: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'cité en '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 1 Pierre 4.8
      metadata:
        usfm: 1PE.4.8
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '; renvoi à ce principe en '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Jacques 5.20
      metadata:
        usfm: JAS.5.20
    - type: usfm
      marker: ft
      children:
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: On trouve la sagesse sur les lèvres de l'homme intelligent,
- type: usfm
  marker: q1
  children:
  - type: text
    text: mais le bâton sur le dos de celui qui est dépourvu de bon sens.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Les sages retiennent la connaissance,
- type: usfm
  marker: q1
  children:
  - type: text
    text: mais quand un fou parle, la ruine est proche.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: La fortune du riche est sa ville fortifiée,
- type: usfm
  marker: q1
  children:
  - type: text
    text: mais ce qui fait la ruine des faibles, c'est leur pauvreté.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Le salaire du juste sert à la vie,
- type: usfm
  marker: q1
  children:
  - type: text
    text: le revenu du méchant sert au péché.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Celui qui garde l'instruction prend le chemin de la vie,
- type: usfm
  marker: q1
  children:
  - type: text
    text: mais celui qui délaisse l'avertissement s'égare.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Celui qui dissimule de la haine a des lèvres menteuses,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et celui qui propage des racontars est stupide.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Celui qui parle beaucoup ne manque pas de pécher,
- type: usfm
  marker: q1
  children:
  - type: text
    text: mais celui qui met un frein à ses lèvres est un homme avisé.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: La langue du juste est un argent affiné,
- type: usfm
  marker: q1
  children:
  - type: text
    text: mais le cœur des méchants ne vaut pas grand-chose.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Par ses lèvres, le juste est le berger d'un grand nombre,
- type: usfm
  marker: q1
  children:
  - type: text
    text: tandis que les fous meurent par manque de bon sens.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: C'est la bénédiction de l'Eternel qui enrichit,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et il ne la fait suivre d'aucun chagrin
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '10.22 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Il ne la fait suivre d''aucun chagrin: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ou l'effort n'y ajoutera rien.
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: Commettre le crime paraît un jeu à l'homme stupide,
- type: usfm
  marker: q1
  children:
  - type: text
    text: mais la sagesse appartient à l'homme intelligent.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: Ce que redoute le méchant, c'est ce qui lui arrive,
- type: usfm
  marker: q1
  children:
  - type: text
    text: tandis que les justes reçoivent ce qu'ils désirent.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: Quand la tempête passe, le méchant disparaît,
- type: usfm
  marker: q1
  children:
  - type: text
    text: tandis que le juste a un fondement éternel.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: Ce que le vinaigre est pour les dents et la fumée pour les yeux,
- type: usfm
  marker: q1
  children:
  - type: text
    text: le paresseux l'est pour celui qui l'envoie.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: La crainte de l'Eternel prolonge la vie,
- type: usfm
  marker: q1
  children:
  - type: text
    text: tandis que les années des méchants sont abrégées.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: L'espérance des justes, c'est la joie,
- type: usfm
  marker: q1
  children:
  - type: text
    text: tandis que l'attente des méchants meurt avec eux.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: La voie de l'Eternel est un rempart pour l'intégrité,
- type: usfm
  marker: q1
  children:
  - type: text
    text: mais elle provoque la ruine de ceux qui commettent l'injustice.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: Le juste ne sera jamais ébranlé,
- type: usfm
  marker: q1
  children:
  - type: text
    text: tandis que les méchants n'habiteront pas le pays.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: La bouche du juste a pour fruit la sagesse,
- type: usfm
  marker: q1
  children:
  - type: text
    text: mais la langue perverse sera coupée.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '32'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: Les lèvres du juste connaissent la grâce,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et la bouche des méchants la perversité.
