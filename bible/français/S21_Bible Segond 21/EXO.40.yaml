document_id: EXO.40,152
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Mise en place du tabernacle
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'L''Eternel dit à Moïse: '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'Tu verseras de l''huile sur l''autel des holocaustes et tous ses ustensiles, tu consacreras l''autel et l''autel sera très saint. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'Tu verseras de l''huile sur la cuve avec sa base et tu la consacreras. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'Tu feras avancer Aaron et ses fils vers l''entrée de la tente de la rencontre et tu les laveras avec de l''eau. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'Tu habilleras Aaron des vêtements sacrés, tu verseras de l''huile sur lui et tu le consacreras pour qu''il soit à mon service en tant que prêtre. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'Tu feras approcher ses fils, tu les habilleras des tuniques '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: et tu les consacreras par onction, comme tu l'auras fait pour leur père, pour qu'ils soient à mon service en tant que prêtres. Cette onction leur assurera à perpétuité l'exercice de la fonction de prêtre au fil des générations.»
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'Moïse se conforma à tout ce que l''Eternel lui avait ordonné, c''est exactement ainsi qu''il agit. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'Le premier jour du premier mois de la deuxième année [après leur sortie d''Egypte], le tabernacle fut dressé. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'Moïse dressa le tabernacle; il posa ses bases, plaça les planches et les barres et éleva les colonnes. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: Il étendit la tenture sur le tabernacle et mit sa couverture par-dessus, comme l'Eternel le lui avait ordonné.
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: '«Le premier jour du premier mois, tu dresseras le tabernacle, la tente de la rencontre. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: 'Il prit le témoignage et le plaça dans l''arche; il mit les barres à l''arche et posa le propitiatoire sur l''arche. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: 'Puis il apporta l''arche dans le tabernacle, mit le voile de séparation et cacha ainsi l''arche du témoignage, comme l''Eternel le lui avait ordonné. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: 'Il plaça la table dans la tente de la rencontre, du côté nord du tabernacle, devant le voile, '
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: 'et il y déposa les pains en ordre devant l''Eternel, comme l''Eternel le lui avait ordonné. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: 'Il plaça le chandelier dans la tente de la rencontre, en face de la table, du côté sud du tabernacle, '
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: 'et il arrangea ses lampes devant l''Eternel, comme l''Eternel le lui avait ordonné. '
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: 'Il plaça l''autel d''or dans la tente de la rencontre, devant le voile, '
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: 'et il y fit brûler le parfum odoriférant, comme l''Eternel le lui avait ordonné. '
  '28':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: Ensuite il plaça le rideau à l'entrée du tabernacle.
  '29':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: 'Il plaça l''autel des holocaustes près de l''entrée du tabernacle, de la tente de la rencontre, et il y offrit l''holocauste et l''offrande, comme l''Eternel le lui avait ordonné. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'Tu y placeras l''arche du témoignage et tu cacheras l''arche avec le voile. '
  '30':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '30'
    - type: text
      text: 'Il plaça la cuve entre la tente de la rencontre et l''autel et il y mit de l''eau pour les ablutions. '
  '31':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '31'
    - type: text
      text: 'Moïse, Aaron et ses fils s''y lavèrent les mains et les pieds. '
  '32':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '32'
    - type: text
      text: 'Lorsqu''ils entrèrent dans la tente de la rencontre et qu''ils s''approchèrent de l''autel, ils se lavèrent, comme l''Eternel l''avait ordonné à Moïse. '
  '33':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '33'
    - type: text
      text: Enfin, il dressa le parvis autour du tabernacle et de l'autel et il mit le rideau à la porte de cette cour. C'est ainsi que Moïse mit un terme aux travaux.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Présence de la gloire de l'Eternel sur le tabernacle
    marker-yv: yv-h
  '34':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '34'
    - type: text
      text: 'Alors la nuée couvrit la tente de la rencontre et la gloire de l''Eternel remplit le tabernacle. '
  '35':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '35'
    - type: text
      text: Moïse ne pouvait pas entrer dans la tente de la rencontre parce que la nuée restait dessus et que la gloire de l'Eternel remplissait le tabernacle.
  '36':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '36'
    - type: text
      text: 'A chacune de leurs étapes, les Israélites partaient quand la nuée s''élevait au-dessus du tabernacle. '
  '37':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '37'
    - type: text
      text: 'Et si la nuée ne s''élevait pas, ils ne partaient pas, jusqu''à ce qu''elle s''élève. '
  '38':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '38'
    - type: text
      text: De jour, la nuée de l'Eternel était sur le tabernacle; de nuit, il y avait un feu à l'intérieur de la nuée. Elle était visible de toute la communauté d'Israël à chacune de leurs étapes.
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'Tu apporteras la table et tu la disposeras en ordre. Tu apporteras le chandelier et tu en arrangeras les lampes. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'Tu placeras l''autel d''or pour le parfum devant l''arche du témoignage et tu mettras le rideau à l''entrée du tabernacle. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'Tu placeras l''autel des holocaustes devant l''entrée du tabernacle, de la tente de la rencontre. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'Tu placeras la cuve entre la tente de la rencontre et l''autel et tu y mettras de l''eau. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: Tu placeras le parvis autour et tu mettras le rideau à la porte de cette cour.
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: '»Tu prendras l''huile d''onction et tu en verseras sur le tabernacle et tout ce qu''il contient. Tu le consacreras avec tous ses ustensiles et il sera saint. '
