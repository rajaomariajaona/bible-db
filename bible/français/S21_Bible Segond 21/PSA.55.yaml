document_id: PSA.55
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Confiance du psalmiste trahie par un ami
  marker-yv: yv-h
- type: usfm
  marker: d
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Au chef de chœur, avec instruments à cordes. Cantique de David.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: O Dieu, prête l'oreille à ma prière
- type: usfm
  marker: q1
  children:
  - type: text
    text: et ne te dérobe pas à mes supplications!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Ecoute-moi et réponds-moi!
- type: usfm
  marker: q1
  children:
  - type: text
    text: J'erre çà et là dans mon chagrin et je m'agite
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: à cause de la voix de l'ennemi et de l'oppression du méchant,
- type: usfm
  marker: q1
  children:
  - type: text
    text: car ils m'accablent de maux,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ils me poursuivent avec colère.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Mon cœur tremble au fond de moi,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et les terreurs de la mort fondent sur moi.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: La peur et l'épouvante m'assaillent,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et la terreur m'envahit.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Je dis: «Si seulement j''avais les ailes de la colombe!'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Je m'envolerais et je trouverais le repos.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Oui, je fuirais bien loin,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'j''irais habiter au désert. '
  - type: usfm
    marker: qs
    children:
    - type: text
      text: – Pause.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: »Je m'échapperais bien vite,
- type: usfm
  marker: q1
  children:
  - type: text
    text: plus rapide que le vent impétueux, que la tempête.»
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Sème la confusion, Seigneur, brouille leur langage,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'car je ne vois dans la ville que violence et querelles:'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: jour et nuit elles font le tour de ses murailles.
- type: usfm
  marker: q1
  children:
  - type: text
    text: L'injustice et la misère y habitent,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: les crimes sont au milieu d'elle,
- type: usfm
  marker: q1
  children:
  - type: text
    text: la fraude et la tromperie ne quittent pas ses places.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Ce n''est pas un ennemi qui m''insulte: je le supporterais;'
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'ce n''est pas mon adversaire qui s''attaque à moi:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: je me cacherais devant lui;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: c'est toi, un homme de mon rang,
- type: usfm
  marker: q1
  children:
  - type: text
    text: toi, mon confident et mon ami!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Ensemble nous vivions dans une douce intimité,
- type: usfm
  marker: q1
  children:
  - type: text
    text: nous allions avec la foule à la maison de Dieu!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Que la mort les surprenne,
- type: usfm
  marker: q1
  children:
  - type: text
    text: qu'ils descendent vivants au séjour des morts,
- type: usfm
  marker: q1
  children:
  - type: text
    text: car la méchanceté est dans leur demeure, elle est dans leur cœur!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Quant à moi, je crie à Dieu,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et l'Eternel me sauvera.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Le soir, le matin, à midi, je soupire et je gémis,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et il entendra ma voix.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Il me délivrera de leurs assauts et me rendra la paix,
- type: usfm
  marker: q1
  children:
  - type: text
    text: car ils sont nombreux contre moi.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Dieu entendra, et il les humiliera,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'lui qui siège de toute éternité. '
  - type: usfm
    marker: qs
    children:
    - type: text
      text: – Pause.
- type: usfm
  marker: q1
  children:
  - type: text
    text: En effet, il n'y a pas de changement en eux,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ils ne craignent pas Dieu.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Cet homme porte la main contre ceux qui étaient en paix avec lui,
- type: usfm
  marker: q1
  children:
  - type: text
    text: il viole son alliance.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: Sa bouche est plus douce que la crème, mais la guerre est dans son cœur;
- type: usfm
  marker: q1
  children:
  - type: text
    text: ses paroles sont plus onctueuses que l'huile,
- type: usfm
  marker: q1
  children:
  - type: text
    text: mais ce sont des épées dégainées.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: Remets ton sort à l'Eternel, et il te soutiendra.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Il ne laissera jamais trébucher le juste.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: Et toi, ô Dieu, tu les feras descendre au fond de la tombe,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ces hommes sanguinaires et trompeurs;
- type: usfm
  marker: q1
  children:
  - type: text
    text: ils n'atteindront pas la moitié de leur vie.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Quant à moi, je me confie en toi.
