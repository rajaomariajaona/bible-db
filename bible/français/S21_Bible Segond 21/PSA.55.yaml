document_id: PSA.55,152
type_code: fra
verses:
  '1':
  - type: heading
    content: Confiance du psalmiste trahie par un ami
  - type: text
    content: Au chef de chœur, avec instruments à cordes. Cantique de David.
  '10':
  - type: text
    content: Sème la confusion, Seigneur, brouille leur langage,
  - type: text
    content: 'car je ne vois dans la ville que violence et querelles:'
  '11':
  - type: text
    content: jour et nuit elles font le tour de ses murailles.
  - type: text
    content: L'injustice et la misère y habitent,
  '12':
  - type: text
    content: les crimes sont au milieu d'elle,
  - type: text
    content: la fraude et la tromperie ne quittent pas ses places.
  '13':
  - type: text
    content: 'Ce n''est pas un ennemi qui m''insulte: je le supporterais;'
  - type: text
    content: 'ce n''est pas mon adversaire qui s''attaque à moi:'
  - type: text
    content: je me cacherais devant lui;
  '14':
  - type: text
    content: c'est toi, un homme de mon rang,
  - type: text
    content: toi, mon confident et mon ami!
  '15':
  - type: text
    content: Ensemble nous vivions dans une douce intimité,
  - type: text
    content: nous allions avec la foule à la maison de Dieu!
  '16':
  - type: text
    content: Que la mort les surprenne,
  - type: text
    content: qu'ils descendent vivants au séjour des morts,
  - type: text
    content: car la méchanceté est dans leur demeure, elle est dans leur cœur!
  '17':
  - type: text
    content: Quant à moi, je crie à Dieu,
  - type: text
    content: et l'Eternel me sauvera.
  '18':
  - type: text
    content: Le soir, le matin, à midi, je soupire et je gémis,
  - type: text
    content: et il entendra ma voix.
  '19':
  - type: text
    content: Il me délivrera de leurs assauts et me rendra la paix,
  - type: text
    content: car ils sont nombreux contre moi.
  '2':
  - type: text
    content: O Dieu, prête l'oreille à ma prière
  - type: text
    content: et ne te dérobe pas à mes supplications!
  '20':
  - type: text
    content: Dieu entendra, et il les humiliera,
  - type: text
    content: 'lui qui siège de toute éternité. '
  - type: text
    content: – Pause.
  - type: text
    content: En effet, il n'y a pas de changement en eux,
  - type: text
    content: ils ne craignent pas Dieu.
  '21':
  - type: text
    content: Cet homme porte la main contre ceux qui étaient en paix avec lui,
  - type: text
    content: il viole son alliance.
  '22':
  - type: text
    content: Sa bouche est plus douce que la crème, mais la guerre est dans son cœur;
  - type: text
    content: ses paroles sont plus onctueuses que l'huile,
  - type: text
    content: mais ce sont des épées dégainées.
  '23':
  - type: text
    content: Remets ton sort à l'Eternel, et il te soutiendra.
  - type: text
    content: Il ne laissera jamais trébucher le juste.
  '24':
  - type: text
    content: Et toi, ô Dieu, tu les feras descendre au fond de la tombe,
  - type: text
    content: ces hommes sanguinaires et trompeurs;
  - type: text
    content: ils n'atteindront pas la moitié de leur vie.
  - type: text
    content: Quant à moi, je me confie en toi.
  '3':
  - type: text
    content: Ecoute-moi et réponds-moi!
  - type: text
    content: J'erre çà et là dans mon chagrin et je m'agite
  '4':
  - type: text
    content: à cause de la voix de l'ennemi et de l'oppression du méchant,
  - type: text
    content: car ils m'accablent de maux,
  - type: text
    content: ils me poursuivent avec colère.
  '5':
  - type: text
    content: Mon cœur tremble au fond de moi,
  - type: text
    content: et les terreurs de la mort fondent sur moi.
  '6':
  - type: text
    content: La peur et l'épouvante m'assaillent,
  - type: text
    content: et la terreur m'envahit.
  '7':
  - type: text
    content: 'Je dis: «Si seulement j''avais les ailes de la colombe!'
  - type: text
    content: Je m'envolerais et je trouverais le repos.
  '8':
  - type: text
    content: Oui, je fuirais bien loin,
  - type: text
    content: 'j''irais habiter au désert. '
  - type: text
    content: – Pause.
  '9':
  - type: text
    content: »Je m'échapperais bien vite,
  - type: text
    content: plus rapide que le vent impétueux, que la tempête.»
