document_id: PHP.1
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Salutation et louange
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: De la part de Paul et Timothée, serviteurs de Jésus-Christ, à tous les saints
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1.1 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Saints: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: manière de désigner les chrétiens en tant que personnes consacrées à Dieu et appelées à avoir le comportement qui découle de leur appartenance à ce Dieu.
    marker-yv: yv-n
  - type: text
    text: ' en Jésus-Christ qui sont à Philippes, aux responsables et aux diacres: '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: que la grâce et la paix vous soient données de la part de Dieu notre Père et du Seigneur Jésus-Christ!
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Je dis à mon Dieu ma reconnaissance de tout le souvenir que j''ai de vous. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Dans toutes mes prières pour vous tous, je ne cesse d''exprimer ma joie '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'à cause de la part que vous prenez à l''Evangile depuis le premier jour jusqu''à maintenant. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Je suis persuadé que celui qui a commencé en vous cette bonne œuvre la poursuivra jusqu''à son terme, jusqu''au jour de Jésus-Christ. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Il est juste que je pense cela de vous tous parce que je vous porte dans mon cœur, vous qui participez tous à la même grâce que moi, aussi bien dans ma détention que dans la défense et l''affermissement de l''Evangile. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'En effet, Dieu m''est témoin que je vous chéris tous avec la tendresse de Jésus-Christ. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Et voici ce que je demande dans mes prières: c''est que votre amour augmente de plus en plus en connaissance et en pleine intelligence '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'pour que vous puissiez discerner ce qui est essentiel. Ainsi vous serez purs et irréprochables pour le jour de Christ, '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: remplis du fruit de justice qui vient par Jésus-Christ à la gloire et à la louange de Dieu.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Nouvelles de Paul
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Je désire que vous le sachiez, frères et sœurs, ce qui m''est arrivé a plutôt contribué aux progrès de l''Evangile. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: En effet, dans tout le prétoire
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1.13 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Le prétoire: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: si Paul était à Rome à ce moment-là, il peut s'agir de la garde prétorienne, attachée à la personne de l'empereur; sinon, le terme désigne la résidence officielle du gouverneur d'une province.
    marker-yv: yv-n
  - type: text
    text: ' et partout ailleurs, personne n''ignore que c''est pour Christ que je suis en prison. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Et la plupart des frères et sœurs, encouragés dans le Seigneur par mes chaînes, ont plus d'assurance pour annoncer sans crainte la parole.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Certains, il est vrai, proclament Christ par jalousie, avec un esprit de rivalité, mais d''autres le proclament avec de bonnes intentions. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Les uns agissent par amour, sachant que je suis là pour la défense de l''Evangile; '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'les autres, animés d''un esprit de rivalité, annoncent Christ avec des intentions qui ne sont pas pures et avec la pensée d''augmenter les souffrances de ma détention. '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Qu''importe? De toute manière, que ce soit pour de mauvaises raisons, que ce soit sincèrement, Christ est annoncé. Je m''en réjouis et je m''en réjouirai encore, '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'car je sais que cela aboutira à mon salut, grâce à vos prières et à l''assistance de l''Esprit de Jésus-Christ. '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Conformément à ma ferme attente et à mon espérance, je n''aurai honte de rien, mais maintenant comme toujours, la grandeur de Christ sera manifestée avec une pleine assurance dans mon corps, soit par ma vie, soit par ma mort. '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: En effet, Christ est ma vie et mourir représente un gain.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Cependant, s''il est utile pour ma tâche que je vive ici-bas, je ne saurais dire ce que je dois préférer. '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Je suis tiraillé des deux côtés: j''ai le désir de m''en aller et d''être avec Christ, ce qui est de beaucoup le meilleur, '
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'mais à cause de vous il est plus nécessaire que je continue à vivre ici-bas. '
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Persuadé de cela, je sais que je resterai et demeurerai avec vous tous, pour votre progrès et votre joie dans la foi. '
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: Grâce à mon retour auprès de vous, vous aurez alors dans ma personne une raison d'éprouver encore plus de fierté en Jésus-Christ.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Appel à suivre l'exemple de Christ
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'Seulement, conduisez-vous d''une manière digne de l''Evangile du Christ. Ainsi, que je vienne vous voir ou que je sois absent, j''entendrai dire de vous que vous tenez ferme dans un même esprit, combattant d''un même cœur pour la foi de l''Evangile, '
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'sans vous laisser effrayer en rien par les adversaires. Pour eux c''est une preuve de perdition, mais pour vous de salut, et cela vient de Dieu. '
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'En effet, il vous a été fait la grâce non seulement de croire en Christ, mais encore de souffrir pour lui '
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: en menant le même combat que celui que vous m'avez vu mener et que, vous l'apprenez maintenant, je mène encore.
