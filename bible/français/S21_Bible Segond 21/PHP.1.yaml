document_id: PHP.1,152
type_code: fra
verses:
  '1':
  - type: heading
    content: Salutation et louange
  - type: text
    content: De la part de Paul et Timothée, serviteurs de Jésus-Christ, à tous les saints
  - type: note
    content: 'Saints: manière de désigner les chrétiens en tant que personnes consacrées à Dieu et appelées à avoir le comportement qui découle de leur appartenance à ce Dieu.'
  - type: text
    content: ' en Jésus-Christ qui sont à Philippes, aux responsables et aux diacres: '
  '10':
  - type: text
    content: 'pour que vous puissiez discerner ce qui est essentiel. Ainsi vous serez purs et irréprochables pour le jour de Christ, '
  '11':
  - type: text
    content: remplis du fruit de justice qui vient par Jésus-Christ à la gloire et à la louange de Dieu.
  - type: heading
    content: Nouvelles de Paul
  '12':
  - type: text
    content: 'Je désire que vous le sachiez, frères et sœurs, ce qui m''est arrivé a plutôt contribué aux progrès de l''Evangile. '
  '13':
  - type: text
    content: En effet, dans tout le prétoire
  - type: note
    content: 'Le prétoire: si Paul était à Rome à ce moment-là, il peut s''agir de la garde prétorienne, attachée à la personne de l''empereur; sinon, le terme désigne la résidence officielle du gouverneur d''une province.'
  - type: text
    content: ' et partout ailleurs, personne n''ignore que c''est pour Christ que je suis en prison. '
  '14':
  - type: text
    content: Et la plupart des frères et sœurs, encouragés dans le Seigneur par mes chaînes, ont plus d'assurance pour annoncer sans crainte la parole.
  '15':
  - type: text
    content: 'Certains, il est vrai, proclament Christ par jalousie, avec un esprit de rivalité, mais d''autres le proclament avec de bonnes intentions. '
  '16':
  - type: text
    content: 'Les uns agissent par amour, sachant que je suis là pour la défense de l''Evangile; '
  '17':
  - type: text
    content: 'les autres, animés d''un esprit de rivalité, annoncent Christ avec des intentions qui ne sont pas pures et avec la pensée d''augmenter les souffrances de ma détention. '
  '18':
  - type: text
    content: 'Qu''importe? De toute manière, que ce soit pour de mauvaises raisons, que ce soit sincèrement, Christ est annoncé. Je m''en réjouis et je m''en réjouirai encore, '
  '19':
  - type: text
    content: 'car je sais que cela aboutira à mon salut, grâce à vos prières et à l''assistance de l''Esprit de Jésus-Christ. '
  '2':
  - type: text
    content: que la grâce et la paix vous soient données de la part de Dieu notre Père et du Seigneur Jésus-Christ!
  '20':
  - type: text
    content: 'Conformément à ma ferme attente et à mon espérance, je n''aurai honte de rien, mais maintenant comme toujours, la grandeur de Christ sera manifestée avec une pleine assurance dans mon corps, soit par ma vie, soit par ma mort. '
  '21':
  - type: text
    content: En effet, Christ est ma vie et mourir représente un gain.
  '22':
  - type: text
    content: 'Cependant, s''il est utile pour ma tâche que je vive ici-bas, je ne saurais dire ce que je dois préférer. '
  '23':
  - type: text
    content: 'Je suis tiraillé des deux côtés: j''ai le désir de m''en aller et d''être avec Christ, ce qui est de beaucoup le meilleur, '
  '24':
  - type: text
    content: 'mais à cause de vous il est plus nécessaire que je continue à vivre ici-bas. '
  '25':
  - type: text
    content: 'Persuadé de cela, je sais que je resterai et demeurerai avec vous tous, pour votre progrès et votre joie dans la foi. '
  '26':
  - type: text
    content: Grâce à mon retour auprès de vous, vous aurez alors dans ma personne une raison d'éprouver encore plus de fierté en Jésus-Christ.
  - type: heading
    content: Appel à suivre l'exemple de Christ
  '27':
  - type: text
    content: 'Seulement, conduisez-vous d''une manière digne de l''Evangile du Christ. Ainsi, que je vienne vous voir ou que je sois absent, j''entendrai dire de vous que vous tenez ferme dans un même esprit, combattant d''un même cœur pour la foi de l''Evangile, '
  '28':
  - type: text
    content: 'sans vous laisser effrayer en rien par les adversaires. Pour eux c''est une preuve de perdition, mais pour vous de salut, et cela vient de Dieu. '
  '29':
  - type: text
    content: 'En effet, il vous a été fait la grâce non seulement de croire en Christ, mais encore de souffrir pour lui '
  '3':
  - type: text
    content: 'Je dis à mon Dieu ma reconnaissance de tout le souvenir que j''ai de vous. '
  '30':
  - type: text
    content: en menant le même combat que celui que vous m'avez vu mener et que, vous l'apprenez maintenant, je mène encore.
  '4':
  - type: text
    content: 'Dans toutes mes prières pour vous tous, je ne cesse d''exprimer ma joie '
  '5':
  - type: text
    content: 'à cause de la part que vous prenez à l''Evangile depuis le premier jour jusqu''à maintenant. '
  '6':
  - type: text
    content: 'Je suis persuadé que celui qui a commencé en vous cette bonne œuvre la poursuivra jusqu''à son terme, jusqu''au jour de Jésus-Christ. '
  '7':
  - type: text
    content: 'Il est juste que je pense cela de vous tous parce que je vous porte dans mon cœur, vous qui participez tous à la même grâce que moi, aussi bien dans ma détention que dans la défense et l''affermissement de l''Evangile. '
  '8':
  - type: text
    content: 'En effet, Dieu m''est témoin que je vous chéris tous avec la tendresse de Jésus-Christ. '
  '9':
  - type: text
    content: 'Et voici ce que je demande dans mes prières: c''est que votre amour augmente de plus en plus en connaissance et en pleine intelligence '
