document_id: JOB.3,152
type_code: fra
verses:
  '1':
  - type: usfm
    marker: ms1
    children:
    - type: text
      text: Dialogue entre Job et ses amis
    marker-yv: yv-h
  - type: usfm
    marker: mr
    children:
    - type: text
      text: 3.1–31.40
    marker-yv: yv-h
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Intervention n° 1 de Job
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Après cela, Job parla enfin, et il maudit le jour de sa naissance. '
  '10':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: En effet, elle n'a pas fermé les portes du ventre qui m'a porté, pour m'empêcher de connaître le malheur.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: »Pourquoi ne suis-je pas mort dans le ventre maternel?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Pourquoi n'ai-je pas expiré au sortir du ventre de ma mère?
  '12':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Pourquoi ai-je trouvé des genoux pour m'accueillir
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et des seins pour m'allaiter?
  '13':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: En effet, maintenant je serais couché, tranquille,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: je dormirais en ce moment, en plein repos,
  '14':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: avec les rois et les conseillers de la terre
  - type: usfm
    marker: q1
    children:
    - type: text
      text: qui se sont construit des monuments aujourd'hui en ruine,
  '15':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ou avec les princes qui possédaient de l'or
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et qui accumulaient de l'argent dans leurs maisons.
  '16':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ou bien, comme l'enfant mort-né qui est resté caché, je n'existerais pas,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: pareil aux tout-petits qui n'ont pas vu la lumière.
  '17':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Là, les méchants cessent de s'agiter,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: là se reposent ceux qui sont fatigués, sans force.
  '18':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Les prisonniers s'y retrouvent tous en paix,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ils n'entendent plus la voix de l'oppresseur.
  '19':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Là, petits et grands sont réunis,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: l'esclave n'est plus soumis à son maître.
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Il s''exprima en disant:'
  '20':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: »Pourquoi Dieu donne-t-il la lumière à celui qui souffre,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: la vie à ceux qui connaissent l'amertume,
  '21':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: qui attendent sans succès la mort
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et la recherchent plus qu'un trésor,
  '22':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: qui se réjouiraient,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: tout heureux et ravis, s'ils trouvaient le tombeau,
  '23':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: à l'homme incapable de savoir où aller
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et que Dieu cerne de tous les côtés?
  '24':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: »En effet, la seule nourriture qui se présente à moi, ce sont mes soupirs,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et mes cris de détresse déferlent comme l'eau.
  '25':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ce dont j'ai peur, c'est ce qui m'arrive;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ce que je redoute, c'est ce qui m'atteint.
  '26':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Je n'ai ni tranquillité, ni paix, ni repos;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: c'est la tourmente qui survient.»
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: «Qu'ils disparaissent, le jour où je suis né
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'et la nuit qui a dit: ‘Un garçon vigoureux a été conçu!’'
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Que ce jour se change en ténèbres,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: que de là-haut Dieu ne s'en occupe pas
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et que la lumière du jour ne l'éclaire plus!
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Que les ténèbres et l'ombre de la mort le revendiquent,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: que des nuages épais s'installent au-dessus de lui
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et que de sombres phénomènes l'assaillent!
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Que l'obscurité s'empare de cette nuit-là!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Qu'elle n'ait pas sa place parmi les jours de l'année,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: qu'elle n'entre pas dans le décompte des mois!
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Oui, que cette nuit soit stérile,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: que la joie en soit exclue!
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Qu'elle soit la cible de ceux qui maudissent les jours,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: de ceux qui savent exciter le léviathan
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '3.8 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Le léviathan: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: monstre marin qui peut être identifié au crocodile.
      marker-yv: yv-n
    - type: text
      text: '!'
  '9':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Que les étoiles de son crépuscule s'obscurcissent,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: qu'elle attende sans succès la lumière
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et ne voie pas les lueurs de l'aurore!
