document_id: JOB.3,152
type_code: fra
verses:
  '1':
  - type: heading
    content: Dialogue entre Job et ses amis
  - type: heading
    content: 3.1–31.40
  - type: heading
    content: Intervention n° 1 de Job
  - type: text
    content: 'Après cela, Job parla enfin, et il maudit le jour de sa naissance. '
  '10':
  - type: text
    content: En effet, elle n'a pas fermé les portes du ventre qui m'a porté, pour m'empêcher de connaître le malheur.
  '11':
  - type: text
    content: »Pourquoi ne suis-je pas mort dans le ventre maternel?
  - type: text
    content: Pourquoi n'ai-je pas expiré au sortir du ventre de ma mère?
  '12':
  - type: text
    content: Pourquoi ai-je trouvé des genoux pour m'accueillir
  - type: text
    content: et des seins pour m'allaiter?
  '13':
  - type: text
    content: En effet, maintenant je serais couché, tranquille,
  - type: text
    content: je dormirais en ce moment, en plein repos,
  '14':
  - type: text
    content: avec les rois et les conseillers de la terre
  - type: text
    content: qui se sont construit des monuments aujourd'hui en ruine,
  '15':
  - type: text
    content: ou avec les princes qui possédaient de l'or
  - type: text
    content: et qui accumulaient de l'argent dans leurs maisons.
  '16':
  - type: text
    content: Ou bien, comme l'enfant mort-né qui est resté caché, je n'existerais pas,
  - type: text
    content: pareil aux tout-petits qui n'ont pas vu la lumière.
  '17':
  - type: text
    content: Là, les méchants cessent de s'agiter,
  - type: text
    content: là se reposent ceux qui sont fatigués, sans force.
  '18':
  - type: text
    content: Les prisonniers s'y retrouvent tous en paix,
  - type: text
    content: ils n'entendent plus la voix de l'oppresseur.
  '19':
  - type: text
    content: Là, petits et grands sont réunis,
  - type: text
    content: l'esclave n'est plus soumis à son maître.
  '2':
  - type: text
    content: 'Il s''exprima en disant:'
  '20':
  - type: text
    content: »Pourquoi Dieu donne-t-il la lumière à celui qui souffre,
  - type: text
    content: la vie à ceux qui connaissent l'amertume,
  '21':
  - type: text
    content: qui attendent sans succès la mort
  - type: text
    content: et la recherchent plus qu'un trésor,
  '22':
  - type: text
    content: qui se réjouiraient,
  - type: text
    content: tout heureux et ravis, s'ils trouvaient le tombeau,
  '23':
  - type: text
    content: à l'homme incapable de savoir où aller
  - type: text
    content: et que Dieu cerne de tous les côtés?
  '24':
  - type: text
    content: »En effet, la seule nourriture qui se présente à moi, ce sont mes soupirs,
  - type: text
    content: et mes cris de détresse déferlent comme l'eau.
  '25':
  - type: text
    content: Ce dont j'ai peur, c'est ce qui m'arrive;
  - type: text
    content: ce que je redoute, c'est ce qui m'atteint.
  '26':
  - type: text
    content: Je n'ai ni tranquillité, ni paix, ni repos;
  - type: text
    content: c'est la tourmente qui survient.»
  '3':
  - type: text
    content: «Qu'ils disparaissent, le jour où je suis né
  - type: text
    content: 'et la nuit qui a dit: ‘Un garçon vigoureux a été conçu!’'
  '4':
  - type: text
    content: Que ce jour se change en ténèbres,
  - type: text
    content: que de là-haut Dieu ne s'en occupe pas
  - type: text
    content: et que la lumière du jour ne l'éclaire plus!
  '5':
  - type: text
    content: Que les ténèbres et l'ombre de la mort le revendiquent,
  - type: text
    content: que des nuages épais s'installent au-dessus de lui
  - type: text
    content: et que de sombres phénomènes l'assaillent!
  '6':
  - type: text
    content: Que l'obscurité s'empare de cette nuit-là!
  - type: text
    content: Qu'elle n'ait pas sa place parmi les jours de l'année,
  - type: text
    content: qu'elle n'entre pas dans le décompte des mois!
  '7':
  - type: text
    content: Oui, que cette nuit soit stérile,
  - type: text
    content: que la joie en soit exclue!
  '8':
  - type: text
    content: Qu'elle soit la cible de ceux qui maudissent les jours,
  - type: text
    content: de ceux qui savent exciter le léviathan
  - type: note
    content: 'Le léviathan: monstre marin qui peut être identifié au crocodile.'
  - type: text
    content: '!'
  '9':
  - type: text
    content: Que les étoiles de son crépuscule s'obscurcissent,
  - type: text
    content: qu'elle attende sans succès la lumière
  - type: text
    content: et ne voie pas les lueurs de l'aurore!
