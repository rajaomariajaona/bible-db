document_id: PSA.8,152
type_code: fra
verses:
  '1':
  - type: heading
    content: La gloire de Dieu dans la création
  - type: text
    content: Au chef de chœur, sur la guitthith. Psaume de David.
  '10':
  - type: text
    content: Eternel, notre Seigneur,
  - type: text
    content: que ton nom est magnifique sur toute la terre!
  '2':
  - type: text
    content: Eternel, notre Seigneur,
  - type: text
    content: que ton nom est magnifique sur toute la terre!
  - type: text
    content: Ta majesté domine le ciel.
  '3':
  - type: text
    content: '*Par la bouche des enfants et des nourrissons,'
  - type: text
    content: tu as fondé ta gloire
  - type: note
    content: 'Par la bouche… gloire: cité par Jésus aux autorités religieuses dans le temple en Matthieu 21.16.'
  - type: text
    content: ' pour confondre tes adversaires,'
  - type: text
    content: pour réduire au silence l'ennemi, l'homme avide de vengeance.
  '4':
  - type: text
    content: Quand je contemple le ciel, œuvre de tes mains,
  - type: text
    content: la lune et les étoiles que tu y as placées,
  '5':
  - type: text
    content: 'je dis: *«Qu''est-ce que l''homme, pour que tu te souviennes de lui,'
  - type: text
    content: et le fils de l'homme, pour que tu prennes soin de lui?»
  '6':
  - type: text
    content: Tu l'as fait de peu inférieur à Dieu
  - type: text
    content: et tu l'as couronné de gloire et d'honneur.
  '7':
  - type: text
    content: Tu lui as donné la domination sur ce que tes mains ont fait,
  - type: text
    content: tu as tout mis sous ses pieds,
  - type: note
    content: 'Qu''est-ce que l''homme… ses pieds: cité en Hébreux 2.6-8 et partiellement en 1 Corinthiens 15.27; Ephésiens 1.22.'
  '8':
  - type: text
    content: les brebis comme les bœufs,
  - type: text
    content: et même les animaux sauvages,
  '9':
  - type: text
    content: les oiseaux du ciel et les poissons de la mer,
  - type: text
    content: tout ce qui parcourt les sentiers des mers.
