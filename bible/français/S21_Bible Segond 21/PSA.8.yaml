document_id: PSA.8
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: La gloire de Dieu dans la création
  marker-yv: yv-h
- type: usfm
  marker: d
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Au chef de chœur, sur la guitthith. Psaume de David.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Eternel, notre Seigneur,
- type: usfm
  marker: q1
  children:
  - type: text
    text: que ton nom est magnifique sur toute la terre!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ta majesté domine le ciel.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: '*Par la bouche des enfants et des nourrissons,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: tu as fondé ta gloire
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '8.3 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Par la bouche… gloire: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'cité par Jésus aux autorités religieuses dans le temple en '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Matthieu 21.16
      metadata:
        usfm: MAT.21.16
    - type: usfm
      marker: ft
      children:
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: ' pour confondre tes adversaires,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: pour réduire au silence l'ennemi, l'homme avide de vengeance.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Quand je contemple le ciel, œuvre de tes mains,
- type: usfm
  marker: q1
  children:
  - type: text
    text: la lune et les étoiles que tu y as placées,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'je dis: *«Qu''est-ce que l''homme, pour que tu te souviennes de lui,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: et le fils de l'homme, pour que tu prennes soin de lui?»
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Tu l'as fait de peu inférieur à Dieu
- type: usfm
  marker: q1
  children:
  - type: text
    text: et tu l'as couronné de gloire et d'honneur.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Tu lui as donné la domination sur ce que tes mains ont fait,
- type: usfm
  marker: q1
  children:
  - type: text
    text: tu as tout mis sous ses pieds,
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '8.5-7 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Qu''est-ce que l''homme… ses pieds: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'cité en '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Hébreux 2.6-8
      metadata:
        usfm: HEB.2.6+HEB.2.7+HEB.2.8
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' et partiellement en '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 1 Corinthiens 15.27
      metadata:
        usfm: 1CO.15.27
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ephésiens 1.22
      metadata:
        usfm: EPH.1.22
    - type: usfm
      marker: ft
      children:
      - type: text
        text: .
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: les brebis comme les bœufs,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et même les animaux sauvages,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: les oiseaux du ciel et les poissons de la mer,
- type: usfm
  marker: q1
  children:
  - type: text
    text: tout ce qui parcourt les sentiers des mers.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Eternel, notre Seigneur,
- type: usfm
  marker: q1
  children:
  - type: text
    text: que ton nom est magnifique sur toute la terre!
