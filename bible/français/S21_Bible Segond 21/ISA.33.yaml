document_id: ISA.33,152
type_code: fra
verses:
  '1':
  - type: heading
    content: Délivrance de Jérusalem
  - type: text
    content: Malheur à toi qui dévastes sans avoir été dévasté,
  - type: text
    content: qui trahis sans avoir été trahi!
  - type: text
    content: Quand tu auras fini de dévaster, tu seras à ton tour dévasté;
  - type: text
    content: quand tu auras fini de piller, on te pillera.
  '10':
  - type: text
    content: Maintenant je vais me lever,
  - type: text
    content: dit l'Eternel,
  - type: text
    content: maintenant je vais montrer ma grandeur,
  - type: text
    content: maintenant je vais me dresser bien haut.
  '11':
  - type: text
    content: Vous avez conçu du foin,
  - type: text
    content: vous donnerez naissance à de la paille.
  - type: text
    content: Votre souffle
  - type: text
    content: est un feu qui vous dévorera.
  '12':
  - type: text
    content: Les peuples seront brûlés à la chaux,
  - type: text
    content: ils seront comme des ronces coupées
  - type: text
    content: livrées aux flammes.
  '13':
  - type: text
    content: Vous qui êtes loin, écoutez ce que j'ai fait!
  - type: text
    content: Vous qui êtes près, reconnaissez ma puissance!
  '14':
  - type: text
    content: Les pécheurs sont effrayés dans Sion,
  - type: text
    content: 'un tremblement s''empare des hommes sacrilèges:'
  - type: text
    content: «Qui de nous pourra tenir un instant près d'un feu dévorant?
  - type: text
    content: Qui de nous pourra résister un seul instant près des flammes éternelles?»
  '15':
  - type: text
    content: C'est celui qui se conforme à la justice
  - type: text
    content: et parle avec droiture,
  - type: text
    content: qui rejette un gain obtenu par extorsion,
  - type: text
    content: qui secoue les mains pour refuser un pot-de-vin,
  - type: text
    content: qui se bouche l'oreille pour ne pas entendre parler de meurtre
  - type: text
    content: 'et qui se bande les yeux pour ne pas voir le mal:'
  '16':
  - type: text
    content: celui-là aura pour résidence des endroits élevés
  - type: text
    content: et des rochers escarpés lui serviront de forteresse;
  - type: text
    content: du pain lui sera fourni,
  - type: text
    content: de l'eau lui sera assurée.
  '17':
  - type: text
    content: Tes yeux verront le roi dans toute sa beauté,
  - type: text
    content: ils contempleront le pays dans toute son étendue.
  '18':
  - type: text
    content: 'Ton cœur se souviendra de ses terreurs:'
  - type: text
    content: «Où est le secrétaire? Où est le trésorier?
  - type: text
    content: Où est celui qui inspectait les tours?»
  '19':
  - type: text
    content: Tu ne verras plus le peuple audacieux,
  - type: text
    content: le peuple au baragouinage obscur,
  - type: text
    content: au langage balbutiant qu'on ne comprend pas.
  '2':
  - type: text
    content: Eternel, fais preuve de grâce envers nous!
  - type: text
    content: Nous comptons sur toi.
  - type: text
    content: Sois notre force chaque matin
  - type: text
    content: et notre salut lorsque nous sommes dans la détresse!
  '20':
  - type: text
    content: Regarde Sion, la ville de nos fêtes!
  - type: text
    content: Tes yeux verront Jérusalem comme un domaine sûr,
  - type: text
    content: une tente qui ne sera plus transportée,
  - type: text
    content: dont les piquets ne seront plus jamais enlevés
  - type: text
    content: et dont les cordages ne seront pas détachés.
  '21':
  - type: text
    content: 'Oui, c''est là que l''Eternel se montre magnifique pour nous:'
  - type: text
    content: il nous tient lieu de fleuves et de larges rivières
  - type: text
    content: où aucun bateau ne circule,
  - type: text
    content: où aucun grand navire ne passe.
  '22':
  - type: text
    content: En effet, l'Eternel est notre juge,
  - type: text
    content: l'Eternel est notre législateur,
  - type: text
    content: l'Eternel est notre roi,
  - type: text
    content: c'est lui qui nous sauve.
  '23':
  - type: text
    content: Tes cordages sont relâchés,
  - type: text
    content: ils ne maintiennent plus le mât et ne tendent plus les voiles.
  - type: text
    content: Alors on partage le produit d'un immense butin.
  - type: text
    content: Même les boiteux prennent part au pillage.
  '24':
  - type: text
    content: 'Aucun de ceux qui résident là ne dit: «Je suis malade!»'
  - type: text
    content: Le peuple qui habite Jérusalem reçoit le pardon de sa faute.
  '3':
  - type: text
    content: Quand ta voix retentit,
  - type: text
    content: les peuples fuient;
  - type: text
    content: quand tu te lèves,
  - type: text
    content: les nations se dispersent.
  '4':
  - type: text
    content: On rafle votre butin
  - type: text
    content: comme le feraient des sauterelles,
  - type: text
    content: on se précipite dessus
  - type: text
    content: comme des criquets.
  '5':
  - type: text
    content: L'Eternel domine tout,
  - type: text
    content: car il a sa résidence en haut.
  - type: text
    content: Il remplit Sion de droit et de justice.
  '6':
  - type: text
    content: Il assure la sécurité de ton existence,
  - type: text
    content: il te fournit en abondance le salut, la sagesse et la connaissance.
  - type: text
    content: La crainte de l'Eternel,
  - type: text
    content: tel est le trésor de Sion.
  '7':
  - type: text
    content: Voici que leurs héros
  - type: text
    content: poussent des cris à l'extérieur,
  - type: text
    content: que des messagers de paix pleurent amèrement.
  '8':
  - type: text
    content: Les routes sont désertes,
  - type: text
    content: on ne passe plus sur le sentier.
  - type: text
    content: Il a rompu l'alliance, il méprise les villes,
  - type: text
    content: il n'a de respect pour personne.
  '9':
  - type: text
    content: Le pays est dans le deuil, dans la tristesse.
  - type: text
    content: Le Liban est couvert de honte, il dépérit;
  - type: text
    content: la plaine du Saron est pareille à un désert;
  - type: text
    content: le Basan et le Carmel ont perdu leur feuillage.
