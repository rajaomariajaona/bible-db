document_id: ISA.33
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Délivrance de Jérusalem
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Malheur à toi qui dévastes sans avoir été dévasté,
- type: usfm
  marker: q1
  children:
  - type: text
    text: qui trahis sans avoir été trahi!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Quand tu auras fini de dévaster, tu seras à ton tour dévasté;
- type: usfm
  marker: q1
  children:
  - type: text
    text: quand tu auras fini de piller, on te pillera.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Eternel, fais preuve de grâce envers nous!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Nous comptons sur toi.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Sois notre force chaque matin
- type: usfm
  marker: q1
  children:
  - type: text
    text: et notre salut lorsque nous sommes dans la détresse!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Quand ta voix retentit,
- type: usfm
  marker: q1
  children:
  - type: text
    text: les peuples fuient;
- type: usfm
  marker: q1
  children:
  - type: text
    text: quand tu te lèves,
- type: usfm
  marker: q1
  children:
  - type: text
    text: les nations se dispersent.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: On rafle votre butin
- type: usfm
  marker: q1
  children:
  - type: text
    text: comme le feraient des sauterelles,
- type: usfm
  marker: q1
  children:
  - type: text
    text: on se précipite dessus
- type: usfm
  marker: q1
  children:
  - type: text
    text: comme des criquets.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: L'Eternel domine tout,
- type: usfm
  marker: q1
  children:
  - type: text
    text: car il a sa résidence en haut.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Il remplit Sion de droit et de justice.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Il assure la sécurité de ton existence,
- type: usfm
  marker: q1
  children:
  - type: text
    text: il te fournit en abondance le salut, la sagesse et la connaissance.
- type: usfm
  marker: q1
  children:
  - type: text
    text: La crainte de l'Eternel,
- type: usfm
  marker: q1
  children:
  - type: text
    text: tel est le trésor de Sion.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Voici que leurs héros
- type: usfm
  marker: q1
  children:
  - type: text
    text: poussent des cris à l'extérieur,
- type: usfm
  marker: q1
  children:
  - type: text
    text: que des messagers de paix pleurent amèrement.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Les routes sont désertes,
- type: usfm
  marker: q1
  children:
  - type: text
    text: on ne passe plus sur le sentier.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Il a rompu l'alliance, il méprise les villes,
- type: usfm
  marker: q1
  children:
  - type: text
    text: il n'a de respect pour personne.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Le pays est dans le deuil, dans la tristesse.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Le Liban est couvert de honte, il dépérit;
- type: usfm
  marker: q1
  children:
  - type: text
    text: la plaine du Saron est pareille à un désert;
- type: usfm
  marker: q1
  children:
  - type: text
    text: le Basan et le Carmel ont perdu leur feuillage.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Maintenant je vais me lever,
- type: usfm
  marker: q1
  children:
  - type: text
    text: dit l'Eternel,
- type: usfm
  marker: q1
  children:
  - type: text
    text: maintenant je vais montrer ma grandeur,
- type: usfm
  marker: q1
  children:
  - type: text
    text: maintenant je vais me dresser bien haut.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Vous avez conçu du foin,
- type: usfm
  marker: q1
  children:
  - type: text
    text: vous donnerez naissance à de la paille.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Votre souffle
- type: usfm
  marker: q1
  children:
  - type: text
    text: est un feu qui vous dévorera.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Les peuples seront brûlés à la chaux,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ils seront comme des ronces coupées
- type: usfm
  marker: q1
  children:
  - type: text
    text: livrées aux flammes.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Vous qui êtes loin, écoutez ce que j'ai fait!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Vous qui êtes près, reconnaissez ma puissance!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Les pécheurs sont effrayés dans Sion,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'un tremblement s''empare des hommes sacrilèges:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: «Qui de nous pourra tenir un instant près d'un feu dévorant?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Qui de nous pourra résister un seul instant près des flammes éternelles?»
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: C'est celui qui se conforme à la justice
- type: usfm
  marker: q1
  children:
  - type: text
    text: et parle avec droiture,
- type: usfm
  marker: q1
  children:
  - type: text
    text: qui rejette un gain obtenu par extorsion,
- type: usfm
  marker: q1
  children:
  - type: text
    text: qui secoue les mains pour refuser un pot-de-vin,
- type: usfm
  marker: q1
  children:
  - type: text
    text: qui se bouche l'oreille pour ne pas entendre parler de meurtre
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'et qui se bande les yeux pour ne pas voir le mal:'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: celui-là aura pour résidence des endroits élevés
- type: usfm
  marker: q1
  children:
  - type: text
    text: et des rochers escarpés lui serviront de forteresse;
- type: usfm
  marker: q1
  children:
  - type: text
    text: du pain lui sera fourni,
- type: usfm
  marker: q1
  children:
  - type: text
    text: de l'eau lui sera assurée.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Tes yeux verront le roi dans toute sa beauté,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ils contempleront le pays dans toute son étendue.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Ton cœur se souviendra de ses terreurs:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: «Où est le secrétaire? Où est le trésorier?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Où est celui qui inspectait les tours?»
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Tu ne verras plus le peuple audacieux,
- type: usfm
  marker: q1
  children:
  - type: text
    text: le peuple au baragouinage obscur,
- type: usfm
  marker: q1
  children:
  - type: text
    text: au langage balbutiant qu'on ne comprend pas.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Regarde Sion, la ville de nos fêtes!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Tes yeux verront Jérusalem comme un domaine sûr,
- type: usfm
  marker: q1
  children:
  - type: text
    text: une tente qui ne sera plus transportée,
- type: usfm
  marker: q1
  children:
  - type: text
    text: dont les piquets ne seront plus jamais enlevés
- type: usfm
  marker: q1
  children:
  - type: text
    text: et dont les cordages ne seront pas détachés.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Oui, c''est là que l''Eternel se montre magnifique pour nous:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: il nous tient lieu de fleuves et de larges rivières
- type: usfm
  marker: q1
  children:
  - type: text
    text: où aucun bateau ne circule,
- type: usfm
  marker: q1
  children:
  - type: text
    text: où aucun grand navire ne passe.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: En effet, l'Eternel est notre juge,
- type: usfm
  marker: q1
  children:
  - type: text
    text: l'Eternel est notre législateur,
- type: usfm
  marker: q1
  children:
  - type: text
    text: l'Eternel est notre roi,
- type: usfm
  marker: q1
  children:
  - type: text
    text: c'est lui qui nous sauve.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: Tes cordages sont relâchés,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ils ne maintiennent plus le mât et ne tendent plus les voiles.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Alors on partage le produit d'un immense butin.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Même les boiteux prennent part au pillage.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Aucun de ceux qui résident là ne dit: «Je suis malade!»'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Le peuple qui habite Jérusalem reçoit le pardon de sa faute.
