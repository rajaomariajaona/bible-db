document_id: PSA.133,152
type_code: fra
verses:
  '1':
  - type: heading
    content: L'amour fraternel
  - type: text
    content: Chant des montées, de David.
  - type: text
    content: Oh! Qu'il est agréable, qu'il est doux
  - type: text
    content: pour des frères de demeurer ensemble!
  '2':
  - type: text
    content: C'est comme l'huile précieuse versée sur la tête
  - type: text
    content: qui descend sur la barbe, sur la barbe d'Aaron,
  - type: text
    content: et sur le col de ses vêtements.
  '3':
  - type: text
    content: C'est comme la rosée de l'Hermon
  - type: text
    content: qui descend sur les hauteurs de Sion.
  - type: text
    content: En effet, c'est là que l'Eternel envoie la bénédiction,
  - type: text
    content: la vie, pour l'éternité.
