document_id: PSA.133,152
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: L'amour fraternel
    marker-yv: yv-h
  - type: usfm
    marker: d
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: Chant des montées, de David.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Oh! Qu'il est agréable, qu'il est doux
  - type: usfm
    marker: q1
    children:
    - type: text
      text: pour des frères de demeurer ensemble!
  '2':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: C'est comme l'huile précieuse versée sur la tête
  - type: usfm
    marker: q1
    children:
    - type: text
      text: qui descend sur la barbe, sur la barbe d'Aaron,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et sur le col de ses vêtements.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: C'est comme la rosée de l'Hermon
  - type: usfm
    marker: q1
    children:
    - type: text
      text: qui descend sur les hauteurs de Sion.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: En effet, c'est là que l'Eternel envoie la bénédiction,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: la vie, pour l'éternité.
