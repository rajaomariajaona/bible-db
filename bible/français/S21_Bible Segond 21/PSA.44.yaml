document_id: PSA.44,152
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Prière d'Israël opprimé
    marker-yv: yv-h
  - type: usfm
    marker: d
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: Au chef de chœur. Des descendants de Koré, cantique.
  '10':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: Cependant tu nous as repoussés, tu nous as couverts de honte,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: tu ne sors plus avec nos armées.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: Tu nous fais reculer devant l'ennemi,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et ceux qui nous détestent se partagent nos dépouilles.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: Tu nous livres comme des brebis de boucherie,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: tu nous disperses parmi les nations.
  '13':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: Tu vends ton peuple pour rien,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: tu ne l'estimes pas à une grande valeur.
  '14':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: Tu nous exposes aux insultes de nos voisins,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: à la moquerie et aux railleries de ceux qui nous entourent.
  '15':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: Tu fais de nous le sujet d'un proverbe parmi les nations,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: on hoche la tête sur nous parmi les peuples.
  '16':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: Mon humiliation est toujours devant moi,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et la honte couvre mon visage
  '17':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: à la voix de celui qui m'insulte et me déshonore,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: à la vue de l'ennemi avide de vengeance.
  '18':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: Tout cela nous arrive alors que nous ne t'avons pas oublié
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et que nous n'avons pas violé ton alliance.
  '19':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: Nous n'avons pas fait marche arrière dans notre cœur,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: nous ne nous sommes pas écartés de ton sentier.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: O Dieu, nous avons entendu de nos oreilles,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: nos pères nous ont raconté
  - type: usfm
    marker: q1
    children:
    - type: text
      text: tout ce que tu as accompli à leur époque,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: par le passé.
  '20':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: Pourtant, tu nous as écrasés dans le territoire des chacals
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et tu nous as couverts de l'ombre de la mort.
  '21':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: Si nous avions oublié le nom de notre Dieu
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et tendu nos mains vers un dieu étranger,
  '22':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: Dieu ne le saurait-il pas,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: lui qui connaît les secrets du cœur?
  '23':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: Mais *c'est à cause de toi qu'on nous met à mort à longueur de journée,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: qu'on nous considère comme des brebis destinées à la boucherie
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '44.23 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'C''est à cause… boucherie: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'cité en '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Romains 8.36
      - type: usfm
        marker: ft
        children:
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: .
  '24':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: Lève-toi! Pourquoi dors-tu, Seigneur?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Réveille-toi, ne nous repousse pas pour toujours!
  '25':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: Pourquoi te caches-tu?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Pourquoi oublies-tu notre misère et notre oppression
  '26':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: quand nous sommes affalés dans la poussière,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: quand nous rampons par terre?
  '27':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: Lève-toi pour nous secourir,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: délivre-nous à cause de ta bonté!
  '3':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: De ta main tu as chassé des nations pour qu'ils puissent s'établir,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: tu as frappé des peuples pour qu'ils puissent s'étendre.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: En effet, ce n'est pas par leur épée qu'ils se sont emparés du pays,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ce n'est pas leur bras qui les a sauvés,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: mais c'est ta main droite, c'est ton bras, c'est la lumière de ton visage,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: parce que tu les aimais.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'O Dieu, tu es mon roi:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ordonne la délivrance de Jacob!
  '6':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: Grâce à toi nous renversons nos ennemis,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: grâce à ton nom nous écrasons nos adversaires,
  '7':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: car ce n'est pas en mon arc que je me confie,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ce n'est pas mon épée qui me sauvera,
  '8':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: mais c'est toi qui nous délivres de nos ennemis
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et qui fais rougir de honte ceux qui nous détestent.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: Nous chantons la louange de Dieu chaque jour,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'et nous célébrerons éternellement ton nom. '
    - type: usfm
      marker: qs
      children:
      - type: text
        text: – Pause.
