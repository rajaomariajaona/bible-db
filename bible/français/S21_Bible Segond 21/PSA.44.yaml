document_id: PSA.44,152
type_code: fra
verses:
  '1':
  - type: heading
    content: Prière d'Israël opprimé
  - type: text
    content: Au chef de chœur. Des descendants de Koré, cantique.
  '10':
  - type: text
    content: Cependant tu nous as repoussés, tu nous as couverts de honte,
  - type: text
    content: tu ne sors plus avec nos armées.
  '11':
  - type: text
    content: Tu nous fais reculer devant l'ennemi,
  - type: text
    content: et ceux qui nous détestent se partagent nos dépouilles.
  '12':
  - type: text
    content: Tu nous livres comme des brebis de boucherie,
  - type: text
    content: tu nous disperses parmi les nations.
  '13':
  - type: text
    content: Tu vends ton peuple pour rien,
  - type: text
    content: tu ne l'estimes pas à une grande valeur.
  '14':
  - type: text
    content: Tu nous exposes aux insultes de nos voisins,
  - type: text
    content: à la moquerie et aux railleries de ceux qui nous entourent.
  '15':
  - type: text
    content: Tu fais de nous le sujet d'un proverbe parmi les nations,
  - type: text
    content: on hoche la tête sur nous parmi les peuples.
  '16':
  - type: text
    content: Mon humiliation est toujours devant moi,
  - type: text
    content: et la honte couvre mon visage
  '17':
  - type: text
    content: à la voix de celui qui m'insulte et me déshonore,
  - type: text
    content: à la vue de l'ennemi avide de vengeance.
  '18':
  - type: text
    content: Tout cela nous arrive alors que nous ne t'avons pas oublié
  - type: text
    content: et que nous n'avons pas violé ton alliance.
  '19':
  - type: text
    content: Nous n'avons pas fait marche arrière dans notre cœur,
  - type: text
    content: nous ne nous sommes pas écartés de ton sentier.
  '2':
  - type: text
    content: O Dieu, nous avons entendu de nos oreilles,
  - type: text
    content: nos pères nous ont raconté
  - type: text
    content: tout ce que tu as accompli à leur époque,
  - type: text
    content: par le passé.
  '20':
  - type: text
    content: Pourtant, tu nous as écrasés dans le territoire des chacals
  - type: text
    content: et tu nous as couverts de l'ombre de la mort.
  '21':
  - type: text
    content: Si nous avions oublié le nom de notre Dieu
  - type: text
    content: et tendu nos mains vers un dieu étranger,
  '22':
  - type: text
    content: Dieu ne le saurait-il pas,
  - type: text
    content: lui qui connaît les secrets du cœur?
  '23':
  - type: text
    content: Mais *c'est à cause de toi qu'on nous met à mort à longueur de journée,
  - type: text
    content: qu'on nous considère comme des brebis destinées à la boucherie
  - type: note
    content: 'C''est à cause… boucherie: cité en Romains 8.36.'
  - type: text
    content: .
  '24':
  - type: text
    content: Lève-toi! Pourquoi dors-tu, Seigneur?
  - type: text
    content: Réveille-toi, ne nous repousse pas pour toujours!
  '25':
  - type: text
    content: Pourquoi te caches-tu?
  - type: text
    content: Pourquoi oublies-tu notre misère et notre oppression
  '26':
  - type: text
    content: quand nous sommes affalés dans la poussière,
  - type: text
    content: quand nous rampons par terre?
  '27':
  - type: text
    content: Lève-toi pour nous secourir,
  - type: text
    content: délivre-nous à cause de ta bonté!
  '3':
  - type: text
    content: De ta main tu as chassé des nations pour qu'ils puissent s'établir,
  - type: text
    content: tu as frappé des peuples pour qu'ils puissent s'étendre.
  '4':
  - type: text
    content: En effet, ce n'est pas par leur épée qu'ils se sont emparés du pays,
  - type: text
    content: ce n'est pas leur bras qui les a sauvés,
  - type: text
    content: mais c'est ta main droite, c'est ton bras, c'est la lumière de ton visage,
  - type: text
    content: parce que tu les aimais.
  '5':
  - type: text
    content: 'O Dieu, tu es mon roi:'
  - type: text
    content: ordonne la délivrance de Jacob!
  '6':
  - type: text
    content: Grâce à toi nous renversons nos ennemis,
  - type: text
    content: grâce à ton nom nous écrasons nos adversaires,
  '7':
  - type: text
    content: car ce n'est pas en mon arc que je me confie,
  - type: text
    content: ce n'est pas mon épée qui me sauvera,
  '8':
  - type: text
    content: mais c'est toi qui nous délivres de nos ennemis
  - type: text
    content: et qui fais rougir de honte ceux qui nous détestent.
  '9':
  - type: text
    content: Nous chantons la louange de Dieu chaque jour,
  - type: text
    content: 'et nous célébrerons éternellement ton nom. '
  - type: text
    content: – Pause.
