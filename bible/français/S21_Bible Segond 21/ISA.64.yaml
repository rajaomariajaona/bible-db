document_id: ISA.64,152
type_code: fra
verses:
  '1':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: »Tu serais pareil au feu qui allume des brindilles
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'ou fait bouillir l''eau:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: tes adversaires connaîtraient ton nom
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et les nations trembleraient devant toi.
  '10':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Notre saint et splendide temple,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: où nos ancêtres célébraient tes louanges,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: est devenu la proie des flammes,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: tout ce que nous avions de précieux est en ruine.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Devant tout cela, Eternel, te retiendras-tu d'intervenir?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Vas-tu garder le silence et nous humilier à l'excès?»
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: »Lorsque tu as fait des prodiges que nous n'attendions pas,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: tu es descendu et les montagnes se sont effondrées devant toi.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: '*Jamais on n''a appris ni entendu dire pareille chose,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: jamais aucun œil n'a vu un autre dieu que toi
  - type: usfm
    marker: q1
    children:
    - type: text
      text: agir de cette manière pour ceux qui comptent sur lui.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '64.3 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Jamais… lui: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'cité en '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1 Corinthiens 2.9
      - type: usfm
        marker: ft
        children:
        - type: text
          text: .
      marker-yv: yv-n
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tu vas à la rencontre de celui qui pratique avec joie la justice,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: de ceux qui se souviennent de toi en marchant dans tes voies.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Cependant, tu as été irrité parce que nous avons péché.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Pourtant, c'est en les suivant toujours que nous pouvons être sauvés.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: »Nous sommes tous devenus comme des objets impurs
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et toute notre justice est pareille à un habit taché de sang,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: nous sommes tous aussi fanés qu'une feuille
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et nos fautes nous emportent comme le vent.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Il n'y a personne qui fasse appel à ton nom,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: qui se réveille pour s'attacher à toi.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: C'est que tu t'es caché à nous
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et tu nous laisses nous liquéfier par l'intermédiaire de nos propres fautes.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: »Cependant, Eternel, c'est toi qui es notre père.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Nous sommes l'argile, tu es notre potier,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: nous sommes tous l'œuvre de tes mains.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ne t'irrite pas à l'excès, Eternel,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et ne te souviens pas indéfiniment de notre faute!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Regarde donc: nous sommes tous ton peuple.'
  '9':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: '»Pourtant, tes villes saintes se sont transformées en désert:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Sion est un désert, Jérusalem un endroit dévasté.
