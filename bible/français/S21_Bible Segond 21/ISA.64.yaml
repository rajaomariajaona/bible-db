document_id: ISA.64,152
type_code: fra
verses:
  '1':
  - type: text
    content: »Tu serais pareil au feu qui allume des brindilles
  - type: text
    content: 'ou fait bouillir l''eau:'
  - type: text
    content: tes adversaires connaîtraient ton nom
  - type: text
    content: et les nations trembleraient devant toi.
  '10':
  - type: text
    content: Notre saint et splendide temple,
  - type: text
    content: où nos ancêtres célébraient tes louanges,
  - type: text
    content: est devenu la proie des flammes,
  - type: text
    content: tout ce que nous avions de précieux est en ruine.
  '11':
  - type: text
    content: Devant tout cela, Eternel, te retiendras-tu d'intervenir?
  - type: text
    content: Vas-tu garder le silence et nous humilier à l'excès?»
  '2':
  - type: text
    content: »Lorsque tu as fait des prodiges que nous n'attendions pas,
  - type: text
    content: tu es descendu et les montagnes se sont effondrées devant toi.
  '3':
  - type: text
    content: '*Jamais on n''a appris ni entendu dire pareille chose,'
  - type: text
    content: jamais aucun œil n'a vu un autre dieu que toi
  - type: text
    content: agir de cette manière pour ceux qui comptent sur lui.
  - type: note
    content: 'Jamais… lui: cité en 1 Corinthiens 2.9.'
  '4':
  - type: text
    content: Tu vas à la rencontre de celui qui pratique avec joie la justice,
  - type: text
    content: de ceux qui se souviennent de toi en marchant dans tes voies.
  - type: text
    content: Cependant, tu as été irrité parce que nous avons péché.
  - type: text
    content: Pourtant, c'est en les suivant toujours que nous pouvons être sauvés.
  '5':
  - type: text
    content: »Nous sommes tous devenus comme des objets impurs
  - type: text
    content: et toute notre justice est pareille à un habit taché de sang,
  - type: text
    content: nous sommes tous aussi fanés qu'une feuille
  - type: text
    content: et nos fautes nous emportent comme le vent.
  '6':
  - type: text
    content: Il n'y a personne qui fasse appel à ton nom,
  - type: text
    content: qui se réveille pour s'attacher à toi.
  - type: text
    content: C'est que tu t'es caché à nous
  - type: text
    content: et tu nous laisses nous liquéfier par l'intermédiaire de nos propres fautes.
  '7':
  - type: text
    content: »Cependant, Eternel, c'est toi qui es notre père.
  - type: text
    content: Nous sommes l'argile, tu es notre potier,
  - type: text
    content: nous sommes tous l'œuvre de tes mains.
  '8':
  - type: text
    content: Ne t'irrite pas à l'excès, Eternel,
  - type: text
    content: et ne te souviens pas indéfiniment de notre faute!
  - type: text
    content: 'Regarde donc: nous sommes tous ton peuple.'
  '9':
  - type: text
    content: '»Pourtant, tes villes saintes se sont transformées en désert:'
  - type: text
    content: Sion est un désert, Jérusalem un endroit dévasté.
