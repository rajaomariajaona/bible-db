document_id: AMO.4,152
type_code: fra
verses:
  '1':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ecoutez cette parole, vaches du Basan
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '4.1 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Vaches du Basan: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: c'est-à-dire les femmes des grands d'Israël.
      marker-yv: yv-n
    - type: text
      text: ' qui êtes sur la montagne de Samarie,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: vous qui opprimez les faibles, qui écrasez les pauvres
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'et qui dites à vos maris:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: «Apportez à boire et buvons!»
  '10':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: J'ai envoyé parmi vous la peste comme en Egypte,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: j'ai tué vos jeunes gens par l'épée
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et laissé prendre vos chevaux;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: j'ai fait monter à vos narines l'infection de votre camp.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Malgré cela, vous n'êtes pas revenus à moi, déclare l'Eternel.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Je vous ai bouleversés
  - type: usfm
    marker: q1
    children:
    - type: text
      text: comme lors de la catastrophe dont Dieu a frappé Sodome et Gomorrhe
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et vous avez été pareils à un bout de bois arraché de l'incendie.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Malgré cela, vous n'êtes pas revenus à moi, déclare l'Eternel.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: C'est pourquoi je te traiterai de la même manière, Israël,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et puisque je te traiterai de la même manière,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: prépare-toi à rencontrer ton Dieu, Israël!
  '13':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: En effet, c'est lui qui a formé les montagnes et créé le vent,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: lui qui fait connaître à l'homme ses pensées,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: qui change l'aurore en ténèbres
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et qui marche sur les hauteurs de la terre.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Son nom est l'Eternel, le Dieu de l'univers.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Le Seigneur, l''Eternel, l''a juré par sa sainteté:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Les jours viendront pour vous
  - type: usfm
    marker: q1
    children:
    - type: text
      text: où l'on vous enlèvera avec des crocs,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et vos enfants avec des hameçons.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Vous sortirez par les brèches, chacune devant soi,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et vous serez jetées dans la forteresse, déclare l'Eternel.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Refus de revenir à Dieu
    marker-yv: yv-h
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Allez à Béthel et péchez,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: allez à Guilgal et péchez davantage!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Offrez vos sacrifices chaque matin,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et vos dîmes tous les trois jours.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Offrez vos sacrifices de reconnaissance avec du levain!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Proclamez, annoncez vos offrandes volontaires!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: C'est en effet cela que vous aimez, Israélites,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: déclare le Seigneur, l'Eternel.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Moi, je vous ai envoyé la famine dans toutes vos villes,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: le manque de pain dans toutes vos demeures.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Malgré cela, vous n'êtes pas revenus à moi, déclare l'Eternel.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Je vous ai refusé la pluie
  - type: usfm
    marker: q1
    children:
    - type: text
      text: lorsqu'il y avait encore trois mois jusqu'à la moisson;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: j'ai fait pleuvoir sur une ville
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et je n'ai pas fait pleuvoir sur une autre;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: un champ a reçu la pluie,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et un autre qui ne l'a pas reçue s'est desséché;
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: deux, trois villes sont allées vers une autre pour boire de l'eau,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et elles n'ont pas apaisé leur soif.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Malgré cela, vous n'êtes pas revenus à moi, déclare l'Eternel.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Je vous ai frappés par la rouille et par la nielle
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '4.9 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Rouille… nielle: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: maladies des céréales.
      marker-yv: yv-n
    - type: text
      text: ;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: vos nombreux jardins, vos vignes, vos figuiers et vos oliviers
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ont été dévorés par les sauterelles.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Malgré cela, vous n'êtes pas revenus à moi, déclare l'Eternel.
