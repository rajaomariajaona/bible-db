document_id: AMO.4,152
type_code: fra
verses:
  '1':
  - type: text
    content: Ecoutez cette parole, vaches du Basan
  - type: note
    content: 'Vaches du Basan: c''est-à-dire les femmes des grands d''Israël.'
  - type: text
    content: ' qui êtes sur la montagne de Samarie,'
  - type: text
    content: vous qui opprimez les faibles, qui écrasez les pauvres
  - type: text
    content: 'et qui dites à vos maris:'
  - type: text
    content: «Apportez à boire et buvons!»
  '10':
  - type: text
    content: J'ai envoyé parmi vous la peste comme en Egypte,
  - type: text
    content: j'ai tué vos jeunes gens par l'épée
  - type: text
    content: et laissé prendre vos chevaux;
  - type: text
    content: j'ai fait monter à vos narines l'infection de votre camp.
  - type: text
    content: Malgré cela, vous n'êtes pas revenus à moi, déclare l'Eternel.
  '11':
  - type: text
    content: Je vous ai bouleversés
  - type: text
    content: comme lors de la catastrophe dont Dieu a frappé Sodome et Gomorrhe
  - type: text
    content: et vous avez été pareils à un bout de bois arraché de l'incendie.
  - type: text
    content: Malgré cela, vous n'êtes pas revenus à moi, déclare l'Eternel.
  '12':
  - type: text
    content: C'est pourquoi je te traiterai de la même manière, Israël,
  - type: text
    content: et puisque je te traiterai de la même manière,
  - type: text
    content: prépare-toi à rencontrer ton Dieu, Israël!
  '13':
  - type: text
    content: En effet, c'est lui qui a formé les montagnes et créé le vent,
  - type: text
    content: lui qui fait connaître à l'homme ses pensées,
  - type: text
    content: qui change l'aurore en ténèbres
  - type: text
    content: et qui marche sur les hauteurs de la terre.
  - type: text
    content: Son nom est l'Eternel, le Dieu de l'univers.
  '2':
  - type: text
    content: 'Le Seigneur, l''Eternel, l''a juré par sa sainteté:'
  - type: text
    content: Les jours viendront pour vous
  - type: text
    content: où l'on vous enlèvera avec des crocs,
  - type: text
    content: et vos enfants avec des hameçons.
  '3':
  - type: text
    content: Vous sortirez par les brèches, chacune devant soi,
  - type: text
    content: et vous serez jetées dans la forteresse, déclare l'Eternel.
  - type: heading
    content: Refus de revenir à Dieu
  '4':
  - type: text
    content: Allez à Béthel et péchez,
  - type: text
    content: allez à Guilgal et péchez davantage!
  - type: text
    content: Offrez vos sacrifices chaque matin,
  - type: text
    content: et vos dîmes tous les trois jours.
  '5':
  - type: text
    content: Offrez vos sacrifices de reconnaissance avec du levain!
  - type: text
    content: Proclamez, annoncez vos offrandes volontaires!
  - type: text
    content: C'est en effet cela que vous aimez, Israélites,
  - type: text
    content: déclare le Seigneur, l'Eternel.
  '6':
  - type: text
    content: Moi, je vous ai envoyé la famine dans toutes vos villes,
  - type: text
    content: le manque de pain dans toutes vos demeures.
  - type: text
    content: Malgré cela, vous n'êtes pas revenus à moi, déclare l'Eternel.
  '7':
  - type: text
    content: Je vous ai refusé la pluie
  - type: text
    content: lorsqu'il y avait encore trois mois jusqu'à la moisson;
  - type: text
    content: j'ai fait pleuvoir sur une ville
  - type: text
    content: et je n'ai pas fait pleuvoir sur une autre;
  - type: text
    content: un champ a reçu la pluie,
  - type: text
    content: et un autre qui ne l'a pas reçue s'est desséché;
  '8':
  - type: text
    content: deux, trois villes sont allées vers une autre pour boire de l'eau,
  - type: text
    content: et elles n'ont pas apaisé leur soif.
  - type: text
    content: Malgré cela, vous n'êtes pas revenus à moi, déclare l'Eternel.
  '9':
  - type: text
    content: Je vous ai frappés par la rouille et par la nielle
  - type: note
    content: 'Rouille… nielle: maladies des céréales.'
  - type: text
    content: ;
  - type: text
    content: vos nombreux jardins, vos vignes, vos figuiers et vos oliviers
  - type: text
    content: ont été dévorés par les sauterelles.
  - type: text
    content: Malgré cela, vous n'êtes pas revenus à moi, déclare l'Eternel.
