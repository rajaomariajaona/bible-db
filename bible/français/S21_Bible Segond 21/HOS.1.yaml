document_id: HOS.1,152
type_code: fra
verses:
  '1':
  - type: usfm
    marker: ms1
    children:
    - type: text
      text: Les mariages d'Osée
    marker-yv: yv-h
  - type: usfm
    marker: mr
    children:
    - type: text
      text: 1.1–3.5
    marker-yv: yv-h
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Osée et la femme prostituée
    marker-yv: yv-h
  - type: usfm
    marker: d
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Parole de l''Eternel adressée à Osée, fils de Beéri, durant les règnes d''Ozias, de Jotham, d''Achaz et d''Ezéchias sur Juda, et durant celui de Jéroboam, fils de Joas, sur Israël. '
  '2':
  - type: usfm
    marker: d
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: Début des paroles de l'Eternel à Osée.
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'L''Eternel dit à Osée: «Va prendre une femme prostituée et des enfants de prostitution! En effet, le pays se prostitue, il abandonne l''Eternel.»'
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'Il alla prendre Gomer, fille de Diblaïm. Elle devint enceinte et lui donna un fils. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'L''Eternel lui dit: «Appelle-le Jizreel, car encore un peu de temps et j''interviendrai contre la famille de Jéhu à cause du sang versé à Jizreel'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1.4 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Sang… Jizreel: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: voir
      - type: text
        text: 2 Rois 9–10
      - type: usfm
        marker: ft
        children:
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: ', je mettrai fin au royaume de la communauté d''Israël. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: Ce jour-là, je briserai l'arc d'Israël dans la vallée de Jizreel.»
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'Elle fut de nouveau enceinte et mit au monde une fille. L''Eternel dit à Osée: «Appelle-la Lo-Ruchama'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1.6 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Lo-Ruchama: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: littéralement celle dont on n'a pas compassion.
      marker-yv: yv-n
    - type: text
      text: ', car je ne continuerai plus à avoir compassion de la communauté d''Israël, je ne lui pardonnerai plus. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: En revanche, j'aurai compassion de la communauté de Juda. Je les sauverai par l'Eternel, leur Dieu, et je ne les sauverai ni par l'arc, ni par l'épée, ni par les combats, ni par les chevaux, ni par les cavaliers.»
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'Elle sevra Lo-Ruchama, puis elle devint enceinte et mit au monde un fils. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'L''Eternel dit: «Appelle-le Lo-Ammi'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1.9 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Lo-Ammi: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: littéralement pas mon peuple.
      marker-yv: yv-n
    - type: text
      text: ', car vous n''êtes pas mon peuple et moi, je ne suis pas votre Dieu.'
