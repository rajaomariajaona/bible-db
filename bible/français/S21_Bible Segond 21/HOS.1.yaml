document_id: HOS.1,152
type_code: fra
verses:
  '1':
  - type: heading
    content: Les mariages d'Osée
  - type: heading
    content: 1.1–3.5
  - type: heading
    content: Osée et la femme prostituée
  - type: text
    content: 'Parole de l''Eternel adressée à Osée, fils de Beéri, durant les règnes d''Ozias, de Jotham, d''Achaz et d''Ezéchias sur Juda, et durant celui de Jéroboam, fils de Joas, sur Israël. '
  '2':
  - type: text
    content: Début des paroles de l'Eternel à Osée.
  - type: text
    content: 'L''Eternel dit à Osée: «Va prendre une femme prostituée et des enfants de prostitution! En effet, le pays se prostitue, il abandonne l''Eternel.»'
  '3':
  - type: text
    content: 'Il alla prendre Gomer, fille de Diblaïm. Elle devint enceinte et lui donna un fils. '
  '4':
  - type: text
    content: 'L''Eternel lui dit: «Appelle-le Jizreel, car encore un peu de temps et j''interviendrai contre la famille de Jéhu à cause du sang versé à Jizreel'
  - type: note
    content: 'Sang… Jizreel: voir2 Rois 9–10.'
  - type: text
    content: ', je mettrai fin au royaume de la communauté d''Israël. '
  '5':
  - type: text
    content: Ce jour-là, je briserai l'arc d'Israël dans la vallée de Jizreel.»
  '6':
  - type: text
    content: 'Elle fut de nouveau enceinte et mit au monde une fille. L''Eternel dit à Osée: «Appelle-la Lo-Ruchama'
  - type: note
    content: 'Lo-Ruchama: littéralement celle dont on n''a pas compassion.'
  - type: text
    content: ', car je ne continuerai plus à avoir compassion de la communauté d''Israël, je ne lui pardonnerai plus. '
  '7':
  - type: text
    content: En revanche, j'aurai compassion de la communauté de Juda. Je les sauverai par l'Eternel, leur Dieu, et je ne les sauverai ni par l'arc, ni par l'épée, ni par les combats, ni par les chevaux, ni par les cavaliers.»
  '8':
  - type: text
    content: 'Elle sevra Lo-Ruchama, puis elle devint enceinte et mit au monde un fils. '
  '9':
  - type: text
    content: 'L''Eternel dit: «Appelle-le Lo-Ammi'
  - type: note
    content: 'Lo-Ammi: littéralement pas mon peuple.'
  - type: text
    content: ', car vous n''êtes pas mon peuple et moi, je ne suis pas votre Dieu.'
