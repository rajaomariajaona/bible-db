document_id: 1CH.5,152
type_code: fra
verses:
  '1':
  - type: heading
    content: Descendance de Ruben, Gad et Manassé
  - type: text
    content: 'Descendants de Ruben, l''aîné d''Israël. En effet, c''était lui le premier-né, mais, parce qu''il avait souillé le lit de son père, son droit d''aînesse fut donné aux fils de Joseph, le fils d''Israël, si bien qu''il ne fut pas enregistré dans les généalogies comme le premier-né. '
  '10':
  - type: text
    content: A l'époque de Saül, ils firent la guerre aux Hagaréniens et les battirent. Ils habitèrent alors dans leurs tentes, sur tout le côté est de Galaad.
  '11':
  - type: text
    content: 'Les descendants de Gad habitaient vis-à-vis d''eux, dans le pays du Basan et jusqu''à Salca. '
  '12':
  - type: text
    content: 'Joël était à leur tête, Shapham venait en deuxième, puis venaient Jaenaï et Shaphath en Basan. '
  '13':
  - type: text
    content: 'Voici ceux qui leur étaient apparentés en fonction de leur famille: Micaël, Meshullam, Shéba, Joraï, Jaecan, Zia et Eber, ce qui fait 7. '
  '14':
  - type: text
    content: 'Ils étaient les fils d''Abichaïl, lui-même fils de Huri, fils de Jaroach, fils de Galaad, fils de Micaël, fils de Jeshishaï, fils de Jachdo, fils de Buz. '
  '15':
  - type: text
    content: 'Achi, fils d''Abdiel et petit-fils de Guni, était le chef de leurs familles. '
  '16':
  - type: text
    content: 'Ils habitaient en Galaad, en Basan et dans les villes qui en dépendaient, ainsi que jusqu''aux confins de tous les territoires du Saron. '
  '17':
  - type: text
    content: Ils furent tous enregistrés dans les généalogies durant les règnes de Jotham sur Juda et de Jéroboam sur Israël.
  '18':
  - type: text
    content: 'Les Rubénites, les Gadites et la demi-tribu de Manassé disposaient de 44''760 vaillants hommes capables de manier le bouclier et l''épée ou de tirer à l''arc. C''étaient des hommes formés à la guerre et aptes au service militaire. '
  '19':
  - type: text
    content: 'Ils firent la guerre aux Hagaréniens ainsi qu''à Jethur, Naphish et Nodab. '
  '2':
  - type: text
    content: Quant à Juda, il fut certes puissant parmi ses frères et de lui est issu un prince, mais le droit d'aînesse appartenait à Joseph.
  '20':
  - type: text
    content: 'Ils reçurent du secours contre eux, et les Hagaréniens et tous ceux qui étaient avec eux furent livrés entre leurs mains. En effet, pendant le combat, ils avaient crié à Dieu, et il les exauça parce qu''ils avaient placé leur confiance en lui. '
  '21':
  - type: text
    content: 'Ils prirent les troupeaux de leurs adversaires: 50''000 chameaux, 250''000 brebis et 2000 ânes, et firent 100''000 prisonniers. '
  '22':
  - type: text
    content: Il y eut beaucoup de morts, parce que le combat dépendait de Dieu, et ils s'installèrent à leur place jusqu'au moment de l'exil.
  '23':
  - type: text
    content: 'Les membres de la demi-tribu de Manassé habitaient dans le pays qui va du Basan jusqu''à Baal-Hermon, c''est-à-dire Senir ou le mont Hermon. Ils étaient nombreux. '
  '24':
  - type: text
    content: 'Voici les chefs de leurs familles: Epher, Jisheï, Eliel, Azriel, Jérémie, Hodavia et Jachdiel. C''étaient de vaillants hommes, des hommes respectés, qui étaient chefs de leurs familles. '
  '25':
  - type: text
    content: 'Cependant, ils firent preuve d''infidélité envers le Dieu de leurs ancêtres et se prostituèrent aux dieux des peuples du pays que Dieu avait détruits devant eux. '
  '26':
  - type: text
    content: Le Dieu d'Israël réveilla l'esprit de Pul, roi d'Assyrie, l'esprit de Tilgath-Pilnéser, roi d'Assyrie, et celui-ci exila les Rubénites, les Gadites et la demi-tribu de Manassé. Il les conduisit à Chalach, à Chabor, à Hara et au fleuve qui coule à Gozan, où ils sont restés jusqu'à aujourd'hui.
  - type: heading
    content: Descendance de Lévi
  '27':
  - type: text
    content: 'Fils de Lévi: Guershon, Kehath et Merari. '
  '28':
  - type: text
    content: 'Fils de Kehath: Amram, Jitsehar, Hébron et Uziel. '
  '29':
  - type: text
    content: 'Enfants d''Amram: Aaron, Moïse et Miriam. Fils d''Aaron: Nadab, Abihu, Eléazar et Ithamar. '
  '3':
  - type: text
    content: 'Descendants de Ruben, l''aîné d''Israël: Hénoc, Pallu, Hetsron et Carmi. '
  '30':
  - type: text
    content: 'Eléazar eut pour fils Phinées; Phinées eut Abishua; '
  '31':
  - type: text
    content: 'Abishua eut pour fils Bukki; Bukki eut Uzzi; '
  '32':
  - type: text
    content: 'Uzzi eut pour fils Zerachja; Zerachja eut Merajoth; '
  '33':
  - type: text
    content: 'Merajoth eut pour fils Amaria; Amaria eut Achithub; '
  '34':
  - type: text
    content: 'Achithub eut pour fils Tsadok; Tsadok eut Achimaats; '
  '35':
  - type: text
    content: 'Achimaats eut pour fils Azaria; Azaria eut Jochanan; '
  '36':
  - type: text
    content: 'Jochanan eut pour fils Azaria, qui exerça ses fonctions de prêtre dans le temple que Salomon construisit à Jérusalem; '
  '37':
  - type: text
    content: 'Azaria eut pour fils Amaria; Amaria eut Achithub; '
  '38':
  - type: text
    content: 'Achithub eut pour fils Tsadok; Tsadok eut Shallum; '
  '39':
  - type: text
    content: 'Shallum eut pour fils Hilkija; Hilkija eut Azaria; '
  '4':
  - type: text
    content: 'Descendants de Joël: Shemaeja, lui-même père de Gog, père de Shimeï, '
  '40':
  - type: text
    content: 'Azaria eut pour fils Seraja; Seraja eut Jehotsadak. '
  '41':
  - type: text
    content: Jehotsadak partit quand l'Eternel exila Juda et Jérusalem par l'intermédiaire de Nebucadnetsar.
  '5':
  - type: text
    content: 'père de Michée, père de Reaja, père de Baal, '
  '6':
  - type: text
    content: 'père de Beéra, que Tilgath-Pilnéser, roi d''Assyrie, emmena en exil. Il était chef des Rubénites. '
  '7':
  - type: text
    content: 'Voici ceux qui étaient apparentés à Beéra en fonction de leurs clans, tels qu''ils sont enregistrés dans les généalogies en fonction de leur lignée: à leur tête était Jeïel, puis venaient Zacharie '
  '8':
  - type: text
    content: 'et Béla, fils d''Azaz et petit-fils de Shéma, le fils de Joël. Ils habitaient à Aroër et leur territoire s''étendait jusqu''à Nebo et à Baal-Meon. '
  '9':
  - type: text
    content: 'A l''est, ils avaient pour habitation jusqu''à l''entrée du désert qui fait séparation avec l''Euphrate. En effet, ils avaient de nombreux troupeaux dans le pays de Galaad. '
