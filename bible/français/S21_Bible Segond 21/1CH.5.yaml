document_id: 1CH.5
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Descendance de Ruben, Gad et Manassé
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Descendants de Ruben, l''aîné d''Israël. En effet, c''était lui le premier-né, mais, parce qu''il avait souillé le lit de son père, son droit d''aînesse fut donné aux fils de Joseph, le fils d''Israël, si bien qu''il ne fut pas enregistré dans les généalogies comme le premier-né. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Quant à Juda, il fut certes puissant parmi ses frères et de lui est issu un prince, mais le droit d'aînesse appartenait à Joseph.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Descendants de Ruben, l''aîné d''Israël: Hénoc, Pallu, Hetsron et Carmi. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Descendants de Joël: Shemaeja, lui-même père de Gog, père de Shimeï, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'père de Michée, père de Reaja, père de Baal, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'père de Beéra, que Tilgath-Pilnéser, roi d''Assyrie, emmena en exil. Il était chef des Rubénites. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Voici ceux qui étaient apparentés à Beéra en fonction de leurs clans, tels qu''ils sont enregistrés dans les généalogies en fonction de leur lignée: à leur tête était Jeïel, puis venaient Zacharie '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'et Béla, fils d''Azaz et petit-fils de Shéma, le fils de Joël. Ils habitaient à Aroër et leur territoire s''étendait jusqu''à Nebo et à Baal-Meon. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'A l''est, ils avaient pour habitation jusqu''à l''entrée du désert qui fait séparation avec l''Euphrate. En effet, ils avaient de nombreux troupeaux dans le pays de Galaad. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: A l'époque de Saül, ils firent la guerre aux Hagaréniens et les battirent. Ils habitèrent alors dans leurs tentes, sur tout le côté est de Galaad.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Les descendants de Gad habitaient vis-à-vis d''eux, dans le pays du Basan et jusqu''à Salca. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Joël était à leur tête, Shapham venait en deuxième, puis venaient Jaenaï et Shaphath en Basan. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Voici ceux qui leur étaient apparentés en fonction de leur famille: Micaël, Meshullam, Shéba, Joraï, Jaecan, Zia et Eber, ce qui fait 7. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Ils étaient les fils d''Abichaïl, lui-même fils de Huri, fils de Jaroach, fils de Galaad, fils de Micaël, fils de Jeshishaï, fils de Jachdo, fils de Buz. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Achi, fils d''Abdiel et petit-fils de Guni, était le chef de leurs familles. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Ils habitaient en Galaad, en Basan et dans les villes qui en dépendaient, ainsi que jusqu''aux confins de tous les territoires du Saron. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Ils furent tous enregistrés dans les généalogies durant les règnes de Jotham sur Juda et de Jéroboam sur Israël.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Les Rubénites, les Gadites et la demi-tribu de Manassé disposaient de 44''760 vaillants hommes capables de manier le bouclier et l''épée ou de tirer à l''arc. C''étaient des hommes formés à la guerre et aptes au service militaire. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Ils firent la guerre aux Hagaréniens ainsi qu''à Jethur, Naphish et Nodab. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Ils reçurent du secours contre eux, et les Hagaréniens et tous ceux qui étaient avec eux furent livrés entre leurs mains. En effet, pendant le combat, ils avaient crié à Dieu, et il les exauça parce qu''ils avaient placé leur confiance en lui. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Ils prirent les troupeaux de leurs adversaires: 50''000 chameaux, 250''000 brebis et 2000 ânes, et firent 100''000 prisonniers. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: Il y eut beaucoup de morts, parce que le combat dépendait de Dieu, et ils s'installèrent à leur place jusqu'au moment de l'exil.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Les membres de la demi-tribu de Manassé habitaient dans le pays qui va du Basan jusqu''à Baal-Hermon, c''est-à-dire Senir ou le mont Hermon. Ils étaient nombreux. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Voici les chefs de leurs familles: Epher, Jisheï, Eliel, Azriel, Jérémie, Hodavia et Jachdiel. C''étaient de vaillants hommes, des hommes respectés, qui étaient chefs de leurs familles. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Cependant, ils firent preuve d''infidélité envers le Dieu de leurs ancêtres et se prostituèrent aux dieux des peuples du pays que Dieu avait détruits devant eux. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: Le Dieu d'Israël réveilla l'esprit de Pul, roi d'Assyrie, l'esprit de Tilgath-Pilnéser, roi d'Assyrie, et celui-ci exila les Rubénites, les Gadites et la demi-tribu de Manassé. Il les conduisit à Chalach, à Chabor, à Hara et au fleuve qui coule à Gozan, où ils sont restés jusqu'à aujourd'hui.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Descendance de Lévi
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'Fils de Lévi: Guershon, Kehath et Merari. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'Fils de Kehath: Amram, Jitsehar, Hébron et Uziel. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'Enfants d''Amram: Aaron, Moïse et Miriam. Fils d''Aaron: Nadab, Abihu, Eléazar et Ithamar. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'Eléazar eut pour fils Phinées; Phinées eut Abishua; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'Abishua eut pour fils Bukki; Bukki eut Uzzi; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'Uzzi eut pour fils Zerachja; Zerachja eut Merajoth; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: 'Merajoth eut pour fils Amaria; Amaria eut Achithub; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: 'Achithub eut pour fils Tsadok; Tsadok eut Achimaats; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: 'Achimaats eut pour fils Azaria; Azaria eut Jochanan; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: 'Jochanan eut pour fils Azaria, qui exerça ses fonctions de prêtre dans le temple que Salomon construisit à Jérusalem; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: 'Azaria eut pour fils Amaria; Amaria eut Achithub; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: text
    text: 'Achithub eut pour fils Tsadok; Tsadok eut Shallum; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '39'
  - type: text
    text: 'Shallum eut pour fils Hilkija; Hilkija eut Azaria; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '40'
  - type: text
    text: 'Azaria eut pour fils Seraja; Seraja eut Jehotsadak. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '41'
  - type: text
    text: Jehotsadak partit quand l'Eternel exila Juda et Jérusalem par l'intermédiaire de Nebucadnetsar.
