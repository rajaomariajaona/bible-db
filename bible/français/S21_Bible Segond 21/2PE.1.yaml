document_id: 2PE.1,152
type_code: fra
verses:
  '1':
  - type: heading
    content: Adresse et salutation
  - type: text
    content: 'De la part de Simon Pierre, serviteur et apôtre de Jésus-Christ, à ceux qui ont reçu, par la justice de notre Dieu et Sauveur Jésus-Christ, une foi du même prix que la nôtre: '
  '10':
  - type: text
    content: 'C''est pourquoi, frères et sœurs, appliquez-vous d''autant plus à affermir l''appel et le choix dont vous avez été l''objet, car si vous faites cela, vous ne trébucherez jamais. '
  '11':
  - type: text
    content: C'est ainsi en effet que l'entrée dans le royaume éternel de notre Seigneur et Sauveur Jésus-Christ vous sera largement accordée.
  - type: heading
    content: Véritable enseignement et prétendus enseignants
  '12':
  - type: text
    content: 'Voilà pourquoi je prendrai soin de toujours vous rappeler ces choses, bien que vous les connaissiez déjà et que vous soyez affermis dans la vérité présente. '
  '13':
  - type: text
    content: Oui, j'estime juste de vous tenir en éveil par mes rappels aussi longtemps que je suis dans cette tente
  - type: note
    content: 'Dans cette tente: c''est-à-dire dans ce corps, sur la terre.'
  - type: text
    content: ', '
  '14':
  - type: text
    content: 'car je sais que je quitterai bientôt ce corps, comme notre Seigneur Jésus-Christ me l''a fait connaître. '
  '15':
  - type: text
    content: Mais je ferai en sorte qu'après mon départ vous puissiez en toute occasion vous souvenir de ces enseignements.
  '16':
  - type: text
    content: 'En effet, ce n''est pas en suivant des fables habilement conçues que nous vous avons fait connaître la puissante venue de notre Seigneur Jésus-Christ, mais c''est après avoir vu sa majesté de nos propres yeux. '
  '17':
  - type: text
    content: 'Oui, il a reçu de Dieu le Père honneur et gloire quand la gloire magnifique lui a fait entendre une voix qui disait: «Celui-ci est mon Fils bien-aimé, qui a toute mon approbation.» '
  '18':
  - type: text
    content: Cette voix, nous l'avons nous-mêmes entendue venir du ciel lorsque nous étions avec lui sur la sainte montagne
  - type: note
    content: 'Sur la sainte montagne: allusion à l''épisode de la transfiguration, relaté en Matthieu 17.1-9.'
  - type: text
    content: ', '
  '19':
  - type: text
    content: 'et nous considérons comme d''autant plus certaine la parole des prophètes. Vous faites bien de lui prêter attention comme à une lampe qui brille dans un lieu obscur jusqu''à ce que le jour commence à poindre et que l''étoile du matin se lève dans votre cœur. '
  '2':
  - type: text
    content: que la grâce et la paix vous soient multipliées par la connaissance de Dieu et de Jésus notre Seigneur!
  - type: heading
    content: Les fruits de l'appel de Dieu
  '20':
  - type: text
    content: 'Sachez avant tout qu''aucune prophétie de l''Ecriture n''est une affaire d''interprétation personnelle, '
  '21':
  - type: text
    content: car ce n'est jamais par une volonté d'homme qu'une prophétie a été apportée, mais c'est poussés par le Saint-Esprit que des hommes ont parlé de la part de Dieu.
  '3':
  - type: text
    content: 'Sa divine puissance nous a donné tout ce qui est nécessaire à la vie et à la piété en nous faisant connaître celui qui nous a appelés par sa [propre] gloire et par sa force. '
  '4':
  - type: text
    content: Celles-ci nous assurent les plus grandes et les plus précieuses promesses. Ainsi, grâce à elles, vous pouvez fuir la corruption qui existe dans le monde par la convoitise et devenir participants de la nature divine.
  '5':
  - type: text
    content: 'Pour cette raison même, faites tous vos efforts afin d''ajouter à votre foi la qualité morale, à la qualité morale la connaissance, '
  '6':
  - type: text
    content: 'à la connaissance la maîtrise de soi, à la maîtrise de soi la persévérance, à la persévérance la piété, '
  '7':
  - type: text
    content: 'à la piété l''amitié fraternelle, à l''amitié fraternelle l''amour. '
  '8':
  - type: text
    content: 'En effet, si ces qualités sont en vous et se développent, elles ne vous laissent pas inactifs ni stériles pour la connaissance de notre Seigneur Jésus-Christ. '
  '9':
  - type: text
    content: 'Quant à celui qui ne possède pas ces qualités, il est aveuglé par sa myopie: il oublie qu''il a été purifié de ses anciens péchés.'
