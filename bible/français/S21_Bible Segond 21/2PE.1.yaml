document_id: 2PE.1
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Adresse et salutation
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'De la part de Simon Pierre, serviteur et apôtre de Jésus-Christ, à ceux qui ont reçu, par la justice de notre Dieu et Sauveur Jésus-Christ, une foi du même prix que la nôtre: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: que la grâce et la paix vous soient multipliées par la connaissance de Dieu et de Jésus notre Seigneur!
- type: usfm
  marker: s1
  children:
  - type: text
    text: Les fruits de l'appel de Dieu
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Sa divine puissance nous a donné tout ce qui est nécessaire à la vie et à la piété en nous faisant connaître celui qui nous a appelés par sa [propre] gloire et par sa force. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Celles-ci nous assurent les plus grandes et les plus précieuses promesses. Ainsi, grâce à elles, vous pouvez fuir la corruption qui existe dans le monde par la convoitise et devenir participants de la nature divine.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Pour cette raison même, faites tous vos efforts afin d''ajouter à votre foi la qualité morale, à la qualité morale la connaissance, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'à la connaissance la maîtrise de soi, à la maîtrise de soi la persévérance, à la persévérance la piété, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'à la piété l''amitié fraternelle, à l''amitié fraternelle l''amour. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'En effet, si ces qualités sont en vous et se développent, elles ne vous laissent pas inactifs ni stériles pour la connaissance de notre Seigneur Jésus-Christ. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Quant à celui qui ne possède pas ces qualités, il est aveuglé par sa myopie: il oublie qu''il a été purifié de ses anciens péchés.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'C''est pourquoi, frères et sœurs, appliquez-vous d''autant plus à affermir l''appel et le choix dont vous avez été l''objet, car si vous faites cela, vous ne trébucherez jamais. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: C'est ainsi en effet que l'entrée dans le royaume éternel de notre Seigneur et Sauveur Jésus-Christ vous sera largement accordée.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Véritable enseignement et prétendus enseignants
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Voilà pourquoi je prendrai soin de toujours vous rappeler ces choses, bien que vous les connaissiez déjà et que vous soyez affermis dans la vérité présente. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Oui, j'estime juste de vous tenir en éveil par mes rappels aussi longtemps que je suis dans cette tente
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1.13 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Dans cette tente: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: c'est-à-dire dans ce corps, sur la terre.
    marker-yv: yv-n
  - type: text
    text: ', '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'car je sais que je quitterai bientôt ce corps, comme notre Seigneur Jésus-Christ me l''a fait connaître. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Mais je ferai en sorte qu'après mon départ vous puissiez en toute occasion vous souvenir de ces enseignements.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'En effet, ce n''est pas en suivant des fables habilement conçues que nous vous avons fait connaître la puissante venue de notre Seigneur Jésus-Christ, mais c''est après avoir vu sa majesté de nos propres yeux. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Oui, il a reçu de Dieu le Père honneur et gloire quand la gloire magnifique lui a fait entendre une voix qui disait: «Celui-ci est mon Fils bien-aimé, qui a toute mon approbation.» '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Cette voix, nous l'avons nous-mêmes entendue venir du ciel lorsque nous étions avec lui sur la sainte montagne
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1.18 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Sur la sainte montagne: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'allusion à l''épisode de la transfiguration, relaté en '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Matthieu 17.1-9
      metadata:
        usfm: MAT.17.1+MAT.17.2+MAT.17.3+MAT.17.4+MAT.17.5+MAT.17.6+MAT.17.7+MAT.17.8+MAT.17.9
    - type: usfm
      marker: ft
      children:
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: ', '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'et nous considérons comme d''autant plus certaine la parole des prophètes. Vous faites bien de lui prêter attention comme à une lampe qui brille dans un lieu obscur jusqu''à ce que le jour commence à poindre et que l''étoile du matin se lève dans votre cœur. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Sachez avant tout qu''aucune prophétie de l''Ecriture n''est une affaire d''interprétation personnelle, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: car ce n'est jamais par une volonté d'homme qu'une prophétie a été apportée, mais c'est poussés par le Saint-Esprit que des hommes ont parlé de la part de Dieu.
