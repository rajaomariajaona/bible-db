document_id: 1SA.31,152
type_code: fra
verses:
  '1':
  - type: heading
    content: Mort de Saül et de Jonathan
  - type: text
    content: 'Les Philistins livrèrent bataille à Israël et les Israélites prirent la fuite devant eux. Ils tombèrent morts sur le mont Guilboa. '
  '10':
  - type: text
    content: Ils déposèrent les armes de Saül dans le temple des Astartés et ils attachèrent son cadavre sur les murs de Beth-Shan.
  '11':
  - type: text
    content: 'Lorsque les habitants de Jabès en Galaad apprirent ce que les Philistins avaient fait à Saül, '
  '12':
  - type: text
    content: 'tous les hommes vaillants se levèrent. Après avoir marché toute la nuit, ils arrachèrent les cadavres de Saül et de ses fils des murs de Beth-Shan. Ensuite ils revinrent à Jabès, où ils les brûlèrent. '
  '13':
  - type: text
    content: Ils prirent leurs ossements et les enterrèrent sous le tamaris à Jabès, puis ils jeûnèrent pendant 7 jours.
  '2':
  - type: text
    content: 'Les Philistins rattrapèrent Saül et ses fils, et ils tuèrent Jonathan, Abinadab et Malkishua, les fils de Saül. '
  '3':
  - type: text
    content: 'L''effort du combat porta sur Saül. Les archers le touchèrent et le blessèrent grièvement. '
  '4':
  - type: text
    content: 'Saül dit alors à son porteur d''armes: «Tire ton épée et transperce-moi! Sinon, ce seront ces incirconcis qui viendront le faire et ils me feront subir leurs mauvais traitements.» Son porteur d''armes ne voulut pas le tuer, car il était rempli de peur. Alors Saül prit son épée et se jeta dessus. '
  '5':
  - type: text
    content: 'Voyant Saül mort, son porteur d''armes se jeta aussi sur son épée et il mourut avec lui. '
  '6':
  - type: text
    content: 'C''est ainsi que Saül et ses trois fils, son porteur d''armes et tous ses hommes moururent en même temps, dans cette journée. '
  '7':
  - type: text
    content: Lorsqu'ils virent que les Israélites s'enfuyaient et que Saül et ses fils étaient morts, ceux d'Israël qui étaient de l'autre côté de la vallée et de l'autre côté du Jourdain abandonnèrent leurs villes pour prendre aussi la fuite. Les Philistins allèrent s'y installer.
  '8':
  - type: text
    content: 'Le lendemain, les Philistins vinrent pour dépouiller les morts, et ils trouvèrent le cadavre de Saül et de ses trois fils sur le mont Guilboa. '
  '9':
  - type: text
    content: 'Ils coupèrent la tête de Saül et le dépouillèrent de ses armes. Puis ils les firent circuler dans tout le pays des Philistins pour annoncer la nouvelle dans les temples de leurs idoles et parmi le peuple. '
