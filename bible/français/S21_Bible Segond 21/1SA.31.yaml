document_id: 1SA.31
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Mort de Saül et de Jonathan
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Les Philistins livrèrent bataille à Israël et les Israélites prirent la fuite devant eux. Ils tombèrent morts sur le mont Guilboa. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Les Philistins rattrapèrent Saül et ses fils, et ils tuèrent Jonathan, Abinadab et Malkishua, les fils de Saül. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'L''effort du combat porta sur Saül. Les archers le touchèrent et le blessèrent grièvement. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Saül dit alors à son porteur d''armes: «Tire ton épée et transperce-moi! Sinon, ce seront ces incirconcis qui viendront le faire et ils me feront subir leurs mauvais traitements.» Son porteur d''armes ne voulut pas le tuer, car il était rempli de peur. Alors Saül prit son épée et se jeta dessus. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Voyant Saül mort, son porteur d''armes se jeta aussi sur son épée et il mourut avec lui. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'C''est ainsi que Saül et ses trois fils, son porteur d''armes et tous ses hommes moururent en même temps, dans cette journée. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Lorsqu'ils virent que les Israélites s'enfuyaient et que Saül et ses fils étaient morts, ceux d'Israël qui étaient de l'autre côté de la vallée et de l'autre côté du Jourdain abandonnèrent leurs villes pour prendre aussi la fuite. Les Philistins allèrent s'y installer.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Le lendemain, les Philistins vinrent pour dépouiller les morts, et ils trouvèrent le cadavre de Saül et de ses trois fils sur le mont Guilboa. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Ils coupèrent la tête de Saül et le dépouillèrent de ses armes. Puis ils les firent circuler dans tout le pays des Philistins pour annoncer la nouvelle dans les temples de leurs idoles et parmi le peuple. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Ils déposèrent les armes de Saül dans le temple des Astartés et ils attachèrent son cadavre sur les murs de Beth-Shan.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Lorsque les habitants de Jabès en Galaad apprirent ce que les Philistins avaient fait à Saül, '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'tous les hommes vaillants se levèrent. Après avoir marché toute la nuit, ils arrachèrent les cadavres de Saül et de ses fils des murs de Beth-Shan. Ensuite ils revinrent à Jabès, où ils les brûlèrent. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Ils prirent leurs ossements et les enterrèrent sous le tamaris à Jabès, puis ils jeûnèrent pendant 7 jours.
