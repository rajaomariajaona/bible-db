document_id: ISA.28,152
type_code: fra
verses:
  '1':
  - type: heading
    content: Prophétie sur Ephraïm
  - type: text
    content: Malheur à la couronne éclatante dont sont fiers les ivrognes d'Ephraïm,
  - type: text
    content: à la fleur fanée qui fait l'éclat de sa parure
  - type: text
    content: sur la cime de la vallée fertile, à ceux qui s'enivrent de vin!
  '10':
  - type: text
    content: En effet, c'est ordre sur ordre, ordre sur ordre,
  - type: text
    content: règle sur règle, règle sur règle,
  - type: text
    content: un peu ici, un peu là.»
  '11':
  - type: text
    content: Eh bien, *c'est par des hommes aux lèvres balbutiantes et par une langue étrangère
  - type: text
    content: que l'Eternel parlera à ce peuple.
  '12':
  - type: text
    content: 'Il leur avait dit: «Voici le lieu de repos.'
  - type: text
    content: Laissez se reposer celui qui est fatigué!
  - type: text
    content: Voici le moment de la détente!»
  - type: text
    content: Mais ils n'ont pas voulu écouter,
  - type: note
    content: 'C''est… écouter: cité partiellement en 1 Corinthiens 14.21 par Paul dans son argumentation sur le parler en langues.'
  '13':
  - type: text
    content: et pour eux la parole de l'Eternel sera vraiment
  - type: text
    content: ordre sur ordre, ordre sur ordre,
  - type: text
    content: règle sur règle, règle sur règle,
  - type: text
    content: un peu ici, un peu là,
  - type: text
    content: afin qu'en marchant ils tombent à la renverse et se brisent,
  - type: text
    content: afin qu'ils soient pris au piège et capturés.
  '14':
  - type: text
    content: Ecoutez donc la parole de l'Eternel, hommes habitués à la moquerie,
  - type: text
    content: vous qui dominez sur ce peuple à Jérusalem!
  '15':
  - type: text
    content: 'Vous dites: «Nous avons conclu une alliance avec la mort,'
  - type: text
    content: 'nous avons fait un pacte avec le séjour des morts:'
  - type: text
    content: quand le fléau débordant passera, il ne nous atteindra pas,
  - type: text
    content: car nous avons la fausseté pour refuge et le mensonge pour abri.»
  '16':
  - type: text
    content: 'A cause de cela, voici ce que dit le Seigneur, l''Eternel:'
  - type: text
    content: '*Je mets dans Sion, en guise de fondation,'
  - type: text
    content: une pierre, une pierre choisie, angulaire, précieuse, solidement posée.
  - type: text
    content: Celui qui s'appuie sur elle sera en sécurité.
  - type: note
    content: 'Je mets… sécurité: cité partiellement en Romains 9.33; 10.11 et 1 Pierre 2.6, avec application à Jésus-Christ.'
  '17':
  - type: text
    content: J'ai établi la droiture comme une règle,
  - type: text
    content: et la justice comme un fil à plomb.
  - type: text
    content: La grêle balaiera le refuge de la fausseté
  - type: text
    content: et l'eau inondera l'abri du mensonge.
  '18':
  - type: text
    content: Votre alliance avec la mort sera supprimée,
  - type: text
    content: votre pacte avec le séjour des morts ne tiendra pas.
  - type: text
    content: Lorsque le torrent destructeur passera,
  - type: text
    content: il vous écrasera.
  '19':
  - type: text
    content: Chaque fois qu'il passera, il vous emportera.
  - type: text
    content: Oui, il passera tous les matins, le jour et la nuit,
  - type: text
    content: et son bruit seul provoquera la terreur.
  '2':
  - type: text
    content: Voici qu'arrive, de la part du Seigneur, un homme fort et puissant,
  - type: text
    content: pareil à un orage de grêle ou une tempête destructrice,
  - type: text
    content: 'à des trombes de pluie qui inondent tout:'
  - type: text
    content: il le jette sur la terre avec puissance.
  '20':
  - type: text
    content: Le lit sera trop court pour qu'on puisse s'y étendre,
  - type: text
    content: et la couverture trop étroite pour qu'on puisse s'en envelopper.
  '21':
  - type: text
    content: En effet, l'Eternel se lèvera comme sur la montagne de Peratsim,
  - type: text
    content: il tremblera d'indignation comme dans la vallée de Gabaon
  - type: text
    content: pour faire son œuvre, son œuvre étrange,
  - type: text
    content: pour exécuter son travail, son travail inhabituel.
  '22':
  - type: text
    content: Maintenant, ne faites pas les moqueurs,
  - type: text
    content: sinon votre situation empirera!
  - type: text
    content: La destruction de tout le pays est décidée,
  - type: text
    content: je l'ai appris du Seigneur, de l'Eternel, le maître de l'univers.
  - type: heading
    content: Parabole du cultivateur
  '23':
  - type: text
    content: Prêtez l'oreille et écoutez-moi!
  - type: text
    content: Soyez attentifs et écoutez ma parole!
  '24':
  - type: text
    content: Celui qui laboure en vue des semailles le fait-il constamment?
  - type: text
    content: Remue-t-il et bêche-t-il sans cesse son terrain?
  '25':
  - type: text
    content: Après avoir aplani la surface du sol,
  - type: text
    content: n'y disperse-t-il pas de la nigelle et ne sème-t-il pas du cumin?
  - type: text
    content: Ne met-il pas le blé par rangées,
  - type: text
    content: l'orge à une place marquée
  - type: text
    content: et l'épeautre sur les bords?
  '26':
  - type: text
    content: Son Dieu lui a enseigné la règle à suivre,
  - type: text
    content: 'il l''a instruit:'
  '27':
  - type: text
    content: on n'écrase pas la nigelle avec le traîneau
  - type: text
    content: et la roue du chariot ne passe pas sur le cumin,
  - type: text
    content: mais on bat la nigelle avec un bâton et le cumin avec une baguette;
  '28':
  - type: text
    content: par contre, on doit écraser le blé pour en faire du pain,
  - type: text
    content: on ne le bat pas indéfiniment,
  - type: text
    content: et si l'on fait passer la roue du chariot et les chevaux dessus,
  - type: text
    content: il n'est pas écrasé.
  '29':
  - type: text
    content: Cela aussi vient de l'Eternel, le maître de l'univers.
  - type: text
    content: Il distribue de merveilleux conseils et augmente les capacités de discernement.
  '3':
  - type: text
    content: Elle sera piétinée,
  - type: text
    content: la couronne éclatante dont sont fiers les ivrognes d'Ephraïm;
  '4':
  - type: text
    content: la fleur fanée qui fait l'éclat de sa parure
  - type: text
    content: sur la cime de la vallée fertile
  - type: text
    content: 'sera comme une figue précoce qu''on aperçoit avant la récolte:'
  - type: text
    content: à peine dans la main elle est aussitôt avalée.
  '5':
  - type: text
    content: Ce jour-là, l'Eternel, le maître de l'univers, sera
  - type: text
    content: une couronne majestueuse et une parure magnifique
  - type: text
    content: pour le reste de son peuple.
  '6':
  - type: text
    content: Il sera un esprit de droiture pour celui qui siège au tribunal
  - type: text
    content: et une force pour ceux qui repoussent l'ennemi jusqu'à ses portes.
  '7':
  - type: text
    content: Mais eux aussi, ils titubent sous l'effet du vin
  - type: text
    content: et les liqueurs fortes les égarent;
  - type: text
    content: prêtres et prophètes titubent sous l'effet des liqueurs fortes,
  - type: text
    content: ils sont troublés par le vin,
  - type: text
    content: ils s'égarent à cause des liqueurs fortes.
  - type: text
    content: Ils titubent en prophétisant,
  - type: text
    content: ils vacillent en rendant leurs verdicts.
  '8':
  - type: text
    content: Toutes les tables sont pleines de vomissements infects;
  - type: text
    content: il n'y a plus aucune place intacte.
  '9':
  - type: text
    content: 'Ils disent: «A qui veut-il enseigner la connaissance?'
  - type: text
    content: A qui veut-il faire comprendre son message?
  - type: text
    content: Est-ce à des enfants qui viennent d'être sevrés,
  - type: text
    content: qui viennent de quitter la poitrine de leur mère?
