document_id: ISA.28
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Prophétie sur Ephraïm
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Malheur à la couronne éclatante dont sont fiers les ivrognes d'Ephraïm,
- type: usfm
  marker: q1
  children:
  - type: text
    text: à la fleur fanée qui fait l'éclat de sa parure
- type: usfm
  marker: q1
  children:
  - type: text
    text: sur la cime de la vallée fertile, à ceux qui s'enivrent de vin!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Voici qu'arrive, de la part du Seigneur, un homme fort et puissant,
- type: usfm
  marker: q1
  children:
  - type: text
    text: pareil à un orage de grêle ou une tempête destructrice,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'à des trombes de pluie qui inondent tout:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: il le jette sur la terre avec puissance.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Elle sera piétinée,
- type: usfm
  marker: q1
  children:
  - type: text
    text: la couronne éclatante dont sont fiers les ivrognes d'Ephraïm;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: la fleur fanée qui fait l'éclat de sa parure
- type: usfm
  marker: q1
  children:
  - type: text
    text: sur la cime de la vallée fertile
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'sera comme une figue précoce qu''on aperçoit avant la récolte:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: à peine dans la main elle est aussitôt avalée.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Ce jour-là, l'Eternel, le maître de l'univers, sera
- type: usfm
  marker: q1
  children:
  - type: text
    text: une couronne majestueuse et une parure magnifique
- type: usfm
  marker: q1
  children:
  - type: text
    text: pour le reste de son peuple.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Il sera un esprit de droiture pour celui qui siège au tribunal
- type: usfm
  marker: q1
  children:
  - type: text
    text: et une force pour ceux qui repoussent l'ennemi jusqu'à ses portes.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Mais eux aussi, ils titubent sous l'effet du vin
- type: usfm
  marker: q1
  children:
  - type: text
    text: et les liqueurs fortes les égarent;
- type: usfm
  marker: q1
  children:
  - type: text
    text: prêtres et prophètes titubent sous l'effet des liqueurs fortes,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ils sont troublés par le vin,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ils s'égarent à cause des liqueurs fortes.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ils titubent en prophétisant,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ils vacillent en rendant leurs verdicts.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Toutes les tables sont pleines de vomissements infects;
- type: usfm
  marker: q1
  children:
  - type: text
    text: il n'y a plus aucune place intacte.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Ils disent: «A qui veut-il enseigner la connaissance?'
- type: usfm
  marker: q1
  children:
  - type: text
    text: A qui veut-il faire comprendre son message?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Est-ce à des enfants qui viennent d'être sevrés,
- type: usfm
  marker: q1
  children:
  - type: text
    text: qui viennent de quitter la poitrine de leur mère?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: En effet, c'est ordre sur ordre, ordre sur ordre,
- type: usfm
  marker: q1
  children:
  - type: text
    text: règle sur règle, règle sur règle,
- type: usfm
  marker: q1
  children:
  - type: text
    text: un peu ici, un peu là.»
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Eh bien, *c'est par des hommes aux lèvres balbutiantes et par une langue étrangère
- type: usfm
  marker: q1
  children:
  - type: text
    text: que l'Eternel parlera à ce peuple.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Il leur avait dit: «Voici le lieu de repos.'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Laissez se reposer celui qui est fatigué!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Voici le moment de la détente!»
- type: usfm
  marker: q1
  children:
  - type: text
    text: Mais ils n'ont pas voulu écouter,
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '28.11-12 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'C''est… écouter: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'cité partiellement en '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 1 Corinthiens 14.21
      metadata:
        usfm: 1CO.14.21
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' par Paul dans son argumentation sur le parler en langues.'
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: et pour eux la parole de l'Eternel sera vraiment
- type: usfm
  marker: q1
  children:
  - type: text
    text: ordre sur ordre, ordre sur ordre,
- type: usfm
  marker: q1
  children:
  - type: text
    text: règle sur règle, règle sur règle,
- type: usfm
  marker: q1
  children:
  - type: text
    text: un peu ici, un peu là,
- type: usfm
  marker: q1
  children:
  - type: text
    text: afin qu'en marchant ils tombent à la renverse et se brisent,
- type: usfm
  marker: q1
  children:
  - type: text
    text: afin qu'ils soient pris au piège et capturés.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Ecoutez donc la parole de l'Eternel, hommes habitués à la moquerie,
- type: usfm
  marker: q1
  children:
  - type: text
    text: vous qui dominez sur ce peuple à Jérusalem!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Vous dites: «Nous avons conclu une alliance avec la mort,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'nous avons fait un pacte avec le séjour des morts:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: quand le fléau débordant passera, il ne nous atteindra pas,
- type: usfm
  marker: q1
  children:
  - type: text
    text: car nous avons la fausseté pour refuge et le mensonge pour abri.»
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'A cause de cela, voici ce que dit le Seigneur, l''Eternel:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: '*Je mets dans Sion, en guise de fondation,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: une pierre, une pierre choisie, angulaire, précieuse, solidement posée.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Celui qui s'appuie sur elle sera en sécurité.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '28.16 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Je mets… sécurité: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'cité partiellement en '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Romains 9.33
      metadata:
        usfm: ROM.9.33
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: '10.11'
      metadata:
        usfm: ROM.10.11
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' et '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 1 Pierre 2.6
      metadata:
        usfm: 1PE.2.6
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ', avec application à Jésus-Christ.'
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: J'ai établi la droiture comme une règle,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et la justice comme un fil à plomb.
- type: usfm
  marker: q1
  children:
  - type: text
    text: La grêle balaiera le refuge de la fausseté
- type: usfm
  marker: q1
  children:
  - type: text
    text: et l'eau inondera l'abri du mensonge.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Votre alliance avec la mort sera supprimée,
- type: usfm
  marker: q1
  children:
  - type: text
    text: votre pacte avec le séjour des morts ne tiendra pas.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Lorsque le torrent destructeur passera,
- type: usfm
  marker: q1
  children:
  - type: text
    text: il vous écrasera.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Chaque fois qu'il passera, il vous emportera.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Oui, il passera tous les matins, le jour et la nuit,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et son bruit seul provoquera la terreur.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Le lit sera trop court pour qu'on puisse s'y étendre,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et la couverture trop étroite pour qu'on puisse s'en envelopper.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: En effet, l'Eternel se lèvera comme sur la montagne de Peratsim,
- type: usfm
  marker: q1
  children:
  - type: text
    text: il tremblera d'indignation comme dans la vallée de Gabaon
- type: usfm
  marker: q1
  children:
  - type: text
    text: pour faire son œuvre, son œuvre étrange,
- type: usfm
  marker: q1
  children:
  - type: text
    text: pour exécuter son travail, son travail inhabituel.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: Maintenant, ne faites pas les moqueurs,
- type: usfm
  marker: q1
  children:
  - type: text
    text: sinon votre situation empirera!
- type: usfm
  marker: q1
  children:
  - type: text
    text: La destruction de tout le pays est décidée,
- type: usfm
  marker: q1
  children:
  - type: text
    text: je l'ai appris du Seigneur, de l'Eternel, le maître de l'univers.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Parabole du cultivateur
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: Prêtez l'oreille et écoutez-moi!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Soyez attentifs et écoutez ma parole!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: Celui qui laboure en vue des semailles le fait-il constamment?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Remue-t-il et bêche-t-il sans cesse son terrain?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: Après avoir aplani la surface du sol,
- type: usfm
  marker: q1
  children:
  - type: text
    text: n'y disperse-t-il pas de la nigelle et ne sème-t-il pas du cumin?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ne met-il pas le blé par rangées,
- type: usfm
  marker: q1
  children:
  - type: text
    text: l'orge à une place marquée
- type: usfm
  marker: q1
  children:
  - type: text
    text: et l'épeautre sur les bords?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: Son Dieu lui a enseigné la règle à suivre,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'il l''a instruit:'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: on n'écrase pas la nigelle avec le traîneau
- type: usfm
  marker: q1
  children:
  - type: text
    text: et la roue du chariot ne passe pas sur le cumin,
- type: usfm
  marker: q1
  children:
  - type: text
    text: mais on bat la nigelle avec un bâton et le cumin avec une baguette;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: par contre, on doit écraser le blé pour en faire du pain,
- type: usfm
  marker: q1
  children:
  - type: text
    text: on ne le bat pas indéfiniment,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et si l'on fait passer la roue du chariot et les chevaux dessus,
- type: usfm
  marker: q1
  children:
  - type: text
    text: il n'est pas écrasé.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: Cela aussi vient de l'Eternel, le maître de l'univers.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Il distribue de merveilleux conseils et augmente les capacités de discernement.
