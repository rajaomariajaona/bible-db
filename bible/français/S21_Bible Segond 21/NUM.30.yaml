document_id: NUM.30,152
type_code: fra
verses:
  '1':
  - type: text
    content: Moïse dit aux Israélites tout ce que l'Eternel lui avait ordonné.
  - type: heading
    content: Loi sur les vœux
  '10':
  - type: text
    content: »Dans le cas d'une femme veuve ou divorcée, le vœu ou l'engagement quel qu'il soit par lequel elle se sera liée restera valable pour elle.
  '11':
  - type: text
    content: '»Si c''est dans la maison de son mari qu''une femme fait des vœux ou se lie par un serment, '
  '12':
  - type: text
    content: 'et si son mari en a connaissance mais ne lui dit rien et ne la désapprouve pas, tous ses vœux restent valables, tous les engagements par lesquels elle s''est liée restent valables. '
  '13':
  - type: text
    content: 'En revanche, si son mari les annule le jour où il en prend connaissance, tout vœu et tout engagement sortis de ses lèvres sont sans valeur. C''est son mari qui les a annulés et l''Eternel lui pardonnera. '
  '14':
  - type: text
    content: Son mari peut ratifier ou annuler tout vœu, tout serment par lequel elle s'engage à s'humilier
  - type: note
    content: 'S''humilier: soit en jeûnant, soit en s''abstenant de quelque chose.'
  - type: text
    content: '. '
  '15':
  - type: text
    content: 'S''il ne lui dit rien jusqu''au lendemain, il ratifie ainsi tous les vœux ou tous les engagements par lesquels elle s''est liée. Il les ratifie parce qu''il ne lui a rien dit le jour où il en a pris connaissance. '
  '16':
  - type: text
    content: S'il les annule après le jour où il en a pris connaissance, il supportera les conséquences de la faute de sa femme.»
  '17':
  - type: text
    content: Telles sont les prescriptions que l'Eternel donna à Moïse à propos des relations entre un mari et sa femme ou entre un père et sa fille lorsqu'elle est encore dans sa jeunesse et dans la maison de son père.
  '2':
  - type: text
    content: 'Moïse dit aux chefs des tribus des Israélites: «Voici ce que l''Eternel ordonne. '
  '3':
  - type: text
    content: '*Lorsqu''un homme fera un vœu à l''Eternel ou un serment en se liant par un engagement, il ne violera pas sa parole. Il agira conformément à tout ce qui est sorti de sa bouche.'
  - type: note
    content: 'Lorsqu''un… bouche: principe cité par Jésus en Matthieu 5.33.'
  '4':
  - type: text
    content: '»Lorsque c''est une femme encore dans sa jeunesse et dans la maison de son père qui fait un vœu à l''Eternel et se lie ainsi par un engagement, '
  '5':
  - type: text
    content: 'si son père a connaissance du vœu qu''elle a fait et de l''engagement par lequel elle s''est liée et ne lui dit rien, tout vœu qu''elle aura fait restera valable, tout engagement par lequel elle se sera liée restera valable. '
  '6':
  - type: text
    content: 'En revanche, si son père la désapprouve le jour où il en prend connaissance, tous ses vœux et tous les engagements par lesquels elle se sera liée seront sans valeur. L''Eternel lui pardonnera parce que son père l''a désapprouvée. '
  '7':
  - type: text
    content: 'Dans le cas d''une femme mariée qui fait des vœux ou se lie par une parole échappée de ses lèvres, '
  '8':
  - type: text
    content: 'si son mari en a connaissance et ne lui dit rien le jour où il en prend connaissance, ses vœux resteront valables, les engagements par lesquels elle se sera liée resteront valables. '
  '9':
  - type: text
    content: En revanche, si son mari la désapprouve le jour où il en prend connaissance, il annule ainsi le vœu qu'elle a fait et la parole échappée de ses lèvres par laquelle elle s'est liée, et l'Eternel lui pardonnera.
