document_id: NUM.30
type_code: fra
segments:
- type: usfm
  marker: nb
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Moïse dit aux Israélites tout ce que l'Eternel lui avait ordonné.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Loi sur les vœux
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Moïse dit aux chefs des tribus des Israélites: «Voici ce que l''Eternel ordonne. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: '*Lorsqu''un homme fera un vœu à l''Eternel ou un serment en se liant par un engagement, il ne violera pas sa parole. Il agira conformément à tout ce qui est sorti de sa bouche.'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '30.3 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Lorsqu''un… bouche: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'principe cité par Jésus en '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Matthieu 5.33
      metadata:
        usfm: MAT.5.33
    - type: usfm
      marker: ft
      children:
      - type: text
        text: .
    marker-yv: yv-n
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: '»Lorsque c''est une femme encore dans sa jeunesse et dans la maison de son père qui fait un vœu à l''Eternel et se lie ainsi par un engagement, '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'si son père a connaissance du vœu qu''elle a fait et de l''engagement par lequel elle s''est liée et ne lui dit rien, tout vœu qu''elle aura fait restera valable, tout engagement par lequel elle se sera liée restera valable. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'En revanche, si son père la désapprouve le jour où il en prend connaissance, tous ses vœux et tous les engagements par lesquels elle se sera liée seront sans valeur. L''Eternel lui pardonnera parce que son père l''a désapprouvée. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Dans le cas d''une femme mariée qui fait des vœux ou se lie par une parole échappée de ses lèvres, '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'si son mari en a connaissance et ne lui dit rien le jour où il en prend connaissance, ses vœux resteront valables, les engagements par lesquels elle se sera liée resteront valables. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: En revanche, si son mari la désapprouve le jour où il en prend connaissance, il annule ainsi le vœu qu'elle a fait et la parole échappée de ses lèvres par laquelle elle s'est liée, et l'Eternel lui pardonnera.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: »Dans le cas d'une femme veuve ou divorcée, le vœu ou l'engagement quel qu'il soit par lequel elle se sera liée restera valable pour elle.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: '»Si c''est dans la maison de son mari qu''une femme fait des vœux ou se lie par un serment, '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'et si son mari en a connaissance mais ne lui dit rien et ne la désapprouve pas, tous ses vœux restent valables, tous les engagements par lesquels elle s''est liée restent valables. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'En revanche, si son mari les annule le jour où il en prend connaissance, tout vœu et tout engagement sortis de ses lèvres sont sans valeur. C''est son mari qui les a annulés et l''Eternel lui pardonnera. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Son mari peut ratifier ou annuler tout vœu, tout serment par lequel elle s'engage à s'humilier
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '30.14 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'S''humilier: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: soit en jeûnant, soit en s'abstenant de quelque chose.
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'S''il ne lui dit rien jusqu''au lendemain, il ratifie ainsi tous les vœux ou tous les engagements par lesquels elle s''est liée. Il les ratifie parce qu''il ne lui a rien dit le jour où il en a pris connaissance. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: S'il les annule après le jour où il en a pris connaissance, il supportera les conséquences de la faute de sa femme.»
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Telles sont les prescriptions que l'Eternel donna à Moïse à propos des relations entre un mari et sa femme ou entre un père et sa fille lorsqu'elle est encore dans sa jeunesse et dans la maison de son père.
