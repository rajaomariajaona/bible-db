document_id: JOB.4,152
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Intervention n° 1 d'Eliphaz
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Eliphaz de Théman prit la parole et dit:'
  '10':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: Le lion a beau rugir, le fauve a beau gronder,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: les dents des lionceaux sont brisées;
  '11':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: le lion meurt faute de proie
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et les petits de la lionne se dispersent.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: »Une parole est arrivée furtivement jusqu'à moi,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et mon oreille en a perçu les sons légers.
  '13':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: Au moment où les pensées sont agitées par les visions de la nuit,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: quand un sommeil profond tombe sur les hommes,
  '14':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: j'ai été saisi de frayeur et d'épouvante
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et tous mes os ont tremblé.
  '15':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: Un esprit est passé près de mon visage,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: tous les poils de mon corps se sont hérissés.
  '16':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: Quelqu'un se tenait là. Je ne le reconnaissais pas.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Une silhouette était devant mes yeux.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Il y a d''abord eu un silence, puis j''ai entendu sa voix:'
  '17':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: ‘L'homme pourrait-il être juste devant Dieu?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Pourrait-il être pur devant celui qui l'a fait?
  '18':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: Si Dieu ne peut faire confiance à ses serviteurs,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: s'il trouve des défauts chez ses anges,
  '19':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: ce sera d'autant plus le cas pour ceux qui habitent des maisons d'argile
  - type: usfm
    marker: q1
    children:
    - type: text
      text: aux fondations posées dans la poussière
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et qui peuvent être écrasés plus vite qu'une mite!
  '2':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: «Si l'on tente de te dire un mot, le supporteras-tu?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mais comment serait-il possible de garder le silence?
  '20':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: Il suffit d'une journée pour les briser;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ils disparaissent définitivement et personne n'y prête attention.
  '21':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: Le cordage de leur vie est-il coupé,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ils meurent sans avoir acquis la sagesse.’
  '3':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: Tu as donné de nombreux avertissements,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: tu as fortifié les bras qui se baissaient,
  '4':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: tes paroles ont relevé ceux qui trébuchaient,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: tu as affermi les genoux qui pliaient,
  '5':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: et maintenant qu'il s'agit de toi, tu es abattu!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Maintenant que tu es atteint, tu es bouleversé!
  '6':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: Ta crainte de Dieu ne devrait-elle pas être ton soutien?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ton espérance, n'est-ce pas l'intégrité de ta conduite?
  '7':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: '»Cherche donc dans ton souvenir: quel est l''innocent qui est mort?'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Où a-t-on vu disparaître les hommes droits?
  '8':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'Pour ma part, voici ce que j''ai vu: ceux qui labourent l''injustice'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et qui sèment le malheur en récoltent les fruits;
  '9':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: ils sont détruits par le souffle de Dieu,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ils sont exterminés par le vent de sa colère.
