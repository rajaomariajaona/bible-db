document_id: JOB.4,152
type_code: fra
verses:
  '1':
  - type: heading
    content: Intervention n° 1 d'Eliphaz
  - type: text
    content: 'Eliphaz de Théman prit la parole et dit:'
  '10':
  - type: text
    content: Le lion a beau rugir, le fauve a beau gronder,
  - type: text
    content: les dents des lionceaux sont brisées;
  '11':
  - type: text
    content: le lion meurt faute de proie
  - type: text
    content: et les petits de la lionne se dispersent.
  '12':
  - type: text
    content: »Une parole est arrivée furtivement jusqu'à moi,
  - type: text
    content: et mon oreille en a perçu les sons légers.
  '13':
  - type: text
    content: Au moment où les pensées sont agitées par les visions de la nuit,
  - type: text
    content: quand un sommeil profond tombe sur les hommes,
  '14':
  - type: text
    content: j'ai été saisi de frayeur et d'épouvante
  - type: text
    content: et tous mes os ont tremblé.
  '15':
  - type: text
    content: Un esprit est passé près de mon visage,
  - type: text
    content: tous les poils de mon corps se sont hérissés.
  '16':
  - type: text
    content: Quelqu'un se tenait là. Je ne le reconnaissais pas.
  - type: text
    content: Une silhouette était devant mes yeux.
  - type: text
    content: 'Il y a d''abord eu un silence, puis j''ai entendu sa voix:'
  '17':
  - type: text
    content: ‘L'homme pourrait-il être juste devant Dieu?
  - type: text
    content: Pourrait-il être pur devant celui qui l'a fait?
  '18':
  - type: text
    content: Si Dieu ne peut faire confiance à ses serviteurs,
  - type: text
    content: s'il trouve des défauts chez ses anges,
  '19':
  - type: text
    content: ce sera d'autant plus le cas pour ceux qui habitent des maisons d'argile
  - type: text
    content: aux fondations posées dans la poussière
  - type: text
    content: et qui peuvent être écrasés plus vite qu'une mite!
  '2':
  - type: text
    content: «Si l'on tente de te dire un mot, le supporteras-tu?
  - type: text
    content: Mais comment serait-il possible de garder le silence?
  '20':
  - type: text
    content: Il suffit d'une journée pour les briser;
  - type: text
    content: ils disparaissent définitivement et personne n'y prête attention.
  '21':
  - type: text
    content: Le cordage de leur vie est-il coupé,
  - type: text
    content: ils meurent sans avoir acquis la sagesse.’
  '3':
  - type: text
    content: Tu as donné de nombreux avertissements,
  - type: text
    content: tu as fortifié les bras qui se baissaient,
  '4':
  - type: text
    content: tes paroles ont relevé ceux qui trébuchaient,
  - type: text
    content: tu as affermi les genoux qui pliaient,
  '5':
  - type: text
    content: et maintenant qu'il s'agit de toi, tu es abattu!
  - type: text
    content: Maintenant que tu es atteint, tu es bouleversé!
  '6':
  - type: text
    content: Ta crainte de Dieu ne devrait-elle pas être ton soutien?
  - type: text
    content: Ton espérance, n'est-ce pas l'intégrité de ta conduite?
  '7':
  - type: text
    content: '»Cherche donc dans ton souvenir: quel est l''innocent qui est mort?'
  - type: text
    content: Où a-t-on vu disparaître les hommes droits?
  '8':
  - type: text
    content: 'Pour ma part, voici ce que j''ai vu: ceux qui labourent l''injustice'
  - type: text
    content: et qui sèment le malheur en récoltent les fruits;
  '9':
  - type: text
    content: ils sont détruits par le souffle de Dieu,
  - type: text
    content: ils sont exterminés par le vent de sa colère.
