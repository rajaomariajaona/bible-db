document_id: REV.1
type_code: fra
segments:
- type: usfm
  marker: ms1
  children:
  - type: text
    text: Message à sept Eglises
  marker-yv: yv-h
- type: usfm
  marker: mr
  children:
  - type: text
    text: 1.1–3.22
  marker-yv: yv-h
- type: usfm
  marker: s1
  children:
  - type: text
    text: Titre et salutation
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: ' '
  - type: usfm
    marker: qt
    children:
    - type: text
      text: Révélation
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1.1 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Révélation: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: le mot grec a donné le français Apocalypse.
    marker-yv: yv-n
  - type: usfm
    marker: qt
    children:
    - type: text
      text: de Jésus-Christ.
  - type: text
    text: ' Dieu la lui a donnée pour montrer à ses serviteurs ce qui doit arriver bientôt et l''a fait connaître en envoyant son ange à son serviteur Jean. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Celui-ci l''a attesté, tout ce qu''il a vu est la parole de Dieu et le témoignage de Jésus-Christ. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Heureux celui qui lit et ceux qui écoutent les paroles de la prophétie et gardent ce qui s'y trouve écrit, car le moment est proche!
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'De la part de Jean aux sept Eglises qui sont en Asie: que la grâce et la paix vous soient données de la part de [Dieu,] celui qui est, qui était et qui vient, de la part des sept esprits'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1.4 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Sept esprits: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: c'est-à-dire le Saint-Esprit.
    marker-yv: yv-n
  - type: text
    text: ' qui sont devant son trône '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'et de la part de Jésus-Christ, le témoin fidèle, le premier-né d''entre les morts et le chef des rois de la terre! A celui qui nous aime, qui nous a lavés de nos péchés par son sang '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: et qui a fait de nous un royaume, des prêtres pour Dieu son Père, à lui soient la gloire et la domination aux siècles des siècles! Amen!
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Le voici qui vient avec les nuées. Tout œil le verra, même ceux qui l''ont transpercé, et toutes les familles de la terre pleureront amèrement sur lui. Oui. Amen! '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: «Je suis l'Alpha et l'Oméga
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1.8 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'L''Alpha et l''Oméga: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: première et dernière lettres de l'alphabet grec.
    marker-yv: yv-n
  - type: text
    text: ', dit le Seigneur Dieu, celui qui est, qui était et qui vient, le Tout-Puissant.»'
- type: usfm
  marker: s1
  children:
  - type: text
    text: Vision du Fils de l'homme
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Moi Jean, votre frère et votre compagnon dans la persécution, le royaume et la persévérance en Jésus-Christ, j''étais dans l''île appelée Patmos à cause de la parole de Dieu et du témoignage de Jésus-Christ. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Je fus saisi par l''Esprit le jour du Seigneur et j''entendis derrière moi une voix forte comme le son d''une trompette. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Elle disait: «Ce que tu vois, écris-le dans un livre et envoie-le aux sept Eglises: à Ephèse, à Smyrne, à Pergame, à Thyatire, à Sardes, à Philadelphie et à Laodicée.»'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Je me retournai pour savoir quelle était la voix qui me parlait. M''étant donc retourné, je vis sept chandeliers d''or, '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'et au milieu des [sept] chandeliers quelqu''un qui ressemblait à un fils d''homme. Il était habillé d''une longue robe et portait une écharpe en or sur la poitrine. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Sa tête et ses cheveux étaient blancs comme de la laine blanche, comme de la neige. Ses yeux étaient comme une flamme de feu, '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'ses pieds étaient semblables à du bronze ardent, comme s''ils avaient été embrasés dans une fournaise, et sa voix ressemblait au bruit de grandes eaux. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Il tenait dans sa main droite sept étoiles, de sa bouche sortait une épée aiguë à deux tranchants et son visage était comme le soleil lorsqu'il brille dans toute sa force.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Quand je le vis, je tombai à ses pieds comme mort. Il posa alors sa main droite sur moi en disant: «N''aie pas peur. Je suis le premier et le dernier, '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'le vivant. J''étais mort et voici, je suis vivant aux siècles des siècles. Je détiens les clés de la mort et du séjour des morts. '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Ecris donc ce que tu as vu, ce qui est et ce qui doit arriver ensuite. '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Quant au mystère des sept étoiles que tu as vues dans ma main droite et des sept chandeliers d''or, le voici: les sept étoiles sont les anges des sept Eglises et les sept chandeliers sont les sept Eglises.'
