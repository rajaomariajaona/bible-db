document_id: REV.1,152
type_code: fra
verses:
  '1':
  - type: heading
    content: Message à sept Eglises
  - type: heading
    content: 1.1–3.22
  - type: heading
    content: Titre et salutation
  - type: text
    content: ' '
  - type: text
    content: Révélation
  - type: text
    content: ' '
  - type: note
    content: 'Révélation: le mot grec a donné le français Apocalypse.'
  - type: text
    content: de Jésus-Christ.
  - type: text
    content: ' Dieu la lui a donnée pour montrer à ses serviteurs ce qui doit arriver bientôt et l''a fait connaître en envoyant son ange à son serviteur Jean. '
  '10':
  - type: text
    content: 'Je fus saisi par l''Esprit le jour du Seigneur et j''entendis derrière moi une voix forte comme le son d''une trompette. '
  '11':
  - type: text
    content: 'Elle disait: «Ce que tu vois, écris-le dans un livre et envoie-le aux sept Eglises: à Ephèse, à Smyrne, à Pergame, à Thyatire, à Sardes, à Philadelphie et à Laodicée.»'
  '12':
  - type: text
    content: 'Je me retournai pour savoir quelle était la voix qui me parlait. M''étant donc retourné, je vis sept chandeliers d''or, '
  '13':
  - type: text
    content: 'et au milieu des [sept] chandeliers quelqu''un qui ressemblait à un fils d''homme. Il était habillé d''une longue robe et portait une écharpe en or sur la poitrine. '
  '14':
  - type: text
    content: 'Sa tête et ses cheveux étaient blancs comme de la laine blanche, comme de la neige. Ses yeux étaient comme une flamme de feu, '
  '15':
  - type: text
    content: 'ses pieds étaient semblables à du bronze ardent, comme s''ils avaient été embrasés dans une fournaise, et sa voix ressemblait au bruit de grandes eaux. '
  '16':
  - type: text
    content: Il tenait dans sa main droite sept étoiles, de sa bouche sortait une épée aiguë à deux tranchants et son visage était comme le soleil lorsqu'il brille dans toute sa force.
  '17':
  - type: text
    content: 'Quand je le vis, je tombai à ses pieds comme mort. Il posa alors sa main droite sur moi en disant: «N''aie pas peur. Je suis le premier et le dernier, '
  '18':
  - type: text
    content: 'le vivant. J''étais mort et voici, je suis vivant aux siècles des siècles. Je détiens les clés de la mort et du séjour des morts. '
  '19':
  - type: text
    content: 'Ecris donc ce que tu as vu, ce qui est et ce qui doit arriver ensuite. '
  '2':
  - type: text
    content: 'Celui-ci l''a attesté, tout ce qu''il a vu est la parole de Dieu et le témoignage de Jésus-Christ. '
  '20':
  - type: text
    content: 'Quant au mystère des sept étoiles que tu as vues dans ma main droite et des sept chandeliers d''or, le voici: les sept étoiles sont les anges des sept Eglises et les sept chandeliers sont les sept Eglises.'
  '3':
  - type: text
    content: Heureux celui qui lit et ceux qui écoutent les paroles de la prophétie et gardent ce qui s'y trouve écrit, car le moment est proche!
  '4':
  - type: text
    content: 'De la part de Jean aux sept Eglises qui sont en Asie: que la grâce et la paix vous soient données de la part de [Dieu,] celui qui est, qui était et qui vient, de la part des sept esprits'
  - type: note
    content: 'Sept esprits: c''est-à-dire le Saint-Esprit.'
  - type: text
    content: ' qui sont devant son trône '
  '5':
  - type: text
    content: 'et de la part de Jésus-Christ, le témoin fidèle, le premier-né d''entre les morts et le chef des rois de la terre! A celui qui nous aime, qui nous a lavés de nos péchés par son sang '
  '6':
  - type: text
    content: et qui a fait de nous un royaume, des prêtres pour Dieu son Père, à lui soient la gloire et la domination aux siècles des siècles! Amen!
  '7':
  - type: text
    content: 'Le voici qui vient avec les nuées. Tout œil le verra, même ceux qui l''ont transpercé, et toutes les familles de la terre pleureront amèrement sur lui. Oui. Amen! '
  '8':
  - type: text
    content: «Je suis l'Alpha et l'Oméga
  - type: note
    content: 'L''Alpha et l''Oméga: première et dernière lettres de l''alphabet grec.'
  - type: text
    content: ', dit le Seigneur Dieu, celui qui est, qui était et qui vient, le Tout-Puissant.»'
  - type: heading
    content: Vision du Fils de l'homme
  '9':
  - type: text
    content: 'Moi Jean, votre frère et votre compagnon dans la persécution, le royaume et la persévérance en Jésus-Christ, j''étais dans l''île appelée Patmos à cause de la parole de Dieu et du témoignage de Jésus-Christ. '
