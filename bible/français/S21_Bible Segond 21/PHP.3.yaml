document_id: PHP.3,152
type_code: fra
verses:
  '1':
  - type: heading
    content: Appel à suivre l'exemple de Paul
  - type: text
    content: Maintenant donc, mes frères et sœurs, réjouissez-vous dans le Seigneur! Je n'hésite pas à vous écrire les mêmes choses, et cela contribue à votre sécurité.
  '10':
  - type: text
    content: 'Ainsi je connaîtrai Christ, la puissance de sa résurrection et la communion à ses souffrances en devenant conforme à lui dans sa mort '
  '11':
  - type: text
    content: pour parvenir, d'une manière ou d'une autre, à la résurrection des morts.
  '12':
  - type: text
    content: 'Ce n''est pas que j''aie déjà remporté le prix ou que j''aie déjà atteint la perfection, mais je cours pour tâcher de m''en emparer, puisque de moi aussi, Jésus-Christ s''est emparé. '
  '13':
  - type: text
    content: 'Frères et sœurs, je n''estime pas m''en être moi-même déjà emparé, mais je fais une chose: oubliant ce qui est derrière et me portant vers ce qui est devant, '
  '14':
  - type: text
    content: je cours vers le but pour remporter le prix de l'appel céleste de Dieu en Jésus-Christ.
  '15':
  - type: text
    content: 'Nous tous donc qui sommes mûrs, adoptons cette attitude et, si vous êtes d''un autre avis sur un point, Dieu vous éclairera aussi là-dessus. '
  '16':
  - type: text
    content: Seulement, là où nous en sommes, marchons dans la même direction [et vivons en plein accord].
  '17':
  - type: text
    content: 'Soyez tous mes imitateurs, frères et sœurs, et portez les regards sur ceux qui se conduisent suivant le modèle que vous avez en nous. '
  '18':
  - type: text
    content: 'En effet, beaucoup se conduisent en ennemis de la croix de Christ; je vous ai souvent parlé d''eux, et je le fais maintenant encore en pleurant. '
  '19':
  - type: text
    content: 'Leur fin, c''est la perdition; ils ont pour dieu leur ventre, ils mettent leur gloire dans ce qui fait leur honte, ils ne pensent qu''aux réalités de ce monde. '
  '2':
  - type: text
    content: Faites attention aux chiens
  - type: note
    content: 'Chiens: c''est-à-dire les adversaires sans scrupules, dangereux; les chiens étaient considérés comme des animaux impurs et les Juifs appelaient ainsi ceux qui ne respectaient pas la loi de Moïse.'
  - type: text
    content: ', faites attention aux mauvais ouvriers'
  - type: note
    content: 'Ouvriers: c''est-à-dire ici des personnes exerçant un ministère dans l''Eglise.'
  - type: text
    content: ', faites attention aux faux circoncis. '
  '20':
  - type: text
    content: 'Quant à nous, notre droit de cité est dans le ciel, d''où nous attendons aussi comme Sauveur le Seigneur Jésus-Christ. '
  '21':
  - type: text
    content: Il transformera notre corps de misère pour le rendre conforme à son corps glorieux par le pouvoir qu'il a de tout soumettre à son autorité.
  '3':
  - type: text
    content: En effet, les vrais circoncis, c'est nous, qui rendons notre culte à Dieu par l'Esprit de Dieu, qui plaçons notre fierté en Jésus-Christ et qui ne mettons pas notre confiance dans notre condition.
  '4':
  - type: text
    content: 'Pourtant, moi-même je pourrais mettre ma confiance dans ma condition. Si quelqu''un croit pouvoir se confier dans sa condition, je le peux plus encore: '
  '5':
  - type: text
    content: j'ai été circoncis le huitième jour, je suis issu du peuple d'Israël, de la tribu de Benjamin, hébreu né d'Hébreux; en ce qui concerne la loi, j'étais pharisien
  - type: note
    content: 'Pharisien: c''est-à-dire membre du parti le plus strict du judaïsme, très attaché à la loi de Moïse.'
  - type: text
    content: '; '
  '6':
  - type: text
    content: du point de vue du zèle, j'étais persécuteur de l'Eglise; par rapport à la justice de la loi, j'étais irréprochable.
  '7':
  - type: text
    content: 'Mais ces qualités qui étaient pour moi des gains, je les ai regardées comme une perte à cause de Christ. '
  '8':
  - type: text
    content: 'Et je considère même tout comme une perte à cause du bien suprême qu''est la connaissance de Jésus-Christ mon Seigneur. A cause de lui je me suis laissé dépouiller de tout et je considère tout cela comme des ordures afin de gagner Christ '
  '9':
  - type: text
    content: 'et d''être trouvé en lui non avec ma justice, celle qui vient de la loi, mais avec celle qui s''obtient par la foi en Christ, la justice qui vient de Dieu et qui est fondée sur la foi. '
