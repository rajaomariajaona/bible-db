document_id: PHP.3
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Appel à suivre l'exemple de Paul
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Maintenant donc, mes frères et sœurs, réjouissez-vous dans le Seigneur! Je n'hésite pas à vous écrire les mêmes choses, et cela contribue à votre sécurité.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Faites attention aux chiens
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '3.2 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Chiens: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: c'est-à-dire les adversaires sans scrupules, dangereux; les chiens étaient considérés comme des animaux impurs et les Juifs appelaient ainsi ceux qui ne respectaient pas la loi de Moïse.
    marker-yv: yv-n
  - type: text
    text: ', faites attention aux mauvais ouvriers'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '3.2 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Ouvriers: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: c'est-à-dire ici des personnes exerçant un ministère dans l'Eglise.
    marker-yv: yv-n
  - type: text
    text: ', faites attention aux faux circoncis. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: En effet, les vrais circoncis, c'est nous, qui rendons notre culte à Dieu par l'Esprit de Dieu, qui plaçons notre fierté en Jésus-Christ et qui ne mettons pas notre confiance dans notre condition.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Pourtant, moi-même je pourrais mettre ma confiance dans ma condition. Si quelqu''un croit pouvoir se confier dans sa condition, je le peux plus encore: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: j'ai été circoncis le huitième jour, je suis issu du peuple d'Israël, de la tribu de Benjamin, hébreu né d'Hébreux; en ce qui concerne la loi, j'étais pharisien
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '3.5 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Pharisien: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: c'est-à-dire membre du parti le plus strict du judaïsme, très attaché à la loi de Moïse.
    marker-yv: yv-n
  - type: text
    text: '; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: du point de vue du zèle, j'étais persécuteur de l'Eglise; par rapport à la justice de la loi, j'étais irréprochable.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Mais ces qualités qui étaient pour moi des gains, je les ai regardées comme une perte à cause de Christ. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Et je considère même tout comme une perte à cause du bien suprême qu''est la connaissance de Jésus-Christ mon Seigneur. A cause de lui je me suis laissé dépouiller de tout et je considère tout cela comme des ordures afin de gagner Christ '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'et d''être trouvé en lui non avec ma justice, celle qui vient de la loi, mais avec celle qui s''obtient par la foi en Christ, la justice qui vient de Dieu et qui est fondée sur la foi. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Ainsi je connaîtrai Christ, la puissance de sa résurrection et la communion à ses souffrances en devenant conforme à lui dans sa mort '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: pour parvenir, d'une manière ou d'une autre, à la résurrection des morts.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Ce n''est pas que j''aie déjà remporté le prix ou que j''aie déjà atteint la perfection, mais je cours pour tâcher de m''en emparer, puisque de moi aussi, Jésus-Christ s''est emparé. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Frères et sœurs, je n''estime pas m''en être moi-même déjà emparé, mais je fais une chose: oubliant ce qui est derrière et me portant vers ce qui est devant, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: je cours vers le but pour remporter le prix de l'appel céleste de Dieu en Jésus-Christ.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Nous tous donc qui sommes mûrs, adoptons cette attitude et, si vous êtes d''un autre avis sur un point, Dieu vous éclairera aussi là-dessus. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Seulement, là où nous en sommes, marchons dans la même direction [et vivons en plein accord].
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Soyez tous mes imitateurs, frères et sœurs, et portez les regards sur ceux qui se conduisent suivant le modèle que vous avez en nous. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'En effet, beaucoup se conduisent en ennemis de la croix de Christ; je vous ai souvent parlé d''eux, et je le fais maintenant encore en pleurant. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Leur fin, c''est la perdition; ils ont pour dieu leur ventre, ils mettent leur gloire dans ce qui fait leur honte, ils ne pensent qu''aux réalités de ce monde. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Quant à nous, notre droit de cité est dans le ciel, d''où nous attendons aussi comme Sauveur le Seigneur Jésus-Christ. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Il transformera notre corps de misère pour le rendre conforme à son corps glorieux par le pouvoir qu'il a de tout soumettre à son autorité.
