document_id: NUM.33,152
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Etapes des Israélites pendant leur voyage
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Voici les étapes que parcoururent les Israélites lorsqu''ils sortirent d''Egypte par corps d''armée, sous la conduite de Moïse et d''Aaron. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'Ils partirent d''Elim et campèrent près de la mer des Roseaux. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'Ils partirent de la mer des Roseaux et campèrent dans le désert de Sin. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'Ils partirent du désert de Sin et campèrent à Dophka. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'Ils partirent de Dophka et campèrent à Alush. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'Ils partirent d''Alush et campèrent à Rephidim, où le peuple ne trouva pas d''eau à boire. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: Ils partirent de Rephidim et campèrent dans le désert du Sinaï.
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'Ils partirent du désert du Sinaï et campèrent à Kibroth-Hattaava. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'Ils partirent de Kibroth-Hattaava et campèrent à Hatséroth. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'Ils partirent de Hatséroth et campèrent à Rithma. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'Ils partirent de Rithma et campèrent à Rimmon-Pérets. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: Moïse mit par écrit leur parcours étape par étape, d'après l'ordre de l'Eternel. Voici les étapes de leur parcours.
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: 'Ils partirent de Rimmon-Pérets et campèrent à Libna. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: 'Ils partirent de Libna et campèrent à Rissa. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: 'Ils partirent de Rissa et campèrent à Kehélatha. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: 'Ils partirent de Kehélatha et campèrent à la montagne de Shapher. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: 'Ils partirent de la montagne de Shapher et campèrent à Harada. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: 'Ils partirent de Harada et campèrent à Makhéloth. '
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: 'Ils partirent de Makhéloth et campèrent à Tahath. '
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: 'Ils partirent de Tahath et campèrent à Tarach. '
  '28':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: 'Ils partirent de Tarach et campèrent à Mithka. '
  '29':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: 'Ils partirent de Mithka et campèrent à Hashmona. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: Ils partirent de Ramsès le premier mois, le quinzième jour du premier mois. Le lendemain de la Pâque, les Israélites sortirent ouvertement
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '33.3 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Ouvertement: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: littéralement la main levée.
      marker-yv: yv-n
    - type: text
      text: ', à la vue de tous les Egyptiens, '
  '30':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '30'
    - type: text
      text: 'Ils partirent de Hashmona et campèrent à Moséroth. '
  '31':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '31'
    - type: text
      text: 'Ils partirent de Moséroth et campèrent à Bené-Jaakan. '
  '32':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '32'
    - type: text
      text: 'Ils partirent de Bené-Jaakan et campèrent à Hor-Guidgad. '
  '33':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '33'
    - type: text
      text: 'Ils partirent de Hor-Guidgad et campèrent à Jothbatha. '
  '34':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '34'
    - type: text
      text: 'Ils partirent de Jothbatha et campèrent à Abrona. '
  '35':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '35'
    - type: text
      text: 'Ils partirent d''Abrona et campèrent à Etsjon-Guéber. '
  '36':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '36'
    - type: text
      text: Ils partirent d'Etsjon-Guéber et campèrent dans le désert de Tsin, c'est-à-dire à Kadès.
  '37':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '37'
    - type: text
      text: 'Ils partirent de Kadès et campèrent au mont Hor, à l''extrémité du pays d''Edom. '
  '38':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '38'
    - type: text
      text: 'Le prêtre Aaron monta sur le mont Hor, suivant l''ordre de l''Eternel, et il y mourut. C''était la quarantième année après que les Israélites étaient sortis d''Egypte, le premier jour du cinquième mois. '
  '39':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '39'
    - type: text
      text: 'Aaron était âgé de 123 ans lorsqu''il mourut sur le mont Hor. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: tandis que les Egyptiens enterraient ceux que l'Eternel avait tués parmi eux, tous les premiers-nés. L'Eternel avait aussi exercé des jugements contre leurs dieux.
  '40':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '40'
    - type: text
      text: Le roi d'Arad, un Cananéen qui habitait le sud du pays de Canaan, apprit l'arrivée des Israélites.
  '41':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '41'
    - type: text
      text: 'Ils partirent du mont Hor et campèrent à Tsalmona. '
  '42':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '42'
    - type: text
      text: 'Ils partirent de Tsalmona et campèrent à Punon. '
  '43':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '43'
    - type: text
      text: 'Ils partirent de Punon et campèrent à Oboth. '
  '44':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '44'
    - type: text
      text: 'Ils partirent d''Oboth et campèrent à Ijjé-Abarim, sur la frontière de Moab. '
  '45':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '45'
    - type: text
      text: 'Ils partirent d''Ijjé-Abarim et campèrent à Dibon-Gad. '
  '46':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '46'
    - type: text
      text: 'Ils partirent de Dibon-Gad et campèrent à Almon-Diblathaïm. '
  '47':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '47'
    - type: text
      text: 'Ils partirent d''Almon-Diblathaïm et campèrent sur les montagnes d''Abarim, devant Nebo. '
  '48':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '48'
    - type: text
      text: 'Ils partirent des montagnes d''Abarim et campèrent dans les plaines de Moab, près du Jourdain, vis-à-vis de Jéricho. '
  '49':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '49'
    - type: text
      text: Ils campèrent près du Jourdain, depuis Beth-Jeshimoth jusqu'à Abel-Sittim, dans les plaines de Moab.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Loi pour la conquête de Canaan
    marker-yv: yv-h
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'Les Israélites partirent de Ramsès et campèrent à Succoth. '
  '50':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '50'
    - type: text
      text: 'L''Eternel dit à Moïse dans les plaines de Moab, près du Jourdain, vis-à-vis de Jéricho: '
  '51':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '51'
    - type: text
      text: '«Transmets ces instructions aux Israélites: Lorsque vous aurez passé le Jourdain et que vous serez entrés dans le pays de Canaan, '
  '52':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '52'
    - type: text
      text: vous chasserez devant vous tous les habitants du pays. Vous détruirez toutes leurs idoles en pierre et en métal fondu, et vous éliminerez tous leurs hauts lieux
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '33.52 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Hauts lieux: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: sanctuaires érigés en l'honneur de divinités, souvent situés sur des hauteurs.
      marker-yv: yv-n
    - type: text
      text: '. '
  '53':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '53'
    - type: text
      text: 'Vous prendrez possession du pays et vous vous y établirez, car je vous ai donné ce pays pour qu''il soit votre propriété. '
  '54':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '54'
    - type: text
      text: 'Vous partagerez le pays en tirant au sort en fonction de vos clans. A ceux qui sont plus nombreux vous donnerez une portion plus grande, et à ceux qui sont moins nombreux vous donnerez une portion plus petite. Chacun possédera ce qui lui sera attribué par tirage au sort. Vous le recevrez en propriété selon les tribus de vos ancêtres. '
  '55':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '55'
    - type: text
      text: 'Mais si vous ne chassez pas les habitants du pays devant vous, ceux d''entre eux que vous aurez laissés deviendront des épines dans vos yeux et des pointes dans vos côtes, ils seront vos ennemis dans le pays où vous allez vous établir. '
  '56':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '56'
    - type: text
      text: Alors je vous traiterai comme j'avais décidé de les traiter eux.»
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'Ils partirent de Succoth et campèrent à Etham, qui est situé à l''extrémité du désert. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'Ils partirent d''Etham, revinrent vers Pi-Hahiroth, vis-à-vis de Baal-Tsephon, et campèrent devant Migdol. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'Ils partirent de devant Pi-Hahiroth et traversèrent la mer pour prendre la direction du désert. Ils firent trois journées de marche dans le désert d''Etham et campèrent à Mara. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'Ils partirent de Mara et arrivèrent à Elim, où il y avait 12 sources d''eau et 70 palmiers. Ce fut là qu''ils campèrent. '
