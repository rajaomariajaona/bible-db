document_id: NUM.33,152
type_code: fra
verses:
  '1':
  - type: heading
    content: Etapes des Israélites pendant leur voyage
  - type: text
    content: 'Voici les étapes que parcoururent les Israélites lorsqu''ils sortirent d''Egypte par corps d''armée, sous la conduite de Moïse et d''Aaron. '
  '10':
  - type: text
    content: 'Ils partirent d''Elim et campèrent près de la mer des Roseaux. '
  '11':
  - type: text
    content: 'Ils partirent de la mer des Roseaux et campèrent dans le désert de Sin. '
  '12':
  - type: text
    content: 'Ils partirent du désert de Sin et campèrent à Dophka. '
  '13':
  - type: text
    content: 'Ils partirent de Dophka et campèrent à Alush. '
  '14':
  - type: text
    content: 'Ils partirent d''Alush et campèrent à Rephidim, où le peuple ne trouva pas d''eau à boire. '
  '15':
  - type: text
    content: Ils partirent de Rephidim et campèrent dans le désert du Sinaï.
  '16':
  - type: text
    content: 'Ils partirent du désert du Sinaï et campèrent à Kibroth-Hattaava. '
  '17':
  - type: text
    content: 'Ils partirent de Kibroth-Hattaava et campèrent à Hatséroth. '
  '18':
  - type: text
    content: 'Ils partirent de Hatséroth et campèrent à Rithma. '
  '19':
  - type: text
    content: 'Ils partirent de Rithma et campèrent à Rimmon-Pérets. '
  '2':
  - type: text
    content: Moïse mit par écrit leur parcours étape par étape, d'après l'ordre de l'Eternel. Voici les étapes de leur parcours.
  '20':
  - type: text
    content: 'Ils partirent de Rimmon-Pérets et campèrent à Libna. '
  '21':
  - type: text
    content: 'Ils partirent de Libna et campèrent à Rissa. '
  '22':
  - type: text
    content: 'Ils partirent de Rissa et campèrent à Kehélatha. '
  '23':
  - type: text
    content: 'Ils partirent de Kehélatha et campèrent à la montagne de Shapher. '
  '24':
  - type: text
    content: 'Ils partirent de la montagne de Shapher et campèrent à Harada. '
  '25':
  - type: text
    content: 'Ils partirent de Harada et campèrent à Makhéloth. '
  '26':
  - type: text
    content: 'Ils partirent de Makhéloth et campèrent à Tahath. '
  '27':
  - type: text
    content: 'Ils partirent de Tahath et campèrent à Tarach. '
  '28':
  - type: text
    content: 'Ils partirent de Tarach et campèrent à Mithka. '
  '29':
  - type: text
    content: 'Ils partirent de Mithka et campèrent à Hashmona. '
  '3':
  - type: text
    content: Ils partirent de Ramsès le premier mois, le quinzième jour du premier mois. Le lendemain de la Pâque, les Israélites sortirent ouvertement
  - type: note
    content: 'Ouvertement: littéralement la main levée.'
  - type: text
    content: ', à la vue de tous les Egyptiens, '
  '30':
  - type: text
    content: 'Ils partirent de Hashmona et campèrent à Moséroth. '
  '31':
  - type: text
    content: 'Ils partirent de Moséroth et campèrent à Bené-Jaakan. '
  '32':
  - type: text
    content: 'Ils partirent de Bené-Jaakan et campèrent à Hor-Guidgad. '
  '33':
  - type: text
    content: 'Ils partirent de Hor-Guidgad et campèrent à Jothbatha. '
  '34':
  - type: text
    content: 'Ils partirent de Jothbatha et campèrent à Abrona. '
  '35':
  - type: text
    content: 'Ils partirent d''Abrona et campèrent à Etsjon-Guéber. '
  '36':
  - type: text
    content: Ils partirent d'Etsjon-Guéber et campèrent dans le désert de Tsin, c'est-à-dire à Kadès.
  '37':
  - type: text
    content: 'Ils partirent de Kadès et campèrent au mont Hor, à l''extrémité du pays d''Edom. '
  '38':
  - type: text
    content: 'Le prêtre Aaron monta sur le mont Hor, suivant l''ordre de l''Eternel, et il y mourut. C''était la quarantième année après que les Israélites étaient sortis d''Egypte, le premier jour du cinquième mois. '
  '39':
  - type: text
    content: 'Aaron était âgé de 123 ans lorsqu''il mourut sur le mont Hor. '
  '4':
  - type: text
    content: tandis que les Egyptiens enterraient ceux que l'Eternel avait tués parmi eux, tous les premiers-nés. L'Eternel avait aussi exercé des jugements contre leurs dieux.
  '40':
  - type: text
    content: Le roi d'Arad, un Cananéen qui habitait le sud du pays de Canaan, apprit l'arrivée des Israélites.
  '41':
  - type: text
    content: 'Ils partirent du mont Hor et campèrent à Tsalmona. '
  '42':
  - type: text
    content: 'Ils partirent de Tsalmona et campèrent à Punon. '
  '43':
  - type: text
    content: 'Ils partirent de Punon et campèrent à Oboth. '
  '44':
  - type: text
    content: 'Ils partirent d''Oboth et campèrent à Ijjé-Abarim, sur la frontière de Moab. '
  '45':
  - type: text
    content: 'Ils partirent d''Ijjé-Abarim et campèrent à Dibon-Gad. '
  '46':
  - type: text
    content: 'Ils partirent de Dibon-Gad et campèrent à Almon-Diblathaïm. '
  '47':
  - type: text
    content: 'Ils partirent d''Almon-Diblathaïm et campèrent sur les montagnes d''Abarim, devant Nebo. '
  '48':
  - type: text
    content: 'Ils partirent des montagnes d''Abarim et campèrent dans les plaines de Moab, près du Jourdain, vis-à-vis de Jéricho. '
  '49':
  - type: text
    content: Ils campèrent près du Jourdain, depuis Beth-Jeshimoth jusqu'à Abel-Sittim, dans les plaines de Moab.
  - type: heading
    content: Loi pour la conquête de Canaan
  '5':
  - type: text
    content: 'Les Israélites partirent de Ramsès et campèrent à Succoth. '
  '50':
  - type: text
    content: 'L''Eternel dit à Moïse dans les plaines de Moab, près du Jourdain, vis-à-vis de Jéricho: '
  '51':
  - type: text
    content: '«Transmets ces instructions aux Israélites: Lorsque vous aurez passé le Jourdain et que vous serez entrés dans le pays de Canaan, '
  '52':
  - type: text
    content: vous chasserez devant vous tous les habitants du pays. Vous détruirez toutes leurs idoles en pierre et en métal fondu, et vous éliminerez tous leurs hauts lieux
  - type: note
    content: 'Hauts lieux: sanctuaires érigés en l''honneur de divinités, souvent situés sur des hauteurs.'
  - type: text
    content: '. '
  '53':
  - type: text
    content: 'Vous prendrez possession du pays et vous vous y établirez, car je vous ai donné ce pays pour qu''il soit votre propriété. '
  '54':
  - type: text
    content: 'Vous partagerez le pays en tirant au sort en fonction de vos clans. A ceux qui sont plus nombreux vous donnerez une portion plus grande, et à ceux qui sont moins nombreux vous donnerez une portion plus petite. Chacun possédera ce qui lui sera attribué par tirage au sort. Vous le recevrez en propriété selon les tribus de vos ancêtres. '
  '55':
  - type: text
    content: 'Mais si vous ne chassez pas les habitants du pays devant vous, ceux d''entre eux que vous aurez laissés deviendront des épines dans vos yeux et des pointes dans vos côtes, ils seront vos ennemis dans le pays où vous allez vous établir. '
  '56':
  - type: text
    content: Alors je vous traiterai comme j'avais décidé de les traiter eux.»
  '6':
  - type: text
    content: 'Ils partirent de Succoth et campèrent à Etham, qui est situé à l''extrémité du désert. '
  '7':
  - type: text
    content: 'Ils partirent d''Etham, revinrent vers Pi-Hahiroth, vis-à-vis de Baal-Tsephon, et campèrent devant Migdol. '
  '8':
  - type: text
    content: 'Ils partirent de devant Pi-Hahiroth et traversèrent la mer pour prendre la direction du désert. Ils firent trois journées de marche dans le désert d''Etham et campèrent à Mara. '
  '9':
  - type: text
    content: 'Ils partirent de Mara et arrivèrent à Elim, où il y avait 12 sources d''eau et 70 palmiers. Ce fut là qu''ils campèrent. '
