document_id: PSA.108,152
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Prière et reconnaissance
    marker-yv: yv-h
  - type: usfm
    marker: d
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: Chant, psaume de David.
  '10':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: Moab est le bassin où je me lave,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: je jette ma sandale sur Edom,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: je pousse des cris contre le pays des Philistins!»
  '11':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: Qui me mènera dans la ville fortifiée?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Qui me conduira jusqu'en Edom?
  '12':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: N'est-ce pas toi, ô Dieu, qui nous avais repoussés
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et qui ne sortais plus, ô Dieu, avec nos armées?
  '13':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: Viens nous aider contre notre adversaire!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Le secours de l'homme n'est qu'illusion.
  '14':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'Avec Dieu, nous ferons des exploits:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: c'est lui qui écrasera nos adversaires.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: Mon cœur est rassuré, ô Dieu;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'je chanterai, je ferai retentir mes instruments: voilà ma gloire!'
  '3':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: Réveillez-vous, mon luth et ma harpe!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Je veux réveiller l'aurore.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: Je te louerai parmi les peuples, Eternel,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: je te chanterai parmi les nations,
  '5':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: car ta bonté s'élève au-dessus du ciel,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et ta vérité atteint les nuages.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: Elève-toi au-dessus du ciel, ô Dieu,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et que ta gloire soit sur toute la terre!
  '7':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: Afin que tes bien-aimés soient délivrés,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sauve-les par ta main droite et exauce-moi!
  '8':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'Dieu a dit dans sa sainteté: «Je triompherai,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: je partagerai Sichem, je mesurerai la vallée de Succoth.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: Galaad est à moi, Manassé est à moi,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ephraïm est le casque de ma tête,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et Juda mon sceptre.
