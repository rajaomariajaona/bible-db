document_id: PSA.108,152
type_code: fra
verses:
  '1':
  - type: heading
    content: Prière et reconnaissance
  - type: text
    content: Chant, psaume de David.
  '10':
  - type: text
    content: Moab est le bassin où je me lave,
  - type: text
    content: je jette ma sandale sur Edom,
  - type: text
    content: je pousse des cris contre le pays des Philistins!»
  '11':
  - type: text
    content: Qui me mènera dans la ville fortifiée?
  - type: text
    content: Qui me conduira jusqu'en Edom?
  '12':
  - type: text
    content: N'est-ce pas toi, ô Dieu, qui nous avais repoussés
  - type: text
    content: et qui ne sortais plus, ô Dieu, avec nos armées?
  '13':
  - type: text
    content: Viens nous aider contre notre adversaire!
  - type: text
    content: Le secours de l'homme n'est qu'illusion.
  '14':
  - type: text
    content: 'Avec Dieu, nous ferons des exploits:'
  - type: text
    content: c'est lui qui écrasera nos adversaires.
  '2':
  - type: text
    content: Mon cœur est rassuré, ô Dieu;
  - type: text
    content: 'je chanterai, je ferai retentir mes instruments: voilà ma gloire!'
  '3':
  - type: text
    content: Réveillez-vous, mon luth et ma harpe!
  - type: text
    content: Je veux réveiller l'aurore.
  '4':
  - type: text
    content: Je te louerai parmi les peuples, Eternel,
  - type: text
    content: je te chanterai parmi les nations,
  '5':
  - type: text
    content: car ta bonté s'élève au-dessus du ciel,
  - type: text
    content: et ta vérité atteint les nuages.
  '6':
  - type: text
    content: Elève-toi au-dessus du ciel, ô Dieu,
  - type: text
    content: et que ta gloire soit sur toute la terre!
  '7':
  - type: text
    content: Afin que tes bien-aimés soient délivrés,
  - type: text
    content: sauve-les par ta main droite et exauce-moi!
  '8':
  - type: text
    content: 'Dieu a dit dans sa sainteté: «Je triompherai,'
  - type: text
    content: je partagerai Sichem, je mesurerai la vallée de Succoth.
  '9':
  - type: text
    content: Galaad est à moi, Manassé est à moi,
  - type: text
    content: Ephraïm est le casque de ma tête,
  - type: text
    content: et Juda mon sceptre.
