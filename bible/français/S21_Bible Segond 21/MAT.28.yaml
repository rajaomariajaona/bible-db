document_id: MAT.28,152
type_code: fra
verses:
  '1':
  - type: heading
    content: Résurrection de Jésus
  - type: text
    content: 'Après le sabbat, à l''aube du dimanche, Marie de Magdala et l''autre Marie allèrent voir le tombeau. '
  '10':
  - type: text
    content: 'Alors Jésus leur dit: «N''ayez pas peur! Allez dire à mes frères de se rendre en Galilée: c''est là qu''ils me verront.»'
  '11':
  - type: text
    content: 'Pendant qu''elles étaient en chemin, quelques hommes de la garde entrèrent dans la ville et annoncèrent aux chefs des prêtres tout ce qui était arrivé. '
  '12':
  - type: text
    content: 'Après s''être réunis avec les anciens pour tenir conseil, ceux-ci donnèrent une forte somme d''argent aux soldats '
  '13':
  - type: text
    content: 'avec cette consigne: «Dites que ses disciples sont venus de nuit voler le corps pendant que vous dormiez. '
  '14':
  - type: text
    content: 'Et si le gouverneur l''apprend, nous l''apaiserons et nous ferons en sorte que vous n''ayez pas d''ennuis.» '
  '15':
  - type: text
    content: Les soldats prirent l'argent et se conformèrent aux instructions reçues. Et ce récit des événements s'est propagé parmi les Juifs jusqu'à aujourd'hui.
  - type: heading
    content: Mission confiée aux disciples
  '16':
  - type: text
    content: 'Les onze disciples allèrent en Galilée, sur la montagne que Jésus leur avait désignée. '
  '17':
  - type: text
    content: 'Quand ils le virent, ils se prosternèrent [devant lui], mais quelques-uns eurent des doutes. '
  '18':
  - type: text
    content: 'Jésus s''approcha et leur dit: «Tout pouvoir m''a été donné dans le ciel et sur la terre. '
  '19':
  - type: text
    content: 'Allez [donc], faites de toutes les nations des disciples, baptisez-les au nom du Père, du Fils et du Saint-Esprit '
  '2':
  - type: text
    content: 'Soudain, il y eut un grand tremblement de terre, car un ange du Seigneur descendit du ciel, vint rouler la pierre [de devant l''ouverture] et s''assit dessus. '
  '20':
  - type: text
    content: et enseignez-leur à mettre en pratique tout ce que je vous ai prescrit. Et moi, je suis avec vous tous les jours, jusqu'à la fin du monde.»
  '3':
  - type: text
    content: 'Il avait l''aspect de l''éclair et son vêtement était blanc comme la neige. '
  '4':
  - type: text
    content: 'Les gardes tremblèrent de peur et devinrent comme morts, '
  '5':
  - type: text
    content: 'mais l''ange prit la parole et dit aux femmes: «Quant à vous, n''ayez pas peur, car je sais que vous cherchez Jésus, celui qui a été crucifié. '
  '6':
  - type: text
    content: 'Il n''est pas ici, car il est ressuscité, comme il l''avait dit. Venez voir l''endroit où le Seigneur était couché '
  '7':
  - type: text
    content: et allez vite dire à ses disciples qu'il est ressuscité. Il vous précède en Galilée. C'est là que vous le verrez. Voilà, je vous l'ai dit.»
  '8':
  - type: text
    content: 'Elles s''éloignèrent rapidement du tombeau, avec crainte et une grande joie, et elles coururent porter la nouvelle aux disciples. '
  '9':
  - type: text
    content: 'Et voici que Jésus vint à leur rencontre et dit: «Je vous salue.» Elles s''approchèrent, s''agrippèrent à ses pieds et se prosternèrent devant lui. '
