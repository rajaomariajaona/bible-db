document_id: LUK.22,152
type_code: fra
verses:
  '1':
  - type: heading
    content: Mort et résurrection de Jésus
  - type: heading
    content: 22.1–24.53
  - type: heading
    content: Complot contre Jésus
  - type: text
    content: 'La fête des pains sans levain, appelée la Pâque, approchait. '
  '10':
  - type: text
    content: 'Il leur répondit: «Quand vous serez entrés dans la ville, vous rencontrerez un homme qui porte une cruche d''eau; suivez-le dans la maison où il entrera '
  '11':
  - type: text
    content: 'et dites au propriétaire de la maison: ‘Le maître te demande: Où est la salle où je mangerai la Pâque avec mes disciples?’ '
  '12':
  - type: text
    content: 'Alors il vous montrera une grande pièce aménagée à l''étage: c''est là que vous préparerez la Pâque.» '
  '13':
  - type: text
    content: Ils partirent et trouvèrent tout comme il le leur avait dit, et ils préparèrent la Pâque.
  '14':
  - type: text
    content: 'Quand l''heure fut venue, il se mit à table avec les [douze] apôtres. '
  '15':
  - type: text
    content: 'Il leur dit: «J''ai vivement désiré manger cette Pâque avec vous avant de souffrir '
  '16':
  - type: text
    content: 'car, je vous le dis, je ne la mangerai plus jusqu''à ce qu''elle soit accomplie dans le royaume de Dieu.» '
  '17':
  - type: text
    content: 'Puis il prit une coupe, remercia Dieu et dit: «Prenez cette coupe et partagez-la entre vous '
  '18':
  - type: text
    content: car, je vous le dis, [désormais] je ne boirai plus du fruit de la vigne jusqu'à ce que le royaume de Dieu soit venu.»
  '19':
  - type: text
    content: 'Ensuite il prit du pain et, après avoir remercié Dieu, il le rompit et le leur donna en disant: «Ceci est mon corps qui est donné pour vous. Faites ceci en souvenir de moi.» '
  '2':
  - type: text
    content: 'Les chefs des prêtres et les spécialistes de la loi cherchaient les moyens de faire mourir Jésus, car ils redoutaient les réactions du peuple. '
  '20':
  - type: text
    content: 'Après le souper il prit de même la coupe et la leur donna en disant: «Cette coupe est la nouvelle alliance en mon sang qui est versé pour vous. '
  '21':
  - type: text
    content: 'Cependant celui qui me trahit est avec moi à cette table. '
  '22':
  - type: text
    content: 'Le Fils de l''homme s''en va conformément à ce qui a été fixé, mais malheur à l''homme par qui il est trahi!» '
  '23':
  - type: text
    content: Ils commencèrent à se demander les uns aux autres lequel d'entre eux ferait cela.
  '24':
  - type: text
    content: 'Il y eut aussi une rivalité entre les disciples pour déterminer qui devait être considéré comme le plus grand parmi eux. '
  '25':
  - type: text
    content: 'Jésus leur dit: «Les rois des nations dominent sur leurs peuples et ceux qui exercent le pouvoir se font appeler bienfaiteurs. '
  '26':
  - type: text
    content: 'Que cela ne soit pas votre cas, mais que le plus grand parmi vous soit comme le plus jeune, et celui qui commande comme celui qui sert. '
  '27':
  - type: text
    content: 'En effet, qui est le plus grand: celui qui est à table ou celui qui sert? N''est-ce pas celui qui est à table? Et moi, cependant, je suis au milieu de vous comme celui qui sert. '
  '28':
  - type: text
    content: 'Vous, vous êtes ceux qui avez persévéré avec moi dans mes épreuves; '
  '29':
  - type: text
    content: 'c''est pourquoi je dispose du royaume en votre faveur, comme mon Père en a disposé en ma faveur. '
  '3':
  - type: text
    content: 'Or Satan entra dans Judas, surnommé l''Iscariot, qui faisait partie des douze, '
  '30':
  - type: text
    content: Ainsi, vous mangerez et boirez à ma table dans mon royaume et vous serez assis sur des trônes pour juger les douze tribus d'Israël.»
  '31':
  - type: text
    content: '[Le Seigneur dit:] «Simon, Simon, Satan vous a réclamés pour vous passer au crible comme le blé. '
  '32':
  - type: text
    content: Mais moi, j'ai prié pour toi, afin que ta foi ne disparaisse pas; et toi, quand tu seras revenu à moi, affermis tes frères
  - type: note
    content: 'Tes frères: c''est-à-dire les autres disciples.'
  - type: text
    content: '.» '
  '33':
  - type: text
    content: '«Seigneur, lui dit Pierre, je suis prêt à aller en prison avec toi, et même jusqu''à la mort.» '
  '34':
  - type: text
    content: 'Jésus dit: «Pierre, je te le dis, le coq ne chantera pas aujourd''hui avant que tu n''aies trois fois nié me connaître.»'
  '35':
  - type: text
    content: 'Il leur dit encore: «Quand je vous ai envoyés sans bourse, ni sac, ni sandales, avez-vous manqué de quelque chose?» Ils répondirent: «De rien.» '
  '36':
  - type: text
    content: 'Il leur dit: «Maintenant, au contraire, que celui qui a une bourse la prenne, que celui qui a un sac le prenne également, et que celui qui n''a pas d''épée vende son vêtement et en achète une. '
  '37':
  - type: text
    content: 'En effet, je vous le dis, il faut que s''accomplisse [encore] dans ma personne ce texte de l''Ecriture: '
  - type: text
    content: Il a été compté parmi les criminels
  - type: text
    content: .
  - type: note
    content: 'Il a… criminels: citation d''Esaïe 53.12.'
  - type: text
    content: ' Et ce qui me concerne est sur le point de se réaliser.» '
  '38':
  - type: text
    content: 'Ils dirent: «Seigneur, voici deux épées.» Il leur dit: «Cela suffit.»'
  - type: heading
    content: Arrestation de Jésus
  '39':
  - type: text
    content: 'Il sortit et se rendit comme d''habitude au mont des Oliviers. Ses disciples le suivirent. '
  '4':
  - type: text
    content: 'et Judas alla s''entendre avec les chefs des prêtres et les chefs des gardes sur la manière de le leur livrer. '
  '40':
  - type: text
    content: 'Lorsqu''il fut arrivé à cet endroit, il leur dit: «Priez pour ne pas céder à la tentation.» '
  '41':
  - type: text
    content: 'Puis il s''éloigna d''eux à la distance d''environ un jet de pierre, se mit à genoux et pria '
  '42':
  - type: text
    content: 'en disant: «Père, si tu voulais éloigner de moi cette coupe! Toutefois, que ce ne soit pas ma volonté qui se fasse, mais la tienne.»'
  '43':
  - type: text
    content: '[Alors un ange lui apparut du ciel pour le fortifier. '
  '44':
  - type: text
    content: 'Saisi d''angoisse, Jésus priait avec plus d''insistance, et sa sueur devint comme des caillots de sang qui tombaient par terre.] '
  '45':
  - type: text
    content: 'Après avoir prié, il se releva et vint vers les disciples, qu''il trouva endormis de tristesse. '
  '46':
  - type: text
    content: 'Alors il leur dit: «Pourquoi dormez-vous? Levez-vous et priez pour ne pas céder à la tentation.»'
  '47':
  - type: text
    content: 'Il parlait encore quand une foule arriva. Celui qui s''appelait Judas, l''un des douze, marchait devant elle. Il s''approcha de Jésus pour l''embrasser. '
  '48':
  - type: text
    content: 'Jésus lui dit: «Judas, c''est par un baiser que tu trahis le Fils de l''homme!»'
  '49':
  - type: text
    content: 'Voyant ce qui allait arriver, ceux qui étaient avec Jésus dirent: «Seigneur, devons-nous frapper avec l''épée?» '
  '5':
  - type: text
    content: 'Ils s''en réjouirent et convinrent de lui donner de l''argent. '
  '50':
  - type: text
    content: 'Et l''un d''eux frappa le serviteur du grand-prêtre et lui emporta l''oreille droite. '
  '51':
  - type: text
    content: 'Mais Jésus prit la parole et dit: «Laissez faire, arrêtez!» Puis il toucha l''oreille de cet homme et le guérit.'
  '52':
  - type: text
    content: 'Jésus dit ensuite aux chefs des prêtres, aux chefs des gardes du temple et aux anciens qui étaient venus pour l''arrêter: «Vous êtes venus comme pour un brigand, avec des épées et des bâtons. '
  '53':
  - type: text
    content: J'étais tous les jours avec vous dans le temple et vous n'avez pas mis la main sur moi. Mais c'est maintenant votre heure et celle du pouvoir des ténèbres.»
  - type: heading
    content: Jésus devant le conseil juif
  '54':
  - type: text
    content: 'Après avoir arrêté Jésus, ils l''emmenèrent et le conduisirent dans la maison du grand-prêtre. Pierre suivait de loin. '
  '55':
  - type: text
    content: 'Ils allumèrent un feu au milieu de la cour et s''assirent ensemble. Pierre s''assit au milieu d''eux. '
  '56':
  - type: text
    content: 'Une servante qui l''avait vu assis devant le feu et l''avait observé dit: «Cet homme aussi était avec lui.» '
  '57':
  - type: text
    content: 'Mais il le renia en disant: «Femme, je ne le connais pas.» '
  '58':
  - type: text
    content: 'Peu après, un autre le vit et dit: «Toi aussi tu fais partie de ces gens-là.» Et Pierre dit à l''homme: «Je n''en fais pas partie.» '
  '59':
  - type: text
    content: 'Environ une heure plus tard, un autre insistait, disant: «Certainement cet homme était aussi avec lui, car il est galiléen.» '
  '6':
  - type: text
    content: Judas accepta et se mit à chercher une occasion favorable pour leur livrer Jésus à l'insu de la foule.
  - type: heading
    content: Institution de la cène
  '60':
  - type: text
    content: 'Pierre répondit: «Je ne sais pas de quoi tu parles.» Immédiatement, alors qu''il parlait encore, un coq chanta. '
  '61':
  - type: text
    content: 'Le Seigneur se retourna et regarda Pierre. Pierre se souvint alors de ce que le Seigneur lui avait dit: «Avant que le coq chante [aujourd''hui], tu me renieras trois fois.» '
  '62':
  - type: text
    content: Il sortit et pleura amèrement.
  '63':
  - type: text
    content: 'Les hommes qui gardaient Jésus se moquaient de lui et le frappaient. '
  '64':
  - type: text
    content: 'Ils lui mirent un voile sur le visage et ils l''interrogeaient en disant: «Devine qui t''a frappé!» '
  '65':
  - type: text
    content: Et ils proféraient contre lui beaucoup d'autres insultes.
  '66':
  - type: text
    content: Au lever du jour, le collège des anciens du peuple, les chefs des prêtres et les spécialistes de la loi se rassemblèrent et firent amener Jésus devant leur sanhédrin
  - type: note
    content: 'Sanhédrin: conseil juif présidé par le grand-prêtre, qui faisait office de gouvernement et de tribunal pour les affaires qui n''étaient pas du ressort des Romains.'
  - type: text
    content: '. '
  '67':
  - type: text
    content: 'Ils dirent: «Si tu es le Messie, dis-le-nous.» Jésus leur répondit: «Si je vous le dis, vous ne le croirez pas, '
  '68':
  - type: text
    content: 'et si je vous interroge, vous ne [me] répondrez pas [et vous ne me relâcherez pas non plus]. '
  '69':
  - type: text
    content: 'Désormais '
  - type: text
    content: le Fils de l'homme sera assis à la droite du Dieu tout-puissant
  - type: note
    content: 'Le Fils… tout-puissant: citation combinant le titre employé dans Daniel 7.13 (Fils de l''homme) et le Psaume 110.1.'
  - type: text
    content: '.» '
  '7':
  - type: text
    content: 'Le jour des pains sans levain où l''on devait sacrifier l''agneau pascal arriva. '
  '70':
  - type: text
    content: 'Tous dirent: «Tu es donc le Fils de Dieu?» Il leur répondit: «Vous le dites, je le suis.» '
  '71':
  - type: text
    content: 'Alors ils dirent: «Qu''avons-nous encore besoin de témoignages? Nous l''avons entendu nous-mêmes de sa bouche.»'
  '8':
  - type: text
    content: 'Jésus envoya Pierre et Jean en leur disant: «Allez nous préparer la Pâque, afin que nous la mangions.» '
  '9':
  - type: text
    content: 'Ils lui dirent: «Où veux-tu que nous la préparions?» '
