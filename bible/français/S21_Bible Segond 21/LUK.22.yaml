document_id: LUK.22
type_code: fra
segments:
- type: usfm
  marker: ms1
  children:
  - type: text
    text: Mort et résurrection de Jésus
  marker-yv: yv-h
- type: usfm
  marker: mr
  children:
  - type: text
    text: 22.1–24.53
  marker-yv: yv-h
- type: usfm
  marker: s1
  children:
  - type: text
    text: Complot contre Jésus
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'La fête des pains sans levain, appelée la Pâque, approchait. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Les chefs des prêtres et les spécialistes de la loi cherchaient les moyens de faire mourir Jésus, car ils redoutaient les réactions du peuple. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Or Satan entra dans Judas, surnommé l''Iscariot, qui faisait partie des douze, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'et Judas alla s''entendre avec les chefs des prêtres et les chefs des gardes sur la manière de le leur livrer. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Ils s''en réjouirent et convinrent de lui donner de l''argent. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Judas accepta et se mit à chercher une occasion favorable pour leur livrer Jésus à l'insu de la foule.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Institution de la cène
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Le jour des pains sans levain où l''on devait sacrifier l''agneau pascal arriva. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Jésus envoya Pierre et Jean en leur disant: «Allez nous préparer la Pâque, afin que nous la mangions.» '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Ils lui dirent: «Où veux-tu que nous la préparions?» '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Il leur répondit: «Quand vous serez entrés dans la ville, vous rencontrerez un homme qui porte une cruche d''eau; suivez-le dans la maison où il entrera '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'et dites au propriétaire de la maison: ‘Le maître te demande: Où est la salle où je mangerai la Pâque avec mes disciples?’ '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Alors il vous montrera une grande pièce aménagée à l''étage: c''est là que vous préparerez la Pâque.» '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Ils partirent et trouvèrent tout comme il le leur avait dit, et ils préparèrent la Pâque.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Quand l''heure fut venue, il se mit à table avec les [douze] apôtres. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Il leur dit: «J''ai vivement désiré manger cette Pâque avec vous avant de souffrir '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'car, je vous le dis, je ne la mangerai plus jusqu''à ce qu''elle soit accomplie dans le royaume de Dieu.» '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Puis il prit une coupe, remercia Dieu et dit: «Prenez cette coupe et partagez-la entre vous '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: car, je vous le dis, [désormais] je ne boirai plus du fruit de la vigne jusqu'à ce que le royaume de Dieu soit venu.»
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Ensuite il prit du pain et, après avoir remercié Dieu, il le rompit et le leur donna en disant: «Ceci est mon corps qui est donné pour vous. Faites ceci en souvenir de moi.» '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Après le souper il prit de même la coupe et la leur donna en disant: «Cette coupe est la nouvelle alliance en mon sang qui est versé pour vous. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Cependant celui qui me trahit est avec moi à cette table. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Le Fils de l''homme s''en va conformément à ce qui a été fixé, mais malheur à l''homme par qui il est trahi!» '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: Ils commencèrent à se demander les uns aux autres lequel d'entre eux ferait cela.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Il y eut aussi une rivalité entre les disciples pour déterminer qui devait être considéré comme le plus grand parmi eux. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Jésus leur dit: «Les rois des nations dominent sur leurs peuples et ceux qui exercent le pouvoir se font appeler bienfaiteurs. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Que cela ne soit pas votre cas, mais que le plus grand parmi vous soit comme le plus jeune, et celui qui commande comme celui qui sert. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'En effet, qui est le plus grand: celui qui est à table ou celui qui sert? N''est-ce pas celui qui est à table? Et moi, cependant, je suis au milieu de vous comme celui qui sert. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'Vous, vous êtes ceux qui avez persévéré avec moi dans mes épreuves; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'c''est pourquoi je dispose du royaume en votre faveur, comme mon Père en a disposé en ma faveur. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: Ainsi, vous mangerez et boirez à ma table dans mon royaume et vous serez assis sur des trônes pour juger les douze tribus d'Israël.»
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: '[Le Seigneur dit:] «Simon, Simon, Satan vous a réclamés pour vous passer au crible comme le blé. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: Mais moi, j'ai prié pour toi, afin que ta foi ne disparaisse pas; et toi, quand tu seras revenu à moi, affermis tes frères
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '22.32 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Tes frères: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: c'est-à-dire les autres disciples.
    marker-yv: yv-n
  - type: text
    text: '.» '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: '«Seigneur, lui dit Pierre, je suis prêt à aller en prison avec toi, et même jusqu''à la mort.» '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: 'Jésus dit: «Pierre, je te le dis, le coq ne chantera pas aujourd''hui avant que tu n''aies trois fois nié me connaître.»'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: 'Il leur dit encore: «Quand je vous ai envoyés sans bourse, ni sac, ni sandales, avez-vous manqué de quelque chose?» Ils répondirent: «De rien.» '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: 'Il leur dit: «Maintenant, au contraire, que celui qui a une bourse la prenne, que celui qui a un sac le prenne également, et que celui qui n''a pas d''épée vende son vêtement et en achète une. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: 'En effet, je vous le dis, il faut que s''accomplisse [encore] dans ma personne ce texte de l''Ecriture: '
  - type: usfm
    marker: qt
    children:
    - type: text
      text: Il a été compté parmi les criminels
  - type: text
    text: .
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '22.37 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Il a… criminels: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: citation d'
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Esaïe 53.12
      metadata:
        usfm: ISA.53.12
    - type: usfm
      marker: ft
      children:
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: ' Et ce qui me concerne est sur le point de se réaliser.» '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: text
    text: 'Ils dirent: «Seigneur, voici deux épées.» Il leur dit: «Cela suffit.»'
- type: usfm
  marker: s1
  children:
  - type: text
    text: Arrestation de Jésus
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '39'
  - type: text
    text: 'Il sortit et se rendit comme d''habitude au mont des Oliviers. Ses disciples le suivirent. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '40'
  - type: text
    text: 'Lorsqu''il fut arrivé à cet endroit, il leur dit: «Priez pour ne pas céder à la tentation.» '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '41'
  - type: text
    text: 'Puis il s''éloigna d''eux à la distance d''environ un jet de pierre, se mit à genoux et pria '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '42'
  - type: text
    text: 'en disant: «Père, si tu voulais éloigner de moi cette coupe! Toutefois, que ce ne soit pas ma volonté qui se fasse, mais la tienne.»'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '43'
  - type: text
    text: '[Alors un ange lui apparut du ciel pour le fortifier. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '44'
  - type: text
    text: 'Saisi d''angoisse, Jésus priait avec plus d''insistance, et sa sueur devint comme des caillots de sang qui tombaient par terre.] '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '45'
  - type: text
    text: 'Après avoir prié, il se releva et vint vers les disciples, qu''il trouva endormis de tristesse. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '46'
  - type: text
    text: 'Alors il leur dit: «Pourquoi dormez-vous? Levez-vous et priez pour ne pas céder à la tentation.»'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '47'
  - type: text
    text: 'Il parlait encore quand une foule arriva. Celui qui s''appelait Judas, l''un des douze, marchait devant elle. Il s''approcha de Jésus pour l''embrasser. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '48'
  - type: text
    text: 'Jésus lui dit: «Judas, c''est par un baiser que tu trahis le Fils de l''homme!»'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '49'
  - type: text
    text: 'Voyant ce qui allait arriver, ceux qui étaient avec Jésus dirent: «Seigneur, devons-nous frapper avec l''épée?» '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '50'
  - type: text
    text: 'Et l''un d''eux frappa le serviteur du grand-prêtre et lui emporta l''oreille droite. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '51'
  - type: text
    text: 'Mais Jésus prit la parole et dit: «Laissez faire, arrêtez!» Puis il toucha l''oreille de cet homme et le guérit.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '52'
  - type: text
    text: 'Jésus dit ensuite aux chefs des prêtres, aux chefs des gardes du temple et aux anciens qui étaient venus pour l''arrêter: «Vous êtes venus comme pour un brigand, avec des épées et des bâtons. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '53'
  - type: text
    text: J'étais tous les jours avec vous dans le temple et vous n'avez pas mis la main sur moi. Mais c'est maintenant votre heure et celle du pouvoir des ténèbres.»
- type: usfm
  marker: s1
  children:
  - type: text
    text: Jésus devant le conseil juif
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '54'
  - type: text
    text: 'Après avoir arrêté Jésus, ils l''emmenèrent et le conduisirent dans la maison du grand-prêtre. Pierre suivait de loin. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '55'
  - type: text
    text: 'Ils allumèrent un feu au milieu de la cour et s''assirent ensemble. Pierre s''assit au milieu d''eux. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '56'
  - type: text
    text: 'Une servante qui l''avait vu assis devant le feu et l''avait observé dit: «Cet homme aussi était avec lui.» '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '57'
  - type: text
    text: 'Mais il le renia en disant: «Femme, je ne le connais pas.» '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '58'
  - type: text
    text: 'Peu après, un autre le vit et dit: «Toi aussi tu fais partie de ces gens-là.» Et Pierre dit à l''homme: «Je n''en fais pas partie.» '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '59'
  - type: text
    text: 'Environ une heure plus tard, un autre insistait, disant: «Certainement cet homme était aussi avec lui, car il est galiléen.» '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '60'
  - type: text
    text: 'Pierre répondit: «Je ne sais pas de quoi tu parles.» Immédiatement, alors qu''il parlait encore, un coq chanta. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '61'
  - type: text
    text: 'Le Seigneur se retourna et regarda Pierre. Pierre se souvint alors de ce que le Seigneur lui avait dit: «Avant que le coq chante [aujourd''hui], tu me renieras trois fois.» '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '62'
  - type: text
    text: Il sortit et pleura amèrement.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '63'
  - type: text
    text: 'Les hommes qui gardaient Jésus se moquaient de lui et le frappaient. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '64'
  - type: text
    text: 'Ils lui mirent un voile sur le visage et ils l''interrogeaient en disant: «Devine qui t''a frappé!» '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '65'
  - type: text
    text: Et ils proféraient contre lui beaucoup d'autres insultes.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '66'
  - type: text
    text: Au lever du jour, le collège des anciens du peuple, les chefs des prêtres et les spécialistes de la loi se rassemblèrent et firent amener Jésus devant leur sanhédrin
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '22.66 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Sanhédrin: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: conseil juif présidé par le grand-prêtre, qui faisait office de gouvernement et de tribunal pour les affaires qui n'étaient pas du ressort des Romains.
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '67'
  - type: text
    text: 'Ils dirent: «Si tu es le Messie, dis-le-nous.» Jésus leur répondit: «Si je vous le dis, vous ne le croirez pas, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '68'
  - type: text
    text: 'et si je vous interroge, vous ne [me] répondrez pas [et vous ne me relâcherez pas non plus]. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '69'
  - type: text
    text: 'Désormais '
  - type: usfm
    marker: qt
    children:
    - type: text
      text: le Fils de l'homme sera assis à la droite du Dieu tout-puissant
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '22.69 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Le Fils… tout-puissant: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'citation combinant le titre employé dans Daniel 7.13 (Fils de l''homme) et le '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Psaume 110.1
      metadata:
        usfm: PSA.110.1
    - type: usfm
      marker: ft
      children:
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: '.» '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '70'
  - type: text
    text: 'Tous dirent: «Tu es donc le Fils de Dieu?» Il leur répondit: «Vous le dites, je le suis.» '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '71'
  - type: text
    text: 'Alors ils dirent: «Qu''avons-nous encore besoin de témoignages? Nous l''avons entendu nous-mêmes de sa bouche.»'
