document_id: MAT.23,152
type_code: fra
verses:
  '1':
  - type: text
    content: 'Alors Jésus s''adressa à la foule et à ses disciples '
  '10':
  - type: text
    content: 'Ne vous faites pas appeler chefs, car un seul est votre chef, c''est le Christ. '
  '11':
  - type: text
    content: 'Le plus grand parmi vous sera votre serviteur. '
  '12':
  - type: text
    content: Celui qui s'élèvera sera abaissé et celui qui s'abaissera sera élevé.
  '13':
  - type: text
    content: »Malheur à vous, spécialistes de la loi et pharisiens hypocrites, parce que vous fermez aux hommes l'accès au royaume des cieux; vous n'y entrez pas vous-mêmes et vous ne laissez pas entrer ceux qui le voudraient.
  '14':
  - type: text
    content: »[Malheur à vous, spécialistes de la loi et pharisiens hypocrites, parce que vous dépouillez les veuves de leurs biens tout en faisant pour l'apparence de longues prières; à cause de cela, vous serez jugés plus sévèrement.]
  '15':
  - type: text
    content: »Malheur à vous, spécialistes de la loi et pharisiens hypocrites, parce que vous parcourez la mer et la terre pour faire un converti et, quand il l'est devenu, vous en faites un fils de l'enfer deux fois pire que vous.
  '16':
  - type: text
    content: '»Malheur à vous, conducteurs aveugles! Vous dites: ‘Si quelqu''un jure par le temple, cela ne compte pas, mais si quelqu''un jure par l''or du temple, il est engagé.’ '
  '17':
  - type: text
    content: 'Espèces de fous aveugles! Lequel est le plus grand: l''or ou le temple qui consacre l''or? '
  '18':
  - type: text
    content: 'Vous dites encore: ‘Si quelqu''un jure par l''autel, cela ne compte pas, mais si quelqu''un jure par l''offrande qui est sur l''autel, il est engagé.’ '
  '19':
  - type: text
    content: 'Espèces de fous aveugles! Lequel est le plus grand: l''offrande ou l''autel qui consacre l''offrande? '
  '2':
  - type: text
    content: 'en disant: «Les spécialistes de la loi et les pharisiens se sont faits les interprètes de Moïse. '
  '20':
  - type: text
    content: 'Celui qui jure par l''autel jure par l''autel et par tout ce qui est dessus, '
  '21':
  - type: text
    content: 'celui qui jure par le temple jure par le temple et par celui qui l''habite, '
  '22':
  - type: text
    content: et celui qui jure par le ciel jure par le trône de Dieu et par celui qui y est assis.
  '23':
  - type: text
    content: '»Malheur à vous, spécialistes de la loi et pharisiens hypocrites, parce que vous versez la dîme de la menthe, de l''aneth et du cumin et que vous laissez ce qu''il y a de plus important dans la loi: la justice, la bonté et la fidélité. C''est cela qu''il fallait pratiquer, sans négliger le reste. '
  '24':
  - type: text
    content: Conducteurs aveugles! Vous filtrez vos boissons pour éliminer le moucheron, mais vous avalez le chameau.
  '25':
  - type: text
    content: '»Malheur à vous, spécialistes de la loi et pharisiens hypocrites, parce que vous nettoyez l''extérieur de la coupe et du plat, alors qu''à l''intérieur ils sont pleins du produit de vos vols et de vos excès. '
  '26':
  - type: text
    content: Pharisien aveugle! Nettoie d'abord l'intérieur de la coupe et du plat, afin que l'extérieur aussi devienne pur.
  '27':
  - type: text
    content: '»Malheur à vous, spécialistes de la loi et pharisiens hypocrites, parce que vous ressemblez à des tombeaux blanchis qui paraissent beaux de l''extérieur et qui, à l''intérieur, sont pleins d''ossements de morts et de toutes sortes d''impuretés. '
  '28':
  - type: text
    content: Vous de même, de l'extérieur, vous paraissez justes aux hommes, mais à l'intérieur vous êtes pleins d'hypocrisie et d'injustice.
  '29':
  - type: text
    content: '»Malheur à vous, spécialistes de la loi et pharisiens hypocrites, parce que vous construisez les tombeaux des prophètes et que vous décorez les tombes des justes, '
  '3':
  - type: text
    content: 'Tout ce qu''ils vous disent [de respecter], faites-le donc et respectez-le, mais n''agissez pas comme eux, car ils disent et ne font pas. '
  '30':
  - type: text
    content: 'et vous dites: ‘Si nous avions vécu à l''époque de nos ancêtres, nous ne nous serions pas joints à eux pour verser le sang des prophètes.’ '
  '31':
  - type: text
    content: 'Vous témoignez ainsi contre vous-mêmes que vous êtes les descendants de ceux qui ont tué les prophètes. '
  '32':
  - type: text
    content: 'Portez donc à son comble la mesure de vos ancêtres! '
  '33':
  - type: text
    content: 'Serpents, race de vipères! Comment échapperez-vous au jugement de l''enfer? '
  '34':
  - type: text
    content: 'C''est pourquoi, je vous envoie des prophètes, des sages et des spécialistes de la loi. Vous tuerez et crucifierez les uns, vous fouetterez les autres dans vos synagogues et vous les persécuterez de ville en ville, '
  '35':
  - type: text
    content: 'afin que retombe sur vous tout le sang innocent versé sur la terre, depuis le sang d''Abel le juste jusqu''au sang de Zacharie, fils de Bérékia, que vous avez tué entre le temple et l''autel. '
  '36':
  - type: text
    content: En vérité je vous le dis, tout cela retombera sur cette génération.
  '37':
  - type: text
    content: '»Jérusalem, Jérusalem, toi qui tues les prophètes et qui lapides ceux qui te sont envoyés! Combien de fois j''ai voulu rassembler tes enfants, comme une poule rassemble ses poussins sous ses ailes, et vous ne l''avez pas voulu! '
  '38':
  - type: text
    content: 'Voici que votre maison vous sera laissée déserte '
  '39':
  - type: text
    content: 'car, je vous le dis, vous ne me verrez plus désormais, jusqu''à ce que vous disiez: '
  - type: text
    content: ‘Béni soit celui qui vient au nom du Seigneur!’
  - type: note
    content: 'Béni… Seigneur: citation du Psaume 118.26.'
  - type: text
    content: »
  '4':
  - type: text
    content: 'Ils lient des fardeaux pesants et les mettent sur les épaules des hommes, mais ils ne veulent pas les remuer du doigt. '
  '5':
  - type: text
    content: Toutes leurs actions, ils les font pour se faire remarquer des hommes. Ainsi, ils portent de grands phylactères
  - type: note
    content: 'Phylactères: bandes de parchemin où sont inscrits des passages de la loi et contenues dans des étuis, portées par les Juifs pieux sur le front et le poignet pour respecter à la lettre Deutéronome 6.8.'
  - type: text
    content: ' et allongent les franges'
  - type: note
    content: 'Franges: prescrites par Nombres 15.38 comme rappel des commandements de l''Eternel.'
  - type: text
    content: ' [de leurs vêtements]. '
  '6':
  - type: text
    content: 'Ils aiment occuper la meilleure place dans les festins et les sièges d''honneur dans les synagogues. '
  '7':
  - type: text
    content: 'Ils aiment être salués sur les places publiques et être appelés par les hommes ‘Maître, [Maître]’. '
  '8':
  - type: text
    content: 'Mais vous, ne vous faites pas appeler maîtres, car un seul est votre maître, [c''est le Christ,] et vous êtes tous frères. '
  '9':
  - type: text
    content: 'N''appelez personne sur la terre votre père, car un seul est votre Père, c''est celui qui est au ciel. '
