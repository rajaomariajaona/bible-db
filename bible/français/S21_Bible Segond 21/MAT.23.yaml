document_id: MAT.23
type_code: fra
segments:
- type: usfm
  marker: nb
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Alors Jésus s''adressa à la foule et à ses disciples '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'en disant: «Les spécialistes de la loi et les pharisiens se sont faits les interprètes de Moïse. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Tout ce qu''ils vous disent [de respecter], faites-le donc et respectez-le, mais n''agissez pas comme eux, car ils disent et ne font pas. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Ils lient des fardeaux pesants et les mettent sur les épaules des hommes, mais ils ne veulent pas les remuer du doigt. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Toutes leurs actions, ils les font pour se faire remarquer des hommes. Ainsi, ils portent de grands phylactères
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '23.5 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Phylactères: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'bandes de parchemin où sont inscrits des passages de la loi et contenues dans des étuis, portées par les Juifs pieux sur le front et le poignet pour respecter à la lettre '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Deutéronome 6.8
      metadata:
        usfm: DEU.6.8
    - type: usfm
      marker: ft
      children:
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: ' et allongent les franges'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '23.5 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Franges: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'prescrites par '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Nombres 15.38
      metadata:
        usfm: NUM.15.38
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' comme rappel des commandements de l''Eternel.'
    marker-yv: yv-n
  - type: text
    text: ' [de leurs vêtements]. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Ils aiment occuper la meilleure place dans les festins et les sièges d''honneur dans les synagogues. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Ils aiment être salués sur les places publiques et être appelés par les hommes ‘Maître, [Maître]’. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Mais vous, ne vous faites pas appeler maîtres, car un seul est votre maître, [c''est le Christ,] et vous êtes tous frères. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'N''appelez personne sur la terre votre père, car un seul est votre Père, c''est celui qui est au ciel. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Ne vous faites pas appeler chefs, car un seul est votre chef, c''est le Christ. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Le plus grand parmi vous sera votre serviteur. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Celui qui s'élèvera sera abaissé et celui qui s'abaissera sera élevé.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: »Malheur à vous, spécialistes de la loi et pharisiens hypocrites, parce que vous fermez aux hommes l'accès au royaume des cieux; vous n'y entrez pas vous-mêmes et vous ne laissez pas entrer ceux qui le voudraient.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: »[Malheur à vous, spécialistes de la loi et pharisiens hypocrites, parce que vous dépouillez les veuves de leurs biens tout en faisant pour l'apparence de longues prières; à cause de cela, vous serez jugés plus sévèrement.]
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: »Malheur à vous, spécialistes de la loi et pharisiens hypocrites, parce que vous parcourez la mer et la terre pour faire un converti et, quand il l'est devenu, vous en faites un fils de l'enfer deux fois pire que vous.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: '»Malheur à vous, conducteurs aveugles! Vous dites: ‘Si quelqu''un jure par le temple, cela ne compte pas, mais si quelqu''un jure par l''or du temple, il est engagé.’ '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Espèces de fous aveugles! Lequel est le plus grand: l''or ou le temple qui consacre l''or? '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Vous dites encore: ‘Si quelqu''un jure par l''autel, cela ne compte pas, mais si quelqu''un jure par l''offrande qui est sur l''autel, il est engagé.’ '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Espèces de fous aveugles! Lequel est le plus grand: l''offrande ou l''autel qui consacre l''offrande? '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Celui qui jure par l''autel jure par l''autel et par tout ce qui est dessus, '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'celui qui jure par le temple jure par le temple et par celui qui l''habite, '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: et celui qui jure par le ciel jure par le trône de Dieu et par celui qui y est assis.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: '»Malheur à vous, spécialistes de la loi et pharisiens hypocrites, parce que vous versez la dîme de la menthe, de l''aneth et du cumin et que vous laissez ce qu''il y a de plus important dans la loi: la justice, la bonté et la fidélité. C''est cela qu''il fallait pratiquer, sans négliger le reste. '
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: Conducteurs aveugles! Vous filtrez vos boissons pour éliminer le moucheron, mais vous avalez le chameau.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: '»Malheur à vous, spécialistes de la loi et pharisiens hypocrites, parce que vous nettoyez l''extérieur de la coupe et du plat, alors qu''à l''intérieur ils sont pleins du produit de vos vols et de vos excès. '
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: Pharisien aveugle! Nettoie d'abord l'intérieur de la coupe et du plat, afin que l'extérieur aussi devienne pur.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: '»Malheur à vous, spécialistes de la loi et pharisiens hypocrites, parce que vous ressemblez à des tombeaux blanchis qui paraissent beaux de l''extérieur et qui, à l''intérieur, sont pleins d''ossements de morts et de toutes sortes d''impuretés. '
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: Vous de même, de l'extérieur, vous paraissez justes aux hommes, mais à l'intérieur vous êtes pleins d'hypocrisie et d'injustice.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: '»Malheur à vous, spécialistes de la loi et pharisiens hypocrites, parce que vous construisez les tombeaux des prophètes et que vous décorez les tombes des justes, '
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'et vous dites: ‘Si nous avions vécu à l''époque de nos ancêtres, nous ne nous serions pas joints à eux pour verser le sang des prophètes.’ '
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'Vous témoignez ainsi contre vous-mêmes que vous êtes les descendants de ceux qui ont tué les prophètes. '
  - type: usfm
    marker: v
    metadata:
      v: '32'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'Portez donc à son comble la mesure de vos ancêtres! '
  - type: usfm
    marker: v
    metadata:
      v: '33'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: 'Serpents, race de vipères! Comment échapperez-vous au jugement de l''enfer? '
  - type: usfm
    marker: v
    metadata:
      v: '34'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: 'C''est pourquoi, je vous envoie des prophètes, des sages et des spécialistes de la loi. Vous tuerez et crucifierez les uns, vous fouetterez les autres dans vos synagogues et vous les persécuterez de ville en ville, '
  - type: usfm
    marker: v
    metadata:
      v: '35'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: 'afin que retombe sur vous tout le sang innocent versé sur la terre, depuis le sang d''Abel le juste jusqu''au sang de Zacharie, fils de Bérékia, que vous avez tué entre le temple et l''autel. '
  - type: usfm
    marker: v
    metadata:
      v: '36'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: En vérité je vous le dis, tout cela retombera sur cette génération.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '37'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: '»Jérusalem, Jérusalem, toi qui tues les prophètes et qui lapides ceux qui te sont envoyés! Combien de fois j''ai voulu rassembler tes enfants, comme une poule rassemble ses poussins sous ses ailes, et vous ne l''avez pas voulu! '
  - type: usfm
    marker: v
    metadata:
      v: '38'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: text
    text: 'Voici que votre maison vous sera laissée déserte '
  - type: usfm
    marker: v
    metadata:
      v: '39'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '39'
  - type: text
    text: 'car, je vous le dis, vous ne me verrez plus désormais, jusqu''à ce que vous disiez: '
  - type: usfm
    marker: qt
    children:
    - type: text
      text: ‘Béni soit celui qui vient au nom du Seigneur!’
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '23.39 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Béni… Seigneur: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'citation du '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Psaume 118.26
      metadata:
        usfm: PSA.118.26
    - type: usfm
      marker: ft
      children:
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: »
