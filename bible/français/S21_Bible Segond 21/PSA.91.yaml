document_id: PSA.91
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: La protection pleinement suffisante de Dieu
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Celui qui habite sous l'abri du Très-Haut
- type: usfm
  marker: q1
  children:
  - type: text
    text: repose à l'ombre du Tout-Puissant.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Je dis à l''Eternel: «Tu es mon refuge et ma forteresse,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: mon Dieu en qui je me confie!»
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Oui, c'est lui qui te délivre du piège de l'oiseleur
- type: usfm
  marker: q1
  children:
  - type: text
    text: et de la peste dévastatrice.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Il te couvrira de ses ailes et tu trouveras un refuge sous son plumage.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Sa fidélité est un bouclier et une cuirasse.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Tu ne redouteras ni les terreurs de la nuit
- type: usfm
  marker: q1
  children:
  - type: text
    text: ni la flèche qui vole durant le jour,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: ni la peste qui rôde dans les ténèbres
- type: usfm
  marker: q1
  children:
  - type: text
    text: ni le fléau qui frappe en plein midi.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Si 1000 tombent à côté de toi
- type: usfm
  marker: q1
  children:
  - type: text
    text: et 10'000 à ta droite,
- type: usfm
  marker: q1
  children:
  - type: text
    text: tu ne seras pas atteint.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Ouvre seulement les yeux,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et tu verras la punition des méchants.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: «Oui, tu es mon refuge, Eternel!»
- type: usfm
  marker: q1
  children:
  - type: text
    text: Tu fais du Très-Haut ta retraite?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Aucun mal ne t'arrivera,
- type: usfm
  marker: q1
  children:
  - type: text
    text: aucun fléau n'approchera de ta tente,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: car *il donnera ordre à ses anges
- type: usfm
  marker: q1
  children:
  - type: text
    text: de te garder dans toutes tes voies.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Ils te porteront sur les mains,
- type: usfm
  marker: q1
  children:
  - type: text
    text: de peur que ton pied ne heurte une pierre
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '91.11-12 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Il donnera… une pierre: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'cité par Satan lors de la tentation de Jésus en '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Matthieu 4.6
      metadata:
        usfm: MAT.4.6
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Luc 4.10-11
      metadata:
        usfm: LUK.4.10+LUK.4.11
    - type: usfm
      marker: ft
      children:
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Tu marcheras sur le lion et sur la vipère,
- type: usfm
  marker: q1
  children:
  - type: text
    text: tu piétineras le lionceau et le dragon.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Puisqu'il est attaché à moi, je le délivrerai;
- type: usfm
  marker: q1
  children:
  - type: text
    text: je le protégerai, puisqu'il connaît mon nom.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Il fera appel à moi et je lui répondrai.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Je serai avec lui dans la détresse,
- type: usfm
  marker: q1
  children:
  - type: text
    text: je le délivrerai et je l'honorerai.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Je le comblerai de longs jours
- type: usfm
  marker: q1
  children:
  - type: text
    text: et je lui ferai voir mon salut.
