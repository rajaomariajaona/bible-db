document_id: PSA.91,152
type_code: fra
verses:
  '1':
  - type: heading
    content: La protection pleinement suffisante de Dieu
  - type: text
    content: Celui qui habite sous l'abri du Très-Haut
  - type: text
    content: repose à l'ombre du Tout-Puissant.
  '10':
  - type: text
    content: Aucun mal ne t'arrivera,
  - type: text
    content: aucun fléau n'approchera de ta tente,
  '11':
  - type: text
    content: car *il donnera ordre à ses anges
  - type: text
    content: de te garder dans toutes tes voies.
  '12':
  - type: text
    content: Ils te porteront sur les mains,
  - type: text
    content: de peur que ton pied ne heurte une pierre
  - type: note
    content: 'Il donnera… une pierre: cité par Satan lors de la tentation de Jésus en Matthieu 4.6; Luc 4.10-11.'
  - type: text
    content: .
  '13':
  - type: text
    content: Tu marcheras sur le lion et sur la vipère,
  - type: text
    content: tu piétineras le lionceau et le dragon.
  '14':
  - type: text
    content: Puisqu'il est attaché à moi, je le délivrerai;
  - type: text
    content: je le protégerai, puisqu'il connaît mon nom.
  '15':
  - type: text
    content: Il fera appel à moi et je lui répondrai.
  - type: text
    content: Je serai avec lui dans la détresse,
  - type: text
    content: je le délivrerai et je l'honorerai.
  '16':
  - type: text
    content: Je le comblerai de longs jours
  - type: text
    content: et je lui ferai voir mon salut.
  '2':
  - type: text
    content: 'Je dis à l''Eternel: «Tu es mon refuge et ma forteresse,'
  - type: text
    content: mon Dieu en qui je me confie!»
  '3':
  - type: text
    content: Oui, c'est lui qui te délivre du piège de l'oiseleur
  - type: text
    content: et de la peste dévastatrice.
  '4':
  - type: text
    content: Il te couvrira de ses ailes et tu trouveras un refuge sous son plumage.
  - type: text
    content: Sa fidélité est un bouclier et une cuirasse.
  '5':
  - type: text
    content: Tu ne redouteras ni les terreurs de la nuit
  - type: text
    content: ni la flèche qui vole durant le jour,
  '6':
  - type: text
    content: ni la peste qui rôde dans les ténèbres
  - type: text
    content: ni le fléau qui frappe en plein midi.
  '7':
  - type: text
    content: Si 1000 tombent à côté de toi
  - type: text
    content: et 10'000 à ta droite,
  - type: text
    content: tu ne seras pas atteint.
  '8':
  - type: text
    content: Ouvre seulement les yeux,
  - type: text
    content: et tu verras la punition des méchants.
  '9':
  - type: text
    content: «Oui, tu es mon refuge, Eternel!»
  - type: text
    content: Tu fais du Très-Haut ta retraite?
