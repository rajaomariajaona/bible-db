document_id: EZK.1
type_code: fra
segments:
- type: usfm
  marker: ms1
  children:
  - type: text
    text: Jugement de Jérusalem
  marker-yv: yv-h
- type: usfm
  marker: mr
  children:
  - type: text
    text: 1.1–24.27
  marker-yv: yv-h
- type: usfm
  marker: s1
  children:
  - type: text
    text: Vision de la gloire de l'Eternel
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: La trentième année, le cinquième jour du quatrième mois, je faisais partie des exilés, près du fleuve Kebar. Le ciel s'est ouvert et j'ai eu des visions divines.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Le cinquième jour du mois – c''était la cinquième année de l''exil du roi Jojakin – '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: la parole de l'Eternel a été adressée à Ezéchiel, le fils du prêtre Buzi, dans le pays des Babyloniens, près du fleuve Kebar. C'est là que la main de l'Eternel a reposé sur lui.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Alors que je regardais, un vent impétueux est arrivé du nord, ainsi qu''une grande nuée et une gerbe de feu. Tout autour, une lumière rayonnait. Au centre, il y avait comme un éclat étincelant qui sortait du milieu du feu. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Au centre encore, quelque chose ressemblait à quatre êtres vivants. Leur aspect était proche de celui des hommes. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Chacun d''eux avait quatre visages et quatre ailes. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Leurs jambes étaient droites, et leurs pieds pareils aux sabots d''un taureau. Ils étincelaient comme du bronze poli. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Ils avaient des mains d''homme sous leurs ailes, sur les quatre côtés. Sur les quatre côtés, il y avait aussi leurs visages et leurs ailes, ceci pour chacun des quatre êtres vivants. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Leurs ailes se touchaient l''une l''autre. Ils se déplaçaient sans dévier, chacun allait droit devant lui. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Un de leurs visages ressemblait à celui des hommes, mais tous les quatre avaient aussi une face de lion à droite, une face de taureau à gauche et une face d''aigle. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Voilà pour leurs visages. Leurs ailes étaient déployées vers le haut. Deux de leurs ailes touchaient celle d''un autre et deux couvraient leur corps. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Chacun allait droit devant lui. Ils allaient là où l''Esprit allait. Ils se déplaçaient, et ils se déplaçaient sans dévier. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Ces êtres vivants ressemblaient, par leur aspect, à des braises incandescentes. C''était pareil à l''aspect de torches enflammées. Un feu circulait entre les êtres vivants. Il jetait de la lumière et il en sortait des éclairs. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Les êtres vivants couraient et revenaient comme la foudre.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Je regardais ces êtres vivants et j''ai vu que sur la terre se trouvait une roue, à côté de chacun des êtres vivants aux quatre visages. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Dans leur aspect et leur structure, les roues avaient un éclat pareil à celui de la chrysolithe, et toutes les quatre étaient pareilles. Leur aspect et leur structure étaient tels que chaque roue paraissait être au milieu d''une autre roue. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Dans leurs déplacements, elles pouvaient suivre les quatre directions prises par les êtres vivants, et elles se déplaçaient sans dévier. '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'La hauteur de leurs jantes était effrayante, et les jantes des quatre roues étaient couvertes d''yeux tout autour. '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Les roues suivaient les êtres vivants dans leurs déplacements: quand les êtres vivants s''élevaient au-dessus de la terre, les roues s''élevaient aussi. '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Ils allaient là où l''Esprit allait, et les roues s''élevaient simultanément avec eux, car l''esprit des êtres vivants était dans les roues. '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Quand ils se déplaçaient, elles se déplaçaient, et quand ils s'arrêtaient, elles s'arrêtaient; quand ils s'élevaient au-dessus de la terre, les roues s'élevaient simultanément avec eux, car l'esprit des êtres vivants était dans les roues.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Au-dessus de la tête des êtres vivants, la voûte céleste ressemblait à l''éclat d''un cristal. C''était impressionnant. Voilà l''étendue qu''il y avait au-dessus de leurs têtes. '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Sous la voûte céleste, leurs ailes étaient tendues l''une contre l''autre, et ils en avaient chacun deux qui les couvraient, ils en avaient chacun deux qui couvraient leur corps. '
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'J''ai entendu le bruit de leurs ailes, quand ils se déplaçaient: pareil au bruit des grandes eaux ou à la voix du Tout-Puissant, c''était un bruit aussi tumultueux que celui d''une armée. Quand ils s''arrêtaient, ils laissaient retomber leurs ailes. '
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: Une voix retentissait au-dessus de la voûte céleste qui était sur leurs têtes, lorsqu'ils s'arrêtaient et laissaient retomber leurs ailes.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Au-dessus de la voûte céleste qui était sur leurs têtes, il y avait quelque chose de similaire à une pierre de saphir, qui ressemblait à un trône, et sur cette forme de trône apparaissait quelqu''un dont l''aspect ressemblait à celui d''un homme, tout en haut. '
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'J''ai vu comme un éclat étincelant, comme du feu, qui l''enveloppait tout autour. Depuis ce qui semblait être ses hanches jusqu''en haut et depuis ce qui semblait être ses hanches jusqu''en bas, j''ai vu quelque chose de similaire à du feu, une lumière qui rayonnait tout autour. '
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'Cette lumière qui rayonnait tout autour de lui avait le même aspect que l''arc-en-ciel dans les nuages un jour de pluie: c''était un reflet de la gloire de l''Eternel. A cette vue, je suis tombé le visage contre terre, puis j''ai entendu quelqu''un me parler.'
