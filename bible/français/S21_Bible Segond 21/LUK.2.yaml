document_id: LUK.2,152
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Naissance de Jésus à Bethléhem
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'A cette époque-là parut un édit de l''empereur Auguste qui ordonnait le recensement de tout l''Empire. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'Mais l''ange leur dit: «N''ayez pas peur, car je vous annonce une bonne nouvelle qui sera une source de grande joie pour tout le peuple: '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: aujourd'hui, dans la ville de David, il vous est né un Sauveur qui est le Messie
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '2.11 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Messie: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ou oint de Dieu, en grec Christos. Les Juifs attendaient, d'après les promesses de l'AT, la venue d'une personne désignée par Dieu, qui leur apporterait la délivrance.
      marker-yv: yv-n
    - type: text
      text: ', le Seigneur. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'Voici à quel signe vous le reconnaîtrez: vous trouverez un nouveau-né enveloppé de langes et couché dans une mangeoire.» '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'Et tout à coup une foule d''anges de l''armée céleste se joignit à l''ange. Ils adressaient des louanges à Dieu et disaient: '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: «Gloire à Dieu dans les lieux très hauts, paix sur la terre et bienveillance parmi les hommes!»
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'Lorsque les anges les eurent quittés pour retourner au ciel, les bergers se dirent les uns aux autres: «Allons jusqu''à Bethléhem pour voir ce qui est arrivé, ce que le Seigneur nous a fait connaître.» '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'Ils se dépêchèrent d''y aller et ils trouvèrent Marie et Joseph, ainsi que le nouveau-né couché dans la mangeoire. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'Après l''avoir vu, ils racontèrent ce qui leur avait été dit au sujet de ce petit enfant. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'Tous ceux qui entendirent les bergers furent étonnés de ce qu''ils leur disaient. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'Marie gardait le souvenir de tout cela et le méditait dans son cœur. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'Ce premier recensement eut lieu pendant que Quirinius était gouverneur de Syrie. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: Puis les bergers repartirent en célébrant la gloire de Dieu et en lui adressant des louanges à cause de tout ce qu'ils avaient entendu et vu et qui était conforme à ce qui leur avait été annoncé.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Jésus présenté dans le temple
    marker-yv: yv-h
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: 'Huit jours plus tard, ce fut le moment de circoncire l''enfant; on lui donna le nom de Jésus, nom que l''ange avait indiqué avant sa conception. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: 'Quand la période de leur purification prit fin, conformément à la loi de Moïse, Joseph et Marie l''amenèrent à Jérusalem pour le présenter au Seigneur '
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: '– suivant ce qui est écrit dans la loi du Seigneur: '
    - type: usfm
      marker: qt
      children:
      - type: text
        text: Tout mâle premier-né sera consacré au Seigneur
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '2.23 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Tout mâle… Seigneur: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'principe énoncé en '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Exode 13.2
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' au moment de la sortie d''Egypte des Israélites.'
      marker-yv: yv-n
    - type: text
      text: ' – '
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: 'et pour offrir en sacrifice '
    - type: usfm
      marker: qt
      children:
      - type: text
        text: un couple de tourterelles ou deux jeunes pigeons
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '2.24 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Un couple… pigeons: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'commandement tiré de '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Lévitique 12.8
      - type: usfm
        marker: ft
        children:
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: ', comme cela est prescrit dans la loi du Seigneur.'
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: 'Or il y avait à Jérusalem un homme appelé Siméon. Cet homme était juste et pieux, il attendait la consolation d''Israël et l''Esprit saint était sur lui. '
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: 'Le Saint-Esprit lui avait révélé qu''il ne mourrait pas avant d''avoir vu le Messie du Seigneur. '
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: 'Il vint au temple, poussé par l''Esprit. Et quand les parents amenèrent le petit enfant Jésus pour accomplir à son sujet ce que prescrivait la loi, '
  '28':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: 'il le prit dans ses bras, bénit Dieu et dit:'
  '29':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: «Maintenant, Seigneur, tu laisses ton serviteur
  - type: usfm
    marker: q1
    children:
    - type: text
      text: s'en aller en paix, conformément à ta promesse,
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: Tous allaient se faire inscrire, chacun dans sa ville d'origine.
  '30':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '30'
    - type: text
      text: car mes yeux ont vu ton salut,
  '31':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '31'
    - type: text
      text: salut que tu as préparé devant tous les peuples,
  '32':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '32'
    - type: text
      text: lumière pour éclairer les nations
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et gloire d'Israël, ton peuple.»
  '33':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '33'
    - type: text
      text: 'Joseph et la mère [de Jésus] étaient émerveillés de ce qu''on disait de lui. '
  '34':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '34'
    - type: text
      text: 'Siméon les bénit et dit à Marie, sa mère: «Cet enfant est destiné à amener la chute et le relèvement de beaucoup en Israël et à devenir un signe qui provoquera la contradiction. '
  '35':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '35'
    - type: text
      text: Toi-même, une épée te transpercera l'âme. Ainsi, les pensées de beaucoup de cœurs seront révélées.»
  '36':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '36'
    - type: text
      text: 'Il y avait aussi une prophétesse, Anne, fille de Phanuel, de la tribu d''Aser. Elle était d''un âge très avancé. Elle n''avait vécu que 7 ans avec son mari après son mariage. '
  '37':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '37'
    - type: text
      text: 'Restée veuve et âgée de 84 ans, elle ne quittait pas le temple; elle servait Dieu nuit et jour dans le jeûne et dans la prière. '
  '38':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '38'
    - type: text
      text: Arrivée elle aussi à la même heure, elle disait publiquement sa reconnaissance envers Dieu et parlait de Jésus à tous ceux qui attendaient la délivrance à Jérusalem.
  '39':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '39'
    - type: text
      text: 'Après avoir accompli tout ce que prescrivait la loi du Seigneur, Joseph et Marie retournèrent en Galilée, à Nazareth, leur ville. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'Joseph aussi monta de la Galilée, de la ville de Nazareth, pour se rendre en Judée dans la ville de David, appelée Bethléhem, parce qu''il était de la famille et de la lignée de David. '
  '40':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '40'
    - type: text
      text: Or l'enfant grandissait et se fortifiait [en esprit]. Il était rempli de sagesse et la grâce de Dieu était sur lui.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Jésus à 12 ans dans le temple
    marker-yv: yv-h
  '41':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '41'
    - type: text
      text: 'Les parents de Jésus allaient chaque année à Jérusalem pour la fête de la Pâque. '
  '42':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '42'
    - type: text
      text: 'Lorsqu''il eut 12 ans, ils y montèrent avec lui comme c''était la coutume pour cette fête. '
  '43':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '43'
    - type: text
      text: 'Puis, quand la fête fut terminée, ils repartirent, mais l''enfant Jésus resta à Jérusalem sans que sa mère et Joseph s''en aperçoivent. '
  '44':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '44'
    - type: text
      text: 'Croyant qu''il était avec leurs compagnons de voyage, ils firent une journée de chemin, tout en le cherchant parmi leurs parents et leurs connaissances. '
  '45':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '45'
    - type: text
      text: Mais ils ne le trouvèrent pas et ils retournèrent à Jérusalem pour le chercher.
  '46':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '46'
    - type: text
      text: 'Au bout de trois jours, ils le trouvèrent dans le temple, assis au milieu des maîtres; il les écoutait et les interrogeait. '
  '47':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '47'
    - type: text
      text: 'Tous ceux qui l''entendaient étaient stupéfaits de son intelligence et de ses réponses. '
  '48':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '48'
    - type: text
      text: 'Quand ses parents le virent, ils furent frappés d''étonnement, et sa mère lui dit: «Mon enfant, pourquoi as-tu agi ainsi avec nous? Ton père et moi, nous te cherchions avec angoisse.» '
  '49':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '49'
    - type: text
      text: 'Il leur dit: «Pourquoi me cherchiez-vous? Ne saviez-vous pas qu''il faut que je m''occupe des affaires de mon Père'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '2.49 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Mon Père: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Jésus parlait de Dieu, par opposition à Joseph qui n'était son père que d'un point de vue légal et social.
      marker-yv: yv-n
    - type: text
      text: '?» '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'Il y alla pour se faire inscrire avec sa femme Marie qui était enceinte. '
  '50':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '50'
    - type: text
      text: 'Mais ils ne comprirent pas ce qu''il leur disait. '
  '51':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '51'
    - type: text
      text: 'Puis il descendit avec eux pour aller à Nazareth et il leur était soumis. Sa mère gardait précieusement toutes ces choses dans son cœur. '
  '52':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '52'
    - type: text
      text: Jésus grandissait en sagesse, en taille et en grâce devant Dieu et devant les hommes.
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'Pendant qu''ils étaient là, le moment où Marie devait accoucher arriva, '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: et elle mit au monde son fils premier-né. Elle l'enveloppa de langes et le coucha dans une mangeoire parce qu'il n'y avait pas de place pour eux dans la salle des hôtes.
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'Il y avait dans la même région des bergers qui passaient la nuit dans les champs pour y garder leur troupeau. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'Un ange du Seigneur leur apparut et la gloire du Seigneur resplendit autour d''eux. Ils furent saisis d''une grande frayeur. '
