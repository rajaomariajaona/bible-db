document_id: LUK.2,152
type_code: fra
verses:
  '1':
  - type: heading
    content: Naissance de Jésus à Bethléhem
  - type: text
    content: 'A cette époque-là parut un édit de l''empereur Auguste qui ordonnait le recensement de tout l''Empire. '
  '10':
  - type: text
    content: 'Mais l''ange leur dit: «N''ayez pas peur, car je vous annonce une bonne nouvelle qui sera une source de grande joie pour tout le peuple: '
  '11':
  - type: text
    content: aujourd'hui, dans la ville de David, il vous est né un Sauveur qui est le Messie
  - type: note
    content: 'Messie: ou oint de Dieu, en grec Christos. Les Juifs attendaient, d''après les promesses de l''AT, la venue d''une personne désignée par Dieu, qui leur apporterait la délivrance.'
  - type: text
    content: ', le Seigneur. '
  '12':
  - type: text
    content: 'Voici à quel signe vous le reconnaîtrez: vous trouverez un nouveau-né enveloppé de langes et couché dans une mangeoire.» '
  '13':
  - type: text
    content: 'Et tout à coup une foule d''anges de l''armée céleste se joignit à l''ange. Ils adressaient des louanges à Dieu et disaient: '
  '14':
  - type: text
    content: «Gloire à Dieu dans les lieux très hauts, paix sur la terre et bienveillance parmi les hommes!»
  '15':
  - type: text
    content: 'Lorsque les anges les eurent quittés pour retourner au ciel, les bergers se dirent les uns aux autres: «Allons jusqu''à Bethléhem pour voir ce qui est arrivé, ce que le Seigneur nous a fait connaître.» '
  '16':
  - type: text
    content: 'Ils se dépêchèrent d''y aller et ils trouvèrent Marie et Joseph, ainsi que le nouveau-né couché dans la mangeoire. '
  '17':
  - type: text
    content: 'Après l''avoir vu, ils racontèrent ce qui leur avait été dit au sujet de ce petit enfant. '
  '18':
  - type: text
    content: 'Tous ceux qui entendirent les bergers furent étonnés de ce qu''ils leur disaient. '
  '19':
  - type: text
    content: 'Marie gardait le souvenir de tout cela et le méditait dans son cœur. '
  '2':
  - type: text
    content: 'Ce premier recensement eut lieu pendant que Quirinius était gouverneur de Syrie. '
  '20':
  - type: text
    content: Puis les bergers repartirent en célébrant la gloire de Dieu et en lui adressant des louanges à cause de tout ce qu'ils avaient entendu et vu et qui était conforme à ce qui leur avait été annoncé.
  - type: heading
    content: Jésus présenté dans le temple
  '21':
  - type: text
    content: 'Huit jours plus tard, ce fut le moment de circoncire l''enfant; on lui donna le nom de Jésus, nom que l''ange avait indiqué avant sa conception. '
  '22':
  - type: text
    content: 'Quand la période de leur purification prit fin, conformément à la loi de Moïse, Joseph et Marie l''amenèrent à Jérusalem pour le présenter au Seigneur '
  '23':
  - type: text
    content: '– suivant ce qui est écrit dans la loi du Seigneur: '
  - type: text
    content: Tout mâle premier-né sera consacré au Seigneur
  - type: note
    content: 'Tout mâle… Seigneur: principe énoncé en Exode 13.2 au moment de la sortie d''Egypte des Israélites.'
  - type: text
    content: ' – '
  '24':
  - type: text
    content: 'et pour offrir en sacrifice '
  - type: text
    content: un couple de tourterelles ou deux jeunes pigeons
  - type: note
    content: 'Un couple… pigeons: commandement tiré de Lévitique 12.8.'
  - type: text
    content: ', comme cela est prescrit dans la loi du Seigneur.'
  '25':
  - type: text
    content: 'Or il y avait à Jérusalem un homme appelé Siméon. Cet homme était juste et pieux, il attendait la consolation d''Israël et l''Esprit saint était sur lui. '
  '26':
  - type: text
    content: 'Le Saint-Esprit lui avait révélé qu''il ne mourrait pas avant d''avoir vu le Messie du Seigneur. '
  '27':
  - type: text
    content: 'Il vint au temple, poussé par l''Esprit. Et quand les parents amenèrent le petit enfant Jésus pour accomplir à son sujet ce que prescrivait la loi, '
  '28':
  - type: text
    content: 'il le prit dans ses bras, bénit Dieu et dit:'
  '29':
  - type: text
    content: «Maintenant, Seigneur, tu laisses ton serviteur
  - type: text
    content: s'en aller en paix, conformément à ta promesse,
  '3':
  - type: text
    content: Tous allaient se faire inscrire, chacun dans sa ville d'origine.
  '30':
  - type: text
    content: car mes yeux ont vu ton salut,
  '31':
  - type: text
    content: salut que tu as préparé devant tous les peuples,
  '32':
  - type: text
    content: lumière pour éclairer les nations
  - type: text
    content: et gloire d'Israël, ton peuple.»
  '33':
  - type: text
    content: 'Joseph et la mère [de Jésus] étaient émerveillés de ce qu''on disait de lui. '
  '34':
  - type: text
    content: 'Siméon les bénit et dit à Marie, sa mère: «Cet enfant est destiné à amener la chute et le relèvement de beaucoup en Israël et à devenir un signe qui provoquera la contradiction. '
  '35':
  - type: text
    content: Toi-même, une épée te transpercera l'âme. Ainsi, les pensées de beaucoup de cœurs seront révélées.»
  '36':
  - type: text
    content: 'Il y avait aussi une prophétesse, Anne, fille de Phanuel, de la tribu d''Aser. Elle était d''un âge très avancé. Elle n''avait vécu que 7 ans avec son mari après son mariage. '
  '37':
  - type: text
    content: 'Restée veuve et âgée de 84 ans, elle ne quittait pas le temple; elle servait Dieu nuit et jour dans le jeûne et dans la prière. '
  '38':
  - type: text
    content: Arrivée elle aussi à la même heure, elle disait publiquement sa reconnaissance envers Dieu et parlait de Jésus à tous ceux qui attendaient la délivrance à Jérusalem.
  '39':
  - type: text
    content: 'Après avoir accompli tout ce que prescrivait la loi du Seigneur, Joseph et Marie retournèrent en Galilée, à Nazareth, leur ville. '
  '4':
  - type: text
    content: 'Joseph aussi monta de la Galilée, de la ville de Nazareth, pour se rendre en Judée dans la ville de David, appelée Bethléhem, parce qu''il était de la famille et de la lignée de David. '
  '40':
  - type: text
    content: Or l'enfant grandissait et se fortifiait [en esprit]. Il était rempli de sagesse et la grâce de Dieu était sur lui.
  - type: heading
    content: Jésus à 12 ans dans le temple
  '41':
  - type: text
    content: 'Les parents de Jésus allaient chaque année à Jérusalem pour la fête de la Pâque. '
  '42':
  - type: text
    content: 'Lorsqu''il eut 12 ans, ils y montèrent avec lui comme c''était la coutume pour cette fête. '
  '43':
  - type: text
    content: 'Puis, quand la fête fut terminée, ils repartirent, mais l''enfant Jésus resta à Jérusalem sans que sa mère et Joseph s''en aperçoivent. '
  '44':
  - type: text
    content: 'Croyant qu''il était avec leurs compagnons de voyage, ils firent une journée de chemin, tout en le cherchant parmi leurs parents et leurs connaissances. '
  '45':
  - type: text
    content: Mais ils ne le trouvèrent pas et ils retournèrent à Jérusalem pour le chercher.
  '46':
  - type: text
    content: 'Au bout de trois jours, ils le trouvèrent dans le temple, assis au milieu des maîtres; il les écoutait et les interrogeait. '
  '47':
  - type: text
    content: 'Tous ceux qui l''entendaient étaient stupéfaits de son intelligence et de ses réponses. '
  '48':
  - type: text
    content: 'Quand ses parents le virent, ils furent frappés d''étonnement, et sa mère lui dit: «Mon enfant, pourquoi as-tu agi ainsi avec nous? Ton père et moi, nous te cherchions avec angoisse.» '
  '49':
  - type: text
    content: 'Il leur dit: «Pourquoi me cherchiez-vous? Ne saviez-vous pas qu''il faut que je m''occupe des affaires de mon Père'
  - type: note
    content: 'Mon Père: Jésus parlait de Dieu, par opposition à Joseph qui n''était son père que d''un point de vue légal et social.'
  - type: text
    content: '?» '
  '5':
  - type: text
    content: 'Il y alla pour se faire inscrire avec sa femme Marie qui était enceinte. '
  '50':
  - type: text
    content: 'Mais ils ne comprirent pas ce qu''il leur disait. '
  '51':
  - type: text
    content: 'Puis il descendit avec eux pour aller à Nazareth et il leur était soumis. Sa mère gardait précieusement toutes ces choses dans son cœur. '
  '52':
  - type: text
    content: Jésus grandissait en sagesse, en taille et en grâce devant Dieu et devant les hommes.
  '6':
  - type: text
    content: 'Pendant qu''ils étaient là, le moment où Marie devait accoucher arriva, '
  '7':
  - type: text
    content: et elle mit au monde son fils premier-né. Elle l'enveloppa de langes et le coucha dans une mangeoire parce qu'il n'y avait pas de place pour eux dans la salle des hôtes.
  '8':
  - type: text
    content: 'Il y avait dans la même région des bergers qui passaient la nuit dans les champs pour y garder leur troupeau. '
  '9':
  - type: text
    content: 'Un ange du Seigneur leur apparut et la gloire du Seigneur resplendit autour d''eux. Ils furent saisis d''une grande frayeur. '
