document_id: JOB.10,152
type_code: fra
verses:
  '1':
  - type: text
    content: »Je suis dégoûté de la vie! Je laisserai s'exprimer ma plainte,
  - type: text
    content: je parlerai, dans l'amertume de mon âme.
  '10':
  - type: text
    content: Ne m'as-tu pas coulé comme du lait?
  - type: text
    content: Ne m'as-tu pas fait cailler comme du fromage?
  '11':
  - type: text
    content: Tu m'as couvert de peau et de chair,
  - type: text
    content: tu m'as tissé d'os et de nerfs,
  '12':
  - type: text
    content: tu m'as accordé la vie et tu as fait preuve de bonté envers moi.
  - type: text
    content: Tes soins constants m'ont permis de subsister.
  '13':
  - type: text
    content: »Mais voici ce que tu cachais dans ton cœur,
  - type: text
    content: 'ce que tu avais décidé en toi-même, je le sais:'
  '14':
  - type: text
    content: que je pèche, tu ne me raterais pas et
  - type: text
    content: tu ne me considérerais pas comme innocent de ma faute.
  '15':
  - type: text
    content: Suis-je coupable, malheur à moi!
  - type: text
    content: Suis-je juste, je n'ose pas lever la tête,
  - type: text
    content: rempli de honte et absorbé par ma misère.
  '16':
  - type: text
    content: Si j'ose néanmoins la redresser, tu me pourchasses comme un jeune lion pourchasse sa proie,
  - type: text
    content: tu fais de nouveau des miracles contre moi.
  '17':
  - type: text
    content: Tu renouvelles tes attaques contre moi,
  - type: text
    content: tu fais bouillonner ta colère contre moi,
  - type: text
    content: des armées se succèdent pour m'assaillir.
  '18':
  - type: text
    content: »Pourquoi m'as-tu fait sortir du ventre de ma mère?
  - type: text
    content: J'aurais expiré et aucun œil ne m'aurait vu.
  '19':
  - type: text
    content: Ce serait comme si je n'avais jamais existé
  - type: text
    content: et je serais passé du ventre de ma mère à la tombe.
  '2':
  - type: text
    content: 'Je dis à Dieu: ‘Ne me condamne pas!'
  - type: text
    content: Fais-moi connaître pourquoi tu me prends à partie!
  '20':
  - type: text
    content: Ma vie est si courte! Laisse-moi,
  - type: text
    content: éloigne-toi de moi pour que je respire un peu
  '21':
  - type: text
    content: avant de m'en aller, pour ne pas en revenir,
  - type: text
    content: dans le pays des ténèbres et de l'ombre de la mort,
  '22':
  - type: text
    content: pays où règnent une obscurité épaisse,
  - type: text
    content: l'ombre de la mort et le chaos,
  - type: text
    content: où la lumière n'est qu'obscurité.’»
  '3':
  - type: text
    content: Prends-tu plaisir à maltraiter,
  - type: text
    content: à repousser le fruit de ton activité
  - type: text
    content: et à faire reposer ta faveur sur les projets des méchants?
  '4':
  - type: text
    content: As-tu des yeux humains,
  - type: text
    content: vois-tu comme voit un homme?
  '5':
  - type: text
    content: Tes jours sont-ils pareils à ceux de l'homme,
  - type: text
    content: et tes années pareilles à ses années,
  '6':
  - type: text
    content: pour que tu recherches ma faute,
  - type: text
    content: pour que tu te renseignes au sujet de mon péché?
  '7':
  - type: text
    content: »Tu sais bien, pourtant, que je ne suis pas coupable
  - type: text
    content: et que personne ne peut me délivrer de ton pouvoir.
  '8':
  - type: text
    content: Tes mains m'ont façonné,
  - type: text
    content: elles m'ont créé, elles m'ont fait tout entier, et tu me détruirais!
  '9':
  - type: text
    content: Souviens-toi donc que tu m'as façonné comme de l'argile.
  - type: text
    content: Voudrais-tu de nouveau me réduire en poussière?
