document_id: JOB.10
type_code: fra
segments:
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: »Je suis dégoûté de la vie! Je laisserai s'exprimer ma plainte,
- type: usfm
  marker: q1
  children:
  - type: text
    text: je parlerai, dans l'amertume de mon âme.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Je dis à Dieu: ‘Ne me condamne pas!'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Fais-moi connaître pourquoi tu me prends à partie!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Prends-tu plaisir à maltraiter,
- type: usfm
  marker: q1
  children:
  - type: text
    text: à repousser le fruit de ton activité
- type: usfm
  marker: q1
  children:
  - type: text
    text: et à faire reposer ta faveur sur les projets des méchants?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: As-tu des yeux humains,
- type: usfm
  marker: q1
  children:
  - type: text
    text: vois-tu comme voit un homme?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Tes jours sont-ils pareils à ceux de l'homme,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et tes années pareilles à ses années,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: pour que tu recherches ma faute,
- type: usfm
  marker: q1
  children:
  - type: text
    text: pour que tu te renseignes au sujet de mon péché?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: »Tu sais bien, pourtant, que je ne suis pas coupable
- type: usfm
  marker: q1
  children:
  - type: text
    text: et que personne ne peut me délivrer de ton pouvoir.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Tes mains m'ont façonné,
- type: usfm
  marker: q1
  children:
  - type: text
    text: elles m'ont créé, elles m'ont fait tout entier, et tu me détruirais!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Souviens-toi donc que tu m'as façonné comme de l'argile.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Voudrais-tu de nouveau me réduire en poussière?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Ne m'as-tu pas coulé comme du lait?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ne m'as-tu pas fait cailler comme du fromage?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Tu m'as couvert de peau et de chair,
- type: usfm
  marker: q1
  children:
  - type: text
    text: tu m'as tissé d'os et de nerfs,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: tu m'as accordé la vie et tu as fait preuve de bonté envers moi.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Tes soins constants m'ont permis de subsister.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: »Mais voici ce que tu cachais dans ton cœur,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'ce que tu avais décidé en toi-même, je le sais:'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: que je pèche, tu ne me raterais pas et
- type: usfm
  marker: q1
  children:
  - type: text
    text: tu ne me considérerais pas comme innocent de ma faute.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Suis-je coupable, malheur à moi!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Suis-je juste, je n'ose pas lever la tête,
- type: usfm
  marker: q1
  children:
  - type: text
    text: rempli de honte et absorbé par ma misère.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Si j'ose néanmoins la redresser, tu me pourchasses comme un jeune lion pourchasse sa proie,
- type: usfm
  marker: q1
  children:
  - type: text
    text: tu fais de nouveau des miracles contre moi.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Tu renouvelles tes attaques contre moi,
- type: usfm
  marker: q1
  children:
  - type: text
    text: tu fais bouillonner ta colère contre moi,
- type: usfm
  marker: q1
  children:
  - type: text
    text: des armées se succèdent pour m'assaillir.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: »Pourquoi m'as-tu fait sortir du ventre de ma mère?
- type: usfm
  marker: q1
  children:
  - type: text
    text: J'aurais expiré et aucun œil ne m'aurait vu.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Ce serait comme si je n'avais jamais existé
- type: usfm
  marker: q1
  children:
  - type: text
    text: et je serais passé du ventre de ma mère à la tombe.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Ma vie est si courte! Laisse-moi,
- type: usfm
  marker: q1
  children:
  - type: text
    text: éloigne-toi de moi pour que je respire un peu
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: avant de m'en aller, pour ne pas en revenir,
- type: usfm
  marker: q1
  children:
  - type: text
    text: dans le pays des ténèbres et de l'ombre de la mort,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: pays où règnent une obscurité épaisse,
- type: usfm
  marker: q1
  children:
  - type: text
    text: l'ombre de la mort et le chaos,
- type: usfm
  marker: q1
  children:
  - type: text
    text: où la lumière n'est qu'obscurité.’»
