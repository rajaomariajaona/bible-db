document_id: 1SA.29,152
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: David exclu de l'armée des Philistins
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Les Philistins rassemblèrent toutes leurs troupes à Aphek, et Israël installa son camp près de la source de Jizreel. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: Par conséquent lève-toi de bon matin, ainsi que les serviteurs de ton maître qui sont venus avec toi. Levez-vous de bon matin et partez dès qu'il fera jour.»
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: David et ses hommes se levèrent de bonne heure pour partir dès le matin et retourner dans le pays des Philistins. Quant aux Philistins, ils montèrent à Jizreel.
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'Les princes des Philistins s''avancèrent avec leurs centaines et leurs milliers, tandis que David et ses hommes marchaient à l''arrière-garde avec Akish. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'Les princes des Philistins dirent: «Que font ici ces Hébreux?» Akish leur répondit: «N''est-ce pas David, le serviteur de Saül, roi d''Israël? Il y a longtemps qu''il est avec moi et je n''ai rien trouvé à lui reprocher depuis son arrivée jusqu''à aujourd''hui.» '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'Mais les princes des Philistins s''irritèrent contre Akish et lui dirent: «Renvoie cet homme! Qu''il retourne là où tu l''as installé et ne descende pas avec nous sur le champ de bataille. Il risquerait d''être un ennemi pour nous pendant le combat. Comment cet homme pourrait-il rentrer en grâce auprès de son maître, si ce n''est en lui apportant la tête de nos hommes? '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'N''est-ce pas en l''honneur de ce David que l''on chantait en dansant: ‘Saül a frappé ses 1000, et David ses 10''000’?»'
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'Akish appela David et lui dit: «L''Eternel est vivant! Tu es un homme droit et j''aime te voir aller et venir avec moi dans le camp, car je n''ai rien trouvé de mal en toi depuis ton arrivée chez moi jusqu''à aujourd''hui. Mais tu ne plais pas aux princes. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'Repars donc, va-t''en en paix, pour ne rien faire qui déplaise aux princes des Philistins.» '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'David dit à Akish: «Mais qu''ai-je fait et qu''as-tu trouvé chez moi, ton serviteur, depuis que je suis avec toi jusqu''à aujourd''hui, pour que je ne puisse pas aller combattre les ennemis de mon seigneur le roi?» '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'Akish répondit à David: «Je le sais bien, car tu me plais autant qu''un ange de Dieu. Mais les princes des Philistins refusent que tu montes avec eux au combat. '
