document_id: NUM.27,152
type_code: fra
verses:
  '1':
  - type: heading
    content: Loi sur les héritages
  - type: text
    content: 'Les filles de Tselophchad – le descendant de Hépher, fils de Galaad, fils de Makir, fils de Manassé, des clans de Manassé, fils de Joseph – s''appelaient Machla, Noa, Hogla, Milca et Thirtsa. Elles s''approchèrent '
  '10':
  - type: text
    content: 'S''il n''a pas de frères, vous le donnerez aux frères de son père. '
  '11':
  - type: text
    content: Si son père n'avait pas de frères, vous le donnerez au plus proche parent dans son clan et c'est lui qui le possédera. Ce sera pour les Israélites une prescription et une règle, comme l'Eternel l'a ordonné à Moïse.»
  - type: heading
    content: Josué désigné comme successeur de Moïse
  '12':
  - type: text
    content: 'L''Eternel dit à Moïse: «Monte sur ce sommet des montagnes d''Abarim et regarde le pays que je donne aux Israélites. '
  '13':
  - type: text
    content: 'Tu pourras le contempler, mais toi aussi tu iras rejoindre les tiens, tout comme ton frère Aaron. '
  '14':
  - type: text
    content: 'En effet, vous vous êtes rebellés contre mon ordre dans le désert de Tsin, lorsque l''assemblée s''est mise à contester, vous n''avez pas respecté ma sainteté devant eux lors de l''épisode du manque d''eau.» Ce sont les eaux de Meriba à Kadès, dans le désert de Tsin. '
  '15':
  - type: text
    content: 'Moïse dit à l''Eternel: '
  '16':
  - type: text
    content: '«Que l''Eternel, le Dieu qui donne le souffle à toute créature, établisse sur l''assemblée un homme '
  '17':
  - type: text
    content: qui sorte et rentre à leur tête, qui les fasse partir en campagne et en revenir, afin que l'assemblée de l'Eternel ne ressemble pas à des *brebis qui n'ont pas de berger
  - type: note
    content: 'Brebis qui n''ont pas de berger: image reprise en 1 Rois 22.17; 2 Chroniques 18.16; Zacharie 10.2; Matthieu 9.36; Marc 6.34.'
  - type: text
    content: .»
  '18':
  - type: text
    content: 'L''Eternel dit à Moïse: «Prends Josué, fils de Nun. C''est un homme en qui réside l''Esprit. Tu poseras ta main sur lui. '
  '19':
  - type: text
    content: 'Tu le feras se tenir devant le prêtre Eléazar et devant toute l''assemblée, et tu lui donneras des ordres sous leurs yeux. '
  '2':
  - type: text
    content: 'et se présentèrent devant Moïse et devant le prêtre Eléazar ainsi que devant les princes et toute l''assemblée à l''entrée de la tente de la rencontre en disant: '
  '20':
  - type: text
    content: 'Tu lui transmettras une partie de ton autorité afin que toute l''assemblée des Israélites l''écoute. '
  '21':
  - type: text
    content: Il se présentera devant le prêtre Eléazar, qui consultera pour lui le jugement de l'urim devant l'Eternel. C'est sur l'ordre d'Eléazar que Josué et tous les Israélites avec lui, toute l'assemblée, partiront en campagne et en reviendront.»
  '22':
  - type: text
    content: 'Moïse fit ce que l''Eternel lui avait ordonné. Il prit Josué et le fit se tenir devant le prêtre Eléazar et devant toute l''assemblée. '
  '23':
  - type: text
    content: Il posa ses mains sur lui et lui donna des ordres conformes à ce que l'Eternel avait déclaré par son intermédiaire.
  '3':
  - type: text
    content: '«Notre père est mort dans le désert. Il ne faisait pas partie de l''assemblée de ceux qui se sont révoltés contre l''Eternel, de la bande des partisans de Koré, mais il est mort pour son propre péché et il n''avait pas de fils. '
  '4':
  - type: text
    content: Pourquoi le nom de notre père disparaîtrait-il de son clan du simple fait qu'il n'a pas eu de fils? Donne-nous une possession parmi les frères de notre père.»
  '5':
  - type: text
    content: 'Moïse porta leur cause devant l''Eternel, '
  '6':
  - type: text
    content: 'et l''Eternel dit à Moïse: '
  '7':
  - type: text
    content: '«Les filles de Tselophchad ont raison. Tu leur donneras en héritage une possession parmi les frères de leur père, c''est à elles que tu feras passer l''héritage de leur père. '
  '8':
  - type: text
    content: 'Tu transmettras ces instructions aux Israélites: Lorsqu''un homme mourra sans laisser de fils, vous ferez passer son héritage à sa fille. '
  '9':
  - type: text
    content: 'S''il n''a pas de fille, vous donnerez son héritage à ses frères. '
