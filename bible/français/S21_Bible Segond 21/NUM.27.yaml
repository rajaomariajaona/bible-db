document_id: NUM.27,152
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Loi sur les héritages
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Les filles de Tselophchad – le descendant de Hépher, fils de Galaad, fils de Makir, fils de Manassé, des clans de Manassé, fils de Joseph – s''appelaient Machla, Noa, Hogla, Milca et Thirtsa. Elles s''approchèrent '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'S''il n''a pas de frères, vous le donnerez aux frères de son père. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: Si son père n'avait pas de frères, vous le donnerez au plus proche parent dans son clan et c'est lui qui le possédera. Ce sera pour les Israélites une prescription et une règle, comme l'Eternel l'a ordonné à Moïse.»
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Josué désigné comme successeur de Moïse
    marker-yv: yv-h
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'L''Eternel dit à Moïse: «Monte sur ce sommet des montagnes d''Abarim et regarde le pays que je donne aux Israélites. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'Tu pourras le contempler, mais toi aussi tu iras rejoindre les tiens, tout comme ton frère Aaron. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'En effet, vous vous êtes rebellés contre mon ordre dans le désert de Tsin, lorsque l''assemblée s''est mise à contester, vous n''avez pas respecté ma sainteté devant eux lors de l''épisode du manque d''eau.» Ce sont les eaux de Meriba à Kadès, dans le désert de Tsin. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'Moïse dit à l''Eternel: '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: '«Que l''Eternel, le Dieu qui donne le souffle à toute créature, établisse sur l''assemblée un homme '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: qui sorte et rentre à leur tête, qui les fasse partir en campagne et en revenir, afin que l'assemblée de l'Eternel ne ressemble pas à des *brebis qui n'ont pas de berger
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '27.17 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Brebis qui n''ont pas de berger: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'image reprise en '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1 Rois 22.17
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 2 Chroniques 18.16
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Zacharie 10.2
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Matthieu 9.36
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Marc 6.34
      - type: usfm
        marker: ft
        children:
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: .»
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'L''Eternel dit à Moïse: «Prends Josué, fils de Nun. C''est un homme en qui réside l''Esprit. Tu poseras ta main sur lui. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'Tu le feras se tenir devant le prêtre Eléazar et devant toute l''assemblée, et tu lui donneras des ordres sous leurs yeux. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'et se présentèrent devant Moïse et devant le prêtre Eléazar ainsi que devant les princes et toute l''assemblée à l''entrée de la tente de la rencontre en disant: '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: 'Tu lui transmettras une partie de ton autorité afin que toute l''assemblée des Israélites l''écoute. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: Il se présentera devant le prêtre Eléazar, qui consultera pour lui le jugement de l'urim devant l'Eternel. C'est sur l'ordre d'Eléazar que Josué et tous les Israélites avec lui, toute l'assemblée, partiront en campagne et en reviendront.»
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: 'Moïse fit ce que l''Eternel lui avait ordonné. Il prit Josué et le fit se tenir devant le prêtre Eléazar et devant toute l''assemblée. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: Il posa ses mains sur lui et lui donna des ordres conformes à ce que l'Eternel avait déclaré par son intermédiaire.
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: '«Notre père est mort dans le désert. Il ne faisait pas partie de l''assemblée de ceux qui se sont révoltés contre l''Eternel, de la bande des partisans de Koré, mais il est mort pour son propre péché et il n''avait pas de fils. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: Pourquoi le nom de notre père disparaîtrait-il de son clan du simple fait qu'il n'a pas eu de fils? Donne-nous une possession parmi les frères de notre père.»
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'Moïse porta leur cause devant l''Eternel, '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'et l''Eternel dit à Moïse: '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: '«Les filles de Tselophchad ont raison. Tu leur donneras en héritage une possession parmi les frères de leur père, c''est à elles que tu feras passer l''héritage de leur père. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'Tu transmettras ces instructions aux Israélites: Lorsqu''un homme mourra sans laisser de fils, vous ferez passer son héritage à sa fille. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'S''il n''a pas de fille, vous donnerez son héritage à ses frères. '
