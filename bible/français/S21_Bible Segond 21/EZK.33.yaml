document_id: EZK.33,152
type_code: fra
verses:
  '1':
  - type: usfm
    marker: ms1
    children:
    - type: text
      text: Perspectives de restauration
    marker-yv: yv-h
  - type: usfm
    marker: mr
    children:
    - type: text
      text: 33.1–48.35
    marker-yv: yv-h
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Le rôle de sentinelle du prophète
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'La parole de l''Eternel m''a été adressée: '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: '»Et toi, fils de l''homme, dis à la communauté d''Israël: ‘Voici comment vous parlez: Nos transgressions et nos péchés pèsent sur nous, c''est à cause d''eux que nous dépérissons. Comment pourrions-nous vivre?’ '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'Dis-leur: ‘Aussi vrai que je suis vivant, déclare le Seigneur, l''Eternel, je ne prends pas plaisir à voir le méchant mourir, mais à le voir changer de conduite et vivre. Renoncez, renoncez à votre mauvaise conduite! Pourquoi devriez-vous mourir, communauté d''Israël?’'
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: '»Et toi, fils de l''homme, dis aux membres de ton peuple: ‘La bonne conduite du juste ne le délivrera pas, si un jour il se met à commettre des transgressions, et le méchant ne trébuchera pas à cause de sa méchanceté, si un jour il y renonce, pas plus que le juste ne pourra vivre grâce à sa justice si un jour il commence à pécher.’ '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'Lorsque j''affirme au juste qu''il vivra, s''il place sa confiance dans sa justice et se met à commettre l''injustice, toute sa justice passée sera oubliée et il mourra à cause de l''injustice qu''il a commise. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'Lorsque je dis au méchant: ‘Tu vas mourir, c''est certain’, s''il renonce à son péché et se met à appliquer le droit et la justice, '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 's''il rend le gage, s''il restitue ce qu''il a extorqué, s''il suit les prescriptions qui donnent la vie en ne commettant plus d''injustice, il vivra, il ne mourra pas. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: Tous les péchés qu'il a commis seront oubliés. Puisqu'il applique le droit et la justice, il vivra, c'est certain.
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: '»Les membres de ton peuple disent: ‘La manière d''agir du Seigneur n''est pas correcte’, mais c''est leur manière d''agir qui n''est pas correcte. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'Si le juste renonce à sa justice et commet l''injustice, il mourra à cause de cela. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'Si le méchant renonce à sa méchanceté et applique le droit et la justice, il vivra grâce à cela. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: '«Fils de l''homme, parle aux enfants de ton peuple! Tu leur diras: ‘Admettons que je fasse venir l''épée sur un pays et que la population du pays prenne l''un des siens pour l''établir comme sentinelle. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: 'Vous avez dit: ‘La manière d''agir du Seigneur n''est pas correcte.’ Je vous jugerai chacun en fonction de sa conduite, communauté d''Israël!»'
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Raisons de la prise de Jérusalem
    marker-yv: yv-h
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: 'La douzième année de notre exil, le cinquième jour du dixième mois, un rescapé de Jérusalem est venu vers moi et m''a dit: «La ville a été prise!» '
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: 'La main de l''Eternel avait reposé sur moi le soir précédant l''arrivée du rescapé et l''Eternel m''avait rendu la parole avant qu''il ne vienne vers moi le matin. Ma bouche s''était ouverte, je n''étais plus muet. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: 'Alors la parole de l''Eternel m''a été adressée:'
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: '«Fils de l''homme, ceux qui habitent les ruines de la terre d''Israël disent: ‘Abraham était tout seul, et il a reçu le pays en héritage. Puisque nous sommes nombreux, c''est à nous que le pays a été donné en propriété.’ '
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: 'C''est pourquoi, annonce-leur: ‘Voici ce que dit le Seigneur, l''Eternel: Vous mangez vos aliments avec le sang, vous levez les yeux vers vos idoles, vous versez le sang, et vous posséderiez le pays? '
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: 'Vous vous appuyez sur votre épée, vos femmes s''adonnent à des pratiques abominables, chacun de vous rend impure la femme de son prochain, et vous posséderiez le pays?’ '
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: 'Tu leur transmettras ce message: ‘Voici ce que dit le Seigneur, l''Eternel: Aussi vrai que je suis vivant, ceux qui se trouvent parmi les ruines tomberont par l''épée; ceux qui se trouvent dans les champs, je les donnerai à manger aux bêtes sauvages, et ceux qui se trouvent dans les endroits escarpés et dans les cavernes mourront par la peste. '
  '28':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: 'Je ferai du pays un sujet de consternation et un endroit dévasté. Ce sera la fin de l''orgueil qu''il tirait de sa force. Les montagnes d''Israël seront dévastées, plus personne n''y passera.’ '
  '29':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: Ils reconnaîtront que je suis l'Eternel, quand je ferai du pays un sujet de consternation et un endroit dévasté à cause de toutes les pratiques abominables auxquelles ils se sont adonnés.
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'Si cet homme voit venir l''épée sur le pays, sonne de la trompette et avertit le peuple, '
  '30':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '30'
    - type: text
      text: '»Quant à toi, fils de l''homme, les membres de ton peuple bavardent à ton sujet près des murs et aux portes des maisons. Ils se parlent entre eux, chacun avec son frère, et disent: ‘Venez donc écouter quelle sera la parole qui viendra de l''Eternel!’ '
  '31':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '31'
    - type: text
      text: 'Puis ils se rendent en nombre auprès de toi et mon peuple s''assied devant toi. Ils écoutent tes paroles, mais ils ne les mettent pas en pratique: ils se montrent pleins d''enthousiasme dans leurs propos, mais leur cœur est attiré par les gains malhonnêtes. '
  '32':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '32'
    - type: text
      text: 'Tu es pour eux comme un chanteur enthousiasmant, doté d''une belle voix et jouant bien de son instrument: ils écoutent tes paroles, mais ils ne les mettent pas en pratique. '
  '33':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '33'
    - type: text
      text: Quand tout cela arrivera – et voici que cela arrive – ils reconnaîtront qu'il y avait un prophète au milieu d'eux.»
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'mais que celui qui entend le son de la trompette ne se laisse pas avertir et se laisse surprendre par l''épée, il sera seul responsable de sa mort. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'Il a entendu le son de la trompette mais ne s''est pas laissé avertir; son sang retombera donc sur lui. Si en revanche il se laisse avertir, il sauvera sa vie. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: Si la sentinelle voit venir l'épée et ne sonne pas de la trompette, si le peuple n'est pas averti et que l'épée vienne prendre la vie à quelqu'un, cette personne mourra à cause de ses fautes, mais je réclamerai son sang à la sentinelle.’
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: '»C''est toi, fils de l''homme, que j''ai donné comme sentinelle à la communauté d''Israël. Tu dois écouter la parole qui sort de ma bouche et les avertir de ma part. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'Quand je dirai au méchant: ‘Toi qui es méchant, tu vas mourir, c''est certain’, si tu ne parles pas pour avertir le méchant afin qu''il renonce à sa conduite, ce méchant mourra à cause de sa faute, mais je te réclamerai son sang. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: Si au contraire tu avertis le méchant afin qu'il renonce à sa conduite, pour qu'il s'en détourne, et qu'il ne change pas de conduite, il mourra à cause de sa faute, mais toi, tu auras délivré ton âme.
