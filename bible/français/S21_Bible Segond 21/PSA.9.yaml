document_id: PSA.9,152
type_code: fra
verses:
  '1':
  - type: heading
    content: Le jugement de Dieu sur les nations
  - type: text
    content: Au chef de chœur, sur la mélodie de «Meurs pour le fils». Psaume de David.
  '10':
  - type: text
    content: L'Eternel est une forteresse pour l'opprimé,
  - type: text
    content: une forteresse dans les moments de détresse.
  '11':
  - type: text
    content: Ceux qui connaissent ton nom se confient en toi,
  - type: text
    content: car tu n'abandonnes pas ceux qui te cherchent, Eternel!
  '12':
  - type: text
    content: Chantez en l'honneur de l'Eternel,
  - type: text
    content: qui siège à Sion, proclamez ses hauts faits parmi les peuples,
  '13':
  - type: text
    content: car il venge le sang versé, il s'en souvient,
  - type: text
    content: il n'oublie pas le cri des malheureux!
  '14':
  - type: text
    content: Fais-moi grâce, Eternel,
  - type: text
    content: vois la misère où me réduisent mes ennemis!
  - type: text
    content: Retire-moi des portes de la mort,
  '15':
  - type: text
    content: afin que je raconte toutes tes louanges
  - type: text
    content: dans les portes de Sion
  - type: text
    content: et que je me réjouisse de ton salut!
  '16':
  - type: text
    content: Les nations tombent dans la fosse qu'elles ont creusée,
  - type: text
    content: leur pied se prend dans le filet qu'elles ont caché.
  '17':
  - type: text
    content: L'Eternel se fait connaître, il fait droit,
  - type: text
    content: 'il prend le méchant à son propre piège. '
  - type: text
    content: – Jeu d'instruments. Pause.
  '18':
  - type: text
    content: Que les méchants rejoignent le séjour des morts
  - type: text
    content: avec toutes les nations qui oublient Dieu,
  '19':
  - type: text
    content: car le pauvre n'est pas oublié définitivement,
  - type: text
    content: l'espérance des malheureux n'est pas perdue pour toujours!
  '2':
  - type: text
    content: Je te louerai, Eternel, de tout mon cœur,
  - type: text
    content: je raconterai toutes tes merveilles.
  '20':
  - type: text
    content: Lève-toi, Eternel, que l'homme ne triomphe pas,
  - type: text
    content: que les nations soient jugées devant toi!
  '21':
  - type: text
    content: Frappe-les d'épouvante, Eternel,
  - type: text
    content: 'que les peuples sachent qu''ils ne sont que des hommes! '
  - type: text
    content: – Pause.
  '3':
  - type: text
    content: Je ferai de toi le sujet de ma joie et de mon allégresse,
  - type: text
    content: je chanterai ton nom, Dieu très-haut.
  '4':
  - type: text
    content: Mes ennemis reculent, ils trébuchent,
  - type: text
    content: ils disparaissent devant toi,
  '5':
  - type: text
    content: car tu soutiens mon droit et ma cause,
  - type: text
    content: tu sièges sur ton trône en juste juge.
  '6':
  - type: text
    content: Tu réprimandes les nations, tu détruis le méchant,
  - type: text
    content: tu effaces leur nom pour toujours et à perpétuité.
  '7':
  - type: text
    content: Plus d'ennemis! Des ruines éternelles!
  - type: text
    content: Tu as détruit des villes, et leur souvenir est perdu.
  '8':
  - type: text
    content: L'Eternel règne pour toujours,
  - type: text
    content: il a dressé son trône pour le jugement.
  '9':
  - type: text
    content: Il juge le monde avec justice,
  - type: text
    content: il juge les peuples avec droiture.
