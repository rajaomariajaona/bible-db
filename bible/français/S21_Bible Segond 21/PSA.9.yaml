document_id: PSA.9
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Le jugement de Dieu sur les nations
  marker-yv: yv-h
- type: usfm
  marker: d
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Au chef de chœur, sur la mélodie de «Meurs pour le fils». Psaume de David.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Je te louerai, Eternel, de tout mon cœur,
- type: usfm
  marker: q1
  children:
  - type: text
    text: je raconterai toutes tes merveilles.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Je ferai de toi le sujet de ma joie et de mon allégresse,
- type: usfm
  marker: q1
  children:
  - type: text
    text: je chanterai ton nom, Dieu très-haut.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Mes ennemis reculent, ils trébuchent,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ils disparaissent devant toi,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: car tu soutiens mon droit et ma cause,
- type: usfm
  marker: q1
  children:
  - type: text
    text: tu sièges sur ton trône en juste juge.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Tu réprimandes les nations, tu détruis le méchant,
- type: usfm
  marker: q1
  children:
  - type: text
    text: tu effaces leur nom pour toujours et à perpétuité.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Plus d'ennemis! Des ruines éternelles!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Tu as détruit des villes, et leur souvenir est perdu.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: L'Eternel règne pour toujours,
- type: usfm
  marker: q1
  children:
  - type: text
    text: il a dressé son trône pour le jugement.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Il juge le monde avec justice,
- type: usfm
  marker: q1
  children:
  - type: text
    text: il juge les peuples avec droiture.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: L'Eternel est une forteresse pour l'opprimé,
- type: usfm
  marker: q1
  children:
  - type: text
    text: une forteresse dans les moments de détresse.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Ceux qui connaissent ton nom se confient en toi,
- type: usfm
  marker: q1
  children:
  - type: text
    text: car tu n'abandonnes pas ceux qui te cherchent, Eternel!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Chantez en l'honneur de l'Eternel,
- type: usfm
  marker: q1
  children:
  - type: text
    text: qui siège à Sion, proclamez ses hauts faits parmi les peuples,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: car il venge le sang versé, il s'en souvient,
- type: usfm
  marker: q1
  children:
  - type: text
    text: il n'oublie pas le cri des malheureux!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Fais-moi grâce, Eternel,
- type: usfm
  marker: q1
  children:
  - type: text
    text: vois la misère où me réduisent mes ennemis!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Retire-moi des portes de la mort,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: afin que je raconte toutes tes louanges
- type: usfm
  marker: q1
  children:
  - type: text
    text: dans les portes de Sion
- type: usfm
  marker: q1
  children:
  - type: text
    text: et que je me réjouisse de ton salut!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Les nations tombent dans la fosse qu'elles ont creusée,
- type: usfm
  marker: q1
  children:
  - type: text
    text: leur pied se prend dans le filet qu'elles ont caché.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: L'Eternel se fait connaître, il fait droit,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'il prend le méchant à son propre piège. '
  - type: usfm
    marker: qs
    children:
    - type: text
      text: – Jeu d'instruments. Pause.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Que les méchants rejoignent le séjour des morts
- type: usfm
  marker: q1
  children:
  - type: text
    text: avec toutes les nations qui oublient Dieu,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: car le pauvre n'est pas oublié définitivement,
- type: usfm
  marker: q1
  children:
  - type: text
    text: l'espérance des malheureux n'est pas perdue pour toujours!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Lève-toi, Eternel, que l'homme ne triomphe pas,
- type: usfm
  marker: q1
  children:
  - type: text
    text: que les nations soient jugées devant toi!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Frappe-les d'épouvante, Eternel,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'que les peuples sachent qu''ils ne sont que des hommes! '
  - type: usfm
    marker: qs
    children:
    - type: text
      text: – Pause.
