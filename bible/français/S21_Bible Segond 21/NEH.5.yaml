document_id: NEH.5
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Attitude désintéressée de Néhémie
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Les gens du peuple et leurs femmes avaient à se plaindre gravement de leurs frères juifs. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Les uns disaient: «Avec nos fils et nos filles, nous sommes nombreux; nous voulons recevoir du blé afin de pouvoir manger et rester en vie.» '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'D''autres disaient: «Nous devons donner nos champs, nos vignes et nos maisons comme gages pour recevoir du blé pendant la famine.» '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'D''autres encore disaient: «Nous avons dû emprunter de l''argent en hypothéquant nos champs et nos vignes pour payer le tribut du roi. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: En réalité, notre chair est pareille à celle de nos frères, nos enfants sont pareils aux leurs, et pourtant, nous devons vendre nos fils et nos filles comme esclaves – plusieurs de nos filles le sont déjà – et nous sommes sans ressources puisque nos champs et nos vignes sont devenus la propriété d'autrui.»
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'J''ai été très irrité en prenant connaissance de leurs plaintes et de ces faits, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'et j''ai pris la ferme décision d''adresser des reproches aux nobles et aux magistrats. Je leur ai dit: «Vous prêtez à intérêt à vos frères!» J''ai convoqué une grande assemblée pour traiter leur situation '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'et je leur ai dit: «Nous avons nous-mêmes racheté, en fonction de nos possibilités, nos frères juifs vendus aux nations, mais vous, vous vendez vos frères et vous osez nous les vendre à nous!» Ils ont gardé le silence, ne trouvant rien à répondre. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'J''ai ajouté: «Ce que vous faites n''est pas bien. Ne devriez-vous pas marcher dans la crainte de notre Dieu, ne serait-ce que pour éviter les insultes des nations qui nous sont hostiles? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Moi-même, avec mes frères et mes serviteurs, nous leur prêtons de l''argent et du blé. Renonçons donc à ce qu''ils nous doivent! '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Rendez-leur aujourd''hui leurs champs, leurs vignes, leurs oliviers et leurs maisons ainsi que l''intérêt que vous avez exigé d''eux, le centième de l''argent, du blé, du vin nouveau et de l''huile!» '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Ils ont répondu: «Nous allons les rendre et nous n''allons rien exiger d''eux. Nous allons faire ce que tu dis.» Après avoir appelé les prêtres, je leur ai fait jurer de tenir parole; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'j''ai même secoué la poche de mon manteau en disant: «Que Dieu secoue de la même manière, pour l''arracher à sa maison et à ses biens, tout homme qui n''aura pas agi de façon à respecter cet engagement! Qu''un tel homme soit ainsi secoué et se retrouve les mains vides!» Toute l''assemblée a dit: «Amen!» et a célébré l''Eternel. Et le peuple a tenu parole.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'De plus, dès le jour où le roi m''a désigné pour que je sois leur gouverneur dans le pays de Juda, soit depuis la vingtième année du règne d''Artaxerxès et jusqu''à la trente-deuxième année, pendant ces 12 ans, ni moi ni ma parenté n''avons vécu des revenus octroyés au gouverneur. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Mes prédécesseurs faisaient peser de lourdes charges sur le peuple; ils exigeaient de lui du pain et du vin, ainsi que 40 pièces d''argent; leurs serviteurs, eux aussi, exerçaient une domination sur le peuple. Pour ma part, je n''ai pas agi de cette manière, et ce par crainte de Dieu. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'J''ai même travaillé à la réparation de cette muraille et je n''ai acheté aucun champ. De plus, mes serviteurs étaient tous ensemble occupés à ce travail. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'J''admettais à ma table 150 Juifs et magistrats, sans compter ceux qui venaient chez nous des nations environnantes. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Chaque jour, on m'apprêtait un bœuf, six moutons de choix et de la volaille, et ce à mes frais, et tous les dix jours on préparait en abondance toutes sortes de vins. Malgré cela, je n'ai pas réclamé les revenus octroyés au gouverneur, car de lourdes charges pesaient déjà sur ce peuple.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Mon Dieu, souviens-toi pour mon bien de tout ce que j'ai fait pour ce peuple!
