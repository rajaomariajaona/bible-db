document_id: PSA.135,152
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Le Dieu véritable et les idoles
    marker-yv: yv-h
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Louez l'Eternel! Louez le nom de l'Eternel,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: louez-le, serviteurs de l'Eternel,
  '10':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Il a frappé des nations nombreuses
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'et tué des rois puissants:'
  '11':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Sihon, le roi des Amoréens,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Og, le roi du Basan,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et tous les rois de Canaan.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Puis il a donné leur pays en héritage,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: en héritage à Israël, son peuple.
  '13':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Eternel, ton nom subsiste éternellement.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Eternel, ton souvenir dure de génération en génération.
  '14':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Oui, *l'Eternel jugera son peuple,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et il aura pitié de ses serviteurs
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '135.14 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'L''Eternel… serviteurs: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'paroles du cantique de Moïse en '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Deutéronome 32.36
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '; première partie du verset citée en '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Hébreux 10.30
      - type: usfm
        marker: ft
        children:
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: .
  '15':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Les idoles des nations, ce n'est que de l'argent et de l'or;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: elles sont faites par la main des hommes.
  '16':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Elles ont une bouche mais ne parlent pas,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: elles ont des yeux mais ne voient pas,
  '17':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: elles ont des oreilles mais n'entendent pas,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: elles n'ont pas de souffle dans leur bouche.
  '18':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ils leur ressemblent, ceux qui les fabriquent,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: tous ceux qui se confient en elles.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '135.15-18 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Les idoles… en elles: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'texte presque identique au '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Psaume 115.4-8
      - type: usfm
        marker: ft
        children:
        - type: text
          text: .
      marker-yv: yv-n
  '19':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Communauté d'Israël, bénissez l'Eternel!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Famille d'Aaron, bénissez l'Eternel!
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: qui vous tenez dans la maison de l'Eternel,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dans les parvis de la maison de notre Dieu!
  '20':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Famille de Lévi, bénissez l'Eternel!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Vous qui craignez l'Eternel, bénissez l'Eternel!
  '21':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: De Sion, que l'on bénisse l'Eternel
  - type: usfm
    marker: q1
    children:
    - type: text
      text: qui habite Jérusalem!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Louez l'Eternel!
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Louez l'Eternel, car il est bon,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: chantez en l'honneur de son nom, car il est beau!
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: L'Eternel s'est choisi Jacob,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Israël, pour qu'il lui appartienne.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Oui, je sais que l'Eternel est grand,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: que notre Seigneur surpasse tous les dieux.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tout ce que l'Eternel veut, il le fait,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dans le ciel et sur la terre,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dans les mers et dans tous les abîmes.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Il fait monter les nuages des extrémités de la terre,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: il produit les éclairs et la pluie,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: il tire le vent de ses trésors.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Il a frappé les premiers-nés de l'Egypte,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: depuis les hommes jusqu'aux animaux.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Il a réalisé des signes et des miracles au milieu de toi, Egypte,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: contre le pharaon et contre tous ses serviteurs.
