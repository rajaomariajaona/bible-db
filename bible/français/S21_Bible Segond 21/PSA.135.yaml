document_id: PSA.135,152
type_code: fra
verses:
  '1':
  - type: heading
    content: Le Dieu véritable et les idoles
  - type: text
    content: Louez l'Eternel! Louez le nom de l'Eternel,
  - type: text
    content: louez-le, serviteurs de l'Eternel,
  '10':
  - type: text
    content: Il a frappé des nations nombreuses
  - type: text
    content: 'et tué des rois puissants:'
  '11':
  - type: text
    content: Sihon, le roi des Amoréens,
  - type: text
    content: Og, le roi du Basan,
  - type: text
    content: et tous les rois de Canaan.
  '12':
  - type: text
    content: Puis il a donné leur pays en héritage,
  - type: text
    content: en héritage à Israël, son peuple.
  '13':
  - type: text
    content: Eternel, ton nom subsiste éternellement.
  - type: text
    content: Eternel, ton souvenir dure de génération en génération.
  '14':
  - type: text
    content: Oui, *l'Eternel jugera son peuple,
  - type: text
    content: et il aura pitié de ses serviteurs
  - type: note
    content: 'L''Eternel… serviteurs: paroles du cantique de Moïse en Deutéronome 32.36; première partie du verset citée en Hébreux 10.30.'
  - type: text
    content: .
  '15':
  - type: text
    content: Les idoles des nations, ce n'est que de l'argent et de l'or;
  - type: text
    content: elles sont faites par la main des hommes.
  '16':
  - type: text
    content: Elles ont une bouche mais ne parlent pas,
  - type: text
    content: elles ont des yeux mais ne voient pas,
  '17':
  - type: text
    content: elles ont des oreilles mais n'entendent pas,
  - type: text
    content: elles n'ont pas de souffle dans leur bouche.
  '18':
  - type: text
    content: Ils leur ressemblent, ceux qui les fabriquent,
  - type: text
    content: tous ceux qui se confient en elles.
  - type: note
    content: 'Les idoles… en elles: texte presque identique au Psaume 115.4-8.'
  '19':
  - type: text
    content: Communauté d'Israël, bénissez l'Eternel!
  - type: text
    content: Famille d'Aaron, bénissez l'Eternel!
  '2':
  - type: text
    content: qui vous tenez dans la maison de l'Eternel,
  - type: text
    content: dans les parvis de la maison de notre Dieu!
  '20':
  - type: text
    content: Famille de Lévi, bénissez l'Eternel!
  - type: text
    content: Vous qui craignez l'Eternel, bénissez l'Eternel!
  '21':
  - type: text
    content: De Sion, que l'on bénisse l'Eternel
  - type: text
    content: qui habite Jérusalem!
  - type: text
    content: Louez l'Eternel!
  '3':
  - type: text
    content: Louez l'Eternel, car il est bon,
  - type: text
    content: chantez en l'honneur de son nom, car il est beau!
  '4':
  - type: text
    content: L'Eternel s'est choisi Jacob,
  - type: text
    content: Israël, pour qu'il lui appartienne.
  '5':
  - type: text
    content: Oui, je sais que l'Eternel est grand,
  - type: text
    content: que notre Seigneur surpasse tous les dieux.
  '6':
  - type: text
    content: Tout ce que l'Eternel veut, il le fait,
  - type: text
    content: dans le ciel et sur la terre,
  - type: text
    content: dans les mers et dans tous les abîmes.
  '7':
  - type: text
    content: Il fait monter les nuages des extrémités de la terre,
  - type: text
    content: il produit les éclairs et la pluie,
  - type: text
    content: il tire le vent de ses trésors.
  '8':
  - type: text
    content: Il a frappé les premiers-nés de l'Egypte,
  - type: text
    content: depuis les hommes jusqu'aux animaux.
  '9':
  - type: text
    content: Il a réalisé des signes et des miracles au milieu de toi, Egypte,
  - type: text
    content: contre le pharaon et contre tous ses serviteurs.
