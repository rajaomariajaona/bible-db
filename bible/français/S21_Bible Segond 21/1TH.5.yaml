document_id: 1TH.5,152
type_code: fra
verses:
  '1':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'En ce qui concerne les temps et les moments, vous n''avez pas besoin, frères et sœurs, qu''on vous écrive à ce sujet. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'qui est mort pour nous afin que, soit que nous veillions, soit que nous dormions, nous vivions ensemble avec lui. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: C'est pourquoi encouragez-vous les uns les autres et édifiez-vous mutuellement, comme vous le faites déjà.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Dernières recommandations
    marker-yv: yv-h
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'Nous vous demandons, frères et sœurs, de reconnaître ceux qui travaillent parmi vous, qui vous dirigent dans le Seigneur et qui vous avertissent. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: Ayez beaucoup d'estime et d'amour pour eux à cause de leur travail. Soyez en paix entre vous.
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'Nous vous y invitons, frères et sœurs: avertissez ceux qui vivent dans le désordre, réconfortez ceux qui sont abattus, soutenez les faibles, faites preuve de patience envers tous. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'Veillez à ce que personne ne rende à autrui le mal pour le mal, mais recherchez toujours le bien, soit entre vous, soit envers tous les hommes. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'Soyez toujours joyeux. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'Priez sans cesse, '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'exprimez votre reconnaissance en toute circonstance, car c''est la volonté de Dieu pour vous en Jésus-Christ. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'N''éteignez pas l''Esprit, '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'En effet, vous savez bien vous-mêmes que le jour du Seigneur viendra comme un voleur dans la nuit. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: 'ne méprisez pas les prophéties, '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: 'mais examinez tout et retenez ce qui est bon. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: Abstenez-vous de toute forme de mal.
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: 'Que le Dieu de la paix vous conduise lui-même à une sainteté totale et que tout votre être, l''esprit, l''âme et le corps, soit conservé irréprochable lors du retour de notre Seigneur Jésus-Christ! '
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: Celui qui vous appelle est fidèle, c'est aussi lui qui le fera.
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: 'Frères et sœurs, priez pour nous. '
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: 'Saluez tous les frères et sœurs par un saint baiser. '
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: 'Je vous en supplie par le Seigneur: que cette lettre soit lue à tous les frères et sœurs!'
  '28':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: Que la grâce de notre Seigneur Jésus-Christ soit avec vous!
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'Quand les hommes diront: «Paix et sécurité!» alors une ruine soudaine fondra sur eux, comme les douleurs sur la femme enceinte; ils n''y échapperont pas.'
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'Mais vous, frères et sœurs, vous n''êtes pas dans les ténèbres pour que ce jour vous surprenne comme un voleur. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'Vous êtes tous des enfants de la lumière et des enfants du jour. Nous ne sommes pas de la nuit ni des ténèbres. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'Ne dormons donc pas comme les autres, mais veillons et soyons sobres. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'En effet, ceux qui dorment dorment la nuit, et ceux qui s''enivrent s''enivrent la nuit. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'Mais nous qui sommes du jour, soyons sobres, enfilons la cuirasse de la foi et de l''amour et ayons pour casque l''espérance du salut. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'En effet, Dieu ne nous a pas destinés à la colère, mais à la possession du salut par notre Seigneur Jésus-Christ, '
