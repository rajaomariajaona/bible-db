document_id: 2CH.15
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Zèle d'Asa contre l'idolâtrie
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'L''Esprit de Dieu reposa sur Azaria, fils d''Oded, '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'et celui-ci alla à la rencontre d''Asa et lui dit: «Ecoutez-moi, Asa ainsi que tout Juda et Benjamin! L''Eternel est avec vous quand vous êtes avec lui; si vous le cherchez, vous le trouverez; mais si vous l''abandonnez, il vous abandonnera. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Pendant longtemps il n''y a eu pour Israël ni vrai Dieu, ni prêtre qui enseigne, ni loi. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Mais dans leur détresse ils sont retournés à l''Eternel, le Dieu d''Israël. Ils l''ont cherché et ils l''ont trouvé. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Dans ces moments-là, il n''y avait aucune sécurité pour ceux qui allaient et venaient, car de grands troubles accablaient tous les habitants du pays. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'On se battait peuple contre peuple, ville contre ville, parce que Dieu les agitait par toutes sortes d''angoisses. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Quant à vous, soyez forts et ne baissez pas les bras, car il y aura un salaire pour vos actes.»
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Après avoir entendu ces paroles et cette prophétie – Oded était aussi prophète – Asa se fortifia et fit disparaître les monstruosités de tout le pays de Juda et de Benjamin, ainsi que des villes qu''il avait prises dans la région montagneuse d''Ephraïm, et il restaura l''autel de l''Eternel qui se trouvait devant le portique de l''Eternel. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Il rassembla tout Juda et Benjamin avec les membres des tribus d''Ephraïm, de Manassé et de Siméon qui habitaient parmi eux. En effet, un grand nombre d''Israélites s''étaient ralliés à lui lorsqu''ils avaient vu que l''Eternel, son Dieu, était avec lui. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Ils se rassemblèrent à Jérusalem le troisième mois de la quinzième année du règne d''Asa. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Ce jour-là, ils sacrifièrent à l''Eternel des animaux pris sur le butin qu''ils avaient ramené: 700 bœufs et 7000 brebis. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Ils prirent l''engagement de chercher l''Eternel, le Dieu de leurs ancêtres, de tout leur cœur et de toute leur âme. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Si quelqu''un ne cherchait pas l''Eternel, le Dieu d''Israël, il devait être mis à mort, quel qu''il soit, petit ou grand, homme ou femme. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Ils prêtèrent serment envers l''Eternel à voix haute, avec des cris de joie et au son des trompettes et des cors. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Tous les Judéens se réjouirent de ce serment, car ils avaient juré de tout leur cœur; ils avaient cherché l'Eternel de leur plein gré et ils l'avaient trouvé. Et l'Eternel leur donna du repos de tous côtés.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Le roi Asa retira même le titre de reine mère à Maaca, sa grand-mère, parce qu''elle avait fait une idole en l''honneur d''Astarté. Asa abattit son idole, la réduisit en poussière et la brûla au bord du torrent du Cédron. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Cependant, les hauts lieux ne disparurent pas d''Israël, même si Asa s''attacha sans réserve à Dieu pendant toute sa vie. '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Il déposa dans la maison de Dieu les offrandes consacrées par son père et par lui-même: de l''argent, de l''or et divers objets.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Il n'y eut aucune guerre jusqu'à la trente-cinquième année du règne d'Asa.
