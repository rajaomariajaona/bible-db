document_id: EZR.3
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Rétablissement de l'autel des sacrifices
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: A l'aube du septième mois, les Israélites étaient installés dans leurs villes, et le peuple se rassembla comme un seul homme à Jérusalem.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Josué, fils de Jotsadak, accompagné de ses frères les prêtres, et Zorobabel, fils de Shealthiel, accompagné de ses frères, se levèrent et reconstruisirent l''autel du Dieu d''Israël pour y offrir des holocaustes, conformément à ce qui est écrit dans la loi de Moïse, l''homme de Dieu. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Ils rétablirent l''autel sur ses fondations, malgré la peur que leur inspiraient les populations installées dans la région, et ils y offrirent des holocaustes à l''Eternel, les holocaustes du matin et du soir. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Ils célébrèrent la fête des tentes conformément à ce qui est écrit et ils offrirent jour après jour des holocaustes, suivant le nombre fixé pour chaque jour. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Après cela, ils offrirent l''holocauste perpétuel, les holocaustes des débuts de mois et de toutes les fêtes consacrées à l''Eternel, ainsi que ceux de toute personne qui faisait des offrandes volontaires à l''Eternel. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Dès le premier jour du septième mois, ils commencèrent à offrir des holocaustes à l''Eternel, alors même que les fondations du temple de l''Eternel n''étaient pas encore posées. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: On donna de l'argent aux tailleurs de pierres et aux charpentiers, ainsi que de la nourriture, des boissons et de l'huile aux Sidoniens et aux Tyriens, pour qu'ils amènent du cèdre du Liban par mer jusqu'à Jaffa. On agit de cette manière suivant l'autorisation reçue de Cyrus, roi de Perse.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Pose des fondations du temple
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Le deuxième mois de la deuxième année après leur arrivée à la maison de Dieu à Jérusalem, Zorobabel, fils de Shealthiel, Josué, fils de Jotsadak, ainsi que le reste de leurs frères, les prêtres, les Lévites et tous ceux qui étaient revenus de déportation à Jérusalem, se mirent à l''œuvre. On chargea les Lévites âgés de 20 ans et plus de surveiller les travaux de la maison de l''Eternel. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Josué, accompagné de ses fils et de ses frères, Kadmiel, accompagné de ses fils et des Judéens, s'occupèrent tous ensemble de surveiller ceux qui travaillaient à la maison de Dieu. Il y avait aussi les fils de Hénadad avec leurs fils et leurs frères, les Lévites.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Lorsque les maçons posèrent les fondations du temple de l''Eternel, on disposa les prêtres en costume avec les trompettes et les Lévites descendants d''Asaph avec les cymbales, afin qu''ils célèbrent l''Eternel d''après les directives de David, roi d''Israël. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Ils se répondaient, en louant et célébrant l''Eternel: «Il est bon! Oui, sa bonté dure éternellement pour Israël», et tout le peuple poussait de grands cris de joie en louant l''Eternel parce qu''on posait les fondations de la maison de l''Eternel. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Cependant beaucoup, parmi les prêtres, les Lévites et les chefs de famille âgés qui avaient vu le premier temple, pleuraient tout haut pendant qu''on posait sous leurs yeux les fondations de celui-ci. Comme beaucoup d''autres faisaient éclater leur joie par des cris, '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: on ne pouvait distinguer le bruit des cris de joie de celui des pleurs du peuple. En effet, il poussait de grands cris qu'on entendait au loin.
