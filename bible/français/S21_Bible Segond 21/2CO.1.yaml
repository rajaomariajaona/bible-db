document_id: 2CO.1
type_code: fra
segments:
- type: usfm
  marker: ms1
  children:
  - type: text
    text: Paul et les Corinthiens
  marker-yv: yv-h
- type: usfm
  marker: mr
  children:
  - type: text
    text: 1.1–7.16
  marker-yv: yv-h
- type: usfm
  marker: s1
  children:
  - type: text
    text: Salutation et louange
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: De la part de Paul, apôtre de Jésus-Christ par la volonté de Dieu, et du frère Timothée à l'Eglise de Dieu qui est à Corinthe et à tous les saints
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1.1 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Saints: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: manière de désigner les chrétiens en tant que personnes consacrées à Dieu et appelées à avoir le comportement qui découle de leur appartenance à ce Dieu.
    marker-yv: yv-n
  - type: text
    text: ' qui sont dans toute l''Achaïe: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: que la grâce et la paix vous soient données de la part de Dieu notre Père et du Seigneur Jésus-Christ!
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Béni soit Dieu, le Père de notre Seigneur Jésus-Christ, le Père plein de compassion et le Dieu de tout réconfort! '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Il nous réconforte dans toutes nos détresses afin que nous puissions réconforter ceux qui se trouvent dans la détresse, grâce à l''encouragement que nous recevons nous-mêmes de la part de Dieu. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'En effet, de même que les souffrances de Christ abondent pour nous, de même aussi, c''est par Christ que notre réconfort abonde. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Si nous sommes dans la détresse, c''est pour votre réconfort et pour votre salut; si nous sommes encouragés, c''est pour votre encouragement, pour vous permettre de supporter les mêmes souffrances que celles que nous endurons. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Et notre espérance à votre sujet est ferme, parce que nous savons que si vous avez part aux souffrances, vous avez part aussi au réconfort.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'En ce qui concerne la détresse que nous avons connue en Asie, nous ne voulons en effet pas vous laisser ignorer, frères et sœurs, que nous avons été accablés à l''extrême, au-delà de nos forces, au point que nous désespérions même de rester en vie. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Nous avions intérieurement accepté notre arrêt de mort afin de ne pas placer notre confiance en nous-mêmes mais en Dieu qui ressuscite les morts. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'C''est lui qui nous a délivrés d''une telle mort et qui nous en délivre encore. Oui, nous avons en lui cette espérance qu''il nous en délivrera encore, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: et vous y contribuerez vous-mêmes par la prière. Ainsi, la grâce obtenue pour nous par beaucoup de personnes sera pour beaucoup une occasion de remercier Dieu à notre sujet.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Motivations et projets de Paul
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'En effet, voici notre sujet de fierté et le témoignage de notre conscience: nous nous sommes conduits dans le monde, et plus particulièrement vis-à-vis de vous, avec la sincérité et la pureté qui viennent de Dieu, non pas avec une sagesse humaine, mais avec la grâce de Dieu. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Nous ne vous écrivons rien d''autre que ce que vous lisez et comprenez. Et j''espère que vous comprendrez complètement, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: puisque vous l'avez déjà compris en partie, que nous sommes votre sujet de fierté, de même que vous serez aussi le nôtre, le jour du Seigneur Jésus.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'C''est avec cette assurance que je voulais d''abord aller chez vous, afin que vous puissiez avoir une double grâce. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Je voulais passer chez vous en me rendant en Macédoine, puis revenir de la Macédoine chez vous, avec l''espoir d''être soutenu par vous pour mon voyage en Judée. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'En formant ce projet, ai-je donc fait preuve de légèreté? Ou bien mes décisions sont-elles purement humaines, de sorte qu''il y aurait en moi à la fois le «oui» et le «non»? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Aussi vrai que Dieu est fidèle, la parole que nous vous avons adressée n''a pas été «oui» et «non». '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'En effet, le Fils de Dieu, Jésus-Christ, que nous avons prêché au milieu de vous, Silvain, Timothée et moi, n''a pas été «oui» et «non». Au contraire, en lui il n''y a que le «oui». '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'En effet, pour toutes les promesses de Dieu, c''est en lui que se trouve le «oui», et c''est [donc] aussi par lui que nous disons «amen» à Dieu, pour sa gloire. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Or, celui qui nous affermit avec vous en Christ et qui nous a consacrés par son onction, c''est Dieu; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: il nous a aussi marqués de son empreinte
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1.22 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Son empreinte: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: l'empreinte d'un sceau (bague ou objet cylindrique), apposée sur un document, servait à le protéger, à l'authentifier ou à signaler son propriétaire.
    marker-yv: yv-n
  - type: text
    text: ' et a mis l''Esprit comme un gage dans notre cœur.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Quant à moi, j''en prends Dieu à témoin sur ma vie, c''est pour vous ménager que je ne suis pas revenu à Corinthe. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: Ce n'est pas que nous voulions dominer sur votre foi, mais plutôt que nous contribuons à votre joie, car vous êtes fermes dans la foi.
