document_id: 2CO.1,152
type_code: fra
verses:
  '1':
  - type: heading
    content: Paul et les Corinthiens
  - type: heading
    content: 1.1–7.16
  - type: heading
    content: Salutation et louange
  - type: text
    content: De la part de Paul, apôtre de Jésus-Christ par la volonté de Dieu, et du frère Timothée à l'Eglise de Dieu qui est à Corinthe et à tous les saints
  - type: note
    content: 'Saints: manière de désigner les chrétiens en tant que personnes consacrées à Dieu et appelées à avoir le comportement qui découle de leur appartenance à ce Dieu.'
  - type: text
    content: ' qui sont dans toute l''Achaïe: '
  '10':
  - type: text
    content: 'C''est lui qui nous a délivrés d''une telle mort et qui nous en délivre encore. Oui, nous avons en lui cette espérance qu''il nous en délivrera encore, '
  '11':
  - type: text
    content: et vous y contribuerez vous-mêmes par la prière. Ainsi, la grâce obtenue pour nous par beaucoup de personnes sera pour beaucoup une occasion de remercier Dieu à notre sujet.
  - type: heading
    content: Motivations et projets de Paul
  '12':
  - type: text
    content: 'En effet, voici notre sujet de fierté et le témoignage de notre conscience: nous nous sommes conduits dans le monde, et plus particulièrement vis-à-vis de vous, avec la sincérité et la pureté qui viennent de Dieu, non pas avec une sagesse humaine, mais avec la grâce de Dieu. '
  '13':
  - type: text
    content: 'Nous ne vous écrivons rien d''autre que ce que vous lisez et comprenez. Et j''espère que vous comprendrez complètement, '
  '14':
  - type: text
    content: puisque vous l'avez déjà compris en partie, que nous sommes votre sujet de fierté, de même que vous serez aussi le nôtre, le jour du Seigneur Jésus.
  '15':
  - type: text
    content: 'C''est avec cette assurance que je voulais d''abord aller chez vous, afin que vous puissiez avoir une double grâce. '
  '16':
  - type: text
    content: 'Je voulais passer chez vous en me rendant en Macédoine, puis revenir de la Macédoine chez vous, avec l''espoir d''être soutenu par vous pour mon voyage en Judée. '
  '17':
  - type: text
    content: 'En formant ce projet, ai-je donc fait preuve de légèreté? Ou bien mes décisions sont-elles purement humaines, de sorte qu''il y aurait en moi à la fois le «oui» et le «non»? '
  '18':
  - type: text
    content: 'Aussi vrai que Dieu est fidèle, la parole que nous vous avons adressée n''a pas été «oui» et «non». '
  '19':
  - type: text
    content: 'En effet, le Fils de Dieu, Jésus-Christ, que nous avons prêché au milieu de vous, Silvain, Timothée et moi, n''a pas été «oui» et «non». Au contraire, en lui il n''y a que le «oui». '
  '2':
  - type: text
    content: que la grâce et la paix vous soient données de la part de Dieu notre Père et du Seigneur Jésus-Christ!
  '20':
  - type: text
    content: 'En effet, pour toutes les promesses de Dieu, c''est en lui que se trouve le «oui», et c''est [donc] aussi par lui que nous disons «amen» à Dieu, pour sa gloire. '
  '21':
  - type: text
    content: 'Or, celui qui nous affermit avec vous en Christ et qui nous a consacrés par son onction, c''est Dieu; '
  '22':
  - type: text
    content: il nous a aussi marqués de son empreinte
  - type: note
    content: 'Son empreinte: l''empreinte d''un sceau (bague ou objet cylindrique), apposée sur un document, servait à le protéger, à l''authentifier ou à signaler son propriétaire.'
  - type: text
    content: ' et a mis l''Esprit comme un gage dans notre cœur.'
  '23':
  - type: text
    content: 'Quant à moi, j''en prends Dieu à témoin sur ma vie, c''est pour vous ménager que je ne suis pas revenu à Corinthe. '
  '24':
  - type: text
    content: Ce n'est pas que nous voulions dominer sur votre foi, mais plutôt que nous contribuons à votre joie, car vous êtes fermes dans la foi.
  '3':
  - type: text
    content: 'Béni soit Dieu, le Père de notre Seigneur Jésus-Christ, le Père plein de compassion et le Dieu de tout réconfort! '
  '4':
  - type: text
    content: 'Il nous réconforte dans toutes nos détresses afin que nous puissions réconforter ceux qui se trouvent dans la détresse, grâce à l''encouragement que nous recevons nous-mêmes de la part de Dieu. '
  '5':
  - type: text
    content: 'En effet, de même que les souffrances de Christ abondent pour nous, de même aussi, c''est par Christ que notre réconfort abonde. '
  '6':
  - type: text
    content: 'Si nous sommes dans la détresse, c''est pour votre réconfort et pour votre salut; si nous sommes encouragés, c''est pour votre encouragement, pour vous permettre de supporter les mêmes souffrances que celles que nous endurons. '
  '7':
  - type: text
    content: Et notre espérance à votre sujet est ferme, parce que nous savons que si vous avez part aux souffrances, vous avez part aussi au réconfort.
  '8':
  - type: text
    content: 'En ce qui concerne la détresse que nous avons connue en Asie, nous ne voulons en effet pas vous laisser ignorer, frères et sœurs, que nous avons été accablés à l''extrême, au-delà de nos forces, au point que nous désespérions même de rester en vie. '
  '9':
  - type: text
    content: 'Nous avions intérieurement accepté notre arrêt de mort afin de ne pas placer notre confiance en nous-mêmes mais en Dieu qui ressuscite les morts. '
