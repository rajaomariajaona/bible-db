document_id: 2SA.16
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Rencontres pendant la fuite
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Lorsque David eut un peu dépassé le sommet, Tsiba, le serviteur de Mephibosheth, vint à sa rencontre avec deux ânes munis de bâts. Ils portaient 200 pains, 100 gâteaux aux raisins secs, 100 aux fruits d''été et une outre de vin. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Le roi demanda à Tsiba: «Que veux-tu faire de cela?» Tsiba répondit: «Les ânes serviront de monture à la famille du roi, le pain et les fruits d''été sont destinés à nourrir les jeunes gens, et le vin à désaltérer ceux qui seront fatigués dans le désert.» '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Le roi demanda: «Où est le fils de ton maître?» Tsiba répondit au roi: «Il est resté à Jérusalem, car il s''est dit: ‘Aujourd''hui la communauté d''Israël me rendra le royaume de mon père.’» '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Le roi dit à Tsiba: «Tout ce qui appartient à Mephibosheth est à toi.» Et Tsiba dit: «Je me prosterne! Que je trouve grâce à tes yeux, roi mon seigneur!»'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Le roi David était arrivé à Bachurim. Et voici qu''un homme du clan et de la famille de Saül, un dénommé Shimeï, fils de Guéra, sortit de là. Il s''avança en prononçant des malédictions, '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'et il jeta des pierres au roi David ainsi qu''à tous ses serviteurs, alors même que tout le peuple et tous les hommes vaillants se tenaient à la droite et à la gauche du roi. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Voici ce que disait Shimeï en le maudissant: «Va-t''en, va-t''en, homme sanguinaire, vaurien! '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: L'Eternel fait retomber sur toi tout le sang de la famille de Saül. Tu as régné à sa place et l'Eternel a livré le royaume entre les mains de ton fils Absalom. Te voilà donc malheureux comme tu le mérites, car tu es un homme sanguinaire!»
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Abishaï, fils de Tseruja, dit alors au roi: «Pourquoi ce chien mort maudit-il le roi mon seigneur? Laisse-moi donc aller lui couper la tête.» '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Mais le roi dit: «Qu''ai-je affaire avec vous, les fils de Tseruja? S''il profère des malédictions, c''est que l''Eternel lui a dit: ‘Maudis David!’ Qui donc pourrait lui dire: ‘Pourquoi fais-tu cela?’» '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Puis David dit à Abishaï et à tous ses serviteurs: «Mon fils, celui qui est issu de moi, en veut à ma vie. A plus forte raison ce Benjaminite! Laissez-le et qu''il me maudisse, si l''Eternel lui a dit de le faire. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Peut-être l'Eternel verra-t-il ma détresse et me fera-t-il du bien au lieu des malédictions d'aujourd'hui.»
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'David et ses hommes continuèrent leur chemin. Shimeï marchait sur le flanc de la montagne près de David et tout en marchant il le maudissait, jetait des pierres contre lui et faisait voler la poussière. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Le roi et tout le peuple qui était avec lui arrivèrent épuisés [au bord du Jourdain], et là ils reprirent leur souffle.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Absalom à Jérusalem
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Absalom et tout le peuple, tous les Israélites, étaient entrés dans Jérusalem. Achitophel était avec lui.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Lorsque Hushaï, l''Arkien qui était un ami de David, fut arrivé vers Absalom, il lui dit: «Vive le roi! Vive le roi!» '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Absalom lui dit: «Voilà donc l''attachement que tu as pour ton ami! Pourquoi n''as-tu pas accompagné ton ami?» '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Hushaï répondit à Absalom: «C''est que je veux appartenir à celui qu''ont choisi l''Eternel et tout ce peuple, tous les Israélites, et c''est avec lui que je veux rester. '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: D'ailleurs, qui vais-je servir? Son fils! Je te servirai tout comme j'ai servi ton père.»
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Absalom dit à Achitophel: «Tenez conseil ensemble! Que devons-nous faire?» '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Achitophel dit à Absalom: «Aie des relations avec les concubines que ton père a laissées pour garder le palais. Ainsi, tout Israël saura que tu t''es rendu détestable pour ton père et les mains de tous ceux qui sont avec toi se fortifieront.» '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'On dressa une tente sur le toit pour Absalom, et Absalom eut des relations avec les concubines de son père aux yeux de tout Israël. '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: Les conseils donnés à cette époque-là par Achitophel avaient autant d'autorité que si l'on avait consulté Dieu lui-même. C'était le cas de tous les conseils d'Achitophel, que ce soit pour David ou pour Absalom.
