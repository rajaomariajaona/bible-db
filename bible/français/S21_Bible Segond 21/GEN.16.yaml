document_id: GEN.16
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Naissance d'Ismaël
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Saraï, la femme d''Abram, ne lui avait pas donné d''enfants, mais elle avait une servante égyptienne du nom d''Agar. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Saraï dit à Abram: «Voici que l''Eternel m''a rendue stérile. Aie des relations avec ma servante: peut-être aurai-je par elle des enfants.» Abram écouta Saraï. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Alors Saraï, la femme d'Abram, prit l'Egyptienne Agar, qui était sa servante, et elle la donna pour femme à son mari Abram, 10 ans après l'installation d'Abram dans le pays de Canaan.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Il eut des relations avec Agar et celle-ci tomba enceinte. Quand elle se vit enceinte, elle regarda sa maîtresse avec mépris. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Saraï dit à Abram: «L''injure qui m''est faite retombe sur toi. C''est moi qui ai mis ma servante dans tes bras, mais quand elle a vu qu''elle était enceinte, elle m''a regardée avec mépris. Que l''Eternel soit juge entre toi et moi!» '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Abram répondit à Saraï: «Ta servante est en ton pouvoir. Traite-la comme tu le jugeras bon.» Alors Saraï maltraita Agar, de sorte que celle-ci s''enfuit loin d''elle.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'L''ange de l''Eternel la trouva près d''une source d''eau dans le désert, près de la source qui est sur le chemin de Shur. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Il dit: «Agar, servante de Saraï, d''où viens-tu et où vas-tu?» Elle répondit: «Je m''enfuis loin de Saraï, ma maîtresse.» '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'L''ange de l''Eternel lui dit: «Retourne vers ta maîtresse et humilie-toi sous son pouvoir.» '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Puis l''ange de l''Eternel lui affirma: «Je multiplierai ta descendance. Elle sera si nombreuse qu''on ne pourra pas la compter.» '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'L''ange de l''Eternel lui dit: «Te voici enceinte. Tu mettras au monde un fils à qui tu donneras le nom d''Ismaël, car l''Eternel t''a entendue dans ton malheur. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Il sera pareil à un âne sauvage. Sa main sera contre tous et la main de tous sera contre lui. Il habitera en face de tous ses frères.» '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Elle donna à l'Eternel, qui lui avait parlé, le nom d'Atta-El-Roï
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '16.13 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Atta-El-Roï: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: littéralement toi le Dieu qui me voit.
    marker-yv: yv-n
  - type: text
    text: ' car elle dit: «Ai-je vu ici la trace de celui qui me voit'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '16.13 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Ai-je… voit: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: sens incertain, littéralement est-ce que même ici j'ai vu derrière celui qui me voit.
    marker-yv: yv-n
  - type: text
    text: '?» '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: C'est pourquoi l'on a appelé ce puits le puits de Lachaï-Roï
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '16.14 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Lachaï-Roï: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: littéralement pour le vivant qui me voit.
    marker-yv: yv-n
  - type: text
    text: . Il se trouve entre Kadès et Bared.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Agar donna un fils à Abram, et celui-ci appela Ismaël le fils qu''Agar lui donna. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Abram était âgé de 86 ans lorsque Agar lui donna Ismaël.
