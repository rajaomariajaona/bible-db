document_id: 1JN.1,152
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: 'Introduction: la parole de la vie'
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Ce qui était dès le commencement, ce que nous avons entendu, ce que nous avons vu de nos yeux, ce que nous avons contemplé et que nos mains ont touché concernant la parole de la vie, nous vous l''annonçons. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: Si nous disons que nous n'avons pas péché, nous faisons de Dieu un menteur, et sa parole n'est pas en nous.
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: La vie, en effet, s'est manifestée
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1.2 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'La vie… s''est manifestée: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: allusion à l'incarnation de Jésus-Christ.
      marker-yv: yv-n
    - type: text
      text: '; nous l''avons vue, nous en sommes témoins et nous vous l''annonçons, cette vie éternelle qui était auprès du Père et qui s''est manifestée à nous. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'Ce que nous avons vu et entendu, nous vous l''annonçons [à vous aussi] afin que vous aussi, vous soyez en communion avec nous. Or, c''est avec le Père et avec son Fils Jésus-Christ que nous sommes en communion, '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: et nous vous écrivons cela afin que notre joie soit complète.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: La vie dans la lumière
    marker-yv: yv-h
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'Voici le message que nous avons entendu de lui et que nous vous annonçons: Dieu est lumière et il n''y a pas de ténèbres en lui. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'Si nous disons que nous sommes en communion avec lui tout en marchant dans les ténèbres, nous mentons et nous ne mettons pas la vérité en pratique. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: Mais si nous marchons dans la lumière, tout comme Dieu lui-même est dans la lumière, nous sommes en communion les uns avec les autres et le sang de Jésus[-Christ] son Fils nous purifie de tout péché.
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'Si nous disons que nous n''avons pas de péché, nous nous trompons nous-mêmes et la vérité n''est pas en nous. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'Si nous reconnaissons nos péchés, il est fidèle et juste pour nous les pardonner et pour nous purifier de tout mal. '
