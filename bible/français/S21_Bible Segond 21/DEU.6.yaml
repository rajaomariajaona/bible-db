document_id: DEU.6,152
type_code: fra
verses:
  '1':
  - type: heading
    content: Données essentielles de la loi
  - type: text
    content: '»Voici les commandements, les prescriptions et les règles que l''Eternel, votre Dieu, a ordonné de vous enseigner afin que vous les mettiez en pratique dans le pays dont vous allez prendre possession, '
  '10':
  - type: text
    content: '»L''Eternel, ton Dieu, va te faire entrer dans le pays qu''il a juré à tes ancêtres, à Abraham, Isaac et Jacob, de te donner. Tu posséderas de grandes et bonnes villes que tu n''as pas construites, '
  '11':
  - type: text
    content: 'des maisons pleines de toutes sortes de biens et que tu n''as pas remplies, des citernes que tu n''as pas creusées, des vignes et des oliviers que tu n''as pas plantés. '
  '12':
  - type: text
    content: 'Lorsque tu mangeras à satiété, fais bien attention de ne pas oublier l''Eternel, qui t''a fait sortir d''Egypte, de la maison d''esclavage. '
  '13':
  - type: text
    content: '*C''est l''Eternel, ton Dieu, que tu craindras, c''est lui que tu serviras'
  - type: note
    content: 'C''est l''Eternel… serviras: repris par Jésus en Matthieu 4.10; Luc 4.8.'
  - type: text
    content: ' et c''est par son nom que tu prêteras serment. '
  '14':
  - type: text
    content: 'Vous ne suivrez pas d''autres dieux, pris parmi les dieux des peuples qui sont autour de vous, '
  '15':
  - type: text
    content: 'car l''Eternel, ton Dieu, est un Dieu jaloux au milieu de toi. La colère de l''Eternel, ton Dieu, s''enflammerait contre toi et il t''exterminerait de la surface de la terre. '
  '16':
  - type: text
    content: '*Vous ne provoquerez pas l''Eternel, votre Dieu,'
  - type: note
    content: 'Vous ne… Dieu: repris par Jésus en Matthieu 4.7; Luc 4.12.'
  - type: text
    content: ' comme vous l''avez fait à Massa. '
  '17':
  - type: text
    content: 'Vous respecterez les commandements de l''Eternel, votre Dieu, ses instructions et ses prescriptions qu''il vous a données. '
  '18':
  - type: text
    content: 'Tu feras ce qui est droit et ce qui est bien aux yeux de l''Eternel, afin d''être heureux et d''entrer en possession du bon pays que l''Eternel a juré à tes ancêtres de te donner '
  '19':
  - type: text
    content: 'après avoir chassé tous tes ennemis devant toi, comme il l''a dit. '
  '2':
  - type: text
    content: 'afin que tu craignes l''Eternel, ton Dieu, en respectant tous les jours de ta vie, toi, ainsi que ton fils et ton petit-fils, toutes ses prescriptions et tous ses commandements que je te donne, et afin que tu vives longtemps. '
  '20':
  - type: text
    content: 'Lorsque ton fils te demandera un jour: ‘Que signifient les instructions, les prescriptions et les règles que l''Eternel, notre Dieu, vous a données?’ '
  '21':
  - type: text
    content: 'tu lui diras: ‘Nous étions esclaves du pharaon en Egypte et l''Eternel nous a fait sortir de l''Egypte par sa main puissante. '
  '22':
  - type: text
    content: 'L''Eternel a accompli sous nos yeux de grands miracles et prodiges, porteurs de malheur pour l''Egypte, pour le pharaon et pour toute sa maison. '
  '23':
  - type: text
    content: 'Il nous a fait sortir de là pour nous amener dans le pays qu''il avait juré à nos ancêtres de nous donner. '
  '24':
  - type: text
    content: 'L''Eternel nous a ordonné de mettre toutes ces prescriptions en pratique et de craindre l''Eternel, notre Dieu, afin que nous soyons toujours heureux et qu''il nous conserve la vie, comme il le fait aujourd''hui. '
  '25':
  - type: text
    content: Nous aurons droit à la justice lorsque nous veillerons à mettre en pratique tous ces commandements devant l'Eternel, notre Dieu, comme il nous l'a ordonné.’
  '3':
  - type: text
    content: Tu les écouteras donc, Israël, et tu veilleras à les mettre en pratique afin d'être heureux et de devenir très nombreux, comme te l'a dit l'Eternel, le Dieu de tes ancêtres, en te promettant un pays où coulent le lait et le miel.
  '4':
  - type: text
    content: »*Ecoute, Israël! L'Eternel, notre Dieu, est le seul Eternel.
  - type: note
    content: 'Ecoute… Eternel: cité par Jésus en Marc 12.29.'
  '5':
  - type: text
    content: »*Tu aimeras l'Eternel, ton Dieu, de tout ton cœur, de toute ton âme et de toute ta force.
  - type: note
    content: 'Tu aimeras… force: cité en Matthieu 22.37; Marc 12.30, 33; Luc 10.27. Cf. 10.12; 30.6; Lévitique 19.18.'
  - type: text
    content: ' '
  '6':
  - type: text
    content: 'Les commandements que je te donne aujourd''hui seront dans ton cœur. '
  '7':
  - type: text
    content: 'Tu les répéteras à tes enfants; tu en parleras quand tu seras chez toi, quand tu seras en voyage, quand tu te coucheras et quand tu te lèveras. '
  '8':
  - type: text
    content: 'Tu les attacheras à tes mains comme un signe et ils seront comme une marque entre tes yeux. '
  '9':
  - type: text
    content: Tu les écriras sur les montants de la porte de ta maison et sur les portes de tes villes.
