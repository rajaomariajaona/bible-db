document_id: DAN.2
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Rêve à propos d'une statue
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'La deuxième année de son règne, Nebucadnetsar eut des rêves. Il en eut l''esprit troublé et ne parvint plus à dormir. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Le roi fit appeler les magiciens, les astrologues, les sorciers et les prêtres chaldéens pour qu''ils lui racontent ses rêves. Ils vinrent et se présentèrent devant le roi. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Le roi leur dit: «J''ai fait un rêve. Mon esprit est troublé parce que je voudrais connaître ce rêve.» '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Les prêtres chaldéens répondirent au roi en araméen: «Roi, puisses-tu vivre toujours! Raconte le rêve à tes serviteurs et nous en révélerons l''explication.»'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Le roi reprit la parole et dit aux prêtres chaldéens: «Voici ce que j''ai décidé: si vous ne me faites pas connaître le rêve et son explication, vous serez mis en pièces et vos maisons seront transformées en un tas de décombres. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'En revanche, si vous me révélez le rêve et son explication, vous recevrez de ma part des cadeaux, des récompenses et de grands honneurs. C''est pourquoi, révélez-moi le rêve et son explication!» '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Ils répondirent, pour la deuxième fois: «Que le roi raconte le rêve à ses serviteurs et nous en révélerons l''explication!»'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Le roi reprit la parole et dit: «Je m''aperçois, en vérité, que vous cherchez à gagner du temps parce que vous voyez que ma décision est prise. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Si donc vous ne me faites pas connaître le rêve, le même décret s''appliquera à vous tous. Vous vous êtes concertés pour me débiter des mensonges et des faussetés en attendant que les circonstances changent. C''est pourquoi, dites-moi quel était le rêve et je saurai que vous êtes vraiment capables de m''en révéler l''explication.» '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Les prêtres chaldéens répondirent au roi: «Il n''y a personne sur la terre qui puisse faire ce que demande le roi. C''est pourquoi jamais aucun roi, aussi grand et puissant qu''il ait été, n''a exigé une pareille chose d''un magicien, d''un astrologue ou d''un prêtre chaldéen. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Ce que le roi demande est difficile. Il n'y a personne qui puisse faire une telle révélation au roi, mis à part les dieux. Or, ils n'habitent pas parmi les hommes.»
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Cela mit le roi en colère. Il fut si irrité qu''il ordonna de faire mourir tous les sages de Babylone. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Le décret ordonnant la mise à mort des sages fut proclamé et l''on recherchait aussi Daniel et ses compagnons pour les exécuter. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Daniel s''adressa alors avec bon sens et tact à Arjoc, le responsable des gardes du roi qui était sorti pour mettre à mort les sages de Babylone. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Prenant la parole, il dit à Arjoc, l''officier du roi: «Pourquoi le décret du roi est-il si sévère?» Arjoc exposa la situation à Daniel. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Celui-ci alla alors trouver le roi et lui demanda de lui accorder un délai pour lui révéler l''explication. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Daniel rentra ensuite chez lui et exposa la situation à ses compagnons Hanania, Mishaël et Azaria. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Il les invita à implorer la compassion du Dieu du ciel afin qu'on ne les fasse pas mourir, lui et ses compagnons, avec le reste des sages de Babylone.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'C''est alors que le secret fut révélé à Daniel dans une vision pendant la nuit. Il bénit le Dieu du ciel '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'en disant: «Que le nom de Dieu soit béni d''éternité en éternité! C''est à lui qu''appartiennent la sagesse et la force. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'C''est lui qui change les temps et les circonstances, qui renverse et établit les rois, qui donne la sagesse aux sages et la connaissance à ceux qui ont de l''intelligence. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'C''est lui qui dévoile ce qui est profondément enfoui et caché, qui connaît ce qui est dans les ténèbres, et la lumière réside auprès de lui. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: Dieu de mes ancêtres, je te dis toute ma reconnaissance et ma louange parce que tu m'as donné la sagesse et la force et parce que tu m'as fait connaître ce que nous t'avons demandé, parce que tu nous as fait connaître ce qui concerne le roi.»
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Après cela, Daniel alla trouver Arjoc, celui que le roi avait chargé de faire mourir les sages de Babylone. Il alla lui dire: «Ne fais pas mourir les sages de Babylone! Conduis-moi devant le roi et je lui révélerai l''explication.» '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Arjoc conduisit aussitôt Daniel devant le roi et lui dit: «J''ai trouvé parmi les exilés de Juda un homme qui fera connaître l''explication au roi.» '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Prenant la parole, le roi dit à Daniel, qu''on appelait Beltshatsar: «Es-tu capable de me faire connaître le rêve que j''ai eu et son explication?»'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'Daniel fit cette réponse devant le roi: «Ce que le roi demande est un secret que les sages, les astrologues, les magiciens et les devins ne sont pas capables de lui révéler. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'Cependant, il y a dans le ciel un Dieu qui dévoile les secrets et qui a fait connaître au roi Nebucadnetsar ce qui arrivera dans l''avenir. Voici ton rêve et les visions que tu as eues sur ton lit. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'Sur ton lit, roi, tu as eu des pensées concernant ce qui arrivera par la suite, et celui qui dévoile les secrets t''a fait connaître ce qui arrivera. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: Si ce secret m'a été dévoilé, ce n'est pas parce qu'il y aurait en moi une sagesse supérieure à celle de tous les êtres vivants, mais c'est afin que l'explication te soit donnée, roi, et que tu connaisses ce qui trouble ton cœur.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: '»Roi, tu regardais et tu as vu une grande statue. Cette statue était immense et d''une splendeur extraordinaire. Elle était debout devant toi et son aspect était terrifiant. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'La tête de cette statue était en or pur, sa poitrine et ses bras en argent, son ventre et ses cuisses en bronze, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: 'ses jambes en fer, ses pieds en partie en fer et en partie en argile. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: 'Pendant que tu regardais, une pierre s''est détachée sans aucune intervention extérieure. Elle a frappé les pieds en fer et en argile de la statue et les a pulvérisés. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: 'Le fer, l''argile, le bronze, l''argent et l''or ont alors été pulvérisés ensemble, et ils sont devenus pareils à la bale qui s''échappe d''une aire de battage en été: le vent les a emportés et on n''a plus trouvé aucune trace d''eux. Quant à la pierre qui avait frappé la statue, elle est devenue une grande montagne et a rempli toute la terre.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: '»Voilà quel était le rêve. Nous en dirons l''explication devant le roi. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: 'Roi, tu es le roi des rois parce que le Dieu du ciel t''a donné la royauté, la puissance, la force et la gloire. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: text
    text: 'Il a placé sous ta domination, où qu''ils habitent, les hommes, les bêtes sauvages et les oiseaux, et il t''a donné le pouvoir sur eux tous. La tête en or, c''est toi. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '39'
  - type: text
    text: 'Après toi surgira un autre royaume, inférieur au tien, puis un troisième royaume, qui sera en bronze et qui dominera sur toute la terre. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '40'
  - type: text
    text: 'Il y aura un quatrième royaume, solide comme du fer. En effet, le fer pulvérise et écrase tout. Tout comme le fer brise tout, il pulvérisera et écrasera les autres. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '41'
  - type: text
    text: 'Tu as vu les pieds et les orteils en partie en argile de potier et en partie en fer. De même, ce royaume sera divisé, mais il y aura en lui quelque chose de la force du fer, parce que tu as vu le fer mélangé à l''argile. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '42'
  - type: text
    text: 'Les doigts des pieds étaient en partie en fer et en partie en argile. De même, ce royaume sera en partie fort et en partie fragile. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '43'
  - type: text
    text: Tu as vu le fer mélangé à l'argile parce qu'ils feront des alliances tout humaines. Cependant, ils ne seront pas vraiment unis l'un à l'autre, de même qu'on ne peut allier le fer à l'argile.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '44'
  - type: text
    text: '»A l''époque de ces rois, le Dieu du ciel fera surgir un royaume qui ne sera jamais détruit et qui ne passera pas sous la domination d''un autre peuple; il pulvérisera tous ces royaumes-là et y mettra fin, tandis que lui-même subsistera éternellement. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '45'
  - type: text
    text: C'est ce qu'indique la pierre que tu as vue se détacher de la montagne sans aucune intervention extérieure et qui a pulvérisé le fer, le bronze, l'argile, l'argent et l'or. Le grand Dieu a fait connaître au roi ce qui doit arriver par la suite. Le rêve est vrai et son explication est digne de confiance.»
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '46'
  - type: text
    text: 'Alors le roi Nebucadnetsar tomba le visage contre terre et se prosterna devant Daniel. Il ordonna qu''on offre des sacrifices et des parfums en son honneur. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '47'
  - type: text
    text: 'Le roi adressa la parole à Daniel et dit: «C''est certain, c''est votre Dieu qui est le Dieu des dieux et le Seigneur des rois, et il dévoile les secrets, puisque tu as pu dévoiler celui-ci.» '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '48'
  - type: text
    text: 'Ensuite le roi accorda une position élevée à Daniel et lui fit de nombreux et grands cadeaux. Il lui donna le commandement de toute la province de Babylone et le désigna chef suprême de tous les sages de Babylone. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '49'
  - type: text
    text: Daniel demanda au roi de confier l'administration de la province de Babylone à Shadrak, Méshak et Abed-Nego. Lui-même resta à la cour du roi.
