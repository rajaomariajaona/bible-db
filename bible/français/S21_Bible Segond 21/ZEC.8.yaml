document_id: ZEC.8,152
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Restauration et bénédiction
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'La parole de l''Eternel, le maître de l''univers, fut révélée: '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'En effet, avant, le travail de l''homme ne recevait pas son salaire, et le travail des bêtes ne rapportait rien. Il n''y avait pas de paix pour ceux qui entraient et sortaient, à cause de l''ennemi, et je dressais tous les hommes les uns contre les autres. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'Mais maintenant, je ne suis pas pour le reste de ce peuple comme j''ai été par le passé, déclare l''Eternel, le maître de l''univers, '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'car je sèmerai la paix: la vigne donnera son fruit, la terre ses produits, et le ciel sa rosée. J''accorderai tous ces biens en héritage au reste de ce peuple. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: De même que vous avez été une malédiction parmi les nations, communauté de Juda et communauté d'Israël, de même je vous sauverai et vous serez une bénédiction. N'ayez pas peur et fortifiez vos mains!
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: '»En effet, voici ce que dit l''Eternel, le maître de l''univers: Lorsque vos ancêtres m''ont irrité, j''ai décidé de vous faire du mal, dit l''Eternel, le maître de l''univers, et je ne suis pas revenu sur ma décision. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'De même, je me ravise et je décide maintenant de faire du bien à Jérusalem et à la communauté de Juda. N''ayez pas peur! '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'Voici ce que vous devez faire: *que chacun dise la vérité à son prochain'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '8.16 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Que chacun… prochain: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'cité en '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ephésiens 4.25
      - type: usfm
        marker: ft
        children:
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: ; rendez la justice aux portes de vos villes
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '8.16 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Aux portes de vos villes: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: c'était le lieu des délibérations, des affaires et du tribunal.
      marker-yv: yv-n
    - type: text
      text: ' conformément à la vérité et en vue de la paix; '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: que personne ne projette dans son cœur le mal contre son prochain et n'aimez pas le faux serment, car tout cela, je le déteste, déclare l'Eternel.»
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'La parole de l''Eternel, le maître de l''univers, m''a été adressée: '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: '«Voici ce que dit l''Eternel, le maître de l''univers: Les jeûnes du quatrième, du cinquième, du septième et du dixième mois se changeront pour la communauté de Juda en jours d''allégresse et de joie, en fêtes de réjouissance. Mais aimez la vérité et la paix!'
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: '«Voici ce que dit l''Eternel, le maître de l''univers: J''éprouve une grande jalousie envers Sion, j''éprouve pour elle une grande colère.'
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: '»Voici ce que dit l''Eternel, le maître de l''univers: Des peuples et des habitants de villes nombreuses viendront encore. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: 'Les habitants d''une ville iront dans une autre en disant: ‘Allons implorer l''Eternel et rechercher l''Eternel, le maître de l''univers!’ ‘J''irai moi aussi!’ '
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: Beaucoup de peuples, des nations puissantes, viendront rechercher l'Eternel, le maître de l'univers, à Jérusalem et implorer l'Eternel.
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: '»Voici ce que dit l''Eternel, le maître de l''univers: Ces jours-là, dix hommes de toutes les langues des nations attraperont un Juif par le pan de son habit et diront: ‘Nous irons avec vous, car nous avons appris que Dieu est avec vous.’»'
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: '»Voici ce que dit l''Eternel: Je retourne à Sion, et je veux habiter au milieu de Jérusalem. Jérusalem sera appelée ‘ville de la vérité’, et la montagne de l''Eternel, le maître de l''univers, ‘montagne sainte’. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'Voici ce que dit l''Eternel, le maître de l''univers: Des vieillards et des femmes âgées s''assiéront encore dans les rues de Jérusalem, chacun le bâton à la main, à cause de leur grand âge. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: Les places de la ville seront remplies de jeunes garçons et filles jouant dehors.
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: '»Voici ce que dit l''Eternel, le maître de l''univers: Si cela paraît étonnant aux yeux du reste de ce peuple durant ces jours-là, sera-ce aussi étonnant à mes yeux? déclare l''Eternel, le maître de l''univers. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'Voici ce que dit l''Eternel, le maître de l''univers: Je sauve mon peuple du pays du levant et du pays du soleil couchant. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: Je les ramènerai et ils habiteront au milieu de Jérusalem. Ils seront mon peuple, et je serai leur Dieu dans la vérité et la justice.
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: '»Voici ce que dit l''Eternel, le maître de l''univers: Fortifiez vos mains, vous qui entendez aujourd''hui ces paroles de la bouche des prophètes qui ont surgi au moment où l''on a posé les fondations de la maison de l''Eternel, le maître de l''univers, où l''on a commencé à reconstruire le temple. '
