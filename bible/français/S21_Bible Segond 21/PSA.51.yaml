document_id: PSA.51
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Psaume de retour à Dieu
  marker-yv: yv-h
- type: usfm
  marker: d
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Au chef de chœur. Psaume de David, '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: orsque le prophète Nathan vint chez lui après son adultère avec Bath-Shéba.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: O Dieu, fais-moi grâce conformément à ta bonté!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Conformément à ta grande compassion, efface mes transgressions!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Lave-moi complètement de ma faute
- type: usfm
  marker: q1
  children:
  - type: text
    text: et purifie-moi de mon péché,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: car je reconnais mes transgressions
- type: usfm
  marker: q1
  children:
  - type: text
    text: et mon péché est constamment devant moi.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: J'ai péché contre toi, contre toi seul,
- type: usfm
  marker: q1
  children:
  - type: text
    text: j'ai fait ce qui est mal à tes yeux.
- type: usfm
  marker: q1
  children:
  - type: text
    text: '*C''est pourquoi tu es juste dans tes paroles,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: sans reproche dans ton jugement.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '51.6 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'C''est pourquoi… jugement: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'cité en '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Romains 3.4
      metadata:
        usfm: ROM.3.4
    - type: usfm
      marker: ft
      children:
      - type: text
        text: .
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Oui, depuis ma naissance, je suis coupable;
- type: usfm
  marker: q1
  children:
  - type: text
    text: quand ma mère m'a conçu, j'étais déjà marqué par le péché.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Mais tu veux que la vérité soit au fond du cœur:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: fais-moi connaître la sagesse dans le secret de mon être!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Purifie-moi avec l'hysope, et je serai pur,
- type: usfm
  marker: q1
  children:
  - type: text
    text: lave-moi, et je serai plus blanc que la neige!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Fais-moi entendre des chants d'allégresse et de joie,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et les os que tu as brisés se réjouiront.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Détourne ton regard de mes péchés,
- type: usfm
  marker: q1
  children:
  - type: text
    text: efface toutes mes fautes!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: O Dieu, crée en moi un cœur pur,
- type: usfm
  marker: q1
  children:
  - type: text
    text: renouvelle en moi un esprit bien disposé!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Ne me rejette pas loin de toi,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ne me retire pas ton Esprit saint!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Rends-moi la joie de ton salut,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et qu'un esprit de bonne volonté me soutienne!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: J'enseignerai tes voies à ceux qui les transgressent
- type: usfm
  marker: q1
  children:
  - type: text
    text: et les pécheurs reviendront à toi.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: O Dieu, Dieu de mon salut, délivre-moi du sang versé,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et ma langue célébrera ta justice.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Seigneur, ouvre mes lèvres,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et ma bouche proclamera ta louange.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Si tu avais voulu des sacrifices, je t'en aurais offert,
- type: usfm
  marker: q1
  children:
  - type: text
    text: mais tu ne prends pas plaisir aux holocaustes.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Les sacrifices agréables à Dieu, c'est un esprit brisé.
- type: usfm
  marker: q1
  children:
  - type: text
    text: O Dieu, tu ne dédaignes pas un cœur brisé et humilié.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Dans ta grâce, fais du bien à Sion,
- type: usfm
  marker: q1
  children:
  - type: text
    text: construis les murs de Jérusalem!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Alors tu prendras plaisir aux sacrifices de justice,
- type: usfm
  marker: q1
  children:
  - type: text
    text: aux holocaustes et aux victimes tout entières;
- type: usfm
  marker: q1
  children:
  - type: text
    text: alors on offrira des taureaux sur ton autel.
