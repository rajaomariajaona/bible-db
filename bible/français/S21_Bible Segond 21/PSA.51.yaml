document_id: PSA.51,152
type_code: fra
verses:
  '1':
  - type: heading
    content: Psaume de retour à Dieu
  - type: text
    content: 'Au chef de chœur. Psaume de David, '
  '10':
  - type: text
    content: Fais-moi entendre des chants d'allégresse et de joie,
  - type: text
    content: et les os que tu as brisés se réjouiront.
  '11':
  - type: text
    content: Détourne ton regard de mes péchés,
  - type: text
    content: efface toutes mes fautes!
  '12':
  - type: text
    content: O Dieu, crée en moi un cœur pur,
  - type: text
    content: renouvelle en moi un esprit bien disposé!
  '13':
  - type: text
    content: Ne me rejette pas loin de toi,
  - type: text
    content: ne me retire pas ton Esprit saint!
  '14':
  - type: text
    content: Rends-moi la joie de ton salut,
  - type: text
    content: et qu'un esprit de bonne volonté me soutienne!
  '15':
  - type: text
    content: J'enseignerai tes voies à ceux qui les transgressent
  - type: text
    content: et les pécheurs reviendront à toi.
  '16':
  - type: text
    content: O Dieu, Dieu de mon salut, délivre-moi du sang versé,
  - type: text
    content: et ma langue célébrera ta justice.
  '17':
  - type: text
    content: Seigneur, ouvre mes lèvres,
  - type: text
    content: et ma bouche proclamera ta louange.
  '18':
  - type: text
    content: Si tu avais voulu des sacrifices, je t'en aurais offert,
  - type: text
    content: mais tu ne prends pas plaisir aux holocaustes.
  '19':
  - type: text
    content: Les sacrifices agréables à Dieu, c'est un esprit brisé.
  - type: text
    content: O Dieu, tu ne dédaignes pas un cœur brisé et humilié.
  '2':
  - type: text
    content: orsque le prophète Nathan vint chez lui après son adultère avec Bath-Shéba.
  '20':
  - type: text
    content: Dans ta grâce, fais du bien à Sion,
  - type: text
    content: construis les murs de Jérusalem!
  '21':
  - type: text
    content: Alors tu prendras plaisir aux sacrifices de justice,
  - type: text
    content: aux holocaustes et aux victimes tout entières;
  - type: text
    content: alors on offrira des taureaux sur ton autel.
  '3':
  - type: text
    content: O Dieu, fais-moi grâce conformément à ta bonté!
  - type: text
    content: Conformément à ta grande compassion, efface mes transgressions!
  '4':
  - type: text
    content: Lave-moi complètement de ma faute
  - type: text
    content: et purifie-moi de mon péché,
  '5':
  - type: text
    content: car je reconnais mes transgressions
  - type: text
    content: et mon péché est constamment devant moi.
  '6':
  - type: text
    content: J'ai péché contre toi, contre toi seul,
  - type: text
    content: j'ai fait ce qui est mal à tes yeux.
  - type: text
    content: '*C''est pourquoi tu es juste dans tes paroles,'
  - type: text
    content: sans reproche dans ton jugement.
  - type: note
    content: 'C''est pourquoi… jugement: cité en Romains 3.4.'
  '7':
  - type: text
    content: Oui, depuis ma naissance, je suis coupable;
  - type: text
    content: quand ma mère m'a conçu, j'étais déjà marqué par le péché.
  '8':
  - type: text
    content: 'Mais tu veux que la vérité soit au fond du cœur:'
  - type: text
    content: fais-moi connaître la sagesse dans le secret de mon être!
  '9':
  - type: text
    content: Purifie-moi avec l'hysope, et je serai pur,
  - type: text
    content: lave-moi, et je serai plus blanc que la neige!
