document_id: PSA.17,152
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Prière du juste persécuté
    marker-yv: yv-h
  - type: usfm
    marker: d
    children:
    - type: text
      text: Prière de David.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Eternel, écoute la justice, sois attentif à mes cris!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Prête l''oreille à ma prière: elle vient de lèvres sincères!'
  '10':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ils ferment leur cœur à la pitié,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ils ont des paroles hautaines à la bouche.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ils sont sur nos pas, déjà ils nous entourent,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ils nous épient pour nous terrasser.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: On dirait un lion avide de déchirer,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: un lionceau aux aguets dans son repaire.
  '13':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Lève-toi, Eternel, marche à leur rencontre, renverse-les,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: délivre-moi des méchants par ton épée!
  '14':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Délivre-moi des hommes par ta main, Eternel, des hommes de ce monde!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Leur part est dans cette vie,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et tu remplis leur ventre de tes biens;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: leurs enfants sont rassasiés,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et ils laissent leur superflu à leurs petits-enfants.
  '15':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Quant à moi, couvert de justice, je te verrai;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dès le réveil, je me rassasierai de ton image.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Que mon droit paraisse devant toi,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: que tes yeux voient où est l'intégrité!
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tu examines mon cœur, tu le visites la nuit,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'tu me mets à l''épreuve, et tu ne trouves rien:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ma pensée n'est pas différente de ce qui sort de ma bouche.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: J'ai vu les actions des hommes, mais je reste fidèle à la parole de tes lèvres
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et je me tiens en garde contre la voie des violents;
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: mes pas sont fermes dans tes sentiers,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: mes pieds ne trébuchent pas.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Je fais appel à toi car tu m'exauces, ô Dieu.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Penche l'oreille vers moi, écoute ma parole!
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Montre tes bontés, toi qui interviens et sauves de leurs adversaires
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ceux qui cherchent refuge en toi!
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Garde-moi comme la prunelle de l'œil,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: protège-moi à l'ombre de tes ailes
  '9':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: contre les méchants qui me persécutent,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: contre mes ennemis qui me cernent, pleins d'acharnement.
