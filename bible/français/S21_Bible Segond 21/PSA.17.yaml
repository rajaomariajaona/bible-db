document_id: PSA.17,152
type_code: fra
verses:
  '1':
  - type: heading
    content: Prière du juste persécuté
  - type: text
    content: Prière de David.
  - type: text
    content: Eternel, écoute la justice, sois attentif à mes cris!
  - type: text
    content: 'Prête l''oreille à ma prière: elle vient de lèvres sincères!'
  '10':
  - type: text
    content: Ils ferment leur cœur à la pitié,
  - type: text
    content: ils ont des paroles hautaines à la bouche.
  '11':
  - type: text
    content: Ils sont sur nos pas, déjà ils nous entourent,
  - type: text
    content: ils nous épient pour nous terrasser.
  '12':
  - type: text
    content: On dirait un lion avide de déchirer,
  - type: text
    content: un lionceau aux aguets dans son repaire.
  '13':
  - type: text
    content: Lève-toi, Eternel, marche à leur rencontre, renverse-les,
  - type: text
    content: délivre-moi des méchants par ton épée!
  '14':
  - type: text
    content: Délivre-moi des hommes par ta main, Eternel, des hommes de ce monde!
  - type: text
    content: Leur part est dans cette vie,
  - type: text
    content: et tu remplis leur ventre de tes biens;
  - type: text
    content: leurs enfants sont rassasiés,
  - type: text
    content: et ils laissent leur superflu à leurs petits-enfants.
  '15':
  - type: text
    content: Quant à moi, couvert de justice, je te verrai;
  - type: text
    content: dès le réveil, je me rassasierai de ton image.
  '2':
  - type: text
    content: Que mon droit paraisse devant toi,
  - type: text
    content: que tes yeux voient où est l'intégrité!
  '3':
  - type: text
    content: Tu examines mon cœur, tu le visites la nuit,
  - type: text
    content: 'tu me mets à l''épreuve, et tu ne trouves rien:'
  - type: text
    content: ma pensée n'est pas différente de ce qui sort de ma bouche.
  '4':
  - type: text
    content: J'ai vu les actions des hommes, mais je reste fidèle à la parole de tes lèvres
  - type: text
    content: et je me tiens en garde contre la voie des violents;
  '5':
  - type: text
    content: mes pas sont fermes dans tes sentiers,
  - type: text
    content: mes pieds ne trébuchent pas.
  '6':
  - type: text
    content: Je fais appel à toi car tu m'exauces, ô Dieu.
  - type: text
    content: Penche l'oreille vers moi, écoute ma parole!
  '7':
  - type: text
    content: Montre tes bontés, toi qui interviens et sauves de leurs adversaires
  - type: text
    content: ceux qui cherchent refuge en toi!
  '8':
  - type: text
    content: Garde-moi comme la prunelle de l'œil,
  - type: text
    content: protège-moi à l'ombre de tes ailes
  '9':
  - type: text
    content: contre les méchants qui me persécutent,
  - type: text
    content: contre mes ennemis qui me cernent, pleins d'acharnement.
