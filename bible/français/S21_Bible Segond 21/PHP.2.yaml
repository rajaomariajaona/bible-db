document_id: PHP.2
type_code: fra
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'S''il y a donc de l''encouragement en Christ, s''il y a de la consolation dans l''amour, s''il y a une communion de l''Esprit, s''il y a de la tendresse et de la compassion, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'rendez ma joie parfaite en vivant en plein accord. Ayez un même amour, un même cœur, une unité de pensée. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Ne faites rien par esprit de rivalité ou par désir d''une gloire sans valeur, mais avec humilité considérez les autres comme supérieurs à vous-mêmes. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Que chacun de vous, au lieu de regarder à ses propres intérêts, regarde aussi à ceux des autres.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Que votre attitude soit identique à celle de Jésus-Christ: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'lui qui est de condition divine, il n''a pas regardé son égalité avec Dieu comme un butin à préserver, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'mais il s''est dépouillé lui-même en prenant une condition de serviteur, en devenant semblable aux êtres humains. Reconnu comme un simple homme, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'il s''est humilié lui-même en faisant preuve d''obéissance jusqu''à la mort, même la mort sur la croix. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'C''est aussi pourquoi Dieu l''a élevé à la plus haute place et lui a donné le nom qui est au-dessus de tout nom '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'afin qu''au nom de Jésus chacun plie le genou dans le ciel, sur la terre et sous la terre '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: et que toute langue reconnaisse que Jésus-Christ est le Seigneur, à la gloire de Dieu le Père.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Ainsi, mes bien-aimés, vous qui avez toujours obéi, non seulement quand j''étais présent, mais bien plus encore maintenant que je suis absent, mettez en œuvre votre salut avec crainte et profond respect. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: En effet, c'est Dieu qui produit en vous le vouloir et le faire pour son projet bienveillant.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Faites tout sans murmures ni contestations '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'afin d''être irréprochables et purs, des enfants de Dieu sans défaut au milieu d''une génération perverse et corrompue. C''est comme des flambeaux dans le monde que vous brillez parmi eux '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'en portant la parole de vie. Je pourrai alors être fier, le jour de Christ, de n''avoir pas couru ni travaillé pour rien. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Et même si mon sang doit couler pour le sacrifice et le service de votre foi, j''en suis heureux et je me réjouis avec vous tous. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Vous aussi, soyez de même heureux et réjouissez-vous avec moi.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Envoi à Philippes de Timothée et d'Epaphrodite
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'J''espère dans le Seigneur Jésus vous envoyer bientôt Timothée afin d''être moi-même encouragé par les nouvelles que j''aurai de vous, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'car je n''ai personne qui partage mes sentiments pour prendre vraiment votre situation à cœur. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Tous, en effet, cherchent leurs propres intérêts, et non ceux de Jésus-Christ. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Vous savez que Timothée a fait ses preuves en se consacrant au service de l''Evangile avec moi comme un enfant avec son père. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'J''espère donc vous l''envoyer dès que je serai au clair sur ma situation. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: Et j'ai confiance dans le Seigneur que moi aussi, je viendrai bientôt.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'J''ai cependant estimé nécessaire de vous renvoyer mon frère Epaphrodite, mon collaborateur et mon compagnon de combat, que vous aviez envoyé afin de pourvoir à mes besoins. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Il désirait vous revoir tous et se tourmentait parce que vous aviez appris sa maladie. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'Il a été malade en effet, tout près de la mort, mais Dieu a eu pitié de lui, et non seulement de lui mais aussi de moi, afin que je n''aie pas tristesse sur tristesse. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'Je m''empresse donc de le renvoyer pour que vous puissiez vous réjouir de le revoir et que je sois moi-même moins triste. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'Accueillez-le dans le Seigneur avec une joie sans réserve et ayez de l''estime pour de tels hommes. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: En effet, c'est pour l'œuvre de Christ qu'il a été près de la mort; il a risqué sa vie afin de vous remplacer dans le service que vous ne pouviez pas me rendre.
