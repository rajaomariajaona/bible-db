document_id: JHN.7,152
type_code: fra
verses:
  '1':
  - type: heading
    content: Jésus à la fête des tentes
  - type: text
    content: 'Après cela, Jésus continua de parcourir la Galilée; il ne voulait pas séjourner en Judée car les Juifs cherchaient à le faire mourir. '
  '10':
  - type: text
    content: 'Lorsque ses frères furent montés à la fête, il y monta aussi lui-même, non pas en se montrant, mais [comme] en secret. '
  '11':
  - type: text
    content: 'Les Juifs le cherchaient pendant la fête et disaient: «Où est-il?» '
  '12':
  - type: text
    content: 'Dans la foule, on murmurait beaucoup à son sujet. Les uns disaient: «C''est un homme bien.» D''autres disaient: «Non, au contraire, il égare le peuple.» '
  '13':
  - type: text
    content: Personne, toutefois, ne parlait ouvertement de lui, par crainte des chefs juifs.
  '14':
  - type: text
    content: 'C''était déjà le milieu de la fête lorsque Jésus monta au temple et se mit à enseigner. '
  '15':
  - type: text
    content: 'Les Juifs s''étonnaient et disaient: «Comment connaît-il les Ecritures, lui qui n''a pas étudié?» '
  '16':
  - type: text
    content: 'Jésus leur répondit: «Mon enseignement ne vient pas de moi mais de celui qui m''a envoyé. '
  '17':
  - type: text
    content: 'Si quelqu''un veut faire la volonté de Dieu, il saura si mon enseignement vient de Dieu ou si je parle de ma propre initiative. '
  '18':
  - type: text
    content: 'Celui qui parle de sa propre initiative cherche sa propre gloire, mais si quelqu''un cherche la gloire de celui qui l''a envoyé, celui-là est vrai et il n''y a pas d''injustice en lui. '
  '19':
  - type: text
    content: 'Moïse ne vous a-t-il pas donné la loi? Or, aucun de vous ne la met en pratique. Pourquoi cherchez-vous à me faire mourir?» '
  '2':
  - type: text
    content: 'Or, la fête juive des tentes était proche. '
  '20':
  - type: text
    content: 'La foule répondit: «Tu as un démon. Qui cherche à te faire mourir?» '
  '21':
  - type: text
    content: 'Jésus leur répondit: «Pour une seule œuvre'
  - type: note
    content: 'Une seule œuvre: la guérison d''un malade le jour du sabbat (5.1-9).'
  - type: text
    content: ' que j''ai faite, vous êtes tous étonnés. '
  '22':
  - type: text
    content: Moïse vous a donné la circoncision
  - type: note
    content: 'Circoncision: cette opération consistant à enlever le prépuce avait été le signe de l''alliance conclue par Dieu avec Abraham, l''ancêtre des Israélites (Genèse 17.9-14). D''après Lévitique 12.3, elle devait intervenir lorsque le garçon avait 8 jours.'
  - type: text
    content: ' - qui ne vient du reste pas de lui, mais des patriarches - et vous circoncisez un homme le jour du sabbat. '
  '23':
  - type: text
    content: 'Si pour respecter la loi de Moïse un homme reçoit la circoncision le jour du sabbat, pourquoi vous irritez-vous contre moi parce que j''ai guéri un homme tout entier le jour du sabbat? '
  '24':
  - type: text
    content: Ne jugez pas d'après l'apparence, mais portez un jugement juste.»
  '25':
  - type: text
    content: 'Quelques habitants de Jérusalem disaient: «N''est-ce pas celui qu''ils cherchent à faire mourir? '
  '26':
  - type: text
    content: 'Le voici qui parle librement et ils ne lui disent rien! Est-ce que les chefs auraient vraiment reconnu qu''il est le Messie? '
  '27':
  - type: text
    content: 'Cependant celui-ci, nous savons d''où il est, tandis que le Messie, quand il viendra, personne ne saura d''où il est.» '
  '28':
  - type: text
    content: 'Jésus enseignait dans le temple. Il s''écria alors: «Vous me connaissez et vous savez d''où je suis! Pourtant je ne suis pas venu de moi-même. Au contraire, celui qui m''a envoyé est vrai et vous ne le connaissez pas. '
  '29':
  - type: text
    content: 'Pour ma part, je le connais, car je viens d''auprès de lui et c''est lui qui m''a envoyé.» '
  '3':
  - type: text
    content: 'Ses frères lui dirent: «Pars d''ici et va en Judée afin que tes disciples voient aussi ce que tu fais. '
  '30':
  - type: text
    content: 'Ils cherchaient donc à l''arrêter, mais personne ne mit la main sur lui parce que son heure n''était pas encore venue. '
  '31':
  - type: text
    content: 'Beaucoup parmi la foule crurent en lui, et ils disaient: «Le Messie, quand il viendra, fera-t-il plus de signes miraculeux que n''en a fait celui-ci?» '
  '32':
  - type: text
    content: Les pharisiens entendirent la foule murmurer ces propos à son sujet. Alors les chefs des prêtres et les pharisiens envoyèrent des gardes pour l'arrêter.
  '33':
  - type: text
    content: 'Jésus dit: «Je suis encore avec vous pour un peu de temps, puis je m''en vais vers celui qui m''a envoyé. '
  '34':
  - type: text
    content: 'Vous me chercherez et vous ne me trouverez pas, et là où je serai, vous ne pouvez pas venir.» '
  '35':
  - type: text
    content: 'Les Juifs se dirent alors entre eux: «Où ira-t-il, pour que nous ne le trouvions pas? Ira-t-il chez ceux qui sont dispersés dans le reste du monde et enseignera-t-il les non-Juifs? '
  '36':
  - type: text
    content: 'Que signifie cette parole qu''il a dite: ‘Vous me chercherez et vous ne me trouverez pas, et là où je serai, vous ne pouvez pas venir’?»'
  '37':
  - type: text
    content: 'Le dernier jour, le grand jour de la fête, Jésus, debout, s''écria: «Si quelqu''un a soif, qu''il vienne à moi et qu''il boive. '
  '38':
  - type: text
    content: 'Celui qui croit en moi, des fleuves d''eau vive couleront de lui, comme l''a dit l''Ecriture.» '
  '39':
  - type: text
    content: Il dit cela à propos de l'Esprit que devaient recevoir ceux qui croiraient en lui. En effet, l'Esprit [saint] n'avait pas encore été donné parce que Jésus n'avait pas encore été élevé dans sa gloire.
  '4':
  - type: text
    content: 'Personne n''agit en secret, s''il cherche à être connu. Puisque tu fais ce genre de choses, montre-toi au monde!» '
  '40':
  - type: text
    content: 'Après avoir entendu ces paroles, beaucoup dans la foule disaient: «Celui-ci est vraiment le prophète.» '
  '41':
  - type: text
    content: 'D''autres disaient: «C''est le Messie.» Mais d''autres disaient: «Est-ce bien de la Galilée que doit venir le Messie? '
  '42':
  - type: text
    content: 'L''Ecriture ne dit-elle pas que c''est de la descendance de David et du village de Bethléhem où était David que le Messie doit venir?» '
  '43':
  - type: text
    content: 'Il y eut donc, à cause de lui, division parmi la foule. '
  '44':
  - type: text
    content: Quelques-uns d'entre eux voulaient l'arrêter, mais personne ne mit la main sur lui.
  '45':
  - type: text
    content: 'Ainsi, les gardes retournèrent vers les chefs des prêtres et les pharisiens, qui leur dirent: «Pourquoi ne l''avez-vous pas amené?» '
  '46':
  - type: text
    content: 'Les gardes répondirent: «Jamais personne n''a parlé comme cet homme.» '
  '47':
  - type: text
    content: 'Les pharisiens leur répliquèrent: «Est-ce que vous aussi, vous vous êtes laissé tromper? '
  '48':
  - type: text
    content: 'Y a-t-il quelqu''un parmi les chefs ou les pharisiens qui ait cru en lui? '
  '49':
  - type: text
    content: 'Mais cette foule qui ne connaît pas la loi, ce sont des maudits!» '
  '5':
  - type: text
    content: 'En effet, ses frères non plus ne croyaient pas en lui. '
  '50':
  - type: text
    content: 'Nicodème, qui était venu de nuit vers Jésus et qui était l''un d''eux, leur dit: '
  '51':
  - type: text
    content: '«Notre loi condamne-t-elle un homme avant qu''on l''entende et qu''on sache ce qu''il a fait?» '
  '52':
  - type: text
    content: 'Ils lui répondirent: «Es-tu, toi aussi, de la Galilée? Cherche bien et tu verras que de la Galilée il ne sort pas de prophète.» '
  '53':
  - type: text
    content: '[Puis chacun rentra chez soi.'
  '6':
  - type: text
    content: 'Jésus leur dit: «Le moment n''est pas encore venu pour moi, tandis que pour vous, c''est toujours le bon moment. '
  '7':
  - type: text
    content: 'Le monde ne peut pas vous détester, tandis que moi, il me déteste parce que je témoigne à son sujet que sa manière d''agir est mauvaise. '
  '8':
  - type: text
    content: 'Montez donc à cette fête! Quant à moi, je n''y monte pas encore parce que le moment n''est pas encore arrivé pour moi.» '
  '9':
  - type: text
    content: Après leur avoir dit cela, il resta en Galilée.
