document_id: JHN.7
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Jésus à la fête des tentes
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Après cela, Jésus continua de parcourir la Galilée; il ne voulait pas séjourner en Judée car les Juifs cherchaient à le faire mourir. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Or, la fête juive des tentes était proche. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Ses frères lui dirent: «Pars d''ici et va en Judée afin que tes disciples voient aussi ce que tu fais. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Personne n''agit en secret, s''il cherche à être connu. Puisque tu fais ce genre de choses, montre-toi au monde!» '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'En effet, ses frères non plus ne croyaient pas en lui. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Jésus leur dit: «Le moment n''est pas encore venu pour moi, tandis que pour vous, c''est toujours le bon moment. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Le monde ne peut pas vous détester, tandis que moi, il me déteste parce que je témoigne à son sujet que sa manière d''agir est mauvaise. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Montez donc à cette fête! Quant à moi, je n''y monte pas encore parce que le moment n''est pas encore arrivé pour moi.» '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Après leur avoir dit cela, il resta en Galilée.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Lorsque ses frères furent montés à la fête, il y monta aussi lui-même, non pas en se montrant, mais [comme] en secret. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Les Juifs le cherchaient pendant la fête et disaient: «Où est-il?» '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Dans la foule, on murmurait beaucoup à son sujet. Les uns disaient: «C''est un homme bien.» D''autres disaient: «Non, au contraire, il égare le peuple.» '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Personne, toutefois, ne parlait ouvertement de lui, par crainte des chefs juifs.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'C''était déjà le milieu de la fête lorsque Jésus monta au temple et se mit à enseigner. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Les Juifs s''étonnaient et disaient: «Comment connaît-il les Ecritures, lui qui n''a pas étudié?» '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Jésus leur répondit: «Mon enseignement ne vient pas de moi mais de celui qui m''a envoyé. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Si quelqu''un veut faire la volonté de Dieu, il saura si mon enseignement vient de Dieu ou si je parle de ma propre initiative. '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Celui qui parle de sa propre initiative cherche sa propre gloire, mais si quelqu''un cherche la gloire de celui qui l''a envoyé, celui-là est vrai et il n''y a pas d''injustice en lui. '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Moïse ne vous a-t-il pas donné la loi? Or, aucun de vous ne la met en pratique. Pourquoi cherchez-vous à me faire mourir?» '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'La foule répondit: «Tu as un démon. Qui cherche à te faire mourir?» '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Jésus leur répondit: «Pour une seule œuvre'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '7.21 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Une seule œuvre: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: la guérison d'un malade le jour du sabbat (
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 5.1-9
      metadata:
        usfm: JHN.5.1+JHN.5.2+JHN.5.3+JHN.5.4+JHN.5.5+JHN.5.6+JHN.5.7+JHN.5.8+JHN.5.9
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ).
    marker-yv: yv-n
  - type: text
    text: ' que j''ai faite, vous êtes tous étonnés. '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: Moïse vous a donné la circoncision
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '7.22 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Circoncision: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: cette opération consistant à enlever le prépuce avait été le signe de l'alliance conclue par Dieu avec Abraham, l'ancêtre des Israélites (
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Genèse 17.9-14
      metadata:
        usfm: GEN.17.9+GEN.17.10+GEN.17.11+GEN.17.12+GEN.17.13+GEN.17.14
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '). D''après '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Lévitique 12.3
      metadata:
        usfm: LEV.12.3
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ', elle devait intervenir lorsque le garçon avait 8 jours.'
    marker-yv: yv-n
  - type: text
    text: ' - qui ne vient du reste pas de lui, mais des patriarches - et vous circoncisez un homme le jour du sabbat. '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Si pour respecter la loi de Moïse un homme reçoit la circoncision le jour du sabbat, pourquoi vous irritez-vous contre moi parce que j''ai guéri un homme tout entier le jour du sabbat? '
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: Ne jugez pas d'après l'apparence, mais portez un jugement juste.»
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Quelques habitants de Jérusalem disaient: «N''est-ce pas celui qu''ils cherchent à faire mourir? '
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Le voici qui parle librement et ils ne lui disent rien! Est-ce que les chefs auraient vraiment reconnu qu''il est le Messie? '
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'Cependant celui-ci, nous savons d''où il est, tandis que le Messie, quand il viendra, personne ne saura d''où il est.» '
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'Jésus enseignait dans le temple. Il s''écria alors: «Vous me connaissez et vous savez d''où je suis! Pourtant je ne suis pas venu de moi-même. Au contraire, celui qui m''a envoyé est vrai et vous ne le connaissez pas. '
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'Pour ma part, je le connais, car je viens d''auprès de lui et c''est lui qui m''a envoyé.» '
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'Ils cherchaient donc à l''arrêter, mais personne ne mit la main sur lui parce que son heure n''était pas encore venue. '
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'Beaucoup parmi la foule crurent en lui, et ils disaient: «Le Messie, quand il viendra, fera-t-il plus de signes miraculeux que n''en a fait celui-ci?» '
  - type: usfm
    marker: v
    metadata:
      v: '32'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: Les pharisiens entendirent la foule murmurer ces propos à son sujet. Alors les chefs des prêtres et les pharisiens envoyèrent des gardes pour l'arrêter.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '33'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: 'Jésus dit: «Je suis encore avec vous pour un peu de temps, puis je m''en vais vers celui qui m''a envoyé. '
  - type: usfm
    marker: v
    metadata:
      v: '34'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: 'Vous me chercherez et vous ne me trouverez pas, et là où je serai, vous ne pouvez pas venir.» '
  - type: usfm
    marker: v
    metadata:
      v: '35'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: 'Les Juifs se dirent alors entre eux: «Où ira-t-il, pour que nous ne le trouvions pas? Ira-t-il chez ceux qui sont dispersés dans le reste du monde et enseignera-t-il les non-Juifs? '
  - type: usfm
    marker: v
    metadata:
      v: '36'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: 'Que signifie cette parole qu''il a dite: ‘Vous me chercherez et vous ne me trouverez pas, et là où je serai, vous ne pouvez pas venir’?»'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '37'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: 'Le dernier jour, le grand jour de la fête, Jésus, debout, s''écria: «Si quelqu''un a soif, qu''il vienne à moi et qu''il boive. '
  - type: usfm
    marker: v
    metadata:
      v: '38'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: text
    text: 'Celui qui croit en moi, des fleuves d''eau vive couleront de lui, comme l''a dit l''Ecriture.» '
  - type: usfm
    marker: v
    metadata:
      v: '39'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '39'
  - type: text
    text: Il dit cela à propos de l'Esprit que devaient recevoir ceux qui croiraient en lui. En effet, l'Esprit [saint] n'avait pas encore été donné parce que Jésus n'avait pas encore été élevé dans sa gloire.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '40'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '40'
  - type: text
    text: 'Après avoir entendu ces paroles, beaucoup dans la foule disaient: «Celui-ci est vraiment le prophète.» '
  - type: usfm
    marker: v
    metadata:
      v: '41'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '41'
  - type: text
    text: 'D''autres disaient: «C''est le Messie.» Mais d''autres disaient: «Est-ce bien de la Galilée que doit venir le Messie? '
  - type: usfm
    marker: v
    metadata:
      v: '42'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '42'
  - type: text
    text: 'L''Ecriture ne dit-elle pas que c''est de la descendance de David et du village de Bethléhem où était David que le Messie doit venir?» '
  - type: usfm
    marker: v
    metadata:
      v: '43'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '43'
  - type: text
    text: 'Il y eut donc, à cause de lui, division parmi la foule. '
  - type: usfm
    marker: v
    metadata:
      v: '44'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '44'
  - type: text
    text: Quelques-uns d'entre eux voulaient l'arrêter, mais personne ne mit la main sur lui.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '45'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '45'
  - type: text
    text: 'Ainsi, les gardes retournèrent vers les chefs des prêtres et les pharisiens, qui leur dirent: «Pourquoi ne l''avez-vous pas amené?» '
  - type: usfm
    marker: v
    metadata:
      v: '46'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '46'
  - type: text
    text: 'Les gardes répondirent: «Jamais personne n''a parlé comme cet homme.» '
  - type: usfm
    marker: v
    metadata:
      v: '47'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '47'
  - type: text
    text: 'Les pharisiens leur répliquèrent: «Est-ce que vous aussi, vous vous êtes laissé tromper? '
  - type: usfm
    marker: v
    metadata:
      v: '48'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '48'
  - type: text
    text: 'Y a-t-il quelqu''un parmi les chefs ou les pharisiens qui ait cru en lui? '
  - type: usfm
    marker: v
    metadata:
      v: '49'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '49'
  - type: text
    text: 'Mais cette foule qui ne connaît pas la loi, ce sont des maudits!» '
  - type: usfm
    marker: v
    metadata:
      v: '50'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '50'
  - type: text
    text: 'Nicodème, qui était venu de nuit vers Jésus et qui était l''un d''eux, leur dit: '
  - type: usfm
    marker: v
    metadata:
      v: '51'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '51'
  - type: text
    text: '«Notre loi condamne-t-elle un homme avant qu''on l''entende et qu''on sache ce qu''il a fait?» '
  - type: usfm
    marker: v
    metadata:
      v: '52'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '52'
  - type: text
    text: 'Ils lui répondirent: «Es-tu, toi aussi, de la Galilée? Cherche bien et tu verras que de la Galilée il ne sort pas de prophète.» '
  - type: usfm
    marker: v
    metadata:
      v: '53'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '53'
  - type: text
    text: '[Puis chacun rentra chez soi.'
