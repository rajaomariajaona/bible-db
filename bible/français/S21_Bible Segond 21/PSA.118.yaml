document_id: PSA.118
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Louange à Dieu pour sa bonté
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Louez l'Eternel, car il est bon!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Oui, sa bonté dure éternellement!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Qu''Israël le dise: «Oui, sa bonté dure éternellement!»'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Que la famille d''Aaron le dise:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: «Oui, sa bonté dure éternellement!»
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Que ceux qui craignent l''Eternel le disent:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: «Oui, sa bonté dure éternellement!»
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Du fond de la détresse j'ai fait appel à l'Eternel.
- type: usfm
  marker: q1
  children:
  - type: text
    text: L'Eternel m'a répondu, il m'a délivré.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: '*L''Eternel est pour moi, je n''ai peur de rien:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: que peuvent me faire des hommes?
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '118.6 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'L''Eternel… hommes: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'cité en '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Hébreux 13.6
      metadata:
        usfm: HEB.13.6
    - type: usfm
      marker: ft
      children:
      - type: text
        text: .
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: L'Eternel est mon secours,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et je regarde mes ennemis en face.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Mieux vaut chercher un refuge en l'Eternel
- type: usfm
  marker: q1
  children:
  - type: text
    text: que de mettre votre confiance dans l'homme;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: mieux vaut chercher un refuge en l'Eternel
- type: usfm
  marker: q1
  children:
  - type: text
    text: que de mettre votre confiance dans les grands.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Toutes les nations m''entouraient:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: au nom de l'Eternel, je les taille en pièces.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Elles m''entouraient, m''encerclaient:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: au nom de l'Eternel, je les taille en pièces.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Elles m''entouraient comme des abeilles:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: elles s'éteignent comme un feu de ronces,
- type: usfm
  marker: q1
  children:
  - type: text
    text: au nom de l'Eternel, je les taille en pièces.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Tu me bousculais pour me faire tomber,
- type: usfm
  marker: q1
  children:
  - type: text
    text: mais l'Eternel m'a secouru.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: '*L''Eternel est ma force et le sujet de mes louanges,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: c'est lui qui m'a sauvé.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '118.14 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'L''Eternel… sauvé: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'paroles du cantique de Moïse et des Israélites après la traversée de la mer en '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Exode 15.2
      metadata:
        usfm: EXO.15.2
    - type: usfm
      marker: ft
      children:
      - type: text
        text: .
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Des cris de triomphe et de délivrance s''élèvent dans les tentes des justes:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: la main droite de l'Eternel agit avec puissance!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: La main droite de l'Eternel est élevée,
- type: usfm
  marker: q1
  children:
  - type: text
    text: la main droite de l'Eternel agit avec puissance!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Je ne mourrai pas, je vivrai,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et je raconterai ce que l'Eternel a fait.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: L'Eternel m'a corrigé,
- type: usfm
  marker: q1
  children:
  - type: text
    text: mais il ne m'a pas livré à la mort.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Ouvrez-moi les portes de la justice:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: j'entrerai et je louerai l'Eternel.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Voici la porte de l''Eternel:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: c'est par elle que les justes entrent.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Je te loue, parce que tu m'as répondu,
- type: usfm
  marker: q1
  children:
  - type: text
    text: parce que tu m'as sauvé.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: '*La pierre qu''ont rejetée ceux qui construisaient'
- type: usfm
  marker: q1
  children:
  - type: text
    text: est devenue la pierre angulaire.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: C'est l'œuvre de l'Eternel
- type: usfm
  marker: q1
  children:
  - type: text
    text: et c'est un prodige à nos yeux.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '118.22-23 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'La pierre… nos yeux: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'cité entièrement en '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Matthieu 21.42
      metadata:
        usfm: MAT.21.42
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Marc 12.10-11
      metadata:
        usfm: MRK.12.10+MRK.12.11
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' et partiellement (verset 22) en '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Luc 20.17
      metadata:
        usfm: LUK.20.17
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Actes 4.11
      metadata:
        usfm: ACT.4.11
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 1 Pierre 2.7
      metadata:
        usfm: 1PE.2.7
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' pour présenter Jésus-Christ comme pierre angulaire rejetée par la majorité des Juifs de son époque.'
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Voici le jour que l''Eternel a fait:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: qu'il soit pour nous un sujet d'allégresse et de joie!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: Eternel, *accorde donc le salut!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Eternel, donne le succès!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: Béni soit celui qui vient au nom de l'Eternel!
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '118.25-26 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Accorde… l''Eternel: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'cité par les foules pour acclamer Jésus en '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Matthieu 21.9
      metadata:
        usfm: MAT.21.9
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Marc 11.9
      metadata:
        usfm: MRK.11.9
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Luc 13.35
      metadata:
        usfm: LUK.13.35
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: '19.38'
      metadata:
        usfm: LUK.19.38
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Jean 12.13
      metadata:
        usfm: JHN.12.13
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' ainsi qu''en '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Matthieu 23.39
      metadata:
        usfm: MAT.23.39
    - type: usfm
      marker: ft
      children:
      - type: text
        text: . Accorde donc le salut se transcrit hosanna.
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: text
    text: Nous vous bénissons de la maison de l'Eternel.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: L'Eternel est Dieu, et il nous éclaire.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Attachez la victime de la fête avec des liens
- type: usfm
  marker: q1
  children:
  - type: text
    text: aux cornes de l'autel!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: Tu es mon Dieu et je te louerai,
- type: usfm
  marker: q1
  children:
  - type: text
    text: mon Dieu, je proclamerai ta grandeur.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: Louez l'Eternel, car il est bon!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Oui, sa bonté dure éternellement!
