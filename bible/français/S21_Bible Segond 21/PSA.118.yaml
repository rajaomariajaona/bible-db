document_id: PSA.118,152
type_code: fra
verses:
  '1':
  - type: heading
    content: Louange à Dieu pour sa bonté
  - type: text
    content: Louez l'Eternel, car il est bon!
  - type: text
    content: Oui, sa bonté dure éternellement!
  '10':
  - type: text
    content: 'Toutes les nations m''entouraient:'
  - type: text
    content: au nom de l'Eternel, je les taille en pièces.
  '11':
  - type: text
    content: 'Elles m''entouraient, m''encerclaient:'
  - type: text
    content: au nom de l'Eternel, je les taille en pièces.
  '12':
  - type: text
    content: 'Elles m''entouraient comme des abeilles:'
  - type: text
    content: elles s'éteignent comme un feu de ronces,
  - type: text
    content: au nom de l'Eternel, je les taille en pièces.
  '13':
  - type: text
    content: Tu me bousculais pour me faire tomber,
  - type: text
    content: mais l'Eternel m'a secouru.
  '14':
  - type: text
    content: '*L''Eternel est ma force et le sujet de mes louanges,'
  - type: text
    content: c'est lui qui m'a sauvé.
  - type: note
    content: 'L''Eternel… sauvé: paroles du cantique de Moïse et des Israélites après la traversée de la mer en Exode 15.2.'
  '15':
  - type: text
    content: 'Des cris de triomphe et de délivrance s''élèvent dans les tentes des justes:'
  - type: text
    content: la main droite de l'Eternel agit avec puissance!
  '16':
  - type: text
    content: La main droite de l'Eternel est élevée,
  - type: text
    content: la main droite de l'Eternel agit avec puissance!
  '17':
  - type: text
    content: Je ne mourrai pas, je vivrai,
  - type: text
    content: et je raconterai ce que l'Eternel a fait.
  '18':
  - type: text
    content: L'Eternel m'a corrigé,
  - type: text
    content: mais il ne m'a pas livré à la mort.
  '19':
  - type: text
    content: 'Ouvrez-moi les portes de la justice:'
  - type: text
    content: j'entrerai et je louerai l'Eternel.
  '2':
  - type: text
    content: 'Qu''Israël le dise: «Oui, sa bonté dure éternellement!»'
  '20':
  - type: text
    content: 'Voici la porte de l''Eternel:'
  - type: text
    content: c'est par elle que les justes entrent.
  '21':
  - type: text
    content: Je te loue, parce que tu m'as répondu,
  - type: text
    content: parce que tu m'as sauvé.
  '22':
  - type: text
    content: '*La pierre qu''ont rejetée ceux qui construisaient'
  - type: text
    content: est devenue la pierre angulaire.
  '23':
  - type: text
    content: C'est l'œuvre de l'Eternel
  - type: text
    content: et c'est un prodige à nos yeux.
  - type: note
    content: 'La pierre… nos yeux: cité entièrement en Matthieu 21.42; Marc 12.10-11 et partiellement (verset 22) en Luc 20.17; Actes 4.11; 1 Pierre 2.7 pour présenter Jésus-Christ comme pierre angulaire rejetée par la majorité des Juifs de son époque.'
  '24':
  - type: text
    content: 'Voici le jour que l''Eternel a fait:'
  - type: text
    content: qu'il soit pour nous un sujet d'allégresse et de joie!
  '25':
  - type: text
    content: Eternel, *accorde donc le salut!
  - type: text
    content: Eternel, donne le succès!
  '26':
  - type: text
    content: Béni soit celui qui vient au nom de l'Eternel!
  - type: note
    content: 'Accorde… l''Eternel: cité par les foules pour acclamer Jésus en Matthieu 21.9; Marc 11.9; Luc 13.35; 19.38; Jean 12.13 ainsi qu''en Matthieu 23.39. Accorde donc le salut se transcrit hosanna.'
  - type: text
    content: Nous vous bénissons de la maison de l'Eternel.
  '27':
  - type: text
    content: L'Eternel est Dieu, et il nous éclaire.
  - type: text
    content: Attachez la victime de la fête avec des liens
  - type: text
    content: aux cornes de l'autel!
  '28':
  - type: text
    content: Tu es mon Dieu et je te louerai,
  - type: text
    content: mon Dieu, je proclamerai ta grandeur.
  '29':
  - type: text
    content: Louez l'Eternel, car il est bon!
  - type: text
    content: Oui, sa bonté dure éternellement!
  '3':
  - type: text
    content: 'Que la famille d''Aaron le dise:'
  - type: text
    content: «Oui, sa bonté dure éternellement!»
  '4':
  - type: text
    content: 'Que ceux qui craignent l''Eternel le disent:'
  - type: text
    content: «Oui, sa bonté dure éternellement!»
  '5':
  - type: text
    content: Du fond de la détresse j'ai fait appel à l'Eternel.
  - type: text
    content: L'Eternel m'a répondu, il m'a délivré.
  '6':
  - type: text
    content: '*L''Eternel est pour moi, je n''ai peur de rien:'
  - type: text
    content: que peuvent me faire des hommes?
  - type: note
    content: 'L''Eternel… hommes: cité en Hébreux 13.6.'
  '7':
  - type: text
    content: L'Eternel est mon secours,
  - type: text
    content: et je regarde mes ennemis en face.
  '8':
  - type: text
    content: Mieux vaut chercher un refuge en l'Eternel
  - type: text
    content: que de mettre votre confiance dans l'homme;
  '9':
  - type: text
    content: mieux vaut chercher un refuge en l'Eternel
  - type: text
    content: que de mettre votre confiance dans les grands.
