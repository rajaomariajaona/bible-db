document_id: EZR.8
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Les compagnons d'Esdras
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Voici, avec leur généalogie, les chefs de famille qui sont montés de Babylone avec moi sous le règne du roi Artaxerxès: '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'parmi les descendants de Phinées, Guershom; parmi les descendants d''Ithamar, Daniel; parmi les descendants de David, Hatthush, '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'un des fils de Shecania; parmi les descendants de Pareosh, Zacharie, et avec lui 150 hommes enregistrés; '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'parmi les descendants de Pachath-Moab, Eljoénaï, fils de Zerachja, et avec lui 200 hommes; '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'parmi les descendants de Shecania, le fils de Jachaziel, et avec lui 300 hommes; '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'parmi les descendants d''Adin, Ebed, fils de Jonathan, et avec lui 50 hommes; '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'parmi les descendants d''Elam, Esaïe, fils d''Athalia, et avec lui 70 hommes; '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'parmi les descendants de Shephathia, Zebadia, fils de Micaël, et avec lui 80 hommes; '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'parmi les descendants de Joab, Abdias, fils de Jehiel, et avec lui 218 hommes; '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'parmi les descendants de Shelomith, le fils de Josiphia, et avec lui 160 hommes; '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'parmi les descendants de Bébaï, Zacharie, fils de Bébaï, et avec lui 28 hommes; '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'parmi les descendants d''Azgad, Jochanan, fils d''Hakkathan, et avec lui 110 hommes; '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'parmi les descendants d''Adonikam, les plus jeunes, dont voici les noms: Eliphéleth, Jeïel et Shemaeja, et avec eux 60 hommes; '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: parmi les descendants de Bigvaï, Uthaï et Zabbud, et avec eux 70 hommes.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Je les ai rassemblés près du fleuve qui coule vers Ahava et nous avons campé là durant trois jours. J''ai passé en revue le peuple et les prêtres, sans y trouver un seul Lévite. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Alors j''ai fait appeler les chefs Eliézer, Ariel, Shemaeja, Elnathan, Jarib, Elnathan, Nathan, Zacharie et Meshullam, ainsi que les hommes intelligents qu''étaient Jojarib et Elnathan. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Je les ai envoyés vers Iddo, le chef de la localité de Casiphia, et leur ai indiqué avec précision ce qu''ils devaient dire à Iddo et à ses frères, les serviteurs du temple, qui se trouvaient à Casiphia, afin qu''ils nous amènent des assistants pour la maison de notre Dieu. '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Comme la bonne main de notre Dieu reposait sur nous, ils nous ont envoyé un homme plein de bon sens, qui était un descendant de Machli, lui-même descendant de Lévi, le fils d''Israël, à savoir Shérébia, et avec lui ses fils et ses frères, au nombre de 18. '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Ils ont envoyé aussi Hashabia et avec lui Esaïe, un descendant de Merari, ses frères et leurs fils, au nombre de 20, '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: ainsi que, parmi les serviteurs du temple que David et les chefs avaient établis au service des Lévites, 220 hommes, tous nommément désignés.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Là, près du fleuve d''Ahava, j''ai proclamé un jeûne d''humiliation devant notre Dieu, afin de le prier de nous accorder un heureux voyage, à nous, à nos enfants et à tout ce qui nous appartenait. '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'J''aurais eu honte de demander au roi une escorte et des cavaliers pour nous protéger contre l''ennemi pendant la route, car nous lui avions affirmé: «La main de notre Dieu repose sur tous ceux qui le recherchent afin de leur faire du bien, tandis que sa force et sa colère frappent tous ceux qui l''abandonnent.» '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: C'est pour cela que nous avons jeûné et recherché notre Dieu, et il a accueilli favorablement notre prière.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'J''ai pris à part douze chefs des prêtres – Shérébia, Hashabia et dix de leurs frères – '
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'et j''ai pesé devant eux l''argent, l''or et les ustensiles offerts à titre de contribution pour la maison de notre Dieu par le roi, ses conseillers et ses chefs, ainsi que par tous les Israélites qu''on avait trouvés. '
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Je leur ai ainsi confié près de 20 tonnes d''argent, des ustensiles en argent pour un poids de 3 tonnes, 3 tonnes d''or, '
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: '20 coupes en or pour une valeur de 1000 pièces et deux vases d''un beau bronze poli aussi précieux que l''or. '
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'Puis je leur ai dit: «Vous êtes consacrés à l''Eternel, tout comme ces ustensiles, et cet argent et cet or sont une offrande volontaire à l''Eternel, le Dieu de vos ancêtres. '
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'Restez vigilants et attentifs jusqu''à ce que vous puissiez les peser devant les chefs des prêtres, les Lévites et les chefs de famille d''Israël, à Jérusalem, dans les chambres de la maison de l''Eternel.» '
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: Les prêtres et les Lévites ont accepté de se charger de cette masse d'argent, d'or et d'ustensiles pour l'amener à Jérusalem, dans la maison de notre Dieu.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'Le douzième jour du premier mois, nous avons quitté le fleuve d''Ahava pour Jérusalem. La main de notre Dieu reposait sur nous et elle nous a délivrés de toute attaque et de toute embuscade pendant la route. '
  - type: usfm
    marker: v
    metadata:
      v: '32'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'A notre arrivée à Jérusalem, nous nous sommes reposés pendant trois jours. '
  - type: usfm
    marker: v
    metadata:
      v: '33'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: 'Le quatrième jour, nous avons pesé dans la maison de notre Dieu l''argent, l''or et les ustensiles et nous les avons confiés au prêtre Merémoth, fils d''Urie; il y avait avec lui Eléazar, fils de Phinées. Avec eux se trouvaient aussi les Lévites Jozabad, fils de Josué, et Noadia, fils de Binnuï. '
  - type: usfm
    marker: v
    metadata:
      v: '34'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: On a vérifié le nombre et le poids de tous les éléments et l'on a mis par écrit, à ce moment-là, le poids de l'ensemble.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '35'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: 'A leur retour de déportation, les Juifs issus de l''exil ont offert en holocauste au Dieu d''Israël 12 taureaux pour tout Israël, 96 béliers, 77 agneaux, ainsi que 12 boucs comme victimes expiatoires. L''ensemble a constitué un holocauste en l''honneur de l''Eternel. '
  - type: usfm
    marker: v
    metadata:
      v: '36'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: Ils ont transmis les ordres du roi à ses satrapes et aux gouverneurs de la région située à l'ouest de l'Euphrate, et ceux-ci ont apporté leur soutien au peuple et à la maison de Dieu.
