document_id: GEN.29,152
type_code: fra
verses:
  '1':
  - type: heading
    content: Jacob à Charan
  - type: text
    content: 'Jacob se remit en marche et gagna la région des nomades de l''est. '
  '10':
  - type: text
    content: 'Lorsque Jacob vit Rachel, la fille de Laban, le frère de sa mère, et le troupeau de Laban, le frère de sa mère, il s''approcha, roula la pierre de dessus l''ouverture du puits et fit boire le troupeau de Laban, le frère de sa mère. '
  '11':
  - type: text
    content: 'Jacob embrassa Rachel et se mit à pleurer tout haut. '
  '12':
  - type: text
    content: 'Jacob apprit à Rachel qu''il était un parent de son père, qu''il était le fils de Rebecca. Elle courut l''annoncer à son père. '
  '13':
  - type: text
    content: 'Dès que Laban eut entendu parler de Jacob, le fils de sa sœur, il courut à sa rencontre, l''étreignit tendrement et l''embrassa. Puis il le fit venir chez lui. Jacob raconta tous ces événements à Laban, '
  '14':
  - type: text
    content: 'et Laban lui dit: «C''est certain, tu es bien fait des mêmes os et de la même chair que moi.»'
  - type: heading
    content: Léa et Rachel
  - type: text
    content: 'Jacob habita un mois chez Laban, '
  '15':
  - type: text
    content: 'puis ce dernier lui dit: «Parce que tu fais partie de ma parenté, devrais-tu me servir pour rien? Dis-moi quel sera ton salaire.» '
  '16':
  - type: text
    content: 'Or Laban avait deux filles. L''aînée s''appelait Léa, et la cadette Rachel. '
  '17':
  - type: text
    content: 'Léa avait les yeux fragiles, tandis que Rachel était belle à tout point de vue. '
  '18':
  - type: text
    content: 'Jacob aimait Rachel. Il dit donc: «Je te servirai 7 ans pour Rachel, ta fille cadette.» '
  '19':
  - type: text
    content: 'Laban dit: «Je préfère te la donner à toi qu''à un autre homme. Reste chez moi!»'
  '2':
  - type: text
    content: 'Il regarda: il y avait un puits dans les champs et, à côté, trois troupeaux de brebis qui se reposaient, car c''était à ce puits qu''on faisait boire les troupeaux. La pierre placée sur l''ouverture du puits était grande. '
  '20':
  - type: text
    content: 'Ainsi, Jacob servit 7 ans pour Rachel. Ils lui parurent comme quelques jours parce qu''il l''aimait. '
  '21':
  - type: text
    content: 'Puis Jacob dit à Laban: «Donne-moi ma femme, car je suis allé jusqu''au bout de mon contrat et je veux m''unir à elle.» '
  '22':
  - type: text
    content: 'Laban réunit tous les habitants de l''endroit et donna un festin. '
  '23':
  - type: text
    content: 'Le soir, il prit sa fille Léa et l''amena vers Jacob qui s''unit à elle. '
  '24':
  - type: text
    content: Laban donna sa servante Zilpa pour servante à sa fille Léa.
  '25':
  - type: text
    content: 'Le lendemain matin, voilà que c''était Léa. Jacob dit alors à Laban: «Qu''est-ce que tu m''as fait? N''est-ce pas pour Rachel que j''ai servi chez toi? Pourquoi m''as-tu trompé?» '
  '26':
  - type: text
    content: 'Laban dit: «Cela ne se fait pas, chez nous, de donner la plus jeune avant l''aînée. '
  '27':
  - type: text
    content: 'Termine la semaine avec celle-ci et nous te donnerons aussi l''autre pour le service que tu feras encore chez moi pendant sept nouvelles années.» '
  '28':
  - type: text
    content: 'C''est ce que fit Jacob: il termina la semaine avec Léa, puis Laban lui donna pour femme sa fille Rachel. '
  '29':
  - type: text
    content: Laban donna sa servante Bilha pour servante à sa fille Rachel.
  '3':
  - type: text
    content: Tous les troupeaux se rassemblaient là, on roulait la pierre de dessus l'ouverture du puits, on faisait boire les troupeaux et l'on remettait la pierre à sa place sur l'ouverture du puits.
  '30':
  - type: text
    content: Jacob s'unit aussi à Rachel, qu'il préférait même à Léa, et il servit encore chez Laban pendant sept nouvelles années.
  - type: heading
    content: Les enfants de Jacob
  '31':
  - type: text
    content: 'L''Eternel vit que Léa n''était pas aimée, et il lui permit d''avoir des enfants, tandis que Rachel était stérile. '
  '32':
  - type: text
    content: 'Léa tomba enceinte et mit au monde un fils qu''elle appela Ruben, car elle dit: «L''Eternel a vu mon humiliation et désormais mon mari m''aimera.» '
  '33':
  - type: text
    content: 'Elle tomba encore enceinte et mit au monde un fils, et elle dit: «L''Eternel a entendu que je n''étais pas aimée et il m''a aussi accordé celui-ci.» Et elle lui donna le nom de Siméon. '
  '34':
  - type: text
    content: 'Elle tomba encore enceinte et mit au monde un fils, et elle dit: «Cette fois-ci, mon mari s''attachera à moi, car je lui ai donné trois fils.» C''est pourquoi on l''appela Lévi. '
  '35':
  - type: text
    content: 'Elle tomba encore enceinte et mit au monde un fils, et elle dit: «Cette fois, je célébrerai l''Eternel.» C''est pourquoi elle lui donna le nom de Juda. Puis elle cessa d''avoir des enfants.'
  '4':
  - type: text
    content: 'Jacob demanda aux bergers: «Mes frères, d''où êtes-vous?» Ils répondirent: «Nous sommes de Charan.» '
  '5':
  - type: text
    content: 'Il leur demanda: «Connaissez-vous Laban, le petit-fils de Nachor?» Ils répondirent: «Nous le connaissons.» '
  '6':
  - type: text
    content: 'Il leur demanda: «Est-il en bonne santé?» Ils répondirent: «Il est en bonne santé, et voici sa fille Rachel qui arrive avec le troupeau.» '
  '7':
  - type: text
    content: 'Il dit: «Il fait encore grand jour, ce n''est pas le moment de rassembler les troupeaux. Faites boire les brebis, puis allez les faire brouter!» '
  '8':
  - type: text
    content: 'Ils répondirent: «Nous ne pouvons pas le faire tant que tous les troupeaux ne sont pas rassemblés. C''est à ce moment-là qu''on roule la pierre de dessus l''ouverture du puits et qu''on fait boire les brebis.»'
  '9':
  - type: text
    content: 'Il leur parlait encore quand Rachel arriva avec le troupeau de son père. En effet, elle était bergère. '
