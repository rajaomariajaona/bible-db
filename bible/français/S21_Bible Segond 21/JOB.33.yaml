document_id: JOB.33
type_code: fra
segments:
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: »Maintenant donc, Job, écoute mes propos,
- type: usfm
  marker: q1
  children:
  - type: text
    text: prête l'oreille à toutes mes paroles!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: J'ai ouvert la bouche,
- type: usfm
  marker: q1
  children:
  - type: text
    text: les mots se bousculent dans mon palais.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: C'est un cœur droit qui inspirera mes paroles,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'c''est un savoir pur que mes lèvres exprimeront:'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: l'Esprit de Dieu m'a créé,
- type: usfm
  marker: q1
  children:
  - type: text
    text: le souffle du Tout-Puissant m'anime.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Si tu le peux, réponds-moi,
- type: usfm
  marker: q1
  children:
  - type: text
    text: prends tes dispositions, tiens-toi prêt!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Devant Dieu je suis ton semblable,
- type: usfm
  marker: q1
  children:
  - type: text
    text: j'ai été comme toi tiré de la boue;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: ainsi, mes terreurs ne te tourmenteront pas
- type: usfm
  marker: q1
  children:
  - type: text
    text: et mon autorité ne pèsera pas sur toi.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: »Cependant, tu as bien dit devant moi,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'et j''entends encore le son de tes paroles:'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: ‘Je suis pur, je n'ai pas commis de transgression.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Je suis irréprochable, je n'ai pas commis de faute.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Pourtant, Dieu a trouvé des raisons de s'en prendre à moi,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'il me traite comme son ennemi:'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: il met mes pieds dans des entraves,
- type: usfm
  marker: q1
  children:
  - type: text
    text: il surveille tous mes mouvements.’
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: »Je te répondrai que sur ce point-là, tu as tort.
- type: usfm
  marker: q1
  children:
  - type: text
    text: En effet, Dieu est plus grand que l'homme.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Pourquoi donc entrer en procès avec lui
- type: usfm
  marker: q1
  children:
  - type: text
    text: parce qu'il ne rend aucun compte de ses actes?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: »Dieu parle cependant, tantôt d'une manière,
- type: usfm
  marker: q1
  children:
  - type: text
    text: tantôt d'une autre, et on ne le remarque pas.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Il parle par des rêves, par des visions nocturnes,
- type: usfm
  marker: q1
  children:
  - type: text
    text: quand un sommeil profond tombe sur les hommes,
- type: usfm
  marker: q1
  children:
  - type: text
    text: quand ils sont endormis sur leur lit.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Il leur communique alors son message
- type: usfm
  marker: q1
  children:
  - type: text
    text: et confirme les avertissements qu'il leur donne.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Il veut ainsi détourner l'homme de sa manière de faire.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Il évite à l'homme fort de tomber dans l'orgueil,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: il préserve son âme de la tombe
- type: usfm
  marker: q1
  children:
  - type: text
    text: et sa vie de la menace du javelot.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: »Par la douleur aussi, l'homme est corrigé,
- type: usfm
  marker: q1
  children:
  - type: text
    text: quand il est cloué au lit, quand tous ses os s'engourdissent.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Alors il prend en dégoût la nourriture, même les aliments les plus désirables.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Sa chair dépérit à vue d’œil,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ses os qu'on ne voyait pas transparaissent.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: Son âme s'approche de la tombe,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et sa vie des messagers de la mort.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: Cependant, s'il y a pour lui un ange intercesseur,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ne serait-ce qu'un sur les mille qui annoncent à l'homme le chemin à suivre,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Dieu lui fait grâce et dit:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: ‘Délivre-le afin qu'il ne descende pas dans la tombe!
- type: usfm
  marker: q1
  children:
  - type: text
    text: J'ai trouvé une rançon.’
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: »Son corps retrouve alors la fraîcheur de la jeunesse,
- type: usfm
  marker: q1
  children:
  - type: text
    text: il revient à l'époque de son adolescence.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: Il adresse sa prière à Dieu et il reçoit un accueil favorable;
- type: usfm
  marker: q1
  children:
  - type: text
    text: il entre dans la présence de Dieu avec des cris de joie
- type: usfm
  marker: q1
  children:
  - type: text
    text: et Dieu le déclare à nouveau juste.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'Il chante devant les hommes et dit:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: ‘J'ai péché, j'ai perverti ce qui était droit,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et je n'ai pas été traité comme je le méritais.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: Dieu a racheté mon âme pour qu'elle n'aille pas dans la tombe
- type: usfm
  marker: q1
  children:
  - type: text
    text: et ma vie peut contempler la lumière!’
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: »Voilà tout ce que Dieu fait,
- type: usfm
  marker: q1
  children:
  - type: text
    text: deux fois, trois fois, avec un homme
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: pour écarter son âme de la tombe
- type: usfm
  marker: q1
  children:
  - type: text
    text: et pour qu'il jouisse encore de la lumière des vivants.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: »Sois attentif, Job, écoute-moi!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Tais-toi, et c'est moi qui parlerai!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: Si tu as quelque chose à dire, réponds-moi!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Parle, car je serais heureux de te donner raison.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: Si tu n'as rien à dire, écoute-moi!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Tais-toi et je t'enseignerai la sagesse.»
