document_id: JOB.33,152
type_code: fra
verses:
  '1':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: »Maintenant donc, Job, écoute mes propos,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: prête l'oreille à toutes mes paroles!
  '10':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Pourtant, Dieu a trouvé des raisons de s'en prendre à moi,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'il me traite comme son ennemi:'
  '11':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: il met mes pieds dans des entraves,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: il surveille tous mes mouvements.’
  '12':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: »Je te répondrai que sur ce point-là, tu as tort.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: En effet, Dieu est plus grand que l'homme.
  '13':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Pourquoi donc entrer en procès avec lui
  - type: usfm
    marker: q1
    children:
    - type: text
      text: parce qu'il ne rend aucun compte de ses actes?
  '14':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: »Dieu parle cependant, tantôt d'une manière,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: tantôt d'une autre, et on ne le remarque pas.
  '15':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Il parle par des rêves, par des visions nocturnes,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: quand un sommeil profond tombe sur les hommes,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: quand ils sont endormis sur leur lit.
  '16':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Il leur communique alors son message
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et confirme les avertissements qu'il leur donne.
  '17':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Il veut ainsi détourner l'homme de sa manière de faire.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Il évite à l'homme fort de tomber dans l'orgueil,
  '18':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: il préserve son âme de la tombe
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et sa vie de la menace du javelot.
  '19':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: »Par la douleur aussi, l'homme est corrigé,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: quand il est cloué au lit, quand tous ses os s'engourdissent.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: J'ai ouvert la bouche,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: les mots se bousculent dans mon palais.
  '20':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Alors il prend en dégoût la nourriture, même les aliments les plus désirables.
  '21':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Sa chair dépérit à vue d’œil,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ses os qu'on ne voyait pas transparaissent.
  '22':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Son âme s'approche de la tombe,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et sa vie des messagers de la mort.
  '23':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Cependant, s'il y a pour lui un ange intercesseur,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ne serait-ce qu'un sur les mille qui annoncent à l'homme le chemin à suivre,
  '24':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Dieu lui fait grâce et dit:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ‘Délivre-le afin qu'il ne descende pas dans la tombe!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: J'ai trouvé une rançon.’
  '25':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: »Son corps retrouve alors la fraîcheur de la jeunesse,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: il revient à l'époque de son adolescence.
  '26':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Il adresse sa prière à Dieu et il reçoit un accueil favorable;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: il entre dans la présence de Dieu avec des cris de joie
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et Dieu le déclare à nouveau juste.
  '27':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Il chante devant les hommes et dit:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ‘J'ai péché, j'ai perverti ce qui était droit,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et je n'ai pas été traité comme je le méritais.
  '28':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Dieu a racheté mon âme pour qu'elle n'aille pas dans la tombe
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et ma vie peut contempler la lumière!’
  '29':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: »Voilà tout ce que Dieu fait,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: deux fois, trois fois, avec un homme
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: C'est un cœur droit qui inspirera mes paroles,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'c''est un savoir pur que mes lèvres exprimeront:'
  '30':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: pour écarter son âme de la tombe
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et pour qu'il jouisse encore de la lumière des vivants.
  '31':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: »Sois attentif, Job, écoute-moi!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tais-toi, et c'est moi qui parlerai!
  '32':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Si tu as quelque chose à dire, réponds-moi!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Parle, car je serais heureux de te donner raison.
  '33':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Si tu n'as rien à dire, écoute-moi!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tais-toi et je t'enseignerai la sagesse.»
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: l'Esprit de Dieu m'a créé,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: le souffle du Tout-Puissant m'anime.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Si tu le peux, réponds-moi,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: prends tes dispositions, tiens-toi prêt!
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Devant Dieu je suis ton semblable,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: j'ai été comme toi tiré de la boue;
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ainsi, mes terreurs ne te tourmenteront pas
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et mon autorité ne pèsera pas sur toi.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: »Cependant, tu as bien dit devant moi,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'et j''entends encore le son de tes paroles:'
  '9':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ‘Je suis pur, je n'ai pas commis de transgression.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Je suis irréprochable, je n'ai pas commis de faute.
