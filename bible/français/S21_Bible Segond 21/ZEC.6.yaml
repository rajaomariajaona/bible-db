document_id: ZEC.6
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Vision de quatre chars
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'J''ai de nouveau levé les yeux et j''ai vu quatre chars sortir d''entre deux montagnes. Les montagnes étaient en bronze. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Au premier char étaient attelés des chevaux roux, au deuxième des chevaux noirs, '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'au troisième des chevaux blancs, et au quatrième des chevaux bruns tachetés. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'J''ai pris la parole et dit à l''ange qui me parlait: «Qu''est-ce que c''est, mon seigneur?» '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'L''ange m''a répondu: «Ce sont les quatre vents du ciel; ils sortent de l''endroit où ils se tenaient devant le Seigneur de toute la terre.» '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Le char auquel étaient attelés les chevaux noirs s''est dirigé vers le pays du nord, et les blancs l''ont suivi; les tachetés se sont dirigés vers le pays du sud. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Les bruns sont sortis et ont demandé à aller parcourir la terre. L''ange leur a dit: «Allez parcourir la terre.» Et ils ont parcouru la terre. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'L''ange m''a appelé et m''a dit: «Regarde! Ceux qui se dirigent vers le pays du nord font reposer mon Esprit sur le pays du nord.»'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'La parole de l''Eternel m''a été adressée: '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: '«Tu recevras les dons des exilés, de Heldaï, de Tobija et de Jedaeja, et tu iras toi-même aujourd''hui, tu iras dans la maison de Josias, fils de Sophonie, où ils se sont rendus en arrivant de Babylone. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Tu prendras l''argent et l''or, et tu en feras des couronnes que tu mettras sur la tête du grand-prêtre Josué, fils de Jotsadak. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Tu lui annonceras: ‘Voici ce que dit l''Eternel, le maître de l''univers: Voici un homme dont le nom est Germe; il germera à sa place et construira le temple de l''Eternel. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'C''est lui qui construira le temple de l''Eternel. Il portera les insignes de la majesté, il siégera sur son trône pour dominer et sera prêtre sur son trône, et une parfaite union régnera entre les deux fonctions.’ '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Les couronnes seront un souvenir pour Hélem, Tobija et Jedaeja, et pour Hen, le fils de Sophonie, dans le temple de l''Eternel. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Ceux qui sont éloignés viendront construire le temple de l'Eternel; alors vous saurez que l'Eternel, le maître de l'univers, m'a envoyé vers vous. Cela arrivera si vous écoutez la voix de l'Eternel, votre Dieu.»
