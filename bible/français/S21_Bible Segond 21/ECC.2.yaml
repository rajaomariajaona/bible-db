document_id: ECC.2
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Les plaisirs, les richesses et le travail
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Je me suis dit dans mon cœur: «Allons! Essaie la joie et tu goûteras au bonheur!» J''ai constaté que cela aussi, c''était de la fumée. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'J''ai traité le rire de folie et j''ai dit, à propos de la joie: «A quoi sert-elle?»'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'J''ai imaginé, dans mon cœur, de livrer mon corps au vin tout en me conduisant avec sagesse et de m''attacher à la folie jusqu''à ce que je voie ce qu''il est bon pour les humains de faire sous le ciel tout au long de leur vie. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Je me suis lancé dans de grandes entreprises: je me suis construit des maisons, je me suis planté des vignes, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'je me suis fait des jardins et des vergers et j''y ai planté toutes sortes d''arbres fruitiers. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Je me suis fait des réservoirs pour arroser des pépinières. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'J''ai acheté des serviteurs et des servantes; j''en ai eu d''autres, nés chez moi. J''ai aussi possédé des troupeaux de bœufs et de brebis, plus que n''importe qui avant moi à Jérusalem. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'J''ai même amassé de l''argent et de l''or, les richesses des rois et des provinces. Je me suis procuré des chanteurs et des chanteuses et ce qui fait le plaisir des hommes: des concubines en quantité. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Je suis devenu grand, plus grand que n''importe qui avant moi à Jérusalem, sans rien perdre de ma sagesse. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Je n''ai rien refusé à mes yeux de tout ce qu''ils réclamaient, je n''ai privé mon cœur d''aucune joie. En effet, mon cœur était réjoui par tout mon travail, et c''est toute la part que j''en ai retirée. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Puis j'ai réfléchi à tout ce que mes mains avaient entrepris, à la peine que j'avais eue pour le faire, et j'ai constaté que tout n'est que fumée et revient à poursuivre le vent. Il n'y a aucun avantage à retirer de ce qu'on fait sous le soleil.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Le même sort pour tous
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'J''ai réfléchi à ce qui caractérise la sagesse, la folie et la stupidité. – En effet, que fera l''homme qui succédera au roi? N''est-ce pas ce qu''on a déjà fait? – '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'J''ai vu que la sagesse a sur la folie le même avantage que la lumière sur l''obscurité: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'le sage a ses yeux bien en place, tandis que l''homme stupide marche dans l''obscurité. Toutefois, j''ai aussi reconnu que le même sort est réservé à l''un et à l''autre, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'et je me suis dit dans mon cœur: «J''aurai le même sort que l''homme stupide. A quoi m''a-t-il donc servi d''être plus sage que lui?» Et je me suis dit dans mon cœur: «C''est encore de la fumée.» '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: En effet, le souvenir que l'on garde du sage n'est pas plus durable que celui que l'on garde de l'homme stupide, puisque, dès les jours suivants, tout est oublié. Comment se fait-il que le sage meure tout comme l'homme stupide?
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Alors j''ai détesté la vie. Oui, ce qui se fait sous le soleil m''a déplu, car tout n''est que fumée et revient à poursuivre le vent. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'J''ai détesté tout le travail que j''ai accompli sous le soleil et dont je dois laisser la jouissance à l''homme qui me succédera. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Et qui sait s'il sera sage ou fou? Pourtant, il sera maître de tout mon travail, de tout le fruit de ma sagesse sous le soleil. Cela aussi, c'est de la fumée.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'J''en suis venu à désespérer à cause de toute la peine que je me suis donnée sous le soleil. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'En effet, un homme peut travailler avec sagesse, savoir-faire et succès, et il doit laisser le produit de son travail à un homme qui ne s''est donné aucune peine pour cela. Cela aussi, c''est de la fumée et c''est un grand malheur. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Oui, que retire l''homme de tout son travail et des préoccupations de son cœur, alors qu''il se donne tant de peine pour cela sous le soleil? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: Ses journées ne sont toutes que souffrance et son activité n'est que chagrin. Même la nuit, son cœur ne connaît pas le repos. Cela aussi, c'est de la fumée.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Le seul bonheur, pour l''homme, consiste à manger, à boire et à se donner du plaisir dans son travail, mais cela aussi, je l''ai bien vu moi-même, dépend de Dieu. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'En effet, qui peut manger et jouir de quelque chose, en dehors de moi? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: Oui, à l'homme qui lui est agréable il donne la sagesse, la connaissance et la joie, mais au pécheur il réserve la tâche de récolter et d'amasser des biens afin de les donner à celui qui est agréable à Dieu. Cela aussi, c'est de la fumée et cela revient à poursuivre le vent.
