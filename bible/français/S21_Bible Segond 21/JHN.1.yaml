document_id: JHN.1,152
type_code: fra
verses:
  '1':
  - type: heading
    content: Présentation de Jésus
  - type: heading
    content: 1.1–4.54
  - type: heading
    content: L'incarnation de la Parole
  - type: text
    content: Au commencement, la Parole
  - type: note
    content: 'La Parole: c''est-à-dire Jésus-Christ.'
  - type: text
    content: ' existait déjà. La Parole était avec Dieu et la Parole était Dieu. '
  '10':
  - type: text
    content: 'Elle était dans le monde et le monde a été fait par elle, pourtant le monde ne l''a pas reconnue. '
  '11':
  - type: text
    content: 'Elle est venue chez les siens, et les siens ne l''ont pas accueillie. '
  '12':
  - type: text
    content: 'Mais à tous ceux qui l''ont acceptée, à ceux qui croient en son nom, elle a donné le droit de devenir enfants de Dieu, '
  '13':
  - type: text
    content: puisqu'ils sont nés non du fait de la nature, ni par une volonté humaine, ni par la volonté d'un mari, mais qu'ils sont nés de Dieu.
  '14':
  - type: text
    content: Et la Parole s'est faite homme, elle a habité parmi nous, pleine de grâce et de vérité, et nous avons contemplé sa gloire, une gloire comme celle du Fils unique venu du Père.
  '15':
  - type: text
    content: 'Jean lui a rendu témoignage et s''est écrié: «C''est celui à propos duquel j''ai dit: ‘Celui qui vient après moi m''a précédé, car il était avant moi.’» '
  '16':
  - type: text
    content: 'Nous avons tous reçu de sa plénitude, et grâce sur grâce. '
  '17':
  - type: text
    content: 'En effet, la loi a été donnée à travers Moïse, mais la grâce et la vérité sont venues à travers Jésus-Christ. '
  '18':
  - type: text
    content: Personne n'a jamais vu Dieu; Dieu le Fils unique, qui est dans l'intimité du Père, est celui qui l'a fait connaître.
  - type: heading
    content: Témoignage de Jean-Baptiste sur Jésus
  '19':
  - type: text
    content: 'Voici le témoignage de Jean lorsque les Juifs envoyèrent de Jérusalem des prêtres et des Lévites pour lui demander: «Toi, qui es-tu?» '
  '2':
  - type: text
    content: 'Elle était au commencement avec Dieu. '
  '20':
  - type: text
    content: 'Il déclara et sans restriction affirma: «Moi, je ne suis pas le Messie'
  - type: note
    content: 'Le Messie: c''est-à-dire l''oint de Dieu, en grec Christos. Les Juifs attendaient, d''après les promesses de l''Ancien Testament, la venue d''une personne choisie par Dieu, qui leur apporterait la délivrance.'
  - type: text
    content: .»
  '21':
  - type: text
    content: 'Ils lui demandèrent: «Qui es-tu donc? Es-tu Elie?» Et il dit: «Je ne le suis pas.» «Es-tu le prophète?» Et il répondit: «Non.» '
  '22':
  - type: text
    content: 'Ils lui dirent alors: «Qui es-tu? Nous devons donner une réponse à ceux qui nous ont envoyés! Que dis-tu de toi-même?» '
  '23':
  - type: text
    content: '«Moi, dit-il, je suis '
  - type: text
    content: 'la voix de celui qui crie dans le désert: ‘Rendez le chemin du Seigneur droit’'
  - type: note
    content: 'La voix… droit: citation d''Esaïe 40.3.'
  - type: text
    content: ', comme l''a dit le prophète Esaïe.» '
  '24':
  - type: text
    content: Ceux qui avaient été envoyés étaient des pharisiens
  - type: note
    content: 'Pharisiens: membres d''un courant du judaïsme caractérisé par un fort intérêt pour les questions de pureté rituelle et par le souci de respecter le plus strictement possible la loi de Moïse ainsi que les traditions.'
  - type: text
    content: '. '
  '25':
  - type: text
    content: 'Ils lui posèrent encore cette question: «Pourquoi donc baptises-tu, si tu n''es ni le Messie, ni Elie, ni le prophète?» '
  '26':
  - type: text
    content: 'Jean leur répondit: «Moi, je baptise d''eau, mais au milieu de vous se trouve quelqu''un que vous ne connaissez pas. '
  '27':
  - type: text
    content: 'Il vient après moi [mais il m''a précédé,] et je ne suis pas digne de détacher la courroie de ses sandales.» '
  '28':
  - type: text
    content: Cela se passait à Béthanie, de l'autre côté du Jourdain, où Jean baptisait.
  '29':
  - type: text
    content: 'Le lendemain, il vit Jésus s''approcher de lui et dit: «Voici l''Agneau'
  - type: note
    content: 'L''Agneau: animal offert en sacrifice pour couvrir les péchés, notamment lors de la Pâque et le jour des expiations.'
  - type: text
    content: ' de Dieu qui enlève le péché du monde. '
  '3':
  - type: text
    content: 'Tout a été fait par elle et rien de ce qui a été fait n''a été fait sans elle. '
  '30':
  - type: text
    content: 'C''est celui à propos duquel j''ai dit: ‘Après moi vient un homme qui m''a précédé, car il existait avant moi.’ '
  '31':
  - type: text
    content: 'Pour ma part, je ne le connaissais pas, mais c''est afin de le faire connaître à Israël que je suis venu baptiser d''eau.» '
  '32':
  - type: text
    content: 'Jean rendit aussi ce témoignage: «J''ai vu l''Esprit descendre du ciel comme une colombe et s''arrêter sur lui. '
  '33':
  - type: text
    content: 'Je ne le connaissais pas, mais celui qui m''a envoyé baptiser d''eau m''a dit: ‘Celui sur qui tu verras l''Esprit descendre et s''arrêter, c''est lui qui baptise du Saint-Esprit.’ '
  '34':
  - type: text
    content: Et moi, j'ai vu et j'atteste qu'il est le Fils de Dieu.»
  '35':
  - type: text
    content: 'Le lendemain, Jean était encore là avec deux de ses disciples. '
  '36':
  - type: text
    content: 'Il vit Jésus passer et dit: «Voici l''Agneau de Dieu.» '
  '37':
  - type: text
    content: 'Les deux disciples l''entendirent prononcer ces paroles et suivirent Jésus. '
  '38':
  - type: text
    content: 'Jésus se retourna et, voyant qu''ils le suivaient, il leur dit: «Que cherchez-vous?» Ils lui répondirent: «Rabbi – ce qui signifie maître –, où habites-tu?» '
  '39':
  - type: text
    content: «Venez, leur dit-il, et voyez.» Ils y allèrent [donc], virent où il habitait et restèrent avec lui ce jour-là. C'était environ quatre heures de l'après-midi.
  '4':
  - type: text
    content: 'En elle il y avait la vie, et cette vie était la lumière des êtres humains. '
  '40':
  - type: text
    content: 'André, le frère de Simon Pierre, était l''un des deux qui avaient entendu les paroles de Jean et qui avaient suivi Jésus. '
  '41':
  - type: text
    content: 'Il rencontra d''abord son frère Simon et lui dit: «Nous avons trouvé le Messie», ce qui correspond à Christ. '
  '42':
  - type: text
    content: 'Il le conduisit vers Jésus. Jésus le regarda et dit: «Tu es Simon, fils de Jonas, tu seras appelé Céphas», ce qui signifie Pierre.'
  '43':
  - type: text
    content: 'Le lendemain, Jésus décida de se rendre en Galilée. Il rencontra Philippe et lui dit: «Suis-moi.» '
  '44':
  - type: text
    content: Philippe était de Bethsaïda, la ville d'André et de Pierre.
  '45':
  - type: text
    content: 'Philippe rencontra Nathanaël et lui dit: «Nous avons trouvé celui que Moïse a décrit dans la loi et dont les prophètes ont parlé: Jésus de Nazareth, fils de Joseph.» '
  '46':
  - type: text
    content: 'Nathanaël lui dit: «Peut-il sortir quelque chose de bon de Nazareth?» Philippe lui répondit: «Viens et vois.» '
  '47':
  - type: text
    content: 'Jésus vit Nathanaël s''approcher de lui et dit de lui: «Voici vraiment un Israélite en qui il n''y a pas de ruse.» '
  '48':
  - type: text
    content: '«D''où me connais-tu?» lui dit Nathanaël. Jésus lui répondit: «Avant que Philippe t''appelle, quand tu étais sous le figuier, je t''ai vu.» '
  '49':
  - type: text
    content: 'Nathanaël répondit: «Maître, tu es le Fils de Dieu, tu es le roi d''Israël.» '
  '5':
  - type: text
    content: La lumière brille dans les ténèbres, et les ténèbres ne l'ont pas accueillie.
  '50':
  - type: text
    content: 'Jésus lui répondit: «Parce que je t''ai dit que je t''ai vu sous le figuier, tu crois? Tu verras de plus grandes choses que celles-ci.» '
  '51':
  - type: text
    content: 'Il ajouta: «En vérité, en vérité, je vous le dis, vous verrez [désormais] le ciel ouvert et les anges de Dieu monter et descendre au-dessus du Fils de l''homme'
  - type: note
    content: 'Fils de l''homme: expression par laquelle Jésus se désignait fréquemment lui-même, avec un probable renvoi à Daniel 7.13.'
  - type: text
    content: .»
  '6':
  - type: text
    content: Il y eut un homme envoyé par Dieu; son nom était Jean
  - type: note
    content: 'Jean: c''est-à-dire Jean-Baptiste (idem dans le reste de l''Evangile).'
  - type: text
    content: '. '
  '7':
  - type: text
    content: 'Il vint comme témoin, pour rendre témoignage à la lumière afin que tous croient par lui. '
  '8':
  - type: text
    content: 'Il n''était pas la lumière, mais il vint pour rendre témoignage à la lumière. '
  '9':
  - type: text
    content: 'Cette lumière était la vraie lumière qui, en venant dans le monde, éclaire tout être humain. '
