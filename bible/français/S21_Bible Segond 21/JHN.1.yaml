document_id: JHN.1
type_code: fra
segments:
- type: usfm
  marker: ms1
  children:
  - type: text
    text: Présentation de Jésus
  marker-yv: yv-h
- type: usfm
  marker: mr
  children:
  - type: text
    text: 1.1–4.54
  marker-yv: yv-h
- type: usfm
  marker: s1
  children:
  - type: text
    text: L'incarnation de la Parole
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Au commencement, la Parole
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1.1 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'La Parole: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: c'est-à-dire Jésus-Christ.
    marker-yv: yv-n
  - type: text
    text: ' existait déjà. La Parole était avec Dieu et la Parole était Dieu. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Elle était au commencement avec Dieu. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Tout a été fait par elle et rien de ce qui a été fait n''a été fait sans elle. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'En elle il y avait la vie, et cette vie était la lumière des êtres humains. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: La lumière brille dans les ténèbres, et les ténèbres ne l'ont pas accueillie.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Il y eut un homme envoyé par Dieu; son nom était Jean
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1.6 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Jean: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: c'est-à-dire Jean-Baptiste (idem dans le reste de l'Evangile).
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Il vint comme témoin, pour rendre témoignage à la lumière afin que tous croient par lui. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Il n''était pas la lumière, mais il vint pour rendre témoignage à la lumière. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Cette lumière était la vraie lumière qui, en venant dans le monde, éclaire tout être humain. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Elle était dans le monde et le monde a été fait par elle, pourtant le monde ne l''a pas reconnue. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Elle est venue chez les siens, et les siens ne l''ont pas accueillie. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Mais à tous ceux qui l''ont acceptée, à ceux qui croient en son nom, elle a donné le droit de devenir enfants de Dieu, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: puisqu'ils sont nés non du fait de la nature, ni par une volonté humaine, ni par la volonté d'un mari, mais qu'ils sont nés de Dieu.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Et la Parole s'est faite homme, elle a habité parmi nous, pleine de grâce et de vérité, et nous avons contemplé sa gloire, une gloire comme celle du Fils unique venu du Père.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Jean lui a rendu témoignage et s''est écrié: «C''est celui à propos duquel j''ai dit: ‘Celui qui vient après moi m''a précédé, car il était avant moi.’» '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Nous avons tous reçu de sa plénitude, et grâce sur grâce. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'En effet, la loi a été donnée à travers Moïse, mais la grâce et la vérité sont venues à travers Jésus-Christ. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Personne n'a jamais vu Dieu; Dieu le Fils unique, qui est dans l'intimité du Père, est celui qui l'a fait connaître.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Témoignage de Jean-Baptiste sur Jésus
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Voici le témoignage de Jean lorsque les Juifs envoyèrent de Jérusalem des prêtres et des Lévites pour lui demander: «Toi, qui es-tu?» '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Il déclara et sans restriction affirma: «Moi, je ne suis pas le Messie'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1.20 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Le Messie: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: c'est-à-dire l'oint de Dieu, en grec Christos. Les Juifs attendaient, d'après les promesses de l'Ancien Testament, la venue d'une personne choisie par Dieu, qui leur apporterait la délivrance.
    marker-yv: yv-n
  - type: text
    text: .»
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Ils lui demandèrent: «Qui es-tu donc? Es-tu Elie?» Et il dit: «Je ne le suis pas.» «Es-tu le prophète?» Et il répondit: «Non.» '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Ils lui dirent alors: «Qui es-tu? Nous devons donner une réponse à ceux qui nous ont envoyés! Que dis-tu de toi-même?» '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: '«Moi, dit-il, je suis '
  - type: usfm
    marker: qt
    children:
    - type: text
      text: 'la voix de celui qui crie dans le désert: ‘Rendez le chemin du Seigneur droit’'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1.23 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'La voix… droit: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: citation d'
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Esaïe 40.3
      metadata:
        usfm: ISA.40.3
    - type: usfm
      marker: ft
      children:
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: ', comme l''a dit le prophète Esaïe.» '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: Ceux qui avaient été envoyés étaient des pharisiens
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1.24 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Pharisiens: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: membres d'un courant du judaïsme caractérisé par un fort intérêt pour les questions de pureté rituelle et par le souci de respecter le plus strictement possible la loi de Moïse ainsi que les traditions.
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Ils lui posèrent encore cette question: «Pourquoi donc baptises-tu, si tu n''es ni le Messie, ni Elie, ni le prophète?» '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Jean leur répondit: «Moi, je baptise d''eau, mais au milieu de vous se trouve quelqu''un que vous ne connaissez pas. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'Il vient après moi [mais il m''a précédé,] et je ne suis pas digne de détacher la courroie de ses sandales.» '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: Cela se passait à Béthanie, de l'autre côté du Jourdain, où Jean baptisait.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'Le lendemain, il vit Jésus s''approcher de lui et dit: «Voici l''Agneau'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1.29 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'L''Agneau: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: animal offert en sacrifice pour couvrir les péchés, notamment lors de la Pâque et le jour des expiations.
    marker-yv: yv-n
  - type: text
    text: ' de Dieu qui enlève le péché du monde. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'C''est celui à propos duquel j''ai dit: ‘Après moi vient un homme qui m''a précédé, car il existait avant moi.’ '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'Pour ma part, je ne le connaissais pas, mais c''est afin de le faire connaître à Israël que je suis venu baptiser d''eau.» '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'Jean rendit aussi ce témoignage: «J''ai vu l''Esprit descendre du ciel comme une colombe et s''arrêter sur lui. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: 'Je ne le connaissais pas, mais celui qui m''a envoyé baptiser d''eau m''a dit: ‘Celui sur qui tu verras l''Esprit descendre et s''arrêter, c''est lui qui baptise du Saint-Esprit.’ '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: Et moi, j'ai vu et j'atteste qu'il est le Fils de Dieu.»
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: 'Le lendemain, Jean était encore là avec deux de ses disciples. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: 'Il vit Jésus passer et dit: «Voici l''Agneau de Dieu.» '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: 'Les deux disciples l''entendirent prononcer ces paroles et suivirent Jésus. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: text
    text: 'Jésus se retourna et, voyant qu''ils le suivaient, il leur dit: «Que cherchez-vous?» Ils lui répondirent: «Rabbi – ce qui signifie maître –, où habites-tu?» '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '39'
  - type: text
    text: «Venez, leur dit-il, et voyez.» Ils y allèrent [donc], virent où il habitait et restèrent avec lui ce jour-là. C'était environ quatre heures de l'après-midi.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '40'
  - type: text
    text: 'André, le frère de Simon Pierre, était l''un des deux qui avaient entendu les paroles de Jean et qui avaient suivi Jésus. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '41'
  - type: text
    text: 'Il rencontra d''abord son frère Simon et lui dit: «Nous avons trouvé le Messie», ce qui correspond à Christ. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '42'
  - type: text
    text: 'Il le conduisit vers Jésus. Jésus le regarda et dit: «Tu es Simon, fils de Jonas, tu seras appelé Céphas», ce qui signifie Pierre.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '43'
  - type: text
    text: 'Le lendemain, Jésus décida de se rendre en Galilée. Il rencontra Philippe et lui dit: «Suis-moi.» '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '44'
  - type: text
    text: Philippe était de Bethsaïda, la ville d'André et de Pierre.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '45'
  - type: text
    text: 'Philippe rencontra Nathanaël et lui dit: «Nous avons trouvé celui que Moïse a décrit dans la loi et dont les prophètes ont parlé: Jésus de Nazareth, fils de Joseph.» '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '46'
  - type: text
    text: 'Nathanaël lui dit: «Peut-il sortir quelque chose de bon de Nazareth?» Philippe lui répondit: «Viens et vois.» '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '47'
  - type: text
    text: 'Jésus vit Nathanaël s''approcher de lui et dit de lui: «Voici vraiment un Israélite en qui il n''y a pas de ruse.» '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '48'
  - type: text
    text: '«D''où me connais-tu?» lui dit Nathanaël. Jésus lui répondit: «Avant que Philippe t''appelle, quand tu étais sous le figuier, je t''ai vu.» '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '49'
  - type: text
    text: 'Nathanaël répondit: «Maître, tu es le Fils de Dieu, tu es le roi d''Israël.» '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '50'
  - type: text
    text: 'Jésus lui répondit: «Parce que je t''ai dit que je t''ai vu sous le figuier, tu crois? Tu verras de plus grandes choses que celles-ci.» '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '51'
  - type: text
    text: 'Il ajouta: «En vérité, en vérité, je vous le dis, vous verrez [désormais] le ciel ouvert et les anges de Dieu monter et descendre au-dessus du Fils de l''homme'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1.51 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Fils de l''homme: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'expression par laquelle Jésus se désignait fréquemment lui-même, avec un probable renvoi à '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Daniel 7.13
      metadata:
        usfm: DAN.7.13
    - type: usfm
      marker: ft
      children:
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: .»
