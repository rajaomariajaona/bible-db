document_id: 1KI.11,152
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Idolâtrie de Salomon
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Le roi Salomon aima beaucoup de femmes étrangères, en plus de la fille du pharaon: des Moabites, des Ammonites, des Edomites, des Sidoniennes, des Hittites. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Il lui avait pourtant expressément défendu de suivre d''autres dieux, mais Salomon ne respecta pas ce commandement de l''Eternel. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'L''Eternel dit alors à Salomon: «Puisque tu as agi de cette manière et que tu n''as pas respecté mon alliance ni les prescriptions que je t''avais données, je vais t''arracher la royauté et la donner à ton serviteur. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Toutefois, je ne le ferai pas pendant ta vie à cause de ton père David. C''est de la main de ton fils que je l''arracherai. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Je n''arracherai cependant pas tout le royaume à ton fils: je lui laisserai une tribu à cause de mon serviteur David et de Jérusalem, la ville que j''ai choisie.»'
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ennemis de Salomon
    marker-yv: yv-h
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'L''Eternel fit surgir un adversaire pour Salomon: Hadad, l''Edomite, membre de la famille royale d''Edom. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Lorsque David avait combattu contre Edom, Joab, le chef de l''armée, était monté pour enterrer les Israélites morts et il avait tué tous les Edomites de sexe masculin. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Il était resté 6 mois en Edom avec tout Israël, jusqu''à ce qu''il en ait éliminé tous les hommes. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Hadad avait alors pris la fuite avec des serviteurs édomites de son père et s''était rendu en Egypte. Il était encore un tout jeune garçon. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Partis de Madian, ils étaient allés à Paran, avaient pris avec eux des hommes de Paran et étaient arrivés en Egypte, chez le pharaon, le roi d''Egypte. Celui-ci avait donné une maison à Hadad, avait pourvu à son entretien et lui avait accordé des terres. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Hadad avait trouvé grâce aux yeux du pharaon, à tel point que celui-ci lui avait donné pour épouse la sœur de sa femme, la reine Thachpenès. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Elles appartenaient aux nations à propos desquelles l''Eternel avait dit aux Israélites: «Vous n''irez pas chez elles et elles ne viendront pas chez vous. Elles entraîneraient certainement votre cœur à suivre leurs dieux.» Ce fut à ces nations que Salomon s''attacha, par amour pour ces femmes. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'La sœur de Thachpenès avait donné un fils à Hadad: Guenubath, et Thachpenès l''avait élevé dans la maison du pharaon. Ainsi, Guenubath avait vécu dans la maison du pharaon, au milieu de ses enfants. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Lorsque Hadad apprit en Egypte que David était couché avec ses ancêtres et que Joab, le chef de l''armée, était mort, il demanda au pharaon: «Laisse-moi partir dans mon pays.» '
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Le pharaon lui dit: «Que te manque-t-il auprès de moi, pour que tu cherches à rentrer dans ton pays?» Il répondit: «Rien, mais laisse-moi partir.»'
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dieu fit surgir un autre adversaire pour Salomon: Rezon, le fils d''Eliada, qui s''était enfui de chez son maître Hadadézer, le roi de Tsoba. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Il avait rassemblé des hommes auprès de lui et il était chef d''une bande, lorsque David avait massacré les troupes de son maître. Ils étaient allés à Damas et s''y étaient installés, et ils en devinrent les rois. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Il fut un adversaire d'Israël pendant toute la vie de Salomon, en même temps qu'Hadad lui faisait du mal, et il détestait Israël. Il régna sur la Syrie.
  '26':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Jéroboam aussi, un serviteur de Salomon, se révolta contre le roi. Il était le fils de Nebath, un Ephratien de Tseréda, et sa mère était une veuve du nom de Tserua. '
  '27':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Voici à quelle occasion il se révolta contre le roi. Salomon était en train de construire Millo et de réparer la brèche faite dans la ville de David, son père. '
  '28':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Jéroboam était fort et vaillant. Ayant vu ce jeune homme à l''œuvre, Salomon lui donna la surveillance de tous les travaux de la famille de Joseph. '
  '29':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'A la même époque, Jéroboam sortit de Jérusalem et rencontra en chemin le prophète Achija de Silo, habillé d''un manteau neuf. Ils se trouvaient tous les deux seuls dans les champs. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Il eut 700 princesses pour femmes ainsi que 300 concubines, et ses femmes détournèrent son cœur. '
  '30':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Achija attrapa le manteau neuf qu''il portait, le déchira en 12 morceaux '
  '31':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'et dit à Jéroboam: «Prends 10 morceaux pour toi! En effet, voici ce que dit l''Eternel, le Dieu d''Israël: ‘Je vais arracher le royaume de la main de Salomon et je te donnerai 10 tribus. '
  '32':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Mais il gardera une tribu, à cause de mon serviteur David et de Jérusalem, la ville que j''ai choisie de préférence à toutes les tribus d''Israël. '
  '33':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Cela arrivera parce qu''ils m''ont abandonné et se sont prosternés devant Astarté, la divinité des Sidoniens, devant Kemosh, le dieu de Moab, et devant Milcom, le dieu des Ammonites, et parce qu''ils n''ont pas marché dans mes voies pour faire ce qui est droit à mes yeux et pour mettre en pratique mes prescriptions et mes règles comme l''a fait David, le père de Salomon. '
  '34':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Je ne lui retirerai pas tout le royaume. En effet, je le garderai comme prince tout le temps qu''il vivra, à cause de mon serviteur David, que j''ai choisi et qui a respecté mes commandements et mes prescriptions. '
  '35':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'En revanche, je retirerai le royaume à son fils et je t''en donnerai 10 tribus. '
  '36':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Je laisserai une tribu à son fils afin que mon serviteur David ait toujours un successeur devant moi à Jérusalem, la ville que j''ai choisie pour y établir mon nom. '
  '37':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Je vais te prendre pour que tu règnes sur tout le territoire que tu voudras et tu seras roi d''Israël. '
  '38':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Si tu obéis à tout ce que je t''ordonnerai, si tu marches dans mes voies et si tu fais ce qui est droit à mes yeux, en respectant mes prescriptions et mes commandements comme l''a fait mon serviteur David, je serai avec toi, je te construirai une maison stable, comme j''en ai construit une à David, et je te donnerai Israël. '
  '39':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'J''humilierai ainsi la descendance de David, mais ce ne sera pas définitif.’» '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'A l''époque de la vieillesse de Salomon, ses femmes entraînèrent son cœur à suivre d''autres dieux et il ne s''attacha pas sans réserve à l''Eternel, son Dieu, comme l''avait fait son père David. '
  '40':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Salomon chercha à faire mourir Jéroboam, mais il se leva et se réfugia en Egypte vers Shishak, le roi d'Egypte. Il resta en Egypte jusqu'à la mort de Salomon.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Mort de Salomon
    marker-yv: yv-h
  '41':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Le reste des actes de Salomon, tout ce qu'il a accompli et sa sagesse, cela est décrit dans les annales de Salomon.
  '42':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Salomon régna 40 ans à Jérusalem sur l''ensemble d''Israël. '
  '43':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Puis il se coucha avec ses ancêtres et il fut enterré dans la ville de son père David. Son fils Roboam devint roi à sa place.
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Il suivit Astarté
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '11.5 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Astarté: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'voir la note sur '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Juges 2.13
      - type: usfm
        marker: ft
        children:
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: ', la divinité des Sidoniens, et Milcom'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '11.5 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Milcom: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: peut-être Moloc, dieu dont le culte réclamait des sacrifices d'enfants.
      marker-yv: yv-n
    - type: text
      text: ', l''abominable dieu des Ammonites. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Salomon fit ce qui est mal aux yeux de l''Eternel et il ne le suivit pas pleinement, contrairement à son père David. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ce fut alors qu''il construisit, sur la montagne qui se trouve en face de Jérusalem, un haut lieu pour Kemosh, l''abominable dieu de Moab, et pour Moloc, l''abominable dieu des Ammonites. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Il agit de cette manière à l'intention de toutes ses femmes étrangères pour qu'elles puissent offrir des parfums et des sacrifices à leurs dieux.
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'L''Eternel fut irrité contre Salomon, parce qu''il avait détourné son cœur de lui, le Dieu d''Israël, qui lui était apparu deux fois. '
