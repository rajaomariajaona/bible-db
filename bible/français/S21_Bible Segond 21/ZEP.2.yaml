document_id: ZEP.2,152
type_code: fra
verses:
  '1':
  - type: text
    content: Réfléchissez et examinez-vous,
  - type: text
    content: nation dépourvue de honte,
  '10':
  - type: text
    content: Voilà ce qui leur arrivera à cause de leur orgueil,
  - type: text
    content: parce qu'ils ont insulté le peuple de l'Eternel, le maître de l'univers,
  - type: text
    content: et se sont attaqués à lui.
  '11':
  - type: text
    content: L'Eternel sera redoutable contre eux,
  - type: text
    content: car il supprimera tous les dieux de la terre.
  - type: text
    content: Alors chacun l'adorera dans son pays,
  - type: text
    content: dans toutes les îles des nations.
  '12':
  - type: text
    content: Vous aussi, les Ethiopiens,
  - type: text
    content: vous serez transpercés par mon épée.
  '13':
  - type: text
    content: L'Eternel déploiera sa puissance contre le nord,
  - type: text
    content: il détruira l'Assyrie
  - type: text
    content: et il fera de Ninive
  - type: note
    content: 'Ninive: capitale de l''Empire assyrien.'
  - type: text
    content: ' une terre dévastée,'
  - type: text
    content: aride comme le désert.
  '14':
  - type: text
    content: Des troupeaux se coucheront au milieu d'elle,
  - type: text
    content: 'des animaux de toute espèce:'
  - type: text
    content: même le pélican et le hérisson
  - type: text
    content: passeront la nuit parmi ses chapiteaux.
  - type: text
    content: Des hululements se feront entendre aux fenêtres.
  - type: text
    content: La ruine sera sur le seuil,
  - type: text
    content: car les lambris de cèdre seront arrachés.
  '15':
  - type: text
    content: Voilà donc cette ville joyeuse
  - type: text
    content: qui siégeait en sécurité
  - type: text
    content: 'et qui disait dans son cœur: «Moi, et rien que moi!»'
  - type: text
    content: Comment! Elle est en ruine,
  - type: text
    content: c'est un repaire pour les bêtes!
  - type: text
    content: Tous ceux qui passeront près d'elle
  - type: text
    content: siffleront et agiteront la main.
  '2':
  - type: text
    content: avant que le décret ne survienne
  - type: text
    content: et que ce jour ne disparaisse comme la bale,
  - type: text
    content: avant que la colère ardente de l'Eternel ne vous atteigne,
  - type: text
    content: avant que le jour de la colère de l'Eternel ne vous atteigne!
  '3':
  - type: text
    content: Cherchez l'Eternel, vous, tous les humbles du pays,
  - type: text
    content: qui mettez ses règles en pratique!
  - type: text
    content: Recherchez la justice, recherchez l'humilité!
  - type: text
    content: Peut-être serez-vous épargnés, le jour de la colère de l'Eternel.
  - type: heading
    content: Jugement des nations
  '4':
  - type: text
    content: En effet, Gaza sera abandonnée,
  - type: text
    content: Askalon sera dévastée,
  - type: text
    content: Asdod sera chassée en plein midi,
  - type: text
    content: Ekron
  - type: note
    content: 'Gaza… Askalon… Asdod… Ekron: avec Gath, ce sont les cinq principales villes de Philistie.'
  - type: text
    content: ' sera déracinée.'
  '5':
  - type: text
    content: Malheur aux habitants des régions maritimes, à la nation des Kéréthiens
  - type: note
    content: 'Kéréthiens: identifiés aux Crétois par la Septante.'
  - type: text
    content: '!'
  - type: text
    content: 'L''Eternel a parlé contre toi, Canaan, pays des Philistins:'
  - type: text
    content: «Je te détruirai, tu n'auras plus d'habitants.»
  '6':
  - type: text
    content: Les régions maritimes deviendront des pâturages,
  - type: text
    content: des terrains pour les bergers
  - type: text
    content: et des parcs pour les troupeaux.
  '7':
  - type: text
    content: Ces régions seront pour le reste de la communauté de Juda.
  - type: text
    content: C'est là qu'ils conduiront leurs troupeaux;
  - type: text
    content: ils se reposeront le soir dans les maisons d'Askalon,
  - type: text
    content: car l'Eternel, leur Dieu, interviendra pour eux,
  - type: text
    content: et il ramènera leurs déportés.
  '8':
  - type: text
    content: J'ai entendu les injures de Moab
  - type: text
    content: et les sarcasmes des Ammonites
  - type: text
    content: quand ils insultaient mon peuple
  - type: text
    content: et s'attaquaient à ses frontières.
  '9':
  - type: text
    content: C'est pourquoi, aussi vrai que je suis vivant,
  - type: text
    content: déclare l'Eternel, le maître de l'univers, le Dieu d'Israël,
  - type: text
    content: Moab sera pareil à Sodome, et les Ammonites pareils à Gomorrhe
  - type: note
    content: 'Sodome… Gomorrhe: villes détruites par Dieu à l''époque d''Abraham en raison de leur immoralité.'
  - type: text
    content: ':'
  - type: text
    content: un endroit couvert de ronces, une mine de sel, un désert pour toujours.
  - type: text
    content: Le reste de mon peuple les pillera,
  - type: text
    content: ce qui subsiste de ma nation les aura en héritage.
