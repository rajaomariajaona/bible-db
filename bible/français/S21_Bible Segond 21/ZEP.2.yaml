document_id: ZEP.2,152
type_code: fra
verses:
  '1':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: Réfléchissez et examinez-vous,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: nation dépourvue de honte,
  '10':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: Voilà ce qui leur arrivera à cause de leur orgueil,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: parce qu'ils ont insulté le peuple de l'Eternel, le maître de l'univers,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et se sont attaqués à lui.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: L'Eternel sera redoutable contre eux,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: car il supprimera tous les dieux de la terre.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Alors chacun l'adorera dans son pays,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dans toutes les îles des nations.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: Vous aussi, les Ethiopiens,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: vous serez transpercés par mon épée.
  '13':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: L'Eternel déploiera sa puissance contre le nord,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: il détruira l'Assyrie
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et il fera de Ninive
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '2.13 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Ninive: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: capitale de l'Empire assyrien.
      marker-yv: yv-n
    - type: text
      text: ' une terre dévastée,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: aride comme le désert.
  '14':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: Des troupeaux se coucheront au milieu d'elle,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'des animaux de toute espèce:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: même le pélican et le hérisson
  - type: usfm
    marker: q1
    children:
    - type: text
      text: passeront la nuit parmi ses chapiteaux.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Des hululements se feront entendre aux fenêtres.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: La ruine sera sur le seuil,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: car les lambris de cèdre seront arrachés.
  '15':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: Voilà donc cette ville joyeuse
  - type: usfm
    marker: q1
    children:
    - type: text
      text: qui siégeait en sécurité
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'et qui disait dans son cœur: «Moi, et rien que moi!»'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Comment! Elle est en ruine,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: c'est un repaire pour les bêtes!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tous ceux qui passeront près d'elle
  - type: usfm
    marker: q1
    children:
    - type: text
      text: siffleront et agiteront la main.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: avant que le décret ne survienne
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et que ce jour ne disparaisse comme la bale,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: avant que la colère ardente de l'Eternel ne vous atteigne,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: avant que le jour de la colère de l'Eternel ne vous atteigne!
  '3':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: Cherchez l'Eternel, vous, tous les humbles du pays,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: qui mettez ses règles en pratique!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Recherchez la justice, recherchez l'humilité!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Peut-être serez-vous épargnés, le jour de la colère de l'Eternel.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Jugement des nations
    marker-yv: yv-h
  '4':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: En effet, Gaza sera abandonnée,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Askalon sera dévastée,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Asdod sera chassée en plein midi,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ekron
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '2.4 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Gaza… Askalon… Asdod… Ekron: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: avec Gath, ce sont les cinq principales villes de Philistie.
      marker-yv: yv-n
    - type: text
      text: ' sera déracinée.'
  '5':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: Malheur aux habitants des régions maritimes, à la nation des Kéréthiens
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '2.5 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Kéréthiens: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: identifiés aux Crétois par la Septante.
      marker-yv: yv-n
    - type: text
      text: '!'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'L''Eternel a parlé contre toi, Canaan, pays des Philistins:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: «Je te détruirai, tu n'auras plus d'habitants.»
  '6':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: Les régions maritimes deviendront des pâturages,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: des terrains pour les bergers
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et des parcs pour les troupeaux.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: Ces régions seront pour le reste de la communauté de Juda.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: C'est là qu'ils conduiront leurs troupeaux;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ils se reposeront le soir dans les maisons d'Askalon,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: car l'Eternel, leur Dieu, interviendra pour eux,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et il ramènera leurs déportés.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: J'ai entendu les injures de Moab
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et les sarcasmes des Ammonites
  - type: usfm
    marker: q1
    children:
    - type: text
      text: quand ils insultaient mon peuple
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et s'attaquaient à ses frontières.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: C'est pourquoi, aussi vrai que je suis vivant,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: déclare l'Eternel, le maître de l'univers, le Dieu d'Israël,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Moab sera pareil à Sodome, et les Ammonites pareils à Gomorrhe
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '2.9 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Sodome… Gomorrhe: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: villes détruites par Dieu à l'époque d'Abraham en raison de leur immoralité.
      marker-yv: yv-n
    - type: text
      text: ':'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: un endroit couvert de ronces, une mine de sel, un désert pour toujours.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Le reste de mon peuple les pillera,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ce qui subsiste de ma nation les aura en héritage.
